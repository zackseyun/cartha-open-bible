id: JHN.21.5
reference: John 21:5
source:
  edition: SBLGNT
  text: λέγει οὖν αὐτοῖς ⸀ὁ Ἰησοῦς· Παιδία, μή τι προσφάγιον ἔχετε; ἀπεκρίθησαν αὐτῷ· Οὔ.
translation:
  text: So Jesus said to them[a], “Children, you do not have any fish, do you?” They answered him, “No.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'anything to eat.' The Greek προσφάγιον refers more specifically to food eaten with bread; in this fishing context, it likely refers to fish.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Rendered as a natural discourse connector in English. 'So' preserves the narrative progression without sounding wooden.
- source_word: Παιδία
  chosen: Children
  alternatives:
  - boys
  - young men
  - friends
  lexicon: BDAG
  rationale: Vocative plural of παιδίον used as a familiar form of address. 'Children' is the most direct lexical equivalent and preserves the slightly affectionate, relational tone. 'Friends' is too interpretive, and 'boys' may sound overly colloquial or age-specific.
- source_word: μή τι
  chosen: do not ... do you?
  alternatives:
  - surely you do not ...?
  - you do not have any ..., do you?
  lexicon: BDAG
  rationale: μή with a question expects a negative answer. In idiomatic English this is best conveyed by a negatively framed question with a tag-like force.
- source_word: προσφάγιον
  chosen: fish to eat
  alternatives:
  - anything to eat
  - some relish
  - something to go with bread
  lexicon: BDAG
  rationale: The noun refers to food eaten with bread, and in this fishing context it naturally refers to fish for eating. 'Fish to eat' makes the contextual sense explicit without excessive paraphrase. 'Anything to eat' is too broad, while 'relish' is misleading in modern English.
- source_word: ἔχετε
  chosen: you have
  alternatives:
  - you have there is
  - you are holding
  lexicon: BDAG
  rationale: Simple present possession in the question; rendered idiomatically in English within the negative interrogative structure.
- source_word: ἀπεκρίθησαν αὐτῷ
  chosen: They answered him
  alternatives:
  - they replied to him
  lexicon: BDAG
  rationale: Standard narrative response formula; 'answered him' is natural and sufficiently formal.
- source_word: Οὔ
  chosen: 'No'
  alternatives:
  - No, we do not
  lexicon: BDAG
  rationale: A concise negative reply matching the Greek.
