theological_decisions:
- issue: Meaning of 'glorify God' in relation to Peter's death
  chosen_reading: The phrase is left as 'glorify God' without interpretive expansion,
    indicating that Peter's death would honor God.
  alternative_readings:
  - that Peter's martyrdom would specifically glorify God through faithful witness
  - that the phrase refers more broadly to the manner of Peter's end rather than martyrdom
    alone
  rationale: The text itself states that the death would glorify God but does not
    explicitly define the mechanism. The translation preserves that theological weight
    without importing a fuller doctrinal explanation into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
