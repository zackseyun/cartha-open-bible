id: JHN.21.19
reference: John 21:19
source:
  edition: SBLGNT
  text: τοῦτο δὲ εἶπεν σημαίνων ποίῳ θανάτῳ δοξάσει τὸν θεόν. καὶ τοῦτο εἰπὼν λέγει
    αὐτῷ· Ἀκολούθει μοι.
translation:
  text: Now he said this to indicate by what kind of death he would glorify God. And
    after saying this, he says to him, “Follow me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “by what manner of death.”
    reason: lexical_alternative
  - marker: b
    text: 'The Greek uses a historical present: “he says to him.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: σημαίνων
  chosen: to indicate
  alternatives:
  - signifying
  - showing
  lexicon: BDAG
  rationale: The participle explains the purpose of Jesus' statement. 'Indicate' is
    clear modern English and preserves the sense of making something known indirectly
    or by implication.
- source_word: ποίῳ θανάτῳ
  chosen: by what kind of death
  alternatives:
  - by what death
  - by what manner of death
  lexicon: BDAG
  rationale: ποίῳ adds a qualitative nuance beyond a bare 'what death.' 'By what kind
    of death' preserves the dative construction and the emphasis on the manner/type
    of Peter's death.
- source_word: δοξάσει
  chosen: he would glorify
  alternatives:
  - he will glorify
  lexicon: BDAG
  rationale: The future indicative is retained semantically, but English idiom in
    indirect discourse after a past-tense reporting verb is smoother with 'would glorify.'
    This preserves the prospective sense without awkwardness.
- source_word: τὸν θεόν
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός here as the object of δοξάζω.
- source_word: Ἀκολούθει μοι
  chosen: Follow me
  alternatives:
  - Keep following me
  - Come after me
  lexicon: BDAG
  rationale: The present imperative can suggest ongoing discipleship, but 'Follow
    me' is the natural and established English imperative that still carries both
    immediate and continuing force in context.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: The Greek shifts to the historical present. Rendering it as 'he says'
    preserves John's vivid narrative style rather than flattening it into a simple
    past.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - Then
  lexicon: BDAG
  rationale: δέ is mildly connective here. 'Now' marks a transition in English without
    overstating sequence.
- source_word: καὶ τοῦτο εἰπὼν
  chosen: And after saying this
  alternatives:
  - And having said this
  - And when he had said this
  lexicon: BDAG
  rationale: This aorist participial construction is naturally rendered in contemporary
    English as a temporal clause. 'After saying this' is readable and faithful.
