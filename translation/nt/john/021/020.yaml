theological_decisions:
- issue: Rendering the historical present βλέπει
  chosen_reading: Converted to simple past ('saw')
  alternative_readings:
  - Retain historical present ('sees')
  rationale: This is a stylistic translation decision rather than a doctrinal one. English narrative reads more naturally in the past here, and no theological meaning is lost.
  doctrine_reference: Translation philosophy §6 (Readable modern English, not archaic or academic)
- issue: Supplying the implicit object with ἀκολουθοῦντα
  chosen_reading: following them
  alternative_readings:
  - following him
  - following
  rationale: The Greek participle lacks an explicit object, but the narrative context involves Jesus and Peter walking together with the beloved disciple behind them. 'Following them' makes the scene clear in English without materially expanding the sense.
  doctrine_reference: Translation philosophy §1 and §6
