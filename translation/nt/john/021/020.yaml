id: JHN.21.20
reference: John 21:20
source:
  edition: SBLGNT
  text: ⸀Ἐπιστραφεὶς ὁ Πέτρος βλέπει τὸν μαθητὴν ὃν ἠγάπα ὁ Ἰησοῦς ἀκολουθοῦντα, ὃς καὶ ἀνέπεσεν ἐν τῷ δείπνῳ ἐπὶ τὸ στῆθος αὐτοῦ καὶ εἶπεν· Κύριε, τίς ἐστιν ὁ παραδιδούς σε;
translation:
  text: Peter turned and saw the disciple whom Jesus loved following[a], who had also leaned back against his chest at the supper and said, “Lord[b], who is the one betraying you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “following” or “following him”; the Greek participle does not state the object explicitly.
    reason: lexical_alternative
  - marker: b
    text: Or “reclined … on his breast.” The Greek reflects the posture of reclining at a meal.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπιστραφεὶς
  chosen: turned
  alternatives:
  - turned around
  - having turned
  lexicon: BDAG
  rationale: Aorist participle introducing Peter's action. 'Turned' is natural English and preserves the sequence without over-formalizing the participial construction.
- source_word: βλέπει
  chosen: saw
  alternatives:
  - sees
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, English narrative style more naturally renders it as past here. This preserves sense rather than reproducing Greek aspect mechanically.
- source_word: μαθητὴν
  chosen: disciple
  alternatives:
  - follower
  lexicon: BDAG
  rationale: Standard Johannine term for Jesus' disciple; 'disciple' preserves both lexical continuity and theological nuance better than the more generic 'follower'.
- source_word: ὃν ἠγάπα ὁ Ἰησοῦς
  chosen: whom Jesus loved
  alternatives:
  - whom Jesus was loving
  lexicon: BDAG
  rationale: Idiomatic rendering of the relative clause. ἀγαπάω is rendered 'love' in keeping with the project's default handling of this word group.
- source_word: ἀκολουθοῦντα
  chosen: following them
  alternatives:
  - following
  - coming behind
  lexicon: BDAG
  rationale: The participle describes the beloved disciple's movement behind Jesus and Peter in context. English commonly supplies the object 'them' for clarity, though it is implicit in Greek.
- source_word: ἀνέπεσεν
  chosen: leaned back
  alternatives:
  - reclined
  - lay back
  lexicon: BDAG
  rationale: In meal context the verb refers to reclining at table. 'Leaned back' fits the specific remembered action of John 13 and reads naturally in modern English.
- source_word: ἐν τῷ δείπνῳ
  chosen: at the supper
  alternatives:
  - during the supper
  - at dinner
  lexicon: BDAG
  rationale: δεῖπνον denotes the meal setting. 'At the supper' is clear, dignified, and preserves the definite meal in view without importing technical liturgical language.
- source_word: ἐπὶ τὸ στῆθος αὐτοῦ
  chosen: against his chest
  alternatives:
  - on his breast
  - against his breast
  lexicon: BDAG
  rationale: στῆθος refers to the chest/breast area. 'Chest' is more natural contemporary English than 'breast' while preserving the physical closeness described.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In direct address to Jesus this preserves both respect and Johannine theological resonance.
- source_word: ὁ παραδιδούς
  chosen: the one betraying
  alternatives:
  - the one who is betraying
  - the one handing over
  lexicon: BDAG
  rationale: παραδίδωμι in this passion context conventionally means 'betray.' The participial construction is represented with an English substantive participle for clarity and force.
