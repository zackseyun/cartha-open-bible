id: JHN.21.4
reference: John 21:4
source:
  edition: SBLGNT
  text: Πρωΐας δὲ ἤδη ⸀γενομένης ⸀ἔστη Ἰησοῦς εἰς τὸν αἰγιαλόν· οὐ μέντοι ᾔδεισαν
    οἱ μαθηταὶ ὅτι Ἰησοῦς ἐστιν.
translation:
  text: Now when daybreak had already come, Jesus stood on the shore; yet the disciples
    did not know that it was Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "did not recognize that it was Jesus." The Greek says more literally,
      "did not know that it was Jesus."
    reason: lexical_alternative
lexical_decisions:
- source_word: Πρωΐας ... ἤδη γενομένης
  chosen: when daybreak had already come
  alternatives:
  - when morning had already come
  - at early dawn, already having come
  lexicon: BDAG
  rationale: The genitive absolute marks a temporal circumstance. 'Daybreak' captures
    πρωΐα idiomatically in natural English while preserving the sense of early morning;
    'had already come' reflects ἤδη with γενομένης.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  - ''
  lexicon: BDAG
  rationale: δέ here is a mild connective advancing the narrative. 'Now' gives readable
    English discourse flow without overstating contrast.
- source_word: ἔστη
  chosen: stood
  alternatives:
  - was standing
  - took his stand
  lexicon: BDAG
  rationale: Aorist of ἵστημι here is best rendered simply as a past event, 'stood.'
    English may imply resultant presence without needing an explicit imperfective
    rendering.
- source_word: εἰς τὸν αἰγιαλόν
  chosen: on the shore
  alternatives:
  - at the beach
  - on the beach
  - by the seashore
  lexicon: BDAG
  rationale: Although εἰς is literally 'into/to,' with verbs of standing it can function
    idiomatically for position. αἰγιαλός denotes the shore/beach. 'On the shore' is
    natural and contextually precise.
- source_word: οὐ μέντοι
  chosen: yet
  alternatives:
  - however ... not
  - nevertheless ... not
  - but ... not
  lexicon: BDAG
  rationale: The combination introduces a concessive/adversative nuance. 'Yet' concisely
    conveys the contrast between Jesus' presence and the disciples' lack of recognition.
- source_word: ᾔδεισαν
  chosen: did not know
  alternatives:
  - did not recognize
  - were not aware
  lexicon: BDAG
  rationale: The verb is οἶδα, 'to know,' not the more specific verb for recognize.
    In context the sense approaches recognition, but the translation preserves the
    source wording with 'did not know.'
- source_word: οἱ μαθηταὶ
  chosen: the disciples
  alternatives:
  - his disciples
  lexicon: BDAG
  rationale: The article with μαθηταί naturally refers to the known group of disciples
    present. 'The disciples' is sufficient and does not add possessive wording absent
    from the Greek.
- source_word: ὅτι Ἰησοῦς ἐστιν
  chosen: that it was Jesus
  alternatives:
  - that Jesus was there
  - that he was Jesus
  lexicon: BDAG
  rationale: English idiom normally supplies 'it was' in identification clauses of
    this kind. This preserves the meaning of the Greek clause without awkward literalism.
