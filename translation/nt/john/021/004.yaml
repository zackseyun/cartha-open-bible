theological_decisions:
- issue: Post-resurrection identification of Jesus
  chosen_reading: Translate the disciples' failure as lack of knowledge/recognition
    without implying any doctrinal explanation for why they failed to identify him.
  alternative_readings:
  - Render more interpretively as 'did not recognize that it was Jesus'
  rationale: The verse narrates the fact of non-recognition but does not explain its
    cause. The translation preserves that narrative restraint and avoids importing
    theological conclusions about Jesus' appearance or the disciples' perception.
  doctrine_reference: Preserve theological tension rather than resolve it.
