id: JHN.21.6
reference: John 21:6
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν αὐτοῖς· Βάλετε εἰς τὰ δεξιὰ μέρη τοῦ πλοίου τὸ δίκτυον, καὶ εὑρήσετε. ἔβαλον οὖν, καὶ οὐκέτι αὐτὸ ἑλκύσαι ⸀ἴσχυον ἀπὸ τοῦ πλήθους τῶν ἰχθύων.
translation:
  text: But he said to them[a], “Cast the net on the right side of the boat, and you will find some.” So they cast it, and they were no longer able to haul it in because of the multitude of fish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, “and you will find”; the object (“fish” or “some”) is implied by the fishing context rather than stated explicitly in Greek.
    reason: lexical_alternative
lexical_decisions:
- source_word: Βάλετε
  chosen: Cast
  alternatives:
  - Throw
  lexicon: BDAG
  rationale: Aorist imperative of βάλλω in a fishing context. 'Cast' is idiomatic English for throwing a net and fits the scene better than the more generic 'throw.'
- source_word: τὰ δεξιὰ μέρη τοῦ πλοίου
  chosen: the right side of the boat
  alternatives:
  - the right parts of the boat
  - the starboard side of the boat
  lexicon: BDAG
  rationale: μέρη literally means 'parts/areas,' but in this construction it refers naturally to the side/region of the boat. 'Right side' is clear modern English and preserves the directional sense without nautical jargon.
- source_word: πλοίου
  chosen: boat
  alternatives:
  - ship
  lexicon: BDAG
  rationale: πλοῖον can mean boat or ship; in this Galilean fishing setting 'boat' is the natural English equivalent.
- source_word: τὸ δίκτυον
  chosen: the net
  lexicon: BDAG
  rationale: Straightforward rendering of the singular noun for fishing net.
- source_word: εὑρήσετε
  chosen: you will find some
  alternatives:
  - you will find
  - you will find fish
  lexicon: BDAG
  rationale: 'The verb ''find'' has an implied object from context: fish. English often supplies ''some'' to make the statement natural without over-specifying beyond the context. ''You will find fish'' is possible but slightly more interpretive than the Greek wording.'
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - not any longer
  lexicon: BDAG
  rationale: Standard temporal negation indicating a changed situation after the catch.
- source_word: ἑλκύσαι
  chosen: to haul it in
  alternatives:
  - to draw it
  - to pull it in
  lexicon: BDAG
  rationale: In context of a net full of fish, 'haul it in' best captures the physical action in natural English. It is more idiomatic than the wooden 'draw it.'
- source_word: ἴσχυον
  chosen: they were able
  alternatives:
  - they had strength
  - they were strong enough
  lexicon: BDAG
  rationale: ἰσχύω here expresses capability/strength. 'They were able' communicates the sense clearly in English; the following infinitive supplies the action.
- source_word: ἀπὸ τοῦ πλήθους τῶν ἰχθύων
  chosen: because of the large number of fish
  alternatives:
  - from the multitude of fish
  - because of the abundance of fish
  lexicon: BDAG
  rationale: πλῆθος denotes a large number or multitude. 'Because of the large number of fish' is natural modern English and preserves the causal force of ἀπό in context.
- source_word: ἰχθύων
  chosen: fish
  lexicon: BDAG
  rationale: Standard plural noun; English 'fish' serves as both singular and plural in this context.
