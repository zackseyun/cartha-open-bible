id: JHN.21.23
reference: John 21:23
source:
  edition: SBLGNT
  text: ἐξῆλθεν οὖν ⸂οὗτος ὁ λόγος⸃ εἰς τοὺς ἀδελφοὺς ὅτι ὁ μαθητὴς ἐκεῖνος οὐκ ἀποθνῄσκει. ⸂οὐκ εἶπεν δὲ⸃ αὐτῷ ὁ Ἰησοῦς ὅτι οὐκ ἀποθνῄσκει ἀλλ’· Ἐὰν αὐτὸν θέλω μένειν ἕως ἔρχομαι, τί πρὸς σέ;
translation:
  text: So this saying spread among the brothers that that disciple would not die[a]. Yet Jesus did not say to him that he would not die, but, “If I want him to remain until I come[c][b], what is that to you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “this saying spread among the brothers.” The Greek λόγος can mean “word,” “statement,” or “report.”
    reason: lexical_alternative
  - marker: b
    text: “Brothers” here refers to the community of disciples; the Greek uses the masculine plural ἀδελφοί.
    reason: cultural_note
  - marker: c
    text: 'That is, Jesus did not promise that this disciple would never die; he stated a hypothetical condition: “If I want him to remain until I come …”'
    reason: cross_reference
lexical_decisions:
- source_word: ἐξῆλθεν
  chosen: spread
  alternatives:
  - went out
  - went forth
  lexicon: BDAG
  rationale: The idiom ἐξῆλθεν ... εἰς conveys news going out among people. 'Spread' gives the natural English sense while preserving the metaphor of dissemination.
- source_word: οὗτος ὁ λόγος
  chosen: this report
  alternatives:
  - this saying
  - this word
  - this statement
  lexicon: BDAG
  rationale: λόγος here refers to a circulated message or report rather than a formal 'word' in a theological sense. 'Report' best fits the context of a rumor spreading among the disciples.
- source_word: εἰς τοὺς ἀδελφοὺς
  chosen: among the brothers
  alternatives:
  - to the brothers
  - among the brothers and sisters
  lexicon: BDAG
  rationale: The preposition with this verb indicates dissemination within a group, hence 'among.' Per the gender-accurate policy, ἀδελφοί is rendered 'brothers' rather than a gender-neutral expansion, while the referent is the community of believers.
- source_word: ὁ μαθητὴς ἐκεῖνος
  chosen: that disciple
  alternatives:
  - that disciple there
  - the disciple
  lexicon: BDAG
  rationale: The demonstrative ἐκεῖνος is retained with 'that' for specificity and continuity with Johannine style referring to the particular disciple in view.
- source_word: οὐκ ἀποθνῄσκει
  chosen: would not die
  alternatives:
  - is not dying
  - does not die
  lexicon: BDAG
  rationale: Although the Greek uses present tense, in indirect discourse after a past reporting verb English idiom normally shifts to 'would not die' to express the content of the rumor.
- source_word: οὐκ εἶπεν δὲ
  chosen: Yet ... did not say
  alternatives:
  - But ... did not say
  - However ... did not say
  lexicon: BDAG
  rationale: δέ here marks contrast/correction. 'Yet' reads naturally in English and signals the author's clarification of the misunderstanding.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Simple dative indirect object referring to Peter in the immediate context.
- source_word: Ἐὰν αὐτὸν θέλω μένειν
  chosen: If I want him to remain
  alternatives:
  - If I will that he remain
  - If I desire him to stay
  lexicon: BDAG
  rationale: θέλω expresses volition; 'want' is clear modern English. μένειν is rendered 'remain' to preserve Johannine resonance and avoid overly colloquial 'stay'.
- source_word: ἕως ἔρχομαι
  chosen: until I come
  alternatives:
  - until I am coming
  - until I return
  lexicon: BDAG
  rationale: The present ἔρχομαι in this conditional is naturally rendered futurally in English. 'Until I come' is closer to the Greek than interpretive 'return,' though the latter is contextually implied.
- source_word: τί πρὸς σέ
  chosen: what is that to you?
  alternatives:
  - what is it to you?
  - what concern is that of yours?
  lexicon: BDAG
  rationale: This idiom dismisses Peter's concern about another disciple's destiny. 'What is that to you?' is idiomatic, direct, and familiar in English.
