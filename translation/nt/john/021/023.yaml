theological_decisions:
- issue: Nature of the circulated claim about the beloved disciple
  chosen_reading: Render the statement as a rumor/report without implying Jesus actually promised the disciple would never die.
  alternative_readings:
  - Use more literal 'this word went out'
  rationale: The verse itself corrects a misunderstanding. Translating λόγος as 'report' helps modern readers see that a circulated claim is in view, while the second sentence preserves the explicit correction that Jesus did not make that promise.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
