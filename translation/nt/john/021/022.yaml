id: JHN.21.22
reference: John 21:22
source:
  edition: SBLGNT
  text: λέγει αὐτῷ ὁ Ἰησοῦς· Ἐὰν αὐτὸν θέλω μένειν ἕως ἔρχομαι, τί πρὸς σέ; σύ ⸂μοι
    ἀκολούθει⸃.
translation:
  text: Jesus said to him, “If I want him to remain until I come, what is that to
    you? You follow me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'If I will him to remain until I come.' The Greek verb can express either
      desire ('want') or will ('will/wish').
    reason: lexical_alternative
  - marker: b
    text: '''Until I come'' is left intentionally open; interpreters differ on whether
      this refers to Jesus'' later coming in a historical event or to his final coming.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐὰν
  chosen: If
  alternatives:
  - Suppose that
  - In case
  lexicon: BDAG
  rationale: Introduces a conditional statement. 'If' is the natural English equivalent
    and preserves the hypothetical force without implying uncertainty beyond the Greek.
- source_word: θέλω
  chosen: I want
  alternatives:
  - I will
  - I wish
  lexicon: BDAG
  rationale: θέλω commonly expresses desire or will. 'I want' is clear modern English
    and preserves Jesus' volitional statement better than the more archaic 'I will'
    in this context, though 'I will' is a viable alternative.
- source_word: μένειν
  chosen: to remain
  alternatives:
  - to stay
  - to live on
  lexicon: BDAG
  rationale: μένω often means 'remain' or 'stay.' 'Remain' preserves the verbal link
    with Johannine usage elsewhere and avoids overinterpreting the sense as specifically
    'stay alive,' though that implication may be inferred from context.
- source_word: ἕως ἔρχομαι
  chosen: until I come
  alternatives:
  - until I am coming
  - until I return
  lexicon: BDAG
  rationale: A straightforward temporal clause. 'Until I come' is idiomatic and leaves
    the nature of the coming unstated, preserving the text's ambiguity better than
    'return,' which interprets the coming more explicitly.
- source_word: τί πρὸς σέ;
  chosen: what is that to you?
  alternatives:
  - what concern is that of yours?
  - what does that matter to you?
  lexicon: BDAG
  rationale: This idiom dismisses Peter's concern about another disciple's fate. 'What
    is that to you?' is natural English and preserves the directness of Jesus' rebuke.
- source_word: σύ
  chosen: You
  alternatives:
  - As for you
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic in Greek. Rendering it as 'You' at the
    start of the clause preserves the contrast with 'him' in the previous clause.
- source_word: μοι ἀκολούθει
  chosen: follow me
  alternatives:
  - keep following me
  - be following me
  lexicon: BDAG
  rationale: The present imperative can carry ongoing force, but in English 'follow
    me' naturally conveys the command without awkwardness. The ongoing nuance is contextually
    present even without an expanded rendering.
- source_word: λέγει αὐτῷ ὁ Ἰησοῦς
  chosen: Jesus said to him
  alternatives:
  - Jesus says to him
  lexicon: BDAG
  rationale: Although λέγει is present tense (historical present), English narrative
    style commonly renders it as past tense. 'Jesus said to him' is idiomatic and
    fits surrounding narrative translation practice.
