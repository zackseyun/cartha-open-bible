theological_decisions:
- issue: Meaning of Jesus' 'coming' in ἕως ἔρχομαι
  chosen_reading: Rendered generically as 'until I come' without specifying the referent.
  alternative_readings:
  - until I come in resurrection appearances
  - until I come in judgment on Jerusalem
  - until I come in the final/parousia sense
  rationale: The verse itself does not define the referent of Jesus' coming, and the
    immediate context (vv. 22–23) warns against overreading Jesus' statement. The
    translation therefore preserves the ambiguity rather than resolving it doctrinally
    or eschatologically.
  doctrine_reference: Preserve theological tension rather than resolve it.
