id: JHN.21.24
reference: John 21:24
source:
  edition: SBLGNT
  text: Οὗτός ἐστιν ὁ μαθητὴς ὁ μαρτυρῶν περὶ τούτων καὶ ⸀ὁ γράψας ταῦτα, καὶ οἴδαμεν ὅτι ἀληθὴς ⸂αὐτοῦ ἡ μαρτυρία ἐστίν⸃.
translation:
  text: This is the disciple who testifies about these things and who wrote these things[a], and we know that his testimony is true.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bears witness about these things ... his witness is true.' The Greek uses cognate witness/testimony language throughout the verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὗτός
  chosen: This
  alternatives:
  - This one
  lexicon: BDAG
  rationale: Demonstrative pronoun referring back to the disciple just mentioned; simple 'This' is natural English and preserves the identificational force.
- source_word: μαθητὴς
  chosen: disciple
  alternatives:
  - learner
  - follower
  lexicon: BDAG
  rationale: Standard Johannine term for a follower of Jesus; 'disciple' is both accurate and idiomatic.
- source_word: μαρτυρῶν
  chosen: testifies
  alternatives:
  - bears witness
  - is testifying
  lexicon: BDAG
  rationale: Present participle with ongoing or characteristic force. 'Testifies' gives clear modern English while preserving witness language. 'Bears witness' is possible but slightly less natural here.
- source_word: περὶ τούτων
  chosen: about these things
  alternatives:
  - concerning these things
  - about these matters
  lexicon: BDAG
  rationale: A straightforward rendering of the prepositional phrase; 'about these things' keeps the demonstrative linkage to the contents of the Gospel.
- source_word: ὁ γράψας ταῦτα
  chosen: who wrote these things
  alternatives:
  - the one who wrote these things
  lexicon: BDAG
  rationale: Aorist participle denotes the completed act of writing. Relative clause form is smoother in English while preserving the sense.
- source_word: οἴδαμεν
  chosen: we know
  alternatives:
  - we have known
  - we are aware
  lexicon: BDAG
  rationale: Perfect-form verb with present meaning in Koine; 'we know' is the normal and accurate English rendering.
- source_word: ἀληθὴς
  chosen: 'true'
  alternatives:
  - truthful
  - reliable
  lexicon: BDAG
  rationale: Predicate adjective describing the testimony. 'True' is the most direct rendering and fits Johannine usage.
- source_word: αὐτοῦ ἡ μαρτυρία
  chosen: his testimony
  alternatives:
  - his witness
  lexicon: BDAG
  rationale: Genitive pronoun with noun naturally rendered as possessive in English. 'Testimony' fits both legal-witness and truth-claim nuances in this context.
- source_word: μαρτυρία
  chosen: testimony
  alternatives:
  - witness
  lexicon: BDAG
  rationale: Maintains lexical connection with μαρτυρῶν ('testifies'). 'Testimony' works well for the noun while 'testifies' works well for the verb, preserving the cognate relationship as much as idiomatic English allows.
