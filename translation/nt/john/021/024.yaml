- issue: Identity and voice of 'we know'
  chosen_reading: Render the first person plural straightforwardly as 'we know' without specifying the speaker(s).
  alternative_readings:
  - The evangelist speaking editorially
  - A community of attestants affirming the beloved disciple's witness
  rationale: The Greek explicitly uses first person plural but does not identify the referent. The translation should preserve this textual feature rather than resolve the authorship or community question.
  doctrine_reference: Preserve theological tension rather than resolve it.
