id: JHN.21.8
reference: John 21:8
source:
  edition: SBLGNT
  text: οἱ δὲ ἄλλοι μαθηταὶ τῷ πλοιαρίῳ ἦλθον, οὐ γὰρ ἦσαν μακρὰν ἀπὸ τῆς γῆς ἀλλὰ
    ὡς ἀπὸ πηχῶν διακοσίων, σύροντες τὸ δίκτυον τῶν ἰχθύων.
translation:
  text: But the other disciples came in the small boat, for they were not far from
    the land, but about two hundred cubits away, dragging the net full of fish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: About two hundred cubits is roughly 300 feet or 90 meters.
    reason: cultural_note
  - marker: b
    text: Or 'the net of fish.' The Greek expression may be rendered more literally,
      but here it likely means the net containing the fish.
    reason: lexical_alternative
  - marker: c
    text: Or 'shore' for 'land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ ἄλλοι μαθηταὶ
  chosen: But the other disciples
  alternatives:
  - Now the other disciples
  - And the other disciples
  lexicon: BDAG
  rationale: δέ is rendered adversatively/coordinating as 'But' to mark the contrast
    with Peter's separate action in the previous verse. ἄλλοι μαθηταί is straightforwardly
    'the other disciples.'
- source_word: τῷ πλοιαρίῳ
  chosen: in the small boat
  alternatives:
  - in the boat
  - by the little boat
  lexicon: BDAG
  rationale: πλοιάριον is a diminutive form, so 'small boat' preserves the nuance
    better than simply 'boat,' while remaining natural English.
- source_word: ἦλθον
  chosen: came
  alternatives:
  - arrived
  lexicon: BDAG
  rationale: Aorist of ἔρχομαι is naturally rendered 'came' in narrative sequence.
- source_word: οὐ γὰρ ἦσαν μακρὰν ἀπὸ τῆς γῆς
  chosen: for they were not far from the land
  alternatives:
  - for they were not far from shore
  - since they were not far from the land
  lexicon: BDAG
  rationale: γάρ gives the explanatory reason. γῆ here refers to the land/shore as
    opposed to the water. 'Land' is slightly more literal; 'shore' is a viable contextual
    alternative.
- source_word: ἀλλὰ ὡς ἀπὸ πηχῶν διακοσίων
  chosen: but about two hundred cubits away
  alternatives:
  - but only about two hundred cubits away
  - but about two hundred cubits from it
  lexicon: BDAG
  rationale: ὡς marks approximation, hence 'about.' πῆχυς is 'cubit,' an ancient measure;
    retaining it preserves the source-culture measurement rather than converting it
    in the main text.
- source_word: σύροντες
  chosen: dragging
  alternatives:
  - pulling
  - towing
  lexicon: BDAG
  rationale: The present participle conveys attendant action simultaneous with their
    coming. 'Dragging' best matches the physical effort implied by σύρω in this fishing
    context.
- source_word: τὸ δίκτυον τῶν ἰχθύων
  chosen: the net full of fish
  alternatives:
  - the net of fish
  - the net with the fish
  lexicon: BDAG
  rationale: 'The genitive τῶν ἰχθύων is most naturally understood here as content:
    the net containing fish. ''The net full of fish'' expresses the sense idiomatically
    in English without obscuring the image.'
