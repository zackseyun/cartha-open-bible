id: JHN.21.12
reference: John 21:12
source:
  edition: SBLGNT
  text: λέγει αὐτοῖς ὁ Ἰησοῦς· Δεῦτε ἀριστήσατε. οὐδεὶς ⸀δὲ ἐτόλμα τῶν μαθητῶν ἐξετάσαι
    αὐτόν· Σὺ τίς εἶ; εἰδότες ὅτι ὁ κύριός ἐστιν.
translation:
  text: Jesus said to them, “Come, eat breakfast.” But none of the disciples dared
    to ask him, “Who are you?” because they knew that it was the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “have breakfast.” The Greek verb refers specifically to the morning meal.
    reason: lexical_alternative
  - marker: b
    text: The verb translated “ask” can also carry the sense “question” or “examine
      closely.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Δεῦτε
  chosen: Come
  alternatives:
  - Come here
  lexicon: BDAG
  rationale: Imperatival invitation meaning 'come' or 'come here.' 'Come' is natural
    English and fits the direct summons.
- source_word: ἀριστήσατε
  chosen: eat breakfast
  alternatives:
  - have breakfast
  - eat
  lexicon: BDAG
  rationale: The verb refers specifically to taking the morning meal. 'Eat breakfast'
    preserves the temporal specificity better than the more generic 'eat.'
- source_word: οὐδεὶς δὲ
  chosen: But none
  alternatives:
  - And none
  - Now none
  lexicon: BDAG
  rationale: δέ here marks mild contrast or transition. 'But none' captures the shift
    from invitation to the disciples' restrained response in idiomatic English.
- source_word: ἐτόλμα
  chosen: dared
  alternatives:
  - was daring
  - ventured
  lexicon: BDAG
  rationale: Imperfect of τολμάω conveys willingness/courage. 'Dared' is the standard
    idiomatic rendering in this construction with infinitive.
- source_word: ἐξετάσαι
  chosen: to ask
  alternatives:
  - to question
  - to examine
  lexicon: BDAG
  rationale: Although the verb can mean 'examine' or 'question closely,' in this context
    with direct speech it means to put the question to him. 'Ask' is the clearest
    natural rendering; the stronger nuance is preserved in an alternative.
- source_word: Σὺ τίς εἶ;
  chosen: Who are you?
  alternatives:
  - You—who are you?
  lexicon: BDAG
  rationale: A direct identity question. English normally omits the explicit subject
    pronoun, though the Greek Σὺ adds emphasis; the standard English form communicates
    the sense naturally.
- source_word: εἰδότες ὅτι
  chosen: because they knew that
  alternatives:
  - knowing that
  - since they knew that
  lexicon: BDAG
  rationale: 'The participle is causal in context: they did not ask because they already
    knew. Rendering it with ''because'' makes the relationship explicit in natural
    English.'
- source_word: ὁ κύριός
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: κύριος is rendered by the doctrinal default 'Lord.' The article is retained
    in English because the clause identifies Jesus as 'the Lord' in this narrative
    setting.
