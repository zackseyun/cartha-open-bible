id: JHN.21.3
reference: John 21:3
source:
  edition: SBLGNT
  text: λέγει αὐτοῖς Σίμων Πέτρος· Ὑπάγω ἁλιεύειν· λέγουσιν αὐτῷ· Ἐρχόμεθα καὶ ἡμεῖς
    σὺν σοί. ἐξῆλθον καὶ ἐνέβησαν εἰς τὸ ⸀πλοῖον, καὶ ἐν ἐκείνῃ τῇ νυκτὶ ἐπίασαν οὐδέν.
translation:
  text: Simon Peter said to them, “I am going to fish.” They said to him, “We are
    also coming with you.” They went out and got into the boat, and that night they
    caught nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has the historical present ('Simon Peter says to them ... they say
      to him'), a common narrative feature often rendered in English with past tense.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, English narrative style
    normally renders it with a past tense here for natural readability while preserving
    the discourse function.
- source_word: Ὑπάγω
  chosen: I am going
  alternatives:
  - I am going away
  - I am leaving
  lexicon: BDAG
  rationale: In context the verb introduces Peter's intended action; 'I am going'
    is idiomatic English and fits the present tense with imminent force better than
    a wooden 'I go.'
- source_word: ἁλιεύειν
  chosen: to fish
  alternatives:
  - fishing
  - to go fishing
  lexicon: BDAG
  rationale: The infinitive expresses purpose/complement after Ὑπάγω. 'To fish' is
    concise and natural; 'to go fishing' would slightly overtranslate because the
    motion is already carried by Ὑπάγω.
- source_word: Ἐρχόμεθα καὶ ἡμεῖς σὺν σοί
  chosen: We are also coming with you
  alternatives:
  - We are coming too with you
  - We also are going with you
  lexicon: BDAG
  rationale: This preserves the emphatic καὶ ἡμεῖς ('we also/too') and the association
    marked by σύν. 'Coming with you' is the most direct rendering of Ἐρχόμεθα, even
    though English might also say 'going with you' from the speaker's perspective.
- source_word: ἐξῆλθον
  chosen: They went out
  alternatives:
  - They left
  - They departed
  lexicon: BDAG
  rationale: The verb literally denotes going out. 'They went out' preserves the narrative
    movement without unnecessary interpretation.
- source_word: ἐνέβησαν εἰς τὸ πλοῖον
  chosen: got into the boat
  alternatives:
  - boarded the boat
  - went into the boat
  lexicon: BDAG
  rationale: This is idiomatic English for embarking. 'Boat' is the normal rendering
    of πλοῖον in this fishing context.
- source_word: πλοῖον
  chosen: the boat
  alternatives:
  - the ship
  lexicon: BDAG
  rationale: In the Sea of Galilee fishing setting, 'boat' is contextually appropriate
    and avoids the misleading scale implied by 'ship.' The article likely refers to
    a known boat available to them.
- source_word: ἐν ἐκείνῃ τῇ νυκτί
  chosen: that night
  alternatives:
  - in that night
  - during that night
  lexicon: BDAG
  rationale: The dative temporal expression is best rendered idiomatically in English
    as 'that night.'
- source_word: ἐπίασαν οὐδέν
  chosen: they caught nothing
  alternatives:
  - they caught not one thing
  - they seized nothing
  lexicon: BDAG
  rationale: In fishing context πιάζω means 'catch.' 'Nothing' accurately renders
    οὐδέν and preserves the total lack of success.
