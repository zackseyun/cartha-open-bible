id: JHN.21.2
reference: John 21:2
source:
  edition: SBLGNT
  text: ἦσαν ὁμοῦ Σίμων Πέτρος καὶ Θωμᾶς ὁ λεγόμενος Δίδυμος καὶ Ναθαναὴλ ὁ ἀπὸ Κανὰ
    τῆς Γαλιλαίας καὶ οἱ τοῦ Ζεβεδαίου καὶ ἄλλοι ἐκ τῶν μαθητῶν αὐτοῦ δύο.
translation:
  text: Simon Peter, Thomas called Twin, Nathanael from Cana of Galilee, the sons
    of Zebedee, and two others of his disciples were together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Thomas called Didymus.'' ''Didymus'' is the Greek term meaning
      ''Twin.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦσαν
  chosen: were
  alternatives:
  - were present
  lexicon: BDAG
  rationale: Imperfect of εἰμί gives the simple past-state 'were'; English supplies
    the copula naturally in the list construction.
- source_word: ὁμοῦ
  chosen: together
  alternatives:
  - in the same place
  lexicon: BDAG
  rationale: ὁμοῦ denotes being together/in one place. 'Together' is the most natural
    concise English rendering and fits the narrative setting.
- source_word: Σίμων Πέτρος
  chosen: Simon Peter
  rationale: Standard English transliteration of the personal name and cognomen; names
    are transliterated per project philosophy.
- source_word: Θωμᾶς ὁ λεγόμενος Δίδυμος
  chosen: Thomas called Twin
  alternatives:
  - Thomas, who was called Didymus
  - Thomas called Didymus
  lexicon: BDAG
  rationale: λεγόμενος is naturally rendered 'called.' Δίδυμος means 'twin'; translating
    the epithet preserves meaning better than transliterating 'Didymus,' in keeping
    with the philosophy to translate meaningful titles/designations where appropriate
    while transliterating personal names.
- source_word: Ναθαναὴλ ὁ ἀπὸ Κανὰ τῆς Γαλιλαίας
  chosen: Nathanael from Cana of Galilee
  alternatives:
  - Nathanael, who was from Cana in Galilee
  lexicon: BDAG
  rationale: ἀπό with place of origin is well rendered 'from.' 'Cana of Galilee' preserves
    the familiar geographic designation closely.
- source_word: οἱ τοῦ Ζεβεδαίου
  chosen: the sons of Zebedee
  alternatives:
  - Zebedee's sons
  lexicon: BDAG
  rationale: This idiomatic genitive expression refers to Zebedee's sons. English
    requires supplying 'sons' for clarity; this is the standard and contextually certain
    sense.
- source_word: ἄλλοι ἐκ τῶν μαθητῶν αὐτοῦ δύο
  chosen: and two others of his disciples
  alternatives:
  - and two other disciples of his
  - and two others from among his disciples
  lexicon: BDAG
  rationale: ἄλλοι ... δύο places 'two' with 'others'; ἐκ τῶν μαθητῶν αὐτοῦ means
    'from among/of his disciples.' The chosen wording is natural English while preserving
    the partitive sense.
- source_word: καί ... καί
  chosen: comma-separated list with final 'and'
  alternatives:
  - repeating 'and' before each item
  rationale: The repeated καί marks coordination throughout the list. Standard English
    style smooths this into a comma-separated series with a final 'and' without loss
    of meaning.
