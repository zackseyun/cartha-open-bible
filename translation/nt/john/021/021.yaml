id: JHN.21.21
reference: John 21:21
source:
  edition: SBLGNT
  text: τοῦτον ⸀οὖν ἰδὼν ὁ Πέτρος λέγει τῷ Ἰησοῦ· Κύριε, οὗτος δὲ τί;
translation:
  text: So Peter[a], seeing him, says to Jesus, “Lord, and what about this man?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, “And what about him?” The Greek is elliptical: literally, “Lord, and this one—what?”'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτον
  chosen: him
  alternatives:
  - this man
  lexicon: BDAG
  rationale: Accusative demonstrative referring to the beloved disciple as the object of Peter’s seeing. English idiom prefers the pronoun 'him' after 'saw,' while the demonstrative force is retained later in Peter’s question.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative/logical continuation from the preceding exchange. 'So' is natural modern English and preserves the inferential flow without sounding overly formal.
- source_word: ἰδὼν
  chosen: when ... saw
  alternatives:
  - having seen
  - after seeing
  lexicon: BDAG
  rationale: Aorist participle contemporaneous/prior to the main verb. Rendered with a temporal clause for readable English while preserving the sequence of action.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Present-tense historical present in narrative. Retained as 'he says' to reflect Johannine vividness rather than flattening to a simple past.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος. Per doctrine defaults, κύριος is rendered 'Lord.' In direct address to Jesus this preserves both respect and the title’s theological weight.
- source_word: οὗτος δὲ τί;
  chosen: what about this man?
  alternatives:
  - and what about him?
  - but this one—what?
  lexicon: BDAG
  rationale: Elliptical Greek question asking about the other disciple’s situation or fate. 'What about this man?' makes the ellipsis intelligible in natural English while preserving Peter’s contrastive focus introduced by δέ and the demonstrative 'this one.'
