id: JHN.21.13
reference: John 21:13
source:
  edition: SBLGNT
  text: ⸀ἔρχεται ⸀ὁ Ἰησοῦς καὶ λαμβάνει τὸν ἄρτον καὶ δίδωσιν αὐτοῖς, καὶ τὸ ὀψάριον
    ὁμοίως.
translation:
  text: Jesus comes and takes the bread and gives it to them, and the fish likewise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came and took the bread and gave it to them.' The Greek uses historical
      presents.
    reason: lexical_alternative
  - marker: b
    text: Or 'and in the same way the fish.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρχεται
  chosen: comes
  alternatives:
  - came
  - approaches
  lexicon: BDAG
  rationale: Present-tense narrative verb is retained as a historical present ('comes')
    to reflect Johannine style rather than smoothing to English past tense.
- source_word: λαμβάνει
  chosen: takes
  alternatives:
  - receives
  lexicon: BDAG
  rationale: In context of distributing food already prepared, 'takes' best matches
    the simple action before giving it to the disciples.
- source_word: ἄρτον
  chosen: the bread
  alternatives:
  - bread
  - loaf
  lexicon: BDAG
  rationale: The article is represented with 'the bread,' referring to the specific
    bread present at the meal.
- source_word: δίδωσιν αὐτοῖς
  chosen: gives it to them
  alternatives:
  - gives to them
  - serves them
  lexicon: BDAG
  rationale: English idiom naturally supplies the object pronoun 'it' from the immediately
    preceding 'bread.' 'Serves them' is interpretive and therefore avoided in the
    main text.
- source_word: ὀψάριον
  chosen: the fish
  alternatives:
  - the cooked fish
  - the relish
  lexicon: BDAG
  rationale: In Johannine context this word refers to fish as food. 'The fish' is
    the clearest natural rendering; more specific options like 'cooked fish' are possible
    but not required by the word itself.
- source_word: ὁμοίως
  chosen: likewise
  alternatives:
  - in the same way
  - also
  lexicon: BDAG
  rationale: This adverb indicates that Jesus did with the fish what he had just done
    with the bread. 'Likewise' preserves the concise parallelism of the Greek.
