- issue: Narrative present verbs in resurrection appearance context
  chosen_reading: Retain the historical present ('comes ... takes ... gives')
  alternative_readings:
  - Convert to simple past for smoother English ('came ... took ... gave')
  rationale: This is a translational rather than doctrinal decision, but preserving
    the historical present better reflects the Greek narrative texture without altering
    meaning.
  doctrine_reference: Translation philosophy §1, §6
