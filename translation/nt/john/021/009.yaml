id: JHN.21.9
reference: John 21:9
source:
  edition: SBLGNT
  text: Ὡς οὖν ἀπέβησαν εἰς τὴν γῆν βλέπουσιν ἀνθρακιὰν κειμένην καὶ ὀψάριον ἐπικείμενον
    καὶ ἄρτον.
translation:
  text: So when they got out onto the land, they saw a charcoal fire laid there, and
    fish lying on it, and bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they came ashore.' The Greek more literally says 'they got out onto
      the land.'
    reason: lexical_alternative
  - marker: b
    text: '''Charcoal fire'' translates a term also used in John 18:18, linking this
      scene verbally with Peter''s earlier denial setting.'
    reason: cross_reference
lexical_decisions:
- source_word: Ὡς οὖν
  chosen: So when
  alternatives:
  - Then when
  - Therefore when
  - As soon as
  lexicon: BDAG
  rationale: Combines the temporal force of Ὡς with the connective/inferential flow
    of οὖν in natural English. 'So when' preserves narrative continuity without sounding
    wooden.
- source_word: ἀπέβησαν εἰς τὴν γῆν
  chosen: they got out onto the land
  alternatives:
  - they came ashore
  - they disembarked onto the shore
  - they stepped onto the land
  lexicon: BDAG
  rationale: ἀποβαίνω with εἰς τὴν γῆν refers to coming out of the boat onto land.
    'Got out onto the land' stays close to the Greek imagery. 'Came ashore' is idiomatic
    but slightly more interpretive because γῆ is 'land' rather than specifically 'shore'.
- source_word: βλέπουσιν
  chosen: they saw
  alternatives:
  - they see
  - they noticed
  lexicon: BDAG
  rationale: The present-tense form functions as a historical present in narrative.
    English normally renders this with a simple past for readability in optimal equivalence.
- source_word: ἀνθρακιὰν
  chosen: a charcoal fire
  alternatives:
  - a bed of coals
  - a charcoal brazier
  lexicon: BDAG
  rationale: ἀνθρακιά denotes a charcoal fire or bed of burning coals. 'Charcoal fire'
    is the clearest and most idiomatic rendering in this context and preserves the
    verbal link with John 18:18.
- source_word: κειμένην
  chosen: laid there
  alternatives:
  - lying there
  - set there
  - placed there
  lexicon: BDAG
  rationale: The participle describes the charcoal fire as being present/laid in place.
    'Laid there' fits a fire better than 'lying there' in English and avoids awkwardness
    while preserving the stative sense.
- source_word: ὀψάριον
  chosen: fish
  alternatives:
  - a fish
  - cooked fish
  - relish
  lexicon: BDAG
  rationale: ὀψάριον in Johannine usage refers naturally to fish as food. Although
    singular in form, it can function collectively; 'fish' in English captures this
    without forcing singularity. 'Cooked fish' is possible from context but not explicit
    in the noun itself.
- source_word: ἐπικείμενον
  chosen: lying on it
  alternatives:
  - placed on it
  - lying thereon
  - set on it
  lexicon: BDAG
  rationale: The participle indicates the fish was lying upon the charcoal fire. Rendering
    the implicit object as 'it' makes the relation clear in English.
- source_word: ἄρτον
  chosen: bread
  alternatives:
  - a loaf of bread
  - loaf
  lexicon: BDAG
  rationale: ἄρτος commonly means bread or a loaf. 'Bread' is the most natural unmarked
    rendering here and does not over-specify number or form.
