- issue: Narrative historical present
  chosen_reading: Render βλέπουσιν as English past tense ('they saw')
  alternative_readings:
  - 'Retain vivid present: ''they see'''
  rationale: This is a stylistic narrative feature rather than a theological issue,
    but the choice affects translation philosophy. Optimal equivalence favors natural
    English past tense while preserving the event sequence.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic'
