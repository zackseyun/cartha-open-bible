theological_decisions:
- issue: Whether to encode a sharp distinction between φιλέω and ἀγαπάω in Jesus'
    and Peter's exchange
  chosen_reading: Render φιλέω as 'love' without implying a different kind of love
    in the main text
  alternative_readings:
  - Render with differentiated English such as 'love' vs. 'be fond of'
  - Treat the alternation as theologically significant in the translation itself
  rationale: The passage has generated extensive theological interpretation based
    on alternation between φιλέω and ἀγαπάω, but the semantic distinction in Koine
    usage is not stable enough to force into English here. Preserving the wording
    as 'love' maintains the text's gravity while avoiding doctrinal over-resolution.
    The possible nuance is preserved in a footnote rather than made determinative
    in the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it; §5: Consistency of key terms, or documented exception.'
- issue: Force of Peter's confession 'you know all things'
  chosen_reading: Translate straightforwardly as a strong statement of Jesus' comprehensive
    knowledge within the discourse
  alternative_readings:
  - Soften to 'you know everything about this'
  - Treat as an explicit doctrinal assertion of omniscience in the translation wording
  rationale: The Greek plainly says 'you know all things.' The translation should
    preserve the strength of Peter's statement without expanding it into a doctrinal
    gloss. Historic orthodoxy is compatible with the statement, but the verse itself
    should speak in its own terms.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3.
