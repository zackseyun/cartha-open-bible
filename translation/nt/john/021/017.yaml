id: JHN.21.17
reference: John 21:17
source:
  edition: SBLGNT
  text: λέγει αὐτῷ τὸ τρίτον· Σίμων ⸀Ἰωάννου, φιλεῖς με; ἐλυπήθη ὁ Πέτρος ὅτι εἶπεν
    αὐτῷ τὸ τρίτον· Φιλεῖς με; καὶ ⸀εἶπεν αὐτῷ· Κύριε, ⸂πάντα σὺ⸃ οἶδας, σὺ γινώσκεις
    ὅτι φιλῶ σε. λέγει αὐτῷ ⸀ὁ Ἰησοῦς· Βόσκε τὰ ⸀πρόβατά μου.
translation:
  text: He said to him the third time, “Simon, son of John, do you love me?” Peter
    was grieved because he said to him the third time, “Do you love me?” And he said
    to him, “Lord, you know all things; you know that I love you.” Jesus said to him,
    “Feed my sheep.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek uses φιλέω here ('love, have affection for') where earlier in
      the exchange Jesus had used ἀγαπάω in two questions. Some interpreters see a
      meaningful distinction; others regard the verbs as overlapping in this context.
      The translation preserves the exchange with 'love' and does not force a sharper
      contrast than the Greek clearly requires.
    reason: lexical_alternative
  - marker: b
    text: 'Greek uses two verbs for ''know'' in Peter''s reply: οἶδα and γινώσκω.
      English normally renders both as ''know'' here; the repetition may suggest nuance,
      but not one that can be expressed naturally without over-interpretation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ τρίτον
  chosen: the third time
  alternatives:
  - a third time
  - for the third time
  lexicon: BDAG
  rationale: Idiomatic temporal accusative; 'the third time' is natural English and
    preserves the repeated questioning motif.
- source_word: Σίμων Ἰωάννου
  chosen: Simon, son of John
  alternatives:
  - Simon John’s son
  - Simon, son of Jonah
  lexicon: BDAG
  rationale: The genitive Ἰωάννου is most naturally patronymic, hence 'son of John.'
    'Son of Jonah' reflects a different traditional form from other passages, not
    this Greek reading.
- source_word: φιλεῖς / φιλῶ
  chosen: love / love
  alternatives:
  - care for / care for
  - be fond of / love
  lexicon: BDAG
  rationale: φιλέω commonly denotes love/affection. In English, 'love' best preserves
    the solemn relational force of the exchange. Although some interpreters distinguish
    φιλέω from ἀγαπάω in this context, the difference is debated and should not be
    overstated in translation; the lexical variation is better noted in a footnote
    than encoded as different English verbs.
- source_word: ἐλυπήθη
  chosen: was grieved
  alternatives:
  - was saddened
  - was hurt
  lexicon: BDAG
  rationale: The passive conveys Peter's sorrow/distress. 'Was grieved' is both natural
    and weightier than 'was saddened,' fitting the emotional force of the scene.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  - Master
  lexicon: BDAG
  rationale: Per doctrine default for κύριος, 'Lord' is preferred. In Johannine context
    and in Peter's address to the risen Jesus, this carries more than mere politeness.
- source_word: πάντα σὺ οἶδας
  chosen: you know all things
  alternatives:
  - you know everything
  - all things you know
  lexicon: BDAG
  rationale: '''All things'' preserves the breadth and solemnity of πάντα while remaining
    clear in English. The fronted σὺ is reflected by explicit ''you'' without awkward
    inversion.'
- source_word: οἶδας ... γινώσκεις
  chosen: you know ... you know
  alternatives:
  - you know ... you understand
  - you know ... you recognize
  lexicon: BDAG
  rationale: Both verbs concern knowing, though with different nuances. English normally
    uses 'know' for both here; forcing a distinction would over-interpret the contrast.
    The repetition is preserved, and the possible nuance is noted in a footnote.
- source_word: Βόσκε
  chosen: Feed
  alternatives:
  - Tend
  - Shepherd
  lexicon: BDAG
  rationale: βόσκω specifically means to feed/provide pasture, distinct from ποιμαίνω
    ('shepherd/tend'). 'Feed' preserves that specificity.
- source_word: πρόβατά
  chosen: sheep
  alternatives:
  - lambs
  - flock
  lexicon: BDAG
  rationale: πρόβατα are sheep, not specifically lambs (contrast ἀρνία in v. 15).
    'Sheep' preserves the lexical distinction across the passage.
