id: JHN.15.12
reference: John 15:12
source:
  edition: SBLGNT
  text: Αὕτη ἐστὶν ἡ ἐντολὴ ἡ ἐμὴ ἵνα ἀγαπᾶτε ἀλλήλους καθὼς ἠγάπησα ὑμᾶς·
translation:
  text: 'This is my command: that you love one another just as I have loved you[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''This is my commandment: that you love one another as I loved you.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Αὕτη
  chosen: This
  alternatives:
  - This is
  lexicon: BDAG
  rationale: Demonstrative pronoun introducing and identifying the specific command Jesus is about to restate. English 'This' naturally carries the deictic force.
- source_word: ἐντολή
  chosen: command
  alternatives:
  - commandment
  lexicon: BDAG
  rationale: '''Command'' is the clearest modern English equivalent and preserves the authoritative force of ἐντολή without the archaic feel of ''commandment.'''
- source_word: ἡ ἐμὴ
  chosen: my
  alternatives:
  - mine
  lexicon: BDAG
  rationale: The possessive adjective is idiomatically rendered 'my' in English. The construction emphasizes that this command belongs to Jesus and comes with his authority.
- source_word: ἵνα
  chosen: that
  alternatives:
  - so that
  - namely that
  lexicon: BDAG
  rationale: 'Here ἵνα introduces the content of the command rather than a mere purpose clause. ''That'' best reflects the sense in smooth English: ''This is my command: that you...''.'
- source_word: ἀγαπᾶτε
  chosen: love
  alternatives:
  - keep loving
  lexicon: BDAG
  rationale: From ἀγαπάω, rendered with the default cognate 'love' per doctrine. The present subjunctive in this context expresses the commanded pattern of action; English simple present 'love' communicates this naturally without overtranslating aspect.
- source_word: ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: Standard reciprocal rendering. 'One another' fits the elevated but still natural tone of the discourse.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - in the same way as
  lexicon: BDAG
  rationale: Marks comparison and pattern. 'Just as' clearly signals that Jesus' love is the model and measure for the disciples' love.
- source_word: ἠγάπησα
  chosen: I have loved
  alternatives:
  - I loved
  lexicon: BDAG
  rationale: The aorist refers to Jesus' prior and defining love for the disciples. English present perfect 'I have loved' idiomatically conveys a past action with present relevance in this discourse context better than the simple past, while preserving the comparison.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Direct object referring to the disciples collectively.
