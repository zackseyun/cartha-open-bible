  rationale: The doctrine excerpt specifies 'love' as the default rendering for ἀγάπη and its cognates. Using the cognate 'love' here preserves lexical continuity within the passage and avoids archaic English.
  doctrine_reference: 'DOCTRINE.md Contested terms: ἀγάπη → love'
