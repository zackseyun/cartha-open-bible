id: JHN.12.49
reference: John 12:49
source:
  edition: SBLGNT
  text: ὅτι ἐγὼ ἐξ ἐμαυτοῦ οὐκ ἐλάλησα, ἀλλ’ ὁ πέμψας με πατὴρ αὐτός μοι ἐντολὴν ⸀δέδωκεν τί εἴπω καὶ τί λαλήσω.
translation:
  text: For I have not spoken from myself[b][a], but the Father who sent me has himself given me a command as to what I should say and what I should speak.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on my own' or 'from my own authority.'
    reason: lexical_alternative
  - marker: b
    text: The Greek uses two different verbs, 'say' and 'speak'; the translation preserves the distinction.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξ ἐμαυτοῦ
  chosen: from myself
  alternatives:
  - on my own
  - from my own authority
  lexicon: BDAG
  rationale: A fairly literal rendering preserves the idiom and the theological point that Jesus is not acting independently. 'On my own' is idiomatic English, and 'from my own authority' is interpretive; the main text keeps the source expression while remaining understandable.
- source_word: ἐλάλησα
  chosen: have not spoken
  alternatives:
  - did not speak
  lexicon: BDAG
  rationale: Rendered with English present perfect to fit the discourse context and natural English, even though the Greek aorist is formally past. This conveys Jesus' statement about the character of his speaking/ministry up to this point.
- source_word: ὁ πέμψας με πατὴρ
  chosen: the Father who sent me
  alternatives:
  - the Father, the one who sent me
  - my sending Father
  lexicon: BDAG
  rationale: This smoothly renders the substantival participle with apposition to πατήρ. Capitalizing 'Father' reflects its use as a divine title in context.
- source_word: αὐτός
  chosen: has himself given
  alternatives:
  - he himself has given
  - has given
  lexicon: BDAG
  rationale: The pronoun is emphatic and should be represented. Placing 'himself' with the verb preserves the emphasis without awkward English word order.
- source_word: ἐντολήν
  chosen: a command
  alternatives:
  - commandment
  - instruction
  lexicon: BDAG
  rationale: '''Command'' is the most natural modern English equivalent here. ''Commandment'' sounds more traditional and can suggest a fixed law code; ''instruction'' is possible but weakens the authoritative force of the term.'
- source_word: δέδωκεν
  chosen: has ... given
  alternatives:
  - gave
  lexicon: BDAG
  rationale: The Greek perfect is best reflected by English present perfect, indicating a command given with continuing relevance.
- source_word: τί εἴπω
  chosen: what I should say
  alternatives:
  - what I may say
  - what I am to say
  lexicon: BDAG
  rationale: The deliberative/indirect-question construction after 'command' is naturally rendered in English as 'what I should say.' This communicates content under directive force.
- source_word: καὶ τί λαλήσω
  chosen: and what I should speak
  alternatives:
  - and what I should say
  - and how I should speak
  lexicon: BDAG
  rationale: The Greek uses both λέγω and λαλέω; preserving some distinction avoids flattening the wording. 'Speak' keeps the second verb visible, even if English style becomes slightly repetitive.
