theological_decisions:
- issue: Relation of the Son's speech to the Father's command
  chosen_reading: The wording preserves that Jesus does not speak independently but under the Father's commission, without implying inferiority of nature.
  alternative_readings:
  - Jesus speaks merely as a human prophet with no stronger Father-Son implication
  - Jesus acts independently but in agreement with the Father
  rationale: The verse explicitly states dependence in mission and speech ('not from myself' and 'the Father ... has given me a command'). The translation preserves this economic relation while avoiding wording that would suggest denial of Nicene/Chalcedonian orthodoxy.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Definition of Chalcedon (451 AD)'
- issue: Rendering of πατήρ
  chosen_reading: Father
  alternative_readings:
  - father
  rationale: Capitalized as a divine title referring to God in Johannine context. This is a contextual/theological title, not merely a generic familial reference.
  doctrine_reference: 'Affirmations: historic ecumenical Christian orthodoxy'
