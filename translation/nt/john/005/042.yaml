id: JHN.5.42
reference: John 5:42
source:
  edition: SBLGNT
  text: ἀλλὰ ἔγνωκα ὑμᾶς ὅτι τὴν ἀγάπην τοῦ θεοῦ οὐκ ἔχετε ἐν ἑαυτοῖς.
translation:
  text: 'But I know you: you do not have the love of God in yourselves.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'you do not have love for God in yourselves.' The Greek can also be understood more broadly as 'the love that comes from God' or 'God's love.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - rather
  - however
  lexicon: BDAG
  rationale: Marks a strong contrast with the preceding context; 'But' is the most natural concise English adversative here.
- source_word: ἔγνωκα
  chosen: I know
  alternatives:
  - I have known
  - I have come to know
  lexicon: BDAG
  rationale: Perfect of γινώσκω conveys a settled knowledge resulting from prior acquaintance. In idiomatic English, present 'I know' best communicates the stative force without awkwardness.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Direct object of 'I know'; plural is clear from context though not separately marked in English.
- source_word: ὅτι
  chosen: ': you do not have'
  alternatives:
  - that you do not have
  lexicon: BDAG
  rationale: Introduces the content of what Jesus knows about them. A colon in English preserves the sense naturally and avoids stiffness, while the clause itself carries the meaning of ὅτι.
- source_word: τὴν ἀγάπην
  chosen: the love
  alternatives:
  - love
  lexicon: BDAG
  rationale: ἀγάπη is rendered by the default 'love' per doctrine. The article is retained as 'the love' because the Greek phrase is definite and points to a specific kind or quality of love.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - for God
  - God's
  lexicon: BDAG
  rationale: The genitive is formally 'of God.' It may denote love directed toward God or love that comes from/characterizes God. To preserve the theological tension rather than over-resolve it, the more literal 'of God' is kept in the main text, with the directional alternative preserved in a footnote.
- source_word: οὐκ ἔχετε
  chosen: you do not have
  alternatives:
  - you have not
  lexicon: BDAG
  rationale: Straightforward present negated verb; present English best matches the ongoing state described.
- source_word: ἐν ἑαυτοῖς
  chosen: in yourselves
  alternatives:
  - within yourselves
  - among yourselves
  lexicon: BDAG
  rationale: Reflexive plural with ἐν most naturally means an inward possession or presence. 'In yourselves' is both literal and clear.
