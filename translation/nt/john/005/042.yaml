theological_decisions:
- issue: Meaning of the genitive in 'the love of God'
  chosen_reading: Kept as 'the love of God' in the main text without specifying whether it means love for God or God's love.
  alternative_readings:
  - love for God
  - God's love
  rationale: The Greek genitive τοῦ θεοῦ is ambiguous. The context strongly supports their lack of genuine love directed toward God, but the Greek wording itself can also be heard more broadly. In keeping with the doctrine's instruction to preserve theological tension where the source is genuinely ambiguous, the main text retains the ambiguity and the likely interpretive alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3, Preserve theological tension rather than resolve it.'
