theological_decisions:
- issue: Whether κρίσεως should be rendered more narrowly as 'condemnation' or more broadly as 'judgment'
  chosen_reading: judgment
  alternative_readings:
  - condemnation
  rationale: The verse contrasts two resurrections, but κρίσις itself does not require the narrower gloss 'condemnation.' Rendering it as 'judgment' avoids importing a more specific doctrinal conclusion than the Greek states, while still allowing the solemn negative outcome to stand in context.
  doctrine_reference: Preserve theological tension rather than resolve it.
