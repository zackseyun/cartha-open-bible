id: JHN.9.10
reference: John 9:10
source:
  edition: SBLGNT
  text: ἔλεγον οὖν αὐτῷ· ⸀Πῶς ἠνεῴχθησάν σου οἱ ὀφθαλμοί;
translation:
  text: So they said to him, “How were your eyes opened?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “How did your eyes come to be opened?” The Greek keeps the passive form.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  chosen: they were saying
  alternatives:
  - they said
  - they kept saying
  lexicon: BDAG
  rationale: Imperfect active indicative, third plural, from λέγω. The imperfect suggests
    ongoing or repeated speech in the narrative. 'They were saying' preserves that
    aspect more transparently than the simple past 'they said,' while remaining natural
    English.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: οὖν marks inference or narrative continuation. 'So' is natural modern
    English and preserves the connective force without sounding overly formal like
    'therefore.' 'Then' is possible but can weaken the inferential nuance.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Dative pronoun indicating the indirect object of speech. 'To him' is
    the straightforward and contextually precise rendering.
- source_word: Πῶς
  chosen: How
  alternatives:
  - in what way
  lexicon: BDAG
  rationale: Interrogative adverb asking about manner. 'How' is the direct and idiomatic
    English equivalent.
- source_word: ἠνεῴχθησάν
  chosen: were opened
  alternatives:
  - have been opened
  - came to be opened
  lexicon: BDAG
  rationale: 'Aorist passive indicative, third plural, from ἀνοίγω. The passive should
    be preserved: the eyes ''were opened,'' not simply ''opened.'' English naturally
    uses the passive here. The aorist is best represented by simple past in this narrative
    context.'
- source_word: σου
  chosen: your
  lexicon: BDAG
  rationale: Genitive second-person singular pronoun modifying 'eyes.' English expresses
    this possessive relation with 'your.'
- source_word: οἱ ὀφθαλμοί
  chosen: eyes
  alternatives:
  - the eyes
  lexicon: BDAG
  rationale: 'The Greek includes the article, but English idiom normally omits it
    in a possessive construction: ''your eyes,'' not ''the eyes of you'' or ''your
    the eyes.'' ''Eyes'' is the natural equivalent of ὀφθαλμοί.'
