id: JHN.9.15
reference: John 9:15
source:
  edition: SBLGNT
  text: πάλιν οὖν ἠρώτων αὐτὸν καὶ οἱ Φαρισαῖοι πῶς ἀνέβλεψεν. ὁ δὲ εἶπεν αὐτοῖς·
    Πηλὸν ἐπέθηκέν μου ἐπὶ τοὺς ὀφθαλμούς, καὶ ἐνιψάμην, καὶ βλέπω.
translation:
  text: So the Pharisees also asked him again how he had received his sight. He said
    to them, “He put mud on my eyes, and I washed, and I see.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “clay” instead of “mud.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “how he saw again” or “how he regained sight.”
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Marks repetition of the questioning; 'again' is the most natural concise
    English equivalent.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Signals narrative continuation/inference from the prior scene. 'So' reads
    naturally in modern English without overstating logical force.
- source_word: ἠρώτων
  chosen: asked
  alternatives:
  - were asking
  - questioned
  lexicon: BDAG
  rationale: Imperfect verb indicates ongoing/repeated questioning. English can convey
    this adequately with 'asked' plus 'again'; 'were asking' is possible but less
    idiomatic here.
- source_word: καὶ οἱ Φαρισαῖοι
  chosen: the Pharisees also
  alternatives:
  - also the Pharisees
  - the Pharisees too
  lexicon: BDAG
  rationale: The καί links the Pharisees into the sequence of questioners. 'Also'
    is placed for natural English emphasis.
- source_word: πῶς ἀνέβλεψεν
  chosen: how he had received his sight
  alternatives:
  - how he came to see
  - how he regained sight
  - how he saw again
  lexicon: BDAG
  rationale: ἀναβλέπω in this healing context means to gain/regain sight, not merely
    'look up.' 'Had received his sight' is idiomatic English and fits the context
    of a formerly blind man.
- source_word: Πηλὸν
  chosen: mud
  alternatives:
  - clay
  lexicon: BDAG
  rationale: πηλός denotes mud/clay. 'Mud' is more natural and immediately understandable
    in modern English, while still accurate to the substance described.
- source_word: ἐπέθηκέν μου ἐπὶ τοὺς ὀφθαλμούς
  chosen: He put mud on my eyes
  alternatives:
  - He placed mud on my eyes
  lexicon: BDAG
  rationale: The verb ἐπιτίθημι with ἐπί + accusative indicates placing something
    on something. 'Put ... on' is the clearest modern rendering.
- source_word: ἐνιψάμην
  chosen: I washed
  alternatives:
  - I washed myself
  lexicon: BDAG
  rationale: Aorist middle of νίπτω can be rendered simply 'I washed' in English;
    the reflexive nuance is not necessary to state explicitly.
- source_word: βλέπω
  chosen: I see
  alternatives:
  - I can see
  lexicon: BDAG
  rationale: Present tense expresses the man's current state/result. 'I see' preserves
    the vivid immediacy of the Greek better than the slightly more interpretive 'I
    can see'.
