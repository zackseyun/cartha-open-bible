  chosen_reading: historical idiom meaning 'from of old' / 'never in recorded memory'
  alternative_readings:
  - from eternity
  - since the world began
  rationale: The speaker is making a claim about human experience and precedent, not a metaphysical statement about eternity. The translation preserves the rhetorical force without overstating the temporal scope.
