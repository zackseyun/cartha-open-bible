theological_decisions:
- issue: Scope of ἐκ τοῦ αἰῶνος
  chosen_reading: historical idiom meaning 'from of old' / 'never in recorded memory'
  alternative_readings:
  - from eternity
  - since the world began
  rationale: The speaker is making a claim about human experience and precedent, not
    a metaphysical statement about eternity. The translation preserves the rhetorical
    force without overstating the temporal scope.
  doctrine_reference: Translation philosophy §1, §3
