id: JHN.9.32
reference: John 9:32
source:
  edition: SBLGNT
  text: ἐκ τοῦ αἰῶνος οὐκ ἠκούσθη ὅτι ἠνέῳξέν τις ὀφθαλμοὺς τυφλοῦ γεγεννημένου·
translation:
  text: From of old it has never been heard that anyone opened the eyes of a man born
    blind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Since the world began it has never been heard …”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ τοῦ αἰῶνος
  chosen: From of old
  alternatives:
  - Since the world began
  - From eternity
  - Never before
  lexicon: BDAG
  rationale: The idiom literally means 'from the age,' functioning adverbially to
    indicate the whole span of remembered history. 'From of old' preserves the historical
    sense without importing the stronger metaphysical sense 'from eternity.' 'Since
    the world began' is traditional but slightly interpretive.
- source_word: οὐκ ἠκούσθη
  chosen: it has never been heard
  alternatives:
  - it was never heard
  - no one has ever heard
  lexicon: BDAG
  rationale: 'The aorist passive is idiomatic here for reported precedent: something
    has never been heard of. The English present perfect best conveys the force in
    natural modern English while retaining the passive idea.'
- source_word: ὅτι
  chosen: that
  alternatives:
  - of how
  - that ever
  lexicon: BDAG
  rationale: Introduces the content of what has not been heard. Simple 'that' is sufficient
    and closest to the Greek construction.
- source_word: ἠνέῳξέν
  chosen: opened
  alternatives:
  - has opened
  - restored
  lexicon: BDAG
  rationale: ἀνοίγω with 'eyes' is the standard expression 'open the eyes.' 'Restored'
    would overinterpret the miracle language beyond the lexical value of the verb.
- source_word: τις
  chosen: anyone
  alternatives:
  - someone
  - a person
  lexicon: BDAG
  rationale: Indefinite subject in a general claim. 'Anyone' fits the universal negative
    context better than 'someone' in English.
- source_word: ὀφθαλμοὺς
  chosen: the eyes
  alternatives:
  - eyes
  lexicon: BDAG
  rationale: The article is naturally represented in English as 'the eyes' in this
    idiom.
- source_word: τυφλοῦ γεγεννημένου
  chosen: of a man born blind
  alternatives:
  - of one born blind
  - of a blind man from birth
  lexicon: BDAG
  rationale: The genitive phrase modifies 'eyes' and describes the person as blind
    from birth. 'A man born blind' is idiomatic, clear, and reflects the masculine
    singular form without forcing an awkwardly literal construction.
