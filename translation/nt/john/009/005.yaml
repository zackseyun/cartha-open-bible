id: JHN.9.5
reference: John 9:5
source:
  edition: SBLGNT
  text: ὅταν ἐν τῷ κόσμῳ ὦ, φῶς εἰμι τοῦ κόσμου.
translation:
  text: Whenever I am in the world[a], I am the light of the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When I am in the world'; the Greek conjunction can be rendered 'when,' 'whenever,' or, in context, 'while.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  chosen: While
  alternatives:
  - When
  - Whenever
  lexicon: BDAG
  rationale: Introduces a temporal clause with the subjunctive ὦ. In this context, 'While' best conveys the durative sense tied to Jesus' present earthly presence, rather than a merely punctiliar 'When' or iterative 'Whenever'.
- source_word: ἐν τῷ κόσμῳ
  chosen: in the world
  alternatives:
  - among the world
  - in the cosmos
  lexicon: BDAG
  rationale: Standard locative sense of ἐν with κόσμος. 'World' is the natural and established English equivalent here, referring to the human world/order into which Jesus has come.
- source_word: ὦ
  chosen: I am
  alternatives:
  - I may be
  lexicon: BDAG
  rationale: 'Although formally subjunctive, in English the clause is most naturally rendered with the present indicative after a temporal conjunction: ''while I am.'' Rendering ''may be'' would sound unnatural and overstate modal force not intended in context.'
- source_word: φῶς
  chosen: the light
  alternatives:
  - light
  lexicon: BDAG
  rationale: 'Predicate nominative identifying Jesus'' role. English idiom strongly prefers the article here in this Johannine self-declaration: ''the light of the world.'' The article is not present before φῶς in Greek, but the construction is definite in sense.'
- source_word: εἰμι
  chosen: I am
  alternatives:
  - I am indeed
  lexicon: BDAG
  rationale: Simple copula in a solemn self-identification formula. 'I am' preserves both the straightforward predication and the resonance of Johannine self-revelation without adding emphasis not explicit in the Greek.
- source_word: τοῦ κόσμου
  chosen: of the world
  alternatives:
  - for the world
  lexicon: BDAG
  rationale: Genitive most naturally rendered as 'of the world,' expressing the sphere to which Jesus is the light. 'For the world' would shift the relation from identification to benefit and is less precise.
