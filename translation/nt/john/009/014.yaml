theological_decisions:
- issue: Sabbath reference in relation to Jesus' healing
  chosen_reading: Translate the temporal notice straightforwardly without adding interpretive
    comment about Sabbath law or controversy.
  alternative_readings:
  - Render more explicitly as 'Now the day on which Jesus had made the mud and opened
    his eyes was a Sabbath day'
  rationale: The verse itself supplies a narrative fact that sets up the ensuing dispute;
    it should not be expanded into doctrinal or polemical explanation. The translation
    preserves the temporal emphasis and the concrete actions of Jesus.
  doctrine_reference: Preserve theological tension rather than resolve it.
