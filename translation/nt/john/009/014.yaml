id: JHN.9.14
reference: John 9:14
source:
  edition: SBLGNT
  text: ἦν δὲ σάββατον ⸂ἐν ᾗ ἡμέρᾳ⸃ τὸν πηλὸν ἐποίησεν ὁ Ἰησοῦς καὶ ἀνέῳξεν αὐτοῦ
    τοὺς ὀφθαλμούς.
translation:
  text: Now it was the Sabbath on the day when Jesus made the mud and opened his eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clay' for 'mud.'
    reason: lexical_alternative
  - marker: b
    text: 'Greek: ''opened his eyes,'' a concrete expression for the healing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σάββατον
  chosen: a Sabbath
  alternatives:
  - the Sabbath
  - Sabbath
  lexicon: BDAG
  rationale: Anarthrous predicate nominative after ἦν; English idiom can take either
    'it was Sabbath' or 'it was a Sabbath day.' 'A Sabbath' preserves the calendrical
    sense without overformal wording. The point is that the event occurred on a Sabbath
    day.
- source_word: ἐν ᾗ ἡμέρᾳ
  chosen: on the day when
  alternatives:
  - on the day in which
  - the day when
  lexicon: BDAG
  rationale: The prepositional relative phrase is naturally rendered idiomatically
    in English as 'on the day when,' preserving temporal reference without wooden
    phrasing.
- source_word: πηλός
  chosen: mud
  alternatives:
  - clay
  - mud paste
  lexicon: BDAG
  rationale: In context of saliva mixed with earth and applied to eyes (cf. surrounding
    narrative), 'mud' is the most natural modern English term. 'Clay' is possible
    but sounds more technical and less idiomatic here.
- source_word: ἐποίησεν
  chosen: made
  alternatives:
  - formed
  - prepared
  lexicon: BDAG
  rationale: The common verb ποιέω here simply denotes making the mud. 'Made' is the
    plain and sufficient rendering.
- source_word: ἀνέῳξεν
  chosen: opened
  alternatives:
  - opened up
  - restored
  lexicon: BDAG
  rationale: The verb ἀνοίγω literally means 'open.' In this healing context it refers
    to opening the blind man's eyes; retaining the concrete expression matches Johannine
    style better than interpretive 'restored [his sight].'
- source_word: αὐτοῦ τοὺς ὀφθαλμούς
  chosen: his eyes
  alternatives:
  - the man's eyes
  - his sight
  lexicon: BDAG
  rationale: The genitive pronoun plus accusative noun is straightforwardly 'his eyes.'
    This keeps the concrete bodily reference explicit rather than abstracting to 'his
    sight.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  - ''
  lexicon: BDAG
  rationale: δέ marks a mild narrative transition. 'Now' conveys the discourse shift
    naturally in English better than a stronger adversative.
