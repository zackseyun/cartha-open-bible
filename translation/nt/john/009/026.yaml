id: JHN.9.26
reference: John 9:26
source:
  edition: SBLGNT
  text: εἶπον ⸂οὖν αὐτῷ⸃· Τί ἐποίησέν σοι; πῶς ἤνοιξέν σου τοὺς ὀφθαλμούς;
translation:
  text: So they said to him, “What did he do to you? How did he open your eyes?”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἶπον
  chosen: they said
  alternatives:
  - they asked
  - they told
  lexicon: BDAG
  rationale: Aorist of λέγω here introduces direct speech by the group questioning
    the healed man. 'They said' is the most straightforward rendering; 'asked' is
    possible by context, but the Greek verb itself is the common 'say' rather than
    a more specific verb of asking.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: οὖν marks discourse continuation/inference. 'So' gives natural modern
    English while preserving the connective force better than omitting it. 'Then'
    is possible but is more purely temporal than the context requires.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Dative indirect object referring to the man born blind; standard rendering
    is 'to him'.
- source_word: Τί
  chosen: What
  lexicon: BDAG
  rationale: Interrogative pronoun introducing the first question; 'What' is direct
    and exact.
- source_word: ἐποίησέν σοι
  chosen: did he do to you
  alternatives:
  - did he do for you
  - made for you
  lexicon: BDAG
  rationale: ποιέω with dative here means 'do to/for.' In this hostile investigative
    context, 'do to you' best matches the wording and tone without softening it. 'Do
    for you' could imply benefit more strongly than the questioners likely intend.
- source_word: πῶς
  chosen: How
  lexicon: BDAG
  rationale: Interrogative adverb asking manner or means; 'How' is the natural equivalent.
- source_word: ἤνοιξέν
  chosen: did he open
  alternatives:
  - opened
  lexicon: BDAG
  rationale: Aorist verb ἀνοίγω rendered with English auxiliary in a direct question.
    'Did he open' is idiomatic in English question form and preserves the active sense.
- source_word: σου τοὺς ὀφθαλμούς
  chosen: your eyes
  alternatives:
  - the eyes of you
  lexicon: BDAG
  rationale: Greek uses possessive pronoun plus article with body part; idiomatic
    English collapses this to 'your eyes.'
