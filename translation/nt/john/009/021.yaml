theological_decisions:
- issue: Meaning of ἡλικίαν ἔχει in context
  chosen_reading: Refers to being of sufficient age to answer independently
  alternative_readings:
  - Refers more generally to maturity
  - Refers to physical stature (unlikely here)
  rationale: The surrounding context concerns the parents' reluctance and the authorities'
    questioning. In v. 23 the same statement explains why they direct the questioners
    to their son. Thus the phrase is best understood as legal/social adulthood rather
    than height or mere general maturity.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of αὐτὸς περὶ ἑαυτοῦ λαλήσει
  chosen_reading: An assertion that the man can give his own testimony
  alternative_readings:
  - A simple statement that he will talk about himself
  rationale: The context is forensic interrogation. Rendering the clause as 'He will
    speak for himself' preserves the narrative's courtroom-like setting without importing
    extra doctrinal meaning.
  doctrine_reference: Translation philosophy §1, §3
