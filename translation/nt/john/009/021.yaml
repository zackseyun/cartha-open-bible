id: JHN.9.21
reference: John 9:21
source:
  edition: SBLGNT
  text: πῶς δὲ νῦν βλέπει οὐκ οἴδαμεν, ἢ τίς ἤνοιξεν αὐτοῦ τοὺς ὀφθαλμοὺς ἡμεῖς οὐκ
    οἴδαμεν· ⸂αὐτὸν ἐρωτήσατε, ἡλικίαν ἔχει⸃, αὐτὸς περὶ ἑαυτοῦ λαλήσει.
translation:
  text: But how he now sees, we do not know; or who opened his eyes, we do not know.
    Ask him; he is of age. He will speak for himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He can speak for himself.' The Greek future may function as a practical
      assertion of his ability or responsibility to answer.
    reason: lexical_alternative
lexical_decisions:
- source_word: πῶς δὲ νῦν βλέπει
  chosen: But how he now sees
  alternatives:
  - But how he can now see
  - But how he now is able to see
  lexicon: BDAG
  rationale: πῶς asks 'how,' δέ is mildly adversative/continuative ('but'), νῦν is
    'now,' and βλέπει is present indicative 'sees.' 'How he now sees' is a natural
    English rendering that preserves the parents' claimed ignorance about the manner
    or fact of his present sight without overinterpreting ability.
- source_word: οὐκ οἴδαμεν
  chosen: we do not know
  alternatives:
  - we don't know
  lexicon: BDAG
  rationale: A straightforward rendering of οἶδα in the perfect-form present sense
    'know.' The repeated phrase is kept repeated in English to reflect the Greek emphasis
    and testimony style.
- source_word: ἢ τίς ἤνοιξεν αὐτοῦ τοὺς ὀφθαλμούς
  chosen: or who opened his eyes
  alternatives:
  - or who opened up his eyes
  lexicon: BDAG
  rationale: ἤ introduces an alternative question, τίς is 'who,' and ἤνοιξεν from
    ἀνοίγω is naturally 'opened.' Retaining 'opened his eyes' preserves the idiom
    used in the narrative and its connection to the miracle account.
- source_word: αὐτὸν ἐρωτήσατε
  chosen: Ask him
  alternatives:
  - Question him
  - Ask him yourselves
  lexicon: BDAG
  rationale: Aorist imperative plural. 'Ask him' is direct and idiomatic. The plural
    addressees are implicit in English and need not be made explicit unless emphasis
    is required.
- source_word: ἡλικίαν ἔχει
  chosen: he is of age
  alternatives:
  - he is an adult
  - he has reached maturity
  lexicon: BDAG
  rationale: In this context ἡλικία most naturally refers to age/maturity sufficient
    for legal self-testimony, not physical stature. 'He is of age' is the established
    and contextually precise English idiom.
- source_word: αὐτὸς περὶ ἑαυτοῦ λαλήσει
  chosen: He will speak for himself
  alternatives:
  - He himself will speak about himself
  - He can speak for himself
  lexicon: BDAG
  rationale: αὐτός is emphatic, περί ἑαυτοῦ means 'concerning himself,' and λαλήσει
    is future 'will speak.' 'He will speak for himself' captures both the reflexive
    sense and the legal/social force of self-testimony in idiomatic English.
