id: JHN.9.27
reference: John 9:27
source:
  edition: SBLGNT
  text: ἀπεκρίθη αὐτοῖς· Εἶπον ὑμῖν ἤδη καὶ οὐκ ἠκούσατε· τί πάλιν θέλετε ἀκούειν;
    μὴ καὶ ὑμεῖς θέλετε αὐτοῦ μαθηταὶ γενέσθαι;
translation:
  text: He answered them, “I already told you, and you did not listen. Why do you
    want to hear it again? You do not also want to become his disciples, do you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I already told you, and you did not hear.' The Greek verb can mean
      either 'hear' or 'listen'; here it likely carries the sense of failing to heed
      what was said.
    reason: lexical_alternative
  - marker: b
    text: Or, 'Surely you do not also want to become his disciples?' The Greek question
      uses μή, which expects a negative answer.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: He answered
  alternatives:
  - He replied
  lexicon: BDAG
  rationale: Standard narrative response verb; 'answered' preserves the formal link
    to the Greek while remaining natural English.
- source_word: ἤδη
  chosen: already
  alternatives:
  - by now
  lexicon: BDAG
  rationale: Marks prior occurrence emphatically; 'already' is the most natural and
    direct rendering here.
- source_word: οὐκ ἠκούσατε
  chosen: you did not listen
  alternatives:
  - you did not hear
  lexicon: BDAG
  rationale: Although ἀκούω can mean 'hear,' in context the point is not mere auditory
    reception but failure to heed what was said. 'Listen' best captures the rebuking
    force in idiomatic English.
- source_word: τί πάλιν θέλετε ἀκούειν;
  chosen: Why do you want to hear it again?
  alternatives:
  - What do you want to hear again?
  - Why do you want to hear again?
  lexicon: BDAG
  rationale: τί with θέλετε in this context is best taken idiomatically as 'why,'
    expressing exasperation. Supplying 'it' is required in English and is implied
    by the prior statement.
- source_word: μὴ καὶ ὑμεῖς
  chosen: You do not also ... do you?
  alternatives:
  - Surely you do not also ...?
  - You do not want to ... too, do you?
  lexicon: BDAG
  rationale: μή introduces a question expecting a negative answer. The English tag
    question 'do you?' preserves that rhetorical force naturally.
- source_word: αὐτοῦ μαθηταὶ
  chosen: his disciples
  alternatives:
  - disciples of him
  lexicon: BDAG
  rationale: Natural English possessive construction; μαθηταί is best rendered 'disciples'
    in Johannine usage.
- source_word: γενέσθαι
  chosen: to become
  alternatives:
  - to be
  lexicon: BDAG
  rationale: γίνομαι emphasizes coming into a state, not merely existing in it; 'become'
    preserves the ingressive sense.
