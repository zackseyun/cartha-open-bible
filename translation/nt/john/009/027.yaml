theological_decisions:
- issue: Rhetorical force of the final question
  chosen_reading: 'A sarcastic question expecting a negative answer: ''You do not
    also want to become his disciples, do you?'''
  alternative_readings:
  - A more literal but less idiomatic 'Surely you do not also want to become his disciples?'
  rationale: The particle μή in a direct question normally signals expectation of
    a negative answer. Rendering this force is important for the tone of the healed
    man's response, but it is a grammatical rather than doctrinal issue.
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    grammar is not genuinely ambiguous enough to require a main-text/footnote split.
