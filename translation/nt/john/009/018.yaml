theological_decisions:
- issue: Referent and nuance of οἱ Ἰουδαῖοι in John
  chosen_reading: the Jews
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: To avoid importing a narrower sociological or leadership reference not
    explicit in the Greek, the main text retains the literal expression 'the Jews.'
    Because Johannine usage can be contextually specific and modern readers may misconstrue
    the phrase, an explanatory footnote preserves the likely contextual nuance without
    altering the text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
