id: JHN.9.18
reference: John 9:18
source:
  edition: SBLGNT
  text: Οὐκ ἐπίστευσαν οὖν οἱ Ἰουδαῖοι περὶ αὐτοῦ ὅτι ⸂ἦν τυφλὸς⸃ καὶ ἀνέβλεψεν, ἕως
    ὅτου ἐφώνησαν τοὺς γονεῖς αὐτοῦ ⸂τοῦ ἀναβλέψαντος⸃
translation:
  text: So the Jews did not believe about him that he had been blind and had received
    sight, until they called the parents of the one who had received sight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'the Jewish leaders' or 'the Judeans,' depending on how John's
      use of 'the Jews' is understood in context.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπίστευσαν
  chosen: did not believe
  alternatives:
  - did not trust
  - refused to believe
  lexicon: BDAG
  rationale: πιστεύω here takes a content clause introduced by ὅτι, so 'believe' is
    the natural English equivalent for accepting a claim as true. 'Trust' would suggest
    personal reliance rather than disbelief of reported facts.
- source_word: οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: The Greek expression is literally 'the Jews.' In John this term can refer
    variously to Judeans, Jewish authorities, or the Jewish people in a localized
    narrative setting. Here the immediate context is an investigative group questioning
    the healed man, but the text itself says 'the Jews,' so the main text preserves
    that wording rather than narrowing it interpretively. A footnote preserves the
    contextual alternative.
- source_word: περὶ αὐτοῦ
  chosen: about him
  alternatives:
  - concerning him
  lexicon: BDAG
  rationale: περί with the genitive commonly means 'about/concerning.' 'About him'
    is more natural modern English while remaining accurate.
- source_word: ἦν τυφλὸς
  chosen: he had been blind
  alternatives:
  - he was blind
  lexicon: BDAG
  rationale: Although the Greek uses an imperfect ('was blind'), English past perfect
    fits the narrative perspective better because the blindness is prior to the healing
    now under dispute.
- source_word: ἀνέβλεψεν
  chosen: had received sight
  alternatives:
  - regained sight
  - could see
  lexicon: BDAG
  rationale: ἀναβλέπω in healing contexts means to receive or regain sight. 'Had received
    sight' matches the miracle context and pairs well with the prior state 'had been
    blind.' 'Regained sight' could imply prior sight, which the context does not require.
- source_word: ἕως ὅτου
  chosen: until
  alternatives:
  - up to the time when
  lexicon: BDAG
  rationale: This compound expression marks the temporal limit of their disbelief.
    'Until' is the idiomatic English equivalent.
- source_word: ἐφώνησαν
  chosen: they called
  alternatives:
  - they summoned
  lexicon: BDAG
  rationale: φωνέω can mean call or summon. 'Called' is the broad, natural rendering;
    'summoned' is possible but slightly more formal and stronger than necessary.
- source_word: γονεῖς
  chosen: the parents
  alternatives:
  - his father and mother
  lexicon: BDAG
  rationale: γονεῖς is the standard plural noun for parents. 'The parents' is concise
    and exact.
- source_word: τοῦ ἀναβλέψαντος
  chosen: of the one who had received sight
  alternatives:
  - of the man who had received sight
  - of him who had received sight
  lexicon: BDAG
  rationale: The articular participle identifies the healed person by the event of
    receiving sight. 'The one who had received sight' preserves the participial force
    without adding 'man,' though that is contextually implied.
