theological_decisions:
- issue: Rendering κύριε before the healed man's explicit confession in the following verse
  chosen_reading: Lord
  alternative_readings:
  - sir
  rationale: The Greek vocative κύριε can function either as a respectful address ('sir') or as 'Lord.' The project's contested-terms table sets κύριος → 'Lord' as the default rendering. Because the narrative context leaves some ambiguity about the speaker's level of recognition at this moment, the alternative 'sir' is preserved in a footnote rather than adopted in the main text.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord; preserve theological tension rather than resolve it'
