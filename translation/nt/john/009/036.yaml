id: JHN.9.36
reference: John 9:36
source:
  edition: SBLGNT
  text: ἀπεκρίθη ἐκεῖνος καὶ εἶπεν· Καὶ τίς ἐστιν, κύριε, ἵνα πιστεύσω εἰς αὐτόν;
translation:
  text: He answered and said[a], “And who is he, Lord, that I may believe in him?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “sir.” The Greek κύριε can be a respectful form of address as well as “Lord.”
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: He answered
  alternatives:
  - He replied
  lexicon: BDAG
  rationale: Aorist passive-form deponent commonly means 'answered' or 'replied.' 'He answered' preserves the narrative style closely and pairs naturally with the following speech verb.
- source_word: ἐκεῖνος
  chosen: He
  alternatives:
  - that man
  - that one
  lexicon: BDAG
  rationale: The demonstrative refers back to the man born blind. In English narrative, a simple pronoun is the most natural equivalent once the referent is established; 'that man' would be overly marked here.
- source_word: καὶ εἶπεν
  chosen: and said
  alternatives:
  - and he said
  lexicon: BDAG
  rationale: This is a standard narrative doublet with ἀπεκρίθη. Retaining 'and said' reflects the Greek structure without awkwardness.
- source_word: Καὶ
  chosen: And
  alternatives:
  - —
  - Then
  lexicon: BDAG
  rationale: 'The conjunction is retained because it is present in the Greek and gives the response a direct, continuing feel: ''And who is he...?'' Omitting it would smooth the text but lose a small discourse feature.'
- source_word: τίς ἐστιν
  chosen: who is he
  alternatives:
  - who is this man
  - who is it
  lexicon: BDAG
  rationale: This is the straightforward interrogative. 'Who is he' best matches the Greek and the immediate context of asking Jesus to identify the Son of Man.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - sir
  - master
  lexicon: BDAG
  rationale: The default rendering for κύριος in DOCTRINE.md is 'Lord.' In this context the vocative could also mean 'sir,' especially before the man's full recognition of Jesus, but the project's stated default is retained in the main text, with the alternative preserved in a footnote because the nuance is contextually significant.
- source_word: ἵνα πιστεύσω
  chosen: that I may believe
  alternatives:
  - so that I may believe
  - that I might believe
  lexicon: BDAG
  rationale: ἵνα with the subjunctive expresses purpose or intended result. 'That I may believe' is idiomatic and preserves the purposive sense without overtranslation.
- source_word: πιστεύσω εἰς αὐτόν
  chosen: believe in him
  alternatives:
  - put my faith in him
  - trust in him
  lexicon: BDAG
  rationale: πιστεύω with εἰς commonly means 'believe in.' This is the standard and most transparent rendering. Alternatives like 'trust in' are possible but less consistent with the project's default handling of πίστις/πιστεύω language.
