theological_decisions:
- issue: Whether κύριε should be rendered as a merely respectful address ('sir') or
    as the christologically weightier 'Lord'
  chosen_reading: Lord
  alternative_readings:
  - sir
  - master
  rationale: 'The broader context favors a heightened confession: the man has just
    received Jesus'' self-identification and responds with belief and προσκύνησις.
    Rendering κύριε as ''Lord'' aligns with the project''s default for κύριος and
    preserves the likely theological weight without overstating beyond the text.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord); Translation
    philosophy items 2 and 3'
- issue: Whether προσεκύνησεν should be rendered as 'worshiped' or a less explicit
    act such as 'bowed down'/'paid homage'
  chosen_reading: worshiped
  alternative_readings:
  - bowed down before him
  - paid homage to him
  rationale: Because the object is Jesus and the action follows an explicit confession
    of belief, 'worshiped' best captures the likely sense in context. A less explicit
    rendering is lexically possible, so it is preserved in a footnote for auditability.
  doctrine_reference: 'DOCTRINE.md: Affirmations (historic ecumenical orthodoxy);
    Translation philosophy item 3'
