id: JHN.9.38
reference: John 9:38
source:
  edition: SBLGNT
  text: ὁ δὲ ἔφη· Πιστεύω, κύριε· καὶ προσεκύνησεν αὐτῷ.
translation:
  text: And he said, “I believe, Lord,” and he worshiped him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Sir.” The Greek κύριε can be a respectful form of address; here “Lord”
      is preferred because the context climaxes in confession and worship.
    reason: alternative_reading
  - marker: b
    text: Or “bowed down before him” / “paid homage to him.” The Greek verb can denote
      prostration or homage; here it is rendered “worshiped” in view of the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ
  chosen: And he
  alternatives:
  - Then he
  - But he
  lexicon: BDAG
  rationale: The article functions pronominally, referring back to the healed man.
    δέ is rendered with a simple connective 'And' for natural English narrative flow;
    'But' would overstate contrast here.
- source_word: ἔφη
  chosen: said
  alternatives:
  - was saying
  - declared
  lexicon: BDAG
  rationale: Aorist of φημί is a common narrative speech introducer. 'Said' is the
    most natural and sufficiently formal rendering.
- source_word: Πιστεύω
  chosen: I believe
  alternatives:
  - I trust
  - I have faith
  lexicon: BDAG
  rationale: πιστεύω is best rendered here as 'believe' in direct response to Jesus'
    self-revelation. This preserves the verbal link to Johannine belief language without
    paraphrase.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - sir
  - master
  lexicon: BDAG
  rationale: Following the project's default for κύριος, 'Lord' is used. In this immediate
    context, after Jesus identifies himself as the Son of Man and the man responds
    with worship, 'Lord' better reflects the elevated address than the merely polite
    'sir'.
- source_word: προσεκύνησεν
  chosen: worshiped
  alternatives:
  - bowed down before
  - paid homage to
  lexicon: BDAG
  rationale: προσκυνέω can denote prostration or homage, but in John's narrative this
    response to Jesus after confession of belief is most naturally rendered 'worshiped.'
    This preserves the theological force without unnecessary expansion.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - before him
  lexicon: BDAG
  rationale: The dative object with προσκυνέω is naturally represented in English
    as the direct object 'him.' 'Before him' is interpretive expansion and unnecessary
    in the main text.
