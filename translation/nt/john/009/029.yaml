id: JHN.9.29
reference: John 9:29
source:
  edition: SBLGNT
  text: ἡμεῖς οἴδαμεν ὅτι Μωϋσεῖ λελάληκεν ὁ θεός, τοῦτον δὲ οὐκ οἴδαμεν πόθεν ἐστίν.
translation:
  text: We know that God has spoken to Moses, but as for this man, we do not know
    where he is from.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'where he comes from.' In John, questions about Jesus' origin can carry
      both ordinary and deeper theological significance.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμεῖς
  chosen: We
  alternatives:
  - We ourselves
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis or contrast, but English can convey
    this naturally without an emphatic reflexive. The contrast is already clear in
    the speakers' claim over against the healed man's view.
- source_word: οἴδαμεν
  chosen: know
  alternatives:
  - are certain
  - understand
  lexicon: BDAG
  rationale: οἶδα here denotes knowledge/certainty, and 'know' is the most direct
    and idiomatic rendering. Repeated consistently for both occurrences in the verse.
- source_word: ὅτι
  chosen: that
  alternatives:
  - —
  lexicon: BDAG
  rationale: Standard content conjunction introducing what they claim to know.
- source_word: Μωϋσεῖ
  chosen: Moses
  lexicon: BDAG
  rationale: Proper name transliterated by standard English convention, following
    the translation philosophy to transliterate names.
- source_word: λελάληκεν
  chosen: has spoken
  alternatives:
  - spoke
  - has talked
  lexicon: BDAG
  rationale: The perfect tense naturally supports 'has spoken,' presenting God's speaking
    to Moses as a known, established fact with abiding significance. 'Spoke' is possible
    but loses the aspectual nuance.
- source_word: ὁ θεός
  chosen: God
  lexicon: BDAG
  rationale: Definite subject in Greek; standard English omits the article with 'God.'
    No need to expand beyond the text.
- source_word: τοῦτον
  chosen: this man
  alternatives:
  - this one
  - this fellow
  lexicon: BDAG
  rationale: The demonstrative refers to Jesus in a dismissive contrast. 'This man'
    is natural English and preserves the distancing tone better than the bare 'this
    one'.
- source_word: δὲ
  chosen: but as for
  alternatives:
  - but
  - and
  lexicon: BDAG
  rationale: δέ marks contrast, and with τοῦτον the phrase has a topical force. 'But
    as for this man' brings out both the contrast and the shift in focus more clearly
    than a simple 'but this man.'
- source_word: οὐκ οἴδαμεν
  chosen: we do not know
  alternatives:
  - we don't know
  lexicon: BDAG
  rationale: Formal negated repetition of the earlier verb; rendered consistently
    and in a register suitable for Bible translation.
- source_word: πόθεν ἐστίν
  chosen: where he is from
  alternatives:
  - where he comes from
  - his origin
  lexicon: BDAG
  rationale: πόθεν asks about source/origin. In context the issue is Jesus' provenance.
    'Where he is from' is idiomatic and preserves the ambiguity between geographical
    origin and authoritative source better than a more interpretive rendering.
