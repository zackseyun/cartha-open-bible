theological_decisions:
- issue: Meaning of Jesus' origin in πόθεν ἐστίν
  chosen_reading: Render broadly as 'where he is from' without resolving whether the
    speakers mean merely geographical origin or deeper divine authorization.
  alternative_readings:
  - where he comes from
  - what his origin is
  rationale: In John's Gospel, questions of Jesus' origin often carry layered significance.
    This verse reflects the speakers' claim without importing a theological explanation.
    The translation preserves the narrative irony and theological tension rather than
    resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
