theological_decisions:
- issue: Speaker's characterization of Jesus
  chosen_reading: The man called Jesus
  alternative_readings:
  - Jesus, the man called Jesus
  rationale: The translation preserves the healed man's current level of understanding in the narrative. He identifies Jesus as 'the man,' not yet with an overtly exalted title. This avoids importing later theological confession into the speaker's words.
  doctrine_reference: Preserve theological tension rather than resolve it.
