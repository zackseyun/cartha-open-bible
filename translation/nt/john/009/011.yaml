id: JHN.9.11
reference: John 9:11
source:
  edition: SBLGNT
  text: ἀπεκρίθη ⸀ἐκεῖνος· ⸂Ὁ ἄνθρωπος ὁ⸃ λεγόμενος Ἰησοῦς πηλὸν ἐποίησεν καὶ ἐπέχρισέν μου τοὺς ὀφθαλμοὺς καὶ εἶπέν μοι ⸀ὅτι Ὕπαγε εἰς ⸀τὸν Σιλωὰμ καὶ νίψαι· ἀπελθὼν ⸀οὖν καὶ νιψάμενος ἀνέβλεψα.
translation:
  text: He answered[a], “The man called Jesus made mud and spread it on my eyes, and he told me, ‘Go to Siloam and wash.’ So I went away and washed[c][b], and I received my sight.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “made clay.” The Greek πηλός can refer to clay or mud; here “mud” is chosen for natural modern English.
    reason: lexical_alternative
  - marker: b
    text: Or “anointed my eyes.” The Greek verb can mean “spread on, smear” and is sometimes rendered more formally as “anoint.”
    reason: lexical_alternative
  - marker: c
    text: Or “I regained my sight.” In this context the verb means receiving sight after blindness.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη ἐκεῖνος
  chosen: He answered
  alternatives:
  - That man answered
  - He replied
  lexicon: BDAG
  rationale: Standard narrative formula. The explicit pronoun ἐκεῖνος is naturally carried by English 'he' rather than the more wooden 'that one' in this context.
- source_word: Ὁ ἄνθρωπος ὁ λεγόμενος Ἰησοῦς
  chosen: The man called Jesus
  alternatives:
  - The man who is called Jesus
  - The man named Jesus
  lexicon: BDAG
  rationale: λεγόμενος here identifies Jesus by the name by which he is known. 'Called Jesus' is natural English and preserves the speaker's limited, non-confessional identification of Jesus simply as a man.
- source_word: πηλὸν ἐποίησεν
  chosen: made mud
  alternatives:
  - made clay
  - made a mud paste
  lexicon: BDAG
  rationale: '''Mud'' is more natural modern English than ''clay'' for the substance made from dirt and saliva in the immediate context, while still accurately reflecting πηλός.'
- source_word: ἐπέχρισέν μου τοὺς ὀφθαλμούς
  chosen: spread it on my eyes
  alternatives:
  - anointed my eyes
  - smeared my eyes
  lexicon: BDAG
  rationale: ἐπιχρίω can mean smear/spread on. 'Anointed' is possible but in English may suggest ritual overtones not explicit here; 'spread it on my eyes' communicates the physical action clearly.
- source_word: εἶπέν μοι ὅτι
  chosen: he told me
  alternatives:
  - he said to me
  lexicon: BDAG
  rationale: Introduces direct speech naturally in English. 'Told me' fits the following command without loss of meaning.
- source_word: Ὕπαγε
  chosen: Go
  alternatives:
  - Go away
  - Be on your way
  lexicon: BDAG
  rationale: Simple imperative of movement; 'Go' is the most idiomatic rendering here.
- source_word: εἰς τὸν Σιλωάμ
  chosen: to Siloam
  alternatives:
  - to the pool of Siloam
  lexicon: BDAG
  rationale: The Greek here names 'Siloam' without repeating 'pool'; the location has already been identified in the context (v. 7). The simpler rendering follows the source wording closely.
- source_word: νίψαι
  chosen: wash
  alternatives:
  - wash yourself
  lexicon: BDAG
  rationale: Middle imperative of νίπτω; English normally expresses this simply as 'wash' in context.
- source_word: ἀπελθὼν οὖν
  chosen: So I went away
  alternatives:
  - So I went
  - Therefore I went away
  lexicon: BDAG
  rationale: οὖν marks the resulting action. 'Went away' reflects the participle ἀπελθών with slightly more specificity than bare 'went'.
- source_word: νιψάμενος
  chosen: washed
  alternatives:
  - washed myself
  lexicon: BDAG
  rationale: The middle participle is naturally rendered by simple English 'washed' in this sequence.
- source_word: ἀνέβλεψα
  chosen: I received my sight
  alternatives:
  - I saw
  - I regained my sight
  - I looked up
  lexicon: BDAG
  rationale: In healing contexts ἀναβλέπω commonly means to regain/receive sight, not merely 'look up.' Since the man was blind, 'received my sight' best captures the contextual sense.
