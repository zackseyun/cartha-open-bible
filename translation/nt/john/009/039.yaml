id: JHN.9.39
reference: John 9:39
source:
  edition: SBLGNT
  text: καὶ εἶπεν ὁ Ἰησοῦς· Εἰς κρίμα ἐγὼ εἰς τὸν κόσμον τοῦτον ἦλθον, ἵνα οἱ μὴ βλέποντες
    βλέπωσιν καὶ οἱ βλέποντες τυφλοὶ γένωνται.
translation:
  text: And Jesus said, “For judgment I came into this world, so that those who do
    not see may see, and those who see may become blind.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a judgment.' The Greek εἰς κρίμα can emphasize the judicial effect
      of Jesus' coming rather than only condemnation.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρίμα
  chosen: judgment
  alternatives:
  - a judgment
  - condemnation
  lexicon: BDAG
  rationale: κρίμα here denotes the result or effect of judicial discernment/judgment.
    'For judgment' preserves the concise force of εἰς κρίμα and fits the Johannine
    irony of Jesus' coming exposing true spiritual condition. 'Condemnation' is too
    narrow, since the verse includes both giving sight and rendering blindness.
- source_word: κόσμον
  chosen: world
  lexicon: BDAG
  rationale: κόσμος in John commonly refers to the human world-order in rebellion
    or estrangement from God; 'world' is the standard and contextually appropriate
    rendering.
- source_word: βλέποντες
  chosen: those who do not see / those who see
  alternatives:
  - the blind / the seeing
  lexicon: BDAG
  rationale: The participles are rendered substantivally as 'those who do not see'
    and 'those who see' to preserve both the literal and metaphorical ambiguity. Using
    'the blind' in the first clause would over-specify the image and reduce the rhetorical
    parallel with the second clause.
- source_word: βλέπωσιν
  chosen: may see
  alternatives:
  - might see
  - may gain sight
  lexicon: BDAG
  rationale: The subjunctive after ἵνα is naturally rendered 'may see.' This keeps
    both physical and spiritual sight in view. 'May gain sight' would foreground physical
    healing more than the broader Johannine meaning warrants here.
- source_word: τυφλοὶ
  chosen: blind
  alternatives:
  - blind people
  lexicon: BDAG
  rationale: '''Blind'' preserves the predicate adjective''s force and the stark reversal
    in the saying. It also allows the spiritual sense to remain prominent without
    excluding the literal image.'
- source_word: γένωνται
  chosen: may become
  alternatives:
  - might become
  - may prove to be
  lexicon: BDAG
  rationale: γίνομαι here indicates becoming, not merely being shown to be. 'May become'
    preserves the resultative nuance of the ἵνα-clause and the judicial reversal expressed
    in the verse.
- source_word: εἰς τὸν κόσμον τοῦτον ἦλθον
  chosen: I came into this world
  alternatives:
  - I came to this world
  lexicon: BDAG
  rationale: '''Into this world'' is the most natural rendering of εἰς with ἔρχομαι
    and preserves Johannine incarnation/sending language.'
