theological_decisions:
- issue: Relation of this verse to John 3:17 ('not to judge the world')
  chosen_reading: Render κρίμα as 'judgment' without softening or harmonizing away
    the tension.
  alternative_readings:
  - Render as 'a crisis' to emphasize division rather than judgment
  - Render as 'condemnation' to stress punitive outcome
  rationale: 'The verse presents Jesus'' coming as producing judicial separation:
    the non-seeing come to see, and the self-professed seeing become blind. In line
    with the doctrine''s instruction to preserve theological tension rather than resolve
    it, the translation keeps ''judgment'' and does not paraphrase to avoid apparent
    tension with other Johannine statements.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
