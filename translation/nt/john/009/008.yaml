id: JHN.9.8
reference: John 9:8
source:
  edition: SBLGNT
  text: οἱ οὖν γείτονες καὶ οἱ θεωροῦντες αὐτὸν τὸ πρότερον ὅτι ⸀προσαίτης ἦν ἔλεγον·
    Οὐχ οὗτός ἐστιν ὁ καθήμενος καὶ προσαιτῶν;
translation:
  text: So the neighbors, and those who had seen him before as a beggar, were saying,
    “Is this not the man who used to sit and beg?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “Is this not the one who was sitting and begging?” The
      Greek uses participles ('sitting' and 'begging') to identify him by his customary
      former activity.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks narrative continuation/inference from the previous event. 'So'
    is natural modern English and preserves the connective force without sounding
    overly formal.
- source_word: γείτονες
  chosen: neighbors
  alternatives:
  - people nearby
  - those living nearby
  lexicon: BDAG
  rationale: The noun refers specifically to those living near him; 'neighbors' is
    the most direct and idiomatic rendering.
- source_word: θεωροῦντες
  chosen: had seen
  alternatives:
  - were observing
  - used to see
  - had been seeing
  lexicon: BDAG
  rationale: Though the participle literally means 'seeing/observing,' in this context
    it refers to people who had previously seen him regularly enough to recognize
    him. 'Had seen' fits the English syntax and the retrospective sense created by
    τὸ πρότερον.
- source_word: τὸ πρότερον
  chosen: before
  alternatives:
  - formerly
  - previously
  lexicon: BDAG
  rationale: This adverbial expression points to an earlier time. 'Before' is concise,
    natural, and works smoothly with 'had seen him.'
- source_word: ὅτι προσαίτης ἦν
  chosen: because he was a beggar
  alternatives:
  - when he was a beggar
  - that he was a beggar
  lexicon: BDAG
  rationale: 'The best sense here is causal/explanatory: they had seen him before
    inasmuch as he was known as a beggar. Rendering ὅτι as ''because'' avoids awkward
    English and captures why these observers recognized him. ''That he was a beggar''
    is possible but less natural in this construction.'
- source_word: προσαίτης
  chosen: beggar
  alternatives:
  - mendicant
  lexicon: BDAG
  rationale: Standard, clear English equivalent for one who begs alms. 'Mendicant'
    is too formal/technical for the translation style.
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: Imperfect tense suggests repeated or ongoing speech among the crowd.
    'Were saying' preserves that imperfective nuance in readable English.
- source_word: Οὐχ οὗτός ἐστιν
  chosen: Is this not
  alternatives:
  - Isn't this
  - Is this not indeed
  lexicon: BDAG
  rationale: The question expects an affirmative answer. 'Is this not' preserves the
    slightly formal rhetorical shape of the Greek better than the contraction, while
    remaining understandable.
- source_word: ὁ καθήμενος καὶ προσαιτῶν
  chosen: the man who used to sit and beg
  alternatives:
  - the one sitting and begging
  - the one who sat and begged
  lexicon: BDAG
  rationale: The participles are substantival and describe the man's customary prior
    activity. Because the speakers are identifying him by his former public behavior,
    'used to sit and beg' communicates the habitual sense more naturally than a wooden
    present-participle rendering.
