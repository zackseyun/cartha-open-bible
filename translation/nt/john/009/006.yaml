id: JHN.9.6
reference: John 9:6
source:
  edition: SBLGNT
  text: ταῦτα εἰπὼν ἔπτυσεν χαμαὶ καὶ ἐποίησεν πηλὸν ἐκ τοῦ πτύσματος, καὶ ⸀ἐπέχρισεν
    ⸀αὐτοῦ τὸν πηλὸν ἐπὶ τοὺς ⸀ὀφθαλμούς,
translation:
  text: After saying these things, he spit on the ground and made mud from the saliva,
    and he spread the mud on his eyes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he anointed his eyes with the mud.' The Greek verb can mean 'anoint'
      or 'smear on.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα εἰπὼν
  chosen: After saying these things
  alternatives:
  - Having said these things
  - When he had said these things
  lexicon: BDAG
  rationale: Aorist participle plus demonstrative introduces an action prior to the
    main verbs. 'After saying these things' is natural modern English and preserves
    the temporal sequence without unnecessary stiffness.
- source_word: ἔπτυσεν χαμαί
  chosen: he spit on the ground
  alternatives:
  - he spat on the ground
  - he spit on the ground below
  lexicon: BDAG
  rationale: χαμαί means 'on the ground' or 'to the ground.' 'Spit' is acceptable
    modern past tense and reads more naturally for the target audience than 'spat,'
    while preserving the concrete physical action.
- source_word: ἐποίησεν πηλὸν
  chosen: made mud
  alternatives:
  - made clay
  - made a paste
  lexicon: BDAG
  rationale: πηλός can denote clay, mud, or wet earth. In this healing scene, the
    substance formed from saliva and earth is best conveyed as 'mud' in contemporary
    English; 'clay' is possible but sounds more technical or traditional than the
    likely plain sense.
- source_word: ἐκ τοῦ πτύσματος
  chosen: from the saliva
  alternatives:
  - from the spittle
  lexicon: BDAG
  rationale: πτύσμα refers to saliva/spittle. 'Saliva' is clear modern English; 'spittle'
    is more traditional but less common. The preposition ἐκ is preserved with 'from.'
- source_word: ἐπέχρισεν
  chosen: he spread
  alternatives:
  - he anointed
  - he smeared
  - he applied
  lexicon: BDAG
  rationale: ἐπιχρίω literally means to smear on or anoint. Because the object is
    mud rather than oil and the context is physical application, 'spread' communicates
    the action naturally without importing ceremonial overtones. The more literal
    'anointed' is preserved in a footnote because it is a viable lexical alternative
    and may be of interpretive interest.
- source_word: αὐτοῦ ... ἐπὶ τοὺς ὀφθαλμούς
  chosen: on his eyes
  alternatives:
  - on the man's eyes
  - on his eyeballs
  lexicon: BDAG
  rationale: The genitive pronoun αὐτοῦ naturally refers to the blind man in context.
    'On his eyes' is the straightforward rendering of the pronoun plus ἐπί with accusative.
    Supplying 'the man's' is unnecessary in English here.
- source_word: τὸν πηλόν
  chosen: the mud
  alternatives:
  - the clay
  lexicon: BDAG
  rationale: The article points back to the mud just made, so 'the mud' preserves
    the anaphoric force and keeps consistency with the earlier rendering of πηλός.
