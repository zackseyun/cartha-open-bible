theological_decisions:
- issue: Potential ceremonial nuance of ἐπέχρισεν
  chosen_reading: 'Rendered with a non-ceremonial application verb in the main text:
    ''he spread the mud on his eyes.'''
  alternative_readings:
  - '''he anointed his eyes with the mud'''
  rationale: The verb can be rendered 'anoint,' but in this context the action is
    concrete and medicinal rather than explicitly cultic or messianic. To preserve
    theological restraint and avoid importing sacramental or symbolic claims the verse
    itself does not state, the main text uses a plain physical verb while preserving
    the more literal alternative in a footnote.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
