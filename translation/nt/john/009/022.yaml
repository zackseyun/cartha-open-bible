theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  - the Christ
  rationale: The term functions as a title in this context, not as a name-like designation.
    Following the project's contested-terms guidance, 'Messiah' preserves the Jewish
    messianic context of the confession being prohibited.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Referent of οἱ Ἰουδαῖοι in John
  chosen_reading: the Jews (with contextual footnote noting likely reference to Jewish
    authorities)
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: John's usage is context-sensitive and can be misunderstood in English.
    The main text preserves the Greek wording, while a footnote documents that the
    immediate referent is likely the Judean Jewish authorities who exercised synagogue
    power. This preserves lexical transparency without importing a narrower term into
    the text itself.
