id: JHN.9.22
reference: John 9:22
source:
  edition: SBLGNT
  text: ταῦτα εἶπαν οἱ γονεῖς αὐτοῦ ὅτι ἐφοβοῦντο τοὺς Ἰουδαίους, ἤδη γὰρ συνετέθειντο
    οἱ Ἰουδαῖοι ἵνα ἐάν τις αὐτὸν ὁμολογήσῃ χριστόν, ἀποσυνάγωγος γένηται.
translation:
  text: His parents said these things because they were afraid of the Jews, for the
    Jews had already agreed that if anyone confessed him as the Messiah, he would
    be put out of the synagogue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''the Jews.'' In this context, the reference is likely to the Jewish
      authorities rather than to Jewish people indiscriminately.'
    reason: cultural_note
  - marker: b
    text: Or 'confessed him as Christ' or 'acknowledged him as the Christ.'
    reason: alternative_reading
lexical_decisions:
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Plural demonstrative; 'these things' preserves the explicit plural reference
    to the parents' preceding statements.
- source_word: εἶπαν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Simple aorist of λέγω; 'said' is the natural English equivalent in narrative.
- source_word: οἱ γονεῖς αὐτοῦ
  chosen: his parents
  alternatives:
  - his father and mother
  lexicon: BDAG
  rationale: γονεῖς idiomatically means 'parents'; the possessive αὐτοῦ is naturally
    rendered with 'his'.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason for their statement, not merely content;
    'because' best fits the syntax and discourse flow.
- source_word: ἐφοβοῦντο
  chosen: were afraid
  alternatives:
  - feared
  lexicon: BDAG
  rationale: Imperfect middle conveys ongoing or characteristic fear; 'were afraid'
    reads naturally and preserves the sense.
- source_word: τοὺς Ἰουδαίους / οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: Ἰουδαῖοι in John can denote Judeans, Jewish authorities, or Jews more
    broadly depending on context. Here the reference is to the group with authority
    to expel from the synagogue, likely the Judean Jewish authorities. However, the
    Greek text itself says 'the Jews,' and this translation preserves that wording
    in the main text while clarifying the contextual sense in a footnote for auditability.
- source_word: ἤδη
  chosen: already
  alternatives:
  - by now
  lexicon: BDAG
  rationale: Temporal adverb indicating prior arrangement before this exchange.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces explanatory ground for the parents' fear; 'for' works well
    in English narrative explanation.
- source_word: συνετέθειντο
  chosen: had already agreed
  alternatives:
  - had decided together
  - had conspired
  lexicon: BDAG
  rationale: Pluperfect/middle sense of συντίθεμαι indicates a prior settled agreement.
    'Had already agreed' is clear and avoids overstating the term as necessarily conspiratorial.
- source_word: ἵνα ἐάν τις
  chosen: that if anyone
  alternatives:
  - so that if anyone
  lexicon: BDAG
  rationale: This construction expresses the content/result of the agreement in idiomatic
    Greek. In English, 'that if anyone' best captures the sense without awkwardness.
- source_word: αὐτὸν ὁμολογήσῃ
  chosen: confessed him
  alternatives:
  - acknowledged him
  - declared allegiance to him
  lexicon: BDAG
  rationale: ὁμολογέω here means to acknowledge or confess publicly. 'Confessed him'
    keeps the verbal link to public acknowledgment; the complement is then specified
    by χριστόν.
- source_word: χριστόν
  chosen: the Messiah
  alternatives:
  - Christ
  - the Christ
  lexicon: BDAG
  rationale: 'Per doctrine, Χριστός as a title is rendered ''Messiah'' where context
    supports. Here it is clearly titular: confessing Jesus as the anointed deliverer.'
- source_word: ἀποσυνάγωγος γένηται
  chosen: would be put out of the synagogue
  alternatives:
  - would become expelled from the synagogue
  - would be excommunicated from the synagogue
  lexicon: BDAG
  rationale: ἀποσυνάγωγος denotes exclusion from the synagogue community. 'Put out
    of the synagogue' is idiomatic, readable, and close to Johannine usage elsewhere;
    'excommunicated' is interpretive and ecclesiastically loaded.
