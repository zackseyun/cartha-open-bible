theological_decisions:
- issue: Rendering the explanatory gloss on Siloam without over-reading Johannine symbolism
  chosen_reading: Include the parenthetical explanation 'which is translated “Sent”' in the main text as part of the narrative.
  alternative_readings:
  - Render more interpretively to foreground symbolic connection to Jesus as the one sent by the Father
  rationale: The Greek itself includes the gloss, so it should remain in the main text. However, the translation should not import theological interpretation beyond the text by making the symbolism more explicit than John does here.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
