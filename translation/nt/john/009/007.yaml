id: JHN.9.7
reference: John 9:7
source:
  edition: SBLGNT
  text: καὶ εἶπεν αὐτῷ· Ὕπαγε νίψαι εἰς τὴν κολυμβήθραν τοῦ Σιλωάμ (ὃ ἑρμηνεύεται Ἀπεσταλμένος). ἀπῆλθεν οὖν καὶ ἐνίψατο, καὶ ἦλθεν βλέπων.
translation:
  text: And he said to him[a], “Go, wash in the pool of Siloam” (which is translated “Sent”). So he went and washed, and came back seeing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “which means ‘Sent.’”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὕπαγε
  chosen: Go
  alternatives:
  - Be on your way
  - Go away
  lexicon: BDAG
  rationale: A straightforward imperative of movement. 'Go' is natural modern English and fits the command sequence without adding nuance not explicit in the Greek.
- source_word: νίψαι / ἐνίψατο
  chosen: wash / washed
  alternatives:
  - wash yourself / washed himself
  - rinse
  lexicon: BDAG
  rationale: The verb νίπτω commonly refers to washing, often of part of the body rather than full bathing. 'Wash' is the clearest idiomatic English here. Reflexive force is implicit in English and need not be made explicit in the main text.
- source_word: εἰς τὴν κολυμβήθραν
  chosen: in the pool
  alternatives:
  - at the pool
  - into the pool
  lexicon: BDAG
  rationale: κολυμβήθρα denotes a pool or reservoir. With νίψαι, English idiom prefers 'wash in the pool' rather than a more wooden 'into the pool.'
- source_word: Σιλωάμ
  chosen: Siloam
  alternatives:
  - Shiloah
  lexicon: BDAG
  rationale: Standard English transliteration of the place name, consistent with the translation philosophy of transliterating names.
- source_word: ὃ ἑρμηνεύεται Ἀπεσταλμένος
  chosen: which is translated “Sent”
  alternatives:
  - which means “Sent”
  - which is interpreted “Sent”
  lexicon: BDAG
  rationale: ἑρμηνεύεται introduces an explanatory gloss. 'Is translated' preserves the explicit explanatory character of the Greek. 'Sent' is the natural rendering of the passive participle Ἀπεσταλμένος.
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: οὖν marks a natural narrative consequence. 'So' is readable modern English and preserves the flow without sounding overly formal.
- source_word: ἦλθεν βλέπων
  chosen: came back seeing
  alternatives:
  - came seeing
  - returned able to see
  - came back with his sight
  lexicon: BDAG
  rationale: The participle βλέπων indicates the result of the healing as he returned. 'Came back seeing' preserves the participial vividness and the narrative implication that he returned from where he had gone. It avoids over-paraphrasing while making the sense clear in English.
- source_word: ἀπῆλθεν
  chosen: he went
  alternatives:
  - he departed
  - he went away
  lexicon: BDAG
  rationale: Simple narrative aorist of departure. 'He went' is sufficient and idiomatic.
