id: JHN.9.25
reference: John 9:25
source:
  edition: SBLGNT
  text: ἀπεκρίθη οὖν ⸀ἐκεῖνος· Εἰ ἁμαρτωλός ἐστιν οὐκ οἶδα· ἓν οἶδα ὅτι τυφλὸς ὢν ἄρτι βλέπω.
translation:
  text: 'So that man answered[a], “Whether he is a sinner, I do not know. One thing I do know: though I was blind, now I see.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “If he is a sinner, I do not know.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative response verb. 'Answered' is the most direct and idiomatic rendering in Johannine dialogue.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks continuation/inference from the prior exchange. 'So' is natural modern English and preserves the discourse connection without sounding overly formal.
- source_word: ἐκεῖνος
  chosen: that man
  alternatives:
  - he
  - that one
  lexicon: BDAG
  rationale: The demonstrative is explicit in Greek and points back to the man who had been blind. 'That man' preserves the deictic force better than a simple 'he' and remains idiomatic.
- source_word: Εἰ ἁμαρτωλός ἐστιν
  chosen: Whether he is a sinner
  alternatives:
  - If he is a sinner
  lexicon: BDAG
  rationale: Although εἰ often means 'if,' in indirect discourse after a verb of knowing English idiom is better served by 'whether.' This avoids implying a more conditional nuance than the Greek requires in this context.
- source_word: ἁμαρτωλός
  chosen: a sinner
  alternatives:
  - sinful man
  lexicon: BDAG
  rationale: This is the established accusation in the context. 'A sinner' is concise and reflects the predicate nominative naturally.
- source_word: οὐκ οἶδα
  chosen: I do not know
  alternatives:
  - I don't know
  lexicon: BDAG
  rationale: A straightforward rendering of the perfect-form verb with present sense. The non-contracted form suits the register of the translation.
- source_word: ἓν οἶδα
  chosen: One thing I do know
  alternatives:
  - One thing I know
  lexicon: BDAG
  rationale: The added 'do' brings out the emphatic contrast with 'I do not know' in the previous clause and matches the rhetorical force of the Greek.
- source_word: ὅτι
  chosen: ': though I was blind, now I see'
  alternatives:
  - that I was blind and now I see
  - that, being blind, now I see
  lexicon: BDAG
  rationale: Here ὅτι introduces the content of what he knows. Rendering the following participial construction as 'though I was blind, now I see' produces clear English while preserving the before/now contrast.
- source_word: τυφλὸς ὢν
  chosen: though I was blind
  alternatives:
  - being blind
  - while I was blind
  lexicon: BDAG
  rationale: The participial phrase denotes his former condition. 'Though I was blind' idiomatically conveys the concessive/background sense in relation to his present sight.
- source_word: ἄρτι
  chosen: now
  alternatives:
  - at present
  - just now
  lexicon: BDAG
  rationale: In this contrastive statement, 'now' best captures the present state over against former blindness. 'Just now' would overemphasize immediacy.
- source_word: βλέπω
  chosen: I see
  alternatives:
  - I can see
  lexicon: BDAG
  rationale: The simple present 'I see' is both literal and rhetorically powerful. 'I can see' is interpretive and slightly weaker.
