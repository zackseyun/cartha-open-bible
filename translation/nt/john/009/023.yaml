id: JHN.9.23
reference: John 9:23
source:
  edition: SBLGNT
  text: διὰ τοῦτο οἱ γονεῖς αὐτοῦ εἶπαν ὅτι Ἡλικίαν ἔχει, αὐτὸν ⸀ἐπερωτήσατε.
translation:
  text: For this reason his parents said[a], “He is of age; ask him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “He is old enough; question him.”
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: For this reason
  alternatives:
  - Because of this
  - Therefore
  lexicon: BDAG
  rationale: The prepositional phrase points back to the explanatory context of v. 22. 'For this reason' preserves the causal force clearly in natural English.
- source_word: γονεῖς
  chosen: parents
  alternatives:
  - father and mother
  lexicon: BDAG
  rationale: The plural noun refers collectively to the man's parents. 'Parents' is the natural and accurate English equivalent.
- source_word: εἶπαν
  chosen: said
  alternatives:
  - answered
  - told them
  lexicon: BDAG
  rationale: λέγω here is the ordinary verb of speaking. 'Said' is sufficient and avoids importing a more specific nuance not present in the Greek.
- source_word: Ἡλικίαν ἔχει
  chosen: He is of age
  alternatives:
  - He is old enough
  - He has maturity
  - He is an adult
  lexicon: BDAG
  rationale: The idiom literally uses 'age' with 'has,' but in context it means he is old enough to answer for himself. 'He is of age' is a standard, concise English rendering that preserves the legal/social sense without over-paraphrasing.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: The pronoun refers emphatically to the formerly blind man as the proper person to question.
- source_word: ἐπερωτήσατε
  chosen: ask
  alternatives:
  - question
  - inquire of
  lexicon: BDAG
  rationale: The aorist imperative calls for directing the inquiry to him. 'Ask' is the most natural modern English equivalent; 'question' is possible but slightly stiffer.
