id: JHN.9.13
reference: John 9:13
source:
  edition: SBLGNT
  text: Ἄγουσιν αὐτὸν πρὸς τοὺς Φαρισαίους τόν ποτε τυφλόν.
translation:
  text: They brought the man who had formerly been blind to the Pharisees.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'They brought to the Pharisees the man who had once been blind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄγουσιν
  chosen: They brought
  alternatives:
  - They lead
  - They are bringing
  - They took
  lexicon: BDAG
  rationale: Although the Greek present tense is historical present, natural English
    typically renders it as a simple past in narrative. 'Brought' fits the context
    of taking the healed man before the Pharisees better than the more wooden 'lead.'
- source_word: αὐτὸν
  chosen: the man
  alternatives:
  - him
  lexicon: BDAG
  rationale: The pronoun itself means 'him,' but English style is clearer if the object
    is identified in apposition with the following phrase. This avoids an awkward
    literal sequence ('They brought him ... the formerly blind') while preserving
    the referent.
- source_word: πρὸς τοὺς Φαρισαίους
  chosen: to the Pharisees
  alternatives:
  - before the Pharisees
  lexicon: BDAG
  rationale: πρός with the accusative here indicates movement toward persons. 'To
    the Pharisees' is the most direct rendering; 'before the Pharisees' is possible
    contextually but slightly more interpretive.
- source_word: Φαρισαίους
  chosen: Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the group name, consistent with English Bible
    usage and the translation philosophy of transliterating names.
- source_word: τόν ποτε τυφλόν
  chosen: the man who had formerly been blind
  alternatives:
  - the formerly blind man
  - the one who once was blind
  - the man who had once been blind
  lexicon: BDAG
  rationale: 'ποτε here means ''formerly/once.'' The phrase functions substantivally:
    ''the one formerly blind.'' English idiom is best served by making the implied
    noun explicit as ''the man'' and rendering the prior state with a relative clause.
    This preserves the contrast between his former blindness and present healing.'
- source_word: ποτε
  chosen: formerly
  alternatives:
  - once
  lexicon: BDAG
  rationale: '''Formerly'' highlights the temporal contrast in context and reads more
    naturally in contemporary English than the slightly more ambiguous ''once.'''
- source_word: τυφλόν
  chosen: blind
  lexicon: BDAG
  rationale: Straightforward rendering of the adjective describing his former condition.
