id: JHN.9.20
reference: John 9:20
source:
  edition: SBLGNT
  text: ἀπεκρίθησαν ⸀οὖν οἱ γονεῖς αὐτοῦ καὶ εἶπαν· Οἴδαμεν ὅτι οὗτός ἐστιν ὁ υἱὸς
    ἡμῶν καὶ ὅτι τυφλὸς ἐγεννήθη·
translation:
  text: So his parents answered and said, “We know that this is our son and that he
    was born blind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “he was blind from birth.”
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks narrative/logical continuation from the preceding interrogation.
    'So' is natural modern English and preserves the inferential flow without sounding
    overly formal.
- source_word: γονεῖς
  chosen: parents
  alternatives:
  - father and mother
  lexicon: BDAG
  rationale: The plural noun refers collectively to the man's father and mother. 'Parents'
    is the natural and accurate English equivalent.
- source_word: ἀπεκρίθησαν ... καὶ εἶπαν
  chosen: answered and said
  alternatives:
  - replied and said
  - answered
  lexicon: BDAG
  rationale: John frequently uses this paired expression. Rendering both verbs preserves
    the source texture and discourse form better than collapsing them into a single
    English verb.
- source_word: Οἴδαμεν
  chosen: We know
  alternatives:
  - We are certain
  - We do know
  lexicon: BDAG
  rationale: The verb denotes knowledge/certainty. 'We know' is the straightforward
    equivalent and fits the parents' testimony.
- source_word: οὗτός ἐστιν ὁ υἱὸς ἡμῶν
  chosen: this is our son
  alternatives:
  - this one is our son
  lexicon: BDAG
  rationale: English normally omits the extra demonstrative force of οὗτος in this
    construction unless emphasis is needed. 'This is our son' is idiomatic while preserving
    the identification.
- source_word: τυφλὸς
  chosen: blind
  alternatives:
  - a blind man
  lexicon: BDAG
  rationale: Predicate adjective describing his condition at birth. 'Blind' is sufficient
    and natural in English.
- source_word: ἐγεννήθη
  chosen: he was born
  alternatives:
  - he came to be born
  lexicon: BDAG
  rationale: Aorist passive of γεννάω in birth contexts is idiomatically rendered
    'was born.'
- source_word: τυφλὸς ἐγεννήθη
  chosen: he was born blind
  alternatives:
  - he was blind from birth
  lexicon: BDAG
  rationale: This is the most direct and idiomatic rendering of the Greek word order
    and sense. The alternative is valid but slightly more interpretive.
