id: JHN.9.16
reference: John 9:16
source:
  edition: SBLGNT
  text: ἔλεγον οὖν ἐκ τῶν Φαρισαίων τινές· ⸂Οὐκ ἔστιν οὗτος παρὰ θεοῦ ὁ ἄνθρωπος⸃, ὅτι τὸ σάββατον οὐ τηρεῖ. ⸀ἄλλοι ἔλεγον· Πῶς δύναται ἄνθρωπος ἁμαρτωλὸς τοιαῦτα σημεῖα ποιεῖν; καὶ σχίσμα ἦν ἐν αὐτοῖς.
translation:
  text: So some of the Pharisees were saying[a], “This man is not from God, because he does not keep the Sabbath.” But others were saying[b], “How can a sinful man do such signs?” And there was a division among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a sinner.' The Greek reads 'a sinful man,' using an adjective modifying 'man.'
    reason: lexical_alternative
  - marker: b
    text: John often uses 'signs' for Jesus' works to emphasize their revelatory meaning; alternatively, 'miraculous signs' makes that implication more explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον ... τινές
  chosen: some ... were saying
  alternatives:
  - some said
  - certain ones were saying
  lexicon: BDAG
  rationale: Imperfect ἔλεγον suggests ongoing/repeated speech in the scene, so 'were saying' better reflects aspect than simple past 'said.' τινές is naturally 'some' or 'certain ones'; 'some' is idiomatic English.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: οὖν marks discourse continuation/inference. 'So' is natural modern English and preserves the connective force without sounding overly formal.
- source_word: ἐκ τῶν Φαρισαίων
  chosen: of the Pharisees
  alternatives:
  - from the Pharisees
  - among the Pharisees
  lexicon: BDAG
  rationale: The phrase identifies the subgroup from which 'some' came. English idiom prefers 'some of the Pharisees,' though the underlying sense is 'from among the Pharisees.'
- source_word: οὗτος ... ὁ ἄνθρωπος
  chosen: This man
  alternatives:
  - this person
  - this fellow
  lexicon: BDAG
  rationale: ἄνθρωπος here refers specifically to a male individual, so 'man' is gender-accurate and natural. 'This man' preserves the dismissive demonstrative force without adding slang.
- source_word: παρὰ θεοῦ
  chosen: from God
  alternatives:
  - from beside God
  - sent from God
  lexicon: BDAG
  rationale: In Johannine usage, παρά with genitive commonly conveys origin/source in the sense 'from God.' 'Sent from God' would over-interpret, since 'sent' is not explicit here.
- source_word: τηρεῖ
  chosen: keep
  alternatives:
  - observe
  - guard
  lexicon: BDAG
  rationale: For Sabbath observance, 'keep' is the most idiomatic English equivalent and preserves the sense of observing/maintaining a command.
- source_word: τὸ σάββατον
  chosen: the Sabbath
  alternatives:
  - the Sabbath day
  lexicon: BDAG
  rationale: Standard and sufficiently precise rendering for the Jewish day of rest. Adding 'day' is unnecessary in English.
- source_word: ἄλλοι
  chosen: others
  alternatives:
  - other ones
  - some others
  lexicon: BDAG
  rationale: Simple contrastive plural; 'others' is the natural English rendering.
- source_word: Πῶς δύναται
  chosen: How can
  alternatives:
  - How is it possible that
  - How is ... able to
  lexicon: BDAG
  rationale: This idiomatic English question preserves both the interrogative force and the sense of ability/possibility in δύναται.
- source_word: ἁμαρτωλὸς
  chosen: sinful
  alternatives:
  - a sinner
  lexicon: BDAG
  rationale: As an attributive adjective modifying ἄνθρωπος, 'sinful man' is the most direct formal equivalent. 'A sinner' is possible but slightly restructures the Greek.
- source_word: τοιαῦτα σημεῖα
  chosen: such signs
  alternatives:
  - such miraculous signs
  - such miracles
  lexicon: BDAG
  rationale: σημεῖα in John is theologically significant and should be preserved as 'signs' rather than flattened to 'miracles.' 'Such' reflects τοιαῦτα.
- source_word: σχίσμα
  chosen: a division
  alternatives:
  - a split
  - dissension
  lexicon: BDAG
  rationale: σχίσμα denotes a division or split. 'A division' is clear, natural, and preserves the relational fracture without sounding colloquial.
- source_word: ἐν αὐτοῖς
  chosen: among them
  alternatives:
  - in them
  lexicon: BDAG
  rationale: English idiom requires 'among them' for division within a group; this accurately conveys the internal social sense of ἐν αὐτοῖς.
