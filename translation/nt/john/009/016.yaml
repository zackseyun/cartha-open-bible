theological_decisions:
- issue: Rendering Johannine σημεῖα
  chosen_reading: signs
  alternative_readings:
  - miracles
  - miraculous signs
  rationale: John regularly uses σημεῖα with theological weight, pointing beyond the act to its revelatory significance. 'Signs' best preserves that Johannine nuance without importing extra wording into the text.
  doctrine_reference: Translation philosophy §1, §5
- issue: Statement about Jesus being 'from God'
  chosen_reading: from God
  alternative_readings:
  - sent from God
  rationale: The Pharisees' claim concerns divine origin/authorization. Rendering it as 'from God' preserves the wording and theological tension without expanding it into the more specific Johannine mission language 'sent from God.'
  doctrine_reference: Translation philosophy §3
