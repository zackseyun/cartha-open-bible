id: JHN.9.9
reference: John 9:9
source:
  edition: SBLGNT
  text: ἄλλοι ἔλεγον ὅτι Οὗτός ἐστιν· ἄλλοι ⸂ἔλεγον· Οὐχί, ἀλλὰ⸃ ὅμοιος αὐτῷ ἐστιν. ἐκεῖνος ἔλεγεν ὅτι Ἐγώ εἰμι.
translation:
  text: Some were saying[a], “This is he.” Others were saying, “No, but he is like him.” He kept saying, “I am he.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more literally, “I am.” Here the sense is ordinary self-identification: the man is saying that he is the one they are discussing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλοι
  chosen: Some / Others
  alternatives:
  - Others
  lexicon: BDAG
  rationale: Used distributively to contrast different groups in the crowd. Rendering the first instance as 'Some' and the second as 'Others' is natural English and preserves the contrast.
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated speech in the crowd, so 'were saying' best captures the scene without overtranslating.
- source_word: ὅτι
  chosen: quotation marker rendered with punctuation
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces direct discourse here. English idiom prefers quotation punctuation rather than an explicit 'that' before the quoted words.
- source_word: Οὗτός ἐστιν
  chosen: This is he
  alternatives:
  - This is the man
  - This is him
  lexicon: BDAG
  rationale: The Greek is terse and deictic. 'This is he' preserves the direct identification without adding 'the man,' which is not explicit in the Greek. 'This is him' is colloquial but less formal than the register here.
- source_word: Οὐχί
  chosen: 'No'
  alternatives:
  - No indeed
  - Not so
  lexicon: BDAG
  rationale: A straightforward emphatic negation in dialogue; 'No' is the clearest modern equivalent.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  lexicon: BDAG
  rationale: Marks contrast with the previous claim. 'But' is the most natural English connector in this exchange.
- source_word: ὅμοιος αὐτῷ ἐστιν
  chosen: he is like him
  alternatives:
  - he resembles him
  - he is similar to him
  lexicon: BDAG
  rationale: ὅμοιος with the dative expresses similarity, not identity. 'He is like him' is transparent and preserves the distinction being made by the speakers.
- source_word: ἐκεῖνος
  chosen: He
  alternatives:
  - That man
  - That one
  lexicon: BDAG
  rationale: Refers to the man under discussion, now speaking for himself. English normally uses 'He' rather than the more wooden 'That one' in this context.
- source_word: ἔλεγεν
  chosen: kept saying
  alternatives:
  - was saying
  - said
  lexicon: BDAG
  rationale: The imperfect here likely conveys repeated insistence in response to the crowd's debate. 'Kept saying' captures that iterative force more clearly than simple 'said.'
- source_word: Ἐγώ εἰμι
  chosen: I am he
  alternatives:
  - I am
  - It is I
  lexicon: BDAG
  rationale: 'In this context the phrase functions as self-identification: the man is affirming that he is the person in question. ''I am he'' communicates the implied predicate in natural English. The more literal ''I am'' could be misunderstood here as carrying a theological absolute sense that the immediate context does not require.'
