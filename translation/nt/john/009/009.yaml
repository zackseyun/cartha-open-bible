theological_decisions:
- issue: Rendering of Ἐγώ εἰμι in a Johannine context
  chosen_reading: I am he
  alternative_readings:
  - I am
  - It is I
  rationale: Although ἐγώ εἰμι can bear heightened significance elsewhere in John, here the immediate narrative context is a dispute over the man's identity. The speaker is the healed blind man identifying himself, so the contextual sense is ordinary self-identification rather than a christological claim. The translation therefore supplies the implied predicate in English.
  doctrine_reference: Preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.
