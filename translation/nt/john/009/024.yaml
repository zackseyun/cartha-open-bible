id: JHN.9.24
reference: John 9:24
source:
  edition: SBLGNT
  text: Ἐφώνησαν οὖν ⸂τὸν ἄνθρωπον ἐκ δευτέρου⸃ ὃς ἦν τυφλὸς καὶ εἶπαν αὐτῷ· Δὸς δόξαν
    τῷ θεῷ· ἡμεῖς οἴδαμεν ὅτι ⸂οὗτος ὁ ἄνθρωπος⸃ ἁμαρτωλός ἐστιν.
translation:
  text: So they called the man who had been blind a second time and said to him, “Give
    glory to God; we know that this man is a sinner.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or possibly an idiomatic adjuration: “Give God the glory,” that is, “Tell
      the truth before God” or “Confess openly before God.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐφώνησαν
  chosen: they called
  alternatives:
  - they summoned
  lexicon: BDAG
  rationale: φωνέω here introduces the authorities calling the healed man back before
    them. 'Called' is the most natural English equivalent; 'summoned' is possible
    but slightly over-specifies official force not explicit in the verb itself.
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: οὖν marks narrative progression/inference from the prior exchange. 'So'
    fits readable modern English while preserving the connective force.
- source_word: τὸν ἄνθρωπον
  chosen: the man
  alternatives:
  - the person
  lexicon: BDAG
  rationale: ἄνθρωπος here refers to a specific male individual, so 'the man' is both
    natural and gender-accurate.
- source_word: ἐκ δευτέρου
  chosen: a second time
  alternatives:
  - again
  - for the second time
  lexicon: BDAG
  rationale: The idiom means 'for the second time.' 'A second time' is concise and
    idiomatic English.
- source_word: ὃς ἦν τυφλός
  chosen: who had been blind
  alternatives:
  - who was blind
  lexicon: BDAG
  rationale: Although the Greek uses an imperfect ('was blind'), in context the man
    has now been healed, so English naturally uses pluperfect-like sense, 'had been
    blind,' to reflect his prior condition without implying he remains blind.
- source_word: Δὸς δόξαν τῷ θεῷ
  chosen: Give glory to God
  alternatives:
  - Give God the glory
  - Tell the truth before God
  lexicon: BDAG
  rationale: The phrase is a known idiom of solemn truth-telling or confession (cf.
    Josh 7:19), but its literal wording is 'Give glory to God.' Following optimal
    equivalence and auditability, the main text preserves the literal form, while
    the idiomatic force is noted in a footnote.
- source_word: ἡμεῖς οἴδαμεν
  chosen: we know
  alternatives:
  - we are certain
  lexicon: BDAG
  rationale: The emphatic pronoun plus οἴδαμεν expresses the speakers' asserted certainty.
    'We know' preserves both the lexical meaning and rhetorical force.
- source_word: οὗτος ὁ ἄνθρωπος
  chosen: this man
  alternatives:
  - this fellow
  lexicon: BDAG
  rationale: The demonstrative plus noun is naturally rendered 'this man.' More pejorative
    English options would import tone beyond what the Greek explicitly states.
- source_word: ἁμαρτωλός
  chosen: a sinner
  alternatives:
  - sinful
  - a sinful man
  lexicon: BDAG
  rationale: Predicate adjective used substantivally in English is best rendered 'a
    sinner.' This preserves the accusation without softening it to the more abstract
    'sinful'.
