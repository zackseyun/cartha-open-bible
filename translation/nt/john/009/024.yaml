theological_decisions:
- issue: Idiomatic force of Δὸς δόξαν τῷ θεῷ
  chosen_reading: Retain the literal wording 'Give glory to God' in the main text
  alternative_readings:
  - Use an interpretive rendering such as 'Tell the truth before God' or 'Confess
    before God'
  rationale: The expression likely functions as a solemn adjuration to speak truthfully,
    but the Greek wording itself is doxological. To avoid importing more interpretation
    than the text explicitly states, the main text keeps the literal phrase and preserves
    the idiomatic sense in a footnote. This follows the project's optimal-equivalence
    philosophy and its commitment to preserve tension rather than over-resolve it.
  doctrine_reference: Translation philosophy §§1, 3, 6
