id: JHN.9.12
reference: John 9:12
source:
  edition: SBLGNT
  text: ⸂καὶ εἶπαν⸃ αὐτῷ· Ποῦ ἐστιν ἐκεῖνος; λέγει· Οὐκ οἶδα.
translation:
  text: And they said to him[a], “Where is that man?” He says, “I do not know.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Where is he?” The Greek has “that one,” a demonstrative that may be rendered more literally but less idiomatically.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Standard connective linking this response to the preceding narrative. 'And' preserves the simple coordination without adding interpretive force.
- source_word: εἶπαν
  chosen: they said
  alternatives:
  - they asked
  lexicon: BDAG
  rationale: λέγω here introduces direct speech. Although the content is a question, 'said' is the more direct lexical equivalent and avoids over-specifying beyond the Greek.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Dative indirect object referring to the healed man; straightforwardly rendered 'to him.'
- source_word: Ποῦ
  chosen: Where
  lexicon: BDAG
  rationale: Interrogative adverb of place, directly rendered 'Where.'
- source_word: ἐκεῖνος
  chosen: that man
  alternatives:
  - he
  - that one
  lexicon: BDAG
  rationale: Demonstrative pronoun used substantivally. 'That man' brings out the deictic force in natural English and fits the context, where the speakers refer to Jesus somewhat distantly. 'He' would underrepresent the demonstrative emphasis; 'that one' is less idiomatic.
- source_word: λέγει
  chosen: He says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Present-tense historical present is common in Johannine narrative. Rendering it as 'He says' preserves the vividness of the Greek; English can naturally accommodate this in narrative dialogue.
- source_word: Οὐκ οἶδα
  chosen: I do not know
  alternatives:
  - I don't know
  lexicon: BDAG
  rationale: Direct and formal enough for readable modern English while preserving the plain sense. Expanded form is preferred over contraction for narrative dignity.
