theological_decisions:
- issue: Gender rendering of ἄνθρωπον
  chosen_reading: a man
  alternative_readings:
  - a person
  rationale: The Greek term can be generic in some contexts, but here it refers to
    a specific individual presented as male in the narrative. Following the doctrine's
    gender-accurate principle, 'a man' best matches the source and context.
