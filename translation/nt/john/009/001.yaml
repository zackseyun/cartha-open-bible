id: JHN.9.1
reference: John 9:1
source:
  edition: SBLGNT
  text: Καὶ παράγων εἶδεν ἄνθρωπον τυφλὸν ἐκ γενετῆς.
translation:
  text: And as he was passing by, he saw a man blind from birth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'passing by'; the Greek participle portrays Jesus in the act of going
      along when he saw the man.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: Standard connective retained to preserve narrative flow with the preceding
    context; simple 'And' is natural and sufficiently formal.
- source_word: παράγων
  chosen: as he was passing by
  alternatives:
  - passing by
  - going along
  lexicon: BDAG
  rationale: Present active participle is rendered with a temporal sense in idiomatic
    English, expressing action contemporaneous with the main verb εἶδεν. 'As he was
    passing by' preserves the ongoing/background force better than the bare 'passing
    by' in main text English.
- source_word: εἶδεν
  chosen: he saw
  alternatives:
  - he noticed
  lexicon: BDAG
  rationale: Aorist indicative of ὁράω is straightforwardly rendered 'he saw.' 'Noticed'
    is possible contextually but adds interpretive nuance not required by the Greek.
- source_word: ἄνθρωπον
  chosen: a man
  alternatives:
  - a person
  - a human being
  lexicon: BDAG
  rationale: Although ἄνθρωπος can mean 'person/human,' here the singular accusative
    in narrative about a specific adult male is most naturally 'a man.' This also
    accords with the gender-accurate policy rather than flattening to gender-neutral
    language without textual warrant.
- source_word: τυφλὸν
  chosen: blind
  alternatives:
  - a blind man
  lexicon: BDAG
  rationale: 'Predicate-like adjective modifying ἄνθρωπον is best rendered attributively
    in English: ''a man blind from birth.'' This avoids unnecessary repetition while
    preserving the description.'
- source_word: ἐκ γενετῆς
  chosen: from birth
  alternatives:
  - since birth
  - from his birth
  lexicon: BDAG
  rationale: Idiomatic expression meaning congenital blindness. 'From birth' is concise,
    natural English and accurately conveys the sense of blindness existing from the
    time of birth.
