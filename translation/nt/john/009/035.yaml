theological_decisions:
- issue: Reading of the christological title in the question
  chosen_reading: the Son of Man
  alternative_readings:
  - the Son of God
  rationale: The SBLGNT text reads ἀνθρώπου ('Man'), and this reading is followed
    in the main text. A well-known textual variant reads 'Son of God'; because the
    variant is significant and historically influential, it is preserved in a footnote
    rather than adopted in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    significant alternatives in footnotes.
