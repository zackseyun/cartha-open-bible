id: JHN.9.35
reference: John 9:35
source:
  edition: SBLGNT
  text: ⸀Ἤκουσεν Ἰησοῦς ὅτι ἐξέβαλον αὐτὸν ἔξω, καὶ εὑρὼν αὐτὸν ⸀εἶπεν· Σὺ πιστεύεις
    εἰς τὸν υἱὸν τοῦ ⸀ἀνθρώπου;
translation:
  text: Jesus heard that they had thrown him out, and when he found him, he said,
    “Do you believe in the Son of Man?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read “the Son of God” instead of “the Son of Man.”
    reason: textual_variant
lexical_decisions:
- source_word: ἐξέβαλον ... ἔξω
  chosen: had thrown him out
  alternatives:
  - had cast him out
  - had put him out
  lexicon: BDAG
  rationale: The combination of ἐκβάλλω with ἔξω is emphatic, indicating expulsion.
    'Thrown him out' captures the force in natural modern English better than the
    more wooden 'cast him out,' while preserving the social exclusion implied in context.
- source_word: εὑρὼν
  chosen: when he found him
  alternatives:
  - having found him
  - after finding him
  lexicon: BDAG
  rationale: The aorist participle is most naturally rendered with temporal force
    in English here. 'When he found him' is idiomatic and preserves the sequence of
    action without unnecessary stiffness.
- source_word: Σὺ πιστεύεις
  chosen: Do you believe
  alternatives:
  - Do you trust
  - Are you believing
  lexicon: BDAG
  rationale: πιστεύω is best rendered here as 'believe,' the standard and contextually
    appropriate gloss. The explicit pronoun Σὺ adds emphasis, but English can convey
    the question naturally without overtranslating it as 'You—do you believe...?'
    The emphasis is retained by the direct address.
- source_word: εἰς
  chosen: in
  alternatives:
  - into
  - 'on'
  lexicon: BDAG
  rationale: With πιστεύω, εἰς commonly expresses personal trust directed toward someone.
    In idiomatic English, 'believe in' is the clearest equivalent.
- source_word: υἱὸν τοῦ ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - the Son of Humanity
  lexicon: BDAG
  rationale: This is the established and most accurate rendering of the titular expression,
    preserving both its idiomatic force and its intertextual resonance with Daniel
    7 and Johannine usage. 'Son of Humanity' is possible in a more interpretive translation
    but is less natural and less recognizable as the title.
