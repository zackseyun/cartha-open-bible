id: JHN.9.28
reference: John 9:28
source:
  edition: SBLGNT
  text: ⸀ἐλοιδόρησαν αὐτὸν καὶ εἶπον· Σὺ ⸂μαθητὴς εἶ⸃ ἐκείνου, ἡμεῖς δὲ τοῦ Μωϋσέως
    ἐσμὲν μαθηταί·
translation:
  text: They reviled him and said, “You are that man's disciple, but we are disciples
    of Moses.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'You are his disciple.' The Greek says 'that one's/that man's,' which
      may carry a dismissive tone here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλοιδόρησαν
  chosen: They reviled
  alternatives:
  - They insulted
  - They abused verbally
  lexicon: BDAG
  rationale: λοιδορέω denotes speaking abusively or heaping verbal reproach on someone.
    'Reviled' preserves the severity and public contempt better than the milder 'insulted,'
    while remaining natural English.
- source_word: αὐτὸν
  chosen: him
  rationale: Direct object pronoun referring to the man who had been healed; standard
    English object pronoun.
- source_word: καὶ εἶπον
  chosen: and said
  alternatives:
  - and they said
  rationale: Straightforward narrative coordination; English can omit the repeated
    subject because it is clear from context.
- source_word: Σὺ
  chosen: You
  rationale: Fronted pronoun is emphatic in Greek. English preserves this naturally
    by explicit 'You' at the start of the clause.
- source_word: μαθητὴς
  chosen: disciple
  alternatives:
  - follower
  - student
  lexicon: BDAG
  rationale: μαθητής commonly means 'disciple' in John, carrying not merely educational
    but allegiance-oriented force. 'Follower' is possible but loses the lexical consistency
    of the term in Johannine usage.
- source_word: ἐκείνου
  chosen: that man's
  alternatives:
  - his
  - that one's
  - that fellow's
  lexicon: BDAG
  rationale: The demonstrative is somewhat distancing and dismissive in this hostile
    context. 'That man's' captures the contemptuous distance better than the neutral
    'his' and is more idiomatic than 'that one's.'
- source_word: ἡμεῖς δὲ
  chosen: but we
  alternatives:
  - whereas we
  - but as for us
  rationale: δέ marks contrast. 'But we' preserves the adversative force and the emphatic
    pronoun without sounding wooden.
- source_word: τοῦ Μωϋσέως
  chosen: of Moses
  alternatives:
  - Moses'
  rationale: Genitive of association/relationship with μαθηταί. 'Disciples of Moses'
    is the most idiomatic and transparent rendering in English.
- source_word: ἐσμὲν μαθηταί
  chosen: are disciples
  alternatives:
  - are followers
  lexicon: BDAG
  rationale: Retains the copular structure and keeps μαθητής consistent as 'disciple'
    in both halves of the contrast.
