theological_decisions:
- issue: Tone of ἐκείνου in reference to Jesus
  chosen_reading: Rendered as 'that man's' to preserve the speakers' dismissive, hostile
    distancing.
  alternative_readings:
  - Rendered neutrally as 'his' or 'that one’s'
  rationale: The verse contrasts allegiance to Jesus with allegiance to Moses in a
    polemical setting. The Greek demonstrative can be translated more neutrally, but
    the context of reviling supports an English rendering that reflects contempt without
    adding content beyond the text.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering μαθητής consistently
  chosen_reading: Used 'disciple' for both occurrences.
  alternative_readings:
  - Used 'follower' or 'student'
  rationale: The term denotes committed attachment, not merely classroom learning.
    Consistency across the verse preserves the rhetorical contrast and aligns with
    the project's consistency principle.
  doctrine_reference: Translation philosophy §5
