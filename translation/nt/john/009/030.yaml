theological_decisions:
- issue: Potential metaphorical resonance of 'opened my eyes' in Johannine context
  chosen_reading: Retain the literal healing expression without making the metaphor explicit
  alternative_readings:
  - Render in a way that foregrounds spiritual enlightenment
  rationale: The immediate referent is the man's physical healing. John's broader theme of sight and blindness is real, but the translation should preserve the narrative statement and allow the theological resonance to emerge from context rather than importing it into the wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
