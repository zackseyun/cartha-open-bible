id: JHN.9.30
reference: John 9:30
source:
  edition: SBLGNT
  text: ἀπεκρίθη ὁ ἄνθρωπος καὶ εἶπεν αὐτοῖς· Ἐν ⸂τούτῳ γὰρ τὸ⸃ θαυμαστόν ἐστιν ὅτι ὑμεῖς οὐκ οἴδατε πόθεν ἐστίν, καὶ ἤνοιξέν μου τοὺς ὀφθαλμούς.
translation:
  text: 'The man answered and said to them[a], “This is the remarkable thing: you do not know where he is from[b], and yet he opened my eyes.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “This is the astonishing thing.”
    reason: lexical_alternative
  - marker: b
    text: Or “where he comes from.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative verb for responding. 'Answered' preserves the formal dialogue structure common in John.
- source_word: ὁ ἄνθρωπος
  chosen: The man
  alternatives:
  - the person
  lexicon: BDAG
  rationale: Refers specifically to the man born blind in the narrative. 'Man' is gender-accurate and natural in context.
- source_word: εἶπεν αὐτοῖς
  chosen: said to them
  alternatives:
  - told them
  lexicon: BDAG
  rationale: A straightforward rendering of λέγω with indirect object; 'said to them' avoids adding force not present in the Greek.
- source_word: Ἐν τούτῳ ... τὸ θαυμαστόν ἐστιν
  chosen: This is the remarkable thing
  alternatives:
  - In this is the marvelous thing
  - This is the astonishing thing
  lexicon: BDAG
  rationale: The idiom ἐν τούτῳ points to the matter under discussion; rendering it as 'This is...' gives clear English while preserving the demonstrative emphasis. θαυμαστόν denotes something astonishing or remarkable. 'Remarkable' is readable modern English and fits the ironic tone of the healed man's response.
- source_word: γὰρ
  chosen: —
  alternatives:
  - for
  lexicon: BDAG
  rationale: γάρ is left implicit in English because the explanatory force is adequately conveyed by the clause structure and punctuation. Explicit 'for' would sound stilted here.
- source_word: ὅτι
  chosen: ':'
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces the content of what is remarkable. A colon in English naturally signals the explanatory content without awkwardness.
- source_word: ὑμεῖς
  chosen: you
  lexicon: BDAG
  rationale: The pronoun is explicit in Greek for emphasis. English can preserve the force by retaining 'you' in a contrastive position within the sentence.
- source_word: οὐκ οἴδατε
  chosen: do not know
  alternatives:
  - do not understand
  lexicon: BDAG
  rationale: οἶδα here concerns lack of knowledge about Jesus' origin, not mere misunderstanding. 'Do not know' is the plain sense.
- source_word: πόθεν ἐστίν
  chosen: where he is from
  alternatives:
  - where he comes from
  - his origin
  lexicon: BDAG
  rationale: πόθεν asks about source/origin. 'Where he is from' is idiomatic English and preserves the personal reference to Jesus.
- source_word: καὶ
  chosen: and yet
  alternatives:
  - and
  lexicon: BDAG
  rationale: 'Though καί is formally ''and,'' the context is strongly adversative and ironic: despite their claimed expertise, Jesus healed him. ''And yet'' brings out the discourse force in natural English without overtranslation.'
- source_word: ἤνοιξέν μου τοὺς ὀφθαλμούς
  chosen: he opened my eyes
  alternatives:
  - he opened my eyes up
  lexicon: BDAG
  rationale: Literal and idiomatic. In context it refers to physical healing, though the narrative also carries irony about spiritual sight; the translation should not force the metaphor into the wording.
