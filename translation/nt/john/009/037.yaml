id: JHN.9.37
reference: John 9:37
source:
  edition: SBLGNT
  text: ⸀εἶπεν αὐτῷ ὁ Ἰησοῦς· Καὶ ἑώρακας αὐτὸν καὶ ὁ λαλῶν μετὰ σοῦ ἐκεῖνός ἐστιν.
translation:
  text: Jesus said to him, “You have seen him, and the one speaking with you is he.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the one speaking to you is he.' The Greek more literally says 'speaking
      with you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  chosen: said
  alternatives:
  - told
  lexicon: BDAG
  rationale: Aorist of λέγω is most naturally rendered 'said' in straightforward narrative
    dialogue. 'Told' would over-specify indirect object force beyond the Greek.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Dative pronoun marking the addressee; 'to him' is the natural English
    equivalent.
- source_word: Καὶ
  chosen: and
  alternatives:
  - indeed
  - also
  lexicon: BDAG
  rationale: Here καί links two coordinated assertions. Rendering the first instance
    as 'and' preserves the Greek structure without adding emphasis not required by
    the context.
- source_word: ἑώρακας
  chosen: you have seen
  alternatives:
  - you saw
  lexicon: BDAG
  rationale: Perfect active indicative of ὁράω conveys a completed act with present
    relevance. English present perfect best reflects this nuance better than simple
    past.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object pronoun referring to the Son of Man/Messiah figure just
    mentioned in context; simple masculine singular 'him' is required.
- source_word: ὁ λαλῶν
  chosen: the one speaking
  alternatives:
  - he who is speaking
  - the one talking
  lexicon: BDAG
  rationale: Substantival present participle is well represented by 'the one speaking.'
    'Talking' is slightly less weighty/register-appropriate; 'he who is speaking'
    is more formal but less natural.
- source_word: μετὰ σοῦ
  chosen: with you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: μετά with genitive normally means 'with.' Although idiomatic English
    might say 'speaking to you,' the Greek explicitly says 'with you,' which is natural
    enough in English and preserves the wording.
- source_word: ἐκεῖνός ἐστιν
  chosen: is he
  alternatives:
  - is the one
  - that is he
  lexicon: BDAG
  rationale: This identification formula is concise and emphatic. 'Is he' preserves
    the direct self-identification without importing the supplied object ('the Son
    of Man') into the clause. 'That is he' is possible but less idiomatic here.
