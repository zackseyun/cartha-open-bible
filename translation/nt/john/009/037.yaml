theological_decisions:
- issue: Self-identification of Jesus in response to the man's question about the
    Son of Man in the immediate context
  chosen_reading: 'Render the statement as a direct but not over-expanded identification:
    ''the one speaking with you is he.'''
  alternative_readings:
  - '''it is he who is speaking to you'''
  - '''you are looking at him; he is speaking with you'''
  rationale: The Greek identifies Jesus with the referent of the prior question without
    restating the title in this verse. The translation should preserve the force of
    revelation while avoiding interpretive expansion beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
