theological_decisions:
- issue: Scope of the statement 'God does not listen to sinners'
  chosen_reading: Render the claim as stated, without softening or systematizing it beyond the speaker's assertion in context.
  alternative_readings:
  - God does not hear the prayers of sinners
  - God does not approve of sinners
  rationale: The Greek says simply that God does not 'listen to' sinners, contrasted with listening to the God-fearing doer of his will. The translation should preserve the statement's force without importing a broader doctrinal formulation about every possible sense in which God may hear or know sinners.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of θεοσεβής
  chosen_reading: God-fearing
  alternative_readings:
  - worshiper of God
  rationale: The term can be rendered either way, but 'God-fearing' better preserves the adjective's reverential sense while avoiding a potentially narrower cultic nuance. The alternative is worth preserving in a footnote because many English versions use 'worshiper of God.'
  doctrine_reference: Original-language primacy over translation tradition; readable modern English, not archaic or academic.
