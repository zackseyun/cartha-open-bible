id: JHN.9.31
reference: John 9:31
source:
  edition: SBLGNT
  text: ⸀οἴδαμεν ὅτι ⸂ἁμαρτωλῶν ὁ θεὸς⸃ οὐκ ἀκούει, ἀλλ’ ἐάν τις θεοσεβὴς ᾖ καὶ τὸ θέλημα αὐτοῦ ποιῇ τούτου ἀκούει.
translation:
  text: We know that God does not listen to sinners; but if anyone is God-fearing and does his will[a], he listens to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “a worshiper of God.”
    reason: lexical_alternative
lexical_decisions:
- source_word: οἴδαμεν
  chosen: We know
  alternatives:
  - We have known
  - We are aware
  lexicon: BDAG
  rationale: Perfect-form οἶδα functions with present sense in Koine; 'We know' is the natural English equivalent.
- source_word: ἁμαρτωλῶν
  chosen: sinners
  alternatives:
  - sinful people
  lexicon: BDAG
  rationale: Genitive plural with ἀκούει expresses the class of persons in view. 'Sinners' is the standard, concise rendering and preserves the moral-religious force.
- source_word: ἀκούει
  chosen: listen to
  alternatives:
  - hear
  - heed
  lexicon: BDAG
  rationale: In this context ἀκούω with a personal object refers not merely to auditory perception but to hearing favorably or responding. 'Listen to' communicates that sense in clear modern English without overinterpreting as 'answer.'
- source_word: θεοσεβὴς
  chosen: God-fearing
  alternatives:
  - devout
  - reverent toward God
  - worshiper of God
  lexicon: BDAG
  rationale: θεοσεβής denotes one who reveres God. 'God-fearing' is idiomatic, preserves the explicit God-reference, and avoids narrowing the sense to cultic worship alone. 'Worshiper of God' is possible, but 'God-fearing' better matches the adjective's broader reverential sense.
- source_word: τὸ θέλημα αὐτοῦ ποιῇ
  chosen: does his will
  alternatives:
  - does what he wants
  - practices his will
  lexicon: BDAG
  rationale: A standard rendering of the idiom ποιεῖν τὸ θέλημα. 'Does his will' is both natural and close to the Greek.
- source_word: τούτου ἀκούει
  chosen: he listens to him
  alternatives:
  - he hears him
  - he heeds such a person
  lexicon: BDAG
  rationale: τούτου is an emphatic genitive referring back to the God-fearing person. Repeating 'listen to' maintains consistency with the earlier ἀκούει and preserves the relational sense.
- source_word: ἀλλ’ ἐάν τις
  chosen: but if anyone
  alternatives:
  - but if someone
  - rather, if anyone
  lexicon: BDAG
  rationale: This introduces the contrasting conditional clause. 'But if anyone' is straightforward and preserves the indefinite singular.
