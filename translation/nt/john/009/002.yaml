id: JHN.9.2
reference: John 9:2
source:
  edition: SBLGNT
  text: καὶ ἠρώτησαν αὐτὸν οἱ μαθηταὶ αὐτοῦ λέγοντες· Ῥαββί, τίς ἥμαρτεν, οὗτος ἢ
    οἱ γονεῖς αὐτοῦ, ἵνα τυφλὸς γεννηθῇ;
translation:
  text: And his disciples asked him, saying, “Rabbi, who sinned, this man or his parents,
    that he should be born blind?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'so that he was born blind.' The Greek clause can express the assumed
      purpose/result relationship in the disciples' question.
    reason: alternative_reading
lexical_decisions:
- source_word: ἠρώτησαν
  chosen: asked
  alternatives:
  - questioned
  - inquired of
  lexicon: BDAG
  rationale: Aorist indicative of ἐρωτάω here introduces a straightforward question
    to Jesus. 'Asked' is the most natural modern English equivalent without adding
    formality or intensity not required by the context.
- source_word: μαθηταὶ
  chosen: disciples
  alternatives:
  - learners
  lexicon: BDAG
  rationale: '''Disciples'' is the established and accurate rendering for μαθηταί
    in Gospel narrative, preserving the teacher-follower relationship better than
    the flatter ''learners.'''
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle is naturally carried into English as 'saying,' preserving
    the Greek narrative flow. 'And said' would be acceptable but slightly smooths
    over the participial construction.
- source_word: Ῥαββί
  chosen: Rabbi
  alternatives:
  - Teacher
  lexicon: BDAG
  rationale: Per translation philosophy, personal names are transliterated and titles
    are translated; however, Ῥαββί functions here as a Jewish form of address with
    strong historical texture and is commonly preserved in English. 'Rabbi' retains
    the setting and is readily understood.
- source_word: τίς
  chosen: who
  alternatives:
  - which one
  lexicon: BDAG
  rationale: The interrogative asks for the responsible party. 'Who' is the direct
    and idiomatic equivalent.
- source_word: ἥμαρτεν
  chosen: sinned
  alternatives:
  - committed sin
  lexicon: BDAG
  rationale: The aorist of ἁμαρτάνω is best rendered simply as 'sinned.' English does
    not require an expanded phrase here.
- source_word: οὗτος
  chosen: this man
  alternatives:
  - this one
  - he
  lexicon: BDAG
  rationale: Although the Greek says literally 'this one,' in context it refers to
    the blind man. 'This man' is idiomatic and clear in English, avoiding ambiguity.
- source_word: γονεῖς
  chosen: parents
  alternatives:
  - father and mother
  lexicon: BDAG
  rationale: γονεῖς is the standard plural term for one's parents. 'Parents' is concise
    and accurate.
- source_word: ἵνα
  chosen: that
  alternatives:
  - so that
  - with the result that
  lexicon: BDAG
  rationale: Here ἵνα reflects the disciples' assumed connection between sin and congenital
    blindness, expressing contemplated result/purpose from their perspective. 'That'
    best captures the English idiom in the question ('who sinned ... that he should
    be born blind?') without over-specifying purpose.
- source_word: τυφλὸς
  chosen: blind
  alternatives:
  - a blind person
  lexicon: BDAG
  rationale: Predicate adjective describing the condition at birth. 'Blind' is the
    direct equivalent.
- source_word: γεννηθῇ
  chosen: should be born
  alternatives:
  - was born
  - might be born
  lexicon: BDAG
  rationale: Aorist passive subjunctive governed by ἵνα. In English, 'should be born'
    preserves the subordinate, contemplated sense better than the flatter 'was born,'
    while remaining natural in this question.
