theological_decisions:
- issue: Causal nuance of ἵνα in the disciples' question about sin and congenital
    blindness
  chosen_reading: Rendered as 'that he should be born blind' to preserve the disciples'
    assumed linkage without asserting the theology as narrator-approved causation.
  alternative_readings:
  - so that he was born blind
  - resulting in his being born blind
  rationale: The verse reports the disciples' question, not a doctrinal endorsement
    that personal or parental sin directly caused the blindness. The translation preserves
    their wording and conceptual framework without importing a stronger theological
    claim than the Greek requires.
  doctrine_reference: Preserve theological tension rather than resolve it.
