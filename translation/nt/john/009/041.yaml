theological_decisions:
- issue: Whether to make explicit that 'blind' refers to spiritual blindness and that
    'sin' refers to culpability before God
  chosen_reading: Retain the literal terms 'blind' and 'sin' in the main text without
    interpretive expansion.
  alternative_readings:
  - If you were spiritually blind, you would not be guilty of sin.
  - If you were blind, you would not be guilty.
  rationale: The context clearly concerns spiritual perception, but Jesus' wording
    intentionally uses the physical-blindness metaphor developed through the chapter.
    Expanding to 'spiritually blind' or 'guilty' in the main text would resolve the
    metaphor and narrow the polyvalence of ἁμαρτία beyond what the Greek states. This
    preserves theological tension and Johannine style.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
