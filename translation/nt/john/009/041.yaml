id: JHN.9.41
reference: John 9:41
source:
  edition: SBLGNT
  text: εἶπεν αὐτοῖς ὁ Ἰησοῦς· Εἰ τυφλοὶ ἦτε, οὐκ ἂν εἴχετε ἁμαρτίαν· νῦν δὲ λέγετε
    ὅτι Βλέπομεν· ⸀ἡ ἁμαρτία ὑμῶν μένει.
translation:
  text: Jesus said to them, “If you were blind, you would not have sin. But now you
    say, ‘We see,’ so your sin remains.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you would not have guilt.' The Greek says 'sin,' which here may include
      the sense of culpability.
    reason: lexical_alternative
lexical_decisions:
- source_word: τυφλοὶ
  chosen: blind
  alternatives:
  - spiritually blind
  lexicon: BDAG
  rationale: The adjective literally means 'blind.' In context it carries metaphorical
    force about spiritual perception, but the main text preserves the simple term
    and lets the context supply the metaphor rather than importing an interpretive
    adjective.
- source_word: οὐκ ἂν εἴχετε
  chosen: you would not have
  alternatives:
  - you would not be having
  lexicon: BDAG
  rationale: The imperfect with ἄν in this conditional clause expresses a contrary-to-fact
    result. English idiom is best captured by 'would not have.'
- source_word: ἁμαρτίαν
  chosen: sin
  alternatives:
  - guilt
  lexicon: BDAG
  rationale: ἁμαρτία normally means 'sin.' In this context it can imply culpability,
    but 'sin' is the more direct lexical equivalent and preserves Johannine usage
    without over-specifying the nuance.
- source_word: νῦν δὲ
  chosen: But now
  alternatives:
  - but as it is
  - but now as things stand
  lexicon: BDAG
  rationale: This marks the contrast between the hypothetical condition and the present
    reality. 'But now' is concise and natural.
- source_word: λέγετε ὅτι Βλέπομεν
  chosen: you say, ‘We see,’
  alternatives:
  - you claim, ‘We see’
  - you say that you see
  lexicon: BDAG
  rationale: The Greek shifts from second person plural ('you say') to first person
    plural direct speech ('we see'). Preserving the quotation reflects the rhetoric
    and irony of the statement.
- source_word: ἡ ἁμαρτία ὑμῶν μένει
  chosen: your sin remains
  alternatives:
  - your sin stays
  - your guilt remains
  lexicon: BDAG
  rationale: μένει is a key Johannine verb often rendered 'remains' or 'abides.' 'Remains'
    is natural here and preserves the continuing state implied by the present tense.
    'Your sin' follows the Greek word order sense without awkwardness.
