id: JHN.9.4
reference: John 9:4
source:
  edition: SBLGNT
  text: ⸀ἡμᾶς δεῖ ἐργάζεσθαι τὰ ἔργα τοῦ πέμψαντός με ἕως ἡμέρα ἐστίν· ἔρχεται νὺξ
    ὅτε οὐδεὶς δύναται ἐργάζεσθαι.
translation:
  text: We must do the works of the one who sent me while it is day; night is coming,
    when no one can work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read, 'I must do the works of the one who sent me.'
    reason: textual_variant
lexical_decisions:
- source_word: ἡμᾶς
  chosen: We
  alternatives:
  - I
  - us
  lexicon: BDAG
  rationale: The earliest-attested SBLGNT reading is first person plural accusative
    with δεῖ, yielding 'it is necessary for us' / 'we must.' This is preferred over
    the well-known variant 'I must,' and the plural is carried into idiomatic English
    as 'We must.'
- source_word: δεῖ
  chosen: must
  alternatives:
  - it is necessary
  - it is necessary for
  lexicon: BDAG
  rationale: Conveys necessity or obligation. 'Must' is the most natural modern English
    equivalent and preserves the force without awkwardness.
- source_word: ἐργάζεσθαι
  chosen: do
  alternatives:
  - work
  - be working
  lexicon: BDAG
  rationale: Although the verb means 'work,' the direct object τὰ ἔργα is cognate
    ('works'), so 'work the works' is clumsy in English. 'Do the works' preserves
    the sense and reads naturally. The second occurrence later in the verse is rendered
    'work' because it lacks a direct object and refers to the activity generally.
- source_word: τὰ ἔργα
  chosen: the works
  alternatives:
  - the deeds
  - the tasks
  lexicon: BDAG
  rationale: '''Works'' is the standard and contextually appropriate rendering in
    Johannine usage, preserving the connection to Jesus'' divinely given works/signs.'
- source_word: τοῦ πέμψαντός με
  chosen: of the one who sent me
  alternatives:
  - of him who sent me
  - of my sender
  lexicon: BDAG
  rationale: The articular participle is best rendered as a substantive phrase. 'The
    one who sent me' is clear modern English and preserves the personal reference
    without over-specifying the subject in the main text.
- source_word: ἕως ἡμέρα ἐστίν
  chosen: while it is day
  alternatives:
  - until it is day
  - as long as it is day
  lexicon: BDAG
  rationale: Idiomatic temporal expression. Given the contrast with the coming night,
    'while it is day' best captures the sense of the available period for action.
- source_word: ἔρχεται νὺξ
  chosen: night is coming
  alternatives:
  - night comes
  - the night is coming
  lexicon: BDAG
  rationale: Present tense with imminent/futuristic force is naturally rendered in
    English as 'is coming.' The anarthrous noun does not require 'the' in English.
- source_word: ὅτε
  chosen: when
  alternatives:
  - at which time
  lexicon: BDAG
  rationale: Standard temporal conjunction introducing the time clause.
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  - no man
  lexicon: BDAG
  rationale: Accurate and natural English for the indefinite negative pronoun. This
    avoids unnecessarily gendered wording where the Greek is not specifically male.
- source_word: δύναται ἐργάζεσθαι
  chosen: can work
  alternatives:
  - is able to work
  - can be working
  lexicon: BDAG
  rationale: Natural English expression of ability. Here 'work' is preferable to 'do
    works' because the verb is absolute and refers broadly to the capacity for activity.
