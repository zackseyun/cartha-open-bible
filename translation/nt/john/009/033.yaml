theological_decisions:
- issue: Meaning of 'from God' in relation to Jesus
  chosen_reading: Retain the source-language expression 'from God' without expanding it.
  alternative_readings:
  - sent by God
  - authorized by God
  rationale: The verse asserts divine source/authorization for Jesus' works, but the Greek phrase itself is broader than a technical statement of mission or ontology. The translation preserves the text's claim without importing additional doctrinal precision not explicitly stated here.
  doctrine_reference: Preserve theological tension rather than resolve it.
