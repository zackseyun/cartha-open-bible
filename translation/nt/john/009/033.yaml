id: JHN.9.33
reference: John 9:33
source:
  edition: SBLGNT
  text: εἰ μὴ ἦν οὗτος παρὰ θεοῦ, οὐκ ἠδύνατο ποιεῖν οὐδέν.
translation:
  text: If this man were not from God[a], he could do nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unless this man were from God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ μὴ
  chosen: If ... not
  alternatives:
  - unless
  lexicon: BDAG
  rationale: Introduces a contrary-to-fact conditional idea in combination with the imperfect verb. 'If ... not' preserves the conditional structure more transparently than the more compressed 'unless.'
- source_word: ἦν
  chosen: were
  alternatives:
  - was
  lexicon: BDAG
  rationale: Although formally imperfect indicative, in English this conditional clause is most naturally rendered with 'were' to convey the unreal or contrary-to-fact sense.
- source_word: οὗτος
  chosen: this man
  alternatives:
  - this one
  - this person
  lexicon: BDAG
  rationale: In context the speaker refers to Jesus, a male individual already under discussion. 'This man' is natural English and reflects the demonstrative's personal reference without overformalizing it as 'this one.'
- source_word: παρὰ θεοῦ
  chosen: from God
  alternatives:
  - from beside God
  - sent by God
  lexicon: BDAG
  rationale: παρά with the genitive commonly denotes source or origin. 'From God' is the most idiomatic and sufficiently precise rendering here. 'Sent by God' would overinterpret the phrase beyond its lexical force.
- source_word: οὐκ ἠδύνατο
  chosen: he could not
  alternatives:
  - he was not able to
  - he would not be able to
  lexicon: BDAG
  rationale: Expresses inability. 'Could not' is concise, idiomatic, and fits the conditional argument. The fuller 'was not able to' is more wooden without adding meaning.
- source_word: ποιεῖν
  chosen: do
  alternatives:
  - perform
  - make
  lexicon: BDAG
  rationale: ποιέω is broad in meaning; here 'do' works naturally with the following object and in the context of miraculous works. 'Perform' is possible but sounds more interpretive and formal.
- source_word: οὐδέν
  chosen: nothing
  alternatives:
  - anything
  lexicon: BDAG
  rationale: With the preceding negation, the Greek yields emphatic total inability. 'Nothing' preserves the force straightforwardly in English.
