id: JHN.9.17
reference: John 9:17
source:
  edition: SBLGNT
  text: λέγουσιν ⸀οὖν τῷ τυφλῷ πάλιν· ⸂Τί σὺ⸃ λέγεις περὶ αὐτοῦ, ὅτι ἠνέῳξέν σου τοὺς
    ὀφθαλμούς; ὁ δὲ εἶπεν ὅτι Προφήτης ἐστίν.
translation:
  text: So they said again to the blind man, “What do you say about him, since he
    opened your eyes?” And he said, “He is a prophet.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “What do you yourself say about him?” The Greek explicitly includes
      “you” for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or, “because he opened your eyes.”
    reason: lexical_alternative
  - marker: c
    text: Or, “He is Prophet.” The Greek may be read with a more title-like force,
      but the context also supports the sense “a prophet.”
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks narrative/logical continuation from the preceding exchange. 'So'
    is natural modern English and preserves the inferential flow without sounding
    overly formal.
- source_word: τῷ τυφλῷ
  chosen: to the blind man
  alternatives:
  - to the blind one
  - to the man who had been blind
  lexicon: BDAG
  rationale: The adjective functions substantivally. 'The blind man' is idiomatic
    and concise. 'The man who had been blind' imports a perspective not explicit in
    this clause, since the speakers identify him by his former condition.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Preserves the sense that this is a repeated question in the ongoing interrogation.
- source_word: Τί σὺ λέγεις
  chosen: What do you say
  alternatives:
  - What do you yourself say
  - What is your opinion
  lexicon: BDAG
  rationale: The explicit σὺ adds emphasis, but English can convey the question naturally
    without overloading the sentence. The more expansive 'What is your opinion' is
    interpretive; 'What do you say' stays closer to the Greek.
- source_word: περὶ αὐτοῦ
  chosen: about him
  alternatives:
  - concerning him
  lexicon: BDAG
  rationale: Standard idiomatic rendering of περί with the genitive in this context.
- source_word: ὅτι
  chosen: since
  alternatives:
  - because
  - that
  lexicon: BDAG
  rationale: 'Here ὅτι introduces the grounds for the question: what he says about
    Jesus in light of the fact that Jesus opened his eyes. ''Since'' communicates
    this causal nuance smoothly in English.'
- source_word: ἠνέῳξέν σου τοὺς ὀφθαλμούς
  chosen: he opened your eyes
  alternatives:
  - he has opened your eyes
  lexicon: BDAG
  rationale: Aorist is best rendered with simple past in this narrative setting. The
    phrase is literal and clear in English.
- source_word: Προφήτης
  chosen: a prophet
  alternatives:
  - Prophet
  lexicon: BDAG
  rationale: 'Anarthrous predicate nominative here is qualitative/indefinite in sense:
    the healed man identifies Jesus as a prophet, not necessarily with a specific
    titular force. Lowercase ''prophet'' avoids implying a fixed messianic title not
    stated in the text.'
