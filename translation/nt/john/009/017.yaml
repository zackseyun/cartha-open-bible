theological_decisions:
- issue: Whether Προφήτης should be rendered as a title ('Prophet') or common noun
    ('a prophet')
  chosen_reading: a prophet
  alternative_readings:
  - Prophet
  rationale: The context presents the man's developing assessment of Jesus, not yet
    a full christological confession. Rendering it 'a prophet' preserves the narrative
    progression and avoids importing a more specific titular claim than the Greek
    requires.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
