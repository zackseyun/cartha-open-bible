theological_decisions:
- issue: Whether to make the metaphorical sense of τυφλοί explicit
  chosen_reading: Retain 'blind' without adding 'spiritually' in the main text
  alternative_readings:
  - spiritually blind
  rationale: The immediate context makes clear that the Pharisees are responding to Jesus' figurative use of blindness, but the Greek leaves the adjective unqualified. Preserving 'blind' maintains the Johannine irony and avoids importing an interpretive gloss into the text itself.
