id: JHN.9.40
reference: John 9:40
source:
  edition: SBLGNT
  text: ⸀ἤκουσαν ἐκ τῶν Φαρισαίων ταῦτα οἱ ⸂μετ’ αὐτοῦ ὄντες⸃, καὶ εἶπον αὐτῷ· Μὴ καὶ ἡμεῖς τυφλοί ἐσμεν;
translation:
  text: Some of the Pharisees who were with him heard these things and said to him[a], “Surely we are not blind too, are we?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “We are not blind too, are we?” The Greek question uses μή, which expects a negative answer.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσαν
  chosen: heard
  alternatives:
  - listened to
  lexicon: BDAG
  rationale: Aorist indicative of ἀκούω here denotes receiving what Jesus said. 'Heard' is the natural English equivalent in narrative context.
- source_word: ἐκ τῶν Φαρισαίων
  chosen: Some of the Pharisees
  alternatives:
  - from among the Pharisees
  - those of the Pharisees
  lexicon: BDAG
  rationale: 'The partitive ἐκ with the genitive indicates a subset: not all Pharisees, but some from among them. ''Some of the Pharisees'' is idiomatic and preserves the partitive force.'
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  - these words
  lexicon: BDAG
  rationale: Plural demonstrative referring to Jesus' preceding statements. 'These things' preserves the plural and avoids over-specifying as only 'words,' though that sense is included.
- source_word: οἱ μετ’ αὐτοῦ ὄντες
  chosen: who were with him
  alternatives:
  - being with him
  - those who were with him
  lexicon: BDAG
  rationale: The articular participial phrase identifies the Pharisees present with Jesus. 'Who were with him' is smooth English and preserves the durative participial sense without awkwardness.
- source_word: εἶπον αὐτῷ
  chosen: said to him
  alternatives:
  - asked him
  lexicon: BDAG
  rationale: λέγω commonly introduces direct speech. Although the content is interrogative, 'said to him' is the straightforward lexical rendering; the question form is conveyed by the quotation itself.
- source_word: Μὴ
  chosen: Surely ... not ... are we?
  alternatives:
  - We are not ... are we?
  - Can it be that ... not ...?
  lexicon: BDAG
  rationale: μή introducing a question normally expects a negative answer. English can reflect this with a negatively oriented tag question. 'Surely' helps convey the incredulous expectation of 'no' without overstating the tone.
- source_word: καὶ
  chosen: too
  alternatives:
  - also
  - even
  lexicon: BDAG
  rationale: 'Here καί links ''we'' with the previously discussed blind persons: ''we too/also.'' ''Too'' is idiomatic in the question''s final position in English.'
- source_word: ἡμεῖς
  chosen: we
  lexicon: BDAG
  rationale: Explicit pronoun adds emphasis in Greek; English preserves this naturally with 'we' in the question.
- source_word: τυφλοί
  chosen: blind
  alternatives:
  - spiritually blind
  lexicon: BDAG
  rationale: The adjective means 'blind.' In context the force is metaphorical/spiritual, but the text itself uses the unqualified term. The translation preserves the literal lexical form and lets context carry the metaphorical sense.
- source_word: ἐσμεν
  chosen: are
  lexicon: BDAG
  rationale: Present indicative of εἰμί, rendered with the simple English copula.
