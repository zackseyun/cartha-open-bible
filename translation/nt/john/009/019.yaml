id: JHN.9.19
reference: John 9:19
source:
  edition: SBLGNT
  text: καὶ ἠρώτησαν αὐτοὺς λέγοντες· Οὗτός ἐστιν ὁ υἱὸς ὑμῶν, ὃν ὑμεῖς λέγετε ὅτι
    τυφλὸς ἐγεννήθη; πῶς οὖν ⸂βλέπει ἄρτι⸃;
translation:
  text: And they asked them, saying, “Is this your son, whom you say was born blind?
    How then does he now see?”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἠρώτησαν
  chosen: asked
  alternatives:
  - questioned
  - inquired of
  lexicon: BDAG
  rationale: Aorist indicative of ἐρωτάω here introduces direct questioning. 'Asked'
    is the most natural modern English equivalent and fits the narrative style without
    adding formality.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - asking
  - and said
  lexicon: BDAG
  rationale: The participle is attendant to the main verb and introduces the content
    of the question. 'Saying' preserves the Greek structure cleanly in English.
- source_word: Οὗτός ἐστιν ὁ υἱὸς ὑμῶν
  chosen: Is this your son
  alternatives:
  - This is your son
  lexicon: BDAG
  rationale: Although formally declarative, in context it functions as a question,
    as shown by the surrounding interrogation and punctuation. English idiom requires
    interrogative form.
- source_word: ὃν ὑμεῖς λέγετε
  chosen: whom you say
  alternatives:
  - whom you claim
  - the one you say
  lexicon: BDAG
  rationale: λέγετε is neutral here; 'say' avoids importing skepticism that 'claim'
    might suggest, while preserving the emphatic ὑμεῖς in context.
- source_word: τυφλὸς ἐγεννήθη
  chosen: was born blind
  alternatives:
  - was born as a blind man
  - was born sightless
  lexicon: BDAG
  rationale: This is the standard and natural rendering of the adjective plus passive
    of γεννάω in this context. It preserves the congenital condition clearly.
- source_word: πῶς οὖν
  chosen: How then
  alternatives:
  - How, then
  - How therefore
  lexicon: BDAG
  rationale: οὖν marks inference from the prior claim. 'How then' is idiomatic and
    preserves the logical force.
- source_word: βλέπει
  chosen: does he ... see
  alternatives:
  - can he see
  - is he seeing
  lexicon: BDAG
  rationale: Present indicative denotes current ability/state of sight. English uses
    auxiliary 'does' in the question naturally. 'Can he see' would shift from actual
    present seeing to ability.
- source_word: ἄρτι
  chosen: now
  alternatives:
  - at this moment
  - presently
  lexicon: BDAG
  rationale: ἄρτι here contrasts his former blindness with his present condition.
    'Now' is the clearest and most natural equivalent.
