id: JHN.17.13
reference: John 17:13
source:
  edition: SBLGNT
  text: νῦν δὲ πρὸς σὲ ἔρχομαι, καὶ ταῦτα λαλῶ ἐν τῷ κόσμῳ ἵνα ἔχωσιν τὴν χαρὰν τὴν ἐμὴν πεπληρωμένην ἐν ⸀ἑαυτοῖς.
translation:
  text: But now I am coming to you[b][a], and I am speaking these things in the world so that they may have my joy fulfilled in themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fulfilled in themselves' or 'complete in themselves.'
    reason: lexical_alternative
  - marker: b
    text: Or 'within themselves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν δὲ
  chosen: But now
  alternatives:
  - And now
  - Now
  lexicon: BDAG
  rationale: νῦν marks the present moment in contrast with what precedes, and δέ adds mild adversative/continuative force. 'But now' preserves the discourse shift without overstating contrast.
- source_word: πρὸς σὲ ἔρχομαι
  chosen: I am coming to you
  alternatives:
  - I come to you
  - I am going to you
  lexicon: BDAG
  rationale: Present middle/passive ἔρχομαι with πρὸς + accusative naturally conveys movement toward the Father. The progressive English present fits the immediate context of Jesus' prayer and impending return.
- source_word: ταῦτα λαλῶ
  chosen: I am speaking these things
  alternatives:
  - I say these things
  - I speak these things
  lexicon: BDAG
  rationale: λαλέω often emphasizes speaking/uttering rather than the content-focused λέγω. 'I am speaking these things' is slightly more natural than a rigidly formal 'I speak these things' while preserving the verbal aspect.
- source_word: ἐν τῷ κόσμῳ
  chosen: in the world
  alternatives:
  - while in the world
  - in the world here
  lexicon: BDAG
  rationale: κόσμος here refers to the earthly sphere of Jesus' present ministry, not the created order in abstraction. The simple 'in the world' preserves Johannine diction and allows readers to hear the thematic resonance of κόσμος in John.
- source_word: ἵνα ἔχωσιν
  chosen: so that they may have
  alternatives:
  - that they may have
  - in order that they may have
  lexicon: BDAG
  rationale: ἵνα introduces purpose. 'So that they may have' is clear modern English and preserves the intended-result nuance.
- source_word: τὴν χαρὰν τὴν ἐμὴν
  chosen: my joy
  alternatives:
  - the joy that is mine
  - my own joy
  lexicon: BDAG
  rationale: The article-adjective construction is possessive/emphatic. 'My joy' is the most natural English rendering; the possessive force is sufficient without adding 'own' in the main text.
- source_word: πεπληρωμένην
  chosen: made full
  alternatives:
  - fulfilled
  - complete
  - filled
  lexicon: BDAG
  rationale: The perfect passive participle from πληρόω describes joy as brought to fullness. 'Made full' preserves both the fullness imagery and the resultant state better than 'fulfilled,' which can sound less idiomatic with 'joy' in English.
- source_word: ἐν ἑαυτοῖς
  chosen: in themselves
  alternatives:
  - among themselves
  - within themselves
  lexicon: BDAG
  rationale: The reflexive pronoun most naturally indicates an internal possession or experience by the disciples. 'In themselves' is formally close and contextually clear; 'within themselves' is possible but slightly more interpretive.
