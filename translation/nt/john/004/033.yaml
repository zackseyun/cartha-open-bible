id: JHN.4.33
reference: John 4:33
source:
  edition: SBLGNT
  text: ἔλεγον οὖν οἱ μαθηταὶ πρὸς ἀλλήλους· Μή τις ἤνεγκεν αὐτῷ φαγεῖν;
translation:
  text: So the disciples were saying to one another[a], “Has anyone brought him something to eat?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Surely no one has brought him something to eat?” The Greek question with μή expects a negative answer.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or repeated speech in the scene, so 'were saying' better reflects the aspect than a simple past 'said.'
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: οὖν marks narrative inference or continuation. 'So' is natural modern English and preserves the connection to the preceding context.
- source_word: μαθηταὶ
  chosen: disciples
  alternatives:
  - followers
  lexicon: BDAG
  rationale: '''Disciples'' is the standard and contextually precise rendering for μαθηταί in John.'
- source_word: πρὸς ἀλλήλους
  chosen: to one another
  alternatives:
  - among themselves
  - to each other
  lexicon: BDAG
  rationale: This phrase indicates reciprocal speech within the group. 'To one another' is a clear, direct rendering.
- source_word: Μή τις
  chosen: No one ... did they?
  alternatives:
  - Surely no one ...?
  - Can it be that someone ...?
  lexicon: BDAG
  rationale: μή with the interrogative introduces a question expecting a negative answer. English commonly conveys this with a negatively framed question plus a tag, here 'No one ... did they?' to preserve the disciples' assumption.
- source_word: ἤνεγκεν
  chosen: brought
  alternatives:
  - carried
  - gave
  lexicon: BDAG
  rationale: Aorist of φέρω here refers to bringing food to Jesus. 'Brought' is the most idiomatic contextual equivalent.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - to him
  lexicon: BDAG
  rationale: The dative indirect object is naturally expressed in English within 'brought him.' An explicit 'to him' is possible but less idiomatic.
- source_word: φαγεῖν
  chosen: anything to eat
  alternatives:
  - food to eat
  - something to eat
  lexicon: BDAG
  rationale: The infinitive 'to eat' depends on 'brought him.' Supplying 'anything' makes the English idiomatic in a negative-question context without adding meaning beyond the implied object.
