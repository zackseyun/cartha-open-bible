theological_decisions:
- issue: Christological force of 'you know all things'
  chosen_reading: Retain the disciples' statement as-is without expanding it into an explicit doctrinal assertion beyond the text.
  alternative_readings:
  - Render with explanatory wording that makes omniscience explicit
  rationale: The verse presents the disciples' confession about Jesus' knowledge. Historic orthodoxy affirms Christ's full deity, but the translation should not add interpretive expansion not present in the Greek. The plain wording preserves the text's theological weight without over-specification.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Meaning of ἀπὸ θεοῦ ἐξῆλθες
  chosen_reading: you came from God
  alternative_readings:
  - you came out from God
  - you came from the Father
  rationale: The phrase indicates divine origin/mission and should be rendered directly. 'From the Father' would harmonize with nearby context but exceeds the wording of this verse. The translation preserves the christological claim without importing additional doctrinal formulation.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
