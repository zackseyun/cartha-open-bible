id: JHN.13.22
reference: John 13:22
source:
  edition: SBLGNT
  text: ⸀ἔβλεπον εἰς ἀλλήλους οἱ μαθηταὶ ἀπορούμενοι περὶ τίνος λέγει.
translation:
  text: The disciples were looking at one another, at a loss about whom he was speaking.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The disciples kept looking at one another, perplexed about whom he was speaking.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔβλεπον
  chosen: were looking
  alternatives:
  - looked
  - kept looking
  lexicon: BDAG
  rationale: Imperfect tense conveys ongoing or repeated action; 'were looking' preserves the scene's durative sense in natural English.
- source_word: εἰς ἀλλήλους
  chosen: at one another
  alternatives:
  - at each other
  lexicon: BDAG
  rationale: This idiom indicates mutual looking among the disciples. 'One another' is slightly more formal and fits the narrative tone.
- source_word: οἱ μαθηταὶ
  chosen: the disciples
  alternatives:
  - his disciples
  lexicon: BDAG
  rationale: The article with μαθηταί naturally refers to the known group in context. 'The disciples' is sufficient in English without adding 'his,' which is not explicit here.
- source_word: ἀπορούμενοι
  chosen: at a loss
  alternatives:
  - perplexed
  - being uncertain
  - wondering
  lexicon: BDAG
  rationale: The participle denotes being in doubt or perplexity. 'At a loss' idiomatically captures their uncertainty and pairs well with the following indirect question.
- source_word: περὶ τίνος
  chosen: about whom
  alternatives:
  - concerning whom
  - about which person
  lexicon: BDAG
  rationale: The genitive interrogative after περί asks about the person in question. 'About whom' is the most natural and precise English rendering.
- source_word: λέγει
  chosen: he was speaking
  alternatives:
  - he was talking
  - he meant
  lexicon: BDAG
  rationale: Although present tense in Greek, English idiom in this past narrative is best rendered with past progressive in the indirect question. 'Was speaking' preserves the verbal sense without overinterpreting it as 'meant'.
