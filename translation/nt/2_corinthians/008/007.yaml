id: 2CO.8.7
reference: 2 Corinthians 8:7
source:
  edition: SBLGNT
  text: ἀλλ’ ὥσπερ ἐν παντὶ περισσεύετε, πίστει καὶ λόγῳ καὶ γνώσει καὶ πάσῃ σπουδῇ
    καὶ τῇ ἐξ ⸂ἡμῶν ἐν ὑμῖν⸃ ἀγάπῃ, ἵνα καὶ ἐν ταύτῃ τῇ χάριτι περισσεύητε.
translation:
  text: But just as you abound in everything—in faith and speech and knowledge and
    all diligence and in our love in you—see that you also abound in this grace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'your love for us.' The Greek phrase is difficult, and some
      manuscripts read 'your love in us.'
    reason: alternative_reading
  - marker: b
    text: That is, this gracious work of giving.
    reason: lexical_alternative
lexical_decisions:
- source_word: περισσεύετε / περισσεύητε
  chosen: abound
  alternatives:
  - excel
  - overflow
  lexicon: BDAG
  rationale: The verb frames both the Corinthians' present spiritual richness and
    Paul's exhortation regarding the collection. 'Abound' preserves the imagery of
    abundance and allows consistency across both occurrences in the verse better than
    the more evaluative 'excel.'
- source_word: ἐν παντί
  chosen: in everything
  alternatives:
  - in every way
  - in all things
  lexicon: BDAG
  rationale: A broad expression summarizing the following datives. 'In everything'
    is natural English and preserves the comprehensive scope without over-specifying
    manner versus sphere.
- source_word: πίστει
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine default, πίστις is rendered 'faith' in the main text unless
    context makes another sense clearly preferable. Here the list of Christian qualities
    fits 'faith' well; alternatives are preserved as lexical possibilities but are
    not strongly demanded by context.
- source_word: λόγῳ
  chosen: speech
  alternatives:
  - word
  - utterance
  lexicon: BDAG
  rationale: In this virtue list, λόγος likely refers to gifted expression or speaking
    ability. 'Speech' is more idiomatic in English than 'word' here and avoids narrowing
    the sense to a single utterance.
- source_word: γνώσει
  chosen: knowledge
  lexicon: BDAG
  rationale: Standard rendering that fits Paul's list of spiritual strengths.
- source_word: πάσῃ σπουδῇ
  chosen: all diligence
  alternatives:
  - all earnestness
  - full eagerness
  lexicon: BDAG
  rationale: σπουδή can denote earnestness, zeal, or diligence. 'All diligence' keeps
    the noun-like quality of the Greek and fits the list structure, while still communicating
    active seriousness.
- source_word: τῇ ἐξ ἡμῶν ἐν ὑμῖν ἀγάπῃ
  chosen: the love from us in you
  alternatives:
  - your love for us
  - our love in you
  lexicon: BDAG
  rationale: The textual form is difficult. The adopted reading most naturally yields
    'the love from us in you,' i.e., love that has come from Paul and his coworkers
    and is present among the Corinthians. This preserves the prepositional details
    rather than smoothing them into a more interpretive paraphrase. A more idiomatic
    alternative is preserved in a footnote because the phrase is syntactically debated.
- source_word: χάριτι
  chosen: grace
  alternatives:
  - gracious work
  - gift
  lexicon: BDAG
  rationale: In this context χάρις refers to the gracious act/ministry of giving for
    the saints. 'Grace' preserves Paul's theological wording and links this collection
    to divine grace, while a footnote can clarify the concrete referent.
