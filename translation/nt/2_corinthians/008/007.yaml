theological_decisions:
- issue: Meaning of χάρις in the context of the Jerusalem collection
  chosen_reading: Render as 'grace' in the main text while allowing the context to
    indicate the gracious act of giving.
  alternative_readings:
  - gift
  - gracious work
  - act of grace
  rationale: Paul intentionally uses χάρις with theological depth, not merely as a
    financial term. Rendering it 'grace' preserves that theological texture while
    still fitting the immediate context of generosity.
  doctrine_reference: Translation philosophy §1, §5
- issue: Interpretation of τῇ ἐξ ἡμῶν ἐν ὑμῖν ἀγάπῃ
  chosen_reading: Retain the more literal 'the love from us in you' in the main text
    and preserve a smoother interpretive alternative in a footnote.
  alternative_readings:
  - your love for us
  - our love for you
  rationale: The phrase is syntactically awkward and text-critically sensitive. Preserving
    the adopted reading in the main text avoids over-resolving the ambiguity, while
    the footnote documents a common interpretive alternative.
  doctrine_reference: Translation philosophy §3
