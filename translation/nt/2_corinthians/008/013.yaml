id: 2CO.8.13
reference: 2 Corinthians 8:13
source:
  edition: SBLGNT
  text: οὐ γὰρ ἵνα ἄλλοις ἄνεσις, ⸀ὑμῖν θλῖψις· ἀλλ’ ἐξ ἰσότητος
translation:
  text: For I do not mean that there should be relief for others and hardship for
    you, but equality—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "fairness." The Greek term can denote equitable balance in meeting needs,
      not necessarily strict sameness in all possessions.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ γὰρ
  chosen: For ... do not
  alternatives:
  - For not
  - Not for
  lexicon: BDAG
  rationale: γάρ gives the explanatory force 'for,' linking this statement to the
    preceding appeal. οὐ negates the intended purpose. In English, 'For I do not mean'
    best captures the explanatory and corrective sense in context.
- source_word: ἵνα
  chosen: mean that there should be
  alternatives:
  - so that
  - that
  - in order that
  lexicon: BDAG
  rationale: Although ἵνα often marks purpose ('so that'), here after an implied verb
    of intention it is idiomatically represented by 'that there should be.' Supplying
    'mean' makes explicit the ellipsis required by English and fits Paul's clarification
    of his intent.
- source_word: ἄλλοις
  chosen: for others
  alternatives:
  - to others
  - for the others
  lexicon: BDAG
  rationale: Dative plural with the predicate noun ἄνεσις is naturally rendered in
    English as advantage or benefit accruing 'for others.' 'Others' is sufficiently
    indefinite and matches the Greek.
- source_word: ἄνεσις
  chosen: relief
  alternatives:
  - ease
  - rest
  - comfort
  lexicon: BDAG
  rationale: In the collection context, ἄνεσις refers to alleviation of burden or
    pressure, not mere emotional comfort. 'Relief' is natural modern English and preserves
    the socioeconomic sense.
- source_word: ὑμῖν
  chosen: for you
  alternatives:
  - to you
  - for you all
  lexicon: BDAG
  rationale: The dative balances ἄλλοις and indicates the party upon whom the contrasting
    condition would fall. 'For you' is the most idiomatic counterpart in English.
- source_word: θλῖψις
  chosen: hardship
  alternatives:
  - affliction
  - distress
  - pressure
  lexicon: BDAG
  rationale: θλῖψις can mean affliction or pressure broadly, but here in a financial-giving
    context Paul denies that the Corinthians should be pressed into deprivation. 'Hardship'
    communicates that practical burden clearly.
- source_word: ἀλλ’ ἐξ ἰσότητος
  chosen: but equality
  alternatives:
  - but out of equality
  - but on the basis of equality
  - but fairness
  lexicon: BDAG
  rationale: The phrase contrasts Paul's aim with the rejected alternative. ἰσότης
    can denote equality or fairness. 'Equality' is the more direct lexical rendering
    and fits the following explanation in vv. 14–15 about reciprocal balance. The
    preposition ἐξ is absorbed idiomatically in English rather than rendered woodenly.
