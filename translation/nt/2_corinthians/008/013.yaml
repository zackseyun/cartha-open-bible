theological_decisions:
- issue: Rendering of ἰσότης in a passage about material sharing
  chosen_reading: equality
  alternative_readings:
  - fairness
  rationale: The term can be understood as equitable balance rather than absolute
    sameness. 'Equality' is retained in the main text because it is the more transparent
    lexical equivalent and preserves Paul's rhetoric; 'fairness' is preserved as an
    interpretive alternative in a footnote to avoid overstating a modern ideological
    sense.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
