theological_decisions:
- issue: Meaning of ἀπόστολοι in relation to the unnamed brothers
  chosen_reading: non-technical 'messengers/delegates' of the churches
  alternative_readings:
  - technical 'apostles' of the churches
  rationale: In this context Paul is commending representatives connected with the collection, and the genitive 'of the churches' points to commissioned envoys from congregations rather than holders of the unique apostolic office. This avoids importing a claim about their ecclesial rank that the text need not make.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 5
- issue: Rendering Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: Χριστός functions here as a title rather than a name-like identifier. The project default is to translate the title where context supports it.
  doctrine_reference: Translation philosophy §2; Contested terms table for Χριστός
