theological_decisions:
- issue: Relationship between giving themselves to the Lord and to us
  chosen_reading: The verse presents the Macedonians' self-giving as first directed
    to the Lord and then, subordinately, to Paul and his companions in service of
    the apostolic mission.
  alternative_readings:
  - The phrase could be taken as a simple twofold dedication without explicit hierarchy
    beyond 'first'.
  rationale: The adverb πρῶτον and the sequence of datives indicate priority to the
    Lord. The translation preserves the wording without expanding it into stronger
    ecclesiological claims.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of διὰ θελήματος θεοῦ
  chosen_reading: The phrase is left as 'through the will of God' to preserve ambiguity
    between divine agency, authorization, and accordance.
  alternative_readings:
  - by the will of God
  - in accordance with the will of God
  rationale: The Greek allows more than one nuance, and the translation should not
    collapse them into a single doctrinally loaded interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
