id: 2CO.8.5
reference: 2 Corinthians 8:5
source:
  edition: SBLGNT
  text: καὶ οὐ καθὼς ἠλπίσαμεν ἀλλ’ ἑαυτοὺς ἔδωκαν πρῶτον τῷ κυρίῳ καὶ ἡμῖν διὰ θελήματος
    θεοῦ,
translation:
  text: And not as we expected, but they gave themselves first to the Lord and to
    us through the will of God,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as we hoped.'
    reason: lexical_alternative
  - marker: b
    text: Or 'by the will of God' or 'in accordance with the will of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς ἠλπίσαμεν
  chosen: as we expected
  alternatives:
  - as we hoped
  lexicon: BDAG
  rationale: ἐλπίζω commonly means 'hope,' but in this context Paul contrasts the
    Macedonians' action with apostolic anticipation; idiomatic English 'expected'
    best conveys the sense without implying uncertainty about God's action. The alternative
    'hoped' is viable and preserved.
- source_word: ἑαυτοὺς ἔδωκαν
  chosen: they gave themselves
  alternatives:
  - they devoted themselves
  - they gave their own selves
  lexicon: BDAG
  rationale: The reflexive pronoun plus δίδωμι is significant and should be preserved
    rather than reduced to a mere idea of financial contribution. 'Gave themselves'
    keeps the personal, self-offering sense in straightforward English.
- source_word: πρῶτον
  chosen: first
  alternatives:
  - first of all
  lexicon: BDAG
  rationale: πρῶτον marks priority, likely both logical and temporal. 'First' is concise
    and preserves the emphasis without overinterpreting.
- source_word: τῷ κυρίῳ
  chosen: to the Lord
  lexicon: BDAG
  rationale: κύριος is a contested term in the project guidelines and defaults to
    'Lord.' Here it refers to Christ in Pauline usage, and the dative is naturally
    rendered 'to the Lord.'
- source_word: καὶ ἡμῖν
  chosen: and to us
  lexicon: BDAG
  rationale: The parallel dative construction after 'gave themselves' is best carried
    into English. This does not imply equal status with the Lord, but indicates their
    committed cooperation with Paul's apostolic mission.
- source_word: διὰ θελήματος θεοῦ
  chosen: through the will of God
  alternatives:
  - by the will of God
  - in accordance with the will of God
  lexicon: BDAG
  rationale: διά with the genitive commonly expresses means or agency. 'Through the
    will of God' preserves the Greek preposition and leaves open whether Paul stresses
    divine agency, authorization, or accordance. Alternatives are possible but slightly
    more interpretive.
