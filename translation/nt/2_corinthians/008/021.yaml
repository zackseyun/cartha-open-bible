id: 2CO.8.21
reference: 2 Corinthians 8:21
source:
  edition: SBLGNT
  text: ⸂προνοοῦμεν γὰρ⸃ καλὰ οὐ μόνον ἐνώπιον κυρίου ἀλλὰ καὶ ἐνώπιον ἀνθρώπων.
translation:
  text: For we take thought for what is good, not only before the Lord but also before
    people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what is honorable' or 'what is right.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προνοοῦμεν
  chosen: we take thought for
  alternatives:
  - we are taking thought for
  - we aim at
  - we provide for
  - we are concerned with
  lexicon: BDAG
  rationale: προνοέω means to think ahead, give thought to, or take thought for/provide
    for. In this context of careful financial integrity, the sense is deliberate forethought
    regarding honorable conduct. 'Take thought for' preserves the forward-looking
    nuance better than the flatter 'aim at,' while remaining natural English.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives the reason for the preceding statement. 'For' is the standard
    concise connective in English and fits Paul's explanatory flow.
- source_word: καλὰ
  chosen: what is good
  alternatives:
  - good things
  - what is honorable
  - what is right
  - noble things
  lexicon: BDAG
  rationale: The neuter plural καλὰ can denote morally good or honorable things/actions.
    In this context, Paul speaks of conduct that is above reproach in handling the
    collection. 'What is good' is broad and faithful; 'what is honorable' is a strong
    contextual alternative preserved in a footnote because many translations take
    the phrase in that ethical-public sense.
- source_word: οὐ μόνον ... ἀλλὰ καὶ
  chosen: not only ... but also
  alternatives:
  - not merely ... but also
  lexicon: BDAG
  rationale: This correlative construction is straightforwardly rendered 'not only
    ... but also,' preserving the balanced emphasis.
- source_word: ἐνώπιον
  chosen: before
  alternatives:
  - in the sight of
  - in the presence of
  lexicon: BDAG
  rationale: ἐνώπιον literally means 'before' in the sense of 'in the sight/presence
    of.' 'Before' is concise and idiomatic in both clauses.
- source_word: κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: 'κύριος is rendered ''Lord'' per the project''s default for Kyrios. The
    article is natural in English here: ''before the Lord.'''
- source_word: ἀνθρώπων
  chosen: people
  alternatives:
  - men
  - human beings
  lexicon: BDAG
  rationale: ἄνθρωποι here refers generically to human observers, not specifically
    males. Per the gender-accurate policy, 'people' best matches the representative
    sense in natural modern English.
