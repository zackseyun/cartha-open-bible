theological_decisions:
- issue: Ethical nuance of καλὰ in a context of financial accountability
  chosen_reading: Rendered broadly as 'what is good' in the main text
  alternative_readings:
  - what is honorable
  - what is right
  rationale: The verse emphasizes conduct that is commendable both before God and
    before human observers. The Greek allows either a broad moral sense ('good') or
    a more reputation/accountability-focused sense ('honorable'). To avoid over-narrowing
    the text, the main rendering keeps the broader phrase while preserving the contextual
    alternative in a footnote.
  doctrine_reference: Translation philosophy §3, §6
