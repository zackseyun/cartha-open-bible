theological_decisions:
- issue: Meaning of χάρις in the collection context
  chosen_reading: χάρις refers to the gracious ministry/contribution rather than abstract
    divine grace alone.
  alternative_readings:
  - grace in a more abstract theological sense
  - gift
  rationale: The immediate context in 2 Corinthians 8 concerns the collection for
    the saints and Titus's role in bringing it to completion. Rendering χάρις as 'act
    of grace' preserves Paul's theological framing of the collection as grace while
    making clear that a concrete ministry is in view.
