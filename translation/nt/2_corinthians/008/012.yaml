id: 2CO.8.12
reference: 2 Corinthians 8:12
source:
  edition: SBLGNT
  text: εἰ γὰρ ἡ προθυμία πρόκειται, καθὸ ἐὰν ⸀ἔχῃ εὐπρόσδεκτος, οὐ καθὸ οὐκ ἔχει.
translation:
  text: For if the readiness is present, it is acceptable according to what one has,
    not according to what one does not have.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'eagerness' or 'willingness' for 'readiness.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'according to whatever one may have ... not according to what
      one does not have.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προθυμία
  chosen: readiness
  alternatives:
  - eagerness
  - willingness
  lexicon: BDAG
  rationale: προθυμία denotes a willing, eager disposition. 'Readiness' preserves
    the sense of a present willingness without over-psychologizing it. 'Eagerness'
    is possible, but 'readiness' fits the immediate context of prepared generosity.
- source_word: πρόκειται
  chosen: is present
  alternatives:
  - is set forth
  - lies before us
  lexicon: BDAG
  rationale: 'In this idiom, πρόκειται refers to something being present or at hand
    rather than literally ''set before.'' ''Is present'' gives the natural English
    sense in context: if the willing disposition is there.'
- source_word: καθὸ ἐὰν ἔχῃ
  chosen: according to what one has
  alternatives:
  - according to whatever he may have
  - in proportion to what one has
  lexicon: BDAG
  rationale: The phrase expresses measure or standard based on available means. 'According
    to what one has' is clear, idiomatic, and preserves the proportional sense. 'One'
    avoids importing a specifically male referent where the Greek is generic singular.
- source_word: εὐπρόσδεκτος
  chosen: acceptable
  alternatives:
  - well received
  - favorably received
  lexicon: BDAG
  rationale: εὐπρόσδεκτος means acceptable or welcome. 'Acceptable' best captures
    the evaluative sense here, likely before God and within the apostolic appeal,
    without adding interpretive detail.
- source_word: οὐ καθὸ οὐκ ἔχει
  chosen: not according to what one does not have
  alternatives:
  - not according to what he does not have
  - not by what one lacks
  lexicon: BDAG
  rationale: 'This balances the prior clause and preserves Paul''s contrast exactly:
    the gift is assessed by existing means, not by absent means. The fuller phrasing
    mirrors the Greek structure more transparently than the compressed ''what one
    lacks.'''
- source_word: εἰ γὰρ
  chosen: For if
  alternatives:
  - For
  - If indeed
  lexicon: BDAG
  rationale: Both particles contribute to the logic. 'For if' preserves the explanatory
    and conditional force of the Greek rather than flattening the connection.
