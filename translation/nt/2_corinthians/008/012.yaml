theological_decisions:
- issue: Implied standard of acceptability
  chosen_reading: The verse states that willing giving is acceptable in proportion
    to one's actual means, without specifying more narrowly whether the acceptability
    is before God, before the church, or both.
  alternative_readings:
  - acceptable before God
  - acceptable to the community
  rationale: The adjective εὐπρόσδεκτος implies approval/acceptance, but the text
    does not explicitly identify the recipient of that acceptance. The translation
    preserves the broader wording rather than resolving the theological or social
    referent.
  doctrine_reference: Preserve theological tension rather than resolve it.
