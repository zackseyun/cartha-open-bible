id: 2CO.8.1
reference: 2 Corinthians 8:1
source:
  edition: SBLGNT
  text: Γνωρίζομεν δὲ ὑμῖν, ἀδελφοί, τὴν χάριν τοῦ θεοῦ τὴν δεδομένην ἐν ταῖς ἐκκλησίαις τῆς Μακεδονίας,
translation:
  text: Now we make known to you[a], brothers, the grace of God that has been given among the churches of Macedonia[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and often uses the masculine form to address the whole congregation.
    reason: lexical_alternative
  - marker: b
    text: '''The grace of God'' may refer both to God''s favor and to the gracious generosity produced by that favor in the Macedonian churches.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Γνωρίζομεν
  chosen: we make known
  alternatives:
  - we want you to know
  - we inform you
  lexicon: BDAG
  rationale: The verb γνωρίζω means to make known or disclose. 'We make known' preserves the present indicative and the somewhat formal epistolary tone better than the more idiomatic expansion 'we want you to know,' which is interpretive.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  - ''
  lexicon: BDAG
  rationale: δέ marks a mild transition rather than strong contrast here. 'Now' captures the discourse shift naturally in English without overstating opposition.
- source_word: ὑμῖν
  chosen: to you
  lexicon: BDAG
  rationale: Straightforward dative indirect object after γνωρίζομεν.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Per the gender-accurate policy, the grammatically masculine vocative is rendered 'brothers.' In Pauline usage it often addresses the whole congregation, so an inclusive alternative is worth preserving in a footnote rather than replacing the source-shaped form in the main text.
- source_word: χάριν
  chosen: grace
  alternatives:
  - gracious gift
  - favor
  lexicon: BDAG
  rationale: χάρις is a key Pauline term and should normally remain 'grace.' In this context it may refer both to God's gracious activity and to the concrete grace at work in Macedonian generosity; 'grace' preserves that theological breadth better than narrowing it to 'gift' or 'favor'.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - from God
  lexicon: BDAG
  rationale: The genitive most naturally modifies χάριν as 'the grace of God.' English readers can infer source, while 'from God' would make the relation more explicit but less formally aligned.
- source_word: τὴν δεδομένην
  chosen: that has been given
  alternatives:
  - having been given
  - bestowed
  lexicon: BDAG
  rationale: The perfect passive participle δεδομένην is well represented by the English perfect passive 'has been given,' conveying a completed act with present result.
- source_word: ἐν
  chosen: among
  alternatives:
  - in
  lexicon: BDAG
  rationale: Although ἐν often means 'in,' here with 'the churches' it likely denotes sphere/location of operation. 'Among the churches' is more idiomatic in English and communicates that this grace was operative within those congregations.
- source_word: ἐκκλησίαις
  chosen: churches
  alternatives:
  - assemblies
  lexicon: BDAG
  rationale: '''Churches'' is the standard contextual rendering for Christian congregations and fits Paul''s usage.'
- source_word: τῆς Μακεδονίας
  chosen: of Macedonia
  alternatives:
  - in Macedonia
  lexicon: BDAG
  rationale: The genitive directly qualifies 'churches' as 'the churches of Macedonia.' 'In Macedonia' is a natural English alternative but slightly more interpretive.
