theological_decisions:
- issue: Meaning of 'the grace of God' in context
  chosen_reading: A reference to God's gracious work active in the Macedonian churches, with implications for their generosity
  alternative_readings:
  - A concrete reference to the charitable gift itself
  - A broader reference to divine favor shown to those churches
  rationale: Paul's wording intentionally allows both the theological source (God's grace) and its practical outworking (generous giving) to remain in view. The translation keeps the broader phrase 'the grace of God' rather than collapsing it into 'gift' or 'generosity,' preserving the Pauline theological texture.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it.
