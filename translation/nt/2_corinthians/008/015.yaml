id: 2CO.8.15
reference: 2 Corinthians 8:15
source:
  edition: SBLGNT
  text: καθὼς γέγραπται· Ὁ τὸ πολὺ οὐκ ἐπλεόνασεν, καὶ ὁ τὸ ὀλίγον οὐκ ἠλαττόνησεν.
translation:
  text: 'as it is written: The one who had much did not have too much, and the one
    who had little did not have too little.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more literally in line with Exodus 16:18: “The one who gathered much
      had no excess, and the one who gathered little had no lack.”'
    reason: alternative_reading
lexical_decisions:
- source_word: καθὼς γέγραπται
  chosen: as it is written
  alternatives:
  - just as it is written
  - as it has been written
  lexicon: BDAG
  rationale: Standard citation formula introducing Scripture. English present 'is
    written' best reflects the Greek perfect γέγραπται as a standing written testimony.
- source_word: Ὁ τὸ πολὺ
  chosen: The one who had much
  alternatives:
  - he who gathered much
  - the one with much
  lexicon: BDAG
  rationale: 'The article + neuter adjective functions substantivally: ''the one [with]
    much.'' Because Paul is quoting Exodus 16:18 in a context of provision and distribution,
    English idiom is clearer with ''had much.'' ''Gathered much'' is possible by influence
    from the Exodus source, but the Greek here does not explicitly repeat a verb of
    gathering.'
- source_word: ἐπλεόνασεν
  chosen: did not have too much
  alternatives:
  - did not abound
  - did not have an excess
  - did not have more than enough
  lexicon: BDAG
  rationale: πλεονάζω can mean 'abound' or 'have in excess.' In this quotation's sense,
    the point is not abstract abundance but that no one ended up with surplus over
    against others. 'Did not have too much' communicates the result naturally in English.
- source_word: ὁ τὸ ὀλίγον
  chosen: the one who had little
  alternatives:
  - he who gathered little
  - the one with little
  lexicon: BDAG
  rationale: Parallel to ὁ τὸ πολὺ. 'Had little' preserves the comparative distribution
    sense without importing the Exodus verb 'gathered' into Paul's wording.
- source_word: ἠλαττόνησεν
  chosen: did not have too little
  alternatives:
  - did not lack
  - was not diminished
  - did not have less than enough
  lexicon: BDAG
  rationale: ἐλαττονέω here conveys being deficient or falling short. 'Did not have
    too little' keeps the antithetical parallel with 'did not have too much' and expresses
    the distributive equity Paul is emphasizing.
