theological_decisions:
- issue: Use of Paul's quotation from Exodus 16:18 in a generosity/equality context
  chosen_reading: Render the line in terms of resulting possession/distribution rather
    than explicitly inserting 'gathered,' preserving Paul's application to equitable
    provision.
  alternative_readings:
  - The one who gathered much had nothing left over, and the one who gathered little
    had no lack
  rationale: Paul cites Scripture to support fairness in material sharing among believers.
    A more source-specific rendering tied to manna-gathering is possible, but in 2
    Corinthians the immediate force is the equitable outcome of provision. The chosen
    wording preserves that application while remaining faithful to the Greek as quoted.
  doctrine_reference: Translation philosophy §1, §3, §5
