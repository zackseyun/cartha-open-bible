theological_decisions:
- issue: Implication of giving according to available means
  chosen_reading: The verse exhorts completion of the collection in proportion to present resources, without implying a demand to give beyond one's means.
  alternative_readings:
  - A more general call to complete any good intention regardless of means
  rationale: The immediate context concerns the Corinthians' promised contribution, and ἐκ τοῦ ἔχειν naturally points to what is presently available. The translation preserves this practical limitation rather than turning the verse into an absolute demand detached from means.
  doctrine_reference: Translation philosophy §1, §3
