id: 2CO.8.11
reference: 2 Corinthians 8:11
source:
  edition: SBLGNT
  text: νυνὶ δὲ καὶ τὸ ποιῆσαι ἐπιτελέσατε, ὅπως καθάπερ ἡ προθυμία τοῦ θέλειν οὕτως καὶ τὸ ἐπιτελέσαι ἐκ τοῦ ἔχειν.
translation:
  text: But now complete the doing of it also[a], so that just as there was the eagerness to will it[b], so also there may be the completion from what you have.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'finish carrying it out.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'from what you have'; that is, in keeping with your present means.
    reason: lexical_alternative
lexical_decisions:
- source_word: νυνὶ δὲ
  chosen: But now
  alternatives:
  - Now then
  - But as it is
  lexicon: BDAG
  rationale: νυνί with δέ marks a transition from prior exhortation to present action. 'But now' preserves the mild adversative and temporal force in natural English.
- source_word: τὸ ποιῆσαι
  chosen: the doing of it
  alternatives:
  - the doing
  - the carrying it out
  - the action
  lexicon: BDAG
  rationale: The articular infinitive points to the concrete act previously proposed. 'The doing of it' preserves the nominal force and links it to the collection already under discussion.
- source_word: ἐπιτελέσατε
  chosen: complete
  alternatives:
  - finish
  - bring to completion
  - accomplish fully
  lexicon: BDAG
  rationale: ἐπιτελέω carries the sense of bringing something to completion. 'Complete' is concise, natural, and keeps the verbal connection with the later infinitive ἐπιτελέσαι.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: Introduces purpose or intended result. 'So that' is idiomatic and preserves the forward-looking exhortational logic.
- source_word: καθάπερ
  chosen: just as
  alternatives:
  - even as
  - in the same way as
  lexicon: BDAG
  rationale: Marks comparison between prior willingness and present completion. 'Just as' is the clearest modern equivalent.
- source_word: ἡ προθυμία
  chosen: the eagerness
  alternatives:
  - the readiness
  - the willingness
  - the zeal
  lexicon: BDAG
  rationale: προθυμία denotes readiness or eagerness of disposition. 'Eagerness' best captures the positive, willing promptness in this giving context.
- source_word: τοῦ θέλειν
  chosen: to will it
  alternatives:
  - to desire it
  - to be willing
  - to intend it
  lexicon: BDAG
  rationale: The genitive articular infinitive depends on προθυμία and expresses the content of that eagerness. 'To will it' is slightly formal but preserves the volitional emphasis better than the flatter 'to do it.'
- source_word: οὕτως καὶ
  chosen: so also
  alternatives:
  - so too
  - in the same way also
  lexicon: BDAG
  rationale: 'Balances the comparison: as there was eagerness, so there should also be completion. ''So also'' preserves the symmetry.'
- source_word: τὸ ἐπιτελέσαι
  chosen: the completion
  alternatives:
  - the completing of it
  - the finishing
  - the carrying it through
  lexicon: BDAG
  rationale: The articular infinitive is rendered nominally to mirror the earlier τὸ ποιῆσαι and to keep the focus on bringing the project to its intended end.
- source_word: ἐκ τοῦ ἔχειν
  chosen: from what you have
  alternatives:
  - out of what you have
  - according to your means
  - from your possessions
  lexicon: BDAG
  rationale: 'This phrase indicates source or measure: the completion is to proceed from available means, not beyond them. ''From what you have'' is clear and faithful, while avoiding over-interpretation.'
