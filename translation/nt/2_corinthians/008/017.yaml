id: 2CO.8.17
reference: 2 Corinthians 8:17
source:
  edition: SBLGNT
  text: ὅτι τὴν μὲν παράκλησιν ἐδέξατο, σπουδαιότερος δὲ ὑπάρχων αὐθαίρετος ἐξῆλθεν
    πρὸς ὑμᾶς.
translation:
  text: For he accepted the appeal, but being more earnest, he went out to you of
    his own accord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "because he accepted the appeal."
    reason: lexical_alternative
  - marker: b
    text: Or "more eager" or "more diligent."
    reason: lexical_alternative
  - marker: c
    text: Or "voluntarily" or "on his own initiative."
    reason: lexical_alternative
  - marker: d
    text: Or "came to you."
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: In context this introduces the explanation for Paul's thanksgiving in
    the previous verse, so 'For' reads naturally in English while preserving the causal/explanatory
    force.
- source_word: παράκλησιν
  chosen: appeal
  alternatives:
  - encouragement
  - exhortation
  - request
  lexicon: BDAG
  rationale: Here the noun refers to the urging/request Paul had made to Titus, not
    primarily comfort. 'Appeal' best fits the immediate context of accepting an assignment.
- source_word: ἐδέξατο
  chosen: accepted
  alternatives:
  - received
  - welcomed
  lexicon: BDAG
  rationale: '''Accepted'' conveys favorable reception of Paul''s appeal in idiomatic
    English and matches the middle-voice sense without overtranslating it.'
- source_word: σπουδαιότερος
  chosen: more earnest
  alternatives:
  - more eager
  - more diligent
  lexicon: BDAG
  rationale: The comparative adjective indicates heightened zeal. 'More earnest' preserves
    the comparative force and fits the context of Titus's active concern for the Corinthians.
- source_word: ὑπάρχων
  chosen: being
  alternatives:
  - since he was
  - as one who was
  lexicon: BDAG
  rationale: The participle is rendered with a simple English participial construction
    to preserve the Greek flow without adding interpretive weight.
- source_word: αὐθαίρετος
  chosen: of his own accord
  alternatives:
  - voluntarily
  - on his own initiative
  lexicon: BDAG
  rationale: This adjective emphasizes willing, self-motivated action. 'Of his own
    accord' is a clear idiomatic rendering that preserves the voluntariness.
- source_word: ἐξῆλθεν πρὸς ὑμᾶς
  chosen: he went out to you
  alternatives:
  - he came to you
  - he set out for you
  lexicon: BDAG
  rationale: The Greek verb is literally 'went out,' likely from Paul's location toward
    Corinth. Retaining 'went out to you' preserves the directional nuance better than
    the more interpretive 'came to you.'
