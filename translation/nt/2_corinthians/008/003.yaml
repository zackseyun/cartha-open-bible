id: 2CO.8.3
reference: 2 Corinthians 8:3
source:
  edition: SBLGNT
  text: ὅτι κατὰ δύναμιν, μαρτυρῶ, καὶ ⸀παρὰ δύναμιν, αὐθαίρετοι
translation:
  text: For, I testify, they gave according to their ability, and beyond their ability,
    of their own accord,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to their means, and beyond their means.'
    reason: lexical_alternative
  - marker: b
    text: Or 'voluntarily' or 'willingly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - that
  - because
  lexicon: BDAG
  rationale: In this context ὅτι introduces Paul's explanatory statement supporting
    the previous verse, so 'For' best captures the discourse function in natural English.
- source_word: κατὰ δύναμιν
  chosen: according to their ability
  alternatives:
  - according to their means
  - to the limit of their power
  lexicon: BDAG
  rationale: κατά with δύναμις here expresses measure or standard. 'According to their
    ability' is clear modern English and preserves the sense of giving in proportion
    to capacity.
- source_word: μαρτυρῶ
  chosen: I testify
  alternatives:
  - I bear witness
  - I can testify
  lexicon: BDAG
  rationale: The present indicative is parenthetical and emphatic. 'I testify' is
    concise and preserves Paul's personal attestation.
- source_word: καὶ παρὰ δύναμιν
  chosen: and beyond their ability
  alternatives:
  - and beyond their means
  - even beyond their power
  lexicon: BDAG
  rationale: παρά with the accusative here conveys going beyond a norm or limit. 'Beyond
    their ability' mirrors the previous phrase and preserves the rhetorical contrast.
- source_word: αὐθαίρετοι
  chosen: of their own accord
  alternatives:
  - voluntarily
  - self-motivated
  - willingly
  lexicon: BDAG
  rationale: The adjective denotes acting on one's own initiative, without compulsion.
    'Of their own accord' best conveys voluntariness while fitting the nominative
    plural predicate sense in idiomatic English.
