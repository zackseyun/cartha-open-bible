theological_decisions:
- issue: Implied verb with αὐθαίρετοι
  chosen_reading: Supply 'they gave' from the context so the clause reads as a complete
    statement about the Macedonians' voluntary giving.
  alternative_readings:
  - 'Render more literally but less smoothly: ''voluntary'' or ''being voluntary'''
  rationale: The Greek is elliptical, with αὐθαίρετοι standing predicatively after
    the parenthetical 'I testify.' English normally requires the implied action to
    be supplied from the surrounding context (vv. 2–4), and the supplied verb should
    not add content beyond the evident topic of giving.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s plain sense without paraphrasing beyond what the text warrants.'
