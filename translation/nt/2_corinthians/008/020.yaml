id: 2CO.8.20
reference: 2 Corinthians 8:20
source:
  edition: SBLGNT
  text: στελλόμενοι τοῦτο μή τις ἡμᾶς μωμήσηται ἐν τῇ ἁδρότητι ταύτῃ τῇ διακονουμένῃ
    ὑφ’ ἡμῶν,
translation:
  text: taking this precaution, so that no one may blame us in regard to this generous
    gift being administered by us,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this bounty' or 'this abundance.' The Greek term can denote a generous
      or abundant contribution.
    reason: lexical_alternative
  - marker: b
    text: Or 'lest anyone should find fault with us concerning this generous gift.'
    reason: lexical_alternative
lexical_decisions:
- source_word: στελλόμενοι
  chosen: taking this precaution
  alternatives:
  - avoiding this
  - taking care of this
  - making arrangements for this
  lexicon: BDAG
  rationale: The middle participle of στέλλομαι here carries the sense of taking measures
    to avoid a problem or to guard against something. 'Taking this precaution' expresses
    the preventative nuance naturally in English and fits the following μή-clause.
- source_word: τοῦτο
  chosen: this
  alternatives:
  - this matter
  - this
  lexicon: BDAG
  rationale: The demonstrative points forward to the precautionary action just described.
    English can keep it concise as 'this' within the idiom 'taking this precaution.'
- source_word: μή τις ἡμᾶς μωμήσηται
  chosen: so that no one may blame us
  alternatives:
  - lest anyone should find fault with us
  - so that no one may criticize us
  lexicon: BDAG
  rationale: 'The μή + subjunctive construction expresses purpose/prevention: Paul
    is acting to prevent criticism. μωμάομαι means to blame, find fault with, or criticize.
    ''Blame us'' is concise and natural while preserving the moral/accountability
    sense.'
- source_word: ἐν
  chosen: in regard to
  alternatives:
  - about
  - with respect to
  - in
  lexicon: BDAG
  rationale: Here ἐν is not merely locative but indicates the sphere or matter in
    which blame might arise. 'In regard to' communicates that sense clearly.
- source_word: ἁδρότητι
  chosen: generous gift
  alternatives:
  - abundance
  - bounty
  - liberal gift
  lexicon: BDAG
  rationale: ἁδρότης denotes abundance, generosity, or bounty. In this collection
    context, the referent is the sizable charitable contribution. 'Generous gift'
    communicates both the material and beneficent sense better than the more abstract
    'abundance.'
- source_word: ταύτῃ
  chosen: this
  alternatives:
  - this very
  - this
  lexicon: BDAG
  rationale: The demonstrative specifies the particular contribution under discussion.
    Simple 'this' is sufficient in English.
- source_word: τῇ διακονουμένῃ ὑφ’ ἡμῶν
  chosen: being administered by us
  alternatives:
  - being ministered by us
  - being handled by us
  - being served by us
  lexicon: BDAG
  rationale: διακονέω in this financial-relief context refers to carrying out a service
    or administration. 'Being administered by us' fits the participial construction
    and the context of managing a collection, while avoiding overly ecclesiastical
    wording.
