id: 2CO.8.24
reference: 2 Corinthians 8:24
source:
  edition: SBLGNT
  text: τὴν οὖν ἔνδειξιν τῆς ἀγάπης ὑμῶν καὶ ἡμῶν καυχήσεως ὑπὲρ ὑμῶν εἰς αὐτοὺς ⸀ἐνδεικνύμενοι
    εἰς πρόσωπον τῶν ἐκκλησιῶν.
translation:
  text: Therefore, show them before the churches the proof of your love and of our
    boasting about you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'demonstration' or 'evidence' of your love.
    reason: lexical_alternative
  - marker: b
    text: Or 'before the churches'; the phrase refers to a public demonstration before
      the representatives of the churches.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔνδειξιν
  chosen: proof
  alternatives:
  - demonstration
  - evidence
  lexicon: BDAG
  rationale: ἔνδειξις denotes a display or proof that makes something evident. 'Proof'
    is concise and idiomatic in English here, fitting Paul's appeal that the Corinthians
    provide tangible confirmation of their love.
- source_word: ἀγάπης
  chosen: love
  lexicon: BDAG
  rationale: Follows the project's default rendering of ἀγάπη as 'love.' The context
    is practical, relational love expressed in action.
- source_word: καυχήσεως
  chosen: boasting
  alternatives:
  - pride
  - confidence
  lexicon: BDAG
  rationale: καύχησις in Paul often carries the sense of boasting or grounds for boasting.
    'Boasting' preserves the lexical connection and rhetorical force better than the
    softer 'pride' or 'confidence.'
- source_word: ὑπὲρ ὑμῶν
  chosen: about you
  alternatives:
  - on your behalf
  - concerning you
  lexicon: BDAG
  rationale: With καυχήσεως, ὑπέρ here refers to Paul's boasting with reference to
    the Corinthians. 'About you' is the most natural English expression in this context.
- source_word: εἰς αὐτοὺς
  chosen: them
  alternatives:
  - to them
  - toward them
  lexicon: BDAG
  rationale: Refers to the brothers/church representatives mentioned in the immediate
    context. English idiom prefers 'show them' rather than a more wooden 'show to
    them.'
- source_word: ἐνδεικνύμενοι
  chosen: show
  alternatives:
  - demonstrate
  - prove
  lexicon: BDAG
  rationale: The participle functions imperativally in context, continuing Paul's
    exhortation. 'Show' gives clear modern English while preserving the sense of making
    something evident.
- source_word: εἰς πρόσωπον
  chosen: in the presence of
  alternatives:
  - before
  - face to face with
  lexicon: BDAG
  rationale: The idiom εἰς πρόσωπον here means publicly or before someone. 'In the
    presence of' captures the representative/public setting more clearly than the
    more literal but less idiomatic 'to the face of.'
- source_word: τῶν ἐκκλησιῶν
  chosen: the churches
  alternatives:
  - the assemblies
  lexicon: BDAG
  rationale: ἐκκλησίαι in Pauline usage ordinarily refers to local church communities.
    'Churches' is the standard and clearest rendering in this context.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Marks an inference or conclusion from the preceding commendation and
    request. 'Therefore' preserves the connective force with appropriate formality.
