id: 2CO.8.22
reference: 2 Corinthians 8:22
source:
  edition: SBLGNT
  text: συνεπέμψαμεν δὲ αὐτοῖς τὸν ἀδελφὸν ἡμῶν ὃν ἐδοκιμάσαμεν ἐν πολλοῖς πολλάκις
    σπουδαῖον ὄντα, νυνὶ δὲ πολὺ σπουδαιότερον πεποιθήσει πολλῇ τῇ εἰς ὑμᾶς.
translation:
  text: And we have sent with them our brother, whom we have often tested in many
    matters and found to be diligent, but who is now even more diligent because of
    his great confidence in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'but now much more earnest through the great confidence he has in you.'
      The Greek phrase can be taken slightly differently, though the overall sense
      remains that his zeal has increased in relation to you.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνεπέμψαμεν
  chosen: we have sent with them
  alternatives:
  - we sent along with them
  - we are sending with them
  lexicon: BDAG
  rationale: Aorist indicative narrates Paul's action in epistolary context; English
    present perfect reads naturally while preserving completed action with present
    relevance. The σύν- prefix is reflected by 'with them'/'along with them.'
- source_word: ἀδελφὸν ἡμῶν
  chosen: our brother
  alternatives:
  - our fellow believer
  - our brother in the faith
  lexicon: BDAG
  rationale: Literal 'our brother' preserves the familial Christian idiom and matches
    the masculine singular reference to an unnamed male coworker. Dynamic expansions
    are unnecessary.
- source_word: ἐδοκιμάσαμεν
  chosen: we have often tested
  alternatives:
  - we proved
  - we examined
  lexicon: BDAG
  rationale: δοκιμάζω here conveys testing with the result of demonstrated character.
    'Tested' keeps the process sense; the result is then made explicit by the following
    infinitive-like participial construction in English.
- source_word: ἐν πολλοῖς πολλάκις
  chosen: often in many matters
  alternatives:
  - many times in many ways
  - in many situations repeatedly
  lexicon: BDAG
  rationale: The phrase combines breadth and repetition. 'Often in many matters' preserves
    both πολλάκις ('often') and ἐν πολλοῖς ('in many things/matters') without awkwardness.
- source_word: σπουδαῖον ὄντα
  chosen: found to be diligent
  alternatives:
  - being earnest
  - to be zealous
  lexicon: BDAG
  rationale: σπουδαῖος denotes earnestness, diligence, eagerness. 'Diligent' fits
    the context of trustworthy ministry administration and avoids overreading emotional
    zeal alone. 'Found to be' brings out the sense after testing.
- source_word: νυνὶ δὲ πολὺ σπουδαιότερον
  chosen: but who is now even more diligent
  alternatives:
  - but now much more earnest
  - but now far more eager
  lexicon: BDAG
  rationale: Comparative σπουδαιότερον with πολὺ intensifies the earlier description.
    'Even more diligent' is idiomatic and preserves the comparison.
- source_word: πεποιθήσει πολλῇ τῇ εἰς ὑμᾶς
  chosen: because of his great confidence in you
  alternatives:
  - through his great confidence in you
  - because of the great confidence he has toward you
  lexicon: BDAG
  rationale: Dative πεποιθήσει is best taken as causal or instrumental ground for
    his increased diligence. 'Because of his great confidence in you' is the clearest
    idiomatic rendering. The phrase τῇ εἰς ὑμᾶς specifies the direction of that confidence
    toward the Corinthians.
