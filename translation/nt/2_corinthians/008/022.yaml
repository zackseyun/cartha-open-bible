theological_decisions:
- issue: Referent and nuance of πεποιθήσει πολλῇ τῇ εἰς ὑμᾶς
  chosen_reading: the brother's increased diligence is grounded in his great confidence
    in the Corinthians
  alternative_readings:
  - Paul's own confidence in the Corinthians is in view
  - the phrase means boldness toward you rather than confidence in you
  rationale: The immediate syntax most naturally modifies the unnamed brother and
    explains why he is 'now even more diligent.' The verse does not require importing
    a broader doctrinal claim; it simply commends the delegate's confidence regarding
    the Corinthians.
  doctrine_reference: Preserve theological tension rather than resolve it
