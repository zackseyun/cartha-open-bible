theological_decisions:
- issue: Paul's rhetorical stance toward giving
  chosen_reading: Paul explicitly denies issuing an apostolic command and frames his words as a test of the genuineness of the Corinthians' love.
  alternative_readings:
  - Paul is merely softening a command rhetorically without denying its force
  rationale: The wording οὐ κατ’ ἐπιταγὴν λέγω is straightforward and should not be weakened into an implicit command in translation. The verse preserves the tension between apostolic authority and voluntary love-driven obedience.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
