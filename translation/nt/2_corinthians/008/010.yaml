theological_decisions:
- issue: Force of Paul's statement in relation to apostolic authority
  chosen_reading: Paul offers a considered judgment/recommendation rather than a direct command.
  alternative_readings:
  - Paul issues an authoritative directive
  rationale: The immediate context contrasts command and judgment (see 8:8, 8:10). Rendering γνώμην as 'judgment' preserves Paul's pastoral counsel without diminishing apostolic seriousness or overstating it as an explicit command.
  doctrine_reference: Translation philosophy §3
