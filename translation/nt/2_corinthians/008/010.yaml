id: 2CO.8.10
reference: 2 Corinthians 8:10
source:
  edition: SBLGNT
  text: καὶ γνώμην ἐν τούτῳ δίδωμι· τοῦτο γὰρ ὑμῖν συμφέρει, οἵτινες οὐ μόνον τὸ ποιῆσαι ἀλλὰ καὶ τὸ θέλειν προενήρξασθε ἀπὸ πέρυσι·
translation:
  text: 'And in this matter I give my judgment: for this is beneficial for you[b][a], who began last year not only to do it but also to will it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'advice' or 'opinion' for 'judgment.' Paul is offering a considered recommendation rather than phrasing this as a command.
    reason: lexical_alternative
  - marker: b
    text: Or 'to be willing' for 'to desire it.' The Greek distinguishes the willingness from the actual doing.
    reason: lexical_alternative
lexical_decisions:
- source_word: γνώμην
  chosen: judgment
  alternatives:
  - opinion
  - advice
  lexicon: BDAG
  rationale: In context Paul distinguishes giving a considered recommendation from issuing a command (cf. surrounding context). 'Judgment' conveys a deliberate evaluative opinion without implying an absolute decree. 'Advice' is possible but slightly softer than the Greek noun here.
- source_word: ἐν τούτῳ
  chosen: in this matter
  alternatives:
  - in this
  - about this
  lexicon: BDAG
  rationale: The phrase refers to the specific issue under discussion, namely the collection. 'In this matter' makes the referent clear in natural English while staying close to the Greek.
- source_word: δίδωμι
  chosen: I give
  alternatives:
  - I offer
  lexicon: BDAG
  rationale: A straightforward rendering of the present indicative. Combined with γνώμην, 'I give my judgment' is idiomatic and sufficiently formal.
- source_word: συμφέρει
  chosen: is beneficial
  alternatives:
  - is profitable
  - is advantageous
  - is expedient
  lexicon: BDAG
  rationale: The verb denotes what is advantageous or beneficial. 'Is beneficial' is clear modern English and avoids the archaic tone of 'expedient' or the potentially commercial nuance of 'profitable'.
- source_word: οἵτινες
  chosen: who
  alternatives:
  - since you
  - you who
  lexicon: BDAG
  rationale: The relative pronoun identifies the Corinthians as those characterized by having already begun. 'Who' preserves the syntax cleanly; the explanatory force is carried by the clause itself.
- source_word: τὸ ποιῆσαι
  chosen: to do it
  alternatives:
  - to carry it out
  - to act
  lexicon: BDAG
  rationale: The articular infinitive points to the actual performance of the collection project. 'To do it' is concise and natural; the object is implied from context.
- source_word: τὸ θέλειν
  chosen: to desire it
  alternatives:
  - to will it
  - to be willing
  - to want to do it
  lexicon: BDAG
  rationale: θέλω here refers to volition or readiness. 'To desire it' preserves the distinction between inward willingness and outward action. 'To be willing' is also strong, but 'desire' better matches the infinitive parallel with 'to do.'
- source_word: προενήρξασθε
  chosen: began
  alternatives:
  - started beforehand
  - took the initiative earlier
  lexicon: BDAG
  rationale: The compound verb includes the notion of beginning earlier or previously. Since ἀπὸ πέρυσι immediately supplies the temporal idea, 'began' avoids redundancy while preserving the main verbal sense.
- source_word: ἀπὸ πέρυσι
  chosen: last year
  alternatives:
  - since last year
  - from last year
  lexicon: BDAG
  rationale: This idiom points to the prior year. 'Last year' is the most natural English rendering here; 'since last year' would suggest continuous action more strongly than the Greek requires.
