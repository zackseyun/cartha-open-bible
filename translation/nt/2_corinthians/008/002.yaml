id: 2CO.8.2
reference: 2 Corinthians 8:2
source:
  edition: SBLGNT
  text: ὅτι ἐν πολλῇ δοκιμῇ θλίψεως ἡ περισσεία τῆς χαρᾶς αὐτῶν καὶ ἡ κατὰ βάθους πτωχεία αὐτῶν ἐπερίσσευσεν εἰς ⸂τὸ πλοῦτος⸃ τῆς ἁπλότητος αὐτῶν·
translation:
  text: that in a severe test of affliction[b][a], the abundance of their joy and their deep poverty overflowed into the wealth of their generosity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their poverty down to the depths' or 'their extreme poverty.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the riches of their liberality'; the Greek word can also mean 'simplicity' or 'single-heartedness,' but here likely refers to generous giving.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν πολλῇ δοκιμῇ θλίψεως
  chosen: in a severe test of affliction
  alternatives:
  - in much testing of affliction
  - in a great ordeal of suffering
  - amid a severe trial of affliction
  lexicon: BDAG
  rationale: δοκιμή denotes testing/proven character; here with θλίψεως it refers to a trying circumstance. 'Severe test of affliction' preserves the genitival relationship and communicates intensity naturally in English without over-paraphrase.
- source_word: περισσεία τῆς χαρᾶς
  chosen: the abundance of their joy
  alternatives:
  - their overflowing joy
  - the fullness of their joy
  lexicon: BDAG
  rationale: περισσεία is a noun meaning abundance/excess. Rendering it as 'abundance' keeps the nominal structure and pairs well with the later verb ἐπερίσσευσεν.
- source_word: κατὰ βάθους πτωχεία
  chosen: their deep poverty
  alternatives:
  - their poverty down to the depths
  - their extreme poverty
  lexicon: BDAG
  rationale: The idiom κατὰ βάθους intensifies πτωχεία. 'Deep poverty' is concise, idiomatic English that preserves the metaphor of depth better than the more interpretive 'extreme poverty.'
- source_word: ἐπερίσσευσεν
  chosen: overflowed
  alternatives:
  - abounded
  - was abundant
  - increased greatly
  lexicon: BDAG
  rationale: The aorist verb from περισσεύω conveys abundance overflowing into a result. 'Overflowed' captures the vivid movement toward the following εἰς phrase better than the flatter 'abounded.'
- source_word: εἰς τὸ πλοῦτος
  chosen: into the wealth
  alternatives:
  - to the riches
  - resulting in the wealth
  lexicon: BDAG
  rationale: εἰς marks result here. 'Into the wealth' preserves the directional/resultative force while remaining readable. πλοῦτος is rendered 'wealth' rather than 'riches' for smoother English in this collocation.
- source_word: ἁπλότης
  chosen: generosity
  alternatives:
  - simplicity
  - single-heartedness
  - liberality
  lexicon: BDAG
  rationale: In Pauline usage, especially in giving contexts, ἁπλότης commonly carries the sense of generosity/liberality rather than mere simplicity. Given the surrounding collection context, 'generosity' best reflects the intended meaning.
