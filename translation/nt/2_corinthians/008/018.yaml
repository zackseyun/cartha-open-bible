id: 2CO.8.18
reference: 2 Corinthians 8:18
source:
  edition: SBLGNT
  text: συνεπέμψαμεν δὲ μετ’ αὐτοῦ τὸν ἀδελφὸν οὗ ὁ ἔπαινος ἐν τῷ εὐαγγελίῳ διὰ πασῶν
    τῶν ἐκκλησιῶν—
translation:
  text: And we sent with him the brother whose praise in the gospel is throughout
    all the churches—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whose commendation in the gospel is among all the churches.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνεπέμψαμεν
  chosen: we sent with
  alternatives:
  - we have sent along with
  - we sent together with
  lexicon: BDAG
  rationale: Aorist indicative narrates a completed action. The compound verb with
    σύν conveys accompaniment; in idiomatic English, 'we sent with' best captures
    the sense without awkwardness.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here is a mild connective advancing the narrative rather than marking
    strong contrast. 'And' is natural modern English and preserves the flow.
- source_word: μετ’ αὐτοῦ
  chosen: with him
  alternatives:
  - along with him
  lexicon: BDAG
  rationale: μετά with genitive denotes accompaniment. 'With him' is the most direct
    rendering.
- source_word: τὸν ἀδελφόν
  chosen: the brother
  alternatives:
  - our brother
  - the fellow believer
  lexicon: BDAG
  rationale: The article plus ἀδελφός identifies a known Christian brother. 'The brother'
    preserves the Greek wording without adding 'our,' which is not explicit here.
- source_word: οὗ ὁ ἔπαινος
  chosen: whose praise
  alternatives:
  - who is praised
  - whose commendation
  lexicon: BDAG
  rationale: The genitive relative construction is most naturally rendered possessively
    in English. 'Whose praise' keeps the nominal form of ἔπαινος and avoids over-interpreting
    the syntax.
- source_word: ἔπαινος
  chosen: praise
  alternatives:
  - commendation
  - approval
  - reputation
  lexicon: BDAG
  rationale: ἔπαινος denotes praise or commendation. 'Praise' is the most straightforward
    equivalent, while the following phrase clarifies the sphere in which he is praised.
- source_word: ἐν τῷ εὐαγγελίῳ
  chosen: in the gospel
  alternatives:
  - in gospel ministry
  - in the matter of the gospel
  lexicon: BDAG
  rationale: The phrase likely indicates the sphere or connection of his praise. 'In
    the gospel' is formally close and leaves the exact nuance appropriately open rather
    than specifying 'ministry' beyond the text.
- source_word: διὰ πασῶν τῶν ἐκκλησιῶν
  chosen: throughout all the churches
  alternatives:
  - among all the churches
  - through all the churches
  lexicon: BDAG
  rationale: διά with the genitive here conveys extension through a whole set. 'Throughout
    all the churches' communicates widespread recognition across the congregations.
- source_word: ἐκκλησιῶν
  chosen: churches
  alternatives:
  - assemblies
  - congregations
  lexicon: BDAG
  rationale: In Pauline usage ἐκκλησία commonly refers to local Christian churches.
    'Churches' is the standard and clearest rendering in this context.
