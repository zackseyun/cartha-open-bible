theological_decisions:
- issue: Identity and status of ἀδελφός
  chosen_reading: Rendered as 'the brother' referring to a male Christian coworker
    known to the Corinthians.
  alternative_readings:
  - '''brother'' as a generic fellow believer'
  rationale: The masculine singular with article in this travel context points to
    a specific man. This follows the gender-accurate policy and avoids flattening
    the personal reference into a generic term.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
- issue: Nuance of ἐν τῷ εὐαγγελίῳ
  chosen_reading: Kept as 'in the gospel' without specifying ministry role.
  alternative_readings:
  - '''in preaching the gospel'''
  - '''for his work in the gospel'''
  rationale: The Greek does not explicitly state preaching or ministry office, only
    that his praise is connected with the gospel. Preserving this broader wording
    avoids importing a narrower doctrinal or ministerial claim.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 and §3
