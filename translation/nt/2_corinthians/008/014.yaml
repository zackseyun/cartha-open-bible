id: 2CO.8.14
reference: 2 Corinthians 8:14
source:
  edition: SBLGNT
  text: ἐν τῷ νῦν καιρῷ τὸ ὑμῶν περίσσευμα εἰς τὸ ἐκείνων ὑστέρημα, ἵνα καὶ τὸ ἐκείνων
    περίσσευμα γένηται εἰς τὸ ὑμῶν ὑστέρημα, ὅπως γένηται ἰσότης·
translation:
  text: At the present time, your abundance is for their need, so that their abundance
    may also be for your need, in order that there may be equality.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fairness' or 'equity'; the Greek term refers here to balanced mutual
      provision, not necessarily identical possessions.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ νῦν καιρῷ
  chosen: At the present time
  alternatives:
  - in the present season
  - at this time
  lexicon: BDAG
  rationale: καιρός here denotes a particular time or circumstance rather than merely
    chronological time; 'At the present time' is natural English and preserves the
    situational sense.
- source_word: τὸ ὑμῶν περίσσευμα
  chosen: your abundance
  alternatives:
  - your surplus
  - what you have in excess
  lexicon: BDAG
  rationale: περίσσευμα refers to what exceeds need, likely material plenty in this
    context. 'Abundance' is idiomatic and broad enough to preserve Paul's wording
    without over-specifying money alone.
- source_word: εἰς τὸ ἐκείνων ὑστέρημα
  chosen: for their need
  alternatives:
  - for their lack
  - toward their deficiency
  lexicon: BDAG
  rationale: The εἰς + accusative construction here expresses purpose/result toward
    meeting what they lack. 'Need' communicates ὑστέρημα clearly in modern English
    better than the more wooden 'lack,' while retaining the material-shortage sense.
- source_word: ἵνα καὶ
  chosen: so that ... also
  alternatives:
  - in order that ... too
  lexicon: BDAG
  rationale: ἵνα introduces purpose, and καί adds reciprocity. Rendering both preserves
    Paul's logic of mutual provision.
- source_word: τὸ ἐκείνων περίσσευμα
  chosen: their abundance
  alternatives:
  - their surplus
  lexicon: BDAG
  rationale: For consistency with the first περίσσευμα, the same gloss is retained.
    The reciprocal structure is important to Paul's argument.
- source_word: γένηται εἰς τὸ ὑμῶν ὑστέρημα
  chosen: may also be for your need
  alternatives:
  - may come to be for your lack
  - may serve your need
  lexicon: BDAG
  rationale: γένηται is rendered with 'may ... be' to reflect the subjunctive in a
    purpose clause without awkwardness. Repeating 'for your need' mirrors the Greek
    structure and keeps the reciprocity explicit.
- source_word: ὅπως γένηται ἰσότης
  chosen: in order that there may be equality
  alternatives:
  - so that there may be fairness
  - so that there may be balance
  lexicon: BDAG
  rationale: ἰσότης denotes equality/fairness in proportionate sharing, not enforced
    sameness. 'Equality' is the most direct lexical equivalent and fits the immediate
    context of mutual supply; nuance can be preserved in a footnote.
