theological_decisions:
- issue: Meaning of ἰσότης in Paul's appeal for giving
  chosen_reading: equality in mutual provision
  alternative_readings:
  - fairness
  - equity
  rationale: The verse concerns reciprocal meeting of needs among believers, not an
    abstract social theory detached from context. 'Equality' best matches the Greek
    while the explanatory nuance is preserved in documentation and footnote.
  doctrine_reference: Translation philosophy §3, §5
