theological_decisions:
- issue: Meaning of the Spirit as ἀρραβών
  chosen_reading: Rendered concretely as 'the down payment of the Spirit' rather than abstracting to 'guarantee.'
  alternative_readings:
  - the guarantee of the Spirit
  - a deposit guaranteeing what is to come
  rationale: The text uses a commercial metaphor. Preserving that metaphor fits optimal equivalence and avoids flattening Paul's image into a purely doctrinal abstraction.
  doctrine_reference: Preserve theological tension rather than resolve it; readable modern English, not archaic or academic.
