id: 2CO.1.22
reference: 2 Corinthians 1:22
source:
  edition: SBLGNT
  text: ὁ καὶ σφραγισάμενος ἡμᾶς καὶ δοὺς τὸν ἀρραβῶνα τοῦ πνεύματος ἐν ταῖς καρδίαις ἡμῶν.
translation:
  text: who also sealed us and gave the down payment of the Spirit in our hearts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deposit' or 'guarantee' of the Spirit.
    reason: lexical_alternative
lexical_decisions:
- source_word: σφραγισάμενος
  chosen: sealed
  alternatives:
  - marked with a seal
  - set his seal on
  lexicon: BDAG
  rationale: σφραγίζω commonly denotes sealing or marking with a seal for ownership, authentication, or security. 'Sealed' is concise, natural English and preserves the metaphor without overexplaining it.
- source_word: δοὺς
  chosen: gave
  alternatives:
  - having given
  lexicon: BDAG
  rationale: Aorist participle from δίδωμι. In English, coordinating it as 'gave' fits the parallel structure with 'sealed' and reads naturally in relation to the prior finite clause.
- source_word: ἀρραβῶνα
  chosen: down payment
  alternatives:
  - deposit
  - guarantee
  - first installment
  lexicon: BDAG
  rationale: ἀρραβών refers to a first payment that guarantees the rest. 'Down payment' best preserves the commercial metaphor in clear modern English; 'guarantee' captures the sense but loses the concrete image.
- source_word: τοῦ πνεύματος
  chosen: of the Spirit
  alternatives:
  - which is the Spirit
  - the Spirit as a pledge
  lexicon: BDAG
  rationale: 'The genitive is best taken straightforwardly: the pledge/down payment consists in or comes from the Spirit. ''Of the Spirit'' preserves the compact Pauline wording without importing an interpretive expansion into the main text.'
- source_word: ἐν ταῖς καρδίαις ἡμῶν
  chosen: in our hearts
  alternatives:
  - into our hearts
  lexicon: BDAG
  rationale: ἐν with the dative καρδίαις is most naturally rendered 'in our hearts.' This preserves the inward/personal location of the Spirit's pledge without unnecessary paraphrase.
- source_word: ὁ καὶ ... καὶ
  chosen: who also ... and
  alternatives:
  - the one who also ... and
  lexicon: Greek grammar
  rationale: The article with participles refers back to God from the previous verse. Rendering it with relative 'who' gives idiomatic English continuity while preserving the connected participial description.
