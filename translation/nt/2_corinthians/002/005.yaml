id: 2CO.2.5
reference: 2 Corinthians 2:5
source:
  edition: SBLGNT
  text: Εἰ δέ τις λελύπηκεν, οὐκ ἐμὲ λελύπηκεν, ἀλλὰ ἀπὸ μέρους ἵνα μὴ ἐπιβαρῶ πάντας
    ὑμᾶς.
translation:
  text: But if anyone has caused grief, he has grieved not me, but in part all of
    you—to some extent, so that I may not overstate it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in part.”
    reason: lexical_alternative
  - marker: b
    text: Or “so that I may not burden all of you” or “so that I may not put it too
      heavily on all of you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: λελύπηκεν
  chosen: has caused grief / has grieved
  alternatives:
  - has made sorrowful
  - has pained
  lexicon: BDAG
  rationale: The perfect tense is preserved with 'has ...' to reflect a past act with
    present effect. 'Grief' / 'grieved' is natural modern English and keeps the lexical
    connection of λυπέω in both clauses.
- source_word: οὐκ ἐμὲ
  chosen: not me
  alternatives:
  - not me personally
  lexicon: BDAG
  rationale: A direct, minimal rendering preserves Paul's contrast without adding
    emphasis not explicit in the Greek.
- source_word: ἀπὸ μέρους
  chosen: to some extent
  alternatives:
  - in part
  - partly
  lexicon: BDAG
  rationale: This idiom is best rendered adverbially in clear English. 'To some extent'
    preserves Paul's qualification in readable modern style.
- source_word: ἐπιβαρῶ
  chosen: press too hard on
  alternatives:
  - burden
  - weigh down
  - put it too heavily on
  lexicon: BDAG
  rationale: Literally the verb means to place a burden on. In this context Paul appears
    to soften his statement rhetorically, so 'press too hard on' communicates the
    idiomatic sense while retaining the burden metaphor.
- source_word: πάντας ὑμᾶς
  chosen: all of you
  alternatives:
  - you all
  lexicon: BDAG
  rationale: This preserves the explicit comprehensiveness of πάντας and avoids flattening
    the corporate address.
