id: 2CO.11.24
reference: 2 Corinthians 11:24
source:
  edition: SBLGNT
  text: ὑπὸ Ἰουδαίων πεντάκις τεσσεράκοντα παρὰ μίαν ἔλαβον,
translation:
  text: Five times I received from the Jews forty lashes less one[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'forty minus one'; that is, thirty-nine lashes.
    reason: lexical_alternative
  - marker: b
    text: Or 'by the Jews.' The Greek identifies the source/agents of the punishment without specifying a particular governing body.
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπὸ Ἰουδαίων
  chosen: from the Jews
  alternatives:
  - by the Jews
  - from Jewish authorities
  lexicon: BDAG
  rationale: With ὑπό plus genitive, the phrase marks personal agency/source. 'From the Jews' is idiomatic in English and preserves Paul's statement about the source of the punishment without over-specifying an official body. 'By the Jews' is possible but less natural here; 'from Jewish authorities' interprets beyond the explicit wording.
- source_word: πεντάκις
  chosen: Five times
  alternatives:
  - On five occasions
  lexicon: BDAG
  rationale: The adverb straightforwardly means 'five times.' This keeps the repeated-experience emphasis and reads naturally in English.
- source_word: τεσσεράκοντα παρὰ μίαν
  chosen: forty lashes minus one
  alternatives:
  - forty less one
  - thirty-nine lashes
  lexicon: BDAG
  rationale: The idiom literally means 'forty minus one.' Rendering it as 'forty lashes minus one' makes explicit the punishment context implied by ἔλαβον and standard usage, while preserving the form of the Greek better than simply 'thirty-nine.' 'Lashes' is supplied in English because the object of receiving in this context is blows/stripes.
- source_word: ἔλαβον
  chosen: I received
  alternatives:
  - I got
  - I endured
  lexicon: BDAG
  rationale: λαμβάνω here means 'receive' in the sense of undergoing punishment. 'I received' is both literal and idiomatic; 'I endured' is interpretive and shifts the verbal image.
