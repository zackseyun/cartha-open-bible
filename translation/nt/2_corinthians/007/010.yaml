theological_decisions:
- issue: Nature of the contrast between two kinds of sorrow
  chosen_reading: Render the contrast as 'godly sorrow' versus 'worldly sorrow' without specifying beyond the text whether the resulting 'death' is primarily physical, spiritual, or eschatological.
  alternative_readings:
  - godly sorrow versus merely human sorrow
  - death as specifically spiritual death
  rationale: Paul contrasts sorrow aligned with God and sorrow belonging to the world, but he does not narrowly define the mode of 'death' here. Preserving the broader term avoids importing a doctrinally narrower interpretation than the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Relation of repentance to salvation
  chosen_reading: Translate εἰς σωτηρίαν as 'leading to salvation' rather than a stronger causal or sacramental formula.
  alternative_readings:
  - for salvation
  - resulting in salvation
  rationale: The verse states that godly sorrow produces repentance with salvation as its goal/result. The translation should not overdefine the mechanics of salvation or imply that repentance is an autonomous meritorious cause.
  doctrine_reference: Within historic orthodoxy, do not import denominationally specific causal formulations unless the Greek unambiguously supports them.
