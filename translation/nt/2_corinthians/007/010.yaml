id: 2CO.7.10
reference: 2 Corinthians 7:10
source:
  edition: SBLGNT
  text: ἡ γὰρ κατὰ θεὸν λύπη μετάνοιαν εἰς σωτηρίαν ἀμεταμέλητον ⸀ἐργάζεται· ἡ δὲ τοῦ κόσμου λύπη θάνατον κατεργάζεται.
translation:
  text: For godly sorrow produces repentance leading to salvation without regret[b][a], but worldly sorrow produces death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to God' sorrow. The Greek phrase is more literally 'sorrow according to God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a repentance not to be regretted leading to salvation.' The adjective 'without regret / not to be regretted' may be understood as describing the repentance more directly.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ θεὸν
  chosen: godly
  alternatives:
  - according to God
  - in accordance with God
  lexicon: BDAG
  rationale: The prepositional phrase modifies λύπη and denotes sorrow measured by or aligned with God. 'Godly' is idiomatic modern English and preserves the contrast with 'worldly' in the second clause better than the more wooden 'according to God.'
- source_word: λύπη
  chosen: sorrow
  alternatives:
  - grief
  lexicon: BDAG
  rationale: '''Sorrow'' is the standard and natural rendering here, fitting both clauses and the emotional-moral sense in context.'
- source_word: μετάνοιαν
  chosen: a change of mind
  alternatives:
  - change of mind
  lexicon: BDAG
  rationale: In Pauline usage here the term denotes repentance in the robust moral-spiritual sense, not merely an internal reconsideration. 'Repentance' is the clearest established English equivalent.
- source_word: εἰς σωτηρίαν
  chosen: leading to salvation
  alternatives:
  - for salvation
  - resulting in salvation
  lexicon: BDAG
  rationale: εἰς marks goal or result. 'Leading to salvation' expresses the directional/resultative force in readable English without overstating a mechanical causation.
- source_word: ἀμεταμέλητον
  chosen: without regret
  alternatives:
  - not to be regretted
  - without remorse
  lexicon: BDAG
  rationale: The adjective most naturally qualifies either the repentance or the salvation as something not regretted. In English, 'without regret' is concise and idiomatic while preserving the semantic link to regret/remorse. It is placed after 'salvation' to reflect the Greek sequence while allowing the phrase to describe the repentance-leading-to-salvation complex.
- source_word: ἐργάζεται
  chosen: produces
  alternatives:
  - works
  - brings about
  lexicon: BDAG
  rationale: The verb denotes effecting or accomplishing a result. 'Produces' is natural in both clauses and preserves the parallelism.
- source_word: τοῦ κόσμου
  chosen: worldly
  alternatives:
  - of the world
  lexicon: BDAG
  rationale: The genitive is adjectival in force, contrasting with κατὰ θεόν. 'Worldly' gives a clear and idiomatic antithesis to 'godly.'
- source_word: θάνατον
  chosen: death
  lexicon: BDAG
  rationale: The noun should be rendered straightforwardly as 'death.' The context leaves the exact nuance (spiritual, ultimate, or destructive outcome) implicit, and the translation should preserve that breadth.
- source_word: κατεργάζεται
  chosen: produces
  alternatives:
  - works out
  - brings about
  lexicon: BDAG
  rationale: Though intensified relative to ἐργάζεται, the two verbs are close enough here that rendering both as 'produces' preserves the rhetorical balance of the contrast. The slight lexical distinction is not weighty enough in this context to force awkward English variation.
