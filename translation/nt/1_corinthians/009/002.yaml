id: 1CO.9.2
reference: 1 Corinthians 9:2
source:
  edition: SBLGNT
  text: εἰ ἄλλοις οὐκ εἰμὶ ἀπόστολος, ἀλλά γε ὑμῖν εἰμι, ἡ γὰρ σφραγίς ⸂μου τῆς⸃ ἀποστολῆς
    ὑμεῖς ἐστε ἐν κυρίῳ.
translation:
  text: If I am not an apostle to others, yet I certainly am to you, for you are the
    seal of my apostleship in the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'proof' or 'authentication' of my apostleship. The Greek uses 'seal,'
      preserving the image of something that confirms authenticity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπόστολος
  chosen: apostle
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: In Pauline self-reference this denotes the recognized office/commission
    of an apostle, not merely a generic messenger. 'Apostle' preserves the technical
    force of Paul's defense.
- source_word: ἀλλά γε
  chosen: yet I certainly am
  alternatives:
  - but at least I am
  - but surely I am
  lexicon: BDAG
  rationale: The combination adds emphatic contrast. 'Yet I certainly am' captures
    both the adversative turn and the strengthening force of γε in natural English.
- source_word: σφραγίς
  chosen: seal
  alternatives:
  - proof
  - authentication
  - mark
  lexicon: BDAG
  rationale: The metaphor is of a seal that authenticates something as genuine. 'Seal'
    keeps the image from the Greek while still communicating evidential force in context.
- source_word: ἀποστολή
  chosen: apostleship
  alternatives:
  - commission
  - mission
  lexicon: BDAG
  rationale: Here the noun refers to Paul's apostolic office/commission. 'Apostleship'
    best matches the institutional and personal sense in this defense.
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - by the Lord
  - in union with the Lord
  lexicon: BDAG
  rationale: This Pauline phrase is best preserved literally. It likely locates the
    Corinthians' validating existence within their relationship to the Lord, rather
    than merely indicating agency.
- source_word: ἄλλοις
  chosen: to others
  alternatives:
  - for others
  lexicon: BDAG
  rationale: The dative is rendered idiomatically in English with 'to others' after
    'am an apostle,' preserving the relational sense without awkwardness.
