theological_decisions:
- issue: Force of Paul's claim about apostleship
  chosen_reading: Paul concedes that some may deny his apostleship in relation to
    others, but asserts that the Corinthians themselves function as validating evidence
    of his true apostleship.
  alternative_readings:
  - Paul means he is not an apostle at all in others' estimation but only in a limited
    sense to the Corinthians
  rationale: The syntax and argument of the passage are defensive and rhetorical,
    not a literal limitation of Paul's apostleship to one church. The verse grounds
    his claim in the Corinthians' existence as a church.
