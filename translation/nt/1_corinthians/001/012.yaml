id: 1CO.1.12
reference: 1 Corinthians 1:12
source:
  edition: SBLGNT
  text: λέγω δὲ τοῦτο ὅτι ἕκαστος ὑμῶν λέγει· Ἐγὼ μέν εἰμι Παύλου, Ἐγὼ δὲ Ἀπολλῶ, Ἐγὼ δὲ Κηφᾶ, Ἐγὼ δὲ Χριστοῦ.
translation:
  text: 'What I mean is this: each of you says[a], “I belong to Paul,” or “I belong to Apollos,” or “I belong to Cephas,” or “I belong to Messiah.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I belong to Christ.”
    reason: alternative_reading
lexical_decisions:
- source_word: λέγω δὲ τοῦτο
  chosen: What I mean is this
  alternatives:
  - Now I say this
  - This is what I mean
  lexicon: BDAG
  rationale: Uses natural modern English to introduce Paul's clarification while preserving the explanatory force of the clause.
- source_word: ὅτι
  chosen: 'is this:'
  alternatives:
  - that
  lexicon: BDAG
  rationale: Folded into the introductory clause in idiomatic English; the content marker is preserved by the colon.
- source_word: ἕκαστος ὑμῶν
  chosen: each of you
  alternatives:
  - every one of you
  lexicon: BDAG
  rationale: Directly reflects the distributive force of ἕκαστος with clear contemporary English.
- source_word: λέγει
  chosen: says
  alternatives:
  - is saying
  lexicon: BDAG
  rationale: Simple present matches the Greek present and suits Paul's description of an ongoing pattern among them.
- source_word: Ἐγὼ μέν εἰμι Παύλου / Ἐγὼ δὲ Ἀπολλῶ / Ἐγὼ δὲ Κηφᾶ / Ἐγὼ δὲ Χριστοῦ
  chosen: I belong to Paul ... I belong to Apollos ... I belong to Cephas ... I belong to Messiah
  alternatives:
  - I am of Paul
  - I am with Paul
  - I follow Paul
  lexicon: BDAG
  rationale: The genitive after εἰμί expresses affiliation or belonging. 'I belong to' communicates factional allegiance more clearly in natural English without overinterpreting as formal discipleship.
- source_word: Κηφᾶ
  chosen: Cephas
  alternatives:
  - Peter
  lexicon: BDAG
  rationale: Personal names are transliterated by project policy; Paul uses the name Κηφᾶς here rather than Πέτρος.
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: This is a titular use, so the project default is to translate Χριστός as 'Messiah' rather than preserve the traditional transliteration 'Christ'.
