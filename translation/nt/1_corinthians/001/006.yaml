id: 1CO.1.6
reference: 1 Corinthians 1:6
source:
  edition: SBLGNT
  text: καθὼς τὸ μαρτύριον τοῦ Χριστοῦ ἐβεβαιώθη ἐν ὑμῖν,
translation:
  text: just as the testimony about Messiah was confirmed among you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the testimony of the Messiah.'
    reason: alternative_reading
  - marker: b
    text: Or, 'was confirmed in you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς
  chosen: just as
  alternatives:
  - even as
  - as
  lexicon: BDAG
  rationale: Introduces a comparison or correspondence with the preceding statement;
    'just as' is natural modern English and preserves the connective force.
- source_word: μαρτύριον
  chosen: testimony
  alternatives:
  - witness
  - message
  lexicon: BDAG
  rationale: The noun denotes testimony or witness. 'Testimony' best preserves the
    evidentiary and proclaimed sense without over-paraphrasing.
- source_word: τοῦ Χριστοῦ
  chosen: about the Messiah
  alternatives:
  - of the Messiah
  - about Christ
  lexicon: BDAG
  rationale: 'Χριστοῦ is taken as an objective genitive here: the testimony concerns
    Jesus. Following doctrine, Χριστός is rendered ''Messiah'' where the title sense
    is active rather than retaining the traditional ''Christ.'''
- source_word: ἐβεβαιώθη
  chosen: was confirmed
  alternatives:
  - was established
  - was made certain
  lexicon: BDAG
  rationale: The passive verb conveys being made firm or established. 'Was confirmed'
    is concise, idiomatic, and fits Paul's sense that the proclaimed testimony was
    validated in the Corinthians.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in you
  lexicon: BDAG
  rationale: With a plural addressee in this context, the phrase most naturally points
    to confirmation within the Corinthian community as a whole. 'Among you' communicates
    that communal sense in clear English.
