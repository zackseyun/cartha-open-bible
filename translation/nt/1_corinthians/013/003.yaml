theological_decisions:
- issue: Textual variant in the purpose clause
  chosen_reading: Translate the SBLGNT reading καυθήσομαι as 'I may be burned' in the main text.
  alternative_readings:
  - καυχήσωμαι — 'I may boast'
  rationale: The base text supplied is SBLGNT, so the draft follows its reading in the main text. Because the variant materially affects interpretation—martyrdom by burning versus grounds for boasting—the alternative is preserved in a footnote for transparency rather than silently ignored.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3 (preserve theological tension where ambiguity is genuine)
