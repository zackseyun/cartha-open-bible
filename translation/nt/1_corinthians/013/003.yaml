id: 1CO.13.3
reference: 1 Corinthians 13:3
source:
  edition: SBLGNT
  text: ⸂καὶ ἐὰν⸃ ψωμίσω πάντα τὰ ὑπάρχοντά μου, ⸄καὶ ἐὰν⸃ παραδῶ τὸ σῶμά μου, ἵνα ⸀καυθήσομαι, ἀγάπην δὲ μὴ ἔχω, οὐδὲν ὠφελοῦμαι.
translation:
  text: And if I give away all my possessions[a], and if I hand over my body so that I may be burned, but do not have love, I gain nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'so that I may boast' instead of 'so that I may be burned.'
    reason: textual_variant
lexical_decisions:
- source_word: ψωμίσω
  chosen: give away
  alternatives:
  - distribute
  - give out
  lexicon: BDAG
  rationale: The verb can mean to distribute in portions, originally 'feed with morsels.' In this context with 'all my possessions,' the sense is charitable distribution of one's goods. 'Give away' is natural modern English and preserves the total self-emptying force without sounding overly technical.
- source_word: πάντα τὰ ὑπάρχοντά μου
  chosen: all my possessions
  alternatives:
  - all that I have
  - all my goods
  lexicon: BDAG
  rationale: The participial expression refers to one's property or material holdings. 'All my possessions' is clear and idiomatic, while retaining the concrete sense of material assets.
- source_word: παραδῶ
  chosen: hand over
  alternatives:
  - deliver up
  - give over
  lexicon: BDAG
  rationale: '''Hand over'' preserves the formal force of παραδίδωμι and avoids importing a more interpretive sense such as ''sacrifice.'' It also fits the solemnity of yielding one''s body to suffering.'
- source_word: τὸ σῶμά μου
  chosen: my body
  lexicon: BDAG
  rationale: A straightforward rendering of the concrete noun phrase; no metaphorical expansion is warranted.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: This conjunction marks purpose or intended result. 'So that' is readable modern English and preserves the clause relationship.
- source_word: καυθήσομαι
  chosen: I may be burned
  alternatives:
  - I may boast
  lexicon: BDAG
  rationale: The SBLGNT text reads a future passive form from καίω, 'burn.' This is the main text reading and should be translated directly. Because a well-known textual variant reads καυχήσωμαι ('I may boast'), the alternative is preserved in a footnote rather than adopted into the main text.
- source_word: ἀγάπην
  chosen: love
  alternatives:
  - charity
  lexicon: BDAG
  rationale: Per doctrine defaults, ἀγάπη is rendered 'love.' 'Charity' is traditional but archaic in contemporary English and may narrow the sense improperly.
- source_word: οὐδὲν ὠφελοῦμαι
  chosen: I gain nothing
  alternatives:
  - I am benefited in nothing
  - it profits me nothing
  lexicon: BDAG
  rationale: The passive verb conveys receiving no benefit or profit. 'I gain nothing' is concise, idiomatic, and preserves the personal-result emphasis.
- source_word: καὶ ἐὰν ... καὶ ἐὰν
  chosen: And if ... and if
  alternatives:
  - Even if ... and if
  - If ... and if
  lexicon: BDAG
  rationale: The repeated conditional structure is retained to mirror Paul's escalating hypotheticals. Keeping both clauses explicit preserves the rhetoric better than compressing them.
