id: 1CO.13.12
reference: 1 Corinthians 13:12
source:
  edition: SBLGNT
  text: βλέπομεν γὰρ ἄρτι δι’ ἐσόπτρου ἐν αἰνίγματι, τότε δὲ πρόσωπον πρὸς πρόσωπον·
    ἄρτι γινώσκω ἐκ μέρους, τότε δὲ ἐπιγνώσομαι καθὼς καὶ ἐπεγνώσθην.
translation:
  text: For now we see in a mirror, dimly, but then face to face. Now I know in part,
    but then I will know fully, just as I also have been fully known.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dimly.' The Greek more literally says 'in a riddle' or 'enigmatically,'
      emphasizing indirect and puzzling perception.
    reason: lexical_alternative
lexical_decisions:
- source_word: βλέπομεν
  chosen: we see
  alternatives:
  - we look
  - we perceive
  lexicon: BDAG
  rationale: Present indicative with straightforward visual/cognitive sense. 'We see'
    preserves the metaphor and is idiomatic in English.
- source_word: ἄρτι
  chosen: now
  alternatives:
  - at present
  - for the present
  lexicon: BDAG
  rationale: Marks the present age/state in contrast with τότε ('then'). 'Now' is
    concise and preserves the temporal contrast.
- source_word: δι’ ἐσόπτρου
  chosen: through a mirror
  alternatives:
  - by means of a mirror
  - in a mirror
  lexicon: BDAG
  rationale: διά with genitive is most naturally 'through.' Although the imagery may
    imply indirect perception by means of a mirror, 'through a mirror' preserves the
    Greek construction and the metaphorical sense of mediated sight.
- source_word: ἐν αἰνίγματι
  chosen: in a riddle
  alternatives:
  - dimly
  - obscurely
  - enigmatically
  lexicon: BDAG
  rationale: The noun αἴνιγμα means 'riddle, enigma,' not an adjective meaning 'dim.'
    Traditional 'dimly' likely interprets the image rather than translating the noun
    directly. Following original-language primacy, 'in a riddle' preserves the metaphor
    of indirect, puzzling perception.
- source_word: τότε δὲ
  chosen: but then
  alternatives:
  - then
  - and then
  lexicon: BDAG
  rationale: δέ marks contrast with the present state. 'But then' makes the contrast
    explicit and natural in English.
- source_word: πρόσωπον πρὸς πρόσωπον
  chosen: face to face
  alternatives:
  - person to person
  lexicon: BDAG
  rationale: Established idiom that accurately renders the repeated noun with πρός
    and conveys direct, unmediated encounter.
- source_word: γινώσκω ἐκ μέρους
  chosen: I know in part
  alternatives:
  - I know partially
  lexicon: BDAG
  rationale: ἐκ μέρους is an idiomatic expression meaning 'in part' or 'partially.'
    'I know in part' is both accurate and stylistically fitting in the parallelism.
- source_word: ἐπιγνώσομαι
  chosen: I will know fully
  alternatives:
  - I will know completely
  - I will fully know
  lexicon: BDAG
  rationale: The compound verb ἐπιγινώσκω commonly intensifies γινώσκω to fuller or
    more complete knowledge. 'I will know fully' preserves the contrast with partial
    knowledge without overstating omniscience.
- source_word: καθὼς καὶ ἐπεγνώσθην
  chosen: just as I also have been fully known
  alternatives:
  - just as I also was fully known
  - even as I have been known
  lexicon: BDAG
  rationale: The aorist passive of ἐπιγινώσκω mirrors the previous future middle.
    Rendering both with 'fully know/fully known' preserves the lexical correspondence.
    English present perfect ('have been fully known') communicates a completed action
    with present relevance; the passive leaves the knower implicit, as in Greek.
