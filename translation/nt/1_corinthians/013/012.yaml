theological_decisions:
- issue: Extent of future knowledge in Paul's contrast between present partial knowledge
    and future ἐπιγνώσομαι
  chosen_reading: Rendered as 'I will know fully' rather than language implying exhaustive
    or divine omniscience.
  alternative_readings:
  - I will know completely
  - I will understand everything
  rationale: The verse contrasts partial with fuller knowledge in the eschatological
    state, but the text does not require the claim that believers will possess exhaustive
    knowledge equal to God's. 'Know fully' reflects the intensification of ἐπιγινώσκω
    while preserving theological restraint and the asymmetry implied by the passive
    'have been fully known.'
  doctrine_reference: Preserve theological tension rather than resolve it.
