theological_decisions:
- issue: Meaning of πίπτει in the clause 'Love never fails'
  chosen_reading: Love never fails
  alternative_readings:
  - Love never falls
  - Love never comes to an end
  rationale: The context contrasts love's enduring character with gifts that cease or are set aside. 'Fails' best expresses enduring reliability without collapsing the distinction between πίπτει and the later cessation verbs.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Sense of γλῶσσαι in this chapter
  chosen_reading: tongues
  alternative_readings:
  - languages
  rationale: Within 1 Corinthians 12–14, γλῶσσαι is a technical term for the charismatic phenomenon under discussion. Rendering it 'tongues' preserves the discourse context while leaving debates about its precise nature unresolved.
  doctrine_reference: 'Affirmations: preserve theological tension rather than resolve it'
