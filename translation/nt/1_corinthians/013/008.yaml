id: 1CO.13.8
reference: 1 Corinthians 13:8
source:
  edition: SBLGNT
  text: Ἡ ἀγάπη οὐδέποτε ⸀πίπτει. εἴτε δὲ προφητεῖαι, καταργηθήσονται· εἴτε γλῶσσαι, παύσονται· εἴτε γνῶσις, καταργηθήσεται.
translation:
  text: Love never fails[a]. But whether there are prophecies, they will be set aside; whether tongues, they will cease; whether knowledge[c][b], it will be set aside.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Love never falls' or 'Love never comes to an end.'
    reason: lexical_alternative
  - marker: b
    text: Or 'languages' for 'tongues.'
    reason: alternative_reading
  - marker: c
    text: The verb rendered 'will be set aside' is the same in both the 'prophecies' and 'knowledge' clauses.
    reason: cross_reference
lexical_decisions:
- source_word: ἀγάπη
  chosen: Love
  alternatives:
  - charity
  lexicon: BDAG
  rationale: Rendered with the default doctrinal gloss 'love.' 'Charity' is traditional in older English but is now archaic and too narrow for Paul's broader term.
- source_word: οὐδέποτε
  chosen: never
  alternatives:
  - at no time
  - never at all
  lexicon: BDAG
  rationale: A straightforward adverb of absolute negation; 'never' is the most natural modern English equivalent.
- source_word: πίπτει
  chosen: fails
  alternatives:
  - falls
  - collapses
  - comes to an end
  lexicon: BDAG
  rationale: In this context the verb is idiomatic rather than spatial. 'Fails' best captures the contrast with gifts that cease or are set aside. 'Falls' would sound opaque in English, while 'comes to an end' would over-assimilate it to the later verbs.
- source_word: εἴτε δὲ
  chosen: But whether there are
  alternatives:
  - But if there are
  - Whether
  lexicon: BDAG
  rationale: This introduces a series of contrasted possibilities. 'But whether there are' makes the elliptical Greek explicit in readable English while preserving the adversative turn from the previous clause.
- source_word: προφητεῖαι
  chosen: prophecies
  alternatives:
  - prophetic utterances
  lexicon: BDAG
  rationale: The plural noun refers to prophetic messages or acts of prophecy. 'Prophecies' is the standard and sufficiently clear rendering.
- source_word: καταργηθήσονται
  chosen: will be set aside
  alternatives:
  - will be abolished
  - will be done away with
  - will become inoperative
  lexicon: BDAG
  rationale: For καταργέω, 'set aside' communicates cessation of function without importing a stronger annihilation sense. It also reads naturally in modern English and can be used consistently with the singular occurrence later in the verse.
- source_word: γλῶσσαι
  chosen: tongues
  alternatives:
  - languages
  lexicon: BDAG
  rationale: In 1 Corinthians 12–14 the term commonly refers to the gift of tongues. 'Tongues' preserves the established contextual sense, while 'languages' remains a viable lexical alternative but is less precise for this discourse context.
- source_word: παύσονται
  chosen: will cease
  alternatives:
  - will stop
  - will come to an end
  lexicon: BDAG
  rationale: The future middle of παύω here naturally means 'will cease.' This preserves the verbal distinction from καταργέω in the surrounding clauses.
- source_word: γνῶσις
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: BDAG
  rationale: Rendered 'knowledge' in line with normal Pauline usage and the immediate contrast with partial knowing in the following context.
- source_word: καταργηθήσεται
  chosen: will be set aside
  alternatives:
  - will be abolished
  - will be done away with
  - will become inoperative
  lexicon: BDAG
  rationale: Same verb as earlier in the verse; rendered consistently as 'will be set aside' per the translation philosophy's consistency principle.
