id: 1CO.13.4
reference: 1 Corinthians 13:4
source:
  edition: SBLGNT
  text: Ἡ ἀγάπη μακροθυμεῖ, χρηστεύεται ἡ ἀγάπη, οὐ ζηλοῖ ⸂ἡ ἀγάπη⸃, οὐ περπερεύεται,
    οὐ φυσιοῦται,
translation:
  text: Love is patient, love is kind. It does not envy, it does not boast, it is
    not puffed up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is jealous' for 'does not envy'; the Greek verb can denote either positive
      zeal or negative jealousy/envy, but the negative context here favors 'envy.'
    reason: lexical_alternative
  - marker: b
    text: Or 'is arrogant' for 'is puffed up'; Paul uses a metaphor of being inflated
      with pride.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγάπη
  chosen: love
  alternatives:
  - charity
  lexicon: BDAG
  rationale: DOCTRINE.md lists 'love' as the default rendering for ἀγάπη. 'Charity'
    is traditional in some English versions but is archaic in contemporary usage and
    can narrow the sense too much.
- source_word: μακροθυμεῖ
  chosen: is patient
  alternatives:
  - is long-suffering
  - is forbearing
  lexicon: BDAG
  rationale: The verb denotes being patient over time, especially toward others. 'Is
    patient' is natural modern English and preserves the durative ethical sense without
    archaic phrasing.
- source_word: χρηστεύεται
  chosen: is kind
  alternatives:
  - shows kindness
  - acts kindly
  lexicon: BDAG
  rationale: This rare verb expresses acting with kindness or benevolence. 'Is kind'
    is idiomatic and concise in English, matching the predicate style of the surrounding
    clauses.
- source_word: ζηλοῖ
  chosen: envy
  alternatives:
  - is jealous
  - be zealous
  lexicon: BDAG
  rationale: In this negative context, the sense is not positive zeal but resentful
    desire for what another has. 'Envy' communicates that clearly in English better
    than 'is jealous,' which can be broader or ambiguous.
- source_word: περπερεύεται
  chosen: boast
  alternatives:
  - brag
  - vaunt itself
  lexicon: BDAG
  rationale: The verb refers to self-display or bragging. 'Boast' is clear, dignified,
    and fits the register of the passage better than the more colloquial 'brag' or
    archaic 'vaunt itself.'
- source_word: φυσιοῦται
  chosen: is puffed up
  alternatives:
  - is arrogant
  - is conceited
  lexicon: BDAG
  rationale: Paul frequently uses this metaphor for inflated pride. 'Is puffed up'
    preserves the metaphor and Pauline diction better than flattening it to 'is arrogant,'
    though that is a valid interpretive alternative.
- source_word: ἡ ἀγάπη ... ἡ ἀγάπη ... ⸂ἡ ἀγάπη⸃
  chosen: Love ... love ... It
  alternatives:
  - Love ... love ... love
  lexicon: Greek grammar / discourse analysis
  rationale: The Greek repeats 'love' for rhetorical emphasis in the first clauses.
    English preserves that repetition in 'Love is patient, love is kind.' In the following
    negatives, using 'It' avoids awkward over-repetition while still reflecting the
    same subject across the series.
- source_word: οὐ
  chosen: does not / is not
  alternatives:
  - not
  lexicon: Greek grammar
  rationale: English requires auxiliary verbs or copular negation to express these
    finite verbal clauses naturally. 'Does not' is used with active verbs; 'is not'
    with the passive-like predicate 'puffed up.'
