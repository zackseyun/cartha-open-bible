theological_decisions:
- issue: Rendering of πίστις in a theologically significant Pauline context
  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: The doctrine excerpt specifies 'faith' as the default rendering for πίστις,
    with alternatives preserved where contested. In 1 Corinthians 13:13 the triad
    'faith, hope, love' strongly favors 'faith' rather than 'faithfulness.' No doctrinally
    driven reinterpretation is imported.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
- issue: Relative force of μείζων in English
  chosen_reading: the greatest of these is love
  alternative_readings:
  - love is greater than these
  - love is the greater of these
  rationale: The Greek comparative functions idiomatically to identify love as supreme
    within the triad. Rendering it as 'the greatest' communicates the intended ranking
    clearly in English without altering the theological point.
