id: 1CO.13.13
reference: 1 Corinthians 13:13
source:
  edition: SBLGNT
  text: νυνὶ δὲ μένει πίστις, ἐλπίς, ἀγάπη· τὰ τρία ταῦτα, μείζων δὲ τούτων ἡ ἀγάπη.
translation:
  text: 'And now these three remain: faith, hope, and love. But the greatest of these
    is love.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'But now'; the Greek connective can be rendered either way depending
      on whether the emphasis is continuation or contrast.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''abide'': the verb can mean ''remain'' or ''continue/endure.'''
    reason: lexical_alternative
  - marker: c
    text: '''Faith'' could also be understood more broadly as ''trust,'' though ''faith''
      is the standard rendering here.'
    reason: alternative_reading
lexical_decisions:
- source_word: νυνὶ δὲ
  chosen: And now
  alternatives:
  - Now
  - But now
  lexicon: BDAG
  rationale: νυνί marks the present or concluding state ('now'), while δέ provides
    mild connective contrast/continuation. 'And now' fits idiomatic English and preserves
    the discourse movement from the preceding contrast between temporary gifts and
    enduring virtues.
- source_word: μένει
  chosen: remain
  alternatives:
  - abide
  - continues
  lexicon: BDAG
  rationale: μένω here denotes continuing or enduring. 'Remain' is clear modern English
    and suits the contrast with gifts that pass away. 'Abide' is traditional but less
    natural for contemporary readers.
- source_word: πίστις
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per the doctrine table, πίστις defaults to 'faith.' In this triad with
    hope and love, 'faith' is the most natural and established sense. 'Trust' is possible
    but narrower; 'faithfulness' is less likely in this context.
- source_word: ἐλπίς
  chosen: hope
  alternatives:
  - expectation
  lexicon: BDAG
  rationale: ἐλπίς regularly means 'hope' in Pauline usage, especially in theological
    triads. 'Expectation' is possible lexically but too flat and less idiomatic here.
- source_word: ἀγάπη
  chosen: love
  alternatives:
  - charity
  lexicon: BDAG
  rationale: Per the doctrine table, ἀγάπη defaults to 'love.' 'Charity' reflects
    older English tradition but is now potentially misleading and archaic.
- source_word: τὰ τρία ταῦτα
  chosen: these three
  alternatives:
  - these three things
  - the three of these
  lexicon: BDAG
  rationale: The phrase points back to the three named virtues. 'These three' is concise,
    natural, and fully captures the demonstrative force without unnecessary expansion.
- source_word: μείζων
  chosen: the greatest
  alternatives:
  - greater
  - the larger
  lexicon: BDAG
  rationale: 'Though morphologically comparative (''greater''), the construction with
    the genitive τούτων in context is idiomatically rendered as a superlative in English:
    ''the greatest of these.'' This best reflects the sense of ranking among the three.'
- source_word: τούτων
  chosen: of these
  alternatives:
  - among these
  lexicon: BDAG
  rationale: The genitive after μείζων expresses comparison within the set. 'Of these'
    is the most direct and idiomatic rendering in English.
