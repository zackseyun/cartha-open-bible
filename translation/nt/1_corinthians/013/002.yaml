id: 1CO.13.2
reference: 1 Corinthians 13:2
source:
  edition: SBLGNT
  text: ⸂καὶ ἐὰν⸃ ἔχω προφητείαν καὶ εἰδῶ τὰ μυστήρια πάντα καὶ πᾶσαν τὴν γνῶσιν,
    ⸄καὶ ἐὰν⸅ ἔχω πᾶσαν τὴν πίστιν ὥστε ὄρη ⸀μεθιστάναι, ἀγάπην δὲ μὴ ἔχω, οὐθέν εἰμι.
translation:
  text: And if I have prophecy and understand all mysteries and all knowledge, and
    if I have all faith so as to move mountains, but do not have love, I am nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all trust'; less likely, 'all faithfulness.' The Greek word can carry
      a range of senses, but here likely refers to extraordinary faith.
    reason: lexical_alternative
lexical_decisions:
- source_word: προφητείαν
  chosen: prophecy
  alternatives:
  - the gift of prophecy
  - prophetic power
  lexicon: BDAG
  rationale: A direct rendering preserves the noun's broad sense in context of spiritual
    gifts without over-specifying either the act or office.
- source_word: εἰδῶ
  chosen: understand
  alternatives:
  - know
  lexicon: BDAG
  rationale: Although from οἶδα ('know'), 'understand' fits idiomatic English better
    with 'mysteries' and 'knowledge' in the same clause, while still conveying cognitive
    grasp rather than mere acquaintance.
- source_word: μυστήρια
  chosen: mysteries
  alternatives:
  - secret things
  - hidden truths
  lexicon: BDAG
  rationale: '''Mysteries'' is the established Pauline term and preserves the theological
    register of truths once hidden and now disclosed, without flattening the term.'
- source_word: γνῶσιν
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: BDAG
  rationale: This keeps distinction from εἰδῶ while preserving Paul's pairing of revelatory
    insight and knowledge as separate but related capacities.
- source_word: πᾶσαν τὴν πίστιν
  chosen: all faith
  alternatives:
  - complete faith
  - all trust
  lexicon: BDAG
  rationale: Following the project's default for πίστις, 'faith' is retained in the
    main text. The phrase is hyperbolic and refers to extraordinary faith in context,
    not saving faith as a technical category.
- source_word: ὥστε ὄρη μεθιστάναι
  chosen: so as to move mountains
  alternatives:
  - enough to move mountains
  - so that I can remove mountains
  lexicon: BDAG
  rationale: This renders the result construction naturally in English while preserving
    the idiom of extraordinary power. 'Move mountains' is both literal enough and
    recognizable as the Greek image.
- source_word: ἀγάπην
  chosen: love
  alternatives:
  - charity
  lexicon: BDAG
  rationale: Per doctrine default, ἀγάπη is rendered 'love.' 'Charity' is archaic
    in contemporary English and may narrow the sense improperly.
- source_word: οὐθέν εἰμι
  chosen: I am nothing
  alternatives:
  - I am of no account
  - I amount to nothing
  lexicon: BDAG
  rationale: The literal rendering is clear, forceful, and idiomatic. It preserves
    Paul's stark self-negation without interpretive expansion.
