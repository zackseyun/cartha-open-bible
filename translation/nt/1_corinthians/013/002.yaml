theological_decisions:
- issue: Rendering of πίστις in a context of extraordinary miracle-working capacity
  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: The doctrine file sets 'faith' as the default rendering for πίστις, with
    alternatives preserved where contested. Here the context is not the debated 'faith
    in/of Christ' construction but a general reference to extraordinary faith. 'Faithfulness'
    is less likely in this syntax and context, but preserved as an alternative because
    πίστις can bear that sense more broadly.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith; alternatives preserved
    where contested'
