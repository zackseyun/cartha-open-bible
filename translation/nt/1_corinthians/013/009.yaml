- issue: Meaning of prophetic activity in the church
  chosen_reading: Render προφητεύομεν as 'we prophesy' without narrowing it to either predictive foretelling or general preaching.
  alternative_readings:
  - we predict future events
  - we preach
  rationale: The immediate context concerns spiritual gifts, and the Greek term can cover inspired prophetic speech more broadly than mere prediction. A neutral rendering preserves the theological breadth of the source text rather than resolving a debated interpretation.
