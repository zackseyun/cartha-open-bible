id: 1CO.13.9
reference: 1 Corinthians 13:9
source:
  edition: SBLGNT
  text: ἐκ μέρους ⸀γὰρ γινώσκομεν καὶ ἐκ μέρους προφητεύομεν·
translation:
  text: For we know in part[a], and we prophesy in part.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'partially'; the Greek idiom is literally 'from a part' and is repeated for emphasis in both clauses.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ μέρους
  chosen: in part
  alternatives:
  - partially
  lexicon: BDAG
  rationale: The idiom ἐκ μέρους means 'in part' or 'partially.' 'In part' preserves the repeated Greek phrasing and fits Paul's contrast with what is complete in the following context.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ is a coordinating/explanatory conjunction. 'For' best preserves the explanatory link to the previous statement in a natural but still fairly formal way.
- source_word: γινώσκομεν
  chosen: we know
  alternatives:
  - we understand
  lexicon: BDAG
  rationale: γινώσκω ordinarily means 'to know.' 'We know' is the most direct rendering and preserves the epistemic sense without overinterpreting it as deeper comprehension.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  lexicon: BDAG
  rationale: Simple connective joining the two parallel clauses; 'and' preserves the symmetry of Paul's statement.
- source_word: προφητεύομεν
  chosen: we prophesy
  alternatives:
  - we speak prophetically
  lexicon: BDAG
  rationale: προφητεύω is best rendered 'prophesy' in this spiritual-gifts context. 'Speak prophetically' is possible but less concise and less directly tied to Paul's terminology in the chapter.
