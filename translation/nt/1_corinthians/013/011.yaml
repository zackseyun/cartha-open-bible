id: 1CO.13.11
reference: 1 Corinthians 13:11
source:
  edition: SBLGNT
  text: ὅτε ἤμην νήπιος, ⸂ἐλάλουν ὡς νήπιος, ἐφρόνουν ὡς νήπιος, ἐλογιζόμην ὡς νήπιος⸃· ⸀ὅτε γέγονα ἀνήρ, κατήργηκα τὰ τοῦ νηπίου.
translation:
  text: When I was a child[a], I spoke like a child, I thought like a child, I reasoned like a child. When I became a man, I put away the things of the child.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'childish things' or 'the ways of a child.' The Greek is literally 'the things of the child.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νήπιος
  chosen: child
  alternatives:
  - infant
  - little child
  lexicon: BDAG
  rationale: νήπιος denotes a young child, often with the sense of immaturity or inability to speak fully. 'Child' fits the metaphor naturally in English and avoids the overly narrow 'infant' while preserving the contrast with adulthood.
- source_word: ἐλάλουν
  chosen: I spoke
  alternatives:
  - I talked
  lexicon: BDAG
  rationale: λαλέω commonly means 'speak' or 'talk.' 'I spoke' is slightly more formal and matches the rhetorical cadence of the verse.
- source_word: ἐφρόνουν
  chosen: I thought
  alternatives:
  - I had the mindset of
  - I set my mind
  lexicon: BDAG
  rationale: φρονέω can involve thinking, mindset, or attitude. In this triad, 'I thought' is the most natural concise rendering and preserves the progression of speech, thought, and reasoning.
- source_word: ἐλογιζόμην
  chosen: I reasoned
  alternatives:
  - I considered
  - I reckoned
  lexicon: BDAG
  rationale: λογίζομαι often means to reckon, consider, or reason. 'I reasoned' best distinguishes it from ἐφρόνουν ('I thought') while preserving the intellectual nuance.
- source_word: γέγονα
  chosen: I became
  alternatives:
  - I have become
  lexicon: BDAG
  rationale: The perfect form can be rendered 'have become,' but in English idiom after 'when' the simple past 'became' reads more naturally while still conveying transition into a new state.
- source_word: ἀνήρ
  chosen: man
  alternatives:
  - adult
  - grown man
  lexicon: BDAG
  rationale: ἀνήρ ordinarily means 'man' rather than a gender-neutral 'person.' Per the gender-accurate philosophy, 'man' preserves the masculine singular contrast with 'child.' The context is representative rather than exclusionary, but the Greek wording should be retained.
- source_word: κατήργηκα
  chosen: I put away
  alternatives:
  - I did away with
  - I set aside
  lexicon: BDAG
  rationale: καταργέω can mean abolish, do away with, or render inoperative. Here the sense is that childish ways have been left behind. 'I put away' is idiomatic, clear, and fits the personal maturation metaphor better than the more abstract 'abolished.'
- source_word: τὰ τοῦ νηπίου
  chosen: the things of the child
  alternatives:
  - childish things
  - the ways of a child
  lexicon: BDAG
  rationale: The phrase is literally 'the things of the child.' This rendering preserves the concrete Greek expression while remaining understandable. 'Childish things' is idiomatic but slightly more interpretive.
