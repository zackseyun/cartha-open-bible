id: 1CO.13.10
reference: 1 Corinthians 13:10
source:
  edition: SBLGNT
  text: ὅταν δὲ ἔλθῃ τὸ τέλειον, ⸀τὸ ἐκ μέρους καταργηθήσεται.
translation:
  text: But when the perfect comes, the partial will be set aside.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the complete'' or ''the mature.'' The phrase ''the perfect'' (Greek:
      to teleion) is debated; interpreters variously understand it as completeness,
      maturity, or the eschatological consummation rather than the present partial
      state.'
    reason: alternative_reading
  - marker: b
    text: Or 'will be abolished,' 'will pass away,' or 'will be done away.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Introduces a temporal clause with contingency. In this context, 'when'
    is the natural English rendering for the anticipated future event rather than
    the more iterative 'whenever.'
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks a mild contrast with the preceding discussion of partial knowledge
    and prophecy. 'But' best preserves the adversative force in readable English.
- source_word: ἔλθῃ
  chosen: comes
  alternatives:
  - has come
  - arrives
  lexicon: BDAG
  rationale: Aorist subjunctive after ὅταν commonly points to a future event. English
    present 'comes' after 'when' is idiomatic and accurately conveys the sense.
- source_word: τὸ τέλειον
  chosen: the perfect
  alternatives:
  - the complete
  - the mature
  lexicon: BDAG
  rationale: τέλειος can denote what is complete, perfect, or mature. Because the
    neuter substantive here is interpretively contested and Paul leaves it somewhat
    open, 'the perfect' preserves the traditional and lexical breadth without prematurely
    narrowing it to one interpretation such as 'the complete' or 'maturity.'
- source_word: τὸ ἐκ μέρους
  chosen: the partial
  alternatives:
  - what is in part
  - the incomplete
  lexicon: BDAG
  rationale: The article with the prepositional phrase functions substantivally. 'The
    partial' is concise, natural English that matches the contrast with τὸ τέλειον
    while preserving the sense of something existing only in part.
- source_word: καταργηθήσεται
  chosen: will be set aside
  alternatives:
  - will be abolished
  - will pass away
  - will be done away
  lexicon: BDAG
  rationale: The future passive indicates that the partial will be rendered inoperative
    or brought to an end. 'Will be set aside' communicates cessation without overstating
    annihilation, fitting Paul's contrast in context. Alternatives are viable and
    worth preserving.
