theological_decisions:
- issue: Interpretation of τὸ τέλειον
  chosen_reading: Rendered generically as 'the perfect' without specifying its referent.
  alternative_readings:
  - the complete (often taken as completeness or completion)
  - the mature (often taken as maturity)
  - an eschatological state associated with Christ's return or face-to-face knowledge
  - the completed canon of Scripture
  rationale: This phrase is a well-known interpretive crux. The Greek itself does
    not explicitly identify the referent in this verse, and the translation should
    preserve that ambiguity rather than resolve it doctrinally. The neuter form supports
    an abstract or collective sense, but does not by itself settle the question. Therefore
    the main text keeps the broader rendering, with alternatives preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
