id: 1CO.13.6
reference: 1 Corinthians 13:6
source:
  edition: SBLGNT
  text: οὐ χαίρει ἐπὶ τῇ ἀδικίᾳ, συγχαίρει δὲ τῇ ἀληθείᾳ·
translation:
  text: it does not rejoice in unrighteousness, but rejoices with the truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wrongdoing' or 'injustice' for 'unrighteousness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'rejoices in the truth.' The Greek compound verb can mean to share joy
      together with, or to rejoice over, the truth.
    reason: lexical_alternative
lexical_decisions:
- source_word: χαίρει
  chosen: rejoice
  alternatives:
  - delight
  - be glad
  lexicon: BDAG
  rationale: χαίρω denotes rejoicing or taking gladness. 'Rejoice' preserves the verbal
    parallel with συγχαίρει and fits Paul's elevated style better than the flatter
    'is glad.'
- source_word: ἐπὶ τῇ ἀδικίᾳ
  chosen: in unrighteousness
  alternatives:
  - at wrongdoing
  - over injustice
  lexicon: BDAG
  rationale: With χαίρω, ἐπί + dative can mark the basis or occasion of rejoicing
    ('over/at'). In idiomatic English, 'rejoice in' is natural and preserves the sense
    of taking pleasure in something. ἀδικία can mean wrongdoing, injustice, or unrighteousness.
    'Unrighteousness' was chosen to retain the broader moral sense and to align with
    Pauline ethical/theological usage, while preserving alternatives in a footnote.
- source_word: συγχαίρει
  chosen: rejoices with
  alternatives:
  - rejoices in
  - shares joy with
  lexicon: BDAG
  rationale: The compound verb adds the notion of sharing joy together. 'Rejoices
    with' preserves the συν- prefix more transparently than simply repeating 'rejoices
    in,' while remaining natural English.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - rather
  lexicon: BDAG
  rationale: δέ here marks contrast between what love does not do and what it does
    do. 'But' best conveys the adversative force in English.
- source_word: τῇ ἀληθείᾳ
  chosen: the truth
  alternatives:
  - truth
  - what is true
  lexicon: BDAG
  rationale: ἀλήθεια here likely carries both the sense of truthfulness/reality and
    the moral sphere opposed to ἀδικία. 'The truth' preserves the article and the
    conceptual contrast with ἀδικία without over-specifying whether Paul means truth
    in speech, conduct, or the gospel more broadly.
