theological_decisions:
- issue: Rendering ἀδικία in a Pauline ethical contrast
  chosen_reading: unrighteousness
  alternative_readings:
  - wrongdoing
  - injustice
  rationale: Paul's contrast with ἀλήθεια is broader than a merely forensic or social
    category. 'Unrighteousness' preserves the moral-theological dimension without
    importing a narrower modern legal sense. This also coheres with the project's
    preference to preserve theological weight where the source supports it.
