theological_decisions:
- issue: Meaning of love's repeated πάντα statements
  chosen_reading: The language is rhetorical and character-descriptive, expressing love's comprehensive steadfastness rather than an absolute claim that love approves or credulously accepts every possible thing.
  alternative_readings:
  - Absolute universalism of action or credulity
  rationale: The immediate context is a poetic description of ἀγάπη's character. Rendering the repeated πάντα as 'all things' preserves Paul's rhetoric without importing the idea that love is morally undiscerning or naive.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
