id: 1CO.13.7
reference: 1 Corinthians 13:7
source:
  edition: SBLGNT
  text: πάντα στέγει, πάντα πιστεύει, πάντα ἐλπίζει, πάντα ὑπομένει.
translation:
  text: It bears all things[a], believes all things, hopes all things[b], endures all things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'covers all things'; στέγει can carry the sense of covering or protecting as well as bearing.
    reason: lexical_alternative
  - marker: b
    text: Or 'trusts all things'; the sense is not that love is gullible, but that it is inclined toward trust.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα
  chosen: all things
  alternatives:
  - everything
  - all
  lexicon: BDAG
  rationale: The repeated neuter plural accusative functions comprehensively with each verb. 'All things' preserves the rhetorical repetition and breadth without over-specifying the object.
- source_word: στέγει
  chosen: bears
  alternatives:
  - covers
  - puts up with
  - protects
  lexicon: BDAG
  rationale: στέγω can mean 'cover' or by extension 'bear, endure.' In this context of love's persevering qualities, 'bears' best fits the sequence and avoids implying concealment alone. The alternative nuance 'covers' is worth preserving in a footnote because it has longstanding support and may suggest protective restraint.
- source_word: πιστεύει
  chosen: believes
  alternatives:
  - trusts
  lexicon: BDAG
  rationale: πιστεύω normally means 'believe' or 'trust.' 'Believes' keeps the lexical connection transparent and matches the repeated concise style of the verse. In context it does not mean gullibility, but that love is disposed toward trust; 'trusts' is preserved as an alternative.
- source_word: ἐλπίζει
  chosen: hopes
  alternatives:
  - keeps hoping
  lexicon: BDAG
  rationale: The present tense here expresses characteristic action. 'Hopes' is the most direct rendering and preserves the terse parallelism.
- source_word: ὑπομένει
  chosen: endures
  alternatives:
  - perseveres
  - remains steadfast
  lexicon: BDAG
  rationale: ὑπομένω carries the sense of remaining under pressure, enduring, persevering. 'Endures' is concise, idiomatic, and fits the climactic final verb in the series.
