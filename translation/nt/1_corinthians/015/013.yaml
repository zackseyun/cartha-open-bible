id: 1CO.15.13
reference: 1 Corinthians 15:13
source:
  edition: SBLGNT
  text: εἰ δὲ ἀνάστασις νεκρῶν οὐκ ἔστιν, οὐδὲ Χριστὸς ἐγήγερται·
translation:
  text: But if there is no resurrection of the dead[b][a], then not even Messiah has been raised.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Christ has been raised.' The Greek title Χριστός can be rendered 'Christ' or 'Messiah'; here 'Messiah' is used to preserve the title's meaning.
    reason: alternative_reading
  - marker: b
    text: Or, 'has risen.' The Greek verb is passive ('has been raised'), which may imply God's action without stating the agent explicitly.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δὲ
  chosen: But if
  alternatives:
  - Now if
  - If, however
  lexicon: BDAG
  rationale: εἰ introduces the conditional clause; δέ marks a mild contrast or continuation. 'But if' preserves the argumentative turn from the previous verse in natural English.
- source_word: ἀνάστασις
  chosen: resurrection
  alternatives:
  - rising
  lexicon: BDAG
  rationale: Standard Pauline term for resurrection; 'resurrection' is the clearest and most established English equivalent without loss of meaning.
- source_word: νεκρῶν
  chosen: of the dead
  alternatives:
  - of dead people
  - from the dead
  lexicon: BDAG
  rationale: The genitive plural with ἀνάστασις is best rendered 'of the dead,' referring to dead persons as a class. 'From the dead' would shift the construction toward source/origin rather than the category under discussion.
- source_word: οὐκ ἔστιν
  chosen: there is no
  alternatives:
  - does not exist
  - is not
  lexicon: BDAG
  rationale: 'This idiomatic English rendering best conveys existential negation in the clause: Paul is denying the existence/reality of resurrection.'
- source_word: οὐδὲ
  chosen: then not even
  alternatives:
  - neither
  - and not even
  lexicon: BDAG
  rationale: In context οὐδέ draws the inference from the conditional premise. 'Then not even' makes the logical force explicit in idiomatic English while preserving Paul's reductio argument.
- source_word: Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per project doctrine, Χριστός is translated as 'Messiah' where functioning as a title rather than a name-like form. Here Paul is making a theological claim about the anointed one, so the titular sense is appropriate.
- source_word: ἐγήγερται
  chosen: has been raised
  alternatives:
  - has risen
  - has been awakened
  lexicon: BDAG
  rationale: Perfect passive indicative of ἐγείρω. 'Has been raised' preserves both the perfect aspect (present relevance of a completed event) and the passive voice, which in Pauline usage often implies God's action without needing to state the agent explicitly.
