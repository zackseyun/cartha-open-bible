id: 1CO.3.6
reference: 1 Corinthians 3:6
source:
  edition: SBLGNT
  text: ἐγὼ ἐφύτευσα, Ἀπολλῶς ἐπότισεν, ἀλλὰ ὁ θεὸς ηὔξανεν·
translation:
  text: I planted[a], Apollos watered, but God gave the growth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “but God gave the growth” / “but God made it grow.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγὼ
  chosen: I
  alternatives:
  - I myself
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis, but normal English can preserve this adequately with simple subject expression in context without becoming overly heavy.
- source_word: ἐφύτευσα
  chosen: planted
  alternatives:
  - did the planting
  - sowed
  lexicon: BDAG
  rationale: φυτεύω commonly means 'plant.' 'Planted' preserves the agricultural metaphor naturally and matches Paul's contrast with watering and God's giving growth.
- source_word: Ἀπολλῶς
  chosen: Apollos
  rationale: Personal names are transliterated by standard convention per project philosophy.
- source_word: ἐπότισεν
  chosen: watered
  alternatives:
  - gave water to
  - did the watering
  lexicon: BDAG
  rationale: ποτίζω here fits the farming image. 'Watered' is the most natural concise equivalent in English.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - yet
  - however
  lexicon: BDAG
  rationale: ἀλλά marks strong contrast; 'but' is the clearest natural connective here.
- source_word: ὁ θεὸς
  chosen: God
  alternatives:
  - God himself
  lexicon: BDAG
  rationale: The articular subject identifies God as the true effective agent in contrast to human ministers. English does not require the article.
- source_word: ηὔξανεν
  chosen: was causing the growth
  alternatives:
  - gave the growth
  - was making it grow
  - caused it to grow
  lexicon: BDAG
  rationale: The imperfect tense suggests ongoing action in past time, not merely a simple past event. 'Was causing the growth' preserves the verbal aspect and keeps the agricultural metaphor explicit. 'Gave the growth' is traditional, but less transparent to modern readers and slightly less direct as a rendering of αὐξάνω.
