theological_decisions:
- issue: Rendering Χριστοῦ
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: 'The translation philosophy directs that Χριστός be rendered ''Messiah'' where it functions as a title rather than a name-like designation. In this verse the titular sense is natural: ministers belong to and serve God''s anointed king.'
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
- issue: Generic masculine ἄνθρωπος
  chosen_reading: a man
  alternative_readings:
  - a person
  - anyone
  rationale: The Greek singular masculine is generic, and the project specifies gender-accurate rendering over gender-neutral smoothing. Because English readers may understand the sense generically, an explanatory footnote preserves that nuance.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4: Gender-accurate over gender-neutral'
