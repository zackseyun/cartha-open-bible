theological_decisions:
- issue: Rendering Χριστός in the Pauline closing formula ἐν Χριστῷ Ἰησοῦ
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The translation philosophy directs that titles be translated and names
    transliterated. Although 'Christ Jesus' is traditional and can function name-like
    in Paul, the phrase still bears christological meaning. Rendering it 'Messiah
    Jesus' preserves that meaning while remaining readable.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names. Χριστός
    default: Messiah (where title; Christ where name-like).'
- issue: Supplying an implied verb in a verbless benediction
  chosen_reading: My love be with all of you
  alternative_readings:
  - My love is with all of you
  rationale: The Greek lacks an explicit verb. In an epistolary closing blessing or
    wish, English commonly supplies 'be' rather than 'is.' This better reflects the
    benedictory tone without asserting a different tense/aspect than the Greek states.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve source sense without
    paraphrase.'
