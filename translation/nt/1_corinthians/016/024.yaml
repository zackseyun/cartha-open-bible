id: 1CO.16.24
reference: 1 Corinthians 16:24
source:
  edition: SBLGNT
  text: ἡ ἀγάπη μου μετὰ πάντων ὑμῶν ἐν Χριστῷ ⸀Ἰησοῦ.
translation:
  text: My love be with all of you in Messiah Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "Christ Jesus." The Greek title Χριστός can be rendered either as the
      translated title "Messiah" or, in more traditional English, "Christ."'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγάπη
  chosen: love
  alternatives:
  - charity
  lexicon: BDAG
  rationale: Default rendering per doctrine table; straightforward sense of affectionate,
    self-giving love. 'Charity' is archaic in contemporary English and would obscure
    the plain sense.
- source_word: μου
  chosen: my
  lexicon: BDAG
  rationale: Simple possessive pronoun indicating Paul's personal affection toward
    the recipients.
- source_word: μετὰ
  chosen: be with
  alternatives:
  - with
  lexicon: BDAG
  rationale: The Greek is verbless, functioning as a benedictory closing wish. English
    idiom naturally supplies 'be' to express the implied sense of presence or accompaniment.
- source_word: πάντων ὑμῶν
  chosen: all of you
  alternatives:
  - you all
  - all of you all
  lexicon: BDAG
  rationale: The genitive plural with μετά means 'with all of you.' This preserves
    the inclusive scope of Paul's closing affection to the whole Corinthian church.
- source_word: ἐν
  chosen: in
  alternatives:
  - through
  - within the sphere of
  lexicon: BDAG
  rationale: Retains the common Pauline locative/sphere expression without over-interpreting
    it. 'In' is both natural and theologically important in Paul's union-with-Christ
    language.
- source_word: Χριστῷ Ἰησοῦ
  chosen: Messiah Jesus
  alternatives:
  - Christ Jesus
  lexicon: BDAG
  rationale: Per doctrine guidance, Χριστός is translated as 'Messiah' where functioning
    as a title rather than a fixed name-like form. Here the phrase still carries titular
    force, so 'Messiah Jesus' preserves meaning more transparently than traditional
    'Christ Jesus'.
