theological_decisions:
- issue: Meaning of the passive ἀγνοεῖται
  chosen_reading: 'a reciprocal/judicial sense: the person who refuses to acknowledge apostolic instruction will himself not be acknowledged'
  alternative_readings:
  - 'a textual variant reflected in some traditions: ''let him be ignorant'''
  - 'mere descriptive sense: ''he is unknown'''
  rationale: The SBLGNT text reads the passive indicative ἀγνοεῖται, not an imperative. In context, Paul warns that refusal to recognize his instruction has consequences in the community and before God. Rendering it as 'is ignored' preserves the passive indicative and the rhetorical reciprocity without over-specifying the agent.
