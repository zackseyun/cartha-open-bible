id: 1CO.14.38
reference: 1 Corinthians 14:38
source:
  edition: SBLGNT
  text: εἰ δέ τις ἀγνοεῖ, ⸀ἀγνοεῖται.
translation:
  text: But if anyone does not recognize this[b][a], he is not recognized.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read, 'if anyone is ignorant, let him be ignorant.' The adopted text reads, 'if anyone ignores this, he is ignored.'
    reason: textual_variant
  - marker: b
    text: Or 'does not acknowledge ... is not acknowledged.' The Greek uses the same verb in active and passive forms for rhetorical effect.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ
  chosen: if
  lexicon: BDAG
  rationale: Standard conditional particle introducing a first-class/simple condition in English form without implying truth value beyond the Greek construction.
- source_word: δέ
  chosen: but
  alternatives:
  - now
  - and
  lexicon: BDAG
  rationale: Marks contrast with the preceding assertion about recognizing Paul's instruction; 'but' best conveys the adversative turn.
- source_word: τις
  chosen: anyone
  alternatives:
  - someone
  - a person
  lexicon: BDAG
  rationale: Indefinite singular referring generically to any person. 'Anyone' is natural modern English and preserves the generic force.
- source_word: ἀγνοεῖ
  chosen: ignores
  alternatives:
  - is ignorant
  - does not recognize
  - does not acknowledge
  lexicon: BDAG
  rationale: The verb can mean either 'be ignorant' or 'refuse to acknowledge/ignore.' In this context, following v. 37's call to recognize Paul's words as the Lord's command, 'ignores' best captures culpable refusal rather than mere lack of information.
- source_word: ἀγνοεῖται
  chosen: is ignored
  alternatives:
  - is not recognized
  - is unknown
  lexicon: BDAG
  rationale: 'Passive form most naturally means ''is ignored/not acknowledged.'' This creates a deliberate wordplay with the preceding active verb: the one who refuses acknowledgment will not be acknowledged. ''Is ignored'' preserves the rhetorical symmetry in concise English.'
