id: 1CO.12.16
reference: 1 Corinthians 12:16
source:
  edition: SBLGNT
  text: καὶ ἐὰν εἴπῃ τὸ οὖς· Ὅτι οὐκ εἰμὶ ὀφθαλμός, οὐκ εἰμὶ ἐκ τοῦ σώματος, οὐ παρὰ τοῦτο οὐκ ἔστιν ἐκ τοῦ σώματος·
translation:
  text: And if the ear says[a], ‘Because I am not an eye, I am not of the body,’ it is not for this reason not of the body.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'I am not part of the body' ... 'that does not make it any less a part of the body.' The Greek repeats 'from the body' for rhetorical effect.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  lexicon: BDAG
  rationale: Standard connective linking this example to the previous body-part analogy; simple coordination is sufficient.
- source_word: ἐὰν εἴπῃ
  chosen: if ... says
  alternatives:
  - if ... should say
  lexicon: BDAG
  rationale: ἐὰν with aorist subjunctive introduces a hypothetical condition. In natural English, 'if ... says' best captures the generic hypothetical without sounding stilted.
- source_word: τὸ οὖς
  chosen: the ear
  lexicon: BDAG
  rationale: Literal body-part term; personified in the analogy, so the ordinary anatomical gloss is retained.
- source_word: Ὅτι
  chosen: Because
  alternatives:
  - That
  lexicon: BDAG
  rationale: 'Here ὅτι introduces the content of the ear''s statement with a causal nuance: ''Because I am not an eye...'' English ''Because'' best reflects the logic of the complaint.'
- source_word: ὀφθαλμός
  chosen: an eye
  lexicon: BDAG
  rationale: Literal anatomical term. The indefinite article is natural in English predicate usage after 'I am not.'
- source_word: ἐκ τοῦ σώματος
  chosen: from the body
  alternatives:
  - part of the body
  lexicon: BDAG
  rationale: A more formal rendering of ἐκ is preserved as 'from' to mirror Paul's repeated wording and rhetorical structure. 'Part of the body' is interpretively smoother but less transparent to the Greek repetition.
- source_word: οὐ παρὰ τοῦτο
  chosen: not for this reason
  alternatives:
  - not because of this
  - it is not therefore
  lexicon: BDAG
  rationale: This idiom denies the conclusion on the basis just stated. 'Not for this reason' preserves the argumentative force and keeps the repetition of negation visible.
- source_word: οὐκ ἔστιν ἐκ τοῦ σώματος
  chosen: it is not ... not from the body
  alternatives:
  - it is not therefore not part of the body
  - that does not make it any less a part of the body
  lexicon: BDAG
  rationale: The Greek uses emphatic double negation in a rhetorical rebuttal. The main text preserves the negated structure for auditability, even though smoother English alternatives exist.
