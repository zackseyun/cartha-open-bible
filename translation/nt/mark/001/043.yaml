theological_decisions:
- issue: Tone of Jesus' action toward the healed man
  chosen_reading: Jesus speaks and acts with marked sternness, without implying sinful anger or hostility toward the man.
  alternative_readings:
  - Jesus merely gives a firm instruction with little emotional coloring
  - Jesus rebukes the man personally
  rationale: Both ἐμβριμησάμενος and ἐξέβαλεν are unusually strong expressions. The translation preserves that force, but avoids importing a theological claim that Jesus acted sinfully or that he was condemning the man. The context in the following verse supports a severe warning connected to obedience and publicity.
  doctrine_reference: Preserve theological tension rather than resolve it.
