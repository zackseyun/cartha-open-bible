theological_decisions:
- issue: Relation of baptism, repentance, and forgiveness
  chosen_reading: Rendered the phrase as 'a baptism of repentance for the forgiveness of sins' without specifying whether baptism is instrumental, symbolic, or declarative.
  alternative_readings:
  - a baptism signifying repentance for forgiveness
  - a baptism that brings forgiveness through repentance
  rationale: The Greek construction states the relationship but does not require the translator to settle later doctrinal debates about sacramental efficacy. The translation preserves the wording and theological tension of the source.
  doctrine_reference: Preserve theological tension rather than resolve it.
