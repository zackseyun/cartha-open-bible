id: MRK.1.31
reference: Mark 1:31
source:
  edition: SBLGNT
  text: καὶ προσελθὼν ἤγειρεν αὐτὴν κρατήσας τῆς ⸀χειρός· καὶ ἀφῆκεν αὐτὴν ὁ ⸀πυρετός, καὶ διηκόνει αὐτοῖς.
translation:
  text: And coming near[a], he raised her up, taking her by the hand; and the fever left her, and she served them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'served them.' The Greek imperfect may simply describe her serving, though the context also supports 'began serving them' as the immediate result of the healing.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθὼν
  chosen: coming near
  alternatives:
  - approaching
  - coming to her
  lexicon: BDAG
  rationale: Aorist participle of προσέρχομαι, indicating Jesus' movement toward her prior to the main action. 'Coming near' is natural English and preserves the participial sequence without over-specifying.
- source_word: ἤγειρεν
  chosen: raised her up
  alternatives:
  - lifted her up
  - helped her up
  lexicon: BDAG
  rationale: ἐγείρω commonly means 'raise up' and can also carry resonance with rising. Here it refers to helping her rise from bed. 'Raised her up' preserves the verbal force better than the weaker 'helped her up.'
- source_word: κρατήσας τῆς χειρός
  chosen: taking her by the hand
  alternatives:
  - grasping her hand
  - taking hold of her hand
  lexicon: BDAG
  rationale: 'κρατέω means to take hold of or grasp. The genitive with χείρ is idiomatic: ''by the hand.'' ''Taking her by the hand'' is clear, idiomatic English and reflects the means accompanying the raising.'
- source_word: ἀφῆκεν αὐτὴν
  chosen: left her
  alternatives:
  - released her
  - went away from her
  lexicon: BDAG
  rationale: ἀφίημι here means 'leave' in the sense that the fever departed from her. 'Left her' is the standard and most natural rendering in this healing context.
- source_word: πυρετός
  chosen: the fever
  alternatives:
  - fever
  lexicon: BDAG
  rationale: With the article, Greek personifies or specifies the illness as the known condition afflicting her. English naturally renders this as 'the fever.'
- source_word: διηκόνει
  chosen: began serving
  alternatives:
  - served
  - was serving
  - ministered
  lexicon: BDAG
  rationale: 'Imperfect of διακονέω can denote ongoing action following the healing. ''Began serving'' captures the ingressive sense often conveyed by the context: immediately after being healed, she started to serve them. ''Ministered'' is possible but sounds more ecclesiastical than the domestic context suggests.'
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - him and those with him
  lexicon: BDAG
  rationale: Plural dative pronoun refers to the group present, not Jesus alone. 'Them' is concise and accurate.
