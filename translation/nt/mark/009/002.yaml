id: MRK.9.2
reference: Mark 9:2
source:
  edition: SBLGNT
  text: Καὶ μετὰ ἡμέρας ἓξ παραλαμβάνει ὁ Ἰησοῦς τὸν Πέτρον καὶ τὸν Ἰάκωβον ⸀καὶ Ἰωάννην, καὶ ἀναφέρει αὐτοὺς εἰς ὄρος ὑψηλὸν κατ’ ἰδίαν μόνους. καὶ μετεμορφώθη ἔμπροσθεν αὐτῶν,
translation:
  text: And after six days[a], Jesus takes Peter and James and John, and brings them up onto a high mountain by themselves. And he was transfigured before them[c][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'six days later.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'privately, alone.' The Greek uses two expressions for separation, emphasizing that Jesus took only these three with him.
    reason: lexical_alternative
  - marker: c
    text: Or, 'was transformed before them.'
    reason: alternative_reading
lexical_decisions:
- source_word: μετὰ ἡμέρας ἓξ
  lemma: μετά
  chosen: after six days
  alternatives:
  - six days later
  lexicon: BDAG
  rationale: The preposition μετά with the accusative expresses temporal succession, naturally rendered 'after.' 'After six days' preserves the Greek wording more closely than the smoother idiom 'six days later.'
- source_word: παραλαμβάνει
  chosen: takes
  alternatives:
  - takes along
  - takes with him
  lexicon: BDAG
  rationale: The historical present is common in Mark. 'Takes' preserves the vivid present-tense narrative. The verb can imply taking along, but simple 'takes' is sufficient here since the named disciples follow as direct objects.
- source_word: ἀναφέρει
  chosen: brings ... up onto
  alternatives:
  - leads ... up to
  - takes ... up onto
  lexicon: BDAG
  rationale: The verb means to bring or lead up. Because the destination is a mountain, 'brings ... up onto' captures both upward movement and the sense of ascent without overinterpreting the manner.
- source_word: εἰς ὄρος ὑψηλὸν
  chosen: onto a high mountain
  alternatives:
  - to a high mountain
  - up a high mountain
  lexicon: BDAG
  rationale: εἰς marks movement toward/onto the mountain. 'High mountain' is the straightforward rendering of ὄρος ὑψηλόν. 'Onto' fits the ascent implied by ἀναφέρει.
- source_word: κατ’ ἰδίαν μόνους
  chosen: by themselves alone
  alternatives:
  - privately, alone
  - by themselves, alone
  lexicon: BDAG
  rationale: The phrase combines the idiom κατ’ ἰδίαν ('privately/by themselves') with μόνους ('alone'). The translation keeps both elements rather than collapsing them, preserving the emphatic separation from others.
- source_word: μετεμορφώθη
  chosen: was transfigured
  alternatives:
  - was transformed
  lexicon: BDAG
  rationale: '''Was transfigured'' is the established and contextually precise rendering for Jesus'' visible change in glory here. ''Was transformed'' is lexically possible but weaker in this narrative setting and less specific to the event described.'
- source_word: ἔμπροσθεν αὐτῶν
  chosen: before them
  alternatives:
  - in front of them
  - in their presence
  lexicon: BDAG
  rationale: '''Before them'' is natural English and preserves the sense that the event occurred in the disciples'' sight/presence.'
