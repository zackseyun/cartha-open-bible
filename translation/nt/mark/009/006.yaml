theological_decisions:
- issue: Subject of the plural clause
  chosen_reading: they became terrified
  alternative_readings:
  - he became terrified
  rationale: The plural adjective ἔκφοβοι and plural verb ἐγένοντο indicate a plural subject. In context this most naturally refers to Peter and his companions rather than Peter alone. This is a grammatical rather than doctrinal decision, and it avoids importing a singularizing interpretation not supported by the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
