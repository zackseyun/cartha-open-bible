id: MRK.16.10
reference: Mark 16:10
source:
  edition: SBLGNT
  text: ἐκείνη πορευθεῖσα ἀπήγγειλεν τοῖς μετ’ αὐτοῦ γενομένοις πενθοῦσι καὶ κλαίουσιν·
translation:
  text: She went and reported it to those who had been with him[a], who were mourning and weeping.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'She went and told those who had been with him, who were mourning and weeping.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκείνη
  chosen: She
  alternatives:
  - That woman
  - That one
  lexicon: BDAG
  rationale: The demonstrative refers back to Mary Magdalene in the prior verse. English naturally uses the pronoun 'she' here rather than the more wooden 'that one' or 'that woman.'
- source_word: πορευθεῖσα
  chosen: went
  alternatives:
  - having gone
  - after going
  lexicon: BDAG
  rationale: The aorist participle of πορεύομαι commonly functions adverbially before the main verb. In idiomatic English, 'went and reported' captures the sequence without awkwardness while preserving the action of departure.
- source_word: ἀπήγγειλεν
  chosen: reported it
  alternatives:
  - announced it
  - told
  lexicon: BDAG
  rationale: 'ἀπαγγέλλω means to report or announce. ''Reported it'' preserves the sense of conveying a message, with ''it'' supplied from context since the object is implicit in Greek: the resurrection appearance just mentioned.'
- source_word: τοῖς μετ’ αὐτοῦ γενομένοις
  chosen: to those who had been with him
  alternatives:
  - to those who had accompanied him
  - to his companions
  lexicon: BDAG
  rationale: The perfective sense is not required here; the participial phrase identifies the group associated with Jesus. 'Those who had been with him' is a clear and sufficiently formal rendering of the idiom.
- source_word: πενθοῦσι
  chosen: mourning
  alternatives:
  - grieving
  - lamenting
  lexicon: BDAG
  rationale: πενθέω denotes mourning, often in response to death or loss. 'Mourning' best matches the emotional and funerary context.
- source_word: καὶ κλαίουσιν
  chosen: and weeping
  alternatives:
  - and crying
  lexicon: BDAG
  rationale: κλαίω means to weep or cry aloud. 'Weeping' fits the solemn tone better than the more colloquial 'crying.'
- source_word: πενθοῦσι καὶ κλαίουσιν
  chosen: while they were mourning and weeping
  alternatives:
  - who were mourning and weeping
  lexicon: BDAG
  rationale: These present participles describe the state of the people to whom she reported. Rendering them with 'while they were' makes the contemporaneous circumstance explicit and reads naturally in English.
