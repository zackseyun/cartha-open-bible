id: MRK.3.34
reference: Mark 3:34
source:
  edition: SBLGNT
  text: καὶ περιβλεψάμενος ⸂τοὺς περὶ αὐτὸν κύκλῳ⸃ καθημένους λέγει· Ἴδε ἡ μήτηρ μου καὶ οἱ ἀδελφοί μου·
translation:
  text: And looking around at those seated around him in a circle[a], he says, “Behold, my mother and my brothers!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “siblings.” The Greek says “brothers,” but the wider group around Jesus may have included women as well.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιβλεψάμενος
  chosen: looking around
  alternatives:
  - having looked around
  - glancing around
  lexicon: BDAG
  rationale: The aorist middle participle denotes Jesus turning his gaze around those present. 'Looking around' is natural modern English and preserves the visual, deliberate action without overformal stiffness.
- source_word: τοὺς περὶ αὐτὸν κύκλῳ καθημένους
  chosen: those seated in a circle around him
  alternatives:
  - those sitting around him
  - those seated around him in a circle
  lexicon: BDAG
  rationale: The phrase combines περὶ αὐτόν ('around him'), κύκλῳ ('in a circle/all around'), and καθημένους ('seated'). Rendering all three elements explicitly preserves the spatial emphasis of the Greek. 'Seated' fits the participial form well in English.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Mark frequently uses the historical present. 'He says' preserves the vivid present-tense narrative style rather than flattening it into a simple past.
- source_word: Ἴδε
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Ἴδε is a deictic attention-getter. 'Look' is clear, idiomatic modern English and avoids the archaic tone of 'Behold' while retaining the force of directing attention.
- source_word: μήτηρ
  chosen: mother
  lexicon: BDAG
  rationale: Standard lexical sense; no contextual reason to vary.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - siblings
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and in this context refers to Jesus' familial category as redefined by discipleship. Per the translation philosophy, a gender-accurate rendering is preferred over a gender-neutral one. 'Brothers' preserves the source form; the broader representative sense can be noted in a footnote.
