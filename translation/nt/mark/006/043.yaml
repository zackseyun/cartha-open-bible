id: MRK.6.43
reference: Mark 6:43
source:
  edition: SBLGNT
  text: καὶ ἦραν ⸂κλάσματα δώδεκα κοφίνων πληρώματα⸃ καὶ ἀπὸ τῶν ἰχθύων.
translation:
  text: And they picked up twelve baskets full of broken pieces, and from the fish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'twelve full baskets of fragments.' The Greek expression literally combines
      'broken pieces,' 'twelve baskets,' and 'fillings/full amounts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦραν
  chosen: they picked up
  alternatives:
  - they took up
  - they gathered up
  - they lifted
  lexicon: BDAG
  rationale: Aorist of αἴρω here refers to collecting the leftovers after the feeding.
    'Picked up' is natural modern English and fits the narrative context better than
    the more wooden 'took up,' while preserving the concrete action.
- source_word: κλάσματα
  chosen: broken pieces
  alternatives:
  - fragments
  - pieces
  lexicon: BDAG
  rationale: κλάσματα denotes pieces broken off, here from the bread. 'Broken pieces'
    is transparent and slightly more explicit than 'fragments,' which can sound formal
    or idiomatic from translation tradition.
- source_word: δώδεκα κοφίνων πληρώματα
  chosen: twelve basketfuls
  alternatives:
  - fillings of twelve baskets
  - twelve full baskets
  - the contents of twelve baskets
  lexicon: BDAG
  rationale: The construction combines the number, the container term κόφινος, and
    πλήρωμα ('full amount, contents'). English idiom is best captured by 'twelve basketfuls,'
    which conveys both the number of baskets and that they were filled with leftovers.
- source_word: κόφινος
  chosen: basket
  alternatives:
  - hand basket
  lexicon: BDAG
  rationale: κόφινος is a basket, traditionally distinguished from larger terms like
    σπυρίς elsewhere. 'Basket' is the clear default; adding a size descriptor would
    over-specify beyond what the verse requires.
- source_word: πληρώματα
  chosen: basketfuls
  alternatives:
  - full amounts
  - contents
  - full baskets
  lexicon: BDAG
  rationale: πλήρωμα here indicates what fills the baskets or the full quantity collected.
    Rendering it within 'basketfuls' avoids awkward literalism while preserving the
    sense of filled baskets.
- source_word: ἀπὸ τῶν ἰχθύων
  chosen: and some of the fish
  alternatives:
  - and from the fish
  - and also from the fish
  lexicon: BDAG
  rationale: 'ἀπό marks source/partitive sense: the collected leftovers included portions
    from the fish as well. ''Some of the fish'' makes the partitive force clear in
    idiomatic English; a more literal ''from the fish'' is less natural.'
