id: MRK.6.13
reference: Mark 6:13
source:
  edition: SBLGNT
  text: καὶ δαιμόνια πολλὰ ἐξέβαλλον, καὶ ἤλειφον ἐλαίῳ πολλοὺς ἀρρώστους καὶ ἐθεράπευον.
translation:
  text: And they were casting out many demons[a], and were anointing many sick people with oil and healing them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with olive oil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δαιμόνια
  chosen: demons
  alternatives:
  - unclean spirits
  lexicon: BDAG
  rationale: The noun δαιμόνιον ordinarily denotes evil spirits or demons. 'Demons' is the most direct and natural English equivalent here. 'Unclean spirits' would import wording from nearby contexts but is not the term used in this verse.
- source_word: πολλὰ
  chosen: many
  alternatives:
  - a great many
  lexicon: BDAG
  rationale: The adjective πολύς in the neuter plural modifies δαιμόνια and is straightforwardly quantitative. 'Many' preserves the plain sense without expansion.
- source_word: ἐξέβαλλον
  chosen: were casting out
  alternatives:
  - cast out
  - driving out
  lexicon: BDAG
  rationale: Imperfect active indicative plural suggests ongoing or repeated action in narrative summary. 'Were casting out' preserves that imperfective aspect better than simple past 'cast out.' 'Driving out' is possible but 'casting out' is the established and accurate idiom for exorcism contexts.
- source_word: ἤλειφον
  chosen: were anointing
  alternatives:
  - anointed
  - rubbing on
  lexicon: BDAG
  rationale: ἀλείφω commonly means to anoint or smear/apply, often with oil. In this healing context, 'were anointing' is the most idiomatic and contextually fitting rendering, and it also reflects the imperfect aspect.
- source_word: ἐλαίῳ
  chosen: with oil
  alternatives:
  - with olive oil
  lexicon: BDAG
  rationale: ἔλαιον means oil, commonly olive oil in the ancient Mediterranean setting. English 'oil' is sufficient and idiomatic; 'olive oil' is more explicit but unnecessarily specific in the main text.
- source_word: ἀρρώστους
  chosen: sick people
  alternatives:
  - the sick
  - the ill
  lexicon: BDAG
  rationale: The adjective ἄρρωστος means sick or ill. Because the Greek adjective is substantival here and modified by πολλούς, 'many sick people' is natural modern English and avoids stiffness. 'The sick' is possible but less smooth in this sentence.
- source_word: ἐθεράπευον
  chosen: healing them
  alternatives:
  - were healing
  - cured them
  lexicon: BDAG
  rationale: θεραπεύω means to heal or cure. 'Healing them' naturally picks up the previously mentioned sick people in English and preserves the ongoing/repeated sense of the imperfect. 'Cured' is possible but can sound more absolute or clinical than the Greek requires.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  lexicon: BDAG
  rationale: The repeated καί coordinates the actions in a simple narrative chain. 'And' preserves the paratactic style of the Greek.
