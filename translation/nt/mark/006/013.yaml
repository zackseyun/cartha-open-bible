theological_decisions:
- issue: Function of anointing with oil in relation to healing
  chosen_reading: Translate descriptively as a historical action without implying a sacramental mechanism.
  alternative_readings:
  - The oil itself effected healing
  - The anointing was purely symbolic with no role in the healing act
  rationale: The verse reports that the disciples anointed sick people with oil and healed them, but it does not explicitly define the theological mechanism or establish a doctrine of sacramental efficacy. The translation therefore stays close to the wording and preserves the narrative sequence without importing later doctrinal conclusions.
  doctrine_reference: Preserve theological tension rather than resolve it.
