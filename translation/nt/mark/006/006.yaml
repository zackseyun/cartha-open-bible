id: MRK.6.6
reference: Mark 6:6
source:
  edition: SBLGNT
  text: καὶ ⸀ἐθαύμαζεν διὰ τὴν ἀπιστίαν αὐτῶν. Καὶ περιῆγεν τὰς κώμας κύκλῳ διδάσκων.
translation:
  text: And he was amazed because of their unbelief. And he went around among the
    villages, teaching.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'marveled because of their unbelief.'
    reason: lexical_alternative
  - marker: b
    text: Or 'went around the surrounding villages' or 'went about in a circuit among
      the villages.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐθαύμαζεν
  chosen: was amazed
  alternatives:
  - marveled
  - wondered
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or durative past action; 'was amazed'
    captures the sense naturally in modern English. 'Marveled' is traditional and
    possible, but 'was amazed' is more accessible while preserving the force of θαυμάζω.
- source_word: διὰ τὴν ἀπιστίαν αὐτῶν
  chosen: because of their unbelief
  alternatives:
  - because of their lack of faith
  lexicon: BDAG
  rationale: διά with the accusative here expresses cause ('because of'). ἀπιστία
    is best rendered 'unbelief' in this context, emphasizing refusal to believe rather
    than mere weakness of trust. 'Lack of faith' is possible but softer.
- source_word: περιῆγεν
  chosen: went around
  alternatives:
  - went about
  - traveled around
  lexicon: BDAG
  rationale: The imperfect of περιάγω here describes continued movement from place
    to place. 'Went around' is concise, natural English and fits the itinerant sense.
- source_word: τὰς κώμας
  chosen: the villages
  alternatives:
  - the village settlements
  lexicon: BDAG
  rationale: κώμη refers to a village or rural settlement. 'Villages' is the standard
    and clearest rendering.
- source_word: κύκλῳ
  chosen: among
  alternatives:
  - in a circuit
  - round about
  - around
  lexicon: BDAG
  rationale: κύκλῳ functions adverbially, indicating movement in the surrounding area
    or in a circuit. In idiomatic English, 'went around among the villages' conveys
    the sense without awkwardness. A more literal 'in a circuit' is possible but less
    natural.
- source_word: διδάσκων
  chosen: teaching
  alternatives:
  - while teaching
  lexicon: BDAG
  rationale: The present participle is contemporaneous with the main verb, indicating
    what he was doing as he went. 'Teaching' preserves the participial force in smooth
    English; 'while teaching' is slightly more explicit but not necessary.
