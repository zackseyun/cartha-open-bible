theological_decisions:
- issue: Rendering Jesus' response to unbelief without implying ignorance or doctrinally
    problematic surprise
  chosen_reading: And he was amazed because of their unbelief.
  alternative_readings:
  - And he marveled because of their unbelief.
  rationale: The text straightforwardly states that Jesus marveled/amazed at their
    unbelief. The translation preserves this as written without softening it or importing
    speculative explanations. This maintains the narrative force while remaining within
    orthodox Christology by not adding claims beyond the text.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
