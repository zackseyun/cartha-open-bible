id: MRK.6.19
reference: Mark 6:19
source:
  edition: SBLGNT
  text: ἡ δὲ Ἡρῳδιὰς ἐνεῖχεν αὐτῷ καὶ ἤθελεν αὐτὸν ἀποκτεῖναι, καὶ οὐκ ἠδύνατο·
translation:
  text: But Herodias held a grudge against him and wanted to kill him, but she could
    not.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'was nursing resentment against him' or 'had it in for him.' The Greek
      idiom expresses ongoing hostility.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks contrast or development from the previous statement; 'But' best
    reflects the adversative force in context.
- source_word: Ἡρῳδιὰς
  chosen: Herodias
  rationale: Personal name is transliterated by standard English convention, following
    project policy to transliterate names.
- source_word: ἐνεῖχεν αὐτῷ
  chosen: held a grudge against him
  alternatives:
  - was holding it against him
  - nursed resentment against him
  - had it in for him
  lexicon: BDAG
  rationale: The idiom from ἐνέχω here conveys hostile resentment rather than mere
    opposition. 'Held a grudge against him' is natural modern English and captures
    the durative imperfect sense of ongoing animosity.
- source_word: ἤθελεν
  chosen: wanted
  alternatives:
  - wished
  - desired
  lexicon: BDAG
  rationale: A straightforward rendering of θέλω in the imperfect; 'wanted' is idiomatic
    and preserves the sense of intention.
- source_word: αὐτὸν ἀποκτεῖναι
  chosen: to kill him
  alternatives:
  - to put him to death
  - to murder him
  lexicon: BDAG
  rationale: ἀποκτείνω means 'kill' or 'put to death.' 'Kill him' is the most direct
    and natural rendering here; 'murder' would add a legal-moral nuance not explicit
    in the verb itself.
- source_word: καὶ οὐκ ἠδύνατο
  chosen: but she could not
  alternatives:
  - and she was not able
  - yet she could not
  lexicon: BDAG
  rationale: Although καὶ is formally 'and,' in this context it introduces a concessive/adversative
    sense after her desire to kill John. 'But she could not' communicates the sense
    clearly in English while preserving the imperfect inability.
