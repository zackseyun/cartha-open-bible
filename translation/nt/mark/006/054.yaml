theological_decisions:
- issue: Identification of the subject who recognized Jesus
  chosen_reading: the local people recognized him
  alternative_readings:
  - they recognized him, leaving the subject implicit
  rationale: This is primarily a syntactic and contextual decision rather than a doctrinal
    one. The nominative plural participle ἐπιγνόντες cannot naturally refer back to
    the genitive αὐτῶν ('they' in the genitive absolute). Contextually, the inhabitants
    of the place are the ones who recognize Jesus and then run through the region
    in the next verse. Supplying 'the people' in English makes the sense explicit
    without adding theological content.
