id: MRK.6.54
reference: Mark 6:54
source:
  edition: SBLGNT
  text: καὶ ἐξελθόντων αὐτῶν ἐκ τοῦ πλοίου ⸀εὐθὺς ἐπιγνόντες αὐτὸν
translation:
  text: And when they got out of the boat[a], immediately they recognized him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'And when they got out of the boat, immediately recognizing him'—the Greek leaves the subject of 'recognized' implicit; context indicates the local people.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξελθόντων αὐτῶν
  chosen: when they got out
  alternatives:
  - after they got out
  - as they got out
  lexicon: BDAG
  rationale: The genitive absolute is best rendered with a temporal clause in natural English. 'Got out' is idiomatic and accurately reflects ἐξέρχομαι in this context.
- source_word: πλοίου
  chosen: boat
  alternatives:
  - ship
  lexicon: BDAG
  rationale: πλοῖον in the Gospel context commonly refers to a fishing boat or small vessel on the Sea of Galilee; 'boat' is the most natural modern English rendering.
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: Mark frequently uses εὐθύς; 'immediately' preserves the adverb's force and Markan style better than looser alternatives.
- source_word: ἐπιγνόντες
  chosen: recognized
  alternatives:
  - identified
  - knew
  lexicon: BDAG
  rationale: ἐπιγινώσκω here conveys recognition upon seeing Jesus. 'Recognized' is the clearest contextual equivalent in English.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: The pronoun refers to Jesus from the narrative context and is naturally rendered 'him'.
- source_word: implicit subject of ἐπιγνόντες
  chosen: the people
  alternatives:
  - they
  rationale: Although the Greek participle is nominative plural without an explicit noun in this clause, the sense in context is that the local people recognized Jesus, not that Jesus and the disciples recognized someone. English requires an explicit subject for clarity, and the following verse confirms that the surrounding people are in view.
