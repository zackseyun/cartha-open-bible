theological_decisions:
- issue: Meaning of 'brother' and 'sisters' in relation to Jesus' family
  chosen_reading: Retain the ordinary familial terms 'brother' and 'sisters' in the
    main text without resolving whether they are uterine siblings, step-siblings,
    or broader relatives.
  alternative_readings:
  - Interpret as broader relatives/kinsfolk
  - Interpret as children of Mary and Joseph born after Jesus
  - Interpret as step-siblings from a previous marriage of Joseph
  rationale: The Greek terms ἀδελφός and ἀδελφή ordinarily mean brother and sister.
    Historic Christian orthodoxy includes traditions that understand these as close
    relatives or step-siblings, especially in defense of Mary's perpetual virginity,
    while others read them as natural siblings. The translation should preserve the
    lexical surface of the text and not settle the doctrinal debate beyond what the
    Greek itself states.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological
    tension rather than resolve it
- issue: Social force of 'the son of Mary'
  chosen_reading: Translate directly as a social identifier used by the townspeople,
    without adding interpretive commentary in the main text.
  alternative_readings:
  - Treat as a neutral maternal identification
  - Treat as a potentially disparaging designation
  rationale: The phrase may carry social edge in context, but the text itself does
    not explicitly explain the nuance. The translation therefore preserves the wording
    and leaves any implied disparagement to interpretation rather than importing it
    into the main text.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation
    tradition; §3 Preserve theological tension rather than resolve it
