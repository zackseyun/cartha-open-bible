id: MRK.6.3
reference: Mark 6:3
source:
  edition: SBLGNT
  text: οὐχ οὗτός ἐστιν ὁ τέκτων, ὁ υἱὸς ⸀τῆς Μαρίας ⸂καὶ ἀδελφὸς⸃ Ἰακώβου καὶ ⸀Ἰωσῆτος
    καὶ Ἰούδα καὶ Σίμωνος; καὶ οὐκ εἰσὶν αἱ ἀδελφαὶ αὐτοῦ ὧδε πρὸς ἡμᾶς; καὶ ἐσκανδαλίζοντο
    ἐν αὐτῷ.
translation:
  text: Is this not the carpenter, the son of Mary and brother of James and Joses
    and Judas and Simon? And are not his sisters here with us? And they were offended
    at him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'relative(s)' for 'brother' and 'sisters'; the Greek terms ordinarily
      mean siblings, but some Christian traditions understand them here more broadly
      as kin or as step-siblings.
    reason: alternative_reading
  - marker: b
    text: Or 'they took offense at him' or 'they stumbled because of him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τέκτων
  chosen: carpenter
  alternatives:
  - craftsman
  - builder
  lexicon: BDAG
  rationale: The traditional and most likely sense in this context is a manual artisan,
    commonly rendered 'carpenter.' Although the term can be broader than woodworking
    alone ('craftsman' or 'builder'), 'carpenter' remains the clearest natural English
    rendering and fits the village recognition scene.
- source_word: υἱὸς τῆς Μαρίας
  chosen: the son of Mary
  alternatives:
  - Mary's son
  lexicon: BDAG
  rationale: Rendered formally to preserve the marked expression in Greek. The wording
    identifies Jesus by his mother in the townspeople's speech and should not be softened
    or paraphrased.
- source_word: ἀδελφὸς
  chosen: brother
  alternatives:
  - kinsman
  - relative
  lexicon: BDAG
  rationale: The ordinary lexical sense is 'brother.' Because the precise familial
    relationship has been debated in Christian tradition, the translation preserves
    the plain lexical value in the main text and notes the broader kinship alternative
    in a footnote rather than importing an interpretive resolution.
- source_word: Ἰωσῆτος
  chosen: Joses
  alternatives:
  - Joseph
  lexicon: BDAG
  rationale: This is the Greek name form attested here and is best transliterated
    as 'Joses' rather than normalized to 'Joseph,' preserving the distinct form of
    the source text.
- source_word: ἀδελφαὶ
  chosen: sisters
  alternatives:
  - female relatives
  lexicon: BDAG
  rationale: The ordinary lexical sense is 'sisters.' As with 'brother,' a broader
    kinship sense is possible in some contexts, but the main text should reflect the
    straightforward reading of the Greek.
- source_word: ὧδε πρὸς ἡμᾶς
  chosen: here with us
  alternatives:
  - here among us
  - here near us
  lexicon: BDAG
  rationale: This idiom expresses local presence in relation to the speakers. 'Here
    with us' is natural modern English and preserves the social proximity implied
    by the phrase.
- source_word: ἐσκανδαλίζοντο ἐν αὐτῷ
  chosen: they were offended at him
  alternatives:
  - they took offense at him
  - they stumbled because of him
  lexicon: BDAG
  rationale: In this narrative context the verb denotes taking offense at Jesus rather
    than literal stumbling. 'They were offended at him' is clear and idiomatic, while
    preserving the hostile reaction. 'Took offense at him' is also viable; the chosen
    wording is slightly more formal and matches the imperfective narrative sense.
