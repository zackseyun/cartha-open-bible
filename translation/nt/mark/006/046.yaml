id: MRK.6.46
reference: Mark 6:46
source:
  edition: SBLGNT
  text: καὶ ἀποταξάμενος αὐτοῖς ἀπῆλθεν εἰς τὸ ὄρος προσεύξασθαι.
translation:
  text: And after saying goodbye to them[a], he went away to the mountain to pray.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after taking leave of them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποταξάμενος
  chosen: after saying goodbye
  alternatives:
  - after taking leave
  - after dismissing
  lexicon: BDAG
  rationale: The middle participle of ἀποτάσσομαι commonly means to take leave of or say farewell to someone. 'Saying goodbye' is natural modern English and fits the dative αὐτοῖς ('to them'). 'Dismissing' is possible in some contexts but is less likely here because the emphasis is on parting from them rather than formally sending them away.
- source_word: αὐτοῖς
  chosen: to them
  lexicon: BDAG
  rationale: Dative plural pronoun referring to the people just mentioned in context. In English idiom, this is incorporated into 'saying goodbye to them.'
- source_word: ἀπῆλθεν
  chosen: he went away
  alternatives:
  - he departed
  - he went
  lexicon: BDAG
  rationale: Aorist of ἀπέρχομαι denotes departure. 'Went away' preserves the sense of leaving from the previous group and reads naturally in English. 'Departed' is more formal but less idiomatic for the target style.
- source_word: εἰς τὸ ὄρος
  chosen: to the mountain
  alternatives:
  - into the mountain region
  - to the hill
  lexicon: BDAG
  rationale: ὄρος normally means mountain or hill country. With the article, 'the mountain' is the most straightforward rendering and reflects the Greek without unnecessary interpretation. 'Hill' is possible in some landscapes, but 'mountain' is the standard gloss.
- source_word: προσεύξασθαι
  chosen: to pray
  lexicon: BDAG
  rationale: 'Aorist middle infinitive of purpose after ἀπῆλθεν: he went away for the purpose of praying. ''To pray'' is the direct and sufficient rendering.'
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Simple connective continuing the narrative. 'And' is formally closer; 'Then' would add a slightly more interpretive temporal nuance.
