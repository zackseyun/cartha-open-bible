id: MRK.6.49
reference: Mark 6:49
source:
  edition: SBLGNT
  text: οἱ δὲ ἰδόντες αὐτὸν ⸂ἐπὶ τῆς θαλάσσης περιπατοῦντα⸃ ἔδοξαν ⸂ὅτι φάντασμά ἐστιν⸃ καὶ ἀνέκραξαν,
translation:
  text: But when they saw him walking on the sea[a], they thought that it was a ghost, and they cried out,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an apparition' or 'a phantom.' The Greek φάντασμα refers to a ghostly appearance.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  chosen: But they
  alternatives:
  - And they
  - Now they
  lexicon: BDAG
  rationale: δέ is rendered with mild adversative/continuative force as 'But' to mark the narrative shift to the disciples' reaction. The article functions substantivally, referring to the group already in view.
- source_word: ἰδόντες
  chosen: when they saw
  alternatives:
  - seeing
  - after they saw
  lexicon: BDAG
  rationale: 'The aorist participle is best rendered with temporal force in natural English: ''when they saw.'' This preserves the sequence without overly wooden participial English.'
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Straightforward accusative pronoun referring to Jesus.
- source_word: ἐπὶ τῆς θαλάσσης περιπατοῦντα
  chosen: walking on the sea
  alternatives:
  - walking on the lake
  - walking upon the sea
  lexicon: BDAG
  rationale: ἐπί with the genitive here naturally conveys movement/location 'on' the surface. θάλασσα is formally 'sea'; although the body of water is the Sea of Galilee/lake, 'sea' matches the Greek wording and preserves the striking nature of the event. 'Walking on the sea' is more natural than a hyper-literal participial structure.
- source_word: ἔδοξαν
  chosen: they thought
  alternatives:
  - they supposed
  - they imagined
  lexicon: BDAG
  rationale: δοκέω here means to think or suppose. 'They thought' is idiomatic and fits the immediate mistaken perception.
- source_word: ὅτι φάντασμά ἐστιν
  chosen: that it was a ghost
  alternatives:
  - that it is a ghost
  - that it was an apparition
  - that it was a phantom
  lexicon: BDAG
  rationale: Although the Greek has present ἐστιν in indirect discourse, English idiom after a past main verb normally backshifts to 'was.' φάντασμα denotes a ghostly appearance or apparition; 'ghost' is the clearest modern equivalent, while 'apparition/phantom' are viable but less natural.
- source_word: καὶ ἀνέκραξαν
  chosen: and they cried out
  alternatives:
  - and they screamed
  - and they shouted
  lexicon: BDAG
  rationale: ἀνακράζω denotes a loud cry. 'Cried out' preserves the intensity without over-specifying tone; 'screamed' may be too interpretive, though context suggests fear.
