theological_decisions:
- issue: Nature of Jesus' action on the water
  chosen_reading: walking on the sea
  alternative_readings:
  - walking by the sea
  rationale: The phrase ἐπὶ τῆς θαλάσσης in this narrative context is best read as movement on the water's surface, not merely alongside it. This reflects the plain sense of the miracle account without embellishment.
