id: MRK.6.24
reference: Mark 6:24
source:
  edition: SBLGNT
  text: ⸀καὶ ἐξελθοῦσα εἶπεν τῇ μητρὶ αὐτῆς· Τί ⸀αἰτήσωμαι; ἡ δὲ εἶπεν· Τὴν κεφαλὴν
    Ἰωάννου τοῦ ⸀βαπτίζοντος.
translation:
  text: And after going out, she said to her mother, “What should I ask for?” And
    she said, “The head of John the Baptizer.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following traditional English usage, “John the Baptist.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθοῦσα
  chosen: after going out
  alternatives:
  - having gone out
  - going out
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb indicates action prior to speaking.
    'After going out' gives clear temporal sequence in natural English without over-paraphrasing.
- source_word: Τί αἰτήσωμαι
  chosen: What should I ask for?
  alternatives:
  - What shall I ask?
  - What am I to request?
  lexicon: BDAG
  rationale: The deliberative aorist middle subjunctive expresses what she ought or
    is to request. 'Should I ask for' captures the deliberative nuance in idiomatic
    English; 'for' is natural with αἰτέω in this context.
- source_word: μητρὶ αὐτῆς
  chosen: her mother
  lexicon: BDAG
  rationale: Straightforward possessive construction; no reason to expand or formalize
    further.
- source_word: κεφαλήν
  chosen: head
  lexicon: BDAG
  rationale: Literal object of the request. The gruesome specificity should be preserved
    without euphemism.
- source_word: τοῦ βαπτίζοντος
  chosen: the Baptizer
  alternatives:
  - the Baptist
  - the one baptizing
  lexicon: BDAG
  rationale: The present participle used substantivally identifies John by his characteristic
    activity. 'The Baptizer' translates the Greek meaning more transparently than
    the traditional title 'the Baptist,' which can sound denominational in modern
    English. The traditional rendering is preserved in a footnote.
