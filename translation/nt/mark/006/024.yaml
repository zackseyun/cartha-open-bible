theological_decisions:
- issue: Rendering of John's epithet βαπτίζων
  chosen_reading: the Baptizer
  alternative_readings:
  - the Baptist
  rationale: This is not a doctrinally contested term in the excerpt, but it is a
    significant translation-tradition issue. Following original-language primacy,
    the participial title is translated for meaning rather than retained in inherited
    English form. This avoids anachronistic denominational associations while preserving
    the identifying epithet.
  doctrine_reference: Translation philosophy §1, §2
