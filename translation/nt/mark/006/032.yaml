id: MRK.6.32
reference: Mark 6:32
source:
  edition: SBLGNT
  text: καὶ ἀπῆλθον ⸂ἐν τῷ πλοίῳ εἰς ἔρημον τόπον⸃ κατ’ ἰδίαν.
translation:
  text: And they went away in the boat to a desolate place by themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to a deserted place' or 'to a wilderness place.'
    reason: lexical_alternative
  - marker: b
    text: Or 'privately.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆλθον
  chosen: went away
  alternatives:
  - departed
  - went off
  lexicon: BDAG
  rationale: Aorist of ἀπέρχομαι denotes departure from the prior location. 'Went
    away' is natural modern English and preserves the movement nuance without sounding
    overly formal like 'departed'.
- source_word: ἐν τῷ πλοίῳ
  chosen: in the boat
  alternatives:
  - by boat
  - in the ship
  lexicon: BDAG
  rationale: The prepositional phrase is literally 'in the boat.' 'Boat' fits the
    Gospel setting better than the more formal 'ship.' 'By boat' is possible idiomatic
    English, but 'in the boat' preserves the Greek expression more closely.
- source_word: εἰς ἔρημον τόπον
  chosen: to a desolate place
  alternatives:
  - to a deserted place
  - to a wilderness place
  - to a lonely place
  lexicon: BDAG
  rationale: ἔρημος with τόπος refers to an uninhabited or isolated area. 'Desolate
    place' preserves the sense of solitude and sparseness without importing the stronger
    geographic connotation of 'wilderness' in English. 'Deserted place' is also viable
    and common in Mark, but 'desolate' better reflects the adjective's broader semantic
    range.
- source_word: κατ’ ἰδίαν
  chosen: by themselves
  alternatives:
  - privately
  - alone
  lexicon: BDAG
  rationale: This idiom means in private or apart from others. 'By themselves' fits
    the plural subject explicitly and reads naturally in English. 'Privately' is possible,
    but 'by themselves' better preserves the personal/separate nuance.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - So
  lexicon: BDAG
  rationale: Mark frequently uses καί for straightforward narrative continuation.
    'And' preserves the paratactic flow of the Greek better than more interpretive
    connectors like 'then' or 'so'.
