theological_decisions:
- issue: Strength of the disciples' reaction to Jesus' act
  chosen_reading: 'A strong but readable rendering: ''they were utterly astonished within themselves'''
  alternative_readings:
  - they were exceedingly amazed in themselves
  - they were beyond measure beside themselves
  rationale: The verse emphasizes the disciples' overwhelming response to Jesus' authority over the wind. The translation preserves the intensity without importing additional theological interpretation beyond the narrative description.
