theological_decisions:
- issue: Force of the dust-shaking gesture
  chosen_reading: A symbolic testimony of judgment against those who reject the messengers.
  alternative_readings:
  - A neutral testimony to them
  - A sign primarily of separation rather than judgment
  rationale: The phrase εἰς μαρτύριον αὐτοῖς can be rendered more literally 'for a
    testimony to them,' but in context of rejection and the known Jewish symbolic
    act of repudiation, the sense is adverse. The translation makes that force explicit
    while preserving the more literal alternative in a footnote.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it, with alternative in footnote where ambiguity remains)
