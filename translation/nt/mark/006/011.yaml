id: MRK.6.11
reference: Mark 6:11
source:
  edition: SBLGNT
  text: καὶ ⸂ὃς ἂν τόπος μὴ δέξηται⸃ ὑμᾶς μηδὲ ἀκούσωσιν ὑμῶν, ἐκπορευόμενοι ἐκεῖθεν
    ἐκτινάξατε τὸν χοῦν τὸν ὑποκάτω τῶν ποδῶν ὑμῶν εἰς μαρτύριον ⸀αὐτοῖς.
translation:
  text: And whatever place does not receive you or listen to you, as you leave there,
    shake off the dust that is under your feet as a testimony to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as a testimony to them' or 'as a witness to them.' The Greek can be
      read more literally this way, though the context suggests a testimony against
      those who reject the message.
    reason: alternative_reading
  - marker: b
    text: Shaking off dust from one's feet was a symbolic act of dissociation and
      warning in response to rejection.
    reason: cultural_note
lexical_decisions:
- source_word: ὃς ἂν τόπος
  chosen: whatever place
  alternatives:
  - any place
  - wherever
  lexicon: BDAG
  rationale: The construction with ὃς ἂν is indefinite/generalizing. 'Whatever place'
    preserves the singular noun τόπος ('place') while conveying the open-ended sense.
    'Wherever' is smoother English but obscures the explicit noun.
- source_word: δέξηται
  chosen: does not receive
  alternatives:
  - does not welcome
  - does not accept
  lexicon: BDAG
  rationale: δέχομαι here refers to receiving the messengers hospitably. 'Receive'
    is broad and faithful to the Greek; 'welcome' is possible and idiomatic, but 'receive'
    better preserves the lexical range and leaves the social/hospitality nuance implicit
    in context.
- source_word: ἀκούσωσιν ὑμῶν
  chosen: listen to you
  alternatives:
  - hear you
  - heed you
  lexicon: BDAG
  rationale: ἀκούω with a genitive can mean hear/listen to, often with the sense of
    paying attention. 'Listen to you' communicates more than mere auditory hearing,
    fitting the missionary context, without becoming as interpretive as 'heed you'.
- source_word: ἐκπορευόμενοι ἐκεῖθεν
  chosen: as you leave there
  alternatives:
  - when you go out from there
  - departing from there
  lexicon: BDAG
  rationale: The participle is temporal/circumstantial. 'As you leave there' is natural
    modern English and preserves the action sequence. More formal alternatives are
    possible but less readable.
- source_word: ἐκτινάξατε
  chosen: shake off
  alternatives:
  - shake out
  - shake away
  lexicon: BDAG
  rationale: The verb denotes shaking off/out. 'Shake off' is the standard idiomatic
    English rendering for removing dust from oneself.
- source_word: τὸν χοῦν τὸν ὑποκάτω τῶν ποδῶν ὑμῶν
  chosen: the dust that is under your feet
  alternatives:
  - the dust from under your feet
  - the dust beneath your feet
  lexicon: BDAG
  rationale: This phrase is rendered fairly literally. 'That is under your feet' reflects
    ὑποκάτω while remaining readable. 'From under your feet' is also idiomatic, but
    the chosen wording stays closer to the Greek structure.
- source_word: εἰς μαρτύριον αὐτοῖς
  chosen: as a testimony against them
  alternatives:
  - for a testimony to them
  - as a witness to them
  lexicon: BDAG
  rationale: μαρτύριον means testimony/witness. In this context the symbolic act functions
    adversely toward those rejecting the message, so 'against them' brings out the
    likely force. Because αὐτοῖς is formally 'to/for them,' the less explicit alternative
    is preserved in a footnote for auditability.
