theological_decisions:
- issue: Scope of Jesus' proverb about prophetic honor
  chosen_reading: Render the saying as a general proverb applied by Jesus to himself,
    without adding interpretive explanation about his messianic identity or rejection
    beyond the text.
  alternative_readings:
  - Explicitly paraphrase to state that Jesus is identifying himself as a rejected
    Messiah
  - Render more interpretively as a statement about unbelief in general
  rationale: The verse presents Jesus speaking a proverb about a prophet's lack of
    honor in familiar settings. While the context applies it to Jesus, the translation
    should not import additional doctrinal explanation not stated in the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it.
