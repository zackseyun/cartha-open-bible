id: MRK.6.4
reference: Mark 6:4
source:
  edition: SBLGNT
  text: ⸂καὶ ἔλεγεν⸃ αὐτοῖς ὁ Ἰησοῦς ὅτι Οὐκ ἔστιν προφήτης ἄτιμος εἰ μὴ ἐν τῇ πατρίδι
    αὐτοῦ καὶ ἐν τοῖς ⸂συγγενεῦσιν αὐτοῦ⸃ καὶ ἐν τῇ οἰκίᾳ αὐτοῦ.
translation:
  text: And Jesus was saying to them, “A prophet is not without honor except in his
    hometown and among his relatives and in his household.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'native place' or 'homeland.' The Greek πατρίς refers to one's own place
      of origin; here 'hometown' fits the local Nazareth setting.
    reason: lexical_alternative
  - marker: b
    text: Or 'kinsmen.' The Greek term refers to relatives or members of one's kin
      group.
    reason: lexical_alternative
  - marker: c
    text: Or 'house.' The Greek can refer either to the physical house or to the household/family
      within it; 'household' is chosen here to distinguish it from 'relatives.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  chosen: was saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated speech in narrative. 'Was
    saying' preserves that aspect more transparently than simple past 'said,' while
    remaining natural English.
- source_word: προφήτης
  chosen: prophet
  lexicon: BDAG
  rationale: Standard rendering for προφήτης; no contextual reason to vary.
- source_word: ἄτιμος
  chosen: without honor
  alternatives:
  - dishonored
  - despised
  lexicon: BDAG
  rationale: The idiom 'not without honor except...' is a well-established and accurate
    way to render the Greek construction, preserving the contrast around honor/shame.
    'Dishonored' is possible but less idiomatic in this proverb-like saying.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - unless
  lexicon: BDAG
  rationale: In this negated statement, εἰ μὴ functions idiomatically as an exception
    clause, best rendered 'except,' not conditional 'unless.'
- source_word: πατρίδι
  chosen: hometown
  alternatives:
  - homeland
  - native place
  - country
  lexicon: BDAG
  rationale: πατρίς here refers to one's native locality in the Nazareth context,
    not the broader nation. 'Hometown' is the clearest modern English equivalent.
- source_word: συγγενεῦσιν
  chosen: relatives
  alternatives:
  - kinsmen
  - kinfolk
  - family members
  lexicon: BDAG
  rationale: The term denotes those of the same kin group. 'Relatives' is natural
    modern English and distinguishes this group from the narrower 'household' that
    follows.
- source_word: οἰκίᾳ
  chosen: household
  alternatives:
  - house
  - home
  lexicon: BDAG
  rationale: οἰκία can mean the physical house or the household/family unit. Here,
    after 'hometown' and 'relatives,' 'household' best captures the progressively
    narrowing social circles and avoids redundancy with 'hometown'.
- source_word: καὶ ... καὶ ... καὶ
  chosen: and ... and ... and
  alternatives:
  - both ... and ... and
  lexicon: BDAG
  rationale: The repeated καὶ marks cumulative locations of dishonor. Preserving each
    'and' reflects the Greek structure and rhetorical buildup.
