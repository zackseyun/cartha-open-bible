id: MRK.6.38
reference: Mark 6:38
source:
  edition: SBLGNT
  text: ὁ δὲ λέγει αὐτοῖς· Πόσους ⸂ἔχετε ἄρτους⸃; ⸀ὑπάγετε ἴδετε. καὶ γνόντες λέγουσιν·
    Πέντε, καὶ δύο ἰχθύας.
translation:
  text: But he said to them, “How many loaves do you have? Go and see.” And when they
    found out, they said, “Five, and two fish.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'Five, and two fish,' with 'loaves' implied from the preceding
      question.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, English narrative style
    more naturally renders it as a simple past here. This preserves the sense without
    sounding awkward in modern English.
- source_word: Πόσους ἔχετε ἄρτους
  chosen: How many loaves do you have?
  alternatives:
  - How many bread loaves do you have?
  - How many breads do you have?
  lexicon: BDAG
  rationale: ἄρτους refers to loaves of bread, not abstract 'bread.' 'Loaves' is the
    natural English count noun matching the plural object with πόσους.
- source_word: ὑπάγετε
  chosen: Go
  alternatives:
  - Go away
  - Go along
  lexicon: BDAG
  rationale: In this context the imperative directs the disciples to go and check.
    'Go' is the clearest idiomatic rendering; 'go away' would overstate separation.
- source_word: ἴδετε
  chosen: see
  alternatives:
  - look
  - find out
  lexicon: BDAG
  rationale: The verb literally means 'see,' and paired with ὑπάγετε forms the concise
    command 'Go and see.' This keeps the directness of the Greek.
- source_word: γνόντες
  chosen: when they found out
  alternatives:
  - having learned
  - after finding out
  - having come to know
  lexicon: BDAG
  rationale: 'The aorist participle indicates action prior to the main verb: after
    going to check, they came back with knowledge. ''When they found out'' is natural
    English that conveys the sequence.'
- source_word: Πέντε, καὶ δύο ἰχθύας
  chosen: Five, and two fish
  alternatives:
  - Five loaves, and two fish
  lexicon: BDAG
  rationale: The Greek explicitly states 'Five, and two fish,' with 'loaves' understood
    from the prior question. English can preserve this elliptical reply while remaining
    clear in context.
- source_word: ἰχθύας
  chosen: fish
  alternatives:
  - fishes
  lexicon: BDAG
  rationale: English normally uses 'fish' as the plural in ordinary narrative. 'Fishes'
    is possible but less natural here.
