theological_decisions:
- issue: Rendering of ἐγώ εἰμι in a context that may carry both ordinary self-identification
    and possible theological resonance
  chosen_reading: I am
  alternative_readings:
  - It is I
  rationale: To preserve theological tension rather than resolve it, the main text
    keeps the literal Greek 'I am.' In context this can function as self-identification,
    but the wording may also echo broader biblical resonances. Following the translation
    philosophy, the more interpretive alternative 'It is I' is preserved in a footnote
    rather than chosen for the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
