id: MRK.6.50
reference: Mark 6:50
source:
  edition: SBLGNT
  text: πάντες γὰρ αὐτὸν εἶδον καὶ ἐταράχθησαν. ⸂ὁ δὲ εὐθὺς⸃ ἐλάλησεν μετ’ αὐτῶν,
    καὶ λέγει αὐτοῖς· Θαρσεῖτε, ἐγώ εἰμι, μὴ φοβεῖσθε.
translation:
  text: For they all saw him and were troubled. But he immediately spoke with them
    and says to them, “Take courage; it is I; do not be afraid.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “It is I.” The Greek reads simply “I am.”
    reason: alternative_reading
lexical_decisions:
- source_word: πάντες γὰρ
  chosen: For they all
  alternatives:
  - because they all
  - for all of them
  lexicon: BDAG
  rationale: γάρ is rendered 'for' to preserve the explanatory connection to the previous
    verse. πάντες is brought into natural English as 'they all' rather than the more
    wooden 'all'.
- source_word: αὐτὸν εἶδον
  chosen: saw him
  alternatives:
  - caught sight of him
  lexicon: BDAG
  rationale: A straightforward rendering of ὁράω in the aorist; no contextual reason
    to heighten or weaken the verb.
- source_word: ἐταράχθησαν
  chosen: were troubled
  alternatives:
  - were terrified
  - were disturbed
  - were agitated
  lexicon: BDAG
  rationale: ταράσσω commonly denotes being troubled, disturbed, or agitated. 'Were
    troubled' preserves the lexical sense without over-interpreting it as sheer terror,
    especially since the following command addresses fear explicitly.
- source_word: ὁ δὲ εὐθὺς
  chosen: But he immediately
  alternatives:
  - And he at once
  - Then he immediately
  lexicon: BDAG
  rationale: δέ is rendered 'but' to mark the contrast between the disciples' troubled
    reaction and Jesus' response. εὐθύς is a characteristic Markan adverb meaning
    'immediately' or 'at once'; 'immediately' preserves the urgency.
- source_word: ἐλάλησεν μετ’ αὐτῶν
  chosen: spoke with them
  alternatives:
  - spoke to them
  - talked with them
  lexicon: BDAG
  rationale: μετά with the genitive naturally suggests association, so 'spoke with
    them' reflects the Greek more closely than simply 'spoke to them,' while remaining
    idiomatic.
- source_word: καὶ λέγει αὐτοῖς
  chosen: and says to them
  alternatives:
  - and said to them
  lexicon: BDAG
  rationale: λέγει is present tense in a past narrative, a historical present common
    in Mark. Rendering it as 'says' preserves Mark's vivid style rather than flattening
    it to a simple past.
- source_word: Θαρσεῖτε
  chosen: Take courage
  alternatives:
  - Be courageous
  - Take heart
  lexicon: BDAG
  rationale: The imperative calls for courage in the face of fear. 'Take courage'
    is clear modern English and preserves the force well; 'take heart' is possible
    but slightly more idiomatic than the Greek requires.
- source_word: ἐγώ εἰμι
  chosen: I am
  alternatives:
  - It is I
  lexicon: BDAG
  rationale: The Greek is simply 'I am.' This preserves the wording exactly and leaves
    intact the possible resonance beyond mere self-identification, rather than resolving
    it into the idiomatic but interpretively narrower 'It is I.'
- source_word: μὴ φοβεῖσθε
  chosen: do not be afraid
  alternatives:
  - do not fear
  - stop being afraid
  lexicon: BDAG
  rationale: A natural rendering of the present middle/passive imperative with μή.
    'Do not be afraid' is idiomatic and clear; 'do not fear' is more formal but less
    natural in contemporary English.
