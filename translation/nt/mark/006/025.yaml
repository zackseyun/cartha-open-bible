id: MRK.6.25
reference: Mark 6:25
source:
  edition: SBLGNT
  text: καὶ εἰσελθοῦσα ⸀εὐθὺς μετὰ σπουδῆς πρὸς τὸν βασιλέα ᾐτήσατο λέγουσα· Θέλω
    ἵνα ⸂ἐξαυτῆς δῷς μοι⸃ ἐπὶ πίνακι τὴν κεφαλὴν Ἰωάννου τοῦ βαπτιστοῦ.
translation:
  text: And she immediately went in with haste to the king and asked, saying, “I want
    you to give me at once, on a platter, the head of John the Baptizer.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, “John the Baptist.”
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσελθοῦσα
  chosen: went in
  alternatives:
  - entered
  lexicon: BDAG
  rationale: Aorist participle indicating her movement into the banquet setting or
    into the king's presence. 'Went in' is natural modern English and preserves the
    narrative action without overformal stiffness.
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: BDAG
  rationale: Mark frequently uses εὐθύς for immediacy. 'Immediately' preserves Markan
    urgency in standard modern English.
- source_word: μετὰ σπουδῆς
  chosen: with haste
  alternatives:
  - hurriedly
  - eagerly
  - in haste
  lexicon: BDAG
  rationale: The phrase conveys urgency and earnest speed. 'With haste' keeps the
    prepositional structure and avoids implying positive eagerness; the context is
    promptness rather than zeal.
- source_word: βασιλέα
  chosen: the king
  alternatives:
  - the ruler
  lexicon: BDAG
  rationale: Although Herod Antipas was technically a tetrarch historically, the Greek
    text says βασιλεύς and should be translated as written in this narrative context.
- source_word: ᾐτήσατο
  chosen: asked
  alternatives:
  - requested
  - demanded
  lexicon: BDAG
  rationale: Middle voice of αἰτέω here denotes making a request. 'Asked' is the most
    direct rendering; the force of her insistence is carried by the quoted speech
    rather than by overstating the verb itself.
- source_word: Θέλω
  chosen: I want
  alternatives:
  - I wish
  - I desire
  lexicon: BDAG
  rationale: θέλω expresses volition plainly. 'I want' reflects the bluntness of the
    girl's request in contemporary English better than the more formal 'I wish' or
    'I desire.'
- source_word: ἵνα ... δῷς μοι
  chosen: you to give me
  alternatives:
  - that you give me
  - for you to give me
  lexicon: BDAG
  rationale: This ἵνα clause expresses the content of what she wants. 'I want you
    to give me' is idiomatic English that accurately conveys the Greek construction.
- source_word: ἐξαυτῆς
  chosen: at once
  alternatives:
  - immediately
  - right away
  lexicon: BDAG
  rationale: ἐξαυτῆς intensifies the demand for immediate action. Because εὐθύς already
    modifies her entering, rendering this separately as 'at once' preserves both adverbs
    without flattening them into one.
- source_word: ἐπὶ πίνακι
  chosen: on a platter
  alternatives:
  - on a tray
  - on a dish
  lexicon: BDAG
  rationale: πίναξ refers to a platter or serving dish. 'Platter' best fits the banquet
    setting and standard English idiom in this passage.
- source_word: κεφαλὴν
  chosen: the head
  lexicon: BDAG
  rationale: Literal rendering is required; the gruesome specificity is part of the
    narrative and should not be softened.
- source_word: Ἰωάννου τοῦ βαπτιστοῦ
  chosen: John the Baptizer
  alternatives:
  - John the Baptist
  lexicon: BDAG
  rationale: The title βαπτιστής is transparently occupational/descriptive. 'Baptizer'
    translates the Greek title rather than preserving the traditionalized form 'Baptist,'
    while still clearly identifying John.
