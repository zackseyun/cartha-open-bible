theological_decisions:
- issue: Rendering of Ἰωάννου τοῦ βαπτιστοῦ
  chosen_reading: John the Baptizer
  alternative_readings:
  - John the Baptist
  rationale: This is not a doctrinally contested term, but it is a translation-philosophy
    decision. The project prefers translating titles rather than relying on traditionalized
    English forms when the Greek meaning is transparent. 'Baptizer' preserves the
    descriptive force of βαπτιστής.
  doctrine_reference: Translation philosophy §2 (Translate titles; transliterate names)
