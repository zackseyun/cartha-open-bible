id: MRK.6.35
reference: Mark 6:35
source:
  edition: SBLGNT
  text: Καὶ ἤδη ὥρας πολλῆς γενομένης προσελθόντες αὐτῷ οἱ μαθηταὶ αὐτοῦ ⸀ἔλεγον ὅτι Ἔρημός ἐστιν ὁ τόπος, καὶ ἤδη ὥρα πολλή·
translation:
  text: And when it was already very late[a], his disciples came to him and were saying, “This place is deserted[b], and it is already very late.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “This is a deserted place.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “when already a great/late hour had come.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤδη
  chosen: already
  alternatives:
  - by now
  lexicon: BDAG
  rationale: Marks that the time had progressed; 'already' is the most natural and direct rendering in both occurrences.
- source_word: ὥρας πολλῆς γενομένης
  chosen: when it was already very late
  alternatives:
  - when a late hour had come
  - when the hour had already become late
  lexicon: BDAG
  rationale: The genitive absolute idiom expresses the arrival of a late time of day. A more idiomatic English clause is preferable to a wooden reproduction. 'Very late' captures πολλῆς with ὥρας in context.
- source_word: προσελθόντες αὐτῷ
  chosen: came to him
  alternatives:
  - approached him
  lexicon: BDAG
  rationale: The participle of προσέρχομαι commonly means to come or approach someone. 'Came to him' is natural modern English and fits the narrative flow.
- source_word: οἱ μαθηταὶ αὐτοῦ
  chosen: his disciples
  alternatives:
  - the disciples of him
  lexicon: BDAG
  rationale: Standard possessive rendering; clear and idiomatic.
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or inceptive past action. 'Were saying' preserves the imperfective sense without overinterpreting repetition.
- source_word: Ἔρημός ἐστιν ὁ τόπος
  chosen: This place is deserted
  alternatives:
  - The place is desolate
  - This is a deserted place
  lexicon: BDAG
  rationale: ἔρημος here describes an uninhabited or isolated area, not necessarily emotionally 'desolate.' 'This place is deserted' is clear and idiomatic, and 'this' is supplied naturally from the context of direct speech.
- source_word: καὶ ἤδη ὥρα πολλή
  chosen: and it is already very late
  alternatives:
  - and the hour is already late
  - and it is already a late hour
  lexicon: BDAG
  rationale: This clause restates the lateness of the day in direct speech. 'It is already very late' is idiomatic English and reflects the emphasis of πολλή in context.
