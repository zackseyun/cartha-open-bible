id: MRK.6.33
reference: Mark 6:33
source:
  edition: SBLGNT
  text: καὶ εἶδον αὐτοὺς ὑπάγοντας καὶ ⸀ἐπέγνωσαν πολλοί, καὶ πεζῇ ἀπὸ πασῶν τῶν πόλεων
    συνέδραμον ἐκεῖ καὶ προῆλθον ⸀αὐτούς.
translation:
  text: And many saw them going and recognized them, and on foot from all the towns
    they ran there together and got there ahead of them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by land' for 'on foot,' highlighting the contrast with the boat journey.
    reason: lexical_alternative
  - marker: b
    text: Or 'from all the cities'; the Greek word can refer to towns or cities depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδον
  chosen: saw
  alternatives:
  - caught sight of
  - observed
  lexicon: BDAG
  rationale: A straightforward past-tense rendering of ὁράω fits the narrative sequence
    without adding nuance beyond visual perception.
- source_word: ὑπάγοντας
  chosen: going
  alternatives:
  - departing
  - leaving
  lexicon: BDAG
  rationale: The participle describes the disciples/Jesus in the act of going away
    by boat. 'Going' is natural English and avoids over-specifying the manner, which
    is supplied by context from the previous verse.
- source_word: ἐπέγνωσαν
  chosen: recognized
  alternatives:
  - identified
  - came to know
  lexicon: BDAG
  rationale: In context ἐπιγινώσκω means recognizing who they were, not acquiring
    new knowledge in a broader sense. 'Recognized' is the clearest idiomatic choice.
- source_word: πολλοί
  chosen: many
  alternatives:
  - many people
  lexicon: BDAG
  rationale: The adjective is substantival. 'Many' is concise and natural; English
    does not require an explicit noun here.
- source_word: πεζῇ
  chosen: on foot
  alternatives:
  - by land
  - walking
  lexicon: BDAG
  rationale: πεζῇ specifically contrasts travel by foot with travel by boat. 'On foot'
    preserves that contrast more precisely than the broader 'by land.'
- source_word: ἀπὸ πασῶν τῶν πόλεων
  chosen: from all the towns
  alternatives:
  - from all the cities
  - out of every town
  lexicon: BDAG
  rationale: πόλις can mean city or town. Given the Galilean setting and readable
    modern English, 'towns' is more natural, while 'all' preserves πασῶν.
- source_word: συνέδραμον
  chosen: they ran there together
  alternatives:
  - they rushed there together
  - they ran together there
  lexicon: BDAG
  rationale: συντρέχω conveys running together/converging. Rendering both the motion
    and the collective sense is important, so 'ran there together' preserves the force
    of the compound verb.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - to that place
  lexicon: BDAG
  rationale: Simple deictic adverb; 'there' is sufficient and idiomatic.
- source_word: προῆλθον αὐτούς
  chosen: got there ahead of them
  alternatives:
  - arrived before them
  - went before them
  lexicon: BDAG
  rationale: προέρχομαι with the object here means preceding them in arrival. 'Got
    there ahead of them' is idiomatic modern English and makes the comparative sense
    explicit.
