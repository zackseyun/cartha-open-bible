id: MRK.6.53
reference: Mark 6:53
source:
  edition: SBLGNT
  text: Καὶ διαπεράσαντες ⸂ἐπὶ τὴν γῆν ἦλθον εἰς⸃ Γεννησαρὲτ καὶ προσωρμίσθησαν.
translation:
  text: And after crossing over to the land[b][a], they came to Gennesaret and moored there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to shore'; the Greek says 'to the land,' referring to reaching land from the boat.
    reason: lexical_alternative
  - marker: b
    text: Or 'anchored there' or 'landed'; the verb specifically has a nautical sense of bringing the boat in to moor.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαπεράσαντες
  chosen: after crossing over
  alternatives:
  - having crossed over
  - after they had crossed over
  lexicon: BDAG
  rationale: Aorist participle indicating action prior to the main verb. 'After crossing over' is natural English while preserving the temporal sequence.
- source_word: ἐπὶ τὴν γῆν ... ἦλθον εἰς Γεννησαρὲτ
  chosen: to the land, they came to Gennesaret
  alternatives:
  - to shore, they came to Gennesaret
  - to the land, they arrived at Gennesaret
  lexicon: BDAG
  rationale: γῆ can mean 'land,' 'ground,' or 'earth.' In this boating context it refers to reaching land/shore. Because εἰς Γεννησαρέτ specifies the destination, 'to the land' keeps the Greek wording while avoiding over-interpretation; 'shore' is preserved as an alternative.
- source_word: Γεννησαρὲτ
  chosen: Gennesaret
  rationale: 'Place name transliterated according to the translation philosophy: names are transliterated rather than translated.'
- source_word: προσωρμίσθησαν
  chosen: moored there
  alternatives:
  - anchored there
  - drew up to shore
  - landed
  lexicon: BDAG
  rationale: The passive verb refers to bringing a boat to mooring/landing. 'Moored there' best captures the nautical sense without flattening it to the more generic 'landed.' 'There' is supplied idiomatically in English from the context of arrival.
- source_word: καί
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Simple connective retained. 'And' preserves the narrative flow without adding interpretive force.
