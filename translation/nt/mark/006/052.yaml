theological_decisions:
- issue: Nature of the disciples' condition in πεπωρωμένη
  chosen_reading: their heart was hardened
  alternative_readings:
  - their heart was calloused
  rationale: The verse describes spiritual dullness without specifying its ultimate
    cause. The translation preserves the text's tension and does not import a stronger
    doctrinal claim about judicial hardening beyond what Mark states here.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
