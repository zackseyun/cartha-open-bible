id: MRK.6.52
reference: Mark 6:52
source:
  edition: SBLGNT
  text: οὐ γὰρ συνῆκαν ἐπὶ τοῖς ἄρτοις, ⸂ἀλλ’ ἦν⸃ αὐτῶν ἡ καρδία πεπωρωμένη.
translation:
  text: for they did not understand about the loaves, but their heart was hardened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their heart was calloused.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they did not grasp the significance of the loaves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνῆκαν
  chosen: did not understand
  alternatives:
  - did not comprehend
  - did not grasp
  lexicon: BDAG
  rationale: συνίημι commonly denotes understanding, comprehending, or grasping the
    significance of something. 'Did not understand' is clear modern English and preserves
    the cognitive/spiritual failure in context.
- source_word: ἐπὶ τοῖς ἄρτοις
  chosen: about the loaves
  alternatives:
  - from the loaves
  - concerning the loaves
  lexicon: BDAG
  rationale: The preposition ἐπί with the dative here is idiomatic and refers to the
    significance of the feeding miracle involving the loaves. 'About the loaves' is
    natural English that captures the sense that they failed to understand what the
    loaves signified.
- source_word: ἄρτοις
  chosen: loaves
  alternatives:
  - bread
  lexicon: BDAG
  rationale: ἄρτος can mean bread or a loaf of bread. In this narrative context, the
    plural points to the specific loaves from the feeding miracle, so 'loaves' is
    more precise than the more generic 'bread'.
- source_word: καρδία
  chosen: heart
  lexicon: BDAG
  rationale: In biblical usage καρδία refers to the inner person, including understanding
    and disposition. 'Heart' is the standard and sufficiently broad English equivalent.
- source_word: πεπωρωμένη
  chosen: hardened
  alternatives:
  - calloused
  - made dull
  lexicon: BDAG
  rationale: πωρόω literally evokes hardening or callousing and metaphorically describes
    spiritual insensitivity. 'Hardened' is the most idiomatic and theologically recognizable
    rendering in English, while preserving the metaphor of insensitivity.
- source_word: ἀλλ’ ἦν
  chosen: but was
  alternatives:
  - rather, was
  lexicon: BDAG
  rationale: The conjunction plus imperfect verb marks contrast with the previous
    clause. 'But was' straightforwardly preserves the adversative force and the stative
    description.
- source_word: αὐτῶν ἡ καρδία
  chosen: their heart
  alternatives:
  - their hearts
  lexicon: BDAG
  rationale: The Greek uses a singular collective noun, literally 'their heart.' Retaining
    the singular reflects the source text closely and can suggest a shared condition
    among the disciples. English permits this construction, though 'their hearts'
    would also be understandable.
