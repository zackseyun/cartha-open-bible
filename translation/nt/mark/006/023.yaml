theological_decisions:
- issue: Sense of βασιλεία in Herod's speech
  chosen_reading: kingdom
  alternative_readings:
  - reign
  - royal authority
  rationale: The term can denote either the realm or the exercise of royal rule. In
    this narrative setting, Herod's extravagant oath is best represented by 'kingdom,'
    which communicates the conventional royal formula without importing a technical
    theological sense.
