id: MRK.6.23
reference: Mark 6:23
source:
  edition: SBLGNT
  text: καὶ ὤμοσεν ⸀αὐτῇ· ⸂Ὅ τι⸃ ἐάν με αἰτήσῃς δώσω σοι ἕως ἡμίσους τῆς βασιλείας
    μου.
translation:
  text: And he swore to her, “Whatever you ask me, I will give you, up to half of
    my kingdom.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Anything you ask me.”
    reason: lexical_alternative
  - marker: b
    text: Greek “up to half of my kingdom,” a conventional hyperbolic royal offer.
    reason: cultural_note
lexical_decisions:
- source_word: ὤμοσεν
  chosen: he swore
  alternatives:
  - he vowed
  - he took an oath
  lexicon: BDAG
  rationale: Aorist indicative of ὀμνύω denotes making an oath. 'He swore' is the
    most natural modern English rendering and preserves the force of a solemn oath
    without unnecessary expansion.
- source_word: αὐτῇ
  chosen: to her
  lexicon: BDAG
  rationale: Dative feminine singular referring to the girl addressed in context.
    'To her' is the straightforward relational dative.
- source_word: Ὅ τι ἐάν
  chosen: Whatever
  alternatives:
  - Anything that
  - Whatever it is that
  lexicon: BDAG
  rationale: 'The relative expression with ἐάν introduces an indefinite, open-ended
    condition: ''whatever'' or ''anything that.'' ''Whatever'' is concise and idiomatic
    while preserving the breadth of the promise.'
- source_word: με αἰτήσῃς
  chosen: you ask me
  alternatives:
  - you request from me
  - you might ask me for
  lexicon: BDAG
  rationale: αἰτέω commonly means 'ask' or 'request,' often with a person as the one
    asked. 'Ask me' is idiomatic English and fits the direct speech naturally.
- source_word: δώσω σοι
  chosen: I will give you
  alternatives:
  - I shall give you
  lexicon: BDAG
  rationale: Future indicative of δίδωμι with indirect object σοι. 'I will give you'
    is clear, natural, and preserves the promissory force.
- source_word: ἕως
  chosen: up to
  alternatives:
  - as far as
  - until
  lexicon: BDAG
  rationale: Here ἕως marks extent or limit, not time. 'Up to' best conveys the quantitative
    limit of the offer in contemporary English.
- source_word: ἡμίσους
  chosen: half
  alternatives:
  - a half portion
  lexicon: BDAG
  rationale: 'Genitive after ἕως expressing measure/extent: ''up to half.'' English
    idiom prefers the simple ''half'' rather than a more literal but awkward form.'
- source_word: τῆς βασιλείας μου
  chosen: of my kingdom
  alternatives:
  - of my realm
  - of my royal domain
  lexicon: BDAG
  rationale: βασιλεία can denote kingship, reign, or kingdom. In this courtly promise,
    the concrete sense 'kingdom' is the most natural and traditional rendering, matching
    the hyperbolic royal offer.
