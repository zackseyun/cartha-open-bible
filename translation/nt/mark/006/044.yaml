id: MRK.6.44
reference: Mark 6:44
source:
  edition: SBLGNT
  text: καὶ ἦσαν οἱ φαγόντες ⸂τοὺς ἄρτους⸃ πεντακισχίλιοι ἄνδρες.
translation:
  text: And those who ate the loaves were five thousand men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bread.' The Greek word can mean either, but here it refers to the
      specific loaves in the feeding account.
    reason: lexical_alternative
  - marker: b
    text: Greek 'men,' specifically adult males, not a generic term for people.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦσαν
  chosen: were
  alternatives:
  - numbered
  lexicon: BDAG
  rationale: The imperfect of εἰμί here functions as a simple copula stating the total
    number of those who ate. 'Were' is the most direct and natural rendering; 'numbered'
    is possible in English but adds a nuance not explicit in the Greek.
- source_word: οἱ φαγόντες
  chosen: those who ate
  alternatives:
  - the ones who ate
  - those who had eaten
  lexicon: BDAG
  rationale: The articular aorist participle identifies the group by the completed
    action of eating. 'Those who ate' is clear, idiomatic, and sufficiently reflects
    the participial construction without overtranslating the aorist as pluperfect.
- source_word: τοὺς ἄρτους
  chosen: the loaves
  alternatives:
  - the bread
  lexicon: BDAG
  rationale: ἄρτος can mean 'bread' or 'loaf,' but in this feeding narrative the plural
    refers to the specific loaves distributed by Jesus. 'The loaves' preserves the
    concrete narrative detail better than the more generic 'the bread.'
- source_word: πεντακισχίλιοι
  chosen: five thousand
  lexicon: BDAG
  rationale: Straightforward cardinal number; no idiomatic adjustment is needed.
- source_word: ἄνδρες
  chosen: men
  alternatives:
  - males
  lexicon: BDAG
  rationale: ἀνήρ refers specifically to adult males/men, not people in general. In
    keeping with the gender-accurate philosophy, 'men' should be retained rather than
    neutralizing to 'people.' This also matches the narrative convention that the
    count specified the men.
