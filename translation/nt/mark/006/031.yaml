id: MRK.6.31
reference: Mark 6:31
source:
  edition: SBLGNT
  text: καὶ ⸀λέγει αὐτοῖς· Δεῦτε ὑμεῖς αὐτοὶ κατ’ ἰδίαν εἰς ἔρημον τόπον καὶ ⸀ἀναπαύσασθε ὀλίγον. ἦσαν γὰρ οἱ ἐρχόμενοι καὶ οἱ ὑπάγοντες πολλοί, καὶ οὐδὲ φαγεῖν εὐκαίρουν.
translation:
  text: And he said to them[a], “Come away by yourselves to a desolate place and rest a little.” For many were coming and going[b], and they did not even have an opportunity to eat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a deserted place” or “a solitary place.” The Greek refers to an isolated or uninhabited location, not necessarily a desert in the modern sense.
    reason: lexical_alternative
  - marker: b
    text: Or “they did not even have time to eat.”
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: he said
  alternatives:
  - he says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, standard English narrative style normally renders it as a simple past here for natural readability while preserving the discourse function.
- source_word: Δεῦτε
  chosen: Come away
  alternatives:
  - Come
  - Go
  lexicon: BDAG
  rationale: An invitational imperative meaning 'come' or 'come here'; 'come away' fits the movement from the crowd to a separate location implied by the following phrase.
- source_word: ὑμεῖς αὐτοὶ
  chosen: by yourselves
  alternatives:
  - you yourselves
  - you alone
  lexicon: BDAG
  rationale: The emphatic pronouns stress separation and exclusivity. 'By yourselves' captures both the emphasis and the sense of going apart from others in idiomatic English.
- source_word: κατ’ ἰδίαν
  chosen: by yourselves
  alternatives:
  - privately
  - apart
  lexicon: BDAG
  rationale: This phrase means 'in private' or 'apart.' Because English can naturally combine the emphatic pronouns and this phrase as 'by yourselves,' the rendering compresses the repeated idea without losing meaning.
- source_word: ἔρημον τόπον
  chosen: a desolate place
  alternatives:
  - a deserted place
  - a solitary place
  - a wilderness place
  lexicon: BDAG
  rationale: ἔρημος denotes an uninhabited or isolated area, not necessarily a sandy desert. 'Desolate place' preserves the sense of seclusion better than the potentially misleading 'desert place.'
- source_word: ἀναπαύσασθε
  chosen: rest
  alternatives:
  - take your rest
  - refresh yourselves
  lexicon: BDAG
  rationale: The middle imperative calls for ceasing from labor and recovering strength. 'Rest' is the clearest modern English equivalent.
- source_word: ὀλίγον
  chosen: a little
  alternatives:
  - for a little while
  - briefly
  lexicon: BDAG
  rationale: The adverbial accusative indicates a short duration or degree. 'A little' is concise and natural in direct speech.
- source_word: οἱ ἐρχόμενοι καὶ οἱ ὑπάγοντες
  chosen: were coming and going
  alternatives:
  - were arriving and departing
  - kept coming and going
  lexicon: BDAG
  rationale: The substantival participles describe the continual flow of people. 'Were coming and going' preserves the ongoing activity in idiomatic English.
- source_word: πολλοί
  chosen: many
  alternatives:
  - a great many
  lexicon: BDAG
  rationale: A straightforward quantitative adjective; 'many' is sufficient and natural.
- source_word: οὐδὲ φαγεῖν εὐκαίρουν
  chosen: they did not even have an opportunity to eat
  alternatives:
  - they did not even have time to eat
  - they were not even finding a chance to eat
  lexicon: BDAG
  rationale: εὐκαιρέω means to have leisure or opportunity. 'Have an opportunity' is slightly more precise than 'have time,' while still readable. 'Even' reflects οὐδέ.
