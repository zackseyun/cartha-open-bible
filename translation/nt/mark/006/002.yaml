theological_decisions:
- issue: Nature of δυνάμεις in context
  chosen_reading: Rendered as 'miracles' referring to miraculous works associated
    with Jesus' ministry.
  alternative_readings:
  - '''mighty works'''
  - '''powers'''
  rationale: The context joins wisdom with extraordinary deeds done through Jesus,
    and in Mark plural δυνάμεις commonly refers to miracles. This is a lexical-contextual
    decision, not an importation of later doctrine.
  doctrine_reference: Translation philosophy §1, §6
- issue: Tone of τούτῳ
  chosen_reading: Rendered with 'this man' in the first question to reflect the crowd's
    distancing or dismissive tone.
  alternative_readings:
  - '''him'''
  - '''this one'''
  rationale: The demonstrative can carry a slightly disparaging nuance in context.
    English 'this man' conveys that social tone without adding content not present
    in the Greek.
  doctrine_reference: Translation philosophy §1, §6
