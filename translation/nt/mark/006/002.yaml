id: MRK.6.2
reference: Mark 6:2
source:
  edition: SBLGNT
  text: καὶ γενομένου σαββάτου ἤρξατο ⸂διδάσκειν ἐν τῇ συναγωγῇ⸃· καὶ ⸀οἱ πολλοὶ ἀκούοντες
    ἐξεπλήσσοντο λέγοντες· Πόθεν τούτῳ ταῦτα, καὶ τίς ἡ σοφία ἡ δοθεῖσα ⸀τούτῳ, καὶ
    ⸀αἱ δυνάμεις τοιαῦται διὰ τῶν χειρῶν αὐτοῦ ⸀γινόμεναι;
translation:
  text: And when the Sabbath came, he began to teach in the synagogue. And many who
    heard him were astonished, saying, “Where did this man get these things? And what
    is this wisdom given to him, and such miracles happening through his hands?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “such mighty works” or “such works of power.” The Greek plural δυνάμεις
      can denote miraculous deeds or displays of power.
    reason: lexical_alternative
lexical_decisions:
- source_word: γενομένου σαββάτου
  chosen: when the Sabbath came
  alternatives:
  - when the Sabbath had come
  - on the Sabbath
  lexicon: BDAG
  rationale: Genitive absolute marking temporal circumstance. 'When the Sabbath came'
    is natural modern English while preserving the temporal force without over-literal
    awkwardness.
- source_word: ἤρξατο διδάσκειν
  chosen: he began to teach
  alternatives:
  - he started teaching
  lexicon: BDAG
  rationale: Standard ingressive construction with ἄρχομαι + infinitive. 'Began to
    teach' is slightly more formal and fits narrative style.
- source_word: συναγωγῇ
  chosen: synagogue
  alternatives:
  - assembly
  lexicon: BDAG
  rationale: In this Jewish setting the institutional/place sense is clear; 'synagogue'
    is the established and accurate rendering.
- source_word: οἱ πολλοὶ ἀκούοντες
  chosen: many who heard him
  alternatives:
  - the many hearing him
  - many hearing
  lexicon: BDAG
  rationale: οἱ πολλοὶ idiomatically means 'many' or 'most'; with the participle ἀκούοντες
    it refers to those listening. 'Heard him' makes the object explicit in idiomatic
    English from context.
- source_word: ἐξεπλήσσοντο
  chosen: were astonished
  alternatives:
  - were amazed
  - were astounded
  lexicon: BDAG
  rationale: Imperfect middle/passive conveys ongoing reaction. 'Were astonished'
    preserves the strong sense of being struck with amazement.
- source_word: Πόθεν τούτῳ ταῦτα
  chosen: Where did this man get these things?
  alternatives:
  - From where does this man get these things?
  - Where did he get these things?
  lexicon: BDAG
  rationale: Πόθεν asks source/origin. Supplying 'get' is idiomatic in English. 'This
    man' brings out the demonstrative's slightly distancing tone better than bare
    'him,' though the Greek simply has 'to this one.'
- source_word: τίς ἡ σοφία ἡ δοθεῖσα τούτῳ
  chosen: what is this wisdom given to him
  alternatives:
  - what is the wisdom that has been given to him
  - what kind of wisdom is this that was given to him
  lexicon: BDAG
  rationale: The clause is exclamatory/interrogative. 'This wisdom given to him' captures
    both the demonstrative force felt in context and the passive participle δοθεῖσα
    without overloading the sentence.
- source_word: δυνάμεις
  chosen: miracles
  alternatives:
  - mighty works
  - works of power
  - powers
  lexicon: BDAG
  rationale: In Mark, δύναμις in plural often denotes miraculous works rather than
    abstract 'powers.' 'Miracles' communicates the referent clearly in contemporary
    English. Alternative 'mighty works' is more formal but less transparent.
- source_word: τοιαῦται
  chosen: such
  alternatives:
  - such as these
  lexicon: BDAG
  rationale: Demonstrative qualitative adjective emphasizing the remarkable kind of
    miracles. 'Such' is concise and natural.
- source_word: διὰ τῶν χειρῶν αὐτοῦ γινόμεναι
  chosen: happening through his hands
  alternatives:
  - done by his hands
  - performed through his hands
  - taking place through his hands
  lexicon: BDAG
  rationale: διά with genitive plus 'hands' is an instrumental idiom. 'Happening through
    his hands' preserves the Greek imagery and the participial sense better than flattening
    to a simple active verb.
