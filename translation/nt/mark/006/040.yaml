id: MRK.6.40
reference: Mark 6:40
source:
  edition: SBLGNT
  text: καὶ ἀνέπεσαν πρασιαὶ πρασιαὶ ⸀κατὰ ἑκατὸν καὶ ⸁κατὰ πεντήκοντα.
translation:
  text: And they reclined in groups of hundreds and of fifties.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'garden plots, garden plots,' an image suggesting orderly rows
      or sections.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέπεσαν
  chosen: reclined
  alternatives:
  - sat down
  lexicon: BDAG
  rationale: The verb ἀναπίπτω commonly refers to reclining or taking one's place
    for a meal. In this feeding context, 'reclined' preserves the meal-setting nuance
    better than the more generic 'sat down,' while remaining natural English.
- source_word: πρασιαὶ πρασιαὶ
  chosen: in groups
  alternatives:
  - group by group
  - in rows
  - in garden plots
  lexicon: BDAG
  rationale: The repeated noun πρασιά literally denotes a garden bed/plot, and here
    idiomatically describes orderly arranged groups. 'In groups' gives the sense clearly
    in English; the repetition is represented distributively rather than woodenly.
    The more literal imagery is worth preserving in a footnote.
- source_word: κατὰ ἑκατὸν
  chosen: of hundreds
  alternatives:
  - by hundreds
  - in groups of a hundred
  lexicon: BDAG
  rationale: κατά with numerals here expresses distribution. 'Of hundreds' is concise
    and idiomatic in coordination with the following phrase, conveying that the groups
    were arranged in units numbering one hundred.
- source_word: κατὰ πεντήκοντα
  chosen: of fifties
  alternatives:
  - by fifties
  - in groups of fifty
  lexicon: BDAG
  rationale: As with the previous phrase, κατά marks distributive grouping. 'Of fifties'
    keeps the parallelism and compactness of the Greek.
