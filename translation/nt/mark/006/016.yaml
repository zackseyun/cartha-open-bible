theological_decisions:
- issue: Rendering of ἠγέρθη in relation to resurrection language
  chosen_reading: has been raised
  alternative_readings:
  - has risen
  - rose
  rationale: The Greek is passive, not active. Using 'has been raised' preserves the form and avoids smoothing it into an active intransitive resurrection formula. This keeps the wording transparent and does not over-interpret Herod's fearful conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
