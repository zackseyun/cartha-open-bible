id: MRK.6.16
reference: Mark 6:16
source:
  edition: SBLGNT
  text: ἀκούσας δὲ ⸀ὁ Ἡρῴδης ⸀ἔλεγεν· Ὃν ἐγὼ ἀπεκεφάλισα Ἰωάννην, οὗτος ⸀ἠγέρθη.
translation:
  text: But when Herod heard it[a], he said, “John, whom I beheaded[b], has been raised.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “he kept saying,” reflecting the imperfect verb.
    reason: lexical_alternative
  - marker: b
    text: 'Or, “he was raised” or “he rose.” The Greek verb is passive: “was/has been raised.”'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀκούσας
  chosen: when ... heard
  alternatives:
  - having heard
  - after hearing
  lexicon: BDAG
  rationale: Aorist participle of ἀκούω is rendered temporally in smooth English. 'When ... heard' captures the participial relation to the main verb without sounding wooden.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild development/contrast in the narrative. 'But' fits the shift back to Herod's reaction better than a simple 'and.'
- source_word: ἔλεγεν
  chosen: he said
  alternatives:
  - he was saying
  - he kept saying
  lexicon: BDAG
  rationale: The imperfect can suggest repeated or ongoing speech, but in English narrative 'he said' is the most natural rendering here. The context does not require emphasis on repeated utterance, though that nuance is possible.
- source_word: Ὃν ἐγὼ ἀπεκεφάλισα Ἰωάννην
  chosen: John, whom I beheaded
  alternatives:
  - The John whom I beheaded
  - John, whom I had beheaded
  lexicon: BDAG
  rationale: The Greek fronting highlights the object ('whom I beheaded, John'). English idiom is best served by making 'John' explicit first, then the relative clause. 'Beheaded' is the direct lexical sense of ἀποκεφαλίζω and should be preserved.
- source_word: ἀπεκεφάλισα
  chosen: beheaded
  alternatives:
  - had beheaded
  - cut off the head of
  lexicon: BDAG
  rationale: The verb specifically means 'behead.' The simple past works well within Herod's direct speech; English does not require the pluperfect here, though it is a possible nuance.
- source_word: οὗτος
  chosen: this one
  alternatives:
  - he
  - this man
  lexicon: BDAG
  rationale: οὗτος is demonstrative and emphatic. Rendering it as 'this one' preserves the force better than the flatter 'he,' while remaining natural enough in direct speech.
- source_word: ἠγέρθη
  chosen: has been raised
  alternatives:
  - was raised
  - has risen
  - rose
  lexicon: BDAG
  rationale: The passive form of ἐγείρω is best rendered passively here. 'Has been raised' preserves the verbal voice and the likely sense that John has been brought back from death, without importing a more specific theological claim than the text states.
