id: MRK.6.29
reference: Mark 6:29
source:
  edition: SBLGNT
  text: καὶ ἀκούσαντες οἱ μαθηταὶ αὐτοῦ ἦλθον καὶ ἦραν τὸ πτῶμα αὐτοῦ καὶ ἔθηκαν αὐτὸ
    ἐν μνημείῳ.
translation:
  text: And when his disciples heard, they came and took up his body and laid it in
    a tomb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his corpse.' The Greek term specifically refers to a dead body.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσαντες
  chosen: when ... heard
  alternatives:
  - having heard
  - after hearing
  lexicon: BDAG
  rationale: Aorist participle with temporal force in context; 'when ... heard' is
    natural English and preserves the sequence without over-literal awkwardness.
- source_word: οἱ μαθηταὶ αὐτοῦ
  chosen: his disciples
  alternatives:
  - his followers
  lexicon: BDAG
  rationale: μαθηταί is regularly 'disciples'; this preserves the relational and formal
    sense better than the broader 'followers.' In context, the pronoun refers to John
    the Baptist.
- source_word: ἦλθον
  chosen: they came
  alternatives:
  - they went
  lexicon: BDAG
  rationale: Standard rendering of ἔρχομαι here is 'came.' English idiom in narrative
    commonly uses 'came' for arrival at the scene.
- source_word: ἦραν
  chosen: took up
  alternatives:
  - carried away
  - took
  lexicon: BDAG
  rationale: αἴρω can mean 'take up, lift, carry away.' 'Took up' reflects the physical
    act of lifting the corpse while remaining concise and natural.
- source_word: πτῶμα
  chosen: body
  alternatives:
  - corpse
  lexicon: BDAG
  rationale: πτῶμα specifically denotes a fallen body/corpse. 'Body' is chosen for
    readable modern English in the main text, while the more explicit 'corpse' is
    preserved as an alternative because the context is clearly a dead body.
- source_word: ἔθηκαν
  chosen: laid
  alternatives:
  - placed
  - put
  lexicon: BDAG
  rationale: τίθημι in burial context is well rendered 'laid,' which is idiomatic
    and suitably dignified.
- source_word: ἐν μνημείῳ
  chosen: in a tomb
  alternatives:
  - in a grave
  - in a memorial tomb
  lexicon: BDAG
  rationale: μνημεῖον in this context refers to a burial place/tomb, not merely a
    grave. 'Tomb' best matches common NT burial usage.
