id: MRK.6.1
reference: Mark 6:1
source:
  edition: SBLGNT
  text: Καὶ ἐξῆλθεν ἐκεῖθεν, καὶ ⸀ἔρχεται εἰς τὴν πατρίδα αὐτοῦ, καὶ ἀκολουθοῦσιν αὐτῷ οἱ μαθηταὶ αὐτοῦ.
translation:
  text: And he went out from there and came to his hometown[a], and his disciples followed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'comes to his hometown, and his disciples follow him'—the Greek uses historical presents for vivid narrative effect.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - left
  - departed
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι, indicating departure from the previous location. 'Went out' preserves the verbal imagery more closely than the smoother 'left,' while remaining natural English.
- source_word: ἐκεῖθεν
  chosen: from there
  alternatives:
  - from that place
  lexicon: BDAG
  rationale: Adverb of place marking the point of departure. 'From there' is the most natural and sufficiently precise rendering.
- source_word: ἔρχεται
  chosen: came
  alternatives:
  - comes
  - went
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('comes'), standard English narrative style usually renders this as a simple past for readability. 'Came' preserves the movement toward the destination without awkwardness. 'Went' is possible in English from the narrator's perspective, but 'came' more directly reflects ἔρχομαι.
- source_word: πατρίδα
  chosen: hometown
  alternatives:
  - homeland
  - native place
  - country
  lexicon: BDAG
  rationale: πατρίς here refers to Jesus's own home region/town in context, not his nation in a broad political sense. 'Hometown' is idiomatic and contextually precise for Mark 6, where Nazareth is in view.
- source_word: ἀκολουθοῦσιν
  chosen: followed
  alternatives:
  - were following
  - accompanied
  lexicon: BDAG
  rationale: Present tense in Greek within narrative can be rendered as past in English. 'Followed' is the standard rendering of ἀκολουθέω and preserves discipleship language better than the more generic 'accompanied.'
- source_word: μαθηταὶ
  chosen: disciples
  alternatives:
  - learners
  - followers
  lexicon: BDAG
  rationale: '''Disciples'' is the established and accurate rendering for μαθηταί in Gospel contexts, preserving both relational and instructional dimensions.'
