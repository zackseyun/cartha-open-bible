theological_decisions:
- issue: Rendering of historical presents (ἔρχεται, ἀκολουθοῦσιν)
  chosen_reading: 'Converted to simple past in English narrative: ''came'' and ''followed.'''
  alternative_readings:
  - 'Retain historical present: ''comes ... follow'''
  rationale: This is a stylistic translation decision rather than a doctrinal one. Optimal equivalence favors readable modern English while preserving narrative sense. The historical present's vividness is not easily maintained in idiomatic English without sounding unnatural.
  doctrine_reference: Translation philosophy §6 (Readable modern English, not archaic or academic)
