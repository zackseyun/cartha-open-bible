id: MRK.6.18
reference: Mark 6:18
source:
  edition: SBLGNT
  text: ἔλεγεν γὰρ ὁ Ἰωάννης τῷ Ἡρῴδῃ ὅτι Οὐκ ἔξεστίν σοι ἔχειν τὴν γυναῖκα τοῦ ἀδελφοῦ
    σου.
translation:
  text: For John had been saying to Herod, “It is not lawful for you to have your
    brother’s wife.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “It is not permitted for you to have your brother’s wife.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  chosen: had been saying
  alternatives:
  - was saying
  - kept saying
  - said
  lexicon: BDAG
  rationale: Imperfect tense indicates repeated or ongoing past action, not merely
    a single utterance. 'Had been saying' captures the durative force in natural English.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks explanation for the preceding context. 'For' preserves the connective
    and explanatory force without overinterpreting.
- source_word: Ἡρῴδῃ
  chosen: Herod
  rationale: Standard English transliteration of the personal name, following the
    policy to transliterate names rather than translate them.
- source_word: Οὐκ ἔξεστίν σοι
  chosen: It is not lawful for you
  alternatives:
  - It is not permitted for you
  - You are not allowed
  lexicon: BDAG
  rationale: ἔξεστιν commonly expresses what is permitted or lawful. In this context
    of marriage prohibition and prophetic rebuke, 'lawful' best conveys the moral-legal
    force, likely echoing Torah norms, while remaining idiomatic.
- source_word: ἔχειν
  chosen: to have
  alternatives:
  - to take
  - to possess
  lexicon: BDAG
  rationale: The infinitive literally means 'to have.' In this marital context, English
    'to have' is idiomatic and preserves the source wording without unnecessary paraphrase.
- source_word: γυναῖκα
  chosen: wife
  alternatives:
  - woman
  lexicon: BDAG
  rationale: γυνή can mean 'woman' or 'wife'; the genitival phrase 'your brother’s'
    makes the marital sense explicit, so 'wife' is required by context.
- source_word: τοῦ ἀδελφοῦ σου
  chosen: your brother’s
  alternatives:
  - of your brother
  lexicon: BDAG
  rationale: Natural English possessive rendering of the genitive phrase. It preserves
    the familial relationship central to John's accusation.
