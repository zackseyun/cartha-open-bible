id: MRK.6.42
reference: Mark 6:42
source:
  edition: SBLGNT
  text: καὶ ἔφαγον πάντες καὶ ἐχορτάσθησαν·
translation:
  text: And they all ate and were satisfied.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔφαγον
  chosen: ate
  alternatives:
  - ate food
  - ate their fill
  lexicon: BDAG
  rationale: Aorist active of ἐσθίω, the ordinary verb for eating. 'Ate' is the plain
    and natural English equivalent. Added objects such as 'food' are unnecessary,
    and 'ate their fill' would import the result already expressed by the following
    verb.
- source_word: πάντες
  chosen: they all
  alternatives:
  - all
  - everyone
  lexicon: BDAG
  rationale: The nominative plural adjective functions substantivally, referring to
    the whole crowd in context. In English, 'they all' makes the implied subject explicit
    and reads naturally, while preserving the universal scope.
- source_word: ἐχορτάσθησαν
  chosen: were satisfied
  alternatives:
  - were filled
  - were full
  lexicon: BDAG
  rationale: Passive of χορτάζω, meaning to be fed fully or satisfied. 'Were satisfied'
    communicates the sense idiomatically in modern English without sounding wooden.
    'Were filled' is possible but less natural here; 'were full' is colloquial and
    slightly flatter.
- source_word: καὶ ... καὶ
  chosen: And ... and ...
  alternatives:
  - Then ... and ...
  - So ... and ...
  lexicon: BDAG
  rationale: The repeated καί coordinates the two actions straightforwardly. Retaining
    'And' at the start preserves the narrative flow and paratactic style of Mark without
    overinterpreting the connection.
