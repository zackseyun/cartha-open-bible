theological_decisions:
- issue: Scope of ἐκεῖθεν in the departure clause
  chosen_reading: The disciples are to remain in the same house until they leave the locality/place, not merely until they step out of the house.
  alternative_readings:
  - Remain there until you leave the house
  - Remain there until you go out from there
  rationale: In context, Jesus is instructing the disciples about lodging practices during mission. The phrase naturally refers to departing the place where they are ministering, which explains the command to stay in one house rather than seeking better accommodations. This is a contextual, not doctrinal, decision.
