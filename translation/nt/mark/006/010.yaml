id: MRK.6.10
reference: Mark 6:10
source:
  edition: SBLGNT
  text: καὶ ἔλεγεν αὐτοῖς· Ὅπου ⸀ἐὰν εἰσέλθητε εἰς οἰκίαν, ἐκεῖ μένετε ἕως ἂν ἐξέλθητε ἐκεῖθεν.
translation:
  text: And he was saying to them[a], “Wherever you enter a house, stay there until you leave that place.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “until you go out from there.” The Greek is more literally “until you leave from there,” which could be taken more woodenly, but here likely refers to leaving that locality.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  chosen: he was saying
  alternatives:
  - he said
  - he kept saying
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated speech in narrative. 'Was saying' preserves that aspect more transparently than simple past, while remaining natural enough in English.
- source_word: Ὅπου ἐὰν
  chosen: Wherever
  alternatives:
  - Wherever it may be that
  - In whatever place
  lexicon: BDAG
  rationale: 'The combination introduces an indefinite relative sense: ''wherever'' or ''in whatever place.'' ''Wherever'' is concise and natural.'
- source_word: εἰσέλθητε εἰς οἰκίαν
  chosen: you enter into a house
  alternatives:
  - you go into a house
  - you enter a house
  lexicon: BDAG
  rationale: εἰσέρχομαι with εἰς marks entry into a house. 'Enter into a house' keeps the directional force, though slightly more formal; it fits the instructional tone.
- source_word: οἰκίαν
  chosen: a house
  alternatives:
  - a home
  lexicon: BDAG
  rationale: οἰκία denotes a house/household context. Here the physical lodging place is primary, so 'house' is preferred over the more interpretive 'home.'
- source_word: ἐκεῖ μένετε
  chosen: stay there
  alternatives:
  - remain there
  - lodge there
  lexicon: BDAG
  rationale: μένω commonly means remain/stay. 'Stay there' is clear modern English and suits the travel instruction context.
- source_word: ἕως ἂν ἐξέλθητε ἐκεῖθεν
  chosen: until you leave that place
  alternatives:
  - until you go out from there
  - until you depart from there
  lexicon: BDAG
  rationale: The clause means remaining in that house until departure from the locality. Rendering ἐκεῖθεν as 'that place' communicates the sense idiomatically in English better than the wooden 'from there,' while preserving the instruction not to move from house to house.
