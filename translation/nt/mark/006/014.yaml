theological_decisions:
- issue: Rendering of ἐγήγερται in a resurrection context
  chosen_reading: has been raised from the dead
  alternative_readings:
  - has risen from the dead
  rationale: The passive form is explicit in Greek and should be preserved unless
    English becomes unnatural. Keeping 'has been raised' avoids importing a more active
    nuance than the text states, while still expressing resurrection clearly.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of Ἰωάννης ὁ βαπτίζων
  chosen_reading: John the Baptizer
  alternative_readings:
  - John the Baptist
  rationale: The translation philosophy prioritizes original-language primacy over
    inherited translation tradition. The participial form is more transparently represented
    by 'the Baptizer,' while the traditional form is preserved in a footnote for reader
    familiarity.
  doctrine_reference: Original-language primacy over translation tradition.
