id: MRK.6.14
reference: Mark 6:14
source:
  edition: SBLGNT
  text: Καὶ ἤκουσεν ὁ βασιλεὺς Ἡρῴδης, φανερὸν γὰρ ἐγένετο τὸ ὄνομα αὐτοῦ, καὶ ⸀ἔλεγον
    ὅτι Ἰωάννης ὁ βαπτίζων ⸂ἐγήγερται ἐκ νεκρῶν⸃, καὶ διὰ τοῦτο ἐνεργοῦσιν αἱ δυνάμεις
    ἐν αὐτῷ·
translation:
  text: And King Herod heard of it, for his name had become well known, and people
    were saying, “John the Baptizer has been raised from the dead, and because of
    this these powers are at work in him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “John the Baptist.”
    reason: lexical_alternative
  - marker: b
    text: 'Or “has risen from the dead.” The Greek verb is passive: “has been raised.”'
    reason: alternative_reading
  - marker: c
    text: Or “miraculous powers” or “mighty works.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ βασιλεὺς Ἡρῴδης
  chosen: King Herod
  alternatives:
  - Herod the king
  lexicon: BDAG
  rationale: βασιλεύς straightforwardly means 'king.' English idiom prefers 'King
    Herod' over 'Herod the king' here.
- source_word: ἤκουσεν
  chosen: heard of it
  alternatives:
  - heard
  - came to hear
  lexicon: BDAG
  rationale: The verb means 'heard,' but in context the object is implicit from the
    preceding narrative about Jesus' activity and fame. 'Heard of it' supplies natural
    English without adding new content.
- source_word: φανερὸν γὰρ ἐγένετο τὸ ὄνομα αὐτοῦ
  chosen: for his name had become well known
  alternatives:
  - for his name became known
  - for his name had become public
  lexicon: BDAG
  rationale: 'The clause explains why Herod heard: Jesus'' name/reputation had become
    manifest. Rendering ὄνομα as ''name'' preserves the Greek expression, while ''well
    known'' communicates φανερόν ἐγένετο idiomatically in English.'
- source_word: ἔλεγον
  chosen: people were saying
  alternatives:
  - they were saying
  - some were saying
  lexicon: BDAG
  rationale: The plural verb has an indefinite subject. 'People were saying' conveys
    the impersonal plural naturally in English better than a bare 'they were saying.'
- source_word: Ἰωάννης ὁ βαπτίζων
  chosen: John the Baptizer
  alternatives:
  - John the Baptist
  - John who baptizes
  lexicon: BDAG
  rationale: The participle literally means 'the one baptizing.' 'John the Baptizer'
    is a transparent rendering that preserves the verbal force better than the traditional
    title 'the Baptist,' while remaining natural English.
- source_word: ἐγήγερται ἐκ νεκρῶν
  chosen: has been raised from the dead
  alternatives:
  - has risen from the dead
  - has been awakened from the dead
  lexicon: BDAG
  rationale: The perfect passive of ἐγείρω is best rendered 'has been raised.' This
    preserves the passive form rather than shifting to the intransitive 'has risen.'
    'From the dead' is the standard idiomatic rendering of ἐκ νεκρῶν.
- source_word: διὰ τοῦτο
  chosen: because of this
  alternatives:
  - for this reason
  - therefore
  lexicon: BDAG
  rationale: This phrase gives the supposed reason for the following statement. 'Because
    of this' is clear and close to the Greek.
- source_word: ἐνεργοῦσιν
  chosen: are at work
  alternatives:
  - are working
  - are active
  lexicon: BDAG
  rationale: The present tense indicates ongoing activity. 'Are at work' is idiomatic
    English and fits the subject 'powers' well.
- source_word: αἱ δυνάμεις
  chosen: these powers
  alternatives:
  - the powers
  - miraculous powers
  - mighty works
  lexicon: BDAG
  rationale: δύναμεις can denote powers or miracles. Here the subject of ἐνεργοῦσιν
    is personified as operative powers. 'These powers' reflects the plural noun directly
    and avoids over-interpreting it as either abstract power or specific miracle-events
    alone.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - through him
  lexicon: BDAG
  rationale: ἐν with the dative is most directly 'in him.' 'Through him' is possible
    as an interpretive smoothing, but 'in him' better preserves the Greek wording
    and the sense that these powers are operative within his person.
