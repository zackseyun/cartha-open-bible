id: MRK.6.47
reference: Mark 6:47
source:
  edition: SBLGNT
  text: Καὶ ὀψίας γενομένης ἦν τὸ πλοῖον ἐν μέσῳ τῆς θαλάσσης, καὶ αὐτὸς μόνος ἐπὶ τῆς γῆς.
translation:
  text: And when evening had come[a], the boat was in the middle of the sea, and he was alone on the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on shore.' The Greek says 'on the land,' contrasting his location with the boat's position at sea.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀψίας γενομένης
  chosen: when evening had come
  alternatives:
  - when it became evening
  - when evening came
  lexicon: BDAG
  rationale: Genitive absolute marking a temporal circumstance. 'When evening had come' is natural English that preserves the completed transition into evening without over-paraphrase.
- source_word: πλοῖον
  chosen: the boat
  alternatives:
  - the ship
  lexicon: BDAG
  rationale: In this Galilean setting, 'boat' is the most natural and contextually accurate rendering; 'ship' would sound too large in modern English.
- source_word: ἐν μέσῳ τῆς θαλάσσης
  chosen: in the middle of the sea
  alternatives:
  - in the midst of the sea
  - out in the middle of the sea
  lexicon: BDAG
  rationale: This phrase indicates location well away from shore. 'In the middle of the sea' is clear, idiomatic, and sufficiently formal. 'Sea' is retained rather than 'lake' because θάλασσα is the source term and the Gospel usage regularly calls the Sea of Galilee a sea.
- source_word: θάλασσης
  chosen: the sea
  alternatives:
  - the lake
  lexicon: BDAG
  rationale: Although geographically the Sea of Galilee is a lake, the Greek text says 'sea.' Following original-language primacy, the translation preserves the source wording rather than substituting a modern geographic label.
- source_word: αὐτὸς μόνος
  chosen: he was alone
  alternatives:
  - he himself was alone
  - he alone was
  lexicon: BDAG
  rationale: The pronoun plus μόνος emphasizes Jesus' solitary state. English expresses this naturally as 'he was alone'; adding 'himself' would be possible but unnecessarily stiff here.
- source_word: ἐπὶ τῆς γῆς
  chosen: on the land
  alternatives:
  - on shore
  - on the ground
  lexicon: BDAG
  rationale: The contrast is between the boat at sea and Jesus remaining ashore. 'On the land' preserves the lexical contrast with the sea more directly than the more interpretive 'on shore.'
