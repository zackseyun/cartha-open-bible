id: MRK.6.37
reference: Mark 6:37
source:
  edition: SBLGNT
  text: ὁ δὲ ἀποκριθεὶς εἶπεν αὐτοῖς· Δότε αὐτοῖς ὑμεῖς φαγεῖν. καὶ λέγουσιν αὐτῷ·
    Ἀπελθόντες ἀγοράσωμεν δηναρίων διακοσίων ἄρτους καὶ ⸀δώσομεν αὐτοῖς φαγεῖν;
translation:
  text: But he answered and said to them, “You yourselves give them something to eat.”
    And they said to him, “Should we go and buy bread for two hundred denarii and
    give it to them to eat?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “buy loaves for two hundred denarii.” The Greek ἄρτους can mean “bread”
      or “loaves.”
    reason: lexical_alternative
  - marker: b
    text: A denarius was a standard daily wage for a laborer or soldier.
    reason: cultural_note
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  chosen: answered and said
  alternatives:
  - answered
  - said in reply
  lexicon: BDAG
  rationale: Retains the common Semitic-Greek narrative pairing rather than collapsing
    it entirely, while still sounding natural in English.
- source_word: Δότε
  chosen: give
  alternatives:
  - provide
  lexicon: BDAG
  rationale: Direct imperative of δίδωμι is best preserved as 'give'; 'provide' is
    smoother but less direct.
- source_word: ὑμεῖς
  chosen: you yourselves
  alternatives:
  - you
  - you all yourselves
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic alongside the imperative, so the English
    should reflect that emphasis.
- source_word: φαγεῖν
  chosen: something to eat
  alternatives:
  - food
  - to eat
  lexicon: BDAG
  rationale: The infinitive after δίδωμι is idiomatically rendered in English as 'give
    ... something to eat'; this preserves sense without wooden awkwardness.
- source_word: Ἀπελθόντες
  chosen: go
  alternatives:
  - go away
  - having gone
  lexicon: BDAG
  rationale: The participle is subordinate to the deliberative question and is naturally
    represented by the English infinitive-like auxiliary sense 'go and buy.' 'Having
    gone' is too stiff for good English here.
- source_word: ἀγοράσωμεν
  chosen: should we ... buy
  alternatives:
  - are we to buy
  - shall we buy
  lexicon: BDAG
  rationale: As a deliberative subjunctive in a question, 'should we ... buy' communicates
    the force clearly in modern English.
- source_word: δηναρίων διακοσίων
  chosen: for two hundred denarii
  alternatives:
  - with two hundred denarii
  - worth two hundred denarii
  lexicon: BDAG
  rationale: The genitive construction expresses price/cost. 'For two hundred denarii'
    is clear and direct. 'Worth' is possible but slightly more interpretive.
- source_word: ἄρτους
  chosen: bread
  alternatives:
  - loaves
  - loaves of bread
  lexicon: BDAG
  rationale: ἄρτος can mean bread or a loaf. Here 'bread' is idiomatic in English
    for purchased food, while a footnote preserves 'loaves' as a lexical alternative.
- source_word: δώσομεν αὐτοῖς φαγεῖν
  chosen: give it to them to eat
  alternatives:
  - give them something to eat
  - feed them
  lexicon: BDAG
  rationale: Keeps the verbal parallel with Jesus' command ('give') and avoids over-paraphrasing
    with 'feed them,' though that captures the sense.
