id: MRK.6.55
reference: Mark 6:55
source:
  edition: SBLGNT
  text: ⸂περιέδραμον ὅλην τὴν χώραν ἐκείνην καὶ⸃ ἤρξαντο ἐπὶ τοῖς κραβάττοις τοὺς
    κακῶς ἔχοντας περιφέρειν ὅπου ἤκουον ⸀ὅτι ἐστίν.
translation:
  text: They ran throughout that whole region and began carrying those who were sick
    on mats to wherever they heard he was.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on pallets' or 'on cots'; the Greek refers to simple portable bedding.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιέδραμον
  chosen: ran throughout
  alternatives:
  - ran around
  - hurried throughout
  lexicon: BDAG
  rationale: The compound verb conveys rapid movement over an area. 'Ran throughout'
    preserves both the urgency and the distributive sense across the region better
    than the flatter 'went around.'
- source_word: ὅλην τὴν χώραν ἐκείνην
  chosen: that whole region
  alternatives:
  - all that country
  - that entire area
  lexicon: BDAG
  rationale: χώρα here refers to the surrounding district/territory rather than a
    modern 'country.' 'That whole region' is natural English and preserves the demonstrative
    emphasis of ἐκείνην.
- source_word: ἤρξαντο ... περιφέρειν
  chosen: began carrying
  alternatives:
  - started bringing around
  - began to carry about
  lexicon: BDAG
  rationale: The ingressive ἤρξαντο with infinitive marks the onset of an action.
    'Began carrying' is concise and natural while retaining the aspectual force.
- source_word: ἐπὶ τοῖς κραβάττοις
  chosen: on mats
  alternatives:
  - on pallets
  - on cots
  lexicon: BDAG
  rationale: κράβαττος denotes a simple mat, pallet, or bedroll. 'Mats' is accessible
    modern English and fits the likely humble portable bedding in context.
- source_word: τοὺς κακῶς ἔχοντας
  chosen: those who were sick
  alternatives:
  - those who were ill
  - those who were unwell
  lexicon: BDAG
  rationale: The idiom literally means those who were 'badly' or 'poorly' and functions
    as a standard expression for being sick. 'Those who were sick' is the clearest
    idiomatic rendering.
- source_word: περιφέρειν
  chosen: carrying
  alternatives:
  - bringing around
  - transporting
  lexicon: BDAG
  rationale: In context the verb refers to moving the sick from place to place toward
    Jesus. 'Carrying' fits the use with mats and keeps the physical sense prominent.
- source_word: ὅπου ἤκουον ὅτι ἐστίν
  chosen: to wherever they heard he was
  alternatives:
  - wherever they heard that he was
  - to the place where they heard he was
  lexicon: BDAG
  rationale: ὅπου gives destination in context, and ὅτι introduces indirect report.
    The translation preserves the sense that people took the sick to any location
    where reports said Jesus was present.
