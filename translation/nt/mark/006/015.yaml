id: MRK.6.15
reference: Mark 6:15
source:
  edition: SBLGNT
  text: ἄλλοι ⸀δὲ ἔλεγον ὅτι Ἠλίας ἐστίν· ἄλλοι δὲ ἔλεγον ὅτι ⸀προφήτης ὡς εἷς τῶν
    προφητῶν.
translation:
  text: But others were saying, “He is Elijah,” and others were saying, “He is a prophet,
    like one of the prophets.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, less likely, “the Prophet,” if taken as a specific eschatological figure;
      the Greek more naturally reads “a prophet” here because it continues, “like
      one of the prophets.”
    reason: alternative_reading
lexical_decisions:
- source_word: ἄλλοι δὲ
  chosen: But others
  alternatives:
  - And others
  - Others
  lexicon: BDAG
  rationale: ἄλλοι marks a different group within the crowd response, and δέ signals
    mild contrast/continuation. 'But others' preserves the discourse shift naturally
    in English.
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated speech in the reports about
    Jesus' identity. 'Were saying' preserves that aspect without overtranslating.
- source_word: ὅτι Ἠλίας ἐστίν
  chosen: “He is Elijah,”
  alternatives:
  - that he is Elijah
  lexicon: BDAG
  rationale: Direct quotation is natural in English after a verb of speaking. Ἠλίας
    is the proper name Elijah, transliterated according to standard convention.
- source_word: προφήτης
  chosen: a prophet
  alternatives:
  - prophet
  lexicon: BDAG
  rationale: 'The anarthrous predicate nominative is indefinite in sense here: the
    claim is not that Jesus is ''the Prophet'' of a specific expected figure, but
    that he is a prophet. English requires the article ''a'' for naturalness.'
- source_word: ὡς εἷς τῶν προφητῶν
  chosen: like one of the prophets
  alternatives:
  - as one of the prophets
  - like one of the prophetic figures
  lexicon: BDAG
  rationale: ὡς here expresses comparison. 'Like one of the prophets' is the most
    straightforward rendering and preserves the sense that Jesus is being compared
    to the prophets of old.
