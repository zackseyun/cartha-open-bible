theological_decisions:
- issue: Whether προφήτης should be rendered as a generic 'a prophet' or as the eschatological
    title 'the Prophet'
  chosen_reading: a prophet
  alternative_readings:
  - the Prophet
  rationale: The Greek lacks the article and is immediately qualified by ὡς εἷς τῶν
    προφητῶν ('like one of the prophets'), which points to a generic prophetic identification
    rather than the specific Deuteronomic/eschatological title.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
