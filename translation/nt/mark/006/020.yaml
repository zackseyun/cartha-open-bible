theological_decisions:
- issue: Textual variant in the clause following Herod's hearing John
  chosen_reading: 'Follow the SBLGNT/critical text: ''he was greatly perplexed'' (ἠπόρει)'
  alternative_readings:
  - '''he did many things'' (ἐποίει)'
  rationale: The critical text reads ἠπόρει, which yields the sense that Herod was internally conflicted and puzzled by John, fitting the immediate context and preserving the tension with his glad hearing. Because the alternative reading is well known in the manuscript tradition and significantly affects meaning, it is preserved in a footnote.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
