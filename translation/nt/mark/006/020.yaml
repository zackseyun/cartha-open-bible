id: MRK.6.20
reference: Mark 6:20
source:
  edition: SBLGNT
  text: ὁ γὰρ Ἡρῴδης ἐφοβεῖτο τὸν Ἰωάννην, εἰδὼς αὐτὸν ἄνδρα δίκαιον καὶ ἅγιον, καὶ συνετήρει αὐτόν, καὶ ἀκούσας αὐτοῦ πολλὰ ⸀ἠπόρει, καὶ ἡδέως αὐτοῦ ἤκουεν.
translation:
  text: For Herod feared John[a], knowing that he was a righteous and holy man, and he kept him safe. And when he heard him, he was greatly perplexed, and yet he listened to him gladly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'he did many things' instead of 'he was greatly perplexed.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐφοβεῖτο
  chosen: feared
  alternatives:
  - was afraid of
  - respected
  lexicon: BDAG
  rationale: The imperfect middle indicates an ongoing attitude of fear toward John. 'Feared' preserves the direct force of φοβέομαι better than the softer 'respected,' while allowing the context to show this fear included regard for John's character.
- source_word: εἰδὼς
  chosen: knowing
  alternatives:
  - because he knew
  - recognizing
  lexicon: BDAG
  rationale: The participle gives the reason for Herod's fear/protective behavior. 'Knowing' is a natural and sufficiently formal rendering that preserves the causal sense without over-explicating it.
- source_word: ἄνδρα δίκαιον καὶ ἅγιον
  chosen: a righteous and holy man
  alternatives:
  - a just and holy man
  - a righteous and saintly man
  lexicon: BDAG
  rationale: δίκαιος is best rendered 'righteous' here, denoting moral uprightness; ἅγιος is 'holy,' denoting consecrated or godly character. 'Man' accurately reflects ἄνδρα.
- source_word: συνετήρει
  chosen: kept him safe
  alternatives:
  - protected him
  - kept him
  - preserved him
  lexicon: BDAG
  rationale: In context, the verb most naturally means that Herod protected John from harm, especially from Herodias. 'Kept him safe' communicates the protective nuance more clearly in modern English than the more ambiguous 'kept him.'
- source_word: ἀκούσας αὐτοῦ
  chosen: when he heard him
  alternatives:
  - when he heard him speak
  - after hearing him
  lexicon: BDAG
  rationale: The genitive after ἀκούω is idiomatic for hearing a person. 'When he heard him' is concise and natural, preserving the temporal force of the participle.
- source_word: πολλὰ ἠπόρει
  chosen: he was greatly perplexed
  alternatives:
  - he was much perplexed
  - he did many things
  lexicon: BDAG
  rationale: The SBLGNT reading ἠπόρει means Herod was at a loss or perplexed by what he heard. πολλὰ functions adverbially, intensifying the perplexity. This reading is preferred over the variant ἐποίει ('he did many things').
- source_word: ἡδέως αὐτοῦ ἤκουεν
  chosen: yet he listened to him gladly
  alternatives:
  - and he heard him gladly
  - and he enjoyed listening to him
  lexicon: BDAG
  rationale: ἡδέως conveys pleasure or willingness. 'Listened to him gladly' is idiomatic English and captures the paradox that Herod both was perplexed and still liked hearing John. 'Yet' brings out the contrast implicit in the clause sequence.
