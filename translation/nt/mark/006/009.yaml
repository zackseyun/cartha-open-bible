id: MRK.6.9
reference: Mark 6:9
source:
  edition: SBLGNT
  text: ἀλλὰ ὑποδεδεμένους σανδάλια, καὶ μὴ ⸀ἐνδύσησθε δύο χιτῶνας.
translation:
  text: but wear sandals[a], and do not put on two tunics.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not wear two tunics.' The Greek verb can be rendered either as the act of putting on or the state of wearing; the main text preserves the verbal action more closely.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - except
  lexicon: BDAG
  rationale: Marks contrast with the preceding travel instructions; 'but' is the most natural concise English adversative here.
- source_word: ὑποδεδεμένους
  chosen: wear
  alternatives:
  - having put on
  - being shod with
  lexicon: BDAG
  rationale: Perfect participle of ὑποδέομαι, functioning imperativally with the object 'sandals.' 'Wear' gives clear modern English while preserving the sense of being shod.
- source_word: σανδάλια
  chosen: sandals
  alternatives:
  - sandals footwear
  lexicon: BDAG
  rationale: Direct and standard rendering of the plural noun; no need for expansion beyond the plain sense.
- source_word: μὴ ἐνδύσησθε
  chosen: do not put on
  alternatives:
  - do not wear
  - do not dress yourselves in
  lexicon: BDAG
  rationale: Aorist middle subjunctive with μή in prohibition. 'Do not put on' preserves the verbal action of clothing oneself, matching the Greek more closely than the stative 'do not wear.'
- source_word: δύο
  chosen: two
  lexicon: BDAG
  rationale: Simple numeral; retained directly.
- source_word: χιτῶνας
  chosen: tunics
  alternatives:
  - garments
  - shirts
  - undergarments
  lexicon: BDAG
  rationale: χιτών refers to the basic inner garment/tunic worn next to the body. 'Tunics' is more precise than generic 'garments' and less anachronistic than 'shirts.'
