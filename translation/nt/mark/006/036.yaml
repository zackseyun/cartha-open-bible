id: MRK.6.36
reference: Mark 6:36
source:
  edition: SBLGNT
  text: ἀπόλυσον αὐτούς, ἵνα ἀπελθόντες εἰς τοὺς κύκλῳ ἀγροὺς καὶ κώμας ἀγοράσωσιν
    ἑαυτοῖς ⸂τί φάγωσιν⸃.
translation:
  text: Send them away, so that they may go into the surrounding countryside and villages
    and buy themselves something to eat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Dismiss them, so that, after going away into the surrounding
      farms and villages, they may buy for themselves what they may eat.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπόλυσον
  chosen: Send ... away
  alternatives:
  - Dismiss
  - Release
  lexicon: BDAG
  rationale: Aorist imperative of ἀπολύω here means to dismiss or send away the crowd.
    'Send them away' is natural modern English and preserves the directive force better
    than the more formal 'dismiss them.'
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' gives clear idiomatic English while
    preserving the purposive sense.
- source_word: ἀπελθόντες
  chosen: they may go
  alternatives:
  - having gone
  - after going away
  lexicon: BDAG
  rationale: Although formally an aorist participle ('having gone'), in English it
    is best absorbed into the purpose clause as 'they may go,' which conveys the sequence
    and intention without wooden style.
- source_word: τοὺς κύκλῳ ἀγροὺς καὶ κώμας
  chosen: the surrounding countryside and villages
  alternatives:
  - the surrounding farms and villages
  - the fields around and villages
  - the neighboring rural places and villages
  lexicon: BDAG
  rationale: κύκλῳ means 'around, surrounding.' ἀγροί can denote fields/farms/country
    places; in this context of nearby rural areas where food might be found, 'countryside'
    is the most natural collective rendering in English. κῶμαι are 'villages.'
- source_word: ἀγοράσωσιν
  chosen: buy
  alternatives:
  - purchase
  lexicon: BDAG
  rationale: Standard sense of acquiring by purchase. 'Buy' is clear, contemporary,
    and sufficiently formal.
- source_word: ἑαυτοῖς
  chosen: themselves
  alternatives:
  - for themselves
  lexicon: BDAG
  rationale: Reflexive dative indicates benefit for themselves. English can express
    this naturally as 'buy themselves something to eat'; this retains the reflexive
    nuance without awkwardness.
- source_word: τί φάγωσιν
  chosen: something to eat
  alternatives:
  - what they may eat
  - what to eat
  lexicon: BDAG
  rationale: The idiom asks for food to eat. 'Something to eat' is idiomatic English
    that accurately conveys the indefinite sense of τί in this context better than
    the stiffer 'what they may eat.'
