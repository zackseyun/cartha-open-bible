  chosen_reading: the king
  alternative_readings:
  - Herod the tetrarch
  - the ruler
  rationale: The translation follows Mark's narrative wording 'the king' rather than
    substituting a historically technical title. This preserves the source text and
    avoids importing external historical correction into the translation.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
