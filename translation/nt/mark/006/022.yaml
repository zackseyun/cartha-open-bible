id: MRK.6.22
reference: Mark 6:22
source:
  edition: SBLGNT
  text: καὶ εἰσελθούσης τῆς θυγατρὸς ⸂αὐτῆς τῆς⸃ Ἡρῳδιάδος καὶ ὀρχησαμένης ⸂καὶ ἀρεσάσης⸃
    τῷ Ἡρῴδῃ καὶ τοῖς συνανακειμένοις, ⸂εἶπεν ὁ βασιλεὺς⸃ τῷ κορασίῳ· Αἴτησόν με ὃ
    ἐὰν θέλῃς, καὶ δώσω σοι·
translation:
  text: And when Herodias's daughter came in and danced, and pleased Herod and those
    reclining at the table with him, the king said to the girl, “Ask me for whatever
    you want, and I will give it to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts/traditions are understood as 'his daughter Herodias' rather
      than 'Herodias's daughter.' The Greek text followed here reads 'Herodias's daughter.'
    reason: textual_variant
  - marker: b
    text: Or 'those dining with him'; the Greek refers to fellow banquet guests reclining
      at table.
    reason: cultural_note
lexical_decisions:
- source_word: εἰσελθούσης
  chosen: when ... came in
  alternatives:
  - after ... entered
  - as ... came in
  lexicon: BDAG
  rationale: Aorist participle in a genitive absolute is rendered temporally and naturally
    in English as 'when ... came in.' 'Came in' is more idiomatic than 'entered' here
    while preserving the movement into the banquet setting.
- source_word: τῆς θυγατρὸς αὐτῆς τῆς Ἡρῳδιάδος
  chosen: Herodias's daughter
  alternatives:
  - the daughter of Herodias herself
  - his daughter Herodias
  lexicon: BDAG
  rationale: The genitive construction most naturally identifies the girl as the daughter
    of Herodias. This avoids the less likely reading 'his daughter Herodias,' which
    is associated with a textual/interpretive variant reflected in some traditions.
    The possessive English form is concise and clear.
- source_word: ὀρχησαμένης
  chosen: danced
  alternatives:
  - having danced
  lexicon: BDAG
  rationale: Simple past 'danced' fits the participial sequence in smooth English
    and preserves the action without overformalizing it.
- source_word: ἀρεσάσης
  chosen: pleased
  alternatives:
  - delighted
  - satisfied
  lexicon: BDAG
  rationale: ἀρέσκω commonly means 'to please.' 'Pleased' is the most direct and least
    interpretively loaded rendering; 'delighted' would heighten the tone beyond the
    lexical warrant.
- source_word: τοῖς συνανακειμένοις
  chosen: those reclining at the table with him
  alternatives:
  - his dinner guests
  - those dining with him
  lexicon: BDAG
  rationale: The participle refers specifically to fellow diners reclining at table,
    a customary banquet posture. This rendering preserves the concrete image better
    than the more generalized 'guests,' while remaining readable.
- source_word: εἶπεν ὁ βασιλεὺς
  chosen: the king said
  alternatives:
  - King Herod said
  - the ruler said
  lexicon: BDAG
  rationale: βασιλεύς is literally 'king.' Although Herod Antipas was technically
    a tetrarch historically, Mark's text says 'king,' and the translation follows
    the source wording rather than harmonizing to historical precision.
- source_word: τῷ κορασίῳ
  chosen: to the girl
  alternatives:
  - to the young girl
  - to the maiden
  lexicon: BDAG
  rationale: κοράσιον denotes a girl/young girl. 'Girl' is natural modern English
    and sufficient here; 'maiden' is archaic, and 'young girl' adds emphasis not strictly
    required.
- source_word: Αἴτησόν με
  chosen: Ask me for
  alternatives:
  - Request from me
  - Ask of me
  lexicon: BDAG
  rationale: The aorist imperative of αἰτέω is naturally rendered 'Ask me for.' This
    preserves the sense of making a request without archaic phrasing.
- source_word: ὃ ἐὰν θέλῃς
  chosen: whatever you want
  alternatives:
  - whatever you wish
  - anything you desire
  lexicon: BDAG
  rationale: This construction expresses open-ended choice. 'Whatever you want' is
    idiomatic contemporary English and accurately conveys the force of the indefinite
    relative with ἐάν.
- source_word: δώσω σοι
  chosen: I will give it to you
  alternatives:
  - I will give to you
  - I shall give it to you
  lexicon: BDAG
  rationale: English requires an object for natural style in this context; 'it' is
    implied by the preceding 'whatever.' 'Will' is the normal future rendering.
