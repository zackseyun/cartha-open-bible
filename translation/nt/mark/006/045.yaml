id: MRK.6.45
reference: Mark 6:45
source:
  edition: SBLGNT
  text: Καὶ ⸀εὐθὺς ἠνάγκασεν τοὺς μαθητὰς αὐτοῦ ἐμβῆναι εἰς τὸ πλοῖον καὶ προάγειν
    ⸂εἰς τὸ πέραν⸃ πρὸς Βηθσαϊδάν, ἕως αὐτὸς ⸀ἀπολύει τὸν ὄχλον.
translation:
  text: And immediately he compelled his disciples to get into the boat and go ahead
    to the other side, toward Bethsaida, until he himself dismissed the crowd.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to Bethsaida.' The Greek preposition can be rendered more generally
      as direction ('toward') or more specifically as destination ('to').
    reason: lexical_alternative
  - marker: b
    text: Greek 'until he dismisses the crowd,' with a present-tense verb in a temporal
      clause; English idiom commonly renders it as past in this narrative context.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: Mark frequently uses εὐθύς for narrative urgency. 'Immediately' preserves
    that characteristic Markan tempo in clear modern English.
- source_word: ἠνάγκασεν
  chosen: compelled
  alternatives:
  - made
  - forced
  - urged strongly
  lexicon: BDAG
  rationale: ἀναγκάζω denotes causing someone to do something by strong pressure or
    necessity. 'Compelled' preserves the force better than the weaker 'made' or 'urged,'
    without overstating to physical coercion.
- source_word: μαθητὰς
  chosen: disciples
  alternatives:
  - followers
  lexicon: BDAG
  rationale: '''Disciples'' is the standard and contextually precise rendering for
    μαθηταί in the Gospels, preserving the teacher-disciple relationship.'
- source_word: ἐμβῆναι εἰς τὸ πλοῖον
  chosen: to get into the boat
  alternatives:
  - to embark in the boat
  - to board the boat
  lexicon: BDAG
  rationale: This infinitival phrase naturally means entering the boat. 'Get into
    the boat' is idiomatic modern English and sufficiently formal.
- source_word: προάγειν
  chosen: go ahead
  alternatives:
  - go on before
  - precede
  lexicon: BDAG
  rationale: προάγω here means to proceed in advance of someone else. 'Go ahead' captures
    the relational sense that the disciples are to leave before Jesus.
- source_word: εἰς τὸ πέραν
  chosen: to the other side
  alternatives:
  - across
  - to the far side
  lexicon: BDAG
  rationale: The idiom refers to crossing to the opposite side of the lake. 'To the
    other side' is the most natural and contextually specific English rendering.
- source_word: πρὸς Βηθσαϊδάν
  chosen: toward Bethsaida
  alternatives:
  - to Bethsaida
  - in the direction of Bethsaida
  lexicon: BDAG
  rationale: πρός with an accusative commonly indicates direction toward. 'Toward
    Bethsaida' preserves the directional nuance better than the more definite 'to
    Bethsaida,' which could imply arrival as the explicit endpoint.
- source_word: ἕως
  chosen: until
  alternatives:
  - while
  - up to the time when
  lexicon: BDAG
  rationale: ἕως marks the temporal limit of the disciples' going ahead relative to
    Jesus' action. 'Until' is the straightforward temporal rendering.
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic. 'He himself' preserves the emphasis
    that Jesus personally remained behind to deal with the crowd.
- source_word: ἀπολύει
  chosen: dismissed
  alternatives:
  - sent away
  - released
  lexicon: BDAG
  rationale: Although the form is present tense in the Greek, it functions naturally
    in this narrative-temporal construction after ἕως. English idiom prefers a past-tense
    rendering here. 'Dismissed' fits the context of sending the crowd away in an orderly
    manner.
- source_word: ὄχλον
  chosen: the crowd
  alternatives:
  - the multitude
  lexicon: BDAG
  rationale: ὄχλος in Gospel narrative is well rendered as 'crowd.' 'Multitude' is
    understandable but less natural in contemporary English.
