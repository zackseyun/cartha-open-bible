id: MRK.6.8
reference: Mark 6:8
source:
  edition: SBLGNT
  text: καὶ παρήγγειλεν αὐτοῖς ἵνα μηδὲν αἴρωσιν εἰς ὁδὸν εἰ μὴ ῥάβδον μόνον, μὴ ⸂ἄρτον,
    μὴ πήραν⸃, μὴ εἰς τὴν ζώνην χαλκόν,
translation:
  text: And he instructed them to take nothing for the journey except a staff only—no
    bread, no bag, no copper in their belt—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a traveler's bag' for provisions.
    reason: lexical_alternative
  - marker: b
    text: Literally 'copper'; that is, copper coins or money carried in the belt.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρήγγειλεν
  chosen: instructed
  alternatives:
  - commanded
  - ordered
  - charged
  lexicon: BDAG
  rationale: The verb denotes giving a directive or instruction. 'Instructed' fits
    readable modern English while preserving the authoritative force without sounding
    overly harsh. 'Commanded' is possible, but 'instructed' better suits the travel
    directions context.
- source_word: μηδὲν αἴρωσιν
  chosen: to take nothing
  alternatives:
  - to carry nothing
  - to pick up nothing
  lexicon: BDAG
  rationale: αἴρω can mean 'take up/carry.' In this context of travel provisions,
    'take nothing' is idiomatic English and accurately conveys the prohibition on
    bringing supplies.
- source_word: εἰς ὁδὸν
  chosen: for the journey
  alternatives:
  - for the road
  - on the way
  lexicon: BDAG
  rationale: The phrase is idiomatic for travel preparation. 'For the journey' is
    natural English and captures purpose better than the more literal but less idiomatic
    'for the road.'
- source_word: εἰ μὴ ῥάβδον μόνον
  chosen: except only a staff
  alternatives:
  - except a staff only
  - except only a walking stick
  lexicon: BDAG
  rationale: ῥάβδος here refers to a traveler's staff. 'Staff' is concise and traditional
    without being archaic. The placement 'except only a staff' preserves the emphatic
    μόνον.
- source_word: ἄρτον
  chosen: bread
  alternatives:
  - food
  - a loaf
  lexicon: BDAG
  rationale: The concrete noun 'bread' should be retained rather than generalized
    to 'food,' since the Greek specifies bread.
- source_word: πήραν
  chosen: bag
  alternatives:
  - traveler's bag
  - knapsack
  lexicon: BDAG
  rationale: πήρα denotes a bag used for provisions. 'Bag' is clear and modern; 'traveler's
    bag' is more explicit but less concise. A footnote preserves the more specific
    sense.
- source_word: ζώνην
  chosen: belt
  alternatives:
  - money belt
  - waist belt
  lexicon: BDAG
  rationale: ζώνη is the belt or waistband where money could be carried. 'Belt' is
    the simplest accurate rendering in English.
- source_word: χαλκόν
  chosen: copper
  alternatives:
  - money
  - copper coins
  - bronze
  lexicon: BDAG
  rationale: The noun literally means 'copper/bronze' and by extension copper coinage.
    Following original-language primacy, the main text keeps the literal 'copper'
    rather than flattening it to 'money'; the monetary sense is preserved in a footnote.
