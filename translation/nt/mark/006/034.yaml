id: MRK.6.34
reference: Mark 6:34
source:
  edition: SBLGNT
  text: καὶ ἐξελθὼν ⸀εἶδεν πολὺν ὄχλον, καὶ ἐσπλαγχνίσθη ἐπ’ ⸀αὐτοὺς ὅτι ἦσαν ὡς πρόβατα
    μὴ ἔχοντα ποιμένα, καὶ ἤρξατο διδάσκειν αὐτοὺς πολλά.
translation:
  text: And when he went ashore, he saw a large crowd, and he had compassion on them,
    because they were like sheep without a shepherd. And he began to teach them many
    things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he was moved with compassion for them.'
    reason: lexical_alternative
  - marker: b
    text: The image 'sheep without a shepherd' echoes biblical language for people
      lacking faithful leadership; compare Num 27:17; 1 Kgs 22:17; Ezek 34:5.
    reason: cross_reference
lexical_decisions:
- source_word: ἐξελθὼν
  chosen: when he went ashore
  alternatives:
  - when he came out
  - after he disembarked
  lexicon: BDAG
  rationale: Literally 'having gone out.' In Mark's narrative context of crossing
    by boat (6:32-33), the participle most naturally refers to going out from the
    boat onto land. 'Went ashore' makes the situational sense clear in natural English
    without over-paraphrasing.
- source_word: εἶδεν
  chosen: he saw
  alternatives:
  - he looked at
  lexicon: BDAG
  rationale: Aorist of ὁράω is straightforwardly rendered 'saw.' No stronger interpretive
    nuance is required here.
- source_word: πολὺν ὄχλον
  chosen: a large crowd
  alternatives:
  - a great crowd
  - a big crowd
  lexicon: BDAG
  rationale: ὄχλος is commonly 'crowd' in the Gospels; πολύν intensifies size. 'Large
    crowd' is idiomatic modern English and preserves the quantitative force.
- source_word: ἐσπλαγχνίσθη
  chosen: he had compassion
  alternatives:
  - he felt compassion
  - he was moved with compassion
  lexicon: BDAG
  rationale: The verb denotes deep compassion. 'Had compassion' is clear, natural,
    and faithful. 'Was moved with compassion' is traditional and vivid, but slightly
    more interpretive in English style; preserved as an alternative.
- source_word: ἐπ’ αὐτοὺς
  chosen: on them
  alternatives:
  - for them
  lexicon: BDAG
  rationale: With σπλαγχνίζομαι, ἐπί + accusative indicates the object of compassion.
    English idiom prefers 'compassion on them' or 'compassion for them'; the former
    keeps closer formal correspondence, while the latter is preserved as an alternative.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason for Jesus' compassion. 'Because' is the clearest
    modern rendering.
- source_word: ὡς πρόβατα μὴ ἔχοντα ποιμένα
  chosen: like sheep without a shepherd
  alternatives:
  - like sheep that had no shepherd
  lexicon: BDAG
  rationale: This simile is well established and transparent in English. The participial
    phrase μὴ ἔχοντα is naturally compressed to 'without' in English while preserving
    the image.
- source_word: ἤρξατο διδάσκειν
  chosen: he began to teach
  alternatives:
  - he started teaching
  lexicon: BDAG
  rationale: Standard ingressive construction. 'Began to teach' preserves the verbal
    aspect and is slightly more formal than 'started teaching.'
- source_word: αὐτοὺς πολλά
  chosen: them many things
  alternatives:
  - them at length
  - them much
  lexicon: BDAG
  rationale: πολλά here most naturally means many things, i.e., extensive content
    of teaching. 'At length' captures extent but loses the object-like force of πολλά;
    'many things' is more direct and transparent.
