theological_decisions:
- issue: Pastoral imagery of leaderless sheep
  chosen_reading: Retain the metaphor 'like sheep without a shepherd' without explicating
    its Old Testament background in the main text.
  alternative_readings:
  - Interpretively expand to 'like sheep without spiritual leadership'
  rationale: The phrase likely echoes biblical shepherd imagery for God's people and
    their leaders, but the translation should preserve the metaphor rather than resolve
    or expand its theological implications in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
