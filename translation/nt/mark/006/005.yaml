id: MRK.6.5
reference: Mark 6:5
source:
  edition: SBLGNT
  text: καὶ οὐκ ἐδύνατο ἐκεῖ ⸂ποιῆσαι οὐδεμίαν δύναμιν⸃, εἰ μὴ ὀλίγοις ἀρρώστοις ἐπιθεὶς
    τὰς χεῖρας ἐθεράπευσεν·
translation:
  text: And he was not able to do any mighty work there, except that he laid his hands
    on a few sick people and healed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'any miracle' or 'any work of power'; the Greek says 'any power,' a Markan
      expression for miraculous deeds.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδύνατο
  chosen: was not able
  alternatives:
  - could not
  lexicon: BDAG
  rationale: Renders the imperfect middle of δύναμαι with straightforward inability
    language. 'Was not able' is slightly more transparent to the Greek form than the
    contracted English 'could not,' while preserving the force of real inability stated
    by the text.
- source_word: ποιῆσαι
  chosen: to do
  alternatives:
  - to perform
  - to work
  lexicon: BDAG
  rationale: ποιέω is broad and commonly means 'do' or 'make.' Here it governs δύναμιν,
    so 'to do' keeps the idiom close to the Greek without overinterpreting.
- source_word: οὐδεμίαν δύναμιν
  chosen: any mighty work
  alternatives:
  - any miracle
  - any work of power
  - any deed of power
  lexicon: BDAG
  rationale: In Mark, δύναμις in this construction commonly refers to a miraculous
    work or act of power. 'Mighty work' preserves the lexical link to power while
    remaining natural English. 'Miracle' is possible but slightly more interpretive
    and less tied to the noun δύναμις itself.
- source_word: εἰ μὴ
  chosen: except that
  alternatives:
  - except
  - unless
  lexicon: BDAG
  rationale: Introduces the stated exception to the preceding negation. 'Except that'
    makes the syntax clear in English before the participial clause and main verb.
- source_word: ὀλίγοις
  chosen: a few
  alternatives:
  - a small number of
  lexicon: BDAG
  rationale: Simple quantitative adjective rendered idiomatically in English.
- source_word: ἀρρώστοις
  chosen: sick people
  alternatives:
  - the sick
  - the infirm
  lexicon: BDAG
  rationale: Refers to those who are ill or weak. 'Sick people' is natural modern
    English and avoids archaic tone.
- source_word: ἐπιθεὶς τὰς χεῖρας
  chosen: he laid his hands on
  alternatives:
  - placing his hands on
  - after laying hands on
  lexicon: BDAG
  rationale: The aorist participle plus object is a standard expression for laying
    on hands. The chosen rendering is idiomatic and preserves the physical action.
- source_word: ἐθεράπευσεν
  chosen: healed
  alternatives:
  - cured
  lexicon: BDAG
  rationale: θεραπεύω in healing contexts is best rendered 'heal.' This preserves
    both the medical and restorative sense without sounding clinical.
