theological_decisions:
- issue: Whether οὐκ ἐδύνατο should be softened to avoid implying limitation in Jesus
  chosen_reading: 'Retain the plain sense: ''he was not able to do any mighty work
    there'''
  alternative_readings:
  - he could do no mighty work there
  - he did not choose to do any mighty work there
  rationale: The Greek text explicitly states inability with δύναμαι under negation.
    The translation should preserve the textual tension rather than resolve it by
    importing a theological explanation. The following exception clause and the next
    verse provide narrative context, but this verse itself should not be paraphrased
    into mere unwillingness.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
