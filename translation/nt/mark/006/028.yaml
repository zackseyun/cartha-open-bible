id: MRK.6.28
reference: Mark 6:28
source:
  edition: SBLGNT
  text: καὶ ἤνεγκεν τὴν κεφαλὴν αὐτοῦ ἐπὶ πίνακι καὶ ἔδωκεν αὐτὴν τῷ κορασίῳ, καὶ τὸ κοράσιον ἔδωκεν αὐτὴν τῇ μητρὶ αὐτῆς.
translation:
  text: And he brought his head on a platter and gave it to the girl[a], and the girl gave it to her mother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on a tray' or 'on a dish.' The Greek πίναξ refers to a serving plate or platter.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤνεγκεν
  chosen: brought
  alternatives:
  - carried
  lexicon: BDAG
  rationale: Aorist of φέρω here denotes physically bringing the severed head into the banquet setting. 'Brought' is natural modern English and preserves the concrete action without over-specifying manner.
- source_word: κεφαλήν αὐτοῦ
  chosen: his head
  alternatives:
  - the head of him
  lexicon: BDAG
  rationale: Standard possessive rendering in English. The pronoun refers to John the Baptist from the prior context. 'His head' is idiomatic and faithful.
- source_word: ἐπὶ πίνακι
  chosen: on a platter
  alternatives:
  - on a tray
  - on a dish
  lexicon: BDAG
  rationale: πίναξ can denote a platter, dish, or tray used for serving food. 'Platter' best matches the banquet context and common English usage in this narrative.
- source_word: ἔδωκεν
  chosen: gave
  alternatives:
  - handed
  lexicon: BDAG
  rationale: δίδωμι is straightforwardly 'give.' 'Gave' preserves the repeated verb in both clauses, reflecting the Greek's narrative repetition.
- source_word: τῷ κορασίῳ / τὸ κοράσιον
  chosen: the girl
  alternatives:
  - the young girl
  - the maiden
  lexicon: BDAG
  rationale: κοράσιον denotes a girl, often a young girl. 'The girl' is clear, natural, and avoids archaic 'maiden.' Adding 'young' is possible but not necessary in English since 'girl' already conveys youth.
- source_word: τῇ μητρὶ αὐτῆς
  chosen: to her mother
  alternatives:
  - to the mother of her
  lexicon: BDAG
  rationale: Idiomatic English dative plus possessive rendering. It clearly preserves the chain of transfer in the narrative.
