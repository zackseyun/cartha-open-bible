id: MRK.13.33
reference: Mark 13:33
source:
  edition: SBLGNT
  text: βλέπετε ⸀ἀγρυπνεῖτε, οὐκ οἴδατε γὰρ πότε ὁ καιρός ἐστιν·
translation:
  text: Be on guard; stay awake, for you do not know when the time is.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the appointed time' or 'the season.' The Greek καιρός often refers to
      a decisive or appointed time.
    reason: lexical_alternative
lexical_decisions:
- source_word: βλέπετε
  chosen: Be on guard
  alternatives:
  - Watch
  - Take heed
  - See to it
  lexicon: BDAG
  rationale: Imperative plural from βλέπω used idiomatically as a warning to be alert/careful,
    not merely to see visually. 'Be on guard' captures the vigilance sense in natural
    English and distinguishes it from the following ἀγρυπνεῖτε.
- source_word: ἀγρυπνεῖτε
  chosen: stay awake
  alternatives:
  - keep awake
  - be watchful
  lexicon: BDAG
  rationale: Imperative plural meaning to remain awake or vigilant. 'Stay awake' is
    clear modern English and preserves the metaphor of wakefulness, while complementing
    rather than duplicating βλέπετε.
- source_word: οὐκ οἴδατε
  chosen: you do not know
  alternatives:
  - you do not know for certain
  lexicon: BDAG
  rationale: Straightforward negated verb of knowing in the indicative; no expansion
    beyond the Greek is warranted.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the reason for the preceding commands. 'For' is concise and
    natural here.
- source_word: πότε
  chosen: when
  alternatives:
  - at what time
  lexicon: BDAG
  rationale: Interrogative adverb referring to time. 'When' is the most natural English
    equivalent in this clause.
- source_word: ὁ καιρός
  chosen: the time
  alternatives:
  - the appointed time
  - the season
  lexicon: BDAG
  rationale: καιρός often denotes a decisive or appointed time rather than time in
    general. 'The time' is sufficiently natural and contextually weighty; 'appointed
    time' is possible but slightly more interpretive than necessary in the main text.
- source_word: ἐστιν
  chosen: is
  lexicon: BDAG
  rationale: Simple copula completing the clause; retained directly in English.
