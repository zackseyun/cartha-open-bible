theological_decisions:
- issue: Nuance of καιρός in eschatological context
  chosen_reading: the time
  alternative_readings:
  - the appointed time
  - the season
  rationale: In Jesus' eschatological discourse, καιρός can imply a decisive or appointed
    moment. The main text keeps the broader 'the time' to avoid over-specifying beyond
    the Greek, while preserving more explicit alternatives in a footnote.
