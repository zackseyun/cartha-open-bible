theological_decisions:
- issue: Meaning of 'the powers in the heavens'
  chosen_reading: Rendered generically as 'the powers in the heavens' without specifying whether these are angelic beings, celestial bodies, or cosmic structures.
  alternative_readings:
  - the heavenly powers (angelic beings)
  - the powers of the heavens (cosmic forces/structures)
  rationale: The Greek phrase is semantically broad and the context is apocalyptic. Preserving the ambiguity follows the translation philosophy of not resolving tensions the text itself leaves open.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
