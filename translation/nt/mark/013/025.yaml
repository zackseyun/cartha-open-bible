id: MRK.13.25
reference: Mark 13:25
source:
  edition: SBLGNT
  text: καὶ οἱ ἀστέρες ⸂ἔσονται ἐκ τοῦ οὐρανοῦ πίπτοντες⸃, καὶ αἱ δυνάμεις αἱ ἐν τοῖς οὐρανοῖς σαλευθήσονται.
translation:
  text: And the stars will be falling from heaven[b][a], and the powers in the heavens will be shaken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the sky.' The Greek οὐρανός can mean either 'heaven' or 'sky' depending on context.
    reason: lexical_alternative
  - marker: b
    text: '''The powers in the heavens'' may refer to heavenly powers, cosmic forces, or the structures of the heavens; the Greek is not more specific.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀστέρες
  chosen: stars
  lexicon: BDAG
  rationale: Standard lexical sense; no contextual reason to depart from the ordinary astronomical/cosmic reference in this apocalyptic discourse.
- source_word: ἔσονται ... πίπτοντες
  chosen: will be falling
  alternatives:
  - will fall
  - will be those falling
  lexicon: BDAG
  rationale: 'The future of εἰμί with present participle πίπτοντες is most naturally rendered as a future periphrastic, conveying ongoing or vivid future action: ''will be falling.'' ''Will fall'' is possible but flattens the participial aspect.'
- source_word: ἐκ τοῦ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - out of the sky
  - from the sky
  lexicon: BDAG
  rationale: οὐρανός can mean 'heaven' or 'sky.' Here 'from heaven' preserves the elevated cosmic register of the passage and aligns with the apocalyptic context. 'Sky' is a viable lexical alternative but sounds more mundane in English.
- source_word: δυνάμεις
  chosen: powers
  alternatives:
  - mighty powers
  - hosts
  - forces
  lexicon: BDAG
  rationale: δύναμις in the plural can denote powers/forces, including heavenly powers in apocalyptic contexts. 'Powers' preserves the ambiguity between celestial bodies, cosmic forces, and heavenly beings without over-interpreting.
- source_word: αἱ ἐν τοῖς οὐρανοῖς
  chosen: in the heavens
  alternatives:
  - in heaven
  - in the skies
  lexicon: BDAG
  rationale: The plural τοῖς οὐρανοῖς is retained as 'the heavens' to reflect the Greek form and the cosmic scope of the saying. Singular 'in heaven' is smoother but less formally precise.
- source_word: σαλευθήσονται
  chosen: will be shaken
  alternatives:
  - will be disturbed
  - will be set in motion
  lexicon: BDAG
  rationale: The future passive of σαλεύω commonly means 'to be shaken.' This is the most direct and idiomatic rendering in an eschatological context.
