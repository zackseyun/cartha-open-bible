theological_decisions:
- issue: Apocalyptic metaphor in ἀρχὴ ὠδίνων
  chosen_reading: These events are the beginning of birth pains, indicating preliminary distress rather than the end itself.
  alternative_readings:
  - These are merely troubles
  - These are the beginning of labor pains in a more specifically eschatological sense
  rationale: The phrase should preserve the metaphorical tension of suffering that precedes what is to come without importing a full eschatological system beyond the text. 'Birth pains' keeps the image and avoids flattening it into generic hardship.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
