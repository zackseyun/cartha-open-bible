id: MRK.13.8
reference: Mark 13:8
source:
  edition: SBLGNT
  text: ἐγερθήσεται γὰρ ἔθνος ἐπ’ ἔθνος καὶ βασιλεία ἐπὶ βασιλείαν, ⸀ἔσονται σεισμοὶ κατὰ τόπους, ⸁ἔσονται ⸀λιμοί· ⸀ἀρχὴ ὠδίνων ταῦτα.
translation:
  text: For nation will rise against nation[a], and kingdom against kingdom. There will be earthquakes in various places; there will be famines. These are the beginning of birth pains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'labor pains' or 'birth pangs.' The Greek image is of the pains associated with childbirth, used metaphorically for sufferings that precede what follows.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγερθήσεται
  chosen: will rise
  alternatives:
  - will be raised up
  lexicon: BDAG
  rationale: Future passive of ἐγείρω is idiomatically used for the outbreak or rising of one group against another. 'Will rise' is natural English and preserves the conflict sense without over-literal passivity.
- source_word: ἔθνος ... ἐπ’ ἔθνος
  chosen: nation ... against nation
  alternatives:
  - people ... against people
  - ethnic group ... against ethnic group
  lexicon: BDAG
  rationale: ἔθνος can denote nation, people, or Gentile group. In this apocalyptic conflict context paired with βασιλεία, 'nation' best matches the geopolitical sense and the established idiom 'nation against nation.'
- source_word: βασιλεία ... ἐπὶ βασιλείαν
  chosen: kingdom ... against kingdom
  alternatives:
  - realm ... against realm
  lexicon: BDAG
  rationale: βασιλεία here refers to a political domain or kingdom, not abstract kingship. 'Kingdom against kingdom' preserves the parallelism with 'nation against nation.'
- source_word: σεισμοὶ
  chosen: earthquakes
  alternatives:
  - quakes
  lexicon: BDAG
  rationale: σεισμός commonly denotes an earthquake in this context. 'Earthquakes' is the clear and standard rendering.
- source_word: κατὰ τόπους
  chosen: in various places
  alternatives:
  - from place to place
  - in different places
  - in places
  lexicon: BDAG
  rationale: The distributive κατά with plural τόπους indicates occurrence in multiple locations. 'In various places' is idiomatic and preserves the distributive force.
- source_word: λιμοί
  chosen: famines
  alternatives:
  - food shortages
  lexicon: BDAG
  rationale: λιμός denotes famine rather than mere hunger. 'Famines' is the direct and sufficiently clear rendering.
- source_word: ἀρχὴ
  chosen: the beginning
  alternatives:
  - a beginning
  - the start
  lexicon: BDAG
  rationale: 'Anarthrous ἀρχή in predicate position is naturally rendered idiomatically in English with the definite article here: ''the beginning.'' This fits the sense that these events mark the onset, not the totality, of what follows.'
- source_word: ὠδίνων
  chosen: of birth pains
  alternatives:
  - of labor pains
  - of birth pangs
  lexicon: BDAG
  rationale: ὠδίν refers to the pains of childbirth/labor and is a common apocalyptic metaphor for intense suffering preceding a new stage. 'Birth pains' is accessible, vivid, and preserves the metaphor without archaic wording.
- source_word: ταῦτα
  chosen: These are
  alternatives:
  - This is
  - These things are
  lexicon: BDAG
  rationale: Neuter plural demonstrative regularly takes a singular verb notionally, but in English 'These are' best matches the plural referent and reads naturally.
