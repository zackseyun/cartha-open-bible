id: MRK.13.4
reference: Mark 13:4
source:
  edition: SBLGNT
  text: Εἰπὸν ἡμῖν πότε ταῦτα ἔσται, καὶ τί τὸ σημεῖον ὅταν μέλλῃ ⸂ταῦτα συντελεῖσθαι
    πάντα⸃.
translation:
  text: Tell us, when will these things be, and what will be the sign when all these
    things are about to be accomplished?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when all these things will be accomplished.' The Greek uses μέλλῃ with
      an infinitive, which can more specifically mean 'is about to.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰπὸν
  chosen: Tell
  alternatives:
  - Say
  lexicon: BDAG
  rationale: Aorist imperative of λέγω addressed to Jesus. 'Tell' is more natural
    in direct English address with an indirect object ('us') than the more wooden
    'say to us,' while preserving the force of the command/request.
- source_word: ἡμῖν
  chosen: us
  lexicon: BDAG
  rationale: Dative pronoun functioning as the indirect object of the imperative.
- source_word: πότε
  chosen: when
  alternatives:
  - at what time
  lexicon: BDAG
  rationale: Standard temporal interrogative; 'when' is the natural English equivalent.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Neuter plural demonstrative referring back to the predicted events. 'These
    things' preserves the plural form and discourse linkage.
- source_word: ἔσται
  chosen: will be
  alternatives:
  - will happen
  - will take place
  lexicon: BDAG
  rationale: Future middle of εἰμί. In this construction, 'will be' is sufficiently
    idiomatic and stays close to the Greek; 'will happen' is possible but slightly
    more interpretive.
- source_word: σημεῖον
  chosen: sign
  alternatives:
  - token
  - indicator
  lexicon: BDAG
  rationale: '''Sign'' is the standard and contextually appropriate rendering for
    σημεῖον in eschatological discourse.'
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Introduces a temporal clause with contingency. In this context 'when'
    is the most natural English rendering.
- source_word: μέλλῃ
  chosen: are about to
  alternatives:
  - are going to
  - are destined to
  - are soon to
  lexicon: BDAG
  rationale: μέλλω with infinitive commonly conveys imminence or impending action.
    'Are about to' best captures that prospective sense in readable English.
- source_word: συντελεῖσθαι
  chosen: be accomplished
  alternatives:
  - be completed
  - be brought to an end
  - be fulfilled
  lexicon: BDAG
  rationale: Passive infinitive of συντελέω. In context it refers to events reaching
    their consummation/completion. 'Be accomplished' preserves the passive/resultative
    sense without over-specifying eschatological nuance. 'Be fulfilled' could suggest
    prophecy fulfillment more explicitly than the verb itself requires.
- source_word: πάντα
  chosen: all
  alternatives:
  - altogether
  lexicon: BDAG
  rationale: Placed with ταῦτα to mean 'all these things.' English idiom front-loads
    'all' before 'these things'.
- source_word: καὶ τί τὸ σημεῖον
  chosen: and what will be the sign
  alternatives:
  - and what is the sign
  lexicon: BDAG
  rationale: Although no explicit future verb appears in this clause, English commonly
    supplies 'will be' from the preceding/following context for smoothness and clarity.
    This reflects the disciples' second question parallel to 'when will these things
    be?'.
