theological_decisions:
- issue: Eschatological force of μέλλῃ + infinitive
  chosen_reading: Retain the prospective/imminent nuance with 'are about to be accomplished'
    rather than flattening to simple future.
  alternative_readings:
  - when all these things will be accomplished
  - when all these things begin to happen
  rationale: The Greek explicitly uses μέλλω, which adds a sense of impending action.
    Preserving that nuance is a lexical and interpretive choice, but it does not force
    a broader doctrinal conclusion about end-times chronology beyond what the text
    itself states.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
