theological_decisions:
- issue: Apocalyptic title and imagery
  chosen_reading: Retain 'the Son of Man' and the cloud-coming imagery without interpretive
    expansion.
  alternative_readings:
  - Render the title more dynamically as 'the Human One'
  - Explicitly paraphrase the Daniel 7 allusion
  rationale: The verse strongly evokes Daniel 7:13, but the translation should preserve
    the allusion rather than explain it in the main text. Retaining the traditional
    title also avoids collapsing the text into a merely generic statement about humanity
    and preserves christological and eschatological tension present in the Greek.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
