id: MRK.13.26
reference: Mark 13:26
source:
  edition: SBLGNT
  text: καὶ τότε ὄψονται τὸν υἱὸν τοῦ ἀνθρώπου ἐρχόμενον ἐν νεφέλαις μετὰ δυνάμεως
    πολλῆς καὶ δόξης·
translation:
  text: And then they will see the Son of Man coming in clouds with great power and
    glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'coming with the clouds.' The Greek says 'in clouds,' but the alternative
      brings out the likely echo of Daniel 7:13.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὄψονται
  chosen: they will see
  alternatives:
  - they will behold
  lexicon: BDAG
  rationale: Future middle indicative of ὁράω, here functioning with straightforward
    future sense. 'They will see' is natural modern English and preserves the public,
    visible character of the event without adding interpretive nuance.
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - the Human One
  lexicon: BDAG
  rationale: This is the established and most transparent rendering of the Greek title,
    preserving both its idiomatic force and its intertextual resonance with Daniel
    7. 'The Human One' is possible but weakens the recognized titular and apocalyptic
    background.
- source_word: ἐρχόμενον
  chosen: coming
  alternatives:
  - arriving
  lexicon: BDAG
  rationale: Present participle modifying 'the Son of Man.' 'Coming' preserves the
    verbal aspect and traditional apocalyptic diction better than 'arriving,' which
    sounds too mundane and punctual.
- source_word: ἐν νεφέλαις
  chosen: in clouds
  alternatives:
  - with the clouds
  - in the clouds
  lexicon: BDAG
  rationale: The preposition ἐν most directly means 'in.' The plural anarthrous νεφέλαις
    is naturally rendered 'clouds.' 'In clouds' is slightly more literal than the
    traditional 'in the clouds' and avoids introducing the article absent in Greek;
    'with the clouds' is possible idiomatically and echoes Danielic imagery, so it
    is preserved in a footnote.
- source_word: μετὰ δυνάμεως πολλῆς
  chosen: with great power
  alternatives:
  - with much power
  lexicon: BDAG
  rationale: μετά with the genitive indicates accompaniment. 'Great power' is idiomatic
    English for δύναμις πολλή and conveys magnitude more naturally than 'much power.'
- source_word: καὶ δόξης
  chosen: and glory
  alternatives:
  - and splendor
  lexicon: BDAG
  rationale: δόξα in this context carries its standard biblical sense of manifested
    majesty. 'Glory' is the most theologically and intertextually appropriate rendering;
    'splendor' is a possible explanatory alternative but is less consistent with biblical
    usage.
