id: MRK.13.21
reference: Mark 13:21
source:
  edition: SBLGNT
  text: ⸀καὶ τότε ἐάν τις ὑμῖν εἴπῃ· ⸀Ἴδε ὧδε ὁ ⸀χριστός, ⸁Ἴδε ἐκεῖ, μὴ πιστεύετε·
translation:
  text: And then, if anyone says to you, ‘Look, here is the Messiah!’ or, ‘Look, there!’
    do not believe it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the Christ.”
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ τότε
  chosen: And then
  alternatives:
  - Then
  - And at that time
  lexicon: BDAG
  rationale: The combination links this warning to the preceding discourse and marks
    a subsequent point in time. 'And then' preserves both the connective καὶ and the
    temporal τότε in natural English.
- source_word: ἐάν τις ὑμῖν εἴπῃ
  chosen: if anyone says to you
  alternatives:
  - if someone says to you
  - if anyone should say to you
  lexicon: BDAG
  rationale: This is a general conditional construction. 'Anyone' captures the indefinite
    τις, and 'says to you' is the most natural rendering of εἴπῃ with ὑμῖν. The more
    formal 'should say' is possible but less natural in contemporary English.
- source_word: Ἴδε
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Ἴδε is an attention-getting particle/interjection. 'Look' is clear, modern,
    and forceful without sounding archaic like 'Behold.'
- source_word: ὧδε
  chosen: here
  alternatives:
  - in this place
  - here!
  lexicon: BDAG
  rationale: ὧδε is a proximal adverb meaning 'here' or 'in this place.' 'Here' is
    the direct and idiomatic equivalent.
- source_word: ὁ χριστός
  chosen: the Messiah
  alternatives:
  - the Christ
  - Christ
  lexicon: BDAG
  rationale: 'Per doctrine, Χριστός is rendered ''Messiah'' where it functions as
    a title rather than a name-like designation. Here the article and context of eschatological
    claimants clearly indicate the title sense: someone claiming to be the anointed
    deliverer.'
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - over there
  lexicon: BDAG
  rationale: ἐκεῖ is the distal counterpart to ὧδε. 'There' preserves the contrast
    succinctly.
- source_word: μὴ πιστεύετε
  chosen: do not believe it
  alternatives:
  - do not believe him
  - do not believe
  - do not trust it
  lexicon: BDAG
  rationale: πιστεύετε here means to believe the claim being made. English idiom typically
    supplies an object, and 'it' best captures the warning against accepting the report
    itself. 'Believe him' would narrow the object to the speaker rather than the message,
    while the Greek leaves the object implicit.
