theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  - the Christ
  rationale: The term is used as a title in a context of false eschatological claims,
    not as a quasi-name for Jesus. Following the doctrine's contested-terms guidance,
    'Messiah' best preserves the Hebraic and titular force. An alternative is preserved
    in a footnote for readers familiar with traditional English renderings.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Messiah (where title;
    Christ where name-like)'
