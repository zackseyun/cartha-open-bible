id: MRK.13.27
reference: Mark 13:27
source:
  edition: SBLGNT
  text: καὶ τότε ἀποστελεῖ τοὺς ⸀ἀγγέλους καὶ ἐπισυνάξει τοὺς ⸀ἐκλεκτοὺς ἐκ τῶν τεσσάρων
    ἀνέμων ἀπ’ ἄκρου γῆς ἕως ἄκρου οὐρανοῦ.
translation:
  text: And then he will send out the angels and gather the chosen ones from the four
    winds, from the end of the earth to the end of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the elect.'
    reason: lexical_alternative
  - marker: b
    text: '''From the four winds'' is an idiom meaning from every direction.'
    reason: cultural_note
  - marker: c
    text: Some translations render the final phrase more interpretively as 'from the
      farthest end of the earth to the farthest end of heaven' or 'from one end of
      heaven to the other.'
    reason: alternative_reading
lexical_decisions:
- source_word: τότε
  chosen: then
  alternatives:
  - at that time
  lexicon: BDAG
  rationale: Temporal adverb marking sequence in the eschatological discourse; 'then'
    is natural and sufficiently precise in English.
- source_word: ἀποστελεῖ
  chosen: he will send out
  alternatives:
  - he will send
  - he will dispatch
  lexicon: BDAG
  rationale: Future active indicative; 'send out' captures the force of ἀποστέλλω
    in context of commissioning agents, slightly fuller than bare 'send' without becoming
    overly formal.
- source_word: ἀγγέλους
  chosen: the angels
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: In this apocalyptic context, supernatural beings are clearly intended
    rather than human messengers, so 'angels' is the best rendering.
- source_word: ἐπισυνάξει
  chosen: gather
  alternatives:
  - gather together
  - bring together
  lexicon: BDAG
  rationale: Future active indicative of ἐπισυνάγω; 'gather' is idiomatic and preserves
    the central sense. 'Gather together' is possible but redundant in English.
- source_word: ἐκλεκτούς
  chosen: chosen ones
  alternatives:
  - elect
  lexicon: BDAG
  rationale: The adjective used substantivally refers to those chosen by God. 'Chosen
    ones' preserves meaning in readable modern English, while 'elect' remains a viable
    traditional alternative but is less transparent for contemporary readers and can
    import later theological systematization.
- source_word: ἐκ τῶν τεσσάρων ἀνέμων
  chosen: from the four winds
  alternatives:
  - from the four directions
  lexicon: BDAG
  rationale: This is a standard idiom for the whole compass of the earth. 'Four winds'
    preserves the imagery of the Greek and biblical idiom better than the interpretive
    'four directions'.
- source_word: ἀπ’ ἄκρου γῆς
  chosen: from the end of the earth
  alternatives:
  - from the farthest end of the earth
  - from earth's end
  lexicon: BDAG
  rationale: ἄκρον here denotes extremity or farthest point. 'End of the earth' is
    a natural English equivalent and preserves the meristic imagery.
- source_word: ἕως ἄκρου οὐρανοῦ
  chosen: to the end of heaven
  alternatives:
  - to the farthest end of heaven
  - to the end of the sky
  lexicon: BDAG
  rationale: Parallel to the previous phrase, expressing totality by merism. 'Heaven'
    is preferable to 'sky' in this apocalyptic setting, though the phrase is spatial
    rather than a doctrinal statement about heaven as God's dwelling.
- source_word: καὶ τότε ... καὶ
  chosen: And then ... and
  alternatives:
  - Then ... and
  lexicon: BDAG
  rationale: The repeated καί is retained to preserve the narrative flow and coordination
    of actions. Initial 'And' is acceptable English and reflects Mark's connective
    style.
