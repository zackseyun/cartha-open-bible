theological_decisions:
- issue: Rendering of ἐκλεκτούς in an eschatological context
  chosen_reading: chosen ones
  alternative_readings:
  - elect
  rationale: The term denotes those chosen by God, but the translation avoids making
    the verse sound like a technical statement for one later doctrinal system. 'Chosen
    ones' preserves the theological content while remaining transparent and readable.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
- issue: Scope of the gathering imagery
  chosen_reading: from the four winds, from the end of the earth to the end of heaven
  alternative_readings:
  - from the four corners of the earth
  - from one end of heaven to the other
  rationale: The Greek combines idiomatic cosmic-direction language with a merism
    of total extent. The chosen rendering stays close to the source wording without
    collapsing the imagery into a smoother but less exact traditional paraphrase.
  doctrine_reference: Original-language primacy over translation tradition.
