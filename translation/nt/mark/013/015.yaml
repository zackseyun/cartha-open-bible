id: MRK.13.15
reference: Mark 13:15
source:
  edition: SBLGNT
  text: ⸀ὁ ἐπὶ τοῦ δώματος μὴ ⸀καταβάτω μηδὲ εἰσελθάτω ⸂τι ἆραι⸃ ἐκ τῆς οἰκίας αὐτοῦ,
translation:
  text: Let the one on the housetop not go down, nor enter to take anything out of
    his house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one on the roof.' The Greek refers to the flat roof area of a house,
      often used as living space.
    reason: cultural_note
lexical_decisions:
- source_word: ὁ ἐπὶ τοῦ δώματος
  chosen: the one on the housetop
  alternatives:
  - the one on the roof
  - whoever is on the housetop
  lexicon: BDAG
  rationale: The articular phrase functions substantivally, referring to a person
    in that location. 'Housetop' preserves the cultural sense of a flat roof used
    as living space better than a generic 'roof,' while remaining natural English.
- source_word: δώματος
  chosen: housetop
  alternatives:
  - roof
  lexicon: BDAG
  rationale: In this Judean setting the roof was typically flat and accessible, so
    'housetop' better conveys the architectural and narrative setting than simply
    'roof'.
- source_word: μὴ καταβάτω
  chosen: not go down
  alternatives:
  - must not come down
  - should not descend
  lexicon: BDAG
  rationale: A third-person imperative of prohibition is naturally rendered in English
    with 'let ... not' plus a simple verb. 'Go down' is idiomatic and fits movement
    from roof to lower level or street.
- source_word: μηδὲ εἰσελθάτω
  chosen: nor enter
  alternatives:
  - nor go in
  - and not enter
  lexicon: BDAG
  rationale: μηδέ coordinates a second prohibition. 'Enter' is concise and preserves
    the formal force of εἰσέρχομαι without over-specifying the destination beyond
    what follows.
- source_word: τι ἆραι
  chosen: to take anything
  alternatives:
  - to take something
  - to carry off anything
  lexicon: BDAG
  rationale: 'The indefinite pronoun with infinitive expresses purpose: entering in
    order to take any item. ''Anything'' best reflects the broad, urgent prohibition.'
- source_word: ἐκ τῆς οἰκίας αὐτοῦ
  chosen: out of his house
  alternatives:
  - from his house
  lexicon: BDAG
  rationale: ἐκ is most naturally 'out of' here, emphasizing removal from inside the
    house. The masculine singular pronoun reflects the grammatically masculine representative
    singular; 'his house' preserves the source form in keeping with the gender-accurate
    policy.
