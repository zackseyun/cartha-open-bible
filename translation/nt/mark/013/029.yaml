id: MRK.13.29
reference: Mark 13:29
source:
  edition: SBLGNT
  text: οὕτως καὶ ὑμεῖς, ὅταν ⸂ἴδητε ταῦτα⸃ γινόμενα, γινώσκετε ὅτι ἐγγύς ἐστιν ἐπὶ
    θύραις.
translation:
  text: So also you, when you see these things happening, know that it is near, at
    the doors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he is near.' The Greek does not state the subject explicitly.
    reason: alternative_reading
lexical_decisions:
- source_word: οὕτως καὶ ὑμεῖς
  chosen: So also you
  alternatives:
  - So you also
  - In the same way, you
  lexicon: BDAG
  rationale: οὕτως links this saying to the preceding fig-tree analogy ('in this way/so'),
    and καὶ ὑμεῖς adds emphasis to the disciples as the corresponding observers. 'So
    also you' preserves the discourse connection and the emphatic subject without
    sounding overly wooden.
- source_word: ὅταν ἴδητε
  chosen: when you see
  alternatives:
  - whenever you see
  lexicon: BDAG
  rationale: ὅταν with the aorist subjunctive expresses a future contingency, naturally
    rendered 'when' here in English. 'Whenever' is possible but less idiomatic in
    this specific predictive context.
- source_word: ταῦτα γινόμενα
  chosen: these things happening
  alternatives:
  - these things taking place
  - this happening
  lexicon: BDAG
  rationale: The plural demonstrative ταῦτα is best preserved as 'these things.' γινόμενα
    denotes events coming to pass or happening. 'Happening' is clear modern English;
    'taking place' is slightly more formal and remains a viable alternative.
- source_word: γινώσκετε
  chosen: know
  alternatives:
  - recognize
  - be aware
  lexicon: BDAG
  rationale: The present imperative calls for the disciples to draw the proper conclusion
    from the signs. 'Know' is the most direct rendering and fits the inferential force
    in context.
- source_word: ὅτι ἐγγύς ἐστιν
  chosen: that it is near
  alternatives:
  - that he is near
  lexicon: BDAG
  rationale: The Greek has no explicit subject with ἐστιν. English requires one, so
    'it' is supplied to refer generally to the impending event/fulfillment indicated
    by the signs. Because the antecedent is implicit and interpreters differ whether
    the sense is the event, the kingdom, or the Son of Man, the alternative 'he is
    near' is preserved in a footnote rather than forced into the main text.
- source_word: ἐπὶ θύραις
  chosen: at the doors
  alternatives:
  - at the door
  - right at the doors
  lexicon: BDAG
  rationale: The plural θύραις is retained as 'doors,' matching the Greek form and
    the idiom of extreme nearness. English tradition often has 'at the door,' but
    the plural is well attested in the text and should be reflected unless idiom absolutely
    forbids it, which it does not here.
