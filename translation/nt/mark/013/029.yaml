theological_decisions:
- issue: Implicit subject of ἐστιν ('is near')
  chosen_reading: Render the clause impersonally as 'it is near' in the main text.
  alternative_readings:
  - Render personally as 'he is near'
  rationale: The Greek leaves the subject unstated. In the immediate context, the
    signs point to the nearness of the foretold culmination, and an impersonal rendering
    avoids importing a more specific referent than the text explicitly supplies. Because
    many interpreters connect the phrase to the Son of Man, that alternative is preserved
    in a footnote rather than excluded.
  doctrine_reference: Preserve theological tension rather than resolve it.
