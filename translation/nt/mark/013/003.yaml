id: MRK.13.3
reference: Mark 13:3
source:
  edition: SBLGNT
  text: Καὶ καθημένου αὐτοῦ εἰς τὸ Ὄρος τῶν Ἐλαιῶν κατέναντι τοῦ ἱεροῦ ⸀ἐπηρώτα αὐτὸν
    κατ’ ἰδίαν Πέτρος καὶ Ἰάκωβος καὶ Ἰωάννης καὶ Ἀνδρέας·
translation:
  text: And as he was sitting on the Mount of Olives opposite the temple, Peter and
    James and John and Andrew were asking him privately,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἱερόν refers to the temple complex or precincts, not specifically
      the inner sanctuary (ναός).
    reason: lexical_alternative
lexical_decisions:
- source_word: καθημένου αὐτοῦ
  chosen: as he was sitting
  alternatives:
  - while he was sitting
  - when he sat
  lexicon: BDAG
  rationale: Genitive absolute with present participle conveys a circumstantial action
    in progress. 'As he was sitting' preserves the ongoing scene naturally in English.
- source_word: εἰς τὸ Ὄρος τῶν Ἐλαιῶν
  chosen: on the Mount of Olives
  alternatives:
  - at the Mount of Olives
  lexicon: BDAG
  rationale: This is the standard geographic designation. Although εἰς is literally
    'into/to,' with verbs of position it idiomatically marks location here; 'on the
    Mount of Olives' is natural and accurate English.
- source_word: κατέναντι τοῦ ἱεροῦ
  chosen: opposite the temple
  alternatives:
  - facing the temple
  - across from the temple precincts
  lexicon: BDAG
  rationale: κατέναντι denotes being opposite or facing. ἱερόν refers to the temple
    complex rather than the inner sanctuary; 'temple' is the clearest idiomatic rendering
    here, with the precinct nuance not crucial in this context.
- source_word: ἐπηρώτα
  chosen: were asking
  alternatives:
  - asked
  - questioned
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or inceptive action. 'Were asking' preserves
    the imperfective aspect better than simple past 'asked.'
- source_word: κατ’ ἰδίαν
  chosen: privately
  alternatives:
  - in private
  - by themselves
  lexicon: BDAG
  rationale: The phrase means privately or apart from others. 'Privately' is concise
    and natural in English.
- source_word: Πέτρος καὶ Ἰάκωβος καὶ Ἰωάννης καὶ Ἀνδρέας
  chosen: Peter and James and John and Andrew
  alternatives:
  - Peter, James, John, and Andrew
  lexicon: N/A
  rationale: Names are transliterated per project philosophy. Retaining repeated 'and'
    reflects the Greek polysyndeton and gives a slightly more formal narrative cadence.
