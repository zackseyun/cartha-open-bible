theological_decisions:
- issue: Nature of the warning in πλανήσῃ
  chosen_reading: A warning against deception that results in being led off the right path
  alternative_readings:
  - A warning limited to intellectual deception only
  rationale: The verb πλανάω regularly includes the sense of wandering or being caused to stray, not merely being told something false. The chosen rendering preserves that broader theological and moral force without adding doctrinal interpretation beyond the text.
