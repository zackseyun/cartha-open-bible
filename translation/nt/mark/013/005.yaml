id: MRK.13.5
reference: Mark 13:5
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς ⸂ἤρξατο λέγειν αὐτοῖς⸃· Βλέπετε μή τις ὑμᾶς πλανήσῃ·
translation:
  text: Then Jesus began to say to them[a], “See to it that no one leads you astray.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Watch out that no one deceives you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: Then
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ is a mild connective. 'Then' fits the narrative progression in English better than a bare 'and,' while preserving continuity without overstating contrast.
- source_word: ἤρξατο λέγειν
  chosen: began to say
  alternatives:
  - began speaking
  - answered and began to say
  lexicon: BDAG
  rationale: The construction is semitic/narrative and common in Mark. 'Began to say' stays close to the Greek while remaining natural English. 'Answered' is not present in this verse and should not be imported from parallels or context.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - to his disciples
  lexicon: BDAG
  rationale: The pronoun's referent is the disciples from context, but the Greek here states only 'to them.' The translation preserves the explicit wording and avoids adding an interpretive noun into the main text.
- source_word: Βλέπετε
  chosen: See to it
  alternatives:
  - Watch out
  - Take heed
  - Beware
  lexicon: BDAG
  rationale: The present imperative calls for ongoing vigilance. 'See to it' naturally introduces the following μή-clause in English and preserves the force of a warning without sounding archaic.
- source_word: μή τις ὑμᾶς πλανήσῃ
  chosen: that no one leads you astray
  alternatives:
  - lest anyone deceive you
  - that no one misleads you
  lexicon: BDAG
  rationale: μή with the subjunctive after an imperative expresses a warning about something to be prevented. πλανήσῃ can mean 'lead astray, mislead, deceive.' 'Leads you astray' best preserves both deception and deviation imagery, which is important in the eschatological context.
