id: MRK.13.34
reference: Mark 13:34
source:
  edition: SBLGNT
  text: ὡς ἄνθρωπος ἀπόδημος ἀφεὶς τὴν οἰκίαν αὐτοῦ καὶ δοὺς τοῖς δούλοις αὐτοῦ τὴν ἐξουσίαν, ⸀ἑκάστῳ τὸ ἔργον αὐτοῦ, καὶ τῷ θυρωρῷ ἐνετείλατο ἵνα γρηγορῇ.
translation:
  text: It is like a man away on a journey[a], who left his house and gave authority to his slaves, to each one his work, and commanded the doorkeeper to stay awake.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "servants"; Greek "slaves" (douloi), referring to household bondservants under a master's authority.
    reason: alternative_reading
lexical_decisions:
- source_word: ὡς
  chosen: It is like
  alternatives:
  - like
  - as
  lexicon: BDAG
  rationale: Introduces the comparison to the preceding exhortation/parabolic illustration. Rendering with 'It is like' makes the implied comparison explicit in natural English without adding content beyond the Greek sense.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  lexicon: BDAG
  rationale: The noun is singular masculine and refers to a male figure within the illustration, not generic humanity. 'A man' is therefore gender-accurate per translation philosophy.
- source_word: ἀπόδημος
  chosen: away on a journey
  alternatives:
  - on a journey
  - traveling abroad
  - away from home
  lexicon: BDAG
  rationale: The adjective denotes being away from one's own people/place, especially traveling abroad or away from home. 'Away on a journey' captures both absence and travel in idiomatic English.
- source_word: ἀφεὶς τὴν οἰκίαν αὐτοῦ
  chosen: who left his house
  alternatives:
  - having left his house
  - after leaving his house
  lexicon: BDAG
  rationale: The aorist participle is naturally subordinated in English to the main comparison. 'House' is the plain sense of οἰκία here, referring to the household/property under his oversight.
- source_word: δοὺς
  chosen: gave
  alternatives:
  - having given
  - entrusted
  lexicon: BDAG
  rationale: The participle from δίδωμι is straightforwardly 'gave.' Although 'entrusted' is interpretively possible from context, 'gave' stays closer to the Greek while remaining natural.
- source_word: τοῖς δούλοις αὐτοῦ
  chosen: to his slaves
  alternatives:
  - to his servants
  - to his bondservants
  lexicon: BDAG
  rationale: Per doctrine guidance, δοῦλος is rendered 'slave' where bonded status is salient. In this household-master setting, the relation of authority and ownership is foregrounded, so 'slaves' best reflects the social reality; 'servants' is preserved as an alternative.
- source_word: τὴν ἐξουσίαν
  chosen: authority
  alternatives:
  - responsibility
  - charge
  - right to act
  lexicon: BDAG
  rationale: ἐξουσία commonly denotes authority, right, or delegated power. 'Authority' best matches the lexical core and the context of delegated oversight.
- source_word: ἑκάστῳ τὸ ἔργον αὐτοῦ
  chosen: to each one his work
  alternatives:
  - each his task
  - to each his assigned work
  lexicon: BDAG
  rationale: This phrase is somewhat elliptical after 'gave authority'; the translation preserves the distributive force ('to each one') and the concrete noun ἔργον as 'work' rather than over-interpreting with 'assignment,' though that sense is contextually present.
- source_word: θυρωρῷ
  chosen: doorkeeper
  alternatives:
  - gatekeeper
  - porter
  lexicon: BDAG
  rationale: θυρωρός refers to one who keeps/watch at the door. 'Doorkeeper' is clear modern English and fits a house setting better than 'gatekeeper' here.
- source_word: ἐνετείλατο
  chosen: commanded
  alternatives:
  - ordered
  - instructed
  lexicon: BDAG
  rationale: The middle form of ἐντέλλομαι means to give an order or command. 'Commanded' preserves the authoritative force.
- source_word: ἵνα γρηγορῇ
  chosen: to stay awake
  alternatives:
  - that he should keep watch
  - to be watchful
  - to remain alert
  lexicon: BDAG
  rationale: γρηγορέω literally means to stay awake, and in this discourse carries the watchful/alert sense. 'Stay awake' preserves the metaphor used throughout the chapter while remaining idiomatic.
