theological_decisions:
- issue: Rendering δοῦλος in a parabolic household context
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: The verse depicts a master delegating authority within his household. Because the bonded relationship is part of the image, 'slaves' better reflects the Greek term and the doctrine file's guidance, while avoiding euphemistic softening. 'Servants' is preserved as an alternative because some English readers may hear the parable more naturally that way.
