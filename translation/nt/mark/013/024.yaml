id: MRK.13.24
reference: Mark 13:24
source:
  edition: SBLGNT
  text: Ἀλλὰ ἐν ἐκείναις ταῖς ἡμέραις μετὰ τὴν θλῖψιν ἐκείνην ὁ ἥλιος σκοτισθήσεται, καὶ ἡ σελήνη οὐ δώσει τὸ φέγγος αὐτῆς,
translation:
  text: But in those days[a], after that tribulation, the sun will be darkened, and the moon will not give its light,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after that distress' or 'after that affliction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀλλὰ
  chosen: But
  alternatives:
  - Yet
  - However
  lexicon: BDAG
  rationale: Marks a strong contrast/transition from the preceding material; 'But' is the most natural concise English equivalent here.
- source_word: ἐν ἐκείναις ταῖς ἡμέραις
  chosen: in those days
  alternatives:
  - during those days
  lexicon: BDAG
  rationale: A standard temporal expression. 'In those days' preserves the Greek structure and eschatological tone without unnecessary expansion.
- source_word: μετὰ τὴν θλῖψιν ἐκείνην
  chosen: after that tribulation
  alternatives:
  - after that distress
  - after that affliction
  lexicon: BDAG
  rationale: μετά with the accusative is temporal, 'after.' θλῖψις can mean tribulation, distress, or affliction; 'tribulation' best preserves the weight and intertextual resonance of the term in this apocalyptic context. The demonstrative ἐκείνην is retained as 'that' for specificity.
- source_word: ὁ ἥλιος
  chosen: the sun
  lexicon: BDAG
  rationale: Direct lexical equivalent.
- source_word: σκοτισθήσεται
  chosen: will be darkened
  alternatives:
  - will grow dark
  - will be made dark
  lexicon: BDAG
  rationale: Future passive form is best represented by 'will be darkened.' This preserves both the future reference and passive voice more closely than the intransitive 'will grow dark.'
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Simple coordinating conjunction linking the paired cosmic signs.
- source_word: ἡ σελήνη
  chosen: the moon
  lexicon: BDAG
  rationale: Direct lexical equivalent.
- source_word: οὐ δώσει
  chosen: will not give
  alternatives:
  - will not shed
  - will not provide
  lexicon: BDAG
  rationale: δίδωμι is literally 'give.' Retaining 'give' keeps the vivid personified imagery of the Greek and remains natural in English.
- source_word: τὸ φέγγος αὐτῆς
  chosen: its light
  alternatives:
  - its brightness
  - its radiance
  lexicon: BDAG
  rationale: φέγγος denotes light/brightness. 'Its light' is the most straightforward and idiomatic rendering in context, and αὐτῆς is naturally rendered 'its' referring to the moon.
