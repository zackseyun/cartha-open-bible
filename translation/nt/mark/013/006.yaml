theological_decisions:
- issue: Rendering of Ἐγώ εἰμι in a context of false claimants
  chosen_reading: I am he
  alternative_readings:
  - I am
  rationale: The phrase can be rendered more literally as 'I am,' but in this discourse context Jesus warns of people coming in his name and claiming the identity or role that belongs to him. 'I am he' makes the implied claim explicit in idiomatic English while avoiding an overdrawn theological reading beyond the immediate context. Because the Greek predicate is unstated, the more literal alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
