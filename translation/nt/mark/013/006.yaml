id: MRK.13.6
reference: Mark 13:6
source:
  edition: SBLGNT
  text: ⸀πολλοὶ ἐλεύσονται ἐπὶ τῷ ὀνόματί μου λέγοντες ὅτι Ἐγώ εἰμι, καὶ πολλοὺς πλανήσουσιν.
translation:
  text: Many will come in my name[a], saying, ‘I am he,’ and they will lead many astray.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'I am.' The Greek does not state the predicate explicitly.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  chosen: Many
  alternatives:
  - many people
  lexicon: BDAG
  rationale: An indefinite plural referring to numerous persons. 'Many' is concise and natural in English, matching the Greek adjective used substantivally.
- source_word: ἐλεύσονται
  chosen: will come
  alternatives:
  - will arrive
  - will appear
  lexicon: BDAG
  rationale: Future middle of ἔρχομαι, here with the sense of coming forward or appearing. 'Will come' is the most direct and idiomatic rendering.
- source_word: ἐπὶ τῷ ὀνόματί μου
  chosen: in my name
  alternatives:
  - on the basis of my name
  - under my name
  lexicon: BDAG
  rationale: The idiom ἐπὶ + dative with ὄνομα here conveys acting on the authority of or claiming association with Jesus' name. 'In my name' is the standard and accurate English equivalent.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - claiming
  - declaring
  lexicon: BDAG
  rationale: Present participle expressing attendant manner/content of their coming. 'Saying' preserves the straightforward verbal force without overinterpreting.
- source_word: ὅτι Ἐγώ εἰμι
  chosen: I am he
  alternatives:
  - I am
  - I am the one
  lexicon: BDAG
  rationale: 'In this context of false claimants coming in Jesus'' name, the phrase is best understood as an implicit messianic/self-identifying claim: ''I am he.'' Rendering simply ''I am'' would preserve the Greek form but may sound obscure in English; the supplied ''he'' makes the implied predicate clear. The shorter alternative is preserved in a footnote because the Greek lacks an explicit predicate.'
- source_word: πολλοὺς
  chosen: many
  alternatives:
  - many people
  lexicon: BDAG
  rationale: Object of the verb πλανήσουσιν; rendered simply as 'many' for natural English and consistency with the opening πολλοὶ.
- source_word: πλανήσουσιν
  chosen: will lead ... astray
  alternatives:
  - will deceive
  - will mislead
  lexicon: BDAG
  rationale: πλανάω can mean to cause someone to wander, mislead, or deceive. 'Lead astray' preserves the metaphorical sense of causing deviation from the truth, which is especially fitting in eschatological warning contexts.
