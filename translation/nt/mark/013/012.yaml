theological_decisions:
- issue: Gendered familial terms in representative statements
  chosen_reading: Retain 'brother' and 'father' rather than neutralizing to 'sibling'
    or 'parent' in the first two clauses, while rendering τέκνα/γονεῖς as 'children/parents'
    where the Greek is already broader.
  alternative_readings:
  - sibling will hand over sibling
  - a parent his or her child
  rationale: 'This follows the gender-accurate principle: ἀδελφός and πατήρ are specifically
    masculine forms here, while τέκνον and γονεύς are broader. The verse depicts family
    betrayal without requiring artificial gender-neutralization where the Greek is
    specific.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4
