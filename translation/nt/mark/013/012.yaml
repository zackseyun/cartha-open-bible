id: MRK.13.12
reference: Mark 13:12
source:
  edition: SBLGNT
  text: ⸂καὶ παραδώσει⸃ ἀδελφὸς ἀδελφὸν εἰς θάνατον καὶ πατὴρ τέκνον, καὶ ἐπαναστήσονται
    τέκνα ἐπὶ γονεῖς καὶ θανατώσουσιν αὐτούς·
translation:
  text: And brother will hand over brother to death, and a father his child, and children
    will rise up against parents and put them to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will betray'; the Greek verb can mean 'hand over,' 'deliver up,' or
      in context 'betray.'
    reason: lexical_alternative
  - marker: b
    text: Or 'kill them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παραδώσει
  chosen: will hand over
  alternatives:
  - will betray
  - will deliver up
  lexicon: BDAG
  rationale: παραδίδωμι commonly means to hand over or deliver up. In this persecution
    context, 'hand over' preserves the concrete sense of delivering someone to authorities
    or death without importing the more interpretive emotional nuance of 'betray'
    into every occurrence.
- source_word: ἀδελφὸς ... ἀδελφὸν
  chosen: brother ... brother
  alternatives:
  - one brother ... another
  - a brother ... his brother
  lexicon: BDAG
  rationale: The singular nouns naturally express familial betrayal in a representative
    way. 'Brother ... brother' is concise and preserves the stark repetition of the
    Greek.
- source_word: εἰς θάνατον
  chosen: to death
  alternatives:
  - for death
  - to be put to death
  lexicon: BDAG
  rationale: The prepositional phrase indicates result or end. 'To death' is idiomatic
    English and keeps the severity of the Greek without overexpanding the syntax.
- source_word: πατὴρ τέκνον
  chosen: a father his child
  alternatives:
  - a father a child
  - father child
  - a father his son
  lexicon: BDAG
  rationale: τέκνον is broader than 'son' or 'daughter' and means child. Supplying
    'his' makes natural English while preserving the familial relation implied by
    the Greek.
- source_word: τέκνον / τέκνα
  chosen: child / children
  alternatives:
  - offspring
  lexicon: BDAG
  rationale: τέκνον denotes child in a familial sense. 'Child/children' is the most
    natural and accurate modern English rendering.
- source_word: ἐπαναστήσονται
  chosen: will rise up against
  alternatives:
  - will rebel against
  - will turn against
  lexicon: BDAG
  rationale: The verb conveys hostile rising up against someone. 'Rise up against'
    preserves the vividness and formal force of the Greek better than the more interpretive
    'turn against.'
- source_word: γονεῖς
  chosen: parents
  alternatives:
  - father and mother
  lexicon: BDAG
  rationale: γονεύς in the plural means parents. 'Parents' is the direct and natural
    equivalent.
- source_word: θανατώσουσιν αὐτούς
  chosen: put them to death
  alternatives:
  - kill them
  - cause their death
  lexicon: BDAG
  rationale: θανατόω means to put to death or kill. 'Put them to death' matches the
    judicial/persecutory tone already established by παραδώσει ... εἰς θάνατον and
    avoids flattening the phrase to mere violence.
