theological_decisions:
- issue: Force of the witness phrase εἰς μαρτύριον αὐτοῖς
  chosen_reading: The disciples' compelled appearances before rulers function as testimony
    to those rulers.
  alternative_readings:
  - The testimony is against those rulers in a condemnatory sense.
  rationale: The verse emphasizes persecution becoming an occasion for witness. While
    the phrase can in some contexts imply testimony 'against' someone, this text does
    not explicitly require a condemnatory nuance, so the translation preserves the
    broader witness sense without importing judgment beyond what is stated.
  doctrine_reference: Preserve theological tension rather than resolve it.
