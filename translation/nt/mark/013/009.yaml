id: MRK.13.9
reference: Mark 13:9
source:
  edition: SBLGNT
  text: βλέπετε δὲ ὑμεῖς ἑαυτούς· ⸀παραδώσουσιν ὑμᾶς εἰς συνέδρια καὶ εἰς συναγωγὰς
    δαρήσεσθε καὶ ἐπὶ ἡγεμόνων καὶ βασιλέων σταθήσεσθε ἕνεκεν ἐμοῦ εἰς μαρτύριον αὐτοῖς.
translation:
  text: But watch yourselves. They will hand you over to councils, and you will be
    beaten in synagogues, and you will stand before governors and kings because of
    me, as a testimony to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a witness to them'; the phrase may also carry the sense 'as testimony
      against them.'
    reason: alternative_reading
lexical_decisions:
- source_word: βλέπετε
  chosen: watch
  alternatives:
  - beware
  - be on guard
  lexicon: BDAG
  rationale: Present imperative calling for ongoing vigilance. 'Watch yourselves'
    is natural modern English and preserves the warning force without over-paraphrasing.
- source_word: ὑμεῖς ἑαυτούς
  chosen: yourselves
  alternatives:
  - for yourselves
  - yourselves personally
  lexicon: BDAG
  rationale: 'The explicit pronoun plus reflexive adds emphasis: the disciples themselves
    must remain alert. English idiom compresses this to ''yourselves'' while retaining
    the reflexive sense.'
- source_word: παραδώσουσιν
  chosen: hand ... over
  alternatives:
  - deliver up
  - betray
  lexicon: BDAG
  rationale: In this persecution context, παραδίδωμι refers to being turned over to
    authorities. 'Hand over' is clear, idiomatic, and preserves the juridical nuance
    better than the archaic 'deliver up.'
- source_word: συνέδρια
  chosen: councils
  alternatives:
  - courts
  - sanhedrins
  lexicon: BDAG
  rationale: Plural refers to local ruling/judicial councils rather than necessarily
    the Jerusalem Sanhedrin alone. 'Councils' is broad enough to fit the plural and
    avoids over-specifying.
- source_word: συναγωγάς
  chosen: synagogues
  alternatives:
  - meeting places of the Jews
  lexicon: BDAG
  rationale: Standard rendering of the institutional and physical setting. Here it
    likely denotes synagogue settings where disciplinary beating could occur.
- source_word: δαρήσεσθε
  chosen: you will be beaten
  alternatives:
  - you will be flogged
  - you will be struck
  lexicon: BDAG
  rationale: Future passive of δέρω denotes physical beating. 'Beaten' is the most
    straightforward and broadly accurate rendering; 'flogged' may be too specific.
- source_word: ἐπὶ ἡγεμόνων καὶ βασιλέων
  chosen: before governors and kings
  alternatives:
  - in the presence of governors and kings
  - before rulers and kings
  lexicon: BDAG
  rationale: With verbs of standing/appearing, ἐπί with genitive conveys appearance
    before authorities. 'Governors and kings' preserves the distinct offices named
    in Greek.
- source_word: σταθήσεσθε
  chosen: you will stand before
  alternatives:
  - you will be brought before
  - you will be made to stand before
  lexicon: BDAG
  rationale: Future passive of ἵστημι can imply being set or made to stand before
    authorities. In English, 'stand before' captures both the formal appearance and
    the solemnity; the coercive nuance is already conveyed by the persecution context.
- source_word: ἕνεκεν ἐμοῦ
  chosen: because of me
  alternatives:
  - for my sake
  - on account of me
  lexicon: BDAG
  rationale: Causal phrase indicating that allegiance to Jesus is the reason for persecution.
    'Because of me' is clear modern English; 'for my sake' is possible but slightly
    more traditional in tone.
- source_word: εἰς μαρτύριον αὐτοῖς
  chosen: as a testimony to them
  alternatives:
  - for a witness to them
  - as testimony against them
  lexicon: BDAG
  rationale: μαρτύριον can denote testimony/witness. Here the phrase most naturally
    indicates that the disciples' appearance before rulers serves as testimony directed
    to those authorities. 'Against them' is possible in some contexts, but the dative
    αὐτοῖς does not require adversative force here, so the less interpretively loaded
    'to them' is preferred.
