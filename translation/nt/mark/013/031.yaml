id: MRK.13.31
reference: Mark 13:31
source:
  edition: SBLGNT
  text: ὁ οὐρανὸς καὶ ἡ γῆ ⸀παρελεύσονται, οἱ δὲ λόγοι μου οὐ ⸀μὴ ⸁παρελεύσονται.
translation:
  text: Heaven and earth will pass away[a], but my words will certainly not pass away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'will never pass away' or 'will by no means pass away.' The Greek uses an emphatic negation.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐρανὸς
  chosen: heaven
  alternatives:
  - sky
  lexicon: BDAG
  rationale: In this eschatological saying paired with 'earth,' οὐρανός refers to the cosmic heaven rather than merely the visible sky. 'Heaven and earth' is the established merism that best matches the Greek sense.
- source_word: γῆ
  chosen: earth
  alternatives:
  - land
  lexicon: BDAG
  rationale: In the fixed pair 'heaven and earth,' γῆ denotes the earth/world rather than a particular land.
- source_word: παρελεύσονται
  chosen: will pass away
  alternatives:
  - will pass by
  - will disappear
  lexicon: BDAG
  rationale: παρέρχομαι here means to pass away or come to an end. 'Pass away' is natural English and preserves the eschatological force without overinterpreting the mode of passing.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - yet
  lexicon: BDAG
  rationale: δέ marks contrast between the transience of heaven and earth and the permanence of Jesus' words; 'but' best conveys that contrast.
- source_word: λόγοι
  chosen: words
  alternatives:
  - sayings
  - utterances
  lexicon: BDAG
  rationale: λόγοι μου refers to Jesus' spoken words or declarations. 'Words' is the most direct and idiomatic rendering here.
- source_word: οὐ μὴ παρελεύσονται
  chosen: will certainly not pass away
  alternatives:
  - will never pass away
  - will by no means pass away
  lexicon: BDAG
  rationale: The οὐ μή construction with the future is an emphatic negation. 'Will certainly not pass away' preserves the strong force in contemporary English without sounding archaic; the traditional 'will never pass away' remains a viable alternative.
