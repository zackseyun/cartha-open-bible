theological_decisions:
- issue: Force of Jesus' emphatic negation regarding his words
  chosen_reading: 'Rendered with explicit emphasis: ''will certainly not pass away.'''
  alternative_readings:
  - '''will never pass away'''
  - '''will by no means pass away'''
  rationale: The verse strongly contrasts the passing of the created order with the enduring authority and permanence of Jesus' words. The translation preserves that theological weight by making the emphatic negation audible in English while remaining readable.
