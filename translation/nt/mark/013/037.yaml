theological_decisions:
- issue: Scope of Jesus' exhortation
  chosen_reading: The saying addressed to the disciples is explicitly extended to
    all.
  alternative_readings:
  - The statement could be heard as applying only to the immediate hearers in narrative
    context.
  rationale: The Greek explicitly contrasts 'to you' with 'to all,' so the translation
    preserves the universalizing force without narrowing it to the disciples alone.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
