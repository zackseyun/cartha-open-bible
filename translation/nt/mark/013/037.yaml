id: MRK.13.37
reference: Mark 13:37
source:
  edition: SBLGNT
  text: ⸀ὃ δὲ ὑμῖν λέγω πᾶσιν λέγω· γρηγορεῖτε.
translation:
  text: 'And what I say to you I say to all: stay awake.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "keep watch" or "be watchful."
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃ
  chosen: what
  alternatives:
  - that which
  - the thing that
  lexicon: BDAG
  rationale: 'Neuter singular relative pronoun used substantivally: ''what'' best
    captures the broad, resumptive sense in natural English without over-formal stiffness.'
- source_word: δὲ
  chosen: and
  alternatives:
  - now
  - but
  lexicon: BDAG
  rationale: Here δέ is mildly connective rather than strongly adversative. 'And'
    gives smooth English linkage to the preceding discourse better than 'but'.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - to you all
  lexicon: BDAG
  rationale: Dative second person plural addressed first to the immediate disciples.
    English 'you' can represent the plural here; the subsequent πᾶσιν makes the widening
    scope explicit.
- source_word: λέγω ... λέγω
  chosen: I say ... I say
  alternatives:
  - I tell ... I tell
  lexicon: BDAG
  rationale: Retaining the repetition reflects the Greek emphasis and rhetorical structure.
    'Say' is slightly more formally transparent to λέγω than 'tell'.
- source_word: πᾶσιν
  chosen: to all
  alternatives:
  - to everyone
  - to all people
  lexicon: BDAG
  rationale: Dative plural with broad inclusive force. 'To all' preserves the concise
    universality of the Greek and avoids adding 'people,' which is implied but not
    explicit.
- source_word: γρηγορεῖτε
  chosen: stay awake
  alternatives:
  - keep watch
  - be watchful
  - watch
  lexicon: BDAG
  rationale: Present active imperative plural calls for ongoing vigilance. 'Stay awake'
    preserves the metaphor's immediacy in context, while 'keep watch' is a viable
    alternative with a slightly more interpretive nuance toward alertness.
