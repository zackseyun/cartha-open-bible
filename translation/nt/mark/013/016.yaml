id: MRK.13.16
reference: Mark 13:16
source:
  edition: SBLGNT
  text: καὶ ὁ εἰς τὸν ⸀ἀγρὸν μὴ ἐπιστρεψάτω εἰς τὰ ὀπίσω ἆραι τὸ ἱμάτιον αὐτοῦ.
translation:
  text: And the one in the field must not turn back to get his cloak[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'outer garment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ εἰς τὸν ἀγρόν
  chosen: the one in the field
  alternatives:
  - the one who is in the field
  - the man in the field
  lexicon: BDAG
  rationale: The articular construction functions substantivally, referring to a person characterized by being in the field. 'The one in the field' is natural English and preserves the generic singular force without over-specifying gender in the main text.
- source_word: ἀγρός
  chosen: field
  alternatives:
  - farm
  - country
  lexicon: BDAG
  rationale: ἀγρός commonly denotes a field or farmland. 'Field' is the most direct and contextually appropriate rendering in this flight warning.
- source_word: μὴ ἐπιστρεψάτω
  chosen: must not turn back
  alternatives:
  - let him not turn back
  - must not return
  lexicon: BDAG
  rationale: The aorist imperative with μή gives a prohibition. 'Must not turn back' communicates the urgent prohibitive force in clear modern English better than the more wooden 'let him not turn back.'
- source_word: εἰς τὰ ὀπίσω
  chosen: back
  alternatives:
  - to what is behind
  - to the rear
  lexicon: BDAG
  rationale: The idiom means to go back or backward. In English, 'turn back' already carries the sense, so rendering the phrase compactly as 'back' avoids awkward redundancy while preserving meaning.
- source_word: ἆραι
  chosen: to pick up
  alternatives:
  - to take
  - to get
  lexicon: BDAG
  rationale: 'The infinitive expresses purpose: returning in order to take something. ''Pick up'' fits the concrete action of retrieving a garment left behind.'
- source_word: ἱμάτιον
  chosen: cloak
  alternatives:
  - garment
  - outer garment
  - robe
  lexicon: BDAG
  rationale: ἱμάτιον refers to an outer garment or cloak. 'Cloak' is concise and idiomatic, and it reflects the likely sense better than the broader 'garment.'
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - one's own
  lexicon: BDAG
  rationale: The pronoun is masculine singular, matching the generic singular construction. Per the project's gender-accurate philosophy, 'his' preserves the source form and representative force.
