id: MRK.13.28
reference: Mark 13:28
source:
  edition: SBLGNT
  text: Ἀπὸ δὲ τῆς συκῆς μάθετε τὴν παραβολήν· ὅταν ⸂ἤδη ὁ κλάδος αὐτῆς⸃ ἁπαλὸς γένηται καὶ ἐκφύῃ τὰ φύλλα, γινώσκετε ὅτι ἐγγὺς τὸ θέρος ἐστίν·
translation:
  text: 'Now learn the parable from the fig tree: when its branch has already become tender and puts out leaves[a], you know that summer is near.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lesson' or 'illustration' for 'parable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀπὸ δὲ τῆς συκῆς
  chosen: Now learn ... from the fig tree
  alternatives:
  - From the fig tree learn
  - Learn from the fig tree
  lexicon: BDAG
  rationale: ἀπό with the genitive marks source ('from'). δέ is lightly connective; 'now' brings the discourse transition into natural English without overstating contrast.
- source_word: μάθετε
  chosen: learn
  alternatives:
  - understand
  - take a lesson
  lexicon: BDAG
  rationale: Aorist imperative of μανθάνω calls for receiving instruction. 'Learn' is the most direct and idiomatic rendering.
- source_word: τὴν παραβολήν
  chosen: the parable
  alternatives:
  - the lesson
  - the illustration
  lexicon: BDAG
  rationale: παραβολή commonly means 'parable' or illustrative comparison. Here it introduces an analogy drawn from the fig tree. 'Parable' preserves the Greek term and Gospel usage, though the sense is that of an illustrative lesson.
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: ὅταν with the subjunctive introduces a general temporal condition. 'When' is natural in English and fits the proverbial observation.
- source_word: ἤδη
  chosen: already
  alternatives:
  - now already
  - by now
  lexicon: BDAG
  rationale: ἤδη marks the onset as already underway. 'Already' preserves that temporal nuance.
- source_word: ὁ κλάδος αὐτῆς
  chosen: its branch
  alternatives:
  - its branchwood
  - its bough
  lexicon: BDAG
  rationale: κλάδος is 'branch' or 'bough.' 'Its branch' is clear, simple modern English.
- source_word: ἁπαλὸς γένηται
  chosen: has already become tender
  alternatives:
  - becomes tender
  - grows tender
  - becomes soft
  lexicon: BDAG
  rationale: 'ἁπαλός denotes tenderness/softness, especially of new growth. γένηται with ὅταν is subjunctive in a future-more-general condition. English present-perfect-style phrasing after ''when'' naturally conveys the state reached: the branch has become tender.'
- source_word: ἐκφύῃ τὰ φύλλα
  chosen: puts out leaves
  alternatives:
  - sprouts leaves
  - brings forth leaves
  lexicon: BDAG
  rationale: ἐκφύω means to sprout or put forth. 'Puts out leaves' is idiomatic contemporary English for plant growth and accurately reflects the image.
- source_word: γινώσκετε
  chosen: you know
  alternatives:
  - you recognize
  - know
  lexicon: BDAG
  rationale: 'Present indicative, not imperative, in this form and context: it states what people recognize from the sign. ''You know'' best matches the grammar and sense.'
- source_word: ἐγγὺς
  chosen: near
  alternatives:
  - close
  - at hand
  lexicon: BDAG
  rationale: ἐγγύς means spatial or temporal nearness. 'Near' is the most straightforward rendering here.
- source_word: τὸ θέρος
  chosen: summer
  alternatives:
  - the summer season
  - harvest-time
  lexicon: BDAG
  rationale: θέρος ordinarily means 'summer.' While in some contexts it can be associated with harvest, the fig-tree seasonal image here favors the plain seasonal sense.
