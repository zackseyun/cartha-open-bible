theological_decisions:
- issue: Meaning of παραβολή in this context
  chosen_reading: Rendered as 'parable' in the main text while allowing the sense of an illustrative lesson to be carried by context.
  alternative_readings:
  - lesson
  - illustration
  rationale: The verse uses standard Gospel terminology without requiring a technical distinction. Retaining 'parable' preserves lexical continuity with Jesus's teaching style while not importing extra allegorical detail.
