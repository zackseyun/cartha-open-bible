theological_decisions:
- issue: Interpretation of the Danielic phrase βδέλυγμα τῆς ἐρημώσεως
  chosen_reading: Retain the source-near phrase 'the abomination of desolation' without
    specifying its historical referent in the translation.
  alternative_readings:
  - the desolating sacrilege
  - the abomination that causes desolation
  rationale: The phrase is theologically and historically contested, potentially referring
    to a sacrilegious object, act, or person. The translation should preserve the
    text's allusive force and ambiguity rather than resolve the referent in the main
    text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Masculine participle ἑστηκότα modifying neuter βδέλυγμα
  chosen_reading: Main text uses 'standing where it ought not to be' with neuter agreement
    in English, while preserving the more personal 'where he ought not to be' in a
    footnote.
  alternative_readings:
  - standing where he ought not to be
  rationale: The Greek's masculine participle may suggest a personal referent behind
    the neuter noun or reflect attraction to an implied person. Because the syntax
    is genuinely ambiguous, the translation preserves readability in the main text
    and documents the alternative in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
