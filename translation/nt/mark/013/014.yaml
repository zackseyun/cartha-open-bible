id: MRK.13.14
reference: Mark 13:14
source:
  edition: SBLGNT
  text: Ὅταν δὲ ἴδητε τὸ βδέλυγμα τῆς ἐρημώσεως ⸀ἑστηκότα ὅπου οὐ δεῖ, ὁ ἀναγινώσκων
    νοείτω, τότε οἱ ἐν τῇ Ἰουδαίᾳ φευγέτωσαν εἰς τὰ ὄρη,
translation:
  text: But when you see the abomination of desolation standing where it ought not
    to be (let the reader understand), then let those in Judea flee to the mountains,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'standing where he ought not to be.' The Greek participle is masculine,
      which may suggest a personal referent behind 'the abomination.'
    reason: alternative_reading
  - marker: b
    text: '''The abomination of desolation'' echoes Daniel''s language (see Dan. 9:27;
      11:31; 12:11).'
    reason: cross_reference
lexical_decisions:
- source_word: Ὅταν δὲ
  chosen: But when
  alternatives:
  - And when
  - Now when
  lexicon: BDAG
  rationale: Ὅταν introduces a temporal contingency ('when/whenever'), and δέ is a
    mild connective best rendered here as 'But' to mark progression from the prior
    warning without overstating contrast.
- source_word: ἴδητε
  chosen: you see
  alternatives:
  - you catch sight of
  - you perceive
  lexicon: BDAG
  rationale: 'Aorist subjunctive of ὁράω in a temporal clause is naturally rendered
    with simple present English after ''when'': ''when you see.'''
- source_word: τὸ βδέλυγμα τῆς ἐρημώσεως
  chosen: the abomination of desolation
  alternatives:
  - the desolating sacrilege
  - the abomination that causes desolation
  lexicon: BDAG
  rationale: This phrase is a recognized apocalyptic expression with strong intertextual
    resonance from Daniel. 'Abomination of desolation' preserves the traditional and
    source-near wording without importing an interpretive expansion such as 'that
    causes.'
- source_word: ἑστηκότα
  chosen: standing
  alternatives:
  - set up
  - having stood
  lexicon: BDAG
  rationale: Perfect active participle of ἵστημι conveys a present state resulting
    from prior placement. 'Standing' is idiomatic and preserves the vividness of the
    Greek better than the more interpretive 'set up.'
- source_word: ὅπου οὐ δεῖ
  chosen: where it ought not to be
  alternatives:
  - where he ought not to be
  - where it must not be
  lexicon: BDAG
  rationale: δεῖ expresses necessity/propriety. Because βδέλυγμα is neuter while ἑστηκότα
    is masculine, the construction is syntactically difficult and likely points to
    a personal or personified referent behind the neuter expression. The main text
    uses 'it' to agree with the explicit noun 'abomination' while preserving readability;
    the masculine-sensitive alternative is preserved in a footnote.
- source_word: ὁ ἀναγινώσκων νοείτω
  chosen: let the reader understand
  alternatives:
  - let the one reading understand
  - let the reader take note
  lexicon: BDAG
  rationale: A parenthetical exhortation. 'Reader' is the natural English equivalent
    for the substantival participle, and 'understand' best matches νοέω here.
- source_word: τότε
  chosen: then
  alternatives:
  - at that time
  lexicon: BDAG
  rationale: Marks the consequent action following the sign.
- source_word: οἱ ἐν τῇ Ἰουδαίᾳ
  chosen: those in Judea
  alternatives:
  - those who are in Judea
  lexicon: BDAG
  rationale: A concise and natural rendering of the substantival phrase, preserving
    the geographic specificity.
- source_word: φευγέτωσαν
  chosen: let ... flee
  alternatives:
  - must flee
  - should flee
  lexicon: BDAG
  rationale: Present imperative, third person plural, expressing urgent instruction.
    'Let ... flee' preserves the imperative force without overformalizing.
- source_word: εἰς τὰ ὄρη
  chosen: to the mountains
  alternatives:
  - into the hills
  lexicon: BDAG
  rationale: ὄρη means mountains/hills; 'mountains' is the more direct rendering and
    fits the traditional topographical sense.
