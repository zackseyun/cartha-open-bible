theological_decisions:
- issue: Rendering κύριος in a parabolic expression that may indirectly refer to Jesus
    while denoting a householder within the image
  chosen_reading: master of the house
  alternative_readings:
  - Lord of the house
  - owner of the house
  - householder
  rationale: The doctrine default for κύριος is 'Lord,' but context governs. Here
    the phrase is an ordinary genitival expression within a household metaphor. Rendering
    it 'master' preserves the image's plain sense while not denying the larger christological
    implication of the parable. This is a contextual exception, documented per verse
    in keeping with the consistency principle.
  doctrine_reference: 'DOCTRINE.md: Contested terms (κύριος → Lord by default); Translation
    philosophy #5 (documented exception)'
