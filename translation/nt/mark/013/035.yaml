id: MRK.13.35
reference: Mark 13:35
source:
  edition: SBLGNT
  text: γρηγορεῖτε οὖν, οὐκ οἴδατε γὰρ πότε ὁ κύριος τῆς οἰκίας ἔρχεται, ⸀ἢ ὀψὲ ἢ
    ⸀μεσονύκτιον ἢ ἀλεκτοροφωνίας ἢ πρωΐ,
translation:
  text: 'Therefore stay awake, for you do not know when the master of the house is
    coming: whether in the evening, or at midnight, or at cockcrow, or in the morning.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'keep watch.' The command carries the sense of remaining alert and vigilant.
    reason: lexical_alternative
  - marker: b
    text: '''Cockcrow'' refers to the night watch associated with the rooster''s crowing.'
    reason: cultural_note
lexical_decisions:
- source_word: γρηγορεῖτε
  chosen: stay awake
  alternatives:
  - keep watch
  - be watchful
  - watch
  lexicon: BDAG
  rationale: Imperative calling for alertness/vigilance. 'Stay awake' is idiomatic
    modern English and fits the immediate context of uncertain timing through the
    night watches better than the more traditional but potentially narrower 'watch.'
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Marks an inference from the preceding teaching. 'Therefore' preserves
    the logical connection clearly.
- source_word: οὐκ οἴδατε
  chosen: you do not know
  alternatives:
  - you do not know for certain
  lexicon: BDAG
  rationale: Straightforward negated verb of knowing; no expansion beyond the Greek
    is warranted.
- source_word: πότε
  chosen: when
  alternatives:
  - at what time
  lexicon: BDAG
  rationale: Simple temporal interrogative/indefinite sense in indirect question;
    'when' is natural and sufficient.
- source_word: ὁ κύριος τῆς οἰκίας
  chosen: the master of the house
  alternatives:
  - the lord of the house
  - the owner of the house
  - the householder
  lexicon: BDAG
  rationale: κύριος is often 'Lord,' but here the immediate parabolic/domestic setting
    points to household authority rather than a direct titular christological use.
    'Master of the house' best conveys authority in context while avoiding confusion
    with a direct divine title in the sentence itself.
- source_word: ἔρχεται
  chosen: is coming
  alternatives:
  - comes
  lexicon: BDAG
  rationale: Present tense with future reference in context. English progressive 'is
    coming' naturally conveys expected arrival without overformal stiffness.
- source_word: ὀψὲ
  chosen: in the evening
  alternatives:
  - late
  - late in the evening
  lexicon: BDAG
  rationale: In the sequence of night watches, this refers to the evening watch rather
    than a vague 'late.' The preposition 'in' makes the list read naturally in English.
- source_word: μεσονύκτιον
  chosen: at midnight
  alternatives:
  - midnight
  lexicon: BDAG
  rationale: Standard temporal rendering in the list of watches.
- source_word: ἀλεκτοροφωνίας
  chosen: at cockcrow
  alternatives:
  - when the rooster crows
  - at the rooster's crowing
  lexicon: BDAG
  rationale: Refers to the Roman night watch marked by rooster-crowing. 'Cockcrow'
    is concise and traditional yet still understandable; it preserves the technical
    time-marker quality better than a full clause.
- source_word: πρωΐ
  chosen: in the morning
  alternatives:
  - at dawn
  - early
  lexicon: BDAG
  rationale: Final watch of the night moving into morning. 'In the morning' is clear
    and broad enough without over-specifying dawn.
