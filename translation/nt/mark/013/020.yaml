theological_decisions:
- issue: Meaning of 'saved' in context
  chosen_reading: Physical preservation of human life during the tribulation is the immediate sense, while retaining the lexical rendering 'saved' in English.
  alternative_readings:
  - Purely spiritual salvation
  rationale: The context concerns catastrophic days being shortened so that people do not perish. The verse is not making a direct doctrinal statement about eternal salvation, though the verb σῴζω is still best translated 'saved.' This preserves the text's wording without importing soteriological claims the verse itself does not foreground.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make.'
- issue: Referent of 'the elect'
  chosen_reading: Retain 'the elect' as the text's designation for those on whose behalf the days are shortened, without specifying a denominational doctrine of election.
  alternative_readings:
  - the chosen ones with an explicitly corporate sense
  - the chosen ones with an explicitly individual predestinarian sense
  rationale: The verse clearly speaks of a people designated as elect/chosen by God, but it does not here resolve broader debates about the nature of election. The translation preserves the biblical term and theological tension without narrowing it.
  doctrine_reference: 'Affirmations and Translation philosophy #3: Preserve theological tension rather than resolve it.'
