id: MRK.13.20
reference: Mark 13:20
source:
  edition: SBLGNT
  text: καὶ εἰ μὴ ⸂ἐκολόβωσεν κύριος⸃ τὰς ἡμέρας, οὐκ ἂν ἐσώθη πᾶσα σάρξ. ἀλλὰ διὰ τοὺς ἐκλεκτοὺς οὓς ἐξελέξατο ἐκολόβωσεν τὰς ἡμέρας.
translation:
  text: And if the Lord had not cut short the days[a], no flesh would have been saved. But for the sake of the elect, whom he chose, he cut short the days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'no human being' / 'no one.' Literally, 'no flesh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκολόβωσεν
  chosen: cut short
  alternatives:
  - shortened
  - curtailed
  lexicon: BDAG
  rationale: The verb κολοβόω means to shorten or cut off. 'Cut short' is idiomatic modern English and preserves the concrete force better than the flatter 'shortened.' The same rendering is kept for both occurrences for consistency.
- source_word: κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' The article is supplied in English because the Greek anarthrous subject still functions as a definite referent in context.
- source_word: τὰς ἡμέρας
  chosen: the days
  lexicon: BDAG
  rationale: A straightforward rendering. The plural refers to the period of tribulation just described, so 'the days' preserves the temporal reference without over-specifying.
- source_word: οὐκ ἂν ἐσώθη
  chosen: would have been saved
  alternatives:
  - would have survived
  - would have been preserved alive
  lexicon: BDAG
  rationale: The combination with ἄν marks a contrary-to-fact result. 'Would have been saved' is the most direct rendering of σῴζω here. Although the sense is physical preservation in context, 'saved' should be retained because it is the lexical meaning and does not require narrowing to mere survival in the main text.
- source_word: πᾶσα σάρξ
  chosen: no flesh
  alternatives:
  - no one
  - no human being
  lexicon: BDAG
  rationale: σάρξ here is an idiom for living humanity, not the Pauline metaphor 'sinful nature.' Following the doctrine guidance, 'flesh' is preserved where literal or idiomatic, and 'no flesh' reflects the Semitic/Greek biblical idiom with solemn force. A footnote preserves the smoother sense 'no human being.'
- source_word: διὰ τοὺς ἐκλεκτούς
  chosen: for the sake of the elect
  alternatives:
  - because of the chosen ones
  lexicon: BDAG
  rationale: διά with the accusative here expresses reason or benefit. 'For the sake of' is natural English and preserves the idea that the shortening is done on behalf of the elect.
- source_word: ἐκλεκτούς
  chosen: the elect
  alternatives:
  - the chosen ones
  lexicon: BDAG
  rationale: ἐκλεκτός is conventionally and accurately rendered 'elect' in this theological context. 'Chosen ones' is possible, but 'elect' is concise and preserves the established biblical category without adding doctrinal precision beyond the text.
- source_word: οὓς ἐξελέξατο
  chosen: whom he chose
  alternatives:
  - whom he selected
  - whom he elected
  lexicon: BDAG
  rationale: The relative clause is rendered transparently. 'Chose' is the natural English equivalent of ἐκλέγομαι and avoids awkward repetition if rendered 'elected' after 'the elect.'
