id: MRK.13.2
reference: Mark 13:2
source:
  edition: SBLGNT
  text: καὶ ὁ ⸀Ἰησοῦς εἶπεν αὐτῷ· Βλέπεις ταύτας τὰς μεγάλας οἰκοδομάς; οὐ μὴ ἀφεθῇ ⸀ὧδε λίθος ἐπὶ ⸀λίθον ὃς οὐ μὴ καταλυθῇ.
translation:
  text: And Jesus said to him[c][b][a], “Do you see these great buildings? Not one stone will be left here upon another that will not be torn down.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'these great temple buildings.' The context is the temple complex, though the Greek simply says 'buildings.'
    reason: lexical_alternative
  - marker: b
    text: The expression 'not one stone ... upon another' is an idiom for complete destruction.
    reason: cultural_note
  - marker: c
    text: Or 'be destroyed' or 'be thrown down.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Βλέπεις
  chosen: Do you see
  alternatives:
  - You see
  - Look at
  lexicon: BDAG
  rationale: Present indicative used as a direct question. 'Do you see' preserves the interrogative force naturally in English better than a bare 'You see,' while avoiding the more imperative nuance of 'Look at.'
- source_word: οἰκοδομάς
  chosen: buildings
  alternatives:
  - structures
  - building complex
  lexicon: BDAG
  rationale: Plural noun referring to constructed edifices, here the temple buildings. 'Buildings' is the most natural and sufficiently concrete English rendering without over-specifying beyond the Greek.
- source_word: μεγάλας
  chosen: great
  alternatives:
  - large
  - massive
  lexicon: BDAG
  rationale: μέγας can denote size or impressiveness. 'Great' preserves both physical magnitude and the sense of grandeur in context.
- source_word: οὐ μὴ ἀφεθῇ
  chosen: will be left
  alternatives:
  - will certainly not be left
  - shall by no means be left
  lexicon: BDAG
  rationale: οὐ μή with aorist subjunctive gives emphatic future negation. English usually conveys this idiomatically with 'will not'; the force is retained by the sentence context without archaic wording.
- source_word: ὧδε
  chosen: here
  alternatives:
  - in this place
  lexicon: BDAG
  rationale: Adverb of place. 'Here' is direct and idiomatic, matching the demonstrative immediacy of Jesus' statement while looking at the temple complex.
- source_word: λίθος ἐπὶ λίθον
  chosen: stone ... upon another
  alternatives:
  - stone on stone
  - one stone upon another
  lexicon: BDAG
  rationale: This is a fixed idiomatic expression for total destruction. 'Not one stone will be left here upon another' is standard, clear English that preserves the imagery.
- source_word: καταλυθῇ
  chosen: be torn down
  alternatives:
  - be destroyed
  - be demolished
  - be thrown down
  lexicon: BDAG
  rationale: καταλύω in this context means to dismantle or destroy a structure. 'Be torn down' communicates the physical dismantling vividly and naturally. 'Thrown down' is possible but less idiomatic in contemporary English here.
- source_word: ὃς
  chosen: that
  alternatives:
  - which
  - that one
  lexicon: BDAG
  rationale: Relative pronoun referring back to 'stone.' In English, 'that will not be torn down' is the most natural restrictive relative clause.
- source_word: καὶ ὁ Ἰησοῦς εἶπεν αὐτῷ
  chosen: And Jesus said to him
  alternatives:
  - Then Jesus said to him
  - And Jesus answered him
  lexicon: BDAG
  rationale: Straightforward narrative introduction. 'And' reflects καί without importing temporal nuance; 'said to him' matches εἶπεν αὐτῷ without adding the stronger dialogical sense of 'answered.'
