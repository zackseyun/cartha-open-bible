theological_decisions:
- issue: Scope of Jesus' prediction regarding the temple complex
  chosen_reading: Render οἰκοδομάς generically as 'buildings' rather than explicitly 'temple buildings' in the main text.
  alternative_readings:
  - these great temple buildings
  rationale: The immediate context makes the referent clear, but the Greek itself says 'buildings.' Retaining the more literal term avoids adding an interpretive noun not present in the text while still allowing readers to infer the temple setting from context.
  doctrine_reference: Translation philosophy §1, Original-language primacy over translation tradition.
