id: MRK.13.36
reference: Mark 13:36
source:
  edition: SBLGNT
  text: μὴ ἐλθὼν ἐξαίφνης εὕρῃ ὑμᾶς καθεύδοντας·
translation:
  text: lest he come suddenly and find you sleeping.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unexpectedly.'
    reason: lexical_alternative
  - marker: b
    text: Or 'asleep.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ
  chosen: lest
  alternatives:
  - so that ... not
  - otherwise
  lexicon: BDAG
  rationale: In this warning context, μή introduces a negative purpose/result nuance
    dependent on the previous imperative ('stay awake'). 'Lest' preserves the compact
    cautionary force better than a more expanded paraphrase.
- source_word: ἐλθὼν
  chosen: coming
  alternatives:
  - having come
  - when he comes
  lexicon: BDAG
  rationale: Aorist participle of ἔρχομαι, functioning adverbially with εὕρῃ. 'Coming'
    is natural English and preserves the participial linkage without over-translating
    the temporal nuance. 'When he comes' is possible but slightly more interpretive.
- source_word: ἐξαίφνης
  chosen: suddenly
  alternatives:
  - unexpectedly
  - all at once
  lexicon: BDAG
  rationale: The adverb denotes suddenness. 'Suddenly' is the most direct equivalent;
    'unexpectedly' captures implication but shifts from manner to effect.
- source_word: εὕρῃ
  chosen: he find
  alternatives:
  - he may find
  - he should find
  lexicon: BDAG
  rationale: Aorist subjunctive after μή in a warning clause. English idiom after
    'lest' naturally uses the bare form 'he find,' which preserves the dependent,
    potential sense without awkwardness.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Direct object plural. English 'you' does not mark number, but the plural
    is clear from context as Jesus addresses multiple disciples.
- source_word: καθεύδοντας
  chosen: sleeping
  alternatives:
  - asleep
  lexicon: BDAG
  rationale: Present participle accusative plural modifying ὑμᾶς. 'Sleeping' preserves
    the verbal aspect and echoes the watchfulness theme in the discourse. 'Asleep'
    is idiomatic but slightly less vivid as an ongoing action/state discovered at
    his arrival.
