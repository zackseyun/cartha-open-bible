theological_decisions:
- issue: Whether to make explicit the subject of 'coming' and 'find' as 'he' rather
    than repeating 'the master' or 'the Son of Man'
  chosen_reading: Retain the pronoun 'he'
  alternative_readings:
  - lest the master, coming suddenly, find you sleeping
  - lest he, when he comes suddenly, find you sleeping
  rationale: The Greek verse itself uses participle plus verb without restating the
    antecedent. English 'he' preserves the immediate syntax and leaves the antecedent
    to the prior context, maintaining the discourse flow without importing additional
    wording into this verse.
