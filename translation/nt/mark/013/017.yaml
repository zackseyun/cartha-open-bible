id: MRK.13.17
reference: Mark 13:17
source:
  edition: SBLGNT
  text: οὐαὶ δὲ ταῖς ἐν γαστρὶ ἐχούσαις καὶ ταῖς θηλαζούσαις ἐν ἐκείναις ταῖς ἡμέραις.
translation:
  text: But woe to those who are pregnant and to those who are nursing infants in those days[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who are with child.'
    reason: lexical_alternative
  - marker: b
    text: Or 'those who are nursing babies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐαί
  chosen: woe
  alternatives:
  - alas
  lexicon: BDAG
  rationale: Retains the prophetic/exclamatory force of lament and warning. 'Woe' is the standard concise English equivalent and carries the gravity of impending distress better than the softer 'alas.'
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks a mild transition or development from the preceding warning. 'But' fits natural English and preserves the discourse shift without overstating contrast.
- source_word: ταῖς ἐν γαστρὶ ἐχούσαις
  chosen: those who are pregnant
  alternatives:
  - pregnant women
  - those who are with child
  lexicon: BDAG
  rationale: The idiom ἐν γαστρὶ ἔχω literally means 'to have in the womb' and idiomatically means 'to be pregnant.' 'Those who are pregnant' is clear modern English and preserves the feminine plural reference without archaic phrasing like 'with child.'
- source_word: γαστρί
  chosen: pregnant
  alternatives:
  - womb
  - belly
  lexicon: BDAG
  rationale: Although γαστήρ literally refers to the belly/womb, in this idiom it should be rendered by the full English sense rather than woodenly translated.
- source_word: θηλαζούσαις
  chosen: those who are nursing infants
  alternatives:
  - those who are nursing
  - those who are breastfeeding
  - mothers nursing babies
  lexicon: BDAG
  rationale: θηλάζω denotes suckling/nursing a child. 'Nursing infants' makes the object implicit in Greek explicit in natural English and clarifies the hardship envisioned. 'Breastfeeding' is possible but slightly more clinical in tone.
- source_word: ἐν ἐκείναις ταῖς ἡμέραις
  chosen: in those days
  alternatives:
  - during those days
  lexicon: BDAG
  rationale: A straightforward temporal phrase. 'In those days' is idiomatic, natural, and preserves the eschatological/discourse linkage to the surrounding context.
