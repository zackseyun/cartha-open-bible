theological_decisions:
- issue: Implicit subject/object of γένηται
  chosen_reading: The clause refers generally to the anticipated event/circumstance
    of the disciples' flight or the crisis just described, rendered impersonally as
    'it may not happen.'
  alternative_readings:
  - that your flight may not happen in winter
  rationale: The Greek text here does not explicitly include 'your flight' (contrast
    Matt 24:20). To avoid importing wording from the parallel passage, the translation
    preserves Mark's terser, more elliptical expression with an impersonal subject.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3
    (preserve tension rather than resolve it)
