id: MRK.13.18
reference: Mark 13:18
source:
  edition: SBLGNT
  text: προσεύχεσθε δὲ ἵνα μὴ ⸀γένηται χειμῶνος·
translation:
  text: But pray that it may not happen in winter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly in light of the context, 'that your flight may not happen
      in winter.' Mark's Greek is more elliptical than the parallel in Matt 24:20.
    reason: alternative_reading
lexical_decisions:
- source_word: προσεύχεσθε
  chosen: pray
  alternatives:
  - keep praying
  - pray earnestly
  lexicon: BDAG
  rationale: Present middle/deponent imperative, second person plural. Rendered as
    the simple imperative 'pray' in natural English; the plural is not separately
    marked in English. 'Keep praying' is possible from the present imperative aspect,
    but would over-specify aspectual nuance here.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild connective/transition. 'But' fits the discourse flow
    after the preceding warning and keeps the adversative nuance better than a bare
    'and'.
- source_word: ἵνα μὴ
  chosen: that ... not
  alternatives:
  - so that ... not
  - lest
  lexicon: BDAG
  rationale: Introduces the content/purpose of the prayer with negation. In idiomatic
    English after 'pray,' 'that ... not' is the most natural equivalent. 'Lest' is
    too archaic for the stated translation philosophy.
- source_word: γένηται
  chosen: it may not happen
  alternatives:
  - it may not occur
  - it may not be
  lexicon: BDAG
  rationale: Aorist middle subjunctive of γίνομαι. In this context the verb refers
    elliptically to the event of the flight/tribulation circumstance mentioned in
    the surrounding discourse. 'Happen' is idiomatic and clear; 'be' would be too
    vague in English.
- source_word: χειμῶνος
  chosen: in winter
  alternatives:
  - during winter
  - in the winter season
  lexicon: BDAG
  rationale: Genitive of time/season used adverbially. English idiom requires a preposition;
    'in winter' is concise and natural.
