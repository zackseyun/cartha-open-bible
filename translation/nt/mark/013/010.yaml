id: MRK.13.10
reference: Mark 13:10
source:
  edition: SBLGNT
  text: καὶ εἰς πάντα τὰ ἔθνη ⸂πρῶτον δεῖ⸃ κηρυχθῆναι τὸ εὐαγγέλιον.
translation:
  text: And the good news must first be proclaimed to all the nations[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the gospel.' The Greek εὐαγγέλιον literally means 'good news.'
    reason: lexical_alternative
  - marker: b
    text: Or 'among all the nations'; ἔθνη can also mean 'Gentiles' in some contexts.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰς πάντα τὰ ἔθνη
  chosen: to all the nations
  alternatives:
  - among all the nations
  - to all nations
  - to all the Gentiles
  lexicon: BDAG
  rationale: εἰς with κηρυχθῆναι can express direction/scope ('to/among'). ἔθνη can mean 'nations' or, in some contexts, 'Gentiles.' Here the eschatological/global sense is best captured by 'all the nations,' which preserves the ethnic-national breadth without prematurely narrowing it to 'Gentiles' alone.
- source_word: πρῶτον
  chosen: first
  alternatives:
  - beforehand
  - first of all
  lexicon: BDAG
  rationale: πρῶτον marks temporal priority. 'First' is concise and preserves the sequence implied in Jesus' discourse without over-interpreting what follows chronologically.
- source_word: δεῖ
  chosen: must
  alternatives:
  - it is necessary
  - it is required
  lexicon: BDAG
  rationale: δεῖ expresses necessity, often with divine or eschatological force in the Gospels. 'Must' is the most natural English equivalent and preserves the sense of necessity without adding explicit theological explanation not stated in the text.
- source_word: κηρυχθῆναι
  chosen: be proclaimed
  alternatives:
  - be preached
  - be announced
  - be heralded
  lexicon: BDAG
  rationale: The aorist passive infinitive of κηρύσσω denotes public proclamation. 'Be proclaimed' is slightly broader and more natural for modern readers than 'be preached,' while still retaining the formal sense of heralding a message.
- source_word: τὸ εὐαγγέλιον
  chosen: the good news
  alternatives:
  - the gospel
  lexicon: BDAG
  rationale: εὐαγγέλιον literally means 'good news.' Following the translation philosophy's preference for readable modern English and original-language sense over tradition inertia, 'the good news' communicates the meaning clearly. 'The gospel' is preserved as an alternative because of its strong traditional recognition.
- source_word: καὶ
  chosen: And
  alternatives:
  - Also
  - But
  lexicon: BDAG
  rationale: καὶ here continues the discourse. 'And' preserves the connective force without imposing a stronger adversative nuance.
