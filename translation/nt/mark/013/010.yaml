theological_decisions:
- issue: Scope of ἔθνη
  chosen_reading: all the nations
  alternative_readings:
  - all nations
  - all the Gentiles
  rationale: The verse speaks of the universal scope of gospel proclamation before the end, but the Greek term ἔθνη can denote either nations generally or Gentiles specifically depending on context. Rendering it 'all the nations' preserves the broad, global sense and avoids importing a narrower Jew/Gentile contrast not explicit here.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
- issue: Force of δεῖ
  chosen_reading: must
  alternative_readings:
  - it is necessary
  rationale: The necessity expressed by δεῖ may imply divine necessity in Mark's theology, but the text itself does not explicitly state the source of that necessity here. 'Must' preserves the force while avoiding interpretive expansion.
  doctrine_reference: Do not import doctrinal claims the text does not make.
