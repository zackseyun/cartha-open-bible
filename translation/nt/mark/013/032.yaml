theological_decisions:
- issue: Christological statement that the Son does not know the day or hour
  chosen_reading: Retain the plain wording 'nor the Son' without softening or explanatory
    expansion.
  alternative_readings:
  - Add interpretive qualifiers such as 'in his humanity' in the main text
  - Omit the phrase to align with later manuscript traditions in parallel passages
  rationale: The Greek text explicitly includes οὐδὲ ὁ υἱός. In keeping with original-language
    primacy and the instruction to preserve theological tension rather than resolve
    it, the translation leaves the statement intact without importing later doctrinal
    explanation into the main text. Historic orthodoxy affirmed in DOCTRINE.md requires
    that the verse not be rendered in a way that denies Christ's full deity, but that
    theological synthesis belongs outside the translation line itself.
  doctrine_reference: 'Affirmations (Nicene Creed; Chalcedon); Translation philosophy
    #1 and #3'
