id: MRK.13.32
reference: Mark 13:32
source:
  edition: SBLGNT
  text: Περὶ δὲ τῆς ἡμέρας ἐκείνης ἢ ⸀τῆς ὥρας οὐδεὶς οἶδεν, οὐδὲ οἱ ἄγγελοι ⸀ἐν οὐρανῷ
    οὐδὲ ὁ υἱός, εἰ μὴ ὁ πατήρ.
translation:
  text: But concerning that day or hour, no one knows—not even the angels in heaven,
    nor the Son, but only the Father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some interpreters understand 'nor the Son' with reference to the Son's incarnate
      mission or human nature; the translation preserves the wording of the Greek
      text without adding that explanation to the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: Περὶ δὲ
  chosen: But concerning
  alternatives:
  - Now concerning
  - About
  lexicon: BDAG
  rationale: περί with the genitive introduces the topic ('concerning/about'), and
    δέ marks a mild transition or contrast from the preceding material. 'But concerning'
    preserves both the topical shift and the discourse contrast naturally in English.
- source_word: τῆς ἡμέρας ἐκείνης ἢ τῆς ὥρας
  chosen: that day or hour
  alternatives:
  - that day or that hour
  - that day or the hour
  lexicon: BDAG
  rationale: The paired genitives specify the time in question. English idiom naturally
    omits the repeated article in 'that day or hour' while preserving the distinction
    between broader 'day' and more specific 'hour.'
- source_word: οὐδεὶς οἶδεν
  chosen: no one knows
  alternatives:
  - nobody knows
  - no one has known
  lexicon: BDAG
  rationale: οὐδείς is an indefinite negative pronoun, and οἶδα, though formally perfect,
    commonly carries present meaning ('know'). 'No one knows' is the standard, natural
    rendering.
- source_word: οὐδὲ οἱ ἄγγελοι ἐν οὐρανῷ
  chosen: not even the angels in heaven
  alternatives:
  - nor even the angels in heaven
  - not even the angels who are in heaven
  lexicon: BDAG
  rationale: οὐδέ extends the negation emphatically. 'Not even' captures the climactic
    force better than a bare 'nor.' ἐν οὐρανῷ is best taken locatively, modifying
    'angels' as 'in heaven.'
- source_word: οὐδὲ ὁ υἱός
  chosen: nor the Son
  alternatives:
  - not even the Son
  lexicon: BDAG
  rationale: The repeated οὐδέ continues the negated series. 'Nor the Son' reads smoothly
    after the dash and preserves the stark force of the Greek. 'The Son' is retained
    as a christological title, not paraphrased.
- source_word: εἰ μὴ ὁ πατήρ
  chosen: but only the Father
  alternatives:
  - except the Father
  - if not the Father
  lexicon: BDAG
  rationale: εἰ μή after a negation introduces the sole exception. 'But only the Father'
    is idiomatic English and clearly expresses exclusivity.
