theological_decisions:
- issue: Force of Jesus' warning and prior disclosure
  chosen_reading: Jesus emphasizes that the disciples must remain alert because he
    has already disclosed all necessary matters in advance.
  alternative_readings:
  - Jesus means he has told them every detail exhaustively.
  - Jesus refers only to the immediately preceding warnings.
  rationale: The verse is pastoral and admonitory, not a claim of exhaustive disclosure
    of every future detail. 'Everything' should be read in context as the relevant
    warnings and signs he intends the disciples to know.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
