id: MRK.13.23
reference: Mark 13:23
source:
  edition: SBLGNT
  text: ὑμεῖς δὲ βλέπετε· ⸀προείρηκα ὑμῖν πάντα.
translation:
  text: But you, watch out; I have told you everything beforehand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be on guard' or 'see to it.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I have said beforehand' or 'I have forewarned you of everything.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: Second-person plural pronoun is explicit and emphatic in position. English
    normally does not require an explicit subject, but retaining 'you' helps preserve
    the contrastive emphasis.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks contrast or transition with what precedes; 'But' best reflects
    the adversative force in this warning context.
- source_word: βλέπετε
  chosen: watch out
  alternatives:
  - be on guard
  - see to it
  - look
  lexicon: BDAG
  rationale: Present active imperative/plural functions idiomatically as a warning
    to remain alert. 'Watch out' is natural modern English and preserves the urgency
    better than the more literal 'look'.
- source_word: προείρηκα
  chosen: I have told beforehand
  alternatives:
  - I have said beforehand
  - I have forewarned
  lexicon: BDAG
  rationale: Perfect tense indicates a prior statement with continuing relevance.
    The compound verb means to say/tell in advance. In idiomatic English, 'I have
    told ... beforehand' preserves both advance notice and present force.
- source_word: ὑμῖν
  chosen: you
  lexicon: BDAG
  rationale: 'Dative indirect object after the verb of speaking: ''to you.'' English
    expresses this naturally as ''told you.'''
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  - all this
  lexicon: BDAG
  rationale: Neuter plural accusative meaning 'all things' or 'everything.' 'Everything'
    is the most natural English rendering here, referring comprehensively to the matters
    Jesus has just described.
