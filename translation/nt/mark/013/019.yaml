id: MRK.13.19
reference: Mark 13:19
source:
  edition: SBLGNT
  text: ἔσονται γὰρ αἱ ἡμέραι ἐκεῖναι θλῖψις οἵα οὐ γέγονεν τοιαύτη ἀπ’ ἀρχῆς κτίσεως
    ⸀ἣν ἔκτισεν ὁ θεὸς ἕως τοῦ νῦν καὶ οὐ μὴ γένηται.
translation:
  text: For those days will be a tribulation such as has not happened from the beginning
    of the creation that God created until now, and never will happen again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'such as has never been from the beginning of creation that God created
      until now, and never will be.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θλῖψις
  chosen: tribulation
  alternatives:
  - distress
  - affliction
  lexicon: BDAG
  rationale: Rendered as 'tribulation' because in this eschatological discourse the
    noun denotes severe affliction of extraordinary scope, and 'tribulation' preserves
    both the gravity and the traditional apocalyptic resonance without becoming opaque.
- source_word: οἵα οὐ γέγονεν τοιαύτη
  chosen: such as has not happened
  alternatives:
  - the like of which has not occurred
  - such as has never been
  lexicon: BDAG
  rationale: This comparative construction intensifies the uniqueness of the coming
    distress. 'Such as has not happened' is natural English that preserves the force
    of the Greek comparison without unnecessary redundancy.
- source_word: ἀπ’ ἀρχῆς κτίσεως
  chosen: from the beginning of the creation
  alternatives:
  - since the beginning of creation
  lexicon: BDAG
  rationale: Kept the genitival construction explicit with 'the creation' to reflect
    the Greek wording closely and to prepare for the following relative clause.
- source_word: ἣν ἔκτισεν ὁ θεὸς
  chosen: that God created
  alternatives:
  - which God created
  lexicon: BDAG
  rationale: Translated directly and explicitly. The clause is somewhat pleonastic
    in English but should be preserved because it is present in the Greek and underscores
    God as creator.
- source_word: ἕως τοῦ νῦν
  chosen: until now
  alternatives:
  - up to now
  lexicon: BDAG
  rationale: A straightforward temporal expression; 'until now' is idiomatic and accurate.
- source_word: οὐ μὴ γένηται
  chosen: never will happen again
  alternatives:
  - certainly will not happen
  - shall by no means occur
  lexicon: BDAG
  rationale: The emphatic negation οὐ μὴ with the aorist subjunctive conveys strong
    denial regarding future occurrence. 'Never will happen again' captures both the
    future orientation and emphatic finality in natural English.
- source_word: ἔσονται ... αἱ ἡμέραι ἐκεῖναι θλῖψις
  chosen: those days will be a tribulation
  alternatives:
  - those days will be tribulation
  - those days will bring tribulation
  lexicon: BDAG
  rationale: 'Although the Greek is slightly compressed, the sense is predicative:
    those days will constitute a period of tribulation. ''A tribulation'' gives clear
    English syntax while preserving the nominal predicate.'
