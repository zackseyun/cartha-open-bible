theological_decisions:
- issue: Scope of 'creation' language
  chosen_reading: Retained 'the creation that God created' as a reference to the created
    order without narrowing it to a merely local or covenantal beginning.
  alternative_readings:
  - from the beginning of the world
  - from the beginning of the created order in a more idiomatic paraphrase
  rationale: The Greek explicitly uses κτίσις and κτίζω with God as subject. The translation
    preserves the creational scope and avoids reducing the statement to a less explicit
    idiom. This reflects the text's own wording without importing a specific eschatological
    system.
  doctrine_reference: Translation philosophy §§1, 3, 5
