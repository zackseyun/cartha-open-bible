  rationale: The Greek expression most naturally reads as 'this generation.' Because
    the phrase is heavily debated in interpretation, the translation should preserve
    the wording and tension of the source text rather than resolve it toward a specific
    eschatological system.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
