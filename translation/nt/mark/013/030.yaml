id: MRK.13.30
reference: Mark 13:30
source:
  edition: SBLGNT
  text: ἀμὴν λέγω ὑμῖν ὅτι οὐ μὴ παρέλθῃ ἡ γενεὰ αὕτη μέχρις οὗ ⸂ταῦτα πάντα⸃ γένηται.
translation:
  text: Truly I say to you that this generation will certainly not pass away until
    all these things happen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this people' or 'this race'; Greek γενεά can bear broader senses, though
      'generation' is the most natural rendering here.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'will certainly not pass away' renders an emphatic Greek negation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  lexicon: BDAG
  rationale: Introduces a solemn, authoritative saying. In the Synoptics as a discourse
    marker, 'Truly' is natural modern English while preserving the force better than
    leaving it untranslated as 'Amen.'
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A standard direct-address formula. 'I say to you' is slightly more formal
    and preserves the Greek wording closely without sounding unnatural.
- source_word: οὐ μὴ παρέλθῃ
  chosen: will certainly not pass away
  alternatives:
  - will by no means pass away
  - will never pass away
  lexicon: BDAG
  rationale: οὐ μή with the aorist subjunctive is an emphatic negation. 'Will certainly
    not pass away' communicates the strong denial in clear modern English.
- source_word: ἡ γενεὰ αὕτη
  chosen: this generation
  alternatives:
  - this age-group
  - this people
  lexicon: BDAG
  rationale: γενεά most naturally means 'generation' here in the temporal/discursive
    context. Although broader senses such as 'people' or 'race' have been proposed,
    the immediate context favors the ordinary sense, and interpretive tension should
    be preserved rather than softened.
- source_word: μέχρις οὗ
  chosen: until
  alternatives:
  - before
  - up to the time when
  lexicon: BDAG
  rationale: The phrase marks a temporal limit. 'Until' is the most natural concise
    rendering.
- source_word: ταῦτα πάντα
  chosen: all these things
  alternatives:
  - all this
  - these things, all of them
  lexicon: BDAG
  rationale: The plural demonstrative plus πᾶς is best represented explicitly as 'all
    these things,' matching the discourse reference to the preceding signs/events.
- source_word: γένηται
  chosen: happen
  alternatives:
  - take place
  - come to pass
  lexicon: BDAG
  rationale: γίνομαι in this eschatological context refers to events occurring. 'Happen'
    is clear modern English; 'take place' is possible but slightly more formal.
