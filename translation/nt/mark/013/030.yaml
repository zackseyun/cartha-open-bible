- issue: Meaning of 'this generation' (ἡ γενεὰ αὕτη) in an eschatological discourse
  chosen_reading: Rendered straightforwardly as 'this generation' without interpretive
    expansion.
  alternative_readings:
  - '''this people''/''this race'''
