id: MRK.13.1
reference: Mark 13:1
source:
  edition: SBLGNT
  text: Καὶ ἐκπορευομένου αὐτοῦ ἐκ τοῦ ἱεροῦ λέγει αὐτῷ εἷς τῶν μαθητῶν αὐτοῦ· Διδάσκαλε, ἴδε ποταποὶ λίθοι καὶ ποταπαὶ οἰκοδομαί.
translation:
  text: And as he was going out of the temple[a], one of his disciples says to him, “Teacher[b], look—what wonderful stones and what wonderful buildings!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἱερόν refers to the temple complex or precincts, not specifically the inner sanctuary.
    reason: lexical_alternative
  - marker: b
    text: Or 'what great stones and what great buildings!' The Greek adjective expresses astonishment or admiration.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκπορευομένου αὐτοῦ
  chosen: as he was going out
  alternatives:
  - while he was going out
  - as he was leaving
  lexicon: BDAG
  rationale: Genitive absolute with present participle conveys contemporaneous action. 'As he was going out' preserves the ongoing sense naturally in English.
- source_word: τοῦ ἱεροῦ
  chosen: the temple
  alternatives:
  - the temple precincts
  - the temple complex
  lexicon: BDAG
  rationale: ἱερόν refers broadly to the temple area rather than specifically the sanctuary (ναός). 'The temple' is the standard readable rendering, with the broader sense noted by alternatives.
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  - is saying
  lexicon: BDAG
  rationale: Historical present in Mark. Rendering as present ('says') preserves Mark's vivid narrative style better than smoothing to past tense.
- source_word: εἷς τῶν μαθητῶν αὐτοῦ
  chosen: one of his disciples
  lexicon: BDAG
  rationale: Straightforward partitive expression; no reason to expand or paraphrase.
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of address meaning 'Teacher.' This is the clearest modern English equivalent and avoids the potentially misleading connotations of 'Master' here.
- source_word: ἴδε
  chosen: look
  alternatives:
  - see
  - behold
  lexicon: BDAG
  rationale: Imperative drawing attention. 'Look' is natural modern English; 'behold' is too archaic for the stated philosophy.
- source_word: ποταποὶ ... καὶ ποταπαὶ
  chosen: what wonderful ... and what wonderful ...
  alternatives:
  - what great ... and what great ...
  - what impressive ... and what impressive ...
  - what manner of ... and what manner of ...
  lexicon: BDAG
  rationale: ποταπός is an exclamatory adjective expressing astonishment at quality or kind. 'What wonderful' captures the disciple's admiration in idiomatic English better than the overly literal 'what manner of.'
- source_word: λίθοι
  chosen: stones
  alternatives:
  - stones of the temple
  lexicon: BDAG
  rationale: Literal reference to the temple stones; no need to specify further in the main text.
- source_word: οἰκοδομαί
  chosen: buildings
  alternatives:
  - structures
  lexicon: BDAG
  rationale: Plural noun referring to the temple buildings/structures. 'Buildings' is clear and natural.
