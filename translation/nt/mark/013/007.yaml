theological_decisions:
- issue: Eschatological necessity in δεῖ γενέσθαι
  chosen_reading: Render δεῖ as 'must' to preserve the sense of divine or prophetic necessity without specifying a detailed theological system.
  alternative_readings:
  - '''has to happen'''
  - '''it is necessary that it happen'''
  rationale: The verse states necessity but does not explain its mechanism. 'Must happen' preserves the text's force while avoiding importation of a particular end-times framework or deterministic philosophical claim beyond the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it.
