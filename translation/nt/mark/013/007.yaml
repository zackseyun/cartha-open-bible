id: MRK.13.7
reference: Mark 13:7
source:
  edition: SBLGNT
  text: ὅταν δὲ ⸀ἀκούσητε πολέμους καὶ ἀκοὰς πολέμων, μὴ θροεῖσθε· ⸀δεῖ γενέσθαι, ἀλλ’ οὔπω τὸ τέλος.
translation:
  text: And when you hear of wars and reports of wars[a], do not be alarmed; these things must happen, but the end is not yet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rumors of wars.' The Greek can refer to reports, news, or rumors being heard about wars.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν δὲ
  chosen: And when
  alternatives:
  - Now when
  - But when
  lexicon: BDAG
  rationale: ὅταν introduces a temporal contingency ('when/whenever'), and δέ is a mild connective. 'And when' gives natural English flow while preserving the discourse connection without overstating contrast.
- source_word: ἀκούσητε
  chosen: you hear
  alternatives:
  - you hear of
  - you hear about
  lexicon: BDAG
  rationale: Aorist subjunctive under ὅταν is naturally rendered with present sense in English in a future-oriented temporal clause. 'You hear' is the core sense; 'of' is supplied idiomatically in English with the following objects.
- source_word: πολέμους
  chosen: wars
  lexicon: BDAG
  rationale: Direct and standard rendering of πόλεμος in the accusative plural.
- source_word: ἀκοὰς πολέμων
  chosen: reports of wars
  alternatives:
  - rumors of wars
  - news of wars
  lexicon: BDAG
  rationale: ἀκοή can denote 'report,' 'news,' or 'hearing.' 'Reports of wars' is slightly broader and more literal than the traditional 'rumors of wars,' which may imply unverified hearsay more strongly than the Greek requires. The traditional alternative is worth preserving in a footnote because of familiarity and possible nuance.
- source_word: μὴ θροεῖσθε
  chosen: do not be alarmed
  alternatives:
  - do not be troubled
  - do not be frightened
  lexicon: BDAG
  rationale: θροέομαι conveys being disturbed, alarmed, or thrown into panic. 'Do not be alarmed' is idiomatic modern English and fits the eschatological warning context well.
- source_word: δεῖ γενέσθαι
  chosen: these things must happen
  alternatives:
  - it must happen
  - it is necessary for this to happen
  lexicon: BDAG
  rationale: δεῖ expresses necessity, and γενέσθαι here means 'to happen/come to pass.' English commonly supplies an explicit subject from context; 'these things' clarifies the reference to wars and reports of wars without adding new content.
- source_word: ἀλλ’ οὔπω τὸ τέλος
  chosen: but the end is not yet
  alternatives:
  - but it is not yet the end
  lexicon: BDAG
  rationale: τέλος here refers to the eschatological end. 'But the end is not yet' is concise, natural, and preserves the emphasis of οὔπω.
