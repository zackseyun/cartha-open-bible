id: MRK.10.31
reference: Mark 10:31
source:
  edition: SBLGNT
  text: πολλοὶ δὲ ἔσονται πρῶτοι ἔσχατοι καὶ ⸀οἱ ἔσχατοι πρῶτοι.
translation:
  text: But many who are first will be last[a], and the last first.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'many people who are first will be last, and those who are last, first.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - many people
  lexicon: BDAG
  rationale: The adjective is substantival here and refers to a broad group rather than every individual. 'Many' is concise and idiomatic in English, preserving the open-ended scope without adding 'people' unnecessarily.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition. 'But' best reflects the adversative force in context, especially following Jesus' promise of reward in the previous verse and introducing a reversal principle.
- source_word: ἔσονται
  chosen: will be
  alternatives:
  - shall be
  lexicon: BDAG
  rationale: Future middle of εἰμί functions as a simple future copula here. 'Will be' is standard modern English; 'shall be' is unnecessarily archaic.
- source_word: πρῶτοι
  chosen: first
  alternatives:
  - foremost
  lexicon: BDAG
  rationale: πρῶτος here denotes rank or position, not merely sequence. 'First' is the established and most natural English equivalent and preserves the aphoristic parallelism.
- source_word: ἔσχατοι
  chosen: last
  alternatives:
  - least
  - final
  lexicon: BDAG
  rationale: In this reversal saying, ἔσχατος contrasts with πρῶτος in terms of status or position. 'Last' preserves the direct antithesis and echoes the broader Synoptic usage.
- source_word: οἱ ἔσχατοι
  chosen: the last
  alternatives:
  - those who are last
  lexicon: BDAG
  rationale: The article makes the phrase substantival. English can naturally render this as 'the last' without loss. This keeps the second clause compact and balanced with the first.
- source_word: καὶ
  chosen: and
  alternatives:
  - while
  lexicon: BDAG
  rationale: The conjunction simply links the two halves of the saying. 'And' preserves the parallel structure without importing a more interpretive nuance.
