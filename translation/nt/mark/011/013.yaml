id: MRK.11.13
reference: Mark 11:13
source:
  edition: SBLGNT
  text: καὶ ἰδὼν συκῆν ⸀ἀπὸ μακρόθεν ἔχουσαν φύλλα ἦλθεν εἰ ἄρα ⸂τι εὑρήσει⸃ ἐν αὐτῇ, καὶ ἐλθὼν ἐπ’ αὐτὴν οὐδὲν εὗρεν εἰ μὴ φύλλα, ⸂ὁ γὰρ καιρὸς οὐκ ἦν⸃ σύκων.
translation:
  text: And seeing from a distance a fig tree having leaves[a], he went to see whether perhaps he would find anything on it. But when he came to it, he found nothing except leaves, for it was not the season for figs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for it was not the time for figs.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν
  chosen: seeing
  alternatives:
  - when he saw
  - after seeing
  lexicon: BDAG
  rationale: A participial form best carried by 'seeing' in smooth English, preserving the temporal-circumstantial sense without over-specifying sequence.
- source_word: συκῆν
  chosen: a fig tree
  alternatives:
  - a fig tree plant
  lexicon: BDAG
  rationale: Standard lexical sense; 'fig tree' is the natural English equivalent.
- source_word: ἀπὸ μακρόθεν
  chosen: from a distance
  alternatives:
  - from afar
  lexicon: BDAG
  rationale: Modern, readable English that preserves the spatial sense.
- source_word: ἔχουσαν φύλλα
  chosen: with leaves
  alternatives:
  - having leaves
  - in leaf
  lexicon: BDAG
  rationale: '''With leaves'' is idiomatic and clear. ''In leaf'' is possible but slightly more interpretive and less direct.'
- source_word: ἦλθεν εἰ ἄρα τι εὑρήσει ἐν αὐτῇ
  chosen: he went to see whether perhaps he would find anything on it
  alternatives:
  - he went if perhaps he might find anything on it
  - he went to see if perhaps he would find anything on it
  lexicon: BDAG
  rationale: The construction expresses purpose/expectation. 'Went to see whether perhaps' communicates the tentative sense of εἰ ἄρα naturally in English while preserving the uncertainty.
- source_word: ἐν αὐτῇ
  chosen: on it
  alternatives:
  - in it
  lexicon: BDAG
  rationale: Though ἐν is literally 'in,' English idiom for fruit on a tree is 'on it.' This is an optimal-equivalence adjustment for naturalness.
- source_word: ἐλθὼν ἐπ’ αὐτὴν
  chosen: when he came to it
  alternatives:
  - coming up to it
  - having come upon it
  lexicon: BDAG
  rationale: This renders the participle plus preposition naturally in English and avoids awkward repetition of 'came upon.'
- source_word: οὐδὲν εὗρεν εἰ μὴ φύλλα
  chosen: he found nothing except leaves
  alternatives:
  - he found nothing but leaves
  lexicon: BDAG
  rationale: '''Except leaves'' closely reflects εἰ μὴ while remaining idiomatic.'
- source_word: ὁ γὰρ καιρὸς οὐκ ἦν σύκων
  chosen: for it was not the season for figs
  alternatives:
  - for it was not the time for figs
  - for the season of figs had not yet come
  lexicon: BDAG
  rationale: καιρός here denotes the appropriate or appointed time/season. 'Season' is the clearest natural rendering in context. The clause is preserved straightforwardly without importing an explanation beyond the Greek.
