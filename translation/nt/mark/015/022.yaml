id: MRK.15.22
reference: Mark 15:22
source:
  edition: SBLGNT
  text: καὶ φέρουσιν αὐτὸν ἐπὶ ⸀τὸν ⸀Γολγοθᾶν τόπον, ὅ ἐστιν ⸀μεθερμηνευόμενον Κρανίου Τόπος.
translation:
  text: And they bring him to the place Golgotha[a], which is translated, “Place of a Skull.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Place of the Skull.” The Greek expression Κρανίου Τόπος lacks the article, so either “of a skull” or “of the skull” is possible in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: φέρουσιν
  chosen: bring
  alternatives:
  - lead
  - carry
  lexicon: BDAG
  rationale: Present tense is naturally rendered as a historical present in English narrative. 'Bring' fits the movement to a destination without over-specifying physical carrying; 'lead' is possible but less direct to φέρω here, and 'carry' may imply bodily transport not required by the context.
- source_word: ἐπὶ τὸν Γολγοθᾶν τόπον
  chosen: to the place Golgotha
  alternatives:
  - to Golgotha
  - to the place called Golgotha
  lexicon: BDAG
  rationale: ἐπί with accusative here marks movement toward a place. Retaining both τόπον and the proper name preserves the Greek expression more fully than simply 'to Golgotha.' 'Called' is not explicit in the Greek and is therefore omitted.
- source_word: Γολγοθᾶν
  chosen: Golgotha
  lexicon: BDAG
  rationale: Proper name is transliterated per translation philosophy ('Translate titles; transliterate names').
- source_word: μεθερμηνευόμενον
  chosen: is translated
  alternatives:
  - is interpreted
  - means
  lexicon: BDAG
  rationale: The participle explicitly denotes translation/interpretation into another expression. 'Is translated' best reflects the lexical sense and the explanatory function in context; 'means' is smoother but less precise.
- source_word: Κρανίου Τόπος
  chosen: Place of a Skull
  alternatives:
  - Skull Place
  - Place of the Skull
  lexicon: BDAG
  rationale: A fairly literal rendering preserves the genitive construction ('of a skull'). The anarthrous Greek does not require 'the skull,' so 'Place of a Skull' is preferred. 'Skull Place' is too wooden for readable English.
