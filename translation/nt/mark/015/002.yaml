theological_decisions:
- issue: Force of Jesus' reply Σὺ λέγεις
  chosen_reading: An intentionally restrained, somewhat ambiguous acknowledgment rendered as 'You say so.'
  alternative_readings:
  - 'A direct affirmation: ''Yes, it is as you say'''
  - A more literal but less idiomatic 'You say'
  rationale: The Greek does not explicitly supply 'yes,' and the translation should preserve the tension rather than resolve it into either an unqualified affirmation or a denial. 'You say so' communicates that Jesus places the wording on Pilate's lips while not rejecting it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
