theological_decisions:
- issue: Rendering of κύριος in the commandment citation
  chosen_reading: the Lord
  alternative_readings:
  - LORD
  - Master
  rationale: Per DOCTRINE.md, κύριος defaults to 'Lord.' Although the saying quotes
    Israel's confession rooted in the divine name tradition, the Greek text here reads
    κύριος, and 'the Lord' best matches both NT usage and the covenantal echo without
    importing small-caps conventions absent from the Greek.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Anthropological terms in the fourfold command
  chosen_reading: heart / soul / mind / strength
  alternative_readings:
  - heart / life / mind / strength
  - heart / self / understanding / might
  rationale: The translation preserves the distinct terms rather than collapsing them
    into a generalized statement about loving God wholly. This maintains the theological
    and rhetorical tension of the text's multi-faceted description of total devotion.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve theological
    tension rather than resolve it'
