id: MRK.12.30
reference: Mark 12:30
source:
  edition: SBLGNT
  text: καὶ ἀγαπήσεις κύριον τὸν θεόν σου ἐξ ὅλης ⸀τῆς καρδίας σου καὶ ἐξ ὅλης τῆς
    ψυχῆς σου καὶ ἐξ ὅλης τῆς διανοίας σου καὶ ἐξ ὅλης τῆς ἰσχύος ⸀σου.
translation:
  text: And you shall love the Lord your God with all your heart and with all your
    soul and with all your mind and with all your strength.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with all your life' for 'with all your soul' (ψυχῆς).
    reason: lexical_alternative
  - marker: b
    text: Or 'with all your understanding' for 'with all your mind' (διανοίας).
    reason: lexical_alternative
  - marker: c
    text: Or 'with all your might' for 'with all your strength' (ἰσχύος).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαπήσεις
  chosen: you shall love
  alternatives:
  - you must love
  - love
  lexicon: BDAG
  rationale: Future indicative used in citation of the commandment carries imperatival
    force, but 'you shall love' preserves the scriptural-command form and echoes the
    source closely without becoming archaic beyond standard biblical English.
- source_word: κύριον
  chosen: the Lord
  alternatives:
  - Lord
  - master
  lexicon: BDAG
  rationale: Rendered 'the Lord' per default for κύριος in DOCTRINE.md. The article
    is retained because the phrase is 'the Lord your God,' echoing the biblical covenantal
    formula.
- source_word: θεόν
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός in direct address/reference within the commandment
    formula.
- source_word: ἐξ
  chosen: with
  alternatives:
  - from
  - out of
  lexicon: BDAG
  rationale: Although ἐξ literally means 'from/out of,' in this idiom with faculties
    ('heart,' 'soul,' etc.) idiomatic English is 'with,' expressing total devotion
    by means of the whole person.
- source_word: ὅλης
  chosen: all
  alternatives:
  - the whole of
  - your whole
  lexicon: BDAG
  rationale: Repeated ὅλης emphasizes totality in each phrase. 'All' is concise, natural,
    and preserves the distributive repetition.
- source_word: καρδίας
  chosen: heart
  lexicon: BDAG
  rationale: '''Heart'' is the established and accurate rendering, denoting the inner
    center of volition and affection; no interpretive expansion is added in the main
    text.'
- source_word: ψυχῆς
  chosen: soul
  alternatives:
  - life
  - self
  lexicon: BDAG
  rationale: ψυχή can mean 'soul,' 'life,' or 'self.' In this commandment's traditional
    anthropological sequence, 'soul' best preserves the lexical distinction among
    the listed faculties while remaining understandable.
- source_word: διανοίας
  chosen: mind
  alternatives:
  - understanding
  - thought
  lexicon: BDAG
  rationale: διάνοια refers to the faculty of thinking/understanding. 'Mind' is the
    most natural English equivalent here and preserves distinction from 'heart' and
    'strength.'
- source_word: ἰσχύος
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: BDAG
  rationale: ἰσχύς denotes strength or might. 'Strength' is clear modern English and
    fits the familiar fourfold pattern in Mark's wording.
- source_word: καὶ ... καὶ ... καὶ ... καὶ
  chosen: and ... and ... and ... and
  alternatives:
  - omitting some repeated ands
  lexicon: Greek grammar
  rationale: The repeated καὶ is preserved to reflect the cumulative, emphatic structure
    of the Greek rather than smoothing it into a more compressed English list.
