theological_decisions:
- issue: Rendering the Shema's final clause and preserving its theological tension
  chosen_reading: the Lord our God, the Lord is one
  alternative_readings:
  - the Lord our God is one Lord
  - the Lord is our God, the Lord alone
  rationale: The Greek wording κύριος ὁ θεὸς ἡμῶν κύριος εἷς ἐστιν reflects the LXX form of Deut 6:4 and can be represented in more than one idiomatic English way. The chosen reading stays close to the Greek sequence and preserves the classic monotheistic confession without over-resolving whether the emphasis is on oneness, exclusivity, or both. Alternative renderings are preserved in a footnote to maintain auditability and theological tension.
  doctrine_reference: Translation philosophy §3; Contested terms table for κύριος
