id: MRK.12.29
reference: Mark 12:29
source:
  edition: SBLGNT
  text: ⸂ἀπεκρίθη ὁ Ἰησοῦς⸃ ὅτι Πρώτη ⸀ἐστίν· Ἄκουε, Ἰσραήλ, κύριος ὁ θεὸς ἡμῶν κύριος εἷς ἐστιν,
translation:
  text: 'Jesus answered[a], “The first is: Hear, O Israel, the Lord our God[b], the Lord is one.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the Lord our God is one Lord,” or “the Lord is our God, the Lord alone.” The Greek echoes Deuteronomy 6:4 and may emphasize God's oneness and/or exclusivity.
    reason: alternative_reading
  - marker: b
    text: Because this line quotes the Shema (Deut 6:4), “Lord” here reflects the Greek κύριος used in the Septuagint for the divine name YHWH.
    reason: cross_reference
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative rendering for ἀποκρίνομαι in dialogue. 'Answered' is idiomatic and preserves the responsive force without unnecessary expansion.
- source_word: Πρώτη
  chosen: The first
  alternatives:
  - The first commandment
  - First
  lexicon: BDAG
  rationale: The adjective stands substantivally/femininely, referring back to the implied 'commandment' from the context. 'The first' is concise and lets the context supply 'commandment' without adding more than necessary.
- source_word: Ἄκουε
  chosen: Hear
  alternatives:
  - Listen
  lexicon: BDAG
  rationale: This is the opening of the Shema citation (Deut 6:4). 'Hear' preserves the traditional and covenantal resonance better than 'Listen,' while remaining clear in modern English.
- source_word: Ἰσραήλ
  chosen: Israel
  lexicon: BDAG
  rationale: Direct vocative address retained by transliterating the proper name in standard English form.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - LORD
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In this citation of the Shema, the Greek reflects the LXX's use of κύριος for the divine name; 'Lord' preserves both NT usage and the title's theological weight. The small-caps form 'LORD' is a viable alternative because of the Hebrew background, but the project default for κύριος is 'Lord,' with the covenant-name nuance preserved in a footnote.
- source_word: θεὸς ἡμῶν
  chosen: our God
  lexicon: BDAG
  rationale: Straightforward possessive construction; natural English order is required.
- source_word: εἷς
  chosen: one
  alternatives:
  - one alone
  lexicon: BDAG
  rationale: The predicate adjective in the Shema is best rendered simply 'one.' This preserves the wording of the Greek citation and the theological density of the confession without interpretive expansion.
