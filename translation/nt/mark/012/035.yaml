id: MRK.12.35
reference: Mark 12:35
source:
  edition: SBLGNT
  text: Καὶ ἀποκριθεὶς ὁ Ἰησοῦς ἔλεγεν διδάσκων ἐν τῷ ἱερῷ· Πῶς λέγουσιν οἱ γραμματεῖς ὅτι ὁ χριστὸς υἱὸς ⸂Δαυίδ ἐστιν⸃;
translation:
  text: And Jesus answered and said[a], as he was teaching in the temple, “How do the scribes say that the Messiah is the son of David?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the Christ.” The Greek title is Christos, here used in its messianic sense.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: as Jesus was teaching ... he said
  alternatives:
  - answering
  - in response
  lexicon: BDAG
  rationale: Although ἀποκρίνομαι often means 'answer' or 'reply,' in Mark it can introduce a response to a situation or line of thought without an explicit prior question. Rendering woodenly as 'answering' is awkward in English here; the participle is absorbed into the discourse flow while preserving that Jesus is responding.
- source_word: ἔλεγεν
  chosen: he said
  alternatives:
  - he was saying
  lexicon: BDAG
  rationale: The imperfect can be rendered 'was saying,' but in English narrative 'said' is the most natural equivalent here, especially with the following direct question. The ongoing aspect is sufficiently conveyed by the teaching setting.
- source_word: διδάσκων
  chosen: as Jesus was teaching
  alternatives:
  - teaching
  - while teaching
  lexicon: BDAG
  rationale: The present participle gives the circumstance of the speech. 'As Jesus was teaching' expresses the contemporaneous action in readable English and links naturally with ἔλεγεν.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple
  alternatives:
  - in the temple courts
  - in the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary (ναός). 'Temple' is standard and readable; the broader sense is noted by alternatives but need not be expanded in the main text.
- source_word: Πῶς
  chosen: How can
  alternatives:
  - How
  - By what reasoning
  lexicon: BDAG
  rationale: In this rhetorical question, Πῶς challenges the validity of the scribes' claim, not merely its manner. 'How can' captures the force of Jesus' objection in idiomatic English.
- source_word: γραμματεῖς
  chosen: the scribes
  alternatives:
  - the teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the standard historical term for γραμματεῖς in the Gospels. ''Teachers of the law'' is interpretive and somewhat broader.'
- source_word: ὁ χριστός
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός as a title is translated 'Messiah' rather than transliterated 'Christ,' preserving the Jewish messianic context of the discussion.
- source_word: υἱὸς Δαυίδ
  chosen: the son of David
  alternatives:
  - David's son
  - a son of David
  lexicon: BDAG
  rationale: The anarthrous-predicate-like construction is idiomatically rendered with the definite phrase 'the son of David' because the claim concerns the recognized messianic designation, not merely descent in general.
