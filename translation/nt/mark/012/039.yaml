id: MRK.12.39
reference: Mark 12:39
source:
  edition: SBLGNT
  text: καὶ πρωτοκαθεδρίας ἐν ταῖς συναγωγαῖς καὶ πρωτοκλισίας ἐν τοῖς δείπνοις,
translation:
  text: and the best seats in the synagogues and the places of honor at banquets,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the chief seats' / 'the seats of honor.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the best places' or, more literally in the ancient dining setting, 'the
      chief couches.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πρωτοκαθεδρίας
  chosen: the best seats
  alternatives:
  - the chief seats
  - the seats of honor
  - the front seats
  lexicon: BDAG
  rationale: The noun denotes places of highest status or precedence in an assembly
    setting. 'Best seats' is natural modern English and conveys social prestige without
    sounding archaic. 'Chief seats' is more traditional but less idiomatic; 'seats
    of honor' is possible but slightly more interpretive.
- source_word: συναγωγαῖς
  chosen: the synagogues
  alternatives:
  - synagogue assemblies
  lexicon: BDAG
  rationale: In this context the term refers to Jewish meeting places, not merely
    gatherings. 'Synagogues' is the standard and precise rendering.
- source_word: πρωτοκλισίας
  chosen: the places of honor
  alternatives:
  - the best places
  - the chief couches
  - the places of highest honor
  lexicon: BDAG
  rationale: The term refers to the most honored reclining places/seating positions
    at meals. Because modern readers do not naturally picture ancient dining couches,
    'places of honor' communicates the social meaning clearly while remaining close
    to the source.
- source_word: δείπνοις
  chosen: banquets
  alternatives:
  - dinners
  - feasts
  lexicon: BDAG
  rationale: The word can mean dinners or formal meals, but here the context is public
    honor and status. 'Banquets' best conveys a socially prominent meal setting in
    idiomatic English.
- source_word: καὶ ... καὶ
  chosen: and ... and
  lexicon: BDAG
  rationale: The repeated conjunctions are preserved to reflect the piling up of the
    scribes' honor-seeking behavior in Jesus' description.
- source_word: ἐν ταῖς συναγωγαῖς ... ἐν τοῖς δείπνοις
  chosen: in the synagogues ... at banquets
  alternatives:
  - in the synagogues ... in the dinners
  lexicon: BDAG
  rationale: 'The preposition ἐν is rendered idiomatically according to English usage:
    ''in'' for locations like synagogues, but ''at'' for social events such as banquets.'
