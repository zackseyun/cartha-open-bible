theological_decisions:
- issue: Rendering of κύριος in a Psalm citation referring to God
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  rationale: Although the underlying Hebrew Psalm likely has the divine name, the
    Greek NT text reads κυρίου. Per project policy, κύριος is rendered 'Lord' by default,
    while preserving awareness of the OT divine-name background in documentation rather
    than importing it into the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → the LORD'
