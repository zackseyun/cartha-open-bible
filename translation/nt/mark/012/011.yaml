id: MRK.12.11
reference: Mark 12:11
source:
  edition: SBLGNT
  text: παρὰ κυρίου ἐγένετο αὕτη, καὶ ἔστιν θαυμαστὴ ἐν ὀφθαλμοῖς ἡμῶν;
translation:
  text: This came from the Lord, and it is marvelous in our eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "by the Lord." The Greek phrase can express source or agency; "from the
      Lord" was chosen to reflect origin more directly.
    reason: lexical_alternative
  - marker: b
    text: This line quotes Psalm 118:23.
    reason: cross_reference
lexical_decisions:
- source_word: παρὰ κυρίου
  chosen: from the Lord
  alternatives:
  - by the Lord
  - from the Lord's hand
  lexicon: BDAG
  rationale: παρά with the genitive commonly denotes source or origin ('from'). 'The
    Lord' follows the project's default rendering for κύριος. 'By the Lord' is possible
    in English, but 'from the Lord' better preserves the source nuance of the Greek
    and the Psalm citation behind this line.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - the LORD
  - Master
  lexicon: BDAG
  rationale: The project's contested-terms table sets κύριος to 'Lord' by default.
    Here in a citation of Psalm 118:23, the referent is God, but in the Greek text
    κύριος is still best rendered 'Lord' rather than 'the LORD' to maintain NT usage
    while preserving the allusion.
- source_word: ἐγένετο
  chosen: came
  alternatives:
  - happened
  - came to be
  - was done
  lexicon: BDAG
  rationale: γίνομαι is semantically broad. In this idiom, 'this came from the Lord'
    is natural modern English and captures the sense of something having come about
    or originated from him. 'Was done' is more wooden; 'happened' can sound accidental,
    which is not the emphasis here.
- source_word: αὕτη
  chosen: This
  alternatives:
  - This thing
  - This stone
  lexicon: BDAG
  rationale: The feminine demonstrative refers back to the preceding quoted matter,
    especially the rejected stone becoming the cornerstone. English can leave the
    referent implicit with 'This,' which is both natural and sufficiently definite.
    'This stone' would over-specify beyond the immediate wording of this clause.
- source_word: θαυμαστὴ
  chosen: marvelous
  alternatives:
  - wonderful
  - astonishing
  lexicon: BDAG
  rationale: θαυμαστός denotes something wondrous or remarkable. 'Marvelous' preserves
    the elevated tone of the scriptural citation without sounding archaic in this
    context. 'Wonderful' is possible but slightly flatter; 'astonishing' is stronger
    but less traditional for this Psalmic line.
- source_word: ἐν ὀφθαλμοῖς ἡμῶν
  chosen: in our eyes
  alternatives:
  - in our sight
  - to us
  lexicon: BDAG
  rationale: This is a common Semitic/Greek idiom meaning 'in our sight' or 'to us.'
    'In our eyes' preserves the biblical imagery and remains clear in English. It
    also reflects the wording of the source more closely than the more interpretive
    'to us'.
