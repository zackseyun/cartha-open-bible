id: MRK.12.2
reference: Mark 12:2
source:
  edition: SBLGNT
  text: καὶ ἀπέστειλεν πρὸς τοὺς γεωργοὺς τῷ καιρῷ δοῦλον, ἵνα παρὰ τῶν γεωργῶν λάβῃ ἀπὸ ⸂τῶν καρπῶν⸃ τοῦ ἀμπελῶνος·
translation:
  text: And at the proper time he sent a slave to the vine-growers[b][a], so that he might receive from the vine-growers some of the fruit of the vineyard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servant' for 'slave' (δοῦλος).
    reason: alternative_reading
  - marker: b
    text: Or 'farmers' or 'tenants' for 'vine-growers.' The Greek term refers to those who work the land; the vineyard setting gives it this more specific sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: BDAG
  rationale: Standard narrative aorist of ἀποστέλλω; 'sent' is natural modern English and preserves the action without unnecessary formality.
- source_word: γεωργούς / γεωργῶν
  chosen: vine-growers
  alternatives:
  - farmers
  - tenants
  - cultivators
  lexicon: BDAG
  rationale: γεωργός means one who works the land; in this vineyard context, 'vine-growers' keeps the agricultural specificity better than the generic 'farmers.' 'Tenants' reflects the parable's social role but is not the lexical meaning, so it is not preferred in the main text.
- source_word: τῷ καιρῷ
  chosen: at the proper time
  alternatives:
  - in season
  - at the time
  - when the time came
  lexicon: BDAG
  rationale: καιρός here denotes the appropriate or appointed time, likely harvest time in the parable. 'At the proper time' captures that sense in clear English without over-specifying beyond the Greek.
- source_word: δοῦλον
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per doctrine guidance, δοῦλος should be rendered 'servant / slave' context-dependently. In this parable, the bonded status of the master's representative is socially real and not merely domestic service, so 'slave' is preferred. The traditional 'servant' remains a viable alternative and is preserved in a footnote.
- source_word: ἵνα ... λάβῃ
  chosen: so that he might receive
  alternatives:
  - to collect
  - that he might take
  lexicon: BDAG
  rationale: The ἵνα clause expresses purpose. 'So that he might receive' preserves the purposive nuance and the subjunctive force in idiomatic English.
- source_word: παρὰ τῶν γεωργῶν
  chosen: from the vine-growers
  alternatives:
  - from the farmers
  - from the tenants
  lexicon: BDAG
  rationale: παρά with the genitive indicates source, so 'from the vine-growers' is the most straightforward rendering.
- source_word: ἀπὸ τῶν καρπῶν τοῦ ἀμπελῶνος
  chosen: some of the fruit of the vineyard
  alternatives:
  - from the fruit of the vineyard
  - his share of the fruit of the vineyard
  lexicon: BDAG
  rationale: The construction ἀπό + genitive naturally conveys taking a portion from a larger whole. 'Some of the fruit' makes that partitive sense explicit in natural English. 'His share' may fit the parable's logic but adds an idea not stated directly in the Greek.
- source_word: ἀμπελῶνος
  chosen: vineyard
  alternatives:
  - vineyard plot
  lexicon: BDAG
  rationale: Standard rendering of ἀμπελών; clear and conventional without loss of meaning.
