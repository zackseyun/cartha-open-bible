id: MRK.12.43
reference: Mark 12:43
source:
  edition: SBLGNT
  text: καὶ προσκαλεσάμενος τοὺς μαθητὰς αὐτοῦ ⸀εἶπεν αὐτοῖς· Ἀμὴν λέγω ὑμῖν ὅτι ἡ
    χήρα αὕτη ἡ πτωχὴ πλεῖον πάντων ⸀ἔβαλεν τῶν βαλλόντων εἰς τὸ γαζοφυλάκιον·
translation:
  text: And after calling his disciples to himself, he said to them, “Truly I say
    to you that this poor widow has put in more than all those who are putting into
    the treasury.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “offering box” or “treasury chest.” The Greek term refers to the temple
      treasury receptacle/area.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκαλεσάμενος
  chosen: after calling ... to himself
  alternatives:
  - calling
  - summoning
  lexicon: BDAG
  rationale: Aorist middle participle of προσκαλέομαι conveys Jesus drawing his disciples
    to himself before speaking. 'After calling ... to himself' makes the sequence
    and middle nuance clear in natural English.
- source_word: μαθητὰς
  chosen: disciples
  alternatives:
  - learners
  lexicon: BDAG
  rationale: Standard NT rendering for μαθητής; preserves the relational and formative
    sense of those following Jesus.
- source_word: Ἀμὴν λέγω ὑμῖν
  chosen: Truly I say to you
  alternatives:
  - Amen, I say to you
  - Truly I tell you
  lexicon: BDAG
  rationale: Retains the solemn introductory formula while using clear modern English.
    'Truly' conveys the force of Ἀμήν without leaving it untranslated in the main
    text.
- source_word: χήρα
  chosen: widow
  lexicon: BDAG
  rationale: Direct and standard rendering of χήρα.
- source_word: πτωχὴ
  chosen: poor
  alternatives:
  - destitute
  - impoverished
  lexicon: BDAG
  rationale: '''Poor'' is the plain lexical sense and fits the narrative context without
    overstating beyond the text.'
- source_word: πλεῖον πάντων
  chosen: more than all
  alternatives:
  - more than everyone
  - more than all the others
  lexicon: BDAG
  rationale: This comparative phrase is best rendered as a comparison with the totality
    of the other contributors. 'More than all' is close to the Greek and idiomatic
    in English.
- source_word: ἔβαλεν
  chosen: has put in
  alternatives:
  - put in
  - threw in
  lexicon: BDAG
  rationale: In the offering context, βάλλω idiomatically means to put money in. Present
    perfect English ('has put in') works naturally with Jesus' evaluative statement
    about the completed act.
- source_word: τῶν βαλλόντων
  chosen: those who are putting
  alternatives:
  - those putting
  - the ones casting
  lexicon: BDAG
  rationale: The present participle depicts the ongoing action of the other contributors
    at that moment. 'Those who are putting' preserves that aspect.
- source_word: γαζοφυλάκιον
  chosen: treasury
  alternatives:
  - treasury chest
  - offering box
  lexicon: BDAG
  rationale: The term refers to the temple treasury/offering receptacle area. 'Treasury'
    is the most established concise rendering; a footnote preserves a more explicit
    alternative for modern readers.
