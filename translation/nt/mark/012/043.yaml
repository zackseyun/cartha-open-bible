theological_decisions:
- issue: Evaluation of the widow's gift
  chosen_reading: Jesus states that the widow put in more than all the others in a
    qualitative sense, not merely a larger monetary amount.
  alternative_readings:
  - A strictly quantitative reading that she gave a numerically larger sum than anyone
    else
  rationale: The immediate context explains that she gave out of her poverty while
    others gave out of abundance (v. 44). The translation keeps the literal comparative
    'more than all' without importing an interpretive paraphrase into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
