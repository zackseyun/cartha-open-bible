id: MRK.12.33
reference: Mark 12:33
source:
  edition: SBLGNT
  text: καὶ τὸ ἀγαπᾶν αὐτὸν ἐξ ὅλης ⸀τῆς καρδίας καὶ ἐξ ὅλης τῆς ⸀συνέσεως καὶ ἐξ
    ὅλης τῆς ἰσχύος καὶ τὸ ἀγαπᾶν τὸν πλησίον ὡς ἑαυτὸν ⸀περισσότερόν ἐστιν πάντων
    τῶν ὁλοκαυτωμάτων καὶ θυσιῶν.
translation:
  text: and to love him with all the heart and with all the understanding and with
    all the strength, and to love one’s neighbor as oneself, is more than all burnt
    offerings and sacrifices.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'all burnt offerings and sacrifices.' The Greek term for 'whole burnt
      offerings' refers specifically to offerings wholly consumed on the altar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαπᾶν
  chosen: to love
  alternatives:
  - loving
  lexicon: BDAG
  rationale: The articular infinitive is best represented idiomatically in English
    as 'to love,' preserving the verbal force and parallel structure of the two infinitives
    in the verse.
- source_word: αὐτόν
  chosen: him
  alternatives:
  - God
  lexicon: BDAG
  rationale: The pronoun refers back to God from the preceding context. 'Him' preserves
    the Greek wording without importing the antecedent into the text; the referent
    is contextually clear.
- source_word: ἐξ ὅλης τῆς καρδίας
  chosen: with all the heart
  alternatives:
  - from the whole heart
  - with all your heart
  lexicon: BDAG
  rationale: This phrase expresses totality of inner devotion. 'With all the heart'
    is natural English and keeps the article's generic force. 'Your' is avoided because
    the Greek here does not explicitly repeat the second-person form in this clause.
- source_word: συνέσεως
  chosen: understanding
  alternatives:
  - mind
  - intelligence
  - insight
  lexicon: BDAG
  rationale: Mark here uses σύνεσις rather than διάνοια. 'Understanding' best reflects
    the sense of comprehension or discernment without flattening it into mere intellect.
    'Mind' is possible but less precise to this lexical choice.
- source_word: ἰσχύος
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: BDAG
  rationale: '''Strength'' is the standard and clearest rendering in this ethical
    context, conveying one''s full capacity or force.'
- source_word: πλησίον
  chosen: one’s neighbor
  alternatives:
  - the neighbor
  - neighbor
  lexicon: BDAG
  rationale: Although formally singular with the article, the sense is generic. 'One’s
    neighbor' communicates the representative force in idiomatic English while preserving
    the ethical generality.
- source_word: ὡς ἑαυτόν
  chosen: as oneself
  alternatives:
  - as yourself
  - as himself
  lexicon: BDAG
  rationale: The reflexive is generic rather than addressed directly to the reader
    in this reported summary. 'As oneself' preserves that generic force better than
    'as yourself,' which would shift to direct address.
- source_word: περισσότερόν ἐστιν
  chosen: is more than
  alternatives:
  - is greater than
  - matters more than
  lexicon: BDAG
  rationale: The comparative states superiority. 'Is more than' is concise and natural,
    preserving the comparison without adding interpretive nuance such as 'matters'.
- source_word: πάντων τῶν ὁλοκαυτωμάτων καὶ θυσιῶν
  chosen: all whole burnt offerings and sacrifices
  alternatives:
  - all burnt offerings and sacrifices
  - every burnt offering and sacrifice
  lexicon: BDAG
  rationale: ὁλοκαυτώματα specifically denotes offerings wholly consumed by fire,
    so 'whole burnt offerings' preserves the lexical specificity better than simply
    'burnt offerings.' The genitive after the comparative is rendered with 'than all
    ... and ...' in natural English.
