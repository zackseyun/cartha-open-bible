id: MRK.12.8
reference: Mark 12:8
source:
  edition: SBLGNT
  text: καὶ λαβόντες ⸂ἀπέκτειναν αὐτόν, καὶ ἐξέβαλον αὐτὸν⸃ ἔξω τοῦ ἀμπελῶνος.
translation:
  text: And they took him[a], killed him, and threw him out of the vineyard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some readers may expect the order 'threw him out of the vineyard and killed him' from the parallel parable tradition, but the Greek text of Mark here reads 'killed him, and threw him out of the vineyard.'
    reason: cross_reference
lexical_decisions:
- source_word: λαβόντες
  chosen: they took him
  alternatives:
  - having taken him
  - seizing him
  lexicon: BDAG
  rationale: Aorist participle of λαμβάνω preceding the main verbs. In idiomatic English within a rapid narrative sequence, 'they took him' best preserves the action without awkwardness. 'Seizing him' is possible, but λαμβάνω itself does not require the more forceful nuance unless context supplies it.
- source_word: ἀπέκτειναν
  chosen: killed
  alternatives:
  - put to death
  - slew
  lexicon: BDAG
  rationale: ἀποκτείνω straightforwardly means 'kill' or 'put to death.' 'Killed' is the clearest modern English rendering and fits the parable's stark sequence.
- source_word: ἐξέβαλον
  chosen: threw ... out
  alternatives:
  - cast ... out
  - drove ... out
  lexicon: BDAG
  rationale: ἐκβάλλω commonly means 'throw out' or 'cast out.' Here, with ἔξω τοῦ ἀμπελῶνος, 'threw him out of the vineyard' is natural modern English and preserves the force of expulsion. 'Cast out' is more traditional but less contemporary.
- source_word: ἔξω τοῦ ἀμπελῶνος
  chosen: out of the vineyard
  alternatives:
  - outside the vineyard
  lexicon: BDAG
  rationale: ἔξω with the genitive denotes movement/location outside. Because it follows ἐξέβαλον, 'out of the vineyard' is the most idiomatic complement in English. 'Outside the vineyard' is also possible, but the verbal phrase 'threw him out' naturally pairs with 'of the vineyard'.
- source_word: ἀμπελῶνος
  chosen: vineyard
  lexicon: BDAG
  rationale: ἀμπελών is the standard term for a vineyard in this parabolic context.
