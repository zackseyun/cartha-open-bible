theological_decisions:
- issue: Order of killing and expulsion in the parable
  chosen_reading: 'The translation follows the Greek sequence: they killed him and then threw him out of the vineyard.'
  alternative_readings:
  - Some parallel/traditional expectations might suggest they cast him out first and then killed him.
  rationale: The SBLGNT wording in Mark 12:8 presents the sequence as taking him, killing him, and throwing him out. The translation preserves that narrative order rather than harmonizing with parallels or interpretive expectations.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
