id: MRK.12.28
reference: Mark 12:28
source:
  edition: SBLGNT
  text: Καὶ προσελθὼν εἷς τῶν γραμματέων ἀκούσας αὐτῶν συζητούντων, ⸀ἰδὼν ὅτι καλῶς ⸂ἀπεκρίθη αὐτοῖς⸃, ἐπηρώτησεν αὐτόν· Ποία ἐστὶν ⸂ἐντολὴ πρώτη πάντων⸃;
translation:
  text: And one of the scribes came up and heard them debating[a], and seeing that he had answered them well, he asked him, “Which commandment is first of all?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the foremost of all” or “the most important of all.”
    reason: lexical_alternative
lexical_decisions:
- source_word: γραμματέων
  chosen: scribes
  alternatives:
  - experts in the law
  - teachers of the law
  lexicon: BDAG
  rationale: γραμματεύς in the Gospel context refers to recognized Jewish legal-scribal specialists. 'Scribes' is the most direct and established rendering without over-specifying their exact role.
- source_word: προσελθὼν
  chosen: came up
  alternatives:
  - approached
  - came near
  lexicon: BDAG
  rationale: The participle from προσέρχομαι indicates approaching. 'Came up' is natural modern English and preserves the movement toward Jesus.
- source_word: ἀκούσας αὐτῶν συζητούντων
  chosen: heard them debating
  alternatives:
  - heard them discussing
  - heard them arguing
  lexicon: BDAG
  rationale: συζητέω can denote discussion, dispute, or debate. In this context of public exchange over disputed questions, 'debating' best captures the sense without implying hostility as strongly as 'arguing'.
- source_word: ἰδὼν ὅτι καλῶς ἀπεκρίθη αὐτοῖς
  chosen: seeing that he had answered them well
  alternatives:
  - seeing that he answered them well
  - realizing that he had answered them rightly
  lexicon: BDAG
  rationale: The aorist participle plus ὅτι clause introduces the scribe's perception. καλῶς is rendered 'well' in straightforward idiomatic English; 'rightly' is possible but slightly more interpretive.
- source_word: ἐπηρώτησεν
  chosen: asked
  alternatives:
  - questioned
  - inquired of
  lexicon: BDAG
  rationale: ἐπερωτάω means to ask or question. 'Asked' is the clearest natural rendering here.
- source_word: Ποία
  chosen: Which
  alternatives:
  - What sort of
  - What
  lexicon: BDAG
  rationale: ποῖος asks for identification among options or categories. 'Which' fits the sense of selecting among commandments.
- source_word: ἐντολή
  chosen: commandment
  alternatives:
  - command
  lexicon: BDAG
  rationale: ἐντολή is commonly rendered 'commandment' in biblical contexts, especially where the Mosaic law is in view. This preserves the scriptural register of the question.
- source_word: πρώτη πάντων
  chosen: the first of all
  alternatives:
  - the foremost of all
  - the most important of all
  lexicon: BDAG
  rationale: πρῶτος can mean first in sequence or foremost in rank. Given Jesus' answer about the greatest commandment, the sense is primacy. 'The first of all' stays close to the Greek while allowing the reader to hear the ranking language that the following context explains.
