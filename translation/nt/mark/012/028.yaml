theological_decisions:
- issue: Sense of πρώτη in the question about the commandment
  chosen_reading: Rendered as 'the first of all' rather than an explicitly interpretive paraphrase such as 'the most important.'
  alternative_readings:
  - the foremost of all
  - the greatest
  - the most important
  rationale: The Greek uses πρώτη, literally 'first,' which can imply rank or primacy. To preserve the wording and theological tension of the question without over-paraphrasing, the main text keeps 'first,' while the lexical note records the semantic range.
  doctrine_reference: Translation philosophy §3, §6
