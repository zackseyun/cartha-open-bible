id: MRK.12.40
reference: Mark 12:40
source:
  edition: SBLGNT
  text: οἱ κατεσθίοντες τὰς οἰκίας τῶν χηρῶν καὶ προφάσει μακρὰ προσευχόμενοι· οὗτοι
    λήμψονται περισσότερον κρίμα.
translation:
  text: who devour widows’ houses and for appearance’s sake pray at length—these will
    receive greater condemnation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as a pretense' or 'for show.'
    reason: lexical_alternative
  - marker: b
    text: Or 'greater judgment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεσθίοντες
  chosen: devour
  alternatives:
  - consume
  - eat up
  - exploit
  lexicon: BDAG
  rationale: The participle is metaphorical here, describing rapacious consumption
    of others' property. 'Devour' preserves the vivid imagery and moral force better
    than a flattened interpretive gloss like 'exploit,' while still reading naturally
    in English.
- source_word: οἰκίας
  chosen: houses
  alternatives:
  - homes
  - property
  lexicon: BDAG
  rationale: Literally 'houses.' In context it likely refers to widows' households
    or estates, but 'houses' preserves the concrete Greek expression and its traditional
    force without over-interpreting. The broader sense is implicit in context.
- source_word: χηρῶν
  chosen: widows’
  lexicon: BDAG
  rationale: 'Straightforward genitive plural: the victims are widows, a socially
    vulnerable group. The possessive in English reflects the genitive relation.'
- source_word: προφάσει
  chosen: for appearance’s sake
  alternatives:
  - as a pretense
  - for show
  - under a pretext
  lexicon: BDAG
  rationale: The dative noun denotes pretext or outward show. 'For appearance’s sake'
    communicates the hypocritical motive in idiomatic modern English. 'As a pretense'
    is also possible and is preserved in a footnote as a closer formal alternative.
- source_word: μακρὰ
  chosen: at length
  alternatives:
  - long
  - lengthy
  lexicon: BDAG
  rationale: Used adverbially with 'pray,' indicating extended duration. 'At length'
    is natural English and avoids the awkwardness of 'pray long' while preserving
    the sense of prolonged prayer.
- source_word: προσευχόμενοι
  chosen: pray
  alternatives:
  - praying
  lexicon: BDAG
  rationale: Rendered as a finite English verb coordinated with the prior participial
    description for smoothness in English. The participial force is still reflected
    in the overall relative-clause structure.
- source_word: λήμψονται
  chosen: will receive
  alternatives:
  - will get
  lexicon: BDAG
  rationale: Future middle of 'receive/take.' 'Will receive' is the standard dignified
    rendering in judgment contexts and fits the solemn tone.
- source_word: περισσότερον
  chosen: greater
  alternatives:
  - more severe
  - heavier
  lexicon: BDAG
  rationale: Comparative adjective modifying 'condemnation/judgment.' 'Greater' is
    formally close and leaves the exact nuance of degree to the noun it modifies.
- source_word: κρίμα
  chosen: condemnation
  alternatives:
  - judgment
  lexicon: BDAG
  rationale: In this context of divine accountability for hypocritical abuse, 'condemnation'
    brings out the punitive sense more clearly than the broader 'judgment.' 'Judgment'
    remains a viable lexical alternative and is preserved in a footnote.
