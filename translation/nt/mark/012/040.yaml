theological_decisions:
- issue: Force of κρίμα in a warning against religious hypocrisy
  chosen_reading: condemnation
  alternative_readings:
  - judgment
  rationale: The verse warns of punitive divine reckoning, not merely evaluative judgment.
    'Condemnation' best captures the severity implied by the comparison 'greater.'
    This does not import a detailed doctrine of final judgment beyond the text's warning;
    it simply reflects the likely contextual force of κρίμα here.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
