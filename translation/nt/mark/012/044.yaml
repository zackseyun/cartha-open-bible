theological_decisions:
- issue: Meaning of βίος in the widow's offering saying
  chosen_reading: economic means of life ('livelihood'), not her life itself
  alternative_readings:
  - her whole life
  rationale: The context concerns monetary giving, and βίος can denote one's means
    of subsistence. Rendering it as 'livelihood' preserves the force of total self-giving
    without implying she literally gave her biological life in that moment.
  doctrine_reference: Translation philosophy §1, §6
