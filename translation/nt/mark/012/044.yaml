id: MRK.12.44
reference: Mark 12:44
source:
  edition: SBLGNT
  text: πάντες γὰρ ἐκ τοῦ περισσεύοντος αὐτοῖς ἔβαλον, αὕτη δὲ ἐκ τῆς ὑστερήσεως αὐτῆς
    πάντα ὅσα εἶχεν ἔβαλεν, ὅλον τὸν βίον αὐτῆς.
translation:
  text: For they all gave out of their abundance, but she, out of her poverty, put
    in everything she had—her whole livelihood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "all she had to live on."'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντες
  chosen: they all
  alternatives:
  - all of them
  lexicon: BDAG
  rationale: The nominative plural refers to the wealthy contributors collectively.
    'They all' is natural English and preserves the emphatic totality.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks explanation for the preceding evaluation of the widow's gift. 'For'
    preserves the explanatory connection straightforwardly.
- source_word: ἐκ τοῦ περισσεύοντος αὐτοῖς
  chosen: out of their abundance
  alternatives:
  - from what was overflowing to them
  - out of their surplus
  lexicon: BDAG
  rationale: The participle περισσεύοντος with ἐκ denotes giving from what exceeds
    need. 'Abundance' is idiomatic and readable; 'surplus' is possible, but 'abundance'
    better balances natural English with the sense of excess resources.
- source_word: ἔβαλον
  chosen: gave
  alternatives:
  - put in
  - threw in
  lexicon: BDAG
  rationale: Although βάλλω literally means 'throw/put,' in this offering context
    English normally says 'gave.' This avoids awkward repetition while accurately
    conveying the act of contributing.
- source_word: αὕτη δὲ
  chosen: but she
  alternatives:
  - but this woman
  - but she herself
  lexicon: BDAG
  rationale: The contrastive δέ sets the widow over against the others. 'But she'
    is concise and preserves the contrast without over-specifying what is already
    clear from context.
- source_word: ἐκ τῆς ὑστερήσεως αὐτῆς
  chosen: out of her poverty
  alternatives:
  - out of her lack
  - out of her need
  lexicon: BDAG
  rationale: ὑστέρησις denotes deficiency or want. 'Poverty' best captures the economic
    deprivation in context, stronger and more concrete than 'lack' or 'need'.
- source_word: πάντα ὅσα εἶχεν
  chosen: everything she had
  alternatives:
  - all that she had
  lexicon: BDAG
  rationale: This construction is comprehensive and emphatic. 'Everything she had'
    is idiomatic modern English and fully preserves the totality.
- source_word: ἔβαλεν
  chosen: put in
  alternatives:
  - gave
  - threw in
  lexicon: BDAG
  rationale: Here 'put in' is retained to echo the physical act of placing coins into
    the treasury, while varying from the earlier plural verb for smoother English
    style.
- source_word: ὅλον τὸν βίον αὐτῆς
  chosen: her whole livelihood
  alternatives:
  - all her living
  - her whole life
  - everything she had to live on
  lexicon: BDAG
  rationale: βίος here refers not to biological life in the abstract but to means
    of living or livelihood. 'Her whole livelihood' is concise and accurate. The common
    rendering 'everything she had to live on' is interpretive but valid; 'her whole
    life' would be misleading in English.
