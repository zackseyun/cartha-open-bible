- issue: Resurrection language in a dispute with the Sadducees
  chosen_reading: the resurrection ... when they rise
  alternative_readings:
  - the resurrection from the dead ... when they rise again
  rationale: The verse assumes a future bodily resurrection without needing to expand
    the wording beyond the Greek. The translation preserves the text's eschatological
    claim while avoiding interpretive additions not explicit in this verse.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
