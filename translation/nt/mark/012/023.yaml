id: MRK.12.23
reference: Mark 12:23
source:
  edition: SBLGNT
  text: ἐν τῇ ἀναστάσει ⸂ὅταν ἀναστῶσιν⸃ τίνος αὐτῶν ἔσται γυνή; οἱ γὰρ ἑπτὰ ἔσχον
    αὐτὴν γυναῖκα.
translation:
  text: In the resurrection, when they rise, whose wife will she be? For the seven
    had her as wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when they rise again.' The Greek simply says 'when they rise'; the
      resurrection context supplies the sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνάστασις
  chosen: the resurrection
  alternatives:
  - the rising
  - the resurrection from the dead
  lexicon: BDAG
  rationale: The noun refers here to the eschatological resurrection under discussion
    with the Sadducees. 'The resurrection' is the natural and established English
    equivalent and fits the article in Greek.
- source_word: ὅταν ἀναστῶσιν
  chosen: when they rise
  alternatives:
  - when they rise again
  - whenever they rise
  lexicon: BDAG
  rationale: ὅταν with the aorist subjunctive gives a future-oriented temporal clause.
    'When they rise' is concise and natural. 'Rise again' is possible in context,
    but 'again' is not explicit in the Greek and is unnecessary because resurrection
    is already named.
- source_word: τίνος αὐτῶν
  chosen: whose
  alternatives:
  - of which of them
  lexicon: BDAG
  rationale: The genitive interrogative plus partitive genitive is idiomatically rendered
    in English as 'whose.' This preserves the sense without wooden phrasing.
- source_word: ἔσται γυνή
  chosen: will she be wife
  alternatives:
  - will she be the wife
  - will she be a wife
  lexicon: BDAG
  rationale: The predicate nominative construction asks to whom she will stand as
    wife. In idiomatic English this is best expressed as 'whose wife will she be?'
    The Greek lacks the article before γυνή, but English normally supplies the relational
    noun naturally in this construction.
- source_word: γυνή
  chosen: wife
  alternatives:
  - woman
  lexicon: BDAG
  rationale: In both occurrences the context is marital, so 'wife' is required rather
    than the broader 'woman.' This preserves the legal-marital force of the Sadducees'
    question.
- source_word: οἱ γὰρ ἑπτὰ
  chosen: for the seven
  alternatives:
  - for all seven
  - for the seven men
  lexicon: BDAG
  rationale: γάρ gives the explanatory basis for the question. 'The seven' is sufficient
    because the prior context identifies them as seven brothers/husbands; adding 'men'
    would be interpretive expansion.
- source_word: ἔσχον αὐτὴν γυναῖκα
  chosen: had her as wife
  alternatives:
  - had her as their wife
  - married her
  lexicon: BDAG
  rationale: The idiom ἔχω + accusative + γυναῖκα means to have someone as wife. 'Had
    her as wife' stays close to the Greek while remaining understandable. 'Married
    her' would shift from state/relationship to event and is therefore less precise
    here.
