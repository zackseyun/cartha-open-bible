id: MRK.12.6
reference: Mark 12:6
source:
  edition: SBLGNT
  text: ἔτι ⸂ἕνα εἶχεν, υἱὸν ἀγαπητόν· ἀπέστειλεν⸃ αὐτὸν ⸂ἔσχατον πρὸς αὐτοὺς⸃ λέγων
    ὅτι Ἐντραπήσονται τὸν υἱόν μου.
translation:
  text: He still had one, a beloved son. He sent him last to them, saying, ‘They will
    respect my son.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a dearly loved son.'
    reason: lexical_alternative
  - marker: b
    text: Or 'He still had one more, a beloved son.'
    reason: lexical_alternative
  - marker: c
    text: The verb can also carry the sense 'be ashamed before' or 'show deference
      to'; here the context favors 'respect.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτι
  chosen: still
  alternatives:
  - yet
  lexicon: BDAG
  rationale: Conveys continued possession after previous servants had been sent; 'still'
    is natural modern English in this narrative context.
- source_word: ἕνα εἶχεν
  chosen: he had one
  alternatives:
  - he still had one more
  - he had yet one
  lexicon: BDAG
  rationale: The combination indicates remaining possession of one person to send.
    English idiom is smoothed to 'He still had one' while preserving the sense of
    one remaining.
- source_word: υἱὸν ἀγαπητόν
  chosen: a beloved son
  alternatives:
  - one beloved son
  - a son, beloved
  - a dearly loved son
  lexicon: BDAG
  rationale: ἀγαπητός commonly means 'beloved' or 'dearly loved.' 'Beloved son' preserves
    the weight of the phrase and its resonance with divine-sonship language in Mark
    without over-paraphrasing.
- source_word: ἀπέστειλεν
  chosen: He sent
  alternatives:
  - he dispatched
  lexicon: BDAG
  rationale: Standard narrative rendering of ἀποστέλλω; simple and direct.
- source_word: ἔσχατον
  chosen: last
  alternatives:
  - finally
  - as the last one
  lexicon: BDAG
  rationale: ἔσχατον here functions adverbially with the sense 'last' or 'finally.'
    'Last' preserves the formal force and the son's climactic position in the sequence.
- source_word: πρὸς αὐτούς
  chosen: to them
  alternatives:
  - toward them
  lexicon: BDAG
  rationale: Idiomatic English equivalent in a sending context.
- source_word: λέγων ὅτι
  chosen: saying, ‘
  alternatives:
  - saying that
  lexicon: BDAG
  rationale: Introduces the owner's expectation. Direct quotation in English is more
    natural than retaining 'that' with indirect discourse.
- source_word: Ἐντραπήσονται
  chosen: They will respect
  alternatives:
  - they will be ashamed before
  - they will reverence
  - they will feel shame before
  lexicon: BDAG
  rationale: In this context ἐντρέπω in the future passive carries the sense of showing
    respect/deference toward someone, not merely feeling shame. 'Respect' is clear
    modern English and fits the vineyard-parable setting.
- source_word: τὸν υἱόν μου
  chosen: my son
  lexicon: BDAG
  rationale: Straightforward possessive phrase; retained plainly to preserve the parable's
    christological force.
