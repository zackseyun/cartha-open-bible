theological_decisions:
- issue: Christological resonance of 'beloved son' in the parable
  chosen_reading: Retain 'a beloved son' in the main text without expanding its meaning.
  alternative_readings:
  - a dearly loved son
  rationale: The phrase naturally echoes Mark's wider presentation of Jesus as the
    beloved Son, but the translation should preserve the wording without importing
    interpretive explanation into the text itself.
