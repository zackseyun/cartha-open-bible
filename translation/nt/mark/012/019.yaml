theological_decisions:
- issue: Rendering of levirate-marriage legal idiom without importing extra interpretation
  chosen_reading: 'Rendered the legal requirement in clear modern English: ''his brother
    should take the wife and raise up offspring for his brother.'''
  alternative_readings:
  - '''his brother should marry the widow and produce descendants for his brother'''
  rationale: The verse cites Mosaic law (cf. Deut 25:5) but the Greek itself uses
    the idiomatic expressions 'take the wife' and 'raise up seed.' The chosen rendering
    preserves the legal and familial sense without paraphrasing beyond the text.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Gendered language
  chosen_reading: Retained masculine kinship terms 'brother' and 'wife.'
  alternative_readings:
  - Use gender-neutral paraphrase such as 'sibling' or 'spouse'
  rationale: The Greek explicitly speaks of ἀδελφός and γυνή in a male-female marital
    law setting. Per the doctrine's gender-accurate principle, the translation preserves
    the source's gendered terms rather than neutralizing them.
  doctrine_reference: Translation philosophy §4
