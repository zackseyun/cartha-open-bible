id: MRK.12.19
reference: Mark 12:19
source:
  edition: SBLGNT
  text: Διδάσκαλε, Μωϋσῆς ἔγραψεν ἡμῖν ὅτι ἐάν τινος ἀδελφὸς ἀποθάνῃ καὶ καταλίπῃ
    γυναῖκα καὶ ⸂μὴ ἀφῇ τέκνον⸃, ἵνα λάβῃ ὁ ἀδελφὸς αὐτοῦ τὴν ⸀γυναῖκα καὶ ἐξαναστήσῃ
    σπέρμα τῷ ἀδελφῷ αὐτοῦ.
translation:
  text: Teacher, Moses wrote for us that if someone's brother dies and leaves behind
    a wife and leaves no child, his brother should take the wife and raise up offspring
    for his brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'leaves no child'; some translations render 'leaves
      no children.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'raise up seed for his brother,' an idiom referring to producing
      offspring in fulfillment of levirate marriage obligations.
    reason: lexical_alternative
  - marker: c
    text: See Deuteronomy 25:5 for the Mosaic law being referenced.
    reason: cross_reference
lexical_decisions:
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative address to Jesus; 'Teacher' is the standard, clear rendering
    of διδάσκαλος in this context and avoids the misleading authority nuance of 'Master'.
- source_word: Μωϋσῆς
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: ἔγραψεν ἡμῖν
  chosen: wrote for us
  alternatives:
  - wrote to us
  - wrote for our benefit
  lexicon: BDAG
  rationale: The dative ἡμῖν is best taken as advantage/reference in this appeal to
    Mosaic legislation; 'for us' is idiomatic and reflects the speakers' claim that
    the law was written for Israel.
- source_word: ἐάν τινος ἀδελφὸς ἀποθάνῃ
  chosen: if someone's brother dies
  alternatives:
  - if a man's brother dies
  lexicon: BDAG
  rationale: τινος is an indefinite genitive, naturally rendered 'someone's.' This
    keeps the statement general without over-specifying gender beyond what the Greek
    construction requires.
- source_word: καταλίπῃ γυναῖκα
  chosen: leaves behind a wife
  alternatives:
  - leaves a wife
  - leaves behind his wife
  lexicon: BDAG
  rationale: καταλείπω here means to leave behind at death. 'Leaves behind a wife'
    communicates the bereavement context more clearly than a bare 'leaves a wife.'
- source_word: μὴ ἀφῇ τέκνον
  chosen: leaves no child
  alternatives:
  - leaves no children
  - has no child
  lexicon: BDAG
  rationale: τέκνον is singular, so 'no child' is the most formally accurate rendering.
    English can use the singular generically here. 'Leaves' is supplied from the verbal
    sense of ἀφῇ in parallel with the previous clause.
- source_word: ἵνα λάβῃ ὁ ἀδελφὸς αὐτοῦ τὴν γυναῖκα
  chosen: his brother should take the wife
  alternatives:
  - his brother should take his wife
  - his brother should marry the widow
  lexicon: BDAG
  rationale: λάβῃ with γυναῖκα in this legal-marital context means to take in marriage.
    'Take the wife' stays closer to the Greek wording; 'marry the widow' is interpretive
    and therefore kept as an alternative rather than main text.
- source_word: ἐξαναστήσῃ σπέρμα
  chosen: raise up offspring
  alternatives:
  - raise up seed
  - produce offspring
  lexicon: BDAG
  rationale: This is an idiomatic expression from levirate marriage law. 'Raise up
    offspring' communicates the sense in natural modern English, while 'seed' is more
    literal but less accessible and potentially opaque.
- source_word: τῷ ἀδελφῷ αὐτοῦ
  chosen: for his brother
  alternatives:
  - for the sake of his brother
  - for his deceased brother
  lexicon: BDAG
  rationale: The dative indicates benefit/reference. 'For his brother' is concise
    and faithful; the deceased status is already implied by the preceding condition.
