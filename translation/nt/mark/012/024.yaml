id: MRK.12.24
reference: Mark 12:24
source:
  edition: SBLGNT
  text: ⸂ἔφη αὐτοῖς ὁ Ἰησοῦς⸃· Οὐ διὰ τοῦτο πλανᾶσθε μὴ εἰδότες τὰς γραφὰς μηδὲ τὴν
    δύναμιν τοῦ θεοῦ;
translation:
  text: 'Jesus said to them, “Is this not the reason you are mistaken: because you
    know neither the Scriptures nor the power of God?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Are you not led astray for this reason, because you know neither the
      Scriptures nor the power of God?”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφη αὐτοῖς ὁ Ἰησοῦς
  chosen: Jesus said to them
  alternatives:
  - Jesus told them
  - Jesus answered them
  lexicon: BDAG
  rationale: φημί commonly introduces direct speech with the simple sense 'say.' 'Said
    to them' is natural English and preserves the narrative function without adding
    nuance such as 'answered' unless context requires it.
- source_word: Οὐ διὰ τοῦτο
  chosen: Is this not the reason
  alternatives:
  - Is it not for this reason
  - Because of this
  lexicon: BDAG
  rationale: The combination οὐ + διὰ τοῦτο in this interrogative context is best
    represented as a rhetorical question expecting agreement. 'Is this not the reason'
    captures both the interrogative force and the causal sense of διά with the accusative.
- source_word: πλανᾶσθε
  chosen: you are mistaken
  alternatives:
  - you are deceived
  - you are led astray
  - you go astray
  lexicon: BDAG
  rationale: πλανάω in the passive/middle can mean 'be mistaken' or 'be led astray.'
    Here Jesus is correcting the Sadducees' error in understanding. 'You are mistaken'
    is idiomatic modern English and fits the intellectual context, while preserving
    the rebuke.
- source_word: μὴ εἰδότες
  chosen: because you know
  alternatives:
  - since you know
  - not knowing
  lexicon: BDAG
  rationale: 'The participial construction gives the grounds for their error: they
    are mistaken because they do not know. In English, an explicit causal clause reads
    more naturally than a bare participle. The negation is carried by ''neither...nor''
    with the following objects.'
- source_word: τὰς γραφὰς
  chosen: the Scriptures
  alternatives:
  - the writings
  - the sacred writings
  lexicon: BDAG
  rationale: γραφή in the plural in Jewish and early Christian usage refers to the
    recognized sacred writings. 'The Scriptures' is the standard and clearest rendering.
- source_word: μηδὲ τὴν δύναμιν τοῦ θεοῦ
  chosen: nor the power of God
  alternatives:
  - nor God's power
  lexicon: BDAG
  rationale: δύναμις is straightforwardly 'power.' The genitive τοῦ θεοῦ is rendered
    with 'of God' for slightly more formal balance with 'the Scriptures,' though 'God's
    power' would also be accurate.
