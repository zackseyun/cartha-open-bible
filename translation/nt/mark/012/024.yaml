theological_decisions:
- issue: Nature of the error described by πλανᾶσθε
  chosen_reading: Jesus rebukes them as being in error or mistaken, without specifying
    whether the emphasis is intellectual misunderstanding or moral/spiritual deception.
  alternative_readings:
  - you are deceived
  - you go astray
  rationale: The Greek allows a range from simple error to being led astray. The context
    centers on their misunderstanding of resurrection, Scripture, and God's power.
    The translation preserves the rebuke without importing a stronger doctrinal claim
    than the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
