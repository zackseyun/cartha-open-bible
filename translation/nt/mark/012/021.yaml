id: MRK.12.21
reference: Mark 12:21
source:
  edition: SBLGNT
  text: καὶ ὁ δεύτερος ἔλαβεν αὐτήν, καὶ ἀπέθανεν ⸂μὴ καταλιπὼν⸃ σπέρμα, καὶ ὁ τρίτος
    ὡσαύτως·
translation:
  text: And the second took her, and died, leaving no offspring, and the third likewise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'married her' for 'took her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δεύτερος
  chosen: the second
  alternatives:
  - the second one
  - the second brother
  lexicon: BDAG
  rationale: Ordinal adjective with article functioning substantivally. 'The second'
    is concise and natural in English; 'brother' is implied by the levirate-marriage
    context but not explicit in this clause, so it is not supplied in the main text.
- source_word: ἔλαβεν αὐτήν
  chosen: took her
  alternatives:
  - married her
  lexicon: BDAG
  rationale: λαμβάνω literally means 'take/receive.' In this context of successive
    brothers and marriage, it idiomatically refers to taking the widow as wife. 'Took
    her' preserves the Greek wording while remaining intelligible; 'married her' is
    a valid contextual gloss but is more interpretive.
- source_word: ἀπέθανεν
  chosen: died
  alternatives:
  - passed away
  lexicon: BDAG
  rationale: Simple aorist of ἀποθνῄσκω, best rendered directly as 'died.' 'Passed
    away' is too euphemistic for the plain narrative style.
- source_word: μὴ καταλιπὼν
  chosen: leaving no
  alternatives:
  - without leaving
  - not having left
  lexicon: BDAG
  rationale: Aorist participle with μή expressing attendant circumstance/result relative
    to his death. 'Leaving no' is idiomatic modern English and captures the sense
    without awkwardness.
- source_word: σπέρμα
  chosen: offspring
  alternatives:
  - seed
  - child
  - descendant
  lexicon: BDAG
  rationale: In this levirate-marriage context, σπέρμα refers to progeny/issue rather
    than literal seed. 'Offspring' is natural, sufficiently formal, and avoids the
    singular narrowing of 'child.' 'Seed' would be overly literal and potentially
    opaque in modern English.
- source_word: ὁ τρίτος ὡσαύτως
  chosen: and the third likewise
  alternatives:
  - and the third did the same
  - and the third in the same way
  lexicon: BDAG
  rationale: ὡσαύτως means 'likewise/in the same way.' The concise rendering mirrors
    the Greek's elliptical style, where the repeated actions are understood from context.
