id: MRK.12.14
reference: Mark 12:14
source:
  edition: SBLGNT
  text: ⸀καὶ ἐλθόντες λέγουσιν αὐτῷ· Διδάσκαλε, οἴδαμεν ὅτι ἀληθὴς εἶ καὶ οὐ μέλει
    σοι περὶ οὐδενός, οὐ γὰρ βλέπεις εἰς πρόσωπον ἀνθρώπων, ἀλλ’ ἐπ’ ἀληθείας τὴν
    ὁδὸν τοῦ θεοῦ διδάσκεις· ἔξεστιν ⸂δοῦναι κῆνσον Καίσαρι⸃ ἢ οὔ; δῶμεν ἢ μὴ δῶμεν;
translation:
  text: And they came and said to him, “Teacher, we know that you are truthful and
    do not care about anyone, for you do not look at the face of men, but truly teach
    the way of God. Is it lawful to pay the poll tax to Caesar or not? Should we pay
    it, or should we not pay it?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “you do not show partiality to people” or “you are not swayed by appearances.”
    reason: lexical_alternative
  - marker: b
    text: The Greek κῆνσος refers to the Roman census or poll tax.
    reason: cultural_note
lexical_decisions:
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Standard address for διδάσκαλος in the Gospels; 'Teacher' is natural
    modern English and preserves the instructional role without archaic overtones.
- source_word: ἀληθὴς
  chosen: truthful
  alternatives:
  - 'true'
  - honest
  lexicon: BDAG
  rationale: Describes Jesus as one who speaks what is true. 'Truthful' fits the personal
    predicate well in English and avoids the slightly abstract feel of 'true' when
    applied to a person.
- source_word: οὐ μέλει σοι περὶ οὐδενός
  chosen: do not care what anyone thinks
  alternatives:
  - are not concerned about anyone
  - it is no concern to you about anyone
  lexicon: BDAG
  rationale: The idiom means Jesus is not swayed by people. This rendering captures
    the sense in idiomatic English while preparing for the explanatory clause that
    follows.
- source_word: οὐ ... βλέπεις εἰς πρόσωπον ἀνθρώπων
  chosen: you do not look at the face of men
  alternatives:
  - you do not show partiality to people
  - you do not judge by appearances
  lexicon: BDAG
  rationale: Literally the phrase refers to looking at a person's face, an idiom for
    showing favoritism or being influenced by status. The main text keeps the concrete
    imagery more closely; the idiomatic sense is preserved in a footnote.
- source_word: ἐπ’ ἀληθείας
  chosen: truly
  alternatives:
  - in truth
  - truthfully
  lexicon: BDAG
  rationale: Adverbial phrase modifying 'teach.' 'Truly' is concise and natural, while
    still reflecting the Greek expression.
- source_word: τὴν ὁδὸν τοῦ θεοῦ
  chosen: the way of God
  alternatives:
  - God’s way
  lexicon: BDAG
  rationale: A familiar biblical expression that should be preserved rather than flattened;
    it refers to God's way or path in teaching and conduct.
- source_word: ἔξεστιν
  chosen: Is it lawful
  alternatives:
  - Is it permitted
  - Is it allowed
  lexicon: BDAG
  rationale: In this dispute setting, the question concerns what is permitted under
    the law and in principle. 'Lawful' preserves the formal, ethical-legal tone.
- source_word: δοῦναι κῆνσον Καίσαρι
  chosen: to pay the poll tax to Caesar
  alternatives:
  - to give tribute to Caesar
  - to pay the tax to Caesar
  lexicon: BDAG
  rationale: κῆνσος refers specifically to the Roman census or poll tax. 'Pay' is
    better English than a wooden 'give' here, and 'poll tax' preserves the historical
    specificity.
- source_word: Καίσαρι
  chosen: Caesar
  alternatives:
  - the emperor
  lexicon: BDAG
  rationale: Proper title/name is best transliterated per project philosophy; 'Caesar'
    is the conventional English form.
- source_word: δῶμεν ἢ μὴ δῶμεν
  chosen: Should we pay it, or should we not pay it?
  alternatives:
  - Are we to give, or not give?
  - Should we pay, or not?
  lexicon: BDAG
  rationale: The repeated verb sharpens the trap question. Supplying 'it' is required
    in English for clarity, with the referent carried over from κῆνσον.
