theological_decisions:
- issue: Rendering the idiom about partiality
  chosen_reading: Kept the concrete expression 'you do not look at the face of men'
    in the main text, with the idiomatic sense preserved in a footnote.
  alternative_readings:
  - you do not show partiality to people
  - you are not swayed by appearances
  rationale: This preserves the source-text imagery while still documenting the idiomatic
    meaning. No doctrinal issue is at stake, but the translation philosophy favors
    original-language primacy and transparency over inherited smoothing.
  doctrine_reference: Translation philosophy §§1, 5
