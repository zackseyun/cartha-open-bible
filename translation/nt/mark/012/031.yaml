theological_decisions:
- issue: Referent of τούτων ('these') in the final clause
  chosen_reading: plural reference to the two commandments together
  alternative_readings:
  - reference only to the immediately preceding second commandment in a generalized
    sense
  rationale: The plural demonstrative naturally points to the pair of commandments
    discussed in context, even though this verse explicitly states the second. Rendering
    'than these' preserves Jesus' summary of the law as centered on both love for
    God and love for neighbor, without collapsing the plural into a singular idea.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition
