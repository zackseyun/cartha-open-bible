id: MRK.12.31
reference: Mark 12:31
source:
  edition: SBLGNT
  text: ⸀δευτέρα αὕτη· Ἀγαπήσεις τὸν πλησίον σου ὡς σεαυτόν. μείζων τούτων ἄλλη ἐντολὴ
    οὐκ ἔστιν.
translation:
  text: 'The second is this: ‘You shall love your neighbor as yourself.’ There is
    no other commandment greater than these.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'No other commandment is greater than these,' with 'these'
      referring to the two commandments together in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: δευτέρα αὕτη
  chosen: The second is this
  alternatives:
  - This is the second
  - The second one is this
  lexicon: BDAG
  rationale: The Greek is elliptical but naturally means 'the second [commandment]
    is this.' English supplies 'is' for readability. Fronting 'The second' preserves
    the Greek emphasis and links clearly to the prior first commandment in context.
- source_word: Ἀγαπήσεις
  chosen: You shall love
  alternatives:
  - You must love
  - Love
  lexicon: BDAG
  rationale: Future indicative in citation of a command from Scripture functions imperativally.
    'You shall love' preserves the scriptural and covenantal force better than the
    more colloquial 'You must love' or the bare imperative.
- source_word: τὸν πλησίον σου
  chosen: your neighbor
  alternatives:
  - your fellow human
  - the one near you
  lexicon: BDAG
  rationale: '''Neighbor'' is the standard and accurate rendering of πλησίον in this
    ethical and scriptural context, preserving the intertextual link to Leviticus
    19:18 and the broader Gospel discussion of who one''s neighbor is.'
- source_word: ὡς σεαυτόν
  chosen: as yourself
  alternatives:
  - as you love yourself
  lexicon: BDAG
  rationale: The concise comparison 'as yourself' closely matches the Greek and traditional
    scriptural phrasing without adding explanatory words not present in the text.
- source_word: μείζων τούτων ἄλλη ἐντολὴ οὐκ ἔστιν
  chosen: There is no other commandment greater than these
  alternatives:
  - No other commandment is greater than these
  - There is not another commandment greater than these
  lexicon: BDAG
  rationale: This preserves the comparative force of μείζων and the plural τούτων
    ('these'), which refers to the two commandments taken together. 'There is no other
    commandment greater than these' is natural English while retaining the Greek sense.
- source_word: ἐντολή
  chosen: commandment
  alternatives:
  - command
  lexicon: BDAG
  rationale: '''Commandment'' better preserves the biblical and covenantal register
    of ἐντολή, especially in a context quoting and ranking Torah commands.'
