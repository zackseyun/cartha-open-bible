id: MRK.12.38
reference: Mark 12:38
source:
  edition: SBLGNT
  text: Καὶ ⸂ἐν τῇ διδαχῇ αὐτοῦ ἔλεγεν⸃· Βλέπετε ἀπὸ τῶν γραμματέων τῶν θελόντων ἐν
    στολαῖς περιπατεῖν καὶ ἀσπασμοὺς ἐν ταῖς ἀγοραῖς
translation:
  text: And in his teaching he was saying, “Beware of the scribes, who want to walk
    around in long robes and receive greetings in the marketplaces,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Watch out for the scribes” or “Be on guard against the scribes.”
    reason: lexical_alternative
  - marker: b
    text: “Long robes” refers to conspicuous outer garments associated with status
      and public honor.
    reason: cultural_note
lexical_decisions:
- source_word: ἐν τῇ διδαχῇ αὐτοῦ
  chosen: in his teaching
  alternatives:
  - as he taught
  - in his instruction
  lexicon: BDAG
  rationale: The prepositional phrase is idiomatic for the setting or sphere of Jesus'
    speech. 'In his teaching' preserves the Greek structure while remaining natural
    English.
- source_word: ἔλεγεν
  chosen: he was saying
  alternatives:
  - he said
  - he kept saying
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated speech. 'He was saying' preserves
    that aspect better than a simple past, while remaining readable.
- source_word: Βλέπετε ἀπὸ
  chosen: Beware of
  alternatives:
  - Watch out for
  - Be on guard against
  lexicon: BDAG
  rationale: The imperative with ἀπό carries the sense of warning against or being
    on guard from certain people. 'Beware of' is concise, idiomatic, and suitably
    serious.
- source_word: γραμματέων
  chosen: the scribes
  alternatives:
  - the teachers of the law
  - the legal experts
  lexicon: BDAG
  rationale: '''Scribes'' is the standard and sufficiently transparent rendering for
    γραμματεῖς in the Gospel context. Alternatives are more interpretive and less
    formally tied to the source term.'
- source_word: τῶν θελόντων
  chosen: who want to
  alternatives:
  - who like to
  - who desire to
  lexicon: BDAG
  rationale: The participle describes characteristic desire or preference. 'Who want
    to' is straightforward and avoids softening the volitional nuance.
- source_word: ἐν στολαῖς περιπατεῖν
  chosen: to walk around in long robes
  alternatives:
  - to walk about in robes
  - to go about in flowing robes
  lexicon: BDAG
  rationale: στολή commonly refers to a long robe or stately garment. 'Long robes'
    makes the social-display nuance clearer for modern readers without over-paraphrasing.
- source_word: ἀσπασμοὺς
  chosen: greetings
  alternatives:
  - formal greetings
  - public greetings
  - salutations
  lexicon: BDAG
  rationale: The noun refers to greetings, here in the sense of honorific public acknowledgment.
    'Greetings' is the most direct rendering; the social-honor nuance is supplied
    by context.
- source_word: ἐν ταῖς ἀγοραῖς
  chosen: in the marketplaces
  alternatives:
  - in the market squares
  - in the public markets
  lexicon: BDAG
  rationale: ἀγοραί are public market areas and gathering places. 'Marketplaces' is
    natural modern English and preserves the public setting.
