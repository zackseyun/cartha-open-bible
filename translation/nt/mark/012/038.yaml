theological_decisions:
- issue: Referent and force of Jesus' warning about the scribes
  chosen_reading: A moral warning against scribes characterized by public-status seeking,
    not a blanket condemnation of every individual scribe.
  alternative_readings:
  - A wholesale denunciation of all scribes as a class
  rationale: The Greek targets 'the scribes' further defined by the participial phrase
    'who want to...' The translation preserves the category named in the text while
    allowing the qualifying description to carry the force of the warning.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
