id: MRK.12.32
reference: Mark 12:32
source:
  edition: SBLGNT
  text: ⸀καὶ εἶπεν αὐτῷ ὁ γραμματεύς· Καλῶς, διδάσκαλε, ἐπ’ ἀληθείας εἶπες ὅτι εἷς
    ἐστιν καὶ οὐκ ἔστιν ἄλλος πλὴν αὐτοῦ·
translation:
  text: And the scribe said to him, “Well said, Teacher. You have spoken truly that
    he is one, and there is no other besides him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly in context, “God is one.” The Greek simply says “he
      is one,” with the referent supplied from the preceding context.
    reason: alternative_reading
lexical_decisions:
- source_word: γραμματεύς
  chosen: scribe
  alternatives:
  - teacher of the law
  - expert in the law
  lexicon: BDAG
  rationale: '"Scribe" is the standard and concise rendering for γραμματεύς in the
    Gospels, referring to a recognized class of Torah scholars. Alternatives are more
    interpretive expansions rather than direct equivalents.'
- source_word: Καλῶς
  chosen: Well said
  alternatives:
  - Right
  - Good
  lexicon: BDAG
  rationale: As an approving adverb introducing the scribe's response, καλῶς naturally
    means "well" or "rightly." "Well said" is idiomatic English that preserves the
    commendation directed at Jesus' previous answer.
- source_word: διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  lexicon: BDAG
  rationale: '"Teacher" is the normal rendering of διδάσκαλος in Gospel address. "Master"
    is possible in older English but is less transparent in modern usage and may suggest
    authority nuances not foregrounded here.'
- source_word: ἐπ’ ἀληθείας
  chosen: truly
  alternatives:
  - in truth
  - truthfully
  lexicon: BDAG
  rationale: The prepositional phrase functions adverbially, affirming the truthfulness
    of Jesus' statement. "Truly" gives clear modern English while preserving the sense.
    "In truth" is more formal but less natural.
- source_word: εἶπες
  chosen: You have spoken
  alternatives:
  - you said
  lexicon: BDAG
  rationale: Although the Greek aorist is simple past, English present perfect can
    naturally convey a recent utterance with present relevance in dialogue. This keeps
    the exchange idiomatic without changing the sense.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Here ὅτι introduces the content of what Jesus said, not the reason for
    the scribe's approval. Therefore "that" is the appropriate complementizer.
- source_word: εἷς ἐστιν
  chosen: he is one
  alternatives:
  - God is one
  - there is one
  lexicon: BDAG
  rationale: The Greek text does not explicitly repeat "God" here; the masculine singular
    pronoun is implied from the prior context of the Shema and then resumed by αὐτοῦ.
    "He is one" preserves the Greek's elliptical form while remaining clear in context.
    "God is one" is interpretively explicit and could be supplied, but the source
    wording is more compressed.
- source_word: ἄλλος
  chosen: other
  alternatives:
  - one else
  lexicon: BDAG
  rationale: In the clause οὐκ ἔστιν ἄλλος, "other" is the direct lexical equivalent.
    English idiom requires supplying "there is no other" rather than a more wooden
    rendering.
- source_word: πλὴν αὐτοῦ
  chosen: besides him
  alternatives:
  - except him
  - but him alone
  lexicon: BDAG
  rationale: 'πλήν with the genitive expresses exception: "except/besides." "Besides
    him" is natural English and preserves the exclusivity of the statement without
    overexpansion.'
