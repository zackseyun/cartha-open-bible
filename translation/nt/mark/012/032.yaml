theological_decisions:
- issue: Implicit subject in εἷς ἐστιν
  chosen_reading: Render the clause as "he is one" rather than explicitly inserting
    "God" in the main text.
  alternative_readings:
  - God is one
  - there is one God
  rationale: The immediate context clearly concerns the one God of Israel, but this
    verse's Greek wording itself is elliptical and does not restate θεός. Preserving
    the implied subject maintains transparency to the source while allowing the context
    to supply the referent. This avoids importing more explicit wording than the verse
    itself contains.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it'
