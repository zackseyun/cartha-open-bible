id: MRK.12.12
reference: Mark 12:12
source:
  edition: SBLGNT
  text: Καὶ ἐζήτουν αὐτὸν κρατῆσαι, καὶ ἐφοβήθησαν τὸν ὄχλον, ἔγνωσαν γὰρ ὅτι πρὸς
    αὐτοὺς τὴν παραβολὴν εἶπεν. καὶ ἀφέντες αὐτὸν ἀπῆλθον.
translation:
  text: And they were seeking to seize him, but they feared the crowd, for they knew
    that he had spoken the parable against them. So they left him and went away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that he had spoken the parable with reference to them' or 'to them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐζήτουν
  chosen: were seeking
  alternatives:
  - were trying
  - kept seeking
  lexicon: BDAG
  rationale: Imperfect tense conveys ongoing or attempted action. 'Were seeking' preserves
    that aspect without overinterpreting motive.
- source_word: κρατῆσαι
  chosen: to seize
  alternatives:
  - to arrest
  - to lay hold of
  lexicon: BDAG
  rationale: κρατέω here means to take hold of or seize. 'Arrest' is possible in context,
    but 'seize' stays closer to the lexical sense and avoids importing a formal legal
    process not explicit in the Greek.
- source_word: ἐφοβήθησαν τὸν ὄχλον
  chosen: they feared the crowd
  alternatives:
  - they were afraid of the crowd
  lexicon: BDAG
  rationale: Aorist middle/passive of φοβέομαι with accusative object is naturally
    rendered 'feared the crowd.' This is concise and idiomatic.
- source_word: ἔγνωσαν
  chosen: they knew
  alternatives:
  - they realized
  - they understood
  lexicon: BDAG
  rationale: The aorist indicates a settled recognition. 'Knew' is the most direct
    rendering; 'realized' is interpretive but possible.
- source_word: πρὸς αὐτοὺς
  chosen: against them
  alternatives:
  - about them
  - with reference to them
  - to them
  lexicon: BDAG
  rationale: In this hostile context, πρός with accusative carries the sense that
    the parable was directed at them adversely. 'Against them' best captures the force
    in natural English. An alternative is preserved in a footnote because the phrase
    can more literally be rendered 'to/with reference to them.'
- source_word: τὴν παραβολὴν
  chosen: the parable
  alternatives:
  - this parable
  lexicon: BDAG
  rationale: The article is retained naturally as 'the parable.' English does not
    require 'this' here, though context identifies the immediately preceding parable.
- source_word: εἶπεν
  chosen: he had spoken
  alternatives:
  - he spoke
  - he said
  lexicon: BDAG
  rationale: English past perfect smooths the sequence after 'they knew that...' by
    indicating prior action relative to their recognition. This is a stylistic adjustment
    consistent with optimal equivalence.
- source_word: ἀφέντες αὐτὸν
  chosen: they left him
  alternatives:
  - leaving him
  - letting him go
  lexicon: BDAG
  rationale: The participle ἀφέντες from ἀφίημι here means leaving him alone or letting
    the attempt drop. 'They left him' is the clearest idiomatic rendering in context.
- source_word: ἀπῆλθον
  chosen: went away
  alternatives:
  - departed
  - went off
  lexicon: BDAG
  rationale: '''Went away'' is natural modern English and preserves the narrative
    movement without sounding archaic.'
