id: MRK.12.20
reference: Mark 12:20
source:
  edition: SBLGNT
  text: ἑπτὰ ἀδελφοὶ ἦσαν· καὶ ὁ πρῶτος ἔλαβεν γυναῖκα, καὶ ἀποθνῄσκων οὐκ ἀφῆκεν
    σπέρμα·
translation:
  text: There were seven brothers; and the first took a wife, and when he died he
    left no offspring.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'left no seed.' The Greek uses 'seed' idiomatically for offspring or
      descendants.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑπτὰ ἀδελφοὶ ἦσαν
  chosen: There were seven brothers
  alternatives:
  - Seven brothers there were
  lexicon: BDAG
  rationale: Natural English rendering of the existential clause while preserving
    the masculine plural 'brothers' rather than neutralizing it, since the context
    is specifically male siblings in a levirate-marriage scenario.
- source_word: ὁ πρῶτος
  chosen: the first
  alternatives:
  - the first one
  - the eldest
  lexicon: BDAG
  rationale: πρῶτος here marks sequence within the set of brothers. 'The first' is
    the most direct rendering; 'the eldest' would add an age nuance not required by
    the context.
- source_word: ἔλαβεν γυναῖκα
  chosen: took a wife
  alternatives:
  - married a woman
  - took a woman as wife
  lexicon: BDAG
  rationale: This idiom commonly means entering marriage. 'Took a wife' preserves
    the source idiom and remains understandable in modern English; 'married a woman'
    is possible but slightly flattens the lexical form.
- source_word: ἀποθνῄσκων
  chosen: when he died
  alternatives:
  - dying
  - and he died
  lexicon: BDAG
  rationale: The present participle is best rendered idiomatically in English as a
    temporal clause. 'When he died' communicates the participial relationship clearly;
    a wooden 'dying' would sound unnatural here.
- source_word: οὐκ ἀφῆκεν
  chosen: he left no
  alternatives:
  - he did not leave
  - he left behind no
  lexicon: BDAG
  rationale: ἀφίημι in this context means to leave behind at death. 'He left no' is
    concise and idiomatic.
- source_word: σπέρμα
  chosen: offspring
  alternatives:
  - seed
  - child
  - descendants
  lexicon: BDAG
  rationale: In this legal/familial context, σπέρμα refers to progeny or issue. 'Offspring'
    is clear modern English and preserves the broader sense better than the overly
    literal 'seed' or the narrower singular 'child'.
