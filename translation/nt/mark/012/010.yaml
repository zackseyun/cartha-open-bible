theological_decisions:
- issue: Messianic use of Psalm 118:22 imagery
  chosen_reading: Retain the stone/builders/cornerstone metaphor without interpretive expansion in the main text.
  alternative_readings:
  - Explicitly identify the stone as the Messiah in the translation
  rationale: The verse alludes to Psalm 118 and in context applies to Jesus, but the translation should preserve the scriptural metaphor rather than import the interpretation directly into the wording. This maintains theological force without paraphrastic expansion.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
