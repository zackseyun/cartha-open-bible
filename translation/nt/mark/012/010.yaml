id: MRK.12.10
reference: Mark 12:10
source:
  edition: SBLGNT
  text: οὐδὲ τὴν γραφὴν ταύτην ἀνέγνωτε· Λίθον ὃν ἀπεδοκίμασαν οἱ οἰκοδομοῦντες, οὗτος ἐγενήθη εἰς κεφαλὴν γωνίας·
translation:
  text: 'Have you not even read this Scripture: ‘The stone that the builders rejected[a], this has become the cornerstone’?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the head of the corner”; traditionally “the chief cornerstone.”
    reason: lexical_alternative
lexical_decisions:
- source_word: γραφὴν
  chosen: Scripture
  alternatives:
  - writing
  - passage of Scripture
  lexicon: BDAG
  rationale: γραφή in the NT commonly refers to sacred Scripture rather than merely any writing. Capitalizing 'Scripture' reflects that recognized sense in Jesus's citation formula.
- source_word: ἀνέγνωτε
  chosen: have ... read
  alternatives:
  - did ... read
  lexicon: BDAG
  rationale: Aorist indicative in a rhetorical question is naturally rendered in idiomatic English as 'have you not read,' a standard way to convey appeal to something available in Scripture.
- source_word: Λίθον
  chosen: The stone
  alternatives:
  - A stone
  lexicon: BDAG
  rationale: Although anarthrous in Greek, the quotation from Psalm 118 is definite in sense, referring to a specific representative stone in the metaphor. English idiom prefers the definite article here.
- source_word: ἀπεδοκίμασαν
  chosen: rejected
  alternatives:
  - disapproved
  - rejected after testing
  lexicon: BDAG
  rationale: ἀποδοκιμάζω carries the sense of rejecting something after evaluation. 'Rejected' is the clearest natural English rendering; the nuance of tested-and-rejected is not fully carried in the main text but is not essential to state explicitly here.
- source_word: οἰκοδομοῦντες
  chosen: the builders
  alternatives:
  - those building
  lexicon: BDAG
  rationale: The present participle functions substantivally. 'The builders' is concise, idiomatic, and preserves the metaphor.
- source_word: ἐγενήθη
  chosen: has become
  alternatives:
  - became
  - was made
  lexicon: BDAG
  rationale: Though formally aorist, English present perfect works well in a quotation highlighting the resulting status of the stone. It preserves both the completed action and its present significance.
- source_word: εἰς κεφαλὴν γωνίας
  chosen: the cornerstone
  alternatives:
  - the head of the corner
  - the chief cornerstone
  - the capstone
  lexicon: BDAG
  rationale: The phrase denotes the principal stone at the corner. 'Cornerstone' is the clearest established English equivalent. 'Capstone' is possible in some discussions, but 'cornerstone' better matches the lexical components and dominant NT usage.
- source_word: οὐδὲ
  chosen: not even
  alternatives:
  - not
  lexicon: BDAG
  rationale: οὐδέ adds an emphatic sense, not merely simple negation. 'Not even' preserves Jesus's sharpened rebuke.
