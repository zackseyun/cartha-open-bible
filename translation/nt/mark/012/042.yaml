id: MRK.12.42
reference: Mark 12:42
source:
  edition: SBLGNT
  text: καὶ ἐλθοῦσα μία χήρα πτωχὴ ἔβαλεν λεπτὰ δύο, ὅ ἐστιν κοδράντης.
translation:
  text: And a poor widow came and put in two lepta, which is a quadrans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A lepton was a very small coin; two lepta equaled one Roman quadrans.
    reason: cultural_note
  - marker: b
    text: 'Or ''two small copper coins.'' Traditional English: ''two mites.'''
    reason: lexical_alternative
  - marker: c
    text: Quadrans is the Roman coin named in the Greek; older English versions often
      render it 'farthing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθοῦσα
  chosen: came
  alternatives:
  - having come
  - arrived
  lexicon: BDAG
  rationale: 'Aorist participle of ἔρχομαι, naturally rendered in English with a finite
    verb coordinated with the main verb: ''came and put in.'' This preserves the narrative
    flow without woodenly retaining the participial form.'
- source_word: μία
  chosen: a
  alternatives:
  - one
  lexicon: BDAG
  rationale: Although μία can mean 'one,' in this context it introduces an individual
    in the narrative ('a poor widow') rather than stressing numerical contrast. English
    idiom prefers the indefinite article here.
- source_word: χήρα
  chosen: widow
  lexicon: BDAG
  rationale: Standard lexical sense; no contextual reason to vary.
- source_word: πτωχὴ
  chosen: poor
  alternatives:
  - destitute
  lexicon: BDAG
  rationale: πτωχός denotes poverty; 'poor' is the natural, readable rendering. 'Destitute'
    would over-specify the degree here, though the broader context highlights her
    extreme poverty.
- source_word: ἔβαλεν
  chosen: put in
  alternatives:
  - threw in
  - cast in
  lexicon: BDAG
  rationale: In the offering-box context, 'put in' communicates the action clearly
    in modern English. 'Cast in' is traditional but archaic; 'threw in' may sound
    too forceful.
- source_word: λεπτὰ δύο
  chosen: two lepta
  alternatives:
  - two small copper coins
  - two mites
  lexicon: BDAG
  rationale: λεπτόν is a very small coin. 'Lepta' preserves the specific coin name
    with transparency to the Greek, while avoiding the archaic 'mites.' The value
    explanation is then supplied by the following appositional clause and footnote.
- source_word: ὅ ἐστιν
  chosen: which is
  alternatives:
  - that is
  - which amounts to
  lexicon: BDAG
  rationale: This clause explains the value equivalence of the two lepta. 'Which is'
    is straightforward and natural.
- source_word: κοδράντης
  chosen: a quadrans
  alternatives:
  - a penny
  - a farthing
  lexicon: BDAG
  rationale: κοδράντης refers to the Roman quadrans. Using 'quadrans' preserves the
    historical coin term more accurately than older English approximations like 'farthing'
    or misleading modernized values like 'penny.'
