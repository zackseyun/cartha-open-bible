id: MRK.12.36
reference: Mark 12:36
source:
  edition: SBLGNT
  text: ⸀αὐτὸς Δαυὶδ εἶπεν ἐν ⸂τῷ πνεύματι τῷ⸃ ἁγίῳ· ⸀Εἶπεν ⸀κύριος τῷ κυρίῳ μου·
    ⸀Κάθου ἐκ δεξιῶν μου ἕως ἂν θῶ τοὺς ἐχθρούς σου ⸀ὑποκάτω τῶν ποδῶν σου.
translation:
  text: David himself said in the Holy Spirit, ‘The Lord said to my Lord, “Sit at
    my right hand until I put your enemies under your feet.”’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The quotation is from Psalm 110:1. In the Hebrew text, the first 'Lord'
      represents the divine name (YHWH, traditionally rendered 'the LORD'), while
      the second refers to David's lord.
    reason: cross_reference
  - marker: b
    text: Or 'by the Holy Spirit.'
    reason: alternative_reading
lexical_decisions:
- source_word: αὐτὸς
  chosen: himself
  alternatives:
  - David himself
  - David personally
  lexicon: BDAG
  rationale: The intensive use of αὐτός emphasizes David as the speaker. 'Himself'
    preserves the emphatic force naturally in English.
- source_word: ἐν τῷ πνεύματι τῷ ἁγίῳ
  chosen: in the Holy Spirit
  alternatives:
  - by the Holy Spirit
  - in the Spirit, the Holy One
  lexicon: BDAG
  rationale: The preposition ἐν with the dative is rendered straightforwardly as 'in.'
    This preserves the Greek wording and avoids over-interpreting the precise mode
    of inspiration, while still clearly referring to the Holy Spirit.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In this citation from
    Psalm 110:1, the first κύριος represents the divine speaker and the second refers
    to David's lord; English capitalization cannot fully distinguish the two as Greek
    does not, but 'Lord' is the required default.
- source_word: τῷ κυρίῳ μου
  chosen: to my Lord
  alternatives:
  - to my master
  lexicon: BDAG
  rationale: Retains the repeated κύριος wording in the quotation and preserves the
    christological force of Jesus' argument. 'My Lord' is more fitting than 'my master'
    in this canonical context.
- source_word: Κάθου
  chosen: Sit
  alternatives:
  - Be seated
  - Sit down
  lexicon: BDAG
  rationale: The present middle imperative is idiomatically rendered 'Sit.' This is
    the standard and most natural English equivalent in enthronement language.
- source_word: ἐκ δεξιῶν μου
  chosen: at my right hand
  alternatives:
  - at my right side
  - from my right hand
  lexicon: BDAG
  rationale: Although ἐκ is literally 'from/out of,' the idiom ἐκ δεξιῶν means 'at
    the right hand/right side.' 'At my right hand' is the established and accurate
    idiomatic rendering.
- source_word: ἕως ἂν θῶ
  chosen: until I put
  alternatives:
  - until I place
  - while I put
  lexicon: BDAG
  rationale: 'This construction expresses a future contingency viewed from the command:
    ''until I put.'' It is concise and idiomatic in English.'
- source_word: ὑποκάτω τῶν ποδῶν σου
  chosen: under your feet
  alternatives:
  - beneath your feet
  - as a footstool for your feet
  lexicon: BDAG
  rationale: The Greek here says literally 'under your feet,' not the fuller Psalmic
    expression 'footstool.' The chosen rendering stays close to Mark's wording while
    preserving the image of subjugation.
