theological_decisions:
- issue: Rendering of David's prophetic speech formula
  chosen_reading: David himself said in the Holy Spirit
  alternative_readings:
  - David himself said by the Holy Spirit
  rationale: The wording affirms the Holy Spirit's role in David's speech without
    specifying a narrower theory of inspiration than the Greek states. This preserves
    theological tension appropriately.
  doctrine_reference: Translation philosophy §3; Affirmations (Nicene orthodoxy regarding
    the Holy Spirit)
- issue: Christological force of Psalm 110:1 citation
  chosen_reading: The Lord said to my Lord
  alternative_readings:
  - The LORD said to my Lord
  rationale: Because the Greek text has κύριος for both referents, the main text keeps
    'Lord' for each in line with the default rendering of κύριος. The likely allusion
    to the divine name in the Hebrew source is important and is preserved in a footnote
    rather than imported into the main text beyond the Greek wording.
  doctrine_reference: 'Contested terms table: κύριος → Lord; Translation philosophy
    §1'
