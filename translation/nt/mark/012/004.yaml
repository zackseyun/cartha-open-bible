id: MRK.12.4
reference: Mark 12:4
source:
  edition: SBLGNT
  text: καὶ πάλιν ἀπέστειλεν πρὸς αὐτοὺς ἄλλον δοῦλον· ⸀κἀκεῖνον ⸀ἐκεφαλίωσαν καὶ
    ⸀ἠτίμασαν.
translation:
  text: And again he sent another servant to them, and they struck him on the head
    and dishonored him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'another slave.' The Greek word doulos can mean either 'servant' or 'slave'
      depending on context.
    reason: alternative_reading
  - marker: b
    text: The rare verb here refers to violence directed at the head; it likely means
      'struck him on the head' or 'wounded him in the head,' not 'beheaded him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'treated him shamefully.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  - another time
  lexicon: BDAG
  rationale: Marks repeated action in the sequence of the parable; 'again' is the
    most natural concise English equivalent.
- source_word: ἀπέστειλεν
  chosen: he sent
  alternatives:
  - he dispatched
  lexicon: BDAG
  rationale: Aorist indicative narrates a simple past event. 'Sent' is standard and
    clear in parabolic narrative.
- source_word: πρὸς αὐτοὺς
  chosen: to them
  alternatives:
  - toward them
  lexicon: BDAG
  rationale: With verbs of sending, πρὸς + accusative is idiomatically rendered 'to'
    in English.
- source_word: ἄλλον δοῦλον
  chosen: another servant
  alternatives:
  - another slave
  - another bondservant
  lexicon: BDAG
  rationale: Per doctrine, δοῦλος may be rendered 'servant' or 'slave' context-dependently.
    In this parable the social status is real, but the bonded nature is not the main
    theological emphasis in this verse; 'servant' reads naturally while preserving
    the master-servant relationship. The alternative 'slave' is preserved in a footnote
    for auditability.
- source_word: κἀκεῖνον
  chosen: him
  alternatives:
  - that one
  - and that one
  lexicon: BDAG
  rationale: The crasis intensifies continuity ('and that one also'), but English
    style is best served by folding this into the clause with the object pronoun 'him.'
    The connective force is already carried by 'and.'
- source_word: ἐκεφαλίωσαν
  chosen: struck him on the head
  alternatives:
  - wounded him in the head
  - beat him on the head
  lexicon: BDAG
  rationale: The verb literally relates to the head and in context denotes violent
    treatment directed at the head, not decapitation here. 'Struck him on the head'
    is the clearest idiomatic rendering and avoids the misleading English association
    of 'beheaded.' An alternative is preserved in a footnote because the verb is rare
    and debated.
- source_word: ἠτίμασαν
  chosen: dishonored him
  alternatives:
  - treated him shamefully
  - insulted him
  lexicon: BDAG
  rationale: The verb denotes treating someone with dishonor or shame. 'Dishonored
    him' is concise and preserves the public-shame dimension; 'treated him shamefully'
    is a viable dynamic alternative preserved in a footnote.
