theological_decisions:
- issue: Rendering the participial summary clause in idiomatic English
  chosen_reading: 'Convert the Greek participles into finite verbs: ''some they beat, and some they killed.'''
  alternative_readings:
  - '''beating some and killing some'''
  - '''some being beaten and others being killed'''
  rationale: This is a stylistic and syntactic decision rather than a doctrinal one. The Greek participles summarize repeated actions toward many servants. Finite verbs best express the distributive sense in readable modern English while preserving the violence and progression of the parable.
