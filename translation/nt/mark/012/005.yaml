id: MRK.12.5
reference: Mark 12:5
source:
  edition: SBLGNT
  text: ⸀καὶ ἄλλον ἀπέστειλεν· κἀκεῖνον ἀπέκτειναν, καὶ πολλοὺς ἄλλους, ⸂οὓς μὲν δέροντες οὓς δὲ ἀποκτέννοντες⸃.
translation:
  text: And he sent another[a], and they killed that one; and many others—some they beat, and some they killed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'many others, some beating and some killing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλον
  chosen: another
  alternatives:
  - one more
  - a different one
  lexicon: BDAG
  rationale: ἄλλος here refers to another servant in the sequence of those sent by the owner. 'Another' is the most natural and sufficiently formal rendering in English.
- source_word: ἀπέστειλεν
  chosen: he sent
  alternatives:
  - he dispatched
  lexicon: BDAG
  rationale: The aorist verb simply states the action of sending. 'He sent' is clear, idiomatic, and preserves the narrative force without overtranslating.
- source_word: κἀκεῖνον
  chosen: that one
  alternatives:
  - him also
  - that one too
  lexicon: BDAG
  rationale: κἀκεῖνον combines καί + ἐκεῖνον, giving an additive sense ('that one also'). 'That one' preserves the demonstrative emphasis; the additive force is adequately conveyed by the surrounding sequence and conjunctions.
- source_word: ἀπέκτειναν
  chosen: they killed
  alternatives:
  - they put to death
  lexicon: BDAG
  rationale: ἀποκτείνω straightforwardly means 'kill' or 'put to death.' 'Killed' is the most natural modern English rendering and matches the violence of the parable.
- source_word: πολλοὺς ἄλλους
  chosen: many others
  alternatives:
  - many more
  lexicon: BDAG
  rationale: The phrase refers to additional servants beyond the one just mentioned. 'Many others' is a direct and natural rendering.
- source_word: οὓς μὲν ... οὓς δὲ
  chosen: some ... and some
  alternatives:
  - some ... others
  - some indeed ... but others
  lexicon: BDAG
  rationale: The correlative construction distributes the treatment among the many others. 'Some ... and some' is idiomatic English and preserves the distributive contrast without sounding wooden.
- source_word: δέροντες
  chosen: they beat
  alternatives:
  - they flogged
  - they struck
  lexicon: BDAG
  rationale: δέρω commonly means to beat or thrash. 'Beat' is broad enough to fit the context and avoids specifying a formal judicial flogging that the text does not require.
- source_word: ἀποκτέννοντες
  chosen: they killed
  alternatives:
  - they were killing
  - they put to death
  lexicon: BDAG
  rationale: 'Although the participle is present in form, in this compressed narrative summary it functions distributively alongside δέροντες: some were beaten, others killed. English finite verbs communicate the sense more naturally than participles here.'
