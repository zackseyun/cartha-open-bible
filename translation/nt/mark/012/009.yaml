theological_decisions:
- issue: Rendering κύριος in a parabolic, non-divine referent
  chosen_reading: owner
  alternative_readings:
  - lord
  - master
  rationale: The doctrine defaults κύριος to 'Lord' where it functions as a title
    with theological weight. In this verse, however, the immediate referent is the
    vineyard's proprietor within the story world. Rendering it 'owner' follows original-language
    primacy and avoids suggesting that the Greek explicitly uses a divine title here,
    while still allowing the parable's broader theological implications to emerge
    from context rather than from an over-theologized gloss.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §2; Contested terms
    table for κύριος'
