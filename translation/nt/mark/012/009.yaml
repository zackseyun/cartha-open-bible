id: MRK.12.9
reference: Mark 12:9
source:
  edition: SBLGNT
  text: ⸀τί ποιήσει ὁ κύριος τοῦ ἀμπελῶνος; ἐλεύσεται καὶ ἀπολέσει τοὺς γεωργούς,
    καὶ δώσει τὸν ἀμπελῶνα ἄλλοις.
translation:
  text: What will the owner of the vineyard do? He will come and destroy the tenant
    farmers, and give the vineyard to others.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the lord of the vineyard'' or ''the master of the vineyard''; Greek:
      ''the kyrios of the vineyard.'' Here the term refers to the vineyard''s proprietor
      within the parable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τί
  chosen: What
  alternatives:
  - What then
  lexicon: BDAG
  rationale: Interrogative pronoun introducing Jesus' rhetorical question. A simple
    'What' best matches the Greek without adding connective force not present in the
    text.
- source_word: ποιήσει
  chosen: will do
  alternatives:
  - is going to do
  lexicon: BDAG
  rationale: Future active indicative of ποιέω. 'Will do' is the most direct and natural
    future rendering in English.
- source_word: ὁ κύριος τοῦ ἀμπελῶνος
  chosen: the owner of the vineyard
  alternatives:
  - the lord of the vineyard
  - the master of the vineyard
  lexicon: BDAG
  rationale: Although κύριος commonly defaults to 'Lord' in theological/title contexts,
    here it refers to the human proprietor within a parable. 'Owner' best conveys
    the contextual sense and avoids importing christological overtones into the immediate
    wording.
- source_word: ἀμπελῶνος / ἀμπελῶνα
  chosen: vineyard
  alternatives:
  - vineyard estate
  lexicon: BDAG
  rationale: Standard rendering of ἀμπελών in parabolic/agricultural contexts.
- source_word: ἐλεύσεται
  chosen: He will come
  alternatives:
  - He will arrive
  lexicon: BDAG
  rationale: Future middle of ἔρχομαι. 'He will come' is idiomatic and preserves the
    vividness of the owner's intervention.
- source_word: ἀπολέσει
  chosen: destroy
  alternatives:
  - kill
  - bring to ruin
  lexicon: BDAG
  rationale: ἀπόλλυμι here denotes decisive judgment against the tenants. 'Destroy'
    preserves the severity while remaining broad enough to fit the parabolic register;
    'kill' is possible but narrower than the verb itself requires.
- source_word: τοὺς γεωργούς
  chosen: the tenant farmers
  alternatives:
  - the farmers
  - the tenants
  - the vine-growers
  lexicon: BDAG
  rationale: γεωργός literally means 'farmer/cultivator,' but in this parable these
    are not mere laborers; they are those leasing and working another man's vineyard.
    'Tenant farmers' captures both the agricultural and tenancy dimensions important
    to the story.
- source_word: δώσει
  chosen: give
  alternatives:
  - entrust
  - lease
  lexicon: BDAG
  rationale: Future of δίδωμι. 'Give' is the direct lexical equivalent. While the
    real-world action implies entrusting or leasing, the Greek verb itself is broader
    and should not be over-specified.
- source_word: ἄλλοις
  chosen: to others
  alternatives:
  - to other people
  - to other tenants
  lexicon: BDAG
  rationale: Dative plural of ἄλλος. 'To others' is faithful and leaves the referent
    appropriately open, as in the Greek.
