  chosen_reading: they
  alternative_readings:
  - the chief priests, the scribes, and the elders (from context)
  - the authorities
  rationale: The verse does not restate the subject, so the translation preserves
    the Greek's implicit plural with 'they' rather than importing a more specific
    identification from the previous context into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import claims the text does not make.
