id: MRK.12.13
reference: Mark 12:13
source:
  edition: SBLGNT
  text: Καὶ ἀποστέλλουσιν πρὸς αὐτόν τινας τῶν Φαρισαίων καὶ τῶν Ἡρῳδιανῶν ἵνα αὐτὸν
    ἀγρεύσωσιν λόγῳ.
translation:
  text: And they send to him some of the Pharisees and some of the Herodians, so that
    they might trap him by a word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ensnare him by what he said.' The Greek verb is a hunting metaphor,
      and the final phrase indicates trapping him through his speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποστέλλουσιν
  chosen: they sent
  alternatives:
  - they send
  - they dispatched
  lexicon: BDAG
  rationale: Although the Greek uses a historical present, English narrative style
    commonly renders it as a simple past for natural readability. 'Sent' preserves
    the action without adding nuance beyond the source.
- source_word: τινας τῶν Φαρισαίων καὶ τῶν Ἡρῳδιανῶν
  chosen: some of the Pharisees and some of the Herodians
  alternatives:
  - some Pharisees and Herodians
  - certain ones from the Pharisees and the Herodians
  lexicon: BDAG
  rationale: The partitive construction with τινας + genitive is best represented
    by 'some of the ... and some of the ...,' making clear that representatives from
    both groups were sent.
- source_word: Φαρισαίων
  chosen: Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the Jewish group name, in keeping with the
    philosophy of transliterating personal and group names rather than translating
    them.
- source_word: Ἡρῳδιανῶν
  chosen: Herodians
  lexicon: BDAG
  rationale: Standard transliteration of the political/religious group associated
    with Herod.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: Expresses purpose clearly in modern English while preserving the subordinate
    purpose clause.
- source_word: ἀγρεύσωσιν
  chosen: might trap
  alternatives:
  - might catch
  - might ensnare
  lexicon: BDAG
  rationale: The verb literally evokes catching as in hunting, used metaphorically
    here for entrapping someone. 'Trap' is idiomatic and preserves the hostile intent.
- source_word: λόγῳ
  chosen: with a word
  alternatives:
  - by a statement
  - in his speech
  - in what he said
  lexicon: BDAG
  rationale: The dative indicates means or instrument. 'With a word' is a relatively
    formal but clear rendering that preserves the singular λόγῳ and the sense of entrapping
    him through his own spoken response.
