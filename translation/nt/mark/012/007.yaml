theological_decisions:
- issue: Parable-specific rendering of γεωργοί
  chosen_reading: tenant farmers
  alternative_readings:
  - tenants
  - vinedressers
  - farmers
  rationale: The term is not theologically contested in DOCTRINE.md, but the parable's
    force depends on recognizing that these are leaseholders responsible to an owner.
    'Tenant farmers' preserves that relationship without importing extra allegorical
    interpretation.
  doctrine_reference: Translation philosophy §1, §5
