id: MRK.12.7
reference: Mark 12:7
source:
  edition: SBLGNT
  text: ἐκεῖνοι δὲ οἱ γεωργοὶ ⸂πρὸς ἑαυτοὺς εἶπαν⸃ ὅτι Οὗτός ἐστιν ὁ κληρονόμος· δεῦτε
    ἀποκτείνωμεν αὐτόν, καὶ ἡμῶν ἔσται ἡ κληρονομία.
translation:
  text: But those tenant farmers said to one another, ‘This is the heir. Come, let
    us kill him, and the inheritance will be ours.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'said among themselves.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the inheritance will belong to us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκεῖνοι δὲ
  chosen: But those
  alternatives:
  - And those
  - Now those
  lexicon: BDAG
  rationale: δέ is rendered with mild adversative force as 'But' to carry the narrative
    contrast forward naturally in English; ἐκεῖνοι is kept demonstrative as 'those'
    rather than omitted.
- source_word: γεωργοὶ
  chosen: tenant farmers
  alternatives:
  - farmers
  - tenants
  - vinedressers
  lexicon: BDAG
  rationale: In the context of the vineyard parable, γεωργοί are not merely agricultural
    workers but those leasing and working the land. 'Tenant farmers' makes the social
    role explicit and fits the immediate context better than the more generic 'farmers'
    or the traditional but narrower 'vinedressers.'
- source_word: πρὸς ἑαυτοὺς εἶπαν
  chosen: said to one another
  alternatives:
  - said among themselves
  - said to themselves
  lexicon: BDAG
  rationale: The idiom πρός + reflexive pronoun with λέγω indicates speech within
    the group. 'Said to one another' is idiomatic English and preserves the mutual
    deliberation better than the potentially internalized 'said to themselves.'
- source_word: ὅτι
  chosen: ‘
  alternatives:
  - that
  lexicon: BDAG
  rationale: ὅτι introduces direct discourse here. English punctuation with quotation
    marks communicates this more naturally than retaining 'that.'
- source_word: Οὗτός ἐστιν ὁ κληρονόμος
  chosen: This is the heir
  alternatives:
  - This is the inheritor
  lexicon: BDAG
  rationale: κληρονόμος is best rendered 'heir,' the standard and natural English
    legal/familial term. The demonstrative 'This' is preserved for immediacy.
- source_word: δεῦτε
  chosen: Come
  alternatives:
  - Come now
  lexicon: BDAG
  rationale: δεῦτε is an exhortational summons. 'Come' is concise and idiomatic; 'Come
    now' is possible but slightly more interpretive in tone.
- source_word: ἀποκτείνωμεν
  chosen: let us kill
  alternatives:
  - let us murder
  - let us put to death
  lexicon: BDAG
  rationale: The first person plural aorist subjunctive after δεῦτε functions as a
    hortatory proposal. 'Let us kill' is the most direct and natural rendering. 'Murder'
    adds a legal/moral nuance not explicit in the verb itself, while 'put to death'
    sounds more formal than the context requires.
- source_word: καὶ ἡμῶν ἔσται ἡ κληρονομία
  chosen: and the inheritance will be ours
  alternatives:
  - and the inheritance will belong to us
  - and his inheritance will be ours
  lexicon: BDAG
  rationale: This clause expresses the tenants' expectation of possession. 'The inheritance
    will be ours' is idiomatic and preserves the emphatic possessive sense of ἡμῶν.
    'His' is not explicit in the Greek and is therefore not added to the main text.
