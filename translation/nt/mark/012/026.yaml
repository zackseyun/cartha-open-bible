theological_decisions:
- issue: Resurrection language in ὅτι ἐγείρονται
  chosen_reading: that they are raised
  alternative_readings:
  - that they rise
  rationale: The verse concerns the resurrection of the dead. Rendering the passive-form
    verb as 'are raised' preserves the theological nuance that resurrection is effected
    by God, while not importing more than the Greek states.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
- issue: Citation formula and present tense in the divine self-identification
  chosen_reading: I am the God of Abraham and the God of Isaac and the God of Jacob
  rationale: The present-tense citation is central to Jesus' argument for the living
    status of the patriarchs before God. The translation preserves the tense and repeated
    structure without paraphrase.
  doctrine_reference: Original-language primacy over translation tradition
