id: MRK.12.26
reference: Mark 12:26
source:
  edition: SBLGNT
  text: περὶ δὲ τῶν νεκρῶν ὅτι ἐγείρονται οὐκ ἀνέγνωτε ἐν τῇ βίβλῳ Μωϋσέως ἐπὶ τοῦ
    βάτου ⸀πῶς εἶπεν αὐτῷ ὁ θεὸς λέγων· Ἐγὼ ὁ θεὸς Ἀβραὰμ καὶ ⸂ὁ θεὸς Ἰσαὰκ καὶ ὁ⸃
    θεὸς Ἰακώβ;
translation:
  text: And concerning the dead, that they are raised, have you not read in the book
    of Moses, in the passage about the bush, how God spoke to him, saying, ‘I am the
    God of Abraham and the God of Isaac and the God of Jacob’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “at the bush”; the Greek expression can identify the Scripture passage
      by the episode of the bush.
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ δὲ τῶν νεκρῶν
  chosen: And concerning the dead
  alternatives:
  - Now concerning the dead
  - But concerning the dead
  lexicon: BDAG
  rationale: περὶ with the genitive introduces the topic under discussion. δέ is carried
    with a light connective 'And' to preserve discourse flow without overstating contrast.
- source_word: ὅτι ἐγείρονται
  chosen: that they are raised
  alternatives:
  - that they rise
  - that they are being raised
  lexicon: BDAG
  rationale: ἐγείρονται is present passive/passive-form and in this context refers
    to resurrection. 'Are raised' is idiomatic English for the general truth under
    debate and preserves the passive sense better than the intransitive 'rise'.
- source_word: οὐκ ἀνέγνωτε
  chosen: have you not read
  alternatives:
  - did you not read
  lexicon: BDAG
  rationale: The aorist can be rendered as a simple past, but in English Jesus' rhetorical
    formula is most naturally 'have you not read,' which conveys appeal to Scripture
    familiar from Gospel usage.
- source_word: ἐν τῇ βίβλῳ Μωϋσέως
  chosen: in the book of Moses
  alternatives:
  - in the scroll of Moses
  lexicon: BDAG
  rationale: βίβλος can denote book/scroll. 'Book of Moses' is the most natural English
    expression and clearly refers to the Mosaic writings.
- source_word: ἐπὶ τοῦ βάτου
  chosen: in the passage about the bush
  alternatives:
  - at the bush
  - in the section about the bush
  lexicon: BDAG
  rationale: This idiom points to the scriptural section identified by the burning
    bush episode rather than merely a physical location. 'In the passage about the
    bush' makes the citation-reference function explicit for modern readers.
- source_word: πῶς εἶπεν αὐτῷ ὁ θεὸς
  chosen: how God spoke to him
  alternatives:
  - how God said to him
  - how God spoke with him
  lexicon: BDAG
  rationale: πῶς here introduces the content/manner of what was said in the cited
    passage. 'Spoke to him' is natural English and fits the following direct quotation.
- source_word: λέγων
  chosen: saying
  alternatives:
  - when he said
  lexicon: BDAG
  rationale: The participle introduces the quotation directly and is best represented
    by the standard English quotative 'saying'.
- source_word: Ἐγὼ ὁ θεὸς Ἀβραὰμ καὶ ὁ θεὸς Ἰσαὰκ καὶ ὁ θεὸς Ἰακώβ
  chosen: I am the God of Abraham and the God of Isaac and the God of Jacob
  alternatives:
  - I am Abraham's God and Isaac's God and Jacob's God
  lexicon: BDAG
  rationale: The repeated article+noun structure is preserved with repeated 'the God
    of' for rhetorical force, matching the Greek and the scriptural citation. 'I am'
    is retained explicitly because Jesus' argument depends on the wording of the citation.
