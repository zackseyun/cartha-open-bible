theological_decisions:
- issue: Implication of the scribe's standing relative to salvation/the kingdom
  chosen_reading: Rendered 'You are not far from the kingdom of God' without implying
    that he has already entered it.
  alternative_readings:
  - You are near the kingdom of God
  rationale: 'The Greek states proximity, not possession or entry. The translation
    preserves the theological tension: Jesus commends the man''s discernment while
    not declaring him fully within the kingdom.'
  doctrine_reference: Preserve theological tension rather than resolve it.
