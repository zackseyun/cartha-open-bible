id: MRK.12.34
reference: Mark 12:34
source:
  edition: SBLGNT
  text: καὶ ὁ Ἰησοῦς ἰδὼν ⸀αὐτὸν ὅτι νουνεχῶς ἀπεκρίθη εἶπεν αὐτῷ· Οὐ μακρὰν εἶ ἀπὸ
    τῆς βασιλείας τοῦ θεοῦ. καὶ οὐδεὶς οὐκέτι ἐτόλμα αὐτὸν ἐπερωτῆσαι.
translation:
  text: And Jesus, seeing that he had answered wisely, said to him, “You are not far
    from the kingdom of God.” And no one any longer dared to question him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You are near the kingdom of God.' The Greek expresses proximity, not
      explicit entry.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν
  chosen: seeing
  alternatives:
  - when he saw
  - having seen
  lexicon: BDAG
  rationale: A participial construction best carried into natural English as 'seeing,'
    preserving the causal/observational sense without overformal stiffness.
- source_word: νουνεχῶς
  chosen: wisely
  alternatives:
  - intelligently
  - sensibly
  - understandingly
  lexicon: BDAG
  rationale: The adverb denotes thoughtful good sense or prudence. 'Wisely' is concise,
    idiomatic, and captures commendable discernment in the scribe's answer.
- source_word: ἀπεκρίθη
  chosen: had answered
  alternatives:
  - answered
  - replied
  lexicon: BDAG
  rationale: English past perfect fits the participial frame ('seeing that he had
    answered...'), clarifying sequence relative to Jesus' subsequent speech.
- source_word: Οὐ μακρὰν εἶ ἀπὸ
  chosen: You are not far from
  alternatives:
  - You are not far away from
  - You are near to
  lexicon: BDAG
  rationale: This preserves the spatial metaphor in idiomatic English without collapsing
    it into a stronger statement such as actual entry into the kingdom.
- source_word: βασιλείας τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: '''Kingdom of God'' is the standard and contextually clear rendering
    in the Synoptics, preserving both realm and reign connotations without unnecessary
    novelty.'
- source_word: οὐκέτι
  chosen: any longer
  alternatives:
  - no longer
  - anymore
  lexicon: BDAG
  rationale: '''Any longer'' reads naturally in contemporary English and preserves
    the temporal force that from this point onward no one dared continue questioning
    him.'
- source_word: ἐτόλμα
  chosen: dared
  alternatives:
  - was daring
  - ventured
  lexicon: BDAG
  rationale: The imperfect is well represented idiomatically by 'dared' in this summary
    statement; 'ventured' is possible but less direct.
- source_word: ἐπερωτῆσαι
  chosen: to question
  alternatives:
  - to ask
  - to interrogate
  lexicon: BDAG
  rationale: The verb here means to put a question to someone, often with testing
    force in context. 'Question' preserves that nuance better than the more neutral
    'ask' without overstating to 'interrogate'.
