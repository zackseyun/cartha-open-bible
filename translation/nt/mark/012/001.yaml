theological_decisions:
- issue: Rendering of ἄνθρωπος
  chosen_reading: a man
  alternative_readings:
  - a person
  - someone
  rationale: No doctrinal controversy is present, but the translation follows the
    project's gender-accurate policy. In this parable the referent is a male landowner,
    so 'a man' best matches the source and narrative imagery.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Specificity of γεωργοῖς in context
  chosen_reading: tenant farmers
  alternative_readings:
  - farmers
  - vinedressers
  rationale: The social-economic relationship is important to the parable's force.
    Because the vineyard is explicitly leased out, the more specific English rendering
    clarifies the ownership/tenancy distinction without adding foreign content.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 6
