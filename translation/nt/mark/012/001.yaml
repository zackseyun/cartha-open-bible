id: MRK.12.1
reference: Mark 12:1
source:
  edition: SBLGNT
  text: Καὶ ἤρξατο αὐτοῖς ἐν παραβολαῖς ⸀λαλεῖν· Ἀμπελῶνα ⸂ἄνθρωπος ἐφύτευσεν⸃, καὶ
    περιέθηκεν φραγμὸν καὶ ὤρυξεν ὑπολήνιον καὶ ᾠκοδόμησεν πύργον, καὶ ἐξέδετο αὐτὸν
    γεωργοῖς, καὶ ἀπεδήμησεν.
translation:
  text: 'And he began to speak to them in parables: “A man planted a vineyard, and
    put a fence around it, and dug a winepress pit, and built a tower, and leased
    it to tenant farmers, and went away.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “set a hedge around it.” The Greek φραγμός can denote a fence, hedge,
      or enclosing barrier.
    reason: lexical_alternative
  - marker: b
    text: Or “dug a pit for the winepress.” The Greek ὑπολήνιον refers specifically
      to the lower vat or pit of a winepress.
    reason: lexical_alternative
  - marker: c
    text: Or “rented it out to farmers” or “leased it to vinedressers.”
    reason: lexical_alternative
  - marker: d
    text: The imagery echoes Isaiah 5:1–2, where a vineyard is planted, enclosed,
      and equipped.
    reason: cross_reference
lexical_decisions:
- source_word: ἤρξατο
  chosen: began
  alternatives:
  - started
  lexicon: BDAG
  rationale: Aorist middle of ἄρχω with infinitive λαλεῖν is a standard inceptive
    construction, best rendered 'began to speak.' 'Started' is possible but slightly
    less natural in this narrative register.
- source_word: ἐν παραβολαῖς
  chosen: in parables
  alternatives:
  - with parables
  - by parables
  lexicon: BDAG
  rationale: The preposition ἐν with plural παραβολαῖς is naturally rendered 'in parables,'
    preserving both the idiom and the literary form Jesus is using.
- source_word: λαλεῖν
  chosen: to speak
  alternatives:
  - to say
  lexicon: BDAG
  rationale: λαλέω commonly means 'speak' rather than the more content-focused 'say.'
    'Speak' fits the construction with ἤρξατο and the introduction to extended discourse.
- source_word: Ἀμπελῶνα
  chosen: a vineyard
  lexicon: BDAG
  rationale: Direct and standard rendering of ἀμπελών. The anarthrous noun in English
    idiom is best introduced with the indefinite article in the opening of the parable.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: BDAG
  rationale: Gender-accurate rendering per translation philosophy. Here ἄνθρωπος refers
    to a male landowner within the story, not generic humanity, so 'a man' is the
    most precise choice.
- source_word: ἐφύτευσεν
  chosen: planted
  lexicon: BDAG
  rationale: Standard rendering of φυτεύω in an agricultural context.
- source_word: περιέθηκεν φραγμόν
  chosen: put a fence around it
  alternatives:
  - set a hedge around it
  - put an enclosure around it
  lexicon: BDAG
  rationale: περιτίθημι + φραγμός denotes placing a protective boundary around the
    vineyard. 'Fence' is clear modern English; 'hedge' is traditional and possible,
    but may suggest specifically vegetation rather than any enclosing barrier.
- source_word: ὤρυξεν ὑπολήνιον
  chosen: dug a winepress pit
  alternatives:
  - dug a pit for the winepress
  - dug a vat
  lexicon: BDAG
  rationale: ὑπολήνιον refers to the lower receptacle/pit associated with a winepress.
    'Winepress pit' is concise and communicates the specific agricultural feature
    better than simply 'winepress,' which can obscure the compound's more precise
    sense.
- source_word: ᾠκοδόμησεν πύργον
  chosen: built a tower
  lexicon: BDAG
  rationale: Straightforward rendering preserving the sequence of preparations made
    by the owner.
- source_word: ἐξέδετο
  chosen: leased it
  alternatives:
  - rented it out
  - let it out
  lexicon: BDAG
  rationale: The middle of ἐκδίδωμι in this context means to lease out or let out
    property. 'Leased it' is precise and natural in modern English.
- source_word: γεωργοῖς
  chosen: tenant farmers
  alternatives:
  - farmers
  - vinedressers
  - cultivators
  lexicon: BDAG
  rationale: Given the leasing context created by ἐξέδετο, γεωργοῖς are not merely
    generic farmers but those farming land belonging to another. 'Tenant farmers'
    makes the social relation explicit and prepares for the parable's logic.
- source_word: ἀπεδήμησεν
  chosen: went away
  alternatives:
  - went on a journey
  - traveled abroad
  lexicon: BDAG
  rationale: ἀποδημέω means to go away, often to another place for some time. 'Went
    away' is idiomatic and sufficient here; 'went on a journey' is also possible but
    slightly more interpretive.
