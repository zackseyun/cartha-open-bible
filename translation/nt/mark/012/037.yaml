id: MRK.12.37
reference: Mark 12:37
source:
  edition: SBLGNT
  text: ⸀αὐτὸς Δαυὶδ λέγει αὐτὸν κύριον, καὶ πόθεν ⸂αὐτοῦ ἐστιν υἱός⸃; καὶ ὁ πολὺς
    ὄχλος ἤκουεν αὐτοῦ ἡδέως.
translation:
  text: David himself calls him Lord, so how is he his son? And the large crowd was
    listening to him gladly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'from where is he his son?'
    reason: lexical_alternative
  - marker: b
    text: '''Son'' here echoes the messianic title ''son of David''; it can also carry
      the broader sense ''descendant.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς
  chosen: himself
  alternatives:
  - David himself
  - David
  lexicon: BDAG
  rationale: 'The intensive use of αὐτός before the proper name emphasizes David personally:
    ''David himself.'' Preserving the emphasis matters for Jesus'' argument.'
- source_word: λέγει
  chosen: calls
  alternatives:
  - says
  - speaks of as
  lexicon: BDAG
  rationale: Although λέγω commonly means 'say,' in the construction 'λέγει αὐτὸν
    κύριον' idiomatic English is 'calls him Lord,' expressing predication rather than
    mere speech.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: Following the project's default for κύριος as a title, 'Lord' best preserves
    the christological and scriptural force of David's address.
- source_word: πόθεν
  chosen: how
  alternatives:
  - from where
  - how then
  lexicon: BDAG
  rationale: 'πόθεν is literally ''from where,'' but here introduces a question of
    basis or logic: ''how is he his son?'' This is natural English and preserves the
    argumentative force.'
- source_word: αὐτοῦ ἐστιν υἱός
  chosen: is he his son
  alternatives:
  - is he his descendant
  - is he then his son
  lexicon: BDAG
  rationale: The genitive plus υἱός is rendered straightforwardly as 'his son.' While
    'descendant' captures the dynastic sense, Jesus' wording intentionally uses 'son,'
    echoing the messianic title 'son of David.'
- source_word: ὁ πολὺς ὄχλος
  chosen: the large crowd
  alternatives:
  - the great crowd
  - the common people
  - the multitude
  lexicon: BDAG
  rationale: The phrase denotes a numerous crowd. 'The large crowd' is clear modern
    English without the archaic feel of 'multitude.' 'Common people' is too interpretive
    here.
- source_word: ἤκουεν αὐτοῦ
  chosen: was listening to him
  alternatives:
  - heard him
  - listened to him
  lexicon: BDAG
  rationale: The imperfect ἤκουεν suggests ongoing action, so 'was listening to him'
    better reflects the aspect than simple 'heard him.'
- source_word: ἡδέως
  chosen: gladly
  alternatives:
  - with delight
  - pleasedly
  lexicon: BDAG
  rationale: ἡδέως conveys pleasure or delight in hearing him. 'Gladly' is concise,
    idiomatic, and traditional without being archaic.
