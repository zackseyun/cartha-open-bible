theological_decisions:
- issue: Christological force of David calling the Messiah 'Lord'
  chosen_reading: Retained the direct title 'Lord' and the rhetorical question without
    explanatory expansion.
  alternative_readings:
  - David himself calls him 'Lord'; so in what sense is he his son?
  - David himself calls the Messiah 'Lord'
  rationale: The verse contributes to Mark's presentation of the Messiah as more than
    merely Davidic, but the translation should not import a fuller doctrinal explanation
    into the text. The wording preserves the tension and argument as stated.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Rendering of υἱός in messianic context
  chosen_reading: son
  alternative_readings:
  - descendant
  rationale: Although 'son of David' can idiomatically mean descendant, retaining
    'son' preserves the recognized messianic title and the rhetorical contrast in
    Jesus' question.
  doctrine_reference: Translation philosophy §5
