id: MRK.12.17
reference: Mark 12:17
source:
  edition: SBLGNT
  text: ⸂ὁ δὲ⸃ Ἰησοῦς εἶπεν ⸀αὐτοῖς· ⸂Τὰ Καίσαρος ἀπόδοτε⸃ Καίσαρι καὶ τὰ τοῦ θεοῦ
    τῷ θεῷ. καὶ ⸀ἐξεθαύμαζον ἐπ’ αὐτῷ.
translation:
  text: But Jesus said to them, “Give back to Caesar the things that are Caesar’s,
    and to God the things that are God’s.” And they were utterly amazed at him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Render to Caesar the things that are Caesar’s, and to God the things
      that are God’s.' The verb can mean 'give back,' 'pay back,' or 'render' what
      is due.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπόδοτε
  chosen: Give back
  alternatives:
  - Render
  - Pay back
  - Give
  lexicon: BDAG
  rationale: The aorist imperative of ἀποδίδωμι commonly carries the sense of giving
    back, repaying, or rendering what is due. 'Give back' preserves the force that
    what belongs to Caesar should be returned to him, more clearly than the traditional
    'render,' while avoiding over-specification to tax payment alone.
- source_word: Τὰ Καίσαρος ... Καίσαρι
  chosen: the things that are Caesar’s ... to Caesar
  alternatives:
  - Caesar’s things ... to Caesar
  - what belongs to Caesar ... to Caesar
  lexicon: BDAG
  rationale: The neuter plural article with the genitive expresses possessions or
    things belonging to Caesar. Expanding to 'the things that are Caesar’s' is natural
    English and preserves the possessive force without narrowing the referent.
- source_word: τὰ τοῦ θεοῦ ... τῷ θεῷ
  chosen: the things that are God’s ... to God
  alternatives:
  - God’s things ... to God
  - what belongs to God ... to God
  lexicon: BDAG
  rationale: This mirrors the first clause and preserves the deliberate parallelism
    in Jesus' saying. 'God' is capitalized as the referent is the one true God in
    context.
- source_word: ἐξεθαύμαζον
  chosen: were utterly amazed
  alternatives:
  - marveled
  - were astonished
  - were greatly amazed
  lexicon: BDAG
  rationale: ἐκθαυμάζω intensifies θαυμάζω, indicating strong amazement. 'Were utterly
    amazed' captures the imperfect's descriptive force and the intensified reaction
    better than the more traditional but weaker 'marveled.'
- source_word: ἐπ’ αὐτῷ
  chosen: at him
  alternatives:
  - because of him
  - at what he said
  lexicon: BDAG
  rationale: With verbs of amazement, ἐπί plus dative can indicate the object or basis
    of astonishment. 'At him' is the most direct rendering of the Greek, while leaving
    implicit that the amazement is occasioned by his answer.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition. 'But' fits the adversarial exchange
    and highlights Jesus' response to the challengers.
- source_word: εἶπεν αὐτοῖς
  chosen: said to them
  alternatives:
  - told them
  lexicon: BDAG
  rationale: A straightforward rendering that preserves the speech introduction without
    adding interpretive nuance.
