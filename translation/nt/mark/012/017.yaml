theological_decisions:
- issue: Relation of civic obligation and divine obligation in Jesus' saying
  chosen_reading: Translate the parallel clauses straightforwardly without importing
    a theory of church-state relations.
  alternative_readings:
  - A stronger endorsement of civil authority
  - A subversive minimization of Caesar's claims
  rationale: The verse itself states that some things are owed to Caesar and some
    to God, but it does not spell out a full political theology. The translation preserves
    the tension and parallelism rather than resolving it into a later doctrinal framework.
  doctrine_reference: Preserve theological tension rather than resolve it.
