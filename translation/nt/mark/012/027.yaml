theological_decisions:
- issue: Implication of continued life before God in Jesus' argument
  chosen_reading: Render the statement straightforwardly as a contrast between 'the
    dead' and 'the living' without expanding it into a doctrinal paraphrase about
    resurrection or the intermediate state.
  alternative_readings:
  - He is not the God of dead people, but of living people
  - God is not God of the dead, but of the living
  rationale: The verse supports Jesus' argument for the reality of resurrection, but
    the translation should not import explanatory theological conclusions beyond the
    wording given. The simple contrast preserves the text's force and theological
    tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
