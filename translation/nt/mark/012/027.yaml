id: MRK.12.27
reference: Mark 12:27
source:
  edition: SBLGNT
  text: οὐκ ἔστιν ⸀θεὸς νεκρῶν ⸀ἀλλὰ ζώντων· ⸀πολὺ πλανᾶσθε.
translation:
  text: He is not God of the dead, but of the living. You are greatly mistaken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'God is not God of the dead, but of the living.'
    reason: lexical_alternative
  - marker: b
    text: Or 'You are very much in error' or 'You are badly mistaken.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θεὸς
  chosen: God
  alternatives:
  - a god
  lexicon: BDAG
  rationale: Anarthrous θεός in this predicate construction is best rendered as the
    proper divine title 'God,' not the indefinite 'a god.' In context Jesus is speaking
    of the God of Abraham, Isaac, and Jacob, so English idiom naturally supplies 'He
    is not God of the dead...' rather than a more wooden 'God is not of the dead.'
- source_word: νεκρῶν
  chosen: of the dead
  alternatives:
  - of dead people
  lexicon: BDAG
  rationale: 'The genitive plural functions substantivally: ''the dead.'' This preserves
    the contrast with ''the living'' and matches natural English.'
- source_word: ἀλλὰ ζώντων
  chosen: but of the living
  alternatives:
  - but of living people
  lexicon: BDAG
  rationale: The present participle ζώντων is substantival, denoting those who are
    alive. 'The living' is concise, idiomatic, and preserves the antithesis with 'the
    dead.'
- source_word: πολὺ
  chosen: greatly
  alternatives:
  - very much
  - far
  lexicon: BDAG
  rationale: Used adverbially with πλανᾶσθε, πολὺ intensifies the verb. 'Greatly'
    communicates the force in clear modern English without sounding colloquial.
- source_word: πλανᾶσθε
  chosen: are mistaken
  alternatives:
  - are deceived
  - are in error
  - go astray
  lexicon: BDAG
  rationale: In this context the passive/middle-form verb refers to being in doctrinal
    error. 'Are mistaken' is natural English and fits Jesus' rebuke without overtranslating
    toward either self-wandering or external deception.
- source_word: οὐκ ἔστιν
  chosen: He is not
  alternatives:
  - He is no
  - God is not
  lexicon: BDAG
  rationale: Although the Greek omits an explicit subject pronoun, English requires
    one. 'He' is supplied from the immediate context ('I am the God of...') and yields
    the most natural rendering. 'He is not God of the dead' best reflects the sense
    of the clause in context.
