id: MRK.12.25
reference: Mark 12:25
source:
  edition: SBLGNT
  text: ὅταν γὰρ ἐκ νεκρῶν ἀναστῶσιν, οὔτε γαμοῦσιν οὔτε ⸀γαμίζονται, ἀλλ’ εἰσὶν ὡς
    ⸀ἄγγελοι ἐν τοῖς οὐρανοῖς·
translation:
  text: For when they rise from the dead, they neither marry nor are given in marriage,
    but are like angels in heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the heavens.' The Greek is plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν γὰρ
  chosen: For when
  alternatives:
  - when
  - for whenever
  lexicon: BDAG
  rationale: γάρ gives explanatory force linking this statement to Jesus' argument,
    so 'For when' preserves both the temporal and explanatory sense more clearly than
    simply 'when.'
- source_word: ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - out of the dead
  - from among the dead
  lexicon: BDAG
  rationale: This is the standard idiomatic rendering for resurrection language in
    English. 'From among the dead' is more formally precise but less natural here.
- source_word: ἀναστῶσιν
  chosen: they rise
  alternatives:
  - they are raised
  - they rise again
  lexicon: BDAG
  rationale: The verb is active, so 'they rise' best matches the Greek form while
    still functioning idiomatically in resurrection context. 'Are raised' would import
    a passive not present in the wording of this clause.
- source_word: οὔτε γαμοῦσιν
  chosen: they neither marry
  alternatives:
  - they do not marry
  lexicon: BDAG
  rationale: The correlative οὔτε ... οὔτε is best represented by 'neither ... nor.'
    γαμέω here refers to entering marriage.
- source_word: οὔτε γαμίζονται
  chosen: nor are given in marriage
  alternatives:
  - nor are married off
  - nor are given as spouses
  lexicon: BDAG
  rationale: The passive of γαμίζω conventionally refers to being given in marriage.
    This preserves the lexical distinction from γαμοῦσιν rather than flattening both
    verbs into the same English expression.
- source_word: ἀλλ’ εἰσὶν
  chosen: but are
  alternatives:
  - but they are
  lexicon: BDAG
  rationale: 'A straightforward adversative contrast is intended: resurrection life
    differs from present marital patterns.'
- source_word: ὡς ἄγγελοι
  chosen: like angels
  alternatives:
  - as angels
  lexicon: BDAG
  rationale: ὡς here marks comparison, not identity. 'Like angels' avoids suggesting
    that resurrected humans become angels.
- source_word: ἐν τοῖς οὐρανοῖς
  chosen: in heaven
  alternatives:
  - in the heavens
  lexicon: BDAG
  rationale: Although plural in Greek, 'in heaven' is the natural English equivalent
    in this context and communicates the locative sense without awkwardness.
