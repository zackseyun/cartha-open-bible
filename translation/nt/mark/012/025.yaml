theological_decisions:
- issue: Nature of the comparison with angels
  chosen_reading: Resurrected people are like angels with respect to not marrying,
    not transformed into angels.
  alternative_readings:
  - Resurrected people become angels
  rationale: The comparative particle ὡς indicates likeness, not ontological identity.
    The translation preserves this theological distinction by rendering 'like angels.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it; here the grammar itself favors comparison rather than identity.'
