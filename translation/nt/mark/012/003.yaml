id: MRK.12.3
reference: Mark 12:3
source:
  edition: SBLGNT
  text: ⸀καὶ λαβόντες αὐτὸν ἔδειραν καὶ ἀπέστειλαν κενόν.
translation:
  text: And they took him, beat him, and sent him away empty-handed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sent him away empty.' The Greek adjective κενόν literally means 'empty,'
      here meaning that the servant was sent back with nothing.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβόντες
  chosen: took
  alternatives:
  - seized
  - grabbed
  lexicon: BDAG
  rationale: Aorist participle from λαμβάνω, here functioning sequentially before
    the main verbs. 'Took' is the most natural and sufficiently forceful English rendering
    in context; 'seized' is possible but slightly more interpretive than the Greek
    requires.
- source_word: ἔδειραν
  chosen: beat
  alternatives:
  - flogged
  - struck
  lexicon: BDAG
  rationale: From δέρω, meaning to beat or thrash. 'Beat' is clear modern English
    and fits the context of abuse in the parable. 'Flogged' is too specific, since
    the Greek does not explicitly indicate formal scourging.
- source_word: ἀπέστειλαν
  chosen: sent ... away
  alternatives:
  - dismissed
  - sent off
  lexicon: BDAG
  rationale: From ἀποστέλλω, 'send.' In English, 'sent him away' best captures the
    sense of dispatching the servant from their presence after mistreating him.
- source_word: κενόν
  chosen: empty-handed
  alternatives:
  - empty
  - with nothing
  lexicon: BDAG
  rationale: Accusative adjective used adverbially/complementarily with ἀπέστειλαν,
    indicating the servant was sent back without receiving what he came for. 'Empty-handed'
    is idiomatic English that conveys the sense more clearly than the bare 'empty.'
- source_word: καὶ ... καὶ
  chosen: and ... and
  alternatives:
  - then ... and
  lexicon: BDAG
  rationale: The repeated καί links the actions in straightforward narrative sequence.
    Retaining 'and' preserves the paratactic style without unnecessary smoothing.
