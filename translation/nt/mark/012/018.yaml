theological_decisions:
- issue: Rendering the Sadducees' doctrinal denial of ἀνάστασις
  chosen_reading: there is no resurrection
  alternative_readings:
  - there is no rising again
  - resurrection does not exist
  rationale: The phrase describes the Sadducees' known theological position without
    specifying the nature of resurrection beyond the term itself. 'Resurrection' preserves
    the established theological concept and avoids paraphrasing it into a narrower
    or broader doctrinal claim.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
