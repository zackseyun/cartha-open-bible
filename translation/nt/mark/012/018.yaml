id: MRK.12.18
reference: Mark 12:18
source:
  edition: SBLGNT
  text: Καὶ ἔρχονται Σαδδουκαῖοι πρὸς αὐτόν, οἵτινες λέγουσιν ἀνάστασιν μὴ εἶναι,
    καὶ ⸀ἐπηρώτων αὐτὸν λέγοντες·
translation:
  text: And Sadducees came to him, who say there is no resurrection, and they began
    questioning him, saying,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  lexicon: BDAG
  rationale: Standard connective introducing the next episode. 'And' preserves Mark's
    paratactic narrative style better than a more interpretive transition.
- source_word: ἔρχονται
  chosen: came
  alternatives:
  - come
  - are coming
  lexicon: BDAG
  rationale: Although the Greek uses a historical present, English narrative style
    commonly renders it as simple past. 'Came' preserves the event sense without awkwardness.
- source_word: Σαδδουκαῖοι
  chosen: Sadducees
  lexicon: BDAG
  rationale: Standard transliteration of the group name; names are transliterated
    per project philosophy.
- source_word: πρὸς αὐτόν
  chosen: to him
  alternatives:
  - up to him
  lexicon: BDAG
  rationale: Natural English rendering of motion toward a person in this context.
- source_word: οἵτινες
  chosen: who
  alternatives:
  - the ones who
  - who indeed
  lexicon: BDAG
  rationale: Introduces a descriptive relative clause characterizing the Sadducees.
    'Who' is idiomatic and sufficient in English.
- source_word: λέγουσιν
  chosen: say
  alternatives:
  - maintain
  - claim
  lexicon: BDAG
  rationale: Present tense expresses their characteristic doctrinal position. 'Say'
    is straightforward and avoids overinterpreting the force as polemical.
- source_word: ἀνάστασιν
  chosen: resurrection
  alternatives:
  - a resurrection
  - rising again
  lexicon: BDAG
  rationale: Established and accurate rendering for bodily rising from the dead in
    this Jewish theological context. Anarthrous in Greek but generic in sense, so
    English idiom prefers 'resurrection' without the article.
- source_word: μὴ εἶναι
  chosen: there is no
  alternatives:
  - not to exist
  - does not exist
  lexicon: BDAG
  rationale: With λέγουσιν, the infinitival clause expresses the content of their
    belief. 'There is no resurrection' is idiomatic English and accurately conveys
    denial of resurrection's existence.
- source_word: ἐπηρώτων
  chosen: began questioning
  alternatives:
  - were asking
  - questioned
  - asked
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or inceptive action. 'Began questioning'
    captures the narrative onset of their interrogation better than a simple past,
    while remaining natural.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Participle introducing the content of their question. 'Saying' preserves
    the Greek linkage and prepares for the direct speech in the next verse.
