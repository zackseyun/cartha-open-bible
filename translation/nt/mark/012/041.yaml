id: MRK.12.41
reference: Mark 12:41
source:
  edition: SBLGNT
  text: Καὶ ⸀καθίσας ⸀κατέναντι τοῦ γαζοφυλακίου ἐθεώρει πῶς ὁ ὄχλος βάλλει χαλκὸν
    εἰς τὸ γαζοφυλάκιον· καὶ πολλοὶ πλούσιοι ἔβαλλον πολλά·
translation:
  text: And sitting opposite the treasury, he was watching how the crowd was putting
    money into the treasury; and many rich people were putting in much.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'offering box' / 'treasury chest'; the Greek term can refer to the temple
      treasury or to the receptacles associated with it.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθίσας
  chosen: sitting
  alternatives:
  - having sat down
  - after sitting down
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb; 'sitting' is natural English
    and preserves the scene-setting force without overformal stiffness.
- source_word: κατέναντι
  chosen: opposite
  alternatives:
  - across from
  - facing
  lexicon: BDAG
  rationale: The preposition indicates position directly opposite. 'Opposite' is concise
    and natural in narrative English.
- source_word: γαζοφυλάκιον
  chosen: treasury
  alternatives:
  - treasury chest
  - offering box
  lexicon: BDAG
  rationale: The term refers to the temple treasury area/receptacles for offerings.
    'Treasury' is the standard concise rendering; more specific paraphrases risk overinterpreting
    whether the focus is the chamber or the receptacles.
- source_word: ἐθεώρει
  chosen: was watching
  alternatives:
  - watched
  - observed
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing observation. 'Was watching' preserves
    the durative aspect better than simple past.
- source_word: πῶς
  chosen: how
  alternatives:
  - in what way
  - that
  lexicon: BDAG
  rationale: Here πῶς most naturally means 'how,' focusing on the manner/process of
    giving, not merely the fact that they gave.
- source_word: ὄχλος
  chosen: the crowd
  alternatives:
  - the multitude
  - the people
  lexicon: BDAG
  rationale: '''The crowd'' is readable modern English and fits the collective sense
    of the noun in narrative context.'
- source_word: βάλλει / ἔβαλλον
  chosen: was putting / were putting in
  alternatives:
  - casts / were casting
  - was throwing / were throwing
  lexicon: BDAG
  rationale: βάλλω literally means 'throw/cast,' but in the context of depositing
    money into the treasury, 'putting in' communicates the action idiomatically in
    modern English without losing meaning. The imperfect aspect is preserved with
    'was/were putting.'
- source_word: χαλκόν
  chosen: copper coins
  alternatives:
  - copper
  - money
  lexicon: BDAG
  rationale: Literally 'copper/bronze,' but in monetary context it refers to copper
    coinage. 'Copper coins' makes the sense explicit for English readers while staying
    close to the source.
- source_word: πολλοὶ πλούσιοι
  chosen: many rich people
  alternatives:
  - many wealthy people
  - many rich men
  lexicon: BDAG
  rationale: The phrase is plural masculine but refers generically to wealthy persons
    in the crowd. 'Rich people' is gender-accurate to the referent and natural English.
- source_word: πολλά
  chosen: much
  alternatives:
  - many things
  - a lot
  lexicon: BDAG
  rationale: In context of money given, the neuter plural functions idiomatically
    to mean 'much' or 'large amounts.' 'Much' is concise and natural.
