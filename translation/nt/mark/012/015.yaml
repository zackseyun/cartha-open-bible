theological_decisions:
- issue: Rendering Jesus' accusation in πειράζετε
  chosen_reading: hostile testing rather than mere questioning
  alternative_readings:
  - tempting me
  - putting me to the test
  rationale: In context, Jesus exposes a malicious attempt to trap him, so 'testing'
    best conveys the adversarial force without importing extra doctrinal nuance.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
