id: MRK.12.15
reference: Mark 12:15
source:
  edition: SBLGNT
  text: ὁ δὲ εἰδὼς αὐτῶν τὴν ὑπόκρισιν εἶπεν αὐτοῖς· Τί με πειράζετε; φέρετέ μοι δηνάριον
    ἵνα ἴδω.
translation:
  text: But knowing their hypocrisy, he said to them, “Why are you testing me? Bring
    me a denarius so that I may see it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A denarius was a Roman silver coin commonly used as a day's wage.
    reason: cultural_note
  - marker: b
    text: Or “Why are you tempting me?”
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδὼς
  chosen: knowing
  alternatives:
  - perceiving
  - being aware of
  lexicon: BDAG
  rationale: Aorist participle from οἶδα/ὁράω in idiomatic perfective sense, indicating
    Jesus' awareness. 'Knowing' is natural English and preserves the cognitive force
    without overinterpreting.
- source_word: ὑπόκρισιν
  chosen: hypocrisy
  alternatives:
  - pretense
  - insincerity
  lexicon: BDAG
  rationale: '''Hypocrisy'' is the standard and strongest rendering, fitting the context
    of a trap disguised as sincerity. It preserves the moral-religious force of the
    Greek.'
- source_word: Τί
  chosen: Why
  alternatives:
  - For what reason
  - What for
  lexicon: BDAG
  rationale: 'Although literally ''what?'', in this idiom with πειράζετε it functions
    adverbially: ''Why are you testing me?'' This is the most natural English equivalent.'
- source_word: πειράζετε
  chosen: are you testing
  alternatives:
  - are you trying
  - are you tempting
  lexicon: BDAG
  rationale: Present tense is best represented with progressive aspect in English
    here. 'Testing' fits the hostile probing context better than 'tempting,' which
    in modern English can imply enticement to sin more narrowly.
- source_word: φέρετέ
  chosen: Bring
  alternatives:
  - Carry
  - Produce
  lexicon: BDAG
  rationale: Imperative calling for them to bring an object to him. 'Bring' is the
    clear and idiomatic choice.
- source_word: δηνάριον
  chosen: a denarius
  alternatives:
  - a Roman coin
  - a denarius coin
  lexicon: BDAG
  rationale: The coin name is retained rather than generalized, preserving historical
    specificity. A cultural note can clarify that it is a coin if needed.
- source_word: ἵνα ἴδω
  chosen: so that I may see it
  alternatives:
  - that I may look at it
  - so I can see it
  lexicon: BDAG
  rationale: This purpose clause is naturally rendered 'so that I may see it.' The
    object 'it' is supplied in English because the denarius is the understood referent.
