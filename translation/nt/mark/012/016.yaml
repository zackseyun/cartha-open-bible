id: MRK.12.16
reference: Mark 12:16
source:
  edition: SBLGNT
  text: οἱ δὲ ἤνεγκαν. καὶ λέγει αὐτοῖς· Τίνος ἡ εἰκὼν αὕτη καὶ ἡ ἐπιγραφή; οἱ δὲ εἶπαν αὐτῷ· Καίσαρος.
translation:
  text: And they brought one. And he says to them[a], “Whose image is this, and whose inscription?” And they said to him, “Caesar’s.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “they brought it,” with the object understood from the previous context as the coin (a denarius).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤνεγκαν
  chosen: they brought one
  alternatives:
  - they brought it
  - they brought [a denarius]
  lexicon: BDAG
  rationale: The verb φέρω means 'bring/carry.' The object is implied from the prior context (the coin/denarius). English normally requires some object; 'one' supplies the implied coin without over-specifying beyond the immediate discourse. 'It' is possible, but 'one' better reflects the sense of producing a coin for inspection.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Present-tense λέγει is the historical present, common in Mark. Rendering it as 'he says' preserves Mark's vivid narrative style; English readers can still follow naturally.
- source_word: Τίνος
  chosen: Whose
  alternatives:
  - Of whom
  lexicon: BDAG
  rationale: The genitive interrogative asks possession or association. 'Whose' is the natural idiomatic English equivalent here.
- source_word: εἰκών
  chosen: image
  alternatives:
  - likeness
  - portrait
  lexicon: BDAG
  rationale: '''Image'' is the standard and most transparent rendering, fitting both coinage context and broader biblical usage.'
- source_word: ἐπιγραφή
  chosen: inscription
  alternatives:
  - title
  - writing
  - legend
  lexicon: BDAG
  rationale: On a coin, ἐπιγραφή refers to the written inscription. 'Inscription' is precise and readable; 'legend' is numismatically possible but less accessible.
- source_word: Καίσαρος
  chosen: Caesar’s
  alternatives:
  - of Caesar
  lexicon: BDAG
  rationale: The genitive answers the question of possession/association. The English possessive 'Caesar’s' is concise and idiomatic in direct speech.
