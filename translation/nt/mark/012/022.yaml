id: MRK.12.22
reference: Mark 12:22
source:
  edition: SBLGNT
  text: καὶ ⸂οἱ ἑπτὰ⸃ οὐκ ἀφῆκαν σπέρμα· ⸀ἔσχατον πάντων ⸂καὶ ἡ γυνὴ ἀπέθανεν⸃.
translation:
  text: And the seven left no offspring. Last of all, the woman also died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'left no seed,' meaning they left no descendants or offspring.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἑπτὰ
  chosen: the seven
  alternatives:
  - all seven
  - the seven brothers
  lexicon: BDAG
  rationale: The article with the numeral functions substantivally, referring back
    to the seven brothers in the preceding context. 'The seven' is concise and natural,
    while the referent remains clear from context.
- source_word: οὐκ ἀφῆκαν σπέρμα
  chosen: left no offspring
  alternatives:
  - left no seed
  - left no child
  lexicon: BDAG
  rationale: The idiom literally means 'did not leave seed,' a Semitic/biological
    expression for leaving descendants. 'Left no offspring' preserves the sense in
    clear modern English without over-literal awkwardness. 'Seed' is too opaque here
    in English unless footnoted.
- source_word: ἔσχατον πάντων
  chosen: Last of all
  alternatives:
  - finally
  - last of everyone
  lexicon: BDAG
  rationale: 'This idiomatic accusative phrase marks sequence: ''last of all'' is
    the most natural English equivalent and preserves the temporal ordering.'
- source_word: καὶ ἡ γυνὴ
  chosen: the woman also
  alternatives:
  - also the woman
  - and the woman
  lexicon: BDAG
  rationale: καί here adds the woman to the sequence of deaths. Rendering it as 'also'
    makes the additive force explicit in natural English. The article is retained
    as 'the woman,' referring to the known woman in the scenario.
- source_word: ἀπέθανεν
  chosen: died
  alternatives:
  - passed away
  lexicon: BDAG
  rationale: The aorist verb straightforwardly means 'died.' 'Passed away' would soften
    the directness of the Greek and is less transparent.
