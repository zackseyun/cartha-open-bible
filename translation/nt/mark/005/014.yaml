id: MRK.5.14
reference: Mark 5:14
source:
  edition: SBLGNT
  text: ⸂Καὶ οἱ⸃ βόσκοντες ⸀αὐτοὺς ἔφυγον καὶ ⸀ἀπήγγειλαν εἰς τὴν πόλιν καὶ εἰς τοὺς ἀγρούς· καὶ ⸀ἦλθον ἰδεῖν τί ἐστιν τὸ γεγονός.
translation:
  text: And those who were tending them fled and reported it in the city and in the countryside[a], and they came to see what had happened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the fields.' The Greek can be rendered more literally this way, but here it likely refers to the rural areas surrounding the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: βόσκοντες
  chosen: were tending
  alternatives:
  - were feeding
  - were herding
  lexicon: BDAG
  rationale: The participle refers to those caring for the herd of pigs. 'Tending' is natural English and broad enough to cover feeding/herding activity without sounding wooden.
- source_word: αὐτούς
  chosen: them
  alternatives:
  - the pigs
  - them (the herd)
  lexicon: BDAG
  rationale: The pronoun's referent is the pigs from the previous verse. 'Them' preserves the Greek pronoun in the main text; the referent is clear from context.
- source_word: ἔφυγον
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: BDAG
  rationale: '''Fled'' best captures the aorist of sudden flight with appropriate narrative force.'
- source_word: ἀπήγγειλαν
  chosen: reported it
  alternatives:
  - announced it
  - told about it
  lexicon: BDAG
  rationale: The verb means to report or relay news. 'Reported it' is concise, idiomatic, and fits the narrative context.
- source_word: εἰς τὴν πόλιν
  lemma: εἰς
  chosen: in the city
  alternatives:
  - to the city
  - into the city
  lexicon: BDAG
  rationale: 'Although εἰς literally means ''into/to,'' with verbs of reporting English idiom prefers the location where the report was spread: ''in the city.'' This reflects optimal equivalence.'
- source_word: εἰς τοὺς ἀγρούς
  chosen: in the countryside
  alternatives:
  - in the fields
  - to the farms
  lexicon: BDAG
  rationale: ἀγροί literally means 'fields,' but in this contrast with 'the city' it denotes the rural surrounding area. 'Countryside' communicates the sense more naturally than the overly literal 'fields.'
- source_word: ἦλθον
  chosen: people came
  alternatives:
  - they came
  lexicon: BDAG
  rationale: The Greek has an implicit plural subject. English can leave it as 'they came,' but 'people came' clarifies that the townspeople/rural residents are meant, without adding a doctrinally significant detail.
- source_word: ἰδεῖν
  chosen: to see
  alternatives:
  - to look at
  lexicon: BDAG
  rationale: Standard infinitive of purpose after 'came'; 'to see' is the most natural rendering.
- source_word: τί ἐστιν τὸ γεγονός
  chosen: what had happened
  alternatives:
  - what it was that had happened
  - what had taken place
  lexicon: BDAG
  rationale: 'The construction asks about the event that has occurred. English naturally renders the perfect participle γεγονός with a past perfect sense in narrative: ''what had happened.'''
