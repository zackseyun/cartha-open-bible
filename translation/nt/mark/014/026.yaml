id: MRK.14.26
reference: Mark 14:26
source:
  edition: SBLGNT
  text: Καὶ ὑμνήσαντες ἐξῆλθον εἰς τὸ Ὄρος τῶν Ἐλαιῶν.
translation:
  text: And after singing a hymn[a], they went out to the Mount of Olives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'having sung.' The Greek participle marks action preceding their departure.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Then
  - Now
  lexicon: BDAG
  rationale: Standard connective introducing the next action in narrative sequence. 'And' preserves the simple coordination of the Greek without adding interpretive nuance.
- source_word: ὑμνήσαντες
  chosen: after singing a hymn
  alternatives:
  - having sung
  - after singing praise
  lexicon: BDAG
  rationale: Aorist active participle of ὑμνέω, referring to singing a hymn or song of praise. 'After singing a hymn' renders the participle naturally in English as antecedent action relative to the main verb, while preserving the likely liturgical sense.
- source_word: ἐξῆλθον
  chosen: they went out
  alternatives:
  - they departed
  - they went forth
  lexicon: BDAG
  rationale: Aorist indicative of ἐξέρχομαι, literally 'went out.' This is the plain narrative sense and should be preserved rather than elevated to a more formal English expression.
- source_word: εἰς
  chosen: to
  alternatives:
  - into
  lexicon: BDAG
  rationale: With a destination, εἰς can be rendered 'to' in idiomatic English. 'Into' would be overly literal here and less natural with a named location.
- source_word: τὸ Ὄρος τῶν Ἐλαιῶν
  chosen: the Mount of Olives
  alternatives:
  - the hill of olives
  - the mountain of olives
  lexicon: BDAG
  rationale: Established geographic designation. Although ὄρος can mean 'mountain' or 'hill,' 'Mount of Olives' is the standard and accurate English rendering for this place name. The genitive τῶν Ἐλαιῶν is naturally rendered 'of Olives.'
