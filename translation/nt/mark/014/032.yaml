id: MRK.14.32
reference: Mark 14:32
source:
  edition: SBLGNT
  text: Καὶ ἔρχονται εἰς χωρίον οὗ τὸ ὄνομα Γεθσημανί, καὶ λέγει τοῖς μαθηταῖς αὐτοῦ· Καθίσατε ὧδε ἕως προσεύξωμαι.
translation:
  text: And they came to a place whose name was Gethsemane[a], and he says to his disciples, “Sit here until I pray.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'they come ... and he says,' preserving Mark's historical present for vividness.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρχονται
  chosen: they came
  alternatives:
  - they come
  - they are coming
  lexicon: BDAG
  rationale: Although the Greek present is historical/presentive in narrative, idiomatic English normally renders it as a past tense in this context. This preserves the narrative flow without woodenly reproducing the Greek tense-form.
- source_word: χωρίον
  chosen: place
  alternatives:
  - plot of land
  - estate
  - farm
  lexicon: BDAG
  rationale: χωρίον can denote a place, property, or tract of land. 'Place' is the most natural and sufficiently broad rendering here, avoiding over-specification not demanded by the text.
- source_word: οὗ τὸ ὄνομα Γεθσημανί
  chosen: whose name was Gethsemane
  alternatives:
  - called Gethsemane
  - named Gethsemane
  lexicon: BDAG
  rationale: This closely reflects the Greek construction while remaining natural English. 'Gethsemane' is a proper name and is therefore transliterated per project philosophy.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: The Greek again uses the historical present. Here it is retained in English ('he says') to preserve Mark's vivid narrative style; this is acceptable modern English and reflects the source text more transparently.
- source_word: μαθηταῖς
  chosen: disciples
  alternatives:
  - followers
  lexicon: BDAG
  rationale: '''Disciples'' is the standard and contextually precise rendering for μαθηταί in the Gospels, preserving the teacher-disciple relationship.'
- source_word: Καθίσατε
  chosen: Sit
  alternatives:
  - Sit down
  - Be seated
  lexicon: BDAG
  rationale: The aorist imperative gives a straightforward command. 'Sit' is concise and natural; 'Sit down' is possible but slightly more expansive than necessary.
- source_word: ὧδε
  chosen: here
  alternatives:
  - in this place
  lexicon: BDAG
  rationale: A simple deictic adverb; 'here' is the direct and natural equivalent.
- source_word: ἕως προσεύξωμαι
  chosen: until I pray
  alternatives:
  - while I pray
  - until I have prayed
  lexicon: BDAG
  rationale: 'ἕως with the aorist subjunctive commonly marks a temporal limit: ''until I pray.'' ''While I pray'' shifts the sense from endpoint to duration, and ''until I have prayed'' is more explicit than the Greek requires.'
