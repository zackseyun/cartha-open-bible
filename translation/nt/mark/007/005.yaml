id: MRK.7.5
reference: Mark 7:5
source:
  edition: SBLGNT
  text: ⸀καὶ ἐπερωτῶσιν αὐτὸν οἱ Φαρισαῖοι καὶ οἱ γραμματεῖς· Διὰ τί ⸂οὐ περιπατοῦσιν οἱ μαθηταί σου⸃ κατὰ τὴν παράδοσιν τῶν πρεσβυτέρων, ἀλλὰ ⸀κοιναῖς χερσὶν ἐσθίουσιν τὸν ἄρτον;
translation:
  text: And the Pharisees and the scribes asked him[a], “Why do your disciples not walk according to the tradition of the elders, but eat bread with unclean hands?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with unclean hands'; literally 'with common hands,' referring to ritual defilement.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπερωτῶσιν
  chosen: asked
  alternatives:
  - were questioning
  - asked repeatedly
  lexicon: BDAG
  rationale: The present tense is narrative/historical present; simple past English is the most natural rendering. 'Asked' communicates the speech act without overtranslating aspect.
- source_word: γραμματεῖς
  chosen: scribes
  alternatives:
  - experts in the law
  - teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the standard and sufficiently transparent rendering in Gospel contexts, referring to the recognized class of legal scholars. Alternatives are more interpretive.'
- source_word: Διὰ τί
  chosen: Why
  alternatives:
  - For what reason
  lexicon: BDAG
  rationale: Idiomatic English interrogative equivalent.
- source_word: περιπατοῦσιν
  chosen: walk
  alternatives:
  - live
  - conduct themselves
  lexicon: BDAG
  rationale: The Greek literally says 'walk,' a common idiom for manner of life. Here preserving 'walk' keeps the metaphor present while remaining understandable in context.
- source_word: κατὰ τὴν παράδοσιν
  chosen: according to the tradition
  alternatives:
  - in keeping with the tradition
  lexicon: BDAG
  rationale: '''According to'' closely matches κατά with the accusative here and preserves the sense of conformity to an established standard.'
- source_word: τῶν πρεσβυτέρων
  chosen: of the elders
  alternatives:
  - handed down by the elders
  lexicon: BDAG
  rationale: A straightforward genitive rendering. The phrase refers to ancestral Jewish tradition associated with prior authorities, not necessarily current church elders; the literal wording should be retained.
- source_word: κοιναῖς χερσὶν
  chosen: with defiled hands
  alternatives:
  - with common hands
  - with unclean hands
  lexicon: BDAG
  rationale: κοινός in this ritual context means 'common' in the sense of ceremonially defiled/profane rather than physically dirty. 'Defiled' best conveys the ritual impurity at issue. 'Unclean' is possible but can blur distinctions with ἀκάθαρτος.
- source_word: ἄρτον
  chosen: bread
  alternatives:
  - food
  lexicon: BDAG
  rationale: The Greek is singular 'bread,' often functioning as a synecdoche for a meal. Retaining 'bread' is more formally accurate and preserves the wording of the accusation.
