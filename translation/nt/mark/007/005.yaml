  rationale: The dispute concerns Pharisaic purity tradition, not hygiene. 'Defiled' preserves the religious/ritual force without importing later doctrinal conclusions.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
