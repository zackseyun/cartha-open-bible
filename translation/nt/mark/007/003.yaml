theological_decisions:
- issue: Scope and force of 'all the Jews'
  chosen_reading: Retained the broad expression 'all the Jews' as Mark's explanatory generalization, without softening it to a narrower group.
  alternative_readings:
  - all the Judeans
  - many of the Jews
  rationale: The Greek text explicitly says 'all the Jews.' Softening it would paraphrase beyond the source. At the same time, the phrase should be understood as a conventional broad description in Mark's explanatory aside, not as a mathematically precise claim about every individual Jew.
  doctrine_reference: Translation philosophy §1, §5
- issue: Meaning of πυγμῇ
  chosen_reading: Rendered idiomatically as 'carefully' in the main text, with more literal/technical alternatives preserved in a footnote.
  alternative_readings:
  - with the fist
  - up to the wrist
  - thoroughly
  rationale: The term is lexically disputed and likely refers to the manner or extent of ritual handwashing. An overly literal rendering would be obscure or misleading in modern English; an idiomatic rendering best fits optimal equivalence while preserving ambiguity in a footnote.
  doctrine_reference: Translation philosophy §3, §6
