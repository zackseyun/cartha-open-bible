id: MRK.7.3
reference: Mark 7:3
source:
  edition: SBLGNT
  text: οἱ γὰρ Φαρισαῖοι καὶ πάντες οἱ Ἰουδαῖοι ἐὰν μὴ πυγμῇ νίψωνται τὰς χεῖρας οὐκ ἐσθίουσιν, κρατοῦντες τὴν παράδοσιν τῶν πρεσβυτέρων,
translation:
  text: For the Pharisees and all the Jews do not eat unless they wash their hands with a fist[a], holding to the tradition of the elders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the fist'; possibly 'up to the wrist' or 'thoroughly.' The Greek term is difficult and likely refers to a customary manner of ritual handwashing.
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Introduces an explanatory parenthetical comment for non-Jewish readers; 'For' preserves the explanatory force naturally in English.
- source_word: Φαρισαῖοι
  chosen: Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the Jewish group name; names are transliterated by project policy.
- source_word: πάντες οἱ Ἰουδαῖοι
  chosen: all the Jews
  alternatives:
  - all the Judeans
  lexicon: BDAG
  rationale: In Mark this commonly denotes the Jewish people in a broad ethnoreligious sense rather than specifically residents of Judea. 'All the Jews' best matches the explanatory generalization in context, though it is rhetorically broad and not necessarily statistically literal.
- source_word: ἐὰν μὴ
  chosen: unless
  alternatives:
  - if not
  lexicon: BDAG
  rationale: Natural English rendering of the conditional negative construction.
- source_word: πυγμῇ
  chosen: carefully
  alternatives:
  - with the fist
  - up to the wrist
  - thoroughly
  lexicon: BDAG
  rationale: The dative πυγμῇ is notoriously difficult. Likely idiomatic for a particular manner/extent of ritual washing rather than literally 'with the fist' in English. 'Carefully' communicates the practical sense without overcommitting to one debated reconstruction; alternatives are preserved in a footnote.
- source_word: νίψωνται τὰς χεῖρας
  chosen: wash their hands
  alternatives:
  - rinse their hands
  lexicon: BDAG
  rationale: νίπτω commonly refers to washing a part of the body, here specifically the hands. 'Wash their hands' is standard and clear.
- source_word: οὐκ ἐσθίουσιν
  chosen: do not eat
  alternatives:
  - do not eat food
  lexicon: BDAG
  rationale: Simple present customary action. The object is implicit and need not be supplied in English.
- source_word: κρατοῦντες
  chosen: holding to
  alternatives:
  - keeping
  - observing
  - maintaining
  lexicon: BDAG
  rationale: The participle expresses adherence to a tradition. 'Holding to' is idiomatic and preserves the sense of firm adherence.
- source_word: παράδοσιν
  chosen: tradition
  alternatives:
  - handed-down tradition
  lexicon: BDAG
  rationale: Standard rendering for inherited teachings/practices passed down within a community.
- source_word: τῶν πρεσβυτέρων
  chosen: of the elders
  alternatives:
  - handed down by the elders
  lexicon: BDAG
  rationale: Genitive most naturally identifies the source/association of the tradition. 'Of the elders' is concise and standard.
