id: 2TI.4.14
reference: 2 Timothy 4:14
source:
  edition: SBLGNT
  text: Ἀλέξανδρος ὁ χαλκεὺς πολλά μοι κακὰ ἐνεδείξατο— ⸀ἀποδώσει αὐτῷ ὁ κύριος κατὰ τὰ ἔργα αὐτοῦ—
translation:
  text: Alexander the metalworker showed me many evils[c][b][a]; the Lord will repay him according to his works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Alexander the coppersmith.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'did me much harm.'
    reason: lexical_alternative
  - marker: c
    text: Some manuscripts read, 'May the Lord repay him according to his works.'
    reason: textual_variant
lexical_decisions:
- source_word: χαλκεὺς
  chosen: metalworker
  alternatives:
  - coppersmith
  - bronzesmith
  lexicon: BDAG
  rationale: The term denotes a worker in metal, often copper/bronze. 'Metalworker' is clearer in modern English and avoids overprecision where the exact metal is not certain; traditional 'coppersmith' is preserved as an alternative.
- source_word: πολλά μοι κακὰ
  chosen: many evils
  alternatives:
  - much harm
  - many wrongs
  - many bad things
  lexicon: BDAG
  rationale: The phrase is literally 'many evil things to me.' 'Many evils' preserves the lexical force of κακά better than the more interpretive 'much harm,' while remaining intelligible. A smoother alternative is worth preserving in a footnote.
- source_word: ἐνεδείξατο
  chosen: showed
  alternatives:
  - did
  - caused
  - demonstrated
  lexicon: BDAG
  rationale: Middle voice of ἐνδείκνυμι here has the sense of showing or exhibiting toward someone. 'Showed me many evils' stays close to the Greek idiom without paraphrasing into a more interpretive expression.
- source_word: ἀποδώσει
  chosen: will repay
  alternatives:
  - will pay back
  - will render
  lexicon: BDAG
  rationale: Future of ἀποδίδωμι commonly means repay or recompense. 'Will repay' is natural modern English and preserves the judicial/retributive sense.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - the Lord
  lexicon: BDAG
  rationale: Per doctrine, κύριος is rendered 'Lord.' The article is retained in the English text as 'the Lord' because the Greek has ὁ κύριος and the referent is definite.
- source_word: κατὰ τὰ ἔργα αὐτοῦ
  chosen: according to his works
  alternatives:
  - according to what he has done
  - according to his deeds
  lexicon: BDAG
  rationale: This phrase is a standard expression of recompense based on deeds. 'According to his works' is formally close and theologically transparent; 'according to what he has done' is smoother but less lexically direct.
