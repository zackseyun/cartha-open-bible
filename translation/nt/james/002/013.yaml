id: JAS.2.13
reference: James 2:13
source:
  edition: SBLGNT
  text: ἡ γὰρ κρίσις ἀνέλεος τῷ μὴ ποιήσαντι ἔλεος· κατακαυχᾶται ⸀ἔλεος κρίσεως.
translation:
  text: For judgment is without mercy to the one who has shown no mercy[a]; mercy triumphs over judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Mercy boasts over judgment.' The Greek verb can carry the sense of boasting or exulting over; here it is rendered idiomatically as 'triumphs over.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κρίσις
  chosen: judgment
  alternatives:
  - judgement
  - condemnation
  lexicon: BDAG
  rationale: In James this refers to divine/judicial evaluation rather than merely an opinion. 'Judgment' is the natural English equivalent and keeps the forensic force without over-specifying 'condemnation.'
- source_word: ἀνέλεος
  chosen: without mercy
  alternatives:
  - merciless
  - unmerciful
  lexicon: BDAG
  rationale: Predicate adjective describing the character of the judgment. 'Without mercy' is slightly more transparent and idiomatic in modern English than 'merciless,' while preserving the lexical link to ἔλεος ('mercy').
- source_word: τῷ μὴ ποιήσαντι ἔλεος
  chosen: to the one who has shown no mercy
  alternatives:
  - against the one who did not do mercy
  - for the one who has not acted mercifully
  lexicon: BDAG
  rationale: The articular participial phrase identifies the person judged. ποιέω with ἔλεος is a Semitic-influenced expression meaning to show or practice mercy. 'Shown no mercy' is idiomatic English and preserves the moral reciprocity in context.
- source_word: κατακαυχᾶται
  chosen: triumphs over
  alternatives:
  - boasts over
  - exults over
  lexicon: BDAG
  rationale: The middle verb can mean boast against/over, but in this context the idiomatic sense is that mercy prevails over judgment. 'Triumphs over' best communicates the rhetorical force in clear English without flattening the imagery.
- source_word: ἔλεος
  chosen: mercy
  alternatives:
  - compassion
  - mercifulness
  lexicon: BDAG
  rationale: Standard and contextually appropriate rendering. It also preserves the repeated lexical connection across the verse.
- source_word: κρίσεως
  chosen: judgment
  alternatives:
  - judgement
  - condemnation
  lexicon: BDAG
  rationale: Genitive after κατακαυχᾶται, rendered with 'over judgment.' Keeping the same English gloss as the first κρίσις preserves the verse's internal contrast.
