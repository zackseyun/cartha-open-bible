theological_decisions:
- issue: Nature of the final clause κατακαυχᾶται ἔλεος κρίσεως
  chosen_reading: 'A general principle: mercy triumphs over judgment.'
  alternative_readings:
  - Mercy boasts against judgment.
  - The mercy shown by the merciful person prevails in the context of judgment.
  rationale: The clause is aphoristic and intentionally terse. Rendering it as a general principle preserves the theological tension of James's warning and hope without importing a mechanistic doctrine of merit. 'Triumphs over' communicates the idiomatic force of the verb in context while leaving open whether the focus is God's merciful character, mercy operative in judgment, or the vindicating role of mercy shown by believers.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
