id: JAS.2.19
reference: James 2:19
source:
  edition: SBLGNT
  text: σὺ πιστεύεις ὅτι ⸂εἷς ἐστιν ὁ θεός⸃; καλῶς ποιεῖς· καὶ τὰ δαιμόνια πιστεύουσιν
    καὶ φρίσσουσιν.
translation:
  text: You believe that God is one; you do well. Even the demons believe—and shudder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'there is one God.' The Greek can be rendered either way; 'God is one'
      more closely follows the Greek wording and may echo the Jewish confession of
      monotheism.
    reason: alternative_reading
  - marker: b
    text: Or, 'tremble.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺ
  chosen: You
  alternatives:
  - You yourself
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis in Greek, but standard English can
    carry the address without an added reflexive. The direct second-person singular
    is preserved as 'You'.
- source_word: πιστεύεις
  chosen: believe
  alternatives:
  - have faith
  - trust
  lexicon: BDAG
  rationale: For πιστεύω, 'believe' is the most natural rendering here, matching the
    propositional content introduced by ὅτι. 'Have faith' would sound less idiomatic
    with a content clause, and 'trust' would overpersonalize what is here a doctrinal
    assertion.
- source_word: ὅτι
  chosen: that
  alternatives:
  - —
  lexicon: BDAG
  rationale: Introduces the content of belief. English idiom retains 'that' naturally
    in this construction.
- source_word: εἷς ἐστιν ὁ θεός
  chosen: God is one
  alternatives:
  - there is one God
  - God is one alone
  lexicon: BDAG
  rationale: '''God is one'' closely reflects the Greek word order and preserves the
    likely echo of Jewish monotheistic confession (cf. Deut 6:4) without overexpanding
    the syntax. ''There is one God'' is possible and idiomatic, but slightly shifts
    the focus from predication to existence.'
- source_word: καλῶς ποιεῖς
  chosen: you do well
  alternatives:
  - you are doing well
  - good for you
  lexicon: BDAG
  rationale: This is the standard idiomatic rendering of the expression, preserving
    James's brief commendation before the rebuke sharpened by the next clause. 'Good
    for you' is too colloquial.
- source_word: καὶ
  chosen: Even
  alternatives:
  - also
  - and
  lexicon: BDAG
  rationale: 'Here καί has an ascensive force: not merely ''and'' but ''even,'' heightening
    the comparison by showing that demons share this level of belief. This best conveys
    James''s rhetorical point.'
- source_word: τὰ δαιμόνια
  chosen: the demons
  alternatives:
  - demons
  - evil spirits
  lexicon: BDAG
  rationale: The article is naturally represented in English as 'the demons.' 'Evil
    spirits' is interpretive; 'demons' is the direct and established gloss for δαιμόνια.
- source_word: πιστεύουσιν
  chosen: believe
  alternatives:
  - have faith
  lexicon: BDAG
  rationale: 'Using ''believe'' again preserves the lexical repetition with πιστεύεις,
    which is central to James''s argument: mere belief, at the level of assent, is
    insufficient.'
- source_word: φρίσσουσιν
  chosen: shudder
  alternatives:
  - tremble
  - bristle with fear
  lexicon: BDAG
  rationale: '''Shudder'' communicates fearful bodily reaction in contemporary English
    and avoids the slightly traditional but less vivid ''tremble.'' It captures the
    force of φρίσσω without sounding archaic.'
