theological_decisions:
- issue: Rendering the monotheistic confession εἷς ἐστιν ὁ θεός
  chosen_reading: God is one
  alternative_readings:
  - there is one God
  rationale: The chosen wording preserves the likely allusion to Israel's confession
    of monotheism while staying close to the Greek syntax. It does not diminish orthodox
    monotheism; it simply reflects the form of the statement James uses.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Force of James's contrast between human belief and demonic belief
  chosen_reading: Even the demons believe—and shudder
  alternative_readings:
  - And the demons also believe and tremble
  rationale: 'The ascensive ''Even'' and the dash sharpen the rhetorical contrast
    without adding content. This preserves the theological tension in the passage:
    orthodox belief as mere assent is not saving faith.'
  doctrine_reference: Translation philosophy §3
