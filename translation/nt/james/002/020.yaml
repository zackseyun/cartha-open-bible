theological_decisions:
- issue: Relation of faith and works in James's argument
  chosen_reading: Render the statement straightforwardly without importing a denominational explanation; faith lacking works is described as useless.
  alternative_readings:
  - Render ἀργή more weakly as 'idle' to avoid sounding like a denial of faith's reality
  - Render more strongly as 'dead,' harmonizing with nearby verses
  rationale: The verse itself uses ἀργή, not νεκρά. The translation should preserve James's wording and not collapse this verse into the language of adjacent verses or into later theological systems. This maintains the text's own tension and precision.
  doctrine_reference: Preserve theological tension rather than resolve it.
