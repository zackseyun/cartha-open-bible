id: JAS.2.20
reference: James 2:20
source:
  edition: SBLGNT
  text: θέλεις δὲ γνῶναι, ὦ ἄνθρωπε κενέ, ὅτι ἡ πίστις χωρὶς τῶν ἔργων ⸀ἀργή ἐστιν;
translation:
  text: But do you want to know, O foolish man, that faith apart from works is useless?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'O foolish man' / 'O vain man.' The Greek literally says 'empty man.'
    reason: lexical_alternative
  - marker: b
    text: Or 'is idle' or 'is ineffective.' The Greek term means inactive or unproductive.
    reason: lexical_alternative
lexical_decisions:
- source_word: θέλεις δὲ γνῶναι
  chosen: But do you want to know
  alternatives:
  - But are you willing to know
  - But do you wish to learn
  lexicon: BDAG
  rationale: θέλω + infinitive expresses volition ('want/wish'), and δέ is adversative/continuative
    here, best carried by 'But.' 'Know' preserves γνῶναι more directly than a looser
    'understand,' while still reading naturally in English.
- source_word: ὦ ἄνθρωπε κενέ
  chosen: O empty man
  alternatives:
  - O foolish man
  - O vain man
  lexicon: BDAG
  rationale: ἄνθρωπε is singular vocative 'man,' and the doctrine calls for gender-accurate
    rendering rather than flattening to a neutral form. κενέ literally means 'empty,'
    conveying hollowness or lack of substance; this is preferable to the more interpretive
    'foolish,' though that traditional rendering is worth preserving in a footnote.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Here ὅτι introduces the content of what the interlocutor is to know,
    so 'that' is the most straightforward rendering.
- source_word: ἡ πίστις
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine, πίστις defaults to 'faith.' In this context James is speaking
    of professed faith in relation to works; 'faith' is the standard and least interpretively
    loaded rendering. Alternatives are noted lexically but do not require a footnote
    here because the phrase is not one of the doctrine's specifically contested ambiguous
    constructions.
- source_word: χωρὶς τῶν ἔργων
  chosen: apart from works
  alternatives:
  - without works
  lexicon: BDAG
  rationale: χωρίς with the genitive means 'without/apart from.' 'Apart from works'
    is slightly more idiomatic and preserves the conceptual separation James is emphasizing.
    ἔργων is rendered 'works,' the established and accurate gloss in this argument.
- source_word: ἀργή ἐστιν
  chosen: is useless
  alternatives:
  - is idle
  - is barren
  - is ineffective
  lexicon: BDAG
  rationale: ἀργός literally denotes being idle, inactive, or unproductive. In context
    James argues that faith lacking works does not produce anything; 'is useless'
    communicates the practical force in clear modern English. More formal alternatives
    such as 'idle' are possible and worth preserving in a footnote.
