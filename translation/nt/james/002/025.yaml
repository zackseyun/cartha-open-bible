theological_decisions:
- issue: Sense of δικαιόω in James 2:25 in relation to faith and works
  chosen_reading: Retain 'justified' in the main text without narrowing it to either
    initial forensic justification or later vindication.
  alternative_readings:
  - shown to be righteous
  - declared righteous
  rationale: James intentionally preserves tension in speaking of justification and
    works. The translation should not resolve the theological debate by paraphrasing
    toward one system. Using 'justified' keeps the lexical connection with the Greek
    and with the surrounding argument, while alternatives are acknowledged as interpretive
    possibilities.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
