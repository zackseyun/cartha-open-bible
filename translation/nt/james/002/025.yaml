id: JAS.2.25
reference: James 2:25
source:
  edition: SBLGNT
  text: ὁμοίως δὲ καὶ Ῥαὰβ ἡ πόρνη οὐκ ἐξ ἔργων ἐδικαιώθη, ὑποδεξαμένη τοὺς ἀγγέλους
    καὶ ἑτέρᾳ ὁδῷ ἐκβαλοῦσα;
translation:
  text: And likewise, was not Rahab the prostitute also justified by works when she
    welcomed the messengers and sent them out by another way?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shown to be righteous' or 'declared righteous.' The Greek says 'justified,'
      and the translation preserves that wording without resolving the theological
      debate over nuance here.
    reason: lexical_alternative
  - marker: b
    text: Greek 'messengers'; context refers to the men Rahab received (Josh 2), not
      heavenly angels.
    reason: cross_reference
lexical_decisions:
- source_word: ὁμοίως δὲ καὶ
  chosen: And likewise ... also
  alternatives:
  - Likewise also
  - In the same way also
  lexicon: BDAG
  rationale: The combination marks comparison with the preceding example (Abraham)
    and adds Rahab as a second case. 'And likewise ... also' preserves both the connective
    and additive force in natural English.
- source_word: Ῥαὰβ
  chosen: Rahab
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: ἡ πόρνη
  chosen: the prostitute
  alternatives:
  - the harlot
  lexicon: BDAG
  rationale: πόρνη straightforwardly denotes a prostitute. 'Harlot' is traditional
    but archaic; 'the prostitute' is clearer modern English and preserves the social/moral
    force of the Greek.
- source_word: οὐκ ... ἐδικαιώθη
  chosen: was not ... justified
  alternatives:
  - was not shown to be righteous
  - was not declared righteous
  lexicon: BDAG
  rationale: The passive of δικαιόω is rendered 'justified,' the standard gloss and
    the one most directly tied to James's argument. Alternatives reflect interpretive
    nuance, but the Greek term itself is best preserved in the main text.
- source_word: ἐξ ἔργων
  chosen: by works
  alternatives:
  - from works
  - on the basis of works
  lexicon: BDAG
  rationale: ἐκ with the genitive here expresses source/basis in James's argument.
    'By works' is idiomatic and preserves the compactness of the Greek while matching
    the surrounding discourse in James 2.
- source_word: ὑποδεξαμένη
  chosen: when she welcomed
  alternatives:
  - having received
  - after receiving
  lexicon: BDAG
  rationale: The participle denotes hospitable reception. 'Welcomed' captures the
    sense more naturally than the wooden 'received,' while 'when' conveys the participial
    relation in smooth English.
- source_word: τοὺς ἀγγέλους
  chosen: the messengers
  alternatives:
  - the angels
  - the spies
  lexicon: BDAG
  rationale: ἄγγελος can mean either 'angel' or 'messenger.' In the Rahab narrative
    the referents are human agents sent by Joshua, so 'messengers' best matches the
    context. 'Spies' is contextually specific but not the lexical value of the Greek
    here; 'angels' would misidentify the referents in this passage.
- source_word: καὶ ἑτέρᾳ ὁδῷ ἐκβαλοῦσα
  chosen: and sent them out by another way
  alternatives:
  - and sent them out by a different road
  - and let them go out another way
  lexicon: BDAG
  rationale: ἐκβάλλω here means to send out/dispatch rather than forcefully cast out.
    ἑτέρᾳ ὁδῷ is literally 'by another road/way.' 'By another way' is natural English
    and preserves the contrastive sense of ἑτέρᾳ.
