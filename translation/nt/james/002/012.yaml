id: JAS.2.12
reference: James 2:12
source:
  edition: SBLGNT
  text: οὕτως λαλεῖτε καὶ οὕτως ποιεῖτε ὡς διὰ νόμου ἐλευθερίας μέλλοντες κρίνεσθαι.
translation:
  text: So speak and so act as those who are going to be judged by the law of freedom[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the law of liberty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  chosen: so
  alternatives:
  - in this way
  - thus
  lexicon: BDAG
  rationale: Adverb repeated for emphasis before both verbs. 'So ... and so ...' preserves the rhetorical parallel and exhortational force in natural English.
- source_word: λαλεῖτε
  chosen: speak
  alternatives:
  - talk
  - say
  lexicon: BDAG
  rationale: Present active imperative, second plural. 'Speak' is the most direct and suitably weighty rendering for moral exhortation.
- source_word: ποιεῖτε
  chosen: act
  alternatives:
  - do
  - behave
  lexicon: BDAG
  rationale: Although the verb is broadly 'do,' 'act' pairs idiomatically with 'speak' in English and highlights conduct rather than mere activity, fitting James's ethical emphasis.
- source_word: ὡς
  chosen: as those who
  alternatives:
  - as
  - like those who
  lexicon: BDAG
  rationale: Introduces the manner or identity under which the commands are to be obeyed. Expanding to 'as those who' makes explicit the participial construction that follows.
- source_word: διὰ
  chosen: through
  alternatives:
  - by
  - according to
  lexicon: BDAG
  rationale: With the genitive it commonly denotes means or instrumentality. 'Through' preserves the sense that judgment comes by means of or in accordance with this law.
- source_word: νόμου ἐλευθερίας
  chosen: the law of freedom
  alternatives:
  - the law of liberty
  - the liberating law
  lexicon: BDAG
  rationale: A genitival expression already used in James 1:25. 'Freedom' is more natural contemporary English than 'liberty' while preserving the paradoxical phrase central to James's theology.
- source_word: μέλλοντες
  chosen: are going to
  alternatives:
  - being about to
  - destined to
  - will
  lexicon: BDAG
  rationale: Present participle of μέλλω with infinitive conveys impending or expected future action. 'Are going to' is natural English and preserves the forward-looking force better than a bare 'will'.
- source_word: κρίνεσθαι
  chosen: be judged
  alternatives:
  - be evaluated
  - come under judgment
  lexicon: BDAG
  rationale: Passive infinitive of κρίνω. 'Be judged' is the standard and sufficiently transparent rendering in this ethical-eschatological context.
