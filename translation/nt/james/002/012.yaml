theological_decisions:
- issue: Meaning of 'law of freedom' in James
  chosen_reading: Retain the phrase literally as 'the law of freedom' without interpreting it in the main text as Mosaic law, gospel, or a specific theological system.
  alternative_readings:
  - the law that gives freedom
  - the gospel as the law of liberty
  - the fulfilled moral law
  rationale: The phrase is theologically rich and debated, but the Greek itself does not specify a narrower doctrinal interpretation here. Preserving the wording maintains the tension and avoids importing denominational conclusions.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
