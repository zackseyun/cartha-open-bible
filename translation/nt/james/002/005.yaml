id: JAS.2.5
reference: James 2:5
source:
  edition: SBLGNT
  text: ἀκούσατε, ἀδελφοί μου ἀγαπητοί. οὐχ ὁ θεὸς ἐξελέξατο τοὺς πτωχοὺς ⸂τῷ κόσμῳ⸃
    πλουσίους ἐν πίστει καὶ κληρονόμους τῆς βασιλείας ἧς ἐπηγγείλατο τοῖς ἀγαπῶσιν
    αὐτόν;
translation:
  text: 'Listen, my beloved brothers: has not God chosen those who are poor in the
    world to be rich in faith and heirs of the kingdom that he promised to those who
    love him?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and may address the
      whole believing community inclusively.
    reason: alternative_reading
  - marker: b
    text: Or 'poor by worldly standards' or 'poor in the eyes of the world.'
    reason: lexical_alternative
  - marker: c
    text: '''Faith'' could also be rendered ''trust'' or, less likely here, ''faithfulness.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσατε
  chosen: Listen
  alternatives:
  - Hear
  lexicon: BDAG
  rationale: Aorist imperative plural calling for attention. 'Listen' is natural modern
    English and preserves the force of direct exhortation.
- source_word: ἀδελφοί μου ἀγαπητοί
  chosen: my beloved brothers
  alternatives:
  - my beloved brothers and sisters
  - my dear brothers
  lexicon: BDAG
  rationale: Retains the masculine plural 'brothers' in keeping with the gender-accurate
    policy, while 'beloved' reflects ἀγαπητοί. Because the address likely includes
    the whole congregation, an inclusive alternative is worth preserving in a footnote
    rather than moving it into the main text.
- source_word: οὐχ
  chosen: has not
  alternatives:
  - did not
  lexicon: BDAG
  rationale: Introduces a rhetorical question expecting a positive answer. Present
    perfect English idiomatically conveys the relevance of God's choosing without
    overstating aspect.
- source_word: ἐξελέξατο
  chosen: chosen
  alternatives:
  - selected
  - picked out
  lexicon: BDAG
  rationale: Standard rendering for divine election language; clear and natural here
    without importing a broader doctrinal system.
- source_word: τοὺς πτωχοὺς τῷ κόσμῳ
  chosen: those who are poor in the world
  alternatives:
  - the poor in the eyes of the world
  - those poor by worldly standards
  lexicon: BDAG
  rationale: 'The dative τῷ κόσμῳ is best taken as a sphere/respect dative: poor with
    respect to the world, i.e., in worldly terms. ''In the world'' is closer to the
    Greek than the more interpretive ''in the eyes of the world,'' while still making
    sense in English.'
- source_word: πλουσίους ἐν πίστει
  chosen: rich in faith
  alternatives:
  - rich in trust
  - rich in faithfulness
  lexicon: BDAG
  rationale: Follows the default rendering of πίστις as 'faith.' The phrase contrasts
    worldly poverty with spiritual richness. 'Faithfulness' is possible lexically
    but less likely in this construction and context.
- source_word: κληρονόμους τῆς βασιλείας
  chosen: heirs of the kingdom
  alternatives:
  - inheritors of the kingdom
  lexicon: BDAG
  rationale: '''Heirs'' is the established and precise legal-familial term for κληρονόμοι
    and reads naturally in English.'
- source_word: ἧς ἐπηγγείλατο
  chosen: that he promised
  alternatives:
  - which he promised
  lexicon: BDAG
  rationale: English relative pronoun 'that' is smoother in contemporary style. The
    middle verb is adequately represented by 'promised' without adding reflexive nuance.
- source_word: τοῖς ἀγαπῶσιν αὐτόν
  chosen: to those who love him
  alternatives:
  - for those who love him
  lexicon: BDAG
  rationale: Dative indirect object after 'promised' is naturally rendered 'to those
    who love him.' The present participle expresses the characteristic identity of
    the recipients.
