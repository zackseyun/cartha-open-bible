theological_decisions:
- issue: Potential doctrinal overreading of divine choosing
  chosen_reading: Render ἐξελέξατο simply as 'chosen' without importing a technical
    doctrine of election beyond the verse's immediate point.
  alternative_readings:
  - Use more interpretive wording that foregrounds predestination themes
  rationale: James's argument concerns God's valuation of the poor and the inconsistency
    of favoritism, not a developed soteriological scheme. The translation should preserve
    the text's wording and theological tension without resolving later doctrinal debates.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Scope of ἀδελφοί
  chosen_reading: Keep 'brothers' in the main text and preserve inclusive force in
    a footnote.
  alternative_readings:
  - Translate in the main text as 'brothers and sisters'
  rationale: The Greek is grammatically masculine plural and likely representative
    in epistolary address. Per doctrine, gender-accurate rendering is preferred, with
    annotation where inclusivity is contextually relevant.
  doctrine_reference: Translation philosophy §4
- issue: Meaning of πίστις in this verse
  chosen_reading: Use 'faith' in the main text.
  alternative_readings:
  - faithfulness
  - trust
  rationale: The doctrine table sets 'faith' as the default rendering for πίστις,
    with alternatives preserved where contested. Here the phrase 'rich in faith' most
    naturally refers to faith rather than faithfulness, but the lexical alternative
    is documented.
  doctrine_reference: 'Contested terms table: πίστις'
