id: JAS.2.22
reference: James 2:22
source:
  edition: SBLGNT
  text: βλέπεις ὅτι ἡ πίστις συνήργει τοῖς ἔργοις αὐτοῦ καὶ ἐκ τῶν ἔργων ἡ πίστις
    ἐτελειώθη,
translation:
  text: You see that faith was working together with his works, and by the works faith
    was brought to completion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faithfulness' or 'trust' for 'faith' (πίστις); the main text follows
      the project's default rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'faith was perfected' / 'made complete'; the Greek verb can denote reaching
      its intended end or maturity.
    reason: lexical_alternative
lexical_decisions:
- source_word: βλέπεις
  chosen: You see
  alternatives:
  - You can see
  - You observe
  lexicon: BDAG
  rationale: Present active indicative, second person singular. Rendered as a direct
    rhetorical address, preserving James's argumentative style. 'You see' is natural
    and close to the Greek.
- source_word: πίστις
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine default, πίστις is rendered 'faith' in the main text. In
    this context James is discussing the reality of Abraham's believing response as
    evidenced in action; 'faith' best preserves the standard lexical sense without
    over-resolving interpretive debates.
- source_word: συνήργει
  chosen: was working together with
  alternatives:
  - cooperated with
  - was active along with
  lexicon: BDAG
  rationale: Imperfect active indicative of συνεργέω, expressing ongoing or contemporaneous
    action in past time. 'Was working together with' preserves both the imperfective
    aspect and the σύν- idea of cooperation between faith and works.
- source_word: τοῖς ἔργοις αὐτοῦ
  chosen: with his works
  alternatives:
  - with his deeds
  - with the works he did
  lexicon: BDAG
  rationale: ἔργοις is dative plural after συνεργέω, naturally rendered with 'with.'
    'Works' is retained for consistency with James's argument and established theological
    vocabulary, while remaining understandable in context.
- source_word: ἐκ τῶν ἔργων
  chosen: by the works
  alternatives:
  - from the works
  - out of the works
  lexicon: BDAG
  rationale: ἐκ here marks means/source in the development of the argument. 'By the
    works' is idiomatic English and communicates that works were the means by which
    faith reached its intended end.
- source_word: ἐτελειώθη
  chosen: was brought to completion
  alternatives:
  - was perfected
  - was made complete
  lexicon: BDAG
  rationale: Aorist passive indicative of τελειόω. 'Was brought to completion' avoids
    suggesting moral flaw in faith prior to this moment while preserving the idea
    of reaching intended maturity or completeness. 'Perfected' is possible but can
    mislead modern readers.
