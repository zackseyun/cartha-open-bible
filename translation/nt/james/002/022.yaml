theological_decisions:
- issue: Relationship of faith and works in James's argument
  chosen_reading: The translation preserves James's wording that faith worked together
    with works and that faith was brought to completion by works, without importing
    a denominational explanation of justification.
  alternative_readings:
  - Works merely demonstrate faith before humans
  - Works complete faith in the sense of bringing it to maturity
  - Works cooperate with faith as its necessary expression
  rationale: The Greek states synergy and completion but does not itself spell out
    a full systematic theology. The wording is kept transparent so the verse can stand
    in tension with broader theological discussions without the translation resolving
    them.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering πίστις in a potentially contested theological context
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: Although πίστις can bear related nuances, the doctrine table sets 'faith'
    as the default main-text rendering, with alternatives preserved when relevant.
    Here 'faith' best matches the discourse in James 2 while leaving interpretive
    nuance open.
  doctrine_reference: 'Contested terms table: πίστις → faith; alternatives preserved
    where contested.'
