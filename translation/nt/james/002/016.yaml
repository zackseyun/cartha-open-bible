id: JAS.2.16
reference: James 2:16
source:
  edition: SBLGNT
  text: εἴπῃ δέ τις αὐτοῖς ἐξ ὑμῶν· Ὑπάγετε ἐν εἰρήνῃ, θερμαίνεσθε καὶ χορτάζεσθε, μὴ δῶτε δὲ αὐτοῖς τὰ ἐπιτήδεια τοῦ σώματος, ⸀τί ὄφελος;
translation:
  text: and one of you says to them[a], “Go in peace; keep warm and be filled,” but you do not give them the necessities of the body, what benefit is that?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “be warmed and be filled.” The Greek forms can be understood in a passive or middle sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴπῃ δέ τις
  chosen: and one ... says
  alternatives:
  - but someone ... says
  - and someone ... says
  lexicon: BDAG
  rationale: The construction introduces a hypothetical example. Rendering τις as 'one' fits the partitive phrase 'of you' naturally in English ('one of you'). δέ is carried by 'and' here to maintain flow without overstating contrast.
- source_word: ἐξ ὑμῶν
  chosen: of you
  alternatives:
  - from among you
  lexicon: BDAG
  rationale: 'Partitive sense: one from the group addressed. ''One of you'' is idiomatic English.'
- source_word: Ὑπάγετε ἐν εἰρήνῃ
  chosen: Go in peace
  alternatives:
  - Go in peaceably
  - Depart in peace
  lexicon: BDAG
  rationale: A conventional dismissal/blessing formula. 'Go in peace' is the natural English equivalent and preserves the ironic force in context.
- source_word: θερμαίνεσθε
  chosen: keep warm
  alternatives:
  - be warmed
  - warm yourselves
  lexicon: BDAG
  rationale: Middle/passive form can be understood either as intransitive/passive. 'Keep warm' is idiomatic and fits the practical sense of lacking clothing. A more literal alternative is preserved in a footnote because the voice nuance is debated.
- source_word: χορτάζεσθε
  chosen: be filled
  alternatives:
  - be fed
  - satisfy yourselves
  lexicon: BDAG
  rationale: The verb commonly means to be filled/satisfied, especially with food. 'Be filled' preserves the broader lexical sense while still fitting the context of bodily need. 'Be fed' is possible but slightly more interpretive.
- source_word: μὴ δῶτε δὲ αὐτοῖς
  chosen: but you do not give them
  alternatives:
  - yet you do not give them
  - but do not give them
  lexicon: BDAG
  rationale: 'The sense is adversative in context: the spoken blessing is contrasted with failure to act. English present ''do not give'' communicates the general hypothetical force naturally.'
- source_word: τὰ ἐπιτήδεια τοῦ σώματος
  chosen: the necessities of the body
  alternatives:
  - the things needed for the body
  - the body's necessities
  - what the body needs
  lexicon: BDAG
  rationale: ἐπιτήδεια denotes what is necessary or suitable, especially provisions. 'The necessities of the body' is clear, fairly formal, and preserves the concrete bodily emphasis of τοῦ σώματος.
- source_word: τί ὄφελος;
  chosen: what benefit is that?
  alternatives:
  - what good is it?
  - what profit is there?
  lexicon: BDAG
  rationale: The idiom asks about practical value. 'What benefit is that?' stays close to ὄφελος while sounding natural in modern English. 'What good is it?' is idiomatic but slightly more interpretive by supplying 'it'.
