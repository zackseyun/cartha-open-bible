theological_decisions:
- issue: Nature of the imperatives θερμαίνεσθε and χορτάζεσθε
  chosen_reading: Render as conventional exhortations ('keep warm and be filled') without specifying whether the subjects are to warm/feed themselves or are passively to receive warmth/food.
  alternative_readings:
  - be warmed and be filled
  - warm yourselves and satisfy yourselves
  rationale: James's point is the emptiness of pious words without material aid, not the mechanics of the verbs' voice. The chosen rendering preserves the rhetorical force while avoiding an over-precise theological or moral inference about self-help versus passive reception. An alternative more literal rendering is preserved in a footnote.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it.
