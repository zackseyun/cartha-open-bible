theological_decisions:
- issue: Rendering συναγωγή in a Christian-context epistle
  chosen_reading: assembly
  alternative_readings:
  - synagogue
  rationale: The verse does not make a doctrinal claim about church polity; the decision
    is contextual and lexical. 'Assembly' avoids misleading readers into assuming
    a non-Christian institution while preserving the sense of a gathered meeting.
    Because the Greek term itself is συναγωγή, the more literal 'synagogue' is preserved
    in a footnote for transparency.
  doctrine_reference: Translation philosophy §§1, 5
