id: JAS.2.2
reference: James 2:2
source:
  edition: SBLGNT
  text: ἐὰν γὰρ εἰσέλθῃ ⸀εἰς συναγωγὴν ὑμῶν ἀνὴρ χρυσοδακτύλιος ἐν ἐσθῆτι λαμπρᾷ,
    εἰσέλθῃ δὲ καὶ πτωχὸς ἐν ῥυπαρᾷ ἐσθῆτι,
translation:
  text: For if a man wearing gold rings and bright clothing enters into your assembly,
    and a poor man in filthy clothing also enters,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''synagogue'': the Greek word is synagōgē, literally ''synagogue'' or
      ''assembly.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: συναγωγήν
  chosen: assembly
  alternatives:
  - synagogue
  - meeting
  lexicon: BDAG
  rationale: Although the noun can mean 'synagogue,' in this context James addresses
    a Christian gathering, and 'assembly' communicates the sense without implying
    a formally Jewish institution. The alternative 'synagogue' is worth preserving
    because the Greek term is literally that word and may reflect early Jewish-Christian
    meeting language.
- source_word: ἀνὴρ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: BDAG
  rationale: The Greek is explicitly masculine singular and refers to a male individual
    in the illustration. Following the gender-accurate principle, 'a man' is preferred
    over gender-neutral renderings.
- source_word: χρυσοδακτύλιος
  chosen: wearing gold rings
  alternatives:
  - gold-fingered
  - with a gold ring
  lexicon: BDAG
  rationale: The adjective literally denotes being adorned with gold on the fingers,
    idiomatically someone wearing gold rings. 'Wearing gold rings' is natural English
    and preserves the image of conspicuous wealth better than the overly literal 'gold-fingered.'
- source_word: ἐσθῆτι λαμπρᾷ
  chosen: bright clothing
  alternatives:
  - fine clothing
  - splendid clothing
  lexicon: BDAG
  rationale: ἐσθής refers to clothing/garment, and λαμπρός can mean bright, splendid,
    or fine. 'Bright clothing' keeps the visual force of the Greek while still implying
    impressive attire.
- source_word: πτωχὸς
  chosen: a poor man
  alternatives:
  - a poor person
  lexicon: BDAG
  rationale: The adjective functions substantivally and is masculine singular, parallel
    to ἀνήρ in the first half of the verse. 'A poor man' preserves both the grammar
    and the rhetorical contrast.
- source_word: ῥυπαρᾷ ἐσθῆτι
  chosen: filthy clothing
  alternatives:
  - dirty clothing
  - shabby clothing
  lexicon: BDAG
  rationale: ῥυπαρός denotes dirtiness, filth, or squalor. 'Filthy clothing' best
    captures the strong negative social impression in the scene; 'shabby' would soften
    the term beyond the Greek.
- source_word: εἰσέλθῃ ... εἰσέλθῃ
  chosen: enters ... also enters
  alternatives:
  - comes in ... also comes in
  lexicon: BDAG
  rationale: Using 'enters' for both occurrences preserves the repeated Greek verb
    and the parallel structure of the hypothetical scenario.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - now
  lexicon: BDAG
  rationale: γάρ links this verse to the preceding prohibition against partiality
    by giving an illustrative explanation. 'For' preserves that explanatory connection.
