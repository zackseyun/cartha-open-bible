id: JAS.2.6
reference: James 2:6
source:
  edition: SBLGNT
  text: ὑμεῖς δὲ ἠτιμάσατε τὸν πτωχόν. οὐχ οἱ πλούσιοι καταδυναστεύουσιν ὑμῶν, καὶ
    αὐτοὶ ἕλκουσιν ὑμᾶς εἰς κριτήρια;
translation:
  text: But you have dishonored the poor man. Is it not the rich who oppress you and
    themselves drag you into courts?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the poor person' or more generally 'the poor.' The Greek is singular
      ('the poor man'), likely echoing the specific example in the preceding verses
      while also representing the poor more broadly.
    reason: lexical_alternative
  - marker: b
    text: Or 'law courts' or 'tribunals.' The Greek refers to judicial courts.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠτιμάσατε
  chosen: have dishonored
  alternatives:
  - have insulted
  - have treated shamefully
  lexicon: BDAG
  rationale: ἀτιμάζω carries the sense of treating with dishonor or contempt. 'Dishonored'
    preserves the shame/honor dimension better than the narrower 'insulted' while
    remaining natural English.
- source_word: τὸν πτωχόν
  chosen: the poor man
  alternatives:
  - the poor person
  - the poor
  lexicon: BDAG
  rationale: The singular with article points to the poor person just described in
    the preceding context. 'Poor man' matches the masculine singular form and the
    immediate illustrative scenario, in keeping with the gender-accurate policy; broader
    alternatives are possible but less precise here.
- source_word: οἱ πλούσιοι
  chosen: the rich
  alternatives:
  - the rich people
  - the wealthy
  lexicon: BDAG
  rationale: As a substantival adjective, it naturally means 'the rich.' This is concise
    and idiomatic in English and preserves the class reference.
- source_word: καταδυναστεύουσιν
  chosen: oppress
  alternatives:
  - exploit
  - dominate
  lexicon: BDAG
  rationale: The verb denotes exercising power against someone in a harsh or oppressive
    way. 'Oppress' best captures the force without over-specifying the mechanism.
- source_word: ἕλκουσιν
  chosen: drag
  alternatives:
  - haul
  - pull
  lexicon: BDAG
  rationale: ἕλκω often conveys forceful pulling. 'Drag' fits the hostile legal setting
    and preserves the vividness of coercion.
- source_word: κριτήρια
  chosen: courts
  alternatives:
  - law courts
  - tribunals
  lexicon: BDAG
  rationale: κριτήρια here refers to judicial courts or legal proceedings. 'Courts'
    is clear modern English; 'law courts' is slightly more explicit but less concise.
- source_word: καὶ αὐτοὶ
  chosen: and themselves
  alternatives:
  - and they themselves
  - and these very ones
  lexicon: BDAG
  rationale: The pronoun is emphatic, highlighting that the rich are the very ones
    doing this. 'Themselves' preserves the emphasis in natural English.
- source_word: οὐχ ... ;
  chosen: Is it not ... ?
  alternatives:
  - Are not ... ?
  lexicon: Greek grammar
  rationale: The particle introduces a rhetorical question expecting a positive answer.
    'Is it not ... ?' communicates that force smoothly in English.
