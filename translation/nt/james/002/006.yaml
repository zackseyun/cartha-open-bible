theological_decisions:
- issue: Reference of the singular 'the poor man'
  chosen_reading: A representative poor man in the assembly scenario, with broader
    application to the poor as a class
  alternative_readings:
  - A collective singular meaning 'the poor' generically
  rationale: James has just described a specific poor visitor in the assembly (2:2–3),
    so retaining the singular best preserves the discourse flow while still allowing
    representative force.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
