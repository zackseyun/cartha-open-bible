id: JAS.2.24
reference: James 2:24
source:
  edition: SBLGNT
  text: ⸀ὁρᾶτε ὅτι ἐξ ἔργων δικαιοῦται ἄνθρωπος καὶ οὐκ ἐκ πίστεως μόνον.
translation:
  text: You see that a man is justified by works and not by faith alone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is shown to be righteous' or 'is vindicated.' James's wording is preserved
      without resolving the interpretive debate over how this relates to Paul's use
      of 'justify.'
    reason: alternative_reading
  - marker: b
    text: Greek 'a man,' used here in a representative sense for a human being generally.
    reason: cultural_note
  - marker: c
    text: Or 'faithfulness' or 'trust' for 'faith,' though 'faith' is the default
      rendering of Greek pistis in this translation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁρᾶτε
  chosen: You see
  alternatives:
  - You see for yourselves
  - You perceive
  lexicon: BDAG
  rationale: Present active indicative, second person plural, functioning as a direct
    appeal to the audience based on the preceding example. 'You see' is natural modern
    English and preserves the indicative force better than an imperative-like 'See.'
- source_word: ἐξ ἔργων
  chosen: by works
  alternatives:
  - from works
  - out of works
  lexicon: BDAG
  rationale: The preposition ἐκ/ἐξ with the genitive here marks source or basis. In
    English, 'by works' best communicates the instrumental/basis sense in this argument
    without awkwardness.
- source_word: δικαιοῦται
  chosen: is justified
  alternatives:
  - is shown to be righteous
  - is declared righteous
  - is vindicated
  lexicon: BDAG
  rationale: δικαιόω can mean declare righteous, justify, or vindicate/show to be
    in the right depending on context. 'Is justified' preserves the Greek term's theological
    weight and lexical continuity, while the contextual nuance that works demonstrate
    genuine righteousness is preserved in theological documentation and footnote rather
    than replacing the term in the main text.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  - a human being
  lexicon: BDAG
  rationale: The noun is grammatically masculine singular and used generically. Per
    the project's gender-accurate policy, 'a man' preserves the source form and representative
    force better than the gender-neutral 'a person,' with inclusivity noted in a footnote.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per the doctrine table, πίστις defaults to 'faith.' In this verse the
    contrast is between works and faith considered by itself, so 'faith' is retained
    in the main text; lexical alternatives are preserved in a footnote only as possibilities,
    not as preferred readings.
- source_word: μόνον
  chosen: alone
  alternatives:
  - only
  lexicon: BDAG
  rationale: Placed after 'faith' in English as 'faith alone' to reflect idiomatic
    English while preserving the exclusivity expressed by μόνον.
