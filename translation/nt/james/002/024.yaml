theological_decisions:
- issue: Sense of δικαιοῦται in relation to justification theology
  chosen_reading: Retain 'is justified' in the main text, allowing James's wording
    to stand without harmonizing it away.
  alternative_readings:
  - is shown to be righteous
  - is vindicated
  rationale: Historic Christian interpretation debates whether James uses δικαιόω
    in a demonstrative/vindicatory sense rather than in the Pauline forensic sense.
    The translation philosophy requires preserving theological tension rather than
    resolving it. Therefore the main text keeps the traditional and lexically central
    'is justified,' while an explanatory footnote preserves the contextual alternative
    'is shown to be righteous'/'is vindicated.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Generic masculine ἄνθρωπος
  chosen_reading: Translate as 'a man' with representative/generic force.
  alternative_readings:
  - a person
  - a human being
  rationale: The project specifies gender-accurate over gender-neutral rendering where
    the Greek is grammatically masculine and representative. A footnote can clarify
    that the statement is generic rather than male-exclusive.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
