id: JAS.2.17
reference: James 2:17
source:
  edition: SBLGNT
  text: οὕτως καὶ ἡ πίστις, ἐὰν μὴ ⸂ἔχῃ ἔργα⸃, νεκρά ἐστιν καθ’ ἑαυτήν.
translation:
  text: So also faith, if it does not have works, is dead by itself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'trust'; less likely here, 'faithfulness.' The Greek word pistis can
      carry these senses, but 'faith' best fits James's argument in this verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως καὶ
  chosen: So also
  alternatives:
  - In the same way also
  - Thus also
  lexicon: BDAG
  rationale: οὕτως marks comparison/inference from the preceding illustration, and
    καί adds correspondence. 'So also' is concise modern English that preserves the
    argumentative linkage.
- source_word: ἡ πίστις
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. In
    James 2 the referent is professed faith/belief, not primarily subjective trust
    or covenantal faithfulness, though those are lexical possibilities.
- source_word: ἐὰν μὴ ἔχῃ
  chosen: if it does not have
  alternatives:
  - unless it has
  - if it does not possess
  lexicon: BDAG
  rationale: This is a present subjunctive in a conditional clause with ἐάν μή. 'If
    it does not have' is the most natural and transparent English equivalent.
- source_word: ἔργα
  chosen: works
  alternatives:
  - deeds
  - actions
  lexicon: BDAG
  rationale: ἔργα in this context refers to outward deeds that demonstrate the reality
    of faith. 'Works' preserves the lexical link with the surrounding argument in
    James 2 and avoids over-interpretive narrowing.
- source_word: νεκρά
  chosen: dead
  alternatives:
  - lifeless
  lexicon: BDAG
  rationale: The predicate adjective is metaphorical but forceful. 'Dead' is the standard
    and strongest equivalent, matching James's stark contrast.
- source_word: καθ’ ἑαυτήν
  chosen: by itself
  alternatives:
  - in itself
  - on its own
  lexicon: BDAG
  rationale: The phrase indicates faith considered alone, in isolation from works.
    'By itself' is idiomatic and preserves the sense of isolation without adding interpretation.
