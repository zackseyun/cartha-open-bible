theological_decisions:
- issue: Rendering πίστις in a context central to debates about faith and works
  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: The doctrine file specifies 'faith' as the default rendering for πίστις,
    with alternatives preserved where contested. Here James contrasts claimed faith
    with accompanying works; 'faith' best preserves the lexical and theological tension
    without importing a denominational resolution. The verse does not deny justification
    by faith but states that faith lacking works is dead.
