theological_decisions:
- issue: Relation of Abraham's faith and works in James's argument
  chosen_reading: Render the verse in a way that preserves James's claim that Scripture was fulfilled in Abraham's obedient action, without importing a denominational resolution of justification debates.
  alternative_readings:
  - A strongly forensic reading detached from works
  - A reading that makes works replace faith as the basis of righteousness
  rationale: The verse itself joins Genesis 15:6 with Abraham's later demonstrated obedience. The translation should preserve that tension rather than resolve broader theological disputes beyond the wording of the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Rendering δικαιοσύνη
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: DOCTRINE.md lists δικαιοσύνη with default English 'righteousness,' with 'justice' preserved mainly in footnotes for Pauline passages. In James 2:23, 'righteousness' best fits the Genesis citation and justification context.
  doctrine_reference: 'Contested terms table: δικαιοσύνη → righteousness'
