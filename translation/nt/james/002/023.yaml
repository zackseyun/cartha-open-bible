id: JAS.2.23
reference: James 2:23
source:
  edition: SBLGNT
  text: καὶ ἐπληρώθη ἡ γραφὴ ἡ λέγουσα· Ἐπίστευσεν δὲ Ἀβραὰμ τῷ θεῷ, καὶ ἐλογίσθη αὐτῷ εἰς δικαιοσύνην, καὶ φίλος θεοῦ ἐκλήθη.
translation:
  text: And the Scripture was fulfilled that says[a], “Abraham believed God, and it was counted to him as righteousness,” and he was called a friend of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “credited”; the Greek verb can also be rendered “reckoned.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπληρώθη
  chosen: was fulfilled
  alternatives:
  - was brought to fulfillment
  - came to fulfillment
  lexicon: BDAG
  rationale: Passive of πληρόω in a scriptural citation formula is most naturally rendered 'was fulfilled.' This preserves James's claim that the cited Scripture reached its fulfillment in Abraham's demonstrated faith.
- source_word: γραφή
  chosen: the Scripture
  alternatives:
  - the writing
  - the passage of Scripture
  lexicon: BDAG
  rationale: γραφή in NT usage commonly refers to Scripture as sacred writ, not merely any writing. The singular with article suits 'the Scripture' as a citation formula.
- source_word: λέγουσα
  chosen: that says
  alternatives:
  - saying
  - which says
  lexicon: BDAG
  rationale: The present participle modifying γραφή is idiomatically rendered in English as 'that says' in citation contexts, improving readability while preserving sense.
- source_word: Ἐπίστευσεν ... τῷ θεῷ
  chosen: Abraham believed God
  alternatives:
  - Abraham believed in God
  - Abraham trusted God
  lexicon: BDAG
  rationale: πιστεύω with the dative here is best rendered 'believed God,' emphasizing taking God at his word. 'Trusted God' is possible but would move slightly beyond the wording of the Genesis citation. This also preserves the traditional and source-near phrasing.
- source_word: ἐλογίσθη
  chosen: it was counted
  alternatives:
  - it was reckoned
  - it was credited
  lexicon: BDAG
  rationale: Passive of λογίζομαι here refers to something being credited or counted to Abraham. 'Counted' is clear modern English and preserves the forensic/accounting nuance without sounding overly technical.
- source_word: εἰς δικαιοσύνην
  chosen: as righteousness
  alternatives:
  - for righteousness
  - unto righteousness
  lexicon: BDAG
  rationale: The established idiom in this construction is well represented by 'as righteousness.' Per doctrine guidance, δικαιοσύνη is rendered 'righteousness' by default; 'justice' is not suitable in this Abrahamic justification context.
- source_word: φίλος θεοῦ
  chosen: a friend of God
  alternatives:
  - God's friend
  - friend to God
  lexicon: BDAG
  rationale: The predicate nominative plus genitive is naturally rendered 'a friend of God.' This preserves the relational sense without overinterpreting the genitive.
- source_word: ἐκλήθη
  chosen: was called
  alternatives:
  - was named
  - was known as
  lexicon: BDAG
  rationale: Passive of καλέω here is straightforwardly 'was called.' It leaves open whether the sense is designation by Scripture/tradition or recognized status, matching the Greek's breadth.
