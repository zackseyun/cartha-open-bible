theological_decisions:
- issue: Meaning of 'royal law'
  chosen_reading: A law characterized as royal, likely because it belongs to or reflects
    the reign of God/the Messiah and holds preeminent status in kingdom ethics, without
    narrowing the phrase to a single doctrinal explanation in translation.
  alternative_readings:
  - The law given by the King
  - The supreme law among laws
  rationale: The Greek adjective βασιλικός allows the translation 'royal' without
    forcing an interpretive decision about whether James means source, rank, or kingdom
    association. The main text preserves the theological breadth rather than resolving
    it.
  doctrine_reference: Preserve theological tension rather than resolve it.
