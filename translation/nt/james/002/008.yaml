id: JAS.2.8
reference: James 2:8
source:
  edition: SBLGNT
  text: Εἰ μέντοι νόμον τελεῖτε βασιλικὸν κατὰ τὴν γραφήν Ἀγαπήσεις τὸν πλησίον σου
    ὡς σεαυτόν, καλῶς ποιεῖτε·
translation:
  text: If, however, you are fulfilling the royal law according to the Scripture,
    “You shall love your neighbor as yourself,” you are doing well.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the kingly law” or “the law of the kingdom.” The Greek says “royal law,”
      which may emphasize either its kingly source or its supreme status.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰ μέντοι
  chosen: If, however
  alternatives:
  - If indeed
  - If nevertheless
  - If really
  lexicon: BDAG
  rationale: The combination introduces a conditional statement with mild contrast
    or qualification. 'If, however' captures both the conditional force of εἰ and
    the adversative/continuative nuance of μέντοι in clear modern English.
- source_word: νόμον ... βασιλικὸν
  chosen: the royal law
  alternatives:
  - the kingly law
  - the law of the kingdom
  lexicon: BDAG
  rationale: βασιλικός most naturally means 'royal' or 'belonging to a king.' 'Royal
    law' is the most idiomatic and traditional English rendering while remaining faithful
    to the Greek. 'Law of the kingdom' is interpretive and goes beyond the lexical
    form.
- source_word: τελεῖτε
  chosen: you are fulfilling
  alternatives:
  - you fulfill
  - you are keeping
  - you carry out completely
  lexicon: BDAG
  rationale: τελέω here conveys carrying out or fulfilling a requirement. 'You are
    fulfilling' preserves the present tense and the sense of actual performance. 'Keeping'
    is possible but less directly tied to τελέω's completion/fulfillment nuance.
- source_word: κατὰ τὴν γραφήν
  chosen: according to the Scripture
  alternatives:
  - according to Scripture
  - in accordance with the Scripture
  lexicon: BDAG
  rationale: The phrase means in conformity with what Scripture says. 'According to
    the Scripture' preserves the article and the singular γραφή while remaining natural
    English.
- source_word: Ἀγαπήσεις
  chosen: You shall love
  alternatives:
  - Love
  lexicon: BDAG
  rationale: This is a quotation of the scriptural command in future form functioning
    imperativally, echoing the standard form of Lev 19:18 in Greek. 'You shall love'
    preserves the scriptural register and command force.
- source_word: τὸν πλησίον σου
  chosen: your neighbor
  alternatives:
  - the one near you
  - your fellow person
  lexicon: BDAG
  rationale: πλησίον in this context is the established biblical term for one's neighbor
    in the ethical sense. 'Your neighbor' is both accurate and idiomatic.
- source_word: ὡς σεαυτόν
  chosen: as yourself
  alternatives:
  - as you love yourself
  lexicon: BDAG
  rationale: The comparative phrase is concise in Greek and standardly rendered 'as
    yourself.' Expanding it would add words not present in the source.
- source_word: καλῶς ποιεῖτε
  chosen: you are doing well
  alternatives:
  - you do well
  - you are acting rightly
  lexicon: BDAG
  rationale: The phrase is an affirmation of proper action. 'You are doing well' preserves
    the present tense and reads naturally in contemporary English.
