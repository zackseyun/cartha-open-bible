theological_decisions:
- issue: Meaning of δικαιόω in James 2:21 in relation to works
  chosen_reading: Render δικαιόω as 'justified' in the main text, preserving the lexical
    connection to the broader justification discussion without collapsing James into
    either a purely demonstrative ('shown righteous') or purely forensic reading.
  alternative_readings:
  - shown to be righteous
  - vindicated
  - declared righteous
  rationale: The verse participates in a well-known theological discussion about faith
    and works. Per translation philosophy, the rendering should preserve the tension
    rather than resolve it. 'Justified' is the most transparent and auditable choice,
    while alternatives that emphasize demonstrative vindication are preserved in a
    footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
