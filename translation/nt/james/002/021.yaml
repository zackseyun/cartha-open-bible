id: JAS.2.21
reference: James 2:21
source:
  edition: SBLGNT
  text: Ἀβραὰμ ὁ πατὴρ ἡμῶν οὐκ ἐξ ἔργων ἐδικαιώθη, ἀνενέγκας Ἰσαὰκ τὸν υἱὸν αὐτοῦ
    ἐπὶ τὸ θυσιαστήριον;
translation:
  text: Was not Abraham our father justified by works when he offered up Isaac his
    son on the altar?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shown to be righteous' or 'vindicated.' The Greek verb can carry either
      declarative or demonstrative force depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: πατὴρ ἡμῶν
  chosen: our father
  alternatives:
  - our ancestor
  lexicon: BDAG
  rationale: A natural rendering of the familial metaphor and covenant identity language.
    'Our father' preserves the traditional and relational force better than the more
    flattened 'our ancestor.'
- source_word: ἐξ ἔργων
  chosen: by works
  alternatives:
  - from works
  - on the basis of works
  lexicon: BDAG
  rationale: The preposition ἐκ/ἐξ with the genitive here expresses source or basis.
    'By works' is idiomatic English and preserves the theological phrasing used in
    this context, while still reflecting the sense of basis/instrumentality.
- source_word: ἐδικαιώθη
  chosen: was justified
  alternatives:
  - was shown to be righteous
  - was declared righteous
  - was vindicated
  lexicon: BDAG
  rationale: δικαιόω can mean justify, declare righteous, or vindicate depending on
    context. Here, because James is discussing the relation of works to justification
    in explicit dialogue with a major theological theme, 'was justified' best preserves
    the lexical link and the text's theological tension. Alternative interpretive
    renderings are preserved in a footnote rather than resolved in the main text.
- source_word: ἀνενέγκας
  chosen: when he offered up
  alternatives:
  - after offering
  - having offered
  lexicon: BDAG
  rationale: The aorist participle is most naturally rendered with temporal force
    in English here. 'When he offered up' is smooth and captures the sacrificial nuance
    of ἀναφέρω in this context.
- source_word: θυσιαστήριον
  chosen: the altar
  lexicon: BDAG
  rationale: Standard rendering for the sacrificial altar; clear and direct in English.
- source_word: οὐκ ... ἐδικαιώθη;
  chosen: Was not ... justified?
  alternatives:
  - Was ... not justified?
  lexicon: BDAG
  rationale: This preserves the Greek rhetorical question expecting an affirmative
    answer, while using natural English word order.
