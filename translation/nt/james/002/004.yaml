id: JAS.2.4
reference: James 2:4
source:
  edition: SBLGNT
  text: ⸀οὐ διεκρίθητε ἐν ἑαυτοῖς καὶ ἐγένεσθε κριταὶ διαλογισμῶν πονηρῶν;
translation:
  text: have you not made distinctions among yourselves and become judges with evil
    thoughts?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "have you not discriminated among yourselves?" The verb can also carry
      the sense "be divided" or, in other contexts, "doubt," but here the context
      favors making discriminatory distinctions.
    reason: lexical_alternative
  - marker: b
    text: Literally, "judges of evil thoughts/reasonings."
    reason: lexical_alternative
lexical_decisions:
- source_word: διεκρίθητε
  chosen: have ... made distinctions
  alternatives:
  - have you not discriminated
  - have you not doubted
  - have you not been divided
  lexicon: BDAG
  rationale: The aorist passive/middle of διακρίνω here is best taken in the sense
    of making distinctions or discriminating, in context referring back to preferential
    treatment of rich and poor in the assembly (2:1–3). 'Doubted' is a common sense
    elsewhere in James (e.g., 1:6), but does not fit this immediate context. 'Been
    divided' reflects the passive nuance and the phrase ἐν ἑαυτοῖς, but English is
    less clear here than the active-result sense 'made distinctions among yourselves.'
- source_word: ἐν ἑαυτοῖς
  chosen: among yourselves
  alternatives:
  - within yourselves
  - in yourselves
  lexicon: BDAG
  rationale: The phrase can mean either inwardly ('within yourselves') or corporately
    ('among yourselves'). Given the communal setting of assembly behavior and the
    resulting social partiality, 'among yourselves' best captures the interpersonal
    sense, while still allowing the implication of internal moral inconsistency.
- source_word: ἐγένεσθε
  chosen: become
  alternatives:
  - be made
  - turn out to be
  lexicon: BDAG
  rationale: 'γίνομαι here marks the result of the prior action: by making distinctions,
    they have become a certain kind of judge. ''Become'' is the most natural and direct
    English equivalent.'
- source_word: κριταὶ
  chosen: judges
  alternatives:
  - arbiters
  lexicon: BDAG
  rationale: κριτής straightforwardly means 'judge.' 'Arbiters' is possible but weaker
    and less transparent. The term carries a moral-judicial force appropriate to James's
    rebuke.
- source_word: διαλογισμῶν πονηρῶν
  chosen: with evil thoughts
  alternatives:
  - with evil motives
  - with wicked reasonings
  - of evil thoughts
  lexicon: BDAG
  rationale: The genitive construction can be rendered woodenly as 'judges of evil
    thoughts/reasonings,' but idiomatic English is better served by expressing the
    judges as characterized by evil deliberations or motives. 'With evil thoughts'
    preserves the lexical content of διαλογισμός as thought/reasoning while remaining
    readable. 'Evil motives' is interpretive and slightly narrower.
- source_word: οὐ
  chosen: have ... not
  alternatives:
  - did ... not
  lexicon: BDAG
  rationale: The question is rhetorical and expects an affirmative answer. Rendering
    with English auxiliary inversion ('have you not ... ?') preserves the rebuking
    rhetorical force better than a flat statement.
