theological_decisions:
- issue: Sense of διακρίνω in relation to partiality
  chosen_reading: The verse rebukes discriminatory distinctions within the believing
    community, not internal doubt.
  alternative_readings:
  - The verse speaks of being inwardly divided or wavering
  rationale: In James 2:1–3 the immediate issue is favoritism shown to the rich over
    the poor. Therefore the semantic choice should align with social discrimination/partiality
    rather than the 'doubt' sense found elsewhere in James. This is an exegetical
    rather than doctrinal decision, but it affects how the ethical force of the verse
    is heard.
  doctrine_reference: Translation philosophy §§1, 3, 5
