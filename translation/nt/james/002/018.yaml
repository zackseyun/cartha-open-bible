theological_decisions:
- issue: Rendering πίστις in a context central to the faith-and-works discussion
  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: The doctrine file specifies 'faith' as the default rendering for πίστις,
    with alternatives preserved where contested. Here James contrasts claimed faith
    with works that evidence it; rendering as 'faithfulness' would prematurely resolve
    the interpretive tension rather than preserve it.
