id: JAS.2.18
reference: James 2:18
source:
  edition: SBLGNT
  text: Ἀλλ’ ἐρεῖ τις· Σὺ πίστιν ἔχεις κἀγὼ ἔργα ἔχω. δεῖξόν μοι τὴν πίστιν σου ⸀χωρὶς
    τῶν ⸀ἔργων, κἀγώ ⸂σοι δείξω⸃ ἐκ τῶν ἔργων μου τὴν ⸀πίστιν.
translation:
  text: But someone will say, “You have faith, and I have works.” Show me your faith
    apart from works, and I will show you my faith by my works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “without works.” The Greek phrase can be rendered either “apart from
      works” or “without works.”
    reason: lexical_alternative
  - marker: b
    text: Or “from my works.” The Greek preposition can indicate source or means;
      “by my works” expresses that the works make faith visible.
    reason: lexical_alternative
  - marker: c
    text: Greek pistis; also possibly “trust” or, in some contexts, “faithfulness.”
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀλλ’
  chosen: But
  alternatives:
  - Yet
  - However
  lexicon: BDAG
  rationale: Marks contrast/objection within James's argument. 'But' is the most natural
    concise English adversative here.
- source_word: ἐρεῖ τις
  chosen: someone will say
  alternatives:
  - someone may say
  - someone says
  lexicon: BDAG
  rationale: Future indicative introduces a hypothetical interlocutor in diatribe
    style. 'Will say' preserves the Greek form and rhetorical force better than a
    modal paraphrase.
- source_word: πίστιν
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine default, πίστις is rendered 'faith' in the main text. In
    this context James contrasts professed faith with works; 'faith' best preserves
    the lexical and theological tension without over-interpreting.
- source_word: ἔργα
  chosen: works
  alternatives:
  - deeds
  - actions
  lexicon: BDAG
  rationale: '''Works'' is the established and accurate rendering in James''s argument,
    preserving the conceptual linkage across the passage. ''Deeds'' is possible but
    weakens intertextual consistency.'
- source_word: δεῖξόν μοι
  chosen: Show me
  alternatives:
  - Demonstrate to me
  - Prove to me
  lexicon: BDAG
  rationale: Aorist imperative calls for a concrete demonstration. 'Show me' is idiomatic,
    direct, and preserves the challenge.
- source_word: χωρὶς τῶν ἔργων
  chosen: apart from works
  alternatives:
  - without works
  - by itself without works
  lexicon: BDAG
  rationale: χωρίς here means 'apart from/without.' 'Apart from works' is slightly
    more formal and mirrors James's argumentative contrast with ἐκ τῶν ἔργων. It avoids
    importing wording from nearby verses not present here.
- source_word: κἀγώ σοι δείξω
  chosen: and I will show you
  alternatives:
  - but I will show you
  - and I will demonstrate to you
  lexicon: BDAG
  rationale: Retains the emphatic counter-response. 'And' reflects κἀγώ straightforwardly;
    the contrast is already carried by the sentence structure.
- source_word: ἐκ τῶν ἔργων μου
  chosen: by my works
  alternatives:
  - from my works
  - out of my works
  lexicon: BDAG
  rationale: ἐκ can be rendered 'from/out of,' but in English 'by my works' best communicates
    means/evidential basis in this context while remaining faithful to the argument
    that works display faith.
- source_word: τὴν πίστιν
  chosen: my faith
  alternatives:
  - the faith that I have
  lexicon: BDAG
  rationale: The repeated noun should remain explicit in English to preserve James's
    rhetorical parallelism; supplying 'my' from μου keeps the symmetry with 'your
    faith'.
