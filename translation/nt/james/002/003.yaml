id: JAS.2.3
reference: James 2:3
source:
  edition: SBLGNT
  text: ⸂ἐπιβλέψητε δὲ⸃ ἐπὶ τὸν φοροῦντα τὴν ἐσθῆτα τὴν λαμπρὰν καὶ ⸀εἴπητε· Σὺ κάθου ὧδε καλῶς, καὶ τῷ πτωχῷ εἴπητε· Σὺ στῆθι ⸂ἢ κάθου ἐκεῖ⸃ ὑπὸ τὸ ὑποπόδιόν μου,
translation:
  text: and if you pay attention to the one wearing the bright clothing and say[a], “You sit here in a good place,” and say to the poor man, “You stand there[b], or sit under my footstool,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the fine clothing” or “the splendid clothing.”
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts omit “or sit there,” leaving simply “You stand there, or sit under my footstool” in others; the printed text includes “or sit there.”
    reason: textual_variant
lexical_decisions:
- source_word: ἐπιβλέψητε
  chosen: pay attention to
  alternatives:
  - look upon
  - show special attention to
  - regard
  lexicon: BDAG
  rationale: In this context the verb carries the sense of giving favorable notice or attention, not merely seeing. 'Pay attention to' is natural English and fits the rebuke of partiality in the surrounding context without over-interpreting as 'show favoritism,' which is stated explicitly elsewhere in the passage.
- source_word: φοροῦντα
  chosen: wearing
  alternatives:
  - bearing
  - dressed in
  lexicon: BDAG
  rationale: The participle commonly refers to wearing clothing. 'Wearing' is the most direct and idiomatic rendering in English.
- source_word: ἐσθῆτα τὴν λαμπράν
  chosen: the bright clothing
  alternatives:
  - the fine clothing
  - the splendid clothing
  lexicon: BDAG
  rationale: ἐσθής denotes clothing/garment, and λαμπρός can mean bright, splendid, or fine. 'Bright clothing' preserves the lexical sense of λαμπρός while still implying conspicuous, impressive attire in context.
- source_word: Σὺ κάθου ὧδε καλῶς
  chosen: You sit here in a good place
  alternatives:
  - You sit here comfortably
  - You sit here well
  - Sit here in a good seat
  lexicon: BDAG
  rationale: κάθου is an imperative, and καλῶς here modifies the seating arrangement as favorable or suitable. 'In a good place' makes explicit the implied contrast with the poor man's treatment while remaining close to the Greek.
- source_word: τῷ πτωχῷ
  chosen: the poor man
  alternatives:
  - the poor person
  - the poor one
  lexicon: BDAG
  rationale: The Greek adjective is masculine singular with the article, referring to a specific poor male visitor in the scene. Per the translation philosophy, gender-accurate rendering is preferred.
- source_word: στῆθι
  chosen: stand
  alternatives:
  - stand there
  - take your stand
  lexicon: BDAG
  rationale: Aorist imperative of ἵστημι here is a simple command to stand. The following adverb/prepositional phrases supply the location contrast.
- source_word: ἢ κάθου ἐκεῖ
  chosen: or sit there
  alternatives:
  - or sit over there
  lexicon: BDAG
  rationale: The textual phrase presents an alternative command to the poor man. 'There' preserves the distancing force of ἐκεῖ.
- source_word: ὑπὸ τὸ ὑποπόδιόν μου
  chosen: under my footstool
  alternatives:
  - by my footstool
  - below my footstool
  lexicon: BDAG
  rationale: The preposition ὑπό with the accusative here naturally means 'under.' Though awkward in English because one does not literally sit under a footstool, the expression intentionally conveys humiliation and social inferiority; retaining 'under' preserves that force.
