theological_decisions:
- issue: Social partiality language
  chosen_reading: Render the commands in a way that preserves the contrast in honor given to the rich and dishonor given to the poor without importing later doctrinal terminology into this verse.
  alternative_readings:
  - Use more interpretive language such as 'show special favor' in the main text
  rationale: James's theological point in context is condemnation of favoritism, but this verse itself narrates the differential treatment. The translation therefore keeps the concrete speech and action language and lets the theology emerge from the context.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gender rendering of πτωχῷ
  chosen_reading: the poor man
  alternative_readings:
  - the poor person
  rationale: The scene depicts two individual visitors, one richly dressed and one poor, both grammatically masculine singular. The project's gender-accurate policy favors retaining the masculine singular here rather than neutralizing it.
  doctrine_reference: Translation philosophy §4
