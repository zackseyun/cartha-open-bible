id: JAS.2.10
reference: James 2:10
source:
  edition: SBLGNT
  text: ὅστις γὰρ ὅλον τὸν νόμον ⸂τηρήσῃ, πταίσῃ⸃ δὲ ἐν ἑνί, γέγονεν πάντων ἔνοχος.
translation:
  text: For whoever keeps the whole law but stumbles in one point has become guilty of all of it[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fails in one thing' or 'breaks one part of it.' The Greek says 'stumbles in one,' using a metaphor for moral failure.
    reason: lexical_alternative
  - marker: b
    text: Or 'liable for all of it.' The phrase means that breaking one part makes a person accountable with respect to the whole law.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅστις
  chosen: whoever
  alternatives:
  - anyone who
  lexicon: BDAG
  rationale: Indefinite relative pronoun introducing a general principle; 'whoever' is natural English and preserves the universal force.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Marks explanation/grounding for the previous statement. 'For' preserves the connective logic in a concise, standard way.
- source_word: ὅλον τὸν νόμον
  chosen: the whole law
  alternatives:
  - the entire law
  lexicon: BDAG
  rationale: ὅλον intensifies the totality of νόμος. 'The whole law' is idiomatic and keeps the comprehensive sense.
- source_word: τηρήσῃ
  chosen: keeps
  alternatives:
  - observes
  - obeys
  lexicon: BDAG
  rationale: τηρέω here means to keep or observe commandments/law. 'Keeps' is the most direct and idiomatic rendering in English legal-moral context.
- source_word: πταίσῃ
  chosen: stumbles
  alternatives:
  - fails
  - offends
  - breaks it
  lexicon: BDAG
  rationale: πταίω literally denotes stumbling and metaphorically moral failure. 'Stumbles' preserves James's vivid metaphor while clearly implying transgression in context.
- source_word: ἐν ἑνί
  chosen: in one point
  alternatives:
  - in one thing
  - at one point
  lexicon: BDAG
  rationale: 'The dative with ἐν indicates respect/sphere: in one matter or point. ''In one point'' is a clear idiomatic way to express a single instance or requirement within the law.'
- source_word: γέγονεν
  chosen: has become
  alternatives:
  - has proved to be
  - is
  lexicon: BDAG
  rationale: Perfect tense of γίνομαι indicates a resulting state from the act of stumbling. 'Has become' preserves the aspect better than a simple present 'is'.
- source_word: πάντων
  chosen: of all of it
  alternatives:
  - of all
  - for all of it
  lexicon: BDAG
  rationale: Genitive plural with ἔνοχος expresses liability with respect to the whole. 'Of all of it' makes explicit in English that the reference is to the whole law already mentioned.
- source_word: ἔνοχος
  chosen: guilty
  alternatives:
  - liable
  - answerable
  lexicon: BDAG
  rationale: ἔνοχος can mean liable or guilty. In this moral-legal context, 'guilty' is the clearest natural English equivalent, while still conveying legal culpability.
