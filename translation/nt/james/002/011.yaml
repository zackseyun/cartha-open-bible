id: JAS.2.11
reference: James 2:11
source:
  edition: SBLGNT
  text: ὁ γὰρ εἰπών Μὴ ⸀μοιχεύσῃς εἶπεν καί Μὴ ⸀φονεύσῃς· εἰ δὲ οὐ ⸂μοιχεύεις φονεύεις⸃
    δέ, γέγονας παραβάτης νόμου.
translation:
  text: For he who said, “Do not commit adultery,” also said, “Do not murder.” Now
    if you do not commit adultery but do murder, you have become a transgressor of
    the law.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ ... εἰπών
  chosen: he who said
  alternatives:
  - the one who said
  lexicon: BDAG
  rationale: Articular participle functioning substantivally; 'he who said' is natural
    English and preserves the personal reference to God as the giver of the commandments.
- source_word: Μὴ μοιχεύσῃς
  chosen: Do not commit adultery
  alternatives:
  - You shall not commit adultery
  lexicon: BDAG
  rationale: Aorist subjunctive with μή in prohibition echoes the commandment wording.
    'Do not commit adultery' is clear modern English; the more traditional 'You shall
    not...' is possible but less natural here in a quotation embedded in James's argument.
- source_word: καί
  chosen: also
  alternatives:
  - and
  lexicon: BDAG
  rationale: In this context καί links a second command from the same speaker; 'also'
    makes the rhetorical point explicit in idiomatic English.
- source_word: Μὴ φονεύσῃς
  chosen: Do not murder
  alternatives:
  - You shall not murder
  - Do not kill
  lexicon: BDAG
  rationale: φονεύω refers to murder rather than killing in general. 'Murder' best
    matches the commandment's ethical force and avoids overbroad misunderstanding.
- source_word: εἰ δὲ
  chosen: Now if
  alternatives:
  - But if
  - If, however
  lexicon: BDAG
  rationale: Marks a transition to a hypothetical application. 'Now if' is smooth
    modern English and preserves the argumentative flow.
- source_word: οὐ μοιχεύεις ... φονεύεις δέ
  chosen: you do not commit adultery but do murder
  alternatives:
  - you are not committing adultery but are murdering
  - you do not commit adultery, yet you murder
  lexicon: BDAG
  rationale: Present indicatives in a conditional example are best rendered as a general
    case. The supplied 'do' before 'murder' clarifies the contrast carried by δέ.
- source_word: γέγονας
  chosen: you have become
  alternatives:
  - you are
  - you have proved to be
  lexicon: BDAG
  rationale: 'Perfect tense of γίνομαι indicates resultant state from the action:
    the person has come to be, and now stands as, a lawbreaker. ''Have become'' preserves
    that nuance better than a simple ''are''.'
- source_word: παραβάτης νόμου
  chosen: a transgressor of the law
  alternatives:
  - a lawbreaker
  - a violator of the law
  lexicon: BDAG
  rationale: παραβάτης is one who violates a command or boundary. 'Transgressor of
    the law' preserves the legal-moral register and the connection to the law as a
    whole in James's argument.
- source_word: νόμου
  chosen: the law
  alternatives:
  - law
  lexicon: BDAG
  rationale: The article is natural in English here because James refers to the recognized
    divine law embodied in the commandments just cited.
