theological_decisions:
- issue: Identity of the speaker of the commandments
  chosen_reading: Rendered impersonally as 'he who said' without expanding to 'God'
    in the main text.
  alternative_readings:
  - For God, who said ...
  rationale: The context clearly implies God as the speaker, but the Greek states
    it as an articular participle ('the one who said'). Keeping the wording avoids
    importing an explicit subject not present in the text while preserving the theological
    point.
  doctrine_reference: Translation philosophy §1, §3
- issue: Scope of lawbreaking in James's argument
  chosen_reading: Retained 'a transgressor of the law' rather than a narrower phrase
    like 'a transgressor of that commandment.'
  alternative_readings:
  - a transgressor of that part of the law
  rationale: James's point in context is that violating one command constitutes transgression
    of the law as a unified whole. The translation preserves that theological-ethical
    force without interpretive expansion beyond the Greek.
  doctrine_reference: Translation philosophy §3
