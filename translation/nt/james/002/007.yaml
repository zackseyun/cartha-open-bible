id: JAS.2.7
reference: James 2:7
source:
  edition: SBLGNT
  text: οὐκ αὐτοὶ βλασφημοῦσιν τὸ καλὸν ὄνομα τὸ ἐπικληθὲν ἐφ’ ὑμᾶς;
translation:
  text: Do not they themselves blaspheme the good name that was called upon you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the honorable name' or 'the noble name.'
    reason: lexical_alternative
  - marker: b
    text: Or 'that was called over you'; the phrase likely refers to the name by which
      believers are identified, possibly echoing covenantal or baptismal language.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐκ αὐτοὶ
  chosen: Do not they themselves
  alternatives:
  - Is it not they themselves
  - Do not they
  lexicon: BDAG
  rationale: The combination of οὐκ with the emphatic αὐτοὶ introduces a rhetorical
    question expecting a positive answer and stressing the very people just mentioned.
    'They themselves' preserves the emphasis; the slightly formal English word order
    better reflects the Greek interrogative force.
- source_word: βλασφημοῦσιν
  chosen: blaspheme
  alternatives:
  - slander
  - speak evil of
  lexicon: BDAG
  rationale: βλασφημέω can denote slanderous or reviling speech against humans or
    God. Here the object is 'the good name,' likely referring to the name associated
    with believers and ultimately with the Lord Jesus, so 'blaspheme' preserves the
    stronger religious and dishonoring sense better than the flatter 'slander.'
- source_word: τὸ καλὸν ὄνομα
  chosen: the good name
  alternatives:
  - the honorable name
  - the noble name
  lexicon: BDAG
  rationale: καλός here carries the sense of honorable, noble, or worthy. 'Good name'
    is a natural English expression that also preserves the idiomatic sense of reputation
    and honor without overinterpreting the referent.
- source_word: τὸ ἐπικληθὲν
  chosen: that was called
  alternatives:
  - that was invoked
  - that was named
  lexicon: BDAG
  rationale: The participle from ἐπικαλέω in this construction refers to a name being
    called over or upon someone. 'Was called' keeps the passive verbal idea and allows
    the following prepositional phrase to carry the idiom. 'Invoked' is possible but
    sounds more interpretive in English.
- source_word: ἐφ’ ὑμᾶς
  chosen: upon you
  alternatives:
  - over you
  - by which you were called
  lexicon: BDAG
  rationale: ἐπί with accusative after ἐπικαλέω yields the idiom 'called upon/over.'
    'Upon you' is the most direct rendering. 'Over you' is also possible and is preserved
    in a footnote because the phrase may evoke the name pronounced over believers,
    possibly in baptismal or covenantal identification contexts.
