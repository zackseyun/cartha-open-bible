theological_decisions:
- issue: Referent of 'the good name'
  chosen_reading: An intentionally broad reference to the honorable name borne by
    believers, most likely the name of Jesus/the Lord associated with them.
  alternative_readings:
  - A direct reference specifically to the name of Christ
  - A broader reference to God's name or the Christian identity borne by the community
  rationale: The Greek does not explicitly name Jesus here, though the immediate context
    of faith in 'our Lord Jesus Messiah' (2:1) strongly informs the phrase. The translation
    therefore preserves the literal wording 'the good name' rather than specifying
    'Christ' in the main text, avoiding interpretive overreach while allowing the
    likely christological referent to remain evident.
  doctrine_reference: Preserve theological tension rather than resolve it.
