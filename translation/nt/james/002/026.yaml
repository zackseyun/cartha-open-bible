theological_decisions:
- issue: Meaning of πνεύματος in the analogy
  chosen_reading: spirit
  alternative_readings:
  - breath
  rationale: The verse compares a body lacking animating life to faith lacking works.
    'Spirit' preserves the Greek term's normal range and avoids reducing the comparison
    to mere respiration, though 'breath' remains a plausible lexical alternative and
    is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of πίστις in James 2:26
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: The doctrine table sets 'faith' as the default rendering for πίστις,
    with alternatives footnoted where contested. Because James 2 is a theologically
    sensitive context, the main text keeps 'faith' while noting the lexical alternatives.
  doctrine_reference: 'Contested terms table: πίστις → faith; alternatives preserved
    in footnotes where contested.'
