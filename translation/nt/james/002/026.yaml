id: JAS.2.26
reference: James 2:26
source:
  edition: SBLGNT
  text: ὥσπερ ⸀γὰρ τὸ σῶμα χωρὶς πνεύματος νεκρόν ἐστιν, οὕτως καὶ ἡ πίστις ⸀χωρὶς
    ἔργων νεκρά ἐστιν.
translation:
  text: For just as the body without the spirit is dead, so also faith without works
    is dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without breath.' The Greek word can mean 'spirit' or 'breath.'
    reason: lexical_alternative
  - marker: b
    text: Or 'faithfulness.' The Greek word can also denote trust or faithfulness;
      here the main text follows the default rendering 'faith.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὥσπερ
  chosen: just as
  alternatives:
  - as
  - just as
  lexicon: BDAG
  rationale: Introduces the first half of a comparison. 'Just as' clearly signals
    the analogy in natural English.
- source_word: γὰρ
  chosen: For
  alternatives:
  - for
  - indeed
  - because
  lexicon: BDAG
  rationale: Retains the explanatory connective linking this verse to the preceding
    argument. 'For' is concise and sufficiently natural here.
- source_word: σῶμα
  chosen: body
  lexicon: BDAG
  rationale: Standard gloss for the physical body; no contextual pressure suggests
    a metaphorical alternative.
- source_word: χωρὶς πνεύματος
  chosen: without the spirit
  alternatives:
  - without spirit
  - without breath
  lexicon: BDAG
  rationale: χωρίς means 'without/apart from.' πνεῦμα can mean 'spirit,' 'breath,'
    or 'wind.' In this analogy, 'spirit' best preserves the lexical form and the anthropological
    sense commonly intended, while remaining readable. 'Breath' is possible and worth
    preserving in a footnote because it can fit the image of a lifeless body.
- source_word: νεκρόν
  chosen: is dead
  alternatives:
  - is lifeless
  lexicon: BDAG
  rationale: Predicate adjective describing the body's condition. 'Dead' is the direct
    and strongest equivalent; 'lifeless' is interpretive and weaker.
- source_word: οὕτως καὶ
  chosen: so also
  alternatives:
  - so
  - in the same way also
  - thus also
  lexicon: BDAG
  rationale: Marks the corresponding second half of the comparison. 'So also' is idiomatic
    and preserves the emphatic parallel.
- source_word: πίστις
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine default, πίστις is rendered 'faith' in the main text. In
    James 2 the term has generated discussion about whether 'faithfulness' is in view,
    so the alternative is preserved in a footnote rather than resolved by paraphrase.
- source_word: χωρὶς ἔργων
  chosen: without works
  alternatives:
  - apart from works
  - without deeds
  lexicon: BDAG
  rationale: A straightforward rendering of the prepositional phrase. 'Works' preserves
    the lexical connection to James's argument and broader biblical usage better than
    the more generic 'deeds.'
- source_word: νεκρά
  chosen: is dead
  alternatives:
  - is lifeless
  lexicon: BDAG
  rationale: Matches the repeated adjective in the analogy and preserves James's rhetorical
    force through consistency.
