id: JAS.2.15
reference: James 2:15
source:
  edition: SBLGNT
  text: ⸀ἐὰν ἀδελφὸς ἢ ἀδελφὴ γυμνοὶ ὑπάρχωσιν καὶ ⸀λειπόμενοι τῆς ἐφημέρου τροφῆς,
translation:
  text: If a brother or sister is poorly clothed and lacking daily food,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'naked'; the Greek term can mean literally unclothed, but here likely
      refers to being inadequately clothed.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν
  chosen: If
  alternatives:
  - If ever
  - Suppose that
  lexicon: BDAG
  rationale: Introduces a conditional clause. Simple 'If' best fits natural English
    while preserving the hypothetical force.
- source_word: ἀδελφὸς ἢ ἀδελφή
  chosen: a brother or sister
  alternatives:
  - a brother or a sister
  lexicon: BDAG
  rationale: Renders the explicit masculine/feminine pair directly and naturally.
    This preserves the gender-accurate wording of the Greek rather than collapsing
    to a generic term.
- source_word: γυμνοὶ
  chosen: poorly clothed
  alternatives:
  - naked
  - without clothing
  - in rags
  lexicon: BDAG
  rationale: In this context the term likely denotes inadequate clothing rather than
    absolute nakedness, especially paired with lack of food as a picture of destitution.
    'Poorly clothed' communicates the idiomatic sense in readable modern English.
- source_word: ὑπάρχωσιν
  chosen: is
  alternatives:
  - exists
  - happens to be
  - should be
  lexicon: BDAG
  rationale: The verb functions here as a copular/existential verb with the predicate
    adjective/participle. English idiom is best served by the simple 'is' with a singular
    distributive subject.
- source_word: λειπόμενοι
  chosen: lacking
  alternatives:
  - being without
  - falling short of
  - in need of
  lexicon: BDAG
  rationale: The participle describes ongoing deficiency. 'Lacking' is concise, natural,
    and preserves the sense of being in want.
- source_word: τῆς ἐφημέρου τροφῆς
  chosen: daily food
  alternatives:
  - food for the day
  - the day's food
  - necessary food for the day
  lexicon: BDAG
  rationale: τροφῆς means nourishment/food, and ἐφημέρου means for the day or daily.
    'Daily food' is idiomatic English and accurately conveys basic day-to-day sustenance.
