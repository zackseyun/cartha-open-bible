theological_decisions:
- issue: Scope of ἀδελφὸς ἢ ἀδελφή within the Christian community
  chosen_reading: Retain 'brother or sister' as the familial language James uses,
    likely referring to fellow believers in context.
  alternative_readings:
  - a fellow human being in need more generally
  rationale: The immediate context in James uses sibling language naturally for members
    of the believing community, and the translation preserves that wording without
    over-interpreting beyond the text.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
