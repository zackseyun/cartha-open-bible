theological_decisions:
- issue: Relation of faith and works in the rhetorical question
  chosen_reading: 'Render the verse without importing a doctrinal resolution beyond
    James''s wording: a merely professed faith without works is in view.'
  alternative_readings:
  - Render more interpretively as 'Can such faith save him?'
  - Render more generally as 'Can faith save him?'
  rationale: The article in ἡ πίστις points back to the kind of faith just described.
    'That faith' preserves the theological tension and avoids making James deny saving
    faith simpliciter. It also avoids harmonizing or polemicizing beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Gender representation in address and pronouns
  chosen_reading: Keep 'my brothers' and singular 'him' in the main text, with inclusivity
    noted in a footnote.
  alternative_readings:
  - my brothers and sisters
  - them
  rationale: 'This follows the project''s gender-accurate policy: retain the masculine
    representative form where that matches the source, while acknowledging the broader
    audience in a note.'
  doctrine_reference: Gender-accurate over gender-neutral.
