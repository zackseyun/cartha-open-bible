id: JAS.2.14
reference: James 2:14
source:
  edition: SBLGNT
  text: ⸀Τί ὄφελος, ἀδελφοί μου, ἐὰν πίστιν λέγῃ τις ἔχειν ἔργα δὲ μὴ ἔχῃ; μὴ δύναται
    ἡ πίστις σῶσαι αὐτόν;
translation:
  text: What good is it, my brothers, if someone says he has faith but does not have
    works? Can that faith save him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my brothers and sisters.' The Greek uses the masculine plural 'brothers'
      as a representative form of address to the believing community.
    reason: lexical_alternative
  - marker: b
    text: Or 'Can such faith save him?' The Greek literally says 'Can the faith save
      him?' referring back to the kind of faith just mentioned—faith that is claimed
      but lacks works.
    reason: alternative_reading
  - marker: c
    text: πίστις can also be rendered 'trust' or, in some contexts, 'faithfulness';
      here 'faith' best fits the sense of a claimed belief or profession.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί ὄφελος
  chosen: What good is it
  alternatives:
  - What profit is it
  - What benefit is it
  lexicon: BDAG
  rationale: Idiomatic rendering of the rhetorical question in natural English while
    preserving the sense of practical benefit or advantage.
- source_word: ἀδελφοί μου
  chosen: my brothers
  alternatives:
  - my brothers and sisters
  - my brethren
  lexicon: BDAG
  rationale: Rendered gender-accurately per project philosophy. The Greek is masculine
    plural and in James often addresses the mixed Christian community representatively.
    The main text keeps the source-form 'brothers'; inclusivity can be noted in a
    footnote.
- source_word: πίστιν
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine table, πίστις defaults to 'faith'. Here the sense is the
    claimed possession of faith. 'Faithfulness' is less likely in this construction
    ('says he has faith'), but preserved as a lexical alternative because πίστις is
    a contested term.
- source_word: λέγῃ τις ἔχειν
  chosen: someone says he has
  alternatives:
  - someone claims to have
  - anyone says he has
  lexicon: BDAG
  rationale: The combination expresses a professed claim. 'Says he has' is closer
    to the Greek than the more interpretive 'claims to have,' while remaining natural
    English.
- source_word: ἔργα
  chosen: works
  alternatives:
  - deeds
  - actions
  lexicon: BDAG
  rationale: '''Works'' preserves the lexical link with the surrounding argument in
    James 2 and avoids flattening the theological contrast between faith and works.'
- source_word: μὴ ἔχῃ
  chosen: does not have
  alternatives:
  - has no
  - lacks
  lexicon: BDAG
  rationale: Straightforward negated possession matching the Greek syntax.
- source_word: μὴ δύναται
  chosen: Can ... ?
  alternatives:
  - Surely ... cannot
  - Is ... able to
  lexicon: BDAG
  rationale: The μή introduces a rhetorical question expecting a negative answer.
    English commonly conveys this with 'Can ... ?' in context; the negative expectation
    is preserved by context without overtranslating.
- source_word: ἡ πίστις
  chosen: that faith
  alternatives:
  - the faith
  - such faith
  lexicon: BDAG
  rationale: Although the Greek has the article ('the faith'), English idiom in this
    context often uses 'that faith' to mark the specific kind of faith just mentioned,
    namely mere professed faith without works. This best captures the anaphoric force
    and rhetorical contrast.
- source_word: σῶσαι αὐτόν
  chosen: save him
  alternatives:
  - deliver him
  - rescue him
  lexicon: BDAG
  rationale: '''Save'' is the standard rendering of σῴζω and preserves the theological
    weight of the question in James. ''Deliver'' or ''rescue'' are possible but less
    idiomatic here.'
