theological_decisions:
- issue: Rendering of disability-related terms in a modern, readable, but source-faithful way
  chosen_reading: Use class terms ('the poor, the disabled, the lame, the blind') that preserve the Greek list structure and social categories in view.
  alternative_readings:
  - Use person-first renderings such as 'poor people, people with disabilities, people who are lame, blind people'
  - Use more traditional wording such as 'the poor, the maimed, the lame, the blind'
  rationale: The verse is not making a theological claim about identity but issuing a command about extending hospitality to socially marginalized groups. The chosen wording preserves the terse list structure of the Greek and remains readable modern English. 'The disabled' is selected for accessibility, while 'the lame' is retained because it corresponds specifically to χωλούς and should not be collapsed into the broader ἀναπείρους.
  doctrine_reference: Translation philosophy points 5 and 6
