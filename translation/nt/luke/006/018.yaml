theological_decisions:
- issue: Rendering of πνευμάτων ἀκαθάρτων in a demonic-affliction context
  chosen_reading: unclean spirits
  alternative_readings:
  - impure spirits
  rationale: The Gospel phrase commonly refers to personal evil spirits/demons. 'Unclean spirits' preserves the established biblical idiom and its theological resonance without paraphrasing to 'demons,' which would be interpretive rather than strictly lexical here.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Aspect of ἐθεραπεύοντο
  chosen_reading: were being healed
  alternative_readings:
  - were healed
  rationale: The imperfect verb form suggests ongoing action within the scene. Preserving that aspect avoids flattening the narrative into a simple summary statement.
  doctrine_reference: Translation philosophy §§1, 5
