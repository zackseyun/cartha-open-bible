  chosen_reading: Retain masculine singular reference with "his teacher" while rendering πᾶς as "everyone."
  alternative_readings:
  - their teacher
  - the teacher
  rationale: The Greek uses grammatically masculine singular forms in a generic saying. The project prefers gender-accurate rendering over flattening the source into fully gender-neutral language. "Everyone ... his teacher" preserves both the generic scope and the singular correspondence of the proverb in understandable English.
