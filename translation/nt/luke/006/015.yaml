id: LUK.6.15
reference: Luke 6:15
source:
  edition: SBLGNT
  text: ⸀καὶ Μαθθαῖον καὶ Θωμᾶν ⸁καὶ ⸀Ἰάκωβον Ἁλφαίου καὶ Σίμωνα τὸν καλούμενον Ζηλωτὴν
translation:
  text: and Matthew and Thomas[a], and James son of Alphaeus, and Simon who was called the Zealot
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Simon who was called the zealous one.' The Greek title may function as an epithet and does not by itself require a decision about formal membership in a later political movement.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Standard coordinating conjunction linking names in a list. Repeated as in the Greek to preserve the catalog style of the apostolic roster.
- source_word: Μαθθαῖον
  chosen: Matthew
  alternatives:
  - Matthaeus
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Μαθθαῖος. Personal names are transliterated rather than translated per project philosophy.
- source_word: Θωμᾶν
  chosen: Thomas
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Θωμᾶς.
- source_word: Ἰάκωβον Ἁλφαίου
  chosen: James the son of Alphaeus
  alternatives:
  - James of Alphaeus
  - James, son of Alphaeus
  lexicon: BDAG
  rationale: The genitive Ἁλφαίου most naturally expresses filial relationship in this naming formula, distinguishing this James from others. 'The son of' makes the relationship explicit in natural English.
- source_word: Σίμωνα
  chosen: Simon
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Σίμων.
- source_word: τὸν καλούμενον
  chosen: who was called
  alternatives:
  - the one called
  - called
  lexicon: BDAG
  rationale: 'The article plus present passive participle functions attributively: ''the one being called.'' In idiomatic English within a name list, ''who was called'' clearly conveys the identifying epithet without awkwardness.'
- source_word: Ζηλωτὴν
  chosen: the Zealot
  alternatives:
  - the Zealous One
  - the Cananaean
  lexicon: BDAG
  rationale: Ζηλωτής here is an identifying epithet for Simon. 'The Zealot' is the standard and clearest rendering, whether referring broadly to zeal or more specifically to association with a zealous movement. 'Cananaean' belongs to the parallel tradition in Matthew/Mark, not this Greek wording in Luke.
