id: LUK.9.40
reference: Luke 9:40
source:
  edition: SBLGNT
  text: καὶ ἐδεήθην τῶν μαθητῶν σου ἵνα ἐκβάλωσιν αὐτό, καὶ οὐκ ἠδυνήθησαν.
translation:
  text: And I begged your disciples to cast it out[a], but they were not able.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'him,' if the pronoun is taken to refer to the boy rather than the spirit.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐδεήθην
  chosen: I begged
  alternatives:
  - I implored
  - I asked
  lexicon: BDAG
  rationale: δέομαι here conveys earnest request rather than a casual ask. 'Begged' preserves the father's urgency better than the weaker 'asked,' while remaining natural English.
- source_word: μαθητῶν σου
  chosen: your disciples
  alternatives:
  - your followers
  lexicon: BDAG
  rationale: μαθητής is regularly rendered 'disciple' in Gospel contexts, preserving the teacher-disciple relationship and established NT usage.
- source_word: ἵνα ἐκβάλωσιν
  chosen: to cast it out
  alternatives:
  - that they might cast it out
  - to drive it out
  lexicon: BDAG
  rationale: 'ἵνα with the subjunctive expresses purpose: the father begged the disciples for the purpose of expelling the demon. ''Cast out'' is the standard exorcism idiom in the Gospels and fits ἐκβάλλω well here.'
- source_word: αὐτό
  chosen: it
  alternatives:
  - him
  lexicon: BDAG
  rationale: The neuter pronoun most naturally refers to the unclean spirit/demon rather than the boy. English 'it' preserves that reference without over-specifying beyond the immediate context.
- source_word: οὐκ ἠδυνήθησαν
  chosen: they were not able
  alternatives:
  - they could not
  lexicon: BDAG
  rationale: δύναμαι denotes ability or capability. 'They were not able' is slightly more formal and transparent to the Greek, while still readable; 'could not' is possible but less explicit.
