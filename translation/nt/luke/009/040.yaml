theological_decisions:
- issue: Referent of αὐτό in the exorcism context
  chosen_reading: The pronoun refers to the demon/spirit, rendered 'it.'
  alternative_readings:
  - The pronoun refers to the afflicted boy, yielding 'him'.
  rationale: In exorcism contexts ἐκβάλλω commonly takes the demon/spirit as the object. The neuter pronoun also aligns naturally with πνεῦμα in the surrounding context. Rendering 'it' avoids implying that the disciples were trying to expel the boy himself, while preserving the likely referent from the Greek context.
  doctrine_reference: Preserve theological tension rather than resolve it; where ambiguity remains, document the choice and preserve the alternative.
