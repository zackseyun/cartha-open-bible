id: LUK.9.28
reference: Luke 9:28
source:
  edition: SBLGNT
  text: Ἐγένετο δὲ μετὰ τοὺς λόγους τούτους ὡσεὶ ἡμέραι ὀκτὼ ⸀καὶ παραλαβὼν Πέτρον καὶ Ἰωάννην καὶ Ἰάκωβον ἀνέβη εἰς τὸ ὄρος προσεύξασθαι.
translation:
  text: Now about eight days after these sayings[b][a], he took Peter and John and James and went up on the mountain to pray.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after these words.' The Greek λόγους can be rendered 'words' or 'sayings' here.
    reason: lexical_alternative
  - marker: b
    text: Greek 'about eight days,' with ὡσεὶ marking an approximate time.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  chosen: Now
  alternatives:
  - And it happened
  - Now it happened
  lexicon: BDAG
  rationale: The idiom ἐγένετο δὲ often functions as a narrative transition rather than contributing full lexical weight in English. 'Now' preserves the discourse shift in readable modern English without the wooden 'and it happened.'
- source_word: μετὰ τοὺς λόγους τούτους
  chosen: after these sayings
  alternatives:
  - after these words
  - after these things were said
  lexicon: BDAG
  rationale: λόγοι here refers to the immediately preceding spoken material, so 'sayings' is slightly more natural and specific than 'words' while remaining close to the Greek.
- source_word: ὡσεὶ ἡμέραι ὀκτὼ
  chosen: about eight days
  alternatives:
  - some eight days
  - approximately eight days
  lexicon: BDAG
  rationale: ὡσεὶ marks approximation, so the English should not flatten this to a precise 'eight days.' 'About eight days' is natural and preserves Luke's wording, which differs from parallel accounts mentioning 'after six days.'
- source_word: παραλαβὼν
  chosen: he took
  alternatives:
  - taking with him
  - having taken along
  lexicon: BDAG
  rationale: The participle is attendant to the main verb and can be rendered smoothly in English as a finite verb. 'He took' communicates accompaniment without awkwardness.
- source_word: Πέτρον καὶ Ἰωάννην καὶ Ἰάκωβον
  chosen: Peter and John and James
  alternatives:
  - Peter, John, and James
  rationale: Names are transliterated per project policy. The repeated καί can be represented either with repeated 'and' or standard English list punctuation; the latter is stylistically smoother, but the chosen wording keeps the Greek rhythm acceptably in English.
- source_word: ἀνέβη εἰς τὸ ὄρος
  chosen: went up on the mountain
  alternatives:
  - went up into the mountain
  - went up the mountain
  lexicon: BDAG
  rationale: ἀνέβη conveys ascent, and εἰς τὸ ὄρος points to movement onto/up the mountain. 'Went up on the mountain' is idiomatic and preserves the upward motion better than simply 'went to the mountain.' The article is retained as 'the mountain,' though it need not imply a previously identified mountain.
- source_word: προσεύξασθαι
  chosen: to pray
  alternatives:
  - for prayer
  lexicon: BDAG
  rationale: 'The aorist middle infinitive expresses purpose: he went up in order to pray. ''To pray'' is the direct and natural English equivalent.'
