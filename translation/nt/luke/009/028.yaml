- issue: Chronological approximation in relation to parallel accounts
  chosen_reading: about eight days
  alternative_readings:
  - eight days
  - some eight days
  rationale: Luke's ὡσεὶ explicitly signals approximation. The translation preserves this rather than harmonizing with other Gospel accounts or making the number sound exact.
  doctrine_reference: Preserve theological tension rather than resolve it.
