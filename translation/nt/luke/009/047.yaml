  chosen_reading: The verse states that Jesus knew their inward reasoning without specifying the mechanism.
  alternative_readings:
  - supernatural omniscience
  - keen human perception
  rationale: To preserve theological tension, the translation reflects the text's affirmation of Jesus' knowledge without importing an explanation beyond what Luke states.
  doctrine_reference: Preserve theological tension rather than resolve it.
