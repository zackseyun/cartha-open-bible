id: LUK.1.75
reference: Luke 1:75
source:
  edition: SBLGNT
  text: ἐν ὁσιότητι καὶ δικαιοσύνῃ ἐνώπιον αὐτοῦ ⸂πάσαις ταῖς ἡμέραις⸃ ἡμῶν.
translation:
  text: in holiness and righteousness before him all our days[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν
  chosen: in
  alternatives:
  - with
  lexicon: BDAG
  rationale: The preposition introduces the sphere or manner in which service is rendered. 'In' preserves the Greek structure naturally in English.
- source_word: ὁσιότητι
  chosen: holiness
  alternatives:
  - piety
  - devoutness
  lexicon: BDAG
  rationale: ὁσιότης emphasizes holiness/devoutness in relation to God, distinct from δικαιοσύνη. 'Holiness' is the most natural and theologically weighty English rendering here.
- source_word: καὶ
  chosen: and
  rationale: Simple coordinating conjunction joining the two datives.
- source_word: δικαιοσύνῃ
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per DOCTRINE.md, δικαιοσύνη defaults to 'righteousness,' with 'justice' preserved as an alternative where relevant. In this non-Pauline ethical context, 'righteousness' best conveys uprightness before God while fitting the paired expression with 'holiness'.
- source_word: ἐνώπιον αὐτοῦ
  chosen: before him
  alternatives:
  - in his presence
  lexicon: BDAG
  rationale: A standard idiomatic rendering meaning in God's sight/presence. 'Before him' is concise and preserves the relational and evaluative sense.
- source_word: πάσαις ταῖς ἡμέραις ἡμῶν
  chosen: all our days
  alternatives:
  - all the days of our life
  - throughout all our days
  lexicon: BDAG
  rationale: The phrase is idiomatic for the duration of life. 'All our days' is faithful, natural, and avoids importing the singular 'life' not present in the Greek, though that sense is implicit.
