id: LUK.1.62
reference: Luke 1:62
source:
  edition: SBLGNT
  text: ἐνένευον δὲ τῷ πατρὶ αὐτοῦ τὸ τί ἂν θέλοι καλεῖσθαι ⸀αὐτό.
translation:
  text: So they motioned to his father to find out what he wanted him to be called.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'they made signs to his father what he might want him to be called.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνένευον
  chosen: motioned
  alternatives:
  - made signs
  - signaled
  - gestured
  lexicon: BDAG
  rationale: The verb denotes communicating by signs or gestures. 'Motioned' is concise, natural English and fits the context of people addressing Zechariah nonverbally.
- source_word: δὲ
  chosen: So
  alternatives:
  - and
  - then
  - but
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'So' captures the flow from the previous verse in readable English.
- source_word: τῷ πατρὶ αὐτοῦ
  chosen: to his father
  alternatives:
  - at his father
  lexicon: BDAG
  rationale: The dative with ἐννεύω indicates the person to whom the gestures were directed. 'To his father' is the natural English rendering.
- source_word: τὸ τί ἂν θέλοι
  chosen: to find out what he wanted
  alternatives:
  - what he might want
  - what he would wish
  lexicon: BDAG
  rationale: 'The article with the indirect question introduces the content of the signaling: what Zechariah wished. The optative with ἄν conveys potentiality or polite indefiniteness; in idiomatic English, ''what he wanted'' communicates the sense without awkwardness.'
- source_word: καλεῖσθαι αὐτό
  chosen: him to be called
  alternatives:
  - it to be called
  - to call him
  lexicon: BDAG
  rationale: The infinitive is passive, literally 'to be called,' and αὐτό refers to the child. English idiom prefers 'him' for the infant rather than the more literal but impersonal 'it,' while preserving the passive sense.
