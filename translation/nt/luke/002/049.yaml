id: LUK.2.49
reference: Luke 2:49
source:
  edition: SBLGNT
  text: καὶ εἶπεν πρὸς αὐτούς· Τί ὅτι ἐζητεῖτέ με; οὐκ ᾔδειτε ὅτι ἐν τοῖς τοῦ πατρός
    μου δεῖ εἶναί με;
translation:
  text: And he said to them, “Why were you looking for me? Did you not know that I
    must be in my Father’s house?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that I must be about my Father’s affairs' / 'in the things of my Father.'
      The Greek expression is elliptical and can refer either to the Father’s house
      or to the Father’s concerns.
    reason: alternative_reading
lexical_decisions:
- source_word: Τί ὅτι
  chosen: Why
  alternatives:
  - Why is it that
  - What is it that
  lexicon: BDAG
  rationale: The idiom Τί ὅτι introduces a question of reason or cause. Simple 'Why'
    gives natural English while preserving the interrogative force without unnecessary
    literal awkwardness.
- source_word: ἐζητεῖτέ
  chosen: were you looking for
  alternatives:
  - were you seeking
  - did you search for
  lexicon: BDAG
  rationale: ζητέω can mean 'seek' or 'look for.' In this narrative context of anxious
    searching by his parents, 'looking for' is the most natural modern English equivalent.
- source_word: οὐκ ᾔδειτε
  chosen: Did you not know
  alternatives:
  - Did you not understand
  - Did you not realize
  lexicon: BDAG
  rationale: οἶδα commonly conveys knowledge or awareness. 'Did you not know' is the
    most direct rendering and preserves the rhetorical question.
- source_word: ἐν τοῖς τοῦ πατρός μου
  chosen: in my Father’s house
  alternatives:
  - in the things of my Father
  - among my Father's affairs
  - in my Father's [place]
  lexicon: BDAG
  rationale: 'The expression is elliptical: literally, ''in the [things] of my Father.''
    In context, Jesus has been found in the temple, so ''in my Father’s house'' best
    captures the likely sense in readable English. Because the Greek can also mean
    ''about my Father''s business/affairs,'' that alternative is preserved in a footnote.'
- source_word: δεῖ
  chosen: I must
  alternatives:
  - it is necessary for me to
  - I have to
  lexicon: BDAG
  rationale: δεῖ expresses divine or compelling necessity. 'I must' is concise and
    preserves the weight of necessity better than the more colloquial 'I have to.'
- source_word: εἶναί με
  chosen: be
  alternatives:
  - be present
  - be occupied
  lexicon: BDAG
  rationale: The infinitive with accusative subject after δεῖ is naturally rendered
    'I must be.' The broader nuance is supplied by the elliptical phrase that follows,
    not by expanding εἶναι itself.
- source_word: πατρός μου
  chosen: my Father’s
  alternatives:
  - my father's
  lexicon: BDAG
  rationale: Capitalizing 'Father' reflects that Jesus is referring uniquely to God
    as his Father in this context, a christologically significant filial claim consistent
    with the narrative.
