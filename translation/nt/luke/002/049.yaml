theological_decisions:
- issue: Elliptical phrase ἐν τοῖς τοῦ πατρός μου
  chosen_reading: Rendered as 'in my Father’s house' in the main text
  alternative_readings:
  - in the things of my Father
  - about my Father’s business
  - among my Father’s affairs
  rationale: The Greek phrase is famously ambiguous. Given the immediate context of
    the temple, 'in my Father’s house' is the most contextually grounded English rendering.
    To preserve the genuine ambiguity rather than over-resolve it, the broader 'my
    Father’s affairs/business' sense is retained in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Reference of 'my Father'
  chosen_reading: Understood as God the Father
  rationale: Within Luke's infancy narrative and temple setting, Jesus' words identify
    God, not Joseph, as 'my Father.' The translation preserves this filial claim without
    adding doctrinal explanation beyond the text.
  doctrine_reference: 'Affirmations: Nicene Creed; Definition of Chalcedon'
