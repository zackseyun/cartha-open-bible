id: LUK.2.7
reference: Luke 2:7
source:
  edition: SBLGNT
  text: καὶ ἔτεκεν τὸν υἱὸν αὐτῆς τὸν πρωτότοκον, καὶ ἐσπαργάνωσεν αὐτὸν καὶ ἀνέκλινεν αὐτὸν ⸀ἐν φάτνῃ, διότι οὐκ ἦν αὐτοῖς τόπος ἐν τῷ καταλύματι.
translation:
  text: And she gave birth to her firstborn son[a], and wrapped him in cloths and laid him in a feeding trough[c][b], because there was no place for them in the guest room.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wrapped him in swaddling cloths.'
    reason: lexical_alternative
  - marker: b
    text: Or 'manger.' The Greek term refers to a feeding place or feeding trough for animals.
    reason: lexical_alternative
  - marker: c
    text: Traditionally 'inn.' The Greek κατάλυμα can mean a guest room or lodging place; Luke uses a different word for a commercial inn in Luke 10:34.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔτεκεν
  chosen: gave birth to
  alternatives:
  - bore
  lexicon: BDAG
  rationale: Idiomatic modern English for τίκτω in a childbirth context; preserves the concrete sense without archaic diction.
- source_word: πρωτότοκον
  chosen: firstborn
  alternatives:
  - first-born
  lexicon: BDAG
  rationale: Standard rendering of πρωτότοκος. It denotes birth order here. The translation does not import later theological implications beyond the immediate narrative.
- source_word: ἐσπαργάνωσεν
  chosen: wrapped him in cloths
  alternatives:
  - wrapped him in swaddling cloths
  - swaddled him
  lexicon: BDAG
  rationale: The verb refers to wrapping an infant with strips of cloth. 'Wrapped him in cloths' is clear modern English; the more traditional 'swaddling cloths' is preserved in a footnote as a lexical alternative.
- source_word: ἀνέκλινεν
  chosen: laid him
  alternatives:
  - placed him
  - reclined him
  lexicon: BDAG
  rationale: In this context the verb means to lay or place someone down. 'Reclined' would be too wooden and unnatural in English for an infant.
- source_word: φάτνῃ
  chosen: feeding trough
  alternatives:
  - manger
  lexicon: BDAG
  rationale: The noun denotes a place or structure for animal feed. 'Feeding trough' communicates the plain sense to modern readers better than the traditional but less transparent 'manger'; the traditional rendering is preserved in a footnote.
- source_word: τόπος
  chosen: place
  alternatives:
  - room
  - space
  lexicon: BDAG
  rationale: τόπος broadly means place or space. Here 'place for them' naturally expresses the lack of available accommodation.
- source_word: καταλύματι
  chosen: guest room
  alternatives:
  - inn
  - lodging place
  lexicon: BDAG
  rationale: κατάλυμα commonly refers to a lodging place or guest room, and in Luke 22:11 clearly means 'guest room.' Given Luke's lexical usage and the desire for original-language primacy over translation tradition, 'guest room' is preferred over the traditional 'inn.' The alternative is preserved in a footnote because of its familiarity and interpretive significance.
