theological_decisions:
- issue: Whether καταλύματι should be rendered by the traditional 'inn' or by a term reflecting a guest space in a home
  chosen_reading: guest room
  alternative_readings:
  - inn
  - lodging place
  rationale: The Greek does not require a commercial inn and Luke elsewhere uses πανδοχεῖον for an inn (Luke 10:34) while using κατάλυμα for a guest room (Luke 22:11). Rendering it 'guest room' avoids importing a traditional nativity setting not demanded by the text.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
