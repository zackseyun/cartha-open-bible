theological_decisions:
- issue: Rendering of the conception clause in relation to Christology
  chosen_reading: before he was conceived in the womb
  alternative_readings:
  - before his conception in the womb
  rationale: The verse speaks of Jesus' human conception and naming without inviting
    speculative doctrinal expansion. The translation states the historical event plainly
    and avoids importing later theological terminology beyond what the Greek says,
    while remaining fully compatible with orthodox Christology.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
