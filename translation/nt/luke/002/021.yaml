id: LUK.2.21
reference: Luke 2:21
source:
  edition: SBLGNT
  text: Καὶ ὅτε ἐπλήσθησαν ἡμέραι ὀκτὼ τοῦ περιτεμεῖν αὐτόν, καὶ ἐκλήθη τὸ ὄνομα αὐτοῦ
    Ἰησοῦς, τὸ κληθὲν ὑπὸ τοῦ ἀγγέλου πρὸ τοῦ συλλημφθῆναι αὐτὸν ἐν τῇ κοιλίᾳ.
translation:
  text: And when eight days were fulfilled for circumcising him, his name was called
    Jesus, the name given by the angel before he was conceived in the womb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when the eight days were completed.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'he was named Jesus.'
    reason: lexical_alternative
  - marker: c
    text: That is, before his conception in Mary's womb.
    reason: cross_reference
lexical_decisions:
- source_word: ἐπλήσθησαν ἡμέραι ὀκτὼ
  chosen: when eight days were fulfilled
  alternatives:
  - when eight days had passed
  - when the eight days were completed
  lexicon: BDAG
  rationale: Retains the idiomatic passive/completive sense of the Greek while remaining
    natural English. 'Were fulfilled' preserves the formal flavor of Luke's wording
    better than the more colloquial 'had passed.'
- source_word: τοῦ περιτεμεῖν αὐτόν
  chosen: for circumcising him
  alternatives:
  - to circumcise him
  - for his circumcision
  lexicon: BDAG
  rationale: The articular infinitive with τοῦ expresses purpose/reference. 'For circumcising
    him' closely reflects the Greek structure without becoming awkward. 'For his circumcision'
    is smoother but slightly less transparent to the verbal form.
- source_word: ἐκλήθη τὸ ὄνομα αὐτοῦ Ἰησοῦς
  chosen: his name was called Jesus
  alternatives:
  - he was named Jesus
  - his name was Jesus
  lexicon: BDAG
  rationale: Preserves the passive verbal expression in the Greek. 'He was named Jesus'
    is idiomatic English and could be acceptable, but 'his name was called Jesus'
    keeps the explicit noun ὄνομα and echoes the source more closely.
- source_word: Ἰησοῦς
  chosen: Jesus
  alternatives:
  - Joshua
  lexicon: BDAG
  rationale: As a personal name in the New Testament, standard English transliteration
    is appropriate per translation philosophy. Although etymologically related to
    'Joshua,' transliteration rather than translation is required for names.
- source_word: τὸ κληθὲν
  chosen: the name given
  alternatives:
  - which had been called
  - the one called
  lexicon: BDAG
  rationale: The neuter participle refers back to 'name' and is best made explicit
    in English as 'the name given.' This avoids awkward repetition while preserving
    the passive sense.
- source_word: ὑπὸ τοῦ ἀγγέλου
  chosen: by the angel
  alternatives:
  - by an angel
  lexicon: BDAG
  rationale: The Greek has the definite article, and in Luke's narrative this points
    back to the previously mentioned angelic announcement. 'The angel' best reflects
    both grammar and discourse continuity.
- source_word: πρὸ τοῦ συλλημφθῆναι αὐτὸν
  chosen: before he was conceived
  alternatives:
  - before his conception
  - before he was begotten
  lexicon: BDAG
  rationale: The aorist passive infinitive of συλλαμβάνω in this context refers to
    conception. 'Before he was conceived' is clear, accurate, and natural. 'Begotten'
    would import theological language not demanded by this verb here.
- source_word: ἐν τῇ κοιλίᾳ
  chosen: in the womb
  alternatives:
  - in the belly
  lexicon: BDAG
  rationale: In this context κοιλία idiomatically refers to the womb, not merely the
    abdomen. 'In the womb' is the natural and precise English rendering.
