id: LUK.2.41
reference: Luke 2:41
source:
  edition: SBLGNT
  text: Καὶ ἐπορεύοντο οἱ γονεῖς αὐτοῦ κατ’ ἔτος εἰς Ἰερουσαλὴμ τῇ ἑορτῇ τοῦ πάσχα.
translation:
  text: And his parents went to Jerusalem year by year for the Feast of the Passover.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπορεύοντο
  chosen: went
  alternatives:
  - were going
  - traveled
  lexicon: BDAG
  rationale: Imperfect middle indicative of πορεύομαι here describes customary repeated
    action in past time. English simple past with the adverbial phrase 'year by year'
    naturally conveys habitual action without awkwardness; 'were going' is less idiomatic
    here, and 'traveled' is possible but less direct.
- source_word: γονεῖς
  chosen: parents
  alternatives:
  - father and mother
  lexicon: BDAG
  rationale: The plural noun straightforwardly means 'parents.' This is the most natural
    and accurate English equivalent in context.
- source_word: κατ’ ἔτος
  chosen: year by year
  alternatives:
  - every year
  - annually
  lexicon: BDAG
  rationale: The idiom means 'year by year' or 'every year.' 'Year by year' preserves
    the distributive force of κατά + accusative while remaining natural English.
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name, in keeping with the
    policy to transliterate names.
- source_word: τῇ ἑορτῇ
  chosen: for the Feast
  alternatives:
  - at the feast
  - to the feast
  lexicon: BDAG
  rationale: The dative with the travel context indicates the occasion/purpose of
    the journey. 'For the Feast' communicates that they went on account of the festival
    observance, which is clearer in English than a more wooden 'at the feast.'
- source_word: τοῦ πάσχα
  chosen: of the Passover
  alternatives:
  - of Passover
  lexicon: BDAG
  rationale: πάσχα refers to the Jewish Passover. 'The Passover' is standard and clear
    English for the named festival; retaining the article reflects the specificity
    of the feast.
