theological_decisions:
- issue: Reference to Jesus' family members
  chosen_reading: his parents
  alternative_readings:
  - his father and mother
  rationale: The Greek says 'his parents' without making a theological claim contrary
    to the virgin conception affirmed elsewhere in Luke. Translating the ordinary
    familial term as written preserves the narrative's plain sense without importing
    or denying doctrinal implications.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
