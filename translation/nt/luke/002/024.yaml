- issue: Rendering of κύριος in a scriptural-law formula
  chosen_reading: Lord
  alternative_readings:
  - LORD
  - Master
  rationale: The phrase ἐν τῷ νόμῳ κυρίου refers to the divine law. Per DOCTRINE.md, κύριος defaults to 'Lord.' 'LORD' could emphasize the underlying divine name in some OT contexts, but here the Greek text itself has κύριος and the standard NT rendering is retained.
