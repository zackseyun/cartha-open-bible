id: LUK.2.24
reference: Luke 2:24
source:
  edition: SBLGNT
  text: καὶ τοῦ δοῦναι θυσίαν κατὰ τὸ εἰρημένον ἐν ⸀τῷ νόμῳ κυρίου, ζεῦγος τρυγόνων ἢ δύο νοσσοὺς περιστερῶν.
translation:
  text: 'and to offer a sacrifice according to what had been said in the Law of the Lord: a pair of turtledoves or two young pigeons[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'according to what is said in the Law of the Lord.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ δοῦναι
  chosen: to offer
  alternatives:
  - to give
  lexicon: BDAG
  rationale: The articular infinitive expresses purpose in context ('and [they came] to offer'). Although δίδωμι is literally 'to give,' English idiom with θυσίαν is more naturally 'offer a sacrifice,' which preserves the sacrificial sense without wooden phrasing.
- source_word: θυσίαν
  chosen: a sacrifice
  alternatives:
  - an offering
  lexicon: BDAG
  rationale: θυσία commonly denotes a sacrificial offering. 'Sacrifice' is the most direct rendering here and fits the Levitical purification context alluded to in the verse.
- source_word: κατὰ τὸ εἰρημένον
  chosen: according to what had been said
  alternatives:
  - according to what is said
  - according to what was prescribed
  lexicon: BDAG
  rationale: The perfect passive participle of λέγω points to what stands as having been spoken in Scripture/law. 'What had been said' preserves the verbal idea of saying rather than importing the more interpretive 'prescribed,' while still reading naturally in English.
- source_word: ἐν τῷ νόμῳ κυρίου
  chosen: in the Law of the Lord
  alternatives:
  - in the Lord's Law
  lexicon: BDAG
  rationale: νόμος is best rendered 'Law' here, referring to the Mosaic law as Scripture. κύριος is rendered 'Lord' per the project's default for Kyrios. The phrase echoes biblical covenantal language and should remain recognizable.
- source_word: ζεῦγος
  chosen: a pair
  alternatives:
  - a yoke
  - two
  lexicon: BDAG
  rationale: In this context ζεῦγος denotes a pair of birds. 'A pair' is the clear idiomatic English equivalent.
- source_word: τρυγόνων
  chosen: turtledoves
  alternatives:
  - doves
  lexicon: BDAG
  rationale: τρυγών specifically refers to the turtledove, not doves generically. The more specific term should be preserved.
- source_word: νοσσοὺς περιστερῶν
  chosen: young pigeons
  alternatives:
  - young doves
  - nestlings of pigeons
  lexicon: BDAG
  rationale: νοσσός refers to a young bird, and περιστερά here is best rendered 'pigeon/dove.' In the sacrificial terminology of Leviticus, 'young pigeons' is the standard and precise English expression.
