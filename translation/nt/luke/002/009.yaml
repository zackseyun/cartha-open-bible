id: LUK.2.9
reference: Luke 2:9
source:
  edition: SBLGNT
  text: ⸀καὶ ἄγγελος κυρίου ἐπέστη αὐτοῖς καὶ δόξα κυρίου περιέλαμψεν αὐτούς, καὶ
    ἐφοβήθησαν φόβον μέγαν·
translation:
  text: And an angel of the Lord stood before them, and the glory of the Lord shone
    around them, and they feared a great fear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came upon them' or 'stood by them' for 'stood before them.' The Greek
      verb can convey sudden presence as well as standing near.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'they feared a great fear,' an idiom expressing intense terror.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄγγελος κυρίου
  chosen: an angel of the Lord
  alternatives:
  - the angel of the Lord
  - a messenger of the Lord
  lexicon: BDAG
  rationale: ἄγγελος commonly means 'angel' in this narrative context, not merely
    'messenger.' The anarthrous construction is naturally rendered indefinitely here
    as 'an angel of the Lord,' not 'the angel of the Lord.' κύριος follows the project's
    default rendering 'Lord.'
- source_word: κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per the contested-terms policy. In English
    idiom, 'of the Lord' naturally includes the article.
- source_word: ἐπέστη αὐτοῖς
  chosen: stood before them
  alternatives:
  - came upon them
  - appeared to them
  - stood by them
  lexicon: BDAG
  rationale: ἐφίστημι can mean 'stand by,' 'come upon,' or 'appear.' Here it describes
    the angel's sudden presence with the shepherds. 'Stood before them' preserves
    the concrete sense without sounding awkward, while avoiding overinterpretation.
- source_word: δόξα κυρίου
  chosen: the glory of the Lord
  alternatives:
  - the Lord's glory
  lexicon: BDAG
  rationale: A straightforward rendering of the genitive phrase that preserves the
    theological weight of δόξα as divine radiance/majesty.
- source_word: περιέλαμψεν αὐτούς
  chosen: shone around them
  alternatives:
  - surrounded them with light
  - shone all around them
  lexicon: BDAG
  rationale: περιλάμπω means to shine around or envelop with light. 'Shone around
    them' is close to the Greek and clear in modern English.
- source_word: ἐφοβήθησαν φόβον μέγαν
  chosen: they were filled with great fear
  alternatives:
  - they feared a great fear
  - they were very afraid
  lexicon: BDAG
  rationale: The verb-plus-cognate-accusative construction intensifies the idea. 'They
    were filled with great fear' preserves the solemn force better than the flatter
    'they were very afraid,' while avoiding an overly literal and unnatural English
    rendering.
