theological_decisions:
- issue: Nature of Jesus' interaction with the teachers
  chosen_reading: 'Rendered as active participation in learning and discussion: ''listening
    to them and asking them questions.'''
  alternative_readings:
  - Rendered more starkly as 'questioning them,' which could suggest challenge or
    examination
  rationale: The verse presents the boy Jesus in the temple engaged with the teachers.
    The wording should neither diminish his wisdom nor overstate a confrontational
    posture not required by the Greek. The chosen rendering preserves the scene's
    humility and intelligence without importing later theological conclusions.
  doctrine_reference: Preserve theological tension rather than resolve it.
