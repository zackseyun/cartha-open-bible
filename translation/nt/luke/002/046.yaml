id: LUK.2.46
reference: Luke 2:46
source:
  edition: SBLGNT
  text: καὶ ἐγένετο μετὰ ἡμέρας τρεῖς εὗρον αὐτὸν ἐν τῷ ἱερῷ καθεζόμενον ἐν μέσῳ τῶν
    διδασκάλων καὶ ἀκούοντα αὐτῶν καὶ ἐπερωτῶντα αὐτούς·
translation:
  text: And it happened that after three days they found him in the temple, sitting
    among the teachers and listening to them and asking them questions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἱερόν refers to the temple complex or precincts, not specifically
      the inner sanctuary.
    reason: cultural_note
  - marker: b
    text: Or 'questioning them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: it happened
  alternatives:
  - it came to pass
  - it was
  lexicon: BDAG
  rationale: A common Lukan narrative formula. 'It happened' preserves the event-introducing
    force without archaic English like 'it came to pass.'
- source_word: μετὰ ἡμέρας τρεῖς
  chosen: after three days
  alternatives:
  - three days later
  lexicon: BDAG
  rationale: The preposition μετά with the accusative indicates temporal succession,
    naturally rendered 'after.' 'After three days' is closer to the Greek wording
    than the more idiomatic but slightly freer 'three days later.'
- source_word: εὗρον
  chosen: they found
  alternatives:
  - they discovered
  lexicon: BDAG
  rationale: Straightforward narrative aorist; 'found' is the natural and sufficiently
    formal rendering.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple
  alternatives:
  - in the temple courts
  - in the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary (ναός).
    'Temple' is the standard readable rendering; the broader sense is preserved in
    a footnote.
- source_word: καθεζόμενον
  chosen: sitting
  alternatives:
  - seated
  lexicon: BDAG
  rationale: The present participle depicts Jesus' posture as they found him. 'Sitting'
    is natural modern English and fits the ongoing scene.
- source_word: ἐν μέσῳ τῶν διδασκάλων
  chosen: among the teachers
  alternatives:
  - in the midst of the teachers
  - among the teachers of the law
  lexicon: BDAG
  rationale: ἐν μέσῳ means 'in the midst of/among.' διδάσκαλοι here are recognized
    religious instructors. 'Teachers' is accurate without importing the more specific
    phrase 'of the law,' which is not explicit in the Greek.
- source_word: ἀκούοντα αὐτῶν
  chosen: listening to them
  alternatives:
  - hearing them
  lexicon: BDAG
  rationale: ἀκούω can mean hear or listen; in this context of engaged learning, 'listening
    to them' best conveys attentive action.
- source_word: ἐπερωτῶντα αὐτούς
  chosen: asking them questions
  alternatives:
  - questioning them
  - asking them
  lexicon: BDAG
  rationale: ἐπερωτάω often means to ask or question. 'Asking them questions' makes
    explicit the reciprocal-discussion sense in idiomatic English without implying
    hostility or interrogation.
