id: LUK.2.40
reference: Luke 2:40
source:
  edition: SBLGNT
  text: Τὸ δὲ παιδίον ηὔξανεν καὶ ἐκραταιοῦτο ⸂πληρούμενον σοφίᾳ⸃, καὶ χάρις θεοῦ
    ἦν ἐπ’ αὐτό.
translation:
  text: And the child grew and became strong, being filled with wisdom, and the favor
    of God was upon him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the grace of God was upon him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τὸ δὲ παιδίον
  chosen: And the child
  alternatives:
  - Now the child
  - And the boy
  lexicon: BDAG
  rationale: παιδίον denotes a child; 'child' fits the immediate infancy context better
    than 'boy.' δέ is lightly connective here, naturally rendered 'And' in English
    narrative flow.
- source_word: ηὔξανεν
  chosen: grew
  alternatives:
  - was growing
  lexicon: BDAG
  rationale: Imperfect of αὐξάνω expresses ongoing development; simple past 'grew'
    communicates the sense idiomatically in English narrative.
- source_word: ἐκραταιοῦτο
  chosen: became strong
  alternatives:
  - was becoming strong
  - grew strong
  lexicon: BDAG
  rationale: The imperfect middle/passive of κραταιόομαι indicates progressive strengthening.
    'Became strong' preserves the developmental sense without awkwardness.
- source_word: πληρούμενον σοφίᾳ
  chosen: being filled with wisdom
  alternatives:
  - filled with wisdom
  - becoming full of wisdom
  lexicon: BDAG
  rationale: 'The present participle modifies ''the child'' and conveys an ongoing
    accompanying state. The dative σοφίᾳ is best taken as content: ''with wisdom.''
    ''Being filled'' preserves the participial nuance better than a bare adjective.'
- source_word: χάρις θεοῦ
  chosen: the favor of God
  alternatives:
  - the grace of God
  lexicon: BDAG
  rationale: χάρις can mean grace, favor, or gracious disposition. In this narrative
    description of God's benevolent presence resting on the child, 'favor' is clearer
    in contemporary English while retaining the theological sense.
- source_word: ἦν ἐπ’ αὐτό
  chosen: was upon him
  alternatives:
  - was on him
  - rested on him
  lexicon: BDAG
  rationale: ἐπί with accusative after εἰμί here expresses presence resting upon someone.
    'Was upon him' is a natural and slightly elevated rendering matching the biblical
    idiom.
