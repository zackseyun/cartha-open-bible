id: LUK.2.18
reference: Luke 2:18
source:
  edition: SBLGNT
  text: καὶ πάντες οἱ ἀκούσαντες ἐθαύμασαν περὶ τῶν λαληθέντων ὑπὸ τῶν ποιμένων πρὸς αὐτούς,
translation:
  text: And all who heard it were amazed about what had been told to them by the shepherds,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "marveled" for "were amazed."
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντες οἱ ἀκούσαντες
  chosen: all who heard it
  alternatives:
  - everyone who heard
  - all those who heard
  lexicon: BDAG
  rationale: 'The articular aorist participle functions substantivally: ''all the ones who heard.'' English idiom is best captured by ''all who heard it.'' The object ''it'' is supplied from context because English normally requires it, referring to the shepherds'' report.'
- source_word: ἐθαύμασαν
  chosen: were amazed
  alternatives:
  - marveled
  - wondered
  lexicon: BDAG
  rationale: θαυμάζω here denotes astonishment or amazement in response to what was heard. 'Were amazed' is natural modern English and preserves the sense without archaic tone. 'Marveled' is possible but slightly more traditional/churchly.
- source_word: περὶ τῶν λαληθέντων
  lemma: περί
  chosen: about what had been told
  alternatives:
  - at the things that had been spoken
  - about the things said
  lexicon: BDAG
  rationale: The preposition περί with the genitive indicates reference ('about/concerning'), and the articular passive participle λαληθέντων refers to the content spoken. 'What had been told' is a clear optimal-equivalence rendering that captures the passive sense and the content focus.
- source_word: ὑπὸ τῶν ποιμένων
  chosen: by the shepherds
  lexicon: BDAG
  rationale: ὑπό with the genitive marks agency in this passive construction. 'Shepherds' is the straightforward rendering of ποιμένων.
- source_word: πρὸς αὐτούς
  chosen: to them
  alternatives:
  - to these people
  - to those who heard
  lexicon: BDAG
  rationale: 'πρός with the accusative can indicate direction toward persons, here in speech: ''to them.'' The pronoun most naturally refers to the hearers just mentioned. This keeps the Greek''s pronominal reference without over-specifying the audience.'
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: καί links this verse to the preceding narrative. 'And' preserves the simple connective force and Luke's narrative flow.
