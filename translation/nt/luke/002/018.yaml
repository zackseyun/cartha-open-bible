theological_decisions:
- issue: Nature of the response described by ἐθαύμασαν
  chosen_reading: The verse reports amazement or astonishment, without implying saving faith or disbelief.
  alternative_readings:
  - The hearers responded positively in faith
  - The hearers merely reacted with curiosity
  rationale: The Greek verb θαυμάζω states an emotional reaction of wonder. The text itself does not specify whether this amazement matured into faith, so the translation should preserve that narrative openness rather than importing a theological conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
