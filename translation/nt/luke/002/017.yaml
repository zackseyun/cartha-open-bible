id: LUK.2.17
reference: Luke 2:17
source:
  edition: SBLGNT
  text: ἰδόντες δὲ ⸀ἐγνώρισαν περὶ τοῦ ῥήματος τοῦ λαληθέντος αὐτοῖς περὶ τοῦ παιδίου
    τούτου.
translation:
  text: And when they saw it, they made known the message that had been spoken to
    them about this child.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the word' or 'the saying' that had been spoken to them about this child.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  chosen: when they saw it
  alternatives:
  - having seen
  - after seeing
  lexicon: BDAG
  rationale: Aorist participle of ὁράω, functioning temporally before the main verb.
    'When they saw it' gives natural English and preserves the sequence. 'It' is supplied
    in English because the object is implicit from the context of seeing the child
    and the circumstances.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - but
  lexicon: BDAG
  rationale: δέ here is a mild connective advancing the narrative rather than marking
    strong contrast. 'And' is simple, natural, and fits Luke's narrative flow.
- source_word: ἐγνώρισαν
  chosen: they made known
  alternatives:
  - they made it known
  - they reported
  - they revealed
  lexicon: BDAG
  rationale: γνωρίζω means to make known or disclose. 'They made known' is a close
    rendering that preserves the verbal force without overinterpreting it as formal
    proclamation.
- source_word: περὶ τοῦ ῥήματος
  chosen: the message
  alternatives:
  - the word
  - the matter
  - the saying
  lexicon: BDAG
  rationale: ῥῆμα can mean 'word,' 'statement,' or 'message.' In this context it refers
    to the content announced to the shepherds concerning the child. 'Message' communicates
    the sense clearly in modern English while remaining faithful to the referential
    content.
- source_word: τοῦ λαληθέντος αὐτοῖς
  chosen: that had been spoken to them
  alternatives:
  - that was spoken to them
  - told to them
  lexicon: BDAG
  rationale: The articular passive participle modifies ῥήματος. 'That had been spoken
    to them' preserves the passive voice and the prior action relative to their making
    it known.
- source_word: περὶ τοῦ παιδίου τούτου
  chosen: about this child
  alternatives:
  - concerning this child
  - about this little child
  lexicon: BDAG
  rationale: παιδίον denotes a child/young child; in context it refers to the newborn
    Jesus. 'This child' is natural and accurate. 'Little child' would be possible
    but is unnecessary and potentially stylistically marked.
