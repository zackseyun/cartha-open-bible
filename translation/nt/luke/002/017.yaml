theological_decisions:
- issue: Rendering ῥῆμα in relation to the angelic announcement
  chosen_reading: message
  alternative_readings:
  - word
  - saying
  rationale: The verse refers to the content previously spoken to the shepherds about
    Jesus. 'Message' best conveys that content in clear modern English without importing
    extra theological nuance. No doctrinal issue is at stake, but the choice affects
    how directly the verse connects to the angelic proclamation.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic.'
