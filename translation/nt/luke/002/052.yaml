id: LUK.2.52
reference: Luke 2:52
source:
  edition: SBLGNT
  text: Καὶ Ἰησοῦς προέκοπτεν ⸂σοφίᾳ καὶ ἡλικίᾳ⸃ καὶ χάριτι παρὰ θεῷ καὶ ἀνθρώποις.
translation:
  text: And Jesus kept increasing in wisdom and stature[b][a], and in favor with God and men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'age' or 'maturity' for 'stature' (ἡλικία).
    reason: lexical_alternative
  - marker: b
    text: Or 'people'; Greek 'men' can function representatively for human beings in general.
    reason: lexical_alternative
lexical_decisions:
- source_word: προέκοπτεν
  chosen: kept increasing
  alternatives:
  - advanced
  - grew
  - made progress
  lexicon: BDAG
  rationale: The imperfect verb indicates ongoing progress over time, not a single momentary increase. 'Kept increasing' captures the durative sense in natural English better than the more formal 'advanced,' while preserving the idea of real development.
- source_word: σοφίᾳ
  chosen: wisdom
  lexicon: BDAG
  rationale: Standard rendering for σοφία, referring here to wisdom in the broad sense of understanding and discernment.
- source_word: ἡλικίᾳ
  chosen: stature
  alternatives:
  - age
  - maturity
  lexicon: BDAG
  rationale: ἡλικία can mean either age or bodily stature. In this collocation, and in light of the traditional pairing with wisdom and favor, 'stature' best conveys visible human growth without reducing the phrase to mere chronological aging. The ambiguity is worth preserving in a footnote.
- source_word: χάριτι
  chosen: favor
  alternatives:
  - grace
  lexicon: BDAG
  rationale: In the phrase 'with God and men,' χάρις most naturally denotes favor or approval rather than saving grace as a theological abstraction. 'Favor' is clearer in contemporary English and fits the relational context.
- source_word: παρὰ θεῷ
  chosen: with God
  alternatives:
  - before God
  lexicon: BDAG
  rationale: παρά with the dative here expresses relation in the sight of or with someone. 'With God' is idiomatic and matches the parallel phrase with men.
- source_word: ἀνθρώποις
  chosen: men
  alternatives:
  - people
  - human beings
  lexicon: BDAG
  rationale: The plural ἄνθρωποι here refers to human beings generally. 'Men' preserves the traditional and source-corresponding representative sense, in keeping with the project's gender-accurate rather than gender-neutral policy. Because modern readers may hear this as male-only, an inclusive alternative is preserved in a footnote.
