theological_decisions:
- issue: Jesus' human development in light of Chalcedonian Christology
  chosen_reading: The verse is translated straightforwardly as describing real human growth in wisdom, stature, and favor.
  alternative_readings:
  - Render in a way that minimizes or obscures Jesus' development to avoid theological tension
  rationale: The Greek plainly states that Jesus progressed. In accord with the Definition of Chalcedon, this is understood as a true statement about his genuine humanity and should not be softened or paraphrased away.
  doctrine_reference: 'Affirmations: Definition of Chalcedon (451 AD); Translation philosophy §3 Preserve theological tension rather than resolve it'
