id: LUK.2.26
reference: Luke 2:26
source:
  edition: SBLGNT
  text: καὶ ἦν αὐτῷ κεχρηματισμένον ὑπὸ τοῦ πνεύματος τοῦ ἁγίου μὴ ἰδεῖν θάνατον πρὶν
    ⸂ἢ ἂν⸃ ἴδῃ τὸν χριστὸν κυρίου.
translation:
  text: And it had been revealed to him by the Holy Spirit that he would not see death
    before he had seen the Lord’s Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “the Lord’s Christ.”
    reason: alternative_reading
lexical_decisions:
- source_word: κεχρηματισμένον
  chosen: had been revealed
  alternatives:
  - had been divinely informed
  - had received a revelation
  - had been warned
  lexicon: BDAG
  rationale: χρηματίζω in the passive commonly denotes receiving a divine communication
    or revelation. 'Had been revealed' is natural English and preserves the divine-source
    sense, especially with ὑπὸ τοῦ πνεύματος τοῦ ἁγίου explicitly stating the agent.
    'Warned' is too narrow here.
- source_word: ὑπὸ τοῦ πνεύματος τοῦ ἁγίου
  chosen: by the Holy Spirit
  alternatives:
  - from the Holy Spirit
  lexicon: BDAG
  rationale: ὑπό with the genitive marks personal agency. 'By the Holy Spirit' best
    reflects the grammar and preserves the personal agency of the Spirit.
- source_word: μὴ ἰδεῖν θάνατον
  chosen: would not see death
  alternatives:
  - would not die
  - would not taste death
  lexicon: BDAG
  rationale: The idiom literally means 'to see death.' English can carry this idiom
    naturally enough, and it preserves the source imagery better than the more interpretive
    'would not die.' 'Taste death' is not the wording here.
- source_word: πρὶν ἢ ἂν ἴδῃ
  chosen: before he had seen
  alternatives:
  - before he would see
  - until he saw
  lexicon: BDAG
  rationale: 'The construction expresses a future contingency relative to the main
    clause. In idiomatic English after ''would not see death,'' ''before he had seen''
    clearly conveys the sequence: Simeon would not die prior to this event occurring.'
- source_word: τὸν χριστὸν κυρίου
  chosen: the Lord’s Messiah
  alternatives:
  - the Christ of the Lord
  - the Lord's Christ
  - the Lord's Anointed
  lexicon: BDAG
  rationale: 'Per doctrine, Χριστός as a title is rendered ''Messiah'' rather than
    ''Christ.'' The genitive κυρίου is best taken as possessive/source: the Messiah
    belonging to or sent by the Lord. ''The Lord’s Messiah'' is clear, natural, and
    preserves the messianic sense.'
- source_word: κυρίου
  chosen: Lord’s
  alternatives:
  - of the Lord
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per the contested-terms guidance. The possessive
    form is smoother English than a more formal 'of the Lord' while preserving the
    same sense.
