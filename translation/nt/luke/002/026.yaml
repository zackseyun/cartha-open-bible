theological_decisions:
- issue: Rendering Χριστός in a messianic title context
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: In τὸν χριστὸν κυρίου, Χριστός functions as a title rather than a name-like
    designation. Following the doctrine guideline, the main text uses 'Messiah' to
    preserve the Hebraic messianic context, while the traditional 'the Lord's Christ'
    is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default ''Messiah (where
    title; Christ where name-like)'''
