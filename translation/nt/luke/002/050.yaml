id: LUK.2.50
reference: Luke 2:50
source:
  edition: SBLGNT
  text: καὶ αὐτοὶ οὐ συνῆκαν τὸ ῥῆμα ὃ ἐλάλησεν αὐτοῖς.
translation:
  text: And they did not understand the statement that he spoke to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the word," "the saying," or "the matter."
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - And yet
  - But
  lexicon: BDAG
  rationale: Standard connective; simple 'And' best preserves the narrative flow without
    adding adversative force not explicit in the Greek.
- source_word: αὐτοὶ
  chosen: they
  alternatives:
  - they themselves
  lexicon: BDAG
  rationale: Refers to Jesus' parents in context. The pronoun is explicit in Greek
    and could be emphatic, but English normally does not require 'themselves' here;
    the emphasis is sufficiently carried by the clause as a whole.
- source_word: οὐ συνῆκαν
  chosen: did not understand
  alternatives:
  - did not comprehend
  - failed to understand
  lexicon: BDAG
  rationale: συνίημι commonly means to understand or comprehend. 'Did not understand'
    is the most natural modern English rendering and preserves the straightforward
    sense.
- source_word: τὸ ῥῆμα
  chosen: the statement
  alternatives:
  - the word
  - the saying
  - the matter
  lexicon: BDAG
  rationale: ῥῆμα can mean word, saying, or matter. In this context it refers to the
    specific utterance Jesus had just made, so 'the statement' communicates a spoken
    saying clearly in contemporary English. 'Word' would sound less natural and potentially
    ambiguous in English.
- source_word: ὃ ἐλάλησεν αὐτοῖς
  chosen: that he spoke to them
  alternatives:
  - which he said to them
  - that he had spoken to them
  lexicon: BDAG
  rationale: λαλέω is 'to speak' or 'to say.' 'Spoke to them' closely matches the
    Greek wording and keeps the relative clause attached to 'statement.' The simple
    past fits the narrative aorist.
