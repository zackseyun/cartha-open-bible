theological_decisions:
- issue: Narrative portrayal of Jesus' parents' response
  chosen_reading: The verse is rendered to state plainly that they did not understand
    Jesus' saying, without softening or expanding the claim.
  alternative_readings:
  - They did not fully understand
  - They did not accept
  rationale: The Greek states lack of understanding, not partial understanding or
    rejection. The translation preserves the narrative tension around Jesus' identity
    and mission without importing doctrinal explanation.
  doctrine_reference: Preserve theological tension rather than resolve it.
