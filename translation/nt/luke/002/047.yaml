id: LUK.2.47
reference: Luke 2:47
source:
  edition: SBLGNT
  text: ἐξίσταντο δὲ πάντες οἱ ἀκούοντες αὐτοῦ ἐπὶ τῇ συνέσει καὶ ταῖς ἀποκρίσεσιν
    αὐτοῦ.
translation:
  text: And all who heard him were astonished at his understanding and his answers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were amazed.' The Greek verb can express strong astonishment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξίσταντο
  chosen: were astonished
  alternatives:
  - were amazed
  - were beside themselves
  lexicon: BDAG
  rationale: The imperfect middle/passive form of ἐξίστημι here describes an ongoing
    reaction of amazement. 'Were astonished' is natural modern English and preserves
    the strong sense without the overly literal idiom 'were beside themselves,' which
    can mislead contemporary readers.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ is a mild connective. 'And' fits the narrative flow in English better
    than 'But' and is less marked than 'Now' in this context.
- source_word: πάντες
  chosen: all
  alternatives:
  - everyone
  lexicon: BDAG
  rationale: πάντες with the participial phrase is best rendered collectively as 'all
    who heard him.' This preserves the universal scope while sounding idiomatic.
- source_word: οἱ ἀκούοντες αὐτοῦ
  chosen: who heard him
  alternatives:
  - those listening to him
  - those who were hearing him
  lexicon: BDAG
  rationale: The present participle denotes those in the act/state of hearing him.
    'Who heard him' is concise and idiomatic in English narrative, while still covering
    the sense of the participle.
- source_word: ἐπὶ
  chosen: at
  alternatives:
  - because of
  - over
  lexicon: BDAG
  rationale: With the dative here, ἐπί marks the basis or occasion of their astonishment.
    'At' is the most natural English preposition after 'astonished' and accurately
    conveys the causal nuance.
- source_word: συνέσει
  chosen: understanding
  alternatives:
  - insight
  - intelligence
  lexicon: BDAG
  rationale: σύνεσις refers to comprehension, insight, or understanding. 'Understanding'
    is the clearest and most broadly accessible rendering in this context, avoiding
    an overly evaluative tone like 'intelligence.'
- source_word: ἀποκρίσεσιν
  chosen: answers
  alternatives:
  - responses
  - replies
  lexicon: BDAG
  rationale: ἀπόκρισις denotes an answer or response. 'Answers' fits the likely dialogical
    setting and pairs naturally with 'understanding' in English.
- source_word: αὐτοῦ
  chosen: his
  lexicon: BDAG
  rationale: The repeated genitive pronoun refers to Jesus and is naturally rendered
    with the possessive 'his' in both instances.
