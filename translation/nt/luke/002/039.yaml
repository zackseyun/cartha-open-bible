id: LUK.2.39
reference: Luke 2:39
source:
  edition: SBLGNT
  text: Καὶ ὡς ἐτέλεσαν ⸀πάντα τὰ κατὰ τὸν νόμον κυρίου, ⸀ἐπέστρεψαν εἰς τὴν Γαλιλαίαν ⸀εἰς πόλιν ἑαυτῶν Ναζαρέθ.
translation:
  text: And when they had completed everything according to the law of the Lord[a], they returned to Galilee, to their own town[b], Nazareth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everything required by the law of the Lord.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'city'; rendered 'town' because Nazareth was a small settlement.
    reason: cultural_note
lexical_decisions:
- source_word: ὡς
  chosen: when
  alternatives:
  - after
  - as soon as
  lexicon: BDAG
  rationale: In this temporal construction with the aorist verb, ὡς introduces the time at which the main action followed. 'When' is natural English and preserves the sequence without overstating immediacy, unlike 'as soon as.'
- source_word: ἐτέλεσαν
  chosen: had completed
  alternatives:
  - finished
  - fulfilled
  - accomplished
  lexicon: BDAG
  rationale: τελέω here refers to bringing required actions to completion. 'Had completed' fits the aorist in narrative sequence and avoids the potentially over-theological 'fulfilled,' which could suggest prophetic fulfillment rather than completion of prescribed rites.
- source_word: πάντα τὰ κατὰ τὸν νόμον κυρίου
  chosen: everything according to the law of the Lord
  alternatives:
  - all things according to the law of the Lord
  - everything required by the law of the Lord
  lexicon: BDAG
  rationale: The phrase denotes the totality of what pertained to or was prescribed by the Lord's law. 'Everything according to the law of the Lord' is clear and close to the Greek. 'Required by' is interpretively valid but slightly more expansive than the wording itself.
- source_word: νόμον κυρίου
  chosen: the law of the Lord
  alternatives:
  - the Lord's law
  lexicon: BDAG
  rationale: This genitive construction is straightforward. 'The law of the Lord' preserves the biblical phrasing and echoes Septuagintal/Jewish scriptural style.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - the LORD
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' Here it refers to God in a scriptural-law context, but the Greek text has κύριος, not the Tetragrammaton, so 'Lord' is preferred in the main text.
- source_word: ἐπέστρεψαν
  chosen: returned
  alternatives:
  - went back
  lexicon: BDAG
  rationale: ἐπιστρέφω in this travel context means to return. 'Returned' is the most natural and suitably formal narrative rendering.
- source_word: εἰς τὴν Γαλιλαίαν
  chosen: to Galilee
  alternatives:
  - into Galilee
  lexicon: BDAG
  rationale: With a destination, εἰς is idiomatically rendered 'to' in English. 'Into' is possible but less natural here.
- source_word: εἰς πόλιν ἑαυτῶν
  chosen: to their own town
  alternatives:
  - to their own city
  - to their town
  lexicon: BDAG
  rationale: πόλις can mean city or town depending on scale. Since Nazareth was not a major city, 'town' is better idiomatic English. ἑαυτῶν adds possessive emphasis, preserved by 'their own.'
- source_word: Ναζαρέθ
  chosen: Nazareth
  lexicon: BDAG
  rationale: Standard English transliteration of the place name.
