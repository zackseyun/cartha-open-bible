theological_decisions:
- issue: Davidic descent terminology
  chosen_reading: from the house and family line of David
  alternative_readings:
  - of the house and lineage of David
  - of the house and clan of David
  rationale: The wording preserves both terms οἶκος and πατριά without collapsing
    them into one concept. This maintains Luke's emphasis on Joseph's Davidic ancestry
    without importing later doctrinal claims beyond the text.
  doctrine_reference: Translation philosophy §§1, 5; Preserve theological tension
    rather than resolve it
