id: LUK.2.4
reference: Luke 2:4
source:
  edition: SBLGNT
  text: Ἀνέβη δὲ καὶ Ἰωσὴφ ἀπὸ τῆς Γαλιλαίας ἐκ πόλεως Ναζαρὲθ εἰς τὴν Ἰουδαίαν εἰς
    πόλιν Δαυὶδ ἥτις καλεῖται Βηθλέεμ, διὰ τὸ εἶναι αὐτὸν ἐξ οἴκου καὶ πατριᾶς Δαυίδ,
translation:
  text: And Joseph also went up from Galilee, from the town of Nazareth, to Judea,
    to the city of David, which is called Bethlehem, because he was of the house and
    family line of David,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of the house and lineage of David.' The Greek uses two related ancestry
      terms, emphasizing Joseph's Davidic descent.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀνέβη
  chosen: went up
  alternatives:
  - traveled up
  - went
  lexicon: BDAG
  rationale: Retains the literal upward-travel idiom common for going to Judea/Jerusalem
    region, preserving geographic nuance rather than flattening to simply 'went.'
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: A light connective is needed in English. 'And' preserves narrative continuity
    without overstating temporal sequence.
- source_word: καὶ
  chosen: also
  alternatives:
  - too
  - even
  lexicon: BDAG
  rationale: Marks Joseph's action as accompanying the previously mentioned movement
    of others and, in context, Mary's travel.
- source_word: πόλεως / πόλιν
  chosen: town / city
  alternatives:
  - city / city
  - town / town
  lexicon: BDAG
  rationale: Rendered contextually rather than mechanically identical. Nazareth is
    naturally 'town' in English idiom, while Bethlehem as 'city of David' preserves
    the recognized biblical designation tied to Davidic identity.
- source_word: Ναζαρὲθ
  chosen: Nazareth
  rationale: Personal and place names are transliterated by standard English convention.
- source_word: Ἰουδαίαν
  chosen: Judea
  alternatives:
  - the Judean region
  - Judah
  lexicon: BDAG
  rationale: Standard geographical rendering for the Roman-era region; 'Judah' could
    suggest the tribal territory rather than the contemporary region.
- source_word: πόλιν Δαυὶδ ἥτις καλεῖται Βηθλέεμ
  chosen: the city of David which is called Bethlehem
  alternatives:
  - David's city, called Bethlehem
  - the city of David, that is, Bethlehem
  lexicon: BDAG
  rationale: Preserves the appositional explanatory structure of the Greek and the
    Davidic association important to Luke's narrative.
- source_word: καλεῖται
  chosen: is called
  alternatives:
  - is named
  lexicon: BDAG
  rationale: Straightforward passive rendering matching the Greek.
- source_word: διὰ τὸ εἶναι αὐτὸν
  chosen: because he was
  alternatives:
  - because he was being
  - on account of his being
  lexicon: BDAG
  rationale: The articular infinitive with διά expresses reason. Smooth English requires
    a finite clause.
- source_word: ἐξ οἴκου
  chosen: from the house
  alternatives:
  - of the house
  - from the household
  lexicon: BDAG
  rationale: '''House'' preserves the dynastic sense, especially in Davidic contexts,
    rather than reducing it merely to immediate household membership.'
- source_word: πατριᾶς
  chosen: family line
  alternatives:
  - lineage
  - clan
  - family
  lexicon: BDAG
  rationale: Conveys ancestral descent in accessible modern English. 'Clan' may sound
    ethnographic; 'lineage' is accurate but slightly less natural here.
- source_word: Δαυίδ
  chosen: David
  rationale: Standard transliteration of the proper name.
