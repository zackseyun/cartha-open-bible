id: LUK.2.44
reference: Luke 2:44
source:
  edition: SBLGNT
  text: νομίσαντες δὲ αὐτὸν ⸂εἶναι ἐν τῇ συνοδίᾳ⸃ ἦλθον ἡμέρας ὁδὸν καὶ ἀνεζήτουν
    αὐτὸν ἐν τοῖς συγγενεῦσιν ⸀καὶ τοῖς γνωστοῖς,
translation:
  text: But supposing him to be in the traveling group, they went a day's journey,
    and they began searching for him among their relatives and acquaintances.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'caravan' for 'traveling group' (Greek συνοδία), referring to a company
      journeying together.
    reason: lexical_alternative
  - marker: b
    text: The imperfect verb can also be rendered 'they were searching for him,' emphasizing
      the ongoing nature of the search.
    reason: lexical_alternative
lexical_decisions:
- source_word: νομίσαντες
  chosen: supposing
  alternatives:
  - assuming
  - thinking
  lexicon: BDAG
  rationale: Aorist participle indicating an assumption made by Mary and Joseph. 'Supposing'
    is natural English and preserves the provisional sense better than the more certain-sounding
    'thinking.'
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild development/contrast with the previous verse. 'But' fits
    the narrative turn as they depart without realizing Jesus is absent.
- source_word: εἶναι ἐν τῇ συνοδίᾳ
  chosen: to be in the traveling group
  alternatives:
  - to be in the caravan
  - to be in the company
  lexicon: BDAG
  rationale: συνοδία refers to a group traveling together. 'Traveling group' is clear
    modern English and avoids the potentially culture-specific or romanticized 'caravan,'
    while still conveying communal travel.
- source_word: ἦλθον ἡμέρας ὁδὸν
  chosen: they went a day's journey
  alternatives:
  - they traveled a day's journey
  - they went one day's distance
  lexicon: BDAG
  rationale: This idiom means traveling for the distance/time of one day. 'Went a
    day's journey' is idiomatic and concise in English.
- source_word: ἀνεζήτουν
  chosen: they began searching for
  alternatives:
  - they were searching for
  - they searched for
  lexicon: BDAG
  rationale: Imperfect verb in narrative context suggests ongoing/inceptive action.
    'Began searching for' captures the onset of the search after the day's travel,
    though the imperfect also implies continued effort.
- source_word: συγγενεῦσιν
  chosen: relatives
  alternatives:
  - kinsfolk
  - kinsmen
  lexicon: BDAG
  rationale: Refers to family relations broadly. 'Relatives' is accurate, natural,
    and gender-inclusive in a way warranted by the plural context.
- source_word: γνωστοῖς
  chosen: acquaintances
  alternatives:
  - friends
  - people they knew
  lexicon: BDAG
  rationale: γνωστοί are known associates, not necessarily intimate friends. 'Acquaintances'
    preserves the broader sense.
