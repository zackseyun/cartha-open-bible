id: LUK.2.16
reference: Luke 2:16
source:
  edition: SBLGNT
  text: καὶ ἦλθαν σπεύσαντες καὶ ἀνεῦραν τήν τε Μαριὰμ καὶ τὸν Ἰωσὴφ καὶ τὸ βρέφος
    κείμενον ἐν τῇ φάτνῃ·
translation:
  text: And they came in haste and found Mary and Joseph, and the baby lying in the
    manger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the feeding trough.' The Greek φάτνη can refer to a manger or feeding
      trough.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθαν
  chosen: came
  alternatives:
  - went
  lexicon: BDAG
  rationale: Aorist of ἔρχομαι is most naturally rendered 'came' here, matching the
    narrative movement toward the location previously announced by the angel.
- source_word: σπεύσαντες
  chosen: in haste
  alternatives:
  - hurrying
  - quickly
  lexicon: BDAG
  rationale: 'The participle conveys manner accompanying the main verb: they came
    hastily. ''In haste'' is idiomatic modern English that preserves the urgency without
    sounding awkwardly literal (''having hurried'').'
- source_word: ἀνεῦραν
  chosen: found
  alternatives:
  - discovered
  - located
  lexicon: BDAG
  rationale: The verb means to find after searching. 'Found' is the most natural narrative
    rendering; the nuance of successful searching is sufficiently implied by context.
- source_word: τήν τε Μαριὰμ
  chosen: Mary
  lexicon: BDAG
  rationale: Μαριάμ is transliterated as the personal name 'Mary' per translation
    philosophy. The particle τε links Mary with the following coordinated items; in
    English this is naturally absorbed into the series rather than separately represented.
- source_word: Ἰωσὴφ
  chosen: Joseph
  lexicon: BDAG
  rationale: Proper name transliterated by standard English convention.
- source_word: τὸ βρέφος
  chosen: the baby
  alternatives:
  - the infant
  - the child
  lexicon: BDAG
  rationale: βρέφος denotes a very young child, here specifically the newborn Jesus.
    'The baby' is clear, natural English and fits the immediate birth context better
    than the slightly more formal 'infant.'
- source_word: κείμενον
  chosen: lying
  alternatives:
  - laid
  - lying there
  lexicon: BDAG
  rationale: Present participle of κεῖμαι describes the baby's state/location, not
    the action of someone placing him there. 'Lying' preserves that stative sense
    better than 'laid.'
- source_word: ἐν τῇ φάτνῃ
  chosen: in the manger
  alternatives:
  - in the feeding trough
  lexicon: BDAG
  rationale: φάτνη can denote a manger or feeding trough. 'Manger' is the established
    and accurate rendering in this nativity context; 'feeding trough' is more explicit
    but less natural in the narrative.
- source_word: καὶ ... καὶ ... καὶ
  chosen: and ... and ... and
  alternatives:
  - with polysyndeton reduced in English
  lexicon: Greek grammar
  rationale: The repeated καί gives a simple additive narrative flow. English retains
    the coordination, though not every connective must be mechanically emphasized
    beyond natural style.
