id: LUK.2.38
reference: Luke 2:38
source:
  edition: SBLGNT
  text: ⸀καὶ αὐτῇ τῇ ὥρᾳ ἐπιστᾶσα ἀνθωμολογεῖτο τῷ ⸀θεῷ καὶ ἐλάλει περὶ αὐτοῦ πᾶσιν τοῖς προσδεχομένοις ⸀λύτρωσιν Ἰερουσαλήμ.
translation:
  text: And at that very hour[a], coming up[c][b], she began giving thanks to God and speaking about him to all who were waiting for the redemption of Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at that same hour.'
    reason: lexical_alternative
  - marker: b
    text: Or 'was praising God' or 'was giving thanks to God.'
    reason: lexical_alternative
  - marker: c
    text: The pronoun 'him' most naturally refers to the child Jesus in context, though 'God' is the nearest explicit antecedent in Greek.
    reason: alternative_reading
lexical_decisions:
- source_word: αὐτῇ τῇ ὥρᾳ
  chosen: at that very hour
  alternatives:
  - at that same hour
  - at that moment
  lexicon: BDAG
  rationale: The dative temporal expression indicates time when. 'Very' brings out the emphatic force of αὐτῇ ('that very/same'), highlighting the immediacy of Anna's arrival.
- source_word: ἐπιστᾶσα
  chosen: coming up
  alternatives:
  - approaching
  - coming near
  - standing by
  lexicon: BDAG
  rationale: The aorist participle from ἐφίστημι here describes Anna's arrival upon the scene. 'Coming up' is natural English and preserves the sense of appearing/approaching at that moment without over-specifying manner.
- source_word: ἀνθωμολογεῖτο
  chosen: began giving thanks
  alternatives:
  - was giving thanks
  - praised
  - confessed praise
  lexicon: BDAG
  rationale: This imperfect middle verb can denote expressing thanks or praise in response. 'Giving thanks' fits the dative τῷ θεῷ naturally. 'Began' is supplied to reflect the ingressive feel often conveyed in context by the imperfect following her arrival, while remaining idiomatic.
- source_word: τῷ θεῷ
  chosen: to God
  alternatives:
  - to the God
  lexicon: BDAG
  rationale: The article with θεῷ is idiomatic in Greek and normally not reproduced in English here. 'To God' is the natural rendering.
- source_word: ἐλάλει περὶ αὐτοῦ
  chosen: speaking about him
  alternatives:
  - speaking of him
  - talking about him
  lexicon: BDAG
  rationale: The imperfect indicates continued action. 'Speaking about him' is clear modern English. The pronoun most naturally refers to the child Jesus in context, but the translation preserves the pronoun rather than replacing it with an interpretive noun.
- source_word: πᾶσιν τοῖς προσδεχομένοις
  chosen: to all who were waiting for
  alternatives:
  - to all who were looking for
  - to all who were expecting
  lexicon: BDAG
  rationale: προσδέχομαι in Luke often carries the sense of expectant waiting. 'Waiting for' is straightforward and fits the messianic hope context.
- source_word: λύτρωσιν
  chosen: redemption
  alternatives:
  - deliverance
  - release
  lexicon: BDAG
  rationale: λύτρωσις carries the sense of liberation/redemption, often with salvific overtones. 'Redemption' best preserves the theological weight and matches Luke's infancy narrative context.
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  lexicon: BDAG
  rationale: Standard transliteration of the place name.
