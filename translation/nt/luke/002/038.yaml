theological_decisions:
- issue: Referent of αὐτοῦ in 'speaking about him'
  chosen_reading: The pronoun is retained as 'him,' with the contextual referent understood to be the child Jesus.
  alternative_readings:
  - The pronoun could be taken by some readers as referring to God because God is the nearest explicit antecedent.
  rationale: Although τῷ θεῷ is the nearest noun, the narrative context centers on the child Jesus, and Anna's proclamation to those awaiting redemption most naturally concerns him as the one through whom that redemption comes. Retaining 'him' preserves the Greek wording without over-resolving the antecedent in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of 'redemption of Jerusalem'
  chosen_reading: Rendered as 'the redemption of Jerusalem' without expanding to a political, spiritual, or personified interpretation.
  alternative_readings:
  - the deliverance of Jerusalem
  - those waiting for Jerusalem's redemption
  rationale: The phrase can encompass the hoped-for saving action of God for his people associated with Jerusalem, and may carry both communal and eschatological resonance. The translation preserves that breadth rather than narrowing it to one doctrinally loaded sense.
  doctrine_reference: Preserve theological tension rather than resolve it.
