id: LUK.2.5
reference: Luke 2:5
source:
  edition: SBLGNT
  text: ἀπογράψασθαι σὺν Μαριὰμ τῇ ⸂ἐμνηστευμένῃ αὐτῷ⸃, οὔσῃ ἐγκύῳ.
translation:
  text: to register with Mary, who was betrothed to him and was pregnant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'engaged to him.' The Greek denotes formal betrothal, a stronger legal/social
      bond than a modern engagement.
    reason: lexical_alternative
  - marker: b
    text: Or 'with child.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπογράψασθαι
  chosen: to register
  alternatives:
  - to be registered
  - to enroll
  lexicon: BDAG
  rationale: The aorist middle infinitive here expresses the purpose of Joseph's travel
    in the census context. 'To register' is concise modern English and fits the administrative
    sense of ἀπογράφω in Luke 2. 'To be registered' is more formally passive-sounding
    in English, but the middle form in this context does not require that wording.
- source_word: σὺν
  chosen: with
  lexicon: BDAG
  rationale: Standard accompaniment sense; 'with' is the natural English equivalent.
- source_word: Μαριὰμ
  chosen: Mary
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: ἐμνηστευμένῃ αὐτῷ
  chosen: who was betrothed to him
  alternatives:
  - his betrothed
  - engaged to him
  lexicon: BDAG
  rationale: The perfect passive participle of μνηστεύομαι denotes a formal pledged
    marital relationship. 'Betrothed' preserves the first-century legal/social force
    better than the more modern and potentially weaker 'engaged.' The dative phrase
    αὐτῷ is rendered explicitly as 'to him.'
- source_word: οὔσῃ ἐγκύῳ
  chosen: and was pregnant
  alternatives:
  - being pregnant
  - with child
  lexicon: BDAG
  rationale: The participial phrase describes Mary's condition at the time. 'Was pregnant'
    is clear, natural modern English. 'With child' is traditional but less contemporary;
    'being pregnant' is more literal but less smooth in English.
