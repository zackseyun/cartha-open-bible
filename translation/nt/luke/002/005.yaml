theological_decisions:
- issue: Rendering Mary's marital status in relation to Joseph
  chosen_reading: betrothed to him
  alternative_readings:
  - engaged to him
  - his wife
  rationale: The Greek explicitly uses μνηστεύομαι, indicating formal betrothal rather
    than a completed marriage. Rendering it as 'wife' would import a stronger marital
    status than this clause states, while 'engaged' may understate the covenantal/legal
    force of ancient betrothal. 'Betrothed' best preserves the historical and social
    reality without adding doctrinal claims.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the source text states without importing more.'
