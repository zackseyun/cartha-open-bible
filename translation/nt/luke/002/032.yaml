id: LUK.2.32
reference: Luke 2:32
source:
  edition: SBLGNT
  text: φῶς εἰς ἀποκάλυψιν ἐθνῶν καὶ δόξαν λαοῦ σου Ἰσραήλ.
translation:
  text: a light for revelation to the Gentiles[a], and glory to your people Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a light for revelation to the nations.' The Greek term can mean 'nations' generally, but here likely highlights the Gentiles in contrast with Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: φῶς
  chosen: a light
  alternatives:
  - light
  lexicon: BDAG
  rationale: Rendered as 'a light' to fit natural English within Simeon's poetic description of the child. Although the Greek lacks an explicit article, English idiom commonly supplies the indefinite article in a predicate-like nominative expression.
- source_word: εἰς
  chosen: for
  alternatives:
  - unto
  - for the purpose of
  - to
  lexicon: BDAG
  rationale: 'Here εἰς expresses purpose/result: the child is ''a light for revelation.'' ''For'' is concise and natural while preserving the directional sense better than a flat ''to''.'
- source_word: ἀποκάλυψιν
  chosen: revelation
  alternatives:
  - disclosure
  - unveiling
  lexicon: BDAG
  rationale: '''Revelation'' best captures the sense of something being made known or unveiled. It also preserves the theological resonance of divine disclosure without becoming overly technical.'
- source_word: ἐθνῶν
  chosen: the Gentiles
  alternatives:
  - the nations
  lexicon: BDAG
  rationale: In Luke's Jewish-context phrasing, ἐθνῶν contrasts naturally with 'your people Israel,' so 'the Gentiles' makes the contrast explicit for English readers. 'The nations' is possible and more formally literal, but in English it can obscure the Jew/Gentile contrast present in context.
- source_word: δόξαν
  chosen: glory
  alternatives:
  - honor
  lexicon: BDAG
  rationale: '''Glory'' is the standard and strongest rendering, preserving both the honor/shining-splendor sense and the biblical-theological resonance of Israel''s exaltation in God''s saving work.'
- source_word: λαοῦ σου Ἰσραήλ
  chosen: your people Israel
  alternatives:
  - your people, Israel
  - your people of Israel
  lexicon: BDAG
  rationale: 'Rendered straightforwardly as a genitival/appositional phrase identifying Israel as God''s covenant people. The comma is omitted in the main text for smooth English, but the sense remains appositional: Israel is ''your people.'''
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: 'Simple coordinating conjunction linking the two parallel purposes/results: revelation to the Gentiles and glory to Israel.'
