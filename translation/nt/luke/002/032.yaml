theological_decisions:
- issue: Rendering ἐθνῶν in relation to Israel
  chosen_reading: the Gentiles
  alternative_readings:
  - the nations
  rationale: Because the verse explicitly pairs ἐθνῶν with 'your people Israel,' the contextual contrast is between non-Jews and Israel. 'The Gentiles' communicates that contrast more clearly in English while still reflecting the underlying Greek term for nations/peoples.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve meaning in readable modern English.'
