theological_decisions:
- issue: Reference to Mary and Joseph as Jesus' γονεῖς
  chosen_reading: his parents
  alternative_readings:
  - his father and mother
  rationale: The Greek text explicitly uses 'his parents.' Rendering it this way reflects Luke's wording without implying a denial of the virgin conception affirmed elsewhere in Luke. The narrative uses ordinary familial language from the human perspective, and the translation should preserve that tension rather than harmonize it away.
