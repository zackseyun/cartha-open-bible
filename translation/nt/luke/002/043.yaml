id: LUK.2.43
reference: Luke 2:43
source:
  edition: SBLGNT
  text: καὶ τελειωσάντων τὰς ἡμέρας, ἐν τῷ ὑποστρέφειν αὐτοὺς ὑπέμεινεν Ἰησοῦς ὁ παῖς ἐν Ἰερουσαλήμ, καὶ οὐκ ⸂ἔγνωσαν οἱ γονεῖς⸃ αὐτοῦ.
translation:
  text: And when they had completed the days[a], as they were returning, Jesus the boy remained in Jerusalem[b], and his parents did not know it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stayed behind.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'his parents'; Luke's ordinary family language here does not negate the virgin conception stated earlier in the Gospel.
    reason: cross_reference
lexical_decisions:
- source_word: τελειωσάντων τὰς ἡμέρας
  chosen: when they had completed the days
  alternatives:
  - after they had finished the days
  - when the days were completed
  lexicon: BDAG
  rationale: The genitive absolute marks a completed circumstance prior to the main action. 'Completed the days' preserves the idiom referring to the festival days without over-specifying beyond the Greek.
- source_word: ἐν τῷ ὑποστρέφειν αὐτοὺς
  chosen: as they were returning
  alternatives:
  - while they were returning
  - when they returned
  lexicon: BDAG
  rationale: The articular infinitive with ἐν commonly expresses contemporaneous time. 'As they were returning' captures the ongoing action during which Jesus remained behind.
- source_word: ὑπέμεινεν
  chosen: remained
  alternatives:
  - stayed behind
  - stayed
  lexicon: BDAG
  rationale: In this context ὑπομένω means to stay behind or remain. 'Remained' is slightly more formal and fits the narrative flow; 'stayed behind' is a valid contextual alternative preserved in a footnote.
- source_word: ὁ παῖς
  chosen: the boy
  alternatives:
  - the child
  - the youth
  lexicon: BDAG
  rationale: παῖς can mean child, boy, servant, or youth depending on context. Since Jesus is twelve years old in the immediate context, 'the boy' is the most natural and age-appropriate rendering in English.
- source_word: ἐν Ἰερουσαλήμ
  chosen: in Jerusalem
  lexicon: BDAG
  rationale: Standard locative use of ἐν with a place name.
- source_word: οὐκ ἔγνωσαν
  chosen: did not know it
  alternatives:
  - did not realize it
  - were unaware
  lexicon: BDAG
  rationale: γινώσκω here denotes coming to know or realizing a fact. English idiom normally supplies the object ('it') to make clear that they did not know Jesus had remained behind.
- source_word: οἱ γονεῖς αὐτοῦ
  chosen: his parents
  alternatives:
  - his father and mother
  lexicon: BDAG
  rationale: γονεῖς straightforwardly means 'parents.' This is the direct lexical sense and avoids unnecessary expansion.
