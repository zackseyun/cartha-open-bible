theological_decisions:
- issue: Reference to Joseph as 'your father' in relation to Jesus' divine sonship
  chosen_reading: Retain the plain wording 'your father' in the main text without qualification.
  alternative_readings:
  - your earthly father
  rationale: The Greek text presents Mary's own words as 'your father and I.' In light of orthodox Christology and the virgin-birth context, this does not deny Jesus' divine sonship; it reflects ordinary social and familial reference from Mary's perspective. Adding 'earthly' would interpret rather than translate. The narrative tension is preserved and clarified by the following verse.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological tension rather than resolve it.
