id: LUK.2.48
reference: Luke 2:48
source:
  edition: SBLGNT
  text: καὶ ἰδόντες αὐτὸν ἐξεπλάγησαν, καὶ ⸂εἶπεν πρὸς αὐτὸν ἡ μήτηρ αὐτοῦ⸃· Τέκνον, τί ἐποίησας ἡμῖν οὕτως; ἰδοὺ ὁ πατήρ σου καὶ ἐγὼ ὀδυνώμενοι ⸀ἐζητοῦμέν σε.
translation:
  text: And when they saw him[a], they were astonished, and his mother said to him, “Child, why have you done this to us? Look, your father and I have been anxiously looking for you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in distress' / 'in anguish' for 'anxiously'; the Greek participle conveys emotional pain during the search.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  chosen: when they saw
  alternatives:
  - seeing him
  lexicon: BDAG
  rationale: 'Aorist participle rendered temporally in natural English: ''when they saw him.'' This preserves the sequence without awkward literalism.'
- source_word: ἐξεπλάγησαν
  chosen: they were astonished
  alternatives:
  - they were amazed
  - they were greatly surprised
  lexicon: BDAG
  rationale: Conveys strong surprise or amazement. 'Astonished' fits the intensity and remains readable.
- source_word: Τέκνον
  chosen: Child
  alternatives:
  - Son
  - My child
  lexicon: BDAG
  rationale: Vocative τέκνον is an affectionate but not necessarily male-specific address. 'Child' preserves the maternal address without adding possessive wording not present in Greek. 'Son' is possible contextually but less precise lexically.
- source_word: τί ἐποίησας ἡμῖν οὕτως
  chosen: why have you done this to us?
  alternatives:
  - what have you done to us like this?
  - why did you treat us this way?
  lexicon: BDAG
  rationale: Idiomatic English requires 'why' rather than a wooden 'what.' The phrase expresses complaint about Jesus' action toward them. 'Done this to us' preserves the relational force of ἡμῖν and οὕτως.
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Introduces emphatic attention in direct speech. 'Look' is natural modern English; 'Behold' would be archaic.
- source_word: ὁ πατήρ σου
  chosen: your father
  alternatives:
  - your earthly father
  lexicon: BDAG
  rationale: The Greek simply says 'your father.' Because the immediate narrative context will distinguish Joseph from Jesus' divine sonship in the next verse, the translation should not import an interpretive qualifier into the main text.
- source_word: ὀδυνώμενοι
  chosen: anxiously
  alternatives:
  - in distress
  - grieving
  - in anguish
  lexicon: BDAG
  rationale: The participle denotes emotional pain, distress, or anguish. In English, combined with 'looking for you,' an adverbial rendering ('anxiously') is idiomatic and captures the sense of troubled searching.
- source_word: ἐζητοῦμέν σε
  chosen: have been anxiously looking for you
  alternatives:
  - were seeking you
  - have been searching for you
  lexicon: BDAG
  rationale: Imperfect indicates ongoing action in past time. English present perfect progressive ('have been ... looking for you') naturally conveys the continuing search up to the moment of speaking. 'Looking for' is more idiomatic than 'seeking' in this family context.
