theological_decisions:
- issue: Referent of πνεῦμα ἦν ἅγιον ἐπ’ αὐτόν
  chosen_reading: the Holy Spirit was upon him
  alternative_readings:
  - a holy spirit was upon him
  rationale: Within Luke's usage and immediate context (vv. 26–27), the phrase refers to the Holy Spirit, not merely an impersonal disposition or generic holy spirit. The translation preserves orthodox Trinitarian reading without importing more than the text supports.
