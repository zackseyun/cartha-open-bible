id: LUK.2.25
reference: Luke 2:25
source:
  edition: SBLGNT
  text: Καὶ ἰδοὺ ⸂ἄνθρωπος ἦν⸃ ἐν Ἰερουσαλὴμ ᾧ ὄνομα Συμεών, καὶ ὁ ἄνθρωπος οὗτος δίκαιος καὶ εὐλαβής, προσδεχόμενος παράκλησιν τοῦ Ἰσραήλ, καὶ πνεῦμα ἦν ἅγιον ἐπ’ αὐτόν·
translation:
  text: And behold[a], there was a man in Jerusalem whose name was Simeon, and this man was righteous and devout, waiting for the consolation of Israel[b], and the Holy Spirit was upon him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the comfort of Israel.' The phrase refers to Israel's hoped-for divine comfort and restoration.
    reason: lexical_alternative
  - marker: b
    text: Or possibly 'a holy spirit was upon him,' though in Luke's context this most naturally refers to the Holy Spirit.
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retained as 'behold' to preserve Luke's discourse marker of vivid introduction. Though somewhat elevated in English, it remains readable and signals narrative significance better than omitting it.
- source_word: ἄνθρωπος
  chosen: man
  alternatives:
  - person
  lexicon: BDAG
  rationale: Rendered 'man' because the referent is an individual male, Simeon. This follows the gender-accurate principle rather than neutralizing the term.
- source_word: ᾧ ὄνομα Συμεών
  chosen: whose name was Simeon
  alternatives:
  - named Simeon
  lexicon: BDAG
  rationale: Translated idiomatically into natural English while preserving the identificational force of the Greek construction.
- source_word: δίκαιος
  chosen: righteous
  alternatives:
  - just
  lexicon: BDAG
  rationale: '''Righteous'' best preserves the moral and covenantal sense of the adjective in this characterization of Simeon. ''Just'' is possible but can sound narrower in modern English.'
- source_word: εὐλαβής
  chosen: devout
  alternatives:
  - reverent
  - careful in piety
  lexicon: BDAG
  rationale: '''Devout'' is the most natural concise rendering for a person marked by reverence toward God and careful piety.'
- source_word: προσδεχόμενος
  chosen: waiting for
  alternatives:
  - looking for
  - expecting
  - eagerly awaiting
  lexicon: BDAG
  rationale: The participle conveys expectant waiting. 'Waiting for' is clear modern English and fits the ongoing posture being described.
- source_word: παράκλησιν τοῦ Ἰσραήλ
  chosen: the consolation of Israel
  alternatives:
  - the comfort of Israel
  lexicon: BDAG
  rationale: '''Consolation'' preserves the rich biblical resonance of promised comfort/restoration for God''s people, likely echoing Isaianic hope. ''Comfort'' is possible but slightly less idiomatic here in established biblical usage.'
- source_word: πνεῦμα ἅγιον
  chosen: the Holy Spirit
  alternatives:
  - a holy spirit
  - holy spirit
  lexicon: BDAG
  rationale: Although the Greek lacks the article before πνεῦμα, in Luke-Acts this expression commonly refers to the personal Holy Spirit. English idiom and context favor the definite rendering.
- source_word: ἐπ’ αὐτόν
  chosen: was upon him
  alternatives:
  - was on him
  - rested on him
  lexicon: BDAG
  rationale: '''Was upon him'' is the most natural formal rendering of ἐπί with accusative here and preserves the biblical idiom of the Spirit''s empowering/presence.'
