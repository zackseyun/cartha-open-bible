theological_decisions:
- issue: Scope of παντὶ τῷ λαῷ
  chosen_reading: for all the people
  alternative_readings:
  - for all people
  rationale: The Greek article with λαός most naturally points to a definite people,
    likely Israel in the immediate narrative setting. Rendering it as 'all the people'
    avoids prematurely universalizing the phrase beyond what this verse itself states,
    while not denying the broader Lukan theme of salvation for the nations elsewhere.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
