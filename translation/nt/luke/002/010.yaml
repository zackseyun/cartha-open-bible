id: LUK.2.10
reference: Luke 2:10
source:
  edition: SBLGNT
  text: καὶ εἶπεν αὐτοῖς ὁ ἄγγελος· Μὴ φοβεῖσθε, ἰδοὺ γὰρ εὐαγγελίζομαι ὑμῖν χαρὰν
    μεγάλην ἥτις ἔσται παντὶ τῷ λαῷ,
translation:
  text: And the angel said to them, “Do not be afraid, for behold, I bring you good
    news of great joy that will be for all the people,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “for all people.” The Greek more literally reads “for all the people,”
      which in Luke often has a definite sense in context.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ἄγγελος
  chosen: the angel
  alternatives:
  - an angel
  lexicon: BDAG
  rationale: The article naturally points back to the angel already introduced in
    the context, so 'the angel' is the most contextually precise rendering.
- source_word: Μὴ φοβεῖσθε
  chosen: Do not be afraid
  alternatives:
  - Do not fear
  lexicon: BDAG
  rationale: A present middle/passive imperative with μή gives a prohibition. 'Do
    not be afraid' is idiomatic modern English and preserves the sense without archaic
    stiffness.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing attention. 'Behold' preserves the
    emphatic force and solemn tone better than the more casual 'look' or 'see,' while
    remaining understandable in context.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ introduces the reason the shepherds need not fear. 'For' is concise
    and fits the explanatory relation.
- source_word: εὐαγγελίζομαι
  chosen: I bring you good news
  alternatives:
  - I announce good news to you
  - I proclaim good news to you
  lexicon: BDAG
  rationale: The verb means to announce or proclaim good news. 'I bring you good news'
    is natural English and preserves the personal dative ὑμῖν. It also avoids importing
    later technical Christian jargon beyond the immediate lexical sense.
- source_word: ὑμῖν
  chosen: you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: The dative is naturally incorporated in English with the verb phrase
    'bring you good news.'
- source_word: χαρὰν μεγάλην
  chosen: great joy
  alternatives:
  - a great joy
  - very great joy
  lexicon: BDAG
  rationale: The accusative phrase is the content/result associated with the good
    news. 'Great joy' is the standard and natural rendering; the article is not required
    in English.
- source_word: ἥτις
  chosen: that
  alternatives:
  - which
  - and it
  lexicon: BDAG
  rationale: ἥτις introduces a qualitative relative clause referring to the joy. 'That'
    gives smooth English while preserving the clause connection.
- source_word: ἔσται
  chosen: will be
  alternatives:
  - is going to be
  lexicon: BDAG
  rationale: Simple future of εἰμί; 'will be' is the straightforward rendering.
- source_word: παντὶ τῷ λαῷ
  chosen: for all the people
  alternatives:
  - for all people
  - for the whole people
  lexicon: BDAG
  rationale: λαός with the article in Luke commonly refers to the people in a more
    definite, covenant-historical sense rather than humanity in general. 'All the
    people' preserves that definiteness better than 'all people,' while still allowing
    the wider salvation-historical trajectory to unfold in context.
