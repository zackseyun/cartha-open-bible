theological_decisions:
- issue: Scope of οἰκουμένη
  chosen_reading: all the inhabited world
  alternative_readings:
  - the whole world
  - the whole Roman world
  - the whole empire
  rationale: This is primarily a historical-lexical issue rather than a doctrinal
    one. The chosen rendering preserves the Greek term's ordinary sense while allowing
    readers to infer the Roman imperial context from the setting. A footnote preserves
    the more contextual alternative.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it'
