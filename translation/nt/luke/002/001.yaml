id: LUK.2.1
reference: Luke 2:1
source:
  edition: SBLGNT
  text: Ἐγένετο δὲ ἐν ταῖς ἡμέραις ἐκείναις ἐξῆλθεν δόγμα παρὰ Καίσαρος Αὐγούστου
    ἀπογράφεσθαι πᾶσαν τὴν οἰκουμένην·
translation:
  text: Now it happened in those days that a decree went out from Caesar Augustus
    that all the inhabited world should be registered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole Roman world' or 'the whole empire.' The Greek term often refers
      to the inhabited world as conceived within the Roman imperial context.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐγένετο
  chosen: it happened
  alternatives:
  - it came to pass
  - it occurred
  lexicon: BDAG
  rationale: Narrative formula introducing a new event. 'It happened' preserves the
    idiomatic force without archaic English like 'it came to pass.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - then
  - ', (left untranslated)'
  lexicon: BDAG
  rationale: Marks narrative progression/transition. 'Now' gives a natural English
    discourse shift at the start of the sentence.
- source_word: ἐν ταῖς ἡμέραις ἐκείναις
  chosen: in those days
  alternatives:
  - during those days
  lexicon: BDAG
  rationale: Standard temporal expression. 'In those days' is both natural and close
    to the Greek structure.
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - was issued
  - came out
  lexicon: BDAG
  rationale: Literally 'went out' and commonly used for an edict proceeding from an
    authority. Retained in English because it remains intelligible and preserves the
    imagery of official promulgation.
- source_word: δόγμα
  chosen: decree
  alternatives:
  - edict
  - ordinance
  lexicon: BDAG
  rationale: Refers here to an imperial order. 'Decree' is clear modern English and
    suitably formal.
- source_word: παρὰ Καίσαρος Αὐγούστου
  chosen: from Caesar Augustus
  alternatives:
  - by Caesar Augustus
  lexicon: BDAG
  rationale: παρά with genitive indicates source/origin. 'From Caesar Augustus' best
    reflects the Greek while remaining idiomatic.
- source_word: ἀπογράφεσθαι
  chosen: should be registered
  alternatives:
  - should be enrolled
  - should be recorded
  - should be counted in a census
  lexicon: BDAG
  rationale: The verb refers to official registration, often in connection with a
    census or taxation. 'Should be registered' preserves the verbal idea without importing
    more specificity than the verse itself states.
- source_word: πᾶσαν τὴν οἰκουμένην
  chosen: all the inhabited world
  alternatives:
  - the whole world
  - the whole empire
  lexicon: BDAG
  rationale: οἰκουμένη in this context refers to the inhabited world, often specifically
    the Roman world. 'All the inhabited world' is more precise than the potentially
    misleading 'whole world,' while avoiding over-interpretation as 'empire' in the
    main text.
