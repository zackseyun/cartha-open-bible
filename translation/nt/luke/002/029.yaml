theological_decisions:
- issue: Whether Simeon’s statement should be rendered as an explicit reference to
    death
  chosen_reading: Retain the metaphor of release/departure without making death explicit
    in the main text
  alternative_readings:
  - Now you are letting your servant die in peace
  - Now you dismiss your servant in peace
  rationale: The context strongly implies Simeon is ready to die, but the Greek verb
    ἀπολύω itself means release/dismiss rather than explicitly 'cause to die.' Preserving
    the metaphor maintains the text’s poetic and theological tension without over-specification.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
