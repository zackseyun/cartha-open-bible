id: LUK.2.29
reference: Luke 2:29
source:
  edition: SBLGNT
  text: Νῦν ἀπολύεις τὸν δοῦλόν σου, δέσποτα, κατὰ τὸ ῥῆμά σου ἐν εἰρήνῃ·
translation:
  text: Now you are dismissing your slave, Master, according to your word, in peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your servant.' The Greek δοῦλος can mean either 'slave' or 'servant';
      'slave' is used here because the paired address 'Master' makes the bond of ownership/service
      especially explicit.
    reason: lexical_alternative
  - marker: b
    text: The sense is that Simeon is ready to depart this life in peace, though the
      Greek says more literally 'you are releasing' or 'dismissing.'
    reason: alternative_reading
lexical_decisions:
- source_word: Νῦν
  chosen: Now
  alternatives:
  - At this time
  lexicon: BDAG
  rationale: Temporal adverb marking the present fulfillment of Simeon’s expectation.
    'Now' is the natural and sufficiently direct English equivalent.
- source_word: ἀπολύεις
  chosen: are releasing
  alternatives:
  - dismiss
  - let go
  - set free
  lexicon: BDAG
  rationale: Present active indicative, second singular. In context Simeon speaks
    of being allowed to depart, likely with death in view. 'Are releasing' preserves
    the verbal image without over-interpreting it as explicitly 'letting die.'
- source_word: τὸν δοῦλόν σου
  chosen: your slave
  alternatives:
  - your servant
  - your bondservant
  lexicon: BDAG
  rationale: δοῦλος can mean either 'slave' or 'servant' depending on context. Per
    doctrine, 'slave' is preferred where bonded status is salient. Here Simeon addresses
    God as δέσποτα ('Master'), making the master-slave relation explicit, so 'your
    slave' best preserves the relational force.
- source_word: δέσποτα
  chosen: Master
  alternatives:
  - Sovereign Lord
  - Lord
  lexicon: BDAG
  rationale: Vocative of δεσπότης, denoting an owner/master with authority. 'Master'
    best matches the immediate pairing with δοῦλος and preserves the personal address.
    'Sovereign Lord' is interpretive expansion not required by the Greek.
- source_word: κατὰ τὸ ῥῆμά σου
  chosen: according to your word
  alternatives:
  - in accordance with your word
  - as you said
  lexicon: BDAG
  rationale: κατά with the accusative here expresses conformity. ῥῆμα is 'word' or
    'spoken word/matter.' 'According to your word' is both natural and close to the
    Greek, preserving the allusion to divine promise.
- source_word: ἐν εἰρήνῃ
  chosen: in peace
  alternatives:
  - peacefully
  lexicon: BDAG
  rationale: Prepositional phrase best rendered literally. 'In peace' preserves the
    biblical resonance of peaceful departure under divine favor better than the adverb
    'peacefully.'
