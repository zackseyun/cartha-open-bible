theological_decisions:
- issue: Gendered distributive expression in ἕκαστος ... ἑαυτοῦ
  chosen_reading: Retain singular masculine sense in English as 'each to his own city'
  alternative_readings:
  - each to their own city
  - each to his hometown
  rationale: The Greek uses a grammatically masculine singular distributive construction. Per the translation philosophy, gender-accurate rendering is preferred over gender-neutral smoothing unless context demands otherwise. 'City' is also retained rather than 'hometown' because the Greek says πόλις, not a more interpretive term for ancestral home.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
