id: LUK.2.3
reference: Luke 2:3
source:
  edition: SBLGNT
  text: καὶ ἐπορεύοντο πάντες ἀπογράφεσθαι, ἕκαστος εἰς τὴν ⸀ἑαυτοῦ πόλιν.
translation:
  text: And everyone was going to be registered[b][a], each to his own city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''each to their own city.'' The Greek is singular masculine: ''each to his own city.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'to enroll' / 'to be enrolled.' The verb refers to official registration in the census.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπορεύοντο
  chosen: was going
  alternatives:
  - went
  - was traveling
  lexicon: BDAG
  rationale: Imperfect middle/passive form of πορεύομαι conveys ongoing or customary movement in the narrative. 'Was going' preserves the imperfective sense better than a simple past 'went,' while remaining natural English.
- source_word: πάντες
  chosen: everyone
  alternatives:
  - all
  - all the people
  lexicon: BDAG
  rationale: The nominative plural means 'all,' but idiomatic English prefers 'everyone' here. This preserves the distributive sense without adding a noun not present in the Greek.
- source_word: ἀπογράφεσθαι
  chosen: to be registered
  alternatives:
  - to enroll
  - to be enrolled
  - to be counted in a census
  lexicon: BDAG
  rationale: The infinitive refers to official registration in connection with the census context. 'To be registered' is clear, modern, and sufficiently formal; 'enrolled' is possible but less immediately transparent to contemporary readers.
- source_word: ἕκαστος
  chosen: each
  alternatives:
  - each one
  - every one
  lexicon: BDAG
  rationale: This term is distributive, emphasizing individual compliance. 'Each' is concise and natural in English and pairs well with 'everyone' earlier in the clause.
- source_word: ἑαυτοῦ
  chosen: his own
  alternatives:
  - their own
  - one's own
  lexicon: BDAG
  rationale: The Greek is grammatically singular masculine following ἕκαστος and is best represented in English as 'his own' to preserve the source's gender and number. This follows the project's gender-accurate policy rather than flattening to plural.
- source_word: πόλιν
  chosen: city
  alternatives:
  - town
  lexicon: BDAG
  rationale: πόλις normally means 'city' or 'town.' 'City' is the standard rendering and fits the administrative setting of returning to one's ancestral municipality.
