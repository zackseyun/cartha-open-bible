theological_decisions:
- issue: Whether τὸ σωτήριόν σου should be rendered as an abstract noun ('salvation')
    or personalized as 'Savior' in light of the infant Messiah being present
  chosen_reading: your salvation
  alternative_readings:
  - your Savior
  rationale: The Greek expression is not the usual personal noun σωτήρ ('Savior')
    but σωτήριον, which more naturally denotes salvation, deliverance, or the saving
    thing/work. Rendering it 'your salvation' preserves Luke's wording while allowing
    the reader to perceive that God's salvation is embodied in Jesus without the translation
    making that interpretive move explicitly.
  doctrine_reference: Translation philosophy §1 (original-language primacy), §3 (preserve
    theological tension rather than resolve it)
