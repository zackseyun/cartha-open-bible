id: LUK.2.30
reference: Luke 2:30
source:
  edition: SBLGNT
  text: ὅτι εἶδον οἱ ὀφθαλμοί μου τὸ σωτήριόν σου
translation:
  text: because my eyes have seen your salvation
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your Savior.' The Greek says 'your salvation,' but in context God's
      salvation is present in the person of Jesus.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: In context this introduces the reason for Simeon's preceding statement
    ('now you are releasing your servant in peace'), so the causal sense 'because'
    is clearer in modern English than the more formal 'for' or the less explicit 'that'.
- source_word: εἶδον
  chosen: have seen
  alternatives:
  - saw
  lexicon: BDAG
  rationale: The Greek aorist is formally past, but in English the present perfect
    naturally conveys a completed action with present relevance, fitting Simeon's
    immediate response upon seeing the child. 'Saw' is possible but sounds flatter
    in this context.
- source_word: οἱ ὀφθαλμοί μου
  chosen: my eyes
  alternatives:
  - I
  lexicon: BDAG
  rationale: The Greek explicitly says 'my eyes,' a vivid embodied expression worth
    preserving rather than reducing to the pronoun 'I.' English idiom readily allows
    the literal rendering.
- source_word: τὸ σωτήριόν σου
  chosen: your salvation
  alternatives:
  - your saving act
  - your means of salvation
  - your Savior
  lexicon: BDAG
  rationale: The neuter substantive/adjectival form σωτήριον denotes salvation/deliverance
    rather than directly naming a person as 'Savior.' 'Your salvation' preserves the
    wording and the theological richness that God's saving purpose is now seen in
    the child. More interpretive renderings like 'your Savior' go beyond the lexical
    form, though the personified sense is contextually implicit.
