id: LUK.2.37
reference: Luke 2:37
source:
  edition: SBLGNT
  text: καὶ αὐτὴ χήρα ⸀ἕως ἐτῶν ὀγδοήκοντα τεσσάρων,) ἣ οὐκ ⸀ἀφίστατο τοῦ ἱεροῦ νηστείαις
    καὶ δεήσεσιν λατρεύουσα νύκτα καὶ ἡμέραν.
translation:
  text: and then as a widow until she was eighty-four years old. She did not depart
    from the temple, worshiping with fastings and prayers night and day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and as a widow for eighty-four years.' The Greek can be understood
      as giving either Anna's age or the length of her widowhood.
    reason: alternative_reading
  - marker: b
    text: The Greek word here refers to the temple complex or precincts, not specifically
      the inner sanctuary.
    reason: cultural_note
  - marker: c
    text: Or 'supplications' or 'petitions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χήρα
  chosen: widow
  lexicon: BDAG
  rationale: Standard sense of a woman whose husband has died. In context it continues
    the description of Anna's life status after seven years of marriage.
- source_word: ἕως ἐτῶν ὀγδοήκοντα τεσσάρων
  chosen: until she was eighty-four years old
  alternatives:
  - for eighty-four years
  - up to eighty-four years of age
  lexicon: BDAG
  rationale: The phrase is syntactically compressed and can be understood either as
    her age ('until eighty-four years [old]') or, in relation to the previous verse,
    as the duration of her widowhood. Given the immediate wording in this verse and
    common English readability, the main text takes it as her age. The duration reading
    is preserved in a footnote because it is a well-known alternative.
- source_word: ἀφίστατο τοῦ ἱεροῦ
  chosen: did not depart from the temple
  alternatives:
  - did not leave the temple precincts
  - was not absent from the temple
  lexicon: BDAG
  rationale: Imperfect middle indicates ongoing customary action. 'Temple' is the
    natural rendering of ἱερόν, though the term refers to the temple complex/precincts
    rather than the sanctuary proper.
- source_word: ἱεροῦ
  chosen: temple
  alternatives:
  - temple precincts
  - temple complex
  lexicon: BDAG
  rationale: ἱερόν denotes the broader temple area, not ναός, the inner sanctuary.
    'Temple' is retained in the main text for idiomatic English, with the more precise
    nuance noted in a footnote.
- source_word: νηστείαις
  chosen: with fastings
  alternatives:
  - with fasting
  - in fastings
  lexicon: BDAG
  rationale: Dative plural expresses the manner or means accompanying her worship.
    'Fastings' preserves the plural form and repeated practice more closely than the
    singular.
- source_word: δεήσεσιν
  chosen: prayers
  alternatives:
  - petitions
  - supplications
  lexicon: BDAG
  rationale: δέησις often emphasizes entreaty or petition, but 'prayers' is the most
    natural English in this collocation and context. More specific alternatives are
    preserved in a footnote.
- source_word: λατρεύουσα
  chosen: worshiping
  alternatives:
  - serving in worship
  - rendering sacred service
  lexicon: BDAG
  rationale: The participle describes her devotional service to God. 'Worshiping'
    communicates the religious sense clearly in modern English, while avoiding overly
    technical phrasing.
- source_word: νύκτα καὶ ἡμέραν
  chosen: night and day
  alternatives:
  - by night and by day
  - day and night
  lexicon: BDAG
  rationale: A standard idiom for continual devotion. 'Night and day' follows the
    Greek order and reads naturally in English.
