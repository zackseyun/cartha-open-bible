theological_decisions:
- issue: Interpretation of Anna's age or duration of widowhood
  chosen_reading: The main text reads the phrase as indicating that Anna was eighty-four
    years old.
  alternative_readings:
  - The phrase may mean that she had been a widow for eighty-four years.
  rationale: This is an exegetical rather than doctrinal issue. The Greek permits
    either understanding in relation to the preceding verse. To preserve the ambiguity
    rather than over-resolve it, the alternative is retained in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
