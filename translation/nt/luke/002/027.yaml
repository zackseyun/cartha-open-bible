id: LUK.2.27
reference: Luke 2:27
source:
  edition: SBLGNT
  text: καὶ ἦλθεν ἐν τῷ πνεύματι εἰς τὸ ἱερόν· καὶ ἐν τῷ εἰσαγαγεῖν τοὺς γονεῖς τὸ παιδίον Ἰησοῦν τοῦ ποιῆσαι αὐτοὺς κατὰ τὸ εἰθισμένον τοῦ νόμου περὶ αὐτοῦ
translation:
  text: And he came in the Spirit into the temple[a]; and when the parents brought in the child Jesus to do for him according to the custom of the law[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the Spirit.' The Greek expression could be rendered either way; 'in the Spirit' more closely preserves the wording and Luke's repeated emphasis on the Holy Spirit in this context.
    reason: lexical_alternative
  - marker: b
    text: Greek 'the parents.' Luke uses ordinary family language here for Mary and Joseph in their care of Jesus.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν τῷ πνεύματι
  chosen: in the Spirit
  alternatives:
  - by the Spirit
  - in spirit
  lexicon: BDAG
  rationale: The article with πνεύματι and Luke's usage favor reference to the Holy Spirit rather than merely Simeon's inner disposition. 'In the Spirit' preserves the Greek prepositional form and theological nuance without over-paraphrasing.
- source_word: ἱερόν
  chosen: temple
  alternatives:
  - temple courts
  - sacred precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary (ναός). 'Temple' is the standard readable rendering; the broader precinct sense is not explicit enough here to require 'temple courts' in the main text.
- source_word: ἐν τῷ εἰσαγαγεῖν
  chosen: when ... brought in
  alternatives:
  - at the bringing in of
  - as ... were bringing in
  lexicon: BDAG
  rationale: The articular infinitive with ἐν is naturally temporal here. English idiom is best served by 'when ... brought in,' which preserves the temporal force without awkward literalism.
- source_word: γονεῖς
  chosen: the parents
  alternatives:
  - his parents
  - father and mother
  lexicon: BDAG
  rationale: The Greek has the article plus plural noun, 'the parents.' This is the plain lexical sense and reflects Luke's narrative perspective regarding Mary and Joseph as Jesus' human parents/guardians, without making a doctrinal claim about biological paternity beyond the immediate social context.
- source_word: παιδίον Ἰησοῦν
  chosen: the child Jesus
  alternatives:
  - the boy Jesus
  - the child, Jesus
  lexicon: BDAG
  rationale: παιδίον here denotes a child/infant. 'The child Jesus' is natural English and keeps the appositional naming.
- source_word: τοῦ ποιῆσαι αὐτοὺς
  chosen: to do for him
  alternatives:
  - for them to do
  - to perform for him
  lexicon: BDAG
  rationale: 'The genitive articular infinitive expresses purpose. αὐτούς is the understood subject of the infinitive (''the parents''), while περὶ αὐτοῦ clarifies the action concerns the child. English idiom requires restructuring: ''to do for him'' captures the purpose of the parents'' action regarding Jesus.'
- source_word: κατὰ τὸ εἰθισμένον τοῦ νόμου
  chosen: according to the custom of the law
  alternatives:
  - according to what was customary under the law
  - according to the law's custom
  lexicon: BDAG
  rationale: εἰθισμένον denotes what is customary or prescribed by custom. The phrase refers to the customary requirement associated with the Mosaic law. 'According to the custom of the law' is both accurate and readable.
- source_word: περὶ αὐτοῦ
  chosen: for him
  alternatives:
  - concerning him
  - with respect to him
  lexicon: BDAG
  rationale: περί with genitive here indicates reference or relation. 'For him' is the most natural English in this ritual context, where the parents are carrying out what the law required with respect to Jesus.
