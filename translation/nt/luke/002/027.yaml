theological_decisions:
- issue: Reference of 'the Spirit' in Simeon's action
  chosen_reading: Holy Spirit
  alternative_readings:
  - Simeon's own spirit/disposition
  rationale: In the immediate context (Luke 2:25–27), repeated references to the Holy Spirit strongly support understanding πνεῦμα here as the Holy Spirit. The translation preserves this with capitalized 'Spirit' while retaining the Greek prepositional wording.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Use of 'the parents' for Mary and Joseph
  chosen_reading: Translate γονεῖς straightforwardly as 'the parents'
  alternative_readings:
  - the guardians
  - Joseph and Mary
  rationale: The text's ordinary social description should not be weakened to avoid misunderstanding, nor expanded beyond the Greek. This does not deny the virgin conception; it reflects Luke's narrative description of Jesus' human family unit in context.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
