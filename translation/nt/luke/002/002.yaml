id: LUK.2.2
reference: Luke 2:2
source:
  edition: SBLGNT
  text: (⸀αὕτη ἀπογραφὴ πρώτη ἐγένετο ἡγεμονεύοντος τῆς Συρίας Κυρηνίου·)
translation:
  text: This registration took place first while Quirinius was governing Syria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'This registration took place before Quirinius was governing Syria.'
      Some understand πρώτη here in a comparative temporal sense.
    reason: alternative_reading
  - marker: b
    text: Or, 'census' for 'registration.' The Greek term refers to an official enrollment,
      often connected with taxation.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὕτη
  chosen: This
  alternatives:
  - This one
  lexicon: BDAG
  rationale: Demonstrative referring back to the census/registration just mentioned
    in v. 1; simple deictic 'This' is natural English.
- source_word: ἀπογραφὴ
  chosen: registration
  alternatives:
  - census
  - enrollment
  lexicon: BDAG
  rationale: The term denotes an official registration, often for taxation or census
    purposes. 'Registration' preserves the administrative sense without over-specifying;
    'census' is possible but slightly narrower and more traditional.
- source_word: πρώτη
  chosen: first
  alternatives:
  - before
  - former
  lexicon: BDAG
  rationale: The most straightforward sense is ordinal, 'first.' Because this verse
    is historically and syntactically debated, alternatives such as 'before' are worth
    preserving in a footnote, but the default main-text rendering follows the plain
    adjectival sense.
- source_word: ἐγένετο
  chosen: took place
  alternatives:
  - happened
  - occurred
  - was
  lexicon: BDAG
  rationale: Idiomatic rendering of γίνομαι for an event coming about. 'Took place'
    is natural modern English and fits the administrative event described.
- source_word: ἡγεμονεύοντος
  chosen: while ... was governing
  alternatives:
  - while ... was governor of
  - during the governorship of
  lexicon: BDAG
  rationale: Genitive absolute indicating contemporaneous circumstance. 'While Quirinius
    was governing' preserves the participial temporal force without forcing a specific
    official title beyond the Greek verb.
- source_word: τῆς Συρίας
  chosen: Syria
  lexicon: BDAG
  rationale: Standard geographical rendering of the province name.
- source_word: Κυρηνίου
  chosen: Quirinius
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Κυρήνιος.
