theological_decisions:
- issue: Interpretation of πρώτη in a historically disputed clause
  chosen_reading: 'Render πρώτη as ''first'' in the main text: ''This registration
    first took place while Quirinius was governing Syria.'''
  alternative_readings:
  - This registration took place before Quirinius was governing Syria.
  - This was the first registration when Quirinius was governor of Syria.
  rationale: The verse is syntactically and historically contested, but no doctrinal
    issue is at stake. Following optimal equivalence and original-language primacy,
    the main text keeps the ordinary ordinal sense of πρώτη. Because the alternative
    'before Quirinius was governing' has been argued by some interpreters, it is preserved
    in a footnote rather than adopted without necessity.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
