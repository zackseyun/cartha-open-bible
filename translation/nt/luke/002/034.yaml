theological_decisions:
- issue: Meaning of ἀνάστασις in the phrase 'πτῶσιν καὶ ἀνάστασιν πολλῶν'
  chosen_reading: Rendered broadly as 'rise' rather than explicitly 'resurrection.'
  alternative_readings:
  - rising
  - resurrection
  rationale: The immediate pairing with 'fall' suggests a contrast of downfall and being raised up among many in Israel. While ἀνάστασις can denote resurrection, translating it as 'rise' preserves the broader ambiguity and avoids importing a narrower doctrinal claim than the phrase itself requires.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of κεῖται with reference to Jesus' role
  chosen_reading: Rendered as 'is appointed.'
  alternative_readings:
  - is set
  - lies
  rationale: The context is prophetic and purposive, indicating destiny or divine appointment rather than physical posture. 'Is appointed' communicates this without overstating causation beyond the text.
  doctrine_reference: Original-language primacy over translation tradition; optimal equivalence.
