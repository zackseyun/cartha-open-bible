id: LUK.2.34
reference: Luke 2:34
source:
  edition: SBLGNT
  text: καὶ εὐλόγησεν αὐτοὺς Συμεὼν καὶ εἶπεν πρὸς Μαριὰμ τὴν μητέρα αὐτοῦ· Ἰδοὺ οὗτος κεῖται εἰς πτῶσιν καὶ ἀνάστασιν πολλῶν ἐν τῷ Ἰσραὴλ καὶ εἰς σημεῖον ἀντιλεγόμενον,
translation:
  text: And Simeon blessed them and said to Mary his mother[b], “Behold, this one is appointed for the fall and rising of many in Israel, and for a sign that is opposed,[a]”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a sign spoken against.' The Greek participle emphasizes verbal contradiction/opposition; 'opposed' gives the broader sense in natural English.
    reason: lexical_alternative
  - marker: b
    text: Or 'the rising' or possibly 'the resurrection' of many in Israel. The Greek can carry a broader sense of being raised up, while also echoing resurrection language.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐλόγησεν
  chosen: blessed
  alternatives:
  - spoke a blessing over
  lexicon: BDAG
  rationale: Standard rendering of εὐλογέω in narrative context; concise and natural in English.
- source_word: αὐτοὺς
  chosen: them
  alternatives:
  - them both
  lexicon: BDAG
  rationale: The pronoun is plural and naturally refers to the family present; 'them' preserves the Greek without over-specifying.
- source_word: πρὸς Μαριὰμ
  chosen: to Mary
  alternatives:
  - toward Mary
  lexicon: BDAG
  rationale: Idiomatic English for speech directed at a person.
- source_word: τὴν μητέρα αὐτοῦ
  chosen: his mother
  alternatives:
  - the mother of him
  lexicon: BDAG
  rationale: Natural English possessive; αὐτοῦ refers to the child Jesus in context.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Introduces solemn attention. 'Look' preserves the deictic force in readable modern English; 'Behold' is more traditional but archaic.
- source_word: οὗτος
  chosen: this one
  alternatives:
  - this child
  - he
  lexicon: BDAG
  rationale: The demonstrative is explicit in Greek. 'This one' preserves the pointing force better than a simple pronoun, while avoiding adding 'child' not present in the text.
- source_word: κεῖται
  chosen: is appointed
  alternatives:
  - is set
  - lies
  lexicon: BDAG
  rationale: In this context κεῖμαι carries the sense of being set/appointed for a purpose or destiny, not merely physical lying down. 'Is appointed' communicates the idiomatic force clearly in English.
- source_word: εἰς πτῶσιν
  chosen: for the fall
  alternatives:
  - for falling
  - for downfall
  lexicon: BDAG
  rationale: πτῶσις here denotes downfall/stumbling in a figurative sense. 'The fall' is concise and preserves the paired structure with 'rise'.
- source_word: καὶ ἀνάστασιν
  chosen: and rise
  alternatives:
  - and rising
  - and resurrection
  lexicon: BDAG
  rationale: ἀνάστασις can mean rising or resurrection. Here the contrast with πτῶσις and the reference to many in Israel favors 'rise' as a broad term for being raised up, while preserving possible resonance with resurrection in a footnote.
- source_word: πολλῶν ἐν τῷ Ἰσραήλ
  chosen: of many in Israel
  alternatives:
  - of many among Israel
  - of many within Israel
  lexicon: BDAG
  rationale: Straightforward genitive plus locative phrase; 'in Israel' is idiomatic and preserves the covenant-community setting.
- source_word: σημεῖον
  chosen: a sign
  alternatives:
  - a mark
  - a portent
  lexicon: BDAG
  rationale: σημεῖον commonly means sign, especially in theological narrative contexts.
- source_word: ἀντιλεγόμενον
  chosen: that is opposed
  alternatives:
  - that is spoken against
  - that is contradicted
  lexicon: BDAG
  rationale: The participle denotes active opposition or contradiction. 'That is opposed' is clear modern English; the more literal 'spoken against' is preserved in a footnote because it reflects the verbal nuance.
