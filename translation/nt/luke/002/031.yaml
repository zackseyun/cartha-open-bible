id: LUK.2.31
reference: Luke 2:31
source:
  edition: SBLGNT
  text: ὃ ἡτοίμασας κατὰ πρόσωπον πάντων τῶν λαῶν,
translation:
  text: which you prepared before the face of all the peoples[b][a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "before all the peoples"; the Greek idiom can denote something set openly before the sight of all.
    reason: lexical_alternative
  - marker: b
    text: Or "all the nations."
    reason: alternative_reading
lexical_decisions:
- source_word: ὃ
  chosen: which
  alternatives:
  - that
  lexicon: BDAG
  rationale: Neuter singular relative pronoun referring back to 'salvation' in the previous verse. 'Which' is the most natural English relative pronoun for this antecedent.
- source_word: ἡτοίμασας
  chosen: you prepared
  alternatives:
  - you made ready
  - you have prepared
  lexicon: BDAG
  rationale: Aorist active indicative, second person singular, addressed to God. 'Prepared' is the standard and clear rendering; simple past fits the Greek aorist well in this context.
- source_word: κατὰ πρόσωπον
  chosen: in the presence of
  alternatives:
  - before
  - in front of
  lexicon: BDAG
  rationale: The idiom κατά + πρόσωπον here conveys being set before or in the sight/presence of others. 'In the presence of' preserves the public, visible sense without sounding wooden.
- source_word: πάντων
  chosen: all
  lexicon: BDAG
  rationale: Genitive plural modifying 'the peoples'; straightforwardly universal in scope within the phrase.
- source_word: τῶν λαῶν
  chosen: the peoples
  alternatives:
  - the nations
  - all people
  lexicon: BDAG
  rationale: Plural λαῶν is best preserved as 'peoples,' highlighting multiple peoples/groups rather than an undifferentiated singular. 'Nations' is possible, but in Luke 2:31–32 the next verse distinguishes Gentiles and Israel; 'peoples' keeps the broader wording here and avoids prematurely narrowing the sense.
