theological_decisions:
- issue: Scope and nuance of λαῶν in relation to the following verse
  chosen_reading: the peoples
  alternative_readings:
  - the nations
  - all people
  rationale: The plural Greek points to multiple peoples collectively before whom God's salvation is set. Rendering it 'the peoples' preserves the wording and leaves verse 32 to specify Gentiles and Israel without importing that distinction too early.
