id: LUK.2.42
reference: Luke 2:42
source:
  edition: SBLGNT
  text: καὶ ὅτε ἐγένετο ἐτῶν δώδεκα, ⸀ἀναβαινόντων ⸀αὐτῶν κατὰ τὸ ἔθος τῆς ἑορτῆς
translation:
  text: And when he was twelve years old, as they were going up according to the custom
    of the feast,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went up according to the custom of the feast.' The Greek participle
      can be rendered more simply in English, but the draft keeps the ongoing sense
      of 'were going up.'
    reason: lexical_alternative
  - marker: b
    text: That is, the Passover feast, as stated in the previous verse.
    reason: cross_reference
lexical_decisions:
- source_word: ἐγένετο ἐτῶν δώδεκα
  chosen: he was twelve years old
  alternatives:
  - he became twelve years old
  - he was twelve
  lexicon: BDAG
  rationale: The idiom γίνομαι + genitive of age means reaching or being at a given
    age. Natural English expresses this as 'he was twelve years old.' The subject
    is singular and refers to Jesus from the prior context.
- source_word: ἀναβαινόντων
  chosen: were going up
  alternatives:
  - went up
  - were going up to Jerusalem
  lexicon: BDAG
  rationale: ἀναβαίνω literally means 'go up' and is the standard verb for ascent
    to Jerusalem. The present participle with αὐτῶν is contemporaneous with the main
    clause, so 'were going up' best preserves the ongoing action. 'To Jerusalem' is
    contextually implied from the previous verse but not repeated here, so it is not
    supplied in the main text.
- source_word: αὐτῶν
  chosen: they
  alternatives:
  - his parents
  - they all
  lexicon: BDAG
  rationale: The genitive absolute uses the pronoun to refer back to the family group,
    especially his parents in context. English requires an explicit subject in the
    subordinate clause, and 'they' preserves the Greek without over-specifying.
- source_word: κατὰ τὸ ἔθος
  chosen: according to the custom
  alternatives:
  - as was the custom
  - according to custom
  lexicon: BDAG
  rationale: This phrase denotes conformity to established practice. 'According to
    the custom' is clear, close to the Greek, and preserves the article with ἔθος.
- source_word: τῆς ἑορτῆς
  chosen: of the feast
  alternatives:
  - of the festival
  - for the feast
  lexicon: BDAG
  rationale: ἑορτή is a religious feast/festival. Since the immediate context is Passover
    (v. 41), 'feast' is sufficiently natural and slightly more formal, matching the
    pilgrimage setting. 'Festival' is possible but less traditional in this context.
- source_word: καὶ ὅτε
  chosen: And when
  alternatives:
  - Now when
  - When
  lexicon: BDAG
  rationale: καί continues the narrative, and ὅτε introduces the temporal clause.
    'And when' preserves both functions without unnecessary smoothing.
