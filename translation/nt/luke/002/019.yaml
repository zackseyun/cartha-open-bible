id: LUK.2.19
reference: Luke 2:19
source:
  edition: SBLGNT
  text: ἡ δὲ ⸀Μαρία πάντα συνετήρει τὰ ῥήματα ταῦτα συμβάλλουσα ἐν τῇ καρδίᾳ αὐτῆς.
translation:
  text: But Mary was treasuring up all these words[b][a], pondering them in her heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kept all these things,' with the sense of carefully preserving them.
    reason: lexical_alternative
  - marker: b
    text: Or 'pondering' could be understood as 'putting them together' or 'considering them together.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild contrast or narrative transition from the shepherds' response in the previous verse to Mary's inward response. 'But' best preserves the contrastive nuance in natural English.
- source_word: συνετήρει
  chosen: was treasuring up
  alternatives:
  - kept
  - was keeping
  - preserved
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated action, and the verb can carry the sense of keeping carefully or preserving. 'Was treasuring up' captures both the durative aspect and the sense that Mary held these matters carefully rather than merely retaining information.
- source_word: πάντα
  chosen: all
  alternatives:
  - all things
  lexicon: BDAG
  rationale: 'With τὰ ῥήματα ταῦτα, the sense is comprehensive: Mary retained the whole set of what had been said. ''All'' is sufficient and idiomatic before ''these words''.'
- source_word: ῥήματα
  chosen: words
  alternatives:
  - things
  - sayings
  - matters
  lexicon: BDAG
  rationale: ῥῆμα often refers to spoken words or sayings. Here the immediate context is the shepherds' report and the announced message, so 'words' is the most direct rendering. 'Things' is possible but less specific to speech.
- source_word: συμβάλλουσα
  chosen: pondering
  alternatives:
  - considering
  - putting together
  - reflecting on
  lexicon: BDAG
  rationale: The participle suggests mentally bringing matters together, comparing and considering them. 'Pondering' communicates reflective inward processing in idiomatic English, while preserving more than mere memory.
- source_word: ἐν τῇ καρδίᾳ αὐτῆς
  chosen: in her heart
  alternatives:
  - within herself
  lexicon: BDAG
  rationale: A standard biblical idiom for inward thought, reflection, and affection. 'In her heart' preserves the metaphor and its theological-literary resonance without flattening it into a purely psychological paraphrase.
- source_word: Μαρία
  chosen: Mary
  rationale: Personal names are transliterated by standard English convention per translation philosophy.
