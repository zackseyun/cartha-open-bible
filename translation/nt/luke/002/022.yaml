theological_decisions:
- issue: Pronoun number in 'the days of their purification'
  chosen_reading: Retain the plural 'their purification' in the main text
  alternative_readings:
  - the days of her purification
  rationale: The Greek text provided reads αὐτῶν ('their'). Although some translators
    render the sense as singular in light of Levitical background and textual variation
    in some traditions, the translation should follow the given Greek text in the
    main line and preserve the singular alternative in a footnote rather than silently
    resolve the tension.
  doctrine_reference: 'Translation philosophy #1 and #3'
