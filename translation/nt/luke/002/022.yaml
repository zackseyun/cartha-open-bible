id: LUK.2.22
reference: Luke 2:22
source:
  edition: SBLGNT
  text: Καὶ ὅτε ἐπλήσθησαν αἱ ἡμέραι τοῦ καθαρισμοῦ αὐτῶν κατὰ τὸν νόμον Μωϋσέως,
    ἀνήγαγον αὐτὸν εἰς Ἱεροσόλυμα παραστῆσαι τῷ κυρίῳ,
translation:
  text: And when the days of their purification were fulfilled according to the law
    of Moses, they brought him up to Jerusalem to present him to the Lord,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'her purification' instead of 'their purification.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐπλήσθησαν
  chosen: were fulfilled
  alternatives:
  - were completed
  - came to an end
  lexicon: BDAG
  rationale: Passive of πίμπλημι here idiomatically refers to a period of time reaching
    its full measure. 'Were fulfilled' is a natural and fairly formal rendering that
    preserves the temporal nuance.
- source_word: καθαρισμοῦ
  chosen: purification
  alternatives:
  - cleansing
  lexicon: BDAG
  rationale: καθαρισμός in this context refers to ritual purification under the Mosaic
    law after childbirth. 'Purification' is the standard and clearest English equivalent
    in this legal-ritual setting.
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - her
  lexicon: BDAG
  rationale: The extant Greek text reads the plural pronoun αὐτῶν, so the main text
    should reflect the source rather than harmonize to Leviticus or later interpretive
    tradition. Because this raises an interpretive question in context, the singular
    alternative is preserved in a footnote.
- source_word: κατὰ τὸν νόμον Μωϋσέως
  chosen: according to the law of Moses
  alternatives:
  - in keeping with the law of Moses
  lexicon: BDAG
  rationale: This phrase signals conformity to the Mosaic legal requirement. 'According
    to the law of Moses' is transparent and preserves the formal legal register.
- source_word: ἀνήγαγον
  chosen: they brought him up
  alternatives:
  - they took him up
  - they led him up
  lexicon: BDAG
  rationale: ἀνάγω commonly means 'bring up' or 'lead up,' and with Jerusalem it naturally
    reflects ascent to the holy city. 'Brought him up' is idiomatic and preserves
    the directional nuance.
- source_word: Ἱεροσόλυμα
  chosen: Jerusalem
  lexicon: BDAG
  rationale: Standard English transliteration of the place name.
- source_word: παραστῆσαι
  chosen: to present
  alternatives:
  - to set before
  - to bring before
  lexicon: BDAG
  rationale: In this cultic/legal context, παρίστημι means to present someone before
    God. 'Present' is the most natural and established English rendering without unnecessary
    archaism.
- source_word: κυρίῳ
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Per doctrine guidelines, κύριος is rendered 'Lord.' Here the article
    is naturally represented in English as 'the Lord,' fitting the reverential and
    covenantal sense.
