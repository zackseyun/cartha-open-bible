id: LUK.2.12
reference: Luke 2:12
source:
  edition: SBLGNT
  text: καὶ τοῦτο ὑμῖν ⸀τὸ σημεῖον, εὑρήσετε βρέφος ἐσπαργανωμένον ⸀καὶ κείμενον ἐν φάτνῃ.
translation:
  text: 'And this will be the sign for you: you will find a baby wrapped in cloths and lying in a manger[a][b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wrapped in swaddling cloths.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in a feeding trough.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σημεῖον
  chosen: sign
  alternatives:
  - proof
  - mark
  lexicon: BDAG
  rationale: σημεῖον commonly denotes a sign, token, or distinguishing indication. Here the angel gives the shepherds an identifying sign by which they will recognize the child, so 'sign' is the most natural and established sense without overinterpreting it as miraculous proof.
- source_word: εὑρήσετε
  chosen: you will find
  alternatives:
  - you will discover
  lexicon: BDAG
  rationale: Future indicative second plural of εὑρίσκω. 'You will find' is the straightforward predictive rendering and fits the angelic instruction.
- source_word: βρέφος
  chosen: a baby
  alternatives:
  - an infant
  - a child
  lexicon: BDAG
  rationale: βρέφος refers to a very young child, especially an infant. 'Baby' is clear, natural modern English and accurately conveys the age implied in context.
- source_word: ἐσπαργανωμένον
  chosen: wrapped in cloths
  alternatives:
  - swaddled
  - wrapped in swaddling cloths
  lexicon: BDAG
  rationale: The participle from σπαργανόω refers to wrapping an infant with strips of cloth. 'Wrapped in cloths' preserves the concrete action in readable modern English. 'Swaddled' is traditional but less accessible; 'wrapped in swaddling cloths' is more explicit but heavier in English style.
- source_word: κείμενον
  chosen: lying
  alternatives:
  - laid
  - lying there
  lexicon: BDAG
  rationale: Present participle of κεῖμαι, describing the baby's state or position. 'Lying' best captures the stative sense in idiomatic English. 'Laid' would suggest the prior action rather than the present condition.
- source_word: φάτνῃ
  chosen: in a manger
  alternatives:
  - in a feeding trough
  lexicon: BDAG
  rationale: φάτνη can denote a manger or feeding trough. 'Manger' is the standard and contextually precise rendering in the nativity setting, while remaining understandable to modern readers. The more explicit 'feeding trough' is a valid lexical alternative worth preserving.
- source_word: τοῦτο ὑμῖν τὸ σημεῖον
  chosen: this will be the sign for you
  alternatives:
  - this is the sign to you
  - this is your sign
  lexicon: BDAG
  rationale: The clause is slightly elliptical in Greek, but English normally supplies a copular future or present. 'This will be the sign for you' communicates the sense naturally in context, introducing what follows as the identifying sign given to the shepherds.
