id: LUK.2.33
reference: Luke 2:33
source:
  edition: SBLGNT
  text: καὶ ἦν ⸂ὁ πατὴρ αὐτοῦ⸃ καὶ ἡ ⸀μήτηρ θαυμάζοντες ἐπὶ τοῖς λαλουμένοις περὶ
    αὐτοῦ.
translation:
  text: And his father and mother were marveling at the things being said about him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''his father.'' This refers to Joseph in the narrative''s ordinary
      family/legal sense; some translations read ''Joseph and his mother'' to avoid
      misunderstanding in light of Luke''s earlier account of Jesus'' virginal conception.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ πατὴρ αὐτοῦ
  chosen: his father
  alternatives:
  - Joseph
  - his father (legal/social sense)
  lexicon: BDAG
  rationale: The Greek text reads straightforwardly 'his father.' This should be translated
    as written rather than harmonized to 'Joseph.' In Luke's narrative context, this
    refers to Joseph in a social/legal sense and does not negate the virginal conception
    already affirmed in the chapter. Because of possible theological sensitivity,
    the nuance is documented rather than altered in translation.
- source_word: μήτηρ
  chosen: mother
  lexicon: BDAG
  rationale: Standard rendering of μήτηρ. With the article and conjunction, it forms
    the pair 'his father and mother.'
- source_word: θαυμάζοντες
  chosen: were marveling
  alternatives:
  - were amazed
  - were wondering
  lexicon: BDAG
  rationale: The present participle with ἦν forms a periphrastic imperfect, conveying
    ongoing action in past time. 'Were marveling' preserves both the aspect and the
    sense of wonder more closely than the flatter 'were amazed.'
- source_word: ἐπὶ τοῖς λαλουμένοις
  chosen: at what was being said
  alternatives:
  - at the things being said
  - about the things spoken
  lexicon: BDAG
  rationale: This construction naturally refers to the content of the speech and is
    idiomatically rendered in English as 'at what was being said.' The passive participle
    λαλουμένοις is preserved with 'was being said.'
- source_word: περὶ αὐτοῦ
  chosen: about him
  alternatives:
  - concerning him
  lexicon: BDAG
  rationale: Standard contextual rendering of περί with the genitive. 'About him'
    is natural modern English and preserves the referential sense.
