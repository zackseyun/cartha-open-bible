theological_decisions:
- issue: Use of 'his father' for Joseph in a context affirming Jesus' virginal conception
  chosen_reading: Translate the textual wording as 'his father' and preserve the christological
    nuance in documentation/footnote rather than altering the main text.
  alternative_readings:
  - Joseph and his mother
  - his father (that is, Joseph, in a legal/social sense)
  rationale: Optimal equivalence and original-language primacy require translating
    the wording actually present in the Greek. Luke can refer to Joseph as Jesus'
    father in an ordinary familial sense without denying that God is Jesus' ultimate
    Father or the virginal conception narrated earlier in the chapter. Altering the
    text to avoid tension would resolve a theological concern not resolved by the
    Greek itself.
  doctrine_reference: Affirmations (Nicene/Chalcedonian orthodoxy); Translation philosophy
    §§1, 3
