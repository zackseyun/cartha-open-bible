theological_decisions:
- issue: Rendering στρατιᾶς οὐρανίου
  chosen_reading: the heavenly host
  alternative_readings:
  - the army of heaven
  - heaven's army
  rationale: The phrase evokes an ordered heavenly multitude with military connotations,
    but in this context the beings are engaged in worship rather than combat. 'Heavenly
    host' preserves the biblical imagery without flattening it into either a purely
    militaristic or purely generic 'multitude of angels' reading.
