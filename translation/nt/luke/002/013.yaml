id: LUK.2.13
reference: Luke 2:13
source:
  edition: SBLGNT
  text: καὶ ἐξαίφνης ἐγένετο σὺν τῷ ἀγγέλῳ πλῆθος στρατιᾶς ⸀οὐρανίου αἰνούντων τὸν
    θεὸν καὶ λεγόντων·
translation:
  text: 'And suddenly there was with the angel a multitude of the heavenly host, praising
    God and saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a multitude of heaven's army' or 'a multitude of the army of heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξαίφνης
  chosen: suddenly
  alternatives:
  - all at once
  - abruptly
  lexicon: BDAG
  rationale: Adverb marking suddenness; 'suddenly' is the most natural modern English
    equivalent and preserves the narrative surprise.
- source_word: ἐγένετο
  chosen: there was
  alternatives:
  - there appeared
  - there came to be
  lexicon: BDAG
  rationale: In this existential construction, γίνομαι functions idiomatically to
    introduce the appearance/presence of something. 'There was' is clear English and
    avoids over-interpreting the verb as a visual appearance term, while still fitting
    the scene.
- source_word: σὺν τῷ ἀγγέλῳ
  chosen: with the angel
  alternatives:
  - along with the angel
  lexicon: BDAG
  rationale: σύν with the dative denotes accompaniment. 'With the angel' is straightforward
    and idiomatic.
- source_word: πλῆθος
  chosen: a multitude
  alternatives:
  - a great number
  - a crowd
  lexicon: BDAG
  rationale: πλῆθος emphasizes a large number. 'A multitude' preserves the elevated
    narrative tone and common biblical usage without becoming archaic.
- source_word: στρατιᾶς οὐρανίου
  chosen: of the heavenly host
  alternatives:
  - of the army of heaven
  - of heaven's army
  lexicon: BDAG
  rationale: στρατιά can mean army/host; in this context of angels praising God, 'heavenly
    host' is the established and accurate rendering that preserves both the military
    imagery and celestial reference. The genitive construction is naturally rendered
    as 'of the heavenly host.'
- source_word: αἰνούντων
  chosen: praising
  alternatives:
  - giving praise to
  lexicon: BDAG
  rationale: Present participle describing the activity of the heavenly host. 'Praising'
    is concise and directly matches the sense of αἰνέω.
- source_word: τὸν θεόν
  chosen: God
  lexicon: BDAG
  rationale: Direct object of αἰνούντων; standard rendering.
- source_word: λεγόντων
  chosen: and saying
  alternatives:
  - and saying these words
  lexicon: BDAG
  rationale: Coordinate present participle introducing the content of the praise in
    the next verse. 'And saying' preserves the participial linkage and prepares for
    the quotation.
