id: LUK.2.28
reference: Luke 2:28
source:
  edition: SBLGNT
  text: καὶ αὐτὸς ἐδέξατο αὐτὸ εἰς τὰς ⸀ἀγκάλας καὶ εὐλόγησεν τὸν θεὸν καὶ εἶπεν·
translation:
  text: And he took him into his arms and blessed God and said,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'received him.' The Greek verb can mean 'receive' or 'welcome,' but here the following phrase 'into his arms' makes the physical sense 'took' the most natural English rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδέξατο
  chosen: took
  alternatives:
  - received
  lexicon: BDAG
  rationale: δέχομαι commonly means 'receive' or 'welcome,' but with the following phrase 'into his arms' English idiom prefers 'took' to express the physical act naturally without losing the sense.
- source_word: αὐτὸ
  chosen: him
  alternatives:
  - it
  lexicon: BDAG
  rationale: Although the pronoun form is neuter, it refers to the child Jesus. English personal reference requires 'him' rather than the more literal but misleading 'it.'
- source_word: εἰς τὰς ἀγκάλας
  chosen: into his arms
  alternatives:
  - into the arms
  - in his arms
  - into his embrace
  lexicon: BDAG
  rationale: ἀγκάλαι refers to the arms as used for embracing or carrying. 'Into his arms' is the most natural English rendering and reflects the implied possessive in context, even though no explicit possessive pronoun appears in Greek.
- source_word: εὐλόγησεν τὸν θεόν
  chosen: blessed God
  alternatives:
  - praised God
  lexicon: BDAG
  rationale: εὐλογέω with God as object is traditionally and lexically 'bless.' 'Praised' is possible as a sense-level rendering, but 'blessed God' preserves the verbal form and biblical diction without obscurity.
- source_word: καὶ εἶπεν
  chosen: and said,
  alternatives:
  - and he said,
  lexicon: BDAG
  rationale: A simple narrative continuation. The explicit subject is unnecessary in English because it is already clear from context.
- source_word: αὐτὸς
  chosen: he
  alternatives:
  - he himself
  lexicon: BDAG
  rationale: The pronoun adds subject continuity and slight emphasis. English normally renders this simply as 'he' here; 'he himself' would overstate the emphasis in this narrative context.
