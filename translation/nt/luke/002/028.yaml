theological_decisions:
- issue: Reference of the neuter pronoun αὐτό
  chosen_reading: The pronoun refers personally to the infant Jesus, rendered 'him.'
  alternative_readings:
  - A hyper-literal rendering 'it' based on grammatical gender
  rationale: The grammar follows the noun for child, but the referent is the person of Jesus. Rendering it personally avoids an English misunderstanding and does not import extra theology beyond the narrative reference.
