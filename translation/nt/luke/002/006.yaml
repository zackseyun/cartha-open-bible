theological_decisions:
- issue: Potential implication of providential or appointed timing in ἐπλήσθησαν αἱ
    ἡμέραι
  chosen_reading: Rendered as 'the days were fulfilled' rather than reducing to a
    bare 'the time came,' preserving Luke's wording without adding explicit theological
    interpretation.
  alternative_readings:
  - the time came for her to give birth
  - the days were completed for her to give birth
  rationale: The verse narrates the completion of Mary's pregnancy and may subtly
    resonate with fulfillment language, but it does not explicitly state a doctrinal
    claim beyond the arrival of the birth time. The chosen wording preserves that
    tension rather than flattening it.
  doctrine_reference: Preserve theological tension rather than resolve it.
