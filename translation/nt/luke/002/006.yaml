id: LUK.2.6
reference: Luke 2:6
source:
  edition: SBLGNT
  text: ἐγένετο δὲ ἐν τῷ εἶναι αὐτοὺς ἐκεῖ ἐπλήσθησαν αἱ ἡμέραι τοῦ τεκεῖν αὐτήν,
translation:
  text: And while they were there, the days were fulfilled for her to give birth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the days were completed for her to give birth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο δὲ
  chosen: And ...
  alternatives:
  - Now ...
  - And it happened that ...
  lexicon: BDAG
  rationale: The idiom ἐγένετο δέ often functions as narrative progression rather
    than requiring a fully wooden 'and it happened.' 'And' preserves the connective
    force in natural English without unnecessary stiffness.
- source_word: ἐν τῷ εἶναι αὐτοὺς ἐκεῖ
  chosen: while they were there
  alternatives:
  - when they were there
  - during their being there
  lexicon: BDAG
  rationale: This articular infinitive construction with ἐν expresses contemporaneous
    time. 'While they were there' is idiomatic English and preserves the temporal
    sense better than a more literal but awkward rendering.
- source_word: ἐπλήσθησαν
  chosen: were fulfilled
  alternatives:
  - were completed
  - came to completion
  lexicon: BDAG
  rationale: The passive of πίμπλημι here conveys that the appointed time reached
    its fullness/completion. 'Were fulfilled' preserves the idiomatic biblical sense
    and echoes Luke's style without overstating theological meaning.
- source_word: αἱ ἡμέραι
  chosen: the days
  alternatives:
  - the time
  - her days
  lexicon: BDAG
  rationale: The Greek explicitly says 'the days,' a common idiom for the time appointed.
    Retaining 'the days' keeps closer to the source while remaining understandable
    in English.
- source_word: τοῦ τεκεῖν αὐτήν
  chosen: for her to give birth
  alternatives:
  - for her to bear a child
  - for her delivery
  lexicon: BDAG
  rationale: 'The genitive articular infinitive expresses purpose or reference: the
    days for her giving birth. ''For her to give birth'' is clear, natural, and faithful
    to the verbal force of τίκτω.'
