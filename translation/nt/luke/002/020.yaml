theological_decisions:
- issue: Whether to make explicit that the content heard and seen matched the angelic announcement
  chosen_reading: Rendered the clause as 'just as it had been told to them' without expanding the subject beyond the Greek.
  alternative_readings:
  - just as the angel had told them
  - just as they had been told by the angels
  rationale: The Greek passive does not explicitly name the speaker in this clause, though the context implies the angelic message. To avoid importing detail not stated in the verse itself, the translation preserves the passive and leaves the agent implicit.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make; preserve the source text''s plain sense.'
