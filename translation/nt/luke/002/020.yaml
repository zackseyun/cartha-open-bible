id: LUK.2.20
reference: Luke 2:20
source:
  edition: SBLGNT
  text: καὶ ὑπέστρεψαν οἱ ποιμένες δοξάζοντες καὶ αἰνοῦντες τὸν θεὸν ἐπὶ πᾶσιν οἷς ἤκουσαν καὶ εἶδον καθὼς ἐλαλήθη πρὸς αὐτούς.
translation:
  text: And the shepherds returned[a], glorifying and praising God for all that they had heard and seen[c][b], just as it had been told to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went back.'
    reason: lexical_alternative
  - marker: b
    text: Or 'because of all that they had heard and seen.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'just as it was spoken to them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπέστρεψαν
  chosen: returned
  alternatives:
  - went back
  lexicon: BDAG
  rationale: Aorist indicative of ὑποστρέφω here denotes returning from the visit to their prior place or activity. 'Returned' is natural modern English and sufficiently formal.
- source_word: ποιμένες
  chosen: shepherds
  lexicon: BDAG
  rationale: Standard rendering of ποιμήν in this narrative context; refers to the men introduced earlier in the passage.
- source_word: δοξάζοντες
  chosen: glorifying
  alternatives:
  - giving glory to
  lexicon: BDAG
  rationale: Present participle expressing ongoing manner accompanying their return. 'Glorifying' preserves the verbal connection to δόξα and is idiomatic with 'God' as object.
- source_word: αἰνοῦντες
  chosen: praising
  alternatives:
  - speaking praise of
  lexicon: BDAG
  rationale: Distinct from δοξάζοντες but overlapping in sense; 'praising' keeps the paired participles without collapsing them into one expression.
- source_word: τὸν θεὸν
  chosen: God
  lexicon: BDAG
  rationale: Direct object of both participles. No article is needed in English.
- source_word: ἐπὶ πᾶσιν οἷς
  chosen: for all that
  alternatives:
  - because of all that
  - over all that
  lexicon: BDAG
  rationale: ἐπί with the dative here gives the basis or occasion for praise. 'For all that' is concise and natural in English.
- source_word: ἤκουσαν καὶ εἶδον
  chosen: they had heard and seen
  alternatives:
  - they heard and saw
  lexicon: BDAG
  rationale: English pluperfect fits the narrative sequence well, marking these as prior to the act of returning and praising, though the Greek aorists themselves do not require a pluperfect. This is an optimal-equivalence smoothing rather than a change in meaning.
- source_word: καθὼς ἐλαλήθη πρὸς αὐτούς
  chosen: just as it had been told to them
  alternatives:
  - just as it was spoken to them
  - just as they had been told
  lexicon: BDAG
  rationale: Passive ἐλαλήθη leaves the speaker implicit; English 'it had been told to them' conveys the passive sense naturally and points back to the angelic message. 'Just as' preserves καθώς.
