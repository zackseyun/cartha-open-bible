theological_decisions:
- issue: Referent of the addressed pronoun and prophetic force
  chosen_reading: The verse is rendered as a direct address to Mary, preserving the prophecy of profound personal anguish without specifying beyond the text the exact historical mechanism of that suffering.
  alternative_readings:
  - Interpret the 'sword' more specifically as Mary's grief at Jesus' crucifixion
  - Interpret the line more broadly as the pain caused by the divisive effect of Jesus' mission
  rationale: The Greek directly addresses Mary ('your own soul also'), but the metaphorical 'sword' should not be over-specified in translation. The text clearly predicts deep suffering and links it to the revealing of hearts, while leaving the precise mode of fulfillment implicit.
  doctrine_reference: Preserve theological tension rather than resolve it.
