id: LUK.2.35
reference: Luke 2:35
source:
  edition: SBLGNT
  text: καὶ σοῦ ⸀δὲ αὐτῆς τὴν ψυχὴν διελεύσεται ῥομφαία, ὅπως ἂν ἀποκαλυφθῶσιν ἐκ πολλῶν καρδιῶν διαλογισμοί.
translation:
  text: and a sword will pass through your own soul also[b][a], so that the thoughts of many hearts may be revealed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will pierce.' The Greek verb more literally means 'will pass through,' while the image of a sword naturally conveys piercing.
    reason: lexical_alternative
  - marker: b
    text: The 'sword' is commonly understood as a figure for the deep anguish Mary would experience.
    reason: cultural_note
lexical_decisions:
- source_word: σοῦ ... αὐτῆς
  chosen: your own
  alternatives:
  - your
  - yourself
  lexicon: BDAG
  rationale: 'The genitive pronoun σοῦ with the intensive αὐτῆς gives emphasis: not merely ''your soul'' but ''your own soul.'' This preserves the personal force directed to Mary without awkward literalism.'
- source_word: ψυχή
  chosen: soul
  alternatives:
  - life
  - inner being
  lexicon: BDAG
  rationale: In this prophetic saying, ψυχή refers to the inner person, the seat of deep anguish, not merely physical life. 'Soul' is the most natural and traditional English equivalent here and preserves the emotional-spiritual weight.
- source_word: διελεύσεται
  chosen: will pass through
  alternatives:
  - will pierce
  - will go through
  lexicon: BDAG
  rationale: The verb διέρχομαι means 'go through, pass through.' Although English tradition often uses 'pierce,' that sense is interpretive and supplied by the image of the sword rather than by the verb itself. 'Will pass through' stays closer to the Greek while still conveying severity in context.
- source_word: ῥομφαία
  chosen: sword
  alternatives:
  - large sword
  - broadsword
  lexicon: BDAG
  rationale: ῥομφαία denotes a large sword, often emphasizing a formidable weapon. In idiomatic English, 'sword' is sufficient in the main text; more specific renderings would sound over-translated here.
- source_word: ὅπως ἂν
  chosen: so that
  alternatives:
  - in order that
  - with the result that
  lexicon: BDAG
  rationale: This conjunction introduces purpose or intended result. 'So that' is natural modern English and preserves the connection between the preceding suffering/division and the revealing of hearts.
- source_word: ἀποκαλυφθῶσιν
  chosen: may be revealed
  alternatives:
  - might be disclosed
  - may be uncovered
  lexicon: BDAG
  rationale: The aorist passive subjunctive after ὅπως ἄν is well represented by 'may be revealed.' This keeps the passive force and the sense of disclosure.
- source_word: ἐκ πολλῶν καρδιῶν
  chosen: from many hearts
  alternatives:
  - out of many hearts
  lexicon: BDAG
  rationale: 'ἐκ marks source: the thoughts proceed from within many hearts. ''From many hearts'' is idiomatic and accurate.'
- source_word: διαλογισμοί
  chosen: thoughts
  alternatives:
  - reasonings
  - deliberations
  - inner thoughts
  lexicon: BDAG
  rationale: διαλογισμοί can denote thoughts, reasonings, or inward deliberations, sometimes with a negative nuance. Here 'thoughts' is broad and natural, allowing the context to carry whether they are noble or hostile.
