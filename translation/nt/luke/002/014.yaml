id: LUK.2.14
reference: Luke 2:14
source:
  edition: SBLGNT
  text: Δόξα ἐν ὑψίστοις θεῷ καὶ ἐπὶ γῆς εἰρήνη ἐν ἀνθρώποις ⸀εὐδοκίας.
translation:
  text: Glory to God in the highest, and on earth peace among people of good pleasure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'among people with whom he is pleased.'
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts read 'and on earth peace, good will among men.'
    reason: textual_variant
  - marker: c
    text: '''Men'' here represents humanity in a generic sense.'
    reason: cultural_note
lexical_decisions:
- source_word: Δόξα
  chosen: Glory
  alternatives:
  - Praise
  - Honor
  lexicon: BDAG
  rationale: δόξα here functions as an ascriptive exclamation, announcing glory directed
    to God. 'Glory' preserves the liturgical and theological weight better than the
    more interpretive 'praise' or 'honor'.
- source_word: ἐν ὑψίστοις
  chosen: in the highest
  alternatives:
  - in the highest places
  - in the highest heavens
  lexicon: BDAG
  rationale: The phrase is idiomatic for the highest heavenly realm. 'In the highest'
    is concise, traditional, and natural English while preserving the locative sense.
- source_word: θεῷ
  chosen: to God
  alternatives:
  - God
  lexicon: BDAG
  rationale: Although the Greek dative can be rendered without an explicit preposition
    in English, 'Glory to God' is the natural idiomatic expression and accurately
    reflects the dative of reference/ascription.
- source_word: ἐπὶ γῆς
  chosen: on earth
  alternatives:
  - upon the earth
  lexicon: BDAG
  rationale: A straightforward spatial contrast with 'in the highest.' 'On earth'
    is idiomatic modern English.
- source_word: εἰρήνη
  chosen: peace
  lexicon: BDAG
  rationale: The noun denotes peace in the broad biblical sense; no narrower gloss
    is demanded here.
- source_word: ἐν ἀνθρώποις
  chosen: among men
  alternatives:
  - among people
  - among humanity
  lexicon: BDAG
  rationale: ἄνθρωποι is grammatically masculine plural but can be representative/generic.
    Per translation philosophy, a gender-accurate rendering is preferred where the
    source carries that force. 'Among men' preserves the form and echoes the representative
    sense; inclusivity concerns are better handled in a footnote than by flattening
    the Greek form.
- source_word: εὐδοκίας
  chosen: of his good pleasure
  alternatives:
  - with whom he is pleased
  - of favor
  lexicon: BDAG
  rationale: The genitive εὐδοκίας in the SBLGNT reading most naturally qualifies
    'men' as those characterized by God's favor/good pleasure. 'Of his good pleasure'
    preserves the genitival construction more formally, while the smoother alternative
    'with whom he is pleased' is preserved in a footnote.
