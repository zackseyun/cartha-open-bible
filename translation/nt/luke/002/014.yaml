theological_decisions:
- issue: Meaning of the genitive εὐδοκίας in the angelic proclamation
  chosen_reading: The phrase limits the peace to people who are the objects of God's
    good pleasure/favor, rather than making 'good will' a universal third item in
    the proclamation.
  alternative_readings:
  - '''peace, good will among men'' based on the nominative reading εὐδοκία'
  - '''peace among people with whom he is pleased'' as a smoother idiomatic rendering
    of the genitive text'
  rationale: The printed SBLGNT text reads the genitive εὐδοκίας, not the nominative
    εὐδοκία. This supports a construction in which peace is associated with people
    marked by divine favor. The translation preserves that grammatical force without
    importing a full doctrinal system about election; it simply reflects the syntax
    of the adopted text. Because the nominative reading has strong influence in English
    tradition, it is preserved in a footnote as a textual variant, and the smoother
    idiomatic rendering is also footnoted as a lexical alternative.
  doctrine_reference: Translation philosophy §§1, 3, 4
