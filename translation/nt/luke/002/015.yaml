id: LUK.2.15
reference: Luke 2:15
source:
  edition: SBLGNT
  text: Καὶ ἐγένετο ὡς ἀπῆλθον ἀπ’ αὐτῶν εἰς τὸν οὐρανὸν οἱ ἄγγελοι, ⸀οἱ ποιμένες
    ⸀ἐλάλουν πρὸς ἀλλήλους· Διέλθωμεν δὴ ἕως Βηθλέεμ καὶ ἴδωμεν τὸ ῥῆμα τοῦτο τὸ γεγονὸς
    ὃ ὁ κύριος ἐγνώρισεν ἡμῖν.
translation:
  text: And it happened that when the angels had gone away from them into heaven,
    the shepherds said to one another, “Let us go now as far as Bethlehem and see
    this thing that has happened, which the Lord has made known to us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this matter that has happened'; Greek ῥῆμα can mean 'word,' 'matter,'
      or 'thing.'
    reason: lexical_alternative
  - marker: b
    text: Or simply 'to Bethlehem'; Greek 'as far as Bethlehem' more literally preserves
      ἕως.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: it happened
  alternatives:
  - it came to pass
  - it occurred
  lexicon: BDAG
  rationale: Common Lukan narrative formula. 'It happened' preserves the discourse
    function without archaic tone ('it came to pass').
- source_word: ὡς
  chosen: when
  alternatives:
  - as
  - after
  lexicon: BDAG
  rationale: Introduces the temporal circumstance of the angels' departure. 'When'
    is natural English and fits the aorist event sequence.
- source_word: ἀπῆλθον ἀπ’ αὐτῶν εἰς τὸν οὐρανὸν
  chosen: had gone away from them into heaven
  alternatives:
  - departed from them into heaven
  - went away from them into the sky
  lexicon: BDAG
  rationale: Pluperfect-like English ('had gone away') best reflects the prior action
    relative to the shepherds' speech. 'Heaven' is the standard rendering of οὐρανός
    here, referring to the divine realm rather than merely the visible sky.
- source_word: οἱ ἄγγελοι
  chosen: the angels
  lexicon: BDAG
  rationale: Straightforward rendering of the nominative subject.
- source_word: οἱ ποιμένες
  chosen: the shepherds
  lexicon: BDAG
  rationale: Standard rendering; identifies the speakers.
- source_word: ἐλάλουν πρὸς ἀλλήλους
  chosen: said to one another
  alternatives:
  - were speaking to one another
  - spoke to one another
  lexicon: BDAG
  rationale: λαλέω often means 'speak/talk'; in this context introducing direct discourse,
    'said to one another' is idiomatic English. The imperfect is not heavily durative
    here and functions naturally as speech introduction.
- source_word: Διέλθωμεν
  chosen: Let us go
  alternatives:
  - Let us go through
  - Let us pass over
  lexicon: BDAG
  rationale: Aorist subjunctive in hortatory use. Although διέρχομαι can more literally
    mean 'go through' or 'pass through,' English idiom here is simply 'Let us go.'
- source_word: δὴ
  chosen: now
  alternatives:
  - then
  - indeed
  lexicon: BDAG
  rationale: Particle adds urgency or immediacy. 'Now' captures the pragmatic force
    without overtranslation.
- source_word: ἕως Βηθλέεμ
  chosen: as far as Bethlehem
  alternatives:
  - to Bethlehem
  lexicon: BDAG
  rationale: ἕως literally means 'as far as/up to.' Retaining 'as far as Bethlehem'
    preserves the source wording, though 'to Bethlehem' would be smoother. The phrase
    suggests proceeding to that destination without requiring a more interpretive
    paraphrase.
- source_word: ἴδωμεν
  chosen: see
  alternatives:
  - look at
  lexicon: BDAG
  rationale: 'Hortatory subjunctive coordinated with Διέλθωμεν: ''and see'' is the
    natural English equivalent.'
- source_word: τὸ ῥῆμα τοῦτο τὸ γεγονός
  chosen: this thing that has happened
  alternatives:
  - this matter that has happened
  - this word that has come to pass
  - this event that has happened
  lexicon: BDAG
  rationale: ῥῆμα can mean 'word,' 'matter,' or 'thing.' Here the shepherds refer
    to the reported event, not merely a spoken utterance, so 'thing' best communicates
    the sense in accessible English. The participle τὸ γεγονός is brought into the
    relative clause as 'that has happened.'
- source_word: ὃ ὁ κύριος ἐγνώρισεν ἡμῖν
  chosen: which the Lord has made known to us
  alternatives:
  - which the Lord told us
  - which the Lord revealed to us
  lexicon: BDAG
  rationale: ἐγνώρισεν means 'made known, informed.' 'Made known' preserves the verbal
    nuance without overstating it as technical revelation language. κύριος follows
    the doctrinal default 'Lord'.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per DOCTRINE.md contested terms table, κύριος defaults to 'Lord.' In
    this context it refers to God as the one who disclosed the event to the shepherds
    through the angelic message.
