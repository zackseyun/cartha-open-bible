theological_decisions:
- issue: Referent of 'the Lord' (ὁ κύριος)
  chosen_reading: Rendered as 'the Lord,' referring to God as the source of the revelation
    announced by the angels.
  alternative_readings:
  - Could be taken more generally as the divine Lord without specifying whether the
    narrative emphasis is on God the Father or on the newborn Lord Messiah by implication.
  rationale: The immediate context of angelic revelation supports understanding κύριος
    as God, while preserving the canonical resonance of 'Lord' in Luke's infancy narrative.
    The translation does not force a narrower doctrinal specification than the text
    itself states.
  doctrine_reference: 'DOCTRINE.md: κύριος default rendering ''Lord''; preserve theological
    tension rather than resolve it.'
