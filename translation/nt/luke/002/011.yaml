theological_decisions:
- issue: Rendering of χριστὸς κύριος
  chosen_reading: Messiah the Lord
  alternative_readings:
  - the Lord's Messiah
  - Christ the Lord
  rationale: 'The Greek presents two nominative titles in apposition to ''Savior'':
    ''Messiah'' and ''Lord.'' Following the doctrine''s default, Χριστός is translated
    as ''Messiah'' when title-like, and κύριος as ''Lord.'' ''Christ the Lord'' preserves
    tradition but obscures the title''s meaning for modern readers. ''The Lord''s
    Messiah'' reflects a possible interpretive construal seen in some translations,
    but it is less direct than the appositional reading of the Greek wording here.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names. Contested
    terms: Χριστός → Messiah (where title), κύριος → Lord.'
