id: LUK.2.11
reference: Luke 2:11
source:
  edition: SBLGNT
  text: ὅτι ἐτέχθη ὑμῖν σήμερον σωτὴρ ὅς ἐστιν χριστὸς κύριος ἐν πόλει Δαυίδ·
translation:
  text: because today a Savior was born for you in the city of David, who is Christ
    the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'Christ the Lord.' The Greek titles are χριστὸς
      κύριος, literally 'Messiah Lord,' commonly understood as 'Messiah the Lord.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the content/reason for the angelic announcement in the preceding
    verse. 'Because' is natural English and preserves the explanatory force; 'for'
    is possible but less clear in contemporary usage.
- source_word: ἐτέχθη
  chosen: was born
  alternatives:
  - has been born
  lexicon: BDAG
  rationale: Aorist passive of τίκτω, idiomatically rendered in English as 'was born.'
    'Has been born' is possible, but simple past better matches the narrative announcement.
- source_word: ὑμῖν
  chosen: for you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: The dative here conveys benefit/advantage rather than mere indirect object.
    'For you' captures the good-news-for-the-hearers sense more clearly than 'to you.'
- source_word: σήμερον
  chosen: today
  alternatives:
  - this day
  lexicon: BDAG
  rationale: Standard temporal adverb. 'Today' is clear modern English; 'this day'
    is more traditional but less natural.
- source_word: σωτὴρ
  chosen: Savior
  alternatives:
  - Deliverer
  lexicon: BDAG
  rationale: '''Savior'' is the established and most precise rendering in this theological
    and royal context, preserving both rescue and messianic significance.'
- source_word: ὅς ἐστιν
  chosen: who is
  alternatives:
  - who is the one who is
  lexicon: BDAG
  rationale: Straightforward relative clause linking 'Savior' with the identifying
    titles that follow.
- source_word: χριστὸς
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered 'Messiah' where it functions as a title
    rather than a name. Here it is titular and tied to Davidic expectation.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this christological confession
    it carries both authority and strong theological weight; 'Master' is too weak
    and atypical here.
- source_word: ἐν πόλει Δαυίδ
  chosen: in the city of David
  alternatives:
  - in David's city
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the prepositional phrase with genitive.
    Preserves the Davidic royal association and the likely reference to Bethlehem.
