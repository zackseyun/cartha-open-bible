id: LUK.2.8
reference: Luke 2:8
source:
  edition: SBLGNT
  text: Καὶ ποιμένες ἦσαν ἐν τῇ χώρᾳ τῇ αὐτῇ ἀγραυλοῦντες καὶ φυλάσσοντες φυλακὰς τῆς νυκτὸς ἐπὶ τὴν ποίμνην αὐτῶν.
translation:
  text: And there were shepherds in that same region[b][a], staying out in the fields and keeping watch over their flock by night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'living outdoors' or 'camping in the open.' The Greek verb emphasizes that the shepherds were spending the night outside in the fields.
    reason: lexical_alternative
  - marker: b
    text: Literally 'keeping watches of the night over their flock,' suggesting night watch in shifts.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιμένες
  chosen: shepherds
  alternatives:
  - herdsmen
  lexicon: BDAG
  rationale: The standard sense is 'shepherds,' specifically those who tend sheep. 'Herdsmen' is broader and less precise than the Greek noun.
- source_word: ἐν τῇ χώρᾳ τῇ αὐτῇ
  chosen: in that same region
  alternatives:
  - in the same country
  - in that area
  lexicon: BDAG
  rationale: χώρα can mean region, countryside, or district. 'Region' is natural modern English and fits the narrative reference to the vicinity just mentioned. 'Country' sounds archaic or overly broad in contemporary English.
- source_word: ἀγραυλοῦντες
  chosen: staying out in the fields
  alternatives:
  - living outdoors
  - camping in the open field
  lexicon: BDAG
  rationale: This participle denotes spending the night outdoors/in the open, especially in the fields. 'Staying out in the fields' captures the pastoral setting in readable English without over-paraphrasing.
- source_word: φυλάσσοντες φυλακὰς τῆς νυκτὸς
  chosen: keeping watch ... by night
  alternatives:
  - keeping the night watches
  - keeping watch through the night
  lexicon: BDAG
  rationale: The cognate construction literally refers to keeping watches of the night, i.e., taking turns on night watch. 'Keeping watch ... by night' is idiomatic English that preserves the nocturnal guarding sense. A more formal rendering like 'keeping the night watches' is possible but less natural.
- source_word: ἐπὶ τὴν ποίμνην αὐτῶν
  chosen: over their flock
  alternatives:
  - over their sheep
  - over the flock belonging to them
  lexicon: BDAG
  rationale: ποίμνη refers collectively to a flock, here the sheep under their care. 'Over their flock' fits English idiom with 'keeping watch' and preserves the collective noun.
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  lexicon: BDAG
  rationale: Luke commonly uses καί for straightforward narrative continuation. 'And' preserves the connective force without adding interpretive nuance.
- source_word: ἦσαν
  chosen: there were
  alternatives:
  - were
  lexicon: BDAG
  rationale: The existential use of εἰμί is best represented by 'there were' in English, introducing a new scene naturally.
