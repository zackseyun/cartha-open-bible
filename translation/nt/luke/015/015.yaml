id: LUK.15.15
reference: Luke 15:15
source:
  edition: SBLGNT
  text: καὶ πορευθεὶς ἐκολλήθη ἑνὶ τῶν πολιτῶν τῆς χώρας ἐκείνης, καὶ ἔπεμψεν αὐτὸν εἰς τοὺς ἀγροὺς αὐτοῦ βόσκειν χοίρους·
translation:
  text: So he went and joined himself to one of the citizens of that country[a], and he sent him into his fields to feed pigs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'joined himself to' or 'clung to'; the Greek verb suggests attaching oneself closely, even dependently, to someone.
    reason: lexical_alternative
lexical_decisions:
- source_word: πορευθεὶς
  chosen: went
  alternatives:
  - went off
  - departed
  lexicon: BDAG
  rationale: Aorist participle of πορεύομαι, functioning adverbially before the main verb. 'Went' is natural modern English and preserves the movement without adding nuance beyond the Greek.
- source_word: ἐκολλήθη
  chosen: attached himself to
  alternatives:
  - joined himself to
  - clung to
  lexicon: BDAG
  rationale: κολλάομαι literally conveys being joined or glued to someone. 'Attached himself to' preserves the sense of dependence and self-binding better than the more neutral 'joined' while remaining idiomatic.
- source_word: ἑνὶ τῶν πολιτῶν
  chosen: to one of the citizens
  alternatives:
  - to one of the residents
  - to one of the men
  lexicon: BDAG
  rationale: πολίτης denotes a citizen/member of a political community. 'Citizen' is the most direct rendering and fits the social setting of the parable.
- source_word: τῆς χώρας ἐκείνης
  chosen: of that country
  alternatives:
  - of that region
  - of that land
  lexicon: BDAG
  rationale: χώρα can mean country, region, or land. Here 'country' matches the earlier narrative setting of a far country and is clear in English.
- source_word: ἔπεμψεν
  chosen: he sent him
  alternatives:
  - he dispatched him
  lexicon: BDAG
  rationale: πέμπω is straightforwardly 'send.' The subject is the citizen just mentioned, so the English keeps the pronoun explicit.
- source_word: εἰς τοὺς ἀγροὺς αὐτοῦ
  chosen: into his fields
  alternatives:
  - to his farm fields
  - into his farms
  lexicon: BDAG
  rationale: ἀγρός commonly means field or farmland. 'Into his fields' is idiomatic and preserves the plural.
- source_word: βόσκειν
  chosen: to feed
  alternatives:
  - to tend
  - to pasture
  lexicon: BDAG
  rationale: βόσκω means to feed or pasture animals. 'To feed' is concise and natural here, especially with the direct object 'pigs.'
- source_word: χοίρους
  chosen: pigs
  alternatives:
  - swine
  lexicon: BDAG
  rationale: χοῖρος refers to pigs/swine. 'Pigs' is plain modern English; 'swine' is more formal or archaic.
