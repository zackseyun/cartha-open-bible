id: LUK.22.62
reference: Luke 22:62
source:
  edition: SBLGNT
  text: καὶ ἐξελθὼν ⸀ἔξω ἔκλαυσεν πικρῶς.
translation:
  text: And going outside[a], he wept bitterly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And having gone out, he wept bitterly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard connective; 'And' preserves the simple narrative linkage without adding temporal nuance beyond the Greek.
- source_word: ἐξελθὼν
  chosen: after going
  alternatives:
  - having gone out
  - going out
  lexicon: BDAG
  rationale: Aorist participle of ἐξέρχομαι, functioning adverbially prior to the main verb. 'After going' naturally conveys antecedent action in English while remaining close to the Greek.
- source_word: ἔξω
  chosen: outside
  alternatives:
  - out
  - outdoors
  lexicon: BDAG
  rationale: The adverb specifies the direction/location of the departure. 'Outside' is idiomatic modern English and preserves the spatial sense.
- source_word: ἔκλαυσεν
  chosen: he wept
  alternatives:
  - he cried
  lexicon: BDAG
  rationale: κλαίω commonly means 'weep' or 'cry.' 'Wept' better matches the solemnity of the context and is the more precise narrative verb here.
- source_word: πικρῶς
  chosen: bitterly
  alternatives:
  - with bitterness
  lexicon: BDAG
  rationale: The adverb intensifies the manner of Peter's weeping. 'Bitterly' is the direct and idiomatic equivalent.
