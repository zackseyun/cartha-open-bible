id: LUK.22.56
reference: Luke 22:56
source:
  edition: SBLGNT
  text: ἰδοῦσα δὲ αὐτὸν παιδίσκη τις καθήμενον πρὸς τὸ φῶς καὶ ἀτενίσασα αὐτῷ εἶπεν· Καὶ οὗτος σὺν αὐτῷ ἦν·
translation:
  text: Then a certain servant girl[a], seeing him seated by the light and looking intently at him, said, “This man also was with him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “by the light.” The Greek phrase can denote position near the light source as well as being in the illuminated area.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοῦσα
  chosen: seeing
  alternatives:
  - when she saw
  - having seen
  lexicon: BDAG
  rationale: Aorist participle of ὁράω introducing the servant girl's perception of Peter. 'Seeing' keeps the participial flow natural in English without overformal stiffness.
- source_word: δὲ
  chosen: Then
  alternatives:
  - And
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here marks narrative progression rather than strong contrast. 'Then' conveys the next step in the scene smoothly in modern English.
- source_word: παιδίσκη τις
  chosen: a certain servant girl
  alternatives:
  - a servant girl
  - a slave girl
  - a certain maidservant
  lexicon: BDAG
  rationale: παιδίσκη denotes a young female servant/slave. 'Servant girl' is the most natural readable rendering here; the bonded status is not the focus of the scene, so 'slave girl' would overemphasize it. τις adds indefiniteness, captured by 'a certain'.
- source_word: καθήμενον
  chosen: seated
  alternatives:
  - sitting
  lexicon: BDAG
  rationale: Present participle describing Peter's posture. 'Seated' reads idiomatically with the following phrase and avoids repetitive '-ing' forms in English.
- source_word: πρὸς τὸ φῶς
  chosen: in the light
  alternatives:
  - by the light
  - toward the light
  - near the firelight
  lexicon: BDAG
  rationale: The phrase indicates Peter's position relative to the light source, likely the courtyard fire. 'In the light' communicates that he was visible in the illuminated area. 'Near the firelight' is interpretive and imports detail from context rather than this clause alone.
- source_word: ἀτενίσασα
  chosen: looking intently at him
  alternatives:
  - staring at him
  - fixing her gaze on him
  lexicon: BDAG
  rationale: The participle conveys focused, sustained looking. 'Looking intently at him' preserves the force without sounding overly colloquial or harsh.
- source_word: Καὶ οὗτος
  chosen: This man also
  alternatives:
  - This one also
  - This fellow too
  lexicon: BDAG
  rationale: οὗτος is demonstrative and somewhat pointed. 'This man' is natural English and preserves the identifying force; 'also' reflects καί.
- source_word: σὺν αὐτῷ ἦν
  chosen: was with him
  alternatives:
  - was together with him
  - was one of his companions
  lexicon: BDAG
  rationale: σύν with the dative plus ἦν straightforwardly means association or company. 'Was with him' is the clearest and most direct rendering.
