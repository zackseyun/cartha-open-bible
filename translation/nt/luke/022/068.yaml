id: LUK.22.68
reference: Luke 22:68
source:
  edition: SBLGNT
  text: ἐὰν ⸀δὲ ἐρωτήσω, οὐ μὴ ⸀ἀποκριθῆτε.
translation:
  text: But if I ask[a], you will certainly not answer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'you will by no means answer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν
  chosen: if
  alternatives:
  - if ever
  - if indeed
  lexicon: BDAG
  rationale: Introduces a conditional clause. Simple 'if' best fits natural English without adding emphasis not required by the context.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks contrast with the surrounding statements. 'But' captures the adversative force more clearly than a simple connective.
- source_word: ἐρωτήσω
  chosen: I ask
  alternatives:
  - I question
  - I interrogate
  lexicon: BDAG
  rationale: Aorist subjunctive after ἐὰν forms a future-more-vivid condition. 'Ask' is the most natural and sufficiently broad rendering in context, without over-specifying hostile interrogation.
- source_word: οὐ μὴ
  chosen: will certainly not
  alternatives:
  - will by no means
  - will never
  lexicon: BDAG
  rationale: The double negative with the subjunctive is an emphatic negation. 'Will certainly not' preserves the force in clear modern English; 'by no means' is more traditional but less natural.
- source_word: ἀποκριθῆτε
  chosen: answer
  alternatives:
  - reply
  - respond
  lexicon: BDAG
  rationale: Passive-form deponent verb meaning 'answer/respond.' 'Answer' is the most direct and idiomatic English equivalent in this judicial-dialogue setting.
