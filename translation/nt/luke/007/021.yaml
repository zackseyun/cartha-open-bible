id: LUK.7.21
reference: Luke 7:21
source:
  edition: SBLGNT
  text: ἐν ⸀ἐκείνῃ τῇ ὥρᾳ ἐθεράπευσεν πολλοὺς ἀπὸ νόσων καὶ μαστίγων καὶ πνευμάτων πονηρῶν, καὶ τυφλοῖς πολλοῖς ⸀ἐχαρίσατο βλέπειν.
translation:
  text: In that hour he healed many from diseases and afflictions and evil spirits[c][b][a], and to many blind people he granted sight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In that very hour.' The Greek expression can emphasize the immediacy of the moment.
    reason: lexical_alternative
  - marker: b
    text: Or 'scourges' or 'plagues' for 'afflictions'; the Greek term can refer literally to lashes or, by extension, severe bodily suffering.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'he granted to see.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἐκείνῃ τῇ ὥρᾳ
  chosen: In that hour
  alternatives:
  - At that time
  - In that very hour
  lexicon: BDAG
  rationale: A relatively formal rendering preserves Luke’s temporal specificity. 'In that hour' reflects the idiom closely, while remaining natural English.
- source_word: ἐθεράπευσεν
  chosen: he healed
  alternatives:
  - he cured
  lexicon: BDAG
  rationale: θεραπεύω commonly means to heal/cure. 'He healed' is the standard and most natural rendering in Gospel miracle contexts.
- source_word: πολλοὺς
  chosen: many
  alternatives:
  - many people
  lexicon: BDAG
  rationale: The object is implicit in English after 'he healed.' 'Many' is sufficient and avoids adding more than the Greek states.
- source_word: ἀπὸ νόσων
  chosen: of diseases
  alternatives:
  - from diseases
  - from sicknesses
  lexicon: BDAG
  rationale: With θεραπεύω, ἀπό marks separation from the condition. English idiom after 'healed' commonly uses 'of' ('healed many of diseases'), though 'from' is also possible. 'Diseases' fits νόσοι well.
- source_word: μαστίγων
  chosen: afflictions
  alternatives:
  - scourges
  - plagues
  lexicon: BDAG
  rationale: Though μάστιξ literally denotes a whip/scourge, in healing contexts it extends metaphorically to severe afflictions or plagues. 'Afflictions' communicates the sense clearly in modern English without over-literalizing.
- source_word: πνευμάτων πονηρῶν
  chosen: evil spirits
  alternatives:
  - unclean spirits
  - wicked spirits
  lexicon: BDAG
  rationale: The adjective is πονηρῶν ('evil'), not ἀκαθάρτων ('unclean'), so 'evil spirits' is the most direct rendering.
- source_word: τυφλοῖς πολλοῖς
  chosen: to many blind people
  alternatives:
  - to many who were blind
  - to many blind men
  lexicon: BDAG
  rationale: The dative marks the recipients of the following verb. 'Blind people' is natural English and avoids unnecessarily restricting the group to males.
- source_word: ἐχαρίσατο
  chosen: he granted
  alternatives:
  - he graciously gave
  - he gave
  lexicon: BDAG
  rationale: χαρίζομαι emphasizes giving freely or graciously. 'Granted' preserves the benefactive nuance without sounding overly formal; the gracious sense is implicit in the verb.
- source_word: βλέπειν
  chosen: sight
  alternatives:
  - to see
  lexicon: BDAG
  rationale: The infinitive literally means 'to see,' but English idiom after 'granted' often prefers the nominal expression 'granted sight.' This is a modest dynamic adjustment for readability while preserving meaning.
