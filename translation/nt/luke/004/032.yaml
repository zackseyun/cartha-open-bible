theological_decisions:
- issue: Nature of Jesus' authority in speech
  chosen_reading: Rendered descriptively as 'his word was with authority' without expanding the source into a doctrinal explanation of divine authority.
  alternative_readings:
  - his message had authority
  - what he said was authoritative
  rationale: The verse clearly presents Jesus' speech as authoritative, but it does not itself specify the full theological ground of that authority. The translation preserves the text's claim without importing a fuller christological explanation not stated in this verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
