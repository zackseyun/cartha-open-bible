id: LUK.4.32
reference: Luke 4:32
source:
  edition: SBLGNT
  text: καὶ ἐξεπλήσσοντο ἐπὶ τῇ διδαχῇ αὐτοῦ, ὅτι ἐν ἐξουσίᾳ ἦν ὁ λόγος αὐτοῦ.
translation:
  text: And they were astonished at his teaching[a], because his word had authority.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his message was authoritative' or 'what he said was with authority.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεπλήσσοντο
  chosen: were astonished
  alternatives:
  - were amazed
  - were struck with amazement
  lexicon: BDAG
  rationale: Imperfect middle/passive conveys an ongoing or repeated reaction of amazement. 'Were astonished' is natural modern English and preserves the strength of the response without sounding overly paraphrastic.
- source_word: ἐπὶ τῇ διδαχῇ αὐτοῦ
  chosen: at his teaching
  alternatives:
  - because of his teaching
  - at his doctrine
  lexicon: BDAG
  rationale: ἐπί with the dative here marks the basis/object of their astonishment. 'Teaching' is clearer and more contemporary than 'doctrine' while accurately rendering διδαχή.
- source_word: διδαχῇ
  chosen: teaching
  alternatives:
  - instruction
  - doctrine
  lexicon: BDAG
  rationale: διδαχή can denote teaching content or act; here 'teaching' naturally covers both and fits the narrative context of synagogue instruction.
- source_word: ἐν ἐξουσίᾳ
  chosen: with authority
  alternatives:
  - in authority
  - authoritatively
  lexicon: BDAG
  rationale: This idiom describes the manner/quality of Jesus' speech. 'With authority' is the most idiomatic English equivalent and preserves the emphasis on inherent authoritative force rather than merely style.
- source_word: ὁ λόγος αὐτοῦ
  chosen: his word
  alternatives:
  - his message
  - what he said
  lexicon: BDAG
  rationale: λόγος here refers to Jesus' spoken word or speech. 'His word' is slightly more formal than 'what he said' and preserves the compactness of the Greek while remaining understandable. 'Message' would shift toward content alone and lose the directness of the expression.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason for their astonishment. 'Because' makes the causal sense explicit in contemporary English.
