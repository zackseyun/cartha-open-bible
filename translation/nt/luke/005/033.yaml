id: LUK.5.33
reference: Luke 5:33
source:
  edition: SBLGNT
  text: Οἱ δὲ εἶπαν πρὸς αὐτόν· ⸀Οἱ μαθηταὶ Ἰωάννου νηστεύουσιν πυκνὰ καὶ δεήσεις ποιοῦνται, ὁμοίως καὶ οἱ τῶν Φαρισαίων, οἱ δὲ σοὶ ἐσθίουσιν καὶ πίνουσιν.
translation:
  text: And they said to him[a], “John’s disciples fast often and make prayers; likewise also those of the Pharisees[b], but yours eat and drink.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the disciples of the Pharisees.' The Greek reads literally 'those of the Pharisees,' with 'disciples' implied from the previous clause.
    reason: lexical_alternative
  - marker: b
    text: Or 'but your disciples.' The Greek reads simply 'but yours,' with 'disciples' understood from context.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἱ δὲ εἶπαν πρὸς αὐτόν
  chosen: And they said to him
  alternatives:
  - Now they said to him
  - But they said to him
  lexicon: BDAG
  rationale: δέ is a mild connective; 'And' preserves narrative flow in natural English without overstating contrast.
- source_word: μαθηταὶ Ἰωάννου
  chosen: John’s disciples
  alternatives:
  - the disciples of John
  lexicon: BDAG
  rationale: Genitive is naturally rendered as possession/association in English; the contracted form is clear and idiomatic.
- source_word: νηστεύουσιν πυκνά
  chosen: fast often
  alternatives:
  - fast frequently
  lexicon: BDAG
  rationale: πυκνά here functions adverbially, indicating frequency. 'Often' is natural modern English and accurately conveys repeated practice.
- source_word: δεήσεις ποιοῦνται
  chosen: offer prayers
  alternatives:
  - make prayers
  - pray
  lexicon: BDAG
  rationale: The idiom ποιεῖσθαι δεήσεις is more specific than the simple verb 'pray'; 'offer prayers' preserves the nominal force and sense of devotional acts.
- source_word: ὁμοίως καὶ
  chosen: likewise also
  alternatives:
  - likewise
  - and likewise
  - in the same way also
  lexicon: BDAG
  rationale: Both adverb and conjunction are present; 'likewise also' reflects the cumulative emphasis, though still readable.
- source_word: οἱ τῶν Φαρισαίων
  chosen: those of the Pharisees
  alternatives:
  - the disciples of the Pharisees
  - those belonging to the Pharisees
  lexicon: BDAG
  rationale: The noun 'disciples' is not repeated in Greek but implied from the prior clause. 'Those of the Pharisees' preserves the ellipsis more transparently than supplying 'disciples' in the main text.
- source_word: οἱ δὲ σοὶ
  chosen: but yours
  alternatives:
  - but your disciples
  - but those of you
  lexicon: BDAG
  rationale: σοί here stands elliptically for 'your disciples.' 'Yours' preserves the Greek brevity and contrast; the referent is clear from context.
- source_word: ἐσθίουσιν καὶ πίνουσιν
  chosen: eat and drink
  alternatives:
  - are eating and drinking
  lexicon: BDAG
  rationale: Present tense here expresses customary behavior in contrast with fasting. Simple present in English communicates the general practice well.
