theological_decisions:
- issue: Referent and force of 'to them' in εἰς μαρτύριον αὐτοῖς
  chosen_reading: Left as 'to them' without specifying the group or whether the testimony is positive or negative.
  alternative_readings:
  - to the priests
  - to the people
  - as evidence against them
  rationale: The Greek does not explicitly identify the referent beyond the pronoun, and the phrase can carry a range of nuance. Preserving the ambiguity follows the translation philosophy of not resolving tensions the text itself leaves open.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
