id: LUK.5.23
reference: Luke 5:23
source:
  edition: SBLGNT
  text: τί ἐστιν εὐκοπώτερον, εἰπεῖν· Ἀφέωνταί σοι αἱ ἁμαρτίαι σου, ἢ εἰπεῖν· ⸀Ἔγειρε καὶ περιπάτει;
translation:
  text: 'Which is easier: to say[a], ‘Your sins are forgiven you,’ or to say, ‘Rise and walk’?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Your sins have been forgiven you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: τί ἐστιν εὐκοπώτερον
  chosen: Which is easier
  alternatives:
  - What is easier
  - Which is more easy
  lexicon: BDAG
  rationale: The neuter comparative εὐκοπώτερον with τί forms an idiomatic question about relative ease. 'Which is easier' is natural modern English and preserves the comparative force.
- source_word: εἰπεῖν
  chosen: to say
  alternatives:
  - to speak
  lexicon: BDAG
  rationale: The infinitive introduces the content of the two alternative statements. 'To say' is the standard and most natural rendering here.
- source_word: Ἀφέωνταί
  chosen: are forgiven
  alternatives:
  - have been forgiven
  - are released
  lexicon: BDAG
  rationale: ἀφίημι in this context refers to forgiveness of sins. The perfect/passive-form verb conveys a present state resulting from completed action; English 'are forgiven' communicates the state clearly and idiomatically without overloading the tense.
- source_word: σοι
  chosen: you
  alternatives:
  - to you
  - for you
  lexicon: BDAG
  rationale: The dative pronoun is naturally expressed in English as the indirect object in 'are forgiven you.' This preserves the personal address without awkward expansion.
- source_word: αἱ ἁμαρτίαι σου
  chosen: your sins
  alternatives:
  - the sins of yours
  lexicon: BDAG
  rationale: This is the straightforward possessive construction. 'Your sins' is idiomatic and exact.
- source_word: ἢ
  chosen: or
  lexicon: BDAG
  rationale: Standard disjunctive conjunction contrasting the two infinitival clauses.
- source_word: Ἔγειρε
  chosen: Rise
  alternatives:
  - Get up
  - Stand up
  lexicon: BDAG
  rationale: The present imperative calls for the man to get up. 'Rise' is concise, dignified, and fits the solemn tone of Jesus' challenge. 'Get up' is possible but slightly less elevated.
- source_word: καὶ περιπάτει
  chosen: and walk
  alternatives:
  - and be walking
  - and walk around
  lexicon: BDAG
  rationale: περιπατέω here refers to literal walking, not metaphorical conduct. 'And walk' is the natural imperative pair with 'Rise.'
