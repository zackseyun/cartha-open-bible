id: LUK.16.17
reference: Luke 16:17
source:
  edition: SBLGNT
  text: Εὐκοπώτερον δέ ἐστιν τὸν οὐρανὸν καὶ τὴν γῆν παρελθεῖν ἢ τοῦ νόμου μίαν κεραίαν πεσεῖν.
translation:
  text: But it is easier for heaven and earth to pass away than for one stroke of a letter of the Law to fall[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one tittle'—that is, one tiny stroke distinguishing one letter from another.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐκοπώτερον
  chosen: easier
  alternatives:
  - more possible
  - less difficult
  lexicon: BDAG
  rationale: Comparative adjective meaning 'easier' or 'more readily possible.' 'Easier' is the most natural English comparative here and preserves the force of the comparison.
- source_word: δέ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild contrast or continuation with the preceding context. 'But' best preserves the adversative nuance in readable English.
- source_word: τὸν οὐρανὸν καὶ τὴν γῆν
  chosen: heaven and earth
  alternatives:
  - the sky and the earth
  lexicon: BDAG
  rationale: This is a standard merism for the created order/cosmos. 'Heaven and earth' preserves the biblical idiom better than 'sky and earth.'
- source_word: παρελθεῖν
  chosen: to pass away
  alternatives:
  - to pass by
  - to disappear
  lexicon: BDAG
  rationale: In this context the infinitive refers to the passing away of heaven and earth, not merely movement past something. 'Pass away' is the established and accurate idiom.
- source_word: νόμου
  chosen: the Law
  alternatives:
  - the law
  lexicon: BDAG
  rationale: In Luke's Jewish scriptural context, νόμος here most naturally refers to the Law in the scriptural sense rather than law in general. Capitalizing 'Law' helps signal that referent in English.
- source_word: μίαν κεραίαν
  chosen: one stroke of a letter
  alternatives:
  - one serif
  - one tiny mark
  - one tittle
  lexicon: BDAG
  rationale: κεραία denotes a small projection or stroke in a written letter. 'One stroke of a letter' communicates the sense clearly in modern English without archaic wording like 'tittle.'
- source_word: πεσεῖν
  chosen: to fall
  alternatives:
  - to drop out
  - to fail
  lexicon: BDAG
  rationale: The verb is literally 'to fall.' In context it conveys the loss or invalidation of even the smallest part of the Law. Retaining 'fall' preserves the imagery while remaining intelligible.
