theological_decisions:
- issue: Referent of νόμος
  chosen_reading: the Law as the scriptural Law, not law in a generic sense
  alternative_readings:
  - law in general
  rationale: The immediate Lukan context and the idiomatic comparison with heaven and earth point to the enduring validity of God's revealed Law. The translation signals this with capitalization while avoiding over-interpretation beyond the text.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of κεραία
  chosen_reading: one stroke of a letter
  alternative_readings:
  - one tittle
  rationale: The verse emphasizes the permanence of even the smallest written detail of the Law. A modern explanatory rendering communicates this without relying on archaic ecclesiastical vocabulary.
  doctrine_reference: Translation philosophy §6
