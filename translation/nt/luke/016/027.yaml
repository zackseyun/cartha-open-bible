id: LUK.16.27
reference: Luke 16:27
source:
  edition: SBLGNT
  text: εἶπεν δέ· Ἐρωτῶ ⸂σε οὖν⸃, πάτερ, ἵνα πέμψῃς αὐτὸν εἰς τὸν οἶκον τοῦ πατρός μου,
translation:
  text: Then he said[a], ‘I ask you then, father, that you send him to my father’s house,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I beg you.” The Greek verb can express an earnest request, though “I ask” is the more basic sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν δέ
  chosen: Then he said
  alternatives:
  - But he said
  - And he said
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'Then' gives natural English flow while preserving the discourse progression better than a bare 'and'.
- source_word: Ἐρωτῶ
  chosen: I ask
  alternatives:
  - I beg
  - I request
  lexicon: BDAG
  rationale: ἐρωτάω commonly means 'ask, request.' In this context the rich man is making an earnest appeal, but 'I ask' stays closest to the lexical sense without overstating the emotional force as 'I beg' might.
- source_word: σε οὖν
  chosen: you, so
  alternatives:
  - you therefore
  - you then
  lexicon: BDAG
  rationale: οὖν marks inference or continuation from the prior refusal. In idiomatic English, 'So I ask you' best captures the connective force without sounding wooden.
- source_word: πάτερ
  chosen: father
  alternatives:
  - Father
  lexicon: BDAG
  rationale: The address is to Abraham within the parable, not directly to God. Lowercase 'father' preserves the vocative sense and avoids importing a divine-title reading.
- source_word: ἵνα πέμψῃς
  chosen: that you send
  alternatives:
  - so that you may send
  - to send
  lexicon: BDAG
  rationale: After verbs of asking, ἵνα with subjunctive commonly expresses the content/purpose of the request. 'That you send' is natural English and preserves the dependent request structure.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: The pronoun refers to Lazarus from the preceding context. 'Him' is the straightforward referential rendering.
- source_word: εἰς τὸν οἶκον τοῦ πατρός μου
  chosen: to my father’s house
  alternatives:
  - into my father’s house
  - to the house of my father
  lexicon: BDAG
  rationale: οἶκος here denotes household/home. 'My father’s house' is idiomatic and accurate; 'to' works naturally in English for the destination sense of εἰς in this context.
