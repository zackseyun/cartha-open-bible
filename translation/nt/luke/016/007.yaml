id: LUK.16.7
reference: Luke 16:7
source:
  edition: SBLGNT
  text: ἔπειτα ἑτέρῳ εἶπεν· Σὺ δὲ πόσον ὀφείλεις; ὁ δὲ εἶπεν· Ἑκατὸν κόρους σίτου·
    ⸀λέγει αὐτῷ· Δέξαι σου ⸂τὰ γράμματα⸃ καὶ γράψον ὀγδοήκοντα.
translation:
  text: Then he said to another, ‘And you, how much do you owe?’ He said, ‘A hundred
    cors of wheat.’ He says to him, ‘Take your bill and write eighty.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your written contract' or 'your documents'; Greek 'your writings' (τὰ
      γράμματα), referring here to the debtor's written bill/account.
    reason: lexical_alternative
  - marker: b
    text: A cor was a large dry measure used for grain.
    reason: cultural_note
lexical_decisions:
- source_word: ἔπειτα
  chosen: Then
  alternatives:
  - Next
  - After that
  lexicon: BDAG
  rationale: Temporal/sequential adverb introducing the next debtor in the narrative.
    'Then' is natural modern English and preserves the sequence.
- source_word: ἑτέρῳ
  chosen: to another
  alternatives:
  - to a different one
  - to another man
  lexicon: BDAG
  rationale: Dative of indirect object with ἕτερος, indicating another person distinct
    from the previous debtor. 'To another' is concise and sufficient without adding
    'man,' which is not explicit.
- source_word: Σὺ δὲ
  chosen: And you
  alternatives:
  - But you
  - You also
  lexicon: BDAG
  rationale: The pronoun is emphatic, and δέ marks mild contrast/transition. 'And
    you' captures the steward's direct, pointed address in idiomatic English.
- source_word: πόσον ὀφείλεις
  chosen: how much do you owe
  alternatives:
  - how much are you indebted
  - what do you owe
  lexicon: BDAG
  rationale: ὀφείλω here refers to financial indebtedness. 'How much do you owe' is
    clear, natural, and contextually precise.
- source_word: Ἑκατὸν κόρους σίτου
  chosen: A hundred cors of wheat
  alternatives:
  - A hundred measures of wheat
  - A hundred kors of wheat
  lexicon: BDAG
  rationale: κόρος is a specific large dry measure. 'Cor' is a standard English transliteration
    preserving the ancient unit more accurately than the generic 'measure.' 'Wheat'
    is the natural rendering of σῖτος here.
- source_word: λέγει αὐτῷ
  chosen: He says to him
  alternatives:
  - He said to him
  - He tells him
  lexicon: BDAG
  rationale: The Greek shifts to the historical present λέγει. Rendering it as 'He
    says to him' preserves the narrative vividness rather than flattening it to past
    tense.
- source_word: Δέξαι
  chosen: Take
  alternatives:
  - Receive
  - Get
  lexicon: BDAG
  rationale: Aorist middle imperative of δέχομαι in this documentary context means
    to take/receive possession of the document. 'Take' is the most natural command
    in English.
- source_word: σου τὰ γράμματα
  chosen: your bill
  alternatives:
  - your written contract
  - your documents
  - your account
  lexicon: BDAG
  rationale: γράμματα literally means 'writings/documents,' but in this debt-setting
    it refers to the debtor's written bill or account document. Singular 'bill' is
    idiomatic English for the function of the document, even though the Greek is plural.
- source_word: γράψον ὀγδοήκοντα
  chosen: write eighty
  alternatives:
  - write down eighty
  - make it eighty
  lexicon: BDAG
  rationale: The command is to alter the written amount to eighty. 'Write eighty'
    stays close to the Greek while remaining clear in context.
