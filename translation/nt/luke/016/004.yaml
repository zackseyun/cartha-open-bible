id: LUK.16.4
reference: Luke 16:4
source:
  edition: SBLGNT
  text: ἔγνων τί ποιήσω, ἵνα ὅταν μετασταθῶ ⸀ἐκ τῆς οἰκονομίας δέξωνταί με εἰς τοὺς
    οἴκους ⸀ἑαυτῶν.
translation:
  text: I know what I will do, so that when I am removed from the management, they
    may receive me into their homes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "when I am dismissed from the stewardship".
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγνων
  chosen: I know
  alternatives:
  - I have decided
  - I have found out
  lexicon: BDAG
  rationale: 'Aorist of γινώσκω here functions idiomatically as an ingressive/resultative
    expression: the steward has come to a realization. English present ''I know''
    is the most natural rendering in context and matches the force of a sudden decision
    better than a wooden past tense ''I knew.'''
- source_word: τί ποιήσω
  chosen: what I will do
  alternatives:
  - what I should do
  - what to do
  lexicon: BDAG
  rationale: The deliberative subjunctive after τί expresses contemplated action.
    'What I will do' captures the speaker's resolved plan in idiomatic English; 'what
    to do' is possible but slightly less explicit.
- source_word: ἵνα ὅταν
  chosen: so that when
  alternatives:
  - in order that when
  - so that whenever
  lexicon: BDAG
  rationale: 'The combination expresses purpose with a future contingency: he forms
    a plan with the aim that, when the dismissal happens, a certain result will follow.
    ''So that when'' is natural English and preserves both elements.'
- source_word: μετασταθῶ
  chosen: I am removed
  alternatives:
  - I am dismissed
  - I am transferred
  lexicon: BDAG
  rationale: Passive of μεθίστημι means to be removed from a position. In this parable
    the sense is specifically loss of office. 'Removed' is slightly more literal and
    broad, while still fitting the context of dismissal.
- source_word: ἐκ τῆς οἰκονομίας
  chosen: from the management
  alternatives:
  - from stewardship
  - from my position as manager
  lexicon: BDAG
  rationale: οἰκονομία here denotes the office or responsibility of household management,
    not an abstract 'economy.' 'Management' is concise and natural; 'stewardship'
    is possible but can sound more theological than the immediate parable context
    warrants.
- source_word: δέξωνταί με
  chosen: they may receive me
  alternatives:
  - they may welcome me
  lexicon: BDAG
  rationale: δέχομαι commonly means receive or welcome. 'Receive me' preserves the
    verbal link to hospitality without over-interpreting the warmth of the action.
- source_word: εἰς τοὺς οἴκους ἑαυτῶν
  chosen: into their homes
  alternatives:
  - into their houses
  - into their own houses
  lexicon: BDAG
  rationale: οἶκος can mean house or household/home. In this context of taking someone
    in, 'homes' is more idiomatic English. The reflexive ἑαυτῶν is represented by
    'their,' and 'own' is not required in English though it is implicit.
