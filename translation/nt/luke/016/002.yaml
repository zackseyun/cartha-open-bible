id: LUK.16.2
reference: Luke 16:2
source:
  edition: SBLGNT
  text: καὶ φωνήσας αὐτὸν εἶπεν αὐτῷ· Τί τοῦτο ἀκούω περὶ σοῦ; ἀπόδος τὸν λόγον τῆς
    οἰκονομίας σου, οὐ γὰρ ⸀δύνῃ ἔτι οἰκονομεῖν.
translation:
  text: And after calling him, he said to him, “What is this that I hear about you?
    Give an account of your stewardship, for you are no longer able to manage.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Give the account of your management” or “Render the account of your
      stewardship.”
    reason: lexical_alternative
  - marker: b
    text: Or “for you can no longer serve as steward.”
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνήσας
  chosen: after calling him
  alternatives:
  - having called him
  - summoning him
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb, naturally rendered as antecedent
    action in English. 'After calling him' is clear modern English while preserving
    the sequence.
- source_word: Τί τοῦτο ἀκούω περὶ σοῦ;
  chosen: What is this that I hear about you?
  alternatives:
  - What is this I hear about you?
  - What is this report I hear concerning you?
  lexicon: BDAG
  rationale: Keeps the rhetorical force of the Greek question without over-paraphrasing.
    'About you' is the natural rendering of περὶ σοῦ here.
- source_word: ἀπόδος
  chosen: Give
  alternatives:
  - Render
  - Produce
  lexicon: BDAG
  rationale: Imperative of ἀποδίδωμι here means to give or render in response to a
    demand. 'Give' is idiomatic in the accounting context.
- source_word: τὸν λόγον
  chosen: an account
  alternatives:
  - the account
  - the reckoning
  lexicon: BDAG
  rationale: In this administrative context λόγος refers to an account or accounting,
    not merely a 'word' or 'statement.' The anarthrous English 'an account' is idiomatic
    though the Greek has the article.
- source_word: τῆς οἰκονομίας σου
  chosen: of your stewardship
  alternatives:
  - of your management
  - of your administration
  lexicon: BDAG
  rationale: οἰκονομία here denotes the office or responsibility of managing another's
    household or estate. 'Stewardship' preserves the role-specific sense better than
    the more generic 'management.'
- source_word: οὐ γὰρ δύνῃ ἔτι οἰκονομεῖν
  chosen: for you are no longer able to manage
  alternatives:
  - for you can no longer be steward
  - for you are no longer able to serve as manager
  lexicon: BDAG
  rationale: δύνῃ + infinitive expresses inability, and ἔτι marks cessation ('no longer').
    Rendering οἰκονομεῖν as 'manage' gives natural English while matching the verbal
    sense related to stewardship.
- source_word: οἰκονομεῖν
  chosen: to manage
  alternatives:
  - to be steward
  - to administer
  lexicon: BDAG
  rationale: The verb cognate with οἰκονομία refers to carrying out the steward's
    managerial function. 'Manage' is concise and idiomatic in context, while the noun
    'stewardship' earlier preserves the office terminology.
