theological_decisions:
- issue: Rendering of εἰς τὸν κόλπον Ἀβραάμ
  chosen_reading: Abraham’s bosom
  alternative_readings:
  - Abraham's side
  rationale: The phrase is culturally and theologically loaded in this parable. A
    more literal rendering preserves the metaphor and avoids prematurely resolving
    it into a generalized afterlife expression. Because modern readers may find 'bosom'
    opaque, the idiomatic alternative 'side' is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
