id: LUK.16.22
reference: Luke 16:22
source:
  edition: SBLGNT
  text: ἐγένετο δὲ ἀποθανεῖν τὸν πτωχὸν καὶ ἀπενεχθῆναι αὐτὸν ὑπὸ τῶν ἀγγέλων εἰς
    τὸν κόλπον Ἀβραάμ· ἀπέθανεν δὲ καὶ ὁ πλούσιος καὶ ἐτάφη.
translation:
  text: Now it happened that the poor man died and was carried by the angels to Abraham’s
    bosom. And the rich man also died and was buried.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to Abraham’s side.' The Greek expression is literally 'to the bosom
      of Abraham,' an image of closeness, honor, and fellowship.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο δὲ
  chosen: Now it happened that
  alternatives:
  - And it happened that
  - Then it happened that
  lexicon: BDAG
  rationale: The impersonal narrative formula ἐγένετο + infinitive is common in Luke.
    'Now it happened that' preserves the event-transition force without sounding overly
    wooden. δέ is represented by 'Now' as a mild narrative shift.
- source_word: ἀποθανεῖν
  chosen: died
  alternatives:
  - to die
  lexicon: BDAG
  rationale: Although the Greek uses an infinitive dependent on ἐγένετο, idiomatic
    English expresses the event as 'the poor man died.' This preserves the sense without
    awkwardness.
- source_word: τὸν πτωχὸν
  chosen: the poor man
  alternatives:
  - the poor one
  - the beggar
  lexicon: BDAG
  rationale: πτωχός means 'poor' or 'destitute.' 'The poor man' is the most direct
    rendering here. 'The beggar' would import a detail from the broader context rather
    than this clause alone.
- source_word: ἀπενεχθῆναι αὐτὸν
  chosen: was carried
  alternatives:
  - was borne
  - was taken away
  lexicon: BDAG
  rationale: The passive infinitive of ἀποφέρω here denotes being carried away. 'Was
    carried' is natural modern English and preserves the passive sense.
- source_word: ὑπὸ τῶν ἀγγέλων
  chosen: by the angels
  alternatives:
  - by angels
  lexicon: BDAG
  rationale: The article is present in Greek, so 'the angels' is retained. This also
    matches the specified agency of the passive verb.
- source_word: εἰς τὸν κόλπον Ἀβραάμ
  chosen: to Abraham’s bosom
  alternatives:
  - to Abraham's side
  - into Abraham's bosom
  lexicon: BDAG
  rationale: κόλπος literally refers to bosom/chest/lap and idiomatically to a place
    at someone's side, especially in table fellowship or intimate nearness. 'Abraham’s
    bosom' preserves the traditional and more literal imagery; the more interpretive
    'Abraham’s side' is preserved in a footnote.
- source_word: ἀπέθανεν δὲ καὶ ὁ πλούσιος
  chosen: And the rich man also died
  alternatives:
  - But the rich man also died
  - Now the rich man also died
  lexicon: BDAG
  rationale: This clause mirrors the earlier death statement and highlights the parallel
    fate of both men. 'Also' represents καί naturally in English.
- source_word: ἐτάφη
  chosen: was buried
  lexicon: BDAG
  rationale: The passive of θάπτω straightforwardly means 'was buried.' The brevity
    of the clause is preserved.
