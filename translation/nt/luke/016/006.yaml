id: LUK.16.6
reference: Luke 16:6
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν· Ἑκατὸν βάτους ἐλαίου· ⸂ὁ δὲ⸃ εἶπεν αὐτῷ· Δέξαι σου ⸂τὰ γράμματα⸃
    καὶ καθίσας ταχέως γράψον πεντήκοντα.
translation:
  text: He said, ‘A hundred baths of olive oil.’ Then he said to him, ‘Take your bill,
    sit down quickly, and write fifty.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A bath was an ancient liquid measure. The Greek reads ‘a hundred baths of
      olive oil.’
    reason: cultural_note
  - marker: b
    text: Or ‘your written contract’ or ‘your documents’; Greek ‘your writings.’ In
      context this refers to the debtor’s written bill or debt record.
    reason: lexical_alternative
lexical_decisions:
- source_word: βάτους
  chosen: baths
  alternatives:
  - measures
  lexicon: BDAG
  rationale: βάτος is a specific liquid measure, not a generic ‘measure.’ Rendering
    it as ‘baths’ preserves the concrete ancient unit and avoids flattening the economic
    detail of the parable. A more interpretive equivalent like ‘measures’ is possible
    but less precise.
- source_word: ἐλαίου
  chosen: olive oil
  alternatives:
  - oil
  lexicon: BDAG
  rationale: ἔλαιον commonly refers to olive oil in this context. ‘Olive oil’ is clearer
    for modern readers than the broader ‘oil’ and reflects the likely commodity in
    view.
- source_word: Δέξαι
  chosen: Take
  alternatives:
  - Receive
  - Get
  lexicon: BDAG
  rationale: The aorist middle imperative of δέχομαι here functions naturally as an
    instruction to take possession of or take in hand the document. ‘Take’ is idiomatic
    and fits the immediate action better than the more formal ‘receive.’
- source_word: τὰ γράμματα
  chosen: your bill
  alternatives:
  - your written contract
  - your documents
  - your account
  lexicon: BDAG
  rationale: γράμματα literally means ‘writings/documents/letters,’ but in this debt-setting
    it refers to the written record of indebtedness. ‘Your bill’ is concise, natural
    English that captures the commercial sense. Because the Greek is plural, a more
    formal rendering like ‘documents’ is possible, but singular ‘bill’ best reflects
    idiomatic English for the debt instrument.
- source_word: καθίσας
  chosen: sit down
  alternatives:
  - having sat down
  - sit
  lexicon: BDAG
  rationale: 'The participle is attendant to the following imperative and is best
    rendered idiomatically in English as a coordinate command: ‘sit down ... and write.’
    This preserves the sequence of actions without awkward literalism.'
- source_word: ταχέως
  chosen: quickly
  alternatives:
  - at once
  - promptly
  lexicon: BDAG
  rationale: ταχέως denotes speed. ‘Quickly’ is the most direct and natural equivalent
    in this narrative command.
- source_word: γράψον
  chosen: write
  alternatives:
  - write down
  - make it
  lexicon: BDAG
  rationale: γράφω here means to write the revised amount on the debt record. ‘Write’
    is sufficiently clear and avoids adding words not explicit in the Greek.
- source_word: πεντήκοντα
  chosen: fifty
  lexicon: BDAG
  rationale: Straightforward numeral; no interpretive expansion is needed.
