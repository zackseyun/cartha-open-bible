theological_decisions:
- issue: Generic ἀνθρώπων in both clauses
  chosen_reading: men
  alternative_readings:
  - people
  - human beings
  rationale: The Greek uses ἀνθρώπων generically in a contrast between human social judgment and God's judgment. Following the project's gender-accurate policy, 'men' is retained as a representative generic rather than neutralizing the wording. A footnote preserves the inclusive sense for modern readers.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Semantic force of τὸ ἐν ἀνθρώποις ὑψηλὸν
  chosen_reading: what is exalted among men
  alternative_readings:
  - what is highly valued among people
  rationale: The phrase can denote what is socially elevated, admired, or esteemed. The more literal 'exalted' preserves the metaphor and avoids prematurely narrowing the sense to valuation alone, while the alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
