id: LUK.16.15
reference: Luke 16:15
source:
  edition: SBLGNT
  text: καὶ εἶπεν αὐτοῖς· Ὑμεῖς ἐστε οἱ δικαιοῦντες ἑαυτοὺς ἐνώπιον τῶν ἀνθρώπων, ὁ δὲ θεὸς γινώσκει τὰς καρδίας ὑμῶν· ὅτι τὸ ἐν ἀνθρώποις ὑψηλὸν βδέλυγμα ἐνώπιον τοῦ θεοῦ.
translation:
  text: And he said to them[a], “You are the ones who justify yourselves before men, but God knows your hearts[c][b]. For what is exalted among men is detestable before God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before people'; Greek 'before men,' using a generic term for human beings.
    reason: lexical_alternative
  - marker: b
    text: Or 'what is highly valued among people.'
    reason: alternative_reading
  - marker: c
    text: Or 'an abomination before God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δικαιοῦντες
  chosen: justify
  alternatives:
  - declare righteous
  - vindicate
  lexicon: BDAG
  rationale: Present participle with reflexive object; in this context it refers to presenting oneself as righteous or vindicated before others. 'Justify yourselves' preserves the lexical link to δικαιόω without over-paraphrasing to 'make yourselves look righteous.'
- source_word: ἐνώπιον τῶν ἀνθρώπων
  chosen: before men
  alternatives:
  - before people
  - in the sight of men
  lexicon: BDAG
  rationale: ἐνώπιον means 'before/in the sight of.' 'Before men' is concise and matches the representative generic force of ἀνθρώπων here; per translation philosophy, gender-accurate language is retained where generic masculine is intended.
- source_word: γινώσκει τὰς καρδίας ὑμῶν
  chosen: knows your hearts
  alternatives:
  - knows your inner selves
  - knows your hearts thoroughly
  lexicon: BDAG
  rationale: A straightforward rendering preserving the biblical anthropological sense of 'hearts' as the inner person, motives, and thoughts. No expansion is needed in the main text.
- source_word: τὸ ἐν ἀνθρώποις ὑψηλὸν
  chosen: what is exalted among men
  alternatives:
  - what is highly valued among men
  - the lofty thing among men
  lexicon: BDAG
  rationale: 'The articular neuter adjective functions substantivally: ''the thing that is high/exalted among men.'' ''Exalted'' preserves the metaphor of height and leaves room for both social esteem and moral pretension. ''Highly valued'' is interpretive and is preserved in a footnote.'
- source_word: βδέλυγμα
  chosen: detestable
  alternatives:
  - an abomination
  - abhorrent
  lexicon: BDAG
  rationale: βδέλυγμα denotes something abhorrent or abominable before God. 'Detestable' is strong, natural modern English; 'abomination' is a viable more formal alternative preserved in a footnote.
- source_word: ἐνώπιον τοῦ θεοῦ
  chosen: before God
  alternatives:
  - in God's sight
  lexicon: BDAG
  rationale: Matches the earlier ἐνώπιον phrase and preserves the contrast between human evaluation and divine evaluation.
- source_word: Ὑμεῖς ἐστε οἱ ...
  chosen: You are the ones who ...
  alternatives:
  - You are those who ...
  - You are the people who ...
  lexicon: Greek grammar
  rationale: The pronoun plus article-participle construction is emphatic. 'You are the ones who' conveys the marked address and accusation more clearly than a flatter English clause.
