- issue: Rendering the description of the afterlife location in the rich man's speech
  chosen_reading: this place of torment
  alternative_readings:
  - this place of anguish
  - this place of suffering
  rationale: The verse describes the place by its experienced condition, using βάσανος.
    The translation preserves the text's language of torment without expanding it
    into a fuller doctrinal description beyond what this verse states.
  doctrine_reference: Preserve theological tension rather than resolve it; never import
    doctrinal claims the text does not make.
