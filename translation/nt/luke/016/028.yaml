id: LUK.16.28
reference: Luke 16:28
source:
  edition: SBLGNT
  text: ἔχω γὰρ πέντε ἀδελφούς, ὅπως διαμαρτύρηται αὐτοῖς, ἵνα μὴ καὶ αὐτοὶ ἔλθωσιν
    εἰς τὸν τόπον τοῦτον τῆς βασάνου.
translation:
  text: for I have five brothers, so that he may solemnly warn them, lest they too
    come to this place of torment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he may testify to them' or 'he may strongly warn them.' The Greek verb
      carries the sense of giving solemn testimony or warning.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔχω γὰρ
  chosen: for I have
  alternatives:
  - because I have
  - for I possess
  lexicon: BDAG
  rationale: γάρ gives the explanatory force 'for,' linking this request to the previous
    plea. ἔχω is the ordinary verb 'have.' 'For I have' is natural English and preserves
    the explanatory connection.
- source_word: πέντε ἀδελφούς
  chosen: five brothers
  alternatives:
  - five siblings
  - five brothers of mine
  lexicon: BDAG
  rationale: ἀδελφούς is masculine plural and in this context refers specifically
    to male siblings, not a mixed group. Per gender-accurate policy, 'brothers' is
    preferred over gender-neutral 'siblings.'
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: ὅπως introduces purpose. 'So that' is clear modern English and preserves
    the purposive sense without sounding overly formal.
- source_word: διαμαρτύρηται
  chosen: he may solemnly warn
  alternatives:
  - he may testify to
  - he may strongly warn
  - he may earnestly warn
  lexicon: BDAG
  rationale: διαμαρτύρομαι can mean to testify, warn, or solemnly charge. In this
    context, with the following clause about avoiding this place, the sense is not
    mere testimony but urgent warning. 'Solemnly warn' preserves both the warning
    force and the gravity inherent in the verb.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: The dative object is naturally expressed in English as 'warn them' rather
    than the more wooden 'warn to them.'
- source_word: ἵνα μὴ καὶ αὐτοὶ ἔλθωσιν
  chosen: so that they too may not come
  alternatives:
  - lest they also come
  - so that they themselves may not come
  lexicon: BDAG
  rationale: ἵνα with μή introduces negative purpose/result. καὶ αὐτοὶ adds 'they
    too/also.' 'So that they too may not come' is idiomatic and preserves the relation
    to the previous purpose clause. 'Lest' is possible but less natural in contemporary
    English.
- source_word: εἰς τὸν τόπον τοῦτον
  chosen: to this place
  alternatives:
  - into this place
  - to this very place
  lexicon: BDAG
  rationale: εἰς marks movement toward/into. 'To this place' is idiomatic English
    and sufficiently conveys destination.
- source_word: τῆς βασάνου
  chosen: of torment
  alternatives:
  - of anguish
  - of punishment
  - of suffering
  lexicon: BDAG
  rationale: βάσανος denotes severe pain, torment, or torture. In this narrative setting,
    'torment' best captures the intensity without importing a more systematized doctrinal
    term than the text itself uses.
