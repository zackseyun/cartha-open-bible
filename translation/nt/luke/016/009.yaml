id: LUK.16.9
reference: Luke 16:9
source:
  edition: SBLGNT
  text: καὶ ἐγὼ ὑμῖν λέγω, ⸂ἑαυτοῖς ποιήσατε⸃ φίλους ἐκ τοῦ μαμωνᾶ τῆς ἀδικίας, ἵνα
    ὅταν ⸀ἐκλίπῃ δέξωνται ὑμᾶς εἰς τὰς αἰωνίους σκηνάς.
translation:
  text: And I tell you, make friends for yourselves by means of unrighteous wealth,
    so that when it fails, they may welcome you into the eternal dwellings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the mammon of unrighteousness'; 'mammon' is a traditional rendering
      of the Greek term for wealth or money.
    reason: lexical_alternative
  - marker: b
    text: Or 'when you fail' or 'when it runs out.' The Greek verb can be understood
      in different ways here; many take it to refer to wealth failing, while some
      understand it of a person's death.
    reason: alternative_reading
  - marker: c
    text: Or 'receive you into the eternal tents.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑαυτοῖς ποιήσατε φίλους
  chosen: make friends for yourselves
  alternatives:
  - make for yourselves friends
  lexicon: BDAG
  rationale: A natural but still close rendering of the reflexive dative plus aorist
    imperative. English idiom prefers 'make friends for yourselves' over the more
    wooden 'make for yourselves friends.'
- source_word: ἐκ τοῦ μαμωνᾶ τῆς ἀδικίας
  chosen: by means of unrighteous wealth
  alternatives:
  - from the mammon of unrighteousness
  - by means of dishonest wealth
  - from unrighteous mammon
  lexicon: BDAG
  rationale: 'μαμωνᾶς refers to wealth/money, and in modern English ''mammon'' is
    understandable but more opaque and potentially personified beyond what this context
    requires. The genitive τῆς ἀδικίας is preserved as an attributive qualifier: wealth
    characterized by unrighteousness in this fallen age, not necessarily wealth acquired
    only by fraud. ''By means of'' captures the instrumental force in context better
    than a bare ''from.'''
- source_word: μαμωνᾶ
  chosen: wealth
  alternatives:
  - mammon
  - money
  lexicon: BDAG
  rationale: Rendered 'wealth' for clarity and readability. 'Mammon' is preserved
    in a footnote as a more traditional/formal alternative.
- source_word: τῆς ἀδικίας
  chosen: unrighteous
  alternatives:
  - unjust
  - dishonest
  lexicon: BDAG
  rationale: ἀδικία commonly denotes unrighteousness/injustice. 'Unrighteous' is broader
    and less interpretively narrow than 'dishonest,' which could imply only ill-gotten
    gain.
- source_word: ἵνα ὅταν ἐκλίπῃ
  chosen: so that when it fails
  alternatives:
  - so that when you fail
  - so that when it runs out
  - so that when he fails
  lexicon: BDAG
  rationale: The verb ἐκλίπῃ is intransitive ('fails,' 'comes to an end'). Given the
    immediate antecedent μαμωνᾶς and the sense of wealth's transience, 'when it fails'
    is the best contextual reading. Because the subject is not explicit in English,
    alternatives are preserved in a footnote.
- source_word: δέξωνται ὑμᾶς
  chosen: they may welcome you
  alternatives:
  - they may receive you
  lexicon: BDAG
  rationale: δέχομαι here means to receive/welcome. 'Welcome' communicates hospitable
    reception into a place, fitting the following phrase about dwellings.
- source_word: εἰς τὰς αἰωνίους σκηνάς
  chosen: into the eternal dwellings
  alternatives:
  - into the eternal tents
  - into everlasting dwellings
  lexicon: BDAG
  rationale: σκηναί are literally tents/tabernacles, but 'dwellings' better conveys
    the idiomatic sense in readable English while retaining the image of places of
    abode. αἰωνίους is rendered 'eternal' in line with standard NT usage.
