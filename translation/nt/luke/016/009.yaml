theological_decisions:
- issue: Interpretation of 'unrighteous wealth'
  chosen_reading: wealth belonging to the present unrighteous age / wealth that is
    morally compromised in a fallen world, not necessarily only wealth gained by fraud
  alternative_readings:
  - wealth acquired dishonestly
  - personified Mammon as a rival master
  rationale: The phrase should not be narrowed to stolen or fraudulent money, since
    the saying concerns the prudent use of worldly wealth generally. Nor should the
    translation force a full personification of Mammon here, though the broader context
    (Luke 16:13) allows that association. 'Unrighteous wealth' preserves the tension
    without over-resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Subject of ἐκλίπῃ
  chosen_reading: the wealth fails / runs out
  alternative_readings:
  - you fail, i.e., die
  - an indefinite 'it' referring to worldly resources generally
  rationale: The nearest and most natural contextual referent is μαμωνᾶς. Some interpreters
    take the verb as referring to the disciples' death, but the Greek here does not
    specify that, so the translation keeps the likely antecedent while preserving
    the alternative in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Identity of 'they' who welcome
  chosen_reading: left implicit
  alternative_readings:
  - the friends made through generous use of wealth
  - God's people / the poor
  - heavenly beings
  rationale: The Greek leaves the subject of δέξωνται implicit. Supplying a specific
    identity in the main text would over-interpret the verse. The translation preserves
    the ambiguity.
  doctrine_reference: Preserve theological tension rather than resolve it.
