theological_decisions:
- issue: Interpretation of 'the true' in contrast to unrighteous wealth
  chosen_reading: Rendered as 'the true riches' to make explicit the implied contrast
    between temporal wealth and genuinely valuable heavenly stewardship.
  alternative_readings:
  - '''what is true'''
  - '''the true thing'''
  rationale: The Greek leaves the noun implicit, but the immediate contrast with μαμωνᾷ
    strongly suggests true wealth/riches. This is an interpretive completion required
    by idiomatic English, not an added doctrinal claim.
  doctrine_reference: Translation philosophy §1, §5
