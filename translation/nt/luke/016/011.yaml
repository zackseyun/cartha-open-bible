id: LUK.16.11
reference: Luke 16:11
source:
  edition: SBLGNT
  text: εἰ οὖν ἐν τῷ ἀδίκῳ μαμωνᾷ πιστοὶ οὐκ ἐγένεσθε, τὸ ἀληθινὸν τίς ὑμῖν πιστεύσει;
translation:
  text: If, then, you have not been faithful with unrighteous wealth, who will entrust
    the true riches to you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dishonest wealth'; Greek 'the unrighteous mammon.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the true'; the sense is 'the true riches' in contrast to worldly
      wealth.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδίκῳ
  chosen: unrighteous
  alternatives:
  - dishonest
  - worldly
  lexicon: BDAG
  rationale: ἄδικος normally means 'unrighteous/unjust.' In this Lukan phrase modifying
    μαμωνᾷ, 'unrighteous' preserves the moral coloring of the Greek better than the
    more interpretive 'worldly.' 'Dishonest' is possible but too narrow, implying
    wealth gained by fraud rather than wealth characterized by belonging to the present
    unjust order.
- source_word: μαμωνᾷ
  chosen: wealth
  alternatives:
  - mammon
  - money
  lexicon: BDAG
  rationale: μαμωνᾶς denotes wealth or possessions. 'Wealth' is more natural modern
    English than transliterated 'mammon' while still broad enough to include more
    than cash. 'Money' is narrower than the Greek.
- source_word: ἐν τῷ ἀδίκῳ μαμωνᾷ
  chosen: with unrighteous wealth
  alternatives:
  - in the unrighteous mammon
  - with dishonest wealth
  lexicon: BDAG
  rationale: The preposition ἐν here is rendered idiomatically as 'with' in English
    to express the sphere/instrument in which faithfulness is shown. This avoids wooden
    English while preserving the sense.
- source_word: πιστοὶ
  chosen: faithful
  alternatives:
  - trustworthy
  lexicon: BDAG
  rationale: πιστός in this context describes reliability in stewardship. 'Faithful'
    is the standard and best fit in context; 'trustworthy' is a viable alternative
    but slightly less connected to the stewardship theme carried through the passage.
- source_word: οὐκ ἐγένεσθε
  chosen: have not been
  alternatives:
  - did not become
  lexicon: BDAG
  rationale: γίνομαι with predicate adjective can mean 'become' or function idiomatically
    as 'prove/be.' In English, 'have not been faithful' is the most natural rendering
    of the perfective sense in this conditional statement.
- source_word: τὸ ἀληθινὸν
  chosen: the true riches
  alternatives:
  - the true thing
  - what is true
  - the true wealth
  lexicon: BDAG
  rationale: 'Although ''riches'' is not explicit, the neuter singular adjective functions
    substantivally and is contrasted with μαμωνᾷ. Supplying ''riches'' makes the contrast
    clear in idiomatic English: unrighteous wealth versus true riches. ''The true
    thing'' is too vague in English.'
- source_word: πιστεύσει
  chosen: will entrust
  alternatives:
  - will believe
  - will commit
  lexicon: BDAG
  rationale: πιστεύω with a personal indirect object and an accusative object means
    'entrust/commit to someone,' not 'believe.' 'Entrust' is the clearest modern English
    equivalent here.
