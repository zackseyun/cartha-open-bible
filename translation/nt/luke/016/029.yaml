theological_decisions:
- issue: Referent of 'Moses and the Prophets'
  chosen_reading: A metonym for the authoritative scriptural witness already given
    to the brothers.
  alternative_readings:
  - A narrower reference only to the persons Moses and the prophets as historical
    figures
  rationale: In Lukan and broader Jewish usage, 'Moses and the Prophets' commonly
    denotes the Scriptures. The translation keeps the literal phrase in the main text
    while recognizing its scriptural referent in documentation rather than paraphrasing
    it away.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
