id: LUK.16.29
reference: Luke 16:29
source:
  edition: SBLGNT
  text: λέγει ⸀δὲ Ἀβραάμ· Ἔχουσι Μωϋσέα καὶ τοὺς προφήτας· ἀκουσάτωσαν αὐτῶν.
translation:
  text: But Abraham said, ‘They have Moses and the Prophets; let them listen to them.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Moses and the Prophets" refers to the scriptural witness associated with
      Moses and the prophetic books.'
    reason: cross_reference
  - marker: b
    text: Or, more literally, "let them hear them."
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει δὲ
  chosen: But ... said
  alternatives:
  - And ... said
  - Now ... said
  lexicon: BDAG
  rationale: λέγει is a historical present, commonly rendered with an English past
    tense in narrative for natural style. δέ is mildly contrastive or continuative;
    'But' fits the reply context better than a simple 'And' and preserves the discourse
    turn.
- source_word: Ἀβραάμ
  chosen: Abraham
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: Ἔχουσι
  chosen: They have
  alternatives:
  - They possess
  lexicon: BDAG
  rationale: Simple present indicative indicating present access or possession. 'They
    have' is the most natural and direct English equivalent.
- source_word: Μωϋσέα καὶ τοὺς προφήτας
  chosen: Moses and the Prophets
  alternatives:
  - the Law of Moses and the Prophets
  - Moses and the prophets
  lexicon: BDAG
  rationale: This is a conventional Jewish way of referring to the scriptural witness,
    with 'Moses' standing metonymically for the Mosaic writings. The concise traditional
    form preserves the idiom without over-expanding beyond the Greek. 'Prophets' is
    capitalized to reflect the recognized scriptural corpus in English Bible style.
- source_word: ἀκουσάτωσαν
  chosen: let them listen
  alternatives:
  - let them hear
  - they should listen
  lexicon: BDAG
  rationale: Aorist active imperative, third person plural. 'Let them listen' conveys
    the imperative force in idiomatic English and better captures responsive heed
    than the potentially less clear 'hear.'
- source_word: αὐτῶν
  chosen: to them
  alternatives:
  - them
  - to those writings
  lexicon: BDAG
  rationale: The genitive after ἀκούω commonly expresses the person or source heard/listened
    to. In English, 'listen to them' is idiomatic and makes the relational force explicit.
    The pronoun refers back to 'Moses and the Prophets,' that is, their testimony.
