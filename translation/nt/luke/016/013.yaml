theological_decisions:
- issue: Rendering of μαμωνᾷ in contrast with θεῷ
  chosen_reading: Mammon
  alternative_readings:
  - money
  - wealth
  rationale: The verse sets God and μαμωνᾶς as rival masters. Translating as 'Mammon'
    preserves the personified, master-like force better than the flatter 'money' or
    'wealth.' This does not imply Mammon is a literal deity; it reflects the rhetorical
    personification of riches as a rival power demanding allegiance.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than flattening rhetorical force.'
- issue: Anthropological wording in the singular examples
  chosen_reading: he will hate ... love ... be devoted ... despise
  alternative_readings:
  - the servant will hate ... love ...
  - they will hate ... love ...
  rationale: The Greek uses singular forms in a generic statement. Per the gender-accurate
    policy, English singular 'he' best matches the source's representative singular
    rather than recasting to plural 'they.'
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
