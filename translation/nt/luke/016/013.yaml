id: LUK.16.13
reference: Luke 16:13
source:
  edition: SBLGNT
  text: οὐδεὶς οἰκέτης δύναται δυσὶ κυρίοις δουλεύειν· ἢ γὰρ τὸν ἕνα μισήσει καὶ τὸν
    ἕτερον ἀγαπήσει, ἢ ἑνὸς ἀνθέξεται καὶ τοῦ ἑτέρου καταφρονήσει. οὐ δύνασθε θεῷ
    δουλεύειν καὶ μαμωνᾷ.
translation:
  text: No household servant can serve two masters; for either he will hate the one
    and love the other, or he will be devoted to one and despise the other. You cannot
    serve God and Mammon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wealth' or 'money.' The Greek uses Mammon, a term for riches treated
      here as a rival master.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκέτης
  chosen: household servant
  alternatives:
  - servant
  - slave
  - house-slave
  lexicon: BDAG
  rationale: οἰκέτης denotes a member of a household in servile status, more specifically
    a domestic servant than the more general δοῦλος. 'Household servant' preserves
    the domestic setting without overstating with 'slave' where this specific term
    is not δοῦλος, while still keeping the master-servant relationship clear.
- source_word: κυρίοις
  chosen: masters
  alternatives:
  - lords
  lexicon: BDAG
  rationale: In this social saying, κύριος refers to human owners/masters rather than
    the divine title 'Lord.' 'Masters' best fits the household-slavery/servitude context
    and avoids confusion with the later θεῷ.
- source_word: δουλεύειν
  chosen: serve
  alternatives:
  - be a slave to
  - work for
  lexicon: BDAG
  rationale: The verb means to serve as a slave/servant. 'Serve' is idiomatic in English
    and matches the saying's established force. 'Be a slave to' would sharpen the
    bonded nuance, but here readability and the parallel with 'serve God and Mammon'
    favor 'serve,' with the domination idea carried by 'masters' and the impossibility
    statement.
- source_word: μισήσει
  chosen: hate
  alternatives:
  - love less
  - be hostile toward
  lexicon: BDAG
  rationale: The ordinary sense is 'hate.' Although Semitic idiom can sometimes express
    preference by 'hate/love,' the contrast here is strong and proverbial. 'Hate'
    preserves the rhetorical force without softening.
- source_word: ἀγαπήσει
  chosen: love
  lexicon: BDAG
  rationale: Standard rendering of ἀγαπάω. It forms the deliberate antithesis to 'hate'
    and should remain lexically transparent.
- source_word: ἀνθέξεται
  chosen: be devoted to
  alternatives:
  - hold fast to
  - be loyal to
  - stand by
  lexicon: BDAG
  rationale: ἀντέχομαι here conveys clinging to, holding firmly to, or being attached
    to one party. 'Be devoted to' communicates relational allegiance in natural English.
    'Hold fast to' is possible but slightly less idiomatic in this contrast with 'despise.'
- source_word: καταφρονήσει
  chosen: despise
  alternatives:
  - look down on
  - scorn
  lexicon: BDAG
  rationale: The verb means to disregard with contempt. 'Despise' is concise, strong,
    and pairs well with 'be devoted to' in the second clause.
- source_word: θεῷ
  chosen: God
  lexicon: BDAG
  rationale: Unambiguous dative object of δουλεύειν. 'God' is the natural English
    rendering.
- source_word: μαμωνᾷ
  chosen: Mammon
  alternatives:
  - money
  - wealth
  lexicon: BDAG
  rationale: μαμωνᾶς is a Semitic loanword personifying wealth/riches. Retaining 'Mammon'
    preserves the term's rhetorical and almost personified force in contrast with
    God. Because modern readers may not know the term, an explanatory footnote preserves
    the lexical sense 'wealth'/'money'.
