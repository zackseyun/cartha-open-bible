id: LUK.16.16
reference: Luke 16:16
source:
  edition: SBLGNT
  text: Ὁ νόμος καὶ οἱ προφῆται ⸀μέχρι Ἰωάννου· ἀπὸ τότε ἡ βασιλεία τοῦ θεοῦ εὐαγγελίζεται
    καὶ πᾶς εἰς αὐτὴν βιάζεται.
translation:
  text: The Law and the Prophets were until John; from then on the kingdom of God
    is proclaimed as good news, and everyone is forcing his way into it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone is pressing into it.' The Greek verb can convey forceful movement;
      the wording here reflects the sense of urgent entry into the kingdom.
    reason: lexical_alternative
  - marker: b
    text: Some understand the final clause more negatively in light of a similar saying
      in Matthew 11:12, but here the Greek subject is 'everyone,' not 'the kingdom.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ὁ νόμος
  chosen: The Law
  alternatives:
  - the law
  lexicon: BDAG
  rationale: Refers to the Mosaic Law/the scriptural category, not merely law in general.
    Capitalization helps signal the recognized salvation-historical category alongside
    'the Prophets.'
- source_word: οἱ προφῆται
  chosen: the Prophets
  alternatives:
  - the prophets
  lexicon: BDAG
  rationale: A conventional Jewish scriptural designation paired with 'the Law'; capitalization
    marks the corpus/category rather than only individual prophetic figures.
- source_word: μέχρι Ἰωάννου
  chosen: until John
  alternatives:
  - up to John
  - until the time of John
  lexicon: BDAG
  rationale: The phrase marks a temporal boundary in salvation history. 'John' is
    sufficient and natural in English, with the referent understood as John the Baptist
    from context.
- source_word: ἀπὸ τότε
  chosen: from then on
  alternatives:
  - since then
  - from that time
  lexicon: BDAG
  rationale: Idiomatic English rendering of a temporal transition. 'From then on'
    preserves the ongoing sense without overinterpreting.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: Standard rendering that preserves both the concrete and dynamic dimensions
    of βασιλεία. 'Reign of God' is possible but less natural here and can narrow the
    semantic range.
- source_word: εὐαγγελίζεται
  chosen: is being proclaimed as good news
  alternatives:
  - is preached
  - is proclaimed
  - is announced as good news
  lexicon: BDAG
  rationale: The present passive indicates ongoing proclamation. This rendering preserves
    the gospel/good-news sense of εὐαγγελίζω more transparently than the traditional
    but narrower 'is preached.'
- source_word: πᾶς
  chosen: everyone
  alternatives:
  - everyone else
  - every person
  - all
  lexicon: BDAG
  rationale: Generic singular with distributive force. 'Everyone' is natural English
    and reflects the broad scope without importing a narrower group.
- source_word: εἰς αὐτὴν
  chosen: into it
  alternatives:
  - into it forcibly
  - into her
  lexicon: BDAG
  rationale: Refers back to the feminine noun 'kingdom.' English uses the neuter pronoun
    for an abstract noun. The force element belongs primarily to βιάζεται, not the
    prepositional phrase itself.
- source_word: βιάζεται
  chosen: is forcing his way
  alternatives:
  - is pressing into
  - is entering violently
  - suffers violence
  lexicon: BDAG
  rationale: Middle/passive form is notoriously difficult here. In this syntax with
    πᾶς εἰς αὐτὴν, the sense is best taken as people pressing/forcing their way into
    the kingdom. 'Forcing his way' preserves the strenuous, even violent nuance of
    βιάζω better than the softer 'pressing into,' while fitting the singular πᾶς.
