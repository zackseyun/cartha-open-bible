theological_decisions:
- issue: Meaning of βιάζεται in relation to the kingdom
  chosen_reading: The clause describes people urgently and forcefully pressing into
    the kingdom, not the kingdom itself suffering violence.
  alternative_readings:
  - the kingdom of God suffers violence, and violent people seize it
  rationale: Unlike Matt 11:12, here the subject of βιάζεται is πᾶς ('everyone'),
    and the phrase εἰς αὐτὴν naturally points to movement into the kingdom. The translation
    preserves the demanding, forceful nuance without turning the statement into a
    doctrinal claim about meritorious self-attainment.
  doctrine_reference: Preserve theological tension rather than resolve it; render
    the syntax of the source text and preserve significant alternatives in a footnote.
