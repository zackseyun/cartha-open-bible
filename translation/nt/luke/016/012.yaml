theological_decisions:
- issue: Interpretation of the contrast between 'what belongs to another' and 'what
    is your own'
  chosen_reading: Render the contrast without specifying the referents in the main
    text.
  alternative_readings:
  - '''worldly wealth'' versus ''true riches'' by connection to v. 11'
  - earthly stewardship versus eschatological inheritance
  - faithfulness with another master's goods versus receiving one's own stewardship
  rationale: The Greek text states the contrast but does not explicitly identify the
    referents in this verse alone. To preserve theological tension and avoid importing
    a narrower interpretation than the text demands, the translation leaves the referents
    implicit.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
