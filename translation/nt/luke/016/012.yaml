id: LUK.16.12
reference: Luke 16:12
source:
  edition: SBLGNT
  text: καὶ εἰ ἐν τῷ ἀλλοτρίῳ πιστοὶ οὐκ ἐγένεσθε, τὸ ⸀ὑμέτερον τίς ⸂δώσει ὑμῖν⸃;
translation:
  text: And if you have not been faithful with what belongs to another, who will give
    you what is your own?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'another's property' for 'what belongs to another.'
    reason: lexical_alternative
  - marker: b
    text: Or 'what belongs to you' for 'what is your own.'
    reason: lexical_alternative
  - marker: c
    text: The contrast may refer to faithfulness with worldly wealth now versus receiving
      true or lasting riches later; the verse itself does not specify the referents
      explicitly.
    reason: cross_reference
lexical_decisions:
- source_word: ἀλλοτρίῳ
  chosen: what belongs to another
  alternatives:
  - that which is another's
  - another's property
  - what is чужой/foreign to you
  lexicon: BDAG
  rationale: 'The adjective ἀλλότριος in the neuter singular with the article functions
    substantivally: ''the thing belonging to another/another''s.'' ''What belongs
    to another'' is natural English and preserves the possessive sense better than
    the more wooden ''the other''s.'''
- source_word: πιστοὶ
  chosen: faithful
  alternatives:
  - trustworthy
  lexicon: BDAG
  rationale: πιστός here describes reliability in stewardship, not belief. 'Faithful'
    best matches the moral and stewardship context of the surrounding sayings.
- source_word: ἐγένεσθε
  chosen: have not been
  alternatives:
  - did not become
  - did not prove to be
  lexicon: BDAG
  rationale: The aorist middle of γίνομαι here idiomatically conveys coming to be
    or proving to be in a state. In English, 'have not been faithful' reads naturally
    in this conditional context while preserving the sense.
- source_word: τὸ ὑμέτερον
  chosen: what is your own
  alternatives:
  - your own
  - what belongs to you
  lexicon: BDAG
  rationale: 'The neuter singular with article is substantival: ''that which is yours.''
    ''What is your own'' preserves the contrast with ''what belongs to another'' and
    avoids an overly elliptical English phrase.'
- source_word: δώσει ὑμῖν
  chosen: will give you
  alternatives:
  - will entrust to you
  lexicon: BDAG
  rationale: δίδωμι normally means 'give.' Because the context is stewardship, 'entrust'
    is interpretively attractive, but 'give you' stays closer to the Greek while still
    fitting the context.
- source_word: καὶ εἰ
  chosen: And if
  alternatives:
  - And if indeed
  - But if
  lexicon: BDAG
  rationale: καὶ links this saying to the previous verse, and εἰ introduces the conditional
    clause. 'And if' preserves the discourse flow straightforwardly.
- source_word: τίς
  chosen: who
  alternatives:
  - what person
  lexicon: BDAG
  rationale: The interrogative pronoun asks rhetorically about the giver. 'Who' is
    the direct and idiomatic rendering.
