id: LUK.16.3
reference: Luke 16:3
source:
  edition: SBLGNT
  text: εἶπεν δὲ ἐν ἑαυτῷ ὁ οἰκονόμος· Τί ποιήσω ὅτι ὁ κύριός μου ἀφαιρεῖται τὴν οἰκονομίαν
    ἀπ’ ἐμοῦ; σκάπτειν οὐκ ἰσχύω, ἐπαιτεῖν αἰσχύνομαι·
translation:
  text: Then the manager said to himself, ‘What will I do, since my master is taking
    the management away from me? I am not strong enough to dig, and I am ashamed to
    beg.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'steward' / 'stewardship' for 'manager' / 'management.' The Greek uses
      cognate terms for the person and his office.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκονόμος
  chosen: manager
  alternatives:
  - steward
  - household manager
  lexicon: BDAG
  rationale: In this parable context, οἰκονόμος refers to one entrusted with oversight
    of another's property or affairs. 'Manager' is clear modern English and fits the
    socioeconomic role better than the more traditional but less transparent 'steward.'
- source_word: ἐν ἑαυτῷ
  chosen: to himself
  alternatives:
  - within himself
  - in himself
  lexicon: BDAG
  rationale: This idiom indicates internal speech or reflection. 'To himself' is the
    most natural English equivalent.
- source_word: Τί ποιήσω
  chosen: What will I do
  alternatives:
  - What shall I do
  lexicon: BDAG
  rationale: The deliberative aorist subjunctive expresses self-questioning about
    a future course of action. 'What will I do' communicates the sense in natural
    modern English; 'What shall I do' is possible but more formal.
- source_word: κύριός
  chosen: master
  alternatives:
  - lord
  - owner
  lexicon: BDAG
  rationale: Although κύριος commonly defaults to 'Lord' in theological or titular
    contexts, here it refers to the human superior in a parable. 'Master' best conveys
    personal authority over the manager; 'owner' is possible but narrower, and 'lord'
    would sound misleadingly theological in English.
- source_word: ἀφαιρεῖται
  chosen: is taking ... away
  alternatives:
  - is removing
  - is taking
  lexicon: BDAG
  rationale: The middle voice here conveys the act of taking away or removing from
    someone's possession or office. 'Is taking ... away from me' preserves both the
    verb's force and the following ἀπ’ ἐμοῦ.
- source_word: οἰκονομίαν
  chosen: the management
  alternatives:
  - my stewardship
  - the stewardship
  - the administration
  lexicon: BDAG
  rationale: This noun denotes the office/responsibility of managing the estate, not
    merely abstract administration. 'The management' pairs naturally with 'manager'
    and communicates the role being removed.
- source_word: σκάπτειν
  chosen: to dig
  alternatives:
  - to do manual digging
  - to work the ground
  lexicon: BDAG
  rationale: The infinitive refers literally to digging, likely as hard manual labor.
    The simple 'to dig' is sufficiently clear and faithful.
- source_word: οὐκ ἰσχύω
  chosen: I am not strong enough
  alternatives:
  - I am not able
  - I do not have the strength
  lexicon: BDAG
  rationale: ἰσχύω can denote having strength or capability. In connection with digging,
    the nuance of physical strength is prominent, so 'I am not strong enough' is more
    precise than the broader 'I am not able.'
- source_word: ἐπαιτεῖν
  chosen: to beg
  alternatives:
  - to ask for alms
  lexicon: BDAG
  rationale: The verb means to beg or solicit alms. 'To beg' is the clearest natural
    rendering.
- source_word: αἰσχύνομαι
  chosen: I am ashamed
  alternatives:
  - I feel shame
  - I am too ashamed
  lexicon: BDAG
  rationale: The verb expresses shame at the prospect of begging. 'I am ashamed to
    beg' is direct and idiomatic English.
