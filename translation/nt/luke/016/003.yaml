theological_decisions:
- issue: Rendering of κύριος in a non-divine parable context
  chosen_reading: master
  alternative_readings:
  - lord
  - owner
  rationale: DOCTRINE.md gives 'Lord' as the default for κύριος, but context determines
    whether the term functions as a divine/theological title or an ordinary social
    designation. Here the referent is the rich man of the parable, so 'master' avoids
    importing theological overtones while preserving authority relations.
  doctrine_reference: 'DOCTRINE.md: Contested terms (κύριος), Translation philosophy
    items 1 and 5'
