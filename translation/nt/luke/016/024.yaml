id: LUK.16.24
reference: Luke 16:24
source:
  edition: SBLGNT
  text: καὶ αὐτὸς φωνήσας εἶπεν· Πάτερ Ἀβραάμ, ἐλέησόν με καὶ πέμψον Λάζαρον ἵνα βάψῃ τὸ ἄκρον τοῦ δακτύλου αὐτοῦ ὕδατος καὶ καταψύξῃ τὴν γλῶσσάν μου, ὅτι ὀδυνῶμαι ἐν τῇ φλογὶ ταύτῃ.
translation:
  text: And he cried out and said[a], ‘Father Abraham, have mercy on me, and send Lazarus so that he may dip the tip of his finger in water and cool my tongue, because I am in agony in this flame.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because I am tormented in this flame.' The Greek verb can denote severe suffering or torment.
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνήσας
  chosen: cried out
  alternatives:
  - called out
  - raised his voice
  lexicon: BDAG
  rationale: The aorist participle from φωνέω here introduces a loud, urgent appeal. 'Cried out' best conveys the intensity in natural English without overparaphrasing.
- source_word: ἐλέησόν
  chosen: have mercy on
  alternatives:
  - show mercy to
  - pity
  lexicon: BDAG
  rationale: ἐλεάω commonly denotes showing mercy or compassion. 'Have mercy on me' is the most idiomatic and theologically familiar rendering here, matching the direct plea.
- source_word: πέμψον
  chosen: send
  alternatives:
  - dispatch
  lexicon: BDAG
  rationale: A straightforward imperative; 'send' is the plain sense and fits readable modern English.
- source_word: βάψῃ
  chosen: dip
  alternatives:
  - moisten
  - immerse
  lexicon: BDAG
  rationale: βάπτω means to dip, especially briefly. 'Dip' fits the small, momentary action involving a fingertip better than 'immerse'.
- source_word: τὸ ἄκρον τοῦ δακτύλου αὐτοῦ
  chosen: the tip of his finger
  alternatives:
  - the end of his finger
  - his fingertip
  lexicon: BDAG
  rationale: ἄκρον denotes the extremity or tip. 'The tip of his finger' is clear and closely reflects the Greek structure.
- source_word: ὕδατος
  chosen: in water
  alternatives:
  - with water
  lexicon: BDAG
  rationale: The genitive after βάψῃ is naturally rendered in English with 'in water' after 'dip.' This preserves the image idiomatically.
- source_word: καταψύξῃ
  chosen: cool
  alternatives:
  - refresh
  - cool off
  lexicon: BDAG
  rationale: καταψύχω means to cool or refresh by cooling. 'Cool' is the most direct rendering; 'refresh' is possible but less concrete than the immediate physical image.
- source_word: γλῶσσάν μου
  chosen: my tongue
  lexicon: BDAG
  rationale: Literal body-part reference; no contextual reason to depart from the plain sense.
- source_word: ὀδυνῶμαι
  chosen: I am in agony
  alternatives:
  - I am suffering
  - I am tormented
  lexicon: BDAG
  rationale: ὀδυνάομαι conveys severe pain or distress. 'I am in agony' captures the intensity well without importing later doctrinal terminology. 'Tormented' is possible but can sound more interpretively loaded in this context.
- source_word: ἐν τῇ φλογὶ ταύτῃ
  chosen: in this flame
  alternatives:
  - in this fire
  lexicon: BDAG
  rationale: φλόξ specifically denotes flame rather than the broader 'fire.' 'In this flame' preserves the vivid singular image of the Greek.
- source_word: Πάτερ Ἀβραάμ
  chosen: Father Abraham
  lexicon: BDAG
  rationale: Vocative address preserved directly. 'Father Abraham' reflects the familial/ancestral appeal in the narrative.
