theological_decisions:
- issue: Rendering of the rich man's suffering
  chosen_reading: because I am in agony in this flame
  alternative_readings:
  - because I am suffering in this flame
  - because I am tormented in this flame
  rationale: The verse depicts intense postmortem suffering, but the translation should not heighten or soften the claim beyond the Greek. 'In agony' reflects ὀδυνῶμαι strongly while avoiding a more doctrinally loaded English term like 'tormented' unless context requires it.
  doctrine_reference: Preserve theological tension rather than resolve it.
