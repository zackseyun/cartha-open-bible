id: LUK.16.8
reference: Luke 16:8
source:
  edition: SBLGNT
  text: καὶ ἐπῄνεσεν ὁ κύριος τὸν οἰκονόμον τῆς ἀδικίας ὅτι φρονίμως ἐποίησεν· ὅτι
    οἱ υἱοὶ τοῦ αἰῶνος τούτου φρονιμώτεροι ὑπὲρ τοὺς υἱοὺς τοῦ φωτὸς εἰς τὴν γενεὰν
    τὴν ἑαυτῶν εἰσιν.
translation:
  text: And the master praised the unrighteous manager because he had acted shrewdly.
    For the sons of this age are more shrewd in dealing with their own generation
    than the sons of light are.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Lord praised the unrighteous manager.' Here 'master' is preferred
      because κύριος most naturally refers to the parable's master, not directly to
      Jesus or God.
    reason: alternative_reading
  - marker: b
    text: Greek 'the sons of this age' and 'the sons of light.' These expressions
      contrast people shaped by the present age with those identified with God's light.
    reason: lexical_alternative
  - marker: c
    text: Or more literally, 'are more shrewd than the sons of light for their own
      generation.' The Greek phrase is difficult; the translation brings out the sense
      of acting shrewdly within their own circle.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ κύριος
  chosen: the master
  alternatives:
  - the Lord
  lexicon: BDAG
  rationale: In the immediate narrative context of the parable, κύριος refers most
    naturally to the rich man/master of the household rather than directly to the
    Lord Jesus or to God. Although the default rendering of κύριος is 'Lord,' context
    here favors the social role 'master.' The capitalization and wording avoid implying
    that Jesus is praising unrighteousness directly rather than reporting the parable's
    internal commendation.
- source_word: οἰκονόμον
  chosen: manager
  alternatives:
  - steward
  lexicon: BDAG
  rationale: '''Manager'' is clear modern English for a household administrator and
    fits the translation philosophy''s preference for readable contemporary diction.
    ''Steward'' is possible but more traditional and less transparent for many readers.'
- source_word: τῆς ἀδικίας
  chosen: unrighteous
  alternatives:
  - dishonest
  - of unrighteousness
  lexicon: BDAG
  rationale: The genitive qualifies the manager by moral character or association.
    'Unrighteous manager' preserves the moral force of ἀδικία without over-specifying
    the exact form of wrongdoing. 'Dishonest' is interpretive and narrower; 'manager
    of unrighteousness' is too wooden in English.
- source_word: φρονίμως
  chosen: shrewdly
  alternatives:
  - prudently
  - wisely
  lexicon: BDAG
  rationale: The adverb denotes practical cleverness or prudence in securing an outcome.
    'Shrewdly' best captures the commendation of tactical astuteness without implying
    moral approval. 'Wisely' could sound too morally positive.
- source_word: οἱ υἱοὶ τοῦ αἰῶνος τούτου
  chosen: the sons of this age
  alternatives:
  - the people of this age
  - the children of this world
  lexicon: BDAG
  rationale: This is a semitic-style expression contrasting one class of people with
    another. 'Sons of this age' preserves the source metaphor and the masculine form,
    in line with the gender-accurate policy, while remaining understandable. A more
    idiomatic alternative is preserved in a footnote.
- source_word: φρονιμώτεροι
  chosen: more shrewd
  alternatives:
  - more prudent
  - wiser
  lexicon: BDAG
  rationale: The comparative continues the same semantic field as φρονίμως. 'More
    shrewd' preserves the practical, worldly astuteness in view and avoids the overly
    positive moral connotations of 'wiser.'
- source_word: ὑπὲρ
  chosen: than
  alternatives:
  - beyond
  - more than
  lexicon: BDAG
  rationale: With the comparative adjective, ὑπέρ functions idiomatically to mark
    comparison. 'Than' is the natural English equivalent.
- source_word: οἱ υἱοὶ τοῦ φωτός
  chosen: the sons of light
  alternatives:
  - the children of light
  - the people of the light
  lexicon: BDAG
  rationale: The phrase is a recognized biblical expression for those aligned with
    God's light. 'Sons of light' preserves the source imagery and formal parallel
    with 'sons of this age.' 'Children of light' is possible and more idiomatic, but
    the retained metaphor is preferable in the main text.
- source_word: εἰς τὴν γενεὰν τὴν ἑαυτῶν
  chosen: in dealing with their own generation
  alternatives:
  - toward their own generation
  - for their own generation
  - with respect to their own kind
  lexicon: BDAG
  rationale: This phrase is syntactically difficult. A very literal rendering ('for/toward
    their own generation') is awkward in English and can be obscure. The sense is
    that they act with greater shrewdness within the sphere of their own contemporaries
    or kind. 'In dealing with their own generation' makes the relational force intelligible
    while staying close to the likely meaning.
