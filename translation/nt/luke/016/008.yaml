theological_decisions:
- issue: Identity of ὁ κύριος in the first clause
  chosen_reading: the master within the parable, not a direct title for Jesus/God
    in the narrative voice
  alternative_readings:
  - the Lord praised the unrighteous manager
  rationale: The immediate literary setting is a parable about a rich man and his
    manager. Rendering κύριος as 'the master' preserves the internal narrative referent
    and avoids suggesting that Jesus morally endorses the manager's unrighteousness.
    The point is commendation of shrewdness, not of injustice.
  doctrine_reference: Translation philosophy §1, §3; Contested terms table for κύριος
    with context-dependent variance documented per verse
- issue: Moral evaluation of the manager's action
  chosen_reading: commendation of prudence/shrewdness without approval of unrighteousness
  alternative_readings:
  - commendation of wisdom in a morally positive sense
  - approval of the manager's dishonesty
  rationale: The verse explicitly labels the manager by ἀδικία while also praising
    the manner of his action as φρονίμως. The translation therefore uses 'shrewdly'
    rather than 'wisely' and 'unrighteous manager' rather than a softened term, preserving
    the tension in the text rather than resolving it.
  doctrine_reference: Translation philosophy §3
