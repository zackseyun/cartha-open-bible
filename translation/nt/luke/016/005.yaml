id: LUK.16.5
reference: Luke 16:5
source:
  edition: SBLGNT
  text: καὶ προσκαλεσάμενος ἕνα ἕκαστον τῶν χρεοφειλετῶν τοῦ κυρίου ἑαυτοῦ ἔλεγεν
    τῷ πρώτῳ· Πόσον ὀφείλεις τῷ κυρίῳ μου;
translation:
  text: And after summoning each one of his master's debtors, he was saying to the
    first, 'How much do you owe my master?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek κύριος is often rendered 'Lord,' but here it refers to the steward's
      human superior, so 'master' fits the context better.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκαλεσάμενος
  chosen: after summoning
  alternatives:
  - calling to himself
  - having summoned
  lexicon: BDAG
  rationale: Aorist middle participle preceding the main imperfect verb; 'after summoning'
    gives natural English while preserving the participial sequence and the sense
    of calling persons to oneself.
- source_word: ἕνα ἕκαστον
  chosen: each one
  alternatives:
  - one by one
  - every one
  lexicon: BDAG
  rationale: The combination intensifies distributive force. 'Each one' is concise
    and accurate; 'one by one' is possible but slightly more interpretive.
- source_word: χρεοφειλετῶν
  chosen: debtors
  alternatives:
  - those who owed debts
  - borrowers
  lexicon: BDAG
  rationale: The noun directly denotes people indebted to another. 'Debtors' is the
    most natural and precise English equivalent in this commercial context.
- source_word: τοῦ κυρίου ἑαυτοῦ
  chosen: of his master's
  alternatives:
  - of his lord's
  lexicon: BDAG
  rationale: 'Here κύριος refers to the steward''s superior in an estate-management
    setting, not a divine title. ''Master'' better fits the social-economic relationship
    in context, while ἑαυτοῦ refers back to the steward: ''his master.'''
- source_word: ἔλεγεν
  chosen: he was saying
  alternatives:
  - he said
  - he kept saying
  lexicon: BDAG
  rationale: The imperfect suggests iterative or scene-setting action. 'He was saying'
    preserves the imperfect aspect without overinterpreting frequency.
- source_word: τῷ πρώτῳ
  chosen: to the first
  alternatives:
  - to the first one
  lexicon: BDAG
  rationale: Straightforward dative with ordinal adjective; 'to the first' is idiomatic
    and sufficient.
- source_word: Πόσον
  chosen: How much
  alternatives:
  - How great an amount
  - What amount
  lexicon: BDAG
  rationale: In a debt context the neuter singular functions adverbially/accusatively
    of extent referring to amount owed. 'How much' is the natural English equivalent.
- source_word: ὀφείλεις
  chosen: do you owe
  alternatives:
  - are you indebted
  - do you owe as a debt
  lexicon: BDAG
  rationale: Present active indicative in a financial context; 'do you owe' is direct
    and idiomatic.
- source_word: τῷ κυρίῳ μου
  chosen: my master
  alternatives:
  - my lord
  lexicon: BDAG
  rationale: As above, κύριος in this parable refers to the steward's human superior.
    'My master' preserves the steward's perspective signaled by μου and avoids importing
    divine overtones associated with 'Lord' in English.
