- issue: Rendering κύριος in a parabolic household-economic context
  chosen_reading: master
  alternative_readings:
  - lord
  rationale: Although the project's default for κύριος is 'Lord,' context governs.
    In this verse the referent is the steward's human superior, not a christological
    or divine title. 'Master' best communicates the social relationship and avoids
    misleading theological resonance.
