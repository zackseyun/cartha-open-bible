id: LUK.16.10
reference: Luke 16:10
source:
  edition: SBLGNT
  text: Ὁ πιστὸς ἐν ἐλαχίστῳ καὶ ἐν πολλῷ πιστός ἐστιν, καὶ ὁ ἐν ἐλαχίστῳ ἄδικος καὶ
    ἐν πολλῷ ἄδικός ἐστιν.
translation:
  text: The one who is faithful in very little is also faithful in much, and the one
    who is unrighteous in very little is also unrighteous in much.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the least.' The Greek expression refers to what is very small or
      insignificant.
    reason: lexical_alternative
  - marker: b
    text: Or 'dishonest' or 'unjust' for 'unrighteous.' The Greek term is broader
      than financial dishonesty, though that nuance fits the surrounding context.
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστός
  chosen: faithful
  alternatives:
  - trustworthy
  lexicon: BDAG
  rationale: In this context the adjective describes reliability in handling entrusted
    matters, not merely believing. 'Faithful' best captures proven trustworthiness
    and preserves the parallel with the second clause.
- source_word: ἐν ἐλαχίστῳ
  chosen: in very little
  alternatives:
  - in the least
  - with very little
  lexicon: BDAG
  rationale: The dative with ἐν expresses sphere or circumstance. 'In very little'
    is natural English and preserves the contrast with 'in much.' 'In the least' is
    possible but can sound idiomatic rather than directly quantitative.
- source_word: πολλῷ
  chosen: much
  alternatives:
  - many things
  - a great deal
  lexicon: BDAG
  rationale: The neuter singular here contrasts quantity or extent with ἐλαχίστῳ.
    'Much' is concise and mirrors the Greek antithesis.
- source_word: ἄδικος
  chosen: unrighteous
  alternatives:
  - dishonest
  - unjust
  lexicon: BDAG
  rationale: The term can denote injustice or wrongdoing broadly. In the immediate
    context of stewardship and money, 'dishonest' is tempting, but the Greek adjective
    is broader than financial dishonesty. 'Unrighteous' preserves the moral category
    and the lexical connection to δικ- language.
- source_word: ὁ ... πιστός / ὁ ... ἄδικος
  chosen: the one who is faithful ... the one who is unrighteous
  alternatives:
  - he who is faithful ... he who is unrighteous
  - whoever is faithful ... whoever is unrighteous
  lexicon: Greek grammar
  rationale: The article with adjective functions substantivally. 'The one who...'
    gives clear, natural English while preserving the representative singular force
    without introducing unnecessary gendered language where the Greek construction
    is generic.
- source_word: καὶ
  chosen: also
  alternatives:
  - and
  lexicon: BDAG
  rationale: In both halves of the saying, καί links corresponding clauses and carries
    an additive sense. Rendering it as 'also' in the predicate relation makes the
    parallelism explicit in idiomatic English, while the larger clause connection
    is still conveyed by 'and' between the two main statements.
