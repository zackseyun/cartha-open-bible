theological_decisions:
- issue: Moral descriptor ἄδικος in a stewardship context
  chosen_reading: unrighteous
  alternative_readings:
  - dishonest
  - unjust
  rationale: The verse states a general moral principle, not only a financial one.
    Using 'unrighteous' avoids narrowing Jesus' statement to money management alone,
    while still fitting the immediate context of the parable and its application.
