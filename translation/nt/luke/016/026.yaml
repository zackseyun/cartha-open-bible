id: LUK.16.26
reference: Luke 16:26
source:
  edition: SBLGNT
  text: καὶ ⸀ἐν πᾶσι τούτοις μεταξὺ ἡμῶν καὶ ὑμῶν χάσμα μέγα ἐστήρικται, ὅπως οἱ θέλοντες
    διαβῆναι ἔνθεν πρὸς ὑμᾶς μὴ δύνωνται, ⸀μηδὲ ἐκεῖθεν πρὸς ἡμᾶς διαπερῶσιν.
translation:
  text: And in all these things, between us and you a great chasm has been fixed,
    so that those wanting to cross over from here to you cannot, nor can any cross
    over from there to us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'besides all this.' The Greek phrase can introduce an additional consideration
      in a more idiomatic way.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν πᾶσι τούτοις
  chosen: in all these things
  alternatives:
  - besides all this
  - in addition to all this
  lexicon: BDAG
  rationale: A fairly literal rendering preserves the prepositional phrase and avoids
    importing an idiomatic paraphrase. English 'in all these things' is slightly unusual
    but understandable; the phrase signals an additional consideration in the discourse.
- source_word: μεταξὺ ἡμῶν καὶ ὑμῶν
  chosen: between us and you
  alternatives:
  - between us and you all
  lexicon: BDAG
  rationale: Straightforward spatial/relational sense. 'You' is sufficient in English
    without forcing a plural marker into the main text.
- source_word: χάσμα μέγα
  chosen: a great chasm
  alternatives:
  - a huge gulf
  - a great gulf
  lexicon: BDAG
  rationale: '''Chasm'' closely matches the Greek noun and is clear modern English.
    ''Gulf'' is traditional but less precise here.'
- source_word: ἐστήρικται
  chosen: has been fixed
  alternatives:
  - has been established
  - has been set in place
  lexicon: BDAG
  rationale: Perfect passive indicates a settled, enduring state. 'Has been fixed'
    communicates both establishment and permanence in idiomatic English.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is natural English and preserves
    the clause relationship.
- source_word: οἱ θέλοντες
  chosen: those wanting
  alternatives:
  - those who want
  - those wishing
  lexicon: BDAG
  rationale: Substantival participle rendered as a generic group designation. 'Those
    wanting' keeps the participial force without overcomplication.
- source_word: διαβῆναι
  chosen: to cross over
  alternatives:
  - to pass across
  lexicon: BDAG
  rationale: The verb denotes crossing from one side to another; 'cross over' is natural
    and spatially clear.
- source_word: ἔνθεν
  chosen: from here
  alternatives:
  - from this side
  lexicon: BDAG
  rationale: Deictic adverb rendered from the speaker's side. 'From here' is simple
    and preserves the perspective.
- source_word: μὴ δύνωνται
  chosen: cannot
  alternatives:
  - may not be able to
  - are not able to
  lexicon: BDAG
  rationale: Expresses inability, not mere prohibition. 'Cannot' is the most concise
    and natural rendering.
- source_word: μηδὲ
  chosen: nor can
  alternatives:
  - and neither can
  - nor may
  lexicon: BDAG
  rationale: Coordinates the second impossibility clause. 'Nor can' preserves the
    parallel and the sense of inability.
- source_word: ἐκεῖθεν
  chosen: from there
  alternatives:
  - from that side
  lexicon: BDAG
  rationale: Counterpart to ἔνθεν; 'from there' preserves the deictic contrast.
- source_word: διαπερῶσιν
  chosen: cross over
  alternatives:
  - pass through
  - cross across
  lexicon: BDAG
  rationale: The compound verb intensifies the idea of traversing across. In English,
    repeating 'cross over' best preserves the parallelism with διαβῆναι without sounding
    unnatural.
