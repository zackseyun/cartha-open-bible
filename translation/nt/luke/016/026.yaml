theological_decisions:
- issue: Nature of the separation between the two realms in the parable
  chosen_reading: Render the language as a fixed, impassable separation without expanding
    it into a systematic doctrinal statement beyond the verse.
  alternative_readings:
  - Interpret the chasm as a literal topographical feature of the afterlife
  - Treat the wording as purely figurative with no implication of fixed postmortem
    separation
  rationale: The verse itself emphasizes permanence and inability to cross. The translation
    should preserve that force while avoiding doctrinal elaboration not explicit in
    the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
