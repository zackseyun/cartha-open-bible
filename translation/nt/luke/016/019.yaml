id: LUK.16.19
reference: Luke 16:19
source:
  edition: SBLGNT
  text: Ἄνθρωπος δέ τις ἦν πλούσιος, καὶ ἐνεδιδύσκετο πορφύραν καὶ βύσσον εὐφραινόμενος
    καθ’ ἡμέραν λαμπρῶς.
translation:
  text: Now there was a certain rich man, and he used to dress in purple and fine
    linen, feasting splendidly every day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'feasting sumptuously every day.' The participle εὐφραινόμενος can suggest
      festive enjoyment or feasting, and λαμπρῶς can emphasize luxurious magnificence.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄνθρωπος δέ τις
  chosen: Now there was a certain ... man
  alternatives:
  - There was a certain man
  - Now a certain man was
  lexicon: BDAG
  rationale: ἄνθρωπος with τις introduces an indefinite individual, and δέ marks a
    narrative transition. 'A certain ... man' preserves the idiomatic introduction;
    'Now' reflects δέ's discourse function without overtranslating.
- source_word: πλούσιος
  chosen: rich
  alternatives:
  - wealthy
  lexicon: BDAG
  rationale: The adjective straightforwardly denotes material wealth. 'Rich' is the
    most natural and direct English equivalent in this narrative context.
- source_word: ἐνεδιδύσκετο
  chosen: used to dress
  alternatives:
  - was dressing himself
  - was clothed
  - habitually wore
  lexicon: BDAG
  rationale: The imperfect middle indicates customary past action. 'Used to dress'
    captures the habitual sense better than a simple past, while remaining idiomatic.
- source_word: πορφύραν
  chosen: purple
  alternatives:
  - purple clothing
  - purple garments
  lexicon: BDAG
  rationale: The noun can stand metonymically for purple-dyed clothing. 'Purple' is
    concise and preserves the cultural marker of luxury; the clothing sense is clear
    from 'dress in.'
- source_word: βύσσον
  chosen: fine linen
  alternatives:
  - linen
  - expensive linen
  lexicon: BDAG
  rationale: βύσσος refers to high-quality linen fabric. 'Fine linen' conveys both
    the material and its luxurious quality.
- source_word: εὐφραινόμενος
  chosen: rejoicing
  alternatives:
  - feasting
  - making merry
  - celebrating
  lexicon: BDAG
  rationale: The participle denotes enjoying oneself or celebrating. In this context
    it likely includes lavish feasting, but 'rejoicing' stays closer to the lexical
    sense without importing more than the Greek explicitly states.
- source_word: καθ’ ἡμέραν
  chosen: every day
  alternatives:
  - day by day
  - daily
  lexicon: BDAG
  rationale: The phrase is a standard idiom for regular daily occurrence. 'Every day'
    is the clearest modern English rendering.
- source_word: λαμπρῶς
  chosen: splendidly
  alternatives:
  - luxuriously
  - sumptuously
  lexicon: BDAG
  rationale: The adverb conveys brightness/splendor and, in context, magnificent or
    luxurious living. 'Splendidly' preserves the semantic link to splendor while fitting
    the narrative style.
