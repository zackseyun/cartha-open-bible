id: LUK.16.23
reference: Luke 16:23
source:
  edition: SBLGNT
  text: καὶ ἐν τῷ ᾅδῃ ἐπάρας τοὺς ὀφθαλμοὺς αὐτοῦ, ὑπάρχων ἐν βασάνοις, ⸀ὁρᾷ Ἀβραὰμ ἀπὸ μακρόθεν καὶ Λάζαρον ἐν τοῖς κόλποις αὐτοῦ.
translation:
  text: And in Hades[a], lifting up his eyes, being in torment[b], he sees Abraham far away and Lazarus in his bosom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "hell"; more precisely, "Hades," the realm of the dead, not the final place of judgment implied by "Gehenna."
    reason: lexical_alternative
  - marker: b
    text: Literally, "in his bosom"; traditionally, "in Abraham's bosom."
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾅδῃ
  chosen: Hades
  alternatives:
  - the realm of the dead
  - hell
  lexicon: BDAG
  rationale: Rendered as "Hades" rather than "hell" to preserve the distinct Greek term and avoid importing later doctrinal associations of final judgment; this is the intermediate realm in the narrative, not Gehenna.
- source_word: ἐπάρας τοὺς ὀφθαλμοὺς αὐτοῦ
  chosen: lifting up his eyes
  alternatives:
  - raising his eyes
  - looking up
  lexicon: BDAG
  rationale: Kept the participial imagery fairly literally; "lifting up his eyes" is natural enough in English and preserves the narrative vividness.
- source_word: ὑπάρχων
  chosen: being
  alternatives:
  - while he was
  - as he was
  lexicon: BDAG
  rationale: Rendered as a circumstantial participle with simple "being," preserving the Greek structure without over-paraphrasing temporal nuance.
- source_word: βασάνοις
  chosen: torment
  alternatives:
  - torments
  - agony
  lexicon: BDAG
  rationale: The plural dative is idiomatically expressed in English as the state of "in torment." This best conveys severe suffering in readable modern English.
- source_word: ὁρᾷ
  chosen: he sees
  alternatives:
  - he saw
  - he catches sight of
  lexicon: BDAG
  rationale: Present tense retained as "he sees," matching the Greek's vivid present in the narrative.
- source_word: ἀπὸ μακρόθεν
  chosen: far away
  alternatives:
  - from a distance
  - from far off
  lexicon: BDAG
  rationale: '"Far away" is clear, idiomatic modern English and preserves the spatial separation emphasized by the Greek.'
- source_word: ἐν τοῖς κόλποις αὐτοῦ
  chosen: in his arms
  alternatives:
  - at his side
  - in Abraham's bosom
  lexicon: BDAG
  rationale: κόλπος literally refers to bosom/chest/lap; here the plural expression is idiomatic and denotes close, embraced fellowship. "In his arms" communicates the relational and spatial sense in natural English. Traditional "in Abraham's bosom" is preserved in a footnote because of its interpretive and historical significance.
