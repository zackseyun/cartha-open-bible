theological_decisions:
- issue: Rendering of ᾅδης in a passage often cited in discussions of the intermediate state and final punishment
  chosen_reading: Hades
  alternative_readings:
  - hell
  - the realm of the dead
  rationale: Using "Hades" preserves the lexical distinction in the Greek text and avoids collapsing this scene into the final state of judgment. This maintains theological precision without resolving broader doctrinal debates beyond the verse itself.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
- issue: Rendering of κόλπος imagery associated with 'Abraham's bosom'
  chosen_reading: in his arms
  alternative_readings:
  - in Abraham's bosom
  - at his side
  rationale: The main text uses accessible modern English while the footnote preserves the traditional expression important in Christian interpretation. This balances readability with auditability and avoids unnecessary archaism in the main text.
  doctrine_reference: 'Translation philosophy: Readable modern English, not archaic or academic; Original-language primacy over translation tradition.'
