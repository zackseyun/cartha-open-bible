id: LUK.16.20
reference: Luke 16:20
source:
  edition: SBLGNT
  text: πτωχὸς δέ ⸀τις ὀνόματι ⸀Λάζαρος ἐβέβλητο πρὸς τὸν πυλῶνα αὐτοῦ εἱλκωμένος
translation:
  text: And a poor man named Lazarus had been laid at his gate, covered with sores,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had been thrown at his gate.' The Greek verb can carry the sense of
      being cast or thrown, which may emphasize Lazarus's helplessness and neglect.
    reason: lexical_alternative
  - marker: b
    text: Or 'full of sores.' The Greek participle indicates that Lazarus was afflicted
      with ulcerous sores.
    reason: lexical_alternative
lexical_decisions:
- source_word: πτωχὸς
  chosen: poor
  alternatives:
  - beggar
  - destitute
  lexicon: BDAG
  rationale: The adjective denotes one who is poor or destitute. 'Poor' is the most
    natural base rendering here and avoids importing the more specific social role
    'beggar' unless demanded by context. The following narrative implies dependence,
    but this verse itself identifies his condition primarily as poverty.
- source_word: τις
  chosen: a ... man
  alternatives:
  - a certain man
  - someone
  lexicon: BDAG
  rationale: Indefinite τις introduces a new character. English idiom is best served
    by 'a ... man' rather than the more wooden 'a certain man,' though that remains
    a viable formal alternative.
- source_word: ὀνόματι Λάζαρος
  chosen: named Lazarus
  alternatives:
  - by name Lazarus
  lexicon: BDAG
  rationale: This dative construction idiomatically means 'named Lazarus.' The personal
    name is transliterated in keeping with the translation philosophy.
- source_word: ἐβέβλητο
  chosen: had been laid
  alternatives:
  - had been thrown
  - was lying
  lexicon: BDAG
  rationale: The pluperfect/passive of βάλλω literally suggests having been cast/placed.
    In this context, 'had been laid' communicates the resultant state at the gate
    without sounding unnecessarily harsh, while still preserving the passive sense
    that others put him there. 'Had been thrown' is more literal to βάλλω and is preserved
    as an alternative because it may underscore his neglect.
- source_word: πρὸς τὸν πυλῶνα αὐτοῦ
  chosen: at his gate
  alternatives:
  - by his gate
  - toward his gate
  lexicon: BDAG
  rationale: πρός with the accusative here indicates position in relation to the rich
    man's gate/entryway. 'At his gate' is idiomatic English and fits the scene. πυλών
    refers to a gate or gateway, likely of a large house or estate.
- source_word: εἱλκωμένος
  chosen: covered with sores
  alternatives:
  - full of sores
  - ulcerated
  lexicon: BDAG
  rationale: The participle from ἑλκόομαι means being afflicted with sores/ulcers.
    'Covered with sores' is clear modern English and conveys the visible, pitiable
    condition. 'Full of sores' is a common traditional rendering and remains a strong
    alternative.
