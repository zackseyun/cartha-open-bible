id: LUK.16.25
reference: Luke 16:25
source:
  edition: SBLGNT
  text: εἶπεν δὲ Ἀβραάμ· Τέκνον, μνήσθητι ὅτι ⸀ἀπέλαβες τὰ ἀγαθά σου ἐν τῇ ζωῇ σου, καὶ Λάζαρος ὁμοίως τὰ κακά· νῦν δὲ ὧδε παρακαλεῖται σὺ δὲ ὀδυνᾶσαι.
translation:
  text: But Abraham said[a], ‘Child, remember that you received your good things during your life, and Lazarus likewise bad things; but now he is comforted here[b], and you are in anguish.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'received in full your good things.' The Greek verb can imply receiving what was allotted or receiving fully.
    reason: lexical_alternative
  - marker: b
    text: Or 'you are tormented.' The Greek can denote intense pain or distress.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τέκνον
  chosen: Child
  alternatives:
  - Son
  lexicon: BDAG
  rationale: Vocative of address expressing familial or compassionate address without necessarily indicating literal sonship. 'Child' preserves the tenderness and social asymmetry better than 'son' in modern English, while remaining gender-accurate to the generic sense.
- source_word: μνήσθητι
  chosen: remember
  alternatives:
  - recall
  - be mindful
  lexicon: BDAG
  rationale: Aorist imperative calling for recollection. 'Remember' is the most natural and direct English equivalent.
- source_word: ἀπέλαβες
  chosen: received
  alternatives:
  - received in full
  - got
  lexicon: BDAG
  rationale: The verb can carry the nuance of receiving what is due or receiving in full. 'Received' fits idiomatic English here; the stronger nuance is contextually present but not explicit enough to force 'received in full' into the main text.
- source_word: τὰ ἀγαθά σου
  chosen: your good things
  alternatives:
  - your good things
  - the good things that were yours
  - your blessings
  lexicon: BDAG
  rationale: The plural adjective used substantivally refers broadly to beneficial or pleasant things. 'Good things' stays close to the Greek and avoids importing a more overtly theological term like 'blessings'.
- source_word: ἐν τῇ ζωῇ σου
  chosen: during your life
  alternatives:
  - in your lifetime
  - in your life
  lexicon: BDAG
  rationale: '''During your life'' is idiomatic and clearly temporal. It conveys the earthly-life timeframe intended in context.'
- source_word: ὁμοίως
  chosen: likewise
  alternatives:
  - in the same way
  - similarly
  lexicon: BDAG
  rationale: Marks the parallel contrast between the rich man and Lazarus. 'Likewise' is concise and natural.
- source_word: τὰ κακά
  chosen: bad things
  alternatives:
  - evil things
  - hardships
  - troubles
  lexicon: BDAG
  rationale: The phrase denotes adverse experiences suffered by Lazarus, not moral evil committed by him. 'Bad things' preserves the broadness of the Greek without over-specifying to 'hardships,' though that sense is contextually implied.
- source_word: παρακαλεῖται
  chosen: is comforted
  alternatives:
  - is consoled
  - is encouraged
  lexicon: BDAG
  rationale: In this context of postmortem reversal, the passive denotes receiving comfort or consolation. 'Is comforted' is the clearest idiomatic rendering.
- source_word: ὧδε
  chosen: here
  alternatives:
  - in this place
  lexicon: BDAG
  rationale: A deictic adverb referring to the present location in the narrative scene. 'Here' is sufficiently clear and natural.
- source_word: ὀδυνᾶσαι
  chosen: are in anguish
  alternatives:
  - are tormented
  - are in pain
  lexicon: BDAG
  rationale: The middle/passive form denotes severe distress or pain. 'Are in anguish' captures the experiential suffering without importing the more interpretively loaded 'tormented,' though that is a viable contextual alternative.
