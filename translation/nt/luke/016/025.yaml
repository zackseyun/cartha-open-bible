theological_decisions:
- issue: Rendering of postmortem suffering language
  chosen_reading: you are in anguish
  alternative_readings:
  - you are tormented
  - you are in pain
  rationale: The verse depicts conscious suffering after death, but the translation should reflect the lexical force of ὀδυνᾶσαι without overstating beyond the word itself. 'In anguish' preserves the reality of suffering while avoiding unnecessary doctrinal amplification.
  doctrine_reference: Preserve theological tension rather than resolve it.
