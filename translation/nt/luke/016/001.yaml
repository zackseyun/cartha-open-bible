id: LUK.16.1
reference: Luke 16:1
source:
  edition: SBLGNT
  text: Ἔλεγεν δὲ καὶ πρὸς τοὺς ⸀μαθητάς· Ἄνθρωπός τις ἦν πλούσιος ὃς εἶχεν οἰκονόμον, καὶ οὗτος διεβλήθη αὐτῷ ὡς διασκορπίζων τὰ ὑπάρχοντα αὐτοῦ.
translation:
  text: He was also saying to the disciples[a], “There was a certain rich man who had a manager[b], and this man was accused to him of squandering his possessions.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'steward' for 'manager' (οἰκονόμος), a traditional rendering referring to one entrusted with oversight of a household or estate.
    reason: lexical_alternative
  - marker: b
    text: Or 'was reported to him' / 'was denounced to him.' The verb can denote an accusation or adverse report, not necessarily a proven charge.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγεν
  chosen: was saying
  alternatives:
  - said
  - began to say
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or scene-setting discourse rather than a simple punctiliar 'said.' 'Was saying' preserves the narrative flow into the parable.
- source_word: δὲ καὶ
  chosen: Now ... also
  alternatives:
  - And also
  - Then also
  - And
  lexicon: BDAG
  rationale: δέ marks transition and καί adds 'also.' Rendering with 'Now ... also' reflects both discourse particles in natural English without overloading the sentence.
- source_word: πρὸς τοὺς μαθητάς
  chosen: to the disciples
  alternatives:
  - to his disciples
  lexicon: BDAG
  rationale: The text has 'the disciples' without an explicit possessive pronoun. English naturally renders the dative-directional sense with 'to the disciples.'
- source_word: Ἄνθρωπός τις
  chosen: There was a certain ... man
  alternatives:
  - A certain man
  - There was a man
  lexicon: BDAG
  rationale: This idiom commonly introduces a character in a parable or narrative. 'There was a certain ... man' preserves the indefinite-yet-specific force.
- source_word: πλούσιος
  chosen: rich
  alternatives:
  - wealthy
  lexicon: BDAG
  rationale: '''Rich'' is the most direct and idiomatic equivalent, and matches common Lukan usage.'
- source_word: οἰκονόμον
  chosen: manager
  alternatives:
  - steward
  - estate manager
  lexicon: BDAG
  rationale: οἰκονόμος denotes one entrusted with administration of a household or estate. 'Manager' is clear modern English; 'steward' is traditional but less transparent to contemporary readers.
- source_word: οὗτος
  chosen: this man
  alternatives:
  - he
  - this one
  lexicon: BDAG
  rationale: The demonstrative points back emphatically to the manager. 'This man' preserves the referential emphasis better than a bare pronoun.
- source_word: διεβλήθη αὐτῷ
  chosen: was accused to him
  alternatives:
  - was reported to him
  - charges were brought against him before him
  lexicon: BDAG
  rationale: The passive of διαβάλλω can mean to accuse, denounce, or bring charges/slander against someone before another. 'Was accused to him' keeps the formal allegation sense while preserving the indirect object αὐτῷ ('to him,' i.e., to the rich man).
- source_word: ὡς διασκορπίζων
  chosen: of squandering
  alternatives:
  - as squandering
  - for wasting
  - of scattering
  lexicon: BDAG
  rationale: ὡς with participle gives the content/basis of the accusation. 'Of squandering' is idiomatic English and fits the financial context better than the more literal 'scattering.'
- source_word: τὰ ὑπάρχοντα αὐτοῦ
  chosen: his possessions
  alternatives:
  - his property
  - what belonged to him
  - his goods
  lexicon: BDAG
  rationale: τὰ ὑπάρχοντα refers to possessions/property. 'His possessions' is natural and broad enough for the estate context; the pronoun refers to the rich man's assets.
