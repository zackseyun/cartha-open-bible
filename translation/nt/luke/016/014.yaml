id: LUK.16.14
reference: Luke 16:14
source:
  edition: SBLGNT
  text: Ἤκουον δὲ ταῦτα ⸀πάντα οἱ Φαρισαῖοι φιλάργυροι ὑπάρχοντες, καὶ ἐξεμυκτήριζον
    αὐτόν.
translation:
  text: Now the Pharisees, who were lovers of money, were hearing all these things
    and were ridiculing him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were sneering at him.' The verb can convey open derision or contemptuous
      scoffing.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἤκουον
  chosen: were hearing
  alternatives:
  - heard
  - listened to
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or contemporaneous action in the narrative,
    so 'were hearing' preserves the aspect better than simple past 'heard.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  - ''
  lexicon: BDAG
  rationale: δέ here marks a mild narrative transition rather than strong contrast.
    'Now' is natural modern English and signals the shift in scene.
- source_word: ταῦτα πάντα
  chosen: all these things
  alternatives:
  - all this
  - these things, all of them
  lexicon: BDAG
  rationale: The combination of demonstrative plus πᾶς is naturally rendered 'all
    these things,' referring back to Jesus's preceding teaching.
- source_word: Φαρισαῖοι
  chosen: the Pharisees
  lexicon: BDAG
  rationale: Standard transliteration for the Jewish group/title in the Gospels.
- source_word: φιλάργυροι ὑπάρχοντες
  chosen: who were lovers of money
  alternatives:
  - being money-loving
  - who were greedy
  - who loved money
  lexicon: BDAG
  rationale: The participle ὑπάρχοντες with predicate adjective φιλάργυροι gives a
    descriptive characterization. 'Who were lovers of money' is clear, preserves the
    nominal force of φιλάργυροι, and avoids reducing the phrase to a merely momentary
    action.
- source_word: ἐξεμυκτήριζον
  chosen: were ridiculing
  alternatives:
  - were sneering at
  - were mocking
  - were turning up their noses at
  lexicon: BDAG
  rationale: The imperfect again suggests repeated or ongoing action. The verb carries
    the sense of derisive scorn. 'Were ridiculing' is idiomatic and accessible; 'were
    sneering at' is a close alternative with slightly more vivid imagery.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Direct object referring to Jesus in context.
