theological_decisions:
- issue: Characterization of the Pharisees' sin in φιλάργυροι
  chosen_reading: Rendered as 'lovers of money' rather than the more interpretive
    'greedy.'
  alternative_readings:
  - greedy
  - covetous
  rationale: The Greek explicitly denotes love of money, which is more transparent
    and textually grounded than a broader moral label. This preserves the connection
    to Jesus's teaching about wealth in the immediate context without importing additional
    doctrinal nuance.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English.'
