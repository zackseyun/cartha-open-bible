id: LUK.16.18
reference: Luke 16:18
source:
  edition: SBLGNT
  text: Πᾶς ὁ ἀπολύων τὴν γυναῖκα αὐτοῦ καὶ γαμῶν ἑτέραν μοιχεύει, ⸀καὶ ὁ ἀπολελυμένην ἀπὸ ἀνδρὸς γαμῶν μοιχεύει.
translation:
  text: Everyone who divorces his wife and marries another commits adultery[b][a], and he who marries a woman divorced from her husband commits adultery.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Whoever divorces his wife and marries another woman commits adultery.'
    reason: lexical_alternative
  - marker: b
    text: 'Greek: ''the one having been divorced from a husband''; that is, a woman who has been divorced.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πᾶς ὁ
  chosen: Everyone who
  alternatives:
  - Whoever
  lexicon: BDAG
  rationale: The articular construction with πᾶς introduces a generalizing statement. 'Everyone who' is natural modern English and preserves the universal scope.
- source_word: ἀπολύων
  chosen: divorces
  alternatives:
  - releases
  - sends away
  lexicon: BDAG
  rationale: In this marital context, ἀπολύω idiomatically means to divorce rather than the more wooden 'send away.' This best reflects the legal-relational sense in context.
- source_word: τὴν γυναῖκα αὐτοῦ
  chosen: his wife
  alternatives:
  - his woman
  lexicon: BDAG
  rationale: γυνή in this context clearly means 'wife,' not merely 'woman,' since the saying concerns marriage and divorce.
- source_word: γαμῶν
  chosen: marries
  alternatives:
  - takes in marriage
  lexicon: BDAG
  rationale: A straightforward present participle in a general condition; 'marries' is the most natural English equivalent.
- source_word: ἑτέραν
  chosen: another
  alternatives:
  - another woman
  - a different woman
  lexicon: BDAG
  rationale: ἑτέραν means 'another' or 'different one.' English idiom after 'marries' naturally supplies the object as another woman/wife, so 'another' is sufficient and concise.
- source_word: μοιχεύει
  chosen: commits adultery
  alternatives:
  - is committing adultery
  - adulterates
  lexicon: BDAG
  rationale: The verb denotes adultery. 'Commits adultery' is standard, clear English and avoids awkward over-literalism.
- source_word: ἀπολελυμένην
  chosen: a woman divorced
  alternatives:
  - a divorced woman
  - one who has been divorced
  lexicon: BDAG
  rationale: The perfect passive participle indicates a woman in the state of having been divorced. 'A woman divorced' preserves the passive sense while reading smoothly.
- source_word: ἀπὸ ἀνδρὸς
  chosen: from a husband
  alternatives:
  - from her husband
  - by a husband
  - from a man
  lexicon: BDAG
  rationale: ἀνήρ can mean 'man' or 'husband'; here marital context requires 'husband.' The preposition ἀπό is retained with 'from' to reflect the Greek expression rather than interpreting more specifically as 'by.'
