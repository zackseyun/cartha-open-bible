theological_decisions:
- issue: Scope and force of Jesus' divorce saying
  chosen_reading: Render the statement as a universal moral pronouncement without importing exception clauses from other passages.
  alternative_readings:
  - Harmonize with Matthew by adding an implied exception for sexual immorality
  - Interpret as only condemning illegitimate divorce-remarriage in specific Jewish legal settings
  rationale: This verse, as phrased in Luke, gives a concise universal statement. The translation should reflect Luke's wording alone and not import qualifications not present in the Greek text. Interpretive harmonization belongs in commentary, not the main translation.
  doctrine_reference: Preserve theological tension rather than resolve it.
