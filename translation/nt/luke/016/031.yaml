theological_decisions:
- issue: Meaning of 'Moses and the Prophets'
  chosen_reading: A reference to the authoritative scriptural witness already given to Israel
  alternative_readings:
  - A narrower reference only to two representative figures
  rationale: In context, the phrase functions as a metonymy for Scripture's testimony, not merely two individuals. The translation preserves the idiom without paraphrasing it as 'the Scriptures,' allowing readers to hear the original expression.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
- issue: Force of πεισθήσονται
  chosen_reading: general persuasion/conviction rather than explicit conversion or saving faith
  alternative_readings:
  - they will believe
  - they will repent
  rationale: The Greek verb speaks of being persuaded or convinced. Rendering it as 'believe' or 'repent' would import a more specific theological response than the wording itself states.
  doctrine_reference: 'Affirmations; Translation philosophy: Never import doctrinal claims the text does not make.'
