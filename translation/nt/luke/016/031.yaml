id: LUK.16.31
reference: Luke 16:31
source:
  edition: SBLGNT
  text: εἶπεν δὲ αὐτῷ· Εἰ Μωϋσέως καὶ τῶν προφητῶν οὐκ ἀκούουσιν, οὐδ’ ἐάν τις ἐκ νεκρῶν ἀναστῇ πεισθήσονται.
translation:
  text: But he said to him[a], ‘If they do not listen to Moses and the Prophets[c][b], neither will they be persuaded if someone rises from the dead.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hear' or 'heed' for 'listen.' The Greek verb can include both hearing and responsive attention.
    reason: lexical_alternative
  - marker: b
    text: Or 'from among the dead.'
    reason: lexical_alternative
  - marker: c
    text: Or 'will be convinced.' The Greek means 'will be persuaded' or 'convinced,' not necessarily 'will believe' in a narrower theological sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν δὲ αὐτῷ
  chosen: But he said to him
  alternatives:
  - And he said to him
  - Then he said to him
  lexicon: BDAG
  rationale: δέ is rendered 'But' to preserve the mild contrastive turn in the dialogue. 'Said to him' is the natural English equivalent of εἶπεν αὐτῷ.
- source_word: Εἰ
  chosen: If
  lexicon: BDAG
  rationale: Introduces a conditional clause straightforwardly; no expansion is warranted.
- source_word: Μωϋσέως καὶ τῶν προφητῶν
  chosen: Moses and the Prophets
  alternatives:
  - Moses and the prophets
  lexicon: BDAG
  rationale: This is a recognized Jewish way of referring to the scriptural witness, especially the Law and the Prophets. Capitalizing 'Prophets' helps signal the recognized corpus in English, paired with the proper name Moses.
- source_word: οὐκ ἀκούουσιν
  chosen: do not listen
  alternatives:
  - do not hear
  - do not heed
  lexicon: BDAG
  rationale: ἀκούω can mean hear, listen, or heed. 'Listen' best captures both auditory reception and responsive attention in idiomatic English without over-interpreting as full obedience.
- source_word: οὐδ’ ἐάν
  chosen: neither ... if
  alternatives:
  - not even if
  - nor if
  lexicon: BDAG
  rationale: The construction intensifies the negation from the first clause into the conditional second clause. 'Neither will they ... if' preserves the rhetorical force in smooth English.
- source_word: τις
  chosen: someone
  alternatives:
  - anyone
  - a person
  lexicon: BDAG
  rationale: Indefinite singular pronoun; 'someone' is natural and preserves the singular reference.
- source_word: ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - from among the dead
  lexicon: BDAG
  rationale: Standard idiomatic rendering for resurrection language. 'From among the dead' is more formal but less natural in contemporary English.
- source_word: ἀναστῇ
  chosen: rises
  alternatives:
  - should rise
  - were to rise
  lexicon: BDAG
  rationale: Aorist subjunctive after ἐάν in a future-more-vivid condition. English present 'rises' after 'if' is idiomatic and conveys the conditional sense without awkwardness.
- source_word: πεισθήσονται
  chosen: will be persuaded
  alternatives:
  - will be convinced
  - will believe
  lexicon: BDAG
  rationale: Future passive of πείθω here denotes being convinced/persuaded. 'Will be persuaded' stays close to the Greek and avoids narrowing the sense to explicit saving faith, which the text itself does not specify.
