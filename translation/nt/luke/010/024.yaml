theological_decisions:
- issue: Identity of 'prophets and kings'
  chosen_reading: Retain the historical categories 'prophets and kings' without interpretive expansion.
  alternative_readings:
  - prophets and rulers
  - prophets and kings of old
  rationale: The verse contrasts Jesus' disciples with notable figures from Israel's past who anticipated God's saving revelation. The translation should preserve that tension without adding explanatory material not present in the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it.
