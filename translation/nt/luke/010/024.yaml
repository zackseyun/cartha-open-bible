id: LUK.10.24
reference: Luke 10:24
source:
  edition: SBLGNT
  text: λέγω γὰρ ὑμῖν ὅτι πολλοὶ προφῆται καὶ βασιλεῖς ἠθέλησαν ἰδεῖν ἃ ὑμεῖς βλέπετε καὶ οὐκ εἶδαν, καὶ ἀκοῦσαι ἃ ἀκούετε καὶ οὐκ ἤκουσαν.
translation:
  text: For I tell you that many prophets and kings desired to see what you see and did not see it[a], and to hear what you hear and did not hear it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'wanted' or 'longed' to see what you see.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω γὰρ ὑμῖν
  chosen: For I tell you
  alternatives:
  - For I say to you
  - Indeed, I tell you
  lexicon: BDAG
  rationale: λέγω with dative ὑμῖν is naturally rendered 'I tell you.' γάρ is kept as 'For' to preserve the explanatory connection to the preceding blessing.
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - a great many
  lexicon: BDAG
  rationale: Standard quantitative adjective; 'many' is the natural and sufficiently formal rendering.
- source_word: προφῆται
  chosen: prophets
  lexicon: BDAG
  rationale: Direct rendering of the noun with its established biblical sense.
- source_word: βασιλεῖς
  chosen: kings
  alternatives:
  - rulers
  lexicon: BDAG
  rationale: The literal sense is 'kings'; no contextual pressure justifies broadening to 'rulers.'
- source_word: ἠθέλησαν
  chosen: desired
  alternatives:
  - wanted
  - longed
  lexicon: BDAG
  rationale: θέλω can mean 'want' or 'desire.' 'Desired' fits the elevated tone and conveys earnest wish without overstating emotional intensity.
- source_word: ἰδεῖν
  chosen: to see
  alternatives:
  - to behold
  lexicon: BDAG
  rationale: Simple infinitive of perception; 'to see' is clear and natural.
- source_word: ἃ ὑμεῖς βλέπετε
  chosen: what you see
  alternatives:
  - the things that you see
  lexicon: BDAG
  rationale: The relative pronoun plus present verb is idiomatically rendered 'what you see.' The explicit pronoun ὑμεῖς is reflected by English word order and context without needing added emphasis such as 'you yourselves.'
- source_word: οὐκ εἶδαν
  chosen: did not see it
  alternatives:
  - did not see
  - never saw
  lexicon: BDAG
  rationale: The aorist states the historical fact that they did not attain the desired sight. Adding 'it' makes the English object explicit, corresponding to the prior relative clause.
- source_word: ἀκοῦσαι
  chosen: to hear
  alternatives:
  - to listen to
  lexicon: BDAG
  rationale: Infinitive parallel to ἰδεῖν; 'to hear' preserves the symmetry of the verse.
- source_word: ἃ ἀκούετε
  chosen: what you hear
  alternatives:
  - the things that you hear
  lexicon: BDAG
  rationale: Idiomatic rendering of the neuter plural relative clause; concise and natural in English.
- source_word: οὐκ ἤκουσαν
  chosen: did not hear it
  alternatives:
  - did not hear
  - never heard
  lexicon: BDAG
  rationale: Parallel to 'did not see it'; the supplied object is implicit in Greek but natural in English and preserves the balanced structure.
