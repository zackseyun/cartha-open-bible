theological_decisions:
- issue: Meaning of Jesus' denial about the kingdom's coming
  chosen_reading: Jesus denies that the kingdom of God comes in a manner marked by outwardly observable signs that can be tracked.
  alternative_readings:
  - Jesus denies merely human observation in general
  - Jesus denies apocalyptic signs altogether
  rationale: The phrase μετὰ παρατηρήσεως is best taken as referring to observable, watchable manifestation rather than denying all perception or all eschatological signs in every sense. This preserves the tension of the passage without importing a full realized-eschatology claim beyond the verse itself.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
