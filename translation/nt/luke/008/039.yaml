  rationale: Luke's wording intentionally places 'God' and 'Jesus' in parallel without editorial explanation. The translation should preserve this theological force without adding interpretive glosses beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological tension rather than resolve it.
