theological_decisions:
- issue: Ethical instruction to soldiers
  chosen_reading: John does not command soldiers to leave military service, but instructs them to practice justice within it.
  alternative_readings:
  - The verse implicitly condemns military service itself.
  rationale: The text addresses soldiers as soldiers and gives moral prohibitions concerning abuse of authority and greed, not a command to abandon their vocation. The translation therefore preserves the direct ethical instruction without importing a broader doctrinal claim.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
