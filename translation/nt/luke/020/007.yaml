id: LUK.20.7
reference: Luke 20:7
source:
  edition: SBLGNT
  text: καὶ ἀπεκρίθησαν μὴ εἰδέναι πόθεν.
translation:
  text: So they answered that they did not know where it was from[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "from where." The Greek asks about origin or source.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: So
  alternatives:
  - And
  lexicon: BDAG
  rationale: Rendered as "So" rather than the more mechanical "And" to reflect narrative continuation with slight inferential force in natural English. This stays within optimal equivalence and preserves the discourse flow.
- source_word: ἀπεκρίθησαν
  chosen: they answered
  alternatives:
  - they replied
  lexicon: BDAG
  rationale: Aorist middle/passive deponent of ἀποκρίνομαι commonly means "answer/reply." "They answered" is the most straightforward narrative rendering in English.
- source_word: μὴ εἰδέναι
  chosen: that they did not know
  alternatives:
  - not to know
  - that they did not understand
  lexicon: BDAG
  rationale: 'After verbs of answering, the infinitive with μή functions idiomatically as indirect discourse: "they answered that they did not know." This is clearer and more idiomatic than a wooden infinitival rendering.'
- source_word: πόθεν
  chosen: where it was from
  alternatives:
  - from where
  - its source
  lexicon: BDAG
  rationale: πόθεν means "from where, whence," here referring back to the baptism of John in the prior context. "Where it was from" is natural English and preserves the source/origin sense without over-specifying.
