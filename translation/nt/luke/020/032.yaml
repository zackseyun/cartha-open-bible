id: LUK.20.32
reference: Luke 20:32
source:
  edition: SBLGNT
  text: ὕστερον ⸂καὶ ἡ γυνὴ ἀπέθανεν⸃.
translation:
  text: Later[a], the woman also died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Afterward, the woman too died.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὕστερον
  chosen: Later
  alternatives:
  - Afterward
  - Finally
  lexicon: BDAG
  rationale: Adverb indicating subsequent time in the narrative sequence. 'Later' is natural modern English and preserves the temporal progression without over-specifying.
- source_word: καὶ
  chosen: also
  alternatives:
  - and
  lexicon: BDAG
  rationale: Here καί is best represented by 'also' rather than a simple connective 'and,' since it marks the woman as likewise dying after the brothers in the preceding context. English idiom reads more naturally with 'the woman also died' than 'and the woman died' in this compressed sentence.
- source_word: ἡ γυνή
  chosen: the woman
  alternatives:
  - the wife
  lexicon: BDAG
  rationale: γυνή can mean either 'woman' or 'wife.' In this immediate context, the referent is the woman in the levirate-marriage scenario; 'the woman' is the most straightforward and contextually clear rendering in English, while 'wife' could misleadingly suggest one specific marital relation in a sequence involving multiple brothers.
- source_word: ἀπέθανεν
  chosen: died
  alternatives:
  - passed away
  lexicon: BDAG
  rationale: Aorist indicative of ἀποθνῄσκω, simply reporting death as a past event. 'Died' is direct and faithful; 'passed away' would soften the statement beyond the Greek's plain sense.
