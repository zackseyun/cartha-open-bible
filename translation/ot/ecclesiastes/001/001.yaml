id: ECC.1.1
reference: Ecclesiastes 1:1
source:
  edition: WLC
  text: דִּבְרֵי֙ קֹהֶ֣לֶת בֶּן דָּוִ֔ד מֶ֖לֶךְ בִּ/ירוּשָׁלִָֽם־׃
translation:
  text: The words of Qoheleth, son of David, king in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Qoheleth is the Hebrew designation of the speaker; it may mean 'the Teacher,'
      'the Preacher,' or one associated with the assembly.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבְרֵי
  chosen: The words of
  alternatives:
  - The sayings of
  lexicon: HALOT
  rationale: Construct plural of דָּבָר here introduces the contents of the book.
    'Words' is the most direct and natural rendering in English; 'sayings' is possible
    but slightly more interpretive.
- source_word: קֹהֶלֶת
  chosen: Qoheleth
  alternatives:
  - the Teacher
  - the Preacher
  - the Assembler
  lexicon: HALOT
  rationale: This is a distinctive Hebrew title/name whose precise nuance is debated.
    Following the philosophy to transliterate names while exposing meaning in notes,
    'Qoheleth' preserves the Hebrew form without prematurely resolving whether it
    means 'Teacher,' 'Preacher,' or one who assembles/speaks in the assembly.
- source_word: בֶּן דָּוִד
  chosen: son of David
  lexicon: HALOT
  rationale: A straightforward filial/genetic expression. 'Son of David' preserves
    the Hebrew wording and its possible royal resonance without expanding it interpretively.
- source_word: מֶלֶךְ
  chosen: king
  lexicon: HALOT
  rationale: Standard rendering of מֶלֶךְ. No contextual pressure suggests a more
    dynamic alternative.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: HALOT
  rationale: The preposition ב is locative here. 'In Jerusalem' is standard modern
    English; 'at Jerusalem' is possible but less natural today.
