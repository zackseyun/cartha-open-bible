theological_decisions:
- issue: Whether קֹהֶלֶת should be translated as a functional title or preserved as
    a transliterated designation
  chosen_reading: Transliterate as 'Qoheleth' in the main text
  alternative_readings:
  - the Teacher
  - the Preacher
  rationale: The Hebrew term is debated and carries literary/theological significance
    for the speaker's identity. Transliteration preserves the ambiguity rather than
    resolving it too quickly, in keeping with the translation philosophy of preserving
    tension where the source is genuinely ambiguous. A footnote preserves major interpretive
    alternatives.
  doctrine_reference: Translation philosophy §§2–3
