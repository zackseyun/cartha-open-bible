- issue: Rendering of אָדָם in a generic statement about humanity
  chosen_reading: man
  alternative_readings:
  - humankind
  - a person
  rationale: The Hebrew is singular masculine with representative force. Following the doctrine's gender-accurate principle, 'man' preserves the source form and rhetorical style. An inclusive alternative is worth preserving in a footnote because modern English readers may otherwise hear it as male-exclusive.
