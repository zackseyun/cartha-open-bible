id: ECC.1.3
reference: Ecclesiastes 1:3
source:
  edition: WLC
  text: מַה יִּתְר֖וֹן לָֽ/אָדָ֑ם בְּ/כָל עֲמָל֔/וֹ שֶֽׁ/יַּעֲמֹ֖ל תַּ֥חַת הַ/שָּֽׁמֶשׁ־־׃
translation:
  text: What profit does a man have from all his labor at which he toils under the sun?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'humankind' or 'a person'; Hebrew 'man' is singular and representative here.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  chosen: What
  alternatives:
  - What kind of
  - What
  lexicon: HALOT
  rationale: Interrogative opening introducing a rhetorical question. Simple 'What' best preserves the concise Hebrew style.
- source_word: יִתְרוֹן
  chosen: profit
  alternatives:
  - gain
  - advantage
  - surplus
  lexicon: HALOT
  rationale: In Ecclesiastes this noun is a key term for what remains as net benefit or advantage after labor. 'Profit' captures the economic metaphor and the book's recurring concern with lasting gain.
- source_word: לָאָדָם
  chosen: does man have
  alternatives:
  - for man
  - for humankind
  - for a person
  lexicon: HALOT
  rationale: אָדָם here is generic but grammatically singular masculine. Per doctrine, gender-accurate rendering is preferred where representative force is present. English idiom requires supplying the verbal sense with 'does man have' rather than a wooden 'for man.'
- source_word: בְּכָל
  chosen: in all
  alternatives:
  - from all
  - by all
  lexicon: HALOT
  rationale: The preposition with the following noun expresses the sphere or totality of the labor under consideration. 'In all' is natural and sufficiently formal.
- source_word: עֲמָלוֹ
  chosen: his labor
  alternatives:
  - his toil
  - his work
  lexicon: HALOT
  rationale: עָמָל often carries the sense of burdensome labor or toil. Here 'labor' works well in combination with the following verb 'toils,' preserving the noun-verb interplay without awkward repetition of 'toil' twice.
- source_word: שֶׁיַּעֲמֹל
  chosen: at which he toils
  alternatives:
  - that he labors at
  - in which he toils
  - which he toils over
  lexicon: HALOT
  rationale: The relative particle plus verb specifies the labor in which the man exerts himself. 'At which he toils' preserves the relative construction and echoes the burdensome nuance of the Hebrew verb.
- source_word: תַּחַת הַשָּׁמֶשׁ
  chosen: under the sun
  alternatives:
  - beneath the sun
  lexicon: HALOT
  rationale: This is a programmatic Ecclesiastes phrase referring to life in the earthly, observable realm. 'Under the sun' is the standard and clear English equivalent.
