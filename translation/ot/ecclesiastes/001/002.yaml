theological_decisions:
- issue: Interpretive force of הבל in Ecclesiastes
  chosen_reading: Render as 'futility' rather than 'meaninglessness' or the traditional
    'vanity.'
  alternative_readings:
  - meaninglessness
  - vanity
  - vapor
  rationale: 'This is primarily lexical but has theological implications: ''meaninglessness''
    can suggest that creation or life has no meaning in an absolute sense, which the
    Hebrew term itself does not require. ''Futility'' preserves the text''s tension
    about frustration and transience under the sun without importing a stronger metaphysical
    claim.'
  doctrine_reference: Translation philosophy §§1, 3, 6
