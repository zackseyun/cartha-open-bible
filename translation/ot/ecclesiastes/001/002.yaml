id: ECC.1.2
reference: Ecclesiastes 1:2
source:
  edition: WLC
  text: הֲבֵ֤ל הֲבָלִים֙ אָמַ֣ר קֹהֶ֔לֶת הֲבֵ֥ל הֲבָלִ֖ים הַ/כֹּ֥ל הָֽבֶל׃
translation:
  text: Utter futility, says Qoheleth; utter futility! Everything is futile.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew הֲבֵל (hevel), literally 'breath' or 'vapor'; traditionally 'vanity.'
      The term in Ecclesiastes suggests what is fleeting, elusive, or frustratingly
      insubstantial.
    reason: lexical_alternative
  - marker: b
    text: Or 'Vanity of vanities, says Qoheleth; vanity of vanities! All is vanity.'
    reason: alternative_reading
  - marker: c
    text: Qoheleth is the Hebrew title/name traditionally rendered 'the Teacher' or
      'the Preacher.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲבֵל
  chosen: futility
  alternatives:
  - vanity
  - vapor
  - breath
  - meaninglessness
  lexicon: HALOT
  rationale: Hebrew הבל literally denotes breath/vapor and metaphorically what is
    fleeting, insubstantial, or frustratingly elusive. In Ecclesiastes, a strictly
    literal 'vapor' is too opaque in English, while 'meaninglessness' overstates the
    claim by importing nihilism. 'Futility' best captures the book's recurring sense
    of frustration, transience, and inability to secure lasting gain, while remaining
    readable modern English.
- source_word: הֲבֵל הֲבָלִים
  chosen: utter futility
  alternatives:
  - vanity of vanities
  - mere vapor of vapors
  - absolute futility
  lexicon: HALOT
  rationale: The construct + plural pattern is a Hebrew superlative ('X of Xs'), like
    'song of songs' or 'holy of holies.' 'Utter futility' conveys the intensification
    naturally in English without preserving an awkward literalism. The traditional
    'vanity of vanities' is possible but in modern English 'vanity' commonly suggests
    pride, which misleads.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: Although morphologically qatal, Hebrew speech formulas often function
    performatively and are idiomatically rendered with the English present in proverbial
    or literary framing. 'Says Qoheleth' fits the discourse style and keeps the statement
    vivid.
- source_word: קֹהֶלֶת
  chosen: Qoheleth
  alternatives:
  - the Teacher
  - the Preacher
  - the Assembler
  lexicon: HALOT
  rationale: Following the philosophy to transliterate names/titles when a precise
    English equivalent is uncertain, 'Qoheleth' preserves the Hebrew designation without
    prematurely resolving its nuance. 'Teacher' and 'Preacher' are interpretive and
    each narrows the semantic range differently.
- source_word: הַכֹּל
  chosen: everything
  alternatives:
  - all
  - the whole
  lexicon: HALOT
  rationale: The phrase הַכֹּל הָבֶל is idiomatically broad and comprehensive. 'Everything'
    is the most natural modern English rendering and preserves the totalizing force.
- source_word: הָבֶל
  chosen: futile
  alternatives:
  - vanity
  - vapor
  - meaningless
  lexicon: HALOT
  rationale: Using the adjective 'futile' in the predicate ('Everything is futile')
    yields idiomatic English while maintaining consistency with the noun rendering
    of הבל elsewhere in the verse. It communicates the evaluative force without overstating
    to 'meaningless.'
