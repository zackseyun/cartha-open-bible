- issue: Whether to translate קֹהֶלֶת as a title or preserve it as a transliterated designation
  chosen_reading: Qoheleth
  alternative_readings:
  - the Teacher
  - the Preacher
  rationale: The Hebrew term is semantically debated and functions as the book's distinctive speaker designation. Transliteration avoids importing a narrower interpretive claim than the text itself requires, preserving ambiguity in line with the project's principle of not over-resolving contested meanings.
