id: ECC.1.12
reference: Ecclesiastes 1:12
source:
  edition: WLC
  text: אֲנִ֣י קֹהֶ֗לֶת הָיִ֥יתִי מֶ֛לֶךְ עַל יִשְׂרָאֵ֖ל בִּ/ירוּשָׁלִָֽם־׃
translation:
  text: I[a], Qoheleth, was king over Israel in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Qoheleth may also be rendered 'the Teacher' or 'the Preacher.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי
  chosen: I
  lexicon: HALOT
  rationale: Straightforward first-person singular pronoun; retained for the emphatic self-identification that opens the clause.
- source_word: קֹהֶלֶת
  chosen: Qoheleth
  alternatives:
  - the Teacher
  - the Preacher
  - the Assembler
  lexicon: HALOT
  rationale: Rendered by transliteration rather than translation because this is a distinctive title/name-like designation in Ecclesiastes, and its exact nuance is debated. Transliteration preserves the Hebrew form without over-resolving whether it means 'assembler,' 'speaker to the assembly,' or a conventional title such as 'Teacher.'
- source_word: הָיִיתִי
  chosen: was
  alternatives:
  - have been
  lexicon: HALOT
  rationale: 'Qal perfect 1cs of היה is best rendered here as simple past in context: the speaker refers to a prior state, ''was king.'' English present perfect is possible but less natural and less clearly tied to the retrospective framing.'
- source_word: מֶלֶךְ
  chosen: king
  alternatives:
  - a king
  lexicon: HALOT
  rationale: Predicate nominative after היה. English idiom prefers the anarthrous predicate 'was king' rather than 'was a king,' especially for royal office.
- source_word: עַל
  chosen: over
  alternatives:
  - of
  - among
  lexicon: HALOT
  rationale: The preposition here marks rule or authority over Israel; 'over' best conveys governance. 'King of Israel' is idiomatic English, but 'over' more directly reflects the Hebrew preposition.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Standard transliteration of the proper name.
- source_word: בִּירוּשָׁלָם
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: HALOT
  rationale: Standard locative use of ב. 'In Jerusalem' is natural modern English and accurately reflects the setting of the kingship.
