id: ECC.1.9
reference: Ecclesiastes 1:9
source:
  edition: WLC
  text: מַה שֶּֽׁ/הָיָה֙ ה֣וּא שֶׁ/יִּהְיֶ֔ה וּ/מַה שֶׁ/נַּֽעֲשָׂ֔ה ה֖וּא שֶׁ/יֵּעָשֶׂ֑ה
    וְ/אֵ֥ין כָּל חָדָ֖שׁ תַּ֥חַת הַ/שָּֽׁמֶשׁ־־־׃
translation:
  text: What has been is what will be, and what has been done is what will be done;
    and there is nothing new under the sun.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'What was is what will be, and what was done is what will be done.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה שֶּׁהָיָה
  chosen: What has been
  alternatives:
  - What was
  - Whatever has been
  lexicon: HALOT
  rationale: The relative construction with היה points to 'that which has been/what
    has been.' Present perfect English best captures a past state with continuing
    relevance in the proverb-like observation. 'What was' is possible but slightly
    flatter and less idiomatic in this parallelism.
- source_word: הוּא שֶׁיִּהְיֶה
  chosen: is what will be
  alternatives:
  - is what is to be
  - will be the same
  lexicon: HALOT
  rationale: 'The pronoun plus relative clause creates an equative statement: ''it
    is what will be.'' Rendering with ''is what will be'' preserves the Hebrew''s
    aphoristic force and parallel structure.'
- source_word: וּמַה שֶׁנַּעֲשָׂה
  chosen: and what has been done
  alternatives:
  - and what was done
  - and whatever has been made/done
  lexicon: HALOT
  rationale: The Niphal of עשה here is best taken as passive/resultative, 'has been
    done,' matching the first colon and preserving the passive nuance rather than
    making it active.
- source_word: הוּא שֶׁיֵּעָשֶׂה
  chosen: is what will be done
  alternatives:
  - is what is to be done
  - is what will happen
  lexicon: HALOT
  rationale: The Niphal imperfect continues the passive pattern from the previous
    clause. 'Will be done' is more precise than the broader 'will happen.'
- source_word: וְאֵין כָּל חָדָשׁ
  chosen: and there is nothing new
  alternatives:
  - and there is not anything new
  - and nothing is new
  lexicon: HALOT
  rationale: 'אֵין + כָּל + adjective functions idiomatically as a negated existential:
    ''there is nothing new.'' This is natural English and preserves the universal
    force.'
- source_word: תַּחַת הַשָּׁמֶשׁ
  chosen: under the sun
  alternatives:
  - beneath the sun
  lexicon: HALOT
  rationale: This is a key Ecclesiastes idiom for the sphere of earthly human existence.
    'Under the sun' is the standard and most transparent rendering.
