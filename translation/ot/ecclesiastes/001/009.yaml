theological_decisions:
- issue: Scope of the saying in Ecclesiastes' worldview
  chosen_reading: Render the statement as a general observation about recurring patterns
    in earthly life, without importing an absolute metaphysical denial of all novelty.
  alternative_readings:
  - An absolute claim that nothing whatsoever is ever new in any sense
  rationale: The idiom 'under the sun' limits the claim to the observable realm of
    human life. The translation preserves the text's rhetorical universality while
    avoiding interpretive expansion beyond the verse itself.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
