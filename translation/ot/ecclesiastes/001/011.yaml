id: ECC.1.11
reference: Ecclesiastes 1:11
source:
  edition: WLC
  text: אֵ֥ין זִכְר֖וֹן לָ/רִאשֹׁנִ֑ים וְ/גַ֨ם לָ/אַחֲרֹנִ֜ים שֶׁ/יִּהְי֗וּ לֹֽא יִהְיֶ֤ה לָ/הֶם֙ זִכָּר֔וֹן עִ֥ם שֶׁ/יִּהְי֖וּ לָ/אַחֲרֹנָֽה־׃פ
translation:
  text: There is no remembrance of the former ones[a], and even of the later ones who will be, there will be no remembrance among those who will come afterward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'There is no memory of the former, and even the later who are yet to be will have no memory among those who come still later.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  chosen: There is no
  alternatives:
  - there is not
  lexicon: HALOT
  rationale: Existential negation introducing the clause; idiomatic English is 'There is no' rather than a more wooden 'there is not.'
- source_word: זִכְרוֹן / זִכָּרוֹן
  chosen: remembrance
  alternatives:
  - memory
  - memorial
  - lasting memory
  lexicon: HALOT
  rationale: The noun denotes remembrance or memorial recollection. 'Remembrance' best fits the repeated refrain and preserves the abstract sense better than the more psychological 'memory.'
- source_word: לָרִאשֹׁנִים
  chosen: of the former ones
  alternatives:
  - for the former ones
  - of former people
  - of earlier things
  lexicon: HALOT
  rationale: 'The preposition with the plural adjective is best taken here as marking the object of remembrance: ''of the former ones.'' ''Former ones'' preserves the Hebrew''s broad reference, which may include earlier generations or predecessors, without over-specifying ''things.'''
- source_word: וְגַם
  chosen: and even
  alternatives:
  - and also
  - also
  lexicon: HALOT
  rationale: Adds emphasis as well as coordination. 'And even' captures the rhetorical force in English.
- source_word: לָאַחֲרֹנִים
  chosen: of the later ones
  alternatives:
  - for the later ones
  - of those who come later
  - of future people
  lexicon: HALOT
  rationale: Parallel to 'former ones.' 'Later ones' preserves the comparative temporal contrast without prematurely interpreting the referent.
- source_word: שֶׁיִּהְיוּ
  chosen: who will be
  alternatives:
  - who are to come
  - who will exist
  lexicon: HALOT
  rationale: Relative clause qualifying 'the later ones.' 'Who will be' is formally close and natural enough in context.
- source_word: לֹא יִהְיֶה לָהֶם זִכָּרוֹן
  chosen: there will be no remembrance of them
  alternatives:
  - they will have no remembrance
  - no remembrance will exist for them
  lexicon: HALOT
  rationale: The Hebrew construction is existential/possessive. English expresses it most naturally as 'there will be no remembrance of them.'
- source_word: עִם
  chosen: among
  alternatives:
  - with
  lexicon: HALOT
  rationale: Here עִם is relational in the sense of association with a later group. 'Among' communicates the social frame of those by whom remembrance would or would not be held.
- source_word: שֶׁיִּהְיוּ לָאַחֲרֹנָה
  chosen: those who will come afterward
  alternatives:
  - those who will be later
  - those at the end
  - those who will be in later times
  lexicon: HALOT
  rationale: The phrase points to people still later than the 'later ones' already mentioned. 'Those who will come afterward' makes the temporal sequence clear in idiomatic English while preserving the Hebrew sense.
