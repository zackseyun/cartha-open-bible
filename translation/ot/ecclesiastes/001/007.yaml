id: ECC.1.7
reference: Ecclesiastes 1:7
source:
  edition: WLC
  text: כָּל הַ/נְּחָלִים֙ הֹלְכִ֣ים אֶל הַ/יָּ֔ם וְ/הַ/יָּ֖ם אֵינֶ֣/נּוּ מָלֵ֑א אֶל
    מְק֗וֹם שֶׁ֤/הַ/נְּחָלִים֙ הֹֽלְכִ֔ים שָׁ֛ם הֵ֥ם שָׁבִ֖ים לָ/לָֽכֶת־־־׃
translation:
  text: All the streams flow into the sea, yet the sea is not full; to the place where
    the streams flow, there they return to flow again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rivers' for 'streams.' The Hebrew נְחָלִים can refer to streams, wadis,
      or riverbeds depending on context.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'to the place where the streams go, there they return to go.'
      The wording may evoke the recurring cycle of waters without explicitly describing
      its mechanism.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְחָלִים
  chosen: streams
  alternatives:
  - rivers
  - wadis
  lexicon: HALOT
  rationale: נחל can denote a wadi, torrent-bed, or stream. In this poetic context
    describing continual water movement, 'streams' is broad, natural English and avoids
    over-specifying large permanent rivers while still fitting the imagery.
- source_word: הֹלְכִים
  chosen: flow
  alternatives:
  - go
  - are going
  lexicon: HALOT
  rationale: הלך literally means 'go/walk,' but with watercourses English idiom prefers
    'flow.' This is an optimal-equivalence rendering that preserves the sense without
    wooden phrasing.
- source_word: יָם
  chosen: sea
  alternatives:
  - ocean
  lexicon: HALOT
  rationale: The standard sense is 'sea.' 'Ocean' would be too specific and less faithful
    to the Hebrew term.
- source_word: אֵינֶנּוּ מָלֵא
  chosen: is not full
  alternatives:
  - is never filled
  - does not become full
  lexicon: HALOT
  rationale: The clause states the sea's condition rather than explicitly adding 'never.'
    'Is not full' is the most direct rendering; the ongoing sense is already conveyed
    by the verse's cyclical imagery.
- source_word: מְקוֹם
  chosen: place
  alternatives:
  - source
  - location
  lexicon: HALOT
  rationale: The Hebrew says 'place,' not explicitly 'source.' Although interpreters
    often understand the hydrological cycle, the translation should not import that
    explanatory idea into the main text.
- source_word: שָׁם
  chosen: there
  alternatives:
  - to there
  lexicon: HALOT
  rationale: 'The adverb is retained for emphasis: ''there they return.'' This preserves
    the Hebrew''s resumptive style and sense of cyclical motion.'
- source_word: שָׁבִים
  chosen: return
  alternatives:
  - turn back
  - go back
  lexicon: HALOT
  rationale: שוב commonly means 'return.' It fits the verse's theme of repetition
    and recurrence.
- source_word: לָלָכֶת
  chosen: to flow again
  alternatives:
  - to go
  - to keep flowing
  lexicon: HALOT
  rationale: The infinitive is literally 'to go,' but because the subject is streams,
    English requires 'to flow.' Adding 'again' makes explicit the iterative force
    implied by the return-plus-infinitive construction without over-paraphrasing.
