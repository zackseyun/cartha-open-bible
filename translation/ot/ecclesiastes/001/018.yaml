id: ECC.1.18
reference: Ecclesiastes 1:18
source:
  edition: WLC
  text: כִּ֛י בְּ/רֹ֥ב חָכְמָ֖ה רָב כָּ֑עַס וְ/יוֹסִ֥יף דַּ֖עַת יוֹסִ֥יף מַכְאֽוֹב־׃
translation:
  text: For with much wisdom comes much vexation, and he who increases knowledge increases
    pain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For in much wisdom is much grief'; the Hebrew noun כָּעַס can denote
      grief, vexation, or irritation.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and the one who adds knowledge adds pain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the explanatory ground for the preceding statement. 'For'
    preserves the connective, explanatory force in natural English.
- source_word: בְּרֹב
  chosen: with much
  alternatives:
  - in much
  - through much
  - in abundance of
  lexicon: HALOT
  rationale: 'The preposition ב plus רֹב expresses accompaniment/circumstance: ''with
    much'' or ''in much abundance.'' ''With much'' is idiomatic and preserves the
    sense that a greater measure of wisdom is accompanied by the stated result.'
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for חָכְמָה in Qoheleth; no contextual reason to vary.
- source_word: רָב
  chosen: much
  alternatives:
  - great
  - abundant
  lexicon: HALOT
  rationale: Predicate adjective intensifying the following noun כָּעַס. 'Much' matches
    the parallel structure with 'much wisdom' and keeps the aphoristic balance.
- source_word: כָּעַס
  chosen: vexation
  alternatives:
  - grief
  - sorrow
  - frustration
  - anger
  lexicon: HALOT
  rationale: In Ecclesiastes this noun can denote emotional irritation, grief, or
    vexation rather than simple anger. 'Vexation' best fits the reflective, existential
    tone of Qoheleth and avoids implying merely outward anger. The semantic overlap
    with grief/pain is preserved by the second colon.
- source_word: וְיוֹסִיף דַּעַת
  chosen: and he who increases knowledge
  alternatives:
  - and whoever adds knowledge
  - and increasing knowledge
  lexicon: HALOT
  rationale: The Hiphil of יסף with דַּעַת means to add to or increase knowledge.
    Rendering it as a relative clause ('he who increases knowledge') produces clear
    English while preserving the proverbial force.
- source_word: דַּעַת
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT
  rationale: Standard gloss; distinct from חָכְמָה though closely related. 'Knowledge'
    preserves the lexical distinction in the parallelism.
- source_word: יוֹסִיף מַכְאוֹב
  chosen: increases pain
  alternatives:
  - adds pain
  - increases sorrow
  lexicon: HALOT
  rationale: 'The repeated verb יסף creates a deliberate parallel: increasing knowledge
    results in increasing pain. ''Pain'' is a natural rendering of מַכְאוֹב and keeps
    the line concise and forceful.'
- source_word: מַכְאוֹב
  chosen: pain
  alternatives:
  - sorrow
  - hurt
  - grief
  lexicon: HALOT
  rationale: מַכְאוֹב often denotes pain, whether physical or emotional. Here 'pain'
    is broad enough to include existential distress and pairs well with 'vexation'
    without collapsing the two terms into one.
