id: ECC.1.17
reference: Ecclesiastes 1:17
source:
  edition: WLC
  text: וָ/אֶתְּנָ֤/ה לִבִּ/י֙ לָ/דַ֣עַת חָכְמָ֔ה וְ/דַ֥עַת הוֹלֵל֖וֹת וְ/שִׂכְל֑וּת
    יָדַ֕עְתִּי שֶׁ/גַּם זֶ֥ה ה֖וּא רַעְי֥וֹן רֽוּחַ־׃
translation:
  text: And I set my heart to know wisdom, and to know madness and folly; I came to
    know that this too is a chasing after wind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'striving after wind'; traditionally, 'vexation of spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתְּנָה לִבִּי
  chosen: I set my heart
  alternatives:
  - I applied my mind
  - I gave my heart
  lexicon: HALOT
  rationale: Hebrew idiom for directing one's inner self, attention, or resolve toward
    a task. 'Set my heart' preserves the Hebrew imagery while remaining natural English.
- source_word: לָדַעַת
  chosen: to know
  alternatives:
  - to understand
  - to learn
  lexicon: HALOT
  rationale: ידע commonly denotes knowing by experience or investigation. 'To know'
    is the most direct rendering and fits the repeated verbal pattern in the verse.
- source_word: חָכְמָה
  chosen: wisdom
  alternatives:
  - skill
  - wise insight
  lexicon: HALOT
  rationale: Standard rendering in Ecclesiastes for the intellectual and practical
    wisdom the speaker investigates.
- source_word: וְדַעַת
  chosen: and to know
  alternatives:
  - and knowledge of
  lexicon: HALOT
  rationale: 'Though formally an infinitive/construct-like repetition from ידע, in
    context it coordinates with the prior infinitive: the speaker set his heart both
    ''to know wisdom'' and ''to know madness and folly.'' Rendering it verbally preserves
    the parallelism and readability.'
- source_word: הוֹלֵלוֹת
  chosen: madness
  alternatives:
  - mad behavior
  - folly
  lexicon: HALOT
  rationale: This noun denotes irrationality or madness rather than simple foolishness.
    'Madness' distinguishes it from the following שִׂכְלוּת.
- source_word: שִׂכְלוּת
  chosen: folly
  alternatives:
  - foolishness
  - stupidity
  lexicon: HALOT
  rationale: A standard wisdom-term opposite wisdom. 'Folly' is concise, idiomatic,
    and preserves the wisdom-literature register.
- source_word: יָדַעְתִּי
  chosen: I came to know
  alternatives:
  - I knew
  - I learned
  lexicon: HALOT
  rationale: The perfect here reports the result of the investigation. 'I came to
    know' brings out the experiential discovery implied by the context.
- source_word: שֶׁגַּם זֶה הוּא
  chosen: that this too is
  alternatives:
  - that even this is
  - for this also is
  lexicon: HALOT
  rationale: Captures the conclusion formula and the additive force of גַּם in a natural
    English way.
- source_word: רַעְיוֹן רוּחַ
  chosen: a chasing after wind
  alternatives:
  - striving after wind
  - shepherding the wind
  - vexation of spirit
  lexicon: HALOT
  rationale: In Ecclesiastes this phrase conveys futile pursuit. 'Chasing after wind'
    is clear modern English and reflects the metaphor better than the traditional
    but less transparent 'vexation of spirit.' The alternative 'striving after wind'
    is worth preserving because of translation tradition.
