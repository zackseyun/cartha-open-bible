id: ECC.1.8
reference: Ecclesiastes 1:8
source:
  edition: WLC
  text: כָּל הַ/דְּבָרִ֣ים יְגֵעִ֔ים לֹא יוּכַ֥ל אִ֖ישׁ לְ/דַבֵּ֑ר לֹא תִשְׂבַּ֥ע
    עַ֨יִן֙ לִ/רְא֔וֹת וְ/לֹא תִמָּלֵ֥א אֹ֖זֶן מִ/שְּׁמֹֽעַ־־־־׃
translation:
  text: All things are wearisome; a man cannot speak of them. The eye is not satisfied
    with seeing, nor is the ear filled with hearing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'All words are wearisome'; Hebrew דְּבָרִים can mean 'words,' 'matters,'
      or 'things.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a man cannot speak'; the Hebrew may mean that no person can fully express
      the matter, or that the subject is too wearisome to describe.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הַדְּבָרִים
  chosen: All things
  alternatives:
  - All words
  - Everything
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words/matters/things.' In this context of universal
    cycles and human inability to exhaust them, 'things' best captures the broad referent.
    'Everything' is possible, but 'all things' preserves the Hebrew structure more
    closely.
- source_word: יְגֵעִים
  chosen: are wearisome
  alternatives:
  - are wearying
  - are full of weariness
  lexicon: HALOT
  rationale: The adjective from יגע conveys weariness or toil-producing exhaustion.
    'Are wearisome' communicates that the matters described induce weariness, fitting
    the verse's reflection on the exhausting character of experience and speech.
- source_word: לֹא יוּכַל אִישׁ לְדַבֵּר
  chosen: a man cannot speak of it
  alternatives:
  - no one can speak
  - a man cannot speak
  lexicon: HALOT
  rationale: אִישׁ is singular 'man,' and per gender-accurate policy it is retained
    rather than neutralized to 'one' or 'people.' The infinitive לְדַבֵּר here likely
    means speaking adequately about the subject just mentioned; 'of it' is supplied
    in English to make the clause intelligible, referring back to the totality of
    'all things.'
- source_word: עַיִן
  chosen: The eye
  alternatives:
  - an eye
  lexicon: HALOT
  rationale: The singular is generic, expressing a general truth about human perception.
    English idiom favors 'the eye' for this representative singular.
- source_word: לֹא תִשְׂבַּע ... לִרְאוֹת
  chosen: is not satisfied with seeing
  alternatives:
  - does not have enough of seeing
  - is not sated from seeing
  lexicon: HALOT
  rationale: שׂבע means to be satisfied or sated. 'Satisfied with seeing' is idiomatic
    modern English and preserves the sense of insatiable visual experience.
- source_word: אֹזֶן
  chosen: the ear
  alternatives:
  - an ear
  lexicon: HALOT
  rationale: Like 'the eye,' the singular is generic and best rendered with the English
    representative singular.
- source_word: וְלֹא תִמָּלֵא ... מִשְּׁמֹעַ
  chosen: nor is the ear filled with hearing
  alternatives:
  - nor is the ear satisfied with hearing
  - nor does the ear become full from hearing
  lexicon: HALOT
  rationale: The Niphal of מלא means 'be filled.' Retaining 'filled' preserves the
    lexical contrast with 'satisfied' in the previous clause while still sounding
    natural in English. 'With hearing' reflects the preposition מן plus infinitive
    in an idiomatic way.
