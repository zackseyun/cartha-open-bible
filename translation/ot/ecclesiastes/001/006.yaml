id: ECC.1.6
reference: Ecclesiastes 1:6
source:
  edition: WLC
  text: הוֹלֵךְ֙ אֶל דָּר֔וֹם וְ/סוֹבֵ֖ב אֶל צָפ֑וֹן סוֹבֵ֤ב סֹבֵב֙ הוֹלֵ֣ךְ הָ/ר֔וּחַ וְ/עַל סְבִיבֹתָ֖י/ו שָׁ֥ב הָ/רֽוּחַ־־׀־׃
translation:
  text: Going toward the south and turning toward the north[a], turning and turning goes the wind[b]; and on its circuits the wind returns.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew רוּחַ can also mean 'spirit' or 'breath'; here the context of natural cycles favors 'wind.'
    reason: lexical_alternative
  - marker: b
    text: Or 'its rounds' for 'its circuits.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹלֵךְ
  chosen: going / goes
  alternatives:
  - blowing
  - travels
  lexicon: HALOT
  rationale: Qal participle of הלך literally denotes going/walking. Here it describes ongoing motion. Rendered first as 'Going' to preserve the participial, scene-setting force, and later as 'goes' for natural English while retaining the sense of continual movement.
- source_word: דָּרוֹם
  chosen: south
  alternatives:
  - south wind
  - southern region
  lexicon: HALOT
  rationale: The noun denotes the south/southern direction. Since the preposition אֶל marks direction, 'toward the south' is the plain sense; 'south wind' would import a word not present.
- source_word: וְסוֹבֵב / סוֹבֵב סֹבֵב
  chosen: and turning / turning, turning
  alternatives:
  - and circling / circling, circling
  - and whirling / whirling, whirling
  lexicon: HALOT
  rationale: From סבב, 'to turn, go around, circle.' The repeated participles create a rhythmic sense of continual revolving motion. 'Turning, turning' preserves the repetition without overinterpreting the exact meteorological image.
- source_word: צָפוֹן
  chosen: north
  alternatives:
  - northern region
  lexicon: HALOT
  rationale: Directional noun meaning 'north.' With אֶל, 'toward the north' is the straightforward rendering.
- source_word: הָרוּחַ
  chosen: the wind
  alternatives:
  - the spirit
  - the breath
  lexicon: HALOT
  rationale: רוּחַ can mean wind, spirit, or breath. In the immediate context of natural cycles in Ecclesiastes 1:5–7, the meteorological sense 'wind' best fits. This avoids importing theological meaning not signaled by the context.
- source_word: וְעַל
  chosen: and on
  alternatives:
  - and over
  - and along
  lexicon: HALOT
  rationale: The preposition על commonly means 'on, upon, over.' With 'its circuits,' 'on' gives a natural sense of movement along its rounds while staying close to the Hebrew.
- source_word: סְבִיבֹתָיו
  chosen: its circuits
  alternatives:
  - its rounds
  - its circuits around
  - its turnings
  lexicon: HALOT
  rationale: Plural noun from the same semantic field as סבב, referring to surrounding courses or circuits. 'Circuits' preserves the repetitive, cyclical imagery and echoes the repeated turning language.
- source_word: שָׁב
  chosen: returns
  alternatives:
  - comes back
  - turns back
  lexicon: HALOT
  rationale: Qal participle/finite verbal form from שוב, 'to return, turn back.' 'Returns' is concise and fits the cyclical theme of the verse.
