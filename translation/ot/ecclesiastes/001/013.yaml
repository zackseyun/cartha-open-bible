theological_decisions:
- issue: Whether רָע should be rendered in a morally charged way regarding God's gift
  chosen_reading: Rendered as 'grievous' rather than 'evil'
  alternative_readings:
  - evil task
  - bad business
  rationale: The verse says God gave this עִנְיַן to humanity, but the context in
    Ecclesiastes concerns the burdensome and frustrating character of human striving,
    not moral evil originating in God. Rendering רָע as 'grievous' preserves the negative
    evaluation without importing a theological claim the text does not require.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve the source''s plain sense.'
- issue: How to render לִבְנֵי הָאָדָם
  chosen_reading: '''the sons of man'' in the main text with inclusive alternative
    footnoted'
  alternative_readings:
  - humankind
  - human beings
  rationale: The source is grammatically masculine with generic force. Per doctrine,
    gender-accurate renderings are preferred over flattening to gender-neutral language,
    while inclusivity can be noted in a footnote where relevant.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral;
    אָדָם default ''man / humankind (context)''.'
