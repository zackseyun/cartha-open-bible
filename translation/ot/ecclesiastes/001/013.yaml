id: ECC.1.13
reference: Ecclesiastes 1:13
source:
  edition: WLC
  text: וְ/נָתַ֣תִּי אֶת לִבִּ֗/י לִ/דְר֤וֹשׁ וְ/לָ/תוּר֙ בַּֽ/חָכְמָ֔ה עַ֛ל כָּל
    אֲשֶׁ֥ר נַעֲשָׂ֖ה תַּ֣חַת הַ/שָּׁמָ֑יִם ה֣וּא עִנְיַ֣ן רָ֗ע נָתַ֧ן אֱלֹהִ֛ים לִ/בְנֵ֥י
    הָ/אָדָ֖ם לַ/עֲנ֥וֹת בּֽ/וֹ־־׀׃
translation:
  text: And I set my heart to seek and to explore by wisdom all that is done under
    heaven. It is an unhappy task God has given to the sons of man to be occupied
    with.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to humankind' / 'to human beings.' The Hebrew reads 'to the sons of
      man,' a masculine expression used generically for humanity.
    reason: lexical_alternative
  - marker: b
    text: Or 'to be afflicted by it' or 'to toil in it.' The Hebrew can carry both
      the sense of being occupied with something and of being burdened by it.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי אֶת לִבִּי
  chosen: And I set my heart
  alternatives:
  - And I gave my heart
  - And I applied my mind
  lexicon: HALOT
  rationale: The idiom literally reads 'I gave my heart,' but in English 'set my heart'
    preserves the deliberate inward resolve without sounding unnatural. 'Heart' is
    retained rather than 'mind' because Hebrew לֵב/לֵבָב includes intellect and will,
    and the idiom is important in Qoheleth.
- source_word: לִדְרוֹשׁ וְלָתוּר
  chosen: to seek and to explore
  alternatives:
  - to inquire and to search out
  - to investigate and to examine
  lexicon: HALOT
  rationale: 'The paired infinitives are near-synonyms but not redundant: דרש conveys
    seeking/inquiring, while תור suggests exploring or searching out. ''Seek and explore''
    preserves the twofold investigative emphasis in readable English.'
- source_word: בַּחָכְמָה
  chosen: by wisdom
  alternatives:
  - with wisdom
  - wisely
  lexicon: HALOT
  rationale: The prefixed ב marks means or manner. 'By wisdom' best conveys that wisdom
    is the instrument or mode of investigation, while remaining natural.
- source_word: עַל כָּל אֲשֶׁר נַעֲשָׂה
  chosen: all that is done
  alternatives:
  - all that has been done
  - everything that is done
  lexicon: HALOT
  rationale: This phrase identifies the scope of inquiry. 'All that is done' is a
    straightforward rendering of the passive and fits the gnomic, generalizing tone
    of Ecclesiastes.
- source_word: תַּחַת הַשָּׁמָיִם
  chosen: under heaven
  alternatives:
  - under the heavens
  - under the sky
  lexicon: HALOT
  rationale: A standard Ecclesiastes expression for the human sphere. 'Under heaven'
    is idiomatic in English and preserves the book's repeated phrasing better than
    'under the sky.'
- source_word: עִנְיַן
  chosen: task
  alternatives:
  - business
  - occupation
  - matter
  lexicon: HALOT
  rationale: In Ecclesiastes this noun often denotes an occupation or business that
    occupies human beings. 'Task' is concise and natural here, especially with the
    following infinitive about being occupied.
- source_word: רָע
  chosen: grievous
  alternatives:
  - evil
  - bad
  - unhappy
  lexicon: HALOT
  rationale: Here the adjective describes the burdensome, painful character of the
    human task rather than moral evil. 'Grievous' captures the oppressive quality
    without implying that God's gift is morally evil.
- source_word: לִבְנֵי הָאָדָם
  chosen: to the sons of man
  alternatives:
  - to humankind
  - to the children of man
  - to human beings
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine/generic. Following the project's gender-accurate
    policy, 'sons of man' preserves the source form and the representative sense.
    A more inclusive alternative is worth preserving in a footnote.
- source_word: לַעֲנוֹת בּוֹ
  chosen: to be occupied with
  alternatives:
  - to be afflicted by
  - to toil in
  - to be busied with
  lexicon: HALOT
  rationale: ענה in this stem can carry the sense of being occupied, busied, or afflicted.
    In this context, with עִנְיַן ('task/occupation'), the sense is that humanity
    is made to engage in or be burdened with this task. 'To be occupied with' captures
    the activity while allowing the burdened nuance to remain from 'grievous task.'
