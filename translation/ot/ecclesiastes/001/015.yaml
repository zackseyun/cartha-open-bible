id: ECC.1.15
reference: Ecclesiastes 1:15
source:
  edition: WLC
  text: מְעֻוָּ֖ת לֹא יוּכַ֣ל לִ/תְקֹ֑ן וְ/חֶסְר֖וֹן לֹא יוּכַ֥ל לְ/הִמָּנֽוֹת־־׃
translation:
  text: What is crooked cannot be made straight[b][a], and what is lacking cannot be counted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'What is twisted cannot be straightened.'
    reason: lexical_alternative
  - marker: b
    text: Or 'what is missing cannot be numbered.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְעֻוָּת
  chosen: what is crooked
  alternatives:
  - the crooked thing
  - what is twisted
  lexicon: HALOT
  rationale: Passive participial form from עוה, denoting something bent, twisted, or distorted. 'What is crooked' is idiomatic in English and preserves the abstract/proverbial force better than a more concrete 'the crooked thing.'
- source_word: לֹא יוּכַל
  chosen: cannot be
  alternatives:
  - is not able to be
  - cannot
  lexicon: HALOT
  rationale: The construction expresses inability. In English, 'cannot be' naturally carries the passive sense when followed by an infinitive such as 'made straight' or 'counted.'
- source_word: לִתְקֹן
  chosen: made straight
  alternatives:
  - straightened
  - set right
  lexicon: HALOT
  rationale: תקן here means to make straight or put in order. 'Made straight' preserves the imagery established by 'crooked.' 'Set right' is interpretive and slightly broader than the immediate metaphor.
- source_word: וְחֶסְרוֹן
  chosen: what is lacking
  alternatives:
  - what is missing
  - deficiency
  - lack
  lexicon: HALOT
  rationale: The noun denotes deficiency or lack. Rendering it as 'what is lacking' matches the parallel abstract expression 'what is crooked' and reads naturally in English.
- source_word: לְהִמָּנוֹת
  chosen: be counted
  alternatives:
  - be numbered
  - be reckoned
  lexicon: HALOT
  rationale: מנה in the nifal infinitive means to be counted or numbered. 'Be counted' is the most natural modern English rendering; 'be numbered' is a close alternative worth preserving because of traditional phrasing.
