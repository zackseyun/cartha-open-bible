id: ECC.1.4
reference: Ecclesiastes 1:4
source:
  edition: WLC
  text: דּ֤וֹר הֹלֵךְ֙ וְ/ד֣וֹר בָּ֔א וְ/הָ/אָ֖רֶץ לְ/עוֹלָ֥ם עֹמָֽדֶת׃
translation:
  text: A generation goes, and a generation comes, but the earth stands forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'remains forever.' The Hebrew verb is literally 'stands,' a concrete
      image for enduring stability.
    reason: lexical_alternative
  - marker: b
    text: '''Forever'' renders a Hebrew idiom for enduring continuance; in context
      it highlights the contrast between passing generations and the earth''s relative
      permanence.'
    reason: cultural_note
lexical_decisions:
- source_word: דּוֹר
  chosen: generation
  alternatives:
  - age
  - generation of people
  lexicon: HALOT
  rationale: דּוֹר commonly denotes a generation in the sense of a cohort of people
    living at one time. 'Generation' best preserves the parallelism of one generation
    departing and another arriving.
- source_word: הֹלֵךְ
  chosen: goes
  alternatives:
  - passes away
  - departs
  lexicon: HALOT
  rationale: The participle of הלך here expresses ongoing, gnomic action. 'Goes' is
    a simple, direct rendering that matches the Hebrew verbal image without adding
    interpretive weight such as 'passes away.'
- source_word: בָּא
  chosen: comes
  alternatives:
  - arrives
  lexicon: HALOT
  rationale: The participle of בוא balances הֹלֵךְ in a concise antithesis. 'Comes'
    is the most natural English equivalent and preserves the rhythm of the Hebrew.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this cosmic reflection on transience and permanence, אֶרֶץ refers
    to the earth/world rather than a particular land. 'The earth' fits the universal
    scope of Ecclesiastes 1:4.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ages
  - perpetually
  - for an age
  lexicon: HALOT
  rationale: לְעוֹלָם here expresses enduring continuance in contrast to passing generations.
    'Forever' is idiomatic and captures the rhetorical force, while not requiring
    a more technical gloss in the main text.
- source_word: עֹמָדֶת
  chosen: stands
  alternatives:
  - remains
  - endures
  lexicon: HALOT
  rationale: The verb עמד literally means 'stand' or 'remain standing.' 'Stands' preserves
    the concrete metaphor and pairs well with 'forever,' while 'remains' is a viable
    interpretive alternative.
