theological_decisions:
- issue: Whether לְעוֹלָם should be rendered in an absolute metaphysical sense or
    as a rhetorical expression of enduring permanence
  chosen_reading: Rendered as 'forever' in the main text as the natural English equivalent
    of the Hebrew idiom in this wisdom context.
  alternative_readings:
  - for ages
  - endures age after age
  rationale: The verse contrasts transient human generations with the enduring stability
    of the earth. In Ecclesiastes, this is observational wisdom language rather than
    a systematic doctrinal statement about cosmology. 'Forever' best reflects normal
    usage while allowing the literary contrast to stand without over-qualifying it.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it'
