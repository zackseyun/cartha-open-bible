id: EXO.7.25
reference: Exodus 7:25
source:
  edition: WLC
  text: וַ/יִּמָּלֵ֖א שִׁבְעַ֣ת יָמִ֑ים אַחֲרֵ֥י הַכּוֹת יְהוָ֖ה אֶת הַ/יְאֹֽר־־׃פ
translation:
  text: And seven days were fulfilled after Yahweh struck the Nile[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And seven days passed after the LORD struck the Nile.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Nile,' sometimes rendered more generally as 'the river.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמָּלֵא
  chosen: were completed
  alternatives:
  - passed
  - were fulfilled
  - elapsed
  lexicon: HALOT
  rationale: The Niphal wayyiqtol of מלא here denotes the completion/fullness of a time period. 'Were completed' preserves the passive/resultative sense more closely than the idiomatic 'passed,' while remaining natural English.
- source_word: שִׁבְעַת יָמִים
  chosen: seven days
  lexicon: HALOT
  rationale: Straightforward cardinal-number-plus-noun construction referring to a seven-day period.
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: Standard temporal preposition indicating subsequent time.
- source_word: הַכּוֹת
  chosen: struck
  alternatives:
  - smote
  - striking
  lexicon: HALOT
  rationale: 'Infinitive construct of נכה after אַחֲרֵי gives the sense ''after striking.'' In English, a finite verb after ''after'' is smoother: ''after the LORD struck.'' ''Struck'' is clear modern English and fits plague-judgment context without archaic tone.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַיְאֹר
  chosen: the Nile
  alternatives:
  - the river
  lexicon: HALOT
  rationale: In Exodus, יְאֹר commonly refers specifically to the Nile rather than a generic river. Rendering it as 'the Nile' communicates the referent directly in English and reflects contextual specificity.
