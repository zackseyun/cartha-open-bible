id: EXO.10.28
reference: Exodus 10:28
source:
  edition: WLC
  text: וַ/יֹּֽאמֶר ל֥/וֹ פַרְעֹ֖ה לֵ֣ךְ מֵ/עָלָ֑/י הִשָּׁ֣מֶר לְ/ךָ֗ אֶל תֹּ֨סֶף֙
    רְא֣וֹת פָּנַ֔/י כִּ֗י בְּ/י֛וֹם רְאֹתְ/ךָ֥ פָנַ֖/י תָּמֽוּת־־׃
translation:
  text: Then Pharaoh said to him, “Go away from me. Watch yourself; do not see my
    face again, for on the day you see my face, you will die.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, “do not see my face again” or “never see my face
      again.” The Hebrew is literally “do not add to seeing my face.”
    reason: lexical_alternative
  - marker: b
    text: “My face” may also be understood as “my presence,” but the Hebrew repeats
      “face” for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵךְ מֵעָלַי
  chosen: Go away from me
  alternatives:
  - Get away from me
  - Leave my presence
  lexicon: HALOT
  rationale: Combines the imperative 'go' with the prepositional phrase 'from upon
    me' into natural English expressing dismissal. 'Go away from me' preserves the
    force without becoming overly idiomatic.
- source_word: הִשָּׁמֶר לְךָ
  chosen: Watch yourself
  alternatives:
  - Take care
  - Beware
  lexicon: HALOT
  rationale: Niphal imperative of שמר with ethical dative conveys a warning directed
    to Moses himself. 'Watch yourself' is idiomatic modern English and preserves the
    threatening tone. 'Beware' is possible but slightly less direct.
- source_word: אַל תֹּסֶף רְאוֹת פָּנַי
  chosen: do not add to seeing my face
  alternatives:
  - do not see my face again
  - never see my face again
  lexicon: HALOT
  rationale: The Hebrew literally uses יסף + infinitive, 'do not continue/add to see.'
    The chosen rendering stays close to the source and exposes the idiom for auditability.
    More idiomatic English alternatives are possible, but this wording preserves the
    lexical structure.
- source_word: פָּנַי
  chosen: my face
  alternatives:
  - my presence
  lexicon: HALOT
  rationale: Hebrew 'face' often functions metonymically for presence, but here the
    repetition is rhetorically important. Retaining 'face' preserves the Hebrew imagery
    and the parallelism within the verse.
- source_word: בְּיוֹם
  chosen: on the day
  alternatives:
  - when
  lexicon: HALOT
  rationale: A formally closer rendering than simply 'when.' It preserves the temporal
    expression and the solemnity of Pharaoh's threat.
- source_word: רְאֹתְךָ פָנַי
  chosen: you see my face
  alternatives:
  - your seeing my face
  lexicon: HALOT
  rationale: The infinitive construct with suffix is rendered as a finite clause for
    natural English while preserving the temporal sense introduced by 'on the day.'
- source_word: תָּמוּת
  chosen: you will die
  alternatives:
  - you shall die
  lexicon: HALOT
  rationale: Future-like threat in direct speech. 'You will die' is clear modern English;
    'you shall die' is more traditional but more archaic in tone.
- source_word: וַיֹּאמֶר לוֹ פַרְעֹה
  chosen: Then Pharaoh said to him
  alternatives:
  - And Pharaoh said to him
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives readable English
    narrative flow while preserving sequence.
