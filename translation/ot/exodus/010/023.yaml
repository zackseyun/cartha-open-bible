id: EXO.10.23
reference: Exodus 10:23
source:
  edition: WLC
  text: לֹֽא רָא֞וּ אִ֣ישׁ אֶת אָחִ֗י/ו וְ/לֹא קָ֛מוּ אִ֥ישׁ מִ/תַּחְתָּ֖י/ו שְׁלֹ֣שֶׁת יָמִ֑ים וּֽ/לְ/כָל בְּנֵ֧י יִשְׂרָאֵ֛ל הָ֥יָה א֖וֹר בְּ/מוֹשְׁבֹתָֽ/ם־־־־׃
translation:
  text: They did not see one another[a], and no one rose from his place for three days[b]; but all the sons of Israel had light in their dwellings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew literally, ''a man did not see his brother.'' The expression is reciprocal: ''they did not see one another.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'all the Israelites had light in their dwellings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאוּ ... אֶת אָחִיו
  chosen: did not see one another
  alternatives:
  - did not see his brother
  - could not see one another
  lexicon: HALOT
  rationale: The idiom אִישׁ אֶת־אָחִיו is a reciprocal expression meaning people did not see each other. 'One another' conveys the sense naturally in English. 'His brother' is more formally literal but in context refers broadly to another person, not specifically a male sibling. 'Could not see' is interpretive; the Hebrew states the result simply as 'did not see.'
- source_word: אִישׁ
  chosen: one / no one
  alternatives:
  - man
  lexicon: HALOT
  rationale: Although grammatically masculine singular, here אִישׁ functions distributively and generically. English 'one' and 'no one' preserve the representative force without implying only males were affected. This follows the gender-accurate principle by matching intent rather than form alone.
- source_word: קָמוּ
  chosen: rose
  alternatives:
  - got up
  - stood up
  lexicon: HALOT
  rationale: קום commonly means 'arise, rise.' 'Rose' is concise and fits the narrative register. 'Got up' is more colloquial; 'stood up' is too specific.
- source_word: מִתַּחְתָּיו
  chosen: from his place
  alternatives:
  - from under him
  - from where he was
  lexicon: HALOT
  rationale: The idiom 'from under him' refers to moving from one's spot or place. 'From his place' gives the idiomatic sense in clear English without wooden literalism.
- source_word: שְׁלֹשֶׁת יָמִים
  chosen: for three days
  alternatives:
  - three days
  lexicon: HALOT
  rationale: English normally expresses duration here with 'for three days.' The bare phrase 'three days' is possible but less natural.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' Because this is a covenant-ethnic designation rather than a statement about age, 'the Israelites' is a viable dynamic alternative; however, 'the sons of Israel' preserves the source form and familial-covenantal texture while remaining understandable.
- source_word: הָיָה אוֹר
  chosen: had light
  alternatives:
  - there was light
  - light was
  lexicon: HALOT
  rationale: The clause expresses possession/availability of light for Israel in contrast to Egyptian darkness. 'Had light' is idiomatic English and captures the contrast well.
- source_word: בְּמֹשְׁבֹתָם
  chosen: in their dwellings
  alternatives:
  - in their settlements
  - where they lived
  lexicon: HALOT
  rationale: מוֹשָׁב can denote dwelling place or settlement. In this plague context, 'in their dwellings' best fits the immediate domestic contrast with the Egyptians' darkness.
