id: EXO.10.29
reference: Exodus 10:29
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר מֹשֶׁ֖ה כֵּ֣ן דִּבַּ֑רְתָּ לֹא אֹסִ֥ף ע֖וֹד רְא֥וֹת פָּנֶֽי/ךָ־׃פ
translation:
  text: And Moses said[a], “As you have spoken[b], I will not again see your face.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'I will not add again to see your face,' an idiom meaning 'I will never again see your face.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'As you say' / 'So be it as you have said.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Standard waw-consecutive narrative preterite introducing Moses' reply. 'And' preserves Hebrew narrative flow without overinterpreting sequence.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name מֹשֶׁה.
- source_word: כֵּן
  chosen: As
  alternatives:
  - So
  - 'Yes'
  - Rightly
  lexicon: HALOT
  rationale: 'In the idiom כֵּן דִּבַּרְתָּ, the sense is assent to Pharaoh''s statement: ''so/as you have spoken.'' ''As'' yields natural English when followed by the finite verb phrase.'
- source_word: דִּבַּרְתָּ
  chosen: you have spoken
  alternatives:
  - you said
  - you spoke
  lexicon: HALOT
  rationale: Second masculine singular perfect of דבר. 'You have spoken' preserves the completed verbal force and echoes the formal tone of Moses' response.
- source_word: לֹא אֹסִף עוֹד
  chosen: I will never again
  alternatives:
  - I will not continue any longer
  - I will no longer ever
  lexicon: HALOT
  rationale: The Hiphil of יסף with negation plus עוֹד forms an idiom meaning 'not add/continue again,' naturally rendered 'I will never again.' This communicates the future resolve implied by the construction.
- source_word: רְאוֹת
  chosen: see
  alternatives:
  - look upon
  lexicon: HALOT
  rationale: Infinitive construct of ראה after יסף idiomatically expresses the action that will not recur. 'See' is the plain and natural equivalent.
- source_word: פָּנֶיךָ
  chosen: your face
  alternatives:
  - your presence
  lexicon: HALOT
  rationale: Literally 'your face.' While 'presence' is a contextual possibility in some passages, here the confrontation scene supports the concrete idiom 'see your face,' which also preserves the Hebrew expression.
