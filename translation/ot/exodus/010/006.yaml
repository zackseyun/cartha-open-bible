id: EXO.10.6
reference: Exodus 10:6
source:
  edition: WLC
  text: וּ/מָלְא֨וּ בָתֶּ֜י/ךָ וּ/בָתֵּ֣י כָל עֲבָדֶי/ךָ֮ וּ/בָתֵּ֣י כָל מִצְרַיִם֒ אֲשֶׁ֨ר לֹֽא רָא֤וּ אֲבֹתֶ֨י/ךָ֙ וַ/אֲב֣וֹת אֲבֹתֶ֔י/ךָ מִ/יּ֗וֹם הֱיוֹתָ/ם֙ עַל הָ֣/אֲדָמָ֔ה עַ֖ד הַ/יּ֣וֹם הַ/זֶּ֑ה וַ/יִּ֥פֶן וַ/יֵּצֵ֖א מֵ/עִ֥ם פַּרְעֹֽה־־־־׃
translation:
  text: And they will fill your houses[a], the houses of all your servants[b], and the houses of all Egypt—something your fathers and your fathers’ fathers have not seen from the day they were on the land until this day.” Then he turned and went out from Pharaoh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “which your fathers and your fathers’ fathers have not seen.” The clause refers to the unprecedented plague just described.
    reason: lexical_alternative
  - marker: b
    text: “The land” may also be rendered “the earth” or “the ground.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָלְאוּ
  chosen: And they will fill
  alternatives:
  - and they shall fill
  - and they will be full
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction continues the future force from the prior plague announcement; the implied subject is the locusts from context. Active 'they will fill' is more natural here than an English stative rendering.
- source_word: בָתֶּיךָ ... וּבָתֵּי כָל עֲבָדֶיךָ ... וּבָתֵּי כָל מִצְרַיִם
  chosen: your houses, the houses of all your servants, and the houses of all Egypt
  alternatives:
  - your house ... your servants' houses ... all the houses of Egypt
  lexicon: HALOT
  rationale: The Hebrew uses plural construct forms throughout. Rendering all three as 'houses' preserves the repeated structure and the escalating scope from Pharaoh to his servants to all Egypt.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your officials
  - your slaves
  lexicon: HALOT
  rationale: In this royal court context, 'servants' idiomatically refers to Pharaoh's attendants/officials. 'Officials' is possible but less literal; 'slaves' would over-specify social status not required by the immediate context.
- source_word: אֲשֶׁר לֹא רָאוּ
  chosen: something ... have not seen
  alternatives:
  - which ... have not seen
  - that ... did not see
  lexicon: HALOT
  rationale: The relative clause refers to the unprecedented nature of the plague just mentioned. Supplying 'something' makes the English idiomatic while preserving the Hebrew sense of an event not previously witnessed.
- source_word: אֲבֹתֶיךָ וַאֲבֹת אֲבֹתֶיךָ
  chosen: your fathers and your fathers’ fathers
  alternatives:
  - your ancestors and your ancestors before them
  - your fathers and grandfathers
  lexicon: HALOT
  rationale: A formally close rendering preserves the Hebrew generational expression. 'Grandfathers' is too narrow; the phrase denotes prior generations more broadly.
- source_word: מִיּוֹם הֱיוֹתָם עַל הָאֲדָמָה
  chosen: from the day they came to be on the land
  alternatives:
  - since the day they were on the earth
  - from the day they existed on the ground
  lexicon: HALOT
  rationale: היה with the infinitive construct plus pronominal suffix expresses the beginning of their existence/presence. 'Came to be on the land' is readable and preserves the temporal force without over-paraphrase.
- source_word: הָאֲדָמָה
  chosen: the land
  alternatives:
  - the earth
  - the ground
  lexicon: HALOT
  rationale: Although אדםה can mean 'ground' or 'earth,' here the idiom about generations living upon the earth/land is best rendered 'land' for natural English, while still conveying earthly existence.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: until this day
  alternatives:
  - to this day
  - until the present day
  lexicon: HALOT
  rationale: A standard temporal idiom; 'until this day' closely matches the Hebrew and fits the solemn warning style.
- source_word: וַיִּפֶן וַיֵּצֵא מֵעִם פַּרְעֹה
  chosen: Then he turned and went out from Pharaoh
  alternatives:
  - and he turned and left Pharaoh
  - then he turned away and went out from before Pharaoh
  lexicon: HALOT
  rationale: The consecutive verbs narrate Moses' departure. 'From Pharaoh' is a natural rendering of מעם here; 'from before Pharaoh' is possible but less idiomatic in modern English.
