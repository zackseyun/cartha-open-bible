id: EXO.10.4
reference: Exodus 10:4
source:
  edition: WLC
  text: כִּ֛י אִם מָאֵ֥ן אַתָּ֖ה לְ/שַׁלֵּ֣חַ אֶת עַמִּ֑/י הִנְ/נִ֨י מֵבִ֥יא מָחָ֛ר
    אַרְבֶּ֖ה בִּ/גְבֻלֶֽ/ךָ־־׃
translation:
  text: For if you refuse to let my people go, behold, tomorrow I will bring locusts
    into your territory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew אַרְבֶּה is singular in form but used collectively; thus 'locusts'
      in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'within your borders.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: For if
  alternatives:
  - But if
  - For indeed if
  lexicon: HALOT
  rationale: The combination introduces a conditional warning grounded in the preceding
    speech. 'For if' preserves the causal/continuative force of כִּי and the conditional
    force of אִם without overinterpreting the discourse relation.
- source_word: מָאֵן
  chosen: refuse
  alternatives:
  - decline
  - are unwilling
  lexicon: HALOT
  rationale: The verb denotes a willful refusal, not mere inability or hesitation.
    'Refuse' best captures the obstinate sense in the plague narrative.
- source_word: לְשַׁלֵּחַ
  chosen: to let ... go
  alternatives:
  - to send away
  - to release
  lexicon: HALOT
  rationale: In the Exodus context, שׁלח with the people as object is idiomatically
    rendered 'let ... go.' 'Send away' is more wooden, while 'release' is possible
    but less natural here.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Standard covenantal expression; concise and natural, preserving the possessive
    emphasis.
- source_word: הִנְנִי
  chosen: behold
  alternatives:
  - look
  - see
  - I am about to
  lexicon: HALOT
  rationale: The particle marks solemn immediacy and emphasis. 'Behold' preserves
    the elevated warning tone better than colloquial alternatives. The imminent force
    is then carried by the following clause.
- source_word: מֵבִיא
  chosen: I will bring
  alternatives:
  - I am bringing
  - I am about to bring
  lexicon: HALOT
  rationale: Although formally a participle, with הִנְנִי it expresses imminent future
    action. 'I will bring' gives clear English while preserving the divine threat;
    the immediacy is already signaled by 'behold' and 'tomorrow.'
- source_word: מָחָר
  chosen: tomorrow
  lexicon: HALOT
  rationale: Direct temporal adverb indicating the plague's timing.
- source_word: אַרְבֶּה
  chosen: locusts
  alternatives:
  - a swarm of locusts
  lexicon: HALOT
  rationale: Though morphologically singular, אַרְבֶּה often functions as a collective
    noun. English naturally uses the plural 'locusts' for the invading plague.
- source_word: בִּגְבֻלֶךָ
  chosen: into your territory
  alternatives:
  - within your borders
  - in your land
  lexicon: HALOT
  rationale: גְּבוּל refers to boundary/territory. 'Into your territory' fits the
    motion implied by 'bring' and preserves the sense of entering Pharaoh's domain.
    'In your land' is broader and less tied to the lexical idea of borders.
