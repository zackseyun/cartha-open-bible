id: EXO.10.14
reference: Exodus 10:14
source:
  edition: WLC
  text: וַ/יַּ֣עַל הָֽ/אַרְבֶּ֗ה עַ֚ל כָּל אֶ֣רֶץ מִצְרַ֔יִם וַ/יָּ֕נַח בְּ/כֹ֖ל גְּב֣וּל מִצְרָ֑יִם כָּבֵ֣ד מְאֹ֔ד לְ֠/פָנָי/ו לֹא הָ֨יָה כֵ֤ן אַרְבֶּה֙ כָּמֹ֔/הוּ וְ/אַחֲרָ֖י/ו לֹ֥א יִֽהְיֶה כֵּֽן־־־׃
translation:
  text: And the locusts came up over all the land of Egypt and settled within all the territory of Egypt[a], very severe; never before had there been locusts like it, nor will there be again after it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'very heavy.' The expression describes the locust invasion as exceptionally weighty or severe.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: came up
  alternatives:
  - went up
  - rose
  lexicon: HALOT
  rationale: The verb עלה literally means 'go up/ascend.' In plague narrative context with locusts spreading over the land, 'came up' preserves the Hebrew imagery without sounding unnatural in English.
- source_word: הָאַרְבֶּה
  chosen: the locusts
  alternatives:
  - the locust swarm
  - the locust
  lexicon: HALOT
  rationale: Although singular in form can function collectively, English idiom prefers the plural 'locusts' for the invading mass. This best reflects the collective sense in context.
- source_word: עַל כָּל אֶרֶץ מִצְרַיִם
  chosen: over all the land of Egypt
  alternatives:
  - upon all the land of Egypt
  - over the whole land of Egypt
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase. 'Land' is preferable to 'earth' here because the reference is the territory of Egypt.
- source_word: וַיָּנַח
  chosen: settled
  alternatives:
  - came to rest
  - rested
  lexicon: HALOT
  rationale: '''Settled'' naturally describes locusts coming to rest across the country while preserving the sense of נוח.'
- source_word: בְּכֹל גְּבוּל מִצְרָיִם
  chosen: in every territory of Egypt
  alternatives:
  - within all the borders of Egypt
  - throughout all the territory of Egypt
  lexicon: HALOT
  rationale: גְּבוּל can mean border, boundary, or territory. Here the sense is distributive across the whole national domain, so 'every territory of Egypt' conveys spread throughout the country rather than merely along border lines.
- source_word: כָּבֵד מְאֹד
  chosen: an extremely severe swarm
  alternatives:
  - very heavy
  - exceedingly numerous
  - very grievous
  lexicon: HALOT
  rationale: כָּבֵד literally means 'heavy,' but in English 'a heavy locusts' is awkward. The adjective describes the plague's intensity and density. 'An extremely severe swarm' communicates the force of the Hebrew idiom in natural English while making explicit the implied collective sense.
- source_word: לְפָנָיו
  chosen: before it
  alternatives:
  - before this
  - before him
  lexicon: HALOT
  rationale: The suffix refers back to the locust plague/swarm as a collective event. English 'before it' is the most natural anaphoric rendering.
- source_word: לֹא הָיָה כֵן אַרְבֶּה כָּמֹהוּ
  chosen: Never before had there been locusts like it
  alternatives:
  - No locust like it had ever been before
  - There had never been such locusts as it
  lexicon: HALOT
  rationale: This clause is idiomatically recast for readable English while preserving the superlative claim. 'Like it' refers to the plague as a collective locust invasion.
- source_word: וְאַחֲרָיו לֹא יִהְיֶה כֵן
  chosen: nor will there be again after it
  alternatives:
  - and after it there will not be so
  - nor shall there be such after it
  lexicon: HALOT
  rationale: 'This preserves the future-oriented comparison and completes the Hebrew merism: unmatched before and unmatched after.'
