id: EXO.10.5
reference: Exodus 10:5
source:
  edition: WLC
  text: וְ/כִסָּה֙ אֶת עֵ֣ין הָ/אָ֔רֶץ וְ/לֹ֥א יוּכַ֖ל לִ/רְאֹ֣ת אֶת הָ/אָ֑רֶץ וְ/אָכַ֣ל
    אֶת יֶ֣תֶר הַ/פְּלֵטָ֗ה הַ/נִּשְׁאֶ֤רֶת לָ/כֶם֙ מִן הַ/בָּרָ֔ד וְ/אָכַל֙ אֶת כָּל
    הָ/עֵ֔ץ הַ/צֹּמֵ֥חַ לָ/כֶ֖ם מִן הַ/שָּׂדֶֽה־־׀־־־־־׃
translation:
  text: And it will cover the surface of the land, so that one will not be able to
    see the land; and it will eat what remains of the survivors left to you from the
    hail, and it will eat every tree growing for you out of the field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the eye of the land,' a Hebrew idiom for the visible surface
      of the land.
    reason: lexical_alternative
  - marker: b
    text: Or 'the remnant that escaped, which remains for you from the hail.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְכִסָּה
  chosen: And it will cover
  alternatives:
  - and it shall cover
  - and it covered
  lexicon: HALOT
  rationale: The verb כסה means 'cover/conceal.' Given the predictive context of Moses
    announcing the coming locusts, future English is appropriate. The singular verb
    refers collectively to the locust swarm.
- source_word: עֵין הָאָרֶץ
  chosen: the surface of the land
  alternatives:
  - the eye of the land
  - the face of the land
  lexicon: HALOT
  rationale: The idiom literally reads 'the eye of the land/earth' and refers to the
    visible surface. 'Surface of the land' communicates the sense in natural English
    without over-literal obscurity.
- source_word: וְלֹא יוּכַל לִרְאֹת אֶת הָאָרֶץ
  chosen: so that one will not be able to see the land
  alternatives:
  - and the land cannot be seen
  - so that the land will not be visible
  lexicon: HALOT
  rationale: The Hebrew uses an impersonal singular 'he/one will not be able to see
    the land.' English impersonal 'one' preserves the sense better than making 'the
    land' the grammatical subject, though the latter is a viable smoothing option.
- source_word: וְאָכַל
  chosen: and it will eat
  alternatives:
  - and it will consume
  - and they will eat
  lexicon: HALOT
  rationale: אכל is the ordinary verb 'eat.' 'Consume' is possible but less concrete.
    Singular 'it' matches the collective singular subject established in the verse.
- source_word: יֶתֶר הַפְּלֵטָה
  chosen: what remains of the survivors
  alternatives:
  - the remainder of the escape
  - what is left that escaped
  - the remnant that escaped
  lexicon: HALOT
  rationale: The phrase denotes what has escaped destruction and remains. Because
    the referent here is agricultural produce surviving the hail, 'what remains of
    the survivors' captures the Hebrew's layered expression while signaling that inanimate
    crops are meant by extension. 'Remnant' is possible but can sound overly theological
    in English.
- source_word: הַנִּשְׁאֶרֶת לָכֶם מִן הַבָּרָד
  chosen: left to you from the hail
  alternatives:
  - remaining for you from the hail
  - which the hail left for you
  lexicon: HALOT
  rationale: This participial phrase modifies the surviving remainder. 'Left to you
    from the hail' is concise and preserves the sense that the hail had already destroyed
    much, leaving only this residue.
- source_word: כָּל הָעֵץ
  chosen: every tree
  alternatives:
  - all the trees
  - every kind of tree
  lexicon: HALOT
  rationale: Although עץ can be collective, 'every tree' fits the distributive force
    of כל in context and reads naturally in English.
- source_word: הַצֹּמֵחַ לָכֶם מִן הַשָּׂדֶה
  chosen: growing for you out of the field
  alternatives:
  - that sprouts for you from the field
  - growing for you in the field
  lexicon: HALOT
  rationale: צמח means 'sprout/grow.' 'Growing' is idiomatic. מן can be rendered 'from/out
    of,' indicating origin from the field. 'For you' preserves the dative לָכֶם, indicating
    produce belonging or beneficial to the Egyptians.
