id: EXO.10.22
reference: Exodus 10:22
source:
  edition: WLC
  text: וַ/יֵּ֥ט מֹשֶׁ֛ה אֶת יָד֖/וֹ עַל הַ/שָּׁמָ֑יִם וַ/יְהִ֧י חֹֽשֶׁךְ אֲפֵלָ֛ה בְּ/כָל אֶ֥רֶץ מִצְרַ֖יִם שְׁלֹ֥שֶׁת יָמִֽים־־־־׃
translation:
  text: So Moses stretched out his hand toward the sky[b][a], and there was thick darkness over all the land of Egypt for three days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toward heaven.' The Hebrew שָּׁמַיִם can mean 'sky' or 'heaven/heavens' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'deep darkness.' The Hebrew expression combines 'darkness' with a second term for gloom/intense darkness for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּט
  chosen: stretched out
  alternatives:
  - extended
  - reached out
  lexicon: HALOT
  rationale: The verb נטה in this gesture context commonly means to stretch out or extend. 'Stretched out' is idiomatic English and preserves the physical action without paraphrase.
- source_word: יָדוֹ
  chosen: his hand
  alternatives:
  - his arm
  lexicon: HALOT
  rationale: יָד normally means 'hand.' There is no contextual reason to broaden it to 'arm.'
- source_word: עַל הַשָּׁמַיִם
  chosen: toward the sky
  alternatives:
  - toward heaven
  - over the heavens
  lexicon: HALOT
  rationale: Although עַל often means 'upon/over,' with a gesture of stretching out the hand it can indicate direction toward. 'Sky' fits the plague context in natural English better than the more formal 'heavens,' while still reflecting שָּׁמַיִם.
- source_word: וַיְהִי
  chosen: there was
  alternatives:
  - and it became
  - and there came to be
  lexicon: HALOT
  rationale: The wayyiqtol of היה here introduces the resulting state. 'There was' is natural English and accurately conveys the onset of the condition.
- source_word: חֹשֶׁךְ אֲפֵלָה
  chosen: thick darkness
  alternatives:
  - deep darkness
  - gloomy darkness
  - darkness, even gloom
  lexicon: HALOT
  rationale: The pairing intensifies the darkness. 'Thick darkness' communicates palpable severity in readable English without overexpanding the Hebrew. The second noun functions appositionally/intensively.
- source_word: בְּכָל אֶרֶץ מִצְרַיִם
  chosen: over all the land of Egypt
  alternatives:
  - throughout all the land of Egypt
  - in all the land of Egypt
  lexicon: HALOT
  rationale: '''Land of Egypt'' is the standard rendering of אֶרֶץ מִצְרַיִם. ''Over'' fits the image of darkness covering the land, though the Hebrew preposition is simply ''in/on''; the phrase remains faithful and idiomatic.'
- source_word: שְׁלֹשֶׁת יָמִים
  chosen: for three days
  alternatives:
  - three days
  lexicon: HALOT
  rationale: English normally supplies 'for' to express duration. This makes the temporal accusative clear without adding interpretive content.
