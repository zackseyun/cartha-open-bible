id: EXO.10.15
reference: Exodus 10:15
source:
  edition: WLC
  text: וַ/יְכַ֞ס אֶת עֵ֣ין כָּל הָ/אָרֶץ֮ וַ/תֶּחְשַׁ֣ךְ הָ/אָרֶץ֒ וַ/יֹּ֜אכַל אֶת
    כָּל עֵ֣שֶׂב הָ/אָ֗רֶץ וְ/אֵת֙ כָּל פְּרִ֣י הָ/עֵ֔ץ אֲשֶׁ֥ר הוֹתִ֖יר הַ/בָּרָ֑ד
    וְ/לֹא נוֹתַ֨ר כָּל יֶ֧רֶק בָּ/עֵ֛ץ וּ/בְ/עֵ֥שֶׂב הַ/שָּׂדֶ֖ה בְּ/כָל אֶ֥רֶץ מִצְרָֽיִם־־־־־־־־׃
translation:
  text: And it covered the face of the whole land, so that the land was darkened;
    and it ate every plant of the land and all the fruit of the trees that the hail
    had left. No green thing remained on the trees or on the plants of the field in
    all the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the eye of all the land,' an idiom for the visible surface
      or face of the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְכַס
  chosen: it covered
  alternatives:
  - they covered
  lexicon: HALOT
  rationale: Singular verb with a collective subject implied from context (the locust
    swarm). English singular 'it' best matches the Hebrew verbal form while allowing
    the swarm to be understood collectively.
- source_word: עֵין כָּל הָאָרֶץ
  chosen: the face of the whole land
  alternatives:
  - the surface of all the land
  - the sight of the whole land
  lexicon: HALOT
  rationale: Hebrew 'eye of all the land' is an idiom for visible surface/face. 'Face
    of the whole land' preserves the metaphor while remaining natural English.
- source_word: וַתֶּחְשַׁךְ הָאָרֶץ
  chosen: so that the land was darkened
  alternatives:
  - and the land grew dark
  - and the land was blackened
  lexicon: HALOT
  rationale: The verb denotes becoming dark. 'Was darkened' captures the result of
    the locusts covering the land and fits the narrative sequence.
- source_word: וַיֹּאכַל
  chosen: it ate
  alternatives:
  - it consumed
  - they ate
  lexicon: HALOT
  rationale: The singular verb continues the collective singular treatment of the
    locust swarm. 'Ate' is the plain lexical sense and avoids over-interpretive intensification.
- source_word: כָּל עֵשֶׂב הָאָרֶץ
  chosen: every plant of the land
  alternatives:
  - all the vegetation of the land
  - every herb of the land
  - all the grass of the land
  lexicon: HALOT
  rationale: עֵשֶׂב is broader than 'grass' and includes vegetation/plants. 'Every
    plant' is clear modern English and suits the agricultural context.
- source_word: כָּל פְּרִי הָעֵץ
  chosen: all the fruit of the trees
  alternatives:
  - all the fruit of the tree
  lexicon: HALOT
  rationale: Though עֵץ is singular in form, it functions collectively here. English
    plural 'trees' communicates the distributive sense naturally.
- source_word: אֲשֶׁר הוֹתִיר הַבָּרָד
  chosen: that the hail had left
  alternatives:
  - which the hail had spared
  - that remained after the hail
  lexicon: HALOT
  rationale: The clause refers back to what survived the previous plague. 'Had left'
    is a straightforward rendering of הותיר in past perfect sense.
- source_word: וְלֹא נוֹתַר
  chosen: Not any ... remained
  alternatives:
  - nothing ... was left
  - there did not remain any
  lexicon: HALOT
  rationale: This preserves the emphatic negation and the passive/resultative sense
    of the Niphal verb while reading naturally in English.
- source_word: כָּל יֶרֶק
  chosen: any green thing
  alternatives:
  - any greenery
  - anything green
  lexicon: HALOT
  rationale: יֶרֶק denotes green vegetation/green thing. 'Any green thing' preserves
    the broad scope and the vividness of total devastation.
- source_word: בָּעֵץ
  chosen: on the trees
  alternatives:
  - in the trees
  - on the tree
  lexicon: HALOT
  rationale: Collective singular rendered as English plural for naturalness. 'On the
    trees' fits fruit and foliage remaining on branches.
- source_word: וּבְעֵשֶׂב הַשָּׂדֶה
  chosen: or on the plants of the field
  alternatives:
  - or in the vegetation of the field
  - or on the grass of the field
  lexicon: HALOT
  rationale: Pairs with the previous phrase to describe all remaining vegetation.
    'Plants of the field' is broader and more accurate than 'grass'.
- source_word: בְּכָל אֶרֶץ מִצְרָיִם
  chosen: in all the land of Egypt
  alternatives:
  - throughout the whole land of Egypt
  lexicon: HALOT
  rationale: A standard territorial expression. 'In all the land of Egypt' is faithful
    and idiomatic.
