id: EXO.2.22
reference: Exodus 2:22
source:
  edition: WLC
  text: וַ/תֵּ֣לֶד בֵּ֔ן וַ/יִּקְרָ֥א אֶת שְׁמ֖/וֹ גֵּרְשֹׁ֑ם כִּ֣י אָמַ֔ר גֵּ֣ר הָיִ֔יתִי
    בְּ/אֶ֖רֶץ נָכְרִיָּֽה־׃פ
translation:
  text: She gave birth to a son, and he called his name Gershom, for he said, “I have
    been a foreigner in a foreign land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Gershom sounds like the Hebrew expression behind “a foreigner there,” reflecting
      Moses’s explanation of the name.
    reason: lexical_alternative
  - marker: b
    text: Or “I was a sojourner in a foreign land.”
    reason: alternative_reading
lexical_decisions:
- source_word: וַתֵּלֶד
  chosen: She gave birth
  alternatives:
  - She bore
  lexicon: HALOT
  rationale: The verb ילד in the Qal wayyiqtol means 'gave birth/bore.' 'Gave birth'
    is clearer in modern English while remaining faithful to the source.
- source_word: בֵּן
  chosen: a son
  alternatives:
  - a boy
  lexicon: HALOT
  rationale: בן here denotes a male child. 'Son' is the standard and more literal
    rendering in birth formulae.
- source_word: וַיִּקְרָא אֶת־שְׁמוֹ
  chosen: and he called his name
  alternatives:
  - and he named him
  - and he called him
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'called his name.' This is slightly more
    formal than idiomatic English, but it preserves the naming formula and the connection
    to the explanatory wordplay that follows.
- source_word: גֵּרְשֹׁם
  chosen: Gershom
  rationale: Personal names are transliterated by standard convention per translation
    philosophy. The form 'Gershom' is conventional and reflects the Hebrew name.
- source_word: כִּי אָמַר
  chosen: for he said
  alternatives:
  - because he said
  lexicon: HALOT
  rationale: כִּי introduces the explanation for the name. 'For' fits the explanatory
    tone and preserves the compactness of the Hebrew.
- source_word: גֵּר
  chosen: a foreigner
  alternatives:
  - a sojourner
  - an alien
  - a resident foreigner
  lexicon: HALOT
  rationale: גֵּר denotes a person living as a non-native among another people. 'Foreigner'
    is natural modern English and fits Moses's self-description here. 'Sojourner'
    is possible but sounds archaic; 'resident foreigner' is more technical than the
    context requires.
- source_word: הָיִיתִי
  chosen: I have been
  alternatives:
  - I was
  lexicon: HALOT
  rationale: The perfect can be rendered simply as past ('I was'), but 'I have been'
    communicates Moses's continuing state up to the naming moment and works naturally
    in English.
- source_word: בְּאֶרֶץ נָכְרִיָּה
  chosen: in a foreign land
  alternatives:
  - in a strange land
  - in a land not my own
  lexicon: HALOT
  rationale: נָכְרִיָּה means foreign/strange. 'Foreign land' is clear, contemporary,
    and preserves the repetition with גֵּר/foreigner, which supports the name explanation.
