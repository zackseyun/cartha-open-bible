theological_decisions:
- issue: Gendered expression לְאִישׁ
  chosen_reading: a man
  alternative_readings:
  - someone
  rationale: Per translation philosophy, gender-accurate wording is preferred where the Hebrew is grammatically masculine and contextually specific. Here the speaker's challenge uses the idiomatic masculine noun אִישׁ, so 'a man' is retained rather than neutralizing it.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
