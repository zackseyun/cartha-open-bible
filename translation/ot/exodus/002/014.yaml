id: EXO.2.14
reference: Exodus 2:14
source:
  edition: WLC
  text: וַ֠/יֹּאמֶר מִ֣י שָֽׂמְ/ךָ֞ לְ/אִ֨ישׁ שַׂ֤ר וְ/שֹׁפֵט֙ עָלֵ֔י/נוּ הַ/לְ/הָרְגֵ֨/נִי֙ אַתָּ֣ה אֹמֵ֔ר כַּ/אֲשֶׁ֥ר הָרַ֖גְתָּ אֶת הַ/מִּצְרִ֑י וַ/יִּירָ֤א מֹשֶׁה֙ וַ/יֹּאמַ֔ר אָכֵ֖ן נוֹדַ֥ע הַ/דָּבָֽר־׃
translation:
  text: But he said[a], “Who made you a ruler and a judge over us? Are you saying, ‘Will you kill me as you killed the Egyptian?’” Then Moses was afraid and said, “Surely the matter has become known.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Do you mean to kill me as you killed the Egyptian?”
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who
  lexicon: HALOT
  rationale: Interrogative pronoun introducing the challenge to Moses' authority.
- source_word: שָׂמְךָ
  chosen: made you
  alternatives:
  - appointed you
  - set you
  lexicon: HALOT
  rationale: שׂים commonly means 'set, place, appoint.' 'Made you' is idiomatic in English in this challenge formula and fits the direct object suffix 'you.'
- source_word: לְאִישׁ
  chosen: a man
  alternatives:
  - someone
  lexicon: HALOT
  rationale: The Hebrew explicitly uses אִישׁ. Retaining 'a man' preserves the gender-accurate wording and the idiomatic force of the expression 'a man, a ruler, and a judge.'
- source_word: שַׂר
  chosen: a ruler
  alternatives:
  - prince
  - official
  - chief
  lexicon: HALOT
  rationale: In this context שַׂר denotes one exercising authority. 'Ruler' is clear modern English without importing monarchical nuance as strongly as 'prince.'
- source_word: וְשֹׁפֵט
  chosen: and a judge
  alternatives:
  - and judge
  lexicon: HALOT
  rationale: Participial form used substantivally; 'judge' captures the judicial role paired with 'ruler.' The article is not required in English beyond the coordinated phrase.
- source_word: עָלֵינוּ
  chosen: over us
  alternatives:
  - for us
  lexicon: HALOT
  rationale: עַל with pronominal suffix here marks authority over the speakers, not merely action on their behalf.
- source_word: הַלְהָרְגֵנִי אַתָּה אֹמֵר
  chosen: Are you saying you will kill me
  alternatives:
  - Do you mean to kill me
  - Do you intend to kill me
  lexicon: HALOT
  rationale: The construction combines interrogative ה with infinitive 'to kill me' and אֹמֵר ('saying'). English idiom is best conveyed by 'Are you saying you will kill me?' which preserves the verbal force without woodenly reproducing the syntax.
- source_word: כַּאֲשֶׁר הָרַגְתָּ אֶת־הַמִּצְרִי
  chosen: as you killed the Egyptian
  alternatives:
  - just as you killed the Egyptian
  lexicon: HALOT
  rationale: Straightforward comparative clause recalling the prior act. Definite article on 'Egyptian' is preserved.
- source_word: וַיִּירָא
  chosen: was afraid
  alternatives:
  - feared
  lexicon: HALOT
  rationale: Narrative wayyiqtol of ירא. 'Was afraid' is natural modern English and conveys Moses' fear response.
- source_word: אָכֵן
  chosen: Surely
  alternatives:
  - Indeed
  - Truly
  lexicon: HALOT
  rationale: Particle of affirmation/inference. 'Surely' fits Moses' realization.
- source_word: נוֹדַע הַדָּבָר
  chosen: the matter has become known
  alternatives:
  - the matter is known
  - the thing has become known
  lexicon: HALOT
  rationale: Niphal of ידע indicates that the matter has come to light or become known. 'Matter' is idiomatic for דָּבָר in this context.
