id: EXO.2.8
reference: Exodus 2:8
source:
  edition: WLC
  text: וַ/תֹּֽאמֶר לָ֥/הּ בַּת פַּרְעֹ֖ה לֵ֑כִי וַ/תֵּ֨לֶךְ֙ הָֽ/עַלְמָ֔ה וַ/תִּקְרָ֖א
    אֶת אֵ֥ם הַ/יָּֽלֶד־־־׃
translation:
  text: Pharaoh’s daughter said to her, “Go.” So the young woman went and called the
    child’s mother.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בַּת פַּרְעֹה
  chosen: Pharaoh’s daughter
  alternatives:
  - the daughter of Pharaoh
  lexicon: HALOT
  rationale: Construct phrase meaning the daughter belonging to Pharaoh. The possessive
    form is natural modern English while remaining formally close.
- source_word: לֵכִי
  chosen: Go
  alternatives:
  - Go on
  - Come, go
  lexicon: HALOT
  rationale: Qal imperative feminine singular of הלך addressed to Miriam. Simple imperative
    'Go' best matches the brevity and force of the Hebrew.
- source_word: הָעַלְמָה
  chosen: the young woman
  alternatives:
  - the girl
  - the maiden
  lexicon: HALOT
  rationale: עַלְמָה denotes a young woman of marriageable age; here it refers to
    Moses' sister. 'Young woman' is accurate and readable. 'Girl' is possible in context,
    but 'young woman' better reflects the lexical sense without archaic tone.
- source_word: וַתִּקְרָא אֶת אֵם הַיָּלֶד
  chosen: called the child’s mother
  alternatives:
  - summoned the child's mother
  - called for the child's mother
  lexicon: HALOT
  rationale: קרא with object marker can mean call/summon. 'Called the child’s mother'
    is sufficiently idiomatic and preserves the directness of the Hebrew narrative.
    'Child' for יֶלֶד is the most natural contextual rendering for the infant Moses.
- source_word: הַיָּלֶד
  chosen: the child
  alternatives:
  - the boy
  - the infant
  lexicon: HALOT
  rationale: יֶלֶד often means child/boy. Since the immediate scene concerns a baby
    in the Nile, 'child' is natural English and avoids over-specifying beyond what
    is needed in this clause.
