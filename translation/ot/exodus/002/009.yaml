id: EXO.2.9
reference: Exodus 2:9
source:
  edition: WLC
  text: וַ/תֹּ֧אמֶר לָ֣/הּ בַּת פַּרְעֹ֗ה הֵילִ֜יכִי אֶת הַ/יֶּ֤לֶד הַ/זֶּה֙ וְ/הֵינִקִ֣/הוּ
    לִ֔/י וַ/אֲנִ֖י אֶתֵּ֣ן אֶת שְׂכָרֵ֑/ךְ וַ/תִּקַּ֧ח הָ/אִשָּׁ֛ה הַ/יֶּ֖לֶד וַ/תְּנִיקֵֽ/הוּ־־־׃
translation:
  text: Then Pharaoh’s daughter said to her, “Take this child and nurse him for me,
    and I will give you your wages.” So the woman took the child and nursed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “suckle him for me” / “breastfeed him for me.”
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּת פַּרְעֹה
  chosen: Pharaoh’s daughter
  alternatives:
  - the daughter of Pharaoh
  lexicon: HALOT
  rationale: Construct chain identifying the speaker; the possessive form is natural
    modern English while preserving the relationship.
- source_word: הֵילִיכִי
  chosen: Take
  alternatives:
  - Go, take
  - Carry away
  lexicon: HALOT
  rationale: Hiphil imperative of הלך can function idiomatically as a directive to
    take or carry along. In this context Pharaoh’s daughter is commissioning the woman
    to take the baby away for nursing, so 'Take' is the clearest idiomatic English
    rendering.
- source_word: הַיֶּלֶד הַזֶּה
  chosen: this child
  alternatives:
  - this boy
  - this infant
  lexicon: HALOT
  rationale: יֶלֶד is a general term for child/boy. 'This child' is natural and sufficiently
    broad, fitting the immediate context without over-specifying age or sex in English.
- source_word: וְהֵינִקִהוּ לִי
  chosen: and nurse him for me
  alternatives:
  - and suckle him for me
  - and breastfeed him for me
  lexicon: HALOT
  rationale: The verb denotes nursing a child. 'Nurse him' is readable modern English
    and preserves the maternal caregiving sense; 'for me' accurately reflects לִי
    as service rendered on Pharaoh’s daughter’s behalf.
- source_word: וַאֲנִי אֶתֵּן אֶת שְׂכָרֵךְ
  chosen: and I will give you your wages
  alternatives:
  - and I will pay your wages
  - and I will give your pay
  lexicon: HALOT
  rationale: שָׂכָר refers to wages/pay for work done. 'I will give you your wages'
    stays close to the Hebrew wording while remaining idiomatic.
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the mother
  lexicon: HALOT
  rationale: The Hebrew says 'the woman,' not 'his mother.' Although the reader knows
    her identity from context, the translation should not import a more specific designation
    than the text states here.
- source_word: וַתְּנִיקֵהוּ
  chosen: and nursed him
  alternatives:
  - and suckled him
  - and breastfed him
  lexicon: HALOT
  rationale: This verb again denotes nursing the child. 'Nursed him' provides consistent
    rendering with the earlier imperative and is natural in contemporary English.
