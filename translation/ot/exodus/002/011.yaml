theological_decisions:
- issue: Rendering of kinship language for אֶחָיו / מֵאֶחָיו
  chosen_reading: brothers
  alternative_readings:
  - kinsmen
  - people
  rationale: Following the translation philosophy's gender-accurate principle, the
    masculine plural is retained as 'brothers' because the text emphasizes Moses'
    identification with his fellow Hebrews through familial language. More inclusive
    alternatives are possible interpretive renderings but are not required by the
    Hebrew here.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
