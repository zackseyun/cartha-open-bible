id: EXO.2.11
reference: Exodus 2:11
source:
  edition: WLC
  text: וַ/יְהִ֣י בַּ/יָּמִ֣ים הָ/הֵ֗ם וַ/יִּגְדַּ֤ל מֹשֶׁה֙ וַ/יֵּצֵ֣א אֶל אֶחָ֔י/ו
    וַ/יַּ֖רְא בְּ/סִבְלֹתָ֑/ם וַ/יַּרְא֙ אִ֣ישׁ מִצְרִ֔י מַכֶּ֥ה אִישׁ עִבְרִ֖י מֵ/אֶחָֽי/ו׀־־׃
translation:
  text: Now it happened in those days, when Moses had grown up, that he went out to
    his brothers and saw their burdens. And he saw an Egyptian man striking a Hebrew
    man, one of his brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kinsmen' or 'his people' for 'his brothers' / 'one of his brothers';
      the Hebrew uses familial language to express Moses' solidarity with the Hebrews.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בַּיָּמִים הָהֵם
  chosen: Now it happened in those days
  alternatives:
  - In those days
  - And it came to pass in those days
  lexicon: HALOT
  rationale: Retains the Hebrew narrative transition formula without archaic English.
    'Now it happened' preserves the waw-consecutive narrative movement better than
    a bare omission, while avoiding the archaic 'came to pass.'
- source_word: וַיִּגְדַּל
  chosen: had grown up
  alternatives:
  - grew up
  - became great
  lexicon: HALOT
  rationale: In context the verb marks Moses reaching maturity rather than status
    or greatness. English past perfect fits the sequence before 'he went out.'
- source_word: אֶל אֶחָיו
  chosen: to his brothers
  alternatives:
  - to his kinsmen
  - to his people
  lexicon: HALOT
  rationale: The Hebrew literally says 'to his brothers.' This preserves the familial
    solidarity Moses feels with the Hebrews. 'Kinsmen' or 'people' are interpretive
    expansions; the literal wording is clear and natural in English.
- source_word: בְּסִבְלֹתָם
  chosen: their burdens
  alternatives:
  - their forced labor
  - their hard labors
  - their sufferings
  lexicon: HALOT
  rationale: The noun refers to burdens/burden-bearing, likely the oppressive labor
    imposed on the Israelites. 'Their burdens' is a faithful and readable rendering
    that leaves the concrete and experiential sense intact without over-specifying.
- source_word: אִישׁ מִצְרִי
  chosen: an Egyptian man
  alternatives:
  - an Egyptian
  - a certain Egyptian man
  lexicon: HALOT
  rationale: Hebrew איש can be left implicit in English, but here 'man' is retained
    for balance with the following 'Hebrew man' and to reflect the repeated איש construction.
- source_word: מַכֶּה
  chosen: striking
  alternatives:
  - beating
  - hitting
  lexicon: HALOT
  rationale: The participle denotes an ongoing act of physical assault. 'Striking'
    is broad and faithful; 'beating' is possible but slightly more interpretive in
    intensity.
- source_word: אִישׁ עִבְרִי
  chosen: a Hebrew man
  alternatives:
  - a Hebrew
  - a man of the Hebrews
  lexicon: HALOT
  rationale: Keeps the parallel with 'Egyptian man' and reflects the repeated איש
    structure.
- source_word: מֵאֶחָיו
  chosen: one of his brothers
  alternatives:
  - one of his kinsmen
  - one of his people
  lexicon: HALOT
  rationale: The phrase identifies the Hebrew as belonging to Moses' own people. 'One
    of his brothers' preserves the lexical link with the earlier 'his brothers' and
    the theme of solidarity.
