theological_decisions:
- issue: Rendering עֲבֹדָה in Israel's oppression
  chosen_reading: slavery
  alternative_readings:
  - labor
  - service
  - bondage
  rationale: The context is Egypt's oppressive forced labor imposed on Israel. 'Slavery'
    best reflects the social reality and avoids softening the severity of their condition.
    This is a lexical-contextual decision, not an imported doctrinal claim.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is grammatically masculine plural in a standard covenantal
    ethnonym. Per the gender-accurate policy, the translation preserves the masculine
    form rather than neutralizing it, while recognizing that it refers collectively
    to the people of Israel.
  doctrine_reference: Translation philosophy §4
