id: EXO.2.23
reference: Exodus 2:23
source:
  edition: WLC
  text: וַ/יְהִי֩ בַ/יָּמִ֨ים הָֽ/רַבִּ֜ים הָ/הֵ֗ם וַ/יָּ֨מָת֙ מֶ֣לֶךְ מִצְרַ֔יִם
    וַ/יֵּאָנְח֧וּ בְנֵֽי יִשְׂרָאֵ֛ל מִן הָ/עֲבֹדָ֖ה וַ/יִּזְעָ֑קוּ וַ/תַּ֧עַל שַׁוְעָתָ֛/ם
    אֶל הָ/אֱלֹהִ֖ים מִן הָ/עֲבֹדָֽה־־־־׃
translation:
  text: Now it happened in those many days that the king of Egypt died, and the sons
    of Israel groaned because of the labor and cried out, and their cry for help went
    up to God because of the labor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'during those many days' or more interpretively 'after many days.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Israel'; this refers collectively to the people of Israel.
    reason: lexical_alternative
  - marker: c
    text: Or 'because of the labor' or 'because of the bondage'; the Hebrew term refers
      here to oppressive forced labor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now it happened
  alternatives:
  - And it happened
  - It came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new development in the story.
    'Now it happened' preserves the discourse function in readable modern English
    without archaic phrasing.
- source_word: בַיָּמִים הָרַבִּים הָהֵם
  chosen: in those many days
  alternatives:
  - during those many days
  - after many days
  lexicon: HALOT
  rationale: The phrase is literally 'in those many days.' It marks an extended period
    rather than a precise point. 'In those many days' keeps the temporal texture of
    the Hebrew better than the more interpretive 'after many days.'
- source_word: וַיָּמָת מֶלֶךְ מִצְרַיִם
  chosen: the king of Egypt died
  alternatives:
  - Egypt's king died
  lexicon: HALOT
  rationale: Straightforward narrative statement; the more standard English order
    is used while preserving the referent exactly.
- source_word: וַיֵּאָנְחוּ
  chosen: groaned
  alternatives:
  - sighed
  - moaned
  lexicon: HALOT
  rationale: The verb conveys audible distress under suffering. 'Groaned' is idiomatic
    and weighty, fitting the context of oppression.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Gender-accurate rendering of the Hebrew expression is preferred per translation
    philosophy. While it denotes the people of Israel collectively, 'sons of Israel'
    preserves the source form; 'Israelites' is possible but less transparent to the
    Hebrew wording.
- source_word: מִן הָעֲבֹדָה
  chosen: because of the slavery
  alternatives:
  - from the labor
  - because of the service
  - because of the bondage
  lexicon: HALOT
  rationale: In this context עֲבֹדָה refers to oppressive forced labor, not neutral
    work or service. 'Slavery' best communicates the coercive condition that produced
    their groaning.
- source_word: וַיִּזְעָקוּ
  chosen: cried out
  alternatives:
  - cried for help
  - wailed
  lexicon: HALOT
  rationale: The verb denotes a strong cry arising from distress. 'Cried out' is natural
    English and leaves the object implicit as in the Hebrew clause.
- source_word: וַתַּעַל שַׁוְעָתָם
  chosen: their cry for help went up
  alternatives:
  - their outcry went up
  - their plea rose up
  lexicon: HALOT
  rationale: שַׁוְעָה is a cry for aid rather than merely loud noise. 'Went up' preserves
    the vertical metaphor of the Hebrew.
- source_word: אֶל הָאֱלֹהִים
  chosen: to God
  alternatives:
  - to the true God
  lexicon: HALOT
  rationale: The text says 'to God' with the definite article on אֱלֹהִים. English
    idiom normally omits the article here. No expansion beyond the text is warranted.
- source_word: מִן הָעֲבֹדָה (second occurrence)
  chosen: because of the slavery
  alternatives:
  - because of the labor
  - from the slavery
  lexicon: HALOT
  rationale: The repeated phrase frames both their groaning and the ascent of their
    cry. Repeating 'because of the slavery' preserves the rhetorical emphasis and
    causal force.
