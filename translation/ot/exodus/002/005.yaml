theological_decisions:
- issue: Rendering תבה in the Moses narrative
  chosen_reading: basket
  alternative_readings:
  - ark
  rationale: The same Hebrew noun is used for Noah's ark and Moses' container, but in this narrative the object is a small vessel placed among reeds. 'Basket' communicates the immediate sense without suppressing the lexical link; the intertextual connection can be noted in a footnote rather than foregrounded in the main text.
