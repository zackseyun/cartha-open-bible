id: EXO.2.5
reference: Exodus 2:5
source:
  edition: WLC
  text: וַ/תֵּ֤רֶד בַּת פַּרְעֹה֙ לִ/רְחֹ֣ץ עַל הַ/יְאֹ֔ר וְ/נַעֲרֹתֶ֥י/הָ הֹלְכֹ֖ת עַל יַ֣ד הַ/יְאֹ֑ר וַ/תֵּ֤רֶא אֶת הַ/תֵּבָה֙ בְּ/ת֣וֹךְ הַ/סּ֔וּף וַ/תִּשְׁלַ֥ח אֶת אֲמָתָ֖/הּ וַ/תִּקָּחֶֽ/הָ־־־־־
translation:
  text: Then Pharaoh’s daughter went down to bathe at the Nile[a], while her young women were walking along the bank of the Nile. She saw the basket in the midst of the reeds[c][b], and she sent her servant girl and took it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the reeds.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'her female servant'; traditionally, some render 'her arm.'
    reason: alternative_reading
  - marker: c
    text: The Hebrew word translated 'basket' is the same word used for Noah’s 'ark' in Genesis 6–9.
    reason: cross_reference
lexical_decisions:
- source_word: וַתֵּרֶד
  chosen: went down
  alternatives:
  - came down
  - descended
  lexicon: HALOT
  rationale: The verb ירד commonly means 'go down/descend.' 'Went down' is natural modern English and preserves the directional sense without sounding overly formal.
- source_word: בַּת פַּרְעֹה
  chosen: Pharaoh’s daughter
  alternatives:
  - the daughter of Pharaoh
  lexicon: HALOT
  rationale: Construct phrase rendered idiomatically in English. 'Pharaoh' is a title/name-like designation conventionally transliterated.
- source_word: לִרְחֹץ
  chosen: to bathe
  alternatives:
  - to wash
  lexicon: HALOT
  rationale: רחץ can mean wash/bathe. In this context of going down to the Nile, 'to bathe' best fits the action intended.
- source_word: עַל הַיְאֹר
  chosen: at the Nile
  alternatives:
  - by the Nile
  - upon the Nile
  lexicon: HALOT
  rationale: The preposition על here functions locatively. 'At the Nile' is concise and idiomatic; 'upon the Nile' would be misleading in English.
- source_word: וְנַעֲרֹתֶיהָ
  chosen: her young women
  alternatives:
  - her maidens
  - her girls
  - her attendants
  lexicon: HALOT
  rationale: נערות denotes young women/girls. 'Young women' preserves age/gender more directly than the archaic 'maidens.' 'Attendants' is possible by context but less lexically transparent.
- source_word: הֹלְכֹת
  chosen: were walking
  alternatives:
  - walked
  - were going
  lexicon: HALOT
  rationale: The participle gives backgrounded ongoing action relative to the main wayyiqtol sequence. 'Were walking' captures that durative sense in English.
- source_word: עַל יַד הַיְאֹר
  chosen: along the bank of the Nile
  alternatives:
  - beside the Nile
  - alongside the Nile
  lexicon: HALOT
  rationale: The idiom 'at/by the hand of' means beside or along. 'Along the bank of the Nile' makes the spatial sense explicit and natural in English.
- source_word: הַתֵּבָה
  chosen: the basket
  alternatives:
  - the ark
  - the box
  lexicon: HALOT
  rationale: תבה refers here to the container for the infant Moses. Although the same word is used for Noah's ark, 'basket' best matches the smaller object in context and avoids importing later theological associations into the main text.
- source_word: בְּתוֹךְ הַסּוּף
  chosen: in the midst of the reeds
  alternatives:
  - among the reeds
  - in the rushes
  lexicon: HALOT
  rationale: סוּף refers to reeds/rushes. 'In the midst of the reeds' closely reflects the Hebrew while remaining readable.
- source_word: וַתִּשְׁלַח
  chosen: she sent
  alternatives:
  - she reached out
  - she stretched out
  lexicon: HALOT
  rationale: The verb שלח normally means 'send.' Here it governs the object אֲמָתָהּ, indicating dispatching someone rather than extending her own arm. This avoids adopting an interpretive reading unsupported by the immediate syntax.
- source_word: אֲמָתָהּ
  chosen: her female servant
  alternatives:
  - her maidservant
  - her slave-girl
  - her arm
  lexicon: HALOT
  rationale: The consonantal text can be read as 'her female servant' from אָמָה, which fits the syntax with שלח ('send'). A traditional alternative reads 'her arm,' likely influenced by vocalization/interpretation, but the servant reading is preferable in context and grammar; the alternative is preserved in a footnote.
- source_word: וַתִּקָּחֶהָ
  chosen: and took it
  alternatives:
  - and she took it
  - and fetched it
  lexicon: HALOT
  rationale: The feminine singular suffix refers back to the basket. 'Took it' is straightforward and idiomatic; the explicit subject is unnecessary in English after the prior clause.
