id: EXO.2.7
reference: Exodus 2:7
source:
  edition: WLC
  text: וַ/תֹּ֣אמֶר אֲחֹת/וֹ֮ אֶל בַּת פַּרְעֹה֒ הַ/אֵלֵ֗ךְ וְ/קָרָ֤אתִי לָ/ךְ֙ אִשָּׁ֣ה
    מֵינֶ֔קֶת מִ֖ן הָ/עִבְרִיֹּ֑ת וְ/תֵינִ֥ק לָ֖/ךְ אֶת הַ/יָּֽלֶד־־־׃
translation:
  text: Then his sister said to Pharaoh’s daughter, “Shall I go and call a nursing
    woman from the Hebrew women for you, so that she may nurse the child for you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a wet nurse from among the Hebrew women.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: אֲחֹתוֹ
  chosen: his sister
  alternatives:
  - the child's sister
  - Moses' sister
  lexicon: HALOT
  rationale: The suffix is third masculine singular, referring contextually to the
    infant. 'His sister' is the most direct rendering and leaves the referent implicit
    as in Hebrew.
- source_word: בַּת פַּרְעֹה
  chosen: Pharaoh’s daughter
  alternatives:
  - the daughter of Pharaoh
  lexicon: HALOT
  rationale: Construct chain rendered idiomatically in English with possessive form.
- source_word: הַאֵלֵךְ
  chosen: Shall I go
  alternatives:
  - May I go
  - Let me go
  lexicon: HALOT
  rationale: The interrogative with first-person imperfect expresses an offer/request.
    'Shall I go' preserves the polite proposal sense without over-paraphrase.
- source_word: וְקָרָאתִי
  chosen: and call
  alternatives:
  - and summon
  - and fetch
  lexicon: HALOT
  rationale: From קרא, here in the sense of calling/summoning someone. 'Call' is broad
    and natural; 'fetch' is interpretive.
- source_word: אִשָּׁה מֵינֶקֶת
  chosen: a nursing woman
  alternatives:
  - a nurse
  - a wet nurse
  - a woman who is nursing
  lexicon: HALOT
  rationale: Literally 'a woman, one nursing.' This denotes a woman able to suckle
    an infant. 'Nursing woman' preserves the maternal/lactation sense more transparently
    than the more idiomatic but culturally loaded 'wet nurse.'
- source_word: מִן הָעִבְרִיֹּת
  chosen: from the Hebrew women
  alternatives:
  - from among the Hebrew women
  lexicon: HALOT
  rationale: The preposition marks source/group. 'From the Hebrew women' is concise
    and accurate.
- source_word: וְתֵינִק
  chosen: so that she may nurse
  alternatives:
  - and she will nurse
  - that she may suckle
  lexicon: HALOT
  rationale: 'The verb is Hiphil of ינק, ''to cause to suck,'' i.e., to nurse/suckle.
    In context after the proposal, English idiom is best expressed as purpose/result:
    ''so that she may nurse.'''
- source_word: הַיָּלֶד
  chosen: the child
  alternatives:
  - the boy
  - the infant
  lexicon: HALOT
  rationale: ילד can mean child/boy depending on context. 'The child' fits the immediate
    scene and avoids over-specifying age or sex in English, though the referent is
    male in context.
