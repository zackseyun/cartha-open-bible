id: EXO.2.1
reference: Exodus 2:1
source:
  edition: WLC
  text: וַ/יֵּ֥לֶךְ אִ֖ישׁ מִ/בֵּ֣ית לֵוִ֑י וַ/יִּקַּ֖ח אֶת בַּת לֵוִֽי־־׃
translation:
  text: Now a man from the house of Levi went and took a daughter of Levi as his wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a Levite woman.' The Hebrew literally says 'a daughter of Levi,' meaning
      a female descendant of Levi.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - came
  - went out
  lexicon: HALOT
  rationale: The verb הלך in the wayyiqtol form normally means 'went.' In this narrative
    context it introduces the man's action without requiring an idiomatic expansion.
    Some English versions smooth it to 'went and married,' but retaining 'went' preserves
    the Hebrew sequence of actions.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a husband
  - someone
  lexicon: HALOT
  rationale: אִישׁ here denotes an individual male person. 'A man' is the plain sense
    and preserves the narrative's initial anonymity. 'Husband' would import the marital
    result too early.
- source_word: מִבֵּית לֵוִי
  chosen: from the house of Levi
  alternatives:
  - from the family of Levi
  - from the tribe of Levi
  lexicon: HALOT
  rationale: בַּיִת in construct with a tribal name commonly denotes a household/clan
    line. 'House of Levi' keeps the formal Hebrew expression and its genealogical
    flavor. 'Family of Levi' is possible but less textually transparent; 'tribe of
    Levi' is broader than the immediate phrase.
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - married
  - took as wife
  lexicon: HALOT
  rationale: לקח literally means 'took.' In marriage contexts it can function idiomatically
    for taking a woman in marriage. Because English 'took' alone can sound incomplete
    or misleading, the translation keeps the lexical core while clarifying the marital
    sense with 'as his wife' from context.
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  lexicon: HALOT
  rationale: אֶת marks the definite direct object in Hebrew and is not represented
    by a separate English word.
- source_word: בַּת לֵוִי
  chosen: a daughter of Levi
  alternatives:
  - a Levite woman
  - the daughter of Levi
  lexicon: HALOT
  rationale: The phrase literally reads 'daughter of Levi,' an idiomatic genealogical
    expression for a female descendant of Levi. 'A daughter of Levi' preserves the
    Hebrew wording and the parallel with 'house of Levi.' 'A Levite woman' is interpretive
    but acceptable; it is preserved in a footnote as a lexical alternative.
