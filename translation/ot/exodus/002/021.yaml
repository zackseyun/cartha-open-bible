id: EXO.2.21
reference: Exodus 2:21
source:
  edition: WLC
  text: וַ/יּ֥וֹאֶל מֹשֶׁ֖ה לָ/שֶׁ֣בֶת אֶת הָ/אִ֑ישׁ וַ/יִּתֵּ֛ן אֶת צִפֹּרָ֥ה בִתּ֖/וֹ לְ/מֹשֶֽׁה־־׃
translation:
  text: And Moses agreed to dwell with the man[b][a], and he gave Zipporah his daughter to Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Moses was willing to dwell with the man.' The Hebrew verb can express willingness, consent, or contentment.
    reason: lexical_alternative
  - marker: b
    text: That is, he gave Zipporah to Moses in marriage.
    reason: cultural_note
lexical_decisions:
- source_word: וַיּוֹאֶל
  chosen: agreed
  alternatives:
  - was willing
  - consented
  - determined
  lexicon: HALOT
  rationale: The verb יאל in this form commonly conveys willingness or consent. 'Agreed' is natural modern English and fits the construction with the infinitive 'to dwell.' Because the verb can also suggest being content or willing, an alternative is worth preserving in a footnote.
- source_word: לָשֶׁבֶת
  chosen: to dwell
  alternatives:
  - to live
  - to stay
  lexicon: HALOT
  rationale: ישב often means 'sit,' but with ל plus infinitive in this context it refers to residing or living. 'Dwell' preserves the slightly more formal sense of taking up residence without sounding archaic.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the האיש, i.e., Reuel/Jethro
  lexicon: HALOT
  rationale: The Hebrew uses the common noun 'the man,' referring to the priest of Midian introduced in context. The translation keeps the generic expression rather than replacing it with a proper name not present in this verse.
- source_word: וַיִּתֵּן
  chosen: he gave
  alternatives:
  - he gave in marriage
  lexicon: HALOT
  rationale: נתן literally means 'gave.' In this marriage context English readers may infer 'gave in marriage,' but the Hebrew itself simply says 'gave,' so the main text preserves the simpler wording.
- source_word: צִפֹּרָה
  chosen: Zipporah
  rationale: Personal names are transliterated by standard convention per translation philosophy.
- source_word: בִתּוֹ
  chosen: his daughter
  lexicon: HALOT
  rationale: The suffix clearly refers to the subject of 'he gave'; 'his daughter' is the straightforward possessive rendering.
- source_word: לְמֹשֶׁה
  chosen: to Moses
  alternatives:
  - as wife to Moses
  lexicon: HALOT
  rationale: The preposition ל marks the recipient. Although the marriage sense is implicit, 'to Moses' is the direct and textually restrained rendering.
