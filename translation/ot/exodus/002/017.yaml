id: EXO.2.17
reference: Exodus 2:17
source:
  edition: WLC
  text: וַ/יָּבֹ֥אוּ הָ/רֹעִ֖ים וַ/יְגָרְשׁ֑וּ/ם וַ/יָּ֤קָם מֹשֶׁה֙ וַ/יּ֣וֹשִׁעָ֔/ן
    וַ/יַּ֖שְׁקְ אֶת צֹאנָֽ/ם־׃
translation:
  text: Then the shepherds came and drove them away, but Moses stood up and saved
    them, and watered their flock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'delivered them.' The Hebrew verb can denote rescue or deliverance; here
      it refers to Moses rescuing the women from the shepherds' harassment.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרֹעִים
  chosen: the shepherds
  alternatives:
  - the herdsmen
  lexicon: HALOT
  rationale: The participial form from רעה functions substantivally for those tending
    flocks. 'Shepherds' is the most natural English equivalent here and fits the immediate
    context of watering sheep.
- source_word: וַיְגָרְשׁוּם
  chosen: drove them away
  alternatives:
  - chased them away
  - expelled them
  lexicon: HALOT
  rationale: גרש commonly means to drive out or expel. With the 3mp suffix referring
    to the women, 'drove them away' is idiomatic and preserves the force of hostile
    action.
- source_word: וַיָּקָם
  chosen: stood up
  alternatives:
  - rose up
  - got up
  lexicon: HALOT
  rationale: קום in the wayyiqtol here marks Moses' decisive response. 'Stood up'
    is natural modern English and retains the sense of taking action.
- source_word: וַיּוֹשִׁעָן
  chosen: saved them
  alternatives:
  - delivered them
  - helped them
  lexicon: HALOT
  rationale: The Hifil of ישׁע means to save or deliver. 'Saved them' preserves the
    stronger lexical sense rather than weakening it to mere assistance, while in context
    it refers to rescue from harassment rather than necessarily from mortal danger.
- source_word: וַיַּשְׁקְ
  chosen: watered
  alternatives:
  - gave water to
  lexicon: HALOT
  rationale: שקה means to give water to or water. 'Watered' is concise and idiomatic
    for livestock.
- source_word: צֹאנָם
  chosen: their flock
  alternatives:
  - their sheep
  - their small livestock
  lexicon: HALOT
  rationale: צאן is a collective noun for small livestock, often sheep and goats.
    'Their flock' preserves the collective sense without over-specifying species;
    the masculine plural suffix refers back to the daughters' father/household possession
    rather than changing the immediate subject of the narrative.
- source_word: וַיָּבֹאוּ
  chosen: Then ... came
  alternatives:
  - And ... came
  lexicon: HALOT
  rationale: The wayyiqtol advances the narrative. 'Then' renders the sequential force
    in readable English better than repeating 'and' mechanically.
