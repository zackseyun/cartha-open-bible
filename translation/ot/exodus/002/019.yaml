id: EXO.2.19
reference: Exodus 2:19
source:
  edition: WLC
  text: וַ/תֹּאמַ֕רְןָ אִ֣ישׁ מִצְרִ֔י הִצִּילָ֖/נוּ מִ/יַּ֣ד הָ/רֹעִ֑ים וְ/גַם דָּלֹ֤ה דָלָה֙ לָ֔/נוּ וַ/יַּ֖שְׁקְ אֶת הַ/צֹּֽאן־־׃
translation:
  text: They said[a], “An Egyptian man rescued us from the hand of the shepherds[b], and he even drew water for us and watered the flock.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the power of the shepherds'; literally, 'from the hand of the shepherds.'
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew intensifies the verb: literally, ''he even drawing drew for us,'' emphasizing that he personally drew the water.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמַרְןָ
  chosen: They said
  alternatives:
  - And they said
  lexicon: HALOT
  rationale: Wayyiqtol 3fp of אמר introduces the daughters' report. English can omit the connective for natural style, though 'and' is possible.
- source_word: אִישׁ מִצְרִי
  chosen: An Egyptian man
  alternatives:
  - An Egyptian
  - A man, an Egyptian
  lexicon: HALOT
  rationale: אִישׁ literally 'man' with adjectival/nominal modifier 'Egyptian.' Rendering both elements preserves the Hebrew description and avoids flattening it to merely 'an Egyptian.'
- source_word: הִצִּילָנוּ
  chosen: rescued us
  alternatives:
  - delivered us
  - saved us
  lexicon: HALOT
  rationale: Hiphil of נצל means to snatch away, rescue, deliver. 'Rescued' is idiomatic modern English and fits the immediate physical danger.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from
  - out of the power of
  lexicon: HALOT
  rationale: The idiom literally means 'from the hand of,' denoting power/control. Retaining 'hand' preserves the Hebrew imagery while remaining clear in English.
- source_word: הָרֹעִים
  chosen: the shepherds
  alternatives:
  - the herdsmen
  lexicon: HALOT
  rationale: Participle/noun from רעה, here referring to the men tending flocks who had driven the women away. 'Shepherds' is the most direct rendering.
- source_word: וְגַם
  chosen: and he even
  alternatives:
  - and also
  - moreover he
  lexicon: HALOT
  rationale: Adds emphasis beyond the first act of rescue. 'Even' captures the sense that Moses did more than expected.
- source_word: דָּלֹה דָלָה
  chosen: drew water
  alternatives:
  - surely drew water
  - drew and drew
  lexicon: HALOT
  rationale: Infinitive absolute plus finite verb of דלה intensifies the action. English commonly expresses this with a simple finite verb in context; the added emphasis is represented by 'even' in the clause.
- source_word: לָנוּ
  chosen: for us
  alternatives:
  - for our benefit
  lexicon: HALOT
  rationale: Dative pronoun indicating the action was done on their behalf.
- source_word: וַיַּשְׁקְ
  chosen: watered
  alternatives:
  - gave water to
  - let drink
  lexicon: HALOT
  rationale: Hiphil of שקה means to give drink/water. 'Watered' is concise and idiomatic with livestock as object.
- source_word: אֶת־הַצֹּאן
  chosen: the flock
  alternatives:
  - the sheep
  - the small livestock
  lexicon: HALOT
  rationale: צאן is a collective for small livestock, often sheep/goats. 'The flock' preserves the collective sense without over-specifying species.
