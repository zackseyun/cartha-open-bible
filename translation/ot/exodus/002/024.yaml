theological_decisions:
- issue: Anthropomorphic language in 'God remembered'
  chosen_reading: Retain 'remembered' in the main text without explanatory expansion.
  alternative_readings:
  - God called to mind his covenant
  - God turned his attention to his covenant
  - God acted on his covenant
  rationale: 'The Hebrew uses ordinary anthropomorphic covenant language. Expanding
    it to ''acted on'' would interpret rather than translate and would reduce the
    theological tension the text itself preserves: God ''remembering'' signals covenant
    faithfulness, not prior forgetfulness. The translation therefore keeps the lexical
    form and lets context supply the covenantal sense.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
