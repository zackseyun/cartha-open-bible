id: EXO.2.24
reference: Exodus 2:24
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֥ע אֱלֹהִ֖ים אֶת נַאֲקָתָ֑/ם וַ/יִּזְכֹּ֤ר אֱלֹהִים֙ אֶת בְּרִית֔/וֹ
    אֶת אַבְרָהָ֖ם אֶת יִצְחָ֥ק וְ/אֶֽת יַעֲקֹֽב־־־־־׃
translation:
  text: God heard their groaning, and God remembered his covenant with Abraham, with
    Isaac, and with Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their groan.' The Hebrew noun can denote a cry or groaning under oppression.
    reason: lexical_alternative
  - marker: b
    text: '''Remembered'' is covenant language: it does not imply that God had forgotten,
      but that he turned in faithfulness to his covenant obligations.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - listened to
  lexicon: HALOT
  rationale: The verb שׁמע in this narrative wayyiqtol form most naturally means 'heard.'
    'Listened to' is possible in some contexts, but here the emphasis is on God's
    reception of Israel's cry rather than on a prolonged act of listening.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although morphologically plural in form, אֱלֹהִים here takes singular
    verbal forms and clearly refers to the one God of Israel, so 'God' is the correct
    English rendering.
- source_word: נַאֲקָתָם
  chosen: their groaning
  alternatives:
  - their groan
  - their lament
  lexicon: HALOT
  rationale: נַאֲקָה denotes groaning or anguished outcry under suffering. 'Groaning'
    best captures the collective, ongoing distress in context. 'Lament' is too interpretive
    and can suggest a more formal expression.
- source_word: וַיִּזְכֹּר
  chosen: remembered
  alternatives:
  - called to mind
  - acted on behalf of in remembrance of
  lexicon: HALOT
  rationale: The plain lexical sense is 'remembered.' In covenant contexts the verb
    often implies ensuing action, but the translation should preserve the source wording
    and not paraphrase the implication into the main text.
- source_word: בְּרִיתוֹ
  chosen: his covenant
  lexicon: HALOT
  rationale: 'בְּרִית is the standard term for ''covenant.'' The suffix indicates
    possession: God''s covenant. This preserves the formal covenantal language central
    to the passage.'
- source_word: אֶת אַבְרָהָם אֶת יִצְחָק וְאֶת יַעֲקֹב
  chosen: with Abraham, with Isaac, and with Jacob
  alternatives:
  - with Abraham, Isaac, and Jacob
  - made with Abraham, Isaac, and Jacob
  lexicon: HALOT
  rationale: The repeated object markers identify the patriarchs as those associated
    with the covenant. English idiom commonly supplies 'with' after 'covenant' to
    make the relationship explicit. Repeating 'with' preserves some of the Hebrew
    emphasis and cadence without becoming wooden.
