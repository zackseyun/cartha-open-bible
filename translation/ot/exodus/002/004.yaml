id: EXO.2.4
reference: Exodus 2:4
source:
  edition: WLC
  text: וַ/תֵּתַצַּ֥ב אֲחֹת֖/וֹ מֵ/רָחֹ֑ק לְ/דֵעָ֕ה מַה יֵּעָשֶׂ֖ה לֽ/וֹ־׃
translation:
  text: And his sister stood at a distance[b][a], to know what would be done to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from afar' or 'far off.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to find out what would happen to him.' The Hebrew more literally reads 'to know what would be done to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּתַצַּב
  chosen: stood
  alternatives:
  - stationed herself
  - took her stand
  lexicon: HALOT
  rationale: The Hitpael/waw-consecutive form of יצב conveys taking or maintaining a standing position. 'Stood' is natural modern English and adequately preserves the sense without overtranslating reflexivity.
- source_word: אֲחֹתוֹ
  chosen: his sister
  lexicon: HALOT
  rationale: Straightforward construct with 3ms suffix. 'His sister' is the natural and precise rendering.
- source_word: מֵרָחֹק
  chosen: at a distance
  alternatives:
  - from afar
  - far off
  lexicon: HALOT
  rationale: The phrase denotes spatial distance. 'At a distance' is idiomatic contemporary English; 'from afar' is possible but more literary.
- source_word: לְדֵעָה
  chosen: to know
  alternatives:
  - to find out
  - to learn
  lexicon: HALOT
  rationale: Infinitive of ידע expressing purpose. 'To know' is formally close to the Hebrew; the context implies finding out, but the simpler wording preserves the source well.
- source_word: מַה
  chosen: what
  alternatives:
  - what thing
  lexicon: HALOT
  rationale: Standard interrogative pronoun introducing the content of what she wanted to know.
- source_word: יֵּעָשֶׂה
  chosen: would be done
  alternatives:
  - might be done
  - was going to be done
  - would happen
  lexicon: HALOT
  rationale: 'Niphal imperfect of עשה here is best rendered as a passive: ''be done.'' ''Would be done'' fits the narrative perspective and preserves the passive better than the more general ''would happen.'''
- source_word: לוֹ
  chosen: to him
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The preposition ל with passive עשה can mean what would be done 'to' him or 'for' him depending on context. Here, given the vulnerable infant and the uncertainty of his fate, 'to him' best captures the likely sense while remaining idiomatic.
