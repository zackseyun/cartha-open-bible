theological_decisions:
- issue: Meaning of the final clause וַיֵּדַע אֱלֹהִים with no explicit object
  chosen_reading: and God knew
  alternative_readings:
  - and God took notice
  - and God was concerned
  - and God acknowledged them
  rationale: The Hebrew text is strikingly terse and leaves the object implicit. To
    preserve theological tension rather than resolve it, the main text keeps the literal
    'knew,' while a footnote records interpretive expansions that many translations
    adopt. This avoids importing a more specific doctrinal or emotional nuance than
    the text explicitly states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
