id: EXO.2.6
reference: Exodus 2:6
source:
  edition: WLC
  text: וַ/תִּפְתַּח֙ וַ/תִּרְאֵ֣/הוּ אֶת הַ/יֶּ֔לֶד וְ/הִנֵּה נַ֖עַר בֹּכֶ֑ה וַ/תַּחְמֹ֣ל עָלָ֔י/ו וַ/תֹּ֕אמֶר מִ/יַּלְדֵ֥י הָֽ/עִבְרִ֖ים זֶֽה־־׃
translation:
  text: She opened it and saw him[a], the child, and behold, a boy was crying. She had compassion on him and said[c][b], “This is one of the Hebrews’ children.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “She opened it and saw him.” The Hebrew uses a masculine singular suffix before explicitly identifying him as “the child.”
    reason: lexical_alternative
  - marker: b
    text: “Behold” renders a Hebrew particle that draws vivid attention to what she saw.
    reason: lexical_alternative
  - marker: c
    text: Or “She took pity on him.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּפְתַּח
  chosen: She opened it
  alternatives:
  - She opened
  lexicon: HALOT
  rationale: The verb means 'opened.' English supplies the object 'it' from context (the basket/ark) because the following pronominal object on 'saw him/it' makes the sequence clearer and more natural in English without adding new content.
- source_word: וַתִּרְאֵהוּ
  chosen: and saw the child
  alternatives:
  - and saw him/it
  lexicon: HALOT
  rationale: The suffix is masculine singular ('him/it'), but the immediately following accusative phrase אֶת־הַיֶּלֶד identifies the referent as 'the child.' Rendering the explicit noun in English avoids awkwardness and reflects the appositional clarification in Hebrew.
- source_word: הַיֶּלֶד
  chosen: the child
  alternatives:
  - the boy
  - the infant
  lexicon: HALOT
  rationale: יֶלֶד is a general term for a child. 'Child' is broad enough to fit the context and avoids prematurely narrowing the sense before the next clause's נַעַר.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: הִנֵּה is a discourse particle drawing attention to what is seen. 'Behold' preserves the vividness and surprise of the Hebrew better than a flatter rendering.
- source_word: נַעַר
  chosen: a boy
  alternatives:
  - a child
  - a youth
  lexicon: HALOT
  rationale: Though נַעַר can denote a range from child to young man, here it functions descriptively of the baby Moses from the observer's perspective. 'Boy' is idiomatic and preserves the male reference without implying adolescence.
- source_word: בֹּכֶה
  chosen: was crying
  alternatives:
  - crying
  - weeping
  lexicon: HALOT
  rationale: The participle conveys ongoing action at the moment she sees him. 'Was crying' captures the progressive sense naturally in English.
- source_word: וַתַּחְמֹל עָלָיו
  chosen: She had compassion on him
  alternatives:
  - She took pity on him
  - She spared him
  lexicon: HALOT
  rationale: חמל with עַל expresses pity/compassion. 'Had compassion on him' preserves the emotional force without importing the later action of sparing as the primary sense.
- source_word: מִיַּלְדֵי הָעִבְרִים
  chosen: one of the Hebrews’ children
  alternatives:
  - from the Hebrews' children
  - one of the Hebrew children
  - one of the children of the Hebrews
  lexicon: HALOT
  rationale: 'The מן construction is partitive: ''from/of the children of the Hebrews.'' ''One of the Hebrews’ children'' is natural English and preserves the sense that she identifies the child as belonging to the Hebrew people.'
- source_word: הָעִבְרִים
  chosen: the Hebrews
  alternatives:
  - the Hebrew people
  lexicon: HALOT
  rationale: עִבְרִים is the ethnic designation 'Hebrews.' The standard rendering is clear and contextually appropriate.
- source_word: זֶה
  chosen: This is
  alternatives:
  - This one is
  lexicon: HALOT
  rationale: The demonstrative points to the child before her. 'This is' is idiomatic English in direct speech.
