id: EXO.2.18
reference: Exodus 2:18
source:
  edition: WLC
  text: וַ/תָּבֹ֕אנָה אֶל רְעוּאֵ֖ל אֲבִי/הֶ֑ן וַ/יֹּ֕אמֶר מַדּ֛וּעַ מִהַרְתֶּ֥ן בֹּ֖א
    הַ/יּֽוֹם־׃
translation:
  text: When they came to Reuel their father, he said, “Why have you come back so
    quickly today?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “Why have you hurried to come today?” The Hebrew uses
      the verb “hurry” with “come.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹאנָה
  chosen: When they came
  alternatives:
  - And they came
  - Then they came
  lexicon: HALOT
  rationale: Wayyiqtol 3rd feminine plural of בוא, referring to the daughters. Rendered
    with 'When they came' for natural English narrative flow while preserving the
    temporal/sequential sense.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is the natural modern English
    equivalent.
- source_word: רְעוּאֵל
  chosen: Reuel
  alternatives:
  - Raguel
  rationale: Personal name is transliterated per translation philosophy. 'Reuel' follows
    the Hebrew form more directly than the Greek-influenced 'Raguel'.
- source_word: אֲבִיהֶן
  chosen: their father
  alternatives:
  - their ancestor
  lexicon: HALOT
  rationale: Construct form of 'father' with 3fp suffix. In context it denotes the
    immediate paternal figure of the daughters, so 'their father' is the plain sense.
- source_word: וַיֹּאמֶר
  chosen: he said
  alternatives:
  - and he said
  - then he said
  lexicon: HALOT
  rationale: Standard narrative verb אמר. 'He said' is idiomatic and preserves the
    speech introduction.
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Interrogative adverb asking reason; 'Why' is the direct and natural rendering.
- source_word: מִהַרְתֶּן
  chosen: have you come back so quickly
  alternatives:
  - have you hurried
  - have you returned quickly
  lexicon: HALOT
  rationale: Piel perfect 2fp of מהר conveys acting quickly/hastening. In context,
    with the following infinitive בֹּא and the daughters returning from the well,
    English idiom is best captured by 'have you come back so quickly' rather than
    the less natural 'have you hurried to come.'
- source_word: בֹּא
  chosen: come back
  alternatives:
  - come
  - arrive
  lexicon: HALOT
  rationale: Infinitive construct/complement with מהר. Although בוא literally means
    'come,' the context is return to their father, so 'come back' makes the situational
    sense explicit without over-paraphrasing.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Definite 'the day' functions idiomatically as 'today' in English.
