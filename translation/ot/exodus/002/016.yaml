id: EXO.2.16
reference: Exodus 2:16
source:
  edition: WLC
  text: וּ/לְ/כֹהֵ֥ן מִדְיָ֖ן שֶׁ֣בַע בָּנ֑וֹת וַ/תָּבֹ֣אנָה וַ/תִּדְלֶ֗נָה וַ/תְּמַלֶּ֨אנָה֙
    אֶת הָ֣/רְהָטִ֔ים לְ/הַשְׁק֖וֹת צֹ֥אן אֲבִי/הֶֽן־׃
translation:
  text: Now the priest of Midian had seven daughters, and they came and drew water
    and filled the troughs to water their father's flock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a priest of Midian.' The Hebrew can identify him either as a specific
      known priest or simply as one priest associated with Midian.
    reason: lexical_alternative
  - marker: b
    text: '''Drew water'' translates a verb meaning to draw up water from a well.'
    reason: cultural_note
lexical_decisions:
- source_word: וּלְכֹהֵן
  chosen: Now the priest
  alternatives:
  - And the priest
  - Now a priest
  lexicon: HALOT
  rationale: כֹּהֵן ordinarily means 'priest.' The prefixed conjunction is rendered
    'Now' to introduce a new participant smoothly in English narrative, while preserving
    the discourse shift signaled by waw.
- source_word: מִדְיָן
  chosen: of Midian
  alternatives:
  - in Midian
  - the Midianite
  lexicon: HALOT
  rationale: The construct-like relation is most naturally rendered 'of Midian,' identifying
    the priest by regional association rather than ethnicity.
- source_word: שֶׁבַע בָּנוֹת
  chosen: had seven daughters
  alternatives:
  - there were seven daughters to
  - seven daughters belonged to
  lexicon: HALOT
  rationale: 'Hebrew nominal clause literally ''and to the priest of Midian [were]
    seven daughters'' is idiomatically expressed in English as possession: ''had seven
    daughters.'''
- source_word: וַתָּבֹאנָה
  chosen: they came
  alternatives:
  - they arrived
  lexicon: HALOT
  rationale: Simple narrative wayyiqtol of בוא, best rendered with the straightforward
    past 'came.'
- source_word: וַתִּדְלֶנָה
  chosen: drew water
  alternatives:
  - drew
  - drew up water
  lexicon: HALOT
  rationale: The verb דלה in this context refers to drawing water from a well. 'Drew
    water' makes the implied object explicit in natural English.
- source_word: וַתְּמַלֶּאנָה
  chosen: filled
  alternatives:
  - filled up
  lexicon: HALOT
  rationale: Standard rendering of מלא in the plural feminine narrative sequence.
- source_word: הָרְהָטִים
  chosen: the troughs
  alternatives:
  - the watering troughs
  - the channels
  lexicon: HALOT
  rationale: רְהָטִים refers to receptacles or runnels used for watering animals.
    'Troughs' is the clearest natural English equivalent here.
- source_word: לְהַשְׁקֹות
  chosen: to water
  alternatives:
  - for watering
  - to give drink to
  lexicon: HALOT
  rationale: Hiphil infinitive of שקה means to cause to drink, idiomatically 'to water'
    livestock.
- source_word: צֹאן
  chosen: flock
  alternatives:
  - small livestock
  - sheep and goats
  lexicon: HALOT
  rationale: צֹאן is a collective term for small livestock, especially sheep/goats.
    'Flock' is the natural collective rendering in English.
- source_word: אֲבִיהֶן
  chosen: their father's
  alternatives:
  - of their father
  lexicon: HALOT
  rationale: The pronominal suffix is rendered with the natural English possessive
    construction.
