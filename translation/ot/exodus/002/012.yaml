id: EXO.2.12
reference: Exodus 2:12
source:
  edition: WLC
  text: וַ/יִּ֤פֶן כֹּה֙ וָ/כֹ֔ה וַ/יַּ֖רְא כִּ֣י אֵ֣ין אִ֑ישׁ וַ/יַּךְ֙ אֶת הַ/מִּצְרִ֔י וַֽ/יִּטְמְנֵ֖/הוּ בַּ/חֽוֹל־׃
translation:
  text: He looked this way and that[a], and when he saw that there was no one there, he struck down the Egyptian and hid him in the sand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that no one was there.' The Hebrew reads literally 'that there was no man,' but the phrase may function generically for the absence of any person.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפֶן
  chosen: He looked
  alternatives:
  - He turned
  - He turned aside
  lexicon: HALOT
  rationale: The verb פנה literally means 'turn,' but in the idiom with כֹּה וָכֹה it conveys directing one's attention visually in different directions. 'He looked' gives the plain sense in natural English while preserving the action.
- source_word: כֹּה וָכֹה
  chosen: this way and that
  alternatives:
  - here and there
  - one way and the other
  lexicon: HALOT
  rationale: This adverbial pair is an idiom meaning in both directions. 'This way and that' is a natural English equivalent that preserves the sense of scanning around.
- source_word: וַיַּרְא כִּי אֵין אִישׁ
  chosen: when he saw that there was no man there
  alternatives:
  - and saw that there was no one
  - and saw that no one was there
  lexicon: HALOT
  rationale: אִישׁ is literally 'man.' In context it refers to the absence of any person who might witness the act. Because the translation philosophy prefers gender-accurate renderings, 'no man' is retained in the main text, while the contextual alternative 'no one' is worth preserving in a footnote.
- source_word: וַיַּךְ
  chosen: he struck down
  alternatives:
  - he struck
  - he killed
  lexicon: HALOT
  rationale: נכה fundamentally means 'strike/smite.' In this context the result is death, made clear by the following burial, so 'struck down' captures both the literal act and its lethal outcome without over-paraphrasing as an explicit 'killed' where the Hebrew uses the more basic verb.
- source_word: הַמִּצְרִי
  chosen: the Egyptian
  lexicon: HALOT
  rationale: A straightforward ethnic/national designation with the article; no reason to expand beyond the Hebrew.
- source_word: וַיִּטְמְנֵהוּ
  chosen: hid him
  alternatives:
  - buried him
  - concealed him
  lexicon: HALOT
  rationale: טמן means 'hide, conceal.' Given the location 'in the sand,' the act involves covering the body, but 'hid him' best matches the lexical sense while allowing the context to imply the manner.
- source_word: בַּחוֹל
  chosen: in the sand
  alternatives:
  - in the dune-sand
  - in the loose soil
  lexicon: HALOT
  rationale: חוֹל means 'sand.' The definite article is naturally represented in English as 'the sand.'
