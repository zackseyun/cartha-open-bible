id: EXO.2.3
reference: Exodus 2:3
source:
  edition: WLC
  text: וְ/לֹא יָכְלָ֣ה עוֹד֮ הַצְּפִינ/וֹ֒ וַ/תִּֽקַּֽח ל/וֹ֙ תֵּ֣בַת גֹּ֔מֶא וַ/תַּחְמְרָ֥/ה
    בַ/חֵמָ֖ר וּ/בַ/זָּ֑פֶת וַ/תָּ֤שֶׂם בָּ/הּ֙ אֶת הַ/יֶּ֔לֶד וַ/תָּ֥שֶׂם בַּ/סּ֖וּף
    עַל שְׂפַ֥ת הַ/יְאֹֽר־־־־׃
translation:
  text: But when she could no longer hide him, she took for him a papyrus basket and
    coated it with bitumen and pitch. Then she put the child in it and placed it among
    the reeds by the bank of the Nile.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a papyrus ark.' The Hebrew word tebah is the same word used for Noah's
      ark in Genesis, preserving a literary echo of deliverance through water.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצְּפִינוֹ
  chosen: hide him
  alternatives:
  - conceal him
  - keep him hidden
  lexicon: HALOT
  rationale: The Hiphil infinitive construct of צפן with 3ms suffix means to hide
    or conceal him. 'Hide him' is natural modern English and preserves the concrete
    action.
- source_word: תֵּבַת
  chosen: basket
  alternatives:
  - ark
  - box
  lexicon: HALOT
  rationale: The noun denotes a container/chest; in Exodus 2 it refers to a small
    vessel made for the infant. 'Basket' best fits the immediate material description
    and modern readability. 'Ark' is possible and creates an intertextual echo with
    Noah's תבה, but in contemporary English it can sound overly traditional or misleadingly
    grand; the alternative is preserved in a footnote because the lexical link is
    significant.
- source_word: גֹּמֶא
  chosen: papyrus
  alternatives:
  - reeds
  - bulrushes
  lexicon: HALOT
  rationale: The term refers specifically to papyrus plants rather than reeds in general.
    'Papyrus' is more precise to the source and fits the Egyptian setting.
- source_word: וַתַּחְמְרָה בַחֵמָר
  chosen: coated it with bitumen
  alternatives:
  - smeared it with asphalt
  - covered it with tar
  lexicon: HALOT
  rationale: The verb from חמר in this stem means to smear or coat, and חֵמָר refers
    to bitumen/asphalt. 'Coated it with bitumen' is accurate and readable.
- source_word: וּבַזָּפֶת
  chosen: and pitch
  alternatives:
  - and tar
  lexicon: HALOT
  rationale: זפת denotes pitch/resinous waterproofing material. 'Pitch' is the standard
    concise rendering and pairs naturally with 'bitumen'.
- source_word: הַיֶּלֶד
  chosen: the child
  alternatives:
  - the boy
  - the baby
  lexicon: HALOT
  rationale: Although the referent is an infant boy, יֶלֶד broadly means child/boy.
    'The child' is faithful and avoids over-specifying age beyond the Hebrew term.
- source_word: בַּסּוּף
  chosen: among the reeds
  alternatives:
  - in the reeds
  - among the rushes
  lexicon: HALOT
  rationale: סוּף refers to reeds/rushes. 'Among the reeds' conveys placement within
    the vegetation and reads naturally in English.
- source_word: עַל שְׂפַת הַיְאֹר
  chosen: by the bank of the Nile
  alternatives:
  - on the bank of the river
  - at the edge of the Nile
  lexicon: HALOT
  rationale: יְאֹר in Exodus commonly refers to the Nile, not merely any river, reflecting
    the Egyptian context. 'By the bank of the Nile' is idiomatic English and preserves
    the location.
- source_word: לֹא יָכְלָה עוֹד
  chosen: could no longer
  alternatives:
  - was no longer able to
  - could not any longer
  lexicon: HALOT
  rationale: This idiomatic combination expresses inability continuing to a limit.
    'Could no longer' is the most natural concise English equivalent.
- source_word: לּוֹ
  chosen: for him
  alternatives:
  - a basket for him
  - for the child
  lexicon: HALOT
  rationale: The dative pronoun is retained explicitly in English because it is present
    in the Hebrew and clarifies that the basket was procured for the child.
