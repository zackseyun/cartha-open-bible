id: EXO.2.15
reference: Exodus 2:15
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֤ע פַּרְעֹה֙ אֶת הַ/דָּבָ֣ר הַ/זֶּ֔ה וַ/יְבַקֵּ֖שׁ לַ/הֲרֹ֣ג אֶת
    מֹשֶׁ֑ה וַ/יִּבְרַ֤ח מֹשֶׁה֙ מִ/פְּנֵ֣י פַרְעֹ֔ה וַ/יֵּ֥שֶׁב בְּ/אֶֽרֶץ מִדְיָ֖ן
    וַ/יֵּ֥שֶׁב עַֽל הַ/בְּאֵֽר־־־־׃
translation:
  text: When Pharaoh heard this matter, he sought to kill Moses. But Moses fled from
    Pharaoh and stayed in the land of Midian, and he sat down by the well.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heard this thing' or 'learned of this incident.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew uses the same verb twice ('settled' / 'sat down'), first for
      residing in Midian and then for physically sitting by the well.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - learned of
  lexicon: HALOT
  rationale: Basic sense of שׁמע is 'hear.' In context it refers to Pharaoh becoming
    aware of the incident, but 'heard' preserves the Hebrew wording naturally in English.
- source_word: הַדָּבָר הַזֶּה
  chosen: this matter
  alternatives:
  - this thing
  - this incident
  lexicon: HALOT
  rationale: דבר here refers to the reported event of Moses killing the Egyptian.
    'This matter' is idiomatic modern English and remains close to the source without
    over-specifying.
- source_word: וַיְבַקֵּשׁ לַהֲרֹג
  chosen: sought to kill
  alternatives:
  - tried to kill
  - wanted to kill
  lexicon: HALOT
  rationale: בקש + infinitive commonly expresses seeking or attempting to do something.
    'Sought to kill' is a standard, accurate rendering that preserves both intent
    and action.
- source_word: וַיִּבְרַח ... מִפְּנֵי
  chosen: fled from
  alternatives:
  - fled before
  - escaped from the presence of
  lexicon: HALOT
  rationale: ברח with מִפְּנֵי literally conveys fleeing from before someone's presence.
    'Fled from' is the most natural English equivalent and preserves the sense adequately.
- source_word: וַיֵּשֶׁב בְּאֶרֶץ מִדְיָן
  chosen: settled in the land of Midian
  alternatives:
  - lived in the land of Midian
  - dwelt in the land of Midian
  lexicon: HALOT
  rationale: ישׁב often means to sit, dwell, remain, or settle depending on context.
    Here the first occurrence indicates taking up residence in Midian, so 'settled
    in' best reflects the contextual nuance.
- source_word: וַיֵּשֶׁב עַל הַבְּאֵר
  chosen: he sat down by the well
  alternatives:
  - he sat at the well
  - he remained by the well
  lexicon: HALOT
  rationale: The second use of ישׁב returns to its more concrete sense 'sit.' With
    עַל in this context, English idiom favors 'by the well' rather than the more wooden
    'upon/at the well.' The added 'down' reflects the ingressive sense naturally.
- source_word: הַבְּאֵר
  chosen: the well
  lexicon: HALOT
  rationale: Definite article is present in Hebrew. 'The well' preserves the definiteness,
    likely referring to a known local well in the narrative setting.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  rationale: Standard English transliteration of the royal title/name.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names.
