id: EXO.2.20
reference: Exodus 2:20
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר אֶל בְּנֹתָ֖י/ו וְ/אַיּ֑/וֹ לָ֤/מָּה זֶּה֙ עֲזַבְתֶּ֣ן אֶת הָ/אִ֔ישׁ
    קִרְאֶ֥ן ל֖/וֹ וְ/יֹ֥אכַל לָֽחֶם־־׃
translation:
  text: And he said to his daughters, “Then where is he? Why is it that you left the
    man? Call him, so that he may eat bread.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'eat bread,' an idiom for sharing a meal or taking food.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  - So he said
  lexicon: HALOT
  rationale: Standard waw-consecutive narrative form introducing Reuel's speech; 'And
    he said' preserves Hebrew narrative flow without overinterpreting the conjunction.
- source_word: בְּנֹתָיו
  chosen: to his daughters
  alternatives:
  - to his girls
  lexicon: HALOT
  rationale: Literal familial term with 3ms suffix; 'daughters' is the natural and
    accurate English equivalent.
- source_word: וְאַיּוֹ
  chosen: Then where is he?
  alternatives:
  - And where is he?
  - So where is he?
  lexicon: HALOT
  rationale: Interrogative of place with prefixed conjunction. 'Then' fits the discourse
    progression naturally in English after hearing their report, while retaining the
    connective sense.
- source_word: לָמָּה זֶּה
  chosen: Why is it that
  alternatives:
  - Why this
  - Why
  lexicon: HALOT
  rationale: The combination adds emphasis in Hebrew. 'Why is it that' reflects the
    idiomatic force better than a bare 'Why' while remaining readable.
- source_word: עֲזַבְתֶּן
  chosen: you left
  alternatives:
  - you abandoned
  - you forsook
  lexicon: HALOT
  rationale: Second feminine plural matches the daughters. 'Left' fits the immediate
    context of departing from the man; 'abandoned/forsook' would sound too strong
    in English here.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - that man
  lexicon: HALOT
  rationale: Definite noun referring to the man just mentioned in context. 'The man'
    is the straightforward rendering.
- source_word: קִרְאֶן לוֹ
  chosen: Call him
  alternatives:
  - Invite him
  - Summon him
  lexicon: HALOT
  rationale: Imperative feminine plural plus preposition/suffix. 'Call him' is formally
    close and idiomatic; in context it implies inviting him in, but the more literal
    wording is preferable in the main text.
- source_word: וְיֹאכַל לָחֶם
  chosen: so that he may eat bread
  alternatives:
  - and let him eat bread
  - that he may have something to eat
  - and he may eat a meal
  lexicon: HALOT
  rationale: 'Hebrew idiom literally says ''eat bread,'' often meaning to take a meal.
    Retaining ''eat bread'' preserves the source image and remains understandable
    in English; the conjunction is rendered purposively after the imperative: ''so
    that he may.'''
