id: EXO.2.2
reference: Exodus 2:2
source:
  edition: WLC
  text: וַ/תַּ֥הַר הָ/אִשָּׁ֖ה וַ/תֵּ֣לֶד בֵּ֑ן וַ/תֵּ֤רֶא אֹת/וֹ֙ כִּי ט֣וֹב ה֔וּא
    וַֽ/תִּצְפְּנֵ֖/הוּ שְׁלֹשָׁ֥ה יְרָחִֽים־׃
translation:
  text: The woman became pregnant and gave birth to a son. When she saw that he was
    good, she hid him for three months.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beautiful.' The Hebrew says 'good,' which can also carry the sense of
      pleasing or fine in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּהַר
  chosen: became pregnant
  alternatives:
  - conceived
  lexicon: HALOT
  rationale: The verb הרה denotes becoming pregnant/conceiving. 'Became pregnant'
    is natural modern English and slightly clearer than the more formal 'conceived,'
    while preserving the event sequence.
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - his wife
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'the woman,' not 'his wife' in this verse.
    Retaining 'the woman' follows the source text without importing relational language
    from context.
- source_word: וַתֵּלֶד בֵּן
  chosen: gave birth to a son
  alternatives:
  - bore a son
  lexicon: HALOT
  rationale: ילד + בן is the standard idiom for childbirth. 'Gave birth to a son'
    is idiomatic modern English; 'bore a son' is more formal/traditional.
- source_word: וַתֵּרֶא אֹתוֹ
  chosen: When she saw that he was good
  alternatives:
  - and she saw him, that he was good
  - she saw that he was beautiful
  lexicon: HALOT
  rationale: The clause introduces her perception of the child. Rendering with 'When'
    captures the narrative flow naturally in English. The object plus כי-clause is
    best expressed as 'she saw that he was...'
- source_word: כִּי טוֹב הוּא
  chosen: that he was good
  alternatives:
  - that he was beautiful
  - that he was fine
  lexicon: HALOT
  rationale: טוב has a broad semantic range including good, pleasing, fine. The plain
    lexical sense is 'good,' and this also preserves the possible echo of Genesis
    1 language. 'Beautiful' is interpretive, influenced by later tradition and Acts
    7:20/LXX-style renderings, so it is preserved in a footnote rather than adopted
    in the main text.
- source_word: וַתִּצְפְּנֵהוּ
  chosen: she hid him
  alternatives:
  - she concealed him
  lexicon: HALOT
  rationale: צפן means to hide/conceal. 'Hid' is the most direct and natural English
    equivalent in narrative context.
- source_word: שְׁלֹשָׁה יְרָחִים
  chosen: for three months
  alternatives:
  - three lunar months
  lexicon: HALOT
  rationale: יֶרַח literally refers to a lunar month/month. In ordinary English narrative,
    'three months' communicates the sense accurately without unnecessary technicality.
