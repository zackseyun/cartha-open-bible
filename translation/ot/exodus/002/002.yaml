theological_decisions:
- issue: Description of the infant as טוֹב
  chosen_reading: good
  alternative_readings:
  - beautiful
  - fine
  rationale: The Hebrew adjective's default sense is 'good.' Using 'good' avoids importing
    a more specific aesthetic judgment not demanded by the text and preserves possible
    literary resonance with earlier biblical usage. Because 'beautiful' is a longstanding
    interpretive alternative reflected in later biblical texts and translations, it
    is preserved in a footnote rather than resolved away.
  doctrine_reference: Translation philosophy §§1, 3, 5
