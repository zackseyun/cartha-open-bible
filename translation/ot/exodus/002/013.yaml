id: EXO.2.13
reference: Exodus 2:13
source:
  edition: WLC
  text: וַ/יֵּצֵא֙ בַּ/יּ֣וֹם הַ/שֵּׁנִ֔י וְ/הִנֵּ֛ה שְׁנֵֽי אֲנָשִׁ֥ים עִבְרִ֖ים נִצִּ֑ים וַ/יֹּ֨אמֶר֙ לָֽ/רָשָׁ֔ע לָ֥/מָּה תַכֶּ֖ה רֵעֶֽ/ךָ־׃
translation:
  text: He went out the next day[a], and behold, two Hebrew men were fighting. And he said to the wicked one[b], “Why are you striking your companion?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the wicked one” / “the wrongdoer” for “the guilty one.”
    reason: lexical_alternative
  - marker: b
    text: Or “your fellow” or “your neighbor” for “your companion.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: He went out
  alternatives:
  - He went out again
  - He went out
  lexicon: HALOT
  rationale: 'Qal wayyiqtol of יצא, straightforward narrative advance: Moses went out. English omits an explicit subject because it is supplied by context from the preceding verse.'
- source_word: בַּיּוֹם הַשֵּׁנִי
  chosen: the next day
  alternatives:
  - on the second day
  lexicon: HALOT
  rationale: Literally 'on the second day.' In English narrative, 'the next day' best conveys the temporal sense naturally without loss of meaning.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there were
  lexicon: HALOT
  rationale: הִנֵּה marks vivid presentation or sudden notice. 'Behold' preserves the discourse force better than flattening it away, while remaining understandable in modern English.
- source_word: שְׁנֵי אֲנָשִׁים עִבְרִים
  chosen: two Hebrew men
  alternatives:
  - two Hebrew men
  - two Hebrews
  lexicon: HALOT
  rationale: The phrase explicitly contains 'two men' plus the ethnic descriptor 'Hebrew.' 'Two Hebrew men' preserves both the count and the masculine noun, in line with gender-accurate translation.
- source_word: נִצִּים
  chosen: were fighting
  alternatives:
  - were quarreling
  - were struggling
  lexicon: HALOT
  rationale: Niphal participle from נצה/נצץ in this context denotes active conflict between the two men. 'Were fighting' fits the immediate context, especially since the next clause refers to one striking the other.
- source_word: לָרָשָׁע
  chosen: the guilty one
  alternatives:
  - the wicked one
  - the wrongdoer
  lexicon: HALOT
  rationale: The adjective/noun רָשָׁע can mean 'wicked' or 'guilty/in the wrong.' Here Moses addresses the aggressor in a specific dispute, so 'the guilty one' captures the situational moral judgment without overstating settled character.
- source_word: לָמָּה תַכֶּה
  chosen: Why are you striking
  alternatives:
  - Why do you strike
  - Why are you hitting
  lexicon: HALOT
  rationale: The imperfect after לָמָּה in direct speech can be rendered as present progressive in English because the action is apparently ongoing. 'Striking' also links naturally with the physical altercation.
- source_word: רֵעֶךָ
  chosen: your companion
  alternatives:
  - your neighbor
  - your fellow
  lexicon: HALOT
  rationale: רֵעַ often means companion, associate, fellow, or neighbor depending on context. Since this is one Hebrew man addressing another in an immediate interpersonal conflict, 'your companion' is natural and specific without importing later legal connotations of 'neighbor'.
