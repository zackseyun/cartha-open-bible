theological_decisions:
- issue: Nature of Moses' relationship to Pharaoh’s daughter in וַיְהִי לָהּ לְבֵן
  chosen_reading: The text presents Moses as becoming Pharaoh’s daughter’s son, implying
    adoptive filial status.
  alternative_readings:
  - He became like a son to her without formal adoption.
  rationale: The Hebrew idiom marks a real filial relationship in the narrative, but
    does not specify legal procedure. The translation keeps the stronger filial wording
    while avoiding imported institutional detail.
