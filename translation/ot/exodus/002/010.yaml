id: EXO.2.10
reference: Exodus 2:10
source:
  edition: WLC
  text: וַ/יִגְדַּ֣ל הַ/יֶּ֗לֶד וַ/תְּבִאֵ֨/הוּ֙ לְ/בַת פַּרְעֹ֔ה וַֽ/יְהִי לָ֖/הּ
    לְ/בֵ֑ן וַ/תִּקְרָ֤א שְׁמ/וֹ֙ מֹשֶׁ֔ה וַ/תֹּ֕אמֶר כִּ֥י מִן הַ/מַּ֖יִם מְשִׁיתִֽ/הוּ־־־׃
translation:
  text: When the child grew, she brought him to Pharaoh’s daughter, and he became
    her son. She named him Moses, for she said, “I drew him out of the water.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “he became a son to her” or “he was as a son to her.”
    reason: lexical_alternative
  - marker: b
    text: The name Moses sounds like the Hebrew expression “I drew him out.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִגְדַּל
  chosen: grew
  alternatives:
  - became great
  - grew up
  lexicon: HALOT
  rationale: The verb גדל here refers to the child’s maturing in age, not greatness
    in status. 'Grew' is natural English and fits the narrative progression.
- source_word: הַיֶּלֶד
  chosen: the child
  alternatives:
  - the boy
  lexicon: HALOT
  rationale: יֶלֶד can mean child or boy. 'The child' preserves the broader sense
    and matches the prior infancy context.
- source_word: וַתְּבִאֵהוּ
  chosen: she brought him
  alternatives:
  - she took him in
  - she presented him
  lexicon: HALOT
  rationale: The hiphil of בוא commonly means 'bring.' The subject is Moses’ mother
    from the preceding context, bringing him to Pharaoh’s daughter.
- source_word: לְבַת פַּרְעֹה
  chosen: to Pharaoh’s daughter
  alternatives:
  - to the daughter of Pharaoh
  lexicon: HALOT
  rationale: Both are accurate; 'to Pharaoh’s daughter' is smoother modern English
    while preserving the construct relationship.
- source_word: וַיְהִי לָהּ לְבֵן
  chosen: he became her son
  alternatives:
  - he was as a son to her
  - he became a son to her
  lexicon: HALOT
  rationale: The idiom indicates adoption or filial status. 'He became her son' is
    concise and communicates the resulting relationship clearly without overexplaining
    legal details not explicit in the text.
- source_word: וַתִּקְרָא שְׁמוֹ
  chosen: She named him
  alternatives:
  - she called his name
  - she called him
  lexicon: HALOT
  rationale: This Hebrew naming formula is best rendered idiomatically in English
    as 'she named him.'
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the explanation for the name. 'For' fits the explanatory naming
    formula in readable literary English.
- source_word: מִן הַמַּיִם
  chosen: out of the water
  alternatives:
  - from the water
  - out of the waters
  lexicon: HALOT
  rationale: Though literally 'from the water(s),' English idiom favors 'out of the
    water' in this rescue context.
- source_word: מְשִׁיתִהוּ
  chosen: I drew him out
  alternatives:
  - I pulled him out
  lexicon: HALOT
  rationale: From משה 'draw out.' 'I drew him out' preserves the wordplay with the
    name Moses better than more colloquial alternatives.
