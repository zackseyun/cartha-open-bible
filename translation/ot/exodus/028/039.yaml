id: EXO.28.39
reference: Exodus 28:39
source:
  edition: WLC
  text: וְ/שִׁבַּצְתָּ֙ הַ/כְּתֹ֣נֶת שֵׁ֔שׁ וְ/עָשִׂ֖יתָ מִצְנֶ֣פֶת שֵׁ֑שׁ וְ/אַבְנֵ֥ט תַּעֲשֶׂ֖ה מַעֲשֵׂ֥ה רֹקֵֽם׃
translation:
  text: You shall weave the tunic in checker work of fine linen[a], and you shall make a turban of fine linen, and you shall make a sash, the work of an embroiderer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make the tunic with a checkered pattern of fine linen.' The Hebrew verb likely refers to producing a patterned textile.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁבַּצְתָּ
  lemma: שׁבץ
  chosen: weave ... in checker work
  alternatives:
  - set
  - embroider
  - make with a checkered pattern
  lexicon: HALOT
  rationale: The verb from שׁבץ in priestly garment contexts refers to producing a patterned or checkered fabric rather than merely 'setting' something in place. 'Weave ... in checker work' captures the textile sense in idiomatic English while preserving the likely patterned result.
- source_word: הַכְּתֹנֶת
  chosen: the tunic
  alternatives:
  - the coat
  - the robe
  lexicon: HALOT
  rationale: כְּתֹנֶת denotes a close-fitting garment/tunic. 'Tunic' is the most natural modern English equivalent for the priestly undergarment.
- source_word: שֵׁשׁ
  chosen: fine linen
  alternatives:
  - linen
  lexicon: HALOT
  rationale: In tabernacle and priestly-textile contexts, שֵׁשׁ refers to high-quality linen. 'Fine linen' preserves the material and its elevated cultic quality.
- source_word: מִצְנֶפֶת
  chosen: turban
  alternatives:
  - headwrap
  - headdress
  lexicon: HALOT
  rationale: מִצְנֶפֶת is the priestly head covering wrapped around the head. 'Turban' is the standard and clearest English rendering.
- source_word: אַבְנֵט
  chosen: sash
  alternatives:
  - belt
  - waistband
  - girdle
  lexicon: HALOT
  rationale: אַבְנֵט is a long decorative waist sash for priestly dress. 'Sash' is more precise and natural than 'belt' and less archaic than 'girdle'.
- source_word: מַעֲשֵׂה רֹקֵם
  chosen: the work of an embroiderer
  alternatives:
  - embroidered work
  - the work of a weaver of colors
  lexicon: HALOT
  rationale: The phrase denotes skilled ornamental needlework or patterned textile craftsmanship. 'The work of an embroiderer' preserves the construct expression and the artisan focus of the Hebrew.
