id: EXO.15.27
reference: Exodus 15:27
source:
  edition: WLC
  text: וַ/יָּבֹ֣אוּ אֵילִ֔מָ/ה וְ/שָׁ֗ם שְׁתֵּ֥ים עֶשְׂרֵ֛ה עֵינֹ֥ת מַ֖יִם וְ/שִׁבְעִ֣ים תְּמָרִ֑ים וַ/יַּחֲנוּ שָׁ֖ם עַל הַ/מָּֽיִם־־׃
translation:
  text: Then they came to Elim[a], where there were twelve springs of water and seventy palm trees[c][b], and they camped there by the water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and there were twelve springs of water and seventy palm trees.'
    reason: lexical_alternative
  - marker: b
    text: '''Palm trees'' could be rendered more specifically as ''date palms.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'they camped there by the waters.' The Hebrew uses a plural form for 'water,' often functioning collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: Then they came
  alternatives:
  - And they came
  lexicon: HALOT
  rationale: Wayyiqtol of בוא narrates the next event in sequence. 'Then they came' gives natural English narrative progression while preserving the consecutive force; 'and they came' is more formally literal but less idiomatic here.
- source_word: אֵילִמָה
  chosen: to Elim
  lexicon: HALOT
  rationale: Proper place name is transliterated per translation philosophy. The directional he on the noun is represented by 'to Elim' rather than a bare 'Elim'.
- source_word: שָׁם
  chosen: where there were
  alternatives:
  - and there
  lexicon: HALOT
  rationale: The adverb literally means 'there,' but in English the clause is more naturally rendered 'where there were' after naming the location. This preserves the locative sense without awkwardness.
- source_word: שְׁתֵּים עֶשְׂרֵה
  chosen: twelve
  alternatives:
  - twelve (lit. two ten)
  lexicon: HALOT
  rationale: Standard English rendering of the cardinal number.
- source_word: עֵינֹת מַיִם
  chosen: springs of water
  alternatives:
  - water springs
  - fountains of water
  lexicon: HALOT
  rationale: עַיִן can denote a spring or fountain as a water source. 'Springs of water' is natural modern English and fits the oasis context.
- source_word: וְשִׁבְעִים תְּמָרִים
  chosen: and seventy palm trees
  alternatives:
  - and seventy date palms
  lexicon: HALOT
  rationale: תְּמָרִים refers to palm trees, likely date palms. 'Palm trees' is the clearest general rendering; 'date palms' is possible but slightly more specific than the text requires.
- source_word: וַיַּחֲנוּ
  chosen: and they camped
  alternatives:
  - and they encamped
  lexicon: HALOT
  rationale: From חנה, to camp/encamp. 'Camped' is readable modern English; 'encamped' is more formal but somewhat archaic in contemporary usage.
- source_word: עַל הַמָּיִם
  chosen: by the water
  alternatives:
  - by the waters
  - upon the water
  - near the water
  lexicon: HALOT
  rationale: עַל with a location here conveys proximity rather than physical position on top of the water. 'By the water' is idiomatic and contextually appropriate for an oasis campsite. The singular 'water' works naturally in English as a collective.
