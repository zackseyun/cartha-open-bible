id: EXO.15.4
reference: Exodus 15:4
source:
  edition: WLC
  text: מַרְכְּבֹ֥ת פַּרְעֹ֛ה וְ/חֵיל֖/וֹ יָרָ֣ה בַ/יָּ֑ם וּ/מִבְחַ֥ר שָֽׁלִשָׁ֖י/ו
    טֻבְּע֥וּ בְ/יַם סֽוּף־׃
translation:
  text: Pharaoh’s chariots and his army he cast into the sea, and the choicest of
    his officers were sunk in the Sea of Reeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditionally rendered “Red Sea.” The Hebrew reads “Sea of Reeds.”
    reason: lexical_alternative
lexical_decisions:
- source_word: מַרְכְּבֹת
  chosen: chariots
  alternatives:
  - chariotry
  lexicon: HALOT
  rationale: The plural noun refers concretely to Pharaoh’s war chariots. 'Chariots'
    is the natural modern English rendering.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  rationale: Standard English transliteration of the royal title/name.
- source_word: וְחֵילוֹ
  chosen: and his army
  alternatives:
  - and his force
  - and his host
  lexicon: HALOT
  rationale: חַיִל here denotes military force rather than wealth or general strength.
    'Army' best fits the martial context and is clear modern English.
- source_word: יָרָה
  chosen: he cast
  alternatives:
  - he hurled
  - he threw
  lexicon: HALOT
  rationale: The verb literally means to throw/shoot. In this poetic context of divine
    judgment at the sea, 'he cast' preserves the force without sounding overly colloquial.
- source_word: בַיָּם
  chosen: into the sea
  alternatives:
  - in the sea
  lexicon: HALOT
  rationale: With the verb 'cast,' English idiom prefers 'into the sea,' expressing
    motion toward and into the waters.
- source_word: וּמִבְחַר
  chosen: the choicest
  alternatives:
  - the best
  - the picked men of
  lexicon: HALOT
  rationale: The noun denotes what is selected or choice. 'The choicest' preserves
    the superlative/selective sense in elevated but readable English.
- source_word: שָׁלִשָׁיו
  chosen: his officers
  alternatives:
  - his captains
  - his chariot officers
  - his adjutants
  lexicon: HALOT
  rationale: שָׁלִישׁ can denote elite military officers, often associated with chariot
    corps. 'Officers' is broad enough to avoid over-specifying while still conveying
    rank; the more traditional 'captains' is possible but less precise in modern English.
- source_word: טֻבְּעוּ
  chosen: were sunk
  alternatives:
  - were drowned
  - sank
  lexicon: HALOT
  rationale: The passive form means they were submerged/sunk. 'Were sunk' preserves
    the passive voice and avoids shifting the image merely to death by drowning.
- source_word: בְיַם סוּף
  chosen: in the Sea of Reeds
  alternatives:
  - in the Red Sea
  lexicon: HALOT
  rationale: The Hebrew expression literally means 'Sea of Reeds.' Following original-language
    primacy, the main text uses the more literal rendering; the traditional 'Red Sea'
    is preserved in a footnote because of its prominence in English Bible tradition.
