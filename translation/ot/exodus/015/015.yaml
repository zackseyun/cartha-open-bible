id: EXO.15.15
reference: Exodus 15:15
source:
  edition: WLC
  text: אָ֤ז נִבְהֲלוּ֙ אַלּוּפֵ֣י אֱד֔וֹם אֵילֵ֣י מוֹאָ֔ב יֹֽאחֲזֵ֖/מוֹ רָ֑עַד נָמֹ֕גוּ
    כֹּ֖ל יֹשְׁבֵ֥י כְנָֽעַן׃
translation:
  text: Then the chiefs of Edom were terrified; trembling seized the leaders of Moab;
    all the inhabitants of Canaan melted away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mighty men of Moab.' The Hebrew expression is literally 'the strong
      ones/rams of Moab,' used here for prominent men or leaders.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal adverb marking the consequence of the preceding saving act;
    'Then' is natural and concise in English poetic narrative.
- source_word: נִבְהֲלוּ
  chosen: were terrified
  alternatives:
  - were dismayed
  - were alarmed
  lexicon: HALOT
  rationale: Niphal of בהל conveys being disturbed, dismayed, or terrified. 'Were
    terrified' best matches the heightened fear context of the victory song.
- source_word: אַלּוּפֵי אֱדוֹם
  chosen: the chiefs of Edom
  alternatives:
  - the clan leaders of Edom
  - the princes of Edom
  lexicon: HALOT
  rationale: אַלּוּף can denote a chief, clan leader, or chieftain. 'Chiefs' preserves
    the leadership sense without overstating a formal royal office.
- source_word: אֵילֵי מוֹאָב
  chosen: the leaders of Moab
  alternatives:
  - the mighty men of Moab
  - the nobles of Moab
  lexicon: HALOT
  rationale: אֵילֵי literally relates to strength or mighty ones; in context of parallel
    political leaders, 'leaders' communicates the social-political sense more clearly
    than a wooden 'mighty ones.'
- source_word: יֹאחֲזֵמוֹ רָעַד
  chosen: trembling seized
  alternatives:
  - trembling took hold of
  - shuddering gripped
  lexicon: HALOT
  rationale: The verb אחז with suffix plus רָעַד expresses fear taking hold of them.
    'Trembling seized' is idiomatic and preserves the vivid personification.
- source_word: נָמֹגוּ
  chosen: melted away
  alternatives:
  - fainted away
  - lost heart
  lexicon: HALOT
  rationale: The verb מוג in fear contexts conveys melting, dissolving, or losing
    courage. 'Melted away' preserves the metaphor and echoes common biblical fear
    imagery.
- source_word: כֹּל יֹשְׁבֵי כְנָעַן
  chosen: all the inhabitants of Canaan
  alternatives:
  - all who dwell in Canaan
  - all the residents of Canaan
  lexicon: HALOT
  rationale: A straightforward rendering of the participial construction; 'inhabitants'
    is natural English and retains the collective scope.
