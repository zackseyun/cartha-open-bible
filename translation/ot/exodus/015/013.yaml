theological_decisions:
- issue: Referent of 'your holy dwelling'
  chosen_reading: A deliberately broad reference to the place of God's holy presence, without specifying whether Sinai, Canaan, Zion, or the heavenly dwelling is exclusively intended.
  alternative_readings:
  - Sinai as the immediate destination
  - Canaan as the promised land
  - Zion/temple as the ultimate sanctuary
  rationale: The Hebrew phrase itself does not unambiguously identify the location, and the Song of the Sea can poetically telescope God's saving work toward his holy abode. To preserve the text's theological tension, the translation uses the broader 'your holy dwelling' rather than resolving the referent in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
