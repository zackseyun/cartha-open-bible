id: EXO.15.13
reference: Exodus 15:13
source:
  edition: WLC
  text: נָחִ֥יתָ בְ/חַסְדְּ/ךָ֖ עַם ז֣וּ גָּאָ֑לְתָּ נֵהַ֥לְתָּ בְ/עָזְּ/ךָ֖ אֶל נְוֵ֥ה קָדְשֶֽׁ/ךָ־־׃
translation:
  text: In your steadfast love you have led the people whom you redeemed[b][a]; in your strength you have guided them to your holy dwelling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this people whom you redeemed.'
    reason: lexical_alternative
  - marker: b
    text: '''Your holy dwelling'' may refer broadly to the place of God''s holy presence; interpreters variously understand it as Sinai, the promised land, or Zion/temple.'
    reason: alternative_reading
lexical_decisions:
- source_word: נָחִיתָ
  chosen: you have led
  alternatives:
  - you guided
  - you conducted
  lexicon: HALOT
  rationale: The verb from נחה in the Hiphil commonly means to lead or guide. 'Led' is natural English and fits the exodus context of God bringing his people onward. The perfect is rendered with English present perfect to match the poetic recounting of completed divine action.
- source_word: בְחַסְדְּךָ
  chosen: in your steadfast love
  alternatives:
  - by your covenant loyalty
  - in your lovingkindness
  lexicon: HALOT
  rationale: חֶסֶד carries covenantal loyalty, mercy, and faithful love. 'Steadfast love' best preserves both affection and covenant constancy in readable modern English. The preposition ב is rendered instrumentally/spherically as 'in' here, matching idiomatic English poetic style.
- source_word: עַם זוּ
  chosen: the people
  alternatives:
  - this people
  - that people
  lexicon: HALOT
  rationale: The phrase literally means 'this people,' but English idiom in this context is smoother with 'the people,' especially since the following relative clause identifies them. The demonstrative force is not denied but absorbed into the definite expression.
- source_word: גָּאָלְתָּ
  chosen: you redeemed
  alternatives:
  - you ransomed
  - you reclaimed
  lexicon: HALOT
  rationale: גאל is a key covenantal term for redeeming or acting as kinsman-redeemer. 'Redeemed' preserves the theological weight and established semantic range without unnecessary paraphrase.
- source_word: נֵהַלְתָּ
  chosen: you have guided
  alternatives:
  - you led
  - you brought
  lexicon: HALOT
  rationale: נהל often conveys leading with care or guidance, sometimes like shepherding. Since נחה already supplied 'led' earlier in the verse, 'guided' preserves semantic distinction while remaining faithful.
- source_word: בְעָזְּךָ
  chosen: in your strength
  alternatives:
  - by your strength
  - with your might
  lexicon: HALOT
  rationale: עֹז denotes strength or might. 'Strength' is straightforward and pairs well with the preceding 'steadfast love,' preserving the poetic balance of covenant love and powerful action. The preposition ב is rendered 'in' for parallelism with the first colon.
- source_word: אֶל
  chosen: to
  alternatives:
  - into
  - toward
  lexicon: HALOT
  rationale: The preposition marks movement toward a destination. 'To' is the most natural rendering here; 'into' would over-specify entry, and 'toward' would weaken the sense of arrival implied by the verse.
- source_word: נְוֵה קָדְשֶׁךָ
  chosen: your holy dwelling
  alternatives:
  - your holy abode
  - the pasture of your holiness
  - your holy habitation
  lexicon: HALOT
  rationale: נָוֶה can denote abode, dwelling place, or pasture/homestead. In this context of divine destination, 'dwelling' best communicates a sacred habitation without forcing a narrower image. 'Holy dwelling' is clear modern English and preserves the genitival relation with קֹדֶשׁ.
