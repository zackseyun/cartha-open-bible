id: EXO.15.24
reference: Exodus 15:24
source:
  edition: WLC
  text: וַ/יִּלֹּ֧נוּ הָ/עָ֛ם עַל מֹשֶׁ֥ה לֵּ/אמֹ֖ר מַה נִּשְׁתֶּֽה־־׃
translation:
  text: And the people grumbled against Moses[a], saying, “What shall we drink?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'murmured' or 'complained.' The Hebrew verb refers to communal complaining, especially in wilderness narratives.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלֹּנוּ
  chosen: grumbled
  alternatives:
  - murmured
  - complained
  lexicon: HALOT
  rationale: From לון/לין in the wilderness-complaint context, the verb denotes murmuring or complaining against a leader. 'Grumbled' is natural modern English and preserves the negative, communal complaint sense better than the more archaic 'murmured'.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the people of Israel
  - the populace
  lexicon: HALOT
  rationale: The noun עם straightforwardly means 'people.' The article is preserved. 'The people of Israel' would be interpretive expansion beyond the immediate wording.
- source_word: עַל
  chosen: against
  alternatives:
  - to
  - about
  lexicon: HALOT
  rationale: With verbs of complaint, על marks the object of grievance. 'Against Moses' best conveys the adversative force in English.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Personal name transliterated by standard English convention, in keeping with the translation philosophy.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The infinitive construct formula introduces direct speech. 'Saying' is a standard and sufficiently natural rendering that preserves the discourse linkage.
- source_word: מַה
  chosen: What
  alternatives:
  - What is there that
  lexicon: HALOT
  rationale: Simple interrogative pronoun introducing the question.
- source_word: נִּשְׁתֶּה
  chosen: shall we drink
  alternatives:
  - are we to drink
  - can we drink
  lexicon: HALOT
  rationale: Qal imperfect 1cp of שׁתה, 'to drink.' In context it expresses immediate deliberation or need. 'Shall we drink' is idiomatic and captures the urgent question without overinterpreting modality.
