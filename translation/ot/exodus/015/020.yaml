id: EXO.15.20
reference: Exodus 15:20
source:
  edition: WLC
  text: וַ/תִּקַּח֩ מִרְיָ֨ם הַ/נְּבִיאָ֜ה אֲח֧וֹת אַהֲרֹ֛ן אֶת הַ/תֹּ֖ף בְּ/יָדָ֑/הּ וַ/תֵּצֶ֤אןָ כָֽל הַ/נָּשִׁים֙ אַחֲרֶ֔י/הָ בְּ/תֻפִּ֖ים וּ/בִ/מְחֹלֹֽת־־׃
translation:
  text: Then Miriam the prophetess[a], Aaron’s sister, took the tambourine in her hand, and all the women went out after her with tambourines and dancing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with dances.' The Hebrew noun can be rendered either as the activity ('dancing') or as the plural event form ('dances').
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקַּח
  chosen: Then ... took
  alternatives:
  - And ... took
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English sequence while preserving the past narrative force.
- source_word: מִרְיָם
  chosen: Miriam
  rationale: Personal name is transliterated by standard English convention per translation philosophy.
- source_word: הַנְּבִיאָה
  chosen: the prophetess
  alternatives:
  - the female prophet
  - the prophet
  lexicon: HALOT
  rationale: The noun denotes a female prophet. 'Prophetess' is standard, concise English and preserves the marked feminine form better than the generic 'prophet.'
- source_word: אֲחוֹת אַהֲרֹן
  chosen: Aaron’s sister
  alternatives:
  - the sister of Aaron
  lexicon: HALOT
  rationale: Construct chain rendered idiomatically in English. Although Miriam is also Moses' sister, the Hebrew explicitly identifies her as Aaron's sister, so that wording is retained.
- source_word: הַתֹּף
  chosen: the tambourine
  alternatives:
  - the hand drum
  - the timbrel
  lexicon: HALOT
  rationale: תֹף refers to a handheld percussion instrument, traditionally a frame drum or tambourine. 'Tambourine' is the clearest modern equivalent; 'timbrel' is archaic.
- source_word: בְּיָדָהּ
  chosen: in her hand
  alternatives:
  - with her hand
  lexicon: HALOT
  rationale: Literal and idiomatic rendering of the prepositional phrase.
- source_word: וַתֵּצֶאןָ
  chosen: went out
  alternatives:
  - came out
  lexicon: HALOT
  rationale: The verb יצא commonly means 'go out/come out.' 'Went out' best matches the narrative perspective and standard English rendering.
- source_word: כָל הַנָּשִׁים
  chosen: all the women
  alternatives:
  - all the womenfolk
  lexicon: HALOT
  rationale: Straightforward rendering of the quantified noun phrase; gender-specific wording is preserved because the Hebrew explicitly refers to women.
- source_word: אַחֲרֶיהָ
  chosen: after her
  alternatives:
  - behind her
  lexicon: HALOT
  rationale: Both are possible; 'after her' is idiomatic for following in procession.
- source_word: בְּתֻפִּים
  chosen: with tambourines
  alternatives:
  - with timbrels
  - with hand drums
  lexicon: HALOT
  rationale: Plural of תֹף; rendered consistently with the earlier singular as 'tambourines.' The preposition is instrumental here.
- source_word: וּבִמְחֹלֹת
  chosen: and dancing
  alternatives:
  - and with dances
  - and in dances
  lexicon: HALOT
  rationale: מְחֹלֹת denotes dances/dancing, especially festive communal dancing. 'Dancing' is natural modern English while preserving the celebratory action.
