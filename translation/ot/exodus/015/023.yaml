id: EXO.15.23
reference: Exodus 15:23
source:
  edition: WLC
  text: וַ/יָּבֹ֣אוּ מָרָ֔תָ/ה וְ/לֹ֣א יָֽכְל֗וּ לִ/שְׁתֹּ֥ת מַ֨יִם֙ מִ/מָּרָ֔ה כִּ֥י מָרִ֖ים הֵ֑ם עַל כֵּ֥ן קָרָֽא שְׁמָ֖/הּ מָרָֽה־־׃
translation:
  text: Then they came to Marah[a], but they could not drink the water from Marah because it was bitter. Therefore it was named Marah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Marah sounds like the Hebrew word for 'bitter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: Then they came
  alternatives:
  - And they came
  - So they came
  lexicon: HALOT
  rationale: Wayyiqtol of בוא advances the narrative. 'Then they came' preserves the sequential force in natural English.
- source_word: מָרָתָה
  chosen: to Marah
  alternatives:
  - Marahward
  lexicon: HALOT
  rationale: Proper place name with directional he; idiomatic English expresses the motion simply as 'to Marah.' The name is transliterated per policy on names.
- source_word: וְלֹא יָכְלוּ
  chosen: but they could not
  alternatives:
  - and they could not
  lexicon: HALOT
  rationale: The conjunction introduces a contrast between arrival and inability to drink; 'but' brings out the discourse sense without overtranslating.
- source_word: לִשְׁתֹּת מַיִם
  chosen: drink the water
  alternatives:
  - drink water
  lexicon: HALOT
  rationale: English idiom naturally uses the article here for the specific water at that location.
- source_word: מִמָּרָה
  chosen: from Marah
  alternatives:
  - at Marah
  lexicon: HALOT
  rationale: 'The preposition מן most naturally indicates source: the water from that place.'
- source_word: כִּי מָרִים הֵם
  chosen: because it was bitter
  alternatives:
  - for they were bitter
  - because they were bitter
  lexicon: HALOT
  rationale: Hebrew plural predicate likely agrees with 'waters' understood from מַיִם, but idiomatic English commonly treats 'water' as a mass singular. 'Because it was bitter' communicates the sense clearly while preserving the causal force of כִּי.
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For that reason
  - That is why
  lexicon: HALOT
  rationale: Standard inferential expression marking the naming explanation.
- source_word: קָרָא שְׁמָהּ מָרָה
  chosen: it was named Marah
  alternatives:
  - he called its name Marah
  - one called its name Marah
  lexicon: HALOT
  rationale: The Hebrew uses a 3ms singular verb with no explicit subject, a common impersonal/naming construction. Passive English is the most natural equivalent. The wordplay with מָרָה/מָרִים is retained by transliterating the place name and rendering the adjective as 'bitter'.
- source_word: מָרָה / מָרִים
  chosen: Marah / bitter
  alternatives:
  - Bitterness / bitter
  lexicon: HALOT
  rationale: The place name Marah is transliterated as a proper name, while the adjective is translated 'bitter.' This preserves the narrative explanation of the name without forcing an unnatural English renaming in the main text.
