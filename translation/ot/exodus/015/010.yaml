id: EXO.15.10
reference: Exodus 15:10
source:
  edition: WLC
  text: נָשַׁ֥פְתָּ בְ/רוּחֲ/ךָ֖ כִּסָּ֣/מוֹ יָ֑ם צָֽלֲלוּ֙ כַּֽ/עוֹפֶ֔רֶת בְּ/מַ֖יִם
    אַדִּירִֽים׃
translation:
  text: You blew with your wind; the sea covered them. They sank like lead in mighty
    waters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with your breath.' The Hebrew word can mean 'wind,' 'breath,' or 'spirit';
      here the sea-crossing context favors 'wind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשַׁפְתָּ
  chosen: you blew
  alternatives:
  - you breathed
  - you blew upon
  lexicon: HALOT
  rationale: The verb נשׁף denotes blowing/breathing. In this poetic context of divine
    action over the sea, 'you blew' is the most natural and direct English rendering,
    while preserving the imagery of wind proceeding from God.
- source_word: בְרוּחֲךָ
  chosen: with your wind
  alternatives:
  - with your breath
  - by your spirit
  lexicon: HALOT
  rationale: רוּחַ can mean wind, breath, or spirit. In the immediate context of the
    sea crossing and the parallel with blowing, 'wind' best fits the physical imagery.
    'Breath' is possible and worth preserving as a lexical alternative because it
    heightens the anthropomorphic image of divine exhalation.
- source_word: כִּסָּמוֹ יָם
  chosen: the sea covered them
  alternatives:
  - the sea concealed them
  - the sea overwhelmed them
  lexicon: HALOT
  rationale: The verb כסה means 'cover.' With the 3mp suffix, the sense is that the
    sea covered the Egyptians. 'Covered' is both literal and idiomatic, and avoids
    over-interpreting the effect as 'overwhelmed,' though that is implied.
- source_word: צָלֲלוּ
  chosen: they sank
  alternatives:
  - they plunged
  - they went down
  lexicon: HALOT
  rationale: The verb צלל in this context refers to sinking downward into the waters.
    'They sank' is clear, natural English and matches the simile that follows.
- source_word: כָּעוֹפֶרֶת
  chosen: like lead
  alternatives:
  - as lead
  lexicon: HALOT
  rationale: עוֹפֶרֶת is the metal lead. 'Like lead' preserves the simile and the
    heaviness imagery in straightforward modern English.
- source_word: בְּמַיִם אַדִּירִים
  chosen: in mighty waters
  alternatives:
  - in majestic waters
  - in deep waters
  lexicon: HALOT
  rationale: אַדִּירִים conveys might, majesty, or power. 'Mighty waters' preserves
    the force of the adjective without adding interpretive detail. 'Deep waters' is
    less lexically precise here.
