theological_decisions:
- issue: Meaning of רוּחַ in a theophanic-poetic context
  chosen_reading: wind
  alternative_readings:
  - breath
  - spirit
  rationale: The immediate context is the physical defeat of Egypt at the sea, and
    the paired verb 'you blew' strongly favors a meteorological or breath-like image
    rather than an explicit reference to the divine Spirit. To preserve theological
    tension without over-reading, the main text uses 'wind' and a footnote preserves
    'breath.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
