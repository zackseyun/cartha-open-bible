id: EXO.15.9
reference: Exodus 15:9
source:
  edition: WLC
  text: אָמַ֥ר אוֹיֵ֛ב אֶרְדֹּ֥ף אַשִּׂ֖יג אֲחַלֵּ֣ק שָׁלָ֑ל תִּמְלָאֵ֣/מוֹ נַפְשִׁ֔/י אָרִ֣יק חַרְבִּ֔/י תּוֹרִישֵׁ֖/מוֹ יָדִֽ/י׃
translation:
  text: The enemy said[a], ‘I will pursue, I will overtake, I will divide the spoil; my desire will be satisfied on them. I will draw my sword[b]; my hand will dispossess them.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'my soul will be filled with them,' that is, 'I will have my fill of them.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'my hand will destroy them' or 'drive them out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַר
  chosen: said
  alternatives:
  - has said
  lexicon: HALOT
  rationale: Simple past fits the narrative/song context, introducing the enemy's boast.
- source_word: אוֹיֵב
  chosen: the enemy
  alternatives:
  - an enemy
  - the foe
  lexicon: HALOT
  rationale: Though formally singular and anarthrous, in context it refers to Egypt/the pursuing foe collectively; English idiom prefers the definite singular 'the enemy' for this representative adversary.
- source_word: אֶרְדֹּף
  chosen: I will pursue
  alternatives:
  - I pursue
  lexicon: HALOT
  rationale: Imperfect here expresses intended future action in the enemy's speech.
- source_word: אַשִּׂיג
  chosen: I will overtake
  alternatives:
  - I will catch up
  - I will reach
  lexicon: HALOT
  rationale: The verb commonly carries the sense of catching up to or overtaking in pursuit; 'overtake' preserves the military pursuit imagery.
- source_word: אֲחַלֵּק שָׁלָל
  chosen: I will divide the spoil
  alternatives:
  - I will apportion plunder
  - I will divide the plunder
  lexicon: HALOT
  rationale: A standard war-booty expression. 'Spoil' is concise and idiomatic in English, while still understandable in modern usage.
- source_word: תִּמְלָאֵמוֹ נַפְשִׁי
  chosen: my desire will be satisfied on them
  alternatives:
  - my soul will be filled with them
  - my appetite will be filled by them
  - I will have my fill of them
  lexicon: HALOT
  rationale: Literally, 'my soul will be filled with them.' Because נֶפֶשׁ here denotes inner appetite/desire rather than the immaterial soul in a technical sense, 'my desire will be satisfied on them' conveys the hostile craving in natural English without over-paraphrasing.
- source_word: אָרִיק חַרְבִּי
  chosen: I will draw my sword
  alternatives:
  - I will unsheathe my sword
  - I will empty out my sword
  lexicon: HALOT
  rationale: The Hiphil of ריק with 'sword' idiomatically means to draw or unsheathe the sword. 'Draw' is the clearest modern equivalent.
- source_word: תּוֹרִישֵׁמוֹ יָדִי
  chosen: my hand will dispossess them
  alternatives:
  - my hand will destroy them
  - my hand will drive them out
  - my hand will take possession of them
  lexicon: HALOT
  rationale: The Hiphil of ירשׁ often means to dispossess or drive out. Here the enemy boasts of overpowering and taking possession over the Israelites. 'Dispossess' preserves the core sense better than the more interpretive 'destroy,' while still fitting the conquest idiom.
