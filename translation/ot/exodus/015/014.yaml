id: EXO.15.14
reference: Exodus 15:14
source:
  edition: WLC
  text: שָֽׁמְע֥וּ עַמִּ֖ים יִרְגָּז֑וּ/ן חִ֣יל אָחַ֔ז יֹשְׁבֵ֖י פְּלָֽשֶׁת׃
translation:
  text: The peoples heard; they trembled. Anguish seized the inhabitants of Philistia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The peoples have heard; they quake. Trembling has seized the inhabitants
      of Philistia.' The Hebrew poetry allows a vivid present/future-like sense as
      well as simple past.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְעוּ
  chosen: heard
  alternatives:
  - have heard
  lexicon: HALOT
  rationale: Qal perfect 3cp of שׁמע, straightforwardly 'heard.' In poetic narrative
    English, simple past fits the sequence of events better than English present perfect.
- source_word: עַמִּים
  chosen: the peoples
  alternatives:
  - peoples
  - nations
  lexicon: HALOT
  rationale: Plural of עם, referring to surrounding ethnic groups collectively. 'The
    peoples' preserves the plural and poetic force better than the more interpretive
    'nations.'
- source_word: יִרְגָּזוּ/ן
  chosen: they trembled
  alternatives:
  - they quake
  - they will tremble
  - they were agitated
  lexicon: HALOT
  rationale: From רָגַז, denoting trembling, quaking, or agitation. In the song's
    retrospective-prophetic style, English past 'trembled' reads naturally alongside
    the preceding perfect and following perfect, while preserving the sense of fearful
    shaking.
- source_word: חִיל
  chosen: anguish
  alternatives:
  - trembling
  - writhing
  - pain
  lexicon: HALOT
  rationale: The noun can denote writhing, labor-like pain, or trembling. 'Anguish'
    captures the emotional and bodily distress without over-specifying childbirth
    imagery, which is not explicit here.
- source_word: אָחַז
  chosen: seized
  alternatives:
  - gripped
  - took hold of
  lexicon: HALOT
  rationale: Qal perfect of אחז, 'to seize, grasp.' 'Seized' is idiomatic with an
    abstract subject like anguish and preserves the force of sudden overpowering.
- source_word: יֹשְׁבֵי
  chosen: the inhabitants of
  alternatives:
  - those dwelling in
  - the dwellers of
  lexicon: HALOT
  rationale: Participle of ישׁב used substantivally for residents. 'The inhabitants
    of' is natural modern English and accurately reflects the construct relation.
- source_word: פְּלָשֶׁת
  chosen: Philistia
  alternatives:
  - the land of the Philistines
  lexicon: HALOT
  rationale: Proper place name for the region of the Philistines. 'Philistia' is the
    standard English transliteration for the territory, distinct from the people-group.
