theological_decisions:
- issue: Rendering of the divine name יָהּ
  chosen_reading: Yah
  alternative_readings:
  - the LORD
  rationale: The source text uses the shortened form יָהּ rather than יהוה. To honor
    original-language primacy, the translation preserves the distinct form as 'Yah'
    instead of normalizing it to the project's default rendering for YHWH.
  doctrine_reference: Translation philosophy §1; Contested terms table on יְהוָה YHWH
- issue: Interpretation of וְאַנְוֵהוּ
  chosen_reading: I will praise him
  alternative_readings:
  - I will prepare a dwelling for him
  rationale: The verb is lexically debated. The main text adopts the reading that
    best fits the immediate poetic parallelism and worship context, while preserving
    the habitation sense in a footnote to avoid overstating certainty.
  doctrine_reference: Translation philosophy §3
