id: EXO.15.2
reference: Exodus 15:2
source:
  edition: WLC
  text: עָזִּ֤/י וְ/זִמְרָת֙ יָ֔הּ וַֽ/יְהִי לִ֖/י לִֽ/ישׁוּעָ֑ה זֶ֤ה אֵלִ/י֙ וְ/אַנְוֵ֔/הוּ
    אֱלֹהֵ֥י אָבִ֖/י וַ/אֲרֹמְמֶֽ/נְהוּ־׃
translation:
  text: Yah is my strength and song, and he has become my salvation. This is my God,
    and I will praise him; my father's God, and I will exalt him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will prepare a dwelling for him.' The Hebrew verb here is difficult
      and may carry the sense of making a habitation or adorning/glorifying.
    reason: alternative_reading
lexical_decisions:
- source_word: עָזִּי
  chosen: my strength
  alternatives:
  - my might
  lexicon: HALOT
  rationale: The noun from עז denotes strength or might. 'My strength' is the most
    natural English rendering here and pairs well with the following noun in the poetic
    line.
- source_word: וְזִמְרָת יָהּ
  chosen: and song
  alternatives:
  - and praise
  - and melody
  lexicon: HALOT
  rationale: 'זִמְרָה can denote song or musical praise. In this collocation (''strength
    and song'') and in parallel with the victory hymn context, ''song'' best preserves
    the poetic expression. יָהּ is taken as the divine name ''Yah,'' linked with the
    preceding phrase: ''Yah is my strength and song.'''
- source_word: יָהּ
  chosen: Yah
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Although the project default for יהוה is 'the LORD,' this form is the
    shortened divine name יָהּ, not the tetragrammaton itself. Translating it as 'Yah'
    preserves the source form and poetic force rather than assimilating it to the
    standard covenant-name rendering.
- source_word: וַיְהִי לִי לִישׁוּעָה
  chosen: and he has become my salvation
  alternatives:
  - and he became my salvation
  - and he was for me salvation
  lexicon: HALOT
  rationale: The Hebrew idiom with היה + ל + noun expresses becoming or being for
    someone something. 'Has become my salvation' gives idiomatic modern English while
    preserving the resultative sense in the song context.
- source_word: זֶה אֵלִי
  chosen: This is my God
  alternatives:
  - This one is my God
  lexicon: HALOT
  rationale: A straightforward demonstrative plus noun phrase. 'This is my God' is
    natural and preserves the emphatic identification.
- source_word: וְאַנְוֵהוּ
  chosen: and I will praise him
  alternatives:
  - and I will glorify him
  - and I will beautify him
  - and I will prepare a dwelling for him
  lexicon: HALOT
  rationale: The verb is difficult and has been understood either as praising/glorifying
    or as preparing a habitation. In this poetic context, parallel to 'I will exalt
    him' and in line with ancient translation tradition, 'I will praise him' best
    fits the immediate sense. Because 'prepare a dwelling' is a notable alternative,
    it is preserved in a footnote.
- source_word: אֱלֹהֵי אָבִי
  chosen: my father's God
  alternatives:
  - the God of my father
  lexicon: HALOT
  rationale: The construct phrase is singular with first-person suffix. 'My father's
    God' is concise, natural English and preserves the familial covenantal reference.
- source_word: וַאֲרֹמְמֶנְהוּ
  chosen: and I will exalt him
  alternatives:
  - and I will lift him high
  lexicon: HALOT
  rationale: From רומם, 'to exalt' is the standard and fitting rendering in worship
    language, preserving both the metaphor and the elevated tone.
