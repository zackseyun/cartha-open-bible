id: EXO.15.3
reference: Exodus 15:3
source:
  edition: WLC
  text: יְהוָ֖ה אִ֣ישׁ מִלְחָמָ֑ה יְהוָ֖ה שְׁמֽ/וֹ׃
translation:
  text: The LORD is a man of war; the LORD is his name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH; alternatively rendered 'Yahweh' or 'Jehovah.'
    reason: alternative_reading
  - marker: b
    text: Or 'The LORD is a warrior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
    The same rendering is retained for both occurrences for consistency.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - warrior
  - husband
  - person
  lexicon: HALOT
  rationale: The noun literally means 'man' and, per the translation philosophy, gender-accurate
    renderings are preferred where they match the source. Here the phrase is a predicative
    nominal expression ('a man of war'), and retaining 'man' preserves the Hebrew
    imagery more directly than the interpretive gloss 'warrior.'
- source_word: מִלְחָמָה
  chosen: war
  alternatives:
  - battle
  - warfare
  lexicon: HALOT
  rationale: The noun denotes war or warfare. 'War' best fits the compact Hebrew expression
    אִישׁ מִלְחָמָה and preserves the force of the traditional idiom 'man of war'
    without unnecessary expansion.
- source_word: שְׁמוֹ
  chosen: is his name
  alternatives:
  - his name is the LORD
  - that is his name
  lexicon: HALOT
  rationale: The Hebrew is a verbless clause, literally 'YHWH his name.' In English,
    'is' must be supplied. Rendering it as 'the LORD is his name' preserves the fronting
    of the divine name and the emphatic identification, while remaining natural English.
