theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidance explicitly sets 'the LORD' as the default for
    YHWH. Alternatives are preserved in a footnote rather than adopted in the main
    text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to interpret אִישׁ מִלְחָמָה idiomatically as 'warrior' or more formally
    as 'man of war'
  chosen_reading: man of war
  alternative_readings:
  - warrior
  rationale: Optimal equivalence here favors preserving the Hebrew metaphor and cadence,
    especially in poetic context, rather than collapsing it into the single-word interpretation
    'warrior.' This avoids paraphrase beyond what the source warrants.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; gender-accurate
    over gender-neutral'
