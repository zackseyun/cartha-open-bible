theological_decisions:
- issue: Anthropomorphic depiction of God in the Song at the Sea
  chosen_reading: Retain the concrete imagery of God's 'nostrils' and their 'blast' as poetic anthropomorphism.
  alternative_readings:
  - Render more abstractly as 'at your anger' or similar
  rationale: The Hebrew text itself uses embodied imagery to portray God's powerful intervention. Preserving that imagery follows original-language primacy and avoids importing a doctrinally motivated abstraction not demanded by the text.
  doctrine_reference: Translation philosophy §1, §3
