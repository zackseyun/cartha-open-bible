id: EXO.15.8
reference: Exodus 15:8
source:
  edition: WLC
  text: וּ/בְ/ר֤וּחַ אַפֶּ֨י/ךָ֙ נֶ֣עֶרְמוּ מַ֔יִם נִצְּב֥וּ כְמוֹ נֵ֖ד נֹזְלִ֑ים קָֽפְא֥וּ תְהֹמֹ֖ת בְּ/לֶב יָֽם־־׃
translation:
  text: At the blast of your nostrils the waters piled up[a]; the flowing waters stood like a heap[d][c][b]; the depths congealed in the heart of the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By the breath of your nostrils.'
    reason: lexical_alternative
  - marker: b
    text: '''Like a heap'' reflects the Hebrew noun; some translations render it ''like a wall'' in light of related sea-crossing imagery.'
    reason: lexical_alternative
  - marker: c
    text: Or 'froze.' The Hebrew verb can denote becoming thickened or congealed.
    reason: lexical_alternative
  - marker: d
    text: Literally 'in the heart of the sea,' that is, in the midst of the sea.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְרוּחַ
  chosen: At the blast of
  alternatives:
  - by the wind of
  - with the breath of
  lexicon: HALOT
  rationale: רוּחַ can mean wind, breath, or spirit. In this poetic context paired with 'your nostrils,' it denotes the forceful exhalation of God. 'Blast' captures the vivid, powerful imagery better than the more neutral 'breath,' while preserving the metaphor rather than flattening it.
- source_word: אַפֶּיךָ
  chosen: your nostrils
  alternatives:
  - your anger
  - your nose
  lexicon: HALOT
  rationale: Though אַף can idiomatically mean anger, here the dual/plural construct with second masculine singular suffix is concretely linked to רוּחַ ('blast/breath') and supports the bodily image 'nostrils.' This preserves the anthropomorphic poetry of the song.
- source_word: נֶעֶרְמוּ
  chosen: piled up
  alternatives:
  - were heaped up
  - were stacked up
  lexicon: HALOT
  rationale: The verb conveys being heaped or piled. 'Piled up' is natural modern English and fits the image of waters massing together.
- source_word: מַיִם
  chosen: the waters
  alternatives:
  - waters
  lexicon: HALOT
  rationale: English idiom often uses the definite form for a large body of water in poetic narrative. The article is not explicit in Hebrew, but 'the waters' reads naturally and refers to the sea waters in context.
- source_word: נִצְּבוּ
  chosen: stood
  alternatives:
  - took their stand
  - were stationed
  lexicon: HALOT
  rationale: The verb means to stand or station oneself. 'Stood' is the most direct and idiomatic rendering in this poetic description.
- source_word: כְמוֹ נֵד
  chosen: like a heap
  alternatives:
  - like a wall
  - like a mound
  lexicon: HALOT
  rationale: נֵד most naturally denotes a heap or piled mass. Although some translations use 'wall' under influence from narrative parallels, this verse's own lexical image is of piled-up waters, so 'heap' better reflects the Hebrew.
- source_word: נֹזְלִים
  chosen: the flowing waters
  alternatives:
  - the floods
  - the streams
  lexicon: HALOT
  rationale: As a participle from a verb meaning to flow, it describes the waters as flowing. Rendering it adjectivally as 'the flowing waters' preserves the participial force and avoids introducing a different noun not present in the Hebrew.
- source_word: קָפְאוּ
  chosen: congealed
  alternatives:
  - froze
  - became hard
  lexicon: HALOT
  rationale: The verb denotes thickening, curdling, or congealing. 'Congealed' preserves the poetic image without forcing a strictly modern scientific notion of freezing solid.
- source_word: תְהֹמֹת
  chosen: the depths
  alternatives:
  - the deeps
  - the deep waters
  lexicon: HALOT
  rationale: A plural form referring to the deep waters or ocean depths. 'The depths' is clear modern English and retains the grandeur of the image.
- source_word: בְּלֶב יָם
  chosen: in the heart of the sea
  alternatives:
  - in the midst of the sea
  - in the middle of the sea
  lexicon: HALOT
  rationale: Literally 'in the heart of the sea.' This idiom can mean the midst, but retaining 'heart' preserves the poetic force and remains intelligible in English.
