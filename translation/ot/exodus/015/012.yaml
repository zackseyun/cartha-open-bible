id: EXO.15.12
reference: Exodus 15:12
source:
  edition: WLC
  text: נָטִ֨יתָ֙ יְמִ֣ינְ/ךָ֔ תִּבְלָעֵ֖/מוֹ אָֽרֶץ׃
translation:
  text: You stretched out your right hand[a]; the earth swallowed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land swallowed them' or 'the ground swallowed them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָטִיתָ
  chosen: You stretched out
  alternatives:
  - You extended
  - You reached out
  lexicon: HALOT
  rationale: Qal perfect 2ms of נטה, addressing God directly. 'Stretched out' is idiomatic modern English and preserves the concrete action better than a more wooden 'extended.'
- source_word: יְמִינְךָ
  chosen: your right hand
  alternatives:
  - your right arm
  lexicon: HALOT
  rationale: Literally 'your right hand.' In biblical poetry the right hand signifies power, but the concrete body-part expression should be retained in the main text rather than interpreted as 'arm.'
- source_word: תִּבְלָעֵמוֹ
  chosen: swallowed them
  alternatives:
  - consumed them
  - engulfed them
  lexicon: HALOT
  rationale: 'From בלע ''swallow, engulf.'' With 3fs subject and 3mp object suffix, the following noun ''earth'' is the subject: ''the earth swallowed them.'' ''Swallowed'' preserves the vivid metaphor and echoes common biblical usage.'
- source_word: אָרֶץ
  chosen: the earth
  alternatives:
  - the land
  - the ground
  lexicon: HALOT
  rationale: Although אֶרֶץ can mean 'land' or 'ground,' here in the poetic image of the enemy being engulfed, 'the earth' best matches the cosmic, dramatic sense and the feminine singular verb preceding it.
