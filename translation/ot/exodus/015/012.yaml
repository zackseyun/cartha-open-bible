theological_decisions:
- issue: Anthropomorphic language for divine action
  chosen_reading: Retain the concrete expression 'your right hand' without reducing it to an abstract statement of power.
  alternative_readings:
  - your power
  - your mighty hand
  rationale: The Hebrew uses anthropomorphic imagery in poetic praise. Preserving the image maintains the text's literary and theological force without over-interpreting it.
