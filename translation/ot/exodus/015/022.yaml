id: EXO.15.22
reference: Exodus 15:22
source:
  edition: WLC
  text: וַ/יַּסַּ֨ע מֹשֶׁ֤ה אֶת יִשְׂרָאֵל֙ מִ/יַּם ס֔וּף וַ/יֵּצְא֖וּ אֶל מִדְבַּר
    שׁ֑וּר וַ/יֵּלְכ֧וּ שְׁלֹֽשֶׁת יָמִ֛ים בַּ/מִּדְבָּ֖ר וְ/לֹא מָ֥צְאוּ מָֽיִם־־־־־־׃
translation:
  text: Then Moses led Israel on from the Sea of Reeds, and they went out into the
    wilderness of Shur. They went three days in the wilderness and found no water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditionally rendered 'Red Sea'; Hebrew 'Sea of Reeds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּסַּע
  chosen: led ... on
  alternatives:
  - set out
  - caused ... to journey
  - made ... pull up camp
  lexicon: HALOT
  rationale: 'The Hiphil of נסע here is causative: Moses caused Israel to move on
    from their previous location. ''Led ... on'' is natural English that preserves
    the causative sense better than a simple intransitive ''set out,'' while avoiding
    overly wooden phrasing.'
- source_word: מִיַּם סוּף
  chosen: from the Sea of Reeds
  alternatives:
  - from the Red Sea
  lexicon: HALOT
  rationale: The Hebrew expression literally denotes the 'Sea of Reeds.' In keeping
    with original-language primacy over translation tradition, the main text follows
    the plain sense rather than the traditional but less literal 'Red Sea.' The traditional
    rendering is preserved in a footnote.
- source_word: מִדְבַּר שׁוּר
  chosen: the wilderness of Shur
  alternatives:
  - the desert of Shur
  lexicon: HALOT
  rationale: מִדְבָּר commonly refers to wilderness/desert terrain. 'Wilderness' is
    preferred for consistency with common biblical usage and because it need not imply
    a sand desert specifically.
- source_word: וַיֵּצְאוּ
  chosen: they went out
  alternatives:
  - they came out
  - they departed
  lexicon: HALOT
  rationale: The verb יצא straightforwardly means 'go out/come out.' 'Went out' fits
    the narrative movement from the sea region into the wilderness.
- source_word: שְׁלֹשֶׁת יָמִים
  chosen: three days
  alternatives:
  - for three days
  - a three-day journey
  lexicon: HALOT
  rationale: The accusative of duration is naturally rendered 'three days.' English
    readers will understand duration from context; 'a three-day journey' would add
    interpretive specificity not explicit in the Hebrew.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - through the wilderness
  - in the desert
  lexicon: HALOT
  rationale: The preposition ב plus מִדְבָּר is most simply 'in the wilderness.' 'Through'
    is possible contextually, but 'in' stays closer to the Hebrew while remaining
    idiomatic.
- source_word: לֹא מָצְאוּ מָיִם
  chosen: found no water
  alternatives:
  - did not find water
  lexicon: HALOT
  rationale: This is a direct and idiomatic rendering of the Hebrew clause. 'Found
    no water' is concise and natural in English.
