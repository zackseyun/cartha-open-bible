id: EXO.15.7
reference: Exodus 15:7
source:
  edition: WLC
  text: וּ/בְ/רֹ֥ב גְּאוֹנְ/ךָ֖ תַּהֲרֹ֣ס קָמֶ֑י/ךָ תְּשַׁלַּח֙ חֲרֹ֣נְ/ךָ֔ יֹאכְלֵ֖/מוֹ
    כַּ/קַּֽשׁ׃
translation:
  text: And in the greatness of your majesty you overthrow those who rise up against
    you; you send out your burning anger; it consumes them like stubble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the abundance of your grandeur.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you send forth your wrath.' The Hebrew literally refers to 'your burning
      anger.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/רֹב
  chosen: And in the greatness of
  alternatives:
  - And with the abundance of
  - And by the greatness of
  lexicon: HALOT
  rationale: The preposition ב with רֹב can denote sphere or means; in English, 'in
    the greatness of' preserves the Hebrew idiom naturally while keeping the sense
    of overwhelming magnitude. The prefixed ו is rendered as simple connective 'And'.
- source_word: גְּאוֹנְךָ
  chosen: your majesty
  alternatives:
  - your exaltation
  - your grandeur
  - your excellency
  lexicon: HALOT
  rationale: גָּאוֹן can denote exaltation, majesty, or grandeur. In this hymn celebrating
    YHWH's triumph, 'majesty' best conveys royal splendor and overwhelming superiority
    in idiomatic English.
- source_word: תַּהֲרֹס
  chosen: you overthrow
  alternatives:
  - you tear down
  - you demolish
  - you shatter
  lexicon: HALOT
  rationale: The verb הרס commonly means to tear down or demolish. 'Overthrow' fits
    the military-poetic context and works well with personal objects ('those who rise
    up against you') rather than buildings.
- source_word: קָמֶיךָ
  chosen: those who rise up against you
  alternatives:
  - your adversaries
  - those who stand against you
  lexicon: HALOT
  rationale: From קום in participial form, literally 'those rising against you.' The
    fuller rendering preserves the verbal force and hostility directed toward God.
- source_word: תְּשַׁלַּח
  chosen: you send out
  alternatives:
  - you unleash
  - you send forth
  lexicon: HALOT
  rationale: שׁלח means 'send.' 'Send out' is a transparent rendering; 'unleash' is
    vivid but slightly more interpretive. The context already supplies force through
    the object 'your burning anger.'
- source_word: חֲרֹנְךָ
  chosen: your burning anger
  alternatives:
  - your wrath
  - your fierce anger
  lexicon: HALOT
  rationale: חָרוֹן denotes burning anger, often divine wrath. 'Burning anger' preserves
    the underlying imagery of heat, which also suits the following consumption metaphor.
- source_word: יֹאכְלֵמוֹ
  chosen: it consumes them
  alternatives:
  - it devours them
  - it eats them up
  lexicon: HALOT
  rationale: The singular verb with plural suffix refers back to the singular collective
    'your burning anger.' 'Consumes' is idiomatic in English and fits the fire-like
    imagery.
- source_word: כַּקַּשׁ
  chosen: like stubble
  alternatives:
  - like chaff
  - like straw
  lexicon: HALOT
  rationale: קַשׁ refers to stubble or straw left from grain stalks. 'Stubble' best
    matches the image of something dry and quickly consumed, a common biblical simile
    for destruction.
