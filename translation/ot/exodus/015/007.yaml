theological_decisions:
- issue: Rendering divine judgment language without softening the metaphor
  chosen_reading: you send out your burning anger; it consumes them like stubble
  alternative_readings:
  - you unleash your wrath; it devours them like straw
  rationale: The Hebrew explicitly attributes destructive judgment to God in poetic
    imagery. The translation preserves this directly without importing later doctrinal
    explanation or softening the force of the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Second-person divine address
  chosen_reading: your majesty ... against you ... your burning anger
  rationale: The song addresses God directly in the second person. Retaining this
    preserves the hymn's worshipful and confessional character.
