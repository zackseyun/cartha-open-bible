id: EXO.15.5
reference: Exodus 15:5
source:
  edition: WLC
  text: תְּהֹמֹ֖ת יְכַסְיֻ֑/מוּ יָרְד֥וּ בִ/מְצוֹלֹ֖ת כְּמוֹ אָֽבֶן־׃
translation:
  text: The depths covered them[a]; they went down into the depths like a stone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The deep waters covered them; they sank into the depths like a stone.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּהֹמֹת
  chosen: the depths
  alternatives:
  - the deep waters
  - the deeps
  - the abysses
  lexicon: HALOT
  rationale: Plural of תְּהוֹם refers to the deep waters/abyss. 'The depths' is natural modern English and preserves the poetic image without over-specifying mythic or cosmological nuance.
- source_word: יְכַסְיֻמוּ
  chosen: covered them
  alternatives:
  - covered over them
  - concealed them
  lexicon: HALOT
  rationale: From כסה, 'to cover.' With 3mp suffix, the sense is that the waters covered the Egyptians. 'Covered them' is the most direct and idiomatic rendering.
- source_word: יָרְדוּ
  chosen: they went down
  alternatives:
  - they sank
  - they descended
  lexicon: HALOT
  rationale: Qal perfect of ירד, 'to go down, descend.' 'They went down' keeps the verbal imagery of descent; 'sank' is interpretive and slightly more dynamic, though contextually valid.
- source_word: בִמְצוֹלֹת
  chosen: into the depths
  alternatives:
  - into the deep places
  - into the sea depths
  - into the abysses
  lexicon: HALOT
  rationale: מְצוֹלָה denotes depths, especially sea depths. Rendering this also as 'depths' preserves the parallelism with תְּהֹמֹת, though the Hebrew uses a different term. The preposition ב here is rendered idiomatically as 'into' with a motion verb in English.
- source_word: כְּמוֹ
  chosen: like
  alternatives:
  - as
  lexicon: HALOT
  rationale: Standard comparative particle; 'like' is the clearest contemporary equivalent.
- source_word: אָבֶן
  chosen: a stone
  alternatives:
  - stone
  lexicon: HALOT
  rationale: Common noun meaning 'stone.' The indefinite article is natural in English and fits the simile.
