id: EXO.18.22
reference: Exodus 18:22
source:
  edition: WLC
  text: וְ/שָׁפְט֣וּ אֶת הָ/עָם֮ בְּ/כָל עֵת֒ וְ/הָיָ֞ה כָּל הַ/דָּבָ֤ר הַ/גָּדֹל֙
    יָבִ֣יאוּ אֵלֶ֔י/ךָ וְ/כָל הַ/דָּבָ֥ר הַ/קָּטֹ֖ן יִשְׁפְּטוּ הֵ֑ם וְ/הָקֵל֙ מֵֽ/עָלֶ֔י/ךָ
    וְ/נָשְׂא֖וּ אִתָּֽ/ךְ־־־־־׃
translation:
  text: And let them judge the people at all times. Then every great matter they shall
    bring to you, but every small matter they themselves shall judge. So it will be
    lighter for you, and they will bear the burden with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every major case ... every minor case.' The Hebrew uses 'great' and
      'small' for matters brought for judgment.
    reason: lexical_alternative
  - marker: b
    text: The final clause implies the burden of judging the people, though 'burden'
      is not stated explicitly in Hebrew.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁפְטוּ
  chosen: let them judge
  alternatives:
  - they shall judge
  - they will judge
  lexicon: HALOT
  rationale: The verb means 'judge/govern/decide cases.' In context Jethro is giving
    instruction, so English idiom benefits from an imperatival nuance ('let them judge')
    rather than a bare future, while still reflecting the Hebrew wayyiqtol sequence.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: Refers to the Israelite community generally, not specifically a political
    nation-state in this clause.
- source_word: בְּכָל עֵת
  chosen: at all times
  alternatives:
  - at all times/continually
  - whenever needed
  lexicon: HALOT
  rationale: A straightforward temporal expression indicating regular availability
    for judgment. 'At all times' preserves the formal sense better than the more interpretive
    'whenever needed.'
- source_word: וְהָיָה
  chosen: Then
  alternatives:
  - and it shall be
  - and it will be
  lexicon: HALOT
  rationale: Introduces the resulting arrangement. Rendering with 'Then' gives natural
    English while preserving the consequential force of the Hebrew narrative sequence.
- source_word: כָּל הַדָּבָר הַגָּדֹל
  chosen: every great matter
  alternatives:
  - every major case
  - every important matter
  lexicon: HALOT
  rationale: דבר here refers to a matter/case brought for judgment. 'Great matter'
    stays close to the Hebrew while remaining understandable; 'case' is possible but
    slightly more interpretive/legalized.
- source_word: יָבִיאוּ אֵלֶיךָ
  chosen: they shall bring to you
  alternatives:
  - they will bring to you
  - they shall bring before you
  lexicon: HALOT
  rationale: 'Standard causative/transfer sense of בוא in Hiphil: bring a matter to
    Moses for adjudication.'
- source_word: כָּל הַדָּבָר הַקָּטֹן
  chosen: every small matter
  alternatives:
  - every minor case
  - every lesser matter
  lexicon: HALOT
  rationale: Antithetical pair with 'great matter.' 'Small matter' preserves the lexical
    contrast directly.
- source_word: יִשְׁפְּטוּ הֵם
  chosen: they themselves shall judge
  alternatives:
  - they shall judge
  - they are to judge
  lexicon: HALOT
  rationale: 'The explicit pronoun הֵם adds emphasis/contrast: the subordinate judges,
    not Moses, will handle these matters. ''They themselves'' captures that emphasis.'
- source_word: וְהָקֵל מֵעָלֶיךָ
  chosen: So make it lighter for yourself
  alternatives:
  - thus lighten it from upon yourself
  - make it easier for yourself
  lexicon: HALOT
  rationale: The Hiphil of קל means 'make light/lighten.' The idiom מֵעָלֶיךָ conveys
    removing burden from upon Moses. 'Make it lighter for yourself' preserves the
    metaphor without awkwardness.
- source_word: וְנָשְׂאוּ אִתָּךְ
  chosen: and they will bear it with you
  alternatives:
  - and they will carry it with you
  - and they will bear the burden with you
  lexicon: HALOT
  rationale: נשא means 'bear/carry.' The object is implicit from context—the judicial
    burden/workload. 'Bear it with you' keeps the Hebrew's terseness while making
    the implied object explicit enough for English.
