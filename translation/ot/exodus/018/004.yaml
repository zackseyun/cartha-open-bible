theological_decisions:
- issue: Implicit subject in the naming explanation
  chosen_reading: Added 'he said' to make explicit that the explanation reflects Moses'
    reason for the name
  alternative_readings:
  - 'No explicit speech tag: ''for the God of my father was my help, and he delivered
    me from Pharaoh’s sword'''
  rationale: The Hebrew does not contain a verb of speaking here, but English often
    benefits from making the naming formula explicit. This addition is interpretive
    but modest, clarifying that the clause gives Moses' rationale for the name rather
    than introducing a narrator aside. Because the source does not explicitly say
    'he said,' this decision is documented.
