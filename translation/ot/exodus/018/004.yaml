id: EXO.18.4
reference: Exodus 18:4
source:
  edition: WLC
  text: וְ/שֵׁ֥ם הָ/אֶחָ֖ד אֱלִיעֶ֑זֶר כִּֽי אֱלֹהֵ֤י אָבִ/י֙ בְּ/עֶזְרִ֔/י וַ/יַּצִּלֵ֖/נִי
    מֵ/חֶ֥רֶב פַּרְעֹֽה־׃
translation:
  text: And the name of the other was Eliezer, for the God of my father was my help,
    and he delivered me from Pharaoh’s sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew simply reads, 'for the God of my father was my help, and he delivered
      me from Pharaoh’s sword,' without an explicit 'he said.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשֵׁם
  chosen: And the name
  alternatives:
  - And the name of
  lexicon: HALOT
  rationale: Retains the Hebrew narrative formula introducing the naming of the second
    son. Including 'And' reflects the conjunction and preserves the flow from the
    previous verse.
- source_word: הָאֶחָד
  chosen: the other
  alternatives:
  - the one
  - the second
  lexicon: HALOT
  rationale: In context, after naming one son in the previous verse, הָאֶחָד idiomatically
    refers to the other one. 'The other' is natural English and preserves the contrast.
- source_word: אֱלִיעֶזֶר
  chosen: Eliezer
  rationale: Personal names are transliterated by standard convention. The name itself
    likely means 'My God is help,' which resonates with the explanation that follows,
    but the text presents it as a proper name.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the explanation for the name. 'For' fits the explanatory naming
    formula in English biblical style without sounding archaic in this context.
- source_word: אֱלֹהֵי אָבִי
  chosen: The God of my father
  alternatives:
  - My father's God
  lexicon: HALOT
  rationale: A formally close rendering that preserves the construct phrase and its
    covenantal resonance. Capitalizing 'God' is appropriate because it refers to Israel's
    God.
- source_word: בְּעֶזְרִי
  chosen: was my help
  alternatives:
  - was in my help
  - helped me
  - is my help
  lexicon: HALOT
  rationale: The noun עֵזֶר with first-person suffix is most naturally rendered as
    'my help.' Supplying 'was' makes the clause idiomatic in English and matches the
    retrospective sense of the naming explanation.
- source_word: וַיַּצִּלֵנִי
  chosen: and he delivered me
  alternatives:
  - and he rescued me
  - and he snatched me away
  lexicon: HALOT
  rationale: נצל commonly means 'deliver' or 'rescue.' 'Delivered' is a clear and
    dignified rendering that fits both the immediate danger and broader biblical usage.
- source_word: מֵחֶרֶב פַּרְעֹה
  chosen: from Pharaoh’s sword
  alternatives:
  - from the sword of Pharaoh
  lexicon: HALOT
  rationale: A literal rendering of the construct phrase. It refers to Pharaoh's lethal
    power or threat, and the possessive form is natural English.
