theological_decisions:
- issue: Implied subject/agent in 'after her sending away'
  chosen_reading: 'Moses is the implied agent: ''after he had sent her away.'''
  alternative_readings:
  - after her dismissal
  - after she had been sent away
  rationale: The Hebrew uses a nominal form with a feminine suffix ('her sending away')
    and does not explicitly state the agent. English normally requires one. Given
    the immediate context ('Zipporah, Moses’ wife') and the broader narrative, Moses
    is the most natural implied subject. The alternative passive-like rendering is
    possible and worth preserving in a footnote because the Hebrew itself leaves the
    agent implicit.
  doctrine_reference: Preserve theological/interpreive tension rather than resolve
    it where the source is genuinely ambiguous.
