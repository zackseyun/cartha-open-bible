id: EXO.18.2
reference: Exodus 18:2
source:
  edition: WLC
  text: וַ/יִּקַּ֗ח יִתְרוֹ֙ חֹתֵ֣ן מֹשֶׁ֔ה אֶת צִפֹּרָ֖ה אֵ֣שֶׁת מֹשֶׁ֑ה אַחַ֖ר שִׁלּוּחֶֽי/הָ־׃
translation:
  text: Jethro, Moses’ father-in-law, took Zipporah, Moses’ wife, after he had sent
    her away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'after she had been sent away.' The Hebrew literally reads 'after her
      sending away,' leaving the agent implicit.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - received
  - brought
  lexicon: HALOT
  rationale: The verb לקח commonly means 'take.' In this narrative context, 'took'
    is the most direct rendering and leaves the exact nuance open (whether he took
    her into his care or brought her along).
- source_word: חֹתֵן מֹשֶׁה
  chosen: Moses’ father-in-law
  alternatives:
  - the father-in-law of Moses
  lexicon: HALOT
  rationale: חֹתֵן denotes a relation by marriage; here it identifies Jethro as Moses'
    father-in-law. The possessive form is natural English.
- source_word: צִפֹּרָה
  chosen: Zipporah
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: אֵשֶׁת מֹשֶׁה
  chosen: Moses’ wife
  alternatives:
  - the wife of Moses
  lexicon: HALOT
  rationale: Construct phrase straightforwardly identifies Zipporah as Moses' wife;
    possessive English is most readable.
- source_word: אַחַר
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: 'Temporal/sequential sense fits the context: this action occurred after
    a prior event involving Zipporah.'
- source_word: שִׁלּוּחֶיהָ
  chosen: he had sent her away
  alternatives:
  - her being sent away
  - her dismissal
  lexicon: HALOT
  rationale: The noun from שלח with 3fs suffix literally means 'her sending away.'
    In context, the understood agent is Moses from the surrounding narrative, so idiomatic
    English supplies 'he had sent her away.' This best captures the likely sense without
    over-paraphrasing.
