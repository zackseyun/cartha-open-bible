id: EXO.18.12
reference: Exodus 18:12
source:
  edition: WLC
  text: וַ/יִּקַּ֞ח יִתְר֨וֹ חֹתֵ֥ן מֹשֶׁ֛ה עֹלָ֥ה וּ/זְבָחִ֖ים לֵֽ/אלֹהִ֑ים וַ/יָּבֹ֨א
    אַהֲרֹ֜ן וְ/כֹ֣ל זִקְנֵ֣י יִשְׂרָאֵ֗ל לֶ/אֱכָל לֶ֛חֶם עִם חֹתֵ֥ן מֹשֶׁ֖ה לִ/פְנֵ֥י
    הָ/אֱלֹהִֽים׀־־׃
translation:
  text: Then Jethro, Moses’ father-in-law, took a burnt offering and sacrifices for
    God, and Aaron and all the elders of Israel came to eat bread with Moses’ father-in-law
    before God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'to eat bread,' an idiom that can mean 'to share a meal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - brought
  - offered
  lexicon: HALOT
  rationale: The verb לקח literally means 'took.' In sacrificial context English may
    smooth to 'brought' or 'offered,' but the Hebrew here states that Jethro took
    the offerings, with the actual sacrificial sense supplied by the objects and context.
    'Took' preserves the wording without over-paraphrasing.
- source_word: חֹתֵן מֹשֶׁה
  chosen: Moses’ father-in-law
  alternatives:
  - Moses’ relative by marriage
  lexicon: HALOT
  rationale: חֹתֵן ordinarily denotes a father-in-law in this narrative context and
    is the established relational sense for Jethro with respect to Moses.
- source_word: עֹלָה
  chosen: a burnt offering
  alternatives:
  - an ascent offering
  lexicon: HALOT
  rationale: עֹלָה is the standard sacrificial term for a whole burnt offering. 'Burnt
    offering' is the clearest conventional English equivalent; 'ascent offering' is
    more etymological but less transparent for readers.
- source_word: זְבָחִים
  chosen: sacrifices
  alternatives:
  - sacrificial offerings
  - slaughter offerings
  lexicon: HALOT
  rationale: זְבָחִים is a broad plural term for sacrifices, distinct from the specific
    עֹלָה. 'Sacrifices' preserves that broader category while allowing the pairing
    'burnt offering and sacrifices.'
- source_word: לֵאלֹהִים
  chosen: for God
  alternatives:
  - to God
  lexicon: HALOT
  rationale: The preposition ל can be rendered 'to' or 'for.' 'For God' fits idiomatic
    English with sacrificial objects, indicating dedication without changing the sense.
- source_word: וַיָּבֹא אַהֲרֹן וְכָל זִקְנֵי יִשְׂרָאֵל
  chosen: Aaron and all the elders of Israel came
  alternatives:
  - Aaron came, and all the elders of Israel
  - Aaron entered, and all the elders of Israel
  lexicon: HALOT
  rationale: Though the singular verb formally precedes Aaron, the coordinated phrase
    naturally yields a plural sense in English. 'Came' is the normal rendering of
    בוא here.
- source_word: לֶאֱכָל לֶחֶם
  chosen: to eat bread
  alternatives:
  - to eat a meal
  - to share a meal
  lexicon: HALOT
  rationale: Literally the phrase is 'to eat bread.' In Hebrew this can idiomatically
    mean to partake of a meal. The main text keeps the concrete expression 'eat bread'
    for transparency to the source; the meal sense is worth preserving in a footnote.
- source_word: עִם חֹתֵן מֹשֶׁה
  chosen: with Moses’ father-in-law
  alternatives:
  - with Jethro
  lexicon: HALOT
  rationale: The Hebrew repeats the relational designation rather than the personal
    name. Retaining 'Moses’ father-in-law' reflects the source's discourse pattern.
- source_word: לִפְנֵי הָאֱלֹהִים
  chosen: before God
  alternatives:
  - in the presence of God
  - before the true God
  lexicon: HALOT
  rationale: לִפְנֵי commonly means 'before' or 'in the presence of.' 'Before God'
    is concise and natural, preserving the solemn cultic setting without adding interpretive
    qualifiers.
