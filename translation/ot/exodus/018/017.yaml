id: EXO.18.17
reference: Exodus 18:17
source:
  edition: WLC
  text: וַ/יֹּ֛אמֶר חֹתֵ֥ן מֹשֶׁ֖ה אֵלָ֑י/ו לֹא טוֹב֙ הַ/דָּבָ֔ר אֲשֶׁ֥ר אַתָּ֖ה עֹשֶֽׂה־׃
translation:
  text: Moses' father-in-law said to him, “What you are doing is not good.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “The matter that you are doing is not good.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. English idiom typically omits
    repeated initial 'and' in such contexts while preserving the simple speech introduction
    with 'said'.
- source_word: חֹתֵן מֹשֶׁה
  chosen: Moses' father-in-law
  alternatives:
  - the father-in-law of Moses
  lexicon: HALOT
  rationale: Construct chain meaning 'father-in-law of Moses.' The possessive form
    is natural modern English and preserves the familial relationship.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - to Moses
  lexicon: HALOT
  rationale: The pronominal object refers back to Moses. 'To him' reflects the Hebrew
    directly without unnecessarily repeating the name.
- source_word: לֹא טוֹב
  chosen: is not good
  alternatives:
  - is not right
  - is not beneficial
  lexicon: HALOT
  rationale: טוֹב has a broad semantic range including good, pleasing, beneficial.
    'Not good' is the most direct and idiomatic rendering here and preserves the evaluative
    force without over-interpreting.
- source_word: הַדָּבָר
  chosen: what
  alternatives:
  - the thing
  - the matter
  lexicon: HALOT
  rationale: Although literally 'the thing/matter,' in English the clause is best
    expressed as 'What you are doing.' This is an optimal-equivalence rendering that
    preserves the sense of the Hebrew nominal expression with the relative clause.
- source_word: אֲשֶׁר אַתָּה עֹשֶׂה
  chosen: you are doing
  alternatives:
  - you do
  - you are making
  lexicon: HALOT
  rationale: The participle עֹשֶׂה conveys ongoing action. 'You are doing' captures
    the present progressive sense in context, referring to Moses' current practice
    of judging the people alone.
