id: EXO.18.26
reference: Exodus 18:26
source:
  edition: WLC
  text: וְ/שָׁפְט֥וּ אֶת הָ/עָ֖ם בְּ/כָל עֵ֑ת אֶת הַ/דָּבָ֤ר הַ/קָּשֶׁה֙ יְבִיא֣וּ/ן אֶל מֹשֶׁ֔ה וְ/כָל הַ/דָּבָ֥ר הַ/קָּטֹ֖ן יִשְׁפּוּט֥וּ הֵֽם־־־־־׃
translation:
  text: And they judged the people at all times. Every difficult matter they would bring to Moses[a], but every small matter they themselves would judge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every hard case ... every minor matter.' The Hebrew contrasts the difficult cases with the smaller ones in a judicial setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁפְטוּ
  chosen: they judged
  alternatives:
  - they would judge
  - they administered justice
  lexicon: HALOT
  rationale: Qal of שׁפט here describes the ongoing function of the appointed judges. English simple past fits the narrative summary, while the following clauses can express customary action more explicitly.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עם in Exodus commonly refers to the covenant community as a whole; 'the people' is the natural and consistent rendering here.
- source_word: בְּכָל עֵת
  chosen: at all times
  alternatives:
  - at all time
  - continually
  lexicon: HALOT
  rationale: The phrase indicates regular availability rather than a single occasion. 'At all times' is idiomatic modern English and preserves the sense of continual judicial access.
- source_word: הַדָּבָר הַקָּשֶׁה
  chosen: every difficult matter
  alternatives:
  - every hard case
  - the difficult matter
  lexicon: HALOT
  rationale: דבר in this legal context means a case, matter, or issue brought for judgment. 'Difficult matter' is clear modern English; 'hard case' is possible but more idiomatic/legalized. 'Every' reflects the class sense in context.
- source_word: יְבִיאוּן אֶל מֹשֶׁה
  chosen: they would bring ... to Moses
  alternatives:
  - they brought ... to Moses
  lexicon: HALOT
  rationale: The form expresses repeated customary action within the judicial arrangement. 'Would bring' captures the iterative sense in English better than a simple past alone.
- source_word: כָל הַדָּבָר הַקָּטֹן
  chosen: every small matter
  alternatives:
  - every minor matter
  - every small case
  lexicon: HALOT
  rationale: קטן contrasts with קשה, marking lesser or simpler cases. 'Small matter' preserves the lexical contrast straightforwardly; 'minor matter' is also possible but slightly more interpretive.
- source_word: יִשְׁפּוּטוּ הֵם
  chosen: they themselves would judge
  alternatives:
  - they would judge
  - they judged it themselves
  lexicon: HALOT
  rationale: The independent pronoun הם adds emphasis. 'They themselves' preserves that emphasis, highlighting that the lesser cases remained with the subordinate judges rather than Moses.
