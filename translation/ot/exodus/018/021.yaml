id: EXO.18.21
reference: Exodus 18:21
source:
  edition: WLC
  text: וְ/אַתָּ֣ה תֶחֱזֶ֣ה מִ/כָּל הָ֠/עָם אַנְשֵׁי חַ֜יִל יִרְאֵ֧י אֱלֹהִ֛ים אַנְשֵׁ֥י אֱמֶ֖ת שֹׂ֣נְאֵי בָ֑צַע וְ/שַׂמְתָּ֣ עֲלֵ/הֶ֗ם שָׂרֵ֤י אֲלָפִים֙ שָׂרֵ֣י מֵא֔וֹת שָׂרֵ֥י חֲמִשִּׁ֖ים וְ/שָׂרֵ֥י עֲשָׂרֹֽת־־׃
translation:
  text: But you shall select from all the people able men[a], those who fear God, men of truth, hating dishonest gain; and you shall appoint them over them as chiefs of thousands, chiefs of hundreds, chiefs of fifties[c][b], and chiefs of tens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'able men,' 'men of valor.' The Hebrew expression can denote strength, competence, or valor depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'trustworthy men' for 'men of truth.'
    reason: lexical_alternative
  - marker: c
    text: Or 'hating unjust gain'; the phrase refers to rejecting corrupt profit.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֶחֱזֶה
  chosen: shall select
  alternatives:
  - shall look for
  - shall choose
  - shall see/provide
  lexicon: HALOT
  rationale: The verb חזה literally relates to seeing, but in this context of identifying qualified leaders it carries the sense of discerning/selecting. 'Select' communicates the practical force in natural English without over-paraphrasing.
- source_word: מִכָּל־הָעָם
  chosen: from all the people
  alternatives:
  - out of all the people
  - from among all the people
  lexicon: HALOT
  rationale: A straightforward rendering of the partitive phrase; 'from all the people' is clear and idiomatic.
- source_word: אַנְשֵׁי חַיִל
  chosen: capable men
  alternatives:
  - able men
  - men of valor
  - worthy men
  - competent men
  lexicon: HALOT
  rationale: חַיִל can denote strength, competence, valor, or substance. In this judicial-administrative setting, the emphasis is on proven capability rather than military bravery alone. 'Capable men' best fits the context while preserving the masculine form of the Hebrew.
- source_word: יִרְאֵי אֱלֹהִים
  chosen: those who fear God
  alternatives:
  - God-fearing men
  - men who fear God
  lexicon: HALOT
  rationale: This phrase denotes reverence toward God as a moral qualification. 'Those who fear God' is natural English and avoids awkward repetition of 'men' while retaining the sense.
- source_word: אַנְשֵׁי אֱמֶת
  chosen: men of truth
  alternatives:
  - trustworthy men
  - reliable men
  - honest men
  lexicon: HALOT
  rationale: The Hebrew is literally 'men of truth.' Because אֱמֶת includes truthfulness, reliability, and faithfulness, the more literal rendering is retained in the main text to preserve the source texture; a more idiomatic alternative is worth noting.
- source_word: שֹׂנְאֵי בָצַע
  chosen: hating dishonest gain
  alternatives:
  - hating unjust gain
  - hating bribes
  - hating greed
  lexicon: HALOT
  rationale: בָּצַע often refers to gain acquired unjustly or greedily. 'Dishonest gain' captures the ethical corruption in view better than the broader 'greed' and more directly than 'bribes,' which is too narrow.
- source_word: וְשַׂמְתָּ עֲלֵהֶם
  chosen: you shall appoint them over them
  alternatives:
  - set them over them
  - place them over the people
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'appoint/set them over them,' with the pronouns referring back to the people. The English keeps the double reference, though slightly awkward, to remain transparent to the source.
- source_word: שָׂרֵי
  chosen: chiefs of
  alternatives:
  - leaders of
  - officials over
  - rulers of
  - captains of
  lexicon: HALOT
  rationale: שַׂר denotes a leader, chief, or official. 'Chiefs' preserves the formal administrative sense without importing specifically military connotations that 'captains' might suggest.
- source_word: אֲלָפִים / מֵאוֹת / חֲמִשִּׁים / עֲשָׂרֹת
  chosen: thousands ... hundreds ... fifties ... tens
  alternatives:
  - groups of thousands ... groups of hundreds ... groups of fifties ... groups of tens
  lexicon: HALOT
  rationale: These numerals describe graded units of oversight. The concise construction 'chiefs of thousands' etc. is the most direct representation of the Hebrew structure.
