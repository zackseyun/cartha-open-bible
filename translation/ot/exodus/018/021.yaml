theological_decisions:
- issue: Gendered language in leadership qualifications
  chosen_reading: capable men ... men of truth
  alternative_readings:
  - capable people
  - able persons
  - trustworthy people
  rationale: The Hebrew uses masculine plural expressions אַנְשֵׁי חַיִל and אַנְשֵׁי אֱמֶת. Following the project's gender-accurate principle, the translation preserves the masculine form rather than neutralizing it. This reflects the source wording without making a broader doctrinal claim beyond the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
