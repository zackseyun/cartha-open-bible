id: EXO.18.18
reference: Exodus 18:18
source:
  edition: WLC
  text: נָבֹ֣ל תִּבֹּ֔ל גַּם אַתָּ֕ה גַּם הָ/עָ֥ם הַ/זֶּ֖ה אֲשֶׁ֣ר עִמָּ֑/ךְ כִּֽי כָבֵ֤ד מִמְּ/ךָ֙ הַ/דָּבָ֔ר לֹא תוּכַ֥ל עֲשֹׂ֖/הוּ לְ/בַדֶּֽ/ךָ־־־־׃
translation:
  text: You will surely wear yourself out[a], both you and this people who are with you, because the matter is too heavy for you. You are not able to do it by yourself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''You will surely become exhausted.'' The Hebrew idiom literally repeats the verb for emphasis: ''wearing out, you will wear out.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: נָבֹל תִּבֹּל
  chosen: you will surely wear yourself out
  alternatives:
  - you will surely fade away
  - you will surely become exhausted
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verb, expressing certainty/emphasis. In context Jethro warns of exhaustion from overwork, so 'you will surely wear yourself out' communicates the idiom naturally while preserving the force.
- source_word: גַּם אַתָּה גַּם הָעָם הַזֶּה
  chosen: both you and this people
  alternatives:
  - you as well as this people
  - both you and these people
  lexicon: HALOT
  rationale: The repeated גַּם marks inclusion of both parties. 'This people' follows the singular collective עָם with demonstrative הַזֶּה.
- source_word: אֲשֶׁר עִמָּךְ
  chosen: who are with you
  alternatives:
  - that are with you
  - who is with you
  lexicon: HALOT
  rationale: Though עָם is singular collective, English idiom commonly treats 'people' as plural, so 'who are with you' is the most natural rendering.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the warning. 'Because' is clearer in contemporary English, though 'for' would be more formally literal.
- source_word: כָבֵד מִמְּךָ הַדָּבָר
  chosen: the matter is too heavy for you
  alternatives:
  - the thing is too burdensome for you
  - the task is too difficult for you
  lexicon: HALOT
  rationale: כָבֵד literally means 'heavy'; here metaphorically of an excessive burden. 'Matter' reflects דָּבָר broadly and keeps the judicial/administrative context without over-specifying.
- source_word: לֹא תוּכַל
  chosen: you are not able
  alternatives:
  - you cannot
  lexicon: HALOT
  rationale: Expresses inability. 'You are not able' is slightly more formal and pairs well with the following infinitive construction.
- source_word: עֲשֹׂהוּ
  chosen: to do it
  alternatives:
  - to handle it
  - to accomplish it
  lexicon: HALOT
  rationale: עשה is broad and unspecific; 'do it' preserves that breadth. 'Handle it' would be interpretive.
- source_word: לְבַדֶּךָ
  chosen: by yourself
  alternatives:
  - alone
  lexicon: HALOT
  rationale: Conveys that Moses cannot carry out the task unaided. 'By yourself' is natural modern English and fits the advisory context.
