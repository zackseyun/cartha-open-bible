id: EXO.18.19
reference: Exodus 18:19
source:
  edition: WLC
  text: עַתָּ֞ה שְׁמַ֤ע בְּ/קֹלִ/י֙ אִיעָ֣צְ/ךָ֔ וִ/יהִ֥י אֱלֹהִ֖ים עִמָּ֑/ךְ הֱיֵ֧ה
    אַתָּ֣ה לָ/עָ֗ם מ֚וּל הָֽ/אֱלֹהִ֔ים וְ/הֵבֵאתָ֥ אַתָּ֛ה אֶת הַ/דְּבָרִ֖ים אֶל
    הָ/אֱלֹהִֽים־־׃
translation:
  text: Now listen to my voice; I will advise you, and God be with you. You be for
    the people before God, and you shall bring the matters to God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'may God be with you.' The Hebrew form expresses a wish or blessing.
    reason: lexical_alternative
  - marker: b
    text: Or 'You shall represent the people before God.'
    reason: alternative_reading
  - marker: c
    text: '''The matters'' here refers to the people''s cases or disputes brought
      for decision.'
    reason: cultural_note
lexical_decisions:
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - So now
  - At this time
  lexicon: HALOT
  rationale: Temporal/discourse marker introducing Jethro's next instruction. 'Now'
    is natural and sufficiently formal.
- source_word: שְׁמַע בְּקֹלִי
  chosen: listen to my voice
  alternatives:
  - obey my voice
  - listen to me
  lexicon: HALOT
  rationale: The idiom literally means 'hear/listen to my voice.' In this advisory
    context, 'listen to my voice' preserves the Hebrew expression without overstating
    it as strict obedience.
- source_word: אִיעָצְךָ
  chosen: I will advise you
  alternatives:
  - I will counsel you
  - let me advise you
  lexicon: HALOT
  rationale: From יעץ, 'to advise/counsel.' 'Advise' is clear modern English and fits
    Jethro's counsel.
- source_word: וִיהִי אֱלֹהִים עִמָּךְ
  chosen: and God be with you
  alternatives:
  - and may God be with you
  - and let God be with you
  lexicon: HALOT
  rationale: Jussive nuance expresses a wish/blessing. English can render this compactly
    as 'and God be with you'; the fuller modal alternative is preserved in a footnote.
- source_word: הֱיֵה אַתָּה לָעָם
  chosen: You be for the people
  alternatives:
  - You shall represent the people
  - Be you for the people
  lexicon: HALOT
  rationale: The Hebrew is literally 'be you for the people.' This introduces Moses'
    representative role. The more interpretive 'represent the people' is possible
    but slightly less transparent to the source wording, so it is footnoted.
- source_word: מוּל הָאֱלֹהִים
  chosen: before God
  alternatives:
  - before the true God
  - in the presence of God
  lexicon: HALOT
  rationale: מוּל commonly means 'before/in front of/opposite.' 'Before God' is the
    most natural concise rendering here.
- source_word: וְהֵבֵאתָ
  chosen: you bring
  alternatives:
  - you shall bring
  - you must bring
  lexicon: HALOT
  rationale: Perfect with prefixed conjunction after imperative/jussive sequence functions
    instructionally. Present-style imperative English ('you bring') keeps the sequence
    vivid without overformalizing.
- source_word: הַדְּבָרִים
  chosen: the matters
  alternatives:
  - the cases
  - the words
  - the issues
  lexicon: HALOT
  rationale: דבר is broad; in this judicial context it refers to matters/cases brought
    for decision. 'Matters' preserves breadth while fitting the context.
- source_word: אֶל הָאֱלֹהִים
  chosen: to God
  alternatives:
  - to the true God
  - to God himself
  lexicon: HALOT
  rationale: Direct object of Moses' mediatorial action. Simple 'to God' is accurate
    and idiomatic.
