theological_decisions:
- issue: Rendering אֱלֹהִים in a non-polemical narrative context
  chosen_reading: God
  alternative_readings:
  - the true God
  rationale: Although אֱלֹהִים is morphologically plural, in this context it clearly
    refers to Israel's God and takes singular sense. 'God' is standard and avoids
    unnecessary expansion.
- issue: Degree of interpretation in Moses' mediatorial role
  chosen_reading: You be for the people before God
  alternative_readings:
  - You shall represent the people before God
  rationale: The verse describes Moses' representative function, but the main text
    preserves the Hebrew structure rather than importing a more interpretive legal
    gloss. The representative sense is preserved in a footnote.
  doctrine_reference: Translation philosophy §3, §5
