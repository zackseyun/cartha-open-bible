id: EXO.18.10
reference: Exodus 18:10
source:
  edition: WLC
  text: וַ/יֹּאמֶר֮ יִתְרוֹ֒ בָּר֣וּךְ יְהוָ֔ה אֲשֶׁ֨ר הִצִּ֥יל אֶתְ/כֶ֛ם מִ/יַּ֥ד
    מִצְרַ֖יִם וּ/מִ/יַּ֣ד פַּרְעֹ֑ה אֲשֶׁ֤ר הִצִּיל֙ אֶת הָ/עָ֔ם מִ/תַּ֖חַת יַד מִצְרָֽיִם־־׃
translation:
  text: And Yitro said, “Blessed be the LORD, who delivered you from the hand of Egypt
    and from the hand of Pharaoh, who delivered the people from under the hand of
    Egypt.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Blessed is the LORD' or 'May the LORD be blessed.' The Hebrew blessing
      formula can be represented in more than one natural English way.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the hand of Egypt ... from under the hand of Egypt,' an idiom
      for deliverance from oppressive power or control.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive introduces the next event in narrative sequence.
    'And ... said' preserves the Hebrew flow without overinterpreting temporal nuance.
- source_word: יִתְרוֹ
  chosen: Yitro
  alternatives:
  - Jethro
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. 'Yitro' more directly reflects the Hebrew form than the traditional
    English 'Jethro'.
- source_word: בָּרוּךְ יְהוָה
  chosen: Blessed be the LORD
  alternatives:
  - Blessed is the LORD
  - May the LORD be blessed
  lexicon: HALOT
  rationale: The passive participial blessing formula is idiomatically rendered 'Blessed
    be the LORD' in English. This preserves the doxological force without awkward
    literalism.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD,' following
    Jewish reverence tradition and the Septuagintal pattern.
- source_word: הִצִּיל
  chosen: delivered
  alternatives:
  - rescued
  - saved
  lexicon: HALOT
  rationale: The Hiphil of נצל here denotes causing someone to escape from hostile
    power. 'Delivered' fits the exodus context well and is natural, while retaining
    theological weight.
- source_word: אֶתְכֶם
  chosen: you
  lexicon: HALOT
  rationale: Second person masculine plural object pronoun refers to Moses and/or
    Israel in context; English 'you' is the natural equivalent.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from the power of
  lexicon: HALOT
  rationale: The idiom 'from the hand of' is preserved because it is transparent in
    English and maintains the concrete metaphor of oppressive control.
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard rendering of the place/national name.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English form of the royal title/name.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עם in this context refers to Israel collectively. 'The people' is the
    most natural and contextually appropriate rendering.
- source_word: מִתַּחַת יַד
  chosen: from under the hand of
  alternatives:
  - from under the power of
  lexicon: HALOT
  rationale: The fuller idiom intensifies subjection beneath Egyptian control. Preserving
    'under the hand of' reflects the Hebrew imagery and distinguishes it from the
    earlier simpler phrase.
