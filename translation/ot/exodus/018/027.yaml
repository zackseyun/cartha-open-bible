id: EXO.18.27
reference: Exodus 18:27
source:
  edition: WLC
  text: וַ/יְשַׁלַּ֥ח מֹשֶׁ֖ה אֶת חֹתְנ֑/וֹ וַ/יֵּ֥לֶךְ ל֖/וֹ אֶל אַרְצֽ/וֹ־־׃פ
translation:
  text: Then Moses sent his father-in-law away, and he went to his own land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Then Moses dismissed his father-in-law, and he went to his land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׁלַּח
  chosen: sent ... away
  alternatives:
  - let ... go
  - dismissed
  lexicon: HALOT
  rationale: The verb שׁלח in the Piel with a personal object commonly means to send
    someone away or dismiss them. 'Sent ... away' is natural English and preserves
    the sense of a formal departure better than the more ambiguous 'let ... go.'
- source_word: חֹתְנוֹ
  chosen: his father-in-law
  alternatives:
  - his relative by marriage
  lexicon: HALOT
  rationale: The noun חֹתֵן in this context refers specifically to Jethro, Moses's
    wife's father. 'Father-in-law' is the clear contextual sense in Exodus 18.
- source_word: וַיֵּלֶךְ לוֹ
  chosen: and he went
  alternatives:
  - and he departed
  - and he went for himself
  lexicon: HALOT
  rationale: The idiom simply narrates Jethro's departure. The pronoun לוֹ is idiomatic/dative
    and need not be separately represented in English beyond the natural verb phrase.
    'Went' keeps the narrative flow concise.
- source_word: אֶל אַרְצוֹ
  chosen: to his own land
  alternatives:
  - to his land
  - to his country
  lexicon: HALOT
  rationale: אֶרֶץ can mean land or country. 'His own land' brings out the possessive
    force clearly and reads naturally in English without overstating a modern nation-state
    concept.
