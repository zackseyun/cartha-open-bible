id: EXO.18.13
reference: Exodus 18:13
source:
  edition: WLC
  text: וַ/יְהִי֙ מִֽ/מָּחֳרָ֔ת וַ/יֵּ֥שֶׁב מֹשֶׁ֖ה לִ/שְׁפֹּ֣ט אֶת הָ/עָ֑ם וַ/יַּעֲמֹ֤ד
    הָ/עָם֙ עַל מֹשֶׁ֔ה מִן הַ/בֹּ֖קֶר עַד הָ/עָֽרֶב־־־־׃
translation:
  text: And it happened on the next day that Moses sat to judge the people, and the
    people stood before Moses from morning until evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stood around Moses.' The Hebrew preposition can be understood more literally,
      but the sense in context is that the people were waiting before him for judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next event in narrative sequence.
    'And it happened' preserves the Hebrew narrative formula in readable modern English
    without archaic diction.
- source_word: מִמָּחֳרָת
  chosen: on the next day
  alternatives:
  - the next day
  - on the following day
  - on the morrow
  lexicon: HALOT
  rationale: The noun denotes the following day. 'On the next day' is natural English
    and preserves the temporal sense.
- source_word: וַיֵּשֶׁב
  chosen: sat
  alternatives:
  - took his seat
  - was sitting
  lexicon: HALOT
  rationale: The verb ישב literally means 'sat' or 'dwelt.' In this judicial context
    it refers to taking a seated position for adjudication. 'Sat' keeps the concrete
    image and allows the infinitive that follows to explain purpose.
- source_word: לִשְׁפֹּט
  chosen: to judge
  alternatives:
  - to decide cases for
  - to govern
  lexicon: HALOT
  rationale: The infinitive of שפט here refers to judicial decision-making among the
    people. 'To judge' is the most direct and contextually appropriate rendering.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עם in this context refers to the Israelite community collectively. 'The
    people' is the standard and most natural rendering.
- source_word: וַיַּעֲמֹד
  chosen: stood
  alternatives:
  - remained standing
  - took their stand
  lexicon: HALOT
  rationale: The verb עמד means 'stand.' In context it describes the people's posture
    as they waited for Moses' judgments. 'Stood' is simple and faithful.
- source_word: עַל מֹשֶׁה
  chosen: before Moses
  alternatives:
  - around Moses
  - over Moses
  - attending Moses
  lexicon: HALOT
  rationale: Although על often means 'on' or 'over,' with עמד in this context it idiomatically
    conveys being stationed in attendance before someone. 'Before Moses' best communicates
    the scene in idiomatic English.
- source_word: מִן הַבֹּקֶר עַד הָעָרֶב
  chosen: from morning until evening
  alternatives:
  - from the morning until the evening
  - from dawn until evening
  lexicon: HALOT
  rationale: This temporal expression marks the full span of the day. 'From morning
    until evening' is natural English and preserves the duration.
