id: EXO.18.5
reference: Exodus 18:5
source:
  edition: WLC
  text: וַ/יָּבֹ֞א יִתְר֨וֹ חֹתֵ֥ן מֹשֶׁ֛ה וּ/בָנָ֥י/ו וְ/אִשְׁתּ֖/וֹ אֶל מֹשֶׁ֑ה
    אֶל הַ/מִּדְבָּ֗ר אֲשֶׁר ה֛וּא חֹנֶ֥ה שָׁ֖ם הַ֥ר הָ/אֱלֹהִֽים־־־׃
translation:
  text: Then Jethro, Moses' father-in-law, came to Moses in the wilderness with his
    sons and his wife, where he was camped, at the mountain of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and his sons and his wife.' The Hebrew conjunction can be represented
      more literally, though English idiom often uses 'with' for accompanying persons.
    reason: lexical_alternative
  - marker: b
    text: That is, 'the mountain of God,' a designation associated with Sinai/Horeb.
    reason: cross_reference
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: Then ... came
  alternatives:
  - and ... came
  - so ... came
  lexicon: HALOT
  rationale: Wayyiqtol of בוא advances the narrative. 'Then' captures sequential movement
    in natural English without over-literal repetition of 'and.'
- source_word: יִתְרוֹ
  chosen: Jethro
  rationale: Personal name is transliterated per translation philosophy.
- source_word: חֹתֵן מֹשֶׁה
  chosen: Moses' father-in-law
  alternatives:
  - the father-in-law of Moses
  lexicon: HALOT
  rationale: Construct phrase identifies Jethro's relationship to Moses. 'Father-in-law'
    is the natural and precise English kinship term here.
- source_word: וּבָנָיו
  chosen: with his sons
  alternatives:
  - and his sons
  lexicon: HALOT
  rationale: The conjunction links accompanying persons. English idiom prefers 'with
    his sons' after 'came' to show accompaniment. The suffix most naturally refers
    to Moses in context, i.e., the sons previously mentioned with Zipporah.
- source_word: וְאִשְׁתּוֹ
  chosen: and his wife
  alternatives:
  - with his wife
  lexicon: HALOT
  rationale: The suffix most naturally refers to Moses, continuing the list of those
    brought to him. 'His wife' preserves the Hebrew wording without importing her
    name from context.
- source_word: אֶל מֹשֶׁה
  chosen: to Moses
  alternatives:
  - to meet Moses
  lexicon: HALOT
  rationale: אֶל marks motion toward Moses. 'To Moses' is sufficient; 'to meet Moses'
    would add nuance not explicit in the text.
- source_word: אֶל הַמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - into the wilderness
  - to the wilderness
  lexicon: HALOT
  rationale: Though אֶל often means 'to,' in English the destination is best expressed
    as arriving 'to Moses in the wilderness,' since the following relative clause
    specifies the place where Moses was encamped.
- source_word: אֲשֶׁר הוּא חֹנֶה שָׁם
  chosen: where he was camped
  alternatives:
  - where he was camping there
  - where he was encamped
  lexicon: HALOT
  rationale: Relative clause identifies the wilderness location. 'Camped' is readable
    modern English; 'encamped' is possible but slightly more formal. The pronoun refers
    to Moses.
- source_word: הַר הָאֱלֹהִים
  chosen: the mountain of God
  alternatives:
  - God's mountain
  lexicon: HALOT
  rationale: Construct phrase is rendered transparently. 'The mountain of God' preserves
    the Hebrew form and its recognized designation for Sinai/Horeb without over-specifying
    the mountain's later name.
