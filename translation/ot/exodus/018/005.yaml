theological_decisions:
- issue: Referent of the pronominal suffixes in 'his sons' and 'his wife'
  chosen_reading: The suffixes refer to Moses, not Jethro.
  alternative_readings:
  - The suffixes refer to Jethro.
  rationale: In the immediate context (Exod 18:2), Jethro had taken Zipporah, Moses'
    wife, and her two sons; verse 5 naturally resumes that information as Jethro comes
    to Moses with Moses' family. Rendering 'his sons and his wife' preserves the Hebrew
    while the rationale documents the referent.
- issue: Identification of 'the mountain of God'
  chosen_reading: Retain the descriptive title rather than substituting 'Sinai' or
    'Horeb.'
  alternative_readings:
  - Mount Sinai
  - Horeb
  rationale: The Hebrew text here uses the title הַר הָאֱלֹהִים. Translating the phrase
    directly preserves source-language wording and avoids importing a proper name
    not present in this verse.
