id: EXO.18.23
reference: Exodus 18:23
source:
  edition: WLC
  text: אִ֣ם אֶת הַ/דָּבָ֤ר הַ/זֶּה֙ תַּעֲשֶׂ֔ה וְ/צִוְּ/ךָ֣ אֱלֹהִ֔ים וְ/יָֽכָלְתָּ֖ עֲמֹ֑ד וְ/גַם֙ כָּל הָ/עָ֣ם הַ/זֶּ֔ה עַל מְקֹמ֖/וֹ יָבֹ֥א בְ/שָׁלֽוֹם־־־׃
translation:
  text: If you do this thing[a], and God so commands you, then you will be able to endure[d][c][b], and all this people also will go to their place in peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this matter' or 'this plan.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'stand'; here in context, 'endure' or 'hold up.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'all this people,' using a collective singular.
    reason: lexical_alternative
  - marker: d
    text: Or 'will come to his place'; the sense is that the people will return each to their proper place in peace.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - provided that
  - when
  lexicon: HALOT
  rationale: Introduces a conditional statement. 'If' is the most natural and direct English equivalent in this context.
- source_word: אֶת־הַדָּבָר הַזֶּה
  chosen: this thing
  alternatives:
  - this matter
  - this plan
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' Here Jethro refers to the proposed course of action just described. 'This thing' is formally close and idiomatic enough in English, while alternatives are possible interpretive smoothings.
- source_word: תַּעֲשֶׂה
  chosen: you do
  alternatives:
  - you carry out
  - you act
  lexicon: HALOT
  rationale: 'Simple rendering of עשה in the second masculine singular imperfect, matching the conditional sense: ''if you do.'''
- source_word: וְצִוְּךָ אֱלֹהִים
  chosen: and God commands you
  alternatives:
  - and God so commands you
  - and God instructs you
  lexicon: HALOT
  rationale: The clause adds a necessary condition to Jethro's advice. צוה commonly means 'command.' Rendering the waw as 'and' preserves the Hebrew coordination, while English sense makes clear this is an additional condition.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the referent is the one true God, not 'gods' or 'divine beings,' so singular 'God' is required by context.
- source_word: וְיָכָלְתָּ עֲמֹד
  chosen: then you will be able to endure
  alternatives:
  - then you will be able to stand
  - then you will be able to hold up
  lexicon: HALOT
  rationale: יכל + infinitive expresses ability. עמד literally means 'stand,' but in this context it refers to Moses' capacity to bear the burden and remain effective. 'Endure' communicates the idiomatic force more clearly than a wooden 'stand,' while staying within the source sense.
- source_word: וְגַם
  chosen: and ... also
  alternatives:
  - and moreover
  - and even
  lexicon: HALOT
  rationale: Adds a second beneficial result. 'Also' preserves the additive force without sounding stiff.
- source_word: כָּל־הָעָם הַזֶּה
  chosen: all this people
  alternatives:
  - all these people
  - all the people
  lexicon: HALOT
  rationale: The Hebrew uses a singular collective noun with demonstrative. 'All this people' preserves the collective singular force and deictic emphasis better than the smoother but less formal 'all these people.'
- source_word: עַל־מְקֹמוֹ
  chosen: to their place
  alternatives:
  - to its place
  - each to his place
  lexicon: HALOT
  rationale: 'Literally ''to/on his place.'' With the collective noun ''people,'' English idiom prefers a plural possessive: ''their place.'' This conveys the distributive sense of the collective returning home or to its proper station.'
- source_word: יָבֹא
  chosen: will go
  alternatives:
  - will come
  - will return
  lexicon: HALOT
  rationale: בוא literally means 'come/go' depending on viewpoint. In English, from the narrator's perspective the people are departing from Moses to their own place, so 'will go' is the most natural rendering.
- source_word: בְשָׁלוֹם
  chosen: in peace
  alternatives:
  - peacefully
  - safely
  lexicon: HALOT
  rationale: שָׁלוֹם includes peace, well-being, and wholeness. 'In peace' is the standard and sufficiently broad rendering here, preserving both tranquility and favorable outcome.
