id: EXO.18.25
reference: Exodus 18:25
source:
  edition: WLC
  text: וַ/יִּבְחַ֨ר מֹשֶׁ֤ה אַנְשֵׁי חַ֨יִל֙ מִ/כָּל יִשְׂרָאֵ֔ל וַ/יִּתֵּ֥ן אֹתָ֛/ם
    רָאשִׁ֖ים עַל הָ/עָ֑ם שָׂרֵ֤י אֲלָפִים֙ שָׂרֵ֣י מֵא֔וֹת שָׂרֵ֥י חֲמִשִּׁ֖ים וְ/שָׂרֵ֥י
    עֲשָׂרֹֽת־־־׃
translation:
  text: 'Moses chose capable men from all Israel and appointed them as heads over
    the people: commanders of thousands, commanders of hundreds, commanders of fifties,
    and commanders of tens.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'able men.' The Hebrew phrase אַנְשֵׁי חַיִל can denote men of strength,
      competence, or proven worth; in this context it refers to qualified leaders.
    reason: lexical_alternative
  - marker: b
    text: Or 'leaders' or 'chiefs' over the people. The Hebrew uses 'heads' metaphorically
      for persons in authority.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְחַר
  chosen: chose
  alternatives:
  - selected
  lexicon: HALOT
  rationale: The verb בחר straightforwardly means 'choose/select.' 'Chose' is the
    most natural modern English rendering and preserves the directness of the Hebrew
    narrative wayyiqtol.
- source_word: אַנְשֵׁי חַיִל
  chosen: capable men
  alternatives:
  - able men
  - men of valor
  - worthy men
  - competent men
  lexicon: HALOT
  rationale: The phrase literally means 'men of strength/ability.' In this judicial-administrative
    context, the emphasis is competence and proven capacity rather than military valor,
    so 'capable men' best fits the context while remaining close to the Hebrew. 'Able
    men' is also viable, but 'capable' reads more naturally in contemporary English.
- source_word: מִכָּל יִשְׂרָאֵל
  chosen: from all Israel
  alternatives:
  - out of all Israel
  lexicon: HALOT
  rationale: This phrase indicates selection from the whole nation. 'From all Israel'
    is idiomatic and sufficiently precise.
- source_word: וַיִּתֵּן אֹתָם
  chosen: appointed them
  alternatives:
  - set them
  - made them
  - placed them
  lexicon: HALOT
  rationale: Although נתן literally means 'gave/put,' in this context of assigning
    office it functions idiomatically as appointment to a role. 'Appointed them' conveys
    the administrative action clearly in English without over-paraphrasing.
- source_word: רָאשִׁים
  chosen: heads
  alternatives:
  - leaders
  - chiefs
  lexicon: HALOT
  rationale: The noun literally means 'heads' and denotes persons in authority. Retaining
    'heads' preserves the Hebrew metaphor and pairs naturally with 'over the people.'
    While 'leaders' is smoother, the more literal rendering is still clear here.
- source_word: עַל הָעָם
  chosen: over the people
  alternatives:
  - for the people
  lexicon: HALOT
  rationale: The preposition עַל in this governance context indicates authority over
    the people, not merely service for them. 'Over the people' best reflects the structure
    described.
- source_word: שָׂרֵי
  chosen: commanders
  alternatives:
  - chiefs
  - officials
  - leaders
  - princes
  lexicon: HALOT
  rationale: שַׂר denotes an official or ruler set over a group. In the graded structure
    of thousands, hundreds, fifties, and tens, 'commanders' communicates delegated
    authority within an organized hierarchy. 'Officials' is possible but less vivid;
    'princes' is too elevated here.
- source_word: אֲלָפִים / מֵאוֹת / חֲמִשִּׁים / עֲשָׂרֹת
  chosen: thousands, hundreds, fifties, and tens
  lexicon: HALOT
  rationale: These numerals define the size of the groups under each official. A straightforward
    numeric rendering preserves the administrative structure exactly.
