id: EXO.18.20
reference: Exodus 18:20
source:
  edition: WLC
  text: וְ/הִזְהַרְתָּ֣ה אֶתְ/הֶ֔ם אֶת הַ/חֻקִּ֖ים וְ/אֶת הַ/תּוֹרֹ֑ת וְ/הוֹדַעְתָּ֣ לָ/הֶ֗ם אֶת הַ/דֶּ֨רֶךְ֙ יֵ֣לְכוּ בָ֔/הּ וְ/אֶת הַֽ/מַּעֲשֶׂ֖ה אֲשֶׁ֥ר יַעֲשֽׂוּ/ן־־־־׃
translation:
  text: And you shall warn them about the statutes and the laws[b][a], and make known to them the way in which they must walk and the work that they must do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the instructions' for 'the laws' (Hebrew torot). The term can denote teaching more broadly, but here the legal setting favors 'laws.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the way they shall walk in it.' 'Walk' is retained to preserve the Hebrew metaphor for conduct.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִזְהַרְתָּה
  chosen: you shall warn
  alternatives:
  - you shall admonish
  - you shall teach them
  lexicon: HALOT
  rationale: The Hiphil of זהר can mean to warn, admonish, or instruct by giving caution. In this judicial-administrative context, 'warn' preserves the sense of solemn instruction with accountability better than the flatter 'teach.' The prefixed conjunction is carried as 'And,' and the imperfect-like form in context is rendered with modal future 'shall.'
- source_word: הַחֻקִּים
  chosen: the statutes
  alternatives:
  - the decrees
  - the prescribed statutes
  lexicon: HALOT
  rationale: חֻקִּים commonly refers to fixed enactments or prescribed ordinances. 'Statutes' is a standard and sufficiently transparent rendering that preserves the legal nuance.
- source_word: הַתּוֹרֹת
  chosen: the laws
  alternatives:
  - the instructions
  - the teachings
  lexicon: HALOT
  rationale: Though תּוֹרָה can mean instruction broadly, the plural here alongside חֻקִּים in a legal setting points to bodies of legal instruction. 'Laws' communicates the juridical force in natural English, while avoiding redundancy by not rendering both terms identically.
- source_word: וְהוֹדַעְתָּ
  chosen: make known
  alternatives:
  - teach
  - inform
  lexicon: HALOT
  rationale: The Hiphil of ידע means to cause to know, hence 'make known.' This preserves the causative force more precisely than simply 'teach,' while remaining idiomatic.
- source_word: הַדֶּרֶךְ
  chosen: the way
  alternatives:
  - the path
  - the manner of life
  lexicon: HALOT
  rationale: '''The way'' preserves the Hebrew metaphor of conduct or course of life. It is then clarified by the following clause ''in which they must walk,'' which keeps the metaphor intact in English.'
- source_word: יֵלְכוּ בָהּ
  chosen: in which they must walk
  alternatives:
  - that they should walk in
  - in which they are to walk
  lexicon: HALOT
  rationale: הלך with ב conveys conduct according to a way. 'Walk' should be retained because it is a major biblical metaphor. 'Must' reflects the prescriptive force of the context without over-literal awkwardness.
- source_word: הַמַּעֲשֶׂה
  chosen: the work
  alternatives:
  - the deed
  - the action
  lexicon: HALOT
  rationale: מַעֲשֶׂה denotes what is done. In parallel with 'the way,' it points to concrete conduct or duty. 'Work' is broad enough to include required actions and fits the administrative setting.
- source_word: אֲשֶׁר יַעֲשׂוּן
  chosen: that they must do
  alternatives:
  - which they shall do
  - that they are to do
  lexicon: HALOT
  rationale: The relative clause specifies the required conduct. 'Must do' expresses obligation naturally in English and matches the instructional context better than a bare future.
