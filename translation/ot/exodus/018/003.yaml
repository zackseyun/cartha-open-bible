id: EXO.18.3
reference: Exodus 18:3
source:
  edition: WLC
  text: וְ/אֵ֖ת שְׁנֵ֣י בָנֶ֑י/הָ אֲשֶׁ֨ר שֵׁ֤ם הָֽ/אֶחָד֙ גֵּֽרְשֹׁ֔ם כִּ֣י אָמַ֔ר גֵּ֣ר הָיִ֔יתִי בְּ/אֶ֖רֶץ נָכְרִיָּֽה׃
translation:
  text: and her two sons[a], of whom the name of the one was Gershom, for he said, “I have been a foreigner in a foreign land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I was a sojourner in a foreign land.' The Hebrew גֵּר can denote a temporary resident, outsider, or foreigner.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵת
  chosen: and
  alternatives:
  - and [he took]
  - along with
  lexicon: HALOT
  rationale: The conjunction links this verse to the previous one, while אֵת marks the direct object carried over from the prior clause. In English, the object marker is not translated independently, so the sense is conveyed simply by 'and' at the start of the continued sentence.
- source_word: שְׁנֵי בָנֶיהָ
  chosen: her two sons
  alternatives:
  - the two sons of her
  - her two children
  lexicon: HALOT
  rationale: שְׁנֵי is the construct form 'two of,' and בָנֶיהָ means 'her sons.' 'Her two sons' is natural English and preserves the masculine-specific reference better than gender-neutral 'children.'
- source_word: אֲשֶׁר
  chosen: of whom
  alternatives:
  - whose
  - for whom
  lexicon: HALOT
  rationale: The relative particle introduces a clause describing the sons. Because the next phrase narrows to 'the name of the one,' 'of whom' best fits the English syntax.
- source_word: שֵׁם הָאֶחָד
  chosen: the name of the one
  alternatives:
  - one was named
  - the name of the first
  lexicon: HALOT
  rationale: This is a fairly formal rendering of the Hebrew expression. 'The one' reflects הָאֶחָד literally; 'the first' would over-interpret, since the text is distinguishing one son from the other, not necessarily ordering them.
- source_word: גֵּרְשֹׁם
  chosen: Gershom
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per translation philosophy.
- source_word: כִּי אָמַר
  chosen: for he said
  alternatives:
  - because he said
  - for he had said
  lexicon: HALOT
  rationale: כִּי here introduces the explanation for the name. 'For he said' preserves the explanatory force without over-specifying temporal nuance.
- source_word: גֵּר
  chosen: a foreigner
  alternatives:
  - a sojourner
  - an alien
  - a resident foreigner
  lexicon: HALOT
  rationale: גֵּר denotes a person living as an outsider in a land not his own. 'Foreigner' is clear modern English and fits the naming explanation well; 'sojourner' is more traditional but less accessible.
- source_word: הָיִיתִי
  chosen: I have been
  alternatives:
  - I was
  - I became
  lexicon: HALOT
  rationale: The qatal can be rendered as a simple past, but in English the present perfect works naturally in Moses' reflective explanation of his status in Midian. It preserves the continuing relevance of his past experience without adding theology.
- source_word: בְּאֶרֶץ נָכְרִיָּה
  chosen: in a foreign land
  alternatives:
  - in a strange land
  - in a land not my own
  lexicon: HALOT
  rationale: אֶרֶץ is 'land,' and נָכְרִיָּה means 'foreign/strange.' 'Foreign land' is idiomatic modern English and matches the sense of outsider status expressed by גֵּר.
