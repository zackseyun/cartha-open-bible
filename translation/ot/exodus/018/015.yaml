theological_decisions:
- issue: Rendering the idiom לִדְרֹשׁ אֱלֹהִים
  chosen_reading: to seek God
  alternative_readings:
  - to inquire of God
  - to seek a ruling from God
  rationale: The Hebrew idiom can denote seeking God generally or consulting God for
    guidance/judgment in a dispute-setting. The broader 'seek God' best preserves
    the wording without over-specifying the judicial nuance, while the more interpretive
    alternatives are preserved in a footnote.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
