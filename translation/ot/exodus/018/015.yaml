id: EXO.18.15
reference: Exodus 18:15
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר מֹשֶׁ֖ה לְ/חֹתְנ֑/וֹ כִּֽי יָבֹ֥א אֵלַ֛/י הָ/עָ֖ם לִ/דְרֹ֥שׁ אֱלֹהִֽים־׃
translation:
  text: Moses said to his father-in-law, “Because the people come to me to seek God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to inquire of God” or “to seek a ruling from God.” The Hebrew idiom
      can include the sense of consulting God for guidance or judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - answered
  - spoke
  lexicon: HALOT
  rationale: Standard wayyiqtol of אמר introducing Moses's reply; simple past 'said'
    is the most natural English narrative rendering.
- source_word: לְחֹתְנוֹ
  chosen: to his father-in-law
  alternatives:
  - to his relative by marriage
  lexicon: HALOT
  rationale: חֹתֵן in this context refers to Jethro as Moses's father-in-law; this
    is the idiomatic and contextually specific English equivalent.
- source_word: כִּי
  chosen: Because
  alternatives:
  - For
  - That
  lexicon: HALOT
  rationale: Introduces the reason for Moses's judging activity in answer to Jethro's
    question. 'Because' makes the causal force clear in modern English; 'for' is possible
    but less natural.
- source_word: יָבֹא אֵלַי הָעָם
  chosen: the people come to me
  alternatives:
  - the people come before me
  - the people come to me
  lexicon: HALOT
  rationale: בוא + אֶל expresses movement toward Moses. Present tense in English fits
    the explanatory sense of the Hebrew imperfect in direct speech.
- source_word: לִדְרֹשׁ
  chosen: to seek
  alternatives:
  - to inquire of
  - to consult
  lexicon: HALOT
  rationale: דרש with God can mean seeking God or inquiring of God. 'Seek' preserves
    the broader Hebrew sense while remaining natural English; the more specific judicial
    nuance is preserved by a footnote alternative.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - God's will
  - a divine ruling
  lexicon: HALOT
  rationale: The direct object is simply 'God.' The phrase לדרֹשׁ אֱלֹהִים idiomatically
    means to seek or inquire of God, not merely abstract guidance, so the main text
    keeps the explicit theological referent.
