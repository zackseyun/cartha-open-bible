id: EXO.18.6
reference: Exodus 18:6
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ אֶל מֹשֶׁ֔ה אֲנִ֛י חֹתֶנְ/ךָ֥ יִתְר֖וֹ בָּ֣א אֵלֶ֑י/ךָ וְ/אִ֨שְׁתְּ/ךָ֔
    וּ/שְׁנֵ֥י בָנֶ֖י/הָ עִמָּֽ/הּ־׃
translation:
  text: He said to Moses, “I, Jethro your father-in-law, am coming to you, with your
    wife and her two sons with her.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''her two sons.'' Some English translations smooth this to ''your
      two sons,'' but the Masoretic Text reads with a third feminine singular suffix,
      referring to Moses'' wife.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: He said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. English can omit the initial
    'and' for natural style without loss of meaning in this context.
- source_word: אֶל מֹשֶׁה
  chosen: to Moses
  lexicon: HALOT
  rationale: Standard directional use of אֶל with the proper name Moses.
- source_word: אֲנִי
  chosen: I
  lexicon: HALOT
  rationale: Retained explicitly because the Hebrew includes the independent pronoun
    for emphasis in the quoted speech.
- source_word: חֹתֶנְךָ
  chosen: your father-in-law
  alternatives:
  - your relative by marriage
  lexicon: HALOT
  rationale: In this context the relationship to Moses is specifically Jethro as Zipporah's
    father, so 'father-in-law' is the clear and idiomatic rendering.
- source_word: יִתְרוֹ
  chosen: Jethro
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: בָּא אֵלֶיךָ
  chosen: am coming to you
  alternatives:
  - have come to you
  - am on my way to you
  lexicon: HALOT
  rationale: The participle בָּא with the prepositional phrase naturally conveys an
    imminent or in-progress approach. 'Am coming' preserves the participial sense
    better than a simple past 'have come.'
- source_word: וְאִשְׁתְּךָ
  chosen: with your wife
  alternatives:
  - and your wife
  lexicon: HALOT
  rationale: The conjunction links accompanying persons in the announcement. Rendering
    with 'with' makes the English relation to the following phrase smoother while
    preserving the sense of accompaniment.
- source_word: וּשְׁנֵי בָנֶיהָ
  chosen: and her two sons
  alternatives:
  - and your two sons
  lexicon: HALOT
  rationale: The Hebrew suffix is third feminine singular ('her'), referring to Moses'
    wife. 'Her two sons' is the plain sense of the consonantal text and should not
    be harmonized away.
- source_word: עִמָּהּ
  chosen: with her
  lexicon: HALOT
  rationale: Retained because the Hebrew explicitly states the sons are accompanying
    her; this is not redundant in Hebrew discourse and should be represented in English.
