id: EXO.18.14
reference: Exodus 18:14
source:
  edition: WLC
  text: וַ/יַּרְא֙ חֹתֵ֣ן מֹשֶׁ֔ה אֵ֛ת כָּל אֲשֶׁר ה֥וּא עֹשֶׂ֖ה לָ/עָ֑ם וַ/יֹּ֗אמֶר
    מָֽה הַ/דָּבָ֤ר הַ/זֶּה֙ אֲשֶׁ֨ר אַתָּ֤ה עֹשֶׂה֙ לָ/עָ֔ם מַדּ֗וּעַ אַתָּ֤ה יוֹשֵׁב֙
    לְ/בַדֶּ֔/ךָ וְ/כָל הָ/עָ֛ם נִצָּ֥ב עָלֶ֖י/ךָ מִן בֹּ֥קֶר עַד עָֽרֶב־־־־־־׃
translation:
  text: When Moses's father-in-law saw all that he was doing for the people, he said,
    “What is this thing that you are doing for the people? Why do you sit alone, while
    all the people stand before you from morning until evening?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “What is this matter that you are doing for the people?”
    reason: lexical_alternative
  - marker: b
    text: Literally “stand over you”; the phrase here means standing before Moses
      in attendance, likely for judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֹתֵן מֹשֶׁה
  chosen: Moses's father-in-law
  alternatives:
  - the father-in-law of Moses
  lexicon: HALOT
  rationale: חֹתֵן denotes a relation by marriage; in context it refers to Jethro.
    The possessive English form is natural and precise.
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - observed
  lexicon: HALOT
  rationale: ראה is the standard verb 'see.' 'Saw' preserves the straightforward narrative
    sense without adding interpretive nuance.
- source_word: אֵת כָּל אֲשֶׁר הוּא עֹשֶׂה
  chosen: all that he was doing
  alternatives:
  - everything that he was doing
  - all that he did
  lexicon: HALOT
  rationale: כָּל אֲשֶׁר plus participle expresses the totality of Moses's ongoing
    activity. The progressive English form reflects the participial aspect in context.
- source_word: לָעָם
  chosen: for the people
  alternatives:
  - to the people
  - among the people
  lexicon: HALOT
  rationale: The preposition ל here is best rendered 'for,' indicating Moses's activity
    on behalf of the people rather than merely directed toward them.
- source_word: מָה הַדָּבָר הַזֶּה
  chosen: What is this thing
  alternatives:
  - What is this matter
  - What is this
  lexicon: HALOT
  rationale: דָּבָר can mean 'thing,' 'matter,' or 'word.' Here Jethro questions the
    practice or situation. 'Thing' is slightly more concrete and preserves the Hebrew
    idiom without becoming wooden.
- source_word: אֲשֶׁר אַתָּה עֹשֶׂה לָעָם
  chosen: that you are doing for the people
  alternatives:
  - that you are doing to the people
  - that you are doing among the people
  lexicon: HALOT
  rationale: Repeats the earlier construction and should be rendered consistently.
    'For the people' best captures Moses's representative/judicial service.
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: A direct interrogative asking the reason; 'Why' is the natural modern
    English equivalent.
- source_word: אַתָּה יוֹשֵׁב לְבַדֶּךָ
  chosen: do you sit alone
  alternatives:
  - are you sitting by yourself
  - do you sit by yourself
  lexicon: HALOT
  rationale: ישב can denote sitting in session, especially in a judicial setting.
    'Sit alone' preserves both the physical and functional sense and matches the context
    of Moses judging by himself.
- source_word: וְכָל הָעָם נִצָּב עָלֶיךָ
  chosen: while all the people stand before you
  alternatives:
  - and all the people are standing over you
  - while all the people stand around you
  lexicon: HALOT
  rationale: נצב means 'stand' and עַל in this context idiomatically conveys attendance
    before an authority. 'Before you' is the clearest English rendering for the judicial
    scene.
- source_word: מִן בֹּקֶר עַד עָרֶב
  chosen: from morning until evening
  alternatives:
  - from morning to evening
  lexicon: HALOT
  rationale: A standard temporal merism indicating the whole day. 'Until evening'
    is idiomatic and preserves the duration.
