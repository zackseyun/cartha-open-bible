id: EXO.18.16
reference: Exodus 18:16
source:
  edition: WLC
  text: כִּֽי יִהְיֶ֨ה לָ/הֶ֤ם דָּבָר֙ בָּ֣א אֵלַ֔/י וְ/שָׁ֣פַטְתִּ֔י בֵּ֥ין אִ֖ישׁ
    וּ/בֵ֣ין רֵעֵ֑/הוּ וְ/הוֹדַעְתִּ֛י אֶת חֻקֵּ֥י הָ/אֱלֹהִ֖ים וְ/אֶת תּוֹרֹתָֽי/ו־־־׃
translation:
  text: When they have a matter, it comes to me, and I judge between a man and his
    neighbor, and I make known the statutes of God and his laws.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they have a case' for 'they have a matter.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'between a man and his neighbor,' a representative singular expression.
    reason: cultural_note
  - marker: c
    text: Or 'his instructions' for 'his laws.' The Hebrew term can denote instruction
      more broadly, though here it is used in a legal setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - For
  - Whenever
  lexicon: HALOT
  rationale: Here כִּי introduces the circumstance explaining Moses' practice. 'When'
    gives natural English for the conditional-temporal sense in context; 'for' is
    possible but less clear in English after the previous question.
- source_word: יִהְיֶה לָהֶם דָּבָר
  chosen: they have a matter
  alternatives:
  - they have a case
  - a matter arises for them
  lexicon: HALOT
  rationale: דָּבָר is broad ('word, matter, affair, case'). In judicial context it
    refers to a dispute or case. 'Matter' preserves the Hebrew breadth while remaining
    idiomatic.
- source_word: בָּא אֵלַי
  chosen: they come to me
  alternatives:
  - it comes to me
  - one comes to me
  lexicon: HALOT
  rationale: 'Although בָּא is morphologically singular, the sense with the preceding
    plural pronoun is collective: the parties come to Moses. Rendering the implied
    plural subject makes the English coherent and reflects the context of dispute
    resolution.'
- source_word: וְשָׁפַטְתִּי
  chosen: I judge
  alternatives:
  - I decide
  - I render judgment
  lexicon: HALOT
  rationale: The verb שׁפט in this setting denotes judicial decision-making. 'I judge'
    is the most direct and sufficiently clear rendering.
- source_word: בֵּין אִישׁ וּבֵין רֵעֵהוּ
  chosen: between a man and his neighbor
  alternatives:
  - between one man and another
  - between a person and his companion
  lexicon: HALOT
  rationale: This is a representative singular construction. Per the gender-accurate
    policy, 'a man and his neighbor' preserves the masculine singular form without
    over-interpreting it. 'Neighbor' fits רֵעַ well in a social-legal context.
- source_word: וְהוֹדַעְתִּי
  chosen: I make known
  alternatives:
  - I inform them of
  - I teach
  lexicon: HALOT
  rationale: The Hiphil of ידע means to cause to know, make known. 'I make known'
    preserves the causative force better than the more interpretive 'I teach.'
- source_word: חֻקֵּי הָאֱלֹהִים
  chosen: the statutes of God
  alternatives:
  - the decrees of God
  - God's statutes
  lexicon: HALOT
  rationale: חֹק/חֻקִּים commonly refers to prescribed statutes or fixed ordinances.
    'Statutes of God' is clear and fairly formal.
- source_word: תּוֹרֹתָיו
  chosen: his laws
  alternatives:
  - his instructions
  - his teachings
  lexicon: HALOT
  rationale: תּוֹרָה fundamentally denotes instruction, but in parallel with 'statutes'
    and in a judicial setting, 'laws' communicates the legal force naturally in English.
    The plural suffix is retained with 'his.'
