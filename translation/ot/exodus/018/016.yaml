theological_decisions:
- issue: Rendering of masculine representative language in אִישׁ ... רֵעֵהוּ
  chosen_reading: a man and his neighbor
  alternative_readings:
  - one person and another
  - a person and his neighbor
  rationale: The Hebrew uses grammatically masculine singular forms in a representative
    legal expression. Following the doctrine's gender-accurate policy, the translation
    preserves the masculine form rather than neutralizing it, while understanding
    it as representative in sense.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of תּוֹרֹתָיו in legal context
  chosen_reading: his laws
  alternative_readings:
  - his instructions
  - his teachings
  rationale: While תּוֹרָה can mean instruction broadly, the immediate context is
    adjudication and legal guidance. 'Laws' best conveys the normative force here
    without denying the broader semantic range.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
