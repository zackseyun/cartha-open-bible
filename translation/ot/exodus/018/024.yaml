id: EXO.18.24
reference: Exodus 18:24
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֥ע מֹשֶׁ֖ה לְ/ק֣וֹל חֹתְנ֑/וֹ וַ/יַּ֕עַשׂ כֹּ֖ל אֲשֶׁ֥ר אָמָֽר׃
translation:
  text: So Moses listened to the voice of his father-in-law and did all that he said[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heeded/obeyed the voice of his father-in-law.' The Hebrew idiom can carry the sense of responsive obedience, which the next clause then makes explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: listened
  alternatives:
  - heard
  - obeyed
  lexicon: HALOT
  rationale: The verb שׁמע with לְקוֹל commonly means to listen to or heed someone. 'Listened' preserves the auditory idiom while allowing the following clause ('did all that he said') to express the resulting obedience explicitly, avoiding redundancy if rendered 'obeyed'.
- source_word: לְקוֹל
  chosen: to the voice of
  alternatives:
  - to
  - to the advice of
  lexicon: HALOT
  rationale: קוֹל is literally 'voice.' The phrase 'listen to the voice of' is a common Hebrew idiom. Retaining 'voice' keeps the source texture while remaining natural enough in English.
- source_word: חֹתְנוֹ
  chosen: his father-in-law
  alternatives:
  - his relative by marriage
  lexicon: HALOT
  rationale: In context this refers to Jethro, Moses's father-in-law. 'Father-in-law' is the clear and standard contextual rendering.
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted on
  - carried out
  lexicon: HALOT
  rationale: עשה is the ordinary verb 'do/make.' 'Did' is the most direct rendering and fits the object clause naturally.
- source_word: כֹּל אֲשֶׁר אָמָר
  chosen: all that he said
  alternatives:
  - everything that he had said
  - all that he told him
  lexicon: HALOT
  rationale: This relative clause straightforwardly means 'all that he said.' The simpler English preserves the Hebrew sense without adding temporal nuance not required by the form.
