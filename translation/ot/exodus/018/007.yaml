theological_decisions:
- issue: Meaning of Moses' bowing before Jethro
  chosen_reading: gesture of social honor and respect, not worship
  alternative_readings:
  - act of worship
  rationale: The verb can describe worship in other contexts, but here the human object
    and greeting sequence indicate customary respectful obeisance. The translation
    therefore uses 'bowed down' rather than a worship-laden rendering.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
