id: EXO.18.7
reference: Exodus 18:7
source:
  edition: WLC
  text: וַ/יֵּצֵ֨א מֹשֶׁ֜ה לִ/קְרַ֣את חֹֽתְנ֗/וֹ וַ/יִּשְׁתַּ֨חוּ֙ וַ/יִּשַּׁק ל֔/וֹ
    וַ/יִּשְׁאֲל֥וּ אִישׁ לְ/רֵעֵ֖/הוּ לְ/שָׁל֑וֹם וַ/יָּבֹ֖אוּ הָ/אֹֽהֱלָ/ה־־׃
translation:
  text: Moses went out to meet his father-in-law, bowed down, and kissed him. Then
    each asked the other about his welfare, and they went into the tent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and each inquired of the other's welfare.' The Hebrew idiom literally
      speaks of asking 'for peace' and refers to well-being.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִקְרַאת
  chosen: to meet
  alternatives:
  - to greet
  - to encounter
  lexicon: HALOT
  rationale: In context of receiving an arriving relative, the infinitive with יצא
    naturally means going out to meet someone, not merely encountering by chance.
- source_word: חֹתְנוֹ
  chosen: his father-in-law
  alternatives:
  - his relative by marriage
  lexicon: HALOT
  rationale: The noun חֹתֵן in Exodus 18 refers specifically to Jethro as Moses' father-in-law,
    and the immediate narrative context makes the precise kinship term preferable.
- source_word: וַיִּשְׁתַּחוּ
  chosen: bowed down
  alternatives:
  - prostrated himself
  - paid homage
  lexicon: HALOT
  rationale: The verb שׁחה denotes bowing low or prostrating oneself. 'Bowed down'
    preserves the physical act without overinterpreting it as worship; this is an
    act of respect toward his father-in-law.
- source_word: וַיִּשַּׁק לוֹ
  chosen: and kissed him
  alternatives:
  - and gave him a kiss
  lexicon: HALOT
  rationale: The verb נשׁק with indirect object here describes the customary greeting
    kiss. 'Kissed him' is natural English and sufficiently literal.
- source_word: וַיִּשְׁאֲלוּ אִישׁ לְרֵעֵהוּ לְשָׁלוֹם
  chosen: Then each asked the other about his well-being
  alternatives:
  - and they asked each other of peace
  - and each inquired of the other's welfare
  lexicon: HALOT
  rationale: The idiom שאל לשלום means to ask after someone's welfare or well-being.
    'Each asked the other' reflects איש לרעהו, and 'well-being' captures שלום idiomatically
    without flattening it to a mere greeting formula.
- source_word: הָאֹהֱלָה
  chosen: the tent
  alternatives:
  - the tent dwelling
  lexicon: HALOT
  rationale: The directional ending indicates motion into the tent. With the article,
    'the tent' is the most straightforward rendering; context likely implies Moses'
    tent, but the Hebrew does not explicitly say 'his tent,' so that should not be
    added to the main text.
