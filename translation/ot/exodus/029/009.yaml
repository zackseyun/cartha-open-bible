id: EXO.29.9
reference: Exodus 29:9
source:
  edition: WLC
  text: וְ/חָגַרְתָּ֩ אֹתָ֨/ם אַבְנֵ֜ט אַהֲרֹ֣ן וּ/בָנָ֗י/ו וְ/חָבַשְׁתָּ֤ לָ/הֶם֙ מִגְבָּעֹ֔ת וְ/הָיְתָ֥ה לָ/הֶ֛ם כְּהֻנָּ֖ה לְ/חֻקַּ֣ת עוֹלָ֑ם וּ/מִלֵּאתָ֥ יַֽד אַהֲרֹ֖ן וְ/יַד בָּנָֽי/ו־־׃
translation:
  text: You shall fasten sashes on them[a], on Aaron and on his sons, and you shall bind caps on them. The priesthood shall belong to them as a permanent statute. So you shall ordain Aaron and his sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'fill the hand of Aaron and the hand of his sons,' a Hebrew idiom for installing or ordaining them into priestly service.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָגַרְתָּ ... אַבְנֵט
  chosen: fasten sashes
  alternatives:
  - gird ... with a sash
  - wrap belts around
  lexicon: HALOT
  rationale: חגר with אַבְנֵט refers to putting on or fastening the priestly sash. 'Fasten sashes' is natural modern English while preserving the clothing action more clearly than the archaic 'gird.'
- source_word: אַהֲרֹן וּבָנָיו
  chosen: on Aaron and on his sons
  alternatives:
  - Aaron and his sons
  lexicon: HALOT
  rationale: The appositional phrase specifies who 'them' refers to. Repeating 'on' in English clarifies the relation without changing the sense.
- source_word: חָבַשְׁתָּ לָהֶם מִגְבָּעֹת
  chosen: bind caps on them
  alternatives:
  - put turbans on them
  - tie headgear on them
  lexicon: HALOT
  rationale: The verb means to bind or wrap on the head. מִגְבָּעוֹת here denotes the priests' head coverings, distinct from the high priest's turban elsewhere. 'Caps' best fits the plural priestly headdress in this context.
- source_word: וְהָיְתָה לָהֶם כְּהֻנָּה
  chosen: The priesthood shall belong to them
  alternatives:
  - they shall have the priesthood
  - the priesthood shall be theirs
  lexicon: HALOT
  rationale: This clause states possession or assignment of priestly office. 'Shall belong to them' expresses the Hebrew idiom clearly in modern English.
- source_word: לְחֻקַּת עוֹלָם
  chosen: as a permanent statute
  alternatives:
  - as a perpetual statute
  - as an everlasting ordinance
  lexicon: HALOT
  rationale: חֻקָּה is a fixed statute or ordinance; עוֹלָם in legal-cultic contexts often denotes enduring or permanent duration within the covenantal frame. 'Permanent statute' is readable modern English without overstating philosophical eternity.
- source_word: וּמִלֵּאתָ יַד
  chosen: ordain
  alternatives:
  - fill the hand of
  - install
  lexicon: HALOT
  rationale: The idiom 'fill the hand' is a technical expression for consecrating/installing into priestly office. 'Ordain' communicates the function succinctly in English; the more literal alternative is preserved in a footnote because the idiom is significant.
