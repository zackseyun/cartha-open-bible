- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gendered covenant expression בְנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  - children of Israel
  rationale: Following the gender-accurate principle, the masculine plural construct is preserved rather than neutralized. This also keeps the translation transparent to the Hebrew idiom.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
