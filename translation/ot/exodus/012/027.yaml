id: EXO.12.27
reference: Exodus 12:27
source:
  edition: WLC
  text: וַ/אֲמַרְתֶּ֡ם זֶֽבַח פֶּ֨סַח ה֜וּא לַֽ/יהוָ֗ה אֲשֶׁ֣ר פָּ֠סַח עַל בָּתֵּ֤י בְנֵֽי יִשְׂרָאֵל֙ בְּ/מִצְרַ֔יִם בְּ/נָגְפּ֥/וֹ אֶת מִצְרַ֖יִם וְ/אֶת בָּתֵּ֣י/נוּ הִצִּ֑יל וַ/יִּקֹּ֥ד הָ/עָ֖ם וַ/יִּֽשְׁתַּחֲוּֽוּ־־־־־׃
translation:
  text: you shall say[a], ‘It is the Passover sacrifice to Yahweh[c][b], who passed over the houses of the sons of Israel in Egypt when he struck Egypt and delivered our houses.’ And the people bowed down and worshiped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the houses of the Israelites' / 'the houses of the children of Israel.'
    reason: lexical_alternative
  - marker: b
    text: The verb behind 'passed over' is the same root from which 'Passover' is derived; it can also carry the sense of sparing or protecting.
    reason: lexical_alternative
  - marker: c
    text: Or 'delivered our houses' / 'rescued our houses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶבַח פֶּסַח
  chosen: the Passover sacrifice
  alternatives:
  - a Passover sacrifice
  - the sacrifice of Passover
  lexicon: HALOT
  rationale: Construct chain meaning a sacrifice associated with Passover. 'The Passover sacrifice' is natural English and preserves the cultic sense without flattening it to merely 'Passover.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition ל can indicate dedication/belonging. 'To the LORD' fits sacrificial language in English. Per doctrine, יהוה is rendered 'the LORD,' not transliterated.
- source_word: פָּסַח
  lemma: פֶּסַח
  chosen: passed over
  alternatives:
  - spared
  - passed by
  lexicon: HALOT
  rationale: The verb is etymologically and contextually tied to Passover and is best preserved as 'passed over' here, especially since the noun פֶּסַח appears in the same clause. The protective nuance is then clarified by the following verb 'spared' for הִצִּיל.
- source_word: בָּתֵּי בְנֵי יִשְׂרָאֵל
  chosen: the houses of the sons of Israel
  alternatives:
  - the houses of the Israelites
  - the houses of the children of Israel
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the familial/covenantal expression. 'Sons of Israel' is gender-accurate to the Hebrew and reflects the source wording; 'Israelites' is possible but less transparent to the underlying phrase.
- source_word: בְּמִצְרַיִם
  chosen: in Egypt
  lexicon: HALOT
  rationale: Locative sense is straightforward.
- source_word: בְּנָגְפּוֹ אֶת מִצְרַיִם
  chosen: when he struck Egypt
  alternatives:
  - when he plagued Egypt
  - in striking Egypt
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed ב conveys temporal circumstance: ''when/in striking.'' ''Struck Egypt'' is concise and preserves the force of divine judgment without over-specifying ''plagued'' where the verb itself is broader.'
- source_word: הִצִּיל
  chosen: spared
  alternatives:
  - delivered
  - rescued
  lexicon: HALOT
  rationale: In this immediate contrast with striking Egypt, 'spared' best captures the protective outcome for the houses while remaining faithful to the saving sense of נצל in context.
- source_word: וַיִּקֹּד
  chosen: bowed low
  alternatives:
  - bowed down
  - bent low
  lexicon: HALOT
  rationale: The verb denotes bowing/bending in reverence. 'Bowed low' distinguishes it from the following verb for prostration/worship and preserves the sequence of actions.
- source_word: וַיִּשְׁתַּחֲווּ
  chosen: worshiped
  alternatives:
  - bowed down
  - prostrated themselves
  lexicon: HALOT
  rationale: This verb commonly denotes prostration in worshipful reverence. Since the previous verb already expresses physical bowing, 'worshiped' communicates the reverential act and avoids redundant English repetition while preserving the two-step response.
