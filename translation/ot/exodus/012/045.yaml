id: EXO.12.45
reference: Exodus 12:45
source:
  edition: WLC
  text: תּוֹשָׁ֥ב וְ/שָׂכִ֖יר לֹא יֹ֥אכַל בּֽ/וֹ־־׃
translation:
  text: A sojourner or a hired worker shall not eat of it[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sojourner' or 'temporary resident' for 'resident foreigner.'
    reason: lexical_alternative
  - marker: b
    text: That is, of the Passover meal; more narrowly, of the Passover lamb.
    reason: cross_reference
lexical_decisions:
- source_word: תּוֹשָׁב
  chosen: resident foreigner
  alternatives:
  - sojourner
  - temporary resident
  - settler
  - resident alien
  lexicon: HALOT
  rationale: In Passover legislation, תּוֹשָׁב denotes a non-native resident living among Israel without full covenantal incorporation. 'Resident foreigner' communicates both residence and outsider status more clearly for modern readers than 'sojourner' or 'stranger.'
- source_word: שָׂכִיר
  chosen: hired worker
  alternatives:
  - hired servant
  - wage earner
  - hireling
  lexicon: HALOT
  rationale: The term refers to a person employed for wages. 'Hired worker' is clear modern English and avoids the archaic or pejorative feel of 'hireling.'
- source_word: לֹא יֹאכַל
  chosen: shall not eat
  alternatives:
  - must not eat
  - may not eat
  lexicon: HALOT
  rationale: The imperfect with negation in legal material expresses prohibition. 'Shall not eat' preserves the legal-register force and matches the concise style of the surrounding ordinances.
- source_word: בּוֹ
  chosen: of it
  alternatives:
  - it
  - from it
  lexicon: HALOT
  rationale: 'The preposition ב with אכל in this context is idiomatically partitive: eating of the Passover lamb/meal. ''Of it'' is natural English and preserves the sense of partaking from the sacrificial meal rather than merely consuming an abstract object.'
