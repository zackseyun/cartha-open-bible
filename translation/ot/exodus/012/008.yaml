id: EXO.12.8
reference: Exodus 12:8
source:
  edition: WLC
  text: וְ/אָכְל֥וּ אֶת הַ/בָּשָׂ֖ר בַּ/לַּ֣יְלָה הַ/זֶּ֑ה צְלִי אֵ֣שׁ וּ/מַצּ֔וֹת עַל מְרֹרִ֖ים יֹאכְלֻֽ/הוּ־־־׃
translation:
  text: They shall eat the meat that night[a], roasted over the fire[b]; with unleavened bread and bitter herbs they shall eat it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on this night.' The Hebrew phrase is literally 'in/on this night,' but the sense in English is the specific night of the Passover meal.
    reason: lexical_alternative
  - marker: b
    text: Literally 'roasted of fire' or 'roasted with fire,' emphasizing that it must be cooked by roasting rather than by another method.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָכְלוּ
  chosen: They shall eat
  alternatives:
  - and they will eat
  - and they shall eat
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional context functions with directive/future force. English 'shall' suitably conveys command-like prescription in legal/ritual material without sounding overly archaic here.
- source_word: הַבָּשָׂר
  chosen: the meat
  alternatives:
  - the flesh
  lexicon: HALOT
  rationale: בָּשָׂר literally can mean 'flesh,' but in food context 'meat' is the natural modern English equivalent and avoids awkwardness while preserving sense.
- source_word: בַּלַּיְלָה הַזֶּה
  chosen: that night
  alternatives:
  - on this night
  - during this night
  lexicon: HALOT
  rationale: The phrase refers to the specific night in view. 'That night' is idiomatic in English narrative/instruction and fits the temporal force cleanly. 'This night' is possible but less natural in contemporary English.
- source_word: צְלִי אֵשׁ
  chosen: roasted over the fire
  alternatives:
  - fire-roasted
  - roasted with fire
  lexicon: HALOT
  rationale: The construct phrase denotes roasting by means of fire. 'Roasted over the fire' is clear modern English and preserves the explicit mention of fire, important in contrast with boiling in v. 9.
- source_word: וּמַצּוֹת
  chosen: and with unleavened bread
  alternatives:
  - and unleavened bread
  lexicon: HALOT
  rationale: מַצּוֹת are unleavened cakes/bread. 'Unleavened bread' is the standard clear rendering. The added 'with' in English reflects the coordination with עַל מְרֹרִים and the manner of eating, not an expansion of meaning.
- source_word: עַל
  chosen: with
  alternatives:
  - 'on'
  - along with
  lexicon: HALOT
  rationale: Although עַל commonly means 'on/upon,' in this culinary context it idiomatically indicates accompaniment. 'With' best communicates the sense in natural English.
- source_word: מְרֹרִים
  chosen: bitter herbs
  alternatives:
  - bitter things
  - bitter greens
  lexicon: HALOT
  rationale: The plural noun derives from the root 'bitter' and in Passover context refers to bitter herbs eaten with the lamb. 'Bitter herbs' is the established and contextually precise rendering.
- source_word: יֹאכְלֻהוּ
  chosen: they shall eat it
  alternatives:
  - they are to eat it
  lexicon: HALOT
  rationale: The imperfect with object suffix resumes and reinforces the instruction. Repeating 'they shall eat it' in English preserves the Hebrew emphasis and the object reference to the Passover animal/meat.
