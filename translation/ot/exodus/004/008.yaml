id: EXO.4.8
reference: Exodus 4:8
source:
  edition: WLC
  text: וְ/הָיָה֙ אִם לֹ֣א יַאֲמִ֣ינוּ לָ֔/ךְ וְ/לֹ֣א יִשְׁמְע֔וּ לְ/קֹ֖ל הָ/אֹ֣ת הָ/רִאשׁ֑וֹן וְ/הֶֽאֱמִ֔ינוּ לְ/קֹ֖ל הָ/אֹ֥ת הָ/אַחֲרֽוֹן־׃
translation:
  text: And it will be[a], if they do not believe you and do not listen to the voice of the first sign, then they will believe the voice of the latter sign.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the last sign.' Hebrew 'the later sign' can also be rendered 'the last sign,' but 'later' avoids implying that no further sign could follow.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it will be
  alternatives:
  - And it shall be
  - Then it will happen
  lexicon: HALOT
  rationale: Uses the common Hebrew narrative/apodosis formula with היה to introduce a future conditional outcome. 'And it will be' preserves the structure without over-paraphrasing.
- source_word: יַאֲמִינוּ לָךְ
  chosen: they do not believe you
  alternatives:
  - they do not trust you
  - they do not believe in you
  lexicon: HALOT
  rationale: אמן in the Hiphil with ל commonly means 'believe' or 'trust' someone. 'Believe you' is the most natural English here and fits the immediate context of accepting Moses' message.
- source_word: יִשְׁמְעוּ
  chosen: listen
  alternatives:
  - hear
  - obey
  lexicon: HALOT
  rationale: שׁמע can mean hear, listen, or obey depending on context. Here, with 'to the voice of the sign,' the sense is receptive hearing/heed rather than explicit obedience, so 'listen' best captures the idiom.
- source_word: לְקוֹל
  chosen: to the voice of
  alternatives:
  - to
  - to the sound of
  - to the message of
  lexicon: HALOT
  rationale: קוֹל literally means 'voice' or 'sound.' In this idiom, the sign is treated as speaking evidentially. Retaining 'voice' preserves the Hebrew imagery better than flattening it to 'message,' while remaining understandable in English.
- source_word: הָאֹת
  chosen: sign
  alternatives:
  - miraculous sign
  - token
  lexicon: HALOT
  rationale: אוֹת is the standard term for a sign, often miraculous in context. 'Sign' is sufficient and avoids adding interpretive weight not explicit in the text.
- source_word: הָרִאשׁוֹן
  chosen: the first
  alternatives:
  - the former
  lexicon: HALOT
  rationale: רִאשׁוֹן straightforwardly means 'first.' This pairs naturally with the later contrastive term in the verse.
- source_word: וְהֶאֱמִינוּ
  chosen: then they will believe
  alternatives:
  - and they will believe
  - then they will trust
  lexicon: HALOT
  rationale: The verb continues the conditional sequence and functions as the result clause. 'Then' makes the apodosis explicit in natural English.
- source_word: הָאַחֲרוֹן
  chosen: the later
  alternatives:
  - the last
  - the second
  lexicon: HALOT
  rationale: אַחֲרוֹן means 'later' or 'last.' Since this verse contrasts two signs and the next verse introduces a possible third sign, 'later' is preferable to 'last,' which could imply finality not warranted by the immediate context.
