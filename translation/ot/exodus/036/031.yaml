id: EXO.36.31
reference: Exodus 36:31
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ בְּרִיחֵ֖י עֲצֵ֣י שִׁטִּ֑ים חֲמִשָּׁ֕ה לְ/קַרְשֵׁ֥י צֶֽלַע הַ/מִּשְׁכָּ֖ן הָ/אֶחָֽת־׃
translation:
  text: He made five bars of acacia wood for the frames of one side of the tabernacle[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'boards' instead of 'frames' for the upright structural pieces of the tabernacle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - And he made
  - Then he made
  lexicon: HALOT
  rationale: Wayyiqtol of עשה narrates the next action in sequence. English can omit the conjunction for smoother style while preserving the narrative sense.
- source_word: בְּרִיחֵי
  chosen: bars
  alternatives:
  - crossbars
  - bolts
  lexicon: HALOT
  rationale: בְּרִיחַ in tabernacle contexts refers to the horizontal bars used to hold the frames together. 'Bars' is the clearest natural English rendering; 'bolts' is too narrow and potentially misleading.
- source_word: עֲצֵי שִׁטִּים
  chosen: of acacia wood
  alternatives:
  - of acacia
  - of acacia timber
  lexicon: HALOT
  rationale: Construct chain meaning wood from acacia trees. 'Acacia wood' is standard, clear English for the material.
- source_word: חֲמִשָּׁה
  chosen: five
  lexicon: HALOT
  rationale: Straightforward cardinal number modifying 'bars'.
- source_word: לְקַרְשֵׁי
  chosen: for the frames of
  alternatives:
  - for the boards of
  - for the planks of
  lexicon: HALOT
  rationale: קֶרֶשׁ in tabernacle construction denotes the upright structural pieces. 'Frames' communicates the architectural function better in modern English than the traditional 'boards,' though 'boards' remains possible.
- source_word: צֶלַע
  chosen: side
  alternatives:
  - rib
  - flank
  lexicon: HALOT
  rationale: In architectural context צֶלַע means a side of the structure, not a literal rib.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  lexicon: HALOT
  rationale: Established and contextually precise rendering for the sanctuary structure in Exodus.
- source_word: הָאֶחָת
  chosen: one
  alternatives:
  - the one
  - first
  lexicon: HALOT
  rationale: Feminine singular agreeing with 'side'; here it distinguishes one side of the tabernacle from the other side, not necessarily 'first' in an ordinal sense.
