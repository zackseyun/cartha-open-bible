id: EXO.40.28
reference: Exodus 40:28
source:
  edition: WLC
  text: וַ/יָּ֛שֶׂם אֶת מָסַ֥ךְ הַ/פֶּ֖תַח לַ/מִּשְׁכָּֽן־׃
translation:
  text: And he put the screen at the entrance to the tabernacle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'curtain for the doorway of the tabernacle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  chosen: And he put up
  alternatives:
  - and he placed
  - and he set
  lexicon: HALOT
  rationale: The verb שׂוּם commonly means 'put, place, set.' In this construction
    with the object 'screen' at an entrance, 'put up' is natural modern English and
    reflects the act of installing or positioning the hanging, not merely placing
    it nearby.
- source_word: מָסַךְ
  chosen: screen
  alternatives:
  - curtain
  - covering
  - veil
  lexicon: HALOT
  rationale: מָסָךְ in tabernacle contexts denotes a hanging or screen used at an
    entrance. 'Screen' best distinguishes it from פָּרֹכֶת ('veil') and preserves
    the functional sense of an entrance hanging.
- source_word: הַפֶּתַח
  chosen: the entrance
  alternatives:
  - the doorway
  - the opening
  lexicon: HALOT
  rationale: פֶּתַח refers to the opening/entrance. 'Entrance' is the most idiomatic
    rendering here in connection with the tabernacle structure and its hanging.
- source_word: לַמִּשְׁכָּן
  chosen: to the tabernacle
  alternatives:
  - for the tabernacle
  - of the tabernacle
  lexicon: HALOT
  rationale: מִשְׁכָּן is conventionally and accurately rendered 'tabernacle' in Exodus.
    The prefixed ל here is best taken in relation to 'entrance'—'the entrance to the
    tabernacle'—rather than as a separate adverbial phrase.
