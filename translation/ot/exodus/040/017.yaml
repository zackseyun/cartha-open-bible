id: EXO.40.17
reference: Exodus 40:17
source:
  edition: WLC
  text: וַ/יְהִ֞י בַּ/חֹ֧דֶשׁ הָ/רִאשׁ֛וֹן בַּ/שָּׁנָ֥ה הַ/שֵּׁנִ֖ית בְּ/אֶחָ֣ד לַ/חֹ֑דֶשׁ הוּקַ֖ם הַ/מִּשְׁכָּֽן׃
translation:
  text: And it happened in the first month of the second year[a], on the first day of the month[b], that the tabernacle was set up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'on the first of the month.' The Hebrew idiom literally reads 'on one of the month.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'was erected.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: The waw-consecutive form of היה introduces a narrative event. 'And it happened' preserves the Hebrew narrative progression without archaic English like 'came to pass.'
- source_word: בַּחֹדֶשׁ הָרִאשׁוֹן
  chosen: in the first month
  alternatives:
  - in the first new moon/month
  lexicon: HALOT
  rationale: חֹדֶשׁ ordinarily means 'month' in calendrical contexts. The article plus ordinal gives a straightforward temporal designation.
- source_word: בַּשָּׁנָה הַשֵּׁנִית
  chosen: of the second year
  alternatives:
  - in the second year
  lexicon: HALOT
  rationale: This phrase further specifies the date. 'Of the second year' reads naturally in English when following 'in the first month' and preserves the genitival relationship of the Hebrew dating formula.
- source_word: בְּאֶחָד לַחֹדֶשׁ
  chosen: on the first day of the month
  alternatives:
  - on the first of the month
  lexicon: HALOT
  rationale: Literally 'on one of the month,' an idiomatic Hebrew date expression meaning the first day of the month. The fuller English rendering is clear and natural.
- source_word: הוּקַם
  chosen: was set up
  alternatives:
  - was erected
  - was raised up
  lexicon: HALOT
  rationale: 'The Hophal of קום is passive/causative-passive: ''was set up'' or ''was erected.'' ''Was set up'' is idiomatic modern English and fits the context of assembling the sanctuary.'
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  - the dwelling
  lexicon: HALOT
  rationale: מִשְׁכָּן refers specifically to the portable sanctuary described in Exodus. 'Tabernacle' is the established and precise English term here, while alternatives are more generic and lose the cultic specificity.
