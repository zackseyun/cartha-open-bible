id: EXO.40.7
reference: Exodus 40:7
source:
  edition: WLC
  text: וְ/נָֽתַתָּ֙ אֶת הַ/כִּיֹּ֔ר בֵּֽין אֹ֥הֶל מוֹעֵ֖ד וּ/בֵ֣ין הַ/מִּזְבֵּ֑חַ
    וְ/נָתַתָּ֥ שָׁ֖ם מָֽיִם־־׃
translation:
  text: And you shall place the basin between the tent of meeting and the altar, and
    you shall put water there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditional English versions often render כִּיּוֹר as 'laver.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּ
  chosen: And you shall place
  alternatives:
  - and you shall set
  - and you shall put
  lexicon: HALOT
  rationale: נתן is a broad verb meaning 'give, put, set.' In this spatial instruction
    with a cultic furnishing as direct object, 'place' best conveys deliberate positioning
    in natural English while remaining close to the Hebrew.
- source_word: הַכִּיֹּר
  chosen: the basin
  alternatives:
  - the laver
  lexicon: HALOT
  rationale: כִּיּוֹר denotes a wash basin used in tabernacle service. 'Basin' is
    clear modern English; 'laver' is traditional but less accessible and more archaic.
- source_word: בֵּין אֹהֶל מוֹעֵד וּבֵין הַמִּזְבֵּחַ
  chosen: between the tent of meeting and the altar
  alternatives:
  - between the Tent of Meeting and the altar
  lexicon: HALOT
  rationale: בֵּין...וּבֵין marks the space between two objects. 'Tent of meeting'
    is the standard transparent rendering of אֹהֶל מוֹעֵד. Lowercase is used here
    because it functions as a descriptive cultic designation rather than requiring
    a stylized title in English.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: מִזְבֵּחַ straightforwardly means 'altar.' No narrower specification
    is present in the verse itself, so the simple rendering is retained.
- source_word: וְנָתַתָּ שָׁם מָיִם
  chosen: and you shall put water there
  alternatives:
  - and you shall put water in it there
  - and you shall place water there
  lexicon: HALOT
  rationale: The Hebrew literally says 'and you shall put there water.' English requires
    smoother word order. 'There' is retained to reflect שָׁם, indicating the basin's
    location as the place where water is to be supplied. Although English might idiomatically
    say 'put water in it,' the object 'it' is not explicit in Hebrew, so the translation
    stays closer to the source.
