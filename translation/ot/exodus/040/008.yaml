id: EXO.40.8
reference: Exodus 40:8
source:
  edition: WLC
  text: וְ/שַׂמְתָּ֥ אֶת הֶ/חָצֵ֖ר סָבִ֑יב וְ/נָ֣תַתָּ֔ אֶת מָסַ֖ךְ שַׁ֥עַר הֶ/חָצֵֽר־־׃
translation:
  text: And you shall set up the courtyard all around, and put up the screen for the
    gate of the courtyard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'curtain' for 'screen' (Hebrew מָסָךְ), referring to the hanging at the
      courtyard entrance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתָּ
  chosen: And you shall set up
  alternatives:
  - And you shall place
  - And you shall arrange
  lexicon: HALOT
  rationale: The verb שׂים is broad ('put, place, set'). In the tabernacle-construction
    context, 'set up' best fits the act of erecting or positioning the courtyard structure,
    while remaining natural English.
- source_word: הֶחָצֵר
  chosen: the courtyard
  alternatives:
  - the court
  - the enclosure
  lexicon: HALOT
  rationale: חָצֵר here refers to the tabernacle's surrounding court. 'Courtyard'
    is clear modern English and suitably concrete.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - surrounding
  lexicon: HALOT
  rationale: The adverb indicates encircling placement. 'All around' brings out the
    comprehensive surrounding sense in idiomatic English.
- source_word: וְנָתַתָּ
  chosen: and put up
  alternatives:
  - and place
  - and set
  lexicon: HALOT
  rationale: נתן is often simply 'give/put,' but in this construction context the
    object is a hanging at an entrance. 'Put up' naturally conveys installing it.
- source_word: מָסַךְ
  chosen: the screen
  alternatives:
  - the curtain
  - the covering
  lexicon: HALOT
  rationale: מָסָךְ in tabernacle contexts denotes a hanging or screen at an entrance.
    'Screen' preserves the technical cultic sense without over-specifying fabric type.
- source_word: שַׁעַר
  chosen: the gate
  alternatives:
  - the entrance
  - the gateway
  lexicon: HALOT
  rationale: שַׁעַר denotes the entry point to the courtyard. 'Gate' is the most direct
    rendering, even though the barrier itself is a fabric screen.
- source_word: הֶחָצֵר
  chosen: of the courtyard
  alternatives:
  - of the court
  lexicon: HALOT
  rationale: The construct chain שַׁעַר הֶחָצֵר is most naturally rendered 'the gate
    of the courtyard,' identifying which gate is in view.
