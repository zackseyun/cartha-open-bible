id: EXO.40.26
reference: Exodus 40:26
source:
  edition: WLC
  text: וַ/יָּ֛שֶׂם אֶת מִזְבַּ֥ח הַ/זָּהָ֖ב בְּ/אֹ֣הֶל מוֹעֵ֑ד לִ/פְנֵ֖י הַ/פָּרֹֽכֶת־׃
translation:
  text: And he placed the gold altar in the tent of meeting, before the veil,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the curtain.' The Hebrew term refers to the inner partition of the tabernacle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  chosen: And he placed
  alternatives:
  - And he set
  - And he put
  lexicon: HALOT
  rationale: Wayyiqtol of שׂוּם narrates sequential action in past time. 'Placed'
    is natural modern English and fits the careful positioning of tabernacle furnishings
    better than the more generic 'put.'
- source_word: מִזְבַּח הַזָּהָב
  chosen: the gold altar
  alternatives:
  - the golden altar
  lexicon: HALOT
  rationale: Construct phrase literally 'altar of the gold.' English idiom favors
    either 'gold altar' or 'golden altar.' 'Gold altar' stays slightly closer to the
    Hebrew nominal construction while remaining clear.
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - in the meeting tent
  - in the tabernacle of meeting
  lexicon: HALOT
  rationale: אֹהֶל מוֹעֵד is the standard designation for the sanctuary structure.
    'Tent of meeting' is the established and accurate rendering, preserving the covenantal
    meeting sense of מוֹעֵד without unnecessary paraphrase.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in front of
  - opposite
  lexicon: HALOT
  rationale: The preposition indicates spatial position relative to the curtain. 'Before'
    is concise and idiomatic in sanctuary-description contexts.
- source_word: הַפָּרֹכֶת
  chosen: the veil
  alternatives:
  - the curtain
  lexicon: HALOT
  rationale: פָּרֹכֶת refers to the inner partition curtain of the tabernacle. 'Veil'
    is the traditional and contextually precise term for this cultic divider, though
    'curtain' is a viable lexical alternative.
