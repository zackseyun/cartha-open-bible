theological_decisions:
- issue: Cultic furnishing terminology for הַפָּרֹכֶת
  chosen_reading: the veil
  alternative_readings:
  - the curtain
  rationale: This is not a major doctrinally contested term in the provided table,
    but the sanctuary context gives the partition theological significance in later
    biblical usage. 'Veil' preserves that intertextual resonance without overstating
    the Hebrew beyond its plain cultic sense.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological weight without paraphrase.'
