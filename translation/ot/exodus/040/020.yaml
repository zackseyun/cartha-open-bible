theological_decisions:
- issue: Referent of 'the testimony'
  chosen_reading: A cultic designation for the covenant testimony placed inside the
    ark, likely the stone tablets, rendered without over-specifying.
  alternative_readings:
  - Explicitly identify it as the tablets of the covenant
  - Render more abstractly as 'the testimony' without implying physical tablets
  rationale: The verse describes a physical act of placing something into the ark,
    so the referent is concrete; however, the Hebrew retains the technical term עֵדוּת
    rather than naming the tablets directly. The translation preserves that tension
    rather than resolving it beyond the text.
  doctrine_reference: Translation philosophy §3
- issue: Rendering of כַּפֹּרֶת
  chosen_reading: mercy seat
  alternative_readings:
  - atonement cover
  - cover
  rationale: The term names the specific cultic object atop the ark. 'Mercy seat'
    preserves its recognized theological and tabernacle significance in English, while
    avoiding reduction to a merely functional 'cover.'
