id: EXO.40.20
reference: Exodus 40:20
source:
  edition: WLC
  text: וַ/יִּקַּ֞ח וַ/יִּתֵּ֤ן אֶת הָ/עֵדֻת֙ אֶל הָ֣/אָרֹ֔ן וַ/יָּ֥שֶׂם אֶת הַ/בַּדִּ֖ים
    עַל הָ/אָרֹ֑ן וַ/יִּתֵּ֧ן אֶת הַ/כַּפֹּ֛רֶת עַל הָ/אָרֹ֖ן מִ/לְ/מָֽעְלָ/ה־־־־־־׃
translation:
  text: Then he took the testimony and put it into the ark, and he set the poles on
    the ark, and he placed the mercy seat on the ark above.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the tablets of the testimony'; Hebrew 'the testimony' is the technical
      term used here for what was placed in the ark.
    reason: lexical_alternative
  - marker: b
    text: Or 'the atonement cover.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֵדֻת
  chosen: the testimony
  alternatives:
  - the covenant document
  - the tablets of the testimony
  lexicon: HALOT
  rationale: The noun עֵדוּת commonly means 'testimony' or 'witness.' In tabernacle
    context it refers concretely to the covenant testimony placed in the ark, likely
    the tablets, but the Hebrew here uses the established cultic term rather than
    naming the tablets directly. 'The testimony' preserves the source wording while
    remaining intelligible.
- source_word: הָאָרֹן
  chosen: the ark
  alternatives:
  - the chest
  - the ark of the covenant
  lexicon: HALOT
  rationale: אָרוֹן denotes a chest or box; in this context it is the sacred ark.
    'The ark' is the natural English rendering and matches the immediate context without
    adding 'of the covenant,' which is not present in this verse.
- source_word: הַבַּדִּים
  chosen: the poles
  alternatives:
  - the carrying poles
  - the staves
  lexicon: HALOT
  rationale: בַּדִּים refers to the poles used to carry the ark. 'Poles' is clear
    modern English; 'staves' is traditional but archaic.
- source_word: הַכַּפֹּרֶת
  chosen: the mercy seat
  alternatives:
  - the atonement cover
  - the cover
  lexicon: HALOT
  rationale: כַּפֹּרֶת is the gold cover of the ark with strong cultic significance.
    'Mercy seat' is the established rendering in this tabernacle context and best
    identifies the specific object. 'Atonement cover' is possible and more explanatory,
    but less idiomatic here. This is distinct from the Greek contested term ἱλαστήριον
    listed in DOCTRINE.md, so no doctrinal footnote is required.
- source_word: מִלְמָעְלָה
  chosen: above it
  alternatives:
  - on top
  - from above
  lexicon: HALOT
  rationale: The adverbial expression means 'from above/upward' and here specifies
    placement on the upper side of the ark. 'Above it' gives smooth English and reflects
    that the mercy seat was placed on top of the ark.
- source_word: וַיִּתֵּן ... אֶל
  chosen: put ... into
  alternatives:
  - placed ... in
  - gave ... into
  lexicon: HALOT
  rationale: נתן with אֶל in this physical context means to place or put into. 'Put
    ... into' is idiomatic and concrete.
- source_word: וַיָּשֶׂם ... עַל
  chosen: set ... on
  alternatives:
  - placed ... on
  - put ... on
  lexicon: HALOT
  rationale: שׂים here denotes setting the poles onto/against the ark in their proper
    position. 'Set ... on' is concise and natural.
