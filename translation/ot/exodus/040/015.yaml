theological_decisions:
- issue: Duration implied by עוֹלָם in priestly covenant language
  chosen_reading: an everlasting priesthood
  alternative_readings:
  - a perpetual priesthood
  - a permanent priesthood
  rationale: The Hebrew term עוֹלָם often denotes enduring continuity within the covenantal frame rather than making an abstract philosophical claim about endlessness. 'Everlasting' is retained in the main text because it is the strongest natural English equivalent and fits the priestly institution in context; alternatives are lexical rather than doctrinally distinct here.
  doctrine_reference: Translation philosophy §1, §5
