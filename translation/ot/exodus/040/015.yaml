id: EXO.40.15
reference: Exodus 40:15
source:
  edition: WLC
  text: וּ/מָשַׁחְתָּ֣ אֹתָ֗/ם כַּ/אֲשֶׁ֤ר מָשַׁ֨חְתָּ֙ אֶת אֲבִי/הֶ֔ם וְ/כִהֲנ֖וּ לִ֑/י וְ֠/הָיְתָה לִ/הְיֹ֨ת לָ/הֶ֧ם מָשְׁחָתָ֛/ם לִ/כְהֻנַּ֥ת עוֹלָ֖ם לְ/דֹרֹתָֽ/ם־׃
translation:
  text: You shall anoint them just as you anointed their father[a], so that they may serve as priests to me. And their anointing shall be for them an everlasting priesthood throughout their generations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a perpetual priesthood.' The Hebrew can denote enduring continuity across generations in covenantal context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָשַׁחְתָּ
  chosen: You shall anoint
  alternatives:
  - and you shall anoint
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional sequence functions as a future/modal command in English. 'You shall anoint' preserves the directive force naturally.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct object pronoun referring to Aaron's sons.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  lexicon: HALOT
  rationale: Marks close comparison between the anointing of the sons and that of their father; 'just as' brings out the explicit parallel.
- source_word: מָשַׁחְתָּ
  chosen: you anointed
  lexicon: HALOT
  rationale: Past reference to Moses' anointing of Aaron.
- source_word: אֶת אֲבִיהֶם
  chosen: their father
  lexicon: HALOT
  rationale: Singular collective reference to Aaron as the father of the sons being addressed.
- source_word: וְכִהֲנוּ לִי
  chosen: so that they may serve as priests to me
  alternatives:
  - and they shall minister as priests to me
  - and they shall be priests to me
  lexicon: HALOT
  rationale: כהן in the verbal form means to act or serve as priest. 'Serve as priests' is clear modern English and preserves the cultic function. 'To me' retains the dative indicating service rendered to Yahweh.
- source_word: וְהָיְתָה לִהְיוֹת לָהֶם
  chosen: And ... shall be for them
  alternatives:
  - and it shall become for them
  - and it shall be to them
  lexicon: HALOT
  rationale: The construction introduces the result/status of the anointing. English compresses the infinitive construction idiomatically while preserving the sense.
- source_word: מָשְׁחָתָם
  chosen: their anointing
  alternatives:
  - their anointing oil
  - their consecration by anointing
  lexicon: HALOT
  rationale: The noun denotes anointing/consecration by anointing, not explicitly the oil itself here. 'Their anointing' best matches the Hebrew while allowing the consecratory sense to remain.
- source_word: לִכְהֻנַּת עוֹלָם
  chosen: an everlasting priesthood
  alternatives:
  - a perpetual priesthood
  - a permanent priesthood
  lexicon: HALOT
  rationale: כהנה is 'priesthood'; עולם in covenantal/legal contexts often denotes enduring or perpetual duration. 'Everlasting priesthood' is the traditional and semantically strong rendering, while not requiring metaphysical absolutizing beyond the context.
- source_word: לְדֹרֹתָם
  chosen: throughout their generations
  alternatives:
  - for their generations
  - from generation to generation
  lexicon: HALOT
  rationale: Expresses continuity across successive generations of Aaron's descendants. 'Throughout their generations' is idiomatic and precise.
