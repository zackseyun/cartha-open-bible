id: EXO.40.18
reference: Exodus 40:18
source:
  edition: WLC
  text: וַ/יָּ֨קֶם מֹשֶׁ֜ה אֶת הַ/מִּשְׁכָּ֗ן וַ/יִּתֵּן֙ אֶת אֲדָנָ֔י/ו וַ/יָּ֨שֶׂם֙ אֶת קְרָשָׁ֔י/ו וַ/יִּתֵּ֖ן אֶת בְּרִיחָ֑י/ו וַ/יָּ֖קֶם אֶת עַמּוּדָֽי/ו־־־־־׃
translation:
  text: So Moses set up the tabernacle[a], and placed its bases, and set its frames, and put in its bars[c][b], and raised up its pillars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sockets' for 'bases' (אֲדָנָיו), referring to the foundation pieces that held the tabernacle frames.
    reason: lexical_alternative
  - marker: b
    text: Or 'boards' for 'frames' (קְרָשָׁיו). The Hebrew term can denote boards, but here likely refers to the tabernacle's upright structural members.
    reason: lexical_alternative
  - marker: c
    text: Or 'posts' for 'pillars' (עַמּוּדָיו).
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֶם
  chosen: set up
  alternatives:
  - erected
  - raised
  lexicon: HALOT
  rationale: The verb קום in the Hiphil here means to cause to stand or establish. 'Set up' is natural modern English for assembling the tabernacle structure and fits the construction context better than the more formal 'erected,' while remaining close to the Hebrew.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  - the dwelling
  lexicon: HALOT
  rationale: מִשְׁכָּן literally denotes a dwelling place, but in Exodus it is the established term for the sacred portable sanctuary. 'Tabernacle' preserves the recognized referent without undue paraphrase.
- source_word: אֲדָנָיו
  chosen: its bases
  alternatives:
  - its sockets
  - its pedestals
  lexicon: HALOT
  rationale: אֶדֶן in tabernacle descriptions refers to the foundation pieces or sockets into which the frames fit. 'Bases' is clear modern English and broad enough to cover the structural function; 'sockets' is possible but more technical.
- source_word: קְרָשָׁיו
  chosen: its frames
  alternatives:
  - its boards
  - its planks
  lexicon: HALOT
  rationale: קֶרֶשׁ can be rendered 'board,' but in the tabernacle context these are upright structural members. 'Frames' better communicates their architectural role in contemporary English without straying far from the source.
- source_word: בְּרִיחָיו
  chosen: its bars
  alternatives:
  - its crossbars
  lexicon: HALOT
  rationale: בְּרִיחַ denotes the bars used to hold the frames together. 'Bars' is the straightforward rendering; 'crossbars' is slightly more interpretive and therefore left as an alternative.
- source_word: עַמּוּדָיו
  chosen: its pillars
  alternatives:
  - its posts
  - its columns
  lexicon: HALOT
  rationale: עַמּוּד refers to upright supports. 'Pillars' is a standard and dignified rendering in sanctuary contexts; 'posts' is possible but sounds more utilitarian.
- source_word: וַיָּשֶׂם
  chosen: set
  alternatives:
  - placed
  lexicon: HALOT
  rationale: שׂוּם is a common verb meaning to put or place. 'Set' works idiomatically with 'frames' and maintains the sequence of assembly actions.
- source_word: וַיִּתֵּן
  chosen: placed / put in
  alternatives:
  - set
  - installed
  lexicon: HALOT
  rationale: 'נָתַן is broadly ''give/put/place.'' Here it describes positioning structural elements. English varies naturally by object: ''placed its bases'' and ''put in its bars'' reflect idiomatic usage while preserving the same underlying action.'
