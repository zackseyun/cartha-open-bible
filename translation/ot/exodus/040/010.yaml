theological_decisions:
- issue: Rendering the cultic holiness formula קֹדֶשׁ קָדָשִׁים
  chosen_reading: most holy
  alternative_readings:
  - holy of holies
  rationale: The phrase is a superlative description of sanctity, not necessarily
    a reference to the inner sanctuary. Rendering it 'most holy' avoids importing
    spatial associations while preserving the altar's highest consecrated status.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
