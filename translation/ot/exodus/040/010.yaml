id: EXO.40.10
reference: Exodus 40:10
source:
  edition: WLC
  text: וּ/מָשַׁחְתָּ֛ אֶת מִזְבַּ֥ח הָ/עֹלָ֖ה וְ/אֶת כָּל כֵּלָ֑י/ו וְ/קִדַּשְׁתָּ֙
    אֶת הַ/מִּזְבֵּ֔חַ וְ/הָיָ֥ה הַ/מִּזְבֵּ֖חַ קֹ֥דֶשׁ קָֽדָשִֽׁים־־־־׃
translation:
  text: You shall anoint the altar of burnt offering and all its utensils, and you
    shall consecrate the altar, and the altar shall be most holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''holy of holies,'' a superlative expression meaning ''most holy.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָשַׁחְתָּ
  chosen: you shall anoint
  alternatives:
  - you shall smear
  - you shall apply oil to
  lexicon: HALOT
  rationale: משׁח in cultic contexts refers specifically to anointing with oil for
    sacred appointment. 'Anoint' is the standard and most precise English equivalent
    here.
- source_word: מִזְבַּח הָעֹלָה
  chosen: the altar of burnt offering
  alternatives:
  - the burnt offering altar
  - the altar for burnt offering
  lexicon: HALOT
  rationale: The construct phrase identifies the specific altar associated with burnt
    offerings. 'Altar of burnt offering' is clear, idiomatic, and preserves the sacrificial
    reference.
- source_word: כָּל כֵּלָיו
  chosen: all its utensils
  alternatives:
  - all its vessels
  - all its implements
  - all its furnishings
  lexicon: HALOT
  rationale: כֵּלִים is a broad term for articles or equipment. In tabernacle context,
    'utensils' best conveys the altar's associated ritual implements in readable modern
    English.
- source_word: וְקִדַּשְׁתָּ
  chosen: you shall consecrate
  alternatives:
  - you shall sanctify
  - you shall make holy
  lexicon: HALOT
  rationale: קדשׁ in this ritual setting means to set apart as holy. 'Consecrate'
    is natural English for cultic dedication and preserves the formal sacred sense.
- source_word: וְהָיָה
  chosen: and ... shall be
  alternatives:
  - and ... will become
  lexicon: HALOT
  rationale: The verb marks the resulting state after consecration. English future
    'shall be' fits the instructional sequence and resulting status.
- source_word: קֹדֶשׁ קָדָשִׁים
  chosen: most holy
  alternatives:
  - holy of holies
  - a holy thing of holy things
  lexicon: HALOT
  rationale: The Hebrew superlative construction denotes the highest degree of holiness.
    'Most holy' is the clearest idiomatic rendering in English for the altar's sanctity.
