id: EXO.40.11
reference: Exodus 40:11
source:
  edition: WLC
  text: וּ/מָשַׁחְתָּ֥ אֶת הַ/כִּיֹּ֖ר וְ/אֶת כַּנּ֑/וֹ וְ/קִדַּשְׁתָּ֖ אֹתֽ/וֹ־־׃
translation:
  text: You shall anoint the basin and its stand, and consecrate it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "base."
    reason: lexical_alternative
  - marker: b
    text: Or "and you shall make it holy" / "sanctify it."
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָשַׁחְתָּ
  chosen: you shall anoint
  alternatives:
  - and you shall anoint
  - you must anoint
  lexicon: HALOT
  rationale: משׁח in ritual contexts denotes anointing with oil for sacred appointment.
    English 'anoint' is the standard and sufficiently transparent. The prefixed conjunction
    is not separately represented because English style naturally continues the instruction
    sequence without needing repeated 'and' at the start.
- source_word: הַכִּיֹּר
  chosen: the basin
  alternatives:
  - the laver
  lexicon: HALOT
  rationale: כִּיּוֹר refers to the large wash basin associated with tabernacle service.
    'Basin' is clearer modern English than the traditional but less common 'laver,'
    while still accurate.
- source_word: כַּנּוֹ
  chosen: its stand
  alternatives:
  - its base
  lexicon: HALOT
  rationale: כֵּן here denotes the supporting structure for the basin. 'Stand' is
    natural modern English and fits the tabernacle furnishing context; 'base' is possible
    but slightly less specific in ordinary usage.
- source_word: וְקִדַּשְׁתָּ אֹתוֹ
  chosen: and you shall consecrate it
  alternatives:
  - and you shall make it holy
  - and you shall sanctify it
  lexicon: HALOT
  rationale: קדשׁ in the Piel means to set apart as holy/consecrate. 'Consecrate'
    best captures the cultic action in readable modern English. The singular object
    pronoun most naturally refers to the basin as the principal item, with its stand
    included as attached to it in the ritual action.
