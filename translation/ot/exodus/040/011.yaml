- issue: Rendering קדשׁ in cultic tabernacle context
  chosen_reading: consecrate
  alternative_readings:
  - make holy
  - sanctify
  rationale: The verse concerns ritual setting apart of tabernacle furnishings, not
    moral transformation. 'Consecrate' preserves the sacred-setting-apart sense without
    importing later doctrinal nuances.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; preserve source meaning without importing doctrinal claims.'
