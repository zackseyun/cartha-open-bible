id: EXO.40.12
reference: Exodus 40:12
source:
  edition: WLC
  text: וְ/הִקְרַבְתָּ֤ אֶֽת אַהֲרֹן֙ וְ/אֶת בָּנָ֔י/ו אֶל פֶּ֖תַח אֹ֣הֶל מוֹעֵ֑ד
    וְ/רָחַצְתָּ֥ אֹתָ֖/ם בַּ/מָּֽיִם־־־׃
translation:
  text: Then bring Aaron and his sons near to the entrance of the tent of meeting,
    and wash them with water.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְהִקְרַבְתָּ
  chosen: bring ... near
  alternatives:
  - present
  - bring
  lexicon: HALOT
  rationale: The Hiphil of קרב means to cause to come near or bring near. 'Bring ...
    near' preserves the causative sense and the ritual context better than the more
    generic 'bring' alone; 'present' is possible but slightly more interpretive.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically denotes male offspring. 'His sons' is gender-accurate
    and fits the priestly context involving Aaron's male descendants.
- source_word: פֶּתַח
  chosen: entrance
  alternatives:
  - doorway
  - opening
  lexicon: HALOT
  rationale: '''Entrance'' is natural modern English for the access point to a structure
    and fits well with the following construct chain.'
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  lexicon: HALOT
  rationale: This is the standard and contextually precise rendering of the tabernacle-related
    term. It preserves the established sense of the sacred meeting place without unnecessary
    paraphrase.
- source_word: וְרָחַצְתָּ
  chosen: wash
  alternatives:
  - bathe
  lexicon: HALOT
  rationale: The verb רחץ means to wash. 'Wash' is broad enough to fit the ritual
    action here without overstating the mode; 'bathe' is possible but more specific
    than the text requires.
- source_word: אֹתָם
  chosen: them
  rationale: The pronoun refers back to Aaron and his sons together.
- source_word: בַּמָּיִם
  chosen: with water
  alternatives:
  - in water
  lexicon: HALOT
  rationale: 'The preposition ב here is best rendered instrumentally in English: the
    washing is performed ''with water.'' ''In water'' is possible but less idiomatic
    in this context.'
