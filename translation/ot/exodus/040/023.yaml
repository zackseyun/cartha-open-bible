id: EXO.40.23
reference: Exodus 40:23
source:
  edition: WLC
  text: וַ/יַּעֲרֹ֥ךְ עָלָ֛י/ו עֵ֥רֶךְ לֶ֖חֶם לִ/פְנֵ֣י יְהוָ֑ה כַּ/אֲשֶׁ֛ר צִוָּ֥ה
    יְהוָ֖ה אֶת מֹשֶֽׁה־׃ס
translation:
  text: And he arranged on it the row of bread before the LORD, just as the LORD had
    commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the arrangement of bread'; traditionally, 'the bread of the Presence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲרֹךְ
  chosen: arranged
  alternatives:
  - set in order
  - laid out
  lexicon: HALOT
  rationale: The verb ערך commonly means to arrange or set in order. 'Arranged' fits
    the cultic context of placing the bread in proper order on the table without sounding
    overly wooden.
- source_word: עָלָיו
  chosen: on it
  alternatives:
  - upon it
  lexicon: HALOT
  rationale: The pronoun refers back to the table in the previous verse. 'On it' is
    natural modern English and preserves the spatial sense.
- source_word: עֵרֶךְ לֶחֶם
  chosen: the row of bread
  alternatives:
  - the arrangement of bread
  - the bread in order
  - the bread of the Presence
  lexicon: HALOT
  rationale: Literally the phrase denotes an arranged order of bread. 'The row of
    bread' preserves the concrete sense of bread set out in ordered rows. 'Bread of
    the Presence' is a traditional interpretive rendering tied to the broader institution,
    but this verse itself uses the more descriptive phrase rather than לֶחֶם הַפָּנִים.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew cultic expression meaning before or in the
    presence of YHWH. 'Before the LORD' is concise, idiomatic, and consistent with
    the covenant name policy rendering יְהוָה as 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD'.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  chosen: just as the LORD had commanded Moses
  alternatives:
  - as the LORD commanded Moses
  lexicon: HALOT
  rationale: The clause marks conformity to divine instruction. 'Just as' slightly
    highlights exact correspondence, and the pluperfect 'had commanded' fits the prior
    giving of instructions.
