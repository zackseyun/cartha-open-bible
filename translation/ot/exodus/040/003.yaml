theological_decisions:
- issue: Tabernacle furnishing terminology
  chosen_reading: the ark of the testimony
  alternative_readings:
  - the ark of the covenant
  rationale: The Hebrew explicitly says 'testimony,' so the translation follows the
    source rather than harmonizing to a more familiar traditional phrase. This is
    lexical rather than doctrinal, but it affects theological associations with covenant
    terminology.
  doctrine_reference: Translation philosophy §1, §5
- issue: פָּרֹכֶת rendering
  chosen_reading: curtain
  alternative_readings:
  - veil
  rationale: No doctrinal dispute is at stake, but 'veil' has strong traditional and
    biblical-theological resonance. The main text uses accessible modern English while
    preserving the traditional alternative in a footnote.
  doctrine_reference: Translation philosophy §6
