id: EXO.40.3
reference: Exodus 40:3
source:
  edition: WLC
  text: וְ/שַׂמְתָּ֣ שָׁ֔ם אֵ֖ת אֲר֣וֹן הָ/עֵד֑וּת וְ/סַכֹּתָ֥ עַל הָ/אָרֹ֖ן אֶת הַ/פָּרֹֽכֶת־־׃
translation:
  text: And you shall place there the ark of the testimony, and you shall screen the
    ark with the curtain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'veil.' Hebrew פָּרֹכֶת refers to the inner tabernacle curtain that screened
      off the ark.
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'the ark of the covenant' in some English renderings, but
      the Hebrew here is 'the testimony.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְשַׂמְתָּ
  chosen: And you shall place
  alternatives:
  - and put
  - and set
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional sequence functions
    as an imperative/future-like command to Moses. 'Place' is natural modern English
    and suitably formal for cultic instructions.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in it
  lexicon: HALOT
  rationale: Adverb indicating location, referring to the tabernacle/tent just mentioned
    in context. 'There' preserves the deictic force without over-specifying.
- source_word: אֲרוֹן הָעֵדוּת
  chosen: the ark of the testimony
  alternatives:
  - the ark of the covenant
  - the chest of the testimony
  lexicon: HALOT
  rationale: Literally 'ark of the testimony.' Although English tradition often uses
    'ark of the covenant' in some contexts, the Hebrew here is עֵדוּת ('testimony/witness'),
    so the source-text wording is preserved.
- source_word: וְסַכֹּתָ
  chosen: and you shall screen
  alternatives:
  - and cover
  - and conceal
  - and shield
  lexicon: HALOT
  rationale: From סכך, 'cover, screen, shelter.' In this context the curtain is not
    laid over the ark like a cloth but serves as a screening partition before it.
    'Screen' best captures the cultic spatial function.
- source_word: עַל הָאָרֹן
  chosen: the ark
  alternatives:
  - over the ark
  - before the ark
  lexicon: HALOT
  rationale: The preposition עַל literally means 'upon/over,' but with סכך in this
    setting it expresses the ark being screened off by means of the curtain. English
    idiom is smoother with 'screen the ark with the curtain' while retaining the sense.
- source_word: הַפָּרֹכֶת
  chosen: the curtain
  alternatives:
  - the veil
  lexicon: HALOT
  rationale: פָּרֹכֶת denotes the inner tabernacle curtain/veil. 'Curtain' is more
    accessible modern English; 'veil' is a viable traditional alternative and worth
    preserving in a footnote because of intertextual familiarity.
