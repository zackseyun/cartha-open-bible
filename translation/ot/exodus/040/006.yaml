id: EXO.40.6
reference: Exodus 40:6
source:
  edition: WLC
  text: וְ/נָ֣תַתָּ֔ה אֵ֖ת מִזְבַּ֣ח הָ/עֹלָ֑ה לִ/פְנֵ֕י פֶּ֖תַח מִשְׁכַּ֥ן אֹֽהֶל
    מוֹעֵֽד־׃
translation:
  text: And you shall place the altar of burnt offering before the entrance of the
    tabernacle, the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in front of the entrance of the tabernacle, the tent of meeting.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/נָתַתָּה
  chosen: And you shall place
  alternatives:
  - and you shall put
  - and you shall set
  lexicon: HALOT
  rationale: נתן is broadly 'give/put/set.' In this tabernacle-placement context,
    'place' is natural modern English and accurately conveys positioning without unnecessary
    stiffness.
- source_word: מִזְבַּח
  chosen: the altar
  lexicon: HALOT
  rationale: Standard rendering for מזבח, the sacrificial altar.
- source_word: הָעֹלָה
  chosen: of burnt offering
  alternatives:
  - for burnt offering
  - of the burnt offering
  lexicon: HALOT
  rationale: עֹלָה denotes the burnt offering. The construct chain מִזְבַּח הָעֹלָה
    is idiomatically rendered 'altar of burnt offering' in English; this preserves
    the sacrificial sense without awkwardness.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in front of
  lexicon: HALOT
  rationale: לִפְנֵי commonly means 'before/in front of.' 'Before' fits both the spatial
    relation and the elevated register of the instructions.
- source_word: פֶּתַח
  chosen: the entrance
  alternatives:
  - the doorway
  - the opening
  lexicon: HALOT
  rationale: פֶּתַח refers to the entryway/opening. 'Entrance' is the clearest idiomatic
    choice here.
- source_word: מִשְׁכַּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  lexicon: HALOT
  rationale: מִשְׁכָּן is the technical term for the sanctuary structure in Exodus.
    'Tabernacle' preserves established cultic meaning and remains understandable.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  lexicon: HALOT
  rationale: This fixed expression is conventionally and accurately rendered 'tent
    of meeting.' Retaining it preserves the recognized designation of the sanctuary.
