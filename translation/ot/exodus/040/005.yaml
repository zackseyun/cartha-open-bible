id: EXO.40.5
reference: Exodus 40:5
source:
  edition: WLC
  text: וְ/נָתַתָּ֞ה אֶת מִזְבַּ֤ח הַ/זָּהָב֙ לִ/קְטֹ֔רֶת לִ/פְנֵ֖י אֲר֣וֹן הָ/עֵדֻ֑ת
    וְ/שַׂמְתָּ֛ אֶת מָסַ֥ךְ הַ/פֶּ֖תַח לַ/מִּשְׁכָּֽן־־׃
translation:
  text: And you shall place the golden altar for incense before the ark of the testimony,
    and you shall set the screen for the entrance of the tabernacle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the golden altar of incense.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''the ark of the testimony''; traditionally often rendered ''the
      ark of the covenant.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְנָתַתָּה
  chosen: you shall place
  alternatives:
  - you shall put
  - you shall set
  lexicon: HALOT
  rationale: נתן commonly means 'give/put/place.' In this tabernacle-instructions
    context, 'place' is natural modern English for positioning sacred furniture without
    sounding overly wooden.
- source_word: מִזְבַּח הַזָּהָב
  chosen: the gold altar
  alternatives:
  - the golden altar
  lexicon: HALOT
  rationale: The construct phrase literally denotes 'altar of gold' or 'gold altar.'
    'The gold altar' is concise, natural, and preserves the material description.
    'Golden altar' is possible but slightly more idiomatic than the Hebrew wording.
- source_word: לִקְטֹרֶת
  chosen: for incense
  alternatives:
  - for burning incense
  - of incense
  lexicon: HALOT
  rationale: 'The preposition ל plus קְטֹרֶת indicates purpose/function: the altar
    is designated for incense. ''For incense'' is compact and clear; ''altar of incense''
    is a common English collocation but would obscure the explicit preposition.'
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in front of
  - in the presence of
  lexicon: HALOT
  rationale: לִפְנֵי regularly means 'before/in front of.' 'Before' fits both the
    spatial sense and the elevated register of the passage.
- source_word: אֲרוֹן הָעֵדֻת
  chosen: the ark of the testimony
  alternatives:
  - the ark of the covenant
  - the ark of the witness
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'testimony,' not 'covenant.' To follow original-language
    primacy, the translation keeps 'testimony.' 'Ark of the covenant' reflects later/traditional
    English usage rather than the exact wording here.
- source_word: וְשַׂמְתָּ
  chosen: you shall set
  alternatives:
  - you shall place
  - you shall put
  lexicon: HALOT
  rationale: שׂים overlaps with נתן in meaning, but rendering it as 'set' gives slight
    English variation while still accurately conveying placement.
- source_word: מָסַךְ
  chosen: the screen
  alternatives:
  - the curtain
  - the covering
  lexicon: HALOT
  rationale: מָסַךְ in tabernacle contexts refers to a hanging/screen at an entrance.
    'Screen' best distinguishes it from פָּרֹכֶת ('veil') and preserves tabernacle
    terminology.
- source_word: הַפֶּתַח
  chosen: the entrance
  alternatives:
  - the doorway
  - the opening
  lexicon: HALOT
  rationale: פֶּתַח denotes the entry/opening. 'Entrance' is the most natural fit
    with 'screen' in English for the tabernacle structure.
- source_word: לַמִּשְׁכָּן
  chosen: of the tabernacle
  alternatives:
  - for the tabernacle
  - to the tabernacle
  lexicon: HALOT
  rationale: Although the preposition is ל, in English the phrase with מָסַךְ הַפֶּתַח
    is best rendered idiomatically as 'the screen for the entrance of the tabernacle.'
    'Tabernacle' is the standard rendering of מִשְׁכָּן in this cultic context.
