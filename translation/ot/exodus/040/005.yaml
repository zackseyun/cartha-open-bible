theological_decisions:
- issue: Rendering עֵדֻת in the ark title
  chosen_reading: the ark of the testimony
  alternative_readings:
  - the ark of the covenant
  rationale: The verse names the ark with עֵדֻת ('testimony'). Retaining this wording
    avoids importing the more familiar but less exact traditional title 'ark of the
    covenant.' This is a lexical precision issue rather than a doctrinal dispute,
    but it affects how readers perceive the object named in the tabernacle instructions.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
