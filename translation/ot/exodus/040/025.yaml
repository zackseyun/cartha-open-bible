id: EXO.40.25
reference: Exodus 40:25
source:
  edition: WLC
  text: וַ/יַּ֥עַל הַ/נֵּרֹ֖ת לִ/פְנֵ֣י יְהוָ֑ה כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־׃ס
translation:
  text: And he set up the lamps before the LORD, just as the LORD had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''caused the lamps to go up''; the expression can refer to setting
      up or lighting the lamps.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: set up
  alternatives:
  - caused to go up
  - offered up
  - mounted
  lexicon: HALOT
  rationale: The verb עלה literally means 'go up' or in the Hiphil 'cause to go up.'
    In the tabernacle-lamp context, the idiom refers to causing the lamps to burn
    or be placed/arranged on the lampstand. 'Set up' gives clear modern English for
    the ritual action without over-specifying 'lit,' which is possible but not demanded
    by the verb alone here.
- source_word: הַנֵּרֹת
  chosen: the lamps
  alternatives:
  - the lights
  lexicon: HALOT
  rationale: נֵרֹת refers to lamps, specifically the lamp units on the lampstand,
    not abstract light. 'Lamps' is the most concrete and contextually appropriate
    rendering.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי is a standard spatial/cultic expression meaning 'before' or 'in
    the presence of.' 'Before the LORD' preserves the cultic register and remains
    natural in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name יְהוָה is rendered 'the LORD' rather
    than transliterated forms.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: This comparative conjunction introduces conformity to a prior command.
    'Just as' clearly conveys exact correspondence.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: 'The perfect verb refers to a prior command relative to the narrative
    action. English past perfect naturally conveys that sequence: the action was done
    in accordance with what the LORD had previously commanded.'
- source_word: אֶת מֹשֶׁה
  chosen: Moses
  alternatives:
  - to Moses
  lexicon: HALOT
  rationale: The direct object marker אֶת marks Moses as the one commanded. In idiomatic
    English, 'commanded Moses' is natural; 'commanded to Moses' would be incorrect.
