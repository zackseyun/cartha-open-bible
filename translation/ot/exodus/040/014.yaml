id: EXO.40.14
reference: Exodus 40:14
source:
  edition: WLC
  text: וְ/אֶת בָּנָ֖י/ו תַּקְרִ֑יב וְ/הִלְבַּשְׁתָּ֥ אֹתָ֖/ם כֻּתֳּנֹֽת־׃
translation:
  text: And you shall bring near his sons and clothe them with tunics[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'present his sons' or 'bring his sons forward'; the Hebrew verb often carries a formal, cultic sense of bringing someone near for sacred service.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  chosen: And
  alternatives:
  - And as for
  - Also
  lexicon: HALOT
  rationale: The conjunction plus object marker introduces the next instruction in sequence. English does not normally render the object marker directly, so the sense is carried by 'And' plus the following verb phrase.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The noun specifically denotes male offspring, not children generically. 'His sons' is gender-accurate and fits the priestly context of Aaron's male descendants.
- source_word: תַּקְרִיב
  chosen: you shall bring near
  alternatives:
  - you shall present
  - you shall bring forward
  lexicon: HALOT
  rationale: The Hiphil of קרב commonly means to bring near or present, especially in cultic settings. 'Bring near' preserves the formal and priestly nuance better than the more generic 'bring'.
- source_word: וְהִלְבַּשְׁתָּ
  chosen: and clothe
  alternatives:
  - and dress
  - and put garments on
  lexicon: HALOT
  rationale: The verb means to cause to wear clothing. 'Clothe' is concise, natural English and preserves the causative sense.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct object pronoun referring back to 'his sons'; straightforwardly rendered as 'them'.
- source_word: כֻּתֳּנֹת
  chosen: tunics
  alternatives:
  - coats
  - linen tunics
  - robes
  lexicon: HALOT
  rationale: The term denotes close-fitting body garments/tunics. 'Tunics' is the most standard and contextually accurate English rendering in priestly clothing passages. 'Linen' is not explicit in this verse and should not be added.
