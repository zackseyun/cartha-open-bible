id: EXO.40.34
reference: Exodus 40:34
source:
  edition: WLC
  text: וַ/יְכַ֥ס הֶ/עָנָ֖ן אֶת אֹ֣הֶל מוֹעֵ֑ד וּ/כְב֣וֹד יְהוָ֔ה מָלֵ֖א אֶת הַ/מִּשְׁכָּֽן־־׃
translation:
  text: Then the cloud covered the tent of meeting, and the glory of the LORD filled
    the tabernacle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''Yahweh'': Hebrew has the divine name יְהוָה.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְכַס
  chosen: covered
  alternatives:
  - concealed
  - overspread
  lexicon: HALOT
  rationale: The verb כסה commonly means 'cover.' 'Covered' is the most natural English
    rendering here and preserves the concrete imagery of the cloud enveloping the
    structure. The prefixed waw-consecutive advances the narrative, reflected by 'Then.'
- source_word: הֶעָנָן
  chosen: the cloud
  lexicon: HALOT
  rationale: Definite noun with article; 'the cloud' refers to the specific divine
    cloud already prominent in the Exodus narrative, so the definite form should be
    retained.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  lexicon: HALOT
  rationale: This is the standard and transparent rendering of the construct phrase.
    It preserves the cultic function of the structure as the appointed place of meeting
    without paraphrase.
- source_word: כְבוֹד יְהוָה
  chosen: the glory of the LORD
  alternatives:
  - the LORD's glory
  lexicon: HALOT
  rationale: כָּבוֹד here denotes the manifested weighty splendor/presence of God.
    'The glory of the LORD' is both accurate and idiomatic. Per doctrine, יְהוָה is
    rendered 'the LORD' rather than 'Yahweh' in the main text.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name follows the project's default rendering 'the LORD' per
    DOCTRINE.md, preserving the established convention rooted in Jewish reverence
    practice and the Septuagintal pattern.
- source_word: מָלֵא
  chosen: filled
  alternatives:
  - was full of
  lexicon: HALOT
  rationale: The verb מלא in this context describes the glory occupying the tabernacle.
    'Filled' is the clearest idiomatic English equivalent and matches the transitive
    sense with the tabernacle as object.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  lexicon: HALOT
  rationale: מִשְׁכָּן is the technical term for the sanctuary structure in Exodus.
    'Tabernacle' is the established English equivalent and remains understandable
    in modern English; 'dwelling place' would lose the specific cultic reference.
