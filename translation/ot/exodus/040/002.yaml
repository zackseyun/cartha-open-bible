theological_decisions:
- issue: Relationship between מִשְׁכַּן and אֹהֶל מוֹעֵד
  chosen_reading: 'Appositional: ''the tabernacle, the tent of meeting'''
  alternative_readings:
  - 'Construct-like compression: ''the tabernacle of the tent of meeting'''
  rationale: The Hebrew places two sanctuary designations together without an explicit
    genitive marker. In context, both refer to the same sacred structure from complementary
    angles, so apposition yields clear English without implying two separate objects.
