id: EXO.40.2
reference: Exodus 40:2
source:
  edition: WLC
  text: בְּ/יוֹם הַ/חֹ֥דֶשׁ הָ/רִאשׁ֖וֹן בְּ/אֶחָ֣ד לַ/חֹ֑דֶשׁ תָּקִ֕ים אֶת מִשְׁכַּ֖ן
    אֹ֥הֶל מוֹעֵֽד־־׃
translation:
  text: On the first day of the first month, you shall set up the tabernacle, the
    tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the tabernacle of the tent of meeting.' The Hebrew joins
      two sanctuary terms that may be taken appositionally or as a tighter construct-like
      expression.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּ/יוֹם
  chosen: On the ... day
  alternatives:
  - In the ... day
  - At the ... day
  lexicon: HALOT
  rationale: The preposition ב with יוֹם marks time. In idiomatic English, 'On the
    ... day' best conveys the temporal sense without woodenness.
- source_word: הַ/חֹדֶשׁ הָ/רִאשׁוֹן
  chosen: the first month
  alternatives:
  - the first new moon/month
  lexicon: HALOT
  rationale: חֹדֶשׁ ordinarily means 'month' in calendrical contexts, and הָרִאשׁוֹן
    specifies ordinal sequence. 'The first month' is the plain calendrical sense here.
- source_word: בְּ/אֶחָד לַ/חֹדֶשׁ
  chosen: on the first day of the month
  alternatives:
  - on one of the month
  - on month-day one
  lexicon: HALOT
  rationale: This Hebrew dating formula literally says 'on one of the month' and idiomatically
    means the first day of the month. Rendering it idiomatically in English preserves
    the sense.
- source_word: תָּקִים
  chosen: you shall set up
  alternatives:
  - you shall erect
  - you shall raise up
  lexicon: HALOT
  rationale: Hiphil of קום here means to cause to stand, i.e., erect or set up. 'Set
    up' is natural modern English and fits the construction of the sanctuary.
- source_word: מִשְׁכַּן
  chosen: tabernacle
  alternatives:
  - dwelling place
  - dwelling
  lexicon: HALOT
  rationale: מִשְׁכָּן is the established term for the portable sanctuary structure
    in Exodus. 'Tabernacle' remains the clearest concise English equivalent in this
    cultic context.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the tent of appointment
  lexicon: HALOT
  rationale: This is a standard sanctuary designation in Exodus. 'Tent of meeting'
    is the most recognizable and semantically accurate rendering of אֹהֶל מוֹעֵד.
