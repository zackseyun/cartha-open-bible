id: EXO.40.33
reference: Exodus 40:33
source:
  edition: WLC
  text: וַ/יָּ֣קֶם אֶת הֶ/חָצֵ֗ר סָבִיב֙ לַ/מִּשְׁכָּ֣ן וְ/לַ/מִּזְבֵּ֔חַ וַ/יִּתֵּ֕ן
    אֶת מָסַ֖ךְ שַׁ֣עַר הֶ/חָצֵ֑ר וַ/יְכַ֥ל מֹשֶׁ֖ה אֶת הַ/מְּלָאכָֽה־־־׃פ
translation:
  text: Then he set up the courtyard around the tabernacle and the altar, and put
    up the screen for the gate of the courtyard. So Moses finished the work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'curtain' or 'hanging' for 'screen' (מָסַךְ), referring to the textile
      covering at the courtyard entrance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֶם
  chosen: set up
  alternatives:
  - raised
  - erected
  lexicon: HALOT
  rationale: In tabernacle-construction context, the verb קום in the Hiphil commonly
    means to set up or erect a structure. 'Set up' is natural modern English and fits
    the repeated construction formula in this chapter.
- source_word: הֶחָצֵר
  chosen: the courtyard
  alternatives:
  - the court
  - the enclosure
  lexicon: HALOT
  rationale: חָצֵר here denotes the enclosed court surrounding the tabernacle complex.
    'Courtyard' is clearer in modern English than the more traditional but less specific
    'court'.
- source_word: סָבִיב
  chosen: around
  alternatives:
  - all around
  - surrounding
  lexicon: HALOT
  rationale: The adverb indicates encirclement of the tabernacle and altar by the
    courtyard. 'Around' is concise and idiomatic.
- source_word: לַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  lexicon: HALOT
  rationale: מִשְׁכָּן is the established term for the sanctuary tent in Exodus. 'Tabernacle'
    preserves the technical cultic sense better than a more generic rendering.
- source_word: וְלַמִּזְבֵּחַ
  chosen: and the altar
  lexicon: HALOT
  rationale: Straightforward rendering of מִזְבֵּחַ. The conjunction links both tabernacle
    and altar as the central objects around which the courtyard was set.
- source_word: וַיִּתֵּן
  chosen: put up
  alternatives:
  - set
  - placed
  lexicon: HALOT
  rationale: Although נתן is literally 'gave/put,' in this construction context it
    refers to installing the hanging. 'Put up' communicates the action naturally in
    English.
- source_word: מָסַךְ
  chosen: the screen
  alternatives:
  - the curtain
  - the hanging
  lexicon: HALOT
  rationale: מָסַךְ refers to a textile screen or hanging used as an entrance covering.
    'Screen' distinguishes it from the inner veil while remaining understandable.
- source_word: שַׁעַר הֶחָצֵר
  chosen: the gate of the courtyard
  alternatives:
  - the entrance of the courtyard
  - the gateway of the courtyard
  lexicon: HALOT
  rationale: The construct phrase identifies the entry point of the outer court. 'Gate
    of the courtyard' is a sufficiently literal rendering; English 'gate' can denote
    the entrance area even when covered by a textile screen.
- source_word: וַיְכַל
  chosen: finished
  alternatives:
  - completed
  - brought to an end
  lexicon: HALOT
  rationale: כלה here marks completion of the construction task. 'Finished' is idiomatic
    and echoes the completion motif in biblical narrative.
- source_word: הַמְּלָאכָה
  chosen: the work
  alternatives:
  - the task
  - the workmanship
  lexicon: HALOT
  rationale: מְלָאכָה here refers to the whole construction labor. 'The work' is the
    most natural summary term in English and matches the narrative conclusion.
