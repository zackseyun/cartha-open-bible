id: EXO.40.21
reference: Exodus 40:21
source:
  edition: WLC
  text: וַ/יָּבֵ֣א אֶת הָ/אָרֹן֮ אֶל הַ/מִּשְׁכָּן֒ וַ/יָּ֗שֶׂם אֵ֚ת פָּרֹ֣כֶת הַ/מָּסָ֔ךְ
    וַ/יָּ֕סֶךְ עַ֖ל אֲר֣וֹן הָ/עֵד֑וּת כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־־׃ס
translation:
  text: He brought the ark into the tabernacle, set up the curtain screen, and screened
    the ark of the testimony, just as the LORD had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the screening curtain' or 'the veil of the screen.' The Hebrew combines
      terms for a curtain and its function as a screen.
    reason: lexical_alternative
  - marker: b
    text: Or 'covered' or 'screened off the ark of the testimony.' The Hebrew verb
      emphasizes concealing/protecting by means of the curtain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  chosen: He brought
  alternatives:
  - He brought in
  - He entered with
  lexicon: HALOT
  rationale: Hiphil of בוא here is causative, indicating that Moses caused the ark
    to come into the tabernacle; 'brought' is the natural English equivalent.
- source_word: הָאָרֹן
  chosen: the ark
  alternatives:
  - the chest
  lexicon: HALOT
  rationale: אָרוֹן in cultic context conventionally refers to the sacred ark, not
    a generic chest.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  lexicon: HALOT
  rationale: In Exodus this term refers specifically to the portable sanctuary; 'tabernacle'
    is the established and accurate English rendering.
- source_word: פָּרֹכֶת הַמָּסָךְ
  chosen: the curtain screen
  alternatives:
  - the screening curtain
  - the veil of the screen
  lexicon: HALOT
  rationale: פָּרֹכֶת is the inner curtain/veil, while מָסָךְ emphasizes its screening
    function. 'Curtain screen' preserves both elements without overloading the English.
- source_word: וַיָּשֶׂם
  chosen: set up
  alternatives:
  - placed
  - put
  lexicon: HALOT
  rationale: שׂים is broad ('put/place'), but in context of installing sanctuary furnishings,
    'set up' better reflects placement in position.
- source_word: וַיָּסֶךְ
  chosen: screened
  alternatives:
  - covered
  - shielded
  lexicon: HALOT
  rationale: From סכך/סוך in this context, the sense is to cover or screen off. 'Screened'
    matches the function of the curtain in concealing/separating the ark.
- source_word: עַל
  chosen: the ark of the testimony
  alternatives:
  - over the ark of the testimony
  - in front of the ark of the testimony
  lexicon: HALOT
  rationale: Although עַל often means 'over/on,' with the screening curtain the idiom
    can denote screening off the ark. English requires a smoother construction after
    'screened'; the object is retained directly while the spatial nuance is implicit.
- source_word: אֲרוֹן הָעֵדוּת
  chosen: the ark of the testimony
  alternatives:
  - the ark of the covenant document
  - the ark of the witness
  lexicon: HALOT
  rationale: This is the standard Exodus designation for the ark associated with the
    covenant testimony tablets. 'Testimony' preserves the Hebrew term without interpretive
    expansion.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  chosen: just as the LORD had commanded Moses
  alternatives:
  - as the LORD commanded Moses
  lexicon: HALOT
  rationale: This recurring Exodus formula marks Moses' obedience to divine instruction.
    'Just as' brings out the correspondence; 'the LORD' follows the project's default
    for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per project doctrine, the default rendering of the divine name is 'the
    LORD.'
