id: EXO.40.22
reference: Exodus 40:22
source:
  edition: WLC
  text: וַ/יִּתֵּ֤ן אֶת הַ/שֻּׁלְחָן֙ בְּ/אֹ֣הֶל מוֹעֵ֔ד עַ֛ל יֶ֥רֶךְ הַ/מִּשְׁכָּ֖ן
    צָפֹ֑נָ/ה מִ/ח֖וּץ לַ/פָּרֹֽכֶת־׃
translation:
  text: He put the table in the tent of meeting, on the north side of the tabernacle,
    outside the veil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'outside the curtain.' The Hebrew פָּרֹכֶת refers to the inner partition
      hanging that screened off the most holy place.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: He put
  alternatives:
  - he placed
  - he set
  lexicon: HALOT
  rationale: The verb נתן literally means 'give/put/set.' In this spatial setup context,
    'put' is natural modern English and accurately conveys placement without unnecessary
    stiffness.
- source_word: הַשֻּׁלְחָן
  chosen: the table
  alternatives:
  - the table of bread
  - the table of the Presence
  lexicon: HALOT
  rationale: The Hebrew here simply says 'the table' with the article. More specific
    identifications are supplied by context elsewhere, not by this verse itself, so
    the translation should not import them into the main text.
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - in the meeting tent
  lexicon: HALOT
  rationale: This is the standard and transparent rendering of the sanctuary designation
    אֹהֶל מוֹעֵד. It preserves the formal title while remaining readable.
- source_word: עַל יֶרֶךְ הַמִּשְׁכָּן
  chosen: on the ... side of the tabernacle
  alternatives:
  - at the flank of the tabernacle
  - alongside the tabernacle
  lexicon: HALOT
  rationale: יֶרֶךְ literally denotes a side or flank. In English, 'side' is the clearest
    idiomatic equivalent in a description of interior arrangement.
- source_word: צָפֹנָה
  chosen: north
  alternatives:
  - northward
  - to the north
  lexicon: HALOT
  rationale: With directional he, the term indicates the north side/location. 'North
    side' in combination with יֶרֶךְ best captures the spatial sense.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  - the dwelling
  lexicon: HALOT
  rationale: '''Tabernacle'' is the established and accurate rendering for מִשְׁכָּן
    in Exodus, especially in cultic architectural contexts. Although ''dwelling''
    is more etymologically transparent, ''tabernacle'' is clearer as the technical
    referent here.'
- source_word: מִחוּץ לַפָּרֹכֶת
  chosen: outside the veil
  alternatives:
  - outside the curtain
  lexicon: HALOT
  rationale: פָּרֹכֶת refers to the inner screening curtain/veil. 'Veil' is concise
    and traditional, while still understandable in modern English. 'Outside' correctly
    renders מִחוּץ as spatially external to that divider.
