id: EXO.40.36
reference: Exodus 40:36
source:
  edition: WLC
  text: וּ/בְ/הֵעָל֤וֹת הֶֽ/עָנָן֙ מֵ/עַ֣ל הַ/מִּשְׁכָּ֔ן יִסְע֖וּ בְּנֵ֣י יִשְׂרָאֵ֑ל בְּ/כֹ֖ל מַסְעֵי/הֶֽם׃
translation:
  text: Whenever the cloud was taken up from over the tabernacle[a], the sons of Israel would set out in all their journeys.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites” or “the children of Israel.” Hebrew “the sons of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/הֵעָלֹת
  chosen: Whenever ... was taken up
  alternatives:
  - And when ... went up
  - When ... was lifted up
  lexicon: HALOT
  rationale: The prefixed conjunction + preposition with infinitive construct of עלה introduces a temporal clause. In context it marks repeated circumstance, so 'Whenever' captures the iterative sense better than a simple one-time 'when.' The passive English 'was taken up' reflects the intransitive/passive-like sense of the cloud rising, while remaining natural in context.
- source_word: הֶעָנָן
  chosen: the cloud
  lexicon: HALOT
  rationale: Definite noun referring to the specific cloud of divine presence already established in the context.
- source_word: מֵעַל
  chosen: from over
  alternatives:
  - from above
  - off from over
  lexicon: HALOT
  rationale: The preposition expresses movement away from a position above the tabernacle; 'from over' is the most direct and idiomatic rendering.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  - the tent dwelling
  lexicon: HALOT
  rationale: Traditional and accurate rendering for מִשְׁכָּן in Exodus, referring to the portable sanctuary. 'Tabernacle' remains understandable and contextually precise.
- source_word: יִסְעוּ
  chosen: would set out
  alternatives:
  - set out
  - journeyed
  - broke camp
  lexicon: HALOT
  rationale: נסע here denotes the Israelites' departure for travel. 'Would set out' matches the imperfect's habitual sense in this narrative setting and fits the temporal clause introduced by 'Whenever.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' In keeping with gender-accurate translation philosophy, this is preserved rather than flattened to 'Israelites,' since the Hebrew expression is explicitly masculine plural though corporately representative.
- source_word: בְּכֹל מַסְעֵיהֶם
  chosen: throughout all their journeys
  alternatives:
  - in all their journeys
  - for all their stages of travel
  lexicon: HALOT
  rationale: The phrase summarizes the entirety of their travel stages. 'Throughout all their journeys' communicates the distributive sense across the whole wilderness itinerary in natural English.
