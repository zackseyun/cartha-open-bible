id: EXO.40.31
reference: Exodus 40:31
source:
  edition: WLC
  text: וְ/רָחֲצ֣וּ מִמֶּ֔/נּוּ מֹשֶׁ֖ה וְ/אַהֲרֹ֣ן וּ/בָנָ֑י/ו אֶת יְדֵי/הֶ֖ם וְ/אֶת רַגְלֵי/הֶֽם־־׃
translation:
  text: From it Moses and Aaron and his sons washed their hands and their feet[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with it'; the Hebrew more literally says 'from it,' referring to the basin.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָחֲצוּ
  chosen: washed
  alternatives:
  - would wash
  lexicon: HALOT
  rationale: Qal wayyiqtol of רחץ narrates a past action in sequence. English simple past fits the narrative context better than an iterative 'would wash' here, especially since the next verse supplies the habitual circumstance.
- source_word: מִמֶּנּוּ
  chosen: From it
  alternatives:
  - with it
  - from there
  lexicon: HALOT
  rationale: The preposition מן with 3ms suffix most naturally means 'from it,' referring back to the basin/laver. 'With it' is interpretive; the Hebrew emphasizes source rather than instrument.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: וְאַהֲרֹן
  chosen: and Aaron
  rationale: Standard English transliteration of the personal name with conjunction preserved.
- source_word: וּבָנָיו
  chosen: and his sons
  alternatives:
  - and his children
  lexicon: HALOT
  rationale: בנים with 3ms suffix refers specifically to Aaron's male offspring in priestly context. 'His sons' is more precise than the broader 'his children.' The singular suffix 'his' naturally refers to Aaron, not Moses and Aaron jointly.
- source_word: אֶת יְדֵיהֶם
  chosen: their hands
  lexicon: HALOT
  rationale: Direct-object marker plus plural construct with suffix; straightforward rendering.
- source_word: וְאֶת רַגְלֵיהֶם
  chosen: and their feet
  lexicon: HALOT
  rationale: Direct-object marker plus plural construct with suffix; straightforward rendering, preserving the paired body parts specified in the Hebrew.
