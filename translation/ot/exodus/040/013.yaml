id: EXO.40.13
reference: Exodus 40:13
source:
  edition: WLC
  text: וְ/הִלְבַּשְׁתָּ֙ אֶֽת אַהֲרֹ֔ן אֵ֖ת בִּגְדֵ֣י הַ/קֹּ֑דֶשׁ וּ/מָשַׁחְתָּ֥
    אֹת֛/וֹ וְ/קִדַּשְׁתָּ֥ אֹת֖/וֹ וְ/כִהֵ֥ן לִֽ/י־׃
translation:
  text: And you shall clothe Aaron with the holy garments, and you shall anoint him
    and consecrate him, so that he may serve as priest to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and he shall minister as priest to me.' The Hebrew verb means to function
      or serve in the priestly office.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִלְבַּשְׁתָּ
  chosen: you shall clothe
  alternatives:
  - you shall dress
  lexicon: HALOT
  rationale: 'Hiphil of לבשׁ here is causative: Moses is to put garments on Aaron.
    ''Clothe'' is slightly more formal and fits priestly investiture language better
    than ''dress.'''
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Personal name is transliterated by standard English convention, per translation
    philosophy.
- source_word: בִּגְדֵי הַקֹּדֶשׁ
  chosen: the holy garments
  alternatives:
  - the sacred garments
  - the garments of holiness
  lexicon: HALOT
  rationale: Construct phrase literally means 'garments of holiness.' In English,
    'the holy garments' is the most natural and preserves the cultic sense. 'Sacred
    garments' is possible but slightly less direct.
- source_word: וּמָשַׁחְתָּ
  chosen: you shall anoint
  lexicon: HALOT
  rationale: Standard rendering of משׁח in priestly consecration contexts; it carries
    ritual installation significance without needing expansion in the main text.
- source_word: וְקִדַּשְׁתָּ
  chosen: you shall consecrate
  alternatives:
  - you shall sanctify
  - you shall make holy
  lexicon: HALOT
  rationale: קדשׁ in the Piel here denotes setting apart for sacred service. 'Consecrate'
    best captures the ritual-appointment sense in idiomatic English; 'sanctify' is
    possible but more opaque to modern readers.
- source_word: וְכִהֵן
  chosen: so that he may serve as priest
  alternatives:
  - and he shall minister as priest
  - and he shall be priest
  lexicon: HALOT
  rationale: The verb כהן means to function or serve as a priest. Because the Hebrew
    shifts from second-person commands to a third-person result clause, 'so that he
    may serve as priest' makes the syntax and purpose relation clear in natural English.
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The preposition marks service rendered to Yahweh. 'To me' is a direct,
    formal equivalent; 'for me' is also possible, but 'to me' better reflects the
    personal dative.
