theological_decisions:
- issue: Rendering of priestly installation language
  chosen_reading: Differentiate anointing and consecration as distinct but related
    acts in the main text.
  alternative_readings:
  - Collapse the sequence into a single idea such as 'ordain him'
  rationale: 'The Hebrew presents sequential ritual actions: clothing, anointing,
    consecrating, then priestly service. Preserving each action avoids importing later
    ecclesiastical categories and maintains the text''s ritual specificity.'
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Force of וְכִהֵן לִי
  chosen_reading: 'Render as purpose/result: ''so that he may serve as priest to me.'''
  alternative_readings:
  - 'Coordinate future: ''and he shall serve as priest to me'''
  rationale: After the chain of second-person verbs, the third-person verb naturally
    expresses the outcome of the preceding actions. This preserves the Hebrew flow
    without overstating a separate command.
  doctrine_reference: Translation philosophy §1
