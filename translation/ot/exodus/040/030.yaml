id: EXO.40.30
reference: Exodus 40:30
source:
  edition: WLC
  text: וַ/יָּ֨שֶׂם֙ אֶת הַ/כִּיֹּ֔ר בֵּֽין אֹ֥הֶל מוֹעֵ֖ד וּ/בֵ֣ין הַ/מִּזְבֵּ֑חַ וַ/יִּתֵּ֥ן שָׁ֛מָּ/ה מַ֖יִם לְ/רָחְצָֽה־־׃
translation:
  text: He placed the basin between the tent of meeting and the altar[a], and put water there for washing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditional English versions often render הַכִּיּוֹר as 'laver.' The Hebrew refers to a wash basin; 'basin' is used here for clearer modern English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  chosen: He placed
  alternatives:
  - He set
  - He put
  lexicon: HALOT
  rationale: From שׂוּם, a common verb for placing or setting something in position. 'Placed' is natural modern English and fits the act of positioning the basin.
- source_word: הַכִּיֹּר
  chosen: the basin
  alternatives:
  - the laver
  lexicon: HALOT
  rationale: כִּיּוֹר refers to the large wash basin associated with tabernacle service. 'Basin' is clearer modern English; 'laver' is traditional but archaic.
- source_word: בֵּין אֹהֶל מוֹעֵד וּבֵין הַמִּזְבֵּחַ
  chosen: between the tent of meeting and the altar
  alternatives:
  - between the tabernacle of meeting and the altar
  lexicon: HALOT
  rationale: אֹהֶל מוֹעֵד is consistently rendered 'tent of meeting' as the straightforward sense of the Hebrew. The repeated בֵּין...וּבֵין is idiomatically represented by a single 'between ... and ...' in English.
- source_word: וַיִּתֵּן
  chosen: and put
  alternatives:
  - and placed
  - and set
  lexicon: HALOT
  rationale: From נָתַן, here meaning to put or place. 'Put' is idiomatic with 'water there' in English.
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - in it
  - therein
  lexicon: HALOT
  rationale: The adverb means 'there/to there.' In context it refers to the basin's location/content. English idiom prefers 'put water there,' with the object understood from context; 'in it' is interpretive and less formally tied to the adverb.
- source_word: מַיִם
  chosen: water
  lexicon: HALOT
  rationale: Straightforward rendering of the plural-form noun used as a mass noun in English.
- source_word: לְרָחְצָה
  chosen: for washing
  alternatives:
  - for washing themselves
  - for ablution
  lexicon: HALOT
  rationale: Infinitive construct of רָחַץ, 'to wash.' The Hebrew does not explicitly state the subject here, so 'for washing' preserves the purpose without adding 'the priests' or reflexive wording from context.
