id: EXO.40.4
reference: Exodus 40:4
source:
  edition: WLC
  text: וְ/הֵבֵאתָ֙ אֶת הַ/שֻּׁלְחָ֔ן וְ/עָרַכְתָּ֖ אֶת עֶרְכּ֑/וֹ וְ/הֵבֵאתָ֙ אֶת
    הַ/מְּנֹרָ֔ה וְ/הַעֲלֵיתָ֖ אֶת נֵרֹתֶֽי/הָ־־־־׃
translation:
  text: Then you shall bring in the table and arrange what belongs on it, and you
    shall bring in the lampstand and set up its lamps.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'light its lamps.' The Hebrew verb literally means 'cause to go up' and
      can refer to making the lamp flames rise.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבֵאתָ
  chosen: you shall bring in
  alternatives:
  - you shall bring
  - you shall bring inside
  lexicon: HALOT
  rationale: 'Hiphil of בוא here is causative/ingressive in tabernacle setup instructions:
    Moses is to bring the furnishing into the tent. ''Bring in'' makes the implied
    movement into the sanctuary explicit in natural English without overparaphrasing.'
- source_word: הַשֻּׁלְחָן
  chosen: the table
  alternatives:
  - the table of the bread of the Presence
  lexicon: HALOT
  rationale: The noun itself is simply 'the table.' The more specific cultic identification
    is contextually known from surrounding instructions but is not stated in this
    verse, so the simpler rendering best matches the source.
- source_word: וְעָרַכְתָּ אֶת עֶרְכּוֹ
  chosen: arrange what belongs on it
  alternatives:
  - arrange its arrangement
  - set in order its setting in order
  - arrange it
  lexicon: HALOT
  rationale: The verb ערך means to arrange/set in order, and the cognate noun ערך
    refers to the ordered arrangement associated with the table, likely its prescribed
    items. A woodenly literal 'arrange its arrangement' is unnatural in English; 'arrange
    what belongs on it' captures the idiom and the object implied by the cognate construction.
- source_word: הַמְּנֹרָה
  chosen: the lampstand
  alternatives:
  - the menorah
  lexicon: HALOT
  rationale: Although 'menorah' is a familiar transliteration, the translation philosophy
    prefers translating common nouns/titles for meaning. 'Lampstand' is the standard
    semantic equivalent and remains clear to modern readers.
- source_word: וְהַעֲלֵיתָ
  chosen: set up
  alternatives:
  - light
  - cause to go up
  - mount
  lexicon: HALOT
  rationale: Hiphil of עלה with lamps can denote causing the lamps to go up, idiomatically
    either setting them up or making the flame rise. In this tabernacle-installation
    context, before the ongoing service language of lighting is foregrounded, 'set
    up' fits the sequence of furnishing and arranging. The lighting nuance is preserved
    as an alternative.
- source_word: נֵרֹתֶיהָ
  chosen: its lamps
  alternatives:
  - its lights
  lexicon: HALOT
  rationale: נֵר denotes a lamp/lamp-flame. 'Its lamps' is the most natural rendering
    for the lampstand's individual lamps in sanctuary context.
