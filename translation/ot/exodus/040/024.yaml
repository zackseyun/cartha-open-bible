id: EXO.40.24
reference: Exodus 40:24
source:
  edition: WLC
  text: וַ/יָּ֤שֶׂם אֶת הַ/מְּנֹרָה֙ בְּ/אֹ֣הֶל מוֹעֵ֔ד נֹ֖כַח הַ/שֻּׁלְחָ֑ן עַ֛ל יֶ֥רֶךְ הַ/מִּשְׁכָּ֖ן נֶֽגְבָּ/ה־׃
translation:
  text: He placed the lampstand in the tent of meeting[a], opposite the table, on the south side of the tabernacle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'facing the table.' The Hebrew term נֹכַח can denote position opposite or in front of something.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  chosen: He placed
  alternatives:
  - he set
  - he put
  lexicon: HALOT
  rationale: The waw-consecutive verb from שׂים narrates a completed past action. 'Placed' is natural modern English and fits the careful arrangement of tabernacle furnishings better than the more generic 'put.'
- source_word: הַמְּנֹרָה
  chosen: the lampstand
  alternatives:
  - the menorah
  - the lamp
  lexicon: HALOT
  rationale: מְנוֹרָה refers to the cultic lampstand, not merely a generic lamp. 'Lampstand' translates the function clearly in English; 'menorah' is possible as a transliteration but less transparent for general readers.
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - in the meeting tent
  - in the tabernacle of meeting
  lexicon: HALOT
  rationale: This is the standard Hebrew designation for the sanctuary structure as the place of divine-human meeting. 'Tent of meeting' is the clearest established English rendering and should be kept consistently.
- source_word: נֹכַח הַשֻּׁלְחָן
  chosen: opposite the table
  alternatives:
  - in front of the table
  - facing the table
  lexicon: HALOT
  rationale: נֹכַח commonly denotes being opposite or in front of something spatially. 'Opposite' best conveys relative placement across from the table in this furnishing description.
- source_word: הַשֻּׁלְחָן
  chosen: the table
  alternatives:
  - the bread table
  lexicon: HALOT
  rationale: The Hebrew simply says 'the table.' Although context identifies it as the table associated with the bread of the Presence, the verse itself does not specify that fuller description.
- source_word: עַל יֶרֶךְ הַמִּשְׁכָּן
  chosen: on the south side of the tabernacle
  alternatives:
  - along the flank of the tabernacle
  - at the side of the tabernacle
  lexicon: HALOT
  rationale: יֶרֶךְ literally means 'side' or 'flank.' In combination with the directional term that follows, the phrase indicates location on one side of the tabernacle. Rendering the whole phrase idiomatically as 'on the south side of the tabernacle' communicates the spatial sense clearly.
- source_word: נֶגְבָּה
  chosen: south
  alternatives:
  - southward
  - to the south
  lexicon: HALOT
  rationale: The directional form specifies the southern side/location. In English, 'south side' is the most natural expression in this context.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  lexicon: HALOT
  rationale: While מִשְׁכָּן literally relates to dwelling, 'tabernacle' is the established and contextually precise term for this sanctuary structure in Exodus.
