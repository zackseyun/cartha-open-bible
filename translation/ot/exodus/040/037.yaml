id: EXO.40.37
reference: Exodus 40:37
source:
  edition: WLC
  text: וְ/אִם לֹ֥א יֵעָלֶ֖ה הֶ/עָנָ֑ן וְ/לֹ֣א יִסְע֔וּ עַד י֖וֹם הֵעָלֹתֽ/וֹ־־׃
translation:
  text: But if the cloud did not rise, they did not set out until the day it rose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'until the day of its rising.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: The conjunction plus conditional particle introduces the contrasting
    condition to the previous verse. 'But if' captures the adversative flow in English
    better than a bare 'if,' while remaining close to the Hebrew.
- source_word: לֹא
  chosen: did not
  alternatives:
  - not
  lexicon: HALOT
  rationale: Rendered with English auxiliary negation to produce natural past-time
    narrative English with the following imperfect verb.
- source_word: יֵעָלֶה
  chosen: rise
  alternatives:
  - go up
  - be taken up
  - ascend
  lexicon: HALOT
  rationale: From עלה, literally 'go up/ascend.' In context of the cloud lifting from
    above the tabernacle, 'rise' is idiomatic and clear modern English. 'Be taken
    up' would over-specify a passive nuance not required by the Niphal here.
- source_word: הֶעָנָן
  chosen: the cloud
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun referring to the cloud
    of divine presence already established in context.
- source_word: וְלֹא
  chosen: they did not
  alternatives:
  - and they did not
  lexicon: HALOT
  rationale: The conjunction continues the consequence clause. English omits an explicit
    'and' for smoother style while preserving the sequence of thought.
- source_word: יִסְעוּ
  chosen: set out
  alternatives:
  - journey
  - break camp
  - travel on
  lexicon: HALOT
  rationale: From נסע in travel-camp contexts, 'set out' is the most natural concise
    English equivalent. 'Break camp' is possible but narrower; 'journey' is less precise
    for the act of departure.
- source_word: עַד יוֹם
  chosen: until the day
  alternatives:
  - until the time
  - up to the day
  lexicon: HALOT
  rationale: A literal and natural rendering of the temporal phrase. 'Day' should
    be retained rather than generalized to 'time' because the Hebrew explicitly says
    'day.'
- source_word: הֵעָלֹתוֹ
  chosen: it rose
  alternatives:
  - its rising
  - it went up
  - its being taken up
  lexicon: HALOT
  rationale: 'Infinitive construct with 3ms suffix from עלה, literally ''its rising.''
    In English, a finite clause after ''until the day'' is more readable: ''until
    the day it rose.'' The suffix refers back to the cloud.'
