id: EXO.40.9
reference: Exodus 40:9
source:
  edition: WLC
  text: וְ/לָקַחְתָּ֙ אֶת שֶׁ֣מֶן הַ/מִּשְׁחָ֔ה וּ/מָשַׁחְתָּ֥ אֶת הַ/מִּשְׁכָּ֖ן
    וְ/אֶת כָּל אֲשֶׁר בּ֑/וֹ וְ/קִדַּשְׁתָּ֥ אֹת֛/וֹ וְ/אֶת כָּל כֵּלָ֖י/ו וְ/הָ֥יָה
    קֹֽדֶשׁ־־־־־־־׃
translation:
  text: Then you shall take the anointing oil and anoint the tabernacle and all that
    is in it, and you shall consecrate it and all its furnishings, and it shall be
    holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the oil of anointing.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'holy'; not 'most holy.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְלָקַחְתָּ
  chosen: Then you shall take
  alternatives:
  - And you shall take
  - You shall take
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional sequence functions
    as an imperative/future-like command. 'Then' captures the procedural sequence
    in context, while 'shall take' preserves the directive force.
- source_word: שֶׁמֶן הַמִּשְׁחָה
  chosen: the anointing oil
  alternatives:
  - the oil of anointing
  lexicon: HALOT
  rationale: Construct phrase naturally rendered in English as 'the anointing oil.'
    This preserves the cultic specificity without awkward literalism.
- source_word: וּמָשַׁחְתָּ
  chosen: and anoint
  alternatives:
  - and you shall anoint
  lexicon: HALOT
  rationale: Verb משׁח in cultic context means to anoint with oil for sacred designation.
    English imperative-sequence style allows omission of the repeated subject while
    retaining the command sense.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  lexicon: HALOT
  rationale: Established and contextually precise rendering for the wilderness sanctuary.
    'Dwelling place' is more etymological but less idiomatic in this cultic context.
- source_word: כָּל אֲשֶׁר בּוֹ
  chosen: all that is in it
  alternatives:
  - everything in it
  - all that is within it
  lexicon: HALOT
  rationale: This phrase comprehensively includes the contents of the tabernacle.
    'All that is in it' is clear, accurate, and slightly more formal than 'everything
    in it.'
- source_word: וְקִדַּשְׁתָּ אֹתוֹ
  chosen: and you shall consecrate it
  alternatives:
  - and sanctify it
  - and make it holy
  lexicon: HALOT
  rationale: קדשׁ in the Piel here means to set apart as holy. 'Consecrate' best conveys
    cultic dedication in readable modern English; 'sanctify' is possible but more
    ecclesiastical, and 'make it holy' is more interpretive.
- source_word: וְאֶת כָּל כֵּלָיו
  chosen: and all its furnishings
  alternatives:
  - and all its utensils
  - and all its vessels
  - and all its equipment
  lexicon: HALOT
  rationale: כֵּלִים is a broad term for articles/implements associated with the tabernacle.
    'Furnishings' fits the sanctuary context better in contemporary English than the
    narrower 'utensils' or more technical 'vessels.'
- source_word: וְהָיָה קֹדֶשׁ
  chosen: and it shall be holy
  alternatives:
  - and it shall become holy
  - and it shall be most holy
  lexicon: HALOT
  rationale: The result clause states the tabernacle's holy status after consecration.
    The Hebrew reads simply 'holy,' not 'most holy'; therefore the translation should
    not intensify beyond the source text.
