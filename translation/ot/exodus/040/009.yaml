theological_decisions:
- issue: Cultic status after anointing and consecration
  chosen_reading: The tabernacle is rendered as becoming/being set apart as holy,
    without adding a superlative degree.
  alternative_readings:
  - the tabernacle becomes most holy
  rationale: The Hebrew concludes with קֹדֶשׁ ('holy'), not קֹדֶשׁ קָדָשִׁים ('most
    holy'). The translation preserves the text's stated sanctity without importing
    a stronger theological claim from nearby passages or tradition.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
