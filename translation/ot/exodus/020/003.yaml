theological_decisions:
- issue: Meaning of עַל פָּנָי in the first commandment
  chosen_reading: before me
  alternative_readings:
  - besides me
  - in my presence
  rationale: The Hebrew idiom can denote spatial presence ('before me/in my presence') and, by extension in this covenantal context, exclusivity ('besides me'). To preserve the text's theological tension rather than collapse it into a single interpretive paraphrase, the main text uses 'before me' and the alternatives are preserved in a footnote.
