id: EXO.20.3
reference: Exodus 20:3
source:
  edition: WLC
  text: לֹֽ֣א יִהְיֶֽה לְ/ךָ֛ אֱלֹהִ֥ים אֲחֵרִ֖ים עַל פָּנָֽ/יַ־־׃
translation:
  text: You shall have no other gods before me[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'besides me' or 'in my presence.' The Hebrew literally reads 'before my face.'
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא
  chosen: no / not
  alternatives:
  - not
  lexicon: HALOT
  rationale: Standard negation introducing the prohibition. In English, the prohibition is most naturally expressed within 'shall have no' rather than a more wooden 'there shall not be for you.'
- source_word: יִהְיֶה
  chosen: shall have
  alternatives:
  - shall be
  - there shall be
  lexicon: HALOT
  rationale: Though the verb is literally 'be,' the construction לֹא יִהְיֶה לְךָ with a following noun expresses possession/existence relative to the addressee. 'You shall have' is idiomatic English and preserves the prohibitive force without awkwardness.
- source_word: לְךָ
  chosen: you
  alternatives:
  - for you
  - to you
  lexicon: HALOT
  rationale: The preposition with second masculine singular pronoun marks relation/possession. In idiomatic English, it is absorbed into 'you shall have.' Singular 'you' matches the Hebrew singular address.
- source_word: אֱלֹהִים
  chosen: gods
  alternatives:
  - divine beings
  lexicon: HALOT
  rationale: Here the plural noun is qualified by 'other' and clearly refers to rival deities. 'Gods' is the plain and conventional sense in this context.
- source_word: אֲחֵרִים
  chosen: other
  alternatives:
  - another
  - foreign
  lexicon: HALOT
  rationale: The adjective means 'other' or 'another.' With a plural noun, 'other gods' is the natural rendering. 'Foreign gods' would over-specify what the Hebrew does not explicitly state here.
- source_word: עַל פָּנָי
  chosen: before me
  alternatives:
  - besides me
  - in my presence
  - against my face
  lexicon: HALOT
  rationale: Literally 'upon/before my face.' In this commandment, 'before me' is the most natural English rendering and preserves the relational/covenantal force. 'Besides me' is a viable interpretive alternative emphasizing exclusivity; 'in my presence' emphasizes divine presence. The main text keeps the traditional and lexically defensible 'before me,' with alternatives preserved in a footnote.
