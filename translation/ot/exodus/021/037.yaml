id: EXO.21.37
reference: Exodus 21:37
source:
  edition: WLC
  text: כִּ֤י יִגְנֹֽב אִישׁ֙ שׁ֣וֹר אוֹ שֶׂ֔ה וּ/טְבָח֖/וֹ א֣וֹ מְכָר֑/וֹ חֲמִשָּׁ֣ה בָקָ֗ר יְשַׁלֵּם֙ תַּ֣חַת הַ/שּׁ֔וֹר וְ/אַרְבַּע צֹ֖אן תַּ֥חַת הַ/שֶּֽׂה־־־׃
translation:
  text: If a man steals an ox or a sheep and slaughters it or sells it[b][a], he shall repay five cattle for the ox and four sheep for the sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew שֶׂה can more broadly denote a head of small livestock, including a sheep or a goat; here 'sheep' is chosen because the restitution clause uses 'four sheep' and the verse reads most naturally that way in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'he shall make restitution.' The Hebrew verb can carry the fuller legal sense of paying compensation.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a casuistic law condition. 'If' is idiomatic in English legal style and fits the protasis-apodosis structure.
- source_word: יִגְנֹב
  chosen: steals
  alternatives:
  - takes by theft
  lexicon: HALOT
  rationale: Standard rendering of גנב in legal context; simple present in English law style communicates the conditional case.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and representative/generic. Per doctrine, gender-accurate rendering is preferred over gender-neutral where the source uses masculine generic.
- source_word: שׁוֹר
  chosen: ox
  alternatives:
  - bull
  - cattle
  lexicon: HALOT
  rationale: '''Ox'' is the conventional and sufficiently precise rendering for שׁוֹר in legal livestock contexts; ''bull'' is too sex-specific, and ''cattle'' is too collective.'
- source_word: שֶׂה
  chosen: sheep
  alternatives:
  - lamb
  - small livestock
  lexicon: HALOT
  rationale: שֶׂה can denote a head of small livestock, often sheep or goat, but here the restitution clause ends with צֹאן, making 'sheep' the most natural and coherent English rendering in this verse.
- source_word: וּטְבָחוֹ
  chosen: and slaughters it
  alternatives:
  - and butchers it
  - and kills it for food
  lexicon: HALOT
  rationale: The verb טבח refers specifically to slaughter/butchering rather than generic killing. 'Slaughters it' preserves that specificity and fits the legal context of disposing of stolen livestock.
- source_word: מְכָרוֹ
  chosen: or sells it
  alternatives:
  - or has sold it
  lexicon: HALOT
  rationale: Straightforward rendering of מכר with 3ms suffix. Present-tense English legal style matches the conditional formulation.
- source_word: חֲמִשָּׁה בָקָר
  chosen: five head of cattle
  alternatives:
  - five cattle
  - five oxen
  lexicon: HALOT
  rationale: בקר is a collective term for cattle. 'Five head of cattle' is natural modern English for counting livestock and avoids implying five specifically male oxen, while still matching the bovine category of the restitution.
- source_word: יְשַׁלֵּם
  chosen: he shall repay
  alternatives:
  - he shall make restitution
  - he shall pay
  lexicon: HALOT
  rationale: In legal context שלם denotes restitution/payment. 'Repay' is concise and clear; the object and ratios make the restitution sense explicit.
- source_word: תַּחַת
  chosen: for
  alternatives:
  - in place of
  - instead of
  lexicon: HALOT
  rationale: The preposition means substitution/replacement. 'For' is idiomatic in English restitution formulas, while the substitution sense remains clear from context.
- source_word: וְאַרְבַּע צֹאן
  chosen: and four sheep
  alternatives:
  - and four head of small livestock
  lexicon: HALOT
  rationale: צֹאן is small livestock collectively, but because the stolen animal in this case is rendered 'sheep,' 'four sheep' gives a clear and natural restitution formula in English.
