id: EXO.32.5
reference: Exodus 32:5
source:
  edition: WLC
  text: וַ/יַּ֣רְא אַהֲרֹ֔ן וַ/יִּ֥בֶן מִזְבֵּ֖חַ לְ/פָנָ֑י/ו וַ/יִּקְרָ֤א אַֽהֲרֹן֙ וַ/יֹּאמַ֔ר חַ֥ג לַ/יהוָ֖ה מָחָֽר׃
translation:
  text: When Aaron saw it[a], he built an altar before it. Then Aaron proclaimed and said, “Tomorrow will be a feast to Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “before him”; the Hebrew pronoun could grammatically refer to Aaron, though the context more likely points to the calf.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּרְא
  chosen: When Aaron saw it
  alternatives:
  - And Aaron saw
  - When Aaron saw
  lexicon: HALOT
  rationale: The verb means 'saw.' English supplies the object 'it' from context, referring to the calf just made in the preceding verse. Rendering the initial waw-consecutive as 'When' smooths the sequence and reflects the temporal force naturally in English.
- source_word: וַיִּבֶן מִזְבֵּחַ
  chosen: he built an altar
  alternatives:
  - he built an altar
  - he constructed an altar
  lexicon: HALOT
  rationale: Straightforward rendering of בנה + מזבח. 'Built an altar' is idiomatic and preserves the cultic sense.
- source_word: לְפָנָיו
  chosen: before it
  alternatives:
  - before him
  - in front of it
  lexicon: HALOT
  rationale: The pronominal suffix is masculine singular and could grammatically refer to the calf or, less likely, Aaron. Context strongly favors the altar being built before the calf/image, so 'before it' best captures the sense without importing personhood into the idol.
- source_word: וַיִּקְרָא
  chosen: made a proclamation
  alternatives:
  - proclaimed
  - called out
  lexicon: HALOT
  rationale: In this context קרא introduces a public announcement. 'Made a proclamation' brings out the formal, public nature of Aaron's action.
- source_word: חַג
  chosen: a feast
  alternatives:
  - a festival
  - a pilgrimage feast
  lexicon: HALOT
  rationale: חג denotes a festival/feast, often with cultic overtones. 'Feast' is concise and natural; 'festival' is possible but slightly less idiomatic here. 'Pilgrimage feast' would over-specify beyond the immediate context.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition ל marks dedication or relation. 'To the LORD' is a natural rendering in an announcement of worship. Per doctrine, יהוה is rendered 'the LORD.'
- source_word: מָחָר
  chosen: Tomorrow will be
  alternatives:
  - tomorrow is
  - tomorrow there will be
  lexicon: HALOT
  rationale: The Hebrew simply gives 'tomorrow' after the nominal clause 'a feast to the LORD.' English requires a copular expression; 'Tomorrow will be' makes the announcement clear and idiomatic.
