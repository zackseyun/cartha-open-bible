  text: וַ/יֹּ֗אמֶר הִנֵּ֣ה אָנֹכִי֮ כֹּרֵ֣ת בְּרִית֒ נֶ֤גֶד כָּֽל עַמְּ/ךָ֙ אֶעֱשֶׂ֣ה נִפְלָאֹ֔ת אֲשֶׁ֛ר לֹֽא נִבְרְא֥וּ בְ/כָל הָ/אָ֖רֶץ וּ/בְ/כָל הַ/גּוֹיִ֑ם וְ/רָאָ֣ה כָל הָ֠/עָם אֲשֶׁר אַתָּ֨ה בְ/קִרְבּ֜/וֹ אֶת מַעֲשֵׂ֤ה יְהוָה֙ כִּֽי נוֹרָ֣א ה֔וּא אֲשֶׁ֥ר אֲנִ֖י עֹשֶׂ֥ה עִמָּֽ/ךְ־־־־־־־־׃
translation:
  text: 'And he said, “Look, I am making a covenant. Before all your people I will do wonders such as have not been created in all the earth or among any of the nations. And all the people in whose midst you are will see the work of the LORD, for what I am doing with you is awe-inspiring.”'
