id: EXO.11.6
reference: Exodus 11:6
source:
  edition: WLC
  text: וְ/הָֽיְתָ֛ה צְעָקָ֥ה גְדֹלָ֖ה בְּ/כָל אֶ֣רֶץ מִצְרָ֑יִם אֲשֶׁ֤ר כָּמֹ֨/הוּ֙ לֹ֣א נִהְיָ֔תָה וְ/כָמֹ֖/הוּ לֹ֥א תֹסִֽף־׃
translation:
  text: And there will be a great cry throughout all the land of Egypt[a], such as has never happened before, nor will ever happen again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a great outcry' or 'great wailing.' The Hebrew צְעָקָה can denote a loud cry of distress.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  chosen: And there will be
  alternatives:
  - And there shall be
  - And it will happen that there will be
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic announcement functions futurally here. 'There will be' gives natural English while preserving the predictive force.
- source_word: צְעָקָה
  chosen: cry
  alternatives:
  - outcry
  - wailing
  lexicon: HALOT
  rationale: The noun denotes a loud cry or outcry. 'Cry' is concise and natural; 'outcry' is possible, but 'cry' better fits the following comparison clause in modern English.
- source_word: גְדֹלָה
  chosen: great
  alternatives:
  - loud
  - mighty
  lexicon: HALOT
  rationale: The adjective intensifies the magnitude of the cry. 'Great' preserves the Hebrew idiom better than the more interpretive 'loud.'
- source_word: בְּכָל אֶרֶץ מִצְרַיִם
  chosen: throughout all the land of Egypt
  alternatives:
  - in all the land of Egypt
  - through all the land of Egypt
  lexicon: HALOT
  rationale: בְּ with כָל אֶרֶץ indicates extent within the whole territory. 'Throughout all the land of Egypt' communicates comprehensive scope in idiomatic English.
- source_word: אֲשֶׁר כָּמֹהוּ לֹא נִהְיָתָה
  chosen: such as has never happened before
  alternatives:
  - the like of which has never been
  - such as never came to be
  lexicon: HALOT
  rationale: The relative clause compares this event with all prior events. Rendering the feminine verb with an impersonal English expression avoids awkwardness while preserving the superlative comparison.
- source_word: וְכָמֹהוּ לֹא תֹסִף
  chosen: nor will ever happen again
  alternatives:
  - and the like of it will not be added again
  - nor will its like continue again
  lexicon: HALOT
  rationale: Hiphil of יסף after negation idiomatically means 'not continue/add again,' i.e., 'not happen again.' 'Ever' appropriately brings out the absolute force of the comparison.
