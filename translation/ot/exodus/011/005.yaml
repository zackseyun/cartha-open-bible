theological_decisions:
- issue: Rendering of social-status term שִׁפְחָה
  chosen_reading: the slave woman
  alternative_readings:
  - the maidservant
  - the servant girl
  - the female slave
  rationale: The verse emphasizes the plague's reach from the highest royal household to the lowest enslaved laborer. Rendering the term with explicit slave language preserves that social and rhetorical contrast rather than softening it.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and contested-terms principle for bonded-status language by analogy to δοῦλος.
