id: EXO.11.5
reference: Exodus 11:5
source:
  edition: WLC
  text: וּ/מֵ֣ת כָּל בְּכוֹר֮ בְּ/אֶ֣רֶץ מִצְרַיִם֒ מִ/בְּכ֤וֹר פַּרְעֹה֙ הַ/יֹּשֵׁ֣ב עַל כִּסְא֔/וֹ עַ֚ד בְּכ֣וֹר הַ/שִּׁפְחָ֔ה אֲשֶׁ֖ר אַחַ֣ר הָ/רֵחָ֑יִם וְ/כֹ֖ל בְּכ֥וֹר בְּהֵמָֽה־־׃
translation:
  text: And every firstborn in the land of Egypt will die[a], from the firstborn of Pharaoh, who sits on his throne, to the firstborn of the slave woman who is behind the millstones, and every firstborn of the livestock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the maidservant' / 'the female slave.' The Hebrew refers to a woman in servile status; the phrase 'behind the millstones' depicts low-status grinding labor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵת
  chosen: And ... will die
  alternatives:
  - and ... shall die
  - and ... died
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic announcement is best rendered as a future in English because the verse predicts the coming plague, not a past event. 'Will die' is natural modern English and preserves the certainty of the declaration.
- source_word: כָּל
  chosen: every
  alternatives:
  - all
  lexicon: HALOT
  rationale: With singular 'firstborn,' English idiom prefers 'every firstborn' to express distributive force.
- source_word: בְּכוֹר
  chosen: firstborn
  alternatives:
  - firstborn son
  lexicon: HALOT
  rationale: The Hebrew term means 'firstborn' and is not explicitly limited to sons in the wording here, though human firstborns are in view in the examples. 'Firstborn' preserves the source term consistently and also fits the later inclusion of animal firstborn.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - throughout Egypt
  - in Egypt
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the geographic phrase as stated. 'Land of Egypt' is standard and clear.
- source_word: מִבְּכוֹר ... עַד בְּכוֹר
  chosen: from the firstborn ... to the firstborn
  alternatives:
  - from ... even to ...
  lexicon: HALOT
  rationale: This construction marks the full social range affected by the plague. 'From ... to ...' is the clearest English equivalent.
- source_word: פַּרְעֹה הַיֹּשֵׁב עַל כִּסְאוֹ
  chosen: Pharaoh, who sits on his throne
  alternatives:
  - Pharaoh who sits on his throne
  - Pharaoh sitting on his throne
  lexicon: HALOT
  rationale: The participial phrase identifies Pharaoh in his royal status. A relative clause is natural English and preserves the ongoing/state nuance of the participle.
- source_word: הַשִּׁפְחָה
  chosen: the slave woman
  alternatives:
  - the female slave
  - the maidservant
  - the servant girl
  lexicon: HALOT
  rationale: The noun denotes a female slave/maidservant. In keeping with the project's preference to reflect bonded status where salient, 'slave woman' makes the social contrast with Pharaoh explicit without archaic tone.
- source_word: אַחַר הָרֵחָיִם
  chosen: behind the millstones
  alternatives:
  - at the handmill
  - behind the handmill
  - at the mill
  lexicon: HALOT
  rationale: The phrase literally refers to being behind the grinding apparatus, i.e., in the position of grinding grain. 'Behind the millstones' preserves the concrete image of low-status labor more closely than a generalized 'at the mill.'
- source_word: וְכֹל בְּכוֹר בְּהֵמָה
  chosen: and every firstborn of the livestock
  alternatives:
  - and all the firstborn of the cattle
  - and every firstborn of the animals
  lexicon: HALOT
  rationale: בְּהֵמָה here refers broadly to domesticated animals rather than specifically cattle. 'Livestock' is the most accurate and natural collective term in modern English.
