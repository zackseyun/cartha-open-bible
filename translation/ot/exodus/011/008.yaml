id: EXO.11.8
reference: Exodus 11:8
source:
  edition: WLC
  text: וְ/יָרְד֣וּ כָל עֲבָדֶי/ךָ֩ אֵ֨לֶּה אֵלַ֜/י וְ/הִשְׁתַּֽחֲוּוּ לִ֣/י לֵ/אמֹ֗ר
    צֵ֤א אַתָּה֙ וְ/כָל הָ/עָ֣ם אֲשֶׁר בְּ/רַגְלֶ֔י/ךָ וְ/אַחֲרֵי כֵ֖ן אֵצֵ֑א וַ/יֵּצֵ֥א
    מֵֽ/עִם פַּרְעֹ֖ה בָּ/חֳרִי אָֽף־־־־־־־׃ס
translation:
  text: Then all these servants of yours will come down to me and bow down to me,
    saying, ‘Go out, you and all the people who are at your feet,’ and after that
    I will go out.” And he went out from Pharaoh in burning anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'all the people who are at your feet,' an idiom for those accompanying
      or following you.
    reason: lexical_alternative
  - marker: b
    text: Or 'your officials' for 'servants of yours'; the Hebrew term can refer to
      royal attendants in a court setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָרְדוּ
  chosen: will come down
  alternatives:
  - will go down
  - will descend
  lexicon: HALOT
  rationale: The verb ירד literally means 'go down/descend.' In context, Moses speaks
    of Pharaoh's servants coming from the palace to him; 'come down' preserves the
    directional imagery while sounding natural in English from Moses' perspective.
- source_word: עֲבָדֶיךָ
  chosen: servants of yours
  alternatives:
  - your servants
  - your officials
  lexicon: HALOT
  rationale: עבד can mean servant, slave, or court official depending on context.
    Here it refers to Pharaoh's attendants/courtiers. 'Servants of yours' keeps the
    direct address and avoids over-specifying 'officials,' though that nuance is possible.
- source_word: וְהִשְׁתַּחֲוּוּ לִי
  chosen: bow down to me
  alternatives:
  - prostrate themselves before me
  - pay homage to me
  lexicon: HALOT
  rationale: The Hishtaphel/Hishtafal form of שׁחה denotes bowing/prostration. 'Bow
    down to me' is clear modern English and preserves the physical act without importing
    worship language too strongly in this courtly setting.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and say
  - with the words
  lexicon: HALOT
  rationale: Standard rendering introducing direct speech.
- source_word: צֵא אַתָּה
  chosen: Go out, you
  alternatives:
  - Leave, you
  - Depart, you
  lexicon: HALOT
  rationale: יצא is the ordinary verb 'go out.' 'Go out' matches the Exodus motif
    and keeps the imperative force. Retaining 'you' reflects the emphatic pronoun
    אַתָּה.
- source_word: וְכָל הָעָם אֲשֶׁר בְּרַגְלֶיךָ
  chosen: and all the people who follow you
  alternatives:
  - and all the people at your feet
  - and all the people under your charge
  lexicon: HALOT
  rationale: Literally 'the people who are at your feet.' This idiom refers to those
    accompanying or following someone. 'Who follow you' communicates the sense idiomatically
    in English while avoiding an opaque literalism.
- source_word: וְאַחֲרֵי כֵן אֵצֵא
  chosen: and after that I will go out
  alternatives:
  - and afterward I will leave
  - and then I will go out
  lexicon: HALOT
  rationale: A straightforward temporal sequence. 'Go out' maintains lexical consistency
    with יצא in the surrounding context.
- source_word: וַיֵּצֵא מֵעִם פַּרְעֹה
  chosen: And he went out from Pharaoh
  alternatives:
  - Then he left Pharaoh
  - And he went out from the presence of Pharaoh
  lexicon: HALOT
  rationale: The narrative wayyiqtol resumes with Moses as subject. 'Went out from
    Pharaoh' is slightly formal but preserves the Hebrew phrasing and scene.
- source_word: בָּחֳרִי אָף
  chosen: in burning anger
  alternatives:
  - in hot anger
  - in fierce anger
  lexicon: HALOT
  rationale: The phrase literally evokes the heat/burning of anger. 'Burning anger'
    is a natural English equivalent that preserves the metaphorical intensity.
