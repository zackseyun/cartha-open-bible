theological_decisions:
- issue: Rendering of שאל in the context of Israel receiving valuables from Egyptians
  chosen_reading: ask
  alternative_readings:
  - borrow
  rationale: Although some traditional English versions use 'borrow,' the Hebrew verb itself means 'ask/request' and does not inherently include the notion of borrowing with an obligation to return. Following the stated philosophy of original-language primacy, the main text uses 'ask.' Because 'borrow' is a familiar traditional rendering and affects interpretation, it is preserved in a footnote.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
