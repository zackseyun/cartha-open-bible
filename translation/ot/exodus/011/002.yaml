id: EXO.11.2
reference: Exodus 11:2
source:
  edition: WLC
  text: דַּבֶּר נָ֖א בְּ/אָזְנֵ֣י הָ/עָ֑ם וְ/יִשְׁאֲל֞וּ אִ֣ישׁ מֵ/אֵ֣ת רֵעֵ֗/הוּ וְ/אִשָּׁה֙ מֵ/אֵ֣ת רְעוּתָ֔/הּ כְּלֵי כֶ֖סֶף וּ/כְלֵ֥י זָהָֽב־׀־׃
translation:
  text: Speak now in the hearing of the people[a], and let each man ask from his neighbor, and each woman from her neighbor, for articles of silver and articles of gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'borrow.' The Hebrew verb means 'ask' or 'request' and does not by itself specify that the items were to be returned.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֶּר
  chosen: Speak
  alternatives:
  - Tell
  - Say
  lexicon: HALOT
  rationale: Piel imperative of דבר, a direct command to address someone verbally. 'Speak' is the most straightforward English imperative here.
- source_word: נָא
  chosen: now
  alternatives:
  - please
  lexicon: HALOT
  rationale: נָא can mark entreaty or urgency. In divine speech to Moses, 'please' can sound overly deferential in English; 'now' preserves the particle's immediacy without implying politeness foreign to the context.
- source_word: בְּאָזְנֵי הָעָם
  chosen: in the hearing of the people
  alternatives:
  - to the people
  - in the ears of the people
  lexicon: HALOT
  rationale: The idiom literally involves the ears of the people, meaning publicly and audibly to them. 'In the hearing of the people' preserves the Hebrew idiom in natural English better than the flatter 'to the people.'
- source_word: וְיִשְׁאֲלוּ
  chosen: so that ... may ask
  alternatives:
  - and let them ask
  - and they shall ask
  - and they may request
  lexicon: HALOT
  rationale: The jussive/imperfect following the imperative expresses the content or intended result of the command. 'So that ... may ask' captures the directive force in smooth English. 'Ask' is preferred over 'borrow' because the Hebrew verb שאל means ask/request, and the text itself does not explicitly state return.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - every man
  - each person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine distributive, paired with 'woman' in the next clause. 'Each man' preserves the gendered and distributive force better than the gender-neutral 'each person' in this context.
- source_word: מֵאֵת רֵעֵהוּ
  chosen: from his neighbor
  alternatives:
  - from his companion
  - from his friend
  lexicon: HALOT
  rationale: רֵעַ commonly denotes a fellow, companion, or neighbor. 'Neighbor' works well in English for a fellow member of the surrounding community and is suitably broad.
- source_word: וְאִשָּׁה
  chosen: and each woman
  alternatives:
  - and every woman
  lexicon: HALOT
  rationale: The noun is singular feminine distributive, parallel to 'each man.' Supplying 'each' in English makes the distributive sense explicit.
- source_word: מֵאֵת רְעוּתָהּ
  chosen: from her neighbor
  alternatives:
  - from her companion
  - from her friend
  lexicon: HALOT
  rationale: Feminine counterpart to the previous phrase. 'Neighbor' maintains consistency with רֵעֵהוּ / רְעוּתָהּ while reflecting the feminine possessive.
- source_word: כְּלֵי כֶסֶף
  chosen: articles of silver
  alternatives:
  - silver vessels
  - objects of silver
  - silver jewelry
  lexicon: HALOT
  rationale: כְּלִי is a broad term for articles, vessels, or objects. 'Articles of silver' preserves breadth without over-specifying the type of item.
- source_word: וּכְלֵי זָהָב
  chosen: and articles of gold
  alternatives:
  - and gold vessels
  - and objects of gold
  - and gold jewelry
  lexicon: HALOT
  rationale: Parallel to the previous phrase; 'articles of gold' keeps the same broad semantic range and stylistic balance.
