id: RUT.1.3
reference: Ruth 1:3
source:
  edition: WLC
  text: וַ/יָּ֥מָת אֱלִימֶ֖לֶךְ אִ֣ישׁ נָעֳמִ֑י וַ/תִּשָּׁאֵ֥ר הִ֖יא וּ/שְׁנֵ֥י בָנֶֽי/הָ׃
translation:
  text: Then Elimelech[a], Naomi’s husband, died, and she was left, and her two sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And Elimelech, the husband of Naomi, died; and she remained, she and her two sons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: Then ... died
  alternatives:
  - And ... died
  - Now ... died
  lexicon: HALOT
  rationale: The wayyiqtol advances the narrative. English often renders this naturally with 'then' rather than a bare 'and' to reflect sequential development without sounding wooden.
- source_word: אֱלִימֶלֶךְ
  chosen: Elimelech
  rationale: 'Personal name is transliterated according to the translation philosophy: translate titles, transliterate names.'
- source_word: אִישׁ נָעֳמִי
  chosen: Naomi’s husband
  alternatives:
  - the husband of Naomi
  - Naomi’s man
  lexicon: HALOT
  rationale: אִישׁ in construct with a woman's name commonly means 'husband' in context, not merely 'man.' 'Naomi’s husband' is the clear idiomatic English equivalent and preserves the marital relationship explicitly conveyed by the Hebrew.
- source_word: וַתִּשָּׁאֵר
  chosen: she was left
  alternatives:
  - she remained
  - she was left behind
  lexicon: HALOT
  rationale: The verb שׁאר here conveys remaining after loss. 'She was left' captures the bereavement context more naturally than the flatter 'she remained.' Passive English also reflects the stative/result sense in context.
- source_word: הִיא
  chosen: she
  alternatives:
  - she herself
  lexicon: HALOT
  rationale: The explicit pronoun adds emphasis in Hebrew. English can convey this sufficiently with the subject 'she' without overtranslating to 'she herself,' which would sound marked beyond the narrative need.
- source_word: וּשְׁנֵי בָנֶיהָ
  chosen: with her two sons
  alternatives:
  - and her two sons
  - she and her two sons remained
  lexicon: HALOT
  rationale: The phrase identifies who remained with Naomi. In idiomatic English, 'she was left with her two sons' expresses the Hebrew sense compactly and clearly. 'With' is implied by the construction in context, though not represented by a separate Hebrew preposition.
