id: RUT.3.17
reference: Ruth 3:17
source:
  edition: WLC
  text: וַ/תֹּ֕אמֶר שֵׁשׁ הַ/שְּׂעֹרִ֥ים הָ/אֵ֖לֶּה נָ֣תַן לִ֑/י כִּ֚י אָמַ֣ר אַל
    תָּב֥וֹאִי רֵיקָ֖ם אֶל חֲמוֹתֵֽ/ךְ־־־׃
translation:
  text: She said, “He gave me these six measures of barley, for he said, ‘Do not go
    to your mother-in-law empty-handed.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'these six barley[s].' The specific unit is not stated,
      so 'measures' is supplied in English for clarity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: She said
  alternatives:
  - And she said
  lexicon: HALOT
  rationale: Narrative wayyiqtol of אמר introducing Ruth's report to Naomi. English
    can omit the conjunction for natural style without loss of sense.
- source_word: שֵׁשׁ
  chosen: six
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: הַשְּׂעֹרִים הָאֵלֶּה
  chosen: these ... of barley
  alternatives:
  - these six barleys
  - these six portions of barley
  lexicon: HALOT
  rationale: שְׂעֹרִים means 'barley.' In English, with a numeral and demonstrative
    in this context, an implied unit is natural; 'these six measures of barley' communicates
    the sense idiomatically while preserving the demonstrative 'these.'
- source_word: נָתַן לִי
  chosen: he gave me
  alternatives:
  - he has given me
  lexicon: HALOT
  rationale: Qal perfect 3ms with 1cs object in reported speech, naturally rendered
    as simple past in English narrative.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the gift. 'For' fits the explanatory relation
    in direct speech.
- source_word: אָמַר
  chosen: he said
  alternatives:
  - he had said
  lexicon: HALOT
  rationale: Simple past works well in English within the quotation; pluperfect is
    possible but not necessary.
- source_word: אַל תָּבֹאִי
  chosen: Do not go
  alternatives:
  - Do not come
  lexicon: HALOT
  rationale: Negative jussive/imperfect 2fs of בוא. Because the motion is toward Naomi
    from Ruth's perspective, 'go' is more natural in English when Boaz speaks to Ruth
    about returning to her mother-in-law.
- source_word: רֵיקָם
  chosen: empty-handed
  alternatives:
  - empty
  - with nothing
  lexicon: HALOT
  rationale: Adverb meaning 'empty, empty-handed.' The idiomatic English expression
    makes explicit that the emptiness concerns returning without a gift or provision.
- source_word: אֶל חֲמוֹתֵךְ
  chosen: to your mother-in-law
  alternatives:
  - to your husband's mother
  lexicon: HALOT
  rationale: חֲמוֹת is specifically 'mother-in-law.' The preposition אֶל is naturally
    rendered 'to' here.
