id: RUT.3.5
reference: Ruth 3:5
source:
  edition: WLC
  text: וַ/תֹּ֖אמֶר אֵלֶ֑י/הָ כֹּ֛ל אֲשֶׁר תֹּאמְרִ֥י אֶֽעֱשֶֽׂה־׃
translation:
  text: And she said to her[a], “All that you say, I will do.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Everything that you say, I will do.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: And she said
  alternatives:
  - Then she said
  - So she said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר advances the narrative with a simple past. 'And she said' preserves the Hebrew narrative flow without overinterpreting the conjunction.
- source_word: אֵלֶיהָ
  chosen: to her
  alternatives:
  - unto her
  lexicon: HALOT
  rationale: Preposition אֶל with 3fs suffix indicates indirect address. 'To her' is natural modern English and accurately reflects the relational direction.
- source_word: כֹּל אֲשֶׁר
  chosen: All that
  alternatives:
  - Everything that
  - Whatever
  lexicon: HALOT
  rationale: The combination expresses totality with a relative clause. 'All that' is slightly more formal and closely tracks the Hebrew structure while remaining readable.
- source_word: תֹּאמְרִי
  chosen: you say
  alternatives:
  - you tell me
  - you will say
  lexicon: HALOT
  rationale: Qal imperfect 2fs of אמר in this context functions as direct speech referring to Naomi's instruction. English present 'you say' is idiomatic after 'all that'; 'you tell me' adds an object not explicit in the Hebrew, and future 'you will say' is possible but less natural here.
- source_word: אֶעֱשֶׂה
  chosen: I will do
  alternatives:
  - I will do it
  - I shall do
  lexicon: HALOT
  rationale: Qal imperfect 1cs of עשה expresses Ruth's resolve/intention. 'I will do' is the most direct rendering; adding 'it' is interpretive since no explicit object appears in Hebrew.
