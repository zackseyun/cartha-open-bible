id: RUT.3.2
reference: Ruth 3:2
source:
  edition: WLC
  text: וְ/עַתָּ֗ה הֲ/לֹ֥א בֹ֨עַז֙ מֹֽדַעְתָּ֔/נוּ אֲשֶׁ֥ר הָיִ֖ית אֶת נַעֲרוֹתָ֑י/ו
    הִנֵּה ה֗וּא זֹרֶ֛ה אֶת גֹּ֥רֶן הַ/שְּׂעֹרִ֖ים הַ/לָּֽיְלָה־־־׃
translation:
  text: And now, is not Boaz our relative, with whose young women you have been? Look,
    he is winnowing barley at the threshing floor tonight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our kinsman.' The Hebrew term can denote a relative or clan connection,
      not merely an acquaintance.
    reason: lexical_alternative
  - marker: b
    text: Or 'with whose servant girls you have been.' The Hebrew can refer to Boaz's
      female workers or attendants.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Discourse marker introducing Naomi's next step in the plan; 'And now'
    preserves the connective ו plus temporal עתה more fully than simple 'Now.'
- source_word: הֲלֹא
  chosen: is not
  alternatives:
  - has not
  - surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Is not' is the
    most natural English equivalent here.
- source_word: מֹדַעְתָּנוּ
  chosen: our relative
  alternatives:
  - our kinsman
  - our acquaintance
  lexicon: HALOT
  rationale: The noun denotes one known through kinship/clan connection in this context,
    not mere acquaintance. 'Our relative' is clear modern English; 'kinsman' is possible
    but more archaic.
- source_word: אֲשֶׁר הָיִית אֶת נַעֲרוֹתָיו
  chosen: with whose young women you have been
  alternatives:
  - with whose servant girls you have been
  - with whose maidens you have been
  lexicon: HALOT
  rationale: Retains the relative clause and the sense of Ruth's association with
    Boaz's female workers. 'Young women' is natural and avoids importing servile nuance
    too strongly where the term can denote female attendants/workers broadly in context.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Marks attention to the immediate circumstance. 'Look' is readable modern
    English and preserves the deictic force without archaic tone.
- source_word: זֹרֶה
  chosen: is winnowing
  alternatives:
  - winnows
  - will be winnowing
  lexicon: HALOT
  rationale: The participle describes current or imminent activity. English progressive
    best conveys the scene Naomi is pointing out.
- source_word: גֹּרֶן הַשְּׂעֹרִים
  chosen: the barley threshing floor
  alternatives:
  - the threshing floor of barley
  - the barley at the threshing floor
  lexicon: HALOT
  rationale: Construct chain most naturally rendered in English as 'the barley threshing
    floor,' i.e., the threshing floor where barley is being processed. This is more
    idiomatic than a wooden genitive rendering.
- source_word: הַלָּיְלָה
  chosen: tonight
  alternatives:
  - this night
  - at night
  lexicon: HALOT
  rationale: Adverbial accusative of time. 'Tonight' is the most natural contemporary
    English equivalent.
