theological_decisions:
- issue: Rendering גֹאֵל in a legal-kinship context
  chosen_reading: redeemer
  alternative_readings:
  - kinsman-redeemer
  - guardian-redeemer
  rationale: The verse concerns Israelite family redemption obligations, not abstract
    spiritual redemption. 'Redeemer' preserves the lexical core while remaining readable;
    more specific explanatory renderings are possible but somewhat interpretive, so
    they are preserved in a footnote rather than placed in the main text.
  doctrine_reference: Translation philosophy §§1, 5
