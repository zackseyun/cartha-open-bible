id: RUT.3.12
reference: Ruth 3:12
source:
  edition: WLC
  text: וְ/עַתָּה֙ כִּ֣י אָמְנָ֔ם כִּ֥י אם גֹאֵ֖ל אָנֹ֑כִי וְ/גַ֛ם יֵ֥שׁ גֹּאֵ֖ל קָר֥וֹב
    מִמֶּֽ/נִּי׃
translation:
  text: And now, it is true that I am a redeemer, yet there is also a redeemer closer
    than I.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kinsman-redeemer' or 'guardian-redeemer'; the Hebrew term refers to
      a near relative with recognized family redemption responsibilities.
    reason: lexical_alternative
  - marker: b
    text: '''Closer'' here means more closely related in terms of family redemption
      rights, not merely physically nearer.'
    reason: cultural_note
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Introduces the next point in Boaz's speech with a natural discourse transition.
    'And now' preserves the connective ו plus the temporal/discourse marker עתה.
- source_word: כִּי אָמְנָם
  chosen: it is true that
  alternatives:
  - indeed
  - certainly
  - truly
  lexicon: HALOT
  rationale: The combination marks an affirmation or concession. 'It is true that'
    captures the confirmatory force in idiomatic English better than a bare 'indeed'
    in this sentence.
- source_word: כִּי אִם
  chosen: that
  alternatives:
  - indeed
  - surely
  lexicon: HALOT
  rationale: In this construction following כִּי אָמְנָם, the phrase functions to
    introduce the affirmed content rather than a strong adversative. Rendering simply
    as 'that' avoids overtranslation while preserving the sense.
- source_word: גֹאֵל
  chosen: redeemer
  alternatives:
  - kinsman-redeemer
  - guardian-redeemer
  lexicon: HALOT
  rationale: The term denotes a family redeemer with legal obligations in Israelite
    kinship structures. 'Redeemer' is concise and readable in the main text; more
    expansive alternatives are interpretive and can be preserved in a note.
- source_word: אָנֹכִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: 'The independent pronoun adds explicitness/emphasis. English requires
    the copular expression with the predicate noun: ''I am a redeemer.'''
- source_word: וְגַם
  chosen: yet there is also
  alternatives:
  - and also there is
  - but there is also
  lexicon: HALOT
  rationale: The clause adds a qualifying fact that limits Boaz's immediate claim.
    'Yet there is also' brings out the concessive force in context while retaining
    the additive sense of גַם.
- source_word: יֵשׁ
  chosen: there is
  alternatives:
  - there exists
  lexicon: HALOT
  rationale: Standard existential rendering in English.
- source_word: קָרוֹב מִמֶּנִּי
  chosen: closer than I
  alternatives:
  - nearer than I am
  - more closely related than I am
  lexicon: HALOT
  rationale: The phrase indicates greater proximity in kinship, not merely spatial
    nearness. 'Closer than I' is natural English and fits the legal-family context;
    the fuller interpretive sense can be noted in a footnote.
