id: RUT.3.3
reference: Ruth 3:3
source:
  edition: WLC
  text: וְ/רָחַ֣צְתְּ וָ/סַ֗כְתְּ וְ/שַׂ֧מְתְּ שמלת/ך עָלַ֖יִ/ךְ ו/ירדתי הַ/גֹּ֑רֶן
    אַל תִּוָּדְעִ֣י לָ/אִ֔ישׁ עַ֥ד כַּלֹּת֖/וֹ לֶ/אֱכֹ֥ל וְ/לִ/שְׁתּֽוֹת׀־׃
translation:
  text: Wash yourself, anoint yourself, and put your cloak on; then go down to the
    threshing floor. Do not make yourself known to the man until he has finished eating
    and drinking.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bathe yourself.' The Hebrew verb can denote washing or bathing the body.
    reason: lexical_alternative
  - marker: b
    text: Or 'put on your garment.' The Hebrew refers generally to an outer garment
      or cloak; some translations interpret this more specifically as festive or best
      clothing.
    reason: lexical_alternative
  - marker: c
    text: 'The Hebrew consonantal form is unusual here; in context it is commonly
      understood as Naomi''s continued instruction to Ruth: ''go down to the threshing
      floor.'''
    reason: textual_variant
lexical_decisions:
- source_word: וְרָחַצְתְּ
  chosen: Wash yourself
  alternatives:
  - Bathe yourself
  lexicon: HALOT
  rationale: רחץ denotes washing/bathing the body. 'Wash yourself' is natural modern
    English and preserves the reflexive sense implied by the context and addressee.
- source_word: וָסַכְתְּ
  chosen: anoint yourself
  alternatives:
  - put on perfume
  - oil yourself
  lexicon: HALOT
  rationale: סוך commonly refers to anointing with oil/ointment. 'Anoint yourself'
    is more textually precise than the more interpretive 'put on perfume,' while still
    readable.
- source_word: וְשַׂמְתְּ שִׂמְלָתֵךְ עָלַיִךְ
  chosen: put your cloak on
  alternatives:
  - put on your garment
  - put on your best clothes
  lexicon: HALOT
  rationale: שִׂמְלָה is a garment/cloak. 'Cloak' fits the likely outer garment sense
    and avoids the interpretive expansion 'best clothes,' which is not explicit in
    the Hebrew.
- source_word: וירדתי הַגֹּרֶן
  chosen: then go down to the threshing floor
  alternatives:
  - and go down to the threshing floor
  lexicon: HALOT
  rationale: The ketiv-like form in the consonantal text is commonly understood in
    context as a 2fs instruction ('go down'), matching Naomi's sequence of imperatives
    to Ruth. 'Then' smooths the command sequence in English without adding meaning.
    'Threshing floor' is the standard sense of גֹּרֶן.
- source_word: אַל תִּוָּדְעִי
  chosen: Do not make yourself known
  alternatives:
  - Do not reveal yourself
  - Do not let yourself be recognized
  lexicon: HALOT
  rationale: The Niphal of ידע here is reflexive/passive in force. 'Do not make yourself
    known' preserves the Hebrew idiom and Ruth's active responsibility to remain unnoticed.
- source_word: לָאִישׁ
  chosen: to the man
  alternatives:
  - to anyone
  - to Boaz
  lexicon: HALOT
  rationale: The singular with article-like force in context points to the specific
    man at the threshing floor, namely Boaz, but the Hebrew says 'the man,' not his
    name. This preserves the source wording.
- source_word: עַד כַּלֹּתוֹ לֶאֱכֹל וְלִשְׁתּוֹת
  chosen: until he has finished eating and drinking
  alternatives:
  - until he finishes eating and drinking
  - until he is done eating and drinking
  lexicon: HALOT
  rationale: כלה plus infinitives expresses completion of the actions. 'Has finished'
    communicates the temporal sense clearly in idiomatic English.
