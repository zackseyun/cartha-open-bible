theological_decisions:
- issue: Whether the verse should imply sexual activity in Ruth's actions
  chosen_reading: Retain the literal description without making sexual implications
    explicit in the main text.
  alternative_readings:
  - Translate more interpretively to suggest seduction or sexual contact
  rationale: The narrative is intentionally restrained here. The Hebrew describes
    Ruth approaching quietly, uncovering Boaz's feet, and lying down. Because the
    text does not explicitly describe sexual activity in this verse, the translation
    preserves the ambiguity rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
