id: RUT.3.7
reference: Ruth 3:7
source:
  edition: WLC
  text: וַ/יֹּ֨אכַל בֹּ֤עַז וַ/יֵּשְׁתְּ֙ וַ/יִּיטַ֣ב לִבּ֔/וֹ וַ/יָּבֹ֕א לִ/שְׁכַּ֖ב
    בִּ/קְצֵ֣ה הָ/עֲרֵמָ֑ה וַ/תָּבֹ֣א בַ/לָּ֔ט וַ/תְּגַ֥ל מַרְגְּלֹתָ֖י/ו וַ/תִּשְׁכָּֽב׃
translation:
  text: And Boaz ate and drank, and his heart was merry, and he went to lie down at
    the end of the grain heap. Then she came quietly, uncovered his feet, and lay
    down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "his heart was glad" or "he was in good spirits." The Hebrew idiom indicates
      cheerfulness, but does not by itself require drunkenness.
    reason: lexical_alternative
  - marker: b
    text: Literally, "uncovered his feet." Some interpreters understand this as a
      simple literal action; others see possible suggestive overtones. The Hebrew
      wording itself remains restrained and does not explicitly describe sexual activity.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאכַל
  chosen: ate
  alternatives:
  - had eaten
  lexicon: HALOT
  rationale: Simple wayyiqtol narrative verb; rendered with straightforward past tense
    in English narrative style.
- source_word: וַיֵּשְׁתְּ
  chosen: drank
  lexicon: HALOT
  rationale: Direct rendering of the verb 'to drink'; no contextual reason to expand
    or soften.
- source_word: וַיִּיטַב לִבּוֹ
  chosen: his heart was merry
  alternatives:
  - his heart was glad
  - he was in good spirits
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of the heart becoming good/pleasant.
    'His heart was merry' preserves the idiomatic sense of cheerfulness without over-interpreting
    it as drunkenness or mere emotional calm.
- source_word: וַיָּבֹא לִשְׁכַּב
  chosen: he went to lie down
  alternatives:
  - he came to lie down
  - he went to sleep
  lexicon: HALOT
  rationale: Although בוא is literally 'come,' in English narrative this motion is
    naturally rendered 'went' from the narrator's perspective. 'Lie down' is preferable
    to 'sleep' because the Hebrew infinitive refers to reclining/lying down, not explicitly
    sleeping.
- source_word: בִּקְצֵה הָעֲרֵמָה
  chosen: at the end of the grain heap
  alternatives:
  - at the edge of the heap
  - at the far end of the heap
  lexicon: HALOT
  rationale: קצה denotes extremity/edge/end. עֲרֵמָה is a heap, here contextually
    a grain heap at the threshing floor. 'Grain heap' makes the scene clear in natural
    English.
- source_word: בַלָּט
  chosen: quietly
  alternatives:
  - secretly
  - stealthily
  lexicon: HALOT
  rationale: The term denotes secrecy or quietness of approach. 'Quietly' fits the
    immediate action without importing a stronger moral nuance than the text states.
- source_word: וַתְּגַל מַרְגְּלֹתָיו
  chosen: uncovered his feet
  alternatives:
  - uncovered the place of his feet
  - uncovered his lower legs
  lexicon: HALOT
  rationale: The phrase is literally 'uncovered his feet.' This should be preserved
    in the main text because it is the plain lexical sense and avoids prematurely
    resolving interpretive debate about whether the expression is purely literal or
    carries suggestive overtones.
- source_word: וַתִּשְׁכָּב
  chosen: lay down
  alternatives:
  - lay there
  lexicon: HALOT
  rationale: Straightforward rendering of the verb 'to lie down.' It should not be
    paraphrased sexually, since the verse itself does not explicitly state sexual
    activity.
