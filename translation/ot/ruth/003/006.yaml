id: RUT.3.6
reference: Ruth 3:6
source:
  edition: WLC
  text: וַ/תֵּ֖רֶד הַ/גֹּ֑רֶן וַ/תַּ֕עַשׂ כְּ/כֹ֥ל אֲשֶׁר צִוַּ֖תָּ/ה חֲמוֹתָֽ/הּ־׃
translation:
  text: So she went down to the threshing floor and did according to all that her
    mother-in-law had commanded her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Then she went down to the threshing floor and did exactly as her mother-in-law
      had instructed her."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶד
  chosen: went down
  alternatives:
  - went down to
  - descended
  lexicon: HALOT
  rationale: From ירד, a common verb of downward movement. 'Went down' is natural
    modern English and preserves the directional sense without sounding overly formal
    like 'descended.' The destination is supplied by the following noun phrase.
- source_word: הַגֹּרֶן
  chosen: the threshing floor
  alternatives:
  - the threshing-floor
  lexicon: HALOT
  rationale: גורן refers to the threshing floor, the agricultural processing area
    central to the scene. The definite article is preserved with 'the.'
- source_word: וַתַּעַשׂ
  chosen: and did
  alternatives:
  - and acted
  - and carried out
  lexicon: HALOT
  rationale: עשה is broad ('do, make'). Here 'did' best matches the idiom with the
    following phrase 'according to all that...' and keeps the narration straightforward.
- source_word: כְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - just as everything that
  - exactly as
  lexicon: HALOT
  rationale: This construction expresses conformity to prior instruction. 'According
    to all that' is a clear, fairly formal English equivalent that preserves the comprehensiveness
    of כֹל.
- source_word: צִוַּתָּה
  chosen: had commanded
  alternatives:
  - commanded
  - had instructed
  lexicon: HALOT
  rationale: צוה commonly means 'command.' The pluperfect 'had commanded' fits English
    narrative sequence, since Naomi's instruction preceded Ruth's action. 'Instructed'
    is possible but softens the force of the Hebrew verb.
- source_word: חֲמוֹתָהּ
  chosen: her mother-in-law
  lexicon: HALOT
  rationale: The kinship term specifically means 'her mother-in-law,' referring to
    Naomi. The possessive suffix is preserved by 'her.'
- source_word: וַ
  chosen: So
  alternatives:
  - And
  - Then
  lexicon: HALOT
  rationale: The initial waw continues the narrative. 'So' gives smooth English narrative
    flow while still signaling sequence/result from the previous verse; 'And' would
    also be possible but is less idiomatic in modern English at the start of a sentence.
