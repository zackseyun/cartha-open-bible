theological_decisions:
- issue: Potential sexual ambiguity in the instruction to uncover Boaz's feet and
    lie down
  chosen_reading: Retain the literal wording without making the action explicitly
    sexual or explicitly innocent in the main text.
  alternative_readings:
  - Interpret as a euphemism for sexual approach
  - Interpret as a purely practical act of waking Boaz
  rationale: The Hebrew wording carries narrative ambiguity, and the translation should
    preserve that tension rather than resolve it. The main text therefore stays close
    to the lexical sense, while a footnote notes the possible broader nuance of 'feet.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
