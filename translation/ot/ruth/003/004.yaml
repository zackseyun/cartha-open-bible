id: RUT.3.4
reference: Ruth 3:4
source:
  edition: WLC
  text: וִ/יהִ֣י בְ/שָׁכְב֗/וֹ וְ/יָדַ֨עַתְּ֙ אֶת הַ/מָּקוֹם֙ אֲשֶׁ֣ר יִשְׁכַּב שָׁ֔ם
    וּ/בָ֛את וְ/גִלִּ֥ית מַרְגְּלֹתָ֖י/ו ו/שכבתי וְ/הוּא֙ יַגִּ֣יד לָ֔/ךְ אֵ֖ת אֲשֶׁ֥ר
    תַּעַשִֽׂי/ן־־׃
translation:
  text: Then, when he lies down, note the place where he lies. Then go, uncover his
    feet, and lie down, and he will tell you what you should do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'the place by his feet' or 'the lower part of him'; the Hebrew
      expression may refer more specifically to the area around his feet than to the
      feet alone.
    reason: lexical_alternative
  - marker: b
    text: The written Hebrew form reads 'and I lay down,' but the context and traditional
      reading understand it as 'and you lie down.'
    reason: textual_variant
lexical_decisions:
- source_word: וִיהִי
  chosen: Then
  alternatives:
  - And it shall be
  - And let it be
  - And when it happens
  lexicon: HALOT
  rationale: Here the prefixed form of היה introduces the next step in a sequence
    with temporal force rather than standing alone as a full existential clause. 'Then'
    gives natural English progression while preserving the narrative instruction.
- source_word: בְשָׁכְבוֹ
  chosen: when he lies down
  alternatives:
  - when he has lain down
  - at his lying down
  lexicon: HALOT
  rationale: The infinitive construct with preposition ב marks time. 'When he lies
    down' is idiomatic and fits the instruction sequence.
- source_word: וְיָדַעַתְּ
  chosen: note
  alternatives:
  - observe
  - find out
  - know
  lexicon: HALOT
  rationale: ידע literally means 'know,' but in context Naomi instructs Ruth to pay
    attention to and identify the location. 'Note' is concise, natural English that
    reflects the practical sense without over-paraphrasing.
- source_word: אֶת־הַמָּקוֹם
  chosen: the place
  alternatives:
  - the spot
  - the location
  lexicon: HALOT
  rationale: מקום is straightforwardly 'place.' 'Place' is the most neutral and consistent
    rendering.
- source_word: אֲשֶׁר יִשְׁכַּב שָׁם
  chosen: where he lies
  alternatives:
  - where he will lie down there
  - where he lies down
  lexicon: HALOT
  rationale: The relative clause identifies the sleeping place. English omits the
    adverb 'there' as redundant. 'Where he lies' is smooth and accurate.
- source_word: וּבָאת
  chosen: Then go
  alternatives:
  - and go
  - then come
  lexicon: HALOT
  rationale: בוא often means 'come/go' depending on viewpoint. In English, from Naomi's
    perspective as instruction for Ruth's movement, 'go' is the natural rendering.
    'Then' preserves the sequential waw.
- source_word: וְגִלִּית
  chosen: uncover
  alternatives:
  - reveal
  - uncover the covering of
  lexicon: HALOT
  rationale: גלה in this stem means to uncover. 'Uncover' is direct and avoids interpretive
    expansion.
- source_word: מַרְגְּלֹתָיו
  chosen: his feet
  alternatives:
  - the place of his feet
  - his lower legs
  lexicon: HALOT
  rationale: The noun can denote feet or the area around them. In this narrative context,
    'his feet' is the standard and most defensible rendering, while the broader nuance
    is preserved in a footnote because the expression may refer to the lower part
    of his body/bed area.
- source_word: וְשָׁכָבְתִּי
  chosen: and lie down
  alternatives:
  - and you shall lie down
  - and lay yourself down
  lexicon: HALOT
  rationale: 'The ketiv/qere issue yields the expected 2fs sense in context, matching
    Naomi''s instructions to Ruth. English should reflect the intended addressee:
    Ruth is to lie down. A footnote preserves the textual detail.'
- source_word: וְהוּא יַגִּיד לָךְ
  chosen: and he will tell you
  alternatives:
  - and he himself will tell you
  - and he will explain to you
  lexicon: HALOT
  rationale: נגד in Hiphil commonly means 'tell, declare.' 'Tell you' is natural and
    sufficient; the explicit pronoun adds slight emphasis but need not be separately
    marked in English.
- source_word: אֵת אֲשֶׁר תַּעֲשִׂין
  chosen: what you should do
  alternatives:
  - what you will do
  - what you are to do
  lexicon: HALOT
  rationale: The clause expresses the action Boaz will instruct Ruth to take. 'What
    you should do' captures the directive force in idiomatic English better than a
    bare future.
