  chosen_reading: a woman of noble character
  alternative_readings:
  - a worthy woman
  - a woman of valor
  - an excellent woman
  rationale: This is not a doctrinally contested term in the DOCTRINE table, but it
    carries interpretive weight. The chosen rendering avoids flattening the phrase
    to mere morality or domesticity while also avoiding an overly martial English
    expression in this context. It preserves Ruth's public reputation for worth, strength,
    and integrity.
