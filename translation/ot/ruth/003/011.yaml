id: RUT.3.11
reference: Ruth 3:11
source:
  edition: WLC
  text: וְ/עַתָּ֗ה בִּתִּ/י֙ אַל תִּ֣ירְאִ֔י כֹּ֥ל אֲשֶׁר תֹּאמְרִ֖י אֶֽעֱשֶׂה לָּ֑/ךְ
    כִּ֤י יוֹדֵ֨עַ֙ כָּל שַׁ֣עַר עַמִּ֔/י כִּ֛י אֵ֥שֶׁת חַ֖יִל אָֽתְּ־־־־׃
translation:
  text: And now, my daughter, do not fear. All that you say, I will do for you, for
    all the gate of my people knows that you are a woman of noble character.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'all my people at the gate know.' The 'gate' refers
      to the public place of civic recognition and legal proceedings.
    reason: cultural_note
  - marker: b
    text: Or 'a worthy woman,' 'an excellent woman,' or 'a woman of valor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּתִּי
  chosen: my daughter
  alternatives:
  - my child
  lexicon: HALOT
  rationale: Literal familial address is retained. In context Boaz uses a warm, protective
    form of address, but not necessarily biological daughter; 'my daughter' is the
    conventional and source-near rendering.
- source_word: אַל תִּירְאִי
  chosen: do not fear
  alternatives:
  - do not be afraid
  lexicon: HALOT
  rationale: Imperative + negative particle expresses prohibition/encouragement. 'Do
    not fear' is slightly more formal and concise, preserving the Hebrew wording closely
    while remaining natural English.
- source_word: כֹּל אֲשֶׁר תֹּאמְרִי אֶעֱשֶׂה לָּךְ
  chosen: All that you say, I will do for you
  alternatives:
  - Everything you ask, I will do for you
  - Whatever you say, I will do for you
  lexicon: HALOT
  rationale: The clause is broad and direct. 'All that you say' preserves the verbal
    form 'say' rather than interpreting it more narrowly as 'ask,' though the context
    implies request.
- source_word: שַׁעַר
  chosen: gate
  alternatives:
  - town gate
  - assembly at the gate
  lexicon: HALOT
  rationale: Literally 'gate.' In ancient Israel the gate was the public place of
    civic recognition and legal witness. The literal term is kept in the main text,
    with its representative social sense left implicit.
- source_word: כָּל שַׁעַר עַמִּי
  chosen: all the gate of my people
  alternatives:
  - all my people at the gate
  - everyone among my people
  lexicon: HALOT
  rationale: The Hebrew is idiomatic, using 'gate' metonymically for the community/public
    forum. The chosen rendering stays close to the source while remaining intelligible,
    though somewhat marked; an alternative is preserved in a footnote for clarity.
- source_word: אֵשֶׁת חַיִל
  chosen: a woman of noble character
  alternatives:
  - a worthy woman
  - an excellent woman
  - a woman of valor
  lexicon: HALOT
  rationale: חַיִל can denote strength, worth, competence, wealth, or valor. For Ruth,
    the phrase commends moral worth and capable excellence, not merely social status.
    'A woman of noble character' communicates this well in modern English, while alternatives
    are worth preserving because of the phrase's richness and its resonance with Proverbs
    31.
