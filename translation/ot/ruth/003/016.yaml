id: RUT.3.16
reference: Ruth 3:16
source:
  edition: WLC
  text: וַ/תָּבוֹא֙ אֶל חֲמוֹתָ֔/הּ וַ/תֹּ֖אמֶר מִי אַ֣תְּ בִּתִּ֑/י וַ/תַּ֨גֶּד לָ֔/הּ
    אֵ֛ת כָּל אֲשֶׁ֥ר עָֽשָׂה לָ֖/הּ הָ/אִֽישׁ־־־־־׃
translation:
  text: When she came to her mother-in-law, she said, “Who are you, my daughter?”
    Then she told her all that the man had done for her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'How did it go with you, my daughter?' The Hebrew
      reads literally, 'Who are you, my daughter?' and may imply a question about
      Ruth's changed status or the outcome of her meeting.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתָּבוֹא
  chosen: When she came
  alternatives:
  - And she came
  - So she came
  lexicon: HALOT
  rationale: Wayyiqtol of בוא advances the narrative. 'When she came' gives natural
    English temporal flow into Naomi's speech while preserving the event sequence.
- source_word: אֶל חֲמוֹתָהּ
  chosen: to her mother-in-law
  alternatives:
  - unto her mother-in-law
  lexicon: HALOT
  rationale: חֲמוֹת denotes mother-in-law specifically; the pronominal suffix is Ruth's,
    so 'her mother-in-law' is precise and natural.
- source_word: וַתֹּאמֶר
  chosen: she said
  alternatives:
  - and she said
  lexicon: HALOT
  rationale: Standard narrative speech introducer. English omits repeated 'and' for
    readability without loss of meaning.
- source_word: מִי אַתְּ
  chosen: Who are you
  alternatives:
  - How did it go with you
  - Who are you now
  lexicon: HALOT
  rationale: The Hebrew is literally 'Who are you?' Addressed by Naomi to Ruth after
    the nighttime encounter, it may imply inquiry about Ruth's status or outcome,
    but the plain lexical sense should be retained in the main text. Interpretive
    expansions are better preserved in a footnote.
- source_word: בִּתִּי
  chosen: my daughter
  alternatives:
  - my child
  lexicon: HALOT
  rationale: A tender familial form of address from Naomi to Ruth. 'My daughter' preserves
    both the literal kinship-style idiom and the warmth of the address.
- source_word: וַתַּגֶּד לָהּ
  chosen: Then she told her
  alternatives:
  - And she told her
  - Then she reported to her
  lexicon: HALOT
  rationale: נגד in the Hiphil commonly means to tell/report. 'Then she told her'
    is idiomatic and fits the narrative sequence.
- source_word: אֵת כָּל אֲשֶׁר
  chosen: all that
  alternatives:
  - everything that
  - all which
  lexicon: HALOT
  rationale: This construction introduces the full content of Ruth's report. 'All
    that' is concise and natural.
- source_word: עָשָׂה לָהּ הָאִישׁ
  chosen: the man had done for her
  alternatives:
  - the man had done to her
  - the man did for her
  lexicon: HALOT
  rationale: עָשָׂה with ל can mean 'do for' in a beneficial sense here, referring
    to Boaz's actions on Ruth's behalf. 'For her' avoids the misleading English implication
    of harm that 'to her' could suggest. 'The man' reflects the Hebrew wording, which
    withholds Boaz's name in this clause.
