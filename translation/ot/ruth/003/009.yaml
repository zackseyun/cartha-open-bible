id: RUT.3.9
reference: Ruth 3:9
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר מִי אָ֑תּ וַ/תֹּ֗אמֶר אָנֹכִי֙ ר֣וּת אֲמָתֶ֔/ךָ וּ/פָרַשְׂתָּ֤
    כְנָפֶ֨/ךָ֙ עַל אֲמָ֣תְ/ךָ֔ כִּ֥י גֹאֵ֖ל אָֽתָּה־־׃
translation:
  text: He said, “Who are you?” And she said, “I am Ruth, your servant. Spread your
    wing over your servant, for you are a redeemer.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Spread the corner of your garment over your servant.' The Hebrew word
      can mean 'wing' or the edge of a garment, and the wording may intentionally
      suggest both protection and a marriage claim.
    reason: lexical_alternative
  - marker: b
    text: Or 'a kinsman-redeemer,' that is, a family redeemer with a recognized obligation
      to act on behalf of a relative.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲמָתֶךָ / אֲמָתְךָ
  chosen: your servant
  alternatives:
  - your maidservant
  - your female servant
  lexicon: HALOT
  rationale: אמה denotes a female servant/slave. 'Your servant' is natural modern
    English and avoids archaic 'maidservant,' while still preserving Ruth's humble
    self-designation. The repeated use is kept consistent within the verse.
- source_word: וּפָרַשְׂתָּ
  chosen: Spread
  alternatives:
  - Stretch out
  - Spread out
  lexicon: HALOT
  rationale: The verb פרשׂ here carries the sense of extending or spreading something
    over another. 'Spread' is idiomatic with 'wing' in English and preserves the concrete
    imagery.
- source_word: כְנָפֶךָ
  chosen: your wing
  alternatives:
  - the corner of your garment
  - your covering
  lexicon: HALOT
  rationale: כנף literally means 'wing' and can also refer to the extremity of a garment.
    In this context the wording intentionally evokes both marriage-covering imagery
    and protective-wing imagery. Following original-language primacy and preserving
    theological/literary tension, the main text keeps the literal 'wing,' with the
    garment-related sense preserved in a footnote.
- source_word: עַל
  chosen: over
  alternatives:
  - upon
  lexicon: HALOT
  rationale: '''Over'' is the natural modern English equivalent in this construction
    and fits the image of covering/protection.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: כִּי introduces Ruth's reason for the request. 'For' is concise and suitably
    formal without sounding archaic in dialogue.
- source_word: גֹאֵל
  chosen: a redeemer
  alternatives:
  - kinsman-redeemer
  - family redeemer
  - guardian-redeemer
  lexicon: HALOT
  rationale: גאל refers to one who has the legal/familial role of redemption within
    kinship structures. 'Redeemer' preserves the key lexical and theological term
    without importing an explanatory compound into the main text. Because the kinship
    nuance is important in Ruth, an explanatory alternative is preserved in a footnote.
- source_word: אָנֹכִי רוּת
  chosen: I am Ruth
  alternatives:
  - I am Ruth
  lexicon: HALOT
  rationale: The verbless Hebrew identification is naturally rendered in English with
    'I am.' Ruth's name is transliterated per translation philosophy.
- source_word: מִי אָתּ
  chosen: Who are you?
  lexicon: HALOT
  rationale: A straightforward interrogative identifying the speaker; no expansion
    is warranted.
