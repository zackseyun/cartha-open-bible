theological_decisions:
- issue: Metaphorical force of 'your wing' in Ruth's request
  chosen_reading: Retain the literal image 'your wing' in the main text while allowing
    the marital/garment implication to remain implicit.
  alternative_readings:
  - Render as 'the corner of your garment' to foreground marriage symbolism
  rationale: 'The Hebrew likely carries deliberate double resonance: literal garment
    imagery in the immediate scene and broader covenant/protection imagery associated
    with ''wing.'' Preserving ''wing'' best maintains the text''s literary and theological
    richness without over-resolving the metaphor.'
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it; §1 Original-language primacy over translation tradition
- issue: Rendering of גֹאֵל
  chosen_reading: Use 'redeemer' in the main text, with kinship nuance explained in
    a footnote.
  alternative_readings:
  - kinsman-redeemer
  - family redeemer
  - guardian-redeemer
  rationale: The Hebrew term is lexically broader than any single English compound
    and carries legal, familial, and restorative connotations. 'Redeemer' preserves
    the core term; the footnote supplies the family-law nuance important to Ruth without
    overloading the dialogue.
  doctrine_reference: Translation philosophy §5 Consistency of key terms, or documented
    exception; §6 Readable modern English, not archaic or academic
