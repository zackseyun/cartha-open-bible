theological_decisions:
- issue: Speaker identification for ויאמר
  chosen_reading: Render the clause as 'And he said' without naming Boaz in the main
    text.
  alternative_readings:
  - Render explicitly as 'Then Boaz said' for clarity
  rationale: The narrative context strongly suggests Boaz, but the Hebrew text leaves
    the subject implicit. To avoid importing specificity beyond the source, the main
    text keeps the pronoun while allowing readers to infer Boaz from context.
  doctrine_reference: Translation philosophy §1, §3
- issue: Moral/sexual implication of Ruth lying at Boaz's feet
  chosen_reading: Use the straightforward spatial wording 'she lay at his feet' without
    euphemistic or accusatory expansion.
  alternative_readings:
  - Use a more interpretive euphemism implying sexual relations
  - Use explanatory wording to deny any sexual implication
  rationale: The verse itself describes location and timing, not an explicit sexual
    act or an explicit denial of one. The translation should preserve the narrative
    tension without resolving debated implications beyond what the Hebrew states.
  doctrine_reference: Translation philosophy §3
