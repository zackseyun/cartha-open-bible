id: RUT.3.14
reference: Ruth 3:14
source:
  edition: WLC
  text: וַ/תִּשְׁכַּ֤ב מרגלת/ו עַד הַ/בֹּ֔קֶר וַ/תָּ֕קָם ב/טרום יַכִּ֥יר אִ֖ישׁ אֶת
    רֵעֵ֑/הוּ וַ/יֹּ֨אמֶר֙ אַל יִוָּדַ֔ע כִּי בָ֥אָה הָ/אִשָּׁ֖ה הַ/גֹּֽרֶן־־־־׃
translation:
  text: So she lay at his feet until morning, and she got up before one man could
    recognize another. And he said, “Do not let it be known that the woman came to
    the threshing floor.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “before a man could recognize his companion.” The Hebrew idiom means
      before people could distinguish one another in the low light.
    reason: lexical_alternative
  - marker: b
    text: The speaker is most likely Boaz from the context, though the Hebrew text
      says only, “And he said.”
    reason: alternative_reading
lexical_decisions:
- source_word: מרגלתיו
  chosen: at his feet
  alternatives:
  - at the place of his feet
  - at his foot-end
  lexicon: HALOT
  rationale: The noun refers to the place of the feet/legs, idiomatically the foot-end
    of where Boaz was lying. 'At his feet' is natural English and preserves the scene
    without over-specifying furniture or posture.
- source_word: בטרום
  chosen: before
  alternatives:
  - while it was still before
  - before the time when
  lexicon: HALOT
  rationale: The preposition/adverb marks prior time. 'Before' gives the temporal
    force cleanly in modern English.
- source_word: יכיר
  chosen: could recognize
  alternatives:
  - recognized
  - could identify
  lexicon: HALOT
  rationale: The Hiphil of ידע/נכר here carries the sense of recognizing or identifying.
    Rendering with 'could recognize' fits the subordinate temporal clause and the
    potential sense before daylight made recognition possible.
- source_word: איש את רעהו
  chosen: one man could recognize another
  alternatives:
  - a man could recognize his companion
  - one person could recognize another
  lexicon: HALOT
  rationale: Literally 'a man his companion/fellow.' The idiom means before people
    could distinguish one another in the dim light. 'One man...another' preserves
    the masculine singular wording more closely than a gender-neutral paraphrase,
    in line with the gender-accurate policy, while still sounding idiomatic.
- source_word: אל יוודע
  chosen: Do not let it be known
  alternatives:
  - Let it not be known
  - It must not be known
  lexicon: HALOT
  rationale: The negative jussive/passive expresses a prohibition or desired non-disclosure.
    'Do not let it be known' is natural English and preserves the passive sense.
- source_word: האשה
  chosen: the woman
  alternatives:
  - a woman
  lexicon: HALOT
  rationale: The article is present in Hebrew. 'The woman' reflects the definite form
    and likely points to Ruth as a specific known woman in the situation, not merely
    any woman.
- source_word: הגרן
  chosen: the threshing floor
  alternatives:
  - the threshing-floor
  lexicon: HALOT
  rationale: Standard rendering of the agricultural location; this is the plain sense
    of the noun.
- source_word: ויאמר
  chosen: And he said
  alternatives:
  - Then he said
  - And Boaz said
  lexicon: HALOT
  rationale: The masculine singular subject is implicit. Given the immediate context,
    Boaz is the likely speaker, but the Hebrew says only 'and he said,' so the translation
    preserves the textual wording without adding the name.
