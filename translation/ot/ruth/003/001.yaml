id: RUT.3.1
reference: Ruth 3:1
source:
  edition: WLC
  text: וַ/תֹּ֥אמֶר לָ֖/הּ נָעֳמִ֣י חֲמוֹתָ֑/הּ בִּתִּ֞/י הֲ/לֹ֧א אֲבַקֶּשׁ לָ֛/ךְ מָנ֖וֹחַ אֲשֶׁ֥ר יִֽיטַב לָֽ/ךְ־־׃
translation:
  text: Then Naomi her mother-in-law said to her[a], “My daughter, should I not seek a resting place for you, that it may go well with you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rest,' 'security,' or 'a home.' In context Naomi is seeking Ruth's settled well-being, likely through marriage, but the Hebrew says 'resting place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English narrative flow while preserving sequence better than a bare 'and.'
- source_word: נָעֳמִי
  chosen: Naomi
  rationale: Personal names are transliterated by standard English convention per translation philosophy.
- source_word: חֲמוֹתָהּ
  chosen: her mother-in-law
  lexicon: HALOT
  rationale: The construct with 3fs suffix identifies Naomi's relationship to Ruth. Rendering explicitly clarifies the referent in English.
- source_word: בִּתִּי
  chosen: My daughter
  alternatives:
  - My dear daughter
  lexicon: HALOT
  rationale: Literal vocative of affection/familial address. 'My daughter' preserves both tenderness and social relationship without adding interpretive warmth beyond the Hebrew.
- source_word: הֲלֹא
  chosen: should I not
  alternatives:
  - ought I not
  - shall I not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Should I not' is idiomatic modern English and preserves the rhetorical force.
- source_word: אֲבַקֶּשׁ
  chosen: seek
  alternatives:
  - look for
  - seek out
  lexicon: HALOT
  rationale: בקש commonly means 'seek.' This keeps the wording broad enough to include Naomi's active planning without over-specifying the action.
- source_word: מָנוֹחַ
  chosen: a resting place
  alternatives:
  - rest
  - security
  - a home
  lexicon: HALOT
  rationale: The noun denotes rest or a place/state of settled security. In Ruth's context it points toward settled marital provision, but 'a resting place' preserves the metaphor and avoids importing 'husband' directly into the text. Alternative nuances are worth preserving in a footnote.
- source_word: אֲשֶׁר יִיטַב לָךְ
  chosen: that it may go well with you
  alternatives:
  - which will be good for you
  - so that it may be well for you
  lexicon: HALOT
  rationale: This clause expresses beneficial outcome. 'That it may go well with you' is natural English and preserves the idiomatic sense of well-being rather than merely abstract goodness.
