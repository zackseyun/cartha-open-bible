id: RUT.3.8
reference: Ruth 3:8
source:
  edition: WLC
  text: וַ/יְהִי֙ בַּ/חֲצִ֣י הַ/לַּ֔יְלָה וַ/יֶּחֱרַ֥ד הָ/אִ֖ישׁ וַ/יִּלָּפֵ֑ת וְ/הִנֵּ֣ה אִשָּׁ֔ה שֹׁכֶ֖בֶת מַרְגְּלֹתָֽי/ו׃
translation:
  text: And it happened at midnight that the man trembled and turned himself[a], and behold[b], a woman was lying at his feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turned himself'; the Hebrew verb is rare and may suggest he shifted, twisted, or bent himself in surprise.
    reason: lexical_alternative
  - marker: b
    text: Literally 'at his feet'; the Hebrew expression may also refer more broadly to the area of his feet or lower legs.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing the next event. 'And it happened' preserves the Hebrew narrative progression without archaic English.
- source_word: בַּחֲצִי הַלַּיְלָה
  chosen: at midnight
  alternatives:
  - in the middle of the night
  - at the middle of the night
  lexicon: HALOT
  rationale: The phrase literally means 'at the half/middle of the night.' 'At midnight' is the most natural concise English equivalent and accurately conveys the time reference.
- source_word: וַיֶּחֱרַד
  chosen: trembled
  alternatives:
  - was startled
  - shuddered
  lexicon: HALOT
  rationale: חרד can denote trembling from fear, shock, or sudden disturbance. 'Trembled' preserves the bodily reaction without over-interpreting the precise emotion; 'was startled' is possible but more interpretive.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the husband
  - the male
  lexicon: HALOT
  rationale: איש here refers specifically to Boaz as a male person in the narrative. 'The man' is the plain contextual sense and preserves the Hebrew wording.
- source_word: וַיִּלָּפֵת
  chosen: turned himself
  alternatives:
  - bent forward
  - twisted himself
  - reached out
  lexicon: HALOT
  rationale: This rare verb is difficult, but in context it describes Boaz's bodily movement upon waking and discovering Ruth. 'Turned himself' is a cautious rendering that fits the immediate context without importing a more specific motion than the text requires.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: הנה marks sudden realization or surprise. 'And behold' preserves the narrative force and discovery element, though slightly elevated in tone; it remains readable and transparent.
- source_word: אִשָּׁה
  chosen: a woman
  alternatives:
  - a wife
  - a female
  lexicon: HALOT
  rationale: The noun means 'woman' in this context. 'Wife' would be contextually incorrect here.
- source_word: שֹׁכֶבֶת
  chosen: was lying
  alternatives:
  - lay
  - was lying down
  lexicon: HALOT
  rationale: The participle depicts Ruth's state at the moment of discovery. 'Was lying' captures the ongoing posture better than the simple preterite 'lay.'
- source_word: מַרְגְּלֹתָיו
  chosen: at his feet
  alternatives:
  - at the place of his feet
  - by his feet
  lexicon: HALOT
  rationale: The noun can refer literally to feet or the place at the feet/legs. In this scene, 'at his feet' is the most natural English rendering and avoids unnecessary euphemistic expansion while remaining faithful to the text.
