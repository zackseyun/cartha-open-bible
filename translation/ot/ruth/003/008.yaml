theological_decisions:
- issue: Potential sexual/euphemistic overreading of the scene
  chosen_reading: Render the description straightforwardly as Ruth lying at Boaz's feet.
  alternative_readings:
  - Render more euphemistically as 'at the place of his feet/legs' to foreground possible innuendo
  rationale: The Hebrew wording itself does not explicitly state a sexual act. The translation should preserve the narrative tension without importing a doctrinal or moral judgment the text does not make. A footnote can acknowledge the lexical nuance of the location term without making it the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it; §1: Original-language primacy over translation tradition.'
