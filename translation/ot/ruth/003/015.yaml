theological_decisions:
- issue: Subject of the final clause וַיָּבֹא הָעִיר
  chosen_reading: Then he went into the city
  alternative_readings:
  - Then she went into the city
  rationale: This is not a doctrinal issue but a notable interpretive/textual one.
    The Masoretic Text has a masculine verb, so the draft follows the Hebrew as given.
    Because the broader narrative flow leads many translators to prefer 'she went,'
    that alternative is preserved in a footnote for transparency.
  doctrine_reference: Translation philosophy §1, §3
