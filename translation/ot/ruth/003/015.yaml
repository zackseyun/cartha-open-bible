id: RUT.3.15
reference: Ruth 3:15
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר הָ֠בִי הַ/מִּטְפַּ֧חַת אֲשֶׁר עָלַ֛יִ/ךְ וְ/אֶֽחֳזִי בָ֖/הּ וַ/תֹּ֣אחֶז
    בָּ֑/הּ וַ/יָּ֤מָד שֵׁשׁ שְׂעֹרִים֙ וַ/יָּ֣שֶׁת עָלֶ֔י/הָ וַ/יָּבֹ֖א הָ/עִֽיר־־־׃
translation:
  text: Then he said, “Bring the cloak that is on you and hold it out.” So she held
    it out, and he measured six measures of barley and put it on her. Then he went
    into the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''six barley''; the unit is not stated, so ''measures'' is supplied
      for clear English.'
    reason: lexical_alternative
  - marker: b
    text: Some ancient versions and many translations read, 'Then she went into the
      city.' The Masoretic Text reads, 'Then he went into the city.'
    reason: textual_variant
lexical_decisions:
- source_word: הָבִי
  chosen: Bring
  alternatives:
  - Give here
  - Bring here
  lexicon: HALOT
  rationale: Imperative feminine singular from יהב/הב in context of requesting Ruth
    to present an item. 'Bring' is natural modern English and fits the following command
    to hold it out.
- source_word: הַמִּטְפַּחַת
  chosen: the cloak
  alternatives:
  - the shawl
  - the wrap
  - the outer garment
  lexicon: HALOT
  rationale: The noun denotes a garment or wrap used here as a container for grain.
    'Cloak' communicates a substantial outer garment better than the more delicate
    'veil' found in some older translations, which can mislead modern readers.
- source_word: וְאֶחֳזִי בָהּ
  chosen: and hold it out
  alternatives:
  - and grasp it
  - and hold it
  lexicon: HALOT
  rationale: The verb אחז means to seize or hold. In this context Ruth is to take
    hold of the garment so Boaz can pour grain into it; 'hold it out' makes the situational
    sense explicit without over-paraphrasing.
- source_word: וַיָּמָד
  chosen: he measured
  alternatives:
  - he measured out
  lexicon: HALOT
  rationale: Standard sense of מדד/מודד in a provisioning context. 'Measured' preserves
    the deliberate action of apportioning grain.
- source_word: שֵׁשׁ שְׂעֹרִים
  chosen: six measures of barley
  alternatives:
  - six portions of barley
  - six of barley
  - six seahs of barley
  lexicon: HALOT
  rationale: The Hebrew literally says 'six barleys,' with the unit omitted. English
    requires some supplied sense. 'Six measures of barley' is the clearest minimal
    expansion, while avoiding the overly specific 'seahs,' since the unit is not stated
    in the text.
- source_word: וַיָּשֶׁת עָלֶיהָ
  chosen: and put it on her
  alternatives:
  - and placed it on her
  - and set it upon her
  lexicon: HALOT
  rationale: The singular object likely refers collectively to the measured barley
    load placed on Ruth. 'Put it on her' is idiomatic and reflects the physical loading
    of the grain onto her garment/person for carrying.
- source_word: וַיָּבֹא הָעִיר
  chosen: Then he went into the city
  alternatives:
  - Then she went into the city
  lexicon: HALOT
  rationale: The consonantal text with masculine verb naturally reads 'he went into
    the city.' Although some versions and manuscripts read 'she went,' the MT points
    to a masculine subject, so the main text follows the Hebrew source while preserving
    the alternative in a footnote.
