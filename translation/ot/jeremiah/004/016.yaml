id: JER.4.16
reference: Jeremiah 4:16
source:
  edition: WLC
  text: הַזְכִּ֣ירוּ לַ/גּוֹיִ֗ם הִנֵּה֙ הַשְׁמִ֣יעוּ עַל יְרוּשָׁלִַ֔ם נֹצְרִ֥ים בָּאִ֖ים מֵ/אֶ֣רֶץ הַ/מֶּרְחָ֑ק וַֽ/יִּתְּנ֛וּ עַל עָרֵ֥י יְהוּדָ֖ה קוֹלָֽ/ם־־׃
translation:
  text: 'Declare it to the nations: ‘Look[a], proclaim it concerning Jerusalem: Watchers are coming from a distant land, and they raise their voice against the cities of Judah.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'besiegers' for 'watchers'; the Hebrew term literally denotes those who watch or keep guard, but in context it may refer to hostile forces surrounding a city.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַזְכִּירוּ
  chosen: Declare it
  alternatives:
  - Remind
  - Mention
  - Make known
  lexicon: HALOT
  rationale: Hiphil imperative plural of זכר can mean cause to remember/mention/declare. In this warning context, an imperative of public announcement fits best. 'Declare it' is idiomatic and preserves the force of issuing notice.
- source_word: לַגּוֹיִם
  chosen: to the nations
  alternatives:
  - among the nations
  - to the peoples
  - to the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם normally means nations/peoples. 'To the nations' follows the prefixed ל and avoids importing the later NT-loaded sense 'Gentiles'.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle marking attention. 'Look' gives natural modern English while retaining the urgent demonstrative force.
- source_word: הַשְׁמִיעוּ עַל יְרוּשָׁלִַם
  chosen: proclaim it concerning Jerusalem
  alternatives:
  - announce over Jerusalem
  - make it heard against Jerusalem
  - report to Jerusalem
  lexicon: HALOT
  rationale: Hiphil of שמע means cause to hear, announce, proclaim. With עַל plus place name here, 'concerning Jerusalem' best captures the sense of an announcement about the city, while leaving room for the hostile content made explicit in the next clause.
- source_word: נֹצְרִים
  chosen: Watchers
  alternatives:
  - Besiegers
  - Guards
  - Watchmen
  lexicon: HALOT
  rationale: From נצר, those who watch/keep guard. In Jeremiah 4:16–17 the context is hostile invaders surrounding Judah, so some render 'besiegers.' However, the lexical sense is more literally 'watchers/watchmen,' and the military hostility is already conveyed by the following clause 'against the cities of Judah.' The more transparent rendering preserves the Hebrew image without over-paraphrasing.
- source_word: בָּאִים
  chosen: are coming
  alternatives:
  - come
  - are arriving
  lexicon: HALOT
  rationale: Participle expressing imminent action. English progressive conveys the ongoing approach naturally.
- source_word: מֵאֶרֶץ הַמֶּרְחָק
  chosen: from a distant land
  alternatives:
  - from a far country
  - from a remote land
  lexicon: HALOT
  rationale: The phrase denotes geographical remoteness. 'Distant land' is clear modern English and preserves the singular collective sense.
- source_word: וַיִּתְּנוּ ... קוֹלָם
  chosen: and they raise their voice
  alternatives:
  - and they lift up their voice
  - and they give forth their voice
  - and they shout
  lexicon: HALOT
  rationale: Hebrew idiom 'give one's voice' means utter loudly, cry out, raise the voice. 'Raise their voice' is idiomatic English that preserves the image without becoming wooden.
- source_word: עַל עָרֵי יְהוּדָה
  chosen: against the cities of Judah
  alternatives:
  - over the cities of Judah
  - concerning the cities of Judah
  lexicon: HALOT
  rationale: In this military-threat context, עַל carries hostile force. 'Against' makes explicit the adversative sense implied by the invaders' cry.
