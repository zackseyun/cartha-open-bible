translation:
  text: 'Thus says the LORD of hosts, the God of Israel: You and your wives have spoken with your mouths and fulfilled it with your hands, saying, ‘We will surely carry out our vows that we have vowed, to burn incense to the Queen of Heaven and to pour out drink offerings to her.’ Go ahead, confirm your vows and carry out your vows.'
