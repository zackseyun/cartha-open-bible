id: JER.7.8
reference: Jeremiah 7:8
source:
  edition: WLC
  text: הִנֵּ֤ה אַתֶּם֙ בֹּטְחִ֣ים לָ/כֶ֔ם עַל דִּבְרֵ֖י הַ/שָּׁ֑קֶר לְ/בִלְתִּ֖י הוֹעִֽיל־׃
translation:
  text: Look[b][a], you are trusting in deceptive words to no benefit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lying words' or 'false words.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to no avail.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces attention emphatically. 'Look' preserves the deictic force in readable modern English better than the more archaic 'Behold.'
- source_word: בֹּטְחִים
  chosen: are trusting
  alternatives:
  - trust
  - are relying
  lexicon: HALOT
  rationale: The participle conveys ongoing or characteristic action; 'are trusting' reflects that aspect more explicitly than simple present 'trust,' while remaining natural English.
- source_word: לָכֶם
  chosen: you are trusting
  alternatives:
  - for yourselves
  - to your own hurt
  lexicon: HALOT
  rationale: The dative pronoun is idiomatically bound up with the verb here. English does not require an explicit separate rendering, and folding it into the clause avoids awkwardness. The reflexive nuance is not strong enough to force 'for yourselves' in the main text.
- source_word: עַל
  chosen: in
  alternatives:
  - 'on'
  - upon
  lexicon: HALOT
  rationale: With בטח, English idiom prefers 'trust in' rather than the more wooden 'trust on/upon,' while preserving the sense of reliance.
- source_word: דִּבְרֵי הַשָּׁקֶר
  chosen: deceptive words
  alternatives:
  - lying words
  - false words
  lexicon: HALOT
  rationale: The phrase denotes words characterized by falsehood. 'Deceptive words' is natural modern English and captures the misleading force; 'lying words' is possible but less idiomatic in contemporary usage.
- source_word: לְבִלְתִּי הוֹעִיל
  chosen: that cannot profit
  alternatives:
  - to no avail
  - that do not benefit
  - for no good
  lexicon: HALOT
  rationale: The construction expresses result/purpose with negated usefulness. 'That cannot profit' preserves the verbal idea of benefit/usefulness and echoes prophetic diction without sounding archaic.
