theological_decisions:
- issue: Moral anthropology in 'their evil heart'
  chosen_reading: Retain the moral description as stated without expanding it into a broader doctrinal claim about total depravity or covenant status.
  alternative_readings:
  - Paraphrasing as 'sinful nature'
  - Expanding to 'their hearts were wholly evil'
  rationale: The verse explicitly describes the heart as evil and stubborn; the translation should preserve that moral judgment without importing later theological formulations not stated in the text.
  doctrine_reference: Preserve theological tension rather than resolve it; never import doctrinal claims the text does not make.
