id: JER.34.7
reference: Jeremiah 34:7
source:
  edition: WLC
  text: וְ/חֵ֣יל מֶֽלֶךְ בָּבֶ֗ל נִלְחָמִים֙ עַל יְר֣וּשָׁלִַ֔ם וְ/עַ֛ל כָּל עָרֵ֥י יְהוּדָ֖ה הַ/נּֽוֹתָר֑וֹת אֶל לָכִישׁ֙ וְ/אֶל עֲזֵקָ֔ה כִּ֣י הֵ֗נָּה נִשְׁאֲר֛וּ בְּ/עָרֵ֥י יְהוּדָ֖ה עָרֵ֥י מִבְצָֽר־־־־־׃פ
translation:
  text: while the army of the king of Babylon was fighting against Jerusalem and against all the remaining cities of Judah[a], against Lachish and against Azekah, for these alone remained among the cities of Judah as fortified cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'namely, Lachish and Azekah.' The Hebrew identifies the specific remaining cities of Judah still under siege.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵיל
  chosen: army
  alternatives:
  - force
  - military force
  lexicon: HALOT
  rationale: In this military context חֵיל refers to an armed force rather than wealth or strength in a general sense. 'Army' is the most natural and precise English rendering here.
- source_word: נִלְחָמִים
  chosen: was fighting
  alternatives:
  - were fighting
  - was waging war
  lexicon: HALOT
  rationale: The participle denotes ongoing military action. Although the Hebrew form is plural, English commonly treats a collective noun like 'army' as singular, so 'was fighting' is idiomatic while preserving the durative sense.
- source_word: הַנּוֹתָרוֹת
  chosen: the remaining
  alternatives:
  - that were left
  - surviving
  lexicon: HALOT
  rationale: This adjectival participle modifies 'cities of Judah' and indicates those not yet fallen. 'Remaining' is concise and natural.
- source_word: אֶל לָכִישׁ וְאֶל עֲזֵקָה
  chosen: that is, Lachish and Azekah
  alternatives:
  - namely, Lachish and Azekah
  - including Lachish and Azekah
  lexicon: HALOT
  rationale: After 'all the remaining cities of Judah,' the phrase identifies which cities are in view. Since the following clause explains that only these remained, an appositional clarifying rendering ('that is') best captures the sense.
- source_word: כִּי הֵנָּה
  chosen: for these alone
  alternatives:
  - for they
  - because these
  lexicon: HALOT
  rationale: 'The feminine pronoun refers back to the two named cities. ''These alone'' makes explicit the restrictive force implied by the context: only these remained.'
- source_word: נִשְׁאֲרוּ
  chosen: remained
  alternatives:
  - were left
  lexicon: HALOT
  rationale: The verb states continued survival/existence of these cities in contrast to others already taken.
- source_word: עָרֵי מִבְצָר
  chosen: fortified cities
  alternatives:
  - fortress cities
  - strongholds
  lexicon: HALOT
  rationale: This construct phrase denotes cities with defensive fortifications. 'Fortified cities' is standard, clear English and avoids the slightly less natural 'fortress cities'.
- source_word: בְּעָרֵי יְהוּדָה
  chosen: among the cities of Judah
  alternatives:
  - in the cities of Judah
  lexicon: HALOT
  rationale: Given the contrastive sense—these two remained out of the cities of Judah—'among' better conveys the partitive nuance than a simple locative 'in'.
