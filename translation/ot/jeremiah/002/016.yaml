id: JER.2.16
reference: Jeremiah 2:16
source:
  edition: WLC
  text: גַּם בְּנֵי נֹ֖ף ו/תחפנס יִרְע֖וּ/ךְ קָדְקֹֽד־־׃
translation:
  text: Even the sons of Noph and Tahpanhes have shaved your crown[a][b][c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the people of Noph and Tahpanhes.' Hebrew 'sons of' can denote the inhabitants of a place.
    reason: lexical_alternative
  - marker: b
    text: Noph is commonly identified with Memphis in Egypt.
    reason: cultural_note
  - marker: c
    text: The Hebrew verb literally means 'have grazed' or 'have fed on'; some translations render the sense more interpretively as 'have broken' or 'have crushed.'
    reason: lexical_alternative
  - marker: d
    text: Or 'the crown of your head' or 'your scalp.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Even
  alternatives:
  - Also
  lexicon: HALOT
  rationale: 'Adds an emphatic sense in context: not only Judah''s chosen allies generally, but even these Egyptian cities/peoples have acted against her.'
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the people of
  - the inhabitants of
  lexicon: HALOT
  rationale: Formally means 'sons of.' In geographic expressions it can denote the people or inhabitants associated with a place. 'Sons of' preserves the Hebrew idiom while remaining intelligible in English.
- source_word: נֹף
  chosen: Noph
  alternatives:
  - Memphis
  lexicon: HALOT
  rationale: Per translation philosophy, names are transliterated rather than translated. Noph is the Hebrew form of the Egyptian city often identified with Memphis.
- source_word: תחפנס
  chosen: Tahpanhes
  alternatives:
  - Daphne
  - Daphnae
  lexicon: HALOT
  rationale: Transliterated as a place name in keeping with the stated philosophy.
- source_word: יִרְעוּךְ
  chosen: have grazed
  alternatives:
  - have fed on
  - have broken
  - have crushed
  lexicon: HALOT
  rationale: From רעה ('to pasture, graze, feed'). The image is metaphorical and somewhat harsh or unusual in English, but 'have grazed' best preserves the Hebrew verb and the humiliating image of devouring damage. More interpretive renderings like 'have broken' likely reflect contextual smoothing rather than the plain lexical sense.
- source_word: קָדְקֹד
  chosen: your crown
  alternatives:
  - your scalp
  - the crown of your head
  - your head
  lexicon: HALOT
  rationale: Literally the crown or top of the head. 'Your crown' is concise and preserves the bodily image; 'scalp' is possible but more graphic than necessary, while 'head' is too general.
