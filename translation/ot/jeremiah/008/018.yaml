id: JER.8.18
reference: Jeremiah 8:18
source:
  edition: WLC
  text: מַבְלִ֥יגִיתִ֖/י עֲלֵ֣י יָג֑וֹן עָלַ֖/י לִבִּ֥/י דַוָּֽי׃
translation:
  text: My sorrow is beyond healing[b][a]; my heart is sick within me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew difficult. Or, 'I would comfort myself in sorrow; my heart is sick within me.'
    reason: alternative_reading
  - marker: b
    text: The opening word likely refers to consolation, relief, or brightness, but its exact nuance is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַבְלִיגִיתִי
  chosen: My joy ... is gone
  alternatives:
  - I would comfort myself
  - my comfort
  - my healing
  lexicon: HALOT
  rationale: The noun/form is difficult and contextually compressed. In this lament context it most plausibly refers to relief, brightness, or consolation that fails the speaker. Rendering it idiomatically as 'My joy ... is gone' captures the sense of vanished inner relief in natural English. The alternative verbal sense 'I would comfort myself' is reflected in some translations and is worth preserving in a footnote because the Hebrew is notoriously difficult.
- source_word: עֲלֵי
  chosen: in
  alternatives:
  - over
  - against
  - because of
  lexicon: HALOT
  rationale: Literally 'upon/over,' but in this compressed poetic line it functions idiomatically with the following noun to express the sphere or occasion of grief. 'In sorrow' is smoother English while preserving the lament sense.
- source_word: יָגוֹן
  chosen: sorrow
  alternatives:
  - grief
  - mourning
  lexicon: HALOT
  rationale: The noun denotes grief/sorrow. 'Sorrow' fits the poetic register and pairs naturally with the preceding difficult term.
- source_word: לִבִּי
  chosen: my heart
  lexicon: HALOT
  rationale: Standard rendering for the Hebrew term for the inner self, emotions, and will. Here it is the seat of distress.
- source_word: דַוָּי
  chosen: is sick
  alternatives:
  - is faint
  - is ill
  - is diseased
  lexicon: HALOT
  rationale: The adjective denotes sickness or infirmity. 'Is sick' is the most direct and idiomatic English expression for the speaker's inner condition.
- source_word: עָלַי
  chosen: within me
  alternatives:
  - upon me
  - over me
  lexicon: HALOT
  rationale: Literally 'upon me,' but with 'my heart' the idiomatic English sense is internal distress. 'Within me' communicates the experiential force rather than a wooden preposition.
