id: JER.37.21
reference: Jeremiah 37:21
source:
  edition: WLC
  text: וַ/יְצַוֶּ֞ה הַ/מֶּ֣לֶךְ צִדְקִיָּ֗הוּ וַ/יַּפְקִ֣דוּ אֶֽת יִרְמְיָהוּ֮ בַּ/חֲצַ֣ר
    הַ/מַּטָּרָה֒ וְ/נָתֹן֩ ל֨/וֹ כִכַּר לֶ֤חֶם לַ/יּוֹם֙ מִ/ח֣וּץ הָ/אֹפִ֔ים עַד
    תֹּ֥ם כָּל הַ/לֶּ֖חֶם מִן הָ/עִ֑יר וַ/יֵּ֣שֶׁב יִרְמְיָ֔הוּ בַּ/חֲצַ֖ר הַ/מַּטָּרָֽה־־־־־׃
translation:
  text: So King Zedekiah gave orders, and they committed Jeremiah to the court of
    the guard, and gave him a loaf of bread daily from the bakers’ street, until all
    the bread from the city was gone. So Jeremiah remained in the court of the guard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'from the outside/street of the bakers'; likely a street
      or quarter where bakers worked and sold bread.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְצַוֶּה
  chosen: gave orders
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: The verb צוה denotes issuing a command. 'Gave orders' is natural modern
    English and fits the royal setting without sounding overly stiff.
- source_word: וַיַּפְקִדוּ
  chosen: they committed
  alternatives:
  - they placed
  - they appointed
  - they entrusted
  lexicon: HALOT
  rationale: In context פקד with Jeremiah as object and location following means to
    place/assign him into custody there. 'Committed' captures official transfer into
    confinement better than the flatter 'placed.'
- source_word: חֲצַר הַמַּטָּרָה
  chosen: the court of the guard
  alternatives:
  - the courtyard of the guard
  - the court of the prison
  - the guard court
  lexicon: HALOT
  rationale: This phrase in Jeremiah refers to a guarded court associated with detention.
    'Court of the guard' is a clear, established rendering that preserves the institutional
    sense without overinterpreting it as a full prison building.
- source_word: וְנָתוֹן לוֹ
  chosen: and gave him
  alternatives:
  - and to give him
  - with orders to give him
  lexicon: HALOT
  rationale: 'The infinitive absolute/construct-like form after the prior command
    functions as the content/result of the order. English idiom is best represented
    by continuing the finite sequence: ''and gave him,'' implying what the king ordered
    done.'
- source_word: כִכַּר לֶחֶם
  chosen: a loaf of bread
  alternatives:
  - a round loaf of bread
  - a bread-cake
  lexicon: HALOT
  rationale: ככר here denotes a round loaf or cake-shaped unit of bread. 'A loaf of
    bread' is the most natural equivalent in contemporary English.
- source_word: לַיּוֹם
  chosen: daily
  alternatives:
  - for each day
  - per day
  lexicon: HALOT
  rationale: The phrase indicates regular daily provision. 'Daily' is concise and
    idiomatic.
- source_word: מִחוּץ הָאֹפִים
  chosen: from the Bakers’ Street
  alternatives:
  - from the bakers' quarter
  - from the bakers' market
  - from the street of the bakers
  lexicon: HALOT
  rationale: The expression literally means 'from the outside/street of the bakers'
    and likely refers to a district or street associated with bakers. 'Bakers’ Street'
    preserves the local urban reference more concretely than the vague 'bakers' quarter.'
- source_word: עַד תֹּם כָּל הַלֶּחֶם מִן הָעִיר
  chosen: until all the bread from the city was gone
  alternatives:
  - until all the bread in the city was used up
  - until all the bread of the city came to an end
  lexicon: HALOT
  rationale: The clause marks the duration of the rationing until the city's bread
    supply was exhausted. 'Was gone' is readable modern English that accurately conveys
    depletion.
- source_word: וַיֵּשֶׁב
  chosen: remained
  alternatives:
  - stayed
  - dwelt
  - sat
  lexicon: HALOT
  rationale: ישב often means to dwell/remain. In this custodial context 'remained'
    best conveys continued residence/confinement.
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: צִדְקִיָּהוּ
  chosen: Zedekiah
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
