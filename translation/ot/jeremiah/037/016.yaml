id: JER.37.16
reference: Jeremiah 37:16
source:
  edition: WLC
  text: כִּ֣י בָ֧א יִרְמְיָ֛הוּ אֶל בֵּ֥ית הַ/בּ֖וֹר וְ/אֶל הַֽ/חֲנֻ֑יוֹת וַ/יֵּֽשֶׁב שָׁ֥ם יִרְמְיָ֖הוּ יָמִ֥ים רַבִּֽים־־־׃פ
translation:
  text: For Jeremiah had come into the dungeon house and into the cells[a], and Jeremiah remained there many days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the vaulted rooms' or 'the stalls'; the Hebrew term is rare and likely refers to enclosed compartments within the prison.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - When
  - Indeed
  lexicon: HALOT
  rationale: Here כִּי introduces an explanatory clause giving the circumstance of Jeremiah's confinement. 'For' preserves the explanatory force better than a purely temporal 'when,' though the context is narrative.
- source_word: בָא
  chosen: had come
  alternatives:
  - came
  - entered
  lexicon: HALOT
  rationale: The qatal after כִּי is rendered with English past perfect to situate Jeremiah's arrival in the prison as prior to the ensuing statement that he remained there. 'Entered' is possible, but 'had come into' more directly reflects בוא with אֶל.
- source_word: בֵּית הַבּוֹר
  chosen: the dungeon house
  alternatives:
  - the house of the pit
  - the cistern-house
  - the prison house
  lexicon: HALOT
  rationale: Literally 'house of the pit/cistern.' In this imprisonment context, 'dungeon house' communicates a subterranean prison setting while retaining the concrete imagery of בּוֹר better than the more generalized 'prison house.'
- source_word: הַחֲנֻיוֹת
  chosen: the cells
  alternatives:
  - the vaulted rooms
  - the stalls
  - the prison cells
  lexicon: HALOT
  rationale: The noun is rare and likely refers to enclosed compartments or cell-like rooms within the prison complex. 'Cells' is the clearest modern English equivalent. Because the exact architectural nuance is uncertain, an alternative is preserved in a footnote.
- source_word: וַיֵּשֶׁב שָׁם
  chosen: remained there
  alternatives:
  - sat there
  - stayed there
  - dwelt there
  lexicon: HALOT
  rationale: ישב can mean 'sit,' 'dwell,' or 'remain.' In a prison narrative, idiomatic English favors 'remained there' to express continued confinement rather than posture.
- source_word: יָמִים רַבִּים
  chosen: many days
  alternatives:
  - a long time
  lexicon: HALOT
  rationale: A fairly literal rendering that preserves the Hebrew idiom and duration without paraphrase.
