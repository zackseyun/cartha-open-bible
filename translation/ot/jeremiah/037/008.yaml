id: JER.37.8
reference: Jeremiah 37:8
source:
  edition: WLC
  text: וְ/שָׁ֨בוּ֙ הַ/כַּשְׂדִּ֔ים וְ/נִלְחֲמ֖וּ עַל הָ/עִ֣יר הַ/זֹּ֑את וּ/לְכָדֻ֖/הָ
    וּ/שְׂרָפֻ֥/הָ בָ/אֵֽשׁ־׃ס
translation:
  text: Then the Chaldeans will return and fight against this city, and they will
    capture it and burn it with fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Babylonians.' The Hebrew reads 'the Chaldeans,' the historical designation
      used throughout this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁבוּ
  chosen: Then ... will return
  alternatives:
  - and ... will return
  - but ... will return
  lexicon: HALOT
  rationale: שׁוּב in this context means 'return.' The prefixed conjunction can be
    rendered simply 'and,' but 'Then' fits the prophetic sequence in English without
    adding content beyond the discourse flow.
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: The ethnic/political designation is literally 'the Chaldeans.' 'Babylonians'
    is a contextual equivalent, but 'Chaldeans' more closely follows the Hebrew and
    preserves the historical wording.
- source_word: וְנִלְחֲמוּ עַל
  chosen: and fight against
  alternatives:
  - and wage war against
  - and fight over
  lexicon: HALOT
  rationale: נלחם with עַל commonly means to fight against someone or something. 'Fight
    against' is natural modern English and adequately reflects the military sense.
- source_word: הָעִיר הַזֹּאת
  chosen: this city
  alternatives:
  - that city
  lexicon: HALOT
  rationale: The demonstrative זֹאת is proximal, so 'this city' is the straightforward
    rendering.
- source_word: וּלְכָדֻהָ
  chosen: and they will capture it
  alternatives:
  - and take it
  - and seize it
  lexicon: HALOT
  rationale: לכד commonly means to capture or seize, especially of taking a city.
    'Capture' best matches the military context.
- source_word: וּשְׂרָפֻהָ בָאֵשׁ
  chosen: and burn it with fire
  alternatives:
  - and burn it up with fire
  - and set it on fire
  lexicon: HALOT
  rationale: The idiom is literally 'burn it in/with fire.' 'Burn it with fire' preserves
    the Hebrew emphasis and is standard, clear English in judgment/oracle contexts.
