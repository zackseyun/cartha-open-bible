id: JER.37.11
reference: Jeremiah 37:11
source:
  edition: WLC
  text: וְ/הָיָ֗ה בְּ/הֵֽעָלוֹת֙ חֵ֣יל הַ/כַּשְׂדִּ֔ים מֵ/עַ֖ל יְרֽוּשָׁלִָ֑ם מִ/פְּנֵ֖י
    חֵ֥יל פַּרְעֹֽה׃ס
translation:
  text: Now when the army of the Chaldeans had withdrawn from Jerusalem because of
    Pharaoh’s army,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when the army of the Chaldeans went up from Jerusalem'; in context this
      refers to their lifting the siege and withdrawing because of Pharaoh’s army.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: Now ...
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: This narrative wayyiqtol introduces a new scene or development. In modern
    English, a simple discourse marker like 'Now' conveys the transition naturally
    without archaic formulae.
- source_word: בְּהֵעָלוֹת
  chosen: when ... had withdrawn
  alternatives:
  - when ... went up
  - when ... came up
  lexicon: HALOT
  rationale: The infinitive construct of עלה with ב marks temporal circumstance, 'when/in
    the going up of.' With מֵעַל יְרוּשָׁלַם ('from upon Jerusalem') and military
    context, the sense is the lifting or withdrawal of the besieging force rather
    than literal upward movement. English 'had withdrawn' best captures the idiom.
- source_word: חֵיל
  chosen: army
  alternatives:
  - force
  - troops
  lexicon: HALOT
  rationale: In this context חֵיל refers to an organized military force. 'Army' is
    the most natural and sufficiently precise rendering in English.
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: The Hebrew ethnonym is 'Chaldeans.' While historically referring to the
    Babylonian imperial forces, the translation preserves the source term directly;
    'Babylonians' is a valid contextual alternative but is not the lexical form used
    here.
- source_word: מֵעַל יְרוּשָׁלִָם
  chosen: from Jerusalem
  alternatives:
  - from against Jerusalem
  - from upon Jerusalem
  lexicon: HALOT
  rationale: Literally 'from upon Jerusalem,' but in siege context this means the
    army moved away from its position against the city. 'From Jerusalem' is idiomatic
    English and preserves the sense.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - before
  - on account of
  - from before the face of
  lexicon: HALOT
  rationale: The preposition here indicates causal motivation for retreat in the face
    of an approaching threat. 'Because of' communicates the causal force clearly in
    English.
- source_word: חֵיל פַּרְעֹה
  chosen: Pharaoh’s army
  alternatives:
  - the army of Pharaoh
  lexicon: HALOT
  rationale: Construct relationship is straightforward possession. 'Pharaoh’s army'
    is natural modern English.
