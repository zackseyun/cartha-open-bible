id: JER.37.4
reference: Jeremiah 37:4
source:
  edition: WLC
  text: וְ/יִרְמְיָ֕הוּ בָּ֥א וְ/יֹצֵ֖א בְּ/ת֣וֹךְ הָ/עָ֑ם וְ/לֹֽא נָתְנ֥וּ אֹת֖/וֹ
    בֵּ֥ית ה/כליא־׃
translation:
  text: Now Jeremiah was coming and going among the people, for they had not yet put
    him in the prison house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, 'and they had not put him in prison.' The Hebrew reads literally,
      'in the house of confinement.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּא וְיֹצֵא
  chosen: was coming and going
  alternatives:
  - came and went
  - moved about
  lexicon: HALOT
  rationale: The paired participles/verbs form an idiom for free movement or ordinary
    public activity. 'Was coming and going' preserves the Hebrew expression while
    sounding natural in English.
- source_word: בְּתוֹךְ הָעָם
  chosen: among the people
  alternatives:
  - in the midst of the people
  - among the populace
  lexicon: HALOT
  rationale: בְּתוֹךְ literally means 'in the midst of,' but 'among the people' is
    the most natural English equivalent here and preserves the sense of Jeremiah moving
    freely within the community.
- source_word: וְלֹא נָתְנוּ אֹתוֹ
  chosen: for they had not yet put him
  alternatives:
  - and they had not put him
  - for they had not placed him
  lexicon: HALOT
  rationale: The Hebrew conjunction can be rendered simply 'and,' but in context it
    explains why Jeremiah was still moving freely. 'For' makes that relation explicit
    without overtranslating. 'Put him' is idiomatic for confinement.
- source_word: בֵּית הַכְּלִיא
  chosen: in the prison house
  alternatives:
  - in the house of confinement
  - in prison
  lexicon: HALOT
  rationale: Literally 'house of confinement/imprisonment.' 'Prison house' preserves
    the concrete Hebrew construction better than the flatter 'prison,' while remaining
    readable modern English.
- source_word: וְיִרְמְיָהוּ
  chosen: Now Jeremiah
  alternatives:
  - And Jeremiah
  - Jeremiah
  rationale: The prefixed conjunction often advances narrative. 'Now Jeremiah' gives
    smooth English narrative flow and marks a scene-setting statement.
