id: JER.37.14
reference: Jeremiah 37:14
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יִרְמְיָ֜הוּ שֶׁ֗קֶר אֵינֶ֤/נִּי נֹפֵל֙ עַל הַ/כַּשְׂדִּ֔ים וְ/לֹ֥א
    שָׁמַ֖ע אֵלָ֑י/ו וַ/יִּתְפֹּ֤שׂ יִרְאִיָּיה֙ בְּ/יִרְמְיָ֔הוּ וַ/יְבִאֵ֖/הוּ אֶל
    הַ/שָּׂרִֽים־־׃
translation:
  text: But Jeremiah said, “That is a lie; I am not defecting to the Chaldeans.” But
    he would not listen to him, and Irijah seized Jeremiah and brought him to the
    officials.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I am not going over to the Chaldeans” or “I am not defecting to the
      Chaldeans.”
    reason: lexical_alternative
  - marker: b
    text: “Chaldeans” refers to the Babylonian forces.
    reason: cultural_note
  - marker: c
    text: Or “the princes”; the Hebrew term can denote high-ranking rulers or officials.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁקֶר
  chosen: That is a lie
  alternatives:
  - Falsehood
  - It is false
  lexicon: HALOT
  rationale: Used as an exclamatory rebuttal to the accusation. 'That is a lie' gives
    natural modern English while preserving the force of Jeremiah's denial.
- source_word: אֵינֶנִּי נֹפֵל עַל הַכַּשְׂדִּים
  chosen: I am not deserting to the Chaldeans
  alternatives:
  - I am not falling away to the Chaldeans
  - I am not defecting to the Chaldeans
  - I am not going over to the Chaldeans
  lexicon: HALOT
  rationale: The participle נֹפֵל with עַל in this military-political context means
    going over/defecting to the enemy side, not literal falling. 'Deserting to' is
    idiomatic and fits the accusation of treason.
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: Retains the ethnic-political term used in the Hebrew. 'Babylonians' is
    a valid contextual equivalent, but 'Chaldeans' is closer to the source and common
    in Jeremiah.
- source_word: וְלֹא שָׁמַע אֵלָיו
  chosen: But he would not listen to him
  alternatives:
  - But he did not listen to him
  - But he would not heed him
  lexicon: HALOT
  rationale: The clause reports refusal rather than mere auditory failure. 'Would
    not listen' captures the obstinate sense in readable English.
- source_word: וַיִּתְפֹּשׂ
  chosen: seized
  alternatives:
  - arrested
  - grabbed
  - took hold of
  lexicon: HALOT
  rationale: Conveys forcible apprehension. 'Arrested' is possible but slightly more
    interpretive; 'seized' preserves the physical action without adding legal nuance
    beyond the context.
- source_word: הַשָּׂרִים
  chosen: the officials
  alternatives:
  - the princes
  - the commanders
  - the leaders
  lexicon: HALOT
  rationale: In Jeremiah this term often refers to ruling officials/court authorities.
    'Officials' is clear modern English and avoids the potentially misleading aristocratic
    sense of 'princes'.
- source_word: וַיְבִאֵהוּ אֶל
  chosen: brought him to
  alternatives:
  - took him to
  lexicon: HALOT
  rationale: Standard rendering of the causative verb בוא in this context; straightforward
    and natural.
