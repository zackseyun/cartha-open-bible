id: JER.37.5
reference: Jeremiah 37:5
source:
  edition: WLC
  text: וְ/חֵ֥יל פַּרְעֹ֖ה יָצָ֣א מִ/מִּצְרָ֑יִם וַ/יִּשְׁמְע֨וּ הַ/כַּשְׂדִּ֜ים הַ/צָּרִ֤ים
    עַל יְרוּשָׁלִַ֨ם֙ אֶת שִׁמְעָ֔/ם וַ/יֵּ֣עָל֔וּ מֵ/עַ֖ל יְרוּשָׁלִָֽם־־׃פ
translation:
  text: Now Pharaoh’s army had come out from Egypt, and when the Chaldeans who were
    besieging Jerusalem heard the report about them, they withdrew from Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Babylonians” for “the Chaldeans.”
    reason: lexical_alternative
  - marker: b
    text: Literally “heard their report”; that is, they heard the news concerning
      Pharaoh’s army.
    reason: lexical_alternative
  - marker: c
    text: Literally “went up from upon Jerusalem,” an idiom here meaning they pulled
      back from the siege.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵיל
  chosen: army
  alternatives:
  - force
  - troops
  lexicon: HALOT
  rationale: In context with Pharaoh and military movement, חֵיל denotes a military
    force rather than wealth or strength in general. 'Army' is the most natural modern
    English rendering.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard transliteration of the royal title/name in English Bible usage.
- source_word: יָצָא מִמִּצְרַיִם
  chosen: had come out from Egypt
  alternatives:
  - came out from Egypt
  - marched out from Egypt
  lexicon: HALOT
  rationale: The qatal verb reports the prior action that sets up the following wayyiqtol
    sequence. 'Had come out' captures the relative past sense in English narrative.
    'From Egypt' is retained formally.
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: The Hebrew ethnonym is כַּשְׂדִּים. 'Chaldeans' is the direct rendering;
    'Babylonians' is interpretive but often contextually equivalent. The more source-near
    term is preferred in the main text.
- source_word: הַצָּרִים עַל יְרוּשָׁלַם
  chosen: who were besieging Jerusalem
  alternatives:
  - who were attacking Jerusalem
  - who were laying siege against Jerusalem
  lexicon: HALOT
  rationale: The participle from צור with עַל in this military context refers specifically
    to besieging a city. 'Who were besieging Jerusalem' gives clear, natural English
    while preserving the ongoing action.
- source_word: אֶת שִׁמְעָם
  chosen: the report about them
  alternatives:
  - the news of them
  - their report
  - the report of them
  lexicon: HALOT
  rationale: שֵׁמַע commonly means 'report, news, tidings.' With the 3mp suffix, the
    sense is the report concerning Pharaoh's forces. 'The report about them' is idiomatic
    and contextually precise.
- source_word: וַיֵּעָלוּ מֵעַל יְרוּשָׁלָם
  chosen: they withdrew from Jerusalem
  alternatives:
  - they went up from against Jerusalem
  - they moved away from Jerusalem
  - they lifted the siege from Jerusalem
  lexicon: HALOT
  rationale: Literally the verb is 'went up' with 'from upon Jerusalem,' but in siege
    context the idiomatic sense is that the besieging force pulled back. 'Withdrew
    from Jerusalem' communicates the military action clearly without over-specifying
    beyond the text.
- source_word: וְ
  chosen: Now
  alternatives:
  - And
  lexicon: HALOT
  rationale: The conjunction advances the narrative. 'Now' is a natural English discourse
    marker here, slightly smoother than repeated 'And' while preserving continuity.
