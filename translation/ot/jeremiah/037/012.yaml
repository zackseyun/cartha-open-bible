id: JER.37.12
reference: Jeremiah 37:12
source:
  edition: WLC
  text: וַ/יֵּצֵ֤א יִרְמְיָ֨הוּ֙ מִ/יר֣וּשָׁלִַ֔ם לָ/לֶ֖כֶת אֶ֣רֶץ בִּנְיָמִ֑ן לַ/חֲלִ֥ק מִ/שָּׁ֖ם בְּ/ת֥וֹךְ הָ/עָֽם׃
translation:
  text: Jeremiah went out from Jerusalem to go to the land of Benjamin[a], to receive his portion there among the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to claim a share there among the people.' The Hebrew infinitive לַחֲלִק is difficult, and interpreters differ whether it means receiving an allotted portion, dividing property, or claiming a share.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - left
  - departed
  lexicon: HALOT
  rationale: The verb יצא commonly means 'go out' or 'come out.' 'Went out' preserves the directional sense from Jerusalem without overinterpreting.
- source_word: מִירוּשָׁלִַם
  chosen: from Jerusalem
  lexicon: HALOT
  rationale: The preposition מִן marks movement away from the city; 'from Jerusalem' is the straightforward locative rendering.
- source_word: לָלֶכֶת
  chosen: to go
  alternatives:
  - to travel
  lexicon: HALOT
  rationale: The infinitive of הלך expresses purpose. 'To go' is simple and sufficiently formal; 'to travel' adds nuance not required by the text.
- source_word: אֶרֶץ בִּנְיָמִן
  chosen: the land of Benjamin
  alternatives:
  - the territory of Benjamin
  - the district of Benjamin
  lexicon: HALOT
  rationale: אֶרֶץ can denote land or territory. 'The land of Benjamin' is idiomatic and preserves the tribal/regional sense.
- source_word: לַחֲלִק
  chosen: to receive his portion
  alternatives:
  - to divide
  - to apportion
  - to claim a share
  lexicon: HALOT
  rationale: The infinitive from חלק here is difficult. In context, with מִשָּׁם and the following accusation in the narrative, it likely refers to obtaining or taking a share/portion there. 'To receive his portion' is a restrained rendering that reflects the probable sense without importing the later accusation directly into the text.
- source_word: מִשָּׁם
  chosen: from there
  lexicon: HALOT
  rationale: The adverb with prefixed preposition is best rendered literally as 'from there,' indicating the source/location of the portion.
- source_word: בְּתוֹךְ הָעָם
  chosen: among the people
  alternatives:
  - in the midst of the people
  - among the troops
  lexicon: HALOT
  rationale: The phrase literally means 'in the midst of the people.' 'Among the people' is natural English. 'Troops' is possible in wartime context but too specific for עָם here without clearer warrant.
