id: JER.37.20
reference: Jeremiah 37:20
source:
  edition: WLC
  text: וְ/עַתָּ֕ה שְֽׁמַֽע נָ֖א אֲדֹנִ֣/י הַ/מֶּ֑לֶךְ תִּפָּל נָ֤א תְחִנָּתִ/י֙ לְ/פָנֶ֔י/ךָ
    וְ/אַל תְּשִׁבֵ֗/נִי בֵּ֚ית יְהוֹנָתָ֣ן הַ/סֹּפֵ֔ר וְ/לֹ֥א אָמ֖וּת שָֽׁם־־־׃
translation:
  text: So now, please hear, my lord the king; please let my plea fall before you,
    and do not send me back to the house of Jehonathan the scribe, lest I die there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'please let my petition come before you.' The Hebrew
      literally says 'let my plea fall before you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Discourse marker introducing an urgent appeal. 'So now' preserves the
    connective force of וְ while sounding natural in English.
- source_word: שְׁמַע נָא
  chosen: please listen
  alternatives:
  - hear, please
  - please hear
  lexicon: HALOT
  rationale: Imperative of שׁמע with particle נָא expresses a polite urgent request.
    'Please listen' is idiomatic modern English and preserves the appeal.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my lord, O king
  - my master the king
  lexicon: HALOT
  rationale: Courtly address to the king. 'My lord the king' preserves both the possessive
    honorific and the royal title without over-paraphrase. 'Master' is possible lexically
    for אֲדֹנִי but 'lord' better fits royal address in English Bible style.
- source_word: תִּפָּל נָא תְחִנָּתִי לְפָנֶיךָ
  chosen: please let my plea fall before you
  alternatives:
  - please let my petition come before you
  - please let my supplication be presented before you
  lexicon: HALOT
  rationale: The Hebrew uses נפל ('fall') with תְּחִנָּה ('plea/supplication') in
    a conventional idiom for presenting a petition before a superior. Retaining 'fall
    before you' preserves the metaphor and formal tone while remaining understandable.
- source_word: תְחִנָּתִי
  chosen: my plea
  alternatives:
  - my petition
  - my supplication
  lexicon: HALOT
  rationale: '''Plea'' is accessible modern English and conveys earnest entreaty.
    ''Supplication'' is more traditional but less natural for the target audience.'
- source_word: וְאַל תְּשִׁבֵנִי
  chosen: and do not send me back
  alternatives:
  - and do not return me
  - and do not make me go back
  lexicon: HALOT
  rationale: Hiphil of שוב is causative, 'cause me to return.' 'Send me back' is the
    most natural English equivalent in this custodial context.
- source_word: בֵּית יְהוֹנָתָן הַסֹּפֵר
  chosen: the house of Jehonathan the scribe
  alternatives:
  - the house of Jonathan the scribe
  lexicon: HALOT
  rationale: בֵּית is literally 'house,' here likely functioning as a place of confinement.
    The proper name is represented as 'Jehonathan' to reflect the Hebrew form יְהוֹנָתָן
    rather than normalizing it to 'Jonathan.' 'The scribe' identifies the man by office.
- source_word: וְלֹא אָמוּת שָׁם
  chosen: lest I die there
  alternatives:
  - so that I do not die there
  - or I will die there
  lexicon: HALOT
  rationale: Though formally coordinated with וְלֹא, the clause gives the feared result/purpose
    of the request. 'Lest I die there' captures the sense concisely and idiomatically
    in English.
