id: JER.37.1
reference: Jeremiah 37:1
source:
  edition: WLC
  text: וַ/יִּ֨מְלָךְ מֶ֔לֶךְ צִדְקִיָּ֖הוּ בֶּן יֹֽאשִׁיָּ֑הוּ תַּ֗חַת כָּנְיָ֨הוּ֙
    בֶּן יְה֣וֹיָקִ֔ים אֲשֶׁ֥ר הִמְלִ֛יךְ נְבוּכַדְרֶאצַּ֥ר מֶֽלֶךְ בָּבֶ֖ל בְּ/אֶ֥רֶץ
    יְהוּדָֽה־־־־׃
translation:
  text: And King Zedekiah son of Josiah reigned in place of Coniah son of Jehoiakim,
    whom Nebuchadnezzar king of Babylon had made king in the land of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Coniah; also known elsewhere as Jeconiah.
    reason: alternative_reading
  - marker: b
    text: 'Hebrew spelling: Nebuchadrezzar; English versions often use Nebuchadnezzar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְלָךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: The waw-consecutive with מלך narrates the accession/regnal action. 'Reigned'
    is natural English in this historical context, while 'became king' is possible
    but less idiomatic here.
- source_word: מֶלֶךְ
  chosen: King
  lexicon: HALOT
  rationale: Rendered as the title 'King' before the personal name, matching normal
    English usage and the appositional Hebrew structure.
- source_word: צִדְקִיָּהוּ
  chosen: Zedekiah
  alternatives:
  - Ṣidqiyyahu
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: בֶּן יֹאשִׁיָּהוּ
  chosen: son of Josiah
  lexicon: HALOT
  rationale: A straightforward filial designation; retained formally for historical
    precision.
- source_word: תַּחַת
  chosen: in place of
  alternatives:
  - instead of
  - under
  lexicon: HALOT
  rationale: In this succession context, תַּחַת marks replacement/succession. 'In
    place of' is the clearest idiomatic rendering.
- source_word: כָּנְיָהוּ
  chosen: Coniah
  alternatives:
  - Jeconiah
  - Koniah
  rationale: The Hebrew form here is כָּנְיָהוּ, best represented by 'Coniah' rather
    than harmonizing to the more familiar 'Jeconiah.' This follows original-language
    primacy over translation tradition. Alternative familiar forms are preserved in
    a footnote.
- source_word: בֶּן יְהוֹיָקִים
  chosen: son of Jehoiakim
  lexicon: HALOT
  rationale: Formal filial designation retained.
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - who
  lexicon: HALOT
  rationale: Because the relative pronoun refers to the object of 'had made king,'
    English object form 'whom' is the most precise rendering.
- source_word: הִמְלִיךְ
  chosen: had made king
  alternatives:
  - made king
  - appointed king
  lexicon: HALOT
  rationale: 'The Hiphil of מלך is causative: ''cause to be king'' / ''make king.''
    The pluperfect ''had made king'' fits the narrative sequence, since Nebuchadnezzar''s
    appointment preceded Zedekiah''s reign. ''Appointed king'' is interpretive and
    slightly less direct.'
- source_word: נְבוּכַדְרֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  rationale: Standard English transliteration is used for readability, though the
    Hebrew spelling here more closely reflects 'Nebuchadrezzar.' The alternative is
    preserved in a footnote because it reflects the Hebrew form more closely.
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  lexicon: HALOT
  rationale: Straightforward construct chain rendered formally.
- source_word: בְּאֶרֶץ יְהוּדָה
  chosen: in the land of Judah
  alternatives:
  - over the land of Judah
  - in Judah
  lexicon: HALOT
  rationale: The preposition ב plus 'land' is most directly 'in the land of Judah.'
    'Over' would import a nuance not explicit in the Hebrew, and 'in Judah' is slightly
    less formal than the source wording.
