id: JER.37.10
reference: Jeremiah 37:10
source:
  edition: WLC
  text: כִּ֣י אִם הִכִּיתֶ֞ם כָּל חֵ֤יל כַּשְׂדִּים֙ הַ/נִּלְחָמִ֣ים אִתְּ/כֶ֔ם וְ/נִ֨שְׁאֲרוּ בָ֔/ם אֲנָשִׁ֖ים מְדֻקָּרִ֑ים אִ֤ישׁ בְּ/אָהֳל/וֹ֙ יָק֔וּמוּ וְ/שָֽׂרְפ֛וּ אֶת הָ/עִ֥יר הַ/זֹּ֖את בָּ/אֵֽשׁ־־־׃
translation:
  text: For even if you were to strike down the whole army of the Chaldeans who are fighting against you[a], and only wounded men remained among them, each in his tent[b], they would rise up and burn this city with fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Babylonians.' The Hebrew reads 'the Chaldeans,' the ethnic term commonly used for Babylonian forces in Jeremiah.
    reason: lexical_alternative
  - marker: b
    text: Literally 'men pierced' or 'men run through.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: For even if
  alternatives:
  - For if
  - Indeed if
  lexicon: HALOT
  rationale: The combination introduces a strong concessive/hypothetical statement. 'For even if' captures both the explanatory force of כִּי and the emphatic conditional force of אִם in context.
- source_word: הִכִּיתֶם
  chosen: you were to strike down
  alternatives:
  - you struck
  - you defeated
  - you smote
  lexicon: HALOT
  rationale: From נכה, here in a hypothetical protasis. 'Were to strike down' conveys the conditional sense and military defeat without archaic diction.
- source_word: כָּל חֵיל כַּשְׂדִּים
  chosen: the whole army of the Chaldeans
  alternatives:
  - all the force of the Chaldeans
  - the entire Chaldean army
  lexicon: HALOT
  rationale: חֵיל in military context refers to an army/force. 'The whole army of the Chaldeans' is natural English and preserves the collective sense of כָּל + singular collective noun.
- source_word: כַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: The Hebrew ethnonym is 'Chaldeans.' Although historically referring to the Babylonian forces, transliterating the people-group more directly follows source-language primacy; 'Babylonians' is a contextual alternative worth preserving.
- source_word: הַנִּלְחָמִים אִתְּכֶם
  chosen: who are fighting against you
  alternatives:
  - who fight with you
  - who are at war with you
  lexicon: HALOT
  rationale: In this hostile military context, אֵת with לחם indicates opposition, so 'against you' is required for clarity.
- source_word: וְנִשְׁאֲרוּ בָם
  chosen: and only ... remained among them
  alternatives:
  - and there remained among them
  - and were left among them
  lexicon: HALOT
  rationale: 'The verb means ''remain/be left over.'' Adding ''only'' brings out the restrictive force implied by the scenario: despite total defeat, merely a remnant survives.'
- source_word: אֲנָשִׁים מְדֻקָּרִים
  chosen: wounded men
  alternatives:
  - pierced men
  - men run through
  - mortally wounded men
  lexicon: HALOT
  rationale: מְדֻקָּרִים literally means 'pierced/stabbed.' In idiomatic English military narrative, 'wounded men' best communicates the state without over-specifying the weapon. The more literal 'pierced' is preserved as an alternative.
- source_word: אִישׁ בְּאָהֳלוֹ
  chosen: each in his tent
  alternatives:
  - every man in his tent
  - each one in his tent
  lexicon: HALOT
  rationale: Distributive singular אִישׁ is well represented by 'each.' 'His tent' preserves the masculine singular form in line with the gender-accurate policy.
- source_word: יָקֻמוּ
  chosen: they would rise up
  alternatives:
  - they would get up
  - they would arise
  lexicon: HALOT
  rationale: The imperfect here continues the hypothetical result. 'Rise up' fits both literal movement and the dramatic force of renewed action.
- source_word: וְשָׂרְפוּ אֶת הָעִיר הַזֹּאת בָּאֵשׁ
  chosen: and burn this city with fire
  alternatives:
  - and set this city on fire
  - and burn this city down
  lexicon: HALOT
  rationale: A straightforward rendering of the verb plus instrumental phrase. 'Burn this city with fire' preserves the Hebrew emphasis; 'set ... on fire' is idiomatic but slightly less formal.
