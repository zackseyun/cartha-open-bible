id: JER.37.13
reference: Jeremiah 37:13
source:
  edition: WLC
  text: וַ/יְהִי ה֞וּא בְּ/שַׁ֣עַר בִּנְיָמִ֗ן וְ/שָׁם֙ בַּ֣עַל פְּקִדֻ֔ת וּ/שְׁמ/וֹ֙
    יִרְאִיָּ֔יה בֶּן שֶֽׁלֶמְיָ֖ה בֶּן חֲנַנְיָ֑ה וַ/יִּתְפֹּ֞שׂ אֶֽת יִרְמְיָ֤הוּ
    הַ/נָּבִיא֙ לֵ/אמֹ֔ר אֶל הַ/כַּשְׂדִּ֖ים אַתָּ֥ה נֹפֵֽל־־־־־׃
translation:
  text: And when he was at the Benjamin Gate, there was a captain of the guard there
    whose name was Irijah son of Shelemiah, son of Hananiah, and he seized Jeremiah
    the prophet, saying, “You are deserting to the Chaldeans!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “You are defecting to the Chaldeans” or “You are going over to the Chaldeans.”
      The Hebrew idiom literally says “falling to the Chaldeans.”
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשַׁעַר בִּנְיָמִן
  chosen: at the Benjamin Gate
  alternatives:
  - in the Gate of Benjamin
  - at the gate of Benjamin
  lexicon: HALOT
  rationale: שַׁעַר with a place name refers to a city gate. 'Benjamin Gate' is a
    natural English rendering of the proper designation while preserving the location
    reference.
- source_word: בַּעַל פְּקִדֻת
  chosen: captain of the guard
  alternatives:
  - officer in charge
  - master of the watch
  - commander of the guard
  lexicon: HALOT
  rationale: The phrase literally denotes one who has oversight/charge. In this context
    at a city gate, it refers to the official responsible for guard duty. 'Captain
    of the guard' is idiomatic and fits the military-policing context better than
    a wooden 'master of oversight.'
- source_word: יִרְאִיָּה
  chosen: Irijah
  alternatives:
  - Jerahiah
  rationale: Standard English transliteration of the Hebrew personal name, preserving
    the proper name rather than translating it.
- source_word: וַיִּתְפֹּשׂ
  chosen: seized
  alternatives:
  - arrested
  - took hold of
  - caught
  lexicon: HALOT
  rationale: The verb denotes laying hold of forcibly. 'Seized' preserves the physical
    and hostile action without importing a more formal legal process than the Hebrew
    itself states.
- source_word: יִרְמְיָהוּ הַנָּבִיא
  chosen: Jeremiah the prophet
  alternatives:
  - the prophet Jeremiah
  rationale: Both English orders are possible; this order follows the Hebrew apposition
    closely while remaining natural.
- source_word: אֶל הַכַּשְׂדִּים אַתָּה נֹפֵל
  chosen: You are deserting to the Chaldeans
  alternatives:
  - You are defecting to the Chaldeans
  - You are falling away to the Chaldeans
  - You are going over to the Chaldeans
  lexicon: HALOT
  rationale: נפל with אֶל in a military-political context means to go over to the
    opposing side, i.e., defect/desert. 'Deserting' communicates the accusation clearly
    in modern English. 'Chaldeans' preserves the ethnic-political term used in the
    Hebrew rather than replacing it with 'Babylonians.'
