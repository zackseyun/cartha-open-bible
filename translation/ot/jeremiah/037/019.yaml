id: JER.37.19
reference: Jeremiah 37:19
source:
  edition: WLC
  text: ו/אי/ו נְבִ֣יאֵי/כֶ֔ם אֲשֶׁר נִבְּא֥וּ לָ/כֶ֖ם לֵ/אמֹ֑ר לֹֽא יָבֹ֤א מֶֽלֶךְ
    בָּבֶל֙ עֲלֵי/כֶ֔ם וְ/עַ֖ל הָ/אָ֥רֶץ הַ/זֹּֽאת־־־׃
translation:
  text: And where are your prophets who prophesied to you, saying, ‘The king of Babylon
    will not come against you and against this land’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'upon you and upon this land.' The Hebrew preposition can be rendered
      more literally as 'upon,' but here it likely carries the sense of hostile advance,
      hence 'against.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַיּוֹ
  chosen: And where are
  alternatives:
  - And where is now
  - So where are
  lexicon: HALOT
  rationale: The compound interrogative introduces a pointed rhetorical question continuing
    the prior context. 'And where are' preserves both the conjunction and the interrogative
    force in natural English.
- source_word: נְבִיאֵיכֶם
  chosen: your prophets
  alternatives:
  - the prophets of yours
  lexicon: HALOT
  rationale: Straightforward plural construct with 2mp suffix. 'Your prophets' is
    the natural and sufficiently formal rendering.
- source_word: אֲשֶׁר נִבְּאוּ לָכֶם
  chosen: who prophesied to you
  alternatives:
  - who were prophesying to you
  - who spoke as prophets to you
  lexicon: HALOT
  rationale: The relative clause identifies the prophets by their prior prophetic
    activity. English simple past fits the discourse well.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - by saying
  - when they said
  lexicon: HALOT
  rationale: Standard quotative infinitive, best rendered with 'saying' before direct
    discourse.
- source_word: לֹא יָבֹא
  chosen: will not come
  alternatives:
  - is not coming
  - shall not come
  lexicon: HALOT
  rationale: Imperfect with negation in reported speech naturally expresses future
    prediction. 'Will not come' is idiomatic modern English.
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  alternatives:
  - Babylon's king
  lexicon: HALOT
  rationale: Construct chain rendered transparently; this is the standard English
    form.
- source_word: עֲלֵיכֶם
  chosen: against you
  alternatives:
  - upon you
  - over you
  lexicon: HALOT
  rationale: With verbs of hostile advance, עַל commonly carries adversative force.
    'Against you' communicates the military threat more clearly than the more literal
    'upon you.'
- source_word: וְעַל הָאָרֶץ הַזֹּאת
  chosen: and against this land
  alternatives:
  - and upon this land
  lexicon: HALOT
  rationale: The repeated preposition links the threat to both the people and the
    land. 'This land' preserves the demonstrative emphasis; 'against' matches the
    hostile sense established by the previous phrase.
