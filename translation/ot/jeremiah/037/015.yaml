id: JER.37.15
reference: Jeremiah 37:15
source:
  edition: WLC
  text: וַ/יִּקְצְפ֧וּ הַ/שָּׂרִ֛ים עַֽל יִרְמְיָ֖הוּ וְ/הִכּ֣וּ אֹת֑/וֹ וְ/נָתְנ֨וּ
    אוֹת֜/וֹ בֵּ֣ית הָ/אֵס֗וּר בֵּ֚ית יְהוֹנָתָ֣ן הַ/סֹּפֵ֔ר כִּֽי אֹת֥/וֹ עָשׂ֖וּ
    לְ/בֵ֥ית הַ/כֶּֽלֶא־־׃
translation:
  text: And the officials were enraged at Jeremiah, and they beat him and put him
    in the prison house, in the house of Jehonathan the scribe, for they had made
    it into a prison.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the princes were angry with Jeremiah.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'house of confinement'; that is, a prison building in the house of
      Jehonathan the scribe.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקְצְפוּ
  chosen: were enraged
  alternatives:
  - were angry
  - became furious
  - were wrathful
  lexicon: HALOT
  rationale: The verb from קצף denotes strong anger or indignation. 'Were enraged'
    captures the intensity better than the flatter 'were angry' while remaining natural
    English.
- source_word: הַשָּׂרִים
  chosen: the officials
  alternatives:
  - the princes
  - the commanders
  - the leaders
  lexicon: HALOT
  rationale: שָׂרִים can mean princes, officials, or rulers depending on context.
    In Jeremiah's court setting, 'officials' best conveys governing authorities without
    implying royal sons ('princes').
- source_word: וְהִכּוּ אֹתוֹ
  chosen: and they beat him
  alternatives:
  - and they struck him
  lexicon: HALOT
  rationale: נכה commonly means to strike or beat. Given the hostile treatment in
    context, 'beat him' communicates repeated physical abuse more clearly than the
    more neutral 'struck him'.
- source_word: וְנָתְנוּ אֹתוֹ
  chosen: and put him
  alternatives:
  - and placed him
  - and confined him
  lexicon: HALOT
  rationale: נתן literally means 'give/put.' Here 'put him' is idiomatic and preserves
    the straightforward verbal force before the location phrase specifies imprisonment.
- source_word: בֵּית הָאֵסוּר
  chosen: in the prison house
  alternatives:
  - in the house of confinement
  - in prison
  lexicon: HALOT
  rationale: The construct phrase literally means 'house of confinement/prison.' 'Prison
    house' preserves the concrete Hebrew expression better than the more generalized
    'in prison'.
- source_word: בֵּית יְהוֹנָתָן הַסֹּפֵר
  chosen: in the house of Jehonathan the scribe
  alternatives:
  - in the house of Jonathan the scribe
  - in Jehonathan the secretary's house
  lexicon: HALOT
  rationale: The repeated בֵּית identifies the specific building as Jehonathan's house.
    The name is transliterated from the Hebrew form יְהוֹנָתָן. 'Scribe' is the standard
    rendering of סֹפֵר and can denote an official secretary, but 'scribe' stays closer
    to the source.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: 'כִּי here introduces the explanation for why Jehonathan''s house is
    identified: it had been turned into a prison. ''For'' is concise and fits the
    explanatory sense.'
- source_word: עָשׂוּ לְבֵית הַכֶּלֶא
  chosen: they had made it into a prison
  alternatives:
  - they had made it a jail
  - they had turned it into a prison house
  lexicon: HALOT
  rationale: עשה + לְ can express making something into something. כֶּלֶא denotes
    prison, detention, or jail. 'Had made it into a prison' is clear modern English
    and reflects the completed prior state implied by the context.
