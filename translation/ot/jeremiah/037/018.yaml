id: JER.37.18
reference: Jeremiah 37:18
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יִרְמְיָ֔הוּ אֶל הַ/מֶּ֖לֶךְ צִדְקִיָּ֑הוּ מֶה֩ חָטָ֨אתִֽי לְ/ךָ֤
    וְ/לַ/עֲבָדֶ֨י/ךָ֙ וְ/לָ/עָ֣ם הַ/זֶּ֔ה כִּֽי נְתַתֶּ֥ם אוֹתִ֖/י אֶל בֵּ֥ית הַ/כֶּֽלֶא־־־׃
translation:
  text: Then Jeremiah said to King Zedekiah, “How have I sinned against you, against
    your servants, and against this people, that you have put me into the house of
    imprisonment?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “How have I sinned against you, your servants, and this people?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving the sequential force of the Hebrew.
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  rationale: Standard English transliteration of the prophet's name, following the
    policy to transliterate personal names.
- source_word: הַמֶּלֶךְ צִדְקִיָּהוּ
  chosen: King Zedekiah
  alternatives:
  - the king, Zedekiah
  rationale: English idiom normally places the title before the name. The definite
    article on 'king' is naturally absorbed in English as 'King Zedekiah.'
- source_word: מֶה חָטָאתִי
  chosen: What have I sinned
  alternatives:
  - How have I sinned
  - What wrong have I done
  lexicon: HALOT
  rationale: The Hebrew literally asks 'What have I sinned...?' preserving the verbal
    idea of sinning rather than flattening it to the more generic 'wrong.' 'How have
    I sinned' is possible idiomatically, but 'what' more closely reflects מֶה.
- source_word: לְךָ וְלַעֲבָדֶיךָ וְלָעָם הַזֶּה
  chosen: against you, against your servants, and against this people
  alternatives:
  - to you, to your servants, and to this people
  lexicon: HALOT
  rationale: With חטא, the preposition ל often carries the sense 'sin against' in
    English. Repeating 'against' clarifies the relation for each object and preserves
    Jeremiah's threefold appeal.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your officials
  lexicon: HALOT
  rationale: The basic sense is 'servants.' In royal context it can denote court servants
    or officials, but 'servants' is the more direct rendering and fits the broad court
    setting without over-specifying rank.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - these people
  - the people
  lexicon: HALOT
  rationale: The singular collective 'this people' closely matches the Hebrew and
    is a common biblical idiom. 'These people' would sound more colloquial but is
    less formally aligned with the source.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content/result of Jeremiah''s complaint: ''that
    you have put me...'' ''That'' is the most natural connector in English for this
    construction.'
- source_word: נְתַתֶּם אֹתִי
  chosen: you have put me
  alternatives:
  - you have given me over
  - you placed me
  lexicon: HALOT
  rationale: נתן literally means 'give,' but in this context with אֶל plus destination
    it idiomatically means 'put' or 'place.' 'Put me' is natural and accurate.
- source_word: אֶל בֵּית הַכֶּלֶא
  chosen: into the prison
  alternatives:
  - into the house of confinement
  - into the jail
  lexicon: HALOT
  rationale: Literally 'to the house of confinement/prison.' 'Into the prison' communicates
    the sense clearly in modern English without unnecessary woodenness. 'Jail' is
    possible but slightly more colloquial.
