id: JER.40.14
reference: Jeremiah 40:14
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ אֵלָ֗י/ו הֲ/יָדֹ֤עַ תֵּדַע֙ כִּ֞י בַּעֲלִ֣יס מֶ֣לֶךְ בְּנֵֽי עַמּ֗וֹן שָׁלַח֙ אֶת יִשְׁמָעֵ֣אל בֶּן נְתַנְיָ֔ה לְ/הַכֹּתְ/ךָ֖ נָ֑פֶשׁ וְ/לֹא הֶאֱמִ֣ין לָ/הֶ֔ם גְּדַלְיָ֖הוּ בֶּן אֲחִיקָֽם׀־־־־־׃
translation:
  text: And they said to him[b][a], “Do you really know that Baalis king of the Ammonites has sent Ishmael son of Nethaniah to strike you down?” But Gedaliah son of Ahikam did not believe them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Do you know for certain…?” The Hebrew uses an infinitive absolute with a finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Literally “to strike you in life/soul,” an idiom meaning to kill or take someone’s life.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיָדֹעַ תֵּדַע
  chosen: Do you really know
  alternatives:
  - Do you surely know
  - Do you know for certain
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verb ידע. English needs an adverbial intensifier; 'really know' is natural modern English while preserving the emphatic force.
- source_word: בַּעֲלִיס
  chosen: Baalis
  rationale: Personal name transliterated per project philosophy.
- source_word: מֶלֶךְ בְּנֵי עַמּוֹן
  chosen: king of the Ammonites
  alternatives:
  - king of the sons of Ammon
  - king of the Ammonite people
  lexicon: HALOT
  rationale: Idiomatic rendering of the construct phrase. 'Ammonites' communicates the people group naturally in English.
- source_word: שָׁלַח
  chosen: has sent
  alternatives:
  - sent
  lexicon: HALOT
  rationale: English present perfect works well in reported speech for a prior action with present relevance; simple past would also be possible.
- source_word: יִשְׁמָעֵאל בֶּן נְתַנְיָה
  chosen: Ishmael son of Nethaniah
  alternatives:
  - Ishmael the son of Nethaniah
  rationale: Standard biblical name transliteration and filial designation.
- source_word: לְהַכֹּתְךָ נָפֶשׁ
  chosen: to take your life
  alternatives:
  - to strike you down mortally
  - to kill you
  lexicon: HALOT
  rationale: Literally 'to strike you as to life/soul.' The phrase is an idiom for killing. 'Take your life' preserves the personal force of נֶפֶשׁ better than the flatter 'kill you' while remaining idiomatic English.
- source_word: הֶאֱמִין לָהֶם
  chosen: did not believe them
  alternatives:
  - did not trust them
  - did not put faith in them
  lexicon: HALOT
  rationale: In this context אמן in the Hiphil means to believe/credit what someone says. 'Believe them' fits the warning-report context better than 'trust them.'
- source_word: גְּדַלְיָהוּ בֶּן אֲחִיקָם
  chosen: Gedaliah son of Ahikam
  alternatives:
  - Gedaliah the son of Ahikam
  rationale: Standard transliteration and filial designation.
