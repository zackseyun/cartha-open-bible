theological_decisions:
- issue: Prophetic use of שׁוּב in a moral-religious context
  chosen_reading: return
  alternative_readings:
  - repent
  rationale: The Hebrew verb is literally 'return,' which preserves the covenantal imagery of turning back to the LORD. Because in Jeremiah this often implies repentance, that interpretive alternative is preserved in a footnote rather than imported into the main text.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it.
