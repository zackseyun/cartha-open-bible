id: JER.6.25
reference: Jeremiah 6:25
source:
  edition: WLC
  text: אַל תצאי הַ/שָּׂדֶ֔ה וּ/בַ/דֶּ֖רֶךְ אַל תלכי כִּ֚י חֶ֣רֶב לְ/אֹיֵ֔ב מָג֖וֹר מִ/סָּבִֽיב־־׃
translation:
  text: Do not go out into the field[a], and do not walk on the road[b], for the sword of the enemy and terror are on every side.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the sword of the enemy; terror on every side.'' The main text renders the possession idiomatically as ''the enemy has a sword.'''
    reason: lexical_alternative
  - marker: b
    text: The warning is addressed with feminine singular verbs, likely personifying Jerusalem/daughter Zion.
    reason: cultural_note
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - You must not
  lexicon: HALOT
  rationale: Negative particle used with the jussive/imperfect to express prohibition. Simple English prohibition best matches the force without overtranslation.
- source_word: תצאי
  chosen: go out
  alternatives:
  - go forth
  - come out
  lexicon: HALOT
  rationale: Qal 2fs of יצא, addressed to daughter Zion/Jerusalem in the surrounding context. 'Go out' is natural modern English and preserves the movement outward.
- source_word: הַשָּׂדֶה
  chosen: the field
  alternatives:
  - the countryside
  - the open country
  lexicon: HALOT
  rationale: שׂדה normally denotes field/open country. 'The field' is the most direct rendering; the singular can function collectively.
- source_word: וּבַדֶּרֶךְ
  chosen: and ... on the road
  alternatives:
  - and ... in the way
  - and ... on the الطريق
  lexicon: HALOT
  rationale: דרך here refers to the roadway/path. Rendering with 'on the road' gives idiomatic English for travel context. The conjunction is carried into the clause structure.
- source_word: תלכי
  chosen: walk
  alternatives:
  - go
  - travel
  lexicon: HALOT
  rationale: הלך literally means 'walk/go.' Because the previous verb already uses 'go out,' retaining 'walk' preserves the Hebrew variation while still sounding natural in English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the prohibition. 'For' is concise and fits prophetic warning style.
- source_word: חֶרֶב
  chosen: a sword
  alternatives:
  - the sword
  - sword
  lexicon: HALOT
  rationale: Literal weapon imagery is central here. An indefinite English article works naturally, though the noun also carries the broader sense of deadly violence.
- source_word: לְאֹיֵב
  chosen: the enemy has
  alternatives:
  - of the enemy
  - belongs to the enemy
  - there is an enemy's sword
  lexicon: HALOT
  rationale: 'The prefixed ל here is best taken as indicating possession/reference: ''the enemy has a sword'' or ''the sword of the enemy.'' The chosen rendering is idiomatic and conveys the threat clearly.'
- source_word: מָגוֹר
  chosen: terror
  alternatives:
  - dread
  - panic
  lexicon: HALOT
  rationale: מגור denotes terror/dread. 'Terror' preserves the weight of the warning and echoes the recurring Jeremiah expression 'terror on every side.'
- source_word: מִסָּבִיב
  chosen: on every side
  alternatives:
  - all around
  - from all around
  - round about
  lexicon: HALOT
  rationale: Idiomatic rendering of the prepositional phrase indicating surrounding danger. 'On every side' is clear modern English and preserves the sense of encirclement.
