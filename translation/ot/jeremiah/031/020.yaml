id: JER.31.20
reference: Jeremiah 31:20
source:
  edition: WLC
  text: הֲ/בֵן֩ יַקִּ֨יר לִ֜/י אֶפְרַ֗יִם אִ֚ם יֶ֣לֶד שַׁעֲשֻׁעִ֔ים כִּֽי מִ/דֵּ֤י דַבְּרִ/י֙ בּ֔/וֹ זָכֹ֥ר אֶזְכְּרֶ֖/נּוּ ע֑וֹד עַל כֵּ֗ן הָמ֤וּ מֵעַ/י֙ ל֔/וֹ רַחֵ֥ם אֲֽרַחֲמֶ֖/נּוּ נְאֻם יְהוָֽה־־־׃ס
translation:
  text: Is Ephraim a precious son to me[a], a child of delight? For as often as I speak of him, I still surely remember him. Therefore my inward parts are stirred for him; I will surely have compassion on him[b], declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For whenever I speak of him.' The Hebrew preposition can be read more neutrally ('of/concerning him'), but in context 'against him' fits the contrast with God's continuing remembrance after words of judgment.
    reason: alternative_reading
  - marker: b
    text: Literally 'my inward parts are stirred for him,' a Hebrew idiom for deep compassion; compare 'my heart yearns for him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲבֵן יַקִּיר
  chosen: a precious son
  alternatives:
  - a dear son
  - an honored son
  lexicon: HALOT
  rationale: יַקִּיר conveys preciousness/dearness rather than merely status. 'Precious son' preserves the emotive force of the rhetorical question in natural English.
- source_word: אִם יֶלֶד שַׁעֲשֻׁעִים
  chosen: a child of delight
  alternatives:
  - a delightful child
  - a darling child
  lexicon: HALOT
  rationale: The construct phrase literally denotes a child associated with delight/playfulness. 'Child of delight' keeps the Hebrew flavor while remaining intelligible; alternatives are possible but slightly more interpretive.
- source_word: כִּי מִדֵּי דַבְּרִי בוֹ
  chosen: For as often as I speak against him
  alternatives:
  - For whenever I speak of him
  - For every time I speak concerning him
  lexicon: HALOT
  rationale: 'The preposition בּוֹ after דבר can mean ''about/concerning,'' but in this context of judgment-and-mercy over Ephraim, ''against him'' best fits the contrast: despite words of judgment, God still remembers him. This is a contextual choice and worth preserving as an alternative in a footnote.'
- source_word: זָכֹר אֶזְכְּרֶנּוּ עוֹד
  chosen: I still surely remember him
  alternatives:
  - I will surely remember him still
  - I indeed remember him still
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the action. 'Surely remember' captures the emphasis; 'still' renders עוֹד as ongoing persistence.
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - So then
  lexicon: HALOT
  rationale: Standard inferential connective; 'Therefore' is concise and natural.
- source_word: הָמוּ מֵעַי לוֹ
  chosen: my inward parts are stirred for him
  alternatives:
  - my heart yearns for him
  - my bowels are troubled for him
  lexicon: HALOT
  rationale: מֵעִים literally refers to inward parts and in Hebrew idiom denotes deep inner emotion/compassion. 'My inward parts are stirred' preserves the embodied metaphor without archaic crudeness; a more idiomatic alternative is preserved in a footnote.
- source_word: רַחֵם אֲרַחֲמֶנּוּ
  chosen: I will surely have compassion on him
  alternatives:
  - I will surely show him mercy
  - I will certainly have mercy on him
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb again intensifies. רחם here is compassionate mercy from deep feeling; 'have compassion' best matches the emotional context established by the previous clause.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. Per doctrine, יְהוָה is rendered 'the LORD.' 'Declares' fits contemporary readable English while preserving prophetic solemnity.
