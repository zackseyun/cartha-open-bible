theological_decisions:
- issue: Referent and tone of Ephraim
  chosen_reading: Ephraim is addressed as the northern people personified as a beloved son, with the verse holding together prior judgment and present compassion.
  alternative_readings:
  - Ephraim as an individual tribal ancestor only
  rationale: The immediate context in Jeremiah 31 treats Ephraim corporately/personified. The translation preserves the familial metaphor and the tension between divine rebuke and mercy without flattening either side.
  doctrine_reference: Preserve theological tension rather than resolve it.
