id: JER.51.24
reference: Jeremiah 51:24
source:
  edition: WLC
  text: וְ/שִׁלַּמְתִּ֨י לְ/בָבֶ֜ל וּ/לְ/כֹ֣ל יוֹשְׁבֵ֣י כַשְׂדִּ֗ים אֵ֧ת כָּל רָעָתָ֛/ם
    אֲשֶׁר עָשׂ֥וּ בְ/צִיּ֖וֹן לְ/עֵֽינֵי/כֶ֑ם נְאֻ֖ם יְהוָֽה׀־־׃ס
translation:
  text: And I will repay Babylon and all the inhabitants of Chaldea for all their
    evil that they have done in Zion before your eyes, declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will pay back Babylon and all the inhabitants of Chaldea for all the
      harm they have done.' The Hebrew term can emphasize either moral evil or the
      harmful wrongdoing itself.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּמְתִּי
  chosen: I will repay
  alternatives:
  - I will pay back
  - I will requite
  lexicon: HALOT
  rationale: The piel of שׁלם here carries the sense of repaying or paying back in
    response to deeds done. 'Repay' is natural modern English and preserves the judicial/retributive
    force without sounding archaic like 'requite'.
- source_word: לְבָבֶל
  chosen: Babylon
  lexicon: HALOT
  rationale: Proper place-name; standard English transliteration is 'Babylon'.
- source_word: וּלְכֹל יוֹשְׁבֵי כַשְׂדִּים
  chosen: and all the inhabitants of Chaldea
  alternatives:
  - and all who dwell in Chaldea
  - and all the سكان/people of the Chaldeans
  lexicon: HALOT
  rationale: יוֹשְׁבֵי is a participial construct meaning 'those dwelling/inhabiting.'
    'Inhabitants of Chaldea' is idiomatic and accurately reflects the territorial
    sense of כַשְׂדִּים here as the land/people of the Chaldeans.
- source_word: אֵת כָּל רָעָתָם
  chosen: for all their evil
  alternatives:
  - all their wickedness
  - all the harm they have done
  lexicon: HALOT
  rationale: רָעָה can denote moral evil or harmful wrongdoing. In this judgment context,
    'evil' best preserves the moral dimension while still encompassing the destructive
    acts done against Zion. The preposition is not separately repeated in English
    because 'repay ... for' naturally conveys the Hebrew construction.
- source_word: אֲשֶׁר עָשׂוּ בְצִיּוֹן
  chosen: that they have done in Zion
  alternatives:
  - which they did in Zion
  - that they committed against Zion
  lexicon: HALOT
  rationale: The preposition ב normally means 'in.' Although the sense includes hostile
    action directed toward Zion, the Hebrew says 'in Zion,' likely referring to deeds
    committed there. 'Done in Zion' stays close to the source while remaining clear.
- source_word: לְעֵינֵיכֶם
  chosen: before your eyes
  alternatives:
  - in your sight
  - before you
  lexicon: HALOT
  rationale: This idiom means something witnessed openly by the audience. 'Before
    your eyes' is a standard, vivid English equivalent.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: נְאֻם יְהוָה is a prophetic formula. 'Declares the LORD' is established,
    clear English that preserves the solemn prophetic force.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
