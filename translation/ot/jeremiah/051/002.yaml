id: JER.51.2
reference: Jeremiah 51:2
source:
  edition: WLC
  text: וְ/שִׁלַּחְתִּ֨י לְ/בָבֶ֤ל זָרִים֙ וְ/זֵר֔וּ/הָ וִ/יבֹקְק֖וּ אֶת אַרְצָ֑/הּ
    כִּֽי הָי֥וּ עָלֶ֛י/הָ מִ/סָּבִ֖יב בְּ/י֥וֹם רָעָֽה׀־־׃
translation:
  text: And I will send strangers against Babylon, and they will winnow her and empty
    her land, for they will be against her from every side in the day of disaster.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “foreigners” for “strangers.” The Hebrew refers to outsiders sent against
      Babylon.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered “winnow” can also be understood more generally as “scatter,”
      but the agricultural image is likely intentional.
    reason: lexical_alternative
  - marker: c
    text: “In the day of disaster” means the time when calamity falls on Babylon,
      not a day characterized by moral evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּחְתִּי
  chosen: And I will send
  alternatives:
  - And I have sent
  - So I will send
  lexicon: HALOT
  rationale: Qal perfect 1cs with prefixed conjunction in prophetic discourse commonly
    has a future sense; English future best fits the judgment oracle context.
- source_word: לְבָבֶל
  chosen: against Babylon
  alternatives:
  - to Babylon
  - for Babylon
  lexicon: HALOT
  rationale: The preposition ל with שלח can mark destination, but in this hostile
    context the sense is sending agents against Babylon rather than for Babylon’s
    benefit.
- source_word: זָרִים
  chosen: strangers
  alternatives:
  - foreigners
  - aliens
  lexicon: HALOT
  rationale: זָרִים denotes outsiders/foreign persons. 'Strangers' preserves the lexical
    link with the Hebrew while remaining natural English; the military sense is clarified
    by context.
- source_word: וְזֵרוּהָ
  chosen: they will winnow her
  alternatives:
  - they will scatter her
  - they will toss her like grain
  lexicon: HALOT
  rationale: From זרה, whose core image is winnowing/scattering grain. 'Winnow her'
    preserves the metaphor, which is important in the verse’s paired imagery with
    emptying the land.
- source_word: וִיבֹקְקוּ
  chosen: empty
  alternatives:
  - lay waste
  - devastate
  - pour out
  lexicon: HALOT
  rationale: בקק carries the sense of emptying out, often by devastation. 'Empty'
    keeps the concrete verbal image and works well with 'her land' as object.
- source_word: אֶת אַרְצָהּ
  chosen: her land
  alternatives:
  - her country
  lexicon: HALOT
  rationale: אֶרֶץ can mean land or country. 'Land' is the more direct and flexible
    rendering here, matching the devastation motif.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the announced judgment; 'for' is concise and
    natural in English.
- source_word: הָיוּ עָלֶיהָ
  chosen: they will be against her
  alternatives:
  - they were against her
  - they came upon her
  lexicon: HALOT
  rationale: Although the Hebrew form is perfect, in context it describes the certainty
    of the coming assault. Rendering with future aligns with the surrounding prophetic
    futures and avoids an abrupt tense shift in English.
- source_word: מִסָּבִיב
  chosen: from every side
  alternatives:
  - all around
  - round about
  lexicon: HALOT
  rationale: This idiom conveys encirclement. 'From every side' is idiomatic modern
    English and preserves the military pressure implied.
- source_word: בְּיוֹם רָעָה
  chosen: in the day of disaster
  alternatives:
  - on the day of calamity
  - in the day of evil
  lexicon: HALOT
  rationale: רָעָה here refers to calamity/disaster rather than moral evil. 'Day of
    disaster' is clear, natural, and contextually precise.
