id: JER.51.18
reference: Jeremiah 51:18
source:
  edition: WLC
  text: הֶ֣בֶל הֵ֔מָּה מַעֲשֵׂ֖ה תַּעְתֻּעִ֑ים בְּ/עֵ֥ת פְּקֻדָּתָ֖/ם יֹאבֵֽדוּ׃
translation:
  text: They are vanity, a work of delusion; at the time of their punishment they
    will perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a work of mockery,' 'a deceptive work,' or 'a work of errors.'
    reason: lexical_alternative
  - marker: b
    text: Or 'at the time of their visitation.' Here 'visitation' refers to the time
      when judgment comes upon them.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶבֶל
  chosen: vanity
  alternatives:
  - worthlessness
  - mere breath
  - emptiness
  lexicon: HALOT
  rationale: הֶבֶל often denotes emptiness, futility, or insubstantiality. In prophetic
    polemic against idols, 'vanity' is a concise traditional English rendering that
    communicates worthlessness without implying literal breath alone.
- source_word: הֵמָּה
  chosen: They are
  alternatives:
  - These are
  lexicon: HALOT
  rationale: 'The independent 3mp pronoun gives an emphatic predication: ''they are.''
    English requires the copula for natural expression.'
- source_word: מַעֲשֵׂה
  chosen: a work of
  alternatives:
  - the work of
  - an artifact of
  lexicon: HALOT
  rationale: Construct with the following plural noun yields 'a work of ...' referring
    to what the idols amount to. Singular 'work' is retained from the Hebrew.
- source_word: תַּעְתֻּעִים
  chosen: delusions
  alternatives:
  - mockery
  - deceptions
  - errors
  lexicon: HALOT
  rationale: 'The noun conveys something deceptive, misleading, or mocking. ''Delusions''
    fits the idol polemic well: idols are products of deception and lead people astray.
    ''Mockery'' is possible, but here the emphasis is better taken as deceptive unreality.'
- source_word: בְּעֵת
  chosen: at the time of
  alternatives:
  - in the time of
  - when
  lexicon: HALOT
  rationale: A straightforward temporal prepositional phrase. 'At the time of' preserves
    the formal structure while remaining natural English.
- source_word: פְּקֻדָּתָם
  chosen: their punishment
  alternatives:
  - their visitation
  - their reckoning
  - their judgment
  lexicon: HALOT
  rationale: פְּקֻדָּה can mean visitation, oversight, or punishment depending on
    context. In judgment oracles, it commonly refers to punitive visitation. 'Their
    punishment' makes the sense explicit in contemporary English; 'visitation' is
    preserved as an alternative because of its traditional use.
- source_word: יֹאבֵדוּ
  chosen: they will perish
  alternatives:
  - they will be destroyed
  - they will vanish
  lexicon: HALOT
  rationale: From אבד, denoting perishing or destruction. 'They will perish' is direct
    and preserves the intransitive force better than the more causative-sounding 'be
    destroyed.'
