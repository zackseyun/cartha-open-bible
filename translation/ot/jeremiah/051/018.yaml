theological_decisions:
- issue: Nature of the idol polemic
  chosen_reading: The verse speaks of idols as worthless and deceptive objects that
    will themselves perish under divine judgment.
  alternative_readings:
  - The phrase 'work of delusions' could be taken more as 'a ridiculous/mockable work'
    than as 'deceptive work'.
  rationale: The immediate context in Jeremiah 51 parallels other anti-idol texts
    (cf. Jer 10:15), where the emphasis is both on the idols' emptiness and on their
    exposure in the time of judgment. The translation preserves that polemical force
    without importing additional theological claims.
