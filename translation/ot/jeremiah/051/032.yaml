id: JER.51.32
reference: Jeremiah 51:32
source:
  edition: WLC
  text: וְ/הַ/מַּעְבָּר֣וֹת נִתְפָּ֔שׂוּ וְ/אֶת הָ/אֲגַמִּ֖ים שָׂרְפ֣וּ בָ/אֵ֑שׁ וְ/אַנְשֵׁ֥י הַ/מִּלְחָמָ֖ה נִבְהָֽלוּ־׃ס
translation:
  text: The crossings have been seized[a], the marshes have been burned with fire[c][b], and the men of war are terrified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fords have been seized.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the pools'; the Hebrew term can refer to marshy pools or swampy areas.
    reason: lexical_alternative
  - marker: c
    text: Or 'the warriors' or 'the fighting men.' Literally, 'the men of war.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּעְבָּרוֹת
  chosen: the crossings
  alternatives:
  - the fords
  - the passages
  lexicon: HALOT
  rationale: מַעְבָּר denotes a place of crossing or passage. In this military context, likely river crossings/fords around Babylon. 'Crossings' is broad and natural English while preserving the strategic sense; 'fords' is possible but slightly narrower and more interpretive.
- source_word: נִתְפָּשׂוּ
  chosen: have been seized
  alternatives:
  - have been captured
  - are taken
  lexicon: HALOT
  rationale: The Niphal of תפש conveys being taken or seized. 'Have been seized' preserves the passive/resultative force and fits the report style of the verse.
- source_word: הָאֲגַמִּים
  chosen: the marshes
  alternatives:
  - the pools
  - the reeds
  lexicon: HALOT
  rationale: אֲגַמִּים commonly refers to marshy pools, reeds, or swampy areas. In the Babylon context, 'marshes' best fits the geography and the plausibility of being burned, while 'pools' is possible but less vivid and 'reeds' is too narrow for the noun itself.
- source_word: שָׂרְפוּ בָאֵשׁ
  chosen: have been burned with fire
  alternatives:
  - have burned in the fire
  - have been set on fire
  lexicon: HALOT
  rationale: The Qal perfect with בָאֵשׁ expresses burning by/with fire. English idiom can sound redundant, but 'burned with fire' reflects the Hebrew emphasis without paraphrase. Passive English is supplied to match the sequence of reported calamities, though the Hebrew verb itself is active/indefinite plural.
- source_word: אַנְשֵׁי הַמִּלְחָמָה
  chosen: the men of war
  alternatives:
  - the warriors
  - the fighting men
  lexicon: HALOT
  rationale: Literally 'men of the war.' Following the project's gender-accurate principle, 'men of war' preserves the masculine form and military register. 'Warriors' is smoother but less formally transparent.
- source_word: נִבְהָלוּ
  chosen: are terrified
  alternatives:
  - are dismayed
  - are panic-stricken
  lexicon: HALOT
  rationale: The verb בהל in the Niphal conveys being disturbed, alarmed, or terrified. 'Are terrified' communicates the intensity clearly in modern English; 'are dismayed' is possible but weaker.
