id: JER.51.37
reference: Jeremiah 51:37
source:
  edition: WLC
  text: וְ/הָיְתָה֩ בָבֶ֨ל לְ/גַלִּ֧ים מְעוֹן תַּנִּ֛ים שַׁמָּ֥ה וּ/שְׁרֵקָ֖ה מֵ/אֵ֥ין
    יוֹשֵֽׁב׀׀־׃
translation:
  text: And Babylon will become a heap of ruins, a haunt of jackals, a horror and
    a hissing, with no inhabitant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heaps' or 'ruin-heaps'; the Hebrew is plural.
    reason: lexical_alternative
  - marker: b
    text: Or 'dragons' in older English versions; the Hebrew term here is more likely
      'jackals' in a desolation setting.
    reason: lexical_alternative
  - marker: c
    text: Or 'a whistling,' that is, an object of derision.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  chosen: will become
  alternatives:
  - will be
  - shall become
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly
    carries a future/result sense. 'Will become' captures the transition into desolation
    better than the stative 'will be.'
- source_word: בָבֶל
  chosen: Babylon
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: לְגַלִּים
  chosen: a heap of ruins
  alternatives:
  - heaps
  - ruin-heaps
  lexicon: HALOT
  rationale: The plural noun denotes heaps/mounds, here in a desolation context. Singular
    collective English ('a heap of ruins') is more idiomatic while preserving the
    image of collapsed rubble.
- source_word: מְעוֹן
  chosen: a haunt
  alternatives:
  - a dwelling place
  - a habitation
  - a den
  lexicon: HALOT
  rationale: In context of wild animals occupying a destroyed city, 'haunt' communicates
    an eerie habitation more naturally than the neutral 'dwelling place.'
- source_word: תַּנִּים
  chosen: jackals
  alternatives:
  - dragons
  - wild dogs
  lexicon: HALOT
  rationale: In prophetic desolation texts this term is commonly understood as jackals.
    'Dragons' reflects older tradition but is not the plain zoological sense in modern
    English.
- source_word: שַׁמָּה
  chosen: a horror
  alternatives:
  - an object of horror
  - desolation
  - astonishment
  lexicon: HALOT
  rationale: The noun denotes devastation that evokes appalled reaction. 'A horror'
    is concise and fits the series of predicates; 'desolation' would overlap too much
    with the ruin imagery already expressed.
- source_word: וּשְׁרֵקָה
  chosen: and a hissing
  alternatives:
  - and a whistling
  - and an object of hissing
  lexicon: HALOT
  rationale: The noun refers to derisive hissing/whistling at a devastated place.
    'Hissing' preserves the conventional prophetic idiom; 'whistling' is possible
    but less clearly derisive in English.
- source_word: מֵאֵין יוֹשֵׁב
  chosen: with no inhabitant
  alternatives:
  - without anyone living there
  - with none dwelling there
  lexicon: HALOT
  rationale: This construction expresses total lack of inhabitants. 'With no inhabitant'
    is concise and formal enough for prophetic judgment language.
