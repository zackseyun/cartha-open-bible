id: JER.51.35
reference: Jeremiah 51:35
source:
  edition: WLC
  text: חֲמָסִ֤/י וּ/שְׁאֵרִ/י֙ עַל בָּבֶ֔ל תֹּאמַ֖ר יֹשֶׁ֣בֶת צִיּ֑וֹן וְ/דָמִ/י֙
    אֶל יֹשְׁבֵ֣י כַשְׂדִּ֔ים תֹּאמַ֖ר יְרוּשָׁלִָֽם־־׃ס
translation:
  text: “My violence and my flesh be upon Babylon,” says the inhabitant of Zion. “And
    my blood be upon the inhabitants of Chaldea,” says Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “and my body.” The Hebrew term is traditionally understood here as referring
      to bodily flesh, though some have proposed other derivations.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “to the inhabitants of Chaldea”; the English renders the implied
      imprecatory sense in parallel with “be upon Babylon.”
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲמָסִי
  chosen: the violence done to me
  alternatives:
  - my violence
  - the wrong done to me
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence, wrong, or outrage. With the 1cs suffix
    in this lament/imprecation context, the sense is not Zion's own violence but violence
    suffered by her. The passive idea is brought out in English for clarity.
- source_word: וּשְׁאֵרִי
  chosen: and my flesh
  alternatives:
  - and my body
  - and my remnant
  lexicon: HALOT
  rationale: Though the consonants could suggest a form related to שְׁאֵר/שְׁאֵרִית
    in other contexts, here the traditional and contextually fitting sense is 'flesh/body,'
    parallel to 'my blood' in the next colon and expressing bodily harm. 'Flesh' preserves
    the Hebrew imagery more closely than 'body'.
- source_word: עַל בָּבֶל
  chosen: be upon Babylon
  alternatives:
  - on Babylon
  - against Babylon
  lexicon: HALOT
  rationale: עַל with an imprecatory nominal clause conveys the wish that the guilt
    or consequence fall upon Babylon. 'Be upon' preserves the Hebrew idiom and judicial
    force.
- source_word: תֹּאמַר
  chosen: says
  alternatives:
  - will say
  - shall say
  lexicon: HALOT
  rationale: The imperfect here functions performatively in prophetic style, introducing
    direct speech. Present-tense 'says' is natural English for this discourse function.
- source_word: יֹשֶׁבֶת צִיּוֹן
  chosen: the inhabitant of Zion
  alternatives:
  - daughter Zion
  - she who dwells in Zion
  lexicon: HALOT
  rationale: The feminine singular participle with Zion personifies the city as a
    female inhabitant/dweller. 'Inhabitant of Zion' is a direct rendering without
    importing the idiom 'daughter Zion,' which is not the wording here.
- source_word: וְדָמִי
  chosen: and my blood
  alternatives:
  - and my bloodguilt
  lexicon: HALOT
  rationale: דָּם with 1cs suffix most naturally means literal blood here, parallel
    to bodily violence and expressing bloodshed suffered by Jerusalem. 'Bloodguilt'
    is possible in some contexts but less likely with the possessive and parallelism.
- source_word: אֶל יֹשְׁבֵי כַשְׂדִּים
  chosen: be upon the inhabitants of Chaldea
  alternatives:
  - be on the Chaldeans
  - be against those who dwell in Chaldea
  lexicon: HALOT
  rationale: Although the preposition is אֶל ('to/toward'), in this parallel imprecatory
    structure it carries the sense of directed consequence toward the inhabitants
    of Chaldea. Rendering 'be upon' in English preserves the parallel with the previous
    colon and the implied verb.
- source_word: כַשְׂדִּים
  chosen: Chaldea
  alternatives:
  - the Chaldeans
  lexicon: HALOT
  rationale: 'With ''inhabitants of'' preceding, the phrase is best taken territorially:
    ''inhabitants of Chaldea.'' This avoids the awkward ''inhabitants of the Chaldeans''
    and matches the sense of the Hebrew construction.'
- source_word: יְרוּשָׁלִָם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention, in keeping
    with the translation philosophy.
