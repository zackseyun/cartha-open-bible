id: JER.51.27
reference: Jeremiah 51:27
source:
  edition: WLC
  text: שְׂאוּ נֵ֣ס בָּ/אָ֗רֶץ תִּקְע֨וּ שׁוֹפָ֤ר בַּ/גּוֹיִם֙ קַדְּשׁ֤וּ עָלֶ֨י/הָ֙
    גּוֹיִ֔ם הַשְׁמִ֧יעוּ עָלֶ֛י/הָ מַמְלְכ֥וֹת אֲרָרַ֖ט מִנִּ֣י וְ/אַשְׁכְּנָ֑ז פִּקְד֤וּ
    עָלֶ֨י/הָ֙ טִפְסָ֔ר הַֽעֲלוּ ס֖וּס כְּ/יֶ֥לֶק סָמָֽר־־׃
translation:
  text: Raise a banner in the land; blow a trumpet among the nations. Consecrate nations
    against her; summon against her the kingdoms of Ararat, Minni, and Ashkenaz. Appoint
    a marshal against her; bring up horses like bristling locusts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Raise a standard' for 'Raise a banner.'
    reason: lexical_alternative
  - marker: b
    text: '''Consecrate nations against her'' uses warfare language of setting forces
      apart for battle; it may imply preparation for a holy war.'
    reason: cultural_note
  - marker: c
    text: '''Marshal'' translates a rare term (tiphsar) for an official or military
      officer; alternatives include ''commander'' or ''recruiting officer.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'like hairy locusts' or 'like rough locusts'; the Hebrew expression is
      rare and vivid.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂאוּ נֵס
  chosen: Raise a banner
  alternatives:
  - Lift up a signal
  - Raise a standard
  lexicon: HALOT
  rationale: נֵס commonly denotes a signal pole/banner/standard raised publicly. 'Raise
    a banner' is idiomatic modern English while preserving the military summons sense.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the earth
  - throughout the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'earth' or 'land'; here the military context favors 'land'
    as the region where the signal is raised.
- source_word: תִּקְעוּ שׁוֹפָר
  chosen: blow a trumpet
  alternatives:
  - sound a horn
  - blow the ram's horn
  lexicon: HALOT
  rationale: שׁוֹפָר is a horn used for alarm or summons. 'Trumpet' is conventional
    and clear in English, though literally a horn; the military signaling function
    is preserved.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the peoples
  - in the nations
  lexicon: HALOT
  rationale: גּוֹיִם here refers to foreign peoples/kingdoms being rallied for war.
    'Among the nations' fits the international summons.
- source_word: קַדְּשׁוּ עָלֶיהָ גּוֹיִם
  chosen: Consecrate nations against her
  alternatives:
  - Set apart nations against her
  - Prepare nations for holy war against her
  lexicon: HALOT
  rationale: קדשׁ in warfare contexts can mean to consecrate/set apart for battle.
    'Consecrate' preserves the sacral-war nuance without overexpanding the phrase.
- source_word: הַשְׁמִיעוּ עָלֶיהָ
  chosen: summon against her
  alternatives:
  - proclaim against her
  - cause to be heard against her
  lexicon: HALOT
  rationale: The Hiphil of שמע here is causative, 'make heard/announce.' In context
    it introduces the named kingdoms as forces to be called up, so 'summon' captures
    the military proclamation.
- source_word: מַמְלְכוֹת אֲרָרַט מִנִּי וְאַשְׁכְּנָז
  chosen: the kingdoms of Ararat, Minni, and Ashkenaz
  alternatives:
  - the kingdoms Ararat, Minni, and Ashkenaz
  lexicon: HALOT
  rationale: These are proper regional names and should be transliterated, per translation
    philosophy. 'Kingdoms of ...' reflects the construct relationship.
- source_word: פִּקְדוּ עָלֶיהָ טִפְסָר
  chosen: Appoint a marshal against her
  alternatives:
  - Commission a commander against her
  - Set a recruiting officer against her
  lexicon: HALOT
  rationale: טִפְסָר is a loanword for an official, often understood as a military
    officer or marshal. With פקדו ('appoint/muster/commission'), 'appoint a marshal'
    best fits the command context.
- source_word: הַעֲלוּ סוּס
  chosen: bring up horses
  alternatives:
  - send up horses
  - cause horses to advance
  lexicon: HALOT
  rationale: עלה in Hiphil often means to bring up or advance troops. 'Bring up horses'
    is natural military English.
- source_word: כְּיֶלֶק סָמָר
  chosen: like bristling locusts
  alternatives:
  - like rough locusts
  - like hairy locusts
  - like swarming locusts
  lexicon: HALOT
  rationale: יֶלֶק denotes a kind of locust/cankerworm. סָמָר means bristling/rough/hairy.
    The phrase likely evokes the appearance or massed movement of war horses; 'bristling
    locusts' preserves the vivid metaphor better than flattening it to mere swarming.
