id: JER.51.59
reference: Jeremiah 51:59
source:
  edition: WLC
  text: הַ/דָּבָ֞ר אֲשֶׁר צִוָּ֣ה יִרְמְיָ֣הוּ הַ/נָּבִ֗יא אֶת שְׂרָיָ֣ה בֶן נֵרִיָּה֮
    בֶּן מַחְסֵיָה֒ בְּ/לֶכְתּ֞/וֹ אֶת צִדְקִיָּ֤הוּ מֶֽלֶךְ יְהוּדָה֙ בָּבֶ֔ל בִּ/שְׁנַ֥ת
    הָ/רְבִעִ֖ית לְ/מָלְכ֑/וֹ וּ/שְׂרָיָ֖ה שַׂ֥ר מְנוּחָֽה־׀־־־־־׃
translation:
  text: This is the word that Jeremiah the prophet commanded Seraiah son of Neriah,
    son of Mahseiah, when he went with Zedekiah king of Judah to Babylon, in the fourth
    year of his reign. Now Seraiah was the quartermaster.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Seraiah was the chamberlain.' The Hebrew title שַׂר מְנוּחָה is rare
      and may refer to an official responsible for lodging, resting places, or travel
      arrangements.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּבָר
  chosen: This is the word
  alternatives:
  - This is the message
  - The word
  lexicon: HALOT
  rationale: דָּבָר commonly means 'word, matter, message.' In prophetic framing formulas,
    'word' is the standard and preserves the formal link to prophetic speech, while
    'This is' is supplied naturally in English to introduce the clause.
- source_word: אֲשֶׁר צִוָּה
  chosen: that ... commanded
  alternatives:
  - that ... instructed
  - that ... charged
  lexicon: HALOT
  rationale: צוה is 'command, charge, instruct.' 'Commanded' best reflects the verbal
    force without softening it; the object is Seraiah, who is being given a commission.
- source_word: יִרְמְיָהוּ הַנָּבִיא
  chosen: Jeremiah the prophet
  lexicon: HALOT
  rationale: Straightforward identification; the title is translated per philosophy,
    while the personal name is transliterated.
- source_word: אֶת שְׂרָיָה ... בֶּן נֵרִיָּה ... בֶּן מַחְסֵיָה
  chosen: Seraiah son of Neriah, son of Mahseiah
  lexicon: HALOT
  rationale: Genealogical בן is rendered 'son of' in both instances for clarity and
    consistency.
- source_word: בְּלֶכְתּוֹ
  chosen: when he went
  alternatives:
  - as he went
  - in his going
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב plus suffix indicates temporal
    circumstance. 'When he went' is idiomatic English and preserves the temporal sense.
- source_word: אֶת צִדְקִיָּהוּ מֶלֶךְ יְהוּדָה
  chosen: with Zedekiah king of Judah
  alternatives:
  - to Zedekiah king of Judah
  lexicon: HALOT
  rationale: Here אֶת functions as a comitative marker, not a direct-object marker.
    'With' is therefore required by context.
- source_word: בָּבֶל
  chosen: to Babylon
  alternatives:
  - Babylon
  lexicon: HALOT
  rationale: The destination sense is implied by the motion verb and context, even
    though no separate preposition is repeated before 'Babylon' in Hebrew. English
    normally supplies 'to'.
- source_word: בִּשְׁנַת הָרְבִעִית לְמָלְכוֹ
  chosen: in the fourth year of his reign
  alternatives:
  - in the fourth year of his kingship
  lexicon: HALOT
  rationale: Standard regnal dating formula; 'of his reign' is the natural English
    equivalent.
- source_word: וּשְׂרָיָה שַׂר מְנוּחָה
  chosen: Now Seraiah was the quartermaster
  alternatives:
  - and Seraiah was the chamberlain
  - and Seraiah was the officer of rest
  - and Seraiah was the marshal
  lexicon: HALOT
  rationale: The phrase is difficult. שַׂר is 'official/officer/prince,' and מְנוּחָה
    literally relates to 'rest, resting place.' In this travel context it likely denotes
    responsibility for lodging or camp arrangements. 'Quartermaster' best conveys
    an official charged with travel accommodations in readable modern English, while
    preserving the administrative sense better than the traditional but less transparent
    'chamberlain'.
