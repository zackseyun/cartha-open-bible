id: JER.51.8
reference: Jeremiah 51:8
source:
  edition: WLC
  text: פִּתְאֹ֛ם נָפְלָ֥ה בָבֶ֖ל וַ/תִּשָּׁבֵ֑ר הֵילִ֣ילוּ עָלֶ֗י/הָ קְח֤וּ צֳרִי֙
    לְ/מַכְאוֹבָ֔/הּ אוּלַ֖י תֵּרָפֵֽא׃
translation:
  text: Suddenly Babylon has fallen and been shattered. Wail over her! Take balm for
    her pain; perhaps she may be healed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'balsam' or 'healing balm.' The Hebrew refers to a medicinal resin used
      for treatment.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּתְאֹם
  chosen: Suddenly
  alternatives:
  - All at once
  lexicon: HALOT
  rationale: Adverb marking abruptness; 'suddenly' is the most natural modern English
    equivalent and preserves the shock of Babylon's collapse.
- source_word: נָפְלָה
  chosen: has fallen
  alternatives:
  - fell
  lexicon: HALOT
  rationale: Qal perfect 3fs with Babylon as subject. English present perfect captures
    the vivid, announced result of the fall in context, while remaining natural.
- source_word: בָבֶל
  chosen: Babylon
  rationale: Standard English transliteration of the place-name.
- source_word: וַתִּשָּׁבֵר
  chosen: and been shattered
  alternatives:
  - and is broken
  - and was broken
  lexicon: HALOT
  rationale: Niphal of שבר conveys being broken/shattered. 'Been shattered' pairs
    idiomatically with 'has fallen' and intensifies the image of catastrophic ruin.
- source_word: הֵילִילוּ
  chosen: Wail
  alternatives:
  - Howl
  - Lament
  lexicon: HALOT
  rationale: Imperative plural calling for loud mourning. 'Wail' is vivid and accessible;
    'howl' is possible but can sound overly animalistic in contemporary English.
- source_word: עָלֶיהָ
  chosen: over her
  alternatives:
  - for her
  - because of her
  lexicon: HALOT
  rationale: The preposition עַל with lament language commonly means mourning over
    someone/something. 'Over her' best fits the idiom.
- source_word: קְחוּ
  chosen: Take
  alternatives:
  - Bring
  - Fetch
  lexicon: HALOT
  rationale: Imperative plural. 'Take' is the direct lexical equivalent and works
    naturally with the object 'balm'.
- source_word: צֳרִי
  chosen: balm
  alternatives:
  - healing balm
  - balsam
  lexicon: HALOT
  rationale: Refers to a resinous medicinal balm, famously associated with Gilead.
    'Balm' is concise and traditional without being obscure; a footnote preserves
    'balsam' as a lexical alternative.
- source_word: לְמַכְאוֹבָהּ
  chosen: for her pain
  alternatives:
  - for her wound
  - for her hurt
  lexicon: HALOT
  rationale: מַכְאוֹב denotes pain, suffering, or hurt. 'Pain' is the broadest and
    most natural here; 'wound' is possible by context but less lexically direct.
- source_word: אוּלַי
  chosen: perhaps
  alternatives:
  - maybe
  - if perhaps
  lexicon: HALOT
  rationale: Expresses possibility rather than confidence. 'Perhaps' preserves the
    tentative tone.
- source_word: תֵּרָפֵא
  chosen: she may be healed
  alternatives:
  - she will be healed
  - she may recover
  lexicon: HALOT
  rationale: Niphal imperfect 3fs of רפא, here expressing possible healing/restoration.
    'May be healed' matches the modal nuance introduced by אוּלַי.
