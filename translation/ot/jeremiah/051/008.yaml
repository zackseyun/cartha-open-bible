theological_decisions:
- issue: Personification of Babylon as feminine singular
  chosen_reading: Retain feminine personification with 'her' and 'she'
  alternative_readings:
  - Use 'it' for the city/empire
  rationale: The Hebrew consistently uses feminine singular forms for Babylon as a
    city personified. Preserving 'her/she' reflects the source text's imagery and
    rhetoric rather than flattening it into impersonal English.
  doctrine_reference: Translation philosophy §5 (consistency of key terms) and §6
    (readable modern English)
