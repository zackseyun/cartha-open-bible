id: JER.51.31
reference: Jeremiah 51:31
source:
  edition: WLC
  text: רָ֤ץ לִ/קְרַאת רָץ֙ יָר֔וּץ וּ/מַגִּ֖יד לִ/קְרַ֣את מַגִּ֑יד לְ/הַגִּיד֙ לְ/מֶ֣לֶךְ
    בָּבֶ֔ל כִּֽי נִלְכְּדָ֥ה עִיר֖/וֹ מִ/קָּצֶֽה־־׃
translation:
  text: Runner meets runner, and messenger meets messenger, to tell the king of Babylon
    that his city has been captured from end to end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'One runner runs to meet another runner, and one messenger
      to meet another messenger.' The Hebrew uses repeated participles for urgency
      and rapid succession.
    reason: lexical_alternative
  - marker: b
    text: Or 'his city has been taken from one end.' The Hebrew expression may denote
      capture beginning at an extremity, though in context it likely implies the city's
      fall throughout.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָץ / יָרוּץ
  chosen: Runner meets runner
  alternatives:
  - One runner runs to meet another runner
  - Courier meets courier
  lexicon: HALOT
  rationale: The noun-participle רָץ followed by the verb יָרוּץ creates a vivid,
    rapid scene of successive runners. English smooths this by rendering the sense
    idiomatically as 'Runner meets runner' rather than repeating both noun and verb
    woodenly.
- source_word: לִקְרַאת
  chosen: meets
  alternatives:
  - to meet
  - runs to meet
  lexicon: HALOT
  rationale: The preposition plus infinitive expresses movement toward encounter.
    In English, 'meets' captures the event naturally in coordination with the surrounding
    clauses.
- source_word: וּמַגִּיד ... מַגִּיד
  chosen: and messenger meets messenger
  alternatives:
  - and one who reports meets another who reports
  - and herald meets herald
  lexicon: HALOT
  rationale: מַגִּיד is one who announces or reports. 'Messenger' is concise and natural
    here, matching the relay-of-news context better than the more cumbersome 'reporter'
    or 'announcer.'
- source_word: לְהַגִּיד
  chosen: to tell
  alternatives:
  - to report
  - to announce
  lexicon: HALOT
  rationale: '''To tell'' is clear modern English and fits the indirect-object construction
    with ''the king of Babylon.'' ''Report'' is possible but slightly more formal.'
- source_word: לְמֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  alternatives:
  - Babylon's king
  lexicon: HALOT
  rationale: A straightforward genitive rendering preserves the formal address target
    of the message.
- source_word: נִלְכְּדָה
  chosen: has been captured
  alternatives:
  - is taken
  - has been taken
  lexicon: HALOT
  rationale: The Niphal of לכד denotes being seized or captured. 'Has been captured'
    communicates the completed passive event in natural English.
- source_word: עִירוֹ
  chosen: his city
  alternatives:
  - the city
  - his capital city
  lexicon: HALOT
  rationale: The pronominal suffix is explicit and should be preserved. 'His city'
    reflects the Hebrew directly without over-specifying 'capital.'
- source_word: מִקָּצֶה
  chosen: from end to end
  alternatives:
  - from one end
  - at every extremity
  - from the outskirts
  lexicon: HALOT
  rationale: The phrase indicates extent from an extremity, and in context idiomatically
    conveys that the city has been taken throughout. 'From end to end' is a natural
    English equivalent that preserves the totalizing force.
