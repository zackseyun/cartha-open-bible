id: JER.51.42
reference: Jeremiah 51:42
source:
  edition: WLC
  text: עָלָ֥ה עַל בָּבֶ֖ל הַ/יָּ֑ם בַּ/הֲמ֥וֹן גַּלָּ֖י/ו נִכְסָֽתָה־׃
translation:
  text: The sea has come up against Babylon[b][a]; she is covered with the multitude of its waves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The image of 'the sea' is metaphorical for the overwhelming force coming against Babylon; the translation preserves the metaphor rather than replacing it with an interpretation.
    reason: cultural_note
  - marker: b
    text: Or 'with the tumult of its waves.' The Hebrew noun can denote both noise/tumult and a great multitude.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָה
  chosen: has come up
  alternatives:
  - has risen
  - has gone up
  - came up
  lexicon: HALOT
  rationale: Qal perfect 3ms of עלה commonly means 'go up, come up, rise.' In this prophetic judgment context, 'has come up' gives vivid movement toward/against Babylon and works naturally in English with the following preposition.
- source_word: עַל
  chosen: against
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: Although the preposition literally means 'on/upon/over,' with hostile movement in context it is idiomatically rendered 'against' to convey assault rather than mere location.
- source_word: בָּבֶל
  chosen: Babylon
  rationale: Standard English transliteration of the place name בבל.
- source_word: הַיָּם
  chosen: The sea
  alternatives:
  - A sea
  lexicon: HALOT
  rationale: The noun is definite by article. In context it is metaphorical for the invading force overwhelming Babylon, but the image should be preserved rather than interpreted in the main text.
- source_word: בַּהֲמוֹן
  chosen: with the roar
  alternatives:
  - with the tumult
  - in the multitude
  lexicon: HALOT
  rationale: המון can denote noise, tumult, roar, or multitude. Because it modifies waves, the auditory sense 'roar' best fits the imagery and yields idiomatic English.
- source_word: גַּלָּיו
  chosen: its waves
  alternatives:
  - his waves
  lexicon: HALOT
  rationale: The 3ms suffix grammatically refers back to 'the sea.' English normally uses 'its' for an impersonal antecedent, even though Hebrew uses masculine grammatical gender.
- source_word: נִכְסָתָה
  chosen: she is covered
  alternatives:
  - she has been covered
  - was covered
  lexicon: HALOT
  rationale: Niphal perfect 3fs of כסה means 'be covered.' The feminine singular agrees with Babylon as a city. 'She is covered' preserves the personified-city imagery while reading naturally in English prophetic style.
