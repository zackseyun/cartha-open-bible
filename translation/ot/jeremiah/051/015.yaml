id: JER.51.15
reference: Jeremiah 51:15
source:
  edition: WLC
  text: עֹשֵׂ֥ה אֶ֨רֶץ֙ בְּ/כֹח֔/וֹ מֵכִ֥ין תֵּבֵ֖ל בְּ/חָכְמָת֑/וֹ וּ/בִ/תְבוּנָת֖/וֹ נָטָ֥ה שָׁמָֽיִם׃
translation:
  text: He made the earth by his power[a], he established the world by his wisdom, and by his understanding he stretched out the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the inhabited world' for 'the world.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֵׂה
  chosen: made
  alternatives:
  - makes
  - maker of
  lexicon: HALOT
  rationale: 'The participle of עשה can be rendered more formally as ''making'' or ''maker of,'' but in this poetic context with the following finite verbs, English reads most naturally with a finite past verb: ''He made.'' This also matches the hymnic recollection of God''s creative acts in context.'
- source_word: אֶרֶץ
  chosen: earth
  alternatives:
  - land
  lexicon: HALOT
  rationale: Here the cosmic creation context favors 'earth' rather than 'land,' since the verse contrasts earth/world with heavens.
- source_word: בְּכֹחוֹ
  chosen: by his power
  alternatives:
  - with his power
  - through his strength
  lexicon: HALOT
  rationale: The preposition ב in instrumental sense is well represented by 'by.' 'Power' is the most straightforward rendering of כֹּחַ here in a creation formula.
- source_word: מֵכִין
  chosen: established
  alternatives:
  - prepared
  - set firm
  lexicon: HALOT
  rationale: כון in the Hiphil commonly carries the sense of establishing or setting firmly. 'Established' best conveys the stabilizing nuance in relation to the inhabited world.
- source_word: תֵּבֵל
  chosen: the world
  alternatives:
  - the inhabited world
  lexicon: HALOT
  rationale: תבל often denotes the world in its inhabited, ordered sense. 'The world' is idiomatic English and sufficient here; the more explicit 'inhabited world' is possible but less natural in this poetic line.
- source_word: בְּחָכְמָתוֹ
  chosen: by his wisdom
  alternatives:
  - with his wisdom
  lexicon: HALOT
  rationale: Instrumental ב is again best rendered 'by.' 'Wisdom' is the standard and contextually fitting gloss for חכמה.
- source_word: וּבִתְבוּנָתוֹ
  chosen: and by his understanding
  alternatives:
  - and by his insight
  - and with his discernment
  lexicon: HALOT
  rationale: תבונה overlaps with wisdom but adds the nuance of understanding or discernment. 'Understanding' preserves the lexical distinction from 'wisdom' in the previous phrase.
- source_word: נָטָה
  chosen: stretched out
  alternatives:
  - spread out
  - extended
  lexicon: HALOT
  rationale: In creation contexts נטה commonly describes stretching out the heavens. 'Stretched out' is both idiomatic and traditional without being archaic.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: The plural form and cosmic context favor 'the heavens' rather than singular 'heaven' or the more limited 'sky.'
