id: JER.51.56
reference: Jeremiah 51:56
source:
  edition: WLC
  text: כִּי֩ בָ֨א עָלֶ֤י/הָ עַל בָּבֶל֙ שׁוֹדֵ֔ד וְ/נִלְכְּדוּ֙ גִּבּוֹרֶ֔י/הָ חִתְּתָ֖ה
    קַשְּׁתוֹתָ֑/ם כִּ֣י אֵ֧ל גְּמֻל֛וֹת יְהוָ֖ה שַׁלֵּ֥ם יְשַׁלֵּֽם־׃
translation:
  text: For a destroyer has come against her, against Babylon, and her warriors have
    been captured; their bows are shattered. For the LORD is a God of recompense;
    he will surely repay.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a plunderer' or 'the devastator.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'mighty men'; here in context, Babylon's fighting men.
    reason: lexical_alternative
  - marker: c
    text: Or 'a God of vengeance.' The Hebrew emphasizes just repayment or requital.
    reason: alternative_reading
lexical_decisions:
- source_word: שׁוֹדֵד
  chosen: a destroyer
  alternatives:
  - a plunderer
  - the devastator
  lexicon: HALOT
  rationale: The participle denotes one who devastates or plunders. 'Destroyer' fits
    the military-judgment context and reads naturally in English without narrowing
    the action merely to theft.
- source_word: בָא עָלֶיהָ עַל בָּבֶל
  chosen: has come against her, against Babylon
  alternatives:
  - has come upon her, upon Babylon
  lexicon: HALOT
  rationale: 'The double use of עַל is emphatic. Rendering both preserves the force
    of the Hebrew apposition: ''her'' is clarified as Babylon.'
- source_word: וְנִלְכְּדוּ
  chosen: have been captured
  alternatives:
  - were taken
  - have been seized
  lexicon: HALOT
  rationale: The Niphal conveys being taken/captured. 'Have been captured' preserves
    the passive sense and fits the sequence of military defeat.
- source_word: גִּבּוֹרֶיהָ
  chosen: her warriors
  alternatives:
  - her mighty men
  - her heroes
  lexicon: HALOT
  rationale: Though literally 'mighty men,' in this battle context the sense is Babylon's
    fighting men. 'Warriors' communicates the military role clearly in modern English.
- source_word: חִתְּתָה קַשְּׁתוֹתָם
  chosen: their bows are shattered
  alternatives:
  - their bows are broken
  - their bows are smashed
  lexicon: HALOT
  rationale: The verb conveys being broken or shattered. 'Shattered' gives vivid force
    appropriate to the image of military disarmament.
- source_word: אֵל גְּמֻלוֹת
  chosen: a God of recompense
  alternatives:
  - a God of retributions
  - a God of vengeance
  lexicon: HALOT
  rationale: The noun refers to dealings of repayment or requital. 'Recompense' preserves
    the judicial sense of repayment without importing the narrower emotional connotations
    of 'vengeance.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: שַׁלֵּם יְשַׁלֵּם
  chosen: he will surely repay
  alternatives:
  - he will fully repay
  - repaying he will repay
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'Will
    surely repay' is a standard and clear English way to preserve the emphasis.
