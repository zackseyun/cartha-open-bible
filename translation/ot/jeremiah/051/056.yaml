theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of divine judgment in אֵל גְּמֻלוֹת
  chosen_reading: a God of recompense
  alternative_readings:
  - a God of vengeance
  - a God of retributions
  rationale: The phrase presents the LORD as one who repays justly. 'Recompense' preserves
    the judicial and moral sense of repayment without overstating one theological
    nuance beyond the Hebrew term itself.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
