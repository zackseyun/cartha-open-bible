id: JER.51.63
reference: Jeremiah 51:63
source:
  edition: WLC
  text: וְ/הָיָה֙ כְּ/כַלֹּ֣תְ/ךָ֔ לִ/קְרֹ֖א אֶת הַ/סֵּ֣פֶר הַ/זֶּ֑ה תִּקְשֹׁ֤ר עָלָי/ו֙ אֶ֔בֶן וְ/הִשְׁלַכְתּ֖/וֹ אֶל תּ֥וֹךְ פְּרָֽת־־׃
translation:
  text: And when you finish reading this scroll[a], tie a stone to it and throw it into the midst of the Euphrates[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this book.' The Hebrew סֵפֶר can denote a written document generally, but here likely refers to a scroll.
    reason: lexical_alternative
  - marker: b
    text: Or 'into the midst of the Euphrates.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And when
  alternatives:
  - and it shall be
  - and it will happen
  lexicon: HALOT
  rationale: The clause functions idiomatically to introduce a future circumstance ('and it shall be, when...'). In natural English, 'And when' best captures the temporal setup without woodenly preserving the Hebrew existential formula.
- source_word: כְּכַלֹּתְךָ לִקְרֹא
  chosen: you finish reading
  alternatives:
  - you have finished reading
  - your finishing reading
  lexicon: HALOT
  rationale: The preposition כְ with the infinitive construct of כלה plus second masculine singular suffix expresses 'when you finish,' followed by לִקְרֹא, 'to read.' English compresses this naturally as 'when you finish reading.'
- source_word: אֶת־הַסֵּפֶר הַזֶּה
  chosen: this scroll
  alternatives:
  - this book
  - this document
  lexicon: HALOT
  rationale: סֵפֶר in Jeremiah commonly refers to a written scroll rather than a bound modern 'book.' 'Scroll' is more historically precise while remaining readable.
- source_word: תִּקְשֹׁר עָלָיו אֶבֶן
  chosen: tie a stone to it
  alternatives:
  - bind a stone upon it
  - fasten a stone to it
  lexicon: HALOT
  rationale: קשר means 'tie/bind.' The preposition עַל with the pronoun indicates attachment to the scroll. 'Tie a stone to it' is idiomatic and clear.
- source_word: וְהִשְׁלַכְתּוֹ
  chosen: and throw it
  alternatives:
  - and cast it
  - and hurl it
  lexicon: HALOT
  rationale: The Hiphil of שלך means 'throw/cast.' 'Throw' is straightforward modern English; 'cast' is possible but more traditional than necessary.
- source_word: אֶל־תּוֹךְ
  chosen: into the middle of
  alternatives:
  - into the midst of
  - into
  lexicon: HALOT
  rationale: תּוֹךְ denotes the midst or middle. Rendering it explicitly as 'the middle of' preserves the image of throwing the weighted scroll into the river's interior, not merely toward it.
- source_word: פְּרָת
  chosen: the Euphrates
  alternatives:
  - Euphrates
  lexicon: HALOT
  rationale: פְּרָת is the proper name Euphrates. The English article is natural with river names.
