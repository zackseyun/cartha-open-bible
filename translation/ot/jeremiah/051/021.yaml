theological_decisions:
- issue: Instrumentality of the addressee in divine judgment
  chosen_reading: The verse is rendered to show that the addressee is the instrument
    used by God ('with you I shattered') rather than making the addressee the direct
    grammatical subject.
  alternative_readings:
  - by you I shattered
  - through you I shattered
  rationale: The Hebrew repeats first-person verb forms ('I shattered') with second-person
    prepositional phrases, emphasizing YHWH as the acting subject and the addressee
    as the means. This preserves the theology of divine sovereignty in judgment without
    over-interpreting the identity of the addressee within the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
