id: JER.51.21
reference: Jeremiah 51:21
source:
  edition: WLC
  text: וְ/נִפַּצְתִּ֣י בְ/ךָ֔ ס֖וּס וְ/רֹֽכְב֑/וֹ וְ/נִפַּצְתִּ֣י בְ/ךָ֔ רֶ֖כֶב וְ/רֹכְבֽ/וֹ׃
translation:
  text: And with you I shattered horse and rider; and with you I shattered chariot
    and its rider.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I smashed' / 'I broke in pieces'; the Hebrew verb conveys violent breaking.
    reason: lexical_alternative
  - marker: b
    text: Or 'by you' or 'through you'; the Hebrew preposition indicates instrumentality.
    reason: lexical_alternative
  - marker: c
    text: '''Chariot'' may also be understood more collectively as ''chariotry'' in
      some contexts, but the singular pairing here favors ''chariot.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: נִפַּצְתִּי
  chosen: I shattered
  alternatives:
  - I smashed
  - I broke in pieces
  lexicon: HALOT
  rationale: The verb נָפַץ in the Piel commonly conveys forceful smashing or shattering.
    'I shattered' preserves the violent, martial imagery while remaining natural English.
    The repeated form in the verse is rendered consistently.
- source_word: בְּךָ
  chosen: with you
  alternatives:
  - by you
  - through you
  lexicon: HALOT
  rationale: 'In this context the preposition marks instrumentality: Babylon (or the
    addressed battle-weapon in the immediate context) is the means by which YHWH shatters
    nations and military units. ''With you'' is idiomatic and preserves the instrumental
    sense better than the more interpretive ''through you''.'
- source_word: סוּס
  chosen: horse
  alternatives:
  - war horse
  lexicon: HALOT
  rationale: The noun simply means 'horse.' Although the military context implies
    a war horse, the Hebrew does not explicitly specify that, so the simpler gloss
    is preferred.
- source_word: רֹכְבוֹ
  chosen: rider
  alternatives:
  - its rider
  - horseman
  lexicon: HALOT
  rationale: 'The participial form from רכב means ''one who rides.'' ''Rider'' is
    the most direct rendering. In the first pair, English can omit the possessive
    and still convey the sense naturally: ''horse and rider.'''
- source_word: רֶכֶב
  chosen: chariot
  alternatives:
  - chariot-force
  - chariotry
  lexicon: HALOT
  rationale: While רֶכֶב can sometimes denote chariotry collectively, here it is paired
    with 'its rider' in a singular construction, so 'chariot' best matches the syntax
    and imagery.
- source_word: רֹכְבוֹ
  chosen: its rider
  alternatives:
  - rider
  - charioteer
  lexicon: HALOT
  rationale: The same Hebrew form is used again, but in English 'its rider' clarifies
    the relation to 'chariot.' 'Charioteer' is possible contextually, but the Hebrew
    remains the broader 'rider/driver,' so the less specific rendering is preferred.
