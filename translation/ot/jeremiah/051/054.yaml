id: JER.51.54
reference: Jeremiah 51:54
source:
  edition: WLC
  text: ק֥וֹל זְעָקָ֖ה מִ/בָּבֶ֑ל וְ/שֶׁ֥בֶר גָּד֖וֹל מֵ/אֶ֥רֶץ כַּשְׂדִּֽים׃
translation:
  text: The sound of a cry comes from Babylon, and great destruction from the land
    of the Chaldeans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The sound of an outcry from Babylon, and great ruin from the land of
      the Chaldeans.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֥וֹל
  chosen: The sound
  alternatives:
  - A sound
  - The noise
  - The voice
  lexicon: HALOT
  rationale: קוֹל commonly denotes 'sound, voice, noise.' In construct with זְעָקָה,
    the sense is not a speaking voice but the audible report/noise of crying out.
    'The sound' is natural English and preserves the concrete auditory image.
- source_word: זְעָקָ֖ה
  chosen: of a cry
  alternatives:
  - of crying out
  - of an outcry
  lexicon: HALOT
  rationale: זְעָקָה denotes a cry, outcry, or shriek, often in distress. 'Cry' is
    concise and idiomatic with 'sound of.' 'Outcry' is possible but can sound more
    juridical or collective than the immediate lament here.
- source_word: מִ/בָּבֶ֑ל
  chosen: comes from Babylon
  alternatives:
  - from Babylon
  lexicon: HALOT
  rationale: 'The preposition מִן marks source: ''from Babylon.'' Because the Hebrew
    is verbless, English benefits from supplying ''comes'' to make a complete clause
    while preserving the sense of an audible report issuing from Babylon.'
- source_word: וְ/שֶׁ֥בֶר
  chosen: and great destruction
  alternatives:
  - and ruin
  - and a crash
  - and breaking
  lexicon: HALOT
  rationale: שֶׁבֶר can denote breaking, fracture, collapse, or destruction. In prophetic
    judgment context, 'destruction' best conveys catastrophic ruin rather than a literal
    breakage. The conjunction links a second parallel report from the same event.
- source_word: גָּד֖וֹל
  chosen: great
  alternatives:
  - mighty
  - vast
  lexicon: HALOT
  rationale: גָּדוֹל straightforwardly means 'great.' It intensifies the scale of
    the destruction without requiring a more interpretive adjective.
- source_word: מֵ/אֶ֥רֶץ
  chosen: from the land of
  alternatives:
  - from the country of
  lexicon: HALOT
  rationale: אֶרֶץ here refers to territory/land rather than the earth in general.
    'Land of' is the standard and most transparent rendering in geopolitical contexts.
- source_word: כַּשְׂדִּֽים
  chosen: the Chaldeans
  alternatives:
  - Chaldea
  lexicon: HALOT
  rationale: The Hebrew names the people, 'Chaldeans,' not the abstract place-name.
    Rendering 'the land of the Chaldeans' preserves the ethnogeographic expression
    of the source text.
