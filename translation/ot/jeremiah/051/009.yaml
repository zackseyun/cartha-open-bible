theological_decisions:
- issue: Referent and force of Babylon's 'judgment' reaching heaven
  chosen_reading: The verse speaks of Babylon's judicial case/condemnation rising before God, not of Babylon's moral righteousness.
  alternative_readings:
  - her punishment has reached heaven
  - her crime has reached heaven
  rationale: The noun מִשְׁפָּט most naturally denotes judgment or legal decision. In context of announced doom, the image is that Babylon's case has come before heaven and warrants irreversible judgment. Rendering 'judgment' preserves the legal-theological nuance without collapsing it into either sin or punishment alone.
  doctrine_reference: Translation philosophy §3, §5
