id: JER.51.9
reference: Jeremiah 51:9
source:
  edition: WLC
  text: רפאנו אֶת בָּבֶל֙ וְ/לֹ֣א נִרְפָּ֔תָה עִזְב֕וּ/הָ וְ/נֵלֵ֖ךְ אִ֣ישׁ לְ/אַרְצ֑/וֹ כִּֽי נָגַ֤ע אֶל הַ/שָּׁמַ֨יִם֙ מִשְׁפָּטָ֔/הּ וְ/נִשָּׂ֖א עַד שְׁחָקִֽים־־־־׃
translation:
  text: We tried to heal Babylon[a], but she was not healed. Leave her, and let each one go to his own land[c][b], for her judgment has reached to heaven and has been lifted up to the skies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''each man to his own land.'' The Hebrew is literally singular and masculine: ''a man to his land.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'her sentence' or 'her punishment'; the Hebrew word can carry judicial and punitive overtones.
    reason: lexical_alternative
  - marker: c
    text: '''Skies'' translates a Hebrew term for the high clouds or upper heavens.'
    reason: cultural_note
lexical_decisions:
- source_word: רפאנו
  chosen: We tried to heal
  alternatives:
  - We healed
  - We would heal
  lexicon: HALOT
  rationale: Qal perfect 1cp of רפא, 'to heal.' In context it functions as a completed attempt rather than a successful cure, especially followed by 'but she was not healed.' English idiom 'tried to heal' best conveys the sense.
- source_word: בָּבֶל
  chosen: Babylon
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: נִרְפָּתָה
  chosen: was not healed
  alternatives:
  - could not be healed
  lexicon: HALOT
  rationale: Niphal perfect 3fs of רפא, passive/reflexive sense. The straightforward passive 'was not healed' matches the Hebrew form and keeps the parallel with the first clause.
- source_word: עִזְבוּהָ
  chosen: Leave her
  alternatives:
  - Forsake her
  - Abandon her
  lexicon: HALOT
  rationale: Imperative plural with 3fs suffix from עזב. 'Leave her' is natural modern English and fits the call to depart from Babylon.
- source_word: וְנֵלֵךְ
  chosen: and let us ... go
  alternatives:
  - and we will go
  - and let us go
  lexicon: HALOT
  rationale: Cohortative 1cp of הלך. The cohortative nuance is best represented by 'let us go.'
- source_word: אִישׁ לְאַרְצוֹ
  chosen: each go to his own land
  alternatives:
  - every man to his own land
  - each to his own country
  lexicon: HALOT
  rationale: Literally 'a man to his land.' Per gender-accurate policy, the distributive sense is preserved with 'each ... to his own land,' retaining the masculine singular representative force without flattening it into a plural abstraction.
- source_word: מִשְׁפָּטָהּ
  chosen: her judgment
  alternatives:
  - her justice
  - her sentence
  - her punishment
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote judgment, justice, legal decision. Here the context is Babylon's doom, so 'judgment' best captures the judicial sense without over-specifying punishment.
- source_word: נָגַע אֶל הַשָּׁמַיִם
  chosen: has reached to heaven
  alternatives:
  - touches heaven
  - has touched the heavens
  lexicon: HALOT
  rationale: נגע with אֶל expresses reaching/touching. Present perfect in English conveys the completed state with present relevance.
- source_word: וְנִשָּׂא עַד שְׁחָקִים
  chosen: and has been lifted up to the skies
  alternatives:
  - and rises up to the clouds
  - and is raised up to the clouds
  - and has been exalted to the skies
  lexicon: HALOT
  rationale: Niphal perfect/passive of נשׂא, 'be lifted up.' שׁחקים refers to skies/cloud-heights. 'Lifted up to the skies' preserves the elevated imagery and parallels 'reached to heaven.'
