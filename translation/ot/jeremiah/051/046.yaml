id: JER.51.46
reference: Jeremiah 51:46
source:
  edition: WLC
  text: וּ/פֶן יֵרַ֤ךְ לְבַבְ/כֶם֙ וְ/תִֽירְא֔וּ בַּ/שְּׁמוּעָ֖ה הַ/נִּשְׁמַ֣עַת בָּ/אָ֑רֶץ וּ/בָ֧א בַ/שָּׁנָ֣ה הַ/שְּׁמוּעָ֗ה וְ/אַחֲרָ֤י/ו בַּ/שָּׁנָה֙ הַ/שְּׁמוּעָ֔ה וְ/חָמָ֣ס בָּ/אָ֔רֶץ וּ/מֹשֵׁ֖ל עַל מֹשֵֽׁל־־׃
translation:
  text: And do not let your heart grow faint[a], and do not fear the report heard in the land; a report will come in one year, and after it in the next year another report, and violence in the land[c][b], ruler against ruler.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rumor' or 'news' for 'report' (שְׁמוּעָה). The Hebrew term can denote any circulated tidings, whether confirmed or not.
    reason: lexical_alternative
  - marker: b
    text: Literally 'lest your heart become soft.' The expression means to lose courage or grow fainthearted.
    reason: lexical_alternative
  - marker: c
    text: Or 'ruler over ruler.' The phrase may describe either conflict between rulers or rapid political turnover.
    reason: alternative_reading
lexical_decisions:
- source_word: וּפֶן
  chosen: And do not
  alternatives:
  - lest
  - otherwise
  lexicon: HALOT
  rationale: 'The particle פן often introduces a negative warning (''lest''). In English, the following jussive/imperfect sequence is most naturally rendered as a direct prohibition: ''do not let... and do not fear.'' This preserves the warning force while reading smoothly.'
- source_word: יֵרַךְ לְבַבְכֶם
  chosen: your heart grow faint
  alternatives:
  - your heart become soft
  - your courage melt
  lexicon: HALOT
  rationale: The verb רכך literally means 'be soft/weak.' With 'heart' in this context it idiomatically refers to loss of courage. 'Grow faint' preserves the metaphor without over-paraphrasing.
- source_word: וְתִירְאוּ
  chosen: and do not fear
  alternatives:
  - and be afraid
  lexicon: HALOT
  rationale: ירא in the Qal commonly means 'fear, be afraid.' The negative-prohibitive sense is carried over from the opening warning construction.
- source_word: בַּשְּׁמוּעָה הַנִּשְׁמַעַת בָּאָרֶץ
  chosen: the report heard in the land
  alternatives:
  - the rumor heard in the land
  - the news heard in the land
  lexicon: HALOT
  rationale: שְׁמוּעָה can mean 'report, news, rumor.' Here the context is repeated alarming tidings about political upheaval. 'Report' is broad enough to include rumor/news without implying falsehood. The participle נִשְׁמַעַת is retained as 'heard.'
- source_word: וּבָא בַשָּׁנָה הַשְּׁמוּעָה
  chosen: a report will come in one year
  alternatives:
  - the report will come in that year
  - news will come in a year
  lexicon: HALOT
  rationale: The clause predicts the arrival of such tidings. English idiom prefers 'a report will come in one year' rather than a more wooden 'in the year.' The indefinite sense fits the sequence of recurring reports.
- source_word: וְאַחֲרָיו בַּשָּׁנָה הַשְּׁמוּעָה
  chosen: and after it in the next year another report
  alternatives:
  - and after that, in the year, a report
  - and after him, in the next year, a report
  lexicon: HALOT
  rationale: אַחֲרָיו refers back to the prior report/time sequence ('after it/after that'). Supplying 'next' and 'another' makes explicit the iterative sense already present in Hebrew context, without changing meaning.
- source_word: וְחָמָס בָּאָרֶץ
  chosen: and violence in the land
  alternatives:
  - and oppression in the land
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence, wrong, or ruthless injustice. 'Violence' is the most direct and common rendering in prophetic judgment contexts.
- source_word: וּמֹשֵׁל עַל מֹשֵׁל
  chosen: ruler against ruler
  alternatives:
  - one ruler against another ruler
  - ruler over ruler
  lexicon: HALOT
  rationale: Though עַל often means 'over,' in conflict contexts the phrase can denote opposition or succession amid turmoil. 'Ruler against ruler' best fits the context of unrest and political upheaval in the land.
