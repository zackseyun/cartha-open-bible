id: JER.51.40
reference: Jeremiah 51:40
source:
  edition: WLC
  text: אֽוֹרִידֵ֖/ם כְּ/כָרִ֣ים לִ/טְב֑וֹחַ כְּ/אֵילִ֖ים עִם עַתּוּדִֽים־׃
translation:
  text: I will bring them down like lambs to the slaughter, like rams with male goats.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like young rams' for כָּרִים.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֽוֹרִידֵם
  chosen: I will bring them down
  alternatives:
  - I will lead them down
  - I will bring them down alive
  lexicon: HALOT
  rationale: Hiphil of ירד means to cause to go down, bring down, or lead down. In
    this judgment context, 'bring them down' preserves the causative force without
    overinterpreting the manner. It also fits the imagery of animals being taken down
    for slaughter.
- source_word: כְּכָרִים
  chosen: like lambs
  alternatives:
  - like young rams
  lexicon: HALOT
  rationale: כָּרִים commonly denotes lambs or young rams. 'Lambs' is the more natural
    English pairing with 'to the slaughter' and highlights vulnerability in the simile.
    The possible nuance 'young rams' is preserved as an alternative.
- source_word: לִטְבֹחַ
  chosen: to the slaughter
  alternatives:
  - for slaughter
  - to be slaughtered
  lexicon: HALOT
  rationale: The infinitive construct from טבח refers to slaughtering. 'To the slaughter'
    is idiomatic English and preserves the directional sense after 'bring them down,'
    while clearly conveying impending death.
- source_word: כְּאֵילִים
  chosen: like rams
  alternatives:
  - like strong rams
  lexicon: HALOT
  rationale: אֵילִים straightforwardly means 'rams.' Although the noun can carry associations
    of strength, the animal image is primary here, so the simple rendering is preferred.
- source_word: עִם עַתּוּדִים
  chosen: with male goats
  alternatives:
  - with he-goats
  - with goats
  lexicon: HALOT
  rationale: עַתּוּדִים denotes male goats, often he-goats or billy goats. 'Male goats'
    is clear modern English and preserves the sex-specific distinction present in
    the Hebrew.
