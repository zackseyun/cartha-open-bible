theological_decisions:
- issue: Nature of הָרָעָה in divine judgment language
  chosen_reading: Rendered as 'disaster' rather than 'evil'
  alternative_readings:
  - evil
  - calamity
  rationale: In this judgment context, the term denotes calamity brought in punishment, not moral evil in God. This avoids implying that God brings moral evil while preserving the severity of the announced judgment.
  doctrine_reference: 'Translation philosophy: do not import doctrinal claims the text does not make; preserve plain sense of Hebrew.'
