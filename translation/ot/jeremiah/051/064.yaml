id: JER.51.64
reference: Jeremiah 51:64
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֗ כָּ֠כָה תִּשְׁקַ֨ע בָּבֶ֤ל וְ/לֹֽא תָקוּם֙ מִ/פְּנֵ֣י הָ/רָעָ֗ה אֲשֶׁ֧ר אָנֹכִ֛י מֵבִ֥יא עָלֶ֖י/הָ וְ/יָעֵ֑פוּ עַד הֵ֖נָּה דִּבְרֵ֥י יִרְמְיָֽהוּ־־׃ס
translation:
  text: And you shall say[a], ‘Thus Babylon will sink and will not rise because of the disaster that I am bringing upon her, and they will grow weary.’ Up to this point are the words of Jeremiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and they will be exhausted' / 'and they will faint.' The Hebrew verb can denote weariness or exhaustion; the plural likely refers to Babylon's people rather than the city itself.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  chosen: And you shall say
  alternatives:
  - Then you shall say
  - And you must say
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction in instructional sequence functions as an imperative/future-like command. 'You shall say' preserves the formal force without sounding overly stiff.
- source_word: כָּכָה
  chosen: Thus
  alternatives:
  - So
  - In this way
  lexicon: HALOT
  rationale: Standard prophetic/deictic adverb introducing the symbolic interpretation. 'Thus' fits the solemn register and concise force.
- source_word: תִּשְׁקַע
  chosen: will sink
  alternatives:
  - will sink down
  - will subside
  lexicon: HALOT
  rationale: Qal imperfect 3fs from שקע, used of sinking downward. 'Will sink' is the plain image and matches the enacted sign with the scroll sunk in the Euphrates in the preceding context.
- source_word: בָּבֶל
  chosen: Babylon
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: וְלֹא תָקוּם
  chosen: and will not rise
  alternatives:
  - and will not get up again
  - and will not stand
  lexicon: HALOT
  rationale: קום in this context contrasts with sinking and denotes not rising again. 'Rise' preserves the antithetical imagery better than 'stand.'
- source_word: מִפְּנֵי הָרָעָה
  chosen: because of the disaster
  alternatives:
  - from before the disaster
  - because of the evil
  lexicon: HALOT
  rationale: The idiom מִפְּנֵי commonly expresses causation ('because of, on account of'). הָרָעָה here refers to calamity/judgment rather than moral evil, so 'disaster' best fits context.
- source_word: אֲשֶׁר אָנֹכִי מֵבִיא עָלֶיהָ
  chosen: that I am bringing upon her
  alternatives:
  - which I am bringing against her
  - that I will bring upon her
  lexicon: HALOT
  rationale: The participle מֵבִיא conveys imminent or ongoing action. 'Bringing upon her' is a natural English rendering of the judgment formula.
- source_word: וְיָעֵפוּ
  chosen: and they will grow weary
  alternatives:
  - and they will be exhausted
  - and they will faint
  lexicon: HALOT
  rationale: From יעף, 'to be weary/faint.' The 3cp shifts to Babylon's people/participants rather than the city as feminine singular. 'Grow weary' preserves the verbal nuance and avoids overinterpreting the subject.
- source_word: עַד הֵנָּה
  chosen: Up to this point
  alternatives:
  - Thus far
  - Until here
  lexicon: HALOT
  rationale: Colophon-like phrase marking the end of a section. 'Up to this point' is clear modern English.
- source_word: דִּבְרֵי יִרְמְיָהוּ
  chosen: are the words of Jeremiah
  alternatives:
  - are Jeremiah's words
  lexicon: HALOT
  rationale: Nominal clause concluding the collection. Supplying 'are' is required in English; the fuller phrasing preserves the formal ending.
