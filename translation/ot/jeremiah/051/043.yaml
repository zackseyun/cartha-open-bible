id: JER.51.43
reference: Jeremiah 51:43
source:
  edition: WLC
  text: הָי֤וּ עָרֶ֨י/הָ֙ לְ/שַׁמָּ֔ה אֶ֖רֶץ צִיָּ֣ה וַ/עֲרָבָ֑ה אֶ֗רֶץ לֹֽא יֵשֵׁ֤ב
    בָּ/הֵן֙ כָּל אִ֔ישׁ וְ/לֹֽא יַעֲבֹ֥ר בָּ/הֵ֖ן בֶּן אָדָֽם־־־־׃
translation:
  text: Her cities have become a desolation, a dry land and a desert, a land where
    no man lives, and through which no son of man passes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its cities'; the Hebrew uses a feminine singular suffix, reflecting
      Babylon personified as a woman.
    reason: lexical_alternative
  - marker: b
    text: Or 'a parched land and a steppe.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'no man' and 'no son of man'; these are generic expressions for human
      inhabitants and travelers.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרֶיהָ
  chosen: her cities
  alternatives:
  - its cities
  lexicon: HALOT
  rationale: The 3fs suffix refers to Babylon personified as feminine in the surrounding
    context, so 'her cities' preserves the Hebrew personification better than the
    more impersonal 'its cities'.
- source_word: לְשַׁמָּה
  chosen: a desolation
  alternatives:
  - for horror
  - for astonishment
  lexicon: HALOT
  rationale: שַׁמָּה commonly denotes desolation/devastation; 'a desolation' fits
    the judgment context and natural English. Alternatives like 'horror' or 'astonishment'
    reflect the term's connotations in some contexts but are less direct here.
- source_word: אֶרֶץ צִיָּה
  chosen: a dry land
  alternatives:
  - a parched land
  - an arid land
  lexicon: HALOT
  rationale: צִיָּה denotes dryness/parchedness. 'A dry land' is clear modern English
    and pairs well with the following term without over-poeticizing.
- source_word: וַעֲרָבָה
  chosen: and a desert
  alternatives:
  - and a wasteland
  - and a steppe
  lexicon: HALOT
  rationale: עֲרָבָה can denote desert steppe/arid plain. 'Desert' is the most accessible
    rendering in context, while 'steppe' is more technical and 'wasteland' overlaps
    too much with the previous noun.
- source_word: אֶרֶץ לֹא יֵשֵׁב בָּהֵן כָּל אִישׁ
  chosen: a land where no man lives
  alternatives:
  - a land in which no one dwells
  - a land where no person lives
  lexicon: HALOT
  rationale: The clause is idiomatically rendered with an English relative clause.
    Because אִישׁ is singular generic, 'no man' preserves the Hebrew's gender-accurate
    representative force per translation philosophy; 'no one' is possible but less
    formally aligned.
- source_word: וְלֹא יַעֲבֹר בָּהֵן
  chosen: and through which ... passes
  alternatives:
  - and no one passes through them
  - and no one travels through them
  lexicon: HALOT
  rationale: עבר with ב conveys passing through. Rendering with 'through which' links
    naturally to 'land' in English while preserving the sense of traversal.
- source_word: בֶּן אָדָם
  chosen: son of man
  alternatives:
  - human being
  - anyone
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'son of man.' In this prophetic context
    it functions generically for a human being, but the translation philosophy prefers
    gender-accurate renderings where the source uses masculine representative language.
    The more idiomatic alternatives are preserved in a footnote.
- source_word: הָיוּ
  chosen: have become
  alternatives:
  - became
  - are
  lexicon: HALOT
  rationale: The qatal here describes the resultant state of Babylon's judged cities.
    'Have become' communicates the transition into desolation in natural English better
    than the simple past 'became,' while 'are' would lose the verbal force.
