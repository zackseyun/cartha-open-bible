id: JER.51.38
reference: Jeremiah 51:38
source:
  edition: WLC
  text: יַחְדָּ֖ו כַּ/כְּפִרִ֣ים יִשְׁאָ֑גוּ נָעֲר֖וּ כְּ/גוֹרֵ֥י אֲרָיֽוֹת׃
translation:
  text: Together they roar like young lions; they growl like lion cubs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they snarl like lion cubs.' The Hebrew verb can denote a harsh animal
      cry; 'growl' is chosen as the most natural fit in this parallel with roaring
      lions.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחְדָּו
  chosen: Together
  alternatives:
  - Altogether
  - As one
  lexicon: HALOT
  rationale: Adverb indicating collective action. 'Together' is natural modern English
    and preserves the sense of unified behavior.
- source_word: כְּפִרִים
  chosen: young lions
  alternatives:
  - lions
  - lion whelps
  lexicon: HALOT
  rationale: כפיר commonly denotes a young lion, often one vigorous enough to hunt
    and roar. 'Young lions' is the standard clear rendering.
- source_word: יִשְׁאָגוּ
  chosen: they roar
  alternatives:
  - they roar loudly
  lexicon: HALOT
  rationale: The verb שאג is the normal verb for the roaring of lions. 'They roar'
    is direct and sufficient without adding intensity not explicit in the Hebrew.
- source_word: נָעֲרוּ
  chosen: they growl
  alternatives:
  - they snarl
  - they cry out
  lexicon: HALOT
  rationale: The verb נער in this animal-sound context refers to uttering a harsh
    sound. Because the parallel image is leonine and the following phrase specifies
    lion cubs, 'growl' best captures the sound in idiomatic English. 'Snarl' is possible
    but suggests facial expression more than vocalization.
- source_word: גֹרֵי אֲרָיוֹת
  chosen: lion cubs
  alternatives:
  - whelps of lions
  - young lions
  lexicon: HALOT
  rationale: Construct phrase meaning the young of lions. 'Lion cubs' is clear, contemporary,
    and preserves the distinction from כְּפִרִים while still overlapping semantically
    as in the Hebrew poetic parallelism.
