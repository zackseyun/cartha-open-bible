id: JER.51.17
reference: Jeremiah 51:17
source:
  edition: WLC
  text: נִבְעַ֤ר כָּל אָדָם֙ מִ/דַּ֔עַת הֹבִ֥ישׁ כָּל צֹרֵ֖ף מִ/פָּ֑סֶל כִּ֛י שֶׁ֥קֶר
    נִסְכּ֖/וֹ וְ/לֹא ר֥וּחַ בָּֽ/ם־־־׃
translation:
  text: Every man is made brutish, without knowledge; every metalworker is put to
    shame by his idol, for his cast image is falsehood, and there is no breath in
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'there is no spirit in them.' Hebrew רוּחַ can mean 'breath,' 'wind,'
      or 'spirit'; here 'breath' is preferred because the point is that idols are
      lifeless.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִבְעַר
  chosen: is made brutish
  alternatives:
  - is stupid
  - is senseless
  - becomes brutish
  lexicon: HALOT
  rationale: From בער in the Niphal, conveying being made dull, stupid, or brutish.
    'Is made brutish' preserves the prophetic, morally charged sense better than the
    flatter 'is stupid,' while remaining intelligible.
- source_word: כָּל אָדָם
  chosen: Every man
  alternatives:
  - all humankind
  - everyone
  lexicon: HALOT
  rationale: אָדָם here is generic for humanity, but the source is singular masculine
    and the doctrine calls for gender-accurate rendering where representative force
    is present. 'Every man' preserves the Hebrew form and distributive sense.
- source_word: מִדַּעַת
  chosen: without knowledge
  alternatives:
  - from knowledge
  - for lack of knowledge
  lexicon: HALOT
  rationale: The preposition מִן with an abstract noun here is privative/comparative
    in force. 'Without knowledge' is idiomatic English and matches the sense that
    people are shown to be senseless in relation to knowledge.
- source_word: הֹבִישׁ
  chosen: is put to shame
  alternatives:
  - is ashamed
  - is disgraced
  lexicon: HALOT
  rationale: Hiphil of בוש commonly means to cause shame or bring to shame. Passive
    English 'is put to shame' best reflects the causative nuance in context.
- source_word: צֹרֵף
  chosen: metalworker
  alternatives:
  - goldsmith
  - refiner
  - smith
  lexicon: HALOT
  rationale: The participle can denote a smelter/refiner or one who works metal. In
    the idol-making context, 'metalworker' is broad and clear, avoiding over-specification
    to gold alone.
- source_word: מִפָּסֶל
  chosen: by his idol
  alternatives:
  - by the carved image
  - because of the idol
  lexicon: HALOT
  rationale: פֶּסֶל is an idol/image, often carved. With מִן after 'put to shame,'
    the sense is shame occasioned by or because of the idol. 'By his idol' is concise
    and natural, while the following clause specifies the image further.
- source_word: שֶׁקֶר
  chosen: falsehood
  alternatives:
  - a lie
  - deception
  lexicon: HALOT
  rationale: The noun denotes falsehood or lie. 'Falsehood' fits the predicate construction
    and the denunciatory tone of prophetic polemic.
- source_word: נִסְכּוֹ
  chosen: his cast image
  alternatives:
  - his molten image
  - his metal image
  lexicon: HALOT
  rationale: From נסך/related noun usage for a poured or cast idol. 'Cast image' is
    standard, clear English and distinguishes it from the earlier broader פֶּסֶל.
- source_word: וְלֹא רוּחַ בָּם
  chosen: there is no breath in them
  alternatives:
  - there is no spirit in them
  lexicon: HALOT
  rationale: רוּחַ can mean breath, wind, or spirit. In idol-polemic, the point is
    lifelessness, so 'breath' best conveys the contrast with living beings. The plural
    pronoun 'them' refers to the idols/images collectively.
