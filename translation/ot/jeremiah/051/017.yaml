theological_decisions:
- issue: Rendering of אָדָם in a generic statement
  chosen_reading: Every man
  alternative_readings:
  - all humankind
  - everyone
  rationale: The Hebrew uses a grammatically masculine singular noun with representative
    force. Following the doctrine's gender-accurate principle, the translation preserves
    the source form rather than neutralizing it, while the sense remains generic.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4; Contested terms table
    for אָדָם
- issue: Rendering of רוּחַ in idol polemic
  chosen_reading: breath
  alternative_readings:
  - spirit
  rationale: The verse argues that idols are lifeless fabrications. 'Breath' foregrounds
    absence of life rather than making a metaphysical claim about spirit. The alternative
    is preserved because רוּחַ is semantically broader.
  doctrine_reference: DOCTRINE.md § Translation philosophy 3
