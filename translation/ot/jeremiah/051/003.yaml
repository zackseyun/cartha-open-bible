- issue: Rendering of חרם language in a judgment oracle
  chosen_reading: devote all her army to destruction
  alternative_readings:
  - utterly destroy all her army
  - put all her army under the ban
  rationale: The Hebrew uses חרם, a term associated with consecration to destruction in divine judgment. The chosen rendering preserves the theological weight of the term without importing extra doctrinal claims beyond the text.
