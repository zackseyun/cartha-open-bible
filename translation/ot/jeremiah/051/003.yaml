id: JER.51.3
reference: Jeremiah 51:3
source:
  edition: WLC
  text: אֶֽל יִדְרֹ֤ךְ ידרך הַ/דֹּרֵךְ֙ קַשְׁתּ֔/וֹ וְ/אֶל יִתְעַ֖ל בְּ/סִרְיֹנ֑/וֹ וְ/אַֽל תַּחְמְלוּ֙ אֶל בַּ֣חֻרֶ֔י/הָ הַחֲרִ֖ימוּ כָּל צְבָאָֽ/הּ־־־־־׃
translation:
  text: Let not the archer bend his bow[a], and let him not rise up in his armor. Do not spare her young men[c][b]; devote all her army to destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let the bowman string his bow'; the Hebrew of the opening clause is difficult and repetitive, but the sense is a prohibition directed at the archer.
    reason: alternative_reading
  - marker: b
    text: Or 'in his coat of mail' or 'in his breastplate.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'devote to destruction,' a term used for placing persons or things under the ban in divine judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶל / וְאֶל / וְאַל
  chosen: Let not / and let him not / Do not
  alternatives:
  - Against
  - to
  lexicon: HALOT
  rationale: Here the negative particles with imperfect/jussive forms function as prohibitions. Rendering them as English prohibitions best reflects the syntax and sense in context, rather than the prepositional sense of אֶל.
- source_word: יִדְרֹךְ ... הַדֹּרֵךְ קַשְׁתּוֹ
  chosen: the archer bend his bow
  alternatives:
  - him who bends his bow tread/bend his bow
  - let the bowman string his bow
  lexicon: HALOT
  rationale: דרך with קשת is an idiom for bending/stringing a bow. The repeated form in the Hebrew is difficult, but the sense is clearly the bowman preparing to shoot. 'Archer' makes the clause readable while preserving the martial image.
- source_word: יִתְעַל
  chosen: rise up
  alternatives:
  - lift himself up
  - mount up
  lexicon: HALOT
  rationale: The Hitpael of עלה here conveys raising oneself up or advancing/preparing oneself. 'Rise up' is a natural English equivalent that fits the military context without overinterpreting.
- source_word: בְּסִרְיֹנוֹ
  chosen: in his armor
  alternatives:
  - in his coat of mail
  - in his breastplate
  lexicon: HALOT
  rationale: סִרְיוֹן denotes body armor, often scale armor or a coat of mail. 'Armor' is clear modern English; the more specific alternatives are possible but less certain in this context.
- source_word: תַּחְמְלוּ
  chosen: spare
  alternatives:
  - have compassion on
  - show pity to
  lexicon: HALOT
  rationale: The verb חמל commonly means to spare or have pity. In a warfare oracle, 'spare' best captures the practical force of the command.
- source_word: בַּחֻרֶיהָ
  chosen: her young men
  alternatives:
  - her chosen men
  - her warriors
  lexicon: HALOT
  rationale: בחור usually denotes a young man, often one in his prime and thus fit for battle. 'Young men' is the most direct rendering; the military implication is supplied by context.
- source_word: הַחֲרִימוּ
  chosen: devote ... to destruction
  alternatives:
  - utterly destroy
  - put under the ban
  lexicon: HALOT
  rationale: חרם in the Hiphil carries the sense of placing under the ban, devoting to destruction. Because this term has theological and lexical weight, the fuller phrase 'devote ... to destruction' preserves that nuance better than simply 'destroy'.
- source_word: כָּל צְבָאָהּ
  chosen: all her army
  alternatives:
  - all her host
  - all her forces
  lexicon: HALOT
  rationale: צבא here refers to military forces. 'Army' is the clearest singular collective in modern English; 'host' is traditional but archaic.
