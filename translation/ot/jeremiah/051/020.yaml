theological_decisions:
- issue: Identity of the singular addressee ('you') in the oracle
  chosen_reading: Retain the second-person singular without specifying the referent in translation.
  alternative_readings:
  - Babylon as God's instrument
  - Cyrus/Medo-Persia
  - Israel/Jacob
  rationale: The Hebrew verse itself does not name the addressee, and interpreters differ based on broader context. To avoid importing a disputed identification into the text, the translation preserves the ambiguity and lets context and notes handle interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
