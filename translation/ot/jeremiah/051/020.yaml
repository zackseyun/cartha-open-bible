id: JER.51.20
reference: Jeremiah 51:20
source:
  edition: WLC
  text: מַפֵּץ אַתָּ֣ה לִ֔/י כְּלֵ֖י מִלְחָמָ֑ה וְ/נִפַּצְתִּ֤י בְ/ךָ֙ גּוֹיִ֔ם וְ/הִשְׁחַתִּ֥י בְ/ךָ֖ מַמְלָכֽוֹת־׃
translation:
  text: You are my war club[a], my weapon of battle; with you I shatter nations[b], and with you I destroy kingdoms.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'battle-axe' or 'hammer' for 'war club'; the Hebrew denotes a smashing weapon.
    reason: lexical_alternative
  - marker: b
    text: The 'you' is singular. The referent is not named in this verse; interpreters variously identify it as Babylon, Cyrus/Medo-Persia, or Israel/Jacob from the surrounding context.
    reason: alternative_reading
lexical_decisions:
- source_word: מַפֵּץ
  chosen: war club
  alternatives:
  - battle-axe
  - hammer
  - club
  lexicon: HALOT
  rationale: The noun denotes an instrument used to smash or shatter. 'War club' best fits the immediate martial context and avoids the more specific but less certain 'battle-axe.' The following verb נִפַּצְתִּי ('I shatter') supports an implement associated with crushing.
- source_word: לִי
  chosen: my
  alternatives:
  - for me
  - to me
  lexicon: HALOT
  rationale: 'Although formally ''to/for me,'' in predicative possession English idiom is best expressed as ''my'': ''You are my war club.'' This preserves the sense of divine possession/instrumentality.'
- source_word: כְּלֵי מִלְחָמָה
  chosen: weapon of battle
  alternatives:
  - weapons of war
  - battle weapon
  - implements of war
  lexicon: HALOT
  rationale: The construct phrase is literally 'vessels/implements of war.' Because the addressee is singular, rendering the collective/instrumental sense with singular 'weapon of battle' reads naturally in English while matching the singular address. 'Battle' preserves the martial register without archaic tone.
- source_word: נִפַּצְתִּי
  chosen: I shatter
  alternatives:
  - I smash
  - I break in pieces
  lexicon: HALOT
  rationale: The Piel conveys forceful breaking or smashing. 'I shatter' is vivid, natural English and aligns semantically with מַפֵּץ. Present tense in English reflects the prophetic declaration's vividness better than a wooden past/perfect rendering here.
- source_word: בְּךָ
  chosen: with you
  alternatives:
  - by you
  - through you
  lexicon: HALOT
  rationale: The preposition marks instrumentality. 'With you' is the most idiomatic English rendering in this repeated construction and preserves the image of Babylon as God's instrument.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - peoples
  - Gentiles
  lexicon: HALOT
  rationale: In this judgment context the term refers to political entities rather than specifically non-Israelites as a theological category. 'Nations' is the standard and clearest rendering.
- source_word: הִשְׁחַתִּי
  chosen: I destroy
  alternatives:
  - I ruin
  - I lay waste to
  lexicon: HALOT
  rationale: The Hiphil of שׁחת here expresses causing destruction. 'I destroy' is direct and fits the parallelism with 'I shatter.'
- source_word: מַמְלָכוֹת
  chosen: kingdoms
  alternatives:
  - realms
  - kingdoms of men
  lexicon: HALOT
  rationale: The noun denotes kingdoms or royal domains. 'Kingdoms' is the straightforward political term and pairs well with 'nations' in the parallel line.
