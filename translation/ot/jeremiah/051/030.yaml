id: JER.51.30
reference: Jeremiah 51:30
source:
  edition: WLC
  text: חָדְלוּ֩ גִבּוֹרֵ֨י בָבֶ֜ל לְ/הִלָּחֵ֗ם יָֽשְׁבוּ֙ בַּ/מְּצָד֔וֹת נָשְׁתָ֥ה
    גְבוּרָתָ֖/ם הָי֣וּ לְ/נָשִׁ֑ים הִצִּ֥יתוּ מִשְׁכְּנֹתֶ֖י/הָ נִשְׁבְּר֥וּ בְרִיחֶֽי/הָ׃
translation:
  text: The warriors of Babylon have stopped fighting; they sit in the strongholds.
    Their strength has failed; they have become like women. Her dwellings are set
    on fire; her bars are broken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'they have become women'—a Hebrew taunt for loss of
      courage in battle.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָדְלוּ
  chosen: have stopped
  alternatives:
  - ceased
  lexicon: HALOT
  rationale: Qal perfect 3cp of חדל denotes cessation. 'Have stopped' is natural modern
    English and preserves the completed action.
- source_word: גִבּוֹרֵי
  chosen: warriors
  alternatives:
  - mighty men
  - heroes
  lexicon: HALOT
  rationale: Though literally 'mighty ones,' in military context 'warriors' best conveys
    fighting men without archaic tone.
- source_word: לְהִלָּחֵם
  chosen: fighting
  alternatives:
  - to fight
  - from fighting
  lexicon: HALOT
  rationale: Infinitive construct with ל after חדל expresses cessation of the activity.
    English idiom prefers 'stopped fighting.'
- source_word: יָשְׁבוּ
  chosen: they sit
  alternatives:
  - they have sat down
  - they remain
  lexicon: HALOT
  rationale: Basic sense is 'sit/dwell/remain.' Here it depicts their passive withdrawal
    into defenses; present 'sit' gives vividness and matches the parallel description.
- source_word: בַּמְּצָדוֹת
  chosen: in the strongholds
  alternatives:
  - in the fortresses
  - in the strong places
  lexicon: HALOT
  rationale: מצדות refers to fortified places/strongholds. 'Strongholds' is concise
    and idiomatic.
- source_word: נָשְׁתָה
  chosen: has failed
  alternatives:
  - is exhausted
  - has been drained
  lexicon: HALOT
  rationale: From a verb meaning to dry up/be exhausted. With 'their strength' the
    idiom 'has failed' communicates loss of vigor clearly.
- source_word: גְבוּרָתָם
  chosen: their strength
  alternatives:
  - their might
  - their valor
  lexicon: HALOT
  rationale: Abstract noun from the same root as גבור; here it refers to military
    strength/courage. 'Strength' is broad and natural.
- source_word: הָיוּ לְנָשִׁים
  chosen: they have become like women
  alternatives:
  - they have become women
  lexicon: HALOT
  rationale: The ל marks comparison/result in context; the phrase is an ancient idiom
    for loss of martial courage, not a literal sex change. 'Like women' makes the
    comparative force explicit in English.
- source_word: הִצִּיתוּ
  chosen: are set on fire
  alternatives:
  - they have set on fire
  - they have kindled
  lexicon: HALOT
  rationale: The Hebrew is active plural ('they have set ablaze'), but the subject
    is left implicit. English passive foregrounds the city's plight and avoids supplying
    an unspecified subject.
- source_word: מִשְׁכְּנֹתֶיהָ
  chosen: her dwellings
  alternatives:
  - her habitations
  - her homes
  lexicon: HALOT
  rationale: Refers to Babylon's inhabited structures/abodes. 'Dwellings' is faithful
    and suitably broad.
- source_word: נִשְׁבְּרוּ
  chosen: are broken
  alternatives:
  - have been broken
  - are shattered
  lexicon: HALOT
  rationale: Niphal perfect plural indicates a completed passive event. 'Are broken'
    is idiomatic in English narrative description.
- source_word: בְרִיחֶיהָ
  chosen: her bars
  alternatives:
  - her gate-bars
  - her bolts
  lexicon: HALOT
  rationale: Refers to the bars/bolts securing gates or doors. 'Bars' is the most
    direct rendering; the defensive context implies city gate-bars.
