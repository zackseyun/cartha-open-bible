theological_decisions:
- issue: Rendering of הָיוּ לְנָשִׁים
  chosen_reading: they have become like women
  alternative_readings:
  - they have become women
  rationale: The phrase is a prophetic taunt using ancient gendered martial imagery
    to describe cowardice or collapse of strength. Rendering it comparatively avoids
    implying a literal ontological change while preserving the rhetoric of the Hebrew
    text.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral);
    preserve source intent without flattening rhetoric.
