id: JER.51.22
reference: Jeremiah 51:22
source:
  edition: WLC
  text: וְ/נִפַּצְתִּ֤י בְ/ךָ֙ אִ֣ישׁ וְ/אִשָּׁ֔ה וְ/נִפַּצְתִּ֥י בְ/ךָ֖ זָקֵ֣ן וָ/נָ֑עַר
    וְ/נִפַּצְתִּ֣י בְ/ךָ֔ בָּח֖וּר וּ/בְתוּלָֽה׃
translation:
  text: And with you I will shatter man and woman; and with you I will shatter old
    man and youth; and with you I will shatter young man and virgin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through you' or 'by you'; the Hebrew preposition marks Babylon as the
      instrument of shattering.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'virgin'; alternatively 'young woman' or 'maiden' in some contexts,
      but 'virgin' best matches the usual sense of the term here.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִפַּצְתִּי
  chosen: I will shatter
  alternatives:
  - I have shattered
  - I will smash
  - I will break in pieces
  lexicon: HALOT
  rationale: The form is morphologically perfect 1cs, but in this prophetic sequence
    it functions with future force ('I will...'). 'Shatter' preserves the violent,
    pulverizing sense of נפץ without sounding overly wooden. Repetition is retained
    each time for the Hebrew anaphora.
- source_word: בְּךָ
  chosen: with you
  alternatives:
  - by you
  - through you
  lexicon: HALOT
  rationale: In context Babylon is the instrument by which YHWH destroys nations and
    groups. 'With you' is the most natural English rendering of the instrumental beth
    here while preserving the direct address.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - male
  - husband
  lexicon: HALOT
  rationale: Paired with 'woman,' the sense is adult male person, not specifically
    'husband.' 'Man' best matches the gendered pairing and follows the gender-accurate
    policy.
- source_word: אִשָּׁה
  chosen: woman
  alternatives:
  - wife
  - female
  lexicon: HALOT
  rationale: Paired with אִישׁ in a general human category list, this is 'woman,'
    not specifically 'wife.'
- source_word: זָקֵן
  chosen: old man
  alternatives:
  - elder
  - aged man
  - old person
  lexicon: HALOT
  rationale: The verse lists age/sex pairings in singular distributive form. 'Old
    man' keeps the masculine singular parallel with 'youth.' 'Elder' could imply office
    or status, which is not primary here.
- source_word: נַעַר
  chosen: youth
  alternatives:
  - young man
  - boy
  lexicon: HALOT
  rationale: The term can denote boy, youth, or young man. Here, because the next
    pair is בָּחוּר / בְּתוּלָה ('young man / virgin'), rendering נַעַר as the broader
    'youth' avoids collapsing distinct categories.
- source_word: בָּחוּר
  chosen: young man
  alternatives:
  - choice young man
  - warrior
  - youth
  lexicon: HALOT
  rationale: This term commonly denotes a young man in the prime of life. 'Young man'
    is the clearest modern English equivalent and preserves distinction from נַעַר.
- source_word: בְּתוּלָה
  chosen: virgin
  alternatives:
  - young woman
  - maiden
  lexicon: HALOT
  rationale: The default lexical sense is 'virgin.' Although some contexts may emphasize
    a marriageable young woman, there is no contextual pressure here to weaken the
    term. 'Virgin' preserves the lexical value most transparently.
