id: JER.51.60
reference: Jeremiah 51:60
source:
  edition: WLC
  text: וַ/יִּכְתֹּ֣ב יִרְמְיָ֗הוּ אֵ֧ת כָּל הָ/רָעָ֛ה אֲשֶׁר תָּב֥וֹא אֶל בָּבֶ֖ל
    אֶל סֵ֣פֶר אֶחָ֑ד אֵ֚ת כָּל הַ/דְּבָרִ֣ים הָ/אֵ֔לֶּה הַ/כְּתֻבִ֖ים אֶל בָּבֶֽל־־־־־־׃
translation:
  text: And Jeremiah wrote in a single scroll all the disaster that would come upon
    Babylon—all these words written concerning Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'written against Babylon.' The Hebrew preposition can be rendered more
      literally, but here it introduces the content/direction of the prophetic words
      about Babylon's judgment.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּכְתֹּב
  chosen: wrote
  alternatives:
  - wrote down
  - recorded
  lexicon: HALOT
  rationale: Basic narrative wayyiqtol of כתב, best rendered simply as 'wrote' in
    natural English.
- source_word: אֵת כָּל הָרָעָה
  chosen: all the disaster
  alternatives:
  - all the evil
  - all the calamity
  lexicon: HALOT
  rationale: רָעָה in prophetic judgment contexts commonly denotes calamity/disaster
    rather than moral evil. 'Disaster' communicates impending judgment clearly in
    modern English.
- source_word: אֲשֶׁר תָּבוֹא אֶל־בָּבֶל
  chosen: that would come upon Babylon
  alternatives:
  - that would come to Babylon
  - that was coming against Babylon
  lexicon: HALOT
  rationale: Though אֶל is literally 'to/toward,' with בוא in judgment contexts English
    idiom is better as 'come upon' to express adverse impact.
- source_word: אֶל־סֵפֶר אֶחָד
  chosen: in a single scroll
  alternatives:
  - into one book
  - on one scroll
  lexicon: HALOT
  rationale: סֵפֶר in this historical setting most naturally refers to a written scroll/document,
    not a modern codex-like 'book.' 'Single' captures אֶחָד idiomatically.
- source_word: אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  chosen: all these words
  alternatives:
  - all these things
  - all these matters
  lexicon: HALOT
  rationale: דְּבָרִים here refers to the prophetic utterances/oracles just mentioned.
    'Words' preserves the textual emphasis.
- source_word: הַכְּתֻבִים
  chosen: written
  alternatives:
  - that were written
  - inscribed
  lexicon: HALOT
  rationale: 'Passive participle modifying ''words''; concise English apposition works
    well: ''all these words written concerning Babylon.'''
- source_word: אֶל־בָּבֶל
  chosen: concerning Babylon
  alternatives:
  - against Babylon
  - to Babylon
  lexicon: HALOT
  rationale: The repeated אֶל with 'words written' is awkward if rendered woodenly
    as 'to Babylon.' In prophetic superscription-like usage, the sense is that the
    words are directed with reference to Babylon. 'Concerning Babylon' is the clearest
    broad rendering, while 'against Babylon' is a plausible contextual alternative
    preserved in a footnote.
