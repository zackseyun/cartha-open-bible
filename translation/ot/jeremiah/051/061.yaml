id: JER.51.61
reference: Jeremiah 51:61
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יִרְמְיָ֖הוּ אֶל שְׂרָיָ֑ה כְּ/בֹאֲ/ךָ֣ בָבֶ֔ל וְֽ/רָאִ֔יתָ וְֽ/קָרָ֔אתָ
    אֵ֥ת כָּל הַ/דְּבָרִ֖ים הָ/אֵֽלֶּה־־׃
translation:
  text: And Jeremiah said to Seraiah, “When you come to Babylon, see that you read
    all these words.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'and you shall see, and you shall read all these words.'
      The Hebrew 'and you will see' likely carries the sense 'see to it' or 'take
      care' in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative form of אמר, introducing the next action
    in sequence. 'And ... said' preserves Hebrew narrative flow without overinterpreting
    temporal nuance.
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Direct and natural rendering of the preposition marking the addressee.
- source_word: שְׂרָיָה
  chosen: Seraiah
  rationale: Personal name transliterated by standard English convention.
- source_word: כְּבֹאֲךָ
  chosen: When you come
  alternatives:
  - When you arrive
  - As you enter
  lexicon: HALOT
  rationale: The preposition כ with infinitive construct of בוא plus 2ms suffix gives
    a temporal sense, 'when you come/arrive.' 'Come' is retained as a simple, close
    rendering.
- source_word: בָבֶל
  chosen: Babylon
  rationale: Standard English form of the place name.
- source_word: וְרָאִיתָ
  chosen: see that
  alternatives:
  - and you shall see
  - and look
  lexicon: HALOT
  rationale: Literally 'and you will see.' In this context, followed by 'and read
    all these words,' the verb functions idiomatically as an injunction to take care
    or attend to the task. 'See that you read' conveys the force in natural English
    while preserving the command's intent.
- source_word: וְקָרָאתָ
  chosen: you read
  alternatives:
  - you shall read
  - you proclaim
  - you call out
  lexicon: HALOT
  rationale: קרא here means 'read aloud/recite' from the written scroll context of
    the surrounding passage. 'Read' is the clearest English rendering; the public
    or audible aspect is implicit in context.
- source_word: אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  chosen: all these words
  alternatives:
  - all these things
  - all these matters
  lexicon: HALOT
  rationale: דברים commonly means 'words' here, especially in a context of written
    prophetic content. 'All these words' preserves the textual and prophetic emphasis
    better than the broader 'things' or 'matters'.
