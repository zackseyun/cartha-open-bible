id: JER.51.4
reference: Jeremiah 51:4
source:
  edition: WLC
  text: וְ/נָפְל֥וּ חֲלָלִ֖ים בְּ/אֶ֣רֶץ כַּשְׂדִּ֑ים וּ/מְדֻקָּרִ֖ים בְּ/חוּצוֹתֶֽי/הָ׃
translation:
  text: And the slain will fall in the land of the Chaldeans, and the pierced in her
    streets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in Chaldea” or “in the land of the Babylonians.” The Hebrew reads “the
      land of the Chaldeans.”
    reason: lexical_alternative
  - marker: b
    text: Or “in her squares” or “in her open places.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָפְלוּ
  chosen: And ... will fall
  alternatives:
  - and ... shall fall
  - and ... have fallen
  lexicon: HALOT
  rationale: Qal perfect of נפל with prefixed conjunction in prophetic discourse is
    naturally rendered as a future in English here, expressing the announced outcome
    of judgment rather than a simple past narrative event.
- source_word: חֲלָלִים
  chosen: the slain
  alternatives:
  - slain ones
  - corpses
  lexicon: HALOT
  rationale: The noun commonly denotes those killed or fatally wounded. 'The slain'
    is idiomatic, concise, and preserves the collective sense better than the more
    clinical 'corpses.'
- source_word: בְּאֶרֶץ כַּשְׂדִּים
  chosen: in the land of the Chaldeans
  alternatives:
  - in the land of the Babylonians
  - in Chaldea
  lexicon: HALOT
  rationale: כַּשְׂדִּים is literally 'Chaldeans.' Since the Hebrew ethnonym is explicit,
    the main text keeps 'Chaldeans' rather than substituting the more interpretive
    'Babylonians.' 'Land of the Chaldeans' closely reflects the Hebrew construction.
- source_word: וּמְדֻקָּרִים
  chosen: and the pierced
  alternatives:
  - and those pierced through
  - and the stabbed
  - and the wounded
  lexicon: HALOT
  rationale: The passive participial form from דקר denotes people pierced through,
    likely by weapons. 'The pierced' preserves the vivid passive sense and parallels
    'the slain.' 'Wounded' is too broad and weakens the violence of the image.
- source_word: בְּחוּצוֹתֶיהָ
  chosen: in her streets
  alternatives:
  - in her squares
  - in her open places
  lexicon: HALOT
  rationale: חוּצוֹת can denote streets or public squares/open places within a city.
    'Streets' is the most natural modern English rendering here, while the feminine
    suffix 'her' refers back to the land/city personified.
