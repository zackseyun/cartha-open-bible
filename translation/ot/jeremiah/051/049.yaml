id: JER.51.49
reference: Jeremiah 51:49
source:
  edition: WLC
  text: גַּם בָּבֶ֕ל לִ/נְפֹּ֖ל חַֽלְלֵ֣י יִשְׂרָאֵ֑ל גַּם לְ/בָבֶ֥ל נָפְל֖וּ חַֽלְלֵ֥י
    כָל הָ/אָֽרֶץ־־־׃
translation:
  text: Babylon also must fall for the slain of Israel, just as for Babylon the slain
    of all the earth have fallen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Babylon also has fallen, you slain of Israel'; the Hebrew syntax of
      the first clause is compressed and has been understood in more than one way.
    reason: alternative_reading
lexical_decisions:
- source_word: גַּם
  chosen: also
  alternatives:
  - indeed
  - even
  lexicon: HALOT
  rationale: 'Used adverbially to mark correspondence between the two clauses: Babylon
    too is implicated in falling/judgment.'
- source_word: בָּבֶל
  chosen: Babylon
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
- source_word: לִ/נְפֹּל
  chosen: must fall
  alternatives:
  - to fall
  - has fallen
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ל after Babylon is elliptical
    and expresses destined/resultative falling. 'Must fall' brings out the prophetic
    necessity in idiomatic English better than a bare infinitive while preserving
    the sense of judgment.
- source_word: חַלְלֵי
  chosen: the slain
  alternatives:
  - the killed
  - the wounded mortally
  lexicon: HALOT
  rationale: Common prophetic term for those slain in war or judgment; 'the slain'
    is the most natural and established English equivalent.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Standard transliteration of the national name.
- source_word: גַּם
  chosen: just as
  alternatives:
  - also
  - likewise
  lexicon: HALOT
  rationale: In the second clause, the particle helps signal the comparison/correspondence
    with the first clause; 'just as' makes the parallelism explicit in natural English.
- source_word: לְ/בָבֶל
  chosen: for Babylon
  alternatives:
  - at Babylon
  - because of Babylon
  lexicon: HALOT
  rationale: The prefixed ל is best taken here in relation to Babylon as the object/occasion
    of the falling of the nations' slain. 'For Babylon' preserves the compact Hebrew
    parallel with the first clause.
- source_word: נָפְל֖וּ
  chosen: have fallen
  alternatives:
  - fell
  lexicon: HALOT
  rationale: Perfect verb describing the accomplished reality of those slain because
    of Babylon; English present perfect fits the prophetic reflection on completed
    devastation.
- source_word: חַֽלְלֵ֥י כָל הָ/אָֽרֶץ
  chosen: the slain of all the earth
  alternatives:
  - the slain of the whole land
  - those slain from all the earth
  lexicon: HALOT
  rationale: אָרֶץ can mean 'land' or 'earth'; here the scope of Babylon's violence
    is universalized in context, so 'all the earth' is preferable.
