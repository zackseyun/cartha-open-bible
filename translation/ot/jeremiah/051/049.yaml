theological_decisions:
- issue: Scope of אָרֶץ
  chosen_reading: all the earth
  alternative_readings:
  - the whole land
  rationale: In this oracle against Babylon, the prophet contrasts Israel's slain
    with the many slain attributable to Babylon's imperial violence. The broader sense
    'earth' best fits the rhetoric of worldwide judgment rather than a local land
    only.
