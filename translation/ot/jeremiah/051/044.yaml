theological_decisions:
- issue: Referent of 'his/him' in the swallowing and streaming clauses
  chosen_reading: The pronouns refer to Bel, the Babylonian deity/idol.
  alternative_readings:
  - The pronouns could be taken more broadly as referring to Babylon personified.
  rationale: The immediate antecedent is Bel, and the imagery of disgorging from 'his mouth' fits the idol/god being judged. The following clause about nations no longer streaming 'to him' naturally continues the anti-idol polemic, though it also implies Babylon's cultic collapse.
- issue: Aspect of נָפָלָה
  chosen_reading: 'Rendered as a prophetic perfect: ''has fallen.'''
  alternative_readings:
  - 'Simple future: ''will fall'''
  rationale: Hebrew prophetic discourse often uses the perfect for a future event viewed as certain. Retaining 'has fallen' preserves the rhetorical force without importing extra theology.
