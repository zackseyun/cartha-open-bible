id: JER.51.44
reference: Jeremiah 51:44
source:
  edition: WLC
  text: וּ/פָקַדְתִּ֨י עַל בֵּ֜ל בְּ/בָבֶ֗ל וְ/הֹצֵאתִ֤י אֶת בִּלְע/וֹ֙ מִ/פִּ֔י/ו וְ/לֹֽא יִנְהֲר֥וּ אֵלָ֛י/ו ע֖וֹד גּוֹיִ֑ם גַּם חוֹמַ֥ת בָּבֶ֖ל נָפָֽלָה־־־־׃
translation:
  text: And I will punish Bel in Babylon[a], and I will bring out of his mouth what he has swallowed; nations will no longer stream to him[b]. Even the wall of Babylon has fallen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nations will no longer flow to him.' The Hebrew verb pictures peoples moving like a stream.
    reason: lexical_alternative
  - marker: b
    text: Or 'the wall of Babylon will fall.' Hebrew may use the perfect here prophetically, describing a future event as certain.
    reason: alternative_reading
lexical_decisions:
- source_word: וּפָקַדְתִּי עַל
  chosen: I will punish
  alternatives:
  - I will attend to
  - I will visit judgment on
  lexicon: HALOT
  rationale: פָקַד with עַל in judgment contexts commonly means to punish or call to account. 'Punish' gives the judicial force in clear modern English.
- source_word: בֵּל
  chosen: Bel
  alternatives:
  - Bēl
  lexicon: HALOT
  rationale: Proper divine name/title of the Babylonian god; transliterated per policy to transliterate names rather than translate them.
- source_word: בְּבָבֶל
  chosen: in Babylon
  alternatives:
  - at Babylon
  lexicon: HALOT
  rationale: Locative beth is most naturally rendered 'in Babylon' here, identifying the sphere/location of Bel's cult.
- source_word: וְהוֹצֵאתִי
  chosen: I will bring out
  alternatives:
  - I will take out
  - I will extract
  lexicon: HALOT
  rationale: 'Hiphil of יצא here is causative: God will cause something to come out from Bel''s mouth. ''Bring out'' is idiomatic and preserves the image.'
- source_word: אֶת בִּלְעוֹ
  chosen: what he has swallowed
  alternatives:
  - his swallowed thing
  - his prey
  lexicon: HALOT
  rationale: בֶּלַע denotes that which is swallowed/devoured. Rendering idiomatically as 'what he has swallowed' preserves the metaphor of Bel disgorging what he consumed, likely tribute or captives.
- source_word: מִפִּיו
  chosen: out of his mouth
  alternatives:
  - from his mouth
  lexicon: HALOT
  rationale: Concrete metaphor should be preserved; 'out of his mouth' fits English idiom with the swallowing image.
- source_word: וְלֹא יִנְהֲרוּ אֵלָיו עוֹד גּוֹיִם
  chosen: nations will no longer stream to him
  alternatives:
  - the nations will no longer flow to him
  - nations will no longer flock to him
  lexicon: HALOT
  rationale: נהר in this stem can mean 'stream/flow' metaphorically of peoples moving toward a place or deity. 'Stream to him' preserves the vivid prophetic image and the object 'to him' refers back to Bel.
- source_word: גַּם
  chosen: Even
  alternatives:
  - Also
  - Indeed
  lexicon: HALOT
  rationale: גַּם here adds an emphatic further judgment. 'Even' captures the climactic force before the final clause.
- source_word: חוֹמַת בָּבֶל
  chosen: the wall of Babylon
  alternatives:
  - Babylon's wall
  lexicon: HALOT
  rationale: Construct phrase straightforwardly rendered. Singular 'wall' is retained as in Hebrew, likely collective or representative of Babylon's defenses.
- source_word: נָפָלָה
  chosen: has fallen
  alternatives:
  - has collapsed
  - falls
  lexicon: HALOT
  rationale: Perfect can be rendered as prophetic perfect, expressing the certainty of the announced judgment. 'Has fallen' preserves the force and echoes prophetic style.
