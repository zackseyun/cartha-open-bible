id: JER.51.41
reference: Jeremiah 51:41
source:
  edition: WLC
  text: אֵ֚יךְ נִלְכְּדָ֣ה שֵׁשַׁ֔ךְ וַ/תִּתָּפֵ֖שׂ תְּהִלַּ֣ת כָּל הָ/אָ֑רֶץ אֵ֣יךְ
    הָיְתָ֧ה לְ/שַׁמָּ֛ה בָּבֶ֖ל בַּ/גּוֹיִֽם־׃
translation:
  text: How Sheshak has been captured, and the praise of the whole earth seized! How
    Babylon has become a desolation among the nations!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sheshak is widely understood as a cipher-name for Babylon.
    reason: alternative_reading
  - marker: b
    text: Or 'the glory of the whole earth' / 'the boast of the whole earth.'
    reason: lexical_alternative
  - marker: c
    text: Or 'has become a desolation'; the Hebrew term can include both ruin and
      the horror it causes.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיךְ
  chosen: How
  alternatives:
  - Alas, how
  - How indeed
  lexicon: HALOT
  rationale: Introduces an exclamatory lament or astonishment, not a request for manner.
    'How' best preserves the rhetorical force in English.
- source_word: נִלְכְּדָה
  chosen: has been captured
  alternatives:
  - was captured
  - is taken
  lexicon: HALOT
  rationale: Niphal perfect of לכד conveys being taken/captured. Present perfect in
    English fits the exclamatory reflection on a completed event with present significance.
- source_word: שֵׁשַׁךְ
  chosen: Sheshak
  alternatives:
  - Babylon
  lexicon: HALOT
  rationale: This is the Hebrew form in the text, traditionally understood as an atbash
    cipher for Babylon. Per translation philosophy, names are transliterated in the
    main text rather than replaced by their referent; the identification is preserved
    in a footnote.
- source_word: וַתִּתָּפֵשׂ
  chosen: and ... seized
  alternatives:
  - and ... taken
  - and ... captured
  lexicon: HALOT
  rationale: From תפשׂ, 'to seize, grasp, capture.' Here it parallels the previous
    verb and takes 'the praise of the whole earth' as its object. 'Seized' preserves
    the vivid passive-like reversal without overexplaining.
- source_word: תְּהִלַּת כָּל הָאָרֶץ
  chosen: the praise of the whole earth
  alternatives:
  - the glory of the whole earth
  - the boast of the whole earth
  lexicon: HALOT
  rationale: תהלה most directly means 'praise.' Although idiomatically it can denote
    that which is praised, retaining 'praise' is both accurate and intelligible in
    English. Alternatives like 'glory' are interpretive and less directly lexical.
- source_word: הָיְתָה לְשַׁמָּה
  chosen: has become a horror
  alternatives:
  - has become a desolation
  - has become an object of horror
  - has become appalling
  lexicon: HALOT
  rationale: שַׁמָּה denotes desolation with the nuance of horror/astonishment at
    ruin. 'A horror' captures both the devastated state and the shocked reaction of
    observers in concise modern English.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the peoples
  - among the Gentiles
  lexicon: HALOT
  rationale: גוים here refers broadly to the nations/peoples of the world, not specifically
    Gentiles in a later theological sense. 'Among the nations' is the most natural
    and contextually appropriate rendering.
