theological_decisions:
- issue: Personification of Babylon and her land with feminine suffixes
  chosen_reading: Retain feminine personification in English where possible ('her
    land,' 'in her midst')
  alternative_readings:
  - Neutralize to 'its land' and 'within it'
  rationale: The Hebrew consistently uses feminine suffixes for Babylon, and preserving
    this helps maintain the prophetic rhetoric of the city/empire personified without
    adding theological content.
  doctrine_reference: Translation philosophy §5 (consistency of key terms) and §6
    (readable modern English)
