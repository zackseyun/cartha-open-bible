id: JER.51.47
reference: Jeremiah 51:47
source:
  edition: WLC
  text: לָ/כֵן֙ הִנֵּ֣ה יָמִ֣ים בָּאִ֔ים וּ/פָקַדְתִּי֙ עַל פְּסִילֵ֣י בָבֶ֔ל וְ/כָל
    אַרְצָ֖/הּ תֵּב֑וֹשׁ וְ/כָל חֲלָלֶ֖י/הָ יִפְּל֥וּ בְ/תוֹכָֽ/הּ־־־׃
translation:
  text: Therefore, behold, days are coming when I will punish the carved images of
    Babylon, and all her land will be put to shame, and all her slain will fall in
    her midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will visit judgment on the carved images of Babylon.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the idols of Babylon.' The Hebrew term refers specifically to carved
      cult-images.
    reason: lexical_alternative
  - marker: c
    text: Or 'all her land will be ashamed' or 'will be disgraced.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks an inferential transition from the preceding judgment context;
    'Therefore' preserves the logical connection clearly in English.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - surely
  lexicon: HALOT
  rationale: An attention-getting particle. 'Look' is readable modern English and
    preserves the deictic force better than the archaic 'behold.'
- source_word: יָמִים בָּאִים
  chosen: days are coming
  alternatives:
  - the days are coming
  - days are on the way
  lexicon: HALOT
  rationale: A common prophetic formula announcing imminent future action. 'Days are
    coming' is idiomatic and sufficiently formal.
- source_word: וּפָקַדְתִּי עַל
  chosen: I will punish
  alternatives:
  - I will attend to
  - I will visit judgment on
  - I will call to account
  lexicon: HALOT
  rationale: In judgment contexts פקד על commonly denotes punitive intervention. 'Punish'
    makes the judicial sense explicit in natural English without overexpansion.
- source_word: פְּסִילֵי
  chosen: the carved images
  alternatives:
  - the idols
  - the carved idols
  - the graven images
  lexicon: HALOT
  rationale: פסילים refers specifically to carved cult-images. 'Carved images' preserves
    the concrete lexical sense better than the more generic 'idols,' while remaining
    readable.
- source_word: בָבֶל
  chosen: Babylon
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: וְכָל אַרְצָהּ
  chosen: all her land
  alternatives:
  - her whole land
  - all her country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to Babylon's land/territory. 'All her land' is a natural
    rendering and preserves the feminine pronominal reference to Babylon.
- source_word: תֵּבֹשׁ
  chosen: will be put to shame
  alternatives:
  - will be ashamed
  - will be disgraced
  lexicon: HALOT
  rationale: בוש can denote shame/disgrace. With the land as subject, 'will be put
    to shame' communicates the resulting humiliation of Babylon's realm more naturally
    than attributing an emotion directly to the land.
- source_word: וְכָל חֲלָלֶיהָ
  chosen: all her slain
  alternatives:
  - all her dead
  - all her wounded
  lexicon: HALOT
  rationale: חללים in warfare contexts refers to those slain, not merely the dead
    in general. 'Her slain' is concise and contextually precise.
- source_word: יִפְּלוּ
  chosen: will fall
  alternatives:
  - will lie fallen
  lexicon: HALOT
  rationale: The standard verb for falling in battle; 'will fall' preserves the martial
    idiom.
- source_word: בְּתוֹכָהּ
  chosen: in her midst
  alternatives:
  - within her
  - in the middle of her
  lexicon: HALOT
  rationale: A conventional expression for occurring within the city/land itself.
    'In her midst' preserves the vividness and the feminine personification of Babylon.
