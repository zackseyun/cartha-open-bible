theological_decisions:
- issue: Counterfactual lament syntax
  chosen_reading: 'Render the clause as an unreal/counterfactual wish: ''so that my mother would have been my grave.'''
  alternative_readings:
  - 'Render more literally as simple past/result: ''and my mother became my grave'''
  rationale: The surrounding context is Jeremiah's curse over the day of his birth and the messenger who announced it. English counterfactual wording best communicates the sense of a wished-for non-birth without importing new theology.
  doctrine_reference: Translation philosophy §3, preserve tension rather than resolve it; here ambiguity is limited and context favors the counterfactual sense.
