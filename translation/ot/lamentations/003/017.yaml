id: LAM.3.17
reference: Lamentations 3:17
source:
  edition: WLC
  text: וַ/תִּזְנַ֧ח מִ/שָּׁל֛וֹם נַפְשִׁ֖/י נָשִׁ֥יתִי טוֹבָֽה׃
translation:
  text: You have thrust my soul away from peace[c][b][a]; I have forgotten goodness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'You rejected my soul from peace,' or more idiomatically, 'my soul is deprived of peace.'
    reason: lexical_alternative
  - marker: b
    text: '''Peace'' translates Hebrew shalom, which can also mean well-being or wholeness.'
    reason: lexical_alternative
  - marker: c
    text: Or simply, 'I have forgotten good/prosperity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּזְנַח
  chosen: You have thrust away
  alternatives:
  - You rejected
  - You cast off
  - My soul was deprived
  lexicon: HALOT
  rationale: From זנח, 'to reject, spurn, cast off.' The 3fs verbal form most naturally takes an implicit second-person subject in context, addressing God directly in the surrounding lament. 'Thrust away' preserves the force of removal from a state of peace better than the weaker 'rejected.'
- source_word: מִשָּׁלוֹם
  chosen: from peace
  alternatives:
  - from well-being
  - from wholeness
  lexicon: HALOT
  rationale: שָׁלוֹם includes peace, well-being, and wholeness. 'Peace' is the most natural English rendering here, while the broader sense is contextually felt in the lament over lost welfare.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - me
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean soul, life, or self. 'My soul' fits the poetic register of Lamentations and preserves the personal, inner dimension of the suffering without denying the broader Hebrew sense.
- source_word: נָשִׁיתִי
  chosen: I have forgotten
  alternatives:
  - I am made to forget
  - I forgot
  lexicon: HALOT
  rationale: From נשׁה in the sense 'to forget.' The perfect 1cs is straightforwardly rendered 'I have forgotten.' Some translations construe a causative nuance from context ('you have made me forget'), but the form itself supports the simpler first-person statement.
- source_word: טוֹבָה
  chosen: what goodness is
  alternatives:
  - good
  - prosperity
  - happiness
  lexicon: HALOT
  rationale: טוֹבָה can denote goodness, good things, welfare, or prosperity. Rendering it as 'what goodness is' communicates the experiential loss expressed in the lament and reads naturally in English, while preserving the broad semantic field rather than narrowing it only to material prosperity.
