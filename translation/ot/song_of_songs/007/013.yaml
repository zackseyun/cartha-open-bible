id: SNG.7.13
reference: Song of Songs 7:13
source:
  edition: WLC
  text: נַשְׁכִּ֨ימָה֙ לַ/כְּרָמִ֔ים נִרְאֶ֞ה אִם פָּֽרְחָ֤ה הַ/גֶּ֨פֶן֙ פִּתַּ֣ח הַ/סְּמָדַ֔ר הֵנֵ֖צוּ הָ/רִמּוֹנִ֑ים שָׁ֛ם אֶתֵּ֥ן אֶת דֹּדַ֖/י לָֽ/ךְ־׃
translation:
  text: Let us rise early for the vineyards[a]; let us see whether the vine has budded, whether the blossom has opened, whether the pomegranates are in bloom[c][b]. There I will give you my love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the vineyards.' The Hebrew preposition can be rendered either way in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'the vine has blossomed.' The Hebrew may refer broadly to flowering, though the translation 'has budded' preserves the apparent progression into the next clause about the blossom opening.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'my loves,' likely an intensive or collective expression meaning 'my love' or 'my caresses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַשְׁכִּימָה
  chosen: Let us rise early
  alternatives:
  - Let us go early
  - Let us start early
  lexicon: HALOT
  rationale: Hiphil cohortative 1cp of שׁכם conveys setting out early or rising early. 'Let us rise early' preserves both the cohortative invitation and the temporal nuance.
- source_word: לַכְּרָמִים
  chosen: for the vineyards
  alternatives:
  - to the vineyards
  lexicon: HALOT
  rationale: The preposition ל here marks direction toward the vineyards. English idiom can use either 'to' or 'for'; 'for the vineyards' fits naturally with 'rise early for' while still conveying destination.
- source_word: נִרְאֶה
  chosen: let us see
  alternatives:
  - let us inspect
  - let us look
  lexicon: HALOT
  rationale: Qal cohortative/volitive 1cp from ראה. 'Let us see' is the most natural and sufficiently broad rendering in context.
- source_word: אִם
  chosen: whether
  alternatives:
  - if
  lexicon: HALOT
  rationale: In this sequence of observational clauses, אִם introduces indirect questions. 'Whether' is better English than repeated 'if' here.
- source_word: פָּרְחָה הַגֶּפֶן
  chosen: the vine has budded
  alternatives:
  - the vine has blossomed
  - the vine has flowered
  lexicon: HALOT
  rationale: פרח can denote sprouting or blossoming. Because the next clause mentions the blossom opening, rendering this earlier stage as 'has budded' preserves the likely progression of growth.
- source_word: פִּתַּח הַסְּמָדַר
  chosen: the blossom has opened
  alternatives:
  - the tender grape has opened
  - the vine blossom has opened
  lexicon: HALOT
  rationale: סמדר refers to grape blossom/early vine bloom. With פתח 'open,' the phrase naturally describes the opening of the blossom. 'Blossom' is clear modern English.
- source_word: הֵנֵצוּ הָרִמּוֹנִים
  chosen: the pomegranates are in bloom
  alternatives:
  - the pomegranates have blossomed
  - the pomegranates have flowered
  lexicon: HALOT
  rationale: נוץ in this stem refers to putting forth blossoms. 'Are in bloom' is idiomatic and matches the horticultural imagery.
- source_word: שָׁם
  chosen: There
  alternatives:
  - Then there
  lexicon: HALOT
  rationale: 'The adverb marks location, not merely sequence. ''There'' preserves the spatial sense: in that setting she will give her love.'
- source_word: אֶתֵּן
  chosen: I will give
  alternatives:
  - I will offer
  lexicon: HALOT
  rationale: נתן is the common verb 'give.' No stronger idiomatic expansion is required.
- source_word: דֹּדַי
  chosen: my love
  alternatives:
  - my loves
  - my caresses
  lexicon: HALOT
  rationale: The plural form can function as an abstract/intensive expression for love or lovemaking in Song of Songs. 'My love' is the most natural singular collective rendering in English, while preserving the romantic and intimate sense without over-specifying.
