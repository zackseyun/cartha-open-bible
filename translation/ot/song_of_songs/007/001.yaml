id: SNG.7.1
reference: Song of Songs 7:1
source:
  edition: WLC
  text: שׁ֤וּבִי שׁ֨וּבִי֙ הַ/שּׁ֣וּלַמִּ֔ית שׁ֥וּבִי שׁ֖וּבִי וְ/נֶחֱזֶה בָּ֑/ךְ
    מַֽה תֶּחֱזוּ֙ בַּ/שּׁ֣וּלַמִּ֔ית כִּ/מְחֹלַ֖ת הַֽ/מַּחֲנָֽיִם־־׃
translation:
  text: Return, return, O Shulammite; return, return, that we may look at you. Why
    do you look at the Shulammite as at the dance of Mahanaim?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'What do you see in the Shulammite?—like the dance of Mahanaim.' The
      Hebrew of this clause is difficult, and some translations construe the question
      with 'what' rather than 'why.'
    reason: alternative_reading
  - marker: b
    text: Mahanaim is likely the place name Mahanaim; the name itself may mean 'two
      camps.'
    reason: cultural_note
lexical_decisions:
- source_word: שׁוּבִי
  chosen: Return
  alternatives:
  - Turn back
  - Come back
  lexicon: HALOT
  rationale: Imperative feminine singular of שוב. In this poetic context, 'Return'
    preserves the repeated summons without over-specifying whether the movement is
    physical or relational. 'Come back' is possible but slightly more colloquial and
    interpretive.
- source_word: הַשּׁוּלַמִּית
  chosen: Shulammite
  alternatives:
  - the Shulammite woman
  lexicon: HALOT
  rationale: A personal/designation term best transliterated under the project's policy
    to transliterate names. Retaining 'Shulammite' preserves the ambiguity of whether
    it is a gentilic, title, or poetic counterpart to Solomon.
- source_word: וְנֶחֱזֶה בָּךְ
  chosen: that we may look at you
  alternatives:
  - and let us gaze at you
  - that we may behold you
  lexicon: HALOT
  rationale: The cohortative-like first person plural expresses purpose/result after
    the repeated imperatives. 'Look at you' is natural modern English and preserves
    the visual focus. 'Behold' is too elevated; 'gaze' may imply a stronger intensity
    than the Hebrew requires.
- source_word: מַה
  chosen: Why
  alternatives:
  - What
  lexicon: HALOT
  rationale: 'Although מה commonly means ''what,'' in this idiom the sense is interrogative-explanatory:
    ''Why do you look...?'' This yields coherent English and matches the likely rhetorical
    force better than the more wooden ''What do you see...?'' in this immediate syntax.'
- source_word: תֶּחֱזוּ
  chosen: do you look
  alternatives:
  - do you see
  - do you gaze
  lexicon: HALOT
  rationale: Second masculine plural of חזה, parallel to the earlier first plural
    form. 'Look' keeps the lexical connection with וְנֶחֱזֶה while fitting idiomatic
    English. The shift from 'we may look' to 'do you look' preserves the dialogue.
- source_word: כִּמְחֹלַת
  chosen: as at the dance of
  alternatives:
  - like the dance of
  - as though it were the dance of
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'As at the dance of' fits the verbal
    phrase 'look at' and keeps the simile explicit.
- source_word: הַמַּחֲנָיִם
  chosen: Mahanaim
  alternatives:
  - the two camps
  lexicon: HALOT
  rationale: Best taken as the place name Mahanaim and transliterated as a proper
    name. The lexical meaning 'two camps' may underlie the name, but translating it
    in the main text would obscure the likely toponymic force and the traditional
    identification of the phrase.
