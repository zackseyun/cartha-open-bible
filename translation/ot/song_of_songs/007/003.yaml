id: SNG.7.3
reference: Song of Songs 7:3
source:
  edition: WLC
  text: שָׁרְרֵ/ךְ֙ אַגַּ֣ן הַ/סַּ֔הַר אַל יֶחְסַ֖ר הַ/מָּ֑זֶג בִּטְנֵ/ךְ֙ עֲרֵמַ֣ת
    חִטִּ֔ים סוּגָ֖ה בַּ/שּׁוֹשַׁנִּֽים־׃
translation:
  text: Your navel is a rounded bowl; may it never lack mixed wine. Your belly is
    a heap of wheat, encircled with lilies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'Your vulva is a rounded bowl.' The Hebrew term traditionally
      rendered 'navel' is debated in this erotic poetic context.
    reason: lexical_alternative
  - marker: b
    text: Or 'spiced wine.' The Hebrew refers to wine that is mixed, likely with water
      or spices.
    reason: lexical_alternative
  - marker: c
    text: Or 'Your womb is a heap of wheat' if the term is taken in an internal rather
      than external bodily sense, though 'belly' is more likely in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁרְרֵךְ
  chosen: your navel
  alternatives:
  - your vulva
  - your womb
  lexicon: HALOT, BDB
  rationale: The noun is traditionally rendered 'navel,' and in this poetic blazon
    context it fits the body-part sequence naturally. Some modern interpreters argue
    for a more erotic sense such as 'vulva' or 'secret place,' but the lexical evidence
    is debated rather than decisive. 'Navel' is retained in the main text as the more
    established and textually defensible rendering, with the alternative preserved
    in a footnote.
- source_word: אַגַּן
  chosen: bowl
  alternatives:
  - basin
  lexicon: HALOT, BDB
  rationale: Denotes a vessel such as a bowl or basin. 'Bowl' is more natural in modern
    English and suits the simile.
- source_word: הַסַּהַר
  chosen: rounded
  alternatives:
  - round
  - moon-shaped
  lexicon: HALOT, BDB
  rationale: The term relates to roundness/circular form, possibly with lunar association.
    'Rounded' communicates the shape idiomatically without overcommitting to a specific
    image like 'moon-shaped'.
- source_word: אַל יֶחְסַר
  chosen: may it never lack
  alternatives:
  - let it not lack
  - which does not lack
  lexicon: HALOT, BDB
  rationale: 'The jussive form is best represented as a wish or blessing: ''may it
    never lack.'' This preserves the poetic force better than a flat indicative.'
- source_word: הַמָּזֶג
  chosen: mixed wine
  alternatives:
  - spiced wine
  - blended drink
  lexicon: HALOT, BDB
  rationale: Refers to mixed or spiced wine, a luxurious drink in ancient context.
    'Mixed wine' is a transparent rendering close to the Hebrew, while 'spiced wine'
    remains a plausible nuance.
- source_word: בִּטְנֵךְ
  chosen: your belly
  alternatives:
  - your womb
  - your abdomen
  lexicon: HALOT, BDB
  rationale: The noun commonly means belly/abdomen, though in some contexts it can
    extend to womb. Here the body-description sequence favors the external bodily
    sense 'belly.'
- source_word: עֲרֵמַת חִטִּים
  chosen: a heap of wheat
  alternatives:
  - a mound of wheat
  - a pile of wheat
  lexicon: HALOT, BDB
  rationale: A straightforward construct phrase. 'Heap of wheat' preserves the agricultural
    imagery and poetic texture.
- source_word: סוּגָה
  chosen: encircled
  alternatives:
  - fenced about
  - hedged around
  - surrounded
  lexicon: HALOT, BDB
  rationale: The participial/passive form conveys being enclosed or surrounded. 'Encircled'
    is vivid and poetic in English.
- source_word: בַּשּׁוֹשַׁנִּים
  chosen: with lilies
  alternatives:
  - among lilies
  - by lilies
  lexicon: HALOT, BDB
  rationale: The preposition can indicate accompaniment or surrounding context. 'With
    lilies' works naturally with 'encircled,' while preserving the floral imagery.
