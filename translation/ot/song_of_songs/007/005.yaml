id: SNG.7.5
reference: Song of Songs 7:5
source:
  edition: WLC
  text: צַוָּארֵ֖/ךְ כְּ/מִגְדַּ֣ל הַ/שֵּׁ֑ן עֵינַ֜יִ/ךְ בְּרֵכ֣וֹת בְּ/חֶשְׁבּ֗וֹן
    עַל שַׁ֨עַר֙ בַּת רַבִּ֔ים אַפֵּ/ךְ֙ כְּ/מִגְדַּ֣ל הַ/לְּבָנ֔וֹן צוֹפֶ֖ה פְּנֵ֥י
    דַמָּֽשֶׂק־־׃
translation:
  text: Your neck is like a tower of ivory; your eyes are pools in Heshbon, by the
    gate of Bath-rabbim. Your nose is like the tower of Lebanon, looking toward Damascus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the gate of the populous city' or 'by the gate of many.' The Hebrew
      phrase 'Bath-rabbim' may be a place name or may carry a descriptive sense.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'nose.' The image likely praises the beloved's noble profile rather
      than isolating a feature in a modern awkward sense.
    reason: cultural_note
  - marker: c
    text: Or 'overlooking Damascus' or 'facing Damascus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צַוָּארֵךְ
  chosen: your neck
  alternatives:
  - your throat
  lexicon: HALOT
  rationale: The noun denotes the neck/nape area. 'Neck' is the standard and natural
    English rendering in this poetic blazon context.
- source_word: כְּמִגְדַּל
  chosen: is like a tower
  alternatives:
  - is like a lofty tower
  lexicon: HALOT
  rationale: The comparison marker כ plus 'tower' is rendered straightforwardly. Adding
    'lofty' would over-interpret what is already implied by 'tower'.
- source_word: הַשֵּׁן
  chosen: of ivory
  alternatives:
  - of tooth
  lexicon: HALOT
  rationale: Although the singular literally relates to 'tooth,' in this construction
    it idiomatically refers to ivory, the material made from teeth/tusks. 'Tower of
    ivory' is the plain sense in context.
- source_word: עֵינַיִךְ
  chosen: your eyes
  lexicon: HALOT
  rationale: Direct, literal rendering of the dual/plural form.
- source_word: בְּרֵכוֹת
  chosen: pools
  alternatives:
  - ponds
  lexicon: HALOT
  rationale: The word refers to pools/reservoirs. 'Pools' is idiomatic and preserves
    the image of still, reflective water.
- source_word: בְּחֶשְׁבּוֹן
  chosen: in Heshbon
  lexicon: HALOT
  rationale: Place name transliterated per translation philosophy.
- source_word: עַל שַׁעַר בַּת רַבִּים
  chosen: by the gate of Bath-rabbim
  alternatives:
  - at the gate of Bath-rabbim
  - by the gate of the populous city
  - by the gate of many
  lexicon: HALOT
  rationale: The phrase most naturally reads as a toponym, 'Bath-rabbim,' modifying
    'gate.' Because the exact sense of the place name is uncertain, transliteration
    is preferable in the main text. 'By' renders עַל idiomatically in this locative
    setting.
- source_word: אַפֵּךְ
  chosen: your nose
  alternatives:
  - your face
  lexicon: HALOT
  rationale: The noun commonly means 'nose' here, despite possible discomfort in English.
    In this poetic context it refers to the profile and dignity of the beloved's nose;
    'face' would flatten the specific imagery.
- source_word: כְּמִגְדַּל הַלְּבָנוֹן
  chosen: is like the tower of Lebanon
  alternatives:
  - is like a tower in Lebanon
  lexicon: HALOT
  rationale: The construct with the article most naturally yields 'the tower of Lebanon,'
    likely a known landmark or idealized image. This preserves the Hebrew wording
    without unnecessary paraphrase.
- source_word: צוֹפֶה
  chosen: looking toward
  alternatives:
  - overlooking
  - watching toward
  - facing
  lexicon: HALOT
  rationale: The participle conveys a lookout orientation. 'Looking toward' is natural
    English and preserves the active visual image.
- source_word: פְּנֵי דַמָּשֶׂק
  chosen: toward Damascus
  alternatives:
  - facing Damascus
  - toward the face of Damascus
  lexicon: HALOT
  rationale: The idiom 'face of' with a place name means 'toward' or 'facing.' 'Toward
    Damascus' is concise and idiomatic.
