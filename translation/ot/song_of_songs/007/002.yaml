id: SNG.7.2
reference: Song of Songs 7:2
source:
  edition: WLC
  text: מַה יָּפ֧וּ פְעָמַ֛יִ/ךְ בַּ/נְּעָלִ֖ים בַּת נָדִ֑יב חַמּוּקֵ֣י יְרֵכַ֔יִ/ךְ כְּמ֣וֹ חֲלָאִ֔ים מַעֲשֵׂ֖ה יְדֵ֥י אָמָּֽן־־׃
translation:
  text: How beautiful are your feet in sandals[a], O noble daughter! The curves of your thighs are like jewels[b], the work of the hands of a master craftsman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your hips' for 'your thighs.' The Hebrew term can refer more broadly to the hip/thigh region.
    reason: lexical_alternative
  - marker: b
    text: Or 'ornaments' or 'necklaces' for 'jewels.' The Hebrew likely refers to precious crafted adornments.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  chosen: How
  alternatives:
  - How very
  - How greatly
  lexicon: HALOT
  rationale: 'Exclamatory מַה introduces admiration: ''How beautiful...!'' rather than an interrogative ''what.'''
- source_word: יָּפוּ
  chosen: beautiful
  alternatives:
  - lovely
  - fair
  lexicon: HALOT
  rationale: From יפה, describing attractiveness. 'Beautiful' is natural modern English and fits the praise context better than the archaic 'fair.'
- source_word: פְעָמַיִךְ
  chosen: your feet
  alternatives:
  - your steps
  lexicon: HALOT
  rationale: פעם can denote foot/step. In context with sandals, the concrete sense 'feet' is most natural, though 'steps' is a possible nuance.
- source_word: בַּנְּעָלִים
  chosen: in sandals
  alternatives:
  - with sandals
  - wearing sandals
  lexicon: HALOT
  rationale: The preposition ב plus 'sandals' is idiomatically rendered 'in sandals' in English, preserving the image without over-paraphrase.
- source_word: בַּת נָדִיב
  chosen: O noble daughter
  alternatives:
  - daughter of a nobleman
  - princely daughter
  lexicon: HALOT
  rationale: A vocative of praise. 'Noble daughter' preserves the Hebrew compactness and can denote noble birth or noble bearing. 'Daughter of a nobleman' is possible but more interpretive.
- source_word: חַמּוּקֵי
  chosen: the curves
  alternatives:
  - the rounded contours
  - the joints
  lexicon: HALOT
  rationale: The noun refers to rounded curves/turnings. In this poetic body-description context, 'curves' best captures the sense. 'Joints' is too anatomical and misses the aesthetic force.
- source_word: יְרֵכַיִךְ
  chosen: your thighs
  alternatives:
  - your hips
  - your loins
  lexicon: HALOT
  rationale: יָרֵךְ can refer to thigh, hip region, or loins. Here 'thighs' is the most direct and common rendering in English for the paired form, while 'hips' is possible and preserved in a footnote.
- source_word: כְּמוֹ
  chosen: like
  alternatives:
  - as
  lexicon: HALOT
  rationale: Standard comparative particle; 'like' is the most natural modern English choice.
- source_word: חֲלָאִים
  chosen: jewels
  alternatives:
  - ornaments
  - necklaces
  lexicon: HALOT
  rationale: The term denotes ornaments/jewelry. 'Jewels' communicates precious crafted beauty in a concise way, fitting the simile. More specific identifications such as 'necklaces' are less certain.
- source_word: מַעֲשֵׂה יְדֵי אָמָּן
  chosen: the work of the hands of a master craftsman
  alternatives:
  - the work of an artist's hands
  - the handiwork of a skilled workman
  lexicon: HALOT
  rationale: This phrase emphasizes skilled artistry. 'Master craftsman' conveys expertise without sounding overly technical; retaining 'hands' preserves the Hebrew image of crafted workmanship.
