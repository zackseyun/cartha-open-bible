id: SNG.7.6
reference: Song of Songs 7:6
source:
  edition: WLC
  text: רֹאשֵׁ֤/ךְ עָלַ֨יִ/ךְ֙ כַּ/כַּרְמֶ֔ל וְ/דַלַּ֥ת רֹאשֵׁ֖/ךְ כָּ/אַרְגָּמָ֑ן
    מֶ֖לֶךְ אָס֥וּר בָּ/רְהָטִֽים׃
translation:
  text: Your head upon you is like Carmel, and the flowing hair of your head like
    purple; a king is held captive in the tresses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Carmel likely refers to Mount Carmel, evoking stately height and beauty.
    reason: cultural_note
  - marker: b
    text: Or 'the locks of your head.' The Hebrew term is rare and may refer to hanging
      or flowing hair.
    reason: lexical_alternative
  - marker: c
    text: Or 'a king is bound in the galleries.' The final Hebrew term is difficult
      and has been understood in more than one way; the main text follows the hair
      imagery of the surrounding lines.
    reason: alternative_reading
lexical_decisions:
- source_word: רֹאשֵׁךְ
  chosen: your head
  alternatives:
  - your crown
  lexicon: HALOT
  rationale: The basic sense is 'head.' While 'crown of your head' can be an extended
    sense in some contexts, here the comparison to Carmel and the following mention
    of hair favor the literal 'head.'
- source_word: עָלַיִךְ
  chosen: upon you
  alternatives:
  - on you
  - above you
  lexicon: HALOT
  rationale: The preposition על with 2fs suffix is spatial. 'Upon you' preserves the
    poetic image of the head as it is borne on the body, while remaining natural enough
    in English poetry.
- source_word: כַּכַּרְמֶל
  chosen: like Carmel
  alternatives:
  - like Mount Carmel
  lexicon: HALOT
  rationale: כ plus proper noun marks comparison. 'Carmel' likely evokes Mount Carmel's
    stately height and beauty. The shorter form preserves the Hebrew's compact poetic
    force; the geographic identification can be clarified in a footnote.
- source_word: דַּלַּת רֹאשֵׁךְ
  chosen: the flowing hair of your head
  alternatives:
  - the locks of your head
  - the hanging hair of your head
  lexicon: HALOT
  rationale: דַּלָּה is a rare term, traditionally understood here as hanging locks
    or flowing hair. 'Flowing hair' communicates the likely referent in readable modern
    English while retaining the image of hair descending from the head.
- source_word: כָּאַרְגָּמָן
  chosen: like purple
  alternatives:
  - like purple cloth
  - like crimson-purple
  lexicon: HALOT
  rationale: אַרְגָּמָן denotes costly purple dye or purple fabric. 'Like purple'
    is concise and preserves the color-luxury association without over-specifying
    material.
- source_word: מֶלֶךְ
  chosen: a king
  alternatives:
  - the king
  lexicon: HALOT
  rationale: The noun lacks the article, so 'a king' is the more straightforward rendering.
    In context it functions generically or hyperbolically rather than identifying
    a specific monarch.
- source_word: אָסוּר
  chosen: is held captive
  alternatives:
  - is bound
  - is imprisoned
  - is fettered
  lexicon: HALOT
  rationale: 'From אסר, ''to bind.'' In this love-poem context the passive participial/adjectival
    sense is metaphorical: the king is captivated or bound fast. ''Held captive''
    preserves the metaphor while sounding idiomatic in English.'
- source_word: בָּרְהָטִים
  chosen: in the tresses
  alternatives:
  - in the locks
  - in the galleries
  - in the channels
  lexicon: HALOT
  rationale: This rare plural has been variously understood. In this immediate context
    of hair imagery, 'tresses' best fits the poetic flow and parallelism. The traditional
    alternative 'galleries' likely reflects an older interpretive tradition rather
    than the plain contextual sense, so it is preserved in a footnote rather than
    adopted in the main text.
