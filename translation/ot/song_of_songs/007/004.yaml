id: SNG.7.4
reference: Song of Songs 7:4
source:
  edition: WLC
  text: שְׁנֵ֥י שָׁדַ֛יִ/ךְ כִּ/שְׁנֵ֥י עֳפָרִ֖ים תָּאֳמֵ֥י צְבִיָּֽה׃
translation:
  text: Your two breasts are like two fawns, twins of a gazelle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'young deer'; the Hebrew animal term can be rendered more generally,
      though 'gazelle' imagery is common in Song of Songs.
    reason: lexical_alternative
  - marker: b
    text: Or 'a doe.' The Hebrew word is feminine singular.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁנֵי
  chosen: two
  lexicon: HALOT
  rationale: Cardinal number in construct, introducing the paired body part and then
    the paired comparison image.
- source_word: שָׁדַיִךְ
  chosen: your breasts
  alternatives:
  - your bosom
  lexicon: HALOT
  rationale: The noun שַׁד means 'breast'; the 2fs suffix marks direct address to
    the woman. 'Breasts' is the plain, concrete sense and best matches the erotic
    poetry of the context without euphemistic softening.
- source_word: כִּשְׁנֵי
  chosen: like two
  alternatives:
  - as two
  lexicon: HALOT
  rationale: Comparative כ marks simile. 'Like' is idiomatic modern English and preserves
    the poetic comparison.
- source_word: עֳפָרִים
  chosen: fawns
  alternatives:
  - young deer
  - young gazelles
  lexicon: HALOT
  rationale: Refers to young hoofed animals, commonly rendered 'fawns' in this poetic
    context. Since the following phrase specifies 'of a gazelle,' 'fawns' avoids redundancy
    while preserving the tender, graceful imagery.
- source_word: תָּאֳמֵי
  chosen: twins of
  alternatives:
  - twin young of
  - a pair of
  lexicon: HALOT
  rationale: Construct plural from 'twin'; it qualifies the two fawns as a matched
    pair. 'Twins of' is concise and natural in English.
- source_word: צְבִיָּה
  chosen: a gazelle
  alternatives:
  - a doe
  lexicon: HALOT
  rationale: The feminine form denotes a female gazelle/deer-like animal. 'Gazelle'
    is preferred because צבי and related forms in Song often evoke gazelle imagery
    specifically; 'doe' is possible but less precise.
