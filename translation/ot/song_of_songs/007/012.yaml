id: SNG.7.12
reference: Song of Songs 7:12
source:
  edition: WLC
  text: לְכָ֤/ה דוֹדִ/י֙ נֵצֵ֣א הַ/שָּׂדֶ֔ה נָלִ֖ינָה בַּ/כְּפָרִֽים׃
translation:
  text: Come[a], my beloved, let us go out to the countryside[b]; let us spend the night among the villages.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the villages.'
    reason: lexical_alternative
  - marker: b
    text: Some interpret 'among the henna blossoms,' linking the Hebrew term with the plant mentioned in Song 1:14; the immediate context here more likely refers to villages in the countryside.
    reason: alternative_reading
lexical_decisions:
- source_word: לְכָה
  chosen: Come
  alternatives:
  - Go on
  - Come away
  lexicon: HALOT
  rationale: Imperative from הלך used idiomatically as an invitation or summons. In English, 'Come' best captures the direct appeal to the beloved in natural speech, even though the underlying verb is literally 'go/walk.'
- source_word: דוֹדִי
  chosen: my beloved
  alternatives:
  - my love
  lexicon: HALOT
  rationale: A standard term of endearment in Song of Songs. 'My beloved' preserves the relational and poetic force more fully than the flatter 'my love,' and aligns with common usage in this book.
- source_word: נֵצֵא
  chosen: let us go out
  alternatives:
  - let us go forth
  - let us go
  lexicon: HALOT
  rationale: Cohortative plural of יצא, expressing shared intention. 'Go out' preserves the directional nuance of leaving the current place, while remaining idiomatic.
- source_word: הַשָּׂדֶה
  chosen: to the countryside
  alternatives:
  - to the field
  - into the open country
  lexicon: HALOT
  rationale: Though singular 'the field' is formally possible, in context it functions collectively for rural/open country space. 'To the countryside' communicates the sense naturally in English without over-literal awkwardness.
- source_word: נָלִינָה
  chosen: let us spend the night
  alternatives:
  - let us lodge
  - let us stay overnight
  lexicon: HALOT
  rationale: Cohortative plural of לון/לין, meaning to lodge or remain overnight. 'Spend the night' is clear modern English and fits the romantic-poetic context better than the more formal 'lodge.'
- source_word: בַּכְּפָרִים
  chosen: among the villages
  alternatives:
  - in the villages
  - among the henna blossoms
  lexicon: HALOT
  rationale: The noun כפרים ordinarily means 'villages' in this form and context, especially paired with going out into the countryside and staying overnight. Some interpreters connect it with a plant term ('henna blossoms') by association with Song 1:14, but the immediate travel/rural setting favors 'villages.' 'Among' reflects the distributive/local sense naturally.
