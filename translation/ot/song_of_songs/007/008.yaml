id: SNG.7.8
reference: Song of Songs 7:8
source:
  edition: WLC
  text: זֹ֤את קֽוֹמָתֵ/ךְ֙ דָּֽמְתָ֣ה לְ/תָמָ֔ר וְ/שָׁדַ֖יִ/ךְ לְ/אַשְׁכֹּלֽוֹת׃
translation:
  text: This stature of yours is like a palm tree[a], and your breasts are like clusters of fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like grape clusters.' The Hebrew 'clusters' often refers to clusters of grapes, though the noun itself is not explicitly qualified here.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: This
  alternatives:
  - This one
  - Such
  lexicon: HALOT
  rationale: Demonstrative feminine singular pointing to the woman's figure; simple deictic 'This' is natural in English and preserves the immediacy of the Hebrew.
- source_word: קוֹמָתֵךְ
  chosen: stature of yours
  alternatives:
  - your stature
  - your form
  - your height
  lexicon: HALOT
  rationale: קוֹמָה refers to bodily height or figure/stature. 'Stature of yours' keeps the possessive emphasis and refers to her overall form, not merely numerical height.
- source_word: דָּמְתָה
  chosen: is like
  alternatives:
  - resembles
  - has become like
  lexicon: HALOT
  rationale: From דמה, 'to be like, resemble.' English present 'is like' gives the sense idiomatically in a verbless-comparison style, even though the Hebrew perfect can be rendered more literally as 'has resembled.'
- source_word: לְתָמָר
  chosen: like a palm tree
  alternatives:
  - to a palm tree
  - like the palm
  lexicon: HALOT
  rationale: The prefixed ל marks comparison here. 'Palm tree' is the natural English equivalent of תמר in this poetic simile.
- source_word: וְשָׁדַיִךְ
  chosen: and your breasts
  alternatives:
  - and your bosom
  lexicon: HALOT
  rationale: שָׁדַיִם plainly denotes breasts. Given the erotic poetry of Song of Songs, the direct anatomical term should be retained rather than softened.
- source_word: לְאַשְׁכֹּלוֹת
  chosen: like clusters of fruit
  alternatives:
  - like clusters
  - like grape clusters
  lexicon: HALOT
  rationale: אַשְׁכֹּלוֹת means clusters, often specifically grape clusters, but the object is not explicit here. 'Clusters of fruit' makes the image clear in English without over-specifying beyond the Hebrew; 'grape clusters' is a viable alternative preserved in a footnote.
