theological_decisions:
- issue: Sense of the relational clause
  chosen_reading: 'Mutual belonging in romantic covenantal language: ''I am my beloved''s'''
  alternative_readings:
  - I am for my beloved
  rationale: The Hebrew is a verbless clause and could be rendered more literally
    as 'I [am] for my beloved,' but in the Song's recurring formula the sense is relational
    belonging rather than mere orientation. This choice reflects the plain poetic
    sense without importing later allegorical theology.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
