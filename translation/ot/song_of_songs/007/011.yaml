id: SNG.7.11
reference: Song of Songs 7:11
source:
  edition: WLC
  text: אֲנִ֣י לְ/דוֹדִ֔/י וְ/עָלַ֖/י תְּשׁוּקָתֽ/וֹ׃ס
translation:
  text: I am my beloved's, and his desire is for me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I am for my beloved.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי
  chosen: I
  lexicon: HALOT
  rationale: Straightforward 1st person singular pronoun; explicit in Hebrew and retained
    in English for emphasis.
- source_word: לְדוֹדִי
  chosen: my beloved's
  alternatives:
  - for my beloved
  - to my beloved
  - my beloved
  lexicon: HALOT
  rationale: 'The preposition ל with an implied verbless clause expresses belonging/relationship
    here: ''I am my beloved''s.'' This matches the parallel refrain in Song 2:16;
    6:3 and is more idiomatic and contextually fitting than a wooden ''for/to my beloved.''
    ''Beloved'' preserves the romantic sense of דּוֹד in Song of Songs.'
- source_word: וְעָלַי
  chosen: for me
  alternatives:
  - upon me
  - toward me
  - over me
  lexicon: HALOT
  rationale: With תְּשׁוּקָה ('desire'), עַל marks the object/direction of desire.
    'For me' is idiomatic modern English and conveys orientation without the awkwardness
    of 'upon me.'
- source_word: תְּשׁוּקָתוֹ
  chosen: his desire
  alternatives:
  - his longing
  - his yearning
  lexicon: HALOT
  rationale: תְּשׁוּקָה denotes desire/longing. 'Desire' is the most direct and recognizable
    rendering, and it preserves the lexical connection with Genesis 3:16 and 4:7 without
    importing their interpretive debates into this poetic context. The suffix וֹ is
    rendered 'his.'
