id: SNG.7.14
reference: Song of Songs 7:14
source:
  edition: WLC
  text: הַֽ/דּוּדָאִ֣ים נָֽתְנוּ רֵ֗יחַ וְ/עַל פְּתָחֵ֨י/נוּ֙ כָּל מְגָדִ֔ים חֲדָשִׁ֖ים
    גַּם יְשָׁנִ֑ים דּוֹדִ֖/י צָפַ֥נְתִּי לָֽ/ךְ־־־־׃
translation:
  text: The mandrakes give off fragrance, and at our doorways are all choice fruits,
    new as well as old, which I have stored up for you, my beloved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'love-apples' for 'mandrakes,' reflecting the plant's traditional association
      with love and fertility.
    reason: lexical_alternative
  - marker: b
    text: Or 'all delicacies' or 'all precious things' for 'all choice fruits.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדּוּדָאִים
  chosen: the mandrakes
  alternatives:
  - the love-apples
  lexicon: HALOT
  rationale: דּוּדָאִים refers to mandrakes, a plant associated in the Hebrew Bible
    with fragrance and fertility/love associations. 'Mandrakes' is the standard transparent
    English equivalent; 'love-apples' is interpretive and archaic.
- source_word: נָתְנוּ רֵיחַ
  chosen: give off fragrance
  alternatives:
  - give fragrance
  - send forth scent
  lexicon: HALOT
  rationale: Literally 'have given scent/fragrance.' In English, a present sense fits
    the poetic description of the scene. 'Give off fragrance' is idiomatic while preserving
    the sensory image.
- source_word: וְעַל פְּתָחֵינוּ
  chosen: and at our doorways
  alternatives:
  - and over our doors
  - and by our entrances
  lexicon: HALOT
  rationale: פֶּתַח is an opening/entrance/doorway. With עַל in this poetic context,
    'at our doorways' is natural English and avoids an overly wooden spatial rendering.
- source_word: כָּל מְגָדִים
  chosen: all choice fruits
  alternatives:
  - all precious things
  - all delicacies
  lexicon: HALOT
  rationale: מְגָדִים denotes choice products/delicacies, often produce or precious
    fruits in poetic contexts. Because the surrounding imagery is sensual and agricultural,
    'choice fruits' best fits the context.
- source_word: חֲדָשִׁים גַּם יְשָׁנִים
  chosen: new as well as old
  alternatives:
  - new and old
  lexicon: HALOT
  rationale: The phrase contrasts fresh and aged stores. 'New as well as old' preserves
    the additive force of גַּם and reads smoothly in English.
- source_word: דּוֹדִי
  chosen: my beloved
  alternatives:
  - my love
  lexicon: HALOT
  rationale: In Song of Songs, דּוֹד is a term of intimate affection. 'My beloved'
    is the established and contextually fitting rendering, preserving both affection
    and poetic dignity.
- source_word: צָפַנְתִּי לָךְ
  chosen: which I have stored up for you
  alternatives:
  - I have treasured up for you
  - I have laid up for you
  lexicon: HALOT
  rationale: צפן means to store up, treasure, or reserve. 'Stored up for you' captures
    the concrete sense while fitting the imagery of prepared delights. The relative
    'which' is supplied for natural English syntax.
