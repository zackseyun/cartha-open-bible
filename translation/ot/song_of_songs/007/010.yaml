id: SNG.7.10
reference: Song of Songs 7:10
source:
  edition: WLC
  text: וְ/חִכֵּ֕/ךְ כְּ/יֵ֥ין הַ/טּ֛וֹב הוֹלֵ֥ךְ לְ/דוֹדִ֖/י לְ/מֵישָׁרִ֑ים דּוֹבֵ֖ב
    שִׂפְתֵ֥י יְשֵׁנִֽים׃
translation:
  text: And your mouth is like the best wine, going down smoothly for my beloved,
    gliding over the lips of sleepers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your palate'; the Hebrew term refers more specifically to the roof of
      the mouth or taste.
    reason: lexical_alternative
  - marker: b
    text: Or 'causing the lips of sleepers to speak.' The Hebrew verb is rare and
      may describe either gentle movement over the lips or the awakening/speaking
      effect of the wine.
    reason: alternative_reading
lexical_decisions:
- source_word: חִכֵּךְ
  chosen: your mouth
  alternatives:
  - your palate
  - your taste
  lexicon: HALOT
  rationale: The noun literally refers to the palate/roof of the mouth, but in English
    poetry 'your mouth' communicates the sense naturally in context of kissing and
    speech. 'Palate' is possible but sounds anatomical and less idiomatic here.
- source_word: כְּיֵין הַטּוֹב
  chosen: like the best wine
  alternatives:
  - like good wine
  - like excellent wine
  lexicon: HALOT
  rationale: The phrase compares the woman's mouth to wine of highest quality. 'The
    best wine' is idiomatic English and preserves the superlative force of הטוב in
    context.
- source_word: הוֹלֵךְ
  chosen: going down
  alternatives:
  - flowing
  - moving
  lexicon: HALOT
  rationale: The participle literally means 'going/walking,' but with wine the idiomatic
    sense is its movement as it is drunk. 'Going down' fits the imagery in natural
    English.
- source_word: לְדוֹדִי
  chosen: for my beloved
  alternatives:
  - to my beloved
  lexicon: HALOT
  rationale: The preposition ל can indicate direction or relation. 'For my beloved'
    fits the romantic context and the sense of the wine being suited to or enjoyed
    by him, while still allowing the movement imagery.
- source_word: לְמֵישָׁרִים
  chosen: smoothly
  alternatives:
  - uprightly
  - straightforwardly
  - straight
  lexicon: HALOT
  rationale: Literally 'in straightness/uprightness,' but in this collocation with
    wine it idiomatically conveys smooth, direct flow. 'Smoothly' best captures the
    poetic sense in contemporary English.
- source_word: דּוֹבֵב
  chosen: gliding over
  alternatives:
  - moving gently over
  - causing to speak
  - slipping over
  lexicon: HALOT
  rationale: This rare participle is difficult. In context of wine and lips, it likely
    describes the wine's gentle movement over the lips. Some take it causatively as
    'making speak,' but the immediate imagery favors physical motion.
- source_word: שִׂפְתֵי יְשֵׁנִים
  chosen: the lips of sleepers
  alternatives:
  - sleeping lips
  - the lips of those asleep
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the poetic ambiguity. The phrase
    may suggest lips moving even in sleep under the influence of love/wine imagery.
