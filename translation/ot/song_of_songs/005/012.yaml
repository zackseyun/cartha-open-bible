id: SNG.5.12
reference: Song of Songs 5:12
source:
  edition: WLC
  text: עֵינָ֕י/ו כְּ/יוֹנִ֖ים עַל אֲפִ֣יקֵי מָ֑יִם רֹֽחֲצוֹת֙ בֶּֽ/חָלָ֔ב יֹשְׁב֖וֹת עַל מִלֵּֽאת־־׃
translation:
  text: His eyes are like doves beside streams of water[a], bathed in milk, sitting by fullness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'set in their setting'; the final phrase is difficult Hebrew and may refer to the eyes being well set, or to doves by a full pool.
    reason: alternative_reading
lexical_decisions:
- source_word: עֵינָיו
  chosen: His eyes
  alternatives:
  - his fountains
  lexicon: HALOT
  rationale: The noun עַיִן commonly means 'eye'; though it can mean 'spring/fountain' in other contexts, here the possessive and the dove imagery clearly favor the bodily sense 'eyes'.
- source_word: כְּיוֹנִים
  chosen: like doves
  alternatives:
  - as doves
  lexicon: HALOT
  rationale: The comparison particle כ plus יוֹנִים introduces a simile. 'Like doves' is idiomatic modern English and preserves the poetic image.
- source_word: עַל אֲפִיקֵי מָיִם
  chosen: beside streams of water
  alternatives:
  - by channels of water
  - upon watercourses
  lexicon: HALOT
  rationale: אֲפִיקִים denotes channels, streams, or watercourses. 'Beside streams of water' gives natural English while preserving the setting of the simile.
- source_word: רֹחֲצוֹת
  chosen: washed
  alternatives:
  - bathing
  - bathed
  lexicon: HALOT
  rationale: The participle from רחץ describes the doves/eyes as having been washed or bathing. 'Washed' works smoothly in English as a descriptive participial phrase and fits the following 'in milk'.
- source_word: בֶּחָלָב
  chosen: in milk
  alternatives:
  - with milk
  lexicon: HALOT
  rationale: The preposition ב here is best taken in a locative/instrumental sense. 'In milk' is the more literal and traditional rendering, preserving the vivid whiteness/purity imagery.
- source_word: יֹשְׁבוֹת
  chosen: sitting
  alternatives:
  - dwelling
  - set
  lexicon: HALOT
  rationale: The participle from ישב literally means 'sitting' or 'dwelling.' In this poetic description of eyes, 'sitting' preserves the concrete metaphor of placement.
- source_word: עַל מִלֵּאת
  chosen: in fullness
  alternatives:
  - in a full setting
  - by a full pool
  - set in their setting
  lexicon: HALOT
  rationale: מִלֵּאת is difficult and likely refers to fullness, fullness of setting, or a full pool/receptacle. 'In fullness' preserves the Hebrew's compact ambiguity without over-interpreting the image. Because the phrase is notoriously difficult, an alternative is preserved in a footnote.
