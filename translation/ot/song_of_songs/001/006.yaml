theological_decisions:
- issue: Metaphorical force of 'my own vineyard'
  chosen_reading: Retain the vineyard language literally in the main text without explicating the metaphor.
  alternative_readings:
  - Interpret as her body/appearance
  - Interpret as her personal life or chastity
  rationale: The verse likely uses 'vineyard' metaphorically, but the precise referent is not explicit. Preserving the image maintains the poetic ambiguity rather than resolving it interpretively.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
