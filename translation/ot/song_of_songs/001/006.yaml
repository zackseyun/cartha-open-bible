id: SNG.1.6
reference: Song of Songs 1:6
source:
  edition: WLC
  text: אַל תִּרְא֨וּ/נִי֙ שֶׁ/אֲנִ֣י שְׁחַרְחֹ֔רֶת שֶׁ/שֱּׁזָפַ֖תְ/נִי הַ/שָּׁ֑מֶשׁ בְּנֵ֧י אִמִּ֣/י נִֽחֲרוּ בִ֗/י שָׂמֻ֨/נִי֙ נֹטֵרָ֣ה אֶת הַ/כְּרָמִ֔ים כַּרְמִ֥/י שֶׁ/לִּ֖/י לֹ֥א נָטָֽרְתִּי־־־׃
translation:
  text: Do not stare at me because I am dark[a], because the sun has scorched me. My mother’s sons were angry with me; they made me keeper of the vineyards[d][c][b], but my own vineyard I have not kept.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not look at me because I am black,' with 'black' reflecting a more literal rendering of the Hebrew adjective.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'because the sun has scorched/burned me'; traditional renderings sometimes say 'the sun has looked upon me.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'My mother’s sons.'
    reason: lexical_alternative
  - marker: d
    text: '''My own vineyard'' is likely metaphorical, but the exact referent is left unstated in the Hebrew.'
    reason: cultural_note
lexical_decisions:
- source_word: אַל תִּרְאוּנִי
  chosen: Do not stare at me
  alternatives:
  - Do not look at me
  - Do not gaze at me
  lexicon: HALOT
  rationale: ראה with negative אַל and 2mp + 1cs object is literally 'do not look at me,' but in context the speaker is responding to others' notice of her appearance. 'Stare' captures the socially marked, scrutinizing sense without over-paraphrasing.
- source_word: שְׁחַרְחֹרֶת
  chosen: dark
  alternatives:
  - swarthy
  - darkened
  - black
  lexicon: HALOT
  rationale: The adjective denotes dark complexion/darkened appearance. 'Dark' is natural modern English and avoids the potentially over-absolute or ethnically misleading force of 'black' in contemporary usage, while still preserving the speaker's point about sun-darkened skin.
- source_word: שֶׁשֱּׁזָפַתְנִי הַשָּׁמֶשׁ
  chosen: because the sun has scorched me
  alternatives:
  - because the sun has looked upon me
  - because the sun has tanned me
  - because the sun has burned me
  lexicon: HALOT
  rationale: The verb refers to the sun's burning/scorching effect. 'Scorched' best conveys visible darkening from harsh exposure. Traditional 'looked upon me' is too literal to the idiom and obscures the sense in English.
- source_word: בְּנֵי אִמִּי
  chosen: My mother’s sons
  alternatives:
  - My brothers
  - My mother’s children
  lexicon: HALOT
  rationale: The Hebrew is specifically 'sons of my mother,' not the more generic 'brothers.' The more literal rendering preserves the familial nuance and possible distancing effect in context.
- source_word: נִחֲרוּ בִי
  chosen: were angry with me
  alternatives:
  - were incensed against me
  - burned against me
  lexicon: HALOT
  rationale: The verb conveys kindled anger. 'Were angry with me' is clear modern English; the more literal 'burned against me' is vivid but unnatural here.
- source_word: שָׂמֻנִי נֹטֵרָה אֶת־הַכְּרָמִים
  chosen: they made me keeper of the vineyards
  alternatives:
  - they appointed me to guard the vineyards
  - they set me as a watchwoman over the vineyards
  lexicon: HALOT
  rationale: נטֵרָה is a feminine participial form from נטר, to keep/guard/watch. 'Keeper' is concise and idiomatic, while preserving the labor/guarding role.
- source_word: כַּרְמִי שֶׁלִּי
  chosen: my own vineyard
  alternatives:
  - my vineyard, which was mine
  - my vineyard
  lexicon: HALOT
  rationale: The doubled possessive adds emphasis. 'My own vineyard' reflects that emphasis naturally in English.
- source_word: לֹא נָטָרְתִּי
  chosen: I have not kept
  alternatives:
  - I have not guarded
  - I did not tend
  lexicon: HALOT
  rationale: Using 'kept' maintains lexical connection with נֹטֵרָה/נטר earlier in the verse. It also leaves open the metaphorical resonance of neglected self-care or personal life without forcing an interpretation.
