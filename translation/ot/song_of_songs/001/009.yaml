id: SNG.1.9
reference: Song of Songs 1:9
source:
  edition: WLC
  text: לְ/סֻסָתִ/י֙ בְּ/רִכְבֵ֣י פַרְעֹ֔ה דִּמִּיתִ֖י/ךְ רַעְיָתִֽ/י׃
translation:
  text: I compare you, my beloved, to a mare among Pharaoh’s chariots.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to my mare among Pharaoh’s chariots.' The Hebrew suffix in 'my mare'
      may be read more explicitly as possessive, though the comparison itself is the
      main sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְסֻסָתִי
  chosen: to a mare
  alternatives:
  - to my mare
  - to a horse
  lexicon: HALOT
  rationale: The noun is feminine singular from סוּסָה, denoting a female horse, hence
    'mare.' The 1cs suffix may be taken idiomatically in a comparative expression
    rather than possessively foregrounded in English; 'to a mare' is smoother and
    avoids implying literal ownership as the main point. 'Horse' is too generic and
    loses the marked feminine form, which is significant in the imagery.
- source_word: בְּרִכְבֵי פַרְעֹה
  chosen: among Pharaoh’s chariots
  alternatives:
  - in Pharaoh’s chariots
  - with Pharaoh’s chariots
  lexicon: HALOT
  rationale: רִכְבֵי is the plural construct of 'chariots/chariotry.' With בְּ, the
    phrase can indicate location or association. 'Among Pharaoh’s chariots' best conveys
    the comparative image of a mare set amid the royal chariot teams, preserving the
    vividness without over-literal awkwardness.
- source_word: דִּמִּיתִיךְ
  chosen: I compare you
  alternatives:
  - I liken you
  - I have compared you
  lexicon: HALOT
  rationale: From דמה in the piel/perfect 1cs + 2fs suffix, meaning 'I liken/compare
    you.' Present English 'I compare you' works idiomatically in poetic speech and
    communicates the speaker's act of comparison without unnecessary archaism.
- source_word: רַעְיָתִי
  chosen: my beloved
  alternatives:
  - my darling
  - my love
  - my companion
  lexicon: HALOT
  rationale: In Song of Songs this term is an intimate address for the female beloved.
    'My beloved' preserves the affectionate and elevated tone better than the more
    colloquial 'my darling' or the potentially flattened 'my love.' 'Companion' is
    too weak for the romantic context.
