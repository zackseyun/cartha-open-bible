id: SNG.1.17
reference: Song of Songs 1:17
source:
  edition: WLC
  text: קֹר֤וֹת בָּתֵּ֨י/נוּ֙ אֲרָזִ֔ים רחיט/נו בְּרוֹתִֽים׃
translation:
  text: The beams of our house are cedars; our rafters are cypresses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''our houses''; the Hebrew form is plural, though the sense may be collective:
      ''our house/home.'''
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term for 'rafters' is uncertain; it may also refer to paneling
      or galleries.
    reason: lexical_alternative
  - marker: c
    text: Or 'junipers' or 'firs'; the exact tree species is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: קֹרוֹת
  chosen: beams
  alternatives:
  - rafters
  - boards
  lexicon: HALOT
  rationale: Refers to structural timbers of a building, especially roof beams. 'Beams'
    is natural modern English and fits the parallel with the second colon.
- source_word: בָּתֵּינוּ
  chosen: our house
  alternatives:
  - our houses
  - our home
  lexicon: HALOT
  rationale: Although morphologically plural construct with 1cp suffix ('houses of
    us'), the expression functions idiomatically for a shared dwelling in this poetic
    context. Singular 'our house' reads naturally in English while preserving the
    collective sense of the lovers' dwelling place.
- source_word: אֲרָזִים
  chosen: cedars
  alternatives:
  - cedar wood
  lexicon: HALOT
  rationale: The plural noun denotes cedar timbers. 'Cedars' is the most direct rendering
    and works idiomatically in English predicate position.
- source_word: רַחִיטֵנוּ
  chosen: our rafters
  alternatives:
  - our paneling
  - our galleries
  lexicon: HALOT
  rationale: The noun is somewhat uncertain, but in architectural context and parallel
    with 'beams' it most likely refers to roof members or rafters. This yields a coherent
    image of the lovers' dwelling framed by fine wood.
- source_word: בְּרוֹתִים
  chosen: cypresses
  alternatives:
  - junipers
  - firs
  lexicon: HALOT
  rationale: The tree identification is debated. 'Cypresses' is a common modern rendering
    for בְּרוֹתִים/בְּרוֹשִׁים in architectural contexts and suits the pairing with
    cedars. Alternative identifications are preserved in a footnote.
