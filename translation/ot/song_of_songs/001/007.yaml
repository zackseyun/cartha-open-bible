id: SNG.1.7
reference: Song of Songs 1:7
source:
  edition: WLC
  text: הַגִּ֣ידָ/ה לִּ֗/י שֶׁ֤/אָהֲבָה֙ נַפְשִׁ֔/י אֵיכָ֣ה תִרְעֶ֔ה אֵיכָ֖ה תַּרְבִּ֣יץ
    בַּֽ/צָּהֳרָ֑יִם שַׁ/לָּ/מָ֤ה אֶֽהְיֶה֙ כְּ/עֹ֣טְיָ֔ה עַ֖ל עֶדְרֵ֥י חֲבֵרֶֽי/ךָ׃
translation:
  text: Tell me, you whom my soul loves, where you pasture your flock, where you make
    it lie down at noon; for why should I be like one who veils herself beside the
    flocks of your companions?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like one who wanders' beside the flocks of your companions. The Hebrew
      expression can be understood either as a woman veiling herself or, by contextual
      interpretation, as one roaming about in search of the beloved.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגִּידָה לִּי
  chosen: Tell me
  alternatives:
  - Inform me
  - Declare to me
  lexicon: HALOT
  rationale: Imperative of נגד with 1cs indirect object. 'Tell me' is natural modern
    English and preserves the direct appeal.
- source_word: שֶׁאָהֲבָה נַפְשִׁי
  chosen: you whom my soul loves
  alternatives:
  - you whom I love
  - you whom my life loves
  lexicon: HALOT
  rationale: Retains the Hebrew idiom with נֶפֶשׁ ('soul/self/life') rather than flattening
    to simply 'I love,' preserving the poetic intensity. English relative clause is
    required for natural syntax.
- source_word: אֵיכָה
  chosen: where
  alternatives:
  - how
  - in what place
  lexicon: HALOT
  rationale: In this context with verbs of shepherding and resting, the interrogative
    asks location or manner of placement; English 'where' best captures the practical
    sense in parallel lines.
- source_word: תִרְעֶה
  chosen: you pasture your flock
  alternatives:
  - you graze
  - you shepherd
  lexicon: HALOT
  rationale: The verb רעה can mean 'pasture, tend, shepherd.' Because an explicit
    object is not stated in Hebrew but is implied by the pastoral context, 'your flock'
    is supplied in English for clarity. 'Pasture' fits the immediate imagery better
    than the more abstract 'shepherd.'
- source_word: תַּרְבִּיץ
  chosen: you make it lie down
  alternatives:
  - you cause them to rest
  - you settle your flock
  lexicon: HALOT
  rationale: Hiphil of רבץ means to cause to lie down/rest. Singular 'it' refers back
    to the implied collective flock. This preserves the causative nuance.
- source_word: בַּצָּהֳרָיִם
  chosen: at noon
  alternatives:
  - at midday
  lexicon: HALOT
  rationale: Straightforward temporal expression. 'At noon' is idiomatic and concise.
- source_word: שַׁלָּמָה
  chosen: for why should
  alternatives:
  - why should
  - lest
  lexicon: HALOT
  rationale: Introduces the reason for the request. Rendering with 'for why should'
    preserves the explanatory force while sounding natural in English.
- source_word: אֶהְיֶה
  chosen: should I be
  alternatives:
  - would I become
  lexicon: HALOT
  rationale: Imperfect in a rhetorical question expressing potential state. 'Should
    I be' fits the English idiom.
- source_word: כְּעֹטְיָה
  chosen: like one who veils herself
  alternatives:
  - like one who wanders
  - like a veiled woman
  lexicon: HALOT
  rationale: From עטה, commonly 'to wrap/cover/veil oneself.' The traditional sense
    'veiled one' is lexically strong and explains the social concern in context. Because
    some interpret it as 'wanderer' by contextual extension, that alternative is preserved
    in a footnote.
- source_word: עַל עֶדְרֵי חֲבֵרֶיךָ
  chosen: beside the flocks of your companions
  alternatives:
  - among the flocks of your companions
  - by the flocks of your associates
  lexicon: HALOT
  rationale: עַל here is rendered spatially as 'beside' in context. חֲבֵרִים are companions/associates.
    'Companions' is natural and preserves the relational sense without overinterpreting.
