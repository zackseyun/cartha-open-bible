id: SNG.1.13
reference: Song of Songs 1:13
source:
  edition: WLC
  text: צְר֨וֹר הַ/מֹּ֤ר דּוֹדִ/י֙ לִ֔/י בֵּ֥ין שָׁדַ֖/י יָלִֽין׀׃
translation:
  text: My beloved is to me a sachet of myrrh[c][b][a]; he lies between my breasts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a bundle of myrrh.' The Hebrew צְרוֹר denotes a small wrapped packet or bundle; 'sachet' is chosen to convey the perfumed, wearable sense in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'he lodges' or 'he spends the night between my breasts.' The verb can carry an overnight nuance, which intensifies the intimate imagery.
    reason: lexical_alternative
  - marker: c
    text: Traditional English versions often read 'my bosom,' but the Hebrew explicitly says 'my breasts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צְרוֹר
  chosen: sachet
  alternatives:
  - bundle
  - pouch
  - bag
  lexicon: HALOT
  rationale: The noun denotes a small bundle or packet. In this poetic context, paired with myrrh, 'sachet' communicates a small fragrant packet worn on the body more naturally than the more generic 'bundle' or 'bag'.
- source_word: הַמֹּר
  chosen: myrrh
  alternatives:
  - —
  lexicon: HALOT
  rationale: Standard rendering for the aromatic resin מור. 'Myrrh' preserves the specific botanical/perfume reference central to the imagery.
- source_word: דּוֹדִי
  chosen: my beloved
  alternatives:
  - my lover
  lexicon: HALOT
  rationale: In Song of Songs, דּוֹד commonly refers to the beloved in an intimate romantic sense. 'My beloved' preserves the affectionate and poetic register better than the more sexually explicit 'my lover,' while still conveying intimacy.
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The preposition marks personal relation or significance. 'To me' fits the idiomatic English expression 'is to me' and preserves the speaker's personal valuation.
- source_word: בֵּין
  chosen: between
  alternatives:
  - among
  lexicon: HALOT
  rationale: The preposition's plain spatial sense is best retained. The imagery is bodily and concrete, so 'between' is preferable to a softened alternative.
- source_word: שָׁדַי
  chosen: my breasts
  alternatives:
  - my bosom
  lexicon: HALOT
  rationale: The Hebrew explicitly refers to the woman's breasts. Following the source-text primacy and avoiding euphemism, 'my breasts' is more accurate than the traditional softening 'my bosom.'
- source_word: יָלִין
  chosen: he lies
  alternatives:
  - he lodges
  - he spends the night
  - it lies
  lexicon: HALOT
  rationale: From לין, the verb can mean lodge or spend the night. Here it describes the beloved metaphorically as a sachet resting on her body. 'He lies' is concise, natural English and preserves the intimate image. The masculine verb supports personal reference to the beloved rather than only the sachet as an object.
