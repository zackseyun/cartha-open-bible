theological_decisions:
- issue: Identity of 'the king' in Song of Songs 1:4
  chosen_reading: Retain 'The king' as a literary figure within the poem without making an explicit messianic or divine identification in translation.
  alternative_readings:
  - An allegorical reference to God
  - An allegorical reference to the Messiah/Christ
  rationale: The verse itself does not unambiguously identify the king beyond the poem's immediate imagery. Per translation philosophy, doctrinal interpretations should not be imported into the main text where the source does not require them.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
