id: SNG.1.4
reference: Song of Songs 1:4
source:
  edition: WLC
  text: מָשְׁכֵ֖/נִי אַחֲרֶ֣י/ךָ נָּר֑וּצָה הֱבִיאַ֨/נִי הַ/מֶּ֜לֶךְ חֲדָרָ֗י/ו נָגִ֤ילָה וְ/נִשְׂמְחָה֙ בָּ֔/ךְ נַזְכִּ֤ירָה דֹדֶ֨י/ךָ֙ מִ/יַּ֔יִן מֵישָׁרִ֖ים אֲהֵבֽוּ/ךָ׃ס
translation:
  text: Draw me after you[a]; let us run. The king has brought me into his chambers. We will rejoice and be glad in you; we will extol your love more than wine[b]. Rightly do they love you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we will remember,' 'we will recount,' or 'we will celebrate' your love more than wine.
    reason: lexical_alternative
  - marker: b
    text: Or 'The upright love you.' The Hebrew מֵישָׁרִים may be understood adverbially ('rightly') or as a substantive ('upright ones').
    reason: alternative_reading
lexical_decisions:
- source_word: מָשְׁכֵנִי
  chosen: Draw me
  alternatives:
  - Pull me
  - Attract me
  lexicon: HALOT
  rationale: The verb משׁך commonly means 'draw, pull.' 'Draw me' preserves the metaphor of attraction without over-physicalizing it. It fits the romantic appeal of the context and is idiomatic in English.
- source_word: אַחֲרֶיךָ נָּרוּצָה
  chosen: after you; let us run
  alternatives:
  - after you we will run
  - let me run after you
  lexicon: HALOT
  rationale: The Hebrew shifts from singular object ('draw me') to first person plural ('we will/let us run'). Preserving the plural is important. 'Let us run' captures the cohortative nuance naturally in English.
- source_word: הֱבִיאַנִי
  chosen: has brought me
  alternatives:
  - brought me
  - let him bring me
  lexicon: HALOT
  rationale: The form is best taken as perfect, 'has brought me,' not a wish. This yields a natural progression from invitation to fulfilled intimacy.
- source_word: הַמֶּלֶךְ
  chosen: The king
  alternatives:
  - the king
  lexicon: HALOT
  rationale: Rendered straightforwardly as 'The king.' Capitalization follows normal English sentence style, not a theological identification.
- source_word: חֲדָרָיו
  chosen: his chambers
  alternatives:
  - his rooms
  - his inner rooms
  lexicon: HALOT
  rationale: חדרים refers to inner rooms or chambers. 'Chambers' preserves the poetic and intimate sense better than the flatter 'rooms.'
- source_word: נָגִילָה וְנִשְׂמְחָה
  chosen: We will rejoice and be glad
  alternatives:
  - Let us rejoice and be glad
  - We will exult and rejoice
  lexicon: HALOT
  rationale: The pair expresses joyful celebration. 'Rejoice and be glad' is natural English and preserves the parallelism.
- source_word: בָּךְ
  chosen: in you
  alternatives:
  - because of you
  - over you
  lexicon: HALOT
  rationale: The preposition ב here can indicate sphere or occasion. 'In you' preserves the directness of the Hebrew and the personal focus of delight.
- source_word: נַזְכִּירָה
  chosen: we will praise
  alternatives:
  - we will remember
  - we will recount
  - we will celebrate
  lexicon: HALOT
  rationale: Though the root means 'remember/mention,' in this context with the object 'your love' it carries the sense of commemorating or extolling. 'Praise' communicates the idiomatic force in smooth English while remaining faithful to the context.
- source_word: דֹדֶיךָ
  chosen: your love
  alternatives:
  - your loves
  - your caresses
  lexicon: HALOT
  rationale: The plural noun can denote expressions of love or lovemaking. Singular 'your love' is the most natural collective rendering in English, while preserving the romantic sense.
- source_word: מִיַּיִן
  chosen: more than wine
  alternatives:
  - better than wine
  - above wine
  lexicon: HALOT
  rationale: The comparative sense is clear from context. 'More than wine' is idiomatic and echoes the comparison already established in the song.
- source_word: מֵישָׁרִים
  chosen: Rightly
  alternatives:
  - Uprightly
  - With reason
  - The upright
  lexicon: HALOT
  rationale: 'Here the term functions adverbially: ''rightly'' or ''with good reason.'' This reading fits the clause ''Rightly do they love you'' better than taking it substantivally as ''the upright.'''
- source_word: אֲהֵבוּךָ
  chosen: do they love you
  alternatives:
  - they love you
  - they have loved you
  lexicon: HALOT
  rationale: The perfect can express a general present reality in poetic discourse. 'Do they love you' gives good English emphasis after fronted 'Rightly.'
