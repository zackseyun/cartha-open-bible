id: SNG.1.16
reference: Song of Songs 1:16
source:
  edition: WLC
  text: הִנְּ/ךָ֨ יָפֶ֤ה דוֹדִ/י֙ אַ֣ף נָעִ֔ים אַף עַרְשֵׂ֖/נוּ רַעֲנָנָֽה־׃
translation:
  text: Look, you are beautiful, my beloved—indeed, delightful! Indeed, our couch
    is luxuriant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our bed is green/verdant.' The Hebrew adjective literally suggests freshness
      or greenness, likely evoking a luxuriant natural setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְּךָ
  chosen: Look, you are
  alternatives:
  - Behold, you are
  - See, you are
  lexicon: HALOT
  rationale: הִנֵּה with 2ms suffix is a deictic/exclamatory particle drawing attention
    to the addressee. 'Look' gives natural modern English while preserving the vivid
    demonstrative force better than the more archaic 'Behold.'
- source_word: יָפֶה
  chosen: beautiful
  alternatives:
  - fair
  - handsome
  lexicon: HALOT
  rationale: The adjective denotes beauty/attractiveness. 'Beautiful' is the most
    natural contemporary rendering and fits the poetic register. 'Handsome' is possible
    for a male addressee but is narrower and less elevated.
- source_word: דוֹדִי
  chosen: my beloved
  alternatives:
  - my love
  - my darling
  lexicon: HALOT
  rationale: דוֹד in Song of Songs is a term of endearment for the lover/beloved.
    'My beloved' preserves the relational and poetic sense without becoming overly
    colloquial.
- source_word: אַף
  chosen: indeed
  alternatives:
  - also
  - even
  - 'yes'
  lexicon: HALOT
  rationale: Here אַף functions as an emphatic/additive particle. 'Indeed' captures
    the intensifying force in both occurrences more idiomatically than a flat 'also.'
- source_word: נָעִים
  chosen: delightful
  alternatives:
  - pleasant
  - lovely
  - sweet
  lexicon: HALOT
  rationale: The adjective conveys pleasantness/charm. 'Delightful' fits the poetic
    context and distinguishes it from the prior 'beautiful,' avoiding unnecessary
    repetition while preserving positive affect.
- source_word: עַרְשֵׂנוּ
  chosen: our couch
  alternatives:
  - our bed
  - our resting place
  lexicon: HALOT
  rationale: עֶרֶשׂ commonly denotes a couch, bed, or resting place. 'Couch' preserves
    the image without over-specifying sexual connotations, though such overtones may
    be present in context. 'Bed' is possible but more explicit than the Hebrew requires.
- source_word: רַעֲנָנָה
  chosen: luxuriant
  alternatives:
  - green
  - verdant
  - fresh
  lexicon: HALOT
  rationale: The adjective literally denotes freshness/greenness/luxuriance, often
    of flourishing vegetation. Because the line likely evokes a leafy outdoor setting,
    'luxuriant' preserves both the vividness and the metaphorical quality better than
    the more literal but potentially awkward 'green' for a couch.
