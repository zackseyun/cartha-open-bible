id: SNG.1.1
reference: Song of Songs 1:1
source:
  edition: WLC
  text: שִׁ֥יר הַ/שִּׁירִ֖ים אֲשֶׁ֥ר לִ/שְׁלֹמֹֽה׃
translation:
  text: The Song of Songs[b][a], which is Solomon’s.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by Solomon,' 'for Solomon,' or 'concerning Solomon'; the Hebrew preposition can indicate several kinds of association.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'Song of Songs,' a superlative expression meaning an outstanding or greatest song.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר
  chosen: Song
  alternatives:
  - song
  lexicon: HALOT
  rationale: The singular noun means 'song.' Capitalized in English because it functions as the opening title of the book/poem collection.
- source_word: הַשִּׁירִים
  chosen: of Songs
  alternatives:
  - of the songs
  - of all songs
  lexicon: HALOT
  rationale: The construction שִׁיר הַשִּׁירִים is a Hebrew superlative/genitive of excellence, traditionally rendered 'Song of Songs.' This preserves the Hebrew form transparently better than the more interpretive 'best of songs' or 'greatest song.'
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: A relative particle introducing the clause connected to Solomon. 'Which' fits smooth modern English after a title phrase.
- source_word: לִשְׁלֹמֹה
  chosen: is Solomon’s
  alternatives:
  - belongs to Solomon
  - for Solomon
  - by Solomon
  - concerning Solomon
  lexicon: HALOT
  rationale: The preposition ל can mark possession, authorship, dedication, or association. 'Is Solomon’s' preserves the ambiguity better than forcing a narrower claim such as 'by Solomon' while still yielding natural English.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention per project philosophy.
