theological_decisions:
- issue: Relation of the song to Solomon signaled by לִשְׁלֹמֹה
  chosen_reading: 'Render broadly as association/possession: ''is Solomon’s'''
  alternative_readings:
  - by Solomon
  - for Solomon
  - concerning Solomon
  rationale: The Hebrew does not unambiguously specify authorship. A broader English rendering preserves the interpretive openness rather than importing a stronger doctrinal or historical claim than the text itself makes.
