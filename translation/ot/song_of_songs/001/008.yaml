id: SNG.1.8
reference: Song of Songs 1:8
source:
  edition: WLC
  text: אִם לֹ֤א תֵדְעִי֙ לָ֔/ךְ הַ/יָּפָ֖ה בַּ/נָּשִׁ֑ים צְֽאִי לָ֞/ךְ בְּ/עִקְבֵ֣י
    הַ/צֹּ֗אן וּ/רְעִי֙ אֶת גְּדִיֹּתַ֔יִ/ךְ עַ֖ל מִשְׁכְּנ֥וֹת הָ/רֹעִֽים־־־׃ס
translation:
  text: If you do not know, most beautiful among women, go out for yourself in the
    tracks of the flock, and pasture your young goats beside the shepherds’ tents.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'behind the flock'; the Hebrew literally says 'in the tracks/footsteps
      of the flock.'
    reason: lexical_alternative
  - marker: b
    text: Or 'graze your kids'; 'young goats' renders the Hebrew term more explicitly
      for modern readers.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם לֹא
  chosen: If ... do not
  alternatives:
  - If ... do not know
  - If you do not know
  lexicon: HALOT
  rationale: The conditional particle אִם with negation לֹא introduces a real condition,
    naturally rendered 'If ... not.' English requires the subject with the verb, yielding
    'If you do not know.'
- source_word: תֵדְעִי
  chosen: you do not know
  alternatives:
  - you do not recognize
  - you do not understand
  lexicon: HALOT
  rationale: ידע commonly means 'know.' In context it refers to knowing where to go
    or what to do, not merely intellectual understanding, but 'know' remains the most
    direct and idiomatic rendering.
- source_word: הַיָּפָה בַּנָּשִׁים
  chosen: most beautiful among women
  alternatives:
  - fairest among women
  - beautiful among women
  lexicon: HALOT
  rationale: The construction with adjective plus ב among a plural group is a superlative-like
    expression. 'Most beautiful among women' communicates the Hebrew sense clearly
    in modern English. 'Fairest' is traditional but archaic.
- source_word: צְאִי לָךְ
  chosen: go out for yourself
  alternatives:
  - go your way
  - go out
  lexicon: HALOT
  rationale: The imperative צְאִי means 'go out.' The dative לָךְ adds a reflexive/personal
    nuance, which is worth preserving as 'for yourself' rather than omitting entirely.
- source_word: בְּעִקְבֵי הַצֹּאן
  chosen: in the tracks of the flock
  alternatives:
  - behind the flock
  - by the footsteps of the flock
  lexicon: HALOT
  rationale: עִקְבֵי literally refers to tracks, footprints, or heels. 'In the tracks
    of the flock' preserves the concrete pastoral imagery better than the more interpretive
    'behind the flock.'
- source_word: וּרְעִי
  chosen: pasture
  alternatives:
  - graze
  - shepherd
  - feed
  lexicon: HALOT
  rationale: רעה in the Qal can mean to pasture or tend by grazing. Since the direct
    object is the woman's young goats, 'pasture' best captures causing them to graze,
    while avoiding the broader metaphorical sense of 'shepherd' here.
- source_word: גְּדִיֹּתַיִךְ
  chosen: your young goats
  alternatives:
  - your kids
  - your goat kids
  lexicon: HALOT
  rationale: The noun denotes young goats. 'Kids' is accurate but can sound colloquial
    or ambiguous in modern English; 'young goats' is clear and natural.
- source_word: עַל מִשְׁכְּנוֹת הָרֹעִים
  chosen: beside the shepherds’ tents
  alternatives:
  - by the shepherds’ dwellings
  - near the shepherds’ tabernacles
  lexicon: HALOT
  rationale: מִשְׁכְּנוֹת refers to dwelling places, here in a pastoral setting best
    understood as tents. עַל in this context can mean spatial proximity, so 'beside'
    is more idiomatic than a wooden 'upon' or 'over.'
