id: SNG.1.14
reference: Song of Songs 1:14
source:
  edition: WLC
  text: אֶשְׁכֹּ֨ל הַ/כֹּ֤פֶר דּוֹדִ/י֙ לִ֔/י בְּ/כַרְמֵ֖י עֵ֥ין גֶּֽדִי׀׃ס
translation:
  text: My beloved is to me a cluster of henna blossoms in the vineyards of En-gedi.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'camphire'; the Hebrew term כֹּפֶר is traditionally rendered this way
      in older English versions, but it most likely refers to the henna plant, prized
      for its fragrant blossoms.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶשְׁכֹּל
  chosen: a cluster
  alternatives:
  - a cluster of grapes
  - a spray
  lexicon: HALOT
  rationale: The noun denotes a cluster or bunch, often of grapes, but here it modifies
    הַכֹּפֶר and refers to a clustered blossom/plant form rather than literal grapes.
    'A cluster' is natural and sufficiently concrete in English.
- source_word: הַכֹּפֶר
  chosen: henna blossoms
  alternatives:
  - camphire
  - henna
  - cypress
  lexicon: HALOT
  rationale: In Song 1:14 and 4:13, כֹּפֶר is best understood as the henna plant (Lawsonia
    inermis), known for fragrant blossoms. 'Camphire' is a traditional but outdated
    rendering; 'cypress' is less likely in context. 'Henna blossoms' makes explicit
    the floral imagery implied by the poetic setting.
- source_word: דּוֹדִי
  chosen: my beloved
  alternatives:
  - my lover
  lexicon: HALOT
  rationale: In the Song, דּוֹד commonly refers to the beloved male partner in romantic
    poetry. 'My beloved' preserves the elevated poetic tone better than the more contemporary
    'my lover,' while remaining accurate.
- source_word: לִי
  chosen: is to me
  alternatives:
  - is for me
  - to me
  lexicon: HALOT
  rationale: The preposition marks personal relation or valuation. 'Is to me' idiomatically
    conveys 'is for me / means to me' in English while preserving the Hebrew relational
    sense.
- source_word: בְּכַרְמֵי
  chosen: in the vineyards
  alternatives:
  - among the vineyards
  - in the vine-gardens
  lexicon: HALOT
  rationale: The preposition ב plus plural construct of כֶּרֶם naturally yields 'in
    the vineyards.' This fits the locative imagery without overinterpreting the exact
    spatial nuance.
- source_word: עֵין גֶּדִי
  chosen: En-gedi
  alternatives:
  - Ein-gedi
  lexicon: HALOT
  rationale: This is a place name, so it is transliterated rather than translated,
    in keeping with the translation philosophy. The standard English form is 'En-gedi.'
