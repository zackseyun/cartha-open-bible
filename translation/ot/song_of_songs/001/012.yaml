id: SNG.1.12
reference: Song of Songs 1:12
source:
  edition: WLC
  text: עַד שֶׁ֤/הַ/מֶּ֨לֶךְ֙ בִּ/מְסִבּ֔/וֹ נִרְדִּ֖/י נָתַ֥ן רֵיחֽ/וֹ־׃
translation:
  text: While the king was at his table, my nard gave its fragrance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'While the king was at his banquet' or 'on his couch.' The Hebrew term
      can refer more broadly to a banquet setting or reclining company.
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'my spikenard.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד
  chosen: While
  alternatives:
  - Until
  - As long as
  lexicon: HALOT
  rationale: Though עַד often means 'until,' in this poetic clause it introduces the
    circumstance during which the following action occurs. 'While' gives natural English
    and fits the likely temporal sense in context better than a strictly terminative
    'until.'
- source_word: שֶׁהַמֶּלֶךְ
  chosen: the king
  alternatives:
  - the King
  lexicon: HALOT
  rationale: The phrase is definite and refers to the male lover within the poem's
    imagery. Lowercase 'king' preserves the literary sense without importing a theological
    or messianic reading not demanded by the text.
- source_word: בִּמְסִבּוֹ
  chosen: at his table
  alternatives:
  - at his banquet
  - on his couch
  - in his circle of reclining
  lexicon: HALOT
  rationale: מְסִבָּה can denote a round table, banquet setting, or company of reclining
    diners. 'At his table' is idiomatic, concrete, and preserves the meal-setting
    imagery without over-specifying the social nuance. Alternatives are plausible
    in this poetic context.
- source_word: נִרְדִּי
  chosen: my nard
  alternatives:
  - my spikenard
  lexicon: HALOT
  rationale: נֵרְדְּ/נִרְדְּ refers to the aromatic plant/oil nard. 'Nard' is accurate
    modern English; 'spikenard' is traditional but less current. The possessive 'my'
    is retained from the suffix.
- source_word: נָתַן
  chosen: gave
  alternatives:
  - sent forth
  - yielded
  lexicon: HALOT
  rationale: The verb is the common 'gave.' In English, 'gave its fragrance' is a
    natural rendering of the Hebrew idiom and avoids unnecessary paraphrase while
    conveying emission of scent.
- source_word: רֵיחוֹ
  chosen: its fragrance
  alternatives:
  - its scent
  - its aroma
  lexicon: HALOT
  rationale: Because the antecedent is 'my nard,' the suffix is best represented in
    English as 'its.' 'Fragrance' fits the positive sensory context of the love poetry
    better than the more neutral 'scent'.
