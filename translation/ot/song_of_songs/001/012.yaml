theological_decisions:
- issue: Whether 'the king' should be capitalized or treated as a messianic/theological
    title
  chosen_reading: lowercase 'the king' as poetic/literary referent within Song of
    Songs
  alternative_readings:
  - capitalize as 'the King' to suggest a theological or typological reading
  rationale: The Hebrew itself does not require a theological title here. In keeping
    with the translation philosophy, the rendering should not import doctrinal claims
    or allegorical interpretation beyond the text's plain sense.
