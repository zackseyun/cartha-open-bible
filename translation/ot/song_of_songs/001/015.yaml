id: SNG.1.15
reference: Song of Songs 1:15
source:
  edition: WLC
  text: הִנָּ֤/ךְ יָפָה֙ רַעְיָתִ֔/י הִנָּ֥/ךְ יָפָ֖ה עֵינַ֥יִ/ךְ יוֹנִֽים׃
translation:
  text: Look, you are beautiful, my beloved; look, you are beautiful—your eyes are
    doves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''your eyes are like doves.'' The Hebrew expresses the image tersely:
      ''your eyes are doves.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנָּךְ
  chosen: Look, you are
  alternatives:
  - Behold, you are
  - Indeed, you are
  lexicon: HALOT
  rationale: הִנֵּה with 2fs suffix is a deictic/exclamatory particle drawing attention.
    'Look' preserves the vividness in natural modern English better than the more
    archaic 'behold,' while retaining the direct address.
- source_word: יָפָה
  chosen: beautiful
  alternatives:
  - fair
  - lovely
  lexicon: HALOT
  rationale: The adjective denotes beauty/attractiveness. 'Beautiful' is the clearest
    contemporary equivalent; 'fair' is traditional but archaic/ambiguous in modern
    English.
- source_word: רַעְיָתִי
  chosen: my beloved
  alternatives:
  - my darling
  - my companion
  - my love
  lexicon: HALOT
  rationale: In Song of Songs this term is an intimate address for the female lover.
    'My beloved' preserves the affectionate and relational force without sounding
    overly colloquial. 'My love' is possible and common in translations, but 'beloved'
    better reflects the noun-like vocative sense.
- source_word: הִנָּךְ יָפָה
  chosen: look, you are beautiful
  alternatives:
  - indeed, you are beautiful
  lexicon: HALOT
  rationale: The repetition is retained rather than compressed, since it is a significant
    poetic feature emphasizing admiration.
- source_word: עֵינַיִךְ
  chosen: your eyes
  lexicon: HALOT
  rationale: Straightforward construct with 2fs suffix; no reason to paraphrase.
- source_word: יוֹנִים
  chosen: doves
  alternatives:
  - like doves
  lexicon: HALOT
  rationale: 'The Hebrew predicate is nominal and elliptical: literally ''your eyes
    [are] doves.'' English can preserve the metaphor directly as ''your eyes are doves.''
    ''Like doves'' makes the simile explicit, but the Hebrew states it more compactly
    and poetically.'
