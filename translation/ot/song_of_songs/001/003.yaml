id: SNG.1.3
reference: Song of Songs 1:3
source:
  edition: WLC
  text: לְ/רֵ֨יחַ֙ שְׁמָנֶ֣י/ךָ טוֹבִ֔ים שֶׁ֖מֶן תּוּרַ֣ק שְׁמֶ֑/ךָ עַל כֵּ֖ן עֲלָמ֥וֹת אֲהֵבֽוּ/ךָ־׃
translation:
  text: Your oils have a pleasing fragrance[a]; your name is oil poured out[b]; therefore virgins love you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For the fragrance of your oils is good'; the Hebrew syntax is compressed and highly poetic.
    reason: alternative_reading
  - marker: b
    text: '''Young women'' translates Hebrew עֲלָמוֹת, which can also be rendered ''maidens''; some translations render it ''virgins,'' but that is more specific than the term itself requires here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְרֵיחַ
  chosen: The fragrance of
  alternatives:
  - For the fragrance of
  - At the scent of
  lexicon: HALOT
  rationale: רֵיחַ denotes smell/scent/fragrance. Rendering with 'fragrance' gives natural English and fits the positive evaluative context. The prefixed לְ is taken idiomatically with the following phrase rather than as a strictly separate preposition.
- source_word: שְׁמָנֶיךָ
  chosen: your oils
  alternatives:
  - your ointments
  - your perfumes
  lexicon: HALOT
  rationale: שֶׁמֶן literally means 'oil,' and the plural here likely refers to scented oils/unguents. 'Oils' preserves the Hebrew image more directly than 'perfumes,' while still allowing the aromatic sense to be inferred from context.
- source_word: טוֹבִים
  chosen: is pleasing
  alternatives:
  - are good
  - are delightful
  lexicon: HALOT
  rationale: 'Though formally plural (''are good''), English idiom works better by expressing the quality of the fragrance: ''is pleasing.'' This is an optimal-equivalence adjustment that preserves the commendatory sense of טוֹב.'
- source_word: שֶׁמֶן
  chosen: oil
  alternatives:
  - ointment
  - perfume
  lexicon: HALOT
  rationale: The singular noun in the comparison is best kept as 'oil' to preserve the metaphor's concreteness and lexical connection with the previous plural 'oils.'
- source_word: תּוּרַק
  chosen: poured out
  alternatives:
  - emptied out
  - decanted
  lexicon: HALOT
  rationale: The Hophal form conveys being poured out. 'Poured out' is the most natural and vivid English equivalent and preserves the image of oil spreading its aroma.
- source_word: שְׁמֶךָ
  chosen: your name
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'your name.' The metaphor links reputation/personhood with fragrant oil; this should not be paraphrased away.
- source_word: עַל־כֵּן
  chosen: therefore
  alternatives:
  - that is why
  - so
  lexicon: HALOT
  rationale: This conjunction marks inference/result. 'Therefore' is concise and preserves the logical connection between the beloved's attractive qualities and the response of the women.
- source_word: עֲלָמוֹת
  chosen: young women
  alternatives:
  - maidens
  - virgins
  lexicon: HALOT
  rationale: עֲלָמוֹת refers to young women of marriageable age. 'Young women' is clear modern English and avoids over-specifying virginity where the term itself does not require that nuance as strongly as בְּתוּלָה would.
- source_word: אֲהֵבוּךָ
  chosen: love you
  alternatives:
  - have loved you
  - are in love with you
  lexicon: HALOT
  rationale: 'The verb from אָהַב means ''love.'' The perfect here is rendered as a present general truth in English poetic style: the young women love him because of his attractiveness.'
