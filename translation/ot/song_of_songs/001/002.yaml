id: SNG.1.2
reference: Song of Songs 1:2
source:
  edition: WLC
  text: יִשָּׁקֵ֨/נִי֙ מִ/נְּשִׁיק֣וֹת פִּ֔י/הוּ כִּֽי טוֹבִ֥ים דֹּדֶ֖י/ךָ מִ/יָּֽיִן־׃
translation:
  text: Let him kiss me with the kisses of his mouth, for your love is better than
    wine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'your caresses are better than wine.' The Hebrew דֹּדֶיךָ is plural
      and can refer more concretely to expressions of love or caresses.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשָּׁקֵנִי
  chosen: Let him kiss me
  alternatives:
  - May he kiss me
  - He should kiss me
  lexicon: HALOT
  rationale: Qal imperfect 3ms with 1cs suffix from נשׁק expresses a wish/desire in
    context; English jussive-like 'Let him kiss me' preserves the volitional nuance
    better than a simple future.
- source_word: מִנְּשִׁיקוֹת
  chosen: with the kisses of
  alternatives:
  - from the kisses of
  lexicon: HALOT
  rationale: The preposition מן can be rendered literally 'from,' but in this idiom
    with נשׁק it is commonly understood instrumentally/partitively in English as 'with
    the kisses of,' yielding natural English without losing the concrete imagery.
- source_word: פִּיהוּ
  chosen: his mouth
  lexicon: HALOT
  rationale: Literal rendering of the construct phrase; the sensual concreteness is
    integral to the poetry and should not be softened.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding wish; 'for' fits poetic English
    and preserves the causal connection.
- source_word: טוֹבִים
  chosen: is better
  alternatives:
  - are better
  lexicon: HALOT
  rationale: 'Although the Hebrew adjective is plural agreeing with a plural noun,
    idiomatic contemporary English often treats the following abstract plural ''love''
    as a singular mass idea: ''your love is better.'' This avoids awkwardness while
    preserving the comparison.'
- source_word: דֹּדֶיךָ
  chosen: your love
  alternatives:
  - your loves
  - your caresses
  lexicon: HALOT
  rationale: דּוֹד can denote love, lovemaking, or expressions of affection. Here
    the plural likely functions as an abstract/intensive plural referring to the beloved's
    love/caresses. 'Your love' is the most natural English rendering in context, while
    'your caresses' is a viable more concrete alternative.
- source_word: מִיָּיִן
  chosen: than wine
  lexicon: HALOT
  rationale: Comparative use after טוב, literally 'from wine,' is idiomatically 'than
    wine' in English.
