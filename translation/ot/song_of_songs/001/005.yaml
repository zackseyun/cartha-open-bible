id: SNG.1.5
reference: Song of Songs 1:5
source:
  edition: WLC
  text: שְׁחוֹרָ֤ה אֲנִי֙ וְֽ/נָאוָ֔ה בְּנ֖וֹת יְרוּשָׁלִָ֑ם כְּ/אָהֳלֵ֣י קֵדָ֔ר כִּ/ירִיע֖וֹת
    שְׁלֹמֹֽה׃
translation:
  text: I am dark, yet lovely, daughters of Jerusalem, like the tents of Kedar, like
    the curtains of Solomon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I am dark and lovely.' The Hebrew conjunction is simply 'and'; 'yet'
      brings out the likely contrast in context.
    reason: alternative_reading
lexical_decisions:
- source_word: שְׁחוֹרָה
  chosen: dark
  alternatives:
  - black
  - dark-skinned
  lexicon: HALOT
  rationale: The adjective denotes dark coloration. 'Dark' is natural modern English
    and avoids over-specifying ethnicity or using the more absolute 'black,' while
    still preserving the speaker's self-description.
- source_word: וְנָאוָה
  chosen: yet lovely
  alternatives:
  - and lovely
  - but beautiful
  lexicon: HALOT
  rationale: The conjunction ו normally means 'and,' but in this poetic context English
    idiom often requires an adversative nuance to reflect the implied contrast perceived
    by the daughters of Jerusalem. 'Lovely' is chosen over 'beautiful' for a softer
    poetic register matching Song of Songs. The more formal sense 'and lovely' is
    preserved as an alternative.
- source_word: בְּנוֹת יְרוּשָׁלִָם
  chosen: daughters of Jerusalem
  alternatives:
  - young women of Jerusalem
  lexicon: HALOT
  rationale: A direct rendering preserves the poetic address and the feminine plural
    imagery. 'Young women' is interpretive and therefore kept as an alternative rather
    than the main text.
- source_word: כְּאָהֳלֵי קֵדָר
  chosen: like the tents of Kedar
  lexicon: HALOT
  rationale: A straightforward simile. Kedar was associated with dark nomadic tents,
    which supports the imagery of the first adjective without needing to make that
    implication explicit in translation.
- source_word: כִּירִיעוֹת שְׁלֹמֹה
  chosen: like the curtains of Solomon
  alternatives:
  - like the tent curtains of Solomon
  - like the hangings of Solomon
  lexicon: HALOT
  rationale: יְרִיעוֹת commonly refers to curtains or tent cloths. 'Curtains' is the
    most accessible English choice, while the alternatives preserve the possible nuance
    of luxurious tent hangings. The name is transliterated as 'Solomon' per policy
    on personal names.
