theological_decisions:
- issue: Force of the conjunction ו before נָאוָה
  chosen_reading: adversative nuance in English ('yet lovely')
  alternative_readings:
  - simple coordination ('and lovely')
  rationale: The Hebrew conjunction is formally 'and,' but optimal equivalence allows
    an adversative rendering where English style and context call for it. Here the
    speaker counters a possible negative judgment about her dark appearance. The alternative
    is preserved in a footnote because the Hebrew itself does not explicitly mark
    contrast.
  doctrine_reference: 'DOCTRINE.md: Preserve theological/interpretive tension rather
    than resolve it; optimal equivalence'
