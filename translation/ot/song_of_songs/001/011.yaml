id: SNG.1.11
reference: Song of Songs 1:11
source:
  edition: WLC
  text: תּוֹרֵ֤י זָהָב֙ נַעֲשֶׂה לָּ֔/ךְ עִ֖ם נְקֻדּ֥וֹת הַ/כָּֽסֶף־׃
translation:
  text: We will make for you ornaments of gold, with studs of silver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chains of gold' or 'rows of gold'; the Hebrew term likely refers to
      some kind of ornament or jewelry piece, but the exact form is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'beads of silver' or 'spangles of silver'; the Hebrew refers to small
      decorative silver elements.
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹרֵי
  chosen: ornaments
  alternatives:
  - chains
  - rows
  - circlets
  lexicon: HALOT
  rationale: The noun is a plural construct form referring to crafted adornments.
    In this context of jewelry and beautification, a general rendering like 'ornaments'
    best captures the sense without overcommitting to a specific item such as 'chains'
    or 'rows,' both of which are proposed in translations and lexica.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Standard rendering of the material noun; here it specifies what the ornaments
    are made from.
- source_word: נַעֲשֶׂה
  chosen: we will make
  alternatives:
  - let us make
  - we make
  lexicon: HALOT
  rationale: 'Qal imperfect 1cp of עשה. In context it naturally expresses a future
    or volitional promise: ''we will make.'' ''Let us make'' is possible but sounds
    more hortatory than the likely sense here.'
- source_word: לָךְ
  chosen: for you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: The preposition plus 2fs suffix indicates the adornments are being made
    for the female addressee.
- source_word: עִם
  chosen: with
  alternatives:
  - together with
  lexicon: HALOT
  rationale: Simple comitative/instrumental sense linking the gold ornaments with
    the silver decorative elements.
- source_word: נְקֻדּוֹת
  chosen: studs
  alternatives:
  - beads
  - points
  - spangles
  lexicon: HALOT
  rationale: The noun denotes small decorative points or spots. In a jewelry context,
    'studs' communicates ornamental silver inlays or dotted decorations more idiomatically
    than the more literal but less natural 'points'.
- source_word: הַכָּסֶף
  chosen: silver
  lexicon: HALOT
  rationale: Standard rendering of the metal noun; the article is not normally carried
    into English in this construction.
