id: SNG.1.10
reference: Song of Songs 1:10
source:
  edition: WLC
  text: נָאו֤וּ לְחָיַ֨יִ/ךְ֙ בַּ/תֹּרִ֔ים צַוָּארֵ֖/ךְ בַּ/חֲרוּזִֽים׃
translation:
  text: Your cheeks are lovely with ornaments[b][a], your neck with strings of jewels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with rows'; the Hebrew term likely refers to rows or arrangements of ornaments. Some take it more literally as a specific kind of adornment.
    reason: lexical_alternative
  - marker: b
    text: Or 'with beads' or 'with necklaces'; the Hebrew refers to strung ornaments.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָאווּ
  chosen: are lovely
  alternatives:
  - are beautiful
  - are fitting
  - are comely
  lexicon: HALOT
  rationale: The verb from נאה expresses beauty or suitability. 'Are lovely' is natural modern English and fits the praise context of the poem without sounding archaic like 'comely.'
- source_word: לְחָיַיִךְ
  chosen: your cheeks
  alternatives:
  - your jaws
  - your face
  lexicon: HALOT
  rationale: לחי commonly refers to the cheek/jaw area. In this poetic context, 'your cheeks' is the most idiomatic and visually appropriate English rendering.
- source_word: בַּתֹּרִים
  chosen: with ornaments
  alternatives:
  - with rows
  - with turtledoves
  lexicon: HALOT
  rationale: Though the consonants can suggest 'turtledoves' in other contexts, here the parallel with neck adornment and the broader context of jewelry in vv. 10–11 support the sense of ornamental rows or pendants. 'With ornaments' communicates the likely referent clearly in English while avoiding an overly wooden 'with rows' that leaves the object implicit.
- source_word: צַוָּארֵךְ
  chosen: your neck
  lexicon: HALOT
  rationale: Straightforward anatomical term; 'neck' is the natural equivalent.
- source_word: בַּחֲרוּזִים
  chosen: with strings of jewels
  alternatives:
  - with beads
  - with necklaces
  - with chains
  lexicon: HALOT
  rationale: חרוזים refers to strung ornaments such as beads or jewels. 'Strings of jewels' preserves the image of arranged adornment and matches the poetic parallelism with the previous phrase.
