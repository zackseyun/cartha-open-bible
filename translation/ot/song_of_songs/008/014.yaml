id: SNG.8.14
reference: Song of Songs 8:14
source:
  edition: WLC
  text: בְּרַ֣ח דּוֹדִ֗/י וּֽ/דְמֵה לְ/ךָ֤ לִ/צְבִי֙ א֚וֹ לְ/עֹ֣פֶר הָֽ/אַיָּלִ֔ים עַ֖ל הָרֵ֥י בְשָׂמִֽים׀־׃
translation:
  text: Flee[a], my beloved[c][b], and be like a gazelle or a young stag on the mountains of spices.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Flee, my beloved.' The Hebrew verb can be rendered more literally as 'flee' or 'run away,' but here likely conveys swift movement in romantic imagery rather than fearful escape.
    reason: lexical_alternative
  - marker: b
    text: Or, 'a young deer.' The Hebrew expression literally refers to a young one of the stags/deer.
    reason: lexical_alternative
  - marker: c
    text: Compare Song 2:17, which uses similar imagery of the beloved as a gazelle or young stag on rugged heights.
    reason: cross_reference
lexical_decisions:
- source_word: בְּרַח
  chosen: Hurry away
  alternatives:
  - Flee
  - Run away
  lexicon: HALOT
  rationale: The imperative from ברח literally means 'flee' or 'run away,' but in this love-poem context a wooden 'flee' can sound like rejection. The closing verse echoes 2:17, where the imagery is of swift movement like a gazelle. 'Hurry away' preserves the urgency and motion without implying fear or hostility.
- source_word: דּוֹדִי
  chosen: my beloved
  alternatives:
  - my love
  lexicon: HALOT
  rationale: דּוֹד in Song of Songs is a term of endearment for the male lover. 'My beloved' is the most established and semantically fitting English equivalent, preserving both affection and relational specificity.
- source_word: וּדְמֵה לְךָ
  chosen: and be like
  alternatives:
  - and make yourself like
  - and resemble
  lexicon: HALOT
  rationale: The verb דמה with ל conveys likeness or resemblance. 'Be like' is idiomatic, concise, and natural in English while preserving the imperative force.
- source_word: לִצְבִי
  chosen: a gazelle
  alternatives:
  - a roe
  lexicon: HALOT
  rationale: צְבִי refers to a gazelle or similar graceful deer-like animal. 'Gazelle' is the clearest modern English rendering; 'roe' is archaic and less precise for contemporary readers.
- source_word: אֹו לְעֹפֶר הָאַיָּלִים
  chosen: or a young stag
  alternatives:
  - or a fawn of the stags
  - or a young deer
  lexicon: HALOT
  rationale: עֹפֶר is a young animal, and הָאַיָּלִים refers to stags/deer. 'Young stag' captures the masculine imagery and parallel with the male beloved better than the more generic 'young deer.'
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: The preposition is straightforward here. 'On' is natural English for movement or presence across elevated terrain.
- source_word: הָרֵי בְשָׂמִים
  chosen: the mountains of spices
  alternatives:
  - the mountains of balsam
  - the hills of fragrance
  - the mountains of perfumes
  lexicon: HALOT
  rationale: בְשָׂמִים denotes aromatic substances, spices, or perfumes. 'Mountains of spices' is both literal and evocative, and it preserves the poetic imagery without over-specifying the botanical reference.
