id: DEU.20.12
reference: Deuteronomy 20:12
source:
  edition: WLC
  text: וְ/אִם לֹ֤א תַשְׁלִים֙ עִמָּ֔/ךְ וְ/עָשְׂתָ֥ה עִמְּ/ךָ֖ מִלְחָמָ֑ה וְ/צַרְתָּ֖ עָלֶֽי/הָּ־׃
translation:
  text: But if it does not make peace with you[a], but makes war against you[b], then you shall besiege it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wages war against you.' The Hebrew idiom is literally 'makes war with/against you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'lay siege to it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַשְׁלִים
  chosen: make peace
  alternatives:
  - sue for peace
  - agree to peace
  - be at peace
  lexicon: HALOT
  rationale: Hiphil of שׁלם here means to enter into peaceful relations or conclude peace. 'Make peace' is clear modern English and preserves the active sense better than the more idiomatic but interpretive 'sue for peace.'
- source_word: עִמָּךְ
  chosen: with you
  lexicon: HALOT
  rationale: Standard rendering of עִם with 2ms suffix. Although the morphology line shows a 2fs suffix at this point, the sense in context is the singular addressee Israel/commander, naturally rendered 'with you.'
- source_word: וְעָשְׂתָה ... מִלְחָמָה
  chosen: it makes war against you
  alternatives:
  - it wages war against you
  - it fights against you
  lexicon: HALOT
  rationale: The idiom עשה מלחמה means 'make/wage war.' 'Makes war against you' stays close to the Hebrew while remaining natural. 'Wages war' is also possible, but the chosen rendering preserves the lexical repetition of 'make' from the Hebrew.
- source_word: וְצַרְתָּ
  chosen: you shall besiege
  alternatives:
  - you must besiege
  - you shall lay siege to
  lexicon: HALOT
  rationale: From צור in the sense of besieging a city. 'You shall besiege' reflects the direct instructional force of the qatal with vav in this legal context. 'Lay siege to' is idiomatic but slightly more expansive.
- source_word: עָלֶיהָ
  chosen: it
  alternatives:
  - against it
  - upon it
  lexicon: HALOT
  rationale: With צור, על marks the object of siege. English normally expresses this simply as 'besiege it,' so the preposition is absorbed into idiomatic English rather than translated woodenly.
- source_word: וְאִם לֹא
  chosen: But if ... not
  alternatives:
  - And if ... not
  - If ... not
  lexicon: HALOT
  rationale: The conjunction marks contrast with the previous verse's peaceful outcome. 'But if' best signals the adversative transition in English.
