id: DEU.12.19
reference: Deuteronomy 12:19
source:
  edition: WLC
  text: הִשָּׁ֣מֶר לְ/ךָ֔ פֶּֽן תַּעֲזֹ֖ב אֶת הַ/לֵּוִ֑י כָּל יָמֶ֖י/ךָ עַל אַדְמָתֶֽ/ךָ־־־־׃ס
translation:
  text: Be careful that you do not forsake the Levite all your days on your land[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Levites'; the Hebrew has the singular 'the Levite,' likely used representatively for the Levite as a class.
    reason: lexical_alternative
  - marker: b
    text: Or 'in your land.' The Hebrew literally says 'on your land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשָּׁמֶר לְךָ
  chosen: Be careful
  alternatives:
  - Take care
  - Guard yourself
  lexicon: HALOT
  rationale: The Niphal imperative of שׁמר with לְךָ is an idiomatic warning meaning to watch oneself or be careful. 'Be careful' is natural modern English and preserves the force of admonition without sounding wooden.
- source_word: פֶּן
  chosen: that ... not
  alternatives:
  - lest
  lexicon: HALOT
  rationale: פֶּן introduces a negative warning clause. In contemporary English, 'that you do not' communicates the sense clearly; 'lest' is more formal but less natural for the target readership.
- source_word: תַּעֲזֹב
  chosen: forsake
  alternatives:
  - abandon
  - neglect
  lexicon: HALOT
  rationale: עזב commonly means leave, forsake, or abandon. Here the covenantal-social obligation toward the Levite is in view; 'forsake' preserves the moral weight better than the milder 'neglect,' while remaining idiomatic.
- source_word: אֶת הַלֵּוִי
  chosen: the Levite
  alternatives:
  - the Levites
  lexicon: HALOT
  rationale: The singular with article is best rendered 'the Levite,' functioning as a representative singular for the Levite as a socially vulnerable class within Israel. Keeping the singular follows the Hebrew form and preserves the representative force.
- source_word: כָּל יָמֶיךָ
  chosen: all your days
  alternatives:
  - all the days of your life
  - as long as you live
  lexicon: HALOT
  rationale: The phrase literally means 'all your days.' This is clear in English and preserves the formal cadence of the Hebrew. Expanded renderings are possible but not necessary.
- source_word: עַל אַדְמָתֶךָ
  lemma: עַל
  chosen: on your land
  alternatives:
  - in your land
  - upon your soil
  lexicon: HALOT
  rationale: אדמה refers to ground/land/soil. In this covenantal setting, 'land' is the most natural English choice. 'On your land' follows the preposition עַל more closely than 'in your land,' though both are possible.
