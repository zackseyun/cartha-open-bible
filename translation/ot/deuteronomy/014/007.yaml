- issue: Nature of uncleanness in dietary law
  chosen_reading: unclean
  alternative_readings:
  - ritually unclean
  - ceremonially unclean
  rationale: The Hebrew טָמֵא in this legal context concerns covenantal purity categories. The main text keeps the broader biblical term 'unclean' rather than narrowing it to 'ceremonial' or 'ritual' in translation, which would add interpretation beyond the wording of the verse.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make; preserve lexical transparency.'
