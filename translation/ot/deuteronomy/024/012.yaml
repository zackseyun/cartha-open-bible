id: DEU.24.12
reference: Deuteronomy 24:12
source:
  edition: WLC
  text: וְ/אִם אִ֥ישׁ עָנִ֖י ה֑וּא לֹ֥א תִשְׁכַּ֖ב בַּ/עֲבֹטֽ/וֹ־׃
translation:
  text: And if he is a poor man[a], you shall not sleep with his pledge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall not lie down with his collateral,' that is, you must not keep overnight the item he gave as security for a loan.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: And if
  alternatives:
  - But if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional continuation from the previous verse. 'And if' preserves the connective force of ו while remaining natural in English.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine 'man.' Per gender-accurate philosophy, 'man' is retained rather than neutralizing to 'person'.
- source_word: עָנִי
  chosen: poor
  alternatives:
  - afflicted
  - needy
  lexicon: HALOT
  rationale: In this legal context the term denotes economic poverty or vulnerability. 'Poor' is the clearest and most idiomatic rendering.
- source_word: הוּא
  chosen: he is
  alternatives:
  - he
  lexicon: HALOT
  rationale: 'The pronoun adds emphasis to the condition; rendering it with the copula in English makes the clause natural while preserving the sense: ''if he is a poor man.'''
- source_word: לֹא תִשְׁכַּב
  chosen: you shall not sleep
  alternatives:
  - you shall not lie down
  - you must not go to bed
  lexicon: HALOT
  rationale: שׁכב literally means 'lie down/sleep.' In this context it refers to spending the night while retaining the poor man's pledged garment. 'Sleep' is concise and idiomatic, while the following phrase clarifies the object involved.
- source_word: בַּעֲבֹטוֹ
  chosen: with his pledge
  alternatives:
  - with his collateral
  - with what he has given in pledge
  lexicon: HALOT
  rationale: עֲבוֹט refers to an item taken as security for a loan. The preposition ב here is best rendered idiomatically as 'with,' meaning in possession of it overnight. 'Pledge' is more readable than 'collateral' and fits the legal setting.
