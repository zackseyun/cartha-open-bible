id: DEU.13.1
reference: Deuteronomy 13:1
source:
  edition: WLC
  text: אֵ֣ת כָּל הַ/דָּבָ֗ר אֲשֶׁ֤ר אָנֹכִי֙ מְצַוֶּ֣ה אֶתְ/כֶ֔ם אֹת֥/וֹ תִשְׁמְר֖וּ לַ/עֲשׂ֑וֹת לֹא תֹסֵ֣ף עָלָ֔י/ו וְ/לֹ֥א תִגְרַ֖ע מִמֶּֽ/נּוּ־־׃פ
translation:
  text: Every word that I am commanding you[a], you shall be careful to do. You shall not add to it[b], and you shall not take away from it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every word that I am commanding you.' The Hebrew has a collective singular, literally 'all the word.'
    reason: lexical_alternative
  - marker: b
    text: In some English versifications, this verse is numbered as Deuteronomy 12:32.
    reason: textual_variant
lexical_decisions:
- source_word: כָּל הַדָּבָר
  chosen: all the word
  alternatives:
  - every word
  - all that
  lexicon: HALOT
  rationale: The singular דָּבָר is retained with 'word' rather than generalized to 'things' or 'commands,' preserving the Hebrew's collective singular. 'All the word' is slightly formal but reflects the source closely; 'every word' is a smoother alternative but shifts number.
- source_word: מְצַוֶּה
  chosen: am commanding
  alternatives:
  - command
  - am commanding you
  lexicon: HALOT
  rationale: The participle conveys ongoing or immediate force, so 'am commanding' best reflects the aspect. The object 'you' is already explicit elsewhere in the clause, so it need not be repeated in English.
- source_word: תִשְׁמְרוּ לַעֲשׂוֹת
  chosen: shall be careful to do
  alternatives:
  - shall keep to do
  - shall keep and do
  - shall carefully observe to do
  lexicon: HALOT
  rationale: The idiom שׁמר + infinitive means to keep/observe carefully so as to do. 'Be careful to do' communicates the Hebrew idiom naturally in modern English without losing the sense of attentive obedience.
- source_word: לֹא תֹסֵף עָלָיו
  chosen: shall not add to it
  alternatives:
  - must not add to it
  lexicon: HALOT
  rationale: יסף in Hiphil with עַל expresses adding onto something. 'Add to it' is the standard and precise rendering.
- source_word: וְלֹא תִגְרַע מִמֶּנּוּ
  chosen: shall not take away from it
  alternatives:
  - shall not diminish from it
  - shall not subtract from it
  lexicon: HALOT
  rationale: גרע means to diminish, reduce, or withdraw. 'Take away from it' is idiomatic English and matches the legal-prohibitive force of the Hebrew.
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: The independent pronoun gives explicit emphasis, but normal English does not require marked emphasis here. 'I' sufficiently conveys the speaker's authority in context.
