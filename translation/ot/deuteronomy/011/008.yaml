id: DEU.11.8
reference: Deuteronomy 11:8
source:
  edition: WLC
  text: וּ/שְׁמַרְתֶּם֙ אֶת כָּל הַ/מִּצְוָ֔ה אֲשֶׁ֛ר אָנֹכִ֥י מְצַוְּ/ךָ֖ הַ/יּ֑וֹם לְמַ֣עַן תֶּחֶזְק֗וּ וּ/בָאתֶם֙ וִֽ/ירִשְׁתֶּ֣ם אֶת הָ/אָ֔רֶץ אֲשֶׁ֥ר אַתֶּ֛ם עֹבְרִ֥ים שָׁ֖מָּ/ה לְ/רִשְׁתָּֽ/הּ־־־׃
translation:
  text: So keep every commandment that I am commanding you today[c][b][a], so that you may be strong and go in and possess the land that you are crossing over to possess.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the whole commandment'; the singular 'commandment' functions collectively, meaning the full body of commands.
    reason: lexical_alternative
  - marker: b
    text: Or 'be strengthened.' The Hebrew verb can denote becoming strong or being made strong in context.
    reason: lexical_alternative
  - marker: c
    text: Or 'inherit' / 'take possession of' for 'possess' in both occurrences of the verb.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁמַרְתֶּם
  chosen: So keep
  alternatives:
  - And keep
  - Therefore keep
  - Observe
  lexicon: HALOT
  rationale: שׁמר in covenantal/legal contexts commonly means to keep/observe commandments. 'Keep' is idiomatic modern English. The prefixed conjunction is rendered 'So' to reflect discourse continuity and inferential force from the preceding context, while remaining natural.
- source_word: כָּל הַמִּצְוָה
  chosen: every commandment
  alternatives:
  - all the commandment
  - the whole commandment
  - every command
  lexicon: HALOT
  rationale: The Hebrew uses singular מִצְוָה with כָּל, a collective singular. 'Every commandment' communicates the distributive force in natural English better than the wooden 'all the commandment,' while preserving the sense of comprehensive obedience.
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  chosen: that I am commanding you today
  alternatives:
  - which I command you today
  - that I command you today
  lexicon: HALOT
  rationale: 'The participle מְצַוֶּה can be rendered with an English progressive for vivid present force: ''am commanding.'' The singular suffix on ''you'' reflects Israel addressed corporately; English ''you'' preserves this without awkwardness.'
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: HALOT
  rationale: Standard purpose/result marker; 'so that' is clear and natural.
- source_word: תֶּחֶזְקוּ
  chosen: you may be strong
  alternatives:
  - you may be strengthened
  - you may take courage
  - you may prevail
  lexicon: HALOT
  rationale: Qal of חזק here most naturally expresses becoming/being strong for the task ahead. 'Be strong' fits the conquest context without overinterpreting as specifically military courage.
- source_word: וּבָאתֶם
  chosen: and go in
  alternatives:
  - and enter
  - and come in
  lexicon: HALOT
  rationale: בוא in land-entry contexts often means enter/go in. 'Go in' fits the deictic perspective of the audience approaching the land and pairs well with the following verb.
- source_word: וִירִשְׁתֶּם
  chosen: and possess
  alternatives:
  - and take possession of
  - and inherit
  lexicon: HALOT
  rationale: ירשׁ can mean inherit, dispossess, or possess depending on context. Here, with the land as object and Israel entering it, 'possess' is the best concise rendering; 'inherit' is possible but can sound overly passive in English.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Deuteronomy, הָאָרֶץ regularly refers to the promised land. 'Land' preserves the covenantal-geographical sense better than 'country.'
- source_word: אֲשֶׁר אַתֶּם עֹבְרִים שָׁמָּה
  chosen: that you are crossing over there
  alternatives:
  - that you are crossing over to
  - which you are crossing over there
  lexicon: HALOT
  rationale: עֹבְרִים with שָׁמָּה literally includes the directional adverb 'there/thereward.' Retaining 'there' preserves the Hebrew deixis, though English could omit it. 'Crossing over' reflects the Jordan-crossing context.
- source_word: לְרִשְׁתָּהּ
  chosen: to possess
  alternatives:
  - to take possession of it
  - to inherit it
  lexicon: HALOT
  rationale: Infinitive of purpose from ירשׁ resumes and reinforces the goal of entering the land. 'To possess' keeps the lexical link with the previous finite verb; the object 'it' is omitted in English as stylistically unnecessary because 'the land' is already explicit.
