theological_decisions:
- issue: Corporate singular/plural address in covenant command
  chosen_reading: Retain normal English 'you' without artificially marking singular/plural shifts
  alternative_readings:
  - Use 'you all' or similar to mark plural forms
  - Flatten the syntax into a generic paraphrase about Israel
  rationale: The verse mixes a singular suffix in 'I am commanding you' with plural imperatives/verbs addressing Israel corporately. English 'you' best preserves readability while allowing the corporate address to stand without interpretive overstatement.
  doctrine_reference: Translation philosophy §6; §5
