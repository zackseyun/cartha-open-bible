id: DEU.11.6
reference: Deuteronomy 11:6
source:
  edition: WLC
  text: וַ/אֲשֶׁ֨ר עָשָׂ֜ה לְ/דָתָ֣ן וְ/לַ/אֲבִירָ֗ם בְּנֵ֣י אֱלִיאָב֮ בֶּן רְאוּבֵן֒
    אֲשֶׁ֨ר פָּצְתָ֤ה הָ/אָ֨רֶץ֙ אֶת פִּ֔י/הָ וַ/תִּבְלָעֵ֥/ם וְ/אֶת בָּתֵּי/הֶ֖ם
    וְ/אֶת אָהֳלֵי/הֶ֑ם וְ/אֵ֤ת כָּל הַ/יְקוּם֙ אֲשֶׁ֣ר בְּ/רַגְלֵי/הֶ֔ם בְּ/קֶ֖רֶב
    כָּל יִשְׂרָאֵֽל־־־־־־׃
translation:
  text: and what he did to Dathan and Abiram, sons of Eliab son of Reuben—how the
    earth opened its mouth and swallowed them, their households, their tents, and
    every living thing that followed them, in the midst of all Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'their houses.' The Hebrew may refer either to their physical
      dwellings or, more broadly, to their households.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'all the yĕqûm that was at their feet.' The phrase likely refers
      to all who and what belonged to or accompanied them.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָשָׂה
  chosen: did
  alternatives:
  - dealt with
  - worked
  lexicon: HALOT
  rationale: Common verb 'do/make'; in this retrospective clause, 'did' is the most
    natural and sufficiently formal rendering.
- source_word: בְּנֵי אֱלִיאָב בֶּן רְאוּבֵן
  chosen: sons of Eliab son of Reuben
  alternatives:
  - the sons of Eliab, the Reubenite
  lexicon: HALOT
  rationale: Preserves the genealogical wording of the Hebrew rather than smoothing
    it into an adjectival ethnic label.
- source_word: פָּצְתָה הָאָרֶץ אֶת־פִּיהָ
  chosen: the earth opened its mouth
  alternatives:
  - the ground opened its mouth
  - the earth split open
  lexicon: HALOT
  rationale: Keeps the vivid personified idiom of the Hebrew. 'Earth' matches אָרֶץ
    directly; 'opened its mouth' preserves the metaphor better than the more interpretive
    'split open'.
- source_word: וַתִּבְלָעֵם
  chosen: swallowed them
  alternatives:
  - consumed them
  lexicon: HALOT
  rationale: The verb בלע commonly means 'swallow'; this is the standard and concrete
    image in context.
- source_word: בָּתֵּיהֶם
  chosen: their households
  alternatives:
  - their houses
  lexicon: HALOT
  rationale: Although literally 'their houses,' in this destruction context the reference
    is likely to the household units/persons associated with them, especially since
    'their tents' is listed separately. 'Households' best captures the sense without
    redundancy.
- source_word: אָהֳלֵיהֶם
  chosen: their tents
  alternatives:
  - their dwellings
  lexicon: HALOT
  rationale: Literal rendering is clear and fits the wilderness setting.
- source_word: כָּל־הַיְקוּם
  chosen: every living thing
  alternatives:
  - all existence
  - all substance
  - all that stood
  lexicon: HALOT
  rationale: The noun denotes that which exists or stands up, here referring to all
    animate dependents/property associated with them. 'Every living thing' communicates
    the practical sense in context more clearly than the abstract 'all existence.'
- source_word: אֲשֶׁר בְּרַגְלֵיהֶם
  chosen: that followed them
  alternatives:
  - that was at their feet
  - that belonged to them
  lexicon: HALOT
  rationale: Literally 'that was at their feet,' an idiom for what accompanied or
    belonged to them. 'That followed them' is an idiomatic English rendering that
    preserves the relational sense without awkwardness.
- source_word: בְּקֶרֶב כָּל־יִשְׂרָאֵל
  chosen: in the midst of all Israel
  alternatives:
  - among all Israel
  - before all Israel
  lexicon: HALOT
  rationale: Retains the spatial/public sense of the event occurring among the whole
    people. 'In the midst of all Israel' is slightly more formal and close to the
    Hebrew.
