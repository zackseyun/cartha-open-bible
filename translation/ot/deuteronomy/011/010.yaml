id: DEU.11.10
reference: Deuteronomy 11:10
source:
  edition: WLC
  text: כִּ֣י הָ/אָ֗רֶץ אֲשֶׁ֨ר אַתָּ֤ה בָא שָׁ֨מָּ/ה֙ לְ/רִשְׁתָּ֔/הּ לֹ֣א כְ/אֶ֤רֶץ
    מִצְרַ֨יִם֙ הִ֔וא אֲשֶׁ֥ר יְצָאתֶ֖ם מִ/שָּׁ֑ם אֲשֶׁ֤ר תִּזְרַע֙ אֶֽת זַרְעֲ/ךָ֔
    וְ/הִשְׁקִ֥יתָ בְ/רַגְלְ/ךָ֖ כְּ/גַ֥ן הַ/יָּרָֽק־־׃
translation:
  text: For the land that you are entering to possess is not like the land of Egypt,
    from where you came out, where you sowed your seed and watered it with your foot,
    like a vegetable garden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'where you would sow your seed and water it with your foot,' expressing
      Egypt's habitual irrigation practices.
    reason: lexical_alternative
  - marker: b
    text: '''With your foot'' likely refers to foot-operated irrigation or to guiding
      water through channels by foot.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding exhortation; 'For' fits
    the discourse connection naturally in English.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  lexicon: HALOT
  rationale: Standard rendering for אֶרֶץ in Deuteronomy's covenantal-geographical
    context; 'land' preserves the thematic link to the promised land.
- source_word: בָא שָׁמָּה
  chosen: you are entering
  alternatives:
  - you are going there
  - you come there
  lexicon: HALOT
  rationale: English progressive captures the imminent movement into the land; smoother
    than a more wooden 'you come there' while preserving the participial sense.
- source_word: לְרִשְׁתָּהּ
  chosen: to possess
  alternatives:
  - to take possession of
  - to inherit
  lexicon: HALOT
  rationale: ירשׁ in Deuteronomy often carries covenantal possession language. 'To
    possess' is concise and standard; 'inherit' is possible but can overemphasize
    filial nuance not explicit here.
- source_word: לֹא כְאֶרֶץ מִצְרַיִם
  chosen: is not like the land of Egypt
  alternatives:
  - is not as the land of Egypt
  lexicon: HALOT
  rationale: Natural English comparison preserving the explicit contrast between Canaan
    and Egypt.
- source_word: אֲשֶׁר יְצָאתֶם מִשָּׁם
  chosen: from where you came out
  alternatives:
  - from which you came out
  - where you left
  lexicon: HALOT
  rationale: Retains the exodus idiom 'came out' rather than flattening to 'left,'
    preserving the salvation-historical resonance.
- source_word: אֲשֶׁר תִּזְרַע אֶת זַרְעֲךָ
  chosen: where you sowed your seed
  alternatives:
  - where you would sow your seed
  - where you sow your crop
  lexicon: HALOT
  rationale: Although the Hebrew imperfect can have habitual force in past description,
    English simple past works idiomatically in this retrospective comparison. 'Seed'
    is more literal than 'crop.'
- source_word: וְהִשְׁקִיתָ
  chosen: and watered it
  alternatives:
  - and irrigated it
  lexicon: HALOT
  rationale: Direct and readable rendering. The object 'it' is supplied in English
    from the agricultural context, referring to what was sown/the field.
- source_word: בְרַגְלְךָ
  chosen: with your foot
  alternatives:
  - by footwork
  - with your feet
  lexicon: HALOT
  rationale: Literal rendering preserves the concrete image of foot-operated irrigation
    or channeling. Singular follows the Hebrew form.
- source_word: כְּגַן הַיָּרָק
  chosen: like a vegetable garden
  alternatives:
  - like a garden of greens
  - like an herb garden
  lexicon: HALOT
  rationale: Conveys a small, intensively watered garden plot. 'Vegetable garden'
    is clear modern English and fits the irrigation comparison.
