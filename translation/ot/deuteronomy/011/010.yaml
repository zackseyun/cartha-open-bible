theological_decisions:
- issue: Exodus idiom in covenantal context
  chosen_reading: from where you came out
  alternative_readings:
  - from which you departed
  - which you left
  rationale: The verse recalls Israel's exodus from Egypt. Preserving the idiom 'came
    out' maintains the canonical and theological resonance without adding interpretation
    beyond the text.
