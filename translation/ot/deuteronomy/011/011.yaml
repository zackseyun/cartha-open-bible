id: DEU.11.11
reference: Deuteronomy 11:11
source:
  edition: WLC
  text: וְ/הָ/אָ֗רֶץ אֲשֶׁ֨ר אַתֶּ֜ם עֹבְרִ֥ים שָׁ֨מָּ/ה֙ לְ/רִשְׁתָּ֔/הּ אֶ֥רֶץ הָרִ֖ים וּ/בְקָעֹ֑ת לִ/מְטַ֥ר הַ/שָּׁמַ֖יִם תִּשְׁתֶּה מָּֽיִם־׃
translation:
  text: But the land that you are crossing over to possess is a land of mountains and valleys[b][a]; it drinks water from the rain of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to inherit.' The Hebrew verb can carry both possession and inheritance overtones in covenantal contexts.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the heavens,' a standard biblical expression for the sky/heavenly realm.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָאָרֶץ
  chosen: But the land
  alternatives:
  - And the land
  - Now the land
  lexicon: HALOT
  rationale: The conjunction waw here marks contrast with the previous verse's description of Egypt, so 'But' best conveys the discourse function in natural English while retaining the referent 'the land'.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Standard relative pronoun introducing the clause modifying 'land.' 'That' is idiomatic modern English.
- source_word: עֹבְרִים שָׁמָּה
  chosen: you are crossing over
  alternatives:
  - you are going over there
  - you are crossing there
  lexicon: HALOT
  rationale: The participle with directional adverb expresses imminent/ongoing movement into the land. English naturally omits an explicit 'there' because 'to possess' already implies destination.
- source_word: לְרִשְׁתָּהּ
  chosen: to possess
  alternatives:
  - to take possession of
  - to inherit
  lexicon: HALOT
  rationale: ירשׁ in Deuteronomy often carries covenantal possession/inheritance overtones. 'Possess' is concise and faithful; 'inherit' is possible but can sound overly passive here, while Israel's active entry is in view.
- source_word: אֶרֶץ הָרִים וּבְקָעֹת
  chosen: a land of mountains and valleys
  alternatives:
  - a land of hills and valleys
  - a land of mountains and plains
  lexicon: HALOT
  rationale: The appositional phrase characterizes the terrain. 'Mountains' reflects הָרִים straightforwardly. בְקָעוֹת denotes valleys/basins/rifts; 'valleys' is the clearest natural counterpart in this terrain contrast.
- source_word: לִמְטַר הַשָּׁמַיִם
  chosen: from the rain of the heavens
  alternatives:
  - by the rain of heaven
  - from heaven's rain
  - from the rain of the sky
  lexicon: HALOT
  rationale: 'The preposition ל here expresses relation/source with the following verb: the land receives its water by means of rainfall. ''From the rain of the heavens'' preserves the imagery and the plural ''heavens'' common in Hebrew, while remaining readable.'
- source_word: תִּשְׁתֶּה מָּיִם
  chosen: it drinks water
  alternatives:
  - it receives water
  - it is watered
  lexicon: HALOT
  rationale: The Hebrew personifies the land as drinking. Retaining 'drinks water' preserves the vivid metaphor rather than flattening it into an abstract passive.
