id: DEU.11.20
reference: Deuteronomy 11:20
source:
  edition: WLC
  text: וּ/כְתַבְתָּ֛/ם עַל מְזוּז֥וֹת בֵּיתֶ֖/ךָ וּ/בִ/שְׁעָרֶֽי/ךָ־׃
translation:
  text: And you shall write them on the doorposts of your house and on your gates.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'doorframes.' The Hebrew term refers to the posts of the doorway.
    reason: lexical_alternative
  - marker: b
    text: Or 'at your gates.' The Hebrew can refer to the gate area as well as the
      gates themselves.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְתַבְתָּם
  chosen: And you shall write them
  alternatives:
  - and write them
  - you are to write them
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this instructional context continues
    the series of covenant commands and is best rendered with English future/imperatival
    force, 'you shall write.' The 3mp suffix refers back to the words/commands previously
    mentioned, so 'them' is retained.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: The preposition straightforwardly indicates placement on a surface; 'on'
    is natural modern English and sufficiently formal.
- source_word: מְזוּזוֹת
  chosen: doorposts
  alternatives:
  - doorframes
  - mezuzot
  lexicon: HALOT
  rationale: The noun denotes the doorposts or side-posts of an entrance. 'Doorposts'
    is the clearest idiomatic English equivalent. 'Mezuzot' would be a transliteration
    of later Jewish practice rather than a direct translation of the common noun in
    this context.
- source_word: בֵּיתֶךָ
  chosen: of your house
  alternatives:
  - of your home
  lexicon: HALOT
  rationale: בַּיִת commonly means 'house.' 'House' preserves the concrete sense and
    matches the covenant-household context better than the slightly more interpretive
    'home.'
- source_word: וּבִשְׁעָרֶיךָ
  chosen: and on your gates
  alternatives:
  - and on your gateposts
  - and at your gates
  lexicon: HALOT
  rationale: שַׁעַר ordinarily refers to a gate, often the entrance area of a settlement
    or property. 'Gates' is the standard and most direct rendering. The repeated preposition
    is carried into English for clarity and rhythm.
