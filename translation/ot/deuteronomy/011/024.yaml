theological_decisions:
- issue: Geographic promise language
  chosen_reading: Render the verse as a territorial boundary promise without importing later theological interpretations about fulfillment or typology.
  alternative_readings:
  - Interpret as idealized borders
  - Interpret as unconditional perpetual possession
  rationale: The verse itself states the promised extent of Israel's land in covenantal terms. The translation should present the geographic claim plainly and not resolve broader theological debates not explicit in the text.
  doctrine_reference: Translation philosophy §1, §3
