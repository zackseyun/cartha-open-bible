id: DEU.11.24
reference: Deuteronomy 11:24
source:
  edition: WLC
  text: כָּל הַ/מָּק֗וֹם אֲשֶׁ֨ר תִּדְרֹ֧ךְ כַּֽף רַגְלְ/כֶ֛ם בּ֖/וֹ לָ/כֶ֣ם יִהְיֶ֑ה מִן הַ/מִּדְבָּ֨ר וְ/הַ/לְּבָנ֜וֹן מִן הַ/נָּהָ֣ר נְהַר פְּרָ֗ת וְ/עַד֙ הַ/יָּ֣ם הָֽ/אַחֲר֔וֹן יִהְיֶ֖ה גְּבֻלְ/כֶֽם־־־־־׃
translation:
  text: Every place where the sole of your foot treads will be yours; from the wilderness and Lebanon[a], from the River, the Euphrates River, as far as the western sea, will be your border.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as far as the western sea,' traditionally understood as the Mediterranean Sea; literally 'the hindmost/last sea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הַמָּקוֹם
  chosen: Every place
  alternatives:
  - Every מקום
  - the whole place
  - every spot
  lexicon: HALOT
  rationale: Idiomatic distributive expression meaning each place/location rather than one total area. 'Every place' is natural English and preserves the scope.
- source_word: אֲשֶׁר תִּדְרֹךְ כַּף רַגְלְכֶם בּוֹ
  chosen: where the sole of your foot treads
  alternatives:
  - on which the sole of your foot steps
  - where your foot sole walks
  lexicon: HALOT
  rationale: כַּף רֶגֶל is a set phrase for the sole of the foot. The verb דרך here means to tread/step. Singular verb with collective subject is rendered naturally in English with 'your foot treads' while keeping the concrete imagery.
- source_word: לָכֶם יִהְיֶה
  chosen: will be yours
  alternatives:
  - shall be yours
  - will belong to you
  lexicon: HALOT
  rationale: Possessive/resultative sense is best conveyed by 'will be yours,' concise and natural while preserving the promise formula.
- source_word: מִן הַמִּדְבָּר
  chosen: from the wilderness
  alternatives:
  - from the desert
  lexicon: HALOT
  rationale: מִדְבָּר can mean wilderness/desert. 'Wilderness' is broader and fits the geographic boundary formula without over-specifying aridity.
- source_word: וְהַלְּבָנוֹן
  chosen: and Lebanon
  alternatives:
  - to Lebanon
  lexicon: HALOT
  rationale: The conjunction links boundary markers. English can preserve the Hebrew sequence 'from the wilderness and Lebanon,' though the sense is geographic extent up to Lebanon.
- source_word: מִן הַנָּהָר נְהַר פְּרָת
  chosen: from the River, the Euphrates River
  alternatives:
  - from the river, the Euphrates
  - from the Euphrates River
  lexicon: HALOT
  rationale: Hebrew first gives the generic title 'the River' and then appositionally identifies it as the Euphrates. Retaining both reflects the source structure and emphasis.
- source_word: וְעַד הַיָּם הָאַחֲרוֹן
  chosen: as far as the western sea
  alternatives:
  - to the western sea
  - to the hinder sea
  - to the last sea
  lexicon: HALOT
  rationale: אַחֲרוֹן literally means 'hind/last,' but in geographic orientation it refers to the sea to the west (the Mediterranean), since east is the primary orientation in biblical Hebrew. 'Western sea' communicates the sense clearly in modern English.
- source_word: יִהְיֶה גְּבֻלְכֶם
  chosen: will be your border
  alternatives:
  - shall be your territory
  - will be your boundary
  lexicon: HALOT
  rationale: גְּבוּל denotes border/boundary/territory. 'Border' fits the geographic-boundary context and reads naturally with the preceding extent formula.
