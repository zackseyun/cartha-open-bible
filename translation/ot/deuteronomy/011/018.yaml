id: DEU.11.18
reference: Deuteronomy 11:18
source:
  edition: WLC
  text: וְ/שַׂמְתֶּם֙ אֶת דְּבָרַ֣/י אֵ֔לֶּה עַל לְבַבְ/כֶ֖ם וְ/עַֽל נַפְשְׁ/כֶ֑ם וּ/קְשַׁרְתֶּ֨ם אֹתָ֤/ם לְ/אוֹת֙ עַל יֶדְ/כֶ֔ם וְ/הָי֥וּ לְ/טוֹטָפֹ֖ת בֵּ֥ין עֵינֵי/כֶֽם־־־־׃
translation:
  text: So you shall place these words of mine on your heart and on your soul[a], and you shall bind them as a sign on your hand, and they shall be as frontlets between your eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'phylacteries,' referring to small scripture containers later worn in Jewish practice; the Hebrew term is rare and its exact nuance is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתֶּם
  chosen: you shall place
  alternatives:
  - you shall lay
  - you shall put
  lexicon: HALOT
  rationale: שׂים commonly means 'put, place, set.' 'Place' is natural modern English while preserving the concrete imperative force better than a more interpretive rendering like 'take to heart.' The prefixed conjunction is carried as 'So' to reflect continuation from the prior context.
- source_word: דְּבָרַי אֵלֶּה
  chosen: these words of mine
  alternatives:
  - these my words
  - these words
  lexicon: HALOT
  rationale: The construct with 1cs suffix is most naturally rendered possessively. 'These words of mine' is idiomatic and preserves emphasis on the speaker's own words.
- source_word: עַל לְבַבְכֶם
  chosen: on your heart
  alternatives:
  - upon your heart
  - in your heart
  lexicon: HALOT
  rationale: The preposition is literally 'on/upon.' English idiom allows 'on your heart' here while preserving the Hebrew imagery. 'In your heart' would be smoother but less formally aligned.
- source_word: וְעַל נַפְשְׁכֶם
  chosen: and on your soul
  alternatives:
  - and on your life
  - and on your inner being
  lexicon: HALOT
  rationale: נֶפֶשׁ has a broad semantic range including soul, self, life. In this covenantal exhortation paired with 'heart,' 'soul' best preserves the traditional anthropological weight without over-interpreting.
- source_word: וּקְשַׁרְתֶּם אֹתָם
  chosen: and you shall bind them
  alternatives:
  - and tie them
  - and fasten them
  lexicon: HALOT
  rationale: קשׁר means 'bind, tie.' 'Bind' fits both literal and symbolic possibilities and preserves the formal register of the command.
- source_word: לְאוֹת
  chosen: as a sign
  alternatives:
  - for a sign
  - as a mark
  lexicon: HALOT
  rationale: אוֹת is 'sign, mark, token.' 'As a sign' is idiomatic and keeps the symbolic sense open.
- source_word: עַל יֶדְכֶם
  chosen: on your hand
  alternatives:
  - upon your hand
  - on your arm
  lexicon: HALOT
  rationale: יָד normally means 'hand,' though sometimes extends to arm. 'Hand' is the plain sense and matches the traditional wording.
- source_word: וְהָיוּ
  chosen: and they shall be
  alternatives:
  - and let them be
  lexicon: HALOT
  rationale: The qatal with vav in this instructional sequence is well represented by future-like 'shall be,' continuing the command sequence.
- source_word: לְטוֹטָפֹת
  chosen: as frontlets
  alternatives:
  - as bands
  - as phylacteries
  lexicon: HALOT
  rationale: טוֹטָפֹת is a rare term traditionally understood as something worn on the forehead. 'Frontlets' preserves the lexical uncertainty without importing the later specifically Jewish term 'phylacteries' into the main text. A footnote preserves that alternative.
- source_word: בֵּין עֵינֵיכֶם
  chosen: between your eyes
  alternatives:
  - on your forehead
  lexicon: HALOT
  rationale: The Hebrew is literally 'between your eyes.' This should be retained in the main text; 'on your forehead' is interpretive and better suited as an explanatory alternative if needed.
