theological_decisions:
- issue: Literal versus metaphorical force of the commands to bind the words on the hand and between the eyes
  chosen_reading: Retain the concrete wording without resolving whether the command is purely metaphorical, purely literal, or both.
  alternative_readings:
  - A figurative exhortation to keep the commandments constantly in mind and action
  - A basis for literal ritual practice such as phylacteries
  rationale: The Hebrew wording is concrete, but the verse itself does not force a single interpretive resolution. Preserving the physical imagery in translation maintains the theological tension rather than deciding the practice for the reader.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
