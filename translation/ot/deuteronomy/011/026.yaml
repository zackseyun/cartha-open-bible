theological_decisions:
- issue: Nature of the blessing/curse formulation
  chosen_reading: Render as covenant alternatives being presented without importing
    later doctrinal explanation.
  alternative_readings:
  - Interpret as a generalized moral principle of reward and punishment
  rationale: The verse introduces covenantal blessing and curse in the Deuteronomic
    context. The translation should preserve the formal presentation of alternatives
    without expanding into interpretive paraphrase.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve the source text''s plain sense.'
