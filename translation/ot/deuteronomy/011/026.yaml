id: DEU.11.26
reference: Deuteronomy 11:26
source:
  edition: WLC
  text: רְאֵ֗ה אָנֹכִ֛י נֹתֵ֥ן לִ/פְנֵי/כֶ֖ם הַ/יּ֑וֹם בְּרָכָ֖ה וּ/קְלָלָֽה׃
translation:
  text: 'See, today I am setting before you a blessing and a curse:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I am giving before you today a blessing and a curse.' The Hebrew verb
      can mean 'give,' but in this construction 'setting before you' is more idiomatic
      in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  chosen: See
  alternatives:
  - Look
  - Behold
  lexicon: HALOT
  rationale: Imperative singular of ראה used discourse-pragmatically to draw attention.
    'See' is natural modern English and preserves the force of the command without
    archaic tone; 'Behold' is too archaic, and 'Look' is slightly more colloquial.
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: Independent first-person pronoun adds emphasis to the participial clause.
    English can convey this adequately with explicit 'I'; adding 'myself' would overstate
    the emphasis in this context.
- source_word: נֹתֵן
  chosen: am setting
  alternatives:
  - am giving
  - set
  - give
  lexicon: HALOT
  rationale: נתן literally means 'give/put/set.' With 'before you' and the present
    discourse setting, 'am setting before you' best captures the idiom of placing
    alternatives before the hearers. 'Am giving' is possible but less idiomatic in
    English here.
- source_word: לִפְנֵיכֶם
  chosen: before you
  alternatives:
  - in front of you
  lexicon: HALOT
  rationale: Standard idiom meaning 'before/in the presence of.' 'Before you' is the
    natural English equivalent in this rhetorical setting.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Temporal adverbial use. 'Today' is clear modern English; 'this day' is
    more formal/traditional but less natural.
- source_word: בְּרָכָה
  chosen: a blessing
  alternatives:
  - blessing
  lexicon: HALOT
  rationale: Indefinite singular noun paired with 'a curse' as the two alternatives
    being set before Israel. The article is absent in Hebrew, and English idiom favors
    the indefinite article here.
- source_word: וּקְלָלָה
  chosen: and a curse
  alternatives:
  - and curse
  lexicon: HALOT
  rationale: Paired antithetical noun with בְּרָכָה. 'A curse' matches the English
    structure and clearly presents the contrast.
