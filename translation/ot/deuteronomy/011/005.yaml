id: DEU.11.5
reference: Deuteronomy 11:5
source:
  edition: WLC
  text: וַ/אֲשֶׁ֥ר עָשָׂ֛ה לָ/כֶ֖ם בַּ/מִּדְבָּ֑ר עַד בֹּאֲ/כֶ֖ם עַד הַ/מָּק֥וֹם הַ/זֶּֽה־־׃
translation:
  text: and what he did for you in the wilderness until you came to this place—
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַאֲשֶׁר
  chosen: and what
  alternatives:
  - and that which
  - and how
  lexicon: HALOT
  rationale: Here the conjunction plus relative particle continues the preceding list
    of things Israel has seen. 'And what' is natural English that preserves the relative
    sense without over-paraphrasing. 'And how' would shift toward manner rather than
    the object/content of what was done.
- source_word: עָשָׂה
  chosen: he did
  alternatives:
  - he made
  - he dealt
  lexicon: HALOT
  rationale: עשה is the common verb 'do/make.' In this context, referring back to
    God's acts toward Israel in the wilderness, 'he did' is the most direct and idiomatic
    rendering.
- source_word: לָכֶם
  chosen: for you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: The preposition ל with this verb in context is best rendered 'for you,'
    expressing action on Israel's behalf. 'To you' is possible but less idiomatic
    in English here.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes the wilderness region of Israel's wandering.
    'Wilderness' fits biblical geography and established English usage better than
    'desert,' which can sound overly specific climatically.
- source_word: עַד
  chosen: until
  alternatives:
  - as far as
  - up to
  lexicon: HALOT
  rationale: 'The first עַד marks temporal extent: God''s actions continued through
    the wilderness period until their arrival. ''Until'' best captures the temporal
    force.'
- source_word: בֹּאֲכֶם
  chosen: you came
  alternatives:
  - your coming
  - you entered
  lexicon: HALOT
  rationale: 'The infinitive construct with suffix from בוא after עַד is naturally
    rendered as a finite clause in English: ''until you came.'' ''Entered'' is possible,
    but the following phrase names a place generally rather than specifically a bounded
    territory.'
- source_word: עַד הַמָּקוֹם הַזֶּה
  chosen: to this place
  alternatives:
  - as far as this place
  - to the place הזה
  lexicon: HALOT
  rationale: The second עַד is spatial, introducing the destination reached. In idiomatic
    English, 'to this place' communicates the sense clearly. Retaining both עַד expressions
    distinctly ('until... to...') reflects the Hebrew's temporal then spatial progression.
