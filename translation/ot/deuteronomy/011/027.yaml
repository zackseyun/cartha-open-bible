id: DEU.11.27
reference: Deuteronomy 11:27
source:
  edition: WLC
  text: אֶֽת הַ/בְּרָכָ֑ה אֲשֶׁ֣ר תִּשְׁמְע֗וּ אֶל מִצְוֺת֙ יְהוָ֣ה אֱלֹֽהֵי/כֶ֔ם
    אֲשֶׁ֧ר אָנֹכִ֛י מְצַוֶּ֥ה אֶתְ/כֶ֖ם הַ/יּֽוֹם־־׃
translation:
  text: the blessing, if you listen to the commandments of the LORD your God that
    I am commanding you today.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the blessing that comes when you obey the commandments of the LORD your
      God.' The Hebrew uses a relative particle with conditional sense.
    reason: lexical_alternative
  - marker: b
    text: '''Listen to'' can also be rendered ''obey,'' since in Hebrew this verb
      often carries the sense of hearing with responsive obedience.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶת הַבְּרָכָה
  chosen: the blessing
  alternatives:
  - the blessing [you shall receive]
  - blessing
  lexicon: HALOT
  rationale: The direct-object marker with 'the blessing' continues the elliptical
    construction from the previous verse ('See, I am setting before you today a blessing
    and a curse'). English can preserve the object phrase succinctly as 'the blessing'
    without adding too much supplied material.
- source_word: אֲשֶׁר
  chosen: if
  alternatives:
  - which
  - that
  lexicon: HALOT
  rationale: Although formally a relative particle ('which/that'), in this context
    it introduces the condition under which the blessing applies. Rendering it as
    'if' communicates the Hebrew sense naturally in English while preserving the conditional
    force.
- source_word: תִּשְׁמְעוּ
  chosen: you listen
  alternatives:
  - you obey
  - you hear
  lexicon: HALOT
  rationale: שׁמע with אֶל can mean hear/listen attentively, often with obedient response
    implied. 'Listen' preserves the lexical sense more directly than 'obey,' while
    still fitting the covenant context.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard rendering with verbs of hearing/listening in English is 'listen
    to.'
- source_word: מִצְוֺת
  chosen: the commandments
  alternatives:
  - the commands
  - the commandments
  lexicon: HALOT
  rationale: '''Commandments'' is the established and precise rendering for מִצְוֹת
    in covenantal/legal contexts, preserving the formal weight of divine instruction.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: 'Construct with second person plural suffix is straightforwardly possessive:
    ''your God.'''
- source_word: אֲשֶׁר אָנֹכִי מְצַוֶּה אֶתְכֶם הַיּוֹם
  chosen: that I am commanding you today
  alternatives:
  - which I command you today
  - that I command you today
  lexicon: HALOT
  rationale: The participle מְצַוֶּה has present/imperfective force in context. 'I
    am commanding' reflects the ongoing speech-act of Moses in the present discourse;
    'today' retains the covenantal immediacy.
