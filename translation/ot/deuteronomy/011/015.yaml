theological_decisions:
- issue: Representative singular address to Israel
  chosen_reading: Retain second-person singular ('your field,' 'your livestock,' 'you
    will eat')
  alternative_readings:
  - 'Pluralize for contemporary English: ''your fields ... you will eat'''
  rationale: The Hebrew consistently uses second masculine singular in covenant address
    to Israel. Retaining the singular preserves the source-text form and its rhetorical
    force without obscuring meaning.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Nature of the promised blessing
  chosen_reading: Translate as ordinary covenantal agricultural provision without
    expanding the sense
  alternative_readings:
  - Interpret more explicitly as divine prosperity or abundance
  rationale: The verse promises pasture for animals and food leading to satisfaction.
    The translation avoids importing broader prosperity-theology implications not
    explicitly stated in the Hebrew.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 3
