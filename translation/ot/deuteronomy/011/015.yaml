id: DEU.11.15
reference: Deuteronomy 11:15
source:
  edition: WLC
  text: וְ/נָתַתִּ֛י עֵ֥שֶׂב בְּ/שָׂדְ/ךָ֖ לִ/בְהֶמְתֶּ֑/ךָ וְ/אָכַלְתָּ֖ וְ/שָׂבָֽעְתָּ׃
translation:
  text: And I will give grass in your field for your livestock, and you will eat and
    be satisfied.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vegetation' or 'herbage'; the Hebrew term can refer broadly to plant
      growth, but here likely means fodder for livestock.
    reason: lexical_alternative
  - marker: b
    text: Or 'be full.' The Hebrew verb denotes being filled or satisfied after eating.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: And I will give
  alternatives:
  - and I will provide
  - then I will give
  lexicon: HALOT
  rationale: 'Qal perfect 1cs with prefixed conjunction in this promise context is
    best rendered as a future: ''I will give.'' The conjunction is retained as ''And''
    to preserve the sequence from the preceding conditional blessing context.'
- source_word: עֵשֶׂב
  chosen: grass
  alternatives:
  - herbage
  - vegetation
  - plants
  lexicon: HALOT
  rationale: In context with 'for your livestock,' the word refers specifically to
    fodder/growth suitable for animals, so 'grass' is the most natural and contextually
    precise English rendering.
- source_word: בְּשָׂדְךָ
  chosen: in your field
  alternatives:
  - in your land
  - in your pasture
  lexicon: HALOT
  rationale: שָׂדֶה normally means 'field.' 'In your field' preserves the singular
    form and concrete agricultural setting better than the broader 'land.'
- source_word: לִבְהֶמְתֶּךָ
  chosen: for your livestock
  alternatives:
  - for your cattle
  - for your animals
  - for your beasts
  lexicon: HALOT
  rationale: בְּהֵמָה here is collective and refers to domesticated animals in an
    agrarian setting. 'Livestock' communicates the collective sense in clear modern
    English better than the narrower 'cattle' or the less natural 'beasts.'
- source_word: וְאָכַלְתָּ
  chosen: and you will eat
  alternatives:
  - and you shall eat
  lexicon: HALOT
  rationale: Second masculine singular addressed to Israel as a representative singular.
    Future wording fits the promise sequence and readable modern English.
- source_word: וְשָׂבָעְתָּ
  chosen: and be satisfied
  alternatives:
  - and be full
  - and be sated
  lexicon: HALOT
  rationale: The verb denotes being satisfied or filled after eating. 'Be satisfied'
    is idiomatic modern English and conveys more than mere physical fullness, while
    remaining faithful to the agricultural blessing context.
