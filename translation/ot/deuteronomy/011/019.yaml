id: DEU.11.19
reference: Deuteronomy 11:19
source:
  edition: WLC
  text: וְ/לִמַּדְתֶּ֥ם אֹתָ֛/ם אֶת בְּנֵי/כֶ֖ם לְ/דַבֵּ֣ר בָּ֑/ם בְּ/שִׁבְתְּ/ךָ֤ בְּ/בֵיתֶ֨/ךָ֙ וּ/בְ/לֶכְתְּ/ךָ֣ בַ/דֶּ֔רֶךְ וּֽ/בְ/שָׁכְבְּ/ךָ֖ וּ/בְ/קוּמֶֽ/ךָ־׃
translation:
  text: You shall teach them to your children[a], speaking of them when you sit in your house, and when you walk on the road, and when you lie down, and when you rise up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your sons.' The Hebrew uses a masculine plural form that can function representatively for one's children.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִמַּדְתֶּם
  chosen: You shall teach
  alternatives:
  - and you shall teach
  - you shall teach diligently
  lexicon: HALOT
  rationale: Piel of למד commonly means 'teach.' The prefixed conjunction is naturally carried forward in English without needing to begin the sentence with 'and.' 'Teach diligently' belongs to Deut 6:7's different verb (שנן), not this verse's למד, so it is rejected here.
- source_word: אֹתָם
  chosen: them
  alternatives:
  - these words
  - it
  lexicon: HALOT
  rationale: The 3mp object pronoun refers back to the words/commandments of the surrounding context. English can preserve the pronoun 'them' without over-specifying the antecedent in the main text.
- source_word: אֶת־בְּנֵיכֶם
  chosen: to your children
  alternatives:
  - your sons
  lexicon: HALOT
  rationale: בנים can mean 'sons' more narrowly or 'children' more broadly. In this instructional covenant context, the referent is the offspring of Israel generally, so 'children' best conveys the representative sense in natural English while remaining faithful to the Hebrew.
- source_word: לְדַבֵּר בָּם
  chosen: speaking of them
  alternatives:
  - to speak of them
  - talking about them
  - speaking in them
  lexicon: HALOT
  rationale: The infinitive construct with ל expresses the manner/content accompanying the teaching. 'Speaking of them' is idiomatic and keeps the object pronoun tied to the commandments/words. 'In them' is too literal for English here and obscures the sense.
- source_word: בְּשִׁבְתְּךָ בְּבֵיתֶךָ
  chosen: when you sit in your house
  alternatives:
  - when you sit at home
  - while sitting in your house
  lexicon: HALOT
  rationale: 'The preposition ב with infinitive construct gives a temporal circumstance: ''when you sit.'' ''In your house'' is a direct and clear rendering of the location phrase.'
- source_word: וּבְלֶכְתְּךָ בַדֶּרֶךְ
  chosen: and when you walk on the road
  alternatives:
  - and when you walk by the way
  - and when you travel on the road
  lexicon: HALOT
  rationale: הלך is the ordinary verb 'walk/go.' 'On the road' communicates בַדֶּרֶךְ in contemporary English. 'By the way' is traditional but now potentially misleading as an idiom.
- source_word: וּבְשָׁכְבְּךָ
  chosen: and when you lie down
  alternatives:
  - and at your lying down
  - and when you go to bed
  lexicon: HALOT
  rationale: The infinitive construct of שכב with prefixed ב marks another temporal setting. 'Lie down' is both literal and idiomatic, avoiding unnecessary paraphrase.
- source_word: וּבְקוּמֶךָ
  chosen: and when you rise up
  alternatives:
  - and at your rising
  - and when you get up
  lexicon: HALOT
  rationale: קום here refers to rising from sleep/rest. 'Rise up' preserves the cadence of the Hebrew pair with 'lie down' and remains understandable in modern English.
