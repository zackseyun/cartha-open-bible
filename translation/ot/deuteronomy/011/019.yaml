theological_decisions:
- issue: Gendered language in בְּנֵיכֶם
  chosen_reading: your children
  alternative_readings:
  - your sons
  rationale: Following the translation philosophy's gender-accurate principle, the masculine plural form is understood here as representative for offspring generally in covenant instruction, not as an exclusion of daughters. 'Your children' conveys the intended scope in English without importing a modern ideological gloss.
