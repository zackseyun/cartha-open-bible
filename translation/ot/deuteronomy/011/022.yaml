theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God directly. Following the project's
    doctrine, the tetragrammaton is rendered 'the LORD' rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Metaphorical covenant language in 'walk' and 'cling'
  chosen_reading: Preserve the metaphors in the main text
  alternative_readings:
  - Interpretive renderings such as 'live according to' and 'remain faithful to'
  rationale: The Hebrew uses established covenant metaphors that carry theological
    weight. Preserving them maintains the text's exhortational and relational force
    without importing a narrower doctrinal interpretation.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
