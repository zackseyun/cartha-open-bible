id: DEU.11.30
reference: Deuteronomy 11:30
source:
  edition: WLC
  text: הֲ/לֹא הֵ֜מָּה בְּ/עֵ֣בֶר הַ/יַּרְדֵּ֗ן אַֽחֲרֵי֙ דֶּ֚רֶךְ מְב֣וֹא הַ/שֶּׁ֔מֶשׁ
    בְּ/אֶ֨רֶץ֙ הַֽ/כְּנַעֲנִ֔י הַ/יֹּשֵׁ֖ב בָּ/עֲרָבָ֑ה מ֚וּל הַ/גִּלְגָּ֔ל אֵ֖צֶל
    אֵלוֹנֵ֥י מֹרֶֽה־׃
translation:
  text: Are they not beyond the Jordan, behind the way of the setting sun, in the
    land of the Canaanites who dwell in the Arabah, opposite Gilgal, beside the oaks
    of Moreh?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'across the Jordan.' The Hebrew expression is a geographic idiom whose
      exact English sense depends on viewpoint.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'after the road of the going in of the sun'; that is, toward
      the west.
    reason: lexical_alternative
  - marker: c
    text: Or 'the terebinths of Moreh.' The Hebrew term may refer to large trees of
      either kind.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Are they not
  alternatives:
  - Is it not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. English
    plural wording matches the following pronoun הֵמָּה.
- source_word: הֵמָּה
  chosen: they
  alternatives:
  - these
  lexicon: HALOT
  rationale: Third person masculine plural pronoun referring back to the two mountains
    named in the previous verse; 'they' is the most natural English referent.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  chosen: beyond the Jordan
  alternatives:
  - across the Jordan
  - on the other side of the Jordan
  lexicon: HALOT
  rationale: Standard geographic idiom. 'Beyond' preserves the Hebrew spatial expression
    without over-specifying viewpoint; context then clarifies direction.
- source_word: אַחֲרֵי דֶּרֶךְ מְבוֹא הַשֶּׁמֶשׁ
  chosen: west of the road of the setting sun
  alternatives:
  - behind the way of the sunset
  - beyond the road toward the sunset
  lexicon: HALOT
  rationale: מְבוֹא הַשֶּׁמֶשׁ is an idiom for the sun's going in, i.e., west/sunset.
    Rendering 'west of' communicates the directional force clearly while retaining
    the underlying imagery with 'setting sun.' 'Road of the setting sun' keeps דֶּרֶךְ
    explicit rather than collapsing the whole phrase to simply 'to the west.'
- source_word: בְּאֶרֶץ הַכְּנַעֲנִי
  chosen: in the land of the Canaanites
  alternatives:
  - in the land of the Canaanite
  lexicon: HALOT
  rationale: Though the Hebrew uses a singular ethnonym collectively, English normally
    uses the plural for the people group in this construction.
- source_word: הַיֹּשֵׁב בָּעֲרָבָה
  chosen: who dwell in the Arabah
  alternatives:
  - who live in the plain
  - who inhabit the Arabah
  lexicon: HALOT
  rationale: Collective singular participle is naturally rendered by an English plural
    verb agreeing with 'Canaanites.' 'Arabah' is retained as a geographic proper term
    rather than generalized to 'plain.'
- source_word: מוּל
  chosen: opposite
  alternatives:
  - facing
  - over against
  lexicon: HALOT
  rationale: Conveys straightforward spatial correspondence in contemporary English.
- source_word: הַגִּלְגָּל
  chosen: Gilgal
  lexicon: HALOT
  rationale: Place name is transliterated per translation philosophy.
- source_word: אֵצֶל
  chosen: beside
  alternatives:
  - near
  - by
  lexicon: HALOT
  rationale: Expresses proximity clearly and naturally.
- source_word: אֵלוֹנֵי מֹרֶה
  chosen: the oaks of Moreh
  alternatives:
  - the terebinths of Moreh
  - the great trees of Moreh
  lexicon: HALOT
  rationale: אֵלוֹן can denote oak or terebinth. 'Oaks' is a familiar and traditional
    rendering; the botanical alternative is worth preserving in a footnote because
    the Hebrew term can refer to either kind of large tree.
