id: DEU.11.14
reference: Deuteronomy 11:14
source:
  edition: WLC
  text: וְ/נָתַתִּ֧י מְטַֽר אַרְצְ/כֶ֛ם בְּ/עִתּ֖/וֹ יוֹרֶ֣ה וּ/מַלְק֑וֹשׁ וְ/אָסַפְתָּ֣ דְגָנֶ֔/ךָ וְ/תִֽירֹשְׁ/ךָ֖ וְ/יִצְהָרֶֽ/ךָ־׃
translation:
  text: then I will give the rain for your land in its season[a], the early rain and the late rain, and you will gather in your grain, your new wine[c][b], and your oil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the former rain and the latter rain.'
    reason: lexical_alternative
  - marker: b
    text: That is, freshly produced wine; or simply 'wine.'
    reason: lexical_alternative
  - marker: c
    text: That is, olive oil.
    reason: cultural_note
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: then I will give
  alternatives:
  - and I will give
  lexicon: HALOT
  rationale: Qal perfect 1cs with prefixed conjunction in this conditional sequence carries future/result sense in English. 'Then I will give' reflects the apodosis flow from the prior verse more naturally than a bare 'and I will give' while preserving the first-person divine promise.
- source_word: מְטַר
  chosen: the rain
  alternatives:
  - rain
  lexicon: HALOT
  rationale: Refers to rainfall as the needed provision for agricultural blessing. The article is natural in English because the phrase specifies the expected seasonal rain for the land.
- source_word: אַרְצְכֶם
  chosen: your land
  alternatives:
  - your country
  lexicon: HALOT
  rationale: '''Land'' best matches אֶרֶץ in covenantal-agricultural context, referring to the Israelites'' territory rather than a modern political ''country.'''
- source_word: בְּעִתּוֹ
  chosen: in its season
  alternatives:
  - at its proper time
  - in its time
  lexicon: HALOT
  rationale: The phrase denotes the appropriate or appointed time for rainfall. 'In its season' is idiomatic, concise, and preserves the agricultural cadence of the Hebrew.
- source_word: יוֹרֶה
  chosen: the early rain
  alternatives:
  - autumn rain
  - former rain
  lexicon: HALOT
  rationale: This term denotes the first seasonal rains, typically in autumn. 'Early rain' is standard, understandable modern English; 'former rain' is more traditional but less transparent.
- source_word: וּמַלְקוֹשׁ
  chosen: and the late rain
  alternatives:
  - and the spring rain
  lexicon: HALOT
  rationale: Refers to the later seasonal rains, typically in spring. 'Late rain' pairs naturally with 'early rain' and preserves the temporal contrast.
- source_word: וְאָסַפְתָּ
  chosen: and you will gather in
  alternatives:
  - and you will gather
  - and you will harvest
  lexicon: HALOT
  rationale: The verb means gather/collect; in agricultural context 'gather in' conveys bringing in produce from the field without over-specifying a technical harvest term not explicit in the Hebrew.
- source_word: דְגָנֶךָ
  chosen: your grain
  alternatives:
  - your cereal crop
  - your corn
  lexicon: HALOT
  rationale: A broad term for grain produce. 'Grain' is the clearest contemporary equivalent; 'corn' would be misleading in modern English.
- source_word: וְתִירֹשְׁךָ
  chosen: your new wine
  alternatives:
  - your wine
  - your fresh wine
  lexicon: HALOT
  rationale: תִּירוֹשׁ commonly denotes freshly produced wine/must rather than generic wine in all senses. 'New wine' preserves the agricultural triad's specificity.
- source_word: וְיִצְהָרֶךָ
  chosen: your oil
  alternatives:
  - your olive oil
  lexicon: HALOT
  rationale: In this stock triad the referent is olive oil. The shorter 'oil' preserves the familiar biblical collocation 'grain, new wine, and oil,' while the referent remains clear from context.
