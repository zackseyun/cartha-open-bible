id: DEU.11.16
reference: Deuteronomy 11:16
source:
  edition: WLC
  text: הִשָּֽׁמְר֣וּ לָ/כֶ֔ם פֶּ֥ן יִפְתֶּ֖ה לְבַבְ/כֶ֑ם וְ/סַרְתֶּ֗ם וַ/עֲבַדְתֶּם֙ אֱלֹהִ֣ים אֲחֵרִ֔ים וְ/הִשְׁתַּחֲוִיתֶ֖ם לָ/הֶֽם׃
translation:
  text: Be careful lest your heart be deceived and you turn aside and serve other gods and bow down to them[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lest your heart be enticed.' The Hebrew verb can carry the sense of being persuaded, enticed, or deceived.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשָּׁמְרוּ לָכֶם
  chosen: Be careful for yourselves
  alternatives:
  - Guard yourselves
  - Watch yourselves
  - Take care
  lexicon: HALOT
  rationale: The Niphal imperative of שׁמר with לָכֶם is a reflexive warning formula. 'Be careful for yourselves' preserves the imperative force and reflexive sense in natural English. 'Guard yourselves' is possible but slightly less idiomatic here.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - so that not
  lexicon: HALOT
  rationale: פֶּן introduces a negative warning clause. 'Lest' is concise and fits the solemn register of the warning without becoming archaic in this context.
- source_word: יִפְתֶּה
  chosen: be deceived
  alternatives:
  - be enticed
  - be led astray
  lexicon: HALOT
  rationale: פתה commonly carries the sense of being persuaded, enticed, or deceived. The passive English 'be deceived' best matches the singular verb with 'heart' as subject in idiomatic English and highlights the danger of seduction into apostasy. 'Be enticed' is a viable nuance and is preserved in a footnote.
- source_word: לְבַבְכֶם
  chosen: your heart
  alternatives:
  - your mind
  - your inner self
  lexicon: HALOT
  rationale: לֵבָב refers to the inner person, including will and understanding, but 'heart' is the standard and theologically resonant English equivalent in covenantal contexts.
- source_word: וְסַרְתֶּם
  chosen: and you turn aside
  alternatives:
  - and you turn away
  - and you depart
  lexicon: HALOT
  rationale: סור in this covenant context means to turn aside from the proper path or allegiance. 'Turn aside' preserves the idiom and echoes Deuteronomic covenant language.
- source_word: וַעֲבַדְתֶּם
  chosen: and serve
  alternatives:
  - and worship
  - and become servants of
  lexicon: HALOT
  rationale: עבד with gods commonly means to serve in the sense of religious devotion. 'Serve' is the more literal and consistent rendering, while the following verb covers the more explicit act of worship.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The phrase straightforwardly means 'other gods.' 'Foreign gods' is interpretive and less precise here.
- source_word: וְהִשְׁתַּחֲוִיתֶם לָהֶם
  chosen: and bow down to them
  alternatives:
  - and worship them
  - and prostrate yourselves to them
  lexicon: HALOT
  rationale: השתחוה literally denotes bowing down/prostration, often in worship. 'Bow down to them' preserves the concrete action while allowing the religious sense to remain clear from context.
