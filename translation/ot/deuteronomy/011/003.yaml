id: DEU.11.3
reference: Deuteronomy 11:3
source:
  edition: WLC
  text: וְ/אֶת אֹֽתֹתָי/ו֙ וְ/אֶֽת מַעֲשָׂ֔י/ו אֲשֶׁ֥ר עָשָׂ֖ה בְּ/ת֣וֹךְ מִצְרָ֑יִם
    לְ/פַרְעֹ֥ה מֶֽלֶךְ מִצְרַ֖יִם וּ/לְ/כָל אַרְצֽ/וֹ־־־־׃
translation:
  text: and his signs and his deeds that he did in the midst of Egypt, to Pharaoh
    king of Egypt and to all his land—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his wonders' for 'his signs.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in Egypt'; Hebrew more literally, 'in the midst of Egypt.'
    reason: lexical_alternative
  - marker: c
    text: Or 'against Pharaoh ... and against all his land'; the Hebrew preposition
      is literally 'to,' but the context is of acts directed in judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹתֹתָיו
  chosen: his signs
  alternatives:
  - his miraculous signs
  - his wonders
  lexicon: HALOT
  rationale: אוֹת commonly denotes a sign, token, or portent. 'Signs' is the most
    direct and sufficiently broad rendering here; 'miraculous signs' is interpretive,
    and 'wonders' overlaps more with מוֹפְתִים than with אוֹת alone.
- source_word: מַעֲשָׂיו
  chosen: his deeds
  alternatives:
  - his works
  - his acts
  lexicon: HALOT
  rationale: מַעֲשֶׂה refers to what is done, an act or deed. 'Deeds' is natural modern
    English and preserves the concrete sense. 'Works' is possible but can sound stilted
    or carry theological overtones not demanded here.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that he did
  alternatives:
  - which he did
  - that he performed
  lexicon: HALOT
  rationale: The relative clause straightforwardly modifies 'signs' and 'deeds.' 'That
    he did' is idiomatic and close to the Hebrew without unnecessary elevation.
- source_word: בְּתוֹךְ מִצְרַיִם
  chosen: in the midst of Egypt
  alternatives:
  - in Egypt
  - within Egypt
  lexicon: HALOT
  rationale: בְּתוֹךְ literally means 'in the midst/middle of.' Retaining 'in the
    midst of Egypt' preserves the Hebrew emphasis on the events occurring publicly
    within Egypt itself, not merely in relation to Egypt.
- source_word: לְפַרְעֹה
  chosen: to Pharaoh
  alternatives:
  - against Pharaoh
  - for Pharaoh
  lexicon: HALOT
  rationale: The preposition לְ here marks the object/target affected by God's deeds.
    'To Pharaoh' is formally close and works in English in this list construction.
    'Against Pharaoh' is interpretive and captures hostility, but the Hebrew preposition
    itself is broader.
- source_word: מֶלֶךְ מִצְרַיִם
  chosen: king of Egypt
  lexicon: HALOT
  rationale: Standard construct rendering; no special ambiguity.
- source_word: וּלְכָל אַרְצוֹ
  chosen: and to all his land
  alternatives:
  - and to all his country
  - and to his whole land
  lexicon: HALOT
  rationale: אֶרֶץ can mean land or country. 'Land' keeps the Hebrew's broad territorial
    sense and matches the possessive 'his.' 'All his land' is a direct rendering of
    כָּל + noun + suffix.
- source_word: וְאֶת ... וְאֶת
  chosen: and ... and
  alternatives:
  - namely ... and
  - both ... and
  lexicon: HALOT
  rationale: The repeated object marker with conjunction links this verse to the preceding
    clause ('your eyes have seen'). English does not translate אֵת directly, but the
    coordination should be preserved with repeated 'and'.
