id: DEU.11.32
reference: Deuteronomy 11:32
source:
  edition: WLC
  text: וּ/שְׁמַרְתֶּ֣ם לַ/עֲשׂ֔וֹת אֵ֥ת כָּל הַֽ/חֻקִּ֖ים וְ/אֶת הַ/מִּשְׁפָּטִ֑ים
    אֲשֶׁ֧ר אָנֹכִ֛י נֹתֵ֥ן לִ/פְנֵי/כֶ֖ם הַ/יּֽוֹם־־׃
translation:
  text: And you shall be careful to do all the statutes and the judgments that I am
    setting before you today.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'that I am giving before you today'; the Hebrew idiom
      means 'setting before you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁמַרְתֶּם
  chosen: you shall be careful
  alternatives:
  - you shall keep
  - you must be careful
  lexicon: HALOT
  rationale: From שׁמר in a construction with the infinitive לַעֲשׂוֹת, the sense
    is not merely 'keep' in the sense of observe, but 'take care' or 'be careful'
    to do. 'Shall' preserves the directive force in covenantal legal style.
- source_word: לַ/עֲשׂוֹת
  chosen: to do
  alternatives:
  - to observe
  - to carry out
  lexicon: HALOT
  rationale: עשה here is the common verb for performing commandments. 'To do' is the
    most direct and idiomatic rendering, preserving the Hebrew legal idiom.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: The term emphasizes totality. 'All' fits naturally with the following
    plural nouns and preserves the comprehensive demand.
- source_word: הַֽ/חֻקִּים
  chosen: the statutes
  alternatives:
  - the decrees
  - the ordinances
  lexicon: HALOT
  rationale: חֻקִּים commonly refers to prescribed enactments or statutes. 'Statutes'
    preserves the legal-covenantal register and maintains distinction from מִשְׁפָּטִים.
- source_word: וְ/אֶת הַ/מִּשְׁפָּטִים
  chosen: and the judgments
  alternatives:
  - and the rules
  - and the ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּטִים often denotes judgments, legal decisions, or ordinances.
    'Judgments' keeps a closer lexical distinction from חֻקִּים than 'ordinances'
    would, even if somewhat formal in English.
- source_word: אֲשֶׁר אָנֹכִי נֹתֵן
  chosen: that I am setting
  alternatives:
  - that I am giving
  - which I set
  lexicon: HALOT
  rationale: נתן literally means 'give,' but with לִפְנֵי plus object it idiomatically
    means 'set before.' Rendering the whole clause as 'that I am setting before you'
    communicates the Hebrew idiom naturally while preserving the present participial
    force.
- source_word: לִ/פְנֵי/כֶם
  chosen: before you
  alternatives:
  - in your presence
  lexicon: HALOT
  rationale: The prepositional phrase is idiomatic in legal presentation contexts.
    'Before you' is the standard and natural English equivalent.
- source_word: הַ/יּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is clear modern English and preserves the temporal immediacy
    of the covenant address without archaic phrasing.'
