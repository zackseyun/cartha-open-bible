id: DEU.11.23
reference: Deuteronomy 11:23
source:
  edition: WLC
  text: וְ/הוֹרִ֧ישׁ יְהוָ֛ה אֶת כָּל הַ/גּוֹיִ֥ם הָ/אֵ֖לֶּה מִ/לִּ/פְנֵי/כֶ֑ם וִֽ/ירִשְׁתֶּ֣ם
    גּוֹיִ֔ם גְּדֹלִ֥ים וַ/עֲצֻמִ֖ים מִ/כֶּֽם־־׃
translation:
  text: then the LORD will drive out all these nations before you, and you will dispossess
    nations greater and stronger than you.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְהוֹרִישׁ
  chosen: will drive out
  alternatives:
  - will dispossess
  - will cause to inherit by removing
  lexicon: HALOT
  rationale: 'From ירשׁ in the Hiphil, the sense is causative: to cause someone to
    lose possession, hence ''drive out'' or ''dispossess.'' ''Drive out'' is the most
    natural English in this conquest context and fits the following contrast with
    Israel''s own ''dispossessing'' of the nations.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name is rendered 'the LORD' rather
    than transliterated.
- source_word: כָּל הַגּוֹיִם הָאֵלֶּה
  chosen: all these nations
  alternatives:
  - all these peoples
  lexicon: HALOT
  rationale: גּוֹיִם commonly denotes nations/peoples. 'Nations' best fits the geopolitical
    sense in Deuteronomy's land-conquest context.
- source_word: מִלִּפְנֵיכֶם
  chosen: before you
  alternatives:
  - from before you
  - out of your presence
  lexicon: HALOT
  rationale: Literally 'from before your face/presence.' In idiomatic English after
    a verb of expulsion, 'before you' communicates the sense clearly without awkwardness.
- source_word: וִירִשְׁתֶּם
  chosen: you will dispossess
  alternatives:
  - you will take possession of
  - you will inherit
  lexicon: HALOT
  rationale: Qal of ירשׁ can mean inherit, possess, or dispossess. Here the direct
    object is 'nations,' not land, so 'dispossess' best captures the object being
    removed from possession rather than merely Israel receiving land.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - peoples
  lexicon: HALOT
  rationale: Repeated from earlier in the verse; 'nations' preserves lexical consistency
    and the political-ethnic sense.
- source_word: גְּדֹלִים
  chosen: greater
  alternatives:
  - larger
  - great
  lexicon: HALOT
  rationale: Comparative sense is implied by the following מִכֶּם ('than you'). 'Greater'
    fits both size and stature in context.
- source_word: וַעֲצֻמִים
  chosen: stronger
  alternatives:
  - mightier
  - more powerful
  lexicon: HALOT
  rationale: עָצוּם denotes strength or might. 'Stronger' is clear modern English;
    'mightier' is possible but more traditional/archaic in tone.
- source_word: מִכֶּם
  chosen: than you
  alternatives:
  - than yourselves
  lexicon: HALOT
  rationale: Standard comparative use of מִן with second person plural suffix.
