id: DEU.3.10
reference: Deuteronomy 3:10
source:
  edition: WLC
  text: כֹּ֣ל עָרֵ֣י הַ/מִּישֹׁ֗ר וְ/כָל הַ/גִּלְעָד֙ וְ/כָל הַ/בָּשָׁ֔ן עַד סַלְכָ֖ה וְ/אֶדְרֶ֑עִי עָרֵ֛י מַמְלֶ֥כֶת ע֖וֹג בַּ/בָּשָֽׁן׀־־־׃
translation:
  text: all the cities of the tableland[a], and all Gilead, and all Bashan, as far as Salecah and Edrei[b], the cities of the kingdom of Og in Bashan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the plain' or 'the plateau' for 'the tableland.' The Hebrew term refers to the level upland region east of the Jordan.
    reason: lexical_alternative
  - marker: b
    text: Salecah is also spelled 'Salkah' in English transliteration.
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Quantifier covering the full extent of the territory/cities listed. 'All' is the most natural English rendering in this catalog-style sentence.
- source_word: עָרֵי
  chosen: cities
  alternatives:
  - towns
  lexicon: HALOT
  rationale: Standard rendering of עִיר in territorial and royal contexts. 'Cities' fits the geopolitical sense better than the less formal 'towns.'
- source_word: הַמִּישֹׁר
  chosen: the tableland
  alternatives:
  - the plain
  - the plateau
  lexicon: HALOT
  rationale: מִישׁוֹר here denotes the elevated level region east of the Jordan rather than a generic flat plain. 'Tableland' best captures the topographical sense in readable modern English.
- source_word: הַגִּלְעָד
  chosen: Gilead
  lexicon: HALOT
  rationale: Proper place name; transliterated per translation philosophy.
- source_word: הַבָּשָׁן
  chosen: Bashan
  lexicon: HALOT
  rationale: Proper regional name; transliterated per translation philosophy.
- source_word: עַד
  chosen: as far as
  alternatives:
  - up to
  - until
  lexicon: HALOT
  rationale: Marks territorial extent. 'As far as' is idiomatic in English for geographic boundaries.
- source_word: סַלְכָה
  chosen: Salecah
  alternatives:
  - Salkah
  lexicon: HALOT
  rationale: Proper place name. 'Salecah' follows a conventional English transliteration tradition for this location; alternative spelling is preserved in a footnote.
- source_word: אֶדְרֶעִי
  chosen: Edrei
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard convention.
- source_word: עָרֵי מַמְלֶכֶת
  chosen: the cities of the kingdom
  alternatives:
  - the royal cities
  - the cities of the realm
  lexicon: HALOT
  rationale: Construct chain indicating cities belonging to or comprising the kingdom. 'The cities of the kingdom' is the most transparent and formally close rendering.
- source_word: עוֹג
  chosen: Og
  lexicon: HALOT
  rationale: Proper personal name; transliterated.
- source_word: בַּבָּשָׁן
  chosen: in Bashan
  alternatives:
  - of Bashan
  lexicon: HALOT
  rationale: 'The preposition ב marks location: Og''s kingdom was situated in Bashan. ''In Bashan'' is more precise than the more interpretive ''of Bashan.'''
