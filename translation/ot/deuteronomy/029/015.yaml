id: DEU.29.15
reference: Deuteronomy 29:15
source:
  edition: WLC
  text: כִּֽי אַתֶּ֣ם יְדַעְתֶּ֔ם אֵ֥ת אֲשֶׁר יָשַׁ֖בְנוּ בְּ/אֶ֣רֶץ מִצְרָ֑יִם וְ/אֵ֧ת אֲשֶׁר עָבַ֛רְנוּ בְּ/קֶ֥רֶב הַ/גּוֹיִ֖ם אֲשֶׁ֥ר עֲבַרְתֶּֽם־־־׃
translation:
  text: For you know how we lived in the land of Egypt[a], and how we passed through the midst of the nations through which you passed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and what we passed through among the nations through which you passed.' The Hebrew can be rendered more literally, but the main text expresses the sense more idiomatically.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the explanatory ground for the preceding statement. 'For' best preserves the causal/explanatory force in natural English.
- source_word: יְדַעְתֶּם
  chosen: you know
  alternatives:
  - you have known
  - you knew
  lexicon: HALOT
  rationale: The perfect here refers to the audience's present knowledge based on past experience. English present 'you know' communicates that force idiomatically.
- source_word: אֵת אֲשֶׁר יָשַׁבְנוּ
  chosen: how we lived
  alternatives:
  - what we experienced while we lived
  - that which we dwelt
  lexicon: HALOT
  rationale: The object marker plus relative clause points to the circumstance or manner known by the hearers. 'How we lived' is idiomatic and fits the context better than a wooden 'what we dwelt.'
- source_word: יָשַׁבְנוּ
  chosen: lived
  alternatives:
  - dwelt
  - stayed
  lexicon: HALOT
  rationale: ישב commonly means 'dwell/live.' 'Lived' is more natural modern English than 'dwelt' while preserving the sense.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: Retains the Hebrew phrase 'land of Egypt,' which is a common biblical expression and slightly more formal than simply 'in Egypt.'
- source_word: וְאֵת אֲשֶׁר עָבַרְנוּ
  chosen: and how we passed through
  alternatives:
  - and what we passed through
  - and how we traveled through
  lexicon: HALOT
  rationale: As in the first clause, the construction points to known experience/circumstance. 'Passed through' preserves the movement sense of עבר without overinterpreting it as hardship.
- source_word: בְּקֶרֶב הַגּוֹיִם
  chosen: through the midst of the nations
  alternatives:
  - among the nations
  - in the midst of the nations
  lexicon: HALOT
  rationale: בקרב literally means 'in the midst of/among.' Because the verb is one of movement, 'through the midst of' best reflects both the preposition and the travel context.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the peoples
  - the Gentiles
  lexicon: HALOT
  rationale: גוים in Deuteronomy ordinarily refers to nations/peoples. 'Gentiles' would import later Jewish/Christian usage not required here.
- source_word: אֲשֶׁר עֲבַרְתֶּם
  chosen: through which you passed
  alternatives:
  - among which you passed
  - which you passed through
  lexicon: HALOT
  rationale: The relative clause modifies 'the nations' and directly addresses the hearers' own journey. 'Through which you passed' is the clearest English rendering, even though the repetition with the prior verb is stylistically heavy; preserving it reflects the Hebrew emphasis.
