theological_decisions:
- issue: Number shift from plural ('you/your clothes') to singular ('your sandal/your
    foot')
  chosen_reading: Retain the singular in English for the final clause
  alternative_readings:
  - 'Pluralize for smoother English: ''your sandals ... your feet'''
  rationale: The Hebrew shifts from plural address to singular suffixes, likely treating
    Israel corporately as a single people or using distributive singular. Preserving
    the singular reflects the source text more closely while remaining intelligible
    in English.
  doctrine_reference: Translation philosophy §1, §5
