id: DEU.29.4
reference: Deuteronomy 29:4
source:
  edition: WLC
  text: וָ/אוֹלֵ֥ךְ אֶתְ/כֶ֛ם אַרְבָּעִ֥ים שָׁנָ֖ה בַּ/מִּדְבָּ֑ר לֹֽא בָל֤וּ שַׂלְמֹֽתֵי/כֶם֙
    מֵ/עֲלֵי/כֶ֔ם וְ/נַֽעַלְ/ךָ֥ לֹֽא בָלְתָ֖ה מֵ/עַ֥ל רַגְלֶֽ/ךָ־־׃
translation:
  text: And I led you forty years in the wilderness; your clothes did not wear out
    on you, and your sandal did not wear out on your foot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew shifts from plural to singular in the final clause: literally, ''your
      sandal did not wear out from on your foot.'' The singular likely addresses Israel
      as a corporate whole or uses a distributive singular.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹלֵךְ
  chosen: I led
  alternatives:
  - I caused to walk
  - I made go
  lexicon: HALOT
  rationale: From הלך in Hiphil/causative sense with first-person subject. In context
    of YHWH's guidance through the wilderness, idiomatic English 'I led' best captures
    the causative movement without wooden phrasing.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert region. 'Wilderness' is the
    more established and contextually fitting term for Israel's wandering, preserving
    biblical resonance without distortion.
- source_word: בָּלוּ / בָלְתָה
  chosen: did not wear out
  alternatives:
  - did not become worn out
  - did not decay
  lexicon: HALOT
  rationale: בלה here refers to clothing and footwear becoming worn through use. 'Wear
    out' is natural modern English and accurately reflects the concrete sense.
- source_word: שַׂלְמֹתֵיכֶם
  chosen: your clothes
  alternatives:
  - your garments
  - your cloaks
  lexicon: HALOT
  rationale: The plural refers broadly to articles of clothing. 'Your clothes' is
    readable modern English; 'garments' is more formal but less natural, and 'cloaks'
    is too narrow.
- source_word: מֵעֲלֵיכֶם
  chosen: on you
  alternatives:
  - from upon you
  - off you
  lexicon: HALOT
  rationale: Literally 'from upon you,' but in English with 'wear out' the idiomatic
    expression is 'on you,' meaning while being worn by you.
- source_word: נַעַלְךָ
  chosen: your sandal
  alternatives:
  - your shoe
  - your footwear
  lexicon: HALOT
  rationale: The singular noun with second masculine singular suffix is best rendered
    'your sandal.' 'Shoe' is anachronistically broad, while 'footwear' is too abstract.
    The singular likely functions collectively or addresses Israel as a singular entity.
- source_word: מֵעַל רַגְלֶךָ
  chosen: on your foot
  alternatives:
  - from on your foot
  - off your foot
  lexicon: HALOT
  rationale: Literally 'from upon your foot,' but with 'wear out' the natural English
    construction is 'on your foot.' This preserves the image of footwear remaining
    intact while worn.
- source_word: אַרְבָּעִים שָׁנָה
  chosen: forty years
  lexicon: HALOT
  rationale: Straightforward duration phrase; no expansion needed.
