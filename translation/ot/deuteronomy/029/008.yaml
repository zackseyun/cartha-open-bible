theological_decisions:
- issue: Nature of the covenant blessing in תַּשְׂכִּילוּ
  chosen_reading: Render as practical covenantal prosperity/success rather than merely
    internal wisdom
  alternative_readings:
  - you may act wisely
  rationale: The verse ties obedience to favorable outcome in what Israel does. Translating
    with 'prosper' preserves the covenant blessing motif without importing a later
    prosperity theology; the broader semantic range of שׂכל is acknowledged in alternatives.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
