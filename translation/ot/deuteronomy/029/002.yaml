id: DEU.29.2
reference: Deuteronomy 29:2
source:
  edition: WLC
  text: הַ/מַּסּוֹת֙ הַ/גְּדֹלֹ֔ת אֲשֶׁ֥ר רָא֖וּ עֵינֶ֑י/ךָ הָ/אֹתֹ֧ת וְ/הַ/מֹּפְתִ֛ים הַ/גְּדֹלִ֖ים הָ/הֵֽם׃
translation:
  text: the great trials that your eyes saw[a], those great signs and wonders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the great testings.' Older English versions sometimes have 'the great temptations,' but here the sense is testing or proving, not enticement to sin.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּסּוֹת
  chosen: the great trials
  alternatives:
  - the great testings
  - the great temptations
  lexicon: HALOT
  rationale: מַסּוֹת denotes tests or trials, especially the testing events experienced in Egypt and the wilderness. 'Trials' is natural English and fits the context of mighty acts that proved or tested. 'Temptations' is possible in older English tradition but is misleading in modern usage because it suggests enticement to sin rather than testing.
- source_word: הַגְּדֹלֹת
  chosen: great
  alternatives:
  - large
  - mighty
  lexicon: HALOT
  rationale: גָּדוֹל here functions as an attributive adjective intensifying the scale or significance of the trials. 'Great' is the most idiomatic and sufficiently weighty rendering.
- source_word: אֲשֶׁר רָאוּ עֵינֶיךָ
  chosen: that your eyes saw
  alternatives:
  - which you saw
  - that you yourself saw
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'your eyes saw,' an emphatic idiom stressing direct eyewitness experience. Retaining 'your eyes saw' preserves the force better than reducing it simply to 'you saw.'
- source_word: הָאֹתֹת
  chosen: signs
  alternatives:
  - tokens
  lexicon: HALOT
  rationale: אוֹת commonly means 'sign.' In this context it refers to divine signs performed before Israel. 'Signs' is standard, clear, and contextually appropriate.
- source_word: וְהַמֹּפְתִים
  chosen: wonders
  alternatives:
  - portents
  - miracles
  lexicon: HALOT
  rationale: מוֹפְתִים often pairs with אוֹתֹת as 'signs and wonders.' 'Wonders' preserves the established pairing and reflects extraordinary divine acts without over-specifying the mechanism.
- source_word: הַגְּדֹלִים
  chosen: great
  alternatives:
  - mighty
  lexicon: HALOT
  rationale: As with the earlier adjective, 'great' naturally modifies 'signs and wonders' and preserves the Hebrew emphasis on their magnitude.
- source_word: הָהֵם
  chosen: those
  alternatives:
  - these same
  - they
  lexicon: HALOT
  rationale: The demonstrative points back emphatically to the signs and wonders just mentioned. 'Those' is the most straightforward English equivalent and preserves the deictic force.
