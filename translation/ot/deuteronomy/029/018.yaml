theological_decisions:
- issue: Interpretation of covenant-sanction language in הָאָלָה
  chosen_reading: Render as 'oath' in the main text while preserving 'curse' as an alternative.
  alternative_readings:
  - curse
  rationale: The verse refers to the covenantal declaration just heard. Because אָלָה can denote an oath that carries a curse, 'oath' best reflects the immediate phrase while not excluding the sanction dimension. Preserving 'curse' in a footnote maintains transparency where translation tradition differs.
  doctrine_reference: Translation philosophy §1, §3
- issue: Handling the difficult idiom הָרָוָה אֶת־הַצְּמֵאָה
  chosen_reading: Preserve the Hebrew metaphor rather than resolve it into a single interpretive paraphrase.
  alternative_readings:
  - the watered land with the dry
  - both the well-watered and the dry alike
  rationale: The phrase is genuinely difficult and likely proverbial. In keeping with the instruction to preserve tension rather than resolve ambiguity, the main text keeps the metaphor, with a footnote giving a more explicit interpretive option.
  doctrine_reference: Translation philosophy §3
