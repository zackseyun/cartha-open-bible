id: DEU.29.18
reference: Deuteronomy 29:18
source:
  edition: WLC
  text: וְ/הָיָ֡ה בְּ/שָׁמְע/וֹ֩ אֶת דִּבְרֵ֨י הָֽ/אָלָ֜ה הַ/זֹּ֗את וְ/הִתְבָּרֵ֨ךְ בִּ/לְבָב֤/וֹ לֵ/אמֹר֙ שָׁל֣וֹם יִֽהְיֶה לִּ֔/י כִּ֛י בִּ/שְׁרִר֥וּת לִבִּ֖/י אֵלֵ֑ךְ לְמַ֛עַן סְפ֥וֹת הָ/רָוָ֖ה אֶת הַ/צְּמֵאָֽה־־־׃
translation:
  text: and when he hears the words of this oath[a], he blesses himself in his heart, saying, ‘I will have peace[b], though I walk in the stubbornness of my heart’—thus sweeping away the watered land with the dry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this curse.' The Hebrew term can denote an oath that carries a curse.
    reason: alternative_reading
  - marker: b
    text: Or possibly 'to sweep away the watered land with the dry,' that is, to destroy everything alike.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָלָה
  chosen: oath
  alternatives:
  - curse
  lexicon: HALOT
  rationale: אָלָה can denote an oath, often specifically an oath accompanied by sanctions or a curse. In this covenant context, 'oath' best matches the immediate wording 'the words of this oath,' while the punitive force remains implicit. The alternative 'curse' is worth preserving because many English versions render it that way due to the sanction aspect.
- source_word: וְהִתְבָּרֵךְ בִּלְבָבוֹ
  chosen: he blesses himself in his heart
  alternatives:
  - he congratulates himself in his heart
  - he considers himself blessed in his heart
  lexicon: HALOT
  rationale: 'The hitpael of ברך here is reflexive: the man pronounces blessing on himself inwardly. ''Blesses himself in his heart'' preserves the reflexive form and the irony of self-assurance better than a more interpretive paraphrase.'
- source_word: שָׁלוֹם יִהְיֶה לִּי
  chosen: I will have peace
  alternatives:
  - peace will be mine
  - I will be safe
  lexicon: HALOT
  rationale: שָׁלוֹם includes peace, well-being, and security. 'I will have peace' is natural English and preserves the speaker's presumption of personal well-being without over-narrowing to mere safety.
- source_word: שְׁרִרוּת לִבִּי
  chosen: the stubbornness of my heart
  alternatives:
  - the stubbornness of my own heart
  - the dictates of my heart
  lexicon: HALOT
  rationale: שְׁרִרוּת commonly conveys stubbornness or hardness of will. 'Stubbornness of my heart' is the established sense and fits the covenant-warning context better than softer renderings like 'imagination' or 'dictates.'
- source_word: לְמַעַן
  chosen: so as to
  alternatives:
  - in order to
  - with the result that
  lexicon: HALOT
  rationale: לְמַעַן marks purpose or intended result. 'So as to' keeps the connection concise while allowing the difficult following idiom to stand.
- source_word: סְפוֹת
  chosen: sweep away
  alternatives:
  - add
  - destroy
  - bring to an end
  lexicon: HALOT
  rationale: The infinitive from ספה in this context most naturally carries the sense of sweeping away or destroying. Although some have connected it with 'add,' the covenant-judgment setting and common usage support a destructive sense.
- source_word: הָרָוָה אֶת־הַצְּמֵאָה
  chosen: the well-watered with the thirsty
  alternatives:
  - the watered land with the dry
  - the drunk with the thirsty
  - the moist with the dry
  lexicon: HALOT
  rationale: This is a difficult idiom. The adjectives literally denote something saturated/well-watered and something thirsty/dry. Rendering them substantivally as 'the well-watered with the thirsty' preserves the Hebrew imagery and ambiguity better than collapsing it into a fully interpreted paraphrase. A footnote preserves the more explicit land-based interpretation.
