id: DEU.29.10
reference: Deuteronomy 29:10
source:
  edition: WLC
  text: טַפְּ/כֶ֣ם נְשֵׁי/כֶ֔ם וְ/גֵ֣רְ/ךָ֔ אֲשֶׁ֖ר בְּ/קֶ֣רֶב מַחֲנֶ֑י/ךָ מֵ/חֹטֵ֣ב
    עֵצֶ֔י/ךָ עַ֖ד שֹׁאֵ֥ב מֵימֶֽי/ךָ׃
translation:
  text: your little ones, your wives, and the sojourner who is in the midst of your
    camp, from the one who chops your wood to the one who draws your water,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your children.' The Hebrew טַף refers especially to little children
      or dependents.
    reason: lexical_alternative
  - marker: b
    text: Or 'the resident foreigner among you.' The Hebrew גֵּר refers to a foreign
      resident living within the community.
    reason: lexical_alternative
lexical_decisions:
- source_word: טַפְּכֶם
  chosen: your little ones
  alternatives:
  - your children
  - your dependents
  lexicon: HALOT
  rationale: טַף refers to small children or little ones, not merely offspring in
    general. 'Your little ones' preserves the concrete sense better than the broader
    'your children.'
- source_word: נְשֵׁיכֶם
  chosen: your wives
  alternatives:
  - your women
  lexicon: HALOT
  rationale: In this covenant-assembly context, 'wives' is the natural relational
    sense of נָשִׁים with second-person possessive, and is standard, clear English.
- source_word: וְגֵרְךָ
  chosen: and the sojourner
  alternatives:
  - and your resident foreigner
  - and your alien
  - and your stranger
  lexicon: HALOT
  rationale: גֵּר denotes a foreign resident living among Israel, not merely a passerby.
    'Sojourner' is a readable and biblically resonant rendering that preserves the
    social-legal nuance better than 'stranger.' The singular collective is retained.
- source_word: אֲשֶׁר בְּקֶרֶב מַחֲנֶיךָ
  chosen: in the midst of your camp
  alternatives:
  - who is within your camp
  - who is in your camp
  lexicon: HALOT
  rationale: The phrase locates the גֵּר among Israel's assembled community. 'In the
    midst of your camp' preserves both the spatial imagery and the covenantal sense
    of inclusion.
- source_word: מֵחֹטֵב עֵצֶיךָ
  chosen: from the one who chops your wood
  alternatives:
  - from your woodcutter
  - from the cutter of your wood
  lexicon: HALOT
  rationale: The preposition מִן with עַד marks a range from lowest labor to another
    menial task. Rendering the participle verbally ('the one who chops') keeps the
    Hebrew participial force and the representative sense.
- source_word: עַד שֹׁאֵב מֵימֶיךָ
  chosen: to the one who draws your water
  alternatives:
  - to your water drawer
  - to the one who fetches your water
  lexicon: HALOT
  rationale: שֹׁאֵב is a participle for drawing water. 'Draws your water' is idiomatic
    and preserves the menial-labor pairing with wood chopping. 'To' reflects עַד in
    the range expression.
