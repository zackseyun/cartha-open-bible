theological_decisions:
- issue: Social scope of the covenant assembly
  chosen_reading: The verse explicitly includes all strata of the community, including
    resident foreigners and low-status laborers, without narrowing the scope to ethnic
    Israelites alone.
  alternative_readings:
  - The verse lists only Israelites proper
  - The laborers are merely metaphorical classes
  rationale: The plain sense of the Hebrew is an inclusive enumeration of those standing
    in covenant assembly. This is a textual-social observation, not an imported doctrinal
    claim, and preserves the breadth of the verse.
  doctrine_reference: Translation philosophy §1, §3
