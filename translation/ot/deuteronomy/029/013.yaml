id: DEU.29.13
reference: Deuteronomy 29:13
source:
  edition: WLC
  text: וְ/לֹ֥א אִתְּ/כֶ֖ם לְ/בַדְּ/כֶ֑ם אָנֹכִ֗י כֹּרֵת֙ אֶת הַ/בְּרִ֣ית הַ/זֹּ֔את וְ/אֶת הָ/אָלָ֖ה הַ/זֹּֽאת־־׃
translation:
  text: And it is not with you alone that I am making this covenant and this oath[b][a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'cutting this covenant'; 'making this covenant' renders the Hebrew covenant idiom in natural English.
    reason: lexical_alternative
  - marker: b
    text: Or 'and this curse.' The Hebrew term can refer to the oath itself or to the curse sanction bound up with that oath.
    reason: alternative_reading
lexical_decisions:
- source_word: וְלֹא
  chosen: And it is not
  alternatives:
  - And not
  - Nor
  lexicon: HALOT
  rationale: The conjunction plus negation introduces a contrast with the surrounding context. 'And it is not' gives natural English while preserving the Hebrew connective and negation.
- source_word: אִתְּכֶם
  chosen: with you
  alternatives:
  - with you all
  lexicon: HALOT
  rationale: 'The preposition with 2mp suffix is straightforwardly relational: the covenant is not being made only with the present audience.'
- source_word: לְבַדְּכֶם
  chosen: alone
  alternatives:
  - by yourselves
  - only
  lexicon: HALOT
  rationale: 'The adverbial sense is exclusivity. ''Alone'' is the most idiomatic English rendering in this construction: ''not with you alone.'''
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis, but English already conveys sufficient emphasis through word order and the explicit subject. 'I' is clear and natural.
- source_word: כֹּרֵת
  chosen: am making
  alternatives:
  - am cutting
  - cut
  lexicon: HALOT
  rationale: Hebrew idiom literally says 'cut a covenant.' In English, 'make a covenant' best reflects the idiom without obscuring meaning. The participle in context is well represented by the progressive 'am making.' The more literal 'cut' is worth preserving in a footnote as a lexical alternative.
- source_word: הַבְּרִית הַזֹּאת
  chosen: this covenant
  alternatives:
  - this treaty
  - this pact
  lexicon: HALOT
  rationale: בְּרִית in Deuteronomic covenantal context is best rendered 'covenant,' preserving the theological and legal weight of the term.
- source_word: וְאֶת הָאָלָה הַזֹּאת
  chosen: and this oath
  alternatives:
  - and this curse
  - and this sworn oath
  lexicon: HALOT
  rationale: אָלָה can denote an oath, often one involving self-maledictory sanctions. In covenant-making context, 'oath' is the best main-text rendering, while 'curse' remains a viable contextual alternative because the term can include the covenantal curse dimension.
