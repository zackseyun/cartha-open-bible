theological_decisions:
- issue: Rendering of אָלָה in covenant context
  chosen_reading: oath
  alternative_readings:
  - curse
  rationale: The verse pairs בְּרִית and אָלָה as the formal covenant arrangement and its sworn sanction. 'Oath' best captures the act of covenant ratification in English, while 'curse' is preserved because the Hebrew term can emphasize the self-maledictory sanction attached to the oath.
  doctrine_reference: Preserve theological tension rather than resolve it; document alternatives in footnotes.
