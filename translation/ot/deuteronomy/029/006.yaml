id: DEU.29.6
reference: Deuteronomy 29:6
source:
  edition: WLC
  text: וַ/תָּבֹ֖אוּ אֶל הַ/מָּק֣וֹם הַ/זֶּ֑ה וַ/יֵּצֵ֣א סִיחֹ֣ן מֶֽלֶךְ חֶ֠שְׁבּוֹן
    וְ/ע֨וֹג מֶֽלֶךְ הַ/בָּשָׁ֧ן לִ/קְרָאתֵ֛/נוּ לַ/מִּלְחָמָ֖ה וַ/נַּכֵּֽ/ם־־־׃
translation:
  text: When you came to this place, Sihon king of Heshbon and Og king of Bashan came
    out to meet us in battle, and we struck them down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and you came to this place.' The Hebrew narrative form can be rendered
      with simple coordination or with a temporal sense in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'and we defeated them.' The Hebrew verb literally means 'we struck them,'
      often in contexts of military defeat.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹאוּ
  chosen: When you came
  alternatives:
  - and you came
  - then you came
  lexicon: HALOT
  rationale: Qal wayyiqtol 2mp of בוא, narrating a past event addressed to the people.
    Rendered with 'When' to connect naturally to the following action in English while
    preserving the temporal-sequential force.
- source_word: אֶל הַמָּקוֹם הַזֶּה
  chosen: to this place
  alternatives:
  - into this place
  - to this location
  lexicon: HALOT
  rationale: מָקוֹם means 'place.' 'To this place' is the most natural English rendering
    with אֶל here.
- source_word: וַיֵּצֵא
  chosen: came out
  alternatives:
  - went out
  - marched out
  lexicon: HALOT
  rationale: Qal wayyiqtol of יצא, literally 'went/came out.' 'Came out' fits the
    perspective of the encounter and avoids overinterpreting with 'marched out.'
- source_word: סִיחֹן מֶלֶךְ חֶשְׁבּוֹן
  chosen: Sihon king of Heshbon
  alternatives:
  - Sihon, the king of Heshbon
  lexicon: HALOT
  rationale: Personal name transliterated; title translated per philosophy. Apposition
    is rendered straightforwardly without adding unnecessary punctuation in the main
    text.
- source_word: וְעוֹג מֶלֶךְ הַבָּשָׁן
  chosen: and Og king of Bashan
  alternatives:
  - and Og, the king of Bashan
  lexicon: HALOT
  rationale: Parallel to the preceding royal title phrase; Bashan is a place name
    and is transliterated by standard convention.
- source_word: לִקְרָאתֵנוּ
  chosen: to meet us
  alternatives:
  - against us
  - to confront us
  lexicon: HALOT
  rationale: From קרא/לקראת in the idiom 'come out to meet.' In military context it
    implies confrontation, but 'to meet us' preserves the lexical sense and lets the
    following phrase specify battle.
- source_word: לַמִּלְחָמָה
  chosen: for battle
  alternatives:
  - for war
  - to battle
  lexicon: HALOT
  rationale: מִלְחָמָה denotes warfare/battle. 'For battle' is idiomatic in English
    after 'came out to meet us' and preserves the hostile purpose.
- source_word: וַנַּכֵּם
  chosen: and we struck them down
  alternatives:
  - and we defeated them
  - and we struck them
  lexicon: HALOT
  rationale: Hiphil wayyiqtol 1cp of נכה with 3mp suffix. The verb often means to
    strike/smite, frequently with decisive defeat. 'Struck them down' preserves the
    concrete force better than the flatter 'defeated them' without overstating beyond
    the context.
