theological_decisions:
- issue: Implicit subject of the singular verb חָלַק
  chosen_reading: 'The subject is implicit and refers to God: ''whom he had not allotted
    to them.'''
  alternative_readings:
  - 'passive-like sense: ''which had not been allotted to them'''
  - less likely plural/indefinite construal tied to the gods themselves
  rationale: The Hebrew uses a 3ms singular verb without an explicit subject. In context,
    the implied actor is God, consistent with Deuteronomy's language of divine allotment
    and with the contrast between Israel's covenant God and unauthorized gods. Making
    the subject explicit in English is necessary for clarity.
