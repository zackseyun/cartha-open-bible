id: DEU.29.25
reference: Deuteronomy 29:25
source:
  edition: WLC
  text: וַ/יֵּלְכ֗וּ וַ/יַּֽעַבְדוּ֙ אֱלֹהִ֣ים אֲחֵרִ֔ים וַ/יִּֽשְׁתַּחֲוּ֖וּ לָ/הֶ֑ם
    אֱלֹהִים֙ אֲשֶׁ֣ר לֹֽא יְדָע֔וּ/ם וְ/לֹ֥א חָלַ֖ק לָ/הֶֽם־׃
translation:
  text: and they went and served other gods and bowed down to them, gods whom they
    had not known and whom he had not allotted to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and which had not been allotted to them.' The Hebrew has an implicit
      singular subject, likely referring to God.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּלְכוּ
  chosen: they went
  alternatives:
  - they departed
  - they followed
  lexicon: HALOT
  rationale: The verb הלך literally means 'to go/walk.' In this idiom introducing
    apostasy, 'went and served' preserves the Hebrew sequence without over-interpreting
    it as merely metaphorical.
- source_word: וַיַּעַבְדוּ
  chosen: served
  alternatives:
  - worshiped
  lexicon: HALOT
  rationale: עבד commonly means 'serve.' Since the next verb explicitly denotes prostration/worship,
    rendering this as 'served' preserves the distinction between service and acts
    of worship.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: '''Other gods'' is the plain sense of the adjective אֲחֵרִים and matches
    Deuteronomic usage. ''Foreign gods'' is possible in some contexts but is less
    literal here.'
- source_word: וַיִּשְׁתַּחֲווּ לָהֶם
  chosen: bowed down to them
  alternatives:
  - worshiped them
  - prostrated themselves before them
  lexicon: HALOT
  rationale: The verb שׁחה denotes bowing/prostration. 'Bowed down to them' keeps
    the physical imagery and avoids collapsing it into the broader 'worshiped,' especially
    since 'served' already renders the previous verb.
- source_word: אֱלֹהִים אֲשֶׁר לֹא יְדָעוּם
  chosen: gods whom they had not known
  alternatives:
  - gods they did not know
  - gods with whom they were not acquainted
  lexicon: HALOT
  rationale: ידע here means experiential/covenantal knowledge, not mere awareness.
    'Had not known' is natural English and preserves the relational force.
- source_word: וְלֹא חָלַק לָהֶם
  chosen: and whom he had not allotted to them
  alternatives:
  - and which he had not assigned to them
  - and who were not apportioned to them
  lexicon: HALOT
  rationale: חלק in the Qal means 'divide, apportion, allot.' The singular verb most
    naturally takes God as the implicit subject from context. 'Allotted' fits Deuteronomic
    covenant language of assigned portions.
