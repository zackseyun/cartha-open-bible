id: DEU.29.7
reference: Deuteronomy 29:7
source:
  edition: WLC
  text: וַ/נִּקַּח֙ אֶת אַרְצָ֔/ם וַ/נִּתְּנָ֣/הּ לְ/נַחֲלָ֔ה לָ/רֽאוּבֵנִ֖י וְ/לַ/גָּדִ֑י
    וְ/לַ/חֲצִ֖י שֵׁ֥בֶט הַֽ/מְנַשִּֽׁי־׃
translation:
  text: and we took their land and gave it as an inheritance to the Reubenite, the
    Gadite, and the half-tribe of the Manassite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'and the half-tribe of Manasseh.' The Hebrew uses
      the gentilic form 'the Manassite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנִּקַּח
  chosen: and we took
  alternatives:
  - and we seized
  lexicon: HALOT
  rationale: Qal wayyiqtol 1cp of לקח, the normal narrative form meaning 'take.' 'Took'
    is the most natural English rendering here; 'seized' is possible in military context
    but is stronger than the verb itself requires.
- source_word: אַרְצָם
  chosen: their land
  alternatives:
  - their country
  lexicon: HALOT
  rationale: אֶרֶץ with 3mp suffix refers to the territory belonging to the defeated
    kings just mentioned in context. 'Land' is the standard and most transparent rendering
    in territorial contexts.
- source_word: וַנִּתְּנָהּ
  chosen: and gave it
  alternatives:
  - and assigned it
  lexicon: HALOT
  rationale: Qal wayyiqtol 1cp of נתן with 3fs suffix referring back to 'land' (feminine).
    'Gave it' preserves the straightforward verbal sense; 'assigned it' is interpretive
    and slightly more administrative than the Hebrew demands.
- source_word: לְנַחֲלָה
  chosen: as an inheritance
  alternatives:
  - for an inheritance
  - as a possession
  lexicon: HALOT
  rationale: נַחֲלָה commonly denotes an inherited possession or allotted inheritance,
    especially in land-distribution contexts. 'As an inheritance' is idiomatic English
    and preserves the covenantal-land nuance better than the flatter 'possession.'
- source_word: לָראוּבֵנִי
  chosen: to the Reubenite
  alternatives:
  - to Reuben
  lexicon: HALOT
  rationale: The gentilic singular functions collectively for the tribal group. Rendering
    it as 'the Reubenite' preserves the Hebrew form while still being understandable
    in English.
- source_word: וְלַגָּדִי
  chosen: the Gadite
  alternatives:
  - Gad
  lexicon: HALOT
  rationale: Like 'Reubenite,' this gentilic singular stands for the tribe collectively.
    The article in English is retained for smooth coordination with the previous phrase.
- source_word: וְלַחֲצִי שֵׁבֶט הַמְנַשִּׁי
  chosen: the half-tribe of the Manassite
  alternatives:
  - half the tribe of Manasseh
  - the half-tribe of Manasseh
  lexicon: HALOT
  rationale: חֲצִי שֵׁבֶט is literally 'half-tribe.' הַמְנַשִּׁי is a gentilic/adjectival
    form ('the Manassite'), though English often smooths this to the proper name 'Manasseh.'
    The chosen rendering stays closer to the Hebrew morphology while remaining readable.
