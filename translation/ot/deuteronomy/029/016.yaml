id: DEU.29.16
reference: Deuteronomy 29:16
source:
  edition: WLC
  text: וַ/תִּרְאוּ֙ אֶת שִׁקּ֣וּצֵי/הֶ֔ם וְ/אֵ֖ת גִּלֻּלֵי/הֶ֑ם עֵ֣ץ וָ/אֶ֔בֶן כֶּ֥סֶף
    וְ/זָהָ֖ב אֲשֶׁ֥ר עִמָּ/הֶֽם־׃
translation:
  text: and you saw their detestable things and their idols, wood and stone, silver
    and gold, that were among them—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their abominations.' The Hebrew שִׁקּוּצִים is a strong term of disgust,
      often used for idolatrous objects.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew גִּלּוּלִים is a contemptuous word for idols, possibly carrying
      a crude nuance like 'dung-idols.'
    reason: lexical_alternative
  - marker: c
    text: Or 'that were with them,' referring to the surrounding nations through whose
      lands Israel passed.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּרְאוּ
  chosen: and you saw
  alternatives:
  - and you have seen
  - for you saw
  lexicon: HALOT
  rationale: Qal wayyiqtol 2mp of ראה, continuing Moses' address to the people. English
    simple past fits the narrative recollection. The prefixed conjunction is retained
    as 'and' to preserve the flow into this explanatory clause.
- source_word: שִׁקּוּצֵיהֶם
  chosen: their detestable things
  alternatives:
  - their abominations
  - their disgusting things
  lexicon: HALOT
  rationale: שִׁקּוּץ denotes something detestable, especially in idolatrous contexts.
    'Detestable things' is more transparent for modern readers than the traditional
    'abominations' while preserving the strong evaluative force.
- source_word: גִּלֻּלֵיהֶם
  chosen: their idols
  alternatives:
  - their dung-idols
  - their images
  lexicon: HALOT
  rationale: גִּלּוּלִים is a strongly pejorative term for idols. 'Idols' gives the
    referent clearly in readable English; the cruder pejorative nuance is not fully
    reproducible in idiomatic main text, so an alternative is preserved in a footnote.
- source_word: עֵץ וָאֶבֶן
  chosen: of wood and stone
  alternatives:
  - wood and stone
  - made of wood and stone
  lexicon: HALOT
  rationale: These nouns likely specify the material of the idols/detestable objects.
    'Of wood and stone' is concise and idiomatic in English, linking naturally to
    'idols.'
- source_word: כֶּסֶף וְזָהָב
  chosen: silver and gold
  alternatives:
  - of silver and gold
  lexicon: HALOT
  rationale: 'These materials continue the list of idol substances. Asyndetic apposition
    after ''wood and stone'' is represented naturally as a continued material list:
    ''wood and stone, silver and gold.'''
- source_word: אֲשֶׁר עִמָּהֶם
  chosen: that were among them
  alternatives:
  - that were with them
  - that belonged to them
  lexicon: HALOT
  rationale: The relative clause most naturally refers to the surrounding nations
    previously mentioned and indicates these cult objects were in their possession/presence.
    'Among them' fits the contextual sense of being found in the nations through whose
    lands Israel passed.
