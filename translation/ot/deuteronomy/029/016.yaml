theological_decisions:
- issue: Rendering of pejorative idolatry terms
  chosen_reading: Use 'detestable things' and 'idols' in the main text
  alternative_readings:
  - abominations and idols
  - detestable idols
  - abominations and dung-idols
  rationale: The Hebrew uses two distinct pejorative terms for pagan cult objects.
    The translation preserves both terms distinctly without importing extra theological
    explanation. Readability favors 'detestable things' and 'idols,' while a footnote
    preserves the sharper lexical nuance of גִּלּוּלִים.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Scope of the relative clause אֲשֶׁר עִמָּהֶם
  chosen_reading: 'Attach to the nations'' possession/presence: ''that were among
    them'''
  alternative_readings:
  - that belonged to them
  - which were with them
  rationale: The clause is contextually tied to the nations in the preceding verse
    rather than to Israel. This avoids implying Israel possessed these idols while
    preserving the observational force of the passage.
  doctrine_reference: Translation philosophy §§1, 3
