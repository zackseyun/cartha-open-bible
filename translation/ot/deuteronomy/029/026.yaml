id: DEU.29.26
reference: Deuteronomy 29:26
source:
  edition: WLC
  text: וַ/יִּֽחַר אַ֥ף יְהוָ֖ה בָּ/אָ֣רֶץ הַ/הִ֑וא לְ/הָבִ֤יא עָלֶ֨י/הָ֙ אֶת כָּל
    הַ/קְּלָלָ֔ה הַ/כְּתוּבָ֖ה בַּ/סֵּ֥פֶר הַ/זֶּֽה־־־׃
translation:
  text: So the anger of the LORD burned against that land, to bring upon it every
    curse written in this book.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּחַר אַף
  chosen: the anger ... burned
  alternatives:
  - the anger ... was kindled
  - the LORD became angry
  lexicon: HALOT
  rationale: The idiom חרה אף literally involves the nose/anger burning and commonly
    denotes intense anger. 'The anger ... burned' preserves the Hebrew imagery while
    remaining natural English. A flatter rendering like 'became angry' is possible
    but loses the vividness.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: בָּאָרֶץ הַהִוא
  chosen: against that land
  alternatives:
  - in that land
  - with that land
  lexicon: HALOT
  rationale: The preposition ב with חרה אף can mark the object toward which anger
    burns. In English, 'against that land' best conveys the hostile direction of the
    anger in context, where judgment falls on the land.
- source_word: לְהָבִיא
  chosen: to bring
  alternatives:
  - so as to bring
  - to cause to come
  lexicon: HALOT
  rationale: The infinitive expresses result/purpose connected to the LORD's anger.
    'To bring' is concise and idiomatic in English.
- source_word: עָלֶיהָ
  chosen: upon it
  alternatives:
  - on it
  - upon her
  lexicon: HALOT
  rationale: The suffix refers back to 'land,' grammatically feminine in Hebrew. English
    normally uses 'it' for land here; 'upon it' preserves the formal judicial tone.
- source_word: כָּל הַקְּלָלָה
  chosen: every curse
  alternatives:
  - all the curse
  - the whole curse
  lexicon: HALOT
  rationale: Though singular in Hebrew, the collective sense is naturally rendered
    'every curse' in English, especially with the following participle 'written in
    this book.' This avoids awkward English while preserving totality.
- source_word: הַכְּתוּבָה
  chosen: written
  alternatives:
  - that is written
  - recorded
  lexicon: HALOT
  rationale: The passive participle straightforwardly means 'written.' The shorter
    form is natural in English and retains the textual/juridical force.
- source_word: בַּסֵּפֶר הַזֶּה
  chosen: in this book
  alternatives:
  - in this scroll
  - in this document
  lexicon: HALOT
  rationale: סֵפֶר can denote a scroll/book/document. 'Book' is the standard and most
    accessible rendering in this covenantal context, without requiring a material-specific
    translation.
