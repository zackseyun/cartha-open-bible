theological_decisions:
- issue: Covenant formula wording
  chosen_reading: his people ... your God
  alternative_readings:
  - a people for him ... God to you
  rationale: The verse uses classic covenant formula language. The chosen rendering
    preserves mutual covenant relationship in idiomatic English without reducing the
    theological weight.
  doctrine_reference: Translation philosophy §§3, 6
- issue: Gendered reference in לַאֲבֹתֶיךָ
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: Because the text immediately specifies Abraham, Isaac, and Jacob, the
    masculine term is not merely generic but specifically patriarchal. This aligns
    with the gender-accurate policy.
  doctrine_reference: Translation philosophy §4
