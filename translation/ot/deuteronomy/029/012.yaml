id: DEU.29.12
reference: Deuteronomy 29:12
source:
  edition: WLC
  text: לְמַ֣עַן הָקִֽים אֹתְ/ךָ֩ הַ/יּ֨וֹם ל֜/וֹ לְ/עָ֗ם וְ/ה֤וּא יִֽהְיֶה לְּ/ךָ֙
    לֵֽ/אלֹהִ֔ים כַּ/אֲשֶׁ֖ר דִּבֶּר לָ֑/ךְ וְ/כַ/אֲשֶׁ֤ר נִשְׁבַּע֙ לַ/אֲבֹתֶ֔י/ךָ
    לְ/אַבְרָהָ֥ם לְ/יִצְחָ֖ק וּֽ/לְ/יַעֲקֹֽב־׀־־׃
translation:
  text: so that today he may establish you as his people, and he himself may be your
    God, just as he spoke to you and as he swore to your fathers, to Abraham, to Isaac,
    and to Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'for himself as a people.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your fathers'; that is, the patriarchs Abraham, Isaac, and Jacob.
    reason: cultural_note
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves
    the purposive force.
- source_word: הָקִים
  chosen: may establish
  alternatives:
  - may confirm
  - may set up
  lexicon: HALOT
  rationale: Hiphil of קום here carries the sense of causing to stand/establish in
    covenantal status. 'Establish' best fits the covenant context.
- source_word: אֹתְךָ
  chosen: you
  lexicon: HALOT
  rationale: Direct object pronoun referring corporately to Israel, rendered straightforwardly
    as singular 'you' in keeping with the Hebrew address.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Temporal adverb marking the present covenant moment. 'Today' is clear
    modern English.
- source_word: לוֹ לְעָם
  chosen: as his people
  alternatives:
  - for himself as a people
  - to be a people for him
  lexicon: HALOT
  rationale: The phrase expresses covenant belonging. 'As his people' is idiomatic
    English that preserves the relational sense without over-literal awkwardness.
- source_word: וְהוּא יִהְיֶה לְךָ לֵאלֹהִים
  chosen: and he himself may be your God
  alternatives:
  - and he may be God to you
  - and he may become your God
  lexicon: HALOT
  rationale: This is standard covenant formula language. 'He himself' gives appropriate
    emphasis to וְהוּא, and 'your God' is the most natural English expression of לְךָ
    לֵאלֹהִים.
- source_word: כַּאֲשֶׁר דִּבֶּר לָךְ
  chosen: just as he spoke to you
  alternatives:
  - as he promised you
  - as he said to you
  lexicon: HALOT
  rationale: דבר is literally 'spoke/said.' Since the verb for oath follows separately,
    'spoke to you' preserves the distinction rather than importing 'promised' here.
- source_word: וְכַאֲשֶׁר נִשְׁבַּע
  chosen: and as he swore
  alternatives:
  - and as he took an oath
  - and as he swore an oath
  lexicon: HALOT
  rationale: נשבע explicitly denotes swearing an oath. 'Swore' is concise and accurate.
- source_word: לַאֲבֹתֶיךָ
  chosen: to your fathers
  alternatives:
  - to your ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural and refers to the patriarchal
    forefathers named immediately after. Per gender-accurate policy, 'fathers' is
    preferred.
- source_word: לְאַבְרָהָם לְיִצְחָק וּלְיַעֲקֹב
  chosen: to Abraham, to Isaac, and to Jacob
  alternatives:
  - to Abraham, Isaac, and Jacob
  lexicon: HALOT
  rationale: Names are transliterated. Repeating 'to' reflects the Hebrew prepositions
    and gives solemn cadence, though either English form would be acceptable.
