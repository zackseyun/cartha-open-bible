id: PRO.13.11
reference: Proverbs 13:11
source:
  edition: WLC
  text: ה֭וֹן מֵ/הֶ֣בֶל יִמְעָ֑ט וְ/קֹבֵ֖ץ עַל יָ֣ד יַרְבֶּֽה־׃
translation:
  text: Wealth from vanity dwindles[b][a], but whoever gathers little by little increases it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Wealth from vanity dwindles'; Hebrew 'from vapor/emptiness,' suggesting gain that is fleeting, insubstantial, or ill-founded.
    reason: lexical_alternative
  - marker: b
    text: Literally 'by hand'; the idiom likely means gathering gradually or in small amounts.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹן
  chosen: wealth
  alternatives:
  - riches
  - property
  - substance
  lexicon: HALOT
  rationale: הוֹן denotes material wealth or possessions. 'Wealth' is natural modern English and broad enough to cover money/property without sounding archaic like 'substance.'
- source_word: מֵהֶבֶל
  chosen: gained hastily
  alternatives:
  - from vanity
  - by emptiness
  - by a breath
  - dishonestly
  lexicon: HALOT
  rationale: הֶבֶל literally means 'breath, vapor,' and figuratively 'vanity, emptiness.' In this proverb's economic context, the phrase describes wealth acquired in an insubstantial, fleeting, or ill-founded way. 'Gained hastily' captures the proverb's contrast with slow accumulation ('little by little') in idiomatic English. Because the Hebrew image can also suggest vanity or unreliability, that alternative is preserved in a footnote.
- source_word: יִמְעָט
  chosen: dwindles
  alternatives:
  - decreases
  - becomes little
  lexicon: HALOT
  rationale: The verb means 'become small, diminish.' 'Dwindles' gives a natural proverbial English expression for wealth decreasing over time.
- source_word: וְקֹבֵץ
  chosen: whoever gathers
  alternatives:
  - but the one gathering
  - but he who collects
  lexicon: HALOT
  rationale: The participle functions substantivally for a general person. 'Whoever gathers' communicates the generic force smoothly in English.
- source_word: עַל יָד
  chosen: little by little
  alternatives:
  - by hand
  - hand to hand
  - gradually
  lexicon: HALOT
  rationale: The idiom עַל־יָד here most naturally refers to gradual accumulation, likely by small increments or steady labor. 'Little by little' preserves the proverbial contrast with quick gain better than the more opaque literal 'by hand.' A more literal alternative is preserved in a footnote.
- source_word: יַרְבֶּה
  chosen: increases it
  alternatives:
  - makes it abound
  - multiplies it
  - becomes great
  lexicon: HALOT
  rationale: The Hiphil of רבה means 'make much, increase.' Supplying 'it' in English clarifies that the object is the wealth under discussion.
