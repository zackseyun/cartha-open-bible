theological_decisions:
- issue: Syntactical force of אִם תַּחְשׂוֹךְ at the end of the verse
  chosen_reading: 'Understood idiomatically as an exhortational continuation: ''and hold back those staggering to the slaughter'''
  alternative_readings:
  - Retain the more literal but abrupt 'if you hold back' and connect it to v.12
  - Read as a prohibition, 'do not hold back'
  rationale: This is primarily a syntactical/translation issue rather than a doctrinal one. The Hebrew ending is elliptical and has long been taken in relation either to the preceding line or to the following verse. For a standalone verse translation, rendering the second colon as a coordinate exhortation best communicates the proverb's moral demand without importing extra content. The alternative is preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §3, preserve tension where the source is genuinely ambiguous
