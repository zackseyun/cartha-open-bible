id: PRO.4.22
reference: Proverbs 4:22
source:
  edition: WLC
  text: כִּֽי חַיִּ֣ים הֵ֭ם לְ/מֹצְאֵי/הֶ֑ם וּֽ/לְ/כָל בְּשָׂר֥/וֹ מַרְפֵּֽא־־׃
translation:
  text: For they are life to those who find them[a], and healing to all their flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'health to his whole body.' The Hebrew literally says 'healing to all his flesh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the preceding exhortation. 'For' fits the proverbial explanatory connection in English.
- source_word: חַיִּים
  chosen: life
  alternatives:
  - lives
  - living
  lexicon: HALOT
  rationale: Though morphologically plural, the Hebrew noun commonly functions idiomatically as a singular abstract, 'life.' This is the most natural English rendering here.
- source_word: הֵם
  chosen: they are
  alternatives:
  - these are
  lexicon: HALOT
  rationale: Refers back to the father's words/teachings in the immediate context. English requires the copula for smooth sense.
- source_word: לְמֹצְאֵיהֶם
  chosen: to those who find them
  alternatives:
  - for their finders
  - to the ones finding them
  lexicon: HALOT
  rationale: The participial form with pronominal suffix denotes people who find 'them' (the words/instruction). 'Those who find them' is clear, natural, and close to the Hebrew.
- source_word: וּלְכָל
  chosen: and to all
  alternatives:
  - and for all
  lexicon: HALOT
  rationale: Coordinates the second predicate with the first. 'To all' preserves the lamed relation parallel to the previous clause.
- source_word: בְּשָׂרוֹ
  lemma: בָּשָׂר
  chosen: his flesh
  alternatives:
  - his body
  - their flesh
  - their body
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh.' The singular suffix likely reflects the generic individual in proverbial style. In keeping with the project's gender-accurate policy, the singular masculine is retained rather than neutralized. 'Flesh' is preferred over 'body' because it is the direct lexical sense, though here it refers to the person's physical being.
- source_word: מַרְפֵּא
  chosen: healing
  alternatives:
  - health
  - medicine
  - remedy
  lexicon: HALOT
  rationale: The noun denotes healing or cure. 'Healing' is the clearest modern English choice and preserves the result-oriented sense better than 'medicine,' which could imply a concrete substance not stated in the text.
