id: PRO.6.29
reference: Proverbs 6:29
source:
  edition: WLC
  text: כֵּ֗ן הַ֭/בָּא אֶל אֵ֣שֶׁת רֵעֵ֑/הוּ לֹ֥א יִ֝נָּקֶ֗ה כָּֽל הַ/נֹּגֵ֥עַ בָּֽ/הּ־־׃
translation:
  text: So is the one who goes in to his neighbor’s wife[b][a]; everyone who touches her will not go unpunished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will not be acquitted' / 'will not be held guiltless.'
    reason: lexical_alternative
  - marker: b
    text: '''Touches her'' likely refers here to illicit sexual contact, not merely incidental physical touch.'
    reason: cultural_note
lexical_decisions:
- source_word: כֵּן
  chosen: So is
  alternatives:
  - Thus is
  - So
  lexicon: HALOT
  rationale: Introduces the comparison/conclusion from the preceding analogy. 'So is' preserves the proverbial linkage to the prior verse more naturally than a bare 'thus.'
- source_word: הַבָּא
  chosen: the one who goes in
  alternatives:
  - he who enters
  - the one who comes to
  lexicon: HALOT
  rationale: 'The participle with article functions substantivally: ''the one who...''. In this sexual-adultery context, ''goes in to'' is the idiomatic and sufficiently clear rendering of בוא אל without flattening it to a mere spatial ''comes to.'''
- source_word: אֶל אֵשֶׁת רֵעֵהוּ
  chosen: to his neighbor’s wife
  alternatives:
  - to the wife of his companion
  - to another man's wife
  lexicon: HALOT
  rationale: רֵעַ commonly means 'neighbor/companion/friend.' 'Neighbor’s wife' is idiomatic English and preserves the relational and ethical dimension better than the more interpretive 'another man's wife.'
- source_word: לֹא יִנָּקֶה
  chosen: will not go unpunished
  alternatives:
  - will not be innocent
  - will not be acquitted
  - will not be held guiltless
  lexicon: HALOT
  rationale: The Niphal of נקה here conveys escaping punishment or being cleared. 'Will not go unpunished' is natural modern English and captures the judicial force in context.
- source_word: כָּל
  chosen: everyone
  alternatives:
  - all who
  - whoever
  lexicon: HALOT
  rationale: Used distributively with the following participle. 'Everyone' gives clear idiomatic English while preserving the universal scope.
- source_word: הַנֹּגֵעַ בָּהּ
  chosen: who touches her
  alternatives:
  - who lays a hand on her
  - who has contact with her
  lexicon: HALOT
  rationale: נגע literally means 'touch.' In this context it likely functions as a restrained expression for illicit sexual contact, but the Hebrew itself uses the broader verb. 'Touches her' preserves the source wording and its rhetorical restraint without over-paraphrasing.
