id: PRO.6.9
reference: Proverbs 6:9
source:
  edition: WLC
  text: עַד מָתַ֖י עָצֵ֥ל תִּשְׁכָּ֑ב מָ֝תַ֗י תָּק֥וּם מִ/שְּׁנָתֶֽ/ךָ־׀׃
translation:
  text: How long, sluggard, will you lie there? When will you rise from your sleep?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lazy one' or 'lazy man' for 'sluggard.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד מָתַי
  chosen: How long
  alternatives:
  - Until when
  lexicon: HALOT
  rationale: Idiomatic interrogative of duration in Hebrew. 'How long' is the natural
    English equivalent and preserves the rebuking tone.
- source_word: עָצֵל
  chosen: sluggard
  alternatives:
  - lazy one
  - lazy man
  lexicon: HALOT
  rationale: A conventional wisdom-term in Proverbs for a habitually lazy person.
    'Sluggard' preserves the proverbial register better than the flatter 'lazy one.'
    The masculine singular is retained as gender-accurate to the source while functioning
    representatively.
- source_word: תִּשְׁכָּב
  chosen: will you lie there
  alternatives:
  - will you lie down
  - will you keep lying
  lexicon: HALOT
  rationale: The verb means 'lie down/lie.' In context it refers to remaining in bed.
    Adding 'there' makes the English idiomatic and conveys continued inactivity without
    over-paraphrasing.
- source_word: מָתַי
  chosen: When
  alternatives:
  - How long until
  lexicon: HALOT
  rationale: Simple interrogative adverb introducing the second question. 'When' is
    the most direct rendering in English.
- source_word: תָּקוּם
  chosen: will you rise
  alternatives:
  - will you get up
  - will you arise
  lexicon: HALOT
  rationale: The verb means 'arise/get up.' 'Rise' is concise, natural, and slightly
    elevated in a wisdom context without sounding archaic.
- source_word: מִשְּׁנָתֶךָ
  chosen: from your sleep
  alternatives:
  - from your slumber
  - out of your sleep
  lexicon: HALOT
  rationale: The noun is 'sleep' with second masculine singular suffix. 'From your
    sleep' is the most straightforward rendering. 'Slumber' is possible but is better
    reserved for contexts where a more poetic nuance is explicit.
