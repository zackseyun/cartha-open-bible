id: PRO.6.24
reference: Proverbs 6:24
source:
  edition: WLC
  text: לִ֭/שְׁמָרְ/ךָ מֵ/אֵ֣שֶׁת רָ֑ע מֵֽ֝/חֶלְקַ֗ת לָשׁ֥וֹן נָכְרִיָּֽה׃
translation:
  text: to keep you from the evil woman, from the smooth tongue of the foreign woman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the flattering tongue' (literally, 'the smooth tongue').
    reason: lexical_alternative
  - marker: b
    text: Or 'the strange woman'; some understand this more specifically as 'the adulteress.'
    reason: alternative_reading
lexical_decisions:
- source_word: לִשְׁמָרְךָ
  chosen: to keep you
  alternatives:
  - to guard you
  - to preserve you
  lexicon: HALOT
  rationale: 'Infinitive construct with prefixed ל expresses purpose/result from the
    previous verse: ''to keep/guard you.'' ''Keep'' is natural modern English and
    preserves the protective sense without overformal stiffness.'
- source_word: מֵאֵשֶׁת רָע
  chosen: from the evil woman
  alternatives:
  - from a wicked woman
  - from an evil wife
  lexicon: HALOT
  rationale: אֵשֶׁת is the construct form of 'woman/wife.' In this wisdom context
    warning against illicit seduction, 'woman' is broader and less misleading than
    'wife.' רָע functions adjectivally, describing moral badness; 'evil' is retained
    as a strong, direct rendering, though 'wicked' is possible.
- source_word: מֵחֶלְקַת לָשׁוֹן
  chosen: from the smooth tongue
  alternatives:
  - from the smoothness of tongue
  - from a flattering tongue
  - from slippery speech
  lexicon: HALOT
  rationale: חֶלְקַת literally denotes smoothness/slipperiness. With 'tongue' it idiomatically
    refers to smooth, seductive, flattering speech. 'Smooth tongue' keeps the Hebrew
    imagery while remaining readable; the more interpretive 'flattering tongue' is
    preserved as an alternative.
- source_word: נָכְרִיָּה
  chosen: the foreign woman
  alternatives:
  - the strange woman
  - the adulteress
  lexicon: HALOT
  rationale: In Proverbs this term often denotes a foreign/strange woman, frequently
    with connotations of moral and covenantal danger. 'Foreign woman' follows the
    lexical sense directly and avoids importing the narrower interpretation 'adulteress'
    into the main text. Traditional 'strange woman' is archaic in modern English.
