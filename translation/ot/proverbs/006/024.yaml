theological_decisions:
- issue: Interpretation of נָכְרִיָּה in wisdom literature
  chosen_reading: Render lexically as 'foreign woman' in the main text
  alternative_readings:
  - strange woman
  - adulteress
  rationale: The Hebrew term's core sense is foreign/alien. In Proverbs it may carry
    moral overtones, but the translation should not collapse the lexical meaning into
    a fully interpretive label unless context requires it. The warning against illicit
    seduction is preserved by context and by the phrase 'smooth tongue.'
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
