id: PRO.6.33
reference: Proverbs 6:33
source:
  edition: WLC
  text: נֶֽגַע וְ/קָל֥וֹן יִמְצָ֑א וְ֝/חֶרְפָּת֗/וֹ לֹ֣א תִמָּחֶֽה־׃
translation:
  text: He will find injury and disgrace, and his reproach will not be wiped away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wound and dishonor'; the Hebrew terms can also be rendered more concretely
      as bodily harm and public shame.
    reason: lexical_alternative
  - marker: b
    text: Or 'his disgrace will not be erased.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶגַע
  chosen: injury
  alternatives:
  - wound
  - affliction
  - blow
  - plague
  lexicon: HALOT
  rationale: נֶגַע can denote a blow, wound, or affliction. In this wisdom context
    about the consequences of adultery, a concrete but broad term like 'injury' fits
    both physical harm and damaging consequence without over-specifying disease ('plague')
    or only a visible wound.
- source_word: קָלוֹן
  chosen: disgrace
  alternatives:
  - dishonor
  - shame
  - ignominy
  lexicon: HALOT
  rationale: קָלוֹן denotes public dishonor or disgrace. 'Disgrace' communicates the
    social and moral shame clearly in modern English and pairs naturally with the
    preceding consequence term.
- source_word: יִמְצָא
  chosen: will find
  alternatives:
  - will get
  - will encounter
  - will meet with
  lexicon: HALOT
  rationale: The verb מצא is literally 'find.' Here the idiom means that these consequences
    come upon the man. 'Will find' preserves the Hebrew wording while remaining idiomatic
    enough in English.
- source_word: חֶרְפָּתוֹ
  chosen: his reproach
  alternatives:
  - his shame
  - his disgrace
  - his scorn
  lexicon: HALOT
  rationale: חֶרְפָּה often denotes reproach, taunt, or enduring shame before others.
    'Reproach' preserves the public, lasting dimension better than the more internal
    'shame.'
- source_word: לֹא תִמָּחֶה
  chosen: will not be wiped away
  alternatives:
  - will not be blotted out
  - will not be erased
  - will not be removed
  lexicon: HALOT
  rationale: The Niphal of מחה means to be wiped out, blotted out, or erased. 'Will
    not be wiped away' is vivid, close to the Hebrew image, and suitable for enduring
    disgrace.
