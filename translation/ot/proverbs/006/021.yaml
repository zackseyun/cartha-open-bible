id: PRO.6.21
reference: Proverbs 6:21
source:
  edition: WLC
  text: קָשְׁרֵ֣/ם עַל לִבְּ/ךָ֣ תָמִ֑יד עָ֝נְדֵ֗/ם עַל גַּרְגְּרֹתֶֽ/ךָ־־׃
translation:
  text: Bind them on your heart continually[b][a]; tie them around your neck.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'always' for 'continually.'
    reason: lexical_alternative
  - marker: b
    text: Or 'wear them around your neck.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָשְׁרֵם
  chosen: Bind them
  alternatives:
  - Tie them
  lexicon: HALOT
  rationale: Qal imperative 2ms with 3mp suffix from קשר, a concrete command to fasten or bind. 'Bind' preserves the metaphorical force and pairs well with the following body imagery.
- source_word: לִבְּךָ
  chosen: your heart
  alternatives:
  - your mind
  - your inner self
  lexicon: HALOT
  rationale: לֵב/לֵבָב commonly denotes the inner person, including thought and will, but 'heart' is the standard and sufficiently transparent English rendering here, preserving the Hebrew anthropological imagery.
- source_word: תָמִיד
  chosen: continually
  alternatives:
  - always
  - constantly
  lexicon: HALOT
  rationale: The adverb indicates ongoing, habitual constancy. 'Continually' fits modern English and conveys sustained duration without sounding overly colloquial.
- source_word: עָנְדֵם
  chosen: tie them
  alternatives:
  - bind them
  - wear them
  lexicon: HALOT
  rationale: Imperative from ענד, used for putting on or fastening something like an ornament. 'Tie them' differentiates it from the previous verb while preserving the image of fastening instruction onto oneself. 'Wear them' is possible but slightly more interpretive.
- source_word: גַּרְגְּרֹתֶךָ
  chosen: your neck
  alternatives:
  - your throat
  lexicon: HALOT
  rationale: Though the noun can relate to the throat area, in this idiom the sense is the neck as the place where an ornament or pendant is worn. 'Neck' is the most natural English equivalent in context.
