id: PRO.6.31
reference: Proverbs 6:31
source:
  edition: WLC
  text: וְ֭/נִמְצָא יְשַׁלֵּ֣ם שִׁבְעָתָ֑יִם אֶת כָּל ה֖וֹן בֵּית֣/וֹ יִתֵּֽן־־׃
translation:
  text: Yet if he is found, he must repay sevenfold; he must give all the wealth of
    his house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seven times.' The Hebrew expression can denote sevenfold restitution
      or repayment in the amount of seven.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִמְצָא
  chosen: Yet if he is found
  alternatives:
  - But when he is found
  - and being found
  lexicon: HALOT
  rationale: 'The conjunction with Niphal of מצא introduces a concessive/adversative
    turn from the previous verse: despite sympathy for a hungry thief, once discovered
    he faces restitution. ''If he is found'' captures the conditional force natural
    in English; ''Yet'' reflects the discourse contrast.'
- source_word: יְשַׁלֵּם
  chosen: he must repay
  alternatives:
  - he shall surely pay
  - he will make restitution
  lexicon: HALOT
  rationale: Piel of שלם here denotes making restitution or repayment. 'Must repay'
    conveys the legal/obligatory sense in idiomatic modern English better than a simple
    future.
- source_word: שִׁבְעָתָיִם
  chosen: sevenfold
  alternatives:
  - seven times
  lexicon: HALOT
  rationale: The adverbial numeral expresses multiplied restitution. 'Sevenfold' is
    the standard concise English equivalent and fits legal/wisdom style.
- source_word: אֶת כָּל הוֹן בֵּיתוֹ
  chosen: all the wealth of his house
  alternatives:
  - all the substance of his house
  - all the goods of his household
  - all the wealth in his house
  lexicon: HALOT
  rationale: הוֹן denotes wealth, substance, or possessions. 'All the wealth of his
    house' preserves the genitive structure and communicates total forfeiture of his
    household assets.
- source_word: יִתֵּן
  chosen: he must give
  alternatives:
  - he shall give
  - he will give
  lexicon: HALOT
  rationale: נתן here specifies the concrete act of handing over payment. Rendering
    with 'must give' maintains the obligatory force parallel to 'must repay'.
