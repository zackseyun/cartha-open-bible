id: PRO.6.30
reference: Proverbs 6:30
source:
  edition: WLC
  text: לֹא יָב֣וּזוּ לַ֭/גַּנָּב כִּ֣י יִגְנ֑וֹב לְ/מַלֵּ֥א נַ֝פְשׁ֗/וֹ כִּ֣י יִרְעָֽב־׃
translation:
  text: People do not despise a thief if he steals to satisfy himself when he is hungry[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to satisfy his appetite'; literally 'to fill his soul/self.'
    reason: lexical_alternative
  - marker: b
    text: Or 'because he is hungry.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָב֣וּזוּ
  chosen: do not despise
  alternatives:
  - do not scorn
  - do not hold in contempt
  lexicon: HALOT
  rationale: בוז commonly denotes treating with contempt or despising. 'Despise' is a natural modern rendering and fits the social evaluation in this proverb better than a more wooden gloss.
- source_word: לַגַּנָּב
  chosen: a thief
  alternatives:
  - the thief
  lexicon: HALOT
  rationale: Although the form is definite in Hebrew, English proverbial style often uses the indefinite singular for a representative case. 'A thief' best conveys the generic sense.
- source_word: כִּי יִגְנֹב
  chosen: if he steals
  alternatives:
  - when he steals
  - because he steals
  lexicon: HALOT
  rationale: כִּי here introduces the circumstance under which the statement applies. 'If he steals' captures the conditional nuance in smooth English; 'when' is possible but slightly less explicit.
- source_word: לְמַלֵּא נַפְשׁוֹ
  chosen: to satisfy himself
  alternatives:
  - to fill his appetite
  - to satisfy his appetite
  - to preserve his life
  lexicon: HALOT
  rationale: Literally 'to fill his soul/self.' In this hunger context, the idiom refers to satisfying personal need or appetite. 'To satisfy himself' preserves the reflexive force without over-specifying beyond the Hebrew.
- source_word: נַפְשׁוֹ
  chosen: himself
  alternatives:
  - his appetite
  - his soul
  - his life
  lexicon: HALOT
  rationale: נֶפֶשׁ has a broad semantic range including self, life, and appetite. Because the immediate context is hunger, an appetite-related sense is possible, but 'himself' keeps the idiom broad while remaining idiomatic in English.
- source_word: כִּי יִרְעָב
  chosen: when he is hungry
  alternatives:
  - because he is hungry
  - for he is hungry
  lexicon: HALOT
  rationale: The clause gives the motivating circumstance for the theft. 'When he is hungry' reads naturally and preserves the situational force; 'because' is also possible and worth preserving in a footnote.
