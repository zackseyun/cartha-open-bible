id: PRO.6.34
reference: Proverbs 6:34
source:
  edition: WLC
  text: כִּֽי קִנְאָ֥ה חֲמַת גָּ֑בֶר וְ/לֹֽא יַ֝חְמ֗וֹל בְּ/י֣וֹם נָקָֽם־־־׃
translation:
  text: For jealousy is a man's fury, and he will show no mercy on the day of vengeance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will not spare.' The Hebrew verb can mean 'show compassion,' 'have
      pity,' or 'spare.'
    reason: lexical_alternative
  - marker: b
    text: '''A man''s'' refers in context to the wronged husband.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding warning. 'For' fits English proverb
    style and preserves the explanatory force.
- source_word: קִנְאָה
  chosen: jealousy
  alternatives:
  - zeal
  - envy
  lexicon: HALOT
  rationale: In the context of an adulterous husband's reaction, the sense is marital
    jealousy rather than positive zeal or general envy.
- source_word: חֲמַת
  chosen: fury
  alternatives:
  - wrath
  - rage
  - heat
  lexicon: HALOT
  rationale: Conveys intense burning anger. 'Fury' is vivid, natural English and matches
    the emotional force of the Hebrew.
- source_word: גָּבֶר
  chosen: a man's
  alternatives:
  - a husband's
  - a strong man's
  lexicon: HALOT
  rationale: The noun literally means 'man' and is grammatically masculine. In context
    the referent is the wronged husband, but the Hebrew does not explicitly say 'husband,'
    so 'a man's' preserves the source wording while allowing the context to supply
    the specific referent.
- source_word: וְלֹא יַחְמֹל
  chosen: and he will show no mercy
  alternatives:
  - and he will not spare
  - and he will have no pity
  lexicon: HALOT
  rationale: The verb חמל commonly means to spare or have compassion. 'Show no mercy'
    is idiomatic and communicates the lack of pity in retaliatory judgment.
- source_word: בְּיוֹם
  chosen: on the day of
  alternatives:
  - in the day of
  - when
  lexicon: HALOT
  rationale: A straightforward temporal rendering that preserves the Hebrew construction.
- source_word: נָקָם
  chosen: vengeance
  alternatives:
  - revenge
  - avenging
  lexicon: HALOT
  rationale: '''Vengeance'' best matches the formal, judicial-retaliatory tone of
    the noun here. ''Revenge'' can sound more colloquial and less weighty.'
