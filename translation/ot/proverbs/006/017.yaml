id: PRO.6.17
reference: Proverbs 6:17
source:
  edition: WLC
  text: עֵינַ֣יִם רָ֭מוֹת לְשׁ֣וֹן שָׁ֑קֶר וְ֝/יָדַ֗יִם שֹׁפְכ֥וֹת דָּם נָקִֽי־׃
translation:
  text: haughty eyes, a lying tongue, and hands that shed innocent blood,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: עֵינַיִם
  chosen: eyes
  alternatives:
  - look
  lexicon: HALOT
  rationale: Literal body-part term; in this list of hated things it stands metonymically
    for a proud look, but retaining 'eyes' preserves the Hebrew imagery and parallelism.
- source_word: רָמוֹת
  chosen: haughty
  alternatives:
  - lofty
  - proud
  - raised
  lexicon: HALOT
  rationale: From the root 'to be high/exalted.' Here it describes arrogant elevation,
    not physical height. 'Haughty' captures the moral sense idiomatically in English
    while fitting the poetic list.
- source_word: לְשׁוֹן
  chosen: tongue
  alternatives:
  - speech
  lexicon: HALOT
  rationale: Literal 'tongue' is retained because Hebrew commonly uses the body part
    for speech, and the proverb's style lists body parts as instruments of evil.
- source_word: שָׁקֶר
  chosen: lying
  alternatives:
  - falsehood
  - deceitful
  lexicon: HALOT
  rationale: Used attributively with 'tongue.' 'Lying tongue' is natural English and
    conveys active false speech better here than the more abstract 'tongue of falsehood.'
- source_word: יָדַיִם
  chosen: hands
  lexicon: HALOT
  rationale: Literal plural retained, matching the body-part sequence and the metonymy
    for violent action.
- source_word: שֹׁפְכוֹת
  chosen: that shed
  alternatives:
  - shedding
  - pour out
  lexicon: HALOT
  rationale: Participial form describing characteristic action. Relative-clause English
    ('that shed') reads naturally while preserving the ongoing/characterizing sense.
- source_word: דָּם
  chosen: blood
  lexicon: HALOT
  rationale: Standard literal rendering; in context it refers to bloodshed, i.e.,
    killing or violence.
- source_word: נָקִי
  chosen: innocent
  alternatives:
  - blameless
  - guiltless
  lexicon: HALOT
  rationale: Describes the victim as free from guilt in the matter. 'Innocent blood'
    is the established and accurate English collocation for this Hebrew expression.
