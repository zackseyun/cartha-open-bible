id: PRO.6.27
reference: Proverbs 6:27
source:
  edition: WLC
  text: הֲ/יַחְתֶּ֤ה אִ֓ישׁ אֵ֬שׁ בְּ/חֵיק֑/וֹ וּ֝/בְגָדָ֗י/ו לֹ֣א תִשָּׂרַֽפְנָה׃
translation:
  text: Can a man carry fire in his bosom and his clothes not be burned?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in his lap' or 'against his chest'; the Hebrew refers to the area of
      the bosom/lap, likely including the fold of the garment where something could
      be held close.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחְתֶּה
  chosen: carry
  alternatives:
  - scoop up
  - take
  - heap up
  lexicon: HALOT
  rationale: The verb from חתה can denote taking up or raking/coaling up fire. In
    this proverb the sense is not merely touching fire but taking it up so as to hold
    it close. 'Carry' communicates the practical image in natural English while preserving
    the implied danger.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and functions generically
    in a wisdom saying. Per the translation philosophy, a gender-accurate rendering
    is preferred, so 'a man' is retained rather than neutralizing to 'someone'.
- source_word: אֵשׁ
  chosen: fire
  lexicon: HALOT
  rationale: Straightforward lexical equivalent.
- source_word: בְּחֵיקוֹ
  chosen: in his bosom
  alternatives:
  - in his lap
  - against his chest
  - in the fold of his garment
  lexicon: HALOT
  rationale: חֵיק refers to the bosom/lap, the area of the chest where something may
    be held close, often within the fold of a garment. 'In his bosom' preserves the
    idiomatic force and the intimacy/proximity of the image better than the flatter
    'lap.'
- source_word: וּבְגָדָיו
  chosen: and his clothes
  alternatives:
  - and his garments
  lexicon: HALOT
  rationale: '''Clothes'' is the natural modern English equivalent of בְּגָדִים. ''Garments''
    is possible but sounds more formal without adding meaning.'
- source_word: לֹא תִשָּׂרַפְנָה
  chosen: not be burned
  alternatives:
  - not be scorched
  - not burn
  lexicon: HALOT
  rationale: 'The Niphal imperfect of שׂרף is passive/reflexive in sense here: the
    clothes would undergo burning. ''Not be burned'' matches the Hebrew voice and
    the rhetorical expectation.'
