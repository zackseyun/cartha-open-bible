id: PRO.6.5
reference: Proverbs 6:5
source:
  edition: WLC
  text: הִ֭נָּצֵל כִּ/צְבִ֣י מִ/יָּ֑ד וּ֝/כְ/צִפּ֗וֹר מִ/יַּ֥ד יָקֽוּשׁ׃פ
translation:
  text: Rescue yourself like a gazelle from the hand, and like a bird from the hand
    of the fowler.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Deliver yourself' or 'Escape.' The Hebrew imperative carries the sense
      of urgently getting free.
    reason: lexical_alternative
  - marker: b
    text: '''Gazelle'' may also be rendered ''deer'' or traditionally ''roe.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'from the hand of the trapper.' The Hebrew names the person who sets
      snares.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנָּצֵל
  chosen: Rescue yourself
  alternatives:
  - Deliver yourself
  - Save yourself
  - Escape
  lexicon: HALOT
  rationale: 'Niphal imperative 2ms of נצל, here functioning reflexively/exhortatively:
    the addressee is urged to get free. ''Rescue yourself'' preserves the imperative
    force and the self-directed sense better than the less vivid ''escape,'' while
    remaining natural English.'
- source_word: כִּצְבִי
  chosen: like a gazelle
  alternatives:
  - like a deer
  - like a roe
  lexicon: HALOT
  rationale: 'צְבִי commonly denotes a gazelle rather than the broader ''deer.'' ''Gazelle''
    is more zoologically precise and fits modern readable English. The prefixed כ
    marks comparison: ''like a gazelle.'''
- source_word: מִיָּד
  chosen: from the hand
  alternatives:
  - from the grasp
  - from the power
  lexicon: HALOT
  rationale: יָד literally means 'hand' and often idiomatically indicates power or
    control. Here the concrete hunting imagery favors retaining the literal 'hand,'
    preserving the metaphor and Hebrew texture.
- source_word: וּכְצִפּוֹר
  chosen: and like a bird
  alternatives:
  - and like a sparrow
  - and like a small bird
  lexicon: HALOT
  rationale: צִפּוֹר is a general term for a bird, often a small bird, but not specific
    enough to require 'sparrow.' 'Bird' keeps the image broad and idiomatic.
- source_word: מִיַּד יָקוּשׁ
  chosen: from the hand of the fowler
  alternatives:
  - from the hand of the trapper
  - from the snare
  lexicon: HALOT
  rationale: יָקוּשׁ denotes one who lays snares/traps, hence 'fowler' or 'trapper.'
    Because the parallel image is of a bird, 'fowler' is the most contextually fitting
    English term. Retaining 'from the hand of' mirrors the Hebrew parallelism; 'from
    the snare' would shift from agent to instrument and lose lexical detail.
