id: PRO.6.35
reference: Proverbs 6:35
source:
  edition: WLC
  text: לֹא יִ֭שָּׂא פְּנֵ֣י כָל כֹּ֑פֶר וְ/לֹֽא יֹ֝אבֶ֗ה כִּ֣י תַרְבֶּה שֹֽׁחַד־־־־׃פ
translation:
  text: He will accept no ransom, and he will not be satisfied though you multiply
    bribes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'he will not lift up the face of any ransom,' an idiom meaning
      he will show no favor by accepting payment.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will not consent,' that is, he will refuse to be appeased even if
      you offer many bribes.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשָּׂא פְּנֵי
  chosen: will accept
  alternatives:
  - will lift up the face of
  - will show favor to
  lexicon: HALOT
  rationale: The idiom literally means 'lift up the face of' and in context conveys
    showing favor or accepting a plea/payment. With כֹּפֶר as the object, 'accept'
    best captures the sense in natural English without over-paraphrasing.
- source_word: כָל כֹּפֶר
  chosen: no ransom
  alternatives:
  - no compensation
  - no appeasement payment
  lexicon: HALOT
  rationale: כֹּפֶר denotes a compensatory payment or ransom intended to avert consequences.
    'Ransom' is concise and fits the context of refusing any payoff to appease an
    enraged husband.
- source_word: יֹאבֶה
  chosen: will be satisfied
  alternatives:
  - will consent
  - will be willing
  lexicon: HALOT
  rationale: The verb אבה commonly means 'be willing/consent,' but here with the following
    clause about multiplied bribes it idiomatically expresses refusal to be placated.
    'Will be satisfied' communicates the contextual force more clearly in English.
- source_word: כִּי תַרְבֶּה
  chosen: though you multiply
  alternatives:
  - even if you increase
  - when you make many
  lexicon: HALOT
  rationale: כִּי here has concessive force in context, introducing a circumstance
    that still does not change the outcome. 'Though you multiply' preserves the second-person
    singular address and the sense of repeated increase.
- source_word: שֹׁחַד
  chosen: bribes
  alternatives:
  - gifts
  - payoff
  lexicon: HALOT
  rationale: שֹׁחַד commonly refers to a bribe. In this context it is not a neutral
    gift but an attempted payoff to avert vengeance, so 'bribes' is the most accurate
    rendering.
