id: PRO.6.13
reference: Proverbs 6:13
source:
  edition: WLC
  text: קֹרֵ֣ץ בְּ֭/עֵינָ/ו מֹלֵ֣ל בְּ/רַגְלָ֑/ו מֹ֝רֶ֗ה בְּ/אֶצְבְּעֹתָֽי/ו׃
translation:
  text: winking with his eyes, signaling with his feet, pointing with his fingers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shuffling/scraping with his foot' or more generally 'making signs with
      his feet'; the Hebrew verb מֹלֵל is rare, and the exact gesture is uncertain,
      though the context clearly suggests covert bodily signaling.
    reason: lexical_alternative
  - marker: b
    text: Or 'teaching/directing with his fingers.' Here 'pointing' is chosen because
      the verse lists physical gestures rather than verbal instruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: קֹרֵץ
  chosen: winking
  alternatives:
  - squinting
  - blinking
  - making signs
  lexicon: HALOT
  rationale: The participle denotes a furtive gesture made with the eyes, commonly
    a wink used to signal covert intent. 'Winking' is the most natural modern English
    equivalent and fits the vice-list context.
- source_word: בְּעֵינָיו
  chosen: with his eyes
  alternatives:
  - with his eye
  lexicon: HALOT
  rationale: The Hebrew uses the plural noun with 3ms suffix. English idiom prefers
    'with his eyes' in this gestural context.
- source_word: מֹלֵל
  chosen: signaling
  alternatives:
  - speaking
  - shuffling
  - scraping
  - making signs
  lexicon: HALOT
  rationale: This rare participle is contextually parallel to the surrounding bodily
    gestures and most likely refers to making a signal with the feet rather than literal
    speech. 'Signaling' captures the covert communicative force without over-specifying
    the exact motion.
- source_word: בְּרַגְלוֹ
  chosen: with his feet
  alternatives:
  - with his foot
  lexicon: HALOT
  rationale: Although morphologically singular with suffix, English may idiomatically
    use the plural for bodily movement in a generalized description. Here the phrase
    describes habitual gesturing, and 'with his feet' reads naturally in coordination
    with 'eyes' and 'fingers'.
- source_word: מֹרֶה
  chosen: pointing
  alternatives:
  - teaching
  - directing
  - making signs
  lexicon: HALOT
  rationale: From a verb that can mean 'to point out/direct' or 'teach,' the immediate
    context of bodily signals favors a physical gestural sense. 'Pointing' best matches
    the collocation with fingers.
- source_word: בְּאֶצְבְּעֹתָיו
  chosen: with his fingers
  alternatives:
  - with his finger
  lexicon: HALOT
  rationale: The plural noun with suffix straightforwardly refers to fingers used
    for signaling. 'With his fingers' preserves the instrumental sense.
