theological_decisions:
- issue: Personification of wisdom/commandment as feminine subject
  chosen_reading: Render the feminine antecedent with English 'it' rather than 'she'
    in the main text
  alternative_readings:
  - Render as 'she' to preserve the feminine personification more explicitly
  rationale: The immediate Hebrew uses a feminine pronoun because the antecedent in
    context is feminine ('commandment'/'teaching'). English commonly uses 'it' for
    such abstract referents, and this avoids over-personifying the instruction while
    retaining the verse's meaning. The alternative is worth preserving because Proverbs
    often personifies wisdom as a woman.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §5 (documented
    exception/consistency)
