id: PRO.6.22
reference: Proverbs 6:22
source:
  edition: WLC
  text: בְּ/הִתְהַלֶּכְ/ךָ֨ תַּנְחֶ֬ה אֹתָ֗/ךְ בְּֽ֭/שָׁכְבְּ/ךָ תִּשְׁמֹ֣ר עָלֶ֑י/ךָ
    וַ֝/הֲקִיצ֗וֹתָ הִ֣יא תְשִׂיחֶֽ/ךָ׀׃
translation:
  text: When you walk, it will guide you; when you lie down, it will watch over you;
    and when you awake, it will speak with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'she will speak with you.' The Hebrew has a feminine pronoun, referring
      to the commandment/teaching in the immediate context and echoing Proverbs' broader
      personification of wisdom.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּהִתְהַלֶּכְךָ
  chosen: when you walk
  alternatives:
  - as you walk
  - in your going about
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of הלך with 2ms suffix gives
    a temporal sense, naturally rendered 'when you walk.' The hitpael form can suggest
    going about or conducting oneself, but here the parallel with lying down and awaking
    favors the ordinary temporal/lifestyle sense.
- source_word: תַּנְחֶה
  chosen: it will guide
  alternatives:
  - it will lead
  - it will direct
  lexicon: HALOT
  rationale: From נחה in the Hiphil, meaning to lead or guide. 'Guide' fits idiomatic
    English and the wisdom context of parental instruction/Torah-like teaching directing
    one's path.
- source_word: אֹתָךְ
  chosen: you
  lexicon: HALOT
  rationale: Direct-object marker with 2ms suffix; rendered simply as the English
    object 'you.'
- source_word: בְּשָׁכְבְּךָ
  chosen: when you lie down
  alternatives:
  - when you sleep
  - at your lying down
  lexicon: HALOT
  rationale: Temporal ב plus infinitive construct of שכב. 'Lie down' is more precise
    than 'sleep,' since the Hebrew refers to the act of reclining/resting, matching
    the triad of daily activities.
- source_word: תִּשְׁמֹר עָלֶיךָ
  chosen: it will watch over you
  alternatives:
  - it will keep you
  - it will guard you
  lexicon: HALOT
  rationale: שׁמר with על commonly conveys guarding or watching over someone. 'Watch
    over' is natural modern English and preserves the protective nuance.
- source_word: וַהֲקִיצוֹתָ
  chosen: when you awake
  alternatives:
  - when you wake up
  - and when you awaken
  lexicon: HALOT
  rationale: From קיץ/יקץ, 'to awake.' The prefixed conjunction plus form functions
    temporally in sequence with the prior clauses. 'Awake' keeps a slightly elevated
    but still readable style fitting Proverbs.
- source_word: הִיא
  chosen: it
  alternatives:
  - she
  lexicon: HALOT
  rationale: The feminine singular pronoun refers back to the feminine antecedent
    of the surrounding context (the commandment/teaching). English can render such
    an abstract antecedent as 'it' more naturally, while preserving the referential
    sense without personifying beyond what English idiom requires.
- source_word: תְשִׂיחֶךָ
  chosen: it will speak with you
  alternatives:
  - it will talk with you
  - it will meditate with you
  - it will instruct you
  lexicon: HALOT
  rationale: From שׂיח, which can mean speak, muse, meditate, or converse. In this
    context with a feminine subject and second masculine singular object, the sense
    is interactive guidance. 'Speak with you' preserves the conversational nuance
    better than the more one-directional 'instruct you.'
