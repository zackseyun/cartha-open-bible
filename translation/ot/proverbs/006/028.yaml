id: PRO.6.28
reference: Proverbs 6:28
source:
  edition: WLC
  text: אִם יְהַלֵּ֣ךְ אִ֭ישׁ עַל הַ/גֶּחָלִ֑ים וְ֝/רַגְלָ֗י/ו לֹ֣א תִכָּוֶֽינָה־־׃
translation:
  text: Can a man walk on coals and his feet not be scorched?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If a man walks on coals, will his feet not be burned?' The Hebrew opens with אִם ('if'), but here it introduces a rhetorical question in parallel with the previous verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: Can
  alternatives:
  - If
  lexicon: HALOT
  rationale: Although אִם commonly means 'if,' in this rhetorical question sequence in Proverbs 6:27–28 it functions idiomatically to introduce a hypothetical question. Rendering it as 'Can' brings out the rhetorical force in natural English while preserving the sense.
- source_word: יְהַלֵּךְ
  chosen: walk
  alternatives:
  - go
  - step about
  lexicon: HALOT
  rationale: הלך in the piel/imperfect here denotes walking or moving about. 'Walk' is the most natural and contextually fitting English equivalent in this proverb.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and in wisdom literature often represents a generic individual. Per the translation philosophy's gender-accurate principle, 'a man' is retained rather than neutralizing to 'someone' or 'a person'.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: The preposition straightforwardly indicates contact with the surface of the coals; 'on' is the clearest modern English rendering.
- source_word: הַגֶּחָלִים
  chosen: coals
  alternatives:
  - burning coals
  - charcoal embers
  lexicon: HALOT
  rationale: גחלים refers to glowing coals/embers. 'Coals' is concise and idiomatic; the burning sense is already implied by the context and the result clause.
- source_word: וְרַגְלָיו
  chosen: and his feet
  alternatives:
  - and his foot
  lexicon: HALOT
  rationale: The noun is plural with 3ms suffix, literally 'and his feet.' The plural matches the Hebrew and suits the image of walking.
- source_word: לֹא
  chosen: not
  alternatives:
  - never
  lexicon: HALOT
  rationale: Simple negation in the rhetorical question; 'not' preserves the direct force.
- source_word: תִכָּוֶינָה
  chosen: be scorched
  alternatives:
  - be burned
  - be singed
  lexicon: HALOT
  rationale: From כוה in the Niphal, the sense is 'be burned/scorched.' 'Be scorched' fits the immediate image of feet contacting hot coals and avoids overstating the severity beyond the Hebrew.
