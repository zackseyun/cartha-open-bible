id: PRO.6.18
reference: Proverbs 6:18
source:
  edition: WLC
  text: לֵ֗ב חֹ֭רֵשׁ מַחְשְׁב֣וֹת אָ֑וֶן רַגְלַ֥יִם מְ֝מַהֲר֗וֹת לָ/ר֥וּץ לָֽ/רָעָה׃
translation:
  text: a heart that devises wicked plans, feet that hurry to run to evil,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a heart that plots evil schemes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  lexicon: HALOT
  rationale: Hebrew לֵב commonly denotes the inner person, including thought and intention.
    'Heart' preserves the Hebrew anthropological image and fits the vice-list context
    better than reducing it to 'mind' alone.
- source_word: חֹרֵשׁ
  chosen: devises
  alternatives:
  - plots
  - plows
  - engraves
  lexicon: HALOT
  rationale: From חרשׁ in this figurative sense, the verb means to devise or plot.
    'Devises' is natural English and matches the object 'plans'; 'plots' is possible
    but slightly more interpretive in tone.
- source_word: מַחְשְׁבוֹת
  chosen: plans
  alternatives:
  - thoughts
  - schemes
  lexicon: HALOT
  rationale: The noun refers to thoughts, devices, or plans. 'Plans' best captures
    intentional mental formation in idiomatic English; 'schemes' is possible but somewhat
    stronger and more interpretive.
- source_word: אָוֶן
  chosen: wicked
  alternatives:
  - evil
  - iniquity
  - trouble
  lexicon: HALOT
  rationale: אָוֶן can denote wickedness, iniquity, or trouble/mischief. Here it qualifies
    the plans as morally corrupt. 'Wicked' avoids repeating 'evil' immediately before
    the second colon while preserving the moral sense.
- source_word: רַגְלַיִם
  chosen: feet
  lexicon: HALOT
  rationale: Literal body-part imagery should be preserved; the proverb personifies
    bodily members as instruments of evil.
- source_word: מְמַהֲרוֹת
  chosen: hurry
  alternatives:
  - make haste
  - are quick
  lexicon: HALOT
  rationale: The participle expresses eagerness or haste. 'Hurry' is concise, natural
    English and preserves the active sense.
- source_word: לָרוּץ
  chosen: to run
  lexicon: HALOT
  rationale: The infinitive is straightforward and should be rendered literally; it
    intensifies the image of eager movement toward wrongdoing.
- source_word: לָרָעָה
  chosen: to evil
  alternatives:
  - into evil
  - to do evil
  lexicon: HALOT
  rationale: The Hebrew preposition plus noun is most directly 'to evil.' In English,
    'to run to evil' is slightly formal but clear and preserves the compactness of
    the Hebrew. 'To do evil' would add an explicit verbal idea not present in the
    text.
