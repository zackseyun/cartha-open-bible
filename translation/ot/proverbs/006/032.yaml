id: PRO.6.32
reference: Proverbs 6:32
source:
  edition: WLC
  text: נֹאֵ֣ף אִשָּׁ֣ה חֲסַר לֵ֑ב מַֽשְׁחִ֥ית נַ֝פְשׁ֗/וֹ ה֣וּא יַעֲשֶֽׂ/נָּה־׃
translation:
  text: He who commits adultery with a woman lacks sense; he who does it destroys
    himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He who commits adultery with a wife lacks understanding; whoever does
      it ruins his life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹאֵף
  chosen: commits adultery
  alternatives:
  - is an adulterer
  - adulterates
  lexicon: HALOT
  rationale: The participle denotes one engaged in adultery. In English, the verbal
    expression 'commits adultery' is more natural and clearly conveys the action in
    this proverb.
- source_word: אִשָּׁה
  chosen: with a woman
  alternatives:
  - with a wife
  lexicon: HALOT
  rationale: אִשָּׁה can mean 'woman' or 'wife.' Here the construction with נֹאֵף
    idiomatically means committing adultery with a woman; 'with a woman' is the broader
    and more natural rendering in English, while the adulterous sense is already carried
    by the verb.
- source_word: חֲסַר לֵב
  chosen: lacks sense
  alternatives:
  - is lacking heart
  - lacks understanding
  - is senseless
  lexicon: HALOT
  rationale: Literally 'lacking heart.' In Proverbs this idiom refers to deficient
    judgment or understanding rather than emotion. 'Lacks sense' gives clear modern
    English while preserving the wisdom-context meaning.
- source_word: מַשְׁחִית
  chosen: destroys
  alternatives:
  - ruins
  - corrupts
  lexicon: HALOT
  rationale: The Hiphil participle conveys causing destruction or ruin. 'Destroys'
    best matches the severity and terseness of the proverb.
- source_word: נַפְשׁוֹ
  chosen: himself
  alternatives:
  - his soul
  - his life
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the person's own life/self rather than an abstract
    immaterial soul. 'Himself' is idiomatic in English and fits the reflexive force
    of the clause.
- source_word: הוּא יַעֲשֶׂנָּה
  chosen: he who does it
  alternatives:
  - whoever does it
  - he does it
  lexicon: HALOT
  rationale: The pronoun plus verb with feminine suffix refers back to the adulterous
    act. 'He who does it' preserves the emphatic subject and the generic masculine
    form in line with the gender-accurate policy.
