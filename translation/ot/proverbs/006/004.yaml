id: PRO.6.4
reference: Proverbs 6:4
source:
  edition: WLC
  text: אַל תִּתֵּ֣ן שֵׁנָ֣ה לְ/עֵינֶ֑י/ךָ וּ֝/תְנוּמָ֗ה לְ/עַפְעַפֶּֽי/ךָ־׃
translation:
  text: Do not give sleep to your eyes, nor slumber to your eyelids.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'drowsiness' for 'slumber.' The Hebrew term suggests light sleep or nodding
      off.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: HALOT
  rationale: אַל with the imperfect forms a negative prohibition. 'Do not' is the
    natural English imperative equivalent without adding emphasis not explicit in
    the Hebrew.
- source_word: תִּתֵּן
  chosen: give
  alternatives:
  - allow
  - grant
  lexicon: HALOT
  rationale: From נתן, literally 'give.' Retaining 'give' preserves the concrete Hebrew
    idiom ('give sleep to your eyes') while remaining intelligible in English.
- source_word: שֵׁנָה
  chosen: sleep
  lexicon: HALOT
  rationale: The standard sense is 'sleep.' No contextual reason suggests a figurative
    rendering.
- source_word: לְעֵינֶיךָ
  chosen: to your eyes
  alternatives:
  - for your eyes
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object in the idiom. 'To your eyes'
    best mirrors the Hebrew construction and reads naturally enough in English.
- source_word: וּתְנוּמָה
  chosen: nor slumber
  alternatives:
  - and drowsiness
  - or sleep
  lexicon: HALOT
  rationale: תְּנוּמָה denotes slumber or drowsing. 'Slumber' preserves the poetic
    parallel with 'sleep' while distinguishing the second term from the first.
- source_word: לְעַפְעַפֶּיךָ
  chosen: to your eyelids
  alternatives:
  - to your blinking eyes
  lexicon: HALOT
  rationale: עַפְעַף refers to the eyelids. 'Eyelids' is the direct and idiomatic
    English equivalent, preserving the poetic body-part parallelism.
