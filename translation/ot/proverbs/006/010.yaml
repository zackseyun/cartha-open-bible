id: PRO.6.10
reference: Proverbs 6:10
source:
  edition: WLC
  text: מְעַ֣ט שֵׁ֭נוֹת מְעַ֣ט תְּנוּמ֑וֹת מְעַ֓ט חִבֻּ֖ק יָדַ֣יִם לִ/שְׁכָּֽב׀׃
translation:
  text: A little sleep[a], a little slumber, a little folding of the hands to lie down—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'a little sleep, a little slumber, a little folding of the hands to lie down.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְעַט
  chosen: a little
  alternatives:
  - a bit
  - a little while
  lexicon: HALOT
  rationale: Repeated three times for rhetorical effect; 'a little' preserves the concise, proverbial cadence better than looser alternatives.
- source_word: שֵׁנוֹת
  chosen: sleep
  alternatives:
  - sleeps
  lexicon: HALOT
  rationale: Though formally plural, the English mass noun 'sleep' is the natural equivalent and preserves the sense without awkwardness.
- source_word: תְּנוּמוֹת
  chosen: slumber
  alternatives:
  - dozing
  - drowsing
  lexicon: HALOT
  rationale: '''Slumber'' preserves the poetic parallelism with ''sleep'' and reflects a lighter or more momentary sleep state in elevated but still readable English.'
- source_word: חִבֻּק יָדַיִם
  chosen: folding of the hands
  alternatives:
  - embracing the hands
  - folding the arms
  lexicon: HALOT
  rationale: Literally 'embrace of hands.' In context this idiom refers to clasping/folding the hands in idleness or rest. 'Folding of the hands' is idiomatic English and matches the proverb's imagery.
- source_word: לִשְׁכָּב
  chosen: to lie down
  alternatives:
  - to rest
  - to sleep
  lexicon: HALOT
  rationale: The infinitive means 'to lie down.' This is more precise than 'to sleep' and avoids collapsing it into the earlier sleep vocabulary; it likely expresses the purpose/result of the folded-hands posture.
