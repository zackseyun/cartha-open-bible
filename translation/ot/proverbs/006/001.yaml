id: PRO.6.1
reference: Proverbs 6:1
source:
  edition: WLC
  text: בְּ֭נִ/י אִם עָרַ֣בְתָּ לְ/רֵעֶ֑/ךָ תָּקַ֖עְתָּ לַ/זָּ֣ר כַּפֶּֽי/ךָ־׃
translation:
  text: My son, if you have gone surety for your neighbor, if you have struck your
    hands in pledge to a stranger,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if you have become a guarantor for your friend.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'if you have struck your hands to a stranger'; that is, sealed
      a pledge by a handclasp.
    reason: cultural_note
lexical_decisions:
- source_word: בְּנִי
  chosen: My son
  alternatives:
  - Son of mine
  lexicon: HALOT
  rationale: Vocative address from a father/teacher to a male son in Proverbs. 'My
    son' is the natural modern English equivalent and preserves the masculine singular
    form.
- source_word: אִם
  chosen: if
  alternatives:
  - when
  lexicon: HALOT
  rationale: Introduces a conditional clause. 'If' best reflects the Hebrew conditional
    here.
- source_word: עָרַבְתָּ
  chosen: have gone surety
  alternatives:
  - have become a guarantor
  - have pledged yourself
  - have put up security
  lexicon: HALOT
  rationale: The verb ערב in this stem refers to becoming security for another's debt
    or obligation. 'Have gone surety' is somewhat traditional but still understandable
    and preserves the legal-financial nuance more precisely than a vague 'promised.'
- source_word: לְרֵעֶךָ
  chosen: for your neighbor
  alternatives:
  - for your friend
  - for your companion
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, or neighbor. 'Neighbor' preserves the
    broader relational sense without implying close friendship only; in wisdom literature
    it often denotes an associate or fellow person.
- source_word: תָּקַעְתָּ
  chosen: have struck
  alternatives:
  - have clasped
  - have given
  lexicon: HALOT
  rationale: תקע with hand imagery refers to striking/clasping hands as a gesture
    sealing a pledge. 'Have struck' keeps the concrete idiom, which is then clarified
    by the following phrase.
- source_word: לַזָּר
  chosen: to a stranger
  alternatives:
  - for a stranger
  - with a stranger
  - to an outsider
  lexicon: HALOT
  rationale: זָר denotes a stranger/outsider. With the preceding idiom, the sense
    is entering a pledge arrangement involving an outsider. 'To a stranger' follows
    the Hebrew preposition closely, while the footnote preserves the idiomatic alternative
    'with a stranger.'
- source_word: כַּפֶּיךָ
  chosen: your hands in pledge
  alternatives:
  - your hand
  - your palms
  lexicon: HALOT
  rationale: Dual/plural form 'your palms/hands.' In English the idiom needs slight
    expansion to communicate the legal gesture. 'In pledge' makes explicit what the
    hand-striking signifies without over-paraphrasing.
