id: PRO.6.26
reference: Proverbs 6:26
source:
  edition: WLC
  text: כִּ֤י בְעַד אִשָּׁ֥ה זוֹנָ֗ה עַֽד כִּכַּ֫ר לָ֥חֶם וְ/אֵ֥שֶׁת אִ֑ישׁ נֶ֖פֶשׁ
    יְקָרָ֣ה תָצֽוּד־־׃פ
translation:
  text: For because of a prostitute one is reduced to a loaf of bread, but a married
    woman hunts a precious life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'For on account of a prostitute, unto a loaf of bread;
      and a married woman hunts a precious soul/life.' The Hebrew is compressed, and
      many understand the first line to mean that a man is reduced to poverty.
    reason: lexical_alternative
  - marker: b
    text: '''A married woman'' is literally ''the wife of a man''; in context it refers
      to an adulterous liaison with another man''s wife.'
    reason: lexical_alternative
  - marker: c
    text: Or 'a precious soul.' The Hebrew word can mean 'soul,' 'self,' or 'life';
      here 'life' best fits the warning context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For because
  alternatives:
  - For
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the explanatory ground for the warning. The verse is elliptical
    and compressed; 'For because' reflects the causal force while smoothing the English
    connection to the preceding admonition.
- source_word: בְעַד
  chosen: because of
  alternatives:
  - for
  - at the price of
  - on account of
  lexicon: HALOT
  rationale: Here the preposition marks cause or consequence. 'Because of' best fits
    the sense that involvement with the prostitute leads to the stated result.
- source_word: אִשָּׁה זוֹנָה
  chosen: a prostitute
  alternatives:
  - a harlot
  - a promiscuous woman
  lexicon: HALOT
  rationale: זוֹנָה denotes a prostitute/fornicating woman. 'Prostitute' is the clearest
    modern English rendering and avoids archaic 'harlot'.
- source_word: עַד
  chosen: is reduced to
  alternatives:
  - to
  - as far as
  - for
  lexicon: HALOT
  rationale: The phrase עַד כִּכַּר לָחֶם is idiomatic and elliptical. Rather than
    a wooden 'unto a loaf of bread,' the English expresses the resulting impoverishment
    implied by the construction.
- source_word: כִּכַּר לָחֶם
  chosen: a loaf of bread
  alternatives:
  - a round loaf of bread
  - a mere loaf of bread
  - a piece of bread
  lexicon: HALOT
  rationale: Literally 'a round loaf of bread.' 'A loaf of bread' is natural English
    and preserves the image of being brought to poverty or reduced to basic sustenance.
- source_word: וְאֵשֶׁת אִישׁ
  chosen: but a married woman
  alternatives:
  - and a man's wife
  - and another man's wife
  - but an adulteress
  lexicon: HALOT
  rationale: Literally 'and the wife of a man.' In context this refers to a married
    woman, specifically one involved in adultery. 'Married woman' is idiomatic and
    preserves the contrast with the prostitute without over-specifying beyond the
    Hebrew.
- source_word: נֶפֶשׁ יְקָרָה
  chosen: a precious life
  alternatives:
  - a precious soul
  - a valuable life
  - precious life itself
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean life, self, or soul; here 'life' best fits the warning
    about mortal danger and total personal ruin. 'Precious' renders יְקָרָה straightforwardly.
- source_word: תָצוּד
  chosen: hunts
  alternatives:
  - captures
  - traps
  - preys upon
  lexicon: HALOT
  rationale: The verb evokes hunting or trapping prey. 'Hunts' preserves the vivid
    predatory metaphor and fits the singular feminine subject.
