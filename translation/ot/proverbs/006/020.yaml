id: PRO.6.20
reference: Proverbs 6:20
source:
  edition: WLC
  text: נְצֹ֣ר בְּ֭נִ/י מִצְוַ֣ת אָבִ֑י/ךָ וְ/אַל תִּ֝טֹּ֗שׁ תּוֹרַ֥ת אִמֶּֽ/ךָ־׃
translation:
  text: Keep, my son, your father's commandment, and do not forsake your mother's
    instruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Guard, my son, your father's command; and do not abandon your mother's
      teaching.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְצֹר
  chosen: Keep
  alternatives:
  - Guard
  - Observe
  lexicon: HALOT
  rationale: The imperative from נצר carries the sense of guarding/keeping carefully.
    'Keep' is idiomatic in English for retaining and obeying a parental command, while
    still preserving the protective nuance better than a looser rendering like 'follow'.
- source_word: בְּנִי
  chosen: my son
  alternatives:
  - my child
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular with a 1cs suffix. Per the
    gender-accurate principle, 'my son' preserves both the form and the fatherly instructional
    setting of Proverbs rather than neutralizing to 'my child'.
- source_word: מִצְוַת
  chosen: commandment
  alternatives:
  - command
  - instruction
  lexicon: HALOT
  rationale: מִצְוָה denotes a command or commandment. 'Commandment' preserves the
    weight and formal character of the parental charge; 'command' is possible but
    slightly less resonant in wisdom literature.
- source_word: אָבִיךָ
  chosen: your father's
  alternatives:
  - of your father
  lexicon: HALOT
  rationale: The construct phrase is naturally rendered possessively in English. 'Your
    father's commandment' is clear and idiomatic.
- source_word: תִּטֹּשׁ
  chosen: do not forsake
  alternatives:
  - do not abandon
  - do not neglect
  lexicon: HALOT
  rationale: נטש commonly means to leave, abandon, or forsake. 'Forsake' fits wisdom-register
    English and pairs well with 'keep,' preserving the covenantal and moral seriousness
    without sounding archaic in this context.
- source_word: תּוֹרַת
  chosen: instruction
  alternatives:
  - teaching
  - law
  lexicon: HALOT
  rationale: Though תּוֹרָה can mean 'law,' in this parental wisdom context it refers
    to formative teaching or instruction rather than codified legislation. 'Instruction'
    best captures the sense and reads naturally in parallel with 'commandment.'
- source_word: אִמֶּךָ
  chosen: your mother's
  alternatives:
  - of your mother
  lexicon: HALOT
  rationale: The possessive rendering is the most natural English expression of the
    construct phrase and preserves the parental parallelism.
