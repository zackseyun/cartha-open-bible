id: PRO.6.15
reference: Proverbs 6:15
source:
  edition: WLC
  text: עַל כֵּ֗ן פִּ֭תְאֹם יָב֣וֹא אֵיד֑/וֹ פֶּ֥תַע יִ֝שָּׁבֵ֗ר וְ/אֵ֣ין מַרְפֵּֽא־׃פ
translation:
  text: Therefore his disaster will come suddenly; in an instant he will be broken,
    and there will be no healing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his calamity will come' / 'his ruin will come.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with no remedy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: The phrase marks consequence from the preceding description of the wicked
    man. 'Therefore' is natural modern English and preserves the inferential force.
- source_word: פִּתְאֹם
  chosen: suddenly
  alternatives:
  - unexpectedly
  - all at once
  lexicon: HALOT
  rationale: An adverbial term meaning suddenness. 'Suddenly' is the most direct and
    idiomatic rendering.
- source_word: יָבֹוא אֵידוֹ
  chosen: his disaster will come
  alternatives:
  - his calamity will come
  - his ruin will come
  lexicon: HALOT
  rationale: אֵיד denotes calamity, disaster, or ruin. 'Disaster' is clear contemporary
    English and fits wisdom-language warning without overstating beyond the Hebrew.
- source_word: פֶּתַע
  chosen: in an instant
  alternatives:
  - suddenly
  - at once
  lexicon: HALOT
  rationale: This second suddenness term is near-synonymous with פִּתְאֹם but not
    identical in form. Rendering it 'in an instant' preserves the poetic intensification
    rather than flattening both terms into the same English word.
- source_word: יִשָּׁבֵר
  chosen: he will be broken
  alternatives:
  - he will be shattered
  - he will be crushed
  lexicon: HALOT
  rationale: Niphal of שׁבר commonly conveys being broken or shattered. 'Be broken'
    preserves the passive/resultative sense and leaves the image broad, whether of
    personal collapse or destruction.
- source_word: וְאֵין מַרְפֵּא
  chosen: and there will be no healing
  alternatives:
  - with no remedy
  - and there is no cure
  lexicon: HALOT
  rationale: מַרְפֵּא can denote healing, cure, or remedy. 'No healing' keeps the
    concrete metaphor of restoration while remaining idiomatic. 'Remedy' is possible,
    but 'healing' better matches the Hebrew noun's semantic field.
