id: PRO.6.7
reference: Proverbs 6:7
source:
  edition: WLC
  text: אֲשֶׁ֖ר אֵֽין לָ֥/הּ קָצִ֗ין שֹׁטֵ֥ר וּ/מֹשֵֽׁל־׃
translation:
  text: which has no chief, officer, or ruler,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which has no leader, official, or ruler.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: Introduces the relative clause describing the ant from the previous verse.
    'Which' fits smooth modern English for a non-personal antecedent.
- source_word: אֵין לָהּ
  chosen: has no
  alternatives:
  - there is not for her
  - there is no ... for her
  lexicon: HALOT
  rationale: 'The existential construction with ל plus pronominal suffix is most naturally
    rendered in English as possession: ''has no.'' This avoids wooden phrasing while
    preserving the sense.'
- source_word: קָצִין
  chosen: chief
  alternatives:
  - captain
  - leader
  - ruler
  lexicon: HALOT
  rationale: קָצִין denotes a leader or chief. 'Chief' works well here as the first
    term in a three-part sequence and avoids collapsing it into the later מֹשֵׁל ('ruler').
- source_word: שֹׁטֵר
  chosen: officer
  alternatives:
  - official
  - taskmaster
  - scribe
  lexicon: HALOT
  rationale: שֹׁטֵר commonly refers to an official or officer, often an administrative
    functionary. 'Officer' is the most natural concise rendering here and preserves
    distinction from both 'chief' and 'ruler'.
- source_word: וּמֹשֵׁל
  chosen: or ruler
  alternatives:
  - and ruler
  - governor
  - one who rules
  lexicon: HALOT
  rationale: מֹשֵׁל denotes one who rules or governs. 'Ruler' is the clearest English
    equivalent. The conjunction in this list is idiomatically rendered 'or' in English
    to express a series of possible authorities rather than requiring a cumulative
    'and'.
- source_word: לָהּ
  chosen: over her
  alternatives:
  - for her
  - to her
  lexicon: HALOT
  rationale: Although ל literally means 'to/for her,' English idiom with offices of
    authority is better expressed as 'over her.' This makes explicit the governing
    relationship implied by the list of authority terms and matches the sense in context.
