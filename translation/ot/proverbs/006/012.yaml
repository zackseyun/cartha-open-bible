id: PRO.6.12
reference: Proverbs 6:12
source:
  edition: WLC
  text: אָדָ֣ם בְּ֭לִיַּעַל אִ֣ישׁ אָ֑וֶן ה֝וֹלֵ֗ךְ עִקְּשׁ֥וּת פֶּֽה׃
translation:
  text: A worthless man, a man of iniquity, walks with a perverse mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with perverse speech' / 'with a crooked mouth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - person
  lexicon: HALOT
  rationale: Rendered 'man' per the doctrine's default for אָדָם when context is an
    individual male-type exemplar in wisdom literature rather than humanity in general.
    The parallel with אִישׁ reinforces the singular personal sense.
- source_word: בְּלִיַּעַל
  chosen: worthless
  alternatives:
  - base
  - vile
  - Belial
  lexicon: HALOT
  rationale: Here the term functions adjectivally in the expression 'a worthless man.'
    'Belial' would be too transliterative and could wrongly suggest the later personified
    proper name rather than the Hebrew sense of worthlessness/wickedness in this proverb.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  lexicon: HALOT
  rationale: Kept as 'man' to preserve the Hebrew parallelism with אָדָם and the gender-accurate
    representative force typical of Proverbs.
- source_word: אָוֶן
  chosen: wickedness
  alternatives:
  - trouble
  - iniquity
  - evil
  lexicon: HALOT
  rationale: In this context the word characterizes moral corruption, not merely mischief
    or calamity. 'Wickedness' best matches the ethical force in parallel with בְּלִיַּעַל.
- source_word: הוֹלֵךְ
  chosen: walks
  alternatives:
  - goes about
  - lives
  lexicon: HALOT
  rationale: Rendered literally as 'walks,' a common Hebrew idiom for conduct. This
    preserves the metaphor while remaining natural in English.
- source_word: עִקְּשׁוּת
  chosen: twisted
  alternatives:
  - perversity
  - crookedness
  lexicon: HALOT
  rationale: The noun denotes crookedness/perversity. 'Twisted' is idiomatic modern
    English and works naturally with 'mouth' while preserving the moral sense.
- source_word: פֶּה
  chosen: mouth
  alternatives:
  - speech
  lexicon: HALOT
  rationale: Translated literally as 'mouth.' Although the sense concerns speech,
    the Hebrew concrete expression is worth preserving.
