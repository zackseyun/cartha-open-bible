id: PRO.6.25
reference: Proverbs 6:25
source:
  edition: WLC
  text: אַל תַּחְמֹ֣ד יָ֭פְיָ/הּ בִּ/לְבָבֶ֑/ךָ וְ/אַל תִּ֝קָּֽחֲ/ךָ֗ בְּ/עַפְעַפֶּֽי/הָ־־׃
translation:
  text: Do not desire her beauty in your heart, and do not let yourself be captured
    by her eyelashes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not covet her beauty in your heart.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'do not let her take you with/by her eyelids'; the image is of
      seductive eye-appeal.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחְמֹד
  chosen: desire
  alternatives:
  - covet
  - lust after
  lexicon: HALOT
  rationale: חמד commonly denotes desiring or coveting. 'Desire' is broad enough to
    preserve the inner craving sense here without importing the specifically legal/decalogue
    resonance of 'covet' too strongly, while avoiding the narrower sexual explicitness
    of 'lust after' in the main text.
- source_word: יָפְיָהּ
  chosen: her beauty
  alternatives:
  - her attractiveness
  - her fair appearance
  lexicon: HALOT
  rationale: The noun יֹפִי refers to beauty or attractiveness. 'Her beauty' is the
    most direct and natural rendering.
- source_word: בִּלְבָבֶךָ
  chosen: in your heart
  alternatives:
  - within your heart
  lexicon: HALOT
  rationale: לֵבָב in wisdom literature commonly denotes the inner person, including
    desire and intention. 'In your heart' preserves the Hebrew anthropological idiom
    and the internal nature of the warning.
- source_word: תִּקָּחֲךָ
  chosen: let yourself be captured
  alternatives:
  - be taken by her
  - be seized by her
  - let her captivate you
  lexicon: HALOT
  rationale: לקח literally means 'take,' but in this construction the sense is being
    taken in, seized, or captured by seductive allure. 'Let yourself be captured'
    preserves the passive/resultative force while reading naturally in English and
    matching the warning against succumbing.
- source_word: בְּעַפְעַפֶּיהָ
  chosen: by her eyelashes
  alternatives:
  - with her eyelids
  - by her glances
  lexicon: HALOT
  rationale: עַפְעַף denotes eyelid/eyelash. Since English idiom more readily associates
    seduction with eyelashes than eyelids, 'by her eyelashes' best captures the concrete
    image without over-paraphrasing to 'glances.' The preposition is rendered instrumentally
    as 'by.'
