id: PRO.6.23
reference: Proverbs 6:23
source:
  edition: WLC
  text: כִּ֤י נֵ֣ר מִ֭צְוָה וְ/ת֣וֹרָה א֑וֹר וְ/דֶ֥רֶךְ חַ֝יִּ֗ים תּוֹכְח֥וֹת מוּסָֽר׃
translation:
  text: For the commandment is a lamp, and the instruction is light, and the reproofs
    of discipline are the way of life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'teaching' for 'instruction' (תּוֹרָה); in this wisdom context the term
      likely refers to authoritative teaching rather than specifically 'law.'
    reason: lexical_alternative
  - marker: b
    text: Or 'rebukes of discipline' or 'corrective rebukes'; the Hebrew phrase combines
      verbal correction (תּוֹכְחוֹת) with formative discipline (מוּסָר).
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the rationale for the preceding exhortation. 'For' fits the
    explanatory function in context and reads naturally in English wisdom style.
- source_word: נֵר
  chosen: lamp
  alternatives:
  - light
  lexicon: HALOT
  rationale: נֵר denotes a lamp rather than light in the abstract. Rendering it as
    'lamp' preserves the concrete metaphor, especially in parallel with אוֹר ('light').
- source_word: מִצְוָה
  chosen: commandment
  alternatives:
  - command
  - instruction
  lexicon: HALOT
  rationale: A standard wisdom term for an authoritative charge. 'Commandment' preserves
    the formal, binding sense and echoes the parental instruction context of the passage.
- source_word: תּוֹרָה
  chosen: instruction
  alternatives:
  - law
  - teaching
  lexicon: HALOT
  rationale: In Proverbs, תּוֹרָה commonly refers to teaching or instruction rather
    than specifically Mosaic law. 'Instruction' best reflects the wisdom/parental
    setting while retaining normative force.
- source_word: אוֹר
  chosen: light
  lexicon: HALOT
  rationale: The natural gloss in this metaphorical parallelism. It complements 'lamp'
    and preserves the imagery of guidance and illumination.
- source_word: דֶרֶךְ חַיִּים
  chosen: the way of life
  alternatives:
  - a path to life
  - the road of life
  lexicon: HALOT
  rationale: A common wisdom expression for the course that leads to and embodies
    life. 'The way of life' is idiomatic and preserves the construct relationship.
- source_word: תּוֹכְחוֹת
  chosen: reproofs
  alternatives:
  - rebukes
  - corrections
  lexicon: HALOT
  rationale: Plural noun indicating acts or words of correction. 'Reproofs' keeps
    the moral and verbal force of admonition in wisdom literature.
- source_word: מוּסָר
  chosen: discipline
  alternatives:
  - instruction
  - correction
  lexicon: HALOT
  rationale: מוּסָר in Proverbs often carries the sense of formative discipline or
    correction. 'Discipline' best captures the training dimension here, yielding 'reproofs
    of discipline' as corrective admonitions that train the learner.
