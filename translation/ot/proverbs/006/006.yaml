id: PRO.6.6
reference: Proverbs 6:6
source:
  edition: WLC
  text: לֵֽךְ אֶל נְמָלָ֥ה עָצֵ֑ל רְאֵ֖ה דְרָכֶ֣י/הָ וַ/חֲכָֽם־־׃
translation:
  text: Go to the ant, you sluggard; consider her ways and become wise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'see her ways and be wise.'
    reason: lexical_alternative
  - marker: b
    text: The ant is grammatically feminine in Hebrew, hence 'her ways'; English could
      also say 'its ways.'
    reason: cultural_note
lexical_decisions:
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Go on
  - Walk
  lexicon: HALOT
  rationale: Qal imperative 2ms of הלך, functioning as a direct exhortation. 'Go'
    is the natural imperative in English and preserves the force without expansion.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: Preposition marking direction toward the ant. 'To' is the most idiomatic
    English equivalent in this imperative construction.
- source_word: נְמָלָה
  chosen: the ant
  alternatives:
  - an ant
  lexicon: HALOT
  rationale: 'Refers to the ant as a class exemplar in wisdom instruction. English
    idiom favors the generic singular with article: ''the ant.'''
- source_word: עָצֵל
  chosen: you sluggard
  alternatives:
  - sluggard
  - lazy one
  - lazy man
  lexicon: HALOT
  rationale: Vocative address to a lazy person. 'You sluggard' preserves the direct
    rebuke and the masculine singular address without awkwardness. 'Lazy man' is possible
    but less idiomatic and slightly more interpretive.
- source_word: רְאֵה
  chosen: consider
  alternatives:
  - see
  - look at
  - observe
  lexicon: HALOT
  rationale: Though literally 'see,' in wisdom context the imperative calls for attentive
    observation leading to learning. 'Consider' captures the reflective force better
    than a merely visual 'see.'
- source_word: דְרָכֶיהָ
  chosen: her ways
  alternatives:
  - its ways
  - her path
  lexicon: HALOT
  rationale: Plural 'ways' is the standard rendering of דרכים in wisdom literature
    for patterns of conduct. The 3fs suffix agrees with the grammatically feminine
    noun 'ant'; English may use 'her' naturally for the singular animal in this literary
    context.
- source_word: וַחֲכָם
  chosen: and become wise
  alternatives:
  - and be wise
  - and get wisdom
  lexicon: HALOT
  rationale: Imperative from חכם in a result-oriented exhortation. 'Become wise' communicates
    the call to acquire wisdom through observation; 'be wise' is more literal but
    can sound stative rather than transformative in English.
