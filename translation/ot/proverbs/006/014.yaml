id: PRO.6.14
reference: Proverbs 6:14
source:
  edition: WLC
  text: תַּֽהְפֻּכ֨וֹת בְּ/לִבּ֗/וֹ חֹרֵ֣שׁ רָ֣ע בְּ/כָל עֵ֑ת מדנים יְשַׁלֵּֽחַ׀־׃
translation:
  text: Perversity is in his heart[a]; he devises evil at all times; he sends out strife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he stirs up strife.' The Hebrew literally says 'he sends out strife,' an idiom for causing or spreading conflict.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּהְפֻּכוֹת
  chosen: Perversity
  alternatives:
  - crookedness
  - deviousness
  - perverse things
  lexicon: HALOT
  rationale: The plural abstract noun denotes twisted or perverse dispositions/things. 'Perversity' captures the moral crookedness idiomatically in English while preserving the abstract sense better than a more concrete 'perverse things.'
- source_word: בְּלִבּוֹ
  chosen: is in his heart
  alternatives:
  - in his heart
  lexicon: HALOT
  rationale: The prepositional phrase functions predicatively with the opening noun in this verbless clause. Supplying 'is' is required for natural English and preserves the Hebrew sense of inward disposition.
- source_word: חֹרֵשׁ רָע
  chosen: he devises evil
  alternatives:
  - he plots evil
  - he plows evil
  lexicon: HALOT
  rationale: חֹרֵשׁ literally refers to plowing/engraving, but in wisdom literature it idiomatically means devising or plotting. 'Devises evil' is clear modern English and reflects the intentional, scheming nuance.
- source_word: בְּכָל עֵת
  chosen: at all times
  alternatives:
  - continually
  - at every time
  lexicon: HALOT
  rationale: This phrase expresses ongoing habitual action. 'At all times' is a close and natural rendering.
- source_word: מְדָנִים
  chosen: strife
  alternatives:
  - contentions
  - discord
  - quarrels
  lexicon: HALOT
  rationale: The plural noun refers to conflicts or contentions. 'Strife' is concise and idiomatic in English, conveying the collective sense of repeated conflict.
- source_word: יְשַׁלֵּחַ
  chosen: he sends out
  alternatives:
  - he sends forth
  - he stirs up
  - he lets loose
  lexicon: HALOT
  rationale: The Piel of שלח here has the sense of sending forth or spreading. 'Sends out' stays close to the Hebrew while fitting the object 'strife.' More interpretive options like 'stirs up' capture effect but move farther from the lexical form.
