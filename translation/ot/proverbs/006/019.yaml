id: PRO.6.19
reference: Proverbs 6:19
source:
  edition: WLC
  text: יָפִ֣יחַ כְּ֭זָבִים עֵ֣ד שָׁ֑קֶר וּ/מְשַׁלֵּ֥חַ מְ֝דָנִ֗ים בֵּ֣ין אַחִֽים׃פ
translation:
  text: a false witness who breathes out lies[b][a], and one who sends out strife among brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a lying witness who utters falsehoods.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'between brothers'; this can refer literally to brothers or more broadly to close members of a community.
    reason: cultural_note
lexical_decisions:
- source_word: יָפִיחַ
  chosen: breathes out
  alternatives:
  - utters
  - pours out
  - speaks forth
  lexicon: HALOT
  rationale: The Hiphil of פוח conveys causing breath to go out, used idiomatically for speaking or pouring out words. 'Breathes out' preserves the vivid metaphor and matches the parallel with false testimony better than a flatter 'utters.'
- source_word: כְּזָבִים
  chosen: lies
  alternatives:
  - falsehoods
  - deceptions
  lexicon: HALOT
  rationale: Plural noun meaning falsehoods or lies. 'Lies' is the most natural modern English equivalent and fits the moral force of the proverb.
- source_word: עֵד שָׁקֶר
  chosen: a false witness
  alternatives:
  - a lying witness
  - a deceitful witness
  lexicon: HALOT
  rationale: Construct phrase literally 'witness of falsehood.' 'False witness' is the standard and clear English legal-moral expression, preserving the forensic sense.
- source_word: וּמְשַׁלֵּחַ
  chosen: and one who stirs up
  alternatives:
  - and one who sends out
  - and one who spreads
  - and one who sows
  lexicon: HALOT
  rationale: The participle of שלח is literally 'sending out,' but in context with 'strife' and 'among brothers' it denotes actively causing or spreading conflict. 'Stirs up' communicates the idiomatic force in readable English without over-paraphrasing.
- source_word: מְדָנִים
  chosen: strife
  alternatives:
  - contentions
  - quarrels
  - discord
  lexicon: HALOT
  rationale: The noun refers to contention or disputes. 'Strife' is concise, natural, and suitably weighty in wisdom literature. 'Discord' is possible, but 'strife' better matches the active fomenting implied by the participle.
- source_word: בֵּין אַחִים
  chosen: among brothers
  alternatives:
  - between brothers
  - among kin
  lexicon: HALOT
  rationale: Literally 'between brothers.' Because the phrase can denote members of a close community or family, 'among brothers' reads naturally in English while preserving the masculine plural. Per doctrine, gender-accurate rendering is preferred over neutralizing to 'siblings.'
