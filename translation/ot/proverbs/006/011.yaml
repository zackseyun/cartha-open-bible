id: PRO.6.11
reference: Proverbs 6:11
source:
  edition: WLC
  text: וּ/בָֽא כִ/מְהַלֵּ֥ךְ רֵאשֶׁ֑/ךָ וּ֝/מַחְסֹֽרְ/ךָ֗ כְּ/אִ֣ישׁ מָגֵֽן־׃פ
translation:
  text: and your poverty will come like a prowler, and your lack like an armed man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'like one who walks about.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'like a man with a shield.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָא
  chosen: and ... will come
  alternatives:
  - and ... comes
  lexicon: HALOT
  rationale: Qal perfect of בוא in a proverbial sequence can express future/resultative
    force in English. 'Will come' fits the warning context and natural English style.
- source_word: כִמְהַלֵּךְ
  chosen: like a prowler
  alternatives:
  - like one who walks about
  - like a vagabond
  - like a traveler
  lexicon: HALOT
  rationale: The participle of הלך with prefixed כ expresses comparison. In this context
    of poverty arriving unexpectedly and threateningly, 'prowler' captures the image
    of someone moving about stealthily better than the overly literal 'one who walks
    about.'
- source_word: רֵאשֶׁךָ
  chosen: your poverty
  alternatives:
  - your destitution
  - your want
  lexicon: HALOT
  rationale: Though the form reflects a noun for poverty/need with 2ms suffix, the
    sense here is material poverty. 'Poverty' is the clearest modern English rendering
    and pairs well with the following synonym.
- source_word: וּמַחְסֹרְךָ
  chosen: and your lack
  alternatives:
  - and your need
  - and your want
  lexicon: HALOT
  rationale: מַחְסוֹר denotes lack or deficiency. 'Lack' preserves the concise parallelism
    with 'poverty' without overinterpreting.
- source_word: כְּאִישׁ
  chosen: like a ... man
  alternatives:
  - like a person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and refers to a male figure
    in the simile. Per gender-accurate policy, 'man' is retained.
- source_word: מָגֵן
  chosen: armed
  alternatives:
  - with a shield
  - shield-bearing
  lexicon: HALOT
  rationale: The noun normally means 'shield,' but in the idiom אִישׁ מָגֵן the sense
    is a man equipped for attack or defense. 'Armed man' communicates the threatening
    force of the image in idiomatic English, while the more literal 'man with a shield'
    is preserved in a footnote.
