id: PRO.6.2
reference: Proverbs 6:2
source:
  edition: WLC
  text: נוֹקַ֥שְׁתָּ בְ/אִמְרֵי פִ֑י/ךָ נִ֝לְכַּ֗דְתָּ בְּ/אִמְרֵי פִֽי/ךָ־־׃
translation:
  text: you have been snared by the words of your mouth[a]; you have been caught by the words of your mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you are trapped by the words of your mouth.' The Hebrew perfects may be rendered with present-result force in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: נוֹקַשְׁתָּ
  chosen: you have been snared
  alternatives:
  - you are trapped
  - you have been ensnared
  lexicon: HALOT
  rationale: The Niphal form of יקש conveys being trapped or snared. 'Snared' preserves the metaphor of a trap more vividly and formally than the flatter 'trapped,' while remaining natural English.
- source_word: בְאִמְרֵי
  chosen: by the words of
  alternatives:
  - with the words of
  - by the speech of
  lexicon: HALOT
  rationale: 'The preposition ב here is instrumental, indicating means: one is snared ''by'' one''s own words. אִמְרֵי, construct plural of אִמְרָה/אֵמֶר, is well rendered ''words'' in this proverbial context.'
- source_word: פִיךָ
  chosen: your mouth
  alternatives:
  - your speech
  lexicon: HALOT
  rationale: The Hebrew is literally 'your mouth,' a common idiom for spoken words. Retaining 'mouth' preserves the concrete Hebrew expression and the parallelism of the verse.
- source_word: נִלְכַּדְתָּ
  chosen: you have been caught
  alternatives:
  - you have been captured
  - you have been taken
  lexicon: HALOT
  rationale: The Niphal of לכד means to be caught or captured. 'Caught' is the most idiomatic English in parallel with 'snared' and maintains the intensifying synonymous parallelism.
