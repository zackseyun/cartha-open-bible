id: PRO.6.8
reference: Proverbs 6:8
source:
  edition: WLC
  text: תָּכִ֣ין בַּ/קַּ֣יִץ לַחְמָ֑/הּ אָגְרָ֥ה בַ֝/קָּצִ֗יר מַאֲכָלָֽ/הּ׃
translation:
  text: it prepares its food in summer; it gathers its provisions at harvest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'its bread'; here likely meaning 'its food' or sustenance more generally.
    reason: lexical_alternative
  - marker: b
    text: Or 'it stores up its food at harvest.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּכִין
  chosen: prepares
  alternatives:
  - establishes
  - makes ready
  - provides
  lexicon: HALOT
  rationale: Hiphil of כון here carries the sense of making something ready or preparing
    it. In context of the ant's diligence, 'prepares' is the most natural English
    rendering and fits the parallel with gathering.
- source_word: בַּקַּיִץ
  chosen: in summer
  alternatives:
  - during the summer
  lexicon: HALOT
  rationale: The preposition ב with the definite noun indicates the time period in
    which the action occurs. 'In summer' is concise and natural.
- source_word: לַחְמָהּ
  chosen: its food
  alternatives:
  - its bread
  lexicon: HALOT
  rationale: Though לֶחֶם literally often means 'bread,' in wisdom literature it can
    stand more broadly for food or sustenance. Since the referent is the ant, 'its
    food' better communicates the plain sense without importing specifically human
    bread imagery.
- source_word: אָגְרָה
  chosen: it gathers
  alternatives:
  - it stores up
  - it collects
  lexicon: HALOT
  rationale: From אגר, the verb denotes collecting or gathering into storage. 'Gathers'
    preserves the direct parallelism with the first colon and leaves the storing nuance
    implicit in context.
- source_word: בַּקָּצִיר
  chosen: at harvest
  alternatives:
  - in harvest
  - during harvest
  lexicon: HALOT
  rationale: The noun refers to harvest time. 'At harvest' is idiomatic English and
    marks the season/action point clearly.
- source_word: מַאֲכָלָהּ
  chosen: its provisions
  alternatives:
  - its food
  - its nourishment
  lexicon: HALOT
  rationale: מַאֲכָל denotes food to be eaten. Rendering it as 'provisions' in the
    second colon helps reflect the slight stylistic distinction from לַחְמָהּ while
    fitting the sense of gathered stores for future use.
