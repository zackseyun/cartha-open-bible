id: PRO.14.16
reference: Proverbs 14:16
source:
  edition: WLC
  text: חָכָ֣ם יָ֭רֵא וְ/סָ֣ר מֵ/רָ֑ע וּ֝/כְסִ֗יל מִתְעַבֵּ֥ר וּ/בוֹטֵֽחַ׃
translation:
  text: A wise man fears and turns away from evil[a], but a fool is reckless and confident.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'becomes enraged' or 'oversteps bounds'; the Hebrew verb is difficult, but here likely describes rash, unrestrained behavior.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָכָם
  chosen: wise man
  alternatives:
  - wise person
  - the wise
  lexicon: HALOT
  rationale: Adjective used substantivally for an individual. Rendered gender-accurately as 'wise man' in keeping with the masculine singular form and the project's stated philosophy, while still functioning proverbially.
- source_word: יָרֵא
  chosen: fears
  alternatives:
  - is cautious
  - reveres
  lexicon: HALOT
  rationale: The verb basically means 'fear.' In this wisdom context it conveys prudent fear/caution in the face of danger or evil, not necessarily explicit reverence toward God in this verse. 'Fears' preserves the lexical force better than a paraphrastic 'is cautious.'
- source_word: וְסָר
  chosen: turns away
  alternatives:
  - departs
  - turns aside
  lexicon: HALOT
  rationale: From סור, meaning to turn aside/depart. 'Turns away' is idiomatic modern English and fits the moral object 'from evil' well.
- source_word: מֵרָע
  chosen: from evil
  alternatives:
  - from harm
  - from what is bad
  lexicon: HALOT
  rationale: רַע can denote moral evil or harm/disaster depending on context. Here the contrast with wise and fool in Proverbs favors moral evil, while still allowing the practical sense that the wise avoid what is ruinous.
- source_word: כְסִיל
  chosen: a fool
  alternatives:
  - the fool
  - a dullard
  lexicon: HALOT
  rationale: Standard wisdom-term rendering. 'Fool' is established, natural English and preserves the moral-intellectual category of Proverbs.
- source_word: מִתְעַבֵּר
  chosen: is reckless
  alternatives:
  - becomes enraged
  - passes beyond bounds
  - is arrogant
  lexicon: HALOT
  rationale: The hitpael of עבר here is difficult and idiomatic. In context, contrasted with the wise man's fear and avoidance, it denotes overstepping restraint—acting rashly or headlong. 'Is reckless' best captures the practical sense in contemporary English. The possible nuance of anger/overflow is preserved in a footnote.
- source_word: וּבוֹטֵחַ
  chosen: and self-confident
  alternatives:
  - and is secure
  - and trusts himself
  - and is careless
  lexicon: HALOT
  rationale: בטח means to trust/be confident/feel secure. Since no explicit object is supplied and the context is negative, 'self-confident' conveys misplaced confidence rather than commendable trust. This also pairs naturally with 'reckless.'
