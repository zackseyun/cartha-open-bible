id: PRO.26.6
reference: Proverbs 26:6
source:
  edition: WLC
  text: מְקַצֶּ֣ה רַ֭גְלַיִם חָמָ֣ס שֹׁתֶ֑ה שֹׁלֵ֖חַ דְּבָרִ֣ים בְּ/יַד כְּסִֽיל־׃
translation:
  text: One who sends messages by the hand of a fool cuts off his feet and drinks violence[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'words' instead of 'messages'; the Hebrew term can mean either, but here likely refers to a communication entrusted to a messenger.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְקַצֶּה
  chosen: cuts off
  alternatives:
  - mutilates
  - cuts away
  lexicon: HALOT
  rationale: From קצה in the Piel participial form, conveying a forceful act of cutting off or maiming. 'Cuts off' is vivid and idiomatic in English, preserving the proverb's shocking imagery better than a softened rendering.
- source_word: רַגְלַיִם
  chosen: his own feet
  alternatives:
  - feet
  - legs
  lexicon: HALOT
  rationale: Dual form of 'feet/legs.' In English proverb style, 'feet' is the natural rendering. 'His own' is supplied to make explicit that the sender harms himself, which is implicit in the Hebrew participial construction.
- source_word: חָמָס
  chosen: violence
  alternatives:
  - wrong
  - injury
  - outrage
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence, wrongdoing, or destructive harm. 'Violence' preserves the concrete, forceful sense and matches the parallel self-injury imagery.
- source_word: שֹׁתֶה
  chosen: drinks
  alternatives:
  - swallows
  - imbibes
  lexicon: HALOT
  rationale: Literal participle of שתה, 'to drink.' The metaphor of 'drinking violence' is retained rather than paraphrased, preserving the Hebrew image of taking harm into oneself.
- source_word: שֹׁלֵחַ
  chosen: One who sends
  alternatives:
  - he who sends
  - the sender of
  lexicon: HALOT
  rationale: Participial form introducing the subject. 'One who sends' is natural modern English and preserves the generic proverbial force.
- source_word: דְּבָרִים
  chosen: messages
  alternatives:
  - words
  - matters
  lexicon: HALOT
  rationale: Though literally 'words,' in the context of sending something by someone's hand, the sense is communicated content or a message. 'Messages' best fits the idiom in contemporary English without over-paraphrasing.
- source_word: בְּיָד
  chosen: by the hand of
  alternatives:
  - through
  - by means of
  lexicon: HALOT
  rationale: A common Hebrew idiom for agency or instrumentality. 'By the hand of' keeps the concrete Hebrew expression while remaining understandable in English.
- source_word: כְּסִיל
  chosen: a fool
  alternatives:
  - a dullard
  - a stupid man
  lexicon: HALOT
  rationale: Standard wisdom-literature term for a morally and practically foolish person, not merely someone lacking intelligence. 'Fool' is the established and accurate rendering in Proverbs.
