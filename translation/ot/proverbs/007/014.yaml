theological_decisions:
- issue: Cultic terminology in the speech of the adulterous woman
  chosen_reading: Retain explicit sacrificial/vow language without softening or moralizing.
  alternative_readings:
  - Paraphrase as a generic statement about having food ready
  - Render more literally as 'sacrifices of peace offerings are upon me'
  rationale: The verse intentionally presents the woman invoking legitimate worship language to lend respectability to her seduction. The translation should preserve that tension and not obscure the religious setting, while still using natural English.
  doctrine_reference: Translation philosophy §3, §6
