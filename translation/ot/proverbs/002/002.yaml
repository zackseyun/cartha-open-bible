id: PRO.2.2
reference: Proverbs 2:2
source:
  edition: WLC
  text: לְ/הַקְשִׁ֣יב לַֽ/חָכְמָ֣ה אָזְנֶ֑/ךָ תַּטֶּ֥ה לִ֝בְּ/ךָ֗ לַ/תְּבוּנָֽה׃
translation:
  text: making your ear attentive to wisdom, inclining your heart to understanding,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to discernment' for 'to understanding.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַקְשִׁיב
  chosen: making ... attentive
  alternatives:
  - to listen
  - to pay attention
  - to cause to attend
  lexicon: HALOT
  rationale: The Hiphil infinitive construct of קשׁב has a causative nuance, literally
    'to cause to pay attention/listen.' In English, 'making your ear attentive' preserves
    both the infinitival dependence on the previous verse and the active, intentional
    sense better than a bare 'listening.'
- source_word: לַחָכְמָה
  chosen: to wisdom
  alternatives:
  - for wisdom
  lexicon: HALOT
  rationale: 'The preposition ל marks direction/object here: the ear is made attentive
    ''to wisdom.'' This keeps the personified or objective sense of wisdom as that
    toward which attention is directed.'
- source_word: אָזְנֶךָ
  chosen: your ear
  alternatives:
  - your ears
  lexicon: HALOT
  rationale: The Hebrew is singular with 2ms suffix. English can idiomatically use
    singular here, preserving the concrete imagery of attentive hearing.
- source_word: תַּטֶּה
  chosen: inclining
  alternatives:
  - turning
  - bending
  - directing
  lexicon: HALOT
  rationale: From נטה, 'to stretch out, incline, turn.' 'Inclining' fits the wisdom-literature
    idiom and parallels the first colon's intentional posture without sounding archaic
    in this context.
- source_word: לִבְּךָ
  chosen: your heart
  alternatives:
  - your mind
  lexicon: HALOT
  rationale: Hebrew לֵב/לֵבָב commonly denotes the inner person, including intellect
    and will. 'Heart' is the standard and preserves the Hebrew anthropology; reducing
    it to 'mind' would narrow the sense too much.
- source_word: לַתְּבוּנָה
  chosen: to understanding
  alternatives:
  - to discernment
  - to insight
  lexicon: HALOT
  rationale: תְּבוּנָה in Proverbs often denotes understanding/discernment. 'Understanding'
    is the most natural paired term with 'wisdom' here and maintains consistency with
    common wisdom vocabulary.
