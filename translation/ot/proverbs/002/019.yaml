theological_decisions:
- issue: Force of the proverb's negations
  chosen_reading: A general wisdom statement about the ruinous end of joining the adulterous woman, not an absolute metaphysical impossibility of repentance in every individual case.
  alternative_readings:
  - An absolute statement that no one who goes to her can ever return
  rationale: The Hebrew uses straightforward negation in proverbial discourse. In wisdom literature such statements characteristically express the normal, grave outcome rather than define an exceptionless doctrinal rule. The translation keeps the strong wording of the text without softening it, while this note documents the genre-sensitive reading.
  doctrine_reference: Preserve theological tension rather than resolve it
