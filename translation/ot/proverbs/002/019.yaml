id: PRO.2.19
reference: Proverbs 2:19
source:
  edition: WLC
  text: כָּל בָּ֭אֶי/הָ לֹ֣א יְשׁוּב֑וּ/ן וְ/לֹֽא יַ֝שִּׂ֗יגוּ אָרְח֥וֹת חַיִּֽים־־׃
translation:
  text: All who go in to her do not return[b][a], nor do they attain the paths of life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'enter her' or 'come to her.' The Hebrew idiom likely carries sexual overtones in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'reach' or 'attain the paths of life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּאֶיהָ
  chosen: who go in to her
  alternatives:
  - who enter her
  - who come to her
  lexicon: HALOT
  rationale: The participle from בוא with 3fs suffix refers to those entering the forbidden woman of the preceding context. 'Go in to her' preserves the idiomatic sexual sense more clearly than the flatter 'come to her,' while remaining readable modern English.
- source_word: יְשׁוּבוּן
  chosen: do not return
  alternatives:
  - do not turn back
  - will not return
  lexicon: HALOT
  rationale: שׁוב commonly means 'return/turn back.' 'Do not return' is the most direct rendering here. Present-tense English fits proverbial style better than a predictive future, expressing a general truth.
- source_word: יַשִּׂיגוּ
  chosen: regain
  alternatives:
  - reach
  - attain
  - overtake
  lexicon: HALOT
  rationale: נשׂג in Hiphil can mean reach, attain, overtake. In parallel with 'do not return,' 'regain' brings out the sense of recovering something lost, namely access to the life-giving way, without over-paraphrasing.
- source_word: אָרְחוֹת
  chosen: paths
  alternatives:
  - ways
  - tracks
  lexicon: HALOT
  rationale: '''Paths'' is a natural rendering for ארחות in wisdom literature and preserves the metaphor of moral course.'
- source_word: חַיִּים
  chosen: life
  alternatives:
  - lives
  lexicon: HALOT
  rationale: Though morphologically plural, חיים often functions idiomatically as singular 'life.' In the phrase 'paths of life,' singular English is the standard and natural sense.
- source_word: כָּל
  chosen: All
  alternatives:
  - Everyone
  - All those
  lexicon: HALOT
  rationale: '''All'' preserves the comprehensive force of the Hebrew and works smoothly with the following participial phrase.'
