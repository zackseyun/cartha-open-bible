id: PRO.2.3
reference: Proverbs 2:3
source:
  edition: WLC
  text: כִּ֤י אִ֣ם לַ/בִּינָ֣ה תִקְרָ֑א לַ֝/תְּבוּנָ֗ה תִּתֵּ֥ן קוֹלֶֽ/ךָ׃
translation:
  text: yes, if you call out for understanding and lift up your voice for discernment,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cry out for insight ... lift your voice for understanding.' The two
      wisdom terms are near-synonyms and may be rendered in either order in English
      without major change in sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: yes, if
  alternatives:
  - indeed, if
  - for if
  - surely if
  lexicon: HALOT
  rationale: The collocation introduces an emphatic conditional continuation from
    the previous verse. 'Yes, if' preserves both the conditional force and the rhetorical
    intensification better than a flat 'if' alone.
- source_word: בִּינָה
  chosen: understanding
  alternatives:
  - insight
  - discernment
  lexicon: HALOT
  rationale: בינה commonly denotes understanding or insight. 'Understanding' fits
    the wisdom context and pairs well with the following near-synonym without collapsing
    the distinction entirely.
- source_word: תִקְרָא
  chosen: call out
  alternatives:
  - call
  - cry out
  lexicon: HALOT
  rationale: The verb קרא here conveys vocal appeal rather than mere naming or summoning.
    'Call out' is idiomatic modern English and matches the earnestness of the exhortation.
- source_word: תְּבוּנָה
  chosen: discernment
  alternatives:
  - understanding
  - insight
  lexicon: HALOT
  rationale: תבונה overlaps with בינה but is not identical. 'Discernment' preserves
    a meaningful distinction in English while remaining natural in wisdom literature.
- source_word: תִּתֵּן קוֹלֶךָ
  chosen: raise your voice
  alternatives:
  - lift your voice
  - give your voice
  - utter your voice
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'give your voice,' that is, speak loudly
    or earnestly. 'Raise your voice' communicates the idiom clearly in contemporary
    English while preserving the image of vocal intensity.
