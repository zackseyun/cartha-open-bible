id: PRO.2.12
reference: Proverbs 2:12
source:
  edition: WLC
  text: לְ֭/הַצִּ֣ילְ/ךָ מִ/דֶּ֣רֶךְ רָ֑ע מֵ֝/אִ֗ישׁ מְדַבֵּ֥ר תַּהְפֻּכֽוֹת׃
translation:
  text: to deliver you from the evil way, from the man who speaks perverse things,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from a man who speaks twisted things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַצִּילְךָ
  chosen: to deliver you
  alternatives:
  - to rescue you
  - to save you
  lexicon: HALOT
  rationale: The Hiphil infinitive construct of נצל with 2ms suffix expresses purpose/result
    in context ('to deliver/rescue you'). 'Deliver' is idiomatic and preserves the
    protective sense without importing soteriological overtones that 'save' might
    suggest here.
- source_word: מִדֶּרֶךְ
  chosen: from the way of
  alternatives:
  - from the path of
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means 'way, path, road' and in Proverbs often carries
    a moral-course metaphor. 'Way' preserves both the literal image and the ethical
    sense.
- source_word: רָע
  chosen: evil
  alternatives:
  - bad
  - wickedness
  lexicon: HALOT
  rationale: Here רָע qualifies 'way' in a moral sense. 'Evil' best captures the ethical
    force and fits Proverbs' wisdom contrast.
- source_word: מֵאִישׁ
  chosen: from the man
  alternatives:
  - from a man
  - from the person
  lexicon: HALOT
  rationale: 'אִישׁ is singular masculine. In keeping with the gender-accurate policy,
    ''man'' is retained rather than neutralizing to ''person.'' The preposition is
    repeated for emphasis: deliverance is both from an evil way and from a particular
    kind of man.'
- source_word: מְדַבֵּר
  chosen: who speaks
  alternatives:
  - speaking
  - uttering
  lexicon: HALOT
  rationale: The participle describes the characteristic action of the man. Relative-clause
    English ('who speaks') is the most natural equivalent.
- source_word: תַּהְפֻּכוֹת
  chosen: perverse things
  alternatives:
  - twisted things
  - devious things
  - perversities
  lexicon: HALOT
  rationale: תַּהְפֻּכוֹת denotes distortions, perversities, or twisted speech. 'Perverse
    things' is a natural English plural that preserves the moral and rhetorical sense
    of speech that is crooked or subversive.
