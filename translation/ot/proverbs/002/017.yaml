id: PRO.2.17
reference: Proverbs 2:17
source:
  edition: WLC
  text: הַ֭/עֹזֶבֶת אַלּ֣וּף נְעוּרֶ֑י/הָ וְ/אֶת בְּרִ֖ית אֱלֹהֶ֣י/הָ שָׁכֵֽחָה־׃
translation:
  text: who abandons the companion of her youth and forgets the covenant of her God[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'husband of her youth.' The Hebrew word can denote an intimate companion and here likely refers to her marriage partner.
    reason: lexical_alternative
  - marker: b
    text: '''The covenant of her God'' likely refers to the marriage covenant made under God''s authority or witness, though it may also echo her broader covenant obligation to God.'
    reason: alternative_reading
lexical_decisions:
- source_word: הָעֹזֶבֶת
  chosen: who abandons
  alternatives:
  - who leaves
  - who forsakes
  lexicon: HALOT
  rationale: Qal participle feminine singular from עזב, modifying the previously mentioned forbidden/adulterous woman. 'Abandons' is natural modern English and preserves the sense of leaving behind or forsaking without sounding archaic.
- source_word: אַלּוּף
  chosen: companion
  alternatives:
  - close friend
  - husband
  - mate
  lexicon: HALOT
  rationale: אַלּוּף can denote an intimate associate or companion; in this context, with 'of her youth' and parallel to 'the covenant of her God,' it refers to the woman's marriage partner. 'Companion' preserves the lexical sense while allowing the parallel line to imply the marital relationship, rather than over-specifying with 'husband' in the main text.
- source_word: נְעוּרֶיהָ
  chosen: of her youth
  alternatives:
  - from her youth
  - of her young years
  lexicon: HALOT
  rationale: Construct plural with 3fs suffix. The idiom 'companion of her youth' is established and clear in English, conveying an early-life bond, likely marriage formed in youth.
- source_word: וְאֶת
  chosen: and
  alternatives:
  - and also
  lexicon: HALOT
  rationale: The conjunction plus object marker introduces the second coordinated object clause. In English the object marker is not translated, so simple 'and' is sufficient.
- source_word: בְּרִית
  chosen: covenant
  alternatives:
  - binding agreement
  - pledge
  lexicon: HALOT
  rationale: בְּרִית is a key theological and relational term. 'Covenant' best preserves both the formal and theological weight of the Hebrew, especially in a context likely referring to marriage under God.
- source_word: אֱלֹהֶיהָ
  chosen: her God
  alternatives:
  - God
  lexicon: HALOT
  rationale: The 3fs suffix is explicit and should be represented. 'Her God' preserves the personal accountability implied in the Hebrew.
- source_word: שָׁכֵחָה
  chosen: forgets
  alternatives:
  - has forgotten
  - neglects
  lexicon: HALOT
  rationale: Qal perfect 3fs. In proverbial discourse, English often uses the present tense for general characterization. 'Forgets' communicates not mere mental lapse but covenantal disregard in context.
