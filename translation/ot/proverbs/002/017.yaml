theological_decisions:
- issue: Whether בְּרִית אֱלֹהֶיהָ refers specifically to the marriage covenant before God or more broadly to covenant obligations to God
  chosen_reading: the covenant of her God, with likely implication of the marriage covenant under divine witness
  alternative_readings:
  - her marriage covenant before God
  - God's covenant in a broader religious sense
  rationale: The immediate parallel with 'the companion of her youth' strongly suggests marriage, yet the Hebrew wording is literally 'the covenant of her God,' not simply 'her marriage covenant.' The translation preserves the broader Hebrew expression while allowing the marital implication to remain visible.
  doctrine_reference: Preserve theological tension rather than resolve it.
