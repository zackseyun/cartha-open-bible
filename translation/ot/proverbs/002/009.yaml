id: PRO.2.9
reference: Proverbs 2:9
source:
  edition: WLC
  text: אָ֗ז תָּ֭בִין צֶ֣דֶק וּ/מִשְׁפָּ֑ט וּ֝/מֵישָׁרִ֗ים כָּל מַעְגַּל טֽוֹב־־׃
translation:
  text: Then you will understand righteousness and justice and equity[a], every good path.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'uprightness' for 'equity' (Hebrew מֵישָׁרִים), emphasizing what is straight or morally level.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  - So
  lexicon: HALOT
  rationale: Temporal/sequential adverb linking this result to the prior conditional instruction in the chapter. 'Then' is the most natural English connector.
- source_word: תָּבִין
  chosen: you will understand
  alternatives:
  - you will discern
  - you will gain insight into
  lexicon: HALOT
  rationale: Qal imperfect of בין expresses coming to understand or discern. 'Understand' is clear modern English and fits the wisdom context without overinterpreting.
- source_word: צֶדֶק
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: In wisdom literature צֶדֶק commonly denotes what is right in an ethical/moral sense. 'Righteousness' preserves the moral weight and distinguishes it from the following מִשְׁפָּט, which is better rendered 'justice' here.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - right judgment
  lexicon: HALOT
  rationale: This term often refers to justice, legal judgment, or proper order. 'Justice' pairs naturally with 'righteousness' and avoids redundancy.
- source_word: מֵישָׁרִים
  chosen: equity
  alternatives:
  - uprightness
  - what is straight
  - fairness
  lexicon: HALOT
  rationale: Plural noun from the idea of straightness/uprightness. 'Equity' captures the ethical sense of fairness and rectitude in a concise English term that complements 'righteousness and justice.'
- source_word: כָּל
  chosen: every
  alternatives:
  - all
  lexicon: HALOT
  rationale: 'Distributive sense is most natural with the singular following noun phrase: ''every good path.'''
- source_word: מַעְגַּל
  chosen: path
  alternatives:
  - track
  - course
  - way
  lexicon: HALOT
  rationale: Literally a track or path, often metaphorical for one's course of life. 'Path' is idiomatic in Proverbs and preserves the metaphor.
- source_word: טוֹב
  chosen: good
  alternatives:
  - beneficial
  - right
  lexicon: HALOT
  rationale: Simple attributive adjective qualifying 'path.' 'Good' is broad enough to retain the moral and practical sense without narrowing it.
