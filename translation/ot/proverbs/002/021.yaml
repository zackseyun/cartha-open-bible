theological_decisions:
- issue: Scope of אָרֶץ
  chosen_reading: the land
  alternative_readings:
  - the earth
  rationale: The verse participates in wisdom-language about the righteous continuing in a place of habitation, especially in contrast to the wicked being removed in the following verse. 'The land' preserves that concrete sense without forcing a narrow territorial doctrine; 'the earth' remains possible but is less contextually precise here.
