id: PRO.2.21
reference: Proverbs 2:21
source:
  edition: WLC
  text: כִּֽי יְשָׁרִ֥ים יִשְׁכְּנוּ אָ֑רֶץ וּ֝/תְמִימִ֗ים יִוָּ֥תְרוּ בָֽ/הּ־׃
translation:
  text: For the upright will dwell in the land[a], and the blameless will remain in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the earth.' Hebrew אָרֶץ can denote either 'land' or 'earth'; here 'the land' was chosen because the context emphasizes remaining in or being removed from a place of habitation.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces the ground or explanation for the preceding warning/promise in the context, so 'For' best preserves the logical connection in natural English.
- source_word: יְשָׁרִים
  chosen: the upright
  alternatives:
  - the straight
  - the honest
  - the righteous
  lexicon: HALOT
  rationale: The adjective denotes those who are morally straight/upright. 'The upright' is idiomatic and preserves the ethical sense without over-assimilating it to the more specific covenantal term 'righteous'.
- source_word: יִשְׁכְּנוּ
  chosen: will dwell
  alternatives:
  - will live
  - will reside
  - will settle
  lexicon: HALOT
  rationale: From שכן, the verb commonly means 'dwell' or 'settle.' 'Will dwell' preserves the slightly formal, durable sense of habitation that fits wisdom literature.
- source_word: אָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: In Proverbs, אָרֶץ can mean earth generally, but in this paired contrast with being cut off from it in the next verse, 'the land' better conveys inhabitable territory and echoes covenantal/wisdom motifs of remaining in the land. The article is supplied in English for idiomatic sense.
- source_word: וּתְמִימִים
  chosen: the blameless
  alternatives:
  - the innocent
  - the whole-hearted
  - the complete
  lexicon: HALOT
  rationale: תמימים refers to those of integrity, completeness, or blamelessness. 'The blameless' is the clearest ethical rendering in this context and pairs well with 'the upright.'
- source_word: יִוָּתְרוּ
  chosen: will remain
  alternatives:
  - will be left
  - will be preserved
  - will continue
  lexicon: HALOT
  rationale: The Niphal of יתר carries the sense of being left over or remaining. In context, 'will remain' communicates continued presence in the land more naturally than the more wooden 'will be left.'
- source_word: בָהּ
  chosen: in it
  alternatives:
  - therein
  - in the land
  lexicon: HALOT
  rationale: The pronominal suffix refers back to 'the land.' 'In it' is concise, natural English and preserves the anaphoric link.
