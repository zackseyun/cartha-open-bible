theological_decisions:
- issue: Referent of the implicit subject in 'he watches over'
  chosen_reading: The subject is God, carried over from the preceding context.
  alternative_readings:
  - An indefinite or generic subject
  rationale: In Proverbs 2:6–8, the LORD is the explicit actor who gives wisdom and
    stores up sound wisdom; verse 8 continues that description. Making the subject
    explicit in English is unnecessary, but the translation reflects the contextual
    continuity by using 'he.'
- issue: Rendering of חסידו
  chosen_reading: '''his faithful one'''
  alternative_readings:
  - '''his saints'''
  - '''his godly ones'''
  rationale: The Hebrew form here is singular with a 3ms suffix, so the translation
    should not import a plural reading. 'Faithful one' preserves covenantal devotion
    without importing later technical ecclesial language such as 'saint.'
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
