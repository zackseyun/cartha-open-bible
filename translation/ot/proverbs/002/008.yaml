id: PRO.2.8
reference: Proverbs 2:8
source:
  edition: WLC
  text: לִ֭/נְצֹר אָרְח֣וֹת מִשְׁפָּ֑ט וְ/דֶ֖רֶךְ חסיד/ו יִשְׁמֹֽר׃
translation:
  text: to guard the paths of justice, and he watches over the way of his faithful
    ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his godly one' or 'his loyal one.' The Hebrew חסידו refers to one marked
      by covenant loyalty or piety.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִנְצֹר
  chosen: to guard
  alternatives:
  - to preserve
  - to keep
  lexicon: HALOT
  rationale: The infinitive construct expresses purpose/result from the previous verse
    ('then he will understand...'), so 'to guard' fits the protective sense of נצר
    in wisdom literature. 'Preserve' is possible, but 'guard' reads more naturally
    with 'paths' in modern English while retaining the protective nuance.
- source_word: אָרְחוֹת
  chosen: the paths
  alternatives:
  - the tracks
  - the ways
  lexicon: HALOT
  rationale: אָרְחוֹת is the plural of a term for paths/ways. 'Paths' is the most
    natural English equivalent here and pairs well with the following singular 'way'
    for stylistic variation already present in the Hebrew.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - what is right
  lexicon: HALOT
  rationale: In Proverbs, מִשְׁפָּט often denotes justice in an ethical/juridical
    sense rather than merely a legal verdict. 'Justice' is idiomatic in English with
    'paths' and preserves the moral dimension.
- source_word: וְדֶרֶךְ
  chosen: and ... the way
  alternatives:
  - and ... the path
  lexicon: HALOT
  rationale: דֶרֶךְ commonly means 'way/path.' Rendering it as 'way' preserves the
    Hebrew variation from the previous plural 'paths' and avoids flattening the parallelism.
- source_word: חסידו
  chosen: his faithful one
  alternatives:
  - his godly one
  - his saint
  - his loyal one
  lexicon: HALOT
  rationale: חָסִיד denotes one characterized by covenant loyalty/piety. 'His faithful
    one' communicates devotion and belonging without archaic ecclesiastical overtones.
    The 3ms suffix is retained with 'his.' Because the referent is singular masculine
    in form, the translation remains gender-accurate rather than neutral.
- source_word: יִשְׁמֹר
  chosen: he watches over
  alternatives:
  - he keeps
  - he guards
  - he preserves
  lexicon: HALOT
  rationale: שׁמר has a broad semantic range including keep, guard, watch over. 'Watches
    over' avoids an awkward repetition of 'guard' from לִנְצֹר while preserving the
    protective sense. The subject is understood from context as God, continuing the
    description from the previous verse.
