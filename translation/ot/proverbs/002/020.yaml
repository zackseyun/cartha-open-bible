id: PRO.2.20
reference: Proverbs 2:20
source:
  edition: WLC
  text: לְמַ֗עַן תֵּ֭לֵךְ בְּ/דֶ֣רֶךְ טוֹבִ֑ים וְ/אָרְח֖וֹת צַדִּיקִ֣ים תִּשְׁמֹֽר׃
translation:
  text: so that you may walk in the way of the good and keep to the paths of the righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'good men.' The Hebrew adjective is masculine plural used substantivally
      for a class of people.
    reason: lexical_alternative
  - marker: b
    text: Or 'guard the paths of the righteous.' The Hebrew verb can mean 'keep,'
      'guard,' or 'observe'; here it likely means to stay to or preserve one's course
      on those paths.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: HALOT
  rationale: Introduces purpose/result from the preceding instruction. 'So that' is
    natural modern English and preserves the purposive force.
- source_word: תֵּלֵךְ
  chosen: you may walk
  alternatives:
  - you will walk
  - you should walk
  lexicon: HALOT
  rationale: Qal imperfect 2ms of הלך. In context after לְמַעַן, an English modal
    expression best conveys intended result/purpose rather than simple future.
- source_word: בְּדֶרֶךְ
  chosen: in the way
  alternatives:
  - on the way
  - in a path
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly denotes a road or figuratively a manner of life. 'In
    the way' preserves the Hebrew metaphor and reads idiomatically with 'walk.'
- source_word: טוֹבִים
  chosen: the good
  alternatives:
  - good men
  - those who are good
  lexicon: HALOT
  rationale: Masculine plural adjective used substantivally. 'The good' preserves
    the representative class sense without over-specifying gender in English, while
    still matching the Hebrew's moral category.
- source_word: וְאָרְחוֹת
  chosen: and ... the paths
  alternatives:
  - and ... the tracks
  - and ... the ways
  lexicon: HALOT
  rationale: אָרַח/אֹרַח in plural denotes paths or tracks, often figurative for course
    of life. 'Paths' gives a natural parallel to 'way' while preserving the poetic
    distinction.
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous men
  - the just
  lexicon: HALOT
  rationale: Substantival plural adjective. 'The righteous' is the standard and clearest
    rendering for the morally upright; 'the just' is possible but less natural in
    this wisdom context.
- source_word: תִּשְׁמֹר
  chosen: keep to
  alternatives:
  - keep
  - guard
  - observe
  lexicon: HALOT
  rationale: שׁמר can mean keep, guard, observe. With 'paths' as object, English 'keep
    to' best conveys staying on or adhering to those paths, fitting the parallel with
    'walk in the way.'
