id: PRO.2.22
reference: Proverbs 2:22
source:
  edition: WLC
  text: וּ֭/רְשָׁעִים מֵ/אֶ֣רֶץ יִכָּרֵ֑תוּ וּ֝/בוֹגְדִ֗ים יִסְּח֥וּ מִמֶּֽ/נָּה׃פ
translation:
  text: But the wicked will be cut off from the land[b][a], and the treacherous will be uprooted from it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the earth.' The Hebrew אֶרֶץ can mean 'land' or 'earth'; here 'land' fits the contrast with the upright remaining in it in the previous verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'will be uprooted from it.' The Hebrew verb conveys forcible removal.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: Plural adjective/substantive referring to morally wicked persons. 'The wicked' is idiomatic, concise, and preserves the class sense better than the more expansive 'wicked people.'
- source_word: מֵאֶרֶץ
  chosen: from the land
  alternatives:
  - from the earth
  - from the הארץ/land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' In Proverbs 2 the immediate context contrasts remaining in and being removed from the land (vv. 21–22), so 'land' best preserves the covenantal and wisdom-context sense of inhabitable territory rather than the whole globe.
- source_word: יִכָּרֵתוּ
  chosen: will be cut off
  alternatives:
  - will be cut down
  - will be eliminated
  lexicon: HALOT
  rationale: Nifal imperfect of כרת commonly means 'be cut off,' especially for removal/excision. This is the standard and most transparent rendering here, preserving both the metaphor and the judicial force.
- source_word: בוֹגְדִים
  chosen: the treacherous
  alternatives:
  - the unfaithful
  - traitors
  - those who deal treacherously
  lexicon: HALOT
  rationale: Participle of בגד denotes those acting treacherously or faithlessly. 'The treacherous' is natural English and captures the habitual character implied by the participle.
- source_word: יִסְּחוּ
  chosen: will be torn away
  alternatives:
  - will be uprooted
  - will be plucked away
  - will be swept away
  lexicon: HALOT
  rationale: From נסח, a verb of pulling away/uprooting/removing. 'Will be torn away' preserves the force of forcible removal while fitting the parallel with 'will be cut off.' 'Uprooted' is possible, but the verse does not explicitly use a plant image in English, so 'torn away' is slightly broader and more natural here.
- source_word: מִמֶּנָּה
  chosen: from it
  alternatives:
  - out of it
  - from her
  lexicon: HALOT
  rationale: Feminine singular pronominal suffix refers back to אֶרֶץ ('land'). English normally uses 'it' for land in this context; 'from it' is clear and idiomatic.
- source_word: וְ
  chosen: But ... and ...
  alternatives:
  - And ... and ...
  - But ... but ...
  lexicon: HALOT
  rationale: The initial conjunction marks contrast with v. 21, where the upright remain in the land. Rendering the first conjunction as 'But' makes the adversative sense explicit in English, while the second conjunction is simple coordination.
