theological_decisions:
- issue: Sense of אֶרֶץ in wisdom context
  chosen_reading: land
  alternative_readings:
  - earth
  rationale: The immediate literary context (vv. 21–22) speaks of the upright dwelling/remaning
    in the land and the wicked being removed from it. 'Land' best preserves that thematic
    contrast without importing a universal eschatological claim beyond the text's
    plain sense.
  doctrine_reference: Translation philosophy §1, §3
