id: PRO.2.4
reference: Proverbs 2:4
source:
  edition: WLC
  text: אִם תְּבַקְשֶׁ֥/נָּה כַ/כָּ֑סֶף וְֽ/כַ/מַּטְמוֹנִ֥ים תַּחְפְּשֶֽׂ/נָּה־׃
translation:
  text: if you seek it like silver and search for it like hidden treasures,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has a feminine singular suffix ('seek her' / 'search for her'), referring
      back to wisdom or understanding in the preceding verses. The main text renders
      this idiomatically as 'it' for the abstract object.
    reason: lexical_alternative
  - marker: b
    text: Or 'like buried treasures.' The Hebrew term can refer to valuables concealed
      in the ground or otherwise hidden away.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: if
  alternatives:
  - when
  lexicon: HALOT
  rationale: Introduces the conditional protasis continuing the father's instruction.
    'If' best preserves the straightforward conditional force in context.
- source_word: תְּבַקְשֶׁנָּה
  chosen: you seek it
  alternatives:
  - you seek her
  - you seek for it
  lexicon: HALOT
  rationale: From בקשׁ, 'seek.' The 3fs suffix refers back to wisdom/understanding
    in the preceding context, but English idiom prefers 'it' for the abstract object
    here. 'Seek it' is natural and preserves the object reference without over-personifying.
- source_word: כַּכָּסֶף
  chosen: like silver
  alternatives:
  - as silver
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like silver' is idiomatic modern English
    and preserves the simile of something valuable and diligently pursued.
- source_word: וְכַמַּטְמוֹנִים
  chosen: and like hidden treasures
  alternatives:
  - and like treasures
  - and like buried treasures
  - and like hidden stores
  lexicon: HALOT
  rationale: מַטְמוֹנִים denotes hidden treasure or stored valuables. 'Hidden treasures'
    best captures both the concealment and value implied by the noun, while remaining
    readable.
- source_word: תַּחְפְּשֶׂנָּה
  chosen: search for it
  alternatives:
  - search it out
  - dig for it
  - seek it out
  lexicon: HALOT
  rationale: From חפשׂ, 'search, seek diligently.' 'Search for it' conveys deliberate,
    intensive pursuit and pairs well with 'seek it' in the first colon. The suffix
    again refers to the feminine singular antecedent from context, rendered idiomatically
    as 'it' in English.
