id: PRO.2.11
reference: Proverbs 2:11
source:
  edition: WLC
  text: מְ֭זִמָּה תִּשְׁמֹ֥ר עָלֶ֗י/ךָ תְּבוּנָ֥ה תִנְצְרֶֽ/כָּה׃
translation:
  text: Discretion will watch over you[a]; understanding will guard you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sound judgment will keep you; discernment will preserve you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְזִמָּה
  chosen: Discretion
  alternatives:
  - sound judgment
  - prudence
  - purpose
  lexicon: HALOT
  rationale: In Proverbs this noun commonly carries a positive sense of prudent planning or thoughtful discernment, not the negative sense 'scheme' found in some contexts. 'Discretion' fits the wisdom context and reads naturally in English.
- source_word: תִּשְׁמֹר
  chosen: will watch over
  alternatives:
  - will keep
  - will guard
  lexicon: HALOT
  rationale: שׁמר often means 'keep, guard, watch.' With עַל plus second-person suffix, 'watch over you' captures protective oversight and avoids awkward repetition with the following verb.
- source_word: עָלֶיךָ
  chosen: you
  alternatives:
  - over you
  lexicon: HALOT
  rationale: The preposition is incorporated into the English verbal phrase 'watch over you' for idiomatic clarity while preserving the sense of protection directed toward the addressee.
- source_word: תְּבוּנָה
  chosen: understanding
  alternatives:
  - discernment
  - insight
  lexicon: HALOT
  rationale: A standard wisdom-term in Proverbs, denoting the capacity to discern rightly. 'Understanding' is the most straightforward and broadly consistent rendering.
- source_word: תִנְצְרֶכָּה
  chosen: will guard you
  alternatives:
  - will keep you
  - will preserve you
  lexicon: HALOT
  rationale: נצר conveys guarding, keeping, or preserving. 'Will guard you' pairs well with the parallelism and distinguishes it from the previous verb while maintaining the protective sense.
