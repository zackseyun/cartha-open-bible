id: PRO.2.7
reference: Proverbs 2:7
source:
  edition: WLC
  text: ו/צפן לַ֭/יְשָׁרִים תּוּשִׁיָּ֑ה מָ֝גֵ֗ן לְ/הֹ֣לְכֵי תֹֽם׃
translation:
  text: He stores up sound wisdom for the upright; he is a shield to those who walk
    in integrity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lays up sound judgment' or 'stores up success/resourcefulness'; the
      Hebrew term can include the idea of effective wisdom that leads to well-being.
    reason: lexical_alternative
  - marker: b
    text: Or 'blamelessness' or 'wholeness' for 'integrity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצָפַן
  chosen: stores up
  alternatives:
  - lays up
  - treasures up
  - reserves
  lexicon: HALOT
  rationale: The verb צפן commonly conveys storing up, treasuring, or reserving. 'Stores
    up' is natural modern English and preserves the image of something kept in reserve
    for later benefit.
- source_word: לַיְשָׁרִים
  chosen: for the upright
  alternatives:
  - for the straight
  - for the honest
  lexicon: HALOT
  rationale: יְשָׁרִים denotes morally straight/upright people. 'The upright' is the
    standard ethical sense in wisdom literature and fits the plural substantival adjective.
- source_word: תּוּשִׁיָּה
  chosen: sound wisdom
  alternatives:
  - success
  - resourcefulness
  - practical wisdom
  - sound judgment
  lexicon: HALOT
  rationale: תושיה in Proverbs can denote effective wisdom, sound judgment, or resourceful
    success. 'Sound wisdom' best captures the wisdom-literature context and the moral-intellectual
    quality of what God stores up, while preserving traditional resonance without
    becoming archaic.
- source_word: מָגֵן
  chosen: a shield
  alternatives:
  - protection
  - buckler
  lexicon: HALOT
  rationale: The noun is literally 'shield.' Retaining the concrete metaphor is preferable
    to flattening it into abstract 'protection.'
- source_word: לְהֹלְכֵי
  chosen: to those who walk
  alternatives:
  - for those who walk
  - to walkers
  lexicon: HALOT
  rationale: הלך in participial form often describes habitual conduct. 'Those who
    walk' preserves the Hebrew ethical metaphor of one's manner of life.
- source_word: תֹם
  chosen: integrity
  alternatives:
  - blamelessness
  - wholeness
  lexicon: HALOT
  rationale: תֹם denotes integrity, completeness, or blamelessness in conduct. 'Integrity'
    is clear modern English and fits the ethical sense of the verse without overstating
    sinlessness.
