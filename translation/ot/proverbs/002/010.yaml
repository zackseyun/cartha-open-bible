id: PRO.2.10
reference: Proverbs 2:10
source:
  edition: WLC
  text: כִּֽי תָב֣וֹא חָכְמָ֣ה בְ/לִבֶּ֑/ךָ וְ֝/דַ֗עַת לְֽ/נַפְשְׁ/ךָ֥ יִנְעָֽם־׃
translation:
  text: For wisdom will enter your heart, and knowledge will be pleasant to your soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when wisdom enters your heart.'
    reason: alternative_reading
  - marker: b
    text: Hebrew 'soul'; also 'self' or 'life' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - when
  - indeed
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the ground or explanation for the preceding exhortation/promise
    sequence, so 'For' best preserves the logical connection in natural English. 'When'
    is possible in context, but the verse reads more smoothly as explanatory rather
    than purely temporal.
- source_word: תָב֣וֹא
  chosen: will enter
  alternatives:
  - comes
  - enters
  lexicon: HALOT
  rationale: The verb בוא literally means 'to come/enter.' With the preposition בְּ
    plus 'your heart,' 'enter' is the most idiomatic English rendering. Future 'will
    enter' fits the instructional promise context.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering of חָכְמָה in Proverbs, preserving the book's key
    theme and personified moral-intellectual sense without overinterpreting.
- source_word: בְלִבֶּךָ
  chosen: your heart
  alternatives:
  - your mind
  - your inner being
  lexicon: HALOT
  rationale: לֵב/לֵבָב in Hebrew often denotes the inner person, including thought
    and will. 'Heart' is retained because it is both literal to the Hebrew idiom and
    understandable in English, while preserving the biblical anthropology rather than
    reducing it to mere intellect.
- source_word: וְדַעַת
  chosen: and knowledge
  alternatives:
  - and understanding
  lexicon: HALOT
  rationale: דַּעַת is best rendered 'knowledge' here, matching wisdom vocabulary
    in Proverbs and maintaining distinction from other terms such as 'understanding'
    or 'discernment.'
- source_word: לְנַפְשְׁךָ
  chosen: to your soul
  alternatives:
  - to you
  - to your life
  - to your inner self
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean soul, self, life, or person depending on context. 'To
    your soul' preserves the Hebrew expression and its anthropological depth. It also
    pairs well poetically with 'your heart.'
- source_word: יִנְעָם
  chosen: will be pleasant
  alternatives:
  - will delight
  - will be sweet
  lexicon: HALOT
  rationale: The verb נעם conveys pleasantness, sweetness, or delightfulness. 'Will
    be pleasant' is a clear and natural rendering that preserves the predicate sense
    of the Hebrew better than the more interpretive 'will delight.'
