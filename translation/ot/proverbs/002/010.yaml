theological_decisions:
- issue: Hebrew anthropology in לֵב and נֶפֶשׁ
  chosen_reading: Retain 'heart' and 'soul' in the main text
  alternative_readings:
  - heart and inner self
  - mind and life
  rationale: The verse speaks in standard Hebrew anthropological terms for the inner
    person. Rendering them more reductively as 'mind' or 'self' would flatten the
    text's conceptual world. Retaining 'heart' and 'soul' preserves theological and
    literary texture without importing later doctrinal precision beyond the text.
  doctrine_reference: Translation philosophy §1, §3, §6
