id: PRO.2.14
reference: Proverbs 2:14
source:
  edition: WLC
  text: הַ֭/שְּׂמֵחִים לַ/עֲשׂ֥וֹת רָ֑ע יָ֝גִ֗ילוּ בְּֽ/תַהְפֻּכ֥וֹת רָֽע׃
translation:
  text: who rejoice to do evil[a], and exult in the perversities of evil[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who delight to do evil.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and rejoice in perverse things of evil' or 'in acts of perversity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְּׂמֵחִים
  chosen: who rejoice
  alternatives:
  - those who are glad
  - who delight
  lexicon: HALOT
  rationale: The participle describes the kind of people in view from the previous verse; 'who rejoice' preserves the participial, characterizing force in natural English. 'Rejoice' fits the emotional sense of שמח here better than the flatter 'are glad.'
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to practice
  - to commit
  lexicon: HALOT
  rationale: The infinitive construct of עשה is straightforwardly 'to do/make.' 'To do' is the most direct rendering and avoids overinterpreting the action as habitual ('practice') or criminalized ('commit').
- source_word: רָע
  chosen: evil
  alternatives:
  - wrong
  - harm
  lexicon: HALOT
  rationale: In Proverbs wisdom context, רָע commonly carries moral force. 'Evil' best preserves that moral dimension; 'wrong' is weaker and 'harm' would tilt toward consequences rather than moral quality.
- source_word: יָגִילוּ
  chosen: exult
  alternatives:
  - rejoice
  - are jubilant
  lexicon: HALOT
  rationale: Using 'exult' differentiates גיל from the earlier שמח while preserving the heightened sense of jubilant delight. This avoids an unnecessary repetition of 'rejoice' in English while reflecting the poetic parallelism.
- source_word: בְּתַהְפֻּכוֹת
  chosen: in the perversities
  alternatives:
  - in perverse things
  - in acts of perversity
  - in crookedness
  lexicon: HALOT
  rationale: The plural noun from הפך denotes perverse or twisted acts/things. 'Perversities' preserves the plural and the abstract-moral quality of the Hebrew better than the more interpretive 'crookedness.'
- source_word: רָע
  chosen: of evil
  alternatives:
  - evil
  - wickedness
  lexicon: HALOT
  rationale: The final רָע most naturally qualifies the perversities as morally evil. Rendering it 'of evil' preserves the compact Hebrew relation without forcing a more expansive paraphrase such as 'wicked perversities.'
