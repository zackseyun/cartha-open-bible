id: PRO.2.15
reference: Proverbs 2:15
source:
  edition: WLC
  text: אֲשֶׁ֣ר אָרְחֹתֵי/הֶ֣ם עִקְּשִׁ֑ים וּ֝/נְלוֹזִ֗ים בְּ/מַעְגְּלוֹתָֽ/ם׃
translation:
  text: whose paths are crooked, and who are devious in their ways,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whose ways are crooked, and who are twisted in their paths.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: whose
  alternatives:
  - who
  - those whose
  lexicon: HALOT
  rationale: Relative particle linking back to the preceding plural referent ('men'
    in the prior verse). 'Whose' fits the following possessive construction with 'paths'
    more naturally than a simple 'who.'
- source_word: אָרְחֹתֵיהֶם
  chosen: paths
  alternatives:
  - ways
  - roads
  lexicon: HALOT
  rationale: אֹרַח commonly denotes a path or way of life. 'Paths' preserves the concrete
    metaphor and pairs well with the parallel term 'tracks' later in the verse.
- source_word: עִקְּשִׁים
  chosen: crooked
  alternatives:
  - perverse
  - twisted
  lexicon: HALOT
  rationale: Describes something bent or morally distorted. 'Crooked' is idiomatic
    in English wisdom literature and preserves both the path imagery and moral sense
    without sounding overly archaic.
- source_word: וּנְלוֹזִים
  chosen: devious
  alternatives:
  - wayward
  - perverse
  - twisted aside
  lexicon: HALOT
  rationale: From a root conveying turning aside, deviating, or being morally twisted.
    'Devious' communicates moral deviation in readable modern English and avoids flattening
    the nuance into mere physical movement.
- source_word: בְּמַעְגְּלוֹתָם
  chosen: in their tracks
  alternatives:
  - in their paths
  - in their ways
  - in their courses
  lexicon: HALOT
  rationale: מַעְגָּל refers to a track, course, or path. Rendering it as 'tracks'
    preserves the poetic parallel with 'paths' while avoiding exact repetition in
    English.
