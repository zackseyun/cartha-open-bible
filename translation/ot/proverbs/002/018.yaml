- issue: Meaning of רְפָאִים in wisdom-poetic context
  chosen_reading: the dead
  alternative_readings:
  - the shades
  - the departed spirits
  rationale: The term here denotes the realm or inhabitants of death rather than a tribal name. To avoid importing speculative cosmology while preserving the warning's force, the main text uses 'the dead' and a footnote preserves the more literal-poetic alternative 'the shades.'
