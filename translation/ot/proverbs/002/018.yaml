id: PRO.2.18
reference: Proverbs 2:18
source:
  edition: WLC
  text: כִּ֤י שָׁ֣חָה אֶל מָ֣וֶת בֵּיתָ֑/הּ וְ/אֶל רְ֝פָאִ֗ים מַעְגְּלֹתֶֽי/הָ־־׃
translation:
  text: For her house sinks down to death[a], and her paths to the dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the shades,' a poetic term for the departed dead.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for avoiding the forbidden woman in the surrounding context. 'For' preserves the explanatory force in concise English.
- source_word: שָׁחָה
  chosen: sinks down
  alternatives:
  - has sunk down
  - bows down
  - inclines
  lexicon: HALOT
  rationale: The verb denotes sinking/bending low. In this context of descent toward death, 'sinks down' captures the vivid downward movement better than the more static 'bows down' or the overly interpretive 'leads down'.
- source_word: אֶל מָוֶת
  chosen: to death
  alternatives:
  - toward death
  lexicon: HALOT
  rationale: The preposition marks direction toward death. 'To death' is idiomatic and preserves the destination without overexpanding the phrase.
- source_word: בֵּיתָהּ
  chosen: her house
  alternatives:
  - her household
  lexicon: HALOT
  rationale: The noun is literally 'house' with 3fs suffix. In Proverbs, 'house' can carry both literal and extended household associations, but the concrete image is best preserved in the main text.
- source_word: וְאֶל
  chosen: and
  alternatives:
  - and to
  lexicon: HALOT
  rationale: The second preposition is absorbed naturally into English syntax. The directional sense is then expressed by the verb phrase 'lead to' in the second colon.
- source_word: רְפָאִים
  chosen: the dead
  alternatives:
  - the shades
  - the departed spirits
  - Rephaim
  lexicon: HALOT
  rationale: In wisdom literature this term refers to the dead in Sheol, not the ethnic Rephaim. 'The dead' is the clearest accessible rendering in modern English; the more specific nuance 'shades' is preserved in a footnote.
- source_word: מַעְגְּלֹתֶיהָ
  chosen: her tracks
  alternatives:
  - her paths
  - her courses
  lexicon: HALOT
  rationale: The noun refers to tracks or paths. 'Tracks' gives a slightly more concrete image and avoids flattening the poetic parallel with 'house'; it also suggests the habitual course of life associated with her.
