id: PRO.2.1
reference: Proverbs 2:1
source:
  edition: WLC
  text: בְּ֭נִ/י אִם תִּקַּ֣ח אֲמָרָ֑/י וּ֝/מִצְוֺתַ֗/י תִּצְפֹּ֥ן אִתָּֽ/ךְ־׃
translation:
  text: My son, if you receive my words and store up my commandments with you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “My child.” The Hebrew is masculine singular (“my son”), the standard
      form of paternal instruction in Proverbs.
    reason: lexical_alternative
  - marker: b
    text: Or “treasure up.” The Hebrew verb can convey storing something carefully
      for safekeeping.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנִי
  chosen: My son
  alternatives:
  - My child
  lexicon: HALOT
  rationale: Vocative address from father/teacher to son. Per doctrine, gender-accurate
    rendering is preferred over gender-neutral; the masculine singular is retained
    in the main text.
- source_word: אִם
  chosen: if
  alternatives:
  - when
  lexicon: HALOT
  rationale: Introduces a conditional protasis. 'If' best preserves the straightforward
    conditional force here.
- source_word: תִּקַּח
  chosen: you receive
  alternatives:
  - you take
  - you accept
  lexicon: HALOT
  rationale: Though the verb literally means 'take,' in wisdom-instruction context
    with 'my words' it idiomatically conveys receptive acceptance. 'Receive' is natural
    English while staying close to the Hebrew sense.
- source_word: אֲמָרַי
  chosen: my words
  alternatives:
  - my sayings
  lexicon: HALOT
  rationale: Plural of אמר in wisdom literature can mean spoken words or sayings.
    'My words' is slightly more formal and pairs well with the following 'my commandments'
    without over-specifying genre.
- source_word: וּמִצְוֺתַי
  chosen: and my commandments
  alternatives:
  - and my commands
  lexicon: HALOT
  rationale: מִצְוָה commonly denotes commandment/command. 'Commandments' preserves
    the instructional and moral weight of the term and maintains consistency with
    common biblical usage.
- source_word: תִּצְפֹּן
  chosen: store up
  alternatives:
  - treasure up
  - hide
  - keep in store
  lexicon: HALOT
  rationale: The verb literally involves hiding/treasuring something for safekeeping.
    'Store up' communicates intentional retention in accessible modern English; 'treasure
    up' is a viable alternative with slightly more affective nuance.
- source_word: אִתָּךְ
  chosen: with you
  alternatives:
  - within you
  - beside you
  lexicon: HALOT
  rationale: The preposition with pronominal suffix most directly means 'with you.'
    In context it conveys keeping the commandments in one's possession or close custody.
    'With you' preserves the Hebrew image without interpretive expansion.
