theological_decisions:
- issue: Moral metaphor of darkness
  chosen_reading: Rendered 'darkness' without explicating it as evil in the main text.
  alternative_readings:
  - wickedness
  - evil
  rationale: The Hebrew image itself conveys moral deviation through the wisdom metaphor
    of dark versus upright paths. Expanding to 'evil' would interpret rather than
    translate. This preserves theological tension and metaphorical richness.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
