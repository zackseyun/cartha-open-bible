id: PRO.2.13
reference: Proverbs 2:13
source:
  edition: WLC
  text: הַ֭/עֹ֣זְבִים אָרְח֣וֹת יֹ֑שֶׁר לָ֝/לֶ֗כֶת בְּ/דַרְכֵי חֹֽשֶׁךְ־׃
translation:
  text: who abandon the paths of uprightness to walk in the ways of darkness,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who forsake the paths of what is right.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֹזְבִים
  chosen: who abandon
  alternatives:
  - those who forsake
  - who leave
  lexicon: HALOT
  rationale: Participle from עזב functioning substantivally in context, describing
    the kind of people under discussion from the previous verse. 'Abandon' is natural
    modern English and preserves the deliberate sense of forsaking.
- source_word: אָרְחוֹת
  chosen: the paths of
  alternatives:
  - the ways of
  - the tracks of
  lexicon: HALOT
  rationale: Plural of אֹרַח, a common wisdom-term for one's course of life. 'Paths'
    preserves the metaphor and pairs well with the following 'ways of darkness' without
    flattening the imagery.
- source_word: יֹשֶׁר
  chosen: uprightness
  alternatives:
  - straightness
  - integrity
  - what is right
  lexicon: HALOT
  rationale: In wisdom literature יֹשֶׁר denotes moral straightness/uprightness. 'Uprightness'
    best preserves the ethical sense while fitting the path metaphor.
- source_word: לָלֶכֶת
  chosen: to walk
  alternatives:
  - to go
  - to proceed
  lexicon: HALOT
  rationale: Hebrew הלך is frequently used metaphorically for conduct. 'To walk' is
    idiomatic in biblical English and preserves the moral-lifestyle metaphor central
    to Proverbs.
- source_word: בְּדַרְכֵי
  chosen: in the ways of
  alternatives:
  - on the paths of
  - in the paths of
  lexicon: HALOT
  rationale: Plural construct of דֶּרֶךְ. 'Ways of' is a natural construct rendering
    and maintains the parallelism with 'paths of uprightness.'
- source_word: חֹשֶׁךְ
  chosen: darkness
  alternatives:
  - gloom
  - the dark
  lexicon: HALOT
  rationale: In Proverbs darkness commonly carries moral as well as experiential connotations.
    'Darkness' preserves both the literal metaphor and the ethical force without over-interpreting.
