id: PRO.12.24
reference: Proverbs 12:24
source:
  edition: WLC
  text: יַד חָרוּצִ֥ים תִּמְשׁ֑וֹל ו֝/רְמִיָּ֗ה תִּהְיֶ֥ה לָ/מַֽס־׃
translation:
  text: The hand of the diligent will rule[b][a], but the slack will be put to forced labor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'laziness' for 'slackness.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew מַס refers to compulsory labor service, sometimes called corvée or tribute labor.
    reason: cultural_note
lexical_decisions:
- source_word: יַד
  chosen: hand
  alternatives:
  - power
  - control
  lexicon: HALOT
  rationale: Retained the concrete noun 'hand' as a common Hebrew metonym for agency or capacity. In English this preserves the proverb's vividness without obscuring the sense.
- source_word: חָרוּצִים
  chosen: the diligent
  alternatives:
  - the industrious
  - the hard-working
  lexicon: HALOT
  rationale: Rendered as 'the diligent' to capture the adjective/noun sense of people marked by industriousness. This is idiomatic in English wisdom literature and fits the contrast with רְמִיָּה.
- source_word: תִּמְשׁוֹל
  chosen: will rule
  alternatives:
  - will govern
  - will have dominion
  lexicon: HALOT
  rationale: The verb from משל commonly means 'rule' or 'govern.' 'Will rule' is the most natural and concise English equivalent here, expressing ascendancy or authority resulting from diligence.
- source_word: רְמִיָּה
  chosen: slackness
  alternatives:
  - laziness
  - deceitfulness
  - the slack
  lexicon: HALOT
  rationale: In Proverbs this noun can denote slackness, laziness, or a negligent disposition. Here the contrast with diligence and the consequence of corvée labor favor 'slackness' rather than 'deceitfulness.' The abstract noun also matches the Hebrew form well.
- source_word: תִּהְיֶה
  chosen: will be put
  alternatives:
  - will become
  - will be
  lexicon: HALOT
  rationale: The simple verb 'be' is idiomatically expanded in English to 'will be put' to make the predicate relation natural with לָמַס and to convey resulting subjection without overtranslating.
- source_word: לָמַס
  chosen: to forced labor
  alternatives:
  - for tribute labor
  - to corvée
  - to taskwork
  lexicon: HALOT
  rationale: מַס refers to compulsory labor service or corvée, not merely taxation in money. 'Forced labor' communicates the social reality clearly in modern English while preserving the proverb's warning.
