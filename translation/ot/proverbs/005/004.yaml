id: PRO.5.4
reference: Proverbs 5:4
source:
  edition: WLC
  text: וְֽ֭/אַחֲרִיתָ/הּ מָרָ֣ה כַֽ/לַּעֲנָ֑ה חַ֝דָּ֗ה כְּ/חֶ֣רֶב פִּיּֽוֹת׃
translation:
  text: but in the end she is bitter like wormwood[a], sharp like a two-edged sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'but her end is bitter like wormwood, sharp like a two-edged sword.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחֲרִיתָהּ
  chosen: but in the end she
  alternatives:
  - but her end
  - but afterward she
  lexicon: HALOT
  rationale: אַחֲרִית means 'end, latter end, outcome.' With the 3fs suffix it refers to the woman's eventual outcome/state. Rendering idiomatically as 'in the end she' preserves the contrast with the previous verse and yields natural English while keeping the feminine referent explicit.
- source_word: מָרָה
  chosen: is bitter
  alternatives:
  - bitter
  - becomes bitter
  lexicon: HALOT
  rationale: Adjectival predicate describing her outcome. Supplying 'is' is required in English. 'Bitter' preserves the metaphorical sense of something grievous or painful in result.
- source_word: כַלַּעֲנָה
  chosen: like wormwood
  alternatives:
  - like absinthe
  - like bitterness
  lexicon: HALOT
  rationale: לענה denotes wormwood, a plant proverbially associated with bitterness. 'Wormwood' is the standard and most transparent biblical rendering; it preserves the concrete image better than an abstract gloss.
- source_word: חַדָּה
  chosen: sharp
  alternatives:
  - keen
  - cutting
  lexicon: HALOT
  rationale: The adjective means 'sharp' and modifies the sword comparison. 'Sharp' is the most direct and idiomatic English equivalent.
- source_word: כְּחֶרֶב פִּיּוֹת
  chosen: like a double-edged sword
  alternatives:
  - like a two-edged sword
  - like a sword of edges
  lexicon: HALOT
  rationale: Literally 'like a sword of mouths/edges,' an idiom for a sword with two edges. 'Double-edged sword' is clear modern English and preserves the force of the Hebrew idiom.
