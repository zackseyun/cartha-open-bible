id: PRO.23.8
reference: Proverbs 23:8
source:
  edition: WLC
  text: פִּֽתְּ/ךָ אָכַ֥לְתָּ תְקִיאֶ֑/נָּה וְ֝/שִׁחַ֗תָּ דְּבָרֶ֥י/ךָ הַ/נְּעִימִֽים־׃
translation:
  text: You will vomit up the morsel you have eaten[a], and you will waste your pleasant words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sweet words' or 'gracious words.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּתְּךָ
  chosen: the morsel you ate
  alternatives:
  - your morsel
  - the piece of food you ate
  - your bite
  lexicon: HALOT
  rationale: פַּת commonly denotes a piece, bit, or morsel of bread/food. In English, 'morsel' best preserves the concise proverbial image without over-specifying bread. Because the suffix is second masculine singular ('your'), the sense is the morsel consumed by the addressee; idiomatic English expresses this naturally as 'the morsel you ate.'
- source_word: אָכַלְתָּ
  chosen: you ate
  alternatives:
  - you have eaten
  lexicon: HALOT
  rationale: 'Qal perfect 2ms of ''eat.'' In this proverb, simple past in English fits the sequence naturally: the food already eaten is later vomited up.'
- source_word: תְקִיאֶנָּה
  chosen: you will vomit up
  alternatives:
  - you will spit out
  - you will vomit it up
  lexicon: HALOT
  rationale: Hiphil 2ms with 3fs suffix from קיא means to vomit. 'Vomit up' is the most direct and vivid equivalent, matching the force of the Hebrew image better than the softer 'spit out.' The feminine suffix refers back to פַּת ('morsel').
- source_word: וְשִׁחַתָּ
  chosen: you will waste
  alternatives:
  - you will ruin
  - you will lose
  - you will have spoiled
  lexicon: HALOT
  rationale: From שׁחת, here in parallel with the previous clause, the sense is that the addressee's gracious speech will have been expended to no benefit. 'Waste' captures the pragmatic result in readable English; 'ruin' is possible but less idiomatic with 'words.'
- source_word: דְּבָרֶיךָ
  chosen: your words
  alternatives:
  - your speech
  - what you said
  lexicon: HALOT
  rationale: Straightforward plural construct with 2ms suffix. 'Your words' preserves the lexical form and proverbial terseness.
- source_word: הַנְּעִימִים
  chosen: pleasant
  alternatives:
  - sweet
  - gracious
  - agreeable
  lexicon: HALOT
  rationale: The adjective denotes pleasantness or agreeableness. 'Pleasant' is semantically broad and natural; 'sweet words' is possible, but in contemporary English may sound overly literal or sentimental. The phrase refers to courteous or ingratiating speech offered to the host.
