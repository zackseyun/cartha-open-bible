id: PRO.18.3
reference: Proverbs 18:3
source:
  edition: WLC
  text: בְּֽ/בוֹא רָ֭שָׁע בָּ֣א גַם בּ֑וּז וְֽ/עִם קָל֥וֹן חֶרְפָּֽה־־־׃
translation:
  text: When wickedness comes[a], contempt also comes, and with dishonor comes reproach.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When the wicked comes, scorn also comes, and with shame comes disgrace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּבוֹא
  chosen: When ... comes
  alternatives:
  - At the coming of
  - With the coming of
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of בוא introduces a temporal circumstance, naturally rendered 'when ... comes' in English. This preserves the proverb's concise temporal framing while remaining idiomatic.
- source_word: רָשָׁע
  chosen: a wicked man
  alternatives:
  - the wicked
  - a wicked person
  lexicon: HALOT
  rationale: The singular masculine adjective/noun denotes an individual characterized by wickedness. 'A wicked man' preserves the gendered singular form per the translation philosophy's gender-accurate principle, while functioning proverbially as a representative individual.
- source_word: בָּא
  chosen: comes
  alternatives:
  - arrives
  - enters
  lexicon: HALOT
  rationale: The finite verb repeats the root בוא for emphasis and parallelism. 'Comes' best preserves the repetition with the opening infinitive and keeps the proverb's rhythm.
- source_word: גַם
  chosen: also
  alternatives:
  - even
  - too
  lexicon: HALOT
  rationale: 'גַם adds an accompanying element: when the wicked comes, contempt comes as well. ''Also'' is the most straightforward additive rendering.'
- source_word: בּוּז
  chosen: contempt
  alternatives:
  - despising
  - scorn
  lexicon: HALOT
  rationale: בּוּז denotes contempt or scorn. 'Contempt' fits the abstract noun form and pairs well with the following abstract nouns in the verse.
- source_word: וְעִם
  chosen: and with
  alternatives:
  - with
  - together with
  lexicon: HALOT
  rationale: The conjunction plus preposition marks accompaniment in the second colon. Rendering both elements as 'and with' preserves the Hebrew linkage and the proverb's parallel structure.
- source_word: קָלוֹן
  chosen: dishonor
  alternatives:
  - shame
  - disgrace
  lexicon: HALOT
  rationale: קָלוֹן denotes public shame or dishonor. 'Dishonor' works well in parallel with 'reproach' and avoids overloading both nouns with the same English semantic field.
- source_word: חֶרְפָּה
  chosen: reproach
  alternatives:
  - disgrace
  - insult
  lexicon: HALOT
  rationale: חֶרְפָּה often carries the sense of reproach, taunt, or disgrace brought upon someone. 'Reproach' preserves the relational and public aspect of the noun and distinguishes it from קָלוֹן.
