id: PRO.18.5
reference: Proverbs 18:5
source:
  edition: WLC
  text: שְׂאֵ֣ת פְּנֵי רָשָׁ֣ע לֹא ט֑וֹב לְ/הַטּ֥וֹת צַ֝דִּ֗יק בַּ/מִּשְׁפָּֽט־־׃
translation:
  text: To show partiality to the wicked is not good[b][a], nor to deprive the righteous of justice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'to lift up the face of the wicked,' an idiom meaning to show favoritism or partiality.
    reason: lexical_alternative
  - marker: b
    text: Or 'to turn aside the righteous in judgment.'
    reason: alternative_reading
lexical_decisions:
- source_word: שְׂאֵת פְּנֵי
  chosen: to show partiality
  alternatives:
  - to lift up the face
  - to accept the person/face
  lexicon: HALOT
  rationale: The idiom literally involves 'lifting the face' and in judicial contexts means showing favor or partiality. 'Show partiality' best conveys the idiomatic sense in clear modern English.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - a wicked person
  - the guilty
  lexicon: HALOT
  rationale: The singular adjective functions substantivally. 'The wicked' is concise and preserves the moral category without over-specifying legal guilt.
- source_word: לֹא טוֹב
  chosen: is not good
  alternatives:
  - is not right
  - is not fitting
  lexicon: HALOT
  rationale: A straightforward rendering preserves the Hebrew evaluation. English readers will understand the moral disapproval without needing expansion.
- source_word: לְהַטּוֹת
  chosen: to deprive
  alternatives:
  - to turn aside
  - to pervert
  - to bend away
  lexicon: HALOT
  rationale: The verb literally means 'to turn aside' and in legal context refers to bending justice against someone. 'Deprive' communicates the effect in idiomatic English while keeping the judicial force.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - the innocent
  - a righteous person
  lexicon: HALOT
  rationale: The term can denote one who is righteous or in the right. 'The righteous' preserves the broader moral-legal sense and matches common wisdom usage.
- source_word: בַּמִּשְׁפָּט
  chosen: of justice in court
  alternatives:
  - in judgment
  - in court
  - in legal judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט here is judicial. Rendering the phrase as 'of justice in court' brings out both the object denied and the legal setting implied by the Hebrew.
