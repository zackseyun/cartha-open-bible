id: PRO.31.9
reference: Proverbs 31:9
source:
  edition: WLC
  text: פְּתַח פִּ֥י/ךָ שְׁפָט צֶ֑דֶק וְ֝/דִ֗ין עָנִ֥י וְ/אֶבְיֽוֹן־־׃פ
translation:
  text: Open your mouth[a], judge righteously, and plead the cause of the poor and needy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Speak up, judge justly, and plead for the poor and needy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּתַח פִּיךָ
  chosen: Open your mouth
  alternatives:
  - Speak up
  lexicon: HALOT
  rationale: Literal imperative plus object; in English this idiom means to speak. Retaining 'mouth' preserves the Hebrew imagery and the emphatic call to verbal advocacy better than the more interpretive 'speak up'.
- source_word: שְׁפָט
  chosen: judge
  alternatives:
  - give judgment
  - pronounce judgment
  lexicon: HALOT
  rationale: Imperative of שׁפט commonly means 'judge' or 'render judgment.' 'Judge' is concise and natural, while still preserving the judicial sense.
- source_word: צֶדֶק
  chosen: righteously
  alternatives:
  - with righteousness
  - justly
  lexicon: HALOT
  rationale: Here צֶדֶק functions adverbially with שְׁפָט. 'Righteously' preserves the lexical link to righteousness, while 'justly' is a viable contextual alternative. The adverbial English is smoother than the more wooden 'judge righteousness' or 'judge with righteousness.'
- source_word: וְדִין
  chosen: defend the cause of
  alternatives:
  - plead for
  - give justice to
  - vindicate
  lexicon: HALOT
  rationale: The verb דין can mean to judge, contend, or plead a case. In parallel with the call to judicial action on behalf of vulnerable people, 'defend the cause of' best captures advocacy within a legal-justice frame and reads naturally in English.
- source_word: עָנִי
  chosen: the poor
  alternatives:
  - the afflicted
  - the humble
  lexicon: HALOT
  rationale: In wisdom and legal contexts עָנִי commonly denotes the poor or afflicted person. 'The poor' is the clearest and most idiomatic rendering here.
- source_word: אֶבְיוֹן
  chosen: needy
  alternatives:
  - destitute
  - poor
  lexicon: HALOT
  rationale: אֶבְיוֹן often overlaps with עָנִי but adds the sense of neediness or destitution. Rendering it as 'needy' preserves the paired distinction without awkward repetition.
