id: PRO.22.8
reference: Proverbs 22:8
source:
  edition: WLC
  text: זוֹרֵ֣עַ עַ֭וְלָה יקצור אָ֑וֶן וְ/שֵׁ֖בֶט עֶבְרָת֣/וֹ יִכְלֶֽה־׃
translation:
  text: Whoever sows injustice will reap trouble, and the rod of his fury will come
    to an end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'calamity,' 'disaster,' or 'sorrow' for 'trouble.' The Hebrew אָוֶן can
      denote harmful consequence or misery.
    reason: lexical_alternative
  - marker: b
    text: Or 'the rod of his wrath will come to an end.' The Hebrew phrase may refer
      to the collapse of the wrongdoer's angry power.
    reason: alternative_reading
lexical_decisions:
- source_word: זוֹרֵעַ
  chosen: Whoever sows
  alternatives:
  - He who sows
  - The one who sows
  lexicon: HALOT
  rationale: Qal participle masculine singular used generically in a wisdom saying.
    'Whoever sows' conveys the habitual/generic force in natural English while preserving
    the agricultural metaphor.
- source_word: עַוְלָה
  chosen: injustice
  alternatives:
  - wrongdoing
  - unrighteousness
  - iniquity
  lexicon: HALOT
  rationale: The noun denotes injustice or wrong. 'Injustice' fits wisdom-context
    ethics and is clearer in modern English than 'iniquity,' while retaining moral
    weight.
- source_word: יקצור
  chosen: will reap
  alternatives:
  - reaps
  - shall reap
  lexicon: HALOT
  rationale: 'Imperfect verb in proverbial sequence naturally rendered as future-like
    consequence in English: sowing leads to reaping.'
- source_word: אָוֶן
  chosen: trouble
  alternatives:
  - calamity
  - disaster
  - wickedness
  - sorrow
  lexicon: HALOT
  rationale: The noun can denote trouble, disaster, or harmful consequence. Here it
    is the harvest/result of injustice, so 'trouble' captures the resulting misery
    without over-specifying either moral evil or external catastrophe.
- source_word: וְשֵׁבֶט
  chosen: and the rod
  alternatives:
  - and the staff
  - and the scepter
  lexicon: HALOT
  rationale: שֵׁבֶט commonly means rod, staff, or scepter. In this context of punitive
    force or power, 'rod' best matches the image of striking authority.
- source_word: עֶבְרָתוֹ
  chosen: his fury
  alternatives:
  - his wrath
  - his rage
  - his arrogance
  lexicon: HALOT
  rationale: From עֶבְרָה, commonly 'wrath/fury.' Some interpreters connect the phrase
    to the force of an oppressor's anger or violent power. 'Fury' is vivid and natural;
    'wrath' is possible but slightly more archaic in this proverb.
- source_word: יִכְלֶה
  chosen: will fail
  alternatives:
  - will come to an end
  - will perish
  - will be exhausted
  lexicon: HALOT
  rationale: כלה in the imperfect can mean be finished, come to an end, or be consumed.
    With 'rod of his fury,' the sense is that his instrument/power will be brought
    to nothing; 'will fail' is concise and idiomatic.
