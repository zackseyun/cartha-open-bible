theological_decisions:
- issue: Interpretation of the final clause וְשֵׁבֶט עֶבְרָתוֹ יִכְלֶה
  chosen_reading: 'The phrase refers to the eventual collapse of the wrongdoer''s
    angry power: ''the rod of his fury will fail.'''
  alternative_readings:
  - '''the rod of his arrogance will fail'''
  - '''the rod for his fury will be spent'''
  - 'Text-critical proposals reflected in some versions: ''the rod of his anger will
    be finished'''
  rationale: The Hebrew as pointed most naturally reads 'rod of his fury/wrath.' In
    context, the proverb states both retributive consequence ('reap trouble') and
    the end of the oppressor's power. This preserves the Hebrew imagery without importing
    a more specific doctrinal claim.
  doctrine_reference: Translation philosophy §§1, 3, 6
