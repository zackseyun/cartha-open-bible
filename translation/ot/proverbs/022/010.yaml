id: PRO.22.10
reference: Proverbs 22:10
source:
  edition: WLC
  text: גָּ֣רֵֽשׁ לֵ֭ץ וְ/יֵצֵ֣א מָד֑וֹן וְ֝/יִשְׁבֹּ֗ת דִּ֣ין וְ/קָלֽוֹן׃
translation:
  text: Drive out a scoffer[a], and strife will go out[b]; judgment and disgrace will cease.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mocker' for 'scoffer.' The Hebrew לֵץ is a stock wisdom term for a person who arrogantly ridicules correction and wisdom.
    reason: lexical_alternative
  - marker: b
    text: '''Contention'' translates Hebrew דִּין here in the sense of dispute or quarrel; elsewhere the word can mean ''judgment'' or ''legal case.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּרֵשׁ
  chosen: Drive out
  alternatives:
  - Cast out
  - Expel
  lexicon: HALOT
  rationale: Imperative masculine singular from גרשׁ, denoting forcing someone away or expelling. 'Drive out' is natural modern English and preserves the force of removal better than the softer 'send away.'
- source_word: לֵץ
  chosen: a scoffer
  alternatives:
  - a mocker
  - a scorner
  lexicon: HALOT
  rationale: לץ in Proverbs denotes a person characterized by arrogant derision and resistance to wisdom. 'Scoffer' captures the moral-psychological profile well; 'mocker' is possible, but 'scoffer' better fits wisdom-literature usage in English.
- source_word: מָדוֹן
  chosen: strife
  alternatives:
  - quarreling
  - contention
  lexicon: HALOT
  rationale: מדון refers to discord, dispute, or strife. 'Strife' is concise and idiomatic here, especially paired with the verb 'go out' as a consequence of expelling the scoffer.
- source_word: וְיֵצֵא
  chosen: will go out
  alternatives:
  - goes out
  - will depart
  lexicon: HALOT
  rationale: 'Though formally an imperfect, in proverbial instruction it expresses expected result following the imperative. English future best conveys the consequence: if the scoffer is driven out, strife will go out.'
- source_word: וְיִשְׁבֹּת
  chosen: will cease
  alternatives:
  - will stop
  - will come to an end
  lexicon: HALOT
  rationale: From שׁבת, 'cease, stop, come to an end.' 'Will cease' is concise, elevated without being archaic, and fits the proverbial parallelism.
- source_word: דִּין
  chosen: contention
  alternatives:
  - judgment
  - legal dispute
  - quarreling
  lexicon: HALOT
  rationale: Although דין can mean 'judgment' or 'legal case,' in this context parallel to מדון and followed by קלון, it most likely denotes dispute or contention rather than formal judicial judgment. Rendering it 'contention' preserves the relational-conflict sense of the proverb.
- source_word: קָלוֹן
  chosen: disgrace
  alternatives:
  - shame
  - dishonor
  lexicon: HALOT
  rationale: קלון denotes shame, dishonor, or disgrace. 'Disgrace' works well in parallel with 'contention' and reflects the social reproach produced by ongoing conflict.
