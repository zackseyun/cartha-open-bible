id: PRO.22.3
reference: Proverbs 22:3
source:
  edition: WLC
  text: עָר֤וּם רָאָ֣ה רָעָ֣ה ו/יסתר וּ֝/פְתָיִ֗ים עָבְר֥וּ וְֽ/נֶעֱנָֽשׁוּ׀׃
translation:
  text: A prudent man sees danger and hides himself[b][a], but the simple pass on and suffer for it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'evil,' 'harm,' or 'trouble' for 'danger.' The Hebrew term can denote moral evil or calamity; here it refers to a threatening circumstance the prudent recognizes.
    reason: lexical_alternative
  - marker: b
    text: Or 'are punished.' The Hebrew may emphasize penalty, but in wisdom literature it can also describe suffering the consequences of one's course.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרוּם
  chosen: prudent man
  alternatives:
  - shrewd man
  - sensible man
  - crafty man
  lexicon: HALOT
  rationale: In Proverbs this adjective commonly carries the positive sense of prudence or shrewd discernment rather than deceit. 'Prudent' fits the wisdom context well. 'Man' preserves the masculine singular form in line with the gender-accurate policy, while still functioning proverbially.
- source_word: רָאָה
  chosen: sees
  alternatives:
  - has seen
  - perceives
  lexicon: HALOT
  rationale: The qatal in proverbial style expresses a general truth; present-tense English is natural. 'Sees' keeps the concrete metaphor of noticing what is ahead.
- source_word: רָעָה
  chosen: danger
  alternatives:
  - evil
  - harm
  - trouble
  lexicon: HALOT
  rationale: Although the noun can mean 'evil' or 'calamity,' in this proverb the sense is an impending harmful circumstance that the prudent detects and avoids. 'Danger' communicates that practical wisdom setting more clearly in modern English.
- source_word: וַיִּסָּתֵר / ו/יסתר
  chosen: hides himself
  alternatives:
  - conceals himself
  - takes cover
  lexicon: HALOT
  rationale: The Niphal conveys reflexive/passive withdrawal for protection. 'Hides himself' is a natural and fairly literal rendering that matches the proverb's imagery.
- source_word: פְתָיִם
  chosen: the simple
  alternatives:
  - the naive
  - the gullible
  - the inexperienced
  lexicon: HALOT
  rationale: A standard wisdom-term for the inexperienced or naive who lack discernment. 'The simple' preserves the established wisdom vocabulary and contrasts well with 'prudent.'
- source_word: עָבְרוּ
  chosen: pass on
  alternatives:
  - go on
  - keep going
  - pass by
  lexicon: HALOT
  rationale: The verb here describes continuing ahead without taking evasive action. 'Pass on' is concise and idiomatic in English.
- source_word: וְנֶעֱנָשׁוּ
  chosen: suffer for it
  alternatives:
  - are punished
  - pay the penalty
  - incur harm
  lexicon: HALOT
  rationale: The Niphal of ענש can denote being penalized or suffering the consequences. 'Suffer for it' preserves the result without over-specifying whether the consequence is judicial punishment or the natural outcome of folly; this suits the proverb's general wisdom setting.
