id: PRO.22.24
reference: Proverbs 22:24
source:
  edition: WLC
  text: אַל תִּ֭תְרַע אֶת בַּ֣עַל אָ֑ף וְ/אֶת אִ֥ישׁ חֵ֝מוֹת לֹ֣א תָבֽוֹא־־־׃
translation:
  text: Do not befriend a man given to anger, and do not go with a man of wrath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'associate with an angry man.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'do not come with'; the sense here is joining or keeping company
      with such a person.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתְרַע
  chosen: befriend
  alternatives:
  - associate with
  - make friends with
  lexicon: HALOT
  rationale: From רעה in the Hitpael, the sense is to associate closely or become
    a companion/friend. 'Befriend' captures the relational force more naturally than
    the more general 'associate with.'
- source_word: בַּעַל אָף
  chosen: a man given to anger
  alternatives:
  - an angry man
  - a master of anger
  lexicon: HALOT
  rationale: בעל plus a noun often denotes one characterized by that quality. אָף
    literally means 'nose' and by extension 'anger.' 'A man given to anger' preserves
    the idiomatic sense without woodenly reproducing the Hebrew form.
- source_word: אִישׁ חֵמוֹת
  chosen: a man of wrath
  alternatives:
  - a hot-tempered man
  - a furious man
  lexicon: HALOT
  rationale: אישׁ with חֵמוֹת expresses a person marked by wrathful outbursts. 'A
    man of wrath' is concise and retains the Hebrew's character-description; the parallelism
    with the first line supports a closely corresponding rendering.
- source_word: תָבֽוֹא
  chosen: go with
  alternatives:
  - come with
  - enter into company with
  lexicon: HALOT
  rationale: בוא literally means 'come,' but in this context of social association
    and in parallel with תתרע, the idiomatic sense is joining or accompanying someone.
    'Go with' communicates the warning against entering that person's company.
- source_word: אַל ... לֹא
  chosen: Do not ... and do not
  alternatives:
  - Do not ... nor
  lexicon: HALOT
  rationale: The verse uses two prohibitions in parallel. Rendering both explicitly
    as 'do not' preserves the Hebrew structure and the force of the warning.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and functions proverbially
    for a representative individual. Per translation philosophy, gender-accurate rendering
    is preferred, so 'man' is retained rather than neutralizing to 'person'.
