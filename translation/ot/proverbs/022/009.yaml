id: PRO.22.9
reference: Proverbs 22:9
source:
  edition: WLC
  text: טֽוֹב עַ֭יִן ה֣וּא יְבֹרָ֑ךְ כִּֽי נָתַ֖ן מִ/לַּחְמ֣/וֹ לַ/דָּֽל־־׃
translation:
  text: He who has a generous eye will be blessed, for he gives some of his bread
    to the poor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'a good eye,' an idiom for generosity or bountifulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב עַיִן
  chosen: a generous eye
  alternatives:
  - a good eye
  - a bountiful eye
  - one with a generous eye
  lexicon: HALOT
  rationale: The Hebrew idiom 'good eye' refers to generosity rather than physical
    sight or mere moral quality. Rendering it as 'generous eye' preserves the metaphor
    while making the sense clear in English.
- source_word: יְבֹרָךְ
  chosen: will be blessed
  alternatives:
  - is blessed
  - shall be blessed
  lexicon: HALOT
  rationale: The verb is passive ('be blessed'). English future 'will be blessed'
    fits proverbial style and conveys the expected result without implying a specific
    agent.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the ground or explanation for the preceding statement.
    'For' is concise and proverbially natural.
- source_word: נָתַן
  chosen: gives
  alternatives:
  - has given
  - gave
  lexicon: HALOT
  rationale: Although morphologically perfect, in proverbial discourse the perfect
    often expresses characteristic action. Present 'gives' communicates habitual generosity
    better than a simple past.
- source_word: מִלַּחְמוֹ
  chosen: some of his bread
  alternatives:
  - from his bread
  - of his food
  lexicon: HALOT
  rationale: The preposition מִן indicates giving from one's own provision, not necessarily
    the whole loaf. 'Bread' is retained rather than generalized to 'food' to preserve
    the concrete imagery, while 'some of' makes the partitive force natural in English.
- source_word: לַדָּל
  chosen: to the poor
  alternatives:
  - to the needy
  - to the weak
  lexicon: HALOT
  rationale: דַּל commonly denotes the poor or economically weak. 'The poor' is the
    most direct and idiomatic rendering here.
