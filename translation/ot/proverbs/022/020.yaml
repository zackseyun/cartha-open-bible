id: PRO.22.20
reference: Proverbs 22:20
source:
  edition: WLC
  text: הֲ/לֹ֤א כָתַ֣בְתִּי לְ֭/ךָ שלשום בְּ/מ֖וֹעֵצֹ֣ת וָ/דָֽעַת׃
translation:
  text: Have I not written for you thirty sayings of counsel and knowledge?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Have I not written for you before now about counsel and knowledge?'
      The Hebrew word traditionally rendered 'formerly' is difficult here; many understand
      it instead as 'thirty,' possibly referring to a collection of thirty sayings.
    reason: alternative_reading
  - marker: b
    text: Traditional English versions often read 'excellent things' instead of 'thirty
      sayings.' This reflects a different construal of the difficult Hebrew expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Have I not
  alternatives:
  - Did I not
  - Surely I have
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Have
    I not' preserves the interrogative force and natural English idiom.
- source_word: כָתַבְתִּי
  chosen: written
  alternatives:
  - wrote
  lexicon: HALOT
  rationale: Qal perfect 1cs of כתב. In English, present perfect works smoothly with
    the rhetorical question ('Have I not written') and reflects a completed action
    with present relevance.
- source_word: לְךָ
  chosen: for you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: The preposition ל can indicate direction or benefit. 'For you' fits the
    instructional context of Proverbs, suggesting material composed for the learner's
    benefit.
- source_word: שלשום
  chosen: thirty sayings
  alternatives:
  - formerly
  - before now
  - three times
  lexicon: HALOT
  rationale: This form is text-critically and lexically difficult. In Proverbs 22:20
    many interpreters understand it as related to 'thirty,' likely alluding to a collection
    of sayings, rather than the adverb 'formerly'/'previously.' Given the immediate
    literary context and widespread scholarly support, 'thirty sayings' best explains
    the wording in context. The alternative 'formerly' is preserved in a footnote
    because the consonantal form can be read that way.
- source_word: בְּמוֹעֵצוֹת
  chosen: of counsel
  alternatives:
  - in counsels
  - concerning counsels
  - excellent things
  lexicon: HALOT
  rationale: From עֵצָה ('counsel, advice, plan'). The beth preposition is difficult
    here; in English, rendering the phrase attributively as 'sayings of counsel' gives
    a natural sense. 'Excellent things' reflects a traditional rendering tied to a
    different understanding of the difficult Hebrew, but is less directly lexical.
- source_word: וָדָעַת
  chosen: and knowledge
  alternatives:
  - and understanding
  lexicon: HALOT
  rationale: דעת commonly means 'knowledge.' 'And knowledge' preserves the coordinate
    pairing with 'counsel' and matches wisdom-literature diction.
