theological_decisions:
- issue: Syntactic relation of the two participles
  chosen_reading: The verse states two self-defeating practices—oppressing the poor
    for self-enrichment, or giving to the rich—both leading to poverty.
  alternative_readings:
  - The verse describes one person who both oppresses the poor and gives to the rich,
    leading to poverty.
  rationale: The Hebrew is verbless and compressed, allowing either a disjunctive
    listing of two actions or a cumulative description. Rendering with 'or gives'
    best reflects the proverb's balanced warning without forcing a narrower syntactic
    reading. This is an interpretive, not doctrinal, decision.
