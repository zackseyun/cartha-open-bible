id: PRO.22.16
reference: Proverbs 22:16
source:
  edition: WLC
  text: עֹ֣שֵֽׁק דָּ֭ל לְ/הַרְבּ֣וֹת ל֑/וֹ נֹתֵ֥ן לְ֝/עָשִׁ֗יר אַךְ לְ/מַחְסֽוֹר־׃
translation:
  text: One who oppresses the poor to increase his own wealth, or gives to the rich,
    will come only to poverty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'One who oppresses the poor to enrich himself and gives to the rich—only
      to poverty.' The Hebrew can be read as describing either two comparable actions
      or one combined pattern of behavior.
    reason: alternative_reading
  - marker: b
    text: '''To poverty'' may also be rendered ''to lack'' or ''to want.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֵׁק
  chosen: One who oppresses
  alternatives:
  - He who oppresses
  - An oppressor of
  lexicon: HALOT
  rationale: Qal participle of עשׁק used substantivally; denotes one characterized
    by exploiting or extorting. 'One who oppresses' is natural English and preserves
    the ongoing/generic force of the participle.
- source_word: דָּל
  chosen: the poor
  alternatives:
  - a poor person
  - the weak
  lexicon: HALOT
  rationale: דָּל commonly denotes one who is poor, lowly, or weak in social/economic
    status. In this proverb the economic sense is primary, so 'the poor' best fits.
- source_word: לְהַרְבּוֹת לוֹ
  chosen: to increase his own wealth
  alternatives:
  - to increase for himself
  - to enrich himself
  lexicon: HALOT
  rationale: Infinitive construct of רבה with ל plus pronominal suffix indicates purpose/result
    for the subject's own benefit. 'To increase his own wealth' makes explicit the
    implied economic gain in context without over-paraphrasing.
- source_word: נֹתֵן
  chosen: or gives
  alternatives:
  - and gives
  - one who gives
  lexicon: HALOT
  rationale: Second Qal participle parallels the first. The relation between the two
    participles is compressed Hebrew. English 'or gives' captures the proverb's presentation
    of a second comparable case; some take it conjunctively ('and gives'), but the
    sense remains that either practice is self-defeating.
- source_word: לְעָשִׁיר
  chosen: to the rich
  alternatives:
  - to a rich man
  - to the wealthy
  lexicon: HALOT
  rationale: עָשִׁיר denotes a rich person. 'The rich' is idiomatic and matches the
    generic class sense of the proverb.
- source_word: אַךְ
  chosen: only
  alternatives:
  - surely
  - indeed
  - but only
  lexicon: HALOT
  rationale: 'אַךְ here marks limitation/result with emphatic force. ''Only'' preserves
    the exclusivity: the outcome is nothing but poverty.'
- source_word: לְמַחְסוֹר
  chosen: to poverty
  alternatives:
  - to want
  - to lack
  - to need
  lexicon: HALOT
  rationale: מַחְסוֹר denotes lack, need, or poverty. In proverbial economic context,
    'poverty' is the clearest idiomatic rendering of the final outcome.
