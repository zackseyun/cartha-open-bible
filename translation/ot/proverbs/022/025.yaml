id: PRO.22.25
reference: Proverbs 22:25
source:
  edition: WLC
  text: פֶּן תֶּאֱלַ֥ף ארחת/ו וְ/לָקַחְתָּ֖ מוֹקֵ֣שׁ לְ/נַפְשֶֽׁ/ךָ־׃
translation:
  text: lest you learn his ways and take a snare for yourself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his path' or 'his manner of life.' The Hebrew singular can refer to
      a person's habitual conduct.
    reason: lexical_alternative
  - marker: b
    text: Or 'take a trap for your life' or 'for your soul.' Hebrew nephesh here likely
      means the person himself rather than making a technical statement about the
      soul.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - otherwise
  lexicon: HALOT
  rationale: פֶּן introduces a negative purpose/result warning. 'Lest' is concise
    and preserves the proverbial cautionary force better than the more colloquial
    'or else' or 'otherwise.'
- source_word: תֶּאֱלַף
  chosen: you learn
  alternatives:
  - you become accustomed to
  - you get trained in
  lexicon: HALOT
  rationale: From אלף in the Qal, here meaning to learn or become accustomed to. 'Learn'
    is the most natural English rendering and fits the warning that association shapes
    conduct.
- source_word: אָרְחֹתוֹ
  chosen: his ways
  alternatives:
  - his path
  - his manner of life
  lexicon: HALOT
  rationale: Though singular in form ('his path/way'), the term can denote habitual
    conduct. English idiom prefers plural 'his ways' for a person's pattern of behavior,
    especially in wisdom literature.
- source_word: וְלָקַחְתָּ
  chosen: and take
  alternatives:
  - and seize
  - and incur
  lexicon: HALOT
  rationale: The verb is the ordinary 'take.' In context it means to bring something
    upon oneself, but retaining 'take' keeps the metaphor vivid and close to the Hebrew.
- source_word: מוֹקֵשׁ
  chosen: a snare
  alternatives:
  - a trap
  lexicon: HALOT
  rationale: מוֹקֵשׁ is a trap or snare, often metaphorical for moral danger. 'Snare'
    preserves the wisdom-literature metaphor and matches the figurative sense well.
- source_word: לְנַפְשֶׁךָ
  chosen: for yourself
  alternatives:
  - for your life
  - for your soul
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean life, self, or soul depending on context. Here the warning
    concerns personal ruin rather than a technical doctrine of the soul, so 'for yourself'
    communicates the reflexive force naturally in English.
