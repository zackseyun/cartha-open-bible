id: PRO.22.11
reference: Proverbs 22:11
source:
  edition: WLC
  text: אֹהֵ֥ב טהור לֵ֑ב חֵ֥ן שְׂ֝פָתָ֗י/ו רֵעֵ֥/הוּ מֶֽלֶךְ־׃
translation:
  text: He who loves purity of heart[b][a], and whose speech is gracious—the king is his friend.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'his lips have grace.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a king is his friend.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֹהֵב
  chosen: He who loves
  alternatives:
  - One who loves
  - A lover of
  lexicon: HALOT
  rationale: Qal participle used substantivally; rendered as a generic singular personal expression. 'He who loves' preserves the masculine singular form while functioning proverbially.
- source_word: טהור לֵב
  chosen: purity of heart
  alternatives:
  - a pure heart
  - cleanness of heart
  lexicon: HALOT
  rationale: The adjective with 'heart' expresses an inner moral quality. 'Purity of heart' is idiomatic in English and preserves the genitival sense without over-literal awkwardness.
- source_word: חֵן
  chosen: gracious
  alternatives:
  - grace
  - favor
  - pleasantness
  lexicon: HALOT
  rationale: Here חֵן modifies the quality of speech rather than standing alone as a noun of favor. Rendering adjectivally as 'gracious' fits the Hebrew sense in context and yields natural English.
- source_word: שְׂפָתָיו
  chosen: whose speech
  alternatives:
  - his lips
  - his words
  lexicon: HALOT
  rationale: Literally 'his lips,' but in English 'speech' better conveys the metonymic sense of what proceeds from the lips while remaining close to the source.
- source_word: רֵעֵהוּ
  chosen: his friend
  alternatives:
  - his companion
  - his associate
  lexicon: HALOT
  rationale: The noun denotes a relational companion/friend. 'His friend' is the most natural fit with 'the king' as subject in the verbless clause.
- source_word: מֶלֶךְ
  chosen: the king
  alternatives:
  - a king
  lexicon: HALOT
  rationale: The anarthrous noun in proverbial style can be generic, but English idiom favors 'the king' in this maxim-like statement. It presents the ruler as the kind of person who befriends such a man.
