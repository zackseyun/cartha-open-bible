theological_decisions:
- issue: Whether to soften the proverb's corporal-discipline imagery into a purely
    metaphorical statement
  chosen_reading: Retain the concrete expression 'the rod of discipline' in the main
    text.
  alternative_readings:
  - Render more abstractly as 'discipline' or 'correction' without 'rod'
  rationale: The Hebrew explicitly uses שֵׁבֶט ('rod'), and optimal equivalence requires
    preserving the concrete image rather than resolving modern ethical discomfort
    by abstraction. At the same time, pairing it with 'of discipline' reflects that
    the proverb speaks of corrective training within wisdom literature, not making
    a broader doctrinal claim beyond the text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
- issue: Gender rendering of נָעַר
  chosen_reading: Use 'a boy' rather than a gender-neutral term.
  alternative_readings:
  - a child
  - a youth
  rationale: The source is grammatically masculine singular and in this context naturally
    refers to a male youth. Per the doctrine's gender-accurate principle, the translation
    should match the source's form and likely referent rather than neutralize it.
  doctrine_reference: 'Translation philosophy: Gender-accurate over gender-neutral.'
