id: PRO.22.15
reference: Proverbs 22:15
source:
  edition: WLC
  text: אִ֭וֶּלֶת קְשׁוּרָ֣ה בְ/לֶב נָ֑עַר שֵׁ֥בֶט מ֝וּסָ֗ר יַרְחִיקֶ֥/נָּה מִמֶּֽ/נּוּ־׃
translation:
  text: Folly is bound up in the heart of a boy; the rod of discipline will drive
    it far from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Foolishness is tied to the heart of a youth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִוֶּלֶת
  chosen: folly
  alternatives:
  - foolishness
  lexicon: HALOT
  rationale: The noun denotes not mere intellectual deficiency but moral senselessness
    or folly in wisdom literature. 'Folly' is the standard concise English equivalent
    and fits Proverbs idiom well.
- source_word: קְשׁוּרָה
  chosen: is bound up
  alternatives:
  - is tied
  - is bound
  lexicon: HALOT
  rationale: The passive participial sense conveys something closely fastened or attached.
    'Bound up' idiomatically communicates that folly is deeply attached or entrenched
    in the boy's inner life.
- source_word: בְלֶב
  chosen: in the heart
  alternatives:
  - in the mind
  - in the inner being
  lexicon: HALOT
  rationale: In Hebrew anthropology, 'heart' is the center of thought, will, and desire.
    Retaining 'heart' preserves the source metaphor and theological anthropology better
    than interpretive substitutes.
- source_word: נָעַר
  chosen: a boy
  alternatives:
  - a youth
  - a child
  lexicon: HALOT
  rationale: The term can cover a range from child to young man. Here the proverb
    concerns immature youth under discipline; 'boy' is a natural, gender-accurate
    rendering of the masculine singular and aligns with the source better than a gender-neutral
    term.
- source_word: שֵׁבֶט
  chosen: the rod
  alternatives:
  - a rod
  - the staff
  lexicon: HALOT
  rationale: In Proverbs this term commonly refers to a rod used in correction or
    authority. 'Rod' preserves the concrete image without softening it into a vague
    metaphor.
- source_word: מוּסָר
  chosen: of discipline
  alternatives:
  - of correction
  - of instruction
  lexicon: HALOT
  rationale: מוּסָר in wisdom literature includes corrective training and chastening.
    'Discipline' best captures the broader formative sense, not merely punishment.
- source_word: יַרְחִיקֶנָּה
  chosen: will drive it far
  alternatives:
  - will remove it
  - will put it far away
  lexicon: HALOT
  rationale: The Hiphil of רחק means to cause to be far away. 'Drive it far' preserves
    the causative force and fits the proverb's vivid imagery.
- source_word: מִמֶּנּוּ
  chosen: from him
  alternatives:
  - away from him
  lexicon: HALOT
  rationale: The preposition with pronominal suffix marks separation from the boy.
    'From him' is straightforward English; the sense of distance is already carried
    by 'drive it far'.
