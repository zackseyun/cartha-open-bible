id: PRO.22.5
reference: Proverbs 22:5
source:
  edition: WLC
  text: צִנִּ֣ים פַּ֭חִים בְּ/דֶ֣רֶךְ עִקֵּ֑שׁ שׁוֹמֵ֥ר נַ֝פְשׁ֗/וֹ יִרְחַ֥ק מֵ/הֶֽם׃
translation:
  text: Thorns and snares are in the path of the crooked; he who guards his life keeps
    far from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'traps' for 'snares.'
    reason: lexical_alternative
  - marker: b
    text: '''The crooked'' may also be rendered ''the perverse'' or ''the devious.'''
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'his soul'; here 'life' conveys the sense of preserving oneself from
      danger.
    reason: lexical_alternative
lexical_decisions:
- source_word: צִנִּים
  chosen: thorns
  alternatives:
  - hooks
  - barbs
  lexicon: HALOT
  rationale: The noun most naturally denotes sharp thorny hazards. In parallel with
    'snares,' it conveys dangers lying along a course of life. 'Thorns' is the clearest
    and most idiomatic English rendering.
- source_word: פַּחִים
  chosen: snares
  alternatives:
  - traps
  lexicon: HALOT
  rationale: A common term for traps or snares. 'Snares' preserves the figurative
    and wisdom-literature resonance of hidden dangers better than the more mechanical
    'traps,' though the latter is a viable alternative.
- source_word: בְּדֶרֶךְ
  chosen: in the path of
  alternatives:
  - on the way of
  - in the way of
  lexicon: HALOT
  rationale: דֶּרֶךְ often means road, way, or course of life. Here the proverb speaks
    figuratively of the life-course or conduct of the crooked person. 'In the path
    of' is natural English and preserves the metaphor.
- source_word: עִקֵּשׁ
  chosen: the crooked
  alternatives:
  - the perverse
  - the devious
  lexicon: HALOT
  rationale: The adjective describes one who is morally twisted or perverse. 'Crooked'
    keeps the concrete metaphor and is readable modern English. 'Perverse' is possible
    but sounds more abstract and archaic in this context.
- source_word: שׁוֹמֵר נַפְשׁוֹ
  chosen: he who guards his life
  alternatives:
  - whoever guards himself
  - he who keeps his soul
  lexicon: HALOT
  rationale: 'The participle plus object expresses a general principle: the person
    who watches over his own life/self. נֶפֶשׁ can mean soul, life, or self; here
    ''life'' best fits the wisdom context of self-preservation from danger. The masculine
    singular is rendered gender-accurately as a representative generic: ''he who.'''
- source_word: יִרְחַק
  chosen: keeps far
  alternatives:
  - stays far away
  - will be far away
  lexicon: HALOT
  rationale: The imperfect states the typical result of prudent conduct. 'Keeps far'
    gives a proverbial present sense in English while preserving the idea of deliberate
    distancing.
- source_word: מֵהֶם
  chosen: from them
  alternatives:
  - away from these things
  lexicon: HALOT
  rationale: The plural pronoun most naturally refers back to the plural dangers,
    'thorns and snares,' rather than to the singular 'path.' 'From them' is concise
    and preserves the Hebrew reference.
