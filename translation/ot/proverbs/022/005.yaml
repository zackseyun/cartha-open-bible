theological_decisions:
- issue: Generic masculine expression in wisdom literature
  chosen_reading: he who guards his life
  alternative_readings:
  - whoever guards his life
  - the one who guards his life
  rationale: Following the gender-accurate principle, the masculine singular participle
    is represented with an English masculine generic rather than neutralizing it.
    The saying is nevertheless proverbial and representative, not restricted to males.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
