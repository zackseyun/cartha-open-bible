id: PRO.22.17
reference: Proverbs 22:17
source:
  edition: WLC
  text: הַ֥ט אָזְנְ/ךָ֗ וּ֭/שְׁמַע דִּבְרֵ֣י חֲכָמִ֑ים וְ֝/לִבְּ/ךָ֗ תָּשִׁ֥ית לְ/דַעְתִּֽ/י׃
translation:
  text: Incline your ear and hear the words of the wise, and set your heart on my
    knowledge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "set your heart to my teaching." The Hebrew reads literally "to my knowledge,"
      which may refer either to the speaker's knowledge itself or, by extension, to
      the instruction that knowledge conveys.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַט
  chosen: Incline
  alternatives:
  - Turn
  - Bend
  lexicon: HALOT
  rationale: The Hiphil imperative of נטה literally means to stretch out or incline.
    With 'ear' as its object, 'incline' is a natural English equivalent that preserves
    the metaphor of deliberate attentiveness better than the flatter 'listen.'
- source_word: אָזְנְךָ
  chosen: your ear
  alternatives:
  - your ears
  lexicon: HALOT
  rationale: The Hebrew is singular with 2ms suffix. English idiom commonly uses singular
    in this expression ('incline your ear'), which preserves the source imagery.
- source_word: וּשְׁמַע
  chosen: and hear
  alternatives:
  - and listen
  lexicon: HALOT
  rationale: שׁמע commonly means 'hear' and can imply attentive listening. 'Hear'
    keeps the formal parallel with 'incline your ear' and avoids collapsing two distinct
    imperatives into one.
- source_word: דִּבְרֵי חֲכָמִים
  chosen: the words of the wise
  alternatives:
  - the sayings of the wise
  - the words of wise men
  lexicon: HALOT
  rationale: דברי is the construct plural 'words/sayings,' and חכמים is plural 'wise
    ones.' 'The wise' is idiomatic, preserves the plural sense, and avoids unnecessarily
    male-specific wording not demanded by the context.
- source_word: וְלִבְּךָ
  chosen: and set your heart
  alternatives:
  - and apply your heart
  - and direct your heart
  lexicon: HALOT
  rationale: The noun לב with 2ms suffix refers to the inner person, especially thought
    and will. 'Heart' is retained rather than reduced to 'mind' so the Hebrew anthropology
    remains visible.
- source_word: תָּשִׁית
  chosen: set
  alternatives:
  - apply
  - place
  - direct
  lexicon: HALOT
  rationale: From שׂים/שׁית, 'put/place/set.' In this collocation with 'heart' and
    a following ל phrase, 'set' is concise and natural in English while preserving
    the volitional force.
- source_word: לְדַעְתִּי
  chosen: on my knowledge
  alternatives:
  - to my knowledge
  - to knowledge of me
  - to my teaching
  lexicon: HALOT
  rationale: The form is literally 'to/for my knowledge.' In context, the speaker
    exhorts the hearer to attend to the instructor's knowledge or teaching. 'On my
    knowledge' preserves the first-person suffix and the conceptual noun better than
    the more interpretive 'to my teaching.' Because the Hebrew can also be understood
    more dynamically, that alternative is preserved in a footnote.
