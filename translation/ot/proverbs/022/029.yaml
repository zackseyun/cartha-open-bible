id: PRO.22.29
reference: Proverbs 22:29
source:
  edition: WLC
  text: חָזִ֡יתָ אִ֤ישׁ מָ֘הִ֤יר בִּ/מְלַאכְתּ֗/וֹ לִֽ/פְנֵֽי מְלָכִ֥ים יִתְיַצָּ֑ב בַּל יִ֝תְיַצֵּב לִ/פְנֵ֥י חֲשֻׁכִּֽים׀־־׃פ
translation:
  text: Do you see a man skillful in his work? He will stand before kings[b][a]; he will not stand before obscure men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'diligent in his work.' The Hebrew adjective can emphasize quickness/readiness and, by extension, competence.
    reason: lexical_alternative
  - marker: b
    text: Literally 'before obscure ones,' that is, people of no prominence or distinction.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָזִיתָ
  chosen: Do you see
  alternatives:
  - Have you seen
  - Do you observe
  lexicon: HALOT
  rationale: Qal perfect 2ms of חזה used rhetorically to introduce an observation or proverb. English present rhetorical question ('Do you see') is idiomatic and preserves the force better than a strictly past-tense rendering.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine 'man.' Per gender-accurate philosophy, retain 'man' rather than neutralizing, since the proverb uses the conventional representative singular.
- source_word: מָהִיר
  chosen: skillful
  alternatives:
  - diligent
  - quick
  - expert
  lexicon: HALOT
  rationale: The adjective can denote quickness or readiness, but in the context of workmanship it points to competence and proficiency rather than mere speed. 'Skillful' best captures the commendatory sense in modern English.
- source_word: בִּמְלַאכְתּוֹ
  chosen: in his work
  alternatives:
  - in his business
  - in his occupation
  - at his task
  lexicon: HALOT
  rationale: מְלָאכָה commonly refers to work, occupation, or craftsmanship. 'In his work' is broad enough to cover trade or task without narrowing the proverb to manual labor only.
- source_word: לִפְנֵי מְלָכִים
  chosen: before kings
  alternatives:
  - in the presence of kings
  lexicon: HALOT
  rationale: Standard idiom for appearing in the service or court of rulers. 'Before kings' is concise and natural while preserving the social elevation implied.
- source_word: יִתְיַצָּב
  chosen: he will stand
  alternatives:
  - he will take his stand
  - he will present himself
  lexicon: HALOT
  rationale: The Hitpael of יצב conveys taking one's place or presenting oneself. 'Stand' preserves the Hebrew imagery and works idiomatically with 'before kings.'
- source_word: בַּל
  chosen: will not
  alternatives:
  - not
  - never
  lexicon: HALOT
  rationale: Poetic negative particle. In English the future contrast is best expressed as 'will not' to match the parallel verb.
- source_word: לִפְנֵי חֲשֻׁכִּים
  chosen: before obscure men
  alternatives:
  - before lowly men
  - before unknown men
  - before insignificant men
  lexicon: HALOT
  rationale: חֲשֻׁכִּים literally suggests 'dark/obscure ones,' here metaphorically people of low standing or no distinction. 'Obscure men' preserves the metaphorical sense of lack of prominence without overinterpreting as moral darkness or poverty.
