id: PRO.22.26
reference: Proverbs 22:26
source:
  edition: WLC
  text: אַל תְּהִ֥י בְ/תֹֽקְעֵי כָ֑ף בַּ֝/עֹרְבִ֗ים מַשָּׁאֽוֹת־־׃
translation:
  text: Do not be among those who strike hands, among those who become surety for
    debts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not be one of those who strike hands in pledge, one of those who
      become surety for loans.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not become
  - Never be
  lexicon: HALOT
  rationale: Standard negative prohibition particle introducing an admonition.
- source_word: תְּהִי
  chosen: be
  alternatives:
  - become
  lexicon: HALOT
  rationale: 'Qal imperfect of היה with אַל functions as a prohibition: ''do not be.''
    English ''be'' is the most natural concise rendering.'
- source_word: בְ/תֹקְעֵי
  chosen: among those who strike
  alternatives:
  - with those who strike
  - among hand-strikers
  lexicon: HALOT
  rationale: 'The preposition ב plus participle indicates association: ''among/with
    those who...'' The participle from תקע here refers to striking or clasping in
    pledge-making.'
- source_word: כָף
  chosen: hands
  alternatives:
  - the palm
  - the hand
  lexicon: HALOT
  rationale: Literally 'palm/hand.' In this idiom of pledge-making, plural 'hands'
    is natural English and reflects the reciprocal gesture of striking hands.
- source_word: בַּ/עֹרְבִים
  chosen: among those who guarantee
  alternatives:
  - among guarantors
  - among those who become surety for
  lexicon: HALOT
  rationale: From ערב in the sense of giving surety/guaranteeing. The prefixed preposition
    again marks association with a class of people.
- source_word: מַשָּׁאוֹת
  chosen: debts
  alternatives:
  - loans
  - obligations
  lexicon: HALOT
  rationale: Refers to financial obligations or burdens being guaranteed. 'Debts'
    is clear modern English and fits the wisdom context of surety for another's liabilities.
