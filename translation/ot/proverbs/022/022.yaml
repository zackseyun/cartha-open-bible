id: PRO.22.22
reference: Proverbs 22:22
source:
  edition: WLC
  text: אַֽל תִּגְזָל דָּ֭ל כִּ֣י דַל ה֑וּא וְ/אַל תְּדַכֵּ֖א עָנִ֣י בַ/שָּֽׁעַר־־־־׃
translation:
  text: Do not rob the poor because he is poor, and do not crush the afflicted at
    the gate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, at the city gate, the place where legal cases and public judgments
      were commonly decided.
    reason: cultural_note
  - marker: b
    text: Or 'do not oppress the poor ... and do not crush the needy in court.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּגְזָל
  chosen: rob
  alternatives:
  - steal from
  - plunder
  lexicon: HALOT
  rationale: גזל commonly denotes taking by force or unjust seizure. 'Rob' fits the
    prohibition against exploiting the vulnerable better than the more general 'steal.'
- source_word: דָּל
  chosen: the poor
  alternatives:
  - the weak
  - the needy
  lexicon: HALOT
  rationale: דָּל refers to one who is low, poor, or weak in social/economic standing.
    'The poor' is the most natural and contextually clear English rendering here,
    especially with the explanatory clause 'because he is poor.'
- source_word: כִּי דַל הוּא
  chosen: because he is poor
  alternatives:
  - for he is poor
  - simply because he is poor
  lexicon: HALOT
  rationale: כִּי is causal here. The clause gives the wrongful motive or occasion
    for the oppression. 'Because he is poor' preserves the causal force and the rhetorical
    repetition of דל.
- source_word: תְּדַכֵּא
  chosen: crush
  alternatives:
  - oppress
  - trample
  lexicon: HALOT
  rationale: דכא in the Piel conveys crushing, bruising, or oppressing. 'Crush' preserves
    the vivid metaphor and moral severity better than the flatter 'oppress.'
- source_word: עָנִי
  chosen: the afflicted
  alternatives:
  - the poor
  - the needy
  - the oppressed
  lexicon: HALOT
  rationale: עָנִי often overlaps with 'poor' but can emphasize affliction, misery,
    or vulnerability. Rendering it as 'the afflicted' preserves the distinction from
    the earlier דל while still fitting the social-justice context.
- source_word: בַשָּׁעַר
  chosen: at the gate
  alternatives:
  - in the gate
  - at the city gate
  - in court
  lexicon: HALOT
  rationale: The city gate was the place of legal proceedings and public judgment.
    'At the gate' is a sufficiently literal rendering; the judicial nuance can be
    preserved in a footnote rather than expanded in the main text.
