id: PRO.22.27
reference: Proverbs 22:27
source:
  edition: WLC
  text: אִם אֵֽין לְ/ךָ֥ לְ/שַׁלֵּ֑ם לָ֥/מָּה יִקַּ֥ח מִ֝שְׁכָּבְ/ךָ֗ מִ/תַּחְתֶּֽי/ךָ־־׃
translation:
  text: If you have nothing with which to pay, why should he take your bed from under
    you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your couch' or 'your sleeping place.' The Hebrew specifically names
      the object taken, not merely a generic pledge.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a conditional clause. 'If' is the straightforward English
    equivalent in this warning context.
- source_word: אֵין
  chosen: have nothing
  alternatives:
  - there is not
  - you do not have
  lexicon: HALOT
  rationale: 'Combined with לְךָ to express possession: ''if there is nothing for
    you'' = ''if you have nothing.'' This is more natural English while preserving
    the sense.'
- source_word: לְךָ
  chosen: you have
  alternatives:
  - for you
  - belonging to you
  lexicon: HALOT
  rationale: The preposition with pronoun marks possession together with אֵין; idiomatic
    English requires a possessive verbal expression.
- source_word: לְשַׁלֵּם
  chosen: with which to pay
  alternatives:
  - to repay
  - to make payment
  lexicon: HALOT
  rationale: The infinitive of שׁלם here refers to paying a debt. 'With which to pay'
    makes explicit the implied object in natural English without adding new content.
- source_word: לָמָּה
  chosen: why should
  alternatives:
  - why
  - for what reason should
  lexicon: HALOT
  rationale: Introduces a rhetorical question. 'Why should' captures the admonitory
    force in context better than a bare 'why'.
- source_word: יִקַּח
  chosen: he take
  alternatives:
  - one take
  - he seize
  lexicon: HALOT
  rationale: The 3ms verb has an indefinite but contextually personal subject, referring
    to the creditor from the previous verse. 'He take' preserves that likely referent
    without over-specifying.
- source_word: מִשְׁכָּבְךָ
  chosen: your bed
  alternatives:
  - your couch
  - your sleeping place
  - your pledge
  lexicon: HALOT
  rationale: The noun denotes a place of lying down, here the debtor's bed or bedding.
    'Bed' is the clearest modern English rendering. 'Pledge' would interpret rather
    than translate; the object taken is specifically the bed.
- source_word: מִתַּחְתֶּיךָ
  chosen: from under you
  alternatives:
  - from beneath you
  lexicon: HALOT
  rationale: A vivid idiom indicating removal of the very bed on which one lies. 'From
    under you' preserves the concrete image and rhetorical force.
