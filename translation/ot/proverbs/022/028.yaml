id: PRO.22.28
reference: Proverbs 22:28
source:
  edition: WLC
  text: אַל תַּ֭סֵּג גְּב֣וּל עוֹלָ֑ם אֲשֶׁ֖ר עָשׂ֣וּ אֲבוֹתֶֽי/ךָ־׃
translation:
  text: Do not move an ancient boundary marker that your fathers made[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not remove an ancient boundary that your fathers set up.'
    reason: lexical_alternative
  - marker: b
    text: '''Your fathers'' may refer more broadly to one''s forefathers or ancestors.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - You shall not
  lexicon: HALOT
  rationale: אַל with the imperfect gives a prohibition. 'Do not' is natural modern English and preserves the force without unnecessary archaism.
- source_word: תַּסֵּג
  chosen: move
  alternatives:
  - remove
  - shift
  - move back
  lexicon: HALOT
  rationale: From נסג in this context of boundary lines, the sense is to move or shift a marker from its proper place. 'Move' is clear and idiomatic; 'remove' is possible but can imply total taking away rather than illicit displacement.
- source_word: גְּבוּל
  chosen: boundary marker
  alternatives:
  - boundary
  - border
  - boundary line
  lexicon: HALOT
  rationale: Although the noun literally denotes a boundary/border, in this collocation with 'move' and in wisdom/legal contexts it refers concretely to the landmark or marker that defines the boundary. 'Boundary marker' makes the implied object explicit in good English.
- source_word: עוֹלָם
  chosen: ancient
  alternatives:
  - old
  - long-standing
  - from of old
  lexicon: HALOT
  rationale: Here עוֹלָם modifies the boundary as something established long ago. 'Ancient' best captures the idiomatic sense in English without suggesting eternity in a strict metaphysical sense.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Simple relative pronoun introducing the clause describing the boundary marker. 'That' is the most natural restrictive relative in contemporary English.
- source_word: עָשׂוּ
  chosen: made
  alternatives:
  - set up
  - established
  lexicon: HALOT
  rationale: The verb is the common עשה, 'do/make.' In context it refers to the ancestors' establishing the landmark. 'Made' stays close to the Hebrew while remaining intelligible; the more interpretive 'set up' is preserved as an alternative.
- source_word: אֲבוֹתֶיךָ
  chosen: your fathers
  alternatives:
  - your ancestors
  - your forefathers
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural with second masculine singular suffix. Per the project's gender-accurate policy, 'your fathers' preserves the source form. 'Your ancestors' is a possible contextual rendering but is less form-sensitive.
