id: PRO.22.13
reference: Proverbs 22:13
source:
  edition: WLC
  text: אָמַ֣ר עָ֭צֵל אֲרִ֣י בַ/ח֑וּץ בְּ/ת֥וֹךְ רְ֝חֹב֗וֹת אֵֽרָצֵֽחַ׃
translation:
  text: The sluggard says[b][a], “There is a lion outside! I will be killed in the streets!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in the squares” / “in the open plazas”; the Hebrew term can refer to broad public spaces, not only narrow streets.
    reason: lexical_alternative
  - marker: b
    text: Or “I will be murdered” / “I will be slain”; the Hebrew verb can carry the sense of violent killing, but “I will be killed” is chosen for natural English in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָצֵל
  chosen: sluggard
  alternatives:
  - lazy man
  - lazy person
  lexicon: HALOT
  rationale: The noun denotes a habitually lazy person, especially in Proverbs. “Sluggard” preserves the proverbial characterization better than the flatter “lazy man/person,” while remaining standard English in wisdom literature.
- source_word: אֲרִי
  chosen: lion
  lexicon: HALOT
  rationale: 'Straightforward lexical sense: a lion. No metaphorical indicator in the immediate text; the point is the sluggard''s excuse.'
- source_word: בַחוּץ
  chosen: outside
  alternatives:
  - in the street
  - outdoors
  lexicon: HALOT
  rationale: The term refers to the area outside the house. “Outside” is the most natural English here and fits the contrast with the public spaces named in the next colon.
- source_word: בְּתוֹךְ רְחֹבוֹת
  lemma: בְּתוֹךְ
  chosen: in the middle of the streets
  alternatives:
  - in the squares
  - in the open plazas
  lexicon: HALOT
  rationale: רְחֹבוֹת can denote broad public places, streets, or squares. “In the middle of the streets” preserves the vividness of exposure in public thoroughfares while remaining idiomatic enough in English. The phrase also reflects the preposition בְּתוֹךְ, 'in the midst/middle of.'
- source_word: אֵרָצֵחַ
  chosen: I will be killed
  alternatives:
  - I will be murdered
  - I will be slain
  lexicon: HALOT
  rationale: The Niphal imperfect of רצח is passive/reflexive in force. “I will be killed” is the most natural idiomatic English in context. “Murdered” is lexically possible given רצח, but sounds overly juridical here; the proverb emphasizes the sluggard's exaggerated fear rather than legal classification of the death.
- source_word: אָמַר עָצֵל
  chosen: The sluggard says
  alternatives:
  - A sluggard says
  lexicon: HALOT
  rationale: Hebrew lacks the article on עָצֵל here, but proverbial style often uses a class representative. “The sluggard” is idiomatic in English wisdom literature and presents the character type generically.
