id: PRO.22.21
reference: Proverbs 22:21
source:
  edition: WLC
  text: לְ/הוֹדִֽיעֲ/ךָ֗ קֹ֭שְׁטְ אִמְרֵ֣י אֱמֶ֑ת לְ/הָשִׁ֥יב אֲמָרִ֥ים אֱ֝מֶ֗ת לְ/שֹׁלְחֶֽי/ךָ׃פ
translation:
  text: to make known to you the certainty of words of truth, so that you may return
    words of truth to those who sent you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the truth of words of truth'; קֹשְׁט can also be rendered 'truth,' 'correctness,'
      or 'reliability.'
    reason: lexical_alternative
  - marker: b
    text: Or 'so that you may answer with truthful words to those who sent you.'
    reason: alternative_reading
lexical_decisions:
- source_word: לְהוֹדִיעֲךָ
  chosen: to make known to you
  alternatives:
  - to teach you
  - to cause you to know
  lexicon: HALOT
  rationale: 'Hiphil infinitive of ידע with 2ms suffix expresses causative knowledge:
    ''to make known'' or ''to cause to know.'' ''Make known to you'' is clear modern
    English and preserves the causative force better than the flatter ''teach you.'''
- source_word: קֹשְׁט
  chosen: certainty
  alternatives:
  - truth
  - correctness
  - reliability
  lexicon: HALOT
  rationale: The noun can denote truthfulness or reliability/correctness. Because
    אמת appears twice in the verse explicitly as 'truth,' rendering קשט also as 'truth'
    would obscure the rhetorical distinction. 'Certainty' captures the sense of dependable
    correctness in this instructional context.
- source_word: אִמְרֵי אֱמֶת
  chosen: words of truth
  alternatives:
  - true sayings
  - truthful words
  lexicon: HALOT
  rationale: Construct phrase literally means 'words/sayings of truth.' 'Words of
    truth' is natural English and preserves the Hebrew genitival form without over-paraphrase.
- source_word: לְהָשִׁיב
  chosen: so that you may return
  alternatives:
  - to answer
  - to bring back
  - to respond with
  lexicon: HALOT
  rationale: The Hiphil of שוב often means 'to return' or 'to bring back,' and in
    context refers to giving back a response. 'So that you may return' keeps the formal
    image while remaining intelligible; the responsive sense is clarified by the object
    'words of truth.'
- source_word: אֲמָרִים
  chosen: words
  alternatives:
  - sayings
  - speech
  - answer
  lexicon: HALOT
  rationale: Plural of אמר here refers to spoken/verbal statements. 'Words' is the
    broadest and most natural equivalent, matching the earlier אמרי while avoiding
    unnecessary variation.
- source_word: אֱמֶת
  chosen: truth
  alternatives:
  - faithfulness
  - reliability
  lexicon: HALOT
  rationale: In wisdom literature אמת commonly denotes truth/reliability. Here 'truth'
    fits both occurrences and pairs well with the instructional aim of giving dependable
    answers.
- source_word: לְשֹׁלְחֶיךָ
  chosen: to those who sent you
  alternatives:
  - to your senders
  - to the ones who sent you
  lexicon: HALOT
  rationale: Qal participle plural with 2ms suffix means 'those sending you' or idiomatically
    'those who sent you.' The English relative clause is natural and preserves the
    plural referent.
