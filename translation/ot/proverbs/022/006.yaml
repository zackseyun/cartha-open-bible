id: PRO.22.6
reference: Proverbs 22:6
source:
  edition: WLC
  text: חֲנֹ֣ךְ לַ֭/נַּעַר עַל פִּ֣י דַרְכּ֑/וֹ גַּ֥ם כִּֽי יַ֝זְקִ֗ין לֹֽא יָס֥וּר מִמֶּֽ/נָּה־־־׃
translation:
  text: Train up a boy according to his way[b][a]; even when he grows old he will not turn from it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'Train up a boy in the way he should go.' The Hebrew more literally reads 'according to his way.'
    reason: alternative_reading
  - marker: b
    text: '''Boy'' renders a masculine singular Hebrew term used generically for a youth; the proverb states a general principle, not a promise without exception.'
    reason: cultural_note
lexical_decisions:
- source_word: חֲנֹךְ
  chosen: Train up
  alternatives:
  - Dedicate
  - Initiate
  lexicon: HALOT
  rationale: The imperative from חנך can denote initiating or dedicating, but in this proverb's instructional context it most naturally refers to beginning or training a youth in a formative way. 'Train up' preserves the pedagogical sense familiar in wisdom literature without over-paraphrasing.
- source_word: לַנַּעַר
  chosen: a boy
  alternatives:
  - the boy
  - a youth
  - a child
  lexicon: HALOT
  rationale: נַעַר commonly denotes a boy, youth, or young person. The singular generic force is best preserved with 'a boy' rather than a plural or gender-neutral recasting, in keeping with the translation philosophy's gender-accurate principle. 'Child' is broader but less precise than the Hebrew masculine singular.
- source_word: עַל פִּי
  chosen: according to
  alternatives:
  - in keeping with
  - upon the mouth of
  - according to the measure of
  lexicon: HALOT
  rationale: The idiom עַל־פִּי often means 'according to' or 'in keeping with.' A literal 'upon the mouth of' would be opaque in English. 'According to' is the clearest idiomatic rendering.
- source_word: דַרְכּוֹ
  chosen: his way
  alternatives:
  - the way he should go
  - his path
  - his course
  lexicon: HALOT
  rationale: The Hebrew literally reads 'his way.' Traditional English often expands this to 'the way he should go,' but that adds an interpretive element not explicit in the text. Retaining 'his way' preserves the source wording and leaves the proverb's nuance open for readers.
- source_word: גַּם כִּי
  chosen: even when
  alternatives:
  - even if
  - also when
  lexicon: HALOT
  rationale: 'Here the phrase introduces a concessive-temporal sense: ''even when'' or ''even if.'' Because aging is presented as an expected future stage rather than a hypothetical possibility, ''even when'' fits best.'
- source_word: יַזְקִין
  chosen: he grows old
  alternatives:
  - he becomes old
  - he is old
  lexicon: HALOT
  rationale: The Hiphil form from זקן here denotes reaching old age. 'Grows old' is natural modern English and preserves the processive sense.
- source_word: לֹא יָסוּר
  chosen: he will not turn from
  alternatives:
  - he will not depart from
  - he will not deviate from
  lexicon: HALOT
  rationale: סור commonly means turn aside, depart, or deviate. 'Turn from' is readable modern English and captures the sense of not abandoning the previously mentioned way.
- source_word: מִמֶּנָּה
  chosen: it
  alternatives:
  - her
  - from it
  lexicon: HALOT
  rationale: The feminine pronominal suffix refers back to the feminine noun 'way' (דֶּרֶךְ). English requires a neuter pronoun for an abstract antecedent, so 'it' is appropriate.
