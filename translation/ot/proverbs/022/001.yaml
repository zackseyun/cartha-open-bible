id: PRO.22.1
reference: Proverbs 22:1
source:
  edition: WLC
  text: נִבְחָ֣ר שֵׁ֭ם מֵ/עֹ֣שֶׁר רָ֑ב מִ/כֶּ֥סֶף וּ֝/מִ/זָּהָ֗ב חֵ֣ן טֽוֹב׃
translation:
  text: A name is to be chosen rather than great wealth[c][b][a], and favor is better than silver and gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A name is more desirable than great wealth; favor is better than silver and gold.'
    reason: lexical_alternative
  - marker: b
    text: '''Name'' here carries the sense of reputation or honor.'
    reason: cultural_note
  - marker: c
    text: Or 'grace' for 'favor.' The Hebrew term can denote graciousness or favorable regard depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִבְחָר
  chosen: is to be chosen
  alternatives:
  - is chosen
  - more desirable
  - preferable
  lexicon: HALOT
  rationale: Nifal participle of בחר functions predicatively here, expressing worthiness/preference rather than a simple passive state. 'Is to be chosen' preserves the comparative proverbial force in natural English.
- source_word: שֵׁם
  chosen: name
  alternatives:
  - reputation
  lexicon: HALOT
  rationale: Literally 'name.' In wisdom context it carries the sense of one's public reputation or honor, but 'name' preserves the Hebrew image while allowing the implied sense to remain.
- source_word: מֵעֹשֶׁר רָב
  chosen: rather than great wealth
  alternatives:
  - more than abundant riches
  - than much wealth
  lexicon: HALOT
  rationale: The comparative min marks preference over 'great/abundant wealth.' 'Great wealth' is idiomatic modern English and suitably weighty.
- source_word: מִכֶּסֶף וּמִזָּהָב
  chosen: than silver and gold
  alternatives:
  - than כסף and gold
  - than money and gold
  lexicon: HALOT
  rationale: A second comparative phrase specifying precious wealth. 'Silver and gold' is the standard literal rendering and remains clear in modern English.
- source_word: חֵן
  chosen: favor
  alternatives:
  - grace
  - acceptance
  - charm
  lexicon: HALOT
  rationale: In this proverb the term most naturally denotes favorable regard from others, parallel to a good name. 'Favor' best conveys social esteem without importing stronger theological connotations that 'grace' may carry in English.
- source_word: טוֹב
  chosen: better
  alternatives:
  - good
  lexicon: HALOT
  rationale: Though literally 'good,' in this elliptical comparative structure English requires 'better' to express the intended comparison with silver and gold.
