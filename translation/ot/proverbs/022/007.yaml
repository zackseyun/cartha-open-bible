id: PRO.22.7
reference: Proverbs 22:7
source:
  edition: WLC
  text: עָ֭שִׁיר בְּ/רָשִׁ֣ים יִמְשׁ֑וֹל וְ/עֶ֥בֶד לֹ֝וֶ֗ה לְ/אִ֣ישׁ מַלְוֶֽה׃
translation:
  text: The rich rules over the poor, and the borrower is a slave to the lender.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and a borrower is a slave to a man who lends.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָשִׁיר
  chosen: the rich
  alternatives:
  - a rich man
  - the wealthy
  lexicon: HALOT
  rationale: Adjectival substantive referring generically to a rich person/class.
    'The rich' is natural English and preserves the proverb's generic social contrast.
- source_word: בְּרָשִׁים
  chosen: over the poor
  alternatives:
  - among the poor
  - against the poor
  lexicon: HALOT
  rationale: With משל 'rule,' the preposition ב can mark the object/domain of rule.
    In English, 'rule over' best conveys the idiom and the social hierarchy in view.
- source_word: יִמְשׁוֹל
  chosen: rules
  alternatives:
  - will rule
  - governs
  lexicon: HALOT
  rationale: Imperfect in proverbial discourse expresses a general truth rather than
    future time. Present-tense 'rules' fits English proverbial style.
- source_word: וְעֶבֶד
  chosen: is a slave
  alternatives:
  - is a servant
  - becomes a slave
  lexicon: HALOT
  rationale: The noun means 'slave/servant.' Here bonded dependence is the point of
    the saying, so 'slave' better reflects the force than the softer 'servant.' English
    requires supplying 'is' for a natural clause.
- source_word: לֹוֶה
  chosen: the borrower
  alternatives:
  - one who borrows
  - the debtor
  lexicon: HALOT
  rationale: 'Qal participle used substantivally: ''the one borrowing.'' ''Borrower''
    is concise and idiomatic. ''Debtor'' is possible but shifts from the act of borrowing
    to the resulting status.'
- source_word: לְאִישׁ מַלְוֶה
  chosen: to the lender
  alternatives:
  - to the man who lends
  - to a creditor
  lexicon: HALOT
  rationale: The phrase literally means 'to a man lending.' 'Lender' is the most natural
    equivalent. 'Creditor' is possible but more technical and less directly tied to
    the verbal pair borrower/lender.
