id: PRO.22.18
reference: Proverbs 22:18
source:
  edition: WLC
  text: כִּֽי נָ֭עִים כִּֽי תִשְׁמְרֵ֣/ם בְּ/בִטְנֶ֑/ךָ יִכֹּ֥נוּ יַ֝חְדָּ֗ו עַל שְׂפָתֶֽי/ךָ־־־׃
translation:
  text: For it is pleasant if you keep them within you[b][a], if they are established together on your lips.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'in your belly,' a Hebrew expression for the inner person.
    reason: cultural_note
  - marker: b
    text: Or 'they will be ready together on your lips.' The verb may emphasize firm establishment or readiness for speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or motivation flowing from the previous exhortation. 'For' best preserves the explanatory force in natural English.
- source_word: נָעִים
  chosen: pleasant
  alternatives:
  - delightful
  - sweet
  lexicon: HALOT
  rationale: Conveys agreeableness or delight. 'Pleasant' is idiomatic and fits wisdom literature without becoming overly sentimental.
- source_word: כִּי
  chosen: if
  alternatives:
  - when
  - that
  lexicon: HALOT
  rationale: Here the second כִּי introduces the condition under which the statement is true. 'If' best captures the conditional sense in context.
- source_word: תִשְׁמְרֵם
  chosen: you keep them
  alternatives:
  - you guard them
  - you preserve them
  lexicon: HALOT
  rationale: שׁמר commonly means keep, guard, or preserve. 'Keep them' is concise and idiomatic, while still allowing the sense of retaining the sayings internally.
- source_word: בבטנך
  chosen: within you
  alternatives:
  - in your belly
  - in your inward parts
  - in your heart
  lexicon: HALOT
  rationale: Literally 'in your belly,' but in Hebrew anthropology this refers to the inner person. 'Within you' preserves the internal sense in readable modern English without importing the more interpretive 'heart.'
- source_word: יִכֹּנוּ
  chosen: they will be established
  alternatives:
  - they will be ready
  - they will be fixed
  - they will stand firm
  lexicon: HALOT
  rationale: From כון in the Niphal, conveying being set, established, or made firm. 'Established' fits the image of the sayings being firmly set for ready expression.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - all together
  - as one
  lexicon: HALOT
  rationale: Adverb indicating collective unity. 'Together' is the most natural rendering and suits the plural object 'them.'
- source_word: עַל שפתיך
  chosen: on your lips
  alternatives:
  - upon your lips
  - at your lips
  lexicon: HALOT
  rationale: A standard Hebrew idiom for speech or ready recitation. 'On your lips' is both literal and natural in English.
