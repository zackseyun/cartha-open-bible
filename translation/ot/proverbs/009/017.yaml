id: PRO.9.17
reference: Proverbs 9:17
source:
  edition: WLC
  text: מַֽיִם גְּנוּבִ֥ים יִמְתָּ֑קוּ וְ/לֶ֖חֶם סְתָרִ֣ים יִנְעָֽם־׃
translation:
  text: Stolen water is sweet[a], and bread of secrecy is pleasant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bread of secrecy' / 'bread in hidden places.' The Hebrew expression is compressed; the translation brings out the likely idiomatic sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַיִם
  chosen: water
  alternatives:
  - waters
  lexicon: HALOT
  rationale: Though morphologically plural, the noun commonly functions as a mass noun in Hebrew and is best rendered idiomatically in English as the singular mass noun 'water.'
- source_word: גְּנוּבִים
  chosen: stolen
  alternatives:
  - taken secretly
  lexicon: HALOT
  rationale: Passive participle from גנב, describing water acquired by theft. 'Stolen' is the most direct and natural English equivalent.
- source_word: יִמְתָּקוּ
  chosen: is sweet
  alternatives:
  - tastes sweet
  - become sweet
  lexicon: HALOT
  rationale: From מתק, 'to be sweet.' English idiom favors the stative predicate 'is sweet' rather than a more wooden future-like rendering.
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: While לֶחֶם can sometimes broadly denote food, 'bread' preserves the concrete imagery and parallelism with 'water.'
- source_word: סְתָרִים
  chosen: in secret
  alternatives:
  - of secrecy
  - secret places
  - hidden places
  lexicon: HALOT
  rationale: The plural noun from סתר is used idiomatically to denote secrecy/hiddenness. In this collocation with 'bread,' English reads most naturally as 'bread eaten in secret.'
- source_word: יִנְעָם
  chosen: is pleasant
  alternatives:
  - is delightful
  - tastes good
  lexicon: HALOT
  rationale: From נעם, 'to be pleasant/delightful.' 'Is pleasant' preserves the evaluative sense and keeps the parallel with 'is sweet.'
