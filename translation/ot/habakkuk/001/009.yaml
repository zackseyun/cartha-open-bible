id: HAB.1.9
reference: Habakkuk 1:9
source:
  edition: WLC
  text: כֻּלֹּ/ה֙ לְ/חָמָ֣ס יָב֔וֹא מְגַמַּ֥ת פְּנֵי/הֶ֖ם קָדִ֑ימָ/ה וַ/יֶּאֱסֹ֥ף כַּ/ח֖וֹל שֶֽׁבִי׃
translation:
  text: All of them come for violence[a]; the set of their faces is forward[c][b], and they gather captives like sand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the intent of their faces is eastward.'' The Hebrew expression is difficult: קָדִימָה can denote ''forward'' or ''eastward,'' and מְגַמַּת may mean ''set,'' ''intent,'' or ''direction.'''
    reason: lexical_alternative
  - marker: b
    text: Hebrew has a singular verb, 'and he gathers,' treating the invading force as a collective unit.
    reason: lexical_alternative
  - marker: c
    text: Or 'gathers captivity like sand,' if שֶׁבִי is taken abstractly rather than personally.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻּלֹּה
  chosen: All of them
  alternatives:
  - All of it
  - Every one of them
  lexicon: HALOT
  rationale: The form with 3ms suffix is used collectively here of the invading force described in the preceding context. English plural 'All of them' best reflects the collective sense in context.
- source_word: לְחָמָס
  chosen: for violence
  alternatives:
  - for violence and destruction
  - for wrongdoing
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence, brutality, or wrong done by force. 'For violence' preserves the terse purpose/result nuance of לְ with the noun.
- source_word: יָבֹוא
  chosen: come
  alternatives:
  - comes
  - advance
  lexicon: HALOT
  rationale: Simple 'come' is the direct sense of בוא. Although the context is military advance, 'come' keeps closer to the Hebrew while remaining natural in English with a plural collective subject.
- source_word: מְגַמַּת
  chosen: the set
  alternatives:
  - the intent
  - the eagerness
  - the striving
  lexicon: HALOT
  rationale: This rare noun refers to direction, aim, or fixed intent. In the idiom with 'faces,' it describes the fixed orientation of the invaders. 'The set' preserves the concrete idiomatic force without overinterpreting as purely mental intention.
- source_word: פְּנֵיהֶם
  chosen: of their faces
  alternatives:
  - their faces
  - their front
  lexicon: HALOT
  rationale: Retaining 'faces' preserves the Hebrew idiom and vivid imagery. The genitival English phrase works with 'the set of their faces' to reflect the construct chain.
- source_word: קָדִימָה
  chosen: forward
  alternatives:
  - eastward
  - toward the east
  lexicon: HALOT
  rationale: Though derived from 'east,' in directional idiom it can mean 'forward/onward.' Here the sense is of relentless advance, not primarily compass direction. 'Forward' best fits the military imagery.
- source_word: וַיֶּאֱסֹף
  chosen: and he gathers
  alternatives:
  - and it gathers
  - and he collects
  lexicon: HALOT
  rationale: The verb is singular, matching the collective subject. English may render the collective either as singular or plural; preserving singular here reflects the Hebrew verbal form while still referring to the invading force as a unit.
- source_word: כַּחוֹל
  chosen: like sand
  alternatives:
  - as the sand
  lexicon: HALOT
  rationale: 'Standard simile: innumerable quantity. ''Like sand'' is idiomatic modern English.'
- source_word: שֶׁבִי
  chosen: captives
  alternatives:
  - captivity
  - prisoners
  lexicon: HALOT
  rationale: The noun can denote captivity or captives. With the verb 'gathers,' the personal sense 'captives' is more natural and likely intended.
