theological_decisions:
- issue: Interpretation of בִּי in the clause 'what he will speak בִּי'
  chosen_reading: directed speech to the prophet ('to me')
  alternative_readings:
  - internal/inspired speech ('in me')
  rationale: The immediate context is Habakkuk waiting for God's answer to his prior lament, which favors speech addressed to him. However, the Hebrew preposition naturally allows 'in me,' and some interpreters take it as inward prophetic communication. To preserve the ambiguity without obscuring the main sense, the main text reads 'to me' and the alternative is footnoted.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Sense of תּוֹכַחְתִּי
  chosen_reading: the prophet's complaint/protest
  alternative_readings:
  - rebuke
  - argument/case
  rationale: The verse follows Habakkuk's bold challenge in 1:12–17 and anticipates God's response. 'Complaint' communicates that discourse naturally in English, while a footnote preserves the more forensic or confrontational alternatives.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
