id: LEV.22.15
reference: Leviticus 22:15
source:
  edition: WLC
  text: וְ/לֹ֣א יְחַלְּל֔וּ אֶת קָדְשֵׁ֖י בְּנֵ֣י יִשְׂרָאֵ֑ל אֵ֥ת אֲשֶׁר יָרִ֖ימוּ לַ/יהוָֽה־־׃
translation:
  text: They shall not profane the holy things of the sons of Israel[b][a], which they lift up to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the holy things of the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'which they present' or 'which they offer up' to the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְחַלְּלוּ
  chosen: profane
  alternatives:
  - treat as common
  - defile
  lexicon: HALOT
  rationale: Piel of חלל in cultic context commonly means to profane or desecrate what is holy. 'Profane' best preserves the holiness/commonness contrast central to Leviticus without over-paraphrasing.
- source_word: קָדְשֵׁי
  chosen: holy offerings
  alternatives:
  - holy things
  - sacred gifts
  lexicon: HALOT
  rationale: The construct 'holy things of the sons of Israel' refers here to consecrated items brought by Israel, especially offerings. 'Holy offerings' is more idiomatic in English than 'holy things' while still reflecting the cultic referent.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'sons of Israel.' Following the gender-accurate policy, this is retained rather than neutralized, since it is the standard covenantal ethnonym and not merely a generic plural.
- source_word: אֲשֶׁר יָרִימוּ
  chosen: which they lift up
  alternatives:
  - which they present
  - which they offer up
  lexicon: HALOT
  rationale: The Hiphil of רום in sacrificial contexts can denote lifting up or presenting as a contribution. 'Lift up' preserves the concrete verbal imagery and stays close to the Hebrew; the offering sense is already clarified by 'holy offerings.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יהוה is 'the LORD,' following Jewish reverence tradition and longstanding covenantal usage.
- source_word: וְלֹא
  chosen: shall not
  alternatives:
  - must not
  - and they shall not
  lexicon: HALOT
  rationale: The negated imperfect in legal material is naturally rendered as a prohibition/future-like injunction. 'Shall not' fits the legislative style of Leviticus.
