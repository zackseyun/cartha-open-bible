id: LEV.11.41
reference: Leviticus 11:41
source:
  edition: WLC
  text: וְ/כָל הַ/שֶּׁ֖רֶץ הַ/שֹּׁרֵ֣ץ עַל הָ/אָ֑רֶץ שֶׁ֥קֶץ ה֖וּא לֹ֥א יֵאָכֵֽל־־׃
translation:
  text: And every swarming thing that swarms on the earth is detestable; it shall
    not be eaten.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'creeping thing.' The Hebrew term refers broadly to small creatures that
      swarm or move close to the ground.
    reason: lexical_alternative
  - marker: b
    text: Or 'an abomination.' Here the term denotes something ritually detestable
      as food.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל
  chosen: And every
  alternatives:
  - Now every
  - Every
  lexicon: HALOT
  rationale: וְ joins this prohibition to the preceding dietary laws, and כָּל gives
    a comprehensive sense. 'And every' preserves both the connective and the distributive
    force.
- source_word: הַ/שֶּׁרֶץ
  chosen: swarming thing
  alternatives:
  - creeping thing
  - teeming thing
  lexicon: HALOT
  rationale: שֶׁרֶץ denotes a small creature class characterized by swarming/teeming
    movement. 'Swarming thing' is more transparent in modern English than the traditional
    'creeping thing' and matches the cognate participle that follows.
- source_word: הַ/שֹּׁרֵץ
  chosen: that swarms
  alternatives:
  - that creeps
  - that teems
  lexicon: HALOT
  rationale: 'The participle from שׁרץ is rendered with the cognate verb ''swarms''
    to preserve the Hebrew wordplay/intensification: ''the swarming thing that swarms.'''
- source_word: עַל הָ/אָ֑רֶץ
  chosen: on the earth
  alternatives:
  - on the ground
  - upon the land
  lexicon: HALOT
  rationale: אָרֶץ here refers to the terrestrial realm in contrast to water creatures
    and flying creatures in the chapter. 'On the earth' is a straightforward rendering,
    though 'ground' would also fit contextually.
- source_word: שֶׁ֥קֶץ
  chosen: detestable
  alternatives:
  - an abomination
  - unclean and detestable
  lexicon: HALOT
  rationale: שֶׁקֶץ in Leviticus 11 marks creatures as ritually abhorrent for food.
    'Detestable' communicates the prohibition force in accessible modern English without
    importing later moralized connotations of 'abomination.'
- source_word: ה֖וּא
  chosen: is
  alternatives:
  - it is
  lexicon: HALOT
  rationale: 'The independent pronoun adds emphasis: ''it is detestable.'' In idiomatic
    English, the copular clause ''is detestable'' sufficiently conveys the predication.'
- source_word: לֹ֥א יֵאָכֵֽל
  chosen: it shall not be eaten
  alternatives:
  - it must not be eaten
  - it is not to be eaten
  lexicon: HALOT
  rationale: The Niphal imperfect is best rendered as a passive prohibition. 'It shall
    not be eaten' preserves the legal register and mirrors the Hebrew construction
    closely.
