id: LEV.11.16
reference: Leviticus 11:16
source:
  edition: WLC
  text: וְ/אֵת֙ בַּ֣ת הַֽ/יַּעֲנָ֔ה וְ/אֶת הַ/תַּחְמָ֖ס וְ/אֶת הַ/שָּׁ֑חַף וְ/אֶת הַ/נֵּ֖ץ לְ/מִינֵֽ/הוּ־־־׃
translation:
  text: and the ostrich[a], and the hawk, and the gull, and the falcon according to its kind,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew bird identifications in this verse are uncertain in several cases; traditional alternatives include 'owl' for 'ostrich,' 'night hawk' or 'owl' for 'hawk,' 'cuckoo' for 'gull,' and 'hawk' for 'falcon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּת הַיַּעֲנָה
  chosen: the ostrich
  alternatives:
  - the daughter of the ostrich
  - the owl
  lexicon: HALOT, BDB
  rationale: The Hebrew expression literally means 'daughter of the ya'anah,' but in zoological lists it functions as the established name of a bird, conventionally identified as the ostrich. 'Owl' reflects older translation tradition in some English versions but is less likely in light of broader lexical evidence and cognate usage.
- source_word: הַתַּחְמָס
  chosen: the hawk
  alternatives:
  - the owl
  - the night hawk
  lexicon: HALOT, BDB
  rationale: The precise species is uncertain. 'Hawk' is a plausible broad rendering for a bird of prey and fits the context of unclean birds. More specific or alternative identifications remain uncertain, so a general English term is preferred.
- source_word: הַשָּׁחַף
  chosen: the gull
  alternatives:
  - the cuckoo
  - the seagull
  lexicon: HALOT, BDB
  rationale: The term is uncertain, but 'gull' is widely accepted in modern lexicons and translations. 'Cuckoo' reflects older tradition but is less persuasive lexically. 'Gull' gives a natural modern English bird name without overprecision.
- source_word: הַנֵּץ
  chosen: the falcon
  alternatives:
  - the hawk
  lexicon: HALOT, BDB
  rationale: This term denotes a bird of prey, often identified as a falcon or hawk. 'Falcon' helps distinguish it from תַּחְמָס in this verse while remaining within the semantic range supported by lexicons.
- source_word: לְמִינֵהוּ
  chosen: according to its kind
  alternatives:
  - after its kind
  - by its species
  lexicon: HALOT, BDB
  rationale: This phrase recurs in classification contexts and indicates membership by type or species-group. 'According to its kind' is clear modern English and preserves the formal categorizing sense of the Hebrew.
- source_word: וְאֵת / וְאֶת
  chosen: and
  lexicon: Hebrew grammar
  rationale: The repeated direct-object marker with conjunction structures a continuing list from the previous verse. In English, the object marker is not translated, while the conjunction is naturally rendered 'and' before each listed bird.
