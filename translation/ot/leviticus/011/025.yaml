id: LEV.11.25
reference: Leviticus 11:25
source:
  edition: WLC
  text: וְ/כָל הַ/נֹּשֵׂ֖א מִ/נִּבְלָתָ֑/ם יְכַבֵּ֥ס בְּגָדָ֖י/ו וְ/טָמֵ֥א עַד הָ/עָֽרֶב־־׃
translation:
  text: And everyone who carries any of their carcasses shall wash his clothes and be unclean until the evening[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from their carcasses.' The Hebrew construction can be rendered more formally this way, but 'any of their carcasses' better conveys the distributive sense in natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל
  chosen: And everyone
  alternatives:
  - And whoever
  - And anyone
  lexicon: HALOT
  rationale: וְ joins this rule to the preceding context, and כָּל with the participle functions distributively. 'Everyone' gives clear modern English while preserving the universal scope.
- source_word: הַ/נֹּשֵׂא
  chosen: who carries
  alternatives:
  - who lifts
  - who bears
  lexicon: HALOT
  rationale: The participle from נָשָׂא denotes carrying or bearing. In this purity-law context, 'carries' is the most natural English rendering for handling and transporting a carcass.
- source_word: מִ/נִּבְלָתָ/ם
  chosen: any of their carcasses
  alternatives:
  - from their carcasses
  - any of their dead bodies
  lexicon: HALOT
  rationale: נְבֵלָה refers to an animal carcass/corpse in Levitical purity legislation. Because מִן after נשׂא can indicate taking up part of a class, 'any of their carcasses' communicates the sense idiomatically in English. 'Carcasses' is preferable to 'dead bodies' here because the referent is animal remains in a dietary/purity context.
- source_word: יְכַבֵּס
  chosen: shall wash
  alternatives:
  - must wash
  - is to wash
  lexicon: HALOT
  rationale: The imperfect here expresses legal obligation/consequence. 'Shall wash' preserves the prescriptive force and fits the legal style of Leviticus.
- source_word: בְּגָדָי/ו
  chosen: his clothes
  alternatives:
  - his garments
  lexicon: HALOT
  rationale: בְּגָדִים means garments/clothes. 'Clothes' is more natural modern English, while 'his' reflects the grammatically masculine singular form in a representative legal statement.
- source_word: וְ/טָמֵא
  chosen: and be unclean
  alternatives:
  - and he shall be unclean
  - and become unclean
  lexicon: HALOT
  rationale: טָמֵא in this context denotes ritual impurity, not moral evil. 'Be unclean' is the standard concise rendering in English purity-law contexts.
- source_word: עַד הָ/עָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  lexicon: HALOT
  rationale: The phrase marks the duration of impurity. 'Until the evening' is slightly more formal and mirrors the Hebrew article, while remaining natural English.
