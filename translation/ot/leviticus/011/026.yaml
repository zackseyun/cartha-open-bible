theological_decisions:
- issue: Purity terminology in Levitical law
  chosen_reading: unclean
  alternative_readings:
  - impure
  rationale: The verse concerns ritual purity categories, not necessarily moral defilement. 'Unclean' is the standard and clearest English term in this legal-sacral context and avoids importing extra moral claims while preserving biblical terminology.
