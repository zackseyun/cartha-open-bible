id: LEV.11.26
reference: Leviticus 11:26
source:
  edition: WLC
  text: לְֽ/כָל הַ/בְּהֵמָ֡ה אֲשֶׁ֣ר הִוא֩ מַפְרֶ֨סֶת פַּרְסָ֜ה וְ/שֶׁ֣סַע אֵינֶ֣/נָּה שֹׁסַ֗עַת וְ/גֵרָה֙ אֵינֶ֣/נָּה מַעֲלָ֔ה טְמֵאִ֥ים הֵ֖ם לָ/כֶ֑ם כָּל הַ/נֹּגֵ֥עַ בָּ/הֶ֖ם יִטְמָֽא־׀־׃
translation:
  text: As for every animal that has a divided hoof[a], but does not split the hoof completely and does not chew the cud, they are unclean to you. Everyone who touches them shall be unclean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'does not split a split'; the Hebrew intensifies the idea of a fully cloven hoof.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכָל הַבְּהֵמָה
  chosen: As for every animal
  alternatives:
  - Every animal
  - As for any beast
  lexicon: HALOT
  rationale: The prefixed לְ introduces the category under discussion, so 'As for' brings out the topical force naturally in English. בְּהֵמָה here is a broad term for land animal/beast; 'animal' is the clearest modern rendering.
- source_word: מַפְרֶסֶת פַּרְסָה
  chosen: has a divided hoof
  alternatives:
  - parts the hoof
  - divides the hoof
  lexicon: HALOT
  rationale: This idiom refers to having a hoof that is divided. English idiom prefers 'has a divided hoof' over a more wooden participial expression.
- source_word: וְשֶׁסַע אֵינֶנָּה שֹׁסַעַת
  chosen: but does not split the hoof completely
  alternatives:
  - but does not split a cleft
  - but does not split it into two hoof-parts
  lexicon: HALOT
  rationale: 'The construction intensifies/specifies the previous hoof language: the animal has a divided hoof in some sense, yet not a fully split cleft. ''Completely'' captures the force of the cognate noun-verb expression in readable English.'
- source_word: וְגֵרָה אֵינֶנָּה מַעֲלָה
  chosen: and does not chew the cud
  alternatives:
  - and does not bring up cud
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of bringing up cud, but standard clear English is 'chew the cud.' This is an established zoological equivalent, not an interpretive expansion.
- source_word: טְמֵאִים הֵם לָכֶם
  chosen: they are unclean to you
  alternatives:
  - they are unclean for you
  - they are impure to you
  lexicon: HALOT
  rationale: טָמֵא in Levitical purity contexts is best rendered 'unclean.' 'To you' preserves the covenantal/legal perspective marked by לָכֶם.
- source_word: כָּל הַנֹּגֵעַ בָּהֶם
  chosen: Everyone who touches them
  alternatives:
  - Whoever touches them
  - Anyone touching them
  lexicon: HALOT
  rationale: The singular participle with כָּל is naturally rendered as a generalizing expression. 'Everyone who touches them' is clear modern English.
- source_word: יִטְמָא
  chosen: shall be unclean
  alternatives:
  - will become unclean
  - shall become unclean
  lexicon: HALOT
  rationale: The imperfect here states the legal consequence. 'Shall be unclean' fits the prescriptive register of the holiness code, while also reflecting the resulting state.
