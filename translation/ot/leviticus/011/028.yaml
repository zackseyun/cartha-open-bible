id: LEV.11.28
reference: Leviticus 11:28
source:
  edition: WLC
  text: וְ/הַ/נֹּשֵׂא֙ אֶת נִבְלָתָ֔/ם יְכַבֵּ֥ס בְּגָדָ֖י/ו וְ/טָמֵ֣א עַד הָ/עָ֑רֶב
    טְמֵאִ֥ים הֵ֖מָּה לָ/כֶֽם־־׃ס
translation:
  text: Whoever carries their carcass shall wash his clothes and be unclean until
    the evening. They are unclean for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their carcasses.' The Hebrew may be understood distributively of the
      animals in view.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנֹּשֵׂא
  chosen: Whoever carries
  alternatives:
  - And the one who carries
  - Anyone who carries
  lexicon: HALOT
  rationale: 'The participial construction with article functions generically: ''the
    one who carries.'' ''Whoever carries'' gives natural English while preserving
    the legal/general force.'
- source_word: נִבְלָתָם
  chosen: their carcass
  alternatives:
  - their carcasses
  - their dead body
  lexicon: HALOT
  rationale: נְבֵלָה refers to the carcass of an animal. The suffix is plural ('their'),
    referring back to the animals in the preceding context. English often uses a collective
    singular 'carcass' after a plural possessive in this kind of legal statement;
    'carcass' is more precise than the broader 'dead body.'
- source_word: יְכַבֵּס בְּגָדָיו
  chosen: shall wash his clothes
  alternatives:
  - must wash his garments
  - shall wash his garments
  lexicon: HALOT
  rationale: The imperfect in legal material carries injunctive force, well represented
    by 'shall.' 'Clothes' is more readable modern English than 'garments' while retaining
    the sense.
- source_word: וְטָמֵא
  chosen: and be unclean
  alternatives:
  - and shall be unclean
  - and is unclean
  lexicon: HALOT
  rationale: The clause states resulting ritual status. 'Be unclean' fits the legal
    sequence in English and avoids awkward repetition of 'shall' while preserving
    the force.
- source_word: עַד הָעָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  lexicon: HALOT
  rationale: The article is present in Hebrew; 'until the evening' is slightly more
    formal and mirrors the source closely, while remaining natural.
- source_word: טְמֵאִים הֵמָּה לָכֶם
  chosen: They are unclean for you
  alternatives:
  - They are unclean to you
  - These are unclean for you
  lexicon: HALOT
  rationale: This summarizes the status of the animals for the Israelites. 'For you'
    preserves לָכֶם without overinterpreting it; 'they' refers back to the animals
    under discussion.
