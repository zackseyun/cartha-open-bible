id: LEV.11.37
reference: Leviticus 11:37
source:
  edition: WLC
  text: וְ/כִ֤י יִפֹּל֙ מִ/נִּבְלָתָ֔/ם עַל כָּל זֶ֥רַע זֵר֖וּעַ אֲשֶׁ֣ר יִזָּרֵ֑עַ
    טָה֖וֹר הֽוּא־־׃
translation:
  text: And if any of their carcass falls on any seed for sowing that is to be sown,
    it is clean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'any of their carcasses falls on any seed for sowing.' The Hebrew expression
      מִנִּבְלָתָם is somewhat awkward in English and may be understood partitivally
      ('any of their carcass') or collectively/plurally ('any of their carcasses').
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כִי
  chosen: And if
  alternatives:
  - And when
  - If
  lexicon: HALOT
  rationale: Introduces a conditional case continuing the legal material. 'And if'
    preserves both the connective force of וְ and the conditional sense of כִּי in
    context.
- source_word: יִפֹּל
  chosen: falls
  alternatives:
  - should fall
  - falls down
  lexicon: HALOT
  rationale: Qal imperfect of נפל in casuistic law is naturally rendered as a present/future
    condition in English. 'Falls' is concise and idiomatic.
- source_word: מִ/נִּבְלָתָם
  chosen: any of their carcass
  alternatives:
  - any of their carcasses
  - any part of their carcass
  - from their carcasses
  lexicon: HALOT
  rationale: The preposition מִן indicates 'from/out of,' and נְבֵלָה refers to the
    carcass of an animal, especially one dead and conveying impurity in this context.
    Because the singular noun bears a 3mp suffix and the sense is partitive after
    'falls,' 'any of their carcass' best captures the Hebrew construction, though
    English could also smooth to the plural.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: Standard spatial preposition; 'on' is natural modern English.
- source_word: כָּל
  chosen: any
  alternatives:
  - every
  - all
  lexicon: HALOT
  rationale: In this legal conditional, 'any seed' communicates the distributive force
    idiomatically better than the more wooden 'every seed'.
- source_word: זֶרַע זֵרוּעַ
  chosen: seed for sowing
  alternatives:
  - sowing seed
  - seed that is sown
  - seed
  lexicon: HALOT
  rationale: The collocation combines 'seed' with a passive-participial/adjectival
    form from the same semantic field, indicating seed intended for planting. 'Seed
    for sowing' preserves the emphasis without awkward repetition.
- source_word: אֲשֶׁר יִזָּרֵעַ
  chosen: that is to be sown
  alternatives:
  - which may be sown
  - that will be sown
  - that is sown
  lexicon: HALOT
  rationale: The relative clause specifies seed intended for planting. 'That is to
    be sown' captures prospective force better than a simple present.
- source_word: טָהוֹר הוּא
  chosen: it is clean
  alternatives:
  - it is pure
  - it remains clean
  lexicon: HALOT
  rationale: In Levitical purity law, טָהוֹר is best rendered 'clean' rather than
    'pure,' since the issue is ritual cleanness. 'Remains clean' is interpretive and
    not explicit in the Hebrew.
