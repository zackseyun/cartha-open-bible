id: LEV.11.3
reference: Leviticus 11:3
source:
  edition: WLC
  text: כֹּ֣ל מַפְרֶ֣סֶת פַּרְסָ֗ה וְ/שֹׁסַ֤עַת שֶׁ֨סַע֙ פְּרָסֹ֔ת מַעֲלַ֥ת גֵּרָ֖ה בַּ/בְּהֵמָ֑ה אֹתָ֖/הּ תֹּאכֵֽלוּ׀׃
translation:
  text: You may eat any animal that has a split hoof[a], completely divided[b], and that chews the cud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'that parts the hoof and splits a split of hooves.' The Hebrew uses two related expressions to specify a truly divided hoof.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'brings up cud'; that is, chews the cud.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  chosen: any
  alternatives:
  - every
  - all
  lexicon: HALOT
  rationale: Used distributively with the following participles to introduce the class of permitted animals. 'Any' is natural modern English in a legal/permissive statement, while preserving the inclusive sense.
- source_word: מַפְרֶסֶת פַּרְסָה
  chosen: has a split hoof
  alternatives:
  - parts the hoof
  - divides the hoof
  lexicon: HALOT
  rationale: The participle plus object literally refers to dividing the hoof. 'Has a split hoof' is idiomatic English that accurately conveys the physical trait without unnecessary stiffness.
- source_word: וְשֹׁסַעַת שֶׁסַע פְּרָסֹת
  chosen: completely divided
  alternatives:
  - and cleaves a cleft in the hooves
  - and is split into two hoof-parts
  lexicon: HALOT
  rationale: This phrase intensifies/specifies the hoof condition already mentioned. 'Completely divided' captures the emphatic specification in readable English. The hoof reference is already established by the previous phrase, so repeating 'hoof' is not strictly necessary in English.
- source_word: מַעֲלַת גֵּרָה
  chosen: chews the cud
  alternatives:
  - brings up cud
  - ruminates
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'brings up cud.' 'Chews the cud' is the standard natural English equivalent for the ruminant behavior intended here; 'ruminates' is accurate but less idiomatic for general readers.
- source_word: בַּבְּהֵמָה
  chosen: animal
  alternatives:
  - among the beasts
  - among the livestock
  lexicon: HALOT
  rationale: Here the term denotes land animals in the dietary classification context. 'Animal' is broad but fits the immediate legal category in clear modern English. 'Livestock' would be too narrow, and 'beasts' is archaic.
- source_word: אֹתָהּ תֹּאכֵלוּ
  chosen: You may eat
  alternatives:
  - you shall eat
  - you may eat that one
  lexicon: HALOT
  rationale: In this dietary-law context, the imperfect addresses what is permitted rather than commanding consumption. 'You may eat' best communicates legal permission in contemporary English.
