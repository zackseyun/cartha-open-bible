id: LEV.11.4
reference: Leviticus 11:4
source:
  edition: WLC
  text: אַ֤ךְ אֶת זֶה֙ לֹ֣א תֹֽאכְל֔וּ מִֽ/מַּעֲלֵי֙ הַ/גֵּרָ֔ה וּ/מִ/מַּפְרִיסֵ֖י
    הַ/פַּרְסָ֑ה אֶֽת הַ֠/גָּמָל כִּֽי מַעֲלֵ֨ה גֵרָ֜ה ה֗וּא וּ/פַרְסָה֙ אֵינֶ֣/נּוּ
    מַפְרִ֔יס טָמֵ֥א ה֖וּא לָ/כֶֽם־־־׃
translation:
  text: 'Nevertheless, you shall not eat these from among those that chew the cud
    or from among those that divide the hoof: the camel, because it chews the cud
    but does not divide the hoof; it is unclean to you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'split the hoof.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'unclean to you'—that is, unclean for Israel under the dietary laws.
    reason: cultural_note
lexical_decisions:
- source_word: אַךְ
  chosen: Nevertheless
  alternatives:
  - But
  - Only
  - However
  lexicon: HALOT
  rationale: Marks an exception or limitation to the preceding rule. 'Nevertheless'
    preserves the adversative/restrictive force in natural English.
- source_word: מִמַּעֲלֵי הַגֵּרָה
  chosen: from among those that chew the cud
  alternatives:
  - from those that bring up the cud
  - from cud-chewers
  lexicon: HALOT
  rationale: The idiom literally refers to bringing up cud; 'chew the cud' is the
    standard clear English equivalent and accurately conveys the dietary classification.
- source_word: וּמִמַּפְרִיסֵי הַפַּרְסָה
  chosen: or from among those that divide the hoof
  alternatives:
  - and from among those that split the hoof
  - from hoof-dividers
  lexicon: HALOT
  rationale: 'The phrase identifies the second classificatory trait. ''Divide the
    hoof'' is a natural rendering close to the Hebrew. ''Or'' fits the sense here:
    the following examples are drawn from animals possessing one trait but not the
    full required combination.'
- source_word: הַגָּמָל
  chosen: the camel
  lexicon: HALOT
  rationale: Direct lexical equivalent for the named animal.
- source_word: כִּי מַעֲלֵה גֵרָה הוּא
  chosen: because it chews the cud
  alternatives:
  - for it brings up cud
  lexicon: HALOT
  rationale: Gives the reason the camel might appear permissible under one criterion.
    English idiom favors 'chews the cud.'
- source_word: וּפַרְסָה אֵינֶנּוּ מַפְרִיס
  chosen: but does not divide the hoof
  alternatives:
  - yet it does not split the hoof
  lexicon: HALOT
  rationale: Expresses failure to meet the second criterion. 'But' makes the contrast
    explicit in smooth English.
- source_word: טָמֵא הוּא לָכֶם
  chosen: it is unclean to you
  alternatives:
  - it is unclean for you
  - it is ritually unclean to you
  lexicon: HALOT
  rationale: '''Unclean'' is the established and accurate rendering of טָמֵא in Levitical
    purity contexts. ''To you'' preserves the covenantal/legal perspective of the
    addressees without overexplaining in the main text.'
