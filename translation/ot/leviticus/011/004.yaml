theological_decisions:
- issue: Nature of uncleanness in Levitical dietary law
  chosen_reading: unclean
  alternative_readings:
  - ritually unclean
  - ceremonially unclean
  rationale: The Hebrew טָמֵא in this context concerns Israel's purity classification.
    The main text keeps the biblically central term 'unclean' rather than narrowing
    it interpretively to 'ceremonial' or 'ritual,' though those nuances are contextually
    relevant.
  doctrine_reference: Translation philosophy §3, §6
