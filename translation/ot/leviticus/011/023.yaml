id: LEV.11.23
reference: Leviticus 11:23
source:
  edition: WLC
  text: וְ/כֹל֙ שֶׁ֣רֶץ הָ/ע֔וֹף אֲשֶׁר ל֖/וֹ אַרְבַּ֣ע רַגְלָ֑יִם שֶׁ֥קֶץ ה֖וּא לָ/כֶֽם־׃
translation:
  text: But every winged swarming thing that has four feet is detestable to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'creeping thing that flies.' The Hebrew phrase refers broadly to swarming
      flying creatures, especially insects.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'four feet'; English might also say 'four legs.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כֹל
  chosen: But every
  alternatives:
  - And every
  - Now every
  lexicon: HALOT
  rationale: וְ can be rendered simply as 'and,' but here an adversative nuance fits
    the flow after the exception in the previous verse ('Yet these you may eat...').
    כֹל is 'every/all.' 'But every' captures the contrast and distributive force in
    natural English.
- source_word: שֶׁרֶץ
  chosen: swarming thing
  alternatives:
  - creeping thing
  - teeming thing
  lexicon: HALOT
  rationale: שֶׁרֶץ denotes a swarming/teeming small creature category. 'Swarming
    thing' is more natural and precise here than the traditional 'creeping thing,'
    especially for flying insects.
- source_word: הָעֹוף
  chosen: winged
  alternatives:
  - flying
  - of the birds/flying creatures
  lexicon: HALOT
  rationale: Literally 'the flying thing/creature' or 'the flyer.' In construct with
    שֶׁרֶץ, the phrase refers to swarming flying creatures, i.e., winged insects.
    'Winged' is concise and idiomatic in English when paired with 'swarming thing.'
- source_word: אֲשֶׁר לוֹ
  chosen: that has
  alternatives:
  - which has
  - that has for itself
  lexicon: HALOT
  rationale: Standard relative construction introducing the defining characteristic.
    'That has' is idiomatic modern English.
- source_word: אַרְבַּע רַגְלָיִם
  chosen: four feet
  alternatives:
  - four legs
  lexicon: HALOT
  rationale: The Hebrew says 'four feet/legs.' English commonly uses 'legs' for insects,
    but 'feet' is a formally closer rendering of רַגְלַיִם and remains understandable.
    The phrase is retained as stated in the source, despite the zoological complexity
    addressed in the surrounding context.
- source_word: שֶׁקֶץ
  chosen: detestable
  alternatives:
  - an abomination
  - unclean thing
  - a detestable thing
  lexicon: HALOT
  rationale: שֶׁקֶץ in dietary/ritual contexts denotes something abhorrent or detestable,
    often in the sense of prohibited impurity. 'Detestable' communicates the force
    in readable modern English without importing later theological freight attached
    to 'abomination.'
- source_word: הוּא לָכֶם
  chosen: is detestable to you
  alternatives:
  - it is detestable to you
  - shall be detestable to you
  - is an abomination for you
  lexicon: HALOT
  rationale: The clause is verbless in Hebrew ('it [is] detestable to you'). English
    supplies 'is.' 'To you' preserves the covenantal addressee and legal orientation
    of the prohibition.
