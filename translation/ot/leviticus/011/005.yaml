theological_decisions:
- issue: Nature of טָמֵא in Levitical food law
  chosen_reading: ritually unclean, not a statement of intrinsic moral evil
  alternative_readings:
  - morally impure
  rationale: Within Leviticus 11, טָמֵא denotes cultic/ritual status in the dietary
    system. Rendering it 'unclean' preserves the legal-theological category without
    importing a claim about the animal's moral character.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the text''s categories without importing doctrinal claims'
