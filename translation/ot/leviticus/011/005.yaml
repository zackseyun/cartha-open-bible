id: LEV.11.5
reference: Leviticus 11:5
source:
  edition: WLC
  text: וְ/אֶת הַ/שָּׁפָ֗ן כִּֽי מַעֲלֵ֤ה גֵרָה֙ ה֔וּא וּ/פַרְסָ֖ה לֹ֣א יַפְרִ֑יס
    טָמֵ֥א ה֖וּא לָ/כֶֽם־־׃
translation:
  text: And the rock badger, because it chews the cud but does not divide the hoof,
    is unclean for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hyrax.' Traditional English versions often have 'coney.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשָּׁפָן
  chosen: the rock badger
  alternatives:
  - the hyrax
  - the coney
  lexicon: HALOT
  rationale: שָׁפָן refers to the small cliff-dwelling mammal commonly identified
    as the rock hyrax/rock badger. 'Rock badger' is a readable modern rendering; 'hyrax'
    is more zoologically precise but less familiar, and 'coney' is archaic/traditional
    rather than source-transparent.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the animal's classification. 'Because' is clearer
    in modern English than the more formal 'for' while preserving the causal sense.
- source_word: מַעֲלֵה גֵרָה
  chosen: chews the cud
  alternatives:
  - brings up cud
  - is one that brings up cud
  lexicon: HALOT
  rationale: The Hebrew idiom literally refers to bringing up cud; idiomatic English
    is 'chews the cud.' This is the standard natural rendering of the dietary classification
    term.
- source_word: וּפַרְסָה לֹא יַפְרִיס
  chosen: does not divide the hoof
  alternatives:
  - does not split the hoof
  - does not part the hoof
  lexicon: HALOT
  rationale: The phrase describes the absence of a divided hoof. 'Divide the hoof'
    is a clear, fairly formal rendering that matches the dietary-law terminology.
- source_word: טָמֵא
  chosen: unclean
  alternatives:
  - impure
  lexicon: HALOT
  rationale: In Levitical purity legislation, 'unclean' is the established and clearest
    English equivalent for ritual impurity; 'impure' is possible but less idiomatic
    in this legal context.
- source_word: לָכֶם
  chosen: for you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: Marks the classification as applying to the addressed community. 'For
    you' is the most natural English expression in this legal declaration.
