id: LEV.11.18
reference: Leviticus 11:18
source:
  edition: WLC
  text: וְ/אֶת הַ/תִּנְשֶׁ֥מֶת וְ/אֶת הַ/קָּאָ֖ת וְ/אֶת הָ/רָחָֽם־־־׃
translation:
  text: the owl, the pelican, and the carrion vulture;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The precise identification of these birds is uncertain. תִּנְשֶׁמֶת may
      denote a kind of owl, possibly a horned owl, little owl, or screech owl.
    reason: lexical_alternative
  - marker: b
    text: קָּאָת is traditionally rendered 'pelican,' though some identify it as a
      cormorant or another desert-dwelling bird.
    reason: lexical_alternative
  - marker: c
    text: רָחָם likely refers to a scavenging bird such as a vulture; traditional
      English versions often have 'gier eagle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַתִּנְשֶׁמֶת
  chosen: the owl
  alternatives:
  - the horned owl
  - the little owl
  - the screech owl
  lexicon: HALOT
  rationale: The precise species is uncertain. In the dietary list, this term is traditionally
    understood as an unclean bird, and 'owl' is the broadest clear English rendering.
    More specific identifications are possible but too uncertain for the main text,
    so representative alternatives are preserved in a footnote.
- source_word: הַקָּאָת
  chosen: the pelican
  alternatives:
  - the cormorant
  - the desert owl
  lexicon: HALOT
  rationale: This bird name is uncertain, but 'pelican' has strong translation precedent
    and fits several contexts where the term appears in desolate places. Because zoological
    identification is debated, alternatives are preserved in a footnote.
- source_word: הָרָחָם
  chosen: the carrion vulture
  alternatives:
  - the gier eagle
  - the vulture
  lexicon: HALOT
  rationale: The Hebrew term likely refers to a scavenging bird of prey; 'carrion
    vulture' communicates that sense in contemporary English better than the archaic
    'gier eagle.' A broader 'vulture' is possible, and the traditional rendering is
    preserved in a footnote.
- source_word: וְאֶת
  chosen: and
  lexicon: Hebrew grammar
  rationale: The repeated direct-object marker with conjunction structures a continuing
    list. English idiom renders this naturally as a coordinated series with commas
    and a final 'and,' without repeating 'and' before every item.
