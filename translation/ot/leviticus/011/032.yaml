id: LEV.11.32
reference: Leviticus 11:32
source:
  edition: WLC
  text: וְ/כֹ֣ל אֲשֶׁר יִפֹּל עָלָי/ו֩ מֵ/הֶ֨ם בְּ/מֹתָ֜/ם יִטְמָ֗א מִ/כָּל כְּלִי
    עֵץ֙ א֣וֹ בֶ֤גֶד אוֹ עוֹר֙ א֣וֹ שָׂ֔ק כָּל כְּלִ֕י אֲשֶׁר יֵעָשֶׂ֥ה מְלָאכָ֖ה
    בָּ/הֶ֑ם בַּ/מַּ֧יִם יוּבָ֛א וְ/טָמֵ֥א עַד הָ/עֶ֖רֶב וְ/טָהֵֽר־־׀־־־־־־׃
translation:
  text: 'And everything on which any of them falls when they are dead shall become
    unclean: any wooden vessel or garment or skin or sackcloth, any vessel with which
    work is done. It shall be put into the water, and it shall be unclean until the
    evening; then it shall be clean.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it shall be immersed in water.' The Hebrew literally says 'it shall
      be brought into the water.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל
  chosen: And everything
  alternatives:
  - And every thing
  - And whatever
  lexicon: HALOT
  rationale: כֹּל with the conjunction introduces a comprehensive category. 'Everything'
    is natural modern English and preserves the totalizing force.
- source_word: אֲשֶׁר יִפֹּל עָלָיו מֵהֶם
  chosen: on which any of them falls
  alternatives:
  - upon which one of them falls
  - that any of them falls on
  lexicon: HALOT
  rationale: The relative clause governs the object contaminated by contact. The singular
    pronominal suffix in עָלָיו is idiomatic after כֹּל and is well represented by
    English 'on which.' 'Any of them' captures the distributive sense of מֵהֶם in
    context, referring back to the carcasses of the unclean swarming things in the
    preceding verse.
- source_word: בְּמֹתָם
  chosen: when they are dead
  alternatives:
  - in their death
  - when they die
  lexicon: HALOT
  rationale: The preposition with the infinitive-like noun expresses the state/time
    of death. In context the issue is contact with their dead bodies, so 'when they
    are dead' is the clearest idiomatic rendering.
- source_word: יִטְמָא
  chosen: shall become unclean
  alternatives:
  - shall be unclean
  - shall be made unclean
  lexicon: HALOT
  rationale: The verb marks the resulting state of ritual impurity. 'Become unclean'
    preserves the transition caused by contact better than the stative 'be unclean.'
- source_word: מִכָּל כְּלִי עֵץ
  chosen: from any wooden vessel
  alternatives:
  - whether any wooden article
  - from every wooden utensil
  lexicon: HALOT
  rationale: The phrase introduces examples of affected objects. Although מִן can
    be partitive/'from among,' idiomatic English here is best expressed by 'any.'
    כְּלִי is a broad term for implement/container; 'vessel' keeps the cultic/legal
    register without becoming obscure.
- source_word: בֶגֶד
  chosen: garment
  alternatives:
  - cloth
  - article of clothing
  lexicon: HALOT
  rationale: '''Garment'' is a standard and accurate rendering for בגד in legal material.'
- source_word: עוֹר
  chosen: skin
  alternatives:
  - hide
  - leather
  lexicon: HALOT
  rationale: The term denotes animal skin/hide used as material. 'Skin' is broad and
    straightforward; 'leather' would imply a more processed state than the Hebrew
    necessarily does.
- source_word: שָׂק
  chosen: sackcloth
  alternatives:
  - sack
  - coarse cloth
  lexicon: HALOT
  rationale: שַׂק commonly denotes coarse woven material used for sacks. 'Sackcloth'
    is the conventional precise term and fits the material list.
- source_word: כָּל כְּלִי אֲשֶׁר יֵעָשֶׂה מְלָאכָה בָּהֶם
  chosen: any vessel with which work is done
  alternatives:
  - any article used for work
  - any implement by which labor is performed
  lexicon: HALOT
  rationale: This appositional summary broadens the list to any working implement
    made of the listed materials. The passive יֵעָשֶׂה is naturally rendered in English
    with 'is done,' and בָּהֶם is instrumental, hence 'with which.'
- source_word: בַּמַּיִם יוּבָא
  chosen: It shall be put into the water
  alternatives:
  - it shall be brought into water
  - it shall be immersed in water
  lexicon: HALOT
  rationale: The Hophil of בוא literally means 'be brought,' but in this purification
    context idiomatic English is 'put into.' 'The water' reflects the Hebrew article;
    it likely has generic force for washing water, but retaining 'the' stays closer
    to the source.
- source_word: וְטָמֵא עַד הָעֶרֶב
  chosen: and it shall be unclean until the evening
  alternatives:
  - and remain unclean until evening
  lexicon: HALOT
  rationale: This states the duration of ritual impurity. 'The evening' preserves
    the article and the legal cadence of the Hebrew.
- source_word: וְטָהֵר
  chosen: then it shall be clean
  alternatives:
  - and it shall be clean
  - and it shall become clean
  lexicon: HALOT
  rationale: The final verb indicates restoration to a clean state after the specified
    time and washing. 'Then' makes the temporal sequence explicit in natural English.
