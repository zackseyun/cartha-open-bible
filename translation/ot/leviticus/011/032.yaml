theological_decisions:
- issue: Nature of impurity language
  chosen_reading: Render טמא/טהר as 'unclean/clean' in ritual-legal sense without
    importing moral guilt language.
  alternative_readings:
  - defiled/undefiled
  - impure/pure
  rationale: In Levitical purity legislation, the concern is ceremonial status rather
    than necessarily moral sin. 'Unclean/clean' is the most established and accessible
    pair for this domain and avoids over-theologizing the verse.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the text states without importing doctrinal claims.'
