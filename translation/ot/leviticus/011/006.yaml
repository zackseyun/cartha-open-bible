id: LEV.11.6
reference: Leviticus 11:6
source:
  edition: WLC
  text: וְ/אֶת הָ/אַרְנֶ֗בֶת כִּֽי מַעֲלַ֤ת גֵּרָה֙ הִ֔וא וּ/פַרְסָ֖ה לֹ֣א הִפְרִ֑יסָה
    טְמֵאָ֥ה הִ֖וא לָ/כֶֽם־־׃
translation:
  text: And the hare, because it chews the cud but does not divide the hoof, is unclean
    for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the rabbit.' The Hebrew אַרְנֶבֶת is traditionally understood as 'hare,'
      though some take it more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאַרְנֶבֶת
  chosen: the hare
  alternatives:
  - the rabbit
  lexicon: HALOT
  rationale: אַרְנֶבֶת traditionally refers to the hare in biblical animal lists;
    'hare' is the more established and likely zoological identification, while 'rabbit'
    is a possible but less precise alternative in English.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the classification, so 'because'
    communicates the causal force clearly in modern English.
- source_word: מַעֲלַת גֵּרָה
  chosen: chews the cud
  alternatives:
  - brings up cud
  - ruminates
  lexicon: HALOT
  rationale: The idiom literally refers to bringing up cud, but 'chews the cud' is
    the standard natural English equivalent for the dietary-law criterion.
- source_word: וּפַרְסָה לֹא הִפְרִיסָה
  chosen: but does not divide the hoof
  alternatives:
  - but does not split the hoof
  - and the hoof it has not divided
  lexicon: HALOT
  rationale: This clause states the second diagnostic criterion negatively. 'Divide
    the hoof' is a clear, fairly literal rendering; 'but' captures the adversative
    sense naturally in English.
- source_word: טְמֵאָה הִוא לָכֶם
  chosen: is unclean for you
  alternatives:
  - it is unclean to you
  - it is unclean for your use
  lexicon: HALOT
  rationale: טָמֵא in Leviticus denotes ritual uncleanness in the dietary context.
    'Unclean for you' preserves the covenantal addressee sense of לָכֶם without overexplaining.
