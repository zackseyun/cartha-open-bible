theological_decisions:
- issue: Nature of uncleanness in Levitical dietary law
  chosen_reading: ritually unclean
  alternative_readings:
  - morally impure
  rationale: The verse concerns dietary classification within Israel's holiness code,
    not a statement that the animal is morally evil. The English text keeps the broader
    biblical term 'unclean' while the lexical rationale recognizes its ritual sense
    in context.
