id: LEV.11.20
reference: Leviticus 11:20
source:
  edition: WLC
  text: כֹּ֚ל שֶׁ֣רֶץ הָ/ע֔וֹף הַ/הֹלֵ֖ךְ עַל אַרְבַּ֑ע שֶׁ֥קֶץ ה֖וּא לָ/כֶֽם־׃ס
translation:
  text: Every swarming winged creature that walks on four feet is detestable to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Every swarming flying creature.' The Hebrew עוֹף can denote flying creatures
      broadly, not only birds.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'walks on four'; this idiom refers to locomotion on four legs, though
      the following verses make an exception for certain hopping insects.
    reason: cultural_note
  - marker: c
    text: Or 'is an abomination to you.' The term here denotes ritual detestability
      in the food laws.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  chosen: Every
  alternatives:
  - All
  lexicon: HALOT
  rationale: 'Distributive sense fits the legal prohibition: each member of the class
    is in view. ''Every'' reads naturally in English while preserving the comprehensiveness
    of the Hebrew.'
- source_word: שֶׁרֶץ
  chosen: swarming creature
  alternatives:
  - teeming thing
  - creeping thing
  lexicon: HALOT
  rationale: The noun denotes small creatures that swarm or teem. 'Swarming creature'
    is more precise and natural in modern English than the traditional 'creeping thing,'
    especially in a zoological purity-law context.
- source_word: הָעוֹף
  chosen: winged
  alternatives:
  - flying
  - of the birds
  lexicon: HALOT
  rationale: Although עוֹף can refer broadly to flying creatures, in Leviticus 11
    it includes insects as well as birds. Rendering adjectivally as 'winged' avoids
    misleading readers into thinking only birds are meant.
- source_word: הַהֹלֵךְ
  chosen: that walks
  alternatives:
  - that goes
  lexicon: HALOT
  rationale: The participle describes characteristic locomotion. 'That walks' is idiomatic
    and fits the classification being made.
- source_word: עַל אַרְבַּע
  chosen: on all fours
  alternatives:
  - on four feet
  - on four
  lexicon: HALOT
  rationale: The idiom refers to moving with four legs. 'On all fours' is the natural
    English equivalent, even though the following verses clarify that some insects
    have additional jointed legs for hopping.
- source_word: שֶׁקֶץ
  chosen: detestable
  alternatives:
  - an abomination
  - unclean thing
  lexicon: HALOT
  rationale: שֶׁקֶץ in dietary law marks something ritually abhorrent or taboo. 'Detestable'
    communicates the force without importing later moralized connotations of 'abomination.'
    'Unclean' is too weak and would collapse a distinct term into a broader category.
- source_word: לָכֶם
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: 'The dative marks relation to Israel under the law: these creatures are
    to be regarded as detestable by them. ''To you'' is a straightforward rendering.'
