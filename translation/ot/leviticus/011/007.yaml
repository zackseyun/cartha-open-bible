id: LEV.11.7
reference: Leviticus 11:7
source:
  edition: WLC
  text: וְ/אֶת הַ֠/חֲזִיר כִּֽי מַפְרִ֨יס פַּרְסָ֜ה ה֗וּא וְ/שֹׁסַ֥ע שֶׁ֨סַע֙ פַּרְסָ֔ה
    וְ/ה֖וּא גֵּרָ֣ה לֹֽא יִגָּ֑ר טָמֵ֥א ה֖וּא לָ/כֶֽם־־־׃
translation:
  text: And the pig, because it has a divided hoof and splits the hoof, but does not
    chew the cud, is unclean to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the swine.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'does not bring up cud.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֲזִיר
  chosen: the pig
  alternatives:
  - the swine
  lexicon: HALOT
  rationale: Rendered with the common modern English term 'pig' for readability. 'Swine'
    is more traditional but less natural in contemporary English; the Hebrew denotes
    the animal species generally.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the explanatory basis for the classification. 'Because' makes
    the causal force clear in modern English.
- source_word: מַפְרִיס פַּרְסָה
  chosen: has a divided hoof
  alternatives:
  - parts the hoof
  - divides the hoof
  lexicon: HALOT
  rationale: This idiom describes an animal whose hoof is split. 'Has a divided hoof'
    is idiomatic English and captures the resultant state rather than forcing a wooden
    verbal expression.
- source_word: וְשֹׁסַע שֶׁסַע פַּרְסָה
  chosen: and splits the hoof
  alternatives:
  - and is cleft-footed
  - and cleaves a cleft in the hoof
  lexicon: HALOT
  rationale: The Hebrew intensifies/specifies the split-hoof description. Kept as
    a second coordinated description rather than collapsing it entirely, preserving
    the Hebrew's emphasis while remaining readable.
- source_word: גֵּרָה לֹא יִגָּר
  chosen: does not chew the cud
  alternatives:
  - does not bring up cud
  lexicon: HALOT
  rationale: Standard and accurate English zoological expression for the Hebrew idiom.
    More literal renderings are possible, but 'chew the cud' best communicates the
    sense.
- source_word: טָמֵא הוּא לָכֶם
  chosen: is unclean to you
  alternatives:
  - it is unclean for you
  lexicon: HALOT
  rationale: Expresses ritual impurity in dietary law context without importing moral
    categories. 'To you' preserves the dative relation and covenantal addressee.
