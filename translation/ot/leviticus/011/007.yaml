theological_decisions:
- issue: Nature of טָמֵא in dietary legislation
  chosen_reading: unclean in the ritual/dietary sense
  alternative_readings:
  - impure
  - defiled
  rationale: In Leviticus 11 the category concerns Israel's food laws and holiness
    distinctions. 'Unclean' is the established and clearest English rendering, and
    avoids overstating the term as moral evil in this context.
