id: LEV.11.10
reference: Leviticus 11:10
source:
  edition: WLC
  text: וְ/כֹל֩ אֲשֶׁ֨ר אֵֽין ל֜/וֹ סְנַפִּ֣יר וְ/קַשְׂקֶ֗שֶׂת בַּ/יַּמִּים֙ וּ/בַ/נְּחָלִ֔ים מִ/כֹּל֙ שֶׁ֣רֶץ הַ/מַּ֔יִם וּ/מִ/כֹּ֛ל נֶ֥פֶשׁ הַ/חַיָּ֖ה אֲשֶׁ֣ר בַּ/מָּ֑יִם שֶׁ֥קֶץ הֵ֖ם לָ/כֶֽם־׃
translation:
  text: But everything in the seas and in the streams that does not have fins and scales[b][a], among all the swarming things in the waters and among all the living creatures that are in the waters—they are detestable to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an abomination to you.' The Hebrew noun denotes something ritually abhorrent or detestable in this dietary-law context.
    reason: lexical_alternative
  - marker: b
    text: '''Streams'' may also be rendered ''rivers'' or ''wadis,'' depending on context; the Hebrew refers broadly to flowing watercourses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל
  chosen: But everything
  alternatives:
  - And everything
  - Every creature
  lexicon: HALOT
  rationale: כֹל with prefixed ו introduces the contrasting counterpart to the previous verse; 'everything' preserves the comprehensive scope, while 'But' reflects the adversative force in context better than a simple 'And'.
- source_word: אֲשֶׁר אֵין לוֹ
  chosen: that does not have
  alternatives:
  - which has no
  - that lacks
  lexicon: HALOT
  rationale: This relative clause straightforwardly describes absence of the required features. 'Does not have' is natural modern English and accurately reflects the Hebrew construction.
- source_word: סְנַפִּיר וְקַשְׂקֶשֶׂת
  chosen: fins and scales
  alternatives:
  - a fin and scales
  - fins or scales
  lexicon: HALOT
  rationale: These are the two required anatomical markers for permitted aquatic animals. English idiom prefers plural 'fins and scales.' The conjunction is additive, not disjunctive, so 'and' must be retained.
- source_word: בַּיַּמִּים וּבַנְּחָלִים
  chosen: in the seas and in the streams
  alternatives:
  - in the seas and in the rivers
  - in the oceans and in the wadis
  lexicon: HALOT
  rationale: יַּמִּים is best rendered 'seas.' נְחָלִים can denote streams, riverbeds, or wadis; here 'streams' is a clear, accessible rendering for flowing inland waters in a dietary-law context.
- source_word: מִכֹּל שֶׁרֶץ הַמַּיִם
  chosen: among all the swarming things in the waters
  alternatives:
  - from all the swarming things of the waters
  - among every teeming thing in the water
  lexicon: HALOT
  rationale: שֶׁרֶץ refers to swarming/teeming creatures. 'Among all' captures the partitive מִן in idiomatic English. 'Swarming things' preserves the concrete category language used in Leviticus.
- source_word: וּמִכֹּל נֶפֶשׁ הַחַיָּה
  chosen: and among all the living creatures
  alternatives:
  - and from every living being
  - and among every living soul
  lexicon: HALOT
  rationale: נֶפֶשׁ הַחַיָּה is a broad expression for animate life. 'Living creatures' is natural English and avoids the misleadingly narrow or overly literal 'living soul' while preserving the category of animate beings.
- source_word: אֲשֶׁר בַּמָּיִם
  chosen: that are in the waters
  alternatives:
  - that are in the water
  lexicon: HALOT
  rationale: The relative clause modifies the preceding category of living creatures. Plural 'waters' follows the Hebrew and suits the broad reference to aquatic environments.
- source_word: שֶׁקֶץ
  chosen: detestable
  alternatives:
  - an abomination
  - unclean and detestable
  lexicon: HALOT
  rationale: שֶׁקֶץ in dietary contexts denotes something ritually abhorrent or detestable. 'Detestable' communicates the force without importing later technical terminology not explicit in this noun alone. 'Abomination' is possible but can sound archaic or overgeneralized in modern English.
- source_word: הֵם לָכֶם
  chosen: they are detestable to you
  alternatives:
  - they shall be detestable to you
  - they are an abomination for you
  lexicon: HALOT
  rationale: The verbless clause states their status for Israel. English requires a copula; present 'they are' is the most direct rendering. A future-like 'shall be' is possible in legal style, but the Hebrew here is nominal rather than explicitly future.
