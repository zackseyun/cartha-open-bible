theological_decisions:
- issue: Ritual-status terminology in dietary law
  chosen_reading: detestable
  alternative_readings:
  - abomination
  rationale: The verse concerns covenantal dietary classification, not a generalized moral condemnation of all possible referents. 'Detestable' preserves the strong ritual-legal force of שֶׁקֶץ in accessible modern English without overstating beyond the text.
