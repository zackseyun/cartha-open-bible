id: LEV.11.2
reference: Leviticus 11:2
source:
  edition: WLC
  text: דַּבְּר֛וּ אֶל בְּנֵ֥י יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר זֹ֤את הַֽ/חַיָּה֙ אֲשֶׁ֣ר תֹּאכְל֔וּ
    מִ/כָּל הַ/בְּהֵמָ֖ה אֲשֶׁ֥ר עַל הָ/אָֽרֶץ־־־׃
translation:
  text: Speak to the sons of Israel, saying, ‘These are the living creatures that
    you may eat from among all the animals that are on the earth.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children of Israel' or 'the Israelites.' The Hebrew is literally
      'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'This is the living creature...'; English uses 'These are the living
      creatures' to express the collective/classifying sense naturally.
    reason: lexical_alternative
  - marker: c
    text: Or 'animals that are on the land.' The phrase distinguishes land creatures
      from other categories treated in the chapter.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבְּרוּ
  chosen: Speak
  alternatives:
  - Tell
  - Say
  lexicon: HALOT
  rationale: Imperative plural of דבר, addressed to Moses and Aaron in context. 'Speak'
    is the standard direct imperative and fits the formal instruction style.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' In keeping with the gender-accurate principle,
    the familial expression is preserved rather than flattened to 'Israelites,' though
    that alternative captures the collective sense.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and say
  - thus saying
  lexicon: HALOT
  rationale: Standard Hebrew quotative infinitive introducing direct speech. 'Saying'
    is concise and natural in English biblical style.
- source_word: זֹאת
  chosen: These are
  alternatives:
  - This is
  - This
  lexicon: HALOT
  rationale: Though formally singular feminine ('this'), English idiom commonly uses
    a plural predicate here because the referent is a class introduced by a collective
    noun and followed by plural application ('you may eat'). 'These are' best communicates
    the classificatory force.
- source_word: הַחַיָּה
  chosen: the living creatures
  alternatives:
  - the animal
  - the creature
  - the wildlife
  lexicon: HALOT
  rationale: חיה can denote a living creature or animal. Here it introduces edible
    land-creature categories. 'Living creatures' preserves the broader lexical sense
    without prematurely narrowing to one species or class.
- source_word: אֲשֶׁר תֹּאכְלוּ
  chosen: that you may eat
  alternatives:
  - which you shall eat
  - that you can eat
  lexicon: HALOT
  rationale: Relative clause with imperfect second plural. 'May eat' conveys permitted/authorized
    consumption in legal context better than bare future.
- source_word: מִכָּל
  chosen: from among all
  alternatives:
  - out of all
  - from all
  lexicon: HALOT
  rationale: The preposition מן with כל marks selection from a larger set. 'From among
    all' makes the partitive sense explicit.
- source_word: הַבְּהֵמָה
  chosen: the animals
  alternatives:
  - the beasts
  - the livestock
  - the cattle
  lexicon: HALOT
  rationale: Though בהמה can sometimes refer more narrowly to beasts or domesticated
    animals, in this dietary-law context paired with 'on the earth' it functions broadly
    for land animals. 'Animals' is the clearest modern English rendering.
- source_word: אֲשֶׁר עַל הָאָרֶץ
  chosen: that are on the earth
  alternatives:
  - that are on the land
  - that are upon the earth
  lexicon: HALOT
  rationale: A locative qualifier distinguishing terrestrial creatures from aquatic
    ones in the following context. 'On the earth' is a straightforward rendering;
    'on the land' is possible but less literal.
