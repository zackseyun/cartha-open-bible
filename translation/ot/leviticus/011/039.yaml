id: LEV.11.39
reference: Leviticus 11:39
source:
  edition: WLC
  text: וְ/כִ֤י יָמוּת֙ מִן הַ/בְּהֵמָ֔ה אֲשֶׁר הִ֥יא לָ/כֶ֖ם לְ/אָכְלָ֑ה הַ/נֹּגֵ֥עַ
    בְּ/נִבְלָתָ֖/הּ יִטְמָ֥א עַד הָ/עָֽרֶב־־־׃
translation:
  text: And if any of the livestock that may be used for food dies, the one who touches
    its carcass shall be unclean until the evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'that is for you for food.' The Hebrew phrase identifies
      animals permitted as food.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: And if
  alternatives:
  - If
  - Now if
  lexicon: HALOT
  rationale: Introduces a conditional case connected to the preceding regulations.
    'And if' preserves the discourse linkage of ו while keeping the conditional force
    of כי.
- source_word: יָמוּת
  chosen: dies
  alternatives:
  - should die
  lexicon: HALOT
  rationale: Qal imperfect 3ms of מות in a conditional clause is naturally rendered
    with present/future sense in English. 'Dies' is idiomatic and sufficiently formal.
- source_word: מִן הַבְּהֵמָה
  chosen: any of the livestock
  alternatives:
  - from the livestock
  - any animal
  lexicon: HALOT
  rationale: 'מן here is partitive: one animal from among the class of בהמה. ''Livestock''
    fits the domestic-animal sense in this dietary context better than the broader
    ''animal.'' ''Any of the livestock'' makes the partitive force explicit.'
- source_word: אֲשֶׁר הִיא לָכֶם לְאָכְלָה
  chosen: that may be used for food
  alternatives:
  - that is for you for food
  - that belongs to you for food
  - that you may eat
  lexicon: HALOT
  rationale: The phrase identifies animals permitted as food. A highly literal rendering
    ('that is for you for food') is awkward in English; 'may be used for food' preserves
    the permissive/category sense without overparaphrasing. 'That you may eat' is
    possible, but the Hebrew describes suitability/classification more than the act
    itself.
- source_word: הַנֹּגֵעַ
  chosen: the one who touches
  alternatives:
  - whoever touches
  - the person touching
  lexicon: HALOT
  rationale: Substantival participle indicating the person performing the action.
    'The one who touches' is clear and close to the Hebrew form.
- source_word: בְּנִבְלָתָהּ
  chosen: its carcass
  alternatives:
  - its dead body
  - its carcass remains
  lexicon: HALOT
  rationale: נְבֵלָה refers to the carcass of an animal that has died. 'Carcass' is
    the standard concise rendering in purity-law contexts and distinguishes it from
    a living body.
- source_word: יִטְמָא
  chosen: shall be unclean
  alternatives:
  - will be unclean
  - shall become unclean
  lexicon: HALOT
  rationale: The verb denotes becoming/being rendered ritually unclean. 'Shall be
    unclean' is standard legal English and fits the prescriptive context.
- source_word: עַד הָעָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  lexicon: HALOT
  rationale: Definite article on עֶרֶב is naturally rendered in English as 'the evening'
    in this legal formula, though 'until evening' would also be acceptable.
