id: LEV.11.38
reference: Leviticus 11:38
source:
  edition: WLC
  text: וְ/כִ֤י יֻתַּן מַ֨יִם֙ עַל זֶ֔רַע וְ/נָפַ֥ל מִ/נִּבְלָתָ֖/ם עָלָ֑י/ו טָמֵ֥א
    ה֖וּא לָ/כֶֽם־־׃ס
translation:
  text: But if water has been put on the seed, and any of their carcasses falls on
    it, it is unclean to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'any of their dead bodies.' The Hebrew נְבֵלָה denotes an animal carcass;
      'carcass' best fits the purity-law context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional contrast with the previous verse. 'But if' captures
    both the conjunction and the adversative/contrastive force in context better than
    a bare 'if'.
- source_word: יֻתַּן
  chosen: has been put
  alternatives:
  - is put
  - is placed
  - is moistened
  lexicon: HALOT
  rationale: Hophal of נתן is passive, 'is given/put.' English present perfect ('has
    been put') reads naturally in the conditional and reflects the resultant state
    relevant to impurity. 'Moistened' is interpretive and less directly tied to the
    verb.
- source_word: מַיִם
  chosen: water
  lexicon: HALOT
  rationale: Standard rendering of the plural-form noun with singular sense in English.
- source_word: עַל זֶרַע
  chosen: on the seed
  alternatives:
  - on seed
  - on sowing seed
  lexicon: HALOT
  rationale: Retains the concrete singular collective sense. 'The seed' is idiomatic
    English for seed intended for sowing in this legal context.
- source_word: וְנָפַל
  chosen: and ... falls
  alternatives:
  - and ... has fallen
  - and ... should fall
  lexicon: HALOT
  rationale: 'Qal perfect after the conditional can be rendered with present sense
    in English legal style: ''if ... and ... falls.'' This keeps the case-law feel
    and avoids overcomplicating the sequence.'
- source_word: מִנִּבְלָתָם
  chosen: any of their carcasses
  alternatives:
  - any of their dead bodies
  - from their carcasses
  lexicon: HALOT
  rationale: נְבֵלָה refers to the carcass/dead body of an animal. Because מִן after
    נפל commonly has a partitive sense here, 'any of their carcasses' is more natural
    than a strictly spatial 'from their carcasses.' 'Carcasses' fits the animal-purity
    context better than 'dead bodies.'
- source_word: עָלָיו
  chosen: on it
  alternatives:
  - upon it
  - on that seed
  lexicon: HALOT
  rationale: Refers back to זֶרַע, which is grammatically masculine singular. English
    'it' is the natural anaphoric rendering.
- source_word: טָמֵא הוּא לָכֶם
  chosen: it is unclean to you
  alternatives:
  - it shall be unclean to you
  - it is unclean for you
  lexicon: HALOT
  rationale: This is the standard impurity declaration formula. 'Unclean' preserves
    the ritual category without importing moral connotations. 'To you' reflects לָכֶם
    as the covenant-community perspective in the law.
