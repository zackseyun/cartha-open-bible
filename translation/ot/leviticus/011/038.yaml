theological_decisions:
- issue: Nature of impurity language
  chosen_reading: ritual impurity ('unclean')
  alternative_readings:
  - defiled
  - impure
  rationale: The verse concerns Levitical purity status, not necessarily moral guilt.
    'Unclean' is the established and clearest English term for this ritual category.
