id: LEV.11.9
reference: Leviticus 11:9
source:
  edition: WLC
  text: אֶת זֶה֙ תֹּֽאכְל֔וּ מִ/כֹּ֖ל אֲשֶׁ֣ר בַּ/מָּ֑יִם כֹּ֣ל אֲשֶׁר ל/וֹ֩ סְנַפִּ֨יר
    וְ/קַשְׂקֶ֜שֶׂת בַּ/מַּ֗יִם בַּ/יַּמִּ֛ים וּ/בַ/נְּחָלִ֖ים אֹתָ֥/ם תֹּאכֵֽלוּ־־׃
translation:
  text: 'These you may eat from all that are in the waters: whatever in the waters,
    in the seas and in the streams, has fins and scales—these you may eat.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rivers' for 'streams' (Hebrew נְחָלִים), a term that can refer to streams,
      river-courses, or wadis depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶת זֶה
  chosen: this
  alternatives:
  - these
  lexicon: HALOT
  rationale: 'Idiomatic introductory demonstrative in a dietary law context: ''this
    you may eat'' = ''this''/''these are what you may eat.'' Singular ''this'' preserves
    the Hebrew form while remaining natural in English.'
- source_word: תֹּאכְלוּ
  chosen: you may eat
  alternatives:
  - you shall eat
  - you may consume
  lexicon: HALOT
  rationale: Imperfect 2mp in legal instruction can be rendered permissively here.
    'May eat' communicates allowed status in the clean/unclean framework more naturally
    than the more wooden 'shall eat.'
- source_word: מִכֹּל אֲשֶׁר בַּמָּיִם
  chosen: from all that are in the waters
  alternatives:
  - from everything that is in the water
  - among all that are in the waters
  lexicon: HALOT
  rationale: Retains the partitive sense of מִן ('from/among') and the plural 'waters'
    of the Hebrew, which is common biblical usage for bodies of water.
- source_word: כֹּל אֲשֶׁר לוֹ
  chosen: everything ... that has
  alternatives:
  - whatever has
  - all that has
  lexicon: HALOT
  rationale: Smooth English restructuring of the relative clause while preserving
    the distributive force of כֹּל אֲשֶׁר and possession expressed by לוֹ ('has').
- source_word: סְנַפִּיר
  chosen: fins
  alternatives:
  - a fin
  lexicon: HALOT
  rationale: Though singular in Hebrew as a class noun, English idiom in zoological
    description prefers plural 'fins,' especially paired with 'scales.'
- source_word: קַשְׂקֶשֶׂת
  chosen: scales
  alternatives:
  - a scale
  lexicon: HALOT
  rationale: Likewise a class noun rendered idiomatically in English as plural 'scales'
    in dietary classification.
- source_word: בַּמַּיִם
  chosen: in the waters
  alternatives:
  - in the water
  lexicon: HALOT
  rationale: Preserves the repeated locative phrase and the Hebrew plural form, which
    also helps maintain the verse's rhythmic legal style.
- source_word: בַּיַּמִּים וּבַנְּחָלִים
  chosen: in the seas and in the streams
  alternatives:
  - in the seas and in the rivers
  - in the seas and in the wadis
  lexicon: HALOT
  rationale: יַּמִּים refers broadly to seas; נְחָלִים can denote streams, riverbeds,
    or wadis. 'Streams' is a readable modern choice broad enough for flowing inland
    waters in this classification context.
- source_word: אֹתָם תֹּאכֵלוּ
  chosen: you may eat them
  alternatives:
  - those you may eat
  - them you shall eat
  lexicon: HALOT
  rationale: Resumes and emphasizes the permitted creatures. English places the object
    after the verb for natural flow while preserving the permissive legal force.
