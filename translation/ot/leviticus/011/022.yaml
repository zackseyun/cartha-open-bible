id: LEV.11.22
reference: Leviticus 11:22
source:
  edition: WLC
  text: אֶת אֵ֤לֶּה מֵ/הֶם֙ תֹּאכֵ֔לוּ אֶת הָֽ/אַרְבֶּ֣ה לְ/מִינ֔/וֹ וְ/אֶת הַ/סָּלְעָ֖ם
    לְ/מִינֵ֑/הוּ וְ/אֶת הַ/חַרְגֹּ֣ל לְ/מִינֵ֔/הוּ וְ/אֶת הֶ/חָגָ֖ב לְ/מִינֵֽ/הוּ־־־־־׃
translation:
  text: 'These of them you may eat: the locust according to its kind, and the bald
    locust according to its kind, and the cricket according to its kind, and the grasshopper
    according to its kind.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The exact identification of the Hebrew insect names beyond 'locust' is uncertain;
      traditional renderings include 'bald locust' for סָּלְעָם and 'cricket' for
      חַרְגֹּל.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה מֵהֶם
  chosen: These of them
  alternatives:
  - These among them
  - Of these, from them
  lexicon: HALOT
  rationale: The phrase introduces a subset from the previously mentioned winged swarming
    things. 'These of them' stays close to the Hebrew while remaining intelligible;
    the following clause clarifies that these are the permitted kinds.
- source_word: תֹּאכֵלוּ
  chosen: you may eat
  alternatives:
  - you shall eat
  - you may consume
  lexicon: HALOT
  rationale: The imperfect here functions permissively within dietary law. 'You may
    eat' communicates allowance more naturally in modern English than the more ambiguous
    'you shall eat.'
- source_word: הָאַרְבֶּה
  chosen: the locust
  alternatives:
  - the swarming locust
  lexicon: HALOT
  rationale: אַרְבֶּה is the standard term for locust. 'Locust' is the most established
    and likely identification.
- source_word: לְמִינוֹ / לְמִינֵהוּ
  chosen: according to its kind
  alternatives:
  - after its kind
  - by its kind
  lexicon: HALOT
  rationale: This formula recurs in the Torah for classification. 'According to its
    kind' is clear modern English and preserves the taxonomic sense.
- source_word: הַסָּלְעָם
  chosen: the bald locust
  alternatives:
  - the solam insect
  - the locust of a certain kind
  lexicon: HALOT
  rationale: The exact zoological identification is uncertain. 'Bald locust' reflects
    a long-standing traditional rendering while signaling a distinct named insect.
    Because certainty is limited, an alternative is preserved in a footnote.
- source_word: הַחַרְגֹּל
  chosen: the cricket
  alternatives:
  - the katydid
  - the locust of a certain kind
  lexicon: HALOT
  rationale: The precise species is uncertain. 'Cricket' is a common English rendering
    for a hopping orthopteran insect and fits the context, but the uncertainty warrants
    a footnote.
- source_word: הֶחָגָב
  chosen: the grasshopper
  alternatives:
  - the locust
  - the hopper
  lexicon: HALOT
  rationale: חָגָב commonly denotes a grasshopper-type insect. 'Grasshopper' distinguishes
    it from אַרְבֶּה in the same verse while remaining natural English.
