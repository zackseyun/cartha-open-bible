theological_decisions:
- issue: Nature of the prohibition in holiness legislation
  chosen_reading: Render the verse as a dietary prohibition without importing later
    theological interpretation about continuing applicability.
  alternative_readings:
  - Frame it as a timeless moral prohibition
  - Soften it as merely cultural taboo
  rationale: The Hebrew presents a direct legal prohibition within Levitical purity
    law. The translation should state that prohibition plainly and not resolve broader
    canonical or doctrinal debates not expressed in the verse itself.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
