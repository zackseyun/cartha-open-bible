id: LEV.11.42
reference: Leviticus 11:42
source:
  edition: WLC
  text: כֹּל֩ הוֹלֵ֨ךְ עַל גָּח֜ וְ/כֹ֣ל הוֹלֵ֣ךְ עַל אַרְבַּ֗ע עַ֚ד כָּל מַרְבֵּ֣ה
    רַגְלַ֔יִם לְ/כָל הַ/שֶּׁ֖רֶץ הַ/שֹּׁרֵ֣ץ עַל הָ/אָ֑רֶץ לֹ֥א תֹאכְל֖וּ/ם כִּי
    שֶׁ֥קֶץ הֵֽם־׀־־־־־׃
translation:
  text: Anything that goes on its belly, and anything that goes on four feet, up to
    every creature with many feet, among all the swarming things that swarm on the
    earth—you shall not eat them, for they are detestable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'crawls on its belly.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the swarming thing that swarms,' a repeated form that emphasizes
      this class of small creatures.
    reason: lexical_alternative
  - marker: c
    text: Or 'they are an abomination.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  chosen: anything
  alternatives:
  - everything
  - all that
  lexicon: HALOT
  rationale: Used distributively to introduce categories of creatures. 'Anything'
    reads naturally in English while preserving the comprehensive force of the Hebrew.
- source_word: הוֹלֵךְ עַל גָּח
  chosen: goes on its belly
  alternatives:
  - crawls on its belly
  - goes on the belly
  lexicon: HALOT
  rationale: The participle plus prepositional phrase describes mode of locomotion.
    'Goes on its belly' stays close to the Hebrew; 'crawls' is possible but slightly
    more interpretive.
- source_word: הוֹלֵךְ עַל אַרְבַּע
  chosen: goes on four feet
  alternatives:
  - goes on all fours
  - walks on four
  lexicon: HALOT
  rationale: A fairly literal rendering of the phrase. 'Four feet' is clearer and
    more idiomatic in English than the bare numeral, while preserving the concrete
    image.
- source_word: עַד כָּל מַרְבֵּה רַגְלַיִם
  chosen: up to every creature with many feet
  alternatives:
  - even every many-footed creature
  - including all that have many feet
  lexicon: HALOT
  rationale: The phrase extends the prohibition from belly-going and four-footed creatures
    to those with numerous legs. 'Creature with many feet' communicates the sense
    clearly without over-technical wording.
- source_word: לְכָל הַשֶּׁרֶץ הַשֹּׁרֵץ
  chosen: among all the swarming things that swarm
  alternatives:
  - of all the swarming creatures that swarm
  - among every swarming thing that moves in swarms
  lexicon: HALOT
  rationale: Preserves the cognate noun + participle construction ('the swarming thing
    that swarms') as much as readable English allows. 'Among' reflects the classificatory
    force of לְ here.
- source_word: עַל הָאָרֶץ
  chosen: on the earth
  alternatives:
  - on the ground
  - upon the earth
  lexicon: HALOT
  rationale: Either 'earth' or 'ground' is possible. 'Earth' is retained because it
    is the more direct lexical equivalent and fits the broader classification language
    of the verse.
- source_word: לֹא תֹאכְלֻם
  chosen: you shall not eat them
  alternatives:
  - you must not eat them
  - do not eat them
  lexicon: HALOT
  rationale: The imperfect with negation in legal material is well rendered by 'you
    shall not,' which preserves the prohibitive force and legal register.
- source_word: שֶׁקֶץ
  chosen: detestable
  alternatives:
  - an abomination
  - unclean and abhorrent
  lexicon: HALOT
  rationale: In dietary-law context this term denotes something ritually abhorrent
    or detestable. 'Detestable' is strong, readable modern English and avoids importing
    later connotations of 'abomination' beyond the immediate context.
