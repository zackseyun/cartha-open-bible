id: LEV.11.34
reference: Leviticus 11:34
source:
  edition: WLC
  text: מִ/כָּל הָ/אֹ֜כֶל אֲשֶׁ֣ר יֵאָכֵ֗ל אֲשֶׁ֨ר יָב֥וֹא עָלָ֛י/ו מַ֖יִם יִטְמָ֑א וְ/כָל מַשְׁקֶה֙ אֲשֶׁ֣ר יִשָּׁתֶ֔ה בְּ/כָל כְּלִ֖י יִטְמָֽא־־־׃
translation:
  text: Any food that may be eaten[a], on which water comes, becomes unclean; and any drink that may be drunk in any vessel becomes unclean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'every food that is eaten, on which water comes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכָּל
  chosen: Any
  alternatives:
  - From all
  - Of every
  lexicon: HALOT
  rationale: 'In context the preposition with כָּל introduces a partitive/general category: ''any/every food.'' English ''any'' is the most natural idiomatic rendering here.'
- source_word: הָאֹכֶל
  chosen: food
  alternatives:
  - the food
  - edible thing
  lexicon: HALOT
  rationale: The noun denotes food/that which is eaten. 'Food' is idiomatic and fits the legal context better than the more wooden 'the food' or 'edible thing.'
- source_word: אֲשֶׁר יֵאָכֵל
  chosen: that may be eaten
  alternatives:
  - which is eaten
  - that is edible
  lexicon: HALOT
  rationale: The relative clause with Niphal imperfect expresses what is fit or intended to be eaten. 'May be eaten' preserves that permissive/qualifying sense without over-paraphrase.
- source_word: אֲשֶׁר יָבֹא עָלָיו מַיִם
  chosen: if water comes on it
  alternatives:
  - on which water comes
  - if water is put on it
  - when water touches it
  lexicon: HALOT
  rationale: Literally 'which water comes upon it.' Rendering as a conditional clause is natural English and preserves the legal condition. 'Comes on it' stays close to the Hebrew without specifying agency not present in the text.
- source_word: יִטְמָא
  chosen: becomes unclean
  alternatives:
  - is unclean
  - shall be unclean
  - becomes impure
  lexicon: HALOT
  rationale: The verb טמא in this ritual context denotes becoming ceremonially unclean. 'Becomes unclean' captures the resultant change of state better than the stative 'is unclean.' 'Impure' is possible but 'unclean' is the more standard and transparent rendering in Leviticus.
- source_word: מַשְׁקֶה
  chosen: drink
  alternatives:
  - beverage
  - liquid
  lexicon: HALOT
  rationale: The noun refers to something drunk. 'Drink' is concise and natural; 'beverage' is too modern/formal, and 'liquid' is broader than the Hebrew.
- source_word: אֲשֶׁר יִשָּׁתֶה
  chosen: that may be drunk
  alternatives:
  - which is drunk
  - fit to drink
  lexicon: HALOT
  rationale: As with 'may be eaten,' the Niphal imperfect here qualifies the category as drinkable. 'May be drunk' preserves the form and legal categorization.
- source_word: בְּכָל כְּלִי
  chosen: in any vessel
  alternatives:
  - in every vessel
  - in any container
  lexicon: HALOT
  rationale: כְּלִי is a general term for vessel/container/utensil. 'Vessel' fits the ritual-register context of Leviticus better than the more colloquial 'container.' 'Any' matches the distributive force naturally in English.
