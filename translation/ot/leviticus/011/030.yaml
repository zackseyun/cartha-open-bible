id: LEV.11.30
reference: Leviticus 11:30
source:
  edition: WLC
  text: וְ/הָ/אֲנָקָ֥ה וְ/הַ/כֹּ֖חַ וְ/הַ/לְּטָאָ֑ה וְ/הַ/חֹ֖מֶט וְ/הַ/תִּנְשָֽׁמֶת׃
translation:
  text: the gecko, the monitor lizard, the lizard, the sand lizard, and the chameleon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The exact identification of several animals in this verse is uncertain.
      Traditional and modern proposals include: for ''gecko,'' possibly ''ferret''
      or ''shrew''; for ''monitor lizard,'' possibly ''chameleon''; for ''sand lizard,''
      possibly ''skink'' or, in older tradition, ''snail''; for ''chameleon,'' possibly
      ''mole'' or another kind of lizard.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֲנָקָה
  chosen: the gecko
  alternatives:
  - the ferret
  - the shrew
  - the groaning lizard
  lexicon: HALOT, BDB
  rationale: The precise zoological identification is uncertain, but in the context
    of creeping reptiles in Leviticus 11, a lizard-type animal is more likely than
    a mammal such as 'ferret' or 'shrew.' 'Gecko' is a common modern rendering that
    fits the likely referent and keeps the list readable.
- source_word: הַכֹּחַ
  chosen: the monitor lizard
  alternatives:
  - the chameleon
  - the land crocodile
  lexicon: HALOT, BDB
  rationale: This term is traditionally understood as a large lizard. 'Monitor lizard'
    is a plausible modern equivalent and distinguishes it from the other lizard terms
    in the verse. Because the exact species is uncertain, alternatives are preserved
    in a footnote.
- source_word: הַלְּטָאָה
  chosen: the lizard
  alternatives:
  - the wall lizard
  - the gecko
  lexicon: HALOT, BDB
  rationale: A generic rendering is preferable where the exact species is unclear.
    'Lizard' preserves the broad zoological sense without overclaiming precision.
- source_word: הַחֹמֶט
  chosen: the sand lizard
  alternatives:
  - the skink
  - the snail
  lexicon: HALOT, BDB
  rationale: In this reptile list, a lizard identification is more coherent than the
    older rendering 'snail.' 'Sand lizard' is a plausible specific gloss used in modern
    translations, though uncertainty remains.
- source_word: הַתִּנְשָׁמֶת
  chosen: the chameleon
  alternatives:
  - the mole
  - the great lizard
  lexicon: HALOT, BDB
  rationale: Although the same Hebrew term can denote a bird elsewhere, here the immediate
    context is a list of swarming reptiles, so a reptile identification is required.
    'Chameleon' is a widely accepted contextual rendering, with alternatives preserved
    because the exact animal is debated.
