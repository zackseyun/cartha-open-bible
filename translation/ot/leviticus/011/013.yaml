id: LEV.11.13
reference: Leviticus 11:13
source:
  edition: WLC
  text: וְ/אֶת אֵ֨לֶּה֙ תְּשַׁקְּצ֣וּ מִן הָ/ע֔וֹף לֹ֥א יֵאָכְל֖וּ שֶׁ֣קֶץ הֵ֑ם אֶת
    הַ/נֶּ֨שֶׁר֙ וְ/אֶת הַ/פֶּ֔רֶס וְ/אֵ֖ת הָ/עָזְנִיָּֽה־־־־׃
translation:
  text: 'And these from among the birds you shall regard as detestable; they shall
    not be eaten; they are detestable: the eagle, the bearded vulture, and the black
    vulture.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew bird names in this list are not always identifiable with certainty.
      'The eagle' may refer more broadly to a large raptor or even a vulture.
    reason: lexical_alternative
  - marker: b
    text: Or 'lammergeier' for 'bearded vulture.' Older English versions often have
      'ossifrage.'
    reason: lexical_alternative
  - marker: c
    text: The identification of this bird is uncertain. Older translations often read
      'osprey'; some suggest a kind of eagle or vulture.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּשַׁקְּצוּ
  chosen: you shall regard as detestable
  alternatives:
  - you shall detest
  - you shall treat as unclean
  - you shall abhor
  lexicon: HALOT
  rationale: The Piel of שׁקץ conveys treating something as abhorrent/detestable,
    especially in cultic-food contexts. 'Regard as detestable' preserves the evaluative
    force without implying mere emotion; it also fits the following predicate 'they
    are detestable.'
- source_word: מִן הָעוֹף
  chosen: from among the birds
  alternatives:
  - among the birds
  - of the birds
  - from the flying creatures
  lexicon: HALOT
  rationale: עוֹף can denote flying creatures broadly, but in this dietary list 'birds'
    is the most natural and contextually precise English rendering. 'From among' reflects
    the partitive sense of מִן.
- source_word: לֹא יֵאָכְלוּ
  chosen: they shall not be eaten
  alternatives:
  - they must not be eaten
  - they are not to be eaten
  lexicon: HALOT
  rationale: The Niphal imperfect here is naturally rendered as a passive prohibition.
    'Shall not be eaten' is concise and suitably legal in tone.
- source_word: שֶׁקֶץ
  chosen: detestable
  alternatives:
  - an abomination
  - unclean thing
  - a detestable thing
  lexicon: HALOT
  rationale: שֶׁקֶץ in Levitical dietary law denotes something ritually abhorrent
    or taboo. 'Detestable' communicates the force in readable modern English better
    than the more tradition-bound 'abomination,' while avoiding flattening it to merely
    'unclean.'
- source_word: הַנֶּשֶׁר
  chosen: the eagle
  alternatives:
  - the vulture
  - the griffon-vulture
  lexicon: HALOT
  rationale: נֶשֶׁר is traditionally rendered 'eagle,' though the Hebrew term may
    overlap with large carrion birds. Because 'eagle' is the standard lexical rendering
    and remains plausible, it is kept in the main text, with the zoological uncertainty
    preserved in a footnote.
- source_word: הַפֶּרֶס
  chosen: the bearded vulture
  alternatives:
  - the ossifrage
  - the lammergeier
  lexicon: HALOT
  rationale: פֶּרֶס is commonly identified with the bearded vulture/lammergeier. 'Bearded
    vulture' is clear modern English; 'ossifrage' is archaic and less transparent.
- source_word: הָעָזְנִיָּה
  chosen: the black vulture
  alternatives:
  - the osprey
  - the sea eagle
  lexicon: HALOT
  rationale: The precise identification is uncertain, but 'black vulture' is a common
    modern scholarly rendering and fits the likely carrion-bird context. Because older
    English tradition often has 'osprey,' the uncertainty is preserved in a footnote.
