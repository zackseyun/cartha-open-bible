id: LEV.11.31
reference: Leviticus 11:31
source:
  edition: WLC
  text: אֵ֛לֶּה הַ/טְּמֵאִ֥ים לָ/כֶ֖ם בְּ/כָל הַ/שָּׁ֑רֶץ כָּל הַ/נֹּגֵ֧עַ בָּ/הֶ֛ם
    בְּ/מֹתָ֖/ם יִטְמָ֥א עַד הָ/עָֽרֶב־־־׃
translation:
  text: These are unclean for you among all the swarming things. Everyone who touches
    them when they are dead shall be unclean until the evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among all the swarming creatures.' The Hebrew term refers broadly to
      small creatures that swarm or teem.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in their death'; the sense is contact with them in their dead
      state.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These
  alternatives:
  - These ones
  lexicon: HALOT
  rationale: Deictic plural introducing the list just discussed; simple 'These' is
    natural and sufficiently formal.
- source_word: הַטְּמֵאִים
  chosen: unclean
  alternatives:
  - the unclean things
  - impure
  lexicon: HALOT
  rationale: Predicate adjective describing ritual impurity status. 'Unclean' is the
    standard and clearest rendering in Levitical purity contexts; 'impure' is possible
    but less idiomatic here.
- source_word: לָכֶם
  chosen: for you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: Marks relation to Israel's covenantal purity obligations; 'for you' is
    idiomatic in English and reflects the dative sense.
- source_word: בְּכָל הַשָּׁרֶץ
  chosen: among all the swarming things
  alternatives:
  - among all the swarming creatures
  - of all the swarming things
  lexicon: HALOT
  rationale: שׁרץ refers broadly to swarming/teeming small creatures in this dietary-purity
    context. 'Swarming things' preserves the category without over-specifying zoology.
    'Among' best captures the classificatory force here.
- source_word: כָּל הַנֹּגֵעַ
  chosen: Everyone who touches
  alternatives:
  - Whoever touches
  - Anyone touching
  lexicon: HALOT
  rationale: The construction is distributive and generic. 'Everyone who touches'
    is clear modern English and preserves the universal scope.
- source_word: בָּהֶם
  chosen: them
  lexicon: HALOT
  rationale: Refers back to the listed swarming creatures; straightforward plural
    object pronoun.
- source_word: בְּמֹתָם
  chosen: when they are dead
  alternatives:
  - in their death
  - when they die
  - upon their death
  lexicon: HALOT
  rationale: The phrase denotes contact with their carcasses/dead state, not merely
    the moment of dying. 'When they are dead' communicates the intended condition
    in natural English.
- source_word: יִטְמָא
  chosen: shall be unclean
  alternatives:
  - will become unclean
  lexicon: HALOT
  rationale: Imperfect verb expressing resulting ritual status. 'Shall be unclean'
    fits legal style and matches the register of Leviticus.
- source_word: עַד הָעָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  lexicon: HALOT
  rationale: Temporal limit of impurity. Including the article in English as 'the
    evening' is natural and slightly more formal, matching the Hebrew phrase.
