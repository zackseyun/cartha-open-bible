id: LEV.11.19
reference: Leviticus 11:19
source:
  edition: WLC
  text: וְ/אֵת֙ הַ/חֲסִידָ֔ה הָ/אֲנָפָ֖ה לְ/מִינָ֑/הּ וְ/אֶת הַ/דּוּכִיפַ֖ת וְ/אֶת הָ/עֲטַלֵּֽף־־׃
translation:
  text: and the stork[a], the heron according to its kind, and the hoopoe[c][b], and the bat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'ibis' or another long-legged waterbird' for 'heron'; the precise identification of the Hebrew term is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'lapwing'; the Hebrew term is more likely the hoopoe.
    reason: alternative_reading
  - marker: c
    text: The phrase 'according to its kind' indicates related varieties within the same general bird type.
    reason: cultural_note
lexical_decisions:
- source_word: חֲסִידָה
  chosen: stork
  alternatives:
  - kind stork
  - heron
  lexicon: HALOT, BDB
  rationale: The traditional and most widely supported identification is 'stork.' The noun likely derives from a root associated with loyalty/kindness, perhaps reflecting perceived behavior, but in this dietary list it functions as a bird name. 'Stork' is the clearest modern English equivalent.
- source_word: אֲנָפָה
  chosen: heron
  alternatives:
  - ibis
  - plover
  lexicon: HALOT, BDB
  rationale: The exact zoological identification is uncertain, but 'heron' is the standard English rendering in modern translations and fits the context of an unclean bird list. Because certainty is limited, the choice is conventional but plausible rather than definitive.
- source_word: לְמִינָהּ
  chosen: according to its kind
  alternatives:
  - after its kind
  - by its species
  lexicon: HALOT, BDB
  rationale: This phrase regularly marks classification within a broader animal type. 'According to its kind' is clear modern English and preserves the formal sense of the Hebrew.
- source_word: דּוּכִיפַת
  chosen: hoopoe
  alternatives:
  - lapwing
  lexicon: HALOT, BDB
  rationale: Although older English versions often used 'lapwing,' modern lexical and zoological judgment strongly favors 'hoopoe.' This follows original-language primacy over translation tradition.
- source_word: עֲטַלֵּף
  chosen: bat
  lexicon: HALOT, BDB
  rationale: The identification is secure. Though a bat is a mammal in modern taxonomy, the Hebrew list groups flying creatures phenomenologically rather than by modern biological classification, so 'bat' should be translated directly.
- source_word: וְאֵת / וְאֶת
  chosen: and
  lexicon: Hebrew grammar
  rationale: The repeated direct-object marker with conjunction structures the list. In English, the object marker is not represented, and the conjunction is naturally rendered as repeated 'and' in a list.
