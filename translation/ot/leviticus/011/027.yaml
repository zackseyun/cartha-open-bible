theological_decisions:
- issue: Ritual purity terminology
  chosen_reading: unclean
  alternative_readings:
  - impure
  - defiled
  rationale: Leviticus is regulating ceremonial/ritual status, not primarily moral
    guilt. 'Unclean' is the established and most precise English term for טמא in this
    context.
