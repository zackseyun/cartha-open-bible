id: LEV.11.27
reference: Leviticus 11:27
source:
  edition: WLC
  text: וְ/כֹ֣ל הוֹלֵ֣ךְ עַל כַּפָּ֗י/ו בְּ/כָל הַֽ/חַיָּה֙ הַ/הֹלֶ֣כֶת עַל אַרְבַּ֔ע
    טְמֵאִ֥ים הֵ֖ם לָ/כֶ֑ם כָּל הַ/נֹּגֵ֥עַ בְּ/נִבְלָתָ֖/ם יִטְמָ֥א עַד הָ/עָֽרֶב׀־־־־־׃
translation:
  text: And every one that walks on its paws, among all the animals that walk on four
    feet, they are unclean to you. Everyone who touches their carcass shall be unclean
    until the evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that move on all fours.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their carcass' uses a singular noun with a plural suffix, functioning
      collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל
  chosen: And every one
  alternatives:
  - And every
  - Now every
  lexicon: HALOT
  rationale: Introduces a further item in the list and has distributive force. 'Every
    one' works smoothly with the following singular participle ('that walks').
- source_word: הוֹלֵךְ
  chosen: that walks
  alternatives:
  - going
  - that goes
  lexicon: HALOT
  rationale: The participle functions attributively, describing the class of creature.
    'That walks' is idiomatic English.
- source_word: עַל כַּפָּיו
  chosen: on its paws
  alternatives:
  - on its palms
  - on the soles of its feet
  lexicon: HALOT
  rationale: כַּף literally refers to the palm or hollow of the hand/foot; in animal
    context 'paws' is the natural English equivalent and matches the zoological sense.
- source_word: בְּכָל הַחַיָּה
  chosen: among all the animals
  alternatives:
  - among all the living creatures
  - of every beast
  lexicon: HALOT
  rationale: Here חַיָּה refers to land animals in the dietary-law context, not life
    in general. 'Animals' is clear modern English.
- source_word: הַהֹלֶכֶת עַל אַרְבַּע
  chosen: that walk on four feet
  alternatives:
  - that go on four
  - that move on all fours
  lexicon: HALOT
  rationale: A straightforward rendering of the feminine singular collective expression.
    'Walk on four feet' stays close to the Hebrew while remaining natural.
- source_word: טְמֵאִים הֵם לָכֶם
  chosen: they are unclean to you
  alternatives:
  - they are unclean for you
  - they are impure to you
  lexicon: HALOT
  rationale: This is the standard ritual-purity formula in Leviticus. 'Unclean' preserves
    the cultic category better than the more generalized 'impure.'
- source_word: כָּל הַנֹּגֵעַ
  chosen: Everyone who touches
  alternatives:
  - Whoever touches
  - Anyone touching
  lexicon: HALOT
  rationale: The phrase is distributive and legal in force. 'Everyone who touches'
    is clear and suitably formal.
- source_word: בְּנִבְלָתָם
  chosen: their carcass
  alternatives:
  - their dead body
  - their carcasses
  lexicon: HALOT
  rationale: נְבֵלָה in Leviticus commonly denotes the carcass of an animal. Singular
    collective 'their carcass' reflects the Hebrew singular noun with plural suffix
    and reads naturally in English legal style.
- source_word: יִטְמָא
  chosen: shall be unclean
  alternatives:
  - will become unclean
  - shall be defiled
  lexicon: HALOT
  rationale: Future/imperfect in legal material is well represented by 'shall.' 'Be
    unclean' preserves the ritual status language.
- source_word: עַד הָעָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  lexicon: HALOT
  rationale: The article is present in Hebrew; 'until the evening' is slightly more
    formal and fits the legal register.
