id: LEV.11.46
reference: Leviticus 11:46
source:
  edition: WLC
  text: זֹ֣את תּוֹרַ֤ת הַ/בְּהֵמָה֙ וְ/הָ/ע֔וֹף וְ/כֹל֙ נֶ֣פֶשׁ הַֽ/חַיָּ֔ה הָ/רֹמֶ֖שֶׂת בַּ/מָּ֑יִם וּ/לְ/כָל נֶ֖פֶשׁ הַ/שֹּׁרֶ֥צֶת עַל הָ/אָֽרֶץ־־׃
translation:
  text: This is the law concerning the livestock[a], the birds, every living creature that moves in the waters[c][b], and every creature that swarms on the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'instruction for' instead of 'law concerning' for תּוֹרַת; the Hebrew term can denote authoritative teaching as well as law.
    reason: lexical_alternative
  - marker: b
    text: Or 'every living being' for 'every living creature'; Hebrew נֶפֶשׁ הַחַיָּה is an idiom for animate life, not specifically an immaterial 'soul.'
    reason: lexical_alternative
  - marker: c
    text: Or 'on the land' for 'on the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹרַת
  chosen: the law concerning
  alternatives:
  - the instruction for
  - the law of
  lexicon: HALOT
  rationale: תּוֹרָה here summarizes the preceding regulations about clean and unclean animals. 'Law concerning' is natural English and preserves the sense of an authoritative body of instruction without sounding overly technical.
- source_word: הַבְּהֵמָה
  chosen: the livestock
  alternatives:
  - the beast
  - the cattle
  - the animals
  lexicon: HALOT
  rationale: בְּהֵמָה commonly refers to land animals, often domesticated animals or beasts. In this dietary-law context, 'livestock' is a clear, modern rendering that distinguishes this category from birds and water creatures.
- source_word: הָעוֹף
  chosen: the birds
  alternatives:
  - the fowl
  - the flying creatures
  lexicon: HALOT
  rationale: עוֹף can denote flying creatures broadly, but in this context 'birds' is the most idiomatic and sufficiently accurate category label in English.
- source_word: כָל נֶפֶשׁ הַחַיָּה
  chosen: every living creature
  alternatives:
  - every living being
  - every living soul
  lexicon: HALOT
  rationale: נֶפֶשׁ with חַיָּה forms an idiom for a living creature/being. 'Living soul' would be misleading in modern English; 'living creature' best matches the Hebrew sense.
- source_word: הָרֹמֶשֶׂת
  chosen: that moves
  alternatives:
  - that creeps
  - that swarms
  lexicon: HALOT
  rationale: The participle from רמש refers to moving about, often small-creature motion. Because the referent here is in the waters, 'moves' is broad and natural; 'creeps' sounds awkward for aquatic life, and 'swarms' is better reserved for שׁרץ later in the verse.
- source_word: בַּמָּיִם
  chosen: in the waters
  alternatives:
  - in the water
  lexicon: HALOT
  rationale: The Hebrew is plural in form and often idiomatically rendered 'waters.' Retaining the plural preserves the source texture while remaining natural in English.
- source_word: וּלְכָל נֶפֶשׁ
  chosen: and every creature
  alternatives:
  - and every living creature
  - and every being
  lexicon: HALOT
  rationale: The second occurrence of נֶפֶשׁ is rendered slightly more compactly to avoid awkward repetition while preserving the same semantic category. 'Creature' remains faithful to the referent.
- source_word: הַשֹּׁרֶצֶת
  chosen: that swarms
  alternatives:
  - that teems
  - that creeps
  lexicon: HALOT
  rationale: שׁרץ commonly denotes swarming or teeming motion, especially of small creatures. 'Swarms' is the most direct and contextually fitting rendering.
- source_word: עַל הָאָרֶץ
  chosen: on the earth
  alternatives:
  - on the land
  - on the ground
  lexicon: HALOT
  rationale: אָרֶץ can mean earth, land, or ground depending on context. Here it contrasts with 'the waters'; 'earth' preserves the broader category and echoes the formal summary style of the verse.
