id: LEV.11.29
reference: Leviticus 11:29
source:
  edition: WLC
  text: וְ/זֶ֤ה לָ/כֶם֙ הַ/טָּמֵ֔א בַּ/שֶּׁ֖רֶץ הַ/שֹּׁרֵ֣ץ עַל הָ/אָ֑רֶץ הַ/חֹ֥לֶד וְ/הָ/עַכְבָּ֖ר וְ/הַ/צָּ֥ב לְ/מִינֵֽ/הוּ־׃
translation:
  text: 'And these are unclean for you among the swarming things that swarm on the earth: the mole-rat[a], and the mouse, and the great lizard according to its kind.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The precise identities of חֹלֶד and צָב are uncertain; traditional renderings include 'weasel' or 'mole' for חֹלֶד, and 'tortoise' or simply 'lizard' for צָב.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/זֶה
  chosen: And these are
  alternatives:
  - And this is
  lexicon: HALOT
  rationale: Although זֶה is morphologically singular ('this'), it introduces a following list of multiple creatures. English idiom is clearer with the plural demonstrative 'these are' to match the enumerated items, while preserving the deictic force.
- source_word: לָכֶם
  chosen: for you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: 'The preposition ל here marks relation/reference: these creatures are unclean with respect to Israel. ''For you'' is natural English and preserves the covenantal addressee.'
- source_word: הַטָּמֵא
  chosen: unclean
  alternatives:
  - the unclean thing
  - impure
  lexicon: HALOT
  rationale: טָמֵא in Levitical purity legislation is best rendered 'unclean,' the standard and clearest ritual-purity term in English. 'Impure' is possible but less idiomatic in this legal context.
- source_word: בַּשֶּׁרֶץ
  chosen: among the swarming things
  alternatives:
  - among the creeping things
  - among the teeming things
  lexicon: HALOT
  rationale: שֶׁרֶץ denotes small creatures that swarm/teem. 'Swarming things' better reflects the Hebrew root than the traditional but potentially misleading 'creeping things,' while remaining readable.
- source_word: הַשֹּׁרֵץ
  chosen: that swarm
  alternatives:
  - that creep
  - that teem
  lexicon: HALOT
  rationale: The participle repeats the same root as שֶׁרֶץ for emphasis. Rendering it 'that swarm' preserves the lexical connection and avoids flattening the repetition.
- source_word: עַל הָאָרֶץ
  chosen: on the earth
  alternatives:
  - on the ground
  - upon the land
  lexicon: HALOT
  rationale: אָרֶץ here refers to the terrestrial realm/ground surface where these creatures move. 'On the earth' is a straightforward rendering; 'on the ground' is possible but less consistent with the Hebrew noun.
- source_word: הַחֹלֶד
  chosen: the mole-rat
  alternatives:
  - the weasel
  - the mole
  lexicon: HALOT
  rationale: The precise zoological identification is uncertain. 'Mole-rat' is a defensible modern rendering for חֹלֶד in this context of small ground-dwelling animals, while traditional alternatives are preserved in a footnote due to lexical uncertainty.
- source_word: הָעַכְבָּר
  chosen: the mouse
  alternatives:
  - the rat
  lexicon: HALOT
  rationale: עַכְבָּר commonly denotes 'mouse' and can include mouse-like rodents more broadly. 'Mouse' is the standard English gloss.
- source_word: הַצָּב
  chosen: the great lizard
  alternatives:
  - the tortoise
  - the lizard
  lexicon: HALOT
  rationale: The exact species denoted by צָב is uncertain. In the context of listed swarming land-creatures, a lizard-type animal is more likely than the traditional 'tortoise.' 'Great lizard' captures a probable reptilian referent while acknowledging uncertainty in a footnote.
- source_word: לְמִינֵהוּ
  chosen: according to its kind
  alternatives:
  - after its kind
  - of its kind
  lexicon: HALOT
  rationale: This stock classification phrase is well represented by 'according to its kind,' which is clear modern English while preserving the taxonomic sense of מִין.
