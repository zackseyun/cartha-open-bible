id: LEV.11.33
reference: Leviticus 11:33
source:
  edition: WLC
  text: וְ/כָל כְּלִי חֶ֔רֶשׂ אֲשֶׁר יִפֹּ֥ל מֵ/הֶ֖ם אֶל תּוֹכ֑/וֹ כֹּ֣ל אֲשֶׁ֧ר בְּ/תוֹכ֛/וֹ
    יִטְמָ֖א וְ/אֹת֥/וֹ תִשְׁבֹּֽרוּ־־־־׃
translation:
  text: And every earthenware vessel into which any of them falls—everything that
    is in it shall become unclean, and you shall break it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clay vessel' or 'earthen vessel.' The Hebrew refers specifically to
      a container made of fired earth/pottery.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּלִי חֶרֶשׂ
  chosen: earthenware vessel
  alternatives:
  - clay vessel
  - pottery vessel
  - earthen vessel
  lexicon: HALOT
  rationale: כְּלִי is a general term for an article/container, and חֶרֶשׂ specifies
    earthenware/clay material. 'Earthenware vessel' is natural modern English and
    preserves the material-specific ritual significance better than the broader 'vessel'
    alone.
- source_word: יִפֹּל מֵהֶם
  chosen: any of them falls
  alternatives:
  - one of them falls
  - something from them falls
  lexicon: HALOT
  rationale: The plural pronoun refers back to the previously mentioned carcasses/creeping
    things in the surrounding context. English idiom requires making the distributive
    sense explicit; 'any of them falls' communicates that if even one such thing falls
    into the vessel, the rule applies.
- source_word: אֶל תּוֹכוֹ
  chosen: into which
  alternatives:
  - into its inside
  - into the midst of it
  lexicon: HALOT
  rationale: תּוֹךְ denotes the interior/middle. In English, 'into which' smoothly
    incorporates the sense of entry into the inside of the vessel without awkward
    literalism.
- source_word: כֹּל אֲשֶׁר בְּתוֹכוֹ
  chosen: everything that is in it
  alternatives:
  - all that is inside it
  - whatever is in it
  lexicon: HALOT
  rationale: This phrase comprehensively includes the vessel's contents. 'Everything
    that is in it' is clear, natural, and preserves the totalizing force of כֹּל.
- source_word: יִטְמָא
  chosen: shall become unclean
  alternatives:
  - shall be unclean
  - shall become impure
  lexicon: HALOT
  rationale: In Levitical purity contexts, 'unclean' is the standard and clearest
    English rendering. 'Shall become unclean' reflects the resulting state triggered
    by contact/contamination.
- source_word: וְאֹתוֹ תִשְׁבֹּרוּ
  chosen: and you shall break it
  alternatives:
  - and it you shall break
  - and you must smash it
  lexicon: HALOT
  rationale: The direct-object-fronted Hebrew gives emphasis to the vessel itself,
    but standard English expresses the command naturally as 'and you shall break it.'
    'Break' is sufficiently strong without overtranslating to 'smash.'
