id: LEV.11.11
reference: Leviticus 11:11
source:
  edition: WLC
  text: וְ/שֶׁ֖קֶץ יִהְי֣וּ לָ/כֶ֑ם מִ/בְּשָׂרָ/ם֙ לֹ֣א תֹאכֵ֔לוּ וְ/אֶת נִבְלָתָ֖/ם
    תְּשַׁקֵּֽצוּ־׃
translation:
  text: And they shall be detestable to you; you shall not eat any of their flesh,
    and you shall regard their carcasses as detestable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'abominable'; the Hebrew term denotes something ritually abhorrent or
      detestable in this dietary context.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁקֶץ
  chosen: detestable
  alternatives:
  - an abomination
  - a detestable thing
  - unclean
  lexicon: HALOT
  rationale: The noun denotes something ritually abhorrent or repulsive in the dietary
    context. Rendering it adjectivally in English ('detestable') produces natural
    syntax with 'they shall be ... to you' while preserving the force of ritual revulsion.
    'Unclean' is too weak and overlaps with other Hebrew impurity terms; 'abomination'
    is heavier and more specialized than the immediate context requires.
- source_word: יִהְיוּ לָכֶם
  chosen: they shall be to you
  alternatives:
  - they shall be for you
  - they shall be
  lexicon: HALOT
  rationale: The clause is rendered straightforwardly with the dative preserved ('to
    you'), indicating Israel's required regard toward these creatures. In the final
    English, this is smoothed to 'They shall be detestable to you.'
- source_word: מִבְּשָׂרָם
  chosen: any of their flesh
  alternatives:
  - their flesh
  - from their flesh
  lexicon: HALOT
  rationale: 'The preposition מִן after a negated eating verb is idiomatically partitive:
    ''you shall not eat from/of their flesh,'' hence ''any of their flesh.'' This
    communicates the prohibition clearly in natural English.'
- source_word: לֹא תֹאכֵלוּ
  chosen: you shall not eat
  alternatives:
  - you must not eat
  lexicon: HALOT
  rationale: The imperfect with negation in legal material is well represented by
    English 'shall not,' which preserves the prescriptive force without over-paraphrase.
- source_word: נִבְלָתָם
  chosen: their carcasses
  alternatives:
  - their carcass
  - their dead bodies
  - their carcasses
  lexicon: HALOT
  rationale: נְבֵלָה refers to the dead body/carcass of an animal. 'Carcasses' is
    the most precise and idiomatic term in an animal-purity context; 'dead bodies'
    is possible but less specific.
- source_word: תְּשַׁקֵּצוּ
  chosen: regard ... as detestable
  alternatives:
  - detest
  - treat as detestable
  - abhor
  lexicon: HALOT
  rationale: The Piel verb is cognate with שֶׁקֶץ and means to treat as detestable
    or hold in abhorrence. 'Regard ... as detestable' preserves the evaluative/ritual
    sense and echoes the noun earlier in the verse. A simple 'detest' could suggest
    merely emotional dislike rather than covenantal classification.
