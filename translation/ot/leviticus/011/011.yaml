theological_decisions:
- issue: Nature of the impurity language in dietary law
  chosen_reading: Render the terms with ritual-revulsion language ('detestable') rather
    than moralized language like 'abomination.'
  alternative_readings:
  - Use 'abomination' throughout for stronger traditional diction
  - Use 'unclean' for simplicity
  rationale: The verse concerns Israel's covenantal dietary distinctions. 'Detestable'
    preserves the strong negative valuation without importing a broader moral category
    beyond what the text explicitly states. This maintains the text's legal-ritual
    force and avoids doctrinal overreach.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the text''s plain sense without importing doctrinal claims'
