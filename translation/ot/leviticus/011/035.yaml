id: LEV.11.35
reference: Leviticus 11:35
source:
  edition: WLC
  text: וְ֠/כֹל אֲשֶׁר יִפֹּ֨ל מִ/נִּבְלָתָ֥/ם עָלָי/ו֮ יִטְמָא֒ תַּנּ֧וּר וְ/כִירַ֛יִם
    יֻתָּ֖ץ טְמֵאִ֣ים הֵ֑ם וּ/טְמֵאִ֖ים יִהְי֥וּ לָ/כֶֽם־׀׃
translation:
  text: And anything on which any part of their carcass falls shall become unclean.
    Whether oven or hearth, it must be broken down; they are unclean, and they shall
    be unclean for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their dead body' or 'their carcasses.' The Hebrew refers to the carcass
      of the unclean creature in a purity-law context.
    reason: lexical_alternative
  - marker: b
    text: '''Hearth'' refers to a cooking installation; the Hebrew term may denote
      a stove, pot-range, or fireplace-like structure.'
    reason: cultural_note
lexical_decisions:
- source_word: נִּבְלָתָם
  chosen: their carcass
  alternatives:
  - their carcasses
  - their dead body
  - their carcass remains
  lexicon: HALOT
  rationale: נְבֵלָה refers to the carcass of a dead animal, especially in purity-law
    contexts. The singular collective sense with 3mp suffix is well represented by
    'their carcass' in English; 'dead body' is broader and less tied to animal carcass
    impurity language.
- source_word: יִפֹּל
  chosen: falls
  alternatives:
  - may fall
  lexicon: HALOT
  rationale: 'Imperfect here expresses a general case in legal style: ''falls'' is
    natural English for a standing rule.'
- source_word: עָלָיו יִטְמָא
  chosen: on which ... shall become unclean
  alternatives:
  - upon it ... shall be unclean
  - whatever ... becomes unclean
  lexicon: HALOT
  rationale: The clause states that any object upon which part of the carcass falls
    becomes ritually unclean. 'Shall become unclean' captures the resulting state
    more clearly than the wooden 'shall be unclean.'
- source_word: תַּנּוּר
  chosen: oven
  alternatives:
  - furnace
  lexicon: HALOT
  rationale: תַּנּוּר denotes a baking oven. 'Oven' is the clearest modern equivalent.
- source_word: כִירַיִם
  chosen: hearth
  alternatives:
  - stove
  - cooking stand
  - fireplace
  lexicon: HALOT
  rationale: The dual/plural form refers to a cooking installation, likely a hearth
    or pot-range. 'Hearth' is a readable modern rendering that preserves the domestic
    cooking context without over-specifying ancient technology.
- source_word: יֻתָּץ
  chosen: it must be broken down
  alternatives:
  - shall be torn down
  - shall be demolished
  lexicon: HALOT
  rationale: The passive form indicates required destruction of the contaminated earthen
    cooking installation. 'Must be broken down' communicates legal obligation and
    suits pottery/oven structures better than the more architectural 'demolished.'
- source_word: טְמֵאִים הֵם
  chosen: they are unclean
  alternatives:
  - they are ritually unclean
  lexicon: HALOT
  rationale: The adjective marks ceremonial impurity. The base text keeps the common
    biblical term 'unclean'; 'ritually unclean' is interpretively clarifying but heavier,
    so the simpler form is retained in the main text.
- source_word: וּטְמֵאִים יִהְיוּ לָכֶם
  chosen: they shall be unclean for you
  alternatives:
  - they shall remain unclean to you
  - they shall count as unclean for you
  lexicon: HALOT
  rationale: 'לָכֶם marks relation to the Israelite audience: these items are to be
    regarded as unclean by them. ''For you'' preserves the Hebrew orientation without
    paraphrasing away the dative.'
