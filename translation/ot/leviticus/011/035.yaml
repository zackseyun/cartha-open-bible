theological_decisions:
- issue: Nature of impurity language in Levitical law
  chosen_reading: Render טמא/טמאים as 'unclean' rather than expanding to 'ceremonially
    defiled' in the main text.
  alternative_readings:
  - ritually unclean
  - ceremonially unclean
  rationale: The verse concerns ritual impurity, not moral evil. However, the standard
    biblical term 'unclean' is sufficiently established and preserves lexical consistency,
    while more explicit alternatives can be noted if needed.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
