theological_decisions:
- issue: Ritual impurity terminology in holiness legislation
  chosen_reading: unclean
  alternative_readings:
  - defiled
  - impure
  rationale: טמא in Leviticus often denotes ritual impurity within covenant holiness categories. 'Unclean' is the most established and accessible English equivalent here, while avoiding importing specifically moral guilt beyond what the verse states. 'Defiled' is possible but can over-moralize the category in this context.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.'
