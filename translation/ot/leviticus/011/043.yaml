id: LEV.11.43
reference: Leviticus 11:43
source:
  edition: WLC
  text: אַל תְּשַׁקְּצוּ֙ אֶת נַפְשֹׁ֣תֵי/כֶ֔ם בְּ/כָל הַ/שֶּׁ֖רֶץ הַ/שֹּׁרֵ֑ץ וְ/לֹ֤א תִֽטַּמְּאוּ֙ בָּ/הֶ֔ם וְ/נִטְמֵתֶ֖ם בָּֽ/ם־־־׃
translation:
  text: Do not make yourselves detestable by any swarming thing that swarms[a], and do not make yourselves unclean by them, so that you do not become unclean by them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by any creeping thing that creeps.' The Hebrew refers to the class of small creatures that swarm or teem; 'swarming thing' preserves the broader category better than the traditional 'creeping thing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּשַׁקְּצוּ
  chosen: make yourselves detestable
  alternatives:
  - make yourselves abominable
  - make yourselves disgusting
  - defile yourselves
  lexicon: HALOT
  rationale: 'The verb שׁקץ is related to treating something as detestable/abominable. Because the direct object is ''yourselves'' (נפשתיכם), the sense is reflexive: do not render yourselves detestable through contact/eating. ''Defile'' would blur this verb with the later טמא terms in the verse.'
- source_word: נַפְשֹׁתֵיכֶם
  chosen: yourselves
  alternatives:
  - your souls
  - your lives
  lexicon: HALOT
  rationale: נפש often means life/self/person, and in this reflexive construction idiomatic English is 'yourselves.' 'Your souls' would sound overly narrow and misleading in English.
- source_word: בְּכָל הַשֶּׁרֶץ הַשֹּׁרֵץ
  chosen: by any swarming thing that swarms
  alternatives:
  - with any swarming thing that swarms
  - by any creeping thing that creeps
  lexicon: HALOT
  rationale: שׁרץ / שׁרץ refers broadly to swarming teeming creatures, especially the class under discussion in Leviticus 11. 'Swarming thing that swarms' preserves the Hebrew wordplay and category better than traditional 'creeping thing,' which can suggest only crawling.
- source_word: תִטַּמְּאוּ
  chosen: make yourselves unclean
  alternatives:
  - become unclean
  - defile yourselves
  lexicon: HALOT
  rationale: 'The hitpael/imperfect here is reflexive: the Israelites are warned not to render themselves unclean through these creatures. ''Make yourselves unclean'' preserves the reflexive force and distinguishes it from the following result clause.'
- source_word: בָּהֶם
  chosen: by them
  alternatives:
  - through them
  - with them
  lexicon: HALOT
  rationale: 'The preposition marks means/instrumentality: these creatures are the means by which impurity is incurred. ''By them'' is concise and natural.'
- source_word: וְנִטְמֵתֶם
  chosen: lest you become unclean
  alternatives:
  - and you become unclean
  - so that you become unclean
  - and be defiled
  lexicon: HALOT
  rationale: 'Given the sequence of prohibitions, this clause is best taken as a negative result/warning: do not do this, lest you become unclean. This avoids a wooden coordination and reflects the practical force of the Hebrew in context.'
- source_word: בָּם
  chosen: by them
  alternatives:
  - through them
  - with them
  lexicon: HALOT
  rationale: 'Repeats the instrumental idea for emphasis: these creatures are the source/means of uncleanness.'
