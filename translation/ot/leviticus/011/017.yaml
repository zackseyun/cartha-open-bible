id: LEV.11.17
reference: Leviticus 11:17
source:
  edition: WLC
  text: וְ/אֶת הַ/כּ֥וֹס וְ/אֶת הַ/שָּׁלָ֖ךְ וְ/אֶת הַ/יַּנְשֽׁוּף־־־׃
translation:
  text: the little owl, the cormorant, and the great owl.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The identifications of these birds are uncertain. 'Little owl,' 'cormorant,'
      and 'great owl' are plausible traditional or scholarly renderings; alternatives
      include 'owl' or 'screech owl' for כוֹס, 'pelican' for שָׁלָךְ, and 'horned
      owl' or 'eagle owl' for יַנְשׁוּף.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכּוֹס
  chosen: the little owl
  alternatives:
  - the owl
  - the screech owl
  - the cup/owl (uncertain species)
  lexicon: HALOT
  rationale: כּוֹס here denotes an unclean bird, but the exact species identification
    is uncertain. 'Little owl' reflects a common modern identification and fits the
    zoological context better than the overly generic 'owl,' while preserving that
    the Hebrew likely names a specific bird rather than a broad category.
- source_word: הַשָּׁלָךְ
  chosen: the cormorant
  alternatives:
  - the pelican
  - the fishing owl
  - the water bird (uncertain species)
  lexicon: HALOT
  rationale: The precise referent of שָׁלָךְ is debated. 'Cormorant' is a longstanding
    and plausible rendering in English versions, likely connected with a diving or
    plunging bird. Because certainty is limited, alternatives are preserved in a footnote.
- source_word: הַיַּנְשׁוּף
  chosen: the great owl
  alternatives:
  - the horned owl
  - the eagle owl
  - the owl (uncertain species)
  lexicon: HALOT
  rationale: יַנְשׁוּף appears in bird lists and likely refers to a nocturnal bird,
    commonly identified as a large owl. 'Great owl' communicates specificity without
    overstating certainty about the exact modern species.
- source_word: וְאֶת
  chosen: and
  alternatives:
  - also
  rationale: The repeated conjunction plus object marker structures this as a continuation
    of the preceding list. In English, rendering the sequence with commas and a final
    'and' is natural and preserves the list function without mechanically repeating
    each object marker.
