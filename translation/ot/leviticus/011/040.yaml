id: LEV.11.40
reference: Leviticus 11:40
source:
  edition: WLC
  text: וְ/הָֽ/אֹכֵל֙ מִ/נִּבְלָתָ֔/הּ יְכַבֵּ֥ס בְּגָדָ֖י/ו וְ/טָמֵ֣א עַד הָ/עָ֑רֶב
    וְ/הַ/נֹּשֵׂא֙ אֶת נִבְלָתָ֔/הּ יְכַבֵּ֥ס בְּגָדָ֖י/ו וְ/טָמֵ֥א עַד הָ/עָֽרֶב־־־׃
translation:
  text: And the one who eats any of its carcass shall wash his clothes and be unclean
    until the evening, and the one who carries its carcass shall wash his clothes
    and be unclean until the evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from its carcass' or 'some of its carcass'; the Hebrew expression is
      partitive.
    reason: lexical_alternative
  - marker: b
    text: That is, unclean in the sense of Israel's ritual purity laws.
    reason: cultural_note
lexical_decisions:
- source_word: הָאֹכֵל
  chosen: the one who eats
  alternatives:
  - whoever eats
  - the eater
  lexicon: HALOT
  rationale: The participle with article functions substantivally, referring to any
    person characterized by the action. 'The one who eats' preserves the legal style
    and avoids over-paraphrase.
- source_word: מִנִּבְלָתָהּ
  chosen: any of its carcass
  alternatives:
  - from its carcass
  - some of its carcass
  lexicon: HALOT
  rationale: The preposition מִן with 'carcass' naturally indicates eating from/part
    of the carcass. 'Any of its carcass' is idiomatic in English legal instruction
    and captures the partitive sense better than a wooden 'from its carcass.' The
    suffix refers back to the animal under discussion in context.
- source_word: נְבֵלָה / נִבְלָתָהּ
  chosen: carcass
  alternatives:
  - dead body
  - corpse
  lexicon: HALOT
  rationale: In Levitical purity legislation, נְבֵלָה refers specifically to the carcass
    of an animal, not a human corpse. 'Carcass' is the most precise and contextually
    appropriate English term.
- source_word: יְכַבֵּס בְּגָדָיו
  chosen: shall wash his clothes
  alternatives:
  - must wash his clothes
  - shall wash his garments
  lexicon: HALOT
  rationale: The imperfect in legal material carries injunctive force. 'Shall wash'
    preserves the prescriptive tone. 'Clothes' is more natural modern English than
    'garments' while remaining accurate.
- source_word: וְטָמֵא
  chosen: and be unclean
  alternatives:
  - and he shall be unclean
  - and become unclean
  lexicon: HALOT
  rationale: In this legal sequence, the clause states resulting ritual status. 'Be
    unclean' is concise and idiomatic. 'Ritually unclean' would be interpretive expansion;
    the ritual sense is clear from context.
- source_word: עַד הָעָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  lexicon: HALOT
  rationale: Both are possible, but 'until the evening' reflects the Hebrew article
    and matches the cadence of legal formulae in Leviticus.
- source_word: הַנֹּשֵׂא
  chosen: the one who carries
  alternatives:
  - whoever carries
  - the bearer of
  lexicon: HALOT
  rationale: Like the earlier participle, this is substantival and generic. 'The one
    who carries' keeps the parallel structure with 'the one who eats.'
- source_word: אֶת נִבְלָתָהּ
  chosen: its carcass
  alternatives:
  - the carcass of it
  lexicon: HALOT
  rationale: Direct object marker plus noun with suffix is best rendered simply and
    idiomatically as 'its carcass.'
