theological_decisions:
- issue: Nature of impurity language
  chosen_reading: Translate טָמֵא as 'unclean' without adding 'ritually' in the main
    text.
  alternative_readings:
  - ritually unclean
  rationale: The context is clearly ceremonial purity law, but adding 'ritually' in
    the main text would interpretively expand beyond the Hebrew wording. The plain
    term 'unclean' preserves the source while allowing readers to infer the cultic
    sense from context.
  doctrine_reference: Translation philosophy §1, §6
- issue: Gender representation in legal participles
  chosen_reading: Use singular masculine 'his clothes' to reflect the Hebrew singular
    legal formulation.
  alternative_readings:
  - their clothes
  rationale: The Hebrew uses singular masculine forms in a representative legal sense.
    Per the gender-accurate policy, the translation retains the singular form rather
    than flattening to gender-neutral plural.
  doctrine_reference: Translation philosophy §4
