id: LEV.11.15
reference: Leviticus 11:15
source:
  edition: WLC
  text: אֵ֥ת כָּל עֹרֵ֖ב לְ/מִינֽ/וֹ־׃
translation:
  text: every raven according to its kind,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every crow according to its kind.' The Hebrew term likely refers broadly to the raven/crow family, though 'raven' is the standard rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵת
  chosen: '[not separately translated]'
  alternatives:
  - marks the direct object
  lexicon: HALOT
  rationale: The particle אֵת functions as the direct-object marker and normally has no standalone English equivalent. Its force is reflected by treating the following noun phrase as the object in the larger list context.
- source_word: כָּל
  chosen: every
  alternatives:
  - all
  lexicon: HALOT
  rationale: In a list of prohibited birds, כָּל with a singular collective noun is naturally rendered distributively as 'every,' yielding idiomatic English while preserving the comprehensiveness of the Hebrew.
- source_word: עֹרֵב
  chosen: raven
  alternatives:
  - crow
  lexicon: HALOT
  rationale: עֹרֵב most commonly denotes 'raven.' While the term may function broadly for corvids in some contexts, 'raven' is the standard lexical gloss and fits the traditional species label here.
- source_word: לְמִינוֹ
  chosen: according to its kind
  alternatives:
  - after its kind
  - by its species
  lexicon: HALOT
  rationale: The phrase לְמִין + suffix is the standard classification formula in priestly material. 'According to its kind' is clear modern English and preserves the taxonomic sense without importing modern biological precision.
