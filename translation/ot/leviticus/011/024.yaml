id: LEV.11.24
reference: Leviticus 11:24
source:
  edition: WLC
  text: וּ/לְ/אֵ֖לֶּה תִּטַּמָּ֑אוּ כָּל הַ/נֹּגֵ֥עַ בְּ/נִבְלָתָ֖/ם יִטְמָ֥א עַד הָ/עָֽרֶב־־׃
translation:
  text: 'And by these you shall become unclean: everyone who touches their carcass shall be unclean until the evening[a][b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And concerning these you shall become unclean.' The opening phrase may introduce the following category more generally rather than strictly instrumentally.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their carcass' uses a singular noun with a plural suffix; English may also be rendered 'their carcasses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְאֵלֶּה
  chosen: And by these
  alternatives:
  - And concerning these
  - And with these
  lexicon: HALOT
  rationale: 'The prefixed ו plus ל with the demonstrative can introduce the next category or sphere: ''and by/with regard to these.'' In this purity-law context, ''by these'' best captures the instrumental sense that contact with these animals causes impurity, while remaining natural English.'
- source_word: תִּטַּמָּאוּ
  chosen: you shall become unclean
  alternatives:
  - you shall be made unclean
  - you shall defile yourselves
  lexicon: HALOT
  rationale: From טמא in the imperfect, second masculine plural. 'Become unclean' expresses resulting ritual impurity without implying moral evil. 'Defile yourselves' is possible but can overstate agency here.
- source_word: כָּל הַנֹּגֵעַ
  chosen: everyone who touches
  alternatives:
  - whoever touches
  - every one touching
  lexicon: HALOT
  rationale: The singular participle after כָּל has generic force. 'Everyone who touches' is idiomatic modern English and preserves the universal scope.
- source_word: בְּנִבְלָתָם
  chosen: their carcass
  alternatives:
  - their carcasses
  - their dead body
  lexicon: HALOT
  rationale: נְבֵלָה denotes the carcass of a dead animal. Although the Hebrew form is singular with a 3mp suffix, English often uses a collective singular after a plural referent in this construction. 'Carcass' is more precise than the broader 'dead body' in an animal-purity context.
- source_word: יִטְמָא
  chosen: shall be unclean
  alternatives:
  - shall become unclean
  lexicon: HALOT
  rationale: The singular verb matches the generic singular subject 'everyone who touches.' 'Shall be unclean' is concise and natural after the participial clause, while still conveying ritual impurity.
- source_word: עַד הָעָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  lexicon: HALOT
  rationale: The phrase marks the duration of ritual impurity. Including the article in English as 'the evening' reflects the Hebrew form and sounds natural in legal style.
