theological_decisions:
- issue: Nature of impurity language in holiness legislation
  chosen_reading: Render טמא/unclean as ritual impurity language, not moral guilt
  alternative_readings:
  - defiled
  - impure
  rationale: The verse concerns ceremonial uncleanness from contact with animal carcasses. 'Unclean' is the standard and clearest English rendering, preserving the cultic category without importing moral condemnation.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense without importing doctrinal claims the text does not make.'
