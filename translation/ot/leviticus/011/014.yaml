id: LEV.11.14
reference: Leviticus 11:14
source:
  edition: WLC
  text: וְ/אֶת הַ֨/דָּאָ֔ה וְ/אֶת הָ/אַיָּ֖ה לְ/מִינָֽ/הּ־־׃
translation:
  text: the kite, and the falcon according to its kind,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The precise identification of these birds is uncertain; alternatively, the
      first may be rendered 'vulture' and the second 'kite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּאָה
  chosen: the kite
  alternatives:
  - the glede
  - the vulture
  lexicon: HALOT
  rationale: The bird name is uncertain, but 'kite' is a common modern rendering for
    דָּאָה in lists of unclean birds and fits the likely reference to a bird of prey.
    'Glede' is archaic English; 'vulture' is possible but less likely here. Because
    zoological identification is uncertain, an alternative is preserved in a footnote.
- source_word: הָאַיָּה
  chosen: the falcon
  alternatives:
  - the kite
  lexicon: HALOT
  rationale: אַיָּה denotes a bird of prey, traditionally identified as a falcon or
    kite. Since the previous term is rendered 'kite,' 'falcon' helps distinguish the
    two Hebrew bird names while remaining within the semantic range. The uncertainty
    is noted in a footnote.
- source_word: לְמִינָהּ
  chosen: according to its kind
  alternatives:
  - after its kind
  lexicon: HALOT
  rationale: The phrase literally means 'according to its kind' or 'by its kind.'
    'According to its kind' is clear modern English and preserves the classificatory
    sense of the Hebrew.
- source_word: וְאֶת ... וְאֶת
  chosen: the ... and the ...
  rationale: The direct-object marker אֵת is not translated directly in English. The
    conjunction and article structure is represented naturally as 'the ... and the
    ...' within the ongoing list.
