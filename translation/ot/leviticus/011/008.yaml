theological_decisions:
- issue: Nature of uncleanness in Levitical food law
  chosen_reading: Rendered as ritual category ('unclean') without importing later theological conclusions about moral evil or ongoing covenant application.
  alternative_readings:
  - Rendered as 'impure' to emphasize ceremonial status
  rationale: The verse speaks in the categories of Israel's holiness and purity laws. The translation should preserve that category plainly and avoid resolving broader theological debates not stated in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
