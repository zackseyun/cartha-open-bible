id: LEV.11.8
reference: Leviticus 11:8
source:
  edition: WLC
  text: מִ/בְּשָׂרָ/ם֙ לֹ֣א תֹאכֵ֔לוּ וּ/בְ/נִבְלָתָ֖/ם לֹ֣א תִגָּ֑עוּ טְמֵאִ֥ים הֵ֖ם
    לָ/כֶֽם׃
translation:
  text: You shall not eat any of their flesh, and you shall not touch their carcasses;
    they are unclean for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their dead bodies.' The Hebrew term refers to the carcass of an animal.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבְּשָׂרָם
  chosen: any of their flesh
  alternatives:
  - from their flesh
  - their meat
  lexicon: HALOT
  rationale: The preposition מִן with 'flesh' is naturally partitive here, prohibiting
    consumption of any portion. 'Flesh' is more literal and contextually appropriate
    than 'meat,' preserving the bodily sense of the Hebrew.
- source_word: לֹא תֹאכֵלוּ
  chosen: you shall not eat
  alternatives:
  - do not eat
  - you must not eat
  lexicon: HALOT
  rationale: The imperfect in legal instruction is well rendered by English 'you shall
    not' in covenantal/legal style. It preserves the force of prohibition without
    sounding archaic in this context.
- source_word: וּבְנִבְלָתָם
  chosen: their carcasses
  alternatives:
  - their dead bodies
  - their carcass
  lexicon: HALOT
  rationale: נְבֵלָה refers to the carcass of a dead animal. 'Carcasses' is the standard
    and precise rendering in purity-law contexts, distinguishing it from a human corpse.
- source_word: לֹא תִגָּעוּ
  chosen: you shall not touch
  alternatives:
  - do not touch
  - you must not come into contact with
  lexicon: HALOT
  rationale: The verb נגע commonly means 'touch' or 'come into contact with.' 'Touch'
    is the clearest direct rendering; the ritual-impurity implication comes from the
    context rather than needing expansion in translation.
- source_word: טְמֵאִים
  chosen: unclean
  alternatives:
  - impure
  - defiled
  lexicon: HALOT
  rationale: In Levitical purity legislation, 'unclean' is the most established and
    accurate English equivalent for טָמֵא. 'Impure' is possible, but 'unclean' better
    matches the ritual category used throughout the chapter.
- source_word: הֵם לָכֶם
  chosen: they are unclean for you
  alternatives:
  - they are unclean to you
  - they are unclean for your purposes
  lexicon: HALOT
  rationale: The phrase marks these animals as ritually unclean in relation to Israel.
    'For you' is a natural rendering of לָכֶם and preserves the relational force without
    overinterpreting it.
