theological_decisions:
- issue: Ritual purity terminology in Levitical law
  chosen_reading: Render טָמֵא/טָהֹר as 'unclean'/'clean' in their cultic-legal sense rather than moralized terms.
  alternative_readings:
  - impure/pure
  rationale: The verse summarizes dietary distinctions established by divine law. 'Unclean/clean' preserves the ritual category without importing a claim about intrinsic moral evil.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve the source''s categories without importing doctrinal claims the text does not make.'
