id: LEV.11.47
reference: Leviticus 11:47
source:
  edition: WLC
  text: לְ/הַבְדִּ֕יל בֵּ֥ין הַ/טָּמֵ֖א וּ/בֵ֣ין הַ/טָּהֹ֑ר וּ/בֵ֤ין הַֽ/חַיָּה֙ הַֽ/נֶּאֱכֶ֔לֶת וּ/בֵין֙ הַֽ/חַיָּ֔ה אֲשֶׁ֖ר לֹ֥א תֵאָכֵֽל׃פ
translation:
  text: to distinguish between the unclean and the clean[a], and between the creature that may be eaten and the creature that may not be eaten.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the animal that is edible ... and the animal that is not edible.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַבְדִּיל
  chosen: to distinguish
  alternatives:
  - to separate
  - to make a distinction
  lexicon: HALOT
  rationale: The infinitive expresses purpose/result from the preceding context. 'To distinguish' fits the legal-discernment sense in dietary instruction better than the more spatial 'to separate,' while remaining close to the Hebrew.
- source_word: בֵּין ... וּבֵין
  chosen: between ... and between
  alternatives:
  - between ... and
  lexicon: HALOT
  rationale: The repeated preposition structures two paired contrasts. English smooths this as 'between ... and ... , and between ... and ...' while preserving the parallelism.
- source_word: הַטָּמֵא
  chosen: the unclean
  alternatives:
  - the impure
  lexicon: HALOT
  rationale: In Levitical purity legislation, טָמֵא is a technical ritual category. 'Unclean' is the standard and clearest English equivalent in this context.
- source_word: הַטָּהֹר
  chosen: the clean
  alternatives:
  - the pure
  lexicon: HALOT
  rationale: Paired with 'unclean,' 'clean' preserves the ritual classification language of Leviticus more naturally than 'pure' here.
- source_word: הַחַיָּה
  chosen: the living creature
  alternatives:
  - the animal
  - the creature
  lexicon: HALOT
  rationale: חַיָּה can denote an animal/creature. 'Living creature' preserves the broader lexical sense and avoids implying only wild animals, which would be too narrow in this summary statement.
- source_word: הַנֶּאֱכֶלֶת
  chosen: that may be eaten
  alternatives:
  - that is eaten
  - that can be eaten
  - that is edible
  lexicon: HALOT
  rationale: The Niphal participle here denotes what is permitted/fit to be eaten within the dietary laws. 'May be eaten' best captures permissibility rather than mere possibility or customary action.
- source_word: אֲשֶׁר לֹא תֵאָכֵל
  chosen: that may not be eaten
  alternatives:
  - that shall not be eaten
  - that is not to be eaten
  lexicon: HALOT
  rationale: The clause contrasts permitted and prohibited creatures. 'May not be eaten' communicates prohibition in contemporary English without sounding overly archaic; 'shall not' is possible but less natural.
