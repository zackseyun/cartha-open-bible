id: LEV.11.12
reference: Leviticus 11:12
source:
  edition: WLC
  text: כֹּ֣ל אֲשֶׁ֥ר אֵֽין ל֛/וֹ סְנַפִּ֥יר וְ/קַשְׂקֶ֖שֶׂת בַּ/מָּ֑יִם שֶׁ֥קֶץ ה֖וּא לָ/כֶֽם־׃
translation:
  text: Everything in the water that does not have fins and scales is detestable to you[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an abomination to you.' The Hebrew שֶׁקֶץ denotes something ritually detestable or abhorrent in this dietary-law context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  chosen: Everything
  alternatives:
  - All that
  - Anything that
  lexicon: HALOT
  rationale: כֹּל introduces a comprehensive category. 'Everything' is natural modern English and preserves the totalizing force.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Relative particle linking the category to its defining condition; 'that' is idiomatic in contemporary English.
- source_word: אֵין לוֹ
  chosen: does not have
  alternatives:
  - has no
  - lacks
  lexicon: HALOT
  rationale: The existential negative with pronominal complement is best rendered idiomatically as possession in English.
- source_word: סְנַפִּיר
  chosen: fins
  alternatives:
  - a fin
  lexicon: HALOT
  rationale: Though singular in Hebrew, English naturally uses the plural in class descriptions of aquatic creatures.
- source_word: קַשְׂקֶשֶׂת
  chosen: scales
  alternatives:
  - a scale
  lexicon: HALOT
  rationale: As with 'fins,' the singular Hebrew functions generically; English plural is the idiomatic equivalent for zoological classification.
- source_word: בַּמָּיִם
  chosen: in the water
  alternatives:
  - in the waters
  lexicon: HALOT
  rationale: The Hebrew plural מַיִם commonly corresponds to English 'water.' Singular English is more natural here while preserving the locative sense.
- source_word: שֶׁקֶץ
  chosen: detestable
  alternatives:
  - an abomination
  - unclean thing
  - a detestable thing
  lexicon: HALOT
  rationale: שֶׁקֶץ in dietary-law contexts denotes something ritually abhorrent or repulsive. 'Detestable' communicates the force clearly in modern English without importing later technical jargon. Because the Hebrew predicate is nominal ('is a detestable thing'), the adjectival English predicate is a natural optimal-equivalence rendering.
- source_word: הוּא
  chosen: is
  alternatives:
  - it is
  lexicon: HALOT
  rationale: The independent pronoun reinforces the nominal clause; English expresses this naturally with the copula.
- source_word: לָכֶם
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The phrase marks covenantal applicability to Israel. 'To you' is a direct and idiomatic rendering, matching the immediate address.
