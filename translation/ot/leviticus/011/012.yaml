- issue: Ritual-status terminology for שֶׁקֶץ in food-law context
  chosen_reading: detestable
  alternative_readings:
  - abomination
  - unclean thing
  rationale: The verse concerns prohibited aquatic creatures within Israel's holiness code. 'Detestable' preserves the strong evaluative force of שֶׁקֶץ while avoiding over-technical or archaic phrasing. 'Unclean thing' risks conflating this term with broader impurity vocabulary not used here.
