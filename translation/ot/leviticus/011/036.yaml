id: LEV.11.36
reference: Leviticus 11:36
source:
  edition: WLC
  text: אַ֣ךְ מַעְיָ֥ן וּ/ב֛וֹר מִקְוֵה מַ֖יִם יִהְיֶ֣ה טָה֑וֹר וְ/נֹגֵ֥עַ בְּ/נִבְלָתָ֖/ם
    יִטְמָֽא־׃
translation:
  text: However, a spring or a cistern, a gathering of water, shall be clean; but
    whoever touches their carcass shall be unclean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a gathering of water' or 'a pool of water.' The Hebrew phrase מִקְוֵה
      מַיִם refers to water collected together in a spring or cistern.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: However
  alternatives:
  - But
  - Nevertheless
  - Only
  lexicon: HALOT
  rationale: Marks an exception to the preceding impurity rules. 'However' clearly
    signals the contrast in modern English better than the more restrictive-sounding
    'only.'
- source_word: מַעְיָן
  chosen: spring
  alternatives:
  - fountain
  lexicon: HALOT
  rationale: Refers to a natural water source. 'Spring' is the most natural contemporary
    English equivalent.
- source_word: בּוֹר
  chosen: cistern
  alternatives:
  - pit
  - well
  lexicon: HALOT
  rationale: In this ritual-purity context, a man-made water receptacle is intended.
    'Cistern' is more precise than the broader 'pit' or potentially misleading 'well.'
- source_word: מִקְוֵה מַיִם
  chosen: collecting water
  alternatives:
  - a gathering of water
  - a collection of water
  - a pool of water
  lexicon: HALOT
  rationale: The construct phrase describes a gathered body/store of water qualifying
    the spring or cistern. 'Collecting water' keeps the sense idiomatic in English
    while preserving the idea of accumulated water.
- source_word: יִהְיֶה טָהוֹר
  chosen: shall remain clean
  alternatives:
  - shall be clean
  - shall be pure
  lexicon: HALOT
  rationale: In context the point is that such a water source is not rendered impure
    by the falling carcass mentioned in the previous verse. 'Remain clean' makes the
    implied continuity explicit without over-paraphrasing.
- source_word: נֹגֵעַ
  chosen: whoever touches
  alternatives:
  - the one touching
  - one who touches
  lexicon: HALOT
  rationale: The participle functions substantivally and generically. 'Whoever touches'
    is natural English and preserves the general application.
- source_word: נִבְלָתָם
  chosen: their carcass
  alternatives:
  - their carcasses
  - their dead body
  lexicon: HALOT
  rationale: נְבֵלָה denotes the carcass of an animal. The singular collective sense
    fits the Hebrew form with 3mp suffix in context, referring back to the dead creatures
    previously discussed.
- source_word: יִטְמָא
  chosen: shall be unclean
  alternatives:
  - shall become unclean
  lexicon: HALOT
  rationale: Standard ritual-purity language in Leviticus. 'Shall be unclean' is concise
    and idiomatic, while still conveying the resulting state.
