  rationale: Leviticus 11 concerns ceremonial cleanness laws. 'Clean / unclean' preserves
    established ritual terminology in accessible English without importing later moral
    categories.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; preserve source meaning without importing doctrinal claims.'
