id: LEV.11.21
reference: Leviticus 11:21
source:
  edition: WLC
  text: אַ֤ךְ אֶת זֶה֙ תֹּֽאכְל֔וּ מִ/כֹּל֙ שֶׁ֣רֶץ הָ/ע֔וֹף הַ/הֹלֵ֖ךְ עַל אַרְבַּ֑ע
    אֲשֶׁר לא כְרָעַ֨יִם֙ מִ/מַּ֣עַל לְ/רַגְלָ֔י/ו לְ/נַתֵּ֥ר בָּ/הֵ֖ן עַל הָ/אָֽרֶץ־־־־׃
translation:
  text: 'Yet these you may eat from all the swarming things that fly, that go on all
    fours: those that have jointed legs above their feet to hop on the ground with
    them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew textual tradition reads literally 'which not legs'; the traditional
      reading understood by context and ancient versions is 'which have legs.'
    reason: textual_variant
  - marker: b
    text: Or 'leaping legs' for 'jointed legs'; the Hebrew refers to the specialized
      hind legs used for hopping.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: Yet
  alternatives:
  - Only
  - Nevertheless
  - However
  lexicon: HALOT
  rationale: Marks an exception to the preceding prohibition in vv. 20 and 23. 'Yet'
    naturally signals this contrast in modern English.
- source_word: אֶת זֶה
  chosen: these
  alternatives:
  - this
  lexicon: HALOT
  rationale: Though singular in form, the phrase introduces a class of permitted creatures,
    so idiomatic English uses the plural 'these' in context.
- source_word: תֹּאכְלוּ
  chosen: you may eat
  alternatives:
  - you shall eat
  - you may consume
  lexicon: HALOT
  rationale: Imperfect 2mp in legal material expresses permission/allowance here,
    contrasting with the prior ban. 'May eat' communicates permitted status clearly.
- source_word: מִכֹּל שֶׁרֶץ הָעוֹף
  chosen: from all the swarming things that fly
  alternatives:
  - from every winged swarming thing
  - from all flying swarming creatures
  lexicon: HALOT
  rationale: שֶׁרֶץ denotes swarming/teeming creatures; הָעוֹף here identifies the
    flying class. This avoids the potentially misleading traditional 'fowl' and keeps
    the zoological category broad.
- source_word: הַהֹלֵךְ עַל אַרְבַּע
  chosen: that go on all fours
  alternatives:
  - that walk on four
  - that move on four legs
  lexicon: HALOT
  rationale: Idiomatic English equivalent for locomotion on four limbs; preserves
    the source description used for these insects.
- source_word: אֲשֶׁר לוֹא כְרָעַיִם
  chosen: those that have jointed legs
  alternatives:
  - which have legs
  - which have leaping legs
  lexicon: HALOT
  rationale: The ketiv has לֹא ('not'), but the sense and ancient versions support
    the qere לוֹ ('to it/that have'), yielding the standard meaning 'which have legs.'
    כְרָעַיִם in this context refers specifically to the hind legs adapted for leaping,
    so 'jointed legs' captures the functional distinction.
- source_word: מִמַּעַל לְרַגְלָיו
  chosen: above their feet
  alternatives:
  - above its feet
  - above their legs
  lexicon: HALOT
  rationale: 'Retains the anatomical description: the special leaping legs are positioned
    above/beyond the ordinary feet. Pluralized in English to match the class sense.'
- source_word: לְנַתֵּר
  chosen: to hop
  alternatives:
  - to leap
  - to spring
  lexicon: HALOT
  rationale: Conveys the purpose/function of the specialized legs in clear modern
    English; 'hop' fits locust-like movement well.
- source_word: בָּהֵן
  chosen: with them
  alternatives:
  - by them
  - with those legs
  lexicon: HALOT
  rationale: Refers back to the special legs; 'with them' is concise and natural English.
- source_word: עַל הָאָרֶץ
  chosen: on the ground
  alternatives:
  - upon the earth
  - on the land
  lexicon: HALOT
  rationale: In this immediate zoological context, 'ground' is more natural than the
    broader 'earth' while preserving the sense of terrestrial movement.
