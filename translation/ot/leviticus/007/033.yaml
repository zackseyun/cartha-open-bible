id: LEV.7.33
reference: Leviticus 7:33
source:
  edition: WLC
  text: הַ/מַּקְרִ֞יב אֶת דַּ֧ם הַ/שְּׁלָמִ֛ים וְ/אֶת הַ/חֵ֖לֶב מִ/בְּנֵ֣י אַהֲרֹ֑ן ל֧/וֹ תִהְיֶ֛ה שׁ֥וֹק הַ/יָּמִ֖ין לְ/מָנָֽה־־׃
translation:
  text: The one from among the sons of Aaron who presents the blood of the peace offerings and the fat—to him the right thigh shall belong as his portion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fellowship offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּקְרִיב
  chosen: the one ... who presents
  alternatives:
  - the one ... who offers
  - he who brings near
  lexicon: HALOT
  rationale: The Hiphil participle of קרב denotes bringing/presenting an offering. 'Presents' is natural modern English in sacrificial context while retaining the ritual sense. The participial force is preserved with 'the one ... who.'
- source_word: דַּם
  chosen: blood
  lexicon: HALOT
  rationale: Standard literal rendering in sacrificial legislation.
- source_word: הַשְּׁלָמִים
  chosen: the peace offerings
  alternatives:
  - the fellowship offerings
  lexicon: HALOT
  rationale: שְׁלָמִים is the standard term for this sacrifice category. 'Peace offerings' preserves the traditional and lexical connection to wholeness/peace; 'fellowship offerings' is interpretive and therefore kept as an alternative rather than main text.
- source_word: הַחֵלֶב
  chosen: the fat
  lexicon: HALOT
  rationale: Literal rendering appropriate to sacrificial instructions, where the specific fatty portions are in view.
- source_word: מִבְּנֵי אַהֲרֹן
  chosen: from among the sons of Aaron
  alternatives:
  - among Aaron's sons
  lexicon: HALOT
  rationale: The phrase marks selection from within the priestly group. 'Sons of Aaron' preserves the Hebrew familial expression and matches the gender-accurate policy.
- source_word: לוֹ תִהְיֶה
  chosen: to him ... shall belong
  alternatives:
  - shall be his
  - shall belong to him
  lexicon: HALOT
  rationale: This expresses legal possession/allotment. 'Shall belong' makes the entitlement explicit in clear English.
- source_word: שׁוֹק הַיָּמִין
  chosen: the right thigh
  alternatives:
  - the right leg
  lexicon: HALOT
  rationale: שׁוֹק refers to the upper leg/thigh portion in butchery and sacrificial distribution. 'Thigh' is more precise than the broader 'leg.'
- source_word: לְמָנָה
  chosen: as his portion
  alternatives:
  - for a share
  - as an allotment
  lexicon: HALOT
  rationale: The noun denotes an assigned share or portion. 'As his portion' reads naturally and conveys the legal allotment sense.
