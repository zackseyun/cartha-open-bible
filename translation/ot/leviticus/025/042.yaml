theological_decisions:
- issue: Rendering עֶבֶד / עֲבָדַי in a context of ownership and redemption
  chosen_reading: slaves
  alternative_readings:
  - servants
  rationale: The verse grounds the prohibition in YHWH's ownership of Israel after the exodus. Because the bonded nature is the point, 'slaves' better reflects the social-legal force than 'servants.' This aligns with the project's policy to use 'slave' where bonded status is salient, without importing later racialized connotations into the ancient text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table for δοῦλος by analogy of bonded-status rendering
