id: LEV.15.14
reference: Leviticus 15:14
source:
  edition: WLC
  text: וּ/בַ/יּ֣וֹם הַ/שְּׁמִינִ֗י יִֽקַּֽח ל/וֹ֙ שְׁתֵּ֣י תֹרִ֔ים א֥וֹ שְׁנֵ֖י בְּנֵ֣י יוֹנָ֑ה וּ/בָ֣א לִ/פְנֵ֣י יְהוָ֗ה אֶל פֶּ֨תַח֙ אֹ֣הֶל מוֹעֵ֔ד וּ/נְתָנָ֖/ם אֶל הַ/כֹּהֵֽן־׀־־׃
translation:
  text: And on the eighth day he shall take for himself two turtledoves or two young pigeons[a], and he shall come before Yahweh at the entrance of the tent of meeting and give them to the priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH'' (traditionally rendered ''the LORD''; alternatively ''Yahweh'').'
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/בַ/יּוֹם הַ/שְּׁמִינִי
  chosen: And on the eighth day
  alternatives:
  - On the eighth day
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition is naturally rendered 'And on' in context, preserving the procedural sequence from the previous verse.
- source_word: יִקַּח לוֹ
  chosen: he shall take for himself
  alternatives:
  - he shall take
  lexicon: HALOT
  rationale: The imperfect in legal instruction is well represented by 'shall take.' The dative pronoun לוֹ is retained with 'for himself' because it is present in the Hebrew and indicates the offerer personally acquires the birds.
- source_word: שְׁתֵּי תֹרִים
  chosen: two turtledoves
  alternatives:
  - two turtle doves
  lexicon: HALOT
  rationale: תֹרִים refers to turtledoves; the closed compound is standard modern English.
- source_word: אוֹ שְׁנֵי בְּנֵי יוֹנָה
  chosen: or two young pigeons
  alternatives:
  - or two sons of a dove
  - or two pigeons
  lexicon: HALOT
  rationale: The idiom 'sons of a dove' denotes young pigeons/doves used in sacrifice. 'Young pigeons' is idiomatic and specific.
- source_word: וּבָא לִפְנֵי יְהוָה
  chosen: and he shall come before the LORD
  alternatives:
  - and he shall come before Yahweh
  - and he shall come into the presence of the LORD
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction continues the legal sequence and is rendered with English 'shall.' Per doctrine, יְהוָה is rendered 'the LORD.' 'Before' is the straightforward sense of לִפְנֵי.
- source_word: אֶל פֶּתַח אֹהֶל מוֹעֵד
  chosen: to the entrance of the tent of meeting
  alternatives:
  - to the doorway of the tent of meeting
  - to the entrance of the meeting tent
  lexicon: HALOT
  rationale: פֶּתַח is 'entrance/opening.' 'Tent of meeting' is the established and transparent rendering of אֹהֶל מוֹעֵד.
- source_word: וּנְתָנָם אֶל הַכֹּהֵן
  chosen: and give them to the priest
  alternatives:
  - and hand them over to the priest
  - and present them to the priest
  lexicon: HALOT
  rationale: The verb נתן with object suffix means to give/hand over. 'Give them to the priest' is simple and accurate; 'present' could blur the direct transfer implied by the Hebrew.
