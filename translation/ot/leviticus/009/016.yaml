id: LEV.9.16
reference: Leviticus 9:16
source:
  edition: WLC
  text: וַ/יַּקְרֵ֖ב אֶת הָ/עֹלָ֑ה וַֽ/יַּעֲשֶׂ֖/הָ כַּ/מִּשְׁפָּֽט־׃
translation:
  text: And he presented the burnt offering and offered it according to the ordinance[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "according to the prescribed manner".
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרֵב
  chosen: presented
  alternatives:
  - brought near
  - offered
  lexicon: HALOT
  rationale: The Hiphil of קרב means to bring near/present. In sacrificial context, 'presented' is natural English and preserves the ritual sense without over-specifying beyond the Hebrew. 'Offered' is possible, but the following verb covers the act of preparation/performance, so 'presented' avoids redundancy.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the ascending offering
  lexicon: HALOT
  rationale: עֹלָה is the standard sacrificial term for the whole burnt offering. 'Burnt offering' is the established and accurate rendering in Levitical context; 'ascending offering' is more etymologically transparent but less idiomatic in English.
- source_word: וַיַּעֲשֶׂהָ
  chosen: prepared it
  alternatives:
  - did it
  - offered it
  - made it
  lexicon: HALOT
  rationale: עשה is broad ('do/make'), but in sacrificial procedure it commonly refers to carrying out the rite. 'Prepared it' fits the immediate cultic context and avoids the awkwardly vague 'did it,' while not overstating with a narrower technical term unsupported by the verb alone.
- source_word: כַּמִּשְׁפָּט
  chosen: according to the ordinance
  alternatives:
  - according to the rule
  - according to the prescribed manner
  - as prescribed
  lexicon: HALOT
  rationale: מִשְׁפָּט here denotes the prescribed legal/procedural norm for the offering. 'According to the ordinance' preserves the formal cultic-legal force. 'As prescribed' is smoother but slightly less explicit about the noun's legal character.
