id: LEV.27.31
reference: Leviticus 27:31
source:
  edition: WLC
  text: וְ/אִם גָּאֹ֥ל יִגְאַ֛ל אִ֖ישׁ מִ/מַּֽעַשְׂר֑/וֹ חֲמִשִׁית֖/וֹ יֹסֵ֥ף עָלָֽי/ו־׃
translation:
  text: But if a man redeems any of his tithe[a], he shall add a fifth to it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''if redeeming he redeems,'' an emphatic construction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: The conjunction plus conditional particle introduces a conditional case within a legal sequence. 'But if' captures the adversative/continuative force in context better than a bare 'if,' while remaining natural English.
- source_word: גָּאֹל יִגְאַל
  chosen: indeed redeems
  alternatives:
  - redeems
  - should redeem
  - wishes to redeem
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect of גאל intensifies the verbal idea. English cannot reproduce the form directly, so 'indeed redeems' reflects the emphasis more transparently than a simple 'redeems.' 'Wishes to redeem' would overinterpret the construction as volitional.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and functions generically in legal style. Per the gender-accurate principle, 'a man' is retained rather than neutralizing to 'someone' or 'a person'.
- source_word: מִמַּעַשְׂרוֹ
  lemma: מִן
  chosen: any of his tithe
  alternatives:
  - from his tithe
  - some of his tithe
  lexicon: HALOT
  rationale: The preposition מִן with 'his tithe' indicates redemption of some portion from what has been tithed. 'Any of his tithe' is idiomatic and preserves the partitive sense better than the more wooden 'from his tithe.'
- source_word: חֲמִשִׁיתוֹ
  chosen: a fifth
  alternatives:
  - its fifth part
  - one-fifth
  lexicon: HALOT
  rationale: The noun denotes a fifth part. 'A fifth' is concise, natural English and adequately conveys the required additional amount.
- source_word: יֹסֵף עָלָיו
  chosen: he shall add a fifth to it
  alternatives:
  - he shall add it to it
  - he shall add it upon it
  lexicon: HALOT
  rationale: 'The Hiphil of יסף means ''add,'' and עַל here expresses addition to the principal amount. English idiom requires making explicit what is added from the prior phrase: ''he shall add a fifth to it.'' This avoids awkward literalism while preserving the legal sense.'
