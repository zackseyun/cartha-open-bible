id: LEV.12.4
reference: Leviticus 12:4
source:
  edition: WLC
  text: וּ/שְׁלֹשִׁ֥ים יוֹם֙ וּ/שְׁלֹ֣שֶׁת יָמִ֔ים תֵּשֵׁ֖ב בִּ/דְמֵ֣י טָהֳרָ֑ה בְּ/כָל קֹ֣דֶשׁ לֹֽא תִגָּ֗ע וְ/אֶל הַ/מִּקְדָּשׁ֙ לֹ֣א תָבֹ֔א עַד מְלֹ֖את יְמֵ֥י טָהֳרָֽ/הּ־־־־׃
translation:
  text: Then she shall remain for thirty-three days in the blood of her purification. She shall not touch any holy thing[a], and she shall not come into the sanctuary, until the days of her purification are completed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the blood of purification.' The Hebrew phrase is literally 'in the bloods/blood of purification' and refers to the postpartum period associated with ritual purification.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁלֹשִׁים יוֹם וּ/שְׁלֹשֶׁת יָמִים
  chosen: for thirty-three days
  alternatives:
  - thirty days and three days
  lexicon: HALOT
  rationale: The Hebrew idiom literally numbers 'thirty days and three days,' but standard English expresses this as 'thirty-three days.' 'For' supplies the duration sense naturally in English.
- source_word: תֵּשֵׁב
  chosen: she shall remain
  alternatives:
  - she shall sit
  - she shall stay
  lexicon: HALOT
  rationale: The verb יָשַׁב literally means 'sit/dwell/remain.' In this ritual-law context it denotes continuing in a state for a period, so 'remain' best captures the sense without woodenly saying 'sit.'
- source_word: בִּ/דְמֵי טָהֳרָה
  chosen: in the blood of her purification
  alternatives:
  - in the blood of purification
  - in the blood of cleansing
  lexicon: HALOT
  rationale: The phrase is difficult but traditionally and contextually refers to the postpartum period associated with bleeding and purification. 'Blood of her purification' preserves the concrete Hebrew imagery and the feminine possessive sense implied by the context and explicit later suffix, while remaining readable.
- source_word: בְּ/כָל קֹדֶשׁ
  chosen: anything holy
  alternatives:
  - any holy thing
  - anything sacred
  lexicon: HALOT
  rationale: The phrase is literally 'any holiness/holy thing.' In context it refers to holy objects or sacred things. 'Anything holy' is natural modern English and preserves the breadth of the prohibition.
- source_word: לֹא תִגָּע
  chosen: she shall not touch
  alternatives:
  - she must not touch
  lexicon: HALOT
  rationale: A straightforward imperfect prohibition in legal material; 'shall not touch' fits the legal register and keeps close to the Hebrew.
- source_word: וְ/אֶל הַ/מִּקְדָּשׁ לֹא תָבֹא
  chosen: and she shall not come into the sanctuary
  alternatives:
  - and she shall not enter the sanctuary
  - and she shall not come to the holy place
  lexicon: HALOT
  rationale: מִקְדָּשׁ denotes the sanctuary/holy place. 'Come into the sanctuary' closely reflects the Hebrew verb 'come' while making the spatial sense explicit in English.
- source_word: עַד מְלֹאת
  chosen: until ... are completed
  alternatives:
  - until the completion of
  - until the fulfilling of
  lexicon: HALOT
  rationale: The infinitive construct of מלא conveys completion/fullness. Rendering with a finite English clause ('are completed') is idiomatic and accurately expresses the temporal limit.
- source_word: יְמֵי טָהֳרָהּ
  chosen: the days of her purification
  alternatives:
  - the days of her cleansing
  lexicon: HALOT
  rationale: טָהֳרָה refers to ritual purification/cleanness. 'Purification' is the more precise cultic term in this legal context, and the suffix is explicitly represented by 'her.'
