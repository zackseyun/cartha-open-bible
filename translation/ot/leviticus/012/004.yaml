theological_decisions:
- issue: Rendering ritual purity terminology without importing moral guilt
  chosen_reading: purification
  alternative_readings:
  - cleansing
  rationale: The verse concerns ceremonial status after childbirth, not moral sinfulness. 'Purification' preserves the cultic/legal category and avoids implying personal wrongdoing beyond what the text states.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make; preserve theological tension rather than resolve it.'
