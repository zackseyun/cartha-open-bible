theological_decisions:
- issue: Nature of impurity language in Leviticus
  chosen_reading: Render טמא/unclean in ritual-cultic terms without implying personal
    sin or moral defilement.
  alternative_readings:
  - Translate more dynamically as 'ceremonially unclean'
  rationale: The verse concerns ritual status after childbirth, not moral guilt. The
    main text keeps the biblical term 'unclean' for consistency and transparency,
    while the rationale clarifies its cultic sense. A more explicit 'ceremonially
    unclean' would interpret correctly but adds a qualifier not present in the Hebrew.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    do not import doctrinal claims the text does not make.'
