id: LEV.12.5
reference: Leviticus 12:5
source:
  edition: WLC
  text: וְ/אִם נְקֵבָ֣ה תֵלֵ֔ד וְ/טָמְאָ֥ה שְׁבֻעַ֖יִם כְּ/נִדָּתָ֑/הּ וְ/שִׁשִּׁ֥ים
    יוֹם֙ וְ/שֵׁ֣שֶׁת יָמִ֔ים תֵּשֵׁ֖ב עַל דְּמֵ֥י טָהֳרָֽה־־׃
translation:
  text: But if she gives birth to a female child, then she shall be unclean for two
    weeks, as in her menstruation; and for sixty-six days she shall remain in the
    blood of purification.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'as during her menstrual impurity.' The Hebrew compares
      her post-childbirth uncleanness to the state associated with menstruation.
    reason: lexical_alternative
  - marker: b
    text: '''The blood of purification'' refers to the prescribed period of post-birth
      purification, not to moral guilt.'
    reason: cultural_note
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces the contrasting case to the previous verse. 'But if' brings
    out the adversative/disjunctive force in context better than a bare 'And if,'
    while remaining close to the Hebrew conjunction plus conditional particle.
- source_word: נְקֵבָה
  chosen: a female child
  alternatives:
  - a daughter
  - a female
  lexicon: HALOT
  rationale: The noun means 'female.' Because the context is childbirth, 'female child'
    is explicit and natural in English. 'Daughter' is possible but slightly more interpretive
    than the bare sex designation in Hebrew.
- source_word: תֵלֵד
  chosen: she gives birth
  alternatives:
  - she bears
  - she delivers
  lexicon: HALOT
  rationale: Standard rendering of ילד in childbirth contexts. 'Gives birth' is idiomatic
    modern English and preserves the verbal sense.
- source_word: וְטָמְאָה
  chosen: then she shall be unclean
  alternatives:
  - and she shall be unclean
  - she becomes unclean
  lexicon: HALOT
  rationale: The clause states the resulting ritual status. 'Shall be unclean' fits
    legal style and avoids implying moral impurity; the future-like English matches
    the prescriptive context.
- source_word: שְׁבֻעַיִם
  chosen: for two weeks
  alternatives:
  - for two sevens
  lexicon: HALOT
  rationale: The dual form denotes two weeks in this context. 'Two sevens' would be
    overly literal and obscure in English.
- source_word: כְּנִדָּתָהּ
  chosen: as in her menstruation
  alternatives:
  - as in the time of her menstrual impurity
  - as during her monthly period
  lexicon: HALOT
  rationale: נִדָּה here refers to the state/period associated with menstruation.
    'As in her menstruation' is concise and communicates the comparison without importing
    extra technical terminology into the main text.
- source_word: וְשִׁשִּׁים יוֹם וְשֵׁשֶׁת יָמִים
  chosen: for sixty-six days
  alternatives:
  - and sixty days and six days
  lexicon: HALOT
  rationale: English naturally combines the Hebrew number phrase into 'sixty-six days.'
    This preserves the quantity while avoiding wooden repetition.
- source_word: תֵּשֵׁב
  chosen: she shall remain
  alternatives:
  - she shall sit
  - she shall stay
  - she shall dwell
  lexicon: HALOT
  rationale: Literally 'sit/dwell,' but in this legal context it denotes continuing
    in a state or period. 'Remain' best conveys the idiomatic force in natural English.
- source_word: עַל
  chosen: in
  alternatives:
  - upon
  - over
  - concerning
  lexicon: HALOT
  rationale: With the following phrase, the preposition forms an idiom describing
    the woman's continuing in the period/state associated with purification blood.
    'In' is the clearest English equivalent here.
- source_word: דְּמֵי טָהֳרָה
  chosen: the blood of purification
  alternatives:
  - the blood of her purification
  - the period of purification blood
  - the bloods of purification
  lexicon: HALOT
  rationale: The Hebrew construct literally reads 'bloods of purification,' an idiomatic
    plural. 'The blood of purification' is the most natural singular rendering in
    English and preserves the ritual category. Adding 'her' is possible from context
    but not explicit in the Hebrew phrase.
