id: LEV.12.3
reference: Leviticus 12:3
source:
  edition: WLC
  text: וּ/בַ/יּ֖וֹם הַ/שְּׁמִינִ֑י יִמּ֖וֹל בְּשַׂ֥ר עָרְלָתֽ/וֹ׃
translation:
  text: And on the eighth day the flesh of his foreskin shall be circumcised.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more dynamically, 'he must be circumcised on the eighth day.' The Hebrew
      is formally passive ('shall be circumcised'), and the main text preserves that
      form.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/יּוֹם
  chosen: And on the ... day
  alternatives:
  - And in the ... day
  - Now on the ... day
  lexicon: HALOT
  rationale: The conjunction plus preposition+noun is most naturally rendered as a
    simple connective with temporal force, 'And on the ... day,' preserving the sequential
    legal instruction without unnecessary stiffness.
- source_word: הַ/שְּׁמִינִי
  chosen: eighth
  lexicon: HALOT
  rationale: Straightforward ordinal adjective modifying 'day'; no contextual reason
    to vary from the standard gloss 'eighth'.
- source_word: יִמּוֹל
  chosen: shall be circumcised
  alternatives:
  - must be circumcised
  - one shall circumcise
  lexicon: HALOT
  rationale: The verb is Niphal imperfect 3ms of מול, naturally passive/reflexive
    in form here. 'Shall be circumcised' preserves the legal/instructional force in
    idiomatic English. 'Must be circumcised' is possible dynamically, but 'shall'
    better reflects the prescriptive register without over-interpreting modality.
    An active rendering ('one shall circumcise') would not reflect the Hebrew stem
    as directly.
- source_word: בְּשַׂר
  chosen: the flesh
  alternatives:
  - flesh
  lexicon: HALOT
  rationale: 'The noun means ''flesh.'' Including ''the'' in English yields a natural
    rendering of the construct chain in this legal context: ''the flesh of his foreskin.'''
- source_word: עָרְלָתוֹ
  chosen: of his foreskin
  alternatives:
  - his foreskin
  lexicon: HALOT
  rationale: The noun means 'foreskin' with 3ms suffix, in construct with 'flesh.'
    Rendering the full phrase as 'the flesh of his foreskin' closely follows the Hebrew
    while remaining clear in English.
