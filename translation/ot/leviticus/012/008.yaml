  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: Although the context emphasizes ritual impurity rather than personal
    moral fault, the Hebrew sacrificial term חַטָּאת is traditionally and often lexically
    rendered 'sin offering.' To preserve consistency of key terms while not flattening
    the ritual-purity context, the main text keeps 'sin offering' and a footnote preserves
    'purification offering' as a contextually plausible alternative.
