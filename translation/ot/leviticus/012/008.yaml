id: LEV.12.8
reference: Leviticus 12:8
source:
  edition: WLC
  text: וְ/אִם לֹ֨א תִמְצָ֣א יָדָ/הּ֮ דֵּ֣י שֶׂה֒ וְ/לָקְחָ֣ה שְׁתֵּֽי תֹרִ֗ים א֤וֹ
    שְׁנֵי֙ בְּנֵ֣י יוֹנָ֔ה אֶחָ֥ד לְ/עֹלָ֖ה וְ/אֶחָ֣ד לְ/חַטָּ֑את וְ/כִפֶּ֥ר עָלֶ֛י/הָ
    הַ/כֹּהֵ֖ן וְ/טָהֵֽרָה־־׃פ
translation:
  text: But if she cannot afford a lamb, then she shall take two turtledoves or two
    young pigeons, one for a burnt offering and one for a sin offering; and the priest
    shall make atonement for her, and she shall be clean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'purification offering' for 'sin offering'; in this context the offering
      addresses ritual impurity after childbirth.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִמְצָא יָדָהּ דֵּי שֶׂה
  chosen: she cannot afford a lamb
  alternatives:
  - her hand does not find enough for a lamb
  - she does not have sufficient means for a lamb
  lexicon: HALOT
  rationale: The idiom 'her hand does not find enough' refers to financial means or
    ability. 'Cannot afford' communicates the plain sense in natural English while
    preserving the socioeconomic condition expressed by the Hebrew.
- source_word: שֶׂה
  chosen: a lamb
  alternatives:
  - a sheep
  - a head of small livestock
  lexicon: HALOT
  rationale: In this sacrificial context, 'lamb' is the most natural and specific
    English rendering, matching the expected offering in the preceding verse.
- source_word: שְׁתֵּי תֹרִים
  chosen: two turtledoves
  alternatives:
  - two doves
  lexicon: HALOT
  rationale: תֹרִים specifically denotes turtledoves rather than doves generically;
    the more precise term should be preserved.
- source_word: שְׁנֵי בְּנֵי יוֹנָה
  chosen: two young pigeons
  alternatives:
  - two pigeon young
  - two fledgling pigeons
  lexicon: HALOT
  rationale: The construct literally means 'sons of a pigeon/dove,' an idiom for young
    pigeons. 'Young pigeons' is the standard clear English equivalent.
- source_word: עֹלָה
  chosen: burnt offering
  alternatives:
  - whole burnt offering
  lexicon: HALOT
  rationale: '''Burnt offering'' is the established and accurate rendering for the
    sacrificial term עֹלָה.'
- source_word: חַטָּאת
  chosen: sin offering
  alternatives:
  - purification offering
  lexicon: HALOT
  rationale: The term can denote either 'sin offering' or, in some ritual-purity contexts,
    'purification offering.' The default rendering 'sin offering' is retained in the
    main text for consistency, while the contextual alternative is preserved in a
    footnote because Leviticus 12 concerns ritual purification after childbirth rather
    than moral transgression.
- source_word: וְכִפֶּר עָלֶיהָ
  chosen: the priest shall make atonement for her
  alternatives:
  - the priest shall make expiation for her
  - the priest shall purge her
  lexicon: HALOT
  rationale: כפר in priestly sacrificial contexts is conventionally and accurately
    rendered 'make atonement.' This preserves the cultic-theological force without
    over-specifying the mechanism.
- source_word: וְטָהֵרָה
  chosen: she shall be clean
  alternatives:
  - she shall be purified
  - she shall become clean
  lexicon: HALOT
  rationale: The verb denotes restoration to ritual cleanness. 'She shall be clean'
    is concise and faithful; the purification nuance is implicit from the context.
