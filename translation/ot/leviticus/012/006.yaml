id: LEV.12.6
reference: Leviticus 12:6
source:
  edition: WLC
  text: וּ/בִ/מְלֹ֣את יְמֵ֣י טָהֳרָ֗/הּ לְ/בֵן֮ א֣וֹ לְ/בַת֒ תָּבִ֞יא כֶּ֤בֶשׂ בֶּן
    שְׁנָת/וֹ֙ לְ/עֹלָ֔ה וּ/בֶן יוֹנָ֥ה אוֹ תֹ֖ר לְ/חַטָּ֑את אֶל פֶּ֥תַח אֹֽהֶל מוֹעֵ֖ד
    אֶל הַ/כֹּהֵֽן׀־־־־־־׃
translation:
  text: And when the days of her purification are completed, whether for a son or
    for a daughter, she shall bring a year-old lamb for a burnt offering, and a young
    pigeon or a turtledove for a sin offering, to the priest at the entrance of the
    tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a purification offering.' The Hebrew term can denote the offering
      used to remove ritual impurity, not only an offering for moral transgression.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בִ/מְלֹאת
  chosen: when ... are completed
  alternatives:
  - in the fullness of
  - upon the completion of
  lexicon: HALOT
  rationale: The preposition plus infinitive construct of מלא expresses the completion
    of a period. 'When ... are completed' is idiomatic modern English while preserving
    the temporal force.
- source_word: יְמֵי טָהֳרָהּ
  chosen: the days of her purification
  alternatives:
  - the days of her cleansing
  lexicon: HALOT
  rationale: טָהֳרָה denotes purification/cleanness in a ritual sense. 'Purification'
    best preserves the cultic category in Leviticus; 'cleansing' is possible but slightly
    less precise.
- source_word: לְבֵן אוֹ לְבַת
  chosen: whether for a son or for a daughter
  alternatives:
  - for a son or for a daughter
  lexicon: HALOT
  rationale: The phrase specifies that the rule applies in either childbirth case.
    'Whether for' makes the inclusive alternative explicit in natural English.
- source_word: תָּבִיא
  chosen: she shall bring
  alternatives:
  - she is to bring
  - she must bring
  lexicon: HALOT
  rationale: The Hiphil imperfect here carries prescriptive force in legal material.
    'She shall bring' preserves the legal-register obligation without over-intensifying.
- source_word: כֶּבֶשׂ בֶּן שְׁנָתוֹ
  chosen: a year-old lamb
  alternatives:
  - a lamb in its first year
  - a one-year-old lamb
  lexicon: HALOT
  rationale: This idiom denotes an animal one year old. 'Year-old lamb' is concise
    and natural.
- source_word: לְעֹלָה
  chosen: for a burnt offering
  alternatives:
  - as a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard sacrificial term 'burnt offering.' Retaining the
    established cultic term is more precise than paraphrase.
- source_word: וּבֶן יוֹנָה אוֹ תֹר
  chosen: a young pigeon or a turtledove
  alternatives:
  - a pigeon chick or a turtledove
  - a dove or a turtledove
  lexicon: HALOT
  rationale: בֶּן יוֹנָה refers specifically to a young pigeon/dove, while תֹר denotes
    a turtledove. 'Young pigeon' avoids ambiguity and reflects common English sacrificial
    terminology.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - for a purification offering
  lexicon: HALOT
  rationale: חַטָּאת can denote either sin or purification offering in priestly contexts.
    The traditional 'sin offering' is retained in the main text for recognizability
    and consistency, while the contextual alternative is preserved in a footnote because
    the offering addresses ritual impurity rather than necessarily personal moral
    transgression.
- source_word: אֶל פֶּתַח אֹהֶל מוֹעֵד
  chosen: at the entrance of the tent of meeting
  alternatives:
  - to the entrance of the tent of meeting
  - to the doorway of the tent of meeting
  lexicon: HALOT
  rationale: The phrase marks the presentation location. 'At the entrance' reads naturally
    in English while preserving the cultic setting.
- source_word: אֶל הַכֹּהֵן
  chosen: to the priest
  alternatives:
  - for the priest
  lexicon: HALOT
  rationale: The second אֶל indicates the recipient of the offering. 'To the priest'
    is the most direct rendering.
