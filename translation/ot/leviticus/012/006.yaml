theological_decisions:
- issue: Rendering of חַטָּאת in a childbirth-purification context
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: In Levitical sacrificial language, חַטָּאת is the conventional technical
    term, but in this context the rite concerns restoration from ritual impurity after
    childbirth, not an implication that childbirth is itself a moral sin. To preserve
    both lexical consistency and theological clarity, the main text keeps 'sin offering'
    and a footnote preserves 'purification offering.'
  doctrine_reference: Translation philosophy §3, §5
