theological_decisions:
- issue: Nature of טמא in purity legislation
  chosen_reading: unclean
  alternative_readings:
  - ceremonially unclean
  - ritually unclean
  rationale: The verse concerns ritual purity status, but the Hebrew adjective/verb
    itself simply states uncleanness. To avoid importing explanatory terminology into
    the main text, 'unclean' is retained, with the ritual sense left to context.
  doctrine_reference: Translation philosophy §1, §6
- issue: Gender rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The source is grammatically masculine plural in a standard national designation.
    Per the gender-accurate policy, the translation preserves the form rather than
    neutralizing it, while recognizing that it refers to the covenant people broadly.
  doctrine_reference: Translation philosophy §4
