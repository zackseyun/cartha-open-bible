id: LEV.12.2
reference: Leviticus 12:2
source:
  edition: WLC
  text: דַּבֵּ֞ר אֶל בְּנֵ֤י יִשְׂרָאֵל֙ לֵ/אמֹ֔ר אִשָּׁה֙ כִּ֣י תַזְרִ֔יעַ וְ/יָלְדָ֖ה
    זָכָ֑ר וְ/טָֽמְאָה֙ שִׁבְעַ֣ת יָמִ֔ים כִּ/ימֵ֛י נִדַּ֥ת דְּוֺתָ֖/הּ תִּטְמָֽא־׃
translation:
  text: 'Speak to the sons of Israel, saying: If a woman conceives and gives birth
    to a male child, then she shall be unclean seven days; she shall be unclean as
    in the days of her menstrual impurity.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when a woman conceives.' The Hebrew case-law particle can be rendered
      either 'if' or 'when' in context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'gives birth to a male.'
    reason: lexical_alternative
  - marker: c
    text: That is, ritual impurity associated with menstruation.
    reason: cultural_note
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Rendered formally as 'the sons of Israel' to reflect the Hebrew construct
    phrase directly. This follows the gender-accurate policy and preserves the covenantal-national
    designation; smoother alternatives are possible but less transparent to the source
    wording.
- source_word: אִשָּׁה
  chosen: a woman
  alternatives:
  - a wife
  - a female
  lexicon: HALOT
  rationale: In this legal context the generic sense 'a woman' best fits. 'Wife' is
    possible in some contexts but is not required here.
- source_word: כִּי
  chosen: if
  alternatives:
  - when
  lexicon: HALOT
  rationale: Here כִּי introduces a case law condition. 'If' best reflects the legal
    formulation in English, though 'when' is also possible.
- source_word: תַזְרִיעַ
  chosen: conceives
  alternatives:
  - becomes pregnant
  - produces seed
  - conceives seed
  lexicon: HALOT
  rationale: The Hiphil of זרע literally relates to producing seed, but in this idiom
    with childbirth it refers to conception. 'Conceives' gives the plain sense in
    natural English without over-literal awkwardness.
- source_word: וְיָלְדָה זָכָר
  chosen: and gives birth to a male child
  alternatives:
  - and bears a son
  - and gives birth to a male
  lexicon: HALOT
  rationale: '''Gives birth to a male child'' is clear modern English and preserves
    the male-sex reference of זָכָר. ''Bears a son'' is idiomatic but can imply filial
    relation more than sex classification; the Hebrew emphasizes male offspring.'
- source_word: וְטָמְאָה
  chosen: then she shall be unclean
  alternatives:
  - then she becomes unclean
  - then she shall be ceremonially unclean
  lexicon: HALOT
  rationale: Rendered with 'shall be unclean' to match the legal register and the
    following duration clause. I avoided adding 'ceremonially' in the main text because
    the Hebrew does not explicitly include that qualifier, though the context is ritual
    impurity.
- source_word: שִׁבְעַת יָמִים
  chosen: seven days
  lexicon: HALOT
  rationale: Straightforward numerical duration.
- source_word: כִּימֵי
  chosen: as in the days of
  alternatives:
  - like the days of
  - as during the days of
  lexicon: HALOT
  rationale: This comparative prepositional phrase sets the standard of comparison
    for the impurity period.
- source_word: נִדַּת דְּוֺתָהּ
  chosen: her menstrual impurity
  alternatives:
  - her menstruation
  - the impurity of her sickness
  - her monthly uncleanness
  lexicon: HALOT
  rationale: נִדָּה denotes menstrual impurity/separation, and דְּוֺתָהּ refers to
    her infirmity/menstrual flow. 'Her menstrual impurity' communicates the ritual
    state clearly in modern English without archaic phrasing like 'flowers' or overly
    vague 'sickness'.
- source_word: תִּטְמָא
  chosen: she shall be unclean
  alternatives:
  - she shall become unclean
  lexicon: HALOT
  rationale: Repeated to preserve the Hebrew's explicit restatement of the impurity
    status at the end of the verse.
