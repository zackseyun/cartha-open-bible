id: LEV.4.2
reference: Leviticus 4:2
source:
  edition: WLC
  text: דַּבֵּ֞ר אֶל בְּנֵ֣י יִשְׂרָאֵ֘ל לֵ/אמֹר֒ נֶ֗פֶשׁ כִּֽי תֶחֱטָ֤א בִ/שְׁגָגָה֙ מִ/כֹּל֙ מִצְוֺ֣ת יְהוָ֔ה אֲשֶׁ֖ר לֹ֣א תֵעָשֶׂ֑ינָה וְ/עָשָׂ֕ה מֵ/אַחַ֖ת מֵ/הֵֽנָּה־־׃
translation:
  text: 'Speak to the sons of Israel[a], saying: If a person sins unintentionally in regard to any of the commandments of Yahweh concerning things that should not be done, and does one of them[b],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children of Israel' or 'the Israelites'; Hebrew literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'by mistake' or 'in error'; the Hebrew refers to sin committed inadvertently rather than defiantly.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  lexicon: HALOT
  rationale: Imperative of דבר introducing direct divine instruction to Moses; 'Speak' is the standard and sufficiently direct rendering.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Per gender-accurate policy, the familial expression is preserved rather than flattened to 'Israelites,' though that alternative is idiomatic English.
- source_word: נֶפֶשׁ
  chosen: a person
  alternatives:
  - a soul
  - someone
  lexicon: HALOT
  rationale: Here נֶפֶשׁ functions idiomatically for an individual person rather than emphasizing the immaterial soul. 'A person' is natural English and matches the legal setting.
- source_word: תֶחֱטָא
  chosen: sins
  alternatives:
  - commits a sin
  lexicon: HALOT
  rationale: Straightforward rendering of חטא in the verbal clause.
- source_word: בִשְׁגָגָה
  chosen: unintentionally
  alternatives:
  - by mistake
  - in error
  lexicon: HALOT
  rationale: The term denotes inadvertence or error rather than high-handed rebellion. 'Unintentionally' best fits sacrificial/legal context in modern English.
- source_word: מִכֹּל מִצְוֺת יְהוָה
  chosen: against any of the commandments of the LORD
  alternatives:
  - from any of the commandments of the LORD
  - with respect to any of the LORD's commandments
  lexicon: HALOT
  rationale: The מן construction with sinning conveys violation with respect to the commandments. 'Against any of the commandments of the LORD' expresses the legal offense clearly. YHWH is rendered 'the LORD' per doctrine.
- source_word: אֲשֶׁר לֹא תֵעָשֶׂינָה
  chosen: concerning things that should not be done
  alternatives:
  - which must not be done
  - that are not to be done
  lexicon: HALOT
  rationale: The relative clause modifies the commandments by specifying prohibited acts. This rendering preserves the passive/impersonal force in idiomatic English.
- source_word: וְעָשָׂה
  chosen: and does
  alternatives:
  - and commits
  - and acts
  lexicon: HALOT
  rationale: 'Simple continuation of the legal condition: the person actually performs the prohibited act.'
- source_word: מֵאַחַת מֵהֵנָּה
  chosen: one of them
  alternatives:
  - any one of these
  - one from among them
  lexicon: HALOT
  rationale: Refers back to the prohibited matters just mentioned. 'One of them' is concise and clear.
