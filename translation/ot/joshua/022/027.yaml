translation:
  text: 'Rather, it is a witness between us and you, and between our generations after us, that we may perform the service of the LORD before him with our burnt offerings, our sacrifices, and our peace offerings, so that your children may not say to our children in time to come, ‘You have no share in the LORD.’'
