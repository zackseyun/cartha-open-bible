lexical_decisions:
- source_word: זִיף
  chosen: Ziph
  alternatives:
  - Ziph
  rationale: Proper place name in a town list; transliterated rather than translated per project philosophy for names. 'Ziph' follows standard English convention for this Judahite town.
- source_word: טֶלֶם
  chosen: Telem
  rationale: Proper place name joined by conjunction; transliterated directly as a toponym. No contextual indicator suggests translating the lexical sense rather than preserving the name.
- source_word: בְעָלוֹת
  chosen: Bealoth
  alternatives:
  - Baaloth
  rationale: Proper place name in the settlement list. Transliteration is preferred for names. 'Bealoth' reflects the consonantal form here; 'Baaloth' is a common alternative English spelling influenced by the בעל element and should be preserved in a footnote as a lexical alternative.
- source_word: וָ
  chosen: and
  rationale: The prefixed conjunction on טלם coordinates items in the list and is naturally rendered 'and' in English.
- source_word: וּ
  chosen: and
  rationale: The prefixed conjunction on בעלות coordinates the final item in the list and is rendered 'and'.
