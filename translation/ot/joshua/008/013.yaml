id: JOS.8.13
reference: Joshua 8:13
source:
  edition: WLC
  text: וַ/יָּשִׂ֨ימוּ הָ/עָ֜ם אֶת כָּל הַֽ/מַּחֲנֶ֗ה אֲשֶׁר֙ מִ/צְּפ֣וֹן לָ/עִ֔יר וְ/אֶת עֲקֵב֖/וֹ מִ/יָּ֣ם לָ/עִ֑יר וַ/יֵּ֧לֶךְ יְהוֹשֻׁ֛עַ בַּ/לַּ֥יְלָה הַ/ה֖וּא בְּ/ת֥וֹךְ הָ/עֵֽמֶק־־־׃
translation:
  text: So the people positioned the whole camp that was north of the city[a], with its rear west of the city[b], and Joshua went that night into the midst of the valley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'from the sea of the city'; here 'sea' functions as a directional term meaning 'west.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with its rear guard west of the city.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּשִׂימוּ
  chosen: positioned
  alternatives:
  - set
  - placed
  - stationed
  lexicon: HALOT
  rationale: The verb שׂים is broad ('put, set, place'). In this military context, 'positioned' best conveys deliberate tactical placement without overinterpreting beyond the text.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the troops
  - the army
  lexicon: HALOT
  rationale: The Hebrew literally says 'the people.' Although the referent is the fighting force, the text uses the broader term, so 'the people' preserves the source wording while remaining natural English.
- source_word: כָּל הַמַּחֲנֶה
  chosen: the whole camp
  alternatives:
  - all the camp
  - the entire encampment
  lexicon: HALOT
  rationale: מַחֲנֶה commonly means 'camp' or 'encampment.' 'The whole camp' is idiomatic and reflects כָּל plus the noun straightforwardly.
- source_word: אֲשֶׁר מִצְּפוֹן לָעִיר
  chosen: that was north of the city
  alternatives:
  - which was on the north of the city
  - that was to the north of the city
  lexicon: HALOT
  rationale: This relative clause locates the camp. 'North of the city' is clear modern English and preserves the spatial sense.
- source_word: עֲקֵבוֹ
  chosen: its rear
  alternatives:
  - its rear guard
  - its hind part
  - its tail
  lexicon: HALOT
  rationale: עָקֵב literally relates to 'heel' and by extension the rear or hindmost part. In military positioning, 'its rear' is the most natural rendering. 'Rear guard' is possible but slightly more interpretive than the Hebrew requires.
- source_word: מִיָּם לָעִיר
  chosen: west of the city
  alternatives:
  - on the west of the city
  - from the sea side of the city
  lexicon: HALOT
  rationale: יָם can mean 'sea,' but in geographic orientation in Hebrew it commonly denotes 'west' because of the Mediterranean. Here the directional sense is primary, so 'west of the city' is preferable in the main text.
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - walked
  - proceeded
  lexicon: HALOT
  rationale: הלך is the standard verb 'go/walk.' 'Went' is the simplest and most contextually appropriate choice.
- source_word: בַּלַּיְלָה הַהוּא
  chosen: that night
  alternatives:
  - in that night
  - during that night
  lexicon: HALOT
  rationale: The phrase is idiomatically rendered 'that night' in English.
- source_word: בְּתוֹךְ הָעֵמֶק
  chosen: into the midst of the valley
  alternatives:
  - into the middle of the valley
  - in the midst of the valley
  lexicon: HALOT
  rationale: בְּתוֹךְ means 'in/into the midst of.' Because the motion verb 'went' precedes it, 'into the midst of the valley' best reflects the movement into that location. 'Valley' is the normal rendering of עֵמֶק here.
