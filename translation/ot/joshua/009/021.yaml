id: JOS.9.21
reference: Joshua 9:21
source:
  edition: WLC
  text: וַ/יֹּאמְר֧וּ אֲלֵי/הֶ֛ם הַ/נְּשִׂיאִ֖ים יִֽחְי֑וּ וַ֠/יִּֽהְיוּ חֹטְבֵ֨י עֵצִ֤ים וְ/שֹֽׁאֲבֵי מַ֨יִם֙ לְ/כָל הָ֣/עֵדָ֔ה כַּ/אֲשֶׁ֛ר דִּבְּר֥וּ לָ/הֶ֖ם הַ/נְּשִׂיאִֽים־־׃
translation:
  text: The leaders said to them[a], “Let them live.” So they became woodcutters and water-drawers for all the congregation, just as the leaders had spoken to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'hewers of wood and drawers of water.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנְּשִׂיאִים
  chosen: the leaders
  alternatives:
  - the chiefs
  - the princes
  - the rulers
  lexicon: HALOT
  rationale: נָשִׂיא in this narrative refers to the recognized heads of the Israelite community. 'Leaders' is clear modern English and fits the civic context better than the more archaic or potentially misleading 'princes.'
- source_word: יִחְיוּ
  chosen: Let them live
  alternatives:
  - They shall live
  - May they live
  lexicon: HALOT
  rationale: The imperfect here functions jussively in direct speech, expressing a decision or decree. 'Let them live' best captures the force of permitting them to remain alive.
- source_word: וַיִּהְיוּ
  chosen: they became
  alternatives:
  - they were
  - they came to be
  lexicon: HALOT
  rationale: In context this marks the resulting status assigned to the Gibeonites after the leaders' decision. 'They became' communicates the transition into this imposed role more naturally than the stative 'they were.'
- source_word: חֹטְבֵי עֵצִים
  chosen: woodcutters
  alternatives:
  - cutters of wood
  - hewers of wood
  lexicon: HALOT
  rationale: The participial construction denotes an ongoing labor role. 'Woodcutters' is idiomatic modern English; 'hewers of wood' is traditional but archaic.
- source_word: שֹׁאֲבֵי מַיִם
  chosen: water-drawers
  alternatives:
  - drawers of water
  - water carriers
  lexicon: HALOT
  rationale: The phrase denotes those tasked with drawing water. 'Water-drawers' preserves the concrete image and parallels 'woodcutters' better than the less precise 'water carriers.'
- source_word: לְכָל הָעֵדָה
  chosen: for all the congregation
  alternatives:
  - for the whole congregation
  - for all the assembly
  - for the entire community
  lexicon: HALOT
  rationale: עֵדָה commonly refers to the assembled covenant community of Israel. 'Congregation' preserves that communal-covenantal sense better than the more generic 'community,' while remaining understandable.
- source_word: כַּאֲשֶׁר דִּבְּרוּ לָהֶם
  chosen: just as the leaders had spoken to them
  alternatives:
  - as the leaders had said to them
  - according to what the leaders told them
  lexicon: HALOT
  rationale: This clause ties the outcome to the leaders' prior declaration. The pluperfect-like English 'had spoken' clarifies that this statement refers back to the earlier decision.
