id: JOS.24.11
reference: Joshua 24:11
source:
  edition: WLC
  text: וַ/תַּעַבְר֣וּ אֶת הַ/יַּרְדֵּן֮ וַ/תָּבֹ֣אוּ אֶל יְרִיחוֹ֒ וַ/יִּלָּחֲמ֣וּ בָ/כֶ֣ם בַּעֲלֵֽי יְ֠רִיחוֹ הָֽ/אֱמֹרִ֨י וְ/הַ/פְּרִזִּ֜י וְ/הַֽ/כְּנַעֲנִ֗י וְ/הַֽ/חִתִּי֙ וְ/הַ/גִּרְגָּשִׁ֔י הַֽ/חִוִּ֖י וְ/הַ/יְבוּסִ֑י וָ/אֶתֵּ֥ן אוֹתָ֖/ם בְּ/יֶדְ/כֶֽם־־־׃
translation:
  text: Then you crossed the Jordan and came to Jericho[a], and the men of Jericho fought against you—the Amorites, the Perizzites, the Canaanites, the Hittites, the Girgashites, the Hivites, and the Jebusites—and I gave them into your hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lords of Jericho.' The Hebrew expression literally means 'masters/owners of Jericho' and may refer to the city's rulers or leading men rather than all its inhabitants.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעַבְרוּ
  chosen: you crossed
  alternatives:
  - you passed over
  lexicon: HALOT
  rationale: From עבר in the qal wayyiqtol, referring to crossing the Jordan River. 'Crossed' is idiomatic modern English and preserves the concrete movement.
- source_word: הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: Standard English rendering of the proper name. 'The Jordan' is sufficient and natural in biblical narrative.
- source_word: וַתָּבֹאוּ אֶל יְרִיחוֹ
  chosen: came to Jericho
  alternatives:
  - entered Jericho
  - came into Jericho
  lexicon: HALOT
  rationale: בוא + אֶל commonly means 'come to' or 'enter.' 'Came to Jericho' best matches the preposition אֶל and avoids overstating physical entry if the focus is arrival at the city.
- source_word: וַיִּלָּחֲמוּ בָכֶם
  chosen: fought against you
  alternatives:
  - made war against you
  - fought with you
  lexicon: HALOT
  rationale: לחם with ב marks hostile engagement. 'Fought against you' makes the adversative sense explicit in natural English.
- source_word: בַּעֲלֵי יְרִיחוֹ
  chosen: the leaders of Jericho
  alternatives:
  - the lords of Jericho
  - the citizens of Jericho
  - the inhabitants of Jericho
  lexicon: HALOT
  rationale: בעלים literally means 'owners/masters/lords,' but in this civic context likely refers to the city's rulers or leading men rather than all inhabitants. 'Leaders' communicates the social-political sense without archaic overtones. Because the following ethnonyms broaden the list of opponents, this phrase is best taken as introducing Jericho's ruling men among the hostile groups.
- source_word: הָאֱמֹרִי וְהַפְּרִזִּי וְהַכְּנַעֲנִי וְהַחִתִּי וְהַגִּרְגָּשִׁי הַחִוִּי וְהַיְבוּסִי
  chosen: the Amorites, the Perizzites, the Canaanites, the Hittites, the Girgashites, the Hivites, and the Jebusites
  alternatives:
  - the Amorite ... and the Jebusite
  lexicon: HALOT
  rationale: Although each ethnonym is singular in Hebrew form, these are standard collective singulars for peoples. English normally renders them as plurals when listing nations.
- source_word: וָאֶתֵּן אוֹתָם בְּיֶדְכֶם
  chosen: I gave them into your hand
  alternatives:
  - I gave them into your power
  - I delivered them into your hand
  lexicon: HALOT
  rationale: נתן + ביד is a common idiom for giving an enemy over to someone's power. 'Into your hand' preserves the biblical idiom while remaining understandable.
