translation:
  text: 'from the Shihor, which is east of Egypt, as far as the border of Ekron to the north—it is counted as Canaanite territory—the five rulers of the Philistines: the Gazite, the Ashdodite, the Ashkelonite, the Gittite, and the Ekronite, and the Avvim.'
