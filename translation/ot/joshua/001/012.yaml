id: JOS.1.12
reference: Joshua 1:12
source:
  edition: WLC
  text: וְ/לָ/רֽאוּבֵנִי֙ וְ/לַ/גָּדִ֔י וְ/לַ/חֲצִ֖י שֵׁ֣בֶט הַֽ/מְנַשֶּׁ֑ה אָמַ֥ר
    יְהוֹשֻׁ֖עַ לֵ/אמֹֽר׃
translation:
  text: And to the Reubenites, and to the Gadites, and to the half-tribe of Manasseh,
    Joshua said,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''saying.'' The term introduces Joshua''s speech, which continues
      in the following verse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לָ/רֽאוּבֵנִי
  chosen: and to the Reubenites
  alternatives:
  - and to the tribe of Reuben
  - and to the Reubenite
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition are best carried over as 'and
    to.' The gentilic singular form functions collectively here, so English plural
    'Reubenites' is the most natural and accurate rendering in context.
- source_word: וְ/לַ/גָּדִי
  chosen: and to the Gadites
  alternatives:
  - and to the tribe of Gad
  - and to the Gadite
  lexicon: HALOT
  rationale: As with 'Reubenites,' the gentilic singular is used collectively. English
    plural 'Gadites' communicates the addressed group clearly.
- source_word: וְ/לַ/חֲצִי שֵׁבֶט הַמְנַשֶּׁה
  chosen: and to the half-tribe of Manasseh
  alternatives:
  - and to half the tribe of Manasseh
  lexicon: HALOT
  rationale: The construct phrase literally denotes 'the half of the tribe of Manasseh.'
    English idiom strongly favors the established and precise expression 'the half-tribe
    of Manasseh.'
- source_word: אָמַר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: The common verb אמר is most straightforwardly rendered 'said.' 'Spoke'
    is possible but less direct here.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: לֵאמֹר
  chosen: ','
  alternatives:
  - saying
  lexicon: HALOT
  rationale: The infinitive 'saying' introduces the direct speech in the next verse.
    In natural modern English, it is commonly absorbed into punctuation rather than
    translated explicitly, without loss of meaning.
