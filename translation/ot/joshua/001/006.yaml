id: JOS.1.6
reference: Joshua 1:6
source:
  edition: WLC
  text: חֲזַ֖ק וֶ/אֱמָ֑ץ כִּ֣י אַתָּ֗ה תַּנְחִיל֙ אֶת הָ/עָ֣ם הַ/זֶּ֔ה אֶת הָ/אָ֕רֶץ
    אֲשֶׁר נִשְׁבַּ֥עְתִּי לַ/אֲבוֹתָ֖/ם לָ/תֵ֥ת לָ/הֶֽם־־־׃
translation:
  text: Be strong and courageous, for you shall cause this people to inherit the land
    that I swore to their fathers to give to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall give this people the land as an inheritance.' The Hebrew verb
      is causative ('cause to inherit'), which may also be expressed more idiomatically
      in English as giving or apportioning an inheritance.
    reason: lexical_alternative
  - marker: b
    text: '''Their fathers'' refers to Israel''s forefathers, especially the patriarchs;
      alternatively, ''their ancestors.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲזַק
  chosen: Be strong
  alternatives:
  - Be firm
  - Be strengthened
  lexicon: HALOT
  rationale: Qal imperative 2ms from חזק functions here as an exhortation to strength
    or firmness. 'Be strong' is the most natural and established English equivalent
    and fits the parallel imperative that follows.
- source_word: וֶאֱמָץ
  chosen: and courageous
  alternatives:
  - and resolute
  - and bold
  lexicon: HALOT
  rationale: Qal imperative 2ms from אמץ in this collocation with חזק commonly conveys
    courage or resolve. Rendering the pair as 'Be strong and courageous' preserves
    the idiomatic force in clear modern English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the command. 'For' is concise and natural in
    English, preserving the causal connection.
- source_word: תַּנְחִיל
  chosen: you shall cause ... to inherit
  alternatives:
  - you shall give ... as an inheritance
  - you shall apportion ... as an inheritance
  lexicon: HALOT
  rationale: 'Hiphil of נחל is causative: Joshua will bring about the people''s inheritance
    of the land. ''Cause ... to inherit'' preserves that causative nuance more transparently
    than the smoother but less explicit ''give as an inheritance.'''
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  - these people
  lexicon: HALOT
  rationale: The Hebrew is singular with demonstrative, literally 'this people.' 'This
    people' preserves the collective singular and covenantal-national sense better
    than 'these people.'
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Joshua, הארץ in this covenant context refers to the promised land.
    'The land' is the standard and contextually appropriate rendering.
- source_word: נִשְׁבַּעְתִּי
  chosen: I swore
  alternatives:
  - I have sworn
  - I pledged by oath
  lexicon: HALOT
  rationale: The Niphal/perfect of שבע here denotes God's oath to the patriarchs.
    Simple past 'I swore' fits the narrative setting and keeps the statement direct.
- source_word: לַאֲבוֹתָם
  chosen: to their fathers
  alternatives:
  - to their ancestors
  lexicon: HALOT
  rationale: Literally 'to their fathers.' In context it refers to the patriarchal
    forefathers of Israel. 'Fathers' is retained for gender-accurate fidelity to the
    Hebrew, in line with the translation philosophy.
- source_word: לָתֵת לָהֶם
  chosen: to give to them
  alternatives:
  - to give them
  - for giving to them
  lexicon: HALOT
  rationale: The infinitive plus pronominal phrase expresses the content of the oath.
    'To give to them' is slightly more formal but mirrors the Hebrew structure and
    keeps the recipients explicit.
