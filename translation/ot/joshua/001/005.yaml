id: JOS.1.5
reference: Joshua 1:5
source:
  edition: WLC
  text: לֹֽא יִתְיַצֵּ֥ב אִישׁ֙ לְ/פָנֶ֔י/ךָ כֹּ֖ל יְמֵ֣י חַיֶּ֑י/ךָ כַּֽ/אֲשֶׁ֨ר הָיִ֤יתִי עִם מֹשֶׁה֙ אֶהְיֶ֣ה עִמָּ֔/ךְ לֹ֥א אַרְפְּ/ךָ֖ וְ/לֹ֥א אֶעֶזְבֶֽ/ךָּ־־׃
translation:
  text: No man will stand before you all the days of your life[a]. Just as I was with Moses, I will be with you[c][b]. I will not fail you or forsake you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'No one will be able to stand before you.' The Hebrew idiom can carry the sense of successful resistance.
    reason: lexical_alternative
  - marker: b
    text: '''No man'' uses a masculine singular Hebrew form with generic force, meaning no human opponent.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I will not let go of you or forsake you.' The first verb suggests not dropping, relaxing, or failing to support.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתְיַצֵּב
  chosen: will stand before
  alternatives:
  - will take his stand before
  - will withstand
  - will be able to stand before
  lexicon: HALOT
  rationale: The hitpael of יצב here conveys taking one's stand in opposition or presenting oneself successfully before someone. In context of conquest and divine promise, the sense is that no opponent will be able to stand against Joshua. 'Stand before you' preserves the Hebrew idiom while remaining natural English.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - one
  - anyone
  - person
  lexicon: HALOT
  rationale: 'The noun is grammatically masculine singular with generic force: ''no man'' = no human opponent. Per doctrine, gender-accurate rendering is preferred over flattening to gender-neutral language when the source uses masculine representative language.'
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - against you
  - in your presence
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'before your face.' In this military-promissory context, 'before you' is the most direct rendering and allows the idiom 'stand before you' to carry the adversarial sense.
- source_word: כֹּל יְמֵי חַיֶּיךָ
  chosen: all the days of your life
  alternatives:
  - throughout your life
  - all your lifetime
  lexicon: HALOT
  rationale: This is a standard Hebrew expression for the entirety of one's lifespan. The chosen rendering is both transparent to the Hebrew structure and idiomatic in English.
- source_word: כַּאֲשֶׁר הָיִיתִי עִם מֹשֶׁה
  chosen: Just as I was with Moses
  alternatives:
  - As I was with Moses
  - In the same way that I was with Moses
  lexicon: HALOT
  rationale: כַאֲשֶׁר marks comparison. 'Just as' clearly signals the analogy between God's prior presence with Moses and promised presence with Joshua.
- source_word: אֶהְיֶה עִמָּךְ
  chosen: I will be with you
  alternatives:
  - I shall be with you
  lexicon: HALOT
  rationale: The simple future of היה with עִם expresses promised presence. 'I will be with you' is the natural and theologically weighty English equivalent, echoing the covenantal assurance without overinterpreting it.
- source_word: אַרְפְּךָ
  chosen: fail you
  alternatives:
  - let you drop
  - leave you helpless
  - abandon you
  lexicon: HALOT
  rationale: From רפה in the hiphil, the sense here is to let go, slacken one's hold, or fail to support. In the paired promise with 'forsake,' 'fail you' best captures the nuance of not dropping or neglecting Joshua while preserving a familiar English collocation.
- source_word: אֶעֶזְבֶךָּ
  chosen: forsake you
  alternatives:
  - abandon you
  - leave you
  lexicon: HALOT
  rationale: עזב commonly means leave, abandon, forsake. 'Forsake you' preserves the solemn covenantal tone and pairs well with 'fail you,' reflecting the twofold negation in the Hebrew.
