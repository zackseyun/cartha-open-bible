theological_decisions:
- issue: Rendering the generic masculine אִישׁ
  chosen_reading: No man
  alternative_readings:
  - No one
  - No person
  - No enemy
  rationale: The Hebrew uses masculine singular אִישׁ with representative force. Following the doctrine's gender-accurate principle, the translation keeps 'man' rather than neutralizing the term. Because English readers may hear this as excluding women rather than as a generic human reference, an alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Nuance of the double promise לֹא אַרְפְּךָ וְלֹא אֶעֶזְבֶךָּ
  chosen_reading: I will not fail you or forsake you
  alternative_readings:
  - I will not leave you nor abandon you
  - I will not let go of you or forsake you
  rationale: 'The pair expresses comprehensive divine fidelity: God will neither relax his support nor abandon Joshua. The chosen English preserves the distinction without becoming wooden. No doctrinal tension is resolved beyond the lexical sense.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1 and §5
