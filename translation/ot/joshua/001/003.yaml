theological_decisions:
- issue: Aspect of the divine grant
  chosen_reading: Rendered the perfect נְתַתִּיו as 'I have given it' rather than a simple future-like promise.
  alternative_readings:
  - I give it to you
  - I will give it to you
  rationale: The Hebrew perfect presents the land grant as already established by God's decree, even though its possession unfolds in history. This preserves the theological force of divine certainty without importing a later doctrinal system.
