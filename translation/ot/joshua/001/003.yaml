id: JOS.1.3
reference: Joshua 1:3
source:
  edition: WLC
  text: כָּל מָק֗וֹם אֲשֶׁ֨ר תִּדְרֹ֧ךְ כַּֽף רַגְלְ/כֶ֛ם בּ֖/וֹ לָ/כֶ֣ם נְתַתִּ֑י/ו כַּ/אֲשֶׁ֥ר דִּבַּ֖רְתִּי אֶל מֹשֶֽׁה־־־׃
translation:
  text: Every place on which the sole of your foot treads[a], I have given to you, just as I spoke to Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Every place where the sole of your foot treads.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל מָקוֹם
  chosen: Every place
  alternatives:
  - Every location
  - The whole place
  lexicon: HALOT
  rationale: כָּל with מָקוֹם yields a distributive sense, referring to each place individually rather than one total area. 'Every place' is natural English and preserves the scope of the promise.
- source_word: אֲשֶׁר
  chosen: on which
  alternatives:
  - where
  - that
  lexicon: HALOT
  rationale: The relative particle introduces the clause modifying 'place.' Because of the following בּוֹ ('on/in it'), English idiom is best represented by 'on which' rather than a bare 'that'.
- source_word: תִּדְרֹךְ
  chosen: treads
  alternatives:
  - steps
  - walks
  lexicon: HALOT
  rationale: The verb דרך means to tread or step. 'Treads' preserves the concrete imagery of setting foot on land, which is important in this territorial promise.
- source_word: כַּף רַגְלְכֶם
  chosen: the sole of your foot
  alternatives:
  - the sole of your feet
  - your footsole
  lexicon: HALOT
  rationale: כַּף with רֶגֶל refers specifically to the sole of the foot. Although the pronominal suffix is plural ('your'), English commonly uses singular in distributive expressions of this kind; 'the sole of your foot' is idiomatic and closely reflects the Hebrew image.
- source_word: בּוֹ
  chosen: on which
  alternatives:
  - in it
  - upon it
  lexicon: HALOT
  rationale: The preposition with 3ms suffix refers back to 'place.' In this context of stepping on land, English idiom prefers 'on which' rather than the more wooden 'in it'.
- source_word: לָכֶם
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition marks the beneficiaries of the gift. 'To you' fits the verbal construction 'have given it to you' in standard English.
- source_word: נְתַתִּיו
  chosen: I have given it
  alternatives:
  - I give it
  - I have assigned it
  lexicon: HALOT
  rationale: The perfect form presents the gift as granted by divine decree. 'I have given it' preserves the completed aspect and the certainty of the promise better than a simple present.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: The comparison points back to prior divine speech to Moses. 'Just as' clearly marks correspondence between the present statement and the earlier promise.
- source_word: דִּבַּרְתִּי אֶל מֹשֶׁה
  chosen: I spoke to Moses
  alternatives:
  - I said to Moses
  - I promised Moses
  lexicon: HALOT
  rationale: דבר אל is the standard expression 'speak to.' 'Promised Moses' would over-interpret; 'spoke to Moses' preserves the wording while allowing the promise-content to remain implicit.
