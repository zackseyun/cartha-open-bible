id: JOS.1.4
reference: Joshua 1:4
source:
  edition: WLC
  text: מֵ/הַ/מִּדְבָּר֩ וְ/הַ/לְּבָנ֨וֹן הַ/זֶּ֜ה וְֽ/עַד הַ/נָּהָ֧ר הַ/גָּד֣וֹל נְהַר פְּרָ֗ת כֹּ֚ל אֶ֣רֶץ הַֽ/חִתִּ֔ים וְ/עַד הַ/יָּ֥ם הַ/גָּד֖וֹל מְב֣וֹא הַ/שָּׁ֑מֶשׁ יִֽהְיֶ֖ה גְּבוּלְ/כֶֽם־־־׃
translation:
  text: From the wilderness and this Lebanon as far as the great river[a], the Euphrates River—all the land of the Hittites—and as far as the Great Sea, toward the going down of the sun[b], shall be your border.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the Mediterranean Sea.
    reason: cross_reference
  - marker: b
    text: Or 'toward the west'; literally, 'toward the going down of the sun.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵהַמִּדְבָּר
  chosen: From the wilderness
  alternatives:
  - From the desert
  lexicon: HALOT
  rationale: הַמִּדְבָּר commonly denotes wilderness/desert terrain. 'Wilderness' is retained because it is a standard biblical-geographical term and fits the likely reference to the southern wilderness region without over-specifying.
- source_word: וְהַלְּבָנוֹן הַזֶּה
  chosen: and this Lebanon
  alternatives:
  - and this Lebanon mountain range
  - and Lebanon
  lexicon: HALOT
  rationale: The demonstrative הַזֶּה is explicit in the Hebrew and should be represented. 'Lebanon' is a proper geographic name and is transliterated rather than translated, per philosophy.
- source_word: וְעַד הַנָּהָר הַגָּדוֹל נְהַר פְּרָת
  chosen: as far as the great river, the Euphrates River
  alternatives:
  - to the great river, the river Euphrates
  - as far as the great river Euphrates
  lexicon: HALOT
  rationale: 'The appositional structure is preserved: ''the great river'' followed by specification ''the Euphrates River.'' ''As far as'' reflects עַד in boundary language.'
- source_word: כֹּל אֶרֶץ הַחִתִּים
  chosen: all the land of the Hittites
  alternatives:
  - the whole land of the Hittites
  - all Hittite land
  lexicon: HALOT
  rationale: כֹּל modifies the construct phrase 'land of the Hittites.' 'All the land of the Hittites' is the most transparent rendering, preserving the ethnic-geographic designation without interpretive reduction.
- source_word: וְעַד הַיָּם הַגָּדוֹל
  chosen: and as far as the Great Sea
  alternatives:
  - and to the Great Sea
  - and as far as the Mediterranean Sea
  lexicon: HALOT
  rationale: '''Great Sea'' is the literal expression and likely refers to the Mediterranean, but the Hebrew designation itself is preserved in the main text. The identification can be noted in a footnote rather than imported into the translation.'
- source_word: מְבוֹא הַשָּׁמֶשׁ
  chosen: toward the going down of the sun
  alternatives:
  - toward the west
  - at sunset
  lexicon: HALOT
  rationale: The phrase literally refers to the sun's setting/going in and functions idiomatically for the west. To preserve the Hebrew imagery and avoid flattening the expression, the more literal wording is kept, with 'west' preserved as an alternative.
- source_word: יִהְיֶה גְּבוּלְכֶם
  chosen: shall be your border
  alternatives:
  - will be your territory
  - shall be your boundary
  lexicon: HALOT
  rationale: גְּבוּל can denote border/boundary/territory. In a verse listing extent markers, 'border' best matches the boundary-setting sense. 'Shall be' reflects the simple imperfect in promissory declaration.
