theological_decisions:
- issue: Gendered representative language
  chosen_reading: Every man
  alternative_readings:
  - Every person
  - Whoever
  rationale: The Hebrew uses masculine singular איש in a representative distributive
    construction. Per translation policy, gender-accurate rendering is preferred over
    neutralization unless context clearly demands otherwise.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Judicial penalty wording
  chosen_reading: shall be put to death
  alternative_readings:
  - shall die
  - must be executed
  rationale: The Hebrew form indicates an imposed death penalty, not simply the outcome
    of dying. The translation preserves the legal/judicial force without adding extra
    procedural detail.
