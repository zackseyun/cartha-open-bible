id: JOS.1.18
reference: Joshua 1:18
source:
  edition: WLC
  text: כָּל אִ֞ישׁ אֲשֶׁר יַמְרֶ֣ה אֶת פִּ֗י/ךָ וְ/לֹֽא יִשְׁמַ֧ע אֶת דְּבָרֶ֛י/ךָ
    לְ/כֹ֥ל אֲשֶׁר תְּצַוֶּ֖/נּוּ יוּמָ֑ת רַ֖ק חֲזַ֥ק וֶ/אֱמָֽץ־־־־־־׃פ
translation:
  text: Every man who rebels against your command and does not listen to your words
    in all that you command him shall be put to death. Only be strong and courageous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'Every man who rebels against your mouth.' The Hebrew idiom 'your
      mouth' means your command or authoritative word.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל אִישׁ
  chosen: Every man
  alternatives:
  - Every person
  - Whoever
  lexicon: HALOT
  rationale: Literally 'every man.' Following the gender-accurate policy, the masculine
    singular representative expression is preserved rather than neutralized. 'Whoever'
    is possible idiomatically, but 'Every man' better reflects the Hebrew form and
    distributive force.
- source_word: יַמְרֶה
  chosen: rebels against
  alternatives:
  - is rebellious against
  - defies
  lexicon: HALOT
  rationale: Hiphil of מרה conveys rebellion or defiance against authority. 'Rebels
    against' is natural English and preserves the covenantal/authoritative sense better
    than the flatter 'disobeys'.
- source_word: אֶת פִּיךָ
  chosen: your command
  alternatives:
  - your mouth
  - what you say
  lexicon: HALOT
  rationale: Literally 'your mouth,' but in this idiom it refers to authoritative
    utterance/command. 'Your command' communicates the sense in clear English without
    wooden literalism.
- source_word: וְלֹא יִשְׁמַע אֶת דְּבָרֶיךָ
  chosen: and does not listen to your words
  alternatives:
  - and does not obey your words
  - and does not hear your words
  lexicon: HALOT
  rationale: שׁמע can mean hear/listen/obey depending on context. Here, because rebellion
    has already been stated with ימרה, 'listen to' preserves the lexical distinction
    while still implying heedful response.
- source_word: לְכֹל אֲשֶׁר תְּצַוֶּנּוּ
  chosen: in all that you command him
  alternatives:
  - in everything that you command him
  - with respect to all that you command him
  lexicon: HALOT
  rationale: This phrase specifies the scope of required obedience. 'In all that you
    command him' is idiomatic and closely tracks the Hebrew.
- source_word: יוּמָת
  chosen: shall be put to death
  alternatives:
  - shall die
  - must be executed
  lexicon: HALOT
  rationale: The passive/causative form indicates judicial execution rather than mere
    mortality. 'Shall be put to death' best reflects the form and legal force.
- source_word: רַק
  chosen: Only
  alternatives:
  - Nevertheless
  - Just
  lexicon: HALOT
  rationale: 'Here רַק marks an emphatic limiting/exhortatory transition: despite
    the pledge of enforcement, Joshua himself is urged onward. ''Only'' is the standard
    concise rendering and fits the discourse well.'
- source_word: חֲזַק וֶאֱמָץ
  chosen: be strong and courageous
  alternatives:
  - be strong and resolute
  - be firm and brave
  lexicon: HALOT
  rationale: This recurring exhortation in Joshua is conventionally and accurately
    rendered 'be strong and courageous.' אמץ here carries the sense of being bold/steadfast
    rather than merely emotional courage, but 'courageous' remains the best concise
    English equivalent.
