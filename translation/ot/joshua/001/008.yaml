theological_decisions:
- issue: Meaning of תּוֹרָה in covenant context
  chosen_reading: law
  alternative_readings:
  - instruction
  - Torah
  rationale: While תּוֹרָה broadly means instruction, here it refers to the covenantal
    written corpus Joshua is to obey. 'Law' best reflects that function in context.
    'Torah' is possible but would be less transparent for many English readers and
    is not required by the text.
- issue: Nuance of meditation as oral recitation versus inward reflection
  chosen_reading: meditate on it
  alternative_readings:
  - mutter it
  - recite it
  rationale: 'The verse combines oral and reflective dimensions: the book is not to
    depart from Joshua''s mouth, and he is to הָגָה in it day and night. The main
    text uses ''meditate'' for readability, while the oral nuance is retained by the
    first clause and preserved in a footnote.'
  doctrine_reference: Translation philosophy §6; preserve source meaning without unnecessary
    jargon
