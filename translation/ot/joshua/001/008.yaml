id: JOS.1.8
reference: Joshua 1:8
source:
  edition: WLC
  text: לֹֽא יָמ֡וּשׁ סֵפֶר֩ הַ/תּוֹרָ֨ה הַ/זֶּ֜ה מִ/פִּ֗י/ךָ וְ/הָגִ֤יתָ בּ/וֹ֙ יוֹמָ֣ם
    וָ/לַ֔יְלָה לְמַ֨עַן֙ תִּשְׁמֹ֣ר לַ/עֲשׂ֔וֹת כְּ/כָל הַ/כָּת֖וּב בּ֑/וֹ כִּי אָ֛ז
    תַּצְלִ֥יחַ אֶת דְּרָכֶ֖/ךָ וְ/אָ֥ז תַּשְׂכִּֽיל־־־־׃
translation:
  text: This book of the law shall not depart from your mouth, but you shall meditate
    on it day and night, so that you may be careful to do according to all that is
    written in it. For then you will make your way prosper, and then you will act
    wisely.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mutter it' or 'recite it under your breath'; the Hebrew verb can include
      quiet oral repetition as well as meditation.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָמוּשׁ
  chosen: shall not depart
  alternatives:
  - shall not leave
  - shall not move away
  lexicon: HALOT
  rationale: The verb means to depart or move away. With 'from your mouth,' 'shall
    not depart' is idiomatic and preserves the image of continual verbal recitation
    or readiness on the lips.
- source_word: סֵפֶר הַתּוֹרָה הַזֶּה
  chosen: this book of the law
  alternatives:
  - this scroll of the instruction
  - this book of the Torah
  lexicon: HALOT
  rationale: סֵפֶר is 'book/scroll/document'; 'book' is standard readable English.
    תּוֹרָה can mean instruction, but in this covenantal context it refers specifically
    to the law given by God; 'law' best fits the established sense here without over-paraphrasing.
- source_word: מִפִּיךָ
  chosen: from your mouth
  alternatives:
  - out of your mouth
  lexicon: HALOT
  rationale: A formally close rendering that preserves the concrete Hebrew expression,
    implying speaking, reciting, or keeping it readily confessed.
- source_word: וְהָגִיתָ
  chosen: you shall meditate
  alternatives:
  - you shall mutter
  - you shall recite under your breath
  lexicon: HALOT
  rationale: הגה can denote low utterance, murmuring, or meditation. In this context
    of the law being in the mouth and attended to continually, 'meditate' captures
    the reflective sense in natural English, while the oral nuance is preserved by
    the preceding 'from your mouth' clause.
- source_word: יוֹמָם וָלַיְלָה
  chosen: day and night
  alternatives:
  - by day and by night
  - continually
  lexicon: HALOT
  rationale: The pair is a standard merism for continual practice. 'Day and night'
    is both literal and idiomatic.
- source_word: לְמַעַן תִּשְׁמֹר לַעֲשׂוֹת
  chosen: so that you may be careful to do
  alternatives:
  - so that you may keep to do
  - in order that you may observe to do
  lexicon: HALOT
  rationale: The construction expresses purpose leading to careful observance. 'Be
    careful to do' communicates both attentiveness and obedience in clear modern English.
- source_word: כְּכָל הַכָּתוּב בּוֹ
  chosen: according to all that is written in it
  alternatives:
  - according to everything written in it
  - in accordance with all written in it
  lexicon: HALOT
  rationale: This preserves the comprehensive force of כְּכָל and the written standard
    of the law.
- source_word: תַּצְלִיחַ אֶת דְּרָכֶךָ
  chosen: you will make your way prosper
  alternatives:
  - you will prosper your way
  - your way will prosper
  lexicon: HALOT
  rationale: The Hiphil is causative, so the subject is not merely experiencing prosperity
    but causing his course to prosper. 'Make your way prosper' preserves that causative
    force better than the intransitive 'your way will prosper.'
- source_word: תַּשְׂכִּיל
  chosen: you will act wisely
  alternatives:
  - you will have success
  - you will prosper
  - you will deal wisely
  lexicon: HALOT
  rationale: The verb שכל in Hiphil often carries the sense of acting with insight
    or prudence, sometimes with resultant success. Since prosperity has already been
    expressed by צלח, rendering this second verb as 'act wisely' preserves the semantic
    distinction rather than flattening both into 'prosper/succeed.'
