id: JOS.1.14
reference: Joshua 1:14
source:
  edition: WLC
  text: נְשֵׁי/כֶ֣ם טַפְּ/כֶם֮ וּ/מִקְנֵי/כֶם֒ יֵשְׁב֕וּ בָּ/אָ֕רֶץ אֲשֶׁ֨ר נָתַ֥ן לָ/כֶ֛ם מֹשֶׁ֖ה בְּ/עֵ֣בֶר הַ/יַּרְדֵּ֑ן וְ/אַתֶּם֩ תַּעַבְר֨וּ חֲמֻשִׁ֜ים לִ/פְנֵ֣י אֲחֵי/כֶ֗ם כֹּ֚ל גִּבּוֹרֵ֣י הַ/חַ֔יִל וַ/עֲזַרְתֶּ֖ם אוֹתָֽ/ם׃
translation:
  text: Your wives[a], your little ones, and your livestock shall remain in the land that Moses gave you beyond the Jordan. But you shall cross over before your brothers, armed, all the mighty men of valor[b], and you shall help them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your fellow Israelites' for 'your brothers'; the Hebrew uses the masculine kinship term representatively.
    reason: lexical_alternative
  - marker: b
    text: Or 'in battle array' or 'arrayed for war' for 'armed.'
    reason: alternative_reading
lexical_decisions:
- source_word: נְשֵׁיכֶם
  chosen: your wives
  alternatives:
  - your women
  lexicon: HALOT
  rationale: In this household/military context, the plural construct with 2mp suffix refers specifically to the men’s wives, not women in general.
- source_word: טַפְּכֶם
  chosen: your little ones
  alternatives:
  - your children
  - your dependents
  lexicon: HALOT
  rationale: טַף commonly denotes small children or dependents. 'Little ones' preserves the concrete sense without over-specifying age.
- source_word: וּמִקְנֵיכֶם
  chosen: and your livestock
  alternatives:
  - and your cattle
  - and your possessions
  lexicon: HALOT
  rationale: מִקְנֶה here refers to domesticated animals/herds. 'Livestock' is natural modern English and more precise than the broader 'possessions'.
- source_word: יֵשְׁבוּ
  chosen: shall remain
  alternatives:
  - shall dwell
  - shall stay
  lexicon: HALOT
  rationale: The verb ישב means sit/dwell/remain. In context of families staying behind in allotted territory, 'shall remain' communicates continued residence clearly.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the הארץ/territory
  lexicon: HALOT
  rationale: '''Land'' is the standard rendering for אֶרֶץ here, referring to the settled territory east of the Jordan.'
- source_word: אֲשֶׁר נָתַן לָכֶם מֹשֶׁה
  chosen: that Moses gave you
  alternatives:
  - which Moses has given you
  lexicon: HALOT
  rationale: The qatal verb marks completed action from the narrative standpoint; simple past is idiomatic in English.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  chosen: beyond the Jordan
  alternatives:
  - on the other side of the Jordan
  - across the Jordan
  lexicon: HALOT
  rationale: עֵבֶר denotes the far side/region across. 'Beyond the Jordan' is concise and conventional, while leaving the directional perspective implicit as in Hebrew.
- source_word: וְאַתֶּם תַּעַבְרוּ
  chosen: But you shall cross over
  alternatives:
  - and you shall pass over
  - and you shall cross
  lexicon: HALOT
  rationale: The contrast between those remaining and the fighting men moving ahead is well conveyed by 'But you shall cross over.'
- source_word: חֲמֻשִׁים
  chosen: armed
  alternatives:
  - in battle array
  - arrayed for war
  - by fives
  lexicon: HALOT
  rationale: In military contexts this term is commonly understood as equipped/armed for battle. More literal but obscure options are less suitable for readable modern English.
- source_word: לִפְנֵי אֲחֵיכֶם
  chosen: before your brothers
  alternatives:
  - ahead of your brothers
  - in front of your brothers
  lexicon: HALOT
  rationale: '''Before'' preserves the Hebrew idiom of going in advance of fellow Israelites.'
- source_word: אֲחֵיכֶם
  chosen: your brothers
  alternatives:
  - your brothers and sisters
  - your fellow Israelites
  lexicon: HALOT
  rationale: Per gender-accurate policy, the masculine kinship term is retained. Here it refers representatively to their fellow Israelites, but the source wording is 'brothers.'
- source_word: כֹּל גִּבּוֹרֵי הַחַיִל
  chosen: all the mighty men of valor
  alternatives:
  - all the valiant warriors
  - every mighty warrior
  - all the able fighting men
  lexicon: HALOT
  rationale: This phrase denotes proven or capable fighting men. 'Mighty men of valor' is somewhat traditional but still intelligible and preserves the force of גִּבּוֹרֵי הַחַיִל.
- source_word: וַעֲזַרְתֶּם אוֹתָם
  chosen: and you shall help them
  alternatives:
  - and you shall assist them
  - and you shall come to their aid
  lexicon: HALOT
  rationale: The verb עזר means help/assist. 'Help' is the clearest modern equivalent.
