theological_decisions:
- issue: Gendered kinship language in אֲחֵיכֶם
  chosen_reading: your brothers
  alternative_readings:
  - your fellow Israelites
  - your brothers and sisters
  rationale: The Hebrew uses a masculine plural kinship term with representative force for the covenant community. Following the stated gender-accurate policy, the translation keeps 'brothers' in the main text rather than neutralizing it, while preserving the broader referent in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Military descriptor חֲמֻשִׁים
  chosen_reading: armed
  alternative_readings:
  - in battle array
  - arrayed for war
  rationale: The term is somewhat debated, but in this context the sense of being equipped for battle is most likely and best fits readable modern English. Alternatives are preserved in a footnote because the exact nuance is not entirely certain.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
