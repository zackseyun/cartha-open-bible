theological_decisions:
- issue: Gendered corporate designation in לִבְנֵי יִשְׂרָאֵל
  chosen_reading: to the sons of Israel
  alternative_readings:
  - to the Israelites
  - to the children of Israel
  rationale: The Hebrew explicitly uses the masculine plural 'sons.' Following the
    doctrine's gender-accurate principle, the translation preserves the form rather
    than neutralizing it, while recognizing that the referent is the covenant people
    as a whole.
