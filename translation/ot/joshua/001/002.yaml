id: JOS.1.2
reference: Joshua 1:2
source:
  edition: WLC
  text: מֹשֶׁ֥ה עַבְדִּ֖/י מֵ֑ת וְ/עַתָּה֩ ק֨וּם עֲבֹ֜ר אֶת הַ/יַּרְדֵּ֣ן הַ/זֶּ֗ה
    אַתָּה֙ וְ/כָל הָ/עָ֣ם הַ/זֶּ֔ה אֶל הָ/אָ֕רֶץ אֲשֶׁ֧ר אָנֹכִ֛י נֹתֵ֥ן לָ/הֶ֖ם
    לִ/בְנֵ֥י יִשְׂרָאֵֽל־־־׃
translation:
  text: Moses my servant is dead. So now, arise, cross this Jordan—you and all this
    people—into the land that I am giving to them, to the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel.' The Hebrew reads 'the sons
      of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: עֶבֶד commonly means servant/slave. Here it functions as an honorific
    description of Moses in relation to God, without foregrounding bonded-status imagery,
    so 'my servant' best fits the context while remaining natural English.
- source_word: מֵת
  chosen: is dead
  alternatives:
  - has died
  lexicon: HALOT
  rationale: The qatal form states Moses' death as a present fact relevant to the
    commission. 'Is dead' is idiomatic and forceful in English, matching the Hebrew's
    blunt declaration.
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: The conjunction plus adverb marks transition from Moses' death to Joshua's
    commission. 'So now' captures both continuity and consequential force more clearly
    than bare 'now.'
- source_word: קוּם
  chosen: arise
  alternatives:
  - get up
  - stand up
  lexicon: HALOT
  rationale: The imperative introduces decisive action. 'Arise' preserves the elevated
    tone appropriate to divine commissioning better than the more colloquial 'get
    up.'
- source_word: עֲבֹר
  chosen: cross
  alternatives:
  - go over
  - pass over
  lexicon: HALOT
  rationale: In context with the Jordan as direct object, the verb means to cross
    over. 'Cross' is concise, natural, and semantically precise.
- source_word: אֶת־הַיַּרְדֵּן הַזֶּה
  chosen: this Jordan
  alternatives:
  - the Jordan
  - this Jordan River
  lexicon: HALOT
  rationale: The demonstrative is explicit in Hebrew and should be preserved. English
    can naturally say 'this Jordan' in a heightened style; 'Jordan River' would add
    a word not present in the Hebrew.
- source_word: אַתָּה וְכָל־הָעָם הַזֶּה
  chosen: you and all this people
  alternatives:
  - you and all these people
  - you and all the people
  lexicon: HALOT
  rationale: The singular noun with demonstrative is best represented by 'all this
    people,' preserving the collective singular of the Hebrew. 'These people' would
    shift the number nuance; 'the people' would omit the demonstrative.
- source_word: אֶל־הָאָרֶץ
  chosen: into the land
  alternatives:
  - to the land
  lexicon: HALOT
  rationale: With a motion verb, אֶל can be rendered 'to' or 'into.' 'Into the land'
    better reflects entry across the Jordan into the promised territory.
- source_word: אֲשֶׁר אָנֹכִי נֹתֵן לָהֶם
  chosen: that I am giving to them
  alternatives:
  - which I give them
  - that I am about to give them
  lexicon: HALOT
  rationale: The participle נֹתֵן presents the giving as ongoing/imminent from God's
    perspective. 'I am giving' preserves that aspect better than a simple present.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: to the sons of Israel
  alternatives:
  - to the Israelites
  - to the children of Israel
  lexicon: HALOT
  rationale: Per the project's gender-accurate principle, the masculine plural construct
    is retained as 'sons of Israel.' 'Israelites' is smoother but less formally transparent;
    'children of Israel' is traditional but can obscure the masculine form.
