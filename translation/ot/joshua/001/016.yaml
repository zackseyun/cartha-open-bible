id: JOS.1.16
reference: Joshua 1:16
source:
  edition: WLC
  text: וַֽ/יַּעֲנ֔וּ אֶת יְהוֹשֻׁ֖עַ לֵ/אמֹ֑ר כֹּ֤ל אֲשֶׁר צִוִּיתָ֨/נוּ֙ נַֽעֲשֶׂ֔ה
    וְ/אֶֽל כָּל אֲשֶׁ֥ר תִּשְׁלָחֵ֖/נוּ נֵלֵֽךְ־־־־׃
translation:
  text: And they answered Joshua, saying, “All that you have commanded us we will
    do, and wherever you send us we will go.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and to every place that you send us, we will go.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲנוּ
  chosen: And they answered
  alternatives:
  - And they replied
  lexicon: HALOT
  rationale: ענה in the qal wayyiqtol commonly introduces a response in narrative.
    'Answered' preserves the formal narrative linkage, while remaining natural in
    English.
- source_word: אֶת יְהוֹשֻׁעַ
  chosen: Joshua
  alternatives:
  - to Joshua
  lexicon: HALOT
  rationale: The direct-object marker with ענה marks Joshua as the one addressed.
    English idiom normally expresses this simply as 'answered Joshua' rather than
    more woodenly 'answered to Joshua.' The personal name is transliterated per philosophy.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The infinitive construct formula introduces direct speech. 'Saying' preserves
    the Hebrew discourse structure without unnecessary expansion.
- source_word: כֹּל אֲשֶׁר
  chosen: All that
  alternatives:
  - Everything that
  - All which
  lexicon: HALOT
  rationale: This idiom introduces the totality of Joshua's commands. 'All that' is
    concise, natural, and sufficiently formal.
- source_word: צִוִּיתָנוּ
  chosen: you have commanded us
  alternatives:
  - you commanded us
  - you ordered us
  lexicon: HALOT
  rationale: צוה denotes giving a command. 'Commanded' best matches the authority
    implied. The English perfect 'have commanded' fits the immediate relevance of
    Joshua's prior instructions, though simple past would also be possible.
- source_word: נַעֲשֶׂה
  chosen: we will do
  alternatives:
  - we will carry out
  lexicon: HALOT
  rationale: עשה here means to do or carry out what was commanded. 'We will do' is
    the most direct and idiomatic rendering.
- source_word: וְאֶל כָּל אֲשֶׁר
  chosen: and wherever
  alternatives:
  - and to every place that
  - and to all that
  lexicon: HALOT
  rationale: 'Although literally ''and to all that/where,'' the phrase with שלח and
    הלך is locative in sense: any destination to which Joshua sends them. ''Wherever''
    captures the idiomatic force in natural English.'
- source_word: תִּשְׁלָחֵנוּ
  chosen: you send us
  alternatives:
  - you dispatch us
  - you commission us
  lexicon: HALOT
  rationale: שלח means to send. 'Send' is the standard gloss and fits both military
    and general movement contexts without over-specifying.
- source_word: נֵלֵךְ
  chosen: we will go
  alternatives:
  - we will go there
  lexicon: HALOT
  rationale: הלך is the common verb 'go/walk.' 'We will go' is sufficient; 'there'
    is implied by English sense and need not be added to the main text.
