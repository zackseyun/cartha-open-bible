theological_decisions:
- issue: Meaning of תּוֹרָה in covenant context
  chosen_reading: law
  alternative_readings:
  - instruction
  rationale: In Joshua 1:7 the reference is specifically to what Moses commanded,
    so the covenantal/legal sense is primary. 'Instruction' is a legitimate broader
    gloss but is less precise in this immediate context.
- issue: Meaning of תַּשְׂכִּיל
  chosen_reading: act wisely
  alternative_readings:
  - prosper
  - have success
  rationale: The Hebrew can denote wise, prudent action with the resulting idea of
    success. To avoid overstating a prosperity reading in the main text, the translation
    keeps the wisdom nuance and preserves the success alternative in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
