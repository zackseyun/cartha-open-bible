id: JOS.1.7
reference: Joshua 1:7
source:
  edition: WLC
  text: רַק֩ חֲזַ֨ק וֶֽ/אֱמַ֜ץ מְאֹ֗ד לִ/שְׁמֹ֤ר לַ/עֲשׂוֹת֙ כְּ/כָל הַ/תּוֹרָ֗ה אֲשֶׁ֤ר
    צִוְּ/ךָ֙ מֹשֶׁ֣ה עַבְדִּ֔/י אַל תָּס֥וּר מִמֶּ֖/נּוּ יָמִ֣ין וּ/שְׂמֹ֑אול לְמַ֣עַן
    תַּשְׂכִּ֔יל בְּ/כֹ֖ל אֲשֶׁ֥ר תֵּלֵֽךְ־־׃
translation:
  text: Only be strong and very courageous, being careful to do according to all the
    law that Moses my servant commanded you. Do not turn from it to the right or to
    the left, so that you may act wisely wherever you go.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you may prosper' or 'you may have success' in all you do/go.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: Only
  alternatives:
  - Just
  - Surely
  lexicon: HALOT
  rationale: 'Introduces restriction/emphasis: the one essential charge being highlighted.
    ''Only'' preserves the force better than a weaker discourse filler.'
- source_word: חֲזַק וֶאֱמַץ
  chosen: be strong and very courageous
  alternatives:
  - be strong and resolute
  - be strong and bold
  lexicon: HALOT
  rationale: The paired imperatives are a fixed exhortation in this context. 'Strong'
    for חזק and 'courageous' for אמץ best capture firmness plus bravery. 'Very' modifies
    the pair through מְאֹד.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - exceedingly
  lexicon: HALOT
  rationale: Natural modern intensifier; preserves the emphatic degree without archaic
    tone.
- source_word: לִשְׁמֹר לַעֲשׂוֹת
  chosen: being careful to do
  alternatives:
  - to keep, to do
  - to observe carefully, to do
  lexicon: HALOT
  rationale: The infinitive sequence expresses careful observance resulting in action.
    'Being careful to do' captures both guarding/observing and performing in idiomatic
    English without dropping either idea.
- source_word: כְּכָל הַתּוֹרָה
  chosen: according to all the law
  alternatives:
  - according to the whole law
  - in accordance with all the instruction
  lexicon: HALOT
  rationale: תּוֹרָה here refers specifically to the Mosaic legal instruction. 'Law'
    fits the covenantal context; 'all' preserves comprehensiveness.
- source_word: אֲשֶׁר צִוְּךָ מֹשֶׁה עַבְדִּי
  chosen: that Moses my servant commanded you
  alternatives:
  - which Moses my servant commanded you
  lexicon: HALOT
  rationale: Straightforward relative clause. 'My servant' preserves the divine designation
    of Moses.
- source_word: אַל תָּסוּר מִמֶּנּוּ יָמִין וּשְׂמֹאול
  chosen: Do not turn from it to the right or to the left
  alternatives:
  - Do not depart from it to the right or to the left
  lexicon: HALOT
  rationale: The idiom denotes deviation from the prescribed path. 'Turn from it'
    is clear modern English and retains the directional metaphor.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  lexicon: HALOT
  rationale: Marks purpose/result in accessible English.
- source_word: תַּשְׂכִּיל
  chosen: you may act wisely
  alternatives:
  - you may prosper
  - you may have success
  lexicon: HALOT
  rationale: The Hiphil of שׂכל often carries the sense of acting with insight or
    prudence, which can lead to success. Here 'act wisely' foregrounds the semantic
    core rather than importing material prosperity; the success nuance is preserved
    by footnote.
- source_word: בְּכֹל אֲשֶׁר תֵּלֵךְ
  chosen: wherever you go
  alternatives:
  - in all that you do
  - in every place you go
  lexicon: HALOT
  rationale: Literally 'in all that/where you go.' Given הלך ('go/walk'), 'wherever
    you go' is the most natural rendering, while still conveying comprehensive scope.
