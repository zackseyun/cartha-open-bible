id: JOS.1.10
reference: Joshua 1:10
source:
  edition: WLC
  text: וַ/יְצַ֣ו יְהוֹשֻׁ֔עַ אֶת שֹׁטְרֵ֥י הָ/עָ֖ם לֵ/אמֹֽר־׃
translation:
  text: Then Joshua commanded the officers of the people, saying,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְצַו
  chosen: Then ... commanded
  alternatives:
  - And ... commanded
  - gave orders to
  lexicon: HALOT
  rationale: Wayyiqtol of צוה advances the narrative; 'Then' captures the sequential
    force in natural English, while 'commanded' preserves the directive strength better
    than the softer 'gave orders to'.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Standard English transliteration of the personal name, following the
    policy to transliterate names rather than translate them.
- source_word: אֶת
  chosen: '[not separately translated]'
  rationale: Direct-object marker with no independent English equivalent; its function
    is reflected by making 'the officers of the people' the object of 'commanded'.
- source_word: שֹׁטְרֵי
  chosen: officers
  alternatives:
  - officials
  - leaders
  lexicon: HALOT
  rationale: שֹׁטֵר refers to an administrative officer or overseer rather than a
    military commander. 'Officers' best preserves the formal administrative sense
    in this context; 'leaders' is too broad, and 'officials' is possible but slightly
    less idiomatic in this collocation.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עָם here denotes the covenant community/assembled people. 'The people'
    is the most direct and idiomatic rendering in context.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: The infinitive construct formula introduces direct speech in the next
    verse. 'Saying' is the standard transparent rendering and keeps the discourse
    linkage explicit.
