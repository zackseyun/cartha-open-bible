id: HOS.12.12
reference: Hosea 12:12
source:
  edition: WLC
  text: אִם גִּלְעָ֥ד אָ֨וֶן֙ אַךְ שָׁ֣וְא הָי֔וּ בַּ/גִּלְגָּ֖ל שְׁוָרִ֣ים זִבֵּ֑חוּ גַּ֤ם מִזְבְּחוֹתָ/ם֙ כְּ/גַלִּ֔ים עַ֖ל תַּלְמֵ֥י שָׂדָֽי־־׃
translation:
  text: If Gilead is iniquity[a], they have surely become nothing; in Gilgal they sacrifice bulls; indeed[c][b], their altars are like stone heaps on the furrows of the field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Surely Gilead is wickedness'; the Hebrew particle can be read as emphatic rather than conditional.
    reason: alternative_reading
  - marker: b
    text: Or, 'they are surely worthlessness / falsehood'; the Hebrew expression is compressed and can emphasize emptiness, vanity, or falseness.
    reason: lexical_alternative
  - marker: c
    text: The image may compare their many altars to the piles of stones commonly seen along plowed field furrows.
    reason: cultural_note
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - Surely
  - Indeed
  lexicon: HALOT
  rationale: The particle can introduce a conditional or emphatic statement. Here 'If' preserves the Hebrew form and the rhetorical force of the clause without over-resolving whether it is conditional or asseverative.
- source_word: גִּלְעָד
  chosen: Gilead
  lexicon: HALOT
  rationale: Proper place name; transliterated per translation philosophy.
- source_word: אָוֶן
  chosen: wickedness
  alternatives:
  - iniquity
  - idolatry
  - trouble
  lexicon: HALOT
  rationale: אָוֶן often denotes moral evil, especially with overtones of idolatrous guilt in prophetic literature. 'Wickedness' is broad enough to preserve the moral charge without narrowing it too specifically.
- source_word: אַךְ
  chosen: surely
  alternatives:
  - only
  - indeed
  lexicon: HALOT
  rationale: Adds emphatic force to the verdict. 'Surely' communicates the asseverative nuance in natural English.
- source_word: שָׁוְא
  chosen: nothing
  alternatives:
  - vanity
  - falsehood
  - worthlessness
  lexicon: HALOT
  rationale: 'In context of prophetic denunciation, שָׁוְא conveys emptiness or worthlessness. ''Nothing'' gives a clear modern-English sense: they have become empty/void.'
- source_word: הָיוּ
  chosen: they have become
  alternatives:
  - they were
  - they became
  lexicon: HALOT
  rationale: The verb היה here links the subject to the predicate שָׁוְא. 'Have become' fits the resulting state in English and the prophetic accusation.
- source_word: בַּגִּלְגָּל
  chosen: in Gilgal
  lexicon: HALOT
  rationale: Locative phrase referring to the cultic site Gilgal.
- source_word: שְׁוָרִים
  chosen: bulls
  alternatives:
  - oxen
  lexicon: HALOT
  rationale: The noun refers to bovines used in sacrifice. 'Bulls' is the more idiomatic rendering in sacrificial context.
- source_word: זִבֵּחוּ
  chosen: they sacrifice
  alternatives:
  - they sacrificed
  lexicon: HALOT
  rationale: English present can appropriately render the prophetic description of habitual cultic action; it keeps the denunciation vivid.
- source_word: גַּם
  chosen: even
  alternatives:
  - also
  lexicon: HALOT
  rationale: Marks an additional, climactic statement about their altars.
- source_word: מִזְבְּחוֹתָם
  chosen: their altars
  lexicon: HALOT
  rationale: Straightforward rendering of the plural noun with 3mp suffix.
- source_word: כְּגַלִּים
  chosen: like stone heaps
  alternatives:
  - like heaps
  - like piles of stones
  lexicon: HALOT
  rationale: גלים refers to heaps, often of stones. 'Stone heaps' makes the image concrete and fits the agricultural comparison.
- source_word: עַל תַּלְמֵי שָׂדָי
  chosen: on the furrows of the field
  alternatives:
  - beside the furrows of the field
  - upon plowed ridges in the open country
  lexicon: HALOT
  rationale: תַּלְמִים are furrows or ridges made by plowing. 'On the furrows of the field' preserves the agricultural image and the likely sense of altars scattered as common field-stone heaps.
