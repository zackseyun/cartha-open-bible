theological_decisions:
- issue: Interpretation of the opening clause אִם גִּלְעָד אָוֶן
  chosen_reading: Rendered as a rhetorical conditional, 'If Gilead is wickedness,' preserving the Hebrew's compressed accusation.
  alternative_readings:
  - '''Surely Gilead is wickedness'''
  - '''Is Gilead iniquity?'''
  rationale: The particle אִם can function in several ways in poetic-prophetic discourse. The translation keeps the Hebrew tension rather than flattening it into a single interpretive paraphrase. The following clause supplies the verdict.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
