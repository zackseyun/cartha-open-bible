theological_decisions:
- issue: Referent and number of the pronominal suffix in יִרְדְּפוֹ
  chosen_reading: 'Rendered singular: ''will pursue him,'' treating Israel as a personified
    singular nation.'
  alternative_readings:
  - will pursue them
  rationale: The Hebrew suffix is 3ms singular, and the verse personifies Israel as
    a singular entity. Using 'him' preserves the grammar and prophetic personification
    rather than smoothing to the collective sense.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
    and §5 (consistency/documented exception).
