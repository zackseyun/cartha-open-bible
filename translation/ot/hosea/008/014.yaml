id: HOS.8.14
reference: Hosea 8:14
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֨ח יִשְׂרָאֵ֜ל אֶת עֹשֵׂ֗/הוּ וַ/יִּ֨בֶן֙ הֵֽיכָל֔וֹת וִֽ/יהוּדָ֕ה
    הִרְבָּ֖ה עָרִ֣ים בְּצֻר֑וֹת וְ/שִׁלַּחְתִּי אֵ֣שׁ בְּ/עָרָ֔י/ו וְ/אָכְלָ֖ה אַרְמְנֹתֶֽי/הָ־־׃ס
translation:
  text: For Israel has forgotten his Maker and built palaces, and Judah has multiplied
    fortified cities; so I will send fire into his cities, and it will consume her
    citadels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'temples.' The Hebrew word can refer to palaces or temple-like structures.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֵׂהוּ
  chosen: his Maker
  alternatives:
  - the one who made him
  - his creator
  lexicon: HALOT
  rationale: The participle of עשה with 3ms suffix refers to the one who made Israel.
    'Maker' is concise, idiomatic, and preserves the covenantal/theological force
    better than the more abstract 'creator' in this context.
- source_word: הֵיכָלוֹת
  chosen: palaces
  alternatives:
  - temples
  lexicon: HALOT
  rationale: היכל can denote a palace or temple. In Hosea's polemical context, either
    is possible, but 'palaces' fits the parallel with Judah's fortified cities and
    the following reference to citadels, emphasizing political-security structures
    rather than cultic buildings. The alternative is preserved in a footnote because
    the lexical range is significant.
- source_word: הִרְבָּה
  chosen: has multiplied
  alternatives:
  - has increased
  - has made many
  lexicon: HALOT
  rationale: The Hiphil of רבה here expresses causing to become many. 'Has multiplied'
    is natural English and preserves the sense of deliberate expansion.
- source_word: עָרִים בְּצֻרוֹת
  chosen: fortified cities
  alternatives:
  - fortress cities
  lexicon: HALOT
  rationale: This is the standard sense of the noun plus adjective combination and
    clearly conveys military defensiveness.
- source_word: וְשִׁלַּחְתִּי אֵשׁ
  chosen: so I will send fire
  alternatives:
  - and I will send fire
  lexicon: HALOT
  rationale: The conjunction links Judah's reliance on defenses with the announced
    judgment. 'So' makes the inferential force clear in English without over-paraphrasing.
- source_word: בְּעָרָיו
  chosen: into his cities
  alternatives:
  - upon his cities
  - against his cities
  lexicon: HALOT
  rationale: The preposition ב with 'send fire' is idiomatically rendered 'into' in
    English to express fire entering and devastating the cities. The masculine suffix
    most naturally refers to Judah, the nearest singular masculine antecedent.
- source_word: אַרְמְנֹתֶיהָ
  chosen: her citadels
  alternatives:
  - her palaces
  - her fortresses
  lexicon: HALOT
  rationale: ארמון can mean palace or fortified stronghold. Given the military context
    of fortified cities, 'citadels' best captures prominent defensive structures.
    The feminine suffix likely refers back to the collective 'cities,' hence 'her'
    is retained.
