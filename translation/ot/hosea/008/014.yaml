theological_decisions:
- issue: Referent shift in pronouns between Israel and Judah
  chosen_reading: 'The judgment clause is directed at Judah: ''his cities'' refers
    to Judah, while ''her citadels'' refers to the cities collectively.'
  alternative_readings:
  - The final clause returns to Israel as the referent throughout
  - The suffixes are stylistic and need not be differentiated in English
  rationale: The verse first indicts Israel, then Judah; the nearest antecedent for
    the masculine singular suffix in 'his cities' is Judah, while the feminine plural/collective
    sense in 'her citadels' naturally matches 'cities.' Preserving the shift reflects
    the Hebrew rather than smoothing it away.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Sense of הֵיכָלוֹת
  chosen_reading: Rendered as 'palaces' in the main text, with 'temples' preserved
    in a footnote.
  alternative_readings:
  - temples
  rationale: The Hebrew term can denote either royal or cultic structures. Because
    the context stresses human political and military self-reliance, 'palaces' is
    preferred, but the cultic possibility is important enough to preserve in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it
