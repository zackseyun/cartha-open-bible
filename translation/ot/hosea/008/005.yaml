id: HOS.8.5
reference: Hosea 8:5
source:
  edition: WLC
  text: זָנַח֙ עֶגְלֵ֣/ךְ שֹֽׁמְר֔וֹן חָרָ֥ה אַפִּ֖/י בָּ֑/ם עַד מָתַ֕י לֹ֥א יוּכְל֖וּ נִקָּיֹֽן־׃
translation:
  text: He has rejected your calf[a], O Samaria; my anger burns against them[b]. How long will they be incapable of innocence?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Your calf has rejected you, O Samaria.' The Hebrew syntax allows the calf to be read as the subject of the opening verb, though the main text takes God as the implied subject.
    reason: alternative_reading
  - marker: b
    text: '''Innocence'' may also be rendered ''purity'' or ''cleanness.'' The Hebrew term can carry both moral and cultic overtones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָנַח
  chosen: has rejected
  alternatives:
  - has cast off
  - has spurned
  lexicon: HALOT
  rationale: The verb denotes rejecting or spurning. 'Has rejected' is clear modern English and fits the prophetic denunciation. The subject is best taken as implicit and divine from context, rather than making the calf the subject ('Your calf has rejected you'), which is possible but less coherent with the following divine anger.
- source_word: עֶגְלֵךְ
  chosen: your calf
  alternatives:
  - your calf-idol
  lexicon: HALOT
  rationale: Literally 'your calf.' In context this refers to the calf image associated with Samaria's idolatry, but the base noun should be preserved in the main text rather than expanded interpretively.
- source_word: שֹׁמְרוֹן
  chosen: O Samaria
  alternatives:
  - Samaria
  lexicon: HALOT
  rationale: Samaria is directly addressed here, so the vocative force is brought out with 'O Samaria' for clarity in English.
- source_word: חָרָה אַפִּי
  chosen: my anger burns
  alternatives:
  - my anger is kindled
  - my nose burns
  lexicon: HALOT
  rationale: This idiom literally speaks of the nose/anger burning. 'My anger burns' preserves the metaphor in natural English without wooden literalism.
- source_word: בם
  chosen: against them
  alternatives:
  - at them
  - in them
  lexicon: HALOT
  rationale: 'With the anger idiom, the preposition is best rendered directionally: divine anger burns ''against them.'' The plural likely refers to the people associated with the idolatry, not merely the singular city.'
- source_word: עַד מָתַי
  chosen: How long
  alternatives:
  - Until when
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the temporal lament/question.
- source_word: לֹא יוּכְלוּ
  chosen: will they be incapable of
  alternatives:
  - are they unable to
  - can they not attain
  lexicon: HALOT
  rationale: The imperfect in this rhetorical question points to continuing inability. 'Will they be incapable of' communicates durative incapacity in readable English.
- source_word: נִקָּיוֹן
  chosen: innocence
  alternatives:
  - purity
  - cleanness
  - purification
  lexicon: HALOT
  rationale: The noun can denote cleanness or innocence. In this moral and cultic context, 'innocence' best captures the state of being free from guilt/defilement, while remaining natural English.
