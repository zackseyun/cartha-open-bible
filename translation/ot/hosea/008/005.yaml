theological_decisions:
- issue: Subject of the opening verb זָנַח
  chosen_reading: 'Implicit subject is God: ''He has rejected your calf'''
  alternative_readings:
  - 'The calf as subject: ''Your calf has rejected you, O Samaria'''
  rationale: 'The Hebrew permits either an implicit third masculine singular subject or taking ''your calf'' as the subject. The immediate context of divine speech and the following clause ''my anger burns against them'' favors God as the rejecting subject. This also coheres with prophetic denunciation of idolatry: God rejects the idol and those attached to it.'
