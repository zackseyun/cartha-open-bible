id: HOS.8.10
reference: Hosea 8:10
source:
  edition: WLC
  text: גַּ֛ם כִּֽי יִתְנ֥וּ בַ/גּוֹיִ֖ם עַתָּ֣ה אֲקַבְּצֵ֑/ם וַ/יָּחֵ֣לּוּ מְּעָ֔ט
    מִ/מַּשָּׂ֖א מֶ֥לֶךְ שָׂרִֽים־׃
translation:
  text: Even though they hire among the nations, now I will gather them; and they
    will begin to be diminished because of the burden of the king and princes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Even though they give among the nations'; the Hebrew likely carries
      the sense of paying or hiring foreign allies in context.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of 'and they will begin to diminish' is difficult; alternatives
      include 'and they will writhe a little' or 'and they will become few because
      of the burden/tribute.'
    reason: alternative_reading
  - marker: c
    text: '''The burden of the king of princes'' may refer to the oppressive tribute
      imposed by an imperial overlord.'
    reason: cultural_note
lexical_decisions:
- source_word: יִתְנוּ בַגּוֹיִם
  chosen: they hire among the nations
  alternatives:
  - they give among the nations
  - they bargain among the nations
  - they hire lovers among the nations
  lexicon: HALOT
  rationale: 'The verb נתן normally means ''give,'' but in Hosea''s context of political
    courting and payments to foreign powers (cf. 8:9), an idiomatic sense like ''hire''
    best captures the likely meaning: Israel pays or procures alliances among the
    nations. ''Among the nations'' preserves ב with the plural noun rather than making
    it overly specific.'
- source_word: עַתָּה
  chosen: now
  alternatives:
  - at this time
  lexicon: HALOT
  rationale: Straightforward temporal adverb marking imminent divine response.
- source_word: אֲקַבְּצֵם
  chosen: I will gather them
  alternatives:
  - I will collect them
  - I will assemble them
  lexicon: HALOT
  rationale: קבץ commonly means 'gather/assemble.' Here it likely refers to YHWH's
    gathering them for judgment rather than restoration, but the verb itself should
    remain neutral in English and let context supply the force.
- source_word: וַיָּחֵלּוּ
  chosen: they will begin
  alternatives:
  - they will writhe
  - they will be in pain
  - they will profane themselves
  lexicon: HALOT
  rationale: The form is difficult and has been variously understood. Many interpreters
    derive it from חלל/חול in a sense yielding 'begin' or 'start,' especially in the
    idiom 'begin to be diminished.' This gives a coherent reading with מְעָט. Because
    the clause is textually and lexically difficult, alternatives are preserved in
    a footnote.
- source_word: מְּעָט
  chosen: to diminish
  alternatives:
  - a little
  - for a little while
  - be few
  lexicon: HALOT
  rationale: Although מעט is literally 'little/few,' in this construction it likely
    expresses reduction or dwindling. Rendering the phrase idiomatically as 'begin
    to diminish' communicates the sense in natural English.
- source_word: מִמַּשָּׂא
  chosen: under the burden of
  alternatives:
  - because of the tribute of
  - from the burden of
  - from the oracle of
  lexicon: HALOT
  rationale: מַשָּׂא can mean 'burden/load' and in some contexts 'tribute' or 'exaction';
    'oracle' is not suitable here. In context of imperial domination, 'burden' captures
    the oppressive load imposed by foreign rule, while allowing the possibility of
    tribute/exaction as the concrete form.
- source_word: מֶלֶךְ שָׂרִים
  chosen: the king of princes
  alternatives:
  - the king and princes
  - the great king and princes
  - the king of officials
  lexicon: HALOT
  rationale: The construct chain is terse and difficult. A literal rendering 'king
    of princes' preserves the Hebrew form and likely points to the imperial overlord
    above lesser rulers. Alternatives that split the phrase ('king and princes') are
    interpretive and less faithful to the syntax.
