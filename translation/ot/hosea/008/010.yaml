theological_decisions:
- issue: Whether אֲקַבְּצֵם implies restorative regathering or gathering for judgment
  chosen_reading: gathering for judgment
  alternative_readings:
  - restorative regathering
  rationale: In the immediate context of Hosea 8, Israel's foreign alliances and coming
    oppression dominate; therefore 'I will gather them' is best understood as YHWH
    collecting them into the sphere of judgment, not promising restoration. The English
    keeps the verb 'gather' without importing 'for judgment' into the text itself,
    preserving lexical transparency while recognizing the contextual force.
