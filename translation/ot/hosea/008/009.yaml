theological_decisions:
- issue: Metaphorical description of foreign alliances
  chosen_reading: Retain the marital/sexual metaphor explicitly with 'hired lovers' rather than interpret it directly as political allies.
  alternative_readings:
  - Ephraim has hired allies
  - Ephraim has paid for lovers
  rationale: Hosea consistently portrays Israel's covenant unfaithfulness through adultery/prostitution imagery. Preserving 'lovers' maintains the theological force of covenant infidelity while allowing readers to infer the political dimension from the context of Assyria.
  doctrine_reference: Translation philosophy §§1, 3, 6
