id: HOS.8.9
reference: Hosea 8:9
source:
  edition: WLC
  text: כִּֽי הֵ֨מָּה֙ עָל֣וּ אַשּׁ֔וּר פֶּ֖רֶא בּוֹדֵ֣ד ל֑/וֹ אֶפְרַ֖יִם הִתְנ֥וּ אֲהָבִֽים־
translation:
  text: For they have gone up to Assyria[a], like a wild donkey wandering alone[b]; Ephraim has hired lovers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a wild donkey by itself' or 'a solitary wild donkey.'
    reason: lexical_alternative
  - marker: b
    text: '''Lovers'' preserves Hosea''s metaphor of covenant unfaithfulness; the political referent is foreign allies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason/explanation for the preceding accusation, so 'For' best preserves the causal connection in natural English.
- source_word: הֵמָּה
  chosen: they
  alternatives:
  - they themselves
  lexicon: HALOT
  rationale: The pronoun is explicit for emphasis, but English does not require repeating the emphasis overtly here; the subject is adequately conveyed by 'they'.
- source_word: עָלוּ
  chosen: have gone up
  alternatives:
  - went up
  - have gone
  lexicon: HALOT
  rationale: The verb literally means 'go up.' Retaining 'gone up' preserves the Hebrew idiom for travel to a foreign power, especially Assyria, while remaining understandable in English.
- source_word: אַשּׁוּר
  chosen: Assyria
  lexicon: HALOT
  rationale: The place/nation name is rendered by its standard English form.
- source_word: פֶּרֶא
  chosen: wild donkey
  alternatives:
  - wild ass
  lexicon: HALOT
  rationale: Refers to the untamed wild donkey. 'Wild donkey' is clear modern English and avoids archaic 'wild ass' while preserving the animal image.
- source_word: בּוֹדֵד
  chosen: wandering alone
  alternatives:
  - alone
  - solitary
  - keeping to itself
  lexicon: HALOT
  rationale: The participle conveys a state of isolation/solitariness. 'Wandering alone' brings out the image naturally in English in connection with the wild donkey metaphor, without adding a meaning foreign to the context.
- source_word: לוֹ
  chosen: alone
  alternatives:
  - by itself
  - for itself
  lexicon: HALOT
  rationale: Attached to the participle, the pronoun intensifies the image of isolation. Rendering the phrase together as 'wandering alone' communicates the sense idiomatically.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  lexicon: HALOT
  rationale: The tribal/national name is transliterated by standard English convention.
- source_word: הִתְנוּ
  chosen: has hired
  alternatives:
  - has bargained for
  - has paid for
  lexicon: HALOT
  rationale: The verb denotes hiring or securing by payment. 'Has hired' preserves the prostitution/adultery metaphor in Hosea, where political alliances are depicted as purchased illicit relationships.
- source_word: אֲהָבִים
  chosen: lovers
  alternatives:
  - love affairs
  - paramours
  - allies
  lexicon: HALOT
  rationale: Literally 'lovers.' This keeps Hosea's recurring marital/sexual metaphor explicit. 'Allies' would over-interpret the metaphor and flatten the prophetic rhetoric, though the political referent is clear from context.
