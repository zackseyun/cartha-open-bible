theological_decisions:
- issue: Force of 'know' in covenantal context
  chosen_reading: Retain the simple relational claim 'we know you' without expanding it to covenantal obedience in the main text.
  alternative_readings:
  - we acknowledge you
  - we are in covenant with you
  rationale: In Hosea, 'know' often carries covenantal and ethical weight, but the lexical sense remains 'know.' Expanding the phrase would over-interpret the claim Israel makes, especially since the verse exposes the hollowness of that claim in context.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Representation of Israel's speech
  chosen_reading: 'Use quotation marks and direct speech: ''To me they cry, “My God, we—Israel—know you!”'''
  alternative_readings:
  - 'To me they cry: ''My God, we know you, Israel.'''
  rationale: The Hebrew sequence is best understood as direct speech addressed to God, with 'Israel' functioning as emphatic self-identification by the speakers, not as a separate addressee. This preserves the rhetorical force without smoothing away the abruptness.
  doctrine_reference: Translation philosophy §§1, 6
