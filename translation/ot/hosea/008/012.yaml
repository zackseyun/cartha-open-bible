id: HOS.8.12
reference: Hosea 8:12
source:
  edition: WLC
  text: אכתוב ל֔/וֹ רבו תּֽוֹרָתִ֑/י כְּמוֹ זָ֖ר נֶחְשָֽׁבוּ־־׃
translation:
  text: Though I wrote for him the many things of my law, they were regarded as something
    foreign.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Though I would write for him myriads of my instruction/Torah, they would
      be regarded as foreign.' The Hebrew opening verb may be taken as imperfective,
      and 'my law' may also be rendered 'my instruction' or 'my Torah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אכתוב
  chosen: Though I wrote
  alternatives:
  - I would write
  - I write
  lexicon: HALOT
  rationale: The form is Qal imperfect 1cs of כתב. In context it functions well as
    a past or rhetorical imperfect referring to YHWH's provision of instruction already
    given. Rendering with concessive 'Though I wrote' fits the contrast with Israel's
    rejection in the second colon and reflects common usage in context better than
    a simple future.
- source_word: לוֹ
  chosen: for him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: The preposition ל with 3ms suffix can mean 'to' or 'for.' 'For him' better
    conveys benefactive reference to Israel/Ephraim as the corporate singular addressee,
    while preserving the singular pronoun of the Hebrew.
- source_word: רבו
  chosen: the many things
  alternatives:
  - myriads
  - ten thousand things
  - multitudes
  lexicon: HALOT
  rationale: רבב/רבו here denotes multiplicity. English 'the many things' is natural
    and avoids the potentially hyper-literal 'myriads,' while still conveying abundance.
- source_word: תורתי
  chosen: my law
  alternatives:
  - my instruction
  - my Torah
  lexicon: HALOT
  rationale: תּוֹרָה fundamentally means instruction, but in prophetic covenantal
    context 'law' remains a strong and recognizable rendering. 'My law' preserves
    the covenantal force, while 'instruction' is a viable lexical alternative worth
    preserving.
- source_word: כמו
  chosen: as something
  alternatives:
  - like
  - as
  lexicon: HALOT
  rationale: The particle introduces comparison. 'As something' smooths the English
    connection to the following adjective זר without adding content.
- source_word: זר
  chosen: foreign
  alternatives:
  - strange
  - alien
  lexicon: HALOT
  rationale: זר denotes that which is foreign, unauthorized, or strange. 'Foreign'
    best fits the sense that God's law was treated as belonging to someone else, not
    as Israel's own covenantal instruction.
- source_word: נחשבו
  chosen: were regarded
  alternatives:
  - were counted
  - were considered
  lexicon: HALOT
  rationale: The Niphal perfect 3cp of חשב here expresses passive evaluation. 'Were
    regarded' is idiomatic modern English and preserves the sense of being treated
    or reckoned in a certain way.
