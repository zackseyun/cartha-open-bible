id: HOS.8.7
reference: Hosea 8:7
source:
  edition: WLC
  text: כִּ֛י ר֥וּחַ יִזְרָ֖עוּ וְ/סוּפָ֣תָ/ה יִקְצֹ֑רוּ קָמָ֣ה אֵֽין ל֗/וֹ צֶ֚מַח
    בְּלִ֣י יַֽעֲשֶׂה קֶּ֔מַח אוּלַ֣י יַֽעֲשֶׂ֔ה זָרִ֖ים יִבְלָעֻֽ/הוּ־־׃
translation:
  text: For they sow the wind, and they will reap the whirlwind. The standing grain
    has no head; it will yield no flour. Even if it should yield, strangers will swallow
    it up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'storm' or 'tempest' for 'whirlwind.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'The standing grain has no צמח'; the noun can mean 'sprout' or 'growth,'
      but here likely refers to the grain head/ear needed to make flour.
    reason: lexical_alternative
  - marker: c
    text: Or 'Perhaps it may yield, but strangers will swallow it up.'
    reason: alternative_reading
lexical_decisions:
- source_word: ר֥וּחַ
  chosen: wind
  alternatives:
  - spirit
  - breath
  lexicon: HALOT
  rationale: In this agricultural judgment proverb, the concrete sense 'wind' fits
    the sowing/reaping imagery and the parallel with 'whirlwind.' 'Spirit' would import
    a meaning not signaled by the context.
- source_word: וְ/סוּפָ֣תָ/ה
  chosen: and ... the whirlwind
  alternatives:
  - and ... the storm
  - and ... the tempest
  lexicon: HALOT
  rationale: סוּפָה denotes a violent storm or whirlwind. 'Whirlwind' preserves the
    rhetorical intensification from sowing mere wind to reaping destructive wind,
    and matches common prophetic usage.
- source_word: יִקְצֹ֑רוּ
  chosen: they will reap
  alternatives:
  - they reap
  lexicon: HALOT
  rationale: 'The imperfect here naturally expresses future consequence in a proverbial
    judgment statement: what they sow now will be what they reap.'
- source_word: קָמָ֣ה
  chosen: standing grain
  alternatives:
  - stalk
  - standing corn
  lexicon: HALOT
  rationale: קָמָה refers to grain standing in the field. 'Standing grain' is clear
    modern English and preserves the agricultural image better than archaic 'corn.'
- source_word: צֶ֚מַח
  chosen: head
  alternatives:
  - shoot
  - growth
  - sprout
  lexicon: HALOT
  rationale: In context of grain, the point is that the stalk produces no usable ear/head.
    While the noun can mean 'sprout/growth' more generally, 'head' best conveys the
    agricultural result needed for flour production.
- source_word: בְּלִ֣י יַֽעֲשֶׂה קֶּ֔מַח
  chosen: it will yield no flour
  alternatives:
  - it produces no meal
  - without making flour
  lexicon: HALOT
  rationale: This clause explains the failed crop's uselessness. 'Yield no flour'
    is idiomatic English that preserves the causal agricultural sense of producing
    nothing fit for milling.
- source_word: אוּלַ֣י
  chosen: Even if
  alternatives:
  - perhaps
  - if perchance
  lexicon: HALOT
  rationale: 'Though often ''perhaps,'' here it introduces a concessive possibility:
    even supposing some produce appears, it will not benefit Israel. ''Even if'' communicates
    that force more naturally in English.'
- source_word: זָרִ֖ים
  chosen: strangers
  alternatives:
  - foreigners
  - aliens
  lexicon: HALOT
  rationale: The term denotes outsiders/foreigners. 'Strangers' is concise and idiomatic,
    while still conveying that others, not Israel, consume the produce.
- source_word: יִבְלָעֻֽ/הוּ
  chosen: will swallow it up
  alternatives:
  - will devour it
  - will consume it
  lexicon: HALOT
  rationale: בלע literally means 'swallow.' 'Swallow it up' preserves the vivid metaphor
    of total consumption by foreigners.
- source_word: כִּ֛י
  chosen: For
  alternatives:
  - because
  - surely
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding judgment. 'For'
    fits the prophetic argumentative flow.
