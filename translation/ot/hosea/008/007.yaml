theological_decisions:
- issue: Interpretation of the agricultural metaphor
  chosen_reading: Render the imagery directly as a proverb of judgment without allegorical
    expansion.
  alternative_readings:
  - Interpret 'wind' and 'whirlwind' more abstractly as vanity and disaster in paraphrase
  rationale: The verse itself presents a concrete sowing-and-reaping metaphor for
    Israel's actions and their consequences. The translation preserves the prophetic
    image and lets the theology of judgment emerge from the text rather than importing
    explanatory paraphrase.
  doctrine_reference: Translation philosophy §§1, 3, 6
