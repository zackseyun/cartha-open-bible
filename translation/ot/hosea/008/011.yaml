id: HOS.8.11
reference: Hosea 8:11
source:
  edition: WLC
  text: כִּֽי הִרְבָּ֥ה אֶפְרַ֛יִם מִזְבְּחֹ֖ת לַ/חֲטֹ֑א הָיוּ ל֥/וֹ מִזְבְּח֖וֹת
    לַ/חֲטֹֽא־־׃
translation:
  text: Because Ephraim has multiplied altars for sinning, they have become altars
    for sinning to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for sin offerings' in both occurrences of 'for sinning'; the Hebrew
      form can be understood in a cultic sense, but the context favors the idea that
      these altars became occasions for sin.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: Because
  alternatives:
  - For
  lexicon: HALOT
  rationale: Introduces the reason or ground for the judgment context. 'Because' is
    clearer in modern English than the more formal 'for.'
- source_word: הִרְבָּה
  chosen: has multiplied
  alternatives:
  - made many
  - increased
  lexicon: HALOT
  rationale: From רבה in the Hiphil, expressing causative increase. 'Has multiplied'
    preserves the verbal force and fits the prophetic accusation.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  rationale: Proper name retained by transliteration. In Hosea this commonly stands
    for the northern kingdom/Israel, but the text names Ephraim directly.
- source_word: מִזְבְּחֹת
  chosen: altars
  lexicon: HALOT
  rationale: Standard rendering of מזבח. The plural is important, highlighting proliferation
    of illicit worship sites.
- source_word: לַחֲטֹא
  chosen: for sinning
  alternatives:
  - to sin
  - for sin
  - for a sin offering
  lexicon: HALOT
  rationale: The infinitive construct of חטא most naturally means 'to sin'/'for sinning'
    here. Given the polemical context, the phrase indicates purpose/result in wrongdoing
    rather than 'sin offering.' 'For sinning' reads naturally while preserving the
    verbal sense.
- source_word: הָיוּ לוֹ
  chosen: they have become ... to him
  alternatives:
  - they were ... for him
  - they became ... for him
  lexicon: HALOT
  rationale: The clause states what the altars turned into for Ephraim. 'Have become'
    conveys resultant state in idiomatic English; 'to him' preserves the dative nuance
    of לוֹ rather than omitting it.
- source_word: מִזְבְּחוֹת לַחֲטֹא
  chosen: altars for sinning
  alternatives:
  - sinning altars
  - altars for sin
  - altars of sin
  lexicon: HALOT
  rationale: 'The repetition is retained to mirror the Hebrew rhetoric: the very altars
    multiplied for worship have become instruments of sin. ''Altars for sinning''
    best preserves the repeated infinitive construction.'
