theological_decisions:
- issue: Meaning of לַחֲטֹא in both occurrences
  chosen_reading: 'verbal sense: ''for sinning'' / ''to sin'''
  alternative_readings:
  - 'cultic sense: ''for sin offerings'''
  rationale: Although חטא can in some contexts relate to sin offerings, Hosea's immediate
    context condemns Ephraim's multiplied altars as occasions of transgression. Rendering
    it verbally preserves the prophetic irony without importing a sacrificial meaning
    the context does not require.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
