theological_decisions:
- issue: Nature of the denial in 'it is not God'
  chosen_reading: The clause denies that the calf has true deity.
  alternative_readings:
  - The clause could be rendered more idiomatically as 'it is no god'
  rationale: The Hebrew states a direct negation of deity for the idol. Rendering
    'it is not God' preserves the polemical force without importing later metaphysical
    categories; the sense is that this man-made object is not truly divine.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; original-language primacy over translation tradition.'
