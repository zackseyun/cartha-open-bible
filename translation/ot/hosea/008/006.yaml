id: HOS.8.6
reference: Hosea 8:6
source:
  edition: WLC
  text: כִּ֤י מִ/יִּשְׂרָאֵל֙ וְ/ה֔וּא חָרָ֣שׁ עָשָׂ֔/הוּ וְ/לֹ֥א אֱלֹהִ֖ים ה֑וּא
    כִּֽי שְׁבָבִ֣ים יִֽהְיֶ֔ה עֵ֖גֶל שֹׁמְרֽוֹן־׃
translation:
  text: For it is from Israel; a craftsman made it, and it is not God. Indeed, the
    calf of Samaria will become splinters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'it is no god.' The Hebrew directly says, 'and it is not God,' denying
      true deity to the idol.
    reason: lexical_alternative
  - marker: b
    text: Or, 'will be broken into pieces' or 'will become fragments.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces an explanatory ground for the preceding denunciation; 'For'
    fits the causal force at the start of the verse.
- source_word: מִיִּשְׂרָאֵל
  chosen: from Israel
  alternatives:
  - of Israel
  lexicon: HALOT
  rationale: 'The preposition מִן is best rendered ''from,'' stressing origin/source:
    the idol originated from Israel itself.'
- source_word: וְהוּא
  chosen: it
  alternatives:
  - and it
  - and he
  lexicon: HALOT
  rationale: The pronoun refers to the calf/idol, not a person; English naturally
    renders the resumptive pronoun simply as 'it' without preserving the conjunction
    explicitly.
- source_word: חָרָשׁ
  chosen: a craftsman
  alternatives:
  - an artisan
  - a smith
  lexicon: HALOT
  rationale: חָרָשׁ denotes a skilled maker/artisan. 'Craftsman' is broad and natural,
    avoiding over-specifying metalwork while preserving the human manufacture contrast.
- source_word: עָשָׂהוּ
  chosen: made it
  alternatives:
  - fashioned it
  lexicon: HALOT
  rationale: Straightforward rendering of עשה with object suffix; 'made it' is clear
    and idiomatic.
- source_word: וְלֹא אֱלֹהִים הוּא
  chosen: and it is not God
  alternatives:
  - and it is no god
  - but it is not God
  lexicon: HALOT
  rationale: The clause denies the idol's deity. 'Not God' preserves the singular
    predicate sense in context, referring to the calf as no true deity.
- source_word: כִּי
  chosen: Indeed
  alternatives:
  - For
  - Surely
  lexicon: HALOT
  rationale: The second כִּי intensifies/explains the coming judgment. 'Indeed' gives
    suitable emphatic force in English.
- source_word: שְׁבָבִים
  chosen: splinters
  alternatives:
  - chips
  - fragments
  - pieces
  lexicon: HALOT
  rationale: The noun denotes broken bits/shivers. 'Splinters' vividly conveys the
    idol's destruction into small broken pieces.
- source_word: יִהְיֶה
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: With a predicate noun of result, 'will become' better expresses the transformation
    into fragments.
- source_word: עֵגֶל שֹׁמְרוֹן
  chosen: the calf of Samaria
  alternatives:
  - Samaria's calf
  lexicon: HALOT
  rationale: Construct chain identifying the idol associated with Samaria, the capital
    of the northern kingdom. 'The calf of Samaria' is transparent and formal enough.
