theological_decisions:
- issue: Sense of divine non-involvement in Israel's political acts
  chosen_reading: The verse states that Israel established rulers without God's authorization or acknowledgment.
  alternative_readings:
  - The verse means only that God was uninformed in a narrative sense
  - The verse specifically condemns only certain dynastic changes, not the broader pattern
  rationale: The parallel clauses and prophetic context indicate covenantal disapproval, not literal ignorance. The translation preserves the Hebrew wording ('not from me,' 'I did not know it') without importing a stronger paraphrase like 'I did not approve,' while the documented rationale clarifies the implied sense.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: Referent of the singular verb יִכָּרֵת
  chosen_reading: Rendered as a collective plural result referring to the people who made the idols.
  alternative_readings:
  - Refers to Israel/Samaria as a singular collective
  - Refers to each idol being cut off/destroyed
  rationale: The Hebrew singular is ambiguous. In English, a literal singular 'that it/he may be cut off' would be unclear without supplying an antecedent not present in the verse. A collective plural best communicates the likely sense in context, while preserving the singular ambiguity in a footnote.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
