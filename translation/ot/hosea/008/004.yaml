id: HOS.8.4
reference: Hosea 8:4
source:
  edition: WLC
  text: הֵ֤ם הִמְלִיכוּ֙ וְ/לֹ֣א מִמֶּ֔/נִּי הֵשִׂ֖ירוּ וְ/לֹ֣א יָדָ֑עְתִּי כַּסְפָּ֣/ם וּ/זְהָבָ֗/ם עָשׂ֤וּ לָ/הֶם֙ עֲצַבִּ֔ים לְמַ֖עַן יִכָּרֵֽת׃
translation:
  text: They made kings[a], but not by me; they appointed princes, but I did not know it. With their silver and their gold they made idols for themselves[b], so that they might be cut off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''that he/it may be cut off,'' with a singular verb; the referent may be Israel/Samaria as a collective, or possibly the idol.'
    reason: alternative_reading
  - marker: b
    text: Or 'set up officials' for 'appointed princes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִמְלִיכוּ
  chosen: made kings
  alternatives:
  - set up kings
  - installed kings
  - appointed kings
  lexicon: HALOT
  rationale: Hiphil of מלך means to cause to reign or make someone king. 'Made kings' is concise and preserves the causative force better than the more interpretive 'set up,' while remaining natural English.
- source_word: מִמֶּנִּי
  chosen: from me
  alternatives:
  - by me
  - without me
  lexicon: HALOT
  rationale: The preposition מן with 1cs suffix is literally 'from me.' In context it conveys source/authorization. 'From me' keeps the Hebrew wording; the adversative 'but not from me' communicates lack of divine authorization without over-paraphrasing.
- source_word: הֵשִׂירוּ
  chosen: appointed princes
  alternatives:
  - removed
  - set up officials
  - installed princes
  lexicon: HALOT
  rationale: From שׂור/שׂיר in the Hiphil, here commonly understood in context as appointing rulers/officials rather than removing them. Given the parallel with 'made kings,' 'appointed princes' best fits the political context of unauthorized leadership.
- source_word: יָדָעְתִּי
  chosen: I did not know it
  alternatives:
  - I did not acknowledge it
  - I did not approve
  - I knew nothing of it
  lexicon: HALOT
  rationale: ידע can denote knowledge, recognition, or acknowledgment. In prophetic covenantal context the sense likely includes disapproval/non-recognition, but 'I did not know it' preserves the Hebrew expression and lets the theological force stand without interpretive expansion.
- source_word: כַּסְפָּם וּזְהָבָם
  chosen: with their silver and their gold
  alternatives:
  - from their silver and gold
  - using their silver and gold
  lexicon: HALOT
  rationale: The Hebrew presents the materials prominently. English idiom requires a preposition; 'with' naturally expresses instrument/material and preserves the concrete image.
- source_word: עֲצַבִּים
  chosen: idols
  alternatives:
  - images
  - carved idols
  lexicon: HALOT
  rationale: The noun commonly refers to idols/images, often with pejorative force in prophetic literature. 'Idols' captures both the referent and the negative theological valence better than the more neutral 'images.'
- source_word: לְמַעַן יִכָּרֵת
  chosen: so that they might be cut off
  alternatives:
  - that it may be cut off
  - to their destruction
  - so that he may be cut off
  lexicon: HALOT
  rationale: למען marks purpose/result. Niphal יכרת is 3ms singular, but the subject is not explicit and may be understood collectively or with Israel/Samaria in view. Rendering 'they might be cut off' communicates the likely collective result of their idolatry in idiomatic English while preserving the judgment motif; the singular alternative is preserved in a footnote due to the ambiguity.
