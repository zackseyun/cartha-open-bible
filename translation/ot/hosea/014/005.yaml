id: HOS.14.5
reference: Hosea 14:5
source:
  edition: WLC
  text: אֶרְפָּא֙ מְשׁ֣וּבָתָ֔/ם אֹהֲבֵ֖/ם נְדָבָ֑ה כִּ֛י שָׁ֥ב אַפִּ֖/י מִמֶּֽ/נּוּ׃
translation:
  text: I will heal their apostasy; I will love them freely, for my anger has turned
    away from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'from him'; some translations smooth the number shift to 'from them.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֶרְפָּא
  chosen: I will heal
  alternatives:
  - I will cure
  - I will restore
  lexicon: HALOT
  rationale: רפא in the Qal commonly means 'heal' or 'cure.' 'Heal' is natural modern
    English and preserves the metaphor of spiritual/moral restoration without over-paraphrasing.
- source_word: מְשׁוּבָתָם
  chosen: their apostasy
  alternatives:
  - their backsliding
  - their turning away
  lexicon: HALOT
  rationale: מְשׁוּבָה denotes turning away, defection, or apostasy. 'Apostasy' best
    captures covenantal rebellion in Hosea, while 'backsliding' is traditional but
    less transparent to modern readers. The 3mp suffix requires 'their.'
- source_word: אֹהֲבֵם
  chosen: I will love them
  alternatives:
  - I will show love to them
  lexicon: HALOT
  rationale: 'From אהב, straightforwardly ''love.'' The suffix is 3mp, so the direct
    object is plural: ''them.'''
- source_word: נְדָבָה
  chosen: freely
  alternatives:
  - voluntarily
  - as a free gift
  - generously
  lexicon: HALOT
  rationale: נְדָבָה literally refers to a freewill offering or voluntariness. Adverbial
    'freely' best fits the English clause 'I will love them freely,' conveying uncoerced,
    gracious love.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the ground for the preceding promise. 'For' is concise
    and natural.
- source_word: שָׁב
  chosen: has turned away
  alternatives:
  - has turned back
  - has withdrawn
  lexicon: HALOT
  rationale: שׁוּב in this context describes the reversal or withdrawal of divine
    anger. 'Has turned away' communicates the idiom clearly in English.
- source_word: אַפִּי
  chosen: my anger
  alternatives:
  - my wrath
  - my nose
  lexicon: HALOT
  rationale: אַף literally means 'nose' and idiomatically 'anger.' 'My anger' is the
    clear idiomatic sense here; 'wrath' is possible but somewhat weightier than necessary.
- source_word: מִמֶּנּוּ
  chosen: from him
  alternatives:
  - from them
  - from it
  lexicon: HALOT
  rationale: The consonantal form points to a 3ms pronominal suffix, yielding 'from
    him.' This creates a number shift after the earlier plurals, which should be preserved
    rather than harmonized away in the main text.
