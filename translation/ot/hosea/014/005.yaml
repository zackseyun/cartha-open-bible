theological_decisions:
- issue: Number shift in the final pronoun
  chosen_reading: Preserve the Hebrew singular in 'from him'
  alternative_readings:
  - from them
  rationale: The Hebrew text shifts from plural objects ('their,' 'them') to singular
    מִמֶּנּוּ ('from him'). Some translations smooth this to 'from them' for English
    consistency, but optimal equivalence and original-language primacy favor retaining
    the singular and noting the alternative. This preserves the textual tension rather
    than resolving it.
  doctrine_reference: Translation philosophy §§1, 3, 5
