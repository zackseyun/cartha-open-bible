id: HOS.14.8
reference: Hosea 14:8
source:
  edition: WLC
  text: יָשֻׁ֨בוּ֙ יֹשְׁבֵ֣י בְ/צִלּ֔/וֹ יְחַיּ֥וּ דָגָ֖ן וְ/יִפְרְח֣וּ כַ/גָּ֑פֶן זִכְר֖/וֹ כְּ/יֵ֥ין לְבָנֽוֹן׃ס
translation:
  text: Those who dwell in his shade will return[a]; they will revive like grain and blossom like the vine[b]; his renown will be like the wine of Lebanon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will grow grain' / 'they will be revived with grain.' The Hebrew phrase is compressed and may evoke grain springing to life or abundant grain production.
    reason: lexical_alternative
  - marker: b
    text: '''His renown'' may also be rendered ''his remembrance'' or, less likely in context, ''its renown.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשֻׁבוּ
  chosen: will return
  alternatives:
  - will turn back
  - will dwell again
  lexicon: HALOT
  rationale: Qal imperfect of שוב normally means 'return/turn back.' Here it most naturally predicates restoration for the people sheltered by him. Some take it with the following participle in the sense 'they will return and dwell,' but the syntax works well as 'those who dwell in his shade will return.'
- source_word: יֹשְׁבֵי בְצִלּוֹ
  chosen: Those who dwell in his shade
  alternatives:
  - Those who sit in his shadow
  - His settlers in his shade
  lexicon: HALOT
  rationale: The participle יֹשְׁבֵי functions substantivally, 'those dwelling.' צֵל with pronominal suffix is idiomatically 'shade/shadow,' conveying protection and blessing. 'Shade' is more natural English here than 'shadow' while preserving the metaphor.
- source_word: יְחַיּוּ דָגָן
  chosen: they will revive like grain
  alternatives:
  - they will grow grain
  - they will make grain live
  - they will be revived with grain
  lexicon: HALOT
  rationale: Piel of חיה means 'make live, revive.' With דָגָן the phrase is compressed and somewhat poetic. In context of agricultural flourishing paired with 'blossom like the vine,' the sense is best captured as renewed vitality comparable to grain springing to life. The comparative 'like' is supplied in English for clarity from the parallelism.
- source_word: וְיִפְרְחוּ כַגָּפֶן
  chosen: and blossom like the vine
  alternatives:
  - and flourish like a vine
  - and bud like the vine
  lexicon: HALOT
  rationale: פרח commonly denotes blossoming/flourishing. Because the simile explicitly uses כַגָּפֶן, 'blossom like the vine' preserves the agricultural imagery and parallelism with grain.
- source_word: זִכְרוֹ
  chosen: his renown
  alternatives:
  - his remembrance
  - its renown
  - his memorial
  lexicon: HALOT
  rationale: זֵכֶר/זִכְר can denote remembrance, memory, or renown. In this context, compared to the celebrated wine of Lebanon, 'renown' best conveys reputation that spreads pleasantly. The 3ms suffix is retained as 'his,' likely referring back to Israel/Ephraim personified or to the restored people collectively represented as singular.
- source_word: כְּיֵין לְבָנוֹן
  chosen: like the wine of Lebanon
  alternatives:
  - like Lebanon's wine
  lexicon: HALOT
  rationale: A straightforward simile. 'The wine of Lebanon' is idiomatic and preserves the regional association with prized fragrance/quality.
