theological_decisions:
- issue: Referent of the 3ms suffixes in 'his shade' and 'his renown'
  chosen_reading: Rendered with masculine singular pronouns ('his') without resolving beyond the Hebrew, allowing the personified referent in context to stand.
  alternative_readings:
  - the referent is Israel personified
  - the referent is Ephraim from the following verse in English versification
  - the referent is the restored covenant people collectively
  rationale: The Hebrew uses singular suffixes, and the immediate literary context personifies Israel in restoration imagery. English 'his' preserves the grammatical form and theological-poetic tension rather than flattening it into 'their.'
  doctrine_reference: Preserve theological tension rather than resolve it.
