theological_decisions:
- issue: Referent of the third-person singular suffixes
  chosen_reading: Render the suffixes as 'its,' referring to restored Israel/Ephraim
    under the plant metaphor.
  alternative_readings:
  - Render as 'his,' preserving grammatical gender more mechanically
  rationale: The Hebrew suffixes are grammatically masculine singular, but the referent
    is the restored people portrayed as a flourishing plant/tree. English idiom favors
    'its' for a collective/entity in an extended botanical metaphor. This preserves
    the imagery without implying a male individual.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §5 (documented
    exception/choice)
