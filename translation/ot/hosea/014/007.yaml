id: HOS.14.7
reference: Hosea 14:7
source:
  edition: WLC
  text: יֵֽלְכוּ֙ יֹֽנְקוֹתָ֔י/ו וִ/יהִ֥י כַ/זַּ֖יִת הוֹד֑/וֹ וְ/רֵ֥יחַֽ ל֖/וֹ כַּ/לְּבָנֽוֹן׃
translation:
  text: Its shoots will spread out, and its splendor will be like the olive tree,
    and its fragrance like Lebanon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Its branches will go out' or 'Its tender shoots will spread.' The Hebrew
      verb is literally 'go,' used here in the sense of extending outward.
    reason: lexical_alternative
  - marker: b
    text: Or 'its beauty' or 'its majesty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵלְכוּ
  chosen: will spread out
  alternatives:
  - will go
  - will extend
  - will grow
  lexicon: HALOT
  rationale: Although the verb is literally 'go/walk,' with plant imagery and the
    subject 'shoots' the idiomatic sense is extension or spreading. 'Will spread out'
    communicates the botanical image in natural English without over-paraphrase.
- source_word: יֹנְקוֹתָיו
  chosen: its shoots
  alternatives:
  - its suckers
  - its branches
  - its tender shoots
  lexicon: HALOT
  rationale: The noun denotes shoots/sprouts drawing nourishment. 'Shoots' is clear
    modern English and fits the agricultural metaphor better than the more literal
    but awkward 'suckers.'
- source_word: וִיהִי
  chosen: and ... will be
  alternatives:
  - and let ... be
  - and it shall become
  lexicon: HALOT
  rationale: Here the jussive-like form continues the future description of restoration.
    In English, simple future best matches the prophetic sequence.
- source_word: כַזַּיִת
  chosen: like the olive tree
  alternatives:
  - like an olive tree
  - like the olive
  lexicon: HALOT
  rationale: The olive is a stock image of beauty, fruitfulness, and durability. 'The
    olive tree' is the most natural English expression for the comparison.
- source_word: הוֹדוֹ
  chosen: its splendor
  alternatives:
  - its majesty
  - its beauty
  - its glory
  lexicon: HALOT
  rationale: The term can denote majesty, beauty, or splendor. 'Splendor' preserves
    the elevated tone and suits the visual comparison to the olive tree. 'Glory' is
    possible but can sound overly theological here where the image is aesthetic and
    flourishing.
- source_word: וְרֵיחַ לוֹ
  chosen: and its fragrance
  alternatives:
  - and its scent
  - and its aroma
  lexicon: HALOT
  rationale: 'The phrase literally means ''and fragrance to it/him.'' In context the
    pronominal suffix refers to restored Israel as a flourishing plant. English naturally
    expresses this as possession: ''its fragrance.'' ''Fragrance'' is preferable to
    ''scent'' for the positive poetic sense.'
- source_word: כַלְּבָנוֹן
  chosen: like Lebanon
  alternatives:
  - like the Lebanon
  lexicon: HALOT
  rationale: Lebanon evokes the famed aroma of its forests and vegetation. The proper
    name should be transliterated, and the simile retained directly.
