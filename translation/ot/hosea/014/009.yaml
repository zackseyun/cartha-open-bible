id: HOS.14.9
reference: Hosea 14:9
source:
  edition: WLC
  text: אֶפְרַ֕יִם מַה לִּ֥/י ע֖וֹד לָֽ/עֲצַבִּ֑ים אֲנִ֧י עָנִ֣יתִי וַ/אֲשׁוּרֶ֗/נּוּ
    אֲנִי֙ כִּ/בְר֣וֹשׁ רַֽעֲנָ֔ן מִמֶּ֖/נִּי פֶּרְיְ/ךָ֥ נִמְצָֽא־׃
translation:
  text: Ephraim—what have I to do anymore with idols? I have answered him and will
    look after him. I am like a flourishing cypress; from me your fruit is found.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Ephraim says, "What have I to do anymore with idols?"' The Hebrew can
      be read as Ephraim's confession before the LORD's reply.
    reason: alternative_reading
  - marker: b
    text: Or, 'I look on him' or 'I care for him.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'from me your fruit comes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה לִּי עוֹד לָעֲצַבִּים
  chosen: what have I to do anymore with idols?
  alternatives:
  - What more have I to do with idols?
  - O Ephraim, what have I to do with idols anymore?
  lexicon: HALOT
  rationale: The idiom מַה לִּי expresses disengagement or disavowal ('what have I
    to do with...?'). עוֹד adds 'anymore/still.' עֲצַבִּים refers to idols/images.
    The clause is syntactically difficult in context because some construe it as Ephraim
    speaking rather than God; the chosen English preserves the Hebrew wording while
    allowing the following first-person divine speech to continue.
- source_word: עָנִיתִי
  chosen: I have answered
  alternatives:
  - I answer
  - I responded
  lexicon: HALOT
  rationale: From ענה in the sense 'answer/respond,' not 'afflict' in this stem/context.
    The perfect is rendered as present-resultative English ('have answered') to fit
    the sequence of divine response.
- source_word: וַאֲשׁוּרֶנּוּ
  chosen: and will watch over him
  alternatives:
  - and I will look on him
  - and I regard him
  - and I care for him
  lexicon: HALOT
  rationale: From שׁור/אשׁור in the sense 'look at, regard, watch.' The object suffix
    is 3ms ('him'), naturally referring to Ephraim. English 'watch over' captures
    attentive care better than a bare 'look at' in this context, without over-paraphrasing.
- source_word: כִּבְרוֹשׁ רַעֲנָן
  chosen: like a flourishing cypress
  alternatives:
  - like a green cypress
  - like a luxuriant fir/cypress
  lexicon: HALOT
  rationale: בְּרוֹשׁ is traditionally identified as cypress/fir/juniper; 'cypress'
    is a common modern rendering. רַעֲנָן denotes freshness, luxuriance, flourishing
    vitality. 'Flourishing cypress' is natural English and preserves the simile.
- source_word: מִמֶּנִּי פֶּרְיְךָ נִמְצָא
  chosen: from me your fruit is found
  alternatives:
  - your fruit comes from me
  - from me your fruit is obtained
  lexicon: HALOT
  rationale: The Niphal of מצא literally means 'is found.' Retaining 'is found' preserves
    the Hebrew's formal texture and theological emphasis that Ephraim's fruit has
    its source in God. A smoother dynamic alternative is preserved in a footnote-worthy
    alternative list.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  rationale: Proper name transliterated per translation philosophy. Here it stands
    for the northern kingdom/personified people.
- source_word: עֲצַבִּים
  chosen: idols
  alternatives:
  - images
  lexicon: HALOT
  rationale: In prophetic usage the term denotes idols, often with pejorative force.
    'Idols' is the clearest modern equivalent.
