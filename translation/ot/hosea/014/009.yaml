theological_decisions:
- issue: Speaker identification in the opening clause
  chosen_reading: The opening clause is rendered as part of the LORD's speech concerning
    Ephraim, while preserving the Hebrew ambiguity in a footnote.
  alternative_readings:
  - 'The clause is Ephraim''s confession: ''Ephraim [says], What have I to do anymore
    with idols?'''
  rationale: The Hebrew lacks an explicit speech marker, and interpreters divide over
    whether Ephraim or God speaks the first clause. Because the surrounding first-person
    verbs ('I have answered... I am like... from me...') strongly support divine speech
    in the immediate context, the main text keeps the line integrated with that speech,
    but the alternative is preserved in a footnote to maintain the interpretive tension.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
