theological_decisions:
- issue: Personification of Samaria and pronoun choice
  chosen_reading: Render Samaria as a personified feminine city with 'her' in the first sentence, then shift to plural victims in the judgment details.
  alternative_readings:
  - Keep all references singularly tied to Samaria
  - Flatten personification and remove gendered pronouns
  rationale: The Hebrew presents Samaria as a feminine entity bearing guilt, while the subsequent plural verbs and plural possessive with 'little children' naturally describe the inhabitants' fate. This preserves the literary personification without obscuring the referents of the atrocities.
  doctrine_reference: Translation philosophy §§3, 4, 6
- issue: Graphic violence in judgment oracle
  chosen_reading: Retain the explicit violence in the main text without euphemism.
  alternative_readings:
  - Soften the imagery for readability
  rationale: The Hebrew is intentionally brutal, and optimal equivalence requires preserving the gravity of the announced judgment rather than muting it.
  doctrine_reference: Translation philosophy §§1, 6
