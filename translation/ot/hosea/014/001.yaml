id: HOS.14.1
reference: Hosea 14:1
source:
  edition: WLC
  text: תֶּאְשַׁם֙ שֹֽׁמְר֔וֹן כִּ֥י מָרְתָ֖ה בֵּֽ/אלֹהֶ֑י/הָ בַּ/חֶ֣רֶב יִפֹּ֔לוּ עֹלְלֵי/הֶ֣ם יְרֻטָּ֔שׁוּ וְ/הָרִיּוֹתָ֖י/ו יְבֻקָּֽעוּ׃פ
translation:
  text: Samaria shall bear her guilt[a], because she has rebelled against her God. They shall fall by the sword; their little children shall be dashed to pieces[b], and their pregnant women ripped open.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Samaria shall be held guilty' or 'Samaria shall suffer for her guilt.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their infants shall be dashed in pieces.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֶּאְשַׁם
  chosen: shall bear her guilt
  alternatives:
  - shall become guilty
  - shall be held guilty
  - shall suffer punishment
  lexicon: HALOT
  rationale: The verb from אשם can denote incurring guilt or bearing guilt/liability. In context of announced judgment on Samaria, 'shall bear her guilt' preserves both culpability and consequence better than the flatter 'be guilty' or the more interpretive 'be punished.'
- source_word: שֹׁמְרוֹן
  chosen: Samaria
  alternatives:
  - Shomron
  lexicon: HALOT
  rationale: Standard English transliteration for the city/region name; here personified as feminine, which is reflected by 'her' in English.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: 'Causal sense is clear: the following clause gives the reason for Samaria''s guilt/judgment.'
- source_word: מָרְתָה
  chosen: has rebelled
  alternatives:
  - has been rebellious
  - has defied
  lexicon: HALOT
  rationale: מרה commonly conveys rebellion or defiance against authority, especially against God. 'Has rebelled' is idiomatic and direct.
- source_word: בֵּאלֹהֶיהָ
  chosen: against her God
  alternatives:
  - against God
  - against her gods
  lexicon: HALOT
  rationale: With מרה, the preposition marks the object of rebellion. The singular with 3fs suffix is best rendered 'her God,' matching the covenantal accusation against Samaria/Israel.
- source_word: בַּחֶרֶב
  chosen: by the sword
  alternatives:
  - with the sword
  lexicon: HALOT
  rationale: Standard idiom for death in warfare or slaughter; 'by the sword' is natural and preserves the instrumental sense.
- source_word: יִפֹּלוּ
  chosen: shall fall
  alternatives:
  - will fall
  - shall be slain
  lexicon: HALOT
  rationale: The simple verb 'fall' is the Hebrew wording and in martial context implies death without overtranslating.
- source_word: עֹלְלֵיהֶם
  chosen: their little children
  alternatives:
  - their infants
  - their children
  lexicon: HALOT
  rationale: עולל refers to very young children. 'Little children' is accessible and broad enough to cover the term without narrowing too specifically to newborns.
- source_word: יְרֻטָּשׁוּ
  chosen: shall be dashed to pieces
  alternatives:
  - shall be dashed in pieces
  - shall be smashed
  lexicon: HALOT
  rationale: The passive violent sense should be retained plainly. 'Dashed to pieces' is idiomatic modern English and reflects the brutality of the judgment oracle.
- source_word: וְהָרִיּוֹתָיו
  chosen: their pregnant women
  alternatives:
  - his pregnant women
  - their expectant mothers
  lexicon: HALOT
  rationale: Although the suffix is morphologically singular in the form given, the sense in context is collective with the preceding plural victims from Samaria's population. 'Their pregnant women' fits the discourse and avoids an awkward shift to singular possession.
- source_word: יְבֻקָּעוּ
  chosen: ripped open
  alternatives:
  - split open
  - cut open
  lexicon: HALOT
  rationale: The passive of בקע here describes disembowelment of pregnant women in war. 'Ripped open' is stark but accurate and readable, avoiding euphemism.
