theological_decisions:
- issue: Referent and gender of the singular verbs/pronouns for Israel
  chosen_reading: 'Render Israel as a singular collective with masculine singular
    verbs/pronoun: ''he will blossom ... his roots.'''
  alternative_readings:
  - 'Render with neuter singular: ''it will blossom ... its roots'''
  - 'Render with plural for sense: ''they will blossom ... their roots'''
  rationale: The Hebrew uses singular masculine verbal and pronominal forms for Israel
    as a collective entity. Following the project's gender-accurate principle, the
    translation preserves the singular personal imagery rather than neutralizing it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Image of Lebanon
  chosen_reading: Keep the comparison as 'like Lebanon' without specifying cedars.
  alternative_readings:
  - Interpret explicitly as 'like the cedars of Lebanon'
  rationale: The Hebrew names Lebanon itself, not its cedars. While the association
    with cedars informs interpretation, the translation should preserve the text's
    own wording and imagery rather than resolving it interpretively.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
