id: HOS.14.6
reference: Hosea 14:6
source:
  edition: WLC
  text: אֶהְיֶ֤ה כַ/טַּל֙ לְ/יִשְׂרָאֵ֔ל יִפְרַ֖ח כַּ/שּֽׁוֹשַׁנָּ֑ה וְ/יַ֥ךְ שָׁרָשָׁ֖י/ו כַּ/לְּבָנֽוֹן׃
translation:
  text: I will be like the dew to Israel[a]; he will blossom like the lily[b], and he will strike his roots like Lebanon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it will blossom like a lily, and it will strike its roots like Lebanon.' The Hebrew presents Israel as a singular collective.
    reason: lexical_alternative
  - marker: b
    text: Lebanon evokes firmness and grandeur, likely through its famed deep-rooted trees; the Hebrew does not explicitly say 'cedars.'
    reason: cultural_note
lexical_decisions:
- source_word: אֶהְיֶה
  chosen: I will be
  alternatives:
  - I am
  lexicon: HALOT
  rationale: 'Qal imperfect 1cs of היה here is naturally future in this promise context: YHWH declares what he will be for Israel.'
- source_word: כַטַּל
  chosen: like the dew
  alternatives:
  - as dew
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Dew' preserves the agricultural image of life-giving moisture.
- source_word: לְיִשְׂרָאֵל
  chosen: to Israel
  alternatives:
  - for Israel
  lexicon: HALOT
  rationale: The ל preposition can be rendered 'to' or 'for.' 'To Israel' fits the simile smoothly in English while preserving the direction of benefit.
- source_word: יִפְרַח
  chosen: he will blossom
  alternatives:
  - it will blossom
  - he will flourish
  lexicon: HALOT
  rationale: The 3ms verb agrees with Israel conceived as a singular collective. 'Blossom' matches the following floral simile better than the broader 'flourish.'
- source_word: כַשּׁוֹשַׁנָּה
  chosen: like the lily
  alternatives:
  - like a lily
  lexicon: HALOT
  rationale: שׁוֹשַׁנָּה is conventionally 'lily' (sometimes a broader lily/lotus-type flower). 'The lily' reflects the Hebrew article and keeps the poetic image.
- source_word: וְיַךְ
  chosen: he will strike
  alternatives:
  - he will take
  - he will set down
  - he will send out
  lexicon: HALOT
  rationale: Hiphil of נכה in this idiom conveys causing roots to go down or strike. 'Strike' is idiomatic in English for roots taking firm hold.
- source_word: שָׁרָשָׁיו
  chosen: his roots
  alternatives:
  - its roots
  lexicon: HALOT
  rationale: The suffix is 3ms, matching the collective singular representation of Israel. 'His' preserves the grammatical gender-accurate singular rather than flattening to plural.
- source_word: כַלְּבָנוֹן
  chosen: like Lebanon
  alternatives:
  - like the Lebanon
  - like the cedars of Lebanon
  lexicon: HALOT
  rationale: The text says simply 'like Lebanon,' likely invoking the region's famed deep-rooted trees and grandeur without specifying cedars. The translation should not import 'cedars' into the main text.
