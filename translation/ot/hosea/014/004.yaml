theological_decisions:
- issue: Whether to make the final clause explicitly causal
  chosen_reading: 'Rendered as a separate sentence: ''In you the fatherless finds
    mercy.'''
  alternative_readings:
  - '''For in you the fatherless finds mercy'''
  - '''because in you the fatherless is shown mercy'''
  rationale: The Hebrew relative construction can function explanatorily. The chosen
    rendering preserves the sense without over-specifying the connective, maintaining
    the poetic force and theological emphasis that mercy is found in God alone.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
- issue: Whether 'the fatherless' refers only to literal orphans or metaphorically
    to repentant Israel
  chosen_reading: Kept the concrete term 'the fatherless' without interpretive expansion.
  alternative_readings:
  - '''the orphan'''
  - '''we who are fatherless'''
  rationale: The verse likely evokes both literal vulnerable persons and Israel's
    helpless condition before God, but the Hebrew text itself states only 'the fatherless.'
    The translation preserves that theological openness rather than narrowing it.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
