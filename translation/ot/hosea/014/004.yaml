id: HOS.14.4
reference: Hosea 14:4
source:
  edition: WLC
  text: אַשּׁ֣וּר לֹ֣א יוֹשִׁיעֵ֗/נוּ עַל סוּס֙ לֹ֣א נִרְכָּ֔ב וְ/לֹא נֹ֥אמַר ע֛וֹד
    אֱלֹהֵ֖י/נוּ לְ/מַעֲשֵׂ֣ה יָדֵ֑י/נוּ אֲשֶׁר בְּ/ךָ֖ יְרֻחַ֥ם יָתֽוֹם׀־־־׃
translation:
  text: Assyria will not save us; we will not ride on horses, and we will no longer
    say, ‘Our God,’ to the work of our hands. In you the fatherless finds mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the orphan.' The Hebrew term literally denotes one without a father
      and often refers more broadly to the vulnerable.
    reason: lexical_alternative
  - marker: b
    text: 'The final clause may also be understood causally: ''For in you the fatherless
      finds mercy.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אַשּׁוּר
  chosen: Assyria
  alternatives:
  - Asshur
  lexicon: HALOT
  rationale: Proper national name; standard English transliteration is 'Assyria.'
    The line rejects reliance on foreign imperial power.
- source_word: יוֹשִׁיעֵנוּ
  chosen: will not save us
  alternatives:
  - will not deliver us
  - cannot save us
  lexicon: HALOT
  rationale: Hiphil of ישׁע commonly means 'save/deliver.' 'Save us' is the most natural
    English and preserves the theological resonance of misplaced trust in political
    salvation.
- source_word: עַל סוּס לֹא נִרְכָּב
  chosen: we will not ride on horses
  alternatives:
  - we will not mount horses
  - we will not ride a horse
  lexicon: HALOT
  rationale: The idiom expresses renunciation of military self-reliance. Plural 'horses'
    is idiomatic in English for cavalry/military power and matches the collective
    sense of סוּס here.
- source_word: וְלֹא נֹאמַר עוֹד
  chosen: and we will no longer say
  alternatives:
  - and we will not say again
  - nor will we say anymore
  lexicon: HALOT
  rationale: עוֹד marks cessation from this point onward; 'no longer' is the clearest
    modern English equivalent.
- source_word: אֱלֹהֵינוּ
  chosen: Our God
  alternatives:
  - our gods
  lexicon: HALOT
  rationale: Though אלהים can be morphologically plural, with 1cp suffix and in this
    context of idol address it functions as the singular title 'our God.' Capitalization
    reflects direct address to a supposed deity/idol in quotation.
- source_word: לְמַעֲשֵׂה יָדֵינוּ
  chosen: to the work of our hands
  alternatives:
  - to what our hands have made
  - to the work of our own hands
  lexicon: HALOT
  rationale: A standard Hebrew expression for idols. Singular 'work' with collective
    force is retained to stay close to the Hebrew while remaining natural.
- source_word: אֲשֶׁר בְּךָ
  chosen: In you
  alternatives:
  - For in you
  - because in you
  lexicon: HALOT
  rationale: The relative particle introduces the ground for repentance. Rendering
    as a new sentence with 'In you' is concise and natural, while preserving the sense
    that what follows explains why idols are renounced.
- source_word: יְרֻחַם
  chosen: finds mercy
  alternatives:
  - is shown mercy
  - receives compassion
  - obtains mercy
  lexicon: HALOT
  rationale: Pual of רחם denotes receiving compassion/mercy. 'Finds mercy' is idiomatic
    English that preserves the passive sense without awkwardness. It also fits the
    confessional tone of the verse.
- source_word: יָתוֹם
  chosen: the fatherless
  alternatives:
  - the orphan
  lexicon: HALOT
  rationale: '''Fatherless'' is the more literal and biblically resonant rendering
    of יתום, while ''orphan'' is a valid alternative. The term often denotes the vulnerable
    one lacking paternal protection, which suits the metaphor of Israel''s helplessness.'
