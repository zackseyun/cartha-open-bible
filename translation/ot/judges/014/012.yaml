id: JDG.14.12
reference: Judges 14:12
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר לָ/הֶם֙ שִׁמְשׁ֔וֹן אָחֽוּדָה נָּ֥א לָ/כֶ֖ם חִידָ֑ה אִם הַגֵּ֣ד תַּגִּידוּ֩ אוֹתָ֨/הּ לִ֜/י שִׁבְעַ֨ת יְמֵ֤י הַ/מִּשְׁתֶּה֙ וּ/מְצָאתֶ֔ם וְ/נָתַתִּ֤י לָ/כֶם֙ שְׁלֹשִׁ֣ים סְדִינִ֔ים וּ/שְׁלֹשִׁ֖ים חֲלִפֹ֥ת בְּגָדִֽים־־׃
translation:
  text: And Samson said to them[a], “Please let me put a riddle to you. If you indeed tell it to me within the seven days of the feast and solve it[c][b], then I will give you thirty linen garments and thirty changes of clothes.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “during the seven days of the banquet.”
    reason: lexical_alternative
  - marker: b
    text: Literally “find it”; that is, solve the riddle.
    reason: lexical_alternative
  - marker: c
    text: The exact kinds of garments are uncertain; the Hebrew refers to linen garments and sets of clothing.
    reason: cultural_note
lexical_decisions:
- source_word: אָחֽוּדָה נָּא
  chosen: Please let me put
  alternatives:
  - Please let me propose
  - Let me now tell
  lexicon: HALOT
  rationale: The cohortative of חוד with נָא expresses a polite first-person proposal. In context of introducing a riddle, 'let me put' is idiomatic modern English and preserves the volitional nuance better than a wooden 'I will propound.'
- source_word: חִידָה
  chosen: a riddle
  alternatives:
  - an enigma
  lexicon: HALOT
  rationale: The noun denotes a riddle or puzzling saying. 'Riddle' is the natural contextual equivalent in this narrative.
- source_word: אִם הַגֵּד תַּגִּידוּ
  chosen: If you can indeed tell
  alternatives:
  - If you surely tell
  - If you fully explain
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea. 'Can indeed tell' captures the emphatic force in readable English without over-literal repetition.
- source_word: אוֹתָהּ לִי
  chosen: it to me
  alternatives:
  - it for me
  lexicon: HALOT
  rationale: Direct object plus prepositional pronoun indicates that they must state the answer to Samson. 'To me' is the natural English rendering.
- source_word: שִׁבְעַת יְמֵי הַמִּשְׁתֶּה
  chosen: within the seven days of the feast
  alternatives:
  - during the seven days of the banquet
  - for the seven days of the feast
  lexicon: HALOT
  rationale: מִשְׁתֶּה is a feast/banquet, here the wedding feast. 'Within the seven days' reflects the temporal limit implied by the challenge.
- source_word: וּמְצָאתֶם
  chosen: and solve it
  alternatives:
  - and find it out
  - and discover it
  lexicon: HALOT
  rationale: Literally 'find,' but in riddle context the idiomatic sense is to discover or solve the answer. 'Solve it' communicates the intended meaning clearly.
- source_word: שְׁלֹשִׁים סְדִינִים
  chosen: thirty linen garments
  alternatives:
  - thirty linen wraps
  - thirty linen undergarments
  lexicon: HALOT
  rationale: סְדִינִים refers to linen cloth garments, likely fine linen wraps or undergarments. 'Linen garments' is accurate while avoiding overprecision where the exact clothing type is uncertain.
- source_word: שְׁלֹשִׁים חֲלִפֹת בְּגָדִים
  chosen: thirty changes of clothes
  alternatives:
  - thirty sets of garments
  - thirty changes of garments
  lexicon: HALOT
  rationale: The phrase denotes changes or sets of clothing. 'Changes of clothes' is idiomatic English and preserves the sense of complete outfit changes.
- source_word: וְנָתַתִּי לָכֶם
  chosen: then I will give you
  alternatives:
  - and I will give you
  lexicon: HALOT
  rationale: The conjunction links the apodosis of the conditional statement. 'Then' makes the conditional relationship explicit in English.
