id: JDG.14.1
reference: Judges 14:1
source:
  edition: WLC
  text: וַ/יֵּ֥רֶד שִׁמְשׁ֖וֹן תִּמְנָ֑תָ/ה וַ/יַּ֥רְא אִשָּׁ֛ה בְּ/תִמְנָ֖תָ/ה מִ/בְּנ֥וֹת פְּלִשְׁתִּֽים׃
translation:
  text: Then Samson went down to Timnah[a], and at Timnah he saw a woman from the daughters of the Philistines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'from among the Philistine women.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרֶד
  chosen: went down
  alternatives:
  - went to
  - descended
  lexicon: HALOT
  rationale: The verb ירד literally means 'go down/descend.' 'Went down' preserves the narrative wording and common Hebrew topographical idiom without over-literal stiffness.
- source_word: שִׁמְשׁוֹן
  chosen: Samson
  rationale: Personal name transliterated by standard English convention, in keeping with the translation philosophy to transliterate names.
- source_word: תִּמְנָתָה
  chosen: to Timnah
  alternatives:
  - toward Timnah
  rationale: The directional he indicates motion toward the place. In idiomatic English, 'to Timnah' is the natural rendering.
- source_word: וַיַּרְא
  chosen: he saw
  alternatives:
  - he noticed
  lexicon: HALOT
  rationale: ראה is the standard verb 'see.' 'He saw' is sufficiently natural and leaves the narrative observation unembellished.
- source_word: אִשָּׁה
  chosen: a woman
  alternatives:
  - a wife
  - a young woman
  lexicon: HALOT
  rationale: Although אשה can mean 'wife' in some contexts, here Samson has only seen her and later seeks marriage; 'a woman' is the contextually appropriate and least interpretively loaded choice.
- source_word: בְּתִמְנָתָה
  chosen: at Timnah
  alternatives:
  - in Timnah
  rationale: The preposition ב marks location. 'At Timnah' reads naturally in English and avoids implying a larger urban setting more strongly than the Hebrew does.
- source_word: מִבְּנוֹת פְּלִשְׁתִּים
  chosen: from the daughters of the Philistines
  alternatives:
  - from among the Philistine women
  - one of the Philistine daughters
  lexicon: HALOT
  rationale: Literally, the phrase is 'from the daughters of the Philistines.' This preserves the Hebrew familial/ethnic expression while remaining understandable in English. A more idiomatic alternative is worth preserving in a footnote.
