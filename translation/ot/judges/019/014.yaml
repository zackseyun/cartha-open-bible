id: JDG.19.14
reference: Judges 19:14
source:
  edition: WLC
  text: וַ/יַּעַבְר֖וּ וַ/יֵּלֵ֑כוּ וַ/תָּבֹ֤א לָ/הֶם֙ הַ/שֶּׁ֔מֶשׁ אֵ֥צֶל הַ/גִּבְעָ֖ה
    אֲשֶׁ֥ר לְ/בִנְיָמִֽן׃
translation:
  text: So they passed on and went their way, and the sun set on them near Gibeah,
    which belongs to Benjamin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which was in Benjamin.' The Hebrew phrase identifies Gibeah as associated
      with the tribe/territory of Benjamin.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַבְרוּ
  chosen: they passed on
  alternatives:
  - they passed by
  - they went on
  lexicon: HALOT
  rationale: From עבר in narrative sequence, indicating continuing past a prior option/location
    rather than merely generic movement. 'Passed on' fits the immediate context of
    declining to stay elsewhere and continuing the journey.
- source_word: וַיֵּלֵכוּ
  chosen: went their way
  alternatives:
  - went on
  - walked on
  lexicon: HALOT
  rationale: הלך is the common verb 'go/walk.' Rendering it as 'went their way' preserves
    the second movement verb without collapsing it into the previous verb, reflecting
    the Hebrew narrative style while remaining natural English.
- source_word: וַתָּבֹא לָהֶם הַשֶּׁמֶשׁ
  chosen: the sun set on them
  alternatives:
  - the sun came upon them
  - sunset came upon them
  lexicon: HALOT
  rationale: Literally 'the sun came to/for them,' an idiom for sunset/overtaking
    by nightfall. 'The sun set on them' is the natural English equivalent and preserves
    the sense that nightfall caught up with them during travel.
- source_word: אֵצֶל
  chosen: near
  alternatives:
  - beside
  - by
  lexicon: HALOT
  rationale: The preposition denotes proximity. 'Near' is the clearest modern English
    choice in this travel context.
- source_word: הַגִּבְעָה
  chosen: Gibeah
  alternatives:
  - the hill
  lexicon: HALOT
  rationale: Although the noun can mean 'hill,' here it is a place name, as shown
    by the article with proper-name usage and the following qualifier 'which belongs
    to Benjamin.' Per translation philosophy, names are transliterated.
- source_word: אֲשֶׁר לְבִנְיָמִן
  chosen: which belongs to Benjamin
  alternatives:
  - which was Benjamin's
  - which was in Benjamin
  lexicon: HALOT
  rationale: The phrase identifies tribal affiliation. 'Belongs to Benjamin' communicates
    possession/association with the territory of the tribe of Benjamin more precisely
    than the looser 'in Benjamin.'
- source_word: בִנְיָמִן
  chosen: Benjamin
  lexicon: HALOT
  rationale: Proper tribal name; transliterated according to the project's naming
    policy.
