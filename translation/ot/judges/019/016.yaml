id: JDG.19.16
reference: Judges 19:16
source:
  edition: WLC
  text: וְ/הִנֵּ֣ה אִ֣ישׁ זָקֵ֗ן בָּ֣א מִֽן מַעֲשֵׂ֤/הוּ מִן הַ/שָּׂדֶה֙ בָּ/עֶ֔רֶב
    וְ/הָ/אִישׁ֙ מֵ/הַ֣ר אֶפְרַ֔יִם וְ/הוּא גָ֖ר בַּ/גִּבְעָ֑ה וְ/אַנְשֵׁ֥י הַ/מָּק֖וֹם
    בְּנֵ֥י יְמִינִֽי׀־־־׃
translation:
  text: And behold, an old man was coming in from his work in the field at evening.
    The man was from the hill country of Ephraim, and he was staying in Gibeah, but
    the men of the place were Benjaminites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the man was from Mount Ephraim.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb for 'was staying' can also mean 'was residing' or 'was sojourning,'
      suggesting he was living in Gibeah though not originally from there.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - And look
  - Now behold
  lexicon: HALOT
  rationale: Retains the narrative deictic/interjection that marks a notable development
    in the story. 'Behold' is slightly formal but still readable and preserves the
    Hebrew discourse force better than omitting it.
- source_word: אִישׁ זָקֵן
  chosen: an old man
  alternatives:
  - an elderly man
  - a certain old man
  lexicon: HALOT
  rationale: Straightforward rendering of noun + adjective. 'Old man' is natural English
    and preserves the age descriptor without adding indefiniteness beyond the Hebrew.
- source_word: בָּא
  chosen: was coming in
  alternatives:
  - came
  - was coming
  lexicon: HALOT
  rationale: The participial/qatal narrative sense here is well conveyed by an imperfective
    English form in context, highlighting the man's arrival on the scene. 'Coming
    in' fits the movement from field to town.
- source_word: מִן מַעֲשֵׂהוּ
  chosen: from his work
  alternatives:
  - from his labor
  - from his task
  lexicon: HALOT
  rationale: מַעֲשֶׂה commonly denotes work or labor. 'From his work' is idiomatic
    and concise.
- source_word: מִן הַשָּׂדֶה
  chosen: in the field
  alternatives:
  - from the field
  lexicon: HALOT
  rationale: Combined with the previous phrase, English reads more naturally as 'from
    his work in the field' rather than repeating 'from.' This is a minor restructuring
    for readability without changing sense.
- source_word: בָּעֶרֶב
  chosen: at evening
  alternatives:
  - in the evening
  - toward evening
  lexicon: HALOT
  rationale: A close and natural rendering of the temporal phrase. 'At evening' preserves
    the concise Hebrew timing.
- source_word: וְהָאִישׁ מֵהַר אֶפְרַיִם
  chosen: The man was from the hill country of Ephraim
  alternatives:
  - The man was from the hill country of Ephraim's mountains
  - The man was from Mount Ephraim
  lexicon: HALOT
  rationale: הַר אֶפְרַיִם is a geographic designation commonly rendered 'the hill
    country of Ephraim.' This is clearer in modern English than the more literal 'Mount
    Ephraim.'
- source_word: וְהוּא גָר בַּגִּבְעָה
  chosen: and he was staying in Gibeah
  alternatives:
  - and he was residing in Gibeah
  - and he lived in Gibeah
  lexicon: HALOT
  rationale: גור often denotes sojourning/residing as an outsider or temporary resident.
    'Was staying' preserves that nuance better than the more settled 'lived,' while
    remaining natural English.
- source_word: וְאַנְשֵׁי הַמָּקוֹם
  chosen: but the men of the place
  alternatives:
  - and the men of the place
  - while the men of the place
  - but the local men
  lexicon: HALOT
  rationale: The clause is verbless and contrastive in sense with the old man's origin/residence.
    'But' makes explicit the contrast that he was from/staying there, whereas the
    local men belonged to Benjamin. 'Men of the place' is a close rendering.
- source_word: בְּנֵי יְמִינִי
  chosen: were Benjaminites
  alternatives:
  - were sons of Benjamin
  - belonged to Benjamin
  lexicon: HALOT
  rationale: Idiomatic rendering of the gentilic/tribal designation. 'Benjaminites'
    is clear modern English and preserves the tribal identity.
