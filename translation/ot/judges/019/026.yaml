id: JDG.19.26
reference: Judges 19:26
source:
  edition: WLC
  text: וַ/תָּבֹ֥א הָ/אִשָּׁ֖ה לִ/פְנ֣וֹת הַ/בֹּ֑קֶר וַ/תִּפֹּ֞ל פֶּ֧תַח בֵּית הָ/אִ֛ישׁ אֲשֶׁר אֲדוֹנֶ֥י/הָ שָּׁ֖ם עַד הָ/אֽוֹר־־־׃
translation:
  text: The woman came as morning was dawning and fell at the entrance of the house of the man where her master was[b][a], until it was light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toward morning' or 'before dawn.' The Hebrew idiom literally refers to the turning of morning.
    reason: lexical_alternative
  - marker: b
    text: Or 'her lord.' The Hebrew says 'her master,' a term of authority rather than explicitly 'her husband.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנוֹת הַבֹּקֶר
  chosen: As morning was turning
  alternatives:
  - toward morning
  - at the turning of morning
  - before dawn
  lexicon: HALOT
  rationale: The infinitive construct of פנה with בֹּקֶר idiomatically marks the approach or turning of morning. 'As morning was turning' preserves the temporal imagery more closely than a flat 'at dawn,' while remaining readable. 'Before dawn' is possible contextually but is less precise because the phrase points to the onset of morning rather than an earlier time.
- source_word: וַתָּבֹא
  chosen: came
  alternatives:
  - returned
  - arrived
  lexicon: HALOT
  rationale: The basic motion verb בוא is best rendered 'came.' 'Returned' would add a nuance not explicit in the verb itself, even if implied by the narrative context.
- source_word: וַתִּפֹּל
  chosen: fell
  alternatives:
  - collapsed
  - lay down
  lexicon: HALOT
  rationale: נפל straightforwardly means 'fell.' In context collapse is likely, but 'collapsed' interprets the cause and intensity beyond the lexical value. 'Fell' preserves the starkness of the Hebrew.
- source_word: פֶּתַח בֵּית
  chosen: at the entrance of the house
  alternatives:
  - at the doorway of the house
  - at the door of the house
  lexicon: HALOT
  rationale: פֶּתַח denotes the opening/entrance. 'At the entrance of the house' reflects the construct phrase naturally in English. 'Doorway' is also viable and slightly more concrete; preserved as an alternative.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the האיש = husband?
  - the male householder
  lexicon: HALOT
  rationale: אִישׁ here is the ordinary noun 'man.' Although context identifies him as the old man of the house, the Hebrew expression is simply 'the man.' More specific renderings would over-interpret.
- source_word: אֲדוֹנֶיהָ
  chosen: her master
  alternatives:
  - her lord
  - her husband
  lexicon: HALOT
  rationale: אדון with 3fs suffix literally means 'her master/lord.' In this narrative the woman is the Levite's concubine, and the term denotes his authority over her rather than explicitly naming the marital relationship. 'Her master' best preserves the social reality and the lexical force. 'Her husband' is too interpretive; 'her lord' is formally possible but sounds archaic in modern English.
- source_word: שָׁם
  chosen: where
  alternatives:
  - there
  lexicon: HALOT
  rationale: 'With the preceding relative אֲשֶׁר, שָׁם functions adverbially: ''where her master was.'' Rendering it simply as ''there'' is possible but less idiomatic in English.'
- source_word: עַד הָאוֹר
  chosen: until it was light
  alternatives:
  - until daylight
  - until the light
  lexicon: HALOT
  rationale: The phrase marks duration up to daybreak. 'Until it was light' is idiomatic and preserves the temporal sense. 'Until the light' is more literal but awkward in English.
