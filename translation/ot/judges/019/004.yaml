id: JDG.19.4
reference: Judges 19:4
source:
  edition: WLC
  text: וַ/יֶּחֱזַק בּ֤/וֹ חֹֽתְנ/וֹ֙ אֲבִ֣י הַֽ/נַּעֲרָ֔ה וַ/יֵּ֥שֶׁב אִתּ֖/וֹ שְׁלֹ֣שֶׁת
    יָמִ֑ים וַ/יֹּאכְלוּ֙ וַ/יִּשְׁתּ֔וּ וַ/יָּלִ֖ינוּ שָֽׁם־׃
translation:
  text: And his father-in-law, the young woman's father, urged him to stay, and he
    remained with him three days; and they ate and drank, and spent the nights there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prevailed upon him,' 'pressed him,' or 'detained him.' The Hebrew idiom
      literally says his father-in-law 'was strong with/against him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּחֱזַק בּוֹ
  chosen: urged him to stay
  alternatives:
  - prevailed upon him
  - pressed him
  - detained him
  lexicon: HALOT
  rationale: The idiom חזק ב + person literally means 'was strong against/with him'
    but in context conveys insistence or pressing someone to remain. 'Urged him to
    stay' makes the implied object of the urging explicit from the following clause
    while preserving the social pressure sense without overstating coercion.
- source_word: חֹתְנוֹ
  chosen: his father-in-law
  alternatives:
  - his bride's father
  lexicon: HALOT
  rationale: The noun חתן/חתן-related family term here denotes the relationship by
    marriage from the Levite's perspective. 'Father-in-law' is the natural English
    kinship term in context.
- source_word: אֲבִי הַנַּעֲרָה
  chosen: the young woman's father
  alternatives:
  - the girl's father
  lexicon: HALOT
  rationale: This appositional phrase identifies the father-in-law more specifically.
    נַעֲרָה can mean 'girl' or 'young woman'; 'young woman' fits readable modern English
    and avoids sounding childish in this marital context.
- source_word: וַיֵּשֶׁב אִתּוֹ
  chosen: and he remained with him
  alternatives:
  - and he stayed with him
  - and he sat/dwelt with him
  lexicon: HALOT
  rationale: ישב commonly means 'sit, dwell, remain/stay.' In this narrative setting,
    'remained with him' best captures continued lodging after being urged.
- source_word: שְׁלֹשֶׁת יָמִים
  chosen: three days
  lexicon: HALOT
  rationale: Straightforward temporal expression.
- source_word: וַיֹּאכְלוּ וַיִּשְׁתּוּ
  chosen: and they ate and drank
  alternatives:
  - and they feasted
  lexicon: HALOT
  rationale: The paired verbs are simple and should be translated directly rather
    than compressed into an interpretive summary like 'feasted.'
- source_word: וַיָּלִינוּ שָׁם
  chosen: and spent the nights there
  alternatives:
  - and lodged there
  - and stayed overnight there
  lexicon: HALOT
  rationale: לון refers specifically to passing the night/lodging. 'Spent the nights
    there' preserves the iterative sense over the three-day period better than a singular-sounding
    'lodged there.'
