id: JDG.19.25
reference: Judges 19:25
source:
  edition: WLC
  text: וְ/לֹֽא אָב֤וּ הָ/אֲנָשִׁים֙ לִ/שְׁמֹ֣עַֽ ל֔/וֹ וַ/יַּחֲזֵ֤ק הָ/אִישׁ֙ בְּ/פִ֣ילַגְשׁ֔/וֹ
    וַ/יֹּצֵ֥א אֲלֵי/הֶ֖ם הַ/ח֑וּץ וַ/יֵּדְע֣וּ א֠וֹתָ/הּ וַ/יִּֽתְעַלְּלוּ בָ֤/הּ
    כָּל הַ/לַּ֨יְלָה֙ עַד הַ/בֹּ֔קֶר וַֽ/יְשַׁלְּח֖וּ/הָ ב/עלות הַ/שָּֽׁחַר־־־־׃
translation:
  text: But the men were not willing to listen to him, so the man seized his concubine
    and brought her out to them. And they knew her and abused her all night until
    morning, and they let her go at the dawn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'they knew her,' a euphemism for sexual violation in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבוּ
  chosen: were not willing
  alternatives:
  - refused
  - would not
  lexicon: HALOT
  rationale: The verb אבה denotes willingness/consent or refusal. 'Were not willing'
    preserves the volitional nuance without overinterpreting motive; 'refused' is
    possible but slightly more forceful.
- source_word: לִשְׁמֹעַ לוֹ
  chosen: to listen to him
  alternatives:
  - to obey him
  - to hear him
  lexicon: HALOT
  rationale: שׁמע with ל can mean hear/listen/obey. In this immediate context the
    men reject his plea, so 'listen to him' fits naturally while not overstating obedience
    language.
- source_word: וַיַּחֲזֵק
  chosen: seized
  alternatives:
  - took hold of
  - grasped
  lexicon: HALOT
  rationale: חזק here conveys forceful taking hold. 'Seized' communicates the coercive
    action more clearly than the milder 'took hold of.'
- source_word: פִּילַגְשׁוֹ
  chosen: his concubine
  alternatives:
  - his secondary wife
  lexicon: HALOT
  rationale: '''Concubine'' is the standard and most concise rendering for פילגש.
    While culturally complex, it best matches the social category recognized in English
    Bible usage.'
- source_word: וַיֹּצֵא אֲלֵיהֶם הַחוּץ
  chosen: brought her out to them outside
  alternatives:
  - brought her out to them
  - led her out to them, outside
  lexicon: HALOT
  rationale: יצא in Hiphil means cause to go out/bring out. Including 'outside' reflects
    הַחוּץ explicitly, even though English style is slightly redundant; the redundancy
    mirrors the Hebrew emphasis on expulsion from the house.
- source_word: וַיֵּדְעוּ אוֹתָהּ
  chosen: they knew her
  alternatives:
  - they had sexual relations with her
  - they raped her
  lexicon: HALOT
  rationale: ידע is the Hebrew euphemism 'know' for sexual intercourse. The main text
    preserves the source idiom with formal restraint; because the coercive context
    makes the violence unmistakable, a footnote preserves the more explicit sense.
- source_word: וַיִּתְעַלְּלוּ בָהּ
  chosen: abused her
  alternatives:
  - treated her shamefully
  - mistreated her
  - ravaged her
  lexicon: HALOT
  rationale: The hitpael of עלל here denotes abusive, degrading mistreatment. 'Abused
    her' is clear modern English and broad enough to include the humiliating violence
    implied by the context.
- source_word: כָּל הַלַּיְלָה עַד הַבֹּקֶר
  chosen: all night until morning
  alternatives:
  - throughout the night until morning
  lexicon: HALOT
  rationale: This is a straightforward temporal expression. 'All night until morning'
    is natural and preserves the duration and brutality.
- source_word: וַיְשַׁלְּחוּהָ
  chosen: they let her go
  alternatives:
  - they sent her away
  - they released her
  lexicon: HALOT
  rationale: שלח can mean send away/release. 'Let her go' is idiomatic in English
    and fits the context of dismissing her after the assault.
- source_word: בַּעֲלוֹת הַשָּׁחַר
  chosen: at the dawn
  alternatives:
  - when the dawn came up
  - at daybreak
  lexicon: HALOT
  rationale: Literally 'at the rising of the dawn.' 'At the dawn' is concise and natural
    while preserving the temporal image.
