id: JDG.19.5
reference: Judges 19:5
source:
  edition: WLC
  text: וַֽ/יְהִי֙ בַּ/יּ֣וֹם הָ/רְבִיעִ֔י וַ/יַּשְׁכִּ֥ימוּ בַ/בֹּ֖קֶר וַ/יָּ֣קָם
    לָ/לֶ֑כֶת וַ/יֹּאמֶר֩ אֲבִ֨י הַֽ/נַּעֲרָ֜ה אֶל חֲתָנ֗/וֹ סְעָ֧ד לִבְּ/ךָ֛ פַּת
    לֶ֖חֶם וְ/אַחַ֥ר תֵּלֵֽכוּ־־׃
translation:
  text: On the fourth day, they rose early in the morning, and he got up to go. But
    the young woman’s father said to his son-in-law, “Refresh your heart with a morsel
    of bread, and afterward you may go.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “Strengthen your heart with a morsel of bread.” The idiom
      means to refresh or sustain oneself by eating.
    reason: lexical_alternative
  - marker: b
    text: The final verb is plural in Hebrew (“you all may go”), likely referring
      to the traveling party as a whole, though the father addresses his son-in-law
      directly.
    reason: alternative_reading
lexical_decisions:
- source_word: בַּיּוֹם הָרְבִיעִי
  chosen: On the fourth day
  alternatives:
  - On the fourth day of the stay
  lexicon: HALOT
  rationale: A straightforward temporal expression. 'On the fourth day' is the plain
    sense and keeps the narrative sequence clear without adding unstated detail.
- source_word: וַיַּשְׁכִּימוּ בַבֹּקֶר
  chosen: they rose early in the morning
  alternatives:
  - they got up early in the morning
  - they started early in the morning
  lexicon: HALOT
  rationale: The plural verb naturally refers to the parties rising early. 'Rose early
    in the morning' is idiomatic English and preserves the Hebrew emphasis on an early
    start.
- source_word: וַיָּקָם לָלֶכֶת
  chosen: and he got up to go
  alternatives:
  - and he arose to leave
  - and he set out to go
  lexicon: HALOT
  rationale: The singular shifts focus to the Levite. 'Got up to go' is natural modern
    English and reflects the infinitive of purpose without overtranslating.
- source_word: אֲבִי הַנַּעֲרָה
  chosen: the young woman’s father
  alternatives:
  - the girl's father
  - the maiden's father
  lexicon: HALOT
  rationale: נַעֲרָה denotes a young woman. 'Young woman' is more natural and age-appropriate
    in modern English than 'maiden,' while avoiding the potentially too-young nuance
    of 'girl.'
- source_word: חֲתָנוֹ
  chosen: his son-in-law
  alternatives:
  - his bridegroom relative
  lexicon: HALOT
  rationale: In context this refers to the father addressing the Levite as his son-in-law.
    This is the clearest relational equivalent in English.
- source_word: סְעָד לִבְּךָ
  chosen: Strengthen your heart
  alternatives:
  - Refresh yourself
  - Sustain yourself
  - Take courage
  lexicon: HALOT
  rationale: Literally the idiom is 'support/strengthen your heart.' Here it refers
    to taking food for strength. Retaining 'heart' preserves the Hebrew idiom while
    remaining understandable in English.
- source_word: פַּת לֶחֶם
  chosen: a morsel of bread
  alternatives:
  - a piece of bread
  - a bit of food
  lexicon: HALOT
  rationale: The phrase literally refers to a piece or morsel of bread. 'A morsel
    of bread' preserves the concrete image and the hospitable tone better than the
    broader 'food.'
- source_word: וְאַחַר תֵּלֵכוּ
  chosen: and afterward you may go
  alternatives:
  - and afterward you shall go
  - and then you can go
  lexicon: HALOT
  rationale: The plural verb likely addresses the traveling party collectively, even
    though the speech is directed to the son-in-law. 'You may go' fits the hospitable,
    permissive sense in context and avoids awkwardness.
