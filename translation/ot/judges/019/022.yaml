theological_decisions:
- issue: Rendering the sexual euphemism וְנֵדָעֶנּוּ
  chosen_reading: Preserve the Hebrew euphemism in the main text as 'so that we may
    know him' and clarify the sexual meaning in a footnote.
  alternative_readings:
  - so that we may have sex with him
  - so that we may violate him
  rationale: The Hebrew intentionally uses the verb 'know' as a euphemism. Preserving
    the idiom respects the source wording and its literary echo of Genesis 19, while
    a footnote prevents misunderstanding. This follows the stated philosophy of preserving
    tension/ambiguity where present without obscuring plain sense.
  doctrine_reference: Translation philosophy §3
