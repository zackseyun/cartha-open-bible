id: JDG.19.22
reference: Judges 19:22
source:
  edition: WLC
  text: הֵמָּה֮ מֵיטִיבִ֣ים אֶת לִבָּ/ם֒ וְ/הִנֵּה֩ אַנְשֵׁ֨י הָ/עִ֜יר אַנְשֵׁ֣י בְנֵֽי
    בְלִיַּ֗עַל נָסַ֨בּוּ֙ אֶת הַ/בַּ֔יִת מִֽתְדַּפְּקִ֖ים עַל הַ/דָּ֑לֶת וַ/יֹּאמְר֗וּ
    אֶל הָ֠/אִישׁ בַּ֣עַל הַ/בַּ֤יִת הַ/זָּקֵן֙ לֵ/אמֹ֔ר הוֹצֵ֗א אֶת הָ/אִ֛ישׁ אֲשֶׁר
    בָּ֥א אֶל בֵּיתְ/ךָ֖ וְ/נֵדָעֶֽ/נּוּ־־־־־־־־׃
translation:
  text: While they were making their hearts merry, behold, the men of the city, worthless
    men, surrounded the house, pounding on the door. They said to the old man, the
    master of the house, “Bring out the man who came into your house, so that we may
    know him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “sons of worthlessness”; that is, lawless or wicked
      men.
    reason: lexical_alternative
  - marker: b
    text: “Know him” is a sexual euphemism here, meaning they intended to sexually
      violate him.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵיטִיבִים אֶת לִבָּם
  chosen: making their hearts merry
  alternatives:
  - enjoying themselves
  - feeling good
  - making themselves cheerful
  lexicon: HALOT
  rationale: The idiom literally involves 'making good their heart.' In context it
    refers to festive enjoyment at table. 'Making their hearts merry' preserves the
    Hebrew imagery better than a flatter paraphrase while remaining natural English.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - suddenly
  - and behold
  lexicon: HALOT
  rationale: This discourse marker heightens the abrupt narrative turn. 'Behold' preserves
    the force and gravity of the interruption better than omitting it.
- source_word: אַנְשֵׁי הָעִיר
  chosen: the men of the city
  alternatives:
  - the townsmen
  - the men of the town
  lexicon: HALOT
  rationale: A straightforward rendering of the construct phrase. 'City' matches the
    Hebrew noun directly.
- source_word: אַנְשֵׁי בְנֵי בְלִיַּעַל
  chosen: worthless men
  alternatives:
  - wicked men
  - base fellows
  - sons of worthlessness
  lexicon: HALOT
  rationale: The expression is an idiom for morally corrupt, lawless men. 'Worthless
    men' is concise, idiomatic, and closer to the Hebrew than the more interpretive
    'wicked men'; the more literal 'sons of worthlessness' is preserved as an alternative.
- source_word: נָסַבּוּ אֶת הַבַּיִת
  chosen: surrounded the house
  alternatives:
  - encircled the house
  - closed in around the house
  lexicon: HALOT
  rationale: The verb denotes going around or surrounding. 'Surrounded the house'
    is the clearest natural English equivalent.
- source_word: מִתְדַּפְּקִים עַל הַדָּלֶת
  chosen: pounding on the door
  alternatives:
  - beating on the door
  - knocking hard at the door
  lexicon: HALOT
  rationale: The hitpael participle conveys repeated forceful striking. 'Pounding'
    best captures the aggressive action.
- source_word: בַּעַל הַבַּיִת
  chosen: the master of the house
  alternatives:
  - the owner of the house
  - the lord of the house
  - the host
  lexicon: HALOT
  rationale: The phrase denotes the man in charge of the household. 'Master of the
    house' preserves the social authority implied by בַּעַל without sounding overly
    technical.
- source_word: הַזָּקֵן
  chosen: the old man
  alternatives:
  - the elder
  - the old one
  lexicon: HALOT
  rationale: In this narrative context the adjective identifies the host by age, not
    by formal office. 'Old man' is the most direct rendering.
- source_word: הוֹצֵא
  chosen: Bring out
  alternatives:
  - Bring forth
  - Send out
  lexicon: HALOT
  rationale: The imperative demands that the guest be brought outside. 'Bring out'
    is natural modern English.
- source_word: וְנֵדָעֶנּוּ
  chosen: so that we may know him
  alternatives:
  - that we may have sex with him
  - that we may violate him
  lexicon: HALOT
  rationale: ידע here is a sexual euphemism, echoing Genesis 19. The main text preserves
    the Hebrew idiom with 'know him,' while the intended sexual sense should be made
    explicit in a footnote for transparency and clarity.
