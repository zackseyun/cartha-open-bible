id: JDG.19.9
reference: Judges 19:9
source:
  edition: WLC
  text: וַ/יָּ֤קָם הָ/אִישׁ֙ לָ/לֶ֔כֶת ה֥וּא וּ/פִילַגְשׁ֖/וֹ וְ/נַעֲר֑/וֹ וַ/יֹּ֣אמֶר ל֣/וֹ חֹתְנ֣/וֹ אֲבִ֣י הַֽ/נַּעֲרָ֡ה הִנֵּ֣ה נָא֩ רָפָ֨ה הַ/יּ֜וֹם לַ/עֲרֹ֗ב לִֽינוּ נָ֞א הִנֵּ֨ה חֲנ֤וֹת הַ/יּוֹם֙ לִ֥ין פֹּה֙ וְ/יִיטַ֣ב לְבָבֶ֔/ךָ וְ/הִשְׁכַּמְתֶּ֤ם מָחָר֙ לְ/דַרְכְּ/כֶ֔ם וְ/הָלַכְתָּ֖ לְ/אֹהָלֶֽ/ךָ־׃
translation:
  text: Then the man rose to go[a], he and his concubine and his young man; but his father-in-law, the young woman’s father, said to him, “Look now, the day is waning toward evening. Please stay the night. Look, the day is drawing to a close. Spend the night here, and let your heart be glad. Then tomorrow you may rise early for your journey[c][b], and go to your tent.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the day is declining toward evening.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the day has encamped'; that is, it is drawing to a close.
    reason: lexical_alternative
  - marker: c
    text: Or, 'go home.' Literally, 'go to your tent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the husband
  lexicon: HALOT
  rationale: אִישׁ is the ordinary term for 'man.' In context this refers to the Levite/husband figure, but 'the man' preserves the narrative style without importing a more specific relational label not used here.
- source_word: פִילַגְשׁוֹ
  chosen: his concubine
  alternatives:
  - his secondary wife
  lexicon: HALOT
  rationale: The standard sense is 'concubine.' This is the established social-legal category in the narrative and should not be softened to 'wife' alone.
- source_word: נַעֲרוֹ
  chosen: his young man
  alternatives:
  - his servant
  - his attendant
  lexicon: HALOT
  rationale: נַעַר can mean young man, servant, or attendant depending on context. Here the possessive and travel context suggest an attendant, but 'young man' stays closer to the Hebrew while remaining intelligible.
- source_word: חֹתְנוֹ
  chosen: his father-in-law
  alternatives:
  - his relation by marriage
  lexicon: HALOT
  rationale: In this context the relational meaning is clearly father-in-law, confirmed by the apposition 'the young woman's father.'
- source_word: אֲבִי הַנַּעֲרָה
  chosen: the young woman’s father
  alternatives:
  - the girl's father
  lexicon: HALOT
  rationale: נַעֲרָה denotes a young woman/maiden. 'Young woman' is more natural and appropriate in English than 'girl' for this context.
- source_word: הִנֵּה נָא
  chosen: Look now
  alternatives:
  - Behold, please
  - See now
  lexicon: HALOT
  rationale: This combination is a discourse marker drawing attention politely. 'Look now' conveys both immediacy and appeal in readable modern English.
- source_word: רָפָה הַיּוֹם לַעֲרֹב
  chosen: the day has slackened toward evening
  alternatives:
  - the day is weakening toward evening
  - the day is declining toward evening
  lexicon: HALOT
  rationale: רפה literally conveys slackening/relaxing. In context it describes the waning day. 'Has slackened toward evening' preserves the metaphor better than a fully idiomatic paraphrase.
- source_word: לִינוּ נָא
  chosen: Please stay the night
  alternatives:
  - Please lodge
  - Please spend the night
  lexicon: HALOT
  rationale: לון means to lodge/spend the night. 'Stay the night' is natural modern English and fits the hospitable appeal.
- source_word: חֲנוֹת הַיּוֹם
  chosen: the day is drawing to a close
  alternatives:
  - the day has encamped
  - the day is settling down
  lexicon: HALOT
  rationale: The idiom is difficult literally; from חנה ('encamp, settle'), it pictures the day settling down. 'Drawing to a close' communicates the sense clearly in English.
- source_word: לִין פֹּה
  chosen: Spend the night here
  alternatives:
  - Lodge here
  - Stay here tonight
  lexicon: HALOT
  rationale: A second imperative of לון. 'Spend the night here' is clear and avoids awkward repetition while preserving the invitation.
- source_word: וְיִיטַב לְבָבֶךָ
  chosen: let your heart be glad
  alternatives:
  - let your heart be merry
  - and it will be well with your heart
  lexicon: HALOT
  rationale: The idiom refers to inward cheer or gladness. 'Let your heart be glad' preserves the Hebrew imagery without sounding archaic.
- source_word: וְהִשְׁכַּמְתֶּם מָחָר
  chosen: Then tomorrow you may rise early
  alternatives:
  - and tomorrow you shall rise early
  - and you all may start early tomorrow
  lexicon: HALOT
  rationale: The verb is 2mp, addressing the traveling party collectively. English naturally renders this as a collective 'you' clause. 'Rise early' captures the Hiphil sense.
- source_word: לְדַרְכְּכֶם
  chosen: for your journey
  alternatives:
  - for your way
  - on your road
  lexicon: HALOT
  rationale: '''For your journey'' is idiomatic English for setting out on one''s way.'
- source_word: וְהָלַכְתָּ לְאֹהָלֶךָ
  chosen: and go to your tent
  alternatives:
  - and go home
  - and go to your dwelling
  lexicon: HALOT
  rationale: The Hebrew literally says 'to your tent.' Although it can function idiomatically for 'home,' retaining 'tent' preserves the concrete ancient setting and avoids over-domesticating the text.
