id: JDG.19.2
reference: Judges 19:2
source:
  edition: WLC
  text: וַ/תִּזְנֶ֤ה עָלָי/ו֙ פִּֽילַגְשׁ֔/וֹ וַ/תֵּ֤לֶךְ מֵֽ/אִתּ/וֹ֙ אֶל בֵּ֣ית
    אָבִ֔י/הָ אֶל בֵּ֥ית לֶ֖חֶם יְהוּדָ֑ה וַ/תְּהִי שָׁ֕ם יָמִ֖ים אַרְבָּעָ֥ה חֳדָשִֽׁים־־־׃
translation:
  text: But his concubine was unfaithful to him, and she went away from him to her
    father's house, to Bethlehem in Judah, and was there for four months.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'played the prostitute against him.' Some ancient interpreters
      understood the clause differently, such as 'she became angry with him' or 'quarreled
      with him.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּזְנֶה
  chosen: was unfaithful
  alternatives:
  - played the prostitute
  - committed sexual immorality
  - became angry
  lexicon: HALOT, BDB
  rationale: The verb זנה commonly denotes sexual unfaithfulness/prostitution. In
    this context, 'was unfaithful' communicates the likely sense in natural English
    without over-specifying commercial prostitution. An ancient alternative tradition
    reflected in some versions understands a different sense such as 'became angry'
    or 'quarreled,' likely to avoid the charge of adultery; this is worth preserving
    in a footnote because the Hebrew consonantal text as pointed in the MT supports
    the sexual-unfaithfulness reading.
- source_word: עָלָיו
  chosen: to him
  alternatives:
  - against him
  lexicon: BDB
  rationale: The preposition על with pronominal suffix after זנה can indicate unfaithfulness
    directed against someone. 'To him' is idiomatic in English with 'unfaithful';
    'against him' is possible but less natural in the clause as translated.
- source_word: פִּילַגְשׁוֹ
  chosen: his concubine
  alternatives:
  - his secondary wife
  lexicon: HALOT, BDB
  rationale: '''Concubine'' is the standard and most concise rendering for פילגש,
    denoting a recognized but lower-status marital/sexual union. ''Secondary wife''
    explains the social role but is less conventional in Bible translation.'
- source_word: וַתֵּלֶךְ מֵאִתּוֹ
  chosen: she went away from him
  alternatives:
  - she left him
  - she went from him
  lexicon: BDB
  rationale: This captures both the motion verb and the separation expressed by מן
    + אֵת. 'Went away from him' preserves the narrative movement and relational departure.
- source_word: אֶל בֵּית אָבִיהָ
  chosen: to her father's house
  alternatives:
  - to her father's home
  lexicon: BDB
  rationale: A literal and idiomatic rendering of the familial household expression.
- source_word: אֶל בֵּית לֶחֶם יְהוּדָה
  chosen: to Bethlehem in Judah
  alternatives:
  - to Bethlehem-judah
  - to Bethlehem of Judah
  lexicon: BDB
  rationale: This identifies the town as the Bethlehem located in the tribal territory
    of Judah. 'In Judah' is clear modern English.
- source_word: וַתְּהִי שָׁם
  chosen: and was there
  alternatives:
  - and stayed there
  lexicon: BDB
  rationale: The verb היה with שם is literally 'was there.' In English narrative,
    'was there' is acceptable and close to the source; 'stayed there' is slightly
    more interpretive but possible.
- source_word: יָמִים אַרְבָּעָה חֳדָשִׁים
  chosen: for four months
  alternatives:
  - for a period of four months
  - for days, namely four months
  lexicon: HALOT, BDB
  rationale: 'The Hebrew idiom literally reads ''days, four months,'' where ימים can
    function idiomatically for a span of time. The sense is duration: four months.
    Rendering the idiom directly as ''for four months'' is clear and faithful.'
