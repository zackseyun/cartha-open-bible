theological_decisions:
- issue: Interpretation of וַתִּזְנֶה in a morally charged narrative
  chosen_reading: sexual unfaithfulness ('was unfaithful')
  alternative_readings:
  - she played the prostitute
  - she became angry with him / quarreled with him
  rationale: The Masoretic pointing and normal lexical sense of זנה support sexual
    unfaithfulness. Because some ancient interpreters and versions appear to reflect
    a less accusatory reading, the alternative is preserved in a footnote rather than
    adopted in the main text. This preserves textual and interpretive tension without
    importing certainty beyond the Hebrew evidence.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
