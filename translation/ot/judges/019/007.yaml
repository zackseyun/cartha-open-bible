id: JDG.19.7
reference: Judges 19:7
source:
  edition: WLC
  text: וַ/יָּ֥קָם הָ/אִ֖ישׁ לָ/לֶ֑כֶת וַ/יִּפְצַר בּ/וֹ֙ חֹתְנ֔/וֹ וַ/יָּ֖שָׁב וַ/יָּ֥לֶן שָֽׁם־׃
translation:
  text: Then the man got up to go[a], but his father-in-law urged him, so he turned back and spent the night there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pressed him' / 'entreated him strongly'; the Hebrew verb conveys persistent urging.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: got up
  alternatives:
  - rose
  - stood up
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום in narrative sequence commonly marks arising to act. 'Got up' is natural modern English and preserves the preparatory action before departure.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the husband
  lexicon: HALOT
  rationale: אִישׁ literally means 'man.' In context this refers to the Levite, but the Hebrew uses the generic narrative designation rather than an explicit relational label, so 'the man' best matches the source.
- source_word: לָלֶכֶת
  chosen: to go
  alternatives:
  - to leave
  - to depart
  lexicon: HALOT
  rationale: 'Infinitive construct of הלך after קום expresses purpose: he arose in order to go. ''To go'' is the most direct rendering; ''leave/depart'' are interpretive expansions.'
- source_word: וַיִּפְצַר בּוֹ
  chosen: urged him
  alternatives:
  - pressed him
  - entreated him strongly
  lexicon: HALOT
  rationale: פצר conveys pressing or urging insistently. 'Urged him' communicates the force idiomatically in English without overstating beyond the context.
- source_word: חֹתְנוֹ
  chosen: his father-in-law
  alternatives:
  - his bride's father
  lexicon: HALOT
  rationale: Though the Hebrew noun can denote a relation by marriage more broadly depending on context, here it clearly refers to the woman's father in relation to the man, so 'his father-in-law' is the standard and precise English equivalent.
- source_word: וַיָּשָׁב
  chosen: he turned back
  alternatives:
  - he returned
  - he stayed
  lexicon: HALOT
  rationale: שׁוב means return/turn back. Because the immediate context is that he had gotten up to leave but was persuaded otherwise, 'turned back' captures the reversal of intention more vividly than the flatter 'returned.'
- source_word: וַיָּלֶן שָׁם
  chosen: spent the night there
  alternatives:
  - lodged there
  - stayed there overnight
  lexicon: HALOT
  rationale: לון in this stem means to lodge or spend the night. 'Spent the night there' is clear, natural English and preserves the temporal sense.
