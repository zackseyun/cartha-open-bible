theological_decisions:
- issue: Rendering בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: Per the translation philosophy's gender-accurate principle, the grammatically
    masculine expression is retained rather than neutralized. Because the phrase is
    also a conventional ethnonym, an alternative smoother English rendering is preserved
    in a footnote.
