id: JDG.19.30
reference: Judges 19:30
source:
  edition: WLC
  text: וְ/הָיָ֣ה כָל הָ/רֹאֶ֗ה וְ/אָמַר֙ לֹֽא נִהְיְתָ֤ה וְ/לֹֽא נִרְאֲתָה֙ כָּ/זֹ֔את
    לְ/מִ/יּ֞וֹם עֲל֤וֹת בְּנֵֽי יִשְׂרָאֵל֙ מֵ/אֶ֣רֶץ מִצְרַ֔יִם עַ֖ד הַ/יּ֣וֹם הַ/זֶּ֑ה
    שִֽׂימוּ לָ/כֶ֥ם עָלֶ֖י/הָ עֻ֥צוּ וְ/דַבֵּֽרוּ־־־־־׃פ
translation:
  text: And everyone who saw it said, “Nothing like this has happened or been seen
    from the day the sons of Israel came up from the land of Egypt until this day.
    Consider it, take counsel, and speak.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites” or “the children of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ...
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Here the verb introduces the resulting situation rather than narrating
    a new event in a wooden way. In English, folding it into the clause with 'And
    everyone who saw it...' preserves the discourse function without archaic style.
- source_word: כָל הָרֹאֶה
  chosen: everyone who saw it
  alternatives:
  - all who saw
  - everyone seeing
  lexicon: HALOT
  rationale: 'The participle with כָל functions substantivally for a general class:
    every observer. ''Everyone who saw it'' is natural modern English and preserves
    the universal scope.'
- source_word: וְאָמַר
  chosen: said
  alternatives:
  - would say
  - was saying
  lexicon: HALOT
  rationale: Converted perfect in narrative/reporting sequence is best rendered as
    simple past in English. The sense is the common reaction expressed by observers.
- source_word: לֹא נִהְיְתָה וְלֹא נִרְאֲתָה כָּזֹאת
  chosen: Nothing like this has happened or been seen
  alternatives:
  - Such a thing has never happened or been seen
  - Nothing like this ever came to be or was seen
  lexicon: HALOT
  rationale: The paired verbs intensify the unprecedented nature of the event. 'Has
    happened or been seen' captures both היה and ראה idiomatically in English while
    preserving the twofold expression.
- source_word: לְמִיּוֹם עֲלוֹת בְּנֵי יִשְׂרָאֵל מֵאֶרֶץ מִצְרַיִם
  chosen: from the day the sons of Israel came up from the land of Egypt
  alternatives:
  - since the day the Israelites came up from the land of Egypt
  - from the day the children of Israel came up out of the land of Egypt
  lexicon: HALOT
  rationale: עֲלוֹת with the exodus formula is conventionally 'came up from/out of
    the land of Egypt.' 'Sons of Israel' is retained for gender-accurate fidelity
    to בְּנֵי יִשְׂרָאֵל, though 'Israelites' is a viable smoother alternative.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: until this day
  alternatives:
  - to this day
  - until the present day
  lexicon: HALOT
  rationale: Standard temporal idiom marking the span up to the narrator's present.
    'Until this day' is clear and close to the Hebrew.
- source_word: שִׂימוּ לָכֶם עָלֶיהָ
  chosen: Consider it
  alternatives:
  - Set your mind on it
  - Take it to heart
  - Lay it to yourselves concerning it
  lexicon: HALOT
  rationale: The idiom literally involves setting something upon oneself/one's heart
    or mind. In this context of urging deliberation after a shocking report, 'Consider
    it' is the most natural concise rendering.
- source_word: עֻצוּ
  chosen: take counsel
  alternatives:
  - deliberate
  - form a plan
  - give advice
  lexicon: HALOT
  rationale: The imperative calls for collective deliberation or counsel. 'Take counsel'
    preserves the formal, communal decision-making nuance better than the flatter
    'think about it'.
- source_word: וְדַבֵּרוּ
  chosen: and speak
  alternatives:
  - and say what to do
  - and speak up
  lexicon: HALOT
  rationale: The final imperative is broad and forceful. 'And speak' preserves the
    terseness of the Hebrew, leaving the object implied as in the source.
