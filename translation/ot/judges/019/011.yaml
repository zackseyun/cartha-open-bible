id: JDG.19.11
reference: Judges 19:11
source:
  edition: WLC
  text: הֵ֣ם עִם יְב֔וּס וְ/הַ/יּ֖וֹם רַ֣ד מְאֹ֑ד וַ/יֹּ֨אמֶר הַ/נַּ֜עַר אֶל אֲדֹנָ֗י/ו
    לְכָ/ה נָּ֛א וְ/נָס֛וּרָה אֶל עִֽיר הַ/יְבוּסִ֥י הַ/זֹּ֖את וְ/נָלִ֥ין בָּֽ/הּ־־־־־׃
translation:
  text: When they were near Jebus, and the day was far spent, the young man said to
    his master, “Please come, let us turn aside to this city of the Jebusites and
    spend the night in it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jebus is the earlier name for Jerusalem.
    reason: cross_reference
  - marker: b
    text: Or, 'the day was very far gone' / 'it was getting very late.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the young man'; the term can also denote a servant or attendant
      in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵם עִם יְבוּס
  chosen: they were near Jebus
  alternatives:
  - they were with Jebus
  - they were by Jebus
  lexicon: HALOT
  rationale: The preposition עִם literally means 'with,' but in travel context with
    a place name it idiomatically indicates proximity. 'Near Jebus' gives the plain
    sense in natural English without over-paraphrasing.
- source_word: יְבוּס
  chosen: Jebus
  alternatives:
  - Jerusalem
  lexicon: HALOT
  rationale: The Hebrew uses the older place name יְבוּס, so the transliterated name
    'Jebus' should be retained rather than replacing it with the later, interpretive
    identification 'Jerusalem.'
- source_word: וְהַיּוֹם רַד מְאֹד
  chosen: and the day was far spent
  alternatives:
  - and the day had gone down very much
  - and the day was very far gone
  - and it was getting very late
  lexicon: HALOT
  rationale: רַד from רדה/רדד in this idiom describes the decline of the day toward
    evening. 'Far spent' is a natural English equivalent that preserves the temporal
    image better than the flatter 'very late,' while remaining readable.
- source_word: הַנַּעַר
  chosen: the young man
  alternatives:
  - the servant
  - the boy
  lexicon: HALOT
  rationale: נַעַר can mean 'boy,' 'youth,' or 'servant/attendant' depending on context.
    Here the speaker is the attendant traveling with the Levite, but 'young man' best
    reflects the lexical form without prematurely narrowing it to role alone. His
    subordinate role is still clear from 'to his master.'
- source_word: אֲדֹנָיו
  chosen: his master
  alternatives:
  - his lord
  - his owner
  lexicon: HALOT
  rationale: In this social context אֲדוֹן with pronominal suffix denotes a superior/master
    rather than the more elevated 'lord.' 'Master' is the most contextually appropriate
    and idiomatic rendering.
- source_word: לְכָה נָּא
  chosen: Please come
  alternatives:
  - Come now, please
  - Please go
  lexicon: HALOT
  rationale: לְכָה is an imperative of motion ('come/go'), and נָא adds politeness
    or entreaty. 'Please come' captures both the imperative and the courteous appeal
    in concise English.
- source_word: וְנָסוּרָה
  chosen: let us turn aside
  alternatives:
  - let us go aside
  - let us stop off
  lexicon: HALOT
  rationale: סוּר in the cohortative here means to turn aside from the route in order
    to enter a place. 'Let us turn aside' preserves the travel nuance and cohortative
    force well.
- source_word: עִיר הַיְבוּסִי הַזֹּאת
  chosen: this city of the Jebusites
  alternatives:
  - this Jebusite city
  - the city of this Jebusite
  lexicon: HALOT
  rationale: The gentilic הַיְבוּסִי is collective here, referring to the people group.
    'This city of the Jebusites' is the clearest rendering and preserves the demonstrative
    הַזֹּאת.
- source_word: וְנָלִין בָּהּ
  chosen: and spend the night in it
  alternatives:
  - and lodge in it
  - and stay there overnight
  lexicon: HALOT
  rationale: לוּן means to lodge or remain overnight. 'Spend the night in it' is clear
    modern English and preserves the sense of an overnight stay.
