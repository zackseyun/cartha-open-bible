id: JDG.19.12
reference: Judges 19:12
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֵלָי/ו֙ אֲדֹנָ֔י/ו לֹ֤א נָסוּר֙ אֶל עִ֣יר נָכְרִ֔י אֲשֶׁ֛ר לֹֽא
    מִ/בְּנֵ֥י יִשְׂרָאֵ֖ל הֵ֑נָּה וְ/עָבַ֖רְנוּ עַד גִּבְעָֽה־־־׃
translation:
  text: But his master said to him, “We will not turn aside into a foreign city, which
    is not of the sons of Israel; rather, we will go on as far as Gibeah.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from the sons of Israel.'' This is the standard Israelite ethnic
      expression; ''Israelites'' is a possible smoother rendering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָיו
  chosen: his master
  alternatives:
  - his lord
  lexicon: HALOT
  rationale: In this narrative context, the term refers to the servant's social superior,
    not a divine title. 'Master' best conveys the human authority relationship in
    natural English.
- source_word: נָסוּר
  chosen: we will not turn aside
  alternatives:
  - we will not stop over
  - we will not go aside
  lexicon: HALOT
  rationale: The verb סור commonly means 'turn aside' or 'deviate.' Here it refers
    to leaving the route in order to lodge in a city. 'Turn aside' preserves the directional
    sense while remaining idiomatic.
- source_word: עִיר נָכְרִי
  chosen: a foreign city
  alternatives:
  - a city of foreigners
  - an alien city
  lexicon: HALOT
  rationale: The adjective נָכְרִי marks what is foreign or belonging to outsiders.
    'A foreign city' is the most natural English rendering of the construct-like phrase
    in context.
- source_word: אֲשֶׁר לֹא מִבְּנֵי יִשְׂרָאֵל הֵנָּה
  chosen: where the people are not from the sons of Israel
  alternatives:
  - which does not belong to the sons of Israel
  - where they are not of the Israelites
  lexicon: HALOT
  rationale: The Hebrew uses a feminine plural pronoun agreeing with 'city' in a collective
    sense, indicating the inhabitants. The clause identifies the city as inhabited
    by non-Israelites. 'Where the people are not from the sons of Israel' makes the
    implied inhabitants explicit in clear English while retaining the source sense.
    'Sons of Israel' is preserved for gender-accurate fidelity to the Hebrew ethnonym.
- source_word: וְעָבַרְנוּ
  chosen: we will go on
  alternatives:
  - we will pass on
  - we will continue on
  lexicon: HALOT
  rationale: The verb עבר here means to continue past the present option rather than
    stop. 'We will go on' is idiomatic and fits the travel context.
- source_word: עַד גִּבְעָה
  chosen: as far as Gibeah
  alternatives:
  - to Gibeah
  lexicon: HALOT
  rationale: עַד marks extent or limit. 'As far as Gibeah' preserves the sense of
    continuing the journey up to that destination.
