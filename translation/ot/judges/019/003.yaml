id: JDG.19.3
reference: Judges 19:3
source:
  edition: WLC
  text: וַ/יָּ֨קָם אִישָׁ֜/הּ וַ/יֵּ֣לֶךְ אַחֲרֶ֗י/הָ לְ/דַבֵּ֤ר עַל לִבָּ/הּ֙ ל/השיב/ו
    וְ/נַעֲר֥/וֹ עִמּ֖/וֹ וְ/צֶ֣מֶד חֲמֹרִ֑ים וַ/תְּבִיאֵ֨/הוּ֙ בֵּ֣ית אָבִ֔י/הָ וַ/יִּרְאֵ֨/הוּ֙
    אֲבִ֣י הַֽ/נַּעֲרָ֔ה וַ/יִּשְׂמַ֖ח לִ/קְרָאתֽ/וֹ־׃
translation:
  text: Then her husband arose and went after her to speak to her heart and bring
    her back. His young servant was with him, along with a pair of donkeys. She brought
    him into her father’s house, and when the young woman’s father saw him, he gladly
    came to meet him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''to speak to her heart,'' an idiom for speaking tenderly or persuasively.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew form in 'to bring ... back' is textually difficult; context indicates
      that he intended to bring the woman back.
    reason: textual_variant
lexical_decisions:
- source_word: אִישָׁהּ
  chosen: her husband
  alternatives:
  - her man
  lexicon: HALOT
  rationale: Although the noun is literally 'her man,' in this context of marital
    relationship it idiomatically means 'her husband.' This is the most natural and
    accurate English rendering.
- source_word: אַחֲרֶיהָ
  chosen: after her
  alternatives:
  - behind her
  lexicon: HALOT
  rationale: The preposition indicates movement following someone. 'After her' is
    idiomatic English and preserves the narrative sense.
- source_word: לְדַבֵּר עַל־לִבָּהּ
  chosen: to speak to her heart
  alternatives:
  - to speak kindly to her
  - to persuade her
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'to speak to her heart.' Preserving
    the idiom in English maintains the source texture while remaining understandable;
    the idiom conveys tender or persuasive speech.
- source_word: לַהֲשִׁיבוֹ
  chosen: and bring her back
  alternatives:
  - and restore her
  - and return her
  lexicon: HALOT
  rationale: The ketiv/qere tradition here is reflected in many translations; context
    requires the sense of restoring the concubine to the husband. 'Bring her back'
    is clear modern English and fits the narrative aim. The English object is rendered
    as 'her' because that is the contextual referent, despite the consonantal form
    suggesting a masculine suffix.
- source_word: נַעֲרוֹ
  chosen: his young servant
  alternatives:
  - his servant
  - his young man
  lexicon: HALOT
  rationale: נַעַר can mean 'young man,' 'boy,' or 'servant/attendant' depending on
    context. Since he accompanies the Levite on a journey, 'young servant' best captures
    both age and role.
- source_word: צֶמֶד חֲמֹרִים
  chosen: a pair of donkeys
  alternatives:
  - two donkeys
  - a yoke of donkeys
  lexicon: HALOT
  rationale: צֶמֶד denotes a pair, often a yoked pair. 'A pair of donkeys' is natural
    English and preserves the numeral sense without over-specifying that they were
    yoked.
- source_word: וַתְּבִיאֵהוּ
  chosen: She brought him
  alternatives:
  - and she led him in
  lexicon: HALOT
  rationale: The feminine singular verb has the woman as subject. 'Brought him' is
    the straightforward narrative rendering.
- source_word: הַנַּעֲרָה
  chosen: the young woman
  alternatives:
  - the girl
  - the maiden
  lexicon: HALOT
  rationale: Though the woman is also called a concubine in the context, this clause
    uses נַעֲרָה, a term for a young woman. 'The young woman' is accurate, readable,
    and avoids archaic tone.
- source_word: וַיִּשְׂמַח לִקְרָאתוֹ
  chosen: he gladly came to meet him
  alternatives:
  - he rejoiced to meet him
  - he was glad to meet him
  lexicon: HALOT
  rationale: The Hebrew expresses joy in connection with meeting him. 'He gladly came
    to meet him' captures both the emotional tone and the movement implied by לִקְרָאתוֹ.
