id: JDG.19.13
reference: Judges 19:13
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר לְ/נַעֲר֔/וֹ לְךָ֥ וְ/נִקְרְבָ֖ה בְּ/אַחַ֣ד הַ/מְּקֹמ֑וֹת וְ/לַ֥נּוּ
    בַ/גִּבְעָ֖ה א֥וֹ בָ/רָמָֽה׃
translation:
  text: He said to his young man, “Come, and let us draw near to one of these places,
    and spend the night in Gibeah or in Ramah.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Go, and let us approach one of the places.”
    reason: lexical_alternative
  - marker: b
    text: “His young man” may also be rendered “his servant” or “his attendant.”
    reason: lexical_alternative
lexical_decisions:
- source_word: לְנַעֲרוֹ
  chosen: to his young man
  alternatives:
  - to his servant
  - to his attendant
  lexicon: HALOT
  rationale: נַעַר can denote a youth, servant, or attendant depending on context.
    Here it refers to the Levite’s male attendant traveling with him. 'Young man'
    preserves the basic lexical sense without overstating servile status, while remaining
    natural in English.
- source_word: לְךָ
  chosen: Come
  alternatives:
  - Go
  lexicon: HALOT
  rationale: Though the imperative of הלך is literally 'go,' in direct speech inviting
    joint movement with the following cohortative ('let us draw near'), idiomatic
    English is better served by 'Come,' which functions as an exhortation to proceed
    together.
- source_word: וְנִקְרְבָה
  chosen: and let us draw near
  alternatives:
  - and let us go near
  - and let us approach
  lexicon: HALOT
  rationale: The cohortative expresses first-person resolve/invitation. 'Draw near'
    preserves the motion nuance of קרב and fits the travel context.
- source_word: בְּאַחַד הַמְּקֹמוֹת
  chosen: to one of these places
  alternatives:
  - at one of the places
  - to one of the places
  lexicon: HALOT
  rationale: The phrase refers to one among the nearby stopping places/towns under
    consideration, specified immediately as Gibeah or Ramah. 'These places' makes
    the deictic sense natural in English from the speaker’s perspective; the preposition
    is rendered according to the motion implied by 'draw near.'
- source_word: וְלַנּוּ
  chosen: and spend the night
  alternatives:
  - and lodge
  - and stay overnight
  lexicon: HALOT
  rationale: From לון, meaning to lodge or pass the night. 'Spend the night' is clear
    modern English and fits the translation philosophy better than the more formal
    'lodge.'
- source_word: בַגִּבְעָה
  chosen: in Gibeah
  alternatives:
  - at Gibeah
  lexicon: HALOT
  rationale: Proper place name transliterated. 'In' is the natural English preposition
    for staying overnight within a town.
- source_word: בָרָמָה
  chosen: in Ramah
  alternatives:
  - at Ramah
  lexicon: HALOT
  rationale: Proper place name transliterated. Parallel with Gibeah and natural for
    a town destination.
