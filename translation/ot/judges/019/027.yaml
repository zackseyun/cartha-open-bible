id: JDG.19.27
reference: Judges 19:27
source:
  edition: WLC
  text: וַ/יָּ֨קָם אֲדֹנֶ֜י/הָ בַּ/בֹּ֗קֶר וַ/יִּפְתַּח֙ דַּלְת֣וֹת הַ/בַּ֔יִת וַ/יֵּצֵ֖א
    לָ/לֶ֣כֶת לְ/דַרְכּ֑/וֹ וְ/הִנֵּ֧ה הָ/אִשָּׁ֣ה פִֽילַגְשׁ֗/וֹ נֹפֶ֨לֶת֙ פֶּ֣תַח
    הַ/בַּ֔יִת וְ/יָדֶ֖י/הָ עַל הַ/סַּֽף־׃
translation:
  text: Her master got up in the morning and opened the doors of the house and went
    out to go on his way, and behold, the woman, his concubine, was lying at the entrance
    of the house, with her hands on the threshold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'was fallen at the entrance of the house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנֶיהָ
  chosen: her master
  alternatives:
  - her lord
  - her husband
  lexicon: HALOT
  rationale: The noun אֲדוֹן with 3fs suffix means 'her master/lord.' In this narrative
    context, 'master' best reflects the asymmetrical social relation implied by the
    Hebrew and avoids importing the more mutual sense of 'husband,' though that relationship
    is contextually involved.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - in the morning light
  - at morning
  lexicon: HALOT
  rationale: A straightforward temporal expression; 'in the morning' is natural modern
    English and adequately formal.
- source_word: דַּלְתוֹת הַבַּיִת
  chosen: the doors of the house
  alternatives:
  - the door of the house
  lexicon: HALOT
  rationale: The Hebrew uses the plural דַּלְתוֹת, so 'doors' should be preserved
    rather than flattened to singular. 'House' is retained rather than 'home' to stay
    close to the concrete setting.
- source_word: וַיֵּצֵא לָלֶכֶת לְדַרְכּוֹ
  chosen: went out to go on his way
  alternatives:
  - went out to continue his journey
  - went out to depart
  lexicon: HALOT
  rationale: 'The infinitive construction expresses purpose: he went out in order
    to go on his way. ''Go on his way'' preserves the Hebrew idiom while remaining
    readable.'
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - when he saw
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing vivid attention to the shocking
    scene. 'Behold' preserves that force better than a flattened narrative connector.
- source_word: הָאִשָּׁה פִילַגְשׁוֹ
  chosen: the woman, his concubine
  alternatives:
  - the woman, his secondary wife
  lexicon: HALOT
  rationale: The appositional structure is preserved. 'Concubine' is the standard
    rendering for פִילֶגֶשׁ and is more precise than explanatory paraphrase in the
    main text.
- source_word: נֹפֶלֶת
  chosen: was lying
  alternatives:
  - had fallen
  - was fallen
  - lay fallen
  lexicon: HALOT
  rationale: Although the participle is formally 'falling/fallen,' in context it describes
    her state at the doorway. 'Was lying' communicates the resultant posture in idiomatic
    English without overstating the aspect. The more literal 'fallen' is preserved
    as an alternative.
- source_word: פֶּתַח הַבַּיִת
  chosen: at the entrance of the house
  alternatives:
  - at the doorway of the house
  - at the opening of the house
  lexicon: HALOT
  rationale: פֶּתַח denotes the entrance/opening. 'Entrance of the house' is clear
    and fits the scene; 'doorway' is also possible.
- source_word: וְיָדֶיהָ עַל הַסַּף
  chosen: with her hands on the threshold
  alternatives:
  - and her hands were on the threshold
  lexicon: HALOT
  rationale: The Hebrew is a verbless clause appended to the description. English
    idiom is smoother with 'with her hands on the threshold,' while preserving the
    vivid image. 'Threshold' accurately renders סַף.
