id: JDG.19.8
reference: Judges 19:8
source:
  edition: WLC
  text: וַ/יַּשְׁכֵּ֨ם בַּ/בֹּ֜קֶר בַּ/יּ֣וֹם הַ/חֲמִישִׁי֮ לָ/לֶכֶת֒ וַ/יֹּ֣אמֶר אֲבִ֣י הַֽ/נַּעֲרָ֗ה סְעָד נָא֙ לְבָ֣בְ/ךָ֔ וְ/הִֽתְמַהְמְה֖וּ עַד נְט֣וֹת הַ/יּ֑וֹם וַ/יֹּאכְל֖וּ שְׁנֵי/הֶֽם׀־־׃
translation:
  text: He got up early in the morning on the fifth day to go[a], but the young woman's father said, “Please strengthen your heart with a little food, and delay until the day declines.” So the two of them ate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'strengthen your heart.' This is an idiom for taking food and regaining strength.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  chosen: He got up early
  alternatives:
  - He rose early
  - He arose early
  lexicon: HALOT
  rationale: The verb from שׁכם in the Hiphil commonly means to rise early/start early. 'Got up early' is natural modern English and preserves the temporal emphasis without archaic tone.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - early in the morning
  lexicon: HALOT
  rationale: Rendered with the normal temporal phrase 'in the morning.' The adverbial force of early rising is already carried by וַיַּשְׁכֵּם, though English idiom combines them smoothly as 'got up early in the morning.'
- source_word: בַּיּוֹם הַחֲמִישִׁי
  chosen: on the fifth day
  alternatives:
  - on day five
  lexicon: HALOT
  rationale: Straightforward temporal expression. 'On the fifth day' is the standard and clearest English rendering.
- source_word: לָלֶכֶת
  chosen: to go
  alternatives:
  - to leave
  - to depart
  lexicon: HALOT
  rationale: הלך is broadly 'to go.' In context it implies departure, but 'to go' stays closer to the Hebrew while remaining idiomatic.
- source_word: אֲבִי הַנַּעֲרָה
  chosen: the young woman's father
  alternatives:
  - the girl's father
  lexicon: HALOT
  rationale: נַעֲרָה denotes a young woman/girl. Given the marital context of the narrative, 'young woman' is more fitting and less diminutive than 'girl.' The construct phrase is rendered naturally in English.
- source_word: סְעָד נָא לְבָבְךָ
  chosen: Please strengthen your heart with a morsel of food
  alternatives:
  - Please refresh yourself with some food
  - Please sustain your heart
  lexicon: HALOT
  rationale: The idiom literally means 'support/strengthen your heart.' In context it refers to taking food before travel. The chosen rendering preserves the Hebrew imagery ('heart') while clarifying the practical sense with 'with a morsel of food,' which is implied by the idiom and context.
- source_word: וְהִתְמַהְמְהוּ
  chosen: and wait
  alternatives:
  - and linger
  - and delay
  lexicon: HALOT
  rationale: The Hitpael of מהה conveys tarrying or delaying. Since the speaker is urging them not to leave immediately, 'wait' is the clearest idiomatic choice; 'linger' is possible but slightly less direct in contemporary English.
- source_word: עַד נְטוֹת הַיּוֹם
  chosen: until the day declines
  alternatives:
  - until the day turns
  - until late in the day
  - until the day leans toward evening
  lexicon: HALOT
  rationale: The infinitive of נטה with 'day' is an idiom for the day turning/declining toward evening. 'Until the day declines' is concise, natural, and preserves the temporal image better than a flat paraphrase.
- source_word: וַיֹּאכְלוּ שְׁנֵיהֶם
  chosen: So the two of them ate
  alternatives:
  - and both of them ate
  lexicon: HALOT
  rationale: The Hebrew explicitly marks the pair with 'the two of them.' The translation preserves that emphasis. 'So' reflects the narrative consequence of the father's request.
