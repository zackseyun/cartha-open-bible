id: JDG.19.23
reference: Judges 19:23
source:
  edition: WLC
  text: וַ/יֵּצֵ֣א אֲלֵי/הֶ֗ם הָ/אִישׁ֙ בַּ֣עַל הַ/בַּ֔יִת וַ/יֹּ֣אמֶר אֲלֵ/הֶ֔ם אַל
    אַחַ֖/י אַל תָּרֵ֣עוּ נָ֑א אַ֠חֲרֵי אֲשֶׁר בָּ֞א הָ/אִ֤ישׁ הַ/זֶּה֙ אַל בֵּיתִ֔/י
    אַֽל תַּעֲשׂ֖וּ אֶת הַ/נְּבָלָ֥ה הַ/זֹּֽאת־־־־־־׃
translation:
  text: Then the man, the master of the house, went out to them and said to them,
    “No, my brothers, please do not act wickedly. After this man has come into my
    house, do not do this disgraceful thing.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “this vile thing” or “this outrageous act.” The Hebrew term denotes a
      shameful, morally outrageous deed.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעַל הַבַּיִת
  chosen: the master of the house
  alternatives:
  - the owner of the house
  - the host
  - the lord of the house
  lexicon: HALOT
  rationale: בַּעַל with הַבַּיִת denotes the man in charge of the household. 'Master
    of the house' preserves the idiomatic sense and social authority more clearly
    than the flatter 'owner' or the more interpretive 'host.'
- source_word: אַחַי
  chosen: my brothers
  alternatives:
  - my brothers and friends
  - my kinsmen
  - my friends
  lexicon: HALOT
  rationale: Literally 'my brothers.' In context it functions as a direct address
    to fellow townsmen, but the translation philosophy prefers gender-accurate renderings
    where the source is masculine. The broader social sense can be inferred without
    replacing the lexical form.
- source_word: תָּרֵעוּ
  chosen: do not act wickedly
  alternatives:
  - do not do evil
  - do not do wrong
  lexicon: HALOT
  rationale: From רעע, here a moral prohibition. 'Act wickedly' captures the ethical
    force and fits the urgent rebuke better than the more generic 'do wrong.'
- source_word: נָא
  chosen: please
  alternatives:
  - I beg you
  lexicon: HALOT
  rationale: נָא adds entreaty and urgency. 'Please' is the most natural modern English
    equivalent.
- source_word: אַחֲרֵי אֲשֶׁר בָּא ... אֶל/בֵּיתִי
  chosen: After this man has come into my house
  alternatives:
  - Since this man has come into my house
  - Now that this man has entered my house
  lexicon: HALOT
  rationale: 'The construction marks the circumstance that heightens the offense:
    the guest has come under the speaker''s roof. ''After'' is a straightforward rendering
    of אַחֲרֵי אֲשֶׁר here, though the sense overlaps with ''since/now that.'' ''Into
    my house'' makes explicit the motion implied by בוא with ''house'' as destination.'
- source_word: הַנְּבָלָה הַזֹּאת
  chosen: this disgraceful thing
  alternatives:
  - this vile thing
  - this outrageous act
  - this folly
  lexicon: HALOT
  rationale: נְבָלָה denotes an outrageous, shameful act, often with serious moral
    overtones. 'Disgraceful thing' communicates both shame and moral revulsion in
    accessible English. 'Folly' would sound too mild in modern usage.
- source_word: וַיֵּצֵא אֲלֵיהֶם
  chosen: went out to them
  alternatives:
  - came out to them
  lexicon: HALOT
  rationale: A simple narrative wayyiqtol of יצא. 'Went out to them' is the most direct
    rendering.
