id: JDG.19.21
reference: Judges 19:21
source:
  edition: WLC
  text: וַ/יְבִיאֵ֣/הוּ לְ/בֵית֔/וֹ וַ/יָּ֖בָול לַ/חֲמוֹרִ֑ים וַֽ/יִּרְחֲצוּ֙ רַגְלֵי/הֶ֔ם
    וַ/יֹּאכְל֖וּ וַ/יִּשְׁתּֽוּ׃
translation:
  text: So he brought him into his house and fed the donkeys. Then they washed their
    feet and ate and drank.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'mixed feed for the donkeys.'
    reason: lexical_alternative
  - marker: b
    text: Foot-washing was a customary act of hospitality in the ancient Near East.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְבִיאֵהוּ
  chosen: he brought him
  alternatives:
  - he led him in
  - he took him
  lexicon: HALOT
  rationale: From בוא/ביא in the Hiphil, meaning to cause someone to come or bring.
    'Brought him' is natural English and preserves the host's action toward the Levite.
- source_word: לְבֵיתוֹ
  chosen: into his house
  alternatives:
  - to his house
  lexicon: HALOT
  rationale: The preposition ל with 'house' after a verb of motion can be rendered
    'to' or 'into.' 'Into his house' best reflects the completed movement into the
    dwelling.
- source_word: וַיָּבָול
  chosen: fed
  alternatives:
  - mixed fodder for
  - provided provender for
  lexicon: HALOT
  rationale: From בלל, literally 'to mix,' here used idiomatically of preparing or
    mixing feed for animals. 'Fed' communicates the sense clearly in modern English
    without unnecessary archaism.
- source_word: לַחֲמוֹרִים
  chosen: the donkeys
  alternatives:
  - the asses
  lexicon: HALOT
  rationale: חמור means 'donkey.' 'Donkeys' is standard modern English; 'asses' is
    archaic and potentially distracting.
- source_word: וַיִּרְחֲצוּ רַגְלֵיהֶם
  chosen: they washed their feet
  alternatives:
  - they bathed their feet
  lexicon: HALOT
  rationale: A common hospitality action in the ancient Near East. The plural subject
    naturally refers to the guests/party. 'Washed their feet' is the straightforward
    rendering.
- source_word: וַיֹּאכְלוּ וַיִּשְׁתּוּ
  chosen: ate and drank
  alternatives:
  - had something to eat and drink
  lexicon: HALOT
  rationale: Simple sequential narration. 'Ate and drank' preserves the concise Hebrew
    style while remaining idiomatic.
