id: JDG.19.17
reference: Judges 19:17
source:
  edition: WLC
  text: וַ/יִּשָּׂ֣א עֵינָ֗י/ו וַ/יַּ֛רְא אֶת הָ/אִ֥ישׁ הָ/אֹרֵ֖חַ בִּ/רְחֹ֣ב הָ/עִ֑יר
    וַ/יֹּ֨אמֶר הָ/אִ֧ישׁ הַ/זָּקֵ֛ן אָ֥נָה תֵלֵ֖ךְ וּ/מֵ/אַ֥יִן תָּבֽוֹא־׃
translation:
  text: He looked up and saw the traveler in the open square of the city, and the
    old man said, “Where are you going, and where do you come from?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the wayfarer” or “the guest.” The Hebrew term refers to one who is traveling
      and, by extension in hospitality contexts, a guest.
    reason: lexical_alternative
  - marker: b
    text: Or “in the street of the city.” The Hebrew more specifically denotes a broad
      public place or square.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא עֵינָיו
  chosen: He looked up
  alternatives:
  - He lifted his eyes
  - He raised his eyes
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'he lifted his eyes,' but in English
    'looked up' naturally conveys the act of directing one's gaze and fits optimal
    equivalence without loss of meaning.
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - noticed
  lexicon: HALOT
  rationale: Basic visual perception is in view. 'Saw' is the most direct rendering;
    'noticed' is possible contextually but slightly more interpretive.
- source_word: הָאִישׁ הָאֹרֵחַ
  chosen: the traveler
  alternatives:
  - the wayfarer
  - the guest
  - the man, the traveler
  lexicon: HALOT
  rationale: אֹרֵחַ denotes one on a journey, a traveler/wayfarer, and in context
    identifies the Levite as a passing stranger. 'Traveler' is clear modern English.
    'Guest' would lean too far toward hospitality status rather than movement; 'wayfarer'
    is accurate but archaic.
- source_word: בִּרְחֹב הָעִיר
  chosen: in the open square of the city
  alternatives:
  - in the street of the city
  - in the town square
  lexicon: HALOT
  rationale: רְחוֹב commonly refers to a broad public place or square rather than
    a narrow street. 'Open square' preserves that sense. 'Town square' is idiomatic
    but slightly more contemporary; 'street' is less precise.
- source_word: הָאִישׁ הַזָּקֵן
  chosen: the old man
  alternatives:
  - the elderly man
  - the older man
  lexicon: HALOT
  rationale: The phrase straightforwardly identifies the speaker as an old man. 'Old
    man' is the most natural and direct rendering in narrative English.
- source_word: אָנָה
  chosen: Where
  alternatives:
  - To where
  lexicon: HALOT
  rationale: The interrogative asks destination. English normally expresses this simply
    as 'Where are you going?' though the Hebrew more literally has a directional nuance.
- source_word: תֵלֵךְ
  chosen: are you going
  alternatives:
  - will you go
  - do you go
  lexicon: HALOT
  rationale: The imperfect here functions naturally as a present/future question in
    context. English present progressive best fits the immediate conversational setting.
- source_word: וּמֵאַיִן
  chosen: and where ... from
  alternatives:
  - and from where
  - and whence
  lexicon: HALOT
  rationale: The compound preposition/interrogative explicitly asks origin, 'from
    where.' In idiomatic English this is best rendered 'where do you come from?' while
    preserving the contrast with destination.
- source_word: תָּבֹוא
  chosen: do you come
  alternatives:
  - are you coming
  - have you come
  lexicon: HALOT
  rationale: In this travel inquiry, the verb asks place of origin. 'Do you come'
    in the full clause 'where do you come from?' is idiomatic and accurate.
