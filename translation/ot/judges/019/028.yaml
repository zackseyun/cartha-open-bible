id: JDG.19.28
reference: Judges 19:28
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר אֵלֶ֛י/הָ ק֥וּמִי וְ/נֵלֵ֖כָה וְ/אֵ֣ין עֹנֶ֑ה וַ/יִּקָּחֶ֨/הָ֙ עַֽל הַ/חֲמ֔וֹר וַ/יָּ֣קָם הָ/אִ֔ישׁ וַ/יֵּ֖לֶךְ לִ/מְקֹמֽ/וֹ־׃
translation:
  text: He said to her[a], “Get up, and let us go.” But there was no answer. Then he put her on the donkey[c][b], and the man rose and went to his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'and there was no answerer' or 'and there was no one answering.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'Then he took her onto the donkey.' The Hebrew verb is literally 'took,' here in the sense of placing or lifting her onto the animal.
    reason: lexical_alternative
  - marker: c
    text: 'Or, ''went to his home.'' Hebrew: ''to his place.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלֶיהָ
  chosen: He said to her
  alternatives:
  - And he said to her
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative sequence; English can omit the initial 'and' for natural style without loss of meaning.
- source_word: קוּמִי
  chosen: Get up
  alternatives:
  - Arise
  - Stand up
  lexicon: HALOT
  rationale: Second feminine singular imperative of קום addressed to the woman. 'Get up' is natural modern English and preserves the direct command.
- source_word: וְנֵלֵכָה
  chosen: and let us go
  alternatives:
  - and we will go
  - and let us be going
  lexicon: HALOT
  rationale: Cohortative first common plural expresses exhortation or resolve. 'Let us go' best captures the volitional sense.
- source_word: וְאֵין עֹנֶה
  chosen: But there was no answer
  alternatives:
  - and there was no one answering
  - but no one answered
  lexicon: HALOT
  rationale: Literally 'and there is no answering/answerer.' The idiom indicates lack of response. 'There was no answer' is concise and natural; 'But' reflects the adversative sense in context after his speech.
- source_word: וַיִּקָּחֶהָ
  chosen: Then he put her
  alternatives:
  - Then he took her
  - Then he lifted her
  lexicon: HALOT
  rationale: לקח basically means 'take,' but with עַל הַחֲמוֹר the contextual sense is placing or lifting her onto the animal. 'Put her' communicates the action clearly in English.
- source_word: עַל הַחֲמוֹר
  chosen: on the donkey
  alternatives:
  - upon the donkey
  - on the ass
  lexicon: HALOT
  rationale: חמור is the common domestic pack animal, best rendered 'donkey' in contemporary English.
- source_word: וַיָּקָם הָאִישׁ
  chosen: and the man rose
  alternatives:
  - and the man got up
  - and the man set out
  lexicon: HALOT
  rationale: קום is retained distinctly from the following הלך. 'Rose' preserves the narrative sequence without collapsing it into 'set out'.
- source_word: וַיֵּלֶךְ לִמְקֹמוֹ
  chosen: and went to his place
  alternatives:
  - and went to his home
  - and went to his own place
  lexicon: HALOT
  rationale: מקום is broadly 'place.' In context it likely refers to his home/locality, but 'his place' stays closer to the Hebrew while remaining intelligible.
