theological_decisions:
- issue: Judges refrain about kingship
  chosen_reading: when there was no king in Israel
  alternative_readings:
  - and there was no king in Israel
  rationale: The verse's wording is preserved without importing an evaluative theological claim beyond the text itself. The translation keeps the refrain intact as narrative context rather than explicitly interpreting it as endorsement of monarchy.
  doctrine_reference: Preserve theological tension rather than resolve it.
