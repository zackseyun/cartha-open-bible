id: JDG.19.1
reference: Judges 19:1
source:
  edition: WLC
  text: וַ/יְהִי֙ בַּ/יָּמִ֣ים הָ/הֵ֔ם וּ/מֶ֖לֶךְ אֵ֣ין בְּ/יִשְׂרָאֵ֑ל וַ/יְהִ֣י אִ֣ישׁ לֵוִ֗י גָּ֚ר בְּ/יַרְכְּתֵ֣י הַר אֶפְרַ֔יִם וַ/יִּֽקַּֽח ל/וֹ֙ אִשָּׁ֣ה פִילֶ֔גֶשׁ מִ/בֵּ֥ית לֶ֖חֶם יְהוּדָֽה׀־־׃
translation:
  text: And it happened in those days[a], when there was no king in Israel, that a Levite man was dwelling in the remote parts of the hill country of Ephraim, and he took for himself a woman, a concubine[b], from Bethlehem in Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and there was no king in Israel.' The Hebrew uses a coordinate clause that can be rendered either as a separate statement or as temporal background.
    reason: alternative_reading
  - marker: b
    text: '''Concubine'' refers to a woman in a recognized union of lower social status than a wife, not merely a casual partner.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new episode. 'And it happened' preserves the Hebrew narrative formula without archaic English.
- source_word: בַּיָּמִים הָהֵם
  chosen: in those days
  alternatives:
  - during those days
  lexicon: HALOT
  rationale: Standard temporal expression in Judges. 'In those days' is idiomatic and preserves the literary refrain.
- source_word: וּמֶלֶךְ אֵין בְּיִשְׂרָאֵל
  chosen: when there was no king in Israel
  alternatives:
  - and there was no king in Israel
  lexicon: HALOT
  rationale: The clause is formally coordinate but functions adverbially to set the sociopolitical context. 'When there was no king in Israel' reads naturally in English while preserving the repeated refrain of Judges.
- source_word: אִישׁ לֵוִי
  chosen: a Levite man
  alternatives:
  - a Levite
  - a man, a Levite
  lexicon: HALOT
  rationale: The Hebrew explicitly includes both 'man' and 'Levite.' Rendering both preserves the source wording and avoids losing the appositional force, though English smoothness is slightly reduced.
- source_word: גָּר
  chosen: was dwelling
  alternatives:
  - was sojourning
  - was residing
  - was living
  lexicon: HALOT
  rationale: גור often carries the sense of residing as a temporary or dependent settler. 'Was dwelling' is natural English and broad enough to include that nuance without overpressing 'sojourning' in this context.
- source_word: בְּיַרְכְּתֵי
  chosen: in the remote parts of
  alternatives:
  - in the far reaches of
  - in the recesses of
  - on the outskirts of
  lexicon: HALOT
  rationale: The noun denotes extremities or remote/rear parts. 'Remote parts' best conveys geographical marginality in clear modern English.
- source_word: הַר אֶפְרַיִם
  chosen: the hill country of Ephraim
  alternatives:
  - the mountains of Ephraim
  - Mount Ephraim
  lexicon: HALOT
  rationale: This phrase commonly refers to the hill country region, not a single mountain. 'Hill country of Ephraim' is the most accurate regional rendering.
- source_word: וַיִּקַּח לוֹ
  chosen: and he took for himself
  alternatives:
  - and he took
  - and he acquired for himself
  lexicon: HALOT
  rationale: לקח plus לּוֹ marks taking a woman for oneself, i.e., entering a marital/sexual union. 'For himself' preserves the reflexive nuance present in the Hebrew.
- source_word: אִשָּׁה פִילֶגֶשׁ
  chosen: a woman, a concubine
  alternatives:
  - a concubine
  - a wife, a concubine
  lexicon: HALOT
  rationale: Both nouns are present and significant. The construction identifies her as a woman in the socially specific status of concubine. Retaining both terms reflects the Hebrew rather than flattening it to one English word.
- source_word: מִבֵּית לֶחֶם יְהוּדָה
  chosen: from Bethlehem in Judah
  alternatives:
  - from Bethlehem of Judah
  lexicon: HALOT
  rationale: Geographical designation distinguishing this Bethlehem from others. 'In Judah' is clear contemporary English while preserving the tribal location.
