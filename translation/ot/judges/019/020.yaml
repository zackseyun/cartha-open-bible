id: JDG.19.20
reference: Judges 19:20
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר הָ/אִ֤ישׁ הַ/זָּקֵן֙ שָׁל֣וֹם לָ֔/ךְ רַ֥ק כָּל מַחְסוֹרְ/ךָ֖ עָלָ֑/י
    רַ֥ק בָּ/רְח֖וֹב אַל תָּלַֽן־־׃
translation:
  text: The old man said, “Peace to you. Only let all your needs be my responsibility;
    only do not spend the night in the open square.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in the street.” The Hebrew term refers more specifically to a public
      open area or square within the town.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאִישׁ הַזָּקֵן
  chosen: The old man
  alternatives:
  - the elderly man
  - the old האיש/man
  lexicon: HALOT
  rationale: Idiomatic English combines the noun and adjective into 'the old man.'
    'Elderly man' is possible but slightly more clinical; 'old man' best matches normal
    narrative style.
- source_word: שָׁלוֹם לָךְ
  chosen: Peace to you
  alternatives:
  - Peace be to you
  - All is well with you
  - Do not worry
  lexicon: HALOT
  rationale: שָׁלוֹם here functions as a reassurance/greeting formula. 'Peace to you'
    preserves the lexical content of shalom without over-paraphrasing. More idiomatic
    expansions like 'Do not worry' capture the sense but move too far from the wording.
- source_word: רַק
  chosen: Only
  alternatives:
  - just
  - however
  lexicon: HALOT
  rationale: The particle marks limitation/emphasis. 'Only' works well in both occurrences,
    preserving the rhetorical structure of the Hebrew.
- source_word: כָּל מַחְסוֹרְךָ
  chosen: all your needs
  alternatives:
  - everything you lack
  - all your wants
  lexicon: HALOT
  rationale: מַחְסוֹר denotes lack or need. 'All your needs' is natural English and
    fits the hospitable offer in context. 'Everything you lack' is more literal but
    less idiomatic.
- source_word: עָלַי
  chosen: be my responsibility
  alternatives:
  - is on me
  - is upon me
  lexicon: HALOT
  rationale: Literally 'upon me,' meaning the speaker takes responsibility for provision.
    'Be my responsibility' makes the idiom clear in contemporary English while preserving
    the sense of personal obligation.
- source_word: בָּרְחוֹב
  chosen: in the open square
  alternatives:
  - in the street
  - in the town square
  - in the plaza
  lexicon: HALOT
  rationale: רְחוֹב refers to an open public place/plaza within a town, not merely
    a roadway. 'Open square' preserves the public, exposed setting that motivates
    the warning.
- source_word: אַל תָּלַן
  chosen: do not spend the night
  alternatives:
  - do not lodge
  - do not stay overnight
  lexicon: HALOT
  rationale: The verb לון means to lodge or remain overnight. 'Do not spend the night'
    is clear, natural English and fits the imperative warning.
