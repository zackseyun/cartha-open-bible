id: JDG.19.10
reference: Judges 19:10
source:
  edition: WLC
  text: וְ/לֹֽא אָבָ֤ה הָ/אִישׁ֙ לָ/ל֔וּן וַ/יָּ֣קָם וַ/יֵּ֗לֶךְ וַ/יָּבֹא֙ עַד נֹ֣כַח
    יְב֔וּס הִ֖יא יְרוּשָׁלִָ֑ם וְ/עִמּ֗/וֹ צֶ֤מֶד חֲמוֹרִים֙ חֲבוּשִׁ֔ים וּ/פִילַגְשׁ֖/וֹ
    עִמּֽ/וֹ־־׃
translation:
  text: But the man was not willing to spend the night. He rose and went and came
    to a place opposite Jebus (that is, Jerusalem), and with him were a pair of saddled
    donkeys and his concubine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the vicinity of Jebus' or 'to a point facing Jebus.' The Hebrew expression
      indicates a location opposite or before the city rather than clearly inside
      it.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבָה
  chosen: was not willing
  alternatives:
  - did not want
  - refused
  lexicon: HALOT
  rationale: The verb denotes willingness/consent rather than mere desire. 'Was not
    willing' preserves the nuance of deliberate refusal without overstating hostility.
- source_word: לָלוּן
  chosen: to spend the night
  alternatives:
  - to lodge
  - to stay overnight
  lexicon: HALOT
  rationale: The infinitive refers specifically to remaining overnight. 'Spend the
    night' is natural modern English and more accessible than 'lodge'.
- source_word: וַיָּקָם וַיֵּלֶךְ וַיָּבֹא
  chosen: He rose and went and came
  alternatives:
  - he got up and went and arrived
  - he set out and came
  lexicon: HALOT
  rationale: The Hebrew uses a sequence of wayyiqtol verbs narrating consecutive action.
    Retaining the threefold sequence reflects the narrative pacing better than collapsing
    them.
- source_word: עַד נֹכַח
  chosen: to a place opposite
  alternatives:
  - as far as opposite
  - to the vicinity of
  - to a point facing
  lexicon: HALOT
  rationale: The phrase indicates arrival at a point opposite or in front of Jebus,
    not necessarily entry into the city. 'To a place opposite' makes the spatial sense
    explicit in idiomatic English.
- source_word: יְבוּס הִיא יְרוּשָׁלָם
  chosen: Jebus (that is, Jerusalem)
  alternatives:
  - Jebus, that is Jerusalem
  lexicon: HALOT
  rationale: The appositional clarification identifies the older name Jebus with Jerusalem.
    Parentheses communicate the explanatory aside clearly in English.
- source_word: צֶמֶד חֲמוֹרִים
  chosen: a pair of donkeys
  alternatives:
  - a couple of donkeys
  - a yoke/pair of asses
  lexicon: HALOT
  rationale: צֶמֶד with animals denotes a pair. 'Donkeys' is standard modern English
    over the archaic 'asses'.
- source_word: חֲבוּשִׁים
  chosen: saddled
  alternatives:
  - loaded
  - bound on
  - equipped
  lexicon: HALOT
  rationale: In context with donkeys prepared for travel, the passive participle most
    naturally means outfitted with saddles or gear. 'Saddled' is the clearest concise
    rendering.
- source_word: פִּילַגְשׁוֹ
  chosen: his concubine
  alternatives:
  - his secondary wife
  lexicon: HALOT
  rationale: The Hebrew term specifically denotes a concubine; retaining the established
    term is more precise than paraphrasing the social status.
