id: JDG.19.6
reference: Judges 19:6
source:
  edition: WLC
  text: וַ/יֵּשְׁב֗וּ וַ/יֹּאכְל֧וּ שְׁנֵי/הֶ֛ם יַחְדָּ֖ו וַ/יִּשְׁתּ֑וּ וַ/יֹּ֜אמֶר
    אֲבִ֤י הַֽ/נַּעֲרָה֙ אֶל הָ/אִ֔ישׁ הֽוֹאֶל נָ֥א וְ/לִ֖ין וְ/יִטַ֥ב לִבֶּֽ/ךָ־־׃
translation:
  text: So the two of them sat and ate and drank together. Then the young woman's
    father said to the man, "Please, be willing to spend the night, and let your heart
    be merry."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Please consent to lodge, and let your heart be merry."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשְׁבוּ
  chosen: sat down
  alternatives:
  - sat
  - remained
  lexicon: HALOT
  rationale: From ישׁב, here in narrative sequence introducing the meal. 'Sat down'
    makes the action natural in English in connection with eating, without adding
    more than the context suggests.
- source_word: וַיֹּאכְלוּ
  chosen: ate
  lexicon: HALOT
  rationale: Straightforward rendering of אכל in the wayyiqtol narrative chain.
- source_word: שְׁנֵיהֶם יַחְדָּו
  chosen: the two of them together
  alternatives:
  - both of them together
  - the two together
  lexicon: HALOT
  rationale: Preserves the emphatic pairing of 'the two of them' with יחדו. In English
    this is best expressed idiomatically as 'the two of them ... together.'
- source_word: וַיִּשְׁתּוּ
  chosen: drank
  lexicon: HALOT
  rationale: Direct rendering of שתה. No object is supplied in Hebrew, so none is
    added in English.
- source_word: אֲבִי הַנַּעֲרָה
  chosen: the young woman's father
  alternatives:
  - the girl's father
  lexicon: HALOT
  rationale: נַעֲרָה commonly denotes a young woman/maiden. 'Young woman' is more
    natural and appropriately dignified in modern English than 'girl' in this context.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the husband
  lexicon: HALOT
  rationale: Although the broader context identifies him as the Levite/husband-like
    figure, the Hebrew here simply says 'the man,' so the translation preserves that
    wording.
- source_word: הוֹאֶל נָא
  chosen: Please, be willing
  alternatives:
  - Please consent
  - Please agree
  lexicon: HALOT
  rationale: The verb יאל expresses willingness or consent, and נָא adds politeness/entreaty.
    'Please, be willing' preserves the courteous urging better than a flat imperative.
- source_word: וְלִין
  chosen: to stay the night
  alternatives:
  - lodge
  - spend the night
  lexicon: HALOT
  rationale: לון means to lodge or remain overnight. 'Stay the night' is clear, natural
    modern English.
- source_word: וְיִטַב לִבֶּךָ
  chosen: let your heart be glad
  alternatives:
  - let your heart be merry
  - and may your heart be good
  lexicon: HALOT
  rationale: Literally 'and let your heart be good/pleasant.' In this hospitality
    setting it idiomatically conveys cheer/gladness. 'Let your heart be glad' preserves
    the heart-language while communicating the idiom clearly.
