id: JDG.19.15
reference: Judges 19:15
source:
  edition: WLC
  text: וַ/יָּסֻ֣רוּ שָׁ֔ם לָ/ב֖וֹא לָ/ל֣וּן בַּ/גִּבְעָ֑ה וַ/יָּבֹ֗א וַ/יֵּ֨שֶׁב֙ בִּ/רְח֣וֹב הָ/עִ֔יר וְ/אֵ֥ין אִ֛ישׁ מְאַסֵּֽף אוֹתָ֥/ם הַ/בַּ֖יְתָ/ה לָ/לֽוּן־׃
translation:
  text: They turned aside there to go in and spend the night at Gibeah[a]. He went in and sat down in the open square of the city[b], and there was no man gathering them into his house to spend the night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the street of the city'; the Hebrew term can denote a broad public place or square.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'no man,' meaning no resident offered them hospitality.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסֻרוּ
  chosen: They turned aside
  alternatives:
  - they stopped
  - they went aside
  lexicon: HALOT
  rationale: סור in the wayyiqtol here denotes deviating from the road or turning aside from the journey route, not merely stopping. 'Turned aside' preserves the travel-context nuance.
- source_word: לָבוֹא
  chosen: to go in
  alternatives:
  - to enter
  lexicon: HALOT
  rationale: בוא commonly means 'come/go in, enter.' 'Go in' fits the directional sense from the travelers' perspective and reads naturally with the following infinitive 'to spend the night.'
- source_word: לָלוּן
  chosen: to spend the night
  alternatives:
  - to lodge
  - to stay overnight
  lexicon: HALOT
  rationale: לון refers to remaining overnight. 'Spend the night' is clear modern English and avoids archaic 'lodge' while preserving the concrete sense.
- source_word: בַּגִּבְעָה
  chosen: at Gibeah
  alternatives:
  - in Gibeah
  lexicon: HALOT
  rationale: The place name is transliterated per project policy. 'At Gibeah' works idiomatically with the travel verb sequence, though 'in Gibeah' would also be possible.
- source_word: וַיָּבֹא
  chosen: He went in
  alternatives:
  - he entered
  lexicon: HALOT
  rationale: The verb shifts to singular, referring to the leading traveler/Levite as representative of the group. 'Went in' keeps the narrative movement and mirrors לָבוֹא earlier.
- source_word: וַיֵּשֶׁב
  chosen: sat down
  alternatives:
  - sat
  - remained seated
  lexicon: HALOT
  rationale: ישב often means 'sit, dwell, remain.' In this immediate scene of arrival in the square, 'sat down' best conveys taking a place while waiting for hospitality.
- source_word: בִּרְחוֹב הָעִיר
  chosen: in the open square of the city
  alternatives:
  - in the street of the city
  - in the town square
  lexicon: HALOT
  rationale: רחוב in many contexts denotes a broad public place or square rather than a narrow street. 'Open square' preserves the public-space sense and avoids anachronistic urban assumptions.
- source_word: וְאֵין אִישׁ
  chosen: and there was no man
  alternatives:
  - and no one was there
  - and there was no person
  lexicon: HALOT
  rationale: The Hebrew explicitly uses אִישׁ, a masculine singular noun. Per gender-accurate policy, 'man' is retained rather than neutralizing to 'one,' while the sense remains generic in context.
- source_word: מְאַסֵּף
  chosen: taking them in
  alternatives:
  - gathering them in
  - receiving them
  lexicon: HALOT
  rationale: אסף literally means gather/bring in. In hospitality context it refers to bringing travelers under one's roof. 'Taking them in' is idiomatic and contextually precise.
- source_word: הַבַּיְתָה
  chosen: into his house
  alternatives:
  - home
  - into the house
  lexicon: HALOT
  rationale: The directional ending indicates movement toward the house. Because the implied subject is 'no man,' English naturally supplies 'his house' to make the hospitality sense explicit without adding new content.
