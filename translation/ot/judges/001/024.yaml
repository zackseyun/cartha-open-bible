theological_decisions:
- issue: Rendering of חֶסֶד
  chosen_reading: kindness/favorable treatment rather than covenant-faithfulness language
  alternative_readings:
  - covenant loyalty
  - steadfast love
  rationale: Although חֶסֶד can carry rich covenantal significance, in this narrative
    negotiation the term most naturally refers to an act of mercy or kindness toward
    the man. A more theologically loaded rendering would overstate the context.
