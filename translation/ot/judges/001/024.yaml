id: JDG.1.24
reference: Judges 1:24
source:
  edition: WLC
  text: וַ/יִּרְאוּ֙ הַ/שֹּׁ֣מְרִ֔ים אִ֖ישׁ יוֹצֵ֣א מִן הָ/עִ֑יר וַ/יֹּ֣אמְרוּ ל֗/וֹ
    הַרְאֵ֤/נוּ נָא֙ אֶת מְב֣וֹא הָ/עִ֔יר וְ/עָשִׂ֥ינוּ עִמְּ/ךָ֖ חָֽסֶד־־׃
translation:
  text: The watchers saw a man coming out of the city, and they said to him, “Please
    show us the entrance to the city, and we will deal kindly with you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “show us the way into the city.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew hesed; often rendered “kindness,” “loyalty,” or “steadfast love,”
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֹּׁמְרִים
  chosen: the watchers
  alternatives:
  - the guards
  - those watching
  - the scouts
  lexicon: HALOT
  rationale: From שמר in the participial form, referring to those keeping watch outside
    the city. 'Watchers' preserves the verbal sense without over-specifying a formal
    military rank; 'guards' is possible but may imply city defenders rather than besieging
    observers.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  lexicon: HALOT
  rationale: The singular noun straightforwardly denotes an individual male person
    here. 'A man' is gender-accurate and matches the source.
- source_word: יוֹצֵא
  chosen: coming out
  alternatives:
  - going out
  - leaving
  lexicon: HALOT
  rationale: The participle of יצא indicates movement out from the city. 'Coming out'
    fits idiomatic English from the observers' perspective; 'going out' is also possible.
- source_word: מְבוֹא
  chosen: the entrance
  alternatives:
  - the way in
  - the access point
  - the entryway
  lexicon: HALOT
  rationale: מְבוֹא denotes an entrance or point of access. In this military context
    it likely refers to the way into the city. 'Entrance' is concise and natural,
    while preserving the concrete sense.
- source_word: נָא
  chosen: please
  lexicon: HALOT
  rationale: Polite particle softening the imperative. 'Please' is the standard natural
    equivalent in modern English.
- source_word: וְעָשִׂינוּ עִמְּךָ חָסֶד
  chosen: we will deal kindly with you
  alternatives:
  - we will show you kindness
  - we will treat you with covenant loyalty
  lexicon: HALOT
  rationale: חֶסֶד can denote kindness, loyalty, or covenantal faithfulness depending
    on context. Here the immediate sense is a promised act of favorable treatment
    in exchange for information. 'Deal kindly with you' is idiomatic and preserves
    the relational sense without importing stronger covenantal overtones than the
    context warrants.
