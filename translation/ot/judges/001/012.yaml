id: JDG.1.12
reference: Judges 1:12
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר כָּלֵ֔ב אֲשֶׁר יַכֶּ֥ה אֶת קִרְיַת סֵ֖פֶר וּ/לְכָדָ֑/הּ וְ/נָתַ֥תִּי
    ל֛/וֹ אֶת עַכְסָ֥ה בִתִּ֖/י לְ/אִשָּֽׁה־־־־׃
translation:
  text: And Caleb said, “Whoever strikes Kiriath-sepher and captures it, I will give
    him my daughter Achsah as a wife.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the one who strikes Kiriath-sepher and captures it.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' is a natural
    modern rendering that preserves the sequential force without overinterpreting
    temporal nuance.
- source_word: כָּלֵב
  chosen: Caleb
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name, following the
    philosophy of transliterating names rather than translating them.
- source_word: אֲשֶׁר
  chosen: whoever
  alternatives:
  - the one who
  - he who
  lexicon: HALOT
  rationale: Introduces an indefinite relative clause. 'Whoever' is idiomatic English
    and captures the open challenge Caleb is issuing.
- source_word: יַכֶּה
  chosen: strikes
  alternatives:
  - attacks
  - defeats
  lexicon: HALOT
  rationale: The Hiphil of נכה commonly means 'strike/smite.' Here it refers to military
    action against the city. 'Strikes' preserves the lexical force while allowing
    the following verb to specify successful seizure.
- source_word: קִרְיַת סֵפֶר
  chosen: Kiriath-sepher
  alternatives:
  - Kiriath Sepher
  lexicon: HALOT
  rationale: Place name is transliterated. The hyphenated form reflects the construct
    relationship in a conventional English presentation of the toponym.
- source_word: וּלְכָדָהּ
  chosen: and captures it
  alternatives:
  - and takes it
  - and seizes it
  lexicon: HALOT
  rationale: לכד in military contexts means to capture or seize. 'Captures it' clearly
    conveys successful conquest and complements 'strikes' without redundancy.
- source_word: וְנָתַתִּי לוֹ
  chosen: I will give him
  alternatives:
  - then I will give to him
  lexicon: HALOT
  rationale: The first-person verb expresses Caleb's promise contingent on the conquest.
    English naturally omits an explicit 'then' while retaining the future commitment.
- source_word: עַכְסָה
  chosen: Achsah
  lexicon: HALOT
  rationale: Standard transliteration of the personal name.
- source_word: בִתִּי
  chosen: my daughter
  lexicon: HALOT
  rationale: Straightforward possessive construction; retaining it explicitly preserves
    the familial relationship central to the offer.
- source_word: לְאִשָּׁה
  chosen: as a wife
  alternatives:
  - for a wife
  - to be his wife
  lexicon: HALOT
  rationale: This idiom commonly denotes giving a woman in marriage. 'As a wife' is
    clear, idiomatic, and close to the Hebrew construction.
