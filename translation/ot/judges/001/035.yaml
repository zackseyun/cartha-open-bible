id: JDG.1.35
reference: Judges 1:35
source:
  edition: WLC
  text: וַ/יּ֤וֹאֶל הָֽ/אֱמֹרִי֙ לָ/שֶׁ֣בֶת בְּ/הַר חֶ֔רֶס בְּ/אַיָּל֖וֹן וּ/בְ/שַֽׁעַלְבִ֑ים
    וַ/תִּכְבַּד֙ יַ֣ד בֵּית יוֹסֵ֔ף וַ/יִּהְי֖וּ לָ/מַֽס־־׃
translation:
  text: But the Amorites persisted in dwelling in Mount Heres, in Aijalon, and in
    Shaalbim; then the hand of the house of Joseph grew heavy, and they became subject
    to forced labor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the hand of the house of Joseph prevailed,' literally 'grew heavy.'
      The Hebrew idiom can express increasing strength or oppressive power.
    reason: lexical_alternative
  - marker: b
    text: Or 'they were put to forced labor' or 'they became tributary laborers.'
      The Hebrew term refers to compulsory labor service.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹאֶל
  chosen: persisted
  alternatives:
  - was determined
  - undertook
  - consented
  - began
  lexicon: HALOT
  rationale: The verb יאל can denote willingness, determination, or undertaking. In
    this context, with the infinitive 'to dwell' and in contrast to Israel's later
    dominance, it conveys that the Amorites insisted on or persisted in remaining
    there, not mere permission or a simple beginning of action.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: Although morphologically singular, the term functions collectively for
    the people group, as shown by the later plural verb 'they became.' English idiom
    prefers the collective plural 'the Amorites'.
- source_word: לָשֶׁבֶת
  chosen: in dwelling
  alternatives:
  - to dwell
  - to remain
  lexicon: HALOT
  rationale: The infinitive complements וַיּוֹאֶל. In the full English clause, 'persisted
    in dwelling' best captures the verbal relationship and ongoing residence.
- source_word: בְּהַר חֶרֶס
  chosen: in Mount Heres
  alternatives:
  - in the hill country of Heres
  - in Har-heres
  lexicon: HALOT
  rationale: הַר is 'mountain/hill country,' and חֶרֶס is a place name here. 'Mount
    Heres' is a natural English rendering that preserves the toponym without overinterpreting
    whether a single mountain or district is meant.
- source_word: בְּאַיָּלוֹן
  chosen: in Aijalon
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
- source_word: וּבְשַׁעַלְבִים
  chosen: and in Shaalbim
  alternatives:
  - and in Shaalbim/Shaalabbin
  lexicon: HALOT
  rationale: Standard transliteration of the place name; conjunction retained.
- source_word: וַתִּכְבַּד יַד
  chosen: the hand ... grew heavy
  alternatives:
  - prevailed
  - became strong
  - pressed hard
  lexicon: HALOT
  rationale: Literally, 'the hand ... was/grew heavy.' In context it is an idiom for
    power becoming weighty or oppressive over another. I preserved the image with
    readable English rather than flattening it entirely to 'prevailed.'
- source_word: בֵּית יוֹסֵף
  chosen: the house of Joseph
  alternatives:
  - Joseph's house
  - the tribe/clan of Joseph
  lexicon: HALOT
  rationale: Formal kinship-political expression retained. It refers to the Joseph
    tribes collectively, but 'house of Joseph' is the standard and transparent rendering.
- source_word: וַיִּהְיוּ לָמַס
  chosen: they became forced labor
  alternatives:
  - they were put to forced labor
  - they became tributary laborers
  - they became subject to corvée
  lexicon: HALOT
  rationale: מַס refers to compulsory labor or labor tribute. 'Forced labor' is clear
    modern English and better reflects the term than the older 'tribute,' which can
    suggest only payment rather than conscripted service.
