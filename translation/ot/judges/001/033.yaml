id: JDG.1.33
reference: Judges 1:33
source:
  edition: WLC
  text: נַפְתָּלִ֗י לֹֽא הוֹרִ֞ישׁ אֶת יֹשְׁבֵ֤י בֵֽית שֶׁ֨מֶשׁ֙ וְ/אֶת יֹשְׁבֵ֣י
    בֵית עֲנָ֔ת וַ/יֵּ֕שֶׁב בְּ/קֶ֥רֶב הַֽ/כְּנַעֲנִ֖י יֹשְׁבֵ֣י הָ/אָ֑רֶץ וְ/יֹשְׁבֵ֤י
    בֵֽית שֶׁ֨מֶשׁ֙ וּ/בֵ֣ית עֲנָ֔ת הָי֥וּ לָ/הֶ֖ם לָ/מַֽס־־־־־־׃ס
translation:
  text: Naphtali did not drive out the inhabitants of Beth-shemesh or the inhabitants
    of Beth-anath, so he lived among the Canaanites, the inhabitants of the land.
    And the inhabitants of Beth-shemesh and Beth-anath became forced labor for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'became subject to corvée labor for them.' The Hebrew מַס refers to compulsory
      labor service, not merely payment of tribute.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹרִישׁ
  chosen: drive out
  alternatives:
  - dispossess
  - expel
  lexicon: HALOT
  rationale: In Judges this Hiphil of ירש commonly refers to removing prior inhabitants
    from the land. 'Drive out' is idiomatic modern English and preserves the military-settlement
    sense better than the more abstract 'dispossess.'
- source_word: יֹשְׁבֵי
  chosen: inhabitants
  alternatives:
  - those living in
  - residents
  lexicon: HALOT
  rationale: The participle of ישב denotes those dwelling in a place. 'Inhabitants'
    is concise and fits the repeated formula in this chapter.
- source_word: בֵית שֶׁמֶשׁ
  chosen: Beth-shemesh
  alternatives:
  - Beth Shemesh
  rationale: Place name is transliterated per translation philosophy ('translate titles;
    transliterate names'). Hyphenated conventional English form aids readability.
- source_word: בֵית עֲנָת
  chosen: Beth-anath
  alternatives:
  - Beth Anath
  rationale: Place name is transliterated rather than translated. Hyphenated conventional
    English form is retained.
- source_word: וַיֵּשֶׁב בְּקֶרֶב
  chosen: so he lived among
  alternatives:
  - and he lived in the midst of
  - and he settled among
  lexicon: HALOT
  rationale: The singular verb with tribal subject Naphtali is naturally rendered
    as a collective singular in English. 'Among' captures בְּקֶרֶב idiomatically without
    unnecessary stiffness; 'so' reflects the narrative consequence of failing to drive
    them out.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanites
  alternatives:
  - the Canaanite
  lexicon: HALOT
  rationale: Although morphologically singular, this is a collective ethnic singular
    in Hebrew. English normally renders it as the plural ethnonym here.
- source_word: יֹשְׁבֵי הָאָרֶץ
  chosen: the inhabitants of the land
  alternatives:
  - those dwelling in the land
  lexicon: HALOT
  rationale: Appositional phrase identifying the Canaanites. Retained in translation
    rather than omitted, since it is part of the Hebrew wording and sharpens the contrast
    with Naphtali living among them.
- source_word: הָיוּ לָהֶם לָמַס
  chosen: became forced labor for them
  alternatives:
  - became subject to forced labor for them
  - became tributary labor for them
  lexicon: HALOT
  rationale: מַס denotes corvée or forced labor rather than generic taxation. 'Forced
    labor' is the clearest modern rendering. 'Became ... for them' reflects the Hebrew
    היה + ל construction.
- source_word: לָהֶם
  chosen: for them
  alternatives:
  - to them
  lexicon: HALOT
  rationale: The plural pronoun likely refers to the tribe/clan members of Naphtali.
    'For them' is idiomatic with 'became forced labor' and preserves the plural, even
    though the prior tribal subject is singular collective in English.
