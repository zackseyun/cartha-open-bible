theological_decisions:
- issue: Rendering of kinship language אָחִיו
  chosen_reading: his brother
  alternative_readings:
  - his kinsman
  rationale: The text explicitly uses brother language, and in context Judah and Simeon
    are both literal tribal brothers within Israel's ancestral framework. No need
    to generalize to 'kinsman.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, gender-accurate over gender-neutral
- issue: Rendering of גוֹרָל in conquest-allotment context
  chosen_reading: allotted territory
  alternative_readings:
  - lot
  rationale: The verse concerns tribal military cooperation in assigned inheritance
    areas. Translating the metonymic sense avoids obscurity while not importing extra
    theology; the allotment concept remains explicit.
  doctrine_reference: DOCTRINE.md §Translation philosophy, optimal equivalence / original-language
    primacy
