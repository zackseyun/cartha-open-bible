id: JDG.1.3
reference: Judges 1:3
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוּדָה֩ לְ/שִׁמְע֨וֹן אָחִ֜י/ו עֲלֵ֧ה אִתִּ֣/י בְ/גוֹרָלִ֗/י
    וְ/נִֽלָּחֲמָה֙ בַּֽ/כְּנַעֲנִ֔י וְ/הָלַכְתִּ֧י גַם אֲנִ֛י אִתְּ/ךָ֖ בְּ/גוֹרָלֶ֑/ךָ
    וַ/יֵּ֥לֶךְ אִתּ֖/וֹ שִׁמְעֽוֹן־׃
translation:
  text: And Judah said to Simeon his brother, “Come up with me into my allotted territory,
    and let us fight against the Canaanites; and I too will go with you into your
    allotted territory.” So Simeon went with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'my lot' and 'your lot'; that is, the territory assigned by lot.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing the next event in sequence.
    'And' preserves Hebrew narrative flow without overinterpreting temporal nuance.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Proper name of the tribe/personified tribal entity; transliterated per
    translation philosophy.
- source_word: לְשִׁמְעוֹן אָחִיו
  chosen: to Simeon his brother
  alternatives:
  - to Simeon, his brother
  lexicon: HALOT
  rationale: Direct address/report formula. 'His brother' is retained literally, reflecting
    both kinship and tribal relationship; gender-accurate language is appropriate
    here.
- source_word: עֲלֵה אִתִּי
  chosen: Come up with me
  alternatives:
  - Go up with me
  lexicon: HALOT
  rationale: עלה commonly means 'go up,' but in direct speech English idiom prefers
    'come up' from the speaker's perspective. The upward/advancing nuance is preserved.
- source_word: בְּגוֹרָלִי
  chosen: into my allotted territory
  alternatives:
  - in my lot
  - into my lot
  - within my allotted portion
  lexicon: HALOT
  rationale: גוֹרָל literally means 'lot,' but in this conquest-allotment context
    it refers metonymically to the territory assigned by lot. 'Allotted territory'
    communicates the sense clearly in modern English while preserving the allotment
    concept.
- source_word: וְנִלָּחֲמָה
  chosen: and let us fight
  alternatives:
  - that we may fight
  - and we will fight
  lexicon: HALOT
  rationale: Cohortative first person plural expressing joint resolve/invitation.
    'Let us fight' best captures the hortatory force.
- source_word: בַּכְּנַעֲנִי
  chosen: against the Canaanites
  alternatives:
  - against the Canaanite
  lexicon: HALOT
  rationale: Though morphologically singular, the term functions collectively for
    the people group. English naturally renders the collective as plural here.
- source_word: וְהָלַכְתִּי גַם אֲנִי אִתְּךָ
  chosen: and I too will go with you
  alternatives:
  - and I also will go with you
  lexicon: HALOT
  rationale: Simple reciprocal promise. 'Too' is natural modern English for גַם אֲנִי
    and preserves the emphasis.
- source_word: בְּגוֹרָלֶךָ
  chosen: into your allotted territory
  alternatives:
  - in your lot
  - into your lot
  - within your allotted portion
  lexicon: HALOT
  rationale: Same term and contextual sense as earlier in the verse; consistency favors
    the same rendering.
- source_word: וַיֵּלֶךְ אִתּוֹ שִׁמְעוֹן
  chosen: So Simeon went with him
  alternatives:
  - And Simeon went with him
  lexicon: HALOT
  rationale: Narrative conclusion reporting Simeon's compliance. 'So' slightly clarifies
    result while remaining faithful to the sequence.
