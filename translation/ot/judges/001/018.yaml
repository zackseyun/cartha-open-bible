id: JDG.1.18
reference: Judges 1:18
source:
  edition: WLC
  text: וַ/יִּלְכֹּ֤ד יְהוּדָה֙ אֶת עַזָּ֣ה וְ/אֶת גְּבוּלָ֔/הּ וְ/אֶֽת אַשְׁקְל֖וֹן
    וְ/אֶת גְּבוּלָ֑/הּ וְ/אֶת עֶקְר֖וֹן וְ/אֶת גְּבוּלָֽ/הּ־־־־־־׃
translation:
  text: Judah captured Gaza and its territory, Ashkelon and its territory, and Ekron
    and its territory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its border' for each occurrence of 'its territory'; the Hebrew term
      can denote a boundary or the territory bounded by it.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְכֹּד
  chosen: captured
  alternatives:
  - took
  - seized
  lexicon: HALOT
  rationale: The verb לכד commonly denotes taking or capturing a city/place by force.
    'Captured' is clear modern English and fits the military context better than the
    more generic 'took.'
- source_word: יְהוּדָה
  chosen: Judah
  alternatives:
  - the tribe of Judah
  lexicon: HALOT
  rationale: The proper name here stands for the tribal entity acting corporately.
    'Judah' is the natural English rendering; expanding to 'the tribe of Judah' would
    add interpretive material not explicit in the Hebrew.
- source_word: גְּבוּלָהּ
  chosen: its territory
  alternatives:
  - its border
  - its territory around it
  - its region
  lexicon: HALOT
  rationale: גְּבוּל can mean border, boundary, territory, or region. In a conquest
    list involving cities, 'its territory' best conveys the city together with the
    surrounding district under its control, which is more idiomatic in English than
    the literal 'its border.'
- source_word: עַזָּה
  chosen: Gaza
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: אַשְׁקְלוֹן
  chosen: Ashkelon
  alternatives:
  - Askelon
  lexicon: HALOT
  rationale: Standard modern transliteration of the place name.
- source_word: עֶקְרוֹן
  chosen: Ekron
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
