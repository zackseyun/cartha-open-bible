theological_decisions:
- issue: Israel's treatment of the Canaanites
  chosen_reading: The verse states that Israel subjected the Canaanites to forced
    labor instead of fully expelling them.
  alternative_readings:
  - The verse could be softened as mere tribute payment.
  rationale: The Hebrew לָמַס indicates imposed labor rather than a neutral tax arrangement.
    The translation should not mute the coercive force of the text.
  doctrine_reference: Translation philosophy §1, §6
