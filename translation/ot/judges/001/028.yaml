id: JDG.1.28
reference: Judges 1:28
source:
  edition: WLC
  text: וַֽ/יְהִי֙ כִּֽי חָזַ֣ק יִשְׂרָאֵ֔ל וַ/יָּ֥שֶׂם אֶת הַֽ/כְּנַעֲנִ֖י לָ/מַ֑ס
    וְ/הוֹרֵ֖ישׁ לֹ֥א הוֹרִישֽׁ/וֹ־־׃ס
translation:
  text: And when Israel became strong, they put the Canaanites to forced labor, but
    they did not completely drive them out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'subjected the Canaanites to labor tribute' or 'corvée labor.' The Hebrew
      term refers to compulsory labor imposed by a ruling power.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'did not drive him out,' with singular object referring collectively
      to the Canaanite population; English renders the sense as 'them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּי
  chosen: And when
  alternatives:
  - And it happened when
  - Now when
  lexicon: HALOT
  rationale: The Hebrew narrative formula introduces a temporal clause. 'And when'
    preserves the sequence and timing without woodenly reproducing the idiom 'and
    it happened.'
- source_word: חָזַק
  chosen: became strong
  alternatives:
  - grew strong
  - was strong
  lexicon: HALOT
  rationale: In context the verb marks Israel's gaining strength or dominance. 'Became
    strong' captures the likely ingressive sense better than the stative 'was strong.'
- source_word: וַיָּשֶׂם
  chosen: put
  alternatives:
  - made
  - set
  lexicon: HALOT
  rationale: With לָמַס, the idiom means to subject someone to labor tribute or corvée.
    'Put' is natural English and preserves the causative force.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanites
  alternatives:
  - the Canaanite
  lexicon: HALOT
  rationale: Although morphologically singular, the term is a collective ethnic singular
    in context. English idiom normally renders this as the plural 'the Canaanites.'
- source_word: לָמַס
  chosen: to forced labor
  alternatives:
  - to labor tribute
  - to corvée labor
  - to taskwork
  lexicon: HALOT
  rationale: מַס denotes compulsory labor imposed by a stronger power. 'Forced labor'
    is clear modern English and better conveys the coercive sense than the traditional
    but less transparent 'tribute.'
- source_word: וְהוֹרֵישׁ לֹא הוֹרִישׁוֹ
  chosen: but they did not completely drive them out
  alternatives:
  - but they did not dispossess them
  - but they did not drive him out
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the negated action,
    so 'did not completely drive them out' reflects the emphatic construction. The
    pronominal object is singular in Hebrew but refers back to the collective Canaanite
    population, so English plural 'them' is idiomatic. 'Drive out' fits the conquest
    context more naturally than the more technical 'dispossess.'
