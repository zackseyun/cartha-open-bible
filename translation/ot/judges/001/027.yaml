id: JDG.1.27
reference: Judges 1:27
source:
  edition: WLC
  text: וְ/לֹא הוֹרִ֣ישׁ מְנַשֶּׁ֗ה אֶת בֵּית שְׁאָ֣ן וְ/אֶת בְּנוֹתֶי/הָ֮ וְ/אֶת תַּעְנַ֣ךְ וְ/אֶת בְּנֹתֶי/הָ֒ וְ/אֶת ישב ד֜וֹר וְ/אֶת בְּנוֹתֶ֗י/הָ וְ/אֶת יוֹשְׁבֵ֤י יִבְלְעָם֙ וְ/אֶת בְּנֹתֶ֔י/הָ וְ/אֶת יוֹשְׁבֵ֥י מְגִדּ֖וֹ וְ/אֶת בְּנוֹתֶ֑י/הָ וַ/יּ֨וֹאֶל֙ הַֽ/כְּנַעֲנִ֔י לָ/שֶׁ֖בֶת בָּ/אָ֥רֶץ הַ/זֹּֽאת־־־־־־־־־־־־׃
translation:
  text: But Manasseh did not dispossess Beth-shean and its daughter towns[a], or Taanach and its daughter towns, or the inhabitants of Dor and its daughter towns, or the inhabitants of Ibleam and its daughter towns, or the inhabitants of Megiddo and its daughter towns[b]; and the Canaanites persisted in dwelling in this land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'its daughters,' meaning the smaller towns or settlements dependent on the main city.
    reason: cultural_note
  - marker: b
    text: Or 'the Canaanite was determined to dwell in this land.' The Hebrew verb can convey willingness or determination; the main text renders the contextual sense idiomatically.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹרִישׁ
  chosen: did not dispossess
  alternatives:
  - did not drive out
  - did not take possession of
  lexicon: HALOT
  rationale: The Hiphil of ירשׁ here means to cause someone to lose possession, i.e., dispossess/drive out. 'Dispossess' preserves the causative force and avoids implying merely military expulsion without loss of territorial control.
- source_word: בְּנוֹתֶיהָ
  chosen: its daughter towns
  alternatives:
  - its villages
  - its dependent settlements
  lexicon: HALOT
  rationale: Literally 'its daughters,' an idiom for satellite settlements associated with a principal city. 'Daughter towns' keeps the metaphor while remaining understandable in English.
- source_word: ישב דּוֹר / יוֹשְׁבֵי יִבְלְעָם / יוֹשְׁבֵי מְגִדּוֹ
  chosen: the inhabitants of Dor ... the inhabitants of Ibleam ... the inhabitants of Megiddo
  alternatives:
  - those dwelling in Dor/Ibleam/Megiddo
  - the residents of Dor/Ibleam/Megiddo
  lexicon: HALOT
  rationale: The participial forms from ישׁב denote those living in these places. 'Inhabitants' is natural English and matches the collective sense.
- source_word: וַיּוֹאֶל
  chosen: persisted
  alternatives:
  - was determined
  - undertook
  - consented
  - began
  lexicon: HALOT
  rationale: From יאל, the verb can express willingness or determination. In context, after noting Manasseh's failure to dispossess, the sense is that the Canaanites were resolved to remain. 'Persisted' captures the contextual force idiomatically without overreading.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanites
  alternatives:
  - the Canaanite
  lexicon: HALOT
  rationale: Although morphologically singular, the noun often functions collectively for the people group. English naturally renders the collective here as plural.
- source_word: לָשֶׁבֶת בָּאָרֶץ הַזֹּאת
  chosen: in dwelling in this land
  alternatives:
  - to dwell in this land
  - to remain in this land
  lexicon: HALOT
  rationale: The infinitive construct with ל expresses the action the Canaanites were resolved upon. 'In dwelling in this land' fits the chosen main verb 'persisted'; 'this land' preserves the demonstrative force of הַזֹּאת.
- source_word: בֵּית שְׁאָן / תַּעְנַךְ / דּוֹר / יִבְלְעָם / מְגִדּוֹ
  chosen: Beth-shean, Taanach, Dor, Ibleam, Megiddo
  alternatives:
  - Beth-shan for Beth-shean
  rationale: Personal and place names are transliterated by standard English conventions per project philosophy. 'Beth-shean' is a common English form for בֵּית שְׁאָן.
