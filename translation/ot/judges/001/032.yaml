id: JDG.1.32
reference: Judges 1:32
source:
  edition: WLC
  text: וַ/יֵּ֨שֶׁב֙ הָ/אָ֣שֵׁרִ֔י בְּ/קֶ֥רֶב הַֽ/כְּנַעֲנִ֖י יֹשְׁבֵ֣י הָ/אָ֑רֶץ
    כִּ֖י לֹ֥א הוֹרִישֽׁ/וֹ׃ס
translation:
  text: So the Asherites lived among the Canaanites, the inhabitants of the land,
    because they did not drive them out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew literally uses collective singular forms: ''the Asherite ... the
      Canaanite ... he did not dispossess him.'' The English renders the intended
      collective sense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  chosen: lived
  alternatives:
  - dwelt
  - settled
  lexicon: HALOT
  rationale: The verb ישׁב commonly means to sit, dwell, or live. In this narrative
    context, 'lived' gives natural modern English while preserving the sense of residing
    among another people group.
- source_word: הָאָשֵׁרִי
  chosen: the Asherites
  alternatives:
  - Asher
  - the tribe of Asher
  lexicon: HALOT
  rationale: The gentilic singular with the article functions collectively for the
    tribe/clan. 'The Asherites' is the most natural English collective rendering and
    matches the tribal reference in context.
- source_word: בְּקֶרֶב
  chosen: among
  alternatives:
  - in the midst of
  - in the middle of
  lexicon: HALOT
  rationale: The phrase בְּקֶרֶב indicates being in the midst of a group. 'Among'
    is concise and idiomatic in English.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanites
  alternatives:
  - the Canaanite
  lexicon: HALOT
  rationale: Although morphologically singular, the term is often collective. Since
    it is followed by a plural participle ('inhabitants of the land'), English plural
    'the Canaanites' best reflects the collective sense.
- source_word: יֹשְׁבֵי הָאָרֶץ
  chosen: the inhabitants of the land
  alternatives:
  - those dwelling in the land
  - the dwellers of the land
  lexicon: HALOT
  rationale: This participial phrase appositionally identifies the Canaanites. 'The
    inhabitants of the land' is clear, natural, and semantically precise.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the preceding statement. 'Because'
    communicates the causal force more clearly in contemporary English than 'for.'
- source_word: לֹא הוֹרִישׁוֹ
  chosen: they did not drive them out
  alternatives:
  - they did not dispossess them
  - he did not dispossess him
  lexicon: HALOT
  rationale: The Hiphil of ירשׁ in Judges regularly refers to dispossessing or driving
    out inhabitants. English idiom favors 'drive them out.' The Hebrew form is morphologically
    singular ('did not dispossess him'), but in context the subject is the collective
    Asherites and the object is the collective Canaanites, so English pluralization
    reflects the intended sense.
