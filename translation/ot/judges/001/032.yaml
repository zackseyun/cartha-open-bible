theological_decisions:
- issue: Collective singulars for tribe and people group
  chosen_reading: Render both tribal and ethnic singular forms collectively in idiomatic
    English ('the Asherites' / 'the Canaanites' ... 'they did not drive them out').
  alternative_readings:
  - Retain singular forms more formally ('Asher lived among the Canaanite ... because
    he did not dispossess him')
  rationale: The verse uses Hebrew collective singulars, a common feature in tribal
    and ethnic references. A strictly singular English rendering would sound misleadingly
    individualistic, as though one man named Asher lived among one Canaanite. The
    context in Judges concerns tribal failure to dispossess the inhabitants, so idiomatic
    collective English best preserves the sense without adding interpretation beyond
    the discourse context.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
