id: JDG.1.25
reference: Judges 1:25
source:
  edition: WLC
  text: וַ/יַּרְאֵ/ם֙ אֶת מְב֣וֹא הָ/עִ֔יר וַ/יַּכּ֥וּ אֶת הָ/עִ֖יר לְ/פִי חָ֑רֶב וְ/אֶת הָ/אִ֥ישׁ וְ/אֶת כָּל מִשְׁפַּחְתּ֖/וֹ שִׁלֵּֽחוּ־־־־־־׃
translation:
  text: So he showed them the entrance to the city[a], and they struck the city with the edge of the sword[b]; but they let the man and all his family go.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''with the mouth of the sword,'' an idiom meaning ''with the edge of the sword.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'all his household' or 'all his clan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְאֵם
  chosen: he showed them
  alternatives:
  - he saw for them
  - he caused them to see
  lexicon: HALOT
  rationale: 'The form from ראה with 3mp suffix is causative in sense here: the man revealed or pointed out the city''s entrance to the attackers. English ''showed them'' best captures the idiomatic force in context.'
- source_word: מְבוֹא הָעִיר
  chosen: the entrance to the city
  alternatives:
  - the way into the city
  - the approach to the city
  lexicon: HALOT
  rationale: מָבוֹא denotes an entrance, entryway, or way in. 'Entrance to the city' is the most natural and sufficiently concrete rendering in this military context.
- source_word: וַיַּכּוּ
  chosen: they struck
  alternatives:
  - they attacked
  - they put to the sword
  lexicon: HALOT
  rationale: נכה is a broad verb meaning strike/smite/defeat. 'Struck' preserves the Hebrew verbal force without prematurely absorbing the following sword idiom into the verb itself.
- source_word: לְפִי חָרֶב
  chosen: with the edge of the sword
  alternatives:
  - by the mouth of the sword
  - with the sword
  lexicon: HALOT
  rationale: This is the standard Hebrew idiom literally 'to the mouth/edge of the sword.' 'With the edge of the sword' is the established English equivalent that preserves the image and meaning.
- source_word: שִׁלֵּחוּ
  chosen: they let ... go
  alternatives:
  - they sent away
  - they released
  lexicon: HALOT
  rationale: In context the sense is not merely dispatching but sparing and releasing the man and his household. 'Let ... go' is idiomatic and clear in modern English.
- source_word: כָּל מִשְׁפַּחְתּוֹ
  chosen: all his family
  alternatives:
  - all his clan
  - all his household
  lexicon: HALOT
  rationale: מִשְׁפָּחָה can mean family, clan, or extended household. Here 'all his family' is the clearest natural rendering, while still broad enough to include dependents and relatives.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - that man
  lexicon: HALOT
  rationale: The definite noun refers back to the individual from the previous verse. 'The man' is sufficient in English narrative style.
