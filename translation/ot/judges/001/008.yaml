id: JDG.1.8
reference: Judges 1:8
source:
  edition: WLC
  text: וַ/יִּלָּחֲמ֤וּ בְנֵֽי יְהוּדָה֙ בִּ/יר֣וּשָׁלִַ֔ם וַ/יִּלְכְּד֣וּ אוֹתָ֔/הּ וַ/יַּכּ֖וּ/הָ לְ/פִי חָ֑רֶב וְ/אֶת הָ/עִ֖יר שִׁלְּח֥וּ בָ/אֵֽשׁ־־־׃
translation:
  text: Then the sons of Judah fought against Jerusalem and captured it[a], and struck it with the edge of the sword[b], and they set the city on fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the sons of Judah.'' The phrase refers to the Judahite tribal group; ''sons'' is retained to reflect the source wording.'
    reason: lexical_alternative
  - marker: b
    text: Or 'fought in Jerusalem,' though the context strongly favors 'fought against Jerusalem.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּלָּחֲמוּ
  chosen: fought against
  alternatives:
  - fought in
  - made war against
  lexicon: HALOT
  rationale: The verb לחם in the nifal/waw-consecutive narrative form denotes engaging in battle. With בִּירוּשָׁלִַם, the sense is hostile action directed toward Jerusalem, best expressed in English as 'fought against' rather than the more ambiguous 'fought in'.
- source_word: בְנֵי יְהוּדָה
  chosen: the sons of Judah
  alternatives:
  - the people of Judah
  - the men of Judah
  lexicon: HALOT
  rationale: Literally 'sons of Judah.' This likely refers corporately to the tribe/clan members of Judah, but per the gender-accurate philosophy the masculine familial expression is preserved rather than neutralized to 'people.'
- source_word: בִּירוּשָׁלִַם
  chosen: against Jerusalem
  alternatives:
  - in Jerusalem
  lexicon: HALOT
  rationale: The preposition ב can sometimes be locative, but in warfare contexts after לחם it can mark the object of attack. Given the following verbs 'captured it' and 'struck it,' Jerusalem is the city attacked.
- source_word: וַיִּלְכְּדוּ אֹתָהּ
  chosen: captured it
  alternatives:
  - took it
  - seized it
  lexicon: HALOT
  rationale: לכד commonly means capture/seize, especially of a city in military narrative. 'Captured it' is natural modern English and preserves the military sense.
- source_word: וַיַּכּוּהָ
  chosen: struck it
  alternatives:
  - put it to the sword
  - defeated it
  lexicon: HALOT
  rationale: נכה is a broad verb meaning strike/smite. Because the following phrase לְפִי חָרֶב specifies the manner, the main verb is kept relatively literal as 'struck it' rather than absorbing the idiom into the verb itself.
- source_word: לְפִי חָרֶב
  chosen: with the edge of the sword
  alternatives:
  - by the sword
  - with the mouth of the sword
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom, literally 'to the mouth/edge of the sword.' 'With the edge of the sword' is a conventional and transparent English rendering that preserves the imagery better than the flatter 'by the sword.'
- source_word: וְאֶת הָעִיר
  chosen: and the city
  alternatives:
  - and that city
  lexicon: HALOT
  rationale: הָעִיר refers back to Jerusalem. English naturally renders this anaphoric reference as 'the city.'
- source_word: שִׁלְּחוּ בָאֵשׁ
  chosen: they set the city on fire
  alternatives:
  - they sent it into the fire
  - they burned it with fire
  lexicon: HALOT
  rationale: The idiom with שלח plus באש conveys consigning something to fire, i.e., burning it. 'Set the city on fire' is idiomatic modern English and accurately reflects the action.
