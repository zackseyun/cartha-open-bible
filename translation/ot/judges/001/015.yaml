id: JDG.1.15
reference: Judges 1:15
source:
  edition: WLC
  text: וַ/תֹּ֨אמֶר ל֜/וֹ הָֽבָ/ה לִּ֣/י בְרָכָ֗ה כִּ֣י אֶ֤רֶץ הַ/נֶּ֨גֶב֙ נְתַתָּ֔/נִי
    וְ/נָתַתָּ֥ה לִ֖/י גֻּלֹּ֣ת מָ֑יִם וַ/יִּתֶּן לָ֣/הּ כָּלֵ֗ב אֵ֚ת גֻּלֹּ֣ת עִלִּ֔ית
    וְ/אֵ֖ת גֻּלֹּ֥ת תַּחְתִּֽית־־׃פ
translation:
  text: She said to him, “Please give me a blessing, because you have given me the
    land of the Negev; give me also springs of water.” So Caleb gave her the upper
    springs and the lower springs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land of the South.' The Hebrew negev can function as a regional
      name ('Negev') or a directional/topographical description ('southland').
    reason: lexical_alternative
  - marker: b
    text: The Hebrew expression may refer to springs, pools, or other water sources;
      'springs' best fits the context of a dry region needing reliable water.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבָה
  chosen: Please give
  alternatives:
  - Give
  - Do give
  lexicon: HALOT
  rationale: Imperative/interjection combination used in a request. 'Please give'
    captures the polite entreaty better than a bare command while remaining close
    to the Hebrew.
- source_word: בְרָכָה
  chosen: a blessing
  alternatives:
  - a gift
  - a present
  lexicon: HALOT
  rationale: The noun literally means 'blessing.' In this context it refers to a beneficial
    grant from her father, but retaining 'blessing' preserves the source wording and
    the familial/request context.
- source_word: אֶרֶץ הַנֶּגֶב
  chosen: the land of the Negev
  alternatives:
  - the land of the South
  - the dry land
  lexicon: HALOT
  rationale: נֶגֶב can denote the southern region and, by association, arid southland.
    'The Negev' is the clearest geographic rendering in modern English and avoids
    flattening it to a mere compass direction.
- source_word: גֻּלֹּת מָיִם
  chosen: springs of water
  alternatives:
  - water springs
  - pools of water
  - springs
  lexicon: HALOT
  rationale: The phrase denotes water sources. 'Springs of water' is natural English
    and preserves the concrete sense better than the less certain 'pools.'
- source_word: גֻּלֹּת עִלִּית
  chosen: the upper springs
  alternatives:
  - the upper pools
  - the upper springs of water
  lexicon: HALOT
  rationale: עִלִּית means 'upper.' Repeating 'springs' maintains consistency with
    the earlier phrase and fits the likely topographical sense.
- source_word: גֻּלֹּת תַּחְתִּית
  chosen: the lower springs
  alternatives:
  - the lower pools
  - the lower springs of water
  lexicon: HALOT
  rationale: תַּחְתִּית means 'lower' or 'lower part.' 'Lower springs' pairs naturally
    with 'upper springs' and reflects the likely two sets of water sources.
- source_word: וַיִּתֶּן לָהּ
  chosen: So Caleb gave her
  alternatives:
  - And Caleb gave her
  - Then Caleb gave her
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So' gives smooth modern
    English while preserving the resultative flow from her request to his response.
