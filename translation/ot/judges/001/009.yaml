id: JDG.1.9
reference: Judges 1:9
source:
  edition: WLC
  text: וְ/אַחַ֗ר יָֽרְדוּ֙ בְּנֵ֣י יְהוּדָ֔ה לְ/הִלָּחֵ֖ם בַּֽ/כְּנַעֲנִ֑י יוֹשֵׁ֣ב
    הָ/הָ֔ר וְ/הַ/נֶּ֖גֶב וְ/הַ/שְּׁפֵלָֽה׃
translation:
  text: Afterward, the sons of Judah went down to fight against the Canaanites living
    in the hill country, the Negev, and the lowland.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Shephelah' for 'the lowland,' the Judean foothill region between
      the hill country and the coastal plain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַחַר
  chosen: Afterward
  alternatives:
  - After this
  - Later
  lexicon: HALOT
  rationale: Temporal adverb/conjunction marking subsequent action. 'Afterward' is
    natural modern English and preserves the sequential sense without over-specifying
    the interval.
- source_word: יָרְדוּ
  chosen: went down
  alternatives:
  - descended
  lexicon: HALOT
  rationale: The verb ירד literally means 'go down/descend.' 'Went down' preserves
    the concrete directional sense and is idiomatic English narrative style; it should
    not be flattened to merely 'went' because the topographical nuance is present
    in the Hebrew.
- source_word: בְּנֵי יְהוּדָה
  chosen: the sons of Judah
  alternatives:
  - the people of Judah
  - the men of Judah
  lexicon: HALOT
  rationale: Literally 'sons of Judah.' This can denote the tribal members of Judah.
    Per gender-accurate philosophy, 'sons' is retained rather than neutralizing to
    'people,' while still functioning corporately for the tribe.
- source_word: לְ/הִלָּחֵם
  chosen: to fight
  alternatives:
  - to wage war
  - to battle
  lexicon: HALOT
  rationale: Infinitive of לחם in the Niphal, 'to fight/do battle.' 'To fight' is
    the clearest and most natural rendering here.
- source_word: בַּ/כְּנַעֲנִי
  chosen: against the Canaanites
  alternatives:
  - with the Canaanites
  - the Canaanite
  lexicon: HALOT
  rationale: Though morphologically singular, 'the Canaanite' often functions collectively
    in Hebrew for the people group. In English, the plural 'the Canaanites' best conveys
    the collective ethnic sense. 'Against' reflects the hostile sense required by
    the context of fighting.
- source_word: יוֹשֵׁב
  chosen: living
  alternatives:
  - dwelling
  - who lived
  lexicon: HALOT
  rationale: Participle of ישב, 'sitting/dwelling/inhabiting.' 'Living' is smooth
    modern English and accurately conveys ongoing residence.
- source_word: הָ/הָר
  chosen: the hill country
  alternatives:
  - the mountains
  - the hill country region
  lexicon: HALOT
  rationale: In many geographical contexts הָהָר refers not merely to a single mountain
    but to the upland/hill-country region. 'The hill country' best fits the list of
    regional zones alongside the Negev and the lowland.
- source_word: הַ/נֶּגֶב
  chosen: the Negev
  alternatives:
  - the southland
  - the southern region
  lexicon: HALOT
  rationale: נֶגֶב can mean 'south' or specifically the Negev region. Since it appears
    in a list of named geographical zones, retaining 'the Negev' preserves the regional/topographical
    reference more precisely.
- source_word: הַ/שְּׁפֵלָה
  chosen: the lowland
  alternatives:
  - the Shephelah
  - the foothills
  lexicon: HALOT
  rationale: שְׁפֵלָה denotes the lowland region, often the Judean foothill zone.
    'The lowland' is a clear translation; the transliterated 'Shephelah' is more technical
    and less accessible for the target reader.
