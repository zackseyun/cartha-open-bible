id: JDG.1.5
reference: Judges 1:5
source:
  edition: WLC
  text: וַֽ֠/יִּמְצְאוּ אֶת אֲדֹנִ֥י בֶ֨זֶק֙ בְּ/בֶ֔זֶק וַ/יִּֽלָּחֲמ֖וּ בּ֑/וֹ וַ/יַּכּ֕וּ אֶת הַֽ/כְּנַעֲנִ֖י וְ/אֶת הַ/פְּרִזִּֽי־־־׃
translation:
  text: They found Adoni-bezek in Bezek[a], and they fought against him and struck down the Canaanites and the Perizzites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Adoni-bezek could be understood etymologically as 'lord of Bezek,' but here it is rendered as a personal name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְצְאוּ
  chosen: they found
  alternatives:
  - they came upon
  - they discovered
  lexicon: HALOT
  rationale: The verb מצא in narrative commonly means 'find' or 'come upon.' 'They found' is the most direct and natural rendering in English and fits the sequential narrative style.
- source_word: אֲדֹנִי בֶזֶק
  chosen: Adoni-bezek
  alternatives:
  - Lord of Bezek
  lexicon: HALOT
  rationale: This is best treated as a proper name in context, as reflected by the morphology and narrative usage. Although the components could be translated etymologically as 'lord of Bezek,' transliteration follows the translation philosophy for personal names while preserving the title-like form within the name.
- source_word: בְּבֶזֶק
  chosen: in Bezek
  alternatives:
  - at Bezek
  lexicon: HALOT
  rationale: The preposition ב commonly marks location. 'In Bezek' is the most straightforward rendering for the place name, though 'at Bezek' would also be possible in English.
- source_word: וַיִּלָּחֲמוּ בּוֹ
  chosen: they fought against him
  alternatives:
  - they fought with him
  - they engaged him in battle
  lexicon: HALOT
  rationale: The Niphal of לחם with ב can denote fighting against an opponent. 'Fought against him' makes the adversarial sense explicit and reads naturally in English narrative.
- source_word: וַיַּכּוּ
  chosen: struck down
  alternatives:
  - defeated
  - struck
  - killed
  lexicon: HALOT
  rationale: נכה has a broad range including 'strike,' 'smite,' and in military contexts 'strike down/defeat.' Here 'struck down' preserves the force of the Hebrew without over-specifying whether the action means immediate killing of every individual or military defeat in battle.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanites
  alternatives:
  - the Canaanite
  lexicon: HALOT
  rationale: Although morphologically singular, this ethnonym often functions collectively. In English, the plural 'the Canaanites' best conveys the collective people group in a battle context.
- source_word: הַפְּרִזִּי
  chosen: the Perizzites
  alternatives:
  - the Perizzite
  lexicon: HALOT
  rationale: Like 'the Canaanite,' this singular ethnonym is used collectively. The English plural naturally communicates the people group defeated in battle.
