id: JDG.1.29
reference: Judges 1:29
source:
  edition: WLC
  text: וְ/אֶפְרַ֨יִם֙ לֹ֣א הוֹרִ֔ישׁ אֶת הַֽ/כְּנַעֲנִ֖י הַ/יּוֹשֵׁ֣ב בְּ/גָ֑זֶר וַ/יֵּ֧שֶׁב הַֽ/כְּנַעֲנִ֛י בְּ/קִרְבּ֖/וֹ בְּ/גָֽזֶר־׃פ
translation:
  text: And Ephraim did not drive out the Canaanites who lived in Gezer[a], and the Canaanites lived among them in Gezer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'in his midst,' with the singular pronoun referring to Ephraim as a tribal unit; the translation renders the collective sense as 'among them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹרִישׁ
  chosen: drive out
  alternatives:
  - dispossess
  - expel
  lexicon: HALOT
  rationale: In the Hiphil of ירשׁ, the sense is causing prior inhabitants to lose possession or be removed. 'Drive out' is idiomatic modern English and fits the conquest context better than the more technical 'dispossess,' while preserving the force of failure to remove the inhabitants.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanites
  alternatives:
  - the Canaanite
  lexicon: HALOT
  rationale: Although morphologically singular, this ethnic term often functions collectively. English naturally renders it as the people group 'the Canaanites' in this context.
- source_word: הַיּוֹשֵׁב
  chosen: who lived
  alternatives:
  - who was dwelling
  - inhabiting
  lexicon: HALOT
  rationale: The participle of ישׁב describes ongoing residence. 'Who lived' is natural English and adequately conveys settled habitation without unnecessary stiffness.
- source_word: בְּגָזֶר
  chosen: in Gezer
  alternatives:
  - at Gezer
  lexicon: HALOT
  rationale: The preposition ב marks location. 'In Gezer' is the most natural rendering for residence within a city or region.
- source_word: וַיֵּשֶׁב
  chosen: lived
  alternatives:
  - dwelt
  - settled
  lexicon: HALOT
  rationale: 'The wayyiqtol of ישׁב continues the narrative result: because Ephraim did not drive them out, the Canaanites remained resident. ''Lived'' is clear modern English; ''dwelt'' is more archaic.'
- source_word: בְּקִרְבּוֹ
  chosen: among them
  alternatives:
  - in his midst
  - within it
  lexicon: HALOT
  rationale: Literally 'in his midst,' with the singular suffix referring back to Ephraim as a tribal entity. In English, 'among them' communicates the collective sense of the tribe's population more naturally than the formally singular 'in its midst' or the overly literal 'in his midst.' This is a documented shift for idiomatic English.
