id: JDG.1.30
reference: Judges 1:30
source:
  edition: WLC
  text: זְבוּלֻ֗ן לֹ֤א הוֹרִישׁ֙ אֶת יוֹשְׁבֵ֣י קִטְר֔וֹן וְ/אֶת יוֹשְׁבֵ֖י נַהֲלֹ֑ל
    וַ/יֵּ֤שֶׁב הַֽ/כְּנַעֲנִי֙ בְּ/קִרְבּ֔/וֹ וַ/יִּֽהְי֖וּ לָ/מַֽס־־׃ס
translation:
  text: Zebulun did not drive out the inhabitants of Kitron or the inhabitants of
    Nahalol, so the Canaanites lived among them and became forced laborers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Nahalal'; English tradition and related passages sometimes preserve
      that place-name form.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'the Canaanite lived in his/its midst,' using a collective singular
      for the people and a singular suffix likely referring to Zebulun as a tribe.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹרִישׁ
  chosen: drive out
  alternatives:
  - dispossess
  - expel
  lexicon: HALOT
  rationale: In Judges 1 this Hiphil of ירש regularly refers to removing prior inhabitants
    from the land. 'Drive out' is idiomatic modern English and fits the military-settlement
    context better than the more technical 'dispossess,' while avoiding overstatement
    beyond the text.
- source_word: יוֹשְׁבֵי
  chosen: inhabitants of
  alternatives:
  - those living in
  - residents of
  lexicon: HALOT
  rationale: The participle of ישב denotes those dwelling in a place. 'Inhabitants
    of' is concise, natural, and preserves the territorial sense.
- source_word: קִטְרוֹן
  chosen: Kitron
  rationale: 'Place name transliterated according to the translation philosophy: translate
    titles, transliterate names.'
- source_word: נַהֲלֹל
  chosen: Nahalol
  alternatives:
  - Nahalal
  rationale: Place name transliterated from the consonantal form given here. 'Nahalal'
    is a known variant in English tradition and related passages, but 'Nahalol' more
    directly reflects the vocalization in this verse.
- source_word: וַיֵּשֶׁב הַכְּנַעֲנִי בְּקִרְבּוֹ
  chosen: the Canaanites lived among them
  alternatives:
  - the Canaanites lived in their midst
  - the Canaanite lived among him/it
  lexicon: HALOT
  rationale: Although הַכְּנַעֲנִי is morphologically singular/collective ('the Canaanite'),
    English idiom in this context is better served by the plural collective 'the Canaanites.'
    The suffix on בְּקִרְבּוֹ is singular, likely referring corporately to Zebulun
    as a tribe; English 'among them' makes the corporate sense clear and avoids awkward
    singular reference to a tribe.
- source_word: לָמַס
  chosen: forced labor
  alternatives:
  - tribute labor
  - corvée
  - taskwork
  lexicon: HALOT
  rationale: מַס in this context denotes compulsory labor imposed on a subjected population,
    not merely monetary tribute. 'Forced labor' is the clearest modern rendering and
    preserves the coercive sense.
- source_word: וַיִּהְיוּ לָמַס
  chosen: became forced labor
  alternatives:
  - were put to forced labor
  - became subject to forced labor
  lexicon: HALOT
  rationale: The clause indicates the resulting status of the Canaanites under Zebulun.
    'Became forced labor' is compact, but in English it means 'became subject to forced
    labor' rather than ontologically 'became labor.'
