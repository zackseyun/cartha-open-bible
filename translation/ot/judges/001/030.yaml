theological_decisions:
- issue: Collective singular הַכְּנַעֲנִי and singular suffix בְּקִרְבּוֹ
  chosen_reading: Render collectively as 'the Canaanites lived among them'
  alternative_readings:
  - '''the Canaanite lived among him/it'''
  rationale: This is not a doctrinal issue but a translation-level interpretive decision.
    Hebrew often uses collective singulars for peoples and singular suffixes for tribes
    as corporate entities. English requires smoothing to communicate the intended
    sense clearly.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §5 (documented
    exception/consistency).
