theological_decisions:
- issue: Kinship relation of Othniel to Caleb
  chosen_reading: Othniel is rendered as Caleb’s younger brother in the main text.
  alternative_readings:
  - Othniel as Caleb’s younger kinsman/nephew
  rationale: This is not a doctrinal issue but an interpretive one with some significance
    for auditability. The Hebrew most naturally reads 'brother of Caleb, younger than
    him.' Some harmonize with other passages by taking 'brother' more broadly as a
    clan relation or by attaching 'younger' differently. Following original-language
    primacy, the plain sense is kept in the main text and the broader-kin alternative
    is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §3, §5
