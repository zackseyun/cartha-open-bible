id: JDG.1.13
reference: Judges 1:13
source:
  edition: WLC
  text: וַֽ/יִּלְכְּדָ/הּ֙ עָתְנִיאֵ֣ל בֶּן קְנַ֔ז אֲחִ֥י כָלֵ֖ב הַ/קָּטֹ֣ן מִמֶּ֑/נּוּ
    וַ/יִּתֶּן ל֛/וֹ אֶת עַכְסָ֥ה בִתּ֖/וֹ לְ/אִשָּֽׁה־־־׃
translation:
  text: Othniel son of Kenaz, Caleb’s younger brother, captured it, and he gave him
    his daughter Achsah as a wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, possibly, “Othniel son of Kenaz, the younger brother of Caleb,” or “the
      younger kinsman of Caleb.” The Hebrew most naturally reads “brother of Caleb,
      younger than him,” but some understand the kinship term more broadly.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּלְכְּדָהּ
  chosen: captured it
  alternatives:
  - took it
  - seized it
  lexicon: HALOT
  rationale: The verb לכד commonly means to capture or seize, especially of taking
    a city. The 3fs suffix refers back to the city named in the previous verse. 'Captured
    it' is natural modern English and preserves the military sense.
- source_word: עָתְנִיאֵל
  chosen: Othniel
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: בֶּן־קְנַז
  chosen: son of Kenaz
  rationale: Standard genealogical construction; retained formally.
- source_word: אֲחִי כָלֵב הַקָּטֹן מִמֶּנּוּ
  chosen: Caleb’s younger brother
  alternatives:
  - the younger brother of Caleb
  - the brother of Caleb, younger than he
  - the younger relative of Caleb
  lexicon: HALOT
  rationale: אֲחִי is literally 'brother of,' and הַקָּטֹן מִמֶּנּוּ indicates comparative
    youth, 'younger than him.' The most straightforward reading is that Othniel is
    Caleb's younger brother. Because the Hebrew construction has generated discussion
    over whether Othniel was Caleb's brother or nephew, the main text keeps the plain
    syntactic sense while preserving the alternative in a footnote.
- source_word: וַיִּתֶּן לוֹ
  chosen: he gave him
  alternatives:
  - Caleb gave him
  lexicon: HALOT
  rationale: The subject is singular masculine from context, referring to Caleb from
    the preceding verse and this clause's sense. English keeps the pronouns, though
    the antecedents are contextually clear.
- source_word: עַכְסָה
  chosen: Achsah
  rationale: Personal name transliterated by standard English convention.
- source_word: בִתּוֹ
  chosen: his daughter
  lexicon: HALOT
  rationale: Straightforward possessive noun; 'his' refers to Caleb.
- source_word: לְאִשָּׁה
  chosen: as a wife
  alternatives:
  - for a wife
  - in marriage
  lexicon: HALOT
  rationale: Standard idiom for giving a woman in marriage. 'As a wife' is idiomatic
    and sufficiently formal without sounding archaic.
