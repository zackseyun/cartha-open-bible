id: JDG.1.10
reference: Judges 1:10
source:
  edition: WLC
  text: וַ/יֵּ֣לֶךְ יְהוּדָ֗ה אֶל הַֽ/כְּנַעֲנִי֙ הַ/יּוֹשֵׁ֣ב בְּ/חֶבְר֔וֹן וְ/שֵׁם
    חֶבְר֥וֹן לְ/פָנִ֖ים קִרְיַ֣ת אַרְבַּ֑ע וַ/יַּכּ֛וּ אֶת שֵׁשַׁ֥י וְ/אֶת אֲחִימַ֖ן
    וְ/אֶת תַּלְמָֽי־־־־־׃
translation:
  text: Then Judah went against the Canaanites living in Hebron (Hebron’s former name
    was Kiriath-arba), and they struck down Sheshai, Ahiman, and Talmai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “went to the Canaanite”; the Hebrew uses a singular form that likely
      functions collectively here, hence “the Canaanites.”
    reason: lexical_alternative
  - marker: b
    text: Or “Hebron was formerly called Kiriath-arba.”
    reason: lexical_alternative
  - marker: c
    text: “Struck down” could also be rendered “defeated” or “killed” in this military
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went against
  alternatives:
  - went
  - marched against
  - advanced against
  lexicon: HALOT
  rationale: The verb literally means 'went,' but with אֶל plus a hostile object in
    military narrative it idiomatically introduces an attack or campaign. 'Went against'
    preserves the motion verb while making the adversarial sense clear without over-paraphrasing.
- source_word: יְהוּדָה
  chosen: Judah
  alternatives:
  - the men of Judah
  - the tribe of Judah
  lexicon: HALOT
  rationale: The singular proper name can stand collectively for the tribe. 'Judah'
    is the most natural rendering and matches the Hebrew form, while the later plural
    verb 'they struck down' makes the collective sense clear in English.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanites
  alternatives:
  - the Canaanite
  lexicon: HALOT
  rationale: Although morphologically singular, this term often functions as a collective
    singular for a people group. Rendering it as the plural 'the Canaanites' fits
    the military context and reads naturally in English.
- source_word: הַיּוֹשֵׁב בְּחֶבְרוֹן
  chosen: living in Hebron
  alternatives:
  - dwelling in Hebron
  - who lived in Hebron
  - inhabiting Hebron
  lexicon: HALOT
  rationale: The participle denotes settled residence. 'Living in Hebron' is clear
    modern English and preserves the durative sense.
- source_word: וְשֵׁם חֶבְרוֹן לְפָנִים
  chosen: Hebron’s former name was
  alternatives:
  - the name of Hebron formerly was
  - Hebron was formerly called
  lexicon: HALOT
  rationale: This clause explains an earlier place-name. 'Former name' communicates
    לְפָנִים idiomatically as 'formerly/in earlier times' in readable English.
- source_word: קִרְיַת אַרְבַּע
  chosen: Kiriath-arba
  alternatives:
  - Kiriath Arba
  - City of Arba
  lexicon: HALOT
  rationale: As a place-name, it is best transliterated per the translation philosophy
    to transliterate names. The hyphenated form is a standard English convention.
- source_word: וַיַּכּוּ
  chosen: they struck down
  alternatives:
  - they struck
  - they defeated
  - they killed
  lexicon: HALOT
  rationale: The verb נכה in battle contexts commonly denotes a decisive military
    blow. 'Struck down' preserves the concrete force without overstating beyond the
    text; 'killed' is possible but slightly more specific than the verb itself requires.
- source_word: שֵׁשַׁי וְאֶת אֲחִימַן וְאֶת תַּלְמָי
  chosen: Sheshai, Ahiman, and Talmai
  lexicon: HALOT
  rationale: These are personal names and are therefore transliterated rather than
    translated.
