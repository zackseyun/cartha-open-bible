id: JDG.1.23
reference: Judges 1:23
source:
  edition: WLC
  text: וַ/יָּתִ֥ירוּ בֵית יוֹסֵ֖ף בְּ/בֵֽית אֵ֑ל וְ/שֵׁם הָ/עִ֥יר לְ/פָנִ֖ים לֽוּז־־־׃
translation:
  text: And the house of Joseph spied out Bethel; formerly the name of the city was
    Luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reconnoitered Bethel' or 'explored Bethel.' The Hebrew verb refers to
      scouting or searching out in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּתִירוּ
  chosen: spied out
  alternatives:
  - explored
  - reconnoitered
  - searched out
  lexicon: HALOT
  rationale: The verb here is commonly understood in context as sending scouts or
    making reconnaissance. 'Spied out' is idiomatic, concise, and fits the military
    setting of Judges 1. 'Reconnoitered' is more technical but less natural in modern
    English.
- source_word: בֵית יוֹסֵף
  chosen: the house of Joseph
  alternatives:
  - the descendants of Joseph
  - Joseph's house
  lexicon: HALOT
  rationale: A formal rendering preserves the tribal/clan designation used throughout
    the Hebrew Bible. 'The house of Joseph' is clear in context and avoids over-interpreting
    the exact social scope.
- source_word: בְּבֵית אֵל
  chosen: Bethel
  alternatives:
  - at Bethel
  - against Bethel
  lexicon: HALOT
  rationale: With the preceding verb, the preposition marks the object/location of
    reconnaissance. English idiom prefers 'spied out Bethel' rather than a more wooden
    'spied out at Bethel.'
- source_word: וְשֵׁם הָעִיר
  chosen: the name of the city
  alternatives:
  - the city's name
  lexicon: HALOT
  rationale: This preserves the Hebrew structure while remaining natural English.
- source_word: לְפָנִים
  chosen: formerly
  alternatives:
  - previously
  - before
  lexicon: HALOT
  rationale: The adverb indicates an earlier state. 'Formerly' is smooth modern English
    and fits the explanatory note about the city's earlier name.
- source_word: לוּז
  chosen: Luz
  rationale: Proper place name is transliterated according to the translation philosophy.
