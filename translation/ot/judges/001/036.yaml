id: JDG.1.36
reference: Judges 1:36
source:
  edition: WLC
  text: וּ/גְבוּל֙ הָ/אֱמֹרִ֔י מִֽ/מַּעֲלֵ֖ה עַקְרַבִּ֑ים מֵ/הַ/סֶּ֖לַע וָ/מָֽעְלָ/ה׃פ
translation:
  text: And the border of the Amorites was from the Ascent of Akrabbim, from Sela
    and upward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Akrabbim means 'scorpions'; alternatively, 'the ascent of Scorpions.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from the rock,' if the Hebrew is taken as a common noun rather than
      the place name Sela.
    reason: alternative_reading
lexical_decisions:
- source_word: גְבוּל
  chosen: border
  alternatives:
  - boundary
  - territory
  lexicon: HALOT
  rationale: גְּבוּל commonly denotes a border or boundary line rather than the whole
    territory. 'Border' fits the geographic sense here.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: Although morphologically singular, the ethnonym often functions collectively.
    English idiom prefers the plural collective 'the Amorites' in this territorial
    notice.
- source_word: מִמַּעֲלֵה עַקְרַבִּים
  chosen: from the Ascent of Akrabbim
  alternatives:
  - from the ascent of Scorpions
  - from Maaleh-acrabbim
  lexicon: HALOT
  rationale: מַעֲלֵה is 'ascent/pass.' Because עַקְרַבִּים is part of a known place
    name, a transliterated form best preserves it in the main text. The literal sense
    is preserved in a footnote.
- source_word: מֵהַסֶּלַע
  chosen: from Sela
  alternatives:
  - from the rock
  lexicon: HALOT
  rationale: With the article, the term can mean 'the rock,' but in this geographic
    context it is commonly understood as the place name Sela. The lexical alternative
    is worth preserving in a footnote because the Hebrew form is transparently the
    common noun.
- source_word: וָמָעְלָה
  chosen: and upward
  alternatives:
  - and above
  - upward from there
  lexicon: HALOT
  rationale: The adverb indicates continuation in an upward direction or beyond that
    point. 'And upward' is concise and natural in English while preserving the spatial
    sense.
- source_word: וּ
  chosen: And
  alternatives:
  - Now
  lexicon: HALOT
  rationale: The conjunction simply links this notice to the preceding context; 'And'
    is the most straightforward rendering.
