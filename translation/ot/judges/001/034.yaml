id: JDG.1.34
reference: Judges 1:34
source:
  edition: WLC
  text: וַ/יִּלְחֲצ֧וּ הָ/אֱמֹרִ֛י אֶת בְּנֵי דָ֖ן הָ/הָ֑רָ/ה כִּי לֹ֥א נְתָנ֖/וֹ לָ/רֶ֥דֶת לָ/עֵֽמֶק־־־׃
translation:
  text: And the Amorites pressed the sons of Dan back into the hill country[a], because they did not allow them to go down into the valley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the Amorite pressed the sons of Dan toward the hill country, for he did not allow him to go down to the valley.' The Hebrew uses collective singular forms for the people group, while the sense in context is plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְחֲצוּ
  chosen: pressed ... back
  alternatives:
  - pressed
  - confined
  - crowded
  lexicon: HALOT
  rationale: The verb לחץ conveys pressing, oppressing, or forcing into a constrained position. In this context, with the following directional phrase 'into the hill country,' 'pressed ... back' makes explicit the hostile forcing implied by the Hebrew without overparaphrasing.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: Although morphologically singular, this ethnonym often functions collectively. English idiom prefers the plural collective 'the Amorites' here, matching the sense of a people group acting against Dan.
- source_word: בְּנֵי דָן
  chosen: the sons of Dan
  alternatives:
  - the Danites
  - the people of Dan
  lexicon: HALOT
  rationale: A more formal rendering preserves the Hebrew familial/tribal expression 'sons of Dan.' 'Danites' is idiomatic and possible, but the chosen wording stays closer to the source while remaining natural enough in English.
- source_word: הָהָרָה
  chosen: into the hill country
  alternatives:
  - into the mountain
  - toward the hill country
  lexicon: HALOT
  rationale: The directional ending indicates motion toward/into the hill region. 'Hill country' is the natural geographic equivalent in English and fits the contrast with 'the valley' later in the verse better than the more literal but less idiomatic 'mountain.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the preceding action. 'Because' communicates the causal sense clearly in modern English.
- source_word: לֹא נְתָנוֹ
  chosen: they did not allow them
  alternatives:
  - he did not allow him
  - they would not let them
  - they did not permit them
  lexicon: HALOT
  rationale: 'The consonantal form is singular with pronominal suffix, but the sense in context is collective: the Amorites prevented the Danites from descending. English requires the pluralized collective sense. ''Allow'' is a clear rendering of נתן in this permissive construction.'
- source_word: לָרֶדֶת
  chosen: to go down
  alternatives:
  - to descend
  lexicon: HALOT
  rationale: '''Go down'' is the natural English equivalent of ירד in narrative geography, preserving the topographical movement from hill country to valley.'
- source_word: לָעֵמֶק
  chosen: into the valley
  alternatives:
  - into the plain
  - to the valley
  lexicon: HALOT
  rationale: עֵמֶק denotes a valley or lowland depression. 'Valley' is the most direct and contextually fitting gloss, especially in contrast to the hill country.
