id: JDG.1.17
reference: Judges 1:17
source:
  edition: WLC
  text: וַ/יֵּ֤לֶךְ יְהוּדָה֙ אֶת שִׁמְע֣וֹן אָחִ֔י/ו וַ/יַּכּ֕וּ אֶת הַֽ/כְּנַעֲנִ֖י יוֹשֵׁ֣ב צְפַ֑ת וַ/יַּחֲרִ֣ימוּ אוֹתָ֔/הּ וַ/יִּקְרָ֥א אֶת שֵׁם הָ/עִ֖יר חָרְמָֽה־־־־׃
translation:
  text: Then Judah went with Simeon his brother[a], and they struck down the Canaanites living in Zephath and devoted it to destruction[c][b]; so they called the name of the city Hormah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hormah sounds like the Hebrew word for something devoted to destruction (ḥerem), explaining the city's name.
    reason: lexical_alternative
  - marker: b
    text: Or 'utterly destroyed it' / 'put it under the ban.' The Hebrew verb refers to devoting something irrevocably, often by destruction.
    reason: alternative_reading
  - marker: c
    text: Hebrew 'he called'; the singular likely refers to Judah as a collective or representative subject. Some translations smooth this to 'they called.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went with
  alternatives:
  - went
  - went against
  - marched with
  lexicon: HALOT
  rationale: הלך literally means 'went.' With אֶת introducing Simeon, the sense is accompaniment/association, so 'went with' best captures the Hebrew idiom in natural English without overinterpreting it as military advance.
- source_word: יְהוּדָה
  chosen: Judah
  alternatives:
  - the tribe of Judah
  lexicon: HALOT
  rationale: The proper name can stand metonymically for the tribe. English commonly uses 'Judah' in this narrative context; adding 'the tribe of' would be interpretive expansion beyond the Hebrew wording.
- source_word: אֶת שִׁמְעוֹן אָחִיו
  chosen: with Simeon his brother
  alternatives:
  - Simeon his brother
  - against Simeon his brother
  lexicon: HALOT
  rationale: Here אֶת after הלך marks accompaniment rather than direct object. 'With Simeon his brother' reflects the syntax and avoids the misleading impression that Simeon is the object of Judah's action.
- source_word: וַיַּכּוּ
  chosen: they struck down
  alternatives:
  - they struck
  - they defeated
  - they killed
  lexicon: HALOT
  rationale: נכה in military narrative often denotes a decisive attack/defeat, frequently involving killing. 'Struck down' preserves the martial force while remaining idiomatic and not overstating beyond the immediate context.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanites
  alternatives:
  - the Canaanite
  lexicon: HALOT
  rationale: Although morphologically singular, the term is often collective in Hebrew. Since the verb is plural and the context is military action against a population, English plural 'the Canaanites' best conveys the collective sense.
- source_word: יוֹשֵׁב צְפַת
  chosen: living in Zephath
  alternatives:
  - dwelling in Zephath
  - inhabiting Zephath
  lexicon: HALOT
  rationale: The participle ישב denotes residing/dwelling. 'Living in' is clear modern English and accurately expresses the participial description of the Canaanites associated with Zephath.
- source_word: וַיַּחֲרִימוּ אוֹתָהּ
  chosen: devoted it to destruction
  alternatives:
  - utterly destroyed it
  - put it under the ban
  - devoted it
  lexicon: HALOT
  rationale: חרם in the Hiphil refers to placing something under ḥerem, devoting it irrevocably, often by destruction. 'Devoted it to destruction' preserves the technical-sacral force better than the flatter 'destroyed it' and is more accessible than 'put it under the ban.'
- source_word: וַיִּקְרָא
  chosen: he called
  alternatives:
  - they called
  - it was called
  lexicon: HALOT
  rationale: The verb is morphologically singular, so the main text preserves that with 'he called,' most naturally referring back to Judah as a collective singular. A plural rendering would smooth the English but obscure the Hebrew form.
- source_word: אֶת שֵׁם הָעִיר
  chosen: the name of the city
  alternatives:
  - the city
  - its name
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'called the name of the city.' Retaining 'the name of the city' reflects the formal naming formula while remaining understandable in English.
- source_word: חָרְמָה
  chosen: Hormah
  alternatives: []
  lexicon: HALOT
  rationale: This is a place name and should be transliterated per project philosophy. Its sound also echoes חרם ('devote to destruction'), a wordplay better explained in a footnote than forced into the main text.
