theological_decisions:
- issue: Rendering of חרם language in holy-war context
  chosen_reading: devoted it to destruction
  alternative_readings:
  - utterly destroyed it
  - put it under the ban
  rationale: The Hebrew carries both destruction and consecration/devotion overtones. The chosen rendering preserves that theological tension rather than reducing it to mere military annihilation.
  doctrine_reference: Translation philosophy §3, §5
