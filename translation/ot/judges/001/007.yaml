theological_decisions:
- issue: Reference of אֱלֹהִים in Adoni-bezek's statement
  chosen_reading: God
  alternative_readings:
  - the gods
  rationale: Although אֱלֹהִים can be plural in form and occasionally mean 'gods,' the singular verb שִׁלַּם strongly supports a singular sense here. The statement is best rendered as acknowledgment of divine retribution by God, without specifying a fuller theological confession than the text itself states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
