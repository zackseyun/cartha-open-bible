id: JDG.1.7
reference: Judges 1:7
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֲדֹֽנִי בֶ֗זֶק שִׁבְעִ֣ים מְלָכִ֡ים בְּֽהֹנוֹת֩ יְדֵי/הֶ֨ם וְ/רַגְלֵי/הֶ֜ם מְקֻצָּצִ֗ים הָי֤וּ מְלַקְּטִים֙ תַּ֣חַת שֻׁלְחָנִ֔/י כַּ/אֲשֶׁ֣ר עָשִׂ֔יתִי כֵּ֥ן שִׁלַּם לִ֖/י אֱלֹהִ֑ים וַ/יְבִיאֻ֥/הוּ יְרוּשָׁלִַ֖ם וַ/יָּ֥מָת שָֽׁם־׀־׃פ
translation:
  text: And Adoni-bezek said[a], “Seventy kings, with the thumbs of their hands and their feet cut off, used to gather scraps under my table. As I have done, so God has repaid me.” And they brought him to Jerusalem[b], and he died there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “with their thumbs and big toes cut off.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew אֱלֹהִים is morphologically plural but takes a singular verb here; thus “God” rather than “the gods.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנִי בֶזֶק
  chosen: Adoni-bezek
  alternatives:
  - Lord of Bezek
  lexicon: HALOT
  rationale: Treated as a proper name and therefore transliterated per project policy to transliterate names rather than translate them. The underlying sense may be 'lord of Bezek,' but in context it functions as the personal designation of the speaker.
- source_word: שִׁבְעִים מְלָכִים
  chosen: Seventy kings
  lexicon: HALOT
  rationale: Straightforward numeric + noun construction; retained formally.
- source_word: בְּהֹנוֹת יְדֵיהֶם וְרַגְלֵיהֶם
  chosen: the thumbs of their hands and their feet
  alternatives:
  - their thumbs and big toes
  - their thumbs and toes
  lexicon: HALOT
  rationale: בֹּהֶן refers specifically to the thumb or great toe depending on the limb named. Because both 'hands' and 'feet' are explicitly present in Hebrew, the translation preserves the anatomical distinction without over-paraphrasing. English 'thumbs of their hands and their feet' is slightly wooden but keeps the source structure; smoothing to 'thumbs and big toes' is possible and preserved as an alternative.
- source_word: מְקֻצָּצִים
  chosen: cut off
  alternatives:
  - cut away
  - mutilated
  lexicon: HALOT
  rationale: Passive participle from קצץ, indicating severing/cutting off. 'Cut off' is the clearest idiomatic equivalent.
- source_word: הָיוּ מְלַקְּטִים
  chosen: used to gather scraps
  alternatives:
  - were gathering
  - used to pick up scraps
  - gleaned
  lexicon: HALOT
  rationale: The periphrastic construction conveys customary past action. לקט literally means gather/pick up, often gleaning. In the context of disabled kings under a table, 'gather scraps' communicates the humiliating action naturally in English.
- source_word: תַּחַת שֻׁלְחָנִי
  chosen: under my table
  lexicon: HALOT
  rationale: Direct spatial expression; retained literally.
- source_word: כַּאֲשֶׁר עָשִׂיתִי כֵּן
  chosen: As I have done, so
  alternatives:
  - Just as I did, so
  - As I did, so
  lexicon: HALOT
  rationale: Preserves the comparative formula and the speaker's acknowledgment of retributive correspondence.
- source_word: שִׁלַּם לִי אֱלֹהִים
  chosen: God has repaid me
  alternatives:
  - God has paid me back
  - God has requited me
  lexicon: HALOT
  rationale: שׁלם in the piel here conveys repayment/recompense. Singular English 'God' is appropriate though אֱלֹהִים is morphologically plural, since the verb is singular and the referent is the God who has requited him.
- source_word: וַיְבִיאֻהוּ יְרוּשָׁלִַם
  chosen: And they brought him to Jerusalem
  alternatives:
  - Then they brought him to Jerusalem
  lexicon: HALOT
  rationale: Wayyiqtol narrative sequence with 3mp subject and 3ms object; rendered with simple past narrative English.
- source_word: וַיָּמָת שָׁם
  chosen: and he died there
  alternatives:
  - and died there
  lexicon: HALOT
  rationale: Explicit subject retained for clarity in English narrative flow.
