id: JDG.1.31
reference: Judges 1:31
source:
  edition: WLC
  text: אָשֵׁ֗ר לֹ֤א הוֹרִישׁ֙ אֶת יֹשְׁבֵ֣י עַכּ֔וֹ וְ/אֶת יוֹשְׁבֵ֖י צִיד֑וֹן וְ/אֶת
    אַחְלָ֤ב וְ/אֶת אַכְזִיב֙ וְ/אֶת חֶלְבָּ֔ה וְ/אֶת אֲפִ֖יק וְ/אֶת רְחֹֽב־־־־־־־׃
translation:
  text: Asher did not drive out the inhabitants of Acco, or the inhabitants of Sidon,
    or Ahlab, or Achzib, or Helbah, or Aphek, or Rehob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not dispossess' or 'did not expel.' The Hebrew verb refers to removing
      prior occupants from possession of the land.
    reason: lexical_alternative
  - marker: b
    text: Acco is the ancient coastal city later known as Acre.
    reason: cultural_note
lexical_decisions:
- source_word: הוֹרִישׁ
  chosen: did not drive out
  alternatives:
  - did not dispossess
  - did not expel
  lexicon: HALOT
  rationale: The Hiphil of ירש in conquest contexts commonly means to cause someone
    to lose possession, hence 'drive out' or 'dispossess.' 'Drive out' is natural
    modern English and fits the repeated pattern in Judges 1.
- source_word: יֹשְׁבֵי
  chosen: the inhabitants of
  alternatives:
  - those living in
  - the residents of
  lexicon: HALOT
  rationale: The participle of ישב denotes those dwelling in a place. 'Inhabitants
    of' is concise, idiomatic, and preserves the collective sense.
- source_word: עַכּוֹ
  chosen: Acco
  alternatives:
  - Akko
  - Acre
  lexicon: HALOT
  rationale: As a place name, it is transliterated rather than translated, per project
    philosophy. 'Acco' is a standard biblical English form; 'Acre' is later and potentially
    anachronistic.
- source_word: צִידוֹן
  chosen: Sidon
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: אַחְלָב
  chosen: Ahlab
  lexicon: HALOT
  rationale: Proper place name; transliterated directly.
- source_word: אַכְזִיב
  chosen: Achzib
  lexicon: HALOT
  rationale: Proper place name; transliterated directly.
- source_word: חֶלְבָּה
  chosen: Helbah
  alternatives:
  - Heleb
  lexicon: HALOT
  rationale: The consonantal form here supports 'Helbah.' Some English traditions
    vary, but this transliteration follows the Hebrew form in this verse.
- source_word: אֲפִיק
  chosen: Aphek
  alternatives:
  - Aphekah
  lexicon: HALOT
  rationale: Standard English transliteration of the place name; 'Aphek' is the conventional
    rendering for אֲפִיק.
- source_word: רְחֹב
  chosen: Rehob
  alternatives:
  - Rechob
  lexicon: HALOT
  rationale: Proper place name; 'Rehob' is the standard English transliteration.
- source_word: וְ/אֶת ... וְ/אֶת
  chosen: or ... or ... or
  alternatives:
  - and ... and ... and
  lexicon: Hebrew syntax / BDB
  rationale: The repeated object marker with waw coordinates the list of places/peoples
    not driven out. In English, 'or' better reflects the distributive listing after
    a negated verb ('did not drive out X, or Y, or Z') and avoids implying successful
    joint action.
