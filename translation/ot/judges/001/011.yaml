id: JDG.1.11
reference: Judges 1:11
source:
  edition: WLC
  text: וַ/יֵּ֣לֶךְ מִ/שָּׁ֔ם אֶל יוֹשְׁבֵ֖י דְּבִ֑יר וְ/שֵׁם דְּבִ֥יר לְ/פָנִ֖ים
    קִרְיַת סֵֽפֶר־־־׃
translation:
  text: From there he went against the inhabitants of Debir. (The former name of Debir
    was Kiriath-sepher.)
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the inhabitants of Debir.' The Hebrew preposition can be rendered
      more literally as 'to/toward,' but here it introduces a hostile movement in
      a conquest narrative, hence 'against.'
    reason: lexical_alternative
  - marker: b
    text: Kiriath-sepher is the earlier name of Debir; the name may mean 'City of
      the Book' or 'City of Scribe(s),' but the place name is transliterated in the
      main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: he went
  alternatives:
  - he marched
  - he proceeded
  lexicon: HALOT
  rationale: Basic narrative wayyiqtol of הלך, rendered with simple past 'went.' Although
    in military context it can imply marching, the verb itself is not more specific
    than 'went.'
- source_word: מִשָּׁם
  chosen: from there
  lexicon: HALOT
  rationale: Straightforward adverbial phrase indicating movement from the previously
    mentioned location.
- source_word: אֶל
  chosen: against
  alternatives:
  - to
  - toward
  lexicon: HALOT
  rationale: Though literally 'to/toward,' in this conquest context with movement
    toward a population center, English idiom prefers 'against' to convey hostile
    advance without overstating the Hebrew.
- source_word: יוֹשְׁבֵי
  chosen: the inhabitants of
  alternatives:
  - those living in
  - the dwellers of
  lexicon: HALOT
  rationale: Participle of ישב used substantivally for residents of a place. 'Inhabitants
    of' is natural and suitably formal.
- source_word: דְּבִיר
  chosen: Debir
  rationale: Proper place name, transliterated per project philosophy.
- source_word: וְשֵׁם דְּבִיר לְפָנִים
  chosen: the former name of Debir was
  alternatives:
  - and the name of Debir formerly was
  - Debir was formerly called
  lexicon: HALOT
  rationale: This clause explains an earlier name. 'Former name' gives clear modern
    English while preserving the sense of לְפָנִים as 'formerly/before.'
- source_word: לְפָנִים
  chosen: former
  alternatives:
  - formerly
  - before
  lexicon: HALOT
  rationale: Temporal adverb meaning 'formerly' or 'beforetime'; incorporated idiomatically
    into 'former name.'
- source_word: קִרְיַת סֵפֶר
  chosen: Kiriath-sepher
  alternatives:
  - Kiriath-sefer
  - City of the Book
  lexicon: HALOT
  rationale: As a place name, it is best transliterated rather than translated. An
    English gloss such as 'City of the Book' is possible etymologically but would
    be less appropriate in the main text for a toponym.
