id: JDG.1.20
reference: Judges 1:20
source:
  edition: WLC
  text: וַ/יִּתְּנ֤וּ לְ/כָלֵב֙ אֶת חֶבְר֔וֹן כַּֽ/אֲשֶׁ֖ר דִּבֶּ֣ר מֹשֶׁ֑ה וַ/יּ֣וֹרֶשׁ
    מִ/שָּׁ֔ם אֶת שְׁלֹשָׁ֖ה בְּנֵ֥י הָ/עֲנָֽק־־׃
translation:
  text: They gave Hebron to Caleb, as Moses had said, and he drove out from there
    the three sons of Anak.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the three descendants of Anak" or "the three Anakites." The Hebrew says
      "sons of Anak," which may refer to clan descent rather than immediate sons.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  chosen: They gave
  alternatives:
  - And they gave
  lexicon: HALOT
  rationale: Wayyiqtol of נתן, straightforward narrative past. English omits the conjunction
    for natural style while preserving the sequence.
- source_word: לְכָלֵב
  chosen: to Caleb
  lexicon: HALOT
  rationale: Indirect object marked by ל; personal name transliterated per translation
    philosophy.
- source_word: אֶת חֶבְרוֹן
  chosen: Hebron
  alternatives:
  - the city of Hebron
  lexicon: HALOT
  rationale: Direct object marker plus place name. The bare place name is sufficient
    in English.
- source_word: כַּאֲשֶׁר דִּבֶּר מֹשֶׁה
  chosen: as Moses had said
  alternatives:
  - as Moses had spoken
  - just as Moses had promised
  lexicon: HALOT
  rationale: כַּאֲשֶׁר introduces comparison, 'as/just as.' דִּבֶּר is 'spoke/said.'
    'Had said' fits the prior reference naturally without adding the stronger nuance
    'promised' to the main text.
- source_word: וַיּוֹרֶשׁ
  chosen: he drove out
  alternatives:
  - he dispossessed
  - he took possession by driving out
  lexicon: HALOT
  rationale: From ירש in the Hiphil, which can mean to dispossess or drive out and
    thereby take possession. In this immediate context, the object is the inhabitants,
    so 'drove out' communicates the action clearly in modern English.
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - from Hebron
  lexicon: HALOT
  rationale: Adverbial expression referring back to Hebron. 'From there' preserves
    the Hebrew wording while remaining clear.
- source_word: אֶת שְׁלֹשָׁה בְּנֵי הָעֲנָק
  chosen: the three sons of Anak
  alternatives:
  - the three descendants of Anak
  - the three Anakites
  lexicon: HALOT
  rationale: בְּנֵי literally means 'sons of,' and preserving that form is more transparent
    to the Hebrew. Since this can also denote descendants or clan members, alternatives
    are worth preserving in a footnote.
