id: JDG.1.26
reference: Judges 1:26
source:
  edition: WLC
  text: וַ/יֵּ֣לֶךְ הָ/אִ֔ישׁ אֶ֖רֶץ הַ/חִתִּ֑ים וַ/יִּ֣בֶן עִ֗יר וַ/יִּקְרָ֤א שְׁמָ/הּ֙ ל֔וּז ה֣וּא שְׁמָ֔/הּ עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה׃פ
translation:
  text: And the man went to the land of the Hittites and built a city and called its name Luz[a]; that is its name to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'named it Luz.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - departed
  - traveled
  lexicon: HALOT
  rationale: Qal wayyiqtol of הלך, the standard narrative form meaning 'went.' 'Went' is the most natural and sufficiently formal rendering in English narrative.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the person
  lexicon: HALOT
  rationale: Definite singular אִישׁ refers back to the specific man previously mentioned. 'The man' preserves the masculine singular reference and narrative continuity.
- source_word: אֶרֶץ הַחִתִּים
  chosen: the land of the Hittites
  alternatives:
  - Hittite country
  - the country of the Hittites
  lexicon: HALOT
  rationale: Construct phrase literally 'land of the Hittites.' This is clear, natural English and preserves the ethnic/geographical designation without overinterpreting the exact political region.
- source_word: וַיִּבֶן עִיר
  chosen: built a city
  alternatives:
  - built a town
  - founded a city
  lexicon: HALOT
  rationale: בנה with עִיר is straightforwardly 'built a city.' 'Founded a city' is interpretive; 'built a city' stays closer to the Hebrew while remaining idiomatic.
- source_word: וַיִּקְרָא שְׁמָהּ לוּז
  chosen: called its name Luz
  alternatives:
  - named it Luz
  - called the city Luz
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'called its name Luz.' This draft keeps the idiom in readable English. 'Its' refers to the feminine noun עִיר.
- source_word: לוּז
  chosen: Luz
  lexicon: HALOT
  rationale: Place name is transliterated in keeping with the translation philosophy to transliterate names rather than translate them.
- source_word: הוּא שְׁמָהּ
  chosen: That is its name
  alternatives:
  - that was its name
  - it is its name
  lexicon: HALOT
  rationale: Nominal clause with pronoun הוּא functions demonstratively/emphatically. 'That is its name' gives the sense naturally in English and sets up the following temporal phrase.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the Hebrew temporal expression in English biblical narrative.
