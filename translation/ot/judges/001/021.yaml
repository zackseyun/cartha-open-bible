id: JDG.1.21
reference: Judges 1:21
source:
  edition: WLC
  text: וְ/אֶת הַ/יְבוּסִי֙ יֹשֵׁ֣ב יְרֽוּשָׁלִַ֔ם לֹ֥א הוֹרִ֖ישׁוּ בְּנֵ֣י בִנְיָמִ֑ן
    וַ/יֵּ֨שֶׁב הַ/יְבוּסִ֜י אֶת בְּנֵ֤י בִנְיָמִן֙ בִּ/יר֣וּשָׁלִַ֔ם עַ֖ד הַ/יּ֥וֹם
    הַ/זֶּֽה־־׃ס
translation:
  text: But the sons of Benjamin did not drive out the Jebusites who were living in
    Jerusalem, so the Jebusites have lived with the sons of Benjamin in Jerusalem
    to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the Jebusite ... dwelt with the sons of Benjamin'; the
      singular functions collectively for the people group.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיְבוּסִי
  chosen: the Jebusites
  alternatives:
  - the Jebusite
  lexicon: HALOT
  rationale: Although the form is singular collective ('the Jebusite'), in English
    the ethnic collective is more naturally rendered as the plural 'the Jebusites,'
    especially since the verse speaks of a people group not expelled and continuing
    to dwell there.
- source_word: יֹשֵׁב יְרוּשָׁלַם
  chosen: who were living in Jerusalem
  alternatives:
  - inhabiting Jerusalem
  - dwelling in Jerusalem
  lexicon: HALOT
  rationale: The participle יֹשֵׁב denotes ongoing residence. 'Who were living' gives
    natural English while preserving the durative sense.
- source_word: הוֹרִישׁוּ
  chosen: did not drive out
  alternatives:
  - did not dispossess
  - did not expel
  lexicon: HALOT
  rationale: In conquest-settlement contexts, הוריש commonly means to dispossess or
    drive out inhabitants. 'Drive out' is idiomatic and clear in modern English.
- source_word: בְּנֵי בִנְיָמִן
  chosen: the sons of Benjamin
  alternatives:
  - the Benjaminites
  - the people of Benjamin
  lexicon: HALOT
  rationale: A more formal rendering preserves the Hebrew construction and its tribal-genealogical
    flavor. 'Benjaminites' is possible but slightly less transparent to the source
    wording.
- source_word: וַיֵּשֶׁב
  chosen: have lived
  alternatives:
  - lived
  - dwelt
  - settled
  lexicon: HALOT
  rationale: With the following phrase 'to this day,' English often uses present perfect
    to express a state continuing from past to the writer's present. This best captures
    the discourse sense.
- source_word: אֶת בְּנֵי בִנְיָמִן
  chosen: with the sons of Benjamin
  alternatives:
  - among the sons of Benjamin
  - alongside the sons of Benjamin
  lexicon: HALOT
  rationale: Here אֶת is best taken in the sense of accompaniment rather than as a
    direct-object marker. The point is co-residence, not that the Jebusites 'inhabited
    the sons of Benjamin.' 'With' is the clearest rendering.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is the standard idiomatic rendering for the Hebrew temporal formula
    indicating continuation up to the narrator's present.
- source_word: וְ
  chosen: But
  alternatives:
  - And
  lexicon: HALOT
  rationale: The conjunction marks contrast with surrounding conquest notices; 'But'
    brings out the adversative force in context better than a simple 'And'.
