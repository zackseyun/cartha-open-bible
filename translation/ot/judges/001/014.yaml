id: JDG.1.14
reference: Judges 1:14
source:
  edition: WLC
  text: וַ/יְהִ֣י בְּ/בוֹאָ֗/הּ וַ/תְּסִיתֵ֨/הוּ֙ לִ/שְׁא֤וֹל מֵֽ/אֵת אָבִ֨י/הָ֙ הַ/שָּׂדֶ֔ה
    וַ/תִּצְנַ֖ח מֵ/עַ֣ל הַ/חֲמ֑וֹר וַ/יֹּֽאמֶר לָ֥/הּ כָּלֵ֖ב מַה לָּֽ/ךְ־־־׃
translation:
  text: And when she came, she urged him to ask her father for the field. Then she
    dismounted from the donkey, and Caleb said to her, “What do you want?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “she persuaded him” or “she incited him.” The Hebrew verb can carry
      a range from urging to inciting; here the context favors a neutral sense of
      urging.
    reason: lexical_alternative
  - marker: b
    text: Or, “she alighted from the donkey” or “she dropped down from the donkey.”
    reason: lexical_alternative
  - marker: c
    text: The Hebrew idiom literally reads, “What is to you?” meaning “What do you
      want?” or “What is the matter?”
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּבוֹאָהּ
  chosen: when she came
  alternatives:
  - when she arrived
  - as she came
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב plus 3fs suffix gives a temporal
    sense, 'at her coming' or 'when she came.' A smooth temporal clause is natural
    English.
- source_word: וַתְּסִיתֵהוּ
  chosen: she urged him
  alternatives:
  - she incited him
  - she persuaded him
  lexicon: HALOT
  rationale: The verb סות can mean incite, entice, or urge. In this domestic/request
    context, 'urged' fits the narrative without importing a necessarily negative moral
    sense that 'incited' may suggest in English.
- source_word: לִשְׁאוֹל
  chosen: to ask
  alternatives:
  - to request
  lexicon: HALOT
  rationale: The infinitive of שאל here governs the object of petition from her father.
    'Ask' is the most direct and idiomatic rendering.
- source_word: מֵאֵת אָבִיהָ
  chosen: her father
  alternatives:
  - from her father
  lexicon: HALOT
  rationale: The preposition מֵאֵת marks the source of the request. In English, 'ask
    her father for' naturally incorporates the source relation without requiring a
    wooden 'from' immediately after 'ask.'
- source_word: הַשָּׂדֶה
  chosen: the field
  alternatives:
  - a field
  - the land
  lexicon: HALOT
  rationale: The article is present, so 'the field' is preferred. The context concerns
    a specific parcel of land being requested.
- source_word: וַתִּצְנַח מֵעַל הַחֲמוֹר
  chosen: she dismounted from the donkey
  alternatives:
  - she alighted from the donkey
  - she dropped down from the donkey
  lexicon: HALOT
  rationale: The verb can denote descending or dropping down. In this narrative setting,
    'dismounted' communicates the action clearly in modern English while preserving
    the basic sense.
- source_word: מַה לָּךְ
  chosen: What do you want?
  alternatives:
  - What is the matter?
  - What troubles you?
  - What do you have?
  lexicon: HALOT
  rationale: The idiom literally means 'What is to you?' and functions as an inquiry
    about her concern or request. Given the immediate context of petition, 'What do
    you want?' best captures the pragmatic force.
- source_word: כָּלֵב
  chosen: Caleb
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
