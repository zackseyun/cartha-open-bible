  text: וְ/הָ/אֹרֵ֗ב יֹשֵׁ֥ב לָ/הּ֙ בַּ/חֶ֔דֶר וַ/תֹּ֣אמֶר אֵלָ֔י/ו פְּלִשְׁתִּ֥ים עָלֶ֖י/ךָ שִׁמְשׁ֑וֹן וַ/יְנַתֵּק֙ אֶת הַ/יְתָרִ֔ים כַּ/אֲשֶׁ֨ר יִנָּתֵ֤ק פְּתִֽיל הַ/נְּעֹ֨רֶת֙ בַּ/הֲרִיח֣/וֹ אֵ֔שׁ וְ/לֹ֥א נוֹדַ֖ע כֹּחֽ/וֹ־־׃
translation:
  text: 'Now the ambush was waiting for her in the inner room, and she said to him, “Philistines are upon you, Samson!” But he snapped the cords as a thread of tow snaps when it smells fire, and his strength was not discovered.'
