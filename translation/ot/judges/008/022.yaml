id: JDG.8.22
reference: Judges 8:22
source:
  edition: WLC
  text: וַ/יֹּאמְר֤וּ אִֽישׁ יִשְׂרָאֵל֙ אֶל גִּדְע֔וֹן מְשָׁל בָּ֨/נוּ֙ גַּם אַתָּ֔ה
    גַּם בִּנְ/ךָ֖ גַּ֣ם בֶּן בְּנֶ֑/ךָ כִּ֥י הוֹשַׁעְתָּ֖/נוּ מִ/יַּ֥ד מִדְיָֽן־־־־־־׃
translation:
  text: Then the men of Israel said to Gideon, “Rule over us—you, your son, and your
    grandson as well—for you have saved us from the hand of Midian.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you, your son, and your son's son also.' The Hebrew explicitly names
      successive generations.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence better than a bare 'and.'
- source_word: אִישׁ יִשְׂרָאֵל
  chosen: the men of Israel
  alternatives:
  - the man of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Although אִישׁ is singular in form, this construction functions collectively
    here with the plural verb, referring to Israelite men as a group. 'The men of
    Israel' preserves the gendered and collective force more closely than the more
    generalized 'the Israelites.'
- source_word: מְשָׁל בָּנוּ
  chosen: Rule over us
  alternatives:
  - Govern us
  - Have dominion over us
  lexicon: HALOT
  rationale: The imperative of משל here requests political leadership or dominion.
    'Rule over us' is the most direct and idiomatic rendering in context.
- source_word: גַּם אַתָּה גַּם בִּנְךָ גַּם בֶּן בְּנֶךָ
  chosen: you, your son, and your grandson as well
  alternatives:
  - both you and your son and your son's son
  - you and your son and your son's son also
  lexicon: HALOT
  rationale: The repeated גַּם emphasizes succession beyond Gideon himself. 'Grandson'
    is clear modern English for 'son of your son,' and 'as well' preserves the additive
    emphasis.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the request. 'For' fits the formal yet readable
    tone of the verse.
- source_word: הוֹשַׁעְתָּנוּ
  chosen: you have saved us
  alternatives:
  - you delivered us
  - you rescued us
  lexicon: HALOT
  rationale: From ישׁע, denoting deliverance/salvation. 'Saved' preserves the lexical
    connection to broader biblical salvation language without overstating theology
    in this military context.
- source_word: מִיַּד מִדְיָן
  chosen: from the hand of Midian
  alternatives:
  - from Midian's hand
  - from the power of Midian
  lexicon: HALOT
  rationale: '''Hand'' is a common Hebrew idiom for power or control. Retaining the
    idiom in English is natural enough and preserves biblical texture.'
