theological_decisions:
- issue: Nature of Gideon's requested role
  chosen_reading: 'Render the request as dynastic political rule: ''Rule over us—you,
    your son, and your grandson as well.'''
  alternative_readings:
  - A looser request for leadership without dynastic implication
  rationale: The imperative משל plus the explicit succession formula ('you ... your
    son ... your grandson') indicates a request for ongoing hereditary rule, not merely
    temporary military leadership. The translation preserves that political-theological
    significance without importing later monarchy terminology not present in the Hebrew.
  doctrine_reference: Translation philosophy §§1, 3, 5
