id: JDG.8.21
reference: Judges 8:21
source:
  edition: WLC
  text: וַ/יֹּ֜אמֶר זֶ֣בַח וְ/צַלְמֻנָּ֗ע ק֤וּם אַתָּה֙ וּ/פְגַע בָּ֔/נוּ כִּ֥י כָ/אִ֖ישׁ
    גְּבוּרָת֑/וֹ וַ/יָּ֣קָם גִּדְע֗וֹן וַֽ/יַּהֲרֹג֙ אֶת זֶ֣בַח וְ/אֶת צַלְמֻנָּ֔ע
    וַ/יִּקַּח֙ אֶת הַ/שַּׂ֣הֲרֹנִ֔ים אֲשֶׁ֖ר בְּ/צַוְּארֵ֥י גְמַלֵּי/הֶֽם־־־־׃
translation:
  text: Then Zebah and Zalmunna said, “Rise yourself and strike us down, for as the
    man is, so is his strength.” So Gideon rose and killed Zebah and Zalmunna, and
    he took the crescent ornaments that were on the necks of their camels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Rise yourself and kill us,” with וּפְגַע בָּנוּ understood more explicitly
      as a lethal blow in context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew, “for as the man is, so is his strength,” a proverbial way of saying
      that a man's strength matches his stature or valor.
    reason: cultural_note
  - marker: c
    text: Or, “the crescents” or “moon-shaped ornaments.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר ... זֶבַח וְצַלְמֻנָּע
  chosen: Then Zebah and Zalmunna said
  alternatives:
  - And Zebah and Zalmunna said
  lexicon: HALOT
  rationale: The singular verb with compound subject is idiomatic Hebrew; English
    naturally uses plural 'said.' 'Then' captures the narrative waw in readable modern
    English.
- source_word: קוּם אַתָּה
  chosen: Rise yourself
  alternatives:
  - Get up yourself
  - You rise
  lexicon: HALOT
  rationale: The imperative plus explicit pronoun is emphatic. 'Rise yourself' preserves
    the emphasis better than a bare 'rise,' while remaining natural enough in context.
- source_word: וּפְגַע בָּנוּ
  chosen: and strike us down
  alternatives:
  - and attack us
  - and fall upon us
  - and kill us
  lexicon: HALOT
  rationale: פגע can mean 'meet, attack, strike.' In this execution context, the sense
    is not merely 'attack' but a lethal blow. 'Strike us down' preserves the force
    without over-paraphrasing.
- source_word: כִּי כָאִישׁ גְּבוּרָתוֹ
  chosen: for as the man is, so is his strength
  alternatives:
  - for according to the man, so is his strength
  - for a man's strength matches the man
  lexicon: HALOT
  rationale: This is a proverbial statement linking a man's capacity with his stature/valor.
    Retaining 'the man' reflects the Hebrew singular masculine form and preserves
    the aphoristic quality. The clause implies that a stronger man should perform
    the killing.
- source_word: וַיָּקָם גִּדְעוֹן
  chosen: So Gideon rose
  alternatives:
  - Then Gideon got up
  lexicon: HALOT
  rationale: Keeps the narrative sequence and echoes the imperative קוּם, showing
    Gideon's response.
- source_word: וַיַּהֲרֹג
  chosen: and killed
  alternatives:
  - and slew
  lexicon: HALOT
  rationale: Straightforward rendering of the common verb for killing; 'killed' is
    clear modern English.
- source_word: הַשַּׂהֲרֹנִים
  chosen: the crescent ornaments
  alternatives:
  - the crescent moons
  - the moon-shaped ornaments
  - the crescents
  lexicon: HALOT
  rationale: The noun denotes crescent-shaped ornaments, likely pendants. 'Crescent
    ornaments' is precise and readable, avoiding an overly literal but potentially
    misleading 'moons.'
- source_word: אֲשֶׁר בְּצַוְּארֵי גְמַלֵּיהֶם
  chosen: that were on the necks of their camels
  alternatives:
  - that were around the necks of their camels
  lexicon: HALOT
  rationale: This relative clause specifies the location of the ornaments. 'On the
    necks' is idiomatic and sufficiently exact.
