theological_decisions:
- issue: Gendered proverbial expression כָאִישׁ
  chosen_reading: as the man is, so is his strength
  alternative_readings:
  - as a man is, so is his strength
  - as one is, so is his strength
  rationale: Per translation philosophy, gender-accurate rendering is preferred where
    the source is grammatically masculine and contextually refers to a male warrior.
    The saying concerns male combat strength in context, so 'man' is retained rather
    than neutralizing to 'one.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
