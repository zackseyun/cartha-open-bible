id: JDG.8.29
reference: Judges 8:29
source:
  edition: WLC
  text: וַ/יֵּ֛לֶךְ יְרֻבַּ֥עַל בֶּן יוֹאָ֖שׁ וַ/יֵּ֥שֶׁב בְּ/בֵיתֽ/וֹ־׃
translation:
  text: Then Jerubbaal son of Joash went and lived in his house[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went and settled in his house' or 'went and dwelt in his house.' The Hebrew verb can denote dwelling or settling, not merely physical sitting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - departed
  - returned
  lexicon: HALOT
  rationale: הלך in the waw-consecutive narrative sequence most naturally means 'went.' 'Returned' would over-specify direction not explicit in the verb itself, though context may imply going back home.
- source_word: יְרֻבַּעַל
  chosen: Jerubbaal
  alternatives:
  - Gideon
  lexicon: HALOT
  rationale: This verse uses the personal name יְרֻבַּעַל, so the translation transliterates the name actually present in the Hebrew rather than substituting the more familiar alternate name Gideon.
- source_word: בֶּן יוֹאָשׁ
  chosen: son of Joash
  lexicon: HALOT
  rationale: Standard filial construction; 'son of Joash' is the direct and natural rendering.
- source_word: וַיֵּשֶׁב
  chosen: lived
  alternatives:
  - dwelt
  - settled
  - sat down
  lexicon: HALOT
  rationale: ישב can mean 'sit,' 'dwell,' or 'remain.' In the expression with בְּבֵיתוֹ, the sense is residence, so 'lived' gives clear modern English while preserving the idea of dwelling.
- source_word: בְּבֵיתוֹ
  chosen: in his house
  alternatives:
  - at his house
  - in his own house
  - at home
  lexicon: HALOT
  rationale: The preposition ב plus 'house' with 3ms suffix is literally 'in his house.' This is retained rather than the more idiomatic but less explicit 'at home.'
- source_word: וַ...וַ
  chosen: Then ... went and lived
  alternatives:
  - And ... went and dwelt
  rationale: The paired waw-consecutive verbs advance the narrative. 'Then' at the start and 'went and lived' in sequence reflect Hebrew narrative flow in readable English.
