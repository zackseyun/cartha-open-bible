id: JDG.8.5
reference: Judges 8:5
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ לְ/אַנְשֵׁ֣י סֻכּ֔וֹת תְּנוּ נָא֙ כִּכְּר֣וֹת לֶ֔חֶם לָ/עָ֖ם
    אֲשֶׁ֣ר בְּ/רַגְלָ֑/י כִּי עֲיֵפִ֣ים הֵ֔ם וְ/אָנֹכִ֗י רֹדֵ֛ף אַחֲרֵ֛י זֶ֥בַח וְ/צַלְמֻנָּ֖ע
    מַלְכֵ֥י מִדְיָֽן־־׃
translation:
  text: And he said to the men of Succoth, “Please give loaves of bread to the people
    who are at my feet, for they are weary, and I am pursuing Zebah and Zalmunna,
    the kings of Midian.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “the people who are at my feet,” an idiom for those accompanying
      or following him.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאַנְשֵׁי סֻכּוֹת
  chosen: to the men of Succoth
  alternatives:
  - to the people of Succoth
  lexicon: HALOT
  rationale: אַנְשֵׁי is specifically 'men of,' not a generic term for inhabitants.
    This preserves the masculine plural form and likely reference to the town's male
    representatives.
- source_word: תְּנוּ נָא
  chosen: Please give
  alternatives:
  - Give, please
  - Do give
  lexicon: HALOT
  rationale: The imperative plus נָא expresses a polite or urgent request. 'Please
    give' is natural modern English and preserves the appeal.
- source_word: כִּכְּרוֹת לֶחֶם
  chosen: loaves of bread
  alternatives:
  - round loaves of bread
  - bread cakes
  lexicon: HALOT
  rationale: כִּכָּר here refers to a loaf or round cake of bread. 'Loaves of bread'
    is the clearest idiomatic rendering in English.
- source_word: לָעָם אֲשֶׁר בְּרַגְלָי
  chosen: to the people who are at my feet
  alternatives:
  - to the troops who follow me
  - to the people who are with me
  lexicon: HALOT
  rationale: The idiom literally means those 'at my feet,' that is, accompanying or
    following Gideon. The main text keeps the concrete Hebrew image while remaining
    understandable.
- source_word: עֲיֵפִים
  chosen: weary
  alternatives:
  - faint
  - exhausted
  lexicon: HALOT
  rationale: The adjective denotes weariness from exertion. 'Weary' is accurate and
    natural; 'faint' would overstate physical collapse.
- source_word: רֹדֵף אַחֲרֵי
  chosen: am pursuing
  alternatives:
  - am chasing
  - am in pursuit of
  lexicon: HALOT
  rationale: The participle with אַחֲרֵי indicates ongoing pursuit. 'Am pursuing'
    captures the durative sense cleanly.
- source_word: זֶבַח וְצַלְמֻנָּע
  chosen: Zebah and Zalmunna
  lexicon: HALOT
  rationale: These are personal names and are therefore transliterated rather than
    translated, following project policy.
- source_word: מַלְכֵי מִדְיָן
  chosen: the kings of Midian
  alternatives:
  - Midianite kings
  lexicon: HALOT
  rationale: The construct phrase is most directly rendered 'the kings of Midian.'
    'Midianite kings' is possible but slightly less formal to the Hebrew structure.
