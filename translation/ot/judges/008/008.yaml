id: JDG.8.8
reference: Judges 8:8
source:
  edition: WLC
  text: וַ/יַּ֤עַל מִ/שָּׁם֙ פְּנוּאֵ֔ל וַ/יְדַבֵּ֥ר אֲלֵי/הֶ֖ם כָּ/זֹ֑את וַ/יַּעֲנ֤וּ
    אוֹת/וֹ֙ אַנְשֵׁ֣י פְנוּאֵ֔ל כַּ/אֲשֶׁ֥ר עָנ֖וּ אַנְשֵׁ֥י סֻכּֽוֹת׃
translation:
  text: From there he went up to Penuel and spoke to them in the same way, and the
    men of Penuel answered him just as the men of Succoth had answered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and spoke to them thus.' The Hebrew points back to
      the same kind of request or speech reported in the previous verse.
    reason: lexical_alternative
  - marker: b
    text: Penuel is also spelled 'Peniel' elsewhere.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַל
  chosen: he went up
  alternatives:
  - he ascended
  - he went on up
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' Here it introduces movement from Succoth
    to Penuel; 'went up' preserves the directional nuance without sounding overly
    formal.
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - from that place
  lexicon: HALOT
  rationale: A straightforward deictic adverb referring back to the previous location.
- source_word: פְּנוּאֵל
  chosen: Penuel
  alternatives:
  - Peniel
  rationale: Personal/place names are transliterated. 'Penuel' follows the consonantal
    form in this verse.
- source_word: וַיְדַבֵּר אֲלֵיהֶם כָּזֹאת
  chosen: and spoke to them in the same way
  alternatives:
  - and spoke to them like this
  - and said to them the same thing
  lexicon: HALOT
  rationale: The idiom literally means 'spoke to them thus/like this.' Because the
    content of Gideon's speech is implied from the previous verse rather than repeated,
    'in the same way' communicates the anaphoric force naturally in English.
- source_word: וַיַּעֲנוּ אֹתוֹ
  chosen: answered him
  alternatives:
  - responded to him
  lexicon: HALOT
  rationale: ענה with direct object commonly means 'answer/respond to.' 'Answered
    him' is the most natural concise rendering.
- source_word: אַנְשֵׁי פְנוּאֵל
  chosen: the men of Penuel
  alternatives:
  - the people of Penuel
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' Per gender-accurate policy, 'men' is
    retained rather than neutralizing to 'people,' since the Hebrew specifically uses
    the masculine social designation.
- source_word: כַּאֲשֶׁר עָנוּ אַנְשֵׁי סֻכּוֹת
  chosen: just as the men of Succoth had answered
  alternatives:
  - as the men of Succoth answered
  - just as the men of Succoth had responded
  lexicon: HALOT
  rationale: כַּאֲשֶׁר marks comparison, 'just as/as.' The English past perfect ('had
    answered') clarifies the prior action relative to the current narrative moment.
- source_word: סֻכּוֹת
  chosen: Succoth
  alternatives:
  - Sukkoth
  rationale: Standard English transliteration of the place name.
