id: JDG.8.15
reference: Judges 8:15
source:
  edition: WLC
  text: וַ/יָּבֹא֙ אֶל אַנְשֵׁ֣י סֻכּ֔וֹת וַ/יֹּ֕אמֶר הִנֵּ֖ה זֶ֣בַח וְ/צַלְמֻנָּ֑ע אֲשֶׁר֩ חֵרַפְתֶּ֨ם אוֹתִ֜/י לֵ/אמֹ֗ר הֲ֠/כַף זֶ֣בַח וְ/צַלְמֻנָּ֤ע עַתָּה֙ בְּ/יָדֶ֔/ךָ כִּ֥י נִתֵּ֛ן לַ/אֲנָשֶׁ֥י/ךָ הַ/יְּעֵפִ֖ים לָֽחֶם־׃
translation:
  text: Then he came to the men of Succoth and said[a], “Here are Zebah and Zalmunna, about whom you taunted me, saying, ‘Are Zebah and Zalmunna already in your hand[b], that we should give bread to your weary men?’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “with whom you reproached me” or “concerning whom you mocked me.” The Hebrew verb carries the sense of scornful reproach.
    reason: lexical_alternative
  - marker: b
    text: Literally, “Are the hand/palm of Zebah and Zalmunna now in your hand...?”—an idiom meaning, “Have you already captured them?”
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי סֻכּוֹת
  chosen: the men of Succoth
  alternatives:
  - the people of Succoth
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' Since the referents in context are the male leaders/inhabitants addressed by Gideon, 'the men of Succoth' preserves the gendered and social force better than the broader 'people.'
- source_word: הִנֵּה
  chosen: Here are
  alternatives:
  - Behold
  - Look
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle drawing attention to the present reality. 'Here are' fits the immediate demonstrative force in natural modern English.
- source_word: זֶבַח וְצַלְמֻנָּע
  chosen: Zebah and Zalmunna
  rationale: These are personal names and are transliterated per project philosophy.
- source_word: אֲשֶׁר חֵרַפְתֶּם אֹתִי
  chosen: about whom you taunted me
  alternatives:
  - with whom you reproached me
  - concerning whom you mocked me
  lexicon: HALOT
  rationale: חרף here conveys scornful reproach directed at Gideon in relation to these kings. 'Taunted me' captures the insulting challenge in idiomatic English better than the more formal 'reproached me.' The relative phrase is rendered 'about whom' because the reproach concerned Gideon's inability to produce these captives.
- source_word: לֵאמֹר
  chosen: saying
  lexicon: HALOT
  rationale: Standard quotative introducing the content of their earlier words.
- source_word: הֲכַף ... בְּיָדֶךָ
  chosen: Are ... already in your hand
  alternatives:
  - Is the palm/hand of ... in your hand
  - Have you already got ... in your power
  lexicon: HALOT
  rationale: The idiom asks whether Zebah and Zalmunna are already captured and under Gideon's control. 'In your hand' preserves the Hebrew image, while 'already' reflects עַתָּה in this rhetorical setting.
- source_word: כִּי נִתֵּן
  chosen: that we should give
  alternatives:
  - for us to give
  - that we may give
  lexicon: HALOT
  rationale: 'Although literally ''for we should give/would give,'' in context it expresses the result implied by the rhetorical question: ''that we should give bread...?'' This makes the English syntax clear while preserving the force of their refusal.'
- source_word: לַאֲנָשֶׁיךָ הַיְּעֵפִים
  chosen: to your weary men
  alternatives:
  - to your exhausted men
  - to your tired men
  lexicon: HALOT
  rationale: יְעֵפִים denotes weariness/exhaustion from pursuit. 'Weary' is concise, natural, and suitably dignified.
- source_word: לָחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: Though bread can stand metonymically for food, 'bread' is the direct lexical equivalent and works well in context.
