id: JDG.8.1
reference: Judges 8:1
source:
  edition: WLC
  text: וַ/יֹּאמְר֨וּ אֵלָ֜י/ו אִ֣ישׁ אֶפְרַ֗יִם מָֽה הַ/דָּבָ֤ר הַ/זֶּה֙ עָשִׂ֣יתָ לָּ֔/נוּ לְ/בִלְתִּי֙ קְרֹ֣אות לָ֔/נוּ כִּ֥י הָלַ֖כְתָּ לְ/הִלָּחֵ֣ם בְּ/מִדְיָ֑ן וַ/יְרִיב֥וּ/ן אִתּ֖/וֹ בְּ/חָזְקָֽה־׃
translation:
  text: Then the men of Ephraim said to him[a], “What is this thing you have done to us[b], not calling us when you went to fight against Midian?” And they contended with him strongly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Ephraimites.” The Hebrew literally reads “the men of Ephraim,” a collective expression for the tribe.
    reason: lexical_alternative
  - marker: b
    text: Or “they quarreled with him strongly / vehemently.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אֶפְרַיִם
  chosen: the men of Ephraim
  alternatives:
  - the man of Ephraim
  - the men of Ephraim’s tribe
  - the Ephraimites
  lexicon: HALOT
  rationale: Although אִישׁ is morphologically singular, this construction with a people/tribal name functions collectively. The following plural verbs confirm a plural subject. 'The men of Ephraim' preserves the Hebrew idiom more transparently than the smoother but slightly less literal 'Ephraimites.'
- source_word: מָה הַדָּבָר הַזֶּה
  chosen: What is this thing
  alternatives:
  - Why did you do this
  - What is this matter
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the rhetorical force of the Hebrew question. 'Why did you do this' is idiomatic but compresses the concrete noun דָּבָר ('thing/matter').
- source_word: עָשִׂיתָ לָּנוּ
  chosen: you have done to us
  alternatives:
  - you did to us
  - you have done against us
  lexicon: HALOT
  rationale: The perfect is rendered naturally in English as present perfect in direct speech. 'To us' reflects the dative pronoun without overinterpreting it as explicitly hostile ('against us'), though the complaint context implies offense.
- source_word: לְבִלְתִּי קְרֹאות לָנוּ
  chosen: not calling us
  alternatives:
  - without calling us
  - by not summoning us
  lexicon: HALOT
  rationale: This infinitival construction expresses the grievance succinctly. 'Not calling us' is natural modern English and keeps the verbal idea close to the Hebrew. 'Summoning' is possible but stronger than the base verb קרא in this context.
- source_word: כִּי הָלַכְתָּ לְהִלָּחֵם בְּמִדְיָן
  chosen: when you went to fight against Midian
  alternatives:
  - when you went to fight Midian
  - because you went to fight against Midian
  lexicon: HALOT
  rationale: 'כִּי here is best taken in a temporal/explanatory sense within the complaint: the failure to call them occurred when Gideon went to battle. ''Against Midian'' brings out the adversative sense of בְּ with הלחם.'
- source_word: וַיְרִיבוּן אִתּוֹ
  chosen: they contended with him
  alternatives:
  - they quarreled with him
  - they rebuked him
  - they confronted him
  lexicon: HALOT
  rationale: ריב commonly denotes contention or dispute. 'Contended with him' preserves the seriousness without narrowing it to mere verbal bickering or making it more formal-judicial than the context requires.
- source_word: בְּחָזְקָה
  chosen: fiercely
  alternatives:
  - strongly
  - vehemently
  - with force
  lexicon: HALOT
  rationale: The noun with preposition functions adverbially, describing the intensity of their contention. 'Fiercely' communicates the forceful, heated nature of the dispute in readable English.
