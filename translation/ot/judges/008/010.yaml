id: JDG.8.10
reference: Judges 8:10
source:
  edition: WLC
  text: וְ/זֶ֨בַח וְ/צַלְמֻנָּ֜ע בַּ/קַּרְקֹ֗ר וּ/מַחֲנֵי/הֶ֤ם עִמָּ/ם֙ כַּ/חֲמֵ֤שֶׁת עָשָׂר֙ אֶ֔לֶף כֹּ֚ל הַ/נּ֣וֹתָרִ֔ים מִ/כֹּ֖ל מַחֲנֵ֣ה בְנֵי קֶ֑דֶם וְ/הַ/נֹּ֣פְלִ֔ים מֵאָ֨ה וְ/עֶשְׂרִ֥ים אֶ֛לֶף אִ֖ישׁ שֹׁ֥לֵֽף חָֽרֶב־׃
translation:
  text: Now Zebah and Zalmunna were in Karkor[a], and their camp was with them, about fifteen thousand men, all who were left of all the camp of the sons of the east; and those who had fallen were one hundred twenty thousand men drawing the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the entire camp of the easterners.'' Hebrew: ''the camp of the sons of the east.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּקַּרְקֹר
  chosen: in Karkor
  alternatives:
  - at Karkor
  lexicon: HALOT
  rationale: The preposition ב marks location. 'In Karkor' is the most natural English rendering for a place-name here, though 'at Karkor' is also possible.
- source_word: וּמַחֲנֵיהֶם עִמָּם
  chosen: their camps were with them
  alternatives:
  - their army was with them
  - their camp was with them
  lexicon: HALOT
  rationale: מַחֲנֶה often means 'camp' and in military contexts can extend to the encamped force. The plural construct with suffix is best represented straightforwardly as 'their camps.' The phrase עִמָּם is retained as 'with them' rather than absorbed, preserving the Hebrew wording.
- source_word: כַּחֲמֵשֶׁת עָשָׂר אֶלֶף
  chosen: about fifteen thousand
  alternatives:
  - some fifteen thousand
  - approximately fifteen thousand
  lexicon: HALOT
  rationale: The prefixed כ on the number indicates approximation/comparison, so 'about' should be expressed in English rather than omitted.
- source_word: כֹּל הַנּוֹתָרִים
  chosen: all who were left
  alternatives:
  - all the survivors
  - all who remained
  lexicon: HALOT
  rationale: The Niphal participle of יתר denotes those remaining/surviving. 'All who were left' is idiomatic and preserves the passive/resultative sense.
- source_word: מִכֹּל מַחֲנֵה בְנֵי קֶדֶם
  chosen: from all the camp of the sons of the east
  alternatives:
  - from the whole army of the people of the east
  - from the entire camp of the easterners
  lexicon: HALOT
  rationale: מַחֲנֶה is singular collective here. 'Sons of the east' preserves the Hebrew ethnogeographic expression בְנֵי קֶדֶם more transparently than flattening it to 'easterners,' while remaining understandable.
- source_word: וְהַנֹּפְלִים
  chosen: those who had fallen
  alternatives:
  - the fallen
  - those who fell
  lexicon: HALOT
  rationale: The participle from נפל refers to those slain in battle. 'Those who had fallen' fits the retrospective summary and reads naturally in English.
- source_word: מֵאָה וְעֶשְׂרִים אֶלֶף
  chosen: one hundred twenty thousand
  alternatives:
  - a hundred and twenty thousand
  lexicon: HALOT
  rationale: Standard modern English number style is used.
- source_word: אִישׁ שֹׁלֵף חָרֶב
  chosen: men drawing the sword
  alternatives:
  - men who drew the sword
  - men bearing swords
  lexicon: HALOT
  rationale: אִישׁ after a number functions distributively/collectively ('men'). שֹׁלֵף חָרֶב is a martial idiom for armed fighting men; 'drawing the sword' preserves the vivid Hebrew expression better than the more interpretive 'bearing swords'.
- source_word: וְ
  chosen: Now
  alternatives:
  - And
  lexicon: HALOT
  rationale: Clause-initial waw here advances the narrative. 'Now' is a natural English discourse marker in narrative and avoids excessive polysyndeton while preserving flow.
