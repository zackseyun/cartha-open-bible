id: JDG.8.31
reference: Judges 8:31
source:
  edition: WLC
  text: וּ/פִֽילַגְשׁ/וֹ֙ אֲשֶׁ֣ר בִּ/שְׁכֶ֔ם יָֽלְדָה לּ֥/וֹ גַם הִ֖יא בֵּ֑ן וַ/יָּ֥שֶׂם
    אֶת שְׁמ֖/וֹ אֲבִימֶֽלֶךְ־־־׃
translation:
  text: And his concubine who was in Shechem also bore him a son, and he named him
    Abimelek.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Abimelek: traditionally spelled ''Abimelech'' in many English versions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפִילַגְשׁוֹ
  chosen: And his concubine
  alternatives:
  - And his secondary wife
  - And his mistress
  lexicon: HALOT
  rationale: פִּילֶגֶשׁ denotes a concubine; 'concubine' is the most direct and standard
    English equivalent, preserving the social status distinction without paraphrase.
    The prefixed conjunction וּ is naturally rendered 'And.'
- source_word: אֲשֶׁר בִּשְׁכֶם
  chosen: who was in Shechem
  alternatives:
  - who was at Shechem
  - who lived in Shechem
  lexicon: HALOT
  rationale: The relative clause identifies the concubine by location. The preposition
    בּ commonly means 'in'; 'who was in Shechem' is sufficiently literal while remaining
    natural English. 'Lived in' would add specificity not explicit in the text.
- source_word: יָלְדָה לּוֹ
  chosen: bore him
  alternatives:
  - gave birth to for him
  - bore for him
  lexicon: HALOT
  rationale: יַלד with indirect object לּוֹ means she bore a child to/for him. English
    idiom is best captured by 'bore him.'
- source_word: גַם הִיא
  chosen: also
  alternatives:
  - she too
  - even she
  lexicon: HALOT
  rationale: The combination גַם הִיא emphasizes that this woman likewise bore a son.
    In English, the emphasis is naturally conveyed by 'also' without overloading the
    sentence.
- source_word: בֵּן
  chosen: a son
  alternatives:
  - son
  lexicon: HALOT
  rationale: 'The noun is indefinite here in English style: ''bore him a son.'''
- source_word: וַיָּשֶׂם אֶת־שְׁמוֹ
  chosen: and he named him
  alternatives:
  - and he set his name
  - and he called his name
  lexicon: HALOT
  rationale: The Hebrew idiom 'set his name' means 'named him.' This is a standard
    optimal-equivalence rendering that preserves sense rather than wooden form.
- source_word: אֲבִימֶלֶךְ
  chosen: Abimelek
  alternatives:
  - Abimelech
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. 'Abimelek' closely reflects the Hebrew form אֲבִימֶלֶךְ; 'Abimelech'
    is a common traditional English spelling and worth preserving as an alternative.
