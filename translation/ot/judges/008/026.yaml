id: JDG.8.26
reference: Judges 8:26
source:
  edition: WLC
  text: וַ/יְהִ֗י מִשְׁקַ֞ל נִזְמֵ֤י הַ/זָּהָב֙ אֲשֶׁ֣ר שָׁאָ֔ל אֶ֥לֶף וּ/שְׁבַע מֵא֖וֹת
    זָהָ֑ב לְ֠/בַד מִן הַ/שַּׂהֲרֹנִ֨ים וְ/הַ/נְּטִפ֜וֹת וּ/בִגְדֵ֣י הָ/אַרְגָּמָ֗ן
    שֶׁ/עַל֙ מַלְכֵ֣י מִדְיָ֔ן וּ/לְ/בַד֙ מִן הָ֣/עֲנָק֔וֹת אֲשֶׁ֖ר בְּ/צַוְּארֵ֥י
    גְמַלֵּי/הֶֽם־־־׃
translation:
  text: And the weight of the gold rings that he requested was 1,700 shekels of gold,
    besides the crescent ornaments and the pendants and the purple garments that were
    on the kings of Midian, and besides the necklaces that were on the necks of their
    camels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, '1,700 gold'; 'shekels' is supplied as the understood
      unit of weight in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'earrings' for 'rings'; the Hebrew term can denote a ring worn in the
      ear or nose.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁקַ֞ל
  chosen: weight
  alternatives:
  - amount by weight
  lexicon: HALOT
  rationale: The noun denotes measured weight, not merely quantity. 'Weight' is the
    natural English equivalent in a list of valuables.
- source_word: נִזְמֵי הַזָּהָב
  chosen: the gold rings
  alternatives:
  - the gold earrings
  lexicon: HALOT
  rationale: נזם can refer to a ring, often worn in the ear or nose. In this context
    of spoil/jewelry, 'rings' is broad and avoids over-specifying body placement where
    the Hebrew does not explicitly do so.
- source_word: אֲשֶׁר שָׁאָל
  chosen: that he requested
  alternatives:
  - that he asked for
  lexicon: HALOT
  rationale: שׁאל here refers to Gideon's asking the men for spoil. 'Requested' fits
    the narrative tone slightly better than the more colloquial 'asked for' while
    preserving the sense.
- source_word: אֶלֶף וּשְׁבַע מֵאוֹת זָהָב
  chosen: 1,700 shekels of gold
  alternatives:
  - 1,700 gold pieces
  - 1,700 of gold
  lexicon: HALOT
  rationale: The Hebrew literally gives '1,700 gold.' In weight statements of precious
    metal, English normally supplies 'shekels' as the understood unit. This makes
    the sense clear without distorting the idiom.
- source_word: לְבַד מִן
  chosen: besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: The phrase marks exclusion from the preceding total. 'Besides' is concise
    and idiomatic.
- source_word: הַשַּׂהֲרֹנִים
  chosen: the crescent ornaments
  alternatives:
  - the crescents
  - the moon-shaped ornaments
  lexicon: HALOT
  rationale: The term refers to crescent-shaped ornaments. 'Crescent ornaments' preserves
    the likely shape while remaining readable.
- source_word: הַנְּטִפוֹת
  chosen: the pendants
  alternatives:
  - the drops
  - the earrings
  lexicon: HALOT
  rationale: The noun likely denotes hanging ornaments. 'Pendants' is a suitably general
    rendering in a jewelry list.
- source_word: בִגְדֵי הָאַרְגָּמָן
  chosen: the purple garments
  alternatives:
  - the garments of purple cloth
  - the purple clothing
  lexicon: HALOT
  rationale: This straightforwardly denotes garments characterized by purple dye/material,
    a mark of royalty.
- source_word: שֶׁעַל מַלְכֵי מִדְיָן
  chosen: that were on the kings of Midian
  alternatives:
  - that belonged to the kings of Midian
  lexicon: HALOT
  rationale: The preposition על with garments naturally indicates what was worn on
    them. 'Were on' preserves the concrete image.
- source_word: הָעֲנָקוֹת
  chosen: the necklaces
  alternatives:
  - the chains
  - the collars
  lexicon: HALOT
  rationale: The term denotes neck ornaments. 'Necklaces' is the clearest modern equivalent,
    especially since the next phrase explicitly mentions the camels' necks.
- source_word: בְּצַוְּארֵי גְמַלֵּיהֶם
  chosen: that were on the necks of their camels
  alternatives:
  - that were around the necks of their camels
  lexicon: HALOT
  rationale: The phrase specifies the location of the ornaments. 'On the necks' is
    natural and closely follows the Hebrew.
