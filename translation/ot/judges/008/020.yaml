id: JDG.8.20
reference: Judges 8:20
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ לְ/יֶ֣תֶר בְּכוֹר֔/וֹ ק֖וּם הֲרֹ֣ג אוֹתָ֑/ם וְ/לֹא שָׁלַ֨ף הַ/נַּ֤עַר
    חַרְבּ/וֹ֙ כִּ֣י יָרֵ֔א כִּ֥י עוֹדֶ֖/נּוּ נָֽעַר־׃
translation:
  text: Then he said to Jether his firstborn, “Get up, kill them.” But the young man
    did not draw his sword, because he was afraid, for he was still a young man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the boy' / 'the youth' for Hebrew naʿar; the term can cover a range
      from boyhood to young adulthood. Here 'young man' was chosen because he carries
      a sword and is addressed as capable of execution.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then he said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then he said' gives natural
    English narrative flow while preserving sequence.
- source_word: לְיֶתֶר
  chosen: to Jether
  rationale: Personal name is transliterated per project philosophy.
- source_word: בְּכוֹרוֹ
  chosen: his firstborn
  alternatives:
  - his eldest son
  lexicon: HALOT
  rationale: בכור denotes the firstborn son with birth-order significance. 'Firstborn'
    preserves the lexical force better than the more interpretive 'eldest son.'
- source_word: קוּם
  chosen: Get up
  alternatives:
  - Rise
  - Stand up
  lexicon: HALOT
  rationale: Imperative of קום. 'Get up' is idiomatic modern English and fits the
    command sequence.
- source_word: הֲרֹג אוֹתָם
  chosen: kill them
  alternatives:
  - strike them down
  - slay them
  lexicon: HALOT
  rationale: הרג is the ordinary verb for killing. 'Kill them' is the most direct
    and natural rendering without archaic tone.
- source_word: וְלֹא שָׁלַף
  chosen: But ... did not draw
  alternatives:
  - And ... did not draw
  lexicon: HALOT
  rationale: The conjunction marks the next event, but in English 'But' appropriately
    signals the contrast between the command and the son's failure to act.
- source_word: הַנַּעַר
  chosen: the young man
  alternatives:
  - the boy
  - the youth
  lexicon: HALOT
  rationale: נער can mean boy, youth, or young man depending on context. Here Jether
    is old enough to be commanded to execute captives and to bear a sword, so 'young
    man' best fits.
- source_word: חַרְבּוֹ
  chosen: his sword
  lexicon: HALOT
  rationale: Straightforward possessive noun; no reason to vary.
- source_word: כִּי יָרֵא
  chosen: because he was afraid
  alternatives:
  - for he was afraid
  lexicon: HALOT
  rationale: כִּי here gives the reason for his not drawing the sword. 'Because' makes
    the causal relation explicit in contemporary English.
- source_word: כִּי עוֹדֶנּוּ נָעַר
  chosen: for he was still a young man
  alternatives:
  - because he was still a boy
  - for he was still a youth
  lexicon: HALOT
  rationale: עוֹדֶנּוּ conveys continuance ('still/yet'), and נער repeats the characterization.
    Rendering it again as 'young man' preserves the lexical repetition while fitting
    the context better than 'boy.'
