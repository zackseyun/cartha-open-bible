id: JDG.8.25
reference: Judges 8:25
source:
  edition: WLC
  text: וַ/יֹּאמְר֖וּ נָת֣וֹן נִתֵּ֑ן וַֽ/יִּפְרְשׂוּ֙ אֶת הַ/שִּׂמְלָ֔ה וַ/יַּשְׁלִ֣יכוּ
    שָׁ֔מָּ/ה אִ֖ישׁ נֶ֥זֶם שְׁלָלֽ/וֹ־׃
translation:
  text: And they said, “We will surely give them.” Then they spread out the cloak,
    and each man threw there an earring from his spoil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'We will surely give' or 'We will certainly give.' The Hebrew uses an
      infinitive absolute with a finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the cloak' (or 'garment'), spread out to receive the rings.
    reason: cultural_note
  - marker: c
    text: '''Earring'' could more generally be ''ring''; in some contexts the Hebrew
      term can refer to a nose-ring.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָתוֹן נִתֵּן
  chosen: We will gladly give them
  alternatives:
  - We will surely give
  - Giving, we will give
  - We will certainly give
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb of נתן intensifies the action.
    In idiomatic English this is best conveyed by an emphatic future such as 'we will
    gladly give them' or 'we will surely give.' 'Gladly' captures the willing, eager
    force in context, since the people are responding positively to Gideon's request.
    'Them' is supplied in English from the context of the requested earrings in the
    previous verse.
- source_word: הַשִּׂמְלָה
  chosen: the cloak
  alternatives:
  - the garment
  - the outer garment
  - the robe
  lexicon: HALOT
  rationale: שִׂמְלָה commonly denotes a garment or mantle/cloak. 'Cloak' gives a
    concrete, natural English image for a spread-out outer garment used to collect
    items.
- source_word: וַיִּפְרְשׂוּ
  chosen: they spread out
  alternatives:
  - they spread
  - they laid out
  lexicon: HALOT
  rationale: The verb פרשׂ means to spread out or stretch out. 'Spread out' is the
    most natural English rendering for laying a garment open to receive objects.
- source_word: וַיַּשְׁלִיכוּ שָׁמָּה
  chosen: threw there
  alternatives:
  - cast there
  - threw into it
  - put there
  lexicon: HALOT
  rationale: 'The verb שלך is stronger than merely ''put''; it means throw/cast. שָׁמָּה
    is ''there.'' English can retain the adverb directly: ''threw there.'' Because
    the object is the spread garment, ''into it'' is interpretive; the main text stays
    closer to the Hebrew while preserving sense.'
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - every man
  - each one
  lexicon: HALOT
  rationale: אִישׁ distributively means 'each man' here. This preserves the masculine
    singular distributive force of the Hebrew in keeping with the gender-accurate
    policy.
- source_word: נֶזֶם
  chosen: an earring
  alternatives:
  - a ring
  - a nose-ring
  lexicon: HALOT
  rationale: נֶזֶם can denote a ring worn in the ear or nose depending on context.
    Here, in the Midianite spoil context and in continuity with Gideon's request in
    the previous verse, 'earring' is the standard and most likely sense.
- source_word: שְׁלָלוֹ
  chosen: his spoil
  alternatives:
  - his plunder
  - what he had taken as spoil
  lexicon: HALOT
  rationale: שָׁלָל denotes spoil/plunder taken in war. 'Spoil' is concise and fits
    the military context; the singular with 3ms suffix matches the distributive 'each
    man.'
