id: JDG.8.17
reference: Judges 8:17
source:
  edition: WLC
  text: וְ/אֶת מִגְדַּ֥ל פְּנוּאֵ֖ל נָתָ֑ץ וַֽ/יַּהֲרֹ֖ג אֶת אַנְשֵׁ֥י הָ/עִֽיר־־׃
translation:
  text: He tore down the tower of Penuel and killed the men of the city[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Penuel: traditionally also spelled ''Peniel.'''
    reason: alternative_reading
lexical_decisions:
- source_word: מִגְדַּל
  chosen: tower
  alternatives:
  - stronghold
  lexicon: HALOT
  rationale: The noun commonly denotes a tower or elevated fortified structure. 'Tower' is the plain and most direct rendering in context.
- source_word: פְּנוּאֵל
  chosen: Penuel
  alternatives:
  - Peniel
  rationale: Personal/place names are transliterated by standard conventions. 'Penuel' follows the consonantal form here; 'Peniel' is a known variant in English tradition and worth preserving in a footnote.
- source_word: נָתָץ
  chosen: tore down
  alternatives:
  - broke down
  - demolished
  lexicon: HALOT
  rationale: The verb means to pull down or demolish, often of structures. 'Tore down' is natural modern English and preserves the force without sounding overly technical.
- source_word: וַיַּהֲרֹג
  chosen: killed
  alternatives:
  - struck down
  - slew
  lexicon: HALOT
  rationale: The verb הרג straightforwardly means 'kill/slay.' 'Killed' is clear, current English; 'slew' is archaic, and 'struck down' adds imagery not explicit in the verb itself.
- source_word: אַנְשֵׁי הָעִיר
  chosen: the men of the city
  alternatives:
  - the people of the city
  - the citizens of the city
  lexicon: HALOT
  rationale: The construct phrase literally means 'men of the city.' In this punitive military context, the masculine term should be retained rather than neutralized, in keeping with the gender-accurate policy.
