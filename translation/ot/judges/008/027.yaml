theological_decisions:
- issue: Rendering the metaphor of Israel's idolatrous response to the ephod
  chosen_reading: 'Use explicit sexual-infidelity imagery: ''prostituted themselves
    after it'''
  alternative_readings:
  - were unfaithful to it
  - went astray after it
  rationale: The Hebrew זנה is a conventional covenant-infidelity metaphor with strong
    sexual imagery. Preserving that imagery maintains the theological weight of idolatry
    in Judges without reducing it to generic disobedience.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Nature of Gideon's ephod
  chosen_reading: Translate אֵפוֹד straightforwardly as 'ephod' without specifying
    whether it was a priestly garment, idol, or oracular object
  alternative_readings:
  - priestly vestment
  - idol
  - sacred image
  rationale: The text names the object but does not fully define its exact form. Translating
    the term directly preserves the ambiguity rather than resolving a debated historical/theological
    question beyond what the Hebrew states.
  doctrine_reference: Translation philosophy §3
