id: JDG.8.27
reference: Judges 8:27
source:
  edition: WLC
  text: וַ/יַּעַשׂ֩ אוֹת֨/וֹ גִדְע֜וֹן לְ/אֵפ֗וֹד וַ/יַּצֵּ֨ג אוֹת֤/וֹ בְ/עִיר/וֹ֙
    בְּ/עָפְרָ֔ה וַ/יִּזְנ֧וּ כָֽל יִשְׂרָאֵ֛ל אַחֲרָ֖י/ו שָׁ֑ם וַ/יְהִ֛י לְ/גִדְע֥וֹן
    וּ/לְ/בֵית֖/וֹ לְ/מוֹקֵֽשׁ־׃
translation:
  text: Gideon made it into an ephod and set it up in his city, in Ophrah. And all
    Israel prostituted themselves after it there, and it became a snare to Gideon
    and to his house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'played the prostitute after it'; the Hebrew uses sexual-infidelity imagery
      for Israel's idolatry.
    reason: lexical_alternative
  - marker: b
    text: An 'ephod' was a cultic object associated with priestly use; here the exact
      form or function is not fully specified by the text.
    reason: cultural_note
lexical_decisions:
- source_word: לְאֵפוֹד
  chosen: into an ephod
  alternatives:
  - as an ephod
  - for an ephod
  lexicon: HALOT
  rationale: אֵפוֹד refers to an ephod, a cultic object/garment associated with priestly
    or divinatory use. The preposition ל with עשה here is best rendered resultatively
    ('made it into'), indicating what the gold became rather than purpose alone.
- source_word: וַיַּצֵּג
  chosen: set it up
  alternatives:
  - placed it
  - displayed it
  lexicon: HALOT
  rationale: The verb נצב/יצג in this stem conveys causing something to stand or be
    stationed. 'Set it up' fits the likely public/cultic installation better than
    the flatter 'placed it' and avoids overinterpreting as merely decorative display.
- source_word: בְעִירוֹ
  chosen: in his city
  alternatives:
  - in his town
  lexicon: HALOT
  rationale: עִיר commonly means 'city,' though Ophrah may have been a smaller settlement.
    'City' preserves the Hebrew term consistently while remaining natural in English.
- source_word: בְּעָפְרָה
  chosen: in Ophrah
  rationale: Personal/place names are transliterated by standard convention per translation
    philosophy.
- source_word: וַיִּזְנוּ ... אַחֲרָיו
  chosen: prostituted themselves after it
  alternatives:
  - played the prostitute after it
  - whored after it
  - were unfaithful after it
  lexicon: HALOT
  rationale: זנה is a standard metaphor for covenantal/cultic infidelity, literally
    drawing on prostitution imagery. 'Prostituted themselves' preserves the force
    of the metaphor more transparently than the softened 'were unfaithful,' while
    remaining readable modern English. The pronoun refers back to the ephod, so 'it'
    is required in English.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Retained because it locates the apostasy specifically at Ophrah and contributes
    to the narrative emphasis.
- source_word: לְמוֹקֵשׁ
  chosen: a snare
  alternatives:
  - a trap
  - an occasion for ruin
  lexicon: HALOT
  rationale: מוֹקֵשׁ commonly denotes a snare or trap, often metaphorically for something
    that leads into sin or destruction. 'Snare' preserves the biblical metaphor and
    moral danger succinctly.
- source_word: וּלְבֵיתוֹ
  chosen: to his house
  alternatives:
  - to his household
  - to his family
  lexicon: HALOT
  rationale: בַּיִת in this context likely extends beyond the physical structure to
    Gideon's household/dynasty. 'House' preserves the Hebrew's breadth and biblical
    resonance; the fuller sense is clear in context.
