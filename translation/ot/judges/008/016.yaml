id: JDG.8.16
reference: Judges 8:16
source:
  edition: WLC
  text: וַ/יִּקַּח֙ אֶת זִקְנֵ֣י הָ/עִ֔יר וְ/אֶת קוֹצֵ֥י הַ/מִּדְבָּ֖ר וְ/אֶת הַֽ/בַּרְקֳנִ֑ים
    וַ/יֹּ֣דַע בָּ/הֶ֔ם אֵ֖ת אַנְשֵׁ֥י סֻכּֽוֹת־־־׃
translation:
  text: Then he took the elders of the city, and thorns of the wilderness and briers,
    and with them he taught the men of Succoth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and with them he disciplined the men of Succoth'; the Hebrew expression
      is difficult, and some understand it more forcefully as punitive treatment rather
      than instruction in the ordinary sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: זִקְנֵי הָעִיר
  chosen: the elders of the city
  alternatives:
  - the leaders of the city
  lexicon: HALOT
  rationale: זִקְנֵי literally denotes 'elders,' which in context refers to the civic
    leaders of Succoth. 'Elders' preserves the social-political title more transparently
    than the interpretive 'leaders.'
- source_word: קוֹצֵי הַמִּדְבָּר
  chosen: thorns of the wilderness
  alternatives:
  - desert thorns
  - thornbushes of the wilderness
  lexicon: HALOT
  rationale: קוֹצִים refers to thorns/thorny plants. Rendering it straightforwardly
    as 'thorns of the wilderness' preserves the concrete imagery and the genitive
    relationship.
- source_word: הַבַּרְקֳנִים
  chosen: briers
  alternatives:
  - briars
  - thistles
  lexicon: HALOT
  rationale: The noun denotes a prickly plant and is traditionally rendered with a
    term such as 'briers/briars.' 'Briers' is clear modern English while preserving
    the sense of a harsh, thorny implement. 'Thistles' is possible but less certain.
- source_word: וַיֹּדַע בָּהֶם
  chosen: and with them he taught
  alternatives:
  - and with them he made known to
  - and with them he disciplined
  - and with them he threshed
  lexicon: HALOT
  rationale: The verb ידע in the Hiphil normally means 'make know,' but in this context
    it is an idiomatic and difficult expression describing Gideon's punitive action
    against the men of Succoth using thorns and briers. 'He taught' follows the plain
    verbal sense while allowing the disciplinary force to be inferred from the instruments
    named. Stronger renderings like 'disciplined' or 'threshed' are interpretive and
    are better preserved as alternatives.
- source_word: אַנְשֵׁי סֻכּוֹת
  chosen: the men of Succoth
  alternatives:
  - the people of Succoth
  lexicon: HALOT
  rationale: אַנְשֵׁי is masculine plural, literally 'men of.' In keeping with the
    gender-accurate policy, 'men of Succoth' is preferred over the more generic 'people
    of Succoth,' though the latter reflects the broader civic group in context.
