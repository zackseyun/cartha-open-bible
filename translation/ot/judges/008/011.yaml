id: JDG.8.11
reference: Judges 8:11
source:
  edition: WLC
  text: וַ/יַּ֣עַל גִּדְע֗וֹן דֶּ֚רֶךְ הַ/שְּׁכוּנֵ֣י בָֽ/אֳהָלִ֔ים מִ/קֶּ֥דֶם לְ/נֹ֖בַח וְ/יָגְבֳּהָ֑ה וַ/יַּךְ֙ אֶת הַֽ/מַּחֲנֶ֔ה וְ/הַֽ/מַּחֲנֶ֖ה הָ֥יָה בֶֽטַח־׃
translation:
  text: Then Gideon went up by the route of those who dwell in tents[a], east of Nobah and Jogbehah, and struck the camp while the camp was unsuspecting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'while the camp was secure.' The Hebrew term can denote a state of confidence or security; here it likely implies that the camp was off guard.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - went up against
  - advanced
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' Here it introduces Gideon's movement along a route, so 'went up' preserves the Hebrew narrative idiom without overinterpreting it as military aggression.
- source_word: דֶּרֶךְ
  chosen: by the route of
  alternatives:
  - by the way of
  - along the road of
  lexicon: HALOT
  rationale: דֶּרֶךְ denotes way/road/route. 'By the route of' fits the construction with the following participial phrase and reads naturally in English.
- source_word: הַשְּׁכוּנֵי בָאֳהָלִים
  chosen: those who dwell in tents
  alternatives:
  - the tent-dwellers
  - the nomads
  lexicon: HALOT
  rationale: The phrase literally refers to people dwelling in tents. 'Those who dwell in tents' is transparent and avoids importing the more interpretive 'nomads,' though that sense is likely.
- source_word: מִקֶּדֶם
  chosen: east of
  alternatives:
  - from the east of
  - to the east of
  lexicon: HALOT
  rationale: In this geographical context, the preposition with קדם indicates eastern position relative to Nobah and Jogbehah. 'East of' is the clearest idiomatic rendering.
- source_word: לְנֹבַח וְיָגְבֳּהָה
  chosen: Nobah and Jogbehah
  lexicon: HALOT
  rationale: These are place names and are transliterated per translation philosophy.
- source_word: וַיַּךְ אֶת־הַמַּחֲנֶה
  chosen: struck the camp
  alternatives:
  - attacked the camp
  - defeated the camp
  lexicon: HALOT
  rationale: נכה is a broad verb for striking/smiting. 'Struck' preserves the directness of the Hebrew and leaves the exact military effect to context.
- source_word: הַמַּחֲנֶה
  chosen: the camp
  alternatives:
  - the army camp
  - the encampment
  lexicon: HALOT
  rationale: מַחֲנֶה can mean camp or army camp. 'Camp' is sufficient here and keeps the repetition found in Hebrew.
- source_word: בֶטַח
  chosen: unsuspecting
  alternatives:
  - secure
  - in confidence
  - off guard
  lexicon: HALOT
  rationale: בֶּטַח often conveys a state of security or confidence. In this military context, the sense is that the camp felt secure and was therefore unguarded; 'unsuspecting' communicates that forcefully in natural English.
