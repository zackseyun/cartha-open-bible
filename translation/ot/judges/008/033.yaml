theological_decisions:
- issue: Retention of the sexual metaphor for idolatry
  chosen_reading: prostituted themselves after the Baals
  alternative_readings:
  - were unfaithful to God by following the Baals
  rationale: The Hebrew explicitly uses זנה, a charged metaphor for covenant infidelity.
    Preserving the metaphor maintains the theological force of Israel's apostasy rather
    than interpreting it away.
  doctrine_reference: Translation philosophy §§3, 6
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  rationale: The source is grammatically masculine plural and refers to the covenant
    people corporately. The translation preserves that form in line with the gender-accurate
    policy, though 'the Israelites' remains a viable idiomatic alternative.
  doctrine_reference: Translation philosophy §4
