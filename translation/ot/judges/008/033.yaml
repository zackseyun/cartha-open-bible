id: JDG.8.33
reference: Judges 8:33
source:
  edition: WLC
  text: וַ/יְהִ֗י כַּֽ/אֲשֶׁר֙ מֵ֣ת גִּדְע֔וֹן וַ/יָּשׁ֨וּבוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל
    וַ/יִּזְנ֖וּ אַחֲרֵ֣י הַ/בְּעָלִ֑ים וַ/יָּשִׂ֧ימוּ לָ/הֶ֛ם בַּ֥עַל בְּרִ֖ית לֵ/אלֹהִֽים׃
translation:
  text: And it happened that, when Gideon died, the sons of Israel turned back and
    prostituted themselves after the Baals, and they made Baal-berith their god.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Baal-berith likely means 'Baal of the covenant' or 'Lord of the covenant.'
    reason: lexical_alternative
  - marker: b
    text: Or 'played the prostitute after the Baals'; the Hebrew uses sexual imagery
      for idolatrous unfaithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  chosen: And it happened that, when
  alternatives:
  - And when
  - Now when
  lexicon: HALOT
  rationale: The narrative formula וַיְהִי כַּאֲשֶׁר introduces a temporal transition.
    'And it happened that, when' preserves the Hebrew narrative feel while remaining
    readable; a simpler 'And when' is possible but slightly flattens the formula.
- source_word: מֵת גִּדְעוֹן
  chosen: Gideon died
  alternatives:
  - Gideon was dead
  lexicon: HALOT
  rationale: The perfect of מות here marks the completed event in the temporal clause.
    'Gideon died' is the most natural English rendering.
- source_word: וַיָּשׁוּבוּ
  chosen: turned back
  alternatives:
  - turned again
  - returned
  lexicon: HALOT
  rationale: שׁוּב here signals relapse into prior apostasy, not merely physical return.
    'Turned back' captures the sense of reverting to former behavior.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the masculine plural is preserved where
    it refers to the covenant people corporately. 'The sons of Israel' is more formally
    transparent than 'the Israelites,' though the latter is idiomatic.
- source_word: וַיִּזְנוּ אַחֲרֵי
  chosen: prostituted themselves after
  alternatives:
  - played the prostitute after
  - whored after
  - were unfaithful after
  lexicon: HALOT
  rationale: זנה in idolatry contexts is a sexualized covenant-metaphor. 'Prostituted
    themselves after' preserves the force better than the softened 'were unfaithful,'
    while remaining intelligible in modern English.
- source_word: הַבְּעָלִים
  chosen: the Baals
  alternatives:
  - the Baal idols
  - the lords
  lexicon: HALOT
  rationale: The plural refers to the various local manifestations/images of Baal
    worship. 'The Baals' is the standard and most transparent rendering.
- source_word: וַיָּשִׂימוּ לָהֶם
  chosen: they made
  alternatives:
  - they set up for themselves
  - they appointed for themselves
  lexicon: HALOT
  rationale: שׂים + ל expresses establishing or appointing something for themselves.
    'They made' is concise and idiomatic in context, referring to adopting/designating
    a deity.
- source_word: בַּעַל בְּרִית
  chosen: Baal-berith
  alternatives:
  - Baal of the covenant
  - Lord of the covenant
  lexicon: HALOT
  rationale: This is a proper cultic name, so transliteration is preferable to translating
    the components in the main text. The meaning can be preserved in a footnote.
- source_word: לֵאלֹהִים
  chosen: their god
  alternatives:
  - as god
  - for a god
  - as their god
  lexicon: HALOT
  rationale: 'The lamed with אֱלֹהִים indicates designation: they set Baal-berith
    up as deity for themselves. ''Their god'' makes explicit the possessive force
    already implied by לָהֶם and is natural English.'
