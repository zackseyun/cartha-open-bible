id: JDG.8.6
reference: Judges 8:6
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ שָׂרֵ֣י סֻכּ֔וֹת הֲ֠/כַף זֶ֧בַח וְ/צַלְמֻנָּ֛ע עַתָּ֖ה בְּ/יָדֶ֑/ךָ
    כִּֽי נִתֵּ֥ן לִֽ/צְבָאֲ/ךָ֖ לָֽחֶם־׃
translation:
  text: Then the leaders of Succoth said, “Are the hands of Zebah and Zalmunna now
    in your hand, that we should give bread to your army?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “Is the hand/palm of Zebah and Zalmunna now in your hand...?”—an
      idiom meaning, “Have you already captured them?”
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי
  chosen: leaders
  alternatives:
  - officials
  - princes
  lexicon: HALOT
  rationale: The construct plural of שַׂר refers to ruling men or civic leaders. 'Leaders'
    is natural modern English and fits the town authorities in context better than
    the more archaic 'princes.'
- source_word: סֻכּוֹת
  chosen: Succoth
  rationale: Place name; transliterated per translation philosophy for names.
- source_word: הֲכַף
  chosen: Are the hands ... in your hand
  alternatives:
  - Is the palm ... in your hand
  - Do you already have ... in your power
  lexicon: HALOT
  rationale: כַּף literally means 'palm/hand.' In this idiom, possession of someone's
    'hand(s)' signifies control over them. Because the Hebrew uses כַף/hand language
    explicitly, the main text preserves the imagery rather than replacing it with
    a purely interpretive paraphrase.
- source_word: זֶבַח וְצַלְמֻנָּע
  chosen: Zebah and Zalmunna
  rationale: Personal names; transliterated.
- source_word: עַתָּה
  chosen: already
  alternatives:
  - now
  lexicon: HALOT
  rationale: 'In this taunting question, עַתָּה marks present status with rhetorical
    force. ''Already'' brings out the sense: have you secured them yet?'
- source_word: בְּיָדֶךָ
  chosen: in your hand
  alternatives:
  - in your power
  - under your control
  lexicon: HALOT
  rationale: Hebrew idiom for power/control. The main text keeps the concrete 'hand'
    imagery because the verse intentionally repeats hand-language.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the result clause after the rhetorical question:
    ''that we should give...'' This reads more naturally in English than a strictly
    formal ''for/because'' while preserving the logic.'
- source_word: נִתֵּן
  chosen: we should give
  alternatives:
  - we must give
  - we would give
  lexicon: HALOT
  rationale: First common plural imperfect/cohortative nuance in context. 'We should
    give' best reflects the deliberative force in the rhetorical question.
- source_word: לִצְבָאֲךָ
  chosen: to your army
  alternatives:
  - to your troops
  - for your army
  lexicon: HALOT
  rationale: צָבָא here refers to Gideon's fighting force. 'Army' is concise and idiomatic.
- source_word: לָחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: Though 'bread' can stand metonymically for food, the Hebrew specifically
    says 'bread,' and the main text preserves that concreteness.
