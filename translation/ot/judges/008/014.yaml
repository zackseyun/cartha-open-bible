id: JDG.8.14
reference: Judges 8:14
source:
  edition: WLC
  text: וַ/יִּלְכָּד נַ֛עַר מֵ/אַנְשֵׁ֥י סֻכּ֖וֹת וַ/יִּשְׁאָלֵ֑/הוּ וַ/יִּכְתֹּ֨ב אֵלָ֜י/ו אֶת שָׂרֵ֤י סֻכּוֹת֙ וְ/אֶת זְקֵנֶ֔י/הָ שִׁבְעִ֥ים וְ/שִׁבְעָ֖ה אִֽישׁ־־־׃
translation:
  text: And he captured a young man from the men of Succoth and questioned him[a], and he wrote down for him the officials of Succoth and its elders, seventy-seven men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the leaders of Succoth'; the Hebrew term can denote officials, chiefs, or rulers.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְכָּד
  chosen: captured
  alternatives:
  - seized
  - caught
  lexicon: HALOT
  rationale: The verb לכד commonly means to capture or seize. 'Captured' fits the narrative context of detaining someone for information without overinterpreting the manner of arrest.
- source_word: נַעַר
  chosen: a young man
  alternatives:
  - a youth
  - a boy
  - a servant
  lexicon: HALOT
  rationale: נַעַר can denote a boy, youth, young man, or servant depending on context. Here he is one of the men of Succoth and is capable of identifying civic leaders, so 'young man' best fits without implying childhood or servile status.
- source_word: מֵאַנְשֵׁי סֻכּוֹת
  chosen: from the men of Succoth
  alternatives:
  - from among the men of Succoth
  - one of the men of Succoth
  lexicon: HALOT
  rationale: The preposition מן with אַנְשֵׁי indicates source or selection from the group. 'From the men of Succoth' is natural English and preserves the sense that the youth belonged to that town.
- source_word: וַיִּשְׁאָלֵהוּ
  chosen: questioned him
  alternatives:
  - asked him
  - interrogated him
  lexicon: HALOT
  rationale: שׁאל in this context means to ask or inquire of someone. 'Questioned him' conveys purposeful inquiry in a military setting better than the flatter 'asked him,' while avoiding the stronger modern connotations of 'interrogated.'
- source_word: וַיִּכְתֹּב אֵלָיו
  chosen: he wrote down for him
  alternatives:
  - he wrote for him
  - he wrote out to him
  lexicon: HALOT
  rationale: The subject is the captured youth, who writes the names/information for Gideon. The phrase אֵלָיו is most naturally taken as 'for him' or 'to him.' 'Wrote down for him' makes explicit the implied act of recording names in idiomatic English.
- source_word: שָׂרֵי סֻכּוֹת
  chosen: the officials of Succoth
  alternatives:
  - the princes of Succoth
  - the leaders of Succoth
  - the chiefs of Succoth
  lexicon: HALOT
  rationale: שָׂרִים are rulers, officials, or leaders. 'Officials' fits a civic context and avoids the potentially misleading aristocratic sense of 'princes' in modern English.
- source_word: זְקֵנֶיהָ
  chosen: its elders
  alternatives:
  - her elders
  - the elders of it
  lexicon: HALOT
  rationale: The feminine singular suffix refers back to the city, Succoth. English idiom prefers 'its elders' for a town's recognized senior leaders.
- source_word: שִׁבְעִים וְשִׁבְעָה אִישׁ
  chosen: seventy-seven men
  alternatives:
  - seventy and seven men
  lexicon: HALOT
  rationale: The Hebrew cardinal construction straightforwardly yields 'seventy-seven men.' Retaining 'men' reflects the explicit איש and the gender-accurate policy, likely referring to male civic leaders.
