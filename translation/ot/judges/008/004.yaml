id: JDG.8.4
reference: Judges 8:4
source:
  edition: WLC
  text: וַ/יָּבֹ֥א גִדְע֖וֹן הַ/יַּרְדֵּ֑נָ/ה עֹבֵ֣ר ה֗וּא וּ/שְׁלֹשׁ מֵא֤וֹת הָ/אִישׁ֙ אֲשֶׁ֣ר אִתּ֔/וֹ עֲיֵפִ֖ים וְ/רֹדְפִֽים־׃
translation:
  text: Then Gideon came to the Jordan and crossed over[a], he and the three hundred men who were with him, exhausted yet pursuing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'weary, but pursuing' or 'faint, yet pursuing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come/enter/arrive.' With the destination 'to the Jordan,' 'came' is natural English and preserves the narrative movement without over-specifying.
- source_word: הַיַּרְדֵּנָה
  chosen: to the Jordan
  alternatives:
  - to the Jordan River
  lexicon: HALOT
  rationale: The directional he on 'Jordan' indicates motion toward the river. 'To the Jordan' is concise and idiomatic; 'River' is implicit and unnecessary in the main text.
- source_word: עֹבֵר הוּא
  chosen: and crossed over, he
  alternatives:
  - crossing over, he
  - he was crossing over
  lexicon: HALOT
  rationale: The participle plus pronoun gives a vivid circumstantial sense. In English narrative, 'and crossed over, he' is smoothed to 'and crossed over, he and...' to preserve both the action and the emphatic inclusion of Gideon himself.
- source_word: וּשְׁלֹשׁ מֵאוֹת הָאִישׁ אֲשֶׁר אִתּוֹ
  chosen: and the three hundred men who were with him
  alternatives:
  - with the three hundred men who were with him
  - he and the three hundred men with him
  lexicon: HALOT
  rationale: This phrase identifies Gideon's company. 'Men' is retained as gender-accurate to the Hebrew האיש in this military context.
- source_word: עֲיֵפִים
  chosen: exhausted
  alternatives:
  - weary
  - faint
  lexicon: HALOT
  rationale: '''Exhausted'' communicates the physical depletion clearly in modern English. ''Weary'' is possible but can sound less concrete; ''faint'' may overstate collapse.'
- source_word: וְרֹדְפִים
  chosen: yet pursuing
  alternatives:
  - and pursuing
  - still pursuing
  lexicon: HALOT
  rationale: 'The conjunction with the participle sets their exhaustion alongside their continued chase. ''Yet pursuing'' captures the concessive force often conveyed in context: despite exhaustion, they continued the pursuit.'
