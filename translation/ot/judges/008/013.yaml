id: JDG.8.13
reference: Judges 8:13
source:
  edition: WLC
  text: וַ/יָּ֛שָׁב גִּדְע֥וֹן בֶּן יוֹאָ֖שׁ מִן הַ/מִּלְחָמָ֑ה מִֽ/לְ/מַעֲלֵ֖ה הֶ/חָֽרֶס־־׃
translation:
  text: Then Gideon son of Joash returned from the battle by the ascent of Heres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'from the ascent of the sun.' The Hebrew phrase is difficult, and הֶחָרֶס may be understood as a place name ('Heres') or as 'the sun.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: Then ... returned
  alternatives:
  - and ... returned
  - came back
  lexicon: HALOT
  rationale: Wayyiqtol of שוב advances the narrative with a past-tense mainline verb. 'Returned' is the plain sense; 'Then' captures the narrative progression naturally in English.
- source_word: גִּדְעוֹן
  chosen: Gideon
  rationale: Personal name transliterated by standard English convention.
- source_word: בֶּן יוֹאָשׁ
  chosen: son of Joash
  alternatives:
  - the son of Joash
  rationale: Hebrew patronymic construction is best rendered directly as 'son of Joash.' The article is not required in English apposition.
- source_word: מִן הַמִּלְחָמָה
  chosen: from the battle
  alternatives:
  - from the war
  lexicon: HALOT
  rationale: מִלְחָמָה can mean 'battle' or 'war.' In this immediate narrative scene, 'battle' fits the specific military engagement more naturally than the broader 'war.'
- source_word: מִלְמַעֲלֵה
  chosen: by the ascent of
  alternatives:
  - from the ascent of
  - via the ascent of
  lexicon: HALOT
  rationale: The prepositional phrase indicates the route or place associated with his return. 'By the ascent of' is idiomatic English that preserves the topographical sense without overcommitting to a more interpretive directional nuance.
- source_word: הֶחָרֶס
  chosen: Heres
  alternatives:
  - the sun
  - Hares
  lexicon: HALOT
  rationale: The form with article may reflect a place name, traditionally understood as 'Heres.' Because the phrase likely denotes a specific locality or pass, transliterating as a proper name in the main text best preserves the ambiguity of the Hebrew. The lexical possibility 'sun' is preserved in a footnote.
