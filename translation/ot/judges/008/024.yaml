theological_decisions:
- issue: Rendering of אִישׁ in a distributive request
  chosen_reading: each man
  alternative_readings:
  - each one
  rationale: The Hebrew is grammatically masculine singular and distributive. Following
    the translation philosophy's gender-accurate principle, the main text keeps 'man'
    rather than neutralizing it, while the sense remains representative of each individual
    warrior addressed.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
