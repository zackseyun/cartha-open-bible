id: JDG.8.24
reference: Judges 8:24
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֲלֵ/הֶ֜ם גִּדְע֗וֹן אֶשְׁאֲלָ֤ה מִ/כֶּם֙ שְׁאֵלָ֔ה וּ/תְנוּ לִ֕/י
    אִ֖ישׁ נֶ֣זֶם שְׁלָל֑/וֹ כִּֽי נִזְמֵ֤י זָהָב֙ לָ/הֶ֔ם כִּ֥י יִשְׁמְעֵאלִ֖ים הֵֽם־־׃
translation:
  text: 'Then Gideon said to them, “Let me ask one request of you: each man, give
    me an earring from his spoil.” For they had gold earrings, because they were Ishmaelites.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “ring”; the Hebrew term can refer to a ring worn in the ear or nose,
      but here “earring” best fits the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶשְׁאֲלָה ... שְׁאֵלָה
  chosen: Let me ask one request
  alternatives:
  - I would ask a request
  - Let me make a request
  - I will ask of you a request
  lexicon: HALOT
  rationale: The verb שאל plus the cognate noun שאלה forms an idiomatic emphatic expression.
    Rendering it as 'Let me ask one request' preserves the repetition's force while
    producing natural English.
- source_word: וּתְנוּ לִי
  chosen: give me
  alternatives:
  - and give to me
  lexicon: HALOT
  rationale: Straightforward imperative. English naturally omits the conjunction after
    the introductory request formula and renders the phrase idiomatically as 'give
    me'.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - every man
  - each one
  lexicon: HALOT
  rationale: 'The distributive sense is required in context: Gideon asks for one item
    from each individual. ''Each man'' preserves the masculine singular form and distributive
    force in keeping with the gender-accurate policy.'
- source_word: נֶזֶם
  chosen: earring
  alternatives:
  - ring
  - nose ring
  lexicon: HALOT
  rationale: נזם can denote a ring worn in the ear or nose depending on context. Here
    the explanatory clause about 'gold earrings' and the common understanding of spoil
    taken from defeated warriors support 'earring' as the best contextual rendering.
- source_word: שְׁלָלוֹ
  chosen: his spoil
  alternatives:
  - his plunder
  - what he took as plunder
  lexicon: HALOT
  rationale: 'The singular with suffix matches the distributive ''each man'': each
    man is to give an earring from the spoil he personally took. ''Spoil'' is concise
    and natural, though ''plunder'' is a close alternative.'
- source_word: נִזְמֵי זָהָב
  chosen: gold earrings
  alternatives:
  - gold rings
  lexicon: HALOT
  rationale: The plural construct plus 'gold' is most naturally rendered 'gold earrings,'
    matching the earlier singular נזם and clarifying the kind of item requested.
- source_word: כִּי ... כִּי
  chosen: For ... because
  alternatives:
  - for ... for
  - since ... because
  lexicon: HALOT
  rationale: The first כי introduces the explanation for Gideon's request; the second
    gives the reason the defeated enemies possessed such earrings. Using 'For ...
    because' reflects the two-step logic in idiomatic English.
- source_word: יִשְׁמְעֵאלִים
  chosen: Ishmaelites
  alternatives:
  - descendants of Ishmael
  lexicon: HALOT
  rationale: Standard transliteration of the ethnonym. This also preserves the narrative
    note explaining the cultural practice associated with the group.
