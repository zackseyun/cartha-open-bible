id: JDG.8.30
reference: Judges 8:30
source:
  edition: WLC
  text: וּ/לְ/גִדְע֗וֹן הָיוּ֙ שִׁבְעִ֣ים בָּנִ֔ים יֹצְאֵ֖י יְרֵכ֑/וֹ כִּֽי נָשִׁ֥ים
    רַבּ֖וֹת הָ֥יוּ לֽ/וֹ־׃
translation:
  text: Now Gideon had seventy sons, his own offspring, because he had many wives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'those who came out of his loins,' an idiom for his biological
      offspring.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְגִדְעוֹן
  chosen: Now Gideon had
  alternatives:
  - And Gideon had
  - Gideon had
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition literally means 'and/to Gideon,'
    but in English possession is naturally expressed with 'Gideon had.' 'Now' captures
    the discourse-linking force of waw in a readable way without over-literalism.
- source_word: הָיוּ
  chosen: had
  alternatives:
  - there were to
  lexicon: HALOT
  rationale: 'With ל plus subject, היה expresses possession/existence: ''there were
    to Gideon'' = ''Gideon had.'' English idiom favors ''had.'''
- source_word: שִׁבְעִים בָּנִים
  chosen: seventy sons
  alternatives:
  - seventy children
  lexicon: HALOT
  rationale: בנים specifically means 'sons,' not generic 'children.' This follows
    the gender-accurate principle.
- source_word: יֹצְאֵי יְרֵכוֹ
  chosen: his own offspring
  alternatives:
  - those who came out of his loins
  - born from his body
  - his direct descendants
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'those coming out of his thigh/loins,'
    a standard expression for biological offspring. 'His own offspring' preserves
    the sense clearly in modern English without awkward literalism. A more literal
    alternative is worth preserving in a footnote.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the large number of sons. 'Because'
    is slightly clearer in contemporary English than 'for.'
- source_word: נָשִׁים רַבּוֹת
  chosen: many wives
  alternatives:
  - many women
  lexicon: HALOT
  rationale: In this context, with possession expressed by 'were to him,' נשים refers
    to wives, not merely women. 'Many wives' states the relational sense required
    by the context.
- source_word: הָיוּ לוֹ
  chosen: he had
  alternatives:
  - there were to him
  - belonged to him
  lexicon: HALOT
  rationale: Again, היה + ל expresses possession. English idiom requires 'he had.'
