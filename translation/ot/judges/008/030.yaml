theological_decisions:
- issue: Polygynous household description
  chosen_reading: Translate descriptively as 'many wives' without moral commentary.
  alternative_readings:
  - Soften to 'many women'
  - Expand to imply approval or disapproval
  rationale: The verse reports Gideon's family situation without explicit evaluation.
    The translation should neither obscure the marital sense nor import a moral judgment
    not stated in the text.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve the source text''s plain sense.'
