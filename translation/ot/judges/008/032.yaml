id: JDG.8.32
reference: Judges 8:32
source:
  edition: WLC
  text: וַ/יָּ֛מָת גִּדְע֥וֹן בֶּן יוֹאָ֖שׁ בְּ/שֵׂיבָ֣ה טוֹבָ֑ה וַ/יִּקָּבֵ֗ר בְּ/קֶ֨בֶר֙ יוֹאָ֣שׁ אָבִ֔י/ו בְּ/עָפְרָ֖ה אֲבִ֥י הָֽעֶזְרִֽי־׃פ
translation:
  text: And Gideon son of Joash died at a good old age and was buried in the tomb of Joash his father[b][a], in Ophrah of the Abiezrites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the grave of Joash his father.' The Hebrew קֶבֶר can denote either a grave or a tomb/burial place.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Ophrah of the Abiezrite,' meaning Ophrah belonging to the Abiezrite clan.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - passed away
  lexicon: HALOT
  rationale: The verb מות straightforwardly means 'die.' 'Died' is the plain and direct rendering; 'passed away' would soften the statement beyond the Hebrew.
- source_word: גִּדְעוֹן
  chosen: Gideon
  rationale: Standard English transliteration of the personal name.
- source_word: בֶּן יוֹאָשׁ
  chosen: son of Joash
  alternatives:
  - the son of Joash
  lexicon: HALOT
  rationale: Construct phrase identifying Gideon by lineage. English idiom naturally omits the article.
- source_word: בְּשֵׂיבָה טוֹבָה
  chosen: at a good old age
  alternatives:
  - in a good old age
  - in ripe old age
  lexicon: HALOT
  rationale: שֵׂיבָה denotes old age/gray hair, and טוֹבָה qualifies it positively. 'At a good old age' is natural English and preserves the favorable sense without overinterpreting it as necessarily 'full' or 'ripe' old age.
- source_word: וַיִּקָּבֵר
  chosen: was buried
  alternatives:
  - and he was buried
  lexicon: HALOT
  rationale: 'Niphal of קבר is passive/reflexive in sense here: ''was buried.'' The conjunction is already represented by the sentence flow with ''and.'''
- source_word: בְּקֶבֶר
  chosen: in the tomb
  alternatives:
  - in the grave
  - in a burial place
  lexicon: HALOT
  rationale: קבר can mean grave or tomb. 'Tomb' fits well in English for a family burial site and avoids the awkward repetition 'buried in the grave.'
- source_word: יוֹאָשׁ אָבִיו
  chosen: of Joash his father
  alternatives:
  - of his father Joash
  lexicon: HALOT
  rationale: The construct plus apposition identifies the burial place as belonging to Joash, Gideon's father. 'Of Joash his father' follows the Hebrew order closely while remaining readable.
- source_word: בְּעָפְרָה
  chosen: in Ophrah
  rationale: Place name transliterated by standard convention.
- source_word: אֲבִי הָעֶזְרִי
  chosen: of the Abiezrites
  alternatives:
  - of Abiezer
  - of the clan of Abiezer
  lexicon: HALOT
  rationale: This gentilic refers to the Abiezrite clan descended from Abiezer. 'Of the Abiezrites' is concise and idiomatic, while preserving the clan identity attached to Ophrah.
