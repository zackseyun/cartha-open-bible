id: JDG.8.3
reference: Judges 8:3
source:
  edition: WLC
  text: בְּ/יֶדְ/כֶם֩ נָתַ֨ן אֱלֹהִ֜ים אֶת שָׂרֵ֤י מִדְיָן֙ אֶת עֹרֵ֣ב וְ/אֶת זְאֵ֔ב
    וּ/מַה יָּכֹ֖לְתִּי עֲשׂ֣וֹת כָּ/כֶ֑ם אָ֗ז רָפְתָ֤ה רוּחָ/ם֙ מֵֽ/עָלָ֔י/ו בְּ/דַבְּר֖/וֹ
    הַ/דָּבָ֥ר הַ/זֶּֽה־־־־׃
translation:
  text: Into your hand God gave the princes of Midian, Oreb and Zeeb; and what was
    I able to do compared with you? Then their spirit relaxed toward him when he spoke
    this word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'their anger toward him subsided.' The Hebrew literally
      says 'their spirit relaxed from upon him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיֶדְכֶם
  chosen: Into your hand
  alternatives:
  - Into your hands
  - into your power
  lexicon: HALOT
  rationale: Hebrew singular 'hand' in this idiom denotes power/control. Kept the
    singular for closer formal correspondence while preserving the idiomatic sense
    in English.
- source_word: נָתַן אֱלֹהִים
  chosen: God gave
  alternatives:
  - God has given
  - God delivered
  lexicon: HALOT
  rationale: Qal perfect naturally renders as simple past in this narrative context.
    'Gave' is the most direct equivalent; 'delivered' is possible idiomatically but
    less literal.
- source_word: שָׂרֵי מִדְיָן
  chosen: the princes of Midian
  alternatives:
  - the leaders of Midian
  - the officials of Midian
  lexicon: HALOT
  rationale: שָׂרִים refers to rulers/chiefs. 'Princes' preserves the elevated status
    and matches the named enemy commanders Oreb and Zeeb.
- source_word: עֹרֵב וְאֶת זְאֵב
  chosen: Oreb and Zeeb
  rationale: Personal names are transliterated by standard conventions per translation
    philosophy.
- source_word: וּמַה יָּכֹלְתִּי עֲשׂוֹת כָּכֶם
  chosen: and what was I able to do compared with you?
  alternatives:
  - and what could I do like you?
  - and what was I able to do as you did?
  lexicon: HALOT
  rationale: The phrase is comparative and self-deprecating in context, with Gideon
    placating Ephraim by saying his achievement was less than theirs. 'Compared with
    you' brings out the force of כָכֶם in natural English.
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Narrative sequencing particle best rendered 'Then' in modern English.
- source_word: רָפְתָה רוּחָם
  chosen: their spirit relaxed
  alternatives:
  - their anger subsided
  - their temper cooled
  - their spirit softened
  lexicon: HALOT
  rationale: Literally 'their spirit slackened/relaxed.' The idiom refers to the easing
    of hostile emotion. I retained 'spirit' to preserve the Hebrew image while using
    'relaxed' to reflect the verb.
- source_word: מֵעָלָיו
  chosen: toward him
  alternatives:
  - from against him
  - off him
  lexicon: HALOT
  rationale: Literally 'from upon/against him,' indicating the removal of their hostile
    stance. 'Toward him' with 'relaxed' yields idiomatic English while preserving
    the relational direction.
- source_word: בְּדַבְּרוֹ הַדָּבָר הַזֶּה
  chosen: when he spoke this word
  alternatives:
  - when he said this
  - at his speaking this matter
  lexicon: HALOT
  rationale: Infinitive construct with preposition marks the occasion. 'Word' is a
    close rendering of דָבָר, though in English it can mean 'statement' or 'thing
    said'.
