id: JDG.8.9
reference: Judges 8:9
source:
  edition: WLC
  text: וַ/יֹּ֛אמֶר גַּם לְ/אַנְשֵׁ֥י פְנוּאֵ֖ל לֵ/אמֹ֑ר בְּ/שׁוּבִ֣/י בְ/שָׁל֔וֹם
    אֶתֹּ֖ץ אֶת הַ/מִּגְדָּ֥ל הַ/זֶּֽה־־׃פ
translation:
  text: He also said to the men of Penuel, “When I return in peace, I will tear down
    this tower.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “safely” / “successful and unharmed”; Hebrew “in peace.”
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says “the men of Penuel,” likely referring to the town's male
      leaders or representatives, not necessarily every inhabitant.
    reason: cultural_note
  - marker: c
    text: “Tower” may refer to a defensive stronghold or fortified tower within Penuel.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: also
  alternatives:
  - too
  - as well
  lexicon: HALOT
  rationale: Marks addition to Gideon's prior speech to another group; 'also' is natural
    and preserves the connective force.
- source_word: לְאַנְשֵׁי פְנוּאֵל
  chosen: to the men of Penuel
  alternatives:
  - to the people of Penuel
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' Given the immediate civic leadership
    context, 'men of Penuel' is gender-accurate and closer to the Hebrew than the
    broader 'people.'
- source_word: בְּשׁוּבִי
  chosen: when I return
  alternatives:
  - in my returning
  - upon my return
  lexicon: HALOT
  rationale: Infinitive construct with 1cs suffix after ב conveys temporal sense.
    'When I return' is idiomatic modern English.
- source_word: בְשָׁלוֹם
  chosen: in peace
  alternatives:
  - safely
  - successful and unharmed
  lexicon: HALOT
  rationale: שָׁלוֹם here likely denotes safe, successful return from battle. 'In
    peace' preserves the Hebrew wording while allowing the fuller sense to be inferred.
- source_word: אֶתֹּץ
  chosen: I will tear down
  alternatives:
  - I will break down
  - I will demolish
  lexicon: HALOT
  rationale: From נתץ, used for pulling down or demolishing structures. 'Tear down'
    is vivid, natural, and suitably forceful without overtranslating.
- source_word: הַמִּגְדָּל הַזֶּה
  chosen: this tower
  alternatives:
  - this stronghold
  lexicon: HALOT
  rationale: מִגְדָּל normally means 'tower.' In context it may function defensively,
    but the concrete 'tower' should remain in the main text.
