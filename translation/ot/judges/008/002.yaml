id: JDG.8.2
reference: Judges 8:2
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֲלֵי/הֶ֔ם מֶה עָשִׂ֥יתִי עַתָּ֖ה כָּ/כֶ֑ם הֲ/ל֗וֹא ט֛וֹב עֹלְל֥וֹת
    אֶפְרַ֖יִם מִ/בְצִ֥יר אֲבִיעֶֽזֶר־׃
translation:
  text: But he said to them, “What have I done now compared to you? Are not the gleanings
    of Ephraim better than the grape harvest of Abiezer?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Are not the gleanings of Ephraim better than the vintage of Abiezer?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But he said
  alternatives:
  - And he said
  - Then he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' fits the adversative
    context, since Gideon is responding to Ephraim's complaint and attempting to calm
    them.
- source_word: אֲלֵיהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Straightforward preposition plus pronominal suffix referring to the men
    of Ephraim in the preceding verse.
- source_word: מֶה עָשִׂיתִי עַתָּה כָּכֶם
  chosen: What have I done now compared with you?
  alternatives:
  - What have I done now like you?
  - What have I done now in comparison to you?
  lexicon: HALOT
  rationale: The idiom with כ expresses comparison rather than similarity alone. 'Compared
    with you' makes Gideon's self-deprecating comparison clear in natural English.
- source_word: הֲלוֹא
  chosen: Are not
  alternatives:
  - Is not
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. Because the predicate
    nominative is plural ('gleanings'), 'Are not' is the best English form.
- source_word: טוֹב
  chosen: better
  alternatives:
  - gooder (not idiomatic)
  - superior
  lexicon: HALOT
  rationale: Although formally singular adjective 'good,' in this comparative construction
    with מן it means 'better than.' English requires the comparative.
- source_word: עֹלְלוֹת
  chosen: the gleanings
  alternatives:
  - the leftover grapes
  - the after-gleanings
  lexicon: HALOT
  rationale: Refers to what remains for gleaning after the main harvest, here in a
    vineyard metaphor. 'Gleanings' preserves the agricultural image and biblical diction
    without being archaic.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  lexicon: HALOT
  rationale: Standard transliteration of the tribal name.
- source_word: מִבְצִיר
  chosen: than the grape harvest of
  alternatives:
  - than the vintage of
  - than the harvest of
  lexicon: HALOT
  rationale: 'בציר denotes grape gathering/vintage. ''Grape harvest'' is clearer for
    modern readers than ''vintage'' while preserving the vineyard metaphor. The prefixed
    מן marks comparison: ''better than.'''
- source_word: אֲבִיעֶזֶר
  chosen: Abiezer
  lexicon: HALOT
  rationale: Standard transliteration of the clan name, referring to Gideon's own
    clan.
