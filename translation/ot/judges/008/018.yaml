id: JDG.8.18
reference: Judges 8:18
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר אֶל זֶ֨בַח֙ וְ/אֶל צַלְמֻנָּ֔ע אֵיפֹה֙ הָ/אֲנָשִׁ֔ים אֲשֶׁ֥ר הֲרַגְתֶּ֖ם
    בְּ/תָב֑וֹר וַֽ/יֹּאמרוּ֙ כָּמ֣וֹ/ךָ כְמוֹ/הֶ֔ם אֶחָ֕ד כְּ/תֹ֖אַר בְּנֵ֥י הַ/מֶּֽלֶךְ־־׃
translation:
  text: Then he said to Zebah and Zalmunna, “Where are the men whom you killed at
    Tabor?” And they said, “As you are, so were they; each one had the appearance
    of the sons of a king.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “They were like you; each one looked like a king’s son.”
    reason: lexical_alternative
  - marker: b
    text: Tabor refers to Mount Tabor.
    reason: cultural_note
lexical_decisions:
- source_word: אֵיפֹה
  chosen: Where are
  alternatives:
  - Where
  lexicon: HALOT
  rationale: Interrogative adverb asking location. In idiomatic English direct speech,
    'Where are' best conveys the implied copula.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the people
  lexicon: HALOT
  rationale: אַנָשִׁים normally refers to men here, not people in general, since the
    context concerns identifiable male victims and the reply compares them to Gideon.
- source_word: הֲרַגְתֶּם
  chosen: you killed
  alternatives:
  - you struck down
  - you murdered
  lexicon: HALOT
  rationale: Basic sense is 'kill/slay.' 'Killed' is the most natural and sufficiently
    direct rendering without importing a legal judgment such as 'murdered.'
- source_word: בְּתָבוֹר
  chosen: at Tabor
  alternatives:
  - on Tabor
  - at Mount Tabor
  lexicon: HALOT
  rationale: The preposition ב can be rendered flexibly by context. 'At Tabor' is
    concise and natural; English readers can understand the place-name without expanding
    the Hebrew to 'Mount Tabor' in the main text.
- source_word: כָּמוֹךָ כְמוֹהֶם
  chosen: As you are, so were they
  alternatives:
  - They were like you
  - Like you, like them
  lexicon: HALOT
  rationale: The paired comparison is elliptical in Hebrew. This rendering preserves
    the direct comparison to Gideon while making the syntax intelligible in English.
- source_word: אֶחָד
  chosen: each one
  alternatives:
  - one
  - every one
  lexicon: HALOT
  rationale: Used distributively here after a plural comparison. 'Each one' captures
    the sense that every individual man shared the described appearance.
- source_word: כְּתֹאַר
  chosen: had the appearance of
  alternatives:
  - in form like
  - with the bearing of
  - with the appearance of
  lexicon: HALOT
  rationale: תֹּאַר refers to form, appearance, or outward bearing. 'Had the appearance
    of' is clear modern English and fits the predicative construction.
- source_word: בְּנֵי הַמֶּלֶךְ
  chosen: the sons of a king
  alternatives:
  - royal sons
  - princes
  - the sons of the king
  lexicon: HALOT
  rationale: The phrase is indefinite in sense though formally definite in Hebrew.
    'The sons of a king' preserves the idiom of royal appearance better than the interpretive
    'princes.'
- source_word: וַיֹּאמֶר ... וַיֹּאמְרוּ
  chosen: Then he said ... And they said
  alternatives:
  - He said ... They answered
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol sequence. 'Then he said' and 'And they said'
    preserve the Hebrew narrative flow without overinterpreting the second verb as
    a formal answer.
