id: JDG.8.28
reference: Judges 8:28
source:
  edition: WLC
  text: וַ/יִּכָּנַ֣ע מִדְיָ֗ן לִ/פְנֵי֙ בְּנֵ֣י יִשְׂרָאֵ֔ל וְ/לֹ֥א יָסְפ֖וּ לָ/שֵׂ֣את
    רֹאשָׁ֑/ם וַ/תִּשְׁקֹ֥ט הָ/אָ֛רֶץ אַרְבָּעִ֥ים שָׁנָ֖ה בִּ/ימֵ֥י גִדְעֽוֹן׃פ
translation:
  text: So Midian was subdued before the sons of Israel, and they did not again lift
    up their head. And the land had rest forty years in the days of Gideon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not again recover their strength' or 'did not again raise their
      head.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכָּנַע
  chosen: was subdued
  alternatives:
  - was humbled
  - was brought low
  - was subdued
  lexicon: HALOT
  rationale: The Niphal of כנע here is passive/reflexive, indicating that Midian was
    brought into subjection. 'Was subdued' is idiomatic English and fits the military
    context better than the more abstract 'was humbled,' while preserving the passive
    sense.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - before
  - in the presence of
  - at the hands of
  lexicon: HALOT
  rationale: The phrase 'before the sons of Israel' is a standard Hebrew idiom for
    subjugation in relation to another people. 'Before' preserves the source wording
    and the idiomatic force without over-paraphrasing.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: This formally reflects the Hebrew construct phrase while remaining natural
    enough in English. Because the source is explicitly masculine plural and ethnically
    referential, 'sons of Israel' preserves the wording more closely than 'Israelites.'
- source_word: וְלֹא יָסְפוּ
  chosen: did not again
  alternatives:
  - did not continue
  - did not add further
  - did not again
  lexicon: HALOT
  rationale: יסף with an infinitive commonly means 'to continue' or 'to do again.'
    In this military summary, 'did not again' best captures the sense that Midian
    did not resume its former aggression.
- source_word: לָשֵׂאת רֹאשָׁם
  chosen: lift up their head
  alternatives:
  - raise their head
  - hold their head high
  - recover their strength
  lexicon: HALOT
  rationale: This Hebrew idiom can denote renewed boldness, recovery, or assertiveness.
    'Lift up their head' preserves the metaphor in the main text; its idiomatic sense
    is worth preserving rather than flattening entirely.
- source_word: וַתִּשְׁקֹט
  chosen: had rest
  alternatives:
  - was quiet
  - was undisturbed
  - had rest
  lexicon: HALOT
  rationale: In Judges, this verb often summarizes a period of peace from conflict.
    'Had rest' is the established and contextually accurate rendering, clearer in
    English than the more wooden 'was quiet.'
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the land
  - the country
  lexicon: HALOT
  rationale: In Judges this commonly refers to the land of Israel in a collective-national
    sense. 'The land' is the most natural and textually restrained rendering.
- source_word: אַרְבָּעִים שָׁנָה
  chosen: forty years
  alternatives:
  - forty years
  lexicon: HALOT
  rationale: Straightforward numerical expression; no interpretive expansion is needed.
- source_word: בִּימֵי גִדְעוֹן
  chosen: in the days of Gideon
  alternatives:
  - during Gideon's lifetime
  - in Gideon's days
  lexicon: HALOT
  rationale: This is a standard Hebrew temporal expression. 'In the days of Gideon'
    preserves the form and leaves open the exact chronological nuance without over-specifying
    'lifetime.'
