theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: Following the translation philosophy's gender-accurate principle, the
    masculine plural ethnonym is preserved rather than neutralized. Since the phrase
    is a conventional national designation, alternatives are possible, but the more
    formal rendering best reflects the Hebrew wording here.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Preservation of Hebrew idiom לָשֵׂאת רֹאשָׁם
  chosen_reading: lift up their head
  alternative_readings:
  - recover their strength
  - raise themselves again
  rationale: The text uses a concrete Hebrew idiom for renewed confidence or power.
    Preserving the idiom in the main text maintains literary texture and theological
    restraint, while an explanatory alternative is preserved in a footnote rather
    than resolved interpretively in the translation itself.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
