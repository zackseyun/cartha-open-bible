id: JDG.8.35
reference: Judges 8:35
source:
  edition: WLC
  text: וְ/לֹֽא עָשׂ֣וּ חֶ֔סֶד עִם בֵּ֥ית יְרֻבַּ֖עַל גִּדְע֑וֹן כְּ/כָל הַ/טּוֹבָ֔ה
    אֲשֶׁ֥ר עָשָׂ֖ה עִם יִשְׂרָאֵֽל־־־־׃פ
translation:
  text: And they did not show kindness to the house of Jerubbaal, Gideon, according
    to all the good that he had done for Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Jerubbaal Gideon,' using both names for the same person.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  chosen: And they did not
  alternatives:
  - but they did not
  - and they did not
  lexicon: HALOT
  rationale: The conjunction plus negation continues the narrative with a simple adversative/continuative
    sense. 'And they did not' preserves the Hebrew flow without overstating contrast.
- source_word: עָשׂוּ
  chosen: show
  alternatives:
  - do
  - act with
  lexicon: HALOT
  rationale: With חֶסֶד as its object, עשה forms the idiom 'do/show kindness/loyalty.'
    English prefers 'show kindness' over the more wooden 'do kindness.'
- source_word: חֶסֶד
  chosen: kindness
  alternatives:
  - steadfast love
  - loyalty
  - faithful love
  lexicon: HALOT
  rationale: Here חֶסֶד refers to concrete loyal kindness shown to Gideon's household.
    'Kindness' is natural English and fits the social obligation context; 'steadfast
    love' would sound overly covenantal in this human-to-human setting, though loyalty
    is part of the semantic range.
- source_word: עִם
  chosen: to
  alternatives:
  - with
  lexicon: HALOT
  rationale: Although literally 'with,' English idiom with 'show kindness' takes 'to.'
    This is a natural target-language adjustment without loss of meaning.
- source_word: בֵּית
  chosen: the house of
  alternatives:
  - the household of
  - the family of
  lexicon: HALOT
  rationale: '''House of'' preserves the Hebrew familial/dynastic expression. ''Household''
    or ''family'' are possible, but ''house of'' keeps the biblical register and may
    include the broader family line.'
- source_word: יְרֻבַּעַל גִּדְעוֹן
  chosen: Jerubbaal (that is, Gideon)
  alternatives:
  - Jerubbaal-Gideon
  - Jerubbaal Gideon
  lexicon: HALOT
  rationale: The appositional double naming identifies Jerubbaal with Gideon. Rendering
    the second name as an explanatory apposition helps modern readers while preserving
    both names present in the Hebrew.
- source_word: כְּכָל
  chosen: in keeping with all
  alternatives:
  - according to all
  - for all
  - in proportion to all
  lexicon: HALOT
  rationale: 'The comparative כ plus כל indicates correspondence: their treatment
    did not match the full measure of the good he had done. ''In keeping with all''
    expresses this naturally.'
- source_word: הַטּוֹבָה
  chosen: the good
  alternatives:
  - the goodness
  - the benefits
  lexicon: HALOT
  rationale: The noun refers to the beneficial good Gideon had done for Israel. 'The
    good' is concise and broad enough to include his acts of deliverance and benefit.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that he had done
  alternatives:
  - which he did
  - that he did
  lexicon: HALOT
  rationale: 'English past perfect fits the retrospective sense in narrative context:
    Gideon''s prior deeds stand behind Israel''s present failure.'
- source_word: עִם יִשְׂרָאֵל
  chosen: for Israel
  alternatives:
  - with Israel
  - toward Israel
  lexicon: HALOT
  rationale: 'Though literally ''with Israel,'' the sense is benefactive in English:
    the good was done for Israel''s benefit.'
