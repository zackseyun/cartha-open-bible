id: JDG.8.12
reference: Judges 8:12
source:
  edition: WLC
  text: וַ/יָּנ֗וּסוּ זֶ֚בַח וְ/צַלְמֻנָּ֔ע וַ/יִּרְדֹּ֖ף אַחֲרֵי/הֶ֑ם וַ/יִּלְכֹּ֞ד
    אֶת שְׁנֵ֣י מַלְכֵ֣י מִדְיָ֗ן אֶת זֶ֨בַח֙ וְ/אֶת צַלְמֻנָּ֔ע וְ/כָל הַֽ/מַּחֲנֶ֖ה
    הֶחֱרִֽיד־׀־־־׃
translation:
  text: Zebah and Zalmunna fled, and he pursued them and captured the two kings of
    Midian, Zebah and Zalmunna; and he threw the whole camp into panic.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and he terrified the whole camp' or 'and he routed the whole camp.'
      The Hebrew verb can denote causing trembling or panic, with military implications
      in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּנוּסוּ
  chosen: fled
  alternatives:
  - ran away
  - took flight
  lexicon: HALOT
  rationale: Qal wayyiqtol of נוּס denotes fleeing/escaping. 'Fled' is concise, natural
    English and preserves the narrative force better than the more colloquial 'ran
    away.'
- source_word: זֶבַח וְצַלְמֻנָּע
  chosen: Zebah and Zalmunna
  rationale: These are personal names, so they are transliterated per project philosophy
    rather than translated.
- source_word: וַיִּרְדֹּף אַחֲרֵיהֶם
  chosen: he pursued them
  alternatives:
  - he chased after them
  lexicon: HALOT
  rationale: רדף + אחרי commonly means 'pursue/chase after.' 'Pursued' is the more
    standard narrative rendering and avoids unnecessary expansion.
- source_word: וַיִּלְכֹּד
  chosen: captured
  alternatives:
  - seized
  - took
  lexicon: HALOT
  rationale: לכד in military context means to capture/seize. 'Captured' fits the context
    of taking enemy kings alive.
- source_word: שְׁנֵי מַלְכֵי מִדְיָן
  chosen: the two kings of Midian
  alternatives:
  - the two Midianite kings
  lexicon: HALOT
  rationale: A formally close rendering preserves the construct relationship explicitly.
    'The two Midianite kings' is possible, but 'the two kings of Midian' more directly
    reflects the Hebrew wording.
- source_word: אֶת זֶבַח וְאֶת צַלְמֻנָּע
  chosen: Zebah and Zalmunna
  rationale: The appositional repetition identifies the two kings just mentioned.
    It is retained in English for clarity and emphasis, though without over-literal
    repetition of the object marker.
- source_word: וְכָל הַמַּחֲנֶה
  chosen: the whole camp
  alternatives:
  - all the camp
  - the entire camp
  lexicon: HALOT
  rationale: מַחֲנֶה here refers to the military camp/army encampment. 'The whole
    camp' is idiomatic and preserves the collective sense.
- source_word: הֶחֱרִיד
  chosen: he threw ... into panic
  alternatives:
  - he terrified
  - he routed
  - he caused ... to tremble
  lexicon: HALOT
  rationale: Hiphil of חרד means to cause trembling, terrify, or throw into panic.
    Given the direct object 'the whole camp,' the sense is not merely emotional fear
    but military disarray. 'Threw the whole camp into panic' captures both the causative
    force and the battle context better than the flatter 'terrified.'
