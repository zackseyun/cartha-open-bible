id: JDG.12.7
reference: Judges 12:7
source:
  edition: WLC
  text: וַ/יִּשְׁפֹּ֥ט יִפְתָּ֛ח אֶת יִשְׂרָאֵ֖ל שֵׁ֣שׁ שָׁנִ֑ים וַ/יָּ֗מָת יִפְתָּח֙ הַ/גִּלְעָדִ֔י וַ/יִּקָּבֵ֖ר בְּ/עָרֵ֥י גִלְעָֽד־׃פ
translation:
  text: Jephthah judged Israel six years[a]. Then Jephthah the Gileadite died and was buried in the cities of Gilead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in the cities of Gilead.'' The plural may function idiomatically for an unspecified city in the region.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁפֹּט
  chosen: judged
  alternatives:
  - led
  - governed
  lexicon: HALOT
  rationale: In Judges, שׁפט commonly refers to the activity of a judge-deliverer over Israel. 'Judged' preserves the book's recurring terminology and avoids over-interpreting the role as merely military or administrative.
- source_word: שֵׁשׁ שָׁנִים
  chosen: six years
  lexicon: HALOT
  rationale: Straightforward duration phrase; rendered literally.
- source_word: הַגִּלְעָדִי
  chosen: the Gileadite
  alternatives:
  - from Gilead
  lexicon: HALOT
  rationale: The gentilic/adjectival form identifies Jephthah by regional origin. 'The Gileadite' is concise and idiomatic in English.
- source_word: וַיִּקָּבֵר
  chosen: was buried
  alternatives:
  - was entombed
  lexicon: HALOT
  rationale: Passive rendering matches the Hebrew verbal form and is the normal English equivalent for burial notices.
- source_word: בְּעָרֵי גִלְעָד
  chosen: in one of the cities of Gilead
  alternatives:
  - in the cities of Gilead
  lexicon: HALOT
  rationale: The Hebrew reads literally 'in the cities of Gilead,' but in a burial notice for one person this plural is commonly understood distributively or as an idiom for an unspecified city within the region. Rendering 'in one of the cities of Gilead' communicates the likely sense in natural English while preserving the geographic reference.
