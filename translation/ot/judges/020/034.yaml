id: JDG.20.34
reference: Judges 20:34
source:
  edition: WLC
  text: וַ/יָּבֹאוּ֩ מִ/נֶּ֨גֶד לַ/גִּבְעָ֜ה עֲשֶׂרֶת֩ אֲלָפִ֨ים אִ֤ישׁ בָּחוּר֙ מִ/כָּל
    יִשְׂרָאֵ֔ל וְ/הַ/מִּלְחָמָ֖ה כָּבֵ֑דָה וְ/הֵם֙ לֹ֣א יָדְע֔וּ כִּֽי נֹגַ֥עַת עֲלֵי/הֶ֖ם
    הָ/רָעָֽה־־׃פ
translation:
  text: Then ten thousand chosen men from all Israel came against Gibeah, and the
    battle was fierce; but they did not know that disaster was closing in on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that calamity was overtaking them.' The Hebrew literally says 'that
      the disaster was touching/reaching them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנֶּגֶד לַגִּבְעָה
  chosen: against Gibeah
  alternatives:
  - in front of Gibeah
  - opposite Gibeah
  - from the front of Gibeah
  lexicon: HALOT
  rationale: The prepositional phrase literally denotes being in front of or opposite,
    but in battle context it idiomatically indicates advancing against the city/force.
    'Against Gibeah' is natural English and preserves the adversarial sense.
- source_word: עֲשֶׂרֶת אֲלָפִים אִישׁ בָּחוּר
  chosen: ten thousand chosen men
  alternatives:
  - ten thousand select men
  - ten thousand picked men
  lexicon: HALOT
  rationale: אִישׁ with a numeral can function collectively ('men'), and בָּחוּר here
    means selected or choice fighting men, not merely young men. 'Chosen men' best
    fits the military context.
- source_word: מִכָּל יִשְׂרָאֵל
  chosen: from all Israel
  alternatives:
  - out of all Israel
  lexicon: HALOT
  rationale: The phrase indicates these troops were drawn from the whole of Israel.
    'From all Israel' is idiomatic and sufficiently precise.
- source_word: וְהַמִּלְחָמָה כָּבֵדָה
  chosen: and the battle was fierce
  alternatives:
  - and the battle was heavy
  - and the fighting was severe
  lexicon: HALOT
  rationale: כבד in this construction conveys severity or intensity, not physical
    weight. 'Was fierce' gives clear modern English while preserving the sense of
    hard, intense combat.
- source_word: וְהֵם לֹא יָדְעוּ
  chosen: but they did not know
  alternatives:
  - and they did not know
  lexicon: HALOT
  rationale: The conjunction can be rendered simply 'and,' but English style benefits
    from 'but' to mark the contrast between the fierce battle and Benjamin's ignorance
    of impending defeat.
- source_word: כִּי נֹגַעַת עֲלֵיהֶם הָרָעָה
  chosen: that disaster was closing in on them
  alternatives:
  - that calamity was touching them
  - that evil was overtaking them
  - that disaster had reached them
  lexicon: HALOT
  rationale: נגע literally means 'touch/reach,' but in this context of impending military
    ruin it conveys disaster coming upon them. הָרָעָה here is not moral evil but
    calamity/disaster. 'Was closing in on them' captures the imminent, encroaching
    sense in natural English.
