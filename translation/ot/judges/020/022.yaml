id: JDG.20.22
reference: Judges 20:22
source:
  edition: WLC
  text: וַ/יִּתְחַזֵּ֥ק הָ/עָ֖ם אִ֣ישׁ יִשְׂרָאֵ֑ל וַ/יֹּסִ֨פוּ֙ לַ/עֲרֹ֣ךְ מִלְחָמָ֔ה
    בַּ/מָּק֕וֹם אֲשֶׁר עָ֥רְכוּ שָׁ֖ם בַּ/יּ֥וֹם הָ/רִאשֽׁוֹן־׃
translation:
  text: But the people, the men of Israel, strengthened themselves and again drew
    up for battle in the place where they had drawn up on the first day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'took courage' for 'strengthened themselves.' The Hebrew can denote renewed
      resolve after defeat.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְחַזֵּק
  chosen: strengthened themselves
  alternatives:
  - took courage
  - became strong
  - rallied
  lexicon: HALOT
  rationale: Hitpael of חזק here is reflexive/intransitive, describing the Israelites
    recovering resolve after defeat. 'Strengthened themselves' preserves the reflexive
    nuance better than the more interpretive 'took courage,' while remaining natural
    English.
- source_word: הָעָם אִישׁ יִשְׂרָאֵל
  chosen: the people, the men of Israel
  alternatives:
  - the people of Israel
  - the men of Israel
  - the army of Israel
  lexicon: HALOT
  rationale: The Hebrew appositional construction combines collective 'the people'
    with 'man/men of Israel.' Rendering both elements preserves the wording and the
    gender-accurate reference to the fighting men, in line with the translation philosophy.
    'Army' is too interpretive because the text does not use a specific military noun
    here.
- source_word: וַיֹּסִפוּ
  chosen: again
  alternatives:
  - continued
  - added
  - proceeded again
  lexicon: HALOT
  rationale: With the infinitive לַעֲרֹךְ, יסף expresses repetition/resumption. 'Again'
    communicates the sense idiomatically in English without the awkwardness of 'added
    to arrange.'
- source_word: לַעֲרֹךְ מִלְחָמָה
  chosen: drew up for battle
  alternatives:
  - arrayed themselves for battle
  - set the battle line
  - prepared for war
  lexicon: HALOT
  rationale: ערך with מלחמה refers to arranging battle lines or taking up battle formation.
    'Drew up for battle' is a natural military expression in English that preserves
    the formal sense better than the broader 'prepared for war.'
- source_word: בַּמָּקוֹם
  chosen: in the place
  alternatives:
  - at the place
  - on the spot
  lexicon: HALOT
  rationale: A straightforward locative expression; 'in the place' matches the Hebrew
    preposition and works idiomatically with the following relative clause.
- source_word: אֲשֶׁר עָרְכוּ שָׁם
  chosen: where they had drawn up
  alternatives:
  - where they had arrayed themselves
  - that they had drawn up there
  lexicon: HALOT
  rationale: The relative clause refers back to the same military deployment verb
    ערך. 'Where they had drawn up' avoids redundant 'there' in English while preserving
    the sense of prior positioning.
- source_word: בַּיּוֹם הָרִאשׁוֹן
  chosen: on the first day
  alternatives:
  - the first day
  - on day one
  lexicon: HALOT
  rationale: Temporal phrase marking the earlier battle deployment. 'On the first
    day' is the most natural and precise English rendering.
