id: JDG.20.4
reference: Judges 20:4
source:
  edition: WLC
  text: וַ/יַּ֜עַן הָ/אִ֣ישׁ הַ/לֵּוִ֗י אִ֛ישׁ הָ/אִשָּׁ֥ה הַ/נִּרְצָחָ֖ה וַ/יֹּאמַ֑ר הַ/גִּבְעָ֨תָ/ה֙ אֲשֶׁ֣ר לְ/בִנְיָמִ֔ן בָּ֛אתִי אֲנִ֥י וּ/פִֽילַגְשִׁ֖/י לָ/לֽוּן׃
translation:
  text: Then the Levite[a], the husband of the woman who had been murdered, answered and said, “I came to Gibeah, which belongs to Benjamin, I and my concubine, to spend the night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “which is in Benjamin.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: Standard narrative use of ענה introducing speech; 'answered' preserves the Hebrew idiom, even though no explicit prior question is stated in English.
- source_word: הָאִישׁ הַלֵּוִי
  chosen: the Levite
  alternatives:
  - the Levitical man
  lexicon: HALOT
  rationale: Natural English rendering of the noun + gentilic/title construction; identifies the speaker by tribal/cultic status.
- source_word: אִישׁ הָאִשָּׁה
  chosen: the husband of the woman
  alternatives:
  - the man of the woman
  lexicon: HALOT
  rationale: The construct phrase literally reads 'man of the woman,' but in context denotes her male partner/husband. 'Husband' is idiomatic English and fits the relational sense better than a wooden rendering.
- source_word: הַנִּרְצָחָה
  chosen: who had been murdered
  alternatives:
  - who had been killed
  - the murdered woman
  lexicon: HALOT
  rationale: The passive participle from רצח denotes being murdered/slain. 'Murdered' preserves the gravity and likely criminal sense better than the broader 'killed.' Relative-clause form reads naturally in English.
- source_word: וַיֹּאמַר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard rendering of אמר in narrative speech introduction.
- source_word: הַגִּבְעָתָה
  chosen: to Gibeah
  alternatives:
  - into Gibeah
  lexicon: HALOT
  rationale: The directional he indicates motion toward the place; 'to Gibeah' is the most natural English equivalent.
- source_word: אֲשֶׁר לְבִנְיָמִן
  chosen: which belongs to Benjamin
  alternatives:
  - which is in Benjamin
  - which is of Benjamin
  lexicon: HALOT
  rationale: The phrase identifies Gibeah as pertaining to the tribal territory of Benjamin. 'Belongs to Benjamin' captures possession/association clearly; 'in Benjamin' is possible but slightly less explicit.
- source_word: בָּאתִי אֲנִי
  chosen: I came
  alternatives:
  - I entered
  - I myself came
  lexicon: HALOT
  rationale: בוא with the explicit pronoun gives slight emphasis, but English normally does not require reproducing the pronoun unless contrast is marked. 'I came' is sufficient and natural.
- source_word: וּפִילַגְשִׁי
  chosen: my concubine
  alternatives:
  - my secondary wife
  lexicon: HALOT
  rationale: פילגש is conventionally and accurately rendered 'concubine.' Though culturally unfamiliar, it is the established lexical equivalent and avoids interpretive paraphrase.
- source_word: לָלוּן
  chosen: to spend the night
  alternatives:
  - to lodge
  - to stay overnight
  lexicon: HALOT
  rationale: The infinitive of לון refers to lodging overnight. 'To spend the night' is clear modern English while remaining faithful to the sense.
