id: JDG.20.20
reference: Judges 20:20
source:
  edition: WLC
  text: וַ/יֵּצֵא֙ אִ֣ישׁ יִשְׂרָאֵ֔ל לַ/מִּלְחָמָ֖ה עִם בִּנְיָמִ֑ן וַ/יַּעַרְכ֨וּ
    אִתָּ֧/ם אִֽישׁ יִשְׂרָאֵ֛ל מִלְחָמָ֖ה אֶל הַ/גִּבְעָֽה־־־׃
translation:
  text: The men of Israel went out to battle against Benjamin, and the men of Israel
    drew up for battle against them at Gibeah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'arrayed themselves for battle against them at Gibeah.' The Hebrew wording
      allows a slightly more explicit adversarial sense in the second clause.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - marched out
  - came out
  lexicon: HALOT
  rationale: The verb יצא in narrative military context commonly means to go out for
    action or engagement. 'Went out' is a natural English rendering that preserves
    the movement without over-specifying military nuance.
- source_word: אִישׁ יִשְׂרָאֵל
  chosen: the men of Israel
  alternatives:
  - Israel
  - the man of Israel
  lexicon: HALOT
  rationale: Although אִישׁ is morphologically singular, it functions here as a collective
    singular for the fighting force of Israel. English idiom requires a plural collective,
    'the men of Israel,' especially in a battle context. This also preserves the gender-accurate
    sense of the Hebrew rather than neutralizing it.
- source_word: לַמִּלְחָמָה
  chosen: to battle
  alternatives:
  - for war
  - to the battle
  lexicon: HALOT
  rationale: The prepositional phrase indicates purpose or engagement in warfare.
    'To battle' is concise, idiomatic, and suitably martial in English.
- source_word: עִם בִּנְיָמִן
  chosen: against Benjamin
  alternatives:
  - with Benjamin
  lexicon: HALOT
  rationale: While עִם often means 'with,' in conflict contexts it can denote opposition
    between parties. Since the verse explicitly concerns warfare, 'against Benjamin'
    best conveys the adversarial sense in natural English.
- source_word: וַיַּעַרְכוּ
  chosen: drew up
  alternatives:
  - arrayed themselves
  - formed ranks
  lexicon: HALOT
  rationale: ערך in military contexts refers to arranging troops in battle order.
    'Drew up' is a standard, readable military expression that preserves the tactical
    sense.
- source_word: אִתָּם
  chosen: with them
  alternatives:
  - against them
  lexicon: HALOT
  rationale: The pronoun refers to the Benjaminites as the opposing party in the battle
    line. In English, 'drew up for battle with them' naturally conveys hostile engagement
    while staying close to the Hebrew preposition.
- source_word: מִלְחָמָה
  chosen: for battle
  alternatives:
  - in battle
  - the battle line
  lexicon: HALOT
  rationale: This accusative-like noun complements the military verb and specifies
    the purpose or mode of arraying. 'For battle' is idiomatic and avoids unnecessary
    expansion.
- source_word: אֶל הַגִּבְעָה
  chosen: at Gibeah
  alternatives:
  - toward Gibeah
  - against Gibeah
  - at the Gibeah
  lexicon: HALOT
  rationale: Although אֶל often means 'to/toward,' in this context it marks the location
    of deployment in relation to the city. 'At Gibeah' gives the likely sense in smooth
    English. The place name is transliterated rather than translated, per project
    philosophy.
