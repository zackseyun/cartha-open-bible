id: JDG.20.17
reference: Judges 20:17
source:
  edition: WLC
  text: וְ/אִ֨ישׁ יִשְׂרָאֵ֜ל הִתְפָּֽקְד֗וּ לְ/בַד֙ מִ/בִּנְיָמִ֔ן אַרְבַּ֨ע מֵא֥וֹת
    אֶ֛לֶף אִ֖ישׁ שֹׁ֣לֵֽף חָ֑רֶב כָּל זֶ֖ה אִ֥ישׁ מִלְחָמָֽה־׃
translation:
  text: And the men of Israel, apart from Benjamin, were mustered at four hundred
    thousand men drawing the sword; all these were men of war.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'excluding Benjamin.'
    reason: lexical_alternative
  - marker: b
    text: Or 'were numbered'; the Hebrew verb can denote being counted or mustered
      for military service.
    reason: lexical_alternative
  - marker: c
    text: Literally 'drawing the sword,' a Hebrew idiom for armed fighting men.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/אִישׁ יִשְׂרָאֵל
  chosen: the men of Israel
  alternatives:
  - the man of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Though אִישׁ is singular in form, it functions collectively here with
    the plural verb הִתְפָּקְדוּ, referring to the fighting men of Israel. 'The men
    of Israel' preserves the gendered, military sense better than the broader ethnic
    label 'the Israelites.'
- source_word: הִתְפָּקְדוּ
  chosen: were mustered
  alternatives:
  - were numbered
  - assembled themselves
  lexicon: HALOT
  rationale: The hitpael of פקד in military contexts commonly refers to being enrolled,
    counted, or mustered for service. 'Were mustered' best fits the immediate war
    setting and reads naturally in English.
- source_word: לְבַד מִבִּנְיָמִן
  chosen: apart from Benjamin
  alternatives:
  - besides Benjamin
  - excluding Benjamin
  lexicon: HALOT
  rationale: The phrase marks Benjamin as excluded from the total being given. 'Apart
    from Benjamin' is idiomatic and clear, preserving the separative force without
    sounding overly technical.
- source_word: אַרְבַּע מֵאוֹת אֶלֶף אִישׁ
  chosen: four hundred thousand men
  alternatives:
  - four hundred thousand
  - four hundred thousand soldiers
  lexicon: HALOT
  rationale: The Hebrew explicitly includes אִישׁ after the number. 'Men' preserves
    the wording and the military census flavor; 'soldiers' would be interpretive,
    though contextually true.
- source_word: שֹׁלֵף חָרֶב
  chosen: drawing the sword
  alternatives:
  - bearing a sword
  - wielding a sword
  lexicon: HALOT
  rationale: Literally 'drawing/pulling out the sword.' In military idiom this denotes
    armed combatants ready for battle. 'Drawing the sword' preserves the vivid Hebrew
    expression better than a flatter paraphrase.
- source_word: כָּל זֶה
  chosen: all these
  alternatives:
  - all this
  - all of them
  lexicon: HALOT
  rationale: Though literally 'all this,' the phrase refers to the whole body just
    counted. 'All these' gives the correct English referent for the plural group while
    staying close to the Hebrew sense.
- source_word: אִישׁ מִלְחָמָה
  chosen: men of war
  alternatives:
  - warriors
  - fighting men
  lexicon: HALOT
  rationale: This is a standard Hebrew military expression. 'Men of war' is a clear,
    established English equivalent that preserves the masculine collective and martial
    register of the source.
