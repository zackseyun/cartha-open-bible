id: JDG.20.32
reference: Judges 20:32
source:
  edition: WLC
  text: וַ/יֹּֽאמְרוּ֙ בְּנֵ֣י בִנְיָמִ֔ן נִגָּפִ֥ים הֵ֛ם לְ/פָנֵ֖י/נוּ כְּ/בָ/רִאשֹׁנָ֑ה
    וּ/בְנֵ֧י יִשְׂרָאֵ֣ל אָמְר֗וּ נָנ֨וּסָה֙ וּֽ/נְתַקְּנֻ֔/הוּ מִן הָ/עִ֖יר אֶל
    הַֽ/מְסִלּֽוֹת־־׃
translation:
  text: And the sons of Benjamin said, “They are being struck down before us as at
    the first.” But the sons of Israel said, “Let us flee and draw them away from
    the city to the highways.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'as at the first,' referring to the earlier battles in this chapter;
      that is, 'as before' or 'as in the first encounter.'
    reason: cross_reference
  - marker: b
    text: The Hebrew says 'draw him away' with a singular object, likely using a collective
      singular for Benjamin or its fighting force; some translations render the sense
      as 'draw them away.'
    reason: lexical_alternative
  - marker: c
    text: Or 'roads' or 'main roads.' The Hebrew term can refer to built-up roads
      or highways.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִגָּפִים
  chosen: are being struck down
  alternatives:
  - are defeated
  - are routed
  - are falling
  lexicon: HALOT
  rationale: Passive participle of נגע/נגף in military context; conveys being beaten
    down/defeated in battle. 'Struck down' preserves the concrete martial sense better
    than the flatter 'defeated.'
- source_word: לְפָנֵינוּ
  chosen: before us
  alternatives:
  - in our presence
  - ahead of us
  lexicon: HALOT
  rationale: Standard idiom meaning 'before us' in the sense of in front of or at
    our hand in battle. This fits the military boast.
- source_word: כְּבָרִאשֹׁנָה
  chosen: as at the first
  alternatives:
  - as before
  - as formerly
  - as in the first battle
  lexicon: HALOT
  rationale: Comparative phrase referring back to the earlier engagements in the chapter.
    'As at the first' is concise and preserves the backward-looking comparison without
    over-specifying 'battle,' though that is the sense.
- source_word: נָנוּסָה
  chosen: Let us flee
  alternatives:
  - We should flee
  - Let us retreat
  lexicon: HALOT
  rationale: Cohortative first common plural; 'Let us flee' best reflects the volitional
    nuance. 'Retreat' is possible but slightly more interpretive and military-technical.
- source_word: וּנְתַקְּנֻהוּ
  chosen: and draw him away
  alternatives:
  - and pull him away
  - and detach him
  - and lure him away
  lexicon: HALOT
  rationale: From נתק, 'pull away/draw away.' The object suffix is singular, likely
    collective for Benjamin/the enemy force. 'Draw him away' preserves the singular
    Hebrew while making sense in English as a collective singular. 'Lure him away'
    captures strategy but adds a nuance not explicit in the verb itself.
- source_word: הוּא suffix in וּנְתַקְּנֻהוּ
  chosen: him
  alternatives:
  - them
  - it
  lexicon: Hebrew grammar
  rationale: The 3ms suffix is singular in the Hebrew. In context it refers collectively
    to Benjamin/the opposing force. The main text keeps the singular for auditability;
    English can use collective singular for a people-group or army.
- source_word: הָעִיר
  chosen: the city
  alternatives:
  - town
  lexicon: HALOT
  rationale: Standard rendering of עִיר. Here it refers to Gibeah as the urban center
    from which the Benjaminites are to be drawn out.
- source_word: הַמְסִלּוֹת
  chosen: the highways
  alternatives:
  - the roads
  - the main roads
  - the highways/open roads
  lexicon: HALOT
  rationale: מְסִלָּה often denotes a raised road/highway. Plural here suggests the
    roads or highways leading away from the city. 'Highways' preserves the lexical
    force better than the generic 'roads,' while still being understandable in modern
    English.
