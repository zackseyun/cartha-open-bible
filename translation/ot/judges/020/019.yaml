id: JDG.20.19
reference: Judges 20:19
source:
  edition: WLC
  text: וַ/יָּק֥וּמוּ בְנֵֽי יִשְׂרָאֵ֖ל בַּ/בֹּ֑קֶר וַ/יַּֽחֲנ֖וּ עַל הַ/גִּבְעָֽה־־׃פ
translation:
  text: Then the sons of Israel rose in the morning and camped against Gibeah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  chosen: rose
  alternatives:
  - set out
  - got up
  lexicon: HALOT
  rationale: From קום in the wayyiqtol, narrating the next action in sequence. 'Rose'
    preserves the simple narrative sense without over-interpreting it as departure
    alone.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: A formally transparent rendering of the Hebrew construct phrase. This
    follows the gender-accurate principle and preserves the idiom used for the covenant
    people, while remaining natural enough in English.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - in the morning light
  - at morning
  lexicon: HALOT
  rationale: The preposition with the definite noun denotes time. 'In the morning'
    is the most natural modern English equivalent.
- source_word: וַיַּחֲנוּ
  chosen: camped
  alternatives:
  - encamped
  - pitched camp
  lexicon: HALOT
  rationale: From חנה, referring to making camp. 'Camped' is readable modern English;
    'encamped' is slightly more formal but not necessary here.
- source_word: עַל
  chosen: against
  alternatives:
  - by
  - near
  - at
  lexicon: HALOT
  rationale: In this military context, עַל with a place name conveys hostile positioning
    toward the city rather than mere location. 'Against' best reflects the battle
    setting in the immediate context.
- source_word: הַגִּבְעָה
  chosen: Gibeah
  alternatives:
  - the Gibeah
  lexicon: HALOT
  rationale: This is the place name Gibeah. The Hebrew article is retained in the
    proper name form rather than translated woodenly into English.
