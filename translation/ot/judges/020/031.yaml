id: JDG.20.31
reference: Judges 20:31
source:
  edition: WLC
  text: וַ/יֵּצְא֤וּ בְנֵֽי בִנְיָמִן֙ לִ/קְרַ֣את הָ/עָ֔ם הָנְתְּק֖וּ מִן הָ/עִ֑יר וַ/יָּחֵ֡לּוּ לְ/הַכּוֹת֩ מֵ/הָ/עָ֨ם חֲלָלִ֜ים כְּ/פַ֣עַם בְּ/פַ֗עַם בַּֽ/מְסִלּוֹת֙ אֲשֶׁ֨ר אַחַ֜ת עֹלָ֣ה בֵֽית אֵ֗ל וְ/אַחַ֤ת גִּבְעָ֨תָ/ה֙ בַּ/שָּׂדֶ֔ה כִּ/שְׁלֹשִׁ֥ים אִ֖ישׁ בְּ/יִשְׂרָאֵֽל־־׀־׃
translation:
  text: And the sons of Benjamin came out to meet the people[a], and were drawn away from the city; and they began to strike down some of the people, as at other times, on the highways, one of which goes up to Bethel and one to Gibeah in the open country[d][c][b], about thirty men of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Benjaminites.' The Hebrew reads 'the sons of Benjamin.'
    reason: lexical_alternative
  - marker: b
    text: Or 'were detached from the city' or 'were lured away from the city.' The sense is that they were drawn out from the city's protection.
    reason: lexical_alternative
  - marker: c
    text: Or 'as before.' The Hebrew idiom compares this attack with the earlier battles.
    reason: lexical_alternative
  - marker: d
    text: Or 'in the field.' The phrase likely describes the route through open country.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצְאוּ
  chosen: came out
  alternatives:
  - went out
  lexicon: HALOT
  rationale: Basic narrative verb of movement from the city; 'came out' fits the English viewpoint from the battlefield scene.
- source_word: בְנֵי בִנְיָמִן
  chosen: the sons of Benjamin
  alternatives:
  - the Benjaminites
  - the people of Benjamin
  lexicon: HALOT
  rationale: Retains the Hebrew kinship expression while still being natural English. 'Benjaminites' is possible, but the more literal form preserves the tribal identity wording.
- source_word: לִקְרַאת הָעָם
  chosen: to meet the people
  alternatives:
  - to meet the army
  - to confront the people
  lexicon: HALOT
  rationale: עָם here refers to the Israelite force in context, but 'the people' is the direct lexical equivalent and preserves the narrative diction.
- source_word: הָנְתְּקוּ מִן הָעִיר
  chosen: were drawn away from the city
  alternatives:
  - were detached from the city
  - were pulled away from the city
  - got away from the city
  lexicon: HALOT
  rationale: The passive-like sense in context is that Benjamin was lured out from the protection of the city. 'Were drawn away' communicates the tactical separation without overparaphrasing.
- source_word: וַיָּחֵלּוּ
  chosen: they began
  alternatives:
  - they started
  lexicon: HALOT
  rationale: 'Standard ingressive sense of חלל in the Hiphil: the action commenced.'
- source_word: לְהַכּוֹת
  chosen: to strike down
  alternatives:
  - to strike
  - to kill
  lexicon: HALOT
  rationale: נכה often means to strike/defeat, and here the result is death. 'Strike down' preserves both the violent action and likely lethal outcome.
- source_word: מֵהָעָם
  chosen: some of the people
  alternatives:
  - from the people
  - among the people
  lexicon: HALOT
  rationale: The partitive מן indicates a portion of the opposing force, not the whole.
- source_word: חֲלָלִים
  chosen: as slain
  alternatives:
  - dead
  - casualties
  - wounded mortally
  lexicon: HALOT
  rationale: חללים denotes those killed/slain. Rendering it predicatively after 'strike down' reflects the Hebrew construction without redundancy.
- source_word: כְּפַעַם בְּפַעַם
  chosen: as at other times
  alternatives:
  - as before
  - as formerly
  - as time after time
  lexicon: HALOT
  rationale: Idiomatic expression comparing this attack with previous engagements in the chapter. 'As at other times' captures the repeated-pattern sense.
- source_word: בַּמְסִלּוֹת
  chosen: on the highways
  alternatives:
  - on the roads
  - on the main roads
  lexicon: HALOT
  rationale: מסלה refers to a raised road/highway. 'Highways' is a natural plural rendering in this military-geographical setting.
- source_word: אַחַת עֹלָה בֵית אֵל
  chosen: one of which goes up to Bethel
  alternatives:
  - one leading up to Bethel
  - one ascending to Bethel
  lexicon: HALOT
  rationale: עלה is the common topographical 'goes up.' 'One of which goes up to Bethel' keeps the relative-clause structure clear.
- source_word: וְאַחַת גִּבְעָתָה בַּשָּׂדֶה
  chosen: and one to Gibeah in the open country
  alternatives:
  - and one to Gibeah across the field
  - and one to Gibeah in the field
  lexicon: HALOT
  rationale: בַשָּׂדֶה is best taken adverbially/topographically, distinguishing the route through open country rather than within the city. 'Open country' is idiomatic English.
- source_word: כִּשְׁלֹשִׁים אִישׁ בְּיִשְׂרָאֵל
  chosen: about thirty men of Israel
  alternatives:
  - some thirty men of Israel
  - around thirty Israelites
  lexicon: HALOT
  rationale: כִּ with a number gives approximation. 'Men of Israel' preserves the gender-accurate and tribal-national wording better than flattening to 'Israelites'.
