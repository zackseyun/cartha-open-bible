id: JDG.20.43
reference: Judges 20:43
source:
  edition: WLC
  text: כִּתְּר֤וּ אֶת בִּנְיָמִן֙ הִרְדִיפֻ֔/הוּ מְנוּחָ֖ה הִדְרִיכֻ֑/הוּ עַ֛ד נֹ֥כַח הַ/גִּבְעָ֖ה מִ/מִּזְרַח שָֽׁמֶשׁ־־׃
translation:
  text: They surrounded Benjamin[a], pursued him, and trod him down as far as opposite Gibeah[c][b], toward the east.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pursued him from Menuchah,' if מְנוּחָה is taken as a place name rather than adverbially.
    reason: alternative_reading
  - marker: b
    text: Or 'drove him along' for 'trampled him down'; the Hebrew verb can carry either a forceful treading sense or a causative movement sense in this context.
    reason: lexical_alternative
  - marker: c
    text: Literally 'from the east of the sun,' that is, 'eastward' or 'on the east side.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּתְּרוּ
  chosen: surrounded
  alternatives:
  - encircled
  lexicon: HALOT
  rationale: The verb denotes enclosing or hemming in. 'Surrounded' is natural modern English and preserves the military sense.
- source_word: אֶת בִּנְיָמִן
  chosen: Benjamin
  alternatives:
  - the Benjaminites
  lexicon: HALOT
  rationale: The proper name can stand collectively for the tribe or its fighting force. Since the following singular suffixes treat Benjamin as a collective singular, 'Benjamin' preserves the Hebrew form while allowing the collective sense.
- source_word: הִרְדִיפֻהוּ
  chosen: pursued him
  alternatives:
  - chased him
  lexicon: HALOT
  rationale: רדף commonly means 'pursue' in military contexts. 'Pursued him' matches the singular collective object referring to Benjamin.
- source_word: מְנוּחָה
  chosen: relentlessly
  alternatives:
  - at rest
  - from a place of rest
  - without rest
  lexicon: HALOT
  rationale: The noun literally means 'rest' or 'resting place,' but in this difficult adverbial use the sense is best taken as pursuit that gave no rest. Rendering it adverbially as 'relentlessly' communicates the likely force in context without wooden obscurity.
- source_word: הִדְרִיכֻהוּ
  chosen: trampled him down
  alternatives:
  - drove him along
  - marched him down
  lexicon: HALOT
  rationale: The Hiphil of דרך can mean to tread or cause to tread. In a battle context, many understand a forceful sense such as 'trample down' or 'crush.' This fits the hostile action sequence better than the more neutral 'led' or 'guided.'
- source_word: עַד נֹכַח הַגִּבְעָה
  chosen: as far as opposite Gibeah
  alternatives:
  - as far as before Gibeah
  - as far as in front of Gibeah
  lexicon: HALOT
  rationale: נֹכַח indicates being opposite, in front of, or facing. 'Opposite Gibeah' is concise and spatially clear.
- source_word: מִמִּזְרַח שָׁמֶשׁ
  chosen: toward the east of the sun
  alternatives:
  - eastward
  - on the east side
  lexicon: HALOT
  rationale: Literally 'from the east of the sun,' an idiom for the east/eastward. The chosen rendering keeps some of the Hebrew imagery while remaining intelligible.
