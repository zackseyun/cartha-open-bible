id: JDG.20.38
reference: Judges 20:38
source:
  edition: WLC
  text: וְ/הַ/מּוֹעֵ֗ד הָיָ֛ה לְ/אִ֥ישׁ יִשְׂרָאֵ֖ל עִם הָ/אֹרֵ֑ב הֶ֕רֶב לְ/הַעֲלוֹתָ֛/ם מַשְׂאַ֥ת הֶ/עָשָׁ֖ן מִן הָ/עִֽיר־־׃
translation:
  text: Now the appointed sign between the men of Israel and the ambush was that they should make a great cloud of smoke rise from the city[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the appointed arrangement' or 'the agreed sign.' The Hebrew מוֹעֵד often means an appointed time, but here it refers to a prearranged signal in battle.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to/for the men of Israel with the ambush'; the sense is an arrangement between the two parties.
    reason: lexical_alternative
  - marker: c
    text: Or 'a mass/column of smoke.' The Hebrew expression refers to a conspicuous rising smoke signal from the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַמּוֹעֵד
  chosen: the appointed signal
  alternatives:
  - the appointed time
  - the arrangement
  - the agreed sign
  lexicon: HALOT
  rationale: מוֹעֵד commonly means an appointed time or meeting, but in this military context with 'between the men of Israel and the ambush' it refers to a prearranged signal or arrangement. 'Appointed signal' brings out the contextual function while retaining the sense of prior appointment.
- source_word: לְאִישׁ יִשְׂרָאֵל
  chosen: between the men of Israel
  alternatives:
  - for the men of Israel
  - for Israel's men
  lexicon: HALOT
  rationale: Though literally 'to/for the man/men of Israel,' the phrase works with עִם to express the parties involved in the arrangement. English idiom requires 'between the men of Israel and the ambush.' 'Men' preserves the masculine/gender-accurate form of אִישׁ in a military setting.
- source_word: עִם הָאֹרֵב
  chosen: and the ambush
  alternatives:
  - with the ambushers
  - with the men in ambush
  lexicon: HALOT
  rationale: The participle אֹרֵב means one lying in wait. In context it functions collectively for the ambushing force. 'The ambush' is concise and natural English for the unit involved.
- source_word: הֶרֶב
  chosen: great
  alternatives:
  - multiply
  - make much
  - abundantly
  lexicon: HALOT
  rationale: This infinitive absolute/intensive form from רבה strengthens the following action. Rather than a wooden repetition, 'great' idiomatically conveys the intensification in the resulting smoke signal.
- source_word: לְהַעֲלוֹתָם
  chosen: that they should make ... rise
  alternatives:
  - to cause them to bring up
  - for them to raise
  lexicon: HALOT
  rationale: 'The Hiphil of עלה means ''cause to go up, raise.'' The 3mp suffix refers to the party executing the signal. English smoothness favors an explicit clause: ''that they should make ... rise.'''
- source_word: מַשְׂאַת הֶעָשָׁן
  chosen: a great cloud of smoke
  alternatives:
  - a mass of smoke
  - a signal of smoke
  - an उठ?
  lexicon: HALOT
  rationale: מַשְׂאַת denotes something lifted up, here a rising mass or column used as a signal; paired with 'smoke' it refers to a conspicuous smoke plume. 'Cloud of smoke' is natural English; 'great' reflects the intensifying הֶרֶב.
- source_word: מִן הָעִיר
  chosen: from the city
  alternatives:
  - out of the city
  lexicon: HALOT
  rationale: Straightforward spatial source. 'From the city' is idiomatic and sufficiently literal.
