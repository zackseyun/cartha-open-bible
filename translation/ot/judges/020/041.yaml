id: JDG.20.41
reference: Judges 20:41
source:
  edition: WLC
  text: וְ/אִ֤ישׁ יִשְׂרָאֵל֙ הָפַ֔ךְ וַ/יִּבָּהֵ֖ל אִ֣ישׁ בִּנְיָמִ֑ן כִּ֣י רָאָ֔ה
    כִּֽי נָגְעָ֥ה עָלָ֖י/ו הָ/רָעָֽה־׃
translation:
  text: Then the men of Israel turned, and the men of Benjamin were terrified, because
    they saw that disaster had come upon them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew singular expressions ('man of Israel,' 'man of Benjamin,' 'he saw,'
      'upon him') are used collectively here for the opposing forces; the English
      renders them as plurals for natural sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אִישׁ יִשְׂרָאֵל
  chosen: Then the men of Israel
  alternatives:
  - And the men of Israel
  - the man/each man of Israel
  lexicon: HALOT
  rationale: Although אִישׁ is singular in form, in this military narrative it functions
    collectively, so English plural 'men of Israel' best represents the sense. The
    prefixed conjunction is rendered 'Then' to fit the narrative sequence naturally.
- source_word: הָפַךְ
  chosen: turned
  alternatives:
  - turned back
  - reversed
  lexicon: HALOT
  rationale: הפך here describes a tactical turning in battle. 'Turned' is concise
    and natural; 'turned back' is possible but slightly more interpretive.
- source_word: וַ/יִּבָּהֵל
  chosen: were terrified
  alternatives:
  - were dismayed
  - were alarmed
  - panicked
  lexicon: HALOT
  rationale: בהל conveys sudden dread or panic. Because the subject is collective
    ('the men of Benjamin'), English plural 'were terrified' captures the force well
    without becoming colloquial.
- source_word: אִישׁ בִּנְיָמִן
  chosen: the men of Benjamin
  alternatives:
  - the man/each man of Benjamin
  - Benjamin's men
  lexicon: HALOT
  rationale: As with 'men of Israel,' the singular noun functions collectively for
    the fighting force of Benjamin, so plural English is required for idiomatic accuracy.
- source_word: כִּי רָאָה
  chosen: because they saw
  alternatives:
  - for they saw
  - because he saw
  lexicon: HALOT
  rationale: The singular verb likely has a collective subject, referring to Benjamin
    as a group. English plural avoids awkwardness and matches the collective military
    context. 'Because' makes the causal relation explicit.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: The second כִּי introduces the content of what they saw, so 'that' is
    the most natural English rendering.
- source_word: נָגְעָה עָלָיו
  chosen: had overtaken them
  alternatives:
  - had reached them
  - had touched him
  - had come upon him
  lexicon: HALOT
  rationale: נגע על in this context means that calamity has come upon or struck someone.
    'Had overtaken them' fits the battle setting and the sense of impending ruin.
    The singular pronominal suffix is treated collectively in English.
- source_word: הָרָעָה
  chosen: disaster
  alternatives:
  - evil
  - calamity
  - harm
  lexicon: HALOT
  rationale: In this context רָעָה refers not to moral evil but to disastrous calamity
    befalling Benjamin in battle. 'Disaster' communicates the event clearly in modern
    English.
