id: JDG.20.10
reference: Judges 20:10
source:
  edition: WLC
  text: וְ/לָקַ֣חְנוּ עֲשָׂרָה֩ אֲנָשִׁ֨ים לַ/מֵּאָ֜ה לְ/כֹ֣ל שִׁבְטֵ֣י יִשְׂרָאֵ֗ל
    וּ/מֵאָ֤ה לָ/אֶ֨לֶף֙ וְ/אֶ֣לֶף לָ/רְבָבָ֔ה לָ/קַ֥חַת צֵדָ֖ה לָ/עָ֑ם לַ/עֲשׂ֗וֹת
    לְ/בוֹאָ/ם֙ לְ/גֶ֣בַע בִּנְיָמִ֔ן כְּ/כָל הַ֨/נְּבָלָ֔ה אֲשֶׁ֥ר עָשָׂ֖ה בְּ/יִשְׂרָאֵֽל׀־׃
translation:
  text: And we will take ten men out of a hundred from all the tribes of Israel, and
    a hundred out of a thousand, and a thousand out of ten thousand, to get provisions
    for the people, so that when they come to Gibeah of Benjamin, they may do according
    to all the outrage that it committed in Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vile deed' or 'disgraceful act' for 'outrage.' The Hebrew term denotes
      a shocking, disgraceful act.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew literally says 'to do at their coming to Gibeah of Benjamin,'
      a compressed expression for taking action once they arrive.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְנוּ
  chosen: And we will take
  alternatives:
  - Then let us take
  - and we took
  lexicon: HALOT
  rationale: Qal perfect 1cp with prefixed conjunction in this deliberative context
    functions prospectively as part of the assembly's plan; English future fits the
    sense better than a simple past.
- source_word: עֲשָׂרָה אֲנָשִׁים לַמֵּאָה ... וּמֵאָה לָאֶלֶף וְאֶלֶף לָרְבָבָה
  chosen: ten men out of a hundred ... a hundred out of a thousand, and a thousand
    out of ten thousand
  alternatives:
  - ten men for every hundred ...
  - one-tenth from each unit
  lexicon: HALOT
  rationale: The construction expresses proportional selection from the tribes for
    support duty. 'Out of' preserves the numerical pattern clearly in English without
    over-paraphrasing.
- source_word: לְכֹל שִׁבְטֵי יִשְׂרָאֵל
  chosen: from all the tribes of Israel
  alternatives:
  - for all the tribes of Israel
  lexicon: HALOT
  rationale: Given the preceding proportional formula, the sense is selection drawn
    from the whole tribal confederation, not merely selection on behalf of them.
- source_word: לָקַחַת צֵדָה
  chosen: to get provisions
  alternatives:
  - to take supplies
  - to gather food
  lexicon: HALOT
  rationale: צֵדָה denotes provisions/supplies for a journey or campaign. 'Provisions'
    is broad enough to include food and other necessities.
- source_word: לָעָם
  chosen: for the people
  alternatives:
  - for the troops
  - for the army
  lexicon: HALOT
  rationale: The noun is the common term 'people.' In this military setting it refers
    to the assembled fighting force, but 'people' preserves the source wording without
    narrowing it too much.
- source_word: לַעֲשׂוֹת לְבוֹאָם
  chosen: so that when they come
  alternatives:
  - to do when they come
  - for doing at their coming
  lexicon: HALOT
  rationale: The infinitive chain is somewhat compressed. The sense is purpose/result
    tied to the people's arrival at Gibeah. Smooth English requires unpacking the
    syntax.
- source_word: לְגֶבַע בִּנְיָמִן
  chosen: to Gibeah of Benjamin
  alternatives:
  - against Gibeah of Benjamin
  - at Gibeah in Benjamin
  lexicon: HALOT
  rationale: The preposition is directional, but the military/judicial context implies
    hostile action upon arrival. 'To Gibeah of Benjamin' keeps the literal movement
    while allowing the following clause to express the action.
- source_word: כְּכָל הַנְּבָלָה
  chosen: according to all the outrage
  alternatives:
  - according to all the vile deed
  - for all the disgraceful act
  - according to all the folly
  lexicon: HALOT
  rationale: נְבָלָה in this context denotes a shocking, disgraceful outrage, especially
    a morally outrageous act. 'Outrage' communicates the gravity in contemporary English.
- source_word: אֲשֶׁר עָשָׂה בְּיִשְׂרָאֵל
  chosen: that it committed in Israel
  alternatives:
  - that was done in Israel
  - which he did in Israel
  lexicon: HALOT
  rationale: The 3ms verb is syntactically singular though the antecedent may be the
    deed or the city/personified offender. English 'it committed' naturally refers
    back to Gibeah/corporate guilt in context, while preserving the active sense better
    than a passive rendering.
