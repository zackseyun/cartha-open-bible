theological_decisions:
- issue: Rendering morally charged נְבָלָה without importing later doctrinal categories
  chosen_reading: outage
  alternative_readings:
  - vile deed
  - disgraceful act
  - folly
  rationale: The verse condemns the act at Gibeah as a gross moral outrage. 'Outrage'
    preserves the ethical force without adding technical theological terminology not
    present in the Hebrew.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic.'
