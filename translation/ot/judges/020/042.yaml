id: JDG.20.42
reference: Judges 20:42
source:
  edition: WLC
  text: וַ/יִּפְנ֞וּ לִ/פְנֵ֨י אִ֤ישׁ יִשְׂרָאֵל֙ אֶל דֶּ֣רֶךְ הַ/מִּדְבָּ֔ר וְ/הַ/מִּלְחָמָ֖ה
    הִדְבִּיקָ֑תְ/הוּ וַ/אֲשֶׁר֙ מֵ/הֶ֣/עָרִ֔ים מַשְׁחִיתִ֥ים אוֹת֖/וֹ בְּ/תוֹכֽ/וֹ־׃
translation:
  text: So they turned before the men of Israel toward the way of the wilderness,
    but the battle overtook them; and those from the cities were destroying them in
    their midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''before the men of Israel''; the phrase can also be understood
      idiomatically as ''from before the men of Israel,'' that is, retreating from
      them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and the battle caught up with them.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew in the last clause is compressed and difficult. It likely refers
      to Israelite forces coming out from the cities or ambush positions and destroying
      Benjamin from within their formation.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּפְנוּ
  chosen: they turned
  alternatives:
  - they fled
  - they turned away
  lexicon: HALOT
  rationale: The verb פנה fundamentally means 'turn' or 'turn away.' In this battle
    context it implies retreat, but 'turned' preserves the Hebrew image without over-paraphrasing
    to 'fled.'
- source_word: לִפְנֵי אִישׁ יִשְׂרָאֵל
  chosen: before the men of Israel
  alternatives:
  - before the Israelites
  - from before the men of Israel
  lexicon: HALOT
  rationale: Literally 'before the man/men of Israel.' The phrase idiomatically indicates
    movement away from or in the face of Israel's forces. 'The men of Israel' preserves
    the gendered military sense of the Hebrew better than the more generalized 'Israelites.'
- source_word: אֶל דֶּרֶךְ הַמִּדְבָּר
  chosen: toward the way of the wilderness
  alternatives:
  - toward the road to the wilderness
  - toward the wilderness road
  lexicon: HALOT
  rationale: דֶּרֶךְ is 'way/road.' 'Way of the wilderness' is slightly more formal
    but remains natural and keeps the Hebrew construct relation visible.
- source_word: וְהַמִּלְחָמָה הִדְבִּיקָתְהוּ
  chosen: but the battle overtook them
  alternatives:
  - and the battle caught up with them
  - and the fighting pressed hard after them
  lexicon: HALOT
  rationale: The feminine singular subject 'the battle' with דבק in the causative
    conveys pursuit catching up to them. English idiom favors plural object 'them'
    because the referent is the Benjaminite force collectively.
- source_word: וַאֲשֶׁר מֵהֶעָרִים
  chosen: and those from the cities
  alternatives:
  - and those out of the cities
  - and the ones from the cities
  lexicon: HALOT
  rationale: The relative construction is compressed and somewhat difficult. In context
    it refers to Israelite forces emerging from the cities/ambush positions. 'Those
    from the cities' is concise and preserves the Hebrew's elliptical style.
- source_word: מַשְׁחִיתִים
  chosen: were destroying
  alternatives:
  - were striking down
  - were slaughtering
  lexicon: HALOT
  rationale: The participle from שׁחת in this military context denotes destructive
    killing. 'Were destroying' stays close to the lexical sense, though 'striking
    down' is a possible contextual rendering.
- source_word: אוֹתוֹ
  chosen: them
  alternatives:
  - him
  - it
  lexicon: HALOT
  rationale: The Hebrew has singular pronominal object, likely collective for Benjamin/the
    army. English naturally renders the collective referent as plural 'them' to avoid
    misleading singular reference.
- source_word: בְּתוֹכוֹ
  chosen: in their midst
  alternatives:
  - in the midst of them
  - within it
  lexicon: HALOT
  rationale: The singular suffix is again collective. The phrase indicates the attackers
    were cutting them down from within or in the middle of them. 'In their midst'
    communicates the tactical sense clearly while reflecting the collective singular.
