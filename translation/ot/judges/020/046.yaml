id: JDG.20.46
reference: Judges 20:46
source:
  edition: WLC
  text: וַ/יְהִי֩ כָל הַ/נֹּ֨פְלִ֜ים מִ/בִּנְיָמִ֗ן עֶשְׂרִים֩ וַ/חֲמִשָּׁ֨ה אֶ֥לֶף
    אִ֛ישׁ שֹׁ֥לֵֽף חֶ֖רֶב בַּ/יּ֣וֹם הַ/ה֑וּא אֶֽת כָּל אֵ֖לֶּה אַנְשֵׁי חָֽיִל־־־־׃
translation:
  text: So all who fell from Benjamin that day were twenty-five thousand men who drew
    the sword; all these were men of valor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'valiant men' or 'men of valor' for 'mighty men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: So ... were
  alternatives:
  - And ... were
  - Now ... were
  lexicon: HALOT
  rationale: The waw-consecutive on היה introduces a narrative summary. In English,
    an explicit existential 'and it was' is awkward here, so it is carried by 'So
    ... were' to mark continuation and result within the battle report.
- source_word: כָל הַנֹּפְלִים
  chosen: all who fell
  alternatives:
  - all the fallen
  - all those falling
  lexicon: HALOT
  rationale: The participle of נפל with the article functions substantivally for battle
    casualties. 'All who fell' is natural English and preserves the verbal sense of
    those slain in battle.
- source_word: מִבִּנְיָמִן
  chosen: from Benjamin
  alternatives:
  - of Benjamin
  - from the Benjaminites
  lexicon: HALOT
  rationale: The preposition מן is best represented by 'from,' indicating those belonging
    to the tribe of Benjamin. 'Of Benjamin' is possible, but 'from Benjamin' more
    directly reflects the Hebrew preposition.
- source_word: עֶשְׂרִים וַחֲמִשָּׁה אֶלֶף אִישׁ
  chosen: twenty-five thousand men
  alternatives:
  - twenty-five thousand soldiers
  - twenty-five thousand men of war
  lexicon: HALOT
  rationale: This is the straightforward numerical expression. 'Men' preserves איש
    without adding military wording not explicit in this phrase, though the martial
    context is supplied by the following participle and closing description.
- source_word: שֹׁלֵף חֶרֶב
  chosen: who drew the sword
  alternatives:
  - drawing the sword
  - armed with the sword
  lexicon: HALOT
  rationale: The participle plus object is an idiom for armed fighting men. 'Who drew
    the sword' keeps the Hebrew imagery and idiomatic military sense better than a
    flattened 'armed men.'
- source_word: בַּיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Both are accurate; 'that day' is smoother in English while preserving
    the temporal reference.
- source_word: אֵת כָּל אֵלֶּה
  chosen: all these
  alternatives:
  - all of these
  lexicon: HALOT
  rationale: The accusative marker with the demonstrative resumes and emphasizes the
    total just counted. English does not need to represent the marker separately;
    'all these' captures the resumptive emphasis.
- source_word: אַנְשֵׁי חָיִל
  chosen: mighty men
  alternatives:
  - valiant men
  - men of valor
  - warriors
  lexicon: HALOT
  rationale: The phrase commonly denotes capable, valiant fighting men. 'Mighty men'
    is concise and familiar, while still conveying martial strength. 'Men of valor'
    is also strong, but slightly less natural in contemporary English.
