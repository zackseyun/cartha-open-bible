id: JDG.20.9
reference: Judges 20:9
source:
  edition: WLC
  text: וְ/עַתָּ֕ה זֶ֣ה הַ/דָּבָ֔ר אֲשֶׁ֥ר נַעֲשֶׂ֖ה לַ/גִּבְעָ֑ה עָלֶ֖י/הָ בְּ/גוֹרָֽל׃
translation:
  text: 'But now this is what we will do to Gibeah: against it by lot.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'we will act against it by casting lots.' The Hebrew is concise and
      may imply the army's action against Gibeah will be ordered or assigned by lot.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: But now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Introduces the next step in deliberation with a mildly adversative/sequential
    force. 'But now' fits the discourse transition in English while preserving the
    Hebrew temporal marker.
- source_word: זֶה הַדָּבָר אֲשֶׁר
  chosen: this is what
  alternatives:
  - this is the thing that
  - this is the matter that
  lexicon: HALOT
  rationale: Idiomatic rendering of the Hebrew demonstrative + noun + relative construction.
    'This is what' is natural modern English and preserves the sense of introducing
    a specific plan.
- source_word: נַעֲשֶׂה
  chosen: we will do
  alternatives:
  - we shall do
  - let us do
  lexicon: HALOT
  rationale: Qal imperfect 1cp here expresses intended future action rather than a
    cohortative command. 'We will do' best matches the planning context.
- source_word: לַגִּבְעָה
  chosen: to Gibeah
  alternatives:
  - against Gibeah
  - with respect to Gibeah
  lexicon: HALOT
  rationale: The preposition ל marks the object/target of the proposed action. English
    idiom often requires expansion, but retaining 'to Gibeah' here allows the following
    phrase 'against it' to carry the hostile force more explicitly.
- source_word: עָלֶיהָ
  chosen: against it
  alternatives:
  - upon it
  - against her
  lexicon: HALOT
  rationale: Although literally 'upon her/it,' in military context על commonly conveys
    hostile movement against a city. Because Gibeah is a place-name, English 'it'
    is more natural than the grammatically feminine 'her'.
- source_word: בְּגוֹרָל
  chosen: by lot
  alternatives:
  - by casting lots
  - according to the lot
  lexicon: HALOT
  rationale: The phrase indicates determination by lot. 'By lot' is concise and sufficiently
    clear; the fuller idiom 'by casting lots' is preserved as a lexical alternative.
- source_word: עָלֶיהָ בְּגוֹרָל
  chosen: we will go up against it by lot
  alternatives:
  - against it by lot
  - we will attack it according to the lot
  lexicon: HALOT
  rationale: The Hebrew is compressed and elliptical after 'this is what we will do
    to Gibeah.' In context, the sense is not merely abstract action but organized
    military action. 'Go up against' makes explicit the idiomatic hostile sense of
    על while avoiding the more interpretive 'attack.'
