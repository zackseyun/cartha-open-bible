id: JDG.20.47
reference: Judges 20:47
source:
  edition: WLC
  text: וַ/יִּפְנ֞וּ וַ/יָּנֻ֤סוּ הַ/מִּדְבָּ֨רָ/ה֙ אֶל סֶ֣לַע הָֽ/רִמּ֔וֹן שֵׁ֥שׁ
    מֵא֖וֹת אִ֑ישׁ וַ/יֵּֽשְׁבוּ֙ בְּ/סֶ֣לַע רִמּ֔וֹן אַרְבָּעָ֖ה חֳדָשִֽׁים־׃
translation:
  text: But six hundred men turned and fled toward the wilderness, to the rock of
    Rimmon, and stayed at the rock of Rimmon four months.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the wilderness.' The Hebrew directional form can indicate movement
      toward or into the wilderness region.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the rock of Rimmon'; also rendered 'Rimmon Rock.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְנוּ
  chosen: turned
  alternatives:
  - turned back
  - turned aside
  lexicon: HALOT
  rationale: The verb denotes a change of direction. 'Turned' is concise and natural
    in sequence with 'fled,' conveying their reversal from battle toward escape.
- source_word: וַיָּנֻסוּ
  chosen: fled
  alternatives:
  - escaped
  - ran away
  lexicon: HALOT
  rationale: The verb נוּס commonly means 'flee.' 'Fled' preserves the urgency and
    military context better than the looser 'escaped.'
- source_word: הַמִּדְבָּרָה
  chosen: toward the wilderness
  alternatives:
  - into the wilderness
  - to the wilderness
  lexicon: HALOT
  rationale: With the directional ending, the phrase indicates movement toward/into
    the wilderness. 'Toward the wilderness' fits the syntax with the following destination
    phrase and avoids over-specifying whether the rock itself is within the wilderness.
- source_word: אֶל סֶלַע הָרִמּוֹן
  chosen: to the rock of Rimmon
  alternatives:
  - to Rimmon Rock
  - to the crag of Rimmon
  lexicon: HALOT
  rationale: סֶלַע is best rendered 'rock' here as a place-name descriptor. 'The rock
    of Rimmon' preserves the Hebrew construction and keeps the toponym transparent.
- source_word: שֵׁשׁ מֵאוֹת אִישׁ
  chosen: six hundred men
  alternatives:
  - six hundred men of them
  - six hundred persons
  lexicon: HALOT
  rationale: אִישׁ after a number idiomatically counts adult males. 'Men' is gender-accurate
    and contextually appropriate in this military narrative.
- source_word: וַיֵּשְׁבוּ
  chosen: stayed
  alternatives:
  - remained
  - dwelt
  - lived
  lexicon: HALOT
  rationale: ישׁב can mean sit, dwell, remain. In this temporary refuge context, 'stayed'
    communicates continued residence for a limited period without implying permanent
    settlement.
- source_word: בְּסֶלַע רִמּוֹן
  chosen: at the rock of Rimmon
  alternatives:
  - in the rock of Rimmon
  - at Rimmon Rock
  lexicon: HALOT
  rationale: The preposition ב can be rendered flexibly. 'At' is the most natural
    English for taking refuge at a named rocky stronghold, while still allowing the
    sense of being located there.
- source_word: אַרְבָּעָה חֳדָשִׁים
  chosen: four months
  lexicon: HALOT
  rationale: A straightforward temporal expression indicating the duration of their
    stay.
- source_word: וַ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: Hebrew waw-consecutive usage
  rationale: Although the verse begins with simple narrative waw, 'But' appropriately
    signals contrast with the preceding destruction of Benjamin's forces, highlighting
    the exception of these survivors.
