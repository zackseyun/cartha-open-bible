id: JDG.20.2
reference: Judges 20:2
source:
  edition: WLC
  text: וַ/יִּֽתְיַצְּב֞וּ פִּנּ֣וֹת כָּל הָ/עָ֗ם כֹּ֚ל שִׁבְטֵ֣י יִשְׂרָאֵ֔ל בִּ/קְהַ֖ל
    עַ֣ם הָ/אֱלֹהִ֑ים אַרְבַּ֨ע מֵא֥וֹת אֶ֛לֶף אִ֥ישׁ רַגְלִ֖י שֹׁ֥לֵֽף חָֽרֶב־׃פ
translation:
  text: And the chiefs of all the people, of all the tribes of Israel, took their
    stand in the assembly of the people of God—four hundred thousand foot soldiers
    drawing the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally 'the corners of all the people,' an idiom for the chiefs
      or leading men.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְיַצְּבוּ
  chosen: took their stand
  alternatives:
  - presented themselves
  - stationed themselves
  - stood
  lexicon: HALOT
  rationale: The hitpael of יצב conveys taking a position or standing in readiness.
    'Took their stand' preserves both the formal posture and the military/forensic
    sense in context better than the flatter 'stood'.
- source_word: פִּנּוֹת
  chosen: chiefs
  alternatives:
  - corners
  - leaders
  - chief men
  lexicon: HALOT
  rationale: Literally 'corners,' but in this idiom it refers metaphorically to the
    prominent men or leaders, as the 'corner' supports the structure. 'Chiefs' is
    concise and idiomatic in English while preserving the leadership sense.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - the whole people
  lexicon: HALOT
  rationale: A straightforward rendering of the collective phrase; retained to reflect
    the comprehensiveness of the gathering.
- source_word: כֹּל שִׁבְטֵי יִשְׂרָאֵל
  chosen: all the tribes of Israel
  lexicon: HALOT
  rationale: Formal and natural rendering of the tribal designation, preserving the
    appositional clarification of who 'all the people' are.
- source_word: בִּקְהַל
  chosen: in the assembly
  alternatives:
  - in the gathered assembly
  - in the congregation
  lexicon: HALOT
  rationale: קהל denotes an assembled gathering. 'Assembly' is modern and readable;
    'congregation' can sound ecclesiastical in a way not required by the context.
- source_word: עַם הָאֱלֹהִים
  chosen: the people of God
  alternatives:
  - God's people
  lexicon: HALOT
  rationale: This construct phrase is rendered transparently and preserves the covenantal/theological
    designation without overinterpreting it.
- source_word: אַרְבַּע מֵאוֹת אֶלֶף
  chosen: four hundred thousand
  lexicon: HALOT
  rationale: Direct rendering of the numeral.
- source_word: אִישׁ רַגְלִי
  chosen: foot soldiers
  alternatives:
  - men on foot
  - infantry
  lexicon: HALOT
  rationale: Literally 'man of foot/on foot.' 'Foot soldiers' is a natural military
    equivalent that preserves the distinction from mounted troops without sounding
    overly technical like 'infantry.'
- source_word: שֹׁלֵף חָרֶב
  chosen: each drawing a sword
  alternatives:
  - drawing the sword
  - armed with a sword
  - wielding a sword
  lexicon: HALOT
  rationale: The singular participle after a large number is distributive in sense.
    'Each drawing a sword' makes that distributive force clear in idiomatic English
    and preserves the vivid martial image.
