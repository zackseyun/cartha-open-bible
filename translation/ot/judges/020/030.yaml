id: JDG.20.30
reference: Judges 20:30
source:
  edition: WLC
  text: וַ/יַּעֲל֧וּ בְנֵֽי יִשְׂרָאֵ֛ל אֶל בְּנֵ֥י בִנְיָמִ֖ן בַּ/יּ֣וֹם הַ/שְּׁלִישִׁ֑י וַ/יַּעַרְכ֥וּ אֶל הַ/גִּבְעָ֖ה כְּ/פַ֥עַם בְּ/פָֽעַם־־־׃
translation:
  text: Then the sons of Israel went up against the sons of Benjamin on the third day[a], and they drew up against Gibeah as before.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites ... the Benjaminites.' The Hebrew more literally reads 'the sons of Israel' and 'the sons of Benjamin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלוּ
  chosen: went up
  alternatives:
  - came up
  - advanced
  lexicon: HALOT
  rationale: עלה commonly means 'go up.' In battle narrative it can imply military advance, but 'went up' preserves the Hebrew idiom without overinterpreting.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: A more formal rendering preserves the repeated kinship expression used on both sides of the conflict. 'Israelites' is possible, but 'sons of Israel' better reflects the source wording and parallelism with 'sons of Benjamin.'
- source_word: אֶל בְּנֵי בִנְיָמִן
  chosen: against the sons of Benjamin
  alternatives:
  - to the sons of Benjamin
  - toward the sons of Benjamin
  lexicon: HALOT
  rationale: Although אֶל is basically 'to/toward,' in this military context English idiom requires 'against' to convey hostile movement in battle.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  chosen: on the third day
  alternatives:
  - the third day
  lexicon: HALOT
  rationale: Standard temporal rendering of the prepositional phrase.
- source_word: וַיַּעַרְכוּ
  chosen: they drew up
  alternatives:
  - they arranged themselves
  - they deployed
  - they set themselves in battle array
  lexicon: HALOT
  rationale: ערך in military contexts refers to arranging troops for battle. 'Drew up' is natural modern English and retains the military sense without archaic phrasing.
- source_word: אֶל הַגִּבְעָה
  chosen: against Gibeah
  alternatives:
  - toward Gibeah
  - at Gibeah
  lexicon: HALOT
  rationale: With the military verb, the preposition marks positioning for engagement relative to the city. 'Against Gibeah' communicates the battle stance more clearly than a purely spatial gloss.
- source_word: כְּפַעַם בְּפָעַם
  chosen: as before
  alternatives:
  - as time by time
  - as on previous occasions
  - as at other times
  lexicon: HALOT
  rationale: This idiom means 'as previously' or 'as before.' 'As before' is concise and idiomatic in English.
