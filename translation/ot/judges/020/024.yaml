id: JDG.20.24
reference: Judges 20:24
source:
  edition: WLC
  text: וַ/יִּקְרְב֧וּ בְנֵֽי יִשְׂרָאֵ֛ל אֶל בְּנֵ֥י בִנְיָמִ֖ן בַּ/יּ֥וֹם הַ/שֵּׁנִֽי־־׃
translation:
  text: And the sons of Israel came near to the sons of Benjamin on the second day[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'approached' or, in military context, 'advanced against.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Israel' and 'the sons of Benjamin'; also renderable as 'the Israelites' and 'the Benjaminites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְבוּ
  chosen: came near
  alternatives:
  - approached
  - advanced against
  lexicon: HALOT
  rationale: The verb קרב in the qal can mean to come near or approach. In this battle context, 'advanced against' is possible, but the Hebrew itself states simple movement toward rather than explicitly attacking. 'Came near' preserves the source wording while remaining natural English.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Following the gender-accurate principle, the familial expression is retained rather than flattened to 'Israelites,' though that is a natural alternative. Here it denotes the Israelite tribal forces collectively.
- source_word: אֶל
  chosen: to
  alternatives:
  - against
  lexicon: HALOT
  rationale: The preposition normally means 'to' or 'toward.' Because the context is military, English may imply hostility without needing to translate the preposition as 'against.' This avoids importing more than the Hebrew explicitly says.
- source_word: בְנֵי בִנְיָמִן
  chosen: the sons of Benjamin
  alternatives:
  - the Benjaminites
  - the people of Benjamin
  lexicon: HALOT
  rationale: Literally 'sons of Benjamin.' Retaining the familial tribal designation mirrors the Hebrew and keeps parallelism with 'the sons of Israel.' 'Benjaminites' is idiomatic but less formally aligned with the source.
- source_word: בַּיּוֹם הַשֵּׁנִי
  chosen: on the second day
  alternatives:
  - the next day
  lexicon: HALOT
  rationale: The phrase is literally 'on the second day.' Although 'the next day' could fit the narrative flow, the Hebrew specifies ordinal numbering, so the more direct rendering is preferred.
