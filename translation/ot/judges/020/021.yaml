id: JDG.20.21
reference: Judges 20:21
source:
  edition: WLC
  text: וַ/יֵּצְא֥וּ בְנֵֽי בִנְיָמִ֖ן מִן הַ/גִּבְעָ֑ה וַ/יַּשְׁחִ֨יתוּ בְ/יִשְׂרָאֵ֜ל
    בַּ/יּ֣וֹם הַ/ה֗וּא שְׁנַ֨יִם וְ/עֶשְׂרִ֥ים אֶ֛לֶף אִ֖ישׁ אָֽרְצָ/ה־־׃
translation:
  text: Then the sons of Benjamin came out from Gibeah and struck down twenty-two
    thousand men of Israel that day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went out from Gibeah and killed twenty-two thousand men of Israel that
      day.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצְאוּ
  chosen: came out
  alternatives:
  - went out
  lexicon: HALOT
  rationale: The wayyiqtol of יצא narrates the next action in sequence. 'Came out'
    fits the military context of sallying out from the city, while remaining natural
    English.
- source_word: בְנֵי בִנְיָמִן
  chosen: the sons of Benjamin
  alternatives:
  - the Benjaminites
  - the people of Benjamin
  lexicon: HALOT
  rationale: A more formal rendering preserves the Hebrew kinship expression and tribal
    identity. 'Benjaminites' is possible, but 'sons of Benjamin' keeps the source
    texture without obscuring meaning.
- source_word: מִן הַגִּבְעָה
  chosen: from Gibeah
  alternatives:
  - out of Gibeah
  lexicon: HALOT
  rationale: The preposition marks origin from the city named Gibeah. 'From Gibeah'
    is concise and idiomatic.
- source_word: וַיַּשְׁחִיתוּ
  chosen: struck down
  alternatives:
  - destroyed
  - killed
  lexicon: HALOT
  rationale: The Hiphil of שׁחת can mean 'ruin/destroy,' but in this battle context
    with a direct casualty count it refers to lethal defeat. 'Struck down' conveys
    military killing without sounding either too wooden ('destroyed') or too flat
    ('killed').
- source_word: בְיִשְׂרָאֵל
  chosen: of Israel
  alternatives:
  - among Israel
  - against Israel
  lexicon: HALOT
  rationale: The preposition ב here functions with hostile impact upon Israel in battle.
    In English, 'men of Israel' best expresses the object of the casualties. 'Against
    Israel' would fit the verb but not the following counted noun as smoothly.
- source_word: בַּיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Both are accurate; 'that day' is slightly more natural in running English
    while preserving the temporal marker.
- source_word: שְׁנַיִם וְעֶשְׂרִים אֶלֶף
  chosen: twenty-two thousand
  alternatives:
  - two and twenty thousand
  lexicon: HALOT
  rationale: This is the standard English rendering of the Hebrew number.
- source_word: אִישׁ
  chosen: men
  alternatives:
  - man
  - soldiers
  lexicon: HALOT
  rationale: Although singular in Hebrew after the number, English idiom requires
    the plural. 'Men' is gender-accurate and contextually appropriate for combatants;
    'soldiers' would add specificity not explicit in the text.
- source_word: אָרְצָה
  chosen: to the ground
  alternatives:
  - earthward
  - to the earth
  lexicon: HALOT
  rationale: The directional form of 'earth/land' here idiomatically means falling
    dead to the ground. 'To the ground' is clear modern English and preserves the
    image.
