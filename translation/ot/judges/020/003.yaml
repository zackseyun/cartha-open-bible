id: JDG.20.3
reference: Judges 20:3
source:
  edition: WLC
  text: וַֽ/יִּשְׁמְעוּ֙ בְּנֵ֣י בִנְיָמִ֔ן כִּֽי עָל֥וּ בְנֵֽי יִשְׂרָאֵ֖ל הַ/מִּצְפָּ֑ה
    וַ/יֹּֽאמְרוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל דַּבְּר֕וּ אֵיכָ֥ה נִהְיְתָ֖ה הָ/רָעָ֥ה הַ/זֹּֽאת־־׃
translation:
  text: Now the sons of Benjamin heard that the sons of Israel had gone up to Mizpah.
    And the sons of Israel said, “Tell us, how did this evil happen?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Benjaminites” and “the Israelites.” The Hebrew repeatedly says “the
      sons of Benjamin” and “the sons of Israel.”
    reason: lexical_alternative
  - marker: b
    text: “This evil” could also be rendered “this wickedness” or “this wrong.” The
      Hebrew term carries strong moral force.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ
  chosen: heard
  alternatives:
  - learned
  - got word
  lexicon: HALOT
  rationale: The verb שׁמע in this narrative context most naturally means receiving
    news or hearing report. 'Heard' is the plain, idiomatic English equivalent and
    preserves the narrative flow.
- source_word: בְּנֵי בִנְיָמִן
  chosen: the sons of Benjamin
  alternatives:
  - the Benjaminites
  - the people of Benjamin
  lexicon: HALOT
  rationale: A literal rendering preserves the Hebrew construction and tribal identity.
    'Benjaminites' is possible, but 'sons of Benjamin' better matches the repeated
    phrasing in the verse and keeps the formal parallel with 'sons of Israel.'
- source_word: כִּי עָלוּ
  chosen: that ... had gone up
  alternatives:
  - that ... had come up
  - that ... had assembled
  lexicon: HALOT
  rationale: עלה commonly means 'go up,' often for travel to a gathering place. The
    pluperfect 'had gone up' fits the sequence after 'heard that.' 'Assembled' is
    interpretive and less directly tied to the verb.
- source_word: הַמִּצְפָּה
  chosen: to Mizpah
  alternatives:
  - to the Mizpah
  - to Mizpeh
  lexicon: HALOT
  rationale: This is the place name Mizpah. English idiom omits the Hebrew article
    in transliterated place names. 'Mizpah' is the standard transliteration.
- source_word: וַיֹּאמְרוּ
  chosen: said
  alternatives:
  - asked
  - spoke
  lexicon: HALOT
  rationale: Although the following imperative gives the sense of a request, the base
    verb is simply 'said.' Rendering it as 'asked' would slightly over-interpret the
    speech act.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: The literal phrase is retained for consistency with the repeated Hebrew
    expression and to preserve the formal balance with 'sons of Benjamin.'
- source_word: דַּבְּרוּ
  chosen: Tell us
  alternatives:
  - Speak
  - Report
  lexicon: HALOT
  rationale: The imperative 'speak' here introduces a demand for an account. 'Tell
    us' is natural English and captures the implied object without excessive paraphrase.
- source_word: אֵיכָה
  chosen: how
  alternatives:
  - how indeed
  - in what way
  lexicon: HALOT
  rationale: The interrogative asks for the manner in which the event came about.
    'How' is the most direct and idiomatic rendering.
- source_word: נִהְיְתָה
  chosen: did ... happen
  alternatives:
  - came to pass
  - came about
  - was
  lexicon: HALOT
  rationale: With היה in this construction, English idiom prefers an eventive expression
    such as 'happen' or 'come about.' 'Did ... happen' reads naturally with the interrogative.
- source_word: הָרָעָה הַזֹּאת
  chosen: this evil
  alternatives:
  - this wickedness
  - this disaster
  - this wrong
  lexicon: HALOT
  rationale: רָעָה can denote evil, wickedness, or calamity depending on context.
    Here the context is the outrage at Gibeah, involving moral depravity, so 'evil'
    best preserves the ethical force without narrowing it to either abstract wickedness
    or mere disaster.
