id: JDG.20.16
reference: Judges 20:16
source:
  edition: WLC
  text: מִ/כֹּ֣ל הָ/עָ֣ם הַ/זֶּ֗ה שְׁבַ֤ע מֵאוֹת֙ אִ֣ישׁ בָּח֔וּר אִטֵּ֖ר יַד יְמִינ֑/וֹ
    כָּל זֶ֗ה קֹלֵ֧עַ בָּ/אֶ֛בֶן אֶל הַֽ/שַּׂעֲרָ֖ה וְ/לֹ֥א יַחֲטִֽא׀־־־׃פ
translation:
  text: From all this people, seven hundred chosen men were restricted in their right
    hand; every one of these could sling a stone at a hair and not miss.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were left-handed.' The Hebrew more literally says they were restricted
      or impeded in the right hand, which likely implies left-handed fighting.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכֹּל הָעָם הַזֶּה
  chosen: From all this people
  alternatives:
  - From all these troops
  - Out of all these people
  lexicon: HALOT
  rationale: 'The phrase is partitive: ''from/out of all this people.'' Although עָם
    can refer to fighting men in context, ''people'' preserves the Hebrew wording
    without over-specifying ''troops.'''
- source_word: שְׁבַע מֵאוֹת אִישׁ
  chosen: seven hundred ... men
  alternatives:
  - seven hundred men
  - seven hundred warriors
  lexicon: HALOT
  rationale: אִישׁ here functions as a counting noun for adult males. 'Men' is the
    most direct rendering; 'warriors' would add an interpretive nuance already implied
    by context.
- source_word: בָּחוּר
  chosen: chosen
  alternatives:
  - select
  - picked
  lexicon: HALOT
  rationale: The passive participial/adjectival sense indicates men selected or choice
    men. 'Chosen' is concise and natural in English.
- source_word: אִטֵּר יַד יְמִינוֹ
  chosen: were restricted in their right hand
  alternatives:
  - were left-handed
  - were impeded in the right hand
  - were bound in the right hand
  lexicon: HALOT
  rationale: The Hebrew literally describes impairment/restriction of the right hand,
    not directly the positive statement 'left-handed.' In this military context it
    implies left-handed use, but the more text-near rendering preserves the idiom's
    form while allowing the implication to stand.
- source_word: כָּל זֶה
  chosen: every one of these
  alternatives:
  - all these
  - every one
  lexicon: HALOT
  rationale: The distributive sense is best captured by 'every one of these,' emphasizing
    each man's skill individually.
- source_word: קֹלֵעַ בָּאֶבֶן
  chosen: could sling a stone
  alternatives:
  - was slinging a stone
  - could throw a stone with a sling
  lexicon: HALOT
  rationale: The participle describes characteristic ability. English idiom prefers
    'could sling a stone' for this military skill.
- source_word: אֶל הַשַּׂעֲרָה
  chosen: at a hair
  alternatives:
  - at the hair
  - at a hair's breadth
  lexicon: HALOT
  rationale: The singular noun means 'the hair/a hair.' In English, 'at a hair' conveys
    the image of extreme precision without expanding to the idiomatic but less literal
    'hair's breadth.'
- source_word: וְלֹא יַחֲטִא
  chosen: and not miss
  alternatives:
  - and not fail
  - and not sin
  lexicon: HALOT
  rationale: חטא in this context carries the concrete sense 'miss (the mark),' not
    the moral sense 'sin.' 'Not miss' is the natural English equivalent and preserves
    the image.
