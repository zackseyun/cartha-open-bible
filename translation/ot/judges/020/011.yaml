id: JDG.20.11
reference: Judges 20:11
source:
  edition: WLC
  text: וַ/יֵּֽאָסֵ֞ף כָּל אִ֤ישׁ יִשְׂרָאֵל֙ אֶל הָ/עִ֔יר כְּ/אִ֥ישׁ אֶחָ֖ד חֲבֵרִֽים־־׃פ
translation:
  text: So all the men of Israel gathered to the city[a], united as one man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''as one man, joined together''—an idiom emphasizing complete unity in action.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּאָסֵף
  chosen: gathered
  alternatives:
  - assembled
  - was gathered together
  lexicon: HALOT
  rationale: 'The Niphal wayyiqtol of אסף here has a collective sense: the people came together/assembled. ''Gathered'' is natural modern English and preserves the basic image without over-paraphrasing. Because the subject is collective (''all the men of Israel''), active English is preferable to a wooden passive (''was gathered'').'
- source_word: כָּל אִישׁ יִשְׂרָאֵל
  chosen: all the men of Israel
  alternatives:
  - every man of Israel
  - all Israelite men
  lexicon: HALOT
  rationale: אִישׁ is singular in form but distributive/collective with כָּל, referring to the male fighting population. Per the gender-accurate principle, 'men' is preferable to a gender-neutral rendering because the military muster context is specifically male.
- source_word: אֶל הָעִיר
  chosen: against the city
  alternatives:
  - to the city
  - at the city
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to,' in this military context the sense is hostile movement directed toward Gibeah. English 'against the city' best conveys the contextual force and matches the narrative situation better than a merely locative 'to the city.'
- source_word: כְּאִישׁ אֶחָד
  chosen: as one man
  alternatives:
  - like one man
  - as a single man
  lexicon: HALOT
  rationale: This is a common idiom for unified action. 'As one man' is the most idiomatic and recognizable English equivalent, preserving the masculine imagery present in the Hebrew.
- source_word: חֲבֵרִים
  chosen: united
  alternatives:
  - joined together
  - allies
  - companions
  lexicon: HALOT
  rationale: 'The plural adjective/noun from חבר adds the idea of being joined together or in solidarity. Rendering it as ''united'' brings out its adverbial force in context: they gathered in cohesion. ''Companions'' would sound too nominal and awkward in English here.'
