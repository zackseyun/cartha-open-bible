id: JDG.20.8
reference: Judges 20:8
source:
  edition: WLC
  text: וַ/יָּ֨קָם֙ כָּל הָ/עָ֔ם כְּ/אִ֥ישׁ אֶחָ֖ד לֵ/אמֹ֑ר לֹ֤א נֵלֵךְ֙ אִ֣ישׁ לְ/אָהֳל֔/וֹ
    וְ/לֹ֥א נָס֖וּר אִ֥ישׁ לְ/בֵיתֽ/וֹ־׃
translation:
  text: Then all the people rose up as one man, saying, “Not one of us will go to
    his tent, and not one of us will turn aside to his house.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'as one man,' an idiom for unified action.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: rose up
  alternatives:
  - arose
  - stood up
  lexicon: HALOT
  rationale: The verb קום in the wayyiqtol form narrates a collective action beginning
    the response. 'Rose up' preserves the concrete movement and the sense of unified
    resolve better than the flatter 'stood up.'
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the army
  - all the populace
  lexicon: HALOT
  rationale: עָם here refers to the assembled Israelite body. 'All the people' is
    the most natural and sufficiently broad rendering in context.
- source_word: כְּאִישׁ אֶחָד
  chosen: as one man
  alternatives:
  - as one person
  - with one accord
  lexicon: HALOT
  rationale: This idiom emphasizes unified action. 'As one man' is the closest idiomatic
    equivalent and preserves the masculine singular imagery present in the Hebrew.
    A more interpretive option like 'with one accord' would lose the concrete metaphor.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - to say
  lexicon: HALOT
  rationale: Standard rendering introducing direct speech. 'Saying' fits the narrative
    flow after the collective rising.
- source_word: לֹא נֵלֵךְ אִישׁ לְאָהֳלוֹ
  chosen: Not one of us will go to his tent
  alternatives:
  - No man will go to his tent
  - None will go to his tent
  lexicon: HALOT
  rationale: The Hebrew literally has 'we will not go, a man to his tent.' English
    requires smoothing. 'Not one of us will go to his tent' preserves both the distributive
    force of אִישׁ and the first-person plural resolve of נֵלֵךְ.
- source_word: אָהֶל
  chosen: tent
  alternatives:
  - camp
  - dwelling
  lexicon: HALOT
  rationale: The ordinary sense is 'tent.' Even if some Israelites may have had more
    permanent homes, the Hebrew wording should be preserved rather than updated to
    a generalized 'home' here, especially since the next clause uses 'house.'
- source_word: וְלֹא נָסוּר אִישׁ לְבֵיתוֹ
  chosen: and not one of us will turn aside to his house
  alternatives:
  - and none of us will depart to his house
  - and no man will return to his house
  lexicon: HALOT
  rationale: סור commonly means 'turn aside' or 'deviate.' 'Turn aside' best captures
    the idea that they will not break off from the common cause to go home. 'Return'
    is possible contextually but is less directly tied to the lexical sense.
- source_word: בַּיִת
  chosen: house
  alternatives:
  - home
  lexicon: HALOT
  rationale: The Hebrew specifically says 'house.' Retaining 'house' also preserves
    the distinction from the previous 'tent,' which may be rhetorically intentional.
