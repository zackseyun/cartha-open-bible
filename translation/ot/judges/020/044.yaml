id: JDG.20.44
reference: Judges 20:44
source:
  edition: WLC
  text: וַֽ/יִּפְּלוּ֙ מִ/בִּנְיָמִ֔ן שְׁמֹנָֽה עָשָׂ֥ר אֶ֖לֶף אִ֑ישׁ אֶת כָּל אֵ֖לֶּה
    אַנְשֵׁי חָֽיִל־־־־׃
translation:
  text: And eighteen thousand men from Benjamin fell, all these being valiant warriors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'all these were men of valor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְּלוּ
  chosen: fell
  alternatives:
  - were struck down
  - died
  lexicon: HALOT
  rationale: The verb נפל literally means 'fell.' In battle contexts it commonly denotes
    falling in death. 'Fell' preserves the Hebrew idiom and military tone without
    over-paraphrasing.
- source_word: מִבִּנְיָמִן
  chosen: from Benjamin
  alternatives:
  - of Benjamin
  - among Benjamin
  lexicon: HALOT
  rationale: 'The preposition מִן marks source or membership here: those who fell
    were from the tribe of Benjamin. ''From Benjamin'' is natural English and preserves
    the tribal identification.'
- source_word: שְׁמֹנָה עָשָׂר אֶלֶף אִישׁ
  chosen: eighteen thousand men
  alternatives:
  - eighteen thousand
  - eighteen thousand soldiers
  lexicon: HALOT
  rationale: The Hebrew explicitly includes אִישׁ after the number, so 'men' should
    be represented. 'Soldiers' is interpretive; 'men' is closer while still fitting
    the military context.
- source_word: אֶת כָּל אֵלֶּה
  chosen: all these
  alternatives:
  - all of these
  - all these men
  lexicon: HALOT
  rationale: This construction appositionally sums up the fallen group. 'All these'
    is a straightforward rendering that avoids adding words not present in the Hebrew.
- source_word: אַנְשֵׁי חָיִל
  chosen: valiant warriors
  alternatives:
  - mighty men
  - men of valor
  - able men
  lexicon: HALOT
  rationale: The phrase denotes capable, valiant fighting men in a military context.
    'Valiant warriors' communicates both courage and martial function in clear modern
    English. 'Men of valor' is more traditional but less natural; 'mighty men' can
    sound archaic or overly specialized.
