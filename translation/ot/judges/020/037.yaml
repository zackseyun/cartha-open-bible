id: JDG.20.37
reference: Judges 20:37
source:
  edition: WLC
  text: וְ/הָ/אֹרֵ֣ב הֵחִ֔ישׁוּ וַֽ/יִּפְשְׁט֖וּ אֶל הַ/גִּבְעָ֑ה וַ/יִּמְשֹׁךְ֙ הָ/אֹרֵ֔ב
    וַ/יַּ֥ךְ אֶת כָּל הָ/עִ֖יר לְ/פִי חָֽרֶב־־־־׃
translation:
  text: Then the men in ambush quickly rushed against Gibeah. The ambush advanced
    and struck the whole city with the edge of the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the ambush drew out'; the verb may suggest that the ambushing
      force extended itself forward or pressed on into the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹרֵב
  chosen: the men in ambush
  alternatives:
  - the ambush
  - the ambushers
  - the liers-in-wait
  lexicon: HALOT
  rationale: Although the form is singular in appearance, in context it refers collectively
    to the ambushing force. Rendering it as 'the men in ambush' makes the collective
    personal sense clear in natural English while preserving the military setting.
- source_word: הֵחִישׁוּ
  chosen: quickly rushed
  alternatives:
  - hurried
  - made haste
  lexicon: HALOT
  rationale: The verb conveys acting with haste. 'Quickly rushed' captures both urgency
    and the sudden military movement in context.
- source_word: וַיִּפְשְׁטוּ אֶל
  chosen: rushed against
  alternatives:
  - deployed against
  - spread out toward
  - advanced to
  lexicon: HALOT
  rationale: The verb can mean to strip off, spread out, or make a raid/sally. In
    this battle narrative with אֶל plus the city, it most naturally describes a rapid
    assault movement toward/against Gibeah.
- source_word: הַגִּבְעָה
  chosen: Gibeah
  rationale: Proper place name, transliterated according to the translation philosophy.
- source_word: וַיִּמְשֹׁךְ
  chosen: advanced
  alternatives:
  - drew out
  - prolonged the attack
  - extended itself
  lexicon: HALOT
  rationale: The verb literally means 'drew/pulled,' but here likely describes the
    ambush force moving forward in extended action into the city. 'Advanced' gives
    the probable military sense in clear English. Because the Hebrew is somewhat compressed,
    a more literal alternative is preserved in a footnote.
- source_word: וַיַּךְ
  chosen: struck
  alternatives:
  - smote
  - killed
  lexicon: HALOT
  rationale: A common verb for striking/defeating. 'Struck' is broad enough to fit
    the following phrase 'with the edge of the sword,' which specifies the lethal
    manner.
- source_word: כָּל הָעִיר
  chosen: the whole city
  alternatives:
  - all the city
  - everyone in the city
  lexicon: HALOT
  rationale: Formally this is 'all the city.' In context of being struck by the sword,
    it refers to the city in its inhabitants and totality. 'The whole city' preserves
    the idiom without over-interpreting to inhabitants only.
- source_word: לְפִי חָרֶב
  chosen: with the edge of the sword
  alternatives:
  - by the sword
  - to the mouth of the sword
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom literally 'to the mouth of the sword.'
    The established English equivalent 'with the edge of the sword' preserves the
    imagery and meaning in readable form.
