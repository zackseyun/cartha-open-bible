id: JDG.20.45
reference: Judges 20:45
source:
  edition: WLC
  text: וַ/יִּפְנ֞וּ וַ/יָּנֻ֤סוּ הַ/מִּדְבָּ֨רָ/ה֙ אֶל סֶ֣לַע הָֽ/רִמּ֔וֹן וַ/יְעֹֽלְלֻ֨/הוּ֙ בַּֽ/מְסִלּ֔וֹת חֲמֵ֥שֶׁת אֲלָפִ֖ים אִ֑ישׁ וַ/יַּדְבִּ֤יקוּ אַחֲרָי/ו֙ עַד גִּדְעֹ֔ם וַ/יַּכּ֥וּ מִמֶּ֖/נּוּ אַלְפַּ֥יִם אִֽישׁ־־׃
translation:
  text: Then they turned and fled toward the wilderness[a], to the rock of Rimmon. And they cut down five thousand men of them on the highways, and pursued them as far as Gidom[b], and struck down two thousand men of them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'they gleaned him'—an idiom here for cutting down or picking off the fleeing survivors.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew uses singular suffixes in places ('after him,' 'from him') for a collective referent, referring to the fleeing Benjaminites as a group.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְנוּ
  chosen: they turned
  alternatives:
  - they turned back
  lexicon: HALOT
  rationale: The verb פנה in the wayyiqtol sequence marks a change of direction in flight. 'Turned' is the most natural concise English rendering here; 'turned back' would over-specify reversal rather than simply turning away.
- source_word: וַיָּנֻסוּ
  chosen: fled
  alternatives:
  - took flight
  - escaped
  lexicon: HALOT
  rationale: נוס commonly means 'flee.' 'Fled' preserves the military-flight sense without paraphrase.
- source_word: הַמִּדְבָּרָה
  chosen: toward the wilderness
  alternatives:
  - into the wilderness
  - to the wilderness
  lexicon: HALOT
  rationale: The directional ending indicates motion toward the wilderness region. 'Toward the wilderness' reflects the directional nuance while remaining idiomatic.
- source_word: אֶל סֶלַע הָרִמּוֹן
  chosen: to the rock of Rimmon
  alternatives:
  - to Rimmon Rock
  lexicon: HALOT
  rationale: סֶלַע is 'rock' or 'crag'; with the proper name it is best rendered transparently as 'the rock of Rimmon.' This preserves the place-name sense while translating the common noun and transliterating the name.
- source_word: וַיְעֹלְלֻהוּ
  chosen: they cut down
  alternatives:
  - they gleaned
  - they picked off
  - they massacred
  lexicon: HALOT
  rationale: The verb עלל in this context is idiomatic for dealing ruthlessly with survivors, likely with the image of 'gleaning' remaining men. 'Cut down' communicates the military sense in readable English without importing a metaphor that may confuse modern readers. The more literal 'gleaned' is worth preserving in a footnote.
- source_word: בַּמְסִלּוֹת
  chosen: on the highways
  alternatives:
  - on the roads
  - along the highways
  lexicon: HALOT
  rationale: מְסִלּוֹת refers to raised roads or highways. 'Highways' best captures the established route sense in this pursuit narrative.
- source_word: חֲמֵשֶׁת אֲלָפִים אִישׁ
  chosen: five thousand men
  alternatives:
  - five thousand soldiers
  lexicon: HALOT
  rationale: The Hebrew is literally 'five thousand man/men.' 'Men' is gender-accurate and standard in military census language; 'soldiers' would be interpretive.
- source_word: וַיַּדְבִּיקוּ אַחֲרָיו
  chosen: pursued them hard
  alternatives:
  - overtook them
  - pressed after him
  lexicon: HALOT
  rationale: The Hiphil of דבק here conveys catching up closely in pursuit. Because the suffix is singular after a collective referent, idiomatic English uses plural 'them.' 'Pursued them hard' captures the force of relentless pursuit better than the more static 'followed closely.'
- source_word: עַד גִּדְעֹם
  chosen: as far as Gidom
  alternatives:
  - up to Gidom
  lexicon: HALOT
  rationale: עַד with a place name marks the limit of pursuit. 'As far as Gidom' is idiomatic and precise. The place name is transliterated.
- source_word: וַיַּכּוּ מִמֶּנּוּ
  chosen: struck down two thousand men of them
  alternatives:
  - struck down two thousand more men
  - killed two thousand men from among them
  lexicon: HALOT
  rationale: נכה is commonly 'strike down' in battle contexts. The phrase מִמֶּנּוּ is singular with a collective sense ('from him/it' = from among them, i.e., Benjamin's force). 'Of them' preserves the partitive sense without awkward literalism. 'More' is implied by context but not explicit, so it is not placed in the main text.
