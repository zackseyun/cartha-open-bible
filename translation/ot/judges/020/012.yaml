id: JDG.20.12
reference: Judges 20:12
source:
  edition: WLC
  text: וַֽ/יִּשְׁלְח֞וּ שִׁבְטֵ֤י יִשְׂרָאֵל֙ אֲנָשִׁ֔ים בְּ/כָל שִׁבְטֵ֥י בִנְיָמִ֖ן לֵ/אמֹ֑ר מָ֚ה הָ/רָעָ֣ה הַ/זֹּ֔את אֲשֶׁ֥ר נִהְיְתָ֖ה בָּ/כֶֽם־׃
translation:
  text: So the tribes of Israel sent men through all the tribes of Benjamin[a], saying[b], “What is this evil that has happened among you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to all the tribes of Benjamin.” The Hebrew preposition can be understood distributively.
    reason: lexical_alternative
  - marker: b
    text: Or “this wickedness” or “this wrong.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלְחוּ
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: The waw-consecutive verb from שלח straightforwardly denotes sending. 'Sent' is the most natural modern English rendering.
- source_word: שִׁבְטֵי יִשְׂרָאֵל
  chosen: the tribes of Israel
  alternatives:
  - Israel's tribes
  lexicon: HALOT
  rationale: The construct phrase is best rendered directly. The plural subject refers to the tribal bodies collectively.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - representatives
  - messengers
  lexicon: HALOT
  rationale: The Hebrew literally says 'men.' While these men function as envoys, the text does not explicitly call them messengers, so the more literal 'men' is retained.
- source_word: בְּכָל שִׁבְטֵי בִנְיָמִן
  chosen: through all the tribes of Benjamin
  alternatives:
  - to all the tribes of Benjamin
  - throughout all the tribe-clans of Benjamin
  lexicon: HALOT
  rationale: The preposition ב with 'all the tribes of Benjamin' can indicate distribution among or throughout the tribal subdivisions. Since Benjamin is one tribe with internal clan divisions, 'through all the tribes of Benjamin' preserves the Hebrew wording while communicating broad distribution.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard rendering of the infinitive introducing direct speech.
- source_word: מָה
  chosen: What
  alternatives:
  - Why
  lexicon: HALOT
  rationale: 'The interrogative asks for identification of the matter: ''What is this evil...?'' rather than directly asking cause.'
- source_word: הָרָעָה הַזֹּאת
  chosen: this evil
  alternatives:
  - this wickedness
  - this wrong
  lexicon: HALOT
  rationale: רָעָה here denotes a morally evil deed or outrage. 'Evil' preserves the moral force and remains natural English.
- source_word: אֲשֶׁר נִהְיְתָה
  chosen: that has happened
  alternatives:
  - that has come about
  - that has taken place
  lexicon: HALOT
  rationale: The Niphal of היה here expresses occurrence or coming to pass. 'Has happened' is idiomatic and accurate.
- source_word: בָּכֶם
  chosen: among you
  alternatives:
  - in your midst
  - with you
  lexicon: HALOT
  rationale: In context the phrase refers to an evil deed occurring within the Benjaminite community. 'Among you' best conveys communal location rather than internal experience.
