id: JDG.20.14
reference: Judges 20:14
source:
  edition: WLC
  text: וַ/יֵּאָסְפ֧וּ בְנֵֽי בִנְיָמִ֛ן מִן הֶ/עָרִ֖ים הַ/גִּבְעָ֑תָ/ה לָ/צֵ֥את לַ/מִּלְחָמָ֖ה
    עִם בְּנֵ֥י יִשְׂרָאֵֽל־־־׃
translation:
  text: And the sons of Benjamin gathered from the cities to Gibeah to go out to battle
    against the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'with the sons of Israel'; in this battle context the sense is adversative,
      that is, 'against the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Benjaminites ... against the Israelites.' The main text preserves
      the Hebrew tribal idiom 'sons of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּאָסְפוּ
  chosen: gathered
  alternatives:
  - assembled
  - were gathered
  lexicon: HALOT
  rationale: The Niphal wayyiqtol of אסף here denotes coming together or assembling.
    'Gathered' is natural modern English and preserves the reflexive/passive nuance
    without awkwardness.
- source_word: בְנֵי בִנְיָמִן
  chosen: the sons of Benjamin
  alternatives:
  - the Benjaminites
  - the people of Benjamin
  lexicon: HALOT
  rationale: A formally close rendering is preferred here. 'Sons of Benjamin' preserves
    the tribal/familial idiom of the Hebrew; 'Benjaminites' is possible but slightly
    flattens the source expression.
- source_word: מִן הֶעָרִים
  chosen: from the cities
  alternatives:
  - out of the cities
  - from the towns
  lexicon: HALOT
  rationale: The preposition marks origin, and the plural noun refers to settled population
    centers within Benjamin. 'Cities' is the standard rendering, though 'towns' is
    possible in context.
- source_word: הַגִּבְעָתָה
  chosen: to Gibeah
  alternatives:
  - toward Gibeah
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward Gibeah.
    English idiom normally expresses this simply as 'to Gibeah.'
- source_word: לָצֵאת
  chosen: to go out
  alternatives:
  - to march out
  lexicon: HALOT
  rationale: The infinitive of יצא literally means 'to go out.' In military context
    'march out' is interpretive; 'to go out' keeps the Hebrew wording while remaining
    clear.
- source_word: לַמִּלְחָמָה
  chosen: to battle
  alternatives:
  - for battle
  - for war
  lexicon: HALOT
  rationale: The phrase לצאת למלחמה is a common idiom for going out to fight. 'To
    battle' is concise and idiomatic; 'for war' is more wooden in English.
- source_word: עִם בְּנֵי יִשְׂרָאֵל
  chosen: against the sons of Israel
  alternatives:
  - with the sons of Israel
  - against the Israelites
  lexicon: HALOT
  rationale: Although עִם often means 'with,' in battle contexts it commonly carries
    adversative force, 'against.' The context of civil conflict in Judges 20 requires
    that sense. 'Sons of Israel' is retained for consistency with the Hebrew kinship
    idiom.
