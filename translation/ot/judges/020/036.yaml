id: JDG.20.36
reference: Judges 20:36
source:
  edition: WLC
  text: וַ/יִּרְא֥וּ בְנֵֽי בִנְיָמִ֖ן כִּ֣י נִגָּ֑פוּ וַ/יִּתְּנ֨וּ אִֽישׁ יִשְׂרָאֵ֤ל
    מָקוֹם֙ לְ/בִנְיָמִ֔ן כִּ֤י בָֽטְחוּ֙ אֶל הָ֣/אֹרֵ֔ב אֲשֶׁר שָׂ֖מוּ אֶל הַ/גִּבְעָֽה־־־־׃
translation:
  text: So the sons of Benjamin saw that they were defeated. Now the men of Israel
    had given ground to Benjamin, because they trusted in the ambush that they had
    set against Gibeah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'relied on the ambush force that they had stationed at Gibeah.' The Hebrew
      אֹרֵב can refer either to the ambush itself or to those lying in wait.
    reason: lexical_alternative
  - marker: b
    text: Or 'gave place to Benjamin.' The Hebrew idiom means that Israel deliberately
      yielded space or retreated to draw Benjamin out.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאוּ
  chosen: saw
  alternatives:
  - realized
  lexicon: HALOT
  rationale: Basic sense of ראה is 'see.' In context it can imply recognition, but
    'saw' preserves the narrative concreteness while allowing the implied realization.
- source_word: בְנֵי בִנְיָמִן
  chosen: the sons of Benjamin
  alternatives:
  - the Benjaminites
  lexicon: HALOT
  rationale: A more formal rendering preserves the Hebrew kinship expression. 'Benjaminites'
    is possible but less transparent to the source wording.
- source_word: כִּי נִגָּפוּ
  chosen: that they were defeated
  alternatives:
  - that they were struck down
  - that they had been beaten
  lexicon: HALOT
  rationale: נגף in the Niphal commonly denotes being defeated/smitten in battle.
    'Were defeated' is idiomatic modern English and fits the military context.
- source_word: וַיִּתְּנוּ ... מָקוֹם
  chosen: had given ground
  alternatives:
  - gave place
  - gave room
  - yielded ground
  lexicon: HALOT
  rationale: The idiom נתן מקום here refers to tactical yielding in battle. 'Had given
    ground' captures the military sense naturally in English. Pluperfect sense is
    appropriate because this explains the preceding perception.
- source_word: אִישׁ יִשְׂרָאֵל
  chosen: the men of Israel
  alternatives:
  - the men of IsraeI
  - Israel's men
  lexicon: HALOT
  rationale: Though singular in form, אִישׁ with a people name can function collectively.
    'The men of Israel' is the natural collective rendering in this battle narrative.
- source_word: לְבִנְיָמִן
  chosen: to Benjamin
  alternatives:
  - before Benjamin
  - for Benjamin
  lexicon: HALOT
  rationale: The preposition marks the party to whom space was yielded. 'To Benjamin'
    works with the idiom 'given ground to Benjamin.'
- source_word: כִּי בָטְחוּ
  chosen: because they trusted
  alternatives:
  - because they relied
  - because they were confident
  lexicon: HALOT
  rationale: בטח denotes trust/reliance. 'Trusted' is the most direct rendering; the
    object of trust is the ambush plan.
- source_word: אֶל הָאֹרֵב
  chosen: in the ambush
  alternatives:
  - in the ambushers
  - in the ambush force
  lexicon: HALOT
  rationale: The form can denote either the act/state of lying in wait or the ambushing
    force. In this context, English idiom favors 'the ambush' as the object of reliance,
    though the force itself is included by implication.
- source_word: אֲשֶׁר שָׂמוּ
  chosen: that they had set
  alternatives:
  - that they had placed
  - that they had stationed
  lexicon: HALOT
  rationale: שׂים is broad ('set/place'). 'Had set' is concise and idiomatic with
    'ambush.'
- source_word: אֶל הַגִּבְעָה
  chosen: against Gibeah
  alternatives:
  - at Gibeah
  - near Gibeah
  - by Gibeah
  lexicon: HALOT
  rationale: With an ambush in military context, אֶל can be rendered directionally
    or adversatively. 'Against Gibeah' best conveys the ambush's tactical orientation
    toward the city.
