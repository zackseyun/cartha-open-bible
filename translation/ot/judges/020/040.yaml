id: JDG.20.40
reference: Judges 20:40
source:
  edition: WLC
  text: וְ/הַ/מַּשְׂאֵ֗ת הֵחֵ֛לָּה לַ/עֲל֥וֹת מִן הָ/עִ֖יר עַמּ֣וּד עָשָׁ֑ן וַ/יִּ֤פֶן
    בִּנְיָמִן֙ אַחֲרָ֔י/ו וְ/הִנֵּ֛ה עָלָ֥ה כְלִיל הָ/עִ֖יר הַ/שָּׁמָֽיְמָ/ה־־׃
translation:
  text: But when the signal began to rise from the city as a pillar of smoke, Benjamin
    turned behind him, and behold, the whole city was going up to the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the beacon began to rise from the city as a pillar of smoke.' The Hebrew
      term can denote something lifted up and here likely refers to the prearranged
      battle signal.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Benjamin turned behind him.' This may mean he turned back or turned
      to look behind him.
    reason: lexical_alternative
  - marker: c
    text: Or 'the whole city went up to heaven,' that is, in flames and smoke.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּשְׂאֵת
  chosen: the signal
  alternatives:
  - the beacon
  - the mass
  - the lifting up
  lexicon: HALOT
  rationale: In this battle narrative context, the noun refers to the prearranged
    sign from the ambush, not merely a generic 'rising.' 'Signal' best captures the
    communicative function while remaining natural English. 'Beacon' is possible but
    slightly more interpretive.
- source_word: הֵחֵלָּה לַעֲלוֹת
  chosen: began to rise
  alternatives:
  - began to go up
  - started ascending
  lexicon: HALOT
  rationale: The verbal sequence marks inception plus upward movement. 'Began to rise'
    is idiomatic for smoke and fits the subject 'signal' as manifested in smoke.
- source_word: עַמּוּד עָשָׁן
  chosen: a pillar of smoke
  alternatives:
  - a column of smoke
  lexicon: HALOT
  rationale: A standard Hebrew collocation for a vertical plume. 'Pillar of smoke'
    is both accurate and familiar English.
- source_word: וַיִּפֶן בִּנְיָמִן אַחֲרָיו
  chosen: Benjamin turned behind him
  alternatives:
  - Benjamin turned back
  - Benjamin looked behind him
  lexicon: HALOT
  rationale: The verb means 'turn' rather than specifically 'look,' and the singular
    pronominal suffix likely has collective force with Benjamin as a tribal singular.
    'Turned behind him' preserves the Hebrew image, though slightly wooden; it also
    sets up the visual discovery in the next clause.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there it was
  lexicon: HALOT
  rationale: This discourse marker signals sudden realization. 'Behold' preserves
    the dramatic force better than flatter modern options.
- source_word: עָלָה
  chosen: was going up
  alternatives:
  - went up
  - rose
  lexicon: HALOT
  rationale: With the city as subject and the following directional phrase, the sense
    is of flames/smoke ascending. The progressive English form conveys the ongoing
    scene Benjamin sees.
- source_word: כְלִיל הָעִיר
  chosen: the whole city
  alternatives:
  - the entirety of the city
  - all the city
  lexicon: HALOT
  rationale: כְלִיל here functions adverbially/adjectivally to indicate totality.
    'The whole city' is the most natural rendering, likely referring to the city in
    its entirety being consumed/burning.
- source_word: הַשָּׁמָיְמָה
  chosen: to the heavens
  alternatives:
  - to heaven
  - skyward
  lexicon: HALOT
  rationale: The directional ending indicates motion upward toward the sky/heavens.
    'To the heavens' preserves the plural form and vividness; 'skyward' is possible
    but less concrete.
