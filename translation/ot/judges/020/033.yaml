id: JDG.20.33
reference: Judges 20:33
source:
  edition: WLC
  text: וְ/כֹ֣ל אִ֣ישׁ יִשְׂרָאֵ֗ל קָ֚מוּ מִ/מְּקוֹמ֔/וֹ וַ/יַּעַרְכ֖וּ בְּ/בַ֣עַל
    תָּמָ֑ר וְ/אֹרֵ֧ב יִשְׂרָאֵ֛ל מֵגִ֥יחַ מִ/מְּקֹמ֖/וֹ מִ/מַּֽעֲרֵה גָֽבַע׀־׃
translation:
  text: Then all the men of Israel rose from their place and drew up in battle formation
    at Baal-tamar, while the men lying in ambush of Israel rushed out from their place,
    from Maareh-geba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Maareh-geba may be understood as a place name, as translated here.
      It could also be read more descriptively as 'the open place of Geba' or 'the
      meadow of Geba.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹל אִישׁ יִשְׂרָאֵל
  chosen: all the men of Israel
  alternatives:
  - every man of Israel
  - all Israel's men
  lexicon: HALOT
  rationale: Although אִישׁ is singular in form, with כֹל it functions distributively/collectively.
    In this military context, 'men' is the natural English rendering and preserves
    the gender-accurate sense required by the source.
- source_word: קָמוּ מִמְּקוֹמוֹ
  chosen: rose from their place
  alternatives:
  - stood up from their place
  - arose from his place
  lexicon: HALOT
  rationale: The plural verb governs the collective subject; the singular suffix on
    'place' is distributive. English idiom prefers 'their place' for the collective
    force.
- source_word: וַיַּעַרְכוּ
  chosen: drew up in battle formation
  alternatives:
  - arrayed themselves
  - took their positions
  - set themselves in order
  lexicon: HALOT
  rationale: The verb ערך in military narrative commonly refers to arranging troops
    for battle. 'Drew up in battle formation' makes the martial sense explicit without
    over-paraphrasing.
- source_word: בְּבַעַל תָּמָר
  chosen: at Baal-tamar
  alternatives:
  - in Baal-tamar
  - at Baal of the palm tree
  lexicon: HALOT
  rationale: This is a place name and should be transliterated rather than translated.
    'At' fits the locative sense in English narrative.
- source_word: אֹרֵב יִשְׂרָאֵל
  chosen: the men lying in ambush for Israel
  alternatives:
  - the ambush of Israel
  - Israel's ambush
  lexicon: HALOT
  rationale: The participle אֹרֵב denotes one lying in wait. In context this refers
    to the Israelite ambush force. The phrase is somewhat compressed in Hebrew; this
    rendering makes the referent clear in idiomatic English while preserving the military
    image.
- source_word: מֵגִיחַ
  chosen: rushed out
  alternatives:
  - burst forth
  - came forth
  - advanced
  lexicon: HALOT
  rationale: The Hiphil participle here conveys sudden emergence/advance from concealment.
    'Rushed out' fits the ambush context and the narrative momentum.
- source_word: מִמְּקוֹמוֹ
  chosen: from their place
  alternatives:
  - from its place
  - from his place
  lexicon: HALOT
  rationale: As earlier in the verse, the singular suffix is distributive for a collective
    force. English naturally uses the plural possessive.
- source_word: מִמַּעֲרֵה גָבַע
  chosen: from Maareh-geba
  alternatives:
  - from the open place of Geba
  - from the meadow of Geba
  lexicon: HALOT
  rationale: The expression is difficult and may preserve a place name. Given the
    uncertainty and the likely toponymic function in context, transliteration is preferred
    in the main text, with lexical alternatives preserved in a footnote.
