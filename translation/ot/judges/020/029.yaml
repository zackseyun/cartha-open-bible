id: JDG.20.29
reference: Judges 20:29
source:
  edition: WLC
  text: וַ/יָּ֤שֶׂם יִשְׂרָאֵל֙ אֹֽרְבִ֔ים אֶל הַ/גִּבְעָ֖ה סָבִֽיב־׃פ
translation:
  text: So Israel set men in ambush around Gibeah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''set ambushers toward/around Gibeah.'' The expression refers to
      positioning an ambush force around the city.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  chosen: set
  alternatives:
  - placed
  - stationed
  lexicon: HALOT
  rationale: The verb שׂוּם commonly means 'put, set, place.' Here it governs the
    object 'men in ambush,' so 'set' is concise and natural English while preserving
    the concrete action better than a more interpretive rendering.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name referring to the Israelite force collectively; standard transliteration
    is appropriate.
- source_word: אֹרְבִים
  chosen: men in ambush
  alternatives:
  - ambushers
  - an ambush
  lexicon: HALOT
  rationale: The participle from ארב denotes those lying in wait. English idiom can
    say 'set an ambush,' but the Hebrew more specifically refers to persons functioning
    as ambushers. 'Men in ambush' preserves the personal sense while remaining readable.
- source_word: אֶל
  chosen: around
  alternatives:
  - against
  - toward
  - at
  lexicon: HALOT
  rationale: Although אֶל often means 'to/toward,' in this construction with סָבִיב
    and the military context, the sense is locative placement in relation to Gibeah.
    Rendering the combined phrase naturally as 'around Gibeah' best reflects the syntax
    and scene.
- source_word: הַגִּבְעָה
  chosen: Gibeah
  alternatives:
  - the Gibeah
  rationale: This is the place name Gibeah. English normally omits the article in
    transliterated place names even when Hebrew includes it.
- source_word: סָבִיב
  chosen: around
  alternatives:
  - all around
  - round about
  lexicon: HALOT
  rationale: סָבִיב indicates surrounding position. 'Around' is clear modern English;
    'round about' is archaic, and 'all around' is possible but not necessary.
