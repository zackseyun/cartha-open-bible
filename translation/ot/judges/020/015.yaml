id: JDG.20.15
reference: Judges 20:15
source:
  edition: WLC
  text: וַ/יִּתְפָּֽקְדוּ֩ בְנֵ֨י בִנְיָמִ֜ן בַּ/יּ֤וֹם הַ/הוּא֙ מֵ/הֶ֣/עָרִ֔ים עֶשְׂרִ֨ים וְ/שִׁשָּׁ֥ה אֶ֛לֶף אִ֖ישׁ שֹׁ֣לֵֽף חָ֑רֶב לְ֠/בַד מִ/יֹּשְׁבֵ֤י הַ/גִּבְעָה֙ הִתְפָּ֣קְד֔וּ שְׁבַ֥ע מֵא֖וֹת אִ֥ישׁ בָּחֽוּר׃
translation:
  text: 'And on that day the sons of Benjamin were mustered from the cities: twenty-six thousand men drawing the sword[a], besides the inhabitants of Gibeah[b], who were mustered as seven hundred chosen men.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were numbered' or 'were enrolled'; the Hebrew verb refers to being counted for military service.
    reason: lexical_alternative
  - marker: b
    text: Or 'seven hundred select men'; the Hebrew term can also describe young men, but here likely emphasizes picked warriors.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפָּקְדוּ / הִתְפָּקְדוּ
  chosen: were mustered
  alternatives:
  - were numbered
  - were enrolled
  - assembled themselves
  lexicon: HALOT
  rationale: The hitpael of פקד here refers to being counted/enrolled for military service, not merely gathering. 'Were mustered' captures both enumeration and martial context better than the more wooden 'were numbered.' Using the same English for both occurrences preserves the repetition in Hebrew.
- source_word: בְנֵי בִנְיָמִן
  chosen: the sons of Benjamin
  alternatives:
  - the Benjaminites
  - the people of Benjamin
  lexicon: HALOT
  rationale: A formally close rendering preserves the tribal/familial idiom of the Hebrew. 'Benjaminites' is possible, but 'sons of Benjamin' better reflects the source wording and keeps the genealogical flavor.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - that day
  lexicon: HALOT
  rationale: Standard temporal idiom; 'on that day' is natural English and preserves the demonstrative emphasis.
- source_word: מֵהֶעָרִים
  chosen: from the cities
  alternatives:
  - out of the cities
  - from their cities
  lexicon: HALOT
  rationale: The phrase indicates the source/locality from which the tribal forces were counted. 'From the cities' is straightforward and sufficiently literal.
- source_word: עֶשְׂרִים וְשִׁשָּׁה אֶלֶף אִישׁ
  chosen: twenty-six thousand men
  alternatives:
  - twenty-six thousand soldiers
  lexicon: HALOT
  rationale: אִישׁ after a number commonly means 'men.' 'Soldiers' would make the military sense explicit, but the following participle already does that, so 'men' is preferred as the less interpretive rendering.
- source_word: שֹׁלֵף חָרֶב
  chosen: drawing the sword
  alternatives:
  - wielding the sword
  - bearing arms
  lexicon: HALOT
  rationale: This idiom denotes armed fighting men. 'Drawing the sword' is a close and idiomatic rendering that preserves the concrete imagery of the Hebrew.
- source_word: לְבַד
  chosen: besides
  alternatives:
  - apart from
  - excluding
  lexicon: HALOT
  rationale: The term marks an addition distinct from the previous total. 'Besides' communicates that the Gibeah contingent is counted separately in addition to the city totals.
- source_word: מִיֹּשְׁבֵי הַגִּבְעָה
  chosen: the inhabitants of Gibeah
  alternatives:
  - those dwelling in Gibeah
  - the residents of Gibeah
  lexicon: HALOT
  rationale: A natural rendering of the participial construction. 'Inhabitants' preserves the civic sense and reads smoothly in English.
- source_word: שְׁבַע מֵאוֹת אִישׁ
  chosen: seven hundred men
  lexicon: HALOT
  rationale: Direct numerical rendering with אִישׁ retained as 'men.'
- source_word: בָּחוּר
  chosen: chosen
  alternatives:
  - choice
  - select
  - young
  lexicon: HALOT
  rationale: In this military context, בָּחוּר can denote selected or choice men, not merely young males. 'Chosen men' best fits the context and aligns with the following verse's depiction of elite warriors. 'Young' is lexically possible but too age-focused here.
