id: JDG.20.5
reference: Judges 20:5
source:
  edition: WLC
  text: וַ/יָּקֻ֤מוּ עָלַ/י֙ בַּעֲלֵ֣י הַ/גִּבְעָ֔ה וַ/יָּסֹ֧בּוּ עָלַ֛/י אֶת הַ/בַּ֖יִת
    לָ֑יְלָה אוֹתִ/י֙ דִּמּ֣וּ לַ/הֲרֹ֔ג וְ/אֶת פִּילַגְשִׁ֥/י עִנּ֖וּ וַ/תָּמֹֽת־־׃
translation:
  text: Then the men of Gibeah rose up against me and surrounded the house at night.
    They intended to kill me, and they violated my concubine, so that she died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'They planned to kill me.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'they raped my concubine.' The Hebrew verb can denote severe humiliation
      or violation; here the context indicates sexual assault.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעֲלֵי הַגִּבְעָה
  chosen: the men of Gibeah
  alternatives:
  - the lords of Gibeah
  - the citizens of Gibeah
  - the masters of Gibeah
  lexicon: HALOT
  rationale: Although בַּעַל can denote 'lord/master/owner,' the plural construct
    here idiomatically refers to the male inhabitants or leading men of the town.
    'The men of Gibeah' is natural English and fits the narrative context without
    implying formal nobility.
- source_word: וַיָּקֻמוּ עָלַי
  chosen: rose up against me
  alternatives:
  - attacked me
  - came against me
  lexicon: HALOT
  rationale: The idiom קום על commonly means to rise against someone in hostility.
    'Rose up against me' preserves the verbal imagery and adversarial force.
- source_word: וַיָּסֹבּוּ עָלַי אֶת־הַבַּיִת
  chosen: surrounded the house
  alternatives:
  - encircled the house around me
  - closed in on the house
  lexicon: HALOT
  rationale: סבב with 'the house' as object conveys surrounding or encircling the
    house. English naturally expresses this as 'surrounded the house'; the hostile
    sense is already carried by the preceding clause.
- source_word: לָיְלָה
  chosen: at night
  alternatives:
  - by night
  - during the night
  lexicon: HALOT
  rationale: Temporal accusative indicating when the action occurred. 'At night' is
    clear, idiomatic modern English.
- source_word: דִּמּוּ לַהֲרֹג
  chosen: intended to kill
  alternatives:
  - planned to kill
  - meant to kill
  - thought to kill
  lexicon: HALOT
  rationale: The verb דמה in this stem/context conveys intention or purpose. 'Intended
    to kill' best captures the sense in contemporary English without sounding wooden.
- source_word: פִּילַגְשִׁי
  chosen: my concubine
  alternatives:
  - my secondary wife
  lexicon: HALOT
  rationale: '''Concubine'' is the standard and sufficiently precise rendering for
    פילגש in this historical-social context. While culturally distant, it is more
    accurate than paraphrastic alternatives.'
- source_word: עִנּוּ
  chosen: violated
  alternatives:
  - raped
  - abused
  - humiliated
  lexicon: HALOT
  rationale: ענה in the piel can denote affliction, humiliation, or sexual violation
    depending on context. Here the context clearly indicates sexual assault. 'Violated'
    communicates that forceful abuse occurred while maintaining a measured translation
    style; 'raped' is a possible stronger contextual gloss but is not strictly the
    lexical form itself.
- source_word: וַתָּמֹת
  chosen: so that she died
  alternatives:
  - and she died
  - with the result that she died
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, but in English the causal/resultative
    connection is clearer if expressed explicitly. 'So that she died' reflects the
    sequence and consequence of the abuse.
