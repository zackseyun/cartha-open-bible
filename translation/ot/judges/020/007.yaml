id: JDG.20.7
reference: Judges 20:7
source:
  edition: WLC
  text: הִנֵּ֥ה כֻלְּ/כֶ֖ם בְּנֵ֣י יִשְׂרָאֵ֑ל הָב֥וּ לָ/כֶ֛ם דָּבָ֥ר וְ/עֵצָ֖ה הֲלֹֽם׃
translation:
  text: Look, all of you sons of Israel, give your opinion and counsel here.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'children of Israel' or 'Israelites.' The Hebrew is literally 'sons of
      Israel.'
    reason: lexical_alternative
  - marker: b
    text: '''Word'' may also be understood as ''answer,'' ''proposal,'' or ''matter.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic/interjection drawing attention to the appeal. 'Look' is natural
    modern English and preserves the summons better than the more archaic 'Behold.'
- source_word: כֻלְּכֶם
  chosen: all of you
  alternatives:
  - all
  - every one of you
  lexicon: HALOT
  rationale: Explicitly renders the 2mp pronominal suffix and keeps the direct address
    to the assembled Israelites.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: sons of Israel
  alternatives:
  - children of Israel
  - Israelites
  lexicon: HALOT
  rationale: Rendered gender-accurately per project philosophy. Though idiomatically
    it refers to the people of Israel, the Hebrew expression is literally masculine
    plural construct; 'sons of Israel' preserves the source form better than 'Israelites.'
- source_word: הָבוּ
  chosen: give
  alternatives:
  - set forth
  - offer
  lexicon: HALOT
  rationale: Imperative plural from יהב/הבב in the sense of giving or presenting.
    In context the speaker is calling for the assembly to provide a response or proposal;
    'give' keeps the imperative force and allows the following objects to define the
    content.
- source_word: לָכֶם
  chosen: your
  alternatives:
  - for yourselves
  - among yourselves
  lexicon: HALOT
  rationale: 'The preposition plus pronoun is idiomatic here with the imperative,
    indicating something to be supplied from among themselves or on their own behalf.
    English expresses this most naturally as possessive with the following nouns:
    ''your word and counsel.'''
- source_word: דָּבָר
  chosen: word
  alternatives:
  - answer
  - proposal
  - matter
  lexicon: HALOT
  rationale: דָּבָר is broad; here it likely means a spoken response, proposal, or
    decision. 'Word' preserves the lexical breadth while fitting the collocation with
    'counsel.' A more specific rendering like 'proposal' is possible but slightly
    interpretive.
- source_word: וְעֵצָה
  chosen: and counsel
  alternatives:
  - and advice
  - and plan
  lexicon: HALOT
  rationale: עֵצָה denotes counsel, advice, or deliberative planning. 'Counsel' best
    matches the formal public-deliberation setting.
- source_word: הֲלֹם
  chosen: here
  alternatives:
  - at this place
  lexicon: HALOT
  rationale: Adverb of place meaning 'here.' It likely points to the present assembly
    and is best rendered simply and directly.
