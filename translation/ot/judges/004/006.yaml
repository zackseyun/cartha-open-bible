translation:
  text: 'She sent and summoned Barak son of Abinoam from Kedesh-naphtali, and said to him, “Has not the LORD, the God of Israel, commanded: ‘Go, draw up to Mount Tabor, and take with you ten thousand men from the sons of Naphtali and from the sons of Zebulun’?”'
