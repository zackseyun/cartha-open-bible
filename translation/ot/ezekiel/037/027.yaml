id: EZK.37.27
reference: Ezekiel 37:27
source:
  edition: WLC
  text: וְ/הָיָ֤ה מִשְׁכָּנִ/י֙ עֲלֵי/הֶ֔ם וְ/הָיִ֥יתִי לָ/הֶ֖ם לֵֽ/אלֹהִ֑ים וְ/הֵ֖מָּה
    יִֽהְיוּ לִ֥/י לְ/עָֽם־׃
translation:
  text: My dwelling place will be over them, and I will be their God, and they will
    be my people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My tabernacle will be over them' or 'My dwelling will be over them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁכָּנִי
  chosen: my dwelling place
  alternatives:
  - my tabernacle
  - my sanctuary
  - my dwelling
  lexicon: HALOT
  rationale: מִשְׁכָּן denotes a dwelling place or tabernacle. 'My dwelling place'
    preserves the concrete sense while using readable modern English; 'tabernacle'
    is possible but can sound overly technical or evoke the Mosaic structure too narrowly
    in this prophetic context.
- source_word: עֲלֵיהֶם
  chosen: over them
  alternatives:
  - upon them
  - with them
  lexicon: HALOT
  rationale: The preposition עַל most directly means 'on/over/upon.' Here 'over them'
    is retained rather than smoothing to 'with them,' preserving the source image
    and the covenantal-protective sense without overinterpreting.
- source_word: וְהָיִיתִי לָהֶם לֵאלֹהִים
  chosen: I will be their God
  alternatives:
  - I will be God to them
  lexicon: HALOT
  rationale: This is a standard covenant formula in Hebrew. 'I will be their God'
    is idiomatic English and preserves the covenantal force of the construction.
- source_word: וְהֵמָּה יִהְיוּ לִי לְעָם
  chosen: they will be my people
  alternatives:
  - they will be a people to me
  lexicon: HALOT
  rationale: Another standard covenant formula. 'They will be my people' is the natural
    English equivalent and best preserves both meaning and biblical resonance.
- source_word: וְהָיָה
  chosen: will be
  alternatives:
  - shall be
  - and it will come to pass
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction in prophetic discourse is best rendered
    as simple future here. 'Will be' is clear and avoids archaic 'shall be' or overly
    expansive paraphrase.
