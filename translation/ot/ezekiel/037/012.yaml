theological_decisions:
- issue: Nature of the grave-opening imagery
  chosen_reading: Retain the concrete resurrection-like language without narrowing
    it to either purely metaphorical national restoration or a full doctrinal statement
    of final bodily resurrection.
  alternative_readings:
  - Purely metaphorical return from exile
  - Direct prediction of individual bodily resurrection
  rationale: The verse uses explicit grave and ascent imagery within Ezekiel's restoration
    oracle. The translation preserves that tension rather than resolving the interpretive
    debate in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
