id: EZK.37.12
reference: Ezekiel 37:12
source:
  edition: WLC
  text: לָ/כֵן֩ הִנָּבֵ֨א וְ/אָמַרְתָּ֜ אֲלֵי/הֶ֗ם כֹּֽה אָמַר֮ אֲדֹנָ֣/י יְהוִה֒
    הִנֵּה֩ אֲנִ֨י פֹתֵ֜חַ אֶת קִבְרֽוֹתֵי/כֶ֗ם וְ/הַעֲלֵיתִ֥י אֶתְ/כֶ֛ם מִ/קִּבְרוֹתֵי/כֶ֖ם
    עַמִּ֑/י וְ/הֵבֵאתִ֥י אֶתְ/כֶ֖ם אֶל אַדְמַ֥ת יִשְׂרָאֵֽל־־־׃ס
translation:
  text: 'Therefore prophesy and say to them, ‘Thus says the Lord GOD: Behold, I am
    opening your graves and will bring you up from your graves, my people, and I will
    bring you into the land of Israel.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and will raise you from your graves.' The Hebrew literally says 'will
      bring you up from your graves.'
    reason: lexical_alternative
  - marker: b
    text: The imagery may describe Israel's restoration from exile through the language
      of opening graves, while also resonating with later resurrection hope.
    reason: cross_reference
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks the inferential connection to the preceding vision and command;
    'Therefore' preserves the formal logical force in natural English.
- source_word: הִנָּבֵא
  chosen: prophesy
  alternatives:
  - prophesy forth
  - speak prophetically
  lexicon: HALOT
  rationale: Imperative of נבא addressed to Ezekiel; 'prophesy' is the standard and
    clear English equivalent.
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  chosen: and say to them
  alternatives:
  - and tell them
  lexicon: HALOT
  rationale: A straightforward speech-introduction formula; 'say to them' keeps the
    formal prophetic cadence.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula; retained for recognizability
    and fidelity.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - the Lord Yahweh
  lexicon: HALOT
  rationale: Following doctrine, יְהוָה is rendered 'the LORD.' In the compound title
    אֲדֹנָי יְהוִה, English convention avoids 'Lord LORD' by rendering as 'Lord GOD,'
    preserving both elements of the Hebrew title.
- source_word: הִנֵּה אֲנִי
  chosen: Behold, I
  alternatives:
  - Look, I
  - See, I
  lexicon: HALOT
  rationale: Introduces emphatic divine action. 'Behold' preserves prophetic solemnity
    without excessive paraphrase.
- source_word: פֹתֵחַ
  chosen: am opening
  alternatives:
  - open
  - am about to open
  lexicon: HALOT
  rationale: The participle with הִנֵּה conveys imminent or vivid present action;
    'am opening' reflects the Hebrew aspect better than a simple future.
- source_word: קִבְרוֹתֵיכֶם
  chosen: your graves
  alternatives:
  - your tombs
  - your burial places
  lexicon: HALOT
  rationale: '''Graves'' is the most direct and natural rendering of קבר in this resurrection-restoration
    image.'
- source_word: וְהַעֲלֵיתִי אֶתְכֶם מִקִּבְרוֹתֵיכֶם
  chosen: and will bring you up from your graves
  alternatives:
  - and will raise you from your graves
  - and will bring you out of your graves
  lexicon: HALOT
  rationale: עלה in the Hiphil means to cause to go up. 'Bring you up' preserves the
    concrete upward movement from graves; 'raise' is possible but can over-specify
    later theological associations beyond the immediate imagery.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Vocative/appositional covenant designation. Set off by commas in English
    to reflect direct address and covenantal emphasis.
- source_word: וְהֵבֵאתִי אֶתְכֶם
  chosen: and I will bring you
  alternatives:
  - and I will lead you
  lexicon: HALOT
  rationale: ביא in Hiphil commonly means 'bring'; this keeps continuity with the
    restoration motif.
- source_word: אֶל אַדְמַת יִשְׂרָאֵל
  chosen: into the land of Israel
  alternatives:
  - to the soil of Israel
  - to Israel's land
  lexicon: HALOT
  rationale: אַדְמָה can mean ground/soil/land; here in restoration context it refers
    to the territorial land. 'Into the land of Israel' is idiomatic and contextually
    precise.
