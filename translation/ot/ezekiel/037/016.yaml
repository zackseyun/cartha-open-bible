id: EZK.37.16
reference: Ezekiel 37:16
source:
  edition: WLC
  text: וְ/אַתָּ֣ה בֶן אָדָ֗ם קַח לְ/ךָ֙ עֵ֣ץ אֶחָ֔ד וּ/כְתֹ֤ב עָלָי/ו֙ לִֽ/יהוּדָ֔ה
    וְ/לִ/בְנֵ֥י יִשְׂרָאֵ֖ל חבר/ו וּ/לְקַח֙ עֵ֣ץ אֶחָ֔ד וּ/כְת֣וֹב עָלָ֗י/ו לְ/יוֹסֵף֙
    עֵ֣ץ אֶפְרַ֔יִם וְ/כָל בֵּ֥ית יִשְׂרָאֵ֖ל חבר/ו־־־׃
translation:
  text: And you, son of man, take for yourself one stick and write on it, ‘For Judah
    and for the sons of Israel, his companions.’ Then take one stick and write on
    it, ‘For Joseph, the stick of Ephraim, and all the house of Israel, his companions.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children of Israel.' The Hebrew is literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his associates,' 'those joined with him,' or 'his allies.'
    reason: lexical_alternative
  - marker: c
    text: '''Stick'' could also be rendered ''piece of wood'' or, more interpretively,
      ''wooden tablet.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: This is Ezekiel’s standard form of address. A more literal rendering
    preserves the Hebrew idiom and its repeated prophetic force better than smoothing
    to 'human one' or 'mortal.' The doctrine guidance prefers gender-accurate rendering
    where the source is masculine and representative.
- source_word: קַח לְךָ
  chosen: take for yourself
  alternatives:
  - take
  - get yourself
  lexicon: HALOT
  rationale: The dative pronoun לְךָ adds a reflexive/personal nuance. 'Take for yourself'
    preserves that nuance without becoming awkward.
- source_word: עֵץ
  chosen: stick
  alternatives:
  - wooden tablet
  - piece of wood
  - tree
  lexicon: HALOT
  rationale: In this sign-act context, the object is something Ezekiel can hold and
    write on. 'Stick' is the most natural English rendering here. 'Tree' is impossible
    in context, and 'wooden tablet' is too interpretive for the main text.
- source_word: וּכְתֹב עָלָיו
  chosen: write on it
  alternatives:
  - inscribe on it
  - write upon it
  lexicon: HALOT
  rationale: A straightforward rendering that fits readable modern English while preserving
    the physical act of marking the object.
- source_word: לִיהוּדָה
  chosen: For Judah
  alternatives:
  - Belonging to Judah
  - Judah
  lexicon: HALOT
  rationale: 'The prefixed ל here is best represented as the content of the inscription:
    the stick is labeled ''For Judah.'' This is clearer in English than a bare name.'
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'sons.' In keeping with gender-accurate policy,
    the main text preserves this form rather than neutralizing it to 'people,' though
    'children of Israel' is a traditional alternative.
- source_word: חֲבֵרָיו
  chosen: his companions
  alternatives:
  - his associates
  - those joined with him
  - his allies
  lexicon: HALOT
  rationale: The noun denotes those associated or joined with the named party. 'His
    companions' is concise and natural, while still allowing the relational sense.
    The singular suffix is retained with 'his' rather than being flattened.
- source_word: לְיוֹסֵף
  chosen: For Joseph
  alternatives:
  - Belonging to Joseph
  - Joseph
  lexicon: HALOT
  rationale: As with Judah, this reflects the wording of the inscription rather than
    merely naming the tribe in apposition.
- source_word: עֵץ אֶפְרַיִם
  chosen: the stick of Ephraim
  alternatives:
  - Ephraim’s stick
  - the wood of Ephraim
  lexicon: HALOT
  rationale: The construct relationship is best represented directly. This identifies
    Joseph’s stick specifically with Ephraim, the leading northern tribe.
- source_word: כָּל בֵּית יִשְׂרָאֵל
  chosen: all the house of Israel
  alternatives:
  - the whole house of Israel
  - all Israel’s house
  lexicon: HALOT
  rationale: '''House of Israel'' is a standard prophetic expression and should be
    preserved. ''All the house of Israel'' is idiomatic enough while staying close
    to the Hebrew.'
