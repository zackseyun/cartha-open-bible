theological_decisions:
- issue: Representation of the divided kingdoms in the symbolic act
  chosen_reading: The verse distinguishes Judah and Joseph/Ephraim as two covenantal
    groupings to be symbolically reunited, without importing later doctrinal claims
    beyond the immediate prophetic sign-act.
  alternative_readings:
  - Treating 'Joseph' and 'Ephraim' as redundant labels with no distinct rhetorical
    force
  - Collapsing 'sons of Israel' and 'house of Israel' into generic 'Israelites' throughout
  rationale: The Hebrew intentionally names Judah on one side and Joseph/Ephraim on
    the other, reflecting the historical division of the kingdoms. The translation
    preserves those distinctions and the repeated relational phrase 'his companions'
    rather than smoothing them away.
