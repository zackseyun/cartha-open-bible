theological_decisions:
- issue: Force of the covenant language in an eschatological restoration context
  chosen_reading: 'Retain explicit covenant terminology: ''a covenant of peace'' and
    ''an everlasting covenant'''
  alternative_readings:
  - Paraphrastic renderings emphasizing only blessing or security
  rationale: The verse is structurally covenantal and should not be flattened into
    general promises of peace. Preserving the covenant terms maintains the theological
    weight of God's binding relationship with his restored people.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Sense of God's sanctuary location
  chosen_reading: Corporate presence 'in their midst'
  alternative_readings:
  - '''within them'' as primarily internal/individual indwelling'
  rationale: The Hebrew בְּתוֹכָם most naturally indicates God's sanctuary among the
    people corporately. This preserves the text's communal temple-presence imagery
    without importing later theological categories as the primary sense.
  doctrine_reference: Translation philosophy §§1, 3
