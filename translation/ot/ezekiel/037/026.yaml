id: EZK.37.26
reference: Ezekiel 37:26
source:
  edition: WLC
  text: וְ/כָרַתִּ֤י לָ/הֶם֙ בְּרִ֣ית שָׁל֔וֹם בְּרִ֥ית עוֹלָ֖ם יִהְיֶ֣ה אוֹתָ֑/ם
    וּ/נְתַתִּי/ם֙ וְ/הִרְבֵּיתִ֣י אוֹתָ֔/ם וְ/נָתַתִּ֧י אֶת מִקְדָּשִׁ֛/י בְּ/תוֹכָ֖/ם
    לְ/עוֹלָֽם־׃
translation:
  text: I will make with them a covenant of peace; it will be an everlasting covenant
    with them. And I will place them and multiply them, and I will set my sanctuary
    in their midst forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it will be for them an everlasting covenant.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I will set/place them.'
    reason: lexical_alternative
  - marker: c
    text: Or 'among them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָרַתִּי
  chosen: I will make
  alternatives:
  - I will cut
  - I will make a covenant
  lexicon: HALOT
  rationale: Hebrew כרת with בְּרִית is the standard idiom 'cut/make a covenant.'
    English 'make' best conveys the idiom naturally while preserving covenantal force.
- source_word: בְּרִית שָׁלוֹם
  chosen: a covenant of peace
  alternatives:
  - a peace covenant
  - a covenant of well-being
  lexicon: HALOT
  rationale: Formal genitive retained. 'Peace' is preferred over 'well-being' because
    שָׁלוֹם here names the covenant's character in a familiar biblical-theological
    way, while still allowing the fuller sense of wholeness.
- source_word: בְּרִית עוֹלָם
  chosen: an everlasting covenant
  alternatives:
  - an eternal covenant
  - a covenant forever
  lexicon: HALOT
  rationale: עוֹלָם in covenant contexts is commonly rendered 'everlasting.' This
    is idiomatic and preserves the durative force without awkwardness.
- source_word: יִהְיֶה אוֹתָם
  chosen: it will be ... with them
  alternatives:
  - it will be for them
  - it will be theirs
  lexicon: HALOT
  rationale: The phrase indicates relation/benefit toward the people. 'With them'
    fits the covenantal context and aligns with the preceding 'make with them,' avoiding
    the less natural 'be them' and the more interpretive 'be theirs.'
- source_word: וּנְתַתִּים
  chosen: I will establish them
  alternatives:
  - I will set them
  - I will place them
  lexicon: HALOT
  rationale: With people as object in this restoration context, נתן likely carries
    the sense of setting/placing securely. 'Establish them' communicates stable restoration
    better than the overly literal but vague 'set them.'
- source_word: וְהִרְבֵּיתִי אוֹתָם
  chosen: multiply them
  alternatives:
  - increase them
  - make them many
  lexicon: HALOT
  rationale: The Hiphil of רבה commonly means cause to become many. 'Multiply' is
    concise, idiomatic, and preserves covenantal resonance with promises of increase.
- source_word: מִקְדָּשִׁי
  chosen: my sanctuary
  alternatives:
  - my holy place
  - my temple
  lexicon: HALOT
  rationale: מִקְדָּשׁ denotes a holy sanctuary. 'Sanctuary' is broader and more textually
    precise than 'temple,' which could over-specify the referent.
- source_word: בְּתוֹכָם
  chosen: in their midst
  alternatives:
  - among them
  - within them
  lexicon: HALOT
  rationale: '''In their midst'' preserves the corporate, communal sense of God''s
    dwelling among his people. ''Within them'' could suggest an individual inward
    sense not demanded by the Hebrew.'
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - everlastingly
  lexicon: HALOT
  rationale: '''Forever'' is natural modern English and adequately conveys the enduring
    force of לְעוֹלָם.'
