id: EZK.37.20
reference: Ezekiel 37:20
source:
  edition: WLC
  text: וְ/הָי֨וּ הָ/עֵצִ֜ים אֲֽשֶׁר תִּכְתֹּ֧ב עֲלֵי/הֶ֛ם בְּ/יָדְ/ךָ֖ לְ/עֵינֵי/הֶֽם־׃
translation:
  text: And the sticks on which you write will be in your hand before their eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the pieces of wood.” The Hebrew term can refer more broadly to wood,
      but in this sign-act context it denotes the sticks Ezekiel is holding and inscribing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  chosen: And ... will be
  alternatives:
  - and they shall be
  - and they will become
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed conjunction in prophetic instruction is naturally
    rendered with future sense in English here: the result of the commanded action
    is being described. ''Will be'' is the most natural idiomatic rendering.'
- source_word: הָעֵצִים
  chosen: the sticks
  alternatives:
  - the pieces of wood
  - the wooden sticks
  lexicon: HALOT
  rationale: In the immediate context Ezekiel is handling inscribed wooden objects
    symbolizing Judah and Joseph. English 'sticks' best matches the concrete sign-act
    context and common usage in this passage, while 'trees' or generic 'wood' would
    mislead.
- source_word: אֲשֶׁר תִּכְתֹּב עֲלֵיהֶם
  chosen: on which you write
  alternatives:
  - which you write on
  - upon which you write
  lexicon: HALOT
  rationale: The relative clause modifies 'sticks.' Rendering with 'on which you write'
    is clear modern English and preserves the prepositional sense of עַל with writing.
- source_word: בְּיָדְךָ
  chosen: in your hand
  alternatives:
  - in your hands
  - by your hand
  lexicon: HALOT
  rationale: The Hebrew is singular, so 'in your hand' is retained. It conveys possession/holding
    in the enacted sign. 'By your hand' would suggest agency rather than physical
    holding.
- source_word: לְעֵינֵיהֶם
  chosen: before their eyes
  alternatives:
  - in their sight
  - before them
  lexicon: HALOT
  rationale: The idiom literally involves the eyes and means visible public display.
    'Before their eyes' preserves the vividness better than the flatter 'before them.'
