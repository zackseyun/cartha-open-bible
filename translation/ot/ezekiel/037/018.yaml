id: EZK.37.18
reference: Ezekiel 37:18
source:
  edition: WLC
  text: וְ/כַֽ/אֲשֶׁר֙ יֹאמְר֣וּ אֵלֶ֔י/ךָ בְּנֵ֥י עַמְּ/ךָ֖ לֵ/אמֹ֑ר הֲ/לֽוֹא תַגִּ֥יד לָ֖/נוּ מָה אֵ֥לֶּה לָּֽ/ךְ־־׃
translation:
  text: And when the sons of your people say to you[a], ‘Will you not tell us what these things are to you?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'what are these to you?' The Hebrew idiom asks about the significance of Ezekiel's symbolic action.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכַאֲשֶׁר
  chosen: And when
  alternatives:
  - Now when
  - Whenever
  lexicon: HALOT
  rationale: The conjunction plus temporal particle introduces the next stage in the prophetic action sequence. 'And when' preserves the narrative linkage and temporal sense without sounding overly wooden.
- source_word: יֹאמְרוּ אֵלֶיךָ
  chosen: say to you
  alternatives:
  - speak to you
  - ask you
  lexicon: HALOT
  rationale: אָמַר is the standard verb 'say.' Although the content is interrogative, the Hebrew uses 'say ... saying,' so 'say to you' is more textually transparent than the more interpretive 'ask you.'
- source_word: בְּנֵי עַמְּךָ
  chosen: the sons of your people
  alternatives:
  - your people
  - the children of your people
  - the people among you
  lexicon: HALOT
  rationale: 'The Hebrew is explicitly gendered and construct-based: ''sons of your people.'' Per the gender-accurate philosophy, the masculine form is retained rather than flattened to ''your people,'' while still sounding natural in English.'
- source_word: לֵאמֹר
  chosen: omitted in direct English rendering
  alternatives:
  - saying
  lexicon: HALOT
  rationale: This infinitive functions as a speech introducer. English direct quotation normally does not require a separate 'saying,' so it is represented by the quotation mark and colon-like transition rather than a redundant gloss.
- source_word: הֲלוֹא
  chosen: Will you not
  alternatives:
  - Will you not indeed
  - Surely you will
  lexicon: HALOT
  rationale: The particle combination introduces an expectation-laden question. 'Will you not' captures the rhetorical force better than a flat 'will you' or an overconfident 'surely you will.'
- source_word: תַגִּיד לָנוּ
  chosen: tell us
  alternatives:
  - declare to us
  - make known to us
  lexicon: HALOT
  rationale: נגד in Hiphil means to tell, declare, or make known. 'Tell us' is idiomatic modern English and fits the direct question, while still conveying disclosure.
- source_word: מָה אֵלֶּה לָּךְ
  chosen: what these things mean for you
  alternatives:
  - what are these to you
  - what these are to you
  - what these mean to you
  lexicon: HALOT
  rationale: Literally, 'what are these to you?' In context, the people are asking for the significance of the symbolic sticks Ezekiel is handling. 'What these things mean for you' brings out the idiomatic sense in clear English while preserving the second-person orientation.
