id: EZK.37.10
reference: Ezekiel 37:10
source:
  edition: WLC
  text: וְ/הִנַּבֵּ֖אתִי כַּ/אֲשֶׁ֣ר צִוָּ֑/נִי וַ/תָּבוֹא֩ בָ/הֶ֨ם הָ/ר֜וּחַ וַ/יִּֽחְי֗וּ
    וַ/יַּֽעַמְדוּ֙ עַל רַגְלֵי/הֶ֔ם חַ֖יִל גָּד֥וֹל מְאֹד מְאֹֽד־־׃ס
translation:
  text: So I prophesied as he commanded me, and the breath entered into them, and
    they lived and stood on their feet, an exceedingly great army.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the spirit entered into them.' The Hebrew word רוּחַ can mean 'breath,'
      'wind,' or 'spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנַּבֵּאתִי
  chosen: I prophesied
  alternatives:
  - I spoke as a prophet
  lexicon: HALOT
  rationale: The hitpael of נבא in this context refers to Ezekiel's prophetic act
    of speaking as commanded. 'I prophesied' is the standard, concise English equivalent
    and fits the repeated refrain in the surrounding passage.
- source_word: כַּאֲשֶׁר צִוָּנִי
  chosen: as he commanded me
  alternatives:
  - just as he commanded me
  lexicon: HALOT
  rationale: This preserves the comparison particle and the verb צוה straightforwardly.
    The subject 'he' is implicit from context, referring to the LORD; making it explicit
    as 'the LORD' here would add what the Hebrew leaves implicit.
- source_word: וַתָּבוֹא בָהֶם
  chosen: entered into them
  alternatives:
  - came into them
  - entered them
  lexicon: HALOT
  rationale: בוא plus ב conveys entry into the bodies. 'Entered into them' is natural
    English and preserves the motion imagery.
- source_word: הָרוּחַ
  chosen: the breath
  alternatives:
  - the spirit
  - the wind
  lexicon: HALOT
  rationale: רוּחַ is intentionally multivalent in this vision ('breath/wind/spirit').
    In this immediate clause, the sense is the animating breath entering the slain
    so that they live, echoing the life-breath motif. Because 'spirit' is also possible
    and the passage plays on the ambiguity, the alternative is preserved in a footnote
    rather than collapsed.
- source_word: וַיִּחְיוּ
  chosen: they lived
  alternatives:
  - they came to life
  - they revived
  lexicon: HALOT
  rationale: The qal wayyiqtol of חיה denotes becoming alive. 'They lived' is formally
    close to the Hebrew; 'came to life' is idiomatic but slightly more expansive.
- source_word: וַיַּעַמְדוּ עַל רַגְלֵיהֶם
  chosen: stood on their feet
  alternatives:
  - stood on their own feet
  - rose to their feet
  lexicon: HALOT
  rationale: This is a direct and vivid rendering of the Hebrew idiom. 'Rose to their
    feet' is idiomatic English but introduces a nuance not explicit in the verb.
- source_word: חַיִל
  chosen: army
  alternatives:
  - host
  - force
  - multitude
  lexicon: HALOT
  rationale: חיל can denote military force, army, or host. In this valley-of-dry-bones
    vision, the image is of an assembled fighting force standing ready, so 'army'
    best captures the concrete sense.
- source_word: גָּדוֹל מְאֹד מְאֹד
  chosen: very, very great
  alternatives:
  - exceedingly great
  - extremely great
  lexicon: HALOT
  rationale: The Hebrew intensifies with repeated מְאֹד. Rendering both adverbs preserves
    the emphatic force better than collapsing them into a single English intensifier.
