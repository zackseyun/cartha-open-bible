theological_decisions:
- issue: Rendering the polyvalent רוּחַ in the valley vision
  chosen_reading: the breath
  alternative_readings:
  - the spirit
  - the wind
  rationale: The immediate narrative function is the animating breath entering the
    bodies so that they live. However, the broader passage intentionally resonates
    with wind and Spirit imagery. To preserve theological and literary tension rather
    than over-resolve it, the main text uses 'breath' here and a footnote preserves
    'spirit' as an alternative.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
