theological_decisions:
- issue: Multivalence of רוּחַ in the valley vision
  chosen_reading: Render singular רוּחַ here as 'breath' and plural רוּחוֹת as 'winds,' while preserving 'spirit' as an alternative in a footnote.
  alternative_readings:
  - Render all occurrences as 'spirit'
  - Render all occurrences as 'wind'
  rationale: The verse intentionally plays on the semantic range of רוּחַ. Translating the singular as 'breath' best fits the immediate action of revivification, while 'four winds' is the idiomatic expression for the directions. A footnote preserves the theological-literary resonance with 'spirit' without collapsing the ambiguity.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
