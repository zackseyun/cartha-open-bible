id: EZK.37.9
reference: Ezekiel 37:9
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֔/י הִנָּבֵ֖א אֶל הָ/ר֑וּחַ הִנָּבֵ֣א בֶן אָ֠דָם וְ/אָמַרְתָּ֨ אֶל הָ/ר֜וּחַ כֹּֽה אָמַ֣ר אֲדֹנָ֣/י יְהוִ֗ה מֵ/אַרְבַּ֤ע רוּחוֹת֙ בֹּ֣אִי הָ/ר֔וּחַ וּ/פְחִ֛י בַּ/הֲרוּגִ֥ים הָ/אֵ֖לֶּה וְ/יִֽחְיֽוּ־־־־׀׃
translation:
  text: 'Then he said to me[a], “Prophesy to the breath; prophesy, son of man, and say to the breath, ‘Thus says the Lord GOD: Come from the four winds, O breath, and breathe on these slain, so that they may live.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew רוּחַ can mean breath, wind, or spirit. Here it is rendered 'breath' in the singular and 'winds' in 'the four winds'; alternatively, 'spirit' could be understood, preserving the vision's layered imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנָּבֵא
  chosen: Prophesy
  alternatives:
  - Prophesy forth
  - Speak prophetically
  lexicon: HALOT
  rationale: Imperative of נבא addressed to Ezekiel. 'Prophesy' is the standard concise rendering and preserves the prophetic speech-act force without paraphrase.
- source_word: הָרוּחַ / רוּחוֹת
  chosen: breath / winds
  alternatives:
  - spirit / spirits
  - wind / winds
  lexicon: HALOT
  rationale: רוּחַ is deliberately multivalent in this vision, capable of meaning breath, wind, or spirit. In this verse, the command 'breathe on these slain' and the result 'that they may live' strongly support 'breath' for the singular occurrences, while מֵאַרְבַּע רוּחוֹת naturally refers to the four winds/directions. This preserves the imagery without over-resolving the ambiguity; the alternative 'spirit' is preserved in a footnote.
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: This is Ezekiel's characteristic divine address. 'Son of man' is the most transparent and established rendering, and here it is not a christological title but a Hebrew idiom for the prophet's human status.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - Lord GOD
  - the Lord Yahweh
  lexicon: HALOT
  rationale: Following the doctrine default, יְהוָה is rendered 'the LORD.' In the compound title אֲדֹנָי יְהוִה, English convention avoids 'Lord LORD'; 'the Lord GOD' communicates the Hebrew title reverently and idiomatically.
- source_word: בֹּאִי
  chosen: Come
  alternatives:
  - Come in
  - Enter
  lexicon: HALOT
  rationale: Feminine singular imperative matching רוּחַ. 'Come' is the natural English imperative in this invocation.
- source_word: וּפְחִי
  chosen: breathe on
  alternatives:
  - blow upon
  - breathe into
  lexicon: HALOT
  rationale: From נפח, 'to blow, breathe.' With ב on the object, 'breathe on' is the most direct rendering and fits the life-giving imagery.
- source_word: בַּהֲרוּגִים הָאֵלֶּה
  chosen: on these slain
  alternatives:
  - on these killed ones
  - into these slain
  lexicon: HALOT
  rationale: הֲרוּגִים denotes those who have been killed/slain. 'These slain' is idiomatic and vivid in English, matching the battlefield vision.
- source_word: וְיִחְיוּ
  chosen: so that they may live
  alternatives:
  - and let them live
  - that they may come to life
  lexicon: HALOT
  rationale: The prefixed conjunction plus imperfect expresses purpose/result in context. 'So that they may live' captures the intended outcome of the command.
