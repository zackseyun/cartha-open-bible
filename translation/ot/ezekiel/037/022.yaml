id: EZK.37.22
reference: Ezekiel 37:22
source:
  edition: WLC
  text: וְ/עָשִׂ֣יתִי אֹ֠תָ/ם לְ/ג֨וֹי אֶחָ֤ד בָּ/אָ֨רֶץ֙ בְּ/הָרֵ֣י יִשְׂרָאֵ֔ל וּ/מֶ֧לֶךְ
    אֶחָ֛ד יִֽהְיֶ֥ה לְ/כֻלָּ֖/ם לְ/מֶ֑לֶךְ וְ/לֹ֤א יהיה עוֹד֙ לִ/שְׁנֵ֣י גוֹיִ֔ם
    וְ/לֹ֨א יֵחָ֥צוּ ע֛וֹד לִ/שְׁתֵּ֥י מַמְלָכ֖וֹת עֽוֹד־׃
translation:
  text: And I will make them one nation in the land, on the mountains of Israel, and
    one king will be king over all of them. They will no longer be two nations, and
    they will no longer be divided into two kingdoms.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in the hill country of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew, 'and one king will be for all of them as king,' with repetition
      for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתִי
  chosen: And I will make
  alternatives:
  - And I will make into
  - And I will form
  lexicon: HALOT
  rationale: The verb עשה here takes the object plus לְ to indicate making the people
    into something. 'And I will make' is natural English and preserves the divine
    causation without over-paraphrase.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct object pronoun referring to the previously mentioned divided people;
    straightforwardly rendered 'them'.
- source_word: לְגוֹי אֶחָד
  chosen: one nation
  alternatives:
  - one people
  lexicon: HALOT
  rationale: גּוֹי commonly means 'nation.' Although 'people' is possible in some
    contexts, the parallel with 'two nations' later in the verse favors consistent
    rendering as 'nation' here.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the country
  - in the earth
  lexicon: HALOT
  rationale: In Ezekiel, הָאָרֶץ often refers to the specific land promised to Israel
    rather than the earth in general. 'In the land' preserves that covenant-geographic
    sense.
- source_word: בְּהָרֵי יִשְׂרָאֵל
  chosen: on the mountains of Israel
  alternatives:
  - in the hill country of Israel
  lexicon: HALOT
  rationale: A characteristic Ezekiel expression. 'Mountains of Israel' is the more
    formal and textually transparent rendering; 'on' fits the topographical phrase
    naturally in English.
- source_word: וּמֶלֶךְ אֶחָד יִהְיֶה לְכֻלָּם לְמֶלֶךְ
  chosen: and one king will be king over all of them
  alternatives:
  - and one king will be for all of them as king
  - and one king will rule over all of them
  lexicon: HALOT
  rationale: The Hebrew repeats 'king' for emphasis. Rendering it as 'will be king
    over all of them' preserves the nominal emphasis better than simply 'will rule,'
    while still reading naturally.
- source_word: וְלֹא יִהְיֶה עוֹד לִשְׁנֵי גוֹיִם
  chosen: They will no longer be two nations
  alternatives:
  - They will not again be two nations
  lexicon: HALOT
  rationale: Although the Hebrew verb is singular ('it/he will be'), the sense is
    clearly predicated of the people as a collective. English idiom prefers the plural
    subject carried forward from 'them.' 'No longer' captures עוֹד in context.
- source_word: וְלֹא יֵחָצוּ
  chosen: and they will no longer be divided
  alternatives:
  - and they will no longer split themselves
  - and they will no longer be separated
  lexicon: HALOT
  rationale: 'The Niphal of חצה here is passive/reflexive in sense: the people will
    not be split. ''Be divided'' is the clearest modern English equivalent.'
- source_word: לִשְׁתֵּי מַמְלָכוֹת
  chosen: into two kingdoms
  alternatives:
  - as two kingdoms
  lexicon: HALOT
  rationale: מַמְלָכוֹת means 'kingdoms.' 'Into two kingdoms' fits the verb 'be divided'
    and reflects the political division between north and south.
- source_word: עוֹד ... עוֹד
  chosen: no longer
  alternatives:
  - again
  - anymore
  lexicon: HALOT
  rationale: The repeated עוֹד intensifies the promise of permanent reversal. English
    idiom expresses this naturally with repeated 'no longer' rather than a more wooden
    'again' or 'anymore'.
