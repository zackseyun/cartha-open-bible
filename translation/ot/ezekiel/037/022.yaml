theological_decisions:
- issue: Nature of Israel's promised reunification
  chosen_reading: Render the promise in straightforward national and royal terms without
    importing later messianic interpretation into the verse itself.
  alternative_readings:
  - Explicitly messianic wording in the main text
  - Purely symbolic/spiritualized reunification
  rationale: The verse itself speaks of reunified nationhood, land, and one king.
    While the broader context may invite messianic interpretation, this verse does
    not name the king as Messiah here, so the translation should preserve the immediate
    prophetic wording without doctrinal expansion.
  doctrine_reference: Preserve theological tension rather than resolve it.
