id: EZK.37.8
reference: Ezekiel 37:8
source:
  edition: WLC
  text: וְ/רָאִ֜יתִי וְ/הִנֵּֽה עֲלֵי/הֶ֤ם גִּדִים֙ וּ/בָשָׂ֣ר עָלָ֔ה וַ/יִּקְרַ֧ם עֲלֵי/הֶ֛ם ע֖וֹר מִ/לְ/מָ֑עְלָ/ה וְ/ר֖וּחַ אֵ֥ין בָּ/הֶֽם־׃
translation:
  text: And I looked[a], and behold, there were sinews on them, and flesh had come up, and skin covered them from above; but there was no breath in them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew ruach can mean 'breath,' 'wind,' or 'spirit.' Here 'breath' fits the lifeless bodies, but the wider passage plays on all three senses.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאִיתִי
  chosen: And I looked
  alternatives:
  - And I saw
  lexicon: HALOT
  rationale: The verb ראה in first person can be rendered either 'saw' or 'looked.' 'Looked' fits the sequential visionary narration in English while preserving the prophet's act of observation.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention to what follows. 'Behold' preserves the vividness and suddenness of the vision better than a flatter rendering.
- source_word: עֲלֵיהֶם
  chosen: on them
  alternatives:
  - upon them
  lexicon: HALOT
  rationale: The preposition על with pronominal suffix indicates placement upon the bones/bodies. 'On them' is natural modern English and sufficiently literal.
- source_word: גִּדִים
  chosen: sinews
  alternatives:
  - tendons
  lexicon: HALOT
  rationale: גידים refers to connective tissues such as sinews/tendons. 'Sinews' is traditional and vivid in this resurrection imagery; 'tendons' is possible but more clinical.
- source_word: וּבָשָׂר עָלָה
  chosen: and flesh had come up
  alternatives:
  - and flesh came upon them
  - and flesh grew
  lexicon: HALOT
  rationale: בשר is literal bodily flesh here, and עלה conveys coming up/growing over the bones. 'Had come up' reflects the completed stage in the visionary sequence without over-paraphrasing.
- source_word: וַיִּקְרַם
  chosen: and skin covered
  alternatives:
  - and skin spread over
  - and skin formed over
  lexicon: HALOT
  rationale: The verb קרם denotes covering over or forming a layer. 'Covered' best captures the visible result in idiomatic English.
- source_word: עוֹר
  chosen: skin
  alternatives:
  - hide
  lexicon: HALOT
  rationale: עוֹר in this human-body context is plainly 'skin,' not animal 'hide.'
- source_word: מִלְמָעְלָה
  chosen: over from above
  alternatives:
  - above
  - on the surface above
  lexicon: HALOT
  rationale: The phrase indicates the skin covered them on the outside/top side. 'Over from above' preserves the directional nuance while remaining readable.
- source_word: וְרוּחַ אֵין בָּהֶם
  chosen: but there was no breath in them
  alternatives:
  - and there was no breath in them
  - but there was no spirit in them
  - but there was no wind in them
  lexicon: HALOT
  rationale: רוּחַ can mean breath, wind, or spirit. In this immediate context of lifeless bodies awaiting animation, 'breath' is the most contextually appropriate main-text rendering. The broader passage intentionally plays on the semantic range, so alternatives are preserved in a footnote.
