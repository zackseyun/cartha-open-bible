  chosen_reading: breath
  alternative_readings:
  - spirit
  - wind
  rationale: The immediate clause describes bodies that have been physically reassembled but remain lifeless, so 'breath' best fits the narrative stage. However, Ezekiel 37 intentionally exploits the overlap between breath, wind, and spirit; therefore the alternatives should be preserved rather than erased.
