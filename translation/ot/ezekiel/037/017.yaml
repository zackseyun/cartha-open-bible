id: EZK.37.17
reference: Ezekiel 37:17
source:
  edition: WLC
  text: וְ/קָרַ֨ב אֹתָ֜/ם אֶחָ֧ד אֶל אֶחָ֛ד לְ/ךָ֖ לְ/עֵ֣ץ אֶחָ֑ד וְ/הָי֥וּ לַ/אֲחָדִ֖ים בְּ/יָדֶֽ/ךָ־׃
translation:
  text: Then bring them near to each other for yourself as one stick[b][a], so that they may become one in your hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as one stick.' The Hebrew phrase can express either the result 'into one stick' or the state 'as one stick.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'and they shall be for ones in your hand,' an idiom meaning that they become one.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקָרַב
  chosen: Then bring ... near
  alternatives:
  - and bring ... near
  - join
  lexicon: HALOT
  rationale: Imperative 2ms from קרב, here commanding Ezekiel to bring the two pieces into proximity. 'Then bring ... near' preserves the sequential force of waw while sounding natural in English. 'Join' is possible contextually but is slightly more interpretive than the basic sense 'bring near'.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct-object pronoun referring to the two sticks named in the previous verse.
- source_word: אֶחָד אֶל אֶחָד
  chosen: to each other
  alternatives:
  - one to another
  - one to the other
  lexicon: HALOT
  rationale: The idiom literally reads 'one to one/another.' 'To each other' is idiomatic modern English that preserves the reciprocal sense.
- source_word: לְךָ
  chosen: for yourself
  alternatives:
  - for you
  - to you
  lexicon: HALOT
  rationale: The dative marks relation to Ezekiel in carrying out the sign-act. 'For yourself' reflects the personal involvement without overtranslating.
- source_word: לְעֵץ אֶחָד
  chosen: into one stick
  alternatives:
  - as one stick
  - into one piece of wood
  lexicon: HALOT
  rationale: עֵץ can mean 'tree,' 'wood,' or 'wooden object'; in this enacted sign it refers to the inscribed wooden sticks. 'Into one stick' best fits the immediate context and the resultative force of לְ.
- source_word: וְהָיוּ
  chosen: so that they may become
  alternatives:
  - and they shall be
  - and they will become
  lexicon: HALOT
  rationale: Though formally a qatal with waw, in this instructional context it expresses the intended result of the command. 'So that they may become' communicates the resultative nuance naturally in English.
- source_word: לַאֲחָדִים
  chosen: one
  alternatives:
  - joined together
  - as one
  lexicon: HALOT
  rationale: Plural form from 'one' used predicatively to express unity. English idiom prefers singular 'one' here. The sense is not merely proximity but unified identity.
- source_word: בְיָדֶךָ
  chosen: in your hand
  alternatives:
  - in your grasp
  lexicon: HALOT
  rationale: Literal and clear; it also preserves the visible sign-act imagery of the two sticks becoming one in Ezekiel's hand.
