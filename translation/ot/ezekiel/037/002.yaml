id: EZK.37.2
reference: Ezekiel 37:2
source:
  edition: WLC
  text: וְ/הֶעֱבִירַ֥/נִי עֲלֵי/הֶ֖ם סָבִ֣יב סָבִ֑יב וְ/הִנֵּ֨ה רַבּ֤וֹת מְאֹד֙ עַל
    פְּנֵ֣י הַ/בִּקְעָ֔ה וְ/הִנֵּ֖ה יְבֵשׁ֥וֹת מְאֹֽד׀־׃
translation:
  text: And he led me around among them, all around; and behold, there were very many
    on the surface of the valley, and behold, they were very dry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he caused me to pass over them all around.' The Hebrew can be rendered
      more formally, but the main text expresses the likely spatial sense in natural
      English.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'on the face of the valley.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶעֱבִירַנִי
  chosen: he led me around
  alternatives:
  - he caused me to pass
  - he brought me through
  lexicon: HALOT
  rationale: The Hiphil of עבר commonly means to cause someone to pass or move. In
    this vision context, 'led me around' communicates guided movement naturally in
    English while preserving the causative sense.
- source_word: עֲלֵיהֶם
  chosen: among them
  alternatives:
  - over them
  - by them
  lexicon: HALOT
  rationale: Although the preposition is literally 'over/upon them,' in context with
    the movement verb and the surrounding description of the bones in the valley,
    the sense is that Ezekiel is taken about in relation to them. 'Among them' best
    captures the spatial relationship in idiomatic English without implying flight
    above them.
- source_word: סָבִיב סָבִיב
  chosen: all around
  alternatives:
  - round about
  - around and around
  lexicon: HALOT
  rationale: The repetition intensifies the circling movement. 'All around' preserves
    the emphatic distributive force in clear modern English.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - and there were
  lexicon: HALOT
  rationale: The particle marks vivid attention within prophetic vision narrative.
    'Behold' preserves that rhetorical force better than flattening it into simple
    narration.
- source_word: רַבּוֹת מְאֹד
  chosen: very many
  alternatives:
  - exceedingly many
  - a great many
  lexicon: HALOT
  rationale: This feminine plural adjective with intensifier refers to the bones implied
    from the previous verse. 'Very many' is direct and natural while retaining the
    strong emphasis.
- source_word: עַל־פְּנֵי הַבִּקְעָה
  chosen: on the surface of the valley
  alternatives:
  - upon the face of the valley
  - across the valley floor
  lexicon: HALOT
  rationale: The idiom 'upon the face of' refers to being spread over the visible
    surface. 'On the surface of the valley' preserves the Hebrew image more closely
    than the more interpretive 'valley floor.'
- source_word: יְבֵשׁוֹת מְאֹד
  chosen: very dry
  alternatives:
  - exceedingly dry
  - completely dry
  lexicon: HALOT
  rationale: The adjective with intensifier describes the bones' condition. 'Very
    dry' is simple, accurate, and preserves the emphasis without overstating it.
