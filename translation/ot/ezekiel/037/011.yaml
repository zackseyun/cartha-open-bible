id: EZK.37.11
reference: Ezekiel 37:11
source:
  edition: WLC
  text: וַ/יֹּאמֶר֮ אֵלַ/י֒ בֶּן אָדָ֕ם הָ/עֲצָמ֣וֹת הָ/אֵ֔לֶּה כָּל בֵּ֥ית יִשְׂרָאֵ֖ל הֵ֑מָּה הִנֵּ֣ה אֹמְרִ֗ים יָבְשׁ֧וּ עַצְמוֹתֵ֛י/נוּ וְ/אָבְדָ֥ה תִקְוָתֵ֖/נוּ נִגְזַ֥רְנוּ לָֽ/נוּ־־׃
translation:
  text: Then he said to me[a], “Son of man, these bones are the whole house of Israel. Behold, they are saying, ‘Our bones have dried up, and our hope has perished[b]; we are cut off.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Our bones are dried up … our hope is lost.”
    reason: lexical_alternative
  - marker: b
    text: “We are cut off” may also convey “we are finished” or “we are severed off.”
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: Retains the established prophetic address and matches the Hebrew idiom literally enough without flattening its force. Although 'mortal' is possible in Ezekiel, 'Son of man' preserves the source expression and its repeated usage in the book.
- source_word: הָעֲצָמוֹת הָאֵלֶּה
  chosen: these bones
  lexicon: HALOT
  rationale: Straightforward demonstrative phrase; formal rendering is natural in English and important for the vision's imagery.
- source_word: כָּל בֵּית יִשְׂרָאֵל
  chosen: the whole house of Israel
  alternatives:
  - all the house of Israel
  - the entire house of Israel
  lexicon: HALOT
  rationale: Preserves the collective covenantal expression 'house of Israel' rather than paraphrasing as 'people of Israel.' 'Whole' reflects כָּל naturally.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  lexicon: HALOT
  rationale: Uses readable modern English while preserving the deictic, attention-directing force of the particle.
- source_word: אֹמְרִים
  chosen: they are saying
  alternatives:
  - they say
  lexicon: HALOT
  rationale: The participle conveys ongoing or characteristic speech; the progressive English form captures that aspect better than a simple present.
- source_word: יָבְשׁוּ עַצְמוֹתֵינוּ
  chosen: Our bones have dried up
  alternatives:
  - Our bones are dried up
  - Our bones have become dry
  lexicon: HALOT
  rationale: The perfect verb is rendered with English present perfect to convey a resulting state from completed action. This keeps the metaphor vivid and natural.
- source_word: וְאָבְדָה תִקְוָתֵנוּ
  chosen: and our hope has perished
  alternatives:
  - and our hope is lost
  - and our hope has been destroyed
  lexicon: HALOT
  rationale: אָבַד commonly means perish/be lost. 'Has perished' preserves the starkness and poetic parallelism with the dried bones imagery better than the flatter 'is lost.'
- source_word: נִגְזַרְנוּ לָנוּ
  chosen: we are cut off
  alternatives:
  - we have been cut off for ourselves
  - we are cut down
  lexicon: HALOT
  rationale: The Niphal of גזר here expresses being cut off/severed. The added לָנוּ is idiomatic and intensifying rather than requiring a separate English object; concise 'we are cut off' best captures the sense of utter exclusion or destruction.
