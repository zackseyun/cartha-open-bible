id: EZK.37.24
reference: Ezekiel 37:24
source:
  edition: WLC
  text: וְ/עַבְדִּ֤/י דָוִד֙ מֶ֣לֶךְ עֲלֵי/הֶ֔ם וְ/רוֹעֶ֥ה אֶחָ֖ד יִהְיֶ֣ה לְ/כֻלָּ֑/ם
    וּ/בְ/מִשְׁפָּטַ֣/י יֵלֵ֔כוּ וְ/חֻקֹּתַ֥/י יִשְׁמְר֖וּ וְ/עָשׂ֥וּ אוֹתָֽ/ם׃
translation:
  text: My servant David will be king over them, and there will be one shepherd for
    all of them. They will walk in my judgments, and they will keep my statutes and
    do them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he will be one shepherd for them all.' The Hebrew can be understood
      with the shepherd clause referring directly to David.
    reason: lexical_alternative
  - marker: b
    text: '''David'' may refer literally to David, to a future Davidic ruler, or typologically
      to the Messiah; the translation preserves the Hebrew wording without resolving
      the interpretation.'
    reason: alternative_reading
lexical_decisions:
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: עֶבֶד commonly means servant/slave. Here it functions as an honorific
    covenantal designation for David in a royal-prophetic context rather than emphasizing
    bonded status, so 'my servant' best fits the register while preserving the possessive
    relationship.
- source_word: דָוִד
  chosen: David
  rationale: Personal name is transliterated by standard English convention, per translation
    philosophy.
- source_word: מֶלֶךְ עֲלֵיהֶם
  chosen: be king over them
  alternatives:
  - be ruler over them
  lexicon: HALOT
  rationale: מֶלֶךְ is straightforwardly 'king.' The preposition עַל with pronominal
    suffix indicates rule 'over' them. 'King' preserves the royal sense better than
    the broader 'ruler.'
- source_word: וְרֹעֶה אֶחָד יִהְיֶה לְכֻלָּם
  chosen: there will be one shepherd for all of them
  alternatives:
  - he will be one shepherd for all of them
  - and one shepherd will be for them all
  lexicon: HALOT
  rationale: רֹעֶה is literally 'shepherd' and should be retained because of its royal
    and pastoral imagery. The clause can be rendered impersonally ('there will be')
    or personally ('he will be'); the Hebrew predicate construction naturally yields
    'there will be one shepherd for all of them,' emphasizing unified leadership.
- source_word: מִשְׁפָּטַי
  chosen: my judgments
  alternatives:
  - my ordinances
  - my rules
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote judgments, ordinances, or legal decisions. 'Judgments'
    is a relatively formal but transparent rendering that preserves the juridical
    nuance and pairs well with 'statutes' in the next clause.
- source_word: יֵלֵכוּ
  chosen: will walk
  alternatives:
  - will live
  - will follow
  lexicon: HALOT
  rationale: הלך in covenantal contexts is often metaphorical for conduct. 'Walk'
    preserves the Hebrew idiom and remains readable in modern English.
- source_word: חֻקֹּתַי
  chosen: my statutes
  alternatives:
  - my decrees
  lexicon: HALOT
  rationale: חֹק/חֻקָּה commonly refers to prescribed statutes. 'Statutes' preserves
    the legal-covenantal distinction from מִשְׁפָּטַי.
- source_word: יִשְׁמְרוּ
  chosen: will keep
  alternatives:
  - will observe
  - will guard
  lexicon: HALOT
  rationale: שׁמר in legal contexts often means keep/observe. 'Keep' is concise, idiomatic,
    and standard in covenantal formulations.
- source_word: וְעָשׂוּ אוֹתָם
  chosen: and do them
  alternatives:
  - and practice them
  - and carry them out
  lexicon: HALOT
  rationale: עשה with object pronoun refers to putting the statutes into practice.
    'Do them' is the most direct rendering and preserves the Hebrew emphasis on obedience
    in action.
