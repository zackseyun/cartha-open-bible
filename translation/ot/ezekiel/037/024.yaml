theological_decisions:
- issue: Identity of 'David' in this restoration oracle
  chosen_reading: Retain 'David' in the main text without interpretive expansion.
  alternative_readings:
  - the historical David restored
  - a Davidic ruler/descendant
  - the Messiah as Davidic shepherd-king
  rationale: The Hebrew text says 'David' plainly. Because the verse may be read typologically
    or messianically within Christian theology, the translation should preserve the
    wording and not import an explicit interpretive gloss such as 'the Messiah' into
    the text itself. This preserves theological tension rather than resolving it in
    translation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
