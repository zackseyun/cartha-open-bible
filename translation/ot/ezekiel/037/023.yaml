theological_decisions:
- issue: Meaning of the salvation statement in relation to sin and exile
  chosen_reading: The verse speaks of God's restorative rescue from the contexts in
    which Israel sinned, leading to cleansing and renewed covenant relationship.
  alternative_readings:
  - The verse refers more specifically to rescue from exile locations
  - The verse refers to rescue from all apostasies rather than from places
  rationale: The Hebrew phrase involving 'dwelling places' is textually and interpretively
    difficult. The translation preserves the MT's wording without importing a narrower
    doctrinal claim. The sequence of rescue, cleansing, and covenant formula is maintained
    as divine initiative without specifying later theological systems beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
