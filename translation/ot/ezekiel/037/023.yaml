id: EZK.37.23
reference: Ezekiel 37:23
source:
  edition: WLC
  text: וְ/לֹ֧א יִֽטַמְּא֣וּ ע֗וֹד בְּ/גִלּֽוּלֵי/הֶם֙ וּ/בְ/שִׁקּ֣וּצֵי/הֶ֔ם וּ/בְ/כֹ֖ל
    פִּשְׁעֵי/הֶ֑ם וְ/הוֹשַׁעְתִּ֣י אֹתָ֗/ם מִ/כֹּ֤ל מוֹשְׁבֹֽתֵי/הֶם֙ אֲשֶׁ֣ר חָטְא֣וּ
    בָ/הֶ֔ם וְ/טִהַרְתִּ֤י אוֹתָ/ם֙ וְ/הָיוּ לִ֣/י לְ/עָ֔ם וַ/אֲנִ֕י אֶהְיֶ֥ה לָ/הֶ֖ם
    לֵ/אלֹהִֽים־׃
translation:
  text: They will no longer defile themselves with their idols, with their detestable
    things, or with any of their transgressions. I will save them from all their apostasies
    by which they have sinned, and I will cleanse them. Then they will be my people,
    and I will be their God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from all their settlements where they sinned'; some understand the phrase
      more generally as rescue from all the places or circumstances associated with
      their sin.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'idols' here uses a strongly contemptuous term for false gods.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִטַמְּאוּ
  chosen: defile themselves
  alternatives:
  - become unclean
  - make themselves unclean
  lexicon: HALOT
  rationale: The Hitpael/reflexive sense indicates self-defilement rather than merely
    becoming ceremonially unclean. 'Defile themselves' is natural English and preserves
    the moral-cultic force in context.
- source_word: גִּלּוּלֵיהֶם
  chosen: their idols
  alternatives:
  - their dung-idols
  - their filthy idols
  lexicon: HALOT
  rationale: The term is Ezekiel's strongly pejorative word for idols. 'Their idols'
    is the clearest main-text rendering; the more vivid contempt embedded in the Hebrew
    is real but would sound overly interpretive in the main line of English.
- source_word: שִׁקּוּצֵיהֶם
  chosen: their detestable things
  alternatives:
  - their abominations
  lexicon: HALOT
  rationale: This noun denotes abhorrent, especially idolatrous, objects or practices.
    'Detestable things' is readable modern English and preserves the revulsive force
    without relying on the more traditional but potentially flattened 'abominations'.
- source_word: פִּשְׁעֵיהֶם
  chosen: their transgressions
  alternatives:
  - their rebellions
  - their offenses
  lexicon: HALOT
  rationale: פשע often carries the sense of rebellion or breach against rightful authority.
    'Transgressions' is a standard, accurate rendering here, while the broader context
    already conveys covenantal rebellion.
- source_word: וְהוֹשַׁעְתִּי
  chosen: I will save them
  alternatives:
  - I will deliver them
  lexicon: HALOT
  rationale: The verb ישׁע commonly means save/deliver. 'Save' is retained because
    it is both accurate and theologically weighty, while still fitting the immediate
    context of rescue from sinful conditions.
- source_word: מוֹשְׁבֹתֵיהֶם
  chosen: their dwelling places
  alternatives:
  - their settlements
  - their habitations
  lexicon: HALOT
  rationale: The noun denotes places where they dwell. 'Dwelling places' is a transparent
    rendering. Because the phrase is difficult in context, this wording preserves
    the Hebrew image without over-resolving whether the focus is geographic locations
    or spheres of life.
- source_word: אֲשֶׁר חָטְאוּ בָהֶם
  chosen: in which they sinned
  alternatives:
  - where they sinned
  - by which they sinned
  lexicon: HALOT
  rationale: The relative clause most naturally modifies 'dwelling places.' 'In which
    they sinned' keeps the Hebrew linkage and avoids paraphrasing. The phrase is syntactically
    awkward enough that an alternative is worth preserving in a footnote.
- source_word: וְטִהַרְתִּי
  chosen: I will cleanse them
  alternatives:
  - I will purify them
  lexicon: HALOT
  rationale: The verb carries both ritual and moral purification. 'Cleanse' is idiomatic
    and preserves both dimensions in this restoration context.
- source_word: וְהָיוּ לִי לְעָם
  chosen: they will be my people
  alternatives:
  - they will become a people for me
  lexicon: HALOT
  rationale: This is standard covenant formula language. The established English form
    accurately reflects the Hebrew and preserves the covenantal resonance.
- source_word: וַאֲנִי אֶהְיֶה לָהֶם לֵאלֹהִים
  chosen: I will be their God
  alternatives:
  - I will become God to them
  lexicon: HALOT
  rationale: This is the matching covenant formula. 'I will be their God' is the natural
    and theologically faithful rendering.
