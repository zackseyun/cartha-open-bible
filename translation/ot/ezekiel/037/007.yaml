id: EZK.37.7
reference: Ezekiel 37:7
source:
  edition: WLC
  text: וְ/נִבֵּ֖אתִי כַּ/אֲשֶׁ֣ר צֻוֵּ֑יתִי וַֽ/יְהִי ק֤וֹל כְּ/הִנָּֽבְאִ/י֙ וְ/הִנֵּה רַ֔עַשׁ וַ/תִּקְרְב֣וּ עֲצָמ֔וֹת עֶ֖צֶם אֶל עַצְמֽ/וֹ־־־׃
translation:
  text: So I prophesied as I was commanded[a], and as I prophesied, there was a sound, and behold, a rattling, and the bones came together[b], bone to its bone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a shaking' or 'an earthquake' for 'a rattling' (רַעַשׁ); the context of bones assembling favors the more specific sense of rattling.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'bone to its bone,' a distributive expression indicating each bone joined to its matching bone.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִבֵּאתִי
  chosen: I prophesied
  alternatives:
  - I spoke as a prophet
  - I proclaimed
  lexicon: HALOT
  rationale: The Niphal of נבא in Ezekiel regularly denotes prophetic speech. 'I prophesied' is the most natural and established English rendering without unnecessary paraphrase.
- source_word: כַּאֲשֶׁר צֻוֵּיתִי
  chosen: as I was commanded
  alternatives:
  - just as I had been commanded
  - as I was instructed
  lexicon: HALOT
  rationale: צוה in the passive here indicates Ezekiel received a command. 'As I was commanded' is concise and preserves the passive force.
- source_word: וַיְהִי קוֹל
  chosen: there was a sound
  alternatives:
  - a sound came
  - there came a sound
  - there was a noise
  lexicon: HALOT
  rationale: The clause introduces an audible phenomenon. 'There was a sound' is idiomatic and leaves the nature of the sound to the following noun רַעַשׁ rather than collapsing the two terms into one.
- source_word: כְּהִנָּבְאִי
  chosen: as I prophesied
  alternatives:
  - while I was prophesying
  - when I prophesied
  lexicon: HALOT
  rationale: The infinitive construct with prefixed כ expresses temporal concurrence. 'As I prophesied' captures the ongoing timing naturally in English.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and suddenly
  lexicon: HALOT
  rationale: הִנֵּה marks vivid attention to what follows. 'Behold' preserves the prophetic immediacy better than flatter modern substitutes.
- source_word: רַעַשׁ
  chosen: a rattling
  alternatives:
  - an earthquake
  - a shaking
  - a rattling noise
  lexicon: HALOT
  rationale: רַעַשׁ can denote shaking, quaking, or rattling. In this context of dry bones assembling, 'a rattling' best fits the immediate imagery and avoids overstating the event as an earthquake.
- source_word: וַתִּקְרְבוּ עֲצָמוֹת
  chosen: the bones came together
  alternatives:
  - the bones came near
  - bones approached
  lexicon: HALOT
  rationale: קרב literally means 'come near,' but here the sense is the bones moving into proper relation with one another. 'Came together' communicates the result in natural English.
- source_word: עֶצֶם אֶל עַצְמוֹ
  chosen: bone to its bone
  alternatives:
  - each bone to its bone
  - bone to bone
  lexicon: HALOT
  rationale: The singular distributive construction indicates each bone matching with its corresponding bone. 'Bone to its bone' preserves the Hebrew's vivid, slightly unusual phrasing better than smoothing it to 'bone to bone.'
