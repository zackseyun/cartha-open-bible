id: EZK.25.8
reference: Ezekiel 25:8
source:
  edition: WLC
  text: כֹּ֥ה אָמַ֖ר אֲדֹנָ֣/י יְהוִ֑ה יַ֗עַן אֲמֹ֤ר מוֹאָב֙ וְ/שֵׂעִ֔יר הִנֵּ֥ה כְּ/כָֽל הַ/גּוֹיִ֖ם בֵּ֥ית יְהוּדָֽה־׃
translation:
  text: 'Thus says the Lord GOD: Because Moab and Seir say[a], ‘Behold, the house of Judah is like all the nations,’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Seir,' the mountainous region associated with Edom; some translations render the sense more broadly as 'Edom.'
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal prophetic register without sounding archaic beyond normal biblical English.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound divine title combines Adonai with YHWH. Following the doctrine default, YHWH is rendered 'the LORD'; in the conventional English handling of the compound title, this becomes 'the Lord GOD' to distinguish the two elements and avoid 'Lord LORD.'
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Since
  - On account of
  lexicon: HALOT
  rationale: Introduces the reason for the ensuing judgment. 'Because' is the clearest natural English equivalent.
- source_word: אֲמֹר
  chosen: say
  alternatives:
  - said
  - have said
  lexicon: HALOT
  rationale: The infinitive construct after יַעַן functions causally, 'because of saying / because ... say.' Present 'say' works idiomatically in English within the prophetic accusation formula.
- source_word: מוֹאָב וְשֵׂעִיר
  chosen: Moab and Seir
  alternatives:
  - Moab and Edom
  lexicon: HALOT
  rationale: The Hebrew text names 'Seir,' so the translation preserves the proper name rather than replacing it with the broader associated region/nation 'Edom.' Because readers may associate Seir with Edom, the alternative is worth preserving in a footnote.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Marks the quoted exclamation. 'Look' is readable modern English and preserves the deictic force better than omitting the particle.
- source_word: כְּכָל הַגּוֹיִם
  chosen: like all the nations
  alternatives:
  - like all the Gentiles
  - just like every other nation
  lexicon: HALOT
  rationale: גּוֹיִם here refers to the surrounding nations/peoples, not specifically 'Gentiles' in a later technical sense. 'Like all the nations' preserves the comparative force of כְּ and the collective sense.
- source_word: בֵּית יְהוּדָה
  chosen: the house of Judah
  alternatives:
  - Judah
  - the household of Judah
  lexicon: HALOT
  rationale: A standard national designation. 'House of Judah' preserves the covenantal and corporate nuance better than the shorter 'Judah.'
