id: EZK.25.11
reference: Ezekiel 25:11
source:
  edition: WLC
  text: וּ/בְ/מוֹאָ֖ב אֶעֱשֶׂ֣ה שְׁפָטִ֑ים וְ/יָדְע֖וּ כִּֽי אֲנִ֥י יְהוָֽה־׃ס
translation:
  text: And in Moab I will execute judgments[a], and they will know that I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or "Yahweh" for "the LORD" (Hebrew: YHWH).'
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/בְ/מוֹאָב
  chosen: And in Moab
  alternatives:
  - And against Moab
  - And on Moab
  lexicon: HALOT
  rationale: The preposition ב commonly means 'in' or 'within.' Here it marks the sphere in which YHWH's judicial action occurs. English 'in Moab' is the most direct rendering, while 'against Moab' is interpretive and could be inferred from context but is not the plain prepositional sense.
- source_word: אֶעֱשֶׂה
  chosen: I will execute
  alternatives:
  - I will do
  - I will carry out
  lexicon: HALOT
  rationale: The verb עשה is broad ('do, make'), but with שפטים it idiomatically means to carry out or execute judicial acts. 'Execute' best captures the legal/judicial force in natural English without over-paraphrasing.
- source_word: שְׁפָטִים
  chosen: judgments
  alternatives:
  - acts of judgment
  - justice
  lexicon: HALOT
  rationale: The plural noun denotes judicial punishments or judgments. 'Judgments' preserves the formal lexical link and the plural form. 'Acts of judgment' is possible but slightly more expansive than the Hebrew.
- source_word: וְ/יָדְעוּ
  chosen: and they will know
  alternatives:
  - then they will know
  lexicon: HALOT
  rationale: The waw plus perfect here functions with future/resultative sense in context. 'And they will know' is a straightforward rendering; 'then they will know' makes the consequential nuance more explicit but adds a temporal marker not present in the Hebrew.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  lexicon: HALOT
  rationale: 'Here כּי introduces the content of what they will know: ''that I am the LORD.'' ''For'' would be less natural and less precise in this clause.'
- source_word: אֲנִי יְהוָה
  chosen: I am the LORD
  alternatives:
  - I am Yahweh
  lexicon: HALOT
  rationale: This is the standard covenant formula in Ezekiel. Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated. The explicit pronoun 'I' is retained because it is present in the Hebrew and contributes emphasis.
