theological_decisions:
- issue: Metaphorical-cultic language for Jerusalem as an adulterous woman
  chosen_reading: Retain the concrete imagery of architectural and bodily humiliation without softening it into abstract judgment language.
  alternative_readings:
  - Paraphrase as general destruction and disgrace
  rationale: The verse uses extended metaphor tied to Jerusalem's idolatry and covenant unfaithfulness. Preserving the concrete imagery respects the prophetic rhetoric and avoids importing interpretive abstraction beyond the Hebrew.
  doctrine_reference: Translation philosophy §§1, 3, 6
