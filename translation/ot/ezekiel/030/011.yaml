id: EZK.30.11
reference: Ezekiel 30:11
source:
  edition: WLC
  text: ה֠וּא וְ/עַמּ֤/וֹ אִתּ/וֹ֙ עָרִיצֵ֣י גוֹיִ֔ם מֽוּבָאִ֖ים לְ/שַׁחֵ֣ת הָ/אָ֑רֶץ וְ/הֵרִ֤יקוּ חַרְבוֹתָ/ם֙ עַל מִצְרַ֔יִם וּ/מָלְא֥וּ אֶת הָ/אָ֖רֶץ חָלָֽל־־׃
translation:
  text: He and his people with him—the ruthless of the nations—will be brought in to destroy the land[a]. They will draw their swords against Egypt and fill the land with the slain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ruthless ones of the nations' / 'the terrible ones of the nations.' The Hebrew expression emphasizes the brutal character of the invading peoples.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - his army
  - his troops
  lexicon: HALOT
  rationale: עַם commonly means 'people' and can include a military force in context. Here it refers to the forces accompanying the named conqueror, but 'his people' preserves the Hebrew wording without over-specifying 'army.'
- source_word: עָרִיצֵי גוֹיִם
  chosen: the most ruthless of the nations
  alternatives:
  - the ruthless ones of the nations
  - the terrible ones of the nations
  - the tyrants of the nations
  lexicon: HALOT
  rationale: עָרִיץ denotes the ruthless, violent, or terrifying. In Ezekiel it often describes brutal invaders. 'The most ruthless of the nations' is idiomatic English that preserves the superlative-like force of this construct expression.
- source_word: מֽוּבָאִים
  chosen: will be brought in
  alternatives:
  - are being brought
  - brought
  lexicon: HALOT
  rationale: Hophal participle of בוא conveys being caused to come, hence 'brought in.' Future sense fits the prophetic context and aligns with the following finite verbs.
- source_word: לְשַׁחֵת
  chosen: to destroy
  alternatives:
  - to ruin
  - to devastate
  lexicon: HALOT
  rationale: שׁחת in this context denotes destructive action against a land. 'Destroy' is the most direct and natural rendering.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: In this oracle against Egypt, אֶרֶץ refers to the territory/land of Egypt rather than the whole earth. 'The land' preserves the Hebrew term while fitting the context.
- source_word: וְהֵרִיקוּ חַרְבוֹתָם עַל
  chosen: They will draw their swords against
  alternatives:
  - they will unsheathe their swords against
  - they will pour out their swords upon
  lexicon: HALOT
  rationale: The idiom with ריק plus 'swords' means to draw or brandish/unsheathe them for attack. 'Draw their swords against' is clear modern English and captures the military idiom.
- source_word: מָלְאוּ אֶת־הָאָרֶץ חָלָל
  chosen: fill the land with the slain
  alternatives:
  - fill the land with corpses
  - fill the land with the wounded slain
  lexicon: HALOT
  rationale: חָלָל refers to those slain in battle. 'The slain' is more natural and dignified in English than 'corpses,' while preserving the sense of battlefield death.
