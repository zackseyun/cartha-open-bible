translation:
  text: 'Therefore prophesy concerning the land of Israel, and say to the mountains and the hills, to the ravines and the valleys, ‘Thus says the Lord GOD: Look, I have spoken in my jealousy and in my wrath, because you have borne the disgrace of the nations.’'
