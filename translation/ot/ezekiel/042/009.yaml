id: EZK.42.9
reference: Ezekiel 42:9
source:
  edition: WLC
  text: ו/מ/תחת/ה לשכות הָ/אֵ֑לֶּה ה/מבוא מֵֽ/הַ/קָּדִ֔ים בְּ/בֹא֣/וֹ לָ/הֵ֔נָּה מֵֽ/הֶ/חָצֵ֖ר הַ/חִצֹנָֽה׃
translation:
  text: And below these chambers was the entrance from the east[a], as one enters them from the outer court.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'from the east'; the phrase may indicate either the entrance's eastern location or approach from the east.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִתַּחְתֶּה
  chosen: And below
  alternatives:
  - And underneath
  - Now beneath
  lexicon: HALOT
  rationale: The compound conjunction/preposition introduces spatial relation to the previously described structure. 'And below' is natural English and preserves the locative sense without over-specifying architectural detail.
- source_word: לְשָׁכוֹת הָאֵלֶּה
  chosen: these chambers
  alternatives:
  - these rooms
  - these cells
  lexicon: HALOT
  rationale: לשכות in temple-building contexts commonly refers to chambers/rooms. 'Chambers' fits the architectural and cultic setting better than the more generic 'rooms'.
- source_word: הַמָּבוֹא
  chosen: the entrance
  alternatives:
  - the entryway
  - the access
  lexicon: HALOT
  rationale: The noun denotes a place of entry or entrance. 'Entrance' is the clearest modern English equivalent in this architectural description.
- source_word: מֵהַקָּדִים
  chosen: on the east side
  alternatives:
  - from the east
  - eastward
  lexicon: HALOT
  rationale: Literally 'from the east,' but in context it describes the location/orientation of the entrance. 'On the east side' communicates the spatial sense more idiomatically in English.
- source_word: בְּבֹאוֹ
  chosen: as one enters
  alternatives:
  - when he enters
  - in entering
  lexicon: HALOT
  rationale: The infinitive construct with pronominal suffix is somewhat impersonal in context, describing the act of entering. 'As one enters' avoids an unnecessarily specific male subject while preserving the procedural sense.
- source_word: לָהֵנָּה
  chosen: them
  alternatives:
  - these
  - into them
  lexicon: HALOT
  rationale: The feminine plural pronoun refers back to the chambers. English requires an object pronoun; 'them' is the most natural rendering, with the directional force supplied by 'enters them'.
- source_word: מֵהֶחָצֵר הַחִיצֹנָה
  chosen: from the outer court
  alternatives:
  - from the outer courtyard
  - from the exterior court
  lexicon: HALOT
  rationale: This is standard temple-complex terminology. 'Outer court' is concise and conventional while remaining clear to modern readers.
