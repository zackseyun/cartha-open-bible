id: EZK.41.10
reference: Ezekiel 41:10
source:
  edition: WLC
  text: וּ/בֵ֨ין הַ/לְּשָׁכ֜וֹת רֹ֣חַב עֶשְׂרִ֥ים אַמָּ֛ה סָבִ֥יב לַ/בַּ֖יִת סָבִ֥יב סָבִֽיב׀׃
translation:
  text: And between the chambers was a width of twenty cubits all around the temple[a], all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew repeats 'around' three times in this verse for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבֵין
  chosen: And between
  alternatives:
  - Now between
  - Between
  lexicon: HALOT
  rationale: The conjunction plus preposition naturally introduces the next architectural detail. 'And between' preserves the connective force without overinterpreting discourse structure.
- source_word: הַלְּשָׁכוֹת
  chosen: the side chambers
  alternatives:
  - the chambers
  - the rooms
  - the cells
  lexicon: HALOT
  rationale: In Ezekiel's temple vision, לְשָׁכוֹת refers to attached rooms/chambers. 'Side chambers' fits the architectural context and aligns with the surrounding description better than the more generic 'rooms.'
- source_word: רֹחַב
  chosen: a width
  alternatives:
  - the width
  - an open space of width
  - breadth
  lexicon: HALOT
  rationale: The noun denotes breadth/width. Because the clause is verbless and descriptive, 'was a width of' gives clear English while preserving the measurement focus.
- source_word: עֶשְׂרִים אַמָּה
  chosen: twenty cubits
  alternatives:
  - twenty cubits wide
  lexicon: HALOT
  rationale: This is the straightforward measurement expression. 'Cubits' is retained rather than converted to a modern unit in order to preserve the source-text measure.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - surrounding
  lexicon: HALOT
  rationale: The first occurrence modifies the measured width as extending around the structure. 'All around' communicates the circumferential sense naturally.
- source_word: לַבַּיִת
  chosen: the temple
  alternatives:
  - the house
  - the building
  lexicon: HALOT
  rationale: Although בַּיִת literally means 'house,' in Ezekiel 40–48 it commonly refers to the temple structure. 'Temple' best conveys the referent in contemporary English.
- source_word: סָבִיב סָבִיב
  chosen: all around
  alternatives:
  - round about
  - on every side
  lexicon: HALOT
  rationale: The repetition intensifies and emphasizes the surrounding extent. English usually does not preserve triple repetition smoothly, so one final 'all around' captures the sense without awkwardness; the compression is documented here.
