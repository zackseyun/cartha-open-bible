id: EZK.34.6
reference: Ezekiel 34:6
source:
  edition: WLC
  text: יִשְׁגּ֤וּ צֹאנִ/י֙ בְּ/כָל הֶ֣/הָרִ֔ים וְ/עַ֖ל כָּל גִּבְעָ֣ה רָמָ֑ה וְ/עַ֨ל
    כָּל פְּנֵ֤י הָ/אָ֨רֶץ֙ נָפֹ֣צוּ צֹאנִ֔/י וְ/אֵ֥ין דּוֹרֵ֖שׁ וְ/אֵ֥ין מְבַקֵּֽשׁ־־־׃
translation:
  text: My sheep wandered on all the mountains and on every high hill; my sheep were
    scattered over the whole face of the earth, with no one searching or seeking for
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went astray' for 'wandered.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the whole face of the earth'; 'earth' could also be rendered 'land'
      depending on how broadly the scope is understood.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁגּוּ
  chosen: wandered
  alternatives:
  - went astray
  - strayed
  lexicon: HALOT
  rationale: From שׁגה, describing erring or straying from the proper path. 'Wandered'
    is natural English and fits the pastoral imagery, while preserving the sense of
    being lost rather than merely traveling.
- source_word: צֹאנִי
  chosen: my sheep
  alternatives:
  - my flock
  lexicon: HALOT
  rationale: Literally 'my sheep/flock.' 'My sheep' preserves the concrete pastoral
    metaphor and matches the singular/plural imagery of individual animals comprising
    the flock.
- source_word: בְּכָל הֶהָרִים
  chosen: on all the mountains
  alternatives:
  - through all the mountains
  - among all the mountains
  lexicon: HALOT
  rationale: The preposition with 'all the mountains' is rendered idiomatically as
    'on' in English for animals roaming mountainous terrain. This keeps the geographic
    image clear.
- source_word: וְעַל כָּל גִּבְעָה רָמָה
  chosen: and on every high hill
  alternatives:
  - and on every lofty hill
  - and upon every high hill
  lexicon: HALOT
  rationale: גִּבְעָה is 'hill,' and רָמָה adds the sense 'high/lofty.' 'High hill'
    is straightforward modern English and preserves the Hebrew emphasis.
- source_word: וְעַל כָּל פְּנֵי הָאָרֶץ
  chosen: over the whole face of the earth
  alternatives:
  - over all the land
  - across the whole earth
  lexicon: HALOT
  rationale: פְּנֵי הָאָרֶץ is literally 'the face of the earth/land.' Here the scope
    is expansive rather than local, so 'earth' is preferred over 'land.' 'Face of
    the earth' preserves the Hebrew idiom while remaining understandable.
- source_word: נָפֹצוּ
  chosen: were scattered
  alternatives:
  - were dispersed
  lexicon: HALOT
  rationale: From פוץ in the Niphal, indicating being scattered abroad. 'Were scattered'
    is the standard and clearest rendering in this context.
- source_word: וְאֵין דּוֹרֵשׁ
  chosen: with no one searching
  alternatives:
  - and there was no one inquiring
  - and no one sought after them
  lexicon: HALOT
  rationale: דָּרַשׁ often means seek, inquire, or care enough to look into a matter.
    Here it conveys active searching for the lost sheep. 'With no one searching' fits
    the verbless Hebrew clause smoothly in English.
- source_word: וְאֵין מְבַקֵּשׁ
  chosen: and no one seeking them
  alternatives:
  - and no one looking for them
  - and no one trying to find them
  lexicon: HALOT
  rationale: בָּקַשׁ also means seek. Retaining both 'searching' and 'seeking' preserves
    the Hebrew's paired near-synonyms rather than collapsing them into one expression.
    'Them' is supplied in English from the context of the sheep.
