theological_decisions:
- issue: Referent of 'my sheep'
  chosen_reading: The speaker is God, lamenting the neglect and scattering of his
    people under failed shepherds.
  alternative_readings:
  - A purely generic pastoral image without covenantal reference
  rationale: Within Ezekiel 34, the flock metaphor refers to Israel under God's care
    and under human shepherds who failed them. The translation preserves the metaphor
    without over-explicating it in the main text.
