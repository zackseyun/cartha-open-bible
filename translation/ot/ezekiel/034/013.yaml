id: EZK.34.13
reference: Ezekiel 34:13
source:
  edition: WLC
  text: וְ/הוֹצֵאתִ֣י/ם מִן הָ/עַמִּ֗ים וְ/קִבַּצְתִּי/ם֙ מִן הָ֣/אֲרָצ֔וֹת וַ/הֲבִיאֹתִ֖י/ם
    אֶל אַדְמָתָ֑/ם וּ/רְעִיתִי/ם֙ אֶל הָרֵ֣י יִשְׂרָאֵ֔ל בָּ/אֲפִיקִ֕ים וּ/בְ/כֹ֖ל
    מוֹשְׁבֵ֥י הָ/אָֽרֶץ־־־־׃
translation:
  text: And I will bring them out from the peoples, and gather them from the lands,
    and bring them into their own land; and I will pasture them on the mountains of
    Israel, by the streams, and in all the inhabited places of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the watercourses,' 'in the ravines,' or 'in the channels.' The Hebrew
      term can refer to streambeds or ravines.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹצֵאתִים
  chosen: I will bring them out
  alternatives:
  - I will lead them out
  - I will bring them forth
  lexicon: HALOT
  rationale: 'From יצא in the Hiphil, causative sense: YHWH causes them to come out
    from among the nations. ''Bring them out'' is natural English and preserves the
    exodus-like force without over-paraphrase.'
- source_word: הָעַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  lexicon: HALOT
  rationale: עמים commonly means peoples/nations. 'Peoples' preserves the plural ethnic
    sense and distinguishes it from the following 'lands.'
- source_word: וְקִבַּצְתִּים
  chosen: gather them
  alternatives:
  - assemble them
  - collect them
  lexicon: HALOT
  rationale: קבץ is the standard verb for gathering scattered people, especially in
    restoration contexts. 'Gather' is the most transparent and idiomatic rendering.
- source_word: הָאֲרָצוֹת
  chosen: the lands
  alternatives:
  - the countries
  - the earths
  lexicon: HALOT
  rationale: Plural of ארץ here refers to various territories/countries from which
    Israel is regathered. 'Lands' is more literal than 'countries' and fits the parallel
    with 'peoples.'
- source_word: וַהֲבִיאֹתִים
  chosen: bring them into
  alternatives:
  - lead them into
  lexicon: HALOT
  rationale: בוא in the Hiphil means to bring/cause to enter. 'Bring them into' is
    straightforward and keeps the repeated divine action explicit.
- source_word: אַדְמָתָם
  chosen: their own land
  alternatives:
  - their land
  - their soil
  lexicon: HALOT
  rationale: אדמה can mean ground/soil/land. In this restoration context it refers
    to the land belonging to them covenantally. 'Their own land' makes the possessive
    force clear in idiomatic English without adding new theology.
- source_word: וּרְעִיתִים
  chosen: I will pasture them
  alternatives:
  - I will feed them
  - I will shepherd them
  lexicon: HALOT
  rationale: רעה can mean feed/pasture/shepherd. Because the verse continues with
    locations suitable for grazing, 'pasture them' best fits the immediate imagery
    while retaining the shepherd motif. 'Shepherd' is a viable alternative but less
    specific to the locative details here.
- source_word: אֶל הָרֵי יִשְׂרָאֵל
  chosen: on the mountains of Israel
  alternatives:
  - upon the mountains of Israel
  - in the hill country of Israel
  lexicon: HALOT
  rationale: Though אֶל often means 'to,' after a verb like רעה it can introduce the
    area of pasturing. English idiom prefers 'on the mountains of Israel' for the
    grazing setting.
- source_word: בָּאֲפִיקִים
  chosen: by the streams
  alternatives:
  - in the ravines
  - by the watercourses
  - in the channels
  lexicon: HALOT
  rationale: אפיקים can denote channels, wadis, ravines, or streambeds. In a pastoral
    context, 'by the streams' communicates accessible watercourses naturally in English,
    while a footnote preserves the more topographical alternatives.
- source_word: וּבְכֹל מוֹשְׁבֵי הָאָרֶץ
  chosen: in all the inhabited places of the land
  alternatives:
  - in all the settlements of the land
  - in all the dwelling places of the land
  lexicon: HALOT
  rationale: מושבי הארץ refers to places where people dwell within the land. 'Inhabited
    places' is clear modern English and broad enough to include settlements generally,
    without narrowing too much.
