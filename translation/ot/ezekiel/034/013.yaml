- issue: Restoration language and possessive force in אַדְמָתָם
  chosen_reading: their own land
  alternative_readings:
  - their land
  rationale: The possessive suffix indicates the land belonging to them; rendering
    it 'their own land' highlights restoration to their proper homeland without importing
    later doctrinal claims beyond the text.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing doctrinal claims.'
