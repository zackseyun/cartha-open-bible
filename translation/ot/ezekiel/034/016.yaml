theological_decisions:
- issue: How to render the final clause combining pastoral care and judgment
  chosen_reading: '"I will shepherd them with justice" after the destruction of the
    fat and strong'
  alternative_readings:
  - '"I will feed them in judgment"'
  - '"I will pasture them with justice"'
  rationale: The verse intentionally holds together compassionate restoration for
    weak sheep and judicial action against oppressive ones. Rendering רעה as 'shepherd'
    and משפט as 'justice' preserves that theological tension without reducing the
    clause to mere feeding or to punishment alone.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
