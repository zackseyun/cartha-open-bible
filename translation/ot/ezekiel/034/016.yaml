id: EZK.34.16
reference: Ezekiel 34:16
source:
  edition: WLC
  text: אֶת הָ/אֹבֶ֤דֶת אֲבַקֵּשׁ֙ וְ/אֶת הַ/נִּדַּ֣חַת אָשִׁ֔יב וְ/לַ/נִּשְׁבֶּ֣רֶת
    אֶחֱבֹ֔שׁ וְ/אֶת הַ/חוֹלָ֖ה אֲחַזֵּ֑ק וְ/אֶת הַ/שְּׁמֵנָ֧ה וְ/אֶת הַ/חֲזָקָ֛ה
    אַשְׁמִ֖יד אֶרְעֶ֥/נָּה בְ/מִשְׁפָּֽט־־־־־׃
translation:
  text: I will seek the lost, and I will bring back the strayed, and I will bind up
    the injured, and I will strengthen the sick; but the fat and the strong I will
    destroy. I will shepherd them with justice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, "I will feed them in justice" or "I will pasture them with justice."
      The Hebrew verb can mean feed, pasture, or shepherd.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹבֶדֶת
  chosen: the lost
  alternatives:
  - the perishing
  - the one that is lost
  lexicon: HALOT
  rationale: From אבד, here a feminine singular participle used collectively of sheep.
    'The lost' is idiomatic English and fits the shepherding context without over-literal
    singular phrasing.
- source_word: אֲבַקֵּשׁ
  chosen: I will seek
  alternatives:
  - I will search for
  lexicon: HALOT
  rationale: בקש commonly means seek/search for. 'Seek' is concise and natural, and
    echoes shepherd imagery familiar in biblical English without being archaic.
- source_word: הַנִּדַּחַת
  chosen: the strayed
  alternatives:
  - the driven away
  - the scattered one
  - the banished
  lexicon: HALOT
  rationale: From נדח, 'driven away' or 'scattered.' In the immediate sheep metaphor,
    'the strayed' communicates the result in natural English while preserving the
    pastoral sense.
- source_word: אָשִׁיב
  chosen: I will bring back
  alternatives:
  - I will restore
  - I will return
  lexicon: HALOT
  rationale: Hiphil of שוב here is causative, 'bring back/return.' 'Bring back' best
    fits a shepherd retrieving sheep.
- source_word: לַנִּשְׁבֶּרֶת
  chosen: the injured
  alternatives:
  - the broken
  - the wounded
  lexicon: HALOT
  rationale: From שבר, literally 'broken.' In English, 'bind up the injured' is more
    idiomatic than 'bind up the broken' while preserving the image of bodily harm.
- source_word: אֶחֱבֹשׁ
  chosen: I will bind up
  alternatives:
  - I will bandage
  lexicon: HALOT
  rationale: חבש in this context refers to bandaging wounds. 'Bind up' is both accurate
    and biblically recognizable.
- source_word: הַחוֹלָה
  chosen: the sick
  alternatives:
  - the weak
  - the diseased
  lexicon: HALOT
  rationale: From חלה, 'sick/ill.' 'The sick' is the most straightforward rendering;
    'weak' would blur the distinction from the following strong/fat pair.
- source_word: אֲחַזֵּק
  chosen: I will strengthen
  alternatives:
  - I will make strong
  - I will support
  lexicon: HALOT
  rationale: Piel of חזק means strengthen/make strong. 'Strengthen' is natural and
    preserves the restorative contrast.
- source_word: הַשְּׁמֵנָה
  chosen: the fat
  alternatives:
  - the well-fed
  lexicon: HALOT
  rationale: Literally 'fat.' In the context of Ezekiel 34's critique of abusive sheep/shepherds,
    the term carries moral-social force tied to overfed privilege; 'the fat' preserves
    that sharper image.
- source_word: הַחֲזָקָה
  chosen: the strong
  alternatives:
  - the powerful
  lexicon: HALOT
  rationale: From חזק as adjective, 'strong.' 'The strong' pairs naturally with 'the
    fat' and preserves the contrast with the weak sheep.
- source_word: אַשְׁמִיד
  chosen: I will destroy
  alternatives:
  - I will annihilate
  - I will eliminate
  lexicon: HALOT
  rationale: Hiphil of שמד regularly means destroy/exterminate. 'Destroy' is the standard,
    sufficiently strong rendering without exaggeration.
- source_word: אֶרְעֶנָּה
  chosen: I will shepherd them
  alternatives:
  - I will feed them
  - I will pasture them
  lexicon: HALOT
  rationale: From רעה, which can mean feed/pasture/shepherd. Given the chapter's sustained
    shepherd motif, 'shepherd them' preserves the broader pastoral governance sense
    better than the narrower 'feed them.'
- source_word: בְמִשְׁפָּט
  chosen: with justice
  alternatives:
  - in justice
  - according to justice
  - with judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean justice, judgment, legal right. 'With justice' reads
    naturally with 'I will shepherd them' and conveys righteous governance rather
    than mere punitive judgment.
