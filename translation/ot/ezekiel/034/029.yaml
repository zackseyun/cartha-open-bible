theological_decisions:
- issue: Nature of the promised 'planting'
  chosen_reading: Rendered as an agricultural image ('a planting of renown') rather
    than explicitly identifying it as a messianic person or solely as restored agricultural
    abundance.
  alternative_readings:
  - a messianic branch/figure
  - a renowned plantation or fertile provision
  rationale: The Hebrew phrase itself is metaphorical and does not unambiguously specify
    whether the planting is a personified leader, the restored people, or the land's
    renewed fertility. The translation preserves the image and leaves interpretive
    resolution to context rather than importing a doctrinal conclusion the verse itself
    does not state.
  doctrine_reference: Preserve theological tension rather than resolve it.
