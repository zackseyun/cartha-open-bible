id: EZK.34.29
reference: Ezekiel 34:29
source:
  edition: WLC
  text: וַ/הֲקִמֹתִ֥י לָ/הֶ֛ם מַטָּ֖ע לְ/שֵׁ֑ם וְ/לֹֽא יִהְי֨וּ ע֜וֹד אֲסֻפֵ֤י רָעָב֙
    בָּ/אָ֔רֶץ וְ/לֹֽא יִשְׂא֥וּ ע֖וֹד כְּלִמַּ֥ת הַ/גּוֹיִֽם־־׃
translation:
  text: And I will raise up for them a planting of renown, and they will no longer
    be those swept away by famine in the land, nor will they bear the disgrace of
    the nations anymore.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a planting for a name,' that is, 'a famous/renowned planting.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew phrase rendered 'those swept away by famine' is difficult; more
      literally, 'those gathered of famine,' possibly meaning 'victims of famine'
      or 'those consumed by famine.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲקִמֹתִי
  chosen: I will raise up
  alternatives:
  - I will establish
  - I will cause to arise
  lexicon: HALOT
  rationale: Hiphil of קום commonly means to cause to stand, raise up, or establish.
    'Raise up' preserves the active divine initiative and works naturally with the
    following object.
- source_word: מַטָּע
  chosen: a planting
  alternatives:
  - a plantation
  - a place of planting
  lexicon: HALOT
  rationale: The noun denotes something planted or a planting. 'A planting' is the
    most natural English equivalent and preserves the agricultural imagery without
    over-specifying whether it is the act, place, or result.
- source_word: לְשֵׁם
  chosen: of renown
  alternatives:
  - for a name
  - for fame
  lexicon: HALOT
  rationale: Literally 'for a name,' but in idiomatic English this means possessing
    a name or reputation. 'Of renown' captures the idiom while remaining close to
    the Hebrew.
- source_word: אֲסֻפֵי רָעָב
  chosen: those swept away by famine
  alternatives:
  - victims of famine
  - consumed by famine
  - gathered by famine
  lexicon: HALOT
  rationale: The passive participle from אסף literally means 'gathered,' but in this
    context likely refers to people removed or carried off by famine. 'Those swept
    away by famine' conveys the passive/resultative force and avoids an opaque literalism.
    Because the phrase is difficult, a lexical alternative is preserved in a footnote.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the earth
  - in the country
  lexicon: HALOT
  rationale: In Ezekiel, אֶרֶץ often refers to the land of Israel in covenantal context.
    'In the land' preserves that likely sense without over-expanding.
- source_word: יִשְׂאוּ
  chosen: bear
  alternatives:
  - carry
  - endure
  lexicon: HALOT
  rationale: נשא commonly means to lift, carry, or bear. With 'disgrace' as object,
    'bear' is the idiomatic English choice.
- source_word: כְּלִמַּת
  chosen: the disgrace
  alternatives:
  - the shame
  - the humiliation
  lexicon: HALOT
  rationale: The noun denotes shame, insult, or disgrace. 'Disgrace' fits the public,
    covenantal dishonor imposed by surrounding peoples.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: HALOT
  rationale: In prophetic literature גוים usually refers to the surrounding nations.
    'The nations' is the standard and least misleading rendering here.
