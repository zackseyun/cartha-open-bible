id: EZK.34.21
reference: Ezekiel 34:21
source:
  edition: WLC
  text: יַ֗עַן בְּ/צַ֤ד וּ/בְ/כָתֵף֙ תֶּהְדֹּ֔פוּ וּ/בְ/קַרְנֵי/כֶ֥ם תְּנַגְּח֖וּ כָּל הַ/נַּחְל֑וֹת עַ֣ד אֲשֶׁ֧ר הֲפִיצוֹתֶ֛ם אוֹתָ֖/נָה אֶל הַ/חֽוּצָ/ה־־׃
translation:
  text: Because you push with side and shoulder[a], and gore all the weak ones with your horns until you have scattered them abroad,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the sickly ones' or 'all the feeble sheep.' The Hebrew expression refers to the vulnerable members of the flock.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Since
  - Because that
  lexicon: HALOT
  rationale: Introduces the reason for the judgment in the surrounding context. 'Because' is natural modern English and preserves the causal force.
- source_word: בְּצַד
  chosen: with side
  alternatives:
  - with flank
  - at the side
  lexicon: HALOT
  rationale: צַד denotes side/flank. 'With side' keeps the bodily imagery of animals shoving one another, especially when paired with 'shoulder.'
- source_word: וּבְכָתֵף
  chosen: and shoulder
  alternatives:
  - and with shoulder
  lexicon: HALOT
  rationale: כָּתֵף is 'shoulder.' In English, 'with side and shoulder' is idiomatic enough and preserves the concrete metaphor of forceful pushing.
- source_word: תֶּהְדֹּפוּ
  chosen: you push
  alternatives:
  - you shove
  - you thrust
  lexicon: HALOT
  rationale: From הדף, to push/thrust away. 'Push' is clear, direct, and fits the pastoral-animal imagery without over-intensifying.
- source_word: וּבְקַרְנֵיכֶם
  chosen: with your horns
  lexicon: HALOT
  rationale: Concrete animal imagery should be retained; the preposition is instrumental.
- source_word: תְּנַגְּחוּ
  chosen: gore
  alternatives:
  - butt
  - strike
  lexicon: HALOT
  rationale: נגח in the context of horns refers to butting/goring. 'Gore' best conveys horn-driven violence in concise English.
- source_word: כָּל הַנַּחְלוֹת
  chosen: all the weak ones
  alternatives:
  - all the sickly ones
  - all the feeble sheep
  lexicon: HALOT
  rationale: Though the form is unusual, in context and in parallel with the flock imagery of the chapter it refers to the weak/feeble members of the flock. 'Weak ones' is broad enough to preserve the sense without adding 'sheep,' which is implied by context.
- source_word: עַד אֲשֶׁר
  chosen: until
  alternatives:
  - until such time as
  lexicon: HALOT
  rationale: This combination marks result reaching an endpoint. Simple 'until' is the most natural equivalent.
- source_word: הֲפִיצוֹתֶם
  chosen: you have scattered
  alternatives:
  - you scatter
  - you have driven apart
  lexicon: HALOT
  rationale: The perfect with עַד אֲשֶׁר is well represented by English present perfect here, marking the completed result of the abusive action.
- source_word: אוֹתָנָה
  chosen: them
  lexicon: HALOT
  rationale: Feminine plural object pronoun referring back to the weak members of the flock.
- source_word: אֶל הַחוּצָה
  chosen: outside
  alternatives:
  - to the outside
  - outward
  lexicon: HALOT
  rationale: Adverbial expression meaning outside/outdoors. 'Outside' is idiomatic and captures expulsion from the flock's safe space.
