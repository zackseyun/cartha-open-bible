theological_decisions:
- issue: Scope of the promised peace in 'covenant of peace'
  chosen_reading: Retain the covenantal phrase without narrowing it to merely absence of war or expanding it into a later doctrinal system.
  alternative_readings:
  - Treat 'peace' as only political peace
  - Render expansively as total salvation-blessing in the main text
  rationale: The Hebrew phrase is covenantal and rich, but the translation should preserve that theological breadth without importing a more developed doctrinal formulation into the text itself.
