id: EZK.34.25
reference: Ezekiel 34:25
source:
  edition: WLC
  text: וְ/כָרַתִּ֤י לָ/הֶם֙ בְּרִ֣ית שָׁל֔וֹם וְ/הִשְׁבַּתִּ֥י חַיָּֽה רָעָ֖ה מִן הָ/אָ֑רֶץ וְ/יָשְׁב֤וּ בַ/מִּדְבָּר֙ לָ/בֶ֔טַח וְ/יָשְׁנ֖וּ בַּ/יְּעָרִֽים־־׃
translation:
  text: I will make with them a covenant of peace[a], and I will remove harmful wild animals from the land[b], so that they may dwell securely in the wilderness and sleep in the forests.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will cause harmful wild animals to cease from the land.'
    reason: lexical_alternative
  - marker: b
    text: '''Covenant of peace'' can also imply a covenant of wholeness, well-being, and security, not merely the absence of conflict.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָרַתִּי
  chosen: I will make
  alternatives:
  - I will cut
  - I will establish
  lexicon: HALOT
  rationale: The idiom כרת ברית literally means 'cut a covenant,' but in natural English the established equivalent is 'make a covenant.' 'Establish' is possible but less directly reflects the covenant-making idiom here.
- source_word: בְּרִית שָׁלוֹם
  chosen: a covenant of peace
  alternatives:
  - a peace covenant
  - a covenant of well-being
  lexicon: HALOT
  rationale: Formal enough to preserve the covenantal phrase while remaining natural English. 'Peace' best preserves the breadth of שָׁלוֹם here, including security and wholeness; 'well-being' captures nuance but is less idiomatic in this covenant formula.
- source_word: הִשְׁבַּתִּי
  chosen: I will remove
  alternatives:
  - I will cause to cease
  - I will put an end to
  lexicon: HALOT
  rationale: The Hiphil of שבת means to cause to cease. In context, with dangerous animals 'from the land,' 'remove' communicates the result clearly in idiomatic English without overstating annihilation.
- source_word: חַיָּה רָעָה
  chosen: harmful wild animals
  alternatives:
  - evil beasts
  - wild beasts
  - dangerous animals
  lexicon: HALOT
  rationale: חיה here refers to wild animals/beasts, and רעה describes them as harmful or dangerous. 'Evil beasts' is overly archaic and may suggest moral evil rather than threat. 'Harmful wild animals' preserves the concrete sense.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: In Ezekiel this commonly refers to the land in a territorial/covenantal sense, not the whole earth. 'The land' is the most contextually appropriate rendering.
- source_word: יָשְׁבוּ
  chosen: they may dwell
  alternatives:
  - they will live
  - they will sit
  lexicon: HALOT
  rationale: The verb means dwell/live. 'Dwell' fits the pastoral-restoration context and pairs naturally with the following security language.
- source_word: בַמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  - in the pastureland
  lexicon: HALOT
  rationale: מִדְבָּר can denote steppe/wilderness grazing land, not necessarily barren desert. 'Wilderness' best preserves the broad Hebrew sense and the surprising safety motif.
- source_word: לָבֶטַח
  chosen: securely
  alternatives:
  - in safety
  - safely
  lexicon: HALOT
  rationale: This adverbial expression denotes security/safety. 'Securely' is concise and natural with 'dwell.'
- source_word: יָשְׁנוּ
  chosen: sleep
  alternatives:
  - lie down
  - rest
  lexicon: HALOT
  rationale: The verb straightforwardly means 'sleep.' This preserves the vivid image of complete safety.
- source_word: בַּיְּעָרִים
  chosen: in the forests
  alternatives:
  - in the woods
  - in the thickets
  lexicon: HALOT
  rationale: יערים refers to wooded areas/forests. 'Forests' is the clearest standard English equivalent and preserves the striking image of sleeping safely even there.
