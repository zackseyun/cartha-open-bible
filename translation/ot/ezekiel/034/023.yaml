theological_decisions:
- issue: Identity of 'David' in prophetic context
  chosen_reading: Retain 'David' in the main text without interpretive expansion.
  alternative_readings:
  - a future Davidic ruler
  - the Messiah
  rationale: The Hebrew text says 'David' and should not be expanded in translation to 'Messiah' or 'descendant of David.' Because the prophetic referent is theologically significant and debated in interpretation, the translation preserves the literal name while allowing readers to infer the broader Davidic hope from context.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
