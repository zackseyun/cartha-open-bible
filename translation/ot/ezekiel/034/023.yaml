id: EZK.34.23
reference: Ezekiel 34:23
source:
  edition: WLC
  text: וַ/הֲקִמֹתִ֨י עֲלֵי/הֶ֜ם רֹעֶ֤ה אֶחָד֙ וְ/רָעָ֣ה אֶתְ/הֶ֔ן אֵ֖ת עַבְדִּ֣/י דָוִ֑יד ה֚וּא יִרְעֶ֣ה אֹתָ֔/ם וְ/הֽוּא יִהְיֶ֥ה לָ/הֶ֖ן לְ/רֹעֶֽה־׃
translation:
  text: And I will raise up over them one shepherd[a], my servant David, and he will shepherd them; he will shepherd them[c][b], and he will be their shepherd.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will set up over them one shepherd.'
    reason: lexical_alternative
  - marker: b
    text: '''David'' may refer literally to David as an idealized royal figure, or more broadly to a future Davidic ruler.'
    reason: alternative_reading
  - marker: c
    text: The Hebrew uses the shepherd verb repeatedly; it can also mean 'tend' or 'feed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲקִמֹתִי
  chosen: I will raise up
  alternatives:
  - I will set up
  - I will appoint
  lexicon: HALOT
  rationale: הקים in this causative form commonly means to raise up, establish, or appoint. 'Raise up' preserves both the sense of divine appointment and the possible resonance of bringing forth a leader, without over-specifying enthronement.
- source_word: עֲלֵיהֶם
  chosen: over them
  alternatives:
  - for them
  - upon them
  lexicon: HALOT
  rationale: The preposition עַל with this verb naturally conveys placement over a people in a governing or supervisory sense. 'Over them' fits the shepherd-leader imagery.
- source_word: רֹעֶה אֶחָד
  chosen: one shepherd
  alternatives:
  - a single shepherd
  lexicon: HALOT
  rationale: This is the straightforward nominal phrase. 'One shepherd' preserves the emphasis on singularity and unity of leadership.
- source_word: וְרָעָה
  chosen: and he will shepherd
  alternatives:
  - and he will feed
  - and he will tend
  lexicon: HALOT
  rationale: רעה in shepherd contexts includes feeding, tending, and ruling. 'Shepherd' best preserves the metaphor and allows the repeated verbal play in the verse to remain visible in English.
- source_word: אֶתְהֶן / אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: The verse shifts between feminine and masculine pronominal forms, likely reflecting the flock/sheep imagery and the people collectively. English 'them' naturally covers both without forcing an awkward distinction.
- source_word: אֵת עַבְדִּי דָוִד
  chosen: my servant David
  alternatives:
  - David my servant
  lexicon: HALOT
  rationale: This appositional phrase identifies the shepherd. 'My servant David' is the most natural English order and preserves the covenantal title 'servant'.
- source_word: הוּא
  chosen: he himself
  alternatives:
  - he
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. Rendering it as 'he himself' preserves the emphasis that this figure personally fulfills the shepherding role.
- source_word: יִהְיֶה לָהֶן לְרֹעֶה
  chosen: he himself will be their shepherd
  alternatives:
  - he will be a shepherd to them
  lexicon: HALOT
  rationale: The construction expresses role and relationship. 'Their shepherd' is idiomatic English and preserves the covenantal pastoral image better than the more wooden 'a shepherd to them'.
