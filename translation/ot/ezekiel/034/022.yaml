id: EZK.34.22
reference: Ezekiel 34:22
source:
  edition: WLC
  text: וְ/הוֹשַׁעְתִּ֣י לְ/צֹאנִ֔/י וְ/לֹֽא תִהְיֶ֥ינָה ע֖וֹד לָ/בַ֑ז וְ/שָׁ֣פַטְתִּ֔י
    בֵּ֥ין שֶׂ֖ה לָ/שֶֽׂה־׃
translation:
  text: I will save my flock, and they will no longer be prey, and I will judge between
    sheep and sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they will no longer be for plunder' or 'they will no longer become
      spoil.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew, 'between sheep and sheep,' that is, between one sheep and another
      within the flock.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹשַׁעְתִּי
  chosen: I will save
  alternatives:
  - I will deliver
  - I will rescue
  lexicon: HALOT
  rationale: The Hifil of ישׁע here denotes Yahweh's act of delivering his flock from
    danger and oppression. 'Save' is concise and natural in English, while still preserving
    the theological weight of divine rescue. 'Rescue' is possible, but 'save' better
    matches the broader biblical usage and the covenantal tone of the passage.
- source_word: לְצֹאנִי
  chosen: my flock
  alternatives:
  - my sheep
  lexicon: HALOT
  rationale: צֹאן can denote small livestock collectively, especially sheep/goats,
    but in this shepherding context 'flock' is the most idiomatic collective rendering
    in English. The first person suffix is preserved with 'my.'
- source_word: וְלֹא תִהְיֶינָה עוֹד לָבַז
  chosen: and they will no longer be prey
  alternatives:
  - and they will no longer be for plunder
  - and they will no longer become spoil
  lexicon: HALOT
  rationale: The phrase literally indicates that the flock will no longer be 'for
    plunder/spoil.' In context of predatory shepherd imagery, 'be prey' communicates
    the sense clearly and naturally in modern English without losing the metaphor
    of vulnerability to attack. The feminine plural verb agrees with the flock understood
    as sheep.
- source_word: וְשָׁפַטְתִּי
  chosen: and I will judge
  alternatives:
  - and I will govern
  - and I will vindicate by judging
  lexicon: HALOT
  rationale: שׁפט here refers to Yahweh's judicial action in distinguishing and deciding
    among members of the flock. 'Judge' preserves the legal and moral force better
    than broader terms like 'govern.'
- source_word: בֵּין שֶׂה לָשֶׂה
  chosen: between sheep and sheep
  alternatives:
  - between one sheep and another
  - between sheep and sheep within the flock
  lexicon: HALOT
  rationale: 'The Hebrew is singular distributive: ''between sheep and sheep,'' emphasizing
    judgment among individual members of the flock. Retaining the repetition preserves
    the rhetorical force and avoids over-paraphrase, though English readers may understand
    it idiomatically as judgment between one sheep and another.'
