theological_decisions:
- issue: Divine deliverance language in a shepherd metaphor
  chosen_reading: I will save my flock
  alternative_readings:
  - I will rescue my flock
  - I will deliver my flock
  rationale: The verse presents Yahweh as the direct agent of salvation for his people
    under the shepherd metaphor. 'Save' preserves both the immediate rescue sense
    and the broader theological resonance without importing later doctrinal specifics
    not explicit in the verse.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological weight without paraphrase.'
- issue: Nature of Yahweh's judgment within the flock
  chosen_reading: I will judge between sheep and sheep
  alternative_readings:
  - I will judge between one sheep and another
  rationale: The text depicts intra-community judgment, not merely protection from
    external enemies. The chosen rendering preserves the tension that Yahweh both
    saves the flock and judges within it.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it.'
