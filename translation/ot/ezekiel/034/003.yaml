id: EZK.34.3
reference: Ezekiel 34:3
source:
  edition: WLC
  text: אֶת הַ/חֵ֤לֶב תֹּאכֵ֨לוּ֙ וְ/אֶת הַ/צֶּ֣מֶר תִּלְבָּ֔שׁוּ הַ/בְּרִיאָ֖ה תִּזְבָּ֑חוּ
    הַ/צֹּ֖אן לֹ֥א תִרְעֽוּ־־׃
translation:
  text: You eat the fat, you clothe yourselves with the wool, you slaughter the fattened
    sheep, but you do not shepherd the flock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the milk'; some translations follow an interpretive tradition or ancient-version
      reading here, but the Hebrew word normally means 'fat.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the fat one' or 'the choice animal'; the Hebrew likely refers to the
      well-fed animals of the flock.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֵלֶב
  chosen: the fat
  alternatives:
  - the milk
  - the rich part
  lexicon: HALOT
  rationale: חֵלֶב normally means 'fat' or 'fatty portion.' Although some versions
    render it 'milk' in this context by sense or ancient-version influence, the Hebrew
    form plainly denotes fat. 'The fat' preserves the concrete image of exploitative
    consumption.
- source_word: הַצֶּמֶר
  chosen: the wool
  alternatives:
  - the fleece
  lexicon: HALOT
  rationale: צֶמֶר denotes wool. 'The wool' is the most natural modern English rendering
    and fits the image of leaders benefiting materially from the flock.
- source_word: תִּלְבָּשׁוּ
  chosen: you clothe yourselves with
  alternatives:
  - you wear
  lexicon: HALOT
  rationale: The verb לבש means 'to put on, wear, clothe oneself.' 'Clothe yourselves
    with' makes explicit the reflexive sense in idiomatic English and preserves the
    image of self-enrichment.
- source_word: הַבְּרִיאָה
  chosen: the fattened sheep
  alternatives:
  - the fat one
  - the choice animal
  lexicon: HALOT
  rationale: From בריא, 'fat, well-fed, healthy.' In this pastoral context the feminine
    singular adjective functions collectively/substantivally for a choice or fattened
    animal from the flock. 'The fattened sheep' communicates the likely referent in
    context better than the bare 'fat one.'
- source_word: תִּזְבָּחוּ
  chosen: you slaughter
  alternatives:
  - you sacrifice
  - you kill
  lexicon: HALOT
  rationale: זבח can mean 'sacrifice' or more generally 'slaughter.' Here the context
    is denunciation of abusive shepherds exploiting the flock, not cultic worship,
    so 'slaughter' is preferable.
- source_word: הַצֹּאן
  chosen: the flock
  alternatives:
  - the sheep
  lexicon: HALOT
  rationale: צֹאן can denote small livestock collectively, especially sheep/goats.
    In a shepherding metaphor, 'the flock' is the most idiomatic and contextually
    fitting collective rendering.
- source_word: תִרְעוּ
  chosen: you shepherd
  alternatives:
  - you pasture
  - you feed
  lexicon: HALOT
  rationale: רעה in the Qal can mean 'to pasture, tend, shepherd.' Because the addressees
    are metaphorical shepherds and the object is 'the flock,' 'you shepherd' best
    preserves the governing metaphor. 'Feed' is too narrow, since the accusation is
    failure of care as a whole.
