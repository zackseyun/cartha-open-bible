theological_decisions:
- issue: Metaphorical force of shepherd language for Israel's leaders
  chosen_reading: 'Retain explicit shepherding language: ''you do not shepherd the
    flock.'''
  alternative_readings:
  - you do not feed the sheep
  - you do not tend the flock
  rationale: The chapter's central indictment depends on the shepherd/flock metaphor.
    Preserving 'shepherd' maintains the literary and theological coherence of the
    oracle without importing later doctrinal claims.
  doctrine_reference: 'Translation philosophy #3 and #5'
