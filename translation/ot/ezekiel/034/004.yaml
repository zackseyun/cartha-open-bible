id: EZK.34.4
reference: Ezekiel 34:4
source:
  edition: WLC
  text: אֶֽת הַ/נַּחְלוֹת֩ לֹ֨א חִזַּקְתֶּ֜ם וְ/אֶת הַ/חוֹלָ֣ה לֹֽא רִפֵּאתֶ֗ם וְ/לַ/נִּשְׁבֶּ֨רֶת֙
    לֹ֣א חֲבַשְׁתֶּ֔ם וְ/אֶת הַ/נִּדַּ֨חַת֙ לֹ֣א הֲשֵׁבֹתֶ֔ם וְ/אֶת הָ/אֹבֶ֖דֶת לֹ֣א
    בִקַּשְׁתֶּ֑ם וּ/בְ/חָזְקָ֛ה רְדִיתֶ֥ם אֹתָ֖/ם וּ/בְ/פָֽרֶךְ־־־־־׃
translation:
  text: You have not strengthened the weak, and you have not healed the sick, and
    you have not bound up the broken, and you have not brought back the strayed, and
    you have not sought the lost; but with force and with harshness you have ruled
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sick' for 'the weak'; the Hebrew term can denote sickness or weakness,
      but 'weak' is used here to distinguish it from the next phrase, 'the sick.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the driven away' for 'the strayed.' The Hebrew can emphasize being driven
      off as well as wandering away.
    reason: lexical_alternative
  - marker: c
    text: Or 'with ruthlessness.' The Hebrew term denotes harsh, crushing severity.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנַּחְלוֹת
  chosen: the weak
  alternatives:
  - the sick
  - the diseased
  lexicon: HALOT
  rationale: From חלה in a nominal/participle-like form. In this verse the next phrase
    already uses הַחוֹלָה for 'the sick,' so rendering this first term also as 'sick'
    would obscure the rhetorical progression. 'The weak' captures the sense of enfeebled
    or debilitated sheep and fits the collocation with חִזַּקְתֶּם ('strengthened').
- source_word: חִזַּקְתֶּם
  chosen: have strengthened
  alternatives:
  - made strong
  - strengthened
  lexicon: HALOT
  rationale: Piel of חזק commonly means 'strengthen/make strong.' 'Strengthened' is
    idiomatic with 'the weak' and preserves the shepherding metaphor.
- source_word: הַחוֹלָה
  chosen: the sick
  alternatives:
  - the diseased
  - the ill
  lexicon: HALOT
  rationale: Qal participial/adjectival form from חלה, naturally rendered 'sick.'
    This distinguishes it from the previous, broader category of weakness.
- source_word: רִפֵּאתֶם
  chosen: have healed
  alternatives:
  - cured
  lexicon: HALOT
  rationale: רפא is the standard verb for healing. 'Healed' is both literal and suitable
    within the metaphor of neglected sheep.
- source_word: לַנִּשְׁבֶּרֶת
  chosen: the broken
  alternatives:
  - the injured
  - the broken one
  lexicon: HALOT
  rationale: Passive participial form from שבר, literally 'broken.' In shepherding
    context it can imply injury, but 'broken' preserves the vivid metaphor and pairs
    naturally with 'bound up.'
- source_word: חֲבַשְׁתֶּם
  chosen: have bound up
  alternatives:
  - bandaged
  lexicon: HALOT
  rationale: חבש in medical/shepherding contexts means to bind up a wound. 'Bound
    up' is the established and precise English equivalent.
- source_word: הַנִּדַּחַת
  chosen: the strayed
  alternatives:
  - the driven away
  - the scattered one
  - the banished
  lexicon: HALOT
  rationale: From נדח, 'to drive away, banish, scatter.' In the sheep metaphor, 'the
    strayed' communicates the result in natural English while avoiding over-interpretation
    toward exile language in this immediate context.
- source_word: הֲשֵׁבֹתֶם
  chosen: have brought back
  alternatives:
  - returned
  - restored
  lexicon: HALOT
  rationale: Hiphil of שוב means 'cause to return/bring back.' 'Brought back' is the
    most natural transitive rendering with a straying sheep as object.
- source_word: הָאֹבֶדֶת
  chosen: the lost
  alternatives:
  - the perishing
  - the wandering one
  lexicon: HALOT
  rationale: From אבד, here best rendered 'lost' in the shepherding context. 'Perishing'
    is possible lexically but less fitting in this sequence.
- source_word: בִקַּשְׁתֶּם
  chosen: have sought
  alternatives:
  - searched for
  lexicon: HALOT
  rationale: בקש means 'seek.' 'Sought' is concise and idiomatic with 'the lost.'
- source_word: וּבְחָזְקָה
  chosen: with force
  alternatives:
  - with strength
  - with violence
  lexicon: HALOT
  rationale: The prepositional phrase denotes the manner of rule. 'With force' conveys
    coercive strength without overstating to physical violence in the main text.
- source_word: רְדִיתֶם
  chosen: have ruled
  alternatives:
  - have dominated
  - have subjected
  lexicon: HALOT
  rationale: רדה means 'rule, have dominion.' In context it is oppressive rule, but
    'ruled' lets the following modifiers carry the negative force.
- source_word: וּבְפָרֶךְ
  chosen: with harshness
  alternatives:
  - with ruthlessness
  - with severity
  lexicon: HALOT
  rationale: פרך denotes harsh, crushing severity, known also from oppression contexts.
    'Harshness' is clear modern English and pairs well with 'with force.'
