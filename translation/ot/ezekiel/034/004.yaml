theological_decisions:
- issue: Metaphorical register of shepherding language
  chosen_reading: Preserve the sheep/shepherd imagery while using natural English
    descriptors ('weak,' 'sick,' 'broken,' 'strayed,' 'lost').
  alternative_readings:
  - Flatten into purely political language about people rather than sheep
  - Render more interpretively as 'injured'/'scattered' throughout
  rationale: The verse condemns Israel's leaders through an extended shepherd metaphor.
    The translation keeps the metaphor visible without becoming wooden, preserving
    the prophetic force and intertextual links to shepherd imagery elsewhere in Scripture.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Negative force of the final clause
  chosen_reading: Express oppression through the adverbial phrases 'with force and
    with harshness' rather than intensifying the verb itself.
  alternative_readings:
  - '''you have brutally dominated them'''
  - '''you have ruled them violently and cruelly'''
  rationale: The Hebrew places the oppressive sense in the two prepositional phrases
    modifying 'ruled.' Keeping 'ruled' with explicit modifiers is closer to the source
    structure and avoids paraphrastic overstatement.
  doctrine_reference: Translation philosophy §§1, 6
