id: EZK.34.28
reference: Ezekiel 34:28
source:
  edition: WLC
  text: וְ/לֹא יִהְי֨וּ ע֥וֹד בַּז֙ לַ/גּוֹיִ֔ם וְ/חַיַּ֥ת הָ/אָ֖רֶץ לֹ֣א תֹאכְלֵ֑/ם
    וְ/יָשְׁב֥וּ לָ/בֶ֖טַח וְ/אֵ֥ין מַחֲרִֽיד־׃
translation:
  text: They will no longer be plunder for the nations, and the wild animals of the
    land will not devour them. They will dwell securely, with no one to make them
    afraid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prey for the nations.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the beasts of the earth.'
    reason: lexical_alternative
  - marker: c
    text: Or 'They will dwell in safety, and none will terrify them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּז
  chosen: plunder
  alternatives:
  - prey
  - spoil
  lexicon: HALOT
  rationale: The noun denotes something taken by force or made spoil. 'Plunder' fits
    the context of nations exploiting Israel and is natural English after 'be' ('be
    plunder for'). 'Prey' is possible, but the following clause already uses animal-devouring
    imagery, so 'plunder' better preserves the human-political sense here.
- source_word: לַגּוֹיִם
  chosen: for the nations
  alternatives:
  - to the nations
  - for the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם here refers to surrounding peoples/nations rather than specifically
    'Gentiles' in a later technical sense. 'For the nations' works idiomatically with
    בַּז ('plunder for the nations').
- source_word: חַיַּת הָאָרֶץ
  chosen: the wild animals of the land
  alternatives:
  - the beasts of the earth
  - the animals of the land
  lexicon: HALOT
  rationale: The construct phrase refers to wild creatures/beasts. 'Wild animals of
    the land' is readable modern English and preserves the concrete threat imagery
    without archaic tone. 'Beasts of the earth' is more traditional but less natural
    for the target audience.
- source_word: תֹאכְלֵם
  chosen: will not devour them
  alternatives:
  - will not eat them
  - will not consume them
  lexicon: HALOT
  rationale: Although the verb is literally 'eat,' in this context of predatory animals
    attacking people, 'devour' is the most idiomatic and vivid English equivalent.
- source_word: וְיָשְׁבוּ
  chosen: They will dwell
  alternatives:
  - They will live
  - They will settle
  lexicon: HALOT
  rationale: ישב commonly means 'sit, dwell, live.' 'Dwell' preserves the settled,
    covenant-rest sense in prophetic restoration contexts better than the flatter
    'live.'
- source_word: לָבֶטַח
  chosen: securely
  alternatives:
  - in safety
  - safely
  lexicon: HALOT
  rationale: The noun conveys security/safety. 'Securely' is concise and idiomatic
    with 'dwell.' 'In safety' is also possible and slightly more formal.
- source_word: וְאֵין מַחֲרִיד
  chosen: with no one to make them afraid
  alternatives:
  - and there will be none to terrify them
  - and no one will frighten them
  lexicon: HALOT
  rationale: The participle from חרד in the causative stem denotes causing terror
    or dread. The chosen rendering is idiomatic English and preserves the personal-agent
    sense implied by the participle. It also echoes common biblical restoration language
    without sounding archaic.
- source_word: עוֹד
  chosen: no longer
  alternatives:
  - any longer
  - again
  lexicon: HALOT
  rationale: With the negation, עוֹד marks cessation of a former condition. 'No longer'
    is the clearest English expression.
