id: EZK.34.26
reference: Ezekiel 34:26
source:
  edition: WLC
  text: וְ/נָתַתִּ֥י אוֹתָ֛/ם וּ/סְבִיב֥וֹת גִּבְעָתִ֖/י בְּרָכָ֑ה וְ/הוֹרַדְתִּ֤י הַ/גֶּ֨שֶׁם֙ בְּ/עִתּ֔/וֹ גִּשְׁמֵ֥י בְרָכָ֖ה יִֽהְיֽוּ׃
translation:
  text: And I will make them and the places around my hill a blessing[a], and I will send down the rain in its season; they will be showers of blessing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'them and the surroundings of my hill.' The phrase likely refers to the area around God's holy hill, often understood as Zion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: I will make
  alternatives:
  - I will give
  - I will set
  lexicon: HALOT
  rationale: 'נתן has a broad semantic range including give, set, make. Here with the object ''them'' plus predicate noun ''a blessing,'' English ''make'' best conveys the resultative sense: God will constitute them as a blessing, not merely hand them over as one.'
- source_word: אוֹתָם וּסְבִיבוֹת גִּבְעָתִי
  chosen: them and the places around my hill
  alternatives:
  - them and the surroundings of my hill
  - them and what is around my hill
  lexicon: HALOT
  rationale: סביבות is a plural noun meaning surroundings/areas around. Supplying 'places' makes natural English while preserving the spatial reference. 'My hill' is retained literally, likely referring to Zion/the holy hill, without over-interpreting in the main text.
- source_word: בְּרָכָה
  chosen: a blessing
  alternatives:
  - blessing
  lexicon: HALOT
  rationale: 'Anarthrous singular functions predicatively after נתן: ''make ... a blessing.'' The singular is preserved.'
- source_word: וְהוֹרַדְתִּי
  chosen: I will send down
  alternatives:
  - I will cause to come down
  - I will bring down
  lexicon: HALOT
  rationale: Hiphil of ירד is causative, 'cause to descend.' 'Send down' is idiomatic English for rain while preserving divine agency.
- source_word: הַגֶּשֶׁם בְּעִתּוֹ
  chosen: the rain in its season
  alternatives:
  - the rain at its proper time
  - rain in its time
  lexicon: HALOT
  rationale: עת with suffix indicates the appropriate or appointed time/season. 'In its season' is natural and preserves covenantal resonance of timely rain.
- source_word: גִּשְׁמֵי בְרָכָה
  chosen: showers of blessing
  alternatives:
  - rains of blessing
  - abundant showers
  lexicon: HALOT
  rationale: The plural construct גשמי naturally refers to rain-showers. 'Showers of blessing' preserves the lexical link to blessing and echoes the intensifying plural without unnecessary paraphrase.
- source_word: יִהְיוּ
  chosen: they will be
  alternatives:
  - there will be
  lexicon: HALOT
  rationale: 'The plural verb agrees with ''showers'' and is best rendered explicitly: ''they will be showers of blessing.'' This keeps the Hebrew clause structure clear.'
