theological_decisions:
- issue: Referent of 'my hill'
  chosen_reading: Retain 'my hill' without specifying Zion or a messianic referent in the main text.
  alternative_readings:
  - my hill = Zion/Jerusalem
  - my hill = the elevated place of God's sanctuary in an idealized restoration context
  rationale: The Hebrew says simply 'my hill.' While the phrase likely evokes Zion and the restored sanctuary context, the verse itself does not explicitly identify it. Preserving the literal expression avoids importing a more specific theological claim than the text states.
  doctrine_reference: Translation philosophy §1, §3
