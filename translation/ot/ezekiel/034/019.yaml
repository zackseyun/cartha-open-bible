id: EZK.34.19
reference: Ezekiel 34:19
source:
  edition: WLC
  text: וְ/צֹאנִ֑/י מִרְמַ֤ס רַגְלֵי/כֶם֙ תִּרְעֶ֔ינָה וּ/מִרְפַּ֥שׂ רַגְלֵי/כֶ֖ם
    תִּשְׁתֶּֽינָה׃ס
translation:
  text: And my flock must graze on what your feet have trampled, and drink what your
    feet have muddied.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my sheep' for 'my flock.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'graze from the trampling of your feet ... drink from the muddied/stirred-up
      water of your feet.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצֹאנִי
  chosen: And my flock
  alternatives:
  - And my sheep
  lexicon: HALOT
  rationale: צֹאן denotes small livestock, especially sheep/goats collectively. In
    this shepherding context, 'flock' is the most natural collective English rendering
    while preserving the pastoral metaphor. The 1cs suffix is rendered as 'my.'
- source_word: מִרְמַס רַגְלֵיכֶם
  chosen: on what your feet have trampled
  alternatives:
  - from the trampling of your feet
  - what was trampled by your feet
  lexicon: HALOT
  rationale: מִרְמַס refers to something trampled down or a trampling-place. Given
    the verb תִּרְעֶינָה ('they will graze'), idiomatic English is best achieved by
    expressing the object as 'what your feet have trampled.' This preserves the image
    of pasture spoiled by the selfish sheep.
- source_word: תִּרְעֶינָה
  chosen: must graze
  alternatives:
  - will graze
  - shall graze
  - feed
  lexicon: HALOT
  rationale: The Qal imperfect 3fp from רעה here describes what the flock is left
    to do as a consequence of the prior abuse. 'Graze' fits the pastoral setting more
    precisely than the broader 'feed.' 'Must' brings out the compelled/resultative
    force in context, though the Hebrew form itself is simply imperfect.
- source_word: וּמִרְפַּשׂ רַגְלֵיכֶם
  chosen: what your feet have muddied
  alternatives:
  - the foul water stirred up by your feet
  - what your feet have befouled
  lexicon: HALOT
  rationale: מִרְפָּשׂ denotes something stirred up, muddied, or befouled, especially
    in water. Since the following verb is 'drink,' the English should make the water
    contamination explicit but concise. 'Muddied' is vivid and natural.
- source_word: תִּשְׁתֶּינָה
  chosen: and drink
  alternatives:
  - and must drink
  - and they will drink
  lexicon: HALOT
  rationale: The Qal imperfect 3fp from שׁתה straightforwardly means 'drink.' English
    omits the explicit subject because it is already supplied by 'my flock.' The modal
    nuance from the first clause is allowed to carry over naturally without repeating
    'must'.
