id: EZK.34.9
reference: Ezekiel 34:9
source:
  edition: WLC
  text: לָ/כֵן֙ הָֽ/רֹעִ֔ים שִׁמְע֖וּ דְּבַר יְהוָֽה־׃
translation:
  text: 'Therefore, shepherds, hear the word of the LORD:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So then
  lexicon: HALOT
  rationale: Introduces the consequence of the preceding indictment. 'Therefore' is
    the most natural formal-modern English connective here.
- source_word: הָרֹעִים
  chosen: shepherds
  alternatives:
  - pastors
  lexicon: HALOT
  rationale: The literal sense is 'shepherds.' In Ezekiel 34 the term functions metaphorically
    for Israel's leaders, but the metaphor is central to the chapter and should be
    preserved rather than interpreted as 'leaders' or ecclesiastically as 'pastors.'
- source_word: שִׁמְעוּ
  chosen: hear
  alternatives:
  - listen to
  lexicon: HALOT
  rationale: Imperative plural from שׁמע. 'Hear' preserves the prophetic summons formula
    and its covenantal weight better than the more colloquial 'listen to.'
- source_word: דְּבַר
  chosen: the word
  alternatives:
  - the message
  lexicon: HALOT
  rationale: In the prophetic formula דְּבַר יְהוָה, 'the word' is the standard and
    suitably weighty rendering. 'Message' is possible but less textually transparent.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention
    while signaling the covenant name.
