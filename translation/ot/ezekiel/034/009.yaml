theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines explicitly set 'the LORD' as the default for
    YHWH. No contextual factor in this verse requires deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to interpret הָרֹעִים as leaders rather than preserve the metaphor
  chosen_reading: shepherds
  alternative_readings:
  - leaders
  - rulers
  rationale: The chapter's sustained shepherd imagery is theologically and rhetorically
    important. Preserving the metaphor avoids importing an interpretive gloss into
    the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy;
    preserve source meaning unless context demands otherwise'
