id: EZK.34.31
reference: Ezekiel 34:31
source:
  edition: WLC
  text: וְ/אַתֵּ֥ן צֹאנִ֛/י צֹ֥אן מַרְעִיתִ֖/י אָדָ֣ם אַתֶּ֑ם אֲנִי֙ אֱלֹ֣הֵי/כֶ֔ם
    נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה׃פ
translation:
  text: And you, my flock, the flock of my pasture—you are men, and I am your God,
    declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'human beings' or 'humankind.' Hebrew 'adam' can denote humanity in general;
      here it contrasts the metaphorical 'flock' with their actual human status.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתֵּן
  chosen: And you
  alternatives:
  - And as for you
  - Now you
  lexicon: HALOT
  rationale: Fronted pronoun with conjunction marks direct address and contrastive
    emphasis. 'And you' preserves the address without over-interpreting the discourse
    function.
- source_word: צֹאנִי
  chosen: my flock
  alternatives:
  - my sheep
  lexicon: HALOT
  rationale: Though literally 'my sheep/flock,' English 'my flock' works naturally
    as a collective and matches the pastoral metaphor in context.
- source_word: צֹאן מַרְעִיתִי
  chosen: the flock of my pasture
  alternatives:
  - the sheep of my pasture
  - my pastured flock
  lexicon: HALOT
  rationale: Retains the appositional restatement and the shepherding imagery. 'Pasture'
    is more transparent than compressing the phrase into an adjective.
- source_word: אָדָם
  chosen: men
  alternatives:
  - humankind
  - human beings
  lexicon: HALOT
  rationale: 'The clause ''אָדָם אַתֶּם'' is terse and emphatic: ''you are man/men,''
    contrasting the metaphorical flock with their actual human status. Per doctrine,
    gender-accurate rendering is preferred where the source uses adam; here ''men''
    preserves the Hebrew form and rhetorical force better than the more interpretive
    ''human beings.'''
- source_word: אַתֶּם
  chosen: you are
  alternatives:
  - you yourselves are
  lexicon: HALOT
  rationale: Supplies the implied copula in idiomatic English while preserving the
    emphatic second-person statement.
- source_word: אֲנִי אֱלֹהֵיכֶם
  chosen: I am your God
  alternatives:
  - I am God for you
  lexicon: HALOT
  rationale: Standard covenantal formulation in clear English; preserves the relational
    force of the pronominal suffix.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  lexicon: HALOT
  rationale: Idiomatic prophetic formula in modern English. 'Declares' is readable
    and suitably weighty.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - Lord Yahweh
  - the Lord GOD Yahweh
  lexicon: HALOT
  rationale: Follows the project's default rendering of YHWH as 'the LORD.' In the
    compound title אֲדֹנָי יְהוִה, English convention uses 'Lord GOD' to avoid 'Lord
    LORD' while still signaling the divine name.
