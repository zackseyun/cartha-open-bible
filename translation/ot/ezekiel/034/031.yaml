theological_decisions:
- issue: Rendering of אָדָם in a metaphorical-shepherding context
  chosen_reading: men
  alternative_readings:
  - human beings
  - humankind
  rationale: The verse closes the shepherd metaphor by explicitly identifying the
    flock as human. The Hebrew uses adam, and the project's doctrine prefers gender-accurate
    renderings matching source intent. 'Men' preserves the terse contrast and avoids
    smoothing away the lexical form, while the broader sense is preserved in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table
    for אָדָם
