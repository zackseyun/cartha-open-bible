id: EZK.34.14
reference: Ezekiel 34:14
source:
  edition: WLC
  text: בְּ/מִרְעֶה טּוֹב֙ אֶרְעֶ֣ה אֹתָ֔/ם וּ/בְ/הָרֵ֥י מְרֽוֹם יִשְׂרָאֵ֖ל יִהְיֶ֣ה נְוֵ/הֶ֑ם שָׁ֤ם תִּרְבַּ֨צְנָה֙ בְּ/נָ֣וֶה טּ֔וֹב וּ/מִרְעֶ֥ה שָׁמֵ֛ן תִּרְעֶ֖ינָה אֶל הָרֵ֥י יִשְׂרָאֵֽל־־־׃
translation:
  text: In good pasture I will pasture them[a], and on the high mountains of Israel their dwelling place will be. There they will lie down in a good dwelling place[b], and they will feed in rich pasture on the mountains of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their habitation will be there'; the Hebrew noun can mean an abode or dwelling place as well as a pasture/grazing place.
    reason: lexical_alternative
  - marker: b
    text: Literally 'fat pasture.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִרְעֶה
  chosen: pasture
  alternatives:
  - pastureland
  - grazing place
  lexicon: HALOT
  rationale: The noun denotes pasture/grazing land. 'Pasture' is natural English in the first clause; later occurrences are varied slightly where the syntax points to a place of grazing/rest.
- source_word: טּוֹב
  chosen: good
  alternatives:
  - pleasant
  - fine
  lexicon: HALOT
  rationale: A straightforward qualitative adjective. 'Good' preserves the simple evaluative force without embellishment.
- source_word: אֶרְעֶה
  chosen: I will pasture
  alternatives:
  - I will feed
  - I will shepherd
  lexicon: HALOT
  rationale: From רעה in the Hiphil/Qal shepherding semantic field. 'I will pasture' keeps the direct connection with pasture imagery and avoids flattening to mere feeding, while still sounding natural enough in context.
- source_word: הָרֵי מְרוֹם יִשְׂרָאֵל
  chosen: the high mountains of Israel
  alternatives:
  - the mountains of the height of Israel
  - the lofty mountains of Israel
  lexicon: HALOT
  rationale: מְרוֹם conveys height/elevation. 'High mountains of Israel' is idiomatic and preserves the topographical emphasis.
- source_word: נְוֵהֶם
  chosen: their grazing place
  alternatives:
  - their habitation
  - their pasture
  - their fold
  lexicon: HALOT
  rationale: נוה can denote abode, pasture, or grazing place. In this shepherding context, 'grazing place' best fits the immediate imagery and avoids the more domestic sense of 'habitation'.
- source_word: תִּרְבַּצְנָה
  chosen: they will lie down
  alternatives:
  - they will lie down to rest
  - they will rest
  lexicon: HALOT
  rationale: The verb refers to animals lying down, especially in safety and rest. 'Lie down' preserves the concrete pastoral image better than the abstract 'rest'.
- source_word: בְּנָוֶה טּוֹב
  chosen: in a good grazing place
  alternatives:
  - in a good pasture
  - in a pleasant abode
  lexicon: HALOT
  rationale: Because נוה recurs, the rendering is kept semantically aligned with the earlier occurrence. 'Grazing place' distinguishes it from מִרְעֶה while preserving overlap in meaning.
- source_word: מִרְעֶה שָׁמֵן
  chosen: rich pasture
  alternatives:
  - fat pasture
  - lush pasture
  lexicon: HALOT
  rationale: שָׁמֵן literally means 'fat,' but in English 'rich pasture' communicates abundance and fertility naturally. 'Fat pasture' is more literal but less idiomatic in contemporary English.
- source_word: תִּרְעֶינָה
  chosen: they will feed
  alternatives:
  - they will graze
  - they will pasture
  lexicon: HALOT
  rationale: Here the flock is the subject, so 'they will feed' or 'graze' is required. 'Feed' is slightly broader and smoother in English, while still fitting the pastoral setting.
- source_word: אֶל הָרֵי יִשְׂרָאֵל
  chosen: on the mountains of Israel
  alternatives:
  - upon the mountains of Israel
  - toward the mountains of Israel
  lexicon: HALOT
  rationale: Although אֶל often means 'to/toward,' in this context with grazing location it functions idiomatically for movement/activity on the mountains. 'On the mountains of Israel' gives the intended locative sense in natural English.
