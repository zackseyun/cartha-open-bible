theological_decisions:
- issue: Pastoral imagery for God's care
  chosen_reading: Retain concrete shepherding and grazing imagery throughout rather than abstracting to general provision or rest.
  alternative_readings:
  - Use more interpretive language such as 'I will care for them' and 'they will rest securely'
  rationale: The verse is part of an extended shepherd oracle, so preserving the concrete imagery best reflects the Hebrew and avoids importing theological interpretation beyond the text's own metaphor.
  doctrine_reference: Translation philosophy §§1, 3, 6
