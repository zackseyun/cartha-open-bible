id: EZK.34.12
reference: Ezekiel 34:12
source:
  edition: WLC
  text: כְּ/בַקָּרַת֩ רֹעֶ֨ה עֶדְר֜/וֹ בְּ/יוֹם הֱיוֹת֤/וֹ בְ/תוֹךְ צֹאנ/וֹ֙ נִפְרָשׁ֔וֹת כֵּ֖ן אֲבַקֵּ֣ר אֶת צֹאנִ֑/י וְ/הִצַּלְתִּ֣י אֶתְ/הֶ֗ם מִ/כָּל הַ/מְּקוֹמֹת֙ אֲשֶׁ֣ר נָפֹ֣צוּ שָׁ֔ם בְּ/י֥וֹם עָנָ֖ן וַ/עֲרָפֶֽל־־־־׃
translation:
  text: As a shepherd seeks out his flock on the day he is among his sheep when they have been scattered[a], so I will seek out my sheep[b], and I will rescue them from all the places where they were scattered on a day of clouds and thick darkness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'inspect/care for'; the Hebrew verb carries the sense of attentive oversight as well as seeking out.
    reason: lexical_alternative
  - marker: b
    text: Or 'on the day of cloud and thick darkness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּבַקָּרַת
  chosen: As a shepherd seeks out
  alternatives:
  - As the inspection of
  - As the caring oversight of
  - Like the visitation of
  lexicon: HALOT
  rationale: From בקר in a nominal form with prefixed כ, introducing a comparison. In context with the following finite verb אֲבַקֵּר, the sense is active pastoral inspection/seeking rather than a wooden abstract noun. 'Seeks out' preserves the shepherding nuance and anticipates the same root in the divine action.
- source_word: רֹעֶה
  chosen: a shepherd
  alternatives:
  - one who shepherds
  lexicon: HALOT
  rationale: Standard rendering for the participial noun; clear and idiomatic in English.
- source_word: עֶדְרוֹ
  chosen: his flock
  alternatives:
  - his herd
  lexicon: HALOT
  rationale: Though עדר can denote a drove/herd, with רֹעֶה and צאן in the verse the sheep/flock imagery is primary.
- source_word: בְּיוֹם הֱיוֹתוֹ בְתוֹךְ צֹאנוֹ
  chosen: on the day he is among his sheep
  alternatives:
  - when he is among his flock
  - on the day of his being in the midst of his sheep
  lexicon: HALOT
  rationale: Rendered idiomatically while preserving the temporal construction and the image of the shepherd present in the midst of the flock.
- source_word: נִפְרָשׁוֹת
  chosen: when they have been scattered
  alternatives:
  - when they are dispersed
  - being spread out
  lexicon: HALOT
  rationale: The Niphal participle of פרשׂ here describes the sheep as dispersed. 'Scattered' fits the pastoral context and aligns with the later נָפֹצוּ, preserving thematic coherence in English.
- source_word: כֵּן אֲבַקֵּר
  chosen: so I will seek out
  alternatives:
  - so I will attend to
  - so I will inspect
  lexicon: HALOT
  rationale: The same root בקר is used for YHWH's action. 'Seek out' best fits the restoration context and keeps the comparison with the shepherd vivid.
- source_word: צֹאנִי
  chosen: my sheep
  alternatives:
  - my flock
  lexicon: HALOT
  rationale: צאן refers specifically to small livestock, especially sheep/goats. 'My sheep' matches the immediate imagery and avoids flattening the metaphor.
- source_word: וְהִצַּלְתִּי
  chosen: and I will rescue
  alternatives:
  - and I will deliver
  - and I will save
  lexicon: HALOT
  rationale: נצל in Hiphil commonly means to snatch away or rescue. 'Rescue' is vivid and contextually apt for recovering scattered sheep.
- source_word: מִכָּל הַמְּקוֹמוֹת
  chosen: from all the places
  alternatives:
  - out of every place
  lexicon: HALOT
  rationale: Straightforward locative phrase; plural retained.
- source_word: אֲשֶׁר נָפֹצוּ שָׁם
  chosen: where they were scattered
  alternatives:
  - to which they were scattered
  - where they had been dispersed
  lexicon: HALOT
  rationale: נפץ conveys scattering. 'Where they were scattered' is natural English and preserves the relative clause.
- source_word: בְּיוֹם עָנָן וַעֲרָפֶל
  chosen: on a day of clouds and thick darkness
  alternatives:
  - on the day of cloud and gloom
  - on a cloudy and dark day
  lexicon: HALOT
  rationale: עָנָן is 'cloud/clouds'; עֲרָפֶל denotes dense darkness/gloom. 'Thick darkness' preserves the weight of the term better than a lighter 'gloom,' while remaining readable. The anarthrous expression is rendered idiomatically as 'a day of clouds and thick darkness.'
