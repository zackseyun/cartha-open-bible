theological_decisions:
- issue: Divine shepherd imagery
  chosen_reading: Retain the metaphor of God personally seeking and rescuing his sheep without importing later christological interpretation into the translation.
  alternative_readings:
  - A more interpretive rendering that foregrounds messianic fulfillment
  rationale: The verse presents YHWH as shepherd in its own literary context. The translation preserves that imagery directly and leaves canonical/theological connections to interpretation rather than embedding them in the wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
