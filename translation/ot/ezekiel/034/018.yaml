id: EZK.34.18
reference: Ezekiel 34:18
source:
  edition: WLC
  text: הַ/מְעַ֣ט מִ/כֶּ֗ם הַ/מִּרְעֶ֤ה הַ/טּוֹב֙ תִּרְע֔וּ וְ/יֶ֨תֶר֙ מִרְעֵי/כֶ֔ם תִּרְמְס֖וּ בְּ/רַגְלֵי/כֶ֑ם וּ/מִשְׁקַע מַ֣יִם תִּשְׁתּ֔וּ וְ/אֵת֙ הַ/נּ֣וֹתָרִ֔ים בְּ/רַגְלֵי/כֶ֖ם תִּרְפֹּשֽׂוּ/ן־׃
translation:
  text: Is it too little for you to graze on the good pasture[a], that you must trample the rest of your pasture with your feet, and to drink clear water[b], that you must foul the rest with your feet?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'settled water,' that is, water left undisturbed and therefore clear.
    reason: lexical_alternative
  - marker: b
    text: Or 'foul' or 'stir up' what remains; the Hebrew verb refers to making the water muddy with the feet.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְעַט מִכֶּם
  chosen: Is it too little for you
  alternatives:
  - Is it not enough for you
  - Is it a small thing to you
  lexicon: HALOT
  rationale: Idiomatic rhetorical question expressing that what they already have should be sufficient. 'Too little for you' preserves the rebuking force in natural English.
- source_word: הַמִּרְעֶה הַטּוֹב
  chosen: the good pasture
  alternatives:
  - the good grazing land
  lexicon: HALOT
  rationale: מִרְעֶה denotes pasture/grazing place. 'Good pasture' is natural and keeps the shepherding imagery.
- source_word: תִּרְעוּ
  chosen: to graze on
  alternatives:
  - to feed on
  - to pasture in
  lexicon: HALOT
  rationale: From רעה in the sense of grazing/feeding. 'Graze on' fits the sheep metaphor and English idiom.
- source_word: וְיֶתֶר מִרְעֵיכֶם
  chosen: the rest of your pastures
  alternatives:
  - the remainder of your pasture
  - what is left of your grazing land
  lexicon: HALOT
  rationale: יֶתֶר means remainder/rest. The plural construct with suffix is represented as 'your pastures,' though English could also singularize; plural better reflects the Hebrew form.
- source_word: תִּרְמְסוּ בְּרַגְלֵיכֶם
  chosen: you must trample ... with your feet
  alternatives:
  - you trample ... underfoot
  lexicon: HALOT
  rationale: רמס means trample. 'With your feet' is retained because the Hebrew explicitly repeats the instrument and the repetition contributes to the accusation.
- source_word: וּמִשְׁקַע מַיִם
  chosen: clear water
  alternatives:
  - settled water
  - water from a settling place
  lexicon: HALOT
  rationale: The phrase refers to water that has settled and is therefore clear or undisturbed. 'Clear water' best communicates the practical sense in contemporary English.
- source_word: תִּשְׁתּוּ
  chosen: to drink
  alternatives:
  - you drink
  lexicon: HALOT
  rationale: 'Rendered as infinitive-like English coordinated with the prior clause: ''to graze... and to drink...'' This smooths the Hebrew rhetorical structure while preserving meaning.'
- source_word: הַנּוֹתָרִים
  chosen: what remains
  alternatives:
  - the rest
  - what is left
  lexicon: HALOT
  rationale: Substantival participle from יתר/נותר idea of what is left over. 'What remains' is concise and idiomatic for the remaining water.
- source_word: תִּרְפֹּשׂוּן
  chosen: you must muddy
  alternatives:
  - you foul
  - you stir up
  lexicon: HALOT
  rationale: The verb denotes making water muddy/turbid by stirring with the feet. 'Muddy' is vivid, accessible, and contextually precise.
