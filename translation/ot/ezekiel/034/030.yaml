id: EZK.34.30
reference: Ezekiel 34:30
source:
  edition: WLC
  text: וְ/יָדְע֗וּ כִּ֣י אֲנִ֧י יְהוָ֛ה אֱלֹהֵי/הֶ֖ם אִתָּ֑/ם וְ/הֵ֗מָּה עַמִּ/י֙
    בֵּ֣ית יִשְׂרָאֵ֔ל נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה׃
translation:
  text: And they will know that I, the LORD their God, am with them, and that they,
    the house of Israel, are my people, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'am among them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  chosen: And they will know
  alternatives:
  - And they shall know
  - Then they will know
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly
    carries future/resultative force in English. 'Will know' is natural modern English;
    'shall know' is more archaic.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what they will know rather than a causal clause,
    so 'that' best fits the syntax.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the Septuagintal pattern.
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  alternatives:
  - God of them
  lexicon: HALOT
  rationale: Construct plus pronominal suffix is idiomatically rendered 'their God'
    in English.
- source_word: אִתָּם
  chosen: am with them
  alternatives:
  - am among them
  lexicon: HALOT
  rationale: The preposition denotes presence 'with' them. 'Among them' is possible
    contextually, but 'with them' more directly reflects the Hebrew and preserves
    covenantal presence language.
- source_word: וְהֵמָּה
  chosen: and that they
  alternatives:
  - and they
  lexicon: HALOT
  rationale: The pronoun is emphatic. In English the emphasis is sufficiently conveyed
    by retaining the explicit subject 'they' within the second content clause.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Standard covenant formula language; direct and idiomatic.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - the people of Israel
  - Israel
  lexicon: HALOT
  rationale: A fixed prophetic expression. Retaining 'house of Israel' preserves the
    corporate and covenantal nuance better than flattening to 'Israel' or 'the people
    of Israel.'
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  - says
  lexicon: HALOT
  rationale: In prophetic formulae, 'declares' is clear modern English and preserves
    the solemn force without sounding overly technical.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD Yahweh
  - the Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: The compound divine title is conventionally rendered 'the Lord GOD' in
    English when Adonai precedes the Tetragrammaton. This avoids the awkward 'Lord
    LORD' while preserving both elements of the Hebrew title.
