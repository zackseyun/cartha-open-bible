theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This verse contains both standalone יְהוָה and the compound אֲדֹנָי יְהוִה,
    so the translation follows that policy consistently.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Covenant-presence language in אִתָּם
  chosen_reading: am with them
  alternative_readings:
  - am among them
  rationale: 'The verse emphasizes restored covenant relationship: ''I ... am with
    them'' paired with ''they ... are my people.'' The translation preserves this
    theological formula without expanding it beyond the Hebrew.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension
    rather than resolve it
