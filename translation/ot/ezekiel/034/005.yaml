id: EZK.34.5
reference: Ezekiel 34:5
source:
  edition: WLC
  text: וַ/תְּפוּצֶ֖ינָה מִ/בְּלִ֣י רֹעֶ֑ה וַ/תִּהְיֶ֧ינָה לְ/אָכְלָ֛ה לְ/כָל חַיַּ֥ת הַ/שָּׂדֶ֖ה וַ/תְּפוּצֶֽינָה־׃
translation:
  text: So they were scattered for lack of a shepherd[a], and they became food for every beast of the field, and they were scattered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every beast of the field.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּפוּצֶינָה
  chosen: they were scattered
  alternatives:
  - they were dispersed
  - they were scattered abroad
  lexicon: HALOT
  rationale: From פוץ in the Niphal-like passive/intransitive sense in context, describing the flock's being scattered. 'Were scattered' is natural English and preserves the passive/resultative force. The repetition at the end of the verse is retained rather than smoothed out.
- source_word: מִבְּלִי
  chosen: for lack of
  alternatives:
  - without
  - because there was no
  lexicon: HALOT
  rationale: The phrase מבלי רֹעֶה expresses deprivation or absence. 'For lack of' captures the causal nuance idiomatically in English better than a bare 'without' while remaining close to the Hebrew.
- source_word: רֹעֶה
  chosen: a shepherd
  alternatives:
  - shepherd
  - one shepherding them
  lexicon: HALOT
  rationale: Singular participial noun meaning 'shepherd.' The indefinite English article fits the Hebrew anarthrous form in this context. The metaphor of leaders as shepherds should be preserved.
- source_word: וַתִּהְיֶינָה
  chosen: they became
  alternatives:
  - they were
  - they came to be
  lexicon: HALOT
  rationale: היה here marks a resulting state. 'They became' best conveys transition into the condition described by the following predicate.
- source_word: לְאָכְלָה
  chosen: food
  alternatives:
  - prey
  - something to be devoured
  lexicon: HALOT
  rationale: The noun אָכְלָה denotes that which is eaten/devoured. 'Food' is straightforward and formal enough; 'prey' is possible but slightly more interpretive. The following phrase naming wild animals makes the sense clear.
- source_word: לְכָל
  chosen: for every
  alternatives:
  - to every
  - for all
  lexicon: HALOT
  rationale: The construction indicates they became food available to every beast. 'For every' is idiomatic with 'food' in English.
- source_word: חַיַּת הַשָּׂדֶה
  chosen: every wild animal of the field
  alternatives:
  - every beast of the field
  - all the wild beasts
  lexicon: HALOT
  rationale: Literally 'animal/beast of the field.' 'Wild animal of the field' communicates the sense in readable modern English; 'beast of the field' is more traditional but less natural today. Singular collective after כָל is represented by 'every wild animal.'
- source_word: וַתְּפוּצֶינָה
  chosen: and they were scattered
  alternatives:
  - and they were dispersed
  lexicon: HALOT
  rationale: The final repetition is preserved in translation because the Hebrew repeats the verb for emphasis and closure. It should not be omitted as redundant.
