theological_decisions:
- issue: Shepherd imagery for Israel's leaders
  chosen_reading: Retain 'shepherd' as the governing metaphor
  alternative_readings:
  - leader
  - caretaker
  rationale: The verse participates in Ezekiel 34's sustained metaphor of Israel's rulers as shepherds and the people as sheep. Replacing the image with an explanatory term would flatten the prophetic and theological texture.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it.'
