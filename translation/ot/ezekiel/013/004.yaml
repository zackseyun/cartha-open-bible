theological_decisions:
- issue: Whether 'your prophets' should be rendered in a way that distinguishes false prophets explicitly in the main text
  chosen_reading: Retain the Hebrew wording 'your prophets' without adding 'false'
  alternative_readings:
  - your false prophets
  rationale: Although the context clearly condemns these prophets, the Hebrew text here says simply 'your prophets.' Adding 'false' would import an interpretive judgment from context into the verse itself rather than translating the wording present.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source text warrants; preserve the text''s own wording.'
