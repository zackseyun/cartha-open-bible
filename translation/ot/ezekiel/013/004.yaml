id: EZK.13.4
reference: Ezekiel 13:4
source:
  edition: WLC
  text: כְּ/שֻׁעָלִ֖ים בָּ/חֳרָב֑וֹת נְבִיאֶ֥י/ךָ יִשְׂרָאֵ֖ל הָיֽוּ׃
translation:
  text: Like foxes among ruins[a], so have your prophets been[c][b], O Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Like jackals among ruins.' The Hebrew word is usually rendered 'foxes,' but some take it more broadly as a desert scavenger.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the ruins' or 'in waste places.'
    reason: lexical_alternative
  - marker: c
    text: Or 'were.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּשֻׁעָלִים
  chosen: Like foxes
  alternatives:
  - Like jackals
  lexicon: HALOT
  rationale: The prefixed כ marks comparison ('like/as'). שׁוּעָל commonly denotes 'fox,' though some contexts may allow a broader canid sense such as 'jackal.' 'Foxes' is the standard and most natural rendering here, fitting the image of crafty scavengers.
- source_word: בָּחֳרָבוֹת
  chosen: among ruins
  alternatives:
  - in the ruins
  - among the ruins
  - in waste places
  lexicon: HALOT
  rationale: From חָרְבָּה/חֳרָבוֹת, referring to ruins, desolate places, or waste places. The preposition ב can be rendered 'in' or more idiomatically 'among' in English. 'Among ruins' preserves the desolation imagery while reading naturally.
- source_word: נְבִיאֶיךָ
  chosen: your prophets
  lexicon: HALOT
  rationale: Construct plural of 'prophets' with 2ms suffix, directly addressed to Israel/Jerusalem in the surrounding context. 'Your prophets' preserves the possessive force without implying divine endorsement.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: 'Direct vocative/appositional address. Retaining ''Israel'' preserves the prophetic directness. In English, setting it off with commas clarifies that it is a form of address: ''your prophets, Israel.'''
- source_word: הָיוּ
  chosen: have been
  alternatives:
  - were
  lexicon: HALOT
  rationale: Qal perfect 3cp of היה. In English, simple past ('were') is possible, but 'have been' better carries the stative/resultative force in this denunciatory comparison. The clause order is adjusted slightly for natural English while preserving emphasis.
