theological_decisions:
- issue: Metaphorical force of the wall-plaster image in a prophetic denunciation
  chosen_reading: Retain the concrete building image ('builds a wall ... plaster it
    with whitewash') without making the metaphor explicit in the main text.
  alternative_readings:
  - Interpretively expand to 'builds a flimsy wall' or 'cover it with lies'
  rationale: The Hebrew presents the image rather than its interpretation at this
    point. Preserving the metaphor respects the text's rhetoric and avoids importing
    explanatory commentary into the translation.
  doctrine_reference: Translation philosophy §§1, 3, 6
