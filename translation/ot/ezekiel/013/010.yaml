id: EZK.13.10
reference: Ezekiel 13:10
source:
  edition: WLC
  text: יַ֣עַן וּ/בְ/יַ֜עַן הִטְע֧וּ אֶת עַמִּ֛/י לֵ/אמֹ֥ר שָׁל֖וֹם וְ/אֵ֣ין שָׁל֑וֹם
    וְ/הוּא֙ בֹּ֣נֶה חַ֔יִץ וְ/הִנָּ֛/ם טָחִ֥ים אֹת֖/וֹ תָּפֵֽל־׃
translation:
  text: Because, yes, because they have led my people astray, saying, ‘Peace,’ when
    there is no peace, and when someone builds a wall, behold, they plaster it with
    whitewash.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with untempered mortar.' The Hebrew term refers to a superficial plastering/coating;
      'whitewash' conveys the image clearly in modern English.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן / וּבְיַעַן
  chosen: Because, yes, because
  alternatives:
  - Because indeed
  - For, yes, for
  - Since, indeed, since
  lexicon: HALOT
  rationale: The doubled causal expression intensifies the reason being given. Rendering
    both occurrences preserves the emphatic repetition rather than collapsing them
    into a single 'because.' 'Yes' reflects the asseverative force naturally in English.
- source_word: הִטְעוּ
  chosen: have led ... astray
  alternatives:
  - have misled
  - have deceived
  lexicon: HALOT
  rationale: The verb denotes causing to wander or go astray. 'Led astray' preserves
    the metaphor and moral-religious force better than the flatter 'misled,' while
    remaining idiomatic.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Standard covenantal expression; no reason to expand or paraphrase.
- source_word: לֵאמֹר שָׁלוֹם וְאֵין שָׁלוֹם
  chosen: saying, ‘Peace,’ when there is no peace
  alternatives:
  - saying, ‘Peace,’ but there is no peace
  - saying, ‘Well-being,’ when there is no well-being
  lexicon: HALOT
  rationale: שָׁלוֹם includes peace, welfare, and wholeness. 'Peace' is the established
    and contextually apt rendering here, especially in prophetic denunciation of false
    security. 'When there is no peace' fits the temporal/circumstantial force in English.
- source_word: וְהוּא בֹּנֶה
  chosen: and when someone builds
  alternatives:
  - and it is he who builds
  - and one builds
  - and when he builds
  lexicon: HALOT
  rationale: The singular pronoun with participle is somewhat indefinite/generic in
    context. 'Someone' communicates the representative singular naturally in English
    without implying a specific named builder.
- source_word: חַיִץ
  chosen: a wall
  alternatives:
  - a partition wall
  - a flimsy wall
  lexicon: HALOT
  rationale: The noun refers to a wall or partition. 'Wall' is the plain sense. 'Flimsy'
    is interpretive and better left to context rather than imported into the noun
    itself.
- source_word: וְהִנָּם
  chosen: behold, they
  alternatives:
  - look, they
  - and behold, they
  lexicon: HALOT
  rationale: הִנֵּה with pronominal suffix draws vivid attention to the action. 'Behold'
    preserves the prophetic rhetorical force, though slightly elevated; it remains
    readable here.
- source_word: טָחִים אֹתוֹ
  chosen: plaster it
  alternatives:
  - smear it over
  - coat it
  lexicon: HALOT
  rationale: The verb refers to plastering or coating a wall. 'Plaster it' is concrete
    and fits the building imagery.
- source_word: תָּפֵל
  chosen: with whitewash
  alternatives:
  - with white plaster
  - with untempered mortar
  lexicon: HALOT
  rationale: In this context the term refers to a superficial coating, likely whitewash/plaster,
    used metaphorically for covering defects. 'Untempered mortar' reflects older tradition
    but is less transparent in modern English and may over-specify the material. 'Whitewash'
    captures both the literal image and the metaphor of deceptive covering.
