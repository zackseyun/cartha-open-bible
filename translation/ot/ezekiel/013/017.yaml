id: EZK.13.17
reference: Ezekiel 13:17
source:
  edition: WLC
  text: וְ/אַתָּ֣ה בֶן אָדָ֗ם שִׂ֤ים פָּנֶ֨י/ךָ֙ אֶל בְּנ֣וֹת עַמְּ/ךָ֔ הַ/מִּֽתְנַבְּא֖וֹת
    מִֽ/לִּבְּ/הֶ֑ן וְ/הִנָּבֵ֖א עֲלֵי/הֶֽן־־׃
translation:
  text: And you, son of man, set your face against the daughters of your people who
    prophesy out of their own hearts, and prophesy against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the women of your people.' The Hebrew reads 'the daughters of your people,'
      which is retained to reflect the specific wording.
    reason: lexical_alternative
  - marker: b
    text: '''Out of their own hearts'' indicates that their prophetic message arises
      from themselves rather than from the LORD.'
    reason: cultural_note
lexical_decisions:
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: This is Ezekiel’s standard divine address. A more literal rendering preserves
    the idiom and its repeated rhetorical force in the book better than smoothing
    it to 'human one' or 'mortal.' Although אָדָם can mean 'man' or 'humankind' contextually,
    here the fixed expression is best retained as 'son of man.'
- source_word: שִׂים פָּנֶיךָ אֶל
  chosen: set your face against
  alternatives:
  - turn your face toward
  - direct your face against
  lexicon: HALOT
  rationale: The idiom literally involves setting one's face toward/against someone,
    and in prophetic judgment contexts it commonly signals opposition. Because the
    following clause also says 'prophesy against them,' rendering the idiom with 'against'
    makes the adversative force explicit without undue paraphrase.
- source_word: בְּנוֹת עַמְּךָ
  chosen: the daughters of your people
  alternatives:
  - the women of your people
  lexicon: HALOT
  rationale: The Hebrew is specifically 'daughters,' not a generic term for women.
    Given the translation philosophy's gender-accurate principle, the familial term
    should be preserved in the main text rather than generalized.
- source_word: הַמִּתְנַבְּאוֹת
  chosen: who prophesy
  alternatives:
  - who are acting as prophets
  - who are prophesying
  lexicon: HALOT
  rationale: The participle denotes ongoing or characteristic prophetic activity.
    'Who prophesy' is natural English and preserves the verbal force.
- source_word: מִלִּבְּהֶן
  chosen: out of their own hearts
  alternatives:
  - from their own hearts
  - from their own minds
  lexicon: HALOT
  rationale: 'לֵב/לֵבָב in Hebrew often denotes the inner person, including thought
    and intention, but ''heart'' is the standard and theologically resonant rendering.
    ''Their own'' brings out the polemical force: their message arises from themselves,
    not from YHWH.'
- source_word: וְהִנָּבֵא עֲלֵיהֶן
  chosen: and prophesy against them
  alternatives:
  - and speak prophetically against them
  lexicon: HALOT
  rationale: The Niphal imperative/command here is straightforward. 'Against' reflects
    עַל in a hostile prophetic context and matches the judgment setting of the passage.
