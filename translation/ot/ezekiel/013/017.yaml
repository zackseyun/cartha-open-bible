theological_decisions:
- issue: Nature of the women's prophetic activity
  chosen_reading: Render them as 'who prophesy' without adding 'falsely' in the main
    text.
  alternative_readings:
  - who prophesy falsely
  - who pretend to prophesy
  rationale: The broader context condemns these women, but this verse itself states
    that they prophesy from their own hearts. Adding 'falsely' would import the contextual
    judgment into the wording rather than letting the immediate Hebrew express it.
    The condemnation is sufficiently conveyed by 'out of their own hearts' and 'prophesy
    against them.'
  doctrine_reference: 'Translation philosophy: original-language primacy; never import
    doctrinal claims the text does not make.'
