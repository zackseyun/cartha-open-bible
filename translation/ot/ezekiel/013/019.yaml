id: EZK.13.19
reference: Ezekiel 13:19
source:
  edition: WLC
  text: וַ/תְּחַלֶּלְ֨נָה אֹתִ֜/י אֶל עַמִּ֗/י בְּ/שַׁעֲלֵ֣י שְׂעֹרִים֮ וּ/בִ/פְת֣וֹתֵי
    לֶחֶם֒ לְ/הָמִ֤ית נְפָשׁוֹת֙ אֲשֶׁ֣ר לֹֽא תְמוּתֶ֔נָה וּ/לְ/חַיּ֥וֹת נְפָשׁ֖וֹת
    אֲשֶׁ֣ר לֹא תִֽחְיֶ֑ינָה בְּ/כַ֨זֶּבְ/כֶ֔ם לְ/עַמִּ֖/י שֹׁמְעֵ֥י כָזָֽב־־־׃ס
translation:
  text: And you have profaned me among my people for handfuls of barley and for pieces
    of bread, putting to death persons who should not die and keeping alive persons
    who should not live, by your lying to my people, who listen to lies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for morsels of bread.' The Hebrew refers to broken pieces or small portions,
      emphasizing the trivial payment for which they acted.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'souls' or 'lives' in both clauses; here rendered 'persons' to reflect
      the Hebrew idiom for human beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּחַלֶּלְנָה
  chosen: you have profaned
  alternatives:
  - you have defiled
  - you have dishonored
  lexicon: HALOT
  rationale: From חלל in the piel, here meaning to profane or treat as common. 'Profaned'
    best preserves the covenantal/religious force of violating God's holiness, stronger
    and more specific than merely 'dishonored'.
- source_word: אֹתִי אֶל־עַמִּי
  chosen: me among my people
  alternatives:
  - me before my people
  - me to my people
  lexicon: HALOT
  rationale: The preposition אֶל can be flexible in context; here the sense is that
    their conduct has profaned God in relation to/in the eyes of his people. 'Among
    my people' is idiomatic English and fits the social setting of public religious
    corruption.
- source_word: בְּשַׁעֲלֵי שְׂעֹרִים
  chosen: for handfuls of barley
  alternatives:
  - for handfuls of barley grain
  lexicon: HALOT
  rationale: שַׁעֲלֵי denotes handfuls or small quantities. The phrase conveys the
    cheapness of the payment for which the false prophetesses act. 'For' captures
    the transactional sense of בְּ here.
- source_word: וּבִפְתוֹתֵי לֶחֶם
  chosen: and for pieces of bread
  alternatives:
  - and for morsels of bread
  - and for scraps of bread
  lexicon: HALOT
  rationale: פְּתֹתֵי refers to broken pieces or morsels. 'Pieces of bread' is clear
    modern English; 'morsels' is possible but slightly less natural.
- source_word: לְהָמִית נְפָשׁוֹת
  chosen: putting to death persons
  alternatives:
  - to kill lives
  - to put souls to death
  - to kill people
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to living persons rather than immaterial 'souls.'
    'Persons' preserves the individual-human reference while avoiding misleading dualistic
    overtones.
- source_word: אֲשֶׁר לֹא תְמוּתֶנָה
  chosen: who should not die
  alternatives:
  - who were not to die
  - who ought not to die
  lexicon: HALOT
  rationale: The clause marks those not destined or deserving to die under God's judgment.
    'Should not die' is natural and preserves the moral/judicial force without over-specifying
    predestination.
- source_word: וּלְחַיּוֹת נְפָשׁוֹת
  chosen: and keeping alive persons
  alternatives:
  - and preserving the lives of persons
  - and letting persons live
  lexicon: HALOT
  rationale: The infinitive construct of חיה in this parallel line contrasts with
    'putting to death.' 'Keeping alive' preserves the active causative/resultative
    sense in concise English.
- source_word: אֲשֶׁר לֹא תִחְיֶינָה
  chosen: who should not live
  alternatives:
  - who were not to live
  - who ought not to live
  lexicon: HALOT
  rationale: Parallel to the previous clause. 'Should not live' keeps the judicial
    contrast and avoids adding interpretive detail.
- source_word: בְּכַזֶּבְכֶם
  chosen: by your lying
  alternatives:
  - with your lies
  - through your deception
  lexicon: HALOT
  rationale: The prefixed ב marks means or instrument. The form is verbal in force
    with pronominal suffix, so 'by your lying' captures the action by which they accomplish
    this.
- source_word: שֹׁמְעֵי כָזָב
  chosen: who listen to lies
  alternatives:
  - who hear lies
  - who listen to falsehood
  lexicon: HALOT
  rationale: A participial phrase describing the people as receptive to falsehood.
    'Listen to lies' communicates not mere auditory reception but heedful acceptance.
