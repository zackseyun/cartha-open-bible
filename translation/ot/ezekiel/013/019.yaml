theological_decisions:
- issue: Meaning of נְפָשׁוֹת in a judgment context
  chosen_reading: persons
  alternative_readings:
  - souls
  - lives
  rationale: To render נֶפֶשׁ as 'souls' in English could imply a later body/soul
    dualism not required by the Hebrew. In this context the word refers to human beings/lives
    under judgment. 'Persons' best preserves the concrete referent while remaining
    readable.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of the death/life clauses
  chosen_reading: judicial-moral ('should not die' / 'should not live')
  alternative_readings:
  - purely predictive ('will not die' / 'will not live')
  rationale: The context is prophetic denunciation of false verdicts and manipulative
    divination. English 'should' preserves the sense that these women reverse proper
    outcomes, without importing a detailed theological system.
  doctrine_reference: Translation philosophy §3
