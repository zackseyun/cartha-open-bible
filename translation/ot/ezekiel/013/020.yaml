theological_decisions:
- issue: Rendering נֶפֶשׁ in a context of occult predation
  chosen_reading: lives
  alternative_readings:
  - souls
  - persons
  rationale: The verse concerns false prophetesses metaphorically hunting people.
    Rendering נֶפֶשׁ as 'lives' preserves the concrete sense of persons as living
    beings and avoids importing a narrower anthropological claim about the immaterial
    soul. This follows the project's principle not to import doctrinal claims the
    text does not make.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; original-language primacy over translation tradition.'
