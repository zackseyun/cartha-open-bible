id: EZK.13.20
reference: Ezekiel 13:20
source:
  edition: WLC
  text: לָ/כֵ֞ן כֹּה אָמַ֣ר אֲדֹנָ֣/י יְהוִ֗ה הִנְ/נִ֤י אֶל כִּסְּתוֹתֵי/כֶ֨נָה֙ אֲשֶׁ֣ר
    אַ֠תֵּנָה מְצֹדְד֨וֹת שָׁ֤ם אֶת הַ/נְּפָשׁוֹת֙ לְ/פֹ֣רְח֔וֹת וְ/קָרַעְתִּ֣י אֹתָ֔/ם
    מֵ/עַ֖ל זְרוֹעֹֽתֵי/כֶ֑ם וְ/שִׁלַּחְתִּי֙ אֶת הַ/נְּפָשׁ֔וֹת אֲשֶׁ֥ר אַתֶּ֛ם מְצֹדְד֥וֹת
    אֶת נְפָשִׁ֖ים לְ/פֹרְחֹֽת־׀־־־־׃
translation:
  text: 'Therefore thus says the Lord GOD: Behold, I am against your magic bands with
    which you hunt the lives there like birds, and I will tear them from your arms,
    and I will let the lives go free—the ones you hunt like birds.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your cushions' or 'your amulets'; the Hebrew term is rare and its exact
      referent is uncertain, likely some ritual object used by the prophetesses.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to fly' or 'flying ones'; the Hebrew likely uses bird-hunting
      imagery for the people being ensnared.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'souls' or 'lives'; here the sense is people as living beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Rendered the title in the conventional English form 'the Lord GOD' for
    אֲדֹנָי יְהוִה. This preserves the distinction between the title אֲדֹנָי ('Lord')
    and the divine name יְהוָה, which by project doctrine is rendered 'the LORD';
    in this compound form standard English capitalization 'GOD' avoids 'Lord LORD'.
- source_word: הִנְנִי אֶל
  chosen: Behold, I am against
  alternatives:
  - Look, I am against
  - See, I am against
  lexicon: HALOT
  rationale: The idiom הִנְנִי אֶל signals divine opposition. 'Behold, I am against'
    preserves both the deictic force and the adversative stance.
- source_word: כִּסְּתוֹתֵיכֶנָה
  chosen: your magic bands
  alternatives:
  - your cushions
  - your amulets
  - your wristbands
  lexicon: HALOT
  rationale: The noun is obscure in this context and likely refers to ritual objects
    used by the false prophetesses. 'Magic bands' captures the probable occult/ensnaring
    function better than the overly literal but opaque 'cushions,' while avoiding
    overprecision about exact form.
- source_word: מְצֹדְדוֹת
  chosen: you hunt
  alternatives:
  - you ensnare
  - you trap
  lexicon: HALOT
  rationale: From a root associated with hunting/trapping. 'Hunt' is vivid and fits
    the repeated predatory imagery in the verse.
- source_word: הַנְּפָשׁוֹת / נְפָשִׁים
  chosen: the lives ... the ones
  alternatives:
  - the souls ... souls
  - persons ... persons
  - lives ... lives
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to people as living beings under threat, not an abstract
    immaterial 'soul' in a later theological sense. 'Lives' best fits the context
    of predation and deliverance, while the second occurrence is smoothed as 'the
    ones' for natural English without losing referent.
- source_word: לְפֹרְחוֹת / לְפֹרְחֹת
  chosen: like birds
  alternatives:
  - to make them fly
  - flying away
  lexicon: HALOT
  rationale: The infinitive/participle from פרח ('fly, flutter') is difficult here.
    In context of hunting imagery and the repeated comparison, 'like birds' makes
    the metaphor intelligible in English while preserving the avian sense. The exact
    syntax is compressed in Hebrew and requires slight expansion in translation.
- source_word: וְקָרַעְתִּי אֹתָם מֵעַל זְרֹעוֹתֵיכֶם
  chosen: and I will tear them from your arms
  alternatives:
  - and I will rip them off your arms
  - and I will tear them away from your arms
  lexicon: HALOT
  rationale: 'A forceful judgment image: God will remove the ritual objects from the
    women themselves. ''Tear ... from your arms'' is both natural and strong.'
- source_word: וְשִׁלַּחְתִּי
  chosen: and I will let ... go free
  alternatives:
  - and I will send away
  - and I will release
  lexicon: HALOT
  rationale: In context, the verb denotes release from captivity/ensnarement. 'Let
    go free' makes the liberation explicit in idiomatic English.
- source_word: שָׁם
  chosen: there
  alternatives:
  - therein
  - in them
  lexicon: HALOT
  rationale: Retained as 'there' to reflect the adverb in the Hebrew, though its exact
    attachment is somewhat awkward. It likely points to the sphere of the women's
    activity or the ritual setting.
