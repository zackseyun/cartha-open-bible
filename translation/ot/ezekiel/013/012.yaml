id: EZK.13.12
reference: Ezekiel 13:12
source:
  edition: WLC
  text: וְ/הִנֵּ֖ה נָפַ֣ל הַ/קִּ֑יר הֲ/לוֹא֙ יֵאָמֵ֣ר אֲלֵי/כֶ֔ם אַיֵּ֥ה הַ/טִּ֖יחַ
    אֲשֶׁ֥ר טַחְתֶּֽם׃ס
translation:
  text: And look, when the wall falls, will it not be said to you, ‘Where is the plaster
    with which you plastered it?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whitewash' for 'plaster'; the term can refer to a coating spread over
      a wall, and in this chapter the image carries the sense of a deceptive surface
      treatment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And look
  alternatives:
  - And behold
  - Surely
  lexicon: HALOT
  rationale: Introduces a vivid, attention-directing scene. 'And look' preserves the
    deictic force in readable modern English better than the more archaic 'behold.'
- source_word: נָפַל
  chosen: falls
  alternatives:
  - has fallen
  - collapses
  lexicon: HALOT
  rationale: Although morphologically perfect, in context it functions within a future/conditional
    scenario tied to the following rhetorical question. English present 'falls' after
    'when' is natural and preserves the predictive force.
- source_word: הַקִּיר
  chosen: the wall
  alternatives:
  - the partition wall
  lexicon: HALOT
  rationale: Standard rendering of קִיר in this context of a constructed wall. 'Wall'
    is the plain sense and matches the prophetic metaphor.
- source_word: הֲלוֹא
  chosen: will it not
  alternatives:
  - surely
  - is it not the case that
  lexicon: HALOT
  rationale: Marks a rhetorical question expecting a positive answer. 'Will it not'
    fits the future-oriented context.
- source_word: יֵאָמֵר אֲלֵיכֶם
  chosen: will it not be said to you
  alternatives:
  - will they not say to you
  - will one not say to you
  lexicon: HALOT
  rationale: The Niphal is naturally rendered as an impersonal passive. This avoids
    supplying an unnecessary subject while preserving the Hebrew construction.
- source_word: אַיֵּה
  chosen: Where is
  alternatives:
  - Where then is
  - What happened to
  lexicon: HALOT
  rationale: Direct interrogative asking for the whereabouts/presence of the plaster
    after the wall's collapse.
- source_word: הַטִּיחַ
  chosen: the plaster
  alternatives:
  - the whitewash
  - the coating
  - the mortar
  lexicon: HALOT
  rationale: טִיחַ refers to plastering material. In Ezekiel 13 the broader context
    includes deceptive surface coating; 'plaster' is a clear, literal rendering, while
    'whitewash' is a contextually interpretive alternative worth preserving.
- source_word: אֲשֶׁר טַחְתֶּם
  chosen: with which you plastered it
  alternatives:
  - that you spread on it
  - which you whitewashed with
  lexicon: HALOT
  rationale: English idiom requires an object for the verb 'plastered'; 'it' refers
    back to the wall and is implied by the Hebrew context. This keeps the relation
    between the material and the action explicit and natural.
