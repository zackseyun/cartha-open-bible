id: EZK.13.18
reference: Ezekiel 13:18
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֞ כֹּה אָמַ֣ר אֲדֹנָ֣/י יְהוִ֗ה הוֹי֩ לִֽ/מְתַפְּר֨וֹת כְּסָת֜וֹת
    עַ֣ל כָּל אַצִּילֵ֣י יָדַ֗/י וְ/עֹשׂ֧וֹת הַ/מִּסְפָּח֛וֹת עַל רֹ֥אשׁ כָּל קוֹמָ֖ה
    לְ/צוֹדֵ֣ד נְפָשׁ֑וֹת הַ/נְּפָשׁוֹת֙ תְּצוֹדֵ֣דְנָה לְ/עַמִּ֔/י וּ/נְפָשׁ֖וֹת
    לָ/כֶ֥נָה תְחַיֶּֽינָה־׀׀־־־׃
translation:
  text: 'And say, ‘Thus says the Lord GOD: Woe to the women who sew bands on every
    wrist and make veils for the heads of persons of every height, to hunt souls!
    Will you hunt the souls of my people and keep your own souls alive?’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bands,' 'armbands,' or traditionally 'pillows' for the rare Hebrew term
      כְּסָתוֹת.
    reason: lexical_alternative
  - marker: b
    text: Or 'coverings' or 'kerchiefs' for the rare Hebrew term הַמִּסְפָּחוֹת.
    reason: lexical_alternative
  - marker: c
    text: Hebrew נְפָשׁוֹת can also mean 'lives' or 'persons' here; 'souls' is retained
      in the main text to preserve the repeated wording and rhetorical force.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: Standard English rendering for the compound divine title in Ezekiel.
    Per doctrine, יְהוָה is rendered 'the LORD'; in the fixed collocation אֲדֹנָי
    יְהוִה, 'the Lord GOD' avoids 'Lord LORD' and reflects established sense without
    obscuring the Hebrew title structure.
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: Prophetic denunciation formula is best captured by 'Woe,' which preserves
    both lament and judgment force.
- source_word: לִמְתַפְּרוֹת
  chosen: to the women who sew
  alternatives:
  - to those sewing
  - to the seamstresses of
  lexicon: HALOT
  rationale: The feminine plural participle refers specifically to the women being
    denounced. English supplies 'women who sew' for clarity and to preserve the gendered
    reference in context.
- source_word: כְּסָתוֹת
  chosen: magic bands
  alternatives:
  - bands
  - armbands
  - pillows
  - amulets
  lexicon: HALOT
  rationale: The noun is rare and difficult. Traditional 'pillows' likely reflects
    older interpretation, but the context of occult practice and placement on the
    arms/wrists favors some kind of bands or charms. 'Magic bands' makes explicit
    the likely ritual function without over-specifying the exact object.
- source_word: עַל כָּל אַצִּילֵי יָדַי
  chosen: on every wrist
  alternatives:
  - on all elbows of the hands
  - on every arm joint
  - on all wrists
  lexicon: HALOT
  rationale: אַצִּיל can denote the forearm/elbow/wrist area. In idiomatic English,
    'on every wrist' best fits something sewn onto the arms and avoids awkward literalism.
    The distributive כָּל is preserved by 'every.'
- source_word: וְעֹשׂוֹת הַמִּסְפָּחוֹת
  chosen: and make veils
  alternatives:
  - and make coverings
  - and make kerchiefs
  - and make head-coverings
  lexicon: HALOT
  rationale: The noun is another rare term, likely a covering associated with the
    head in ritual practice. 'Veils' is readable and fits the following phrase 'for
    the head,' while preserving the crafted-object sense.
- source_word: עַל רֹאשׁ כָּל קוֹמָה
  chosen: for the head of persons of every height
  alternatives:
  - upon the head of every stature
  - for heads of every size
  - for the head of every person
  lexicon: HALOT
  rationale: קוֹמָה literally refers to stature/height. The phrase likely means people
    of every size or age category. 'Persons of every height' keeps the concrete imagery
    and avoids flattening the Hebrew into a generic 'everyone'.
- source_word: לְצוֹדֵד נְפָשׁוֹת
  chosen: to hunt souls
  alternatives:
  - to ensnare lives
  - to trap persons
  - to hunt lives
  lexicon: HALOT
  rationale: The infinitive expresses purpose. נֶפֶשׁ in Ezekiel often means life/person,
    but 'souls' preserves the repeated wordplay in this verse and the ominous spiritual
    dimension of the accusation.
- source_word: הַנְּפָשׁוֹת תְּצוֹדֵדְנָה לְעַמִּי
  chosen: Will you hunt the souls of my people
  alternatives:
  - You hunt the lives of my people
  - Will you ensnare the persons of my people
  lexicon: HALOT
  rationale: Rendered as a rhetorical question in line with the Hebrew interrogative
    force implied by context. Repeating 'souls' preserves the rhetorical repetition
    of נֶפֶשׁ.
- source_word: וּנְפָשׁוֹת לָכֶנָה תְחַיֶּינָה
  chosen: and keep your own souls alive
  alternatives:
  - and preserve yourselves alive
  - and save your own lives
  - and keep yourselves alive
  lexicon: HALOT
  rationale: The contrast is between the people they prey upon and themselves. 'Your
    own souls' keeps the lexical repetition with נֶפֶשׁ while communicating self-preservation.
