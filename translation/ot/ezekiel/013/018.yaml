theological_decisions:
- issue: Rendering נֶפֶשׁ throughout the verse
  chosen_reading: souls
  alternative_readings:
  - lives
  - persons
  rationale: Although נֶפֶשׁ can denote life or person, the verse uses repeated wordplay
    in a context of occult manipulation and prophetic denunciation. 'Souls' preserves
    the rhetorical force and spiritual overtones, while the alternatives remain viable
    and are preserved in a footnote for auditability.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
