id: EZK.11.2
reference: Ezekiel 11:2
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר אֵלָ֑/י בֶּן אָדָ֕ם אֵ֣לֶּה הָ/אֲנָשִׁ֞ים הַ/חֹשְׁבִ֥ים אָ֛וֶן
    וְ/הַ/יֹּעֲצִ֥ים עֲצַת רָ֖ע בָּ/עִ֥יר הַ/זֹּֽאת־־׃
translation:
  text: And he said to me, “Son of man, these are the men who devise wickedness and
    give evil counsel in this city.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “who plan iniquity” or “who think evil.”
    reason: lexical_alternative
  - marker: b
    text: Or “and advise an evil plan.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  chosen: And he said to me
  alternatives:
  - Then he said to me
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol with indirect object; 'And he said to me'
    preserves the Hebrew sequence naturally in English.
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: This is Ezekiel's standard divine address. 'Son of man' is the established,
    source-near rendering and reflects the Hebrew idiom בן + אדם. Although אדם can
    mean 'man/humankind,' here the phrase functions as a vocative title for the prophet,
    not a generic reference to humanity.
- source_word: אֵלֶּה הָאֲנָשִׁים
  chosen: these are the men
  alternatives:
  - these are the people
  - these men
  lexicon: HALOT
  rationale: אנשים is grammatically and semantically masculine plural, referring to
    specific male leaders in context. 'The men' is gender-accurate and follows the
    project's policy against unnecessary neutralization.
- source_word: הַחֹשְׁבִים אָוֶן
  chosen: who devise wickedness
  alternatives:
  - who think evil
  - who plan iniquity
  - who devise trouble
  lexicon: HALOT
  rationale: חשב with און conveys intentional plotting, not mere internal thought.
    און can denote wickedness, trouble, or iniquity; here the parallel with evil counsel
    favors a moral sense. 'Devise wickedness' captures both deliberation and moral
    corruption in readable English.
- source_word: וְהַיֹּעֲצִים עֲצַת רָע
  chosen: and give evil counsel
  alternatives:
  - and counsel evil counsel
  - and advise an evil plan
  - and give wicked advice
  lexicon: HALOT
  rationale: The participle plus cognate noun construction emphasizes active advising.
    English avoids the awkward literal 'counsel counsel'; 'give evil counsel' preserves
    the advisory sense and the negative moral quality of רע.
- source_word: בָּעִיר הַזֹּאת
  chosen: in this city
  alternatives:
  - within this city
  lexicon: HALOT
  rationale: Straightforward locative phrase. 'In this city' is natural and sufficiently
    formal.
