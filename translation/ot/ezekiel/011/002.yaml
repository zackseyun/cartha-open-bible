theological_decisions:
- issue: Rendering of אדם within the vocative title בֶּן אָדָם
  chosen_reading: Son of man
  alternative_readings:
  - Mortal
  - Human one
  rationale: The phrase is a recurring prophetic address in Ezekiel and should be
    rendered consistently as a title-like expression. This preserves the Hebrew form
    and avoids flattening the literary and theological resonance of the repeated address.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; אָדָם default
    ''man / humankind (context)'''
