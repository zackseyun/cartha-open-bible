id: EZK.11.18
reference: Ezekiel 11:18
source:
  edition: WLC
  text: וּ/בָ֖אוּ שָׁ֑מָּ/ה וְ/הֵסִ֜ירוּ אֶת כָּל שִׁקּוּצֶ֛י/הָ וְ/אֶת כָּל תּוֹעֲבוֹתֶ֖י/הָ
    מִמֶּֽ/נָּה־־־־־׃
translation:
  text: They will come there and remove from it all its detestable things and all
    its abominations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all its idols'; the Hebrew term often refers to detestable idolatrous
      objects.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאוּ
  chosen: They will come
  alternatives:
  - And they will come
  - Then they will come
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly
    carries future/resultative force in English. 'They will come' fits the restoration
    context from the preceding verse better than a simple past.
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - to there
  - to it
  lexicon: HALOT
  rationale: Directional adverb meaning 'there/to there.' English idiom prefers 'there'
    after 'come.' The referent is the land/city contextually, but the adverb itself
    is best left as 'there.'
- source_word: וְהֵסִירוּ
  chosen: and remove
  alternatives:
  - and take away
  - and turn aside from
  lexicon: HALOT
  rationale: Hiphil of סור here means to remove or take away. 'Remove' is clear modern
    English and preserves the causative sense of eliminating objectionable objects
    from the place.
- source_word: אֶת כָּל שִׁקּוּצֶיהָ
  chosen: all its detestable things
  alternatives:
  - all its vile things
  - all its idols
  lexicon: HALOT
  rationale: שִׁקּוּץ often denotes a detestable thing, frequently an idol or idolatrous
    object. Because the term is broader than a technical word for idol and is paired
    with תּוֹעֵבָה, 'detestable things' preserves the lexical force without over-specifying.
    'Its' refers to the place/city/land in context.
- source_word: וְאֶת כָּל תּוֹעֲבוֹתֶיהָ
  chosen: and all its abominations
  alternatives:
  - and all its abhorrent things
  - and all its abominable practices
  lexicon: HALOT
  rationale: תּוֹעֵבָה is a strong covenantal term for abomination, especially in
    idolatrous and morally offensive contexts. 'Abominations' preserves the theological
    weight and distinguishes it from the preceding שִׁקּוּץ.
- source_word: מִמֶּנָּה
  chosen: from it
  alternatives:
  - out of it
  - from there
  lexicon: HALOT
  rationale: The preposition plus 3fs suffix refers back to the feminine location
    in context. 'From it' is the most natural English rendering with 'remove.'
