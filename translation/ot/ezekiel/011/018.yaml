theological_decisions:
- issue: Whether to specify idolatrous objects explicitly in שִׁקּוּצִים
  chosen_reading: Use the broader phrase 'detestable things' in the main text
  alternative_readings:
  - idols
  - abominable idols
  rationale: The immediate context concerns purification from idolatry, so 'idols'
    is interpretively plausible. However, the Hebrew term itself is broader and the
    translation philosophy prefers not to narrow the text beyond what the source warrants.
    The stronger contextual possibility is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never paraphrase beyond what the source text warrants.'
