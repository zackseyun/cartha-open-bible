theological_decisions:
- issue: Rendering of the divine manifestation כבוד in Ezekiel's throne vision
  chosen_reading: the glory of the God of Israel
  alternative_readings:
  - the glorious presence of the God of Israel
  rationale: The text speaks of God's visible glory without requiring an interpretive
    paraphrase. Retaining 'glory' preserves the theological and intertextual weight
    of Ezekiel's vision language while avoiding over-interpretation.
  doctrine_reference: Translation philosophy §§1, 3, 6
