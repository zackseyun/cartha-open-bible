id: EZK.11.22
reference: Ezekiel 11:22
source:
  edition: WLC
  text: וַ/יִּשְׂא֤וּ הַ/כְּרוּבִים֙ אֶת כַּנְפֵי/הֶ֔ם וְ/הָ/אֽוֹפַנִּ֖ים לְ/עֻמָּתָ֑/ם
    וּ/כְב֧וֹד אֱלֹהֵֽי יִשְׂרָאֵ֛ל עֲלֵי/הֶ֖ם מִ/לְ/מָֽעְלָ/ה־־׃
translation:
  text: Then the cherubim lifted up their wings, with the wheels beside them, and
    the glory of the God of Israel was above them from above.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and the wheels were beside them.' The Hebrew conjunction can be represented
      more literally with 'and,' but the sense is that the wheels accompanied the
      cherubim.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'above them from above,' an emphatic spatial expression indicating
      that the glory was overhead.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂאוּ
  chosen: lifted up
  alternatives:
  - raised
  - carried
  lexicon: HALOT
  rationale: From נשׂא in the Qal wayyiqtol, here describing the cherubim's upward
    motion of their wings. 'Lifted up' is idiomatic and fits the immediate object
    'their wings' better than 'carried.'
- source_word: הַכְּרוּבִים
  chosen: the cherubim
  alternatives:
  - the cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' preserves the established transliteration for these heavenly
    beings and reflects the Hebrew plural form without flattening the imagery.'
- source_word: כַּנְפֵיהֶם
  chosen: their wings
  lexicon: HALOT
  rationale: Straightforward rendering of 'wings' with 3mp suffix.
- source_word: וְהָאוֹפַנִּים
  chosen: with the wheels
  alternatives:
  - and the wheels
  lexicon: HALOT
  rationale: The conjunction plus nominal clause continues the vision description.
    Rendering with 'with' in English makes clear the wheels accompany the cherubim's
    movement, while preserving the referent 'wheels' from the vision context.
- source_word: לְעֻמָּתָם
  chosen: beside them
  alternatives:
  - opposite them
  - corresponding to them
  - alongside them
  lexicon: HALOT
  rationale: The preposition indicates position in relation to the cherubim. In this
    context of coordinated movement, 'beside them' is the most natural English expression.
- source_word: וּכְבוֹד
  chosen: and the glory
  alternatives:
  - and the glory-presence
  lexicon: HALOT
  rationale: כבוד here refers to the visible manifestation of divine glory in Ezekiel's
    vision. 'Glory' is the standard rendering and is sufficient in context without
    interpretive expansion.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: of the God of Israel
  lexicon: HALOT
  rationale: Construct chain rendered directly. 'God of Israel' is the standard covenantal
    designation.
- source_word: עֲלֵיהֶם
  chosen: was above them
  alternatives:
  - was over them
  lexicon: HALOT
  rationale: Marks the position of the divine glory relative to the cherubim and wheels.
    'Above' matches the spatial imagery.
- source_word: מִלְמָעְלָה
  chosen: from above
  alternatives:
  - high above
  - upward
  lexicon: HALOT
  rationale: The adverb intensifies or specifies the upward/overhead position. Rendering
    it distinctly as 'from above' preserves the Hebrew's added spatial note, even
    if somewhat taut in English.
