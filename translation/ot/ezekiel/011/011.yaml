id: EZK.11.11
reference: Ezekiel 11:11
source:
  edition: WLC
  text: הִ֗יא לֹֽא תִהְיֶ֤ה לָ/כֶם֙ לְ/סִ֔יר וְ/אַתֶּ֛ם תִּהְי֥וּ בְ/תוֹכָ֖/הּ לְ/בָשָׂ֑ר אֶל גְּב֥וּל יִשְׂרָאֵ֖ל אֶשְׁפֹּ֥ט אֶתְ/כֶֽם־־׃
translation:
  text: It will not be for you as a pot[a], and you will not be within it as meat; at the border of Israel I will judge you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as flesh.' The Hebrew word is literally 'flesh,' but in this cooking-pot metaphor it refers to meat in the pot.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִיא
  chosen: It
  alternatives:
  - she
  - this city
  lexicon: HALOT
  rationale: The feminine pronoun refers back to the city (Jerusalem) from the prior context. English uses the neuter pronoun for a city in this metaphorical statement.
- source_word: לְסִיר
  chosen: as a pot
  alternatives:
  - for a pot
  - as a cooking pot
  - cauldron
  lexicon: HALOT
  rationale: סִיר denotes a pot/cooking vessel. The phrase echoes the proverb in the surrounding context about the city as a pot. 'As a pot' communicates the metaphor naturally in English while staying close to the Hebrew.
- source_word: בְתוֹכָהּ
  chosen: within it
  alternatives:
  - in its midst
  - inside it
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'in its midst/in it,' referring to the city. 'Within it' is concise and preserves the spatial metaphor.
- source_word: לְבָשָׂר
  chosen: as meat
  alternatives:
  - for meat
  - as flesh
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh,' but in the pot metaphor it refers to meat placed in a cooking pot. 'Meat' best conveys the image in contemporary English; 'flesh' would sound overly literal and potentially misleading here.
- source_word: אֶל גְּבוּל יִשְׂרָאֵל
  chosen: at the border of Israel
  alternatives:
  - to the border of Israel
  - within the territory of Israel
  lexicon: HALOT
  rationale: אֶל with גְּבוּל can indicate movement toward or location at the border in context. Because the following judgment scene concerns their being brought out and judged at Israel's boundary, 'at the border of Israel' gives the most natural English sense.
- source_word: אֶשְׁפֹּט אֶתְכֶם
  chosen: I will judge you
  alternatives:
  - I will pass judgment on you
  - I will govern you
  lexicon: HALOT
  rationale: שׁפט here clearly carries the judicial sense in a prophetic judgment oracle. 'I will judge you' is the standard and sufficiently clear rendering.
