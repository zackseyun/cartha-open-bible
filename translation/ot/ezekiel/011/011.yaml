theological_decisions:
- issue: Metaphorical proverb about Jerusalem as a protective cooking pot
  chosen_reading: Retain the pot/meat imagery without interpretive expansion
  alternative_readings:
  - Paraphrase the sense as Jerusalem not being their protection
  rationale: The verse reverses the leaders' earlier proverb and announces that Jerusalem will not function as their supposed place of safety. Preserving the metaphor keeps the prophetic rhetoric and allows the theological force to emerge from the image itself rather than from added explanation.
