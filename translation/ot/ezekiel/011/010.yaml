id: EZK.11.10
reference: Ezekiel 11:10
source:
  edition: WLC
  text: בַּ/חֶ֣רֶב תִּפֹּ֔לוּ עַל גְּב֥וּל יִשְׂרָאֵ֖ל אֶשְׁפּ֣וֹט אֶתְ/כֶ֑ם וִֽ/ידַעְתֶּ֖ם
    כִּֽי אֲנִ֥י יְהוָֽה־־׃
translation:
  text: You will fall by the sword; I will judge you at the border of Israel, and
    you will know that I am the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the border of Israel.' The Hebrew phrase may denote location at or
      upon Israel's boundary.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחֶרֶב
  chosen: by the sword
  alternatives:
  - with the sword
  lexicon: HALOT
  rationale: The preposition ב with חֶרֶב here expresses instrument or means. 'By
    the sword' is idiomatic English for death in battle or execution and preserves
    the concrete imagery.
- source_word: תִּפֹּלוּ
  chosen: you will fall
  alternatives:
  - you will die
  - you will be struck down
  lexicon: HALOT
  rationale: נפל literally means 'fall.' In judgment contexts it can imply death,
    but 'fall' preserves the Hebrew image while allowing the following 'by the sword'
    to convey the lethal sense.
- source_word: עַל גְּבוּל יִשְׂרָאֵל
  chosen: at the border of Israel
  alternatives:
  - on the border of Israel
  - within the territory of Israel
  lexicon: HALOT
  rationale: גְּבוּל denotes border, boundary, or territory. With עַל, the most natural
    sense here is location at/on the border. 'At the border of Israel' is clear modern
    English and fits the judgment setting.
- source_word: אֶשְׁפּוֹט אֶתְכֶם
  chosen: I will judge you
  alternatives:
  - I will execute judgment on you
  lexicon: HALOT
  rationale: שׁפט means to judge, govern, or execute judgment. 'I will judge you'
    is the most direct rendering; the punitive force is already clear from context.
- source_word: וִידַעְתֶּם
  chosen: and you will know
  alternatives:
  - then you will know
  lexicon: HALOT
  rationale: The conjunction plus perfect with vav here carries future/resultative
    force in context. 'And you will know' preserves the Hebrew coordination; 'then'
    is interpretive and not necessary in the main text.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    to follow established reverential convention and the Septuagintal pattern.
