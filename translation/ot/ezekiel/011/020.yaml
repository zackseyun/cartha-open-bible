id: EZK.11.20
reference: Ezekiel 11:20
source:
  edition: WLC
  text: לְמַ֨עַן֙ בְּ/חֻקֹּתַ֣/י יֵלֵ֔כוּ וְ/אֶת מִשְׁפָּטַ֥/י יִשְׁמְר֖וּ וְ/עָשׂ֣וּ אֹתָ֑/ם וְ/הָיוּ לִ֣/י לְ/עָ֔ם וַ/אֲנִ֕י אֶהְיֶ֥ה לָ/הֶ֖ם לֵ/אלֹהִֽים־־׃
translation:
  text: so that they may walk in my statutes and keep my judgments and do them[a], and they will be my people, and I will be their God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my ordinances' for 'my judgments.' The Hebrew מִשְׁפָּטִים can denote legal rulings or prescribed ordinances in covenant context.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves the purposive force.
- source_word: בְּחֻקֹּתַי
  chosen: in my statutes
  alternatives:
  - by my statutes
  - according to my statutes
  - in my decrees
  lexicon: HALOT
  rationale: חֻקִּים commonly refers to prescribed statutes/decrees. 'Walk in' is the standard idiom with בְּ here, so 'in my statutes' preserves the covenantal metaphor.
- source_word: יֵלֵכוּ
  chosen: may walk
  alternatives:
  - will walk
  - live
  lexicon: HALOT
  rationale: הלך in covenant contexts often means conduct one's life. 'Walk' preserves the Hebrew metaphor; 'may walk' fits the purpose clause introduced by לְמַעַן.
- source_word: מִשְׁפָּטַי
  chosen: my judgments
  alternatives:
  - my rules
  - my ordinances
  - my judgments/justice
  lexicon: HALOT
  rationale: מִשְׁפָּטִים in legal-covenantal contexts refers to judicial rulings/ordinances. 'Judgments' is more formally transparent to the Hebrew than 'rules,' while remaining understandable.
- source_word: יִשְׁמְרוּ
  chosen: keep
  alternatives:
  - observe
  - guard
  lexicon: HALOT
  rationale: שׁמר with commandments/judgments regularly means keep/observe. 'Keep' is concise and idiomatic in biblical covenant language.
- source_word: וְעָשׂוּ אֹתָם
  chosen: and do them
  alternatives:
  - and carry them out
  - and practice them
  lexicon: HALOT
  rationale: The Hebrew explicitly adds performance after keeping. 'Do them' is slightly formal but accurately preserves the concrete obedience emphasis.
- source_word: וְהָיוּ לִי לְעָם
  chosen: and they will be my people
  alternatives:
  - and they shall be my people
  lexicon: HALOT
  rationale: Standard covenant formula. 'Will be' gives clear modern English while preserving the future covenant declaration.
- source_word: וַאֲנִי אֶהְיֶה לָהֶם לֵאלֹהִים
  chosen: and I will be their God
  alternatives:
  - and I shall be their God
  lexicon: HALOT
  rationale: Another standard covenant formula. 'God' is the natural rendering of אֱלֹהִים here in singular covenantal sense.
