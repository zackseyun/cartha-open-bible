- issue: Covenant formula rendering
  chosen_reading: Render the reciprocal covenant relationship as 'they will be my people, and I will be their God.'
  alternative_readings:
  - they shall be my people, and I shall be their God
  rationale: This preserves the established biblical covenant formula without importing additional theological interpretation. Modern 'will' is preferred over archaic 'shall' for readability.
