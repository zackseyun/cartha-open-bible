id: EZK.11.4
reference: Ezekiel 11:4
source:
  edition: WLC
  text: לָ/כֵ֖ן הִנָּבֵ֣א עֲלֵי/הֶ֑ם הִנָּבֵ֖א בֶּן אָדָֽם־׃
translation:
  text: Therefore prophesy against them; prophesy, son of man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prophesy concerning them'; the Hebrew preposition can be broader, but
      in this context of rebuke and judgment, 'against them' best fits.
    reason: lexical_alternative
  - marker: b
    text: '''Son of man'' is Ezekiel''s recurring form of address; alternatively,
      ''human one'' or ''mortal.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks logical consequence from the preceding accusation/judgment context.
    'Therefore' best preserves the inferential force in natural English.
- source_word: הִנָּבֵא
  chosen: prophesy
  alternatives:
  - speak prophetically
  lexicon: HALOT
  rationale: Imperative of נבא addressed to Ezekiel. 'Prophesy' is the standard and
    most direct rendering in prophetic commissioning contexts.
- source_word: עֲלֵיהֶם
  chosen: against them
  alternatives:
  - concerning them
  - over them
  lexicon: HALOT
  rationale: With נבא, עַל can mean speaking against or concerning. In this judgment
    context, 'against them' best reflects the adversative force and the content of
    the oracle.
- source_word: הִנָּבֵא
  chosen: prophesy
  alternatives:
  - speak prophetically
  lexicon: HALOT
  rationale: The repetition is retained rather than smoothed out, preserving the Hebrew
    emphasis and urgency.
- source_word: בֶּן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: This is Ezekiel's characteristic divine address. 'Son of man' preserves
    the established idiom and the Hebrew wording. Although idiomatically it highlights
    Ezekiel's humanity, the traditional rendering remains the most transparent to
    the source and readers.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humanity
  - mortal
  lexicon: HALOT
  rationale: Within the fixed expression בֶּן אָדָם, 'man' is the most natural component
    of the idiom. This follows the project's gender-accurate policy and the default
    handling of אָדָם by context.
