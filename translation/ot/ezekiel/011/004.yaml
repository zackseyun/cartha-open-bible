  chosen_reading: son of man
  alternative_readings:
  - human one
  - mortal
  rationale: In Ezekiel this phrase is a recurring divine title/address emphasizing
    the prophet's human status. 'Son of man' preserves the lexical form and intertextual
    continuity, while avoiding interpretive paraphrase. Because the phrase can sound
    opaque in English, alternatives are preserved in a footnote rather than replacing
