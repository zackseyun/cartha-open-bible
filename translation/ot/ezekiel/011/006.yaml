id: EZK.11.6
reference: Ezekiel 11:6
source:
  edition: WLC
  text: הִרְבֵּיתֶ֥ם חַלְלֵי/כֶ֖ם בָּ/עִ֣יר הַ/זֹּ֑את וּ/מִלֵּאתֶ֥ם חוּצֹתֶ֖י/הָ חָלָֽל׃פ
translation:
  text: You have multiplied your slain in this city and filled its streets with the slain[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your dead' / 'corpses'; the Hebrew term specifically suggests those killed violently, so 'slain' is preferred.
    reason: lexical_alternative
  - marker: b
    text: Or 'its squares' or 'its open places' for 'its streets.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִרְבֵּיתֶם
  chosen: have multiplied
  alternatives:
  - have increased
  - have made many
  lexicon: HALOT
  rationale: Hiphil perfect 2mp of רבה conveys causing something to become many. 'Have multiplied' preserves the causative/resultative force and fits the accusative object 'your slain.'
- source_word: חַלְלֵיכֶם
  chosen: your slain
  alternatives:
  - your dead
  - your corpses
  lexicon: HALOT
  rationale: חלל in this context denotes those killed violently, not merely the dead in general. 'Your slain' preserves the martial/judicial sense and the possessive suffix.
- source_word: בָּעִיר הַזֹּאת
  chosen: in this city
  alternatives:
  - within this city
  lexicon: HALOT
  rationale: Straightforward locative phrase. 'This city' keeps the demonstrative emphasis without sounding wooden.
- source_word: וּמִלֵּאתֶם
  chosen: and filled
  alternatives:
  - and have filled
  lexicon: HALOT
  rationale: Piel perfect 2mp of מלא means to fill. English coordinate style omits the repeated auxiliary for readability while retaining the completed action.
- source_word: חוּצֹתֶיהָ
  chosen: its streets
  alternatives:
  - its open places
  - its squares
  lexicon: HALOT
  rationale: חוץ/חוּצוֹת in urban context refers to streets or public thoroughfares. 'Streets' is the most natural modern English rendering here.
- source_word: חָלָל
  chosen: the slain
  alternatives:
  - slain men
  - corpses
  lexicon: HALOT
  rationale: The singular here functions collectively after 'filled its streets with ...'. Rendering it as collective 'the slain' is idiomatic and preserves the lexical link with the earlier חללים.
