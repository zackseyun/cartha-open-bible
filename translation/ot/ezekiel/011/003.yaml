id: EZK.11.3
reference: Ezekiel 11:3
source:
  edition: WLC
  text: הָ/אֹ֣מְרִ֔ים לֹ֥א בְ/קָר֖וֹב בְּנ֣וֹת בָּתִּ֑ים הִ֣יא הַ/סִּ֔יר וַ/אֲנַ֖חְנוּ
    הַ/בָּשָֽׂר׃
translation:
  text: who say, ‘The time is not near to build houses. This city is the pot, and
    we are the meat.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “It is not soon to build houses,” or “Not soon is the building of houses.”
      The Hebrew is elliptical.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the flesh.” In this cooking metaphor, “meat” conveys the image more
      naturally in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹמְרִים
  chosen: who say
  alternatives:
  - the ones saying
  - who are saying
  lexicon: HALOT
  rationale: Participle with article functions substantivally, referring back to the
    men in context; English relative clause is natural and preserves the ongoing characterization.
- source_word: לֹא בְקָרוֹב
  chosen: The time is not near
  alternatives:
  - It is not near
  - Not soon
  lexicon: HALOT
  rationale: The Hebrew is elliptical. Supplying 'the time' makes the English intelligible
    while preserving the sense of delay/immediacy denial. 'Not soon' is possible but
    less formally tied to the adjective 'near.'
- source_word: בְּנוֹת בָּתִּים
  chosen: to build houses
  alternatives:
  - building houses
  - to build houses for ourselves
  lexicon: HALOT
  rationale: Infinitive construct + object. 'To build houses' is the most direct rendering.
    No reflexive element is explicit in the Hebrew.
- source_word: הִיא הַסִּיר
  chosen: This city is the pot
  alternatives:
  - It is the pot
  - She is the pot
  - The cauldron is this city
  lexicon: HALOT
  rationale: The pronoun likely refers to the city implied by context (Jerusalem).
    Supplying 'This city' clarifies the metaphor for English readers. 'Pot' is a straightforward
    rendering of סִיר; 'cauldron' is possible but heavier than needed here.
- source_word: וַאֲנַחְנוּ הַבָּשָׂר
  chosen: and we are the meat
  alternatives:
  - and we are the flesh
  lexicon: HALOT
  rationale: Although בָּשָׂר often means 'flesh,' in the cooking-pot metaphor 'meat'
    better communicates the literal image in idiomatic English. This is a contextual,
    not theological, choice.
