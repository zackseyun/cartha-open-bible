id: EZK.11.19
reference: Ezekiel 11:19
source:
  edition: WLC
  text: וְ/נָתַתִּ֤י לָ/הֶם֙ לֵ֣ב אֶחָ֔ד וְ/ר֥וּחַ חֲדָשָׁ֖ה אֶתֵּ֣ן בְּ/קִרְבְּ/כֶ֑ם
    וַ/הֲסִ֨רֹתִ֜י לֵ֤ב הָ/אֶ֨בֶן֙ מִ/בְּשָׂרָ֔/ם וְ/נָתַתִּ֥י לָ/הֶ֖ם לֵ֥ב בָּשָֽׂר׃
translation:
  text: And I will give them one heart, and I will put a new spirit within them. I
    will remove the heart of stone from their flesh and give them a heart of flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew textual form here can be read 'within you'; the sense in context
      is commonly taken as 'within them,' matching the surrounding pronouns and the
      close parallel in Ezekiel 36:26.
    reason: textual_variant
  - marker: b
    text: '''One heart'' may also be understood as ''an undivided heart,'' emphasizing
      unified loyalty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵב אֶחָד
  chosen: one heart
  alternatives:
  - an undivided heart
  - one mind
  lexicon: HALOT
  rationale: לֵב commonly denotes the inner person—will, thought, and disposition—not
    merely emotion. 'One heart' is the most direct rendering and preserves the Hebrew
    metaphor. 'Undivided heart' captures the likely sense of unified loyalty but is
    more interpretive, so it is kept as an alternative rather than placed in the main
    text.
- source_word: רוּחַ חֲדָשָׁה
  chosen: a new spirit
  alternatives:
  - a new disposition
  - a new wind
  lexicon: HALOT
  rationale: רוּחַ can mean spirit, wind, or breath. In this anthropological and renewal
    context, 'spirit' best fits the inner transformative sense. 'Disposition' is interpretive;
    'wind' is not contextually suitable here.
- source_word: בְּקִרְבְּכֶם
  chosen: within them
  alternatives:
  - in their midst
  - within you
  lexicon: HALOT
  rationale: The ketiv-like consonantal form reflected in the supplied text shows
    2mp suffix ('within you'), but the surrounding third-person plural pronouns ('them,'
    'their') and the parallel in Ezek 36:26 support the sense 'within them.' For coherent
    translation of the verse as transmitted in context, 'within them' is adopted,
    while the formally possible 'within you' is preserved as a textual/reading alternative.
- source_word: וַהֲסִרֹתִי
  chosen: I will remove
  alternatives:
  - I will take away
  lexicon: HALOT
  rationale: The Hiphil of סור here conveys causing something to depart or be removed.
    'Remove' is natural modern English and preserves the causative force.
- source_word: לֵב הָאֶבֶן
  chosen: the heart of stone
  alternatives:
  - the stony heart
  lexicon: HALOT
  rationale: The construct phrase is rendered literally to preserve the vivid metaphor.
    'Stony heart' is idiomatic English but slightly less formally transparent.
- source_word: מִבְּשָׂרָם
  chosen: from their flesh
  alternatives:
  - from their body
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh.' Since the phrase is part of a concrete
    metaphor contrasting stone and flesh, the literal 'flesh' should be retained rather
    than generalized to 'body.'
- source_word: לֵב בָּשָׂר
  chosen: a heart of flesh
  alternatives:
  - a tender heart
  - a natural heart
  lexicon: HALOT
  rationale: The Hebrew contrasts stone with flesh. 'A heart of flesh' preserves the
    metaphor and leaves its implications—softness, responsiveness, living vitality—to
    the reader. 'Tender heart' explains rather than translates.
