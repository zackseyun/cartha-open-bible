theological_decisions:
- issue: Anthropological metaphor of inner renewal
  chosen_reading: Retain 'heart' and 'spirit' as distinct but related terms in the
    main text.
  alternative_readings:
  - Collapse both into psychological paraphrase such as 'mind' and 'attitude'
  rationale: The verse presents divine transformation using Israel's own anthropological
    categories. Preserving both terms maintains the theological texture of inner renewal
    without over-systematizing how 'heart' and 'spirit' relate.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Metaphor of 'heart of flesh'
  chosen_reading: Render literally as 'heart of flesh' rather than interpretively
    as 'soft/tender heart.'
  alternative_readings:
  - a soft heart
  - a responsive heart
  rationale: The text itself sets up a metaphorical contrast between stone and flesh.
    A literal rendering preserves theological tension and imagery rather than resolving
    it into one explanatory nuance.
  doctrine_reference: Translation philosophy §3, §5
