theological_decisions:
- issue: Referent of the feminine suffix in מִתּוֹכָהּ
  chosen_reading: The suffix refers to Jerusalem/the city, rendered implicitly as 'its' in English.
  alternative_readings:
  - A more explicit rendering could be 'from the midst of the city'
  rationale: The immediate context concerns Jerusalem as the city from which the people will be removed. English can preserve the pronominal reference with 'its' without adding an explicit noun not present in the verse.
