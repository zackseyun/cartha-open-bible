id: EZK.11.9
reference: Ezekiel 11:9
source:
  edition: WLC
  text: וְ/הוֹצֵאתִ֤י אֶתְ/כֶם֙ מִ/תּוֹכָ֔/הּ וְ/נָתַתִּ֥י אֶתְ/כֶ֖ם בְּ/יַד זָרִ֑ים וְ/עָשִׂ֛יתִי בָ/כֶ֖ם שְׁפָטִֽים־׃
translation:
  text: And I will bring you out from its midst[a], and I will give you into the hand of foreigners[b], and I will execute judgments on you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliver you into the hand of foreigners.' The Hebrew idiom 'give into the hand of' means to hand someone over to another's power.
    reason: lexical_alternative
  - marker: b
    text: Or 'execute judgments on you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹצֵאתִי
  chosen: And I will bring ... out
  alternatives:
  - And I will lead ... out
  - And I will take ... out
  lexicon: HALOT
  rationale: 'From יצא in the Hiphil, causative: ''cause to go out, bring out.'' ''Bring out'' is natural modern English and preserves the causative force without over-paraphrase.'
- source_word: מִתּוֹכָהּ
  chosen: from its midst
  alternatives:
  - from the midst of it
  - out of it
  lexicon: HALOT
  rationale: תּוֹךְ denotes the interior or midst. The 3fs suffix refers back to the city (Jerusalem) in context. 'From its midst' keeps the imagery and the feminine antecedent implicit in idiomatic English.
- source_word: וְנָתַתִּי אֶתְכֶם בְּיַד
  chosen: and I will give you into the hand of
  alternatives:
  - and I will deliver you into the hand of
  - and I will hand you over to
  lexicon: HALOT
  rationale: נתן + בְּיַד is a common idiom for handing someone over to another's power. 'Give you into the hand of' preserves the Hebrew idiom while remaining readable.
- source_word: זָרִים
  chosen: foreigners
  alternatives:
  - strangers
  - aliens
  lexicon: HALOT
  rationale: זָרִים here refers to foreign people, likely foreign conquerors, not merely unknown persons. 'Foreigners' is the clearest contemporary rendering; 'aliens' is misleading in modern English.
- source_word: וְעָשִׂיתִי בָכֶם שְׁפָטִים
  chosen: and I will execute judgments against you
  alternatives:
  - and I will execute judgments on you
  - and I will carry out judgments among you
  lexicon: HALOT
  rationale: עשה + ב + שְׁפָטִים is an idiom meaning to carry out acts of judgment upon someone. 'Execute judgments against you' best conveys punitive judicial action in idiomatic English. 'Against' makes the adversative force explicit.
