id: EZK.11.24
reference: Ezekiel 11:24
source:
  edition: WLC
  text: וְ/ר֣וּחַ נְשָׂאַ֗תְ/נִי וַ/תְּבִיאֵ֤/נִי כַשְׂדִּ֨ימָ/ה֙ אֶל הַ/גּוֹלָ֔ה בַּ/מַּרְאֶ֖ה בְּ/ר֣וּחַ אֱלֹהִ֑ים וַ/יַּ֨עַל֙ מֵֽ/עָלַ֔/י הַ/מַּרְאֶ֖ה אֲשֶׁ֥ר רָאִֽיתִי־׃
translation:
  text: Then the Spirit lifted me up and brought me to the exiles in Chaldea[a], in the vision by the Spirit of God[d][c][b]; and the vision that I had seen went up from me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'carried me' for 'lifted me up.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to the exiled community'; Hebrew 'to the exile' can refer collectively to the deported people.
    reason: lexical_alternative
  - marker: c
    text: Or 'in the Spirit of God.' The Hebrew preposition can express either agency ('by') or sphere ('in').
    reason: alternative_reading
  - marker: d
    text: Or 'departed from me.' The Hebrew literally says 'went up from upon me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְר֣וּחַ
  chosen: Then the Spirit
  alternatives:
  - And the Spirit
  - wind
  - breath
  lexicon: HALOT
  rationale: רוּחַ can mean spirit, wind, or breath. In Ezekiel's visionary transport context, and with the later phrase 'by the Spirit of God,' 'the Spirit' is the most natural rendering. The prefixed conjunction is rendered 'Then' for smooth narrative progression in English.
- source_word: נְשָׂאַתְנִי
  chosen: lifted me up
  alternatives:
  - carried me
  - bore me away
  lexicon: HALOT
  rationale: נשא commonly means lift, carry, or bear. 'Lifted me up' fits Ezekiel's repeated visionary transport language and preserves the concrete imagery.
- source_word: וַתְּבִיאֵנִי
  chosen: brought me
  alternatives:
  - carried me
  - led me
  lexicon: HALOT
  rationale: בוא in the hiphil means cause to come, bring. 'Brought me' is the straightforward causative rendering.
- source_word: כַשְׂדִּימָה
  chosen: to Chaldea
  alternatives:
  - to the Chaldeans
  - toward Chaldea
  - to Babylonia
  lexicon: HALOT
  rationale: The directional form indicates movement toward the land/region of the Chaldeans. 'To Chaldea' preserves the geographic sense better than the ethnic 'to the Chaldeans.' 'Babylonia' is interpretive modernization.
- source_word: אֶל הַגּוֹלָה
  chosen: to the exiles
  alternatives:
  - to the exile
  - to the exiled community
  - to the captives
  lexicon: HALOT
  rationale: הַגּוֹלָה can denote the body of exiles or the state of exile. Here it refers to the deported community among whom Ezekiel lives, so 'the exiles' is the clearest idiomatic English.
- source_word: בַּמַּרְאֶה
  chosen: in the vision
  alternatives:
  - in a vision
  - by the vision
  - in appearance
  lexicon: HALOT
  rationale: מַרְאֶה can mean appearance or vision. In Ezekiel's prophetic context it refers to visionary experience. The article supports 'the vision,' referring to the specific revelatory experience underway.
- source_word: בְּרוּחַ אֱלֹהִים
  chosen: by the Spirit of God
  alternatives:
  - in the Spirit of God
  - by a spirit of God
  - by the wind of God
  lexicon: HALOT
  rationale: 'The phrase most naturally expresses agency or means in this context: the vision occurred by the Spirit of God. Capitalizing ''Spirit'' reflects the likely reference to God''s Spirit rather than an impersonal wind.'
- source_word: וַיַּעַל מֵעָלַי
  chosen: rose up from me
  alternatives:
  - went up from me
  - departed from me
  - lifted away from me
  lexicon: HALOT
  rationale: עלה means go up, ascend. Combined with מעלי, it pictures the vision withdrawing upward from Ezekiel. 'Rose up from me' preserves the vertical imagery more closely than the more interpretive 'departed from me.'
- source_word: הַמַּרְאֶה אֲשֶׁר רָאִיתִי
  chosen: the vision that I had seen
  alternatives:
  - the appearance that I saw
  - the vision I had seen
  lexicon: HALOT
  rationale: This repeats מַרְאֶה and explicitly identifies the revelatory experience. The pluperfect-like English 'had seen' fits the sequence after the transport and withdrawal of the vision.
