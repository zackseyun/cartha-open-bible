theological_decisions:
- issue: Whether רוּחַ in this verse should be rendered impersonally ('wind') or personally/theologically ('Spirit')
  chosen_reading: Both occurrences are rendered with reference to the Spirit, with the second explicitly 'the Spirit of God.'
  alternative_readings:
  - wind
  - breath
  rationale: The immediate context is prophetic transport and revelation, not meteorological description. Rendering רוּחַ as 'Spirit' preserves the theological and narrative coherence of Ezekiel's visionary experience without over-specifying beyond the text.
  doctrine_reference: Translation philosophy §3, §6
