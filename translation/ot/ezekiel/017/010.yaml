id: EZK.17.10
reference: Ezekiel 17:10
source:
  edition: WLC
  text: וְ/הִנֵּ֥ה שְׁתוּלָ֖ה הֲ/תִצְלָ֑ח הֲ/לוֹא֩ כְ/גַ֨עַת בָּ֜/הּ ר֤וּחַ הַ/קָּדִים֙ תִּיבַ֣שׁ יָבֹ֔שׁ עַל עֲרֻגֹ֥ת צִמְחָ֖/הּ תִּיבָֽשׁ־׃פ
translation:
  text: And look[a], though it is planted[c][b], will it prosper? Will it not completely wither when the east wind touches it? It will wither on the beds where it sprouted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will surely dry up' / 'will utterly dry up'; the Hebrew uses an infinitive absolute with the finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''East wind'' refers to the hot, destructive wind from the eastern desert, a common image of withering judgment.'
    reason: cultural_note
  - marker: c
    text: Or 'on the garden beds of its growth'; the Hebrew phrase refers to the cultivated plots where the plant had grown.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתוּלָה
  chosen: planted
  alternatives:
  - transplanted
  - set out
  lexicon: HALOT
  rationale: Passive participle of שתל, describing the vine as having been planted/set in place. 'Planted' is the most natural English and fits the agricultural imagery.
- source_word: הֲתִצְלָח
  chosen: will it prosper?
  alternatives:
  - will it thrive?
  - will it succeed?
  lexicon: HALOT
  rationale: From צלח in the sense of succeeding/prospering. In plant imagery, 'prosper' preserves both growth and success without over-paraphrasing.
- source_word: כְגַעַת בָּהּ
  chosen: when ... touches it
  alternatives:
  - at the touch of it
  - as soon as it strikes it
  lexicon: HALOT
  rationale: Infinitive construct of נגע with prefixed כ, expressing the circumstance/time of contact. 'When ... touches it' is idiomatic modern English and preserves the causal-temporal force.
- source_word: רוּחַ הַקָּדִים
  chosen: the east wind
  alternatives:
  - the wind from the east
  lexicon: HALOT
  rationale: Standard Hebrew expression for the hot, destructive east wind. 'East wind' is the conventional and clear rendering.
- source_word: תִּיבַשׁ יָבֹשׁ
  chosen: will completely wither
  alternatives:
  - will surely wither
  - will utterly dry up
  lexicon: HALOT
  rationale: The finite verb plus infinitive absolute of יבש intensifies the action. 'Completely wither' conveys emphatic certainty and suits the plant metaphor better than the more wooden 'surely dry up'.
- source_word: עַל עֲרֻגוֹת צִמְחָהּ
  chosen: on the beds where it sprouted
  alternatives:
  - in the garden beds of its growth
  - upon the furrows where it grew
  lexicon: HALOT
  rationale: עֲרֻגוֹת refers to cultivated beds/plots; צִמְחָהּ denotes its growth/sprouting. The phrase points to the very place of its growth. 'Beds where it sprouted' is clear and agriculturally natural.
- source_word: תִּיבָשׁ
  chosen: It will wither
  alternatives:
  - it will dry up
  lexicon: HALOT
  rationale: Final repetition of יבש restates the outcome. 'Wither' maintains the plant imagery and reads naturally in English.
- source_word: וְהִנֵּה
  chosen: And look,
  alternatives:
  - And behold,
  - See,
  lexicon: HALOT
  rationale: Discourse marker drawing attention to the point of the riddle's application. 'And look' is readable modern English while retaining the deictic force.
