theological_decisions:
- issue: Rendering of the divine name יְהוָה in the title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord YHWH
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the life promise חָיֹה יִחְיֶה
  chosen_reading: he shall surely live
  alternative_readings:
  - he will surely remain alive
  - he shall surely have life
  rationale: The verse states the covenant consequence for the righteous person in Ezekiel's argument about individual responsibility. The translation preserves the Hebrew emphasis without importing later doctrinal conclusions about eternal life beyond what the context itself establishes.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
