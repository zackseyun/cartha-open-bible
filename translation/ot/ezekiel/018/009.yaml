id: EZK.18.9
reference: Ezekiel 18:9
source:
  edition: WLC
  text: בְּ/חֻקּוֹתַ֧/י יְהַלֵּ֛ךְ וּ/מִשְׁפָּטַ֥/י שָׁמַ֖ר לַ/עֲשׂ֣וֹת אֱמֶ֑ת צַדִּ֥יק הוּא֙ חָיֹ֣ה יִֽחְיֶ֔ה נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה׃
translation:
  text: He walks in my statutes and keeps my judgments[a], acting faithfully; he is righteous; he shall surely live, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to do truth,' that is, to act with truthfulness or faithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּחֻקּוֹתַי
  chosen: in my statutes
  alternatives:
  - by my statutes
  - according to my statutes
  lexicon: HALOT
  rationale: חֻקּוֹת refers to prescribed statutes/decrees. 'Walks in my statutes' is a natural English rendering of the Hebrew idiom while preserving the covenantal legal sense.
- source_word: יְהַלֵּךְ
  chosen: walks
  alternatives:
  - lives
  - conducts himself
  lexicon: HALOT
  rationale: הלך in this stem commonly functions idiomatically for one's manner of life. 'Walks' preserves the Hebrew metaphor and remains readable in English.
- source_word: וּמִשְׁפָּטַי
  chosen: and my judgments
  alternatives:
  - and my rules
  - and my ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּטִים are legal judgments/ordinances. 'Judgments' keeps the juridical flavor and pairs well with 'statutes,' though 'rules' would be smoother.
- source_word: שָׁמַר
  chosen: keeps
  alternatives:
  - observes
  - guards
  lexicon: HALOT
  rationale: שׁמר in legal contexts means to keep/observe. 'Keeps' is concise and idiomatic.
- source_word: לַעֲשׂוֹת אֱמֶת
  chosen: to act faithfully
  alternatives:
  - to do truth
  - to act truthfully
  - to practice faithfulness
  lexicon: HALOT
  rationale: The infinitive phrase expresses purpose/result of keeping God's judgments. אֱמֶת here carries the sense of faithfulness/reliability rather than abstract 'truth' alone. 'To act faithfully' communicates ethical integrity in context without woodenly reproducing 'do truth.'
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - just
  - in the right
  lexicon: HALOT
  rationale: צַדִּיק is a key covenant-ethical term. 'Righteous' is the standard and best preserves the theological and moral dimension.
- source_word: חָיֹה יִחְיֶה
  chosen: he shall surely live
  alternatives:
  - he will certainly live
  - he shall indeed live
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verb. 'Shall surely live' is a conventional and accurate way to reflect the emphasis.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - declaration of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם introduces a solemn divine utterance. Per doctrine, יְהוָה is rendered 'the LORD.' 'Lord GOD' reflects אֲדֹנָי יְהוִה in standard English Bible style.
