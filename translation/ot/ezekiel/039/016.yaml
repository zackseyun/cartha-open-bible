id: EZK.39.16
reference: Ezekiel 39:16
source:
  edition: WLC
  text: וְ/גַ֥ם שֶׁם עִ֛יר הֲמוֹנָ֖ה וְ/טִהֲר֥וּ הָ/אָֽרֶץ־׃ס
translation:
  text: And the name of the city will also be Hamonah[a]. Thus they will cleanse the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hamonah is a place name likely related to the Hebrew word for a multitude or horde.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: And ... also
  alternatives:
  - Also
  - Moreover
  lexicon: HALOT
  rationale: The conjunction plus adverb adds an additional detail to the preceding context. Rendering with both 'And' and 'also' preserves the additive force naturally in English.
- source_word: שֵׁם
  chosen: the name
  alternatives:
  - name
  lexicon: HALOT
  rationale: In construct with 'city,' the phrase means 'the name of the city.' The definite sense is natural in English because a specific city is in view.
- source_word: עִיר
  chosen: the city
  alternatives:
  - city
  lexicon: HALOT
  rationale: Refers to a specific city associated with the burial site in the immediate context, so the definite rendering is appropriate in English.
- source_word: הֲמוֹנָה
  chosen: Hamonah
  alternatives:
  - Hamonahh
  - Multitude
  lexicon: HALOT
  rationale: This is a place name and should be transliterated rather than translated, in keeping with the translation philosophy for names. The name is likely related to 'multitude/horde,' but the main text should preserve it as a proper noun.
- source_word: וְטִהֲרוּ
  chosen: So they will cleanse
  alternatives:
  - and they will cleanse
  - and they cleansed
  - thus they will purify
  lexicon: HALOT
  rationale: 'The verb is a Piel perfect with prefixed conjunction, functioning here in the sequence as a future/resultative statement in context: after the burial process, the land will be cleansed. ''So they will cleanse'' captures the consequential sense more idiomatically than a bare ''and.'' ''Cleanse'' is preferred over ''purify'' for readable modern English in this concrete land-cleansing context.'
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: In Ezekiel this commonly refers to the land/territory, not the whole earth. 'The land' best fits the immediate context of defilement and cleansing within Israel's territory.
