id: EZK.21.7
reference: Ezekiel 21:7
source:
  edition: WLC
  text: בֶּן אָדָ֗ם שִׂ֤ים פָּנֶ֨י/ךָ֙ אֶל יְר֣וּשָׁלִַ֔ם וְ/הַטֵּ֖ף אֶל מִקְדָּשִׁ֑ים
    וְ/הִנָּבֵ֖א אֶל אַדְמַ֥ת יִשְׂרָאֵֽל־־־־׃
translation:
  text: Son of man, set your face toward Jerusalem, and preach toward the sanctuaries,
    and prophesy against the land of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'let [your words] drip against the sanctuaries,' a prophetic
      idiom for speaking or preaching judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: A fixed address to Ezekiel. 'Son of man' preserves the Hebrew idiom and
    its established force better than interpretive alternatives like 'mortal.' The
    phrase here is vocational, not a messianic title.
- source_word: שִׂים פָּנֶיךָ אֶל
  chosen: set your face toward
  alternatives:
  - direct your face toward
  - turn your face toward
  lexicon: HALOT
  rationale: This idiom commonly signals deliberate orientation, often in prophetic
    confrontation. 'Set your face toward' preserves the Hebrew imagery while remaining
    natural English.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
- source_word: וְהַטֵּף
  chosen: preach against
  alternatives:
  - let your words drip against
  - speak against
  - drop words against
  lexicon: HALOT
  rationale: The verb נטף literally means 'drip,' but in prophetic contexts it refers
    metaphorically to uttering prophetic speech. 'Preach against' captures the idiomatic
    prophetic sense in readable English. The more literal image is preserved in a
    footnote.
- source_word: מִקְדָּשִׁים
  chosen: the sanctuaries
  alternatives:
  - the holy places
  - the temples
  lexicon: HALOT
  rationale: Plural form in Hebrew should be represented. 'Sanctuaries' is broad enough
    to cover sacred precincts and preserves the cultic sense better than 'temples.'
- source_word: וְהִנָּבֵא
  chosen: prophesy against
  alternatives:
  - speak prophetically against
  lexicon: HALOT
  rationale: Standard rendering of נבא in imperative form. 'Against' reflects the
    hostile orientation marked by אֶל in this judgment context.
- source_word: אַדְמַת יִשְׂרָאֵל
  chosen: the land of Israel
  alternatives:
  - the soil of Israel
  - the ground of Israel
  lexicon: HALOT
  rationale: אַדְמָה can mean ground/soil/land; here 'land' best fits the national-territorial
    sense of the oracle.
