theological_decisions:
- issue: Force of the prophetic idiom וְהַטֵּף in a judgment oracle
  chosen_reading: Render idiomatically as 'preach against' rather than preserving
    the literal 'drip' in the main text
  alternative_readings:
  - let your words drip against
  - drop words against
  rationale: The Hebrew metaphor is vivid, but a literal rendering would likely obscure
    the prophetic speech-act for modern readers. Optimal equivalence favors the idiomatic
    sense in the text while preserving the literal image in a footnote for auditability.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition; preserve significant alternatives in footnotes
    where useful.'
