id: EZK.21.16
reference: Ezekiel 21:16
source:
  edition: WLC
  text: וַ/יִּתֵּ֥ן אֹתָ֛/הּ לְ/מָרְטָ֖ה לִ/תְפֹּ֣שׂ בַּ/כָּ֑ף הִֽיא הוּחַ֤דָּה חֶ֨רֶב֙
    וְ/הִ֣יא מֹרָ֔טָּה לָ/תֵ֥ת אוֹתָ֖/הּ בְּ/יַד הוֹרֵֽג־־׃
translation:
  text: It is given to be polished, to be grasped in the hand. It is sharpened—a sword—and
    it is polished, to put it into the hand of a killer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'burnished' for 'polished' (Hebrew מרט), emphasizing the gleaming preparation
      of the blade.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in the palm.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the slayer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: is given
  alternatives:
  - he gave
  - one gives
  lexicon: HALOT
  rationale: Although the form is wayyiqtol 3ms ('and he gave'), the subject is not
    explicitly stated and the surrounding lines use vivid, abrupt sword-oracle style.
    Rendering with an English passive avoids supplying an unnecessary subject and
    fits the sequence describing the sword's preparation.
- source_word: לְמָרְטָה
  chosen: to be polished
  alternatives:
  - for polishing
  - to be burnished
  lexicon: HALOT
  rationale: From מרט in the sense of polishing/burnishing a blade. 'Polished' is
    clear modern English; 'burnished' is possible but less accessible.
- source_word: לִתְפֹּשׂ
  chosen: to be grasped
  alternatives:
  - to grasp
  - to seize
  lexicon: HALOT
  rationale: The infinitive of תפש with בַּכָּף indicates taking hold in the palm/hand.
    Passive English ('to be grasped') matches the sword as object and keeps the line
    idiomatic.
- source_word: בַּכָּף
  chosen: in the hand
  alternatives:
  - in the palm
  lexicon: HALOT
  rationale: כַּף is literally 'palm,' but in English 'in the hand' better conveys
    the weapon being taken up for use.
- source_word: הוּחַדָּה
  chosen: is sharpened
  alternatives:
  - has been sharpened
  - is made sharp
  lexicon: HALOT
  rationale: Hophal of חדד, 'to sharpen.' Present passive suits the vivid prophetic
    description.
- source_word: חֶרֶב
  chosen: a sword
  alternatives:
  - the sword
  lexicon: HALOT
  rationale: The noun is anarthrous here. 'A sword' preserves the appositional force
    after 'it is sharpened,' while still clearly referring to the sword of the oracle.
- source_word: מֹרָטָּה
  chosen: is polished
  alternatives:
  - is burnished
  lexicon: HALOT
  rationale: Pual/passive participial sense from מרט. Repeating 'polished' preserves
    the Hebrew repetition and rhetorical intensity.
- source_word: לָתֵת אֹתָהּ
  chosen: to put it
  alternatives:
  - to give it
  lexicon: HALOT
  rationale: נתן plus 'into the hand' is a common idiom meaning to hand over or place
    into someone's power. 'Put it into the hand' is more natural here than the more
    wooden 'give it into the hand.'
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - in the hand of
  - into the power of
  lexicon: HALOT
  rationale: Though literally 'in/by the hand of,' with נתן the idiom conveys transfer
    into someone's possession or control. 'Into the hand of' preserves the Hebrew
    image.
- source_word: הוֹרֵג
  chosen: a killer
  alternatives:
  - the slayer
  - one who kills
  lexicon: HALOT
  rationale: Active participle of הרג. 'Killer' is concise and forceful in modern
    English; 'slayer' is possible but more archaic/literary.
