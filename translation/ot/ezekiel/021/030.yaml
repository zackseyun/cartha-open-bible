id: EZK.21.30
reference: Ezekiel 21:30
source:
  edition: WLC
  text: וְ/אַתָּה֙ חָלָ֣ל רָשָׁ֔ע נְשִׂ֖יא יִשְׂרָאֵ֑ל אֲשֶׁר בָּ֣א יוֹמ֔/וֹ בְּ/עֵ֖ת
    עֲוֺ֥ן קֵֽץ־׃ס
translation:
  text: And you, slain wicked one, prince of Israel, whose day has come at the time
    of final punishment,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the iniquity of the end'; the Hebrew may refer either
      to final guilt coming to its full measure or to the final punishment for that
      guilt.
    reason: lexical_alternative
  - marker: b
    text: '''Slain'' may also be rendered ''mortally wounded''; some take the Hebrew
      here in the sense ''profane,'' yielding ''O profane wicked prince of Israel.'''
    reason: alternative_reading
lexical_decisions:
- source_word: חָלָל
  chosen: slain
  alternatives:
  - profaned
  - mortally wounded
  lexicon: HALOT
  rationale: In this context addressing the ruler under judgment, חָלָל is best taken
    in the sense of one pierced/slain rather than 'profane.' 'Slain' is concise and
    preserves the judicial-death imagery. 'Mortally wounded' is possible, but 'slain'
    better matches the prophetic certainty of the sentence.
- source_word: רָשָׁע
  chosen: wicked one
  alternatives:
  - wicked
  - guilty one
  lexicon: HALOT
  rationale: Used substantivally here after חָלָל, so 'wicked one' makes the vocative
    force clear in English. 'Guilty one' is weaker morally and less direct than the
    Hebrew.
- source_word: נְשִׂיא יִשְׂרָאֵל
  chosen: prince of Israel
  alternatives:
  - leader of Israel
  - ruler of Israel
  lexicon: HALOT
  rationale: נְשִׂיא commonly denotes a prince, chief, or leader. 'Prince of Israel'
    preserves the formal title and echoes prophetic diction; 'leader' would be clearer
    but less textually specific.
- source_word: אֲשֶׁר בָּא יוֹמוֹ
  chosen: whose day has come
  alternatives:
  - for whom his day has come
  - whose time has come
  lexicon: HALOT
  rationale: This idiom signals the arrival of the appointed day of judgment. 'Whose
    day has come' is natural English and preserves the Hebrew imagery better than
    the more interpretive 'whose time has come.'
- source_word: בְּעֵת
  chosen: at the time of
  alternatives:
  - in the time of
  - when
  lexicon: HALOT
  rationale: A straightforward temporal preposition+noun construction. 'At the time
    of' is idiomatic and sufficiently formal.
- source_word: עֲוֺן קֵץ
  chosen: final punishment
  alternatives:
  - the iniquity of the end
  - end-time punishment
  - punishment at the end
  lexicon: HALOT
  rationale: The phrase is compressed and difficult. עָוֹן can denote iniquity or
    its consequence, punishment. In this judgment context, rendering it as punishment
    communicates the sense more clearly. קֵץ qualifies it as reaching its decisive
    end or finality. A more literal 'iniquity of the end' is possible but opaque in
    English.
