theological_decisions:
- issue: Interpretation of עֲוֺן in a judgment formula
  chosen_reading: Rendered as 'punishment' rather than 'iniquity'
  alternative_readings:
  - Rendered as 'iniquity' in a more formally literal translation
  rationale: Hebrew עָוֹן can refer either to guilt/iniquity or to the punishment
    borne for it. In this oracle of judgment against Israel's prince, the punitive
    sense best fits the immediate context and yields intelligible English without
    importing extra doctrine.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of חָלָל
  chosen_reading: 'Addressed as one already under sentence: ''slain wicked one'''
  alternative_readings:
  - '''profane wicked prince of Israel'' if חָלָל is taken in the sense ''profane'''
  rationale: Although חָלָל can in some contexts relate to profanation, the adjectival/vocative
    sequence here in a death-judgment oracle strongly supports the sense of one pierced
    or slain. This preserves the severity of the prophetic address without overinterpreting
    beyond the lexical range.
  doctrine_reference: Translation philosophy §1, §5
