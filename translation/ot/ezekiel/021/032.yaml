theological_decisions:
- issue: Messianic or immediate-historical referent of 'until he comes whose right
    it is'
  chosen_reading: Render the clause in a way that preserves the text's open-ended
    rightful-heir language without explicitly identifying the referent in the main
    text.
  alternative_readings:
  - A messianic reference to the coming Davidic ruler
  - A nearer historical reference to the one entitled to rule/judge
  rationale: The wording is widely understood as evocative of a future rightful Davidic
    ruler and may allude to Genesis 49:10, but the Hebrew itself does not name the
    figure. To preserve theological tension and avoid importing a doctrinal conclusion
    into the translation, the main text keeps the broader wording while a footnote
    can note the messianic possibility.
  doctrine_reference: Preserve theological tension rather than resolve it.
