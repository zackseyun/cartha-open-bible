id: EZK.21.32
reference: Ezekiel 21:32
source:
  edition: WLC
  text: עַוָּ֥ה עַוָּ֖ה עַוָּ֣ה אֲשִׂימֶ֑/נָּה גַּם זֹאת֙ לֹ֣א הָיָ֔ה עַד בֹּ֛א אֲשֶׁר ל֥/וֹ הַ/מִּשְׁפָּ֖ט וּ/נְתַתִּֽי/ו־־־׃פ
translation:
  text: A ruin[a], a ruin, a ruin—I will make it. This also shall not be, until he comes whose right it is[b], and I will give it to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Overthrown, overthrown, overthrown, I will make it.' The Hebrew repeats a noun three times for emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''Whose right it is'' may also be rendered ''to whom the judgment belongs'' or ''to whom it rightfully belongs.'' Many interpreters see an allusion to Genesis 49:10 and thus a messianic reference.'
    reason: alternative_reading
lexical_decisions:
- source_word: עַוָּה עַוָּה עַוָּה
  chosen: A ruin, a ruin, a ruin
  alternatives:
  - Overthrown, overthrown, overthrown
  - A ruin! A ruin! A ruin!
  - Ruin, ruin, ruin
  lexicon: HALOT
  rationale: The noun from עוה here functions as an emphatic threefold exclamation announcing total overthrow. 'A ruin' preserves the nominal force and the rhetorical repetition better than smoothing to a verbal clause, while remaining natural English.
- source_word: אֲשִׂימֶנָּה
  chosen: I will make it so
  alternatives:
  - I will make it
  - I will set it
  - I will make her/it a ruin
  lexicon: HALOT
  rationale: From שׂים, 'set/make/place,' with 3fs suffix referring back to the feminine noun implied by the royal state/crown order in context. 'I will make it so' idiomatically carries the sense of bringing about the announced ruin without over-specifying the object.
- source_word: גַּם זֹאת
  chosen: This also
  alternatives:
  - Even this
  - This too
  lexicon: HALOT
  rationale: A concise rendering that preserves the additive emphasis of גַּם with the demonstrative.
- source_word: לֹא הָיָה
  chosen: shall not be
  alternatives:
  - will be no more
  - shall not remain
  - was not
  lexicon: HALOT
  rationale: Though formally a perfect, in prophetic discourse it naturally carries future/resultative force. 'Shall not be' is close to the Hebrew and fits the forward-looking context.
- source_word: עַד בֹּא
  chosen: until he comes
  alternatives:
  - until the coming of
  - until one comes
  lexicon: HALOT
  rationale: A straightforward rendering of the temporal clause, preserving the personal subject implied by the following relative phrase.
- source_word: אֲשֶׁר לוֹ הַמִּשְׁפָּט
  chosen: whose right it is
  alternatives:
  - to whom the judgment belongs
  - to whom it rightfully belongs
  - whose is the justice
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, justice, or legal right/claim. In this succession-oracle context, 'whose right it is' best captures rightful entitlement and echoes the likely allusion to Genesis 49:10 without importing more than the Hebrew states.
- source_word: וּנְתַתִּיו
  chosen: and I will give it to him
  alternatives:
  - and I will place it on him
  - and I will hand it over to him
  lexicon: HALOT
  rationale: The object is implicit from context (the overturned royal rule/diadem/crown). 'Give it to him' is the most natural English expression of divine transfer of rule.
