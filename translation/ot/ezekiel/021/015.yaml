id: EZK.21.15
reference: Ezekiel 21:15
source:
  edition: WLC
  text: לְמַ֨עַן טְבֹ֤חַ טֶ֨בַח֙ הוּחַ֔דָּה לְמַעַן הֱיֵה לָ֥/הּ בָּ֖רָק מֹרָ֑טָּה
    א֣וֹ נָשִׂ֔ישׂ שֵׁ֥בֶט בְּנִ֖/י מֹאֶ֥סֶת כָּל עֵֽץ־־־׃
translation:
  text: So that it may slaughter a slaughter, it is sharpened; so that it may have
    a flash, it is polished. Or shall we rejoice? The scepter of my son despises every
    tree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew is difficult in the final clause. 'My son' follows the Masoretic
      Text; some interpreters understand it more broadly of Judah or my people, and
      'every tree' may mean every wooden staff or weapon.
    reason: alternative_reading
  - marker: b
    text: Or 'it may have lightning' or 'it may flash'; the Hebrew expression is elliptical,
      describing the sword gleaming after polishing.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  lexicon: HALOT
  rationale: Marks purpose/result in both clauses; 'so that' is natural English and
    preserves the purposive force.
- source_word: טְבֹחַ טֶבַח
  chosen: slaughter a slaughter
  alternatives:
  - make a slaughter
  - slay a slaughter
  - carry out a massacre
  lexicon: HALOT
  rationale: The infinitive/cognate accusative construction intensifies the action.
    'Slaughter a slaughter' preserves the Hebrew emphasis more transparently than
    smoothing it away.
- source_word: הוּחַדָּה
  chosen: it is sharpened
  alternatives:
  - it has been sharpened
  lexicon: HALOT
  rationale: Refers to the sword from the surrounding context; passive rendering is
    straightforward and idiomatic.
- source_word: הֱיֵה לָהּ בָּרָק
  chosen: it may flash like lightning
  alternatives:
  - it may have a flash
  - it may become lightning
  lexicon: HALOT
  rationale: The phrase is elliptical in Hebrew. Rendering the sense as a flashing
    lightning-like gleam best captures the image of the polished sword.
- source_word: מֹרָטָה
  chosen: it is polished
  alternatives:
  - it is burnished
  lexicon: HALOT
  rationale: Used of smoothing/polishing a blade so that it gleams. 'Polished' is
    accessible modern English; 'burnished' is a viable but less common alternative.
- source_word: אוֹ
  chosen: Or
  alternatives:
  - or else
  - shall
  lexicon: HALOT
  rationale: Introduces a difficult rhetorical turn. 'Or' preserves the abruptness
    of the Hebrew without over-resolving the syntax.
- source_word: נָשִׂישׂ
  chosen: shall we rejoice
  alternatives:
  - shall we be glad
  - let us rejoice
  lexicon: HALOT
  rationale: First person plural imperfect/cohortative nuance in a rhetorical question.
    'Shall we rejoice?' fits the context of ironic disbelief in the face of judgment.
- source_word: שֵׁבֶט
  chosen: scepter
  alternatives:
  - rod
  - tribal staff
  lexicon: HALOT
  rationale: In this royal/judgment context, 'scepter' better conveys rule and authority
    than the more generic 'rod.'
- source_word: בְּנִי
  chosen: my son
  alternatives:
  - my people
  - the son
  lexicon: HALOT
  rationale: The consonantal text reads 'my son.' Though difficult in context, the
    translation should reflect the MT while preserving interpretive alternatives in
    a footnote.
- source_word: מֹאֶסֶת
  chosen: despises
  alternatives:
  - rejects
  - spurns
  lexicon: HALOT
  rationale: Conveys contemptuous rejection. 'Despises' matches the force of the participial
    form in context.
- source_word: כָּל עֵץ
  chosen: every tree
  alternatives:
  - all wood
  - every staff
  lexicon: HALOT
  rationale: Literally 'every tree/wood.' The phrase is likely metaphorical, but the
    main text preserves the concrete Hebrew image; interpretive smoothing is better
    left to a footnote.
