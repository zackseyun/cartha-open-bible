theological_decisions:
- issue: Handling the notoriously difficult final clause in a judgment oracle
  chosen_reading: 'Retain a close rendering of the Masoretic Text: ''The scepter of
    my son despises every tree.'''
  alternative_readings:
  - '''The rod of my son rejects every tree/wood'''
  - Emended or interpretive readings that take the line as referring to Judah's scepter/rod
    or to the sword's contempt for every wooden weapon
  rationale: This verse is textually and syntactically difficult. No doctrinal issue
    is at stake, so the translation should not resolve the uncertainty by paraphrase.
    A relatively formal rendering preserves the Hebrew's opacity while documenting
    alternatives in footnotes.
  doctrine_reference: Translation philosophy §§1, 3, 5
