id: EZK.21.11
reference: Ezekiel 21:11
source:
  edition: WLC
  text: וְ/אַתָּ֥ה בֶן אָדָ֖ם הֵֽאָנַ֑ח בְּ/שִׁבְר֤וֹן מָתְנַ֨יִם֙ וּ/בִ/מְרִיר֔וּת
    תֵּֽאָנַ֖ח לְ/עֵינֵי/הֶֽם־׃
translation:
  text: And you, son of man, groan with breaking loins, and in bitterness you shall
    groan before their eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with broken loins' / 'with breaking of the loins.' The Hebrew image
      expresses intense bodily anguish.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: This is Ezekiel’s standard divine address. A relatively formal rendering
    preserves the idiom and its repeated usage in the book better than smoothing to
    'human one' or 'mortal.' It is not a messianic title here but a prophetic address.
- source_word: הֵאָנַח
  chosen: groan
  alternatives:
  - sigh
  - moan
  lexicon: HALOT
  rationale: The verb אנח denotes audible lament or groaning. 'Groan' best conveys
    the physical, grief-laden force in context, stronger than 'sigh' and less interpretively
    specific than 'moan.'
- source_word: בְּשִׁבְרוֹן מָתְנַיִם
  chosen: with breaking loins
  alternatives:
  - with broken hips
  - with breaking of the loins
  - with shattered waist
  lexicon: HALOT
  rationale: שִׁבְרוֹן is 'breaking, fracture, crushing,' and מָתְנַיִם refers to
    the loins/waist/hips. The phrase is idiomatic for intense bodily anguish. 'With
    breaking loins' keeps the concrete Hebrew imagery while remaining intelligible;
    smoother paraphrases would lose the visceral force.
- source_word: וּבִמְרִירוּת
  chosen: and in bitterness
  alternatives:
  - and with bitterness
  - and in bitter grief
  lexicon: HALOT
  rationale: מְרִירוּת denotes bitterness, here describing the emotional manner of
    the groaning. 'In bitterness' is natural English and preserves the abstract noun
    rather than over-interpreting it as a specific emotion such as grief.
- source_word: תֵּאָנַח
  chosen: you shall groan
  alternatives:
  - you are to groan
  - groan
  lexicon: HALOT
  rationale: The imperfect here functions as an instruction following the imperative-like
    infinitive/volitive opening. 'You shall groan' preserves the prophetic command
    force in idiomatic English without flattening the verbal distinction.
- source_word: לְעֵינֵיהֶם
  chosen: before their eyes
  alternatives:
  - in their sight
  - before them
  lexicon: HALOT
  rationale: Literally 'to/for their eyes,' an idiom meaning publicly in their view.
    'Before their eyes' is vivid and close to the Hebrew.
