id: EZK.21.20
reference: Ezekiel 21:20
source:
  edition: WLC
  text: לְמַ֣עַן לָ/מ֣וּג לֵ֗ב וְ/הַרְבֵּה֙ הַ/מִּכְשֹׁלִ֔ים עַ֚ל כָּל שַׁ֣עֲרֵי/הֶ֔ם נָתַ֖תִּי אִבְחַת חָ֑רֶב אָ֛ח עֲשׂוּיָ֥ה לְ/בָרָ֖ק מְעֻטָּ֥ה לְ/טָֽבַח׀־־׃
translation:
  text: so that the heart may melt and the stumbling blocks may be many[a]. At all their gates I have set the flash of the sword. Ah! It is made for lightning[b], drawn for slaughter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and many may stumble' for 'and the stumbling blocks may be many.' The Hebrew noun can point either to stumbling blocks themselves or to the resulting downfall.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of the final phrase is difficult. 'Drawn for slaughter' could also be rendered 'sharpened for slaughter' or 'polished for slaughter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves the clause linkage.
- source_word: לָמוּג לֵב
  chosen: the heart may melt
  alternatives:
  - hearts may melt
  - the heart may faint
  lexicon: HALOT
  rationale: מוּג with 'heart' is an idiom for loss of courage or collapse of resolve. Singular 'heart' reflects the Hebrew singular collective usage; English keeps the vivid metaphor rather than flattening it to 'faint.'
- source_word: וְהַרְבֵּה הַמִּכְשֹׁלִים
  chosen: and the stumbling blocks may be many
  alternatives:
  - and many may stumble
  - and the fallen may multiply
  lexicon: HALOT
  rationale: The noun מִכְשׁוֹל can denote a stumbling block or occasion of falling. In this judgment context it likely points to widespread downfall/collapse. I retained the concrete image 'stumbling blocks' in the main text for transparency to the Hebrew, while preserving smoother interpretive alternatives in a footnote.
- source_word: עַל כָּל שַׁעֲרֵיהֶם
  chosen: At all their gates
  alternatives:
  - against all their gates
  - at every one of their gates
  lexicon: HALOT
  rationale: With the following verb 'I have set,' English idiom favors 'at all their gates.' The phrase locates the sword's threatening presence at every city gate.
- source_word: נָתַתִּי
  chosen: I have set
  alternatives:
  - I have placed
  - I gave
  lexicon: HALOT
  rationale: Given the object and context, 'set' is the most idiomatic English for stationing or placing something ominous.
- source_word: אִבְחַת חָרֶב
  chosen: the flash of the sword
  alternatives:
  - the glitter of the sword
  - the slaughter of the sword
  lexicon: HALOT
  rationale: This rare noun is commonly understood as a flashing/glittering effect associated with the sword, fitting the immediate references to lightning and slaughter. 'Flash' is vivid and concise.
- source_word: אָח
  chosen: Ah!
  alternatives:
  - Alas!
  - Aha!
  lexicon: HALOT
  rationale: An interjection expressing heightened emotion. 'Ah!' preserves the abrupt exclamatory force without over-specifying whether it is lament or astonishment.
- source_word: עֲשׂוּיָה לְבָרָק
  chosen: It is made for lightning
  alternatives:
  - It is made to flash like lightning
  - it is polished for flashing
  lexicon: HALOT
  rationale: The feminine participle refers back to 'sword.' בָרָק denotes lightning/flash. The phrase likely means the sword is prepared to flash brilliantly. 'Made for lightning' is slightly literal but intelligible and preserves the imagery.
- source_word: מְעֻטָּה לְטָבַח
  chosen: drawn for slaughter
  alternatives:
  - sharpened for slaughter
  - wrapped for slaughter
  - polished for slaughter
  lexicon: HALOT
  rationale: This rare form is difficult. In context with the sword imagery and ancient versions, the sense is preparation/readiness for killing. 'Drawn for slaughter' gives a clear English line and fits the immediate martial scene, while the lexical uncertainty is preserved in a footnote.
