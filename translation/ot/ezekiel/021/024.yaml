id: EZK.21.24
reference: Ezekiel 21:24
source:
  edition: WLC
  text: וְ/אַתָּ֨ה בֶן אָדָ֜ם שִׂים לְ/ךָ֣ שְׁנַ֣יִם דְּרָכִ֗ים לָ/בוֹא֙ חֶ֣רֶב מֶֽלֶךְ
    בָּבֶ֔ל מֵ/אֶ֥רֶץ אֶחָ֖ד יֵצְא֣וּ שְׁנֵי/הֶ֑ם וְ/יָ֣ד בָּרֵ֔א בְּ/רֹ֥אשׁ דֶּֽרֶךְ
    עִ֖יר בָּרֵֽא־־׀־־׃
translation:
  text: And you, son of man, set for yourself two roads for the sword of the king
    of Babylon to come by; both of them shall go out from one land. And make a signpost;
    make it at the head of the road to the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'hand' here likely means a marker or signpost indicating direction.
    reason: lexical_alternative
  - marker: b
    text: Or 'make it at the beginning of the road to the city'; the Hebrew phrase
      may refer to the road's head or chief junction.
    reason: alternative_reading
lexical_decisions:
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: Conventional and contextually appropriate rendering of Ezekiel's address
    formula. It preserves the Hebrew idiom and the prophet's human status in contrast
    to God.
- source_word: שִׂים לְךָ
  chosen: set for yourself
  alternatives:
  - appoint for yourself
  - mark out for yourself
  lexicon: HALOT
  rationale: The imperative of שׂים with לְךָ calls Ezekiel to place or establish
    something for symbolic action. 'Set for yourself' is natural English while retaining
    the reflexive nuance.
- source_word: שְׁנַיִם דְּרָכִים
  chosen: two roads
  alternatives:
  - two ways
  - two paths
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means 'way, road.' Here the imagery is of branching
    routes for the Babylonian king's sword, so 'roads' best fits the sign-act setting.
- source_word: לָבוֹא חֶרֶב מֶלֶךְ בָּבֶל
  chosen: for the sword of the king of Babylon to come by
  alternatives:
  - for the sword of the king of Babylon to come
  - for the king of Babylon's sword to come
  lexicon: HALOT
  rationale: The infinitive לָבוֹא expresses purpose. 'Sword' stands metonymically
    for military attack or conquest, but it is retained literally to preserve the
    prophetic imagery. 'Come by' fits movement along a road.
- source_word: מֵאֶרֶץ אֶחָד
  chosen: from one land
  alternatives:
  - from one country
  - from the same land
  lexicon: HALOT
  rationale: אֶרֶץ can mean land or country. 'One land' preserves the singular source
    point from which the two roads diverge.
- source_word: יֵצְאוּ שְׁנֵיהֶם
  chosen: both of them shall go out
  alternatives:
  - the two of them shall branch out
  - both shall come out
  lexicon: HALOT
  rationale: The verb is simple 'go out.' In context it describes the two roads proceeding
    from one origin. 'Both of them' makes explicit the dual reference.
- source_word: יָד
  chosen: signpost
  alternatives:
  - hand
  - marker
  - monument
  lexicon: HALOT
  rationale: Although literally 'hand,' in this context it refers to a marker or directional
    sign, likely something pointing the way. 'Signpost' best communicates the symbolic
    road marker in idiomatic English.
- source_word: בָּרֵא
  chosen: make
  alternatives:
  - cut out
  - prepare
  - fashion
  lexicon: HALOT
  rationale: The imperative from ברא in this rare usage likely means to shape or prepare.
    'Make' is broad and clear, fitting both occurrences in the verse without over-specifying
    the material action.
- source_word: בְּרֹאשׁ דֶּרֶךְ
  chosen: at the head of the road
  alternatives:
  - at the beginning of the road
  - at the fork of the road
  lexicon: HALOT
  rationale: Literally 'at the head of the road.' This indicates the starting point
    or chief junction. The more interpretive 'fork' is possible but not explicit,
    so the more literal phrase is preferred.
- source_word: עִיר
  chosen: to the city
  alternatives:
  - to a city
  lexicon: HALOT
  rationale: The noun lacks the article in Hebrew, but in context it likely refers
    generically to the cityward road or to the urban destination of the route. 'The
    city' gives a natural English expression for the road's destination while preserving
    the likely specificity of the sign-act.
