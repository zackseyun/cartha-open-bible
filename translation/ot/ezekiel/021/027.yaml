id: EZK.21.27
reference: Ezekiel 21:27
source:
  edition: WLC
  text: בִּֽ/ימִינ֞/וֹ הָיָ֣ה הַ/קֶּ֣סֶם יְרוּשָׁלִַ֗ם לָ/שׂ֤וּם כָּרִים֙ לִ/פְתֹּ֤חַ
    פֶּה֙ בְּ/רֶ֔צַח לְ/הָרִ֥ים ק֖וֹל בִּ/תְרוּעָ֑ה לָ/שׂ֤וּם כָּרִים֙ עַל שְׁעָרִ֔ים
    לִ/שְׁפֹּ֥ךְ סֹלְלָ֖ה לִ/בְנ֥וֹת דָּיֵֽק׀־׃
translation:
  text: 'In his right hand was the divination for Jerusalem: to set battering rams,
    to open the mouth with slaughter, to raise the voice with a battle cry, to set
    battering rams against the gates, to heap up a siege ramp, to build a siege wall.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to open the mouth for slaughter,' possibly referring to the shouted
      command or cry that accompanies the attack.
    reason: lexical_alternative
  - marker: b
    text: Or 'to build a bulwark' or 'siege tower'; the Hebrew term refers generally
      to siegeworks.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּימִינוֹ
  chosen: In his right hand
  alternatives:
  - At his right hand
  - In his right side
  lexicon: HALOT
  rationale: The phrase is spatial/instrumental, referring to the king's right hand
    in the divination scene. 'In his right hand' is the most natural English rendering
    and preserves the concrete image.
- source_word: הַקֶּסֶם
  chosen: the divination indicated
  alternatives:
  - the divination was
  - the omen for
  lexicon: HALOT
  rationale: Literally, 'the divination' was Jerusalem in his right hand. In English,
    'the divination indicated Jerusalem' makes explicit the sense that the lot/omen
    pointed to Jerusalem as the target, without over-paraphrasing.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Standard transliteration of the place name.
- source_word: לָשׂוּם כָּרִים
  chosen: to set battering rams
  alternatives:
  - to place siege engines
  - to set up rams
  lexicon: HALOT
  rationale: כָּרִים in siege context refers to battering rams rather than lambs/rams
    literally. 'Battering rams' is the established military sense and fits the repeated
    phrase in the verse.
- source_word: לִפְתֹּחַ פֶּה בְּרֶצַח
  chosen: to open the mouth with slaughter
  alternatives:
  - to open the mouth for slaughter
  - to give the command for slaughter
  lexicon: HALOT
  rationale: The Hebrew is vivid and somewhat idiomatic. Retaining 'open the mouth'
    preserves the image of issuing the attack cry/command, while 'with slaughter'
    reflects בְּרֶצַח as the violent result or manner. This avoids flattening the
    expression into mere paraphrase.
- source_word: רֶצַח
  chosen: slaughter
  alternatives:
  - killing
  - murder
  lexicon: HALOT
  rationale: '''Murder'' can sound overly juridical in English, while the siege context
    points to violent killing in battle. ''Slaughter'' best conveys the brutal force
    of the term here.'
- source_word: לְהָרִים קוֹל בִּתְרוּעָה
  chosen: to raise the voice with a battle cry
  alternatives:
  - to lift the voice with shouting
  - to raise a shout with a war cry
  lexicon: HALOT
  rationale: The phrase describes loud martial shouting. 'Battle cry' communicates
    תְּרוּעָה clearly in context while preserving the auditory imagery.
- source_word: עַל שְׁעָרִים
  chosen: against the gates
  alternatives:
  - at the gates
  - upon the gates
  lexicon: HALOT
  rationale: In siege context, the battering rams are directed against the city gates.
    'Against' best expresses hostile contact.
- source_word: לִשְׁפֹּךְ סֹלְלָה
  chosen: to heap up a siege ramp
  alternatives:
  - to pour out an embankment
  - to cast up a mound
  lexicon: HALOT
  rationale: סֹלְלָה is a siege mound/ramp. 'Heap up' reflects the verb's literal
    sense while yielding natural English.
- source_word: לִבְנוֹת דָּיֵק
  chosen: to build a siege wall
  alternatives:
  - to build a siege tower
  - to build a bulwark
  - to build a circumvallation
  lexicon: HALOT
  rationale: דָּיֵק denotes a siegework/fortification. 'Siege wall' is a clear, accessible
    rendering that fits the sequence of assault preparations. Because the exact military
    referent can be debated, an alternative is preserved in a footnote.
