id: EZK.21.26
reference: Ezekiel 21:26
source:
  edition: WLC
  text: כִּֽי עָמַ֨ד מֶלֶךְ בָּבֶ֜ל אֶל אֵ֣ם הַ/דֶּ֗רֶךְ בְּ/רֹ֛אשׁ שְׁנֵ֥י הַ/דְּרָכִ֖ים לִ/קְסָם קָ֑סֶם קִלְקַ֤ל בַּֽ/חִצִּים֙ שָׁאַ֣ל בַּ/תְּרָפִ֔ים רָאָ֖ה בַּ/כָּבֵֽד־־־־׃
translation:
  text: 'For the king of Babylon stands at the mother of the road[a], at the head of the two roads, to practice divination: he shakes the arrows, he consults the teraphim[c][b], he examines the liver.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'at the mother of the road,' an idiom for the branching point or fork in the road.
    reason: lexical_alternative
  - marker: b
    text: Or 'he inquires of the household gods'; 'teraphim' refers to cultic images used for divination.
    reason: cultural_note
  - marker: c
    text: That is, he practices divination by inspecting the liver.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces an explanation of the preceding prophetic statement; 'for' best preserves the causal/explanatory force in context.
- source_word: עָמַד
  chosen: stands
  alternatives:
  - has stood
  - is standing
  lexicon: HALOT
  rationale: Qal perfect in narrative-prophetic discourse can present the scene vividly. English present 'stands' gives the immediate visionary force without over-paraphrasing.
- source_word: אֵם הַדֶּרֶךְ
  chosen: the fork of the road
  alternatives:
  - the mother of the road
  - the parting of the road
  lexicon: HALOT
  rationale: The idiom literally uses 'mother' for the source or branching point. 'Fork of the road' communicates the idiomatic sense naturally in modern English.
- source_word: בְּרֹאשׁ שְׁנֵי הַדְּרָכִים
  chosen: at the head of the two roads
  alternatives:
  - at the beginning of the two ways
  - where the two roads begin
  lexicon: HALOT
  rationale: Retains the concrete spatial imagery of 'head' while remaining intelligible. It parallels the previous phrase and locates the king at the branching point.
- source_word: לִקְסָם קָסֶם
  chosen: to practice divination
  alternatives:
  - to divine a divination
  - to seek an omen
  lexicon: HALOT
  rationale: Infinitive plus cognate noun intensifies the action. 'Practice divination' is idiomatic English that preserves the sense without awkward literalism.
- source_word: קִלְקַל בַּחִצִּים
  chosen: he shakes the arrows
  alternatives:
  - he casts the arrows
  - he shakes arrows for omens
  lexicon: HALOT
  rationale: Refers to a known divinatory practice involving arrows. 'Shakes the arrows' is both fairly literal and understandable; the divinatory sense is already signaled by the preceding clause.
- source_word: שָׁאַל בַּתְּרָפִים
  chosen: he consults the teraphim
  alternatives:
  - he inquires of the household gods
  - he asks the teraphim
  lexicon: HALOT
  rationale: תְּרָפִים refers to cultic/divinatory images. 'Consults' fits the divination context. 'Teraphim' is retained as a transliterated cultural term to avoid over-specifying with 'household gods,' though that is a possible explanatory gloss.
- source_word: רָאָה בַּכָּבֵד
  chosen: he examines the liver
  alternatives:
  - he looks at the liver
  - he inspects the liver
  lexicon: HALOT
  rationale: This refers to hepatoscopy, divination by inspecting the liver. 'Examines' makes the technical divinatory action clear in natural English.
