id: EZK.21.19
reference: Ezekiel 21:19
source:
  edition: WLC
  text: וְ/אַתָּ֣ה בֶן אָדָ֔ם הִנָּבֵ֕א וְ/הַ֖ךְ כַּ֣ף אֶל כָּ֑ף וְ/תִכָּפֵ֞ל חֶ֤רֶב
    שְׁלִישִׁ֨תָ/ה֙ חֶ֣רֶב חֲלָלִ֔ים הִ֗יא חֶ֚רֶב חָלָ֣ל הַ/גָּד֔וֹל הַ/חֹדֶ֖רֶת לָ/הֶֽם־־׃
translation:
  text: And you, son of man, prophesy and strike palm to palm, and let the sword be
    doubled a third time—the sword of the slain. It is the sword of the great slain
    one, the one that presses in on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clap your hands.' The Hebrew literally says 'strike palm to palm,' describing
      a prophetic gesture.
    reason: lexical_alternative
  - marker: b
    text: Or 'threefold.' The Hebrew expression may denote the sword being intensified
      to a third stroke or made threefold.
    reason: lexical_alternative
  - marker: c
    text: Or 'that penetrates them.' The final participle can convey the sword's pressing
      in, entering, or surrounding effect.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: Conventional rendering of Ezekiel’s address formula, preserving the Hebrew
    idiom and its representative masculine form. 'Son of man' is more formally transparent
    than dynamic alternatives.
- source_word: הִנָּבֵא
  chosen: prophesy
  alternatives:
  - prophesy against
  - speak prophetically
  lexicon: HALOT
  rationale: The Niphal imperative of נבא here is the standard prophetic commission.
    No object is supplied in this clause, so the simple imperative 'prophesy' is best.
- source_word: וְהַךְ כַּף אֶל כָּף
  chosen: strike palm to palm
  alternatives:
  - clap your hands
  - strike hand against hand
  lexicon: HALOT
  rationale: Literally preserves the gesture described. 'Clap your hands' is idiomatic
    English, but 'strike palm to palm' better reflects the Hebrew wording and the
    prophetic sign-act.
- source_word: וְתִכָּפֵל חֶרֶב
  chosen: and let the sword be doubled
  alternatives:
  - and the sword shall be doubled
  - and let the sword strike twice
  lexicon: HALOT
  rationale: The verb is passive/jussive-like in sense with חֶרֶב as subject. 'Be
    doubled' preserves the imagery more directly than interpretive renderings like
    'strike twice.'
- source_word: שְׁלִישִׁתָה
  chosen: a third time
  alternatives:
  - threefold
  - for the third
  lexicon: HALOT
  rationale: The form indicates a third occurrence/intensification. In English, 'a
    third time' is the clearest idiomatic expression of the repeated action.
- source_word: חֶרֶב חֲלָלִים
  chosen: the sword of the slain
  alternatives:
  - the sword of the slain ones
  - the sword for slaughter
  lexicon: HALOT
  rationale: Construct phrase most naturally means a sword associated with slain people.
    'Of the slain' is concise and preserves the nominal force.
- source_word: חֶרֶב חָלָל הַגָּדוֹל
  chosen: the sword of the great slain one
  alternatives:
  - the sword of the great slain man
  - the sword of the great slaughter
  lexicon: HALOT
  rationale: The singular חָלָל with adjective הַגָּדוֹל is best taken personally
    rather than abstractly. 'Slain one' avoids over-specifying gender while keeping
    the singular concrete sense.
- source_word: הַחֹדֶרֶת לָהֶם
  chosen: the one that presses in on them
  alternatives:
  - that penetrates them
  - that surrounds them
  - that enters into them
  lexicon: HALOT
  rationale: The participle from חדר conveys penetrating/pressing into. Because the
    preposition is ל rather than a direct object marker, 'presses in on them' captures
    hostile encroachment without forcing a more graphic sense.
