id: EZK.21.2
reference: Ezekiel 21:2
source:
  edition: WLC
  text: בֶּן אָדָ֗ם שִׂ֤ים פָּנֶ֨י/ךָ֙ דֶּ֣רֶךְ תֵּימָ֔נָ/ה וְ/הַטֵּ֖ף אֶל דָּר֑וֹם
    וְ/הִנָּבֵ֛א אֶל יַ֥עַר הַ/שָּׂדֶ֖ה נֶֽגֶב־־־׃
translation:
  text: Son of man, set your face toward the south, and preach toward the south, and
    prophesy against the forest of the field in the Negeb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew uses three related southern terms in sequence: ''Teman/south,''
      ''darom/south,'' and ''Negeb.'' The repetition intensifies the oracle''s focus
      on the southern land.'
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'preach' is literally 'drip' or 'let drop,' a Hebrew metaphor
      for prophetic speech.
    reason: lexical_alternative
  - marker: c
    text: Or 'against the forest of the open field in the south.'
    reason: alternative_reading
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: Conventional prophetic address in Ezekiel. The Hebrew is singular masculine
    ('son of man'), and per doctrine this should be rendered gender-accurately rather
    than neutralized. 'Mortal' is possible idiomatically, but 'Son of man' preserves
    the form and recurring literary pattern.
- source_word: שִׂים פָּנֶיךָ
  chosen: set your face
  alternatives:
  - direct your face
  - turn your face
  lexicon: HALOT
  rationale: A common Hebrew idiom for directing oneself resolutely toward a target.
    'Set your face' preserves both the imagery and prophetic force better than a flatter
    dynamic rendering.
- source_word: דֶּרֶךְ תֵּימָנָה
  chosen: toward the south
  alternatives:
  - southward
  - by way of Teman
  lexicon: HALOT
  rationale: Here תימנה functions adverbially/directionally with דרך, indicating orientation
    to the south. 'Teman' is less likely in this context because the verse then continues
    with parallel southern terms (דָּרוֹם, נֶגֶב), creating a rhetorical cluster of
    south-language.
- source_word: וְהַטֵּף
  chosen: preach
  alternatives:
  - drip
  - drop words
  - speak
  lexicon: HALOT
  rationale: The verb literally means 'to drip/drop,' but in prophetic contexts it
    idiomatically refers to uttering speech, often prophetic denunciation. 'Preach'
    captures the metaphorical force in readable English without woodenly obscuring
    the sense.
- source_word: אֶל דָּרוֹם
  chosen: against the south
  alternatives:
  - toward the south
  - to the south
  lexicon: HALOT
  rationale: Although אֶל often means 'to/toward,' with hostile prophetic speech in
    parallel to the following clause it is best rendered 'against,' making explicit
    the adversative force of the oracle.
- source_word: וְהִנָּבֵא
  chosen: prophesy
  alternatives:
  - speak prophetically
  lexicon: HALOT
  rationale: Standard rendering of נבא in prophetic commission contexts.
- source_word: אֶל יַעַר הַשָּׂדֶה נֶגֶב
  chosen: against the forest of the field in the Negeb
  alternatives:
  - to the forest of the open country of the Negeb
  - against the forest land of the south
  lexicon: HALOT
  rationale: The phrase is somewhat unusual. 'Forest of the field' preserves the Hebrew
    imagery, likely metaphorical for the population/land to be judged, while 'in the
    Negeb' renders נגב as the southern region. 'Against' is supplied from the prophetic
    context and parallelism with the preceding clause.
- source_word: נֶגֶב
  chosen: Negeb
  alternatives:
  - southland
  - south
  lexicon: HALOT
  rationale: Here נגב likely denotes the specific southern region rather than merely
    a compass direction, especially after two prior directional terms already rendered
    as 'south.' Transliteration helps preserve the distinction and avoids flattening
    the threefold wordplay.
