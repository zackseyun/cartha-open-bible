id: EZK.21.25
reference: Ezekiel 21:25
source:
  edition: WLC
  text: דֶּ֣רֶךְ תָּשִׂ֔ים לָ/ב֣וֹא חֶ֔רֶב אֵ֖ת רַבַּ֣ת בְּנֵֽי עַמּ֑וֹן וְ/אֶת יְהוּדָ֥ה בִ/ירוּשָׁלִַ֖ם בְּצוּרָֽה־־׃
translation:
  text: You shall set a road for the sword to come to Rabbah of the Ammonites[b][a], and to Judah in fortified Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against Rabbah of the sons of Ammon, and against Judah in fortified Jerusalem.' The Hebrew construction can be expressed in English either as movement toward or hostile advance against these places.
    reason: alternative_reading
  - marker: b
    text: Rabbah was the chief city of the Ammonites.
    reason: cultural_note
lexical_decisions:
- source_word: דֶּרֶךְ
  chosen: a road
  alternatives:
  - a way
  - a path
  lexicon: HALOT
  rationale: The noun denotes a route or roadway. 'Road' is natural modern English and fits the military image of marking an approach for an invading sword.
- source_word: תָּשִׂים
  chosen: you shall set
  alternatives:
  - you shall place
  - you shall appoint
  lexicon: HALOT
  rationale: From שׂים, 'to set/place.' 'You shall set' preserves the direct imperative-like force in context, where Ezekiel is commanded to mark out the route.
- source_word: לָבוֹא
  chosen: to come
  alternatives:
  - to enter
  - for coming
  lexicon: HALOT
  rationale: 'The infinitive of בוא expresses purpose/result for the road: it is set so that the sword may come. ''To come'' is the most straightforward rendering.'
- source_word: חֶרֶב
  chosen: the sword
  alternatives:
  - a sword
  lexicon: HALOT
  rationale: 'Although formally indefinite, in prophetic war imagery ''sword'' functions as a known agent of judgment. Rendering with the English article gives idiomatic force: the sword as the invading weapon/judgment.'
- source_word: אֵת רַבַּת בְּנֵי עַמּוֹן
  chosen: to Rabbah of the Ammonites
  alternatives:
  - against Rabbah of the sons of Ammon
  - to Rabbah of the sons of Ammon
  lexicon: HALOT
  rationale: Rabbah is the proper name of the Ammonite capital. 'Of the Ammonites' is idiomatic English for בְּנֵי עַמּוֹן while preserving the ethnic reference.
- source_word: וְאֶת יְהוּדָה
  chosen: and to Judah
  alternatives:
  - and against Judah
  lexicon: HALOT
  rationale: The direct-object marker with the prior infinitive construction yields the second destination/object of the sword's coming. 'To Judah' keeps the parallel with 'to Rabbah,' though the hostile sense is clear from context.
- source_word: בִירוּשָׁלַם
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: HALOT
  rationale: The preposition ב marks location. 'In Jerusalem' is the natural English rendering.
- source_word: בְּצוּרָה
  chosen: fortified
  alternatives:
  - fortified city
  - fortress-like
  - made inaccessible
  lexicon: HALOT
  rationale: An adjective meaning fortified/stronghold-like, modifying Jerusalem. Rendering it attributively in English ('fortified Jerusalem') is concise and preserves the sense.
