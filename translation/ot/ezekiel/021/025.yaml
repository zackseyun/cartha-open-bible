theological_decisions:
- issue: Syntactical force of the destinations marked by אֵת after 'the sword to come'
  chosen_reading: Both Rabbah and Judah/Jerusalem are presented as destinations/targets of the sword's advance.
  alternative_readings:
  - Rabbah alone is the destination, with Judah appositional or secondary
  - The phrase could be construed more adversatively as 'against' rather than simply 'to'
  rationale: The verse belongs to the sign-act of marking roads for Babylon's sword toward two possible targets. Rendering both as parallel destinations best reflects the syntax and immediate context without overinterpreting beyond the Hebrew.
