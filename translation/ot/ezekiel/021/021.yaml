id: EZK.21.21
reference: Ezekiel 21:21
source:
  edition: WLC
  text: הִתְאַחֲדִ֥י הֵימִ֖נִי הָשִׂ֣ימִי הַשְׂמִ֑ילִי אָ֖נָה פָּנַ֥יִ/ךְ מֻעָדֽוֹת׃
translation:
  text: Gather yourself; go to the right; set yourself to the left, wherever your
    face is appointed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Unite yourself,' 'Compose yourself,' or in context 'Mass yourself.'
      The Hebrew verb is rare and reflexive, likely conveying concentration or consolidation
      before striking.
    reason: lexical_alternative
  - marker: b
    text: Literally 'your face.' In Hebrew this can mean the direction one is facing.
    reason: lexical_alternative
  - marker: c
    text: Or 'wherever your face is directed' or 'wherever your face is set.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִתְאַחֲדִי
  chosen: Gather yourself
  alternatives:
  - Unite yourself
  - Compose yourself
  - Mass yourself
  lexicon: HALOT
  rationale: Imperative 2fs from a rare/reflexive form. In this martial context, the
    command is to the sword/personified force to collect or concentrate itself. 'Gather
    yourself' preserves the reflexive force and remains intelligible in English.
- source_word: הֵימִנִי
  chosen: go to the right
  alternatives:
  - turn right
  - make to the right
  lexicon: HALOT
  rationale: Imperative built from the root for 'right hand/right side.' 'Go to the
    right' gives a natural directional command in English while preserving the imperative
    sense.
- source_word: הָשִׂימִי
  chosen: set yourself
  alternatives:
  - place yourself
  - direct yourself
  lexicon: HALOT
  rationale: Imperative of שׂים, here functioning reflexively in sequence with the
    surrounding feminine singular imperatives. 'Set yourself' fits the idiom and keeps
    the terse military tone.
- source_word: הַשְׂמִילִי
  chosen: to the left
  alternatives:
  - leftward
  - go left
  lexicon: HALOT
  rationale: Directional imperative/adverbial form from the root for 'left.' Combined
    with הָשִׂימִי, the sense is 'set yourself to the left.'
- source_word: אָ֖נָה
  chosen: wherever
  alternatives:
  - whither
  - to wherever place
  lexicon: HALOT
  rationale: Interrogative/adverb of direction, here introducing the destination clause.
    'Wherever' is idiomatic modern English.
- source_word: פָּנַיִ/ךְ
  chosen: your face
  alternatives:
  - your front
  - your presence
  lexicon: HALOT
  rationale: Literally 'your face' with 2fs suffix. In directional/military language
    it can denote the direction one faces. Retaining 'your face' preserves the Hebrew
    imagery.
- source_word: מֻעָדוֹת
  chosen: is appointed
  alternatives:
  - is directed
  - is set
  - is destined
  lexicon: HALOT
  rationale: Passive participial form from יעד, conveying being fixed, appointed,
    or directed toward a target. 'Is appointed' preserves the passive sense without
    overinterpreting whether the appointment is by command, fate, or divine decree.
