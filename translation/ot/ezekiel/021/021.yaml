theological_decisions:
- issue: Personified addressee and martial imagery
  chosen_reading: The verse is rendered as direct imperatives to the personified sword/force
    without making explicit in the English text what is only supplied by context.
  alternative_readings:
  - Explicitly supply 'O sword' in the translation
  - Interpret the commands as addressed to an army rather than the sword
  rationale: The Hebrew verse consists of terse feminine singular imperatives, and
    the immediate context personifies the sword. Supplying 'O sword' would clarify
    but adds words not present in this verse. The chosen rendering preserves the vivid
    abruptness of the Hebrew while allowing context to identify the addressee.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source warrants.'
