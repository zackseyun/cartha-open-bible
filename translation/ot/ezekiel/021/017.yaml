theological_decisions:
- issue: Implied feminine subject in the repeated הִיא clauses
  chosen_reading: The pronoun refers to the impending judgment/sword already prominent
    in context, rendered as impersonal 'it.'
  alternative_readings:
  - The pronoun refers more specifically to 'the sword'
  - The pronoun refers generally to calamity/disaster
  rationale: The verse does not make a doctrinal claim, but the Hebrew feminine pronoun
    requires an interpretive decision for English. Using 'it' preserves the ambiguity
    while still making sense in context.
  doctrine_reference: Translation philosophy §3 (preserve theological/interpreive
    tension where genuine)
