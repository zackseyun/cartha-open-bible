id: EZK.21.17
reference: Ezekiel 21:17
source:
  edition: WLC
  text: זְעַ֤ק וְ/הֵילֵל֙ בֶּן אָדָ֔ם כִּי הִיא֙ הָיתָ֣ה בְ/עַמִּ֔/י הִ֖יא בְּ/כָל
    נְשִׂיאֵ֣י יִשְׂרָאֵ֑ל מְגוּרֵ֤י אֶל חֶ֨רֶב֙ הָי֣וּ אֶת עַמִּ֔/י לָ/כֵ֖ן סְפֹ֥ק
    אֶל יָרֵֽךְ־־־־־־׃
translation:
  text: Cry out and wail, son of man, for it has come upon my people; it is upon all
    the princes of Israel. They are given over to the sword along with my people;
    therefore strike your thigh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Terrors because of the sword have come upon my people.' The Hebrew
      of this clause is difficult, and the exact force of מְגוּרֵי is debated.
    reason: alternative_reading
  - marker: b
    text: Striking the thigh is a gesture of grief, shock, or lament in prophetic
      literature.
    reason: cultural_note
lexical_decisions:
- source_word: זְעַק
  chosen: Cry out
  alternatives:
  - Cry
  - Shriek
  lexicon: HALOT
  rationale: Imperative of זעק, a strong cry of distress. 'Cry out' preserves the
    force better than the bare 'cry' in modern English.
- source_word: וְהֵילֵל
  chosen: and wail
  alternatives:
  - and howl
  - and lament
  lexicon: HALOT
  rationale: Imperative of ילל denotes loud lamentation. 'Wail' is natural English
    and fits prophetic mourning language; 'howl' is possible but can sound animalistic
    in English.
- source_word: בֶּן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: Standard Ezekiel address. Following gender-accurate policy and established
    prophetic usage, 'son of man' is retained rather than a neutral paraphrase.
- source_word: כִּי הִיא הָיְתָה בְעַמִּי
  chosen: for it has come upon my people
  alternatives:
  - for it is against my people
  - for she has been among my people
  lexicon: HALOT
  rationale: The feminine pronoun likely refers to the sword/judgment in context.
    English requires making the implied event more explicit; 'it has come upon' conveys
    the arrival of judgment without over-specifying beyond context.
- source_word: הִיא בְּכָל נְשִׂיאֵי יִשְׂרָאֵל
  chosen: it is upon all the princes of Israel
  alternatives:
  - it is against all the princes of Israel
  - it is among all the princes of Israel
  lexicon: HALOT
  rationale: Continues the same implied subject ('it' = the coming judgment/sword).
    נְשִׂיאִים is best rendered 'princes' or 'leaders'; 'princes' preserves the elevated
    political sense common in Ezekiel.
- source_word: נְשִׂיאֵי
  chosen: princes
  alternatives:
  - leaders
  - chiefs
  lexicon: HALOT
  rationale: In Ezekiel this term often denotes ruling figures. 'Princes' is somewhat
    traditional but still understandable and more specific than 'leaders'.
- source_word: מְגוּרֵי אֶל חֶרֶב הָיוּ
  chosen: They are handed over to the sword
  alternatives:
  - They are thrown to the sword
  - They are delivered over to the sword
  - Terrors because of the sword have come
  lexicon: HALOT
  rationale: This clause is difficult. The form מְגוּרֵי is commonly taken from גור
    in a passive/resultative sense related to being exposed or surrendered to the
    sword. 'Handed over to the sword' gives a clear English sense of vulnerability
    to slaughter. An alternative tradition understands the clause in relation to 'terrors';
    that uncertainty is preserved in a footnote.
- source_word: אֶת עַמִּי
  chosen: along with my people
  alternatives:
  - with my people
  - against my people
  lexicon: HALOT
  rationale: The particle אֶת here is taken in an associative sense, linking the princes'
    fate with that of the people. 'Along with' makes the relationship explicit in
    idiomatic English.
- source_word: לָכֵן
  chosen: therefore
  alternatives:
  - so
  - thus
  lexicon: HALOT
  rationale: Marks the consequence of the announced judgment and introduces the symbolic
    action.
- source_word: סְפֹק אֶל יָרֵךְ
  chosen: strike your thigh
  alternatives:
  - slap your thigh
  - beat your thigh
  lexicon: HALOT
  rationale: An idiom of grief, shock, or lament. 'Strike your thigh' is clear and
    preserves the physical prophetic sign-act.
