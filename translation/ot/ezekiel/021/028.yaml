id: EZK.21.28
reference: Ezekiel 21:28
source:
  edition: WLC
  text: וְ/הָיָ֨ה לָ/הֶ֤ם כ/קסום שָׁוְא֙ בְּ/עֵ֣ינֵי/הֶ֔ם שְׁבֻעֵ֥י שְׁבֻע֖וֹת לָ/הֶ֑ם
    וְ/הֽוּא מַזְכִּ֥יר עָוֺ֖ן לְ/הִתָּפֵֽשׂ־־׃פ
translation:
  text: And it will be to them like a false divination in their eyes; they have sworn
    sworn oaths to them, but he brings guilt to remembrance, so that they may be captured.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''sworn oaths to them'' or ''oaths upon oaths for them.'' The phrase
      is difficult; the main text understands it as referring to binding solemn oaths
      that they nevertheless disregard.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it will be
  alternatives:
  - And it shall be
  - And it becomes
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly
    carries a future/result sense. 'Will be' gives natural English while preserving
    the predictive force.
- source_word: כקסום שוא
  chosen: like a false divination
  alternatives:
  - as vain divination
  - like an empty omen
  lexicon: HALOT
  rationale: קסום refers to divination/soothsaying; שוא adds the sense of falsity,
    emptiness, or worthlessness. 'False divination' is clear modern English and fits
    the context of dismissed omen-seeking.
- source_word: בעיניהם
  chosen: in their eyes
  alternatives:
  - in their sight
  - to them
  lexicon: HALOT
  rationale: The idiom literally means 'in their eyes' and conveys their perception
    or evaluation. Retaining the idiom is readable and preserves the Hebrew perspective
    language.
- source_word: שבעי שבעות להם
  chosen: though sworn oaths are binding on them
  alternatives:
  - they have sworn solemn oaths to them
  - oaths upon oaths are theirs
  - sevenfold oaths are theirs
  lexicon: HALOT
  rationale: 'This difficult phrase most naturally refers to binding oaths/solemn
    sworn obligations. The construction likely intensifies the seriousness of the
    oath. ''Though sworn oaths are binding on them'' captures the concessive force
    in context: they dismiss the divination despite real covenant obligations. A more
    literal rendering is preserved in a footnote because the Hebrew is compressed
    and debated.'
- source_word: והוא
  chosen: but he
  alternatives:
  - and he
  - yet he
  lexicon: HALOT
  rationale: The pronoun refers to the king of Babylon from the preceding context.
    'But he' brings out the adversative turn between their perception and his effective
    action.
- source_word: מזכיר עון
  chosen: brings guilt to remembrance
  alternatives:
  - reminds them of iniquity
  - calls guilt to mind
  - brings iniquity to remembrance
  lexicon: HALOT
  rationale: הזכיר means to cause to remember or bring to remembrance; עון can mean
    guilt/iniquity. 'Guilt' fits the judicial context of offense being recalled for
    punishment.
- source_word: להתפש
  chosen: so that they may be captured
  alternatives:
  - to be seized
  - to be taken
  lexicon: HALOT
  rationale: The infinitive expresses result/purpose. 'Captured' fits the military
    context and is idiomatic in English.
