theological_decisions:
- issue: Rendering of the divine title in אֲדֹנָי within Ezekiel's prophetic formula
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord
  - Lord GOD
  rationale: The verse uses the prophetic formula with the divine title as represented
    in the Masoretic tradition. In Ezekiel, English 'Lord GOD' best signals the solemn
    divine address familiar to this book and aligns with the project's handling of
    divine titles without introducing the Tetragrammaton where it is not explicitly
    written in the provided consonantal form.
  doctrine_reference: 'DOCTRINE.md: יְהוָה default ''the LORD''; translate titles,
    transliterate names'
