id: EZK.21.14
reference: Ezekiel 21:14
source:
  edition: WLC
  text: בֶּן אָדָ֕ם הִנָּבֵא֙ וְ/אָ֣מַרְתָּ֔ כֹּ֖ה אָמַ֣ר אֲדֹנָ֑/י אֱמֹ֕ר חֶ֥רֶב
    חֶ֛רֶב הוּחַ֖דָּה וְ/גַם מְרוּטָֽה־־׃
translation:
  text: 'Son of man, prophesy and say, ‘Thus says the Lord GOD: Say, “A sword, a sword,
    sharpened and also polished.”’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'burnished' for 'polished.' The Hebrew term suggests a sword made smooth
      and gleaming for slaughter.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: 'Retains the established prophetic address in Ezekiel while matching
    the Hebrew literally: ''son of man/man.'' This is gender-accurate to the source
    and idiomatic in this book.'
- source_word: הִנָּבֵא
  chosen: prophesy
  alternatives:
  - phesy forth
  lexicon: HALOT
  rationale: Imperative of נבא, the standard verb for prophetic proclamation. 'Prophesy'
    is clear modern English and preserves the formal prophetic command.
- source_word: וְאָמַרְתָּ
  chosen: and say
  alternatives:
  - and you shall say
  lexicon: HALOT
  rationale: Sequential command following 'prophesy.' English imperative coordination
    is best represented by 'and say' rather than a more wooden future-like form.
- source_word: כֹּה אָמַר אֲדֹנָי
  chosen: Thus says the Lord GOD
  alternatives:
  - Thus says the Lord
  - Thus says Lord GOD
  lexicon: HALOT
  rationale: כֹּה אָמַר is the standard prophetic messenger formula, best rendered
    'Thus says.' אֲדֹנָי here is the divine title; in English Bible style 'Lord GOD'
    is the conventional way to represent the form traditionally read as 'Adonai YHWH'
    in Ezekiel, preserving reverence and distinguishing the divine title.
- source_word: אֱמֹר
  chosen: Say
  alternatives:
  - Speak
  lexicon: HALOT
  rationale: A second imperative introducing the quoted oracle. 'Say' keeps the repetition
    from אמר visible in English.
- source_word: חֶרֶב חֶרֶב
  chosen: A sword, a sword
  alternatives:
  - Sword, sword
  - A blade, a blade
  lexicon: HALOT
  rationale: The repetition is emphatic and should be preserved. Including the article
    in English yields natural phrasing while still reflecting the Hebrew exclamatory
    repetition.
- source_word: הוּחַדָּה
  chosen: sharpened
  alternatives:
  - made sharp
  - whetted
  lexicon: HALOT
  rationale: Passive form from חדד, indicating the sword has been sharpened. 'Sharpened'
    is the most natural modern equivalent; 'whetted' is accurate but archaic.
- source_word: וְגַם
  chosen: and also
  alternatives:
  - and indeed
  - and even
  lexicon: HALOT
  rationale: Conveys additive emphasis without overtranslation. 'And also' preserves
    the cumulative force leading into the second participle/adjective.
- source_word: מְרוּטָה
  chosen: polished
  alternatives:
  - burnished
  - scoured
  lexicon: HALOT
  rationale: Describes the sword as smoothed/brightened for use. 'Polished' is accessible
    modern English; 'burnished' is a strong alternative but somewhat less common.
