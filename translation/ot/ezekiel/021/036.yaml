theological_decisions:
- issue: Rendering of divine anger terms without collapsing their distinct nuances
  chosen_reading: 'Different English terms are used for זַעַם and עֶבְרָה: ''indignation''
    and ''wrath.'''
  alternative_readings:
  - Use the same English term for both, such as 'wrath'/'wrath' or 'anger'/'anger'
  rationale: The Hebrew uses two related but distinct wrath terms in close proximity
    for rhetorical intensification. Rendering them with different but overlapping
    English terms preserves the poetic force without importing extra theology.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
