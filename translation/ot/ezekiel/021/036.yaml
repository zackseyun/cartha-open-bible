id: EZK.21.36
reference: Ezekiel 21:36
source:
  edition: WLC
  text: וְ/שָׁפַכְתִּ֤י עָלַ֨יִ/ךְ֙ זַעְמִ֔/י בְּ/אֵ֥שׁ עֶבְרָתִ֖/י אָפִ֣יחַ עָלָ֑יִ/ךְ
    וּ/נְתַתִּ֗י/ךְ בְּ/יַד֙ אֲנָשִׁ֣ים בֹּֽעֲרִ֔ים חָרָשֵׁ֖י מַשְׁחִֽית׃
translation:
  text: And I will pour out my indignation on you; with the fire of my wrath I will
    blow on you, and I will give you into the hand of brutal men, craftsmen of destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fierce men'; literally 'burning men.'
    reason: lexical_alternative
  - marker: b
    text: Or 'skilled in destruction' or 'smiths of ruin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁפַכְתִּי
  chosen: And I will pour out
  alternatives:
  - And I will pour forth
  lexicon: HALOT
  rationale: שׁפך in this context is a common metaphor for the outpouring of divine
    anger. 'Pour out' is idiomatic, natural English and preserves the force of the
    image.
- source_word: זַעְמִי
  chosen: my indignation
  alternatives:
  - my fury
  - my anger
  lexicon: HALOT
  rationale: זַעַם denotes wrath/indignation, often with judicial overtones. 'Indignation'
    preserves the solemnity and moral force better than the flatter 'anger,' while
    avoiding overstatement if 'fury' is reserved for stronger terms nearby.
- source_word: בְּאֵשׁ עֶבְרָתִי
  chosen: with the fire of my wrath
  alternatives:
  - in the fire of my fury
  - with the fire of my rage
  lexicon: HALOT
  rationale: The phrase is metaphorical and intensifies divine judgment. 'Wrath' fits
    עֶבְרָה well in prophetic judgment contexts, and 'with the fire of' preserves
    the instrumental/metaphorical force of בְּ.
- source_word: אָפִיחַ
  chosen: I will blow on
  alternatives:
  - I will breathe on
  - I will fan against
  lexicon: HALOT
  rationale: The Hiphil of נפח means to blow/breathe, here likely evoking the stoking
    of a fire of judgment. 'Blow on' is the clearest English rendering and keeps the
    imagery vivid.
- source_word: וּנְתַתִּיךְ בְּיַד
  chosen: and I will give you into the hand of
  alternatives:
  - and I will hand you over to
  - and I will deliver you into the hand of
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for delivering someone into another's
    power. 'Give you into the hand of' preserves the idiom more formally while remaining
    understandable.
- source_word: אֲנָשִׁים בֹּעֲרִים
  chosen: brutal men
  alternatives:
  - burning men
  - fierce men
  lexicon: HALOT
  rationale: בֹּעֲרִים literally means 'burning,' but in context it describes men
    inflamed with destructive violence. 'Brutal' communicates the sense in natural
    English better than the opaque literal 'burning men'; 'fierce' is possible but
    less concrete.
- source_word: חָרָשֵׁי מַשְׁחִית
  chosen: craftsmen of destruction
  alternatives:
  - skilled in destruction
  - smiths of ruin
  lexicon: HALOT
  rationale: חָרָשׁ commonly denotes an artisan/craftsman. The phrase portrays these
    agents as practiced makers or workers of ruin. 'Craftsmen of destruction' preserves
    the metaphor and the noun linkage better than a purely abstract paraphrase.
