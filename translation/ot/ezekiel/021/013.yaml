id: EZK.21.13
reference: Ezekiel 21:13
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: 'And the word of the LORD came to me, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH, traditionally rendered 'the LORD'; alternatively transliterated
      'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: Although the verb is literally 'and it was/came to pass,' in the prophetic
    formula ויהי דבר־יהוה ... the idiomatic English rendering is 'came,' which naturally
    carries the sense of the word's arrival to the prophet without woodenly preserving
    Hebrew narrative style.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - a word
  - message
  lexicon: HALOT
  rationale: In the construct phrase דְבַר יְהוָה, 'the word' is the standard and
    contextually precise rendering for prophetic revelation. 'Message' is possible
    but less formally tied to the recurring prophetic formula.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    to follow established reverential convention and the Septuagintal pattern, while
    avoiding direct transliteration in the main text.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The prepositional phrase straightforwardly indicates direction toward
    the prophet. 'To me' is accurate modern English; 'unto me' is unnecessarily archaic.
- source_word: לֵאמֹר
  chosen: 'saying:'
  alternatives:
  - to say
  - and said
  lexicon: HALOT
  rationale: This infinitive introduces the ensuing divine speech. 'Saying:' is the
    most natural English equivalent in this formula and signals that the next verse
    contains the content of the revelation.
