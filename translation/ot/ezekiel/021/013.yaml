theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Following the project's
    stated default for יְהוָה, the main text uses 'the LORD' rather than a transliteration.
    This is a translation-policy decision rather than an exegetical ambiguity in the
    verse itself.
