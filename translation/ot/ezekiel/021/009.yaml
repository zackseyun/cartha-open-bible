theological_decisions:
- issue: Scope of judgment including 'the righteous and the wicked'
  chosen_reading: Retain the plain wording that the coming sword affects both the
    righteous and the wicked in the land.
  alternative_readings:
  - Interpret 'righteous' as merely apparently righteous
  - Restrict the statement to outward temporal judgment rather than ultimate divine
    condemnation
  rationale: The verse speaks of temporal, historical judgment sweeping through the
    land without distinguishing persons in its immediate effects. The translation
    should preserve that tension and not soften the statement by importing a theological
    qualification not present in the Hebrew.
  doctrine_reference: Preserve theological tension rather than resolve it.
