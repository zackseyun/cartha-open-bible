id: EZK.21.9
reference: Ezekiel 21:9
source:
  edition: WLC
  text: יַ֛עַן אֲשֶׁר הִכְרַ֥תִּי מִמֵּ֖/ךְ צַדִּ֣יק וְ/רָשָׁ֑ע לָ֠/כֵן תֵּצֵ֨א חַרְבִּ֧/י
    מִ/תַּעְרָ֛/הּ אֶל כָּל בָּשָׂ֖ר מִ/נֶּ֥גֶב צָפֽוֹן־־־׃
translation:
  text: Because I will cut off from you both the righteous and the wicked, therefore
    my sword will go out from its sheath against all flesh from south to north.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have cut off'; the Hebrew perfect may be rendered as a completed action
      or as a future/certain action in prophetic context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'all flesh,' a common expression for all mortal people.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן אֲשֶׁר
  chosen: Because
  alternatives:
  - Because indeed
  - Forasmuch as
  lexicon: HALOT
  rationale: The paired expression introduces the reason for the coming judgment.
    'Because' is natural modern English and preserves the causal force without archaic
    phrasing.
- source_word: הִכְרַתִּי
  chosen: I will cut off
  alternatives:
  - I have cut off
  - I am about to cut off
  - I will destroy
  lexicon: HALOT
  rationale: The verb כרת commonly means 'cut off.' Although morphologically perfect,
    in prophetic discourse it can express a future action with certainty in context.
    The following future verb ('my sword will go out') supports rendering this as
    imminent/future rather than simple past. 'Cut off' also preserves the concrete
    and judicial tone better than the more generalized 'destroy.'
- source_word: מִמֵּךְ
  chosen: from you
  alternatives:
  - out of you
  - from your midst
  lexicon: HALOT
  rationale: Addressed to the land/personified people in the feminine singular. 'From
    you' is the most direct rendering; 'from your midst' is interpretive and not required
    by the preposition alone.
- source_word: צַדִּיק וְרָשָׁע
  chosen: both the righteous and the wicked
  alternatives:
  - the righteous and the wicked
  - the just and the wicked
  lexicon: HALOT
  rationale: The pair is a merism indicating indiscriminate scope of judgment. 'Righteous'
    and 'wicked' are standard, clear renderings. 'Both' makes the distributive force
    explicit in idiomatic English.
- source_word: לָכֵן
  chosen: therefore
  alternatives:
  - so
  - for this reason
  lexicon: HALOT
  rationale: Marks the consequence flowing from the prior clause. 'Therefore' preserves
    the formal logical connection.
- source_word: תֵּצֵא חַרְבִּי
  chosen: my sword will go out
  alternatives:
  - my sword shall come out
  - my sword will be drawn
  lexicon: HALOT
  rationale: The Hebrew literally says 'my sword will go out.' This keeps the vivid
    personified imagery. 'Will be drawn' is idiomatic but slightly more interpretive
    than the source wording.
- source_word: מִתַּעְרָהּ
  chosen: from its sheath
  alternatives:
  - out of its scabbard
  lexicon: HALOT
  rationale: '''Sheath'' is the standard accessible English term for a sword''s covering.
    The feminine suffix refers to the sword.'
- source_word: אֶל כָּל בָּשָׂר
  chosen: against all flesh
  alternatives:
  - against all people
  - against all humanity
  lexicon: HALOT
  rationale: '''All flesh'' is the literal expression and preserves the solemn, universal-sounding
    idiom of mortal humanity. ''Against'' fits the hostile force of the sword better
    than a neutral ''to.'''
- source_word: מִנֶּגֶב צָפוֹן
  chosen: from south to north
  alternatives:
  - from the Negeb to the north
  - from southland to north
  lexicon: HALOT
  rationale: This expresses total geographic extent from one end of the land to the
    other. 'From south to north' is clear and idiomatic. Rendering נגב as the proper
    noun 'Negeb' is possible, but here the directional merism is more likely foregrounded
    than the regional name.
