id: EZK.21.34
reference: Ezekiel 21:34
source:
  edition: WLC
  text: בַּ/חֲז֥וֹת לָ/ךְ֙ שָׁ֔וְא בִּ/קְסָם לָ֖/ךְ כָּזָ֑ב לָ/תֵ֣ת אוֹתָ֗/ךְ אֶֽל
    צַוְּארֵי֙ חַֽלְלֵ֣י רְשָׁעִ֔ים אֲשֶׁר בָּ֣א יוֹמָ֔/ם בְּ/עֵ֖ת עֲוֺ֥ן קֵֽץ־־־׃
translation:
  text: while they see false visions for you and divine lies for you, to place you
    on the necks of the slain wicked, whose day has come at the time of final punishment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when they see falsehood for you and divine deception for you.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'on the necks of the slain wicked,' a difficult image; possibly meaning
      to bring you down among those already slain.
    reason: lexical_alternative
  - marker: c
    text: Or 'at the time of the iniquity of the end' or 'at the time of final guilt.'
    reason: alternative_reading
lexical_decisions:
- source_word: בַּחֲזוֹת
  chosen: while they see
  alternatives:
  - when they see
  - in seeing
  lexicon: HALOT
  rationale: Infinitive construct of חזה with prefixed ב can be rendered temporally
    ('while/when seeing'). The implied subject is the diviners/visionaries from context.
    'While they see' preserves the ongoing/attendant sense.
- source_word: שָׁוְא
  chosen: false visions
  alternatives:
  - vanity
  - emptiness
  - worthless visions
  lexicon: HALOT
  rationale: שָׁוְא denotes falsehood, emptiness, or worthlessness. In prophetic context
    with חזה, it qualifies the visions as deceptive rather than merely empty.
- source_word: בִּקְסָם
  chosen: and divine
  alternatives:
  - and practice divination
  - and while divining
  lexicon: HALOT
  rationale: Infinitive construct of קסם with prefixed ב parallels בַּחֲזוֹת. 'Divine'
    is concise modern English for performing divination and fits the parallelism.
- source_word: כָּזָב
  chosen: lies
  alternatives:
  - falsehood
  - deception
  lexicon: HALOT
  rationale: כָּזָב is straightforwardly 'lie/falsehood.' Plural 'lies' works idiomatically
    in English with 'divine' and matches the deceptive prophetic setting.
- source_word: לָתֵת אֹתָךְ
  chosen: to place you
  alternatives:
  - to set you
  - to give you over
  lexicon: HALOT
  rationale: נתן plus object and following אֶל expresses causing or placing someone
    into a position. 'Place you' is the clearest idiomatic rendering here.
- source_word: אֶל צַוְּארֵי
  chosen: on the necks of
  alternatives:
  - against the necks of
  - upon the necks of
  lexicon: HALOT
  rationale: צַוָּאר means 'neck.' The image is difficult, but a literal rendering
    best preserves the metaphor. 'On the necks of' likely evokes being laid alongside
    or among those already struck down.
- source_word: חַלְלֵי רְשָׁעִים
  chosen: the slain wicked
  alternatives:
  - the wicked who are slain
  - the slain of the wicked
  lexicon: HALOT
  rationale: 'Construct chain is most naturally adjectival/appositional: slain wicked
    persons. ''The slain wicked'' is concise and preserves the Hebrew order''s force.'
- source_word: אֲשֶׁר בָּא יוֹמָם
  chosen: whose day has come
  alternatives:
  - for whom their day has come
  - whose time has come
  lexicon: HALOT
  rationale: Idiomatic expression for the arrival of judgment. 'Whose day has come'
    preserves the prophetic tone and the explicit 'day' imagery.
- source_word: בְּעֵת עֲוֺן קֵץ
  chosen: at the time of final punishment
  alternatives:
  - at the time of the iniquity of the end
  - at the time of final iniquity
  - at the time of end-time punishment
  lexicon: HALOT
  rationale: The phrase is compressed and idiomatic. עָוֺן can denote guilt or punishment
    for guilt; in judgment contexts 'punishment' is often the sense. קֵץ qualifies
    it as terminal/final. This yields natural English while preserving the judicial
    force.
