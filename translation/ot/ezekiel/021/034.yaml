theological_decisions:
- issue: Sense of עֲוֺן in a judgment formula
  chosen_reading: punishment
  alternative_readings:
  - iniquity
  - guilt
  rationale: The verse speaks of the arrival of the wicked's day of judgment. Rendering
    עֲוֺן as 'punishment' reflects the consequence-bearing sense common in judgment
    contexts and avoids the awkward English 'time of the iniquity of the end,' while
    still preserving the judicial meaning.
- issue: Handling the difficult metaphor 'to place you on the necks of the slain wicked'
  chosen_reading: retain the concrete image with minimal interpretation
  alternative_readings:
  - to bring you down among the slain wicked
  - to lay you with the slain wicked
  rationale: The Hebrew image is obscure, but the translation philosophy favors preserving
    textual tension rather than resolving it by paraphrase. Therefore the neck imagery
    is kept in the main text, with smoother alternatives noted only as lexical possibilities.
  doctrine_reference: Translation philosophy §3
