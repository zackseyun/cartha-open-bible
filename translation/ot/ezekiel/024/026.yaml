id: EZK.24.26
reference: Ezekiel 24:26
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֔וּא יָב֥וֹא הַ/פָּלִ֖יט אֵלֶ֑י/ךָ לְ/הַשְׁמָע֖וּת אָזְנָֽיִם׃
translation:
  text: On that day the fugitive will come to you to make your ears hear[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to bring news to your ears' or 'to inform you.' The Hebrew expression is idiomatic and emphasizes that the report will be heard directly.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: On that day
  alternatives:
  - In that day
  lexicon: HALOT
  rationale: Temporal phrase marking a specific future time. 'On that day' is idiomatic modern English and preserves the demonstrative force.
- source_word: יָבֹוא
  chosen: will come
  alternatives:
  - comes
  - shall come
  lexicon: HALOT
  rationale: Qal imperfect 3ms with future sense in context. 'Will come' is natural modern English.
- source_word: הַפָּלִיט
  chosen: the fugitive
  alternatives:
  - the escapee
  - the survivor
  - the refugee
  lexicon: HALOT
  rationale: From the root פלṭ/פלט, denoting one who has escaped. 'The fugitive' best preserves the concrete sense of one who has fled and survived, fitting Ezekiel's context of a survivor bringing news.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - unto you
  lexicon: HALOT
  rationale: Straightforward directional prepositional phrase addressed to Ezekiel in the singular masculine.
- source_word: לְהַשְׁמָעוּת אָזְנָיִם
  chosen: to make it heard with your ears
  alternatives:
  - to cause your ears to hear
  - to bring news to your ears
  - to inform you
  lexicon: HALOT
  rationale: Literally 'for a hearing of ears' / 'to cause hearing of ears.' The Hebrew is somewhat idiomatic and emphatic, stressing actual audible report reaching Ezekiel. The chosen rendering keeps the auditory imagery more closely than the smoother but more interpretive 'to inform you'.
