id: EZK.31.6
reference: Ezekiel 31:6
source:
  edition: WLC
  text: בִּ/סְעַפֹּתָ֤י/ו קִֽנְנוּ֙ כָּל ע֣וֹף הַ/שָּׁמַ֔יִם וְ/תַ֤חַת פֹּֽארֹתָי/ו֙ יָֽלְד֔וּ כֹּ֖ל חַיַּ֣ת הַ/שָּׂדֶ֑ה וּ/בְ/צִלּ/וֹ֙ יֵֽשְׁב֔וּ כֹּ֖ל גּוֹיִ֥ם רַבִּֽים־׃
translation:
  text: In its branches all the birds of the heavens nested[a], and under its boughs all the beasts of the field gave birth, and in its shade all the many nations dwelt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the many nations dwelt in its shadow.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּסְעַפֹּתָיו
  chosen: in its branches
  alternatives:
  - among its branches
  - in its boughs
  lexicon: HALOT
  rationale: סְעַפּוֹת denotes branch-structures or large limbs. 'In its branches' is natural English and fits the nesting imagery. The 3ms suffix refers to the tree/cypress figure, rendered as 'its' rather than 'his' in English because the referent is a tree.
- source_word: קִנְנוּ
  chosen: nested
  alternatives:
  - made their nests
  - dwelt
  lexicon: HALOT
  rationale: The verb specifically refers to nesting, especially of birds. 'Nested' is concise and preserves the avian image better than the more general 'dwelt'.
- source_word: עוֹף הַשָּׁמַיִם
  chosen: all the birds of the heavens
  alternatives:
  - every bird of the sky
  - all the birds of the sky
  lexicon: HALOT
  rationale: עוֹף is collective for flying creatures/birds. 'Birds of the heavens' is a fairly formal rendering of the Hebrew idiom; it preserves the elevated register while remaining intelligible.
- source_word: תַחַת פֹּארֹתָיו
  chosen: under its boughs
  alternatives:
  - under its branches
  - beneath its limbs
  lexicon: HALOT
  rationale: פֹּארוֹת refers to leafy branches/boughs. Using 'boughs' here provides a slight lexical distinction from סְעַפּוֹת while still sounding natural.
- source_word: יָלְדוּ
  chosen: gave birth
  alternatives:
  - bore young
  lexicon: HALOT
  rationale: The verb ילד literally means 'gave birth' or 'bore.' In context of wild animals, 'gave birth' is clear modern English and preserves the reproductive image.
- source_word: כֹּל חַיַּת הַשָּׂדֶה
  chosen: all the beasts of the field
  alternatives:
  - every wild animal of the field
  - all the animals of the field
  lexicon: HALOT
  rationale: חַיַּת הַשָּׂדֶה is a common expression for wild land animals. 'Beasts of the field' is idiomatic biblical English without being archaic in this context.
- source_word: וּבְצִלּוֹ
  chosen: in its shade
  alternatives:
  - under its shadow
  lexicon: HALOT
  rationale: צֵל can mean shade or shadow. 'Shade' better fits the image of protection and habitation under a great tree in contemporary English.
- source_word: יֵשְׁבוּ
  chosen: lived
  alternatives:
  - dwelt
  - sat
  lexicon: HALOT
  rationale: ישב often means dwell/live when used of habitation. 'Lived' is the most natural English equivalent here; 'sat' would be too literal and misleading.
- source_word: כֹּל גּוֹיִם רַבִּים
  chosen: all many nations
  alternatives:
  - all the many nations
  - many nations
  lexicon: HALOT
  rationale: The Hebrew combines כֹּל with גּוֹיִם רַבִּים for comprehensiveness over a multitude. Idiomatic English requires smoothing; the sense is that a great multitude of nations lived in its shade.
