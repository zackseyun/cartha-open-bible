id: EZK.27.17
reference: Ezekiel 27:17
source:
  edition: WLC
  text: יְהוּדָה֙ וְ/אֶ֣רֶץ יִשְׂרָאֵ֔ל הֵ֖מָּה רֹכְלָ֑יִ/ךְ בְּ/חִטֵּ֣י מִ֠נִּית וּ/פַנַּ֨ג וּ/דְבַ֤שׁ וָ/שֶׁ֨מֶן֙ וָ/צֹ֔רִי נָתְנ֖וּ מַעֲרָבֵֽ/ךְ׃
translation:
  text: Judah and the land of Israel—they were your merchants; they traded for your merchandise with wheat of Minnith[a], pannag, honey, oil, and balm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The meaning of 'pannag' is uncertain; proposed renderings include a confection, spice, or pastry product.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹכְלָיִךְ
  chosen: your merchants
  alternatives:
  - your traders
  lexicon: HALOT
  rationale: The noun denotes those who engage in trade or commerce. 'Merchants' fits the commercial lament over Tyre and is idiomatic in English.
- source_word: בְּחִטֵּי מִנִּית
  chosen: with wheat of Minnith
  alternatives:
  - with Minnith wheat
  - with wheat from Minnith
  lexicon: HALOT
  rationale: The beth marks the commodity by which trade was conducted. 'Wheat of Minnith' preserves the construct relation and the place name Minnith, likely indicating origin or a known quality designation.
- source_word: פַנַּג
  chosen: pannag
  alternatives:
  - confection
  - spice
  - pastry
  lexicon: HALOT
  rationale: The term is rare and uncertain in meaning. Because no consensus English equivalent is secure, transliteration best preserves the source while avoiding overconfident interpretation; an explanatory footnote preserves leading alternatives.
- source_word: דְבַשׁ
  chosen: honey
  lexicon: HALOT
  rationale: Standard lexical sense is 'honey.'
- source_word: שֶׁמֶן
  chosen: oil
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: The basic sense is 'oil,' often olive oil in this context. The broader 'oil' is retained in the main text to avoid adding specificity not explicit in the Hebrew.
- source_word: צֹרִי
  chosen: balm
  alternatives:
  - balsam
  - resin
  lexicon: HALOT
  rationale: The word refers to a valued aromatic resin or balm, traditionally associated with Gilead. 'Balm' is a clear and established English rendering.
- source_word: נָתְנוּ מַעֲרָבֵךְ
  chosen: trading for your wares
  alternatives:
  - they gave for your merchandise
  - they exchanged for your goods
  lexicon: HALOT
  rationale: Literally, 'they gave your exchange/merchandise.' In this trade list, the idiomatic sense is that these goods were given in exchange as Tyre's commercial wares. 'Trading for your wares' communicates the commercial function naturally while staying close to the sense.
- source_word: יְהוּדָה וְאֶרֶץ יִשְׂרָאֵל
  chosen: Judah and the land of Israel
  alternatives:
  - Judah and Israel
  lexicon: HALOT
  rationale: The Hebrew explicitly distinguishes Judah and 'the land of Israel.' The fuller rendering preserves the wording rather than collapsing it into a simpler traditional phrase.
