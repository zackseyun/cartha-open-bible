id: EZK.27.5
reference: Ezekiel 27:5
source:
  edition: WLC
  text: בְּרוֹשִׁ֤ים מִ/שְּׂנִיר֙ בָּ֣נוּ לָ֔/ךְ אֵ֖ת כָּל לֻֽחֹתָ֑יִם אֶ֤רֶז מִ/לְּבָנוֹן֙ לָקָ֔חוּ לַ/עֲשׂ֥וֹת תֹּ֖רֶן עָלָֽיִ/ךְ־׃
translation:
  text: With cypresses from Senir they built all your planking[b][a]; they took a cedar from Lebanon to make a mast for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'junipers' or 'fir trees' for 'cypress trees'; the exact species denoted by Hebrew בְּרוֹשִׁים is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Senir is a regional name associated with Mount Hermon (cf. Deut 3:9).
    reason: cross_reference
lexical_decisions:
- source_word: בְּרוֹשִׁים
  chosen: cypress trees
  alternatives:
  - junipers
  - fir trees
  lexicon: HALOT
  rationale: בְּרוֹשׁ commonly denotes a coniferous tree; in English Bible usage the exact species is debated. 'Cypress' is a common modern rendering and fits shipbuilding imagery well. Because the identification is not certain, alternatives are preserved in a footnote.
- source_word: מִשְּׂנִיר
  chosen: from Senir
  alternatives:
  - from Shenir
  lexicon: HALOT
  rationale: This is a place name, so it is transliterated rather than translated, per project philosophy. 'Senir' reflects a standard English transliteration of the Hebrew name associated with Hermon.
- source_word: בָּנוּ לָךְ
  chosen: they built ... for you
  alternatives:
  - they made ... for you
  lexicon: HALOT
  rationale: בנה is the ordinary verb 'build.' In this ship metaphor for Tyre, 'built ... for you' preserves the construction imagery.
- source_word: אֵת כָּל לֻחֹתָיִם
  chosen: all your planking
  alternatives:
  - all your boards
  - all your deck-boards
  lexicon: HALOT
  rationale: לוּחַ means 'board/plank/tablet.' In a shipbuilding context, 'planking' is the most natural collective English rendering for the ship's wooden boards. The 2fs ending is represented by 'your,' since Tyre is addressed as a woman/ship.
- source_word: אֶרֶז מִלְּבָנוֹן
  chosen: a cedar from Lebanon
  alternatives:
  - cedar wood from Lebanon
  lexicon: HALOT
  rationale: The singular noun can be rendered concretely as 'a cedar,' especially since it is used for a single mast in the next clause. 'From Lebanon' preserves the source of the timber.
- source_word: לָקָחוּ
  chosen: they took
  alternatives:
  - they brought
  - they used
  lexicon: HALOT
  rationale: לקח is straightforwardly 'take.' 'They took' keeps the verbal sequence close to the Hebrew without over-paraphrasing.
- source_word: לַעֲשׂוֹת תֹּרֶן
  chosen: to make a mast
  alternatives:
  - to make your mast
  lexicon: HALOT
  rationale: תֹּרֶן is 'mast.' The Hebrew does not attach the pronominal suffix directly to 'mast'; the following עָלַיִךְ more literally means 'upon you/for you.' English idiom is smoother with 'to make a mast for you.'
- source_word: עָלָיִךְ
  chosen: for you
  alternatives:
  - upon you
  - on you
  lexicon: HALOT
  rationale: Although עַל often means 'upon/on,' in this construction with making a ship component it idiomatically indicates relation to the addressed ship/city. 'For you' communicates the sense in natural English while preserving the second feminine singular address.
