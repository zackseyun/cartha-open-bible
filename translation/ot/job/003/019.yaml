id: JOB.3.19
reference: Job 3:19
source:
  edition: WLC
  text: קָטֹ֣ן וְ֭/גָדוֹל שָׁ֣ם ה֑וּא וְ֝/עֶ֗בֶד חָפְשִׁ֥י מֵ/אֲדֹנָֽי/ו׃
translation:
  text: The small and the great are there[a], and the slave is free from his master.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The small and the great are there; and the servant is free from his master.' The Hebrew for עֶבֶד can mean 'servant' or 'slave'; here 'slave' is used because the contrast with being free from a master highlights bonded status.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָטֹן
  chosen: the small
  alternatives:
  - the insignificant
  - the lowly
  - the young
  lexicon: HALOT
  rationale: In parallel with גָדוֹל, the adjective denotes social status or significance rather than physical size alone. 'The small' preserves the concise Hebrew contrast and allows the pair to express those of lesser standing.
- source_word: גָדוֹל
  chosen: the great
  alternatives:
  - the important
  - the mighty
  lexicon: HALOT
  rationale: Paired antithetically with קָטֹן, this refers to those of high status or prominence. 'The great' is idiomatic English and preserves the social contrast.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Refers back to the realm of death/sheol in the surrounding context. 'There' is the natural English equivalent and preserves the deictic force.
- source_word: הוּא
  chosen: are there alike
  alternatives:
  - is there
  - are there
  lexicon: HALOT
  rationale: Although formally singular, the pronoun functions with the preceding pair as a collective statement. Rendering it woodenly as 'is there' would sound unnatural in English; 'are there alike' brings out the sense that both categories share the same condition there.
- source_word: עֶבֶד
  chosen: slave
  alternatives:
  - servant
  lexicon: HALOT
  rationale: The Hebrew term commonly denotes a bonded servant/slave. In this context, the contrast with being free from a master makes the bonded nature salient, so 'slave' best fits the translation philosophy's preference where servitude is explicit.
- source_word: חָפְשִׁי
  chosen: free
  alternatives:
  - set free
  - unbound
  lexicon: HALOT
  rationale: The adjective means free, especially in contrast to servitude. 'Free' is direct and preserves the stark contrast with עֶבֶד.
- source_word: מֵאֲדֹנָיו
  chosen: from his master
  alternatives:
  - from his lord
  - from his owner
  lexicon: HALOT
  rationale: The preposition marks separation, and אֲדוֹן here refers to the slave's human master. 'Master' is the most natural contextual rendering in English for a slave-owner relationship.
