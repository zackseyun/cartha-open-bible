theological_decisions:
- issue: Potential messianic overreading of 'son of man'
  chosen_reading: Render the Hebrew idiom in its immediate human sense, not as a christological title.
  alternative_readings:
  - Translate dynamically as 'a human being' to avoid title associations
  - Read as foreshadowing a mediator figure and capitalize 'Son of Man'
  rationale: In Job 16:21 the phrase בן אדם is a common Hebrew idiom for a human being and functions in poetic parallelism with גבר. Capitalizing or explicitly christologizing it would import later theological associations not demanded by the text. Retaining the literal phrase preserves the wording while the context keeps the sense human.
  doctrine_reference: Preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.
