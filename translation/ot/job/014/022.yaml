id: JOB.14.22
reference: Job 14:22
source:
  edition: WLC
  text: אַךְ בְּ֭שָׂר/וֹ עָלָ֣י/ו יִכְאָ֑ב וְ֝/נַפְשׁ֗/וֹ עָלָ֥י/ו תֶּאֱבָֽל־׃פ
translation:
  text: Surely his flesh on him feels pain[b][a], and his soul on him mourns.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Only his flesh on him hurts, and his soul on him mourns.' The Hebrew is compact and somewhat idiomatic; 'surely' and 'within him' are interpretive choices for natural English.
    reason: lexical_alternative
  - marker: b
    text: '''Soul'' may also be rendered ''life,'' ''self,'' or ''inner being.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Only
  - indeed
  - but
  lexicon: HALOT
  rationale: Here אַךְ functions as an asseverative or restrictive particle concluding the reflection with emphasis. 'Surely' fits the climactic, emphatic sense better than a strongly restrictive 'only,' while preserving the force of the Hebrew.
- source_word: בְּשָׂרוֹ
  lemma: בָּשָׂר
  chosen: his flesh
  alternatives:
  - his body
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh.' In this context it refers to the man's bodily existence after death or in dying. 'Flesh' preserves the concrete Hebrew imagery better than the more interpretive 'body.'
- source_word: עָלָיו
  chosen: on him
  alternatives:
  - upon him
  - for himself
  - within him
  lexicon: HALOT
  rationale: The preposition עַל with pronominal suffix is retained in a relatively literal way. In English, 'his flesh on him' is unusual but intelligible and reflects the Hebrew idiom of bodily pain being experienced by the person himself.
- source_word: יִכְאָב
  chosen: feels pain
  alternatives:
  - hurts
  - is in pain
  - aches
  lexicon: HALOT
  rationale: The verb כאב denotes experiencing pain. 'Feels pain' is natural modern English and preserves the experiential sense without over-specifying the kind of pain.
- source_word: נַפְשׁוֹ
  chosen: his soul
  alternatives:
  - his life
  - his self
  - his inner being
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, life, self, or inner being depending on context. Here paired with 'flesh,' it forms a body/inner-self parallel. 'Soul' best preserves that poetic contrast in English without flattening the anthropological tension.
- source_word: עָלָיו
  chosen: within him
  alternatives:
  - on him
  - for himself
  - over him
  lexicon: HALOT
  rationale: Although the same Hebrew preposition appears, strict repetition would sound awkward in English in the second colon. 'Within him' brings out the inward dimension of the parallel with נַפְשׁוֹ while still reflecting personal reference.
- source_word: תֶּאֱבָל
  chosen: mourns
  alternatives:
  - grieves
  - laments
  lexicon: HALOT
  rationale: The verb אבל means to mourn or lament. 'Mourns' is concise and preserves the poetic register and emotional force.
