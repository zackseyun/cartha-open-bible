id: JOB.20.17
reference: Job 20:17
source:
  edition: WLC
  text: אַל יֵ֥רֶא בִ/פְלַגּ֑וֹת נַהֲרֵ֥י נַ֝חֲלֵ֗י דְּבַ֣שׁ וְ/חֶמְאָֽה־׃
translation:
  text: He will not look upon streams[a], rivers flowing with honey and curds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He will not see the channels, the rivers, the wadis of honey and curds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: will not
  alternatives:
  - let him not
  - may he not
  lexicon: HALOT
  rationale: With the imperfect יֵרֶא in poetic discourse, אַל functions as a negating particle expressing that the wicked person will not experience the envisioned blessing. English future-like negation fits the context better than a jussive-sounding prohibition.
- source_word: יֵרֶא
  chosen: look upon
  alternatives:
  - see
  - gaze upon
  lexicon: HALOT
  rationale: The verb ראה literally means 'see,' but here in a poetic image of enjoying abundance, 'look upon' preserves the visual sense while sounding natural in English and implying experience of the blessing.
- source_word: בִּפְלַגּוֹת
  chosen: the streams
  alternatives:
  - channels
  - divisions of water
  lexicon: HALOT
  rationale: פּלגּות denotes streams or watercourses. The prefixed ב is best taken idiomatically with ראה rather than rendered woodenly as 'in streams'; English naturally expresses the object as what he looks upon.
- source_word: נַהֲרֵי
  chosen: the rivers
  alternatives:
  - river-streams
  lexicon: HALOT
  rationale: נהרי is the construct plural of נהר, 'rivers.' Retaining a separate English term reflects the piling up of abundance imagery in the Hebrew.
- source_word: נַחֲלֵי
  chosen: the brooks flowing with
  alternatives:
  - wadis of
  - torrent-beds of
  lexicon: HALOT
  rationale: נחלי can denote wadis, valleys, or brooks/torrents. In this context of luxuriant provision, 'brooks' communicates the image clearly in modern English. 'Flowing with' brings out the construct relationship with honey and curds in idiomatic English.
- source_word: דְּבַשׁ
  chosen: honey
  lexicon: HALOT
  rationale: Standard rendering of דבש. In biblical abundance imagery, 'honey' is the natural English equivalent.
- source_word: וְחֶמְאָה
  chosen: and curds
  alternatives:
  - and butter
  - and cream
  lexicon: HALOT
  rationale: חמאה can be rendered 'curds,' 'butter,' or 'cream' depending on context. 'Curds' best matches common modern translations of pastoral abundance imagery and avoids implying modern processed butter.
