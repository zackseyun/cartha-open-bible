id: JOB.20.13
reference: Job 20:13
source:
  edition: WLC
  text: יַחְמֹ֣ל עָ֭לֶי/הָ וְ/לֹ֣א יַֽעַזְבֶ֑/נָּה וְ֝/יִמְנָעֶ֗/נָּה בְּ/ת֣וֹךְ חִכּֽ/וֹ׃
translation:
  text: He spares it and does not let it go[a], and holds it in his mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'in his palate.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחְמֹל
  chosen: spares
  alternatives:
  - has pity on
  - keeps
  - is reluctant to part with
  lexicon: HALOT
  rationale: The verb חמל commonly conveys sparing or showing pity, but in this context of retaining wickedness as something sweet (vv. 12–13), the sense is that he treats it as something he will not give up. 'Spares' preserves the concrete verbal force while fitting the context of retention.
- source_word: עָלֶיהָ
  chosen: it
  alternatives:
  - over it
  - upon it
  lexicon: HALOT
  rationale: The preposition על with pronominal suffix is idiomatic here after חמל. English requires a direct object-like rendering. The feminine singular suffix refers back to the metaphorical object from the prior verse (wickedness), so 'it' is the natural English rendering.
- source_word: לֹא יַעַזְבֶנָּה
  chosen: does not let it go
  alternatives:
  - does not forsake it
  - does not leave it
  lexicon: HALOT
  rationale: עזב often means leave, forsake, or abandon. In this poetic context of clinging to evil as to a delicacy, 'does not let it go' best communicates active refusal to release it in idiomatic modern English.
- source_word: יִמְנָעֶנָּה
  chosen: holds it back
  alternatives:
  - retains it
  - keeps it back
  - withholds it
  lexicon: HALOT
  rationale: מנע means withhold, restrain, or keep back. Here the image is of not swallowing but keeping the sweet thing in the mouth. 'Holds it back' captures the physical and metaphorical sense.
- source_word: בְּתוֹךְ חִכּוֹ
  chosen: in his mouth
  alternatives:
  - in his palate
  - inside his mouth
  lexicon: HALOT
  rationale: חך literally denotes palate/roof of the mouth. In English poetry and natural speech, 'in his mouth' communicates the image clearly without unnecessary anatomical stiffness. The more literal 'palate' is preserved as an alternative.
