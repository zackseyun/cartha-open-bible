id: JOB.20.29
reference: Job 20:29
source:
  edition: WLC
  text: זֶ֤ה חֵֽלֶק אָדָ֣ם רָ֭שָׁע מֵ/אֱלֹהִ֑ים וְ/נַחֲלַ֖ת אִמְר֣/וֹ מֵ/אֵֽל׀־׃פ
translation:
  text: This is the portion of a wicked man from God[a], the inheritance appointed for him from the Mighty One.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the inheritance of his word from God"; the Hebrew term can be read more literally as "his word/utterance," but here it likely refers to what God has spoken or decreed for him.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה
  chosen: This is
  alternatives:
  - This
  lexicon: HALOT
  rationale: Demonstrative introducing Zophar's concluding summary; English idiom naturally supplies the copula.
- source_word: חֵלֶק
  chosen: portion
  alternatives:
  - share
  - lot
  lexicon: HALOT
  rationale: Refers to an allotted share or assigned outcome. 'Portion' fits wisdom/judgment context better than the more idiomatic but potentially misleading 'lot'.
- source_word: אָדָם רָשָׁע
  chosen: a wicked man
  alternatives:
  - a wicked person
  - wicked humanity
  lexicon: HALOT
  rationale: Singular generic expression. Per doctrine, gender-accurate rendering is preferred where Hebrew is grammatically masculine and representative. 'A wicked man' preserves the form and generic force.
- source_word: מֵאֱלֹהִים
  chosen: from God
  alternatives:
  - from gods
  - from God himself
  lexicon: HALOT
  rationale: Here אֱלֹהִים clearly refers to the one true God as the source of the wicked man's allotted judgment.
- source_word: וְנַחֲלַת
  chosen: the inheritance
  alternatives:
  - and the heritage
  - and the possession
  lexicon: HALOT
  rationale: Parallel to 'portion' and denotes what is assigned or inherited. 'Inheritance' preserves the formal parallelism and judicial-allotment sense.
- source_word: אִמְרוֹ
  chosen: decreed for him
  alternatives:
  - his word
  - his utterance
  - appointed for him
  lexicon: HALOT
  rationale: The noun from אמר can denote speech/utterance, but in this context many understand it idiomatically as what is spoken/appointed for him, i.e., his divinely declared allotment. Rendering 'decreed for him' makes sense of the suffix and the parallel with 'portion'/'inheritance' without wooden obscurity.
- source_word: מֵאֵל
  chosen: from the Mighty One
  alternatives:
  - from God
  - from El
  lexicon: HALOT
  rationale: אֵל is a divine title parallel to אֱלֹהִים. 'The Mighty One' translates the title's force and preserves the poetic variation rather than flattening both cola to 'God'.
