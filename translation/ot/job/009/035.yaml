id: JOB.9.35
reference: Job 9:35
source:
  edition: WLC
  text: אַֽ֭דַבְּרָה וְ/לֹ֣א אִירָאֶ֑/נּוּ כִּ֥י לֹא כֵ֥ן אָ֝נֹכִ֗י עִמָּדִֽ/י־׃
translation:
  text: Then I would speak and not fear him[a], for I am not so in myself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for it is not so with me,' or more formally, 'for not so am I with myself.' The Hebrew final clause is elliptical.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַדַבְּרָה
  chosen: Then I would speak
  alternatives:
  - I would speak
  - Let me speak
  lexicon: HALOT
  rationale: Cohortative/imperfect 1cs of דבר expresses Job's intended or hypothetical resolve in context. 'Then I would speak' captures the volitional force and the verse's dependence on the preceding wish for an arbiter, while remaining natural English.
- source_word: וְלֹא
  chosen: and not
  alternatives:
  - and would not
  - without
  rationale: Simple conjunction plus negation linking the second verbal clause. In English it is best carried as 'and not' within the larger clause 'and not fear him.'
- source_word: אִירָאֶנּוּ
  chosen: fear him
  alternatives:
  - be afraid of him
  lexicon: HALOT
  rationale: From ירא with 3ms suffix, straightforwardly 'fear him.' 'Fear' is concise and preserves the directness of Job's statement; 'be afraid of him' is possible but less compact.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the ground for the preceding statement. 'For' fits the explanatory relation and preserves the formal connection.
- source_word: לֹא כֵן
  chosen: not like that
  alternatives:
  - not so
  - not thus
  lexicon: HALOT
  rationale: The phrase is elliptical. 'Not like that' communicates the sense more idiomatically in modern English than the more wooden 'not so,' while preserving the comparison implied by כֵן.
- source_word: אָנֹכִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: Independent pronoun gives emphasis. English normally expresses this emphasis adequately in the clause 'for I am not like that...' without needing an overly marked form such as 'I myself.'
- source_word: עִמָּדִי
  chosen: in myself
  alternatives:
  - with me
  - as I am
  - on my own
  lexicon: HALOT
  rationale: 'Literally ''with me,'' but in this idiom the sense is reflexive/self-referential: Job says this is not how matters stand with him as he presently is. ''In myself'' preserves the inward/personal nuance better than the more ambiguous ''with me.'''
