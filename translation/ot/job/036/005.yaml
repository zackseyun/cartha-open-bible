id: JOB.36.5
reference: Job 36:5
source:
  edition: WLC
  text: הֶן אֵ֣ל כַּ֭בִּיר וְ/לֹ֣א יִמְאָ֑ס כַּ֝בִּ֗יר כֹּ֣חַֽ לֵֽב־׃
translation:
  text: Behold[a], God is mighty and does not despise[b]; he is mighty in strength of heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'does not reject' or 'does not spurn.' The Hebrew does not state the object explicitly.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'strength of heart'; this may mean strength of mind, understanding, or firmness of purpose.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶן
  chosen: Behold
  alternatives:
  - Surely
  - Look
  lexicon: HALOT
  rationale: Introduces an emphatic assertion. 'Behold' preserves the discourse-marking force and elevated tone better than the flatter 'surely,' while remaining natural in poetic context.
- source_word: אֵל
  chosen: God
  alternatives:
  - God Almighty
  - Mighty God
  lexicon: HALOT
  rationale: Here אֵל functions as the common poetic term for God, not necessarily as a distinct title requiring expansion. 'God' is the most direct rendering.
- source_word: כַּבִּיר
  chosen: mighty
  alternatives:
  - great
  - powerful
  lexicon: HALOT
  rationale: The adjective denotes greatness/power. 'Mighty' fits both occurrences in the verse and preserves the poetic repetition.
- source_word: וְלֹא יִמְאָס
  chosen: and does not despise anyone
  alternatives:
  - and does not reject
  - and does not spurn
  lexicon: HALOT
  rationale: מאס commonly means 'reject, despise, spurn.' In this context, with no explicit object stated, English benefits from supplying the implied human object. 'Despise anyone' captures the sense that God's greatness does not lead him to contempt for people.
- source_word: כֹּחַ לֵב
  chosen: strength of heart
  alternatives:
  - strength of mind
  - firmness of purpose
  lexicon: HALOT
  rationale: The construct literally reads 'strength of heart.' Since לֵב in Hebrew can denote inner understanding, resolve, or mind, the phrase is somewhat idiomatic. The main text keeps the literal imagery for transparency, while alternatives are preserved in a footnote.
