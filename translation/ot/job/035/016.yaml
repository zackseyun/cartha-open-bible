id: JOB.35.16
reference: Job 35:16
source:
  edition: WLC
  text: וְ֭/אִיּוֹב הֶ֣בֶל יִפְצֶה פִּ֑י/הוּ בִּ/בְלִי דַ֝֗עַת מִלִּ֥ין יַכְבִּֽר־־׃פ
translation:
  text: So Job opens his mouth in vain[a]; without knowledge he multiplies words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Job opens his mouth in vain'; the Hebrew הֶבֶל can denote vanity, futility, or emptiness.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶבֶל
  chosen: with emptiness
  alternatives:
  - vainly
  - for emptiness
  - with vanity
  - in vain
  lexicon: HALOT
  rationale: הֶבֶל commonly denotes breath, vapor, vanity, or emptiness. Here it functions adverbially with יִפְצֶה פִּיהוּ, describing the character of Job's speech as empty or futile. 'With emptiness' preserves the concrete Hebrew sense better than the more interpretive 'vainly,' while remaining natural English.
- source_word: יִפְצֶה פִּיהוּ
  chosen: opens his mouth
  alternatives:
  - utters with his mouth
  - speaks out
  lexicon: HALOT
  rationale: The idiom פצה פה means 'to open the mouth,' often with the sense of beginning to speak. Rendering the idiom directly is both natural in English and faithful to the Hebrew.
- source_word: בִּבְלִי דַעַת
  chosen: without knowledge
  alternatives:
  - without understanding
  - in ignorance
  lexicon: HALOT
  rationale: בִּבְלִי marks absence ('without'), and דַעַת is 'knowledge.' 'Without knowledge' is the most direct rendering and fits Elihu's accusation that Job's words lack proper understanding.
- source_word: מִלִּין
  chosen: words
  alternatives:
  - sayings
  - speeches
  lexicon: HALOT
  rationale: The Aramaizing plural form means 'words' or 'utterances.' 'Words' is the simplest and most idiomatic English equivalent here.
- source_word: יַכְבִּר
  chosen: he multiplies
  alternatives:
  - he makes many
  - he increases
  - he heaps up
  lexicon: HALOT
  rationale: The Hiphil of כָּבַר here conveys making something much or abundant. 'He multiplies' captures the causative sense and works idiomatically with 'words.'
- source_word: וְאִיּוֹב
  chosen: So Job
  alternatives:
  - And Job
  - But Job
  lexicon: HALOT
  rationale: The conjunction links this verse to Elihu's preceding conclusion. 'So' reflects the inferential force in context better than a bare 'and,' while avoiding an overly strong adversative.
