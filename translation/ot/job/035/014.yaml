theological_decisions:
- issue: Interpretation of Elihu's exhortation regarding God's hiddenness and justice
  chosen_reading: Elihu tells Job that even if God is not presently seen, Job's case still stands before God and Job should wait for him.
  alternative_readings:
  - Elihu says God does not see the case
  - The final clause means 'writhe before him' rather than 'wait for him'
  rationale: The verse is not making a doctrinal claim about divine ignorance; the broader context assumes God's awareness and justice. Therefore לֹא תְשׁוּרֶנּוּ is best read as Job's complaint that he does not see God, not that God does not see. The final verb is lexically difficult, so the main text adopts the contextually coherent exhortation 'wait for him' while preserving the more literal lexical alternative in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency and source-language primacy
