id: JOB.35.14
reference: Job 35:14
source:
  edition: WLC
  text: אַ֣ף כִּֽי תֹ֭אמַר לֹ֣א תְשׁוּרֶ֑/נּוּ דִּ֥ין לְ֝/פָנָ֗י/ו וּ/תְח֥וֹלֵֽל לֽ/וֹ־׃
translation:
  text: How much less when you say[a], ‘You do not see him’; the case is before him, and you must wait for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and writhe before him'; the Hebrew verb is difficult, and many understand it here as 'wait expectantly for him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף כִּי
  chosen: How much less when
  alternatives:
  - Even though
  - Indeed when
  - Although
  lexicon: HALOT
  rationale: 'In context Elihu argues from the greater to the lesser from v. 13 into v. 14. The idiom אַף כִּי here is not merely concessive (''although'') but inferential/intensifying: if God does not answer emptiness, how much less should one complain that he does not see. ''How much less when'' captures the argumentative force in readable English.'
- source_word: תֹאמַר
  chosen: you say
  alternatives:
  - you say to yourself
  - you declare
  lexicon: HALOT
  rationale: Simple second masculine singular verb of saying, addressed to Job in Elihu's speech. No need to expand beyond the plain speech act.
- source_word: לֹא תְשׁוּרֶנּוּ
  chosen: You do not see him
  alternatives:
  - you do not behold him
  - he does not look at it
  - you cannot perceive him
  lexicon: HALOT
  rationale: The verb שׁוּר commonly means 'look at, behold, perceive.' With 2ms verb plus 1cp/3ms-looking suffix orthography, the sense in context is best taken as 'you do not see him,' i.e., Job's complaint that God is not visible or perceptible. This matches the flow of Elihu's rebuttal. 'Behold' is more formal but less natural.
- source_word: דִּין
  chosen: the case
  alternatives:
  - judgment
  - justice
  - legal case
  - cause
  lexicon: HALOT
  rationale: דִּין here denotes a legal matter or case rather than abstract 'justice.' 'The case' fits the forensic imagery and modern English readability.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in his presence
  - before his face
  lexicon: HALOT
  rationale: Standard prepositional phrase meaning that the matter stands before God for adjudication. 'Before him' is idiomatic and preserves the legal setting.
- source_word: וּתְחוֹלֵל לוֹ
  chosen: and you must wait for him
  alternatives:
  - and wait for him
  - and writhe before him
  - and hope in him
  lexicon: HALOT
  rationale: The rare/ambiguous form from חול in this context is commonly understood as waiting expectantly or patiently for God, likely by contextual development rather than the more concrete 'writhe/whirl.' Given the parallel legal setting ('the case is before him'), the exhortation is to wait for God's action. 'Must wait' brings out the imperative-like force of Elihu's admonition without overparaphrasing.
