theological_decisions:
- issue: Referent of the third-person pronoun לוֹ / יִקָּח
  chosen_reading: Rendered as 'him/he,' referring to God in context.
  alternative_readings:
  - An unspecified person
  rationale: In Elihu's argument (vv. 6–8), the point is that human sin or righteousness does not add to or subtract from God. The pronouns are therefore best understood as referring to God, but the main text retains the pronouns rather than substituting 'God' so as not to over-interpret beyond the immediate Hebrew wording.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; original-language primacy.'
