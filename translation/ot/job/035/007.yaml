id: JOB.35.7
reference: Job 35:7
source:
  edition: WLC
  text: אִם צָ֭דַקְתָּ מַה תִּתֶּן ל֑/וֹ א֥וֹ מַה מִ/יָּדְ/ךָ֥ יִקָּֽח־־־־׃
translation:
  text: If you are righteous[b][a], what do you give to him? Or what does he take from your hand?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'That is, God: Elihu''s point in context is that human righteousness does not provide gain to God.'
    reason: cross_reference
  - marker: b
    text: Or 'what does he receive from your hand?'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - Suppose
  - When
  lexicon: HALOT
  rationale: Introduces a conditional clause. 'If' is the most direct and natural English equivalent here.
- source_word: צָדַקְתָּ
  chosen: you are righteous
  alternatives:
  - you are just
  - you have been righteous
  - you are in the right
  lexicon: HALOT
  rationale: From צדק, denoting being righteous/in the right. English present 'are righteous' best conveys the conditional sense in context rather than a more wooden perfect 'have been righteous.' 'Righteous' fits the book's moral/theological register better than 'just' here.
- source_word: מַה
  chosen: what
  alternatives:
  - what thing
  lexicon: HALOT
  rationale: Standard interrogative pronoun; simple 'what' is sufficient and idiomatic.
- source_word: תִּתֶּן
  chosen: do you give
  alternatives:
  - can you give
  - would you give
  lexicon: HALOT
  rationale: Imperfect of נתן in a rhetorical question. Present English 'do you give' captures the gnomic force without adding modal nuance not explicit in the Hebrew.
- source_word: לוֹ
  chosen: to him
  alternatives:
  - him
  lexicon: HALOT
  rationale: The preposition ל marks indirect object; 'to him' preserves the Hebrew relation clearly.
- source_word: אוֹ
  chosen: Or
  alternatives:
  - Or else
  - Or what
  lexicon: HALOT
  rationale: Simple disjunctive conjunction linking the parallel rhetorical question.
- source_word: מִיָּדְךָ
  chosen: from your hand
  alternatives:
  - from you
  - out of your hand
  lexicon: HALOT
  rationale: Hebrew idiom for receiving something from someone's possession or agency. 'From your hand' preserves the concrete imagery and remains understandable in English.
- source_word: יִקָּח
  chosen: does he take
  alternatives:
  - will he take
  - can he take
  - does he receive
  lexicon: HALOT
  rationale: From לקח, 'take/receive.' 'Take' is the more direct lexical equivalent and suits the rhetorical point that God gains nothing from human righteousness. Present English reflects the general truth expressed.
