theological_decisions:
- issue: Implicit subject of 'he does not answer'
  chosen_reading: The English leaves the subject as 'he,' reflecting the Hebrew singular
    verb without explicitly supplying 'God.'
  alternative_readings:
  - God does not answer them
  rationale: The context clearly points to God as the one who would answer prayer,
    but the Hebrew text does not name him in this clause. Preserving the pronoun maintains
    the source-text restraint and avoids importing an explicit subject the verse itself
    leaves implicit.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering the masculine plural רָעִים
  chosen_reading: evil men
  alternative_readings:
  - the wicked
  - evil people
  rationale: The source form is grammatically masculine plural and refers to human
    wrongdoers. Per the project's gender-accurate policy, the translation keeps the
    masculine reference rather than neutralizing it, while recognizing that some English
    versions generalize the term.
  doctrine_reference: Translation philosophy §4
