id: JOB.35.12
reference: Job 35:12
source:
  edition: WLC
  text: שָׁ֣ם יִ֭צְעֲקוּ וְ/לֹ֣א יַעֲנֶ֑ה מִ֝/פְּנֵ֗י גְּא֣וֹן רָעִֽים׃
translation:
  text: There they cry out, but he does not answer, because of the pride of evil men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the arrogance of evil men.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew does not explicitly name the subject of 'does not answer'; context
      implies God.
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁם
  chosen: There
  alternatives:
  - Then
  lexicon: HALOT
  rationale: The adverb is primarily locative ('there'), and in context points to
    the situation just described rather than functioning merely temporally. 'There'
    preserves the Hebrew sense without overinterpreting.
- source_word: יִצְעֲקוּ
  chosen: they cry out
  alternatives:
  - they call out
  - they cry
  lexicon: HALOT
  rationale: The verb צעק commonly denotes crying out in distress. 'Cry out' is idiomatic
    English and preserves the urgency better than the flatter 'call out'.
- source_word: וְלֹא
  chosen: but ... not
  alternatives:
  - and ... not
  lexicon: HALOT
  rationale: Although waw can be simply conjunctive, English style here is better
    served by adversative 'but' to reflect the contrast between their crying and the
    lack of answer.
- source_word: יַעֲנֶה
  chosen: he does not answer
  alternatives:
  - he will not answer
  - one does not answer
  lexicon: HALOT
  rationale: The 3ms verb has an implicit subject. In context, the implied subject
    is God, but the Hebrew leaves it unstated; 'he does not answer' preserves that
    form while remaining natural. Present tense fits the gnomic/general statement.
    A future rendering is possible but less natural in English here.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - from before
  - on account of
  lexicon: HALOT
  rationale: The preposition with פנים here expresses cause or occasion. 'Because
    of' is the clearest modern English rendering.
- source_word: גְּאוֹן
  chosen: the pride
  alternatives:
  - the arrogance
  - the exaltation
  lexicon: HALOT
  rationale: גאון can denote exaltation, majesty, or pride/arrogance depending on
    context. Here, with 'evil men,' the negative sense is required. 'Pride' is concise
    and idiomatic; 'arrogance' is a viable interpretive alternative.
- source_word: רָעִים
  chosen: evil men
  alternatives:
  - the wicked
  - evildoers
  - evil ones
  lexicon: HALOT
  rationale: The masculine plural adjective/substantive refers to wicked people. 'Evil
    men' preserves the masculine form in line with the project's gender-accurate policy
    and avoids smoothing to a gender-neutral collective. 'The wicked' is possible
    but less explicit.
