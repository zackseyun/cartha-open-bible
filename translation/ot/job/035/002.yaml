theological_decisions:
- issue: Sense of Job's claim in Elihu's accusation
  chosen_reading: 'comparative: ''My righteousness is more than God''s'''
  alternative_readings:
  - '''I am righteous before God'''
  - '''My right is from God'''
  rationale: The Hebrew מֵאֵל after צִדְקִי is terse and debated. In Elihu's polemical
    summary, the comparative sense best fits the immediate context and the charge
    that Job has spoken improperly about God. Because this is interpretively weighty
    and somewhat compressed in Hebrew, alternatives are preserved in a footnote rather
    than silently excluded.
  doctrine_reference: Preserve theological tension rather than resolve it
