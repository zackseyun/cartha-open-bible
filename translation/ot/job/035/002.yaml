id: JOB.35.2
reference: Job 35:2
source:
  edition: WLC
  text: הֲ֭/זֹאת חָשַׁ֣בְתָּ לְ/מִשְׁפָּ֑ט אָ֝מַ֗רְתָּ צִדְקִ֥/י מֵ/אֵֽל׃
translation:
  text: 'Do you think this is just: you say, ‘My righteousness is more than God’s’?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'My righteousness is before God,' or 'My right is from God.' The Hebrew
      is compressed, and the relation of 'my righteousness' to 'God' is debated.
    reason: alternative_reading
lexical_decisions:
- source_word: הֲזֹאת
  chosen: Do you think this
  alternatives:
  - Is this
  - Do you consider this
  lexicon: HALOT
  rationale: 'The interrogative הֲ with demonstrative זֹאת introduces a rhetorical
    question. In English, combining it with the following verb yields a natural opening:
    ''Do you think this...?''.'
- source_word: חָשַׁבְתָּ
  chosen: do you think
  alternatives:
  - have you considered
  - did you reckon
  lexicon: HALOT
  rationale: חשב commonly means 'think, reckon, consider.' Present English 'do you
    think' best conveys the rhetorical force in context.
- source_word: לְמִשְׁפָּט
  chosen: is just
  alternatives:
  - to be justice
  - for justice
  - right
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean 'justice, judgment, legal right.' Here Elihu challenges
    whether Job's statement counts as just/right. 'Is just' is idiomatic and preserves
    the evaluative sense.
- source_word: אָמַרְתָּ
  chosen: you say
  alternatives:
  - you said
  - saying
  lexicon: HALOT
  rationale: Though formally perfect, Hebrew often uses the perfect in discourse to
    introduce quoted speech with present relevance. 'You say' fits the live accusation
    in Elihu's speech.
- source_word: צִדְקִי
  chosen: my righteousness
  alternatives:
  - my right
  - my justice
  - my innocence
  lexicon: HALOT
  rationale: The noun from צדק most naturally means 'righteousness' here, referring
    to Job's claimed rightness/just standing. 'Righteousness' preserves the lexical
    connection and moral-judicial nuance.
- source_word: מֵאֵל
  chosen: more than God’s
  alternatives:
  - than God
  - before God
  - from God
  lexicon: HALOT
  rationale: The preposition מִן after a comparative idea can mean 'more than.' In
    context, Elihu summarizes Job as claiming a righteousness exceeding God's or greater
    than God's justice. Supplying 'God’s' in English makes the comparison intelligible.
    The alternative 'before God' is possible but less likely in this syntax and context.
