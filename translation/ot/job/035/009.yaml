id: JOB.35.9
reference: Job 35:9
source:
  edition: WLC
  text: מֵ֭/רֹב עֲשׁוּקִ֣ים יַזְעִ֑יקוּ יְשַׁוְּע֖וּ מִ/זְּר֣וֹעַ רַבִּֽים׃
translation:
  text: Because of the multitude of oppressions they cry out; they call for help because
    of the arm of the mighty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they cry for help from the arm of the mighty.' The Hebrew preposition
      can be rendered more literally as 'from,' though here it likely expresses the
      cause of their cry.
    reason: lexical_alternative
  - marker: b
    text: '''Arm'' is a Hebrew image for strength or power.'
    reason: cultural_note
lexical_decisions:
- source_word: מֵרֹב
  chosen: Because of the multitude of
  alternatives:
  - From the abundance of
  - Because of the many
  lexicon: HALOT
  rationale: 'The preposition מִן with רֹב here expresses cause/source: the cries
    arise because of the abundance or multitude of something. ''Because of the multitude
    of'' is natural English while preserving the causal force.'
- source_word: עֲשׁוּקִים
  chosen: oppressions
  alternatives:
  - oppressed acts
  - extortions
  lexicon: HALOT
  rationale: The passive participial/plural form from עשק denotes acts or instances
    of oppression in context, not primarily the oppressed persons themselves. 'Oppressions'
    best fits the construction with מֵרֹב and explains why the following verbs are
    plural and indefinite.
- source_word: יַזְעִיקוּ
  chosen: they cry out
  alternatives:
  - they cry aloud
  - they cause a cry
  lexicon: HALOT
  rationale: Hiphil of זעק commonly means to cry out or raise an outcry. 'They cry
    out' is idiomatic and preserves the distress signal without overcomplicating the
    causative nuance.
- source_word: יְשַׁוְּעוּ
  chosen: they call for help
  alternatives:
  - they cry for help
  - they implore
  lexicon: HALOT
  rationale: The verb שוע in Piel conveys a plea for aid. Using 'call for help' distinguishes
    it slightly from the previous 'cry out' while preserving the parallelism.
- source_word: מִזְּרֹעַ
  chosen: because of the arm of
  alternatives:
  - from the arm of
  - because of the power of
  lexicon: HALOT
  rationale: זְרוֹעַ literally means 'arm' and often metaphorically denotes strength
    or power. Retaining 'arm' preserves the Hebrew image; the preposition again is
    causal/source-like, hence 'because of' rather than a strictly spatial 'from'.
- source_word: רַבִּים
  chosen: the mighty
  alternatives:
  - the great
  - the many
  - great men
  lexicon: HALOT
  rationale: In this context רַבִּים refers not to a numerical many but to powerful
    people, those whose 'arm' oppresses. 'The mighty' captures the social-power sense
    and fits the verse's concern with oppression.
