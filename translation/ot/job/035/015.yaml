id: JOB.35.15
reference: Job 35:15
source:
  edition: WLC
  text: וְ/עַתָּ֗ה כִּי אַ֭יִן פָּקַ֣ד אַפּ֑/וֹ וְ/לֹֽא יָדַ֖ע בַּ/פַּ֣שׁ מְאֹֽד־־׃
translation:
  text: And now, because his anger has not punished, and he does not greatly heed
    transgression,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has not visited in his anger'; the Hebrew verb can mean 'visit,' 'attend
      to,' or 'punish.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew word rendered 'transgression' is uncertain; it may also suggest
      'rebellion,' 'insolence,' or 'great offense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - So now
  - But now
  lexicon: HALOT
  rationale: Temporal-discursive transition; 'And now' preserves the connective ו
    plus the adverb עתה without overinterpreting the discourse relation.
- source_word: כִּי
  chosen: because
  alternatives:
  - that
  - for
  lexicon: HALOT
  rationale: Introduces the content/reason of Elihu's statement. 'Because' best fits
    the explanatory force in context.
- source_word: אַיִן
  chosen: not
  alternatives:
  - there is no
  - has not
  lexicon: HALOT
  rationale: Used idiomatically with the following verb to negate the action. In English
    the negation is carried naturally by 'has not' with the verb phrase.
- source_word: פָּקַד
  chosen: has brought punishment
  alternatives:
  - has visited
  - has attended to
  - has punished
  lexicon: HALOT
  rationale: פקד has a broad range including visit, attend, muster, punish. With 'his
    anger' as subject/object relation in this difficult clause, the sense of punitive
    visitation is most plausible. 'Has brought punishment' expresses the idiom in
    clear English while preserving the judicial nuance.
- source_word: אַפּוֹ
  chosen: his anger
  alternatives:
  - his nose
  - his wrath
  lexicon: HALOT
  rationale: אַף literally means 'nose' but commonly denotes anger/wrath. 'Anger'
    is the most natural modern English rendering here.
- source_word: וְלֹא יָדַע
  chosen: and he does not take notice
  alternatives:
  - and he does not know
  - and he has not known
  - and he does not recognize
  lexicon: HALOT
  rationale: ידע can mean experiential knowledge or acknowledgment. In this context,
    with בּפשׁ מאד following, the sense is not mere cognition but paying heed/notice.
- source_word: בַּפַּשׁ
  chosen: of transgression
  alternatives:
  - of rebellion
  - of offense
  - of abundance
  lexicon: HALOT
  rationale: The noun is difficult and rare in this form; many understand it as a
    term for transgression/insolence. Rendering it as 'transgression' fits the judicial
    context and the common sense of the verse in Job's argument. Because of the lexical
    uncertainty, an alternative is preserved in a footnote.
- source_word: מְאֹד
  chosen: much
  alternatives:
  - greatly
  - exceedingly
  - very
  lexicon: HALOT
  rationale: Adverb intensifying the verb phrase. 'Much' works idiomatically with
    'take notice' in English.
