theological_decisions:
- issue: Referent of שָׁוְא in Elihu's statement
  chosen_reading: An empty, futile, or insincere plea is not heard by God
  alternative_readings:
  - God does not hear 'falsehood' in the abstract
  - God does not hear 'vanity' meaning proud talk
  rationale: The verse concerns the kind of cry God refuses, not a denial of divine
    omniscience. Rendering שָׁוְא as 'emptiness' preserves the text's moral and rhetorical
    force without importing a narrower doctrinal claim about prayer beyond what the
    Hebrew states.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it'
