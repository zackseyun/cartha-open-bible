id: JOB.35.13
reference: Job 35:13
source:
  edition: WLC
  text: אַךְ שָׁ֭וְא לֹא יִשְׁמַ֥ע אֵ֑ל וְ֝/שַׁדַּ֗י לֹ֣א יְשׁוּרֶֽ/נָּה־־׀׃
translation:
  text: Surely God does not hear emptiness, and the Almighty does not regard it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vanity,' 'falsehood,' or 'worthlessness.' The Hebrew term can describe
      what is empty, futile, or deceptive.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Only
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: אַךְ here functions as an asseverative/adversative particle introducing
    Elihu's emphatic conclusion. 'Surely' captures the emphatic force in natural English
    better than a more restrictive 'only.'
- source_word: שָׁוְא
  chosen: emptiness
  alternatives:
  - vanity
  - falsehood
  - worthlessness
  - empty cry
  lexicon: HALOT
  rationale: שָׁוְא commonly denotes emptiness, vanity, or falsehood. In this context
    it refers to what is empty or futile rather than a truthful, substantive plea.
    'Emptiness' preserves the abstract noun and avoids over-interpreting it as specifically
    'falsehood' or paraphrasing it as 'an empty cry.'
- source_word: יִשְׁמַע
  chosen: does not hear
  alternatives:
  - will not hear
  - does not listen to
  lexicon: HALOT
  rationale: The imperfect expresses a general truth in context. 'Does not hear' is
    a straightforward rendering of שׁמע and fits Elihu's proverbial statement.
- source_word: אֵל
  chosen: God
  alternatives:
  - God
  - Mighty God
  lexicon: HALOT
  rationale: אֵל is a common divine title. 'God' is the standard natural English equivalent
    here; rendering it more expansively as 'Mighty God' would add emphasis not required
    by the immediate syntax.
- source_word: וְשַׁדַּי
  chosen: and the Almighty
  alternatives:
  - and Shaddai
  - and the All-Powerful
  lexicon: HALOT
  rationale: שַׁדַּי is a divine title best translated rather than transliterated
    under the project's philosophy. 'The Almighty' is the established and semantically
    appropriate rendering in Job.
- source_word: יְשׁוּרֶנָּה
  chosen: does not regard it
  alternatives:
  - does not look at it
  - does not pay attention to it
  - does not behold it
  lexicon: HALOT
  rationale: From שׁוּר, 'to look at, behold, regard.' The 3fs suffix most naturally
    refers back to the feminine/abstract sense of שָׁוְא. 'Regard it' communicates
    not merely visual perception but attentive consideration, which suits the parallel
    with 'hear.'
