id: JOB.35.6
reference: Job 35:6
source:
  edition: WLC
  text: אִם חָ֭טָאתָ מַה תִּפְעָל בּ֑/וֹ וְ/רַבּ֥וּ פְ֝שָׁעֶ֗י/ךָ מַה תַּעֲשֶׂה לּֽ/וֹ־־־־־׃
translation:
  text: If you sin[a], what do you accomplish against him? And if your transgressions are many, what do you do to him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'what do you do to him?' in the first clause as well. The Hebrew verb can mean simply 'do' or 'effect'; the translation 'accomplish against him' brings out the rhetorical sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a conditional clause. 'If' best matches the hypothetical force in Elihu's argument.
- source_word: חָטָאתָ
  chosen: you sin
  alternatives:
  - you have sinned
  lexicon: HALOT
  rationale: Qal perfect 2ms of חטא. In this rhetorical conditional, English present 'you sin' reads naturally while preserving the general condition rather than emphasizing a completed past act.
- source_word: מַה
  chosen: what
  alternatives:
  - how
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question about effect or result.
- source_word: תִּפְעָל בּוֹ
  chosen: do you accomplish against him
  alternatives:
  - do you do to him
  - do you work against him
  - what effect do you have on him
  lexicon: HALOT
  rationale: פעל commonly denotes doing, making, or effecting. With בּוֹ, the sense is what one effects with respect to or against God. 'Accomplish against him' captures the rhetorical point that human sin does not injure God in any ultimate sense.
- source_word: וְרַבּוּ
  chosen: And if ... are many
  alternatives:
  - and they are many
  - even if they multiply
  lexicon: HALOT
  rationale: The conjunction plus perfect plural verb introduces a parallel conditional clause. Rendering with 'if' in English makes the ellipsis explicit and preserves the parallelism with the first colon.
- source_word: פְשָׁעֶיךָ
  chosen: your transgressions
  alternatives:
  - your rebellions
  - your offenses
  lexicon: HALOT
  rationale: פשע denotes rebellion or transgression, often with a willful nuance. 'Transgressions' is a clear and established English equivalent that preserves moral seriousness without overparaphrase.
- source_word: מַה תַּעֲשֶׂה לּוֹ
  chosen: what do you do to him
  alternatives:
  - what can you do to him
  - what do you make happen to him
  lexicon: HALOT
  rationale: עשה with ל marks what is done to someone. The simple rendering preserves the rhetorical force; adding 'can' would slightly interpret the sense, though it is implied by context.
