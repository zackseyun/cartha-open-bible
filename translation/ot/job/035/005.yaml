id: JOB.35.5
reference: Job 35:5
source:
  edition: WLC
  text: הַבֵּ֣ט שָׁמַ֣יִם וּ/רְאֵ֑ה וְ/שׁ֥וּר שְׁ֝חָקִ֗ים גָּבְה֥וּ מִמֶּֽ/ךָּ׃
translation:
  text: Look at the heavens and see; gaze at the clouds—they are higher than you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'look upon the skies'; the Hebrew term for 'clouds' can also refer more
      broadly to the sky or lofty heights in poetic usage.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבֵּט
  chosen: Look at
  alternatives:
  - Behold
  - Look
  lexicon: HALOT
  rationale: Imperative of נבט, calling for directed visual attention. 'Look at' is
    natural modern English and preserves the command force better than the more archaic
    'behold'.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  - the skies
  lexicon: HALOT
  rationale: Hebrew plural commonly refers to the visible heavens/sky. 'The heavens'
    preserves the elevated register and plural form better than the flatter 'sky'.
- source_word: וּרְאֵה
  chosen: and see
  alternatives:
  - and observe
  - and behold
  lexicon: HALOT
  rationale: Simple imperative of ראה. 'And see' keeps the parallelism with the preceding
    imperative and avoids over-interpretation.
- source_word: וְשׁוּר
  chosen: gaze at
  alternatives:
  - look upon
  - behold
  - observe
  lexicon: HALOT
  rationale: This verb can denote looking attentively or fixedly. 'Gaze at' differentiates
    it from the previous two visual imperatives while preserving the poetic intensification.
- source_word: שְׁחָקִים
  chosen: the clouds
  alternatives:
  - the skies
  - the heights
  - the dust-clouds
  lexicon: HALOT
  rationale: In poetic usage the term commonly refers to clouds or sky-layers. 'Clouds'
    fits the parallel with 'heavens' and is the most straightforward contextual sense
    here.
- source_word: גָּבְהוּ
  chosen: they are higher
  alternatives:
  - they are high
  - they are exalted
  - they rise high
  lexicon: HALOT
  rationale: Perfect plural from גבה functioning statively/descriptively. 'They are
    higher' naturally expresses the comparison completed by the following preposition.
- source_word: מִמֶּךָּ
  chosen: than you
  alternatives:
  - above you
  - higher than you
  lexicon: HALOT
  rationale: Comparative use of מן with 2ms suffix. Rendering it with 'than you' preserves
    the explicit comparison; the full comparative sense is completed in English by
    'they are higher than you'.
