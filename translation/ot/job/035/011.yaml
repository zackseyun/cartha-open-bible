id: JOB.35.11
reference: Job 35:11
source:
  edition: WLC
  text: מַ֭לְּפֵ/נוּ מִ/בַּהֲמ֣וֹת אָ֑רֶץ וּ/מֵ/ע֖וֹף הַ/שָּׁמַ֣יִם יְחַכְּמֵֽ/נוּ׃
translation:
  text: who teaches us more than the beasts of the earth and makes us wiser than the
    birds of the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who teaches us from the beasts of the earth and makes us wise from
      the birds of the heavens.' The Hebrew preposition can also be read as indicating
      source rather than comparison.
    reason: alternative_reading
lexical_decisions:
- source_word: מַ֭לְּפֵנוּ
  chosen: teaches us
  alternatives:
  - instructs us
  - trains us
  lexicon: HALOT
  rationale: From למד in the Piel participle with 1cp suffix, denoting active instruction.
    'Teaches us' is natural modern English and fits the parallel with 'makes us wiser.'
- source_word: מִבַּהֲמוֹת אָרֶץ
  chosen: more than the beasts of the earth
  alternatives:
  - from the beasts of the earth
  - beyond the animals of the land
  lexicon: HALOT
  rationale: The prefixed מ can be read comparatively in this poetic context, especially
    in parallel with the following clause. The sense is that God gives humans instruction/wisdom
    surpassing that of animals, not that he teaches by means of animals. 'Beasts of
    the earth' preserves the concrete imagery and register of the Hebrew.
- source_word: וּמֵעוֹף הַשָּׁמַיִם
  chosen: than the birds of the heavens
  alternatives:
  - than the birds of the sky
  - from the birds of the heavens
  lexicon: HALOT
  rationale: Parallel comparative use of מן/מֵ with the previous phrase. 'Birds of
    the heavens' is a fairly literal rendering of עוֹף הַשָּׁמַיִם; 'heavens' is retained
    rather than 'sky' to preserve the Hebrew expression and its elevated poetic tone.
- source_word: יְחַכְּמֵנוּ
  chosen: makes us wiser
  alternatives:
  - gives us wisdom
  - makes us wise
  lexicon: HALOT
  rationale: From חכם in the Piel imperfect with 1cp suffix, causative/intensive in
    sense. Because the clause is comparative, 'makes us wiser' brings out the comparison
    explicitly in idiomatic English.
