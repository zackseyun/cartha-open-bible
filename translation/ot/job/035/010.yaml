id: JOB.35.10
reference: Job 35:10
source:
  edition: WLC
  text: וְֽ/לֹא אָמַ֗ר אַ֭יֵּה אֱל֣וֹהַּ עֹשָׂ֑/י נֹתֵ֖ן זְמִר֣וֹת בַּ/לָּֽיְלָה־׃
translation:
  text: But no one says, ‘Where is God my Maker, who gives songs in the night?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'my makers' (plural form), a plural used here for the one God; hence
      'my Maker.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  chosen: But no one
  alternatives:
  - and not
  - but not
  lexicon: HALOT
  rationale: The conjunction plus negation introduces a contrast with the preceding
    context. English idiom requires supplying an indefinite subject with the verb
    'said'; 'But no one' captures the adversative force and the implied subject naturally.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: 'Although morphologically perfect, in context it expresses a general
    present/habitual sense: people do not say/ask this. Present tense is more natural
    in English for Elihu''s general observation.'
- source_word: אַיֵּה
  chosen: Where is
  alternatives:
  - Where
  lexicon: HALOT
  rationale: Interrogative of location/existence. 'Where is' is the natural English
    equivalent in direct speech.
- source_word: אֱלוֹהַּ
  chosen: God
  alternatives:
  - Godward deity term
  - God
  lexicon: HALOT
  rationale: Standard singular divine title in Job. 'God' is the plain and natural
    rendering.
- source_word: עֹשָׂי
  chosen: my Maker
  alternatives:
  - my makers
  - the one who made me
  lexicon: HALOT
  rationale: The form is morphologically plural with 1cs suffix, but in reference
    to God functions as an honorific/plural-of-majesty or abstract plural. Singular
    'my Maker' best reflects the referent and idiomatic English. The alternative 'my
    makers' is preserved in a footnote because the Hebrew form is formally plural.
- source_word: נֹתֵן
  chosen: who gives
  alternatives:
  - giving
  - the one who gives
  lexicon: HALOT
  rationale: Participle describing God characteristically. Relative clause 'who gives'
    is clear modern English.
- source_word: זְמִרוֹת
  chosen: songs
  alternatives:
  - songs of praise
  - melodies
  lexicon: HALOT
  rationale: The noun denotes songs, often with praise implied by context. Here 'songs'
    is sufficiently broad and avoids importing an explicitly liturgical nuance not
    demanded by the word alone.
- source_word: בַּלָּיְלָה
  chosen: in the night
  alternatives:
  - at night
  - during the night
  lexicon: HALOT
  rationale: The phrase is idiomatic and evocative in English. 'In the night' preserves
    the poetic tone better than the flatter 'at night'.
