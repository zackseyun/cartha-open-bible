theological_decisions:
- issue: Number of עֹשָׂי in reference to God
  chosen_reading: 'singular sense: ''my Maker'''
  alternative_readings:
  - 'formal plural: ''my makers'''
  rationale: Though the Hebrew form is plural, the referent is the singular God. Rendering
    it as singular avoids misleading the reader into polytheism while preserving the
    formal plural in a footnote for auditability. This preserves the source sense
    without importing doctrinal confusion.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it only where ambiguity is genuine'
