id: JOB.35.8
reference: Job 35:8
source:
  edition: WLC
  text: לְ/אִישׁ כָּמ֥וֹ/ךָ רִשְׁעֶ֑/ךָ וּ/לְ/בֶן אָ֝דָ֗ם צִדְקָתֶֽ/ךָ־־׃
translation:
  text: Your wickedness affects a man like yourself, and your righteousness a son
    of man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a human being.' Hebrew 'a son of man,' a common idiom here for a mortal
      person, not a messianic title.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאִישׁ
  chosen: affects a man
  alternatives:
  - is for a man
  - concerns a man
  lexicon: HALOT
  rationale: The preposition לְ with אִישׁ here marks the person to whom the effect
    extends in the elliptical clause from the context (vv. 6–7). English needs an
    implied verb; 'affects' captures Elihu's point that human conduct impacts other
    humans rather than God directly.
- source_word: כָּמוֹךָ
  chosen: like yourself
  alternatives:
  - like you
  lexicon: HALOT
  rationale: 'The comparison is explicit: the man in view is one comparable to Job,
    i.e., another human being. ''Like yourself'' is idiomatic and preserves the reflexive
    force in English.'
- source_word: רִשְׁעֶךָ
  chosen: your wickedness
  alternatives:
  - your evil
  - your wrongdoing
  lexicon: HALOT
  rationale: רֶשַׁע commonly denotes wickedness or guilt in a moral sense. 'Wickedness'
    best matches the ethical register of the verse.
- source_word: וּלְבֶן אָדָם
  chosen: and ... a son of man
  alternatives:
  - and ... a human being
  - and ... the son of man
  lexicon: HALOT
  rationale: בֶּן אָדָם here is an idiom for a human being, parallel to אִישׁ. Following
    the project's gender-accurate policy, 'son of man' is retained because the Hebrew
    is masculine singular and representative, not a messianic title in this context.
- source_word: צִדְקָתֶךָ
  chosen: your righteousness
  alternatives:
  - your justice
  - your right conduct
  lexicon: HALOT
  rationale: The noun denotes righteousness/right conduct here in parallel with 'your
    wickedness.' 'Righteousness' is the most direct and contextually fitting rendering.
