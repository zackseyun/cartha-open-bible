theological_decisions:
- issue: Meaning of בֶּן אָדָם in context
  chosen_reading: generic human being, rendered formally as 'a son of man'
  alternative_readings:
  - a human being
  - the Son of Man
  rationale: In Job this expression is a common poetic term for a human being and
    is parallel to 'a man like yourself.' It does not function as a messianic title
    here. A more idiomatic rendering ('human being') is possible, but the main text
    preserves the Hebrew imagery while avoiding christological overreading.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; preserve
    theological tension rather than resolve it'
