theological_decisions:
- issue: Interpretive force of Elihu's quotation
  chosen_reading: Elihu quotes Job as asking what personal advantage righteousness brings, contrasted with sin.
  alternative_readings:
  - Elihu quotes Job as asking what advantage God receives from Job's righteousness.
  - Elihu quotes Job as asking what profit Job has more than if he had sinned.
  rationale: The pronoun in לָךְ is 2fs, which in context most naturally addresses Job's 'righteousness' from the previous verse or functions as part of Elihu's paraphrase of Job's claim. The verse is terse and elliptical. The translation preserves the ambiguity by not over-specifying the referent beyond 'to you,' while the second clause keeps the personal-profit focus explicit.
  doctrine_reference: Preserve theological tension rather than resolve it.
