id: JOB.35.3
reference: Job 35:3
source:
  edition: WLC
  text: כִּֽי תֹ֭אמַר מַה יִּסְכָּן לָ֑/ךְ מָֽה אֹ֝עִ֗יל מֵֽ/חַטָּאתִֽ/י־־־־׃
translation:
  text: For you say[a], ‘What advantage is it to you? What profit do I have from my sin?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “What advantage do you have? What profit do I have more than from my sin?” The Hebrew is terse and may imply a comparison between being righteous and sinning.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - That
  lexicon: HALOT
  rationale: Introduces Elihu's explanation of Job's claim; 'For' fits the argumentative flow into the quotation.
- source_word: תֹאמַר
  chosen: you say
  alternatives:
  - you are saying
  - you would say
  lexicon: HALOT
  rationale: Qal imperfect 2ms, addressed to Job; simple present in English works naturally in reported accusation.
- source_word: מַה
  chosen: What
  alternatives:
  - How
  - Why
  lexicon: HALOT
  rationale: Interrogative pronoun introducing the first rhetorical question.
- source_word: יִסְכָּן לָךְ
  chosen: is it to you
  alternatives:
  - does it benefit you
  - is it advantageous for you
  lexicon: HALOT
  rationale: The verb סכן in this stem conveys being of use/benefit. Because the next clause uses a clearer profit term, this clause is rendered idiomatically as 'What advantage is it to you?' to preserve the parallel without awkward repetition.
- source_word: מָה
  chosen: What
  alternatives:
  - How much
  - Why
  lexicon: HALOT
  rationale: Second interrogative, parallel to the first.
- source_word: אֹעִיל
  chosen: profit do I have
  alternatives:
  - do I gain
  - am I benefited
  lexicon: HALOT
  rationale: 'Hiphil of יעל commonly means ''to profit, benefit.'' First person singular requires an English expression with explicit subject: ''do I have profit'' smoothed to ''profit do I have.'''
- source_word: מֵחַטָּאתִי
  chosen: from my sin
  alternatives:
  - more than from my sin
  - apart from my sin
  - from my sinning
  lexicon: HALOT
  rationale: מן marks source/comparison. The plain sense can be rendered 'from my sin.' In context, Elihu is paraphrasing Job's complaint about the practical advantage of righteousness versus sin, so a comparative nuance is possible, but the Hebrew here does not explicitly repeat 'than,' and the more literal 'from my sin' keeps the wording auditable.
