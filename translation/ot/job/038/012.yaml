id: JOB.38.12
reference: Job 38:12
source:
  edition: WLC
  text: הְֽ֭/מִ/יָּמֶי/ךָ צִוִּ֣יתָ בֹּ֑קֶר ידעתה שחר מְקֹמֽ/וֹ׃
translation:
  text: Have you[a], in your days, commanded the morning[b], and caused the dawn to know its place?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'caused the dawn to know its place.' The Hebrew verb is causative.
    reason: lexical_alternative
  - marker: b
    text: '''From your days'' is a Hebrew idiom meaning ''at any time in your lifetime'' or ''ever since your days began.'''
    reason: cultural_note
lexical_decisions:
- source_word: הֲמִיָּמֶיךָ
  chosen: from your days
  alternatives:
  - since your days began
  - in your lifetime
  - ever since your days
  lexicon: HALOT
  rationale: The interrogative with מן + 'your days' asks whether at any point in the span of Job's life he has done this. 'From your days' is slightly formal but preserves the Hebrew idiom better than the flatter 'in your lifetime.'
- source_word: צִוִּיתָ
  chosen: commanded
  alternatives:
  - given orders to
  - appointed
  lexicon: HALOT
  rationale: צוה commonly means 'command, give an order.' 'Commanded' fits the divine challenge and keeps the force of authoritative speech over creation.
- source_word: בֹּקֶר
  chosen: the morning
  alternatives:
  - morning
  lexicon: HALOT
  rationale: 'Definite English idiom suits the poetic personification: God asks whether Job has ever commanded ''the morning'' as a cosmic reality.'
- source_word: יָדַעְתָּה
  chosen: made ... know
  alternatives:
  - caused ... to know
  - shown
  lexicon: HALOT
  rationale: The Hiphil of ידע is causative, not merely cognitive intransitive. Rendering it 'made the dawn know' preserves the causative sense and the personification of dawn as receiving instruction.
- source_word: שַׁחַר
  chosen: the dawn
  alternatives:
  - daybreak
  - the dawn light
  lexicon: HALOT
  rationale: שחר refers to dawn/daybreak. 'The dawn' is natural English and preserves the poetic parallel with 'the morning' while distinguishing the two terms.
- source_word: מְקוֹמוֹ
  chosen: its place
  alternatives:
  - its appointed place
  - its station
  lexicon: HALOT
  rationale: מקום means 'place.' 'Its place' is the plain sense; 'appointed place' is interpretive and therefore left as an alternative rather than placed in the main text.
