id: JOB.38.5
reference: Job 38:5
source:
  edition: WLC
  text: מִי שָׂ֣ם מְ֭מַדֶּי/הָ כִּ֣י תֵדָ֑ע א֤וֹ מִֽי נָטָ֖ה עָלֶ֣י/הָ קָּֽו־־׃
translation:
  text: Who set its measurements[a], if you know, or who stretched a line upon it?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a measuring line.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who
  lexicon: HALOT
  rationale: Interrogative pronoun introducing the divine rhetorical question.
- source_word: שָׂם
  chosen: set
  alternatives:
  - fixed
  - appointed
  lexicon: HALOT
  rationale: Qal perfect of שׂים commonly means 'set, place, fix.' 'Set' is natural English and fits the context of establishing the earth's dimensions.
- source_word: מְמַדֶּיהָ
  chosen: its measurements
  alternatives:
  - its dimensions
  - its measures
  lexicon: HALOT
  rationale: Plural construct with 3fs suffix referring to the earth in context. 'Measurements' best conveys quantified extent in an architectural image.
- source_word: כִּי תֵדָע
  chosen: surely you know
  alternatives:
  - for you know
  - since you know
  lexicon: HALOT
  rationale: In this sarcastic rhetorical context, כִּי is best taken as introducing an ironic assumption rather than a straightforward causal clause. 'Surely you know' captures the force in idiomatic English.
- source_word: אוֹ
  chosen: or
  lexicon: HALOT
  rationale: Simple disjunctive conjunction linking the parallel question.
- source_word: נָטָה
  chosen: stretched
  alternatives:
  - extended
  - spread out
  lexicon: HALOT
  rationale: In construction imagery, נָטָה with קו refers to stretching out a measuring line. 'Stretched' is the most idiomatic rendering.
- source_word: עָלֶיהָ
  chosen: upon it
  alternatives:
  - over it
  - across it
  lexicon: HALOT
  rationale: Preposition על with the earth as antecedent. 'Upon it' preserves the spatial image without over-specifying direction.
- source_word: קָּו
  chosen: a line
  alternatives:
  - a measuring line
  - a cord
  lexicon: HALOT
  rationale: The term denotes a measuring line/cord in building contexts. Main text uses the concise 'line' for readability, while the more explicit alternative is preserved in a footnote.
