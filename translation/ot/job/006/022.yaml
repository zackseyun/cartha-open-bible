id: JOB.6.22
reference: Job 6:22
source:
  edition: WLC
  text: הֲֽ/כִי אָ֭מַרְתִּי הָ֣בוּ לִ֑/י וּ֝/מִ/כֹּחֲ/כֶ֗ם שִׁחֲד֥וּ בַעֲדִֽ/י־׃
translation:
  text: Have I ever said[a], ‘Give to me,’ or, ‘From your strength[b], pay a bribe on my behalf’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “From your resources, bribe for me.” The Hebrew כֹּחַ literally means “strength,” but here likely refers to one’s means or wealth.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered “pay a bribe” is related to the noun for “bribe/gift.” Some understand it more generally as providing a payment or inducement on Job’s behalf.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲכִי
  chosen: Have I ever
  alternatives:
  - Did I
  - Is it that I
  lexicon: HALOT
  rationale: Introduces a rhetorical question with emphatic force. In context Job is denying that he made such demands of his friends; 'Have I ever' brings out the rebuttal naturally in English while preserving the interrogative sense.
- source_word: אָמַרְתִּי
  chosen: said
  alternatives:
  - spoken
  - asked
  lexicon: HALOT
  rationale: The verb is the common 'say.' Although the sense is that of making a request, 'said' stays closer to the Hebrew and lets the quoted imperatives carry the force of the request.
- source_word: הָבוּ לִי
  chosen: Give to me
  alternatives:
  - Give me
  - Provide for me
  lexicon: HALOT
  rationale: Imperative plural plus indirect object. 'Give to me' is slightly more formal and transparent to the Hebrew wording; English punctuation then presents it as quoted speech. 'Give me' would also be acceptable but is less formally aligned.
- source_word: וּמִכֹּחֲכֶם
  chosen: From your wealth
  alternatives:
  - From your strength
  - From your resources
  - Out of your substance
  lexicon: HALOT
  rationale: כֹּחַ literally means 'strength/power,' but in this context with a demand for payment it idiomatically refers to means, resources, or wealth. 'From your wealth' best fits the economic context and avoids an awkwardly literal 'from your strength.'
- source_word: שִׁחֲדוּ
  chosen: pay a bribe
  alternatives:
  - bribe
  - give a gift
  - make a payment
  lexicon: HALOT
  rationale: The verb derives from שֹׁחַד, 'bribe.' Here Job denies asking them to expend their own resources to secure his cause. 'Pay a bribe' makes the transactional sense explicit in idiomatic English. Because 'bribe' can sound morally charged, the wording preserves the lexical force rather than softening it to 'gift.'
- source_word: בַעֲדִי
  chosen: on my behalf
  alternatives:
  - for me
  - for my sake
  lexicon: HALOT
  rationale: The preposition בעד commonly means 'for, on behalf of.' 'On my behalf' clearly expresses representation or advocacy in this context.
