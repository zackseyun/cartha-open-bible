id: JOB.24.4
reference: Job 24:4
source:
  edition: WLC
  text: יַטּ֣וּ אֶבְיוֹנִ֣ים מִ/דָּ֑רֶךְ יַ֥חַד חֻ֝בְּא֗וּ עֲנִיֵּי אָֽרֶץ־׃
translation:
  text: They turn the needy off the road[b][a]; together the poor of the land hide themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They turn the needy from the way.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the poor of the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַטּוּ
  chosen: force ... off
  alternatives:
  - turn aside
  - push aside
  - drive away
  lexicon: HALOT
  rationale: Hiphil of נטה commonly means 'cause to turn aside' or 'turn away.' In this context of oppression, 'force ... off' makes the causative sense explicit and reads naturally in English without over-paraphrasing.
- source_word: אֶבְיוֹנִים
  chosen: the needy
  alternatives:
  - the poor
  - the destitute
  lexicon: HALOT
  rationale: אביון denotes the needy or poor in a vulnerable social sense. 'The needy' distinguishes it slightly from the later עניי while preserving overlap.
- source_word: מִדָּרֶךְ
  chosen: off the road
  alternatives:
  - from the way
  - from the path
  lexicon: HALOT
  rationale: דרך literally means 'way/road/path.' 'Off the road' best conveys the preposition מן with the verb 'turn aside' in idiomatic English and fits the image of being displaced from public passage.
- source_word: יַחַד
  chosen: together
  alternatives:
  - altogether
  - as one
  lexicon: HALOT
  rationale: The adverb marks collective action or condition. 'Together' is the most straightforward rendering and naturally modifies the following clause.
- source_word: חֻבְּאוּ
  chosen: hide themselves
  alternatives:
  - are hidden
  - have been hidden
  lexicon: HALOT
  rationale: Pual of חבא can be rendered either statively ('are hidden') or reflexively in English ('hide themselves'). Given the context of the poor withdrawing under pressure, 'hide themselves' communicates the result in idiomatic English while preserving the passive nuance.
- source_word: עֲנִיֵּי אָרֶץ
  chosen: the poor of the land
  alternatives:
  - the afflicted of the land
  - the poor of the earth
  lexicon: HALOT
  rationale: עני often denotes the poor, afflicted, or oppressed. 'The poor of the land' is clear and natural; 'land' is preferable to 'earth' here because the verse depicts a social landscape within a human community.
