id: JOB.18.9
reference: Job 18:9
source:
  edition: WLC
  text: יֹאחֵ֣ז בְּ/עָקֵ֣ב פָּ֑ח יַחֲזֵ֖ק עָלָ֣י/ו צַמִּֽים׃
translation:
  text: A trap seizes him by the heel[a]; a snare holds him fast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A trap catches him at the heel; a noose grips him.' The final noun is rare and may denote a specific kind of snare or noose.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹאחֵז
  chosen: seizes
  alternatives:
  - grasps
  - catches
  lexicon: HALOT
  rationale: Qal imperfect 3ms of אחז, denoting taking hold of or seizing. 'Seizes' is vivid and natural in English, fitting the trap imagery.
- source_word: בְּעָקֵב
  chosen: by the heel
  alternatives:
  - at the heel
  - on the heel
  lexicon: HALOT
  rationale: עָקֵב means 'heel.' With ב, the sense is instrument/location in the trapping image. 'By the heel' best conveys that the victim is caught at the heel.
- source_word: פָּח
  chosen: trap
  alternatives:
  - snare
  - net
  lexicon: HALOT
  rationale: פָּח commonly denotes a trap or snare, especially in poetic danger imagery. 'Trap' is chosen here to distinguish it from the following noun and to keep the parallelism clear in English.
- source_word: יַחֲזֵק
  chosen: holds fast
  alternatives:
  - overpowers
  - grasps firmly
  - takes hold of
  lexicon: HALOT
  rationale: Hiphil imperfect of חזק here carries the sense of taking firm hold or holding securely. 'Holds fast' preserves the force and the poetic parallel with the first colon.
- source_word: עָלָיו
  chosen: to him
  alternatives:
  - upon him
  - against him
  lexicon: HALOT
  rationale: The preposition על with pronominal suffix after חזק can indicate hostile or controlling action directed toward the person. 'To him' yields idiomatic English with 'holds fast,' while preserving the object relation.
- source_word: צַמִּים
  chosen: snare
  alternatives:
  - noose
  - trap
  lexicon: HALOT
  rationale: A rare noun in this context, understood as a kind of snare or noose. 'Snare' is a broadly accepted rendering and works well in parallel with פָּח without collapsing the two terms into identical English.
