id: JOB.18.11
reference: Job 18:11
source:
  edition: WLC
  text: סָ֭בִיב בִּֽעֲתֻ֣/הוּ בַלָּה֑וֹת וֶ/הֱפִיצֻ֥/הוּ לְ/רַגְלָֽי/ו׃
translation:
  text: Terrors frighten him on every side[a], and scatter him at his feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at his heels.' The Hebrew is literally 'at his feet,' which may describe terrors driving him along wherever he steps.
    reason: lexical_alternative
lexical_decisions:
- source_word: סָבִיב
  chosen: on every side
  alternatives:
  - all around
  - round about
  lexicon: HALOT
  rationale: Adverbial noun indicating surrounding from all directions. 'On every side' is idiomatic modern English and preserves the image of encirclement.
- source_word: בִּעֲתֻהוּ
  chosen: frighten him
  alternatives:
  - terrify him
  - startle him
  lexicon: HALOT
  rationale: From בעת, to terrify or suddenly alarm. 'Frighten him' fits the poetic parallelism with 'terrors' while avoiding an overly wooden repetition such as 'terrors terrify him.'
- source_word: בַלָּהוֹת
  chosen: Terrors
  alternatives:
  - horrors
  - dreadful things
  lexicon: HALOT
  rationale: Plural noun denoting terrors or sudden alarms. Capitalization is not theological but stylistic at line opening. 'Terrors' is the most direct and conventional rendering in wisdom poetry.
- source_word: וֶהֱפִיצֻהוּ
  chosen: and scatter him
  alternatives:
  - and drive him away
  - and disperse him
  lexicon: HALOT
  rationale: From פוץ/פוץ-related causative sense, to scatter or disperse. Here it describes the effect of the terrors on the wicked man. 'Scatter him' preserves the vivid image without overinterpreting the mechanism.
- source_word: לְרַגְלָיו
  chosen: at his feet
  alternatives:
  - at his heels
  - toward his feet
  - wherever he steps
  lexicon: HALOT
  rationale: Literally 'to/at his feet.' In context it likely conveys that the terrors hound or drive him at every step. 'At his feet' keeps the Hebrew image more closely than the interpretive 'at his heels,' while remaining intelligible.
