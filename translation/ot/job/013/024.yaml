theological_decisions:
- issue: Anthropomorphic language for God in 'hide your face'
  chosen_reading: Retain the anthropomorphic expression 'hide your face' in the main
    text.
  alternative_readings:
  - withdraw your presence
  - turn away from me
  rationale: The Hebrew uses the concrete idiom of God's 'face,' a common biblical
    expression for presence or favor. Preserving it maintains the poetic and theological
    texture without over-interpreting the metaphor.
  doctrine_reference: Translation philosophy §§1, 3, 6
