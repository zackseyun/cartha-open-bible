id: JOB.13.24
reference: Job 13:24
source:
  edition: WLC
  text: לָֽ/מָּה פָנֶ֥י/ךָ תַסְתִּ֑יר וְ/תַחְשְׁבֵ֖/נִי לְ/אוֹיֵ֣ב לָֽ/ךְ־׃
translation:
  text: Why do you hide your face and count me as your enemy?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'consider me an enemy to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative of reason; 'Why' is the natural modern English equivalent.
- source_word: פָנֶיךָ
  chosen: your face
  alternatives:
  - your presence
  lexicon: HALOT
  rationale: Literally 'your face.' In Hebrew this can metonymically imply presence
    or favor, but the concrete expression is idiomatic and clear in English, so it
    is retained.
- source_word: תַסְתִּיר
  chosen: do you hide
  alternatives:
  - do you conceal
  lexicon: HALOT
  rationale: Hiphil of סתר, 'hide/conceal.' 'Hide' is more natural and preserves the
    relational force of God hiding his face.
- source_word: וְתַחְשְׁבֵנִי
  chosen: and count me
  alternatives:
  - and consider me
  - and reckon me
  lexicon: HALOT
  rationale: חשב commonly means think, account, reckon. 'Count me' fits the following
    predicate construction and remains idiomatic.
- source_word: לְאוֹיֵב
  chosen: as your enemy
  alternatives:
  - for an enemy
  - as an enemy to you
  lexicon: HALOT
  rationale: The preposition ל marks the predicative complement after 'count.' 'As
    your enemy' expresses the sense clearly in English and incorporates the following
    לָךְ.
- source_word: לָךְ
  chosen: your
  alternatives:
  - to you
  lexicon: HALOT
  rationale: 'Though formally ''to/for you,'' in English the sense is possessive or
    relational in this construction: Job asks why God regards him as God''s own enemy.
    Rendering it within ''your enemy'' is idiomatic and faithful.'
