id: JOB.13.25
reference: Job 13:25
source:
  edition: WLC
  text: הֶ/עָלֶ֣ה נִדָּ֣ף תַּעֲר֑וֹץ וְ/אֶת קַ֖שׁ יָבֵ֣שׁ תִּרְדֹּֽף־׃
translation:
  text: Will you terrify a windblown leaf, and pursue dry chaff?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'frighten' for 'terrify'; the Hebrew verb can denote causing fear or
      dread, and in context may also suggest harsh treatment.
    reason: lexical_alternative
  - marker: b
    text: '''Chaff'' may also be rendered ''stubble'' or ''straw.'' The Hebrew denotes
      dry plant refuse, emphasizing weakness and worthlessness in the comparison.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶעָלֶה
  chosen: a ... leaf
  alternatives:
  - leafage
  - foliage
  lexicon: HALOT
  rationale: עלה commonly means 'leaf' here in the singular collective/image sense.
    English idiom prefers 'a ... leaf' in this rhetorical question.
- source_word: נִדָּף
  chosen: windblown
  alternatives:
  - driven away
  - blown about
  - scattered
  lexicon: HALOT
  rationale: From נדף, conveying something driven/blown by the wind. 'Windblown' is
    vivid, natural English and preserves the image of frailty better than the more
    abstract 'driven away'.
- source_word: תַּעֲרֹוץ
  chosen: terrify
  alternatives:
  - frighten
  - harass
  - treat violently
  lexicon: HALOT
  rationale: ערץ can denote causing dread/terror. In context Job asks whether God
    would aggressively intimidate something as weak as a windblown leaf. 'Terrify'
    preserves the force of the verb in a rhetorical lament.
- source_word: וְאֶת
  chosen: and
  alternatives:
  - and also
  lexicon: HALOT
  rationale: The conjunction plus object marker introduces the second parallel image.
    English does not represent the object marker directly, so 'and' is sufficient.
- source_word: קַשׁ
  chosen: chaff
  alternatives:
  - stubble
  - straw
  lexicon: HALOT
  rationale: קשׁ often denotes straw/stubble, but in poetic parallel with a windblown
    leaf and with 'dry,' 'chaff' best conveys light, worthless material easily driven
    and pursued.
- source_word: יָבֵשׁ
  chosen: dry
  alternatives:
  - dried-up
  - withered
  lexicon: HALOT
  rationale: The adjective straightforwardly describes the chaff as dry, intensifying
    its fragility.
- source_word: תִּרְדֹּף
  chosen: pursue
  alternatives:
  - chase
  - hunt down
  lexicon: HALOT
  rationale: רדף commonly means 'pursue/chase.' 'Pursue' fits the elevated poetic
    register and parallels the first colon's aggressive action.
