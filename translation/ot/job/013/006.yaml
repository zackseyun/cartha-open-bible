id: JOB.13.6
reference: Job 13:6
source:
  edition: WLC
  text: שִׁמְעוּ נָ֥א תוֹכַחְתִּ֑/י וְ/רִב֖וֹת שְׂפָתַ֣/י הַקְשִֽׁיבוּ־׃
translation:
  text: Please hear my argument, and listen to the pleadings of my lips.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my reproof' for 'my argument'; the Hebrew term can denote correction,
      rebuke, or a reasoned case.
    reason: lexical_alternative
  - marker: b
    text: Or 'the disputes/contentions of my lips'; the Hebrew expression carries
      a forensic sense of verbal contention or pleading.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: hear
  alternatives:
  - listen to
  lexicon: HALOT
  rationale: Imperative plural from שׁמע, calling Job's hearers to attend. 'Hear'
    fits the parallelism with the second colon's stronger 'listen to' and preserves
    the direct summons.
- source_word: נָא
  chosen: please
  alternatives:
  - now
  - I pray
  lexicon: HALOT
  rationale: 'Particle of entreaty softening the imperative. In contemporary English,
    its force is naturally conveyed by ''please.'' It is placed at the front of the
    clause in English style: ''Please hear...''.'
- source_word: תוֹכַחְתִּי
  chosen: my argument
  alternatives:
  - my reproof
  - my case
  - my reasoning
  lexicon: HALOT
  rationale: From תוכחת, which can denote reproof, argument, or reasoning/proof. In
    Job's forensic context, 'my argument' best captures his presented case without
    narrowing it to moral rebuke alone.
- source_word: וְרִבוֹת
  chosen: and the pleadings
  alternatives:
  - and the disputes
  - and the contentions
  - and the arguments
  lexicon: HALOT
  rationale: From ריב/ריבות, often associated with dispute, contention, or legal pleading.
    Here, paired with 'my lips,' it refers to the contentions/pleas Job is voicing;
    'pleadings' brings out the forensic nuance in idiomatic English.
- source_word: שְׂפָתַי
  chosen: of my lips
  alternatives:
  - from my lips
  - that my lips make
  lexicon: HALOT
  rationale: Literally 'my lips.' The construct relation with ריבות is preserved with
    'of my lips,' maintaining the Hebrew imagery rather than flattening it to merely
    'my words.'
- source_word: הַקְשִׁיבוּ
  chosen: listen to
  alternatives:
  - give ear to
  - pay attention to
  lexicon: HALOT
  rationale: Imperative plural from קשׁב, often meaning to pay close attention. 'Listen
    to' is natural modern English and slightly more intensive than the first colon's
    'hear,' preserving the poetic parallelism.
