theological_decisions:
- issue: Referent of the pronoun in לְפָנָיו
  chosen_reading: him, referring to God
  alternative_readings:
  - him, referring more generally to the one before whom Job appears
  rationale: In context Job is speaking of vindication in relation to God, and the statement about the godless not coming before 'him' most naturally refers to God. This reading preserves the theological force without over-expanding the text.
  doctrine_reference: Preserve theological tension rather than resolve it; here the context sufficiently supports the divine referent.
- issue: Sense of יְשׁוּעָה in Job's claim
  chosen_reading: salvation in the sense of deliverance/vindication
  alternative_readings:
  - deliverance
  - vindication
  rationale: The verse concerns Job's confidence that his case before God will result in favorable outcome. 'Salvation' is retained in the main text for lexical fidelity and gravity, while the broader sense of vindication is acknowledged as part of its semantic range.
