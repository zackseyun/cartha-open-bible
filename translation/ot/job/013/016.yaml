id: JOB.13.16
reference: Job 13:16
source:
  edition: WLC
  text: גַּם הוּא לִ֥/י לִֽ/ישׁוּעָ֑ה כִּי לֹ֥א לְ֝/פָנָ֗י/ו חָנֵ֥ף יָבֽוֹא־־־׃
translation:
  text: This also will be my salvation[b][a], for no godless man may come before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliverance' or 'vindication' for 'salvation.'
    reason: lexical_alternative
  - marker: b
    text: '''Godless man'' may also be rendered ''hypocrite'' or ''impious man''; the Hebrew refers to one who is irreverent before God, not merely insincere.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: also
  alternatives:
  - indeed
  - even
  lexicon: HALOT
  rationale: Marks addition/emphasis; 'also' preserves the connective force naturally in English.
- source_word: הוּא
  chosen: this
  alternatives:
  - he
  - it
  lexicon: HALOT
  rationale: Although formally 'he,' in this idiom it points to the preceding situation or claim; English 'this' best captures the demonstrative sense in context.
- source_word: לִי
  chosen: my
  alternatives:
  - for me
  - to me
  lexicon: HALOT
  rationale: 'With לישועה the sense is possession/benefit: ''will be my salvation'' is idiomatic and faithful.'
- source_word: לִישׁוּעָה
  chosen: salvation
  alternatives:
  - deliverance
  - victory
  lexicon: HALOT
  rationale: The noun can denote deliverance broadly; 'salvation' fits the solemn register and traditional sense here, while still allowing forensic/vindicatory overtones in Job's speech.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the previous statement; 'for' preserves the explanatory relation concisely.
- source_word: לֹא
  chosen: 'no'
  alternatives:
  - not
  lexicon: HALOT
  rationale: Combined with the following clause, English reads most naturally as 'no ... may come' rather than a more wooden 'not ... will come.'
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - into his presence
  - before his face
  lexicon: HALOT
  rationale: Standard idiom for appearing in someone's presence; 'before him' is clear and sufficiently formal.
- source_word: חָנֵף
  chosen: godless man
  alternatives:
  - hypocrite
  - profane man
  - impious man
  lexicon: HALOT
  rationale: The Hebrew denotes an irreverent or impious person, not merely someone insincere. 'Godless man' best conveys the moral-religious sense. 'Man' preserves the masculine singular form.
- source_word: יָבֹוא
  chosen: may come
  alternatives:
  - comes
  - will come
  - can come
  lexicon: HALOT
  rationale: In this gnomic/assertive context, 'may come' expresses admissibility or possibility before God/presence, fitting the logic that the godless are not admitted before him.
