id: JOB.13.5
reference: Job 13:5
source:
  edition: WLC
  text: מִֽי יִ֭תֵּן הַחֲרֵ֣שׁ תַּחֲרִישׁ֑וּ/ן וּ/תְהִ֖י לָ/כֶ֣ם לְ/חָכְמָֽה־׃
translation:
  text: If only you would keep silent, and it would be wisdom for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Oh that you would be utterly silent, and it would be wisdom for you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי יִתֵּן
  chosen: If only
  alternatives:
  - Oh that
  - Would that
  lexicon: HALOT
  rationale: The idiom מִי יִתֵּן expresses a wish or longing, not a literal question
    ('who will give'). 'If only' is natural modern English that preserves the optative
    force.
- source_word: הַחֲרֵשׁ תַּחֲרִישׁוּן
  chosen: you would keep completely silent
  alternatives:
  - you would be utterly silent
  - you would surely keep silent
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb from חרשׁ intensifies the action.
    'Keep completely silent' captures both the verbal idea and the emphatic construction
    in readable English.
- source_word: וּתְהִי
  chosen: and it would count as
  alternatives:
  - and it would be
  - and that would become
  lexicon: HALOT
  rationale: 'The feminine singular verb likely takes the preceding silence/situation
    as its subject in an impersonal sense. Rendering it as ''it would count as'' brings
    out the idiomatic sense in English: their silence would amount to wisdom.'
- source_word: לָכֶם
  chosen: for you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: The preposition ל here marks relation or advantage. 'For you' is the
    most natural English expression in this evaluative statement.
- source_word: לְחָכְמָה
  chosen: wisdom
  alternatives:
  - a mark of wisdom
  - wise conduct
  lexicon: HALOT
  rationale: The noun חָכְמָה is straightforwardly 'wisdom.' The prefixed ל is reflected
    in the idiomatic phrase 'count as wisdom,' avoiding an overly wooden 'be to you
    for wisdom' while preserving the sense.
