id: JOB.13.20
reference: Job 13:20
source:
  edition: WLC
  text: אַךְ שְׁ֭תַּיִם אַל תַּ֣עַשׂ עִמָּדִ֑/י אָ֥ז מִ֝/פָּנֶ֗י/ךָ לֹ֣א אֶסָּתֵֽר־־׃
translation:
  text: 'Only do not do two things to me; then I will not hide myself from your face:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will not hide from your presence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: Only
  alternatives:
  - Surely
  - But
  - Only this
  lexicon: HALOT
  rationale: Here אַךְ introduces a limitation or exception to Job's plea rather than
    simple affirmation. 'Only' best captures the restrictive force in natural English.
- source_word: שְׁתַּיִם
  chosen: two things
  alternatives:
  - two
  lexicon: HALOT
  rationale: The Hebrew gives the feminine numeral 'two' without an explicit noun;
    English idiom naturally supplies 'things' to make the sense clear.
- source_word: אַל תַּעַשׂ עִמָּדִי
  chosen: do not do ... to me
  alternatives:
  - do not deal with me in
  - do not do ... with me
  lexicon: HALOT
  rationale: עשה with עִם can mean 'do/deal with.' In this context, where Job is about
    to specify two actions God should refrain from, 'do ... to me' is the clearest
    and most idiomatic rendering.
- source_word: אָז
  chosen: then
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: אָז marks the consequence if God grants the request. 'Then' expresses
    the conditional-result relationship succinctly.
- source_word: מִפָּנֶיךָ
  chosen: from your face
  alternatives:
  - from before you
  - from your presence
  lexicon: HALOT
  rationale: The idiom literally refers to the face/presence of the addressee. 'From
    your face' preserves the vivid Hebrew imagery, while remaining understandable
    in context.
- source_word: לֹא אֶסָּתֵר
  chosen: I will not hide myself
  alternatives:
  - I will not conceal myself
  - I will not be hidden
  lexicon: HALOT
  rationale: 'The Niphal of סתר here is best taken reflexively/intransitively in context:
    Job says he will not shrink back or hide himself before God if these two things
    are withheld.'
