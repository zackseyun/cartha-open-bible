theological_decisions:
- issue: Rendering the idiom נשׂא פנים
  chosen_reading: show partiality
  alternative_readings:
  - show favoritism
  - accept persons
  rationale: The Hebrew idiom refers to biased favor, especially in judgment. 'Show
    partiality' is clear modern English and fits the context of Job accusing his friends
    of biased advocacy for God. No doctrinal controversy is at stake, but the idiom
    has ethical and judicial force that should be preserved.
  doctrine_reference: Translation philosophy §6; §5
