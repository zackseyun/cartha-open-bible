id: JOB.13.10
reference: Job 13:10
source:
  edition: WLC
  text: הוֹכֵ֣חַ יוֹכִ֣יחַ אֶתְ/כֶ֑ם אִם בַּ֝/סֵּ֗תֶר פָּנִ֥ים תִּשָּׂאֽוּ/ן־׃
translation:
  text: He will surely rebuke you if in secret you show partiality.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'lift up faces,' a Hebrew idiom meaning to show favoritism or
      partiality.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹכֵחַ יוֹכִיחַ
  chosen: will surely rebuke
  alternatives:
  - will certainly reprove
  - will indeed correct
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb of יכח intensifies the verbal
    idea, so English should reflect emphasis with 'surely.' In context, Job warns
    his friends of divine censure, making 'rebuke' more natural than the milder 'correct,'
    while still preserving the forensic/reproving sense of the Hebrew.
- source_word: אֶתְכֶם
  chosen: you
  rationale: Second person masculine plural object, referring to Job's friends collectively.
    English 'you' adequately represents the plural without awkwardness.
- source_word: אִם
  chosen: if
  alternatives:
  - when
  lexicon: HALOT
  rationale: 'Conditional ''if'' fits the warning structure: God will rebuke them
    if they act in the described way. ''When'' would overstate the condition as assumed
    fact.'
- source_word: בַּסֵּתֶר
  chosen: in secret
  alternatives:
  - secretly
  - in hiding
  lexicon: HALOT
  rationale: The noun סתר with preposition conveys concealed or hidden action. 'In
    secret' is idiomatic and preserves the adverbial force without overinterpreting.
- source_word: פָּנִים
  chosen: partiality
  alternatives:
  - favoritism
  - regard for persons
  - faces
  lexicon: HALOT
  rationale: In the idiom נשׂא פנים, literally 'lift up faces,' פנים functions within
    a fixed expression meaning to show favoritism or partiality. Translating the idiom
    rather than the individual noun yields the plain sense in English.
- source_word: תִּשָּׂאוּן
  chosen: you show
  alternatives:
  - you lift up
  - you are partial to
  lexicon: HALOT
  rationale: With פנים this verb forms the idiom 'show partiality.' Rendering the
    idiom as a whole communicates the sense clearly. The plural matches Job's addressees.
