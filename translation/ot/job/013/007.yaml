id: JOB.13.7
reference: Job 13:7
source:
  edition: WLC
  text: הַ֭/לְ/אֵל תְּדַבְּר֣וּ עַוְלָ֑ה וְ֝/ל֗/וֹ תְּֽדַבְּר֥וּ רְמִיָּֽה׃
translation:
  text: Will you speak injustice for God, and speak deceit for him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on God's behalf' / 'to God' in the first clause, and similarly 'on his
      behalf' / 'to him' in the second clause. The Hebrew preposition can be understood
      in more than one way, though the context favors speaking in God's defense.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלְאֵל
  chosen: for God
  alternatives:
  - to God
  - on God's behalf
  lexicon: HALOT
  rationale: The preposition ל with אֵל can indicate advantage, reference, or representation.
    In this rebuke, Job challenges his friends for speaking wrongly in defense of
    God, so 'for God' best captures the sense of speaking on behalf of or in favor
    of God. 'To God' is less likely in context, and 'on God's behalf' is interpretively
    fuller than the Hebrew wording.
- source_word: תְּדַבְּרוּ
  chosen: will you speak
  alternatives:
  - do you speak
  lexicon: HALOT
  rationale: The imperfect in an interrogative rebuke is naturally rendered in English
    as 'will you speak,' expressing challenge and moral confrontation. This preserves
    the rhetorical force without over-paraphrasing.
- source_word: עַוְלָה
  chosen: injustice
  alternatives:
  - wrong
  - unrighteousness
  - falsehood
  lexicon: HALOT
  rationale: עַוְלָה denotes injustice, wrong, or unrighteousness. 'Injustice' preserves
    the ethical and judicial weight of the noun better than the flatter 'wrong.' 'Falsehood'
    is possible in context but overlaps too much with the following term for deceit.
- source_word: וְלוֹ
  chosen: for him
  alternatives:
  - to him
  - on his behalf
  lexicon: HALOT
  rationale: The pronoun refers back to God. As in the first colon, ל conveys speaking
    in favor of or for someone. 'For him' keeps the parallelism with 'for God' while
    preserving the Hebrew terseness.
- source_word: רְמִיָּה
  chosen: deceit
  alternatives:
  - lies
  - treachery
  - fraud
  lexicon: HALOT
  rationale: רְמִיָּה commonly denotes deceit or treachery. 'Deceit' fits the abstract
    noun form and pairs well with 'speak.' 'Lies' is possible but more concrete and
    narrower than the Hebrew.
