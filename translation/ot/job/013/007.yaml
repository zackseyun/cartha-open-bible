theological_decisions:
- issue: Whether Job's accusation should be framed as his friends speaking in defense
    of God or merely speaking to God
  chosen_reading: Job rebukes them for speaking unjustly in God's defense
  alternative_readings:
  - Job rebukes them for speaking injustice to God
  rationale: The immediate context (Job 13:4, 8) concerns the friends acting as defenders
    or partial advocates for God. Rendering ל as 'for' reflects that contextual sense
    and avoids flattening Job's charge into mere address toward God.
  doctrine_reference: Translation philosophy §1, §3
