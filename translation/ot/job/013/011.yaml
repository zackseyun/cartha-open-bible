id: JOB.13.11
reference: Job 13:11
source:
  edition: WLC
  text: הֲ/לֹ֣א שְׂ֭אֵת/וֹ תְּבַעֵ֣ת אֶתְ/כֶ֑ם וּ֝/פַחְדּ֗/וֹ יִפֹּ֥ל עֲלֵי/כֶֽם׃
translation:
  text: Will not his majesty terrify you, and his dread fall upon you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his exaltation' for 'his majesty.' The Hebrew term can denote elevation,
      dignity, or exalted status.
    reason: lexical_alternative
  - marker: b
    text: Or 'the fear of him fall upon you.' The phrase 'his dread' may be understood
      as the dread he inspires.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Will not
  alternatives:
  - Does not
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Will
    not' preserves the interrogative force naturally in English.
- source_word: שְׂאֵתוֹ
  chosen: his majesty
  alternatives:
  - his exaltation
  - his dignity
  - his lifting up
  lexicon: HALOT
  rationale: The noun from נשׂא can denote exaltation, elevation, or dignity/majesty.
    In context, Job speaks of God's overwhelming greatness as a cause of fear; 'his
    majesty' communicates that elevated status idiomatically and fits the parallel
    with 'his dread.'
- source_word: תְּבַעֵת
  chosen: terrify
  alternatives:
  - frighten
  - dismay
  lexicon: HALOT
  rationale: The verb בעת in the Piel conveys causing terror or sudden dread. 'Terrify'
    best matches the intensity of the Hebrew and the solemn tone.
- source_word: אֶתְכֶם
  chosen: you
  rationale: Direct object pronoun, second person masculine plural; English 'you'
    is the natural equivalent.
- source_word: וּפַחְדּוֹ
  chosen: his dread
  alternatives:
  - his fear
  - the fear of him
  - his terror
  lexicon: HALOT
  rationale: The noun פחד can mean fear, dread, or terror. 'His dread' preserves the
    possessive structure and parallels 'his majesty' without overinterpreting whether
    the sense is subjective or objective.
- source_word: יִפֹּל עֲלֵיכֶם
  chosen: fall upon you
  alternatives:
  - come upon you
  - fall on you
  lexicon: HALOT
  rationale: A common Hebrew idiom for something overwhelming descending upon someone.
    'Fall upon you' is clear, vivid, and close to the source imagery.
