id: JOB.13.13
reference: Job 13:13
source:
  edition: WLC
  text: הַחֲרִ֣ישׁוּ מִ֭מֶּ/נִּי וַ/אֲדַבְּרָה אָ֑נִי וְ/יַעֲבֹ֖ר עָלַ֣/י מָֽה־׃
translation:
  text: Be silent before me, and let me speak; then let come upon me what may.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Be silent from me, and I will speak; and let whatever
      may pass over me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֲרִישׁוּ
  chosen: Be silent
  alternatives:
  - Keep silent
  - Be quiet
  lexicon: HALOT
  rationale: Hiphil imperative plural from חרשׁ in the sense of becoming silent or
    keeping quiet. 'Be silent' is concise, natural English, and preserves the force
    of Job's command.
- source_word: מִמֶּנִּי
  chosen: before me
  alternatives:
  - from me
  - away from me
  lexicon: HALOT
  rationale: Literally 'from me,' but in this idiom with החרישׁוּ it means to cease
    speaking in relation to Job—effectively, to be silent in his presence / toward
    him. 'Before me' communicates the relational force in idiomatic English better
    than the wooden 'from me.'
- source_word: וַאֲדַבְּרָה
  chosen: and let me speak
  alternatives:
  - that I may speak
  - then I will speak
  lexicon: HALOT
  rationale: Cohortative first person singular expressing volition or resolve. 'Let
    me speak' captures the cohortative nuance naturally in English.
- source_word: אָנִי
  chosen: me
  alternatives:
  - I
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis to the speaker. English can reflect
    this adequately within 'let me speak' without an awkward explicit 'I' after the
    verb.
- source_word: וְיַעֲבֹר
  chosen: then let come
  alternatives:
  - and let pass
  - and let happen
  - and let come to pass
  lexicon: HALOT
  rationale: עבר literally means 'pass over' or 'pass on,' but with עָלַי it idiomatically
    conveys something coming upon someone. 'Then let come' preserves the jussive sense
    and reads naturally.
- source_word: עָלַי
  chosen: upon me
  alternatives:
  - over me
  - on me
  lexicon: HALOT
  rationale: With עבר, עַל marks what comes upon Job. 'Upon me' preserves the elevated
    but still readable tone suitable to the verse.
- source_word: מָה
  chosen: what may
  alternatives:
  - whatever
  - what
  lexicon: HALOT
  rationale: 'Here מָה is indefinite: ''whatever [it may be].'' The idiom ''what may''
    in ''let come upon me what may'' captures both the indefiniteness and Job''s resignation.'
