id: JOB.13.9
reference: Job 13:9
source:
  edition: WLC
  text: הֲ֭/טוֹב כִּֽי יַחְקֹ֣ר אֶתְ/כֶ֑ם אִם כְּ/הָתֵ֥ל בֶּ֝/אֱנ֗וֹשׁ תְּהָתֵ֥לּוּ בֽ/וֹ־־׃
translation:
  text: Will it be good when he examines you? Or will you mock him as one mocks a man?[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deceive him' / 'trifle with him'; the Hebrew verb can denote mocking, deceiving, or making sport of someone.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a man'; that is, a mere human being, in contrast to God.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲטוֹב
  chosen: Will it be good
  alternatives:
  - Would it be good
  - Is it good
  lexicon: HALOT
  rationale: The interrogative הֲ with טוֹב forms a rhetorical question. 'Will it be good' captures the forward-looking force in context, where Job warns of the outcome when God investigates them.
- source_word: כִּי
  chosen: when
  alternatives:
  - that
  - if
  lexicon: HALOT
  rationale: 'Here כִּי introduces the circumstance under which the evaluation is made: ''when he examines you.'' ''When'' fits the temporal sense better than a causal or declarative rendering.'
- source_word: יַחְקֹר
  chosen: he examines
  alternatives:
  - he searches out
  - he investigates
  lexicon: HALOT
  rationale: The verb חקר conveys searching, examining, or investigating thoroughly. 'Examines' is natural modern English and preserves the sense of scrutiny.
- source_word: אֶתְכֶם
  chosen: you
  rationale: Direct-object marker plus second masculine plural suffix; rendered simply as plural 'you' in English.
- source_word: אִם
  chosen: Or
  alternatives:
  - if
  lexicon: HALOT
  rationale: In this parallel rhetorical question, אִם introduces the second alternative. English idiom prefers 'Or' to mark the contrast between the two questions.
- source_word: כְּהָתֵל
  chosen: as one mocks
  alternatives:
  - as with mockery
  - as one deceives
  lexicon: HALOT
  rationale: The infinitive construct of התל with prefixed כ compares their treatment of God to the way a human is treated. The verb can carry the sense of mocking or deceiving; in this context of irreverent, evasive treatment before divine scrutiny, 'mock' best fits the rhetorical force.
- source_word: בֶּאֱנוֹשׁ
  chosen: a man
  alternatives:
  - a mortal
  - a human being
  lexicon: HALOT
  rationale: אֱנוֹשׁ often emphasizes frail humanity or mortality. 'A man' is concise and idiomatic here, while still contrasting human beings with God. 'A mortal' is possible but sounds less natural in this line.
- source_word: תְּהָתֵלּוּ בוֹ
  chosen: will you mock him
  alternatives:
  - will you deceive him
  - will you trifle with him
  lexicon: HALOT
  rationale: The Hiphil imperfect second masculine plural with בּוֹ indicates what they are doing toward God. The semantic range includes mock, deceive, or toy with. 'Mock him' aligns with the comparison clause and conveys the insolent treatment Job condemns.
