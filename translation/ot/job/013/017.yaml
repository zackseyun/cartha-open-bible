id: JOB.13.17
reference: Job 13:17
source:
  edition: WLC
  text: שִׁמְע֣וּ שָׁ֭מוֹעַ מִלָּתִ֑/י וְ֝/אַֽחֲוָתִ֗/י בְּ/אָזְנֵי/כֶֽם׃
translation:
  text: Listen carefully to my word, and let my declaration be in your ears.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my utterance' / 'my explanation' for 'my declaration.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ שָׁמוֹעַ
  chosen: Listen carefully
  alternatives:
  - Hear, hearing
  - Surely hear
  - Listen intently
  lexicon: HALOT
  rationale: The finite verb plus infinitive absolute of שׁמע intensifies the command.
    In idiomatic English, 'listen carefully' or 'listen intently' best conveys the
    emphatic force without wooden repetition. 'Hear, hearing' is too literal for natural
    English.
- source_word: מִלָּתִי
  chosen: my word
  alternatives:
  - my speech
  - what I say
  lexicon: HALOT
  rationale: מִלָּה commonly means 'word' or 'speech.' Singular 'my word' preserves
    the Hebrew form and fits the solemn appeal. 'My speech' is possible, but 'my word'
    is slightly more direct and compact.
- source_word: וַאֲחֲוָתִי
  chosen: my declaration
  alternatives:
  - my utterance
  - my explanation
  - what I declare
  lexicon: HALOT
  rationale: The noun from חוה in this context refers to what is declared or set forth.
    'My declaration' captures the formal, deliberate sense of Job's statement. 'My
    explanation' is possible but slightly more interpretive; 'utterance' is accurate
    but less natural in contemporary English.
- source_word: בְּאָזְנֵיכֶם
  chosen: in your ears
  alternatives:
  - to your ears
  - in your hearing
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'in your ears.' Retaining it preserves
    the vividness and solemnity of the appeal while remaining understandable in English.
    'In your hearing' is smoother but less concrete.
