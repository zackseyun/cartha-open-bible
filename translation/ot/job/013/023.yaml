id: JOB.13.23
reference: Job 13:23
source:
  edition: WLC
  text: כַּ/מָּ֣ה לִ֭/י עֲוֺנ֣וֹת וְ/חַטָּא֑וֹת פִּֽשְׁעִ֥/י וְ֝/חַטָּאתִ֗/י הֹדִיעֵֽ/נִי׃
translation:
  text: How many are my iniquities and sins? Make my transgression and my sin known
    to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'How great are my iniquities and sins?' The Hebrew interrogative can
      ask about extent as well as number, though the main text preserves the more
      direct quantitative sense.
    reason: lexical_alternative
  - marker: b
    text: '''Transgression'' renders פֶּשַׁע, which can also carry the sense of ''rebellion.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּמָּה לִי
  chosen: How many are my
  alternatives:
  - How many do I have
  - How great are my
  lexicon: HALOT
  rationale: The interrogative with לִי idiomatically asks quantity/extent. 'How many
    are my' preserves the directness of Job's question and fits the following plural
    nouns better than a more paraphrastic 'How many do I have.' 'How great are my'
    is possible in some contexts but here the paired plural nouns favor numerical/quantitative
    force.
- source_word: עֲוֺנוֹת
  chosen: iniquities
  alternatives:
  - guilt
  - wrongdoings
  lexicon: HALOT
  rationale: עָוֹן often carries the sense of guilt/iniquity rather than a generic
    mistake. 'Iniquities' preserves the moral weight and distinguishes it from the
    following חַטָּאוֹת. 'Guilt' is semantically possible but less natural in the
    plural here.
- source_word: וְחַטָּאוֹת
  chosen: sins
  alternatives:
  - offenses
  lexicon: HALOT
  rationale: A straightforward rendering of חַטָּאת in the plural. 'Sins' is clear
    modern English and preserves the semantic distinction from עֲוֺנוֹת without unnecessary
    jargon.
- source_word: פִּשְׁעִי
  chosen: my transgression
  alternatives:
  - my rebellion
  - my offense
  lexicon: HALOT
  rationale: פֶּשַׁע commonly denotes transgression, often with a willful or rebellious
    nuance. 'My transgression' is the most standard and suitably weighty rendering;
    'my rebellion' sharpens the nuance but risks over-specifying beyond what the immediate
    context requires.
- source_word: וְחַטָּאתִי
  chosen: my sin
  alternatives:
  - my offense
  lexicon: HALOT
  rationale: Singular חַטָּאת with 1cs suffix is best rendered simply as 'my sin.'
    Keeping 'sin' here maintains lexical transparency and mirrors the Hebrew pairing
    with פִּשְׁעִי.
- source_word: הֹדִיעֵנִי
  chosen: Make ... known to me
  alternatives:
  - show me
  - inform me of
  lexicon: HALOT
  rationale: Hiphil of ידע means to cause to know, make known, inform. 'Make ... known
    to me' closely reflects the causative force while remaining natural English. 'Show
    me' is possible but slightly less explicit semantically.
