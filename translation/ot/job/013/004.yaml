id: JOB.13.4
reference: Job 13:4
source:
  edition: WLC
  text: וְֽ/אוּלָ֗ם אַתֶּ֥ם טֹֽפְלֵי שָׁ֑קֶר רֹפְאֵ֖י אֱלִ֣ל כֻּלְּ/כֶֽם־׃
translation:
  text: But you are plasterers of lies[b][a]; all of you are worthless physicians.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'smearers of falsehood' or 'forgers of lies.' The Hebrew verb behind 'plasterers' evokes spreading or coating over, likely preserving the metaphor of covering reality with falsehood.
    reason: lexical_alternative
  - marker: b
    text: Or 'physicians of no value.' The Hebrew expression describes them as useless healers; 'idol-physicians' is a less likely alternative based on another sense of the noun.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאוּלָם
  chosen: But
  alternatives:
  - Yet
  - However
  lexicon: HALOT
  rationale: Adversative discourse marker introducing sharp contrast with the preceding context; 'But' is natural modern English and preserves the force.
- source_word: אַתֶּם
  chosen: you
  lexicon: HALOT
  rationale: Second person masculine plural pronoun addressed directly to Job's friends; English 'you' adequately conveys the plural in context.
- source_word: טֹפְלֵי
  chosen: plasterers of
  alternatives:
  - smearers of
  - forgers of
  lexicon: HALOT
  rationale: 'From טפל in the sense of smearing/plastering over. In this context the image is metaphorical: they cover over reality with falsehood. ''Plasterers of'' preserves the concrete metaphor better than the more interpretive ''forgers of.'''
- source_word: שָׁקֶר
  chosen: lies
  alternatives:
  - falsehood
  - deception
  lexicon: HALOT
  rationale: Plural 'lies' is idiomatic in English after 'plasterers of' and conveys the substance they spread. Hebrew singular can function collectively.
- source_word: רֹפְאֵי
  chosen: physicians
  alternatives:
  - healers
  - doctors
  lexicon: HALOT
  rationale: Keeps the participial noun image and matches the metaphor of failed counselors. 'Physicians' is slightly more elevated and suits Job's rhetoric.
- source_word: אֱלִל
  chosen: worthless
  alternatives:
  - of no value
  - vain
  - idol
  lexicon: HALOT
  rationale: Here אֱלִל most naturally means 'worthlessness' or 'nothingness,' describing the physicians as useless. Although the noun can mean 'idol' elsewhere, that sense is less fitting in this collocation. 'Worthless physicians' is concise and idiomatic.
- source_word: כֻּלְּכֶם
  chosen: all of you
  alternatives:
  - every one of you
  lexicon: HALOT
  rationale: Explicitly includes the totality of Job's interlocutors and preserves the emphatic closing position.
