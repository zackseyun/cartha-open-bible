id: JOB.13.12
reference: Job 13:12
source:
  edition: WLC
  text: זִֽ֭כְרֹנֵי/כֶם מִשְׁלֵי אֵ֑פֶר לְ/גַבֵּי חֹ֝֗מֶר גַּבֵּי/כֶֽם־־׃
translation:
  text: Your maxims are proverbs of ashes; your defenses are defenses of clay.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Your remembrances are proverbs of ashes; your bulwarks are bulwarks
      of clay.' The Hebrew is terse and the final phrase is difficult; 'defenses/bulwarks'
      reflects a contextual reading of the repeated noun.
    reason: alternative_reading
lexical_decisions:
- source_word: זִכְרֹנֵיכֶם
  chosen: your maxims
  alternatives:
  - your remembrances
  - your memorial sayings
  lexicon: HALOT
  rationale: Although the noun from זכר commonly relates to remembrance or memorial,
    in this context with the following predicate phrase it refers to what Job's friends
    put forward as memorable sayings or authoritative dicta. 'Maxims' captures the
    sense of remembered wisdom-statements in idiomatic English better than the more
    literal but less natural 'remembrances.'
- source_word: מִשְׁלֵי
  chosen: proverbs of
  alternatives:
  - like
  - parables of
  - bywords of
  lexicon: HALOT
  rationale: מָשָׁל often denotes a proverb, saying, or comparison. In construct with
    אֵפֶר, 'proverbs of ashes' preserves the terse metaphor and the wisdom-literature
    flavor. A simple 'like ashes' would flatten the nominal construction.
- source_word: אֵפֶר
  chosen: ashes
  alternatives:
  - dust
  lexicon: HALOT
  rationale: The ordinary sense is 'ashes.' This fits the image of worthlessness and
    fragility in Job's rebuke. 'Dust' is possible as a looser image but is not the
    lexical default here.
- source_word: לְגַבֵּי
  chosen: are
  alternatives:
  - for
  - as for
  lexicon: HALOT
  rationale: The preposition ל with גַּב can be difficult in this compressed poetic
    line. Here it functions idiomatically in a predicative comparison/identification.
    English requires a copular rendering to make the line intelligible without over-paraphrase.
- source_word: חֹמֶר
  chosen: clay
  alternatives:
  - mortar
  - mud
  lexicon: HALOT
  rationale: חֹמֶר commonly denotes clay or mortar-like material. 'Clay' is the broad,
    natural rendering and suits the image of something earthen and weak.
- source_word: גַּבֵּיכֶם
  chosen: your defenses
  alternatives:
  - your backs
  - your bulwarks
  - your ramparts
  lexicon: HALOT
  rationale: Though גַּב literally means back or elevated surface, in this poetic
    context many understand it metaphorically of protective structures or defensive
    positions. 'Your defenses' best conveys Job's point that their arguments are flimsy.
    A literal 'your backs are backs of clay' is possible but obscure in English and
    less likely in context.
