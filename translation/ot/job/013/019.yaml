id: JOB.13.19
reference: Job 13:19
source:
  edition: WLC
  text: מִי ה֭וּא יָרִ֣יב עִמָּדִ֑/י כִּֽי עַתָּ֖ה אַחֲרִ֣ישׁ וְ/אֶגְוָֽע־־׃
translation:
  text: Who is it that will contend with me? For then I would be silent and die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For now I would be silent and die.' The Hebrew adverb often means 'now,'
      but here many understand it in the sense 'then' within Job's argument.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי הוּא
  chosen: Who is it
  alternatives:
  - Who is he
  - Who
  lexicon: HALOT
  rationale: The interrogative plus independent pronoun adds emphasis. 'Who is it'
    preserves the rhetorical force more naturally in modern English than the more
    wooden 'Who is he.'
- source_word: יָרִיב
  chosen: will contend
  alternatives:
  - will dispute
  - will argue
  - will plead a case
  lexicon: HALOT
  rationale: The verb ריב commonly carries forensic or adversarial nuance. 'Contend'
    preserves the legal-conflict sense without over-specifying courtroom procedure.
- source_word: עִמָּדִי
  chosen: with me
  alternatives:
  - against me
  lexicon: HALOT
  rationale: The preposition with this verb can imply adversarial engagement. 'With
    me' is the more direct lexical rendering; the hostile sense is already conveyed
    by 'contend.'
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - surely
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for Job's challenge. 'For' best fits
    the argumentative flow.
- source_word: עַתָּה
  chosen: then
  alternatives:
  - now
  - at this time
  lexicon: HALOT
  rationale: 'Although the adverb often means ''now,'' in this context it is idiomatic
    in a conditional-result sense: ''for then...'' This fits Job''s meaning better
    than a strictly temporal ''now.'''
- source_word: אַחֲרִישׁ
  chosen: I would be silent
  alternatives:
  - I would keep silent
  - I would be quiet
  lexicon: HALOT
  rationale: The Hiphil of חרש here means to be silent or keep quiet. 'I would be
    silent' is idiomatic and preserves the first-person volitional/result nuance in
    context.
- source_word: וְאֶגְוָע
  chosen: and die
  alternatives:
  - and expire
  - and breathe my last
  lexicon: HALOT
  rationale: גוע often denotes expiring or dying. 'Die' is clear, natural English
    and retains the stark force of Job's statement.
