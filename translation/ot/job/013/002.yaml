id: JOB.13.2
reference: Job 13:2
source:
  edition: WLC
  text: כְּֽ֭/דַעְתְּ/כֶם יָדַ֣עְתִּי גַם אָ֑נִי לֹא נֹפֵ֖ל אָנֹכִ֣י מִ/כֶּֽם־־׃
translation:
  text: What you know[a], I also know; I am not inferior to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I do not fall short of you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּדַעְתְּכֶם
  chosen: what you know
  alternatives:
  - according to your knowledge
  - as you know
  lexicon: HALOT
  rationale: The prefixed כ plus דַּעַת with 2mp suffix yields an idiom comparing Job's knowledge with that of his friends. In English, 'what you know' communicates the sense naturally and fits the parallel with 'I also know.' 'According to your knowledge' is too wooden here.
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have known
  - I knew
  lexicon: HALOT
  rationale: 'Although formally perfect 1cs, in this comparative statement it functions as a present stative: Job claims possession of the same knowledge. English present is the most natural equivalent.'
- source_word: גַם אֲנִי
  chosen: I also
  alternatives:
  - I too
  - even I
  lexicon: HALOT
  rationale: The combination adds emphasis that Job shares in the same knowledge. 'I also' is clear modern English; 'I too' would also work but is slightly less neutral in rhythm.
- source_word: לֹא נֹפֵל אָנֹכִי מִכֶּם
  chosen: I am not inferior to you
  alternatives:
  - I do not fall short of you
  - I am not beneath you
  - I am not less than you
  lexicon: HALOT
  rationale: The participle נֹפֵל with מן expresses being lower than or falling short in comparison. In context Job denies intellectual inferiority to his friends. 'I am not inferior to you' captures the comparative force idiomatically without over-paraphrasing.
- source_word: אָנֹכִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis after the negative comparative clause. English expresses this adequately within 'I am not inferior to you' without needing separate stress marking.
