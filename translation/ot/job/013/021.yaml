id: JOB.13.21
reference: Job 13:21
source:
  edition: WLC
  text: כַּ֭פְּ/ךָ מֵ/עָלַ֣/י הַרְחַ֑ק וְ֝/אֵ֥מָתְ/ךָ֗ אַֽל תְּבַעֲתַֽ/נִּי־׃
translation:
  text: Withdraw your hand from upon me, and do not let your dread terrify me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Remove your hand from me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your terror' instead of 'your dread.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּפְּךָ
  chosen: your hand
  alternatives:
  - your palm
  lexicon: HALOT
  rationale: כַּף literally denotes the palm/hand. In this idiom of divine pressure
    or affliction, 'hand' is the natural English rendering and preserves the common
    biblical metaphor of God's hand upon someone.
- source_word: מֵעָלַי
  chosen: from upon me
  alternatives:
  - from me
  - off me
  lexicon: HALOT
  rationale: The preposition עַל with מִן yields the sense 'from upon me.' Retaining
    'upon' preserves the image of something resting heavily on Job, while remaining
    understandable in English.
- source_word: הַרְחַק
  chosen: Withdraw
  alternatives:
  - remove
  - put far away
  lexicon: HALOT
  rationale: The Hiphil imperative of רחק means to make distant/remove. 'Withdraw'
    fits the direct address to God and reads naturally with 'your hand,' while preserving
    the imperative force.
- source_word: אֵמָתְךָ
  chosen: your dread
  alternatives:
  - your terror
  - the fear of you
  lexicon: HALOT
  rationale: אֵימָה denotes dread/terror. 'Your dread' best captures the abstract
    noun with second-person suffix and avoids implying merely subjective fear in Job;
    it is the terrifying effect associated with God.
- source_word: אַל
  chosen: do not
  alternatives:
  - let not
  lexicon: HALOT
  rationale: Standard negative particle with jussive/imperfect force. 'Do not' is
    clear modern English and preserves the prohibitive sense.
- source_word: תְּבַעֲתַנִּי
  chosen: let ... terrify me
  alternatives:
  - make me tremble
  - frighten me
  lexicon: HALOT
  rationale: 'From בעת, ''to terrify, startle, dismay.'' Because the subject is feminine
    singular matching אֵמָתְךָ, English requires an explicit construction: ''do not
    let your dread terrify me.'' This preserves the Hebrew syntax and sense better
    than a looser paraphrase.'
