theological_decisions:
- issue: Anthropomorphic language for God ('your hand')
  chosen_reading: Retain the anthropomorphic expression literally as 'your hand.'
  alternative_readings:
  - your power
  - your blow
  rationale: The Hebrew text uses concrete bodily imagery for God's action. Translating
    it literally preserves the poetic force and does not over-interpret whether the
    emphasis is on power, affliction, or discipline.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
