id: JOB.13.18
reference: Job 13:18
source:
  edition: WLC
  text: הִנֵּה נָ֭א עָרַ֣כְתִּי מִשְׁפָּ֑ט יָ֝דַ֗עְתִּי כִּֽי אֲנִ֥י אֶצְדָּֽק־־׃
translation:
  text: See now, I have prepared my case; I know that I will be vindicated.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I know that I will be justified.' The Hebrew verb is forensic and can
      mean being shown to be in the right.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: See
  alternatives:
  - Behold
  - Look
  lexicon: HALOT
  rationale: Introduces emphatic attention. 'See' preserves the deictic force in readable
    modern English better than the more archaic 'Behold.'
- source_word: נָא
  chosen: now
  alternatives:
  - please
  - indeed
  lexicon: HALOT
  rationale: 'Here נָא functions as a particle adding immediacy/emphasis rather than
    politeness. ''Now'' fits the discourse force in English: ''See now.'''
- source_word: עָרַכְתִּי
  chosen: I have prepared
  alternatives:
  - I have arranged
  - I have set in order
  lexicon: HALOT
  rationale: The verb ערך commonly means to arrange or set in order. In this legal
    context, 'prepared' naturally conveys that Job has set out his argument/case.
- source_word: מִשְׁפָּט
  chosen: my case
  alternatives:
  - justice
  - judgment
  - legal case
  lexicon: HALOT
  rationale: In context Job is speaking in forensic terms about presenting his cause
    before God. 'My case' captures the legal sense idiomatically in English better
    than the abstract 'judgment' or 'justice.' The possessive is implicit from the
    first-person verb and context.
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have known
  - I am certain
  lexicon: HALOT
  rationale: The perfect expresses settled certainty. English present 'I know' best
    communicates Job's present confidence.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what Job knows, so 'that' is the most natural
    complementizer here.
- source_word: אֲנִי
  chosen: I
  lexicon: HALOT
  rationale: Explicit pronoun adds emphasis to the subject; English retains it naturally
    in 'I will be vindicated.'
- source_word: אֶצְדָּק
  chosen: will be vindicated
  alternatives:
  - will be justified
  - am in the right
  - will be proved righteous
  lexicon: HALOT
  rationale: From צדק in a forensic setting, the sense is being shown or declared
    to be in the right. 'Will be vindicated' communicates the legal outcome clearly
    in modern English without importing later doctrinal overtones that 'justified'
    may carry.
