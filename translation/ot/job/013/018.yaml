theological_decisions:
- issue: Forensic sense of Job's claim
  chosen_reading: Job asserts confidence that he will be vindicated in his legal dispute,
    not making a developed doctrinal statement about justification in the Pauline
    sense.
  alternative_readings:
  - I will be justified
  rationale: The Hebrew verb צדק can be rendered 'be justified,' but in Job's courtroom
    imagery the immediate sense is forensic vindication. 'Vindicated' preserves the
    legal force while avoiding anachronistic theological import.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    do not import doctrinal claims the text does not make.'
