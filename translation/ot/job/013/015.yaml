id: JOB.13.15
reference: Job 13:15
source:
  edition: WLC
  text: הֵ֣ן יִ֭קְטְלֵ/נִי לא אֲיַחֵ֑ל אַךְ דְּ֝רָכַ֗/י אֶל פָּנָ֥י/ו אוֹכִֽיחַ־־׃
translation:
  text: Though he slay me[a], I will not hope; yet I will argue my ways before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Traditional rendering: ''Though he slay me, yet will I hope in him.'' This reflects an alternative reading of the Hebrew.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֵן
  chosen: Though
  alternatives:
  - Behold
  - Indeed
  lexicon: HALOT
  rationale: Introduces a concessive or emphatic clause here. In context with the following verb, English 'Though' best captures the force in natural modern style.
- source_word: יִקְטְלֵנִי
  chosen: he slay me
  alternatives:
  - he kill me
  lexicon: HALOT
  rationale: From קטל, 'kill/slay.' 'Slay' preserves the elevated, grave tone of Job's speech better than the flatter 'kill.'
- source_word: לֹא אֲיַחֵל
  chosen: I will not wait
  alternatives:
  - I have no hope
  - I will not hope in him
  lexicon: HALOT
  rationale: The consonantal text reads 'not' (לֹא), yielding the sense 'I will not wait/hope.' Because יחל can mean 'wait' or 'hope,' 'wait' best fits the likely sense of refusing passive expectation while still preparing to present his case. The traditional reading 'I will hope in him' reflects a different vocalization/reading and is preserved in a footnote.
- source_word: אַךְ
  chosen: yet
  alternatives:
  - surely
  - nevertheless
  - only
  lexicon: HALOT
  rationale: Marks contrast or limitation. 'Yet' fits the adversative turn from possible death to Job's determination to speak.
- source_word: דְּרָכַי
  chosen: my ways
  alternatives:
  - my conduct
  - my case
  lexicon: HALOT
  rationale: Literally 'my ways.' It can imply conduct or course of life; 'my ways' preserves the Hebrew image while remaining understandable.
- source_word: אֶל־פָּנָיו
  chosen: before him
  alternatives:
  - to his face
  - in his presence
  lexicon: HALOT
  rationale: Literally 'to his face.' In idiomatic English, 'before him' conveys direct presentation in God's presence without awkwardness.
- source_word: אוֹכִיחַ
  chosen: I will argue
  alternatives:
  - I will prove
  - I will reprove
  - I will defend
  lexicon: HALOT
  rationale: Hiphil of יכח here carries the sense of presenting or arguing a case. 'Argue' best fits the legal/disputational context in Job.
