theological_decisions:
- issue: Whether to follow the traditional reading 'Though he slay me, yet will I hope in him' or the MT consonantal reading with negation
  chosen_reading: 'Follow the MT as written: ''Though he slay me, I will not wait'''
  alternative_readings:
  - Though he slay me, yet will I hope in him
  rationale: The Hebrew provided reads לֹא ('not'), not לוֹ ('in him/to him'). In keeping with original-language primacy over translation tradition, the main text follows the Masoretic consonantal reading. Because the traditional rendering is longstanding and interpretively significant, it is preserved in a footnote rather than adopted into the main text.
  doctrine_reference: Translation philosophy §1, §3
