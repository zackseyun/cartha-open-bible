id: JOB.13.1
reference: Job 13:1
source:
  edition: WLC
  text: הֶן כֹּ֭ל רָאֲתָ֣ה עֵינִ֑/י שָֽׁמְעָ֥ה אָ֝זְנִ֗/י וַ/תָּ֥בֶן לָֽ/הּ־׃
translation:
  text: Look, my eye has seen all this; my ear has heard and understood it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and discerned it' / 'and considered it.' The Hebrew literally continues,
      'and understood for her/itself,' an idiom expressing comprehension of what was
      heard.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  - See
  lexicon: HALOT
  rationale: Introduces emphatic attention-getting assertion. 'Look' preserves the
    deictic force in readable modern English better than the more archaic 'Behold.'
- source_word: כֹּל
  chosen: all this
  alternatives:
  - all
  - everything
  lexicon: HALOT
  rationale: Though literally 'all,' English idiom prefers an object for the following
    verbs. 'All this' captures the summative reference to the matters under discussion
    without over-paraphrasing.
- source_word: רָאֲתָה עֵינִי
  chosen: my eye has seen
  alternatives:
  - my eye saw
  - I have seen
  lexicon: HALOT
  rationale: The Hebrew uses the singular subject 'my eye,' which is retained for
    vividness. Present perfect English fits the discourse context of accumulated experience
    better than simple past.
- source_word: שָׁמְעָה אָזְנִי
  chosen: my ear has heard
  alternatives:
  - my ear heard
  - I have heard
  lexicon: HALOT
  rationale: As with 'my eye,' the singular body-part subject is preserved to reflect
    the Hebrew style and parallelism.
- source_word: וַתָּבֶן לָהּ
  chosen: and understood it
  alternatives:
  - and discerned it
  - and considered it
  - and understood for itself
  lexicon: HALOT
  rationale: From בין, 'understand/discern.' The feminine singular verb most naturally
    continues the nearest feminine subject 'my ear.' The pronominal phrase is idiomatic
    and difficult; 'understood it' gives the sense that what was heard was also comprehended.
    This is smoother in English than a hyper-literal 'understood for itself,' while
    staying within the source meaning.
