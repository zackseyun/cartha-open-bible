id: JOB.13.27
reference: Job 13:27
source:
  edition: WLC
  text: וְ/תָ֘שֵׂ֤ם בַּ/סַּ֨ד רַגְלַ֗/י וְ/תִשְׁמ֥וֹר כָּל אָרְחוֹתָ֑/י עַל שָׁרְשֵׁ֥י רַ֝גְלַ֗/י תִּתְחַקֶּֽה׀־־׃
translation:
  text: You put my feet in the stocks[a], and you watch all my paths; you mark out the soles of my feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you trace around the soles of my feet,' preserving the imagery of inscribing or marking a boundary.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּסַּד
  chosen: in the stocks
  alternatives:
  - in the block
  - in the fetter
  lexicon: HALOT
  rationale: סַד denotes a restraining device for the feet, commonly understood as stocks. 'Stocks' is idiomatic modern English and fits Job's prison imagery better than the less clear 'block.'
- source_word: וְתָשֵׂם
  chosen: you put
  alternatives:
  - you set
  - you place
  lexicon: HALOT
  rationale: שׂים is a common verb meaning 'put/set/place.' 'Put' is the most natural English choice in this context of placing feet in restraints.
- source_word: וְתִשְׁמוֹר
  chosen: you watch
  alternatives:
  - you guard
  - you keep watch over
  lexicon: HALOT
  rationale: שׁמר can mean guard, keep, observe, or watch. Here the sense is close surveillance of Job's movements, so 'watch' best captures the hostile scrutiny.
- source_word: כָּל אָרְחוֹתַי
  chosen: all my paths
  alternatives:
  - all my ways
  - all my tracks
  lexicon: HALOT
  rationale: אֹרַח often means path, way, or course of life. 'Paths' preserves the concrete metaphor while still allowing moral/existential overtones.
- source_word: עַל שָׁרְשֵׁי רַגְלַי
  chosen: the soles of my feet
  alternatives:
  - the roots of my feet
  - my footprints
  lexicon: HALOT
  rationale: Though שֹׁרֶשׁ usually means 'root,' in this idiom it refers to the extremity/base of the foot. 'Soles of my feet' gives the likely sense in clear English. 'Roots of my feet' is too opaque, while 'footprints' shifts from anatomy to trace.
- source_word: תִּתְחַקֶּה
  chosen: you mark out
  alternatives:
  - you inscribe
  - you carve a boundary around
  - you trace
  lexicon: HALOT
  rationale: The Hitpael of חקה conveys marking, inscribing, or setting a boundary. In context of surveillance and confinement, 'mark out' communicates the idea of drawing limits around Job's movement without over-specifying the image.
