id: JOB.13.26
reference: Job 13:26
source:
  edition: WLC
  text: כִּֽי תִכְתֹּ֣ב עָלַ֣/י מְרֹר֑וֹת וְ֝/תוֹרִישֵׁ֗/נִי עֲוֺנ֥וֹת נְעוּרָֽ/י־׃
translation:
  text: For you write bitter things against me and make me inherit the iniquities
    of my youth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you decree bitter things against me'; the Hebrew literally says 'you
      write bitter things against me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'make me bear the guilt' or 'the punishment' of the iniquities of my
      youth.' The Hebrew word can denote iniquity, guilt, or its consequence.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces Job's explanation of why he speaks as he does; 'for' fits
    the argumentative flow naturally in English.
- source_word: תִכְתֹּב עָלַי
  chosen: you write ... against me
  alternatives:
  - you decree against me
  - you record against me
  lexicon: HALOT
  rationale: 'כתב literally means ''write.'' In context of divine charges or decrees,
    English can imply formal accusation; ''write ... against me'' preserves the metaphor
    without over-paraphrasing to ''decree.'' The preposition עַל with 1cs is naturally
    adversative here: ''against me.'''
- source_word: מְרֹרוֹת
  chosen: bitter things
  alternatives:
  - bitternesses
  - bitter charges
  - bitter decrees
  lexicon: HALOT
  rationale: The feminine plural noun denotes bitter matters/things. 'Bitter things'
    is the most transparent rendering and leaves open whether these are accusations,
    decrees, or sufferings.
- source_word: וְתוֹרִישֵׁנִי
  chosen: and make me inherit
  alternatives:
  - and cause me to possess
  - and assign to me as an inheritance
  lexicon: HALOT
  rationale: 'Hiphil of ירשׁ is causative: ''cause to inherit/possess.'' ''Make me
    inherit'' is idiomatic and preserves the causative force.'
- source_word: עֲוֺנוֹת
  chosen: the iniquities
  alternatives:
  - the sins
  - the guilt
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or punishment for iniquity. Here Job
    speaks of being made to bear the consequences of earlier wrongdoing; 'iniquities'
    keeps the lexical connection to wrongdoing itself while allowing the implied burden
    of guilt/consequence.
- source_word: נְעוּרַי
  chosen: of my youth
  alternatives:
  - from my youth
  - of my younger years
  lexicon: HALOT
  rationale: 'Construct with 1cs suffix: ''my youth.'' The genitival phrase ''of my
    youth'' is the most direct rendering in English.'
