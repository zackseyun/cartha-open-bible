theological_decisions:
- issue: Sense of עֲוֺנוֹת in context
  chosen_reading: moral wrongs from Job's youth, with implied burden of guilt/consequence
  alternative_readings:
  - punishments for the sins of my youth
  - guilt from my youth
  rationale: The Hebrew עָוֹן can refer to sin, guilt, or punishment. The verse does
    not require narrowing it to punitive consequences alone, so the main text preserves
    the broader term 'iniquities' while allowing readers to hear the burdened sense
    in context.
  doctrine_reference: Preserve theological tension rather than resolve it.
