id: JOB.13.14
reference: Job 13:14
source:
  edition: WLC
  text: עַל מָ֤ה אֶשָּׂ֣א בְשָׂרִ֣/י בְ/שִׁנָּ֑/י וְ֝/נַפְשִׁ֗/י אָשִׂ֥ים בְּ/כַפִּֽ/י־׀׃
translation:
  text: Why should I take my flesh in my teeth and put my life in my hand?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Why should I take my flesh with my teeth?' The Hebrew expression is
      idiomatic and difficult; it conveys reckless self-endangerment.
    reason: lexical_alternative
  - marker: b
    text: Or, 'my soul.' Hebrew nephesh can mean 'life,' 'soul,' or 'self'; here 'life'
      best fits the sense of risking oneself.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל מָה
  chosen: Why should
  alternatives:
  - For what
  - Why
  lexicon: HALOT
  rationale: The idiom עַל מָה here introduces a rhetorical question of motive or
    purpose. 'Why should' gives natural English while preserving the interrogative
    force better than a wooden 'upon what' or 'for what.'
- source_word: אֶשָּׂא
  chosen: should I take
  alternatives:
  - shall I carry
  - do I lift
  lexicon: HALOT
  rationale: נשא commonly means 'lift, carry, take.' In this idiomatic context with
    'my flesh in my teeth,' 'take' is the most idiomatic English choice and fits the
    rhetorical question introduced by עַל מָה.
- source_word: בְשָׂרִי
  chosen: my flesh
  alternatives:
  - my body
  lexicon: HALOT
  rationale: בשר literally means 'flesh.' Since the context is vivid and metaphorical,
    retaining 'flesh' preserves the Hebrew imagery better than smoothing to 'body.'
    This also aligns with the project's preference to preserve concrete source-language
    wording where possible.
- source_word: בשני
  chosen: in my teeth
  alternatives:
  - with my teeth
  lexicon: HALOT
  rationale: The preposition ב is most naturally rendered 'in' here in the fixed expression.
    'In my teeth' preserves the Hebrew image and matches established English idiom
    for this difficult phrase.
- source_word: ונפשי
  chosen: my life
  alternatives:
  - my soul
  - my self
  lexicon: HALOT
  rationale: נפש can mean 'soul,' 'life,' or 'self.' In parallel with risking oneself
    and with the following idiom 'in my hand,' 'my life' best communicates the sense
    of one's life being exposed to danger. The more literal 'soul' is possible but
    less clear in contemporary English.
- source_word: אָשִׂים
  chosen: put
  alternatives:
  - set
  - place
  lexicon: HALOT
  rationale: שׂים commonly means 'put, set, place.' 'Put' is the most natural modern
    English rendering in this idiom.
- source_word: בכפי
  chosen: in my hand
  alternatives:
  - in my palm
  lexicon: HALOT
  rationale: כף is literally 'palm/hand.' In the idiom of exposing one's life to danger,
    English 'in my hand' is more idiomatic and preserves the metaphor without over-specifying
    'palm.'
