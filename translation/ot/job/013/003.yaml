theological_decisions:
- issue: Rendering of divine titles שַׁדַּי and אֵל
  chosen_reading: Translate as 'the Almighty' and 'God' rather than transliterating or harmonizing both as the same English term
  alternative_readings:
  - Shaddai ... God
  - the Almighty ... the Mighty One
  rationale: The verse uses two distinct divine designations in parallel. Translating both preserves meaning and the stylistic variation without importing additional theological claims.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
