theological_decisions:
- issue: Whether Job accuses his friends of defending God with biased advocacy
  chosen_reading: The verse is rendered as two rhetorical questions accusing the friends of showing partiality and contending for God.
  alternative_readings:
  - The first clause could be rendered more literally as 'Will you lift up his face?'
  - The second clause could be rendered 'Will you plead for God?'
  rationale: 'The immediate context (Job rebuking his friends for speaking wrongly in God''s defense) favors a forensic/ethical sense: they are not neutrally seeking truth but acting as partial advocates for God. This is an interpretive decision driven by Hebrew idiom and context, not by later doctrinal concerns.'
  doctrine_reference: Translation philosophy §§1, 3, 5
