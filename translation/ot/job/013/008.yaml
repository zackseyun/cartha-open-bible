id: JOB.13.8
reference: Job 13:8
source:
  edition: WLC
  text: הֲ/פָנָ֥י/ו תִּשָּׂא֑וּ/ן אִם לָ/אֵ֥ל תְּרִיבֽוּ/ן־׃
translation:
  text: Will you show partiality for him? Will you contend for God?[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'Will you lift up his face?'—a Hebrew idiom meaning to show partiality or favoritism.
    reason: lexical_alternative
  - marker: b
    text: Or 'Will you plead on God’s behalf?'
    reason: alternative_reading
lexical_decisions:
- source_word: הֲפָנָיו
  chosen: show partiality for him
  alternatives:
  - lift up his face
  - accept his person
  - show favoritism toward him
  lexicon: HALOT
  rationale: The idiom נָשָׂא פָּנִים/פָּנָיו literally involves 'lifting the face,' but in judicial/disputational contexts it means to show partiality or favoritism. The 3ms suffix on 'his face' is best represented idiomatically in English as 'for him' rather than a wooden literalism.
- source_word: תִּשָּׂאוּן
  chosen: will you show
  alternatives:
  - will you lift
  - will you accept
  lexicon: HALOT
  rationale: From נָשָׂא, here functioning within the idiom with פָּנִים. English must render the idiom as a whole rather than isolate the verb literally.
- source_word: אִם
  chosen: '?'
  alternatives:
  - or
  - indeed
  - whether
  lexicon: HALOT
  rationale: Here אִם introduces the second rhetorical question in parallel with the first. In smooth English, the interrogative force is best conveyed by starting a new question rather than translating אִם woodenly as 'if.' Some translations use 'or'; the sense is preserved by punctuation and parallel structure.
- source_word: לָאֵל
  chosen: for God
  alternatives:
  - for God himself
  - on God's behalf
  - for a god
  lexicon: HALOT
  rationale: אֵל here clearly refers to God, not an indefinite 'god.' The preposition ל marks advantage or behalf in the forensic setting, so 'for God' is concise and natural; 'on God's behalf' is a possible expansion but slightly more interpretive.
- source_word: תְּרִיבוּן
  chosen: will you contend
  alternatives:
  - will you plead
  - will you argue
  - will you dispute
  lexicon: HALOT
  rationale: From רִיב, often used in legal or disputational contexts. 'Contend' preserves the adversarial/legal nuance without over-specifying courtroom procedure. 'Plead' is possible, but could imply advocacy more narrowly than the Hebrew requires.
