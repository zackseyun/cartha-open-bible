id: JOB.13.28
reference: Job 13:28
source:
  edition: WLC
  text: וְ֭/הוּא כְּ/רָקָ֣ב יִבְלֶ֑ה כְּ֝/בֶ֗גֶד אֲכָ֣ל/וֹ עָֽשׁ׃
translation:
  text: while he wastes away like something rotten[a], like a garment eaten by moths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and he decays like rottenness, like a garment eaten by a moth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא
  chosen: while he
  alternatives:
  - and he
  - though he
  - as for him
  lexicon: HALOT
  rationale: The conjunction with independent pronoun resumes the subject from context and introduces the image of the sufferer. In English, 'while he' smoothly connects this verbless opening to the following predicates. 'And he' is more literal but less natural here.
- source_word: כְּרָקָב
  chosen: like something rotten
  alternatives:
  - like rottenness
  - like decay
  lexicon: HALOT
  rationale: רָקָב denotes rot, decay, or rottenness. Because the comparison is followed by a finite verb ('wastes away'), idiomatic English benefits from a concrete comparative phrase. 'Like decay' is possible, but 'like something rotten' better conveys the simile's vividness.
- source_word: יִבְלֶה
  chosen: wastes away
  alternatives:
  - wears out
  - decays
  - falls apart
  lexicon: HALOT
  rationale: בלה commonly means to wear out or waste away. In this bodily context, 'wastes away' best captures progressive deterioration without sounding mechanical like 'wears out.'
- source_word: כְּבֶגֶד
  chosen: like a garment
  alternatives:
  - like clothing
  - like a robe
  lexicon: HALOT
  rationale: בֶּגֶד is a general term for garment/clothing. 'Garment' preserves the singular and the poetic register better than the broader 'clothing.'
- source_word: אֲכָלוֹ
  chosen: eaten by
  alternatives:
  - consumed by
  - which has been eaten by
  lexicon: HALOT
  rationale: 'From אכל, the passive/resultative sense with the pronominal suffix refers to the garment as consumed. English idiom prefers an explicit passive participial phrase: ''eaten by.'''
- source_word: עָשׁ
  chosen: moths
  alternatives:
  - a moth
  lexicon: HALOT
  rationale: Though singular in Hebrew, English commonly uses the plural in this stock image ('eaten by moths') to express the class/instrument naturally. This is an optimal-equivalence adjustment for idiomatic English while preserving the sense.
