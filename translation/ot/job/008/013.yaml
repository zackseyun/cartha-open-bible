id: JOB.8.13
reference: Job 8:13
source:
  edition: WLC
  text: כֵּ֗ן אָ֭רְחוֹת כָּל שֹׁ֣כְחֵי אֵ֑ל וְ/תִקְוַ֖ת חָנֵ֣ף תֹּאבֵֽד־׃
translation:
  text: So are the paths of all who forget God[a], and the hope of the godless will perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the hypocrite.' The Hebrew term can denote an impious or irreverent person; here 'the godless' best fits the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  chosen: So
  alternatives:
  - Thus
  - Such
  lexicon: HALOT
  rationale: Introduces a comparison/conclusion from the preceding imagery. 'So' is concise, natural English and preserves the inferential force.
- source_word: אָרְחוֹת
  chosen: paths
  alternatives:
  - ways
  - courses
  lexicon: HALOT
  rationale: Plural noun meaning paths/ways. 'Paths' preserves the metaphorical image of one's course of life more concretely than 'ways.'
- source_word: שֹׁכְחֵי אֵל
  chosen: who forget God
  alternatives:
  - the forgetters of God
  - who forget El
  lexicon: HALOT
  rationale: The participial construction is best rendered idiomatically in English as a relative clause. 'God' is the natural translation of אֵל here, not a transliteration, since this is a common divine title rather than a personal name.
- source_word: תִקְוַת
  chosen: the hope of
  alternatives:
  - the expectation of
  lexicon: HALOT
  rationale: The noun commonly denotes hope or expectation. 'Hope' is the more natural and contextually fitting English term in wisdom literature.
- source_word: חָנֵף
  chosen: the godless
  alternatives:
  - the hypocrite
  - the profane
  lexicon: HALOT
  rationale: In Job, חָנֵף often denotes one who is irreverent or ungodly rather than merely insincere. 'Godless' better captures the moral-religious sense in context than the traditional 'hypocrite,' which in modern English can narrow the meaning to mere inconsistency or pretense.
- source_word: תֹּאבֵד
  chosen: will perish
  alternatives:
  - will vanish
  - will be lost
  lexicon: HALOT
  rationale: From אבד, expressing destruction/perishing. 'Will perish' is a standard, weighty rendering that fits the wisdom context and parallels the fate described in the verse.
