theological_decisions:
- issue: Rendering חָנֵף in a wisdom-judgment context
  chosen_reading: the godless
  alternative_readings:
  - the hypocrite
  rationale: The Hebrew term can be rendered 'hypocrite' in some traditional translations, but in Job it often carries the broader sense of one who is impious or godless. Using 'godless' avoids importing a narrower psychological category and better reflects the verse's moral-theological contrast with those who remember God.
