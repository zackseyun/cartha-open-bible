id: JOB.8.16
reference: Job 8:16
source:
  edition: WLC
  text: רָטֹ֣ב ה֭וּא לִ/פְנֵי שָׁ֑מֶשׁ וְ/עַ֥ל גַּ֝נָּת֗/וֹ יֹֽנַקְתּ֥/וֹ תֵצֵֽא־׃
translation:
  text: He is full of moisture before the sun, and his shoots spread out over his
    garden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his sprout comes forth over his garden.' The Hebrew singular noun for
      tender growth may be understood collectively.
    reason: lexical_alternative
  - marker: b
    text: '''Before the sun'' may mean ''in front of the sun'' or ''under the sun''s
      light,'' not necessarily ''before sunrise.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: רָטֹב
  chosen: full of moisture
  alternatives:
  - fresh
  - wet
  - lush
  lexicon: HALOT
  rationale: The adjective denotes being moist or well-watered. 'Full of moisture'
    preserves the concrete image without overinterpreting it as merely emotional freshness
    or agricultural luxuriance, though 'lush' is a plausible contextual alternative.
- source_word: הוּא
  chosen: he
  alternatives:
  - it
  lexicon: HALOT
  rationale: The masculine pronoun is retained as 'he' because the verse continues
    the personified description in Bildad's simile. Although the referent is plant-like,
    the Hebrew uses masculine personal language, and the translation preserves that
    imagery.
- source_word: לִפְנֵי שָׁמֶשׁ
  chosen: before the sun
  alternatives:
  - in the sun
  - before sunrise
  lexicon: HALOT
  rationale: Literally 'before the sun.' In context this likely means exposed to or
    in front of the sun rather than temporally 'before sunrise.' The formal wording
    is preserved because it is intelligible in English and keeps the poetic ambiguity.
- source_word: וְעַל
  chosen: and ... over
  alternatives:
  - and upon
  lexicon: HALOT
  rationale: Rendered with natural English syntax as 'and ... over' to connect the
    second colon while preserving the spatial sense of על.
- source_word: גַּנָּתוֹ
  chosen: his garden
  alternatives:
  - his garden-plot
  lexicon: HALOT
  rationale: The noun means garden, with 3ms suffix. 'His garden' is the most natural
    rendering and preserves the possessive imagery.
- source_word: יֹנַקְתּוֹ
  chosen: his shoots
  alternatives:
  - his suckers
  - his sprouts
  - his sapling-growth
  lexicon: HALOT
  rationale: From a noun for tender shoot/sprout/sucker. 'Shoots' is clear modern
    English and fits plant imagery better than the more technical or awkward 'suckers.'
- source_word: תֵצֵא
  chosen: spread out
  alternatives:
  - comes out
  - goes forth
  - springs forth
  lexicon: HALOT
  rationale: The verb is literally 'goes out/comes forth' (3fs, agreeing with the
    feminine singular collective noun 'shooting/growth'). In context, English idiom
    prefers 'spread out' for vegetation extending over a garden, while still reflecting
    outward movement.
