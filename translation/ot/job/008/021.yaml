theological_decisions:
- issue: Implied subject of the verb
  chosen_reading: The subject is rendered as 'he,' referring to God from the immediate
    context.
  alternative_readings:
  - An impersonal rendering such as 'your mouth will be filled with laughter'
  rationale: Verse 20 names God as the acting subject, and verse 21 naturally continues
    that promise. Keeping 'he' preserves the Hebrew verbal form and the theological
    point that restoration comes from God, not merely as an abstract outcome.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
