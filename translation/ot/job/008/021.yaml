id: JOB.8.21
reference: Job 8:21
source:
  edition: WLC
  text: עַד יְמַלֵּ֣ה שְׂח֣וֹק פִּ֑י/ךָ וּ/שְׂפָתֶ֥י/ךָ תְרוּעָֽה־׃
translation:
  text: He will yet fill your mouth with laughter, and your lips with shouting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until he fills your mouth with laughter, and your lips with joyful shouting.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד
  chosen: yet
  alternatives:
  - until
  - while
  - again
  lexicon: HALOT
  rationale: In context with Bildad's promise in the preceding verse, עַד introduces
    a future point not strictly temporal in English idiom. 'Yet' captures the sense
    that God will still bring this about, whereas a bare 'until' in English would
    sound incomplete without an explicit main clause.
- source_word: יְמַלֵּה
  chosen: he will fill
  alternatives:
  - he fills
  - he may fill
  lexicon: HALOT
  rationale: Piel imperfect 3ms of מלא, with God as the implied subject from the context
    (v. 20). Future English best reflects the promissory force here.
- source_word: שְׂחוֹק
  chosen: laughter
  alternatives:
  - joy
  - mocking laughter
  lexicon: HALOT
  rationale: The noun commonly denotes laughter. In this restorative context, 'laughter'
    is preferable to broader 'joy' and avoids importing the negative sense 'mocking'
    without contextual warrant.
- source_word: פִּיךָ
  chosen: your mouth
  lexicon: HALOT
  rationale: Direct, literal rendering of the noun with 2ms suffix. Retained because
    the image of the mouth being filled is idiomatic and vivid in English.
- source_word: וּשְׂפָתֶיךָ
  chosen: and your lips
  alternatives:
  - and your speech
  lexicon: HALOT
  rationale: Literal rendering preserves the parallelism with 'your mouth.' 'Speech'
    would flatten the poetic bodily imagery.
- source_word: תְרוּעָה
  chosen: shouting
  alternatives:
  - joyful shouting
  - a shout
  - jubilation
  lexicon: HALOT
  rationale: The noun can denote a loud cry, often of joy or triumph. 'Shouting' fits
    the parallel with 'laughter' and keeps the term broad enough not to over-specify
    liturgical or military nuance. 'Joyful shouting' is contextually plausible but
    slightly more interpretive than the Hebrew explicitly states.
