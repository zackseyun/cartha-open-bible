id: JOB.8.15
reference: Job 8:15
source:
  edition: WLC
  text: יִשָּׁעֵ֣ן עַל בֵּ֭ית/וֹ וְ/לֹ֣א יַעֲמֹ֑ד יַחֲזִ֥יק בּ֝֗/וֹ וְ/לֹ֣א יָקֽוּם־׃
translation:
  text: He leans on his house, but it does not stand; he grasps hold of it, but it
    does not remain standing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he relies on his house.' The Hebrew verb can denote depending on something
      for support as well as physically leaning on it.
    reason: lexical_alternative
  - marker: b
    text: The repeated image of 'stand'/'remain standing' preserves the Hebrew poetic
      parallelism; the sense is that what he depends on proves unstable.
    reason: cross_reference
lexical_decisions:
- source_word: יִשָּׁעֵן
  chosen: leans
  alternatives:
  - relies
  - supports himself
  lexicon: HALOT
  rationale: The Niphal of שׁען conveys leaning oneself upon or relying on something
    for support. 'Leans' preserves the concrete image in Bildad's plant metaphor while
    allowing the implied sense of dependence.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: Standard preposition of contact/support. 'On' is idiomatic modern English
    and fits the physical metaphor.
- source_word: בֵּיתוֹ
  chosen: his house
  alternatives:
  - his household
  - his shelter
  lexicon: HALOT
  rationale: בַּיִת ordinarily means 'house.' In context it may metaphorically denote
    what the wicked depends on, but the image should be preserved rather than interpreted
    away. 'Household' is possible but less likely in this immediate simile.
- source_word: וְלֹא יַעֲמֹד
  chosen: but it does not stand
  alternatives:
  - but it will not stand
  - and it does not stand
  lexicon: HALOT
  rationale: The verb עמד means 'stand, remain standing.' The imperfect here expresses
    the result in the poetic depiction. 'But' captures the adversative force naturally
    in English. Present tense suits the proverbial, gnomic style.
- source_word: יַחֲזִיק
  chosen: he grasps hold of
  alternatives:
  - he seizes
  - he holds fast to
  lexicon: HALOT
  rationale: The Hiphil of חזק can mean to take hold of, grasp, or hold fast. 'Grasps
    hold of' keeps the vivid physical action and avoids overinterpreting it as merely
    mental reliance.
- source_word: בּוֹ
  chosen: of it
  alternatives:
  - to it
  - on it
  lexicon: HALOT
  rationale: With חזק, the preposition marks the object grasped. English idiom after
    'grasp hold' is 'of it.'
- source_word: וְלֹא יָקוּם
  chosen: but it does not remain standing
  alternatives:
  - but it does not rise
  - but it does not endure
  - but it does not stand up
  lexicon: HALOT
  rationale: קום often means 'arise' or 'stand up,' but in parallel with עמד the sense
    is that it does not stay upright or become established. 'Remain standing' differentiates
    it slightly from the previous colon while preserving the parallel image of instability.
