id: JOB.8.17
reference: Job 8:17
source:
  edition: WLC
  text: עַל גַּ֭ל שָֽׁרָשָׁ֣י/ו יְסֻבָּ֑כוּ בֵּ֖ית אֲבָנִ֣ים יֶחֱזֶֽה־׃
translation:
  text: His roots are intertwined over a stone heap; he looks upon a house of stones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he sees a stone house' or 'he looks into a house of stones.' The Hebrew
      phrase is literally 'house of stones' and may refer either to a structure of
      stones or to a stony place.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  chosen: over
  alternatives:
  - upon
  - against
  lexicon: HALOT
  rationale: The preposition marks position in relation to the stone heap. 'Over'
    fits the image of roots spreading across or over stones better than the more static
    'upon' in modern English.
- source_word: גַּל
  chosen: stone heap
  alternatives:
  - heap
  - mound
  lexicon: HALOT
  rationale: In context with 'house of stones,' the noun likely denotes a heap or
    pile of stones rather than a wave. 'Stone heap' makes the concrete imagery explicit
    for English readers.
- source_word: שָׁרָשָׁיו
  chosen: his roots
  lexicon: HALOT
  rationale: 'Straightforward possessive plural: the wicked man is compared to a plant,
    so ''his roots'' preserves the metaphor.'
- source_word: יְסֻבָּכוּ
  chosen: are intertwined
  alternatives:
  - are entangled
  - are interwoven
  lexicon: HALOT
  rationale: The verb conveys being interlaced or tangled together. 'Are intertwined'
    is vivid, natural English and suits the image of roots wrapping through stones.
- source_word: בֵּית אֲבָנִים
  chosen: a house of stones
  alternatives:
  - a stone house
  - a place among stones
  lexicon: HALOT
  rationale: The construct phrase is literally 'house of stones.' Because the phrase
    may be idiomatic or metaphorical, the more literal rendering is retained in the
    main text to preserve the imagery and ambiguity.
- source_word: יֶחֱזֶה
  chosen: he looks upon
  alternatives:
  - he sees
  - he gazes on
  lexicon: HALOT
  rationale: The verb commonly means 'see' or 'behold.' 'Looks upon' preserves the
    visual force while fitting the poetic line. The subject is singular, returning
    to the plant-like figure personified as 'he.'
