id: JOB.8.11
reference: Job 8:11
source:
  edition: WLC
  text: הֲ/יִֽגְאֶה גֹּ֭מֶא בְּ/לֹ֣א בִצָּ֑ה יִשְׂגֶּה אָ֥חוּ בְלִי מָֽיִם־־־׃
translation:
  text: Does papyrus grow where there is no marsh? Does reed grass flourish without
    water?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rush' for 'papyrus' and 'reed' for 'reed grass'; the Hebrew names two
      marsh plants in parallel.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/יִגְאֶה
  chosen: Does ... grow
  alternatives:
  - sprout
  - rise up
  lexicon: HALOT
  rationale: The interrogative הֲ introduces a rhetorical question. The verb גאה here
    is used of vegetal growth rather than exaltation, so 'grow' best fits the botanical
    context in natural English.
- source_word: גֹּמֶא
  chosen: papyrus
  alternatives:
  - rush
  - bulrush
  lexicon: HALOT
  rationale: גמא commonly denotes papyrus/reed plant associated with marshy areas.
    'Papyrus' is more specific and reflects the likely referent better than the traditional
    but broader 'rush' or 'bulrush'.
- source_word: בְּלֹא בִצָּה
  chosen: where there is no marsh
  alternatives:
  - without a marsh
  - in the absence of a swamp
  lexicon: HALOT
  rationale: בלא expresses absence, and ביצה denotes marsh/swamp. Rendering as 'where
    there is no marsh' makes the rhetorical force idiomatic in English while preserving
    the locative sense.
- source_word: יִשְׂגֶּה
  chosen: Does ... flourish
  alternatives:
  - grow tall
  - increase
  - thrive
  lexicon: HALOT
  rationale: The verb שׂגה in this context conveys luxuriant growth or thriving. 'Flourish'
    captures the sense of vigorous plant growth and pairs well with the parallel first
    colon.
- source_word: אָחוּ
  chosen: reed grass
  alternatives:
  - reed
  - marsh plant
  - sedge
  lexicon: HALOT
  rationale: The noun refers to marsh vegetation, likely reed grass or a similar water
    plant. 'Reed grass' is specific enough to distinguish it from papyrus while remaining
    understandable to modern readers.
- source_word: בְלִי מָיִם
  chosen: without water
  alternatives:
  - with no water
  lexicon: HALOT
  rationale: A straightforward rendering of the privative expression; 'without water'
    is idiomatic and preserves the dependence of the plant on its source of life.
