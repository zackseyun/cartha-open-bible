theological_decisions:
- issue: Rendering of the divine title שַׁדַּי
  chosen_reading: the Almighty
  alternative_readings:
  - Shaddai
  rationale: The project's philosophy prefers translating titles to preserve meaning.
    'The Almighty' communicates the title's force in English, while the transliterated
    form is preserved as an alternative.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
