theological_decisions:
- issue: Sense of the idiom וְלֹא יַחֲזִיק בְּיַד מְרֵעִים
  chosen_reading: God does not take the hand of evildoers, i.e., he does not support or uphold them.
  alternative_readings:
  - God does not strengthen the hand of evildoers
  - God does not grasp the hand of evildoers
  rationale: The Hebrew idiom can be rendered more literally ('take/grasp the hand') or more interpretively ('support/uphold'). The main text preserves the concrete image while allowing the implied sense to be understood. This avoids over-paraphrase while retaining the theological point that God does not aid the wicked.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological tension rather than resolve it unnecessarily.'
