id: JOB.8.20
reference: Job 8:20
source:
  edition: WLC
  text: הֶן אֵ֭ל לֹ֣א יִמְאַס תָּ֑ם וְ/לֹֽא יַ֝חֲזִ֗יק בְּ/יַד מְרֵעִֽים־־־־׃
translation:
  text: Behold[a], God does not reject the blameless, nor does he uphold the hand of evildoers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'nor does he support evildoers,' or more literally, 'nor does he grasp the hand of evildoers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶן
  chosen: Behold
  alternatives:
  - Surely
  - Look
  lexicon: HALOT
  rationale: Introduces an emphatic assertion or attention-getter. 'Behold' preserves the elevated, declarative force better than a flatter 'surely,' while remaining natural in poetic context.
- source_word: אֵל
  chosen: God
  alternatives:
  - God Almighty
  - Mighty God
  lexicon: HALOT
  rationale: The noun אֵל here is the common poetic term for God. 'God' is the most direct and contextually appropriate rendering; the source does not explicitly add 'Almighty' in this verse.
- source_word: יִמְאַס
  chosen: reject
  alternatives:
  - despise
  - spurn
  - cast off
  lexicon: HALOT
  rationale: The verb מאס commonly conveys rejecting or refusing. 'Reject' fits the relational and judicial sense here without over-intensifying to emotional contempt ('despise').
- source_word: תָּם
  chosen: a blameless man
  alternatives:
  - the blameless
  - an innocent man
  - a man of integrity
  lexicon: HALOT
  rationale: תָּם denotes one who is whole, blameless, or of integrity. 'Blameless' is the standard concise rendering in Job and preserves the moral sense. 'Man' is supplied because the adjective functions substantivally and the Hebrew is grammatically masculine; this follows the gender-accurate principle.
- source_word: יַחֲזִיק
  chosen: take
  alternatives:
  - grasp
  - support
  - strengthen
  lexicon: HALOT
  rationale: The Hiphil of חזק can mean to seize, hold fast, support, or strengthen. With the idiom 'by the hand,' the sense is taking hold of or supporting. 'Take' is concise and works idiomatically in English with the following phrase.
- source_word: בְּיַד
  chosen: the hand of
  alternatives:
  - by the hand of
  - the hand of
  lexicon: HALOT
  rationale: Literally 'in/by the hand of.' In this collocation with חזק, it forms an idiom of taking hold of someone's hand, often for support. Rendering it explicitly as 'the hand of' preserves the image.
- source_word: מְרֵעִים
  chosen: evildoers
  alternatives:
  - wrongdoers
  - the wicked
  lexicon: HALOT
  rationale: A participial form from רעע, referring to those who do evil. 'Evildoers' preserves the active verbal force better than the more generalized 'the wicked.'
