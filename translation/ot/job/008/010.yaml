id: JOB.8.10
reference: Job 8:10
source:
  edition: WLC
  text: הֲ/לֹא הֵ֣ם י֭וֹרוּ/ךָ יֹ֣אמְרוּ לָ֑/ךְ וּ֝/מִ/לִּבָּ֗/ם יוֹצִ֥אוּ מִלִּֽים־׃
translation:
  text: Will they not teach you and tell you, and bring forth words from their heart?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from their minds' or 'from their inner being'; Hebrew 'heart' often
      refers to the center of thought as well as feeling.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Will ... not
  alternatives:
  - Surely
  - Is it not that
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting a positive answer. English
    'Will they not ...' preserves the interrogative force naturally in context.
- source_word: הֵם
  chosen: they
  alternatives:
  - these
  - those men
  lexicon: HALOT
  rationale: Refers back to the former generations/ancestors in the preceding context.
    Simple 'they' is the most natural English rendering.
- source_word: יוֹרוּךָ
  chosen: teach you
  alternatives:
  - instruct you
  - direct you
  lexicon: HALOT
  rationale: Hiphil of ירה commonly means 'teach/instruct.' 'Teach you' fits the wisdom
    context and pairs well with the following verb of speaking.
- source_word: יֹאמְרוּ לָךְ
  chosen: tell you
  alternatives:
  - say to you
  - speak to you
  lexicon: HALOT
  rationale: The combination with the previous verb creates a natural English pair,
    'teach you and tell you,' while still reflecting the distinct Hebrew verb אמר.
- source_word: וּמִלִּבָּם
  chosen: from their heart
  alternatives:
  - from their minds
  - from their inner being
  lexicon: HALOT
  rationale: לֵב/לֵבָב often denotes the inner self, including thought and reflection.
    'From their heart' is idiomatic and preserves the Hebrew anthropological imagery.
- source_word: יוֹצִיאוּ
  chosen: bring forth
  alternatives:
  - utter
  - bring out
  lexicon: HALOT
  rationale: Hiphil of יצא literally means 'cause to go out.' 'Bring forth' preserves
    the metaphor of words emerging from within, more vividly than the flatter 'utter.'
- source_word: מִלִּים
  chosen: words
  alternatives:
  - sayings
  - utterances
  lexicon: HALOT
  rationale: A straightforward rendering that matches the wisdom setting and works
    naturally with 'bring forth'.
