id: JOB.8.12
reference: Job 8:12
source:
  edition: WLC
  text: עֹדֶ֣/נּוּ בְ֭/אִבּ/וֹ לֹ֣א יִקָּטֵ֑ף וְ/לִ/פְנֵ֖י כָל חָצִ֣יר יִיבָֽשׁ־׃
translation:
  text: While it is still in its shoot, not cut down, it dries up before any other
    grass.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in its greenness" or "in its bud." The Hebrew term refers to fresh plant
      growth.
    reason: lexical_alternative
  - marker: b
    text: Or "not plucked."
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹדֶנּוּ
  chosen: While it is still
  alternatives:
  - Yet
  - Still
  lexicon: HALOT
  rationale: 'The adverb with 3ms suffix conveys continuance with reference to the
    plant: ''while it is still'' or ''while it is yet.'' In English, ''while it is
    still'' naturally introduces the temporal clause.'
- source_word: בְאִבּוֹ
  chosen: in its shoot
  alternatives:
  - in its greenness
  - in its bud
  lexicon: HALOT
  rationale: The noun אֵב/אִב refers to fresh growth, shoot, or green sprout. 'In
    its shoot' preserves the concrete botanical image better than the more interpretive
    'in its greenness,' while remaining readable.
- source_word: לֹא יִקָּטֵף
  chosen: not cut down
  alternatives:
  - not plucked
  - not gathered
  lexicon: HALOT
  rationale: The Niphal/imperfect of קטף here denotes being cut or plucked. In the
    plant metaphor, 'cut down' communicates the passive sense clearly in idiomatic
    English, though 'plucked' is a viable more literal alternative.
- source_word: וְלִפְנֵי
  chosen: before
  alternatives:
  - and before
  - sooner than
  lexicon: HALOT
  rationale: 'The conjunction plus preposition marks comparison in time: it dries
    up before something else does. English can omit the explicit ''and'' for smoother
    style without loss of meaning.'
- source_word: כָל חָצִיר
  chosen: any other grass
  alternatives:
  - all grass
  - any grass
  lexicon: HALOT
  rationale: 'In context the phrase is comparative: the papyrus/reed dries up earlier
    than ordinary grass. ''Any other grass'' makes the comparison explicit in natural
    English; ''all grass'' would sound overly absolute.'
- source_word: יִיבָשׁ
  chosen: it dries up
  alternatives:
  - it withers
  - it becomes dry
  lexicon: HALOT
  rationale: יבש means to dry up or wither. 'Dries up' best matches the literal image
    and the water-dependent plant metaphor in the immediate context.
