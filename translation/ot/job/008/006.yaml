theological_decisions:
- issue: Implicit subject of the verbs in the apodosis
  chosen_reading: The subject is left as 'he,' referring contextually to God without
    inserting 'God' into the text.
  alternative_readings:
  - Explicitly supplying 'God' in translation
  rationale: Hebrew leaves the subject implicit in the verb forms, but Bildad's meaning
    is clear from context. Retaining 'he' avoids adding a noun not present in the
    source while preserving intelligibility.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of Bildad's statement
  chosen_reading: The verse is translated as Bildad's conditional claim without endorsing
    its theology.
  alternative_readings:
  - Softer paraphrase that distances the narrator from Bildad
  rationale: The translation should represent the speaker's words faithfully, not
    preemptively correct or endorse Bildad's retributive theology.
  doctrine_reference: Translation philosophy §1, §3
