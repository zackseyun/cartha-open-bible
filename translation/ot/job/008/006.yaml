id: JOB.8.6
reference: Job 8:6
source:
  edition: WLC
  text: אִם זַ֥ךְ וְ/יָשָׁ֗ר אָ֥תָּה כִּי עַ֭תָּה יָעִ֣יר עָלֶ֑י/ךָ וְ֝/שִׁלַּ֗ם נְוַ֣ת
    צִדְקֶֽ/ךָ־־׃
translation:
  text: If you are pure and upright, surely even now he will rouse himself for you
    and restore your righteous dwelling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will awake for you' or 'he will stir himself on your behalf.'
    reason: lexical_alternative
  - marker: b
    text: Or 'make whole' or 'repay'; the Hebrew verb can carry the sense of restoring
      or making complete.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'the dwelling of your righteousness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - Surely if
  lexicon: HALOT
  rationale: Standard conditional particle introducing Bildad's condition.
- source_word: זַךְ
  chosen: pure
  alternatives:
  - clean
  - innocent
  lexicon: HALOT
  rationale: Conveys moral purity/cleanness in wisdom context. 'Pure' is idiomatic
    with the following 'upright' and avoids overstating forensic innocence.
- source_word: יָשָׁר
  chosen: upright
  alternatives:
  - straight
  - just
  lexicon: HALOT
  rationale: Common wisdom term for moral rectitude. 'Upright' is the established
    and accurate English equivalent in Job.
- source_word: כִּי עַתָּה
  chosen: surely even now
  alternatives:
  - then now
  - indeed now
  - for now
  lexicon: HALOT
  rationale: Here כִּי is best taken as asseverative/emphatic rather than causal,
    introducing the apodosis with emphasis. 'Surely even now' captures the force and
    immediacy.
- source_word: יָעִיר עָלֶיךָ
  chosen: he will rouse himself for you
  alternatives:
  - he will awake for you
  - he will stir himself on your behalf
  lexicon: HALOT
  rationale: Hiphil of עור literally means 'awaken/stir up.' The subject is implicitly
    God from context. 'Rouse himself for you' preserves the metaphor without awkwardness.
- source_word: וְשִׁלַּם
  chosen: and restore
  alternatives:
  - and make whole
  - and repay
  - and make prosperous
  lexicon: HALOT
  rationale: The verb שׁלם in the Piel can mean make whole, repay, or restore. With
    'dwelling' as object, 'restore' best fits the sense of reestablishing Job's household
    fortunes.
- source_word: נְוַת
  chosen: dwelling
  alternatives:
  - habitation
  - pasture-home
  - home
  lexicon: HALOT
  rationale: Refers to a habitation or abode. 'Dwelling' is natural English and broad
    enough to include household estate.
- source_word: צִדְקֶךָ
  chosen: your righteous
  alternatives:
  - your righteousness
  - your just
  lexicon: HALOT
  rationale: Construct phrase modifying 'dwelling.' Rendering adjectivally in English
    ('your righteous dwelling') is more natural than the overly literal 'the dwelling
    of your righteousness' while preserving the moral qualification.
