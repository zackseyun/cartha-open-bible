id: JOB.8.18
reference: Job 8:18
source:
  edition: WLC
  text: אִם יְבַלְּעֶ֥/נּוּ מִ/מְּקוֹמ֑/וֹ וְ/כִ֥חֶשׁ בּ֝֗/וֹ לֹ֣א רְאִיתִֽי/ךָ־׃
translation:
  text: If he is destroyed from his place, then it will deny him, saying, “I have
    not seen you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from its place.” The Hebrew suffix can be read with the plant image
      in view, though the verse also personifies the image in relation to the wicked
      man.
    reason: lexical_alternative
  - marker: b
    text: Or “it disowns him” / “it deals falsely with him.” The Hebrew verb can express
      denial or disavowal.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a conditional clause. In this poetic context 'if' preserves
    the hypothetical force better than the more temporal 'when'.
- source_word: יְבַלְּעֶנּוּ
  chosen: he is swallowed up
  alternatives:
  - it swallows him up
  - he is destroyed
  lexicon: HALOT
  rationale: From בלע in the Piel with 3ms suffix. The sense is being engulfed/consumed.
    The passive English rendering fits the context of the plant/wicked man image being
    removed from its place, while avoiding over-interpretation as strictly metaphorical
    'destroyed'.
- source_word: מִמְּקוֹמוֹ
  chosen: from his place
  alternatives:
  - from its place
  lexicon: HALOT
  rationale: Literally 'from his/its place.' The suffix is masculine singular and
    may refer to the person imaged through the plant metaphor. 'His place' keeps the
    personalizing force of the surrounding context, though the imagery also allows
    'its place'.
- source_word: וְכִחֶשׁ בּוֹ
  chosen: then it will deny him
  alternatives:
  - and it disowns him
  - and it deals falsely with him
  lexicon: HALOT
  rationale: כחש commonly carries the sense of denying, disowning, or proving false.
    Here the subject is best taken as 'his place,' personified in the next clause
    as speaking. 'Deny him' captures that personified repudiation succinctly.
- source_word: לֹא רְאִיתִיךָ
  chosen: I have not seen you
  alternatives:
  - I never saw you
  - I do not know you
  lexicon: HALOT
  rationale: A direct denial formula. The perfect is well represented by English present
    perfect in this context. 'I have not seen you' preserves the concrete imagery
    rather than expanding to the interpretive 'I do not know you'.
