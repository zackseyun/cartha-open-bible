id: JOB.8.14
reference: Job 8:14
source:
  edition: WLC
  text: אֲשֶׁר יָק֥וֹט כִּסְל֑/וֹ וּ/בֵ֥ית עַ֝כָּבִ֗ישׁ מִבְטַחֽ/וֹ־׃
translation:
  text: whose confidence is cut off, and whose trust is a spider’s house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whose hope is cut off'; the Hebrew noun can denote confidence, hope,
      or security in this context.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb rendered 'is cut off' is rare and debated; possible nuances
      include 'is severed' or, less likely here, 'is loathed.'
    reason: lexical_alternative
  - marker: c
    text: That is, his trust is as fragile as a spider’s web/house.
    reason: cultural_note
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: whose
  alternatives:
  - for whom
  - whose—
  lexicon: HALOT
  rationale: Relative particle linking this verse to the wicked/hypocrite described
    in context. 'Whose' gives smooth English by attaching the clause directly to the
    antecedent implied from the previous verse.
- source_word: יָקוֹט
  chosen: is cut off
  alternatives:
  - is loathed
  - is severed
  - is fragile
  lexicon: HALOT
  rationale: The verb is difficult and comparatively rare. In context, Bildad is describing
    the collapse of the wicked person's security. 'Is cut off' best fits the imagery
    of hope/security being abruptly removed, and coheres with the parallel line about
    trust being like a spider's house. Alternatives are preserved because the root's
    nuance is debated.
- source_word: כִּסְלוֹ
  chosen: his confidence
  alternatives:
  - his hope
  - his folly
  - his loins
  lexicon: HALOT
  rationale: Though the noun can denote 'loins' in some contexts and is related to
    ideas of folly elsewhere, in wisdom literature it often carries the sense of confidence/security.
    Here that sense is demanded by the parallel with מִבְטַחוֹ ('his trust'). 'Confidence'
    avoids redundancy while preserving the semantic field of security.
- source_word: וּבֵית
  chosen: and ... house
  alternatives:
  - and ... home
  lexicon: HALOT
  rationale: The conjunction plus construct noun introduces the second parallel colon.
    'House' is retained rather than 'home' because the image is literal and fragile,
    not domestic or emotive.
- source_word: עַכָּבִישׁ
  chosen: spider’s
  alternatives:
  - of a spider
  lexicon: HALOT
  rationale: Standard rendering of the noun. The possessive form in English is natural
    in the construct chain 'house of a spider'.
- source_word: מִבְטַחוֹ
  chosen: his trust
  alternatives:
  - his security
  - that in which he trusts
  lexicon: HALOT
  rationale: The noun denotes object or ground of trust/security. 'His trust' preserves
    the compact Hebrew expression and works well in parallel with 'his confidence.'
    The metaphor then identifies that trust as no sturdier than a spider's house/web.
