id: JOB.8.3
reference: Job 8:3
source:
  edition: WLC
  text: הַ֭/אֵל יְעַוֵּ֣ת מִשְׁפָּ֑ט וְ/אִם שַׁ֝דַּ֗י יְעַוֵּֽת צֶֽדֶק־־׃
translation:
  text: Does God pervert justice, or does the Almighty pervert righteousness?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Does God distort judgment, or does the Almighty distort justice?'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֵל
  chosen: Does God
  alternatives:
  - Does El
  lexicon: HALOT
  rationale: The interrogative הַ marks a yes/no question, and אֵל here is the common
    divine title 'God,' not a proper name to be transliterated. Rendering the interrogative
    with English auxiliary 'Does' produces natural modern English while preserving
    the rhetorical question.
- source_word: יְעַוֵּת
  chosen: pervert
  alternatives:
  - distort
  - twist
  lexicon: HALOT
  rationale: The Piel of עוה conveys making something crooked or bent, especially
    in legal/moral contexts. 'Pervert' best captures the strong forensic sense in
    English here.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - justice due
  - what is right in judgment
  lexicon: HALOT
  rationale: In this context מִשְׁפָּט refers to just judgment or justice as a legal-moral
    standard. 'Justice' is more idiomatic and accessible than 'judgment' while preserving
    the forensic sense.
- source_word: וְאִם
  chosen: or does
  alternatives:
  - and if
  - or if
  lexicon: HALOT
  rationale: Although formally 'and if,' in paired rhetorical questions this construction
    functions disjunctively, introducing the second parallel question. 'Or does' best
    reflects the sense in English.
- source_word: שַׁדַּי
  chosen: the Almighty
  alternatives:
  - Shaddai
  lexicon: HALOT
  rationale: Per translation philosophy, titles are translated rather than transliterated.
    'The Almighty' is the standard and contextually fitting rendering of the divine
    title שַׁדַּי in Job.
- source_word: צֶדֶק
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: צֶדֶק can denote righteousness or justice. In this poetic parallelism
    with מִשְׁפָּט, 'righteousness' preserves the lexical distinction between the
    two cola while keeping the moral-judicial overlap evident.
