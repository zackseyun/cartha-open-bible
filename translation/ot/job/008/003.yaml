theological_decisions:
- issue: Rendering the paired divine titles אֵל and שַׁדַּי
  chosen_reading: God ... the Almighty
  alternative_readings:
  - El ... Shaddai
  rationale: Both are titles rather than personal names in this context. Translating
    them preserves meaning and follows the stated philosophy to translate titles while
    transliterating names.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2'
- issue: Maintaining the distinction between מִשְׁפָּט and צֶדֶק
  chosen_reading: justice ... righteousness
  alternative_readings:
  - justice ... justice
  - judgment ... justice
  rationale: The verse uses two related but distinct legal-ethical terms in parallel.
    Preserving the distinction avoids flattening the Hebrew and preserves theological
    tension between juridical justice and moral rightness.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3, §5'
