id: JOB.8.9
reference: Job 8:9
source:
  edition: WLC
  text: כִּֽי תְמ֣וֹל אֲ֭נַחְנוּ וְ/לֹ֣א נֵדָ֑ע כִּ֤י צֵ֖ל יָמֵ֣י/נוּ עֲלֵי אָֽרֶץ־־׃
translation:
  text: For we are only of yesterday and do not know[a], for our days on the earth are a shadow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'we are only yesterday's people,' that is, we are of very recent origin and therefore limited in knowledge.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding statement in Bildad's argument. 'For' best preserves the explanatory force in natural English.
- source_word: תְמֹול
  chosen: of yesterday
  alternatives:
  - from yesterday
  - only yesterday
  lexicon: HALOT
  rationale: The idiom conveys recentness and human brevity. 'Of yesterday' keeps the metaphor close to the Hebrew while remaining intelligible; the sense is that humans are very recent.
- source_word: אֲנַחְנוּ
  chosen: we
  lexicon: HALOT
  rationale: Straightforward first person plural pronoun, retained explicitly for emphasis as in the Hebrew clause.
- source_word: וְלֹא נֵדָע
  chosen: and do not know
  alternatives:
  - and know nothing
  - and we do not know
  lexicon: HALOT
  rationale: Qal imperfect 1cp of ידע with negation. 'Do not know' is the most direct rendering; 'know nothing' would slightly intensify beyond the Hebrew wording.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the ground for human ignorance in the second clause. Repeating 'for' reflects the Hebrew structure and logic.
- source_word: צֵל
  chosen: a shadow
  alternatives:
  - shadow
  - shade
  lexicon: HALOT
  rationale: The noun is metaphorical for transience and insubstantiality. 'A shadow' is idiomatic in English and preserves the image.
- source_word: יָמֵינוּ
  chosen: our days
  lexicon: HALOT
  rationale: Literal rendering of the construct with first person plural suffix.
- source_word: עֲלֵי אָרֶץ
  chosen: on the earth
  alternatives:
  - upon the earth
  - on earth
  lexicon: HALOT
  rationale: The prepositional phrase locates human life in the earthly realm. 'On the earth' is clear and slightly more formal than 'on earth,' fitting the poetic register.
