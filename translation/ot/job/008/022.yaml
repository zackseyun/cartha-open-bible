- issue: Temporal force of the final clause
  chosen_reading: 'future/resultative: ''the tent of the wicked will be no more'''
  alternative_readings:
  - 'present: ''the tent of the wicked is no more'''
  rationale: The surrounding context (vv. 20–22) speaks in promises and outcomes concerning
    Job's restoration and the fate of opponents. Rendering the final clause as future/resultative
    best matches the discourse flow while respecting the Hebrew existential negation.
