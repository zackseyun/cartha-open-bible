id: JOB.8.22
reference: Job 8:22
source:
  edition: WLC
  text: שֹׂנְאֶ֥י/ךָ יִלְבְּשׁוּ בֹ֑שֶׁת וְ/אֹ֖הֶל רְשָׁעִ֣ים אֵינֶֽ/נּוּ־׃פ
translation:
  text: Those who hate you will be clothed with shame, and the tent of the wicked
    will be no more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the tent of the wicked is not.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׂנְאֶיךָ
  chosen: those who hate you
  alternatives:
  - your haters
  - those hating you
  lexicon: HALOT
  rationale: Qal active participle plural with 2ms suffix, functioning substantivally.
    'Those who hate you' is natural English and preserves the personal object 'you'.
- source_word: יִלְבְּשׁוּ
  chosen: will be clothed with
  alternatives:
  - will put on
  - will wear
  lexicon: HALOT
  rationale: לבשׁ literally means 'to put on/wear.' In English, with an abstract noun
    like 'shame,' the passive-like idiom 'be clothed with' is more natural while still
    closely reflecting the Hebrew metaphor.
- source_word: בֹשֶׁת
  chosen: shame
  alternatives:
  - disgrace
  lexicon: HALOT
  rationale: Standard rendering for בֹשֶׁת. 'Shame' preserves both the emotional and
    public-disgrace sense without overinterpreting.
- source_word: וְאֹהֶל
  chosen: and the tent
  alternatives:
  - and the dwelling
  - and the household
  lexicon: HALOT
  rationale: אֹהֶל is literally 'tent.' In wisdom poetry it can metonymically refer
    to a household or dwelling, but 'tent' preserves the concrete image and remains
    intelligible.
- source_word: רְשָׁעִים
  chosen: of the wicked
  alternatives:
  - of wicked people
  - of evildoers
  lexicon: HALOT
  rationale: Plural adjective/substantive meaning 'wicked.' 'The wicked' is idiomatic
    and preserves the class designation.
- source_word: אֵינֶנּוּ
  chosen: will be no more
  alternatives:
  - is not
  - will not exist
  - will be gone
  lexicon: HALOT
  rationale: 'Though formally a present existential negation with pronominal suffix
    (''it is not''), in this context of Bildad''s future-oriented promises and warnings,
    English naturally expresses the result as future: ''will be no more.'' This preserves
    the sense without wooden awkwardness.'
