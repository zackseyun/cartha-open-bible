id: JOB.8.8
reference: Job 8:8
source:
  edition: WLC
  text: כִּֽי שְׁאַל נָ֭א לְ/דֹ֣ר רִישׁ֑וֹן וְ֝/כוֹנֵ֗ן לְ/חֵ֣קֶר אֲבוֹתָֽ/ם־־׃
translation:
  text: For please ask the former generation, and consider the findings of their fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the search/investigation of their fathers.' The Hebrew noun can refer
      either to the act of searching or to what has been discovered by it.
    reason: lexical_alternative
  - marker: b
    text: '''Their fathers'' may be understood more broadly as ''their ancestors.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces Bildad's supporting exhortation, functioning naturally
    as a discourse connector giving grounds for what precedes. 'For' best preserves
    that relation in English.
- source_word: שְׁאַל נָא
  chosen: please ask
  alternatives:
  - ask now
  - inquire, please
  lexicon: HALOT
  rationale: שׁאל is an imperative 'ask/inquire'; נָא adds entreaty or politeness
    rather than strict temporal force. 'Please ask' gives idiomatic modern English
    while preserving the appeal.
- source_word: לְדֹר רִישׁוֹן
  chosen: the former generation
  alternatives:
  - a former generation
  - the generation before
  - the first generation
  lexicon: HALOT
  rationale: דּוֹר is 'generation'; רִאשׁוֹן here refers to those earlier/previous,
    not necessarily the absolute first generation. 'The former generation' captures
    the appeal to antiquity and inherited wisdom.
- source_word: וְכוֹנֵן
  chosen: consider
  alternatives:
  - set your mind to
  - direct your attention to
  - prepare yourself for
  lexicon: HALOT
  rationale: From כון in the imperative, the sense here is to fix or direct oneself
    attentively toward something. 'Consider' is concise, idiomatic, and fits the parallel
    with 'ask'.
- source_word: לְחֵקֶר
  chosen: the findings
  alternatives:
  - the search
  - the investigation
  - what has been searched out
  lexicon: HALOT
  rationale: חֵקֶר denotes searching, investigation, or what is discovered by inquiry.
    Because the object is the accumulated wisdom of the ancestors, 'the findings'
    communicates the result of investigation in natural English.
- source_word: אֲבוֹתָם
  chosen: their fathers
  alternatives:
  - their ancestors
  lexicon: HALOT
  rationale: 'The suffix most naturally refers back to the former generation: their
    fathers, i.e., the ancestors of that earlier generation. ''Fathers'' preserves
    the Hebrew wording and the text''s gendered ancestral idiom; ''ancestors'' is
    a possible smoothing but less literal.'
