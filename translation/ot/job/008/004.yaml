id: JOB.8.4
reference: Job 8:4
source:
  edition: WLC
  text: אִם בָּנֶ֥י/ךָ חָֽטְאוּ ל֑/וֹ וַֽ֝/יְשַׁלְּחֵ֗/ם בְּ/יַד פִּשְׁעָֽ/ם־־־׃
translation:
  text: If your sons sinned against him, he gave them over into the hand of their
    transgression.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he delivered them into the power of their transgression.' The Hebrew
      idiom is literally 'into the hand of their transgression.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - Since
  lexicon: HALOT
  rationale: Introduces a conditional clause. In context Bildad is arguing hypothetically
    from Job's circumstances; 'if' preserves the Hebrew particle's normal force without
    overcommitting to a causal 'since'.
- source_word: בָּנֶיךָ
  chosen: your sons
  alternatives:
  - your children
  lexicon: HALOT
  rationale: The noun is the masculine plural of 'sons.' Per gender-accurate policy,
    'sons' is preferred over the more generic 'children,' especially since Job's deceased
    offspring in the narrative include sons and daughters but the Hebrew form here
    is specifically masculine.
- source_word: חָטְאוּ
  chosen: sinned
  alternatives:
  - have sinned
  lexicon: HALOT
  rationale: Qal perfect 3cp of חטא, denoting committing sin. Simple past fits the
    English flow in this conditional statement.
- source_word: לוֹ
  chosen: against him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: With חטא, the preposition ל can mark the offended party; in English 'sinned
    against him' is the natural idiom. The referent is God in Bildad's speech.
- source_word: וישלחם
  chosen: he gave them over
  alternatives:
  - he sent them away
  - he cast them out
  - he delivered them
  lexicon: HALOT
  rationale: The verb שלח literally means 'send,' but with the following idiom 'into
    the hand of' it conveys handing someone over to a power or consequence. 'Gave
    them over' best captures the judicial force in readable English.
- source_word: ביד
  chosen: into the hand of
  alternatives:
  - to the power of
  - into the power of
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for being delivered into someone's power.
    Retaining 'hand' preserves the metaphor while remaining intelligible in English.
- source_word: פִשְׁעָם
  chosen: their transgression
  alternatives:
  - their rebellion
  - their sin
  lexicon: HALOT
  rationale: פשע often denotes rebellion or transgression, a more willful breach than
    the broader חטא earlier in the verse. 'Transgression' preserves that nuance and
    avoids flattening the distinction between the two sin terms.
