theological_decisions:
- issue: Referent of 'him' in 'sinned against him'
  chosen_reading: The pronoun refers to God.
  alternative_readings:
  - The pronoun is left formally ambiguous in Hebrew discourse, though context strongly
    points to God.
  rationale: Bildad is speaking about divine justice and the fate of Job's children;
    the most natural antecedent is God. The English translation keeps the pronoun
    rather than replacing it with 'God' to preserve the Hebrew wording while allowing
    the contextual referent to stand.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Rendering the consequence clause
  chosen_reading: '''he gave them over into the hand of their transgression'''
  alternative_readings:
  - '''he delivered them into the power of their transgression'''
  - '''he cast them away for their transgression'''
  rationale: The Hebrew idiom combines divine action with the agency/power of the
    children's own rebellion. The chosen rendering preserves both elements without
    importing a more specific doctrinal explanation of retribution than the text states.
  doctrine_reference: 'Translation philosophy: optimal equivalence; do not import
    doctrinal claims the text does not make.'
