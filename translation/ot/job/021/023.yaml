id: JOB.21.23
reference: Job 21:23
source:
  edition: WLC
  text: זֶ֗ה יָ֭מוּת בְּ/עֶ֣צֶם תֻּמּ֑/וֹ כֻּ֝לּ֗/וֹ שַׁלְאֲנַ֥ן וְ/שָׁלֵֽיו׃
translation:
  text: One dies in the fullness of his vigor[a], wholly at ease and secure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'This one dies in his full strength, all of him at ease and undisturbed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה
  chosen: One
  alternatives:
  - This one
  - This man
  lexicon: HALOT
  rationale: The demonstrative introduces one case in Job's contrast between different kinds of deaths. English idiom prefers an indefinite representative expression here rather than the wooden 'this one.' 'One' preserves the generic-singular force without over-specifying gender beyond the Hebrew's representative masculine.
- source_word: יָמוּת
  chosen: dies
  alternatives:
  - will die
  lexicon: HALOT
  rationale: The imperfect here functions in a gnomic/generalizing sense within Job's observation about human experience, so present-tense 'dies' is more natural in English than predictive 'will die.'
- source_word: בְּעֶצֶם
  chosen: in the fullness of
  alternatives:
  - in the very strength of
  - in the bone/substance of
  lexicon: HALOT
  rationale: עֶצֶם literally denotes 'bone' and by extension essence, substance, or strength. In this idiom with תֻּמּוֹ it points to the height or unimpaired state of life/strength rather than literal bone. 'In the fullness of' communicates that idiomatic sense in readable English.
- source_word: תֻּמּוֹ
  chosen: his vigor
  alternatives:
  - his completeness
  - his integrity
  - his full strength
  lexicon: HALOT
  rationale: From תֹּם/תֻּם, the noun can denote completeness, wholeness, or soundness. In this context of dying while prosperous and untroubled, the sense is not moral integrity but unimpaired condition or full vitality. 'His vigor' captures that contextual meaning.
- source_word: כֻּלּוֹ
  chosen: wholly
  alternatives:
  - all of him
  - entirely
  lexicon: HALOT
  rationale: The term intensifies the following description. 'Wholly' is concise and idiomatic, preserving the adverbial force better than the more literal but awkward 'all of him.'
- source_word: שַׁלְאֲנַן
  chosen: at ease
  alternatives:
  - tranquil
  - prosperous
  - carefree
  lexicon: HALOT
  rationale: The adjective conveys ease, quiet confidence, and freedom from disturbance. 'At ease' best fits the immediate parallelism and avoids overstating material prosperity, though prosperity may be implied in context.
- source_word: וְשָׁלֵיו
  chosen: secure
  alternatives:
  - quiet
  - undisturbed
  - peaceful
  lexicon: HALOT
  rationale: This near-synonym reinforces the state of calm well-being. 'Secure' complements 'at ease' by expressing settled safety rather than merely emotional calm, preserving the parallel without sounding redundant in English.
