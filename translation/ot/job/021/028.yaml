id: JOB.21.28
reference: Job 21:28
source:
  edition: WLC
  text: כִּ֤י תֹֽאמְר֗וּ אַיֵּ֥ה בֵית נָדִ֑יב וְ֝/אַיֵּ֗ה אֹ֤הֶל מִשְׁכְּנ֬וֹת רְשָׁעִֽים־׀׃
translation:
  text: For you say[a], ‘Where is the house of the noble man, and where is the tent[b], the dwelling place of the wicked?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prince' for 'noble man.' The Hebrew נָדִיב can denote a socially prominent or princely figure, not only a generous person.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the tent, the dwellings of the wicked' is compressed in Hebrew. It may mean 'the tent where the wicked dwell' or function appositionally, identifying the tent as the dwelling place of the wicked.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the content of what Job's opponents are saying and connects this verse to the preceding argument. 'For' best preserves the explanatory force in context.
- source_word: תֹאמְרוּ
  chosen: you say
  alternatives:
  - you will say
  - you are saying
  lexicon: HALOT
  rationale: 'The imperfect here is best rendered as a present in English within direct discourse introducing a representative objection: ''For you say.'''
- source_word: אַיֵּה
  chosen: Where is
  alternatives:
  - Where
  lexicon: HALOT
  rationale: 'Idiomatic English requires the copula: ''Where is ...?'' This preserves the interrogative force.'
- source_word: בֵית
  chosen: house
  alternatives:
  - household
  - palace
  lexicon: HALOT
  rationale: The basic sense is 'house.' In context it likely refers to the residence/estate of a prominent person, but 'house' preserves the Hebrew image without overinterpreting.
- source_word: נָדִיב
  chosen: noble man
  alternatives:
  - prince
  - noble
  - generous man
  lexicon: HALOT
  rationale: נָדִיב can denote a noble or princely person, not merely someone generous. 'Noble man' fits the social-status sense in this context and remains gender-accurate to the masculine singular form.
- source_word: וְאַיֵּה
  chosen: and where is
  alternatives:
  - and where
  lexicon: HALOT
  rationale: Coordinates the second question with the first; English again supplies 'is' idiomatically.
- source_word: אֹהֶל
  chosen: tent
  alternatives:
  - tabernacle
  - dwelling
  lexicon: HALOT
  rationale: The ordinary meaning is 'tent.' Even if used for a settled dwelling metaphorically, 'tent' preserves the Hebrew wording and imagery.
- source_word: מִשְׁכְּנוֹת
  chosen: the dwellings of
  alternatives:
  - the dwelling places of
  - the habitations of
  lexicon: HALOT
  rationale: The plural construct modifies 'wicked' and likely stands appositionally/exegetically to 'tent' ('the tent, the dwellings of the wicked'). 'Dwellings' is natural modern English and preserves the plural nuance.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked men
  - evildoers
  lexicon: HALOT
  rationale: A substantival plural adjective meaning 'wicked people.' 'The wicked' is concise, idiomatic, and preserves the moral category without unnecessary expansion.
