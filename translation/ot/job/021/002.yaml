id: JOB.21.2
reference: Job 21:2
source:
  edition: WLC
  text: שִׁמְע֣וּ שָׁ֭מוֹעַ מִלָּתִ֑/י וּ/תְהִי זֹ֝֗את תַּנְח֥וּמֹֽתֵי/כֶֽם־׃
translation:
  text: Listen carefully to my words, and let this be your consolation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "your comfort"; Hebrew "your consolations" is plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Listen
  alternatives:
  - Hear
  lexicon: HALOT
  rationale: Imperative plural of שׁמע calling Job's hearers to attend. 'Listen' is
    more natural modern English than 'hear' in an imperative appeal.
- source_word: שָׁמוֹעַ
  chosen: carefully
  alternatives:
  - indeed
  - attentively
  - surely hear
  lexicon: HALOT
  rationale: 'Infinitive absolute of the same verb intensifies the imperative. Rather
    than woodenly repeating ''hear hearing,'' English expresses the emphasis adverbially:
    ''listen carefully.'''
- source_word: מִלָּתִי
  chosen: my word
  alternatives:
  - my speech
  - what I say
  lexicon: HALOT
  rationale: Singular noun with 1cs suffix. 'My word' preserves the singular and the
    directness of Job's appeal; 'speech' is possible but less concrete.
- source_word: וּתְהִי
  chosen: and let ... be
  alternatives:
  - and may ... be
  lexicon: HALOT
  rationale: Jussive of היה introducing a wish/request. 'Let ... be' is idiomatic
    English for the volitional sense.
- source_word: זֹאת
  chosen: this
  alternatives:
  - this thing
  - this act
  lexicon: HALOT
  rationale: Feminine demonstrative referring forward/back to the act of listening
    or to Job's speech as consolation. Simple 'this' best preserves the Hebrew's compactness.
- source_word: תַּנְחֻמוֹתֵיכֶם
  chosen: your consolation
  alternatives:
  - your comfort
  - your consolations
  lexicon: HALOT
  rationale: 'Plural noun with 2mp suffix from נחם. Although formally plural, English
    often uses the singular abstract ''consolation'' naturally here. This fits the
    sense: let their listening serve as the comfort they offer him, likely with ironic
    edge.'
