id: JOB.21.29
reference: Job 21:29
source:
  edition: WLC
  text: הֲ/לֹ֣א שְׁ֭אֶלְתֶּם ע֣וֹבְרֵי דָ֑רֶךְ וְ֝/אֹתֹתָ֗/ם לֹ֣א תְנַכֵּֽרוּ׃
translation:
  text: Have you not asked those who travel the roads, and do you not recognize their
    signs?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'travelers' or 'those passing along the way.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their tokens' or 'their marks'; the phrase likely refers to the evidence
      or indicators known from travelers' reports.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Have you not
  alternatives:
  - Surely
  - Is it not so that
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Have you not'
    preserves the interrogative force and the rebuking tone better than a flat assertion.
- source_word: שְׁאֶלְתֶּם
  chosen: asked
  alternatives:
  - inquired of
  - questioned
  lexicon: HALOT
  rationale: The verb means to ask or inquire. 'Asked' is natural modern English and
    fits the direct appeal to common testimony.
- source_word: עֹבְרֵי דָרֶךְ
  chosen: those who travel the roads
  alternatives:
  - travelers
  - wayfarers
  - those passing along the way
  lexicon: HALOT
  rationale: Literally 'passers of the way/road.' The phrase refers to travelers whose
    broad experience gives them knowledge. 'Those who travel the roads' preserves
    the participial sense and remains readable; 'travelers' is possible but slightly
    less vivid.
- source_word: וְאֹתֹתָם
  chosen: their signs
  alternatives:
  - their tokens
  - their marks
  - their testimony
  lexicon: HALOT
  rationale: אוֹת commonly means 'sign' or 'token.' In context Job appeals to the
    evidence or indicators known by travelers. 'Their signs' keeps the lexical sense;
    'testimony' captures the idea but moves further from the Hebrew noun.
- source_word: לֹא תְנַכֵּרוּ
  chosen: do you not recognize
  alternatives:
  - do you not acknowledge
  - do you not examine
  - can you not discern
  lexicon: HALOT
  rationale: From נכר in the piel, here likely 'recognize' or 'acknowledge.' The sense
    is that Job's hearers should not fail to recognize the evidentiary signs reported
    by travelers. 'Recognize' is the most straightforward fit with 'signs.'
