theological_decisions:
- issue: Force of the imperfect verbs in this verse
  chosen_reading: Rendered as jussive-like wishes ('Let his own eyes see ... let him drink')
  alternative_readings:
  - Predictive future ('His eyes will see ... he will drink')
  rationale: In context, Job is rebutting the claim that punishment deferred to children is sufficient; he insists the wicked person himself should face judgment. The jussive-like rendering best captures that rhetorical thrust in English while remaining faithful to the Hebrew imperfect forms.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
