id: JOB.21.20
reference: Job 21:20
source:
  edition: WLC
  text: יִרְא֣וּ עינ/ו כִּיד֑/וֹ וּ/מֵ/חֲמַ֖ת שַׁדַּ֣י יִשְׁתֶּֽה׃
translation:
  text: Let his own eyes see his ruin[b][a], and let him drink from the wrath of the Almighty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'His eyes will see his calamity, and he will drink from the wrath of the Almighty.' The Hebrew imperfects can be read predictively rather than as a wish.
    reason: alternative_reading
  - marker: b
    text: '''His ruin'' may also be rendered ''his calamity'' or ''his disaster.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאוּ
  chosen: Let ... see
  alternatives:
  - they will see
  - may ... see
  lexicon: HALOT
  rationale: 'Qal imperfect 3mp of ראה with plural subject ''his eyes.'' In English, ''his eyes'' naturally takes singular sense as a collective body part, so the clause is rendered idiomatically as a jussive-like wish: ''Let his own eyes see.'' This fits the surrounding context of Job''s imprecation/desire that the wicked personally experience judgment.'
- source_word: עֵינָיו
  chosen: his own eyes
  alternatives:
  - his eyes
  lexicon: HALOT
  rationale: The noun with 3ms suffix is straightforwardly 'his eyes.' 'Own' is added for emphasis because the Hebrew fronting and possessive stress the wicked person's personal experience of the consequence.
- source_word: כִּידוֹ
  chosen: his ruin
  alternatives:
  - his calamity
  - his disaster
  - his destruction
  lexicon: HALOT
  rationale: The noun כיד commonly denotes disaster, ruin, or calamity. 'Ruin' is concise and natural here, expressing the downfall that the wicked should personally witness. 'Destruction' is possible but slightly stronger and can imply annihilation more than the Hebrew requires.
- source_word: וּמֵחֲמַת
  chosen: and ... from the wrath of
  alternatives:
  - and from the fury of
  - and from the venom/poison of
  lexicon: HALOT
  rationale: חֵמָה can mean wrath, fury, or in some contexts venom/poison. With 'drink' and divine judgment, the idiom strongly supports 'drink from the wrath of' as a metaphor for undergoing punitive judgment. The prefixed preposition מִן is retained with 'from.'
- source_word: שַׁדַּי
  chosen: the Almighty
  alternatives: []
  lexicon: HALOT
  rationale: Standard rendering of the divine title שדי in Job. It preserves the title's force without importing a more specific theological nuance than the Hebrew states.
- source_word: יִשְׁתֶּה
  chosen: let him drink
  alternatives:
  - he will drink
  - may he drink
  lexicon: HALOT
  rationale: 'Qal imperfect 3ms of שתה, here parallel to the first clause and best taken as a jussive-like expression: Job''s wish that the wicked himself experience divine wrath. ''Drink'' preserves the metaphor of imbibing judgment rather than flattening it to ''experience.'''
