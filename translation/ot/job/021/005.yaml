id: JOB.21.5
reference: Job 21:5
source:
  edition: WLC
  text: פְּנוּ אֵלַ֥/י וְ/הָשַׁ֑מּוּ וְ/שִׂ֖ימוּ יָ֣ד עַל פֶּֽה־־׃
translation:
  text: Turn to me and be appalled, and put your hand over your mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be astonished.' The Hebrew verb can denote being stunned, appalled,
      or desolated; here it expresses shocked reaction.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּנוּ
  chosen: Turn
  alternatives:
  - Look
  - Turn yourselves
  lexicon: HALOT
  rationale: Imperative plural of פנה, here meaning to turn one's attention or face
    toward someone. 'Turn to me' preserves the direct, urgent address better than
    the looser 'look at me,' while remaining natural English.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - toward me
  lexicon: HALOT
  rationale: The preposition אֶל with 1cs suffix indicates direction toward the speaker.
    'To me' is idiomatic in English after 'turn.'
- source_word: וְהָשַׁמּוּ
  chosen: and be appalled
  alternatives:
  - and be astonished
  - and be desolate
  lexicon: HALOT
  rationale: From שׁמם in the Hiphil imperative plural, often conveying being appalled
    or stunned. In this context of shocked reaction to Job's case, 'be appalled' best
    captures the emotional force more precisely than the broader 'be astonished.'
- source_word: וְשִׂימוּ
  chosen: and put
  alternatives:
  - and place
  - and lay
  lexicon: HALOT
  rationale: Common imperative of שׂים, 'put/place/set.' 'Put' is the most natural
    modern English choice in the idiom that follows.
- source_word: יָד
  chosen: your hand
  alternatives:
  - a hand
  lexicon: HALOT
  rationale: 'Although the Hebrew noun lacks an explicit possessive suffix, English
    idiom in this expression normally supplies the implied possessive with a second-person
    imperative: ''put your hand over your mouth.'' This reflects the addressees''
    own hand.'
- source_word: עַל פֶּה
  chosen: over your mouth
  alternatives:
  - upon the mouth
  - on your mouth
  lexicon: HALOT
  rationale: The phrase 'hand over the mouth' is a conventional gesture of silence
    or stunned restraint. Rendering פֶּה as 'mouth' is straightforward; 'over your
    mouth' is more idiomatic than the formally literal 'upon the mouth.'
