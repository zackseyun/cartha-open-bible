theological_decisions:
- issue: Referent of רָמִים
  chosen_reading: an intentionally broad reference to 'those on high' rather than specifying heavenly beings or earthly rulers
  alternative_readings:
  - he judges the heavenly beings
  - he judges the exalted/rulers
  rationale: The Hebrew permits a general substantive sense, and the context emphasizes God's superiority over all who are high. Preserving the broader phrase avoids importing a narrower cosmology or political reading not demanded by the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
