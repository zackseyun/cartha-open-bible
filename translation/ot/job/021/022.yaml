id: JOB.21.22
reference: Job 21:22
source:
  edition: WLC
  text: הַ/לְ/אֵ֥ל יְלַמֶּד דָּ֑עַת וְ֝/ה֗וּא רָמִ֥ים יִשְׁפּֽוֹט־׃
translation:
  text: Can anyone teach God knowledge[a], since he judges those on high?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the exalted ones'; possibly 'the heavenly beings.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַלְאֵל
  chosen: Can anyone teach God
  alternatives:
  - Can one teach God
  - Shall God be taught
  lexicon: HALOT
  rationale: The prefixed interrogative הֲ with לְאֵל introduces a rhetorical question. English idiom requires supplying an indefinite subject ('anyone/one') with 'teach God' rather than a wooden 'to God will he teach.' 'God' is the plain sense of אֵל here.
- source_word: יְלַמֶּד
  chosen: teach
  alternatives:
  - instruct
  lexicon: HALOT
  rationale: Piel of למד commonly means 'teach/instruct.' 'Teach' is the most direct and natural rendering in this rhetorical question.
- source_word: דָּעַת
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT
  rationale: דעת denotes knowledge/understanding. 'Knowledge' fits the collocation 'teach ... knowledge' and preserves the abstract noun.
- source_word: וְהוּא
  chosen: since he
  alternatives:
  - while he
  - and he
  lexicon: HALOT
  rationale: 'The conjunction with pronoun can be rendered simply ''and he,'' but in context it gives the ground for the rhetorical question: no one can teach God, since he is the one who judges. ''Since he'' brings out the logical relation in readable English without over-paraphrasing.'
- source_word: רָמִים
  chosen: those on high
  alternatives:
  - the exalted ones
  - the high ones
  - heights
  lexicon: HALOT
  rationale: The masculine plural adjective/substantive from רום most naturally refers to exalted beings/persons rather than abstract 'heights' here. 'Those on high' preserves the ambiguity between earthly exalted ones and heavenly beings better than the more interpretive 'the exalted ones.'
- source_word: יִשְׁפּוֹט
  chosen: judges
  alternatives:
  - governs
  - passes judgment on
  lexicon: HALOT
  rationale: שפט in Qal means 'judge.' 'Judges' is the straightforward rendering and fits the argument about God's supreme authority.
