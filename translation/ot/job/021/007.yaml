id: JOB.21.7
reference: Job 21:7
source:
  edition: WLC
  text: מַדּ֣וּעַ רְשָׁעִ֣ים יִחְי֑וּ עָ֝תְק֗וּ גַּם גָּ֥בְרוּ חָֽיִל־׃
translation:
  text: Why do the wicked live on, grow old, and even become mighty in wealth?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'become mighty in power/strength'; the Hebrew חָיִל can denote wealth,
      resources, strength, or military power.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - Why is it that
  lexicon: HALOT
  rationale: Interrogative adverb introducing Job's protest question. Simple 'Why'
    preserves the force without adding explanatory wording.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: Standard rendering for רשעים in wisdom literature, referring to morally
    wicked persons rather than merely legally guilty ones.
- source_word: יִחְיוּ
  chosen: live on
  alternatives:
  - live
  - continue to live
  lexicon: HALOT
  rationale: The imperfect here expresses ongoing continuance in life in the face
    of expected judgment. 'Live on' captures the rhetorical complaint better than
    the flatter 'live'.
- source_word: עָתְקוּ
  chosen: grow old
  alternatives:
  - advance in years
  - become prominent
  lexicon: HALOT
  rationale: In this context, alongside 'live on' and 'become mighty in wealth,' the
    sense is progression into old age/prosperity. 'Grow old' is the most natural English
    expression of the likely contextual meaning.
- source_word: גַּם
  chosen: and even
  alternatives:
  - even
  - also
  lexicon: HALOT
  rationale: 'Adds emphatic escalation to the sequence: they live, they grow old,
    and beyond that they even attain strength/prosperity.'
- source_word: גָּבְרוּ
  chosen: become mighty
  alternatives:
  - grow strong
  - prevail
  lexicon: HALOT
  rationale: Conveys increase in strength or power. 'Become mighty' fits the completed
    aspect and pairs well with the following noun.
- source_word: חָיִל
  chosen: in wealth
  alternatives:
  - in power
  - in substance
  - in strength
  lexicon: HALOT
  rationale: חיל can denote strength, wealth, or resources. In this wisdom context
    describing the prosperity of the wicked, 'wealth' best captures the concrete form
    of their might. The broader sense 'power' remains possible and is preserved in
    a footnote.
