id: JOB.21.18
reference: Job 21:18
source:
  edition: WLC
  text: יִהְי֗וּ כְּ/תֶ֥בֶן לִ/פְנֵי ר֑וּחַ וּ֝/כְ/מֹ֗ץ גְּנָבַ֥תּ/וּ סוּפָֽה־׃
translation:
  text: May they be like straw before the wind, and like chaff that a storm carries
    away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like chaff that a storm steals away' or 'snatches away.' The Hebrew
      verb literally means 'steals,' used poetically for sudden removal.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִהְיוּ
  chosen: May they be
  alternatives:
  - They are
  - Let them be
  lexicon: HALOT
  rationale: The imperfect of היה here functions in a jussive-like or wish/comparison
    context within Job's rhetorical speech. 'May they be' best captures the force
    in English. 'They are' would flatten the modal nuance, while 'Let them be' is
    possible but sounds more like a direct command than a rhetorical wish or assertion
    of fitting destiny.
- source_word: כְּתֶבֶן
  chosen: like straw
  alternatives:
  - like stubble
  lexicon: HALOT
  rationale: תבן commonly denotes straw, the dry stalk residue. 'Straw' is the most
    natural modern English equivalent. 'Stubble' can overlap semantically but more
    often suggests what remains rooted in the field after harvest, which is less precise
    here.
- source_word: לִפְנֵי רוּחַ
  chosen: before the wind
  alternatives:
  - in the face of the wind
  - before a wind
  lexicon: HALOT
  rationale: The idiom conveys exposure to the force of wind, as something driven
    before it. 'Before the wind' is idiomatic and preserves the Hebrew image. The
    anarthrous רוּחַ does not require an indefinite article in English.
- source_word: וּכְמֹץ
  chosen: and like chaff
  alternatives:
  - and like husks
  lexicon: HALOT
  rationale: מֹץ refers to chaff, the light refuse separated from grain. 'Chaff' is
    the standard and most accurate rendering in this poetic image of the wicked's
    instability and removal.
- source_word: גְּנָבַתּוּ
  chosen: carries away
  alternatives:
  - steals away
  - snatches away
  - has stolen away
  lexicon: HALOT
  rationale: From גנב, literally 'to steal,' but in this poetic collocation with storm
    the sense is that the storm snatches or sweeps something away. 'Carries away'
    communicates the image clearly in natural English without over-literal awkwardness.
    The more literal 'steals away' is worth preserving as an alternative because it
    reflects the verb's core sense.
- source_word: סוּפָה
  chosen: a storm
  alternatives:
  - the storm
  - a whirlwind
  - a tempest
  lexicon: HALOT
  rationale: סוּפָה denotes a storm or tempest. 'A storm' is clear, natural, and broad
    enough for the Hebrew term. 'Whirlwind' is possible in some contexts but is narrower
    than the Hebrew here.
