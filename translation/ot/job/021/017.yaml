id: JOB.21.17
reference: Job 21:17
source:
  edition: WLC
  text: כַּ/מָּ֤ה נֵר רְשָׁ֘עִ֤ים יִדְעָ֗ךְ וְ/יָבֹ֣א עָלֵ֣י/מוֹ אֵידָ֑/ם חֲ֝בָלִ֗ים
    יְחַלֵּ֥ק בְּ/אַפּֽ/וֹ׀־׃
translation:
  text: How often is the lamp of the wicked put out, and does their disaster come
    upon them? Does he apportion sorrows in his anger?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'How many times is the lamp of the wicked extinguished...?' The Hebrew
      question is rhetorical, challenging the idea that the wicked are regularly judged
      in this way.
    reason: lexical_alternative
  - marker: b
    text: '''Lamp'' is a metaphor for a person''s life, prosperity, or continuing
      fortune.'
    reason: cultural_note
  - marker: c
    text: Or 'Does he apportion pains' or 'birth pangs' in his anger?' The Hebrew
      noun can carry several related senses.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּמָּה
  chosen: How often
  alternatives:
  - How many times
  - How seldom
  lexicon: HALOT
  rationale: In this context the interrogative introduces a rhetorical question about
    frequency, not quantity. 'How often' best captures the idiomatic force in English.
    Because Job is challenging a claim that judgment regularly befalls the wicked,
    the sense is effectively 'how often does this really happen?' rather than a simple
    count.
- source_word: נֵר
  chosen: lamp
  alternatives:
  - light
  lexicon: HALOT
  rationale: נֵר literally denotes a lamp. In wisdom literature it often functions
    metaphorically for prosperity or life-condition. 'Lamp' preserves the Hebrew image
    while allowing the metaphor to stand.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: A standard rendering for the plural substantive adjective/noun in wisdom
    contexts. 'The wicked' is concise and idiomatic.
- source_word: יִדְעָךְ
  chosen: is put out
  alternatives:
  - goes out
  - is extinguished
  lexicon: HALOT
  rationale: From דעך, used of a lamp being extinguished. The passive-like English
    'is put out' fits the rhetorical question and reads naturally with 'lamp.' 'Goes
    out' is possible, but 'is put out' slightly better reflects the event of extinguishing.
- source_word: וְיָבֹא עָלֵימוֹ אֵידָם
  chosen: does their disaster come upon them
  alternatives:
  - and their calamity comes upon them
  - and ruin comes on them
  lexicon: HALOT
  rationale: אֵיד denotes disaster/calamity/ruin. 'Disaster' is clear modern English.
    The phrase is rendered as a natural English clause while preserving the Hebrew
    sense of calamity overtaking them.
- source_word: חֲבָלִים
  chosen: sorrows
  alternatives:
  - pains
  - birth pangs
  - portions
  lexicon: HALOT
  rationale: The noun can denote pains, cords, or pangs depending on context. Here,
    in parallel with disaster and divine anger, it likely refers to painful afflictions
    apportioned as judgment. 'Sorrows' is broad and readable, though 'pains' is also
    possible.
- source_word: יְחַלֵּק
  chosen: apportion
  alternatives:
  - divide out
  - distribute
  - allot
  lexicon: HALOT
  rationale: The Piel of חלק commonly means divide/distribute/apportion. 'Apportion'
    fits the judicial sense of assigning a measured lot.
- source_word: בְּאַפּוֹ
  chosen: in his anger
  alternatives:
  - in his wrath
  - while angry
  lexicon: HALOT
  rationale: אַף in this idiom means anger/wrath. 'In his anger' is straightforward
    and avoids overly archaic diction. The pronominal suffix is best taken as referring
    to God in context, matching the broader argument about divine judgment.
