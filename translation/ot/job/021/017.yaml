theological_decisions:
- issue: Referent of the third-person singular in 'he apportion[s] in his anger'
  chosen_reading: The subject is left as 'he' in English, with the sense referring
    to God from context rather than being explicitly supplied as 'God.'
  alternative_readings:
  - An impersonal reading
  - Explicitly supplying 'God' as the subject
  rationale: The Hebrew leaves the subject implicit in the verb. Context strongly
    suggests God as the one who would apportion calamities in anger, but the text
    does not name him in this clause. To avoid importing more explicitness than the
    source provides, the translation preserves 'he.'
  doctrine_reference: Translation philosophy §1, §3
