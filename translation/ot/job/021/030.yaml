theological_decisions:
- issue: Interpretive sense of the verse in relation to divine judgment
  chosen_reading: The verse states that the wicked are spared from immediate disaster
    and reserved for a future day of wrath.
  alternative_readings:
  - The wicked are kept away from experiencing the day of disaster altogether
  - The wicked are brought out to face the day of wrath immediately
  rationale: The paired temporal phrases with לְיוֹם and the verbs 'is spared' and
    'are led away' most naturally express postponement or reservation for future judgment,
    fitting Job's argument that the wicked often do not suffer promptly in this life.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
