id: JOB.21.30
reference: Job 21:30
source:
  edition: WLC
  text: כִּ֤י לְ/י֣וֹם אֵ֭יד יֵחָ֣שֶׂךְ רָ֑ע לְ/י֖וֹם עֲבָר֣וֹת יוּבָֽלוּ׃
translation:
  text: For the evil man is spared for the day of disaster; they are led away for
    the day of wrath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wicked man is kept back for the day of disaster.' The Hebrew verb
      can mean 'is spared,' 'is withheld,' or 'is reserved.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they are brought forth for the day of wrath.' The final verb may be
      understood as being led or brought to that day.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - That
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding claim. 'For' best
    preserves the argumentative connection in context.
- source_word: לְיוֹם אֵיד
  chosen: for the day of disaster
  alternatives:
  - for the day of calamity
  - until the day of ruin
  lexicon: HALOT
  rationale: The preposition ל with 'day' here is best taken as reference to a future
    time. אֵיד denotes disaster, calamity, or ruin. 'Day of disaster' is natural English
    and preserves the temporal sense.
- source_word: יֵחָשֶׂךְ
  chosen: is spared
  alternatives:
  - is kept back
  - is reserved
  - is withheld
  lexicon: HALOT
  rationale: Niphal of חשׂך can mean 'be spared' or 'be kept back/withheld.' In context,
    Job is saying the wicked are not immediately judged but are preserved from present
    reckoning until a future day. 'Is spared' communicates that sense clearly in English.
- source_word: רָע
  chosen: the evil man
  alternatives:
  - the wicked man
  - the evil one
  - the wicked
  lexicon: HALOT
  rationale: The singular adjective functions substantivally for a wicked/evil person.
    'The evil man' keeps the singular force and remains gender-accurate to the Hebrew
    form, though it has representative force.
- source_word: לְיוֹם עֲבָרוֹת
  chosen: for the day of wrath
  alternatives:
  - for the day of outbursts of wrath
  - for the day of fury
  - for the day of overflowing wrath
  lexicon: HALOT
  rationale: עֲבָרוֹת is the plural of a noun associated with rage, overflow, or wrath.
    The plural likely intensifies rather than requiring a wooden plural in English.
    'Day of wrath' is idiomatic and preserves the judicial sense.
- source_word: יוּבָלוּ
  chosen: they are led away
  alternatives:
  - they are brought forth
  - they are carried off
  - they are conducted
  lexicon: HALOT
  rationale: Hophil of יבל means 'be brought/carried/led.' The verb is plural, creating
    a shift from the singular 'evil man.' 'They are led away' preserves the Hebrew
    plural without over-specifying whether the subject is wicked people generally
    or such persons collectively.
