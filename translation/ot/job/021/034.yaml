id: JOB.21.34
reference: Job 21:34
source:
  edition: WLC
  text: וְ֭/אֵיךְ תְּנַחֲמ֣וּ/נִי הָ֑בֶל וּ֝/תְשֽׁוּבֹתֵי/כֶ֗ם נִשְׁאַר מָֽעַל־׃ס
translation:
  text: How then can you comfort me with emptiness[a], when your answers remain nothing but treachery?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'How can you comfort me in vain, when your answers are left as treachery?'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵיךְ
  chosen: How then
  alternatives:
  - How
  - And how
  lexicon: HALOT
  rationale: Interrogative adverb introducing Job's rhetorical question. 'Then' brings out the connective force of waw in context without overtranslating.
- source_word: תְּנַחֲמוּנִי
  chosen: can you comfort me
  alternatives:
  - do you comfort me
  - will you comfort me
  lexicon: HALOT
  rationale: Piel of נחם with 1cs suffix means 'comfort/console me.' English modal 'can' fits the rhetorical challenge implied by the question.
- source_word: הָבֶל
  chosen: with emptiness
  alternatives:
  - in vain
  - with vanity
  - with emptiness/emptiness
  lexicon: HALOT
  rationale: הבל commonly denotes emptiness, vanity, or futility. Here it describes the substance of the friends' attempted comfort; 'with emptiness' preserves the noun's force better than the adverbial 'in vain,' which could suggest failed effort rather than empty content.
- source_word: וּתְשׁוּבוֹתֵיכֶם
  chosen: your answers
  alternatives:
  - your replies
  - your responses
  lexicon: HALOT
  rationale: From תשובה, 'answer/reply/response.' 'Answers' is concise and natural in context, referring to the friends' speeches.
- source_word: נִשְׁאַר
  chosen: remain
  alternatives:
  - is left
  - remains over
  lexicon: HALOT
  rationale: Niphal of שׁאר means 'remain, be left.' Singular verb with a plural-form subject can be understood collectively; English plural predicate with 'answers' is idiomatic.
- source_word: מָעַל
  chosen: nothing but treachery
  alternatives:
  - treachery
  - unfaithfulness
  - deceit
  lexicon: HALOT
  rationale: מעל denotes unfaithfulness, breach of trust, or treachery. In this context Job charges his friends' replies with faithless betrayal rather than mere factual error. 'Nothing but treachery' captures both the predicate force after נִשְׁאַר and the severity of the accusation.
