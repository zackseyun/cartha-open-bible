id: JOB.21.16
reference: Job 21:16
source:
  edition: WLC
  text: הֵ֤ן לֹ֣א בְ/יָדָ֣/ם טוּבָ֑/ם עֲצַ֥ת רְ֝שָׁעִ֗ים רָ֣חֲקָה מֶֽ/נִּי׃
translation:
  text: Behold, is not their prosperity in their own hand? The counsel of the wicked
    is far from me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Look, their prosperity is not in their hand.' The Hebrew may be read
      as a direct negation rather than a rhetorical question.
    reason: alternative_reading
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces an emphatic assertion or attention-getter. 'Look' is natural
    modern English and preserves the discourse force better than the more archaic
    'behold.'
- source_word: לֹא
  chosen: is not
  alternatives:
  - not
  lexicon: HALOT
  rationale: 'Rendered together with the following nominal clause as an English rhetorical
    question/negative assertion: ''is not their prosperity...?'' This reflects the
    syntax and common interpretation of the verse in context.'
- source_word: בְיָדָם
  chosen: in their own hand
  alternatives:
  - in their hand
  - under their control
  - by their hand
  lexicon: HALOT
  rationale: Literally 'in their hand.' The idiom conveys possession or control. 'In
    their own hand' keeps the Hebrew image while making the implied reflexive force
    clear in English.
- source_word: טוּבָם
  chosen: their prosperity
  alternatives:
  - their good
  - their well-being
  - their wealth
  lexicon: HALOT
  rationale: טוּב can mean 'goodness,' 'good,' or concretely 'prosperity/well-being.'
    In Job 21's context of the apparent flourishing of the wicked, 'prosperity' best
    captures the sense.
- source_word: עֲצַת
  chosen: the counsel
  alternatives:
  - the plan
  - the advice
  - the scheme
  lexicon: HALOT
  rationale: The noun denotes counsel, advice, or plan. 'Counsel' preserves the lexical
    range and matches common biblical usage without over-specifying whether the sense
    is internal plan or received advice.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - evildoers
  lexicon: HALOT
  rationale: Standard rendering for the plural adjective/substantive. 'The wicked'
    is concise and idiomatic in biblical English.
- source_word: רָחֲקָה מֶנִּי
  chosen: is far from me
  alternatives:
  - be far from me
  - has been far from me
  lexicon: HALOT
  rationale: The perfect feminine singular agrees with 'counsel' and expresses distance/rejection.
    'Is far from me' is idiomatic and fits Job's disavowal of the wicked's counsel.
