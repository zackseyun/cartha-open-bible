theological_decisions:
- issue: Whether the first clause should be rendered as a rhetorical question or as
    a flat negation/assertion
  chosen_reading: 'Rendered as a rhetorical question: ''is not their prosperity in
    their own hand?'''
  alternative_readings:
  - '''Behold, their prosperity is not in their hand'''
  rationale: The Hebrew consonantal text can be taken straightforwardly as 'Look,
    not in their hand is their good/prosperity,' which some understand as Job's corrective
    acknowledgment that the wicked do not ultimately control their prosperity. However,
    in the immediate context and in longstanding interpretation, the line is commonly
    taken rhetorically, fitting Job's description of the wicked as appearing secure
    and self-determining. This reading also coheres with the following disavowal,
    'The counsel of the wicked is far from me,' which Job has already used similarly
    (cf. Job 22:18). Because the alternative is viable and significant, it is preserved
    in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it; preserve genuine ambiguity in a footnote.'
