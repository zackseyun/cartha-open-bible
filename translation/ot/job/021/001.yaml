id: JOB.21.1
reference: Job 21:1
source:
  edition: WLC
  text: וַ/יַּ֥עַן אִיּ֗וֹב וַ/יֹּאמַֽר׃
translation:
  text: 'Then Job answered and said:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: The verb ענה in the qal with a speaking formula commonly means 'answer'
    or 'respond.' 'Answered' preserves the conventional dialogic sense and fits the
    narrative formula introducing Job's speech.
- source_word: אִיּוֹב
  chosen: Job
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: אמר in this narrative sequence is the standard speech-introduction verb.
    Rendering it as 'and said' preserves the Hebrew formula without unnecessary paraphrase.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  rationale: The prefixed waw on the opening verb marks narrative progression. 'Then'
    gives natural modern English while preserving sequential force better than a bare
    initial 'And' in this context.
