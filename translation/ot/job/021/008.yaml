id: JOB.21.8
reference: Job 21:8
source:
  edition: WLC
  text: זַרְעָ֤/ם נָכ֣וֹן לִ/פְנֵי/הֶ֣ם עִמָּ֑/ם וְ֝/צֶאֱצָאֵי/הֶ֗ם לְ/עֵינֵי/הֶֽם׃
translation:
  text: Their offspring are established before them[a], with them, and their descendants before their eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Their offspring are secure before them, and their descendants in their sight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זַרְעָם
  chosen: their offspring
  alternatives:
  - their seed
  - their children
  lexicon: HALOT
  rationale: זֶרַע commonly denotes seed/offspring/descendants. In this context of family prosperity, 'offspring' best captures collective posterity in natural English without narrowing to only young children.
- source_word: נָכוֹן
  chosen: are established
  alternatives:
  - are secure
  - stand firm
  lexicon: HALOT
  rationale: The passive participial/adjectival form conveys being fixed, established, or secure. 'Are established' preserves the stative sense and fits the prosperity context; 'are secure' is possible but slightly more interpretive.
- source_word: לִפְנֵיהֶם
  chosen: before them
  alternatives:
  - in their presence
  lexicon: HALOT
  rationale: Literally 'before them.' This likely indicates that they live to see their offspring thriving. The more formal 'before them' preserves the Hebrew image while remaining intelligible.
- source_word: עִמָּם
  chosen: with them
  alternatives:
  - beside them
  - among them
  lexicon: HALOT
  rationale: The preposition עִם straightforwardly means 'with.' Retaining it reflects the Hebrew emphasis that the offspring are not only seen but remain present with the wicked.
- source_word: וְצֶאֱצָאֵיהֶם
  chosen: and their descendants
  alternatives:
  - and their issue
  - and their posterity
  lexicon: HALOT
  rationale: צֶאֱצָאִים refers to descendants/progeny. 'Descendants' is clear modern English and distinguishes this second term from the earlier collective 'offspring' while preserving the parallelism.
- source_word: לְעֵינֵיהֶם
  chosen: before their eyes
  alternatives:
  - in their sight
  lexicon: HALOT
  rationale: Literally 'to/before their eyes,' an idiom for direct personal observation. 'Before their eyes' preserves the vividness and parallelism with 'before them.'
