theological_decisions:
- issue: Nature of divine action implied by 'the rod of God'
  chosen_reading: Retain the metaphor 'rod of God' without specifying whether it means
    punishment, discipline, or affliction.
  alternative_readings:
  - the punishment of God
  - the discipline of God
  - God's scourge
  rationale: The Hebrew metaphor is broad enough to include divine striking, chastisement,
    or affliction. To translate it with a more specific theological category would
    resolve ambiguity the text leaves open. Preserving 'rod' maintains the poetic
    and theological tension.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
