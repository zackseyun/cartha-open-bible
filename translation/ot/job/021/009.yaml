id: JOB.21.9
reference: Job 21:9
source:
  edition: WLC
  text: בָּתֵּי/הֶ֣ם שָׁל֣וֹם מִ/פָּ֑חַד וְ/לֹ֤א שֵׁ֖בֶט אֱל֣וֹהַּ עֲלֵי/הֶֽם׃
translation:
  text: Their houses are safe from fear, and the rod of God is not upon them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Their households are secure from fear.'
    reason: lexical_alternative
  - marker: b
    text: '''The rod of God'' is a figure for God''s striking, discipline, or affliction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּתֵּיהֶם
  chosen: their houses
  alternatives:
  - their households
  lexicon: HALOT
  rationale: The construct plural of בַּיִת literally means 'their houses.' In context
    it can extend to the household sphere, but the concrete 'houses' is natural English
    and preserves the Hebrew image without unnecessary abstraction.
- source_word: שָׁלוֹם
  chosen: safe
  alternatives:
  - at peace
  - secure
  - whole
  lexicon: HALOT
  rationale: Here שָׁלוֹם describes the condition of their houses in relation to danger.
    'Safe' best captures the contextual sense of well-being/security in idiomatic
    English, especially with the following phrase 'from fear.'
- source_word: מִפָּחַד
  chosen: from fear
  alternatives:
  - without fear
  - from dread
  - from terror
  lexicon: HALOT
  rationale: The preposition מִן with פַּחַד expresses separation from or freedom
    from fear/dread. 'From fear' is a close and natural rendering; 'without fear'
    is possible but slightly more interpretive.
- source_word: שֵׁבֶט
  chosen: rod
  alternatives:
  - staff
  - scepter
  - club
  lexicon: HALOT
  rationale: שֵׁבֶט can denote rod, staff, scepter, or tribe depending on context.
    Here, with 'of God ... upon them,' it is a figurative instrument of striking or
    discipline. 'Rod' preserves the metaphor and avoids over-specifying whether the
    emphasis is punishment or authority.
- source_word: אֱלוֹהַּ
  chosen: God
  alternatives:
  - God Almighty
  lexicon: HALOT
  rationale: אֱלוֹהַּ is a common singular poetic form for God in Job. 'God' is the
    straightforward equivalent; there is no basis here for expanding it to a more
    interpretive title.
- source_word: עֲלֵיהֶם
  chosen: upon them
  alternatives:
  - on them
  - over them
  lexicon: HALOT
  rationale: The preposition עַל in this idiom naturally means 'upon' in the sense
    of something resting or coming against them. 'Upon them' preserves the elevated
    poetic force and fits the image of the rod not resting on them.
- source_word: וְלֹא
  chosen: and ... not
  alternatives:
  - nor
  lexicon: HALOT
  rationale: The conjunction plus negation coordinates the second clause with the
    first. English can render this as 'and ... not' or 'nor.' 'And the rod of God
    is not upon them' is slightly more explicit and readable in modern English.
