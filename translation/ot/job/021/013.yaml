theological_decisions:
- issue: Rendering of שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  - death
  rationale: The verse refers to the destination of the dead in Hebrew thought without
    requiring a later, more developed doctrinal term such as 'hell.' Transliteration
    preserves the theological and conceptual openness of the Hebrew term.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; original-language primacy over translation tradition.'
