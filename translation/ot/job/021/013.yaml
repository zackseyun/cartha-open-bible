id: JOB.21.13
reference: Job 21:13
source:
  edition: WLC
  text: יבלו בַ/טּ֣וֹב יְמֵי/הֶ֑ם וּ֝/בְ/רֶ֗גַע שְׁא֣וֹל יֵחָֽתּוּ׃
translation:
  text: They spend their days in prosperity, and in a moment they go down to Sheol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the grave,' 'the realm of the dead,' or 'death.' The Hebrew is Sheol.
    reason: lexical_alternative
lexical_decisions:
- source_word: יבלו
  chosen: they spend
  alternatives:
  - they wear out
  - they pass
  - they complete
  lexicon: HALOT
  rationale: From בלה in the Piel, the sense here is that their days are used up or
    passed along. In idiomatic English, 'spend their days' best captures the temporal
    idea with natural style, better than the more wooden 'wear out their days.'
- source_word: בַטּוֹב
  chosen: in prosperity
  alternatives:
  - in good
  - in well-being
  - in happiness
  lexicon: HALOT
  rationale: טוֹב literally means 'good,' but with the preposition and in this context
    of the wicked enjoying ease, it denotes a state of well-being or prosperity. 'In
    prosperity' communicates the contextual sense clearly.
- source_word: יְמֵיהֶם
  chosen: their days
  lexicon: HALOT
  rationale: A straightforward rendering of 'their days,' preserving the Hebrew temporal
    expression.
- source_word: וּבְרֶגַע
  chosen: and in a moment
  alternatives:
  - and suddenly
  - and in an instant
  lexicon: HALOT
  rationale: רֶגַע denotes a brief moment or instant. 'In a moment' preserves the
    noun form and the contrast with a whole lifetime of prosperity.
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  - death
  lexicon: HALOT
  rationale: Sheol is best transliterated here to preserve the Hebrew concept rather
    than collapsing it into 'grave' or 'death,' each of which narrows the term. This
    maintains transparency to the source text.
- source_word: יֵחָתּוּ
  chosen: they go down
  alternatives:
  - they descend
  - they are brought down
  - they are shattered
  lexicon: HALOT
  rationale: Given the parallel with שְׁאוֹל, the verb is best understood in the sense
    of descending to the underworld/death. 'Go down' is idiomatic and fits the imagery.
    More literal alternatives are possible, but 'are shattered' would not fit the
    immediate collocation as well.
