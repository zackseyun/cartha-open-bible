id: JOB.21.6
reference: Job 21:6
source:
  edition: WLC
  text: וְ/אִם זָכַ֥רְתִּי וְ/נִבְהָ֑לְתִּי וְ/אָחַ֥ז בְּ֝שָׂרִ֗/י פַּלָּצֽוּת־׃
translation:
  text: If I remember, I am dismayed, and trembling seizes my flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If I remember, I am dismayed'; the Hebrew conjunction can be read conditionally
      ('if') or temporally ('when').
    reason: alternative_reading
  - marker: b
    text: Or 'horror seizes my flesh' or 'shuddering takes hold of my flesh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: When
  alternatives:
  - If
  - And if
  lexicon: HALOT
  rationale: 'Although אִם commonly means ''if,'' in poetic context it can introduce
    a temporal or conditional-cum-temporal clause. Here the sense is not a hypothetical
    condition but the occasion of Job''s reaction: ''when I remember.'' This fits
    the parallel verbs that describe his actual response.'
- source_word: זָכַרְתִּי
  chosen: I remember
  alternatives:
  - I remembered
  - I think of it
  lexicon: HALOT
  rationale: The Hebrew perfect can be rendered with an English present in gnomic
    or vivid poetic speech where the action is presented as a recurring reality. 'I
    remember' reads naturally with the following present 'I am dismayed' and reflects
    Job's immediate reaction.
- source_word: וְנִבְהָלְתִּי
  chosen: I am dismayed
  alternatives:
  - I am terrified
  - I am disturbed
  - I was dismayed
  lexicon: HALOT
  rationale: The Niphal of בהל conveys being disturbed, alarmed, or dismayed. 'Dismayed'
    preserves the emotional shock without overstating to sheer terror, and matches
    the reflective tone of the verse.
- source_word: וְאָחַז
  chosen: seizes
  alternatives:
  - takes hold of
  - grasps
  lexicon: HALOT
  rationale: 'The verb אחז means ''to seize, grasp, take hold.'' Because the subject
    follows (''trembling''), English idiom is best served by ''seizes,'' yielding
    a natural clause: ''trembling seizes my flesh.'''
- source_word: בְּשָׂרִי
  chosen: my flesh
  alternatives:
  - my body
  lexicon: HALOT
  rationale: בשר literally means 'flesh.' In this context it refers to Job's physical
    being. 'My flesh' preserves the concrete Hebrew imagery better than the more interpretive
    'my body.'
- source_word: פַּלָּצוּת
  chosen: trembling
  alternatives:
  - horror
  - shuddering
  - terror
  lexicon: HALOT
  rationale: The noun denotes a state of dread or shuddering. 'Trembling' fits the
    bodily imagery with 'my flesh' and avoids importing a more abstract emotional
    term alone. The sense is that physical shuddering grips him.
