id: JOB.21.11
reference: Job 21:11
source:
  edition: WLC
  text: יְשַׁלְּח֣וּ כַ֭/צֹּאן עֲוִילֵי/הֶ֑ם וְ֝/יַלְדֵי/הֶ֗ם יְרַקֵּדֽוּ/ן׃
translation:
  text: They send out their little ones like a flock, and their children dance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like sheep.' The Hebrew צֹאן can refer collectively to sheep or small
      livestock.
    reason: lexical_alternative
  - marker: b
    text: Or 'their infants.' The Hebrew term refers to very young children; 'little
      ones' is chosen to preserve the youthful sense without implying only newborns.
    reason: lexical_alternative
  - marker: c
    text: Or 'skip about' or 'leap.' The Hebrew verb suggests lively, joyful movement.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְשַׁלְּחוּ
  chosen: they send out
  alternatives:
  - they let loose
  - they send forth
  lexicon: HALOT
  rationale: Piel of שלח commonly means 'send out/away.' In this context of prosperous
    households releasing children freely, 'send out' is natural modern English and
    preserves the active sense without overinterpreting.
- source_word: כַצֹּאן
  chosen: like a flock
  alternatives:
  - like sheep
  lexicon: HALOT
  rationale: The noun צֹאן denotes small livestock, especially sheep/goats collectively.
    Because the prefixed כ marks comparison and English idiom works well with a collective
    image, 'like a flock' better conveys the massed, lively movement than the more
    individualizing 'like sheep.'
- source_word: עֲוִילֵיהֶם
  chosen: their little ones
  alternatives:
  - their children
  - their infants
  lexicon: HALOT
  rationale: The noun עויל refers to very young children. 'Little ones' preserves
    the diminutive sense better than the broader 'children,' while avoiding the overly
    narrow 'infants,' since the next colon mentions children old enough to dance.
- source_word: יַלְדֵיהֶם
  chosen: their children
  alternatives:
  - their sons
  - their offspring
  lexicon: HALOT
  rationale: ילד in this nominal form broadly denotes children/offspring. 'Children'
    is the most natural and contextually fitting rendering, especially in parallel
    with 'their little ones' in the first colon.
- source_word: יְרַקֵּדוּן
  chosen: dance
  alternatives:
  - skip about
  - leap
  lexicon: HALOT
  rationale: The verb רקד denotes lively movement such as dancing or skipping. 'Dance'
    best fits contemporary English and the celebratory picture of carefree prosperity
    in Job 21, while 'skip about' is preserved as a lexical alternative.
