id: JOB.21.31
reference: Job 21:31
source:
  edition: WLC
  text: מִֽי יַגִּ֣יד עַל פָּנָ֣י/ו דַּרְכּ֑/וֹ וְ/הֽוּא עָ֝שָׂ֗ה מִ֣י יְשַׁלֶּם לֽ/וֹ־־־־׃
translation:
  text: Who declares his way to his face? And for what he has done, who repays him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before him'; literally 'upon his face,' an idiom for direct confrontation.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew is terse: ''and he has done; who repays him?'' The translation
      makes explicit the likely sense, ''for what he has done.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who
  alternatives:
  - No one
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question. The implied
    sense is negative, but the Hebrew presents it as a question, so 'Who' is retained
    rather than converting it into an explicit negation.
- source_word: יַגִּיד
  chosen: declares
  alternatives:
  - tells
  - announces
  - reports
  lexicon: HALOT
  rationale: Hiphil of נגד commonly means 'tell, declare, make known.' 'Declares'
    fits the formal public sense of confronting or stating something plainly.
- source_word: עַל פָּנָיו
  chosen: to his face
  alternatives:
  - before him
  - against him in his presence
  lexicon: HALOT
  rationale: Literally 'upon his face,' an idiom for direct confrontation in someone's
    presence. 'To his face' is the most natural English equivalent and preserves the
    confrontational nuance.
- source_word: דַּרְכּוֹ
  chosen: his way
  alternatives:
  - his conduct
  - his course
  lexicon: HALOT
  rationale: דֶּרֶךְ often means 'way' literally or figuratively 'conduct, manner
    of life.' 'His way' preserves the Hebrew metaphor while still being intelligible
    in context.
- source_word: וְהוּא עָשָׂה
  chosen: for what he has done
  alternatives:
  - and he has done
  - what he did
  lexicon: HALOT
  rationale: 'The clause is elliptical in Hebrew. In context it introduces the basis
    for recompense: ''as for what he has done'' or ''for what he has done.'' This
    smoothing is warranted in English to make the second question coherent without
    over-paraphrasing.'
- source_word: יְשַׁלֶּם לוֹ
  chosen: repays him
  alternatives:
  - pays him back
  - recompenses him
  lexicon: HALOT
  rationale: Piel of שלם here carries the sense of repaying or requiting. 'Repays
    him' is natural modern English and preserves the judicial/retributive force.
