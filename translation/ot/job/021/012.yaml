id: JOB.21.12
reference: Job 21:12
source:
  edition: WLC
  text: יִ֭שְׂאוּ כְּ/תֹ֣ף וְ/כִנּ֑וֹר וְ֝/יִשְׂמְח֗וּ לְ/ק֣וֹל עוּגָֽב׃
translation:
  text: They sing to the tambourine and lyre, and rejoice at the sound of the flute.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They lift up their voice with tambourine and lyre.' The Hebrew verb
      literally means 'lift up' or 'raise,' but here likely refers to singing in musical
      celebration.
    reason: lexical_alternative
  - marker: b
    text: Or 'pipe' for 'flute.' The Hebrew names a wind instrument, and the exact
      ancient equivalent is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׂאוּ
  chosen: sing
  alternatives:
  - lift up
  - raise
  lexicon: HALOT
  rationale: The verb נָשָׂא literally means 'lift, carry, raise,' but in this musical
    context with instruments it idiomatically conveys lifting up the voice in song.
    Rendering it as 'sing' communicates the plain sense in natural English better
    than the overly literal 'lift up.'
- source_word: תֹף
  chosen: tambourine
  alternatives:
  - tambour
  - hand drum
  - timbrel
  lexicon: HALOT
  rationale: תֹף denotes a handheld percussion instrument, commonly rendered 'tambourine'
    in modern English. 'Timbrel' is traditional but archaic for the target audience.
- source_word: כִּנּוֹר
  chosen: lyre
  alternatives:
  - harp
  lexicon: HALOT
  rationale: כִּנּוֹר refers to a stringed instrument more specifically approximated
    by 'lyre' than by the broader and potentially misleading 'harp.'
- source_word: יִשְׂמְחוּ
  chosen: rejoice
  alternatives:
  - are glad
  - make merry
  lexicon: HALOT
  rationale: The verb שׂמח means 'rejoice, be glad.' 'Rejoice' preserves the elevated
    but still readable tone appropriate to poetry.
- source_word: לְקוֹל
  chosen: at the sound of
  alternatives:
  - to the sound of
  - at the voice of
  lexicon: HALOT
  rationale: 'קוֹל means ''sound'' or ''voice.'' With a musical instrument, ''sound''
    is the natural sense. The preposition ל here is best represented idiomatically
    as ''at'' in English: they rejoice at the sound produced.'
- source_word: עוּגָב
  chosen: flute
  alternatives:
  - pipe
  lexicon: HALOT
  rationale: עוּגָב denotes a wind instrument; 'flute' is a clear modern rendering.
    'Pipe' is possible and traditional, but 'flute' is more specific and accessible
    while fitting the likely sense.
