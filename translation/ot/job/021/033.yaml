id: JOB.21.33
reference: Job 21:33
source:
  edition: WLC
  text: מָֽתְקוּ ל֗/וֹ רִגְבֵ֫י נָ֥חַל וְ֭/אַחֲרָי/ו כָּל אָדָ֣ם יִמְשׁ֑וֹךְ וּ֝/לְ/פָנָ֗י/ו
    אֵ֣ין מִסְפָּֽר־־׃
translation:
  text: The clods of the valley are sweet to him; all mankind follows after him, and
    those before him are without number.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The clods of the wadi/stream-bed are pleasant to him.' The Hebrew נחל
      can denote a valley, ravine, or wadi.
    reason: lexical_alternative
  - marker: b
    text: Or 'all people follow after him'; literally 'all adam/man.'
    reason: lexical_alternative
  - marker: c
    text: 'The line may evoke either a funeral procession or the universal human movement
      into death: countless people have gone before him, and all humanity follows
      after.'
    reason: alternative_reading
lexical_decisions:
- source_word: מָתְקוּ
  chosen: are sweet
  alternatives:
  - become sweet
  - are pleasant
  lexicon: HALOT
  rationale: The verb from מתק denotes sweetness or pleasantness. In context of burial
    imagery, 'are sweet to him' preserves the Hebrew metaphor that the grave-earth
    is agreeable/restful to the dead man, rather than flattening it to a paraphrase.
- source_word: לּוֹ
  chosen: to him
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The preposition with pronominal suffix is best rendered idiomatically
    as 'to him,' indicating relation or experience.
- source_word: רִגְבֵי
  chosen: clods
  alternatives:
  - clumps
  - lumps of earth
  lexicon: HALOT
  rationale: רֶגֶב refers to a clod or lump of earth. 'Clods' is concise and preserves
    the concrete burial image.
- source_word: נָחַל
  chosen: the valley
  alternatives:
  - the wadi
  - the stream-bed
  lexicon: HALOT
  rationale: Though נחל can denote a wadi or torrent-bed, in funerary context 'valley'
    is the most natural English rendering for the burial place imagery and matches
    common Hebrew usage for a ravine/valley.
- source_word: וְאַחֲרָיו
  chosen: after him
  alternatives:
  - behind him
  lexicon: HALOT
  rationale: Spatially 'after him' fits the following verb and the procession/death
    motif better than the more literal 'behind him.'
- source_word: כָּל אָדָם
  chosen: all mankind
  alternatives:
  - every man
  - all people
  lexicon: HALOT
  rationale: אָדָם here is collective/generic rather than referring to an individual
    male. Per doctrine, the rendering should match source intent; 'all mankind' preserves
    the generic human sense without reducing it to merely male individuals.
- source_word: יִמְשׁוֹךְ
  chosen: follows
  alternatives:
  - draws on
  - is drawn along
  - goes after
  lexicon: HALOT
  rationale: The verb משך literally means 'draw/pull,' but in this context with 'after
    him' it idiomatically conveys people streaming after him, likely in the sense
    of following in death or funeral procession. 'Follows' communicates the sense
    clearly in modern English while staying close to the Hebrew.
- source_word: וּלְפָנָיו
  chosen: before him
  alternatives:
  - ahead of him
  lexicon: HALOT
  rationale: The phrase is spatial and temporal. 'Before him' preserves the ambiguity
    that many have preceded him in death.
- source_word: אֵין מִסְפָּר
  chosen: are without number
  alternatives:
  - cannot be numbered
  - are innumerable
  lexicon: HALOT
  rationale: This idiom means an uncountable multitude. 'Are without number' is natural
    English and retains the formal flavor of the Hebrew idiom.
