theological_decisions:
- issue: Sense of the verse's burial/death imagery
  chosen_reading: The verse describes the prosperous wicked man's burial as peaceful/honorable
    and emphasizes that countless humans both precede and follow him in death.
  alternative_readings:
  - The verse refers more specifically to a funeral procession, with people following
    behind the bier and innumerable mourners going before.
  - The verse generalizes that all humanity follows the same path to the grave.
  rationale: The Hebrew imagery supports both funerary procession and the broader
    inevitability of death. The main translation preserves this tension by keeping
    the concrete wording ('clods,' 'after him,' 'before him') without over-interpreting
    it into either a strictly ceremonial procession or an abstract statement only
    about mortality.
  doctrine_reference: Preserve theological tension rather than resolve it.
