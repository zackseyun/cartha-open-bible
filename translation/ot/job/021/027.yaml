id: JOB.21.27
reference: Job 21:27
source:
  edition: WLC
  text: הֵ֣ן יָ֭דַעְתִּי מַחְשְׁבֽוֹתֵי/כֶ֑ם וּ֝/מְזִמּ֗וֹת עָלַ֥/י תַּחְמֹֽסוּ׃
translation:
  text: Look[a], I know your thoughts, and the schemes with which you would wrong me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the schemes against me you devise' or 'the violent plans you plot against me.' The Hebrew verb can carry the sense of doing violence, oppressing, or wronging.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces emphatic attention-getting assertion. 'Look' gives natural modern English while preserving the force better than the more archaic 'Behold.'
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have known
  - I understand
  lexicon: HALOT
  rationale: Qal perfect 1cs here expresses present knowledge resulting from perception; English present 'I know' is the most idiomatic equivalent.
- source_word: מַחְשְׁבוֹתֵיכֶם
  chosen: your thoughts
  alternatives:
  - your plans
  - your intentions
  lexicon: HALOT
  rationale: The noun can denote thoughts, plans, or intentions. 'Thoughts' stays closer to the Hebrew while still allowing the hostile sense to be sharpened by the following parallel term.
- source_word: וּמְזִמּוֹת
  chosen: and the schemes
  alternatives:
  - and the devices
  - and the plans
  - and the evil schemes
  lexicon: HALOT
  rationale: In context the term carries a plotting sense. 'Schemes' communicates deliberate hostile planning in readable English without adding 'evil' explicitly.
- source_word: עָלַי
  chosen: me
  alternatives:
  - against me
  - concerning me
  - over me
  lexicon: HALOT
  rationale: With the following verb, the phrase is best represented idiomatically in English as the object of hostile action. The adversative sense is captured by 'wrong me,' though 'against me' is a viable more formal alternative.
- source_word: תַּחְמֹסוּ
  chosen: you would wrong
  alternatives:
  - you oppress
  - you do violence to
  - you treat violently
  lexicon: HALOT
  rationale: From חמס, the sense is violent wrong or oppression. Because the direct object is Job himself and the context is verbal accusation of hostile intent, 'wrong' communicates unjust harmful action naturally; 'do violence to' is more literal but can sound overly physical in English.
