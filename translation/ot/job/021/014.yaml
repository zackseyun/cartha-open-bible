theological_decisions:
- issue: Rendering the wicked's speech to God
  chosen_reading: 'Direct address retained: ''Depart from us'''
  alternative_readings:
  - Indirect paraphrase such as 'Leave us alone'
  rationale: The Hebrew presents a blunt imperative addressed to God. Retaining the
    direct address preserves the theological shock of human rebellion without softening
    it into colloquial paraphrase.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
