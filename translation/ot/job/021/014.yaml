id: JOB.21.14
reference: Job 21:14
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ לָ֭/אֵל ס֣וּר מִמֶּ֑/נּוּ וְ/דַ֥עַת דְּ֝רָכֶ֗י/ךָ לֹ֣א חָפָֽצְנוּ׃
translation:
  text: Yet they say to God, ‘Depart from us, and we do not desire the knowledge of
    your ways.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Turn aside from us' / 'Go away from us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: Yet they say
  alternatives:
  - And they said
  - So they said
  lexicon: HALOT
  rationale: The waw-consecutive with אמר narrates speech. In Job's poetic discourse,
    English present 'say' can naturally render the quoted stance as characteristic,
    while 'Yet' brings out the adversative force from context (the wicked prosper,
    yet speak this way).
- source_word: לָאֵל
  chosen: to God
  alternatives:
  - to El
  lexicon: HALOT
  rationale: אֵל here is the common Semitic word for God, functioning as a divine
    reference rather than a proper name. 'To God' is idiomatic and clear in English.
- source_word: סוּר מִמֶּנּוּ
  chosen: Depart from us
  alternatives:
  - Turn aside from us
  - Go away from us
  lexicon: HALOT
  rationale: סור in the imperative means 'turn aside, depart, go away.' With מן +
    pronominal suffix, the sense is a demand for God to withdraw from them. 'Depart
    from us' preserves the directness and gravity of the address.
- source_word: וְדַעַת
  chosen: for we do not desire the knowledge
  alternatives:
  - and the knowledge
  - even the knowledge
  lexicon: HALOT
  rationale: 'The conjunction links the second clause to the first. In English, supplying
    ''for'' makes the relationship explicit and natural: their demand that God depart
    is grounded in their rejection of knowing his ways. דַּעַת is best rendered ''knowledge''
    here, not merely ''understanding.'''
- source_word: דְּרָכֶיךָ
  chosen: your ways
  alternatives:
  - your paths
  lexicon: HALOT
  rationale: דֶּרֶךְ often means 'way, path,' and in plural can denote God's manner
    of acting or moral ways. 'Your ways' is the most natural and theologically resonant
    English rendering.
- source_word: לֹא חָפָצְנוּ
  chosen: we do not desire
  alternatives:
  - we take no pleasure in
  - we do not delight in
  - we have not desired
  lexicon: HALOT
  rationale: חפץ expresses desire, delight, or pleasure. 'We do not desire' fits the
    object 'the knowledge of your ways' and avoids overstating emotional delight where
    volitional refusal is central.
