id: JOB.21.24
reference: Job 21:24
source:
  edition: WLC
  text: עֲ֭טִינָי/ו מָלְא֣וּ חָלָ֑ב וּ/מֹ֖חַ עַצְמוֹתָ֣י/ו יְשֻׁקֶּֽה׃
translation:
  text: His pails are full of milk, and the marrow of his bones is well-watered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'His udders are full of milk.' The Hebrew term is rare and may refer
      either to udders or to milk containers.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲטִינָיו
  chosen: his pails
  alternatives:
  - his udders
  - his milk-vessels
  lexicon: HALOT
  rationale: The noun is rare and debated. In context with 'full of milk,' it refers
    to containers or organs associated with abundance. 'Pails' gives a natural English
    sense of fullness without the awkwardness of attributing literal udders to a man
    in this poetic description. Because 'udders' is a longstanding alternative, it
    is preserved in a footnote.
- source_word: מָלְאוּ
  chosen: are full
  alternatives:
  - were filled
  - fill up
  lexicon: HALOT
  rationale: The perfect verb in Hebrew poetry here describes the prosperous condition
    of the wicked man being portrayed. Present English 'are full' best conveys the
    stative sense in context.
- source_word: חָלָב
  chosen: milk
  lexicon: HALOT
  rationale: Standard lexical sense; in context it signifies richness and prosperity.
- source_word: וּמֹחַ
  chosen: and the marrow
  alternatives:
  - and marrow
  lexicon: HALOT
  rationale: The noun means 'marrow.' Including 'the' produces idiomatic English while
    preserving the concrete bodily image.
- source_word: עַצְמוֹתָיו
  chosen: of his bones
  alternatives:
  - in his bones
  lexicon: HALOT
  rationale: Construct relationship is most directly rendered 'the marrow of his bones.'
    This preserves the Hebrew imagery.
- source_word: יְשֻׁקֶּה
  chosen: is well-watered
  alternatives:
  - is moistened
  - is drenched
  - is watered
  lexicon: HALOT
  rationale: The Pual form conveys being supplied with moisture or drink. 'Is well-watered'
    communicates bodily vigor and flourishing in a vivid but readable way, fitting
    the prosperity motif of the verse.
