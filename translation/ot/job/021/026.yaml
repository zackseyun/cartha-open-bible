id: JOB.21.26
reference: Job 21:26
source:
  edition: WLC
  text: יַ֭חַד עַל עָפָ֣ר יִשְׁכָּ֑בוּ וְ֝/רִמָּ֗ה תְּכַסֶּ֥ה עֲלֵי/הֶֽם־׃
translation:
  text: Together they lie down in the dust[a], and worms cover them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'maggots cover them.' The Hebrew רִמָּה can refer to worms or maggots in contexts of bodily decay.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחַד
  chosen: Together
  alternatives:
  - alike
  - in the same way
  lexicon: HALOT
  rationale: The adverb marks the shared fate of the two persons contrasted in the surrounding context. 'Together' is natural English and preserves the emphasis that both meet the same end.
- source_word: עַל עָפָר
  chosen: in the dust
  alternatives:
  - upon the dust
  - on the dust
  lexicon: HALOT
  rationale: Although עַל often means 'on/upon,' with שׁכב in burial/death context English idiom prefers 'in the dust.' This conveys lying in death in the grave without over-paraphrasing.
- source_word: יִשְׁכָּבוּ
  chosen: they lie down
  alternatives:
  - they will lie down
  - they rest
  lexicon: HALOT
  rationale: The imperfect here expresses the general outcome described by Job. 'Lie down' keeps the concrete metaphor of death, whereas 'rest' would interpret more than the Hebrew states.
- source_word: רִמָּה
  chosen: worms
  alternatives:
  - maggots
  - the worm
  lexicon: HALOT
  rationale: 'The noun denotes worm/maggot in decay contexts. English commonly uses the plural generically here: ''worms cover them.'' ''Maggots'' is possible but narrower and harsher; ''worms'' is the more standard and broadly accurate rendering.'
- source_word: תְּכַסֶּה
  chosen: cover
  alternatives:
  - covers
  - will cover
  lexicon: HALOT
  rationale: With a plural collective subject in English ('worms'), the verb is rendered in plural form. 'Cover' preserves the vivid image of decomposition and burial.
- source_word: עֲלֵיהֶם
  chosen: them
  alternatives:
  - over them
  - upon them
  lexicon: HALOT
  rationale: The preposition is absorbed naturally into the English verb phrase 'cover them.' This is a standard optimal-equivalence adjustment that preserves the sense without awkwardness.
