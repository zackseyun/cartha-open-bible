id: JOB.21.10
reference: Job 21:10
source:
  edition: WLC
  text: שׁוֹר֣/וֹ עִ֭בַּר וְ/לֹ֣א יַגְעִ֑ל תְּפַלֵּ֥ט פָּ֝רָת֗/וֹ וְ/לֹ֣א תְשַׁכֵּֽל׃
translation:
  text: His bull breeds and does not fail; his cow calves and does not miscarry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''and does not cast off'' / ''and does not make barren.'' The Hebrew
      verb is difficult here; the main text renders the sense required by the parallelism:
      the bull''s breeding is successful, not fruitless.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹרוֹ
  chosen: his bull
  alternatives:
  - his ox
  lexicon: HALOT
  rationale: שׁוֹר denotes a bovine, often an ox or bull. In this reproductive context,
    the male breeding animal is in view, so 'bull' is more precise than the broader
    'ox'.
- source_word: עִבַּר
  chosen: breeds
  alternatives:
  - mates successfully
  - passes over
  lexicon: HALOT
  rationale: From עבר in this context of animal reproduction, the sense is that the
    male impregnates successfully. 'Breeds' gives clear modern English without over-paraphrasing.
    'Passes over' is the root's broader sense but not suitable here.
- source_word: וְלֹא יַגְעִל
  chosen: and does not fail
  alternatives:
  - and does not make barren
  - and does not miscarry
  - and does not cast off
  lexicon: HALOT
  rationale: The Hiphil of געל here is difficult and context-bound. In parallel with
    successful breeding and calving, it indicates that the mating is effective rather
    than fruitless. 'Does not fail' captures the result in idiomatic English without
    forcing a more technical gloss. Because the verb can carry the idea of rejection/casting
    off, alternatives are preserved in a footnote.
- source_word: תְּפַלֵּט
  chosen: calves
  alternatives:
  - gives birth
  - delivers
  lexicon: HALOT
  rationale: The Piel of פלט here refers to bringing forth offspring. 'Calves' is
    contextually apt for cattle and more vivid than the generic 'gives birth'.
- source_word: פָּרָתוֹ
  chosen: his cow
  alternatives:
  - his heifer
  lexicon: HALOT
  rationale: פָּרָה is a cow. 'Cow' is the normal English equivalent; 'heifer' would
    imply a younger female and is not demanded by the text.
- source_word: וְלֹא תְשַׁכֵּל
  chosen: and does not miscarry
  alternatives:
  - and is not bereaved of young
  - and does not lose her calf
  lexicon: HALOT
  rationale: שׁכל in the Piel commonly conveys being bereaved or deprived of offspring.
    In this birthing context, 'does not miscarry' is the most natural concise English
    rendering.
