id: JOB.21.32
reference: Job 21:32
source:
  edition: WLC
  text: וְ֭/הוּא לִ/קְבָר֣וֹת יוּבָ֑ל וְֽ/עַל גָּדִ֥ישׁ יִשְׁקֽוֹד־׃
translation:
  text: Yet he is carried to the graves, and over the mound a watch is kept.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and he keeps watch over the mound,' if the verb is taken with the buried
      man as the subject; the Hebrew does not make the subject explicit.
    reason: alternative_reading
  - marker: b
    text: '''Mound'' renders a Hebrew word for a heap or piled mass; here it likely
      refers to the raised earth of a grave.'
    reason: cultural_note
  - marker: c
    text: Hebrew 'to the graves' is plural; it may refer collectively to the burial
      grounds.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא
  chosen: Yet he
  alternatives:
  - And he
  - But he
  lexicon: HALOT
  rationale: The conjunction can be rendered simply 'and,' but in context Job is contrasting
    the wicked man's prosperous life with his honorable burial, so 'Yet' brings out
    the adversative force without over-paraphrasing. The pronoun remains explicit
    as in Hebrew.
- source_word: לִקְבָרוֹת
  chosen: to the graves
  alternatives:
  - to the grave
  - to burial places
  - to tombs
  lexicon: HALOT
  rationale: The noun is morphologically plural. Retaining the plural as 'the graves'
    best reflects the Hebrew form, even though English idiom might prefer singular.
    It may denote the burial grounds or grave area collectively.
- source_word: יוּבָל
  chosen: is carried
  alternatives:
  - is brought
  - is borne
  lexicon: HALOT
  rationale: Hophal imperfect of יבל conveys being led or carried. In a funerary context,
    'is carried' naturally expresses being borne in procession to burial.
- source_word: וְעַל
  chosen: and over
  alternatives:
  - and upon
  - while over
  lexicon: HALOT
  rationale: A straightforward rendering of the preposition על. 'Over' fits the image
    of something being maintained above the burial mound.
- source_word: גָּדִישׁ
  chosen: the mound
  alternatives:
  - the grave-mound
  - the heap
  - the tomb
  lexicon: HALOT
  rationale: גָּדִישׁ commonly means a heap or stack; here in burial context it likely
    refers to the raised heap of earth over a grave. 'Mound' is natural English and
    preserves the concrete image.
- source_word: יִשְׁקֹד
  chosen: a watch is kept
  alternatives:
  - he keeps watch
  - one keeps watch
  - it watches
  lexicon: HALOT
  rationale: The verb שׁקד means to watch, keep vigil, or be wakeful. Because the
    Hebrew subject is not explicit and the line is terse, an impersonal passive-like
    English rendering avoids forcing a specific subject while preserving the sense
    of vigil or care at the grave.
