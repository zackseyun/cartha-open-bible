theological_decisions:
- issue: Whether the opening clause should be presented as Job's own assertion or
    as a view he is rebutting
  chosen_reading: 'Render the first clause as a statement being challenged, followed
    by Job''s corrective wish: ''God stores up a man''s punishment for his sons? Let
    him repay it to the man himself...'''
  alternative_readings:
  - 'Render the whole verse straightforwardly without rhetorical force: ''God lays
    up his iniquity for his children; he rewards him, and he shall know it.'''
  rationale: The broader context (Job 21) argues against the claim that the wicked
    are adequately judged through consequences falling on their children. The rhetorical
    question in English reflects the argumentative turn and makes sense of the jussive-like
    force of יְשַׁלֵּם. This preserves the discourse logic rather than flattening
    it into a simple assertion.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
