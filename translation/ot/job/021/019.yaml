id: JOB.21.19
reference: Job 21:19
source:
  edition: WLC
  text: אֱל֗וֹהַּ יִצְפֹּן לְ/בָנָ֥י/ו אוֹנ֑/וֹ יְשַׁלֵּ֖ם אֵלָ֣י/ו וְ/יֵדָֽע־׃
translation:
  text: God stores up a man's punishment for his sons? Let him repay it to the man
    himself, so that he may know it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'God stores up his iniquity for his sons; let him repay
      him, that he may know.' The Hebrew can be rendered without the rhetorical question,
      but the context favors hearing Job as challenging that idea.
    reason: alternative_reading
  - marker: b
    text: '''Sons'' is the Hebrew wording; it may refer more broadly to a man''s descendants.'
    reason: lexical_alternative
  - marker: c
    text: '''His punishment'' translates a Hebrew term that can also mean ''his iniquity''
      or ''his trouble,'' depending on context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱל֗וֹהַּ
  chosen: God
  alternatives:
  - God Almighty
  - God
  lexicon: HALOT
  rationale: אֱלוֹהַּ is the common singular term for God in Job. 'God' is the natural
    English equivalent and avoids importing nuances not explicit in the form itself.
- source_word: יִצְפֹּן
  chosen: stores up
  alternatives:
  - lays up
  - reserves
  - hides away
  lexicon: HALOT
  rationale: The verb צפן commonly carries the sense of storing up or reserving. In
    this context, Job is voicing and rejecting the idea that punishment is reserved
    for a man's children; 'stores up' communicates that sense clearly in modern English.
- source_word: לְבָנָיו
  chosen: for his sons
  alternatives:
  - for his children
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'sons.' Per the gender-accurate
    policy, the translation preserves the masculine form rather than neutralizing
    it to 'children,' though the broader sense may include descendants in context.
- source_word: אוֹנוֹ
  chosen: his punishment
  alternatives:
  - his iniquity
  - his trouble
  - his wealth
  lexicon: HALOT
  rationale: 'אוֹן can denote trouble, wickedness, or the consequences of wrongdoing.
    Here the context is retributive justice: the wicked man''s due is said to be deferred
    to his sons. ''His punishment'' best captures the sense in English. ''His iniquity''
    is possible more formally, but English readers may misunderstand that as guilt
    itself rather than its penalty.'
- source_word: יְשַׁלֵּם
  chosen: let him repay
  alternatives:
  - he will repay
  - let him pay back
  lexicon: HALOT
  rationale: 'The verb שׁלם in the Piel means to repay or requite. In context, this
    is best taken jussively as Job''s corrective retort: not ''God stores up...''
    but ''Let him repay...'' This fits the argumentative flow and the following clause.'
- source_word: אֵלָיו
  chosen: to the man himself
  alternatives:
  - to him
  - upon him
  lexicon: HALOT
  rationale: The pronoun refers back to the wicked man. 'To him' is literal, but 'to
    the man himself' makes the contrast with 'his sons' explicit in natural English
    without adding a new idea.
- source_word: וְיֵדָע
  chosen: so that he may know it
  alternatives:
  - and he will know
  - that he may feel it
  lexicon: HALOT
  rationale: 'ידע means ''know.'' The conjunction plus imperfect here expresses result/purpose
    in context: repayment should come to the man himself so that he experiences and
    knows it. Adding ''it'' makes the English idiomatic while preserving the implied
    object.'
