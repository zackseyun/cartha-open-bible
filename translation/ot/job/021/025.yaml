id: JOB.21.25
reference: Job 21:25
source:
  edition: WLC
  text: וְ/זֶ֗ה יָ֭מוּת בְּ/נֶ֣פֶשׁ מָרָ֑ה וְ/לֹֽא אָ֝כַ֗ל בַּ/טּוֹבָֽה־׃
translation:
  text: while another dies with a bitter soul and has not tasted good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and this one dies in bitterness of soul and has not eaten of the good';
      the Hebrew keeps the imagery of eating for experiencing life's good.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/זֶה
  chosen: while another
  alternatives:
  - and this one
  - but this one
  lexicon: HALOT
  rationale: In context Job contrasts one person's prosperous death (v. 24) with another's
    miserable death. Although literally 'and this one,' English idiom is improved
    by rendering the connective and demonstrative contrastively as 'while another,'
    preserving the parallel contrast without wooden repetition.
- source_word: יָמוּת
  chosen: dies
  alternatives:
  - will die
  lexicon: HALOT
  rationale: The imperfect here functions in the poetic description of a general case
    rather than strict future prediction. Present-tense English ('dies') fits the
    gnomic, comparative sense in context.
- source_word: בְּ/נֶפֶשׁ מָרָה
  chosen: with a bitter soul
  alternatives:
  - in bitterness
  - with a bitter life
  - with a bitter spirit
  lexicon: HALOT
  rationale: נֶפֶשׁ is retained as 'soul' rather than flattened to 'life' because
    the phrase describes the inner condition in which the person dies. 'Bitter soul'
    is a fairly literal rendering of the Hebrew idiom and preserves the emotional
    depth of the expression.
- source_word: וְ/לֹא אָכַל
  chosen: and has not tasted
  alternatives:
  - and has not eaten
  - without having enjoyed
  lexicon: HALOT
  rationale: 'Although אָכַל literally means ''eat,'' with בַּטּוֹבָה the sense is
    idiomatic: to partake of or enjoy good. ''Has not tasted'' keeps the consumption
    metaphor while sounding natural in English and avoiding over-paraphrase.'
- source_word: בַּ/טּוֹבָה
  chosen: good
  alternatives:
  - prosperity
  - what is good
  - good things
  lexicon: HALOT
  rationale: 'The noun can denote good, well-being, or prosperity. ''Good'' is concise
    and broad enough to preserve the Hebrew''s open-ended sense: this person has not
    partaken of life''s good. ''Prosperity'' would narrow the meaning too much, while
    ''good things'' is slightly more interpretive.'
