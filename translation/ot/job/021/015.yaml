id: JOB.21.15
reference: Job 21:15
source:
  edition: WLC
  text: מַה שַׁדַּ֥י כִּֽי נַֽעַבְדֶ֑/נּוּ וּ/מַה נּ֝וֹעִ֗יל כִּ֣י נִפְגַּע בּֽ/וֹ־־־־׃
translation:
  text: What is the Almighty[a], that we should serve him? And what would we gain if we entreat him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what would it profit us if we entreat him?'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  chosen: What is
  alternatives:
  - Who is
  - What
  lexicon: HALOT
  rationale: 'Introduces a rhetorical question of worth or significance. ''What is'' in English best captures the dismissive force in context: the wicked are questioning the value of God.'
- source_word: שַׁדַּי
  chosen: the Almighty
  alternatives:
  - Shaddai
  lexicon: HALOT
  rationale: Standard translation of the divine title שדי in Job. Translating the title preserves meaning for modern readers better than transliteration.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the result/purpose nuance after the rhetorical question: ''that we should serve him?'' This is smoother and more idiomatic than a more literal ''for''.'
- source_word: נַעַבְדֶנּוּ
  chosen: we should serve him
  alternatives:
  - we should worship him
  - we should work for him
  lexicon: HALOT
  rationale: עבד with God commonly means 'serve' in the sense of religious service and allegiance. 'Serve' preserves the broader covenantal sense without narrowing it to liturgical worship alone.
- source_word: וּמַה
  chosen: And what
  alternatives:
  - And what is it that
  - What
  lexicon: HALOT
  rationale: Carries forward the parallel rhetorical structure of the verse.
- source_word: נּוֹעִיל
  chosen: would we gain
  alternatives:
  - would it profit us
  - would we benefit
  lexicon: HALOT
  rationale: The verb means to be of use or profit. 'Would we gain' is natural modern English and fits the wicked's utilitarian perspective.
- source_word: כִּי
  chosen: if
  alternatives:
  - that
  - when
  lexicon: HALOT
  rationale: 'In the second clause, כִּי is best represented as introducing the condition under consideration in idiomatic English: ''if we plead with him.'''
- source_word: נִפְגַּע בּוֹ
  chosen: we plead with him
  alternatives:
  - we entreat him
  - we make intercession to him
  - we encounter him
  lexicon: HALOT
  rationale: פגע with ב can mean to entreat or make supplication to someone, especially in prayer-related contexts. 'Plead with him' is clear, idiomatic, and preserves the relational/prayer sense better than the overly formal 'make intercession.'
