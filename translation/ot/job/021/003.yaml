id: JOB.21.3
reference: Job 21:3
source:
  edition: WLC
  text: שָׂ֭אוּ/נִי וְ/אָנֹכִ֣י אֲדַבֵּ֑ר וְ/אַחַ֖ר דַּבְּרִ֣/י תַלְעִֽיג׃
translation:
  text: Bear with me, and I will speak; and after I have spoken, you may mock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Endure me,' 'Put up with me.' The Hebrew literally uses 'bear' with
      the sense of tolerating or allowing someone to speak.
    reason: lexical_alternative
  - marker: b
    text: Or 'and after my speaking, you mock.' The Hebrew could be taken as a simple
      future ('you will mock') or as a permissive/concessive sense ('you may mock');
      the main text adopts the latter as the smoother fit in context.
    reason: alternative_reading
lexical_decisions:
- source_word: שָׂאוּ/נִי
  chosen: Bear with me
  alternatives:
  - Lift me up
  - Carry me
  - Endure me
  - Put up with me
  lexicon: HALOT
  rationale: The verb נָשָׂא literally means 'lift, carry, bear,' but with the 1cs
    suffix in this discourse context it idiomatically asks the hearers to bear/endure
    him while he speaks. 'Bear with me' is natural modern English and preserves the
    interpersonal force better than the more wooden 'suffer me.'
- source_word: וְ/אָנֹכִי
  chosen: and I
  alternatives:
  - then I
  - for my part I
  lexicon: HALOT
  rationale: אָנֹכִי is the emphatic first-person pronoun. In English, the emphasis
    is adequately conveyed by explicit 'I' following the imperative. 'And I' keeps
    the simple coordination without overinterpreting the emphasis.
- source_word: אֲדַבֵּר
  chosen: will speak
  alternatives:
  - will talk
  lexicon: HALOT
  rationale: The piel of דבר is the standard verb for speaking. 'Will speak' is the
    most direct and appropriately weighty rendering in Job's formal speech.
- source_word: וְ/אַחַר
  chosen: and after
  alternatives:
  - and afterward
  - then after
  lexicon: HALOT
  rationale: אַחַר here introduces the subsequent action in time. 'And after' fits
    the Hebrew coordination and leads naturally into the temporal clause in English.
- source_word: דַּבְּרִי
  chosen: I have spoken
  alternatives:
  - my speaking
  - my words
  - my speech
  lexicon: HALOT
  rationale: The infinitive construct with 1cs suffix literally means 'my speaking.'
    In idiomatic English after a temporal marker, 'after I have spoken' best represents
    the sense without awkwardness. Rendering it as 'my words' would shift from action
    to content.
- source_word: תַלְעִיג
  chosen: you may mock
  alternatives:
  - you mock
  - you can mock
  - you may sneer
  lexicon: HALOT
  rationale: 'The Hiphil of לעג means ''mock, deride.'' Because the addressee is morphologically
    singular, the Hebrew likely addresses one representative opponent or uses singular
    distributively; English can leave this as singular ''you.'' ''May mock'' captures
    the permissive or concessive nuance often heard here: Job asks for a hearing first,
    then grants them leave to mock.'
