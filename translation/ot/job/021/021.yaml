id: JOB.21.21
reference: Job 21:21
source:
  edition: WLC
  text: כִּ֤י מַה חֶפְצ֣/וֹ בְּ/בֵית֣/וֹ אַחֲרָ֑י/ו וּ/מִסְפַּ֖ר חֳדָשָׁ֣י/ו חֻצָּֽצוּ־׃
translation:
  text: For what does he care about his house after him, when the number of his months
    is cut off?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For what is his pleasure in his house after him?'
    reason: lexical_alternative
  - marker: b
    text: '''House'' may also imply ''household'' or ''family.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'and the number of his months is determined/apportioned.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - For/because
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding argument. 'For'
    fits the discourse flow in English.
- source_word: מַה
  chosen: what
  alternatives:
  - how
  - why
  lexicon: HALOT
  rationale: 'Interrogative pronoun used rhetorically: ''what ...?'' conveys the sense
    of lack of concern or interest.'
- source_word: חֶפְצוֹ
  chosen: does he care
  alternatives:
  - is his delight
  - is his pleasure
  - is his desire
  lexicon: HALOT
  rationale: The noun חֵפֶץ denotes delight, pleasure, desire, or concern. In the
    idiom 'what is his pleasure in ...?' the natural English sense is 'what does he
    care about ...?' which preserves the rhetorical force without wooden phrasing.
- source_word: בְּבֵיתוֹ
  chosen: about his house
  alternatives:
  - in his house
  - for his household
  lexicon: HALOT
  rationale: With חֵפֶץ, the preposition ב can mark the object of concern or delight.
    'About his house' is idiomatic English. 'House' may imply household/family, but
    the more literal 'house' is retained in the main text.
- source_word: אַחֲרָיו
  chosen: after him
  alternatives:
  - afterward
  - after he is gone
  lexicon: HALOT
  rationale: The suffix indicates 'after him,' i.e., after his death or departure.
    The more literal wording preserves the ambiguity while clearly pointing to what
    follows his life.
- source_word: וּמִסְפַּר
  chosen: when the number
  alternatives:
  - and the number
  lexicon: HALOT
  rationale: 'Although formally ''and,'' in English the clause is best connected temporally/explanatorily:
    his concern for his house is null once his allotted lifespan is ended. ''When''
    captures the relation naturally.'
- source_word: חֳדָשָׁיו
  chosen: of his months
  alternatives:
  - of his lifetime
  - of his days
  lexicon: HALOT
  rationale: The Hebrew specifically says 'months,' a concrete expression for the
    span of life. This should be preserved rather than generalized.
- source_word: חֻצָּצוּ
  chosen: is cut off
  alternatives:
  - are cut off
  - is determined
  - is apportioned
  lexicon: HALOT
  rationale: From חצץ in the passive, the sense here is that the span of life is cut
    off or brought to an end. Because the grammatical subject in English is 'the number'
    (singular collective), 'is cut off' reads naturally. Some interpreters understand
    the verb as 'determined/apportioned,' but in this context of life's end 'cut off'
    better fits the rhetorical point.
