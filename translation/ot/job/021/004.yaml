id: JOB.21.4
reference: Job 21:4
source:
  edition: WLC
  text: הֶ֭/אָנֹכִי לְ/אָדָ֣ם שִׂיחִ֑/י וְ/אִם מַ֝דּ֗וּעַ לֹא תִקְצַ֥ר רוּחִֽ/י־־׃
translation:
  text: As for me, is my complaint against man? And why should my spirit not be impatient?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to man' or 'with man'; the Hebrew phrase may be understood in several
      relational senses, but the context favors a complaint not directed toward a
      merely human hearer.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'why should my spirit not be short?'—a Hebrew idiom for impatience
      or inner vexation.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶאָנֹכִי
  chosen: As for me
  alternatives:
  - I
  - am I
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. 'As for me' brings out the contrastive/emphatic
    force more naturally in English than a bare 'I,' while leaving the clause structure
    intact.
- source_word: לְאָדָם
  chosen: against man
  alternatives:
  - to man
  - with man
  - against humankind
  lexicon: HALOT
  rationale: אָדָם can mean 'man' or 'humankind.' Here, with ל and in context, Job
    contrasts a complaint directed toward a human being versus toward God. 'Against
    man' best captures the relational force in idiomatic English. Per doctrine, gender-accurate
    rendering is preferred; the sense is generic but singular, so 'man' is retained
    rather than flattening to 'people.'
- source_word: שִׂיחִי
  chosen: my complaint
  alternatives:
  - my meditation
  - my discourse
  - my concern
  lexicon: HALOT
  rationale: שִׂיחַ can denote complaint, musing, or discourse depending on context.
    In Job's lament setting, 'complaint' best fits the tone and argument.
- source_word: וְאִם
  chosen: If not
  alternatives:
  - and if
  - or if
  lexicon: HALOT
  rationale: 'In this rhetorical question sequence, וְאִם introduces the consequence
    or follow-up condition. ''If not'' yields coherent English and reflects the argumentative
    flow: if his complaint is not against man, then his agitation is understandable.'
- source_word: מַדּוּעַ
  chosen: why
  alternatives:
  - for what reason
  lexicon: HALOT
  rationale: Standard interrogative adverb; 'why' is the natural modern English equivalent.
- source_word: תִקְצַר רוּחִי
  chosen: should my spirit not be impatient
  alternatives:
  - should my spirit not be short
  - should I not be impatient
  - should my patience not run short
  lexicon: HALOT
  rationale: The idiom 'shortness of spirit' conveys impatience, vexation, or loss
    of composure. Rendering the idiom dynamically as 'be impatient' communicates the
    sense clearly while preserving 'my spirit' from the Hebrew. The modal 'should'
    fits the rhetorical question.
