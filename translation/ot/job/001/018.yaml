id: JOB.1.18
reference: Job 1:18
source:
  edition: WLC
  text: עַ֚ד זֶ֣ה מְדַבֵּ֔ר וְ/זֶ֖ה בָּ֣א וַ/יֹּאמַ֑ר בָּנֶ֨י/ךָ וּ/בְנוֹתֶ֤י/ךָ אֹֽכְלִים֙ וְ/שֹׁתִ֣ים יַ֔יִן בְּ/בֵ֖ית אֲחִי/הֶ֥ם הַ/בְּכֽוֹר׃
translation:
  text: While this one was still speaking[a], another came and said, “Your sons and your daughters were eating and drinking wine in the house of their firstborn brother.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “were feasting and drinking wine.” The Hebrew says literally “eating and drinking wine.”
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד זֶה מְדַבֵּר
  chosen: While this one was still speaking
  alternatives:
  - While he was yet speaking
  - Before this one finished speaking
  lexicon: HALOT
  rationale: The idiom introduces interruption before the prior messenger has finished. 'While this one was still speaking' preserves the ongoing action of the participle מְדַבֵּר and reads naturally in modern English.
- source_word: וְזֶה בָּא
  chosen: another came
  alternatives:
  - and this one came
  - and another one came
  lexicon: HALOT
  rationale: Though literally 'and this one came,' the discourse function contrasts successive messengers. 'Another came' conveys the narrative sense idiomatically without losing meaning.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - and he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing direct speech; English can omit the pronoun naturally.
- source_word: בָּנֶיךָ וּבְנוֹתֶיךָ
  chosen: Your sons and your daughters
  alternatives:
  - Your children
  lexicon: HALOT
  rationale: The Hebrew explicitly names both sons and daughters. Following gender-accurate translation philosophy, the specific pair should be preserved rather than generalized to 'children.'
- source_word: אֹכְלִים וְשֹׁתִים יַיִן
  chosen: were eating and drinking wine
  alternatives:
  - are eating and drinking wine
  - were feasting and drinking wine
  lexicon: HALOT
  rationale: The participles describe ongoing action at the time of the report. English past progressive fits the messenger's retrospective report. 'Eating and drinking wine' stays close to the Hebrew; 'feasting' is interpretive and therefore not preferred in the main text.
- source_word: בְּבֵית אֲחִיהֶם הַבְּכוֹר
  chosen: in the house of their oldest brother
  alternatives:
  - in their eldest brother's house
  - in the house of their firstborn brother
  lexicon: HALOT
  rationale: הַבְּכוֹר here identifies birth order among siblings. 'Oldest brother' is the clearest natural English equivalent. 'Firstborn brother' is more formal but less idiomatic in English.
