theological_decisions:
- issue: Euphemistic use of ברך in Job's prologue
  chosen_reading: Render יְבָרֲכֶךָּ as 'curse you' in the main text
  alternative_readings:
  - bless you
  rationale: 'The immediate context is adversarial: Satan claims Job will renounce
    God if harmed. Historic interpreters widely recognize ברך here as a reverential
    euphemism. Translating ''curse'' communicates the plain sense while preserving
    the literal lexical form in a footnote for auditability.'
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition) and §3 (preserve tension where genuine ambiguity exists)
