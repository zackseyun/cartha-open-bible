id: JOB.1.11
reference: Job 1:11
source:
  edition: WLC
  text: וְ/אוּלָם֙ שְֽׁלַֽח נָ֣א יָֽדְ/ךָ֔ וְ/גַ֖ע בְּ/כָל אֲשֶׁר ל֑/וֹ אִם לֹ֥א עַל
    פָּנֶ֖י/ךָ יְבָרֲכֶֽ/ךָּ־־־־־׃
translation:
  text: But stretch out your hand, please, and touch all that he has, and he will
    surely curse you to your face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'bless you.' In Job's prologue this is commonly understood
      as a euphemistic way of saying 'curse you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאוּלָם
  chosen: But
  alternatives:
  - However
  - But indeed
  lexicon: HALOT
  rationale: Marks a strong adversative transition in Satan's reply. 'But' is natural
    modern English and preserves the contrast with the preceding statement.
- source_word: שְׁלַח נָא יָדְךָ
  chosen: stretch out your hand, please
  alternatives:
  - put out your hand, please
  - send forth your hand, please
  lexicon: HALOT
  rationale: The idiom means to extend one's power in action. 'Stretch out your hand'
    preserves the Hebrew imagery, while 'please' reflects נָא as a particle of entreaty.
- source_word: וְגַע
  chosen: and strike
  alternatives:
  - and touch
  - and afflict
  lexicon: HALOT
  rationale: נגע literally means 'touch,' but in contexts of harmful divine action
    it often carries the sense of striking or inflicting harm. 'Strike' makes the
    hostile force explicit without over-paraphrasing.
- source_word: בְּכָל אֲשֶׁר לוֹ
  chosen: all that he has
  alternatives:
  - everything that belongs to him
  - all that is his
  lexicon: HALOT
  rationale: A natural rendering of the possessive expression referring to Job's possessions
    and holdings. 'All that he has' is concise and faithful.
- source_word: אִם לֹא
  chosen: he will surely
  alternatives:
  - if not
  - surely
  lexicon: HALOT
  rationale: In oath-like and emphatic constructions, אִם לֹא functions idiomatically
    to intensify the assertion rather than introduce a simple condition. Here it predicts
    the certainty of Job's response.
- source_word: עַל פָּנֶיךָ
  chosen: to your face
  alternatives:
  - before your face
  - in your presence
  lexicon: HALOT
  rationale: This Hebrew idiom conveys direct, open confrontation. 'To your face'
    is the closest natural English equivalent.
- source_word: יְבָרֲכֶךָּ
  chosen: curse you
  alternatives:
  - bless you
  lexicon: HALOT
  rationale: Though the verb ברך normally means 'bless,' in Job 1:5, 1:11, and 2:5
    it is widely understood as a euphemistic substitute for 'curse,' likely out of
    reverence. Rendering it 'bless' here would obscure the sense of Satan's accusation.
    The literal form is preserved in a footnote as a lexical alternative.
