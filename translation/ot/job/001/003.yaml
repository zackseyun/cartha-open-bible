theological_decisions:
- issue: Rendering of the idiom בְּנֵי קֶדֶם
  chosen_reading: the sons of the east
  alternative_readings:
  - the people of the east
  - the easterners
  rationale: This is not a major doctrinal issue, but the translation philosophy favors
    gender-accurate rendering where the source uses a masculine plural with representative
    force. 'Sons of the east' preserves the Hebrew form and ancient idiom, while a
    footnote can clarify the broader referent.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
