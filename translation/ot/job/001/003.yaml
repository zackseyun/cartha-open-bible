id: JOB.1.3
reference: Job 1:3
source:
  edition: WLC
  text: וַ/יְהִ֣י מִ֠קְנֵ/הוּ שִֽׁבְעַ֨ת אַלְפֵי צֹ֜אן וּ/שְׁלֹ֧שֶׁת אַלְפֵ֣י גְמַלִּ֗ים
    וַ/חֲמֵ֨שׁ מֵא֤וֹת צֶֽמֶד בָּקָר֙ וַ/חֲמֵ֣שׁ מֵא֣וֹת אֲתוֹנ֔וֹת וַ/עֲבֻדָּ֖ה רַבָּ֣ה
    מְאֹ֑ד וַ/יְהִי֙ הָ/אִ֣ישׁ הַ/ה֔וּא גָּד֖וֹל מִ/כָּל בְּנֵי קֶֽדֶם־־־־׃
translation:
  text: His livestock were seven thousand sheep, three thousand camels, five hundred
    yoke of oxen, five hundred female donkeys, and a great many servants; and that
    man was greater than all the sons of the east.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the people of the east' or 'the easterners.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְנֵהוּ
  chosen: his livestock
  alternatives:
  - his possessions
  - his cattle
  lexicon: HALOT
  rationale: מִקְנֶה denotes acquired property, especially domestic animals/herds.
    In this context, the following inventory specifies animals, so 'livestock' best
    captures the sense without the narrower English 'cattle' or the overly broad 'possessions'.
- source_word: צֹאן
  chosen: sheep
  alternatives:
  - small livestock
  - flock
  lexicon: HALOT
  rationale: Though צֹאן can include sheep and goats collectively, 'sheep' is the
    most natural English rendering in a numbered inventory and matches common usage
    here.
- source_word: גְמַלִּים
  chosen: camels
  lexicon: HALOT
  rationale: Direct lexical equivalent.
- source_word: צֶמֶד בָּקָר
  chosen: yoke of oxen
  alternatives:
  - pairs of cattle
  - teams of oxen
  lexicon: HALOT
  rationale: צֶמֶד refers to a pair yoked together; with בָּקָר it denotes working
    bovines as paired draft animals. 'Yoke of oxen' is idiomatic and preserves the
    agricultural sense better than the vaguer 'pairs of cattle'.
- source_word: אֲתוֹנוֹת
  chosen: female donkeys
  alternatives:
  - she-donkeys
  - donkeys
  lexicon: HALOT
  rationale: The Hebrew specifically marks the animals as female. 'Female donkeys'
    is clear modern English; 'she-donkeys' is possible but less natural.
- source_word: עֲבֻדָּה רַבָּה מְאֹד
  chosen: a great many servants
  alternatives:
  - very many servants
  - a very large household
  - much service
  lexicon: HALOT
  rationale: Here עֲבֻדָּה likely refers metonymically to a large body of servants/retainers
    or estate service attached to Job's household. 'A great many servants' communicates
    the social-economic reality more clearly than the wooden 'much service.' 'Household'
    is possible but less explicit.
- source_word: גָּדוֹל
  chosen: greater
  alternatives:
  - great
  - the greatest
  - more prominent
  lexicon: HALOT
  rationale: In the comparative construction מִכָּל, the adjective carries the sense
    of surpassing others in status/wealth/prominence. 'Greater than all' preserves
    the comparative force.
- source_word: בְּנֵי קֶדֶם
  chosen: the sons of the east
  alternatives:
  - the people of the east
  - the easterners
  lexicon: HALOT
  rationale: A more formal rendering preserves the Hebrew idiom and the cultural-geographical
    expression. Because 'sons of' can sound unfamiliar in English, a footnote preserves
    the smoother alternative 'people of the east'.
