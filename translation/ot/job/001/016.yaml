theological_decisions:
- issue: Whether אֵשׁ אֱלֹהִים should be rendered as a direct divine act or as a descriptive
    idiom
  chosen_reading: Rendered 'Fire of God' in the main text, preserving the messenger's
    expression without specifying mechanism or theological causation.
  alternative_readings:
  - God's fire
  - lightning
  - a mighty fire
  rationale: The narrative context includes heavenly permission and satanic agency,
    so the translation should preserve the human speaker's attribution without resolving
    the deeper causation in the wording of this verse. 'Fire of God' keeps the theological
    tension intact.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
