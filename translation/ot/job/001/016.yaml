id: JOB.1.16
reference: Job 1:16
source:
  edition: WLC
  text: ע֣וֹד זֶ֣ה מְדַבֵּ֗ר וְ/זֶה֮ בָּ֣א וַ/יֹּאמַר֒ אֵ֣שׁ אֱלֹהִ֗ים נָֽפְלָה֙ מִן
    הַ/שָּׁמַ֔יִם וַ/תִּבְעַ֥ר בַּ/צֹּ֛אן וּ/בַ/נְּעָרִ֖ים וַ/תֹּאכְלֵ֑/ם וָ/אִמָּ֨לְטָ֧/ה
    רַק אֲנִ֛י לְ/בַדִּ֖/י לְ/הַגִּ֥יד לָֽ/ךְ׀־־׃
translation:
  text: While this one was still speaking, another came and said, “Fire of God fell
    from heaven and burned among the sheep and the young men and consumed them, and
    I alone have escaped to tell you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God's fire'; possibly a reference to lightning or a heaven-sent blaze.
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹד זֶה מְדַבֵּר
  chosen: While this one was still speaking
  alternatives:
  - This one was still speaking
  - While he was yet speaking
  lexicon: HALOT
  rationale: עוֹד with the participle conveys ongoing action ('still' speaking). 'While
    this one' preserves the vivid sequential style of the messengers without overformal
    repetition.
- source_word: וְזֶה בָּא
  chosen: another came
  alternatives:
  - and this one came
  - and another one came
  lexicon: HALOT
  rationale: Though literally 'and this one came,' idiomatic English prefers 'another
    came.' This preserves the rapid succession of disasters.
- source_word: אֵשׁ אֱלֹהִים
  chosen: Fire of God
  alternatives:
  - God's fire
  - a mighty fire
  - lightning
  lexicon: HALOT
  rationale: 'The construct phrase is most directly rendered ''Fire of God.'' This
    preserves the messenger''s wording and ambiguity: it may denote fire perceived
    as from God, without requiring the translator to specify lightning in the main
    text. ''Lightning'' is interpretive and better preserved in a footnote.'
- source_word: נָפְלָה מִן הַשָּׁמַיִם
  chosen: fell from heaven
  alternatives:
  - fell from the heavens
  - came down from heaven
  lexicon: HALOT
  rationale: A straightforward rendering of the verb נפל plus source phrase. 'Heaven'
    is idiomatic in English for the sky/heavens in such contexts.
- source_word: וַתִּבְעַר
  chosen: burned among
  alternatives:
  - burned up
  - kindled against
  - blazed among
  lexicon: HALOT
  rationale: בער here describes the fire's active burning in relation to the flock
    and attendants. 'Burned among' avoids prematurely collapsing this verb into the
    following 'consumed them,' preserving the Hebrew's two-step description.
- source_word: בַּצֹּאן
  chosen: the sheep
  alternatives:
  - the flock
  lexicon: HALOT
  rationale: צאן can denote small livestock collectively, but in Job 1:3 and context
    the loss concerns sheep specifically. 'The sheep' is more concrete and contextually
    fitting.
- source_word: וּבַנְּעָרִים
  chosen: the young men
  alternatives:
  - the servants
  - the attendants
  lexicon: HALOT
  rationale: נְעָרִים literally means 'young men' or 'young male servants.' Since
    the Hebrew term is masculine and likely refers to male attendants here, 'young
    men' is gender-accurate and avoids importing a purely functional label not explicit
    in the text.
- source_word: וַתֹּאכְלֵם
  chosen: consumed them
  alternatives:
  - devoured them
  - ate them up
  lexicon: HALOT
  rationale: The common idiom of fire 'consuming' is natural English and reflects
    the metaphorical use of אכל for destructive burning.
- source_word: וָאִמָּלְטָה רַק אֲנִי לְבַדִּי
  chosen: I alone have escaped
  alternatives:
  - only I escaped alone
  - I alone escaped
  lexicon: HALOT
  rationale: The phrase emphatically marks the sole survivor. 'I alone have escaped'
    communicates the emphasis naturally in English; the present perfect fits reported
    recent survival in English narrative dialogue.
- source_word: לְהַגִּיד לָךְ
  chosen: to tell you
  alternatives:
  - to report to you
  - to inform you
  lexicon: HALOT
  rationale: A simple, direct rendering suits the messenger formula repeated in this
    passage.
