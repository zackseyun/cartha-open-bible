id: JOB.1.4
reference: Job 1:4
source:
  edition: WLC
  text: וְ/הָלְכ֤וּ בָנָי/ו֙ וְ/עָשׂ֣וּ מִשְׁתֶּ֔ה בֵּ֖ית אִ֣ישׁ יוֹמ֑/וֹ וְ/שָׁלְח֗וּ
    וְ/קָרְאוּ֙ לִ/שְׁלֹ֣שֶׁת אחיתי/הם לֶ/אֱכֹ֥ל וְ/לִ/שְׁתּ֖וֹת עִמָּ/הֶֽם׃
translation:
  text: His sons would go and hold a feast in each one’s house on his day, and they
    would send and invite their three sisters to eat and drink with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'on his birthday.' The Hebrew literally reads 'on his day,'
      which may refer either to each son’s appointed turn or to his birthday.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָלְכוּ
  chosen: would go
  alternatives:
  - went
  lexicon: HALOT
  rationale: The qatal here in narrative description expresses customary past action
    in context (vv. 4–5), so English habitual 'would go' better conveys repeated practice
    than a simple preterite.
- source_word: בָנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The noun is specifically masculine plural, not a generic term for children.
    This fits the context, since the sisters are mentioned separately.
- source_word: וְעָשׂוּ מִשְׁתֶּה
  chosen: hold a feast
  alternatives:
  - make a feast
  - hold a banquet
  lexicon: HALOT
  rationale: The idiom literally 'make a feast' is rendered in natural English as
    'hold a feast.' 'Banquet' is possible, but 'feast' preserves the celebratory sense
    without overstating formality.
- source_word: בֵּית אִישׁ
  chosen: in each one’s house
  alternatives:
  - in the house of each man
  - each in his house
  lexicon: HALOT
  rationale: The distributive sense of אִישׁ in this construction indicates each son
    in turn at his own house. 'Each one’s house' communicates the idiom clearly in
    modern English.
- source_word: יוֹמוֹ
  chosen: on his day
  alternatives:
  - on his appointed day
  - on his birthday
  lexicon: HALOT
  rationale: The Hebrew literally says 'his day.' In context it likely refers to each
    son's designated day in the cycle of feasting; some interpret it as birthday,
    but that is not explicit and should not be imported into the main text.
- source_word: וְשָׁלְחוּ וְקָרְאוּ
  chosen: they would send and invite
  alternatives:
  - they sent and called
  - they sent for and invited
  lexicon: HALOT
  rationale: The paired verbs describe dispatching a message and extending an invitation.
    'Send and invite' preserves both verbs while remaining idiomatic; habitual 'would'
    matches the verse's customary action.
- source_word: לִשְׁלֹשֶׁת אֲחִיתֵיהֶם
  chosen: their three sisters
  alternatives:
  - the three sisters of theirs
  lexicon: HALOT
  rationale: 'The phrase is definite by possession and numeral: specifically the three
    sisters belonging to them. Straightforward English is best.'
- source_word: לֶאֱכֹל וְלִשְׁתּוֹת
  chosen: to eat and drink
  lexicon: HALOT
  rationale: A standard infinitive pair denoting participation in the feast; the simple
    rendering is both accurate and natural.
- source_word: עִמָּהֶם
  chosen: with them
  lexicon: HALOT
  rationale: The preposition marks shared participation with the brothers at the feast.
