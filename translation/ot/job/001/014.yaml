id: JOB.1.14
reference: Job 1:14
source:
  edition: WLC
  text: וּ/מַלְאָ֛ךְ בָּ֥א אֶל אִיּ֖וֹב וַ/יֹּאמַ֑ר הַ/בָּקָר֙ הָי֣וּ חֹֽרְשׁ֔וֹת
    וְ/הָ/אֲתֹנ֖וֹת רֹע֥וֹת עַל יְדֵי/הֶֽם־־׃
translation:
  text: and a messenger came to Job and said, “The oxen were plowing, and the donkeys
    were grazing beside them,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'female donkeys' or 'she-donkeys.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַלְאָךְ
  chosen: and a messenger
  alternatives:
  - and a servant
  - and an angel
  lexicon: HALOT
  rationale: מַלְאָךְ can denote either a human messenger or an angel depending on
    context. Here the narrative context is a human report of disaster, so 'messenger'
    best fits. The conjunction וּ is carried as 'and'.
- source_word: בָּא
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: The Qal perfect of בוא straightforwardly means 'came' or 'arrived.' 'Came'
    is the most natural narrative rendering in English.
- source_word: אֶל אִיּוֹב
  chosen: to Job
  alternatives:
  - unto Job
  lexicon: HALOT
  rationale: אֶל marks motion toward; 'to Job' is idiomatic modern English. The personal
    name is transliterated as 'Job' per translation philosophy.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - and he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. English can omit the explicit
    pronoun because the subject is clear from context.
- source_word: הַבָּקָר
  chosen: The oxen
  alternatives:
  - The cattle
  lexicon: HALOT
  rationale: בָּקָר can refer broadly to cattle, but in a plowing context 'oxen' is
    more precise and natural, since these are draft animals at work.
- source_word: הָיוּ חֹרְשׁוֹת
  chosen: were plowing
  alternatives:
  - were ploughing
  - were tilling
  lexicon: HALOT
  rationale: The construction expresses ongoing action in past narrative. 'Were plowing'
    captures the progressive sense and uses standard modern American spelling.
- source_word: וְהָאֲתֹנוֹת
  chosen: and the donkeys
  alternatives:
  - and the she-donkeys
  - and the female donkeys
  lexicon: HALOT
  rationale: אֲתֹנוֹת specifically denotes female donkeys. English usually does not
    require marking the sex unless context makes it important, so 'donkeys' is sufficiently
    accurate and more readable; the more specific alternative is preserved in a footnote.
- source_word: רֹעֹות
  chosen: were grazing
  alternatives:
  - were feeding
  - were pasturing
  lexicon: HALOT
  rationale: From רעה in the sense of grazing/pasturing. 'Were grazing' is the most
    natural in context for animals feeding in the field.
- source_word: עַל יְדֵיהֶם
  chosen: beside them
  alternatives:
  - near them
  - at their side
  - by them
  lexicon: HALOT
  rationale: The idiom literally involves 'upon/by their hands,' but in context it
    means spatial proximity. 'Beside them' is clear, idiomatic English that preserves
    the scene without over-literal awkwardness.
