id: JOB.1.15
reference: Job 1:15
source:
  edition: WLC
  text: וַ/תִּפֹּ֤ל שְׁבָא֙ וַ/תִּקָּחֵ֔/ם וְ/אֶת הַ/נְּעָרִ֖ים הִכּ֣וּ לְ/פִי חָ֑רֶב וָֽ/אִמָּ֨לְטָ֧/ה רַק אֲנִ֛י לְ/בַדִּ֖/י לְ/הַגִּ֥יד לָֽ/ךְ־־־׃
translation:
  text: And Sheba fell upon them and took them[a], and they struck down the young men with the edge of the sword[c][b]; and I alone have escaped to tell you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Sabeans fell upon them.' The Hebrew uses the proper name 'Sheba,' likely referring to raiders from Sheba.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'with the mouth of the sword,' an idiom meaning 'with the edge of the sword.'
    reason: lexical_alternative
  - marker: c
    text: '''The young men'' likely refers to Job''s servants attending the animals.'
    reason: cultural_note
lexical_decisions:
- source_word: וַתִּפֹּל
  chosen: fell upon
  alternatives:
  - came upon
  - attacked
  lexicon: HALOT
  rationale: From נפל in hostile-incursion context, the idiom conveys a sudden attack or raid rather than a literal fall. 'Fell upon' preserves the Hebrew imagery while remaining natural English.
- source_word: שְׁבָא
  chosen: Sheba
  alternatives:
  - the Sabeans
  lexicon: HALOT
  rationale: As a proper name, it is transliterated per project philosophy. In context it refers to the people/group from Sheba, but the Hebrew form itself is the name.
- source_word: וַתִּקָּחֵם
  chosen: took them
  alternatives:
  - seized them
  - carried them off
  lexicon: HALOT
  rationale: The verb לקח with 3mp suffix refers to taking the oxen and donkeys mentioned in the previous verse. 'Took them' is direct and sufficiently clear; the raiding sense is supported by context.
- source_word: הַנְּעָרִים
  chosen: the young men
  alternatives:
  - the servants
  - the attendants
  lexicon: HALOT
  rationale: נערים can denote youths or servants/attendants. Here these are Job's workers attending the livestock. 'Young men' preserves the lexical sense more closely, while the context still implies they are servants.
- source_word: הִכּוּ לְפִי חָרֶב
  chosen: struck down ... with the edge of the sword
  alternatives:
  - killed ... with the sword
  - put ... to the sword
  lexicon: HALOT
  rationale: The idiom literally means 'struck by the mouth/edge of the sword.' 'Struck down ... with the edge of the sword' preserves the Hebrew idiom more fully than the flatter 'killed with the sword.'
- source_word: וָאִמָּלְטָה
  chosen: I ... have escaped
  alternatives:
  - I ... escaped
  - I was delivered
  lexicon: HALOT
  rationale: The verb מלט denotes escape/deliverance. In the messenger formula of this narrative, English present perfect ('have escaped') reads naturally and reflects the speaker's present state resulting from the escape.
- source_word: רַק אֲנִי לְבַדִּי
  chosen: I alone
  alternatives:
  - only I
  - I by myself alone
  lexicon: HALOT
  rationale: The combination intensifies exclusivity. 'I alone' is concise and idiomatic while preserving the emphasis that no one else survived.
- source_word: לְהַגִּיד לָךְ
  chosen: to tell you
  alternatives:
  - to report to you
  - to inform you
  lexicon: HALOT
  rationale: נגד in this context is straightforward reporting. 'To tell you' is natural modern English and fits the messenger speech.
