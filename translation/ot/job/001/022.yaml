id: JOB.1.22
reference: Job 1:22
source:
  edition: WLC
  text: בְּ/כָל זֹ֖את לֹא חָטָ֣א אִיּ֑וֹב וְ/לֹא נָתַ֥ן תִּפְלָ֖ה לֵ/אלֹהִֽים־־־׃פ
translation:
  text: In all this, Job did not sin, nor did he charge God with wrongdoing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'nor did he charge God with folly' or 'nor did he attribute impropriety
      to God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּכָל זֹאת
  chosen: In all this
  alternatives:
  - Through all this
  - In all of this
  lexicon: HALOT
  rationale: The preposition ב plus כָּל and demonstrative זֹאת forms an idiom referring
    to the entirety of the preceding circumstances. 'In all this' is natural English
    and preserves the comprehensive sense.
- source_word: לֹא חָטָא
  chosen: did not sin
  alternatives:
  - did not offend
  - did not do wrong
  lexicon: HALOT
  rationale: חטא is the standard verb 'to sin.' The straightforward rendering should
    be retained rather than weakened to a more general moral term.
- source_word: אִיּוֹב
  chosen: Job
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: וְלֹא נָתַן
  chosen: nor did he charge
  alternatives:
  - and he did not give
  - and he did not ascribe
  - nor did he attribute
  lexicon: HALOT
  rationale: Although נתן literally means 'give,' with the object תִּפְלָה and indirect
    object 'to God' the idiom means to ascribe or lay something upon God. 'Charge'
    is idiomatic English that fits the judicial/moral nuance in context.
- source_word: תִּפְלָה
  chosen: wrongdoing
  alternatives:
  - folly
  - impropriety
  - unseemliness
  - offense
  lexicon: HALOT
  rationale: תִּפְלָה denotes something morally or religiously improper, often 'folly'
    in the sense of impious offense. In this context Job is not attributing anything
    blameworthy to God. 'Wrongdoing' communicates the moral force clearly in modern
    English. 'Folly' is possible but can sound merely intellectual in contemporary
    usage.
- source_word: לֵאלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: 'The preposition ל marks the indirect object of the idiom: Job did not
    attribute/charge such a thing to God. ''God'' is the plain rendering of אֱלֹהִים
    here.'
