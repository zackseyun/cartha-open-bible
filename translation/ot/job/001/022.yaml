theological_decisions:
- issue: How to render תִּפְלָה in relation to God
  chosen_reading: Job did not charge God with wrongdoing
  alternative_readings:
  - Job did not charge God with folly
  - Job did not attribute impropriety to God
  rationale: The verse emphasizes Job's refusal to accuse God of moral fault in response
    to suffering. Rendering תִּפְלָה as 'wrongdoing' preserves that theological point
    in clear English without implying that God could literally be foolish in an intellectual
    sense. The alternatives are lexically possible and worth preserving.
  doctrine_reference: Translation philosophy §3, §6
