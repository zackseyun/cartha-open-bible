id: JOB.1.17
reference: Job 1:17
source:
  edition: WLC
  text: ע֣וֹד זֶ֣ה מְדַבֵּ֗ר וְ/זֶה֮ בָּ֣א וַ/יֹּאמַר֒ כַּשְׂדִּ֞ים שָׂ֣מוּ שְׁלֹשָׁ֣ה
    רָאשִׁ֗ים וַֽ/יִּפְשְׁט֤וּ עַל הַ/גְּמַלִּים֙ וַ/יִּקָּח֔וּ/ם וְ/אֶת הַ/נְּעָרִ֖ים
    הִכּ֣וּ לְ/פִי חָ֑רֶב וָ/אִמָּ֨לְטָ֧/ה רַק אֲנִ֛י לְ/בַדִּ֖/י לְ/הַגִּ֥יד לָֽ/ךְ׀׀־־־־׃
translation:
  text: While this one was still speaking, another came and said, “The Chaldeans formed
    three raiding parties, swept down on the camels and took them, and they struck
    down the young men with the edge of the sword. And I alone have escaped to tell
    you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “made three divisions” or “deployed in three bands”; literally, “set
      three heads.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: “struck ... by the mouth/edge of the sword,” meaning they
      killed them with swords.'
    reason: lexical_alternative
  - marker: c
    text: “Young men” may refer to household attendants or servants in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ע֣וֹד זֶ֣ה מְדַבֵּר
  chosen: While this one was still speaking
  alternatives:
  - While he was yet speaking
  - This one was still speaking
  lexicon: HALOT
  rationale: ע֣וֹד with the participle מְדַבֵּר expresses ongoing action ('still speaking').
    'This one' reflects זֶה anaphorically in the messenger sequence; 'while' gives
    natural English temporal overlap.
- source_word: וְ/זֶה֮ בָּ֣א וַ/יֹּאמַר֒
  chosen: another came and said
  alternatives:
  - and this one came and said
  - and another came and said
  lexicon: HALOT
  rationale: A second זֶה in this repetitive narrative idiom points to the next messenger.
    English idiom prefers 'another' rather than repeating 'this one.'
- source_word: כַּשְׂדִּ֞ים
  chosen: The Chaldeans
  alternatives:
  - Chaldeans
  lexicon: HALOT
  rationale: Ethnonym referring to the raiding group. Definite article in English
    is natural for a known people group acting collectively.
- source_word: שָׂ֣מוּ שְׁלֹשָׁ֣ה רָאשִׁ֗ים
  chosen: formed three raiding parties
  alternatives:
  - set up three groups
  - made three divisions
  - deployed in three bands
  lexicon: HALOT
  rationale: Literally 'set three heads.' In military/raiding context רָאשִׁים denotes
    divisions or detachments. 'Raiding parties' makes the tactical sense explicit
    without over-paraphrasing.
- source_word: וַֽ/יִּפְשְׁט֤וּ עַל
  chosen: swept down on
  alternatives:
  - raided
  - rushed upon
  - made a raid against
  lexicon: HALOT
  rationale: פשט על in this context means to make a raid or rush upon. 'Swept down
    on' preserves the sudden violent movement in readable English.
- source_word: הַ/גְּמַלִּים
  chosen: the camels
  lexicon: HALOT
  rationale: Direct object of the raid; straightforward rendering.
- source_word: וַ/יִּקָּח֔וּ/ם
  chosen: took them
  alternatives:
  - carried them off
  - seized them
  lexicon: HALOT
  rationale: The suffix refers to the camels. 'Took them' is simple and accurate;
    the raiding context already implies seizure.
- source_word: וְ/אֶת הַ/נְּעָרִ֖ים
  chosen: the young men
  alternatives:
  - the servants
  - the attendants
  lexicon: HALOT
  rationale: נְעָרִים can denote youths or servants/attendants. In Job's household
    context these are likely servant-attendants, but the lexical sense 'young men'
    is primary and avoids importing social status beyond the term itself.
- source_word: הִכּ֣וּ לְ/פִי חָ֑רֶב
  chosen: struck down ... with the edge of the sword
  alternatives:
  - killed ... with the sword
  - struck ... by the mouth of the sword
  lexicon: HALOT
  rationale: The idiom לְפִי חָרֶב is literally 'by the mouth/edge of the sword' and
    means death by sword. 'Struck down' preserves the violent action, while 'with
    the edge of the sword' retains the Hebrew idiom in natural English.
- source_word: וָ/אִמָּ֨לְטָ֧/ה רַק אֲנִ֛י לְ/בַדִּ֖/י
  chosen: And I alone have escaped
  alternatives:
  - And only I escaped alone
  - I alone have survived
  lexicon: HALOT
  rationale: The construction emphasizes sole survival. English idiom condenses רַק
    ... לְבַדִּי as 'I alone.' Present perfect fits the resultative sense in the messenger
    report.
- source_word: לְ/הַגִּ֥יד לָֽ/ךְ
  chosen: to tell you
  alternatives:
  - to report to you
  - to inform you
  lexicon: HALOT
  rationale: הגיד means to tell/report. 'Tell you' is direct and fits the urgent messenger
    formula repeated in the passage.
