id: JOB.1.2
reference: Job 1:2
source:
  edition: WLC
  text: וַ/יִּוָּ֥לְדוּ ל֛/וֹ שִׁבְעָ֥ה בָנִ֖ים וְ/שָׁל֥וֹשׁ בָּנֽוֹת׃
translation:
  text: And seven sons and three daughters were born to him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּוָּלְדוּ
  chosen: were born
  alternatives:
  - were begotten
  - were born to
  lexicon: HALOT
  rationale: 'The verb is the waw-consecutive with the Niphal of ילד, expressing passive/resultative
    birth: ''were born.'' English idiom places ''to him'' separately rather than folding
    it into the verb. ''Begotten'' would sound unnatural here and could imply the
    father''s agency more strongly than the Hebrew passive does.'
- source_word: לוֹ
  chosen: to him
  alternatives:
  - for him
  lexicon: HALOT
  rationale: 'The preposition ל with pronominal suffix here marks relation/possession
    in the birth formula: children were born ''to him.'' ''For him'' is possible more
    literally but is less idiomatic in modern English and can suggest benefit rather
    than parentage.'
- source_word: שִׁבְעָה
  chosen: seven
  lexicon: HALOT
  rationale: Straightforward cardinal numeral modifying 'sons.'
- source_word: בָנִים
  chosen: sons
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew specifically denotes male children, so 'sons' preserves the
    gendered reference. 'Children' would lose information present in the source and
    conflict with the gender-accurate principle.
- source_word: וְשָׁלֹשׁ
  chosen: and three
  lexicon: HALOT
  rationale: Simple conjunction plus cardinal numeral introducing the second coordinated
    phrase.
- source_word: בָּנוֹת
  chosen: daughters
  alternatives:
  - girls
  lexicon: HALOT
  rationale: The Hebrew specifically denotes female children. 'Daughters' is the natural
    and accurate English equivalent; 'girls' would be less formal and less precise
    in a genealogical-style notice.
