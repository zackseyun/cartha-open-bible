id: JOB.1.1
reference: Job 1:1
source:
  edition: WLC
  text: אִ֛ישׁ הָיָ֥ה בְ/אֶֽרֶץ ע֖וּץ אִיּ֣וֹב שְׁמ֑/וֹ וְ/הָיָ֣ה הָ/אִ֣ישׁ הַ/ה֗וּא
    תָּ֧ם וְ/יָשָׁ֛ר וִ/ירֵ֥א אֱלֹהִ֖ים וְ/סָ֥ר מֵ/רָֽע־׀׃
translation:
  text: There was a man in the land of Uz whose name was Job, and that man was blameless
    and upright, fearing God and turning away from evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shunning evil.' The Hebrew verb can denote turning aside from, departing
      from, or avoiding evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  lexicon: HALOT
  rationale: The noun is singular masculine and refers to an individual male figure,
    not humanity in general. 'Man' is gender-accurate and natural in English narrative
    opening.
- source_word: הָיָה
  chosen: There was
  alternatives:
  - There lived
  - There came to be
  lexicon: HALOT
  rationale: Used idiomatically to introduce a narrative setting. 'There was' preserves
    the simple existential force without adding nuance not explicit in the Hebrew.
- source_word: בְאֶרֶץ עוּץ
  chosen: in the land of Uz
  alternatives:
  - in the country of Uz
  lexicon: HALOT
  rationale: אֶרֶץ commonly means 'land' in geographic expressions. 'Uz' is transliterated
    as a place name per translation philosophy.
- source_word: אִיּוֹב שְׁמוֹ
  chosen: whose name was Job
  alternatives:
  - Job was his name
  lexicon: HALOT
  rationale: This is the most natural modern English rendering of the Hebrew naming
    clause while preserving its straightforward identificational function. 'Job' is
    a standard transliteration of the personal name.
- source_word: וְהָיָה הָאִישׁ הַהוּא
  chosen: and that man was
  alternatives:
  - and the man was
  - now that man was
  lexicon: HALOT
  rationale: The construction resumes and characterizes the previously introduced
    figure. 'That man' reflects הָאִישׁ הַהוּא with mild demonstrative force and reads
    naturally in English.
- source_word: תָּם
  chosen: blameless
  alternatives:
  - integral
  - whole
  - innocent
  lexicon: HALOT
  rationale: In wisdom literature תָּם denotes moral integrity or completeness rather
    than sinless perfection. 'Blameless' is the established and contextually accurate
    English equivalent.
- source_word: יָשָׁר
  chosen: upright
  alternatives:
  - straight
  - just
  lexicon: HALOT
  rationale: The adjective describes ethical rectitude. 'Upright' pairs well with
    'blameless' and preserves the moral sense without over-specifying legal justice.
- source_word: וִירֵא אֱלֹהִים
  chosen: fearing God
  alternatives:
  - one who feared God
  - God-fearing
  lexicon: HALOT
  rationale: The participial/adjectival sense is well conveyed by 'fearing God,' expressing
    reverent piety rather than terror. Although אֱלֹהִים is morphologically plural,
    the singular sense 'God' is required by context.
- source_word: וְסָר מֵרָע
  chosen: turning away from evil
  alternatives:
  - shunning evil
  - departing from evil
  lexicon: HALOT
  rationale: The phrase denotes active avoidance or rejection of evil. 'Turning away
    from evil' is clear modern English and preserves the verbal imagery better than
    the more interpretive 'shunning.'
