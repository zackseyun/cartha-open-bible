theological_decisions:
- issue: Meaning of Job's moral description
  chosen_reading: Job is described as morally exemplary and possessing integrity,
    not as absolutely sinless.
  alternative_readings:
  - Job is sinless or morally perfect in an absolute sense
  rationale: The adjectives תָּם and יָשָׁר in wisdom context commend integrity and
    uprightness. Rendering תָּם as 'blameless' preserves strong moral praise while
    avoiding an overstatement the Hebrew does not require.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
- issue: Referent of אֱלֹהִים
  chosen_reading: God
  alternative_readings:
  - gods
  rationale: Despite plural morphology, the singular referent is demanded by the idiom
    'fear God' and the monotheistic narrative context of Job.
