id: JOB.1.19
reference: Job 1:19
source:
  edition: WLC
  text: וְ/הִנֵּה֩ ר֨וּחַ גְּדוֹלָ֜ה בָּ֣אָה מֵ/עֵ֣בֶר הַ/מִּדְבָּ֗ר וַ/יִּגַּע֙ בְּ/אַרְבַּע֙ פִּנּ֣וֹת הַ/בַּ֔יִת וַ/יִּפֹּ֥ל עַל הַ/נְּעָרִ֖ים וַ/יָּמ֑וּתוּ וָ/אִמָּ֨לְטָ֧/ה רַק אֲנִ֛י לְ/בַדִּ֖/י לְ/הַגִּ֥יד לָֽ/ךְ׀־־׃
translation:
  text: And behold[a], a great wind came from across the wilderness and struck the four corners of the house, and it fell on the young men, and they died[b]; and I alone have escaped to tell you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a mighty wind' or 'a great storm-wind.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the young men.' The term can also mean 'youths' or, in some contexts, 'servants.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And look
  alternatives:
  - And behold
  - And suddenly
  lexicon: HALOT
  rationale: Introduces the climactic report with vivid immediacy. 'Look' preserves the deictic force in readable modern English better than the more archaic 'behold.'
- source_word: רוּחַ גְּדוֹלָה
  chosen: a great wind
  alternatives:
  - a mighty wind
  - a great storm-wind
  lexicon: HALOT
  rationale: In this context רוּחַ refers to wind rather than spirit or breath. 'Great wind' is a direct rendering of the adjective-noun pairing and fits the disaster report.
- source_word: בָּאָה מֵעֵבֶר הַמִּדְבָּר
  chosen: came from across the wilderness
  alternatives:
  - came from beyond the wilderness
  - came from the far side of the wilderness
  lexicon: HALOT
  rationale: מֵעֵבֶר denotes from the other side/across. 'Across the wilderness' preserves the directional sense without over-specifying geography.
- source_word: וַיִּגַּע בְּאַרְבַּע פִּנּוֹת הַבַּיִת
  chosen: struck the four corners of the house
  alternatives:
  - hit the four corners of the house
  - reached the four corners of the house
  lexicon: HALOT
  rationale: נגע can mean touch, reach, or strike depending on context. Given the destructive result, 'struck' best conveys force while remaining faithful to the verb.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the building
  lexicon: HALOT
  rationale: The ordinary sense 'house' is natural and sufficient here; no contextual need exists to generalize to 'building.'
- source_word: וַיִּפֹּל עַל הַנְּעָרִים
  chosen: and it fell on the young men
  alternatives:
  - and it collapsed on the servants
  - and it fell upon the youths
  lexicon: HALOT
  rationale: The singular verb refers back to the house. נְעָרִים can denote youths, young men, or servants depending on context. Since Job's sons and daughters were feasting in the eldest brother's house in the immediate context, 'young men' is the least interpretively loaded masculine rendering, preserving the Hebrew form without importing 'servants.'
- source_word: הַנְּעָרִים
  chosen: the young men
  alternatives:
  - the youths
  - the servants
  lexicon: HALOT
  rationale: Gender-accurate rendering follows the masculine plural form. Although context may include Job's children more broadly, the messenger's wording uses the masculine term, so the translation preserves that wording rather than harmonizing to 'children.'
- source_word: וַיָּמֻתוּ
  chosen: and they died
  alternatives:
  - and they were killed
  lexicon: HALOT
  rationale: A straightforward rendering of מות. 'They died' preserves the Hebrew wording without adding causative nuance.
- source_word: וָאִמָּלְטָה
  chosen: and I ... have escaped
  alternatives:
  - and I ... escaped
  - and I was delivered
  lexicon: HALOT
  rationale: The verb denotes escape/deliverance. English present perfect ('have escaped') works naturally in reported speech describing the speaker's present status after the event.
- source_word: רַק אֲנִי לְבַדִּי
  chosen: I alone
  alternatives:
  - only I
  - I by myself alone
  lexicon: HALOT
  rationale: Combines the emphatic exclusivity of רַק and לְבַדִּי in idiomatic English without awkward redundancy.
- source_word: לְהַגִּיד לָךְ
  chosen: to tell you
  alternatives:
  - to report to you
  - to inform you
  lexicon: HALOT
  rationale: A simple, natural rendering of the infinitive phrase that fits the messenger formula used repeatedly in this chapter.
