translation:
  text: 'And when the days of the feasting had run their course, Job would send and consecrate them, and he would rise early in the morning and offer burnt offerings according to the number of them all. For Job said, “Perhaps my sons have sinned and cursed God in their hearts.” Thus Job would do all the time.'
