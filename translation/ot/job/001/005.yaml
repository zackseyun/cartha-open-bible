theological_decisions:
- issue: Euphemistic use of ברך with God
  chosen_reading: Render the sense as 'cursed God' in the main text
  alternative_readings:
  - blessed God
  rationale: The Hebrew uses ברך as a reverential euphemism in contexts where the
    meaning is clearly the opposite. Translating the lexical form literally would
    obscure the author's intent and create theological confusion, since Job is concerned
    about hidden impiety, not piety. The literal form is preserved in a footnote for
    transparency.
  doctrine_reference: Translation philosophy §1, §3
