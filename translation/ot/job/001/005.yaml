id: JOB.1.5
reference: Job 1:5
source:
  edition: WLC
  text: וַ/יְהִ֡י כִּ֣י הִקִּיפֽוּ֩ יְמֵ֨י הַ/מִּשְׁתֶּ֜ה וַ/יִּשְׁלַ֧ח אִיּ֣וֹב וַֽ/יְקַדְּשֵׁ֗/ם
    וְ/הִשְׁכִּ֣ים בַּ/בֹּקֶר֮ וְ/הֶעֱלָ֣ה עֹלוֹת֮ מִסְפַּ֣ר כֻּלָּ/ם֒ כִּ֚י אָמַ֣ר
    אִיּ֔וֹב אוּלַי֙ חָטְא֣וּ בָנַ֔/י וּ/בֵרֲכ֥וּ אֱלֹהִ֖ים בִּ/לְבָבָ֑/ם כָּ֛כָה
    יַעֲשֶׂ֥ה אִיּ֖וֹב כָּל הַ/יָּמִֽים־׃פ
translation:
  text: And when the days of the feasting had run their course, Job would send and
    consecrate them, and he would rise early in the morning and offer burnt offerings
    according to the number of them all. For Job said, “Perhaps my sons have sinned
    and cursed God in their hearts.” Thus Job would do all the time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'blessed God'; here 'blessed' is a reverential euphemism for 'cursed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִקִּיפוּ יְמֵי הַמִּשְׁתֶּה
  chosen: the days of the feasting had run their course
  alternatives:
  - the days of the banquet had gone around
  - the feast days had completed their cycle
  lexicon: HALOT
  rationale: The verb נקף in this context conveys completion/cycling through a set
    period. 'Had run their course' is idiomatic English that preserves the temporal
    sense without woodenly reproducing the metaphor. הַמִּשְׁתֶּה is a feast/banquet
    occasion; 'feasting' fits the repeated celebratory meals in context.
- source_word: וַיִּשְׁלַח
  chosen: would send
  alternatives:
  - sent
  lexicon: HALOT
  rationale: In context with the concluding habitual clause ('thus Job would do all
    the time'), the wayyiqtol is best represented as customary past action rather
    than a single event.
- source_word: וַיְקַדְּשֵׁם
  chosen: consecrate them
  alternatives:
  - sanctify them
  - purify them
  lexicon: HALOT
  rationale: קדש in the piel means to set apart as holy/consecrate. 'Consecrate' preserves
    the cultic-religious sense better than the broader 'purify,' while remaining readable.
- source_word: וְהִשְׁכִּים בַּבֹּקֶר
  chosen: he would rise early in the morning
  alternatives:
  - he rose early in the morning
  lexicon: HALOT
  rationale: The idiom means to get up early. The habitual nuance is maintained to
    match the verse's summary statement.
- source_word: וְהֶעֱלָה עֹלוֹת
  chosen: offer burnt offerings
  alternatives:
  - bring up burnt offerings
  - sacrifice burnt offerings
  lexicon: HALOT
  rationale: עלה with עֹלוֹת is standard sacrificial language. 'Offer burnt offerings'
    is clear, accurate, and preserves the technical cultic term עֹלוֹת.
- source_word: מִסְפַּר כֻּלָּם
  chosen: according to the number of them all
  alternatives:
  - the number of all of them
  - for each one of them
  lexicon: HALOT
  rationale: The phrase indicates a total corresponding count, likely one offering
    per child. 'According to the number of them all' stays close to the Hebrew while
    remaining natural.
- source_word: אוּלַי
  chosen: Perhaps
  alternatives:
  - It may be that
  - Maybe
  lexicon: HALOT
  rationale: אוּלַי expresses possibility. 'Perhaps' is concise and suitably sober
    in tone.
- source_word: חָטְאוּ
  chosen: have sinned
  alternatives:
  - sinned
  lexicon: HALOT
  rationale: The perfect can be rendered with English present perfect here because
    Job is considering possible completed acts with present relevance.
- source_word: וּבֵרֲכוּ אֱלֹהִים
  chosen: cursed God
  alternatives:
  - blessed God
  lexicon: HALOT
  rationale: ברך ('bless') is used euphemistically here for the opposite in contexts
    involving speaking against God (cf. Job 1:11; 2:5, 9). Rendering it literally
    as 'blessed' would mislead English readers, so the idiomatic sense 'cursed' is
    used in the main text, with the lexical form preserved in a footnote for auditability.
- source_word: בִּלְבָבָם
  chosen: in their hearts
  alternatives:
  - in their mind
  - within themselves
  lexicon: HALOT
  rationale: לֵבָב commonly denotes the inner person, including thought and will.
    'In their hearts' is the standard and fitting English equivalent.
- source_word: כָּכָה יַעֲשֶׂה ... כָּל הַיָּמִים
  chosen: Thus Job would do all the time
  alternatives:
  - Thus Job did continually
  - This is what Job always did
  lexicon: HALOT
  rationale: The clause summarizes Job's regular practice. 'Would do' conveys habitual
    past action; 'all the time' renders כָּל הַיָּמִים idiomatically in modern English.
