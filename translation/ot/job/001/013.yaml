id: JOB.1.13
reference: Job 1:13
source:
  edition: WLC
  text: וַ/יְהִ֖י הַ/יּ֑וֹם וּ/בָנָ֨י/ו וּ/בְנֹתָ֤י/ו אֹֽכְלִים֙ וְ/שֹׁתִ֣ים יַ֔יִן
    בְּ/בֵ֖ית אֲחִי/הֶ֥ם הַ/בְּכֽוֹר׃
translation:
  text: Now there was a day when his sons and his daughters were eating and drinking
    wine in the house of their oldest brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "their firstborn brother."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now there was
  alternatives:
  - And it happened
  - And there was
  lexicon: HALOT
  rationale: The wayyiqtol of היה introduces a new narrative scene. 'Now there was'
    is natural modern English that preserves the event-setting function without overly
    wooden style.
- source_word: הַיּוֹם
  chosen: a day
  alternatives:
  - the day
  - that day
  lexicon: HALOT
  rationale: Although formally definite ('the day'), in this idiom ויהי היום commonly
    functions as an indefinite narrative marker, 'there was a day' or 'one day.' 'A
    day' best reflects the Hebrew idiom in readable English.
- source_word: וּבָנָיו וּבְנֹתָיו
  chosen: his sons and his daughters
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew explicitly names both sons and daughters. Following gender-accurate
    translation philosophy, the specific pair should be preserved rather than collapsed
    into 'children.'
- source_word: אֹכְלִים וְשֹׁתִים
  chosen: were eating and drinking
  alternatives:
  - ate and drank
  - were feasting
  lexicon: HALOT
  rationale: The participles depict ongoing action in the scene. 'Were eating and
    drinking' preserves that aspect better than a simple past, and avoids importing
    the more interpretive 'feasting' into the main text.
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: Straightforward lexical equivalent; no contextual reason to generalize
    to 'drink' or 'banquet.'
- source_word: בְּבֵית
  chosen: in the house of
  alternatives:
  - at the house of
  - in the home of
  lexicon: HALOT
  rationale: The construct phrase with ב marks location. 'In the house of' is a clear
    and sufficiently formal rendering.
- source_word: אֲחִיהֶם
  chosen: their brother
  alternatives:
  - their kinsman
  lexicon: HALOT
  rationale: The noun plainly means 'their brother.' Since the subject includes both
    sons and daughters, English singular 'their brother' naturally represents the
    familial relation.
- source_word: הַבְּכוֹר
  chosen: oldest
  alternatives:
  - firstborn
  - eldest
  lexicon: HALOT
  rationale: While the term literally means 'firstborn,' in this context it identifies
    the brother by birth order within the family gathering. 'Oldest brother' communicates
    the sense idiomatically in modern English. The more formal 'firstborn' is preserved
    as an alternative worth noting.
