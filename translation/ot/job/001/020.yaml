theological_decisions:
- issue: Whether Job's final act is rendered as mere physical prostration or explicitly
    as worship
  chosen_reading: bowed down in worship
  alternative_readings:
  - bowed down
  - prostrated himself
  rationale: In context, Job responds to catastrophic loss with reverent submission
    to God, and the following verse contains explicit God-directed speech. Rendering
    שׁחה as 'bowed down in worship' preserves both the physical gesture and its religious
    significance without importing claims beyond the context.
  doctrine_reference: Translation philosophy §3, §6
