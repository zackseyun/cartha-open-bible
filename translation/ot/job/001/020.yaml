id: JOB.1.20
reference: Job 1:20
source:
  edition: WLC
  text: וַ/יָּ֤קָם אִיּוֹב֙ וַ/יִּקְרַ֣ע אֶת מְעִל֔/וֹ וַ/יָּ֖גָז אֶת רֹאשׁ֑/וֹ וַ/יִּפֹּ֥ל
    אַ֖רְצָ/ה וַ/יִּשְׁתָּֽחוּ־־׃
translation:
  text: Then Job rose, tore his robe, shaved his head, fell to the ground, and bowed
    down in worship.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prostrated himself.' The Hebrew verb can denote bowing oneself down
      physically, often as an act of reverence or worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: rose
  alternatives:
  - got up
  - stood up
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום marks the next action in sequence. 'Rose' is concise
    and idiomatic in narrative English.
- source_word: מְעִילוֹ
  chosen: his robe
  alternatives:
  - his mantle
  - his garment
  lexicon: HALOT
  rationale: מְעִיל commonly denotes an outer garment or robe. 'Robe' is natural modern
    English and preserves the sense of a significant article of clothing torn in mourning.
- source_word: וַיִּקְרַע אֶת מְעִילוֹ
  chosen: tore his robe
  alternatives:
  - rent his robe
  - tore his mantle
  lexicon: HALOT
  rationale: קרע in mourning contexts means to tear clothing. 'Tore' avoids archaic
    'rent' while preserving the concrete mourning gesture.
- source_word: וַיָּגָז אֶת רֹאשׁוֹ
  chosen: shaved his head
  alternatives:
  - cut off the hair of his head
  - sheared his head
  lexicon: HALOT
  rationale: גזז literally means to shear/cut, often of hair or wool. In this mourning
    context, 'shaved his head' best communicates the idiomatic action in clear English,
    without implying total baldness beyond what the phrase naturally suggests.
- source_word: וַיִּפֹּל אַרְצָה
  chosen: fell to the ground
  alternatives:
  - fell to the earth
  - fell down to the ground
  lexicon: HALOT
  rationale: The directional form אַרְצָה indicates motion toward the ground/earth.
    'Fell to the ground' is idiomatic and vivid.
- source_word: וַיִּשְׁתָּחוּ
  chosen: bowed down in worship
  alternatives:
  - prostrated himself
  - worshiped
  lexicon: HALOT
  rationale: The Hishtaphel/Hishtafel form of שׁחה denotes bowing oneself down, often
    in reverence or worship. Because English 'bowed down' alone may sound merely physical,
    'in worship' makes explicit the reverential force present in context while retaining
    the bodily action.
