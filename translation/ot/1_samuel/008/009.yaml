id: 1SA.8.9
reference: 1 Samuel 8:9
source:
  edition: WLC
  text: וְ/עַתָּ֖ה שְׁמַ֣ע בְּ/קוֹלָ֑/ם אַ֗ךְ כִּֽי הָעֵ֤ד תָּעִיד֙ בָּ/הֶ֔ם וְ/הִגַּדְתָּ֣ לָ/הֶ֔ם מִשְׁפַּ֣ט הַ/מֶּ֔לֶךְ אֲשֶׁ֥ר יִמְלֹ֖ךְ עֲלֵי/הֶֽם־׃ס
translation:
  text: So now[a], listen to their voice; only, you must solemnly warn them and tell them the justice of the king who will reign over them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the manner of the king'; the Hebrew מִשְׁפַּט can also mean 'legal right' or 'customary practice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַע בְּקוֹלָם
  chosen: listen to their voice
  alternatives:
  - obey their voice
  - heed them
  - listen to them
  lexicon: HALOT
  rationale: The idiom שׁמע בקול commonly means to listen to or heed someone. Rendering it as 'listen to their voice' preserves the Hebrew expression while remaining natural enough in English. 'Obey' is possible in context, but 'listen' better leaves room for the nuance that Samuel is to grant their request rather than endorse it.
- source_word: אַךְ כִּי
  chosen: only
  alternatives:
  - however
  - nevertheless
  - but surely
  lexicon: HALOT
  rationale: The combination marks a strong qualification to the preceding command. 'Only' captures the restrictive force concisely in modern English.
- source_word: הָעֵד תָּעִיד
  chosen: you must solemnly warn
  alternatives:
  - surely warn
  - earnestly testify against
  - plainly forewarn
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. The root עוּד in Hiphil here carries the sense of giving formal warning or testimony. 'Solemnly warn' conveys both the intensity and the juridical seriousness better than a flat 'warn.'
- source_word: בָּהֶם
  chosen: them
  alternatives:
  - to them
  - against them
  lexicon: HALOT
  rationale: With עוּד in this construction, the preposition can suggest warning directed toward or against them. In idiomatic English, 'warn them' best communicates the sense without awkwardness. The adversative nuance is preserved by 'solemnly.'
- source_word: וְהִגַּדְתָּ לָהֶם
  chosen: and tell them
  alternatives:
  - and declare to them
  - and make known to them
  lexicon: HALOT
  rationale: נגד in Hiphil means to tell, declare, or make known. 'Tell them' is clear modern English and fits the direct instructional context.
- source_word: מִשְׁפַּט הַמֶּלֶךְ
  chosen: the custom of the king
  alternatives:
  - the justice of the king
  - the legal right of the king
  - the manner of the king
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, justice, legal claim, or customary practice. In this context, introducing the description of what the king will take and do, it refers to the kingly practice or prerogative. 'Custom of the king' is more intelligible than the traditional 'manner of the king' while avoiding the overly technical 'legal right,' which could imply divine approval.
- source_word: אֲשֶׁר יִמְלֹךְ עֲלֵיהֶם
  chosen: who will reign over them
  alternatives:
  - who will rule over them
  - who will become king over them
  lexicon: HALOT
  rationale: מלך in Qal here denotes reigning as king. 'Reign over them' preserves the royal nuance more precisely than the broader 'rule over them.'
