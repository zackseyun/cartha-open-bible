theological_decisions:
- issue: Whether מִשְׁפַּט הַמֶּלֶךְ should be rendered as a neutral/positive legal right or as descriptive royal practice
  chosen_reading: Rendered as 'the custom of the king' to describe the kind of conduct and claims the future king will exercise over the people.
  alternative_readings:
  - the legal right of the king
  - the manner of the king
  rationale: The following verses describe burdensome royal exactions. Translating מִשְׁפָּט as 'legal right' could suggest moral or divine legitimation beyond what the passage itself states. 'Custom' preserves the descriptive force and the warning tone without importing a political theology not explicit in the text.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
