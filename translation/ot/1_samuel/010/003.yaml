id: 1SA.10.3
reference: 1 Samuel 10:3
source:
  edition: WLC
  text: וְ/חָלַפְתָּ֨ מִ/שָּׁ֜ם וָ/הָ֗לְאָה וּ/בָ֨אתָ֙ עַד אֵל֣וֹן תָּב֔וֹר וּ/מְצָא֤וּ/ךָ
    שָּׁם֙ שְׁלֹשָׁ֣ה אֲנָשִׁ֔ים עֹלִ֥ים אֶל הָ/אֱלֹהִ֖ים בֵּֽית אֵ֑ל אֶחָ֞ד נֹשֵׂ֣א
    שְׁלֹשָׁ֣ה גְדָיִ֗ים וְ/אֶחָד֙ נֹשֵׂ֗א שְׁלֹ֨שֶׁת֙ כִּכְּר֣וֹת לֶ֔חֶם וְ/אֶחָ֥ד
    נֹשֵׂ֖א נֵֽבֶל יָֽיִן־־־׀־׃
translation:
  text: 'Then you will pass on from there and go farther, and you will come to the
    oak of Tabor. There three men going up to God at Bethel will meet you: one carrying
    three young goats, another carrying three loaves of bread, and another carrying
    a skin of wine.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the terebinth of Tabor.' The Hebrew word can refer to a large tree such
      as an oak or terebinth.
    reason: lexical_alternative
  - marker: b
    text: Literally 'going up to God at Bethel'; this likely refers to traveling to
      a worship site at Bethel.
    reason: cultural_note
  - marker: c
    text: Or 'a wineskin of wine.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחָלַפְתָּ
  chosen: you will pass on
  alternatives:
  - you will pass by
  - you will go on
  lexicon: HALOT
  rationale: The verb חלף here marks moving onward from the previous location. 'Pass
    on' preserves the sequential movement without implying merely passing beside something.
- source_word: וָהָלְאָה
  chosen: go farther
  alternatives:
  - beyond
  - onward
  lexicon: HALOT
  rationale: This adverb intensifies continued movement beyond the prior point. Rendering
    it verbally as 'go farther' makes natural English while preserving the sense of
    proceeding onward.
- source_word: אֵלוֹן תָּבוֹר
  chosen: the oak of Tabor
  alternatives:
  - the terebinth of Tabor
  - the great tree of Tabor
  lexicon: HALOT
  rationale: אֵלוֹן can denote a large tree, often rendered 'oak' or 'terebinth.'
    'Oak' is a standard, readable rendering in English; the place name Tabor is transliterated.
- source_word: וּמְצָאוּךָ
  chosen: will meet you
  alternatives:
  - will find you
  lexicon: HALOT
  rationale: Although the verb literally means 'find,' in this encounter context 'meet
    you' better conveys the sense in idiomatic English without losing the basic meaning.
- source_word: עֹלִים אֶל הָאֱלֹהִים בֵּית אֵל
  chosen: going up to God at Bethel
  alternatives:
  - going up to Bethel to God
  - going up to worship God at Bethel
  lexicon: HALOT
  rationale: The Hebrew literally says 'going up to God, Bethel.' This likely indicates
    pilgrimage to a worship site at Bethel. 'Going up to God at Bethel' preserves
    the theological direction of the phrase without adding 'worship' explicitly, which
    is implied but not stated.
- source_word: גְדָיִים
  chosen: young goats
  alternatives:
  - kids
  - goat kids
  lexicon: HALOT
  rationale: The noun refers to young goats. 'Young goats' is clear and natural; 'kids'
    could sound overly colloquial.
- source_word: כִּכְּרוֹת לֶחֶם
  chosen: loaves of bread
  alternatives:
  - round loaves of bread
  - bread cakes
  lexicon: HALOT
  rationale: כִּכָּר often refers to a round loaf or cake. 'Loaves of bread' is the
    most natural English equivalent here and sufficiently precise for the context.
- source_word: נֵבֶל יָיִן
  chosen: a skin of wine
  alternatives:
  - a wineskin of wine
  - a jar of wine
  lexicon: HALOT
  rationale: נֵבֶל in this context denotes a container for liquid, commonly understood
    as a skin-bottle or wineskin. 'A skin of wine' is concise, idiomatic, and avoids
    the awkward redundancy of 'wineskin of wine.'
