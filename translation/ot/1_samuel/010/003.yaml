theological_decisions:
- issue: Meaning of 'going up to God at Bethel'
  chosen_reading: A pilgrimage or approach to a worship site at Bethel is described,
    without specifying more than the Hebrew states.
  alternative_readings:
  - going up to worship God at Bethel
  - going up to the house of God at Bethel
  rationale: The phrase indicates ascent toward God in connection with Bethel, but
    the text does not explicitly mention sacrifice or worship in this clause. The
    translation preserves the religious orientation without importing additional ritual
    detail.
  doctrine_reference: Translation philosophy §§1, 3, 6
