id: 1SA.10.11
reference: 1 Samuel 10:11
source:
  edition: WLC
  text: וַ/יְהִ֗י כָּל יֽוֹדְע/וֹ֙ מֵ/אִתְּמ֣וֹל שִׁלְשׁ֔וֹם וַ/יִּרְא֕וּ וְ/הִנֵּ֥ה
    עִם נְבִאִ֖ים נִבָּ֑א וַ/יֹּ֨אמֶר הָ/עָ֜ם אִ֣ישׁ אֶל רֵעֵ֗/הוּ מַה זֶּה֙ הָיָ֣ה
    לְ/בֶן קִ֔ישׁ הֲ/גַ֥ם שָׁא֖וּל בַּ/נְּבִיאִֽים־־־־־׃
translation:
  text: And it happened that all who had known him previously saw, and behold, he
    was prophesying with the prophets. So the people said, each man to his neighbor,
    “What has happened to the son of Kish? Is Saul also among the prophets?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “had known him from yesterday and the day before,” a Hebrew idiom meaning
      “had known him previously.”
    reason: lexical_alternative
  - marker: b
    text: Or, “Is even Saul among the prophets?”
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹדְעוֹ מֵאִתְּמוֹל שִׁלְשׁוֹם
  chosen: had known him previously
  alternatives:
  - had known him from yesterday and the day before
  - had known him formerly
  lexicon: HALOT
  rationale: The idiom מֵאִתְּמוֹל שִׁלְשׁוֹם literally refers to prior time ('from
    yesterday, the day before'), functioning idiomatically as 'previously' or 'formerly.'
    'Had known him previously' conveys the temporal sense naturally in English while
    preserving the contrast with Saul's present behavior.
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: This narrative wayyiqtol formula marks continuation in Hebrew storytelling.
    'And it happened' preserves the discourse function in readable modern English
    without archaic tone.
- source_word: וַיִּרְאוּ וְהִנֵּה
  chosen: saw, and behold
  alternatives:
  - saw, and look
  - saw that
  lexicon: HALOT
  rationale: וְהִנֵּה adds vividness and surprise. Retaining 'behold' preserves the
    suddenness of the observation better than flattening it to a simple object clause.
- source_word: עִם נְבִאִים
  chosen: with the prophets
  alternatives:
  - among the prophets
  lexicon: HALOT
  rationale: The preposition עִם most directly means 'with.' Since the final clause
    uses בַּנְּבִיאִים ('among the prophets'), differentiating the two prepositions
    in English helps preserve the Hebrew wording.
- source_word: נִבָּא
  chosen: was prophesying
  alternatives:
  - prophesied
  - was acting as a prophet
  lexicon: HALOT
  rationale: The Niphal of נבא in this context denotes prophetic activity. The progressive
    'was prophesying' fits the scene of ongoing action observed by others.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the crowd
  lexicon: HALOT
  rationale: הָעָם here refers to the people generally who witnessed or discussed
    the event. 'The people' is the most straightforward rendering.
- source_word: אִישׁ אֶל רֵעֵהוּ
  chosen: each man to his neighbor
  alternatives:
  - one to another
  - each person to his companion
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular distributive ('a man to his
    neighbor/friend'). Following the project's gender-accurate principle, 'each man
    to his neighbor' preserves the form and idiomatic force.
- source_word: מַה זֶּה הָיָה לְבֶן קִישׁ
  chosen: What has happened to the son of Kish?
  alternatives:
  - What is this that has happened to the son of Kish?
  - What has come over the son of Kish?
  lexicon: HALOT
  rationale: The phrase expresses surprise at Saul's changed state. 'What has happened
    to the son of Kish?' is natural English and stays close to the Hebrew without
    adding interpretive coloring.
- source_word: הֲגַם שָׁאוּל בַּנְּבִיאִים
  chosen: Is Saul also among the prophets?
  alternatives:
  - Is even Saul among the prophets?
  lexicon: HALOT
  rationale: הֲגַם introduces a surprised yes/no question with the sense 'also/even.'
    'Also' reads smoothly in English; 'even' is a viable alternative that heightens
    the surprise slightly more explicitly.
