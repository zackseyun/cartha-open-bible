id: 1SA.10.27
reference: 1 Samuel 10:27
source:
  edition: WLC
  text: וּ/בְנֵ֧י בְלִיַּ֣עַל אָמְר֗וּ מַה יֹּשִׁעֵ֨/נוּ֙ זֶ֔ה וַ/יִּבְזֻ֕/הוּ וְ/לֹֽא
    הֵבִ֥יאוּ ל֖/וֹ מִנְחָ֑ה וַ/יְהִ֖י כְּ/מַחֲרִֽישׁ־־׃פ
translation:
  text: But worthless men said, “How can this man save us?” And they despised him
    and did not bring him a gift. But he was like one keeping silent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “as though he were deaf.” The Hebrew expression can describe deliberate
      silence in the face of provocation.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי בְלִיַּעַל
  chosen: worthless men
  alternatives:
  - sons of worthlessness
  - scoundrels
  lexicon: HALOT
  rationale: The idiom literally means 'sons of worthlessness' and refers to morally
    base or lawless people. 'Worthless men' preserves the Hebrew force without sounding
    unnatural in English. 'Scoundrels' is possible but slightly more interpretive.
- source_word: מַה יֹּשִׁיעֵנוּ זֶה
  chosen: How can this man save us?
  alternatives:
  - How will this one save us?
  - What can this fellow do to save us?
  lexicon: HALOT
  rationale: The interrogative plus Hiphil of ישׁע expresses skeptical challenge.
    'How can this man save us?' captures both the question and the contempt. 'This
    man' is smoother English than the more wooden 'this one,' while still reflecting
    זֶה.
- source_word: וַיִּבְזֻהוּ
  chosen: they despised him
  alternatives:
  - they held him in contempt
  - they treated him with contempt
  lexicon: HALOT
  rationale: בזה denotes despising or treating as insignificant. 'Despised him' is
    concise and direct, matching the narrative tone.
- source_word: מִנְחָה
  chosen: a gift
  alternatives:
  - tribute
  - offering
  - present
  lexicon: HALOT
  rationale: In this royal context, מִנְחָה refers to a present or tribute brought
    to a ruler, not necessarily a cultic offering. 'Gift' is clear modern English;
    'tribute' is possible and highlights political submission, but may over-specify
    beyond the immediate wording.
- source_word: כְּמַחֲרִישׁ
  chosen: like one keeping silent
  alternatives:
  - as though he were deaf
  - keeping silent
  - as one who remained silent
  lexicon: HALOT
  rationale: 'The participial form from חרשׁ here most naturally means remaining silent
    rather than literal deafness. The prefixed כ marks comparison: Saul was ''like
    one keeping silent,'' i.e., he did not respond. This preserves the simile and
    avoids over-interpreting motive.'
- source_word: וַיְהִי
  chosen: he was
  alternatives:
  - he became
  - he remained
  lexicon: HALOT
  rationale: Here היה introduces Saul's resulting demeanor. 'He was' is the most straightforward
    rendering in English before the comparative phrase 'like one keeping silent.'
