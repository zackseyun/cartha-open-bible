theological_decisions:
- issue: Nature of God's action in touching the men's hearts
  chosen_reading: Render the idiom straightforwardly as divine influence without specifying
    a doctrinal mechanism.
  alternative_readings:
  - whose hearts God had stirred
  - whose hearts God had moved
  rationale: The text states that God touched their hearts, indicating divine initiative
    affecting their inner disposition toward Saul. The translation preserves that
    theological claim while avoiding stronger interpretive expansions such as regeneration,
    irresistible compulsion, or merely sentimental encouragement.
  doctrine_reference: Preserve theological tension rather than resolve it.
