id: 1SA.10.26
reference: 1 Samuel 10:26
source:
  edition: WLC
  text: וְ/גַ֨ם שָׁא֔וּל הָלַ֥ךְ לְ/בֵית֖/וֹ גִּבְעָ֑תָ/ה וַ/יֵּלְכ֣וּ עִמּ֔/וֹ הַ/חַ֕יִל
    אֲשֶׁר נָגַ֥ע אֱלֹהִ֖ים בְּ/לִבָּֽ/ם־־׃
translation:
  text: Saul also went to his home at Gibeah, and with him went the valiant men whose
    hearts God had touched.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the men of valor' or 'the warriors.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'whose hearts God had touched'; the idiom indicates God moved their
      inner disposition.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: also
  alternatives:
  - and also
  - moreover
  lexicon: HALOT
  rationale: Marks addition/continuation in the narrative. 'Also' is concise and natural
    in English here.
- source_word: הָלַךְ לְבֵיתוֹ גִּבְעָתָה
  chosen: went to his home at Gibeah
  alternatives:
  - went to his house, to Gibeah
  - went home to Gibeah
  lexicon: HALOT
  rationale: Combines the motion verb with לביתו and the directional form גבעתה. 'Home
    at Gibeah' preserves both the personal destination and the place name in readable
    English.
- source_word: וַיֵּלְכוּ עִמּוֹ
  chosen: and with him went
  alternatives:
  - and they went with him
  - and went with him
  lexicon: HALOT
  rationale: Keeps the Hebrew narrative sequence and slightly fronted emphasis on
    accompaniment, while remaining idiomatic English.
- source_word: הַחַיִל
  chosen: the valiant men
  alternatives:
  - the army
  - the warriors
  - the men of valor
  - the force
  lexicon: HALOT
  rationale: In this context the term refers not to the whole army as an institution
    but to a group of capable, loyal fighting men accompanying Saul. 'Valiant men'
    captures both martial capacity and commendable character in natural English.
- source_word: אֲשֶׁר נָגַע אֱלֹהִים בְּלִבָּם
  chosen: whose hearts God had touched
  alternatives:
  - whose heart God had touched
  - whom God had touched in their hearts
  - whose minds God had moved
  lexicon: HALOT
  rationale: The plural suffix on 'their heart(s)' is best rendered distributively
    in English as 'whose hearts.' 'Touched' preserves the metaphor of divine influence
    without over-interpreting it as conversion, coercion, or mere emotion.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים clearly refers to the God of Israel, so 'God' is the standard
    English rendering.
- source_word: לֵב
  chosen: hearts
  alternatives:
  - mind
  - inner being
  lexicon: HALOT
  rationale: In Hebrew anthropology לב commonly denotes the inner person including
    will, thought, and disposition. 'Hearts' is the most transparent and traditional
    English equivalent here, with the fuller sense carried by context.
