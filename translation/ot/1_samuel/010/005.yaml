theological_decisions:
- issue: Nature of prophetic activity in מִתְנַבְּאִים
  chosen_reading: Rendered as 'prophesying' without specifying ecstatic behavior
  alternative_readings:
  - acting like prophets in ecstatic speech
  - praising in inspired music
  rationale: The verb clearly indicates prophetic activity, but the text does not
    require a narrower description of the phenomenon. The translation preserves the
    theological and phenomenological openness of the Hebrew rather than resolving
    it.
  doctrine_reference: Preserve theological tension rather than resolve it.
