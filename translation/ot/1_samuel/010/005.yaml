id: 1SA.10.5
reference: 1 Samuel 10:5
source:
  edition: WLC
  text: אַ֣חַר כֵּ֗ן תָּבוֹא֙ גִּבְעַ֣ת הָ/אֱלֹהִ֔ים אֲשֶׁר שָׁ֖ם נְצִבֵ֣י פְלִשְׁתִּ֑ים
    וִ/יהִי֩ כְ/בֹאֲ/ךָ֨ שָׁ֜ם הָ/עִ֗יר וּ/פָגַעְתָּ֞ חֶ֤בֶל נְבִיאִים֙ יֹרְדִ֣ים
    מֵֽ/הַ/בָּמָ֔ה וְ/לִ/פְנֵי/הֶ֞ם נֵ֤בֶל וְ/תֹף֙ וְ/חָלִ֣יל וְ/כִנּ֔וֹר וְ/הֵ֖מָּה
    מִֽתְנַבְּאִֽים־׃
translation:
  text: After that you will come to Gibeath-ha-Elohim, where the Philistine garrison
    is. And when you enter there, into the city, you will meet a band of prophets
    coming down from the high place, with harp, tambourine, flute, and lyre before
    them, and they will be prophesying.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the hill of God' / 'Gibeah of God'; the Hebrew may be understood as
      a place name or as a descriptive title for the location.
    reason: alternative_reading
  - marker: b
    text: Or 'Philistine outpost' or 'Philistine prefects'; the Hebrew term can refer
      either to a military station or to officials, though the context favors a garrison.
    reason: alternative_reading
  - marker: c
    text: 'The exact identification of the instruments is uncertain: ''harp'' (נֵבֶל)
      could also be ''lute,'' and ''flute'' could also be ''pipe.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: גִּבְעַת הָאֱלֹהִים
  chosen: Gibeath-ha-Elohim
  alternatives:
  - the hill of God
  - Gibeah of God
  lexicon: HALOT
  rationale: Treated as a place name and therefore transliterated rather than translated,
    in keeping with the philosophy to transliterate names. The construct phrase likely
    functions here as the proper name of the location rather than a descriptive common
    noun phrase.
- source_word: נְצִבֵי פְלִשְׁתִּים
  chosen: the Philistine garrison
  alternatives:
  - Philistine prefects
  - Philistine governors
  - Philistine outpost
  lexicon: HALOT
  rationale: נְצִיב can denote an official or a stationed military post depending
    on context. Here the geographical setting and subsequent narrative favor a military
    sense, so 'garrison' best fits.
- source_word: וִיהִי כְבֹאֲךָ שָׁם הָעִיר
  chosen: And when you enter there, into the city
  alternatives:
  - And it will happen, when you come there to the city
  - when you arrive there at the city
  lexicon: HALOT
  rationale: The Hebrew uses a common narrative formula with היה plus infinitive construct.
    Rendered idiomatically in modern English while preserving the temporal force.
    The appositional 'there, into the city' reflects both שָׁם and הָעִיר without
    over-literal awkwardness.
- source_word: וּפָגַעְתָּ
  chosen: you will meet
  alternatives:
  - you will encounter
  - you will come upon
  lexicon: HALOT
  rationale: In this context פגע means to come upon or encounter. 'Meet' is natural
    English and preserves the sense of an unexpected encounter.
- source_word: חֶבֶל נְבִיאִים
  chosen: a band of prophets
  alternatives:
  - a company of prophets
  - a group of prophets
  lexicon: HALOT
  rationale: חבל can denote a band or company. 'Band' is concise and idiomatic for
    a prophetic group moving together.
- source_word: יֹרְדִים מֵהַבָּמָה
  chosen: coming down from the high place
  alternatives:
  - descending from the high place
  - coming down from the shrine
  lexicon: HALOT
  rationale: במה refers to a cultic high place. 'High place' is the standard and most
    transparent rendering in the Hebrew Bible. 'Coming down' is smoother than the
    more formal 'descending'.
- source_word: נֵבֶל
  chosen: harp
  alternatives:
  - lute
  - psaltery
  lexicon: HALOT
  rationale: The exact ancient instrument is uncertain. 'Harp' is a familiar modern
    approximation and avoids archaic terminology, while the uncertainty is worth preserving
    in a footnote.
- source_word: תֹף
  chosen: tambourine
  alternatives:
  - drum
  - hand drum
  lexicon: HALOT
  rationale: תֹף commonly refers to a hand-held percussion instrument, often rendered
    'tambourine.' This is more specific and natural than the generic 'drum'.
- source_word: חָלִיל
  chosen: flute
  alternatives:
  - pipe
  lexicon: HALOT
  rationale: A wind instrument; 'flute' is the clearest accessible rendering, though
    'pipe' is also possible.
- source_word: כִּנּוֹר
  chosen: lyre
  alternatives:
  - harp
  lexicon: HALOT
  rationale: כִּנּוֹר is conventionally identified as a lyre-type stringed instrument.
    Using 'lyre' here helps distinguish it from נֵבֶל, rendered 'harp'.
- source_word: וְהֵמָּה מִתְנַבְּאִים
  chosen: and they will be prophesying
  alternatives:
  - and they will be in a prophetic state
  - and they will be speaking prophetically
  lexicon: HALOT
  rationale: The hitpael of נבא often denotes prophetic activity, possibly ecstatic.
    'Prophesying' preserves the lexical connection without over-interpreting the exact
    mode of inspiration.
