id: 1SA.10.4
reference: 1 Samuel 10:4
source:
  edition: WLC
  text: וְ/שָׁאֲל֥וּ לְ/ךָ֖ לְ/שָׁל֑וֹם וְ/נָתְנ֤וּ לְ/ךָ֙ שְׁתֵּי לֶ֔חֶם וְ/לָקַחְתָּ֖
    מִ/יָּדָֽ/ם־׃
translation:
  text: They will ask you about your welfare and give you two loaves of bread, and
    you shall receive them from their hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'They will greet you.' The Hebrew idiom literally involves asking concerning
      peace/well-being.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'two bread'; idiomatically, 'two loaves of bread.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'you shall take them from their hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁאֲלוּ לְךָ לְשָׁלוֹם
  chosen: They will ask you about your welfare
  alternatives:
  - They will greet you
  - They will ask how you are
  - They will ask you of peace
  lexicon: HALOT
  rationale: שׁאל with לְשָׁלוֹם is an idiom for inquiring after someone's well-being
    or greeting them. 'Ask you about your welfare' preserves the interpersonal inquiry
    more explicitly than the smoother but less literal 'greet you.'
- source_word: שָׁלוֹם
  chosen: welfare
  alternatives:
  - peace
  - well-being
  lexicon: HALOT
  rationale: In this idiomatic construction, שָׁלוֹם refers to personal well-being
    rather than abstract peace. 'Welfare' is concise and natural in English while
    retaining the sense of condition or well-being.
- source_word: וְנָתְנוּ לְךָ
  chosen: and give you
  alternatives:
  - and will give you
  lexicon: HALOT
  rationale: The Hebrew wayyiqtol sequence continues Samuel's prediction of future
    events. English simple future sense is conveyed naturally here as 'give you' within
    the coordinated clause.
- source_word: שְׁתֵּי לֶחֶם
  chosen: two loaves of bread
  alternatives:
  - two pieces of bread
  - two breads
  lexicon: HALOT
  rationale: Although לֶחֶם is formally 'bread,' in countable context with 'two' English
    idiom prefers 'two loaves of bread.' This avoids the awkward 'two breads' and
    reflects the likely intended units.
- source_word: וְלָקַחְתָּ מִיָּדָם
  chosen: and you shall receive them from their hand
  alternatives:
  - and you shall take them from their hand
  - and you shall accept them from them
  lexicon: HALOT
  rationale: לקח is literally 'take,' but in this context of being given bread, 'receive'
    better conveys the social action in natural English while preserving the directive
    force. 'From their hand' keeps the Hebrew singular noun with plural suffix as
    an idiomatic collective expression.
- source_word: מִיָּדָם
  chosen: from their hand
  alternatives:
  - from them
  - from their hands
  lexicon: HALOT
  rationale: The Hebrew is singular 'hand' with plural suffix, a common idiom. Retaining
    'from their hand' is slightly more formal but preserves the source image without
    becoming unnatural.
