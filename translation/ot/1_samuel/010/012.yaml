id: 1SA.10.12
reference: 1 Samuel 10:12
source:
  edition: WLC
  text: וַ/יַּ֨עַן אִ֥ישׁ מִ/שָּׁ֛ם וַ/יֹּ֖אמֶר וּ/מִ֣י אֲבִי/הֶ֑ם עַל כֵּן֙ הָיְתָ֣ה לְ/מָשָׁ֔ל הֲ/גַ֥ם שָׁא֖וּל בַּ/נְּבִאִֽים־׃
translation:
  text: 'Then a man from there answered and said[a], “And who is their father?” Therefore it became a proverb: “Is Saul also among the prophets?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “And who is his father?” Some translations take the question as referring specifically to Saul, but the Masoretic Text reads “their father.”
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: ענה in the wayyiqtol commonly introduces a reply in narrative. 'Answered' preserves the idiomatic Hebrew narrative style in readable English.
- source_word: אִישׁ מִשָּׁם
  chosen: a man from there
  alternatives:
  - someone from there
  - a man of that place
  lexicon: HALOT
  rationale: אִישׁ is singular 'man,' and מִשָּׁם is 'from there.' The phrase identifies an unnamed local speaker. 'A man from there' is the most direct rendering.
- source_word: וּמִי אֲבִיהֶם
  chosen: And who is their father?
  alternatives:
  - But who is their father?
  - And who is his father?
  lexicon: HALOT
  rationale: The ketiv-like consonantal form with 3mp suffix is best represented as 'their father,' referring to the prophetic group and making the point that prophetic status is not determined by lineage. Some English versions smooth to 'his father' in relation to Saul, but the MT points to the plural and should be retained in the main text.
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: This discourse marker introduces the result or consequence of the saying. 'Therefore' is concise and natural.
- source_word: הָיְתָה לְמָשָׁל
  chosen: it became a proverb
  alternatives:
  - it became a saying
  - it became a byword
  lexicon: HALOT
  rationale: מָשָׁל here denotes a proverbial saying rather than an extended parable. 'Proverb' best matches the idiomatic force in context.
- source_word: הֲגַם
  chosen: Is ... also
  alternatives:
  - Is ... even
  - Can ... too
  lexicon: HALOT
  rationale: The interrogative plus גַּם expresses surprised inclusion. 'Is Saul also...' captures the rhetorical astonishment.
- source_word: בַּנְּבִאִים
  chosen: among the prophets
  alternatives:
  - with the prophets
  lexicon: HALOT
  rationale: The preposition ב with the article in this context indicates inclusion within a group. 'Among the prophets' is the established and contextually precise English rendering.
