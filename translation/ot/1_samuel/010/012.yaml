theological_decisions:
- issue: Referent of 'their father' in the rhetorical question
  chosen_reading: 'Retain the Masoretic plural: ''their father,'' referring to the prophets as a group and implying that prophetic activity is not grounded in hereditary descent.'
  alternative_readings:
  - '''his father,'' taking the question as focused on Saul alone'
  rationale: 'The Hebrew morphology supports the plural suffix, and the rhetorical force works well in context: if prophets do not derive their status from a particular father, Saul''s participation need not be explained by family background. Because the singular reading has influenced some translations and interpretation, it is preserved in a footnote rather than adopted in the main text.'
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
