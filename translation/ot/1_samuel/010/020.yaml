id: 1SA.10.20
reference: 1 Samuel 10:20
source:
  edition: WLC
  text: וַ/יַּקְרֵ֣ב שְׁמוּאֵ֔ל אֵ֖ת כָּל שִׁבְטֵ֣י יִשְׂרָאֵ֑ל וַ/יִּלָּכֵ֖ד שֵׁ֥בֶט
    בִּנְיָמִֽן־׃
translation:
  text: Then Samuel brought near all the tribes of Israel, and the tribe of Benjamin
    was taken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was selected.' The Hebrew literally says 'was taken,' referring here
      to selection by lot.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרֵב
  chosen: brought near
  alternatives:
  - presented
  - brought forward
  - caused to come near
  lexicon: HALOT
  rationale: The Hiphil of קרב means to bring near or present. In this lot-selection
    context, Samuel is causing the tribes to come forward before the LORD. 'Brought
    near' preserves the formal sense while remaining natural English.
- source_word: שְׁמוּאֵל
  chosen: Samuel
  rationale: Standard English transliteration of the personal name.
- source_word: כָּל שִׁבְטֵי יִשְׂרָאֵל
  chosen: all the tribes of Israel
  alternatives:
  - every tribe of Israel
  lexicon: HALOT
  rationale: A straightforward rendering of the construct chain with כָּל. 'All the
    tribes of Israel' is idiomatic and preserves the collective scope.
- source_word: וַיִּלָּכֵד
  chosen: was taken
  alternatives:
  - was selected
  - was captured by lot
  lexicon: HALOT
  rationale: The Niphal of לכד literally means 'was taken/captured.' In context of
    sacred lot-casting, English often uses 'was taken' to preserve the source wording
    and the passive result of the selection process. 'Was selected' is interpretive
    and smoother, but less formally tied to the Hebrew.
- source_word: שֵׁבֶט בִּנְיָמִן
  chosen: the tribe of Benjamin
  alternatives:
  - Benjamin's tribe
  lexicon: HALOT
  rationale: The singular noun with proper name is best rendered as a definite phrase
    in English. The context makes clear that one tribe is identified from among the
    tribes.
