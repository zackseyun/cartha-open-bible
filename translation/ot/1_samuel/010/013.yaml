id: 1SA.10.13
reference: 1 Samuel 10:13
source:
  edition: WLC
  text: וַ/יְכַל֙ מֵֽ/הִתְנַבּ֔וֹת וַ/יָּבֹ֖א הַ/בָּמָֽה׃
translation:
  text: When he had finished prophesying[a], he came to the high place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the hill shrine"; Hebrew "the high place," referring to an elevated worship site.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְכַל
  chosen: When he had finished
  alternatives:
  - And he finished
  - And he ceased
  lexicon: HALOT
  rationale: The wayyiqtol of כלה here marks completion of the preceding activity. Rendering with the temporal clause 'When he had finished' gives natural English while preserving the sense of completed action before the next event.
- source_word: מֵהִתְנַבּוֹת
  chosen: prophesying
  alternatives:
  - acting as a prophet
  - being in a prophetic state
  lexicon: HALOT
  rationale: The infinitive construct of נבא after מן expresses cessation/completion from the activity of prophesying. 'Prophesying' is the most direct and idiomatic English equivalent in context.
- source_word: וַיָּבֹא
  chosen: he came
  alternatives:
  - he went
  - he arrived
  lexicon: HALOT
  rationale: בוא commonly means 'come/go' depending on viewpoint. 'He came' is a standard rendering and fits the narrative movement without over-specifying perspective. 'Arrived' is possible but slightly more interpretive.
- source_word: הַבָּמָה
  chosen: the high place
  alternatives:
  - the hill shrine
  - the cultic high place
  lexicon: HALOT
  rationale: במה refers to a high place, often a worship site. 'The high place' preserves the Hebrew term's conventional sense and allows readers to recognize its cultic significance without importing more interpretation into the main text.
