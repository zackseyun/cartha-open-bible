id: 1SA.10.16
reference: 1 Samuel 10:16
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר שָׁאוּל֙ אֶל דּוֹד֔/וֹ הַגֵּ֤ד הִגִּיד֙ לָ֔/נוּ כִּ֥י נִמְצְא֖וּ
    הָ/אֲתֹנ֑וֹת וְ/אֶת דְּבַ֤ר הַ/מְּלוּכָה֙ לֹֽא הִגִּ֣יד ל֔/וֹ אֲשֶׁ֖ר אָמַ֥ר שְׁמוּאֵֽל־־־׃פ
translation:
  text: Saul said to his uncle, “He plainly told us that the donkeys had been found.”
    But he did not tell him about the matter of the kingship that Samuel had spoken
    of.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the female donkeys'; English 'the donkeys' is used for natural style
      since the animals' sex is not central here.
    reason: lexical_alternative
  - marker: b
    text: Or 'the matter of the kingdom.' The Hebrew likely refers here to Saul's
      kingship rather than the kingdom as a realm.
    reason: alternative_reading
lexical_decisions:
- source_word: דּוֹדוֹ
  chosen: his uncle
  alternatives:
  - his beloved
  - his kinsman
  lexicon: HALOT
  rationale: In this narrative context דּוֹד with 3ms suffix refers to a family relation,
    conventionally 'uncle,' not 'beloved.' This fits the broader Saul genealogy context.
- source_word: הַגֵּד הִגִּיד
  chosen: He plainly told us
  alternatives:
  - He certainly told us
  - He explicitly told us
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb of נגד intensifies the statement.
    'Plainly told' captures the emphatic force in natural English without overtranslation.
- source_word: נִמְצְאוּ
  chosen: had been found
  alternatives:
  - were found
  - had been located
  lexicon: HALOT
  rationale: Passive/reflexive sense of מצא in context. English pluperfect fits the
    reported speech naturally, though simple past would also be possible.
- source_word: הָאֲתֹנוֹת
  chosen: the donkeys
  alternatives:
  - the female donkeys
  - the she-donkeys
  lexicon: HALOT
  rationale: The Hebrew specifically denotes female donkeys, but English narrative
    usage normally uses 'donkeys' unless the sex is contextually important. The referent
    is the lost animals from the prior context.
- source_word: דְּבַר הַמְּלוּכָה
  chosen: the matter of the kingship
  alternatives:
  - the matter of the kingdom
  - the matter of the kingship office
  - the word about the kingship
  lexicon: HALOT
  rationale: דָּבָר here means 'matter/affair,' not merely 'word.' מְלוּכָה in this
    context refers to royal rule/kingship announced to Saul, not a territorial 'kingdom'
    as such.
- source_word: לֹא הִגִּיד לוֹ
  chosen: he did not tell him
  alternatives:
  - he did not report it to him
  lexicon: HALOT
  rationale: Straightforward rendering of נגד in the Hiphil with indirect object.
    The subject remains Saul, continuing the narrative statement.
- source_word: אֲשֶׁר אָמַר שְׁמוּאֵל
  chosen: that Samuel had spoken of
  alternatives:
  - which Samuel had said
  - what Samuel had said
  lexicon: HALOT
  rationale: This relative clause modifies 'the matter of the kingship.' 'Had spoken
    of' is idiomatic English that preserves the connection without implying more specificity
    than the Hebrew states.
