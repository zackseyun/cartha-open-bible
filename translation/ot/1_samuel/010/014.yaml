id: 1SA.10.14
reference: 1 Samuel 10:14
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ דּ֨וֹד שָׁא֥וּל אֵלָ֛י/ו וְ/אֶֽל נַעֲר֖/וֹ אָ֣ן הֲלַכְתֶּ֑ם וַ/יֹּ֕אמֶר
    לְ/בַקֵּשׁ֙ אֶת הָ֣/אֲתֹנ֔וֹת וַ/נִּרְאֶ֣ה כִי אַ֔יִן וַ/נָּב֖וֹא אֶל שְׁמוּאֵֽל־־־־׃
translation:
  text: Then Saul’s uncle said to him and to his young man, “Where did you go?” And
    he said, “To seek the donkeys. When we saw that they were nowhere to be found,
    we went to Samuel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the donkeys' uses the feminine form, referring specifically to female
      donkeys.
    reason: lexical_alternative
  - marker: b
    text: Or 'we came to Samuel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דּוֹד שָׁאוּל
  chosen: Saul’s uncle
  alternatives:
  - Saul’s kinsman
  lexicon: HALOT
  rationale: דּוֹד commonly means 'uncle' in narrative kinship contexts, and this
    is the most natural sense here. 'Kinsman' is possible more broadly, but the familial
    relation in this context is best rendered specifically.
- source_word: אֶלָיו וְאֶל נַעֲרוֹ
  chosen: to him and to his young man
  alternatives:
  - to him and to his servant
  lexicon: HALOT
  rationale: נַעַר can denote a young man, attendant, or servant. Here it refers to
    the companion who traveled with Saul. 'Young man' preserves the lexical sense
    without over-specifying servile status, which the context does not require.
- source_word: אָן הֲלַכְתֶּם
  chosen: Where did you go?
  alternatives:
  - Where have you gone?
  lexicon: HALOT
  rationale: אָן is an interrogative of place, 'where?'; הֲלַכְתֶּם is 2mp 'you went/have
    gone.' In English narrative dialogue, simple past is the most natural rendering.
- source_word: לְבַקֵּשׁ אֶת הָאֲתֹנוֹת
  chosen: To look for the donkeys
  alternatives:
  - To seek the donkeys
  - To search for the female donkeys
  lexicon: HALOT
  rationale: בקשׁ means 'seek/look for.' 'Look for' is idiomatic modern English. אֲתֹנוֹת
    specifically denotes female donkeys, but English commonly uses 'donkeys' generically
    in such contexts; specifying 'female' would sound unnatural and adds little to
    the narrative.
- source_word: וַנִּרְאֶה כִי אַיִן
  chosen: When we saw that they were nowhere to be found
  alternatives:
  - and we saw that there were none
  - and we saw that they were not there
  lexicon: HALOT
  rationale: Literally, 'and we saw that there was not/there were none.' The clause
    refers to the donkeys not being found or present. 'They were nowhere to be found'
    conveys the idiomatic sense clearly in English while remaining faithful to the
    Hebrew.
- source_word: וַנָּבוֹא אֶל שְׁמוּאֵל
  chosen: we went to Samuel
  alternatives:
  - we came to Samuel
  lexicon: HALOT
  rationale: בוא often means 'come,' but in English narrative from the speaker's perspective
    recounting travel, 'went to Samuel' is more natural. The preposition אֶל indicates
    movement toward Samuel.
