id: 1SA.10.2
reference: 1 Samuel 10:2
source:
  edition: WLC
  text: בְּ/לֶכְתְּ/ךָ֤ הַ/יּוֹם֙ מֵ/עִמָּדִ֔/י וּ/מָצָאתָ֩ שְׁנֵ֨י אֲנָשִׁ֜ים עִם קְבֻרַ֥ת רָחֵ֛ל בִּ/גְב֥וּל בִּנְיָמִ֖ן בְּ/צֶלְצַ֑ח וְ/אָמְר֣וּ אֵלֶ֗י/ךָ נִמְצְא֤וּ הָ/אֲתֹנוֹת֙ אֲשֶׁ֣ר הָלַ֣כְתָּ לְ/בַקֵּ֔שׁ וְ/הִנֵּ֨ה נָטַ֤שׁ אָבִ֨י/ךָ֙ אֶת דִּבְרֵ֣י הָ/אֲתֹנ֔וֹת וְ/דָאַ֤ג לָ/כֶם֙ לֵ/אמֹ֔ר מָ֥ה אֶעֱשֶׂ֖ה לִ/בְנִֽ/י־־׃
translation:
  text: When you leave me today[a], you will find two men near Rachel’s tomb in the territory of Benjamin at Zelzah, and they will say to you, ‘The donkeys that you went to look for have been found, and look, your father has stopped caring about the donkeys and is anxious about you, saying[c][b], “What shall I do about my son?”’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew ''for you'' is plural, likely referring to Saul and the servant traveling with him: ''is anxious about you both.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'at the border of Benjamin.' The Hebrew word can mean either 'border' or 'territory.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'your father has left the matter of the donkeys.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּלֶכְתְּךָ הַיּוֹם מֵעִמָּדִי
  chosen: When you leave me today
  alternatives:
  - As you go from me today
  - When you depart from me today
  lexicon: HALOT
  rationale: The preposition ב with infinitive construct plus suffix introduces a temporal clause. 'Leave me' is natural modern English for 'go from beside me,' while preserving the sense of departure from Samuel's presence.
- source_word: וּמָצָאתָ
  chosen: you will find
  alternatives:
  - and you will find
  lexicon: HALOT
  rationale: The qatal here continues Samuel's predictive speech about what Saul will encounter. English future best conveys the sense in context.
- source_word: שְׁנֵי אֲנָשִׁים
  chosen: two men
  alternatives:
  - two menfolk
  lexicon: HALOT
  rationale: Straightforward numeral plus common noun; 'men' is the natural and gender-accurate rendering.
- source_word: עִם קְבֻרַת רָחֵל
  chosen: near Rachel’s tomb
  alternatives:
  - by Rachel’s grave
  - with Rachel’s burial place
  lexicon: HALOT
  rationale: עִם in a locative setting can mean 'by/near.' 'Tomb' is idiomatic for a named burial site and fits the memorial sense better than the overly literal 'burial place.'
- source_word: בִּגְבוּל בִּנְיָמִן
  chosen: in the territory of Benjamin
  alternatives:
  - at the border of Benjamin
  - within Benjamin’s border
  lexicon: HALOT
  rationale: גְּבוּל can mean border or territory. Here 'in the territory of Benjamin' fits the location statement more smoothly in English, though the border nuance remains possible.
- source_word: בְּצֶלְצַח
  chosen: at Zelzah
  alternatives:
  - in Zelzah
  lexicon: HALOT
  rationale: A place name is best transliterated. 'At' suits a point-location.
- source_word: וְאָמְרוּ אֵלֶיךָ
  chosen: and they will say to you
  alternatives:
  - and they will tell you
  lexicon: HALOT
  rationale: Simple speech introduction; 'say' preserves the direct discourse structure.
- source_word: נִמְצְאוּ הָאֲתֹנוֹת אֲשֶׁר הָלַכְתָּ לְבַקֵּשׁ
  chosen: The donkeys that you went to look for have been found
  alternatives:
  - The female donkeys ... have been found
  - The donkeys ... were found
  lexicon: HALOT
  rationale: אָתוֹנוֹת specifically denotes female donkeys, but English normally uses 'donkeys' unless the sex matters. The passive/resultative 'have been found' matches the Hebrew perfect in reported speech.
- source_word: וְהִנֵּה
  chosen: and look
  alternatives:
  - and behold
  - and see
  lexicon: HALOT
  rationale: Introduces a vivid new development. 'Look' is readable modern English and preserves the discourse force without archaic tone.
- source_word: נָטַשׁ אָבִיךָ אֶת דִּבְרֵי הָאֲתֹנוֹת
  chosen: your father has stopped worrying about the donkeys
  alternatives:
  - your father has left off speaking of the donkeys
  - your father has abandoned the matter of the donkeys
  lexicon: HALOT
  rationale: Literally, 'has left the words/matter of the donkeys.' In context this means he is no longer occupied with concern over them. The idiomatic rendering communicates the sense clearly.
- source_word: דִּבְרֵי
  chosen: worrying about / the matter of
  alternatives:
  - words of
  - concern for
  lexicon: HALOT
  rationale: דָּבָר often means 'matter/affair,' not merely spoken words. Here an idiomatic contextual rendering is required to avoid misleading literalism.
- source_word: וְדָאַג לָכֶם
  chosen: and is anxious about you
  alternatives:
  - and is worried about you
  - and is concerned for you
  lexicon: HALOT
  rationale: דאג conveys anxious concern. The suffix is plural ('for you' plural), referring to Saul and his servant, but English idiom in this context can use 'you' without marking number. 'Anxious' preserves the emotional weight.
- source_word: לָכֶם
  chosen: about you
  alternatives:
  - about you both
  - for you
  lexicon: HALOT
  rationale: The Hebrew suffix is plural, likely referring to Saul and his companion. Because English 'you' is number-neutral, the main text remains smooth; the plural nuance is worth preserving in a footnote.
- source_word: לֵאמֹר מָה אֶעֱשֶׂה לִבְנִי
  chosen: saying, “What shall I do about my son?”
  alternatives:
  - saying, “What am I to do for my son?”
  - saying, “What shall I do concerning my son?”
  lexicon: HALOT
  rationale: The father's quoted concern is idiomatically rendered with 'about my son.' 'For my son' is possible but can sound as though he is planning an action rather than expressing distress over Saul's absence.
