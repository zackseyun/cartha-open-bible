- issue: Rendering הָאֱלֹהִים with article
  chosen_reading: God
  alternative_readings:
  - the God
  rationale: The article in Hebrew does not require the awkward English 'the God' here. The sense is a definite reference to Israel's God, and 'God is with you' best communicates the theological force of divine presence without adding or subtracting meaning.
