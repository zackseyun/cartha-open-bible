id: 1SA.10.7
reference: 1 Samuel 10:7
source:
  edition: WLC
  text: וְ/הָיָ֗ה כִּ֥י תבאינה הָ/אֹת֥וֹת הָ/אֵ֖לֶּה לָ֑/ךְ עֲשֵׂ֤ה לְ/ךָ֙ אֲשֶׁ֣ר תִּמְצָ֣א יָדֶ֔/ךָ כִּ֥י הָ/אֱלֹהִ֖ים עִמָּֽ/ךְ׃
translation:
  text: And when these signs come to you[a], do whatever your hand finds to do, for God is with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'whatever is in your power to do.' The Hebrew idiom literally says, 'whatever your hand finds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  chosen: And when
  alternatives:
  - And it shall be, when
  - And it will happen, when
  lexicon: HALOT
  rationale: The construction introduces a future circumstance. 'And when' preserves the temporal force naturally in modern English without unnecessary stiffness.
- source_word: תבאינה
  chosen: come
  alternatives:
  - have come
  - occur
  lexicon: HALOT
  rationale: The verb בוא with 'signs' naturally means 'come' or 'occur.' 'Come' keeps the concrete Hebrew idiom while remaining clear.
- source_word: הָאֹתוֹת הָאֵלֶּה
  chosen: these signs
  alternatives:
  - these signs here
  lexicon: HALOT
  rationale: אות commonly means 'sign.' The demonstrative is straightforwardly rendered 'these.'
- source_word: לָךְ
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: With the arrival of signs, English idiom prefers 'come to you.' Although the suffix is morphologically irregular in the table, the sense in context is second masculine singular addressed to Saul.
- source_word: עֲשֵׂה לְךָ
  chosen: do for yourself
  alternatives:
  - act for yourself
  - do
  lexicon: HALOT
  rationale: 'The imperative plus לְךָ adds a reflexive/personal nuance: Saul is to take action on his own behalf. ''Do for yourself'' preserves that nuance better than a bare ''do.'''
- source_word: אֲשֶׁר תִּמְצָא יָדֶךָ
  chosen: whatever your hand finds to do
  alternatives:
  - whatever your hand finds
  - whatever is in your power to do
  - whatever occasion permits
  lexicon: HALOT
  rationale: This Hebrew idiom refers to what is within one's reach or power. The fuller English phrase 'finds to do' preserves the idiom while making the implied action explicit and readable.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Here כִּי gives the reason for the command. 'For' is concise and fits the elevated but readable style.
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: Although the noun has the article, in many contexts האלהים functions as a proper reference to Israel's God and is best rendered simply 'God' in English.
- source_word: עִמָּךְ
  chosen: is with you
  alternatives:
  - is with you indeed
  lexicon: HALOT
  rationale: The prepositional phrase expresses divine presence supporting Saul's action. 'Is with you' is the direct and natural rendering.
