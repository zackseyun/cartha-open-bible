theological_decisions:
- issue: Rendering רוּחַ אֱלֹהִים
  chosen_reading: the Spirit of God
  alternative_readings:
  - a spirit from God
  - God's spirit
  rationale: The context is Saul's divinely given sign and empowerment, so the phrase
    is best taken as God's Spirit acting upon him. This preserves the narrative's
    theological force without importing later doctrinal precision beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
