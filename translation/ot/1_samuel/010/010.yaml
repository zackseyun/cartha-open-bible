id: 1SA.10.10
reference: 1 Samuel 10:10
source:
  edition: WLC
  text: וַ/יָּבֹ֤אוּ שָׁם֙ הַ/גִּבְעָ֔תָ/ה וְ/הִנֵּ֥ה חֶֽבֶל נְבִאִ֖ים לִ/קְרָאת֑/וֹ
    וַ/תִּצְלַ֤ח עָלָי/ו֙ ר֣וּחַ אֱלֹהִ֔ים וַ/יִּתְנַבֵּ֖א בְּ/תוֹכָֽ/ם־׃
translation:
  text: When they came there to the hill, behold, a band of prophets came to meet
    him, and the Spirit of God rushed upon him, and he prophesied among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to Gibeah.' The Hebrew form may be read as a place-name or as 'to the
      hill.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַגִּבְעָתָה
  chosen: to the hill
  alternatives:
  - to Gibeah
  - to the hill-country
  lexicon: HALOT
  rationale: The form can be understood as 'to the hill/Gibeah' with directional ending.
    In this immediate context, the place is the previously mentioned hill associated
    with the sign, and rendering it as 'the hill' preserves the common-noun sense
    of גבעה while remaining natural. 'Gibeah' is possible as a place-name, but the
    article favors the common noun here.
- source_word: חֶבֶל נְבִאִים
  chosen: a band of prophets
  alternatives:
  - a group of prophets
  - a company of prophets
  lexicon: HALOT
  rationale: חבל here denotes a group or band rather than a rope/cord. 'Band' is idiomatic
    modern English and fits the sense of an organized prophetic group.
- source_word: לִקְרָאתוֹ
  chosen: came to meet him
  alternatives:
  - toward him
  - to encounter him
  lexicon: HALOT
  rationale: The prepositional infinitive construction expresses movement for the
    purpose of meeting Saul. 'Came to meet him' is the most natural English equivalent.
- source_word: רוּחַ אֱלֹהִים
  chosen: the Spirit of God
  alternatives:
  - a spirit from God
  - God's Spirit
  lexicon: HALOT
  rationale: In this narrative of divine empowerment, the phrase most naturally refers
    to God's Spirit rather than an indefinite spirit. Capitalizing 'Spirit' reflects
    this personal/divine referent in English without adding content beyond the Hebrew.
- source_word: וַתִּצְלַח עָלָיו
  chosen: rushed upon him
  alternatives:
  - came powerfully upon him
  - prospered upon him
  lexicon: HALOT
  rationale: צלח with רוח in Samuel commonly denotes a sudden, forceful coming of
    the Spirit upon a person for empowerment. 'Rushed upon him' preserves that vividness
    better than the flatter 'came upon him.'
- source_word: וַיִּתְנַבֵּא
  chosen: he prophesied
  alternatives:
  - he acted like a prophet
  - he spoke prophetically
  lexicon: HALOT
  rationale: The hitpael of נבא in this context refers to prophetic activity. 'He
    prophesied' is the standard and sufficiently broad rendering, without over-specifying
    the manner of the prophetic expression.
- source_word: בְּתוֹכָם
  chosen: among them
  alternatives:
  - in their midst
  lexicon: HALOT
  rationale: The phrase indicates Saul's participation within the prophetic group.
    'Among them' is clear, natural, and faithful.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - and there was
  lexicon: HALOT
  rationale: הִנֵּה marks suddenness and draws attention to what follows. 'Behold'
    preserves the discourse force with appropriate biblical register while remaining
    understandable.
