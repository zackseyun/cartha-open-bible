id: 1SA.10.8
reference: 1 Samuel 10:8
source:
  edition: WLC
  text: וְ/יָרַדְתָּ֣ לְ/פָנַ/י֮ הַ/גִּלְגָּל֒ וְ/הִנֵּ֤ה אָֽנֹכִי֙ יֹרֵ֣ד אֵלֶ֔י/ךָ
    לְ/הַעֲל֣וֹת עֹל֔וֹת לִ/זְבֹּ֖חַ זִבְחֵ֣י שְׁלָמִ֑ים שִׁבְעַ֨ת יָמִ֤ים תּוֹחֵל֙
    עַד בּוֹאִ֣/י אֵלֶ֔י/ךָ וְ/הוֹדַעְתִּ֣י לְ/ךָ֔ אֵ֖ת אֲשֶׁ֥ר תַּעֲשֶֽׂה־׃
translation:
  text: And you shall go down before me to Gilgal. And behold, I am coming down to
    you to offer burnt offerings and to sacrifice peace offerings. You shall wait
    seven days, until I come to you and make known to you what you shall do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellowship offerings' or 'offerings of well-being.' The Hebrew term
      refers to sacrifices associated with peace, wholeness, and shared communion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָרַדְתָּ
  chosen: you shall go down
  alternatives:
  - you will go down
  - then go down
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional/prophetic sequence;
    rendered as an imperative-like future, natural in English for Samuel's directive.
    'Go down' preserves the spatial sense of ירד.
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - ahead of me
  - in front of me
  lexicon: HALOT
  rationale: Literally 'before my face.' 'Before me' preserves both temporal and spatial
    nuance and fits the context of Saul going on in advance to Gilgal.
- source_word: הַגִּלְגָּל
  chosen: Gilgal
  rationale: 'Place name transliterated per translation philosophy: translate titles,
    transliterate names.'
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: הִנֵּה marks attention and vividness. 'Behold' is retained because it
    remains understandable and preserves the solemn, deictic force better than a flatter
    modern substitute.
- source_word: יֹרֵד
  chosen: I am coming down
  alternatives:
  - I am going down
  - I will come down
  lexicon: HALOT
  rationale: Although the participle literally means 'going down,' English idiom from
    Samuel's perspective toward Saul is better expressed as 'coming down to you.'
    The participle conveys imminent/intended action; 'am coming down' preserves that
    aspectual feel.
- source_word: לְהַעֲלוֹת עֹלוֹת
  chosen: to offer burnt offerings
  alternatives:
  - to bring up burnt offerings
  - to present burnt offerings
  lexicon: HALOT
  rationale: The idiom העלה עלות refers to offering up whole burnt offerings. 'Offer
    burnt offerings' is standard, clear, and faithful to sacrificial terminology.
- source_word: לִזְבֹּחַ זִבְחֵי שְׁלָמִים
  chosen: to sacrifice peace offerings
  alternatives:
  - to sacrifice fellowship offerings
  - to offer sacrifices of well-being
  lexicon: HALOT
  rationale: זבח plus cognate noun is naturally rendered 'to sacrifice.' שְׁלָמִים
    is traditionally 'peace offerings'; this remains the most recognizable English
    sacrificial term, though 'fellowship offerings' and 'offerings of well-being'
    are possible.
- source_word: שִׁבְעַת יָמִים
  chosen: seven days
  lexicon: HALOT
  rationale: Straightforward cardinal-plus-noun construction.
- source_word: תּוֹחֵל
  chosen: You shall wait
  alternatives:
  - you must wait
  - you shall hope
  lexicon: HALOT
  rationale: From יחל, which can mean wait/hope. In this procedural context, 'wait'
    is clearly intended rather than the more abstract 'hope.'
- source_word: עַד בּוֹאִי אֵלֶיךָ
  chosen: until I come to you
  alternatives:
  - until my coming to you
  lexicon: HALOT
  rationale: Infinitive construct with suffix after עַד is most naturally rendered
    as a finite clause in English.
- source_word: וְהוֹדַעְתִּי לְךָ
  chosen: and make known to you
  alternatives:
  - and tell you
  - and inform you
  lexicon: HALOT
  rationale: Hiphil of ידע means 'cause to know, make known.' This preserves the causative
    force more precisely than simply 'tell.'
- source_word: אֵת אֲשֶׁר תַּעֲשֶׂה
  chosen: what you shall do
  alternatives:
  - what you should do
  - that which you shall do
  lexicon: HALOT
  rationale: Natural English rendering of the object marker plus relative clause;
    'shall' fits the directive-prophetic tone.
