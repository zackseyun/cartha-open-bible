theological_decisions:
- issue: Rendering of sacrificial term שְׁלָמִים
  chosen_reading: peace offerings
  alternative_readings:
  - fellowship offerings
  - offerings of well-being
  rationale: The term refers to a class of sacrifices associated with peace/wholeness
    and communal fellowship. 'Peace offerings' is the most established and recognizable
    English rendering and does not import a narrower doctrinal claim. Alternatives
    are preserved in a footnote because the semantic range includes well-being and
    fellowship.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
