id: 1SA.10.21
reference: 1 Samuel 10:21
source:
  edition: WLC
  text: וַ/יַּקְרֵ֞ב אֶת שֵׁ֤בֶט בִּנְיָמִן֙ ל/משפחת/ו וַ/תִּלָּכֵ֖ד מִשְׁפַּ֣חַת הַ/מַּטְרִ֑י וַ/יִּלָּכֵד֙ שָׁא֣וּל בֶּן קִ֔ישׁ וַ/יְבַקְשֻׁ֖/הוּ וְ/לֹ֥א נִמְצָֽא־־׃
translation:
  text: Then he brought the tribe of Benjamin near by its clans[a], and the clan of the Matrites was taken. Then Saul son of Kish was taken, but when they sought him[b], he could not be found.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'according to its families.' The Hebrew term can denote extended family groups or clans within a tribe.
    reason: lexical_alternative
  - marker: b
    text: '''Was taken'' refers to being indicated or selected by lot, not to military capture.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּקְרֵב
  chosen: brought ... near
  alternatives:
  - presented
  - caused ... to come near
  lexicon: HALOT
  rationale: The verb קרב in the Hiphil commonly means to bring near or present. In this lot-selection context, 'brought ... near' preserves the procedural sense without over-paraphrasing.
- source_word: שֵׁבֶט בִּנְיָמִן
  chosen: the tribe of Benjamin
  alternatives:
  - Benjamin's tribe
  lexicon: HALOT
  rationale: Standard rendering of שֵׁבֶט as 'tribe' in tribal organization contexts; Benjamin is transliterated as a personal/tribal name per translation philosophy.
- source_word: לְמִשְׁפְּחֹתָיו
  chosen: by its clans
  alternatives:
  - according to its families
  - by its families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה can mean family or clan. In the narrowing sequence tribe → clan → individual, 'clans' best communicates the social unit in natural English. 'By' reflects the distributive sense of ל here.
- source_word: וַתִּלָּכֵד
  chosen: was taken
  alternatives:
  - was selected
  - was captured
  lexicon: HALOT
  rationale: The Niphal of לכד here refers to being taken by lot, not military capture. 'Was taken' is formally close and idiomatic in this selection context; 'was selected' is interpretive and therefore kept as an alternative only.
- source_word: מִשְׁפַּחַת הַמַּטְרִי
  chosen: the clan of the Matrites
  alternatives:
  - the family of the Matrites
  - the Matrite clan
  lexicon: HALOT
  rationale: Retains the gentilic/group designation הַמַּטְרִי as 'Matrites' rather than attempting to smooth it into a singular ancestor name. 'Clan' matches the earlier rendering of מִשְׁפָּחָה for consistency.
- source_word: וַיִּלָּכֵד שָׁאוּל בֶּן־קִישׁ
  chosen: Then Saul son of Kish was taken
  alternatives:
  - Then Saul the son of Kish was selected
  lexicon: HALOT
  rationale: Repeats the same verb rendering for consistency in the lot-taking sequence. 'Son of Kish' is the normal Hebrew patronymic rendering.
- source_word: וַיְבַקְשֻׁהוּ
  chosen: when they sought him
  alternatives:
  - they looked for him
  - they searched for him
  lexicon: HALOT
  rationale: בקשׁ means seek/look for. 'Sought' is concise and slightly more formal, fitting the narrative tone. 'When' makes the temporal relation explicit in smooth English.
- source_word: וְלֹא נִמְצָא
  chosen: he could not be found
  alternatives:
  - he was not found
  - they did not find him
  lexicon: HALOT
  rationale: The passive Niphal of מצא is naturally rendered 'be found.' 'Could not be found' is idiomatic English that conveys the unsuccessful search without changing the sense.
