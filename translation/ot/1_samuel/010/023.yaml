id: 1SA.10.23
reference: 1 Samuel 10:23
source:
  edition: WLC
  text: וַ/יָּרֻ֨צוּ֙ וַ/יִּקָּחֻ֣/הוּ מִ/שָּׁ֔ם וַ/יִּתְיַצֵּ֖ב בְּ/ת֣וֹךְ הָ/עָ֑ם וַ/יִּגְבַּהּ֙ מִ/כָּל הָ/עָ֔ם מִ/שִּׁכְמ֖/וֹ וָ/מָֽעְלָ/ה־׃
translation:
  text: So they ran and took him from there[a], and he stood in the midst of the people. And he was taller than all the people from his shoulders upward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fetched him from there.' The Hebrew verb commonly means 'took,' but in context it can imply retrieving him from where he had hidden himself (see v. 22).
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּרֻצוּ
  chosen: they ran
  alternatives:
  - they hurried
  - they rushed
  lexicon: HALOT
  rationale: The verb from רוץ denotes running/hastening. 'They ran' is the most direct and natural rendering in context, preserving the narrative vividness without overinterpreting motive.
- source_word: וַיִּקָּחֻהוּ
  chosen: took him
  alternatives:
  - fetched him
  - brought him
  lexicon: HALOT
  rationale: לקח commonly means 'take.' In this context, the sense is that they retrieved Saul from where he was hiding. 'Took him' stays close to the Hebrew; the more interpretive 'fetched him' is preserved as an alternative.
- source_word: מִשָּׁם
  chosen: from there
  lexicon: HALOT
  rationale: A straightforward adverbial expression indicating the place from which Saul was brought.
- source_word: וַיִּתְיַצֵּב
  chosen: he stood
  alternatives:
  - he presented himself
  - he took his stand
  lexicon: HALOT
  rationale: The hitpael of יצב can mean 'station oneself' or 'take one's stand.' Here, after being brought out, the simple English 'he stood' best fits the scene and avoids adding ceremonial nuance not explicit in the text.
- source_word: בְּתוֹךְ הָעָם
  chosen: in the midst of the people
  alternatives:
  - among the people
  - in the middle of the people
  lexicon: HALOT
  rationale: בְּתוֹךְ literally means 'in the midst/middle of.' 'In the midst of the people' preserves the formal sense while remaining readable.
- source_word: וַיִּגְבַּהּ
  chosen: he was taller
  alternatives:
  - he stood taller
  - he was higher
  lexicon: HALOT
  rationale: From גבהּ, the idea is comparative height. English idiom prefers 'he was taller than' rather than the more wooden 'he was higher than' in a description of stature.
- source_word: מִכָּל הָעָם
  chosen: than all the people
  alternatives:
  - than all the others
  - than all the men
  lexicon: HALOT
  rationale: 'The phrase is comparative: Saul exceeded the whole assembled people in height. ''People'' matches הָעָם and avoids narrowing the reference beyond the Hebrew.'
- source_word: מִשִּׁכְמוֹ וָמָעְלָה
  chosen: from his shoulders upward
  alternatives:
  - from his shoulder and up
  - from the shoulders up
  lexicon: HALOT
  rationale: This idiom describes the extent of Saul's exceptional height. 'From his shoulders upward' is a clear, idiomatic English rendering that closely reflects the Hebrew construction.
