id: 1SA.10.15
reference: 1 Samuel 10:15
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר דּ֣וֹד שָׁא֑וּל הַגִּֽידָ/ה נָּ֣א לִ֔/י מָֽה אָמַ֥ר לָ/כֶ֖ם שְׁמוּאֵֽל־־׃
translation:
  text: Then Saul’s uncle said, “Please tell me what Samuel said to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'to you' is plural, likely referring to Saul and his servant together.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural modern
    English while preserving sequential force better than a bare 'and.'
- source_word: דּוֹד שָׁאוּל
  chosen: Saul’s uncle
  alternatives:
  - the uncle of Saul
  lexicon: HALOT
  rationale: דּוֹד commonly means 'uncle' in this kinship context. The construct relationship
    is best rendered idiomatically in English as 'Saul’s uncle.'
- source_word: הַגִּידָה נָּא לִי
  chosen: Please tell me
  alternatives:
  - Tell me, please
  - Do tell me
  lexicon: HALOT
  rationale: The Hiphil imperative of נגד means 'tell, declare, report.' The particle
    נָא adds politeness/entreaty, naturally conveyed by 'please.' English places 'please'
    before the verb smoothly.
- source_word: מָה
  chosen: what
  alternatives:
  - that which
  lexicon: HALOT
  rationale: Direct interrogative/object clause after 'tell me' is most naturally
    'what.'
- source_word: אָמַר
  chosen: said
  alternatives:
  - told
  - spoke
  lexicon: HALOT
  rationale: אמר is the standard verb 'say.' 'Said' preserves the simple speech verb
    and matches the direct-object clause with minimal interpretation.
- source_word: לָכֶם
  chosen: to you
  alternatives:
  - to you all
  - to both of you
  lexicon: HALOT
  rationale: The form is second masculine plural. In context Samuel had spoken to
    Saul and his servant, so the plural should be preserved semantically. Standard
    English 'to you' is acceptable in the main text; the plural nuance is worth preserving
    in a footnote.
- source_word: שְׁמוּאֵל
  chosen: Samuel
  lexicon: HALOT
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy.
