id: 1SA.5.11
reference: 1 Samuel 5:11
source:
  edition: WLC
  text: וַ/יִּשְׁלְח֨וּ וַ/יַּאַסְפ֜וּ אֶת כָּל סַרְנֵ֣י פְלִשְׁתִּ֗ים וַ/יֹּֽאמְרוּ֙ שַׁלְּח֞וּ אֶת אֲר֨וֹן אֱלֹהֵ֤י יִשְׂרָאֵל֙ וְ/יָשֹׁ֣ב לִ/מְקֹמ֔/וֹ וְ/לֹֽא יָמִ֥ית אֹתִ֖/י וְ/אֶת עַמִּ֑/י כִּֽי הָיְתָ֤ה מְהֽוּמַת מָ֨וֶת֙ בְּ/כָל הָ/עִ֔יר כָּבְדָ֥ה מְאֹ֛ד יַ֥ד הָ/אֱלֹהִ֖ים שָֽׁם־־־־־־־־׃
translation:
  text: So they sent and gathered all the lords of the Philistines[a], and they said, “Send away the ark of the God of Israel, and let it return to its place, so that it may not kill us and our people.” For there was a deadly panic throughout the whole city[b]; the hand of God was very heavy there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a panic of death,' 'a deathly confusion,' or 'a deadly tumult.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the hand of God was very heavy there,' a metaphor for intense divine judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: סַרְנֵי
  chosen: lords
  alternatives:
  - rulers
  - princes
  lexicon: HALOT
  rationale: The term refers to the recognized Philistine rulers. 'Lords' is the conventional and still clear rendering in this context, preserving the political rank better than the more generic 'leaders.'
- source_word: שַׁלְּחוּ
  chosen: Send away
  alternatives:
  - send
  - dispatch
  lexicon: HALOT
  rationale: The imperative calls for removal of the ark from their city. 'Send away' makes the expulsion nuance explicit in natural English.
- source_word: אֲרוֹן אֱלֹהֵי יִשְׂרָאֵל
  chosen: the ark of the God of Israel
  alternatives:
  - the ark of Israel's God
  lexicon: HALOT
  rationale: This preserves the genitive construction and the theological force that the ark belongs to Israel's God.
- source_word: וְיָשֹׁב לִמְקֹמוֹ
  chosen: and let it return to its place
  alternatives:
  - and let it go back to its place
  - and it shall return to its place
  lexicon: HALOT
  rationale: The jussive sense after the imperative is best represented by 'let it return.' 'Its place' refers to the ark's proper location.
- source_word: וְלֹא יָמִית אֹתִי וְאֶת עַמִּי
  chosen: so that it may not kill me and my people
  alternatives:
  - and it will not kill me and my people
  - lest it put me and my people to death
  lexicon: HALOT
  rationale: The Hiphil of מות is causative, 'kill/put to death.' The clause expresses desired prevention following the command, so 'so that it may not kill' communicates the sense clearly.
- source_word: מְהוּמַת מָוֶת
  chosen: a deadly panic
  alternatives:
  - a panic of death
  - a deathly confusion
  - a deadly tumult
  lexicon: HALOT
  rationale: The phrase denotes a severe, death-bringing terror or turmoil. 'Deadly panic' is idiomatic English that preserves both the emotional upheaval and lethal consequence.
- source_word: בְּכָל הָעִיר
  chosen: throughout the whole city
  alternatives:
  - in all the city
  - through the entire city
  lexicon: HALOT
  rationale: This expresses the distributive force naturally in English.
- source_word: כָּבְדָה מְאֹד יַד הָאֱלֹהִים
  chosen: the hand of God was very heavy
  alternatives:
  - God's hand was exceedingly heavy
  - the hand of God weighed heavily
  lexicon: HALOT
  rationale: '''Hand'' is a key biblical metaphor for active power in judgment and should be preserved rather than paraphrased. ''Very heavy'' reflects כָּבְדָה מְאֹד closely and naturally.'
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the god
  lexicon: HALOT
  rationale: In context this refers specifically to Israel's God already named in the verse, so English idiom properly renders it as 'God' rather than 'the god.'
