theological_decisions:
- issue: Whether to preserve the anthropomorphic metaphor 'the hand of God' or interpret it dynamically as divine power/judgment
  chosen_reading: 'Preserve the metaphor: ''the hand of God was very heavy there'''
  alternative_readings:
  - God's power pressed heavily on them there
  - God afflicted that place severely
  rationale: The Hebrew explicitly uses 'hand,' a common biblical idiom for divine agency in judgment. Preserving the metaphor maintains intertextual and theological texture without obscuring meaning.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Number shift between the plural speakers and the singular pronouns 'me and my people'
  chosen_reading: 'Retain the singular in direct speech: ''me and my people'''
  alternative_readings:
  - us and our people
  rationale: The Hebrew text has singular suffixes, likely reflecting the voice of a representative speaker such as the ruler of the city. Smoothing to plural would erase a significant textual feature.
  doctrine_reference: Translation philosophy §1, §5
