id: 1SA.5.12
reference: 1 Samuel 5:12
source:
  edition: WLC
  text: וְ/הָֽ/אֲנָשִׁים֙ אֲשֶׁ֣ר לֹא מֵ֔תוּ הֻכּ֖וּ ב/עפלים וַ/תַּ֛עַל שַֽׁוְעַ֥ת הָ/עִ֖יר הַ/שָּׁמָֽיִם־׃
translation:
  text: And the men who did not die were struck with tumors[a], and the cry of the city went up to heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with swellings'; the Hebrew term refers to a bodily swelling or tumor. Traditional renderings sometimes specify 'hemorrhoids.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָאֲנָשִׁים
  chosen: And the men
  alternatives:
  - And the people
  - And the men of the city
  lexicon: HALOT
  rationale: אֲנָשִׁים is the common plural for 'men.' While it can sometimes function more broadly for people, the immediate wording is most naturally rendered 'the men.' This follows the gender-accurate principle without expanding beyond the text.
- source_word: אֲשֶׁר לֹא מֵתוּ
  chosen: who did not die
  alternatives:
  - who had not died
  lexicon: HALOT
  rationale: The relative clause straightforwardly distinguishes survivors from those already killed. English simple past reads naturally while preserving the contrast.
- source_word: הֻכּוּ
  chosen: were struck
  alternatives:
  - were smitten
  - were afflicted
  - were beaten
  lexicon: HALOT
  rationale: 'The Hophal of נכה here is passive: they ''were struck'' or ''were afflicted.'' ''Were struck'' preserves the vividness and common biblical idiom without archaic tone.'
- source_word: בָּעֳפָלִים
  chosen: with tumors
  alternatives:
  - with swellings
  - with hemorrhoids
  lexicon: HALOT
  rationale: עפלים denotes a bodily swelling/tumor in this plague narrative. 'Tumors' is clear modern English and avoids over-specifying the exact medical condition. The more traditional 'hemorrhoids' is possible but too narrow for the lexical evidence.
- source_word: וַתַּעַל
  chosen: went up
  alternatives:
  - rose
  - ascended
  lexicon: HALOT
  rationale: The verb עלה literally means 'went up' or 'rose.' 'Went up' preserves the concrete upward movement in the idiom of a cry reaching heaven.
- source_word: שַׁוְעַת
  chosen: the cry
  alternatives:
  - the outcry
  - the plea for help
  lexicon: HALOT
  rationale: שַׁוְעָה is a cry for help or outcry. 'Cry' is concise and natural, while still conveying distress.
- source_word: הָעִיר
  chosen: of the city
  alternatives:
  - from the city
  lexicon: HALOT
  rationale: The construct phrase שַׁוְעַת הָעִיר is most naturally 'the cry of the city,' meaning the city's collective outcry. 'From the city' is interpretive and less direct.
- source_word: הַשָּׁמָיִם
  chosen: to heaven
  alternatives:
  - to the heavens
  lexicon: HALOT
  rationale: Though formally plural, שָׁמַיִם is commonly rendered idiomatically as singular 'heaven' in English, especially in expressions of a cry rising upward to God.
