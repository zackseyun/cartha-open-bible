theological_decisions:
- issue: Rendering the idiom of divine judgment in קָשְׁתָה יָדוֹ
  chosen_reading: his hand is heavy against us
  alternative_readings:
  - his hand is hard against us
  - he has dealt harshly with us
  rationale: 'The main text preserves the Hebrew anthropomorphic idiom of God''s ''hand''
    rather than interpreting it away. This maintains the narrative''s theological
    texture: the God of Israel is actively judging both the people of Ashdod and Dagon.'
  doctrine_reference: Translation philosophy §3, §6
- issue: Reference to Dagon as 'our god'
  chosen_reading: retain the Philistines' wording without qualification in the main
    text
  alternative_readings:
  - our idol
  - our deity
  rationale: The Hebrew says 'Dagon our god.' Retaining this reflects the speakers'
    viewpoint and the narrative contrast between the God of Israel and Philistine
    worship, without importing polemical wording not present in the text.
  doctrine_reference: Translation philosophy §1, §6
