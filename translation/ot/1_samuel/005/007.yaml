id: 1SA.5.7
reference: 1 Samuel 5:7
source:
  edition: WLC
  text: וַ/יִּרְא֥וּ אַנְשֵֽׁי אַשְׁדּ֖וֹד כִּֽי כֵ֑ן וְ/אָמְר֗וּ לֹֽא יֵשֵׁ֞ב אֲר֨וֹן
    אֱלֹהֵ֤י יִשְׂרָאֵל֙ עִמָּ֔/נוּ כִּֽי קָשְׁתָ֤ה יָד/וֹ֙ עָלֵ֔י/נוּ וְ/עַ֖ל דָּג֥וֹן
    אֱלֹהֵֽי/נוּ־־־־׃
translation:
  text: When the men of Ashdod saw that this was so, they said, “The ark of the God
    of Israel must not remain with us, because his hand is heavy against us and against
    Dagon our god.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'must not stay with us.' The Hebrew verb can mean 'sit,' 'dwell,' or
      'remain.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his hand is heavy against us,' an idiom for severe divine pressure
      or judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאוּ
  chosen: When ... saw
  alternatives:
  - and ... saw
  - then ... saw
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. Rendering with 'When' captures
    the temporal force naturally in English while preserving the sequence.
- source_word: אַנְשֵׁי אַשְׁדּוֹד
  chosen: the men of Ashdod
  alternatives:
  - the people of Ashdod
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' Per gender-accurate philosophy, 'men'
    is retained rather than neutralizing to 'people,' since the Hebrew form is masculine
    plural and likely refers to the city's male leaders or inhabitants as represented
    in the narrative.
- source_word: כִּי כֵן
  chosen: that this was so
  alternatives:
  - that it was so
  - that this was the case
  lexicon: HALOT
  rationale: This idiom points back to the observed situation in the preceding context.
    'That this was so' is idiomatic modern English and preserves the demonstrative
    sense.
- source_word: לֹא יֵשֵׁב
  chosen: must not remain
  alternatives:
  - must not stay
  - shall not dwell
  - must not sit
  lexicon: HALOT
  rationale: יָשַׁב literally means 'sit, dwell, remain.' With the ark as subject
    in context, 'remain' best conveys continued presence in a place. 'Must not' reflects
    the volitional force of the speakers' declaration in idiomatic English.
- source_word: אֲרוֹן אֱלֹהֵי יִשְׂרָאֵל
  chosen: the ark of the God of Israel
  alternatives:
  - the ark of Israel's God
  lexicon: HALOT
  rationale: A close rendering preserves the formal designation used by the Philistines
    and the contrast with 'Dagon our god' later in the verse.
- source_word: עִמָּנוּ
  chosen: with us
  alternatives:
  - among us
  lexicon: HALOT
  rationale: The preposition with first person plural suffix is straightforwardly
    rendered 'with us.' 'Among us' is possible but less direct.
- source_word: קָשְׁתָה יָדוֹ
  chosen: his hand is heavy
  alternatives:
  - his hand has become heavy
  - his hand is severe
  - his hand presses hard
  lexicon: HALOT
  rationale: The Hebrew idiom speaks of the deity's power weighing heavily in judgment.
    'His hand is heavy' preserves the metaphor rather than flattening it to an interpretation
    like 'he has afflicted us.'
- source_word: עָלֵינוּ
  chosen: against us
  alternatives:
  - upon us
  - on us
  lexicon: HALOT
  rationale: In this judgment context, 'against us' communicates hostile impact more
    clearly than the more literal but less idiomatic 'upon us.'
- source_word: וְעַל דָּגוֹן אֱלֹהֵינוּ
  chosen: and against Dagon our god
  alternatives:
  - and upon Dagon our god
  lexicon: HALOT
  rationale: Repeating 'against' maintains the parallel with 'against us' and highlights
    that the God of Israel's hand is also directed against Dagon. 'Our god' preserves
    the Philistine perspective without endorsing Dagon's divinity.
