id: 1SA.5.5
reference: 1 Samuel 5:5
source:
  edition: WLC
  text: עַל כֵּ֡ן לֹֽא יִדְרְכוּ֩ כֹהֲנֵ֨י דָג֜וֹן וְ/כָֽל הַ/בָּאִ֧ים בֵּית דָּג֛וֹן
    עַל מִפְתַּ֥ן דָּג֖וֹן בְּ/אַשְׁדּ֑וֹד עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־־־־־׃ס
translation:
  text: Therefore the priests of Dagon and all who enter the house of Dagon in Ashdod
    do not tread on the threshold of Dagon to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'do not tread on Dagon’s threshold.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house of Dagon'; rendered 'temple' here because the context
      is a pagan shrine.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - That is why
  lexicon: HALOT
  rationale: Introduces the consequence drawn from the preceding event. 'Therefore'
    is natural modern English and preserves the causal force.
- source_word: לֹא יִדְרְכוּ
  chosen: do not step
  alternatives:
  - do not tread
  - will not step
  lexicon: HALOT
  rationale: The verb דרך means 'to tread/step.' English 'step on' is idiomatic with
    'threshold.' Present tense fits the customary practice described and works with
    'to this day.'
- source_word: כֹהֲנֵי דָגוֹן
  chosen: the priests of Dagon
  alternatives:
  - Dagon's priests
  lexicon: HALOT
  rationale: A straightforward construct rendering. Retains the pagan-cultic reference
    clearly.
- source_word: וְכָל הַבָּאִים בֵּית דָּגוֹן
  chosen: and all who enter Dagon’s temple
  alternatives:
  - and everyone who comes into the house of Dagon
  - and all who go into Dagon's house
  lexicon: HALOT
  rationale: בוא with בית here refers to entering the shrine/temple. 'Temple' communicates
    the cultic building more clearly than the more wooden 'house' in contemporary
    English while preserving sense.
- source_word: עַל מִפְתַּן דָּגוֹן
  chosen: on Dagon’s threshold
  alternatives:
  - on the threshold of Dagon
  - upon Dagon's threshold
  lexicon: HALOT
  rationale: מִפְתָּן means 'threshold.' The construct with Dagon is best rendered
    possessively in English. 'Step on ... threshold' is idiomatic and precise.
- source_word: בְּאַשְׁדּוֹד
  chosen: in Ashdod
  lexicon: HALOT
  rationale: Locative preposition indicating the location of the temple/custom.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: Standard idiomatic rendering for an ongoing custom extending to the narrator's
    present.
