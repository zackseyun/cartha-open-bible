id: 1SA.5.2
reference: 1 Samuel 5:2
source:
  edition: WLC
  text: וַ/יִּקְח֤וּ פְלִשְׁתִּים֙ אֶת אֲר֣וֹן הָ/אֱלֹהִ֔ים וַ/יָּבִ֥יאוּ אֹת֖/וֹ
    בֵּ֣ית דָּג֑וֹן וַ/יַּצִּ֥יגוּ אֹת֖/וֹ אֵ֥צֶל דָּגֽוֹן־׃
translation:
  text: So the Philistines took the ark of God and brought it into the house of Dagon,
    and set it beside Dagon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the temple of Dagon." Literally, "the house of Dagon."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  chosen: took
  alternatives:
  - seized
  - captured
  lexicon: HALOT
  rationale: לקח in this narrative sequence is the ordinary verb 'take.' 'Took' is
    the most natural English rendering and fits the prior context of the Philistines
    gaining possession of the ark without adding extra force such as 'seized' unless
    context explicitly demands it.
- source_word: פְלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard transliteration of the people-group name. The article is supplied
    in English for natural style when referring to the ethnic group collectively.
- source_word: אֲרוֹן הָאֱלֹהִים
  chosen: the ark of God
  alternatives:
  - the chest of God
  lexicon: HALOT
  rationale: אֲרוֹן is the established term for the sacred ark/chest; 'ark' is the
    clear and conventional rendering in this cultic context. הָאֱלֹהִים here refers
    to the God of Israel, so 'of God' is the plain sense. This verse does not use
    the divine name YHWH, so 'of the LORD' would be inaccurate.
- source_word: וַיָּבִיאוּ אֹתוֹ
  chosen: brought it
  alternatives:
  - carried it in
  - brought him
  lexicon: HALOT
  rationale: בוא in the Hiphil commonly means 'bring.' The object suffix refers back
    to the ark, so 'it' is required. 'Carried it in' is possible contextually but
    adds manner not explicit in the verb.
- source_word: בֵּית דָּגוֹן
  chosen: the house of Dagon
  alternatives:
  - Dagon's temple
  lexicon: HALOT
  rationale: בית literally means 'house.' In context it denotes the sanctuary/temple
    of the deity Dagon. 'House of Dagon' preserves the Hebrew expression while remaining
    understandable. 'Temple of Dagon' is a valid contextual alternative but is slightly
    more interpretive.
- source_word: וַיַּצִּיגוּ אֹתוֹ
  chosen: set it
  alternatives:
  - placed it
  - stationed it
  lexicon: HALOT
  rationale: יצג in the Hiphil means to set, place, or present. 'Set it' is concise
    and idiomatic in English for positioning the ark in relation to Dagon's image.
- source_word: אֵצֶל דָּגוֹן
  chosen: beside Dagon
  alternatives:
  - next to Dagon
  - near Dagon
  lexicon: HALOT
  rationale: אֵצֶל indicates proximity, 'beside/next to.' 'Beside Dagon' is natural
    English and preserves the spatial relationship. Since the setting is Dagon's shrine,
    the reference is likely to Dagon's cult image, but the Hebrew simply says 'Dagon,'
    so the translation retains that wording.
