theological_decisions:
- issue: Reference of 'God' in 'the ark of God'
  chosen_reading: Render as 'God,' not 'the LORD'
  alternative_readings:
  - the ark of the LORD
  rationale: The Hebrew text reads הָאֱלֹהִים, not YHWH. Per translation philosophy,
    original-language primacy requires preserving the actual divine designation used
    in the verse rather than harmonizing to a more familiar title.
