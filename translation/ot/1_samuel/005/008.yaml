id: 1SA.5.8
reference: 1 Samuel 5:8
source:
  edition: WLC
  text: וַ/יִּשְׁלְח֡וּ וַ/יַּאַסְפוּ֩ אֶת כָּל סַרְנֵ֨י פְלִשְׁתִּ֜ים אֲלֵי/הֶ֗ם וַ/יֹּֽאמְרוּ֙ מַֽה נַּעֲשֶׂ֗ה לַֽ/אֲרוֹן֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל וַ/יֹּ֣אמְר֔וּ גַּ֣ת יִסֹּ֔ב אֲר֖וֹן אֱלֹהֵ֣י יִשְׂרָאֵ֑ל וַ/יַּסֵּ֕בּוּ אֶת אֲר֖וֹן אֱלֹהֵ֥י יִשְׂרָאֵֽל־־־־׃ס
translation:
  text: So they sent and gathered all the lords of the Philistines to themselves[a], and said, “What shall we do with the ark of the God of Israel?” And they said, “Let the ark of the God of Israel be brought around to Gath.” So they brought the ark of the God of Israel around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Let the ark of the God of Israel go around to Gath,” with the verb emphasizing movement/transfer rather than specifying the exact manner of transport.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלְחוּ
  chosen: they sent
  alternatives:
  - they sent word
  - they dispatched
  lexicon: HALOT
  rationale: The verb שׁלח in this context introduces summoning others; 'they sent' is the most direct rendering, with the following verb making clear that messengers were sent to assemble the rulers.
- source_word: וַיַּאַסְפוּ
  chosen: and gathered
  alternatives:
  - and assembled
  - and convened
  lexicon: HALOT
  rationale: אָסף commonly means gather/assemble. 'Gathered' preserves the concrete action while remaining natural in English.
- source_word: סַרְנֵי פְלִשְׁתִּים
  chosen: the lords of the Philistines
  alternatives:
  - the rulers of the Philistines
  - the princes of the Philistines
  lexicon: HALOT
  rationale: סֶרֶן is the standard title for Philistine city rulers. 'Lords' is a conventional and suitably weighty rendering; 'princes' could imply hereditary royalty, and 'rulers' is flatter.
- source_word: אֲלֵיהֶם
  chosen: to themselves
  alternatives:
  - to them
  - to their place
  lexicon: HALOT
  rationale: The preposition with pronominal suffix indicates the rulers were gathered to the speakers' location/presence. 'To themselves' captures that reflexive sense idiomatically enough in context.
- source_word: מַה נַּעֲשֶׂה
  chosen: What shall we do
  alternatives:
  - What are we to do
  - What should we do
  lexicon: HALOT
  rationale: The first person plural imperfect expresses deliberation. 'What shall we do' preserves the consultative tone.
- source_word: לָאָרוֹן
  chosen: with the ark
  alternatives:
  - about the ark
  - to the ark
  lexicon: HALOT
  rationale: The preposition ל here is best rendered idiomatically in English as 'with' in the question 'What shall we do with...?' rather than a more wooden 'to the ark.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct phrase straightforwardly means 'the God of Israel.' The definite article is supplied naturally in English.
- source_word: גַּת
  chosen: Gath
  lexicon: HALOT
  rationale: Proper place name is transliterated per translation philosophy.
- source_word: יִסֹּב
  chosen: be brought around
  alternatives:
  - be moved around
  - go around
  - be taken around
  lexicon: HALOT
  rationale: סבב means turn/go around/circle. In this narrative context, the ark is being transferred from city to city, so a passive-like English expression 'be brought around' best conveys the intended movement without overstating a technical transport term absent from the Hebrew.
- source_word: וַיַּסֵּבּוּ
  chosen: they brought ... around
  alternatives:
  - they moved
  - they transferred
  - they took ... around
  lexicon: HALOT
  rationale: 'The Hiphil form is causative: they caused the ark to go around, i.e., moved/transferred it. ''Brought around'' keeps lexical continuity with the previous clause and reflects the causative sense.'
