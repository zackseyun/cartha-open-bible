id: 1SA.5.1
reference: 1 Samuel 5:1
source:
  edition: WLC
  text: וּ/פְלִשְׁתִּים֙ לָֽקְח֔וּ אֵ֖ת אֲר֣וֹן הָ/אֱלֹהִ֑ים וַ/יְבִאֻ֛/הוּ מֵ/אֶ֥בֶן
    הָעֵ֖זֶר אַשְׁדּֽוֹדָ/ה׃
translation:
  text: Now the Philistines had taken the ark of God and brought it from Ebenezer
    to Ashdod.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'And the Philistines'; 'Now the Philistines' is used to mark the
      narrative transition in natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/פְלִשְׁתִּים
  chosen: Now the Philistines
  alternatives:
  - And the Philistines
  - The Philistines
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply as 'and,' but at a narrative
    transition in English 'now' often better conveys the discourse shift without sounding
    wooden. 'Philistines' is the standard transliteration of the people-group name.
- source_word: לָקְחוּ
  chosen: had taken
  alternatives:
  - took
  lexicon: HALOT
  rationale: Qal perfect 3cp of לקח, 'take.' English past perfect fits the narrative
    flow because this verse resumes the result of the prior battle and then proceeds
    to the next action ('brought it').
- source_word: אֵת
  chosen: '[direct object marker not translated]'
  rationale: Hebrew direct object marker has no direct English equivalent and is therefore
    left untranslated.
- source_word: אֲרוֹן הָאֱלֹהִים
  chosen: the ark of God
  alternatives:
  - God's ark
  - the ark
  lexicon: HALOT
  rationale: A straightforward genitive rendering preserves the Hebrew expression.
    'Ark of God' is more transparent and formally closer than the possessive 'God's
    ark,' while retaining natural English.
- source_word: וַיְבִאֻהוּ
  chosen: and brought it
  alternatives:
  - and they brought it
  - and carried it in
  lexicon: HALOT
  rationale: Hiphil wayyiqtol of בוא with 3ms suffix means 'and they brought it.'
    English can omit the explicit subject because it is clear from context. 'Brought'
    is preferable to 'carried in,' which adds specificity not required by the verb
    alone.
- source_word: מֵאֶבֶן הָעֵזֶר
  chosen: from Ebenezer
  alternatives:
  - from Eben-ezer
  lexicon: HALOT
  rationale: This is a place name, so it is transliterated per project policy. The
    prefixed preposition מִן is rendered 'from.' The conventional English spelling
    'Ebenezer' is clear and standard.
- source_word: אַשְׁדּוֹדָה
  chosen: to Ashdod
  alternatives:
  - Ashdodward
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward Ashdod.
    Natural English expresses this as 'to Ashdod'; 'Ashdodward' would be overly formal
    and unnatural.
