theological_decisions:
- issue: Whether to smooth the first-person singular pronouns into plural for English
    style
  chosen_reading: 'Retain the singular: ''to me ... me and my people'''
  alternative_readings:
  - to us ... us and our people
  rationale: The Hebrew twice uses first-person singular suffixes (אֵלַי, הֲמִיתֵנִי,
    עַמִּי). Retaining the singular preserves the source text's personified/corporate
    speech rather than resolving it into a plural paraphrase.
  doctrine_reference: 'Translation philosophy #3, #5'
