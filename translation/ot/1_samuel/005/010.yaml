id: 1SA.5.10
reference: 1 Samuel 5:10
source:
  edition: WLC
  text: וַֽ/יְשַׁלְּח֛וּ אֶת אֲר֥וֹן הָ/אֱלֹהִ֖ים עֶקְר֑וֹן וַ/יְהִ֗י כְּ/ב֨וֹא אֲר֤וֹן
    הָ/אֱלֹהִים֙ עֶקְר֔וֹן וַ/יִּזְעֲק֨וּ הָֽ/עֶקְרֹנִ֜ים לֵ/אמֹ֗ר הֵסַ֤בּוּ אֵלַ/י֙
    אֶת אֲרוֹן֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל לַ/הֲמִיתֵ֖/נִי וְ/אֶת עַמִּֽ/י־־־׃
translation:
  text: So they sent the ark of God to Ekron. But when the ark of God came to Ekron,
    the Ekronites cried out, saying, “They have brought around to me the ark of the
    God of Israel, to kill me and my people!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'to me ... to kill me and my people,' using first-person singular
      language, likely personifying the city or voicing a representative speaker.
      Some translations smooth this to plural ('to us').
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְשַׁלְּחוּ
  chosen: they sent
  alternatives:
  - they dispatched
  lexicon: HALOT
  rationale: Common narrative use of שלח in the waw-consecutive imperfect; 'sent'
    is the natural modern English rendering.
- source_word: אֲרוֹן הָאֱלֹהִים
  chosen: the ark of God
  alternatives:
  - the ark of the god
  lexicon: HALOT
  rationale: Standard construct phrase referring to Israel's sacred ark; with the
    article on אֱלֹהִים, 'God' is appropriate in context.
- source_word: עֶקְרוֹן
  chosen: Ekron
  lexicon: HALOT
  rationale: Standard English transliteration of the Philistine city name.
- source_word: וַיְהִי כְּבוֹא
  chosen: when ... came
  alternatives:
  - and it happened, when ... came
  - as ... entered
  lexicon: HALOT
  rationale: This idiom introduces the next event in Hebrew narrative. 'When ... came'
    preserves the temporal force in readable English without over-literalizing 'and
    it happened.'
- source_word: וַיִּזְעֲקוּ
  chosen: cried out
  alternatives:
  - shouted
  - wailed
  lexicon: HALOT
  rationale: זעק conveys a loud cry of distress; 'cried out' best captures the alarmed
    reaction.
- source_word: הָעֶקְרֹנִים
  chosen: the Ekronites
  alternatives:
  - the people of Ekron
  lexicon: HALOT
  rationale: Gentilic plural is most directly rendered 'the Ekronites.'
- source_word: הֵסַבּוּ
  chosen: they have brought around
  alternatives:
  - they have turned
  - they have brought
  lexicon: HALOT
  rationale: The Hiphil of סבב here conveys causing something to come around/bringing
    it around from place to place. 'Brought around' reflects the sense that the ark
    has been passed on from city to city.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - against me
  - to us
  lexicon: HALOT
  rationale: Form is first person singular. Although a collective singular may represent
    the city/personified speaker, the Hebrew is singular and should be preserved rather
    than harmonized to plural.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct phrase with proper name; standard rendering.
- source_word: לַהֲמִיתֵנִי
  chosen: to kill me
  alternatives:
  - to put me to death
  - to destroy me
  lexicon: HALOT
  rationale: Hiphil infinitive of מות with 1cs suffix expresses intended/resulting
    death. 'To kill me' is direct and idiomatic.
- source_word: וְאֶת עַמִּי
  chosen: and my people
  alternatives:
  - and my kin
  lexicon: HALOT
  rationale: עם with 1cs suffix naturally means 'my people.' The singular suffix continues
    the personified singular voice of the city or representative speaker.
