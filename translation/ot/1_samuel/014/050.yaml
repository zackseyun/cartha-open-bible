id: 1SA.14.50
reference: 1 Samuel 14:50
source:
  edition: WLC
  text: וְ/שֵׁם֙ אֵ֣שֶׁת שָׁא֔וּל אֲחִינֹ֖עַם בַּת אֲחִימָ֑עַץ וְ/שֵׁ֤ם שַׂר צְבָא/וֹ֙ אֲבִינֵ֔ר בֶּן נֵ֖ר דּ֥וֹד שָׁאֽוּל־־־׃
translation:
  text: The name of Saul’s wife was Ahinoam daughter of Ahimaaz[a], and the name of the commander of his army was Abner son of Ner, Saul’s uncle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Saul’s kinsman'; the Hebrew word can denote a close male relative more broadly, though 'uncle' best fits the genealogical context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשֵׁם
  chosen: The name ... was
  alternatives:
  - And the name ... was
  - Now the name ... was
  lexicon: HALOT
  rationale: The Hebrew nominal construction with prefixed waw introduces identifying information. English idiom is best served by 'The name ... was,' while preserving the formulaic sense.
- source_word: אֵשֶׁת
  chosen: wife
  alternatives:
  - woman
  lexicon: HALOT
  rationale: In construct with Saul, the term clearly denotes marital relationship, so 'wife' is the natural and precise rendering.
- source_word: בַּת
  chosen: daughter of
  alternatives:
  - daughter
  lexicon: HALOT
  rationale: Standard genealogical expression; 'daughter of' makes the relationship explicit in natural English.
- source_word: שַׂר
  chosen: commander
  alternatives:
  - captain
  - prince
  - chief
  lexicon: HALOT
  rationale: In military context with צְבָאוֹ, 'commander' best conveys an official military leader in readable modern English.
- source_word: צְבָאוֹ
  chosen: his army
  alternatives:
  - his host
  - his forces
  lexicon: HALOT
  rationale: צָבָא in this context refers to military forces. 'His army' is the clearest contemporary equivalent.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - son
  lexicon: HALOT
  rationale: Standard patronymic formula; 'son of' is the normal English rendering.
- source_word: דּוֹד
  chosen: uncle
  alternatives:
  - beloved
  - father's brother
  - kinsman
  lexicon: HALOT
  rationale: In genealogical prose, דּוֹד commonly denotes an uncle. Given the broader family notices in the immediate context, 'Saul's uncle' is the most likely sense and matches the conventional understanding of the relationship.
