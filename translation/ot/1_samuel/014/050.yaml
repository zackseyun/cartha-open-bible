- issue: Meaning of דּוֹד in Saul's genealogy
  chosen_reading: Saul's uncle
  alternative_readings:
  - Saul's beloved
  - Saul's kinsman
  rationale: This is not a major doctrinal issue, but it is an interpretive one. In this genealogical setting, the kinship sense 'uncle' is most probable and yields a coherent family notice. Broader or non-kinship senses are lexically possible but less likely here.
