id: 1SA.14.30
reference: 1 Samuel 14:30
source:
  edition: WLC
  text: אַ֗ף כִּ֡י לוּא֩ אָכֹ֨ל אָכַ֤ל הַ/יּוֹם֙ הָ/עָ֔ם מִ/שְּׁלַ֥ל אֹיְבָ֖י/ו אֲשֶׁ֣ר
    מָצָ֑א כִּ֥י עַתָּ֛ה לֹֽא רָבְתָ֥ה מַכָּ֖ה בַּ/פְּלִשְׁתִּֽים־׃
translation:
  text: How much more if the people had eaten today from the spoil of their enemies
    that they found! For then the slaughter among the Philistines would have been
    much greater.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Indeed, if only the people had eaten today from the spoil of their
      enemies that they found, then the blow against the Philistines would have been
      greater.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף כִּי לוּא
  chosen: How much more if
  alternatives:
  - Indeed if only
  - Surely if
  lexicon: HALOT
  rationale: 'The combination intensifies a counterfactual statement. In context Jonathan
    is arguing from the actual situation to a stronger unrealized possibility: if
    the troops had eaten, the victory would have been greater. ''How much more if''
    captures the idiomatic force better than a wooden ''indeed if only.'''
- source_word: אָכֹל אָכַל
  chosen: had eaten freely
  alternatives:
  - had surely eaten
  - had eaten
  lexicon: HALOT
  rationale: The infinitive absolute with the finite verb intensifies the action.
    'Had eaten freely' conveys emphatic, unrestricted eating in context, where Saul's
    oath had prevented normal eating. This is more natural than 'had surely eaten'
    while preserving the emphasis.
- source_word: מִשְּׁלַל אֹיְבָיו
  chosen: from the spoil of their enemies
  alternatives:
  - from their enemies' plunder
  - from the spoil of his enemies
  lexicon: HALOT
  rationale: שָׁלָל denotes spoil/plunder taken in battle. Although the suffix on
    'enemies' is singular in form, English idiom and the collective subject 'the people'
    favor 'their enemies' rather than the formally singular 'his enemies.'
- source_word: אֲשֶׁר מָצָא
  chosen: that they found
  alternatives:
  - which it found
  - that it found
  lexicon: HALOT
  rationale: The verb is morphologically singular with the collective noun 'people,'
    but English normally shifts to plural agreement for a collective in this context.
    'That they found' is idiomatic and reflects the sense.
- source_word: מַכָּה
  chosen: the slaughter
  alternatives:
  - the blow
  - the defeat
  - the strike
  lexicon: HALOT
  rationale: In military context מַכָּה refers to a striking down, defeat, or slaughter.
    'Slaughter' best fits the battle setting and the statement about the extent of
    Philistine losses.
- source_word: לֹא רָבְתָה
  chosen: would have been much greater
  alternatives:
  - would it not have increased
  - would have multiplied
  lexicon: HALOT
  rationale: The clause is counterfactual, looking back to what would have happened
    under different conditions. English expresses this naturally with 'would have
    been much greater.' The adverb 'much' reflects the rhetorical force of the question.
- source_word: בַּפְּלִשְׁתִּים
  chosen: among the Philistines
  alternatives:
  - against the Philistines
  - on the Philistines
  lexicon: HALOT
  rationale: The preposition ב in this construction can indicate the sphere or target
    of the blow. 'Among the Philistines' fits the idea of casualties within their
    ranks; 'against' is possible but less vivid with 'slaughter'.
