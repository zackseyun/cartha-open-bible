id: 1SA.14.1
reference: 1 Samuel 14:1
source:
  edition: WLC
  text: וַ/יְהִ֣י הַ/יּ֗וֹם וַ/יֹּ֨אמֶר יוֹנָתָ֤ן בֶּן שָׁאוּל֙ אֶל הַ/נַּ֨עַר֙ נֹשֵׂ֣א
    כֵלָ֔י/ו לְכָ֗/ה וְ/נַעְבְּרָה֙ אֶל מַצַּ֣ב פְּלִשְׁתִּ֔ים אֲשֶׁ֖ר מֵ/עֵ֣בֶר הַלָּ֑ז
    וּ/לְ/אָבִ֖י/ו לֹ֥א הִגִּֽיד־־־׃
translation:
  text: Now one day Jonathan son of Saul said to the young man who carried his armor,
    “Come, let us cross over to the Philistine garrison that is on the other side.”
    But he did not tell his father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Philistine outpost.” The Hebrew term can denote a military post
      or stationed force.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, “which is from/across the other side of this one,” likely
      referring to the pass described in the following verses.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי הַיּוֹם
  chosen: Now one day
  alternatives:
  - And it happened one day
  - One day
  lexicon: HALOT
  rationale: The Hebrew wayyiqtol plus temporal phrase is a common narrative opener.
    'Now one day' preserves the transition and temporal sense in readable modern English
    without woodenly reproducing the idiom.
- source_word: הַנַּעַר
  chosen: the young man
  alternatives:
  - the boy
  - the servant
  lexicon: HALOT
  rationale: נַעַר can mean boy, youth, young man, or servant depending on context.
    Here the figure is Jonathan's armor-bearer, clearly old enough for military service,
    so 'young man' best fits while avoiding the potentially misleading 'boy.'
- source_word: נֹשֵׂא כֵלָיו
  chosen: who carried his armor
  alternatives:
  - his armor-bearer
  - who bore his weapons
  lexicon: HALOT
  rationale: Literally 'bearing his equipment/weapons.' 'Who carried his armor' is
    clear modern English and preserves the participial descriptive force. 'Armor-bearer'
    is possible, but the fuller phrase more transparently reflects the Hebrew construction.
- source_word: לְכָה וְנַעְבְּרָה
  chosen: Come, let us cross over
  alternatives:
  - Come, let us go over
  - Come on, let us cross
  lexicon: HALOT
  rationale: לְכָה is an exhortation ('come'), followed by a cohortative ('let us
    cross over'). 'Cross over' fits the likely terrain and preserves the directional
    nuance of עבר.
- source_word: מַצַּב פְּלִשְׁתִּים
  chosen: the Philistine garrison
  alternatives:
  - the Philistine outpost
  - the Philistine station
  lexicon: HALOT
  rationale: מַצָּב in this military context refers to a stationed force or outpost.
    'Garrison' is a natural English military term and fits the broader context of
    Philistine military presence.
- source_word: אֲשֶׁר מֵעֵבֶר הַלָּז
  chosen: that is on the other side of this pass
  alternatives:
  - that is beyond this place
  - that is on the other side over there
  lexicon: HALOT
  rationale: מֵעֵבֶר means 'from/across the other side of.' הַלָּז is a deictic expression,
    'this one/this side here,' likely referring to the pass or crossing in context.
    Since the next verses describe the pass between crags, 'this pass' makes the sense
    explicit in idiomatic English without over-paraphrasing.
- source_word: וּלְאָבִיו לֹא הִגִּיד
  chosen: But he did not tell his father
  alternatives:
  - And he did not inform his father
  lexicon: HALOT
  rationale: The clause marks a contrastive narrative note, so 'But' is appropriate
    in English. הִגִּיד means 'tell/inform/report'; 'tell' is the most natural modern
    rendering.
