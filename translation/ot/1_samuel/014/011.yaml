id: 1SA.14.11
reference: 1 Samuel 14:11
source:
  edition: WLC
  text: וַ/יִּגָּל֣וּ שְׁנֵי/הֶ֔ם אֶל מַצַּ֖ב פְּלִשְׁתִּ֑ים וַ/יֹּאמְר֣וּ פְלִשְׁתִּ֔ים
    הִנֵּ֤ה עִבְרִים֙ יֹֽצְאִ֔ים מִן הַ/חֹרִ֖ים אֲשֶׁ֥ר הִתְחַבְּאוּ שָֽׁם־־־׃
translation:
  text: When the two of them revealed themselves to the Philistine garrison, the Philistines
    said, “Look, the Hebrews are coming out of the holes where they had hidden themselves.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “showed themselves to the Philistine outpost.”
    reason: lexical_alternative
  - marker: b
    text: “Hebrews” reflects the Philistines’ ethnic label for the Israelites.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּגָּלוּ
  chosen: revealed themselves
  alternatives:
  - showed themselves
  - were exposed
  lexicon: HALOT
  rationale: The Niphal form of גלה here is reflexive/passive in sense. In context
    Jonathan and his armor-bearer intentionally make themselves visible to the Philistine
    outpost, so 'revealed themselves' captures the deliberate action better than a
    bare passive like 'were seen.'
- source_word: שְׁנֵיהֶם
  chosen: the two of them
  alternatives:
  - both of them
  lexicon: HALOT
  rationale: This explicitly refers to Jonathan and his armor-bearer. 'The two of
    them' is natural English and preserves the dual emphasis.
- source_word: מַצַּב פְּלִשְׁתִּים
  chosen: the Philistine garrison
  alternatives:
  - the Philistine outpost
  - the Philistine guard post
  lexicon: HALOT
  rationale: מַצָּב in this military context refers to a stationed force or outpost.
    'Garrison' is a standard and clear rendering in 1 Samuel military narratives.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: This discourse marker draws attention. 'Look' is readable modern English
    and preserves the exclamatory force without archaic tone.
- source_word: עִבְרִים
  chosen: Hebrews
  alternatives:
  - the Hebrews
  lexicon: HALOT
  rationale: The Philistines use the ethnic term 'Hebrews,' which can carry an outsider's
    perspective in Samuel. Retaining 'Hebrews' preserves that nuance better than substituting
    'Israelites.'
- source_word: יֹצְאִים
  chosen: are coming out
  alternatives:
  - are coming forth
  - are emerging
  lexicon: HALOT
  rationale: The participle expresses action in progress from the Philistines' viewpoint.
    'Are coming out' is idiomatic and vivid.
- source_word: מִן הַחֹרִים
  chosen: out of the holes
  alternatives:
  - from the holes
  - out of the hiding places
  - out of the caves
  lexicon: HALOT
  rationale: חֹרִים literally denotes holes or cavities. Since the previous context
    mentions Israelites hiding in various places, 'holes' preserves the concrete and
    somewhat derisive wording of the Philistines. 'Caves' would over-specify beyond
    the term here.
- source_word: אֲשֶׁר הִתְחַבְּאוּ שָׁם
  chosen: where they had hidden themselves
  alternatives:
  - in which they had hidden
  - where they were hiding
  lexicon: HALOT
  rationale: 'The clause identifies the holes as the places of hiding. The hitpael
    of חבא is reflexive, and the perfect is naturally rendered as prior action relative
    to the Philistines'' speech: ''had hidden themselves.'''
