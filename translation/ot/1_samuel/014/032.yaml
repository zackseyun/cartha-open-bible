id: 1SA.14.32
reference: 1 Samuel 14:32
source:
  edition: WLC
  text: ו/יעש הָ/עָם֙ אֶל שלל וַ/יִּקְח֨וּ צֹ֧אן וּ/בָקָ֛ר וּ/בְנֵ֥י בָקָ֖ר וַ/יִּשְׁחֲטוּ אָ֑רְצָ/ה וַ/יֹּ֥אכַל הָ/עָ֖ם עַל הַ/דָּֽם־־־׃
translation:
  text: Then the people rushed upon the spoil and took sheep and cattle and calves[a], and they slaughtered them on the ground[b], and the people ate with the blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the people fell upon the plunder.'
    reason: lexical_alternative
  - marker: b
    text: That is, they ate the meat with the blood still in it, without properly draining it.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ ... אֶל שָׁלָל
  chosen: rushed upon the spoil
  alternatives:
  - turned to the spoil
  - fell upon the spoil
  - pounced on the plunder
  lexicon: HALOT
  rationale: The idiom with עשה אל plus שׁלל here conveys acting aggressively toward the spoil after battle, not merely 'made toward.' 'Rushed upon' captures the sudden, uncontrolled movement implied by the context of the people's famished state. 'Spoil' is retained as a clear military term close to the Hebrew.
- source_word: שָׁלָל
  chosen: spoil
  alternatives:
  - plunder
  lexicon: HALOT
  rationale: Both 'spoil' and 'plunder' are viable. 'Spoil' fits battle context and traditional military English without sounding archaic here.
- source_word: צֹאן
  chosen: sheep
  alternatives:
  - flocks
  lexicon: HALOT
  rationale: A concrete animal term is preferable in this list of animals taken and slaughtered. 'Sheep' is the most natural singular-category rendering in English.
- source_word: בָּקָר
  chosen: cattle
  alternatives:
  - herd animals
  - oxen
  lexicon: HALOT
  rationale: בקר is a broad term for bovines. 'Cattle' best matches the generic category here.
- source_word: בְּנֵי בָקָר
  chosen: calves
  alternatives:
  - young bulls
  - young cattle
  lexicon: HALOT
  rationale: Literally 'sons of cattle,' an idiom for young bovines. 'Calves' is idiomatic modern English and fits the animal list naturally.
- source_word: וַיִּשְׁחֲטוּ אָרְצָה
  chosen: they slaughtered them on the ground
  alternatives:
  - they slaughtered them to the ground
  - they butchered them on the earth
  lexicon: HALOT
  rationale: The adverbial אָרצה indicates slaughtering directly on the ground, likely without proper draining/preparation. Supplying 'them' is required in English from the object implied by the preceding list.
- source_word: עַל־הַדָּם
  chosen: with the blood
  alternatives:
  - with the blood still in it
  - over the blood
  - upon the blood
  lexicon: HALOT
  rationale: The phrase denotes eating meat together with its blood, i.e., without draining it properly, in violation of Israelite food law. 'With the blood' is concise and close to the Hebrew; the fuller interpretive sense is preserved in a footnote.
