theological_decisions:
- issue: How explicitly to render the prohibition-related phrase עַל־הַדָּם
  chosen_reading: with the blood
  alternative_readings:
  - with the blood still in it
  - over the blood
  rationale: The Hebrew is terse. The main text keeps a relatively formal rendering while allowing readers to hear the legal/theological offense in context. A footnote preserves the more explicit interpretive gloss that the meat was eaten without draining the blood.
