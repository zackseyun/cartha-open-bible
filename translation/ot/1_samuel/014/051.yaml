id: 1SA.14.51
reference: 1 Samuel 14:51
source:
  edition: WLC
  text: וְ/קִ֧ישׁ אֲבִֽי שָׁא֛וּל וְ/נֵ֥ר אֲבִֽי אַבְנֵ֖ר בֶּן אֲבִיאֵֽל־־־׃ס
translation:
  text: Kish was the father of Saul, and Ner was the father of Abner, the son of Abiel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Kish, father of Saul; and Ner, father of Abner, son
      of Abiel.' English supplies 'was' to make the genealogical statement explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/קִישׁ
  chosen: Kish
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: אֲבִי
  chosen: was the father of
  alternatives:
  - father of
  lexicon: HALOT
  rationale: 'Construct form of ''father'' in a verbless genealogical clause. English
    idiom requires supplying ''was'' for a natural complete sentence: ''Kish was the
    father of Saul.'''
- source_word: שָׁאוּל
  chosen: Saul
  lexicon: HALOT
  rationale: Proper personal name; standard English transliteration.
- source_word: וְ/נֵר
  chosen: and Ner
  lexicon: HALOT
  rationale: Conjunction plus proper name. The conjunction is rendered straightforwardly
    as 'and'; the name is transliterated by standard convention.
- source_word: אֲבִי
  chosen: was the father of
  alternatives:
  - father of
  lexicon: HALOT
  rationale: Same genealogical construct as earlier in the verse. Repeating the full
    English predicate preserves clarity and mirrors the Hebrew parallelism.
- source_word: אַבְנֵר
  chosen: Abner
  lexicon: HALOT
  rationale: Proper personal name; standard English transliteration.
- source_word: בֶּן
  chosen: the son of
  alternatives:
  - son of
  lexicon: HALOT
  rationale: 'Genealogical marker introducing Abiel as the father of Ner (and thus
    grandfather of Abner). The article ''the'' makes the appositional phrase natural
    in English: ''Abner, the son of Abiel.'''
- source_word: אֲבִיאֵל
  chosen: Abiel
  lexicon: HALOT
  rationale: Proper personal name; standard English transliteration.
