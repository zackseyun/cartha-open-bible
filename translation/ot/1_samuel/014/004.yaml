id: 1SA.14.4
reference: 1 Samuel 14:4
source:
  edition: WLC
  text: וּ/בֵ֣ין הַֽ/מַּעְבְּר֗וֹת אֲשֶׁ֨ר בִּקֵּ֤שׁ יֽוֹנָתָן֙ לַֽ/עֲבֹר֙ עַל מַצַּ֣ב פְּלִשְׁתִּ֔ים שֵׁן הַ/סֶּ֤לַע מֵ/הָ/עֵ֨בֶר֙ מִ/זֶּ֔ה וְ/שֵׁן הַ/סֶּ֥לַע מֵ/הָ/עֵ֖בֶר מִ/זֶּ֑ה וְ/שֵׁ֤ם הָֽ/אֶחָד֙ בּוֹצֵ֔ץ וְ/שֵׁ֥ם הָ/אֶחָ֖ד סֶֽנֶּה־־־׃
translation:
  text: Now between the passes by which Jonathan sought to cross over to the Philistine garrison[a], there was a crag of rock on one side and a crag of rock on the other side; and the name of the one was Bozez, and the name of the other Seneh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'a tooth of rock ... and a tooth of rock,' an idiom for sharp rocky crags or projections.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּעְבְּרוֹת
  chosen: the passes
  alternatives:
  - the crossings
  - the mountain passes
  lexicon: HALOT
  rationale: The noun denotes places of crossing/passage. In this rocky terrain context, 'passes' best captures narrow routes between cliffs without over-specifying a water crossing.
- source_word: בִּקֵּשׁ ... לַעֲבֹר
  chosen: sought to cross over
  alternatives:
  - wanted to cross
  - attempted to cross
  lexicon: HALOT
  rationale: בקש + infinitive expresses intention or endeavor. 'Sought to cross over' preserves the purposeful nuance more closely than the flatter 'wanted to cross.'
- source_word: מַצַּב פְּלִשְׁתִּים
  chosen: the Philistine garrison
  alternatives:
  - the Philistine outpost
  - the Philistine station
  lexicon: HALOT
  rationale: מַצָּב in this military context refers to a stationed force or outpost. 'Garrison' is idiomatic and fits the immediate military setting.
- source_word: שֵׁן הַסֶּלַע
  chosen: a crag of rock
  alternatives:
  - a tooth of rock
  - a rocky crag
  lexicon: HALOT
  rationale: Literally 'tooth of the rock,' an idiom for a sharp rocky projection. 'Crag of rock' communicates the topographical image in natural English while retaining the sense of a jutting formation.
- source_word: מֵהָעֵבֶר מִזֶּה ... מֵהָעֵבֶר מִזֶּה
  chosen: on one side ... on the other side
  alternatives:
  - from this side ... from that side
  - on this side ... on that side
  lexicon: HALOT
  rationale: The repeated phrase marks the two opposing sides of the pass. 'On one side ... on the other side' is natural English and clearly conveys the bilateral topography.
- source_word: שֵׁם הָאֶחָד ... וְשֵׁם הָאֶחָד
  chosen: the name of the one ... the name of the other
  alternatives:
  - one was named ... and the other was named
  - the one was called ... and the other
  lexicon: HALOT
  rationale: This preserves the formal naming structure of the Hebrew while remaining readable. 'The other' is supplied idiomatically in English for the second occurrence.
- source_word: בּוֹצֵץ
  chosen: Bozez
  rationale: Proper place-name; transliterated according to the translation philosophy of transliterating names.
- source_word: סֶנֶּה
  chosen: Seneh
  rationale: Proper place-name; transliterated according to the translation philosophy of transliterating names.
- source_word: וּבֵין
  chosen: Now between
  alternatives:
  - And between
  - Between
  lexicon: HALOT
  rationale: The conjunction links this verse to the narrative flow. 'Now' gives a natural discourse transition in English without forcing a wooden initial 'And.'
