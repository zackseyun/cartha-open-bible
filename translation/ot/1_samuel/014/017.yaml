id: 1SA.14.17
reference: 1 Samuel 14:17
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שָׁא֗וּל לָ/עָם֙ אֲשֶׁ֣ר אִתּ֔/וֹ פִּקְדוּ נָ֣א וּ/רְא֔וּ מִ֖י
    הָלַ֣ךְ מֵ/עִמָּ֑/נוּ וַֽ/יִּפְקְד֔וּ וְ/הִנֵּ֛ה אֵ֥ין יוֹנָתָ֖ן וְ/נֹשֵׂ֥א כֵלָֽי/ו־׃
translation:
  text: Then Saul said to the people who were with him, “Please take a count and see
    who has gone from among us.” So they took a count, and behold, Jonathan and his
    armor-bearer were not there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'muster' / 'number'; the Hebrew verb can mean to review or count those
      present.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּקְדוּ
  chosen: take a count
  alternatives:
  - muster
  - number
  - inspect
  lexicon: HALOT
  rationale: The verb פקד in this context refers to checking the personnel present,
    not military appointment or punishment. 'Take a count' is natural modern English
    and fits the follow-up discovery of who is missing.
- source_word: נָא
  chosen: Please
  alternatives:
  - now
  - I pray you
  lexicon: HALOT
  rationale: נא softens the imperative. 'Please' conveys the polite/requestive force
    in readable modern English better than archaic alternatives.
- source_word: וּרְאוּ
  chosen: and see
  alternatives:
  - and look
  - and find out
  lexicon: HALOT
  rationale: A straightforward rendering preserves the sequence of commands. In context
    it means to ascertain, but 'see' keeps closer to the Hebrew while remaining idiomatic.
- source_word: מִי הָלַךְ מֵעִמָּנוּ
  chosen: who has gone from among us
  alternatives:
  - who has left us
  - who has gone away from us
  lexicon: HALOT
  rationale: הלך plus מן/עם here indicates departure from the group. 'From among us'
    reflects the communal sense more precisely than simply 'left us'.
- source_word: וַיִּפְקְדוּ
  chosen: So they took a count
  alternatives:
  - So they mustered
  - So they counted
  lexicon: HALOT
  rationale: Using the same English expression as the earlier imperative preserves
    consistency for פקד in the immediate context.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and indeed
  lexicon: HALOT
  rationale: הנה marks a noteworthy discovery. 'Behold' is slightly elevated but still
    understandable and preserves the narrative force better than flattening it away.
- source_word: אֵין יוֹנָתָן וְנֹשֵׂא כֵלָיו
  chosen: Jonathan and his armor-bearer were not there
  alternatives:
  - Jonathan and his armor-bearer were absent
  - there was no Jonathan and his armor-bearer
  lexicon: HALOT
  rationale: The Hebrew literally states the non-presence of Jonathan and his armor-bearer.
    'Were not there' is idiomatic English that communicates absence clearly without
    awkward literalism.
- source_word: נֹשֵׂא כֵלָיו
  chosen: his armor-bearer
  alternatives:
  - the one carrying his weapons
  - his weapons-bearer
  lexicon: HALOT
  rationale: This is the standard military role denoted by the Hebrew phrase. 'Armor-bearer'
    is the clearest established English equivalent.
