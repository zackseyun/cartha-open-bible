id: 1SA.14.37
reference: 1 Samuel 14:37
source:
  edition: WLC
  text: וַ/יִּשְׁאַ֤ל שָׁאוּל֙ בֵּֽ/אלֹהִ֔ים הַֽ/אֵרֵד֙ אַחֲרֵ֣י פְלִשְׁתִּ֔ים הֲ/תִתְּנֵ֖/ם בְּ/יַ֣ד יִשְׂרָאֵ֑ל וְ/לֹ֥א עָנָ֖/הוּ בַּ/יּ֥וֹם הַ/הֽוּא׃
translation:
  text: Then Saul inquired of God[a], “Should I go down after the Philistines? Will you give them into the hand of Israel?” But he did not answer him that day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Will you deliver them into Israel’s hand?'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁאַל
  chosen: inquired
  alternatives:
  - asked
  - consulted
  lexicon: HALOT
  rationale: The verb שׁאל with בֵּאלֹהִים indicates seeking divine guidance, not merely asking an ordinary question. 'Inquired' captures the formal act of consultation better than plain 'asked.'
- source_word: בֵּאלֹהִים
  chosen: of God
  alternatives:
  - God
  - with God
  lexicon: HALOT
  rationale: The preposition ב with שׁאל in this construction is idiomatic for consulting deity. 'Inquired of God' is natural English and reflects the sense of seeking an oracle or divine answer.
- source_word: הַאֵרֵד
  chosen: Should I go down
  alternatives:
  - Shall I go down
  - Am I to go down
  lexicon: HALOT
  rationale: The interrogative plus imperfect first person expresses deliberation/request for guidance. 'Should I go down' communicates inquiry for permission or direction in contemporary English while preserving the downward movement implied by ירד.
- source_word: אַחֲרֵי פְלִשְׁתִּים
  chosen: after the Philistines
  alternatives:
  - in pursuit of the Philistines
  - against the Philistines
  lexicon: HALOT
  rationale: אַחֲרֵי literally means 'after.' In military context it implies pursuit, but 'after the Philistines' preserves the Hebrew wording without over-paraphrasing; the pursuit sense is readily understood from context.
- source_word: הֲתִתְּנֵם
  chosen: Will you give them
  alternatives:
  - Will you deliver them
  - Will you hand them over
  lexicon: HALOT
  rationale: נתן in battle contexts often means to give an enemy into someone's power. 'Give them' is the most direct rendering and is completed by the following idiom 'into the hand of Israel.'
- source_word: בְּיַד יִשְׂרָאֵל
  chosen: into the hand of Israel
  alternatives:
  - into Israel's hand
  - into the power of Israel
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for delivering someone into another's power. Retaining 'hand' preserves the biblical idiom while remaining understandable in English.
- source_word: וְלֹא עָנָהוּ
  chosen: But he did not answer him
  alternatives:
  - and he did not answer him
  - but God did not answer him
  lexicon: HALOT
  rationale: The subject is implicit from context and refers to God. 'But' brings out the adversative force in English after Saul's inquiry. Keeping the pronoun rather than repeating 'God' mirrors the Hebrew's terseness while remaining clear from the preceding clause.
- source_word: בַּיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: '''That day'' is idiomatic modern English and accurately reflects the temporal phrase.'
