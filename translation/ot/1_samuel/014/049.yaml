id: 1SA.14.49
reference: 1 Samuel 14:49
source:
  edition: WLC
  text: וַ/יִּֽהְיוּ֙ בְּנֵ֣י שָׁא֔וּל יוֹנָתָ֥ן וְ/יִשְׁוִ֖י וּ/מַלְכִּי שׁ֑וּעַ וְ/שֵׁם֙ שְׁתֵּ֣י בְנֹתָ֔י/ו שֵׁ֤ם הַ/בְּכִירָה֙ מֵרַ֔ב וְ/שֵׁ֥ם הַ/קְּטַנָּ֖ה מִיכַֽל־׃
translation:
  text: 'Now Saul’s sons were Jonathan[a], Ishvi, and Malchi-shua; and the names of his two daughters were these: the name of the firstborn was Merab[b], and the name of the younger was Michal.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the name of his two daughters'; English uses 'the names' because two names are then given.
    reason: lexical_alternative
  - marker: b
    text: Or 'the elder' for 'the firstborn.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: Now ... were
  alternatives:
  - And ... were
  lexicon: HALOT
  rationale: The waw-consecutive with היה introduces the next item in the narrative/genealogical notice. 'Now' gives natural English discourse flow while preserving the simple copular sense.
- source_word: בְּנֵי שָׁאוּל
  chosen: Saul’s sons
  alternatives:
  - the sons of Saul
  lexicon: HALOT
  rationale: Construct chain rendered idiomatically in English. 'Sons' is the plain sense and should not be generalized, since the verse explicitly distinguishes sons from daughters.
- source_word: יוֹנָתָן
  chosen: Jonathan
  rationale: Standard English transliteration of the personal name.
- source_word: יִשְׁוִי
  chosen: Ishvi
  alternatives:
  - Ishui
  rationale: Personal names are transliterated by standard conventions. 'Ishvi' reflects the consonantal form in the MT.
- source_word: מַלְכִּי שׁוּעַ
  chosen: Malchi-shua
  alternatives:
  - Malki-shua
  rationale: The name is written as two elements in Hebrew but conventionally represented as a single hyphenated personal name in English transliteration.
- source_word: וְשֵׁם שְׁתֵּי בְנֹתָיו
  chosen: and the names of his two daughters were these
  alternatives:
  - and the name of his two daughters
  lexicon: HALOT
  rationale: Although the Hebrew uses singular שֵׁם followed by 'two daughters,' English idiom prefers the plural 'names' because two names follow. 'Were these' makes explicit the list-introducing function.
- source_word: הַבְּכִירָה
  chosen: the firstborn
  alternatives:
  - the elder
  - the older
  lexicon: HALOT
  rationale: The noun denotes the elder/firstborn daughter. 'Firstborn' preserves the lexical connection to birth order more precisely than the flatter 'older' or 'elder.'
- source_word: מֵרַב
  chosen: Merab
  rationale: Standard English transliteration of the personal name.
- source_word: הַקְּטַנָּה
  chosen: the younger
  alternatives:
  - the younger one
  - the smaller
  lexicon: HALOT
  rationale: In this familial context the adjective refers to relative age/status among siblings, not physical size. 'The younger' is the natural English equivalent.
- source_word: מִיכַל
  chosen: Michal
  rationale: Standard English transliteration of the personal name.
