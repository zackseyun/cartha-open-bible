id: 1SA.14.31
reference: 1 Samuel 14:31
source:
  edition: WLC
  text: וַ/יַּכּ֞וּ בַּ/יּ֤וֹם הַ/הוּא֙ בַּ/פְּלִשְׁתִּ֔ים מִ/מִּכְמָ֖שׂ אַיָּלֹ֑נָ/ה
    וַ/יָּ֥עַף הָ/עָ֖ם מְאֹֽד׃
translation:
  text: That day they struck down the Philistines from Mikmash to Aijalon, and the
    people were very weary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew place name also commonly rendered 'Michmash.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכּוּ
  chosen: they struck down
  alternatives:
  - they struck
  - they defeated
  lexicon: HALOT
  rationale: From נכה in the waw-consecutive imperfect, indicating a completed past
    action in narrative. 'Struck down' preserves the military sense more clearly than
    the bare 'struck,' while avoiding overinterpretation beyond the verb itself.
- source_word: בַּיּוֹם הַהוּא
  chosen: That day
  alternatives:
  - On that day
  lexicon: HALOT
  rationale: A standard temporal expression. 'That day' is natural modern English
    and fully conveys the Hebrew temporal phrase.
- source_word: בַּפְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Object of the attack with the preposition marking hostile action against
    them. 'The Philistines' is the straightforward ethnic/national designation.
- source_word: מִמִּכְמָשׂ אַיָּלֹנָה
  chosen: from Mikmash to Aijalon
  alternatives:
  - from Michmash to Aijalon
  lexicon: HALOT
  rationale: A geographical range from one place to another. 'Mikmash' and 'Aijalon'
    are standard transliterations of the Hebrew place names; the directional ending
    on אַיָּלֹנָה supports movement toward Aijalon, idiomatically rendered in English
    as 'to Aijalon.'
- source_word: וַיָּעַף
  chosen: were very weary
  alternatives:
  - grew very weary
  - were exhausted
  lexicon: HALOT
  rationale: From עוּף/יעף in the sense of being faint or weary. Because the subject
    is collective ('the people'), English idiom prefers the plural predicate 'were
    very weary.' 'Exhausted' is possible but slightly stronger and more interpretive
    than the Hebrew requires.
- source_word: הָעָם
  chosen: the people
  lexicon: HALOT
  rationale: Collective singular in Hebrew, naturally rendered as 'the people' in
    English.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - greatly
  lexicon: HALOT
  rationale: Common adverbial intensifier. 'Very' is the most natural modern equivalent
    here.
