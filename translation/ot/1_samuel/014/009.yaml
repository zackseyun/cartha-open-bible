id: 1SA.14.9
reference: 1 Samuel 14:9
source:
  edition: WLC
  text: אִם כֹּ֤ה יֹֽאמְרוּ֙ אֵלֵ֔י/נוּ דֹּ֕מּוּ עַד הַגִּיעֵ֖/נוּ אֲלֵי/כֶ֑ם וְ/עָמַ֣דְנוּ תַחְתֵּ֔י/נוּ וְ/לֹ֥א נַעֲלֶ֖ה אֲלֵי/הֶֽם־־׃
translation:
  text: If they say to us like this[b][a], ‘Stay there until we come to you,’ then we will stand where we are and will not go up to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Be still' or 'Wait' for 'Stay there'; the Hebrew imperative can denote remaining still or silent in place.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'we will stand under ourselves,' an idiom meaning 'we will remain in our place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  lexicon: HALOT
  rationale: Standard conditional particle introducing Jonathan's proposed sign.
- source_word: כֹּה
  chosen: like this
  alternatives:
  - thus
  - this
  lexicon: HALOT
  rationale: Introduces the content of the Philistines' speech. 'Like this' is natural modern English while preserving the demonstrative force.
- source_word: יֹאמְרוּ אֵלֵינוּ
  chosen: they say to us
  alternatives:
  - they say to us this
  - they speak to us
  lexicon: HALOT
  rationale: Straightforward rendering of the verb 'say' with indirect object; present tense in English fits the conditional direct-speech setup.
- source_word: דֹּמּוּ
  chosen: Stay there
  alternatives:
  - Be still
  - Wait
  - Keep quiet
  lexicon: HALOT
  rationale: Imperative plural from דמם can mean be still/silent. In this military context, the sense is to remain in place rather than advance. 'Stay there' communicates the practical force clearly in idiomatic English.
- source_word: עַד הַגִּיעֵנוּ אֲלֵיכֶם
  chosen: until we come to you
  alternatives:
  - until we reach you
  lexicon: HALOT
  rationale: The clause expresses the Philistines coming to Jonathan and his armor-bearer. 'Come to you' is the most natural English equivalent here.
- source_word: וְעָמַדְנוּ
  chosen: then we will stand
  alternatives:
  - and we will stand
  - we will stay
  lexicon: HALOT
  rationale: Sequential waw with perfect after the conditional is rendered as the resulting action. 'Then we will stand' captures the responsive sense.
- source_word: תַחְתֵּינוּ
  chosen: where we are
  alternatives:
  - in our place
  - under us
  - beneath ourselves
  lexicon: HALOT
  rationale: Idiomatic expression meaning to remain in one's place/position. 'Where we are' is clear modern English and avoids a misleadingly literal 'under us.'
- source_word: וְלֹא נַעֲלֶה אֲלֵיהֶם
  chosen: and will not go up to them
  alternatives:
  - and we will not go up against them
  lexicon: HALOT
  rationale: עלה with אֶל commonly reflects upward movement toward the Philistine position. 'Go up to them' preserves the topographical nuance without overinterpreting it as immediate attack.
