id: 1SA.14.26
reference: 1 Samuel 14:26
source:
  edition: WLC
  text: וַ/יָּבֹ֤א הָ/עָם֙ אֶל הַ/יַּ֔עַר וְ/הִנֵּ֖ה הֵ֣לֶךְ דְּבָ֑שׁ וְ/אֵין מַשִּׂ֤יג
    יָד/וֹ֙ אֶל פִּ֔י/ו כִּֽי יָרֵ֥א הָ/עָ֖ם אֶת הַ/שְּׁבֻעָֽה־־־־־׃
translation:
  text: When the people came into the forest, behold, there was a flow of honey, but
    no one put his hand to his mouth, because the people feared the oath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'honey was flowing' or 'a stream of honey.' The Hebrew expression is
      literally 'a going/flow of honey.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'no one put his hand to his mouth,' an idiom meaning no one ate
      any of the honey.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew says 'the oath'; in context this refers to Saul's earlier oath
      that effectively placed a curse on anyone who ate before evening (see 1 Sam
      14:24).
    reason: cross_reference
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - entered
  lexicon: HALOT
  rationale: Wayyiqtol of בוא narrates simple past movement. 'Came' is natural English;
    'entered' is possible but less idiomatic with 'into the forest' here.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the troops
  lexicon: HALOT
  rationale: עם commonly means 'people.' In this military context 'troops' is possible,
    but the Hebrew term itself is broader and the repeated use in the verse is best
    preserved as 'the people.'
- source_word: הַיַּעַר
  chosen: the forest
  alternatives:
  - the woods
  lexicon: HALOT
  rationale: יער denotes a wooded area/forest. 'Forest' is the standard, clear rendering.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - there was
  lexicon: HALOT
  rationale: הנה is a discourse particle drawing attention to what appears before
    them. 'Behold' preserves the vividness without paraphrase.
- source_word: הֵלֶךְ דְּבָשׁ
  chosen: a flow of honey
  alternatives:
  - honey was flowing
  - a stream of honey
  lexicon: HALOT
  rationale: הלך as a noun here denotes a going/flow; with honey it describes honey
    running or flowing. 'A flow of honey' keeps the nominal construction while remaining
    readable. 'Stream of honey' is more interpretive.
- source_word: וְאֵין מַשִּׂיג יָדוֹ אֶל פִּיו
  chosen: but no one put his hand to his mouth
  alternatives:
  - and no one reached with his hand to his mouth
  - and no one brought his hand to his mouth
  lexicon: HALOT
  rationale: The idiom literally speaks of no one causing his hand to reach his mouth,
    i.e., no one ate. 'Put his hand to his mouth' preserves the concrete Hebrew image
    better than the more interpretive 'ate.'
- source_word: כִּי יָרֵא הָעָם
  chosen: because the people feared
  alternatives:
  - for the people were afraid of
  lexicon: HALOT
  rationale: כי gives the reason, and ירא with object can mean fear/revere. Here the
    sense is fear of violating Saul's imposed oath. 'Feared' is concise and faithful.
- source_word: הַשְּׁבֻעָה
  chosen: the oath
  alternatives:
  - the sworn oath
  - the curse
  lexicon: HALOT
  rationale: שבועה normally means 'oath.' In context Saul's oath carried a curse for
    violation, so 'curse' is contextually related, but the lexical form here is 'oath'
    and should be retained in the main text.
