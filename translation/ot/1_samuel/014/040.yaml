id: 1SA.14.40
reference: 1 Samuel 14:40
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֶל כָּל יִשְׂרָאֵ֗ל אַתֶּם֙ תִּֽהְיוּ֙ לְ/עֵ֣בֶר אֶחָ֔ד וַֽ/אֲנִי֙
    וְ/יוֹנָתָ֣ן בְּנִ֔/י נִהְיֶ֖ה לְ/עֵ֣בֶר אֶחָ֑ד וַ/יֹּאמְר֤וּ הָ/עָם֙ אֶל שָׁא֔וּל
    הַ/טּ֥וֹב בְּ/עֵינֶ֖י/ךָ עֲשֵֽׂה־־־׃ס
translation:
  text: Then he said to all Israel, “You stand on one side, and I and Jonathan my
    son will stand on the other side.” And the people said to Saul, “Do what seems
    good in your eyes.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “be on one side … be on the other side.” The Hebrew uses the verb “be”
      with “to one side,” an idiom for taking one’s position in contrast to another
      party.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעֵבֶר אֶחָד
  chosen: on one side
  alternatives:
  - to one side
  - on one side of the matter
  lexicon: HALOT
  rationale: עֵבֶר literally denotes a side or region across/beyond. In this lot-casting
    context, the idiom contrasts two parties positioned opposite each other. 'On one
    side' is natural English and preserves the spatial contrast without overinterpreting.
- source_word: תִּהְיוּ
  chosen: stand
  alternatives:
  - be
  - remain
  lexicon: HALOT
  rationale: Though היה normally means 'be,' with לְעֵבֶר אֶחָד in this setting it
    functions idiomatically for taking one's place on one side. 'Stand' makes the
    implied positioning explicit in readable English while staying close to the sense.
- source_word: נִהְיֶה
  chosen: will stand
  alternatives:
  - will be
  - will remain
  lexicon: HALOT
  rationale: Parallel to תִּהְיוּ; rendering both with 'stand' preserves the balanced
    contrast between the people and Saul with Jonathan.
- source_word: כָּל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - the whole of Israel
  lexicon: HALOT
  rationale: Standard collective designation for the assembled people; 'all Israel'
    is both literal and idiomatic.
- source_word: בְּנִי
  chosen: my son
  lexicon: HALOT
  rationale: Straightforward filial designation; retained explicitly rather than reduced
    to apposition alone.
- source_word: הַטּוֹב בְּעֵינֶיךָ
  chosen: what seems good in your eyes
  alternatives:
  - what is good in your eyes
  - whatever seems best to you
  lexicon: HALOT
  rationale: This Hebrew idiom expresses what appears good or right to someone. 'What
    seems good in your eyes' preserves the idiom's imagery while remaining understandable
    in modern English.
- source_word: עֲשֵׂה
  chosen: Do
  alternatives:
  - do it
  - act
  lexicon: HALOT
  rationale: Simple imperative matching the Hebrew; 'do' works naturally with the
    preceding object clause.
- source_word: וַיֹּאמֶר / וַיֹּאמְרוּ
  chosen: Then he said / And the people said
  alternatives:
  - And he said / And they said
  lexicon: HALOT
  rationale: Narrative waw-consecutive is rendered with natural English sequencing.
    'Then' at the first clause helps the flow; the second clause keeps the simple
    narrative progression.
