id: 1SA.14.42
reference: 1 Samuel 14:42
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שָׁא֔וּל הַפִּ֕ילוּ בֵּינִ֕/י וּ/בֵ֖ין יוֹנָתָ֣ן בְּנִ֑/י וַ/יִּלָּכֵ֖ד
    יוֹנָתָֽן׃
translation:
  text: Then Saul said, “Cast lots between me and Jonathan my son.” And Jonathan was
    taken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Cause it to fall between me and Jonathan my son,” with
      the sense of deciding the matter by lot.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפִּילוּ
  chosen: Cast lots
  alternatives:
  - Cast
  - Cause to fall
  - Decide by lot
  lexicon: HALOT
  rationale: The Hiphil imperative plural of נפל literally means 'cause to fall,'
    but in this context of discernment by lot in the surrounding narrative, the idiomatic
    sense is to cast lots. Supplying 'lots' in English makes the implied object explicit
    and natural without over-paraphrasing.
- source_word: בֵּינִי וּבֵין
  chosen: between me and
  alternatives:
  - between
  lexicon: HALOT
  rationale: The paired preposition marks a contrast or selection between two parties.
    'Between me and Jonathan my son' is the most natural English rendering.
- source_word: בְּנִי
  chosen: my son
  alternatives:
  - my child
  lexicon: HALOT
  rationale: The noun בן with first person singular suffix is specifically filial,
    not generic. 'My son' preserves the familial relationship and the masculine reference.
- source_word: וַיִּלָּכֵד
  chosen: was taken
  alternatives:
  - was caught
  - was selected
  - was indicated by lot
  lexicon: HALOT
  rationale: The Niphal wayyiqtol of לכד means 'was taken/captured.' In lot-casting
    context it refers to being singled out by the lot. 'Was taken' is concise, traditional,
    and close to the Hebrew, while allowing the context to convey that Jonathan was
    identified by the lot.
- source_word: יוֹנָתָן
  chosen: Jonathan
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: וַיֹּאמֶר
  chosen: Then Saul said
  alternatives:
  - And Saul said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then Saul said' gives natural
    English narrative flow while preserving sequence.
