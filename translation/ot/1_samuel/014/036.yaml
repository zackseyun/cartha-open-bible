theological_decisions:
- issue: Implication of consulting God before battle
  chosen_reading: Render the priest's words as an invitation to approach God without specifying the exact ritual act.
  alternative_readings:
  - Let us inquire of God here
  - Let us consult God here
  rationale: The Hebrew says 'let us draw near ... to God,' which may imply inquiry through priestly means in context, but the text does not explicitly use the verb 'inquire.' The translation preserves the wording and theological restraint rather than importing a more specific practice.
  doctrine_reference: Preserve theological tension rather than resolve it.
