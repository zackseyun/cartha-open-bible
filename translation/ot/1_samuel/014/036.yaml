id: 1SA.14.36
reference: 1 Samuel 14:36
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שָׁא֡וּל נֵרְדָ֣ה אַחֲרֵי֩ פְלִשְׁתִּ֨ים לַ֜יְלָה וְֽ/נָבֹ֥זָה בָ/הֶ֣ם עַד א֣וֹר הַ/בֹּ֗קֶר וְ/לֹֽא נַשְׁאֵ֤ר בָּ/הֶם֙ אִ֔ישׁ וַ/יֹּ֣אמְר֔וּ כָּל הַ/טּ֥וֹב בְּ/עֵינֶ֖י/ךָ עֲשֵׂ֑ה וַ/יֹּ֨אמֶר֙ הַ/כֹּהֵ֔ן נִקְרְבָ֥ה הֲלֹ֖ם אֶל הָ/אֱלֹהִֽים׀׀־־־ס־׃
translation:
  text: Then Saul said[a], “Let us go down after the Philistines by night and plunder them until the light of the morning, and let us not leave a man among them.” And they said, “Do whatever seems good in your eyes.” But the priest said, “Let us draw near here to God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Let us approach God here”; the priest's words likely imply seeking divine guidance before proceeding.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֵרְדָה
  chosen: Let us go down
  alternatives:
  - Let us descend
  - Let us go
  lexicon: HALOT
  rationale: Cohortative 1cp of ירד, preserving Saul's proposal as an exhortation. 'Go down' keeps the directional nuance present in the Hebrew better than the flatter 'go.'
- source_word: אַחֲרֵי פְלִשְׁתִּים
  chosen: after the Philistines
  alternatives:
  - against the Philistines
  - in pursuit of the Philistines
  lexicon: HALOT
  rationale: אַחֲרֵי literally means 'after'; in military context it implies pursuit. 'After the Philistines' is natural enough in English while remaining close to the source.
- source_word: לַיְלָה
  chosen: by night
  alternatives:
  - tonight
  - at night
  lexicon: HALOT
  rationale: Adverbial use indicating the time of the proposed attack. 'By night' is concise and idiomatic without over-specifying 'tonight,' which the Hebrew does not explicitly state.
- source_word: וְנָבֹזָה בָהֶם
  chosen: and plunder among them
  alternatives:
  - and spoil them
  - and loot them
  - and fall upon them
  lexicon: HALOT
  rationale: From בזז, 'to plunder/spoil.' The preposition בָהֶם is awkward if rendered woodenly as 'plunder them'; 'plunder among them' preserves both the plundering sense and the prepositional element. 'Fall upon them' would reflect a different root and is less lexically precise.
- source_word: עַד אוֹר הַבֹּקֶר
  chosen: until the light of the morning
  alternatives:
  - until morning light
  - until daybreak
  lexicon: HALOT
  rationale: A fairly literal rendering of the phrase, preserving the imagery of light appearing in the morning. 'Daybreak' is possible but slightly more interpretive.
- source_word: וְלֹא נַשְׁאֵר בָּהֶם אִישׁ
  chosen: and let us not leave a man among them
  alternatives:
  - and let us leave none of them alive
  - and let us not leave one man of them
  lexicon: HALOT
  rationale: The cohortative/volitional sequence continues Saul's proposal. אִישׁ is singular 'a man,' used distributively. This rendering preserves the masculine singular form and the sense of total destruction without adding 'alive,' which is implied but not explicit.
- source_word: כָּל הַטּוֹב בְּעֵינֶיךָ עֲשֵׂה
  chosen: Do whatever seems good in your eyes
  alternatives:
  - Do all that is good in your eyes
  - Do whatever seems best to you
  lexicon: HALOT
  rationale: Idiomatic Hebrew for personal judgment or approval. 'Seems good in your eyes' keeps the Hebrew image; a smoother English alternative is preserved as an option but not adopted in the main text.
- source_word: נִקְרְבָה הֲלֹם אֶל הָאֱלֹהִים
  chosen: Let us draw near here to God
  alternatives:
  - Let us come near here to God
  - Let us approach God here
  lexicon: HALOT
  rationale: Cohortative 1cp of קרב. 'Draw near' is a natural English equivalent often used for approaching God, and הֲלֹם is retained with 'here' rather than omitted. This likely implies seeking divine guidance before acting.
