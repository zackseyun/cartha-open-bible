id: 1SA.14.8
reference: 1 Samuel 14:8
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ יְה֣וֹנָתָ֔ן הִנֵּ֛ה אֲנַ֥חְנוּ עֹבְרִ֖ים אֶל הָ/אֲנָשִׁ֑ים וְ/נִגְלִ֖ינוּ
    אֲלֵי/הֶֽם־׃
translation:
  text: Jonathan said, “Look, we are crossing over to the men, and we will show ourselves
    to them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “we will show ourselves to them.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - answered
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר in direct speech introduction; 'said'
    is the natural English equivalent.
- source_word: יְהוֹנָתָן
  chosen: Jonathan
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic/interjection drawing attention to the plan. 'Look' preserves
    the discourse force in readable modern English better than archaic 'Behold.'
- source_word: אֲנַחְנוּ
  chosen: we
  rationale: Explicit first person plural pronoun retained for emphasis in English
    as part of Jonathan's stated plan.
- source_word: עֹבְרִים
  chosen: are crossing over
  alternatives:
  - are going over
  - will cross over
  lexicon: HALOT
  rationale: Participle of עבר conveys imminent/progressive action. 'Are crossing
    over' preserves the movement nuance and fits the immediate tactical context.
- source_word: אֶל הָאֲנָשִׁים
  chosen: to the men
  alternatives:
  - toward the men
  - to those men
  lexicon: HALOT
  rationale: Definite noun phrase referring to the Philistine outpost personnel already
    in view. 'Men' is gender-accurate and contextually specific.
- source_word: וְנִגְלִינוּ
  chosen: we will reveal ourselves
  alternatives:
  - we will show ourselves
  - we will make ourselves visible
  lexicon: HALOT
  rationale: Nifal of גלה here means to make oneself known/visible. 'Reveal ourselves'
    is slightly more formal but accurately captures intentional self-disclosure to
    the enemy.
- source_word: אֲלֵיהֶם
  chosen: to them
  alternatives:
  - before them
  rationale: Standard prepositional phrase indicating the Philistines as the recipients/observers
    of the self-revelation.
