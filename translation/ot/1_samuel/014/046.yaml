id: 1SA.14.46
reference: 1 Samuel 14:46
source:
  edition: WLC
  text: וַ/יַּ֣עַל שָׁא֔וּל מֵ/אַחֲרֵ֖י פְּלִשְׁתִּ֑ים וּ/פְלִשְׁתִּ֖ים הָלְכ֥וּ לִ/מְקוֹמָֽ/ם׃
translation:
  text: Then Saul went up from pursuing the Philistines[a], and the Philistines went to their own place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Then Saul withdrew from following after the Philistines.' The Hebrew literally says 'went up from after the Philistines,' an idiom for ending the pursuit.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - withdrew
  - stopped
  lexicon: HALOT
  rationale: The verb עלה literally means 'go up/ascend.' In this military context, with מֵאַחֲרֵי ('from after/from pursuing'), it idiomatically indicates Saul's movement away from the pursuit. 'Went up' preserves the Hebrew wording while remaining intelligible; more interpretive options like 'withdrew' or 'stopped' are possible but less formally tied to the source.
- source_word: מֵאַחֲרֵי
  chosen: from pursuing
  alternatives:
  - from after
  - from following after
  lexicon: HALOT
  rationale: אַחֲרֵי with prefixed מִן literally means 'from after.' In context of military action, English naturally expresses this as ceasing pursuit. 'From pursuing' captures the idiomatic sense without excessive paraphrase.
- source_word: פְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard transliteration of the ethnic name; the article is supplied naturally in English for a known people group.
- source_word: הָלְכוּ
  chosen: went
  alternatives:
  - returned
  - departed
  lexicon: HALOT
  rationale: הלך is the common verb 'go/walk.' 'Went' is the most direct rendering. 'Returned' is contextually plausible given לִמְקוֹמָם, but the Hebrew verb itself does not require that nuance.
- source_word: לִמְקוֹמָם
  chosen: to their own place
  alternatives:
  - to their place
  - home
  lexicon: HALOT
  rationale: מָקוֹם means 'place.' The 3mp suffix is rendered 'their,' and 'own' is added for natural English emphasis corresponding to the possessive. 'Home' is too specific; 'to their place' is possible but slightly less idiomatic.
