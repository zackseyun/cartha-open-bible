id: 1SA.14.28
reference: 1 Samuel 14:28
source:
  edition: WLC
  text: וַ/יַּעַן֩ אִ֨ישׁ מֵֽ/הָ/עָ֜ם וַ/יֹּ֗אמֶר הַשְׁבֵּעַ֩ הִשְׁבִּ֨יעַ אָבִ֤י/ךָ
    אֶת הָ/עָם֙ לֵ/אמֹ֔ר אָר֥וּר הָ/אִ֛ישׁ אֲשֶׁר יֹ֥אכַל לֶ֖חֶם הַ/יּ֑וֹם וַ/יָּ֖עַף
    הָ/עָֽם־־׃
translation:
  text: Then one of the people answered and said, “Your father strictly put the people
    under oath, saying, ‘Cursed is the man who eats food today.’ So the people were
    faint.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'bread'; here used more broadly for food in general.
    reason: lexical_alternative
  - marker: b
    text: Or 'the people became weary' / 'the people were exhausted.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: Standard narrative verb for replying; 'answered' preserves the Hebrew
    idiom and fits the dialogue context.
- source_word: אִישׁ מֵהָעָם
  chosen: one of the people
  alternatives:
  - a man from the people
  - someone from among the people
  lexicon: HALOT
  rationale: Though literally 'a man from the people,' the idiomatic sense in English
    is an unspecified individual from among the troops/crowd. 'One of the people'
    is natural while preserving the singular speaker.
- source_word: הַשְׁבֵּעַ הִשְׁבִּיעַ
  chosen: strictly put ... under oath
  alternatives:
  - solemnly adjured
  - surely made ... swear
  - bound ... by oath
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'Strictly
    put ... under oath' captures both the causative sense of Hiphil and the emphatic
    force without archaic diction.
- source_word: אָבִיךָ
  chosen: your father
  lexicon: HALOT
  rationale: Direct address to Jonathan; straightforward possessive rendering.
- source_word: אָרוּר
  chosen: Cursed
  alternatives:
  - Accursed
  lexicon: HALOT
  rationale: Standard rendering of the passive participial curse formula; 'cursed'
    is clear modern English and preserves the juridical/solemn force.
- source_word: הָאִישׁ אֲשֶׁר יֹאכַל
  chosen: the man who eats
  alternatives:
  - the person who eats
  lexicon: HALOT
  rationale: Gender-accurate policy favors retaining 'man' where Hebrew uses masculine
    singular representative language. Here it functions generically in a curse formula,
    so 'the man who eats' best matches the source.
- source_word: לֶחֶם
  chosen: food
  alternatives:
  - bread
  lexicon: HALOT
  rationale: Although literally 'bread,' in context it refers broadly to nourishment/food,
    as shown by Jonathan's eating honey in the surrounding narrative. 'Food' better
    reflects the intended sense in idiomatic English.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is the natural modern English equivalent in direct speech.'
- source_word: וַיָּעַף
  chosen: were faint
  alternatives:
  - became weary
  - were exhausted
  lexicon: HALOT
  rationale: The verb denotes weariness/faintness from exhaustion or hunger. 'Were
    faint' fits the immediate context of fasting and explains the people's weakened
    condition.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the troops
  lexicon: HALOT
  rationale: The Hebrew term is 'the people'; while it refers to the fighting force
    in context, the more literal rendering is retained here for consistency and transparency.
