id: 1SA.14.21
reference: 1 Samuel 14:21
source:
  edition: WLC
  text: וְ/הָ/עִבְרִ֗ים הָי֤וּ לַ/פְּלִשְׁתִּים֙ כְּ/אֶתְמ֣וֹל שִׁלְשׁ֔וֹם אֲשֶׁ֨ר
    עָל֥וּ עִמָּ֛/ם בַּֽ/מַּחֲנֶ֖ה סָבִ֑יב וְ/גַם הֵ֗מָּה לִֽ/הְיוֹת֙ עִם יִשְׂרָאֵ֔ל
    אֲשֶׁ֥ר עִם שָׁא֖וּל וְ/יוֹנָתָֽן־־־׃
translation:
  text: Now the Hebrews who had previously been with the Philistines, who had gone
    up with them into the camp all around—even they also turned to be with Israel,
    who were with Saul and Jonathan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'like yesterday, three days ago,' an idiom meaning 'formerly'
      or 'previously.'
    reason: lexical_alternative
  - marker: b
    text: Or 'came to be with Israel'; the Hebrew says 'to be with Israel,' implying
      a shift of allegiance.
    reason: alternative_reading
  - marker: c
    text: The phrase 'into the camp all around' is difficult; it likely refers to
      those Hebrews who had accompanied the Philistines in their encampment in the
      surrounding area.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָעִבְרִים
  chosen: Now the Hebrews
  alternatives:
  - And the Hebrews
  - the Hebrews
  lexicon: HALOT
  rationale: Retained 'Hebrews' rather than 'Israelites' because the source uses עִבְרִים,
    likely distinguishing a subset or describing them from an external/social perspective.
    'Now' renders the conjunction smoothly in narrative progression.
- source_word: הָיוּ לַפְּלִשְׁתִּים
  chosen: had previously been with the Philistines
  alternatives:
  - were with the Philistines
  - belonged to the Philistines
  lexicon: HALOT
  rationale: The construction literally is 'were to/for the Philistines,' but in context
    it describes association/allegiance. 'With the Philistines' is idiomatic and avoids
    overstating ownership implied by 'belonged to.' 'Had previously been' brings out
    the past reference clarified by the following temporal phrase.
- source_word: כְּאֶתְמוֹל שִׁלְשׁוֹם
  chosen: previously
  alternatives:
  - formerly
  - as yesterday and the day before
  - before now
  lexicon: HALOT
  rationale: The idiom literally refers to prior days ('yesterday and the day before'),
    meaning 'formerly' or 'previously.' A concise idiomatic rendering fits modern
    English while preserving temporal contrast.
- source_word: אֲשֶׁר עָלוּ עִמָּם
  chosen: who had gone up with them
  alternatives:
  - who went up with them
  - who had come up with them
  lexicon: HALOT
  rationale: עלה commonly means 'go up/come up.' 'Gone up' preserves the directional
    verb without overinterpreting. The relative clause identifies these Hebrews as
    those accompanying the Philistines.
- source_word: בַּמַּחֲנֶה סָבִיב
  chosen: into the camp all around
  alternatives:
  - in the camp round about
  - into the camp in the surrounding area
  - with the camp all around
  lexicon: HALOT
  rationale: The phrase is syntactically difficult. It likely describes the Philistine
    camp spread around the area. 'Into the camp all around' preserves the spatial
    sense without forcing a more interpretive paraphrase.
- source_word: וְגַם הֵמָּה
  chosen: even they also
  alternatives:
  - they also
  - even they
  lexicon: HALOT
  rationale: 'The combination adds emphasis: not only others, but these Hebrews as
    well. ''Even they also'' preserves that emphatic inclusion.'
- source_word: לִהְיוֹת עִם יִשְׂרָאֵל
  chosen: turned to be with Israel
  alternatives:
  - came to be with Israel
  - were with Israel
  - joined Israel
  lexicon: HALOT
  rationale: The infinitive 'to be' after the emphatic clause implies a change of
    alignment. English needs a finite sense; 'turned to be with' captures the shift
    without adding too much interpretation. 'Joined Israel' is possible but slightly
    more dynamic than the Hebrew wording.
- source_word: אֲשֶׁר עִם שָׁאוּל וְיוֹנָתָן
  chosen: who were with Saul and Jonathan
  alternatives:
  - that was with Saul and Jonathan
  - who was with Saul and Jonathan
  lexicon: HALOT
  rationale: The relative clause most naturally modifies 'Israel' collectively, but
    English can render it as 'who were with Saul and Jonathan' to reflect the people
    aligned with Saul and Jonathan. Plural agreement is idiomatic in English for a
    collective referent.
