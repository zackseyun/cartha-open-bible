id: 1SA.14.48
reference: 1 Samuel 14:48
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ חַ֔יִל וַ/יַּ֖ךְ אֶת עֲמָלֵ֑ק וַ/יַּצֵּ֥ל אֶת יִשְׂרָאֵ֖ל מִ/יַּ֥ד
    שֹׁסֵֽ/הוּ־־׃ס
translation:
  text: He fought valiantly and struck Amalek, and he delivered Israel from the hand
    of those who plundered it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'did valor/strength,' an idiom meaning he acted bravely or achieved
      military success.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Amalek,' referring to the Amalekite people.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'from the hand of his plunderer'; the singular is naturally understood
      collectively with 'Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ חַיִל
  chosen: fought valiantly
  alternatives:
  - did mighty deeds
  - showed valor
  - won victories
  lexicon: HALOT
  rationale: The idiom עשה חיל commonly conveys acting with strength/valor or achieving
    military success, not literally 'made strength.' In this military context, 'fought
    valiantly' captures both the idiomatic force and the narrative setting.
- source_word: וַיַּךְ
  chosen: struck
  alternatives:
  - defeated
  - smote
  lexicon: HALOT
  rationale: נכה is broadly 'strike, smite, defeat.' 'Struck' preserves the Hebrew
    verbal imagery while remaining natural English; the object Amalek here refers
    to the Amalekites as a people.
- source_word: עֲמָלֵק
  chosen: Amalek
  alternatives:
  - the Amalekites
  lexicon: HALOT
  rationale: The Hebrew uses the singular ethnonym/proper name Amalek. Retaining 'Amalek'
    is formally closer, while English readers understand it corporately as the Amalekite
    people.
- source_word: וַיַּצֵּל
  chosen: delivered
  alternatives:
  - rescued
  - saved
  lexicon: HALOT
  rationale: נצל in the Hiphil means to snatch away, rescue, deliver. 'Delivered'
    is a clear and biblically resonant rendering without overstating theological implications.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from the power of
  lexicon: HALOT
  rationale: The idiom 'from the hand of' is common biblical Hebrew for power/control.
    It is still intelligible in modern English and preserves the source imagery.
- source_word: שֹׁסֵהוּ
  chosen: those who plundered them
  alternatives:
  - his plunderer
  - those who despoiled him
  - those who spoiled them
  lexicon: HALOT
  rationale: The participle from שסס/שסה denotes one who plunders or despoils. Although
    the suffix is morphologically singular ('him'), the immediate object is collective
    'Israel,' which is naturally rendered with plural sense in English as 'them.'
    The participle has a collective force here, hence 'those who plundered them.'
