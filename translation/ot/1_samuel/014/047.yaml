id: 1SA.14.47
reference: 1 Samuel 14:47
source:
  edition: WLC
  text: וְ/שָׁא֛וּל לָכַ֥ד הַ/מְּלוּכָ֖ה עַל יִשְׂרָאֵ֑ל וַ/יִּלָּ֣חֶם סָבִ֣יב בְּֽ/כָל
    אֹיְבָ֡י/ו בְּ/מוֹאָ֣ב וּ/בִ/בְנֵי עַמּ֨וֹן וּ/בֶ/אֱד֜וֹם וּ/בְ/מַלְכֵ֤י צוֹבָה֙
    וּ/בַ/פְּלִשְׁתִּ֔ים וּ/בְ/כֹ֥ל אֲשֶׁר יִפְנֶ֖ה יַרְשִֽׁיעַ־׀־׀־־׃
translation:
  text: 'Now Saul had taken the kingship over Israel, and he fought against all his
    enemies on every side: against Moab, against the Ammonites, against Edom, against
    the kings of Zobah, and against the Philistines. Wherever he turned, he inflicted
    punishment.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'he condemned' them; the Hebrew verb can mean to declare
      guilty, and here likely refers to inflicting punitive defeat on his enemies.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכַד הַמְּלוּכָה
  chosen: had secured the kingship
  alternatives:
  - captured the kingdom
  - took possession of the kingship
  - seized the rule
  lexicon: HALOT
  rationale: לכד literally means 'capture/seize,' but with הַמְּלוּכָה and עַל יִשְׂרָאֵל
    in this context it refers to Saul's establishment or consolidation of royal rule.
    'Secured the kingship' preserves the force of gaining firm hold without implying
    illegitimate usurpation.
- source_word: הַמְּלוּכָה
  chosen: the kingship
  alternatives:
  - the kingdom
  - the monarchy
  - royal rule
  lexicon: HALOT
  rationale: '''Kingship'' fits the abstract/institutional sense better than ''kingdom,''
    which can suggest territory rather than royal office.'
- source_word: וַיִּלָּחֶם
  chosen: he fought
  alternatives:
  - he waged war
  - he battled
  lexicon: HALOT
  rationale: A straightforward rendering of the Niphal/wayyiqtol verbal form in narrative
    sequence; 'fought' is natural modern English and sufficiently formal.
- source_word: סָבִיב
  chosen: on every side
  alternatives:
  - all around
  - round about
  lexicon: HALOT
  rationale: This adverb modifies the scope of Saul's warfare against surrounding
    enemies. 'On every side' is idiomatic and clear.
- source_word: בְּכָל אֹיְבָיו
  chosen: against all his enemies
  alternatives:
  - with all his enemies
  - against every one of his enemies
  lexicon: HALOT
  rationale: The preposition ב with לחם commonly marks the opponent in battle; in
    English 'fought against' is the natural equivalent.
- source_word: בְּמוֹאָב ... וּבִבְנֵי עַמּוֹן ... וּבֶאֱדוֹם ... וּבְמַלְכֵי צוֹבָה
    ... וּבַפְּלִשְׁתִּים
  chosen: against Moab, against the Ammonites, against Edom, against the kings of
    Zobah, and against the Philistines
  alternatives:
  - with Moab ...
  - against the sons of Ammon ...
  lexicon: HALOT
  rationale: The repeated ב is best represented by repeated 'against' for clarity
    and rhetorical force. 'Ammonites' is the natural English equivalent of 'sons of
    Ammon.' Personal/geographical names are transliterated per project philosophy.
- source_word: בְּמַלְכֵי צוֹבָה
  chosen: against the kings of Zobah
  alternatives:
  - against the king of Zobah
  lexicon: HALOT
  rationale: The Hebrew is plural ('kings of Zobah'), so the translation preserves
    that number rather than smoothing to singular.
- source_word: וּבְכֹל אֲשֶׁר יִפְנֶה
  chosen: Wherever he turned
  alternatives:
  - and against wherever he turned
  - in every direction he turned
  lexicon: HALOT
  rationale: This idiom introduces the result clause in concise English. 'Wherever
    he turned' captures the distributive sense of בכל אשר plus פנה.
- source_word: יַרְשִׁיעַ
  chosen: he brought punishment
  alternatives:
  - he condemned
  - he acted wickedly
  - he put them to shame
  lexicon: HALOT
  rationale: The Hiphil of רשע here is difficult. In context of military success against
    enemies, it most likely means to treat as guilty / inflict punitive defeat. 'Brought
    punishment' communicates adverse judgment in battle without over-specifying. A
    footnote preserves the more literal 'condemned' alternative.
