id: 1SA.14.14
reference: 1 Samuel 14:14
source:
  edition: WLC
  text: וַ/תְּהִ֞י הַ/מַּכָּ֣ה הָ/רִאשֹׁנָ֗ה אֲשֶׁ֨ר הִכָּ֧ה יוֹנָתָ֛ן וְ/נֹשֵׂ֥א
    כֵלָ֖י/ו כְּ/עֶשְׂרִ֣ים אִ֑ישׁ כְּ/בַ/חֲצִ֥י מַעֲנָ֖ה צֶ֥מֶד שָׂדֶֽה׃
translation:
  text: That first slaughter, which Jonathan and his armor-bearer made, was about
    twenty men within about half a furrow in an acre of a field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'about half a furrow of a yoke of a field,' likely referring
      to the area a yoke of oxen could plow.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּכָּה
  chosen: slaughter
  alternatives:
  - blow
  - attack
  - slaying
  lexicon: HALOT
  rationale: In this military context, the noun refers to a deadly strike or killing,
    not merely a nonlethal blow. 'Slaughter' conveys the lethal result of Jonathan's
    initial assault more clearly than the more ambiguous 'blow' or 'attack'.
- source_word: הָרִאשֹׁנָה
  chosen: first
  alternatives:
  - initial
  lexicon: HALOT
  rationale: Straightforward ordinal adjective modifying 'slaughter'; 'first' is the
    most natural English equivalent.
- source_word: הִכָּה
  chosen: struck down
  alternatives:
  - killed
  - struck
  - defeated
  lexicon: HALOT
  rationale: The verb נכה commonly means 'strike' or 'smite,' and in this context
    of casualties it implies killing. 'Struck down' preserves the Hebrew verbal imagery
    while allowing the lethal sense to be heard from context.
- source_word: וְנֹשֵׂא כֵלָיו
  chosen: and his armor-bearer
  alternatives:
  - and the bearer of his weapons
  lexicon: HALOT
  rationale: This is the standard military expression for the attendant who carries
    a warrior's equipment. 'Armor-bearer' is idiomatic modern English and accurately
    reflects the role.
- source_word: כְּעֶשְׂרִים אִישׁ
  chosen: about twenty men
  alternatives:
  - some twenty men
  - approximately twenty men
  lexicon: HALOT
  rationale: The prefixed כ marks approximation here. 'About twenty men' is natural
    English and preserves the approximate count.
- source_word: כְּבַחֲצִי
  chosen: within about half
  alternatives:
  - in about half
  - as it were half
  lexicon: HALOT
  rationale: The repeated כ likely marks approximation. Rendering both approximations
    keeps the measured-but-imprecise sense of the Hebrew description.
- source_word: מַעֲנָה
  chosen: furrow
  alternatives:
  - strip
  - row
  - track
  lexicon: HALOT
  rationale: The term is traditionally understood as a furrow or plowed strip. 'Furrow'
    best fits the agricultural imagery and the following field measurement.
- source_word: צֶמֶד שָׂדֶה
  chosen: in an acre of a field
  alternatives:
  - of a yoke of field
  - of land a yoke could plow
  lexicon: HALOT
  rationale: צֶמֶד literally denotes a pair/yoke, and in land measurement it refers
    to the amount a yoke can plow, conventionally approximated as an acre. 'An acre
    of a field' gives readable modern English while preserving the agricultural land-measure
    sense; the more literal wording is preserved in a footnote.
