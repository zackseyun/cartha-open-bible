id: 1SA.14.13
reference: 1 Samuel 14:13
source:
  edition: WLC
  text: וַ/יַּ֣עַל יוֹנָתָ֗ן עַל יָדָי/ו֙ וְ/עַל רַגְלָ֔י/ו וְ/נֹשֵׂ֥א כֵלָ֖י/ו אַחֲרָ֑י/ו
    וַֽ/יִּפְּלוּ֙ לִ/פְנֵ֣י יוֹנָתָ֔ן וְ/נֹשֵׂ֥א כֵלָ֖י/ו מְמוֹתֵ֥ת אַחֲרָֽי/ו־־׃
translation:
  text: Then Jonathan climbed up on his hands and feet, with his armor-bearer behind
    him. They fell before Jonathan, and his armor-bearer killed them after him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'was killing them behind him.' The Hebrew participle may emphasize ongoing
      action rather than repeated action.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: climbed up
  alternatives:
  - went up
  - ascended
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend,' but in this immediate context of scaling
    a steep approach on hands and feet, 'climbed up' best conveys the physical action
    in natural English without adding beyond the text.
- source_word: עַל יָדָיו וְעַל רַגְלָיו
  chosen: on his hands and feet
  alternatives:
  - on his hands and on his feet
  - on all fours
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the vivid bodily posture. 'On all
    fours' is idiomatic but slightly more interpretive than the Hebrew wording.
- source_word: נֹשֵׂא כֵלָיו
  chosen: his armor-bearer
  alternatives:
  - the one carrying his weapons
  - his weapons-bearer
  lexicon: HALOT
  rationale: 'This is the standard idiomatic sense in military narrative: the attendant
    who carries a warrior''s equipment. ''Armor-bearer'' is clear, established English
    and accurately reflects the role.'
- source_word: אַחֲרָיו
  chosen: behind him
  alternatives:
  - after him
  - following him
  lexicon: HALOT
  rationale: In this narrative setting the spatial sense is primary. 'Behind him'
    is more natural in English than the more wooden 'after him,' while preserving
    the sequence and position.
- source_word: וַיִּפְּלוּ לִפְנֵי יוֹנָתָן
  chosen: They fell before Jonathan
  alternatives:
  - They fell in front of Jonathan
  - They fell before the face of Jonathan
  lexicon: HALOT
  rationale: נפל לפני can denote falling before someone in defeat, especially in battle.
    'They fell before Jonathan' preserves the military sense and avoids over-specifying
    whether they collapsed, were struck down, or were routed at that exact moment.
- source_word: מְמוֹתֵת
  chosen: kept killing them
  alternatives:
  - was killing them
  - put them to death
  - finished them off
  lexicon: HALOT
  rationale: The participial/iterative force in context suggests ongoing action by
    the armor-bearer as he followed Jonathan. 'Kept killing them' captures the repeated
    action. 'Finished them off' is possible contextually but more interpretive and
    colloquial.
