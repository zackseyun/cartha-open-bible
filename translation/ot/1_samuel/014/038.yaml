id: 1SA.14.38
reference: 1 Samuel 14:38
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שָׁא֔וּל גֹּ֣שֽׁוּ הֲלֹ֔ם כֹּ֖ל פִּנּ֣וֹת הָ/עָ֑ם וּ/דְע֣וּ וּ/רְא֔וּ
    בַּ/מָּ֗ה הָֽיְתָ֛ה הַ/חַטָּ֥את הַ/זֹּ֖את הַ/יּֽוֹם׃
translation:
  text: Then Saul said, “Come here, all you leaders of the people, and know and see
    how this sin has happened today.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'all the corners of the people,' an idiom for the people's
      leaders or representatives.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּשׁוּ הֲלֹם
  chosen: Come here
  alternatives:
  - Come near here
  - Draw near here
  lexicon: HALOT
  rationale: Imperative plural of נגשׁ with deictic הֲלֹם calls the group to approach
    Saul's location. 'Come here' is natural modern English while preserving the summons.
- source_word: כֹּל פִּנּוֹת הָעָם
  chosen: all you leaders of the people
  alternatives:
  - all the corners of the people
  - all the chiefs of the people
  - all the divisions of the people
  lexicon: HALOT
  rationale: Literally 'all the corners of the people,' an idiom for the prominent
    men, chiefs, or representatives from every sector. Rendering it woodenly as 'corners'
    would obscure the sense in English. 'Leaders' captures the idiomatic referent
    in context.
- source_word: וּדְעוּ וּרְאוּ
  chosen: and know and see
  alternatives:
  - and find out and see
  - and know and inspect
  lexicon: HALOT
  rationale: The paired imperatives urge investigation and recognition. Keeping both
    verbs preserves the Hebrew emphasis rather than collapsing them into a single
    English verb.
- source_word: בַּמָּה
  chosen: how
  alternatives:
  - wherein
  - by what
  - in what
  lexicon: HALOT
  rationale: Here ב + מה introduces the manner or means by which the offense occurred.
    'How' is the clearest idiomatic English equivalent in this context.
- source_word: הָיְתָה
  chosen: has happened
  alternatives:
  - came to be
  - was
  - has come about
  lexicon: HALOT
  rationale: Though formally 'was/came to be,' in context Saul is asking how the present
    offense came about. Present perfect English conveys the investigative sense naturally.
- source_word: הַחַטָּאת הַזֹּאת
  chosen: this sin
  alternatives:
  - this offense
  - this guilt
  - this wrongdoing
  lexicon: HALOT
  rationale: חטאת here denotes the sinful act or offense that has brought divine silence
    in the narrative context. 'Sin' is the most direct and theologically transparent
    rendering.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Standard temporal adverb; 'today' is readable modern English.
