theological_decisions:
- issue: Idiomatic force of 'all the corners of the people'
  chosen_reading: Render idiomatically as 'all you leaders of the people'
  alternative_readings:
  - all the corners of the people
  - all the chiefs of the people
  rationale: This is not a doctrinally contested phrase, but it affects transparency
    and accuracy. The Hebrew idiom points to representative leaders from among the
    people, not literal corners. Optimal equivalence favors the idiomatic sense in
    the main text.
  doctrine_reference: Translation philosophy §1, §6
- issue: Moral force of חטאת
  chosen_reading: Translate as 'sin'
  alternative_readings:
  - offense
  - wrongdoing
  - guilt
  rationale: The narrative concerns a breach before God, so 'sin' best preserves the
    theological weight without overinterpreting beyond the text.
  doctrine_reference: Translation philosophy §5
