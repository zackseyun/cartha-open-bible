id: 1SA.14.19
reference: 1 Samuel 14:19
source:
  edition: WLC
  text: וַ/יְהִ֗י עַ֣ד דִּבֶּ֤ר שָׁאוּל֙ אֶל הַ/כֹּהֵ֔ן וְ/הֶ/הָמ֗וֹן אֲשֶׁר֙ בְּ/מַחֲנֵ֣ה
    פְלִשְׁתִּ֔ים וַ/יֵּ֥לֶךְ הָל֖וֹךְ וָ/רָ֑ב וַ/יֹּ֧אמֶר שָׁא֛וּל אֶל הַ/כֹּהֵ֖ן
    אֱסֹ֥ף יָדֶֽ/ךָ־פ־׃
translation:
  text: And it happened, while Saul was speaking to the priest, that the tumult in
    the camp of the Philistines kept increasing more and more. So Saul said to the
    priest, “Withdraw your hand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “gather your hand.” Saul tells the priest to stop the action
      he was performing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came about
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of היה introducing the next event in sequence.
    'And it happened' preserves the Hebrew narrative texture without sounding overly
    archaic.
- source_word: עַד דִּבֶּר
  chosen: while ... was speaking
  alternatives:
  - as ... spoke
  - before ... finished speaking
  lexicon: HALOT
  rationale: The construction here marks contemporaneous action up to the point of
    interruption. 'While Saul was speaking' best captures the ongoing sense in natural
    English and fits the immediate narrative development.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Straightforward rendering of כהן. The specific priest has already been
    introduced in context, so the definite form is retained.
- source_word: הֶהָמוֹן
  chosen: the tumult
  alternatives:
  - the commotion
  - the uproar
  - the noise
  lexicon: HALOT
  rationale: המון here refers not merely to sound but to the confused uproar and disturbance
    in the Philistine camp. 'Tumult' conveys both noise and disorder.
- source_word: בְּמַחֲנֵה פְלִשְׁתִּים
  chosen: in the camp of the Philistines
  alternatives:
  - in the Philistine camp
  lexicon: HALOT
  rationale: A clear, essentially formal rendering of the construct phrase. 'Camp
    of the Philistines' preserves the genitival structure while remaining natural
    English.
- source_word: וַיֵּלֶךְ הָלוֹךְ וָרָב
  chosen: kept increasing more and more
  alternatives:
  - went on and became greater
  - continued growing stronger
  - kept going and increasing
  lexicon: HALOT
  rationale: This idiomatic infinitive absolute plus finite verb construction expresses
    progressive intensification. Because the subject is 'the tumult,' English idiom
    is best served by 'kept increasing more and more,' which captures the ongoing
    escalation.
- source_word: אֱסֹף יָדֶךָ
  chosen: Withdraw your hand
  alternatives:
  - Draw back your hand
  - Stop
  - Hold back your hand
  lexicon: HALOT
  rationale: Literally 'gather your hand.' In context Saul is telling the priest to
    cease the ritual action he had begun. 'Withdraw your hand' preserves the concrete
    Hebrew image while communicating the command to stop the priestly act.
