theological_decisions:
- issue: Rendering the oath formula without adding an explicit self-imprecation
  chosen_reading: May God do so and more also
  alternative_readings:
  - May God do this to me and more also
  - Thus may God do, and thus may he add
  rationale: The Hebrew conventional oath formula leaves the object of the threatened action implicit. English can preserve that terseness without importing 'to me,' which is often understood but not stated here. This keeps the translation closer to the source while remaining idiomatic.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve what the source text states without importing unstated claims.'
