id: 1SA.14.44
reference: 1 Samuel 14:44
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שָׁא֔וּל כֹּֽה יַעֲשֶׂ֥ה אֱלֹהִ֖ים וְ/כֹ֣ה יוֹסִ֑ף כִּֽי מ֥וֹת תָּמ֖וּת יוֹנָתָֽן־־׃
translation:
  text: And Saul said[a], “May God do so and more also, for you shall surely die, Jonathan.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew oath formula: literally, ''Thus may God do, and thus may he add.'' The object of the threatened action is left unstated in Hebrew.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard waw-consecutive narrative preterite; 'And' preserves Hebrew narrative flow without overinterpreting sequence.
- source_word: שָׁאוּל
  chosen: Saul
  rationale: Personal name is transliterated per translation philosophy.
- source_word: כֹּה יַעֲשֶׂה אֱלֹהִים וְכֹה יוֹסִף
  chosen: May God do so and more also
  alternatives:
  - Thus may God do, and thus may he add
  - May God do this and even more
  lexicon: HALOT
  rationale: This is a fixed oath/curse formula invoking divine judgment. 'May God do so and more also' is idiomatic, natural English that preserves the imprecatory force without supplying an unstated object of the curse.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the referent is the deity invoked in Saul's oath. 'God' is the natural singular English rendering despite the morphologically plural form.
- source_word: כִּי
  chosen: for
  alternatives:
  - indeed
  - surely
  lexicon: HALOT
  rationale: Introduces the content/ground of the oath declaration. 'For' best connects the curse formula with Saul's pronouncement against Jonathan.
- source_word: מוֹת תָּמוּת
  chosen: you shall surely die
  alternatives:
  - you will certainly die
  - dying you shall die
  lexicon: HALOT
  rationale: Infinitive absolute plus finite verb intensifies the certainty of death. 'You shall surely die' is a clear English equivalent that preserves the emphatic force.
- source_word: יוֹנָתָן
  chosen: Jonathan
  rationale: Personal name is transliterated by standard convention.
