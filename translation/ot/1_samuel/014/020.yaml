id: 1SA.14.20
reference: 1 Samuel 14:20
source:
  edition: WLC
  text: וַ/יִּזָּעֵ֣ק שָׁא֗וּל וְ/כָל הָ/עָם֙ אֲשֶׁ֣ר אִתּ֔/וֹ וַ/יָּבֹ֖אוּ עַד הַ/מִּלְחָמָ֑ה
    וְ/הִנֵּ֨ה הָיְתָ֜ה חֶ֤רֶב אִישׁ֙ בְּ/רֵעֵ֔/הוּ מְהוּמָ֖ה גְּדוֹלָ֥ה מְאֹֽד־־׃
translation:
  text: Then Saul and all the people who were with him were summoned, and they came
    to the battle. And behold, every man's sword was against his companion, with very
    great confusion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Then Saul and all the people who were with him cried out' or 'were called
      together.' The Hebrew verb can be understood in more than one way here.
    reason: lexical_alternative
  - marker: b
    text: Or 'a very great panic' or 'a very great tumult.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזָּעֵק
  chosen: were summoned
  alternatives:
  - cried out
  - were called together
  - raised the battle cry
  lexicon: HALOT
  rationale: 'The Niphal form of זעק here is best taken as passive/reflexive in context:
    Saul and his people are being mustered or called together in response to the tumult.
    ''Cried out'' is possible from the root''s common sense, but the plural subject
    that follows and the narrative flow toward mobilization favor ''were summoned''/''were
    called together.'''
- source_word: הָעָם אֲשֶׁר אִתּוֹ
  chosen: the people who were with him
  alternatives:
  - the troops with him
  - the men who were with him
  lexicon: HALOT
  rationale: עָם literally means 'people.' In military context it refers to Saul's
    force, but 'the people who were with him' preserves the Hebrew wording without
    over-specifying.
- source_word: וַיָּבֹאוּ עַד הַמִּלְחָמָה
  chosen: they came to the battle
  alternatives:
  - they entered the battle
  - they came as far as the battle
  lexicon: HALOT
  rationale: בוא + עד naturally means coming up to or reaching the battle scene. 'Came
    to the battle' is idiomatic and preserves the movement without overstating direct
    engagement.
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: הִנֵּה marks sudden attention to what Saul sees. 'And behold' preserves
    the narrative vividness better than flattening it.
- source_word: חֶרֶב אִישׁ בְּרֵעֵהוּ
  chosen: every man's sword was against his companion
  alternatives:
  - each man's sword was against his fellow
  - they were striking one another with the sword
  lexicon: HALOT
  rationale: Literally 'the sword of a man against his companion.' The idiom describes
    mutual fighting within the enemy camp. 'Companion' preserves רֵעַ without importing
    a warmer nuance like 'friend.'
- source_word: מְהוּמָה גְּדוֹלָה מְאֹד
  chosen: with very great confusion
  alternatives:
  - a very great panic
  - a very great tumult
  lexicon: HALOT
  rationale: מְהוּמָה can denote confusion, panic, or tumult. Here it describes chaotic
    internal disorder causing Philistine-on-Philistine violence. 'Very great confusion'
    best captures the broad sense while remaining natural English.
