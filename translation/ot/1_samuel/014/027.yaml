id: 1SA.14.27
reference: 1 Samuel 14:27
source:
  edition: WLC
  text: וְ/יוֹנָתָ֣ן לֹֽא שָׁמַ֗ע בְּ/הַשְׁבִּ֣יעַ אָבִי/ו֮ אֶת הָ/עָם֒ וַ/יִּשְׁלַ֗ח
    אֶת קְצֵ֤ה הַ/מַּטֶּה֙ אֲשֶׁ֣ר בְּ/יָד֔/וֹ וַ/יִּטְבֹּ֥ל אוֹתָ֖/הּ בְּ/יַעְרַ֣ת
    הַ/דְּבָ֑שׁ וַ/יָּ֤שֶׁב יָד/וֹ֙ אֶל פִּ֔י/ו ו/תראנה עֵינָֽי/ו־־־־׃
translation:
  text: But Jonathan had not heard when his father put the people under oath, so he
    stretched out the tip of the staff that was in his hand and dipped it into the
    honeycomb, and he brought his hand to his mouth, and his eyes brightened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'into the forest/thicket of honey'; the Hebrew expression
      likely refers to a honeycomb or dense mass of honey.
    reason: lexical_alternative
  - marker: b
    text: '''His eyes brightened'' is a Hebrew idiom indicating renewed strength or
      alertness after eating.'
    reason: cultural_note
lexical_decisions:
- source_word: שָׁמַע
  chosen: had not heard
  alternatives:
  - did not hear
  - had not listened
  lexicon: HALOT
  rationale: 'In context the verb refers to Jonathan''s lack of awareness of Saul''s
    oath, not disobedience. The pluperfect sense in English fits the narrative sequence:
    he had not heard at the time the oath was imposed.'
- source_word: בְּהַשְׁבִּיעַ
  chosen: when his father put the people under oath
  alternatives:
  - when his father adjured the people
  - when his father made the people swear
  lexicon: HALOT
  rationale: The Hiphil of שבע means to cause to swear, put under oath. 'Put the people
    under oath' is natural modern English and preserves the juridical force better
    than the archaic 'adjured.'
- source_word: וַיִּשְׁלַח
  chosen: he stretched out
  alternatives:
  - he sent out
  - he reached out
  lexicon: HALOT
  rationale: With 'the tip of the staff' as object, the idiom means extending or reaching
    out the staff, not literally sending it.
- source_word: קְצֵה הַמַּטֶּה
  chosen: the tip of the staff
  alternatives:
  - the end of the staff
  - the end of the rod
  lexicon: HALOT
  rationale: '''Tip'' is the most idiomatic English for the part of the staff used
    to dip into the honey. ''Staff'' is preferable to ''rod'' here as a handheld implement
    in narrative action.'
- source_word: וַיִּטְבֹּל אוֹתָהּ
  chosen: dipped it
  alternatives:
  - immersed it
  - dipped it in
  lexicon: HALOT
  rationale: The feminine pronoun refers back to the tip/end of the staff. English
    naturally renders the action as 'dipped it,' with the location supplied by the
    following phrase.
- source_word: בְּיַעְרַת הַדְּבָשׁ
  chosen: into the honeycomb
  alternatives:
  - into the forest of honey
  - into the honey
  lexicon: HALOT
  rationale: Although יערה is unusual and literally related to a thicket/forest image,
    in this context it denotes a mass or comb of honey. 'Honeycomb' best fits the
    action of dipping the staff-tip and matches the likely sense in context.
- source_word: וַיָּשֶׁב יָדוֹ אֶל פִּיו
  chosen: he brought his hand to his mouth
  alternatives:
  - he returned his hand to his mouth
  - he put it to his mouth
  lexicon: HALOT
  rationale: The idiom describes moving the honey-bearing hand/staff to eat. 'Brought
    his hand to his mouth' is clear and sufficiently literal.
- source_word: וַתָּרְאֶנָה עֵינָיו
  chosen: his eyes brightened
  alternatives:
  - his eyes became bright
  - his eyes were enlightened
  lexicon: HALOT
  rationale: The expression is idiomatic for renewed vigor or revived strength after
    eating. 'His eyes brightened' preserves the imagery without overinterpreting it
    medically or spiritually.
