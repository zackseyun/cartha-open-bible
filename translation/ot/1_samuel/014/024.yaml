id: 1SA.14.24
reference: 1 Samuel 14:24
source:
  edition: WLC
  text: וְ/אִֽישׁ יִשְׂרָאֵ֥ל נִגַּ֖שׂ בַּ/יּ֣וֹם הַ/ה֑וּא וַ/יֹּאֶל֩ שָׁא֨וּל אֶת
    הָ/עָ֜ם לֵ/אמֹ֗ר אָר֣וּר הָ֠/אִישׁ אֲשֶׁר יֹ֨אכַל לֶ֜חֶם עַד הָ/עֶ֗רֶב וְ/נִקַּמְתִּי֙
    מֵ/אֹ֣יְבַ֔/י וְ/לֹֽא טָעַ֥ם כָּל הָ/עָ֖ם לָֽחֶם־־־־־׃ס
translation:
  text: Now the men of Israel were hard-pressed that day, and Saul put the people
    under an oath, saying, “Cursed is the man who eats food before evening, before
    I have avenged myself on my enemies.” So none of the people tasted food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'bread' in both occurrences; here it likely means food generally,
      not bread specifically.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִגַּשׂ
  chosen: were hard-pressed
  alternatives:
  - drew near
  - approached
  - were pressed
  lexicon: HALOT
  rationale: In this context the Niphal is best taken idiomatically of being under
    pressure/distress rather than spatial approach. This fits the narrative consequence
    of Saul's rash oath and the following statement that the people did not eat.
- source_word: וַיֹּאֶל
  chosen: bound ... under an oath
  alternatives:
  - adjured
  - made swear
  - began/was willing
  lexicon: HALOT
  rationale: The verb here carries the sense of imposing an oath/curse on the people,
    as shown by the direct speech beginning with אָרוּר. 'Bound ... under an oath'
    is clear modern English and preserves the coercive force better than the archaic
    'adjured.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the troops
  lexicon: HALOT
  rationale: The Hebrew is the common term 'people.' In this military setting it refers
    to Saul's fighting force, but 'the people' preserves the source wording while
    remaining natural.
- source_word: אָרוּר הָאִישׁ
  chosen: Cursed is the man
  alternatives:
  - Accursed is the man
  - May the man be cursed
  lexicon: HALOT
  rationale: This reproduces the formal curse declaration straightforwardly. 'The
    man' reflects the singular generic masculine in keeping with the project's gender-accurate
    policy.
- source_word: יֹאכַל לֶחֶם
  chosen: eats food
  alternatives:
  - eats bread
  lexicon: HALOT
  rationale: Although לֶחֶם is literally 'bread,' in idiom it commonly means food
    in general. Since the prohibition concerns eating before battle's end, 'food'
    better conveys the sense in contemporary English.
- source_word: עַד הָעֶרֶב
  chosen: before evening
  alternatives:
  - until evening
  lexicon: HALOT
  rationale: With the curse formula and English idiom, 'before evening' reads naturally
    and matches the temporal limit of the oath.
- source_word: וְנִקַּמְתִּי מֵאֹיְבַי
  chosen: before I have avenged myself on my enemies
  alternatives:
  - and I have taken vengeance on my enemies
  - until I avenge myself on my enemies
  lexicon: HALOT
  rationale: The clause expresses Saul's stated goal prior to eating. Rendering it
    with 'before I have...' makes the temporal relation explicit in English while
    preserving the first-person singular and the personal tone of vengeance.
- source_word: לֹא טָעַם ... לָחֶם
  chosen: none of the people tasted food
  alternatives:
  - all the people did not taste bread
  - none of the troops ate bread
  lexicon: HALOT
  rationale: '''Taste'' is retained from the Hebrew for vividness, while ''food''
    again reflects the idiomatic sense of לֶחֶם. ''None of the people'' is idiomatic
    English for the Hebrew negated collective.'
