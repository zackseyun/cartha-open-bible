id: 1SA.14.22
reference: 1 Samuel 14:22
source:
  edition: WLC
  text: וְ/כֹל֩ אִ֨ישׁ יִשְׂרָאֵ֜ל הַ/מִּֽתְחַבְּאִ֤ים בְּ/הַר אֶפְרַ֨יִם֙ שָֽׁמְע֔וּ כִּֽי נָ֖סוּ פְּלִשְׁתִּ֑ים וַֽ/יַּדְבְּק֥וּ גַם הֵ֛מָּה אַחֲרֵי/הֶ֖ם בַּ/מִּלְחָמָֽה־־־׃
translation:
  text: And all the men of Israel who had hidden themselves in the hill country of Ephraim heard that the Philistines had fled[a], and they too closely pursued them in the battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'and they clung after them in the battle,' an idiom meaning they closely pursued the fleeing Philistines.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל אִישׁ יִשְׂרָאֵל
  chosen: And every man of Israel
  alternatives:
  - And all the men of Israel
  - And every Israelite
  lexicon: HALOT
  rationale: The singular collective אִישׁ with כֹל is naturally rendered distributively as 'every man.' This preserves the masculine/gender-accurate form of the Hebrew while functioning collectively in context. 'Every Israelite' is smoother but loses the explicit 'man' wording of the source.
- source_word: הַמִּתְחַבְּאִים
  chosen: who had hidden themselves
  alternatives:
  - who were hiding
  - who had been hiding
  lexicon: HALOT
  rationale: The participle describes the Israelites as those in a state of having concealed themselves. 'Had hidden themselves' fits the narrative retrospectively and reads naturally in English. 'Were hiding' is possible but slightly less aligned with the shift to the subsequent perfect 'heard'.
- source_word: בְּהַר אֶפְרַיִם
  chosen: in the hill country of Ephraim
  alternatives:
  - in Mount Ephraim
  - in the mountains of Ephraim
  lexicon: HALOT
  rationale: הַר here refers to the highland region, not a single peak. 'Hill country of Ephraim' is the standard geographic sense and best conveys the locale in idiomatic modern English.
- source_word: שָׁמְעוּ כִּי נָסוּ פְּלִשְׁתִּים
  chosen: heard that the Philistines had fled
  alternatives:
  - heard that the Philistines were fleeing
  - heard that the Philistines fled
  lexicon: HALOT
  rationale: 'The clause reports what they learned: the Philistines had already turned in flight. English past perfect clarifies the sequence relative to ''heard.'''
- source_word: וַיַּדְבְּקוּ
  chosen: joined the pursuit
  alternatives:
  - followed hard after
  - pressed after
  - clung to
  lexicon: HALOT
  rationale: The verb דבק literally means 'cling/cleave,' but in military context with אַחֲרֵי it idiomatically conveys close pursuit. 'Joined the pursuit' communicates the sense clearly in modern English without wooden literalism. 'Followed hard after' is more formal but less natural.
- source_word: גַם הֵמָּה
  chosen: they too
  alternatives:
  - they also
  - even they
  lexicon: HALOT
  rationale: This phrase marks these previously hidden Israelites as now participating along with others. 'They too' is concise and natural.
- source_word: אַחֲרֵיהֶם
  chosen: the pursuit
  alternatives:
  - after them
  - behind them
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'after them,' referring to the fleeing Philistines. In English, incorporating the object into the idiom 'joined the pursuit' avoids awkward repetition while preserving the sense.
- source_word: בַּמִּלְחָמָה
  chosen: in the battle
  alternatives:
  - in the fighting
  - in the war
  lexicon: HALOT
  rationale: The noun denotes the ongoing combat engagement here rather than a whole war. 'In the battle' preserves the concrete military setting.
