id: 1SA.14.5
reference: 1 Samuel 14:5
source:
  edition: WLC
  text: הַ/שֵּׁ֧ן הָ/אֶחָ֛ד מָצ֥וּק מִ/צָּפ֖וֹן מ֣וּל מִכְמָ֑שׂ וְ/הָ/אֶחָ֥ד מִ/נֶּ֖גֶב
    מ֥וּל גָּֽבַע׃ס
translation:
  text: One crag stood on the north, opposite Michmash, and the other on the south,
    opposite Geba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally says 'the tooth,' a metaphor for a sharp rocky projection;
      hence 'crag.'
    reason: lexical_alternative
  - marker: b
    text: Some English translations read 'Gibeah' here, but the Hebrew place name
      is Geba.
    reason: alternative_reading
lexical_decisions:
- source_word: הַשֵּׁן
  chosen: crag
  alternatives:
  - tooth
  - rocky crag
  - cliff
  lexicon: HALOT
  rationale: Literally 'tooth,' but in this topographical context it refers metaphorically
    to a sharp rocky projection or crag. 'Crag' gives the natural English sense without
    flattening the imagery too far.
- source_word: הָאֶחָד
  chosen: one
  alternatives:
  - the one
  lexicon: HALOT
  rationale: 'Used distributively with the repeated phrase to distinguish the two
    rocky projections: ''one ... and the other.'' English idiom prefers ''one'' here.'
- source_word: מָצוּק
  chosen: stood
  alternatives:
  - was constrained
  - was narrow
  - was steep
  - was fixed
  lexicon: HALOT
  rationale: The noun/adjectival form conveys a steep, prominent, or constrained rocky
    formation. In context, the clause describes the position of the crag. Rendering
    the sense with 'stood' produces natural English while preserving the topographical
    description implied by the Hebrew.
- source_word: מִצָּפוֹן
  chosen: on the north
  alternatives:
  - from the north
  - to the north
  - northward
  lexicon: HALOT
  rationale: The preposition with 'north' marks location relative to the pass. 'On
    the north' is idiomatic in English for the side occupied by the crag.
- source_word: מוּל
  chosen: opposite
  alternatives:
  - facing
  - in front of
  lexicon: HALOT
  rationale: The term indicates spatial correspondence or facing position. 'Opposite'
    is concise and clear in geographic description.
- source_word: מִכְמָשׂ
  chosen: Michmash
  alternatives:
  - Mikmash
  rationale: Standard English transliteration of the place name.
- source_word: וְהָאֶחָד
  chosen: and the other
  alternatives:
  - and one
  - and the one
  lexicon: HALOT
  rationale: The repeated distributive structure is best rendered idiomatically as
    'and the other.'
- source_word: מִנֶּגֶב
  chosen: on the south
  alternatives:
  - from the south
  - to the south
  - southward
  lexicon: HALOT
  rationale: Here נגב functions as the southern side/direction in contrast to north.
    'On the south' matches the parallel structure and geographic sense.
- source_word: גָּבַע
  chosen: Geba
  alternatives:
  - Gibeah
  rationale: The consonantal form and context support the place name 'Geba,' not 'Gibeah.'
    This distinction matters geographically in the narrative.
