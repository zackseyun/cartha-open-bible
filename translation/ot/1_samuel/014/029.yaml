id: 1SA.14.29
reference: 1 Samuel 14:29
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ יֽוֹנָתָ֔ן עָכַ֥ר אָבִ֖/י אֶת הָ/אָ֑רֶץ רְאוּ נָא֙ כִּֽי אֹ֣רוּ
    עֵינַ֔/י כִּ֣י טָעַ֔מְתִּי מְעַ֖ט דְּבַ֥שׁ הַ/זֶּֽה־־־׃
translation:
  text: Then Jonathan said, “My father has troubled the land. See, please, how my
    eyes have brightened because I tasted a little of this honey.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''my eyes have brightened,'' expressing renewed strength
      or alertness after eating.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָכַר
  chosen: has brought trouble on
  alternatives:
  - has troubled
  - has brought disaster on
  lexicon: HALOT
  rationale: The verb means to trouble, disturb, or bring calamity. 'Has brought trouble
    on' is natural modern English and preserves the causative sense directed toward
    'the land.'
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In this narrative context, 'the land' is the most direct rendering and
    can refer to the people/region affected by Saul's oath. 'Country' is possible
    but less textually anchored.
- source_word: רְאוּ נָא
  chosen: See, please
  alternatives:
  - Look now
  - See now
  lexicon: HALOT
  rationale: Imperative plus particle נָא gives an appeal for attention. 'See, please'
    preserves both the command and the softening particle without sounding archaic.
- source_word: אֹרוּ עֵינַי
  chosen: my eyes have brightened
  alternatives:
  - my eyes have become clear
  - my eyes are enlightened
  lexicon: HALOT
  rationale: This Hebrew idiom refers to renewed vitality or alertness. 'Have brightened'
    keeps the eye-language while communicating restored energy after eating.
- source_word: טָעַמְתִּי
  chosen: I tasted
  alternatives:
  - I ate
  - I sampled
  lexicon: HALOT
  rationale: The verb specifically means 'taste.' Since the text emphasizes the small
    amount consumed, 'tasted' is preferable to the broader 'ate.'
- source_word: מְעַט
  chosen: a little
  alternatives:
  - a small amount of
  - a bit of
  lexicon: HALOT
  rationale: This straightforwardly denotes a small quantity. 'A little' is idiomatic
    and concise.
- source_word: דְּבַשׁ הַזֶּה
  chosen: this honey
  alternatives:
  - this honeycomb
  - some of this honey
  lexicon: HALOT
  rationale: The noun is 'honey,' not explicitly 'honeycomb' in this verse. 'This
    honey' reflects the demonstrative and stays close to the source.
