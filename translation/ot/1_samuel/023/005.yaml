id: 1SA.23.5
reference: 1 Samuel 23:5
source:
  edition: WLC
  text: וַ/יֵּ֣לֶךְ דָּוִד֩ ו/אנש/ו קְעִילָ֜ה וַ/יִּלָּ֣חֶם בַּ/פְּלִשְׁתִּ֗ים וַ/יִּנְהַג֙ אֶת מִקְנֵי/הֶ֔ם וַ/יַּ֥ךְ בָּ/הֶ֖ם מַכָּ֣ה גְדוֹלָ֑ה וַ/יֹּ֣שַׁע דָּוִ֔ד אֵ֖ת יֹשְׁבֵ֥י קְעִילָֽה־׃ס
translation:
  text: So David and his men went to Keilah and fought against the Philistines[a], and he drove off their livestock and struck them with a great blow[c][b]. So David saved the inhabitants of Keilah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he drove off their cattle'; the Hebrew term refers broadly to livestock.
    reason: lexical_alternative
  - marker: b
    text: Or 'struck them with a severe defeat' or 'dealt them a great slaughter.'
    reason: lexical_alternative
  - marker: c
    text: Or 'delivered' or 'rescued' the inhabitants of Keilah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - went out
  - came
  lexicon: HALOT
  rationale: הלך in the wayyiqtol narrative sequence is most naturally rendered 'went.' 'Went out' is possible in military context, but the destination 'to Keilah' already supplies the movement clearly.
- source_word: וַאֲנָשׁוֹ
  chosen: his men
  alternatives:
  - his people
  lexicon: HALOT
  rationale: אֲנָשִׁים here refers to David's fighting band/companions, not people in a generic sense. 'His men' is the natural military-context rendering.
- source_word: קְעִילָה
  chosen: Keilah
  rationale: Proper place name; transliterated per translation philosophy.
- source_word: וַיִּלָּחֶם בַּפְּלִשְׁתִּים
  chosen: fought against the Philistines
  alternatives:
  - fought with the Philistines
  lexicon: HALOT
  rationale: The verb לחם with ב marks combat against an opponent in this context. English 'fought against' avoids ambiguity that 'fought with' could suggest alliance.
- source_word: וַיִּנְהַג אֶת־מִקְנֵיהֶם
  chosen: he drove away their livestock
  alternatives:
  - he drove off their cattle
  - he led away their livestock
  lexicon: HALOT
  rationale: נהג can mean drive/lead, especially of animals. מִקְנֶה denotes livestock rather than only cattle. 'Drove away' captures seizure/removal in a raid context with idiomatic English.
- source_word: מִקְנֵיהֶם
  chosen: their livestock
  alternatives:
  - their cattle
  - their herds
  lexicon: HALOT
  rationale: מִקְנֶה is a collective term for livestock/property in animals. 'Livestock' is broader and more precise than 'cattle.'
- source_word: וַיַּךְ בָּהֶם מַכָּה גְדוֹלָה
  chosen: struck them with a great blow
  alternatives:
  - dealt them a great slaughter
  - struck them with a severe defeat
  lexicon: HALOT
  rationale: נכה plus מַכָּה yields an idiom of inflicting a blow/defeat. 'Great blow' preserves the Hebrew imagery without over-specifying body count. 'Slaughter' is possible but stronger than the text explicitly requires.
- source_word: וַיֹּשַׁע
  chosen: saved
  alternatives:
  - delivered
  - rescued
  lexicon: HALOT
  rationale: ישע in this military context means to save/deliver from danger. 'Saved' is the most direct and broadly understandable rendering; 'delivered' is a viable alternative but slightly less natural in contemporary English.
- source_word: יֹשְׁבֵי קְעִילָה
  chosen: the inhabitants of Keilah
  alternatives:
  - those living in Keilah
  - the residents of Keilah
  lexicon: HALOT
  rationale: The participial construction literally means 'those dwelling in Keilah.' 'Inhabitants' is concise, natural, and faithful.
