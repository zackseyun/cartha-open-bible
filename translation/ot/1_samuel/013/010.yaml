id: 1SA.13.10
reference: 1 Samuel 13:10
source:
  edition: WLC
  text: וַ/יְהִ֗י כְּ/כַלֹּת/וֹ֙ לְ/הַעֲל֣וֹת הָ/עֹלָ֔ה וְ/הִנֵּ֥ה שְׁמוּאֵ֖ל בָּ֑א וַ/יֵּצֵ֥א שָׁא֛וּל לִ/קְרָאת֖/וֹ לְ/בָרֲכֽ/וֹ׃
translation:
  text: And it happened[a], as soon as he had finished offering up the burnt offering, that behold, Samuel came. And Saul went out to meet him, to bless him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to greet him' / 'to salute him.' The Hebrew verb literally means 'to bless,' but in this meeting context it may function as a formal greeting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing the next event. 'And it happened' preserves the Hebrew discourse function without archaic English.
- source_word: כְּכַלֹּתוֹ
  chosen: as soon as he had finished
  alternatives:
  - when he finished
  - as he finished
  lexicon: HALOT
  rationale: The preposition כ plus infinitive construct with suffix marks temporal sequence; in context it conveys immediacy at the completion of Saul's action.
- source_word: לְהַעֲלוֹת
  chosen: offering up
  alternatives:
  - to offer
  - to bring up
  lexicon: HALOT
  rationale: Hiphil of עלה with sacrificial object commonly means 'offer up.' This keeps the sacrificial nuance rather than the more generic 'offer' alone.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the whole burnt offering
  lexicon: HALOT
  rationale: Technical sacrificial term עֹלָה. 'Burnt offering' is the standard clear English rendering.
- source_word: וְהִנֵּה
  chosen: that behold
  alternatives:
  - and behold
  - and look
  lexicon: HALOT
  rationale: הִנֵּה marks suddenness and vividness. Rendering it with 'behold' preserves the narrative surprise of Samuel's arrival.
- source_word: בָּא
  chosen: came
  alternatives:
  - was coming
  - arrived
  lexicon: HALOT
  rationale: Qal perfect after הִנֵּה in narrative reports the event vividly; 'came' is natural and sufficiently direct.
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - came out
  lexicon: HALOT
  rationale: Literal movement outward. 'Went out' fits the scene and preserves the directional sense.
- source_word: לִקְרָאתוֹ
  chosen: to meet him
  alternatives:
  - to meet with him
  - to go toward him
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression for going out in order to meet someone.
- source_word: לְבָרֲכוֹ
  chosen: to bless him
  alternatives:
  - to greet him
  - to salute him
  lexicon: HALOT
  rationale: The verb ברך literally means 'bless.' In meeting contexts it can overlap with greeting, but 'bless him' best preserves the lexical form and leaves the exact social nuance to the reader.
