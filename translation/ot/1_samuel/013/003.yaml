id: 1SA.13.3
reference: 1 Samuel 13:3
source:
  edition: WLC
  text: וַ/יַּ֣ךְ יוֹנָתָ֗ן אֵ֣ת נְצִ֤יב פְּלִשְׁתִּים֙ אֲשֶׁ֣ר בְּ/גֶ֔בַע וַֽ/יִּשְׁמְע֖וּ פְּלִשְׁתִּ֑ים וְ/שָׁאוּל֩ תָּקַ֨ע בַּ/שּׁוֹפָ֤ר בְּ/כָל הָ/אָ֨רֶץ֙ לֵ/אמֹ֔ר יִשְׁמְע֖וּ הָ/עִבְרִֽים־׃
translation:
  text: Jonathan struck down the Philistine garrison that was at Geba[a], and the Philistines heard of it. Then Saul blew the ram's horn throughout all the land, saying[b], “Let the Hebrews hear!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Philistine prefect/governor'; the Hebrew term can denote either an official or a stationed military post. In this context, 'garrison' best fits the battle setting.
    reason: lexical_alternative
  - marker: b
    text: Or 'blew the trumpet'; Hebrew shofar refers specifically to a horn, traditionally a ram's horn.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּךְ
  chosen: struck down
  alternatives:
  - attacked
  - defeated
  - killed
  lexicon: HALOT
  rationale: נכה commonly means to strike/smite, often with lethal or decisive force. 'Struck down' preserves the military action without overcommitting to whether the object is an individual or a military post.
- source_word: נְצִיב פְּלִשְׁתִּים
  chosen: the Philistine garrison
  alternatives:
  - the Philistine prefect
  - the Philistine governor
  - the Philistine pillar/outpost
  lexicon: HALOT
  rationale: נְצִיב can denote an official or a stationed post/garrison. In this military context, and especially in light of 1 Samuel 10:5 and the surrounding battle narrative, 'garrison' best fits the plain sense. Because the term is debated, alternatives are preserved in a footnote.
- source_word: בְּגֶבַע
  chosen: at Geba
  alternatives:
  - in Geba
  lexicon: HALOT
  rationale: The place name is Geba. 'At' is idiomatic English for a military location and avoids overprecision about whether the action occurred inside the settlement proper.
- source_word: וַיִּשְׁמְעוּ פְּלִשְׁתִּים
  chosen: the Philistines heard of it
  alternatives:
  - the Philistines heard
  - the Philistines came to hear
  lexicon: HALOT
  rationale: The Hebrew literally says 'the Philistines heard.' English normally supplies the implied object in this context; 'of it' makes the sense clear without adding interpretive content beyond the idiom.
- source_word: תָּקַע בַּשּׁוֹפָר
  chosen: blew the ram's horn
  alternatives:
  - blew the trumpet
  - sounded the horn
  lexicon: HALOT
  rationale: שׁוֹפָר specifically denotes a horn, commonly a ram's horn, not a metal trumpet. This rendering preserves the cultural concreteness of the Hebrew term.
- source_word: בְּכָל הָאָרֶץ
  chosen: throughout all the land
  alternatives:
  - throughout the whole land
  - in all the land
  lexicon: HALOT
  rationale: הָאָרֶץ here refers to the land/territory rather than the whole earth. 'Throughout all the land' conveys the nationwide proclamation.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - proclaiming
  - with the message
  lexicon: HALOT
  rationale: Standard rendering of the infinitive introducing direct speech. 'Saying' is simple and transparent.
- source_word: יִשְׁמְעוּ הָעִבְרִים
  chosen: Let the Hebrews hear!
  alternatives:
  - May the Hebrews hear
  - The Hebrews must hear
  - Let the Hebrews listen
  lexicon: HALOT
  rationale: The imperfect here functions jussively in reported proclamation. 'Let the Hebrews hear!' captures the force of a public summons. 'Hebrews' is retained because that is the source term, not 'Israelites.'
