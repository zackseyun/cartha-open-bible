id: 1SA.13.8
reference: 1 Samuel 13:8
source:
  edition: WLC
  text: ו/ייחל שִׁבְעַ֣ת יָמִ֗ים לַ/מּוֹעֵד֙ אֲשֶׁ֣ר שְׁמוּאֵ֔ל וְ/לֹא בָ֥א שְׁמוּאֵ֖ל הַ/גִּלְגָּ֑ל וַ/יָּ֥פֶץ הָ/עָ֖ם מֵ/עָלָֽי/ו׀־׃
translation:
  text: He waited seven days[a], until the appointed time that Samuel had set, but Samuel did not come to Gilgal[b], and the people were scattering from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until the appointed time that Samuel had appointed.' The Hebrew relative clause is compressed, and English must supply the implied sense.
    reason: lexical_alternative
  - marker: b
    text: That is, the people were slipping away from Saul.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּיחֶל
  chosen: He waited
  alternatives:
  - He delayed
  - He hoped
  lexicon: HALOT
  rationale: In context the verb denotes waiting over a period of time, not hoping in the abstract. 'He waited' fits the following time expression ('seven days') and the narrative situation.
- source_word: שִׁבְעַת יָמִים
  chosen: seven days
  lexicon: HALOT
  rationale: Straightforward cardinal-plus-noun expression indicating the duration of Saul's waiting.
- source_word: לַמּוֹעֵד
  chosen: for the appointed time
  alternatives:
  - until the appointed time
  - for the set time
  lexicon: HALOT
  rationale: מוֹעֵד commonly means an appointed time or fixed meeting time. 'For the appointed time' preserves the sense that the seven-day waiting corresponded to a previously designated time.
- source_word: אֲשֶׁר שְׁמוּאֵל
  chosen: that Samuel had set
  alternatives:
  - that Samuel appointed
  - of which Samuel spoke
  lexicon: HALOT
  rationale: The relative clause is elliptical in Hebrew. Given the broader context (cf. the prior instruction about waiting seven days), English requires supplying the implied idea of Samuel's prior appointment. 'Had set' is concise and natural.
- source_word: וְלֹא בָא שְׁמוּאֵל הַגִּלְגָּל
  chosen: but Samuel did not come to Gilgal
  alternatives:
  - and Samuel had not come to Gilgal
  lexicon: HALOT
  rationale: The clause marks the failure of Samuel's arrival at the expected place. 'But' brings out the adversative force in context, though the Hebrew conjunction is formally 'and.'
- source_word: וַיָּפֶץ הָעָם
  chosen: and the people were scattering
  alternatives:
  - and the people scattered
  - and the people were dispersed
  lexicon: HALOT
  rationale: The verb conveys dispersal. The progressive English form reflects the narrative sense that the troops were in the process of slipping away under pressure, not merely a completed single act.
- source_word: מֵעָלָיו
  chosen: from him
  alternatives:
  - away from him
  - from Saul
  lexicon: HALOT
  rationale: The pronominal suffix most naturally refers to Saul in context. 'From him' preserves the Hebrew wording, while the antecedent remains clear from the narrative.
