id: 1SA.13.6
reference: 1 Samuel 13:6
source:
  edition: WLC
  text: וְ/אִ֨ישׁ יִשְׂרָאֵ֤ל רָאוּ֙ כִּ֣י צַר ל֔/וֹ כִּ֥י נִגַּ֖שׂ הָ/עָ֑ם וַ/יִּֽתְחַבְּא֣וּ
    הָ/עָ֗ם בַּ/מְּעָר֤וֹת וּ/בַֽ/חֲוָחִים֙ וּ/בַ/סְּלָעִ֔ים וּ/בַ/צְּרִחִ֖ים וּ/בַ/בֹּרֽוֹת־׃
translation:
  text: When the men of Israel saw that they were in trouble, because the people were
    hard pressed, the people hid themselves in caves, in thickets, among rocks, in
    cellars, and in pits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among thornbushes' for 'in thickets'; the Hebrew term is rare and may
      refer specifically to thorny brush.
    reason: lexical_alternative
  - marker: b
    text: Or 'in underground chambers' or 'in holes' for 'in cellars'; the Hebrew
      term is uncertain and may refer to subterranean hiding places.
    reason: lexical_alternative
  - marker: c
    text: Or 'in cisterns' for 'in pits.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ יִשְׂרָאֵל
  chosen: the men of Israel
  alternatives:
  - each man of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Although אִישׁ is singular in form, with the collective sense plus the
    plural verb רָאוּ it functions distributively/collectively. 'The men of Israel'
    preserves the masculine/gender-accurate force better than the more neutral 'Israelites,'
    while avoiding the awkwardly literal 'each man of Israel.'
- source_word: רָאוּ
  chosen: saw
  alternatives:
  - realized
  lexicon: HALOT
  rationale: The basic sense is visual/perceptive 'saw.' In context it includes recognition
    of their plight, but 'saw' preserves the Hebrew wording and lets the following
    clause explain what they perceived.
- source_word: כִּי צַר לוֹ
  chosen: that they were in trouble
  alternatives:
  - that it was distressing for him
  - that he was in distress
  lexicon: HALOT
  rationale: The Hebrew is syntactically compressed and somewhat difficult, with singular
    צַר לוֹ after a collective subject. English naturally expresses the collective
    sense with plural 'they were in trouble.' This captures the idiomatic force of
    distress without over-literal singular pronouns.
- source_word: כִּי נִגַּשׂ הָעָם
  chosen: because the people were hard pressed
  alternatives:
  - because the people were oppressed
  - because the army was under pressure
  lexicon: HALOT
  rationale: נגשׂ in the Niphal conveys being pressed, driven, or oppressed. 'Hard
    pressed' is idiomatic modern English and fits the military-panic context. The
    repeated הָעָם likely refers to the Israelite force collectively, not humanity
    in general.
- source_word: וַיִּתְחַבְּאוּ
  chosen: hid themselves
  alternatives:
  - took cover
  - went into hiding
  lexicon: HALOT
  rationale: The Hitpael/reflexive nuance is well represented by 'hid themselves.'
    It is more textually transparent than the more interpretive 'took cover.'
- source_word: בַּמְּעָרוֹת
  chosen: in caves
  alternatives:
  - in caverns
  lexicon: HALOT
  rationale: מְעָרָה is straightforwardly 'cave.' 'Caves' is the standard and natural
    rendering.
- source_word: וּבַחֲוָחִים
  chosen: in thickets
  alternatives:
  - among thornbushes
  - in brambles
  lexicon: HALOT
  rationale: This rare term is commonly understood as thorny growth or brush. 'Thickets'
    is readable and broad enough to cover the likely sense; the more specific 'thornbushes'
    is worth preserving in a footnote because of the lexical uncertainty.
- source_word: וּבַסְּלָעִים
  chosen: among rocks
  alternatives:
  - in crags
  - among cliffs
  lexicon: HALOT
  rationale: סֶלַע denotes rock/cliff/crag. 'Among rocks' is natural English in a
    list of hiding places and avoids over-specifying topography.
- source_word: וּבַצְּרִחִים
  chosen: in cellars
  alternatives:
  - in holes
  - in underground chambers
  - in strongholds
  lexicon: HALOT
  rationale: This is a difficult and rare term. Many understand it as underground
    storage places, vaults, or cellars/cistern-like recesses. 'Cellars' gives a plausible
    concrete hiding place in modern English while signaling a distinct location from
    the following 'pits.' Because of uncertainty, alternatives should be preserved
    in a footnote.
- source_word: וּבַבֹּרוֹת
  chosen: in pits
  alternatives:
  - in cisterns
  - in wells
  lexicon: HALOT
  rationale: בּוֹר commonly denotes a pit, cistern, or well-like excavation. 'Pits'
    is the broadest rendering and avoids implying water storage where the context
    only requires a hole used for hiding. 'Cisterns' is a viable lexical alternative
    worth noting.
