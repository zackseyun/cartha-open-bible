id: 1SA.13.23
reference: 1 Samuel 13:23
source:
  edition: WLC
  text: וַ/יֵּצֵא֙ מַצַּ֣ב פְּלִשְׁתִּ֔ים אֶֽל מַעֲבַ֖ר מִכְמָֽשׂ־׃ס
translation:
  text: And a garrison of the Philistines went out to the pass of Michmash[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an outpost of the Philistines went out to the crossing of Michmash.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - came out
  - advanced
  lexicon: HALOT
  rationale: The wayyiqtol of יצא normally denotes movement outward or forth. 'Went out' is the most natural narrative rendering in English and preserves the simple verbal sense without overinterpreting military nuance.
- source_word: מַצַּב
  chosen: garrison
  alternatives:
  - outpost
  - station
  - detachment
  lexicon: HALOT
  rationale: In this military context, מַצַּב refers to a stationed military force or post. 'Garrison' is a standard and concise English equivalent, though 'outpost' is also possible. The singular is retained as in Hebrew.
- source_word: פְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard rendering of the people group name. The construct relationship with מַצַּב is expressed naturally in English as 'a garrison of the Philistines.'
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks direction. 'To' is the most straightforward rendering; 'toward' is possible but less definite.
- source_word: מַעֲבַר
  chosen: the pass
  alternatives:
  - the crossing
  - the defile
  lexicon: HALOT
  rationale: The noun denotes a place of passage or crossing. Given the topography around Michmash in this military narrative, 'the pass' best fits idiomatic English and the likely geographic sense.
- source_word: מִכְמָשׂ
  chosen: Michmash
  alternatives:
  - Mikmash
  lexicon: HALOT
  rationale: Standard English transliteration of the place name, following the translation philosophy to transliterate names by standard conventions.
