id: 1SA.13.4
reference: 1 Samuel 13:4
source:
  edition: WLC
  text: וְ/כָל יִשְׂרָאֵ֞ל שָׁמְע֣וּ לֵ/אמֹ֗ר הִכָּ֤ה שָׁאוּל֙ אֶת נְצִ֣יב פְּלִשְׁתִּ֔ים
    וְ/גַם נִבְאַשׁ יִשְׂרָאֵ֖ל בַּ/פְּלִשְׁתִּ֑ים וַ/יִּצָּעֲק֥וּ הָ/עָ֛ם אַחֲרֵ֥י
    שָׁא֖וּל הַ/גִּלְגָּֽל־־־׃
translation:
  text: And all Israel heard it said, “Saul has struck down the Philistine garrison,
    and Israel has also become odious to the Philistines.” Then the people were called
    out to join Saul at Gilgal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Philistine prefect/governor” or “the Philistine outpost.” The Hebrew
      term can refer either to an official or to a stationed garrison; the military
      context favors “garrison.”
    reason: lexical_alternative
  - marker: b
    text: Literally “Israel had become a stench to the Philistines,” an idiom meaning
      Israel had become detestable or odious to them.
    reason: lexical_alternative
  - marker: c
    text: Or “the people were called together after Saul at Gilgal.” The Hebrew expression
      likely refers to mustering the people to follow Saul in battle.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְעוּ לֵאמֹר
  chosen: heard it said
  alternatives:
  - heard, saying
  - heard the report
  lexicon: HALOT
  rationale: The idiom combines 'heard' with an infinitive of saying to introduce
    reported news. 'Heard it said' preserves the report formula in natural English
    without over-paraphrasing.
- source_word: הִכָּה
  chosen: has struck down
  alternatives:
  - struck
  - defeated
  - attacked
  lexicon: HALOT
  rationale: The verb נכה commonly means 'strike' or 'smite'; in military context
    'struck down' is idiomatic and suitably forceful. Present perfect fits the reported-speech
    context in English.
- source_word: נְצִיב פְּלִשְׁתִּים
  chosen: the Philistine garrison
  alternatives:
  - the Philistine prefect
  - the Philistine governor
  - the Philistine outpost
  lexicon: HALOT
  rationale: נְצִיב can denote an official or a stationed military post depending
    on context. Given the military setting and the parallel in the surrounding narrative,
    'garrison' best fits here. The singular collective sense is retained.
- source_word: נִבְאַשׁ
  chosen: has become odious
  alternatives:
  - has become abhorrent
  - has become a stench
  - has become hated
  lexicon: HALOT
  rationale: The Niphal of באש literally evokes becoming foul-smelling, metaphorically
    becoming detestable. 'Become odious' preserves the metaphorical hostility without
    sounding wooden; the more literal 'a stench' is viable but less natural in this
    clause.
- source_word: בַּפְּלִשְׁתִּים
  chosen: to the Philistines
  alternatives:
  - among the Philistines
  - with the Philistines
  - in the eyes of the Philistines
  lexicon: HALOT
  rationale: The preposition with this verb marks relation to those who now regard
    Israel as detestable. 'To the Philistines' is concise and idiomatic; 'in the eyes
    of' is interpretive and therefore left as an alternative.
- source_word: וַיִּצָּעֲקוּ
  chosen: were summoned to join
  alternatives:
  - were called together after
  - cried out after
  - were mustered behind
  lexicon: HALOT
  rationale: Though the root often means 'cry out,' in this military context with
    אַחֲרֵי it refers to rallying or calling troops together behind a leader. A passive
    English rendering communicates the sense that the people were called up for mobilization.
- source_word: אַחֲרֵי שָׁאוּל
  chosen: to join Saul
  alternatives:
  - after Saul
  - behind Saul
  lexicon: HALOT
  rationale: Literally 'after Saul,' but in context it denotes following him in military
    assembly. 'To join Saul' expresses the functional sense in clear English while
    avoiding a misleading temporal reading.
- source_word: הַגִּלְגָּל
  chosen: at Gilgal
  alternatives:
  - to Gilgal
  lexicon: HALOT
  rationale: English idiom with assembly location favors 'at Gilgal.' The Hebrew place
    name is transliterated per project policy.
