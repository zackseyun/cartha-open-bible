id: 1SA.13.15
reference: 1 Samuel 13:15
source:
  edition: WLC
  text: וַ/יָּ֣קָם שְׁמוּאֵ֗ל וַ/יַּ֛עַל מִן הַ/גִּלְגָּ֖ל גִּבְעַ֣ת בִּנְיָמִ֑ן וַ/יִּפְקֹ֣ד שָׁא֗וּל אֶת הָ/עָם֙ הַ/נִּמְצְאִ֣ים עִמּ֔/וֹ כְּ/שֵׁ֥שׁ מֵא֖וֹת אִֽישׁ־־׃
translation:
  text: Then Samuel arose and went up from Gilgal to Gibeah of Benjamin[a], and Saul counted the people who were present with him, about six hundred men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some witnesses and translations read “to Geba of Benjamin” instead of “to Gibeah of Benjamin.” The Hebrew text here reads “Gibeah of Benjamin.”
    reason: textual_variant
lexical_decisions:
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום, a common narrative verb meaning 'arise/get up.' 'Arose' preserves the narrative sequence without overinterpreting it as departure alone.
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - went
  - ascended
  lexicon: HALOT
  rationale: עלה commonly means 'go up,' often for travel to a higher location. 'Went up' keeps the directional nuance better than simply 'went.'
- source_word: מִן הַגִּלְגָּל
  chosen: from Gilgal
  lexicon: HALOT
  rationale: Straightforward prepositional phrase indicating point of departure.
- source_word: גִּבְעַת בִּנְיָמִן
  chosen: to Gibeah of Benjamin
  alternatives:
  - to Geba of Benjamin
  lexicon: HALOT
  rationale: As pointed in the MT, the place name is 'Gibeath/Gibeah of Benjamin.' The phrase is rendered as destination after 'went up.' An alternative textual/traditional understanding reads 'Geba of Benjamin,' likely influenced by versions and contextual harmonization; this is preserved in a footnote rather than adopted in the main text because the provided Hebrew text supports 'Gibeah.'
- source_word: וַיִּפְקֹד
  chosen: counted
  alternatives:
  - mustered
  - numbered
  lexicon: HALOT
  rationale: פקד in military/population contexts can mean 'muster' or 'number.' Here Saul is taking stock of those remaining with him. 'Counted' is clear modern English; 'mustered' is possible but may imply formal military organization beyond the immediate sense.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the troops
  - the men
  lexicon: HALOT
  rationale: עם is broadly 'people.' In this military context it refers to Saul's force, but 'the people' preserves the Hebrew wording without narrowing more than necessary.
- source_word: הַנִּמְצְאִים עִמּוֹ
  chosen: who were present with him
  alternatives:
  - who were found with him
  - who remained with him
  lexicon: HALOT
  rationale: The Niphal participle of מצא literally means 'being found,' idiomatically those present/available. 'Who were present with him' is natural English and captures the sense of those still there.
- source_word: כְּשֵׁשׁ מֵאוֹת אִישׁ
  chosen: about six hundred men
  alternatives:
  - some six hundred men
  - approximately six hundred men
  lexicon: HALOT
  rationale: 'The prefixed כ indicates approximation: ''about/as many as six hundred.'' ''Men'' reflects אִישׁ in a counting expression for adult male persons, fitting the military setting and the project''s gender-accurate policy.'
