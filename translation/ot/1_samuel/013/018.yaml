id: 1SA.13.18
reference: 1 Samuel 13:18
source:
  edition: WLC
  text: וְ/הָ/רֹ֤אשׁ אֶחָד֙ יִפְנֶ֔ה דֶּ֖רֶךְ בֵּ֣ית חֹר֑וֹן וְ/הָ/רֹ֨אשׁ אֶחָ֤ד יִפְנֶה֙
    דֶּ֣רֶךְ הַ/גְּב֔וּל הַ/נִּשְׁקָ֛ף עַל גֵּ֥י הַצְּבֹעִ֖ים הַ/מִּדְבָּֽרָ/ה־׃ס
translation:
  text: and one company turned toward the road to Beth-horon, and one company turned
    toward the road of the border that overlooks the Valley of Zeboim, toward the
    wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one division' or 'one detachment'; literally 'one head.'
    reason: lexical_alternative
  - marker: b
    text: '''Zeboim'' is likely a place name; the underlying term may be related to
      ''hyenas.'''
    reason: cultural_note
lexical_decisions:
- source_word: הָרֹאשׁ אֶחָד
  chosen: one company
  alternatives:
  - one head
  - one division
  - one detachment
  lexicon: HALOT
  rationale: In this military context, רֹאשׁ literally means 'head,' but idiomatically
    refers to one of the raiding parties/divisions mentioned in the surrounding verses.
    'Company' gives clear modern English while preserving the sense of a military
    unit.
- source_word: יִפְנֶה
  chosen: turned toward
  alternatives:
  - turned
  - faced
  - went toward
  lexicon: HALOT
  rationale: The verb פנה means 'to turn' or 'to face.' In context of troop movement,
    'turned toward' naturally conveys directional movement without overtranslating.
- source_word: דֶּרֶךְ
  chosen: road
  alternatives:
  - way
  - route
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means 'way/road.' Here it denotes an actual route of
    travel, so 'road' is the most concrete and natural rendering.
- source_word: בֵּית חֹרוֹן
  chosen: Beth-horon
  rationale: 'Place name transliterated according to the translation philosophy: translate
    titles, transliterate names.'
- source_word: הַגְּבוּל
  chosen: the border
  alternatives:
  - the boundary
  - the frontier
  lexicon: HALOT
  rationale: גְּבוּל denotes a border or boundary. 'The border' is a straightforward
    rendering and fits the topographical description.
- source_word: הַנִּשְׁקָף
  chosen: that overlooks
  alternatives:
  - that looks down on
  - overlooking
  lexicon: HALOT
  rationale: The Niphal participle from שׁקף conveys something that projects or looks
    down over an area. 'That overlooks' is idiomatic English for a border/ridge above
    a valley.
- source_word: גֵּי הַצְּבֹעִים
  chosen: the Valley of Zeboim
  alternatives:
  - the valley of hyenas
  - the gorge of Zeboim
  lexicon: HALOT
  rationale: Because this appears to function as a place name, it is best rendered
    by transliteration, 'Zeboim.' The underlying noun may be related to 'hyenas,'
    but translating it would obscure the toponymic force.
- source_word: הַמִּדְבָּרָה
  chosen: toward the wilderness
  alternatives:
  - to the wilderness
  - wildernessward
  lexicon: HALOT
  rationale: The directional suffix on מִדְבָּר indicates motion toward the wilderness.
    'Toward the wilderness' preserves that directional nuance in natural English.
