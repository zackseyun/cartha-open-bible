id: 1SA.13.11
reference: 1 Samuel 13:11
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר שְׁמוּאֵ֖ל מֶ֣ה עָשִׂ֑יתָ וַ/יֹּ֣אמֶר שָׁא֡וּל כִּֽי רָאִיתִי֩
    כִֽי נָפַ֨ץ הָ/עָ֜ם מֵ/עָלַ֗/י וְ/אַתָּה֙ לֹא בָ֨אתָ֙ לְ/מוֹעֵ֣ד הַ/יָּמִ֔ים וּ/פְלִשְׁתִּ֖ים
    נֶאֱסָפִ֥ים מִכְמָֽשׂ־־־׃
translation:
  text: Then Samuel said, “What have you done?” And Saul said, “Because I saw that
    the people were scattering from me, and you had not come at the appointed time,
    and the Philistines were gathering at Michmash,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “were assembling at Michmash.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “at the appointed time of the days,” likely referring to the previously
      agreed period.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶה עָשִׂיתָ
  chosen: What have you done?
  alternatives:
  - What did you do?
  lexicon: HALOT
  rationale: Idiomatic English rendering of the interrogative plus perfect verb, preserving
    Samuel's sharp rebuke. Present perfect in English conveys the force of confronting
    a completed action with present significance.
- source_word: כִּי
  chosen: Because
  alternatives:
  - For
  - When
  lexicon: HALOT
  rationale: Introduces Saul's explanation for his action. 'Because' best signals
    causal force in contemporary English.
- source_word: רָאִיתִי
  chosen: I saw
  alternatives:
  - I perceived
  lexicon: HALOT
  rationale: Common sense verb of seeing/perceiving; 'I saw' is the most natural and
    sufficiently broad in context.
- source_word: נָפַץ הָעָם מֵעָלַי
  chosen: the people were scattering from me
  alternatives:
  - the people were being scattered from me
  - the people were dispersing away from me
  lexicon: HALOT
  rationale: נפץ here describes the troops breaking apart/dispersing. 'Scattering
    from me' preserves both the dispersal and Saul's loss of support. The English
    progressive reflects the situational sense of the Hebrew perfect within reported
    explanation.
- source_word: מֵעָלַי
  chosen: from me
  alternatives:
  - away from me
  - from around me
  lexicon: HALOT
  rationale: Keeps Saul as the center from whom the people are departing. 'From me'
    is concise and natural; the nuance of separation is clear from 'scattering.'
- source_word: לֹא בָאתָ
  chosen: you had not come
  alternatives:
  - you did not come
  lexicon: HALOT
  rationale: Pluperfect English fits Saul's retrospective explanation relative to
    the sacrifice episode and the previously set expectation.
- source_word: לְמוֹעֵד הַיָּמִים
  chosen: at the appointed time
  alternatives:
  - by the appointed days
  - at the appointed days
  - at the set time
  lexicon: HALOT
  rationale: מוֹעֵד denotes an appointed time/meeting. The phrase likely refers back
    to the previously specified period in context (v. 8). 'At the appointed time'
    is idiomatic and captures the temporal expectation better than a wooden 'appointed
    days.'
- source_word: נֶאֱסָפִים
  chosen: were gathering
  alternatives:
  - had gathered
  - were assembling
  lexicon: HALOT
  rationale: Niphal participle conveys an ongoing or developing state. 'Were gathering'
    reflects the imminent military threat in natural English.
- source_word: מִכְמָשׂ
  chosen: Michmash
  rationale: Standard English transliteration of the place name.
