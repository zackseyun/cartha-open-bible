theological_decisions:
- issue: Corrupt or difficult regnal formula in the Masoretic Text
  chosen_reading: Retain the Masoretic wording in the main text without conjectural
    supplementation
  alternative_readings:
  - Saul was thirty years old when he became king, and he reigned forty-two years
    over Israel
  - Saul was ... years old when he became king, and he reigned ... and two years over
    Israel
  - Saul was thirty years old when he became king, and he reigned two years over Israel
  rationale: The Hebrew text as transmitted is notoriously difficult and appears textually
    deficient or corrupt, especially in comparison with ancient versional evidence
    and the pattern of regnal notices elsewhere. However, the source text provided
    is the WLC Masoretic form. In keeping with original-language primacy and transparency,
    the main text preserves the extant Hebrew rather than importing a harmonizing
    or conjectural number into the translation. Significant alternatives are preserved
    in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
