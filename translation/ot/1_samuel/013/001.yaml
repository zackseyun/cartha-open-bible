id: 1SA.13.1
reference: 1 Samuel 13:1
source:
  edition: WLC
  text: בֶּן שָׁנָ֖ה שָׁא֣וּל בְּ/מָלְכ֑/וֹ וּ/שְׁתֵּ֣י שָׁנִ֔ים מָלַ֖ךְ עַל יִשְׂרָאֵֽל־־׃
translation:
  text: Saul was one year old when he became king, and he reigned two years over Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew text here is difficult and likely textually deficient. Literally,
      'Saul was a son of one year in his becoming king, and he reigned two years over
      Israel.' Some ancient witnesses and later proposals supply larger numbers, such
      as 'thirty' for Saul's age and 'forty-two' for the length of his reign.
    reason: textual_variant
lexical_decisions:
- source_word: בֶּן שָׁנָה
  chosen: was one year old
  alternatives:
  - was like a one-year-old
  - was a son of one year
  lexicon: HALOT
  rationale: The Hebrew idiom בן שנה normally means 'one year old.' Formally this
    yields the traditional wording, even though in this verse it creates an obvious
    historical difficulty. The translation preserves the Masoretic wording rather
    than emending in the main text.
- source_word: שָׁאוּל
  chosen: Saul
  rationale: Standard English transliteration of the personal name.
- source_word: בְּמָלְכוֹ
  chosen: when he became king
  alternatives:
  - in his reigning
  - when he reigned
  lexicon: HALOT
  rationale: The preposition plus infinitive/verb form marks the time of accession.
    'When he became king' is idiomatic English and fits the accession formula.
- source_word: וּשְׁתֵּי שָׁנִים
  chosen: and ... two years
  alternatives:
  - and two years
  - and for two years
  lexicon: HALOT
  rationale: This phrase gives the duration associated with Saul's reign in the Masoretic
    text. The conjunction is retained, and the numeral is translated directly.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  lexicon: HALOT
  rationale: The verb מלך in the qal commonly means 'reign' or 'be king.' 'He reigned'
    is the most natural English rendering in this regnal formula.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - upon Israel
  lexicon: HALOT
  rationale: 'Standard rendering of על with a verb of ruling: ''over Israel.'''
