id: 1SA.13.22
reference: 1 Samuel 13:22
source:
  edition: WLC
  text: וְ/הָיָה֙ בְּ/י֣וֹם מִלְחֶ֔מֶת וְ/לֹ֨א נִמְצָ֜א חֶ֤רֶב וַ/חֲנִית֙ בְּ/יַ֣ד
    כָּל הָ/עָ֔ם אֲשֶׁ֥ר אֶת שָׁא֖וּל וְ/אֶת יוֹנָתָ֑ן וַ/תִּמָּצֵ֣א לְ/שָׁא֔וּל וּ/לְ/יוֹנָתָ֖ן
    בְּנֽ/וֹ־־־׃
translation:
  text: So on the day of battle, not a sword or spear was found in the hand of any
    of the people who were with Saul and Jonathan; but Saul and his son Jonathan had
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'and a sword and a spear was not found in the hand of
      all the people.' The Hebrew expression is idiomatically rendered here to show
      that none of the troops had such weapons.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: So it was
  alternatives:
  - And it happened
  - Now it came about
  lexicon: HALOT
  rationale: Narrative wayyiqtol/qatal transition introducing the resulting situation.
    Rendered idiomatically as 'So' to connect with the preceding explanation while
    preserving the Hebrew narrative flow.
- source_word: בְּיוֹם מִלְחֶמֶת
  chosen: on the day of battle
  alternatives:
  - in the day of battle
  - when the battle came
  lexicon: HALOT
  rationale: A temporal phrase with ב plus 'day' and 'battle/war.' 'On the day of
    battle' is natural English and keeps the concrete temporal sense.
- source_word: לֹא נִמְצָא
  chosen: was found
  alternatives:
  - was to be found
  - could be found
  lexicon: HALOT
  rationale: Nifal of מצא in an impersonal/passive sense. English passive best reflects
    the Hebrew construction without adding interpretive nuance.
- source_word: חֶרֶב וַחֲנִית
  chosen: a sword or spear
  alternatives:
  - sword and spear
  lexicon: HALOT
  rationale: The pair denotes standard weapons. English idiom after a negated clause
    commonly uses 'or' ('not a sword or spear was found'), though the Hebrew conjunction
    is simply 'and.' This preserves the distributive force of the negation.
- source_word: בְּיַד
  chosen: in the hand of
  alternatives:
  - with
  - in the possession of
  lexicon: HALOT
  rationale: Literally 'in the hand of.' Retained because it is intelligible in English
    and reflects the Hebrew idiom of possession/control.
- source_word: כָּל הָעָם
  chosen: any of the people
  alternatives:
  - all the people
  - the whole people
  lexicon: HALOT
  rationale: Under negation, כָּל often has a distributive sense. 'Any of the people'
    communicates that none among the troops possessed such weapons.
- source_word: אֲשֶׁר אֶת־שָׁאוּל וְאֶת־יוֹנָתָן
  chosen: who were with Saul and Jonathan
  alternatives:
  - who belonged to Saul and Jonathan
  - who were with Saul, even with Jonathan
  lexicon: HALOT
  rationale: The construction is elliptical, with אֶת marking association rather than
    direct object in smooth English. 'Who were with Saul and Jonathan' best captures
    the sense of the people accompanying them.
- source_word: וַתִּמָּצֵא
  chosen: but ... had them
  alternatives:
  - and there was found
  - and they were found
  lexicon: HALOT
  rationale: The feminine singular verb resumes the implied pair of weapons collectively.
    In English, explicit restatement as 'had them' is clearer than a wooden passive
    and accurately conveys possession.
- source_word: לְשָׁאוּל וּלְיוֹנָתָן בְּנוֹ
  chosen: Saul and his son Jonathan
  alternatives:
  - Saul and Jonathan his son
  lexicon: HALOT
  rationale: 'The lamed marks possession/availability: the weapons were available
    to Saul and to Jonathan his son. Reordered slightly for natural English while
    preserving the filial identification.'
