id: 1SA.13.21
reference: 1 Samuel 13:21
source:
  edition: WLC
  text: וְֽ/הָיְתָ֞ה הַ/פְּצִ֣ירָה פִ֗ים לַ/מַּֽחֲרֵשֹׁת֙ וְ/לָ֣/אֵתִ֔ים וְ/לִ/שְׁלֹ֥שׁ
    קִלְּשׁ֖וֹן וּ/לְ/הַ/קַּרְדֻּמִּ֑ים וּ/לְ/הַצִּ֖יב הַ/דָּרְבָֽן׃
translation:
  text: And the charge was a pim for the plowshares, for the mattocks, for the three-pronged
    forks, and for the axes, and for setting the goads.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A pim was likely a small weight or payment, often understood as about two-thirds
      of a shekel.
    reason: cultural_note
  - marker: b
    text: Or 'the filing/sharpening was a pim'—the Hebrew wording is difficult, and
      the verse may describe either the fee charged or the sharpening itself.
    reason: alternative_reading
lexical_decisions:
- source_word: הַפְּצִירָה
  chosen: the charge
  alternatives:
  - the filing
  - the sharpening
  - the fee
  lexicon: HALOT
  rationale: The noun is rare and contextually refers to what was required in relation
    to sharpening agricultural tools. In this verse it most naturally denotes the
    imposed charge/price for the service rather than the act alone, especially with
    פִים following as the amount.
- source_word: פִים
  chosen: a pim
  alternatives:
  - two-thirds of a shekel
  - a payment called a pim
  lexicon: HALOT
  rationale: This term is best retained as a transliterated weight/monetary unit because
    its exact value is specialized and not transparent in English. A footnote preserves
    the likely equivalence.
- source_word: מַחֲרֵשֹׁת
  chosen: plowshares
  alternatives:
  - plow points
  - plow blades
  lexicon: HALOT
  rationale: Traditional and contextually fitting rendering for the iron part of a
    plow needing sharpening.
- source_word: אֵתִים
  chosen: mattocks
  alternatives:
  - hoes
  - spades
  lexicon: HALOT
  rationale: The tool is an agricultural implement for digging/chopping. 'Mattocks'
    fits the likely sense better than the broader 'hoes,' though the exact implement
    is not fully certain.
- source_word: שְׁלֹשׁ קִלְּשׁוֹן
  chosen: the three-pronged forks
  alternatives:
  - the tridents
  - the three-toothed forks
  lexicon: HALOT
  rationale: The phrase literally indicates a three-pointed implement. 'Three-pronged
    forks' is clear modern English while preserving the image.
- source_word: קַּרְדֻּמִּים
  chosen: axes
  alternatives:
  - adzes
  lexicon: HALOT
  rationale: The noun commonly denotes chopping tools; 'axes' is the most straightforward
    rendering, though some contexts may overlap with adze-like implements.
- source_word: לְהַצִּיב הַדָּרְבָן
  chosen: for setting the goads
  alternatives:
  - for fixing the goads
  - for sharpening the goads
  lexicon: HALOT
  rationale: The infinitive likely refers to putting in order, setting right, or refitting
    the ox-goads. 'Setting' is broad enough to preserve the uncertainty without overinterpreting
    as specifically sharpening.
