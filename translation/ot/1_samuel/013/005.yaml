id: 1SA.13.5
reference: 1 Samuel 13:5
source:
  edition: WLC
  text: וּ/פְלִשְׁתִּ֞ים נֶאֶסְפ֣וּ לְ/הִלָּחֵ֣ם עִם יִשְׂרָאֵ֗ל שְׁלֹשִׁ֨ים אֶ֤לֶף
    רֶ֨כֶב֙ וְ/שֵׁ֤שֶׁת אֲלָפִים֙ פָּרָשִׁ֔ים וְ/עָ֕ם כַּ/ח֛וֹל אֲשֶׁ֥ר עַל שְׂפַֽת
    הַ/יָּ֖ם לָ/רֹ֑ב וַֽ/יַּעֲלוּ֙ וַ/יַּחֲנ֣וּ בְ/מִכְמָ֔שׂ קִדְמַ֖ת בֵּ֥ית אָֽוֶן׀־־־׃
translation:
  text: 'And the Philistines gathered to fight against Israel: thirty thousand chariots,
    and six thousand horsemen, and troops as numerous as the sand that is on the seashore.
    They went up and camped at Mikmash, east of Beth-aven.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads 'thirty thousand chariots.' Some interpreters and ancient witnesses
      have suggested a smaller number (for example, 'three thousand') because thirty
      thousand seems unusually large in context, but the main text follows the Masoretic
      Hebrew.
    reason: textual_variant
lexical_decisions:
- source_word: נֶאֶסְפוּ
  chosen: gathered
  alternatives:
  - assembled
  - were gathered
  lexicon: HALOT
  rationale: The Niphal of אסף here denotes mustering/assembling for battle. 'Gathered'
    is natural English and preserves the military sense without over-specifying.
- source_word: לְהִלָּחֵם עִם
  chosen: to fight against
  alternatives:
  - to wage war with
  - to battle against
  lexicon: HALOT
  rationale: The infinitive of לחם with עִם in this context indicates hostile engagement.
    'Fight against' is idiomatic and clearly adversative in English.
- source_word: שְׁלֹשִׁים אֶלֶף רֶכֶב
  chosen: thirty thousand chariots
  alternatives:
  - thirty thousand chariotry
  - thirty thousand chariot troops
  lexicon: HALOT
  rationale: רֶכֶב commonly refers to chariots/chariot force. 'Thirty thousand chariots'
    is the plain formal rendering of the Hebrew sequence, even though the number is
    historically debated; the translation should reflect the received Hebrew text,
    with the issue noted in a footnote.
- source_word: שֵׁשֶׁת אֲלָפִים פָּרָשִׁים
  chosen: six thousand horsemen
  alternatives:
  - six thousand cavalrymen
  - six thousand riders
  lexicon: HALOT
  rationale: פָּרָשִׁים denotes mounted troops. 'Horsemen' is a clear, traditional,
    and accurate rendering in this military inventory.
- source_word: וְעָם
  chosen: and troops
  alternatives:
  - and people
  - and soldiers
  - and army
  lexicon: HALOT
  rationale: Though literally 'people,' in this battle context it refers to fighting
    forces. 'Troops' conveys the military sense better than the overly generic 'people'
    while avoiding paraphrase.
- source_word: כַּחוֹל אֲשֶׁר עַל שְׂפַת הַיָּם לָרֹב
  chosen: as numerous as the sand that is on the seashore
  alternatives:
  - like the sand on the seashore in multitude
  - as the sand on the shore of the sea in abundance
  lexicon: HALOT
  rationale: This is a standard Hebrew simile for an innumerable multitude. 'As numerous
    as the sand that is on the seashore' preserves the imagery in readable modern
    English.
- source_word: וַיַּעֲלוּ
  chosen: They went up
  alternatives:
  - They came up
  - They advanced
  lexicon: HALOT
  rationale: עלה often functions as a directional movement verb, especially in military
    narrative. 'Went up' preserves the Hebrew narrative idiom without forcing a more
    interpretive military gloss.
- source_word: וַיַּחֲנוּ
  chosen: camped
  alternatives:
  - encamped
  - set up camp
  lexicon: HALOT
  rationale: The verb חנה means to encamp. 'Camped' is modern and readable while remaining
    faithful.
- source_word: בְמִכְמָשׂ
  chosen: at Mikmash
  alternatives:
  - in Mikmash
  lexicon: HALOT
  rationale: The place name is transliterated per project philosophy. 'At' fits a
    military encampment location naturally in English.
- source_word: קִדְמַת בֵּית אָוֶן
  chosen: east of Beth-aven
  alternatives:
  - before Beth-aven
  - to the east of Beth-aven
  lexicon: HALOT
  rationale: קִדְמַת indicates an eastern/frontward position relative to a place.
    'East of Beth-aven' is the clearest idiomatic rendering in context.
