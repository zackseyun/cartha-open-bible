id: 1SA.13.19
reference: 1 Samuel 13:19
source:
  edition: WLC
  text: וְ/חָרָשׁ֙ לֹ֣א יִמָּצֵ֔א בְּ/כֹ֖ל אֶ֣רֶץ יִשְׂרָאֵ֑ל כִּֽי אמר פְלִשְׁתִּ֔ים
    פֶּ֚ן יַעֲשׂ֣וּ הָ/עִבְרִ֔ים חֶ֖רֶב א֥וֹ חֲנִֽית־׃
translation:
  text: Now no blacksmith could be found in all the land of Israel, because the Philistines
    said, “Otherwise the Hebrews will make swords or spears.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “lest the Hebrews make a sword or a spear.” The Hebrew uses singular
      nouns generically, and פֶּן can be rendered more formally as “lest.”
    reason: lexical_alternative
lexical_decisions:
- source_word: חָרָשׁ
  chosen: blacksmith
  alternatives:
  - craftsman
  - smith
  lexicon: HALOT
  rationale: In this military context, the term refers specifically to a metalworker
    capable of making weapons and sharpening tools, not a generic artisan. 'Blacksmith'
    makes the Philistines' policy intelligible in context.
- source_word: יִמָּצֵא
  chosen: could be found
  alternatives:
  - was found
  - was to be found
  lexicon: HALOT
  rationale: The Niphal conveys being found/present. 'Could be found' gives natural
    English and reflects the effective absence of any such worker in the land.
- source_word: בְּכֹל אֶרֶץ יִשְׂרָאֵל
  chosen: in all the land of Israel
  alternatives:
  - throughout all the land of Israel
  lexicon: HALOT
  rationale: A straightforward geographic expression; 'land' is preferable to 'country'
    for biblical style and territorial sense.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the lack of blacksmiths. 'Because' is clearer
    in modern English than the more formal 'for.'
- source_word: אמר
  chosen: said
  alternatives:
  - had said
  lexicon: HALOT
  rationale: The qatal can be rendered as simple past in English narrative. The causal
    sense is already carried by 'because'; pluperfect is possible but not necessary.
- source_word: פֶּן
  chosen: Otherwise
  alternatives:
  - lest
  - or else
  lexicon: HALOT
  rationale: פֶּן introduces a preventive concern. 'Otherwise' is idiomatic modern
    English and preserves the Philistines' reasoning without archaic 'lest.'
- source_word: הָעִבְרִים
  chosen: the Hebrews
  alternatives:
  - the Israelites
  lexicon: HALOT
  rationale: The source text specifically says 'Hebrews,' a term often used by foreigners
    or in interethnic contexts. It should be preserved rather than harmonized to 'Israelites.'
- source_word: יַעֲשׂוּ
  chosen: will make
  alternatives:
  - might make
  - would make
  lexicon: HALOT
  rationale: Given the Philistines' stated concern, an English future best captures
    the anticipated result they sought to prevent.
- source_word: חֶרֶב
  chosen: swords
  alternatives:
  - a sword
  lexicon: HALOT
  rationale: 'Although singular in Hebrew, English idiom in this generic class statement
    prefers the plural: the concern is weapon production generally.'
- source_word: חֲנִית
  chosen: spears
  alternatives:
  - a spear
  lexicon: HALOT
  rationale: As with 'swords,' the singular functions generically in Hebrew; English
    plural is more natural for a general category of weapons.
