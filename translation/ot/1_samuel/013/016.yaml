id: 1SA.13.16
reference: 1 Samuel 13:16
source:
  edition: WLC
  text: וְ/שָׁא֞וּל וְ/יוֹנָתָ֣ן בְּנ֗/וֹ וְ/הָ/עָם֙ הַ/נִּמְצָ֣א עִמָּ֔/ם יֹשְׁבִ֖ים
    בְּ/גֶ֣בַע בִּנְיָמִ֑ן וּ/פְלִשְׁתִּ֖ים חָנ֥וּ בְ/מִכְמָֽשׂ׃
translation:
  text: Now Saul and Jonathan his son, and the people who were found with them, were
    staying in Geba of Benjamin, while the Philistines had encamped at Michmash.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the people who were found with them,'' likely referring to those
      still remaining with Saul and Jonathan after others had scattered.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew place name is Geba, not Gibeah; the two are related but distinct
      locations in this narrative context.
    reason: alternative_reading
lexical_decisions:
- source_word: יֹשְׁבִים
  chosen: were staying
  alternatives:
  - were sitting
  - were dwelling
  - were remaining
  lexicon: HALOT
  rationale: The participle of ישׁב often denotes residing or remaining in a place,
    not merely the physical act of sitting. 'Were staying' gives natural English while
    preserving the locative sense in the military narrative.
- source_word: הַנִּמְצָא עִמָּם
  chosen: who were found with them
  alternatives:
  - who were with them
  - who remained with them
  lexicon: HALOT
  rationale: The Niphal participle of מצא is literally 'found.' In context it refers
    to the people still present with Saul and Jonathan after prior desertions. Retaining
    'found' preserves the Hebrew nuance better than flattening it to simply 'with
    them.'
- source_word: בְּגֶבַע בִּנְיָמִן
  chosen: in Geba of Benjamin
  alternatives:
  - at Geba of Benjamin
  - in Gibeah of Benjamin
  lexicon: HALOT
  rationale: The consonants here point to Geba, not Gibeah. Because these are distinct
    place names in Samuel, the translation follows the source text rather than harmonizing
    to a more familiar location. 'In' is a natural rendering of the preposition בְּ
    with a town.
- source_word: חָנוּ
  chosen: had encamped
  alternatives:
  - camped
  - were encamped
  lexicon: HALOT
  rationale: The verb חנה is the standard military term for encamping. 'Had encamped'
    fits the narrative contrast with Saul's group location and conveys a settled military
    position.
- source_word: בְמִכְמָשׂ
  chosen: at Michmash
  alternatives:
  - in Michmash
  lexicon: HALOT
  rationale: For a military encampment near a known site, English idiom prefers 'at
    Michmash,' though 'in' would also be possible. The place name is transliterated
    per translation philosophy.
- source_word: וְ
  chosen: Now
  alternatives:
  - And
  - while
  lexicon: HALOT
  rationale: The initial conjunction marks narrative continuation. 'Now' is a readable
    modern-English discourse marker. The later contrastive relation is then expressed
    with 'while' before the Philistine clause.
