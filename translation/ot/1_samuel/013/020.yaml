id: 1SA.13.20
reference: 1 Samuel 13:20
source:
  edition: WLC
  text: וַ/יֵּרְד֥וּ כָל יִשְׂרָאֵ֖ל הַ/פְּלִשְׁתִּ֑ים לִ֠/לְטוֹשׁ אִ֣ישׁ אֶת מַחֲרַשְׁתּ֤/וֹ
    וְ/אֶת אֵת/וֹ֙ וְ/אֶת קַרְדֻּמּ֔/וֹ וְ/אֵ֖ת מַחֲרֵשָׁתֽ/וֹ־־־־׃
translation:
  text: So all Israel went down to the Philistines, each man to sharpen his plowshare,
    his mattock, his axe, and his sickle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'his coulter' or another plowing implement; the Hebrew term
      is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרְדוּ
  chosen: went down
  alternatives:
  - went down to
  - descended
  lexicon: HALOT
  rationale: Qal wayyiqtol of ירד commonly denotes downward movement. 'Went down'
    is idiomatic English narrative style and preserves the directional sense.
- source_word: כָל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - all the Israelites
  lexicon: HALOT
  rationale: The collective expression is naturally rendered 'all Israel,' preserving
    the corporate sense of the Hebrew.
- source_word: הַפְּלִשְׁתִּים
  chosen: to the Philistines
  alternatives:
  - to Philistia
  - to the Philistine smiths
  lexicon: HALOT
  rationale: The direct object of motion is the people group, not the land. 'To the
    Philistines' best matches the Hebrew without adding 'smiths,' which is implied
    by context but not stated here.
- source_word: לִלְטוֹשׁ
  chosen: to sharpen
  alternatives:
  - to hammer
  - to forge
  lexicon: HALOT
  rationale: The verb לטש in this context refers to putting an edge on metal tools.
    'Sharpen' is the clearest English equivalent in context.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - every man
  lexicon: HALOT
  rationale: The distributive singular after a collective subject is preserved by
    'each man.' This follows the gender-accurate policy and reflects the Hebrew form.
- source_word: מַחֲרַשְׁתּוֹ
  chosen: his plowshare
  alternatives:
  - his plow
  - his plow-point
  lexicon: HALOT
  rationale: In this tool list, the term most likely denotes a plowing implement or
    plowshare. 'Plowshare' is the conventional and contextually precise rendering
    for a sharpened metal agricultural tool.
- source_word: אֵתוֹ
  chosen: his mattock
  alternatives:
  - his hoe
  - his spade
  lexicon: HALOT
  rationale: The noun את commonly denotes a digging or hoeing implement. 'Mattock'
    best fits an iron agricultural tool in a sharpening context.
- source_word: קַרְדֻּמּוֹ
  chosen: his axe
  alternatives:
  - his adze
  lexicon: HALOT
  rationale: This noun usually refers to an axe-like cutting tool. 'Axe' is the most
    straightforward rendering unless context specifically requires 'adze,' which it
    does not here.
- source_word: מַחֲרֵשָׁתוֹ
  chosen: his sickle
  alternatives:
  - his plowshare
  - his coulter
  lexicon: HALOT
  rationale: This final tool term is difficult and has been rendered variously. In
    the immediate list of agricultural implements needing sharpening, 'sickle' is
    a plausible and widely adopted rendering that avoids duplicating the earlier plowing
    term. Because the lexeme is uncertain, an alternative is preserved in a footnote.
