theological_decisions:
- issue: Subject and action in the final clause
  chosen_reading: Saul himself offered the burnt offering
  alternative_readings:
  - Saul had the burnt offering offered/presented
  rationale: The straightforward reading of the singular wayyiqtol with Saul as the prior subject is that Saul performed the offering action, which fits the narrative rebuke that follows. A more indirect sense is grammatically possible in broader causative/sacrificial idiom, but the immediate context favors direct agency.
