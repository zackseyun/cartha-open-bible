id: 1SA.13.9
reference: 1 Samuel 13:9
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שָׁא֔וּל הַגִּ֣שׁוּ אֵלַ֔/י הָ/עֹלָ֖ה וְ/הַ/שְּׁלָמִ֑ים וַ/יַּ֖עַל הָ/עֹלָֽה׃
translation:
  text: So Saul said[b][a], “Bring near to me the burnt offering and the peace offerings.” And he offered up the burnt offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “and the fellowship offerings.” The Hebrew term can denote offerings associated with peace, well-being, or shared fellowship.
    reason: lexical_alternative
  - marker: b
    text: The final clause most naturally means that Saul himself offered the burnt offering; some understand it more indirectly as having the offering presented.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: So Saul said
  alternatives:
  - And Saul said
  - Then Saul said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So' gives natural English narrative flow while preserving sequence; 'and' or 'then' are possible.
- source_word: הַגִּשׁוּ אֵלַי
  chosen: Bring near to me
  alternatives:
  - Bring to me
  - Present to me
  lexicon: HALOT
  rationale: The Hiphil imperative of נגשׁ means to bring near/present. 'Bring near to me' preserves the sacrificial/presentation nuance more clearly than the flatter 'bring to me.'
- source_word: הָעֹלָה
  chosen: the burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the whole burnt offering. This is the established and precise cultic rendering.
- source_word: וְהַשְּׁלָמִים
  chosen: and the peace offerings
  alternatives:
  - and the fellowship offerings
  lexicon: HALOT
  rationale: שְׁלָמִים refers to well-being/peace offerings. 'Peace offerings' is the more traditional and recognizable cultic term; 'fellowship offerings' is interpretive and less formally tied to the Hebrew.
- source_word: וַיַּעַל
  chosen: And he offered up
  alternatives:
  - And he brought up
  - And he caused to ascend
  lexicon: HALOT
  rationale: עלה in sacrificial context idiomatically means to offer up. This rendering preserves the cultic sense rather than the more literal but less idiomatic 'bring up.'
- source_word: הָעֹלָה
  chosen: the burnt offering
  lexicon: HALOT
  rationale: 'Repeated for clarity and consistency: the final clause specifies that Saul actually offered the burnt offering.'
