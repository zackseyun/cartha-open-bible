id: 1SA.13.17
reference: 1 Samuel 13:17
source:
  edition: WLC
  text: וַ/יֵּצֵ֧א הַ/מַּשְׁחִ֛ית מִ/מַּחֲנֵ֥ה פְלִשְׁתִּ֖ים שְׁלֹשָׁ֣ה רָאשִׁ֑ים
    הָ/רֹ֨אשׁ אֶחָ֥ד יִפְנֶ֛ה אֶל דֶּ֥רֶךְ עָפְרָ֖ה אֶל אֶ֥רֶץ שׁוּעָֽל־־׃
translation:
  text: And raiders came out from the camp of the Philistines in three companies.
    One company turned toward the road to Ophrah, toward the land of Shual.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the destroyer' or 'the destroying force'; here it refers
      to a raiding party from the Philistine camp.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'three heads' ... 'one head,' an idiom for military divisions
      or bands.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּשְׁחִית
  chosen: raiders
  alternatives:
  - the destroyer
  - the destroying band
  - the spoiler
  lexicon: HALOT
  rationale: In this military context, the singular noun with the article functions
    collectively for a destructive raiding force going out from the Philistine camp.
    'Raiders' communicates the sense naturally in English and fits the following division
    into three groups.
- source_word: שְׁלֹשָׁה רָאשִׁים
  chosen: in three companies
  alternatives:
  - three heads
  - three bands
  - three detachments
  lexicon: HALOT
  rationale: Literally 'three heads,' an idiom for divisions or bands. 'Companies'
    is clear modern English and preserves the military grouping without wooden literalism.
- source_word: הָרֹאשׁ אֶחָד
  chosen: one company
  alternatives:
  - one head
  - one band
  - one detachment
  lexicon: HALOT
  rationale: This repeats the same idiom as above in the singular. Rendering it consistently
    as 'one company' preserves the structure of the Hebrew while remaining idiomatic.
- source_word: יִפְנֶה
  chosen: turned
  alternatives:
  - would turn
  - went
  - faced
  lexicon: HALOT
  rationale: The verb means 'turn' or 'face.' In narrative sequence, 'turned' is natural
    English for the direction taken by one raiding company.
- source_word: דֶּרֶךְ עָפְרָה
  chosen: the road to Ophrah
  alternatives:
  - the way of Ophrah
  - the road toward Ophrah
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means 'way/road.' In English, 'the road to Ophrah' best
    conveys a route leading in that direction.
- source_word: אֶרֶץ שׁוּעָל
  chosen: the land of Shual
  alternatives:
  - the territory of Shual
  lexicon: HALOT
  rationale: אֶרֶץ can mean land or territory. 'Land of Shual' is the standard and
    sufficiently transparent rendering for a regional designation.
- source_word: פְלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard transliteration of the people-group name.
- source_word: עָפְרָה
  chosen: Ophrah
  lexicon: HALOT
  rationale: 'Place name transliterated according to the translation philosophy: transliterate
    names rather than translate them.'
- source_word: שׁוּעָל
  chosen: Shual
  lexicon: HALOT
  rationale: Regional place name transliterated rather than translated.
