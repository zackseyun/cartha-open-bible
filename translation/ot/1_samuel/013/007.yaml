id: 1SA.13.7
reference: 1 Samuel 13:7
source:
  edition: WLC
  text: וְ/עִבְרִ֗ים עָֽבְרוּ֙ אֶת הַ/יַּרְדֵּ֔ן אֶ֥רֶץ גָּ֖ד וְ/גִלְעָ֑ד וְ/שָׁאוּל֙
    עוֹדֶ֣/נּוּ בַ/גִּלְגָּ֔ל וְ/כָל הָ/עָ֖ם חָרְד֥וּ אַחֲרָֽי/ו־־׃
translation:
  text: And Hebrews crossed over the Jordan into the land of Gad and Gilead. But Saul
    was still at Gilgal, and all the people trembled behind him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Israelites' for 'Hebrews'; the Hebrew text uses 'Hebrews,' which may
      reflect a more ethnically marked designation in this narrative context.
    reason: lexical_alternative
  - marker: b
    text: Or 'following him' for 'behind him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עִבְרִים
  chosen: Hebrews
  alternatives:
  - men of Israel
  - Israelites
  lexicon: HALOT
  rationale: The noun literally denotes 'Hebrews.' In this context it may reflect
    either an outsider-style designation for Israelites or a subset of Israelites;
    'Hebrews' preserves the source wording most transparently without importing interpretation.
- source_word: עָבְרוּ אֶת הַיַּרְדֵּן
  chosen: crossed over the Jordan
  alternatives:
  - crossed the Jordan
  lexicon: HALOT
  rationale: The verb עבר with the object marker and 'the Jordan' idiomatically means
    crossing over the Jordan River. 'Crossed over' preserves the directional nuance
    of the Hebrew verb.
- source_word: אֶרֶץ גָּד וְגִלְעָד
  chosen: into the land of Gad and Gilead
  alternatives:
  - to the land of Gad and Gilead
  - into the territory of Gad and Gilead
  lexicon: HALOT
  rationale: אֶרֶץ can mean land/territory. 'Land' is a natural rendering here and
    keeps the geographic sense. The phrase likely names the Transjordanian region
    associated with Gad and Gilead.
- source_word: עוֹדֶנּוּ
  chosen: was still
  alternatives:
  - was yet
  - was still there
  lexicon: HALOT
  rationale: 'The adverb with pronominal suffix conveys continuance: Saul remained
    there at that time. English requires an explicit verbal expression, hence ''was
    still.'''
- source_word: בַגִּלְגָּל
  chosen: at Gilgal
  alternatives:
  - in Gilgal
  lexicon: HALOT
  rationale: For a named encampment/location, English idiom prefers 'at Gilgal.'
- source_word: חָרְדוּ
  chosen: trembled
  alternatives:
  - were afraid
  - quaked
  lexicon: HALOT
  rationale: The verb denotes trembling from fear. 'Trembled' preserves the vivid
    physical expression better than the flatter 'were afraid.'
- source_word: אַחֲרָיו
  chosen: behind him
  alternatives:
  - following him
  - after him
  lexicon: HALOT
  rationale: The preposition אחר can mean spatially 'behind' or in the sense of following.
    Here, with the people in Saul's train and in fear, 'behind him' best preserves
    the Hebrew image while remaining idiomatic.
