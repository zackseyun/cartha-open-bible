id: 1SA.13.2
reference: 1 Samuel 13:2
source:
  edition: WLC
  text: וַ/יִּבְחַר ל֨/וֹ שָׁא֜וּל שְׁלֹ֣שֶׁת אֲלָפִים֮ מִ/יִּשְׂרָאֵל֒ וַ/יִּהְי֨וּ
    עִם שָׁא֜וּל אַלְפַּ֗יִם בְּ/מִכְמָשׂ֙ וּ/בְ/הַ֣ר בֵּֽית אֵ֔ל וְ/אֶ֗לֶף הָיוּ֙
    עִם י֣וֹנָתָ֔ן בְּ/גִבְעַ֖ת בִּנְיָמִ֑ין וְ/יֶ֣תֶר הָ/עָ֔ם שִׁלַּ֖ח אִ֥ישׁ לְ/אֹהָלָֽי/ו־־־־׃
translation:
  text: And Saul chose for himself three thousand men from Israel. Two thousand were
    with Saul at Michmash and in the hill country of Bethel, and a thousand were with
    Jonathan at Gibeah of Benjamin. The rest of the people he sent away, each man
    to his tent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every man to his tent.' The Hebrew uses a common idiom for dismissing
      people to their own dwellings.
    reason: lexical_alternative
  - marker: b
    text: Or 'and on the hill of Bethel.' The Hebrew phrase may refer either to the
      hill country around Bethel or to a specific elevated area near Bethel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְחַר לוֹ
  chosen: chose for himself
  alternatives:
  - selected
  - took for himself
  lexicon: HALOT
  rationale: The verb בחר means 'choose/select.' The dative pronoun לוֹ is best preserved
    as 'for himself,' indicating Saul's personal selection of troops rather than merely
    'Saul chose' in a bare sense.
- source_word: שְׁלֹשֶׁת אֲלָפִים
  chosen: three thousand
  lexicon: HALOT
  rationale: Straightforward cardinal-number construction.
- source_word: מִיִּשְׂרָאֵל
  chosen: from Israel
  alternatives:
  - out of Israel
  lexicon: HALOT
  rationale: Marks the source from which the troops were chosen. 'From Israel' is
    natural modern English and preserves the sense.
- source_word: וַיִּהְיוּ עִם שָׁאוּל
  chosen: were with Saul
  alternatives:
  - remained with Saul
  lexicon: HALOT
  rationale: The clause states the disposition of the troops. 'Were with Saul' is
    sufficiently literal without adding nuance not explicit in the Hebrew.
- source_word: בְּמִכְמָשׂ
  chosen: at Michmash
  alternatives:
  - in Michmash
  lexicon: HALOT
  rationale: For a place name with ב, English idiom commonly uses 'at' for troop location.
- source_word: וּבְהַר בֵּית אֵל
  chosen: and in the hill country of Bethel
  alternatives:
  - and in the hill of Bethel
  - and on the mountain of Bethel
  lexicon: HALOT
  rationale: הַר can mean hill/mountain/hill country depending on context. Here a
    regional/topographical sense fits military positioning better than a single peak,
    so 'hill country of Bethel' is the clearest rendering.
- source_word: וְאֶלֶף הָיוּ עִם יוֹנָתָן
  chosen: and a thousand were with Jonathan
  lexicon: HALOT
  rationale: Simple numerical and locative clause parallel to the previous one.
- source_word: בְּגִבְעַת בִּנְיָמִין
  chosen: at Gibeah of Benjamin
  alternatives:
  - in Gibeah of Benjamin
  - at Geba of Benjamin
  lexicon: HALOT
  rationale: The pointing in the MT supports 'Gibeah.' The phrase distinguishes this
    location within Benjaminite territory. 'At' suits military stationing.
- source_word: וְיֶתֶר הָעָם
  chosen: The rest of the people
  alternatives:
  - the remainder of the troops
  - the rest of the army
  lexicon: HALOT
  rationale: יֶתֶר means 'remainder/rest.' הָעָם literally means 'the people.' Since
    the context is military, 'troops' is possible, but 'people' stays closer to the
    Hebrew while still making sense.
- source_word: שִׁלַּח
  chosen: he sent away
  alternatives:
  - he dismissed
  - he sent
  lexicon: HALOT
  rationale: In context Saul releases the remainder from active service. 'Sent away'
    captures the dismissive force better than the more neutral 'sent.'
- source_word: אִישׁ לְאֹהָלָיו
  chosen: each man to his tent
  alternatives:
  - every man to his tent
  - each to his home
  lexicon: HALOT
  rationale: This is a common idiom for dispersal to one's dwelling. Because the Hebrew
    explicitly has אִישׁ and 'tent,' the gender-accurate and concrete rendering 'each
    man to his tent' best follows the source; 'home' would be more interpretive.
