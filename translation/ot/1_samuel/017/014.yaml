id: 1SA.17.14
reference: 1 Samuel 17:14
source:
  edition: WLC
  text: וְ/דָוִ֖ד ה֣וּא הַ/קָּטָ֑ן וּ/שְׁלֹשָׁה֙ הַ/גְּדֹלִ֔ים הָלְכ֖וּ אַחֲרֵ֥י שָׁאֽוּל׃ס
translation:
  text: Now David was the youngest[a], and the three oldest had gone after Saul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And David was the youngest, and the three oldest followed Saul.' The Hebrew conjunction may be rendered simply 'and,' and the verb may be translated without the English pluperfect.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/דָוִד
  chosen: Now David
  alternatives:
  - And David
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply as 'and,' but in narrative English 'now' often better signals a parenthetical explanatory statement while preserving the discourse connection.
- source_word: הוּא
  chosen: was
  alternatives:
  - he was
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis in Hebrew ('David, he...'). English normally conveys this with the copula alone unless stronger emphasis is required; 'was' is sufficient and natural here.
- source_word: הַ/קָּטָן
  chosen: the youngest
  alternatives:
  - the small/young one
  - the youngest one
  lexicon: HALOT
  rationale: Though literally 'the small/young one,' in a sibling comparison context this idiom means 'the youngest.' This matches the immediate contrast with 'the three oldest.'
- source_word: וּ/שְׁלֹשָׁה
  chosen: and the three
  alternatives:
  - while the three
  lexicon: HALOT
  rationale: The conjunction links the contrasting clause. 'And the three' preserves the Hebrew structure without overinterpreting the relationship.
- source_word: הַ/גְּדֹלִים
  chosen: oldest
  alternatives:
  - greater ones
  - older ones
  - eldest
  lexicon: HALOT
  rationale: In family context, גדול refers to age/rank among siblings. 'Oldest' is the clearest idiomatic counterpart here, especially since exactly three brothers are in view.
- source_word: הָלְכ֖וּ אַחֲרֵ֥י
  chosen: had followed
  alternatives:
  - went after
  - followed
  lexicon: HALOT
  rationale: הלך אחרי literally means 'went after,' but in military allegiance context it means 'followed.' The pluperfect 'had followed' fits the narrative background sense in English, referring to their prior joining Saul.
- source_word: שָׁאֽוּל
  chosen: Saul
  rationale: Personal name transliterated by standard English convention, in keeping with the translation philosophy.
