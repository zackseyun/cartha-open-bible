id: 1SA.17.11
reference: 1 Samuel 17:11
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֤ע שָׁאוּל֙ וְ/כָל יִשְׂרָאֵ֔ל אֶת דִּבְרֵ֥י הַ/פְּלִשְׁתִּ֖י הָ/אֵ֑לֶּה וַ/יֵּחַ֥תּוּ וַ/יִּֽרְא֖וּ מְאֹֽד־־׃פ
translation:
  text: When Saul and all Israel heard these words of the Philistine[a], they were dismayed and greatly afraid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they were dismayed and very afraid.' The Hebrew verb translated 'were shattered' can also be rendered 'were dismayed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - listened to
  lexicon: HALOT
  rationale: The verb שׁמע in the qal commonly means 'hear.' In narrative sequence, 'heard' is the natural English rendering and fits the direct object 'these words.'
- source_word: שָׁאוּל
  chosen: Saul
  rationale: Personal name transliterated by standard English convention, per translation philosophy.
- source_word: וְכָל יִשְׂרָאֵל
  chosen: and all Israel
  alternatives:
  - and all the Israelites
  lexicon: HALOT
  rationale: The Hebrew is literally 'and all Israel.' This can denote the army/people collectively. 'All Israel' preserves the source wording while remaining natural English.
- source_word: דִּבְרֵי
  chosen: words
  alternatives:
  - speech
  - statements
  lexicon: HALOT
  rationale: דבר in the plural construct here refers to what Goliath said. 'Words' is the most direct and idiomatic rendering.
- source_word: הַפְּלִשְׁתִּי
  chosen: the Philistine
  lexicon: HALOT
  rationale: The singular with article refers to the representative Philistine champion already in context. 'The Philistine' is the standard and sufficiently specific rendering.
- source_word: הָאֵלֶּה
  chosen: these
  lexicon: HALOT
  rationale: Demonstrative modifying 'words'; straightforwardly rendered 'these.'
- source_word: וַיֵּחַתּוּ
  chosen: were shattered
  alternatives:
  - were dismayed
  - were terrified
  lexicon: HALOT
  rationale: חתת conveys being broken, shattered, or dismayed. 'Were shattered' preserves the vivid force of the Hebrew better than the more conventional but weaker 'were dismayed.' Since the next verb already expresses fear, this rendering avoids flattening the two verbs into near-synonyms.
- source_word: וַיִּירְאוּ
  chosen: were afraid
  alternatives:
  - feared
  lexicon: HALOT
  rationale: ירא commonly means 'fear/be afraid.' 'Were afraid' is natural modern English and pairs well with the preceding stative result.
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  lexicon: HALOT
  rationale: The adverb intensifies their fear. 'Greatly' is concise and idiomatic in this narrative context.
