id: 1SA.20.26
reference: 1 Samuel 20:26
source:
  edition: WLC
  text: וְ/לֹֽא דִבֶּ֥ר שָׁא֛וּל מְא֖וּמָה בַּ/יּ֣וֹם הַ/ה֑וּא כִּ֤י אָמַר֙ מִקְרֶ֣ה ה֔וּא בִּלְתִּ֥י טָה֛וֹר ה֖וּא כִּֽי לֹ֥א טָהֽוֹר־־׃ס
translation:
  text: But Saul did not say anything that day[a], for he thought, “Something has happened; he is not clean—surely he is not clean.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “he is ceremonially unclean.” The Hebrew speaks of ritual cleanness in the context of the meal.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִבֶּר ... מְאוּמָה
  chosen: did not say anything
  alternatives:
  - did not speak anything
  - said nothing
  lexicon: HALOT
  rationale: The idiom combines the verb 'speak/say' with 'anything' to mean that Saul made no comment. 'Did not say anything' is natural modern English while preserving the sense.
- source_word: בַּיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: A standard temporal expression. 'That day' is slightly more natural in English and retains the temporal reference.
- source_word: כִּי אָמַר
  chosen: for he thought
  alternatives:
  - for he said
  - because he said to himself
  lexicon: HALOT
  rationale: Although the verb is literally 'said,' the following clause reports Saul's internal reasoning. 'Thought' communicates the implied inward speech clearly in English.
- source_word: מִקְרֶה
  chosen: Something has happened to him
  alternatives:
  - It is an occurrence
  - An accident has happened
  - Some chance event has happened to him
  lexicon: HALOT
  rationale: The noun denotes a happening or chance occurrence. In context Saul assumes some incidental event has prevented Jonathan's attendance or ritual readiness. English requires an explicit verbal expression; 'Something has happened to him' captures the idiomatic sense.
- source_word: בִּלְתִּי טָהוֹר הוּא
  chosen: he is not clean
  alternatives:
  - he is unclean
  - he is ceremonially unclean
  lexicon: HALOT
  rationale: The phrase indicates ritual impurity in the context of a sacrificial meal. 'Not clean' stays close to the Hebrew wording; 'unclean' is possible, and 'ceremonially unclean' is interpretive, so it is left for a footnote rather than the main text.
- source_word: כִּי לֹא טָהוֹר
  chosen: surely he is not clean
  alternatives:
  - for he is not clean
  - indeed he is not clean
  lexicon: HALOT
  rationale: The repeated clause intensifies Saul's conclusion. Rendering כִּי here as 'surely' conveys the emphatic, inferential force in idiomatic English.
