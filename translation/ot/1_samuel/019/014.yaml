id: 1SA.19.14
reference: 1 Samuel 19:14
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֥ח שָׁא֛וּל מַלְאָכִ֖ים לָ/קַ֣חַת אֶת דָּוִ֑ד וַ/תֹּ֖אמֶר חֹלֶ֥ה הֽוּא־׃פ
translation:
  text: Then Saul sent messengers to seize David[a], and she said, “He is sick.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew simply says, “and she said”; the feminine subject is understood from the context as Michal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: Then ... sent
  alternatives:
  - And ... sent
  - So ... sent
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English narrative flow while preserving sequence.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - agents
  - envoys
  lexicon: HALOT
  rationale: In this narrative context the word refers to human emissaries sent by Saul, not angels. 'Messengers' is the standard and clearest rendering.
- source_word: לָקַחַת
  chosen: to seize
  alternatives:
  - to take
  - to capture
  lexicon: HALOT
  rationale: Although the verb is broadly 'take,' in context Saul is sending men to apprehend David. 'Seize' makes the hostile intent explicit without overtranslation.
- source_word: אֶת דָּוִד
  chosen: David
  lexicon: HALOT
  rationale: Direct-object marker plus proper name; straightforwardly rendered as the object 'David.'
- source_word: וַתֹּאמֶר
  chosen: but she said
  alternatives:
  - and she said
  lexicon: HALOT
  rationale: The feminine singular subject is implicit; from context it is Michal. 'But' reflects the adversative sense in English narrative, since her response opposes Saul's intent.
- source_word: חֹלֶה הוּא
  chosen: He is sick
  alternatives:
  - He is ill
  lexicon: HALOT
  rationale: Predicate adjective plus pronoun yields a simple statement of illness. 'Sick' is idiomatic modern English and fits the deception reported in context.
