id: 1SA.29.2
reference: 1 Samuel 29:2
source:
  edition: WLC
  text: וְ/סַרְנֵ֤י פְלִשְׁתִּים֙ עֹֽבְרִ֔ים לְ/מֵא֖וֹת וְ/לַ/אֲלָפִ֑ים וְ/דָוִ֣ד וַ/אֲנָשָׁ֗י/ו עֹֽבְרִ֛ים בָּ/אַחֲרֹנָ֖ה עִם אָכִֽישׁ־׃
translation:
  text: And the lords of the Philistines were passing by by hundreds and by thousands[a], and David and his men were passing by at the rear with Achish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by hundreds and by thousands,' referring to military units arranged in groups of hundreds and thousands.
    reason: lexical_alternative
lexical_decisions:
- source_word: סַרְנֵי
  chosen: lords
  alternatives:
  - chiefs
  - rulers
  lexicon: HALOT
  rationale: סֶרֶן refers to the high-ranking rulers of the Philistine city-states. 'Lords' is a natural English rendering that preserves their elite political-military status better than the more generic 'leaders' or 'officials'.
- source_word: פְלִשְׁתִּים
  chosen: Philistines
  lexicon: HALOT
  rationale: Standard transliteration for the people group.
- source_word: עֹבְרִים
  chosen: were passing by
  alternatives:
  - were marching past
  - passed by
  lexicon: HALOT
  rationale: The participle depicts ongoing movement in procession. 'Were passing by' preserves the scene-like aspect better than a simple past, while remaining idiomatic.
- source_word: לְמֵאוֹת וְלַאֲלָפִים
  chosen: in hundreds and in thousands
  alternatives:
  - by hundreds and by thousands
  - in companies of hundreds and thousands
  lexicon: HALOT
  rationale: This likely describes military organization by units. 'In hundreds and in thousands' is concise and close to the Hebrew, while still understandable in English.
- source_word: אֲנָשָׁיו
  chosen: his men
  alternatives:
  - his soldiers
  - his people
  lexicon: HALOT
  rationale: The phrase refers to David's male fighting force/companions. 'His men' is the most natural and contextually accurate rendering; 'people' is too broad, and 'soldiers' may be too narrow.
- source_word: בָּאַחֲרֹנָה
  chosen: at the rear
  alternatives:
  - in the rear
  - last
  lexicon: HALOT
  rationale: The term indicates the hindmost position in the procession. 'At the rear' is idiomatic and conveys spatial placement clearly. 'Last' is possible but less vivid and slightly less precise militarily.
- source_word: עִם אָכִישׁ
  chosen: with Achish
  alternatives:
  - along with Achish
  lexicon: HALOT
  rationale: Simple accompaniment is intended; 'with Achish' is sufficient and natural.
