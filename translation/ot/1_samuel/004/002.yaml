id: 1SA.4.2
reference: 1 Samuel 4:2
source:
  edition: WLC
  text: וַ/יַּעַרְכ֨וּ פְלִשְׁתִּ֜ים לִ/קְרַ֣את יִשְׂרָאֵ֗ל וַ/תִּטֹּשׁ֙ הַ/מִּלְחָמָ֔ה
    וַ/יִּנָּ֥גֶף יִשְׂרָאֵ֖ל לִ/פְנֵ֣י פְלִשְׁתִּ֑ים וַ/יַּכּ֤וּ בַ/מַּֽעֲרָכָה֙
    בַּ/שָּׂדֶ֔ה כְּ/אַרְבַּ֥עַת אֲלָפִ֖ים אִֽישׁ׃
translation:
  text: The Philistines drew up to meet Israel, and the battle spread out, and Israel
    was defeated before the Philistines; and they struck down about four thousand
    men in the battle line in the field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the battle was joined.' The Hebrew verb may describe the battle's beginning
      or its spreading out into engagement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַרְכוּ
  chosen: drew up
  alternatives:
  - arrayed themselves
  - formed ranks
  lexicon: HALOT
  rationale: From ערך in military context, referring to arranging troops for battle.
    'Drew up' is idiomatic modern English that preserves the military sense without
    sounding archaic.
- source_word: לִקְרַאת
  chosen: to meet
  alternatives:
  - against
  - toward
  lexicon: HALOT
  rationale: The preposition with קרא here indicates movement in encounter with the
    opposing force. 'To meet' is the plain sense and avoids overinterpreting hostility
    beyond the battle context already present.
- source_word: וַתִּטֹּשׁ הַמִּלְחָמָה
  chosen: the battle spread out
  alternatives:
  - the battle developed
  - the battle was joined
  lexicon: HALOT
  rationale: נטש in this construction likely conveys the battle's extension or deployment.
    'Spread out' reflects the Hebrew image more directly than the traditional but
    more interpretive 'was joined.'
- source_word: וַיִּנָּגֶף
  chosen: was defeated
  alternatives:
  - was struck down
  - was routed
  lexicon: HALOT
  rationale: נָגַף in Niphal commonly denotes being defeated or smitten before an
    enemy. 'Was defeated' best fits the clause with לִפְנֵי and avoids prematurely
    collapsing the statement into casualties, which are specified in the next clause.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - by
  - in the presence of
  lexicon: HALOT
  rationale: In military idiom, 'before' an enemy means in their presence and under
    their power, often with the sense of defeat. This preserves the standard Hebrew
    expression.
- source_word: וַיַּכּוּ
  chosen: they struck down
  alternatives:
  - they killed
  - they smote
  lexicon: HALOT
  rationale: The plural subject is naturally the Philistines from context. 'Struck
    down' is a clear modern rendering of נכה in battle, preserving lethal force without
    unnecessary archaism.
- source_word: בַמַּעֲרָכָה
  chosen: in the battle line
  alternatives:
  - in the battle array
  - in the ranks
  lexicon: HALOT
  rationale: מַעֲרָכָה refers to battle arrangement or line. 'Battle line' is concise
    and military in sense.
- source_word: בַּשָּׂדֶה
  chosen: in the open field
  alternatives:
  - in the field
  lexicon: HALOT
  rationale: While literally 'in the field,' 'open field' clarifies the setting as
    battlefield terrain outside a city or camp and fits natural English.
- source_word: כְּאַרְבַּעַת אֲלָפִים אִישׁ
  chosen: about four thousand men
  alternatives:
  - some four thousand men
  - approximately four thousand soldiers
  lexicon: HALOT
  rationale: כְּ with a number gives an approximate sense, hence 'about.' אִישׁ after
    a number is a counting term for persons, here adult male combatants in context,
    so 'men' is gender-accurate and contextually appropriate.
