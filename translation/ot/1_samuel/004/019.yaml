id: 1SA.4.19
reference: 1 Samuel 4:19
source:
  edition: WLC
  text: וְ/כַלָּת֣/וֹ אֵֽשֶׁת פִּינְחָס֮ הָרָ֣ה לָ/לַת֒ וַ/תִּשְׁמַ֣ע אֶת הַ/שְּׁמֻעָ֔ה
    אֶל הִלָּקַח֙ אֲר֣וֹן הָ/אֱלֹהִ֔ים וּ/מֵ֥ת חָמִ֖י/הָ וְ/אִישָׁ֑/הּ וַ/תִּכְרַ֣ע
    וַ/תֵּ֔לֶד כִּֽי נֶהֶפְכ֥וּ עָלֶ֖י/הָ צִרֶֽי/הָ־־־־׃
translation:
  text: Now his daughter-in-law, the wife of Phinehas, was pregnant, about to give
    birth. When she heard the report that the ark of God had been taken, and that
    her father-in-law and her husband were dead, she bent down and gave birth, because
    her labor pains came upon her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'about the capture of the ark of God.' The Hebrew construction can be
      rendered either as the content of the report ('that the ark... had been taken')
      or more nominally ('about the capture of the ark').
    reason: lexical_alternative
  - marker: b
    text: Or, 'her father-in-law and her husband had died.' The Hebrew form may be
      represented in English either as a stative result ('were dead') or as a prior
      event ('had died').
    reason: lexical_alternative
  - marker: c
    text: Literally, 'her pains turned upon her,' an idiom meaning that her labor
      pains came on suddenly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכַלָּתוֹ
  chosen: Now his daughter-in-law
  alternatives:
  - And his daughter-in-law
  lexicon: HALOT
  rationale: כַּלָּה means 'daughter-in-law' here. Initial וְ can be rendered simply
    'and,' but 'now' gives natural English narrative progression without losing the
    connective force.
- source_word: אֵשֶׁת פִּינְחָס
  chosen: the wife of Phinehas
  alternatives:
  - Phinehas's wife
  lexicon: HALOT
  rationale: Construct phrase identifying the daughter-in-law more specifically. 'The
    wife of Phinehas' is slightly more formal and tracks the Hebrew apposition closely.
- source_word: הָרָה לָלַת
  chosen: was pregnant, about to give birth
  alternatives:
  - was pregnant and near delivery
  - was with child, ready to give birth
  lexicon: HALOT
  rationale: הָרָה means 'pregnant'; the infinitive לָלַת adds imminence of childbirth.
    The chosen rendering preserves both state and nearness.
- source_word: וַתִּשְׁמַע אֶת־הַשְּׁמֻעָה
  chosen: When she heard the report
  alternatives:
  - And she heard the news
  - When she heard the message
  lexicon: HALOT
  rationale: שְׁמוּעָה commonly means 'report, news.' 'Report' fits the formal narrative
    tone and avoids over-interpretation.
- source_word: אֶל הִלָּקַח אֲרוֹן הָאֱלֹהִים
  chosen: that the ark of God had been taken
  alternatives:
  - about the capture of the ark of God
  - that the ark of God was taken
  lexicon: HALOT
  rationale: The preposition אֶל with infinitive construct here introduces the content
    of the report. 'Had been taken' reflects the passive sense of הִלָּקַח and works
    idiomatically in English.
- source_word: וּמֵת חָמִיהָ וְאִישָׁהּ
  chosen: and that her father-in-law and her husband were dead
  alternatives:
  - and that her father-in-law and her husband had died
  lexicon: HALOT
  rationale: מֵת can be rendered statively ('were dead') or verbally ('had died').
    The stative English fits the Hebrew predicate after the content clause and keeps
    the parallelism compact.
- source_word: וַתִּכְרַע
  chosen: she bent down
  alternatives:
  - she bowed herself
  - she crouched
  lexicon: HALOT
  rationale: כרע literally denotes bending/kneeling. In childbirth context it likely
    describes collapsing or crouching for labor. 'Bent down' is clear and restrained,
    avoiding overly interpretive expansion.
- source_word: וַתֵּלֶד
  chosen: and gave birth
  alternatives:
  - and bore a child
  lexicon: HALOT
  rationale: ילד in the Qal for a woman means 'give birth.' This is the most natural
    modern English equivalent.
- source_word: כִּי נֶהֶפְכוּ עָלֶיהָ צִרֶיהָ
  chosen: because her labor pains came upon her
  alternatives:
  - for her labor pains suddenly seized her
  - because her pangs turned upon her
  lexicon: HALOT
  rationale: צִירִים here refers to birth pangs/labor pains. נֶהֶפְכוּ עָלֶיהָ is
    idiomatic for coming upon or overtaking her. 'Came upon her' preserves the metaphor
    without awkward literalism.
