id: 1SA.4.10
reference: 1 Samuel 4:10
source:
  edition: WLC
  text: וַ/יִּלָּחֲמ֣וּ פְלִשְׁתִּ֗ים וַ/יִּנָּ֤גֶף יִשְׂרָאֵל֙ וַ/יָּנֻ֨סוּ֙ אִ֣ישׁ לְ/אֹהָלָ֔י/ו וַ/תְּהִ֥י הַ/מַּכָּ֖ה גְּדוֹלָ֣ה מְאֹ֑ד וַ/יִּפֹּל֙ מִ/יִּשְׂרָאֵ֔ל שְׁלֹשִׁ֥ים אֶ֖לֶף רַגְלִֽי׃
translation:
  text: So the Philistines fought[a], and Israel was defeated, and each man fled to his tent. The slaughter was very great[b], and thirty thousand foot soldiers from Israel fell.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'each man fled to his home.' The Hebrew literally says 'to his tent,' an expression that can function idiomatically for one's dwelling place.
    reason: lexical_alternative
  - marker: b
    text: Or 'the defeat was very severe.' The Hebrew says 'the blow/slaughter was very great.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלָּחֲמוּ
  chosen: fought
  alternatives:
  - went to battle
  - engaged in battle
  lexicon: HALOT
  rationale: The verb from לחם in the narrative wayyiqtol form is straightforwardly military action. 'Fought' is concise, natural English and preserves the narrative sequence.
- source_word: פְלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard transliteration for the people group; with the article in English for natural reference to the known enemy.
- source_word: וַיִּנָּגֶף יִשְׂרָאֵל
  chosen: Israel was defeated
  alternatives:
  - Israel was struck down
  - Israel was routed
  lexicon: HALOT
  rationale: נָגַף in battle contexts commonly means to be defeated/struck down before an enemy. 'Was defeated' best captures the military result without overstating total destruction. 'Routed' is possible but is better reflected by the following flight clause.
- source_word: וַיָּנֻסוּ אִישׁ לְאֹהָלָיו
  chosen: each man fled to his tent
  alternatives:
  - every man fled to his tent
  - each one fled to his home
  lexicon: HALOT
  rationale: אִישׁ distributively means 'each man/every man.' אֹהֶל literally means 'tent'; although it can idiomatically mean home, retaining 'tent' preserves the concrete Hebrew expression and the military/camp setting.
- source_word: וַתְּהִי הַמַּכָּה גְּדוֹלָה מְאֹד
  chosen: The slaughter was very great
  alternatives:
  - the blow was very great
  - the defeat was very severe
  - the plague was very great
  lexicon: HALOT
  rationale: מַכָּה is literally a blow/strike, but in battle narrative it refers to the deadly blow inflicted, hence 'slaughter.' This fits the immediate casualty count. 'Plague' is not suitable in this military context.
- source_word: וַיִּפֹּל מִיִּשְׂרָאֵל
  chosen: from Israel fell
  alternatives:
  - of Israel fell
  - Israel lost
  lexicon: HALOT
  rationale: נפל with persons in battle commonly means 'fell' = died in combat. Keeping 'fell' preserves the idiomatic martial register of the Hebrew.
- source_word: שְׁלֹשִׁים אֶלֶף
  chosen: thirty thousand
  lexicon: HALOT
  rationale: Direct rendering of the numeral phrase.
- source_word: רַגְלִי
  chosen: foot soldiers
  alternatives:
  - infantry
  - footmen
  lexicon: HALOT
  rationale: The adjective/noun denotes those on foot, in contrast to mounted troops. 'Foot soldiers' is clear modern English and slightly more transparent than 'infantry.'
