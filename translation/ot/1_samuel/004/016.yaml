id: 1SA.4.16
reference: 1 Samuel 4:16
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר הָ/אִ֜ישׁ אֶל עֵלִ֗י אָֽנֹכִי֙ הַ/בָּ֣א מִן הַ/מַּעֲרָכָ֔ה וַ/אֲנִ֕י מִן הַ/מַּעֲרָכָ֖ה נַ֣סְתִּי הַ/יּ֑וֹם וַ/יֹּ֛אמֶר מֶֽה הָיָ֥ה הַ/דָּבָ֖ר בְּנִֽ/י־־־־׃
translation:
  text: The man said to Eli[a], “I am the one who came from the battle line, and I fled from the battle line today.” And he said, “What happened, my son?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from the battle,” “from the ranks,” or “from the camp”; the Hebrew term refers to a military array or battle formation.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאִישׁ
  chosen: The man
  alternatives:
  - the messenger
  lexicon: HALOT
  rationale: The noun is the ordinary term for 'man.' Although context identifies him as a messenger from the battlefield, the Hebrew does not use a specialized term for messenger here, so 'the man' preserves the source wording.
- source_word: הַבָּא
  chosen: the one who came
  alternatives:
  - the one coming
  - he who came
  lexicon: HALOT
  rationale: 'The participle with the pronoun אָנֹכִי functions substantivally to identify the speaker: ''I am the one who came.'' English idiom prefers the completed sense in context, since he has already arrived before Eli.'
- source_word: מִן הַמַּעֲרָכָה
  chosen: from the battle line
  alternatives:
  - from the battle
  - from the camp
  - from the ranks
  lexicon: HALOT
  rationale: מַעֲרָכָה commonly refers to battle array or battle line rather than merely the abstract event of battle. 'Battle line' preserves the military formation nuance better than the broader 'battle.'
- source_word: נַסְתִּי
  chosen: I fled
  alternatives:
  - I escaped
  - I ran away
  lexicon: HALOT
  rationale: The verb נוּס means to flee. 'I fled' is the most direct and formally accurate rendering; 'I escaped' adds a result nuance not explicit in the verb.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: The temporal noun here marks the time of flight. 'Today' is natural modern English and fully preserves the sense.
- source_word: מֶה הָיָה הַדָּבָר
  chosen: What happened
  alternatives:
  - What was the matter
  - What was the event
  - What is the news
  lexicon: HALOT
  rationale: Literally, 'What was the matter/thing?' In context Eli is asking for the report of events. 'What happened' is idiomatic English that captures the force without unnecessary stiffness.
- source_word: בְּנִי
  chosen: my son
  alternatives:
  - son
  lexicon: HALOT
  rationale: The possessive suffix is explicit. Here it is a courteous or affectionate form of address from Eli to a younger man, and 'my son' preserves that relational tone without overinterpreting it.
