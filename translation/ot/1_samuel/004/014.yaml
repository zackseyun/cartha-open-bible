id: 1SA.4.14
reference: 1 Samuel 4:14
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֤ע עֵלִי֙ אֶת ק֣וֹל הַ/צְּעָקָ֔ה וַ/יֹּ֕אמֶר מֶ֛ה ק֥וֹל הֶ/הָמ֖וֹן הַ/זֶּ֑ה וְ/הָ/אִ֣ישׁ מִהַ֔ר וַ/יָּבֹ֖א וַ/יַּגֵּ֥ד לְ/עֵלִֽי־׃
translation:
  text: When Eli heard the sound of the outcry[a], he said, “What is this sound of the uproar?” And the man hurried and came and told Eli.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the tumult” or “the commotion.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֣וֹל
  chosen: sound
  alternatives:
  - voice
  - noise
  lexicon: HALOT
  rationale: קוֹל broadly denotes sound, voice, or noise. Here it introduces both the cry and the commotion as audible phenomena, so 'sound' is the most natural and contextually fitting English rendering.
- source_word: הַצְּעָקָה
  chosen: the outcry
  alternatives:
  - the cry
  - the shouting
  lexicon: HALOT
  rationale: צְעָקָה denotes a cry or outcry, often of distress. In context, the city is reacting to disastrous news, so 'outcry' preserves both loudness and emotional force better than the flatter 'cry'.
- source_word: מֶה
  chosen: What is this
  alternatives:
  - Why is this
  - What
  lexicon: HALOT
  rationale: The interrogative asks about the nature of the noise. Expanding to 'What is this' yields idiomatic English while staying close to the Hebrew sense.
- source_word: הֶהָמוֹן
  chosen: the uproar
  alternatives:
  - the tumult
  - the commotion
  - the noise
  lexicon: HALOT
  rationale: הָמוֹן here refers to a noisy disturbance or tumult. 'Uproar' captures the intensity and public disturbance implied by the scene.
- source_word: וְהָאִישׁ
  chosen: And the man
  alternatives:
  - Then the man
  - and the messenger
  lexicon: HALOT
  rationale: The Hebrew simply says 'the man,' referring to the previously mentioned Benjaminite messenger. 'Messenger' is interpretive and not explicit here, so 'the man' is retained.
- source_word: מִהַר
  chosen: hurried
  alternatives:
  - hastened
  - quickened
  lexicon: HALOT
  rationale: The verb means to hasten or act quickly. 'Hurried' is clear modern English and fits the narrative pace without sounding archaic.
- source_word: וַיַּגֵּד לְעֵלִי
  chosen: told Eli
  alternatives:
  - reported to Eli
  - informed Eli
  lexicon: HALOT
  rationale: נגד in the Hifil commonly means to tell or report. 'Told Eli' is straightforward and natural; 'reported' is possible but slightly more formal than the narrative requires.
- source_word: עֵלִי
  chosen: Eli
  rationale: Personal names are transliterated by standard convention per translation philosophy.
