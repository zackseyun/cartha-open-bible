theological_decisions:
- issue: Rendering of אֱלֹהִים in the phrase אֲרוֹן הָאֱלֹהִים
  chosen_reading: God
  alternative_readings:
  - the gods
  rationale: In this narrative context the referent is Israel's God, so the singular
    'God' is required. No doctrinal tension is introduced; this is a contextual grammatical
    decision.
