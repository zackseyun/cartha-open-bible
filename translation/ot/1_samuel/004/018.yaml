id: 1SA.4.18
reference: 1 Samuel 4:18
source:
  edition: WLC
  text: וַ/יְהִ֞י כְּ/הַזְכִּיר֣/וֹ אֶת אֲר֣וֹן הָ/אֱלֹהִ֗ים וַ/יִּפֹּ֣ל מֵֽ/עַל הַ֠/כִּסֵּא
    אֲחֹ֨רַנִּ֜ית בְּעַ֣ד יַ֣ד הַ/שַּׁ֗עַר וַ/תִּשָּׁבֵ֤ר מַפְרַקְתּ/וֹ֙ וַ/יָּמֹ֔ת
    כִּֽי זָקֵ֥ן הָ/אִ֖ישׁ וְ/כָבֵ֑ד וְ/ה֛וּא שָׁפַ֥ט אֶת יִשְׂרָאֵ֖ל אַרְבָּעִ֥ים
    שָׁנָֽה׀־־׀־־׃
translation:
  text: And it happened, when he mentioned the ark of God, that Eli fell backward
    from the seat beside the gate, and his neck was broken and he died, for the man
    was old and heavy. And he had judged Israel forty years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the gate' or 'at the side of the gate.' The Hebrew idiom is literally
      'at/by the hand of the gate.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'heavy.' The term may imply that Eli's weight, together with his
      age, contributed to the fatal fall.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּהַזְכִּירוֹ
  chosen: when he mentioned
  alternatives:
  - when he made mention of
  - as he mentioned
  lexicon: HALOT
  rationale: The Hiphil of זכר here means 'to mention' or 'to make mention of.' 'When
    he mentioned' is natural modern English and preserves the temporal force of כְּ.
- source_word: אֲרוֹן הָאֱלֹהִים
  chosen: the ark of God
  alternatives:
  - the ark of the true God
  lexicon: HALOT
  rationale: Standard construct rendering. 'Ark of God' matches the Hebrew directly
    and fits the narrative's established terminology.
- source_word: וַיִּפֹּל ... אֲחֹרַנִּית
  chosen: fell backward
  alternatives:
  - fell backward off
  - fell over backward
  lexicon: HALOT
  rationale: אֲחֹרַנִּית is an adverb meaning 'backward/backwards.' 'Fell backward'
    is concise and idiomatic.
- source_word: הַכִּסֵּא
  chosen: the seat
  alternatives:
  - the chair
  - his seat
  lexicon: HALOT
  rationale: כִּסֵּא can be 'seat,' 'chair,' or 'throne' depending on context. Since
    Eli is stationed by the gate rather than enthroned in royal context, 'seat' is
    the best neutral rendering.
- source_word: בְּעַד יַד הַשַּׁעַר
  chosen: beside the gate
  alternatives:
  - at the side of the gate
  - by the gate
  lexicon: HALOT
  rationale: The idiom literally involves 'at/by the side/hand of the gate.' 'Beside
    the gate' captures the locative sense in clear English.
- source_word: וַתִּשָּׁבֵר מַפְרַקְתּוֹ
  chosen: his neck was broken
  alternatives:
  - his neck snapped
  - his vertebrae were broken
  lexicon: HALOT
  rationale: מַפְרֶקֶת refers to the neck or nape. The passive-like English 'his neck
    was broken' communicates the result naturally without over-literal anatomical
    wording.
- source_word: כִּי זָקֵן הָאִישׁ וְכָבֵד
  chosen: for the man was old and heavy
  alternatives:
  - for he was old and overweight
  - for the man was old and weighty
  lexicon: HALOT
  rationale: כָבֵד literally means 'heavy.' In context it likely explains the fatality
    of the fall together with his age. 'Heavy' preserves the Hebrew's plain sense
    better than interpretive paraphrases like 'overweight,' while remaining understandable.
- source_word: שָׁפַט אֶת יִשְׂרָאֵל
  chosen: had judged Israel
  alternatives:
  - was judging Israel
  - had led Israel as judge
  lexicon: HALOT
  rationale: The qatal here summarizes Eli's completed tenure from the narrator's
    retrospective standpoint. English past perfect fits the obituary-like notice.
- source_word: אַרְבָּעִים שָׁנָה
  chosen: forty years
  lexicon: HALOT
  rationale: Straightforward numeral plus time expression.
