theological_decisions:
- issue: Rendering אֱלֹהִים in Philistine speech
  chosen_reading: God
  alternative_readings:
  - a god
  - gods
  rationale: The singular verb בָּא favors a singular referent. The verse reports
    the Philistines' interpretation of events, and the narrator does not require the
    translator to flatten the grammar into a plural. Because the speakers are Philistines
    and the noun form is plural in morphology, the alternatives are preserved in a
    footnote for auditability.
  doctrine_reference: 'Translation philosophy #3 (preserve theological tension rather
    than resolve it)'
