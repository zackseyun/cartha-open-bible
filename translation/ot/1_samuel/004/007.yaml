id: 1SA.4.7
reference: 1 Samuel 4:7
source:
  edition: WLC
  text: וַ/יִּֽרְאוּ֙ הַ/פְּלִשְׁתִּ֔ים כִּ֣י אָמְר֔וּ בָּ֥א אֱלֹהִ֖ים אֶל הַֽ/מַּחֲנֶ֑ה
    וַ/יֹּאמְרוּ֙ א֣וֹי לָ֔/נוּ כִּ֣י לֹ֥א הָיְתָ֛ה כָּ/זֹ֖את אֶתְמ֥וֹל שִׁלְשֹֽׁם־׃
translation:
  text: The Philistines were afraid, for they said, “God has come into the camp.”
    And they said, “Woe to us! For nothing like this has happened before.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a god has come into the camp'; the Hebrew noun is morphologically plural,
      but the accompanying verb is singular, supporting the main-text rendering 'God.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּֽרְאוּ
  chosen: were afraid
  alternatives:
  - feared
  - became afraid
  lexicon: HALOT
  rationale: From ירא in the wayyiqtol, indicating the Philistines' immediate reaction
    of fear. 'Were afraid' is natural modern English and preserves the emotional force
    without sounding archaic.
- source_word: הַפְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard ethnic designation; transliterated as a people-group name in
    keeping with normal English usage.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for their fear. 'For' fits the narrative style
    smoothly in English.
- source_word: אָמְרוּ
  chosen: they said
  alternatives:
  - they were saying
  lexicon: HALOT
  rationale: Simple past best reflects the Hebrew perfect here in narrative explanation.
- source_word: בָּא אֱלֹהִים
  chosen: God has come
  alternatives:
  - a god has come
  - gods have come
  lexicon: HALOT
  rationale: Although אֱלֹהִים is morphologically plural, the accompanying verb בָּא
    is singular, which strongly supports a singular sense here. In context the Philistines
    are reacting to Israel's shout and the arrival of the ark, perceiving the God
    of Israel as having entered the camp. 'God' best reflects the singular verbal
    agreement. The alternatives are worth preserving because Philistine speech may
    reflect pagan perception and because English readers may notice the plural form.
- source_word: אֶל הַמַּחֲנֶה
  chosen: into the camp
  alternatives:
  - to the camp
  - into the army camp
  lexicon: HALOT
  rationale: '''Into the camp'' best conveys motion into Israel''s encampment and
    reads naturally in English.'
- source_word: א֣וֹי לָנוּ
  chosen: Woe to us!
  alternatives:
  - Alas for us!
  lexicon: HALOT
  rationale: A cry of distress or doom. 'Woe to us!' preserves the gravity and idiomatic
    force.
- source_word: לֹא הָיְתָה כָּזֹאת
  chosen: nothing like this has happened
  alternatives:
  - such a thing has not been
  - there has not been anything like this
  lexicon: HALOT
  rationale: This idiomatic rendering communicates the sense of unprecedentedness
    in clear modern English.
- source_word: אֶתְמוֹל שִׁלְשֹׁם
  chosen: before
  alternatives:
  - yesterday or the day before
  - previously
  lexicon: HALOT
  rationale: The pair is an idiom meaning formerly or previously, not strictly a reference
    only to the prior two days. 'Before' captures the sense concisely and naturally
    in English narrative.
