theological_decisions:
- issue: Sense of 'the glory' in relation to Israel
  chosen_reading: Render כָבוֹד as 'the glory' without making explicit whether this
    means God's manifested presence, Israel's honor, or both.
  alternative_readings:
  - God's glory has departed from Israel
  - Honor has departed from Israel
  rationale: The Hebrew leaves the expression compact and theologically resonant.
    In context the loss of the ark and deaths in Eli's house suggest the departure
    of God's glorious presence and Israel's downfall together. The translation preserves
    that tension rather than narrowing it.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
