id: 1SA.4.21
reference: 1 Samuel 4:21
source:
  edition: WLC
  text: וַ/תִּקְרָ֣א לַ/נַּ֗עַר אִֽי כָבוֹד֙ לֵ/אמֹ֔ר גָּלָ֥ה כָב֖וֹד מִ/יִּשְׂרָאֵ֑ל
    אֶל הִלָּקַח֙ אֲר֣וֹן הָ/אֱלֹהִ֔ים וְ/אֶל חָמִ֖י/הָ וְ/אִישָֽׁ/הּ־־־׃
translation:
  text: And she named the boy Ichabod, saying, “The glory has departed from Israel,”
    because the ark of God had been taken, and because of her father-in-law and her
    husband.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ichabod sounds like a name built from Hebrew elements associated with 'no
      glory' or possibly 'where is glory?'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקְרָא
  chosen: she named
  alternatives:
  - she called
  lexicon: HALOT
  rationale: In naming contexts קרא with ל marks giving a name. 'Named' is more idiomatic
    and precise in English than the more literal 'called.'
- source_word: לַנַּעַר
  chosen: the boy
  alternatives:
  - the child
  - the young boy
  lexicon: HALOT
  rationale: נַעַר commonly denotes a boy/youth. Here it refers to the newborn male
    child; 'the boy' is natural and sufficiently specific.
- source_word: אִי כָבוֹד
  chosen: Ichabod
  alternatives:
  - I-chabod
  - No glory
  lexicon: HALOT
  rationale: This is a proper name formed from elements meaning something like 'no
    glory' or 'where is glory?'; by translation philosophy, personal names are transliterated
    in the main text rather than translated.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the explanation of the name;
    'saying' preserves the Hebrew structure smoothly.
- source_word: גָּלָה
  chosen: has departed
  alternatives:
  - is gone into exile
  - has gone
  - has been removed
  lexicon: HALOT
  rationale: גלה can denote going into exile or being removed. With כָבוֹד as subject,
    idiomatic English is 'has departed,' conveying the withdrawal of glory without
    over-literalizing exile language.
- source_word: כָבוֹד
  chosen: glory
  alternatives:
  - honor
  lexicon: HALOT
  rationale: כָבוֹד here refers to Israel's glory in relation to God's presence, especially
    symbolized by the ark. 'Glory' is the established and contextually weighty rendering.
- source_word: מִיִּשְׂרָאֵל
  chosen: from Israel
  alternatives:
  - away from Israel
  lexicon: HALOT
  rationale: The preposition מִן marks separation/source; 'from Israel' is the straightforward
    rendering.
- source_word: אֶל הִלָּקַח אֲרוֹן הָאֱלֹהִים
  chosen: because the ark of God had been taken
  alternatives:
  - at the taking of the ark of God
  - because of the capture of the ark of God
  lexicon: HALOT
  rationale: אֶל here is difficult and functions causally in context, as in the surrounding
    narrative. Rendering it 'because' gives the sense naturally in English. The infinitive/passive
    notion of הִלָּקַח is best expressed as 'had been taken.'
- source_word: אֲרוֹן הָאֱלֹהִים
  chosen: the ark of God
  alternatives:
  - God's ark
  lexicon: HALOT
  rationale: A direct, transparent rendering of the construct phrase; this is the
    standard designation in the passage.
- source_word: וְאֶל חָמִיהָ וְאִישָׁהּ
  chosen: and because of her father-in-law and her husband
  alternatives:
  - and because of her father-in-law and her man
  - and for her father-in-law and her husband
  lexicon: HALOT
  rationale: The repeated אֶל is best taken with the prior causal sense, extending
    the grounds for the naming. 'Husband' is the clear contextual sense of אִישׁ with
    3fs suffix here.
