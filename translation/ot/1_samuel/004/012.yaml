id: 1SA.4.12
reference: 1 Samuel 4:12
source:
  edition: WLC
  text: וַ/יָּ֤רָץ אִישׁ בִּנְיָמִן֙ מֵ/הַ/מַּ֣עֲרָכָ֔ה וַ/יָּבֹ֥א שִׁלֹ֖ה בַּ/יּ֣וֹם הַ/ה֑וּא וּ/מַדָּ֣י/ו קְרֻעִ֔ים וַ/אֲדָמָ֖ה עַל רֹאשֽׁ/וֹ־־׃
translation:
  text: Then a man of Benjamin ran from the battle line and came to Shiloh that same day[b][a], with his clothes torn and dirt on his head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the battle' or 'from the ranks'; the Hebrew term refers more specifically to the battle array or line of engagement.
    reason: lexical_alternative
  - marker: b
    text: Torn clothes and dirt on the head were customary signs of grief, distress, or disaster.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּרָץ
  chosen: ran
  alternatives:
  - hurried
  - fled
  lexicon: HALOT
  rationale: Basic narrative wayyiqtol of רוץ, indicating swift movement. 'Ran' is the plain and natural English equivalent; 'fled' would overinterpret motive, which the verb itself does not state.
- source_word: אִישׁ בִּנְיָמִן
  chosen: a man of Benjamin
  alternatives:
  - a Benjaminite
  - a man from Benjamin
  lexicon: HALOT
  rationale: Literally 'a man, Benjamin.' 'A man of Benjamin' preserves the tribal identification closely while remaining readable. 'Benjaminite' is possible but slightly more interpretive and less transparent to the Hebrew construction.
- source_word: מֵהַמַּעֲרָכָה
  chosen: from the battle line
  alternatives:
  - from the battle
  - from the camp
  - from the ranks
  lexicon: HALOT
  rationale: מַעֲרָכָה often refers to battle array or battle line rather than merely the abstract event of battle. 'Battle line' preserves the military sense of ordered engagement better than the broader 'battle.'
- source_word: וַיָּבֹא שִׁלֹה
  chosen: came to Shiloh
  alternatives:
  - arrived at Shiloh
  lexicon: HALOT
  rationale: Standard motion verb בוא with destination. 'Came to Shiloh' is straightforward and idiomatic in English narrative.
- source_word: בַּיּוֹם הַהוּא
  chosen: that same day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Literally 'on that day.' In context, English 'that same day' naturally conveys immediacy and temporal continuity from the battlefield report without adding new information.
- source_word: וּמַדָּיו
  chosen: his clothes
  alternatives:
  - his garments
  - his robe
  lexicon: HALOT
  rationale: The plural noun refers to garments/clothing. 'Clothes' is clear modern English; 'garments' is more formal but less natural. 'Robe' is too narrow.
- source_word: קְרֻעִים
  chosen: torn
  alternatives:
  - ripped
  - torn apart
  lexicon: HALOT
  rationale: Passive participle from קרע, commonly used in mourning contexts for torn clothing. 'Torn' is the standard concise rendering.
- source_word: וַאֲדָמָה עַל רֹאשׁוֹ
  chosen: and dirt on his head
  alternatives:
  - and earth on his head
  - with dust on his head
  lexicon: HALOT
  rationale: אֲדָמָה is 'ground, soil, earth.' In this mourning-sign context, 'dirt on his head' is natural modern English. 'Dust' is possible by context, but the lexical item here is not the more specific word for dust.
