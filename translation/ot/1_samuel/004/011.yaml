id: 1SA.4.11
reference: 1 Samuel 4:11
source:
  edition: WLC
  text: וַ/אֲר֥וֹן אֱלֹהִ֖ים נִלְקָ֑ח וּ/שְׁנֵ֤י בְנֵֽי עֵלִי֙ מֵ֔תוּ חָפְנִ֖י וּ/פִֽינְחָֽס־׃
translation:
  text: And the ark of God was captured, and the two sons of Eli died, Hophni and
    Phinehas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֲרוֹן אֱלֹהִים
  chosen: the ark of God
  alternatives:
  - God's ark
  - the ark
  lexicon: HALOT
  rationale: Construct phrase literally denotes the ark belonging to God. 'The ark
    of God' preserves the Hebrew wording and solemnity better than the more idiomatic
    possessive 'God's ark.'
- source_word: נִלְקָח
  chosen: was captured
  alternatives:
  - was taken
  - was seized
  lexicon: HALOT
  rationale: The Niphal of לקח here is passive, in battle context indicating enemy
    capture. 'Was captured' makes the military sense explicit in natural English.
- source_word: וּשְׁנֵי
  chosen: and the two
  alternatives:
  - and two
  lexicon: HALOT
  rationale: The numeral in construct with 'sons' is definite in context; 'the two'
    reflects the specificity of Eli's known pair of sons.
- source_word: בְנֵי עֵלִי
  chosen: sons of Eli
  alternatives:
  - Eli's sons
  lexicon: HALOT
  rationale: Either is possible; 'sons of Eli' stays closer to the Hebrew construct
    chain while remaining clear English.
- source_word: מֵתוּ
  chosen: died
  alternatives:
  - were dead
  - fell dead
  lexicon: HALOT
  rationale: Qal perfect of מות straightforwardly reports death. 'Died' is the plainest
    and most direct rendering; 'fell dead' would add imagery not explicit in the text.
- source_word: חָפְנִי וּפִינְחָס
  chosen: Hophni and Phinehas
  rationale: Personal names are transliterated by standard English conventions per
    project philosophy. The appositional placement after 'the two sons of Eli' is
    retained.
