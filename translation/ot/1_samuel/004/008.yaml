theological_decisions:
- issue: Rendering אֱלֹהִים in Philistine speech
  chosen_reading: gods
  alternative_readings:
  - God
  rationale: Although Israel worships one God, the speakers are Philistines interpreting
    Israel's deity through a polytheistic lens. The Hebrew plural forms in this verse
    (adjective and participle) support preserving their perspective rather than normalizing
    it to monotheistic confession.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Historically difficult phrase בַּמִּדְבָּר
  chosen_reading: in the wilderness
  alternative_readings:
  - in the desert
  - a harmonized rendering omitting or reinterpreting the phrase
  rationale: The Masoretic Text includes 'in the wilderness,' even though the plagues
    on Egypt occurred before Israel entered the wilderness. The translation should
    reflect the source text as given, not emend it to remove the tension. A footnote
    can acknowledge the difficulty.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    tension rather than resolve it.
