id: 1SA.4.8
reference: 1 Samuel 4:8
source:
  edition: WLC
  text: א֣וֹי לָ֔/נוּ מִ֣י יַצִּילֵ֔/נוּ מִ/יַּ֛ד הָ/אֱלֹהִ֥ים הָ/אַדִּירִ֖ים הָ/אֵ֑לֶּה
    אֵ֧לֶּה הֵ֣ם הָ/אֱלֹהִ֗ים הַ/מַּכִּ֧ים אֶת מִצְרַ֛יִם בְּ/כָל מַכָּ֖ה בַּ/מִּדְבָּֽר־־׃
translation:
  text: Woe to us! Who can deliver us from the hand of these mighty gods? These are
    the gods who struck Egypt with every kind of plague in the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'these mighty God(s).' The Philistines speak in plural terms, reflecting
      their own understanding of Israel's deity.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''in the wilderness.'' The phrase is difficult in context, since
      the plagues struck Egypt before Israel''s wilderness journey; the translation
      follows the Masoretic Text as written.'
    reason: textual_variant
lexical_decisions:
- source_word: א֣וֹי
  chosen: Woe
  alternatives:
  - Oh no
  - Alas
  lexicon: HALOT
  rationale: An interjection of distress or doom. 'Woe' preserves the force and gravity
    better than softer modern exclamations.
- source_word: לָ֔נוּ
  chosen: to us
  alternatives:
  - for us
  lexicon: HALOT
  rationale: With אוי, the idiom is naturally rendered 'Woe to us!' in English.
- source_word: מִ֣י יַצִּילֵ֔נוּ
  chosen: Who can deliver us
  alternatives:
  - Who will save us
  - Who will rescue us
  lexicon: HALOT
  rationale: נצל in Hiphil commonly means 'deliver, rescue.' 'Deliver' fits the elevated
    tone and common biblical usage; 'can' brings out the rhetorical sense of desperate
    impossibility.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from
  - out of the power of
  lexicon: HALOT
  rationale: The idiom 'from the hand of' is transparent enough in English and preserves
    the Hebrew metaphor of power/control.
- source_word: הָאֱלֹהִים הָאַדִּירִים הָאֵלֶּה
  chosen: these mighty gods
  alternatives:
  - these mighty God(s)
  - these majestic gods
  lexicon: HALOT
  rationale: The Philistines speak from a polytheistic perspective, and the plural
    adjective אַדִּירִים plus demonstrative favors a plural rendering in English.
    'Mighty' is the most natural gloss here. Although the referent is Israel's God
    associated with the ark, the speakers misconstrue him in plural terms.
- source_word: אֵלֶּה הֵם
  chosen: These are
  alternatives:
  - These—they are
  lexicon: HALOT
  rationale: This is a straightforward identificational clause. Smooth English drops
    the emphatic redundancy while preserving the sense.
- source_word: הָאֱלֹהִים
  chosen: the gods
  alternatives:
  - God
  - the divine beings
  lexicon: HALOT
  rationale: Again, in Philistine speech the plural sense is most natural in context,
    especially with the preceding plural modifiers and the following plural participle.
- source_word: הַמַּכִּים
  chosen: who struck
  alternatives:
  - who were striking
  - who smote
  lexicon: HALOT
  rationale: The participle functions here as a relative clause referring to a known
    past action. 'Struck' is idiomatic modern English.
- source_word: אֶת מִצְרַיִם
  chosen: Egypt
  alternatives:
  - the Egyptians
  lexicon: HALOT
  rationale: The object can denote the land/people collectively. 'Egypt' is the more
    conventional and concise rendering in recounting the exodus plagues.
- source_word: בְּכָל מַכָּה
  chosen: with every kind of plague
  alternatives:
  - with every plague
  - by every plague
  lexicon: HALOT
  rationale: Literally 'with every plague/blow.' Because the phrase is somewhat idiomatic
    and intensifying, 'every kind of plague' communicates the comprehensive sense
    naturally in English.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר is regularly 'wilderness.' The phrase is textually difficult
    historically, but the MT reads 'in the wilderness,' so it should be translated
    as such rather than harmonized away.
