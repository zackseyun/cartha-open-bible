id: 1SA.4.1
reference: 1 Samuel 4:1
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר שְׁמוּאֵ֖ל לְ/כָל יִשְׂרָאֵ֑ל וַ/יֵּצֵ֣א יִשְׂרָאֵל֩ לִ/קְרַ֨את
    פְּלִשְׁתִּ֜ים לַ/מִּלְחָמָ֗ה וַֽ/יַּחֲנוּ֙ עַל הָ/אֶ֣בֶן הָעֵ֔זֶר וּ/פְלִשְׁתִּ֖ים
    חָנ֥וּ בַ/אֲפֵֽק־־־׃
translation:
  text: And the word of Samuel came to all Israel. Then Israel went out to meet the
    Philistines in battle, and they camped at Ebenezer, while the Philistines camped
    at Aphek.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the report of Samuel came to all Israel.' The Hebrew can be understood
      as Samuel's word/message, and in context likely refers to his prophetic word.
    reason: alternative_reading
  - marker: b
    text: Ebenezer means 'stone of help.' Here it functions as a place name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: In the clause וַיְהִי דְבַר שְׁמוּאֵל לְכָל יִשְׂרָאֵל, a wooden 'and
    the word of Samuel was to all Israel' is awkward in English. 'Came to' captures
    the idiomatic sense that Samuel's word reached or was received by all Israel.
- source_word: דְבַר שְׁמוּאֵל
  chosen: the word of Samuel
  alternatives:
  - Samuel's message
  - Samuel's word
  lexicon: HALOT
  rationale: Retains the singular noun 'word' and preserves the formal link to prophetic
    speech, while remaining natural English.
- source_word: לְכָל יִשְׂרָאֵל
  chosen: to all Israel
  alternatives:
  - throughout all Israel
  - for all Israel
  lexicon: HALOT
  rationale: The preposition ל with כָל is well represented by 'to all.' This keeps
    the sense of Samuel's word reaching the whole people.
- source_word: וַיֵּצֵא יִשְׂרָאֵל
  chosen: Israel went out
  alternatives:
  - Israel marched out
  lexicon: HALOT
  rationale: A straightforward rendering of יצא. 'Went out' is broad enough and does
    not over-interpret the military nuance beyond what the following phrase supplies.
- source_word: לִקְרַאת פְּלִשְׁתִּים
  chosen: to meet the Philistines
  alternatives:
  - against the Philistines
  - to encounter the Philistines
  lexicon: HALOT
  rationale: לקראת literally means 'to meet/toward meeting.' In a military context
    it implies hostile encounter, but 'to meet' preserves the lexical sense without
    importing more than the text states.
- source_word: לַמִּלְחָמָה
  chosen: in battle
  alternatives:
  - for battle
  - to battle
  - for the battle
  lexicon: HALOT
  rationale: This phrase marks the military purpose of Israel's movement. 'In battle'
    is concise and idiomatic in English; 'for battle' would also be possible.
- source_word: וַיַּחֲנוּ
  chosen: they camped
  alternatives:
  - they encamped
  lexicon: HALOT
  rationale: Modern readable English favors 'camped' over the more archaic 'encamped,'
    while preserving the military setting.
- source_word: עַל הָאֶבֶן הָעֵזֶר
  chosen: at Ebenezer
  alternatives:
  - by the stone of help
  - at the Stone of Help
  lexicon: HALOT
  rationale: Although the Hebrew components mean 'the stone of help,' here the phrase
    functions as a place name, so transliteration is preferable per the translation
    philosophy for names. 'At' is a natural locative rendering for the camp site.
- source_word: וּפְלִשְׁתִּים חָנוּ
  chosen: while the Philistines camped
  alternatives:
  - and the Philistines camped
  lexicon: HALOT
  rationale: The conjunction simply means 'and,' but 'while' clearly conveys the contrastive
    scene-setting relationship between the two camps in idiomatic English without
    changing the sense.
- source_word: בַאֲפֵק
  chosen: at Aphek
  alternatives:
  - in Aphek
  lexicon: HALOT
  rationale: Aphek is a place name, so transliteration is appropriate. 'At' fits the
    military-camp location idiom in English.
