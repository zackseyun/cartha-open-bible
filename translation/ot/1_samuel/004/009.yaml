theological_decisions:
- issue: Gendered exhortation לַאֲנָשִׁים
  chosen_reading: be men
  alternative_readings:
  - act like men
  - show yourselves men
  rationale: Per translation philosophy, gender-accurate renderings are preferred
    where the source is grammatically masculine and rhetorically marked. Here the
    phrase is a martial exhortation addressed to male Philistine warriors; neutralizing
    it would flatten the Hebrew idiom.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Force of עבד in military subjugation
  chosen_reading: become slaves to
  alternative_readings:
  - serve
  - be subject to
  rationale: The context is fear of defeat and subjugation in war, not voluntary service.
    Rendering with 'slaves' preserves the bonded nature of the warning in line with
    the project's preference to make such force explicit when salient.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1; Contested terms table
    on δοῦλος by analogy of bonded-status explicitness
