id: 1SA.4.9
reference: 1 Samuel 4:9
source:
  edition: WLC
  text: הִֽתְחַזְּק֞וּ וִֽ/הְי֤וּ לַֽ/אֲנָשִׁים֙ פְּלִשְׁתִּ֔ים פֶּ֚ן תַּעַבְד֣וּ
    לָ/עִבְרִ֔ים כַּ/אֲשֶׁ֥ר עָבְד֖וּ לָ/כֶ֑ם וִ/הְיִיתֶ֥ם לַ/אֲנָשִׁ֖ים וְ/נִלְחַמְתֶּֽם׃
translation:
  text: Be strong and be men, O Philistines, lest you become slaves to the Hebrews
    as they have been to you. Be men and fight!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'as they were slaves to you.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'be men' is a gendered idiom of martial courage; alternatively, 'act
      like men' or 'show yourselves men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְחַזְּקוּ
  chosen: Be strong
  alternatives:
  - Strengthen yourselves
  - Take courage
  lexicon: HALOT
  rationale: Hitpael imperative plural of חזק calls for courage/strength in exhortation.
    'Be strong' is idiomatic, concise, and fits martial speech.
- source_word: וִהְיוּ לַאֲנָשִׁים
  chosen: be men
  alternatives:
  - show yourselves men
  - act like men
  lexicon: HALOT
  rationale: The idiom with היה + לאנשים is an exhortation to manly courage. 'Be men'
    preserves the gendered and rhetorical force of the Hebrew better than a neutral
    paraphrase.
- source_word: פְּלִשְׁתִּים
  chosen: O Philistines
  alternatives:
  - Philistines
  lexicon: HALOT
  rationale: Direct address is explicit in context; adding 'O' reflects vocative force
    in natural English without changing meaning.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - so that not
  lexicon: HALOT
  rationale: Introduces a warning about an undesirable outcome. 'Lest' is compact
    and accurate in elevated but still readable English.
- source_word: תַּעַבְדוּ
  chosen: you become slaves to
  alternatives:
  - you serve
  - you are enslaved to
  lexicon: HALOT
  rationale: עבד can mean serve or be enslaved, but in this military-political context
    the subjugated status is salient. 'Become slaves to' makes the threatened bondage
    explicit.
- source_word: לָעִבְרִים
  chosen: the Hebrews
  alternatives:
  - the Israelites
  lexicon: HALOT
  rationale: The source text says 'Hebrews' (עברים), a term often used by outsiders
    for Israel. It should not be harmonized to 'Israelites'.
- source_word: כַּאֲשֶׁר עָבְדוּ לָכֶם
  chosen: as they have been to you
  alternatives:
  - as they served you
  - as they were slaves to you
  lexicon: HALOT
  rationale: The comparison refers to prior subjection of the Hebrews to the Philistines.
    The supplied predicate 'been' avoids awkward repetition after 'become slaves'
    while preserving the sense. The fuller alternative is preserved in a footnote.
- source_word: וִהְיִיתֶם לַאֲנָשִׁים
  chosen: Be men
  alternatives:
  - show yourselves men
  - act like men
  lexicon: HALOT
  rationale: The repeated idiom is retained with the same English for rhetorical force
    and consistency.
- source_word: וְנִלְחַמְתֶּם
  chosen: and fight
  alternatives:
  - and do battle
  - and wage war
  lexicon: HALOT
  rationale: Simple imperative-like continuation in context of exhortation before
    battle. 'Fight' is direct and natural.
