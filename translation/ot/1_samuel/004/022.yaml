id: 1SA.4.22
reference: 1 Samuel 4:22
source:
  edition: WLC
  text: וַ/תֹּ֕אמֶר גָּלָ֥ה כָב֖וֹד מִ/יִּשְׂרָאֵ֑ל כִּ֥י נִלְקַ֖ח אֲר֥וֹן הָ/אֱלֹהִֽים׃פ
translation:
  text: And she said, “The glory has departed from Israel, because the ark of God
    has been taken.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The glory is gone into exile from Israel.' The Hebrew verb can carry
      the sense of going into exile or being removed.
    reason: lexical_alternative
  - marker: b
    text: Or, 'for the ark of God was taken.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: And she said
  alternatives:
  - Then she said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And she said' is a natural,
    sufficiently formal rendering in English narrative style.
- source_word: גָּלָה
  chosen: has departed
  alternatives:
  - is gone into exile
  - has gone away
  lexicon: HALOT
  rationale: The verb גלה commonly carries the sense of going into exile or being
    removed. With כָבוֹד as subject, idiomatic English is 'has departed,' preserving
    the sense of removal without awkwardly personifying 'glory' as exiled.
- source_word: כָבוֹד
  chosen: the glory
  alternatives:
  - glory
  - honor
  lexicon: HALOT
  rationale: כָבוֹד here refers to the weighty honor/glory associated with God's presence
    among Israel. 'The glory' best captures the theological force in context and echoes
    the naming theme around Ichabod in the immediate passage.
- source_word: מִיִּשְׂרָאֵל
  chosen: from Israel
  alternatives:
  - out of Israel
  lexicon: HALOT
  rationale: The preposition מן marks separation/removal. 'From Israel' is the most
    natural English expression.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי gives the reason for the statement. 'Because' is clearer in
    contemporary English than the more formal 'for.'
- source_word: נִלְקַח
  chosen: has been taken
  alternatives:
  - was taken
  - has been captured
  lexicon: HALOT
  rationale: The Niphal of לקח is passive, 'was/has been taken.' 'Has been taken'
    fits the immediate-result sense in English. 'Captured' is interpretive and narrower
    than the Hebrew.
- source_word: אֲרוֹן הָאֱלֹהִים
  chosen: the ark of God
  alternatives:
  - God's ark
  lexicon: HALOT
  rationale: The construct phrase is straightforward. 'The ark of God' preserves the
    formal dignity and familiar biblical expression without importing later terminology
    not present in the Hebrew.
