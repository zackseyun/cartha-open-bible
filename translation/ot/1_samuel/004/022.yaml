theological_decisions:
- issue: Meaning of 'the glory' in relation to Israel and the ark
  chosen_reading: '''The glory'' refers to the loss/removal of the manifested honor
    and presence associated with God among Israel, expressed without over-specifying
    a technical doctrine of presence.'
  alternative_readings:
  - '''Glory'' as Israel''s national honor'
  - '''Glory'' as a near-synonym for God himself departing'
  rationale: The immediate context links the statement to the capture of the ark,
    so the phrase carries theological weight beyond mere military shame. At the same
    time, the text does not explicitly define a metaphysical doctrine of God's presence
    in the ark, so the translation preserves the biblical tension rather than resolving
    it.
  doctrine_reference: Preserve theological tension rather than resolve it.
