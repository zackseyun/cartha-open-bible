id: 1SA.4.17
reference: 1 Samuel 4:17
source:
  edition: WLC
  text: וַ/יַּ֨עַן הַֽ/מְבַשֵּׂ֜ר וַ/יֹּ֗אמֶר נָ֤ס יִשְׂרָאֵל֙ לִ/פְנֵ֣י פְלִשְׁתִּ֔ים וְ/גַ֛ם מַגֵּפָ֥ה גְדוֹלָ֖ה הָיְתָ֣ה בָ/עָ֑ם וְ/גַם שְׁנֵ֨י בָנֶ֜י/ךָ מֵ֗תוּ חָפְנִי֙ וּ/פִ֣ינְחָ֔ס וַ/אֲר֥וֹן הָ/אֱלֹהִ֖ים נִלְקָֽחָה־׃פ
translation:
  text: The messenger answered and said[a], “Israel has fled before the Philistines, and there has also been a great slaughter among the people; and your two sons also are dead, Hophni and Phinehas[b]; and the ark of God has been taken.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “there has been a great defeat among the people.” The Hebrew term can denote a severe blow, plague, or slaughter; here the battle context favors “slaughter.”
    reason: lexical_alternative
  - marker: b
    text: Or, “the ark of God was captured.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְבַשֵּׂר
  chosen: the messenger
  alternatives:
  - the bearer of news
  - the one bringing the report
  lexicon: HALOT
  rationale: The participial form denotes the one bringing news. 'Messenger' is natural modern English and fits the narrative context better than a more wooden 'bearer of news.'
- source_word: נָס
  chosen: has fled
  alternatives:
  - fled
  - has been routed
  lexicon: HALOT
  rationale: The verb means 'flee.' Present perfect in English fits the report of a just-completed event. 'Has been routed' interprets the cause/result more than the Hebrew states.
- source_word: לִפְנֵי פְלִשְׁתִּים
  chosen: before the Philistines
  alternatives:
  - from before the Philistines
  - before the face of the Philistines
  lexicon: HALOT
  rationale: The idiom means fleeing before an enemy. 'Before the Philistines' is idiomatic enough in English while preserving the Hebrew sense of retreat in their presence.
- source_word: מַגֵּפָה גְדוֹלָה
  chosen: a great slaughter
  alternatives:
  - a great blow
  - a great plague
  - a great defeat
  lexicon: HALOT
  rationale: In battle context מַגֵּפָה commonly refers to a severe blow or slaughter among troops, not necessarily disease. 'Great slaughter' best conveys the military disaster in clear English.
- source_word: בָעָם
  chosen: among the people
  alternatives:
  - among the troops
  - among the army
  lexicon: HALOT
  rationale: The Hebrew says 'the people.' In this context it refers to Israelite forces, but retaining 'people' stays closer to the source while remaining understandable.
- source_word: שְׁנֵי בָנֶיךָ
  chosen: your two sons
  alternatives:
  - both your sons
  lexicon: HALOT
  rationale: A direct and natural rendering of the construct phrase; it preserves the emphasis on the two specific sons.
- source_word: מֵתוּ
  chosen: have died
  alternatives:
  - died
  - are dead
  lexicon: HALOT
  rationale: The perfect reports completed action. 'Have died' fits the messenger's report style in English.
- source_word: חָפְנִי וּפִינְחָס
  chosen: Hophni and Phinehas
  rationale: Personal names are transliterated by standard convention per project philosophy.
- source_word: אֲרוֹן הָאֱלֹהִים
  chosen: the ark of God
  alternatives:
  - the ark of the true God
  lexicon: HALOT
  rationale: The standard Hebrew phrase is best rendered straightforwardly as 'the ark of God.' No need to expand the genitive beyond the source text.
- source_word: נִלְקָחָה
  chosen: has been taken
  alternatives:
  - was captured
  - has been captured
  lexicon: HALOT
  rationale: The passive form means 'was taken.' 'Has been taken' preserves the passive and suits the immediacy of the report; 'captured' is a valid contextual gloss but slightly more interpretive.
