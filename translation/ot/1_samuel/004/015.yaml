id: 1SA.4.15
reference: 1 Samuel 4:15
source:
  edition: WLC
  text: וְ/עֵלִ֕י בֶּן תִּשְׁעִ֥ים וּ/שְׁמֹנֶ֖ה שָׁנָ֑ה וְ/עֵינָ֣י/ו קָ֔מָה וְ/לֹ֥א
    יָכ֖וֹל לִ/רְאֽוֹת־׃
translation:
  text: Now Eli was ninety-eight years old, and his eyes were fixed so that he could
    not see.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his eyes were set/stiff'; the Hebrew describes the condition of his
      eyes in a way that implies blindness.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן תִּשְׁעִים וּשְׁמֹנֶה שָׁנָה
  chosen: was ninety-eight years old
  alternatives:
  - was a son of ninety-eight years
  - was ninety and eight years old
  lexicon: HALOT
  rationale: The Hebrew idiom 'son of X years' is naturally rendered in English as
    'X years old.' 'Ninety-eight' is the standard modern form.
- source_word: וְעֵינָיו
  chosen: his eyes
  lexicon: HALOT
  rationale: Straightforward rendering of the plural noun with 3ms suffix.
- source_word: קָמָה
  chosen: were fixed
  alternatives:
  - were set
  - were stiff
  - were dim
  lexicon: HALOT
  rationale: From קום in this context, the sense is that Eli's eyes had become fixed/stiff,
    describing loss of visual function. 'Were fixed' preserves the concrete imagery
    better than the interpretive 'were dim,' while still making sense in English.
- source_word: וְלֹא יָכֹל לִרְאוֹת
  chosen: so that he could not see
  alternatives:
  - and he was unable to see
  - and he could not see
  lexicon: HALOT
  rationale: This clause expresses the result of the condition of his eyes. 'So that
    he could not see' makes the relationship clear in natural English without adding
    content.
- source_word: וְ
  chosen: Now
  alternatives:
  - And
  lexicon: HALOT
  rationale: Clause-initial waw here functions smoothly as a narrative transition.
    'Now' is idiomatic English and fits optimal equivalence better than a wooden 'And.'
