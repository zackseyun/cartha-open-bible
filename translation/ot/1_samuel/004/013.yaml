id: 1SA.4.13
reference: 1 Samuel 4:13
source:
  edition: WLC
  text: וַ/יָּב֗וֹא וְ/הִנֵּ֣ה עֵ֠לִי יֹשֵׁ֨ב עַֽל הַ/כִּסֵּ֜א יך דֶּ֨רֶךְ֙ מְצַפֶּ֔ה
    כִּֽי הָיָ֤ה לִבּ/וֹ֙ חָרֵ֔ד עַ֖ל אֲר֣וֹן הָ/אֱלֹהִ֑ים וְ/הָ/אִ֗ישׁ בָּ֚א לְ/הַגִּ֣יד
    בָּ/עִ֔יר וַ/תִּזְעַ֖ק כָּל הָ/עִֽיר־־־׃
translation:
  text: When he came, behold, Eli was sitting on the seat by the road, watching, because
    his heart trembled for the ark of God. And the man came to report it in the city,
    and the whole city cried out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''by the hand/side of the road,'' an idiom meaning beside the road
      or at the roadside.'
    reason: cultural_note
  - marker: b
    text: Or 'because his heart was anxious for the ark of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: When he came
  alternatives:
  - And he came
  - Now he came
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. Rendering with 'When he came'
    makes the temporal connection to the following scene natural in English while
    preserving the basic sense of בוא.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - there was
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention to the scene. 'Behold'
    preserves the vividness and abruptness better than a flatter paraphrase.
- source_word: יֹשֵׁב עַל־הַכִּסֵּא
  chosen: was sitting on the seat
  alternatives:
  - was sitting on his chair
  - sat on the seat
  lexicon: HALOT
  rationale: The participle plus preposition describes Eli's seated posture. 'Seat'
    is more neutral and closer to כִּסֵּא than the more domestic 'chair.'
- source_word: יַד דֶּרֶךְ
  chosen: by the road
  alternatives:
  - beside the road
  - at the roadside
  lexicon: HALOT
  rationale: The idiom literally involves 'hand/side of the way' and means beside
    the road. 'By the road' is idiomatic modern English and preserves the locative
    sense.
- source_word: מְצַפֶּה
  chosen: watching
  alternatives:
  - keeping watch
  - looking out
  lexicon: HALOT
  rationale: The participle from צפה conveys watchful expectation. 'Watching' is concise
    and fits Eli's anxious waiting.
- source_word: כִּי הָיָה לִבּוֹ חָרֵד
  chosen: because his heart trembled
  alternatives:
  - for his heart was trembling
  - because his heart was anxious
  lexicon: HALOT
  rationale: חָרֵד denotes trembling, fear, or anxious agitation. 'His heart trembled'
    preserves the concrete Hebrew expression and emotional force without overinterpreting.
- source_word: עַל אֲרוֹן הָאֱלֹהִים
  chosen: for the ark of God
  alternatives:
  - about the ark of God
  - concerning the ark of God
  lexicon: HALOT
  rationale: With חרד, עַל marks the object of concern. 'For the ark of God' is natural
    English and conveys Eli's anxious concern.
- source_word: וְהָאִישׁ
  chosen: And the man
  alternatives:
  - And that man
  - Now the man
  lexicon: HALOT
  rationale: The noun refers back to the previously mentioned messenger. 'The man'
    preserves the anaphoric reference without adding interpretive detail.
- source_word: לְהַגִּיד
  chosen: to report it
  alternatives:
  - to tell
  - to announce
  lexicon: HALOT
  rationale: The infinitive means to tell or report. 'Report it' fits the messenger
    context and makes explicit in English that he is reporting the battle news, an
    object implied by context.
- source_word: בָּעִיר
  chosen: in the city
  alternatives:
  - to the city
  lexicon: HALOT
  rationale: The preposition ב normally indicates location here. The man arrives and
    gives the report within the city.
- source_word: וַתִּזְעַק כָּל הָעִיר
  chosen: the whole city cried out
  alternatives:
  - all the city cried out
  - the whole city raised a cry
  lexicon: HALOT
  rationale: זעק denotes a cry of distress or alarm. 'Cried out' is natural and preserves
    the communal outcry in response to the report.
