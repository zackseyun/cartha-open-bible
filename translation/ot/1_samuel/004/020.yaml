id: 1SA.4.20
reference: 1 Samuel 4:20
source:
  edition: WLC
  text: וּ/כְ/עֵ֣ת מוּתָ֗/הּ וַ/תְּדַבֵּ֨רְנָה֙ הַ/נִּצָּב֣וֹת עָלֶ֔י/הָ אַל תִּֽירְאִ֖י
    כִּ֣י בֵ֣ן יָלָ֑דְתְּ וְ/לֹ֥א עָנְתָ֖ה וְ/לֹא שָׁ֥תָה לִבָּֽ/הּ־־׃
translation:
  text: And about the time of her death, the women standing by her said, “Do not fear,
    for you have borne a son.” But she did not answer, nor did she take it to heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “she did not set her heart on it,” that is, she paid no attention to
      what they said.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְעֵת
  chosen: about the time of
  alternatives:
  - as
  - when
  - at the time of
  lexicon: HALOT
  rationale: The compound conjunction-preposition-noun introduces a temporal setting.
    'About the time of' reflects the idiomatic sense in context and reads naturally
    in English without over-paraphrasing.
- source_word: מוּתָהּ
  chosen: her death
  alternatives:
  - her dying
  - when she died
  lexicon: HALOT
  rationale: The infinitive/verb form with pronominal suffix denotes the event of
    dying. 'Her death' is concise and fits the temporal phrase smoothly; 'her dying'
    is possible but less idiomatic here.
- source_word: וַתְּדַבֵּרְנָה
  chosen: said
  alternatives:
  - spoke
  - were speaking
  lexicon: HALOT
  rationale: The wayyiqtol feminine plural narrates the action of the women addressing
    her. 'Said' is the most natural English rendering before direct speech.
- source_word: הַנִּצָּבוֹת עָלֶיהָ
  chosen: the women standing by her
  alternatives:
  - the women attending her
  - those stationed over her
  - the women beside her
  lexicon: HALOT
  rationale: The participle from נצב with על in this context refers to women present
    beside or attending her in childbirth. 'Standing by her' preserves the concrete
    image while remaining idiomatic.
- source_word: אַל תִּירְאִי
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: A standard negative jussive/prohibitive expression. 'Do not fear' is
    slightly more formal and concise, matching the gravity of the scene.
- source_word: כִּי בֵן יָלָדְתְּ
  chosen: for you have borne a son
  alternatives:
  - for you have given birth to a son
  - because you have borne a son
  lexicon: HALOT
  rationale: The clause gives the reason for reassurance. 'Borne a son' is faithful
    and natural; it preserves the maternal nuance of ילד without unnecessary expansion.
- source_word: וְלֹא עָנְתָה
  chosen: she did not answer
  alternatives:
  - she did not respond
  lexicon: HALOT
  rationale: ענה in this stem commonly means 'answer/respond.' 'Answer' is the straightforward
    narrative rendering.
- source_word: וְלֹא שָׁתָה לִבָּהּ
  chosen: she did not take it to heart
  alternatives:
  - she did not set her heart on it
  - her heart paid no attention
  - she did not pay attention
  lexicon: HALOT
  rationale: The idiom שׁית/שׂים לב means to set one's heart/mind to something, that
    is, to take notice or take to heart. 'Take it to heart' preserves the heart-language
    while communicating the idiomatic sense in modern English.
