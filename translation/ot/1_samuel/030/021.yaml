id: 1SA.30.21
reference: 1 Samuel 30:21
source:
  edition: WLC
  text: וַ/יָּבֹ֣א דָוִ֗ד אֶל מָאתַ֨יִם הָ/אֲנָשִׁ֜ים אֲשֶֽׁר פִּגְּר֣וּ מִ/לֶּ֣כֶת אַחֲרֵ֣י דָוִ֗ד וַ/יֹּֽשִׁיבֻ/ם֙ בְּ/נַ֣חַל הַ/בְּשׂ֔וֹר וַ/יֵּֽצְאוּ֙ לִ/קְרַ֣את דָּוִ֔ד וְ/לִ/קְרַ֖את הָ/עָ֣ם אֲשֶׁר אִתּ֑/וֹ וַ/יִּגַּ֤שׁ דָּוִד֙ אֶת הָ/עָ֔ם וַ/יִּשְׁאַ֥ל לָ/הֶ֖ם לְ/שָׁלֽוֹם־־׀׀־־׃ס
translation:
  text: David came to the two hundred men who had become too exhausted to follow after David[a], and whom they had left at the Brook Besor. They came out to meet David and to meet the people who were with him[b], and David approached the people and asked them how they were.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'asked them about their welfare.' The Hebrew idiom literally refers to asking concerning peace/well-being.
    reason: lexical_alternative
  - marker: b
    text: Or 'had been left behind' / 'were too weary to go on after David' for the clause describing the two hundred men.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּגְּרוּ
  chosen: had become too exhausted
  alternatives:
  - had lagged behind
  - had been left behind
  - were too weary
  lexicon: HALOT
  rationale: The verb conveys becoming faint, exhausted, or unable to continue. In context it explains why the two hundred did not continue with David. 'Had become too exhausted' makes the causal sense explicit without over-paraphrasing.
- source_word: מִלֶּכֶת אַחֲרֵי דָוִד
  chosen: to follow after David
  alternatives:
  - from going after David
  - to go on after David
  lexicon: HALOT
  rationale: Infinitive with מן after פּגר expresses inability or cessation from continuing. 'To follow after David' is idiomatic English and preserves the sense of accompanying him onward.
- source_word: וַיֹּשִׁיבֻם
  chosen: they had left them
  alternatives:
  - he had stationed them
  - he had settled them there
  - they had made them stay
  lexicon: HALOT
  rationale: The Hiphil of ישׁב can mean cause to sit/dwell, set, or leave in a place. Given the immediately preceding plural subject ('the two hundred men') and the later plural verb ('they came out'), the most natural sense is that David's party had left these men at the brook while continuing on. English uses an impersonal/plural construction naturally here.
- source_word: בְּנַחַל הַבְּשׂוֹר
  chosen: at the Brook Besor
  alternatives:
  - at Wadi Besor
  - in the valley of Besor
  lexicon: HALOT
  rationale: נחל can denote a wadi, torrent-bed, or brook/valley. 'Brook Besor' is a familiar and readable rendering in this narrative context; capitalizing 'Brook' treats it as part of the place designation.
- source_word: לִקְרַאת
  chosen: to meet
  alternatives:
  - to greet
  - to encounter
  lexicon: HALOT
  rationale: The infinitive indicates going out for an encounter or reception. 'To meet' is the most straightforward and neutral rendering in context.
- source_word: הָעָם אֲשֶׁר אִתּוֹ
  chosen: the people who were with him
  alternatives:
  - the troops with him
  - the men who were with him
  lexicon: HALOT
  rationale: עָם here refers to David's accompanying group broadly, not necessarily all Israel. 'People' preserves the Hebrew term without narrowing it too much to soldiers, though the context is a fighting band.
- source_word: וַיִּגַּשׁ ... אֶת הָעָם
  chosen: David approached the people
  alternatives:
  - David came near to the people
  - David greeted the people
  lexicon: HALOT
  rationale: נגשׁ means draw near/approach. Since greeting is expressed in the next clause, 'approached' avoids collapsing two actions into one.
- source_word: וַיִּשְׁאַל לָהֶם לְשָׁלוֹם
  chosen: asked them how they were
  alternatives:
  - asked them about their welfare
  - greeted them
  - asked them for peace
  lexicon: HALOT
  rationale: The idiom שׁאל לשלום means to inquire about someone's well-being or welfare. 'Asked them how they were' is natural modern English that preserves the interpersonal sense of the idiom.
