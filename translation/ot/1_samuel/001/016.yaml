id: 1SA.1.16
reference: 1 Samuel 1:16
source:
  edition: WLC
  text: אַל תִּתֵּן֙ אֶת אֲמָ֣תְ/ךָ֔ לִ/פְנֵ֖י בַּת בְּלִיָּ֑עַל כִּֽי מֵ/רֹ֥ב שִׂיחִ֛/י
    וְ/כַעְסִ֖/י דִּבַּ֥רְתִּי עַד הֵֽנָּה־־־־־׃
translation:
  text: Do not regard your servant as a worthless woman, for out of the abundance
    of my complaint and my vexation I have spoken until now.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'a daughter of worthlessness,' an idiom for a morally
      contemptible or disreputable woman.
    reason: lexical_alternative
  - marker: b
    text: Or 'out of my great complaint and vexation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּתֵּן
  chosen: Do not regard
  alternatives:
  - Do not give
  - Do not count
  - Do not consider
  lexicon: HALOT
  rationale: Although נתן is literally 'give/put,' in the idiom with לִפְנֵי and a
    predicate noun it means to treat, regard, or consider someone as something. 'Regard'
    is natural English and preserves the sense without wooden literalism.
- source_word: אֲמָתְךָ
  chosen: your servant
  alternatives:
  - your maidservant
  - your female servant
  lexicon: HALOT
  rationale: The term specifically denotes a female servant/maidservant. 'Your servant'
    is smoother modern English in direct address while still reflecting Hannah's humble
    self-reference; the feminine sense is retained by the following 'woman.'
- source_word: לִפְנֵי
  chosen: as
  alternatives:
  - before
  - in the presence of
  lexicon: HALOT
  rationale: In this idiom, the preposition contributes to the sense 'regard as' rather
    than a spatial meaning. Rendering it separately as 'before' would be misleading
    in English.
- source_word: בַּת בְּלִיָּעַל
  chosen: a worthless woman
  alternatives:
  - a wicked woman
  - a daughter of worthlessness
  - a base woman
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'daughter of worthlessness' and denotes
    a morally contemptible or disreputable person. 'Worthless woman' preserves the
    idiomatic force and gender. 'Wicked woman' is possible but slightly more interpretive.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces Hannah's explanation to Eli. 'For' fits the explanatory tone
    and connects naturally to the preceding plea.
- source_word: מֵרֹב
  chosen: out of the abundance of
  alternatives:
  - from the greatness of
  - because of the abundance of
  - from much
  lexicon: HALOT
  rationale: This preserves the causal nuance and the image of overflowing inner distress
    that motivates her speech.
- source_word: שִׂיחִי
  chosen: my complaint
  alternatives:
  - my meditation
  - my troubled musing
  - my anguish
  lexicon: HALOT
  rationale: The noun can denote musing, complaint, or troubled meditation depending
    on context. Here Hannah is explaining distressed prayer that Eli misread, so 'complaint'
    best captures anguished utterance directed before God.
- source_word: וְכַעְסִי
  chosen: my provocation
  alternatives:
  - my vexation
  - my grief
  - my indignation
  lexicon: HALOT
  rationale: The noun can refer to vexation, irritation, or provocation. In context
    it points to the inner distress stirred up by her situation, not sinful anger.
    'Provocation' preserves the sense of being deeply agitated or provoked.
- source_word: דִּבַּרְתִּי
  chosen: I have spoken
  alternatives:
  - I spoke
  lexicon: HALOT
  rationale: The perfect here explains her ongoing action up to the present moment.
    English present perfect communicates that she has been speaking/praying until
    now.
- source_word: עַד הֵנָּה
  chosen: until now
  alternatives:
  - until here
  - this long
  lexicon: HALOT
  rationale: This idiom refers to time up to the present point, not location. 'Until
    now' is the clearest natural rendering.
