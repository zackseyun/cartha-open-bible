theological_decisions:
- issue: Referent of the pronoun in מֵעִמּוֹ
  chosen_reading: The pronoun refers to God, not Eli.
  alternative_readings:
  - The pronoun could be taken more ambiguously in English if left unspecified.
  rationale: In context Hannah has just said she was pouring out her soul before the
    LORD, so Eli's blessing naturally refers to the request she asked from God. Rendering
    'from him' preserves the Hebrew pronoun while the surrounding clause makes the
    referent clear.
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    context sufficiently clarifies the referent, so no ambiguity needs to be artificially
    maintained.
