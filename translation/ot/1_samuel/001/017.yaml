id: 1SA.1.17
reference: 1 Samuel 1:17
source:
  edition: WLC
  text: וַ/יַּ֧עַן עֵלִ֛י וַ/יֹּ֖אמֶר לְכִ֣י לְ/שָׁל֑וֹם וֵ/אלֹהֵ֣י יִשְׂרָאֵ֗ל יִתֵּן֙
    אֶת שֵׁ֣לָתֵ֔/ךְ אֲשֶׁ֥ר שָׁאַ֖לְתְּ מֵ/עִמּֽ/וֹ־׃
translation:
  text: Then Eli answered and said, “Go in peace, and may the God of Israel grant
    your petition that you have asked from him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your request.' The Hebrew term refers to what was asked for in prayer.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: ענה in the Qal wayyiqtol commonly introduces a reply in dialogue. 'Answered'
    is the standard concise English equivalent and fits the narrative exchange.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: אמר is the common verb of speech. 'Said' preserves the straightforward
    narrative style without over-interpretation.
- source_word: לְכִי
  chosen: Go
  alternatives:
  - Go on
  - Depart
  lexicon: HALOT
  rationale: Imperative feminine singular of הלך addressed to Hannah. 'Go' is the
    natural direct rendering in English.
- source_word: לְשָׁלוֹם
  chosen: in peace
  alternatives:
  - peacefully
  - for peace
  lexicon: HALOT
  rationale: The idiom לך לשלום means 'go in peace' or 'go safely/well.' 'Go in peace'
    is both idiomatic English and faithful to the Hebrew blessing formula.
- source_word: וֵאלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct phrase naming Israel's God. The definite article is natural
    in English though not separately marked on the construct form.
- source_word: יִתֵּן
  chosen: may ... grant
  alternatives:
  - give
  - will give
  lexicon: HALOT
  rationale: נתן literally means 'give,' but in prayer/blessing contexts with an expressed
    wish, English 'may ... grant' best conveys the jussive-like force and the sense
    of granting a request.
- source_word: שֵׁלָתֵךְ
  chosen: your petition
  alternatives:
  - your request
  - what you asked for
  lexicon: HALOT
  rationale: שאלה here denotes the thing requested or petition. 'Petition' preserves
    the formal prayer context better than the more casual 'request.'
- source_word: אֲשֶׁר שָׁאַלְתְּ
  chosen: that you have asked
  alternatives:
  - which you asked
  - that you asked
  lexicon: HALOT
  rationale: This relative clause modifies 'petition.' The English present perfect
    'have asked' reads naturally while still reflecting a completed prior action with
    present relevance.
- source_word: מֵעִמּוֹ
  chosen: from him
  alternatives:
  - of him
  - from before him
  lexicon: HALOT
  rationale: 'The pronoun most naturally refers to God in context: Hannah''s petition
    was asked from God. ''From him'' is the clearest idiomatic rendering.'
