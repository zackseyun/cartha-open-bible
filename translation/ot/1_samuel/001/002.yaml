id: 1SA.1.2
reference: 1 Samuel 1:2
source:
  edition: WLC
  text: וְ/ל/וֹ֙ שְׁתֵּ֣י נָשִׁ֔ים שֵׁ֤ם אַחַת֙ חַנָּ֔ה וְ/שֵׁ֥ם הַ/שֵּׁנִ֖ית פְּנִנָּ֑ה וַ/יְהִ֤י לִ/פְנִנָּה֙ יְלָדִ֔ים וּ/לְ/חַנָּ֖ה אֵ֥ין יְלָדִֽים׃
translation:
  text: He had two wives. The name of one was Hannah[a], and the name of the second was Peninnah. Peninnah had children, but Hannah had no children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And to him were two wives.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹו
  chosen: He had
  alternatives:
  - And he had
  - And to him were
  lexicon: HALOT
  rationale: The prepositional possession construction literally means 'and to him,' but idiomatic English expresses this as 'he had.' The conjunction is absorbed into the sentence flow rather than mechanically repeated.
- source_word: שְׁתֵּי נָשִׁים
  chosen: two wives
  alternatives:
  - two women
  lexicon: HALOT
  rationale: In this marital context, נָשִׁים clearly means 'wives,' not merely 'women.' This preserves the polygynous household setting stated by the Hebrew.
- source_word: שֵׁם אַחַת ... וְשֵׁם הַשֵּׁנִית
  chosen: The name of one ... and the name of the second
  alternatives:
  - One was named ... and the other was named
  - the name of the one ... and the name of the other
  lexicon: HALOT
  rationale: The Hebrew repeats 'name' in a formal identification formula. The English keeps that structure in a readable way, preserving the deliberate parallelism.
- source_word: חַנָּה
  chosen: Hannah
  rationale: Personal name transliterated by standard English convention, per translation philosophy.
- source_word: פְּנִנָּה
  chosen: Peninnah
  rationale: Personal name transliterated by standard English convention, per translation philosophy.
- source_word: וַיְהִי לִפְנִנָּה יְלָדִים
  chosen: Peninnah had children
  alternatives:
  - Peninnah had sons and daughters
  - there were children for Peninnah
  lexicon: HALOT
  rationale: The existential/possessive clause is rendered idiomatically in English as possession. יְלָדִים is the broad term 'children'; the Hebrew does not specify sons and daughters here, though that appears in the next verse.
- source_word: וּלְחַנָּה אֵין יְלָדִים
  chosen: but Hannah had no children
  alternatives:
  - and Hannah had no children
  - but for Hannah there were no children
  lexicon: HALOT
  rationale: אֵין marks nonexistence, rendered idiomatically as 'had no.' 'But' brings out the contrast between Peninnah and Hannah that is implicit in the juxtaposition and central to the narrative.
