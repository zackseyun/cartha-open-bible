id: 1SA.1.18
reference: 1 Samuel 1:18
source:
  edition: WLC
  text: וַ/תֹּ֕אמֶר תִּמְצָ֧א שִׁפְחָתְ/ךָ֛ חֵ֖ן בְּ/עֵינֶ֑י/ךָ וַ/תֵּ֨לֶךְ הָ/אִשָּׁ֤ה
    לְ/דַרְכָּ/הּ֙ וַ/תֹּאכַ֔ל וּ/פָנֶ֥י/הָ לֹא הָיוּ לָ֖/הּ עֽוֹד־־׃
translation:
  text: She said, “May your servant find favor in your eyes.” Then the woman went
    on her way and ate, and her face was no longer downcast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'May your female servant find favor in your eyes.'
    reason: lexical_alternative
  - marker: b
    text: Or, more literally, 'her face was no longer [as it had been before],' meaning
      her expression no longer showed her grief.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּמְצָא
  chosen: May ... find
  alternatives:
  - let ... find
  - might ... find
  lexicon: HALOT
  rationale: The imperfect/jussive-like form in direct speech expresses a polite wish
    or request formula. English idiom is best captured with 'May your servant find...'
    rather than a flat future 'will find.'
- source_word: שִׁפְחָתְךָ
  chosen: your servant
  alternatives:
  - your maidservant
  - your female servant
  lexicon: HALOT
  rationale: The term is explicitly feminine ('female servant/slave'), used here as
    a deferential self-reference by Hannah to Eli. 'Your servant' is natural modern
    English in respectful address, while the feminine nuance is not crucial to the
    sense in English because the speaker is already identified as 'she.'
- source_word: חֵן בְּעֵינֶיךָ
  chosen: find favor in your eyes
  alternatives:
  - find grace in your sight
  - find favor with you
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for receiving favorable regard. 'Find favor
    in your eyes' preserves the Hebrew imagery while remaining understandable in modern
    English.
- source_word: לְדַרְכָּהּ
  chosen: went on her way
  alternatives:
  - went her way
  - went to her way
  lexicon: HALOT
  rationale: The phrase is idiomatic for departing and continuing on one's course.
    'Went on her way' is natural English and reflects the directional sense without
    wooden literalism.
- source_word: וַתֹּאכַל
  chosen: ate
  alternatives:
  - did eat
  - began to eat
  lexicon: HALOT
  rationale: The simple wayyiqtol narrates the next action. 'Ate' is the straightforward
    rendering and contextually significant because her prior distress had kept her
    from normal composure.
- source_word: וּפָנֶיהָ לֹא הָיוּ לָהּ עוֹד
  chosen: her face was no longer downcast
  alternatives:
  - her face was no longer sad
  - her countenance was no longer as before
  - her face was no longer [the same]
  lexicon: HALOT
  rationale: Literally, 'her face was not to her anymore/further.' The Hebrew idiom
    implies that her appearance no longer reflected grief. 'Downcast' conveys the
    emotional and visible change without overinterpreting beyond the context.
