id: 1SA.1.24
reference: 1 Samuel 1:24
source:
  edition: WLC
  text: וַ/תַּעֲלֵ֨/הוּ עִמָּ֜/הּ כַּ/אֲשֶׁ֣ר גְּמָלַ֗תּ/וּ בְּ/פָרִ֤ים שְׁלֹשָׁה֙
    וְ/אֵיפָ֨ה אַחַ֥ת קֶ֨מַח֙ וְ/נֵ֣בֶל יַ֔יִן וַ/תְּבִאֵ֥/הוּ בֵית יְהוָ֖ה שִׁל֑וֹ
    וְ/הַ/נַּ֖עַר נָֽעַר־׃
translation:
  text: When she had weaned him, she took him up with her, along with three bulls,
    one ephah of flour, and a skin of wine, and brought him to the house of the LORD
    at Shiloh. Now the boy was young.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''three bulls''; some ancient witnesses and interpreters read ''a
      three-year-old bull.'''
    reason: textual_variant
lexical_decisions:
- source_word: וַתַּעֲלֵהוּ
  chosen: she took him up
  alternatives:
  - she brought him up
  - she took him
  lexicon: HALOT
  rationale: The verb עלה literally means 'go up/bring up.' In this pilgrimage context,
    'took him up' preserves the directional nuance toward the sanctuary while remaining
    natural English. 'Brought him up' is possible, but the later וַתְּבִאֵהוּ is better
    reserved for 'brought him,' so varying the English helps reflect the two Hebrew
    verbs.
- source_word: כַּאֲשֶׁר גְּמָלַתּוּ
  chosen: When she had weaned him
  alternatives:
  - after she had weaned him
  lexicon: HALOT
  rationale: גמל in this context refers to weaning a child, not merely completing
    or repaying. 'When she had weaned him' is idiomatic and fits the temporal clause
    introduced by כַּאֲשֶׁר.
- source_word: עִמָּהּ
  chosen: with her
  lexicon: HALOT
  rationale: Straightforward accompaniment marker; retained explicitly because it
    is present in the Hebrew and clarifies that Samuel went with Hannah.
- source_word: בְּפָרִים שְׁלֹשָׁה
  chosen: along with three bulls
  alternatives:
  - with three bulls
  - with a three-year-old bull
  lexicon: HALOT
  rationale: The MT reads 'three bulls' plainly. Some ancient versions and interpreters
    support 'a three-year-old bull,' likely to harmonize with v. 25, but the consonantal
    Hebrew here is best represented as 'three bulls.' The alternative is preserved
    in a footnote because it is a notable textual/interpretive issue.
- source_word: וְאֵיפָה אַחַת קֶמַח
  chosen: one ephah of flour
  alternatives:
  - an ephah of meal
  lexicon: HALOT
  rationale: אֵיפָה is a dry measure best transliterated as 'ephah' rather than converted
    approximately, preserving the ancient unit. קֶמַח is 'flour'; 'meal' is possible
    but less precise in contemporary English.
- source_word: וְנֵבֶל יַיִן
  chosen: and a skin of wine
  alternatives:
  - and a jar of wine
  - and a wineskin of wine
  lexicon: HALOT
  rationale: נֵבֶל here denotes a container, commonly understood as a skin-bottle
    or wineskin. 'A skin of wine' is concise and natural. 'Jar' is possible in some
    contexts, but the skin-container sense is widely recognized.
- source_word: וַתְּבִאֵהוּ
  chosen: and brought him
  alternatives:
  - and she brought him
  lexicon: HALOT
  rationale: בוא in the hiphil means 'bring.' This is the main arrival verb, so 'brought
    him' is the clearest rendering and complements the earlier 'took him up.'
- source_word: בֵית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the LORD's house
  lexicon: HALOT
  rationale: Standard rendering for the sanctuary. Per doctrine, יְהוָה is rendered
    'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'Follows the project''s contested-terms policy for the divine name: ''the
    LORD'' in line with Jewish reverence tradition and longstanding English convention.'
- source_word: שִׁלֹה
  chosen: at Shiloh
  alternatives:
  - to Shiloh
  lexicon: HALOT
  rationale: Shiloh is transliterated as a place name. English idiom prefers 'at Shiloh'
    with 'the house of the LORD,' though the destination sense is still clear.
- source_word: וְהַנַּעַר נָעַר
  chosen: Now the boy was young
  alternatives:
  - and the boy was a boy
  - and the child was young
  lexicon: HALOT
  rationale: The Hebrew repeats נער for emphasis or vividness. A literal 'the boy
    was a boy' is awkward in English. 'Now the boy was young' preserves the sense
    that Samuel was still very young at this point.
