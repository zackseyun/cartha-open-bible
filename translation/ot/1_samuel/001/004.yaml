id: 1SA.1.4
reference: 1 Samuel 1:4
source:
  edition: WLC
  text: וַ/יְהִ֣י הַ/יּ֔וֹם וַ/יִּזְבַּ֖ח אֶלְקָנָ֑ה וְ/נָתַ֞ן לִ/פְנִנָּ֣ה אִשְׁתּ֗/וֹ
    וּֽ/לְ/כָל בָּנֶ֛י/הָ וּ/בְנוֹתֶ֖י/הָ מָנֽוֹת־׃
translation:
  text: And when the day came, Elkanah sacrificed and gave portions to Peninnah his
    wife and to all her sons and daughters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and he gave portions'; the Hebrew form can be read as simple past, but
      the context favors a customary action at the recurring sacrificial meal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי הַיּוֹם
  chosen: when the day came
  alternatives:
  - and it happened on the day
  - when the time came
  lexicon: HALOT
  rationale: The Hebrew wayyiqtol plus temporal noun is a narrative time-setting formula.
    'When the day came' preserves the temporal force in natural English better than
    the more wooden 'and it happened on the day.'
- source_word: וַיִּזְבַּח
  chosen: sacrificed
  alternatives:
  - offered sacrifice
  - slaughtered for sacrifice
  lexicon: HALOT
  rationale: The verb זבח refers to sacrificial slaughter/offer. 'Sacrificed' is concise
    and idiomatic here, fitting the cultic context without over-specifying the mechanics.
- source_word: וְנָתַן
  chosen: he would give
  alternatives:
  - and he gave
  - then he gave
  lexicon: HALOT
  rationale: Although formally a past narrative verb, in context this describes Elkanah's
    customary action at the sacrificial meal. English habitual past ('would give')
    best conveys the repeated practice reflected in the surrounding narrative.
- source_word: לִפְנִנָּה אִשְׁתּוֹ
  chosen: to Peninnah his wife
  alternatives:
  - to his wife Peninnah
  lexicon: HALOT
  rationale: Both English orders are possible. 'To Peninnah his wife' stays close
    to the Hebrew sequence while remaining natural.
- source_word: וּלְכָל בָּנֶיהָ וּבְנוֹתֶיהָ
  chosen: and to all her sons and daughters
  alternatives:
  - and to all her children, both sons and daughters
  lexicon: HALOT
  rationale: The Hebrew explicitly names both sons and daughters; the translation
    preserves that specificity rather than collapsing to 'children.'
- source_word: מָנוֹת
  chosen: portions
  alternatives:
  - shares
  - servings
  - portions of the sacrifice
  lexicon: HALOT
  rationale: מָנוֹת denotes allotted portions, here likely portions from the sacrificial
    meal. 'Portions' is the most natural and sufficiently precise English rendering;
    the sacrificial setting is already established by the verb 'sacrificed.'
