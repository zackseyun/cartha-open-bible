  chosen_reading: sons
  alternative_readings:
  - children
  rationale: The Hebrew is explicitly masculine plural and in context reflects the
    cultural value placed on male offspring. Per doctrine, gender-accurate rendering
    is preferred over gender-neutral smoothing.
