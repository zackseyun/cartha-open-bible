id: 1SA.1.8
reference: 1 Samuel 1:8
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר לָ֜/הּ אֶלְקָנָ֣ה אִישָׁ֗/הּ חַנָּה֙ לָ֣/מֶה תִבְכִּ֗י וְ/לָ֨/מֶה֙
    לֹ֣א תֹֽאכְלִ֔י וְ/לָ֖/מֶה יֵרַ֣ע לְבָבֵ֑/ךְ הֲ/ל֤וֹא אָֽנֹכִי֙ ט֣וֹב לָ֔/ךְ מֵ/עֲשָׂרָ֖ה
    בָּנִֽים׃
translation:
  text: Then Elkanah her husband said to her, “Hannah, why are you weeping? And why
    do you not eat? And why is your heart troubled? Am I not better to you than ten
    sons?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is your heart sad/grieved?' Literally, 'why is your heart bad?'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: אֶלְקָנָה אִישָׁהּ
  chosen: Elkanah her husband
  alternatives:
  - her husband Elkanah
  lexicon: HALOT
  rationale: Keeps the appositional identification explicit and natural in English.
- source_word: לָמֶה
  chosen: why
  lexicon: HALOT
  rationale: Straightforward interrogative repeated three times; the repetition is
    preserved for rhetorical effect.
- source_word: תִבְכִּי
  chosen: are you weeping
  alternatives:
  - do you weep
  - are you crying
  lexicon: HALOT
  rationale: The imperfect in direct speech is well represented by an English progressive
    here, matching Hannah's ongoing distress.
- source_word: לֹא תֹאכְלִי
  chosen: do you not eat
  alternatives:
  - are you not eating
  - won't you eat
  lexicon: HALOT
  rationale: A simple present best reflects the question about her current refusal
    to eat without adding volitional nuance such as 'won't.'
- source_word: יֵרַע לְבָבֵךְ
  chosen: is your heart troubled
  alternatives:
  - is your heart sad
  - does your heart feel bad
  - is your heart grieved
  lexicon: HALOT
  rationale: Literally 'why is your heart bad/evil.' In context this idiom refers
    to inner distress or sadness. 'Troubled' preserves the heart-language and avoids
    an overly literal but misleading 'bad.'
- source_word: לְבָבֵךְ
  chosen: your heart
  alternatives:
  - your mind
  - your inner self
  lexicon: HALOT
  rationale: Hebrew 'heart' is retained rather than interpreted away, preserving the
    anthropological imagery of the source.
- source_word: הֲלוֹא
  chosen: Am I not
  alternatives:
  - Surely I am
  - Is it not that I am
  lexicon: HALOT
  rationale: This expects an affirmative answer; English negative rhetorical question
    matches the Hebrew force.
- source_word: טוֹב לָךְ
  chosen: better to you
  alternatives:
  - better for you
  - more to you than
  lexicon: HALOT
  rationale: The comparative sense with ל expresses Elkanah's claim about his value
    in relation to Hannah. 'Better to you' is idiomatic and close to the Hebrew construction.
- source_word: מֵעֲשָׂרָה בָּנִים
  chosen: than ten sons
  alternatives:
  - than ten children
  lexicon: HALOT
  rationale: The Hebrew specifically says 'sons,' not a gender-neutral term. This
    should be preserved per gender-accurate translation philosophy; 'ten' likely functions
    as a round number for abundance/completeness, but no interpretive expansion is
    added.
