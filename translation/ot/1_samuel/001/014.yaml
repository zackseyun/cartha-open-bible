id: 1SA.1.14
reference: 1 Samuel 1:14
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֵלֶ֨י/הָ֙ עֵלִ֔י עַד מָתַ֖י תִּשְׁתַּכָּרִ֑י/ן הָסִ֥ירִי אֶת יֵינֵ֖/ךְ מֵ/עָלָֽיִ/ךְ־־׃
translation:
  text: And Eli said to her[b][a], “How long will you be drunk? Put away your wine from you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “How long will you be drunk?” The Hebrew verb can be understood as either becoming drunk or being in a drunken state.
    reason: lexical_alternative
  - marker: b
    text: Literally “remove your wine from upon you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance; 'And ... said' preserves Hebrew narrative flow without overinterpreting temporal sequence.
- source_word: אֵלֶיהָ
  chosen: to her
  lexicon: HALOT
  rationale: Direct and idiomatic rendering of the preposition with 3fs suffix.
- source_word: עֵלִי
  chosen: Eli
  rationale: Personal name is transliterated per translation philosophy.
- source_word: עַד מָתַי
  chosen: How long
  alternatives:
  - Until when
  lexicon: HALOT
  rationale: Idiomatic English equivalent of the Hebrew temporal expression.
- source_word: תִּשְׁתַּכָּרִין
  chosen: will you keep making yourself drunk
  alternatives:
  - will you be drunk
  - will you get drunk
  lexicon: HALOT
  rationale: The hitpael/imperfect of שׁכר here conveys becoming or acting drunken; 'keep making yourself drunk' captures Eli's accusatory sense and the imperfect's ongoing nuance better than the stative 'be drunk.'
- source_word: הָסִירִי
  chosen: Put ... away
  alternatives:
  - Remove
  - Take away
  lexicon: HALOT
  rationale: Imperative of סור/סיר in context is a command to remove something from oneself; 'put away' is natural modern English.
- source_word: אֶת יֵינֵךְ
  chosen: your wine
  lexicon: HALOT
  rationale: Straightforward object phrase with 2fs suffix.
- source_word: מֵעָלָיִךְ
  chosen: from you
  alternatives:
  - from upon you
  - away from yourself
  lexicon: HALOT
  rationale: Literally 'from upon you'; idiomatic English is 'from you.' This likely means to rid herself of the wine's influence or remove the wine from her presence/person. 'From you' preserves the Hebrew image without awkwardness.
