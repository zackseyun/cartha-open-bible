id: 1SA.1.25
reference: 1 Samuel 1:25
source:
  edition: WLC
  text: וַֽ/יִּשְׁחֲט֖וּ אֶת הַ/פָּ֑ר וַ/יָּבִ֥יאוּ אֶת הַ/נַּ֖עַר אֶל עֵלִֽי־־־׃
translation:
  text: Then they slaughtered the bull and brought the boy to Eli.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'killed.' The Hebrew verb can be rendered more generally, but 'slaughtered'
      better reflects the sacrificial context.
    reason: lexical_alternative
  - marker: b
    text: Or 'the child.' Hebrew naʿar can refer to a boy, child, or young man depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁחֲטוּ
  chosen: Then they slaughtered
  alternatives:
  - and they slaughtered
  - then they killed
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative sequence. 'Slaughtered' fits sacrificial/liturgical
    context better than the more generic 'killed.' 'Then' reflects the sequential
    force in natural English narrative.
- source_word: הַפָּר
  chosen: the bull
  alternatives:
  - the ox
  - the young bull
  lexicon: HALOT
  rationale: פַּר commonly denotes a bull, often in sacrificial settings. 'Bull' is
    the most natural modern English rendering here. Although earlier context mentions
    a three-year-old bull, this verse itself simply has the singular noun with article,
    so 'the bull' is preferred.
- source_word: וַיָּבִיאוּ
  chosen: and brought
  alternatives:
  - and they brought
  - then they brought
  lexicon: HALOT
  rationale: Another wayyiqtol continuing the narrative. In the final English sentence,
    'brought' coordinates naturally with the preceding clause after 'Then.'
- source_word: הַנַּעַר
  chosen: the boy
  alternatives:
  - the child
  - the young man
  lexicon: HALOT
  rationale: נַעַר covers a range from child to young man; in this context Samuel
    is still very young, so 'boy' best matches the narrative situation more precisely
    than the broader 'child.'
- source_word: אֶל עֵלִי
  chosen: to Eli
  alternatives:
  - unto Eli
  - before Eli
  lexicon: HALOT
  rationale: אֶל normally indicates movement toward a person or place. 'To Eli' is
    the straightforward rendering in readable modern English.
