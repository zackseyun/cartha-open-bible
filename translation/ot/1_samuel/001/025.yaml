- issue: Sacrificial nuance of the slaughter
  chosen_reading: Render the verb as 'slaughtered' to preserve the likely sacrificial
    setting without adding explanatory wording not present in the Hebrew.
  alternative_readings:
  - Render more generically as 'killed'
  rationale: The immediate context concerns worship and offerings at Shiloh. 'Slaughtered'
    preserves that cultic resonance while remaining a direct translation of the Hebrew
    verb.
