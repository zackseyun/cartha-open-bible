theological_decisions:
- issue: Ethnic/geographical designation אֶפְרָתִי
  chosen_reading: an Ephrathite
  alternative_readings:
  - an Ephraimite
  rationale: This is primarily a lexical/geographical issue rather than a doctrinal
    one, but it affects interpretation of Elkanah's lineage and location. The Hebrew
    form points to 'Ephrathite'; because some interpreters understand it functionally
    as 'Ephraimite' in this context, the alternative is preserved in a footnote rather
    than resolved silently.
  doctrine_reference: Translation philosophy §3, §5
