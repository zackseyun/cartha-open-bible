id: 1SA.1.1
reference: 1 Samuel 1:1
source:
  edition: WLC
  text: וַ/יְהִי֩ אִ֨ישׁ אֶחָ֜ד מִן הָ/רָמָתַ֛יִם צוֹפִ֖ים מֵ/הַ֣ר אֶפְרָ֑יִם וּ/שְׁמ֡/וֹ
    אֶ֠לְקָנָה בֶּן יְרֹחָ֧ם בֶּן אֱלִיה֛וּא בֶּן תֹּ֥חוּ בֶן צ֖וּף אֶפְרָתִֽי־־־־־׃
translation:
  text: Now there was a certain man from Ramathaim-zophim, from the hill country of
    Ephraim, and his name was Elkanah son of Jeroham, son of Elihu, son of Tohu, son
    of Zuph, an Ephrathite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, possibly, “an Ephraimite.” The Hebrew reads “Ephrathite,” which may
      function here as a regional designation connected with Ephraim.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now there was
  alternatives:
  - And there was
  - There was
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing the story. 'Now there was' gives
    natural English narrative onset while preserving the discourse function better
    than a bare 'There was.'
- source_word: אִישׁ אֶחָד
  chosen: a certain man
  alternatives:
  - one man
  - a man
  lexicon: HALOT
  rationale: The combination often introduces a particular but as-yet-unnamed figure
    in narrative. 'A certain man' preserves that idiomatic force better than the more
    wooden 'one man.'
- source_word: מִן הָרָמָתַיִם צוֹפִים
  chosen: from Ramathaim-zophim
  alternatives:
  - from Ramathaim of the Zuphites
  - from Ramathaim-zophim in the region of Zuph
  lexicon: HALOT
  rationale: Treated as a place name in apposition/compound form in this context.
    Transliteration preserves the proper name without over-interpreting the toponym's
    internal components.
- source_word: מֵהַר אֶפְרָיִם
  chosen: from the hill country of Ephraim
  alternatives:
  - from the mountains of Ephraim
  - from the hill country in Ephraim
  lexicon: HALOT
  rationale: הַר in territorial expressions commonly denotes hill country rather than
    a single mountain. This is the most idiomatic and geographically accurate English
    rendering.
- source_word: וּשְׁמוֹ
  chosen: and his name was
  alternatives:
  - whose name was
  lexicon: HALOT
  rationale: A straightforward rendering of the Hebrew clause. 'And his name was'
    preserves the paratactic narrative style; 'whose name was' is smoother but slightly
    more interpretive.
- source_word: אֶלְקָנָה
  chosen: Elkanah
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: בֶּן ... בֶּן ... בֶּן ... בֶן
  chosen: son of ... son of ... son of ... son of
  alternatives:
  - descendant of ... descendant of ...
  lexicon: HALOT
  rationale: בן in genealogical sequence is most naturally rendered 'son of,' even
    though Hebrew genealogies can sometimes telescope generations. No contextual need
    here to generalize to 'descendant of.'
- source_word: אֶפְרָתִי
  chosen: an Ephrathite
  alternatives:
  - an Ephraimite
  lexicon: HALOT
  rationale: The adjective is formally 'Ephrathite.' Although in this context it may
    denote an Ephraimite by regional association, the source form should be preserved
    in the main text, with the interpretive alternative noted in a footnote for auditability.
