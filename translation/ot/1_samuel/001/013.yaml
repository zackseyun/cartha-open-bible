id: 1SA.1.13
reference: 1 Samuel 1:13
source:
  edition: WLC
  text: וְ/חַנָּ֗ה הִ֚יא מְדַבֶּ֣רֶת עַל לִבָּ֔/הּ רַ֚ק שְׂפָתֶ֣י/הָ נָּע֔וֹת וְ/קוֹלָ֖/הּ
    לֹ֣א יִשָּׁמֵ֑עַ וַ/יַּחְשְׁבֶ֥/הָ עֵלִ֖י לְ/שִׁכֹּרָֽה־׃
translation:
  text: Now Hannah was speaking in her heart; only her lips were moving, but her voice
    was not heard. So Eli thought she was drunk.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was speaking to herself' / 'was praying within herself.' The Hebrew
      literally says 'was speaking in her heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְדַבֶּרֶת עַל לִבָּהּ
  chosen: was speaking in her heart
  alternatives:
  - was speaking to herself
  - was praying silently within herself
  lexicon: HALOT
  rationale: The idiom literally involves speaking 'upon/in relation to her heart.'
    In context it indicates inward, unvoiced speech. 'In her heart' preserves the
    Hebrew imagery better than a more interpretive paraphrase, while remaining natural
    English.
- source_word: רַק
  chosen: only
  alternatives:
  - just
  - merely
  lexicon: HALOT
  rationale: 'רַק marks limitation: only one outward sign was perceptible. ''Only''
    is the most straightforward rendering.'
- source_word: שְׂפָתֶיהָ נָּעוֹת
  chosen: her lips were moving
  alternatives:
  - her lips were trembling
  - her lips moved
  lexicon: HALOT
  rationale: נוּעַ commonly denotes movement. Here the visible motion of the lips
    contrasts with the inaudibility of her voice. 'Were moving' is idiomatic and fits
    the participial/imperfective sense.
- source_word: וְקוֹלָהּ לֹא יִשָּׁמֵעַ
  chosen: but her voice was not heard
  alternatives:
  - and her voice could not be heard
  - and no sound from her was heard
  lexicon: HALOT
  rationale: 'The Niphal of שׁמע here is passive: her voice was not audible. ''But''
    brings out the contrast in English between moving lips and unheard voice, though
    the Hebrew conjunction is simply ''and.'''
- source_word: וַיַּחְשְׁבֶהָ
  chosen: thought she was
  alternatives:
  - considered her to be
  - regarded her as
  lexicon: HALOT
  rationale: חשב with object suffix plus predicate expresses reckoning or considering
    someone as something. 'Thought she was' is clear, natural English.
- source_word: לְשִׁכֹּרָה
  chosen: drunk
  alternatives:
  - a drunken woman
  - intoxicated
  lexicon: HALOT
  rationale: The adjective means drunk/intoxicated. English idiom after 'thought she
    was' favors the predicate adjective 'drunk' rather than the more wooden 'a drunken
    woman.'
- source_word: וְחַנָּה הִיא
  chosen: Now Hannah
  alternatives:
  - And Hannah
  - As for Hannah
  lexicon: HALOT
  rationale: The pronoun הִיא adds emphasis/topic marking. 'Now Hannah' captures the
    discourse shift naturally in English without overtranslating the pronoun.
