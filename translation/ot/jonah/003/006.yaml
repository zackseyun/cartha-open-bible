theological_decisions:
- issue: Royal acts of humiliation and repentance imagery
  chosen_reading: Rendered the king's actions in straightforward narrative terms without
    intensifying them into explicit theological conclusions beyond the text.
  alternative_readings:
  - Interpreting each act as an explicit statement of repentance in the main text
  rationale: The verse depicts symbolic acts associated with mourning and humility,
    but the translation should narrate the actions themselves rather than import explanatory
    doctrinal language. The penitential significance is evident from the imagery and
    context.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve the source text''s plain sense.'
