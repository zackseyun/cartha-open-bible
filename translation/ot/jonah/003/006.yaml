id: JON.3.6
reference: Jonah 3:6
source:
  edition: WLC
  text: וַ/יִּגַּ֤ע הַ/דָּבָר֙ אֶל מֶ֣לֶך נִֽינְוֵ֔ה וַ/יָּ֨קָם֙ מִ/כִּסְא֔/וֹ וַ/יַּעֲבֵ֥ר
    אַדַּרְתּ֖/וֹ מֵֽ/עָלָ֑י/ו וַ/יְכַ֣ס שַׂ֔ק וַ/יֵּ֖שֶׁב עַל הָ/אֵֽפֶר־־׃
translation:
  text: When the message reached the king of Nineveh, he rose from his throne, removed
    his robe from himself, covered himself with sackcloth, and sat in the ashes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the matter' or 'the report' reached the king of Nineveh.
    reason: lexical_alternative
  - marker: b
    text: Or 'removed his mantle.' The Hebrew term can refer to a distinguished outer
      garment.
    reason: lexical_alternative
  - marker: c
    text: Literally 'sat on the ash/ashes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגַּע
  chosen: reached
  alternatives:
  - came to
  - touched
  lexicon: HALOT
  rationale: נגע literally means 'touch/reach.' With הַדָּבָר as subject and אֶל introducing
    the recipient, the idiom means that the report or message came to/reached the
    king. 'Reached' is natural English while preserving the concrete sense.
- source_word: הַדָּבָר
  chosen: the message
  alternatives:
  - the matter
  - the report
  - the word
  lexicon: HALOT
  rationale: דבר has a broad semantic range including 'word,' 'matter,' and 'message.'
    In this narrative context it refers to Jonah's proclamation as it came to the
    king's attention, so 'message' best conveys the sense in readable English.
- source_word: מֶלֶךְ נִינְוֵה
  chosen: the king of Nineveh
  alternatives:
  - Nineveh's king
  lexicon: HALOT
  rationale: A straightforward construct relationship. 'The king of Nineveh' is the
    standard and clearest English rendering.
- source_word: וַיָּקָם מִכִּסְאוֹ
  chosen: he rose from his throne
  alternatives:
  - he arose from his seat
  lexicon: HALOT
  rationale: כסא can mean 'seat' or 'throne.' Because the subject is a king, 'throne'
    appropriately reflects royal status and the symbolic act of humbling himself.
- source_word: וַיַּעֲבֵר אַדַּרְתּוֹ מֵעָלָיו
  chosen: removed his robe from himself
  alternatives:
  - took off his mantle
  - caused his robe to pass from upon him
  lexicon: HALOT
  rationale: The Hiphil of עבר here means to cause to pass away/remove. אַדֶּרֶת denotes
    a mantle or robe, often a distinguished outer garment. 'Removed his robe from
    himself' captures both the action and the reflexive sense without sounding wooden.
- source_word: אַדַּרְתּוֹ
  chosen: his robe
  alternatives:
  - his mantle
  - his splendid cloak
  lexicon: HALOT
  rationale: אַדֶּרֶת can denote a mantle or stately garment. 'Robe' is idiomatic
    and fits the royal context better than the more archaic 'mantle.'
- source_word: וַיְכַס שַׂק
  chosen: covered himself with sackcloth
  alternatives:
  - put on sackcloth
  - covered himself in sackcloth
  lexicon: HALOT
  rationale: Although the object is simply 'sackcloth,' the context and common Hebrew
    idiom imply that he clothed himself with it. 'Covered himself with sackcloth'
    stays close to the verb כסה while remaining natural English.
- source_word: שַׂק
  chosen: sackcloth
  alternatives:
  - coarse mourning cloth
  lexicon: HALOT
  rationale: The conventional and accurate rendering for the rough cloth associated
    with mourning and repentance.
- source_word: וַיֵּשֶׁב עַל הָאֵפֶר
  chosen: sat in the ashes
  alternatives:
  - sat on the ashes
  - sat upon the dust/ash heap
  lexicon: HALOT
  rationale: The preposition is literally 'on/upon,' but English idiom for mourning
    imagery commonly uses 'in the ashes.' This preserves the penitential scene naturally.
    'Ashes' is preferable to singular 'ash' in English.
