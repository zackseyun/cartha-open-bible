id: JON.3.9
reference: Jonah 3:9
source:
  edition: WLC
  text: מִֽי יוֹדֵ֣עַ יָשׁ֔וּב וְ/נִחַ֖ם הָ/אֱלֹהִ֑ים וְ/שָׁ֛ב מֵ/חֲר֥וֹן אַפּ֖/וֹ וְ/לֹ֥א נֹאבֵֽד־׃
translation:
  text: Who knows? God may turn and relent[a], and turn from the burning of his anger[b], so that we do not perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turn back from his fierce anger.' The Hebrew literally speaks of 'the burning of his anger.'
    reason: lexical_alternative
  - marker: b
    text: '''Relent'' could also be rendered ''change his mind'' or ''be sorry,'' but here it refers to God withholding threatened judgment.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִי יוֹדֵעַ
  chosen: Who knows?
  alternatives:
  - Who can know?
  - Perhaps
  lexicon: HALOT
  rationale: Idiomatic expression of uncertainty and hope. 'Who knows?' preserves the rhetorical force better than a more wooden rendering.
- source_word: יָשׁוּב
  chosen: may turn
  alternatives:
  - will turn
  - turn back
  lexicon: HALOT
  rationale: The yiqtol after 'Who knows?' expresses possibility rather than certainty; 'may turn' captures the tentative appeal. 'Turn' preserves the common Hebrew verb שוב without overinterpreting.
- source_word: וְנִחַם
  chosen: and relent
  alternatives:
  - and be sorry
  - and change his mind
  - and have compassion
  lexicon: HALOT
  rationale: In reference to God, נחם here denotes relenting from announced judgment. 'Relent' is idiomatic English that preserves the sense without implying moral error or ignorance in God.
- source_word: הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Definite form with the common noun for Israel's God/God generally; in context the Ninevites refer to the true God. Standard English rendering is 'God'.
- source_word: וְשָׁב
  chosen: and turn
  alternatives:
  - and turn back
  - and withdraw
  lexicon: HALOT
  rationale: A second use of שוב, now with the prepositional phrase 'from the burning of his anger.' Rendering it again as 'turn' preserves the lexical repetition in Hebrew.
- source_word: מֵחֲרוֹן אַפּוֹ
  chosen: from the burning of his anger
  alternatives:
  - from his fierce anger
  - from the heat of his anger
  - from his burning anger
  lexicon: HALOT
  rationale: חרון אף is an idiom for intense anger. 'The burning of his anger' preserves the underlying imagery of heat/burning more transparently than the traditional but slightly flattened 'fierce anger.'
- source_word: וְלֹא נֹאבֵד
  chosen: so that we do not perish
  alternatives:
  - and we will not perish
  - that we may not perish
  lexicon: HALOT
  rationale: The sequence expresses the hoped-for result of divine relenting. 'So that we do not perish' makes the relation clear in natural English while preserving the first person plural and the verb 'perish'.
