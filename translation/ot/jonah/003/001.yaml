id: JON.3.1
reference: Jonah 3:1
source:
  edition: WLC
  text: וַ/יְהִ֧י דְבַר יְהוָ֛ה אֶל יוֹנָ֖ה שֵׁנִ֥ית לֵ/אמֹֽר־־׃
translation:
  text: Then the word of the LORD came to Jonah a second time, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'again' for 'a second time.' The Hebrew explicitly marks repetition after
      Jonah's earlier commission.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Then ... came
  alternatives:
  - And it happened
  - Now ... came
  - And ... was
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions as a narrative advance formula.
    In English, rendering it woodenly as 'and it happened' is possible but less natural;
    'Then' captures the sequential narrative force, while 'came' is supplied with
    the following subject phrase to produce idiomatic English.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: This is a standard prophetic formula. 'Word' preserves the canonical
    and prophetic resonance better than the more interpretive 'message.' Per doctrine,
    יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: In this prophetic-call formula, אֶל marks the recipient of the divine
    word. 'To' is the natural English equivalent.
- source_word: יוֹנָה
  chosen: Jonah
  rationale: Personal names are transliterated by standard English convention.
- source_word: שֵׁנִית
  chosen: a second time
  alternatives:
  - again
  - for the second time
  lexicon: HALOT
  rationale: The adverb explicitly indicates repetition. 'A second time' is both precise
    and natural, and it preserves the narrative emphasis that Jonah is recommissioned
    after the earlier episode.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'thus:'
  - and said,
  lexicon: HALOT
  rationale: This infinitive introduces the content of the divine speech in the next
    verse. 'Saying,' is the standard and sufficiently transparent English rendering.
