theological_decisions:
- issue: Anthropopathic language for divine response in וַיִּנָּחֶם
  chosen_reading: Rendered as 'God relented' rather than 'God repented' or 'changed
    his mind.'
  alternative_readings:
  - God repented
  - God changed his mind
  - God was sorry
  rationale: The Hebrew presents a real change in God's announced course of action
    in response to Nineveh's turning, and the translation should preserve that tension
    without importing the idea that God sinned, erred, or learned new information.
    'Relented' is the best English balance for optimal equivalence and historic orthodox
    theology.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Meaning of רָעָה in the two occurrences
  chosen_reading: First occurrence rendered morally ('evil way'); second occurrence
    rendered as calamity/judgment ('disaster').
  alternative_readings:
  - evil ... evil
  - wicked ... harm
  rationale: The same Hebrew lexeme carries different senses in immediate context.
    The Ninevites turn from moral evil, while God withholds threatened calamity. Rendering
    both as 'evil' in English would create theological confusion by suggesting moral
    evil in God. The contextual distinction should be documented rather than flattened.
  doctrine_reference: 'Translation philosophy §5: Consistency of key terms, or documented
    exception.'
