id: JON.3.10
reference: Jonah 3:10
source:
  edition: WLC
  text: וַ/יַּ֤רְא הָֽ/אֱלֹהִים֙ אֶֽת מַ֣עֲשֵׂי/הֶ֔ם כִּי שָׁ֖בוּ מִ/דַּרְכָּ֣/ם הָ/רָעָ֑ה
    וַ/יִּנָּ֣חֶם הָ/אֱלֹהִ֗ים עַל הָ/רָעָ֛ה אֲשֶׁר דִּבֶּ֥ר לַ/עֲשׂוֹת לָ/הֶ֖ם וְ/לֹ֥א
    עָשָֽׂה־־־־־׃
translation:
  text: When God saw their deeds, that they had turned from their evil way, God relented
    concerning the disaster that he had spoken to bring on them, and he did not do
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'changed his mind'; Hebrew 'relented.' The wording describes God's response
      to Nineveh's repentance without implying moral fault in God.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew uses the same word for 'evil' in 'their evil way' and for the
      threatened 'disaster.' In context the first is moral evil; the second is calamity
      or judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - looked at
  - took note of
  lexicon: HALOT
  rationale: The verb ראה in the waw-consecutive narrative form is straightforwardly
    'saw.' In English, 'saw' preserves both the concrete verb and the narrative simplicity
    without over-interpreting it as mere cognition.
- source_word: מַעֲשֵׂיהֶם
  chosen: their deeds
  alternatives:
  - their works
  - what they did
  lexicon: HALOT
  rationale: מַעֲשִׂים refers to actions or deeds. 'Their deeds' is natural modern
    English and preserves the moral weight better than the more colloquial 'what they
    did,' while avoiding potentially misleading theological overtones of 'works.'
- source_word: כִּי שָׁבוּ
  chosen: that they had turned
  alternatives:
  - because they turned
  - that they turned back
  lexicon: HALOT
  rationale: Here כִּי introduces the content/ground of what God saw in their deeds,
    and שׁוּב means 'turn/return.' 'That they had turned' fits the English syntax
    after 'saw their deeds' and captures the completed action reflected in the narrative
    context.
- source_word: מִדַּרְכָּם הָרָעָה
  chosen: from their evil way
  alternatives:
  - from their evil ways
  - from their wicked way
  lexicon: HALOT
  rationale: The Hebrew uses singular דֶּרֶךְ with a collective sense. 'Way' preserves
    the singular and the idiomatic moral-path metaphor. 'Evil' is a direct rendering
    of רָעָה here as moral evil, while 'wicked' is possible but slightly more interpretive.
- source_word: וַיִּנָּחֶם
  chosen: relented
  alternatives:
  - was sorry
  - changed his mind
  - had compassion
  lexicon: HALOT
  rationale: נחם in this context refers to God refraining from announced judgment
    in response to repentance. 'Relented' best preserves the narrative and theological
    tension without implying error or ignorance in God. 'Changed his mind' is possible
    but can over-specify the anthropopathic expression; 'was sorry' is misleading
    in modern English.
- source_word: עַל הָרָעָה
  chosen: concerning the disaster
  alternatives:
  - from the calamity
  - about the evil
  lexicon: HALOT
  rationale: רָעָה here refers not to moral evil in God but to threatened calamity/disaster.
    'Concerning the disaster' reflects עַל naturally in context and avoids theologically
    confusing English such as 'evil' applied to God's intended act.
- source_word: אֲשֶׁר דִּבֶּר לַעֲשׂוֹת לָהֶם
  chosen: that he had spoken to bring on them
  alternatives:
  - that he had said he would do to them
  - which he had declared to do to them
  lexicon: HALOT
  rationale: The infinitive לַעֲשׂוֹת with לָהֶם is idiomatically the threatened action
    God intended toward them. 'Bring on them' is idiomatic English for announced disaster
    and avoids awkward literalism like 'do to them' while staying close to the source.
- source_word: וְלֹא עָשָׂה
  chosen: and he did not do it
  alternatives:
  - and he did not do so
  - and he did not carry it out
  lexicon: HALOT
  rationale: The Hebrew is terse. 'And he did not do it' preserves the directness
    and leaves the implied object understood from context, matching the source's compact
    style.
- source_word: הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: אֱלֹהִים here clearly refers to the God of Israel acting in the narrative.
    'God' is the standard English rendering.
