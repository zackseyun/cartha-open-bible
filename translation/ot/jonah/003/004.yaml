theological_decisions:
- issue: Semantic force of נֶהְפָּכֶת in Jonah's warning
  chosen_reading: will be overturned
  alternative_readings:
  - will be overthrown
  - will be destroyed
  rationale: The Hebrew verb הפך can denote catastrophic overthrow, but in Jonah's
    literary context it also allows a broader reversal motif. Rendering it 'overturned'
    preserves the tension rather than resolving it into sheer destruction, which aligns
    with the translation philosophy of preserving ambiguity where the source permits
    it.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
