id: JON.3.4
reference: Jonah 3:4
source:
  edition: WLC
  text: וַ/יָּ֤חֶל יוֹנָה֙ לָ/ב֣וֹא בָ/עִ֔יר מַהֲלַ֖ךְ י֣וֹם אֶחָ֑ד וַ/יִּקְרָא֙ וַ/יֹּאמַ֔ר
    ע֚וֹד אַרְבָּעִ֣ים י֔וֹם וְ/נִֽינְוֵ֖ה נֶהְפָּֽכֶת׃
translation:
  text: Jonah began to go into the city a day's journey, and he cried out and said,
    “Yet forty days, and Nineveh will be overturned.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Forty more days' or 'In forty days.' The Hebrew expression marks the
      remaining time before the announced event.
    reason: lexical_alternative
  - marker: b
    text: Or 'will be overthrown.' The Hebrew verb can mean 'be overturned/overthrown,'
      allowing both the sense of judgment and the broader idea of reversal.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּחֶל
  chosen: began
  alternatives:
  - started
  lexicon: HALOT
  rationale: 'The Hiphil wayyiqtol of חלל here functions idiomatically with the infinitive
    לָבוֹא to mark the beginning of an action: ''began to go/enter.'' ''Began'' is
    the most natural and standard English equivalent.'
- source_word: לָבוֹא בָעִיר
  chosen: to go into the city
  alternatives:
  - to enter the city
  lexicon: HALOT
  rationale: בוא with ב marks movement into the city. 'Go into' preserves the motion
    sense and reads naturally in context; 'enter' is possible but slightly more formal.
- source_word: מַהֲלַךְ יוֹם אֶחָד
  chosen: a day's journey
  alternatives:
  - one day's walk
  - the distance of one day
  lexicon: HALOT
  rationale: This construct phrase is an idiom for the distance or extent traversed
    in a day. 'A day's journey' is concise, idiomatic English and preserves the spatial
    sense better than a more literal but clumsier rendering.
- source_word: וַיִּקְרָא
  chosen: he cried out
  alternatives:
  - he proclaimed
  - he called out
  lexicon: HALOT
  rationale: קרא in prophetic proclamation contexts can mean to call out publicly.
    'Cried out' preserves the audible, urgent force; 'proclaimed' is interpretive
    and slightly more polished than the Hebrew's directness.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Retaining both verbs ('cried out and said') reflects the Hebrew narrative
    sequence and avoids smoothing away the emphatic buildup to Jonah's message.
- source_word: עוֹד אַרְבָּעִים יוֹם
  chosen: Yet forty days
  alternatives:
  - Forty more days
  - In forty days
  lexicon: HALOT
  rationale: 'עוֹד here conveys remaining time: ''yet/still/another.'' ''Yet forty
    days'' is a close, traditional, and natural rendering. ''In forty days'' weakens
    the sense of countdown; ''forty more days'' is also viable but slightly more expansive.'
- source_word: נֶהְפָּכֶת
  chosen: will be overturned
  alternatives:
  - will be overthrown
  - will be destroyed
  - will be turned upside down
  lexicon: HALOT
  rationale: The Niphal of הפך can denote overthrow, destruction, or turning over.
    'Overturned' preserves the lexical breadth and the deliberate ambiguity, echoing
    both judgment and reversal themes in Jonah. It also avoids over-specifying the
    mode of Nineveh's fate.
