theological_decisions:
- issue: Relation of Jonah's message to Nineveh
  chosen_reading: proclaim to it
  alternative_readings:
  - cry out against it
  rationale: The Hebrew preposition here is אֶל ('to') rather than עַל ('against')
    as in Jonah 1:2. The translation preserves this shift and does not intensify the
    hostility of the commission beyond the source text. The content may still be a
    message of judgment, but that is not specified in this verse's preposition.
  doctrine_reference: Preserve theological tension rather than resolve it.
