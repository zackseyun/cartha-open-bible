id: JON.3.2
reference: Jonah 3:2
source:
  edition: WLC
  text: ק֛וּם לֵ֥ךְ אֶל נִֽינְוֵ֖ה הָ/עִ֣יר הַ/גְּדוֹלָ֑ה וִּ/קְרָ֤א אֵלֶ֨י/הָ֙ אֶת
    הַ/קְּרִיאָ֔ה אֲשֶׁ֥ר אָנֹכִ֖י דֹּבֵ֥ר אֵלֶֽי/ךָ־־׃
translation:
  text: Arise, go to Nineveh, the great city, and proclaim to it the proclamation
    that I speak to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cry out against it.' Jonah 1:2 uses 'against,' but here the Hebrew says
      'to it,' so the main text preserves the wording of this verse.
    reason: alternative_reading
lexical_decisions:
- source_word: ק֛וּם
  chosen: Arise
  alternatives:
  - Get up
  - Rise
  lexicon: HALOT
  rationale: Imperative of קום meaning to rise/get up. 'Arise' preserves the solemn,
    urgent force of the divine command better than the more colloquial 'get up.'
- source_word: לֵ֥ךְ
  chosen: go
  alternatives:
  - walk
  - set out
  lexicon: HALOT
  rationale: הלך in imperative here is the standard motion verb. 'Go' is the natural
    English equivalent in this command sequence.
- source_word: נִֽינְוֵ֖ה
  chosen: Nineveh
  rationale: Proper name; transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: הָ/עִ֣יר הַ/גְּדוֹלָ֑ה
  chosen: the great city
  alternatives:
  - the large city
  lexicon: HALOT
  rationale: גדול can denote size or greatness. In Jonah, Nineveh's prominence as
    well as scale is in view; 'great city' preserves the Hebrew wording and literary
    repetition in the book.
- source_word: וִּ/קְרָ֤א אֵלֶ֨י/הָ֙
  chosen: and proclaim to it
  alternatives:
  - and call out against it
  - and cry out to it
  lexicon: HALOT
  rationale: קרא can mean call, cry out, proclaim. In 1:2 the message was 'against'
    Nineveh; here the preposition is אליה, 'to it,' so 'proclaim to it' best reflects
    the wording without importing 'against' from the earlier commission.
- source_word: אֶת הַ/קְּרִיאָ֔ה
  chosen: the proclamation
  alternatives:
  - the message
  - the calling
  - the cry
  lexicon: HALOT
  rationale: The cognate noun from קרא refers to the content or act of proclamation.
    'The proclamation' preserves the wordplay with the verb קרא and keeps the formal
    force of Jonah's commissioned announcement.
- source_word: אֲשֶׁ֥ר אָנֹכִ֖י דֹּבֵ֥ר אֵלֶֽי/ךָ
  chosen: that I tell you
  alternatives:
  - that I speak to you
  - that I am speaking to you
  - which I tell you
  lexicon: HALOT
  rationale: דבר with אל commonly means 'speak to.' In English, 'tell you' is more
    idiomatic when introducing the content Jonah is to announce. The participle דֹבֵר
    has present/imperfective force; 'I tell you' conveys ongoing divine instruction
    in natural English.
