theological_decisions:
- issue: Nature of Nineveh's response to God
  chosen_reading: Render the response as 'believed God' without expanding it to repentance, conversion, or saving faith.
  alternative_readings:
  - repented before God
  - believed in God in a fuller covenantal sense
  rationale: The verse itself states belief, fasting, and sackcloth. While repentance is clearly implied in the broader narrative, the translation should not import theological conclusions beyond the wording of this verse.
  doctrine_reference: Translation philosophy items 1 and 3
