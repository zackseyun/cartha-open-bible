id: JON.3.5
reference: Jonah 3:5
source:
  edition: WLC
  text: וַֽ/יַּאֲמִ֛ינוּ אַנְשֵׁ֥י נִֽינְוֵ֖ה בֵּֽ/אלֹהִ֑ים וַ/יִּקְרְאוּ צוֹם֙ וַ/יִּלְבְּשׁ֣וּ שַׂקִּ֔ים מִ/גְּדוֹלָ֖/ם וְ/עַד קְטַנָּֽ/ם־־׃
translation:
  text: And the people of Nineveh believed God[a], and they proclaimed a fast and put on sackcloth, from their greatest to their least.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'believed in God.' The Hebrew construction can express trusting in God as well as believing God.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּאֲמִינוּ
  chosen: believed
  alternatives:
  - trusted
  - had faith
  lexicon: HALOT
  rationale: Hiphil of אמן with ב marks believing/trusting in someone. 'Believed' is the most natural English rendering here and preserves the directness of the response to Jonah's message without over-interpreting it.
- source_word: אַנְשֵׁי נִינְוֵה
  chosen: the men of Nineveh
  alternatives:
  - the people of Nineveh
  - the citizens of Nineveh
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' In keeping with the gender-accurate policy, the masculine form is preserved rather than flattened to 'people,' while still functioning corporately for the city's inhabitants in context.
- source_word: בֵּאלֹהִים
  chosen: God
  alternatives:
  - in God
  lexicon: HALOT
  rationale: With אמן + ב, the sense is 'believe in/believe God.' English idiom after 'believed' normally omits the preposition when the object is personal and the sense is accepting the message as true; 'believed God' is both idiomatic and close to the Hebrew.
- source_word: וַיִּקְרְאוּ צוֹם
  chosen: they proclaimed a fast
  alternatives:
  - they called a fast
  - they declared a fast
  lexicon: HALOT
  rationale: קרא with צום in this context means to announce or proclaim a communal fast. 'Proclaimed a fast' is clear modern English and reflects the formal public action.
- source_word: וַיִּלְבְּשׁוּ שַׂקִּים
  chosen: put on sackcloth
  alternatives:
  - clothed themselves with sackcloth
  - wore sackcloth
  lexicon: HALOT
  rationale: The plural שַׂקִּים refers to sackcloth garments. English commonly treats 'sackcloth' as a mass noun in this idiom; 'put on sackcloth' is natural and preserves the penitential act.
- source_word: מִגְּדוֹלָם וְעַד קְטַנָּם
  chosen: from their greatest to their least
  alternatives:
  - from the greatest of them to the least of them
  - from great to small
  lexicon: HALOT
  rationale: This merism expresses totality across social rank or age. 'From their greatest to their least' is concise, natural, and preserves the distributive force signaled by the pronominal suffixes.
