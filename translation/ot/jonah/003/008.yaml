id: JON.3.8
reference: Jonah 3:8
source:
  edition: WLC
  text: וְ/יִתְכַּסּ֣וּ שַׂקִּ֗ים הָֽ/אָדָם֙ וְ/הַ/בְּהֵמָ֔ה וְ/יִקְרְא֥וּ אֶל אֱלֹהִ֖ים
    בְּ/חָזְקָ֑ה וְ/יָשֻׁ֗בוּ אִ֚ישׁ מִ/דַּרְכּ֣/וֹ הָֽ/רָעָ֔ה וּ/מִן הֶ/חָמָ֖ס אֲשֶׁ֥ר
    בְּ/כַפֵּי/הֶֽם־־׃
translation:
  text: Let both man and beast be covered with sackcloth, and let them call out mightily
    to God, and let each turn from his evil way and from the violence that is in his
    hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cry out earnestly to God.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'each man'; the expression is distributive and refers to every person
      among the people.
    reason: lexical_alternative
  - marker: c
    text: Or 'from his wicked way.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִתְכַּסּוּ
  chosen: let ... be covered
  alternatives:
  - let ... cover themselves
  - let ... be clothed
  lexicon: HALOT
  rationale: The Hitpael of כסה can be reflexive ('cover themselves') or effectively
    passive/middle in context. English idiom with 'be covered with sackcloth' is natural
    and preserves the decree-like jussive force.
- source_word: שַׂקִּים
  chosen: sackcloth
  alternatives:
  - sacks
  - sackcloth garments
  lexicon: HALOT
  rationale: The plural refers to garments/material used for mourning and repentance.
    English commonly uses the mass noun 'sackcloth' for this cultural practice.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - people
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered according to context. Here it is contrasted
    with 'beast,' referring to human beings as a class, and 'man' preserves the source's
    gender-accurate representative sense.
- source_word: וְהַבְּהֵמָה
  chosen: and beast
  alternatives:
  - and animals
  - and cattle
  lexicon: HALOT
  rationale: בְּהֵמָה here denotes domestic animals generally. 'Beast' preserves the
    human/animal contrast and the solemn style of the proclamation; 'animals' is possible
    but flatter.
- source_word: וְיִקְרְאוּ אֶל אֱלֹהִים
  chosen: let them call out ... to God
  alternatives:
  - let them cry out to God
  - let them call to God
  lexicon: HALOT
  rationale: קרא אל in this context is a plea or earnest invocation. 'Call out to
    God' is clear modern English and retains the prayerful urgency.
- source_word: בְּחָזְקָה
  chosen: mightily
  alternatives:
  - earnestly
  - with strength
  - strongly
  lexicon: HALOT
  rationale: The noun with ב conveys force/intensity. 'Mightily' captures the adverbial
    force and suits the elevated tone; 'earnestly' is interpretive and less literal.
- source_word: וְיָשֻׁבוּ
  chosen: let ... turn
  alternatives:
  - let ... return
  - let ... repent
  lexicon: HALOT
  rationale: שׁוב fundamentally means 'turn/return.' In this ethical context it implies
    repentance, but 'turn' preserves the Hebrew metaphor without importing a more
    developed theological term.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each person
  - everyone
  lexicon: HALOT
  rationale: The distributive singular אִישׁ is best represented by 'each man' in
    keeping with the gender-accurate policy and the representative force of the Hebrew.
- source_word: מִדַּרְכּוֹ הָרָעָה
  chosen: from his evil way
  alternatives:
  - from his wicked way
  - from his evil conduct
  lexicon: HALOT
  rationale: '''Way'' preserves the common Hebrew ethical metaphor of conduct/lifestyle.
    ''Evil'' is a straightforward rendering of רָעָה; ''wicked'' is possible but slightly
    more interpretive.'
- source_word: וּמִן הֶחָמָס
  chosen: and from the violence
  alternatives:
  - and from the wrongdoing
  - and from the injustice
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence, often violent wrongdoing. 'Violence'
    is the most direct and established rendering here.
- source_word: אֲשֶׁר בְּכַפֵּיהֶם
  chosen: that is in their hands
  alternatives:
  - which is in their hands
  - that they are doing
  lexicon: HALOT
  rationale: The idiom 'in their hands' points to deeds within their power or actions
    they are committing. Retaining the idiom preserves the Hebrew imagery while remaining
    understandable in English.
