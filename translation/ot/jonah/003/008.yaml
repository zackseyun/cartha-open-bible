theological_decisions:
- issue: Repentance language in שׁוב
  chosen_reading: Rendered as 'turn' rather than 'repent'
  alternative_readings:
  - repent
  - return
  rationale: The verse calls for moral reversal, and 'repent' would communicate that
    sense, but the Hebrew verb itself is the broader and more concrete 'turn/return.'
    Using 'turn' preserves the source-language metaphor and avoids importing a narrower
    theological gloss into the main text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Gendered representative language in הָאָדָם / אִישׁ
  chosen_reading: Retained 'man' and 'each man'
  alternative_readings:
  - people
  - each person
  - everyone
  rationale: The doctrine directs gender-accurate rendering over gender-neutral smoothing.
    In this context the masculine forms function representatively for the human population,
    especially in contrast with 'beast,' so the translation keeps the masculine wording
    rather than flattening it.
  doctrine_reference: Translation philosophy §4; Contested terms table for אָדָם
