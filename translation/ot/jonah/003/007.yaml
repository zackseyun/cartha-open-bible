theological_decisions:
- issue: Rendering of אָדָם in a generic human-animal contrast
  chosen_reading: man
  alternative_readings:
  - humankind
  - people
  rationale: The Hebrew uses the singular collective הָאָדָם in contrast with animal
    categories. Per doctrine, gender-accurate rendering is preferred over flattening
    to gender-neutral language when the source uses masculine/generic אדם. 'Man' best
    preserves the source form and the stylized decree language.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table
    for אָדָם
