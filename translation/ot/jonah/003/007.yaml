id: JON.3.7
reference: Jonah 3:7
source:
  edition: WLC
  text: וַ/יַּזְעֵ֗ק וַ/יֹּ֨אמֶר֙ בְּ/נִֽינְוֵ֔ה מִ/טַּ֧עַם הַ/מֶּ֛לֶךְ וּ/גְדֹלָ֖י/ו
    לֵ/אמֹ֑ר הָ/אָדָ֨ם וְ/הַ/בְּהֵמָ֜ה הַ/בָּקָ֣ר וְ/הַ/צֹּ֗אן אַֽל יִטְעֲמוּ֙ מְא֔וּמָה
    אַ֨ל יִרְע֔וּ וּ/מַ֖יִם אַל יִשְׁתּֽוּ־־־׃
translation:
  text: 'And he proclaimed and said in Nineveh, by decree of the king and his great
    ones: “Let neither man nor beast, herd nor flock, taste anything. Let them not
    graze, and let them not drink water.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the king and his nobles' or 'the king and his officials.' The Hebrew
      literally says 'the king and his great ones.'
    reason: lexical_alternative
  - marker: b
    text: '''Man'' renders Hebrew adam here as a collective term for human beings,
      in contrast with animals; alternatively, ''humankind.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּזְעֵק
  chosen: he proclaimed
  alternatives:
  - he cried out
  - he made a proclamation
  lexicon: HALOT
  rationale: The verb זעק literally denotes crying out, but in this royal-edict context,
    paired with 'and said' and followed by the content of a decree, 'proclaimed' best
    captures the public heralding function in natural English without losing the force
    of announcement.
- source_word: וַיֹּאמֶר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Standard narrative continuation after the proclamation verb; retained
    as 'and said' to reflect the Hebrew sequence rather than collapsing both verbs
    into a single English expression.
- source_word: בְּנִינְוֵה
  chosen: in Nineveh
  lexicon: HALOT
  rationale: Locative preposition is straightforward; the proclamation is issued within
    the city.
- source_word: מִטַּעַם
  chosen: by decree of
  alternatives:
  - by the decision of
  - by the command of
  - from the authority of
  lexicon: HALOT
  rationale: The noun טַעַם in imperial/administrative contexts refers to an official
    decision or decree. 'By decree of' fits the legal-public setting better than the
    more generic 'by command of'.
- source_word: הַמֶּלֶךְ וּגְדֹלָיו
  chosen: the king and his great ones
  alternatives:
  - the king and his nobles
  - the king and his officials
  lexicon: HALOT
  rationale: גְדֹלִים literally means 'great ones.' In context it refers to leading
    men around the king. 'Great ones' preserves the lexical sense while remaining
    intelligible; 'nobles' is plausible but slightly more interpretive.
- source_word: לֵאמֹר
  chosen: ':'
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Rendered by punctuation introducing direct speech, which is standard
    English representation of Hebrew לֵאמֹר.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - people
  lexicon: HALOT
  rationale: Following the doctrine's gender-accurate principle for אָדָם, here the
    singular collective contrasts with 'beast.' 'Man' preserves the representative/generic
    force and the human-animal pairing of the Hebrew.
- source_word: וְהַבְּהֵמָה
  chosen: beast
  alternatives:
  - animal
  - livestock
  lexicon: HALOT
  rationale: בְּהֵמָה is a broad term for animals, here followed by more specific
    categories. 'Beast' preserves the formal contrast with 'man' and suits the elevated
    decree style.
- source_word: הַבָּקָר וְהַצֹּאן
  chosen: herd nor flock
  alternatives:
  - cattle nor sheep
  - oxen nor sheep
  lexicon: HALOT
  rationale: These terms specify the classes of domestic animals. 'Herd' and 'flock'
    are idiomatic collective English terms that match the collective singulars and
    avoid over-specifying species where the Hebrew is class-based.
- source_word: אַל יִטְעֲמוּ מְאוּמָה
  chosen: Let neither man nor beast, herd nor flock, taste anything
  alternatives:
  - let them not taste anything at all
  - let them eat nothing
  lexicon: HALOT
  rationale: טעם literally means 'taste'; retaining 'taste anything' reflects the
    Hebrew wording more closely than the interpretive 'eat nothing,' while still clearly
    expressing a total fast.
- source_word: אַל יִרְעוּ
  chosen: Let them not graze
  alternatives:
  - let them not feed
  - let them not pasture
  lexicon: HALOT
  rationale: The verb רעה in Qal commonly means to pasture/graze. Since the subject
    here includes animals, 'graze' is the most natural and precise English rendering.
- source_word: וּמַיִם אַל יִשְׁתּוּ
  chosen: and let them not drink water
  alternatives:
  - nor drink water
  lexicon: HALOT
  rationale: Explicitly preserves the Hebrew object 'water' and the prohibition's
    coordination. English could compress to 'nor drink water,' but the fuller form
    keeps the cadence of the decree.
