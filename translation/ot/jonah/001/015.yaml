theological_decisions:
- issue: Personification of the sea's violent motion
  chosen_reading: Render the sea's cessation in vivid but natural language ('the sea stopped its raging')
  alternative_readings:
  - the sea ceased from its fury
  - the sea became calm
  rationale: The Hebrew personifies the sea by speaking of its זעף ('rage/fury'). The translation preserves that literary force without importing extra theological meaning or flattening it into a mere weather report.
