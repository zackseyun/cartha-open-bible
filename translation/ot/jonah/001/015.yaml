id: JON.1.15
reference: Jonah 1:15
source:
  edition: WLC
  text: וַ/יִּשְׂאוּ֙ אֶת יוֹנָ֔ה וַ/יְטִלֻ֖/הוּ אֶל הַ/יָּ֑ם וַ/יַּעֲמֹ֥ד הַ/יָּ֖ם מִ/זַּעְפּֽ/וֹ־־׃
translation:
  text: So they picked up Jonah and threw him into the sea[a], and the sea ceased from its raging.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'threw him into the sea, and the sea ceased from its fury.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂאוּ
  chosen: picked up
  alternatives:
  - lifted up
  - carried
  lexicon: HALOT
  rationale: From נשׂא, here in a concrete physical sense of lifting/carrying Jonah in order to cast him overboard. 'Picked up' is natural modern English and fits the immediate action better than the more formal 'lifted up.'
- source_word: וַיְטִלֻהוּ
  chosen: threw him
  alternatives:
  - hurled him
  - cast him
  lexicon: HALOT
  rationale: From טול, to throw/cast. 'Threw him' is the clearest contemporary rendering. 'Hurled' is possible and vivid, but the Hebrew itself does not require a more forceful English verb than simple casting/throwing.
- source_word: אֶל הַיָּם
  chosen: into the sea
  alternatives:
  - to the sea
  lexicon: HALOT
  rationale: Although אֶל often means 'to,' English idiom with a throwing verb normally requires 'into,' which best conveys the resulting motion intended by the Hebrew construction.
- source_word: וַיַּעֲמֹד הַיָּם
  chosen: the sea stopped
  alternatives:
  - the sea stood still
  - the sea became calm
  lexicon: HALOT
  rationale: From עמד, literally 'stood.' In this context of a stormy sea, the idiomatic sense is cessation of turbulent activity. 'Stopped' preserves the verbal force without overinterpreting to the smoother paraphrase 'became calm.'
- source_word: מִזַּעְפּוֹ
  chosen: its raging
  alternatives:
  - its fury
  - its anger
  - its storming
  lexicon: HALOT
  rationale: From זעף, denoting indignation/fury or violent agitation. Applied to the sea, 'its raging' captures the personified storm-fury in natural English. 'Anger' is too anthropomorphic in English here, while 'fury' is possible but less idiomatic with 'stopped.'
