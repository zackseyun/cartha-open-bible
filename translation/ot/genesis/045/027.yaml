id: GEN.45.27
reference: Genesis 45:27
source:
  edition: WLC
  text: וַ/יְדַבְּר֣וּ אֵלָ֗י/ו אֵ֣ת כָּל דִּבְרֵ֤י יוֹסֵף֙ אֲשֶׁ֣ר דִּבֶּ֣ר אֲלֵ/הֶ֔ם
    וַ/יַּרְא֙ אֶת הָ֣/עֲגָל֔וֹת אֲשֶׁר שָׁלַ֥ח יוֹסֵ֖ף לָ/שֵׂ֣את אֹת֑/וֹ וַ/תְּחִ֕י
    ר֖וּחַ יַעֲקֹ֥ב אֲבִי/הֶֽם־־־׃
translation:
  text: And they told him all the words of Yosef that he had spoken to them, and he
    saw the wagons that Yosef had sent to carry him, and the spirit of their father
    Yaakov revived.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the carts.' The Hebrew term refers to vehicles used for transport.
    reason: lexical_alternative
  - marker: b
    text: Or 'the spirit of their father Yaakov came to life,' an idiom for renewed
      vitality or encouragement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבְּרוּ אֵלָיו
  chosen: when they told him
  alternatives:
  - and they spoke to him
  - but they spoke to him
  lexicon: HALOT
  rationale: דבר with אֶל can mean 'speak to,' but in context it introduces the brothers'
    report to Yaakov; 'told him' is natural English that preserves the communicative
    act without unnecessary stiffness. 'When' reflects the temporal force of the narrative
    sequence in English.
- source_word: אֵת כָּל דִּבְרֵי יוֹסֵף
  chosen: all the words of Yosef
  alternatives:
  - everything Yosef said
  - all Yosef's words
  lexicon: HALOT
  rationale: Retains the concrete noun 'words' (דִּבְרֵי) rather than flattening to
    a paraphrase, while remaining readable.
- source_word: אֲשֶׁר דִּבֶּר אֲלֵהֶם
  chosen: that he had spoken to them
  alternatives:
  - which he spoke to them
  - that he said to them
  lexicon: HALOT
  rationale: Pluperfect-like English ('had spoken') fits the prior action relative
    to the brothers' report. 'Spoken' preserves the verbal link with דִּבְרֵי/דִּבֶּר.
- source_word: וַיַּרְא
  chosen: and he saw
  alternatives:
  - then he saw
  lexicon: HALOT
  rationale: Simple narrative continuation with waw-consecutive; straightforward past
    tense is sufficient in English.
- source_word: הָעֲגָלוֹת
  chosen: the wagons
  alternatives:
  - the carts
  lexicon: HALOT
  rationale: עֲגָלוֹת refers to transport wagons/carts. 'Wagons' fits the Egyptian
    provision in the narrative and is idiomatic in English.
- source_word: אֲשֶׁר שָׁלַח יוֹסֵף לָשֵׂאת אֹתוֹ
  chosen: that Yosef had sent to carry him
  alternatives:
  - that Yosef had sent to transport him
  - that Yosef had sent to bring him
  lexicon: HALOT
  rationale: לָשֵׂאת literally means 'to carry/bear.' 'Carry him' is the most direct
    rendering; 'bring him' is possible but less literal and slightly more interpretive.
- source_word: וַתְּחִי רוּחַ
  chosen: the spirit ... revived
  alternatives:
  - the spirit ... came to life
  - the spirit ... was revived
  lexicon: HALOT
  rationale: The idiom expresses renewed vitality/encouragement. 'Revived' preserves
    the life-language of חיה while sounding natural in English.
- source_word: יַעֲקֹב אֲבִיהֶם
  chosen: their father Yaakov
  alternatives:
  - Yaakov their father
  - Jacob their father
  lexicon: HALOT
  rationale: English idiom prefers 'their father Yaakov' here. Personal names are
    transliterated by project policy, so 'Yaakov' is used rather than the traditional
    English 'Jacob'.
