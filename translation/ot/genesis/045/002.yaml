id: GEN.45.2
reference: Genesis 45:2
source:
  edition: WLC
  text: וַ/יִּתֵּ֥ן אֶת קֹל֖/וֹ בִּ/בְכִ֑י וַ/יִּשְׁמְע֣וּ מִצְרַ֔יִם וַ/יִּשְׁמַ֖ע
    בֵּ֥ית פַּרְעֹֽה־׃
translation:
  text: And he wept aloud, and the Egyptians heard, and Pharaoh’s household heard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'he gave his voice in weeping,' a Hebrew idiom meaning that he
      wept loudly.
    reason: lexical_alternative
  - marker: b
    text: Or 'Egypt heard' if taken as a collective reference to the land/people;
      the plural verb supports 'the Egyptians heard.'
    reason: lexical_alternative
  - marker: c
    text: '''Pharaoh’s household'' may also be rendered ''the house of Pharaoh'' or,
      by extension, ''Pharaoh’s court.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן אֶת־קֹלוֹ
  chosen: he wept aloud
  alternatives:
  - he raised his voice
  - he gave his voice
  lexicon: HALOT
  rationale: The idiom literally means 'he gave his voice,' but in context with בִּבְכִי
    it denotes audible, loud weeping. 'He wept aloud' conveys the Hebrew sense naturally
    in English without wooden literalism.
- source_word: בִּבְכִי
  chosen: wept
  alternatives:
  - in weeping
  - with weeping
  lexicon: HALOT
  rationale: The prepositional phrase specifies the manner of giving/raising the voice.
    Rendering it verbally in English ('wept') produces idiomatic sense when combined
    with the preceding idiom.
- source_word: וַיִּשְׁמְעוּ
  chosen: heard
  alternatives:
  - listened to
  lexicon: HALOT
  rationale: The verb שׁמע here indicates perception of sound, not attentive listening
    or obedience. 'Heard' is the straightforward contextual gloss.
- source_word: מִצְרַיִם
  chosen: the Egyptians
  alternatives:
  - Egypt
  - Egyptians
  lexicon: HALOT
  rationale: 'Although the form can denote ''Egypt,'' the plural verb favors a collective
    personal sense: the Egyptians heard it. This is more natural and contextually
    precise than ''Egypt heard.'''
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - came to hear
  lexicon: HALOT
  rationale: Again, simple auditory perception is in view. English repeats 'heard'
    naturally and preserves the Hebrew parallelism.
- source_word: בֵּית פַּרְעֹה
  chosen: Pharaoh’s household
  alternatives:
  - the house of Pharaoh
  - Pharaoh’s house
  - Pharaoh’s palace
  lexicon: HALOT
  rationale: '''House'' in Hebrew can denote household or court. ''Pharaoh’s household''
    best captures the people of the royal establishment who heard the report, while
    remaining close to the Hebrew. ''Palace'' would shift from people to place.'
