id: GEN.45.25
reference: Genesis 45:25
source:
  edition: WLC
  text: וַֽ/יַּעֲל֖וּ מִ/מִּצְרָ֑יִם וַ/יָּבֹ֨אוּ֙ אֶ֣רֶץ כְּנַ֔עַן אֶֽל יַעֲקֹ֖ב
    אֲבִי/הֶֽם־׃
translation:
  text: So they went up from Egypt and came to the land of Canaan, to Jacob their
    father.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעֲלוּ
  chosen: went up
  alternatives:
  - came up
  - departed
  lexicon: HALOT
  rationale: עלה literally means 'go up/ascend.' In geographic travel formulas involving
    Egypt and Canaan, 'went up' preserves the Hebrew idiom and directional nuance
    better than a flattened 'departed.'
- source_word: מִמִּצְרַיִם
  chosen: from Egypt
  lexicon: HALOT
  rationale: The preposition מִן marks source/origin; the proper name is transliterated
    in standard English form as 'Egypt.'
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - arrived
  - entered
  lexicon: HALOT
  rationale: בוא commonly means 'come/enter.' 'Came' fits the narrative sequence naturally
    in English and does not over-specify entry in a way 'entered' might.
- source_word: אֶרֶץ כְּנַעַן
  chosen: the land of Canaan
  alternatives:
  - Canaan
  - the country of Canaan
  lexicon: HALOT
  rationale: The construct phrase explicitly includes 'land,' so 'the land of Canaan'
    preserves the full expression rather than shortening it to simply 'Canaan.'
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks direction toward a person; 'to' is the natural
    modern English equivalent.
- source_word: יַעֲקֹב
  chosen: Jacob
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: אֲבִיהֶם
  chosen: their father
  alternatives:
  - their ancestor
  lexicon: HALOT
  rationale: The noun means 'their father.' In context Jacob is the immediate father
    of Joseph's brothers, so the straightforward familial rendering is best.
