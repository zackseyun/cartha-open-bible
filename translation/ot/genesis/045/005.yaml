theological_decisions:
- issue: Divine providence and human agency
  chosen_reading: Retain both the brothers' culpable action ('you sold me') and God's
    sovereign purpose ('God sent me') in the main text without softening either.
  alternative_readings:
  - Soften the brothers' action to 'sent me away'
  - Make God's action merely permissive rather than active
  rationale: The Hebrew explicitly juxtaposes human action and divine action. The
    translation preserves this theological tension rather than resolving it, in keeping
    with the stated philosophy.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
