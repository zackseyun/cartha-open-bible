id: GEN.45.5
reference: Genesis 45:5
source:
  edition: WLC
  text: וְ/עַתָּ֣ה אַל תֵּעָ֣צְב֗וּ וְ/אַל יִ֨חַר֙ בְּ/עֵ֣ינֵי/כֶ֔ם כִּֽי מְכַרְתֶּ֥ם
    אֹתִ֖/י הֵ֑נָּה כִּ֣י לְ/מִֽחְיָ֔ה שְׁלָחַ֥/נִי אֱלֹהִ֖ים לִ/פְנֵי/כֶֽם׀־־־׃
translation:
  text: And now, do not be distressed or angry with yourselves because you sold me
    here, for God sent me ahead of you to preserve life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not be grieved' for 'do not be distressed.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'do not let it burn in your eyes,' an idiom for being angry or
      displeased.
    reason: lexical_alternative
  - marker: c
    text: Or 'for preservation of life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Discourse marker introducing Joseph's present appeal; 'And now' preserves
    the connective force of ו plus the temporal adverb.
- source_word: אַל תֵּעָצְבוּ
  chosen: do not be distressed
  alternatives:
  - do not be grieved
  - do not be upset
  lexicon: HALOT
  rationale: The verb עצב in this stem conveys emotional pain or grief. 'Be distressed'
    is natural modern English and fits Joseph's attempt to calm his brothers without
    overstating the emotion.
- source_word: וְאַל יִחַר בְּעֵינֵיכֶם
  chosen: or angry with yourselves
  alternatives:
  - or let it not burn in your eyes
  - or do not be angry in your own eyes
  - or do not be displeased with yourselves
  lexicon: HALOT
  rationale: The idiom literally involves anger burning 'in your eyes,' meaning being
    angry or displeased from one's own perspective. In context Joseph addresses their
    self-reproach, so 'angry with yourselves' best captures the idiomatic sense in
    readable English.
- source_word: כִּי מְכַרְתֶּם אֹתִי הֵנָּה
  chosen: because you sold me here
  alternatives:
  - that you sold me here
  lexicon: HALOT
  rationale: כִּי is causal here, grounding the prohibition. הֵנָּה is deictic 'here/to
    here'; 'here' is the most natural English rendering in this context.
- source_word: לְמִחְיָה
  chosen: to preserve life
  alternatives:
  - for preservation of life
  - for survival
  - to keep alive
  lexicon: HALOT
  rationale: The noun מחיה denotes preservation of life or means of survival. 'To
    preserve life' expresses purpose clearly and retains the life-preserving emphasis
    of Joseph's theological interpretation.
- source_word: שְׁלָחַנִי אֱלֹהִים
  chosen: God sent me
  alternatives:
  - God has sent me
  lexicon: HALOT
  rationale: The Hebrew perfect can be rendered as a simple past in narrative discourse.
    'God sent me' is straightforward and preserves Joseph's attribution of providential
    agency to God.
- source_word: לִפְנֵיכֶם
  chosen: ahead of you
  alternatives:
  - before you
  lexicon: HALOT
  rationale: '''Ahead of you'' communicates both temporal and positional priority
    in idiomatic modern English, fitting Joseph''s meaning that God sent him in advance
    of his brothers'' arrival.'
