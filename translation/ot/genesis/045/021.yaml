id: GEN.45.21
reference: Genesis 45:21
source:
  edition: WLC
  text: וַ/יַּֽעֲשׂוּ כֵן֙ בְּנֵ֣י יִשְׂרָאֵ֔ל וַ/יִּתֵּ֨ן לָ/הֶ֥ם יוֹסֵ֛ף עֲגָל֖וֹת
    עַל פִּ֣י פַרְעֹ֑ה וַ/יִּתֵּ֥ן לָ/הֶ֛ם צֵדָ֖ה לַ/דָּֽרֶךְ־־׃
translation:
  text: And the sons of Israel did so, and Joseph gave them wagons according to Pharaoh’s
    command, and he gave them provisions for the journey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'according to the mouth of Pharaoh,' an idiom meaning
      'according to Pharaoh’s command.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ כֵן
  chosen: did so
  alternatives:
  - did thus
  - did as instructed
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression meaning they acted in the manner just described.
    'Did so' is natural modern English and sufficiently formal.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - Israel's sons
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Given the immediate context refers to Jacob/Israel's
    male offspring, the gender-specific rendering is accurate and preferred over the
    traditional but broader 'children of Israel.'
- source_word: עֲגָלֹות
  chosen: wagons
  alternatives:
  - carts
  lexicon: HALOT
  rationale: Refers to wheeled transport vehicles sent for carrying people and goods.
    'Wagons' fits the narrative context and common English usage better than 'carts'
    here.
- source_word: עַל פִּי פַרְעֹה
  chosen: according to Pharaoh’s command
  alternatives:
  - at Pharaoh's order
  - by Pharaoh's mouth
  lexicon: HALOT
  rationale: The idiom literally means 'according to the mouth of Pharaoh,' that is,
    in accordance with his command or order. 'According to Pharaoh’s command' preserves
    the sense clearly in modern English.
- source_word: צֵדָה
  chosen: provisions
  alternatives:
  - supplies
  - food
  lexicon: HALOT
  rationale: Denotes travel provisions or supplies, not merely food in the narrow
    sense. 'Provisions' best captures the broader sense in a journey context.
- source_word: לַדָּרֶךְ
  chosen: for the journey
  alternatives:
  - for the road
  - for the way
  lexicon: HALOT
  rationale: In context this indicates what was needed for travel. 'For the journey'
    is idiomatic English and communicates purpose clearly.
