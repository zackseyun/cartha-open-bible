id: GEN.45.15
reference: Genesis 45:15
source:
  edition: WLC
  text: וַ/יְנַשֵּׁ֥ק לְ/כָל אֶחָ֖י/ו וַ/יֵּ֣בְךְּ עֲלֵי/הֶ֑ם וְ/אַ֣חֲרֵי כֵ֔ן דִּבְּר֥וּ אֶחָ֖י/ו אִתּֽ/וֹ־׃
translation:
  text: And he kissed all his brothers and wept over them. After that[a], his brothers spoke with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his brothers spoke to him.' The Hebrew construction can be rendered either way, though 'with him' better reflects the sense of conversation in this reconciled setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְנַשֵּׁק
  chosen: he kissed
  alternatives:
  - he embraced with kisses
  - he kissed repeatedly
  lexicon: HALOT
  rationale: From נשׁק in the Piel, denoting kissing as an act of affection/reconciliation. English 'kissed' is the most natural and sufficiently captures the action without overtranslating iterative nuance.
- source_word: לְכָל אֶחָיו
  chosen: all his brothers
  alternatives:
  - each of his brothers
  lexicon: HALOT
  rationale: כָּל with the plural construct indicates the totality of Joseph's brothers. 'All his brothers' is idiomatic English and preserves the familial term אֶחָיו.
- source_word: וַיֵּבְךְּ
  chosen: and wept
  alternatives:
  - and cried
  lexicon: HALOT
  rationale: בכה commonly means 'weep/cry.' 'Wept' better matches the solemn emotional tone of the reconciliation scene.
- source_word: עֲלֵיהֶם
  chosen: over them
  alternatives:
  - upon them
  - on them
  lexicon: HALOT
  rationale: עַל can denote physical contact or position in contexts of embracing and weeping. 'Over them' is natural English and fits the image of Joseph leaning on them as he weeps.
- source_word: וְאַחֲרֵי כֵן
  chosen: After that
  alternatives:
  - afterward
  - and after this
  lexicon: HALOT
  rationale: This temporal expression marks sequence. 'After that' is clear, contemporary, and preserves the narrative progression.
- source_word: דִּבְּרוּ אֶחָיו אִתּוֹ
  chosen: his brothers spoke with him
  alternatives:
  - his brothers talked with him
  - his brothers spoke to him
  lexicon: HALOT
  rationale: דבר with אֵת commonly indicates speaking with someone, suggesting conversation rather than a one-sided address. 'Spoke with him' best reflects the mutuality implied after reconciliation.
