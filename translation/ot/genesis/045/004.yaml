id: GEN.45.4
reference: Genesis 45:4
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יוֹסֵ֧ף אֶל אֶחָ֛י/ו גְּשׁוּ נָ֥א אֵלַ֖/י וַ/יִּגָּ֑שׁוּ וַ/יֹּ֗אמֶר
    אֲנִי֙ יוֹסֵ֣ף אֲחִי/כֶ֔ם אֲשֶׁר מְכַרְתֶּ֥ם אֹתִ֖/י מִצְרָֽיְמָ/ה־־־׃
translation:
  text: Then Joseph said to his brothers, “Please come near to me.” And they came
    near. Then he said, “I am Joseph, your brother, whom you sold into Egypt.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force better than a bare repeated 'and'
    in this context.
- source_word: אֶל־אֶחָיו
  chosen: to his brothers
  alternatives:
  - to his brothers
  lexicon: HALOT
  rationale: אָח in the plural with 3ms suffix straightforwardly means 'his brothers.'
    This is literal and contextually precise.
- source_word: גְּשׁוּ נָא אֵלַי
  chosen: Please come near to me
  alternatives:
  - Come near to me, please
  - Come closer to me
  lexicon: HALOT
  rationale: נגשׁ means to approach or come near. 'Please' reflects נָא as a polite
    entreaty. 'Come near' is preferred over 'come closer' because it more directly
    matches the Hebrew verb without adding a comparative nuance.
- source_word: וַיִּגָּשׁוּ
  chosen: And they came near
  alternatives:
  - And they approached
  lexicon: HALOT
  rationale: Reuses the same English root as גְּשׁוּ to preserve the Hebrew repetition
    and narrative response.
- source_word: אֲנִי יוֹסֵף
  chosen: I am Joseph
  alternatives:
  - I am Yosef
  lexicon: HALOT
  rationale: Standard English transliteration is 'Joseph.' The verbless clause is
    naturally rendered with 'am' in English.
- source_word: אֲחִיכֶם
  chosen: your brother
  alternatives:
  - your brother of yours
  lexicon: HALOT
  rationale: Singular construct with 2mp suffix identifies Joseph's relationship to
    them. English idiom requires simply 'your brother.'
- source_word: אֲשֶׁר מְכַרְתֶּם אֹתִי
  chosen: whom you sold
  alternatives:
  - that you sold
  - whom you sold away
  lexicon: HALOT
  rationale: The relative clause is direct and accusatory. 'Whom you sold' is idiomatic
    and preserves the personal object. 'Sold away' is possible but adds emphasis not
    explicit in the Hebrew.
- source_word: מִצְרָיְמָה
  chosen: into Egypt
  alternatives:
  - to Egypt
  - Egyptward
  lexicon: HALOT
  rationale: The directional he indicates motion toward Egypt. 'Into Egypt' communicates
    destination clearly in idiomatic English and fits the sense of being sold there.
