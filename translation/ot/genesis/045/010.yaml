id: GEN.45.10
reference: Genesis 45:10
source:
  edition: WLC
  text: וְ/יָשַׁבְתָּ֣ בְ/אֶֽרֶץ גֹּ֗שֶׁן וְ/הָיִ֤יתָ קָרוֹב֙ אֵלַ֔/י אַתָּ֕ה וּ/בָנֶ֖י/ךָ
    וּ/בְנֵ֣י בָנֶ֑י/ךָ וְ/צֹאנְ/ךָ֥ וּ/בְקָרְ/ךָ֖ וְ/כָל אֲשֶׁר לָֽ/ךְ־־־׃
translation:
  text: You shall live in the land of Goshen, and you shall be near me—you and your
    sons and your grandsons, and your flocks and your herds and all that you have.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְיָשַׁבְתָּ
  chosen: you shall live
  alternatives:
  - you shall dwell
  - you shall settle
  lexicon: HALOT
  rationale: The verb ישׁב commonly means 'sit, dwell, live, settle.' In this context
    Joseph is inviting Jacob to reside in a specific region, so 'live' is natural
    modern English while preserving the sense of settled residence.
- source_word: בְאֶרֶץ גֹּשֶׁן
  chosen: in the land of Goshen
  alternatives:
  - in Goshen
  - in the region of Goshen
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land, country, region.' 'The land of Goshen' reflects
    the Hebrew construction and preserves the geographic specificity better than the
    shorter 'in Goshen.' 'Goshen' is transliterated as a place name per translation
    philosophy.
- source_word: וְהָיִיתָ קָרוֹב אֵלַי
  chosen: and you shall be near me
  alternatives:
  - and you shall be close to me
  lexicon: HALOT
  rationale: היה + adjective קָרוֹב expresses resulting proximity. 'Near me' is straightforward
    and idiomatic, preserving the personal closeness Joseph promises.
- source_word: אַתָּה
  chosen: you
  alternatives:
  - you yourself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis after 'near me.' English can convey
    this adequately by apposition in the list ('you and your sons...') without an
    overly heavy 'you yourself.' The dash helps preserve the emphatic transition.
- source_word: וּבָנֶיךָ
  chosen: and your sons
  alternatives:
  - and your children
  lexicon: HALOT
  rationale: בנים here is specifically masculine plural, and the following phrase
    distinguishes sons from grandsons. Per gender-accurate philosophy, 'sons' is preferable
    to the more generic 'children.'
- source_word: וּבְנֵי בָנֶיךָ
  chosen: and your grandsons
  alternatives:
  - and your sons' sons
  - and the sons of your sons
  lexicon: HALOT
  rationale: Literally 'the sons of your sons.' 'Grandsons' is the natural English
    equivalent and preserves the male-specific reference present in the Hebrew.
- source_word: וְצֹאנְךָ
  chosen: and your flocks
  alternatives:
  - and your sheep and goats
  lexicon: HALOT
  rationale: צֹאן is a collective term for small livestock, especially sheep and goats.
    'Flocks' is the standard concise rendering and pairs well with 'herds' for בקר.
- source_word: וּבְקָרְךָ
  chosen: and your herds
  alternatives:
  - and your cattle
  lexicon: HALOT
  rationale: בקר refers to cattle/large livestock. 'Herds' is a natural collective
    rendering in English and maintains the livestock distinction from 'flocks.'
- source_word: וְכָל אֲשֶׁר לָךְ
  chosen: and all that you have
  alternatives:
  - and all that belongs to you
  - and everything that is yours
  lexicon: HALOT
  rationale: The phrase is broad and idiomatic, encompassing possessions generally.
    'All that you have' is clear, natural, and sufficiently comprehensive.
