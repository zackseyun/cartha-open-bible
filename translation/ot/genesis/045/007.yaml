id: GEN.45.7
reference: Genesis 45:7
source:
  edition: WLC
  text: וַ/יִּשְׁלָחֵ֤/נִי אֱלֹהִים֙ לִ/פְנֵי/כֶ֔ם לָ/שׂ֥וּם לָ/כֶ֛ם שְׁאֵרִ֖ית בָּ/אָ֑רֶץ
    וּ/לְ/הַחֲי֣וֹת לָ/כֶ֔ם לִ/פְלֵיטָ֖ה גְּדֹלָֽה׃
translation:
  text: And God sent me ahead of you to preserve for you a remnant in the land, and
    to keep you alive by a great deliverance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to preserve for you survivors in the land.' The Hebrew שְׁאֵרִית can
      denote 'remnant,' 'survivors,' or 'posterity.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for a great escape' or 'for many survivors.' The Hebrew לִפְלֵיטָה גְּדֹלָה
      may emphasize either the act of deliverance or the resulting survivors.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלָחֵנִי
  chosen: sent me
  alternatives:
  - has sent me
  lexicon: HALOT
  rationale: Wayyiqtol of שׁלח in narrative normally advances the past storyline,
    so 'sent me' is the natural English rendering.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the noun clearly refers to the one true God in Joseph's theological
    interpretation of events, so singular 'God' is required.
- source_word: לִפְנֵיכֶם
  chosen: ahead of you
  alternatives:
  - before you
  - in front of you
  lexicon: HALOT
  rationale: The idiom literally means 'before you,' but in this context of Joseph
    being sent earlier to Egypt, 'ahead of you' communicates temporal priority clearly
    in modern English.
- source_word: לָשׂוּם לָכֶם שְׁאֵרִית
  chosen: to preserve for you a remnant
  alternatives:
  - to set for you a remnant
  - to appoint for you survivors
  lexicon: HALOT
  rationale: שׂוּם literally means 'set/place,' but with שְׁאֵרִית in this context
    it conveys establishing or preserving surviving descendants/people. 'Preserve
    for you a remnant' captures the idiomatic sense without over-paraphrase.
- source_word: שְׁאֵרִית
  chosen: a remnant
  alternatives:
  - survivors
  - posterity
  lexicon: HALOT
  rationale: The noun denotes what remains or survives. 'Remnant' preserves the lexical
    and theological resonance of survival language in the Hebrew Bible, though 'posterity'
    is a possible contextual gloss.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - on the earth
  - in the earth
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'earth' or 'land'; here the local, concrete sense fits
    best. 'In the land' is more contextually precise than the broader 'on the earth.'
- source_word: וּלְהַחֲיוֹת לָכֶם
  chosen: and to keep you alive
  alternatives:
  - and to preserve your lives
  - and to let you live
  lexicon: HALOT
  rationale: The Hiphil of חיה means to keep alive or preserve life. 'Keep you alive'
    is natural English and fits the famine context.
- source_word: לִפְלֵיטָה גְּדֹלָה
  chosen: for a great deliverance
  alternatives:
  - for a great escape
  - for a great survival
  - for a great rescue
  lexicon: HALOT
  rationale: פְּלֵיטָה can denote escape, deliverance, or a body of survivors. Here
    it describes the result of God's preserving action. 'Great deliverance' best conveys
    the salvific outcome in idiomatic English, while avoiding the narrower physical
    nuance of 'escape' alone.
