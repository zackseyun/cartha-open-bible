theological_decisions:
- issue: Whether שְׁאֵרִית should be rendered with the theologically resonant 'remnant'
    or the more immediately contextual 'posterity/survivors'
  chosen_reading: a remnant
  alternative_readings:
  - posterity
  - survivors
  rationale: Although the immediate context concerns Jacob's family surviving the
    famine, 'remnant' is a faithful lexical rendering and preserves an important biblical
    motif without importing later theology into the verse. The surrounding clause
    clarifies the survival sense.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Whether לִפְלֵיטָה גְּדֹלָה refers to survival of persons ('many survivors')
    or the event/result of rescue ('a great deliverance')
  chosen_reading: for a great deliverance
  alternative_readings:
  - to preserve many survivors
  - for a great escape
  rationale: The preposition ל plus פְּלֵיטָה can express purpose/result. In parallel
    with 'to keep you alive,' the phrase points to the large-scale saving outcome
    God intended. 'Great deliverance' communicates that result while remaining grounded
    in the Hebrew.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition)
