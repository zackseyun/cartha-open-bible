id: GEN.45.14
reference: Genesis 45:14
source:
  edition: WLC
  text: וַ/יִּפֹּ֛ל עַל צַוְּארֵ֥י בִנְיָמִֽן אָחִ֖י/ו וַ/יֵּ֑בְךְּ וּ/בִנְיָמִ֔ן
    בָּכָ֖ה עַל צַוָּארָֽי/ו־־־׃
translation:
  text: Then he fell on the neck of Benjamin his brother and wept, and Benjamin wept
    on his neck.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'fell on the necks of Benjamin his brother ... and Benjamin
      wept on his neck.' The plural form 'necks' is an idiomatic expression in Hebrew
      for embracing around the neck.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפֹּל
  chosen: Then he fell
  alternatives:
  - And he fell
  - he threw himself
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative; 'Then he fell' is natural
    modern English while preserving the concrete verb נפל ('fall'). 'He threw himself'
    is possible dynamically, but the simpler rendering better matches the Hebrew wording.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: The preposition straightforwardly means 'on/upon.' 'On' is idiomatic
    in contemporary English and suits the embrace context.
- source_word: צַוְּארֵי / צַוָּארָיו
  chosen: the neck / his neck
  alternatives:
  - the necks
  - around the neck
  lexicon: HALOT
  rationale: Although the Hebrew form is morphologically plural/dual-like in construct,
    in this idiom it refers to the neck area in an embrace. Singular 'neck' is the
    most natural English equivalent. The repeated phrase is kept consistent in both
    clauses.
- source_word: בִנְיָמִן
  chosen: Benjamin
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: אָחִיו
  chosen: his brother
  lexicon: HALOT
  rationale: The appositional phrase identifies Benjamin as Joseph's brother. 'His
    brother' preserves the familial emphasis explicit in the Hebrew.
- source_word: וַיֵּבְךְּ / בָּכָה
  chosen: wept
  alternatives:
  - cried
  lexicon: HALOT
  rationale: בכה denotes weeping/crying. 'Wept' fits the emotional and literary tone
    of the reunion scene better than the more colloquial 'cried.' The same English
    gloss is used for both occurrences for consistency.
- source_word: וּבִנְיָמִן
  chosen: and Benjamin
  alternatives:
  - Benjamin also
  lexicon: HALOT
  rationale: The conjunction simply coordinates the second clause. 'And Benjamin'
    preserves the Hebrew structure without adding emphasis not explicit in the text.
