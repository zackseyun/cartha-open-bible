theological_decisions:
- issue: Divine sovereignty and human agency in Joseph's statement
  chosen_reading: Joseph's wording is rendered as a strong contrast ('it was not you
    ... but God') without softening either the brothers' action or God's providential
    purpose.
  alternative_readings:
  - A softer rendering that minimizes the brothers' agency
  - A paraphrase that explicitly explains compatibilism or providence
  rationale: 'The Hebrew presents a rhetorical contrast emphasizing God''s overruling
    purpose, but the translation should not import a full theological system beyond
    the text. The wording preserves the tension: the brothers truly acted, yet Joseph
    highlights God''s decisive purpose.'
  doctrine_reference: Preserve theological tension rather than resolve it.
