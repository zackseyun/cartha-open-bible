id: GEN.45.18
reference: Genesis 45:18
source:
  edition: WLC
  text: וּ/קְח֧וּ אֶת אֲבִי/כֶ֛ם וְ/אֶת בָּתֵּי/כֶ֖ם וּ/בֹ֣אוּ אֵלָ֑/י וְ/אֶתְּנָ֣ה
    לָ/כֶ֗ם אֶת טוּב֙ אֶ֣רֶץ מִצְרַ֔יִם וְ/אִכְל֖וּ אֶת חֵ֥לֶב הָ/אָֽרֶץ־־־־׃
translation:
  text: Take your father and your households, and come to me, and I will give you
    the best of the land of Egypt, and you shall eat the fat of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the richest part of the land.' The Hebrew idiom 'the fat of the land'
      refers to its choicest abundance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּקְחוּ
  chosen: Take
  alternatives:
  - Bring
  lexicon: HALOT
  rationale: Qal imperative plural of לקח, here directing Joseph's brothers to take
    along their father and families. 'Take' is the most direct rendering; 'bring'
    is possible in context but less formally tied to the verb's basic sense.
- source_word: אֲבִיכֶם
  chosen: your father
  lexicon: HALOT
  rationale: Straightforward construct with 2mp suffix; singular 'father' refers to
    Jacob.
- source_word: בָּתֵּיכֶם
  chosen: your households
  alternatives:
  - your houses
  - your families
  lexicon: HALOT
  rationale: Though literally 'your houses,' in this context בית commonly extends
    to household members/dependents. 'Households' preserves the social unit better
    than the overly literal 'houses' and is more precise than the looser 'families'.
- source_word: וּבֹאוּ אֵלַי
  chosen: and come to me
  alternatives:
  - and come back to me
  lexicon: HALOT
  rationale: Imperative plural of בוא with preposition אל. 'Come to me' is the plain
    sense. 'Come back' would add a nuance not explicit in the Hebrew.
- source_word: וְאֶתְּנָה לָכֶם
  chosen: and I will give you
  alternatives:
  - and let me give you
  lexicon: HALOT
  rationale: Cohortative-like form of נתן following imperatives functions as a promise
    or assurance. In English, future 'I will give you' best conveys the sense in context.
- source_word: טוּב אֶרֶץ מִצְרַיִם
  chosen: the best of the land of Egypt
  alternatives:
  - the good things of the land of Egypt
  - the bounty of the land of Egypt
  lexicon: HALOT
  rationale: טוּב denotes goodness, bounty, or best produce. In this promise context,
    'the best of the land of Egypt' communicates privileged access to Egypt's finest
    resources.
- source_word: וְאִכְלוּ
  chosen: and you shall eat
  alternatives:
  - and eat
  lexicon: HALOT
  rationale: Formally an imperative/waw sequence, but in English after a promise clause
    it naturally carries a resultative/future sense. 'You shall eat' fits the idiom
    and flow of the promise.
- source_word: חֵלֶב הָאָרֶץ
  chosen: the fat of the land
  alternatives:
  - the richest part of the land
  - the richest produce of the land
  lexicon: HALOT
  rationale: חֵלֶב literally means 'fat' and idiomatically refers to the richest or
    choicest portion. The main text keeps the vivid biblical idiom 'fat of the land';
    a lexical alternative is worth preserving for readers unfamiliar with the expression.
