id: GEN.45.26
reference: Genesis 45:26
source:
  edition: WLC
  text: וַ/יַּגִּ֨דוּ ל֜/וֹ לֵ/אמֹ֗ר ע֚וֹד יוֹסֵ֣ף חַ֔י וְ/כִֽי ה֥וּא מֹשֵׁ֖ל בְּ/כָל
    אֶ֣רֶץ מִצְרָ֑יִם וַ/יָּ֣פָג לִבּ֔/וֹ כִּ֥י לֹא הֶאֱמִ֖ין לָ/הֶֽם־־־׃
translation:
  text: They told him, saying, “Joseph is still alive, and he is ruler over all the
    land of Egypt.” But his heart went numb, for he did not believe them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'his heart fainted' or 'his heart grew numb.' The Hebrew idiom describes
      Jacob's stunned, weakened inner response when he heard the report.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגִּדוּ
  chosen: They told
  alternatives:
  - They reported
  - They informed
  lexicon: HALOT
  rationale: Hiphil of נגד commonly means to tell, report, or declare. 'They told'
    is natural modern English and fits the direct speech that follows.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - that
  - —
  lexicon: HALOT
  rationale: Retained as 'saying' to reflect the Hebrew speech-introduction formula
    without sounding overly wooden.
- source_word: עוֹד
  chosen: still
  alternatives:
  - yet
  lexicon: HALOT
  rationale: 'In context with ''Joseph ... alive,'' עוֹד marks continued state: Joseph
    remains alive. ''Still'' is the most idiomatic English equivalent.'
- source_word: חַי
  chosen: alive
  alternatives:
  - living
  lexicon: HALOT
  rationale: Predicate adjective meaning 'alive.' 'Alive' is the standard and clearest
    rendering in this context.
- source_word: וְכִי
  chosen: and
  alternatives:
  - and indeed
  - and that
  lexicon: HALOT
  rationale: 'Introduces a second content clause in the report. English can express
    this smoothly with simple coordination: ''and he is ruler...''.'
- source_word: מֹשֵׁל
  chosen: ruler
  alternatives:
  - governing
  - one who rules
  - governor
  lexicon: HALOT
  rationale: Participle of משל denotes exercising rule. 'Ruler' best captures the
    broad governing authority without narrowing it to a specific Egyptian office.
- source_word: בְּכָל אֶרֶץ מִצְרַיִם
  chosen: over all the land of Egypt
  alternatives:
  - throughout all the land of Egypt
  - in all the land of Egypt
  lexicon: HALOT
  rationale: With משל, the preposition ב can indicate sphere/domain of rule. 'Over
    all the land of Egypt' makes the governing sense explicit in idiomatic English.
- source_word: וַיָּפָג לִבּוֹ
  chosen: his heart went numb
  alternatives:
  - his heart grew cold
  - his heart fainted
  - his heart became numb
  lexicon: HALOT
  rationale: The verb פוג conveys becoming weak, numb, or faint. Here it describes
    Jacob's stunned emotional state on hearing unbelievable news. 'His heart went
    numb' preserves the metaphor while sounding natural in modern English.
- source_word: כִּי לֹא הֶאֱמִין לָהֶם
  chosen: for he did not believe them
  alternatives:
  - because he did not believe them
  lexicon: HALOT
  rationale: כִּי gives the reason for his stunned reaction. 'For' is concise and
    natural in narrative English, preserving the causal link.
