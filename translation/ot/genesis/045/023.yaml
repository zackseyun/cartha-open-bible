id: GEN.45.23
reference: Genesis 45:23
source:
  edition: WLC
  text: וּ/לְ/אָבִ֞י/ו שָׁלַ֤ח כְּ/זֹאת֙ עֲשָׂרָ֣ה חֲמֹרִ֔ים נֹשְׂאִ֖ים מִ/טּ֣וּב
    מִצְרָ֑יִם וְ/עֶ֣שֶׂר אֲתֹנֹ֡ת נֹֽ֠שְׂאֹת בָּ֣ר וָ/לֶ֧חֶם וּ/מָז֛וֹן לְ/אָבִ֖י/ו
    לַ/דָּֽרֶךְ׃
translation:
  text: 'And to his father he sent this: ten donkeys carrying some of the best things
    of Egypt, and ten female donkeys carrying grain and bread and provisions for his
    father for the journey.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the best of Egypt' / 'from Egypt's bounty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּזֹאת
  chosen: this
  alternatives:
  - as follows
  - like this
  lexicon: HALOT
  rationale: Idiomatic resumptive expression introducing what was sent. 'This' is
    natural English before the appositional list; 'as follows' is possible but slightly
    more interpretive.
- source_word: חֲמֹרִים
  chosen: donkeys
  alternatives:
  - asses
  lexicon: HALOT
  rationale: Modern readable English favors 'donkeys'; 'asses' is archaic in contemporary
    usage.
- source_word: נֹשְׂאִים
  chosen: carrying
  alternatives:
  - bearing
  - loaded with
  lexicon: HALOT
  rationale: Qal participle of נשׂא here describes what the animals were transporting.
    'Carrying' is straightforward and natural; 'loaded with' is interpretive.
- source_word: מִטּוּב מִצְרַיִם
  chosen: some of the best things of Egypt
  alternatives:
  - from the best of Egypt
  - from Egypt's bounty
  - from the good things of Egypt
  lexicon: HALOT
  rationale: טוּב denotes goodness/best produce/bounty in context. The partitive מִן
    is preserved with 'some of.' 'Best things' communicates quality without over-specifying
    produce.
- source_word: אֲתֹנֹת
  chosen: female donkeys
  alternatives:
  - she-donkeys
  - asses
  lexicon: HALOT
  rationale: The Hebrew specifically distinguishes female donkeys from the male/general
    term above. 'Female donkeys' is clear modern English; 'she-donkeys' is possible
    but less natural.
- source_word: בָּר
  chosen: grain
  alternatives:
  - corn
  - wheat
  lexicon: HALOT
  rationale: בָּר here refers generically to grain, not specifically maize ('corn'
    in modern American English) and not certainly wheat. 'Grain' is the safest contextual
    rendering.
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: The ordinary sense 'bread' fits the list of travel provisions and should
    be retained rather than generalized.
- source_word: מָזוֹן
  chosen: provisions
  alternatives:
  - food
  - supplies
  - nourishment
  lexicon: HALOT
  rationale: In travel context, 'provisions' best captures prepared sustenance/supplies
    for the trip, distinguishing it from the more specific 'bread' already mentioned.
- source_word: לַדָּרֶךְ
  chosen: for the journey
  alternatives:
  - for the road
  - for the way
  lexicon: HALOT
  rationale: Idiomatic English prefers 'for the journey' for supplies intended for
    travel. 'For the road' is possible but slightly more colloquial.
