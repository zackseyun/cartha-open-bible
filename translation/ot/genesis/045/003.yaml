id: GEN.45.3
reference: Genesis 45:3
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יוֹסֵ֤ף אֶל אֶחָי/ו֙ אֲנִ֣י יוֹסֵ֔ף הַ/ע֥וֹד אָבִ֖/י חָ֑י וְ/לֹֽא יָכְל֤וּ אֶחָי/ו֙ לַ/עֲנ֣וֹת אֹת֔/וֹ כִּ֥י נִבְהֲל֖וּ מִ/פָּנָֽי/ו־־׃
translation:
  text: Then Joseph said to his brothers[a], “I am Joseph. Is my father still alive?” But his brothers could not answer him[b], because they were dismayed at his presence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “were dismayed before him” or “were alarmed at the sight of him.”
    reason: lexical_alternative
  - marker: b
    text: Literally “from before him/his face,” a Hebrew expression indicating the effect of being in someone's presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English narrative flow while preserving sequence; 'And' is possible but less idiomatic here.
- source_word: אֶל אֶחָיו
  chosen: to his brothers
  alternatives:
  - to his brothers/brothers
  lexicon: HALOT
  rationale: Direct object of speech with אֶל. 'Brothers' is the natural rendering for Joseph's male siblings in context.
- source_word: אֲנִי יוֹסֵף
  chosen: I am Joseph
  alternatives:
  - I am Yosef
  lexicon: HALOT
  rationale: Explicit self-identification. Standard English transliteration 'Joseph' is preferred for readability and convention.
- source_word: הַעוֹד
  chosen: still
  alternatives:
  - yet
  - indeed still
  lexicon: HALOT
  rationale: In the interrogative expression הַעוֹד ... חָי, the adverb asks whether a state continues. 'Still' is the most natural English equivalent.
- source_word: אָבִי
  chosen: my father
  alternatives:
  - my father
  lexicon: HALOT
  rationale: First-person singular possessive is explicit and should be retained.
- source_word: חָי
  chosen: alive
  alternatives:
  - living
  lexicon: HALOT
  rationale: Predicate adjective describing continued life. 'Alive' is idiomatic in English in this question.
- source_word: וְלֹא יָכְלוּ
  chosen: But ... were not able
  alternatives:
  - and ... could not
  lexicon: HALOT
  rationale: The conjunction marks a contrastive turn in English after Joseph's question and revelation. 'Were not able' closely reflects יכל while remaining readable.
- source_word: לַעֲנוֹת אֹתוֹ
  chosen: to answer him
  alternatives:
  - to reply to him
  - to respond to him
  lexicon: HALOT
  rationale: ענה in this context means to answer/respond in speech. 'Answer him' is concise and standard.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason they could not answer. 'Because' is clearer in modern English than 'for'.
- source_word: נִבְהֲלוּ
  chosen: were terrified
  alternatives:
  - were dismayed
  - were alarmed
  - were overwhelmed
  lexicon: HALOT
  rationale: The Niphal of בהל conveys being disturbed, dismayed, or terrified. Given the dramatic revelation and their inability to answer, 'were terrified' best captures the intensity.
- source_word: מִפָּנָיו
  chosen: at his presence
  alternatives:
  - before him
  - at the sight of him
  - because of him
  lexicon: HALOT
  rationale: Literally 'from before his face/presence.' 'At his presence' preserves the idiom's force in natural English; 'before him' is more literal but less clear about the causal nuance.
