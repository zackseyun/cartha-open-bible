id: GEN.45.19
reference: Genesis 45:19
source:
  edition: WLC
  text: וְ/אַתָּ֥ה צֻוֵּ֖יתָה זֹ֣את עֲשׂ֑וּ קְחוּ לָ/כֶם֩ מֵ/אֶ֨רֶץ מִצְרַ֜יִם עֲגָל֗וֹת
    לְ/טַפְּ/כֶם֙ וְ/לִ/נְשֵׁי/כֶ֔ם וּ/נְשָׂאתֶ֥ם אֶת אֲבִי/כֶ֖ם וּ/בָאתֶֽם־־׃
translation:
  text: 'And you are commanded, ‘Do this: take for yourselves wagons from the land
    of Egypt for your little ones and for your wives, and bring your father and come.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “carts” for the transport vehicles sent from Egypt.
    reason: lexical_alternative
  - marker: b
    text: “Little ones” refers specifically to small children.
    reason: lexical_alternative
  - marker: c
    text: Or “bring your father and come back,” since the context implies returning
      to Egypt, though the Hebrew simply says “come.”
    reason: alternative_reading
lexical_decisions:
- source_word: צֻוֵּיתָה
  chosen: you are commanded
  alternatives:
  - you have been commanded
  - this is what you are commanded
  lexicon: HALOT
  rationale: Passive of צוה indicates that Joseph is under command, likely from Pharaoh
    in context. English present passive ('are commanded') conveys the force naturally
    in direct speech better than a stiffer perfect.
- source_word: זֹאת עֲשׂוּ
  chosen: Do this
  alternatives:
  - Do this thing
  - This do
  lexicon: HALOT
  rationale: Common Hebrew directive formula; concise modern English preserves the
    imperative force without wooden wording.
- source_word: קְחוּ לָכֶם
  chosen: take for yourselves
  alternatives:
  - get for yourselves
  - take
  lexicon: HALOT
  rationale: The dative pronoun adds beneficiary/reflexive nuance; 'for yourselves'
    preserves that nuance better than a bare 'take'.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - from Egypt
  lexicon: HALOT
  rationale: Includes אֶרֶץ explicitly rather than compressing to 'from Egypt,' since
    the fuller phrase is natural in English and reflects the source.
- source_word: עֲגָלוֹת
  chosen: wagons
  alternatives:
  - carts
  lexicon: HALOT
  rationale: Refers to transport vehicles sent for carrying people and goods. 'Wagons'
    fits the context of family transport in Genesis 45 better than the broader 'carts'.
- source_word: לְטַפְּכֶם
  chosen: for your little ones
  alternatives:
  - for your children
  - for your dependents
  lexicon: HALOT
  rationale: טַף denotes small children or little ones, not merely offspring in general.
    'Little ones' preserves the more specific sense.
- source_word: וְלִנְשֵׁיכֶם
  chosen: and for your wives
  alternatives:
  - and for your women
  lexicon: HALOT
  rationale: In this family-travel context, 'wives' is the clear relational sense.
- source_word: וּנְשָׂאתֶם אֶת אֲבִיכֶם
  chosen: and bring your father
  alternatives:
  - and carry your father
  - and lift up your father
  lexicon: HALOT
  rationale: נשא can mean carry/lift, but here idiomatically means to transport or
    bring along. 'Bring your father' is the most natural contextual rendering.
- source_word: וּבָאתֶם
  chosen: and come
  alternatives:
  - and come back
  - and return
  lexicon: HALOT
  rationale: The verb simply means 'come.' Although context implies coming to Egypt/back
    to Joseph, the Hebrew does not explicitly add 'back,' so the shorter rendering
    best preserves the source.
