id: GEN.45.9
reference: Genesis 45:9
source:
  edition: WLC
  text: מַהֲרוּ֮ וַ/עֲל֣וּ אֶל אָבִ/י֒ וַ/אֲמַרְתֶּ֣ם אֵלָ֗י/ו כֹּ֤ה אָמַר֙ בִּנְ/ךָ֣
    יוֹסֵ֔ף שָׂמַ֧/נִי אֱלֹהִ֛ים לְ/אָד֖וֹן לְ/כָל מִצְרָ֑יִם רְדָ֥/ה אֵלַ֖/י אַֽל
    תַּעֲמֹֽד־־־׃
translation:
  text: 'Hurry and go up to my father, and say to him, ‘Thus says your son Joseph:
    God has made me lord over all Egypt. Come down to me; do not delay.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not linger' or more literally, 'do not stand still.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַהֲרוּ
  chosen: Hurry
  alternatives:
  - Make haste
  - Quickly
  lexicon: HALOT
  rationale: Imperative plural from מהר conveys urgency. 'Hurry' is natural modern
    English and preserves the command force without archaism.
- source_word: וַעֲלוּ
  chosen: go up
  alternatives:
  - ascend
  lexicon: HALOT
  rationale: עלה literally means 'go up.' Retained because travel to Canaan is conventionally
    described as ascent in Genesis, and the idiom is still understandable in English.
- source_word: אֶל אָבִי
  chosen: to my father
  alternatives:
  - to my father’s place
  lexicon: HALOT
  rationale: Straightforward directional phrase; no expansion beyond the text.
- source_word: וַאֲמַרְתֶּם אֵלָיו
  chosen: and say to him
  alternatives:
  - and you shall say to him
  lexicon: HALOT
  rationale: Sequential instruction after imperatives. English smooths the Hebrew
    waw-sequence naturally.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus has said
  lexicon: HALOT
  rationale: Standard messenger formula. 'Thus says' preserves the formal reported-speech
    introduction.
- source_word: בִּנְךָ יוֹסֵף
  chosen: your son Joseph
  alternatives:
  - Joseph your son
  lexicon: HALOT
  rationale: Both are possible in English; 'your son Joseph' closely reflects the
    Hebrew order and emphasizes filial identity.
- source_word: שָׂמַנִי אֱלֹהִים
  chosen: God has made me
  alternatives:
  - God has set me
  - God has appointed me
  lexicon: HALOT
  rationale: שׂים here means to place or appoint into a role. 'Has made me' is idiomatic
    and fits the complement 'lord over all Egypt.'
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - god
  - Gods
  lexicon: HALOT
  rationale: With singular verbal sense and Joseph's speech context, the referent
    is the one God. English capitalizes accordingly.
- source_word: לְאָדוֹן
  chosen: lord
  alternatives:
  - master
  - ruler
  lexicon: HALOT
  rationale: אָדוֹן denotes one in authority. 'Lord' best preserves the status term
    here without over-specifying political office; lowercase avoids confusion with
    the divine title.
- source_word: לְכָל מִצְרַיִם
  chosen: over all Egypt
  alternatives:
  - for all Egypt
  - of all Egypt
  lexicon: HALOT
  rationale: The lamed with אָדוֹן yields the sense of authority extending over Egypt.
    'Over all Egypt' expresses dominion clearly in English.
- source_word: רְדָה אֵלַי
  chosen: Come down to me
  alternatives:
  - Go down to me
  - Descend to me
  lexicon: HALOT
  rationale: ירד literally means 'go down,' but in direct address 'come down to me'
    is more natural because Joseph is the destination. It also preserves the geographic
    descent to Egypt.
- source_word: אַל תַּעֲמֹד
  chosen: do not delay
  alternatives:
  - do not stand still
  - do not linger
  - do not stay
  lexicon: HALOT
  rationale: עמד literally means 'stand,' but in this prohibitive context it idiomatically
    means not to remain or tarry. 'Do not delay' best captures the intended urgency
    in contemporary English.
