theological_decisions:
- issue: Rendering אֱלֹהִים in Joseph's declaration
  chosen_reading: God
  alternative_readings:
  - god
  rationale: The singular sense is demanded by the syntax and by Joseph's consistent
    attribution of providence to the God he worships. This is not a doctrinal expansion
    but the plain sense of the Hebrew in context.
  doctrine_reference: Original-language primacy over translation tradition
