id: GEN.45.11
reference: Genesis 45:11
source:
  edition: WLC
  text: וְ/כִלְכַּלְתִּ֤י אֹֽתְ/ךָ֙ שָׁ֔ם כִּי ע֛וֹד חָמֵ֥שׁ שָׁנִ֖ים רָעָ֑ב פֶּן תִּוָּרֵ֛שׁ אַתָּ֥ה וּ/בֵֽיתְ/ךָ֖ וְ/כָל אֲשֶׁר לָֽ/ךְ־־־־׃
translation:
  text: There I will provide for you[a], for there are still five years of famine, lest you and your household and all that belongs to you become destitute.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be impoverished,' 'come to poverty,' or possibly 'be dispossessed.' The Hebrew verb can carry the sense of being reduced to ruin or loss.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִלְכַּלְתִּי
  chosen: I will provide for you
  alternatives:
  - I will sustain you
  - I will nourish you
  - I will support you there
  lexicon: HALOT
  rationale: The verb כלכל in the piel conveys sustaining or providing materially. In this context of famine and relocation, 'provide for you' is natural modern English and captures ongoing material support without narrowing to food alone.
- source_word: שָׁם
  chosen: There
  alternatives:
  - there
  lexicon: HALOT
  rationale: Locative adverb referring to the place Joseph has just urged Jacob to dwell. Fronting as 'There' preserves the Hebrew emphasis and reads smoothly in English.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason Joseph will provide for them. 'Because' is slightly clearer in contemporary English than 'for' while preserving the causal force.
- source_word: עוֹד חָמֵשׁ שָׁנִים רָעָב
  chosen: there are still five years of famine
  alternatives:
  - five years of famine remain
  - the famine will continue for five more years
  lexicon: HALOT
  rationale: The phrase states the continuing duration of the famine. 'There are still five years of famine' is idiomatic and reflects עוד ('still/yet') plus the nominal phrase without over-interpreting tense.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - so that not
  lexicon: HALOT
  rationale: פן introduces a negative purpose or prevention clause. 'Lest' is concise and accurate, though slightly formal; it best preserves the warning nuance.
- source_word: תִּוָּרֵשׁ
  chosen: become destitute
  alternatives:
  - come to poverty
  - be impoverished
  - be dispossessed
  lexicon: HALOT
  rationale: From ירשׁ in the niphal, here likely in the sense of being reduced, impoverished, or brought to ruin rather than literal dispossession of land. 'Become destitute' fits the famine context and includes the economic collapse implied for the whole household.
- source_word: אַתָּה וּבֵיתְךָ
  chosen: you and your household
  alternatives:
  - you and your house
  - you and your family
  lexicon: HALOT
  rationale: '''Household'' best represents בית in this context as the full domestic unit, broader than immediate family but more idiomatic than ''house.'''
- source_word: וְכָל אֲשֶׁר לָךְ
  chosen: and all that belongs to you
  alternatives:
  - and all that you have
  - and everything that is yours
  lexicon: HALOT
  rationale: This phrase extends beyond persons to possessions and dependents. 'All that belongs to you' is comprehensive and natural English.
