id: GEN.45.24
reference: Genesis 45:24
source:
  edition: WLC
  text: וַ/יְשַׁלַּ֥ח אֶת אֶחָ֖י/ו וַ/יֵּלֵ֑כוּ וַ/יֹּ֣אמֶר אֲלֵ/הֶ֔ם אַֽל תִּרְגְּז֖וּ
    בַּ/דָּֽרֶךְ־־׃
translation:
  text: Then he sent his brothers away, and they departed; and he said to them, “Do
    not quarrel on the way.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Do not be agitated,” “Do not be angry,” or “Do not be afraid on the
      way.” The Hebrew verb can denote various kinds of emotional disturbance; “quarrel”
      fits the immediate context of the brothers traveling together after Joseph’s
      disclosure.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׁלַּח
  chosen: he sent ... away
  alternatives:
  - he sent
  - he dismissed
  lexicon: HALOT
  rationale: The piel of שׁלח here denotes causing them to go from his presence. 'Sent
    ... away' captures both the act of dispatching and the departure context better
    than the bare 'sent.'
- source_word: אֶת־אֶחָיו
  chosen: his brothers
  alternatives:
  - his brothers
  lexicon: HALOT
  rationale: Literal familial term; no reason to generalize. 'Brothers' matches the
    Hebrew noun and the narrative context of Joseph's male siblings.
- source_word: וַיֵּלֵכוּ
  chosen: they departed
  alternatives:
  - they went
  - they left
  lexicon: HALOT
  rationale: הלך is broadly 'go/walk,' but in sequence after 'he sent his brothers
    away,' 'they departed' gives natural English while preserving the narrative movement.
- source_word: וַיֹּאמֶר אֲלֵהֶם
  chosen: and he said to them
  alternatives:
  - and he told them
  lexicon: HALOT
  rationale: Standard speech formula; 'said to them' is the most transparent rendering.
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - You must not
  lexicon: HALOT
  rationale: Standard negative particle with jussive/imperfect force in prohibition.
- source_word: תִּרְגְּזוּ
  chosen: quarrel
  alternatives:
  - be agitated
  - be angry
  - be afraid
  - be stirred up
  lexicon: HALOT
  rationale: רגז can denote agitation, trembling, anger, or emotional disturbance.
    In this context Joseph warns his brothers during their journey home, likely against
    contentious blaming of one another over what they had done to him. 'Quarrel' best
    fits the interpersonal travel context and is a common contextual interpretation,
    while broader alternatives are preserved in a footnote.
- source_word: בַּדָּרֶךְ
  chosen: on the way
  alternatives:
  - along the road
  - on the journey
  lexicon: HALOT
  rationale: דרך here refers to the route/journey back to Canaan. 'On the way' is
    idiomatic and sufficiently literal.
