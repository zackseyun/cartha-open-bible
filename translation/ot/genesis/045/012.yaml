id: GEN.45.12
reference: Genesis 45:12
source:
  edition: WLC
  text: וְ/הִנֵּ֤ה עֵֽינֵי/כֶם֙ רֹא֔וֹת וְ/עֵינֵ֖י אָחִ֣/י בִנְיָמִ֑ין כִּי פִ֖/י
    הַֽ/מְדַבֵּ֥ר אֲלֵי/כֶֽם־׃
translation:
  text: And look, your eyes see—and the eyes of my brother Benjamin—that it is my
    mouth that is speaking to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Behold, your eyes see, and the eyes of my brother Benjamin,
      that my mouth is the one speaking to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And look
  alternatives:
  - And behold
  - See
  lexicon: HALOT
  rationale: Introduces emphatic attention. 'And look' preserves the discourse force
    in readable modern English better than the more archaic 'behold,' while retaining
    the deictic immediacy.
- source_word: עֵינֵיכֶם
  chosen: your eyes
  alternatives:
  - you yourselves
  lexicon: HALOT
  rationale: A literal rendering is appropriate because the verse emphasizes direct
    visual confirmation. Rendering the body part explicitly preserves the Hebrew vividness.
- source_word: רֹאוֹת
  chosen: see
  alternatives:
  - are seeing
  - can see
  lexicon: HALOT
  rationale: The participial form conveys ongoing present perception. Simple present
    English communicates the sense naturally without overtranslating aspect.
- source_word: וְעֵינֵי אָחִי בִנְיָמִין
  chosen: and the eyes of my brother Benjamin
  alternatives:
  - and my brother Benjamin's eyes
  lexicon: HALOT
  rationale: This keeps the parallel structure with 'your eyes' and preserves the
    appositional identification of Benjamin as Joseph's brother.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what their eyes confirm. 'That' best
    fits the explanatory clause in English.
- source_word: פִּי
  chosen: my mouth
  alternatives:
  - I myself
  - my own mouth
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'my mouth,' stressing that Joseph is personally
    addressing them rather than speaking through an intermediary. Retaining the concrete
    expression preserves that emphasis.
- source_word: הַמְדַבֵּר אֲלֵיכֶם
  chosen: speaking to you
  alternatives:
  - the one speaking to you
  - that speaks to you
  lexicon: HALOT
  rationale: The participle with article functions substantivally, but idiomatic English
    can express it as 'speaking to you' after 'it is my mouth.' This preserves the
    present, direct action.
