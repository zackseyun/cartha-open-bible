id: GEN.30.25
reference: Genesis 30:25
source:
  edition: WLC
  text: וַ/יְהִ֕י כַּ/אֲשֶׁ֛ר יָלְדָ֥ה רָחֵ֖ל אֶת יוֹסֵ֑ף וַ/יֹּ֤אמֶר יַעֲקֹב֙ אֶל לָבָ֔ן שַׁלְּחֵ֨/נִי֙ וְ/אֵ֣לְכָ֔ה אֶל מְקוֹמִ֖/י וּ/לְ/אַרְצִֽ/י־־־׃
translation:
  text: And it happened[a], when Rachel had borne Joseph, that Jacob said to Laban, “Send me away, that I may go to my place and to my land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Let me go, so that I may go to my place and my land.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces a narrative development. 'And it happened' preserves the Hebrew discourse function in readable modern English without the archaic feel of 'came to pass.'
- source_word: כַּאֲשֶׁר
  chosen: when
  alternatives:
  - after
  - as soon as
  lexicon: HALOT
  rationale: Here the particle marks temporal circumstance. 'When' best fits the syntax with the following perfect verb and avoids over-specifying immediacy.
- source_word: יָלְדָה
  chosen: had borne
  alternatives:
  - gave birth to
  - bore
  lexicon: HALOT
  rationale: The verb ילד means 'bear, give birth.' 'Had borne' fits the past temporal frame introduced by 'when' and is slightly more formal/literary while remaining natural. 'Gave birth to' is possible but less concise.
- source_word: אֶת יוֹסֵף
  chosen: Joseph
  lexicon: HALOT
  rationale: Direct-object marker אֶת is untranslated in English; the personal name is transliterated per translation philosophy.
- source_word: וַיֹּאמֶר
  chosen: that Jacob said
  alternatives:
  - and Jacob said
  - Jacob said
  lexicon: HALOT
  rationale: The second waw-consecutive advances the narrative. Rendering with 'that Jacob said' after the temporal clause produces smooth English while preserving the sequence.
- source_word: שַׁלְּחֵנִי
  chosen: Send me away
  alternatives:
  - Let me go
  - Dismiss me
  lexicon: HALOT
  rationale: The imperative of שלח with 1cs suffix is a request for release/departure. 'Send me away' is the most direct lexical equivalent. 'Let me go' is idiomatic but slightly less explicit; 'dismiss me' sounds too formal/employment-like.
- source_word: וְאֵלְכָה
  chosen: that I may go
  alternatives:
  - and I will go
  - so that I may go
  lexicon: HALOT
  rationale: Following the imperative, the cohortative expresses purpose or intended result. 'That I may go' captures the volitional nuance better than a simple future.
- source_word: מְקוֹמִי
  chosen: my own place
  alternatives:
  - my place
  - my home
  lexicon: HALOT
  rationale: מקום is literally 'place.' 'My own place' brings out the possessive emphasis and avoids over-interpreting it as 'home,' though that idea is nearby contextually.
- source_word: וּלְאַרְצִי
  chosen: and to my own land
  alternatives:
  - and to my land
  - and to my country
  lexicon: HALOT
  rationale: אֶרֶץ commonly means 'land.' 'My own land' parallels 'my own place' and reflects Jacob's homeland without importing the more modern political sense of 'country'.
