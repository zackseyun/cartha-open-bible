id: GEN.30.8
reference: Genesis 30:8
source:
  edition: WLC
  text: וַ/תֹּ֣אמֶר רָחֵ֗ל נַפְתּוּלֵ֨י אֱלֹהִ֧ים נִפְתַּ֛לְתִּי עִם אֲחֹתִ֖/י גַּם
    יָכֹ֑לְתִּי וַ/תִּקְרָ֥א שְׁמ֖/וֹ נַפְתָּלִֽי׀־־׃
translation:
  text: Then Rachel said, “With wrestlings of God I have wrestled with my sister,
    and I have also prevailed.” So she called his name Naphtali.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''with wrestlings of God I have wrestled.'' The phrase may mean
      ''with divine wrestlings'' or, idiomatically, ''with mighty wrestlings.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: נַפְתּוּלֵי אֱלֹהִים
  chosen: with mighty wrestlings
  alternatives:
  - with wrestlings of God
  - with divine wrestlings
  - in great struggles
  lexicon: HALOT
  rationale: The construct phrase is difficult and likely idiomatic. אֱלֹהִים can
    function as an intensifier ('mighty, great') rather than a direct reference to
    God. Rendering it as 'mighty wrestlings' preserves the Hebrew wordplay with Naphtali
    while avoiding an over-literal English phrase that may sound opaque. The more
    formal alternatives are preserved in a footnote.
- source_word: נִפְתַּלְתִּי
  chosen: I have wrestled
  alternatives:
  - I have struggled
  - I have engaged in wrestling
  lexicon: HALOT
  rationale: This verb is cognate with the naming wordplay leading to Naphtali. 'I
    have wrestled' best preserves the sound-play and concrete imagery.
- source_word: עִם אֲחֹתִי
  chosen: with my sister
  alternatives:
  - against my sister
  lexicon: HALOT
  rationale: The preposition עִם normally means 'with,' though in competitive contexts
    it can imply opposition. 'With my sister' is the more direct rendering; the adversarial
    sense is sufficiently conveyed by 'wrestled' and the context.
- source_word: גַּם יָכֹלְתִּי
  chosen: and I have also prevailed
  alternatives:
  - and I have also won
  - and I have also been able
  lexicon: HALOT
  rationale: יכל in this context expresses success or overcoming in the rivalry. 'Prevailed'
    is idiomatic and fits the competitive setting better than the more wooden 'been
    able.'
- source_word: וַתִּקְרָא שְׁמוֹ נַפְתָּלִי
  chosen: So she called his name Naphtali
  alternatives:
  - So she named him Naphtali
  lexicon: HALOT
  rationale: This keeps the standard biblical naming formula while preserving the
    explicit connection between the spoken explanation and the child's name.
- source_word: נַפְתָּלִי
  chosen: Naphtali
  rationale: Personal names are transliterated by standard convention per project
    philosophy. The transliteration also preserves the Hebrew wordplay with נפתל/נפתולים
    as much as possible in English.
