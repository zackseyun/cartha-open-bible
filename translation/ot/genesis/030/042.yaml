id: GEN.30.42
reference: Genesis 30:42
source:
  edition: WLC
  text: וּ/בְ/הַעֲטִ֥יף הַ/צֹּ֖אן לֹ֣א יָשִׂ֑ים וְ/הָיָ֤ה הָ/עֲטֻפִים֙ לְ/לָבָ֔ן וְ/הַ/קְּשֻׁרִ֖ים לְ/יַעֲקֹֽב׃
translation:
  text: But when the flock were feeble[a], he would not put them in; so the feeble ones became Laban’s[c][b], and the strong ones Jacob’s.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when the flock were weak.' The Hebrew term may denote feeble animals; some understand it more specifically in relation to late or inferior breeding.
    reason: lexical_alternative
  - marker: b
    text: That is, he did not place the rods before them, as in the preceding verses.
    reason: cross_reference
  - marker: c
    text: Or 'the sturdy ones' or 'the vigorous ones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְהַעֲטִיף
  chosen: when ... were feeble
  alternatives:
  - when ... were weak
  - when ... were late-breeding
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב marks a temporal clause, 'when/in the case of.' The root עטף in this breeding context is traditionally understood of weak or feeble animals, contrasted with the following קְשֻׁרִים. 'Feeble' preserves the contrast without overinterpreting the exact physiological nuance.
- source_word: הַצֹּאן
  chosen: the flock
  alternatives:
  - the sheep and goats
  - the small livestock
  lexicon: HALOT
  rationale: צֹאן is a collective term for small livestock, especially sheep/goats. 'The flock' is natural English and fits the immediate pastoral context.
- source_word: לֹא יָשִׂים
  chosen: he would not put them in
  alternatives:
  - he did not place them
  - he would not set them there
  lexicon: HALOT
  rationale: שׂים means 'put/place/set.' In context it refers back to Jacob's placing of the rods before the animals at mating. 'Put them in' is idiomatic English for inserting/setting the rods in place, while preserving the implied object from context.
- source_word: וְהָיָה
  chosen: so ... became
  alternatives:
  - and ... were
  - and ... came to be
  lexicon: HALOT
  rationale: 'The waw + qatal here gives the resulting state: the weaker animals ended up belonging to Laban and the stronger to Jacob. ''So ... became'' communicates result smoothly in English.'
- source_word: הָעֲטֻפִים
  chosen: the feeble ones
  alternatives:
  - the weak ones
  - the enfeebled ones
  lexicon: HALOT
  rationale: This passive/participle form from עטף denotes the weaker animals in contrast to the robust animals. 'Feeble ones' keeps the lexical tie with הַעֲטִיף and preserves the contrast.
- source_word: לְלָבָן
  chosen: Laban’s
  alternatives:
  - belonged to Laban
  - for Laban
  lexicon: HALOT
  rationale: The lamed indicates possession/allotment. The possessive form is concise and natural in English.
- source_word: וְהַקְּשֻׁרִים
  chosen: the strong ones
  alternatives:
  - the sturdy ones
  - the vigorous ones
  lexicon: HALOT
  rationale: Though the form is unusual, in this context and by contrast with הָעֲטֻפִים it refers to the robust/healthy animals. 'Strong ones' is the clearest contextual rendering.
- source_word: לְיַעֲקֹב
  chosen: Jacob’s
  alternatives:
  - belonged to Jacob
  - for Jacob
  lexicon: HALOT
  rationale: As with לְלָבָן, the lamed marks possession or assignment; the English possessive is the most natural rendering.
