id: GEN.30.19
reference: Genesis 30:19
source:
  edition: WLC
  text: וַ/תַּ֤הַר עוֹד֙ לֵאָ֔ה וַ/תֵּ֥לֶד בֵּן שִׁשִּׁ֖י לְּ/יַעֲקֹֽב־׃
translation:
  text: Leah conceived again and bore Jacob a sixth son.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתַּהַר
  chosen: conceived
  alternatives:
  - became pregnant
  lexicon: HALOT
  rationale: The verb הרה in the qal/waw-consecutive narrative form means to conceive.
    'Conceived' is concise, idiomatic, and standard in birth narratives; 'became pregnant'
    is possible but less direct.
- source_word: עוֹד
  chosen: again
  alternatives:
  - still
  - yet
  lexicon: HALOT
  rationale: 'In this narrative sequence עוֹד marks repetition: Leah conceived once
    more. ''Again'' best captures the adverbial force in natural English.'
- source_word: וַתֵּלֶד
  chosen: bore
  alternatives:
  - gave birth to
  lexicon: HALOT
  rationale: ילד in this form means to give birth. 'Bore' is a natural and compact
    rendering in genealogical/birth contexts, while preserving the formal sense.
- source_word: בֵּן
  chosen: son
  alternatives:
  - male child
  lexicon: HALOT
  rationale: The noun straightforwardly means 'son.' 'Male child' is possible but
    unnecessarily clinical and less idiomatic here.
- source_word: שִׁשִּׁי
  chosen: sixth
  alternatives:
  - the sixth
  lexicon: HALOT
  rationale: The ordinal modifies 'son' and indicates birth order for Leah relative
    to Jacob's sons through her. English idiom prefers 'a sixth son' in this construction.
- source_word: לְיַעֲקֹב
  chosen: Jacob
  alternatives:
  - for Jacob
  - to Jacob
  lexicon: HALOT
  rationale: The prefixed ל marks relation/advantage in the idiom 'bore a son to/for
    Jacob.' In English, 'bore Jacob a sixth son' is the most natural equivalent while
    preserving the relational sense.
