id: GEN.30.37
reference: Genesis 30:37
source:
  edition: WLC
  text: וַ/יִּֽקַּֽח ל֣/וֹ יַעֲקֹ֗ב מַקַּ֥ל לִבְנֶ֛ה לַ֖ח וְ/ל֣וּז וְ/עֶרְמ֑וֹן וַ/יְפַצֵּ֤ל
    בָּ/הֵן֙ פְּצָל֣וֹת לְבָנ֔וֹת מַחְשֹׂף֙ הַ/לָּבָ֔ן אֲשֶׁ֖ר עַל הַ/מַּקְלֽוֹת־־׃
translation:
  text: Then Jacob took for himself fresh rods of poplar, almond, and plane tree,
    and peeled white stripes in them, exposing the white that was on the rods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fresh storax'; the exact identification of לִבְנֶה is uncertain, though
      'poplar' is a common rendering.
    reason: lexical_alternative
  - marker: b
    text: Older English versions often read 'hazel' for לוּז, but 'almond' is more
      likely.
    reason: lexical_alternative
  - marker: c
    text: Older English versions often read 'chestnut tree' for עֶרְמוֹן; 'plane tree'
      is more likely.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַקַּל
  chosen: rod(s)
  alternatives:
  - branch(es)
  - stick(s)
  lexicon: HALOT
  rationale: Refers to cut wooden staffs/branches used in Jacob's breeding practice.
    'Rods' fits the concrete object and traditional context better than the more generic
    'sticks,' while remaining natural English.
- source_word: לִבְנֶה לַח
  chosen: fresh poplar
  alternatives:
  - fresh storax
  - green poplar
  lexicon: HALOT
  rationale: לִבְנֶה is commonly identified as poplar (though exact species is uncertain),
    and לַח means fresh/moist/green. 'Fresh poplar' communicates newly cut, still-green
    wood in readable English.
- source_word: לוּז
  chosen: almond
  alternatives:
  - hazel
  lexicon: HALOT
  rationale: The Hebrew term is better identified with almond than the older traditional
    English 'hazel.' This follows original-language primacy over translation tradition.
- source_word: עֶרְמוֹן
  chosen: plane tree
  alternatives:
  - chestnut tree
  lexicon: HALOT
  rationale: The term is commonly understood as plane tree; 'chestnut' reflects older
    tradition but is less likely lexically.
- source_word: וַיְפַצֵּל
  chosen: peeled
  alternatives:
  - stripped
  - split/peeled off
  lexicon: HALOT
  rationale: In context Jacob removes bark from the rods. 'Peeled' is idiomatic and
    matches the action of exposing the lighter wood beneath.
- source_word: פְּצָלוֹת לְבָנוֹת
  chosen: white stripes
  alternatives:
  - white streaks
  - white peelings
  lexicon: HALOT
  rationale: The phrase denotes peeled sections producing visible white markings.
    'White stripes' clearly conveys the visual result in natural English.
- source_word: מַחְשֹׂף הַלָּבָן
  chosen: exposing the white
  alternatives:
  - laying bare the white part
  - making the white visible
  lexicon: HALOT
  rationale: The noun conveys baring/exposure, and הַלָּבָן refers to the white inner
    wood. 'Exposing the white' preserves the action-result relationship succinctly.
- source_word: אֲשֶׁר עַל הַמַּקְלוֹת
  chosen: that was on the rods
  alternatives:
  - that was in the rods
  - of the rods
  lexicon: HALOT
  rationale: The phrase points to the white portion belonging to/on the rods as exposed
    by peeling. 'On the rods' is a close rendering of עַל while remaining intelligible
    in English.
