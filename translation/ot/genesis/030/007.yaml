id: GEN.30.7
reference: Genesis 30:7
source:
  edition: WLC
  text: וַ/תַּ֣הַר ע֔וֹד וַ/תֵּ֕לֶד בִּלְהָ֖ה שִׁפְחַ֣ת רָחֵ֑ל בֵּ֥ן שֵׁנִ֖י לְ/יַעֲקֹֽב׃
translation:
  text: Bilhah[a], Rachel’s female slave, conceived again and bore Jacob a second son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “maidservant.” The Hebrew term refers to a female slave or servant of lower social status; “female slave” is used here to make the bonded status explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּהַר
  chosen: conceived
  alternatives:
  - became pregnant
  lexicon: HALOT
  rationale: The verb הרה denotes becoming pregnant/conceiving. 'Conceived' is concise, idiomatic, and fits the narrative sequence.
- source_word: עוֹד
  chosen: again
  alternatives:
  - still
  - yet
  lexicon: HALOT
  rationale: In this birth narrative context, עוֹד marks repetition of the event, so 'again' best conveys the sense.
- source_word: וַתֵּלֶד
  chosen: bore
  alternatives:
  - gave birth to
  lexicon: HALOT
  rationale: ילד in the qal with a direct object commonly means 'bore' or 'gave birth to.' 'Bore' is natural and slightly more formal, fitting the style.
- source_word: שִׁפְחַת
  chosen: female slave
  alternatives:
  - maidservant
  - slave girl
  - servant
  lexicon: HALOT
  rationale: שִׁפְחָה denotes a female slave/maidservant. In keeping with the project's preference to reflect bonded status where salient, 'female slave' makes the social reality explicit without archaic wording.
- source_word: בֵּן שֵׁנִי
  chosen: a second son
  alternatives:
  - a second boy
  - another son
  lexicon: HALOT
  rationale: 'The phrase literally means ''a second son.'' English idiom prefers the indefinite article here: ''a second son.'''
- source_word: לְיַעֲקֹב
  chosen: Jacob
  alternatives:
  - to Jacob
  - for Jacob
  lexicon: HALOT
  rationale: 'The preposition ל marks relation/parentage in this context: Bilhah bore a son to/for Jacob. English expresses this naturally as ''bore Jacob a second son.'''
- source_word: בִּלְהָה ... רָחֵל
  chosen: Bilhah, Rachel’s female slave,
  alternatives:
  - Bilhah, Rachel's maidservant,
  - Rachel's female slave Bilhah,
  lexicon: HALOT
  rationale: The appositional structure identifies Bilhah by her status relative to Rachel. Fronting the proper name and setting the apposition off with commas yields clear modern English while preserving the identification.
