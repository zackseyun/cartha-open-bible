id: GEN.30.22
reference: Genesis 30:22
source:
  edition: WLC
  text: וַ/יִּזְכֹּ֥ר אֱלֹהִ֖ים אֶת רָחֵ֑ל וַ/יִּשְׁמַ֤ע אֵלֶ֨י/הָ֙ אֱלֹהִ֔ים וַ/יִּפְתַּ֖ח אֶת רַחְמָֽ/הּ־־׃
translation:
  text: Then God remembered Rachel[b][a], and God listened to her and opened her womb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'took notice of Rachel' / 'was mindful of Rachel.' The Hebrew 'remembered' is a biblical idiom for God's favorable attention leading to action, not a suggestion that God had forgotten her.
    reason: lexical_alternative
  - marker: b
    text: Or 'heard her' or 'heeded her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְכֹּר
  chosen: remembered
  alternatives:
  - took notice of
  - was mindful of
  lexicon: HALOT
  rationale: The verb זכר in covenantal/narrative contexts often means more than mental recollection; it signals favorable attention leading to action. 'Remembered' preserves the biblical idiom and allows the following actions ('listened' and 'opened') to unpack its meaning without paraphrasing.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים takes singular verbal forms throughout, clearly referring to the one God, so 'God' is the natural English rendering.
- source_word: אֶת רָחֵל
  chosen: Rachel
  rationale: אֶת marks Rachel as the direct object; the name is transliterated per translation philosophy.
- source_word: וַיִּשְׁמַע אֵלֶיהָ
  chosen: listened to her
  alternatives:
  - heard her
  - heeded her
  lexicon: HALOT
  rationale: שׁמע with אֶל can mean 'listen to' in the sense of hearing attentively or responding. 'Listened to her' preserves the relational nuance better than the flatter 'heard her,' while avoiding over-interpretation such as 'answered her.'
- source_word: וַיִּפְתַּח
  chosen: opened
  lexicon: HALOT
  rationale: פתח is straightforwardly 'opened'; retaining the concrete verb preserves the Hebrew idiom.
- source_word: רַחְמָהּ
  chosen: her womb
  lexicon: HALOT
  rationale: רֶחֶם means 'womb.' The idiom 'opened her womb' is standard biblical language for enabling conception and should be preserved rather than paraphrased as 'made her able to conceive.'
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  rationale: The initial waw-consecutive advances the narrative. 'Then' gives natural modern English narrative flow while preserving sequence; repeated clause-initial 'and' would be more formal but less readable in English.
