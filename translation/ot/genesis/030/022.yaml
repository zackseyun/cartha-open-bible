theological_decisions:
- issue: Anthropomorphic language about God 'remembering' Rachel
  chosen_reading: Retain 'remembered' in the main text as biblical idiom for God's favorable attention and action.
  alternative_readings:
  - took notice of Rachel
  - was mindful of Rachel
  rationale: The Hebrew does not imply prior forgetfulness in a creaturely sense; however, replacing the idiom in the main text would flatten a significant biblical pattern. The following clauses clarify the meaning through divine response and action.
  doctrine_reference: Translation philosophy §1, §3
