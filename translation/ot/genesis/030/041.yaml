id: GEN.30.41
reference: Genesis 30:41
source:
  edition: WLC
  text: וְ/הָיָ֗ה בְּ/כָל יַחֵם֮ הַ/צֹּ֣אן הַ/מְקֻשָּׁרוֹת֒ וְ/שָׂ֨ם יַעֲקֹ֧ב אֶת הַ/מַּקְל֛וֹת לְ/עֵינֵ֥י הַ/צֹּ֖אן בָּ/רֳהָטִ֑ים לְ/יַחְמֵ֖/נָּה בַּ/מַּקְלֽוֹת־־׃
translation:
  text: And whenever the stronger of the flock were breeding[a], Jacob would place the rods before the eyes of the flock in the watering troughs[b], so that they might breed among the rods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the robust' or 'the vigorous' for 'the stronger of the flock'; the Hebrew term refers to the sturdier animals in contrast to the weak ones in the next verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the channels' or 'in the gutters'; the Hebrew term refers to the watering places where the animals came to drink.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And whenever
  alternatives:
  - And it happened
  - And it would happen
  lexicon: HALOT
  rationale: The waw + qatal of היה introduces a customary or repeated circumstance in narrative. 'Whenever' captures the iterative sense in natural English better than a wooden 'and it happened.'
- source_word: בְּכָל יַחֵם
  chosen: whenever ... were breeding
  alternatives:
  - at every time ... were in heat
  - whenever ... conceived
  lexicon: HALOT
  rationale: יחם refers to being in heat / breeding. In this animal-husbandry context, 'were breeding' is idiomatic and fits the infinitive-like temporal construction with בְּכָל.
- source_word: הַצֹּאן
  chosen: the flock
  alternatives:
  - the sheep
  - the small livestock
  lexicon: HALOT
  rationale: צאן can denote small livestock collectively, including sheep and goats. 'The flock' preserves the collective sense without over-specifying species.
- source_word: הַמְקֻשָּׁרוֹת
  chosen: the stronger
  alternatives:
  - the robust
  - the vigorous
  - the well-conditioned
  lexicon: HALOT
  rationale: In context this term contrasts with the weak animals in the following verse and refers to the stronger, sturdier animals. 'Stronger' communicates the practical sense clearly in modern English.
- source_word: וְשָׂם
  chosen: Jacob would place
  alternatives:
  - Jacob placed
  - Jacob set
  lexicon: HALOT
  rationale: The verb שׂים means 'put, place, set.' Given the iterative context, 'would place' best reflects repeated customary action.
- source_word: הַמַּקְלוֹת
  chosen: the rods
  alternatives:
  - the sticks
  - the branches
  lexicon: HALOT
  rationale: מקלות are rods/sticks used by Jacob in the breeding setup. 'Rods' is concise and matches the earlier context of peeled branches used as implements.
- source_word: לְעֵינֵי הַצֹּאן
  chosen: before the eyes of the flock
  alternatives:
  - in front of the flock
  - where the flock could see them
  lexicon: HALOT
  rationale: The idiom is literally 'before the eyes of,' and this can be retained in readable English while preserving the visual emphasis.
- source_word: בָּרֳהָטִים
  chosen: in the watering troughs
  alternatives:
  - in the gutters
  - in the channels
  lexicon: HALOT
  rationale: רהטים here refers to the troughs or channels where the animals came to drink. 'Watering troughs' makes the setting explicit and natural in English.
- source_word: לְיַחְמֶנָּה
  chosen: so that they might breed
  alternatives:
  - to make them breed
  - so that they might be in heat
  lexicon: HALOT
  rationale: The prefixed ל expresses purpose. The feminine plural suffix refers back to the flock animals collectively. 'So that they might breed' is idiomatic and reflects Jacob's purpose without overstating causation.
- source_word: בַּמַּקְלוֹת
  chosen: among the rods
  alternatives:
  - by the rods
  - at the rods
  - with the rods before them
  lexicon: HALOT
  rationale: The preposition ב here is locative/circumstantial. 'Among the rods' conveys that the breeding took place with the rods set there in front of them, while remaining close to the Hebrew.
