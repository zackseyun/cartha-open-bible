id: GEN.30.35
reference: Genesis 30:35
source:
  edition: WLC
  text: וַ/יָּ֣סַר בַּ/יּוֹם֩ הַ/ה֨וּא אֶת הַ/תְּיָשִׁ֜ים הָֽ/עֲקֻדִּ֣ים וְ/הַ/טְּלֻאִ֗ים וְ/אֵ֤ת כָּל הָֽ/עִזִּים֙ הַ/נְּקֻדּ֣וֹת וְ/הַ/טְּלֻאֹ֔ת כֹּ֤ל אֲשֶׁר לָבָן֙ בּ֔/וֹ וְ/כָל ח֖וּם בַּ/כְּשָׂבִ֑ים וַ/יִּתֵּ֖ן בְּ/יַד בָּנָֽי/ו־־־־־׃
translation:
  text: That day he removed the male goats that were streaked and spotted[a], and all the female goats that were speckled and spotted—every one that had white on it—and every dark-colored one among the lambs[c][b], and he put them into the care of his sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'striped' for 'streaked' (הָעֲקֻדִּים); the Hebrew refers to banded markings on the animals.
    reason: lexical_alternative
  - marker: b
    text: Or 'brown' instead of 'dark-colored' for חוּם; the term denotes a dark brown coloration.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'gave into the hand of his sons,' a Hebrew idiom for placing under their control or care.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסַר
  chosen: he removed
  alternatives:
  - he separated
  - he took away
  lexicon: HALOT
  rationale: The verb סור in the Hiphil/waw-consecutive context here denotes causing the animals to be set apart from the flock. 'Removed' is natural English and fits the narrative action of separating Laban's wage animals from the main herd.
- source_word: בַּיּוֹם הַהוּא
  chosen: That day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: A concise temporal expression in idiomatic English. 'That day' preserves the immediacy of the Hebrew without unnecessary stiffness.
- source_word: הַתְּיָשִׁים
  chosen: the male goats
  alternatives:
  - the he-goats
  - the bucks
  lexicon: HALOT
  rationale: תיש refers specifically to male goats. 'Male goats' is clear modern English; 'he-goats' is more traditional but less natural.
- source_word: הָעֲקֻדִּים
  chosen: streaked
  alternatives:
  - striped
  - banded
  - ring-streaked
  lexicon: HALOT
  rationale: The adjective refers to animals marked with bands or streaks. 'Streaked' is readable and broad enough to cover the marking without over-specifying a technical breeding term.
- source_word: הַטְּלֻאִים
  chosen: spotted
  alternatives:
  - patchy
  - mottled
  lexicon: HALOT
  rationale: This term denotes patchy or spotted coloration. 'Spotted' is the most straightforward English rendering in this livestock context.
- source_word: הָעִזִּים
  chosen: the female goats
  alternatives:
  - the goats
  lexicon: HALOT
  rationale: עזים is the common plural for goats, but in contrast with the preceding male goats it is best rendered 'female goats' to preserve the sex distinction explicit in the Hebrew context.
- source_word: הַנְּקֻדּוֹת
  chosen: speckled
  alternatives:
  - spotted
  - flecked
  lexicon: HALOT
  rationale: This adjective refers to small dots or speckles. 'Speckled' distinguishes it from טלאות, rendered 'spotted,' and preserves the Hebrew's use of two different marking terms.
- source_word: הַטְּלֻאֹת
  chosen: spotted
  alternatives:
  - patchy
  - mottled
  lexicon: HALOT
  rationale: As with the masculine plural earlier, this term denotes spotted or patchy markings. Rendering it 'spotted' maintains consistency across the verse.
- source_word: כֹּל אֲשֶׁר לָבָן בּוֹ
  chosen: every one that had white on it
  alternatives:
  - everything in which there was white
  - all that was white-marked
  lexicon: HALOT
  rationale: The clause qualifies the female goats by identifying any animal with white present in its coat. 'Every one that had white on it' is idiomatic and preserves the distributive force of כל.
- source_word: וְכָל חוּם בַּכְּשָׂבִים
  chosen: and every dark-colored one among the lambs
  alternatives:
  - and every brown one among the sheep
  - and all the dark ones among the lambs
  lexicon: HALOT
  rationale: חום commonly denotes brown/dark coloration. 'Dark-colored' is slightly broader and smoother in English, while still matching the contrastive color category. כְּשָׂבִים can denote young sheep; 'lambs' fits the lexical form better than the broader 'sheep.'
- source_word: וַיִּתֵּן בְּיַד בָּנָיו
  chosen: and he put them into the care of his sons
  alternatives:
  - and he gave them into the hand of his sons
  - and he entrusted them to his sons
  lexicon: HALOT
  rationale: The idiom 'into the hand of' means placing under someone's control or care. 'Put them into the care of his sons' communicates the idiom's sense in natural English while preserving the agency and custody idea.
