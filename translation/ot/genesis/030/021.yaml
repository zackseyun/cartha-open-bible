id: GEN.30.21
reference: Genesis 30:21
source:
  edition: WLC
  text: וְ/אַחַ֖ר יָ֣לְדָה בַּ֑ת וַ/תִּקְרָ֥א אֶת שְׁמָ֖/הּ דִּינָֽה־׃
translation:
  text: Afterward she bore a daughter and called her name Dinah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/אַחַר
  chosen: Afterward
  alternatives:
  - After that
  - Later
  lexicon: HALOT
  rationale: Temporal adverb/conjunction marking sequence after the preceding births.
    'Afterward' is natural modern English and preserves the narrative progression.
- source_word: יָלְדָה
  chosen: she bore
  alternatives:
  - she gave birth to
  - she delivered
  lexicon: HALOT
  rationale: Qal perfect 3fs of ילד, here with explicit object 'a daughter.' 'She
    bore' is concise and idiomatic in biblical narrative, preserving the formal sense
    without unnecessary expansion.
- source_word: בַּת
  chosen: a daughter
  alternatives:
  - daughter
  lexicon: HALOT
  rationale: 'Indefinite singular noun functioning as the object of ''bore.'' English
    idiom prefers the article here: ''bore a daughter.'''
- source_word: וַ/תִּקְרָא
  chosen: and called
  alternatives:
  - and she called
  - and named
  lexicon: HALOT
  rationale: Wayyiqtol continuing the narrative sequence. 'And called' keeps the Hebrew
    verbal flow. 'Named' is possible, but the following phrase 'her name' reflects
    the Hebrew idiom more transparently.
- source_word: אֶת שְׁמָהּ
  chosen: her name
  alternatives:
  - her
  - the name of her
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'called her name Dinah.' Retaining 'her
    name' preserves the source structure while remaining acceptable English. Rendering
    only 'named her Dinah' would be smoother but slightly less transparent to the
    Hebrew wording.
- source_word: דִּינָה
  chosen: Dinah
  lexicon: HALOT
  rationale: Proper personal name; per translation philosophy, names are transliterated
    by standard English convention.
