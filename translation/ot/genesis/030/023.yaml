id: GEN.30.23
reference: Genesis 30:23
source:
  edition: WLC
  text: וַ/תַּ֖הַר וַ/תֵּ֣לֶד בֵּ֑ן וַ/תֹּ֕אמֶר אָסַ֥ף אֱלֹהִ֖ים אֶת חֶרְפָּתִֽ/י־׃
translation:
  text: She conceived and bore a son, and said, “God has taken away my reproach.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “God has removed my disgrace” or “my shame.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּהַר
  chosen: She conceived
  alternatives:
  - She became pregnant
  lexicon: HALOT
  rationale: The verb הרה denotes becoming pregnant/conceiving. 'She conceived' is
    concise, idiomatic, and preserves the narrative sequence.
- source_word: וַתֵּלֶד בֵּן
  chosen: and bore a son
  alternatives:
  - and gave birth to a son
  lexicon: HALOT
  rationale: ילד with בֵּן straightforwardly means giving birth to a son. 'Bore a
    son' is slightly more formal but still natural and matches common biblical narrative
    style.
- source_word: וַתֹּאמֶר
  chosen: and said
  alternatives:
  - and she said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative continuation. English can omit the repeated
    pronoun naturally.
- source_word: אָסַף
  chosen: has taken away
  alternatives:
  - has removed
  - has gathered in
  lexicon: HALOT
  rationale: In this context אסף carries the sense of removing or taking away disgrace.
    'Has taken away' is idiomatic and preserves the perfect's resultative force in
    direct speech.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although morphologically plural, אֱלֹהִים here takes a singular verb
    and refers to the one God of Israel; therefore 'God' is the correct English rendering.
- source_word: חֶרְפָּתִי
  chosen: my reproach
  alternatives:
  - my disgrace
  - my shame
  lexicon: HALOT
  rationale: חֶרְפָּה denotes reproach, disgrace, or shame. 'Reproach' preserves the
    social dimension of public disgrace tied to barrenness in the narrative, while
    remaining understandable in modern English.
