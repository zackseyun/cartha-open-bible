id: GEN.30.26
reference: Genesis 30:26
source:
  edition: WLC
  text: תְּנָ֞/ה אֶת נָשַׁ֣/י וְ/אֶת יְלָדַ֗/י אֲשֶׁ֨ר עָבַ֧דְתִּי אֹֽתְ/ךָ֛ בָּ/הֵ֖ן
    וְ/אֵלֵ֑כָה כִּ֚י אַתָּ֣ה יָדַ֔עְתָּ אֶת עֲבֹדָתִ֖/י אֲשֶׁ֥ר עֲבַדְתִּֽי/ךָ־־־׃
translation:
  text: Give me my wives and my children, for whom I have served you, so that I may
    go; for you know the service with which I have served you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for which I have served you,' taking the reference more specifically
      to the wives rather than to the whole family just mentioned.
    reason: lexical_alternative
  - marker: b
    text: '''Service'' may also be rendered ''labor'' or ''work''; the translation
      keeps ''service'' to reflect the repeated Hebrew root for ''serve/work'' in
      this verse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּנָה
  chosen: Give me
  alternatives:
  - Give
  lexicon: HALOT
  rationale: Imperative of נתן addressed to Laban. English idiom naturally supplies
    the indirect object 'me' from the context, since Jacob is asking that his family
    be given over to him.
- source_word: נָשַׁי
  chosen: my wives
  alternatives:
  - my women
  lexicon: HALOT
  rationale: Plural construct with 1cs suffix from אִשָּׁה. In this context it clearly
    refers to Jacob's wives, not merely women.
- source_word: יְלָדַי
  chosen: my children
  alternatives:
  - my offspring
  lexicon: HALOT
  rationale: Common familial term from ילד. 'Children' is the most natural and accurate
    rendering in context.
- source_word: אֲשֶׁר עָבַדְתִּי אֹתְךָ בָהֵן
  chosen: for whom I have served you
  alternatives:
  - for whom I worked for you
  - through whom I served you
  lexicon: HALOT
  rationale: The relative clause modifies 'my wives and my children,' with בָהֵן most
    naturally referring especially to the wives as the basis/occasion of Jacob's service.
    'For whom' communicates that they were the object or cause of his labor, while
    still encompassing the family unit just mentioned.
- source_word: וְאֵלֵכָה
  chosen: so that I may go
  alternatives:
  - and let me go
  - that I may leave
  lexicon: HALOT
  rationale: Cohortative of הלך expressing Jacob's desired departure. 'So that I may
    go' preserves the volitional nuance without sounding archaic.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the request. 'For' fits the explanatory force
    in formal yet readable English.
- source_word: יָדַעְתָּ
  chosen: you know
  alternatives:
  - you have known
  - you yourself know
  lexicon: HALOT
  rationale: Simple perfect with present relevance. English present 'you know' best
    conveys the sense.
- source_word: עֲבֹדָתִי
  chosen: the service
  alternatives:
  - my work
  - my labor
  lexicon: HALOT
  rationale: Noun from עבד. 'Service' preserves lexical connection with the following
    verb 'I have served' and reflects Jacob's contracted labor under Laban.
- source_word: אֲשֶׁר עֲבַדְתִּיךָ
  chosen: with which I have served you
  alternatives:
  - that I rendered to you
  - which I worked for you
  lexicon: HALOT
  rationale: Retaining 'served' mirrors the Hebrew verbal repetition and keeps the
    emphasis on Jacob's labor relationship to Laban. 'With which' is slightly formal
    but clear and preserves the construction linking the noun and verb.
