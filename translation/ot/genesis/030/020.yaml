id: GEN.30.20
reference: Genesis 30:20
source:
  edition: WLC
  text: וַ/תֹּ֣אמֶר לֵאָ֗ה זְבָדַ֨/נִי אֱלֹהִ֥ים אֹתִ/י֮ זֵ֣בֶד טוֹב֒ הַ/פַּ֨עַם֙
    יִזְבְּלֵ֣/נִי אִישִׁ֔/י כִּֽי יָלַ֥דְתִּי ל֖/וֹ שִׁשָּׁ֣ה בָנִ֑ים וַ/תִּקְרָ֥א
    אֶת שְׁמ֖/וֹ זְבֻלֽוּן׀־־׃
translation:
  text: And Leah said, “God has endowed me with a good gift. This time my husband
    will honor me, because I have borne him six sons.” So she called his name Zebulun.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “will dwell with me.” The Hebrew verb is rare and is linked by wordplay
      to the name Zebulun; the sense may include both honor and dwelling/remaining
      with Leah.
    reason: lexical_alternative
lexical_decisions:
- source_word: זְבָדַנִי
  chosen: has endowed me
  alternatives:
  - has given me
  - has gifted me
  lexicon: HALOT
  rationale: From זבד, 'to endow/give as a gift.' 'Has endowed me' preserves the verbal
    connection with the following noun זבד ('gift/endowment') better than the flatter
    'has given me.'
- source_word: זֵבֶד טוֹב
  chosen: a good gift
  alternatives:
  - a good dowry
  - a good endowment
  lexicon: HALOT
  rationale: The noun denotes a gift/endowment. 'Good gift' is natural English and
    preserves the wordplay with זְבָדַנִי and the naming explanation. 'Dowry' is possible
    in some contexts but too specific here.
- source_word: הַפַּעַם
  chosen: This time
  alternatives:
  - Now
  - At this time
  lexicon: HALOT
  rationale: Standard idiomatic rendering in naming/birth formula contexts.
- source_word: יִזְבְּלֵנִי
  chosen: will honor me
  alternatives:
  - will dwell with me
  - will exalt me
  lexicon: HALOT
  rationale: The verb is difficult and tied to the name Zebulun. In context Leah expresses
    hope for improved regard from Jacob after bearing six sons. 'Will honor me' best
    fits the immediate sense and longstanding lexical understanding, while an alternative
    tied to 'dwell with' is worth preserving in a footnote because of the wordplay
    and possible semantic overlap.
- source_word: אִישִׁי
  chosen: my husband
  alternatives:
  - my man
  lexicon: HALOT
  rationale: In marital context, 'my husband' is the clear and natural English equivalent.
- source_word: יָלַדְתִּי לוֹ שִׁשָּׁה בָנִים
  chosen: I have borne him six sons
  alternatives:
  - I have given birth to six sons for him
  lexicon: HALOT
  rationale: '''Borne him six sons'' is idiomatic, concise, and preserves both the
    maternal action and the indirect object לוֹ.'
- source_word: וַתִּקְרָא אֶת שְׁמוֹ זְבֻלוּן
  chosen: So she called his name Zebulun
  alternatives:
  - And she named him Zebulun
  lexicon: HALOT
  rationale: Keeps the Hebrew naming formula relatively transparent while remaining
    readable. The transliterated personal name follows project policy.
- source_word: זְבֻלוּן
  chosen: Zebulun
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention. The form also
    preserves the sound-play with זבד / יזבלני in Leah's explanation.
