id: GEN.30.31
reference: Genesis 30:31
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר מָ֣ה אֶתֶּן לָ֑/ךְ וַ/יֹּ֤אמֶר יַעֲקֹב֙ לֹא תִתֶּן לִ֣/י מְא֔וּמָה אִם תַּֽעֲשֶׂה לִּ/י֙ הַ/דָּבָ֣ר הַ/זֶּ֔ה אָשׁ֛וּבָה אֶרְעֶ֥ה צֹֽאנְ/ךָ֖ אֶשְׁמֹֽר־־־־־׃
translation:
  text: And he said[a], “What shall I give you?” And Jacob said, “You shall not give me anything. If you will do this thing for me, I will again pasture your flock and keep it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will return, pasture your flock, and keep it.' The Hebrew verb can suggest either returning or resuming the work.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה אֶתֶּן לָךְ
  chosen: What shall I give you?
  alternatives:
  - What should I give you?
  - What may I give you?
  lexicon: HALOT
  rationale: Interrogative מָה with נתן in the first person asks what compensation Laban should provide. 'Shall' fits the offer/request nuance in natural English without sounding archaic in this context.
- source_word: לֹא תִתֶּן לִי מְאוּמָה
  chosen: You shall not give me anything
  alternatives:
  - You need not give me anything
  - Do not give me anything
  lexicon: HALOT
  rationale: מְאוּמָה means 'anything/anything at all.' The imperfect with לֹא here functions as a refusal of payment rather than a simple future prediction. 'You shall not give me anything' preserves the directness of Jacob's response while remaining idiomatic.
- source_word: מְאוּמָה
  chosen: anything
  alternatives:
  - anything at all
  - something
  lexicon: HALOT
  rationale: The noun is commonly used in negative contexts to mean 'anything.' 'Anything' is the most natural English equivalent here.
- source_word: אִם תַּעֲשֶׂה לִּי הַדָּבָר הַזֶּה
  chosen: If you will do this thing for me
  alternatives:
  - If you will do this for me
  - If you will grant me this request
  lexicon: HALOT
  rationale: The clause is conditional and introduces Jacob's proposed arrangement. Retaining 'this thing' reflects the Hebrew demonstrative construction, though in smooth modern English it still reads naturally.
- source_word: אָשׁוּבָה
  chosen: I will again
  alternatives:
  - I will return and
  - I will resume
  lexicon: HALOT
  rationale: In context שׁוּב does not primarily indicate physical return to a place but resumption of service. Rendering it adverbially as 'again' captures the sense when followed by the two service verbs.
- source_word: אֶרְעֶה
  chosen: pasture
  alternatives:
  - shepherd
  - tend
  lexicon: HALOT
  rationale: רעה with flock language denotes tending/grazing livestock. 'Pasture your flock' is a concise and concrete rendering that preserves the shepherding sense.
- source_word: צֹאנְךָ
  chosen: your flock
  alternatives:
  - your sheep and goats
  - your small livestock
  lexicon: HALOT
  rationale: צֹאן is a collective for small livestock, especially sheep and goats. 'Flock' is the standard concise English collective and fits the pastoral context.
- source_word: אֶשְׁמֹר
  chosen: keep it
  alternatives:
  - watch over it
  - guard it
  lexicon: HALOT
  rationale: שׁמר here complements רעה, expressing protective oversight of the flock. 'Keep it' is compact and idiomatic; the singular pronoun reflects English treatment of 'flock' as a collective singular.
