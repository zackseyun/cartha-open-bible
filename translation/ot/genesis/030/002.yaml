id: GEN.30.2
reference: Genesis 30:2
source:
  edition: WLC
  text: וַ/יִּֽחַר אַ֥ף יַעֲקֹ֖ב בְּ/רָחֵ֑ל וַ/יֹּ֗אמֶר הֲ/תַ֤חַת אֱלֹהִים֙ אָנֹ֔כִי אֲשֶׁר מָנַ֥ע מִמֵּ֖/ךְ פְּרִי בָֽטֶן־־־׃
translation:
  text: Then Jacob became angry with Rachel and said[a], “Am I in the place of God[b], who has withheld the fruit of the womb from you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'his anger burned against Rachel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the fruit of the womb,' an idiom for children or offspring.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר אַף
  chosen: became angry
  alternatives:
  - his anger burned
  - was angry
  lexicon: HALOT
  rationale: The idiom literally involves the burning of anger ('his nose/anger burned'), but 'became angry' is natural modern English and preserves the force without awkward literalism. 'His anger burned' is a viable more-formal alternative.
- source_word: בְּרָחֵל
  chosen: with Rachel
  alternatives:
  - at Rachel
  lexicon: HALOT
  rationale: The preposition with verbs of anger can indicate the object toward whom anger is directed. 'With Rachel' is idiomatic English; 'at Rachel' is also possible but slightly harsher in tone.
- source_word: הֲתַחַת אֱלֹהִים אָנֹכִי
  chosen: Am I in the place of God
  alternatives:
  - Am I under God?
  - Am I God instead?
  lexicon: HALOT
  rationale: 'תחת here expresses substitution or standing in another''s place. The sense is not location (''under'') but role: Jacob denies occupying God''s place or prerogative. ''In the place of God'' best captures the idiom in clear English.'
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים refers to the one true God in Jacob's speech, not gods in general; singular 'God' is required by context and the singular verb that follows.
- source_word: אֲשֶׁר מָנַע
  chosen: who has withheld
  alternatives:
  - who withheld
  - who has kept back
  lexicon: HALOT
  rationale: The relative clause identifies God as the one who has prevented conception. 'Has withheld' communicates ongoing resultant state and fits the context of present barrenness. English present perfect is smoother than a simple past here.
- source_word: מִמֵּךְ
  chosen: from you
  alternatives:
  - from you, Rachel
  lexicon: HALOT
  rationale: 'The preposition מן marks separation or deprivation: the fruit has been withheld from Rachel. A simple ''from you'' is sufficient and direct.'
- source_word: פְּרִי בָטֶן
  chosen: the fruit of the womb
  alternatives:
  - children
  - offspring
  lexicon: HALOT
  rationale: This Hebrew expression is a concrete idiom for offspring/fertility. Retaining 'fruit of the womb' preserves the metaphor and biblical diction while remaining understandable. 'Children' would be clearer but less textually transparent.
