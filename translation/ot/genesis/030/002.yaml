theological_decisions:
- issue: Agency in barrenness
  chosen_reading: Jacob attributes Rachel's lack of children to God's withholding of fertility.
  alternative_readings:
  - Jacob speaks only rhetorically without affirming divine agency
  rationale: The clause אֲשֶׁר מָנַע מִמֵּךְ פְּרִי בָטֶן straightforwardly identifies God as the one who has withheld fertility. The translation should preserve that claim without softening it.
