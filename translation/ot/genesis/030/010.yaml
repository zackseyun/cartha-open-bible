id: GEN.30.10
reference: Genesis 30:10
source:
  edition: WLC
  text: וַ/תֵּ֗לֶד זִלְפָּ֛ה שִׁפְחַ֥ת לֵאָ֖ה לְ/יַעֲקֹ֥ב בֵּֽן׃
translation:
  text: And Zilpah, Leah's female servant, bore Jacob a son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'maidservant.' The Hebrew שִׁפְחָה refers to a female household servant
      of subordinate status.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶד
  chosen: And ... bore
  alternatives:
  - and ... gave birth
  lexicon: HALOT
  rationale: Wayyiqtol of ילד introduces the next event in narrative sequence; 'bore'
    is idiomatic English for a woman bearing a child and fits the direct object 'a
    son.'
- source_word: זִלְפָּה
  chosen: Zilpah
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: שִׁפְחַת
  chosen: female servant
  alternatives:
  - maidservant
  - slave-girl
  - servant
  lexicon: HALOT
  rationale: שִׁפְחָה denotes a female servant/slave. Here 'female servant' is a readable,
    gender-accurate rendering that preserves her subordinate household status without
    over-paraphrase. 'Maidservant' is possible but less current; 'slave-girl' may
    over-specify age.
- source_word: לֵאָה
  chosen: Leah's
  alternatives:
  - the servant of Leah
  rationale: 'Construct relationship is naturally rendered in English as possession:
    ''Leah''s female servant.'''
- source_word: לְיַעֲקֹב
  chosen: Jacob
  alternatives:
  - to Jacob
  - for Jacob
  lexicon: HALOT
  rationale: 'The preposition ל with ילד in this construction marks the father/beneficiary;
    idiomatic English expresses this as indirect object placement: ''bore Jacob a
    son.'''
- source_word: בֵּן
  chosen: a son
  alternatives:
  - son
  lexicon: HALOT
  rationale: 'Indefinite singular common noun in context; English naturally supplies
    the article: ''a son.'''
