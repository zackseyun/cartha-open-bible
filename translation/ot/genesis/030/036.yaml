id: GEN.30.36
reference: Genesis 30:36
source:
  edition: WLC
  text: וַ/יָּ֗שֶׂם דֶּ֚רֶךְ שְׁלֹ֣שֶׁת יָמִ֔ים בֵּינ֖/וֹ וּ/בֵ֣ין יַעֲקֹ֑ב וְ/יַעֲקֹ֗ב
    רֹעֶ֛ה אֶת צֹ֥אן לָבָ֖ן הַ/נּוֹתָרֹֽת־׃
translation:
  text: And he put a distance of three days between himself and Jacob, and Jacob was
    shepherding the rest of Laban’s flock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a journey of three days' / 'three days’ journey.' The Hebrew idiom literally
      uses 'way/journey of three days' to express the distance separating them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  chosen: he put
  alternatives:
  - he set
  - he placed
  lexicon: HALOT
  rationale: The verb שׂוּם commonly means 'put, set, place.' Here it governs the
    object 'distance/journey of three days,' so 'put' is a natural English rendering
    that preserves the Hebrew idiom without over-paraphrasing.
- source_word: דֶּרֶךְ שְׁלֹשֶׁת יָמִים
  chosen: a distance of three days
  alternatives:
  - a journey of three days
  - three days' journey
  lexicon: HALOT
  rationale: דֶּרֶךְ literally means 'way/road/journey,' but in this construction
    it denotes the extent of travel separating two parties. 'A distance of three days'
    communicates the sense clearly in modern English while remaining close to the
    Hebrew. 'Three days' journey' is possible but slightly more idiomatic/archaic.
- source_word: בֵּינוֹ וּבֵין יַעֲקֹב
  chosen: between himself and Jacob
  alternatives:
  - between him and Jacob
  lexicon: HALOT
  rationale: The prepositional phrase marks separation between the unnamed masculine
    singular subject (contextually Laban) and Jacob. 'Himself' clarifies the reflexive
    sense in English and avoids ambiguity.
- source_word: וְיַעֲקֹב רֹעֶה
  chosen: and Jacob was shepherding
  alternatives:
  - and Jacob shepherded
  - and Jacob was tending
  lexicon: HALOT
  rationale: The participle רֹעֶה conveys ongoing action. 'Was shepherding' preserves
    the durative sense better than a simple past. 'Tending' is possible, but 'shepherding'
    keeps the pastoral imagery and lexical connection to the root רעה.
- source_word: צֹאן
  chosen: flock
  alternatives:
  - small livestock
  - sheep and goats
  lexicon: HALOT
  rationale: צֹאן is a collective term for small livestock, especially sheep and goats.
    'Flock' is the most natural concise rendering in context.
- source_word: הַנּוֹתָרֹת
  chosen: the rest of
  alternatives:
  - the remaining
  - those left over
  lexicon: HALOT
  rationale: The participial form from יתר/נותר means 'remaining, left over.' In English,
    'the rest of Laban’s flock' is smooth and accurately conveys that Jacob cared
    for the animals not removed in the preceding context.
