id: GEN.30.12
reference: Genesis 30:12
source:
  edition: WLC
  text: וַ/תֵּ֗לֶד זִלְפָּה֙ שִׁפְחַ֣ת לֵאָ֔ה בֵּ֥ן שֵׁנִ֖י לְ/יַעֲקֹֽב׃
translation:
  text: And Zilpah[a], Leah's female servant, bore Jacob a second son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Leah's maidservant.' The Hebrew specifically denotes a female servant/slave attached to Leah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶד
  chosen: bore
  alternatives:
  - gave birth
  lexicon: HALOT
  rationale: Wayyiqtol of ילד introduces the next event in the narrative. 'Bore' is concise, idiomatic in genealogical/birth contexts, and naturally takes the indirect object and child as complements in English.
- source_word: זִלְפָּה
  chosen: Zilpah
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: שִׁפְחַת לֵאָה
  chosen: Leah's female servant
  alternatives:
  - Leah's maidservant
  - Leah's slave girl
  lexicon: HALOT
  rationale: Construct phrase identifying Zilpah's status relative to Leah. 'Female servant' is clear modern English and preserves the gendered nuance of שִׁפְחָה without sounding archaic like 'maidservant.' 'Slave girl' is possible but may sound too juvenile here; the text's focus is social status, not age.
- source_word: בֵּן שֵׁנִי
  chosen: a second son
  alternatives:
  - another son
  - a second boy
  lexicon: HALOT
  rationale: Literally 'a son, second.' In English this is best rendered attributively as 'a second son.' The phrase indicates the second son borne by Zilpah for Jacob in this narrative context.
- source_word: לְיַעֲקֹב
  chosen: Jacob
  alternatives:
  - for Jacob
  lexicon: HALOT
  rationale: The preposition ל marks the father/beneficiary in a birth formula. English idiom prefers 'bore Jacob a second son' rather than the more wooden 'bore a second son for Jacob,' while preserving the relational sense.
