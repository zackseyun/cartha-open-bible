id: GEN.30.11
reference: Genesis 30:11
source:
  edition: WLC
  text: וַ/תֹּ֥אמֶר לֵאָ֖ה ב/גד וַ/תִּקְרָ֥א אֶת שְׁמ֖/וֹ גָּֽד־׃
translation:
  text: And Leah said, “Good fortune!” So she called his name Gad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew בגד is difficult. It may be understood as an exclamation meaning
      “Good fortune!”; traditionally, some render it “A troop!” The name Gad sounds
      like the Hebrew word involved in the wordplay.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the next narrative action. 'And ... said'
    preserves the Hebrew narrative sequence without overinterpreting discourse nuance.
- source_word: לֵאָה
  chosen: Leah
  rationale: Standard English transliteration of the personal name.
- source_word: בגד
  chosen: Good fortune!
  alternatives:
  - Fortune has come!
  - A troop!
  lexicon: HALOT
  rationale: The ketiv-like consonantal form and the traditional crux are commonly
    understood here as an exclamation related to גד 'fortune/good fortune,' reinforced
    by the child's name Gad. 'Good fortune!' gives a natural English exclamation while
    preserving the naming wordplay. 'A troop!' reflects an alternative traditional
    interpretation but is less likely in context.
- source_word: וַתִּקְרָא
  chosen: So she called
  alternatives:
  - And she called
  - Then she named
  lexicon: HALOT
  rationale: Wayyiqtol of קרא in naming context. 'So she called' reads naturally in
    English and preserves the resultative flow from Leah's exclamation to the naming.
- source_word: אֶת שְׁמוֹ
  chosen: his name
  alternatives:
  - him
  lexicon: HALOT
  rationale: Hebrew idiom 'called his name' is retained in lightly naturalized form
    to preserve the formal naming formula.
- source_word: גָּד
  chosen: Gad
  rationale: Personal names are transliterated by standard convention. Retaining 'Gad'
    also preserves the sound-play with Leah's exclamation.
