id: GEN.30.14
reference: Genesis 30:14
source:
  edition: WLC
  text: וַ/יֵּ֨לֶךְ רְאוּבֵ֜ן בִּ/ימֵ֣י קְצִיר חִטִּ֗ים וַ/יִּמְצָ֤א דֽוּדָאִים֙ בַּ/שָּׂדֶ֔ה
    וַ/יָּבֵ֣א אֹתָ֔/ם אֶל לֵאָ֖ה אִמּ֑/וֹ וַ/תֹּ֤אמֶר רָחֵל֙ אֶל לֵאָ֔ה תְּנִי נָ֣א
    לִ֔/י מִ/דּוּדָאֵ֖י בְּנֵֽ/ךְ־־־־׃
translation:
  text: In the days of the wheat harvest, Reuben went and found mandrakes in the field,
    and he brought them to Leah his mother. Then Rachel said to Leah, “Please give
    me some of your son’s mandrakes.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'love-apples'; the Hebrew דּוּדָאִים refers to a plant traditionally
      identified as mandrakes, associated in the surrounding narrative with fertility.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּימֵי
  chosen: In the days of
  alternatives:
  - during
  lexicon: HALOT
  rationale: The construct phrase בִּימֵי introduces a time period. 'In the days of'
    is a natural, fairly formal rendering that preserves the Hebrew idiom better than
    the more compressed 'during,' while remaining readable.
- source_word: קְצִיר חִטִּים
  chosen: the wheat harvest
  alternatives:
  - wheat-harvest time
  - harvest of wheat
  lexicon: HALOT
  rationale: The construct chain means specifically the harvest season for wheat.
    'The wheat harvest' is idiomatic English and preserves the agricultural setting.
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - went out
  lexicon: HALOT
  rationale: הלך in narrative wayyiqtol commonly advances the story with 'went.' 'Went
    out' is possible but not required by the Hebrew here.
- source_word: דּוּדָאִים
  chosen: mandrakes
  alternatives:
  - love-apples
  lexicon: HALOT
  rationale: The traditional and most widely recognized identification is 'mandrakes.'
    Because the exact botanical identification has been discussed and the plants are
    associated in context with fertility, the alternative is preserved in a footnote
    rather than imported into the main text.
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - in the open country
  lexicon: HALOT
  rationale: שָׂדֶה normally denotes a field or open countryside. 'In the field' is
    the straightforward contextual rendering.
- source_word: וַיָּבֵא אֹתָם
  chosen: he brought them
  alternatives:
  - he brought them in
  lexicon: HALOT
  rationale: The verb בוא in Hiphil means 'bring.' The object suffix is plural, referring
    to the mandrakes.
- source_word: אֶל לֵאָה אִמּוֹ
  chosen: to Leah his mother
  alternatives:
  - to his mother Leah
  lexicon: HALOT
  rationale: Both English orders are possible. 'To Leah his mother' follows the Hebrew
    sequence more closely while remaining natural.
- source_word: תְּנִי נָא לִי
  chosen: Please give me
  alternatives:
  - Give me, please
  - Let me have
  lexicon: HALOT
  rationale: נָא adds politeness or entreaty. 'Please give me' captures both the imperative
    and the courteous particle in natural modern English.
- source_word: מִדּוּדָאֵי
  chosen: some of ... mandrakes
  alternatives:
  - from ... mandrakes
  lexicon: HALOT
  rationale: The preposition מִן here is partitive. English expresses this most naturally
    as 'some of' rather than a wooden 'from.'
- source_word: בְּנֵךְ
  chosen: your son’s
  alternatives:
  - your son's own
  lexicon: HALOT
  rationale: The singular construct with second feminine singular suffix refers to
    Leah's son Reuben. The simple possessive is sufficient and natural in English.
