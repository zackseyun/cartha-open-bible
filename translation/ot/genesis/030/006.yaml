id: GEN.30.6
reference: Genesis 30:6
source:
  edition: WLC
  text: וַ/תֹּ֤אמֶר רָחֵל֙ דָּנַ֣/נִּי אֱלֹהִ֔ים וְ/גַם֙ שָׁמַ֣ע בְּ/קֹלִ֔/י וַ/יִּתֶּן
    לִ֖/י בֵּ֑ן עַל כֵּ֛ן קָרְאָ֥ה שְׁמ֖/וֹ דָּֽן־־׃
translation:
  text: Then Rachel said, “God has judged me, and has also heard my voice and given
    me a son.” Therefore she called his name Dan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Dan sounds like the Hebrew verb for 'judge' or 'has judged.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּנַנִּי
  chosen: has judged my case
  alternatives:
  - has judged me
  - has vindicated me
  lexicon: HALOT
  rationale: From דין in the Qal/perfect with 1cs suffix. In this naming context tied
    to Dan, the sense is judicial action on Rachel's behalf. 'Judged my case' preserves
    the legal nuance better than the flatter 'judged me,' while avoiding overinterpretation
    stronger than the Hebrew warrants.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although morphologically plural, the verb is singular and the referent
    is the God of Israel in narrative discourse, so singular 'God' is required.
- source_word: שָׁמַע בְּקֹלִי
  chosen: has also heard my voice
  alternatives:
  - has also listened to me
  - has also heard me
  lexicon: HALOT
  rationale: The idiom literally includes 'my voice.' Retaining 'heard my voice' preserves
    the Hebrew expression and Rachel's personal appeal, while remaining natural English.
- source_word: וַיִּתֶּן לִי בֵּן
  chosen: and given me a son
  alternatives:
  - and has given me a son
  lexicon: HALOT
  rationale: Straightforward rendering of נתן + indirect object + בן. 'Son' should
    be retained rather than generalized to 'child,' since the Hebrew is specifically
    male and the naming narrative concerns a son.
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - That is why
  lexicon: HALOT
  rationale: Standard inferential phrase introducing the naming explanation. 'Therefore'
    is concise and fits the formal narrative style.
- source_word: קָרְאָה שְׁמוֹ דָּן
  chosen: she called his name Dan
  alternatives:
  - she named him Dan
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'called his name.' This is preserved because
    the verse explicitly links the name Dan with the verbal root דין, and the fuller
    form keeps that connection more visible than the smoother 'named him.'
- source_word: דָּן
  chosen: Dan
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name. It also preserves
    the wordplay with דין ('judge/judged') in Rachel's explanation.
