id: GEN.30.9
reference: Genesis 30:9
source:
  edition: WLC
  text: וַ/תֵּ֣רֶא לֵאָ֔ה כִּ֥י עָמְדָ֖ה מִ/לֶּ֑דֶת וַ/תִּקַּח֙ אֶת זִלְפָּ֣ה שִׁפְחָתָ֔/הּ וַ/תִּתֵּ֥ן אֹתָ֛/הּ לְ/יַעֲקֹ֖ב לְ/אִשָּֽׁה־׃
translation:
  text: When Leah saw that she had stopped bearing children[b][a], she took Zilpah her female servant and gave her to Jacob as a wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ceased from bearing'; Hebrew literally 'stood from bearing.'
    reason: lexical_alternative
  - marker: b
    text: Or 'her maidservant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶא
  chosen: When ... saw
  alternatives:
  - And ... saw
  - Now ... saw
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. Rendering with 'When' captures both the temporal linkage to the following action and natural English narrative flow.
- source_word: כִּי
  chosen: that
  alternatives:
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of Leah''s perception rather than a causal clause, so ''that'' best fits the syntax: she saw that she had stopped bearing children.'
- source_word: עָמְדָה מִלֶּדֶת
  chosen: had stopped bearing children
  alternatives:
  - ceased from bearing
  - stood from giving birth
  lexicon: HALOT
  rationale: The idiom עמד + מן + infinitive means to stop or cease doing something. 'Bearing children' makes explicit the childbirth context of ילד in idiomatic English.
- source_word: שִׁפְחָתָהּ
  chosen: her female servant
  alternatives:
  - her maidservant
  - her slave-girl
  lexicon: HALOT
  rationale: שִׁפְחָה denotes a female servant/slave. 'Female servant' is readable modern English and preserves the gendered role. 'Maidservant' is traditional but somewhat archaic; 'slave-girl' may over-specify age and sound harsher than the immediate context requires.
- source_word: לְאִשָּׁה
  chosen: as a wife
  alternatives:
  - for a wife
  - to be his wife
  lexicon: HALOT
  rationale: The phrase נתן ל... לאשה is a standard marital-giving expression. 'As a wife' is concise, idiomatic, and preserves the formal marital sense rather than a merely sexual arrangement.
- source_word: זִלְפָּה
  chosen: Zilpah
  rationale: Personal names are transliterated by standard convention per project philosophy.
- source_word: לְיַעֲקֹב
  chosen: to Jacob
  rationale: Simple indirect-object rendering of the preposition ל in this construction.
