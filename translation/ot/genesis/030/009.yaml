theological_decisions:
- issue: Status of Zilpah in the household and marriage language
  chosen_reading: Render שִׁפְחָה as 'female servant' and לְאִשָּׁה as 'as a wife' without softening either term.
  alternative_readings:
  - Render 'maid' or 'maidservant' for traditional style
  - Render 'concubine' to reflect secondary-wife status
  rationale: The Hebrew text explicitly identifies Zilpah as Leah's שִׁפְחָה and says Leah gave her to Jacob לְאִשָּׁה. The translation should preserve both her subordinate household status and the formal marital wording without importing a later technical category like 'concubine' that is not used in this verse.
  doctrine_reference: Translation philosophy §§1, 5, 6
