id: GEN.30.18
reference: Genesis 30:18
source:
  edition: WLC
  text: וַ/תֹּ֣אמֶר לֵאָ֗ה נָתַ֤ן אֱלֹהִים֙ שְׂכָרִ֔/י אֲשֶׁר נָתַ֥תִּי שִׁפְחָתִ֖/י
    לְ/אִישִׁ֑/י וַ/תִּקְרָ֥א שְׁמ֖/וֹ יִשָּׂשכָֽר־׃
translation:
  text: And Leah said, “God has given me my wages, because I gave my female servant
    to my husband.” So she named him Issachar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Issachar sounds like the Hebrew for 'wages' or 'reward,' reflecting Leah's
      explanation.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָתַן אֱלֹהִים
  chosen: God has given
  alternatives:
  - God gave
  lexicon: HALOT
  rationale: The Hebrew uses נתן with Elohim as subject. English present perfect ('has
    given') works naturally in Leah's naming explanation, expressing a present result
    from a completed act. 'God gave' is possible but slightly less idiomatic in this
    speech context.
- source_word: שְׂכָרִי
  chosen: my wages
  alternatives:
  - my reward
  - my hire
  lexicon: HALOT
  rationale: שָׂכָר commonly denotes wages, hire, or reward. 'My wages' best preserves
    the wordplay with the name Issachar and the transactional sense Leah expresses.
    'Reward' is possible but less concrete; 'hire' is more archaic in contemporary
    English.
- source_word: אֲשֶׁר
  chosen: because
  alternatives:
  - that
  - for which
  lexicon: HALOT
  rationale: Although אֲשֶׁר is formally a relative particle ('which/that'), in this
    construction it introduces the reason for Leah's statement. 'Because' communicates
    the causal force in clear modern English.
- source_word: נָתַתִּי
  chosen: I gave
  alternatives:
  - I have given
  lexicon: HALOT
  rationale: Simple past is the most natural English rendering for Leah's prior action
    of giving Zilpah to Jacob. Present perfect is possible but unnecessary here.
- source_word: שִׁפְחָתִי
  chosen: my female servant
  alternatives:
  - my maidservant
  - my slave girl
  lexicon: HALOT
  rationale: שִׁפְחָה refers to a female servant/slave. 'My female servant' is readable
    modern English and preserves the gendered reference. 'Maidservant' is traditional
    but dated; 'slave girl' may over-specify age and sound harsher than the immediate
    context requires, though the bonded status is part of the semantic range.
- source_word: לְאִישִׁי
  chosen: to my husband
  alternatives:
  - to my man
  lexicon: HALOT
  rationale: אִישׁ can mean 'man' or 'husband' depending on context. Since Leah is
    speaking of Jacob in marital relation, 'my husband' is the clear contextual sense.
- source_word: וַתִּקְרָא שְׁמוֹ
  chosen: So she named him
  alternatives:
  - and she called his name
  - and she named him
  lexicon: HALOT
  rationale: This idiom means to give a name. 'So she named him' is natural English
    while preserving the narrative sequence marked by waw-consecutive.
- source_word: יִשָּׂשכָר
  chosen: Issachar
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per project
    philosophy. The name also echoes Leah's explanation involving שָׂכָר ('wages/reward'),
    which is best preserved by transliteration in the main text and explained in a
    footnote.
