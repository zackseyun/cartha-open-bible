theological_decisions:
- issue: Leah's explanation of divine action and naming
  chosen_reading: Render Leah's words straightforwardly as attributing the birth to
    God's giving of wages, without endorsing or critiquing her theology in translation.
  alternative_readings:
  - Interpret שְׂכָרִי more abstractly as 'reward' to soften the transactional nuance
  rationale: The verse presents Leah's own interpretation of events. The translation
    should preserve her language of divine recompense without importing theological
    evaluation beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
