id: GEN.30.5
reference: Genesis 30:5
source:
  edition: WLC
  text: וַ/תַּ֣הַר בִּלְהָ֔ה וַ/תֵּ֥לֶד לְ/יַעֲקֹ֖ב בֵּֽן׃
translation:
  text: Bilhah conceived and bore Jacob a son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'became pregnant and gave birth to a son for Jacob.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּהַר
  chosen: conceived
  alternatives:
  - became pregnant
  lexicon: HALOT
  rationale: The verb from הרה denotes becoming pregnant/conceiving. 'Conceived' is
    concise, idiomatic, and fits the narrative sequence in English.
- source_word: בִּלְהָה
  chosen: Bilhah
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: וַתֵּלֶד
  chosen: bore
  alternatives:
  - gave birth to
  lexicon: HALOT
  rationale: The verb ילד means to bear/give birth. 'Bore' is natural in English and
    pairs well with 'conceived' in this genealogical-style narrative.
- source_word: לְיַעֲקֹב
  chosen: Jacob
  alternatives:
  - for Jacob
  lexicon: HALOT
  rationale: The preposition ל here marks the relation of the child to Jacob, idiomatically
    expressed in English as the indirect object 'bore Jacob a son' rather than the
    more wooden 'bore for Jacob.'
- source_word: בֵּן
  chosen: a son
  alternatives:
  - son
  lexicon: HALOT
  rationale: 'בן means ''son.'' The English indefinite article is required for natural
    syntax: ''bore Jacob a son.'''
