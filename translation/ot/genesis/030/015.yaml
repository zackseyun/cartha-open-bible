id: GEN.30.15
reference: Genesis 30:15
source:
  edition: WLC
  text: וַ/תֹּ֣אמֶר לָ֗/הּ הַ/מְעַט֙ קַחְתֵּ֣/ךְ אֶת אִישִׁ֔/י וְ/לָ/קַ֕חַת גַּ֥ם אֶת דּוּדָאֵ֖י בְּנִ֑/י וַ/תֹּ֣אמֶר רָחֵ֗ל לָ/כֵן֙ יִשְׁכַּ֤ב עִמָּ/ךְ֙ הַ/לַּ֔יְלָה תַּ֖חַת דּוּדָאֵ֥י בְנֵֽ/ךְ־־׃
translation:
  text: But she said to her[a], “Was it a small thing that you have taken my husband? Would you also take my son’s mandrakes?” Rachel said, “Then he may lie with you tonight in exchange for your son’s mandrakes.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'love-apples.' The Hebrew term refers to mandrakes, a plant traditionally associated with fertility.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְעַט
  chosen: Was it a small thing
  alternatives:
  - Is it a small thing
  - Is it not enough
  lexicon: HALOT
  rationale: Idiomatic rhetorical expression of complaint; 'Was it a small thing' preserves the Hebrew sense without over-paraphrasing. 'Is it not enough' is smoother English but less formally tied to the source wording.
- source_word: קַחְתֵּךְ ... אֶת אִישִׁי
  chosen: you took my husband
  alternatives:
  - you have taken my husband
  lexicon: HALOT
  rationale: Qal perfect 2fs with direct object; simple past fits the narrative dialogue naturally. 'Husband' is the plain sense of אִישִׁי here.
- source_word: וְלָקַחַת גַּם
  chosen: and would you also take
  alternatives:
  - and to take also
  - and are you going to take also
  lexicon: HALOT
  rationale: The infinitive construct with prefixed conjunction expresses an added, indignant extension of the complaint. 'Would you also take' captures the rhetorical force in idiomatic English.
- source_word: דּוּדָאֵי
  chosen: mandrakes
  alternatives:
  - love-apples
  lexicon: HALOT
  rationale: The standard lexical identification is 'mandrakes.' 'Love-apples' reflects later traditional association with fertility/aphrodisiac use but is less precise in modern English.
- source_word: לָכֵן
  chosen: Then
  alternatives:
  - Therefore
  - Very well then
  lexicon: HALOT
  rationale: Introduces Rachel's response and proposed arrangement. 'Then' is natural modern English and preserves the inferential force.
- source_word: יִשְׁכַּב עִמָּךְ הַלַּיְלָה
  chosen: he may lie with you tonight
  alternatives:
  - he shall lie with you tonight
  - he will sleep with you tonight
  lexicon: HALOT
  rationale: שׁכב with עִם in this marital context implies sexual relations. 'Lie with you' preserves the Hebrew idiom and its sexual sense without becoming crude. 'May' reflects the jussive/arrangement nuance better than a flat future.
- source_word: תַּחַת
  chosen: in exchange for
  alternatives:
  - for
  - instead of
  - in place of
  lexicon: HALOT
  rationale: Here תַּחַת marks compensation or exchange in the negotiated arrangement. 'In exchange for' makes the transactional sense explicit and natural in English.
