theological_decisions:
- issue: Divine response implied by שׁמע אֶל
  chosen_reading: God listened to Leah in the sense of hearing favorably and responding
    to her.
  alternative_readings:
  - God heard Leah
  rationale: The Hebrew can be rendered more formally as 'heard,' but in this context
    the idiom suggests responsive attention rather than bare perception. 'Listened
    to' preserves that nuance without overstating theology beyond the text.
  doctrine_reference: Translation philosophy §1, §3
