id: GEN.30.17
reference: Genesis 30:17
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֥ע אֱלֹהִ֖ים אֶל לֵאָ֑ה וַ/תַּ֛הַר וַ/תֵּ֥לֶד לְ/יַעֲקֹ֖ב בֵּ֥ן
    חֲמִישִֽׁי־׃
translation:
  text: And God listened to Leah, and she conceived and bore Jacob a fifth son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And God heard Leah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: listened
  alternatives:
  - heard
  lexicon: HALOT
  rationale: The verb שׁמע with אֶל often carries the sense of listening attentively
    or heeding rather than mere auditory perception. 'Listened to' brings out the
    relational nuance in context, where God responds favorably to Leah.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים clearly refers to the one true God in narrative usage,
    so 'God' is the natural English rendering.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: With שׁמע, אֶל is best represented in idiomatic English as 'to' in the
    phrase 'listened to Leah.'
- source_word: לֵאָה
  chosen: Leah
  rationale: Personal names are transliterated by standard English convention.
- source_word: וַתַּהַר
  chosen: she conceived
  alternatives:
  - she became pregnant
  lexicon: HALOT
  rationale: '''Conceived'' is concise, natural, and standard for הרה in birth narratives.'
- source_word: וַתֵּלֶד
  chosen: and bore
  alternatives:
  - and gave birth to
  lexicon: HALOT
  rationale: ילד in this construction is well rendered 'bore.' This keeps the narrative
    compact while remaining clear in modern English.
- source_word: לְיַעֲקֹב
  chosen: Jacob
  alternatives:
  - to Jacob
  - for Jacob
  lexicon: HALOT
  rationale: In English, 'bore Jacob a son' is the most idiomatic rendering of ילד
    + ל. The indirect-object sense is preserved without forcing a wooden preposition.
- source_word: בֵּן
  chosen: son
  alternatives:
  - male child
  lexicon: HALOT
  rationale: The ordinary and contextually appropriate rendering of בֵּן in genealogical/birth
    narrative is 'son.'
- source_word: חֲמִישִׁי
  chosen: fifth
  lexicon: HALOT
  rationale: 'The ordinal straightforwardly modifies ''son'': ''a fifth son.'' The
    English indefinite article is supplied naturally.'
