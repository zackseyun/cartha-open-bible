id: GEN.30.32
reference: Genesis 30:32
source:
  edition: WLC
  text: אֶֽעֱבֹ֨ר בְּ/כָל צֹֽאנְ/ךָ֜ הַ/יּ֗וֹם הָסֵ֨ר מִ/שָּׁ֜ם כָּל שֶׂ֣ה נָקֹ֣ד
    וְ/טָל֗וּא וְ/כָל שֶׂה חוּם֙ בַּ/כְּשָׂבִ֔ים וְ/טָל֥וּא וְ/נָקֹ֖ד בָּ/עִזִּ֑ים
    וְ/הָיָ֖ה שְׂכָרִֽ/י־־׀־־׃
translation:
  text: Let me pass through all your flock today, removing from there every speckled
    and spotted sheep, every dark-colored lamb among the sheep, and every spotted
    and speckled one among the goats; and that will be my wages.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brown' for 'dark-colored' (חוּם). The Hebrew refers to a dark or brown
      coloration among the sheep.
    reason: lexical_alternative
  - marker: b
    text: '''Speckled'' (נָקֹד) and ''spotted'' (טָלוּא) are both patterned-color
      terms; the exact distinction may overlap, so the pair could also be rendered
      ''spotted and patchy'' or similar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶעֱבֹר
  chosen: Let me pass through
  alternatives:
  - I will pass through
  - Let me go through
  lexicon: HALOT
  rationale: 'Qal imperfect 1cs of עבר can be simple future or volitional/cohortative
    in context. In Jacob''s proposal to Laban, an English permissive/volitional sense
    fits the negotiation: ''Let me pass through.'''
- source_word: בְּכָל צֹאנְךָ
  chosen: through all your flock
  alternatives:
  - among all your flock
  - through all your sheep and goats
  lexicon: HALOT
  rationale: צֹאן is a collective for small livestock, especially sheep and goats.
    'Flock' is natural English and preserves the collective sense without over-specifying
    in the phrase itself.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Temporal adverbial use; 'today' is clear modern English.
- source_word: הָסֵר מִשָּׁם
  chosen: removing from there
  alternatives:
  - setting apart from there
  - taking out from there
  lexicon: HALOT
  rationale: Infinitive absolute/absolute verbal form from סור functions with the
    preceding verb to express the action Jacob proposes. 'Removing from there' captures
    the concrete act of separating animals from the flock.
- source_word: כָּל שֶׂה
  chosen: every ... sheep / every ... one
  alternatives:
  - every animal of the flock
  - every head
  lexicon: HALOT
  rationale: שֶׂה can denote a member of small livestock generically, but the verse
    then distinguishes sheep and goats. In the first two occurrences, rendering with
    species-sensitive English helps readability while respecting the subsequent distinctions.
- source_word: נָקֹד
  chosen: speckled
  alternatives:
  - marked with spots
  - flecked
  lexicon: HALOT
  rationale: Refers to an animal marked with small spots or points. 'Speckled' is
    a standard and natural gloss.
- source_word: טָלוּא
  chosen: spotted
  alternatives:
  - patchy
  - patched
  lexicon: HALOT
  rationale: Describes patchy or spotted coloration. 'Spotted' distinguishes it reasonably
    from נָקֹד while remaining idiomatic.
- source_word: חוּם
  chosen: dark-colored
  alternatives:
  - brown
  - dark
  lexicon: HALOT
  rationale: The adjective denotes a dark/brown coloration. 'Dark-colored' avoids
    overprecision where the exact shade may be broader than modern 'brown,' while
    still conveying the contrast in breeding color.
- source_word: בַּכְּשָׂבִים
  chosen: among the sheep
  alternatives:
  - among the lambs
  lexicon: HALOT
  rationale: כְּשָׂבִים is the plural of כֶּשֶׂב, often 'lambs,' but in flock context
    can function broadly for sheep. 'Among the sheep' reads more naturally in English
    here and matches the contrast with goats.
- source_word: בָּעִזִּים
  chosen: among the goats
  alternatives:
  - among the she-goats
  lexicon: HALOT
  rationale: עִזִּים commonly denotes goats, often female goats in some contexts,
    but 'goats' is the most natural collective rendering here.
- source_word: וְהָיָה שְׂכָרִי
  chosen: and that will be my wages
  alternatives:
  - and it shall be my hire
  - and this will be my pay
  lexicon: HALOT
  rationale: שָׂכָר denotes wages/pay/hire. 'Wages' is clear modern English and suits
    the employment context between Jacob and Laban.
