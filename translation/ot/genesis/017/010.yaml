id: GEN.17.10
reference: Genesis 17:10
source:
  edition: WLC
  text: זֹ֣את בְּרִיתִ֞/י אֲשֶׁ֣ר תִּשְׁמְר֗וּ בֵּינִ/י֙ וּ/בֵ֣ינֵי/כֶ֔ם וּ/בֵ֥ין
    זַרְעֲ/ךָ֖ אַחֲרֶ֑י/ךָ הִמּ֥וֹל לָ/כֶ֖ם כָּל זָכָֽר־׃
translation:
  text: 'This is my covenant, which you shall keep, between me and you and your offspring
    after you: every male among you shall be circumcised.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your descendants after you.' The Hebrew זֶרַע is a collective term that
      can refer to offspring or descendants.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: This is
  alternatives:
  - This
  lexicon: HALOT
  rationale: Demonstrative feminine singular introducing the covenant stipulation;
    in English, 'This is' naturally supplies the copula implied in Hebrew.
- source_word: בְּרִיתִי
  chosen: my covenant
  alternatives:
  - my pact
  - my treaty
  lexicon: HALOT
  rationale: בְּרִית is the standard covenant term in Genesis and carries theological
    continuity with God's binding relationship; 'covenant' is the established and
    most accurate rendering.
- source_word: אֲשֶׁר תִּשְׁמְרוּ
  chosen: which you shall keep
  alternatives:
  - that you must keep
  - which you are to keep
  lexicon: HALOT
  rationale: The relative clause plus imperfect expresses the obligation attached
    to the covenant. 'Shall keep' preserves the formal covenantal tone without sounding
    archaic in context.
- source_word: בֵּינִי וּבֵינֵיכֶם וּבֵין זַרְעֲךָ אַחֲרֶיךָ
  chosen: between me and you and your offspring after you
  alternatives:
  - between me and you and your descendants after you
  lexicon: HALOT
  rationale: זֶרַע can mean 'seed,' 'offspring,' or 'descendants.' 'Offspring' preserves
    the collective singular sense while remaining natural English. 'After you' is
    retained to reflect the temporal succession in the Hebrew.
- source_word: הִמּוֹל
  chosen: shall be circumcised
  alternatives:
  - must be circumcised
  - you shall circumcise
  lexicon: HALOT
  rationale: The infinitive absolute of מול here functions as the covenant requirement.
    Rendering it as passive 'shall be circumcised' fits the following object 'every
    male' and reflects the idiomatic force of the Hebrew construction in English.
- source_word: לָכֶם
  chosen: among you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: Though literally 'for you,' in this context it marks the group to whom
    the requirement applies. 'Among you' makes the distributive force clear in idiomatic
    English.
- source_word: כָּל זָכָר
  chosen: every male
  alternatives:
  - every male person
  - every man-child
  lexicon: HALOT
  rationale: The phrase denotes all males within the covenant community. 'Every male'
    is concise, accurate, and preserves the gender-specific requirement of the Hebrew.
