theological_decisions:
- issue: Rendering the covenant sign command with gender specificity
  chosen_reading: every male among you shall be circumcised
  alternative_readings:
  - all of you shall be circumcised
  - every one of you shall be circumcised
  rationale: The Hebrew explicitly specifies כָּל זָכָר, so the translation preserves
    the male-specific scope rather than generalizing. This follows the project's gender-accurate
    principle and avoids importing a broader claim than the text makes.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
