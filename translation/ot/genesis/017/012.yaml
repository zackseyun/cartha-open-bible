theological_decisions:
- issue: Scope of the circumcision command within Abraham's covenant household
  chosen_reading: The verse includes not only biological descendants but also males born in the household or purchased from foreigners.
  alternative_readings:
  - Restricting the command primarily to Abraham's physical offspring
  rationale: The Hebrew explicitly extends the requirement beyond Abraham's seed to household-born and purchased males. The translation preserves that breadth without importing later theological conclusions.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense; do not import doctrinal claims the text does not make.'
