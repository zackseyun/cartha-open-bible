id: GEN.17.12
reference: Genesis 17:12
source:
  edition: WLC
  text: וּ/בֶן שְׁמֹנַ֣ת יָמִ֗ים יִמּ֥וֹל לָ/כֶ֛ם כָּל זָכָ֖ר לְ/דֹרֹתֵי/כֶ֑ם יְלִ֣יד בָּ֔יִת וּ/מִקְנַת כֶּ֨סֶף֙ מִ/כֹּ֣ל בֶּן נֵכָ֔ר אֲשֶׁ֛ר לֹ֥א מִֽ/זַּרְעֲ/ךָ֖ הֽוּא־־־־׃
translation:
  text: And at eight days old, every male among you throughout your generations shall be circumcised—whether born in the house or bought with silver from any foreigner who is not from your offspring.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'a son of eight days.'
    reason: lexical_alternative
  - marker: b
    text: Or 'bought with money.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'from every son of a foreigner who is not from your seed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבֶן שְׁמֹנַת יָמִים
  chosen: at eight days old
  alternatives:
  - a son of eight days
  - when eight days old
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'a son of eight days,' meaning an infant eight days old. 'At eight days old' is natural modern English while preserving the temporal requirement.
- source_word: יִמּוֹל
  chosen: shall be circumcised
  alternatives:
  - must be circumcised
  lexicon: HALOT
  rationale: The Niphal imperfect is passive/reflexive in sense here and functions as an instruction. 'Shall be circumcised' preserves the formal legal tone without over-paraphrasing.
- source_word: לָכֶם כָּל זָכָר
  chosen: every male among you
  alternatives:
  - every male for you
  - every male
  lexicon: HALOT
  rationale: כָּל זָכָר is straightforwardly 'every male.' לָכֶם is best represented idiomatically as 'among you,' indicating the covenant community addressed.
- source_word: לְדֹרֹתֵיכֶם
  chosen: throughout your generations
  alternatives:
  - for your generations
  - in your generations
  lexicon: HALOT
  rationale: This phrase indicates ongoing applicability across successive generations. 'Throughout your generations' is the standard clear rendering.
- source_word: יְלִיד בָּיִת
  chosen: born in the house
  alternatives:
  - homeborn
  - one born in your household
  lexicon: HALOT
  rationale: The phrase refers to someone born within the household. 'Born in the house' is transparent and close to the Hebrew.
- source_word: וּמִקְנַת כֶּסֶף
  chosen: or bought with silver
  alternatives:
  - or purchased with money
  - or acquired for silver
  lexicon: HALOT
  rationale: The expression denotes a person acquired by purchase. 'Bought with silver' keeps the concrete economic language of כֶּסֶף rather than smoothing it to 'money'.
- source_word: מִכֹּל בֶּן נֵכָר
  chosen: from any foreigner
  alternatives:
  - from any son of a foreigner
  - from any outsider
  lexicon: HALOT
  rationale: Literally 'from every son of a foreigner,' an idiom for someone of foreign stock. 'From any foreigner' communicates the sense in natural English without unnecessary literalism.
- source_word: אֲשֶׁר לֹא מִזַּרְעֲךָ הוּא
  chosen: who is not from your offspring
  alternatives:
  - who is not of your seed
  - who is not your descendant
  lexicon: HALOT
  rationale: זֶרַע is literally 'seed,' but in English 'offspring' best conveys descent in readable modern style. The clause identifies the foreigner as outside Abraham's biological line.
