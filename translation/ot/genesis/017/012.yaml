  to: And every male among you who is eight days old shall be circumcised throughout your generations, whether born in the house or bought with silver from any son of a foreigner who is not of your offspring.
  rationale: Reordered the opening to more closely reflect the Hebrew, changed 'at eight days old' to 'who is eight days old' for natural precision, and rendered 'בן נכר' more literally as 'son of a foreigner' while keeping the sentence formal and complete.

