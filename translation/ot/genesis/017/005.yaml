theological_decisions:
- issue: Rendering the divine renaming declaration with completed aspect
  chosen_reading: for I have made you the father of a multitude of nations
  alternative_readings:
  - for I will make you the father of a multitude of nations
  - for I have appointed you father of a multitude of nations
  rationale: The Hebrew uses the perfect נְתַתִּיךָ ('I have given/made you'), and
    the translation preserves that completed/declarative force rather than smoothing
    it into a future. This maintains the theological tension of God's promise spoken
    as an accomplished reality.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
