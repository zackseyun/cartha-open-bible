id: GEN.17.5
reference: Genesis 17:5
source:
  edition: WLC
  text: וְ/לֹא יִקָּרֵ֥א ע֛וֹד אֶת שִׁמְ/ךָ֖ אַבְרָ֑ם וְ/הָיָ֤ה שִׁמְ/ךָ֙ אַבְרָהָ֔ם
    כִּ֛י אַב הֲמ֥וֹן גּוֹיִ֖ם נְתַתִּֽי/ךָ־־־׃
translation:
  text: Your name shall no longer be called Abram, but your name shall be Abraham,
    for I have made you the father of a multitude of nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'for I have given you as father of a multitude of nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִקָּרֵא
  chosen: shall ... be called
  alternatives:
  - will ... be called
  - shall ... be named
  lexicon: HALOT
  rationale: Nifal of קרא here is passive/reflexive in naming language. 'Be called'
    is the most natural and standard English equivalent in a renaming formula.
- source_word: עוֹד
  chosen: no longer
  alternatives:
  - any longer
  - again
  lexicon: HALOT
  rationale: With לֹא and the passive verb, עוֹד marks cessation from this point onward.
    'No longer' captures the temporal force idiomatically.
- source_word: שִׁמְךָ
  chosen: your name
  lexicon: HALOT
  rationale: Direct and transparent rendering of the construct with 2ms suffix.
- source_word: אַבְרָם
  chosen: Abram
  rationale: Personal name is transliterated per project philosophy.
- source_word: וְהָיָה
  chosen: but ... shall be
  alternatives:
  - and ... shall be
  - and ... will become
  lexicon: HALOT
  rationale: Though formally 'and it shall be,' in English renaming formulas the contrastive
    sense is best conveyed with 'but ... shall be.' This reflects the discourse contrast
    between former and new name without over-paraphrasing.
- source_word: אַבְרָהָם
  chosen: Abraham
  rationale: Personal name is transliterated per project philosophy.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the new name. 'For' preserves the explanatory
    connection in a concise literary register.
- source_word: אַב
  chosen: father
  alternatives:
  - ancestor
  lexicon: HALOT
  rationale: The ordinary sense 'father' fits both the naming explanation and covenant
    context. 'Ancestor' is possible in broader contexts but is weaker here.
- source_word: הֲמוֹן
  chosen: a multitude
  alternatives:
  - many
  - a throng
  lexicon: HALOT
  rationale: הֲמוֹן denotes abundance or multitude. 'A multitude' preserves the nominal
    force and echoes the explanatory wordplay behind Abraham's new name better than
    the flatter 'many.'
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - peoples
  - Gentiles
  lexicon: HALOT
  rationale: In Genesis covenantal contexts, גּוֹיִם refers broadly to nations/peoples.
    'Nations' is the most standard and contextually fitting rendering; 'Gentiles'
    would be anachronistic here.
- source_word: נְתַתִּיךָ
  chosen: I have made you
  alternatives:
  - I have given you as
  - I make you
  lexicon: HALOT
  rationale: Although the verb is literally 'I have given you,' in this predicative
    construction ('given/made you father of...') idiomatic English prefers 'I have
    made you.' The perfect aspect suits the divine declarative act already established
    by God's word.
