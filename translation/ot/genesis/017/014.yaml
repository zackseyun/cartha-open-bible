theological_decisions:
- issue: Meaning of the covenant sanction כרת ('cut off')
  chosen_reading: Retain the idiom 'shall be cut off' without specifying whether it
    means excommunication, childlessness, or death.
  alternative_readings:
  - shall be excluded from the covenant community
  - shall be put to death
  rationale: The Hebrew idiom is weighty but not fully specified in this verse alone.
    Preserving the idiom maintains the theological and legal tension rather than resolving
    it beyond the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Rendering נפש
  chosen_reading: Translate as 'person' rather than 'soul'
  alternative_readings:
  - soul
  rationale: Here נפש refers to the individual under covenant sanction, not necessarily
    to an immaterial component of a human being. 'Person' avoids importing a narrower
    theological anthropology while preserving the legal force.
  doctrine_reference: 'Translation philosophy §1 and §6: original-language primacy;
    readable modern English.'
