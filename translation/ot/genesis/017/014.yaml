id: GEN.17.14
reference: Genesis 17:14
source:
  edition: WLC
  text: וְ/עָרֵ֣ל זָכָ֗ר אֲשֶׁ֤ר לֹֽא יִמּוֹל֙ אֶת בְּשַׂ֣ר עָרְלָת֔/וֹ וְ/נִכְרְתָ֛ה
    הַ/נֶּ֥פֶשׁ הַ/הִ֖וא מֵ/עַמֶּ֑י/הָ אֶת בְּרִיתִ֖/י הֵפַֽר׀־־־׃ס
translation:
  text: And an uncircumcised male who is not circumcised in the flesh of his foreskin—that
    person shall be cut off from his people; he has broken my covenant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that soul shall be cut off from his people.' The Hebrew uses 'soul/person'
      and the covenant-sanction idiom 'cut off.'
    reason: lexical_alternative
  - marker: b
    text: '''Cut off'' may denote severe covenant judgment, including exclusion from
      the community or death, depending on context; the verse itself does not specify
      further.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָרֵל זָכָר
  chosen: an uncircumcised male
  alternatives:
  - a male with foreskin
  - an uncircumcised man
  lexicon: HALOT
  rationale: עָרֵל denotes one who is uncircumcised; paired with זָכָר it specifies
    a male person. 'Uncircumcised male' is natural English and preserves the covenantal
    marker without unnecessary paraphrase.
- source_word: אֲשֶׁר לֹא יִמּוֹל
  chosen: who is not circumcised
  alternatives:
  - who does not circumcise himself
  - who has not been circumcised
  lexicon: HALOT
  rationale: The Niphal of מול is passive/reflexive in sense. English passive best
    matches the construction here. Present 'is not circumcised' works as a general
    legal condition in context.
- source_word: אֶת בְּשַׂר עָרְלָתוֹ
  chosen: in the flesh of his foreskin
  alternatives:
  - the flesh of his foreskin
  - at the flesh of his foreskin
  lexicon: HALOT
  rationale: The phrase is anatomically specific and should be retained rather than
    generalized to simply 'uncircumcised.' Including 'flesh of his foreskin' preserves
    the concrete wording of the Hebrew. 'In' smooths the English with the passive
    verb.
- source_word: וְנִכְרְתָה הַנֶּפֶשׁ הַהִוא
  chosen: that person shall be cut off
  alternatives:
  - that soul shall be cut off
  - that one shall be cut off
  lexicon: HALOT
  rationale: נפש can mean 'soul,' 'life,' or 'person.' In legal/covenantal contexts,
    'person' communicates the referent clearly in modern English without importing
    later anthropological assumptions. 'Shall be cut off' preserves the covenant-sanction
    idiom.
- source_word: מֵעַמֶּיהָ
  chosen: from his people
  alternatives:
  - from his kin
  - from his community
  lexicon: HALOT
  rationale: Although the suffix on the Hebrew form is morphologically feminine agreeing
    with נפש, the referent is the uncircumcised male. English naturally renders the
    sense as 'his people.' 'People' is the standard covenant-community term for עם.
- source_word: אֶת בְּרִיתִי
  chosen: my covenant
  alternatives:
  - my pact
  lexicon: HALOT
  rationale: ברית is the standard covenant term and is theologically significant in
    Genesis 17. 'Covenant' should be retained for consistency and weight.
- source_word: הֵפַר
  chosen: he has broken
  alternatives:
  - he has violated
  - he has annulled
  lexicon: HALOT
  rationale: הפר means to break, violate, or nullify a covenant. 'Has broken' is the
    clearest idiomatic English and fits the causal force explaining why the person
    is cut off.
