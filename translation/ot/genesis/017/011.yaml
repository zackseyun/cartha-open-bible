id: GEN.17.11
reference: Genesis 17:11
source:
  edition: WLC
  text: וּ/נְמַלְתֶּ֕ם אֵ֖ת בְּשַׂ֣ר עָרְלַתְ/כֶ֑ם וְ/הָיָה֙ לְ/א֣וֹת בְּרִ֔ית בֵּינִ֖/י
    וּ/בֵינֵי/כֶֽם׃
translation:
  text: You shall circumcise the flesh of your foreskin, and it shall be a sign of
    the covenant between me and you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a token of the covenant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְמַלְתֶּם
  chosen: You shall circumcise
  alternatives:
  - and you shall be circumcised
  - you must circumcise
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in covenantal instruction functions
    imperativally/futurally. English 'shall circumcise' preserves the directive force
    without over-paraphrase. Active rendering fits the expected action of Abraham's
    household.
- source_word: בְּשַׂר
  chosen: the flesh
  alternatives:
  - flesh
  - body
  lexicon: HALOT
  rationale: Literal 'flesh' is the plain sense and is idiomatic in the circumcision
    formula. Including the article in English reflects the definite object in context.
- source_word: עָרְלַתְכֶם
  chosen: of your foreskin
  alternatives:
  - of your uncircumcision
  lexicon: HALOT
  rationale: The noun denotes foreskin in this concrete anatomical context. Singular
    with 2mp suffix is naturally rendered collectively in English as 'your foreskin'
    addressed to the group.
- source_word: וְהָיָה
  chosen: and it shall be
  alternatives:
  - and this will be
  - and it will become
  lexicon: HALOT
  rationale: Refers to the circumcision just commanded as the covenantal sign. 'It
    shall be' is a natural English equivalent for the Hebrew copular/future sense.
- source_word: לְאוֹת
  chosen: a sign
  alternatives:
  - as a sign
  - for a sign
  - mark
  lexicon: HALOT
  rationale: אוֹת commonly means 'sign' or 'token.' 'A sign' is the most transparent
    and standard rendering in covenant contexts.
- source_word: בְּרִית
  chosen: the covenant
  alternatives:
  - covenant
  lexicon: HALOT
  rationale: 'Definite sense is required by context: this refers to the specific covenant
    God is establishing with Abraham. English supplies ''the'' naturally.'
- source_word: בֵּינִי וּבֵינֵיכֶם
  chosen: between me and you
  alternatives:
  - between me and all of you
  - between me and your descendants
  lexicon: HALOT
  rationale: The phrase directly states the relational parties in the second person
    plural. 'Between me and you' is faithful and idiomatic; broader implications for
    descendants belong to surrounding verses, not this clause.
