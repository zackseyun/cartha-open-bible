theological_decisions:
- issue: Nature of circumcision as covenantal sign
  chosen_reading: Rendered as 'a sign of the covenant' without importing sacramental
    or merely symbolic theology beyond the text.
  alternative_readings:
  - a token of the covenant
  rationale: The Hebrew אוֹת בְּרִית identifies circumcision as the covenant sign.
    The translation preserves that theological weight while avoiding denominationally
    loaded language not present in the verse.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; do not import doctrinal claims the text does not make.'
