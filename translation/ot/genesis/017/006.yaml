id: GEN.17.6
reference: Genesis 17:6
source:
  edition: WLC
  text: וְ/הִפְרֵתִ֤י אֹֽתְ/ךָ֙ בִּ/מְאֹ֣ד מְאֹ֔ד וּ/נְתַתִּ֖י/ךָ לְ/גוֹיִ֑ם וּ/מְלָכִ֖ים מִמְּ/ךָ֥ יֵצֵֽאוּ׃
translation:
  text: And I will make you exceedingly fruitful[a], and I will make nations from you[b], and kings will come from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'very, very much.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'kings will go out from you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִפְרֵתִי
  chosen: And I will make ... fruitful
  alternatives:
  - And I will multiply
  - And I will cause to be fruitful
  lexicon: HALOT
  rationale: Hiphil of פרה means to make fruitful or cause to increase in fruitfulness. 'Make ... fruitful' preserves the causative sense more precisely than the broader 'multiply,' while remaining natural English.
- source_word: בִּמְאֹד מְאֹד
  chosen: exceedingly
  alternatives:
  - very, very much
  - greatly
  lexicon: HALOT
  rationale: The doubled מְאֹד intensifies the promise strongly. 'Exceedingly' captures the emphatic repetition in idiomatic modern English without awkward literalism.
- source_word: וּנְתַתִּיךָ לְגוֹיִם
  chosen: and I will make you into nations
  alternatives:
  - and I will set you for nations
  - and I will make you become nations
  lexicon: HALOT
  rationale: 'With נתן plus ל, the sense here is resultative: Abraham will become the progenitor of multiple nations. ''Make you into nations'' communicates the covenantal outcome clearly in English.'
- source_word: לְגוֹיִם
  chosen: nations
  alternatives:
  - peoples
  - Gentile nations
  lexicon: HALOT
  rationale: גּוֹיִם ordinarily means 'nations' or 'peoples.' In this patriarchal promise it refers broadly to national groupings descending from Abraham, not specifically 'Gentiles,' so 'nations' is the most accurate and conventional rendering.
- source_word: וּמְלָכִים
  chosen: and kings
  alternatives:
  - and rulers
  lexicon: HALOT
  rationale: מְלָכִים straightforwardly denotes kings. 'Rulers' would be broader and less precise than the Hebrew.
- source_word: מִמְּךָ יֵצֵאוּ
  chosen: will come from you
  alternatives:
  - will go out from you
  - will descend from you
  lexicon: HALOT
  rationale: יצא literally means 'go out,' but in genealogical or progenitive contexts idiomatic English prefers 'come from you' or 'descend from you.' 'Come from you' is natural and preserves the source idea of origin.
