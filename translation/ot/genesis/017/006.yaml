theological_decisions:
- issue: Scope of Abraham's promised descendants
  chosen_reading: The verse promises that Abraham will become the ancestor of multiple nations and of kings.
  alternative_readings:
  - The phrase could be read more abstractly as conferral of status among nations.
  rationale: The immediate covenant context emphasizes offspring and lineage. Rendering the clauses in progenitive terms best reflects the Hebrew syntax and the broader Abrahamic promise without importing later theological systems.
  doctrine_reference: Translation philosophy §1, §3
