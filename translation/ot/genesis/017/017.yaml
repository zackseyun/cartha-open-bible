theological_decisions:
- issue: Nuance of Abraham's laughter
  chosen_reading: Render the laughter neutrally as 'laughed' without importing either
    cynical unbelief or joyful faith into the translation itself.
  alternative_readings:
  - laughed in disbelief
  - laughed with joy
  rationale: The verse reports Abraham's action and inner question but does not explicitly
    label the laughter's moral quality. The translation should preserve that narrative
    tension rather than resolve it interpretively.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
