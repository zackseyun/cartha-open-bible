id: GEN.17.17
reference: Genesis 17:17
source:
  edition: WLC
  text: וַ/יִּפֹּ֧ל אַבְרָהָ֛ם עַל פָּנָ֖י/ו וַ/יִּצְחָ֑ק וַ/יֹּ֣אמֶר בְּ/לִבּ֗/וֹ
    הַ/לְּ/בֶ֤ן מֵאָֽה שָׁנָה֙ יִוָּלֵ֔ד וְ/אִ֨ם שָׂרָ֔ה הֲ/בַת תִּשְׁעִ֥ים שָׁנָ֖ה
    תֵּלֵֽד־־־־׃
translation:
  text: Then Abraham fell on his face and laughed, and said in his heart, “Will a
    child be born to a man a hundred years old? And will Sarah, who is ninety years
    old, give birth?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Will a son be born to a man a hundred years old?” The Hebrew uses 'son/child'
      language here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפֹּל
  chosen: fell
  alternatives:
  - threw himself down
  - prostrated himself
  lexicon: HALOT
  rationale: The verb נפל in the wayyiqtol form here denotes physical falling/prostration.
    'Fell' is the most direct rendering; the following phrase 'on his face' supplies
    the posture.
- source_word: עַל־פָּנָיו
  chosen: on his face
  alternatives:
  - face down
  - prostrate
  lexicon: HALOT
  rationale: A standard Hebrew idiom for prostration or falling face-down. Rendering
    it literally preserves the idiom while remaining natural in English.
- source_word: וַיִּצְחָק
  chosen: laughed
  alternatives:
  - smiled
  - chuckled
  lexicon: HALOT
  rationale: The verb צחק straightforwardly means 'laugh.' Softer renderings weaken
    the narrative force and obscure the connection with Isaac's name later in the
    context.
- source_word: וַיֹּאמֶר בְּלִבּוֹ
  chosen: said in his heart
  alternatives:
  - said to himself
  - thought
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'said in his heart.' This is understandable
    in modern English and preserves the inward, unspoken nature of Abraham's response
    better than the flatter 'thought.'
- source_word: הַלְּבֶן
  chosen: Will a child be born
  alternatives:
  - Shall a son be born
  - Can a child be born
  lexicon: HALOT
  rationale: The interrogative with בן can mean 'son,' but in English the focus here
    is on the possibility of offspring rather than male sex specifically. 'A child'
    is natural and avoids over-specifying what the clause itself does not emphasize,
    while still fitting the birth context.
- source_word: יִוָּלֵד
  chosen: be born
  alternatives:
  - be fathered
  - be brought forth
  lexicon: HALOT
  rationale: The Niphal of ילד is the normal passive/intransitive expression for being
    born. 'Be born' is the standard and clearest English equivalent.
- source_word: מֵאָה שָׁנָה
  chosen: a hundred years old
  alternatives:
  - one hundred years old
  lexicon: HALOT
  rationale: This is the idiomatic English rendering of the age expression.
- source_word: וְאִם
  chosen: And will
  alternatives:
  - And if
  - Or will
  lexicon: HALOT
  rationale: Although אם often means 'if,' in rhetorical questions it can introduce
    the second member of a paired question. 'And will' best captures the syntax and
    sense in English.
- source_word: הֲבַת תִּשְׁעִים שָׁנָה
  chosen: a woman ninety years old
  alternatives:
  - being ninety years old
  - at ninety years of age
  lexicon: HALOT
  rationale: The Hebrew literally says 'a daughter of ninety years,' an age idiom.
    'A woman ninety years old' communicates the sense naturally in English without
    wooden literalism.
- source_word: תֵּלֵד
  chosen: give birth
  alternatives:
  - bear a child
  - bear
  lexicon: HALOT
  rationale: Qal ילד with a female subject refers to bearing/giving birth. 'Give birth'
    is clear modern English and avoids archaic tone.
