theological_decisions:
- issue: Scope and continuity of the covenant promise
  chosen_reading: Render the covenant language straightforwardly as God's covenant established with Isaac and extending to his offspring after him, without importing later theological systems.
  alternative_readings:
  - Read as exclusively ethnic/national promise
  - Read as directly defining later Christian covenant theology
  rationale: The verse itself states that God will establish his covenant with Isaac as an everlasting covenant for his offspring after him. The translation should preserve that claim without narrowing or expanding its theological scope beyond the Hebrew text.
  doctrine_reference: Preserve theological tension rather than resolve it.
