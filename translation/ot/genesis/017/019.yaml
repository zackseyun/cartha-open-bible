id: GEN.17.19
reference: Genesis 17:19
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֱלֹהִ֗ים אֲבָל֙ שָׂרָ֣ה אִשְׁתְּ/ךָ֗ יֹלֶ֤דֶת לְ/ךָ֙ בֵּ֔ן וְ/קָרָ֥אתָ אֶת שְׁמ֖/וֹ יִצְחָ֑ק וַ/הֲקִמֹתִ֨י אֶת בְּרִיתִ֥/י אִתּ֛/וֹ לִ/בְרִ֥ית עוֹלָ֖ם לְ/זַרְע֥/וֹ אַחֲרָֽי/ו־־׃
translation:
  text: And God said[a], “No, but Sarah your wife shall bear you a son, and you shall call his name Isaac. And I will establish my covenant with him as an everlasting covenant for his offspring after him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Isaac sounds like the Hebrew verb meaning 'he laughs' or 'he will laugh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲבָל
  chosen: No, but
  alternatives:
  - But indeed
  - Nevertheless
  - Surely
  lexicon: HALOT
  rationale: In context this responds directly to Abraham's preceding plea about Ishmael, so an adversative alone ('but') can sound too weak in English. 'No, but' captures the corrective force without overparaphrasing.
- source_word: יֹלֶדֶת
  chosen: will bear
  alternatives:
  - is bearing
  - is about to bear
  - bears
  lexicon: HALOT
  rationale: Although morphologically a participle, in this predictive context it functions futurally. 'Will bear' is natural English and reflects the promised future event.
- source_word: בֵּן
  chosen: a son
  alternatives:
  - son
  lexicon: HALOT
  rationale: The indefinite article is natural in English and reflects the introduction of the promised child.
- source_word: וְקָרָאתָ אֶת שְׁמוֹ
  chosen: you shall call his name
  alternatives:
  - you shall name him
  - you will call him
  lexicon: HALOT
  rationale: This preserves the Hebrew naming formula more closely than the smoother 'name him,' while remaining readable.
- source_word: יִצְחָק
  chosen: Isaac
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention per translation philosophy.
- source_word: וַהֲקִמֹתִי
  chosen: I will establish
  alternatives:
  - I will confirm
  - I will uphold
  lexicon: HALOT
  rationale: For covenant language, 'establish' is the standard and best reflects the sense of causing the covenant to stand in force.
- source_word: בְּרִיתִי
  chosen: my covenant
  alternatives:
  - my pact
  lexicon: HALOT
  rationale: '''Covenant'' is the established and semantically appropriate rendering for ברית in this theological context.'
- source_word: אִתּוֹ
  chosen: with him
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The preposition indicates covenant relationship with Isaac himself, not merely benefit directed toward him.
- source_word: לִבְרִית עוֹלָם
  chosen: as an everlasting covenant
  alternatives:
  - for an everlasting covenant
  - as a perpetual covenant
  lexicon: HALOT
  rationale: This construction expresses result or designation. 'As an everlasting covenant' is idiomatic and preserves the covenant's enduring character.
- source_word: עוֹלָם
  chosen: everlasting
  alternatives:
  - eternal
  - perpetual
  lexicon: HALOT
  rationale: '''Everlasting'' is a natural covenantal term in English and avoids importing philosophical nuances that ''eternal'' may suggest.'
- source_word: לְזַרְעוֹ אַחֲרָיו
  chosen: for his offspring after him
  alternatives:
  - for his seed after him
  - for his descendants after him
  lexicon: HALOT
  rationale: '''Offspring'' preserves the collective singular sense of זרע while sounding natural in modern English. ''Seed'' is more formal but less clear to contemporary readers; ''descendants'' is possible but slightly more interpretive.'
