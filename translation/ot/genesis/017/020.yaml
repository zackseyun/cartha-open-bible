id: GEN.17.20
reference: Genesis 17:20
source:
  edition: WLC
  text: וּֽ/לְ/יִשְׁמָעֵ֘אל שְׁמַעְתִּי/ךָ֒ הִנֵּ֣ה בֵּרַ֣כְתִּי אֹת֗/וֹ וְ/הִפְרֵיתִ֥י אֹת֛/וֹ וְ/הִרְבֵּיתִ֥י אֹת֖/וֹ בִּ/מְאֹ֣ד מְאֹ֑ד שְׁנֵים עָשָׂ֤ר נְשִׂיאִם֙ יוֹלִ֔יד וּ/נְתַתִּ֖י/ו לְ/ג֥וֹי גָּדֽוֹל׀־׃
translation:
  text: And as for Ishmael[a], I have heard you. Behold, I have blessed him, and will make him fruitful, and will multiply him exceedingly. He will father twelve princes[b], and I will make him into a great nation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chiefs' or 'leaders' for 'princes.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'very, very'; that is, exceedingly or very greatly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְיִשְׁמָעֵאל
  chosen: And as for Ishmael
  alternatives:
  - And concerning Ishmael
  - And for Ishmael
  lexicon: HALOT
  rationale: 'The prefixed conjunction and preposition introduce a topical shift: God turns from Isaac to address Abraham''s request regarding Ishmael. ''As for'' captures the discourse function naturally in English while preserving the referential focus on Ishmael.'
- source_word: שְׁמַעְתִּיךָ
  chosen: I have heard you
  alternatives:
  - I have listened to you
  - I have granted your request
  lexicon: HALOT
  rationale: The verb שׁמע commonly means 'hear/listen.' In context it implies favorable response to Abraham's plea, but the text states hearing rather than explicitly granting, so 'I have heard you' preserves the wording without over-interpreting.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה is a discourse particle drawing attention to what follows. 'Look' is readable modern English and preserves the emphatic force better than archaic 'Behold.'
- source_word: בֵּרַכְתִּי אֹתוֹ
  chosen: I have blessed him
  alternatives:
  - I have indeed blessed him
  lexicon: HALOT
  rationale: The perfect verb is retained as a completed divine act. 'Blessed' is the standard rendering for ברך and fits covenantal context.
- source_word: וְהִפְרֵיתִי אֹתוֹ
  chosen: and will make him fruitful
  alternatives:
  - and I will make him prolific
  - and I will cause him to be fruitful
  lexicon: HALOT
  rationale: 'The Hiphil of פרה is causative: God will cause Ishmael to be fruitful. English idiom favors ''make him fruitful.'' The shift from prior perfect to future reflects the sequence of divine promises in natural English.'
- source_word: וְהִרְבֵּיתִי אֹתוֹ
  chosen: and will multiply him
  alternatives:
  - and will make him numerous
  - and will greatly increase him
  lexicon: HALOT
  rationale: The Hiphil of רבה here concerns numerical increase of descendants. 'Multiply him' is a conventional covenantal rendering that preserves intertextual resonance with patriarchal promises.
- source_word: בִּמְאֹד מְאֹד
  chosen: exceedingly
  alternatives:
  - very greatly
  - abundantly
  lexicon: HALOT
  rationale: The doubled מאד intensifies the promise. 'Exceedingly' conveys strong emphasis in concise modern English; 'very greatly' is more literal but less natural.
- source_word: שְׁנֵים עָשָׂר נְשִׂיאִם
  chosen: twelve princes
  alternatives:
  - twelve chiefs
  - twelve leaders
  lexicon: HALOT
  rationale: נָשִׂיא denotes a lifted-up person, often a chieftain, prince, or leader. 'Princes' fits the status of tribal rulers in patriarchal context and matches common biblical usage without implying later monarchy too strongly.
- source_word: יוֹלִיד
  chosen: He will father
  alternatives:
  - he will beget
  - he will have
  lexicon: HALOT
  rationale: The Hiphil/imperfect of ילד with a male subject means to beget or father. 'Father' is natural modern English and more precise than the generic 'have.'
- source_word: וּנְתַתִּיו לְגוֹי גָּדוֹל
  chosen: and I will make him into a great nation
  alternatives:
  - and I will make him a great nation
  - and I will appoint him for a great nation
  lexicon: HALOT
  rationale: נתן with ל can mean 'make/appoint as.' Since Ishmael as an individual becomes progenitor of a people, 'make him into a great nation' clarifies the transformation without departing from the Hebrew sense. 'A great nation' is retained as covenantal language.
