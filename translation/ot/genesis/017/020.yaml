theological_decisions:
- issue: Implication of divine response in שְׁמַעְתִּיךָ
  chosen_reading: God states that he has heard Abraham's request concerning Ishmael without making this clause itself mean full covenantal election.
  alternative_readings:
  - God has granted your request
  - God has accepted Ishmael on the same covenantal terms as Isaac
  rationale: The verse affirms divine favor and blessing toward Ishmael, but within the chapter the covenant line is still distinguished through Isaac. The translation therefore preserves the wording 'I have heard you' and does not import stronger theological conclusions than the text explicitly states.
  doctrine_reference: Translation philosophy items 1 and 3
- issue: Rendering of נְשִׂיאִם
  chosen_reading: princes
  alternative_readings:
  - chiefs
  - leaders
  rationale: The term denotes recognized rulers of clans or tribes. 'Princes' preserves the elevated social-political status without flattening the promise into generic leadership language.
  doctrine_reference: Translation philosophy item 5
