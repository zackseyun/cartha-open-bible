id: GEN.17.24
reference: Genesis 17:24
source:
  edition: WLC
  text: וְ/אַ֨בְרָהָ֔ם בֶּן תִּשְׁעִ֥ים וָ/תֵ֖שַׁע שָׁנָ֑ה בְּ/הִמֹּל֖/וֹ בְּשַׂ֥ר
    עָרְלָתֽ/וֹ־׃
translation:
  text: And Abraham was ninety-nine years old when the flesh of his foreskin was circumcised.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/אַבְרָהָם
  chosen: And Abraham
  alternatives:
  - Now Abraham
  lexicon: HALOT
  rationale: The conjunction ו is rendered simply as "And" to continue the narrative
    sequence. The personal name is transliterated per translation philosophy.
- source_word: בֶּן תִּשְׁעִים וָתֵשַׁע שָׁנָה
  chosen: was ninety-nine years old
  alternatives:
  - was a son of ninety-nine years
  - was ninety-nine years of age
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads "a son of ninety-nine years," but idiomatic
    English requires "was ninety-nine years old." This preserves the age statement
    without wooden phrasing.
- source_word: בְּ/הִמֹּלוֹ
  chosen: when ... was circumcised
  alternatives:
  - at his being circumcised
  - in the circumcising of him
  lexicon: HALOT
  rationale: 'The preposition ב plus infinitive construct with pronominal suffix expresses
    temporal circumstance: "when he was circumcised." An English passive best reflects
    the Hebrew verbal noun construction in natural style.'
- source_word: בְּשַׂר
  chosen: the flesh
  alternatives:
  - flesh
  lexicon: HALOT
  rationale: Rendered literally as "the flesh," preserving the concrete bodily reference
    in the circumcision formula.
- source_word: עָרְלָתוֹ
  chosen: of his foreskin
  alternatives:
  - his foreskin
  lexicon: HALOT
  rationale: The construct chain בשר ערלתו is most naturally rendered "the flesh of
    his foreskin." This keeps the formal wording of the Hebrew rather than simplifying
    to merely "he was circumcised."
