id: GEN.17.4
reference: Genesis 17:4
source:
  edition: WLC
  text: אֲנִ֕י הִנֵּ֥ה בְרִיתִ֖/י אִתָּ֑/ךְ וְ/הָיִ֕יתָ לְ/אַ֖ב הֲמ֥וֹן גּוֹיִֽם׃
translation:
  text: As for me, behold, my covenant is with you, and you will become the father
    of a multitude of nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I—behold, my covenant is with you.' The opening pronoun and particle
      are emphatic in Hebrew.
    reason: lexical_alternative
  - marker: b
    text: Or 'you shall be a father of a multitude of nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי
  chosen: As for me
  alternatives:
  - I
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. Rendering it simply as 'I' is possible,
    but 'As for me' better brings out the discourse emphasis at the start of the divine
    declaration in natural English.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  - indeed
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle drawing attention to what follows. 'Behold'
    preserves the solemn force and directness of the Hebrew better than flatter options
    like 'indeed,' while still being understandable in context.
- source_word: בְרִיתִי
  chosen: my covenant
  alternatives:
  - my pact
  - my treaty
  lexicon: HALOT
  rationale: בְּרִית is the standard covenant term in Genesis and carries theological
    weight in the Abraham narrative. 'Covenant' is the established and most accurate
    rendering.
- source_word: אִתָּךְ
  chosen: with you
  alternatives:
  - between me and you
  lexicon: HALOT
  rationale: The preposition with pronominal suffix straightforwardly means 'with
    you.' Although covenant contexts can imply bilateral relation, the Hebrew here
    does not explicitly say 'between me and you,' so the translation should not expand
    beyond the wording.
- source_word: וְהָיִיתָ
  chosen: and you will become
  alternatives:
  - and you shall be
  - and you will be
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction in this covenantal declaration has
    future/resultative force. 'Will become' captures the sense of transition into
    the stated role slightly better than the more static 'will be,' though both are
    possible.
- source_word: לְאָב
  chosen: the father of
  alternatives:
  - a father of
  lexicon: HALOT
  rationale: The Hebrew literally has 'for/to a father of.' English idiom prefers
    'the father of' in this context, especially since Abram is being assigned a defining
    covenant role. The article is not explicit in Hebrew, but this rendering is natural
    and contextually fitting.
- source_word: הֲמוֹן
  chosen: a multitude of
  alternatives:
  - many
  - a throng of
  - an abundance of
  lexicon: HALOT
  rationale: הֲמוֹן denotes a large mass or multitude. 'A multitude of' preserves
    both the quantitative force and the lexical connection to the renaming explanation
    in the following verse.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - peoples
  - Gentile nations
  lexicon: HALOT
  rationale: גּוֹיִם here refers broadly to nations/peoples descending from Abraham,
    not specifically 'Gentiles' in a later technical sense. 'Nations' is the most
    contextually accurate rendering.
