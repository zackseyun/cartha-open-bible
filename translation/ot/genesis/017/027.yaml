id: GEN.17.27
reference: Genesis 17:27
source:
  edition: WLC
  text: וְ/כָל אַנְשֵׁ֤י בֵית/וֹ֙ יְלִ֣יד בָּ֔יִת וּ/מִקְנַת כֶּ֖סֶף מֵ/אֵ֣ת בֶּן
    נֵכָ֑ר נִמֹּ֖לוּ אִתּֽ/וֹ־־־׃פ
translation:
  text: And all the men of his household, those born in the house and those bought
    with money from a foreigner, were circumcised with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'son of a foreigner,' an idiom meaning 'foreigner' or 'outsider.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל
  chosen: And all
  alternatives:
  - and every
  lexicon: HALOT
  rationale: וְ joins this verse to the preceding narrative, and כָּל marks totality.
    'And all' is natural English and preserves the comprehensive force.
- source_word: אַנְשֵׁי בֵיתוֹ
  chosen: the men of his household
  alternatives:
  - the men of his house
  - the males of his household
  lexicon: HALOT
  rationale: אַנְשֵׁי is the construct plural of 'men,' and בֵיתוֹ means 'his house/household.'
    Because the context is circumcision, the referent is specifically male members;
    'the men of his household' is both accurate and idiomatic. 'Males' is possible
    but less natural here.
- source_word: יְלִיד בָּיִת
  chosen: those born in the house
  alternatives:
  - house-born
  - those born in his house
  lexicon: HALOT
  rationale: This phrase denotes persons born within the household. 'Those born in
    the house' preserves the social-legal sense without sounding archaic like 'house-born.'
- source_word: וּמִקְנַת כֶּסֶף
  chosen: and those bought with money
  alternatives:
  - and the purchase of silver
  - and those acquired with money
  lexicon: HALOT
  rationale: The construct phrase refers to persons acquired by purchase. 'Bought
    with money' is clear modern English and preserves the transactional sense better
    than a wooden rendering.
- source_word: מֵאֵת בֶּן נֵכָר
  chosen: from a foreigner
  alternatives:
  - from a son of a foreign land
  - from a foreign son
  - from an outsider
  lexicon: HALOT
  rationale: The idiom בֶּן נֵכָר refers to a foreigner/outsider, not literally 'son
    of a foreign land' in English. 'From a foreigner' best captures the idiomatic
    sense in context.
- source_word: נִמֹּלוּ
  chosen: were circumcised
  alternatives:
  - circumcised themselves
  lexicon: HALOT
  rationale: 'The Niphal form is best rendered as passive here: ''were circumcised.''
    This matches the narrative context and avoids implying reflexive action.'
- source_word: אִתּוֹ
  chosen: with him
  alternatives:
  - along with him
  lexicon: HALOT
  rationale: The preposition indicates accompaniment with Abraham in the act/time
    of circumcision. 'With him' is concise and accurate.
