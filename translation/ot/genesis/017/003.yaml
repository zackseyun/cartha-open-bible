theological_decisions:
- issue: Referent and number of אֱלֹהִים
  chosen_reading: Singular 'God'
  alternative_readings:
  - gods (plural form only at the morphological level)
  rationale: In this context the referent is the covenant God addressing Abram, and
    the surrounding syntax uses singular verbal agreement. Rendering it as plural
    would be grammatically and contextually incorrect and would import a theological
    claim the text does not make.
