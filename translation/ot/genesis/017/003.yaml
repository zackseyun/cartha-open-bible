id: GEN.17.3
reference: Genesis 17:3
source:
  edition: WLC
  text: וַ/יִּפֹּ֥ל אַבְרָ֖ם עַל פָּנָ֑י/ו וַ/יְדַבֵּ֥ר אִתּ֛/וֹ אֱלֹהִ֖ים לֵ/אמֹֽר־׃
translation:
  text: Then Abram fell on his face, and God spoke with him, saying,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּפֹּל
  chosen: fell
  alternatives:
  - fell down
  - prostrated himself
  lexicon: HALOT
  rationale: Qal wayyiqtol of נפל, narrating a completed past action. 'Fell' is the
    plain lexical sense; 'fell on his face' in context already conveys prostration,
    so an expanded rendering is unnecessary in the main text.
- source_word: עַל פָּנָיו
  chosen: on his face
  alternatives:
  - face down
  - with his face to the ground
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression for bodily prostration or reverence. 'On
    his face' is a natural, fairly formal English rendering that preserves the imagery
    without over-paraphrasing.
- source_word: אַבְרָם
  chosen: Abram
  rationale: Personal name is transliterated by standard convention, in keeping with
    the translation philosophy. At this point in the narrative the name has not yet
    been changed to Abraham.
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  - spoke further
  lexicon: HALOT
  rationale: Piel wayyiqtol of דבר commonly means 'speak.' Because the following לֵאמֹר
    introduces direct speech, 'spoke ... saying' reflects standard Hebrew discourse
    structure better than collapsing both into simply 'said.'
- source_word: אִתּוֹ
  chosen: with him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: The preposition את with pronominal suffix here is best rendered 'with
    him.' While English often says 'spoke to him,' the Hebrew wording supports the
    more literal 'with him,' which remains natural in English and preserves the relational
    nuance.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although morphologically plural in form, אֱלֹהִים here takes singular
    verbal agreement and refers to the one true God. Therefore the singular English
    'God' is required by sense and grammar.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - as follows
  lexicon: HALOT
  rationale: Infinitive construct of אמר used as a speech introducer. 'Saying' preserves
    the Hebrew narrative formula and prepares for the direct discourse that follows
    in the next verse.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  rationale: The initial waw on the first verb is rendered 'Then' rather than a bare
    'And' to produce readable modern English while still signaling narrative sequence.
