id: GEN.17.21
reference: Genesis 17:21
source:
  edition: WLC
  text: וְ/אֶת בְּרִיתִ֖/י אָקִ֣ים אֶת יִצְחָ֑ק אֲשֶׁר֩ תֵּלֵ֨ד לְ/ךָ֤ שָׂרָה֙ לַ/מּוֹעֵ֣ד
    הַ/זֶּ֔ה בַּ/שָּׁנָ֖ה הָ/אַחֶֽרֶת־־׃
translation:
  text: But I will establish my covenant with Isaac, whom Sarah will bear to you at
    this time next year.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "And I will establish my covenant with Isaac." The Hebrew conjunction
      can be rendered simply as "and," but the context favors a contrast with the
      promise given concerning Ishmael in the previous verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶת
  chosen: But
  alternatives:
  - And
  lexicon: HALOT
  rationale: The conjunction links this statement contrastively with the preceding
    discussion about Ishmael (v. 20). English 'But' best captures the discourse contrast,
    though the Hebrew conjunction itself is simply waw + object marker.
- source_word: בְּרִיתִי
  chosen: my covenant
  lexicon: HALOT
  rationale: Standard rendering of בְּרִית as 'covenant' in Genesis' covenantal context;
    the 1cs suffix is expressed by 'my'.
- source_word: אָקִים
  chosen: I will establish
  alternatives:
  - I will confirm
  - I will uphold
  lexicon: HALOT
  rationale: Hiphil of קום here means to establish or set up firmly. 'Establish' is
    idiomatic in covenant contexts and preserves the formal covenantal sense.
- source_word: אֶת יִצְחָק
  chosen: with Isaac
  alternatives:
  - for Isaac
  lexicon: HALOT
  rationale: Although אֶת marks the direct object, English idiom with 'establish my
    covenant' normally takes 'with' for the covenant partner. This reflects the relational
    sense without obscuring Isaac as the covenantal party.
- source_word: יִצְחָק
  chosen: Isaac
  rationale: Personal name transliterated according to standard English convention,
    in keeping with the translation philosophy.
- source_word: אֲשֶׁר תֵּלֵד לְךָ שָׂרָה
  chosen: whom Sarah will bear to you
  alternatives:
  - whom Sarah shall bear to you
  - that Sarah will bear for you
  lexicon: HALOT
  rationale: The relative clause identifies Isaac as the promised son. 'Bear to you'
    preserves the dative לְךָ and natural English expression of childbirth in relation
    to the father.
- source_word: לַמּוֹעֵד הַזֶּה
  chosen: at this appointed time
  alternatives:
  - at this set time
  - at this season
  lexicon: HALOT
  rationale: מוֹעֵד denotes an appointed or fixed time. 'Appointed time' preserves
    the sense of divine scheduling better than the more generic 'time' or 'season'.
- source_word: בַּשָּׁנָה הָאַחֶרֶת
  chosen: next year
  alternatives:
  - in the following year
  - at this time next year
  lexicon: HALOT
  rationale: Literally 'in the other/following year.' In English, 'next year' is the
    most natural equivalent. Because the phrase follows 'at this appointed time,'
    the full clause idiomatically becomes 'at this appointed time next year.'
