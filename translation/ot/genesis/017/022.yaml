theological_decisions:
- issue: Anthropomorphic description of divine departure
  chosen_reading: Retain the spatial language 'God went up from Abraham'
  alternative_readings:
  - God departed from Abraham
  - God withdrew from Abraham
  rationale: The Hebrew uses concrete ascent language. Preserving it maintains the
    narrative depiction of God's manifested presence ending without flattening the
    text into abstraction. This does not require a doctrinal claim about God's spatial
    limitation; it reflects the form of the theophany as narrated.
  doctrine_reference: Preserve theological tension rather than resolve it.
