id: GEN.17.22
reference: Genesis 17:22
source:
  edition: WLC
  text: וַ/יְכַ֖ל לְ/דַבֵּ֣ר אִתּ֑/וֹ וַ/יַּ֣עַל אֱלֹהִ֔ים מֵ/עַ֖ל אַבְרָהָֽם׃
translation:
  text: When he finished speaking with him, God went up from Abraham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God ascended from Abraham.' The Hebrew uses the verb 'went up/ascended,'
      portraying the end of the divine appearance in spatial terms.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְכַל
  chosen: When he finished
  alternatives:
  - And he finished
  - When he had finished
  lexicon: HALOT
  rationale: From כלה in the wayyiqtol, marking completed action. Rendering with 'When
    he finished' captures the temporal sense naturally in English and prepares for
    the following main clause.
- source_word: לְדַבֵּר
  chosen: speaking
  alternatives:
  - to speak
  - speaking
  lexicon: HALOT
  rationale: Infinitive construct of דבר after כלה forms the idiom 'finish speaking.'
    English prefers the gerund here rather than the more wooden 'finished to speak.'
- source_word: אִתּוֹ
  chosen: with him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: The preposition את with pronominal suffix here indicates accompaniment/interaction,
    best rendered 'with him' in the idiom 'speaking with him.' The referent is Abraham
    from context.
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - ascended
  - departed upward
  lexicon: HALOT
  rationale: עלה literally means 'go up/ascend.' 'Went up' preserves the concrete
    vertical imagery without becoming overly formal. 'Ascended' is possible but sounds
    more elevated than the Hebrew requires.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although morphologically plural in form, the verb is singular and the
    referent in context is the one true God. Standard singular rendering is required
    by Hebrew syntax and context.
- source_word: מֵעַל
  chosen: from Abraham
  alternatives:
  - from above Abraham
  - from upon Abraham
  lexicon: HALOT
  rationale: The preposition literally means 'from upon/from over.' In this context
    of divine departure after appearing to Abraham, idiomatic English is 'from Abraham.'
    The more literal options are possible but awkward and do not improve clarity.
- source_word: אַבְרָהָם
  chosen: Abraham
  rationale: Standard English transliteration of the personal name, in keeping with
    the translation philosophy of transliterating names.
