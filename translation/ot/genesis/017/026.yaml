id: GEN.17.26
reference: Genesis 17:26
source:
  edition: WLC
  text: בְּ/עֶ֨צֶם֙ הַ/יּ֣וֹם הַ/זֶּ֔ה נִמּ֖וֹל אַבְרָהָ֑ם וְ/יִשְׁמָעֵ֖אל בְּנֽ/וֹ׃
translation:
  text: On that very day Abraham and his son Ishmael were circumcised.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּעֶצֶם
  chosen: on that very
  alternatives:
  - in the very
  - on that same
  lexicon: HALOT
  rationale: The idiom בְּעֶצֶם הַיּוֹם הַזֶּה intensifies temporal specificity, meaning
    'on that very day' or 'on that same day.' 'On that very' preserves the emphatic
    force in natural English.
- source_word: הַיּוֹם הַזֶּה
  chosen: day
  alternatives:
  - same day
  - this day
  lexicon: HALOT
  rationale: Together with בְּעֶצֶם, this forms the full temporal expression. 'Day'
    is retained directly, while the demonstrative force is carried by 'that very day.'
- source_word: נִמּוֹל
  chosen: were circumcised
  alternatives:
  - was circumcised
  lexicon: HALOT
  rationale: Although morphologically singular/passive ('was circumcised'), the verb
    precedes a compound subject ('Abraham and Ishmael his son'). English idiom normally
    uses a plural verb with a compound subject, so 'were circumcised' best reflects
    the sense without awkwardness. The passive sense of מול is preserved.
- source_word: אַבְרָהָם
  chosen: Abraham
  rationale: Standard English transliteration of the personal name.
- source_word: וְיִשְׁמָעֵאל
  chosen: and Ishmael
  rationale: The conjunction is rendered straightforwardly, and the personal name
    is transliterated by standard English convention.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - son of him
  lexicon: HALOT
  rationale: The construct noun with 3ms suffix identifies Ishmael as Abraham's son.
    'His son' is the natural English rendering and preserves the relational emphasis.
