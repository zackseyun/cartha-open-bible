theological_decisions:
- issue: Covenant idiom with נתן + ברית
  chosen_reading: establish my covenant
  alternative_readings:
  - give my covenant
  - set my covenant
  rationale: Although the Hebrew verb is literally 'give,' in this covenant context
    English 'establish' better communicates the covenantal act and avoids suggesting
    mere transfer of an object. This reflects optimal equivalence while preserving
    the theological significance of covenant initiation/confirmation.
  doctrine_reference: 'Translation philosophy: optimal equivalence; Original-language
    primacy over translation tradition.'
