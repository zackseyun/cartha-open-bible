id: GEN.17.2
reference: Genesis 17:2
source:
  edition: WLC
  text: וְ/אֶתְּנָ֥ה בְרִיתִ֖/י בֵּינִ֣/י וּ/בֵינֶ֑/ךָ וְ/אַרְבֶּ֥ה אוֹתְ/ךָ֖ בִּ/מְאֹ֥ד
    מְאֹֽד׃
translation:
  text: And I will make my covenant between me and you, and I will multiply you exceedingly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'And I will give/set my covenant between me and you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶתְּנָה
  chosen: And I will establish
  alternatives:
  - and I will give
  - and I will set
  lexicon: HALOT
  rationale: The verb נתן literally means 'give/put/set,' but with בְּרִית ('covenant')
    in covenant-making context, English 'establish' best conveys the idiomatic sense
    without woodenly obscuring meaning. The prefixed conjunction is retained as 'And.'
- source_word: בְרִיתִי
  chosen: my covenant
  lexicon: HALOT
  rationale: Standard rendering of בְּרִית as 'covenant' preserves the formal and
    theological weight of the term; the 1cs suffix is represented by 'my.'
- source_word: בֵּינִי וּבֵינֶךָ
  chosen: between me and you
  alternatives:
  - between myself and you
  lexicon: HALOT
  rationale: A direct and natural rendering of the relational phrase; 'me' is idiomatic
    English after 'between.'
- source_word: וְאַרְבֶּה
  chosen: and I will multiply
  alternatives:
  - and I will make numerous
  - and I will increase
  lexicon: HALOT
  rationale: The Hiphil of רבה here expresses causative increase in number. 'Multiply'
    is both idiomatic in patriarchal promise contexts and consistent with traditional
    covenant language.
- source_word: אֹתְךָ
  chosen: you
  alternatives:
  - your descendants
  lexicon: HALOT
  rationale: The direct object is second masculine singular, referring immediately
    to Abram. While the promise implies progeny, the Hebrew addresses Abram directly,
    so 'you' should not be expanded in the main text.
- source_word: בִּמְאֹד מְאֹד
  chosen: exceedingly
  alternatives:
  - very, very much
  - greatly
  lexicon: HALOT
  rationale: The doubled מְאֹד intensifies the promise. 'Exceedingly' captures the
    emphatic adverbial force in natural English without awkward repetition.
