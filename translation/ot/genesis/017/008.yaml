id: GEN.17.8
reference: Genesis 17:8
source:
  edition: WLC
  text: וְ/נָתַתִּ֣י לְ֠/ךָ וּ/לְ/זַרְעֲ/ךָ֨ אַחֲרֶ֜י/ךָ אֵ֣ת אֶ֣רֶץ מְגֻרֶ֗י/ךָ אֵ֚ת
    כָּל אֶ֣רֶץ כְּנַ֔עַן לַ/אֲחֻזַּ֖ת עוֹלָ֑ם וְ/הָיִ֥יתִי לָ/הֶ֖ם לֵ/אלֹהִֽים׀־׃
translation:
  text: And I will give to you and to your offspring after you the land of your sojournings—all
    the land of Canaan—as an everlasting possession, and I will be their God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land where you reside as a foreigner.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for an everlasting possession.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: And I will give
  alternatives:
  - and I have given
  lexicon: HALOT
  rationale: 'Qal perfect 1cs with prefixed conjunction in covenantal speech is naturally
    rendered as a future promise in English: ''I will give.'' This preserves the promissory
    force in context.'
- source_word: לְךָ
  chosen: to you
  lexicon: HALOT
  rationale: Simple dative marking the recipient Abram personally.
- source_word: וּלְזַרְעֲךָ אַחֲרֶיךָ
  chosen: and to your offspring after you
  alternatives:
  - and to your seed after you
  - and to your descendants after you
  lexicon: HALOT
  rationale: זֶרַע is a collective noun. 'Offspring' preserves the collective sense
    better than 'seed' in contemporary English while avoiding the overpluralization
    of 'descendants.' 'After you' is retained to reflect succession.
- source_word: אֶרֶץ מְגֻרֶיךָ
  chosen: the land of your sojournings
  alternatives:
  - the land of your wanderings
  - the land where you reside as a foreigner
  - the land of your temporary residences
  lexicon: HALOT
  rationale: מְגוּרִים refers to places of sojourning/residence as an alien. 'Sojournings'
    preserves the patriarch's unsettled, resident-alien status better than a flatter
    'residence.'
- source_word: אֵת כָּל אֶרֶץ כְּנַעַן
  chosen: all the land of Canaan
  alternatives:
  - the whole land of Canaan
  lexicon: HALOT
  rationale: The second accusative apposition specifies the previous phrase. 'All
    the land of Canaan' is natural English and preserves the comprehensiveness of
    כָּל.
- source_word: לַאֲחֻזַּת עוֹלָם
  chosen: as an everlasting possession
  alternatives:
  - for an everlasting possession
  - as a permanent holding
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a possession/holding, especially landed property. עוֹלָם
    here carries enduring, perpetual covenantal force. 'Everlasting possession' is
    both natural and weighty.
- source_word: וְהָיִיתִי לָהֶם לֵאלֹהִים
  chosen: and I will be their God
  alternatives:
  - and I will become God to them
  lexicon: HALOT
  rationale: This is standard covenant formula language. 'I will be their God' is
    the idiomatic and theologically transparent rendering in English.
