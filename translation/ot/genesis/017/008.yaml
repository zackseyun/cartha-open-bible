theological_decisions:
- issue: Rendering the covenant formula without importing later doctrinal nuance
  chosen_reading: and I will be their God
  alternative_readings:
  - and I will be God to them
  rationale: The Hebrew expresses covenant relationship, not an ontological change
    in God. The chosen rendering preserves the formula's biblical resonance while
    remaining faithful to the source.
