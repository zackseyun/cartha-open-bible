theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidance explicitly sets 'the LORD' as the default rendering
    for YHWH. This preserves continuity with longstanding English Bible practice while
    respecting the reverential substitution tradition.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering אֵל שַׁדַּי
  chosen_reading: God Almighty
  alternative_readings:
  - El Shaddai
  rationale: The phrase is a divine title, and the translation philosophy prefers
    translating titles to preserve meaning. Because שַׁדַּי has debated etymology
    and 'El Shaddai' remains a recognizable traditional form, the transliterated alternative
    is preserved in a footnote rather than adopted in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §2; §3
