theological_decisions:
- issue: Nuance of Abraham's wish for Ishmael's status before God
  chosen_reading: Rendered לְפָנֶיךָ as 'before you' without expanding to 'under your
    blessing' or 'in covenant before you.'
  alternative_readings:
  - in your presence
  - under your favor
  rationale: The Hebrew can imply life in God's presence and favor, but the text does
    not explicitly define the theological content of that life here. Preserving the
    concise phrase maintains the narrative's theological tension and avoids importing
    a fuller covenantal interpretation into the main text.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
