id: GEN.17.18
reference: Genesis 17:18
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר אַבְרָהָ֖ם אֶל הָֽ/אֱלֹהִ֑ים ל֥וּ יִשְׁמָעֵ֖אל יִחְיֶ֥ה לְ/פָנֶֽי/ךָ־׃
translation:
  text: And Abraham said to God, “Oh, that Ishmael might live before you!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “If only Ishmael may live in your presence” or “under your favor.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' is a natural,
    sufficiently formal rendering in English narrative style.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: 'Standard prepositional sense with speech verb: Abraham speaks to God.'
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: With the article, the Hebrew refers to the specific deity in context.
    English idiom normally renders this simply as 'God' rather than 'the God' when
    referring to Israel's God in direct narrative.
- source_word: לוּ
  chosen: Oh, that
  alternatives:
  - If only
  - Would that
  lexicon: HALOT
  rationale: לוּ here introduces a wish rather than a condition. 'Oh, that' preserves
    the optative force and emotional tone without sounding overly archaic.
- source_word: יִשְׁמָעֵאל
  chosen: Ishmael
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: יִחְיֶה
  chosen: might live
  alternatives:
  - may live
  - would live
  lexicon: HALOT
  rationale: The imperfect under the optative particle expresses Abraham's wish. 'Might
    live' conveys desired continuance of life/prosperity in idiomatic English.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in your presence
  - under your favor
  lexicon: HALOT
  rationale: Literally 'before your face/presence.' 'Before you' is the most direct
    rendering and preserves the relational/covenantal nuance without over-interpreting
    it as merely spatial or explicitly as favor.
