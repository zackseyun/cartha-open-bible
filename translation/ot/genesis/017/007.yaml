theological_decisions:
- issue: Covenant language with Abraham's seed
  chosen_reading: your offspring
  alternative_readings:
  - your seed
  - your descendants
  rationale: The Hebrew collective singular זרע can carry both corporate and, in broader
    canonical context, potentially representative significance. The translation preserves
    the lexical ambiguity by using 'offspring' rather than resolving it toward either
    a strictly plural or a more overtly typological singular reading.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Covenant formula wording
  chosen_reading: to be God to you
  alternative_readings:
  - to be your God
  rationale: This keeps the covenant formula close to the Hebrew relational expression
    without importing additional doctrinal nuance. It also preserves the solemn covenantal
    cadence of the source text.
  doctrine_reference: Original-language primacy over translation tradition.
