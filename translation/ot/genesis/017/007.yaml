id: GEN.17.7
reference: Genesis 17:7
source:
  edition: WLC
  text: וַ/הֲקִמֹתִ֨י אֶת בְּרִיתִ֜/י בֵּינִ֣/י וּ/בֵינֶ֗/ךָ וּ/בֵ֨ין זַרְעֲ/ךָ֧ אַחֲרֶ֛י/ךָ
    לְ/דֹרֹתָ֖/ם לִ/בְרִ֣ית עוֹלָ֑ם לִ/הְי֤וֹת לְ/ךָ֙ לֵֽ/אלֹהִ֔ים וּֽ/לְ/זַרְעֲ/ךָ֖
    אַחֲרֶֽי/ךָ־׃
translation:
  text: And I will establish my covenant between me and you and your offspring after
    you throughout their generations as an everlasting covenant, to be God to you
    and to your offspring after you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'to be your God.'
    reason: lexical_alternative
  - marker: b
    text: '''Offspring'' translates a collective singular Hebrew term that can also
      be rendered ''seed'' or ''descendants.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲקִמֹתִי
  chosen: I will establish
  alternatives:
  - I will confirm
  - I will uphold
  lexicon: HALOT
  rationale: הקים with ברית commonly means to establish or confirm a covenant. 'Establish'
    is the most natural English here and fits the covenant-making context without
    implying merely maintenance.
- source_word: בְּרִיתִי
  chosen: my covenant
  lexicon: HALOT
  rationale: Standard rendering of ברית. The possessive suffix is preserved directly.
- source_word: בֵּינִי וּבֵינֶךָ וּבֵין
  chosen: between me and you and
  alternatives:
  - between me and you, and between
  lexicon: HALOT
  rationale: The repeated בין structure marks covenant parties. English smooths the
    repetition while preserving the relational sense.
- source_word: זַרְעֲךָ
  chosen: your offspring
  alternatives:
  - your seed
  - your descendants
  lexicon: HALOT
  rationale: זרע can be collective singular. 'Offspring' preserves the singular collective
    force better than 'descendants' and is more natural than the more formal 'seed.'
- source_word: אַחֲרֶיךָ
  chosen: after you
  alternatives:
  - following you
  lexicon: HALOT
  rationale: A straightforward temporal/genealogical expression indicating subsequent
    generations.
- source_word: לְדֹרֹתָם
  chosen: throughout their generations
  alternatives:
  - for their generations
  - through their generations
  lexicon: HALOT
  rationale: This expresses continuance across successive generations. 'Throughout
    their generations' is idiomatic and preserves the durative force.
- source_word: לִבְרִית עוֹלָם
  chosen: as an everlasting covenant
  alternatives:
  - for an everlasting covenant
  - as a perpetual covenant
  lexicon: HALOT
  rationale: עולם here denotes enduring permanence in covenantal context. 'Everlasting'
    is the standard accessible rendering; 'as' fits the predicative ל construction
    in English.
- source_word: לִהְיוֹת לְךָ לֵאלֹהִים
  chosen: to be God to you
  alternatives:
  - to be your God
  lexicon: HALOT
  rationale: The Hebrew construction is literally 'to be to you as God.' 'To be God
    to you' preserves the covenantal relational wording more closely than the smoother
    'to be your God,' though the latter is a valid idiomatic alternative.
- source_word: וּלְזַרְעֲךָ אַחֲרֶיךָ
  chosen: and to your offspring after you
  alternatives:
  - and to your descendants after you
  lexicon: HALOT
  rationale: Repeats the earlier covenant promise and should be rendered consistently
    with זרע above.
