id: GEN.17.15
reference: Genesis 17:15
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֱלֹהִים֙ אֶל אַבְרָהָ֔ם שָׂרַ֣י אִשְׁתְּ/ךָ֔ לֹא תִקְרָ֥א אֶת
    שְׁמָ֖/הּ שָׂרָ֑י כִּ֥י שָׂרָ֖ה שְׁמָֽ/הּ־־־׃
translation:
  text: Then God said to Abraham, “As for Sarai your wife, you shall not call her
    name Sarai, for Sarah is her name.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “you shall no longer call her Sarai; her name shall
      be Sarah.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force; 'and said' is more formally
    literal but less idiomatic here.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Standard rendering of אֱלֹהִים in this context as the singular God of
    Israel; no contextual reason to render otherwise.
- source_word: אֶל
  chosen: to
  lexicon: HALOT
  rationale: Direct prepositional sense indicating the addressee of speech.
- source_word: שָׂרַי
  chosen: Sarai
  lexicon: HALOT
  rationale: Personal name is transliterated per project philosophy. The verse contrasts
    the former name with the new name, so preserving the distinct forms 'Sarai' and
    'Sarah' is essential.
- source_word: אִשְׁתְּךָ
  chosen: your wife
  lexicon: HALOT
  rationale: Straightforward possessive construction identifying Sarai in relation
    to Abraham.
- source_word: לֹא תִקְרָא
  chosen: you shall not call
  alternatives:
  - do not call
  - you must not call
  lexicon: HALOT
  rationale: The imperfect in direct divine speech functions as a directive/prohibition.
    'You shall not call' preserves the solemn covenantal tone without over-paraphrasing.
- source_word: אֶת שְׁמָהּ
  chosen: her name
  alternatives:
  - by her name
  lexicon: HALOT
  rationale: Hebrew idiom 'call her name X' is retained in lightly naturalized English
    because the naming formula is central to the verse.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - but
  lexicon: HALOT
  rationale: Introduces the reason for the renaming. 'For' fits the explanatory force
    and keeps the elevated but readable style.
- source_word: שָׂרָה שְׁמָהּ
  chosen: Sarah is her name
  alternatives:
  - her name shall be Sarah
  - her name is Sarah
  lexicon: HALOT
  rationale: The verbless clause states the new name. 'Sarah is her name' preserves
    the Hebrew emphasis and the formal naming declaration. 'Her name shall be Sarah'
    is possible in English but adds a future nuance not explicit in the Hebrew clause.
