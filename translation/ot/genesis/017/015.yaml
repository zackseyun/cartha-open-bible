theological_decisions:
- issue: Rendering the renaming formula
  chosen_reading: 'A direct naming declaration: ''you shall not call her name Sarai,
    for Sarah is her name.'''
  alternative_readings:
  - '''you shall no longer call her Sarai; her name shall be Sarah'''
  rationale: The Hebrew presents both prohibition and declaration in a formal naming
    formula. The chosen rendering preserves the covenantal solemnity and the lexical
    repetition of 'name' without importing 'no longer' or an explicit future auxiliary
    not present in the text.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text
    sense over translation tradition where possible.'
