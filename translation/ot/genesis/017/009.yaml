id: GEN.17.9
reference: Genesis 17:9
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֱלֹהִים֙ אֶל אַבְרָהָ֔ם וְ/אַתָּ֖ה אֶת בְּרִיתִ֣/י תִשְׁמֹ֑ר
    אַתָּ֛ה וְ/זַרְעֲ/ךָ֥ אַֽחֲרֶ֖י/ךָ לְ/דֹרֹתָֽ/ם־־׃
translation:
  text: And God said to Abraham, “As for you, you shall keep my covenant—you and your
    offspring after you throughout their generations.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “your seed,” a more literal rendering of the singular collective Hebrew
      term.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' is a natural,
    sufficiently formal rendering in English narrative style.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In this context the referent is the God speaking in covenant with Abraham;
    'God' is the standard direct rendering.
- source_word: אֶל אַבְרָהָם
  chosen: to Abraham
  alternatives:
  - to Abram
  lexicon: HALOT
  rationale: The Hebrew text here reads 'Abraham,' reflecting the renamed patriarch
    in the immediate context; the preposition אֶל is straightforwardly 'to.'
- source_word: וְאַתָּה
  chosen: As for you
  alternatives:
  - And you
  - But you
  lexicon: HALOT
  rationale: The fronted pronoun is emphatic and marks a shift to Abraham's obligation
    in response to God's covenant promises. 'As for you' captures the discourse emphasis
    better than a bare 'and you.'
- source_word: אֶת־בְּרִיתִי
  chosen: my covenant
  lexicon: HALOT
  rationale: Direct object marker plus noun with 1cs suffix; 'my covenant' is the
    plain sense and preserves the covenantal terminology central to the passage.
- source_word: תִשְׁמֹר
  chosen: you shall keep
  alternatives:
  - you must keep
  - you are to keep
  - you shall guard
  lexicon: HALOT
  rationale: שׁמר commonly means 'keep, guard, observe.' In covenant context, 'keep'
    is the most idiomatic and preserves the obligation without over-paraphrasing.
    'Shall' fits the covenantal directive well.
- source_word: אַתָּה וְזַרְעֲךָ
  chosen: you and your offspring
  alternatives:
  - you and your seed
  - you and your descendants
  lexicon: HALOT
  rationale: זֶרַע is literally 'seed' but in English 'offspring' is the clearest
    modern collective rendering here. It preserves the singular collective force better
    than the more distributive 'descendants.' The repeated pronoun אַתָּה is retained
    in sense by the explicit phrase 'you and your offspring.'
- source_word: אַחֲרֶיךָ
  chosen: after you
  alternatives:
  - following you
  lexicon: HALOT
  rationale: The prepositional phrase indicates succession in lineage; 'after you'
    is the natural and sufficiently formal rendering.
- source_word: לְדֹרֹתָם
  chosen: throughout their generations
  alternatives:
  - for their generations
  - through their generations
  lexicon: HALOT
  rationale: This idiom expresses ongoing continuity across successive generations.
    'Throughout their generations' is idiomatic English and conveys durative force.
