theological_decisions:
- issue: Rendering the covenant obligation without importing extra legal or sacramental
    nuance
  chosen_reading: you shall keep my covenant
  alternative_readings:
  - you must keep my covenant
  - you shall observe my covenant
  rationale: The verse states Abraham's and his offspring's obligation in relation
    to God's covenant. 'Keep' preserves the covenantal language and avoids adding
    interpretive weight beyond the Hebrew. No denominationally distinctive nuance
    is introduced.
  doctrine_reference: Translation philosophy §§1, 5
