id: GEN.10.26
reference: Genesis 10:26
source:
  edition: WLC
  text: וְ/יָקְטָ֣ן יָלַ֔ד אֶת אַלְמוֹדָ֖ד וְ/אֶת שָׁ֑לֶף וְ/אֶת חֲצַרְמָ֖וֶת וְ/אֶת יָֽרַח־־־־׃
translation:
  text: Joktan fathered Almodad[a], Sheleph, Hazarmaveth, and Jerah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and Joktan fathered Almodad and Sheleph and Hazarmaveth and Jerah.'' The repeated ''and'' before each name is stylistically smoothed in English.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָקְטָן
  chosen: Joktan
  alternatives:
  - Yoktan
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated per project philosophy. 'Joktan' follows standard English convention for יקטן.
- source_word: יָלַד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: In genealogical contexts ילד commonly denotes male procreation/lineage. 'Fathered' is natural modern English and preserves the genealogical force better than archaic 'begot'.
- source_word: אֶת
  chosen: '[not translated separately]'
  lexicon: HALOT
  rationale: Direct-object marker with no standalone English equivalent; its function is represented by English word order.
- source_word: אַלְמוֹדָד
  chosen: Almodad
  lexicon: HALOT
  rationale: Proper name; transliterated by standard English convention.
- source_word: שָׁלֶף
  chosen: Sheleph
  alternatives:
  - Shelaph
  lexicon: HALOT
  rationale: Proper name; transliterated. 'Sheleph' reflects a common English rendering of the consonantal form.
- source_word: חֲצַרְמָוֶת
  chosen: Hazarmaveth
  alternatives:
  - Hazarmaveth
  lexicon: HALOT
  rationale: Proper name; transliterated. The initial ח is represented with 'H' in standard English transliteration. The form 'Hazarmaveth' is a conventional English spelling.
- source_word: יָרַח
  chosen: Jerah
  alternatives:
  - Yerah
  lexicon: HALOT
  rationale: Proper name; transliterated according to standard English convention using initial 'J' for yod-based name forms in traditional biblical English.
