id: GEN.11.11
reference: Genesis 11:11
source:
  edition: WLC
  text: וַֽ/יְחִי שֵׁ֗ם אַֽחֲרֵי֙ הוֹלִיד֣/וֹ אֶת אַרְפַּכְשָׁ֔ד חֲמֵ֥שׁ מֵא֖וֹת שָׁנָ֑ה
    וַ/יּ֥וֹלֶד בָּנִ֖ים וּ/בָנֽוֹת־־׃ס
translation:
  text: And Shem lived five hundred years after he fathered Arpachshad, and he fathered
    sons and daughters.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - lived on
  lexicon: HALOT
  rationale: The wayyiqtol of חיה in genealogical narrative is most naturally rendered
    'lived,' indicating continued lifespan over a stated period.
- source_word: שֵׁם
  chosen: Shem
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: אֲחֲרֵי
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: Temporal preposition marking the period subsequent to the birth of Arpachshad.
- source_word: הוֹלִידוֹ
  chosen: he fathered
  alternatives:
  - he begot
  - his fathering of
  lexicon: HALOT
  rationale: Hiphil of ילד with a masculine subject in genealogies denotes begetting/fathering.
    'Fathered' is clear modern English and avoids archaic 'begot' while preserving
    the male parental role.
- source_word: אֶת אַרְפַּכְשָׁד
  chosen: Arpachshad
  rationale: Direct-object marker is not translated; the personal name is transliterated
    in standard English form.
- source_word: חֲמֵשׁ מֵאוֹת שָׁנָה
  chosen: five hundred years
  lexicon: HALOT
  rationale: Standard cardinal-number expression for duration of life.
- source_word: וַיּוֹלֶד
  chosen: and he fathered
  alternatives:
  - and he begot
  - and he had
  lexicon: HALOT
  rationale: Repeated genealogical verb ילד should be rendered consistently. 'Fathered'
    preserves the generative sense better than the broader 'had.'
- source_word: בָּנִים וּבָנוֹת
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly specifies both male and female offspring; 'sons
    and daughters' is more accurate than the generic 'children'.
