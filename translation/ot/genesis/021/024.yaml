id: GEN.21.24
reference: Genesis 21:24
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ אַבְרָהָ֔ם אָנֹכִ֖י אִשָּׁבֵֽעַ׃
translation:
  text: And Abraham said, “I swear it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I swear,” or “I will take an oath.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive with אמר advances the narrative. 'And ... said' is
    a natural, sufficiently formal rendering that preserves the simple narrative sequence
    without overinterpreting discourse nuance.
- source_word: אַבְרָהָם
  chosen: Abraham
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: The independent pronoun adds explicitness/emphasis before the verb. In
    English, the subject is already carried by 'I will swear'; rendering it simply
    as 'I' preserves the sense without awkward overemphasis. The stronger nuance 'I
    myself' is possible but unnecessary in this context.
- source_word: אִשָּׁבֵעַ
  chosen: will swear
  alternatives:
  - swear
  - take an oath
  lexicon: HALOT
  rationale: Nifal of שבע means 'to swear, take an oath.' Because the Hebrew imperfect
    here functions as a volitional/future response to Abimelech's request, 'will swear'
    is the most natural English rendering. 'Take an oath' is a valid lexical alternative
    but less direct; bare 'swear' is possible but sounds less idiomatic in this reply.
