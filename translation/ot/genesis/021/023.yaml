  text: וְ/עַתָּ֗ה הִשָּׁ֨בְעָ/ה לִּ֤/י בֵֽ/אלֹהִים֙ הֵ֔נָּה אִם תִּשְׁקֹ֣ר לִ֔/י וּ/לְ/נִינִ֖/י וּ/לְ/נֶכְדִּ֑/י כַּ/חֶ֜סֶד אֲשֶׁר עָשִׂ֤יתִי עִמְּ/ךָ֙ תַּעֲשֶׂ֣ה עִמָּדִ֔/י וְ/עִם הָ/אָ֖רֶץ אֲשֶׁר גַּ֥רְתָּה בָּֽ/הּ־־־־׃
translation:
  text: 'Now swear to me here by God that you will not deal falsely with me, or with my children, or with my descendants. According to the kindness that I have shown to you, you shall show to me and to the land where you have lived as a foreigner.'
