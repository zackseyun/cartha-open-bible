id: GEN.7.14
reference: Genesis 7:14
source:
  edition: WLC
  text: הֵ֜מָּה וְ/כָל הַֽ/חַיָּ֣ה לְ/מִינָ֗/הּ וְ/כָל הַ/בְּהֵמָה֙ לְ/מִינָ֔/הּ וְ/כָל הָ/רֶ֛מֶשׂ הָ/רֹמֵ֥שׂ עַל הָ/אָ֖רֶץ לְ/מִינֵ֑/הוּ וְ/כָל הָ/ע֣וֹף לְ/מִינֵ֔/הוּ כֹּ֖ל צִפּ֥וֹר כָּל כָּנָֽף־־־־־־׃
translation:
  text: they[a], and every wild animal according to its kind, and every livestock animal according to its kind, and every creeping thing that creeps on the earth according to its kind[b], and every bird according to its kind—every winged bird.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'every bird, every wing.' The Hebrew uses appositional classification language to emphasize all winged birds.
    reason: lexical_alternative
  - marker: b
    text: Or 'livestock animal'.
    reason: previous_rendering
lexical_decisions:
- source_word: הֵמָּה
  chosen: they
  alternatives:
  - these
  lexicon: HALOT
  rationale: Third person masculine plural pronoun referring back to Noah and those with him entering the ark. 'They' is the natural English rendering in context.
- source_word: הַחַיָּה
  chosen: wild animal
  alternatives:
  - beast
  - living creature
  - animal
  lexicon: HALOT
  rationale: In Genesis animal classifications, חַיָּה commonly refers to wild land animals as distinct from בְּהֵמָה ('livestock/domestic animals'). 'Wild animal' preserves that distinction better than the broader 'animal' or traditional 'beast.'
- source_word: לְמִינָהּ
  chosen: according to its kind
  alternatives:
  - by its kind
  - after its kind
  lexicon: HALOT
  rationale: Standard rendering of מִין in Genesis classification contexts. 'According to its kind' is clear modern English while remaining close to the Hebrew.
- source_word: הַבְּהֵמָה
  chosen: livestock animal
  alternatives:
  - cattle
  - domestic animal
  - beast
  lexicon: HALOT
  rationale: בְּהֵמָה contrasts with חַיָּה and denotes domesticated quadrupeds/livestock. 'Livestock animal' keeps the classificatory distinction without narrowing too much to bovines, as 'cattle' might.
- source_word: הָרֶמֶשׂ
  chosen: creeping thing
  alternatives:
  - swarming thing
  - moving thing
  lexicon: HALOT
  rationale: Traditional but still intelligible rendering for small ground-creatures. It fits the following participle הָרֹמֵשׂ and preserves the Genesis taxonomy.
- source_word: הָרֹמֵשׂ עַל הָאָרֶץ
  chosen: that creeps on the earth
  alternatives:
  - that moves on the earth
  - that swarms on the earth
  - that crawls on the earth
  lexicon: HALOT
  rationale: The participle echoes the noun רֶמֶשׂ. 'That creeps on the earth' preserves the wordplay and the sense of ground-moving creatures.
- source_word: הָעוֹף
  chosen: bird
  alternatives:
  - flying creature
  - fowl
  lexicon: HALOT
  rationale: Though עוֹף can denote flying creatures broadly, in this verse the following apposition clarifies avian reference. 'Bird' is the most natural English rendering here.
- source_word: כֹּל צִפּוֹר
  chosen: every bird
  alternatives:
  - every flying creature
  lexicon: HALOT
  rationale: צִפּוֹר specifically denotes bird. Rendering it 'every bird' preserves the appositional emphasis after הָעוֹף.
- source_word: כָּל כָּנָף
  chosen: every winged creature
  alternatives:
  - everything with wings
  - every wing
  lexicon: HALOT
  rationale: Literally 'every wing,' an idiom for winged creatures. In English, 'every winged creature' conveys the sense clearly. The order is adjusted slightly for readability while preserving the appositional force.
