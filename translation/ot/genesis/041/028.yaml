id: GEN.41.28
reference: Genesis 41:28
source:
  edition: WLC
  text: ה֣וּא הַ/דָּבָ֔ר אֲשֶׁ֥ר דִּבַּ֖רְתִּי אֶל פַּרְעֹ֑ה אֲשֶׁ֧ר הָ/אֱלֹהִ֛ים עֹשֶׂ֖ה הֶרְאָ֥ה אֶת פַּרְעֹֽה־־׃
translation:
  text: 'This is the matter that I spoke to Pharaoh: what God is doing he has shown to Pharaoh[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'what God is doing.' The Hebrew participle can denote present or imminent action; in this context of dream interpretation, 'is about to do' best conveys the sense of coming events.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוּא
  chosen: This is
  alternatives:
  - It is
  lexicon: HALOT
  rationale: 'Uses the independent pronoun with the following noun phrase idiomatically in English as an identificational statement: ''This is the matter...'' rather than the more wooden ''It is the matter.'''
- source_word: הַדָּבָר
  chosen: the matter
  alternatives:
  - the thing
  - the word
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'thing,' or 'matter.' In this explanatory context, Joseph is referring to the content/meaning of the dream, so 'matter' best captures the sense without sounding awkward.
- source_word: אֲשֶׁר דִּבַּרְתִּי
  chosen: that I spoke
  alternatives:
  - that I said
  - which I spoke
  lexicon: HALOT
  rationale: A straightforward relative clause. 'Spoke' preserves the verbal force of דבר, while remaining natural in English.
- source_word: אֶל פַּרְעֹה
  chosen: to Pharaoh
  alternatives:
  - to Par‘oh
  lexicon: HALOT
  rationale: Standard English prepositional rendering with conventional transliteration of the proper name.
- source_word: אֲשֶׁר
  chosen: what
  alternatives:
  - that which
  - that
  lexicon: HALOT
  rationale: The second relative introduces the content of what follows; 'what God is about to do' is idiomatic English and accurately conveys the clause's sense.
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: Although the Hebrew has the article, הָאֱלֹהִים commonly functions as a reference to the true God and is best rendered simply 'God' in English here.
- source_word: עֹשֶׂה
  chosen: is about to do
  alternatives:
  - is doing
  - does
  lexicon: HALOT
  rationale: The participle with the following perfect of ראה in this context points to imminent divine action being disclosed through the dream. 'Is about to do' best fits Joseph's interpretation of coming events.
- source_word: הֶרְאָה
  chosen: he has shown
  alternatives:
  - he showed
  - he caused to see
  lexicon: HALOT
  rationale: 'Hiphil of ראה means ''show, cause to see.'' English perfect ''has shown'' fits the present explanatory force: God has revealed to Pharaoh in advance what he is about to do.'
- source_word: אֶת פַּרְעֹה
  chosen: to Pharaoh
  alternatives:
  - Pharaoh
  lexicon: HALOT
  rationale: With הראה, the construction means showing something to someone. English requires the indirect object 'to Pharaoh' for clarity and naturalness.
