id: GEN.1.24
reference: Genesis 1:24
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֱלֹהִ֗ים תּוֹצֵ֨א הָ/אָ֜רֶץ נֶ֤פֶשׁ חַיָּה֙ לְ/מִינָ֔/הּ בְּהֵמָ֥ה
    וָ/רֶ֛מֶשׂ וְ/חַֽיְתוֹ אֶ֖רֶץ לְ/מִינָ֑/הּ וַֽ/יְהִי כֵֽן־־׃
translation:
  text: 'And God said, “Let the earth bring forth living creatures according to their
    kinds: livestock, creeping things, and wild animals of the earth according to
    their kinds.” And it was so.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “living beings”; literally “a living nephesh/soul.”
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹצֵא
  chosen: Let ... bring forth
  alternatives:
  - bring out
  - produce
  lexicon: HALOT
  rationale: Hiphil jussive 3fs of יצא with הָאָרֶץ as subject expresses a divine
    command for the earth to cause living creatures to come forth. 'Let the earth
    bring forth' is idiomatic English and preserves the causative nuance better than
    a flat 'the earth produced'.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In the creation context, אֶרֶץ refers broadly to the earth/land as the
    terrestrial realm. 'The earth' best matches the cosmic scope of Genesis 1.
- source_word: נֶפֶשׁ חַיָּה
  chosen: living creatures
  alternatives:
  - living being
  - living soul
  lexicon: HALOT
  rationale: The phrase denotes animate life. 'Living creatures' is natural modern
    English and fits the plural sense required by the following categories, while
    avoiding the misleadingly anthropological connotations of 'living soul' in contemporary
    English.
- source_word: לְמִינָהּ
  chosen: according to their kinds
  alternatives:
  - according to its kind
  - by their kinds
  lexicon: HALOT
  rationale: Though morphologically singular with a feminine suffix agreeing with
    collective expressions, the sense in English is distributive across the animals
    named. 'According to their kinds' communicates the collective/distributive force
    naturally.
- source_word: בְּהֵמָה
  chosen: livestock
  alternatives:
  - cattle
  - beasts
  lexicon: HALOT
  rationale: בְּהֵמָה here refers to larger land animals, especially domesticated
    or tame quadrupeds as a class. 'Livestock' is clearer and more contemporary than
    'cattle,' which can sound narrower in modern English.
- source_word: רֶמֶשׂ
  chosen: creeping things
  alternatives:
  - creatures that move along the ground
  - swarming things
  lexicon: HALOT
  rationale: The term covers small ground-moving creatures. 'Creeping things' preserves
    the traditional semantic range without over-specifying species.
- source_word: חַיְתוֹ אֶרֶץ
  chosen: wild animals of the earth
  alternatives:
  - beasts of the earth
  - living things of the earth
  lexicon: HALOT
  rationale: This construct phrase distinguishes undomesticated land animals from
    בְּהֵמָה. 'Wild animals of the earth' makes the contrast explicit in clear modern
    English.
- source_word: וַיְהִי כֵן
  chosen: And it was so
  alternatives:
  - and so it happened
  - and it came to be so
  lexicon: HALOT
  rationale: This is the standard fulfillment formula in Genesis 1. 'And it was so'
    is concise, accurate, and preserves the solemn cadence of the passage.
