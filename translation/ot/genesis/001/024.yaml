theological_decisions:
- issue: Whether to render נֶפֶשׁ with theologically loaded language
  chosen_reading: living creatures
  alternative_readings:
  - living souls
  - living beings
  rationale: The Hebrew phrase in this context refers to animate creatures generally,
    not to a distinct doctrinal statement about the metaphysical constitution of animals.
    'Living creatures' preserves the sense without importing later theological debates
    tied to 'soul.'
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
