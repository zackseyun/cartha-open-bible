id: GEN.1.11
reference: Genesis 1:11
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֱלֹהִ֗ים תַּֽדְשֵׁ֤א הָ/אָ֨רֶץ֙ דֶּ֔שֶׁא עֵ֚שֶׂב מַזְרִ֣יעַ זֶ֔רַע
    עֵ֣ץ פְּרִ֞י עֹ֤שֶׂה פְּרִי֙ לְ/מִינ֔/וֹ אֲשֶׁ֥ר זַרְע/וֹ ב֖/וֹ עַל הָ/אָ֑רֶץ
    וַֽ/יְהִי כֵֽן־־־׃
translation:
  text: 'And God said, “Let the earth sprout vegetation: plants yielding seed, and
    fruit trees bearing fruit according to their kinds, with their seed in them, on
    the earth.” And it was so.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Let the earth bring forth vegetation.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “according to its kind”; the singular is used distributively for
      the various classes.
    reason: lexical_alternative
  - marker: c
    text: Or “whose seed is in it.”
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּדְשֵׁא
  chosen: Let the earth sprout
  alternatives:
  - Let the earth bring forth
  - Let the earth cause to sprout
  lexicon: HALOT
  rationale: Hiphil jussive of דשא expresses a causative/jussive sense directed to
    the earth. 'Sprout' is natural modern English and preserves the imagery of vegetation
    emerging, while 'Let the earth' reflects the jussive force.
- source_word: דֶּשֶׁא
  chosen: vegetation
  alternatives:
  - green growth
  - grass
  lexicon: HALOT
  rationale: A broad term for fresh plant growth. 'Vegetation' best captures the collective
    sense without narrowing it to 'grass,' which would be too specific in this context.
- source_word: עֵשֶׂב
  chosen: plants
  alternatives:
  - herbage
  - herbs
  - vegetation
  lexicon: HALOT
  rationale: Refers to herbaceous plants. 'Plants' is clear modern English and avoids
    the misleadingly culinary sense of 'herbs' or the archaic 'herbage.'
- source_word: מַזְרִיעַ זֶרַע
  chosen: yielding seed
  alternatives:
  - seeding seed
  - producing seed
  - bearing seed
  lexicon: HALOT
  rationale: The participle plus object emphasizes the ongoing characteristic of producing
    seed. 'Yielding seed' is idiomatic and concise in English.
- source_word: עֵץ פְּרִי
  chosen: fruit trees
  alternatives:
  - fruit tree
  - trees of fruit
  lexicon: HALOT
  rationale: Construct phrase meaning trees characterized by fruit. English naturally
    renders the class collectively as 'fruit trees.'
- source_word: עֹשֶׂה פְּרִי
  chosen: bearing fruit
  alternatives:
  - making fruit
  - producing fruit
  lexicon: HALOT
  rationale: The participle describes the characteristic action of the fruit tree.
    'Bearing fruit' is the most natural English equivalent and preserves the agricultural
    sense.
- source_word: לְמִינוֹ
  chosen: according to their kinds
  alternatives:
  - according to its kind
  - by their kinds
  lexicon: HALOT
  rationale: Though morphologically singular with distributive force, the phrase applies
    collectively to the classes just named. 'According to their kinds' is idiomatic
    English and preserves the categorizing sense.
- source_word: אֲשֶׁר זַרְעוֹ בוֹ
  chosen: with their seed in them
  alternatives:
  - whose seed is in it
  - that has its seed in it
  lexicon: HALOT
  rationale: The relative clause describes the reproductive capacity inherent in the
    plants/trees. A plural rendering in English matches the collective antecedents
    and reads naturally while preserving the sense of seed contained within each kind.
- source_word: עַל הָאָרֶץ
  chosen: on the earth
  alternatives:
  - upon the earth
  - over the earth
  lexicon: HALOT
  rationale: Straightforward locative phrase. 'On the earth' is natural modern English
    and fits the creation setting.
- source_word: וַיְהִי כֵן
  chosen: And it was so
  alternatives:
  - And so it was
  - And it happened so
  lexicon: HALOT
  rationale: A standard fulfillment formula in Genesis 1. 'And it was so' is both
    accurate and idiomatic, preserving the solemn cadence of the narrative.
