theological_decisions:
- issue: Scope and nuance of created plant categories
  chosen_reading: Render the Hebrew categories as broad classes of vegetation without
    importing later scientific taxonomy or narrowing them to specific modern botanical
    categories.
  alternative_readings:
  - Translate more formally as 'grass, herb yielding seed, fruit tree'
  - Translate more dynamically as a generalized 'all kinds of plants and trees'
  rationale: The verse presents ordered categories of plant life in phenomenological
    language. The translation preserves the text's own distinctions while avoiding
    anachronistic scientific precision or flattening the categories into a paraphrase.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
