id: GEN.1.19
reference: Genesis 1:19
source:
  edition: WLC
  text: וַֽ/יְהִי עֶ֥רֶב וַֽ/יְהִי בֹ֖קֶר י֥וֹם רְבִיעִֽי־־׃פ
translation:
  text: And there was evening, and there was morning—the fourth day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And there was evening and there was morning, a fourth
      day.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: and there was
  alternatives:
  - and it was
  - and it became
  lexicon: HALOT
  rationale: The wayyiqtol of היה here functions in the recurring narrative formula
    marking the completion of a day. 'And there was' is idiomatic in English and preserves
    the existential sense without overinterpreting it as 'became.'
- source_word: עֶרֶב
  chosen: evening
  alternatives:
  - nightfall
  lexicon: HALOT
  rationale: The noun denotes evening. 'Evening' is the standard, natural English
    equivalent and fits the repeated creation-day refrain.
- source_word: וַיְהִי
  chosen: and there was
  alternatives:
  - and it was
  - and it became
  lexicon: HALOT
  rationale: Repeated verb in the formula; rendered consistently with the first occurrence
    to preserve the cadence and structure of the Hebrew.
- source_word: בֹּקֶר
  chosen: morning
  alternatives:
  - daybreak
  lexicon: HALOT
  rationale: The noun denotes morning. 'Morning' is the most direct and idiomatic
    rendering in this refrain.
- source_word: יוֹם רְבִיעִי
  chosen: the fourth day
  alternatives:
  - day four
  - a fourth day
  lexicon: HALOT
  rationale: The Hebrew construction identifies the day by ordinal number. English
    idiom strongly prefers 'the fourth day.' The article is supplied naturally in
    English though not separately expressed in Hebrew.
