theological_decisions:
- issue: Rendering the creation-day refrain without importing a specific chronology
    or age-of-earth interpretation
  chosen_reading: And there was evening, and there was morning—the fourth day.
  alternative_readings:
  - And there was evening and there was morning, a fourth day
  rationale: The translation preserves the Hebrew refrain in straightforward terms
    and does not attempt to resolve broader interpretive debates about the nature
    or duration of the creation days. 'The fourth day' is chosen for clear English
    idiom while retaining the ordinal identification of the day.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
