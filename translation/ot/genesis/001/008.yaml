id: GEN.1.8
reference: Genesis 1:8
source:
  edition: WLC
  text: וַ/יִּקְרָ֧א אֱלֹהִ֛ים לָֽ/רָקִ֖יעַ שָׁמָ֑יִם וַֽ/יְהִי עֶ֥רֶב וַֽ/יְהִי בֹ֖קֶר י֥וֹם שֵׁנִֽי־־׃פ
translation:
  text: And God called the expanse Heaven[a]. And there was evening[b], and there was morning—the second day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sky' or 'the heavens.' The Hebrew name שָׁמַיִם can refer to the sky/heavens; here it is the name God gives to the expanse.
    reason: lexical_alternative
  - marker: b
    text: Or 'firmament' (traditional) or 'dome.' The Hebrew רָקִיעַ refers to something spread out; 'expanse' is used here as a balanced rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - named
  lexicon: HALOT
  rationale: The verb קרא with ל marks naming/designating. 'Called' is standard and natural English here, while still allowing the naming sense.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In Genesis 1 this plural form takes singular verbal agreement and refers to the one Creator; 'God' is the straightforward English rendering.
- source_word: לָרָקִיעַ
  chosen: the expanse
  alternatives:
  - the firmament
  - the dome
  lexicon: HALOT
  rationale: 'רָקִיעַ denotes something spread out or extended. ''Expanse'' best fits optimal equivalence: more transparent than the archaic ''firmament'' and less interpretively loaded than ''dome.'''
- source_word: שָׁמָיִם
  chosen: Heaven
  alternatives:
  - sky
  - the heavens
  lexicon: HALOT
  rationale: Here שָׁמַיִם is the name God gives to the רָקִיעַ. 'Heaven' preserves the naming force and the elevated register of the creation account. 'Sky' is possible but flatter; 'the heavens' is less suitable as a proper name in this clause.
- source_word: וַיְהִי
  chosen: there was
  alternatives:
  - and it was
  - and there came to be
  lexicon: HALOT
  rationale: In the recurring day formula, 'there was' is idiomatic English and preserves the narrative sequence without awkwardness.
- source_word: עֶרֶב
  chosen: evening
  alternatives:
  - nightfall
  lexicon: HALOT
  rationale: Standard rendering in the repeated creation-day refrain.
- source_word: בֹקֶר
  chosen: morning
  alternatives:
  - daybreak
  lexicon: HALOT
  rationale: Standard rendering in the repeated creation-day refrain.
- source_word: יוֹם שֵׁנִי
  chosen: the second day
  alternatives:
  - day two
  - a second day
  lexicon: HALOT
  rationale: English idiom favors 'the second day.' Although Hebrew lacks the article on שֵׁנִי, the phrase functions as ordinal labeling in the sequence of days.
