- issue: Rendering שָׁמַיִם as the name given to the רָקִיעַ
  chosen_reading: Heaven
  alternative_readings:
  - sky
  - the heavens
  rationale: The verse reports God's naming of the expanse. 'Heaven' preserves the literary and theological register of Genesis 1 without forcing a later cosmological scheme. Alternatives are possible and worth preserving because English readers may hear 'Heaven' as God's dwelling place rather than the visible sky.
