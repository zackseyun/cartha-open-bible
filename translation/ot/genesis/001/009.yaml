id: GEN.1.9
reference: Genesis 1:9
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֱלֹהִ֗ים יִקָּו֨וּ הַ/מַּ֜יִם מִ/תַּ֤חַת הַ/שָּׁמַ֨יִם֙ אֶל מָק֣וֹם אֶחָ֔ד וְ/תֵרָאֶ֖ה הַ/יַּבָּשָׁ֑ה וַֽ/יְהִי כֵֽן־־׃
translation:
  text: And God said[a], “Let the waters under the heavens be gathered into one place, and let the dry land appear.” And it was so.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under the sky.' Hebrew שָׁמַיִם can refer to the sky or the heavens, depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' preserves the Hebrew narrative flow without overinterpreting temporal sequence.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In Genesis 1 this noun with singular verbal agreement refers to the one Creator God; 'God' is the standard and contextually correct English rendering.
- source_word: יִקָּווּ
  chosen: Let ... be gathered
  alternatives:
  - Let ... collect
  - Let ... be collected together
  lexicon: HALOT
  rationale: The jussive expresses divine command/will. 'Be gathered' captures the passive/resultative sense in context and is idiomatic in English.
- source_word: הַמַּיִם
  chosen: the waters
  alternatives:
  - the water
  lexicon: HALOT
  rationale: Hebrew uses a plural form; 'the waters' preserves the form and matches the elevated style of the creation account.
- source_word: מִתַּחַת הַשָּׁמַיִם
  chosen: under the heavens
  alternatives:
  - from under the heavens
  - under the sky
  lexicon: HALOT
  rationale: The phrase denotes the waters located beneath the heavens/sky expanse. 'Under the heavens' is more formally aligned with שָׁמַיִם and preserves the cosmological diction of the passage. The prefixed מִן is retained implicitly through the English construction describing the waters' location.
- source_word: אֶל מָקוֹם אֶחָד
  chosen: into one place
  alternatives:
  - to one place
  lexicon: HALOT
  rationale: '''Into one place'' best conveys movement toward consolidation. ''One'' is retained explicitly from אֶחָד.'
- source_word: וְתֵרָאֶה
  chosen: and let ... appear
  alternatives:
  - so that ... may appear
  - and let ... be seen
  lexicon: HALOT
  rationale: The Niphal jussive continues the sequence of divine commands. 'Appear' is the most natural English equivalent for the visible emergence of what had been covered.
- source_word: הַיַּבָּשָׁה
  chosen: the dry land
  alternatives:
  - the dry ground
  - the dry part
  lexicon: HALOT
  rationale: This refers to the exposed dry ground as distinct from the gathered waters. 'Dry land' is idiomatic and fits the immediate context, especially in anticipation of v.10.
- source_word: וַיְהִי כֵן
  chosen: And it was so
  alternatives:
  - And so it was
  - And it happened so
  lexicon: HALOT
  rationale: This recurring Genesis 1 formula marks the fulfillment of God's command. 'And it was so' is both accurate and stylistically consistent with the chapter's refrain.
