- issue: Cosmological term שָׁמַיִם in the creation account
  chosen_reading: heavens
  alternative_readings:
  - sky
  rationale: The Hebrew term can denote 'sky' or 'heavens' depending on context. In Genesis 1, the elevated register and repeated use across the creation narrative favor 'heavens' here, while not importing a detailed cosmology beyond the text itself.
