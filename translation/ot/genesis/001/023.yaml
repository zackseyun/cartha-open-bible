id: GEN.1.23
reference: Genesis 1:23
source:
  edition: WLC
  text: וַֽ/יְהִי עֶ֥רֶב וַֽ/יְהִי בֹ֖קֶר י֥וֹם חֲמִישִֽׁי־־׃פ
translation:
  text: And there was evening, and there was morning—the fifth day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'And it was evening, and it was morning—the fifth day.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: and there was
  alternatives:
  - and it was
  - and it came to be
  lexicon: HALOT
  rationale: The waw-consecutive form of היה here functions as the standard narrative
    formula. 'And there was' is idiomatic in English and preserves the repetitive
    cadence of the creation account better than the more wooden 'and it came to be.'
- source_word: עֶרֶב
  chosen: evening
  alternatives:
  - nightfall
  lexicon: HALOT
  rationale: The noun denotes evening. 'Evening' is the standard, natural English
    equivalent and matches the recurring formula in Genesis 1.
- source_word: בֹּקֶר
  chosen: morning
  alternatives:
  - daybreak
  lexicon: HALOT
  rationale: The noun denotes morning. 'Morning' is the straightforward gloss and
    preserves the parallelism with 'evening.'
- source_word: יוֹם
  chosen: day
  lexicon: HALOT
  rationale: Here יוֹם labels the numbered creation day. 'Day' is the direct lexical
    equivalent and should be retained without importing a more specific interpretive
    sense.
- source_word: חֲמִישִׁי
  chosen: fifth
  lexicon: HALOT
  rationale: The ordinal adjective modifies 'day.' 'Fifth' is the exact English ordinal.
