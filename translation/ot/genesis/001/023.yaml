theological_decisions:
- issue: Nature of the creation-day formula
  chosen_reading: Retain the literal temporal refrain 'And there was evening, and
    there was morning—the fifth day' without interpreting the length or nature of
    the day.
  alternative_readings:
  - Render more interpretively to suggest a 24-hour day
  - Render more interpretively to suggest an age or epoch
  rationale: The Hebrew text gives the recurring evening-morning formula and ordinal
    day designation but does not itself settle later doctrinal debates about the duration
    or literary nature of the creation days. Per translation philosophy, the rendering
    preserves the textual wording and theological tension rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
