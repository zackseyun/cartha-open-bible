theological_decisions:
- issue: Rendering רָקִיעַ in relation to ancient cosmology
  chosen_reading: expanse
  alternative_readings:
  - firmament
  - vault
  - dome
  rationale: The verse describes God creating a separator amid the waters. 'Expanse'
    best fits optimal equivalence by preserving the Hebrew image of something spread
    out while avoiding unnecessary commitment in the main text to a specific cosmological
    reconstruction. More concrete alternatives are possible and worth preserving in
    a footnote because the term is debated.
  doctrine_reference: Translation philosophy §§1, 3, 6
