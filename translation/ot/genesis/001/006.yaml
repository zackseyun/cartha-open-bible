id: GEN.1.6
reference: Genesis 1:6
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֱלֹהִ֔ים יְהִ֥י רָקִ֖יעַ בְּ/ת֣וֹךְ הַ/מָּ֑יִם וִ/יהִ֣י מַבְדִּ֔יל
    בֵּ֥ין מַ֖יִם לָ/מָֽיִם׃
translation:
  text: And God said, “Let there be an expanse in the midst of the waters, and let
    it separate water from water.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “firmament,” “vault,” or “dome.” The Hebrew רָקִיעַ refers to something
      spread out; English renderings differ based on how explicitly they reflect the
      ancient cosmological picture.
    reason: lexical_alternative
  - marker: b
    text: Literally, “separating between waters and waters,” that is, distinguishing
      one body of water from another.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And God said' preserves
    the Hebrew narrative flow without overinterpreting temporal sequence.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In Genesis 1 this plural-form noun takes singular verbal agreement and
    refers to the one Creator; standard English rendering is 'God.'
- source_word: יְהִי
  chosen: Let there be
  alternatives:
  - May there be
  lexicon: HALOT
  rationale: Jussive of היה expressing divine fiat. 'Let there be' is idiomatic, formal
    enough, and matches the performative force of the Hebrew.
- source_word: רָקִיעַ
  chosen: expanse
  alternatives:
  - firmament
  - vault
  - dome
  lexicon: HALOT
  rationale: רָקִיעַ denotes something spread out or extended. 'Expanse' preserves
    the idea of an extended space without importing a more specific ancient cosmological
    model into the main text. 'Firmament' is traditional but archaic; 'vault' or 'dome'
    are possible but more interpretive.
- source_word: בְּתוֹךְ
  chosen: in the midst of
  alternatives:
  - in the middle of
  - within
  lexicon: HALOT
  rationale: The phrase indicates position amid the waters. 'In the midst of' is a
    natural, slightly formal rendering that closely reflects the Hebrew.
- source_word: הַמָּיִם
  chosen: the waters
  alternatives:
  - the water
  lexicon: HALOT
  rationale: Hebrew מַיִם is morphologically plural and in this context refers to
    the primordial waters collectively. 'The waters' preserves the imagery and number.
- source_word: וִיהִי
  chosen: and let it
  alternatives:
  - and let there be
  - so that it may
  lexicon: HALOT
  rationale: Here the verb continues the jussive sense from the prior clause and introduces
    the function of the expanse. Rendering with explicit 'it' makes clear that the
    subject is the expanse implied from the previous clause.
- source_word: מַבְדִּיל
  chosen: separate
  alternatives:
  - divide
  - make a separation between
  lexicon: HALOT
  rationale: The Hiphil participle of בדל expresses causing separation. 'Separate'
    is clear modern English and fits the creation-order theme in Genesis 1.
- source_word: בֵּין מַיִם לָמָיִם
  chosen: water from water
  alternatives:
  - the waters from the waters
  lexicon: HALOT
  rationale: The Hebrew literally says 'between waters and waters/from waters.' English
    idiom favors 'water from water' after 'separate,' while still conveying two bodies
    of water distinguished by the expanse. The more literal 'the waters from the waters'
    is preserved as an alternative.
