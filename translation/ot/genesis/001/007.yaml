id: GEN.1.7
reference: Genesis 1:7
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ אֱלֹהִים֮ אֶת הָ/רָקִיעַ֒ וַ/יַּבְדֵּ֗ל בֵּ֤ין הַ/מַּ֨יִם֙ אֲשֶׁר֙
    מִ/תַּ֣חַת לָ/רָקִ֔יעַ וּ/בֵ֣ין הַ/מַּ֔יִם אֲשֶׁ֖ר מֵ/עַ֣ל לָ/רָקִ֑יעַ וַֽ/יְהִי
    כֵֽן־־׃
translation:
  text: So God made the expanse and separated the waters that were under the expanse
    from the waters that were above the expanse. And it was so.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''firmament'' (traditional); also possible: ''vault.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: made
  alternatives:
  - fashioned
  - formed
  lexicon: HALOT
  rationale: The verb עשה commonly means 'make/do.' 'Made' is the most natural and
    direct rendering in this creation context, without importing the more specialized
    nuance of 'formed.'
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In Genesis 1, אֱלֹהִים with singular verbal agreement refers to the one
    Creator God; 'God' is the standard and contextually correct English rendering.
- source_word: הָרָקִיעַ
  chosen: the expanse
  alternatives:
  - the firmament
  - the vault
  lexicon: HALOT
  rationale: רָקִיעַ denotes something spread out or extended. 'Expanse' preserves
    the spatial sense in readable modern English. 'Firmament' is traditional but archaic;
    'vault' is possible but more interpretive regarding cosmological shape.
- source_word: וַיַּבְדֵּל
  chosen: separated
  alternatives:
  - divided
  lexicon: HALOT
  rationale: בדל means to separate or divide. 'Separated' fits the repeated structuring
    theme of Genesis 1 and reads naturally in English.
- source_word: בֵּין ... וּבֵין
  chosen: from ...
  alternatives:
  - between ... and ...
  lexicon: HALOT
  rationale: The Hebrew construction marks distinction between two entities. In English,
    'separated X from Y' is the idiomatic equivalent of 'separated between X and Y'
    while preserving the sense.
- source_word: הַמַּיִם
  chosen: the waters
  alternatives:
  - the water
  lexicon: HALOT
  rationale: Though מים is morphologically plural in Hebrew, it often functions as
    a mass noun. 'The waters' best reflects the Hebrew form and the literary style
    of the passage.
- source_word: אֲשֶׁר מִתַּחַת לָרָקִיעַ
  chosen: that were under the expanse
  alternatives:
  - that were below the expanse
  lexicon: HALOT
  rationale: מִתַּחַת means 'from under/beneath.' 'Under the expanse' is a straightforward
    rendering that preserves the vertical spatial contrast with 'above.'
- source_word: אֲשֶׁר מֵעַל לָרָקִיעַ
  chosen: that were above the expanse
  alternatives:
  - that were over the expanse
  lexicon: HALOT
  rationale: מֵעַל means 'from above/over.' 'Above the expanse' is the clearest counterpart
    to 'under the expanse.'
- source_word: וַיְהִי כֵן
  chosen: And it was so
  alternatives:
  - and so it was
  - and it happened so
  lexicon: HALOT
  rationale: This is a recurring formula in Genesis 1 marking the fulfillment of God's
    decree. 'And it was so' is both accurate and idiomatic, and preserves the literary
    refrain.
