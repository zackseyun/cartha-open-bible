theological_decisions:
- issue: Rendering of רָקִיעַ in a creation context with cosmological implications
  chosen_reading: the expanse
  alternative_readings:
  - the firmament
  - the vault
  rationale: The translation avoids archaic tradition ('firmament') while also avoiding
    an overly specific cosmological reconstruction ('vault'). 'Expanse' preserves
    the Hebrew image of something spread out and leaves ancient cosmological questions
    unforced, in keeping with preserving theological and interpretive tension where
    the text itself does not specify more.
  doctrine_reference: Translation philosophy §§1, 3, 6
