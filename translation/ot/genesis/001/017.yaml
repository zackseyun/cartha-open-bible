id: GEN.1.17
reference: Genesis 1:17
source:
  edition: WLC
  text: וַ/יִּתֵּ֥ן אֹתָ֛/ם אֱלֹהִ֖ים בִּ/רְקִ֣יעַ הַ/שָּׁמָ֑יִם לְ/הָאִ֖יר עַל הָ/אָֽרֶץ־׃
translation:
  text: And God set them in the expanse of the heavens to give light on the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the firmament of the heavens.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: set
  alternatives:
  - placed
  - put
  lexicon: HALOT
  rationale: The verb נתן literally means 'gave/put,' but in this context of positioning
    the heavenly lights, 'set' is idiomatic modern English and preserves the sense
    of deliberate placement without sounding wooden.
- source_word: אֹתָם
  chosen: them
  rationale: Direct-object pronoun referring back to the greater and lesser lights
    and the stars from the previous verse; straightforwardly rendered 'them'.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In Genesis 1 this plural-form noun takes singular verbal sense and refers
    to the one Creator; standard English rendering is 'God'.
- source_word: בִּרְקִיעַ
  chosen: in the expanse
  alternatives:
  - in the firmament
  - in the vault
  lexicon: HALOT
  rationale: רָקִיעַ denotes an extended spread-out space. 'Expanse' is a well-established
    rendering that is more transparent to modern readers than 'firmament' while avoiding
    over-interpretive cosmological language.
- source_word: הַשָּׁמַיִם
  chosen: of the heavens
  alternatives:
  - of the sky
  - of heaven
  lexicon: HALOT
  rationale: The Hebrew is plural, literally 'the heavens.' Rendering it 'of the heavens'
    preserves the form and elevated register of the creation account better than the
    flatter 'sky.'
- source_word: לְהָאִיר
  chosen: to give light
  alternatives:
  - to shine
  - to illumine
  lexicon: HALOT
  rationale: 'The Hiphil infinitive of אור is causative: not merely ''to shine'' but
    ''to give light/illumine.'' ''To give light'' is natural English and matches the
    functional emphasis of the passage.'
- source_word: עַל הָאָרֶץ
  chosen: on the earth
  alternatives:
  - upon the earth
  - over the earth
  lexicon: HALOT
  rationale: עַל commonly means 'on/upon/over.' Here 'on the earth' communicates the
    destination of the lights' illumination in clear modern English.
