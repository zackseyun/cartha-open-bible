  chosen_reading: Rendered as 'the expanse' rather than 'firmament' or a more interpretive
    modern scientific equivalent.
  alternative_readings:
  - the firmament
  - the vault of the sky
  rationale: This preserves the source term's broad spatial sense without importing
    either archaic cosmology or modern scientific paraphrase. It aims for optimal
    equivalence and lets the text speak in its own ancient register.
