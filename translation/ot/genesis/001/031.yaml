theological_decisions:
- issue: Nature of the goodness of creation in טוֹב מְאֹד
  chosen_reading: very good
  alternative_readings:
  - exceedingly good
  rationale: The translation preserves the text's broad affirmation of creation's
    goodness without narrowing it to specifically moral, aesthetic, or functional
    goodness. This maintains theological breadth and avoids importing later doctrinal
    formulations into the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering the day formula in a way that does not prejudge debates about the
    creation days
  chosen_reading: And there was evening and there was morning, the sixth day
  alternative_readings:
  - And it was evening and it was morning, day six
  rationale: This follows the Hebrew formula closely and avoids adding interpretive
    language that would settle debates about the length or literary function of the
    days. The text is translated, not interpreted beyond its wording.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
