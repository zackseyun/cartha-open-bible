theological_decisions:
- issue: Volitive force of וְהָיוּ within the creation speech
  chosen_reading: 'Render as a command continuation: ''And let them be'''
  alternative_readings:
  - 'Render as simple future: ''and they shall be'''
  rationale: The syntax and immediate context place this clause within God's speech
    of appointment for the heavenly lights. Rendering it volitively preserves the
    literary structure of divine decree followed by fulfillment, without adding doctrinal
    content.
