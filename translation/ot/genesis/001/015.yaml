id: GEN.1.15
reference: Genesis 1:15
source:
  edition: WLC
  text: וְ/הָי֤וּ לִ/מְאוֹרֹת֙ בִּ/רְקִ֣יעַ הַ/שָּׁמַ֔יִם לְ/הָאִ֖יר עַל הָ/אָ֑רֶץ
    וַֽ/יְהִי כֵֽן־־׃
translation:
  text: And let them be for lights in the expanse of the heavens to give light on
    the earth. And it was so.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for luminaries.' The Hebrew refers to light-giving bodies rather than
      abstract light.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the firmament of the heavens.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  chosen: And let them be
  alternatives:
  - and they shall be
  - and they were
  lexicon: HALOT
  rationale: Though morphologically a qatal/pluperfect-like form of היה, in this creation-command
    context it continues the jussive force from the preceding verse ('let there be...')
    and is best rendered volitively in English. 'Let them be' preserves the command
    sequence more naturally than a simple future.
- source_word: לִמְאוֹרֹת
  chosen: for lights
  alternatives:
  - for luminaries
  - for light-bearers
  lexicon: HALOT
  rationale: מָאוֹר denotes a source or bearer of light, not merely abstract 'light.'
    'Lights' is idiomatic modern English and fits the celestial bodies named in the
    context. 'Luminaries' is possible but less natural for the target audience.
- source_word: בִּרְקִיעַ
  chosen: in the expanse
  alternatives:
  - in the firmament
  - in the vault
  lexicon: HALOT
  rationale: רָקִיעַ refers to the stretched-out expanse/sky-dome. 'Expanse' is a
    well-established rendering that avoids the archaic feel of 'firmament' while staying
    closer to the Hebrew than a freer term like 'sky.'
- source_word: הַשָּׁמַיִם
  chosen: of the heavens
  alternatives:
  - of heaven
  - of the sky
  lexicon: HALOT
  rationale: The Hebrew is morphologically plural and commonly rendered 'heavens'
    in Genesis 1. Retaining 'the heavens' preserves the diction and intertextual consistency
    of the chapter better than singular 'heaven' or the more interpretive 'sky.'
- source_word: לְהָאִיר
  chosen: to give light
  alternatives:
  - to shine
  - to illumine
  lexicon: HALOT
  rationale: 'The hiphil infinitive of אור is causative: ''to cause light/to give
    light.'' ''To give light'' is clear, idiomatic, and reflects the causative sense
    better than the intransitive ''to shine.'''
- source_word: עַל הָאָרֶץ
  chosen: on the earth
  alternatives:
  - upon the earth
  - over the earth
  lexicon: HALOT
  rationale: עַל here indicates direction or sphere of illumination. 'On the earth'
    is natural English and adequately conveys the sense without unnecessary archaism.
- source_word: וַיְהִי כֵן
  chosen: And it was so
  alternatives:
  - and so it was
  - and it happened so
  lexicon: HALOT
  rationale: This is the standard fulfillment formula in Genesis 1. 'And it was so'
    is both accurate and stylistically consistent with the repeated pattern of divine
    command and fulfillment.
