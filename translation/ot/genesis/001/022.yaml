theological_decisions:
- issue: Nature of the speech act in the blessing
  chosen_reading: 'Render the imperatives and jussive as a divine blessing expressed in command-like form: ''Be fruitful and multiply ... let the birds multiply.'''
  alternative_readings:
  - Render all verbs as direct commands
  - 'Render the final clause as a simple future: ''and the birds will multiply'''
  rationale: The Hebrew presents God's blessing through direct speech with imperative/jussive forms. The translation preserves this tension rather than flattening it into either mere command or mere prediction.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
