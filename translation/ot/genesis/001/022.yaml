id: GEN.1.22
reference: Genesis 1:22
source:
  edition: WLC
  text: וַ/יְבָ֧רֶךְ אֹתָ֛/ם אֱלֹהִ֖ים לֵ/אמֹ֑ר פְּר֣וּ וּ/רְב֗וּ וּ/מִלְא֤וּ אֶת הַ/מַּ֨יִם֙ בַּ/יַּמִּ֔ים וְ/הָ/ע֖וֹף יִ֥רֶב בָּ/אָֽרֶץ־׃
translation:
  text: And God blessed them[a], saying, “Be fruitful and multiply, and fill the waters in the seas, and let the birds multiply on the earth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the flying creatures' for 'the birds'; Hebrew עוֹף can refer more broadly to flying creatures.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבָרֶךְ
  chosen: blessed
  alternatives:
  - pronounced a blessing on
  lexicon: HALOT
  rationale: The piel of ברך here denotes bestowal of blessing. 'Blessed' is the standard and natural English rendering, preserving both divine action and covenantal resonance without paraphrase.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct-object pronoun referring back to the sea creatures and birds created in the previous verse. 'Them' is the straightforward English equivalent.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In Genesis 1 this noun with singular verbal agreement refers to the one Creator. 'God' is the established and accurate English rendering.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - saying this
  lexicon: HALOT
  rationale: Standard infinitive construction introducing direct speech. 'Saying' is concise and idiomatic.
- source_word: פְּרוּ
  chosen: Be fruitful
  alternatives:
  - Bear fruit
  - Increase
  lexicon: HALOT
  rationale: Imperative from פרה in blessing/commission contexts is conventionally and accurately rendered 'Be fruitful.' This preserves the idiom of fecundity rather than reducing it to mere numerical increase.
- source_word: וּרְבוּ
  chosen: multiply
  alternatives:
  - become many
  - increase
  lexicon: HALOT
  rationale: Imperative from רבה here refers to numerical increase. 'Multiply' pairs naturally with 'Be fruitful' and reflects longstanding English usage grounded in the Hebrew sense.
- source_word: וּמִלְאוּ
  chosen: fill
  alternatives:
  - fill up
  lexicon: HALOT
  rationale: Imperative from מלא means 'fill.' 'Fill' is sufficiently clear and avoids adding emphasis not explicit in the Hebrew.
- source_word: אֶת־הַמַּיִם
  chosen: the waters
  alternatives:
  - the water
  lexicon: HALOT
  rationale: Hebrew uses the plural form מַיִם. English commonly allows either singular or plural, but 'the waters' better reflects the Hebrew form and the elevated style of the creation account.
- source_word: בַּיַּמִּים
  chosen: in the seas
  alternatives:
  - in the sea
  lexicon: HALOT
  rationale: Plural of ים. 'In the seas' follows the Hebrew number and matches the cosmological language of Genesis 1.
- source_word: וְהָעוֹף
  chosen: the birds
  alternatives:
  - the flying creatures
  - the birds of the air
  lexicon: HALOT
  rationale: עוֹף can denote flying creatures broadly, but in this immediate context, after the creation of birds in v.21 and paired with their multiplication on the earth, 'the birds' is the most natural and sufficiently precise rendering.
- source_word: יִרֶב
  chosen: let ... multiply
  alternatives:
  - be many
  - increase
  lexicon: HALOT
  rationale: Jussive/imperfect of רבה expressing volitive force. English 'let the birds multiply' captures the blessing-command nuance better than a flat future such as 'will multiply.'
- source_word: בָּאָרֶץ
  chosen: on the earth
  alternatives:
  - in the earth
  - on the land
  lexicon: HALOT
  rationale: אָרֶץ here refers to the terrestrial realm as the place where birds increase. 'On the earth' is the most direct rendering; 'on the land' is possible but less consistent with Genesis 1 diction.
