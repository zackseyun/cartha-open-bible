theological_decisions:
- issue: Rendering of אָדָם in a representative-humanity context
  chosen_reading: man
  alternative_readings:
  - humankind
  - the man
  rationale: The verse uses singular הָאָדָם with singular pronouns, then shifts to
    plural 'them' with 'male and female,' indicating humanity represented in the singular
    and instantiated in plurality. Following the doctrine's gender-accurate principle
    and contested-terms guidance, 'man' best preserves the source-text form and literary-theological
    tension; an inclusive alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; Contested terms table
    for אָדָם'
