id: GEN.1.27
reference: Genesis 1:27
source:
  edition: WLC
  text: וַ/יִּבְרָ֨א אֱלֹהִ֤ים אֶת הָֽ/אָדָם֙ בְּ/צַלְמ֔/וֹ בְּ/צֶ֥לֶם אֱלֹהִ֖ים בָּרָ֣א
    אֹת֑/וֹ זָכָ֥ר וּ/נְקֵבָ֖ה בָּרָ֥א אֹתָֽ/ם׀־׃
translation:
  text: So God created man in his image; in the image of God he created him; male
    and female he created them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''humankind'': the Hebrew adam here is singular and representative,
      referring to humanity as a whole.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּבְרָא / בָּרָא
  chosen: created
  alternatives:
  - fashioned
  - made
  lexicon: HALOT
  rationale: בחרא in Genesis 1 is the standard verb for divine creation. 'Created'
    preserves the formal link across the threefold repetition and avoids weakening
    the elevated style.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although morphologically plural, with singular verbal agreement here
    it denotes the one God of Israel. 'God' is the natural English rendering.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - the man
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered 'man / humankind' by context. Here the
    singular object is followed by 'male and female he created them,' showing representative
    humanity in singular form. 'Man' preserves the gender-accurate representative
    force of the Hebrew better than flattening to 'humankind,' while not restricting
    the referent to a single male individual.
- source_word: בְּצַלְמוֹ
  chosen: in his image
  alternatives:
  - as his image
  lexicon: HALOT
  rationale: ב + צלם with 3ms suffix is most naturally rendered 'in his image.' The
    suffix refers back to God, and 'image' is the established and semantically accurate
    gloss for צלם here.
- source_word: בְּצֶלֶם אֱלֹהִים
  chosen: in the image of God
  alternatives:
  - as the image of God
  lexicon: HALOT
  rationale: This appositional restatement intensifies and clarifies the prior phrase.
    Repeating 'image' preserves the Hebrew parallelism and theological emphasis.
- source_word: אֹתוֹ
  chosen: him
  alternatives:
  - it
  lexicon: HALOT
  rationale: The pronoun is masculine singular referring to הָאָדָם as representative
    humanity. 'Him' matches the grammar and preserves the singular-to-plural movement
    of the verse.
- source_word: זָכָר וּנְקֵבָה
  chosen: male and female
  alternatives:
  - man and woman
  lexicon: HALOT
  rationale: The Hebrew terms are biological/sexed descriptors rather than the more
    relational איש/אשה pair. 'Male and female' is therefore the most precise rendering.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: The plural pronoun marks the shift from singular representative humanity
    to the plurality of human sexes. 'Them' preserves this deliberate movement in
    the Hebrew.
