id: GEN.1.21
reference: Genesis 1:21
source:
  edition: WLC
  text: וַ/יִּבְרָ֣א אֱלֹהִ֔ים אֶת הַ/תַּנִּינִ֖ם הַ/גְּדֹלִ֑ים וְ/אֵ֣ת כָּל נֶ֣פֶשׁ הַֽ/חַיָּ֣ה הָֽ/רֹמֶ֡שֶׂת אֲשֶׁר֩ שָׁרְצ֨וּ הַ/מַּ֜יִם לְ/מִֽינֵ/הֶ֗ם וְ/אֵ֨ת כָּל ע֤וֹף כָּנָף֙ לְ/מִינֵ֔/הוּ וַ/יַּ֥רְא אֱלֹהִ֖ים כִּי טֽוֹב־־׀־־׃
translation:
  text: So God created the great sea creatures[a], and every living creature that moves, with which the waters swarmed, according to their kinds, and every winged bird according to its kind. And God saw that it was good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the great sea monsters' or 'the great dragons.' The Hebrew tanninim can refer to large serpentine or monstrous creatures; here the aquatic context supports 'sea creatures.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְרָא
  chosen: created
  alternatives:
  - made
  - fashioned
  lexicon: HALOT
  rationale: בחרא in Genesis 1 is a key creation verb and is best rendered 'created' to preserve the distinct lexical choice and the elevated register of the creation account.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In this context the plural form takes singular verbal agreement and clearly refers to the one God of Israel; standard English rendering is 'God.'
- source_word: הַתַּנִּינִם הַגְּדֹלִים
  chosen: the great sea creatures
  alternatives:
  - the great sea monsters
  - the great dragons
  lexicon: HALOT
  rationale: תנינים can denote large serpentine or monstrous creatures, including sea creatures. In Genesis 1:21, within the aquatic creation context, 'great sea creatures' is the clearest natural English rendering without importing mythological overtones, while preserving the sense of large notable creatures of the waters.
- source_word: כָּל נֶפֶשׁ הַחַיָּה
  chosen: every living creature
  alternatives:
  - every living being
  - every living soul
  lexicon: HALOT
  rationale: נפש with חיה here denotes animate life rather than the later English theological sense of 'soul.' 'Every living creature' communicates the referent naturally in English.
- source_word: הָרֹמֶשֶׂת
  chosen: that moves
  alternatives:
  - that creeps
  - that swarms
  lexicon: HALOT
  rationale: The participle from רמש refers broadly to moving or creeping creatures. 'That moves' fits the broad category in context and avoids narrowing the sense to only crawling animals.
- source_word: אֲשֶׁר שָׁרְצוּ הַמַּיִם
  chosen: with which the waters swarmed
  alternatives:
  - which the waters swarmed with
  - that the waters teemed with
  lexicon: HALOT
  rationale: שרץ conveys swarming/teeming abundance. The construction is idiomatically rendered in English as 'with which the waters swarmed,' preserving both the abundance and the relative clause structure.
- source_word: לְמִינֵהֶם
  chosen: according to their kinds
  alternatives:
  - by their kinds
  - according to their kind
  lexicon: HALOT
  rationale: מין in Genesis 1 marks categorization within creation. 'According to their kinds' is the established and accurate rendering for the plural referent here.
- source_word: כָּל עוֹף כָּנָף
  chosen: every winged bird
  alternatives:
  - every bird with wings
  - every winged flying creature
  lexicon: HALOT
  rationale: עוף is the flying creature/bird category, and כנף specifies wingedness. 'Every winged bird' is concise, natural, and faithful to the phrase.
- source_word: לְמִינֵהוּ
  chosen: according to its kind
  alternatives:
  - by its kind
  lexicon: HALOT
  rationale: Singular pronominal suffix matches the collective category 'every winged bird'; English idiom prefers singular 'its kind.'
- source_word: וַיַּרְא אֱלֹהִים כִּי טוֹב
  chosen: And God saw that it was good
  alternatives:
  - And God saw that this was good
  lexicon: HALOT
  rationale: This recurring evaluative formula in Genesis 1 is best kept in a consistent, natural English form.
