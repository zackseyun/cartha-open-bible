theological_decisions:
- issue: Rendering of תַּנִּינִם in a creation context with possible mythic associations
  chosen_reading: the great sea creatures
  alternative_readings:
  - the great sea monsters
  - the great dragons
  rationale: The verse describes God's creation of aquatic life, and the translation should not overstate mythological connotations absent from the immediate syntax. 'Sea creatures' preserves the referent within the created order while allowing that the Hebrew term can denote formidable large creatures. Alternatives are preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §1, §3
