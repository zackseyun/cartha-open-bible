id: GEN.1.3
reference: Genesis 1:3
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר אֱלֹהִ֖ים יְהִ֣י א֑וֹר וַֽ/יְהִי אֽוֹר־׃
translation:
  text: And God said, “Let there be light,” and there was light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'May there be light.' The Hebrew uses a jussive form expressing volition
      or command.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר advances the narrative. 'And ... said' preserves the
    Hebrew narrative sequence in natural English without overinterpreting the conjunction.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In Genesis 1 the plural-form noun takes singular verbal agreement and
    refers to the one Creator; standard English rendering is 'God,' not a transliteration.
- source_word: יְהִי
  chosen: Let there be
  alternatives:
  - May there be
  - Be
  lexicon: HALOT
  rationale: Jussive of היה expressing volition/command. 'Let there be' is the most
    idiomatic and semantically accurate English equivalent for a creative fiat.
- source_word: אוֹר
  chosen: light
  lexicon: HALOT
  rationale: Basic lexical sense is 'light.' No contextual reason here to narrow it
    to a specific source or metaphorical sense.
- source_word: וַיְהִי
  chosen: and there was
  alternatives:
  - 'and it was so: light came to be'
  - and light came to be
  lexicon: HALOT
  rationale: Wayyiqtol of היה reports the immediate result of the divine speech. 'And
    there was' is concise, natural English and preserves the resultative force.
- source_word: אוֹר
  chosen: light
  lexicon: HALOT
  rationale: Repeated noun retained as 'light' to mirror the Hebrew repetition and
    emphasize the fulfillment of the command.
