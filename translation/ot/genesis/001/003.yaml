- issue: Rendering the divine creative command
  chosen_reading: Let there be light
  alternative_readings:
  - May there be light
  - Be light
  rationale: The Hebrew jussive expresses divine volition/effective command. 'Let
    there be light' preserves the solemn force and traditional familiarity while remaining
    faithful to the source text.
