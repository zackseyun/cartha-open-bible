id: GEN.1.5
reference: Genesis 1:5
source:
  edition: WLC
  text: וַ/יִּקְרָ֨א אֱלֹהִ֤ים לָ/אוֹר֙ י֔וֹם וְ/לַ/חֹ֖שֶׁךְ קָ֣רָא לָ֑יְלָה וַֽ/יְהִי
    עֶ֥רֶב וַֽ/יְהִי בֹ֖קֶר י֥וֹם אֶחָֽד׀־־׃פ
translation:
  text: And God called the light Day, and the darkness he called Night. And there
    was evening, and there was morning—the first day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''day one.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - named
  lexicon: HALOT
  rationale: The verb קרא with a naming complement commonly means 'call/name.' 'Called'
    preserves the Hebrew wording and matches the naming formula in context.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In Genesis 1 this plural-form noun takes singular verbal agreement and
    refers to the one Creator; standard English rendering is 'God.'
- source_word: לָאוֹר
  chosen: the light
  alternatives:
  - light
  lexicon: HALOT
  rationale: The prefixed preposition marks the object named ('to the light'), which
    idiomatic English renders simply as 'the light' after 'called.' The article is
    represented in English.
- source_word: יוֹם
  chosen: Day
  alternatives:
  - day
  lexicon: HALOT
  rationale: Here יוֹם is the name assigned to the light, so capitalization as 'Day'
    helps signal a naming act rather than merely a time period.
- source_word: וְלַחֹשֶׁךְ
  chosen: the darkness
  alternatives:
  - darkness
  lexicon: HALOT
  rationale: As with 'the light,' the preposition functions within the naming construction
    and is best rendered idiomatically in English as the direct object of 'called.'
- source_word: קָרָא
  chosen: he called
  alternatives:
  - he named
  lexicon: HALOT
  rationale: The repeated verb is retained in English to mirror the Hebrew parallelism
    and cadence.
- source_word: לָיְלָה
  chosen: Night
  alternatives:
  - night
  lexicon: HALOT
  rationale: This is the assigned name for the darkness; capitalization marks it as
    a name in English.
- source_word: וַיְהִי
  chosen: there was
  alternatives:
  - and it was
  - and there came to be
  lexicon: HALOT
  rationale: In the temporal sequence 'and there was evening, and there was morning,'
    existential 'there was' is the most natural English rendering and preserves the
    repetitive Hebrew structure.
- source_word: עֶרֶב
  chosen: evening
  alternatives:
  - sunset
  lexicon: HALOT
  rationale: The basic sense is 'evening.' 'Sunset' would be too specific here.
- source_word: בֹקֶר
  chosen: morning
  alternatives:
  - daybreak
  lexicon: HALOT
  rationale: The standard sense is 'morning'; 'daybreak' is possible but narrower
    than the Hebrew term requires.
- source_word: יוֹם אֶחָד
  chosen: the first day
  alternatives:
  - day one
  - one day
  lexicon: HALOT
  rationale: Literally the Hebrew reads 'day one.' In idiomatic English within a numbered
    sequence, 'the first day' is the clearest rendering. The alternative 'day one'
    is preserved in a footnote because the Hebrew cardinal 'one' is notable.
