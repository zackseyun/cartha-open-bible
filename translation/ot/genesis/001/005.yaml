theological_decisions:
- issue: Rendering יוֹם אֶחָד at the close of the creation-day formula
  chosen_reading: the first day
  alternative_readings:
  - day one
  rationale: The Hebrew uses the cardinal אֶחָד ('one') rather than the ordinal 'first.'
    However, in English narrative sequence, 'the first day' communicates the function
    of the phrase more naturally. Because some readers attach interpretive significance
    to the literal wording 'day one,' that alternative is preserved in a footnote
    rather than elevated into the main text.
  doctrine_reference: Translation philosophy §3, §6
