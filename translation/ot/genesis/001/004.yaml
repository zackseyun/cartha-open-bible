theological_decisions:
- issue: Rendering the repeated subject אֱלֹהִים in both clauses
  chosen_reading: 'Repeat ''God'' in both clauses: ''and God ... and God separated ...'''
  alternative_readings:
  - 'Use a pronoun in the second clause: ''and he separated...'''
  rationale: The Hebrew explicitly repeats the divine subject rather than using an implied pronoun. Retaining the repetition reflects the source text's cadence and emphasis without adding doctrinal interpretation.
  doctrine_reference: Translation philosophy §1, §5
- issue: Nature of the separation between light and darkness
  chosen_reading: Render as 'separated' without specifying whether the distinction is spatial, temporal, or conceptual
  alternative_readings:
  - '''divided'''
  - '''made a distinction between'''
  rationale: The text states that God separated light from darkness but does not explain the mechanism. The translation preserves that theological and cosmological openness rather than resolving it.
  doctrine_reference: Translation philosophy §3
