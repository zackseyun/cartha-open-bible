id: GEN.1.4
reference: Genesis 1:4
source:
  edition: WLC
  text: וַ/יַּ֧רְא אֱלֹהִ֛ים אֶת הָ/א֖וֹר כִּי ט֑וֹב וַ/יַּבְדֵּ֣ל אֱלֹהִ֔ים בֵּ֥ין הָ/א֖וֹר וּ/בֵ֥ין הַ/חֹֽשֶׁךְ־־׃
translation:
  text: And God saw that the light was good[a], and God separated the light from the darkness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'divided the light from the darkness'; the Hebrew verb can also express making a distinction between two things.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - looked at
  - considered
  lexicon: HALOT
  rationale: The verb ראה in the wayyiqtol narrative form is most naturally rendered 'saw.' In context it includes evaluative perception, but English 'saw' preserves both the literal and evaluative sense without over-interpreting.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In Genesis 1 this plural-form noun takes singular verbal agreement and refers to the one Creator; 'God' is the standard singular English rendering.
- source_word: אֶת
  chosen: '[not translated]'
  lexicon: Hebrew grammar
  rationale: Direct-object marker with no direct English equivalent; its function is represented by English word order.
- source_word: הָאוֹר
  chosen: the light
  alternatives:
  - light
  lexicon: HALOT
  rationale: The definite article is present in Hebrew, so 'the light' best reflects the specific light just called into being in the preceding verse.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of God''s perception: he saw that the light was good. ''That'' is the most natural English complementizer in this construction.'
- source_word: טוֹב
  chosen: good
  alternatives:
  - pleasing
  - beneficial
  lexicon: HALOT
  rationale: טוֹב is the standard evaluative term 'good.' More interpretive options like 'pleasing' narrow the semantic range unnecessarily.
- source_word: וַיַּבְדֵּל
  chosen: separated
  alternatives:
  - divided
  - made a distinction between
  lexicon: HALOT
  rationale: בדל means to separate or divide. 'Separated' is clear modern English and fits the physical/cosmic ordering context. 'Made a distinction between' is possible but more abstract than the immediate context requires.
- source_word: בֵּין ... וּבֵין
  chosen: from
  alternatives:
  - between ... and
  lexicon: Hebrew grammar
  rationale: The Hebrew construction literally says 'between the light and between the darkness.' Idiomatic English after 'separated' is 'separated the light from the darkness,' which preserves the sense while reading naturally.
- source_word: הַחֹשֶׁךְ
  chosen: the darkness
  alternatives:
  - darkness
  lexicon: HALOT
  rationale: The definite article is present and refers to the darkness already mentioned in the creation account; 'the darkness' reflects the Hebrew form.
