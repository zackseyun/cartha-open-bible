theological_decisions:
- issue: Rendering נֶפֶשׁ in a creation context
  chosen_reading: living creatures
  alternative_readings:
  - living beings
  - living souls
  rationale: The Hebrew phrase נֶפֶשׁ חַיָּה refers here to animate creatures rather
    than making a technical anthropological claim about the soul. 'Living creatures'
    preserves the sense without importing later doctrinal assumptions.
  doctrine_reference: Translation philosophy §3, §6
- issue: Rendering רְקִיעַ
  chosen_reading: expanse
  alternative_readings:
  - firmament
  - vault
  rationale: The term is cosmologically significant and debated, but the verse itself
    does not require a more interpretive cosmological model. 'Expanse' preserves the
    text's imagery while avoiding archaic or overly theory-laden wording.
  doctrine_reference: Translation philosophy §1, §6
