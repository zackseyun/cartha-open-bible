id: GEN.1.20
reference: Genesis 1:20
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֱלֹהִ֔ים יִשְׁרְצ֣וּ הַ/מַּ֔יִם שֶׁ֖רֶץ נֶ֣פֶשׁ חַיָּ֑ה וְ/עוֹף֙
    יְעוֹפֵ֣ף עַל הָ/אָ֔רֶץ עַל פְּנֵ֖י רְקִ֥יעַ הַ/שָּׁמָֽיִם־־׃
translation:
  text: And God said, “Let the waters swarm with swarms of living creatures, and let
    birds fly above the earth across the face of the expanse of the heavens.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Let the waters teem with living creatures.” The Hebrew uses a verb and
      cognate noun (“swarm with swarms”), emphasizing abundant life.
    reason: lexical_alternative
  - marker: b
    text: Or “flying creatures” for “birds.” The Hebrew עוֹף can be broader than strictly
      birds.
    reason: lexical_alternative
  - marker: c
    text: “Expanse” may also be rendered “firmament” or “vault.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Standard waw-consecutive narrative preterite; 'And God said' preserves
    the sequential narrative style of Genesis without overinterpreting the conjunction.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In Genesis 1 this noun with singular verbal agreement refers to the one
    Creator God; 'God' is the natural English rendering.
- source_word: יִשְׁרְצוּ
  chosen: Let ... swarm
  alternatives:
  - Let ... teem
  - Let ... abound
  lexicon: HALOT
  rationale: The verb שׁרץ denotes swarming/teeming prolific movement. 'Swarm' keeps
    the verbal force and pairs naturally with the cognate noun that follows.
- source_word: הַמַּיִם
  chosen: the waters
  alternatives:
  - the water
  lexicon: HALOT
  rationale: Hebrew plural form is idiomatically rendered 'the waters' in Genesis
    1, matching the creation account's repeated usage.
- source_word: שֶׁרֶץ
  chosen: swarms
  alternatives:
  - teeming things
  - swarms of creatures
  lexicon: HALOT
  rationale: This cognate noun with יִשְׁרְצוּ intensifies the idea of abundant swarming
    life. Rendering it as 'swarms' preserves the Hebrew wordplay and fullness better
    than flattening it to a generic object.
- source_word: נֶפֶשׁ חַיָּה
  chosen: living creatures
  alternatives:
  - living beings
  - living souls
  lexicon: HALOT
  rationale: The phrase denotes animate life. 'Living creatures' is clear modern English
    and avoids importing later theological freight into 'soul' while still reflecting
    creaturely life.
- source_word: וְעוֹף
  chosen: and let birds
  alternatives:
  - and flying creatures
  - and fowl
  lexicon: HALOT
  rationale: עוֹף can denote flying creatures broadly, but in this context paired
    with flying over the earth it is well represented by 'birds' in readable English.
- source_word: יְעוֹפֵף
  chosen: fly
  alternatives:
  - flutter
  - fly about
  lexicon: HALOT
  rationale: The verb from עוּף expresses flying movement. 'Fly' is the straightforward
    rendering; the jussive sense is carried by 'let birds fly.'
- source_word: עַל הָאָרֶץ
  chosen: above the earth
  alternatives:
  - over the earth
  - across the earth
  lexicon: HALOT
  rationale: With verbs of flight, עַל commonly indicates motion above/over. 'Above
    the earth' fits the spatial picture and avoids implying contact with the ground.
- source_word: עַל פְּנֵי
  chosen: across the face of
  alternatives:
  - across
  - over the surface of
  - in front of
  lexicon: HALOT
  rationale: The idiom literally means 'upon the face of.' 'Across the face of' preserves
    the concrete imagery while remaining natural enough in English.
- source_word: רְקִיעַ
  chosen: expanse
  alternatives:
  - firmament
  - vault
  lexicon: HALOT
  rationale: '''Expanse'' is a well-established rendering that reflects the broad
    stretched-out spatial sense without the archaic feel of ''firmament.'' ''Vault''
    is possible but more interpretive.'
- source_word: הַשָּׁמָיִם
  chosen: the heavens
  alternatives:
  - the sky
  - heaven
  lexicon: HALOT
  rationale: The plural form is standard in Hebrew. 'The heavens' preserves the form
    and the elevated register of Genesis 1 better than the flatter 'sky,' while still
    being understandable.
