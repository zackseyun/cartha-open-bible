theological_decisions:
- issue: Rendering of creation categories without importing modern scientific taxonomy
  chosen_reading: kinds
  alternative_readings:
  - species
  rationale: The Hebrew מין denotes a category or kind. Rendering it as 'kinds' preserves
    the text's own categorization and avoids anachronistically equating the term with
    modern biological species concepts.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Distinction between הָאָרֶץ and הָאֲדָמָה within the same verse
  chosen_reading: earth ... ground
  alternative_readings:
  - earth ... earth
  rationale: Using 'earth' for הָאָרֶץ and 'ground' for הָאֲדָמָה preserves the lexical
    distinction present in the Hebrew and avoids flattening two related but different
    terms into one English word.
  doctrine_reference: Translation philosophy §1, §5
