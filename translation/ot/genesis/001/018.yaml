id: GEN.1.18
reference: Genesis 1:18
source:
  edition: WLC
  text: וְ/לִ/מְשֹׁל֙ בַּ/יּ֣וֹם וּ/בַ/לַּ֔יְלָה וּֽ/לֲ/הַבְדִּ֔יל בֵּ֥ין הָ/א֖וֹר
    וּ/בֵ֣ין הַ/חֹ֑שֶׁךְ וַ/יַּ֥רְא אֱלֹהִ֖ים כִּי טֽוֹב־׃
translation:
  text: and to rule over the day and over the night, and to separate the light from
    the darkness. And God saw that it was good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and to distinguish between the light and the darkness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לִ/מְשֹׁל
  chosen: and to rule over
  alternatives:
  - and to govern
  - and to have dominion over
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed conjunction and preposition expresses
    purpose/result from the previous verse: the lights are appointed ''to rule over''
    day and night. ''Rule over'' is the most natural English equivalent for משל here
    and preserves the governing function without overstating it.'
- source_word: בַּ/יּוֹם
  chosen: the day
  alternatives:
  - daytime
  lexicon: HALOT
  rationale: With the preposition, the phrase is governed by 'rule over.' 'The day'
    keeps the paired structure with 'the night' and reflects the definite article
    in Hebrew.
- source_word: וּ/בַ/לַּיְלָה
  chosen: and over the night
  alternatives:
  - and the night
  - and over nighttime
  lexicon: HALOT
  rationale: The repeated preposition is represented in English as 'over' for clarity
    and balance with the previous phrase. 'Night' is the standard rendering of לילה.
- source_word: וּֽ/לֲ/הַבְדִּיל
  chosen: and to separate
  alternatives:
  - and to divide
  - and to distinguish
  lexicon: HALOT
  rationale: בדל in Genesis 1 consistently denotes separation/distinction established
    by God. 'Separate' best matches the creation-account pattern and is more concrete
    than 'distinguish,' while avoiding the possible over-literal harshness of 'divide.'
- source_word: בֵּין הָ/א֖וֹר וּ/בֵ֣ין הַ/חֹ֑שֶׁךְ
  chosen: the light from the darkness
  alternatives:
  - between the light and the darkness
  lexicon: HALOT
  rationale: English idiom prefers 'separate X from Y' rather than repeating 'between
    ... and between.' The definite articles are preserved as 'the light' and 'the
    darkness.'
- source_word: וַ/יַּ֥רְא אֱלֹהִ֖ים
  chosen: And God saw
  alternatives:
  - Then God saw
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And God saw' preserves the
    Hebrew narrative rhythm used repeatedly in Genesis 1.
- source_word: כִּי טֽוֹב
  chosen: that it was good
  alternatives:
  - that it was pleasing
  - that it was beneficial
  lexicon: HALOT
  rationale: טוב in this refrain carries the sense of goodness, suitability, and rightness
    within creation. 'Good' preserves the familiar and theologically weighty wording
    without narrowing the semantic range.
