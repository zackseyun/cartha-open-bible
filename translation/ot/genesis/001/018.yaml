theological_decisions:
- issue: Function of the heavenly lights in creation
  chosen_reading: The verse describes the lights as appointed to govern day and night
    and to mark the separation between light and darkness, without implying deity
    or independent agency.
  alternative_readings:
  - A more personified rendering could suggest the luminaries themselves actively
    exercise dominion as divine beings.
  rationale: The Hebrew assigns functional roles within God's ordered creation. Rendering
    משל as 'rule over' preserves the text's language while the surrounding syntax
    and final clause keep God as the evaluating sovereign. No mythological or theological
    import beyond the text is introduced.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
