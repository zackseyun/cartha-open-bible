theological_decisions:
- issue: Whether הָיְתָה should be rendered as a stative ('was') or change-of-state
    ('became') verb
  chosen_reading: was
  alternative_readings:
  - became
  rationale: The verse describes the condition of the earth at this stage of the narrative.
    A change-of-state rendering can be used to support later theological reconstructions,
    but the Hebrew here does not require that reading. Preserving the simpler stative
    sense avoids importing a doctrinal claim the text does not make.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
- issue: Whether וְרוּחַ אֱלֹהִים refers to the Spirit of God or a wind from God
  chosen_reading: the Spirit of God
  alternative_readings:
  - a wind from God
  - the wind of God
  rationale: The Hebrew is genuinely ambiguous. Because the phrase can denote either
    divine Spirit or divinely sent wind, the main text adopts 'the Spirit of God'
    as a strong and traditional reading, but the alternative is preserved in a footnote
    to maintain the interpretive tension rather than erase it.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
