id: GEN.1.2
reference: Genesis 1:2
source:
  edition: WLC
  text: וְ/הָ/אָ֗רֶץ הָיְתָ֥ה תֹ֨הוּ֙ וָ/בֹ֔הוּ וְ/חֹ֖שֶׁךְ עַל פְּנֵ֣י תְה֑וֹם וְ/ר֣וּחַ
    אֱלֹהִ֔ים מְרַחֶ֖פֶת עַל פְּנֵ֥י הַ/מָּֽיִם־־׃
translation:
  text: Now the earth was formless and empty, and darkness was over the surface of
    the deep, and the Spirit of God was hovering over the surface of the waters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "a wind from God" or "the wind of God" was hovering over the surface
      of the waters.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָאָרֶץ
  chosen: Now the earth
  alternatives:
  - And the earth
  lexicon: HALOT
  rationale: הָאָרֶץ is straightforwardly 'the earth/land.' The prefixed ו here is
    rendered 'Now' rather than a bare 'And' to produce natural English while still
    signaling narrative continuation and scene-setting.
- source_word: הָיְתָה
  chosen: was
  alternatives:
  - became
  lexicon: HALOT
  rationale: 'The Qal perfect of היה here most naturally functions as a stative copula:
    ''was.'' Although ''became'' is grammatically possible in some contexts, nothing
    in this clause requires a change-of-state reading, so the simpler stative sense
    is preferred.'
- source_word: תֹהוּ וָבֹהוּ
  chosen: formless and empty
  alternatives:
  - waste and emptiness
  - without form and void
  lexicon: HALOT
  rationale: This collocation denotes desolation/unformed emptiness. 'Formless and
    empty' preserves the paired sense in readable modern English better than the traditional
    but archaic-sounding 'without form and void.'
- source_word: וְחֹשֶׁךְ
  chosen: and darkness
  lexicon: HALOT
  rationale: A simple nominal clause continuation; 'darkness' is the direct lexical
    equivalent.
- source_word: עַל־פְּנֵי
  chosen: over the surface of
  alternatives:
  - upon the face of
  - over
  lexicon: HALOT
  rationale: The idiom literally means 'upon the face of.' 'Over the surface of' preserves
    the spatial imagery in natural English better than the more wooden 'upon the face
    of.'
- source_word: תְהוֹם
  chosen: the deep
  alternatives:
  - the abyss
  - the primeval deep
  lexicon: HALOT
  rationale: תְהוֹם refers to the deep waters/oceanic deep. 'The deep' is the standard,
    clear rendering and avoids importing mythological overtones beyond the Hebrew
    text itself.
- source_word: וְרוּחַ אֱלֹהִים
  chosen: the Spirit of God
  alternatives:
  - a wind from God
  - the wind of God
  lexicon: HALOT
  rationale: רוּחַ can mean 'spirit,' 'wind,' or 'breath.' In this context, both 'wind
    of God' and 'Spirit of God' are possible. Given the canonical context and longstanding
    viability of the personal reading, the main text uses 'the Spirit of God' while
    preserving the meteorological alternative in a footnote to maintain the text's
    ambiguity.
- source_word: מְרַחֶפֶת
  chosen: was hovering
  alternatives:
  - was moving
  - was fluttering
  lexicon: HALOT
  rationale: The participle suggests continuous action. 'Hovering' best captures the
    verbal nuance attested elsewhere for protective or sustained movement, while remaining
    idiomatic in English.
- source_word: הַמָּיִם
  chosen: the waters
  alternatives:
  - the water
  lexicon: HALOT
  rationale: The Hebrew plural is retained as 'the waters,' matching the source form
    and the cosmic-water imagery of the passage.
