id: GEN.1.13
reference: Genesis 1:13
source:
  edition: WLC
  text: וַֽ/יְהִי עֶ֥רֶב וַֽ/יְהִי בֹ֖קֶר י֥וֹם שְׁלִישִֽׁי־־׃פ
translation:
  text: And there was evening, and there was morning—the third day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'And there was evening and there was morning, day third.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: and there was
  alternatives:
  - and it was
  - and it became
  lexicon: HALOT
  rationale: The waw-consecutive form of היה here functions as the standard narrative
    formula introducing the completion of a time period. 'And there was' is idiomatic
    and preserves the repeated cadence of the Hebrew better than the less natural
    'and it was.' 'And it became' is possible for היה in some contexts but is not
    the best fit in this formula.
- source_word: עֶרֶב
  chosen: evening
  alternatives:
  - nightfall
  lexicon: HALOT
  rationale: The noun denotes evening or dusk. 'Evening' is the standard and most
    transparent rendering in the Genesis creation refrain.
- source_word: בֹּקֶר
  chosen: morning
  alternatives:
  - daybreak
  - dawn
  lexicon: HALOT
  rationale: The noun denotes morning. 'Morning' matches normal English usage and
    preserves the formulaic parallel with 'evening.'
- source_word: יוֹם
  chosen: day
  lexicon: HALOT
  rationale: In this refrain, יום identifies the numbered day of the creation sequence.
    'Day' is the direct and contextually appropriate rendering.
- source_word: שְׁלִישִׁי
  chosen: third
  lexicon: HALOT
  rationale: The ordinal adjective straightforwardly means 'third' and modifies 'day.'
- source_word: וַיְהִי עֶרֶב וַיְהִי בֹקֶר
  chosen: And there was evening, and there was morning
  alternatives:
  - And there was evening and there was morning
  - There was evening, and there was morning
  lexicon: HALOT
  rationale: The repeated clause is a fixed literary refrain in Genesis 1. Retaining
    both instances of 'and there was' preserves the Hebrew rhythm and structure. Commas
    aid readability in modern English without altering meaning.
