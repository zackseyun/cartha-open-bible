theological_decisions:
- issue: Rendering the creation-day refrain without importing a specific chronology
    interpretation
  chosen_reading: And there was evening, and there was morning—the third day.
  alternative_readings:
  - And there was evening and there was morning, a third day.
  - And there was evening, and there was morning, day three.
  rationale: The Hebrew construction marks the sequence of the creation account and
    should be translated plainly. 'The third day' is the most natural English rendering
    of יום שלישי here and does not itself adjudicate debates over the length or literary
    function of the days. This preserves theological tension rather than resolving
    later interpretive disputes in translation.
  doctrine_reference: Preserve theological tension rather than resolve it.
