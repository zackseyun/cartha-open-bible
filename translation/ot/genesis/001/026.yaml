theological_decisions:
- issue: Plural speech in 'Let us make ... in our image ... our likeness'
  chosen_reading: Preserve the plural wording without specifying the addressee or
    theological explanation in the main text.
  alternative_readings:
  - divine deliberation/plural of majesty
  - address to the heavenly court
  - adumbration of Trinitarian plurality
  rationale: The Hebrew text uses first person plural forms. The translation should
    preserve that tension rather than resolve it by paraphrase. Historic Christian
    orthodoxy allows Trinitarian reading at the canonical level, but this verse alone
    does not require the translation to specify that interpretation.
  doctrine_reference: Translation philosophy §3; Affirmations (Nicene Creed within
    orthodox bounds)
- issue: Rendering אדם in a collective-yet-gendered context
  chosen_reading: Use 'man' in the main text as a representative collective term.
  alternative_readings:
  - humankind
  - humanity
  rationale: The doctrine excerpt explicitly lists אדם with default 'man / humankind
    (context)' and prefers gender-accurate renderings over flattening to gender-neutral
    language. Here 'man' preserves the representative singular, while 'let them rule'
    makes the collective sense explicit.
  doctrine_reference: Contested terms table for אָדָם; Translation philosophy §4
