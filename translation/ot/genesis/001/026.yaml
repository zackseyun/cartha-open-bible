id: GEN.1.26
reference: Genesis 1:26
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֱלֹהִ֔ים נַֽעֲשֶׂ֥ה אָדָ֛ם בְּ/צַלְמֵ֖/נוּ כִּ/דְמוּתֵ֑/נוּ וְ/יִרְדּוּ֩
    בִ/דְגַ֨ת הַ/יָּ֜ם וּ/בְ/ע֣וֹף הַ/שָּׁמַ֗יִם וּ/בַ/בְּהֵמָה֙ וּ/בְ/כָל הָ/אָ֔רֶץ
    וּ/בְ/כָל הָ/רֶ֖מֶשׂ הָֽ/רֹמֵ֥שׂ עַל הָ/אָֽרֶץ־־־׃
translation:
  text: Then God said, “Let us make man in our image, according to our likeness, and
    let them rule over the fish of the sea and over the birds of the heavens and over
    the livestock and over all the earth and over every creeping thing that creeps
    on the earth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''humankind'' or ''humanity.'' Hebrew adam here is a collective singular:
      ''man'' as humanity considered as one kind, which is why the verse continues
      with the plural ''let them rule.'''
    reason: lexical_alternative
  - marker: b
    text: The plural expressions 'Let us make' and 'in our image' are preserved as
      in the Hebrew. Interpreters variously understand them as divine deliberation,
      an address to the heavenly court, or—within Christian canonical reading—a hint
      consistent with later Trinitarian revelation.
    reason: alternative_reading
  - marker: c
    text: Or 'have dominion over.'
    reason: lexical_alternative
  - marker: d
    text: Or 'birds of the sky.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural modern
    English narrative flow while preserving sequence.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: With singular verbal agreement in this context, the referent is the one
    God, so standard English 'God' is appropriate.
- source_word: נַעֲשֶׂה
  chosen: Let us make
  alternatives:
  - We will make
  - Let me make
  lexicon: HALOT
  rationale: First person common plural cohortative/jussive-like form is best represented
    by the deliberative 'Let us make.' This preserves the plural form without resolving
    its theological significance.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - mankind
  - humanity
  lexicon: HALOT
  rationale: Per doctrine, אדם defaults to 'man / humankind' by context. Here the
    term is collective yet also prepares for the singular-plural interplay of the
    verse and the following context. 'Man' preserves the representative/generic force
    and the gender-accurate policy, while the plural pronoun later shows the collective
    sense.
- source_word: בְּצַלְמֵנוּ
  chosen: in our image
  alternatives:
  - as our image
  lexicon: HALOT
  rationale: צלם commonly denotes image/form/representation. 'In our image' is the
    established and textually straightforward rendering for ב + noun here.
- source_word: כִּדְמוּתֵנוּ
  chosen: according to our likeness
  alternatives:
  - after our likeness
  - like us
  lexicon: HALOT
  rationale: כ + דמות expresses correspondence or pattern. 'According to our likeness'
    is clear modern English and preserves the distinction from 'image' without overinterpreting
    the relation between the two nouns.
- source_word: וְיִרְדּוּ
  chosen: and let them rule over
  alternatives:
  - and let them have dominion over
  - so that they may rule over
  lexicon: HALOT
  rationale: The prefixed verb is third person plural jussive following the cohortative
    'Let us make,' expressing purpose/result for humanity collectively. 'Let them
    rule over' preserves the jussive force and avoids archaic tone. 'Have dominion'
    is possible but 'rule' is more accessible modern English.
- source_word: בִדְגַת הַיָּם
  chosen: over the fish of the sea
  alternatives:
  - over the sea's fish
  lexicon: HALOT
  rationale: Standard construct rendering; 'fish of the sea' is idiomatic and preserves
    the Hebrew structure.
- source_word: וּבְעוֹף הַשָּׁמַיִם
  chosen: and over the birds of the heavens
  alternatives:
  - and over the birds of the sky
  - and over the fowl of heaven
  lexicon: HALOT
  rationale: עוף denotes flying creatures/birds. 'Birds' is the natural English choice
    here. 'Heavens' more closely reflects שמים than 'sky,' and fits the elevated style
    of the creation account.
- source_word: וּבַבְּהֵמָה
  chosen: and over the livestock
  alternatives:
  - and over the cattle
  - and over the animals
  lexicon: HALOT
  rationale: בהמה here refers to domesticated land animals as a class. 'Livestock'
    is precise and modern; 'cattle' is too narrow, 'animals' too broad.
- source_word: וּבְכָל הָאָרֶץ
  chosen: and over all the earth
  alternatives:
  - and over the whole earth
  - and over all the land
  lexicon: HALOT
  rationale: ארץ in Genesis 1 refers to the earth/world rather than a local land.
    'All the earth' preserves the cosmic scope.
- source_word: וּבְכָל הָרֶמֶשׂ
  chosen: and over every creeping thing
  alternatives:
  - and over every moving thing
  - and over every crawler
  lexicon: HALOT
  rationale: רמש denotes small creatures that move close to the ground. 'Creeping
    thing' is traditional but still understandable and matches the following participle.
- source_word: הָרֹמֵשׂ עַל הָאָרֶץ
  chosen: that creeps on the earth
  alternatives:
  - that moves on the earth
  - that swarms on the earth
  lexicon: HALOT
  rationale: The participle echoes the noun רמש. Rendering both with 'creeping' preserves
    the Hebrew wordplay and lexical consistency.
