theological_decisions:
- issue: Whether to render אֶרֶץ as a common noun or as a name in the naming formula
  chosen_reading: Render as the proper name 'Earth'
  alternative_readings:
  - Render as common noun 'land' or 'earth' without capitalization
  rationale: Because God is explicitly naming the dry land, English capitalization
    helps signal the naming act. This does not import a modern scientific claim; it
    reflects the literary function of the verse.
