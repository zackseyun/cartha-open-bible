id: GEN.1.10
reference: Genesis 1:10
source:
  edition: WLC
  text: וַ/יִּקְרָ֨א אֱלֹהִ֤ים לַ/יַּבָּשָׁה֙ אֶ֔רֶץ וּ/לְ/מִקְוֵ֥ה הַ/מַּ֖יִם קָרָ֣א
    יַמִּ֑ים וַ/יַּ֥רְא אֱלֹהִ֖ים כִּי טֽוֹב׀־׃
translation:
  text: And God called the dry land Earth, and the gathering of the waters he called
    Seas. And God saw that it was good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'land' / 'earth' without capitalization; the Hebrew אֶרֶץ can function
      as either a common noun or, in this naming context, as the name assigned to
      the dry land.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא / קָרָא
  chosen: called
  alternatives:
  - named
  lexicon: HALOT
  rationale: The verb denotes naming/designating here. 'Called' is the standard, natural
    English rendering in naming contexts and preserves the repeated structure of the
    verse.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In Genesis 1 this plural-form noun takes singular verbal agreement and
    refers to the one Creator; 'God' is the straightforward English equivalent.
- source_word: לַיַּבָּשָׁה
  chosen: the dry land
  alternatives:
  - the dry ground
  - the dry
  lexicon: HALOT
  rationale: The noun refers to the dry land as distinguished from the gathered waters.
    'The dry land' is idiomatic and fits the creation-separation context better than
    the less natural 'the dry.'
- source_word: אֶרֶץ
  chosen: Earth
  alternatives:
  - land
  - earth
  lexicon: HALOT
  rationale: Here אֶרֶץ is the name assigned to the dry land. Capitalizing 'Earth'
    reflects its function as a proper name in the naming formula, while still preserving
    the lexical sense of 'earth/land.'
- source_word: מִקְוֵה
  chosen: the gathering
  alternatives:
  - the collection
  - the gathered place
  lexicon: HALOT
  rationale: The noun denotes a collected mass or gathering. 'The gathering' is concise,
    natural English and matches the sense of waters being assembled into one place
    in the immediate context.
- source_word: הַמַּיִם
  chosen: the waters
  alternatives:
  - the water
  lexicon: HALOT
  rationale: Hebrew uses the plural form מים; 'the waters' preserves the source form
    and the elevated style of the creation account.
- source_word: יַמִּים
  chosen: Seas
  alternatives:
  - seas
  lexicon: HALOT
  rationale: The plural noun refers to the gathered bodies of water. Capitalizing
    'Seas' mirrors the naming function parallel to 'Earth.'
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - considered
  - looked and saw
  lexicon: HALOT
  rationale: The common verb 'saw' is the standard rendering in the repeated Genesis
    1 evaluation formula and should be kept consistent.
- source_word: כִּי טוֹב
  chosen: that it was good
  alternatives:
  - that it was pleasing
  - that it was beautiful
  lexicon: HALOT
  rationale: This is the recurring evaluative refrain in Genesis 1. 'Good' preserves
    both the lexical simplicity and the theological breadth of טוֹב without narrowing
    it to aesthetics or utility.
