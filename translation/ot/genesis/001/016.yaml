id: GEN.1.16
reference: Genesis 1:16
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ אֱלֹהִ֔ים אֶת שְׁנֵ֥י הַ/מְּאֹרֹ֖ת הַ/גְּדֹלִ֑ים אֶת הַ/מָּא֤וֹר
    הַ/גָּדֹל֙ לְ/מֶמְשֶׁ֣לֶת הַ/יּ֔וֹם וְ/אֶת הַ/מָּא֤וֹר הַ/קָּטֹן֙ לְ/מֶמְשֶׁ֣לֶת
    הַ/לַּ֔יְלָה וְ/אֵ֖ת הַ/כּוֹכָבִֽים־־־׃
translation:
  text: 'And God made the two great lights: the greater light to rule the day, and
    the lesser light to rule the night, and the stars.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'and also the stars.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: made
  alternatives:
  - fashioned
  - appointed
  lexicon: HALOT
  rationale: The verb עשה commonly means 'make/do.' 'Made' is the plain and natural
    rendering here. 'Appointed' would overinterpret the function of the lights from
    the surrounding context rather than this verb itself.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In Genesis 1, אֱלֹהִים with singular verbal agreement refers to the one
    God; 'God' is the standard and accurate English rendering.
- source_word: שְׁנֵי הַמְּאֹרֹת הַגְּדֹלִים
  chosen: the two great lights
  alternatives:
  - the two large luminaries
  - the two great luminaries
  lexicon: HALOT
  rationale: מָאוֹר denotes a light-bearing body or luminary. 'Lights' is more natural
    in modern English and fits the context, while still preserving the concrete sense.
    'Great' reflects גְּדֹלִים straightforwardly.
- source_word: הַמָּאוֹר הַגָּדֹל
  chosen: the greater light
  alternatives:
  - the great light
  - the larger light
  lexicon: HALOT
  rationale: Although literally 'the great light,' English idiom in a paired comparison
    with 'the lesser light' is best expressed as 'the greater light.' This preserves
    the contrast intended by גדול/קטן.
- source_word: לְמֶמְשֶׁלֶת הַיּוֹם
  chosen: to rule the day
  alternatives:
  - for dominion over the day
  - to govern the day
  lexicon: HALOT
  rationale: מֶמְשֶׁלֶת denotes rule or dominion. 'To rule the day' is concise, natural,
    and faithful to the infinitival sense introduced by לְ.
- source_word: הַמָּאוֹר הַקָּטֹן
  chosen: the lesser light
  alternatives:
  - the small light
  - the smaller light
  lexicon: HALOT
  rationale: קָטֹן means small/lesser. In contrast with 'the greater light,' 'the
    lesser light' is the most idiomatic and balanced English rendering.
- source_word: לְמֶמְשֶׁלֶת הַלַּיְלָה
  chosen: to rule the night
  alternatives:
  - for dominion over the night
  - to govern the night
  lexicon: HALOT
  rationale: Same construction and sense as the previous phrase; consistency is important
    here.
- source_word: וְאֵת הַכּוֹכָבִים
  chosen: and the stars
  alternatives:
  - also the stars
  lexicon: HALOT
  rationale: The direct-object marker with conjunction introduces an additional created
    object. 'And the stars' preserves the Hebrew's terse add-on effect. 'Also the
    stars' is possible but slightly more interpretive.
