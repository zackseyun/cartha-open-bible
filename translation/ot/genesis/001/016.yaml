theological_decisions:
- issue: Rendering of the celestial bodies without naming sun and moon
  chosen_reading: Retain 'greater light' and 'lesser light' rather than 'sun' and
    'moon.'
  alternative_readings:
  - the sun and the moon
  rationale: The Hebrew text deliberately uses מָאוֹר ('light/luminary') rather than
    the ordinary names for sun and moon. Preserving that wording respects the source
    text's diction and avoids importing terms not present in the verse. This also
    fits the translation philosophy of original-language primacy over translation
    tradition.
  doctrine_reference: Translation philosophy §1, §5
