id: GEN.1.28
reference: Genesis 1:28
source:
  edition: WLC
  text: וַ/יְבָ֣רֶךְ אֹתָ/ם֮ אֱלֹהִים֒ וַ/יֹּ֨אמֶר לָ/הֶ֜ם אֱלֹהִ֗ים פְּר֥וּ וּ/רְב֛וּ וּ/מִלְא֥וּ אֶת הָ/אָ֖רֶץ וְ/כִבְשֻׁ֑/הָ וּ/רְד֞וּ בִּ/דְגַ֤ת הַ/יָּם֙ וּ/בְ/ע֣וֹף הַ/שָּׁמַ֔יִם וּ/בְ/כָל חַיָּ֖ה הָֽ/רֹמֶ֥שֶׂת עַל הָ/אָֽרֶץ־־־׃
translation:
  text: And God blessed them[a], and God said to them, “Be fruitful, and multiply, and fill the earth, and subdue it, and rule over the fish of the sea, and over the birds of the heavens[b], and over every living thing that moves on the earth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have dominion over' for 'rule over.'
    reason: lexical_alternative
  - marker: b
    text: Or 'every living creature that creeps on the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבָרֶךְ
  chosen: blessed
  alternatives:
  - pronounced a blessing on
  lexicon: HALOT
  rationale: The piel of ברך here denotes bestowal of blessing, not merely speaking well of. 'Blessed' is the standard, natural English equivalent and fits the performative context.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In Genesis 1 the plural form with singular verbal agreement refers to the one God of Israel; 'God' is the correct English rendering.
- source_word: פְּרוּ
  chosen: Be fruitful
  alternatives:
  - Bear fruit
  - Have offspring
  lexicon: HALOT
  rationale: The imperative calls for fertility/procreation. 'Be fruitful' preserves the established idiom and matches the Hebrew well without over-paraphrase.
- source_word: וּרְבוּ
  chosen: multiply
  alternatives:
  - become many
  - increase
  lexicon: HALOT
  rationale: The verb רבה in this imperative context refers to increasing in number. 'Multiply' is concise and idiomatic in English, especially paired with 'be fruitful.'
- source_word: וּמִלְאוּ
  chosen: fill
  alternatives:
  - fill up
  lexicon: HALOT
  rationale: The verb מלא means to fill. 'Fill the earth' is the plain sense; 'fill up' is possible but less natural and can imply a nuance not required by the Hebrew.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In the cosmic creation context of Genesis 1, אֶרֶץ refers to the earth/world rather than a localized land. 'The earth' best fits the scope.
- source_word: וְכִבְשֻׁהָ
  chosen: subdue it
  alternatives:
  - bring it into subjection
  lexicon: HALOT
  rationale: כבש carries the sense of bringing under control or subduing. 'Subdue it' is the most direct and conventional rendering. It preserves the strength of the verb without importing exploitative connotations beyond the text itself.
- source_word: וּרְדוּ
  chosen: rule over
  alternatives:
  - have dominion over
  - govern
  lexicon: HALOT
  rationale: רדה denotes exercising rule or dominion. 'Rule over' is clear modern English and slightly more accessible than 'have dominion,' while preserving the authority sense.
- source_word: בִּדְגַת הַיָּם
  chosen: the fish of the sea
  alternatives:
  - the sea creatures
  lexicon: HALOT
  rationale: The construct phrase specifically names fish, not sea life in general. 'The fish of the sea' is therefore more precise.
- source_word: בְעוֹף הַשָּׁמַיִם
  chosen: the birds of the heavens
  alternatives:
  - the birds of the sky
  - the flying creatures of the heavens
  lexicon: HALOT
  rationale: עוֹף can denote flying creatures broadly, but in this context 'birds' is the most natural and likely sense. 'Of the heavens' is more formally aligned with the Hebrew than 'of the sky,' while still understandable.
- source_word: בְכָל חַיָּה
  chosen: every living thing
  alternatives:
  - every living creature
  - every beast
  lexicon: HALOT
  rationale: חיה is a broad term for living creature/animal. 'Every living thing' captures the breadth here and avoids narrowing the reference to wild beasts alone.
- source_word: הָרֹמֶשֶׂת
  chosen: that moves
  alternatives:
  - that creeps
  - that swarms
  lexicon: HALOT
  rationale: The participle from רמש refers to moving along the ground, often of small creatures. 'That moves' is broad enough for the category in context; 'creeps' is possible but can sound overly narrow or pejorative in modern English.
- source_word: עַל הָאָרֶץ
  chosen: on the earth
  alternatives:
  - upon the earth
  - on the land
  lexicon: HALOT
  rationale: This locative phrase is straightforward. 'On the earth' matches the broader creation setting better than 'on the land.'
