theological_decisions:
- issue: Strength of humanity's mandate toward creation in כבש and רדה
  chosen_reading: Retain strong governance language with 'subdue it' and 'rule over' without softening to stewardship-only terminology.
  alternative_readings:
  - care for it
  - be stewards of it
  - have dominion over it
  rationale: The Hebrew verbs are stronger than mere caretaking language. The translation preserves the text's force while avoiding interpretive expansion toward either exploitative domination or a softened ecological paraphrase. This follows the principle of not importing doctrinal or ethical claims beyond the source text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Scope of הָאָרֶץ
  chosen_reading: Translate as 'the earth' rather than 'the land.'
  alternative_readings:
  - the land
  rationale: Within Genesis 1's universal creation account, the referent is cosmic/global rather than territorial. This is a contextual decision with theological implications for the universality of the human commission.
  doctrine_reference: Translation philosophy §1
