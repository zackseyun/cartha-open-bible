id: GEN.6.10
reference: Genesis 6:10
source:
  edition: WLC
  text: וַ/יּ֥וֹלֶד נֹ֖חַ שְׁלֹשָׁ֣ה בָנִ֑ים אֶת שֵׁ֖ם אֶת חָ֥ם וְ/אֶת יָֽפֶת־־־׃
translation:
  text: 'And Noah fathered three sons: Shem[a], Ham, and Japheth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'begot three sons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹלֶד
  chosen: fathered
  alternatives:
  - begot
  - had
  lexicon: HALOT
  rationale: From ילד in the Hiphil/waw-consecutive narrative form, referring to a male parent causing offspring to be born. 'Fathered' is natural modern English and preserves the specifically paternal sense better than the broader 'had'; 'begot' is more formal/traditional but less readable.
- source_word: שְׁלֹשָׁה בָנִים
  chosen: three sons
  alternatives:
  - three children
  lexicon: HALOT
  rationale: בָנִים literally means 'sons,' not merely 'children.' This follows the gender-accurate principle and matches the named male offspring in the verse.
- source_word: אֶת שֵׁם אֶת חָם וְאֶת יָפֶת
  chosen: Shem, Ham, and Japheth
  lexicon: HALOT
  rationale: אֶת marks the definite direct objects introducing the three names. Standard English style lists the names after a colon rather than repeating object markers. Names are transliterated per translation philosophy.
- source_word: נֹחַ
  chosen: Noah
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name נֹחַ.
