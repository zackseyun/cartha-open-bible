- timestamp: '2026-04-21T00:25:46Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/006/006.json
  category: awkward_english
  tier: 1
  from: to his heart
  to: in his heart
  rationale: While 'to his heart' is a literal translation of the Hebrew preposition אֶל, the more idiomatic English rendering for this expression of internal feeling is 'in his heart.' The Hebrew phrase אֶל־לֵב often carries the sense of 'within oneself' (e.g., Gen 8:21, 'the LORD said in his heart'). The current rendering is understandable but slightly stiff compared to the more natural 'in his heart,' which conveys the same meaning of deep, internal grief.
- timestamp: '2026-05-07T00:17:26Z'
  adjudicator: maintainer
  category: theological_clarity
  tier: 2
  from: regretted that he had made man on the earth, and he was grieved in his heart
  to: grieved over having made man on the earth, and he was pained in his heart
  rationale: The English verb 'regretted' carries the implication 'I should not have done this,' which when applied to God can be heard as diminishing divine foresight and sovereignty. The Hebrew נחם (Niphal) expresses sorrow over a prior action, not cognitive surprise or moral fault — so 'grieved over' preserves the emotional weight without that connotation. The second verb עצב (Hitpael) carries the force of an inward wound; rendering it 'was pained' (in place of 'was grieved') sharpens the parallelism (sorrow → inward wound) and avoids doubling now that the first verb carries 'grieved.' This preserves the anthropopathism rather than softening it, while removing the doctrinally misleading English overtone.
