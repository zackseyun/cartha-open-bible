id: GEN.6.6
reference: Genesis 6:6
source:
  edition: WLC
  text: וַ/יִּנָּ֣חֶם יְהוָ֔ה כִּֽי עָשָׂ֥ה אֶת הָֽ/אָדָ֖ם בָּ/אָ֑רֶץ וַ/יִּתְעַצֵּ֖ב אֶל לִבּֽ/וֹ־־־׃
translation:
  text: And Yahweh grieved over having made man on the earth[c][b][a], and he was pained in his heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'humankind' or 'humanity.' Hebrew 'adam' here refers collectively to the human race.
    reason: lexical_alternative
  - marker: b
    text: Or 'was sorry that he had made' or 'regretted that he had made.' The Hebrew נחם (Niphal) expresses divine sorrow over a prior action — not moral repentance and not cognitive surprise.
    reason: lexical_alternative
  - marker: c
    text: Or 'to his heart'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּנָּחֶם
  chosen: grieved over
  alternatives:
  - was sorry
  - regretted
  - relented
  - repented
  lexicon: HALOT
  rationale: In the Niphal, נחם here expresses deep divine sorrow over a prior action. 'Grieved over' carries the emotional weight of the Hebrew without the modern English implication in 'regretted' that the actor thinks 'I should not have done this' — a connotation that, applied to God, can be heard as diminishing divine foresight and sovereignty. 'Was sorry' is acceptable but softer than the Hebrew. 'Repented' is misleading (implies sin). 'Relented' fits judgment-withdrawal contexts (Exod 32:14; Jonah 3:10), not reflective sorrow over creation.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Follows the project's default rendering for the divine name YHWH per DOCTRINE.md.
- source_word: כִּי
  chosen: that
  alternatives:
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content/cause of the regret. With the verb rendered as 'grieved over,' the clause is absorbed into a gerund construction ('grieved over having made…'), which reads more naturally in English than the alternative 'grieved that he had made.'
- source_word: עָשָׂה
  chosen: had made
  alternatives:
  - made
  - had done
  lexicon: HALOT
  rationale: Refers to God's prior act of creating humanity. With 'grieved over having made,' the gerund 'made' inside the gerund construction 'having made' carries the same temporal force as the past perfect.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - the man
  - humanity
  lexicon: HALOT
  rationale: אָדָם here is collective for the human race, not the individual Adam alone. Per the project's gender-accurate policy, 'man' can represent humanity in English when the source has representative force. 'Humankind' is possible, but 'made man on the earth' preserves the cadence and traditional collective sense.
- source_word: בָּאָרֶץ
  chosen: on the earth
  alternatives:
  - in the earth
  - in the land
  lexicon: HALOT
  rationale: In Genesis this commonly refers to the earth/world rather than a specific land. 'On the earth' is the most natural English rendering here.
- source_word: וַיִּתְעַצֵּב
  chosen: was pained
  alternatives:
  - was grieved
  - was hurt
  - was wounded
  - was saddened
  lexicon: HALOT
  rationale: The Hitpael of עצב conveys an inward wound — pain rather than mere sadness. 'Was pained' captures the wound-like force of the verb and avoids redundancy now that the first verb is rendered 'grieved over.' Together the pair preserves the Hebrew's two-beat structure (sorrow → inward wound) more sharply than the previous 'regretted / was grieved.'
- source_word: אֶל־לִבּוֹ
  chosen: to his heart
  alternatives:
  - in his heart
  - at his heart
  lexicon: HALOT
  rationale: The Hebrew preposition אֶל is literally 'to,' and the phrase conveys inward, profound grief. 'To his heart' preserves the Hebrew imagery more closely than the smoother but less literal 'in his heart.'
