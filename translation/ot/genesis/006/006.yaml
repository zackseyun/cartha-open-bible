theological_decisions:
- issue: Anthropopathic language about God ('grieved over' / 'was pained')
  chosen_reading: Retain the text's direct portrayal of the LORD as grieving over and inwardly pained by what humanity had become, without softening it into mere appearance-language and without the modern-English 'regretted' connotation that God lacked foresight or judges his own act a mistake.
  alternative_readings:
  - The LORD appeared to grieve
  - The LORD relented
  - The LORD regretted
  rationale: Per the translation philosophy, theological tension should be preserved rather than resolved. The Hebrew explicitly attributes deep sorrow and inward pain to the LORD in human-relational terms. 'Grieved over' (for נחם Niphal) carries the emotional weight of the Hebrew without the 'I should not have done this' implication that 'regretted' carries in modern English — an implication that, applied to an all-knowing God, can be heard as diminishing sovereignty. 'Was pained' (for עצב Hitpael) renders the wound-like force of the verb directly and avoids doubling with the first verb.
  doctrine_reference: Translation philosophy §3; Affirmations (historic orthodoxy without flattening textual tension)
- issue: Collective sense of הָאָדָם
  chosen_reading: Render as 'man' in the representative/generic sense.
  alternative_readings:
  - humankind
  - humanity
  rationale: The context concerns the human race broadly. The project's policy prefers gender-accurate renderings matching the source's representative force rather than flattening to gender-neutral language by default.
  doctrine_reference: Translation philosophy §4; Contested terms table for אָדָם
