id: GEN.39.10
reference: Genesis 39:10
source:
  edition: WLC
  text: וַ/יְהִ֕י כְּ/דַבְּרָ֥/הּ אֶל יוֹסֵ֖ף י֣וֹם י֑וֹם וְ/לֹא שָׁמַ֥ע אֵלֶ֛י/הָ לִ/שְׁכַּ֥ב אֶצְלָ֖/הּ לִ/הְי֥וֹת עִמָּֽ/הּ־׀־׃
translation:
  text: And it happened[a], as she spoke to Yosef day after day, that he did not listen to her, to lie beside her or to be with her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to lie with her.' The Hebrew can carry a sexual sense; 'to lie beside her' preserves the wording while allowing the following phrase, 'to be with her,' to retain its own force.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing the next development in the story. 'And it happened' preserves the Hebrew discourse function without archaic English.
- source_word: כְּדַבְּרָהּ
  chosen: as she spoke
  alternatives:
  - when she spoke
  - as she kept speaking
  lexicon: HALOT
  rationale: The prefixed כ plus infinitive/verb form with 3fs suffix gives a temporal sense. 'As she spoke' fits the construction, while the following 'day after day' supplies the iterative force.
- source_word: יוֹסֵף
  chosen: Yosef
  alternatives:
  - Joseph
  rationale: Personal names are transliterated by standard conventions per project philosophy. 'Yosef' reflects the Hebrew name directly.
- source_word: יוֹם יוֹם
  chosen: day after day
  alternatives:
  - day by day
  - every day
  lexicon: HALOT
  rationale: The repeated noun expresses continual repetition. 'Day after day' captures the persistent, ongoing pressure more naturally than a bare literal repetition.
- source_word: שָׁמַע אֵלֶיהָ
  chosen: did not listen to her
  alternatives:
  - did not obey her
  - did not heed her
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means to listen to or heed someone. 'Listen to her' is the broadest and most natural English rendering here, with the refusal context making the moral resistance clear.
- source_word: לִשְׁכַּב אֶצְלָהּ
  chosen: to lie beside her
  alternatives:
  - to lie with her
  - to sleep with her
  lexicon: HALOT
  rationale: שׁכב can denote lying down and often sexual relations. Because the verse pairs this with 'to be with her,' a more spatially literal rendering here avoids collapsing both phrases into one sexual euphemism while still fitting the seduction context.
- source_word: לִהְיוֹת עִמָּהּ
  chosen: or to be with her
  alternatives:
  - or to remain with her
  - or to be in her company
  lexicon: HALOT
  rationale: היה עם means to be with someone. In context it likely broadens the refusal beyond the sexual act itself to any compromising proximity; 'be with her' preserves that breadth and the Hebrew parallelism.
