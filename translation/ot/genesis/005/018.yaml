id: GEN.5.18
reference: Genesis 5:18
source:
  edition: WLC
  text: וַֽ/יְחִי יֶ֕רֶד שְׁתַּ֧יִם וְ/שִׁשִּׁ֛ים שָׁנָ֖ה וּ/מְאַ֣ת שָׁנָ֑ה וַ/יּ֖וֹלֶד
    אֶת חֲנֽוֹךְ־־׃
translation:
  text: Jered lived one hundred sixty-two years and fathered Enoch.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - lived on
  lexicon: HALOT
  rationale: The wayyiqtol of חיה in the genealogy formula is idiomatically rendered
    'lived,' introducing the age statement.
- source_word: יֶרֶד
  chosen: Jered
  alternatives:
  - Yered
  rationale: Personal names are transliterated by standard English convention; 'Jered'
    is the established English form.
- source_word: שְׁתַּיִם וְשִׁשִּׁים ... וּמְאַת שָׁנָה
  chosen: one hundred sixty-two years
  alternatives:
  - a hundred and sixty-two years
  - one hundred and sixty-two years
  lexicon: HALOT
  rationale: The Hebrew number sequence literally gives 'two and sixty years and a
    hundred year,' which in idiomatic English is 'one hundred sixty-two years.' 'Years'
    is plural in English though Hebrew uses singular שנה in this construction.
- source_word: וַיּוֹלֶד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: ילד in genealogical contexts commonly means 'fathered/became the father
    of.' 'Fathered' is concise, natural modern English, and preserves the genealogical
    sense without archaic 'begot.'
- source_word: אֶת חֲנוֹךְ
  chosen: Enoch
  alternatives:
  - Hanokh
  rationale: The direct-object marker אֶת is untranslated in English. The personal
    name is transliterated by standard convention as 'Enoch.'
