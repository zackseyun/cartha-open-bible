id: GEN.23.15
reference: Genesis 23:15
source:
  edition: WLC
  text: אֲדֹנִ֣/י שְׁמָעֵ֔/נִי אֶרֶץ֩ אַרְבַּ֨ע מֵאֹ֧ת שֶֽׁקֶל כֶּ֛סֶף בֵּינִ֥/י וּ/בֵֽינְ/ךָ֖ מַה הִ֑וא וְ/אֶת מֵתְ/ךָ֖ קְבֹֽר־־־׃
translation:
  text: 'My lord[a], listen to me: a piece of land worth four hundred shekels of silver—what is that between me and you? Bury your dead.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'land—four hundred shekels of silver—what is that between me and you?' The Hebrew is elliptical and rhetorical, minimizing the price in the course of negotiation.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנִי
  chosen: My lord
  alternatives:
  - Sir
  - my master
  lexicon: HALOT
  rationale: A respectful address to Ephron, not a divine title. 'My lord' preserves the social deference and matches the singular addressee.
- source_word: שְׁמָעֵנִי
  chosen: listen to me
  alternatives:
  - hear me
  lexicon: HALOT
  rationale: Imperative of שׁמע in a polite appeal. 'Listen to me' is natural modern English while preserving the direct request.
- source_word: אֶרֶץ
  chosen: a piece of land
  alternatives:
  - land
  - field
  lexicon: HALOT
  rationale: In this negotiation context, the term refers to a tract/property rather than land in the abstract. 'A piece of land' communicates the concrete parcel under discussion.
- source_word: אַרְבַּע מֵאֹת שֶׁקֶל כֶּסֶף
  chosen: worth four hundred shekels of silver
  alternatives:
  - four hundred shekels of silver
  - land of four hundred shekels of silver
  lexicon: HALOT
  rationale: This phrase states the price/value of the property. Supplying 'worth' makes the elliptical Hebrew idiomatic in English without adding new content.
- source_word: בֵּינִי וּבֵינְךָ
  chosen: between me and you
  alternatives:
  - between us
  lexicon: HALOT
  rationale: The Hebrew explicitly uses first and second person singular. 'Between me and you' preserves the personal, rhetorical tone of the negotiation.
- source_word: מַה הִוא
  chosen: what is that
  alternatives:
  - what is it
  - what is that worth
  lexicon: HALOT
  rationale: A rhetorical minimization of the sum in relation to the parties. 'What is that' captures the idiom naturally in English.
- source_word: וְאֶת מֵתְךָ קְבֹר
  chosen: So bury your dead
  alternatives:
  - and bury your dead
  - then bury your dead
  lexicon: HALOT
  rationale: The conjunction links the rhetorical question to the practical conclusion. 'So' conveys the inferential force in smooth English; 'your dead' reflects the singular Hebrew with collective sense, idiomatic in English.
