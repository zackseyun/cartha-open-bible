id: GEN.23.18
reference: Genesis 23:18
source:
  edition: WLC
  text: לְ/אַבְרָהָ֥ם לְ/מִקְנָ֖ה לְ/עֵינֵ֣י בְנֵי חֵ֑ת בְּ/כֹ֖ל בָּאֵ֥י שַֽׁעַר עִירֽ/וֹ־־׃
translation:
  text: to Abraham as a possession before the eyes of the sons of Heth[a], before all who entered the gate of his city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Hittites' for 'the sons of Heth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאַבְרָהָם
  chosen: to Abraham
  alternatives:
  - for Abraham
  lexicon: HALOT
  rationale: The prefixed ל marks the beneficiary/recipient of the transaction. 'To Abraham' fits the legal-transfer context and reads naturally in English.
- source_word: לְמִקְנָה
  chosen: as a possession
  alternatives:
  - for a purchase
  - as property
  lexicon: HALOT
  rationale: מִקְנָה denotes acquired property/possession. In this legal setting, 'as a possession' best conveys the result of the transaction rather than merely the act of buying.
- source_word: לְעֵינֵי
  chosen: before the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: This idiom signals public visibility and legal witness. 'Before the eyes of' preserves the Hebrew imagery while remaining understandable.
- source_word: בְנֵי חֵת
  chosen: the sons of Heth
  alternatives:
  - the Hittites
  - the descendants of Heth
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Heth.' Because the narrative repeatedly uses this familial/ethnic designation in the transaction scene, the more literal rendering is preferred here; 'Hittites' is a valid contextual equivalent.
- source_word: בְּכֹל
  chosen: in the presence of all
  alternatives:
  - before all
  - among all
  lexicon: HALOT
  rationale: With the following participle phrase, this introduces the full body of witnesses. 'In the presence of all' makes the legal-public force explicit in idiomatic English.
- source_word: בָּאֵי
  chosen: who entered
  alternatives:
  - who came in
  - entering
  lexicon: HALOT
  rationale: The participle refers to those coming into the city gate area, a standard place of public/legal business. 'Who entered' gives a smooth relative-clause rendering in English.
- source_word: שַׁעַר עִירוֹ
  chosen: the gate of his city
  alternatives:
  - his city gate
  - the gate of his town
  lexicon: HALOT
  rationale: The construct phrase is rendered straightforwardly. 'The gate of his city' preserves the Hebrew structure and the civic-legal setting associated with the city gate.
