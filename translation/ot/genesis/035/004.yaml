theological_decisions:
- issue: Nature of the objects surrendered and hidden
  chosen_reading: The verse refers to illicit cultic objects ('foreign gods') and
    associated jewelry without specifying more than the Hebrew states.
  alternative_readings:
  - The rings were merely valuable ornaments
  - The rings themselves had amuletic or idolatrous significance
  rationale: The text clearly identifies 'foreign gods' and separately mentions rings
    in their ears, but it does not explicitly explain whether the rings were intrinsically
    idolatrous or simply associated with prior pagan practice. The translation preserves
    that textual restraint.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
