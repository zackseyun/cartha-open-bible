id: GEN.35.4
reference: Genesis 35:4
source:
  edition: WLC
  text: וַ/יִּתְּנ֣וּ אֶֽל יַעֲקֹ֗ב אֵ֣ת כָּל אֱלֹהֵ֤י הַ/נֵּכָר֙ אֲשֶׁ֣ר בְּ/יָדָ֔/ם
    וְ/אֶת הַ/נְּזָמִ֖ים אֲשֶׁ֣ר בְּ/אָזְנֵי/הֶ֑ם וַ/יִּטְמֹ֤ן אֹתָ/ם֙ יַעֲקֹ֔ב תַּ֥חַת
    הָ/אֵלָ֖ה אֲשֶׁ֥ר עִם שְׁכֶֽם־־־־׃
translation:
  text: So they gave Jacob all the foreign gods that were in their hands, and the
    rings that were in their ears, and Jacob hid them under the terebinth that was
    near Shechem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'earrings'; the Hebrew term can denote rings worn in different places,
      but here the following phrase specifies that these were in their ears.
    reason: lexical_alternative
  - marker: b
    text: Or 'oak'; the Hebrew word likely refers more specifically to a terebinth
      tree.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  chosen: So they gave
  alternatives:
  - And they gave
  - Then they gave
  lexicon: HALOT
  rationale: Wayyiqtol of נתן advances the narrative. 'So they gave' preserves the
    sequential force in natural English.
- source_word: אֶל יַעֲקֹב
  chosen: Jacob
  alternatives:
  - to Jacob
  lexicon: HALOT
  rationale: The preposition marks the indirect object. In English, 'gave Jacob' is
    idiomatic and preserves the sense without awkwardness.
- source_word: כָּל אֱלֹהֵי הַנֵּכָר
  chosen: all the foreign gods
  alternatives:
  - all the gods of the foreigner
  - all the strange gods
  - all the foreign deities
  lexicon: HALOT
  rationale: The phrase refers to non-covenant household idols or deities. 'Foreign
    gods' is the standard, clear rendering of אֱלֹהֵי הַנֵּכָר and fits the immediate
    context of putting away illicit worship objects.
- source_word: אֲשֶׁר בְּיָדָם
  chosen: that were in their hands
  alternatives:
  - that they had
  - which were in their possession
  lexicon: HALOT
  rationale: Literally 'which were in their hand.' 'In their hands' preserves the
    concrete Hebrew expression while remaining understandable.
- source_word: וְאֶת הַנְּזָמִים
  chosen: and the rings
  alternatives:
  - and the earrings
  - and the nose-rings
  lexicon: HALOT
  rationale: נזמים can denote rings worn in various places, including ears and nose.
    Because the following phrase specifies 'in their ears,' 'rings' lets the location
    phrase do the narrowing without redundancy.
- source_word: אֲשֶׁר בְּאָזְנֵיהֶם
  chosen: that were in their ears
  alternatives:
  - which were in their ears
  - from their ears
  lexicon: HALOT
  rationale: The Hebrew is locative, not explicitly separative. 'That were in their
    ears' closely follows the source and avoids adding 'from' beyond the text.
- source_word: וַיִּטְמֹן אֹתָם
  chosen: and Jacob hid them
  alternatives:
  - and Jacob buried them
  - and Jacob concealed them
  lexicon: HALOT
  rationale: טמן means to hide, conceal, or bury. In this context of placing cultic
    objects under a tree, 'hid' is broad and faithful; 'buried' is possible but slightly
    more specific than the verb itself requires.
- source_word: תַּחַת הָאֵלָה
  chosen: under the terebinth
  alternatives:
  - under the oak
  - under the great tree
  lexicon: HALOT
  rationale: אֵלָה commonly refers to a terebinth rather than an oak. Following original-language
    primacy, 'terebinth' is preferred over the traditional but less precise 'oak.'
- source_word: אֲשֶׁר עִם שְׁכֶם
  chosen: that was near Shechem
  alternatives:
  - that was by Shechem
  - that was with Shechem
  lexicon: HALOT
  rationale: With a place name, עִם can denote proximity/association. 'Near Shechem'
    gives the natural English sense of location.
