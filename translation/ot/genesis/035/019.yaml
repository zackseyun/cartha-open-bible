id: GEN.35.19
reference: Genesis 35:19
source:
  edition: WLC
  text: וַ/תָּ֖מָת רָחֵ֑ל וַ/תִּקָּבֵר֙ בְּ/דֶ֣רֶךְ אֶפְרָ֔תָה הִ֖וא בֵּ֥ית לָֽחֶם׃
translation:
  text: So Rachel died and was buried on the way to Ephrath (that is, Bethlehem).
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ephrath may also be rendered 'Ephrathah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּמָת
  chosen: died
  alternatives:
  - passed away
  lexicon: HALOT
  rationale: From מות, the straightforward sense is physical death. 'Died' is the
    plain, direct English equivalent and avoids euphemism.
- source_word: רָחֵל
  chosen: Rachel
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: וַתִּקָּבֵר
  chosen: was buried
  alternatives:
  - was buried there
  - was interred
  lexicon: HALOT
  rationale: Nifal of קבר is naturally rendered as a passive, 'was buried.' 'There'
    is not explicit in the Hebrew and is therefore omitted from the main text.
- source_word: בְּדֶרֶךְ
  chosen: on the way
  alternatives:
  - by the way
  - on the road
  - along the way
  lexicon: HALOT
  rationale: דרך with prefixed ב here indicates location along a route. 'On the way'
    is idiomatic modern English and fits the travel context better than the more archaic
    'by the way.'
- source_word: אֶפְרָתָה
  chosen: Ephrath
  alternatives:
  - Ephrathah
  rationale: The Hebrew place name is traditionally represented as 'Ephrath' or 'Ephrathah.'
    'Ephrath' is a standard concise English form, while the fuller form is preserved
    as an alternative.
- source_word: הִוא
  chosen: that is
  alternatives:
  - which is
  - the same as
  lexicon: HALOT
  rationale: The pronoun functions appositionally to identify Ephrath with Bethlehem.
    'That is' communicates the explanatory force naturally in English.
- source_word: בֵּית לָחֶם
  chosen: Bethlehem
  alternatives:
  - Beth-lehem
  rationale: Standard English transliteration of the place name. Parentheses are used
    to reflect the explanatory aside signaled by 'that is.'
