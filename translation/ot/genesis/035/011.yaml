id: GEN.35.11
reference: Genesis 35:11
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ ל֨/וֹ אֱלֹהִ֜ים אֲנִ֨י אֵ֤ל שַׁדַּי֙ פְּרֵ֣ה וּ/רְבֵ֔ה גּ֛וֹי וּ/קְהַ֥ל גּוֹיִ֖ם יִהְיֶ֣ה מִמֶּ֑/ךָּ וּ/מְלָכִ֖ים מֵ/חֲלָצֶ֥י/ךָ יֵצֵֽאוּ׃
translation:
  text: And God said to him[a], “I am God Almighty. Be fruitful and multiply. A nation and an assembly of nations shall come from you[c][b], and kings shall come from your loins.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a company of nations.” The Hebrew קְהַל גּוֹיִם can denote an assembled group, company, or congregation of nations.
    reason: lexical_alternative
  - marker: b
    text: Literally “from your loins,” an idiom for physical descendants from one’s own body.
    reason: cultural_note
  - marker: c
    text: 'Hebrew: “El Shaddai”; traditionally rendered “God Almighty.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - god
  - gods
  lexicon: HALOT
  rationale: With singular verbal agreement and the narrative context of Israel's God speaking, the plural form functions as the singular divine title 'God'.
- source_word: אֵל שַׁדַּי
  chosen: God Almighty
  alternatives:
  - El Shaddai
  - God Shaddai
  lexicon: HALOT
  rationale: The phrase is a divine title. Following the translation philosophy to translate titles rather than transliterate them, 'God Almighty' best conveys the traditional and likely sense in readable English, while preserving the solemn self-identification.
- source_word: פְּרֵה וּרְבֵה
  chosen: Be fruitful and multiply
  alternatives:
  - Be fruitful and become many
  - Bear fruit and increase
  lexicon: HALOT
  rationale: These are second masculine singular imperatives echoing the creation/patriarchal blessing formula. 'Be fruitful and multiply' is the most natural and established English rendering that accurately reflects both verbs without unnecessary paraphrase.
- source_word: גּוֹי
  chosen: nation
  alternatives:
  - people
  - gentile nation
  lexicon: HALOT
  rationale: In patriarchal promise contexts, גּוֹי refers to a people-group constituted as a nation. 'Nation' is the most direct rendering here.
- source_word: קְהַל גּוֹיִם
  chosen: an assembly of nations
  alternatives:
  - a company of nations
  - a multitude of nations
  lexicon: HALOT
  rationale: קהל denotes an assembled group or congregation. 'Assembly of nations' is slightly more transparent to the Hebrew than the traditional 'company of nations,' while remaining natural English.
- source_word: יִהְיֶה מִמֶּךָּ
  chosen: shall come from you
  alternatives:
  - shall be from you
  - shall arise from you
  lexicon: HALOT
  rationale: Literally 'shall be from you,' but in English the idiom of descent is better expressed as 'shall come from you.' This preserves the genealogical sense without wooden phrasing.
- source_word: מְלָכִים
  chosen: kings
  alternatives:
  - royal rulers
  lexicon: HALOT
  rationale: The noun straightforwardly means 'kings'; no expansion is needed.
- source_word: מֵחֲלָצֶיךָ
  chosen: from your loins
  alternatives:
  - from your body
  - from your descendants
  lexicon: HALOT
  rationale: The Hebrew idiom refers to physical descent from one's body, especially procreative lineage. 'From your loins' preserves the concrete patriarchal idiom more closely than the smoother but less vivid alternatives.
- source_word: יֵצֵאוּ
  chosen: shall come
  alternatives:
  - shall come forth
  - shall go out
  lexicon: HALOT
  rationale: In context of descendants issuing from Jacob, 'shall come' communicates emergence from lineage in idiomatic English. 'Go out' would sound spatially literal rather than genealogical.
