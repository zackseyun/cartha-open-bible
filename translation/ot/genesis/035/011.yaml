theological_decisions:
- issue: Rendering the divine title אֵל שַׁדַּי
  chosen_reading: God Almighty
  alternative_readings:
  - El Shaddai
  rationale: The translation philosophy directs that titles be translated rather than transliterated. 'God Almighty' is the standard meaningful rendering in English and does not import extra doctrinal content beyond the title itself.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2 (Translate titles; transliterate names)'
- issue: Degree of literalness in the promise formula
  chosen_reading: shall come from you / from your loins
  alternative_readings:
  - shall be from you / from your body
  rationale: The verse contains covenantal promise language about physical descent. The draft preserves the bodily lineage imagery in 'from your loins' while using idiomatic English elsewhere. This maintains theological and genealogical concreteness without unnecessary awkwardness.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1 and §5'
