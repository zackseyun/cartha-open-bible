id: GEN.35.9
reference: Genesis 35:9
source:
  edition: WLC
  text: וַ/יֵּרָ֨א אֱלֹהִ֤ים אֶֽל יַעֲקֹב֙ ע֔וֹד בְּ/בֹא֖/וֹ מִ/פַּדַּ֣ן אֲרָ֑ם וַ/יְבָ֖רֶךְ
    אֹתֽ/וֹ־׃
translation:
  text: God appeared to Jacob again when he came from Paddan-aram, and he blessed
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God revealed himself to Jacob again.' The Hebrew verb can denote appearing
      or making oneself seen.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרָא
  chosen: appeared
  alternatives:
  - was seen
  - revealed himself
  lexicon: HALOT
  rationale: The Niphal of ראה here denotes visible or manifest appearance. 'Appeared'
    is the standard natural English rendering and fits a divine self-manifestation
    without over-specifying the mode.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: With singular verbal agreement and the narrative context, the term clearly
    refers to the one God, so 'God' is the appropriate English rendering.
- source_word: עוֹד
  chosen: again
  alternatives:
  - still
  - yet
  - once more
  lexicon: HALOT
  rationale: In this context עוֹד marks repetition of a prior divine appearance, so
    'again' best captures the adverbial force in idiomatic English.
- source_word: בְּבֹאוֹ
  chosen: when he came
  alternatives:
  - in his coming
  - as he came
  - upon his return
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct with pronominal suffix is
    temporal here. 'When he came' is clear modern English and preserves the temporal
    sense without awkward literalism.
- source_word: מִפַּדַּן אֲרָם
  chosen: from Paddan-aram
  alternatives:
  - from Paddan Aram
  - out of Paddan-aram
  lexicon: HALOT
  rationale: This is a place name and should be transliterated rather than translated.
    'From' straightforwardly renders the prefixed מִן.
- source_word: וַיְבָרֶךְ אֹתוֹ
  chosen: and he blessed him
  alternatives:
  - and blessed him
  lexicon: HALOT
  rationale: ברך in the piel means 'bless.' Retaining both pronouns preserves the
    Hebrew clause structure and makes the subject-object relation explicit in English.
