theological_decisions:
- issue: Nature of the divine appearance
  chosen_reading: 'Render the event as a straightforward divine appearance: ''God
    appeared to Jacob again.'''
  alternative_readings:
  - God was seen by Jacob again
  - God revealed himself to Jacob again
  rationale: The verse reports a real divine manifestation without specifying mechanism.
    The translation preserves that theological tension and does not force a more abstract
    or visionary interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
