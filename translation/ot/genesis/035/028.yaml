id: GEN.35.28
reference: Genesis 35:28
source:
  edition: WLC
  text: וַ/יִּֽהְי֖וּ יְמֵ֣י יִצְחָ֑ק מְאַ֥ת שָׁנָ֖ה וּ/שְׁמֹנִ֥ים שָׁנָֽה׃
translation:
  text: And the days of Isaac were one hundred and eighty years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the days of Isaac were one hundred and eighty year,'' using ''days''
      as an idiom for lifespan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - came to be
  - amounted to
  lexicon: HALOT
  rationale: The waw-consecutive form of היה here functions as a simple narrative
    copula introducing Isaac's lifespan total. 'Were' is natural English and sufficiently
    formal.
- source_word: יְמֵי
  chosen: the days of
  alternatives:
  - the lifetime of
  - the years of
  lexicon: HALOT
  rationale: The construct 'days of' is a common Hebrew idiom for a person's lifespan.
    Retaining 'the days of' preserves the Hebrew expression while remaining understandable
    in English.
- source_word: יִצְחָק
  chosen: Isaac
  rationale: Standard English transliteration of the personal name יִצְחָק, in keeping
    with the policy to transliterate names.
- source_word: מְאַת שָׁנָה וּשְׁמֹנִים שָׁנָה
  chosen: one hundred and eighty years
  alternatives:
  - a hundred and eighty years
  lexicon: HALOT
  rationale: 'The Hebrew expresses the age total by apposition: ''a hundred year and
    eighty year.'' English idiom combines the numerals into ''one hundred and eighty
    years.'' The plural ''years'' reflects natural English number agreement rather
    than reproducing the Hebrew singular after numerals.'
- source_word: שָׁנָה
  chosen: years
  alternatives:
  - year
  lexicon: HALOT
  rationale: Although Hebrew uses singular שָׁנָה after the numerals in this construction,
    idiomatic English requires the plural 'years' for the total age statement.
