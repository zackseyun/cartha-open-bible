theological_decisions:
- issue: Relationship between past and future gift language in the patriarchal land promise
  chosen_reading: Render נָתַתִּי as past ('I gave') and the following verbs as future ('I will give'), preserving the text's tension between prior divine grant and future realization.
  alternative_readings:
  - Render נָתַתִּי as present perfect ('I have given') to stress continuing validity of the promise
  rationale: The Hebrew juxtaposes a prior act of divine giving with renewed future bestowal to Jacob and his offspring. The translation preserves that theological and temporal tension rather than smoothing it out.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
