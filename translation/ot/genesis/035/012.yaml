id: GEN.35.12
reference: Genesis 35:12
source:
  edition: WLC
  text: וְ/אֶת הָ/אָ֗רֶץ אֲשֶׁ֥ר נָתַ֛תִּי לְ/אַבְרָהָ֥ם וּ/לְ/יִצְחָ֖ק לְ/ךָ֣ אֶתְּנֶ֑/נָּה וּֽ/לְ/זַרְעֲ/ךָ֥ אַחֲרֶ֖י/ךָ אֶתֵּ֥ן אֶת הָ/אָֽרֶץ־־׃
translation:
  text: And the land that I gave to Abraham and to Isaac[a], I will give to you[b]; and to your offspring after you I will give the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I have given' to Abraham and to Isaac.
    reason: lexical_alternative
  - marker: b
    text: '''Offspring'' translates a collective singular that can also be rendered ''seed'' or ''descendants.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  lexicon: HALOT
  rationale: אֶרֶץ commonly means 'land/earth.' In the patriarchal promise context, 'the land' is the natural and covenantally specific rendering, more precise than 'earth' and more idiomatic than 'country.'
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: A simple relative pronoun is required. 'That' is natural modern English and preserves the restrictive sense.
- source_word: נָתַתִּי
  chosen: I gave
  alternatives:
  - I have given
  lexicon: HALOT
  rationale: The qatal form is best rendered here as simple past, referring to God's prior grant/promise to Abraham and Isaac. English present perfect is possible, but simple past reads more cleanly in the narrative while preserving the reference to an earlier act.
- source_word: לְאַבְרָהָם וּלְיִצְחָק
  chosen: to Abraham and to Isaac
  alternatives:
  - to Abraham and Isaac
  lexicon: HALOT
  rationale: The repeated preposition is retained in English for slight formal correspondence and emphasis, while remaining natural.
- source_word: לְךָ אֶתְּנֶנָּה
  chosen: I will give to you
  alternatives:
  - I will give it to you
  lexicon: HALOT
  rationale: The verb with 3fs suffix refers back to 'the land.' Because English can sound heavy with both explicit object and pronoun, the object is supplied by the preceding noun phrase and the clause is rendered smoothly as 'I will give to you.' The sense remains definite and personal.
- source_word: זַרְעֲךָ
  chosen: your offspring
  alternatives:
  - your seed
  - your descendants
  lexicon: HALOT
  rationale: זֶרַע is a collective singular. 'Offspring' preserves the singular collective force better than 'descendants' and is more natural in modern English than 'seed,' while still fitting covenant language.
- source_word: אַחֲרֶיךָ
  chosen: after you
  alternatives:
  - following you
  lexicon: HALOT
  rationale: This straightforward temporal/posterity expression is best rendered literally as 'after you.'
- source_word: אֶתֵּן אֶת הָאָרֶץ
  chosen: I will give the land
  alternatives:
  - I will give this land
  lexicon: HALOT
  rationale: The repetition of 'give' and 'the land' is preserved rather than reduced, since the Hebrew intentionally restates the promise for Jacob's offspring.
