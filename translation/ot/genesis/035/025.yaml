id: GEN.35.25
reference: Genesis 35:25
source:
  edition: WLC
  text: וּ/בְנֵ֤י בִלְהָה֙ שִׁפְחַ֣ת רָחֵ֔ל דָּ֖ן וְ/נַפְתָּלִֽי׃
translation:
  text: 'And the sons of Bilhah, Rachel’s female servant: Dan and Naphtali.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Rachel’s maidservant.” The Hebrew term denotes a female servant of lower
      social status; in some contexts it can carry the sense of a female slave.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: And the sons of
  alternatives:
  - And the children of
  - Now the sons of
  lexicon: HALOT
  rationale: בְנֵי is the construct plural of בֵּן, here introducing the next subset
    in a genealogical list. 'Sons of' is the most direct and contextually appropriate
    rendering; 'And' reflects the prefixed conjunction and preserves the list structure.
- source_word: בִלְהָה
  chosen: Bilhah
  rationale: Proper personal name; transliterated according to the translation philosophy
    for names.
- source_word: שִׁפְחַת
  chosen: female servant
  alternatives:
  - maidservant
  - slave-girl
  - servant
  lexicon: HALOT
  rationale: שִׁפְחָה denotes a female servant/slave. In this genealogical context,
    'female servant' is clear modern English and preserves the social status without
    using an overly archaic term like 'maidservant.' 'Slave-girl' would be too specific
    and potentially misleading here, while plain 'servant' loses the feminine marking
    present in Hebrew.
- source_word: רָחֵל
  chosen: Rachel’s
  alternatives:
  - of Rachel
  rationale: Proper name, transliterated. The possessive form renders the construct
    relationship naturally in English.
- source_word: דָּן
  chosen: Dan
  rationale: Proper personal name; transliterated.
- source_word: וְ/נַפְתָּלִי
  chosen: and Naphtali
  rationale: Proper personal name with conjunction; transliterated and linked with
    'and' to preserve the simple coordination of the Hebrew list.
