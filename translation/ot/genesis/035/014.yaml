theological_decisions:
- issue: Nature of Jacob's act with the pillar and offerings
  chosen_reading: Render the actions descriptively as setting up a pillar, pouring out a drink offering, and pouring oil on it, without adding evaluative language.
  alternative_readings:
  - Interpret the act as explicitly consecrating the pillar
  - Interpret the act as memorializing the divine encounter
  rationale: The verse narrates ritual actions but does not itself explain their theological significance in explicit terms. To preserve theological tension and avoid importing interpretation beyond the text, the translation remains descriptive.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
