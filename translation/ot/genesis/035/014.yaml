id: GEN.35.14
reference: Genesis 35:14
source:
  edition: WLC
  text: וַ/יַּצֵּ֨ב יַעֲקֹ֜ב מַצֵּבָ֗ה בַּ/מָּק֛וֹם אֲשֶׁר דִּבֶּ֥ר אִתּ֖/וֹ מַצֶּ֣בֶת אָ֑בֶן וַ/יַּסֵּ֤ךְ עָלֶ֨י/הָ֙ נֶ֔סֶךְ וַ/יִּצֹ֥ק עָלֶ֖י/הָ שָֽׁמֶן־׃
translation:
  text: And Jacob set up a pillar in the place where he had spoken with him[a], a pillar of stone; and he poured out a drink offering on it[b], and he poured oil on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a stone pillar.'
    reason: lexical_alternative
  - marker: b
    text: That is, he poured out a libation on it.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּצֵּב
  chosen: set up
  alternatives:
  - erected
  - set in place
  lexicon: HALOT
  rationale: The Hiphil of נצב here denotes causing something to stand upright. 'Set up' is natural modern English and preserves the concrete action without sounding overly technical.
- source_word: מַצֵּבָה
  chosen: pillar
  alternatives:
  - standing stone
  - memorial stone
  lexicon: HALOT
  rationale: מַצֵּבָה refers to an erected stone monument or pillar. 'Pillar' is concise and idiomatic; 'standing stone' is possible but less natural in running translation. The following phrase 'pillar of stone' preserves the material specification.
- source_word: בַּמָּקוֹם
  chosen: in the place
  alternatives:
  - at the place
  lexicon: HALOT
  rationale: A straightforward locative rendering. 'In the place' matches the Hebrew preposition and reads smoothly with the relative clause.
- source_word: אֲשֶׁר דִּבֶּר אִתּוֹ
  chosen: where he had spoken with him
  alternatives:
  - where he spoke with him
  - where he had talked with him
  lexicon: HALOT
  rationale: The clause refers back to God's speaking with Jacob in the preceding context. English past perfect ('had spoken') clarifies the prior action relative to Jacob's setting up the pillar. The subject is contextually God, but the Hebrew leaves it implicit in the relative clause, so the translation preserves that structure.
- source_word: מַצֶּבֶת אָבֶן
  chosen: a pillar of stone
  alternatives:
  - a stone pillar
  lexicon: HALOT
  rationale: This appositional phrase further identifies the pillar's material. 'A pillar of stone' closely follows the Hebrew construct while remaining idiomatic.
- source_word: וַיַּסֵּךְ
  chosen: poured out
  alternatives:
  - poured
  lexicon: HALOT
  rationale: With נֶסֶךְ as its object, the verb denotes the act of pouring out a libation. 'Poured out' captures the ritual nuance better than the simpler 'poured'.
- source_word: נֶסֶךְ
  chosen: a drink offering
  alternatives:
  - a libation
  lexicon: HALOT
  rationale: '''Drink offering'' is the standard accessible English rendering for the ritual libation. ''Libation'' is accurate but less transparent for modern readers.'
- source_word: וַיִּצֹק
  chosen: poured
  alternatives:
  - poured out
  lexicon: HALOT
  rationale: This second pouring verb is distinct from the previous one and governs שָׁמֶן. 'Poured' is sufficient and avoids unnecessary repetition of 'poured out' while preserving the concrete action.
- source_word: שָׁמֶן
  chosen: oil
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: The Hebrew simply says 'oil.' While olive oil is culturally likely, specifying 'olive' would add information not explicit in the text.
