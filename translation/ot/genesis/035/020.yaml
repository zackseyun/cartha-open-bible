id: GEN.35.20
reference: Genesis 35:20
source:
  edition: WLC
  text: וַ/יַּצֵּ֧ב יַעֲקֹ֛ב מַצֵּבָ֖ה עַל קְבֻרָתָ֑/הּ הִ֛וא מַצֶּ֥בֶת קְבֻֽרַת רָחֵ֖ל עַד הַ/יּֽוֹם־־־׃
translation:
  text: And Jacob set up a pillar over her grave[a]. It is the pillar of Rachel’s grave to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Rachel’s grave marker' or 'the pillar marking Rachel’s grave.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּצֵּב
  chosen: set up
  alternatives:
  - erected
  - placed
  lexicon: HALOT
  rationale: The verb from נצב in the Hiphil commonly means to set up or erect. 'Set up' is natural modern English and fits the action of establishing a memorial stone.
- source_word: מַצֵּבָה
  chosen: a pillar
  alternatives:
  - a memorial stone
  - a monument
  lexicon: HALOT
  rationale: The noun denotes a standing stone or pillar. 'Pillar' preserves the concrete image while remaining readable. 'Memorial stone' is interpretive and better left as an alternative nuance.
- source_word: עַל
  chosen: over
  alternatives:
  - upon
  - at
  lexicon: HALOT
  rationale: In context, the preposition indicates position relative to the grave. 'Over' is idiomatic in English for a marker placed above a burial site.
- source_word: קְבֻרָתָהּ
  chosen: her grave
  alternatives:
  - her burial place
  - her tomb
  lexicon: HALOT
  rationale: From קבורה, the term refers to burial or grave. 'Her grave' is concise and natural here. 'Burial place' is possible but less direct; 'tomb' may suggest a more elaborate structure than the text requires.
- source_word: הִוא
  chosen: It is
  alternatives:
  - This is
  lexicon: HALOT
  rationale: The pronoun refers back to the pillar and introduces an explanatory identification. 'It is' is the most straightforward rendering in English.
- source_word: מַצֶּבֶת קְבֻרַת רָחֵל
  chosen: the pillar of Rachel’s grave
  alternatives:
  - Rachel’s grave marker
  - the pillar marking Rachel’s grave
  lexicon: HALOT
  rationale: The construct chain is rendered transparently as 'the pillar of Rachel’s grave.' This keeps the formal relationship in the Hebrew while remaining understandable. More idiomatic alternatives are possible but slightly more interpretive.
- source_word: עַד הַיּוֹם
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom indicating continuance up to the narrator's present. 'To this day' is the conventional and natural English equivalent.
