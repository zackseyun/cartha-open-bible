id: GEN.35.24
reference: Genesis 35:24
source:
  edition: WLC
  text: בְּנֵ֣י רָחֵ֔ל יוֹסֵ֖ף וּ/בִנְיָמִֽן׃
translation:
  text: 'The sons of Rachel: Joseph and Benjamin.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The children of
  - The descendants of
  lexicon: HALOT
  rationale: Construct plural of בֵּן here introduces a genealogical list. 'Sons of'
    is the most direct and contextually precise rendering, since the verse immediately
    names two male offspring. 'Children of' is possible in some contexts but is less
    exact here.
- source_word: רָחֵל
  chosen: Rachel
  rationale: Personal name transliterated according to standard English convention,
    consistent with the translation philosophy to transliterate names rather than
    translate them.
- source_word: יוֹסֵף
  chosen: Joseph
  rationale: Personal name transliterated by standard English convention.
- source_word: וּ/בִנְיָמִן
  chosen: and Benjamin
  rationale: The conjunction ו is rendered with the simple coordinating 'and'; the
    personal name בִנְיָמִן is transliterated as 'Benjamin' by standard English convention.
