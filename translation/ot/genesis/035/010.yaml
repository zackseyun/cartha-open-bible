theological_decisions:
- issue: Rendering the divine renaming formula without overstating whether the old
    name is absolutely abolished in all later usage
  chosen_reading: Your name will no longer be called Jacob, but Israel will be your
    name.
  alternative_readings:
  - Your name shall not be Jacob anymore, but Israel shall be your name.
  rationale: The Hebrew presents a formal renaming declaration, but later narrative
    still uses 'Jacob.' The translation preserves the speech act as stated without
    importing a harmonizing explanation or softening the force of the declaration.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
