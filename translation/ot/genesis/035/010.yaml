id: GEN.35.10
reference: Genesis 35:10
source:
  edition: WLC
  text: וַ/יֹּֽאמֶר ל֥/וֹ אֱלֹהִ֖ים שִׁמְ/ךָ֣ יַעֲקֹ֑ב לֹֽא יִקָּרֵא֩ שִׁמְ/ךָ֨ ע֜וֹד
    יַעֲקֹ֗ב כִּ֤י אִם יִשְׂרָאֵל֙ יִהְיֶ֣ה שְׁמֶ֔/ךָ וַ/יִּקְרָ֥א אֶת שְׁמ֖/וֹ יִשְׂרָאֵֽל־־־־׃
translation:
  text: And God said to him, “Your name is Jacob. Your name will no longer be called
    Jacob, but Israel will be your name.” So he called his name Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “And he named him Israel” / “And he called him Israel.” The Hebrew more
      literally reads, “And he called his name Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - god/gods
  lexicon: HALOT
  rationale: Although morphologically plural, in this context with singular verbal
    forms it clearly refers to the one God; standard English singular 'God' best reflects
    the referent.
- source_word: שִׁמְךָ
  chosen: your name
  lexicon: HALOT
  rationale: Direct and standard rendering of the noun with 2ms suffix; repeated for
    emphasis in Hebrew and retained in English.
- source_word: לֹא יִקָּרֵא
  chosen: will no longer be called
  alternatives:
  - shall not be called
  - will not be called anymore
  lexicon: HALOT
  rationale: Nifal of קרא here is passive/reflexive in naming sense, 'be called.'
    Adding 'no longer' brings out the force of לֹא ... עוֹד in natural English.
- source_word: עוֹד
  chosen: no longer
  alternatives:
  - anymore
  - again
  lexicon: HALOT
  rationale: In combination with the negation it idiomatically means cessation from
    this point onward; 'no longer' is the most natural English equivalent.
- source_word: כִּי אִם
  chosen: but
  alternatives:
  - rather
  - except that
  lexicon: HALOT
  rationale: 'Here the construction introduces contrast/replacement: not Jacob, but
    Israel. ''But'' is concise and idiomatic.'
- source_word: יִשְׂרָאֵל יִהְיֶה שְׁמֶךָ
  chosen: Israel will be your name
  alternatives:
  - your name will be Israel
  lexicon: HALOT
  rationale: This preserves the Hebrew emphasis on the new name while remaining natural
    English. Either word order is acceptable; this one mirrors the source more closely.
- source_word: וַיִּקְרָא אֶת־שְׁמוֹ יִשְׂרָאֵל
  chosen: So he called his name Israel
  alternatives:
  - And he named him Israel
  - And he called him Israel
  lexicon: HALOT
  rationale: The Hebrew literally says 'called his name Israel.' This rendering preserves
    the naming formula more transparently than the smoother but more interpretive
    'named him Israel.'
- source_word: יַעֲקֹב
  chosen: Jacob
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names.
