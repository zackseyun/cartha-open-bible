id: GEN.35.3
reference: Genesis 35:3
source:
  edition: WLC
  text: וְ/נָק֥וּמָה וְ/נַעֲלֶ֖ה בֵּֽית אֵ֑ל וְ/אֶֽעֱשֶׂה שָּׁ֣ם מִזְבֵּ֗חַ לָ/אֵ֞ל הָ/עֹנֶ֤ה אֹתִ/י֙ בְּ/י֣וֹם צָֽרָתִ֔/י וַ/יְהִי֙ עִמָּדִ֔/י בַּ/דֶּ֖רֶךְ אֲשֶׁ֥ר הָלָֽכְתִּי־־׃
translation:
  text: Let us rise and go up to Bethel[a], and there I will make an altar to the God who answered me in the day of my distress and was with me on the way that I went.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who answers me,' preserving the Hebrew participle as a more general or ongoing description of God.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָק֥וּמָה
  chosen: Let us rise
  alternatives:
  - Let us arise
  - Let us get up
  lexicon: HALOT
  rationale: Cohortative first person plural expressing exhortation. 'Let us rise' preserves the volitional force in natural modern English without sounding archaic.
- source_word: וְנַעֲלֶה
  chosen: and go up
  alternatives:
  - and ascend
  - and go
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' Because Bethel is a destination approached as an ascent, 'go up' preserves the spatial nuance better than the flatter 'go.'
- source_word: בֵּית אֵל
  chosen: Bethel
  alternatives:
  - Beth-el
  - house of God
  lexicon: HALOT
  rationale: This is a place name, so per translation philosophy names are transliterated rather than translated.
- source_word: וְאֶעֱשֶׂה שָּׁם מִזְבֵּחַ
  chosen: and there I will make an altar
  alternatives:
  - and there I will build an altar
  - and there I will make a sacrifice altar
  lexicon: HALOT
  rationale: עשה is broadly 'make/do.' With מִזְבֵּחַ, English idiom often uses 'build an altar,' but 'make an altar' stays closer to the Hebrew verb while remaining natural.
- source_word: לָאֵל
  chosen: to the God
  alternatives:
  - for God
  - to God
  lexicon: HALOT
  rationale: The prefixed ל marks direction/dedication. With the following participial clause specifying Jacob's God, 'to the God' is the most precise rendering.
- source_word: הָעֹנֶה אֹתִי
  chosen: who answered me
  alternatives:
  - who answers me
  - who responded to me
  lexicon: HALOT
  rationale: The participle can be rendered with relative force. In this retrospective narrative context, English past tense best conveys reference to God's prior response to Jacob's prayer/distress.
- source_word: בְּיוֹם צָרָתִי
  chosen: in the day of my distress
  alternatives:
  - on the day of my trouble
  - in the time of my distress
  lexicon: HALOT
  rationale: A fairly literal rendering that preserves the Hebrew idiom 'day of' while using 'distress' for צָרָה, which conveys affliction or trouble without overinterpreting.
- source_word: וַיְהִי עִמָּדִי
  chosen: and was with me
  alternatives:
  - and has been with me
  - and came to be with me
  lexicon: HALOT
  rationale: The wayyiqtol of היה in narrative is best rendered as simple past. 'Was with me' preserves the straightforward statement of divine presence.
- source_word: בַּדֶּרֶךְ אֲשֶׁר הָלָכְתִּי
  chosen: on the way that I went
  alternatives:
  - on the journey that I traveled
  - in the way that I walked
  - along the road on which I went
  lexicon: HALOT
  rationale: This keeps the concrete imagery of דרך plus הלך. 'On the way that I went' is slightly formal but transparent and close to the Hebrew structure.
