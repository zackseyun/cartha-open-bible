theological_decisions:
- issue: Reference of אֵל in Jacob's speech
  chosen_reading: the God
  alternative_readings:
  - God
  rationale: The Hebrew uses אֵל with article and a defining participial clause, identifying the deity by his action toward Jacob. Rendering 'the God' preserves the specificity of Jacob's confession without importing a broader doctrinal formulation beyond the text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition'
- issue: Temporal force of the participle הָעֹנֶה
  chosen_reading: who answered me
  alternative_readings:
  - who answers me
  rationale: Although the Hebrew participle can express characteristic or ongoing action, the immediate context recalls a specific past deliverance. The past-tense relative clause communicates the narrative sense while preserving the theological claim of God's responsive action.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it'
