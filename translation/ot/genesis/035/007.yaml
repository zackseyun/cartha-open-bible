theological_decisions:
- issue: Plural form אֱלֹהִים with plural verb נִגְלוּ in reference to Israel's God
  chosen_reading: 'Render as singular: ''God had revealed himself to him'''
  alternative_readings:
  - '''God appeared to him'''
  - 'more formally literal plural: ''God were revealed to him'''
  rationale: The Hebrew uses the common plural form אֱלֹהִים for the one true God,
    and the plural verb likely reflects attraction to the plural form or an archaic/plural-of-majesty-like
    usage in this naming formula. The context is Jacob's encounter with the one God
    at Bethel, so English should not suggest polytheism. Singular rendering preserves
    the intended referent without importing speculative theology.
  doctrine_reference: Affirmations; Translation philosophy 1 and 3
- issue: Whether to translate or transliterate אֵל בֵּית אֵל
  chosen_reading: Transliterate as the place-name 'El-bethel' in the main text
  alternative_readings:
  - '''God of Bethel'''
  rationale: Because the phrase functions as the name Jacob gives to the place, project
    policy favors transliterating names. The semantic value 'God of Bethel' is important
    and worth preserving in a footnote, but the main text should reflect the naming
    act as a proper name.
  doctrine_reference: Translation philosophy 2
