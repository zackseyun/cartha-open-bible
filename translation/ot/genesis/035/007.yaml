id: GEN.35.7
reference: Genesis 35:7
source:
  edition: WLC
  text: וַ/יִּ֤בֶן שָׁם֙ מִזְבֵּ֔חַ וַ/יִּקְרָא֙ לַ/מָּק֔וֹם אֵ֖ל בֵּֽית אֵ֑ל כִּ֣י
    שָׁ֗ם נִגְל֤וּ אֵלָי/ו֙ הָֽ/אֱלֹהִ֔ים בְּ/בָרְח֖/וֹ מִ/פְּנֵ֥י אָחִֽי/ו־׃
translation:
  text: There he built an altar and called the place El-bethel, because there God
    had revealed himself to him when he fled from his brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El-bethel likely means 'God of Bethel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: he built
  alternatives:
  - he constructed
  lexicon: HALOT
  rationale: Qal wayyiqtol of בנה, the standard narrative form meaning 'built.' 'He
    built' is the natural and sufficiently formal English rendering.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Adverb of place; rendered straightforwardly as 'there.' The repetition
    later in the verse is also preserved.
- source_word: מִזְבֵּחַ
  chosen: an altar
  lexicon: HALOT
  rationale: Standard rendering for מזבח, a sacrificial altar. Indefinite article
    fits English idiom.
- source_word: וַיִּקְרָא לַמָּקוֹם
  chosen: called the place
  alternatives:
  - named the place
  lexicon: HALOT
  rationale: Idiomatic rendering of קרא + לְ with מקום in naming contexts. 'Called
    the place' stays close to the Hebrew while remaining natural English.
- source_word: אֵל בֵּית אֵל
  chosen: El-bethel
  alternatives:
  - God of Bethel
  lexicon: HALOT
  rationale: This is best treated as a place-name and thus transliterated per project
    policy to transliterate names. The underlying sense is likely 'God of Bethel,'
    but because Jacob is explicitly naming the place, the proper-name form is retained
    in the main text.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the naming. 'Because' is clearer in modern
    English than the more formal 'for.'
- source_word: נִגְלוּ
  chosen: had revealed himself
  alternatives:
  - appeared
  - were revealed
  lexicon: HALOT
  rationale: From גלה in the Niphal, here in a divine self-disclosure context. Although
    morphologically plural with אֱלֹהִים, the sense is singular in context, so English
    uses singular 'himself.' 'Had revealed himself' captures the reflexive/self-manifestation
    nuance better than the flatter 'appeared.' The pluperfect fits the explanatory
    clause referring back to the earlier event.
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - gods
  lexicon: HALOT
  rationale: Though formally plural, אֱלֹהִים here takes singular sense for Israel's
    God in narrative context. English therefore renders it as singular 'God.'
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: Standard prepositional phrase; rendered directly.
- source_word: בְּבָרְחוֹ
  chosen: when he fled
  alternatives:
  - in his fleeing
  lexicon: HALOT
  rationale: Infinitive construct with prefixed ב conveys temporal circumstance. 'When
    he fled' is idiomatic and accurate.
- source_word: מִפְּנֵי אָחִיו
  chosen: from his brother
  alternatives:
  - from before his brother
  lexicon: HALOT
  rationale: מִפְּנֵי literally 'from the face/presence of,' but in flight contexts
    means 'from' or 'away from.' 'From his brother' is the natural English sense.
