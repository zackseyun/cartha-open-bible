theological_decisions:
- issue: Nature of the purification command
  chosen_reading: Render the command in a way that preserves possible ritual/covenantal purification without specifying more than the text states.
  alternative_readings:
  - Render more generally as 'clean yourselves' with reduced ritual nuance
  rationale: The context involves removal of idols and preparation to approach God, so the purification likely has ritual significance. The translation preserves that theological weight with 'purify yourselves' while avoiding importing a detailed ceremonial system not explicit in the verse.
  doctrine_reference: Translation philosophy §3, §6
