id: GEN.35.2
reference: Genesis 35:2
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יַעֲקֹב֙ אֶל בֵּית֔/וֹ וְ/אֶ֖ל כָּל אֲשֶׁ֣ר עִמּ֑/וֹ הָסִ֜רוּ אֶת אֱלֹהֵ֤י הַ/נֵּכָר֙ אֲשֶׁ֣ר בְּ/תֹכְ/כֶ֔ם וְ/הִֽטַּהֲר֔וּ וְ/הַחֲלִ֖יפוּ שִׂמְלֹתֵי/כֶֽם־־־׃
translation:
  text: Then Jacob said to his household and to all who were with him[a], “Put away the foreign gods that are among you, purify yourselves[b], and change your clothes.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strange gods' or 'gods of the foreigner.'
    reason: lexical_alternative
  - marker: b
    text: '''Purify yourselves'' may refer to ritual cleansing in preparation to approach God.'
    reason: cultural_note
lexical_decisions:
- source_word: בֵּיתוֹ
  chosen: his household
  alternatives:
  - his house
  lexicon: HALOT
  rationale: Although literally 'his house,' in context Jacob is addressing the members of his domestic unit, not the physical structure. 'Household' preserves the social sense natural in English while remaining close to the Hebrew.
- source_word: כָּל אֲשֶׁר עִמּוֹ
  chosen: all who were with him
  alternatives:
  - everyone with him
  - all that were with him
  lexicon: HALOT
  rationale: The phrase refers to the people accompanying Jacob. 'All who were with him' is idiomatic and accurately personalizes the referent implied by context.
- source_word: הָסִרוּ
  chosen: Put away
  alternatives:
  - remove
  - get rid of
  lexicon: HALOT
  rationale: The imperative calls for removal of illicit objects from their possession. 'Put away' is natural English and retains the command's force without over-paraphrasing.
- source_word: אֱלֹהֵי הַנֵּכָר
  chosen: the foreign gods
  alternatives:
  - the gods of the foreigner
  - the strange gods
  - the alien gods
  lexicon: HALOT
  rationale: The construct phrase denotes gods belonging to foreigners or alien worship, not Israel's God. 'Foreign gods' is the clearest contemporary rendering and matches the polemical sense.
- source_word: בְּתֹכְכֶם
  chosen: that are among you
  alternatives:
  - that are in your midst
  - that are in your possession
  lexicon: HALOT
  rationale: The phrase literally means 'in your midst/among you.' Here it likely includes both physical possession and communal presence; 'among you' preserves that breadth.
- source_word: וְהִטַּהֲרוּ
  chosen: purify yourselves
  alternatives:
  - cleanse yourselves
  - be purified
  lexicon: HALOT
  rationale: The hitpael form is reflexive, calling for ritual or ceremonial purification. 'Purify yourselves' best captures the reflexive force and likely cultic nuance.
- source_word: וְהַחֲלִיפוּ
  chosen: change
  alternatives:
  - replace
  - put on different
  lexicon: HALOT
  rationale: The verb means to change or replace. In connection with garments, 'change' is the most natural English equivalent.
- source_word: שִׂמְלֹתֵיכֶם
  chosen: your clothes
  alternatives:
  - your garments
  lexicon: HALOT
  rationale: The Hebrew refers to outer garments/clothing. 'Clothes' is more readable modern English; 'garments' is possible but slightly more formal and archaic in tone.
