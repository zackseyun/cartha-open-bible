id: GEN.35.27
reference: Genesis 35:27
source:
  edition: WLC
  text: וַ/יָּבֹ֤א יַעֲקֹב֙ אֶל יִצְחָ֣ק אָבִ֔י/ו מַמְרֵ֖א קִרְיַ֣ת הָֽאַרְבַּ֑ע הִ֣וא
    חֶבְר֔וֹן אֲשֶׁר גָּֽר שָׁ֥ם אַבְרָהָ֖ם וְ/יִצְחָֽק־־־׃
translation:
  text: And Jacob came to Isaac his father at Mamre, Kiriath-arba (that is, Hebron),
    where Abraham and Isaac had sojourned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'where Abraham and Isaac lived as sojourners.' The Hebrew verb carries
      the sense of residing as a temporary resident or foreigner, not merely living
      in a place.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: From בוא, the common narrative verb 'to come/go.' 'Came' fits the English
    deictic perspective of arrival at Isaac's location and is standard in this context.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition. In idiomatic English with 'came,' 'to'
    is the natural rendering.
- source_word: אָבִיו
  chosen: his father
  lexicon: HALOT
  rationale: Straightforward construct with pronominal suffix identifying Isaac as
    Jacob's father; retained explicitly for clarity and fidelity.
- source_word: מַמְרֵא
  chosen: Mamre
  lexicon: HALOT
  rationale: Proper place name; transliterated per translation philosophy.
- source_word: קִרְיַת הָאַרְבַּע
  chosen: Kiriath-arba
  alternatives:
  - Kiriath Arba
  - the city of Arba
  lexicon: HALOT
  rationale: Proper place name in apposition to Mamre/Hebron. Transliterated rather
    than translated to preserve the toponym, while the identification with Hebron
    is supplied by the following clause.
- source_word: הִוא חֶבְרוֹן
  chosen: that is, Hebron
  alternatives:
  - it is Hebron
  - which is Hebron
  lexicon: HALOT
  rationale: The pronoun plus place name identifies Kiriath-arba with Hebron. 'That
    is, Hebron' is natural modern English for an explanatory apposition.
- source_word: אֲשֶׁר
  chosen: where
  alternatives:
  - in which
  - wherein
  lexicon: HALOT
  rationale: Relative particle introducing a clause about the location. 'Where' is
    idiomatic English when the antecedent is a place.
- source_word: גָּר
  chosen: had sojourned
  alternatives:
  - had lived as foreigners
  - had resided
  - had dwelt
  lexicon: HALOT
  rationale: גור often denotes residing as a temporary resident/sojourner rather than
    simple permanent settlement. 'Had sojourned' preserves that nuance better than
    merely 'lived.' The pluperfect reflects the prior action relative to Jacob's arrival.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Adverb of place, naturally rendered 'there' within the relative clause.
- source_word: אַבְרָהָם וְיִצְחָק
  chosen: Abraham and Isaac
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English conventions.
