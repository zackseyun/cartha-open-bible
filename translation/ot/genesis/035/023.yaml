id: GEN.35.23
reference: Genesis 35:23
source:
  edition: WLC
  text: בְּנֵ֣י לֵאָ֔ה בְּכ֥וֹר יַעֲקֹ֖ב רְאוּבֵ֑ן וְ/שִׁמְעוֹן֙ וְ/לֵוִ֣י וִֽ/יהוּדָ֔ה וְ/יִשָּׂשכָ֖ר וּ/זְבוּלֻֽן׃
translation:
  text: 'The sons of Leah: Jacob’s firstborn[a], Reuben, Simeon, Levi, Judah, Issachar, and Zebulun.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the firstborn of Jacob, Reuben.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The children of
  - The descendants of
  lexicon: HALOT
  rationale: Construct plural of בֵּן here introduces a list of Leah's male offspring. 'Sons of' is the most direct and contextually precise rendering, since the verse enumerates six male individuals.
- source_word: לֵאָה
  chosen: Leah
  rationale: Personal name transliterated by standard English convention, in keeping with the translation philosophy to transliterate names.
- source_word: בְּכֹר יַעֲקֹב
  chosen: Jacob’s firstborn
  alternatives:
  - the firstborn of Jacob
  - Jacob's eldest son
  lexicon: HALOT
  rationale: The construct phrase identifies Reuben specifically as Jacob's firstborn. 'Jacob’s firstborn' is natural English and preserves the formal relationship of the Hebrew. 'Eldest son' is possible but slightly interprets beyond the lexical force of firstborn.
- source_word: רְאוּבֵן
  chosen: Reuben
  rationale: Personal name transliterated by standard English convention.
- source_word: וְ
  chosen: and
  alternatives:
  - ','
  - with
  rationale: The repeated conjunction links each name in a simple list. Rendering each with 'and' reflects the Hebrew polysyndeton and preserves the cadence of enumeration.
- source_word: שִׁמְעוֹן
  chosen: Simeon
  rationale: Personal name transliterated by standard English convention.
- source_word: לֵוִי
  chosen: Levi
  rationale: Personal name transliterated by standard English convention.
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Personal name transliterated by standard English convention.
- source_word: יִשָּׂשכָר
  chosen: Issachar
  rationale: Personal name transliterated by standard English convention.
- source_word: זְבוּלֻן
  chosen: Zebulun
  alternatives:
  - Zebulon
  rationale: Personal name transliterated by standard English convention. 'Zebulun' is the more common English biblical form; 'Zebulon' is a known variant but less standard in modern translations.
