theological_decisions:
- issue: Anthropological sense of נֶפֶשׁ in a death context
  chosen_reading: Rendered as 'life' rather than 'soul' in the main text
  alternative_readings:
  - soul
  rationale: The Hebrew term can denote the living self or life-breath, not necessarily
    a technical statement about the immaterial soul departing the body. 'Life' preserves
    the narrative sense without foreclosing theological discussions about anthropology.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
