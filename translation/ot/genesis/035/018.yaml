id: GEN.35.18
reference: Genesis 35:18
source:
  edition: WLC
  text: וַ/יְהִ֞י בְּ/צֵ֤את נַפְשָׁ/הּ֙ כִּ֣י מֵ֔תָה וַ/תִּקְרָ֥א שְׁמ֖/וֹ בֶּן אוֹנִ֑י
    וְ/אָבִ֖י/ו קָֽרָא ל֥/וֹ בִנְיָמִֽין־־׃
translation:
  text: And as her life was departing—for she was dying—she called his name Ben-oni;
    but his father called him Benjamin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ben-oni likely means 'son of my sorrow' or 'son of my affliction.'
    reason: lexical_alternative
  - marker: b
    text: Benjamin likely means 'son of the right hand'; some understand it as 'son
      of the south.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/צֵאת נַפְשָׁהּ
  chosen: as her life was departing
  alternatives:
  - as her soul was going out
  - as her life went out
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote 'soul,' 'life,' or animating life. In this death context,
    'life' is the most natural modern English rendering and avoids importing a more
    technical anthropological claim than the Hebrew requires. The infinitive construct
    with ב plus יצא is rendered temporally, 'as ... was departing.'
- source_word: כִּי מֵתָה
  chosen: for she was dying
  alternatives:
  - for she died
  - because she was dying
  lexicon: HALOT
  rationale: 'The clause explains the preceding expression. Although the perfect can
    be rendered ''she died,'' the narrative sense here is contemporaneous with the
    naming, so ''she was dying'' best captures the flow: her life was departing as
    death was overtaking her.'
- source_word: וַתִּקְרָא שְׁמוֹ
  chosen: she called his name
  alternatives:
  - she named him
  - she called him
  lexicon: HALOT
  rationale: A slightly more formal rendering preserves the Hebrew naming idiom while
    remaining intelligible. This also keeps the parallel with the father's naming
    in the second clause.
- source_word: בֶּן אוֹנִי
  chosen: Ben-oni
  alternatives:
  - son of my sorrow
  - son of my affliction
  - Benoni
  lexicon: HALOT
  rationale: Per translation philosophy, personal names are transliterated rather
    than translated in the main text. Because the meaning of the name is significant
    to the narrative, a lexical-alternative footnote preserves the likely sense.
- source_word: וְאָבִיו קָרָא לוֹ
  chosen: but his father called him
  alternatives:
  - and his father called him
  - and his father named him
  lexicon: HALOT
  rationale: The conjunction is rendered adversatively as 'but' because the father's
    naming contrasts with the mother's naming. This makes the narrative relationship
    explicit in natural English.
- source_word: בִנְיָמִין
  chosen: Benjamin
  alternatives:
  - son of the right hand
  - son of the south
  lexicon: HALOT
  rationale: This is a proper name and is therefore transliterated in the main text.
    Because the etymological sense may be relevant, an explanatory footnote preserves
    the main lexical alternatives.
