theological_decisions:
- issue: Meaning of the death formula 'was gathered to his people'
  chosen_reading: Retained as a literal formula without specifying whether it refers to burial, reunion with ancestors, or an afterlife state.
  alternative_readings:
  - A reference to burial in the family tomb
  - A reference to postmortem reunion with one's forebears
  rationale: The Hebrew formula carries theological ambiguity and should be preserved rather than resolved. A more interpretive rendering would import claims the text does not explicitly make.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
