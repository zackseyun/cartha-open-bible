id: GEN.35.29
reference: Genesis 35:29
source:
  edition: WLC
  text: וַ/יִּגְוַ֨ע יִצְחָ֤ק וַ/יָּ֨מָת֙ וַ/יֵּאָ֣סֶף אֶל עַמָּ֔י/ו זָקֵ֖ן וּ/שְׂבַ֣ע יָמִ֑ים וַ/יִּקְבְּר֣וּ אֹת֔/וֹ עֵשָׂ֥ו וְ/יַעֲקֹ֖ב בָּנָֽי/ו־׃פ
translation:
  text: Then Isaac breathed his last and died[a], and was gathered to his people, old and full of days. And Esau and Jacob, his sons, buried him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was gathered to his ancestors/kin.' The Hebrew expression is a conventional death formula and may imply more than physical burial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְוַע
  chosen: breathed his last
  alternatives:
  - expired
  - perished
  lexicon: HALOT
  rationale: גוע in death notices often denotes expiring or breathing out one's life. 'Breathed his last' preserves the idiomatic force in natural English and distinguishes it from the following explicit verb 'died.'
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - was dead
  lexicon: HALOT
  rationale: מות is the standard verb for dying. Rendering it plainly as 'died' preserves the Hebrew sequence without paraphrase.
- source_word: וַיֵּאָסֶף אֶל־עַמָּיו
  chosen: was gathered to his people
  alternatives:
  - was gathered to his kin
  - was gathered to his ancestors
  lexicon: HALOT
  rationale: This is a conventional Hebrew death formula. 'His people' is the most direct and traditional equivalent of עַם here, while preserving the phrase's theological and familial resonance without over-interpreting it as merely burial with ancestors.
- source_word: זָקֵן
  chosen: old
  alternatives:
  - aged
  - elderly
  lexicon: HALOT
  rationale: A straightforward adjectival description in the death notice; 'old' is the most natural and direct rendering.
- source_word: וּשְׂבַע יָמִים
  chosen: full of days
  alternatives:
  - satisfied with days
  - advanced in years
  lexicon: HALOT
  rationale: This is a stock Hebrew idiom in patriarchal death notices. 'Full of days' preserves the idiom's literary texture better than flattening it to 'advanced in years.'
- source_word: וַיִּקְבְּרוּ אֹתוֹ
  chosen: buried him
  alternatives:
  - interred him
  lexicon: HALOT
  rationale: קבר means to bury. 'Buried him' is clear, direct, and idiomatic.
- source_word: עֵשָׂו וְיַעֲקֹב בָּנָיו
  chosen: Esau and Jacob, his sons
  alternatives:
  - his sons Esau and Jacob
  lexicon: HALOT
  rationale: The appositional phrase identifies the subjects of burial. The chosen order reads naturally in English while preserving the Hebrew names and filial identification.
