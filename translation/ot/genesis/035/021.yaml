id: GEN.35.21
reference: Genesis 35:21
source:
  edition: WLC
  text: וַ/יִּסַּ֖ע יִשְׂרָאֵ֑ל וַ/יֵּ֣ט אָֽהֳלֹ֔/ה מֵ/הָ֖לְאָה לְ/מִגְדַּל עֵֽדֶר־׃
translation:
  text: Then Israel journeyed on and pitched his tent beyond Migdal-eder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Migdal-eder means 'tower of the flock.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסַּע
  chosen: journeyed on
  alternatives:
  - set out
  - moved on
  - traveled on
  lexicon: HALOT
  rationale: The verb נסע in the wayyiqtol narrative sequence commonly denotes breaking
    camp and traveling onward. 'Journeyed on' preserves the travel sense in natural
    English and reflects the sequential force of the waw-consecutive.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - Jacob
  rationale: The Hebrew text uses the personal name/title 'Israel,' so the translation
    preserves the name as written rather than harmonizing to 'Jacob.'
- source_word: וַיֵּט
  chosen: pitched
  alternatives:
  - stretched out
  - spread
  - set up
  lexicon: HALOT
  rationale: With 'tent' as its object, נטה idiomatically means to pitch or spread
    out a tent. 'Pitched' is the most natural English equivalent in this collocation.
- source_word: אָהֳלֹה
  chosen: his tent
  alternatives:
  - his dwelling tent
  lexicon: HALOT
  rationale: The noun אֹהֶל means 'tent,' with the 3ms suffix giving 'his tent.' No
    expansion beyond the simple possessive is warranted.
- source_word: מֵהָלְאָה
  chosen: beyond
  alternatives:
  - farther on than this
  - from there onward
  - further on
  lexicon: HALOT
  rationale: The adverb הלאה indicates movement or location farther on, beyond a given
    point. In this context after a travel verb and before a landmark, 'beyond' concisely
    captures the spatial sense.
- source_word: לְמִגְדַּל עֵדֶר
  chosen: Migdal-eder
  alternatives:
  - the tower of Eder
  - the tower of the flock
  lexicon: HALOT
  rationale: Because this expression functions as a place name here, a transliterated
    form best fits the translation philosophy of transliterating names. The underlying
    meaning is 'tower of the flock,' which is worth preserving in a footnote as a
    lexical alternative.
