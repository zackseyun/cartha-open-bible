theological_decisions:
- issue: Meaning of the construct חִתַּת אֱלֹהִים
  chosen_reading: a terror from God
  alternative_readings:
  - the terror of God
  - a great terror
  rationale: The phrase most naturally indicates terror originating from God, fitting the narrative context of divine protection. The alternative 'the terror of God' is possible as a more literal rendering of the construct and is preserved in a footnote. Rendering it merely as an intensifier ('a great terror') is possible in Hebrew usage but is less contextually specific here and may understate divine agency.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of בְּנֵי יַעֲקֹב
  chosen_reading: the sons of Jacob
  alternative_readings:
  - Jacob's sons
  rationale: The Hebrew is explicitly masculine plural and refers to Jacob's male offspring in the narrative. The translation preserves that gendered reference rather than neutralizing it.
  doctrine_reference: Translation philosophy §4
