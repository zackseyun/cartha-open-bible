id: GEN.35.5
reference: Genesis 35:5
source:
  edition: WLC
  text: וַ/יִּסָּ֑עוּ וַ/יְהִ֣י חִתַּ֣ת אֱלֹהִ֗ים עַל הֶֽ/עָרִים֙ אֲשֶׁר֙ סְבִיבֹ֣תֵי/הֶ֔ם וְ/לֹ֣א רָֽדְפ֔וּ אַחֲרֵ֖י בְּנֵ֥י יַעֲקֹֽב׀־׃
translation:
  text: Then they set out[a], and a terror from God fell on the cities that were around them, so that they did not pursue the sons of Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the terror of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסָּעוּ
  chosen: Then they set out
  alternatives:
  - And they journeyed
  - And they departed
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Set out' is natural modern English for נסע in travel context, preserving the movement sense without archaic phrasing.
- source_word: וַיְהִי
  chosen: fell
  alternatives:
  - was
  - came to be
  lexicon: HALOT
  rationale: Although היה literally means 'was/came to be,' in the clause 'there was a terror ... on the cities' idiomatic English is better expressed as 'fell on' when paired with עַל. This preserves the eventive force in readable English.
- source_word: חִתַּת אֱלֹהִים
  chosen: a terror from God
  alternatives:
  - the terror of God
  - a dread from God
  lexicon: HALOT
  rationale: חִתָּה/חִתַּת denotes terror, dread, or dismay. The construct with אֱלֹהִים can be read as a terror sent by God or characterized as divine. 'A terror from God' communicates source clearly in contemporary English while avoiding over-interpretation. The more formal 'the terror of God' is preserved as an alternative.
- source_word: עַל הֶעָרִים
  chosen: on the cities
  alternatives:
  - upon the cities
  - over the cities
  lexicon: HALOT
  rationale: עַל is straightforwardly locative/directional here. 'On the cities' works idiomatically with 'fell on' and preserves the Hebrew image.
- source_word: אֲשֶׁר סְבִיבֹתֵיהֶם
  chosen: that were around them
  alternatives:
  - that were surrounding them
  - around them
  lexicon: HALOT
  rationale: This relative phrase identifies the nearby cities surrounding Jacob's group. 'That were around them' is clear and natural.
- source_word: וְלֹא רָדְפוּ
  chosen: so that they did not pursue
  alternatives:
  - and they did not pursue
  - therefore they did not chase
  lexicon: HALOT
  rationale: The conjunction plus negated perfect states the result of the preceding terror. 'So that they did not pursue' makes the causal/resultative relationship explicit in good English.
- source_word: אַחֲרֵי
  chosen: pursue
  alternatives:
  - go after
  - chase after
  lexicon: HALOT
  rationale: With רדף, אַחֲרֵי forms the idiom 'pursue after.' English normally collapses this to 'pursue' without loss.
- source_word: בְּנֵי יַעֲקֹב
  chosen: the sons of Jacob
  alternatives:
  - Jacob's sons
  - the children of Jacob
  lexicon: HALOT
  rationale: בְּנֵי is literally 'sons of.' Per the gender-accurate principle, the masculine familial term should be preserved. 'Sons of Jacob' is more formally transparent than 'Jacob's sons,' though either is possible.
