id: GEN.35.6
reference: Genesis 35:6
source:
  edition: WLC
  text: וַ/יָּבֹ֨א יַעֲקֹ֜ב ל֗וּזָ/ה אֲשֶׁר֙ בְּ/אֶ֣רֶץ כְּנַ֔עַן הִ֖וא בֵּֽית אֵ֑ל ה֖וּא וְ/כָל הָ/עָ֥ם אֲשֶׁר עִמּֽ/וֹ־־־׃
translation:
  text: So Jacob came to Luz (that is[a], Bethel), which is in the land of Canaan, he and all the people who were with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Luz ... that is, Bethel' preserves both the older place name and its better-known identification.
    reason: cross_reference
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: Qal wayyiqtol of בוא commonly denotes coming/entering/arriving. 'Came' is natural English narrative style and fits the destination-focused movement.
- source_word: לוּזָה
  chosen: to Luz
  alternatives:
  - to Luzah
  - to Luz
  lexicon: HALOT
  rationale: Proper place name לוז with directional he indicates motion toward the place. Standard English transliteration is 'Luz'; the directional ending is represented by 'to' rather than preserved in transliteration.
- source_word: אֲשֶׁר בְּאֶרֶץ כְּנַעַן
  chosen: which is in the land of Canaan
  alternatives:
  - that is in the land of Canaan
  lexicon: HALOT
  rationale: Relative clause identifying the location of Luz. 'Which is in the land of Canaan' is straightforward and preserves the geographic specification.
- source_word: הִוא בֵּית אֵל
  chosen: that is, Bethel
  alternatives:
  - it is Bethel
  - namely Bethel
  lexicon: HALOT
  rationale: The pronoun plus place name functions appositionally, clarifying that Luz is Bethel. 'That is, Bethel' is idiomatic English for explanatory identification.
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: Resumptive/emphatic pronoun referring back to Jacob before adding the accompanying group. English requires explicit subject for the final clause; 'he' captures the sense without overemphasis.
- source_word: וְכָל הָעָם אֲשֶׁר עִמּוֹ
  chosen: and all the people who were with him
  alternatives:
  - and all the people with him
  - and all the company that was with him
  lexicon: HALOT
  rationale: עָם here refers to the group accompanying Jacob, not necessarily an ethnic 'people' in the national sense. 'The people who were with him' is readable and sufficiently literal.
