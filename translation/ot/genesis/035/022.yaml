id: GEN.35.22
reference: Genesis 35:22
source:
  edition: WLC
  text: וַ/יְהִ֗י בִּ/שְׁכֹּ֤ן יִשְׂרָאֵל֙ בָּ/אָ֣רֶץ הַ/הִ֔וא וַ/יֵּ֣לֶךְ רְאוּבֵ֔ן וַ/יִּשְׁכַּב֙ אֶת בִּלְהָה֙ פִּילֶ֣גֶשׁ אָבִ֔י/ו וַ/יִּשְׁמַ֖ע יִשְׂרָאֵ֑ל וַ/יִּֽהְי֥וּ בְנֵֽי יַעֲקֹ֖ב שְׁנֵ֥ים עָשָֽׂר־פ־׃
translation:
  text: And it happened[a], while Israel was dwelling in that land, that Reuben went and lay with Bilhah, his father's concubine, and Israel heard of it[b]. Now the sons of Jacob were twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and Israel heard.'' The object is unstated but clearly refers to Reuben''s act; English commonly supplies ''of it'' for clarity.'
    reason: lexical_alternative
  - marker: b
    text: Or, more literally, 'And the sons of Jacob were twelve.' The clause likely serves as a transition to the list of sons in the following verses.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Introduces a narrative development with the common Hebrew wayyiqtol of היה. 'And it happened' preserves the discourse function without archaic diction.
- source_word: בִּשְׁכֹּן
  chosen: while Israel was dwelling
  alternatives:
  - when Israel dwelt
  - as Israel lived
  lexicon: HALOT
  rationale: Infinitive construct of שכן with prefixed ב marks temporal circumstance. 'Was dwelling' gives the ongoing background sense in natural English.
- source_word: בָּאָרֶץ הַהִוא
  chosen: in that land
  alternatives:
  - in the land there
  - in that country
  lexicon: HALOT
  rationale: אָרֶץ here refers to the local land/region, not the whole earth. 'That land' is the most natural contextual rendering.
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - went off
  lexicon: HALOT
  rationale: Retained as a separate narrative verb rather than absorbed, since Hebrew explicitly marks Reuben's action with 'went and lay with.'
- source_word: וַיִּשְׁכַּב אֶת
  chosen: lay with
  alternatives:
  - slept with
  - had sexual relations with
  lexicon: HALOT
  rationale: שׁכב with a person is the standard idiom for sexual intercourse. 'Lay with' is clear, direct, and closer to the Hebrew than the more colloquial 'slept with.'
- source_word: פִּילֶגֶשׁ
  chosen: concubine
  alternatives:
  - secondary wife
  lexicon: HALOT
  rationale: The established and most precise English term for a woman of recognized but lesser marital status in the ancient household. A more explanatory gloss would over-interpret in the main text.
- source_word: אָבִיו
  chosen: his father's
  alternatives:
  - of his father
  lexicon: HALOT
  rationale: Simple possessive construction modifying 'concubine.'
- source_word: וַיִּשְׁמַע יִשְׂרָאֵל
  chosen: and Israel heard of it
  alternatives:
  - and Israel heard
  - and Israel came to hear
  lexicon: HALOT
  rationale: The Hebrew says simply 'Israel heard.' English idiom normally supplies the object implicitly; 'of it' makes the sense explicit without adding interpretation beyond the obvious referent.
- source_word: וַיִּהְיוּ בְנֵי יַעֲקֹב שְׁנֵים עָשָׂר
  chosen: Now the sons of Jacob were twelve
  alternatives:
  - And the sons of Jacob were twelve
  - The sons of Jacob numbered twelve
  lexicon: HALOT
  rationale: This clause functions as a transitional notice leading into the following list. 'Now' captures the discourse shift well in English. 'Were twelve' is a straightforward rendering of the verbless-number statement expressed with היה.
