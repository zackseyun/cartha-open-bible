theological_decisions:
- issue: Rendering the sexual idiom without euphemistic softening or excessive explicitness
  chosen_reading: lay with
  alternative_readings:
  - slept with
  - had sexual relations with
  rationale: The verse reports grave sexual misconduct. 'Lay with' preserves the Hebrew idiom's seriousness and directness while avoiding both prudish obscurity and unnecessarily clinical expansion.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Treatment of the final clause as a narrative transition rather than attaching theological significance to Israel's silence
  chosen_reading: 'Include the clause as a simple transitional statement: ''Now the sons of Jacob were twelve.'''
  alternative_readings:
  - Treat it as part of the same sentence without discourse marker
  - Infer moral or judicial implications from Israel's hearing
  rationale: The Hebrew text states only that Israel heard, then transitions to the notice about Jacob's sons. The translation should not import unstated reactions or doctrinal conclusions.
  doctrine_reference: Translation philosophy §§1, 3
