id: GEN.28.2
reference: Genesis 28:2
source:
  edition: WLC
  text: ק֥וּם לֵךְ֙ פַּדֶּ֣נָֽ/ה אֲרָ֔ם בֵּ֥יתָ/ה בְתוּאֵ֖ל אֲבִ֣י אִמֶּ֑/ךָ וְ/קַח לְ/ךָ֤ מִ/שָּׁם֙ אִשָּׁ֔ה מִ/בְּנ֥וֹת לָבָ֖ן אֲחִ֥י אִמֶּֽ/ךָ־׃
translation:
  text: Arise[a], go to Paddan-aram, to the house of Bethuel, your mother's father, and take for yourself from there a wife from the daughters of Laban, your mother's brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'your maternal grandfather' and 'your uncle.' The main text keeps the Hebrew kinship expressions more explicitly.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֥וּם
  chosen: Arise
  alternatives:
  - Get up
  - Rise
  lexicon: HALOT
  rationale: Imperative of קום meaning to rise or get up. 'Arise' preserves the formal imperative tone in a concise, natural way alongside the following imperative 'go.'
- source_word: לֵךְ֙
  chosen: go
  alternatives:
  - depart
  - travel
  lexicon: HALOT
  rationale: Common imperative of הלך. 'Go' is the plain and natural rendering in English.
- source_word: פַּדֶּנָֽה אֲרָם
  chosen: to Paddan-aram
  alternatives:
  - to Paddan Aram
  lexicon: HALOT
  rationale: Place name is transliterated per translation philosophy. The directional he is represented by the preposition 'to.' Hyphenated conventional English form retained for readability.
- source_word: בֵּיתָה בְתוּאֵל
  chosen: to the house of Bethuel
  alternatives:
  - to Bethuel's house
  lexicon: HALOT
  rationale: בַּיִת in construct with directional ending indicates movement toward a household/dwelling. 'To the house of Bethuel' preserves the Hebrew structure and destination sense.
- source_word: אֲבִי אִמֶּךָ
  chosen: your mother's father
  alternatives:
  - the father of your mother
  - your maternal grandfather
  lexicon: HALOT
  rationale: Literally 'the father of your mother.' 'Your mother's father' is clear modern English and stays close to the source without introducing the more interpretive kinship term 'grandfather.'
- source_word: וְקַח לְךָ
  chosen: and take for yourself
  alternatives:
  - and take
  - and get for yourself
  lexicon: HALOT
  rationale: לקח means 'take'; the dative לְךָ adds personal interest/benefit. 'For yourself' preserves that nuance without overtranslation.
- source_word: מִשָּׁם
  lemma: מִן
  chosen: from there
  alternatives:
  - there
  lexicon: HALOT
  rationale: The preposition מִן is explicit; 'from there' should be retained.
- source_word: אִשָּׁה
  chosen: a wife
  alternatives:
  - a woman
  lexicon: HALOT
  rationale: In this marriage-seeking context, 'wife' is the contextually correct sense rather than the more general 'woman.'
- source_word: מִבְּנוֹת לָבָן
  chosen: from the daughters of Laban
  alternatives:
  - from among Laban's daughters
  lexicon: HALOT
  rationale: Literal rendering of the partitive phrase. 'From the daughters of Laban' is transparent and preserves the Hebrew wording.
- source_word: אֲחִי אִמֶּךָ
  chosen: your mother's brother
  alternatives:
  - the brother of your mother
  - your uncle
  lexicon: HALOT
  rationale: Literally 'the brother of your mother.' 'Your mother's brother' remains close to the Hebrew and avoids replacing the kinship expression with the more interpretive shorthand 'uncle.'
