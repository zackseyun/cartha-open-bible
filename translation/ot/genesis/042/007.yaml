id: GEN.42.7
reference: Genesis 42:7
source:
  edition: WLC
  text: וַ/יַּ֥רְא יוֹסֵ֛ף אֶת אֶחָ֖י/ו וַ/יַּכִּרֵ֑/ם וַ/יִּתְנַכֵּ֨ר אֲלֵי/הֶ֜ם וַ/יְדַבֵּ֧ר אִתָּ֣/ם קָשׁ֗וֹת וַ/יֹּ֤אמֶר אֲלֵ/הֶם֙ מֵ/אַ֣יִן בָּאתֶ֔ם וַ/יֹּ֣אמְר֔וּ מֵ/אֶ֥רֶץ כְּנַ֖עַן לִ/שְׁבָּר אֹֽכֶל־־׃
translation:
  text: When Joseph saw his brothers[a], he recognized them, but he acted like a stranger toward them and spoke harshly with them. He said to them, “Where have you come from?” And they said, “From the land of Canaan[b], to buy food.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “he disguised himself to them” / “he made himself unrecognizable to them.” The Hebrew can denote presenting himself as foreign or unknown to them.
    reason: lexical_alternative
  - marker: b
    text: Or, “to buy grain.” In this famine context the Hebrew verb often refers specifically to purchasing grain, though the noun here is the broader “food.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: When ... saw
  alternatives:
  - and ... saw
  - then ... saw
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. Rendering it with 'When' smooths the sequence into natural English while preserving the temporal connection to the following actions.
- source_word: אֶת־אֶחָיו
  chosen: his brothers
  alternatives:
  - his brothers/brothers
  lexicon: HALOT
  rationale: Literal object phrase. 'Brothers' is the natural and gender-accurate rendering for Joseph's male siblings in context.
- source_word: וַיַּכִּרֵם
  chosen: he recognized them
  alternatives:
  - he knew them
  - he identified them
  lexicon: HALOT
  rationale: From נכר in the Hiphil, meaning to recognize or identify. 'Recognized' is the standard and clearest English equivalent here.
- source_word: וַיִּתְנַכֵּר אֲלֵיהֶם
  chosen: he acted like a stranger toward them
  alternatives:
  - he disguised himself to them
  - he made himself unrecognizable to them
  - he pretended not to know them
  lexicon: HALOT
  rationale: The Hitpael of נכר here conveys making oneself foreign/strange in relation to them, not necessarily a physical disguise in this verse. 'Acted like a stranger toward them' preserves the relational nuance and avoids over-specifying the means.
- source_word: וַיְדַבֵּר אִתָּם קָשׁוֹת
  chosen: and spoke harshly with them
  alternatives:
  - and spoke harsh things to them
  - and spoke severely to them
  - and spoke roughly with them
  lexicon: HALOT
  rationale: קָשׁוֹת functions adverbially here, describing the manner of speech. 'Spoke harshly' is idiomatic modern English and preserves the severity.
- source_word: מֵאַיִן בָּאתֶם
  chosen: Where have you come from?
  alternatives:
  - Where are you from?
  - From where have you come?
  lexicon: HALOT
  rationale: This is a direct inquiry about origin. 'Where have you come from?' is natural English and reflects the perfect verb of motion.
- source_word: מֵאֶרֶץ כְּנַעַן
  chosen: From the land of Canaan
  alternatives:
  - From Canaan
  lexicon: HALOT
  rationale: Including 'the land of' reflects the Hebrew construct phrase and preserves the formal geographic expression.
- source_word: לִשְׁבָּר אֹכֶל
  chosen: to buy food
  alternatives:
  - to buy grain
  - to purchase food
  lexicon: HALOT
  rationale: The infinitive of שבר in this context means to buy provisions/grain, especially in famine narratives. Because אֹכֶל is broader than 'grain,' 'to buy food' best represents the full phrase without narrowing it too much, while remaining idiomatic.
