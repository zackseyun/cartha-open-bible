id: GEN.8.15
reference: Genesis 8:15
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר אֱלֹהִ֖ים אֶל נֹ֥חַ לֵ/אמֹֽר־׃
translation:
  text: Then God spoke to Noah, saying,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: Then ... spoke
  alternatives:
  - And ... spoke
  - said
  lexicon: HALOT
  rationale: The waw-consecutive with דבר advances the narrative. 'Then' captures
    the sequential force in natural English, while 'spoke' reflects דבר more directly
    than the simpler 'said.'
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In this context אֱלֹהִים refers to the one true God and is idiomatically
    rendered 'God.'
- source_word: אֶל
  chosen: to
  alternatives:
  - with
  lexicon: HALOT
  rationale: The preposition marks the indirect object of speech; 'to' is the standard
    and most precise rendering here.
- source_word: נֹחַ
  chosen: Noah
  rationale: Personal names are transliterated by standard English convention.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - to say
  lexicon: HALOT
  rationale: The infinitive construct introduces the content of the speech in standard
    Hebrew narrative style. 'Saying' preserves the formal linkage to the following
    quotation without unnecessary paraphrase.
