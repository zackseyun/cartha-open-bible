id: GEN.26.31
reference: Genesis 26:31
source:
  edition: WLC
  text: וַ/יַּשְׁכִּ֣ימוּ בַ/בֹּ֔קֶר וַ/יִּשָּׁבְע֖וּ אִ֣ישׁ לְ/אָחִ֑י/ו וַ/יְשַׁלְּחֵ֣/ם יִצְחָ֔ק וַ/יֵּלְכ֥וּ מֵ/אִתּ֖/וֹ בְּ/שָׁלֽוֹם׃
translation:
  text: And they rose early in the morning and swore an oath, each man to his brother; then Isaac sent them away[a], and they departed from him in peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'each man to his brother,' an idiom here expressing mutual oath-taking.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכִּימוּ
  chosen: they rose early
  alternatives:
  - they got up early
  - they arose early
  lexicon: HALOT
  rationale: From שׁכם in the Hiphil/waw-consecutive narrative form, denoting rising early. 'Rose early' is idiomatic modern English and preserves the narrative sequence.
- source_word: בַבֹּקֶר
  chosen: in the morning
  alternatives:
  - at morning
  - early in the morning
  lexicon: HALOT
  rationale: בוקר means 'morning.' Combined with the previous verb, English naturally reads 'rose early in the morning.'
- source_word: וַיִּשָּׁבְעוּ
  chosen: swore an oath
  alternatives:
  - swore
  - took an oath
  lexicon: HALOT
  rationale: The Niphal of שׁבע commonly means 'swear' or 'take an oath.' 'Swore an oath' makes the covenantal/formal sense explicit without overtranslation.
- source_word: אִישׁ לְאָחִיו
  chosen: each man to his brother
  alternatives:
  - to one another
  - each to the other
  lexicon: HALOT
  rationale: Literally 'a man to his brother.' In context it expresses mutual oath-taking. Following the project's gender-accurate policy, the masculine relational wording is retained rather than flattened to 'one another,' while still being understandable in English.
- source_word: וַיְשַׁלְּחֵם
  chosen: sent them away
  alternatives:
  - dismissed them
  - sent them off
  lexicon: HALOT
  rationale: שׁלח in the Piel with object suffix means to send away/dispatch. 'Sent them away' fits the departure scene and is standard English.
- source_word: וַיֵּלְכוּ מֵאִתּוֹ
  chosen: they departed from him
  alternatives:
  - they went from him
  - they left him
  lexicon: HALOT
  rationale: הלך with מן/מאת indicates movement away from someone. 'Departed from him' is slightly more formal and suits the treaty context.
- source_word: בְּשָׁלוֹם
  chosen: in peace
  alternatives:
  - peacefully
  - in safety
  lexicon: HALOT
  rationale: שלום here denotes peaceful relations and safe departure after reconciliation. 'In peace' preserves both the relational and situational sense better than the adverb 'peacefully'.
