id: GEN.25.7
reference: Genesis 25:7
source:
  edition: WLC
  text: וְ/אֵ֗לֶּה יְמֵ֛י שְׁנֵֽי חַיֵּ֥י אַבְרָהָ֖ם אֲשֶׁר חָ֑י מְאַ֥ת שָׁנָ֛ה וְ/שִׁבְעִ֥ים
    שָׁנָ֖ה וְ/חָמֵ֥שׁ שָׁנִֽים־־׃
translation:
  text: 'These are the days of the years of Abraham’s life that he lived: one hundred
    seventy-five years.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the days of the years of Abraham’s life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: These are
  alternatives:
  - Now these are
  - And these are
  lexicon: HALOT
  rationale: Introduces a summary statement. English idiom naturally renders the conjunction
    plus demonstrative as 'These are' rather than preserving a wooden initial 'And.'
- source_word: יְמֵי
  chosen: the years
  alternatives:
  - the days
  lexicon: HALOT
  rationale: Although the noun is literally 'days,' the construct phrase with 'years
    of the life' is an idiomatic expression for lifespan. Rendering 'years' communicates
    the intended sense in natural English while preserving the age-counting context.
- source_word: שְׁנֵי חַיֵּי
  chosen: of ... life
  alternatives:
  - of the life of
  - of the lifetime of
  lexicon: HALOT
  rationale: The construct chain 'years of the life of Abraham' is best smoothed into
    English as 'years of Abraham’s life.' This preserves the Hebrew sense without
    awkwardness.
- source_word: אַבְרָהָם
  chosen: Abraham
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: אֲשֶׁר חָי
  chosen: that he lived
  alternatives:
  - which he lived
  - that he had lived
  lexicon: HALOT
  rationale: This relative clause restates and emphasizes the lifespan. 'That he lived'
    is the most direct and natural rendering in English.
- source_word: מְאַת שָׁנָה וְשִׁבְעִים שָׁנָה וְחָמֵשׁ שָׁנִים
  chosen: one hundred and seventy-five years
  alternatives:
  - a hundred seventy-five years
  - one hundred seventy and five years
  lexicon: HALOT
  rationale: 'The Hebrew gives the total age in additive form: 100 + 70 + 5 years.
    Standard English compresses this to ''one hundred and seventy-five years'' while
    preserving the exact number.'
