id: GEN.16.15
reference: Genesis 16:15
source:
  edition: WLC
  text: וַ/תֵּ֧לֶד הָגָ֛ר לְ/אַבְרָ֖ם בֵּ֑ן וַ/יִּקְרָ֨א אַבְרָ֧ם שֶׁם בְּנ֛/וֹ אֲשֶׁר יָלְדָ֥ה הָגָ֖ר יִשְׁמָעֵֽאל־־׃
translation:
  text: Hagar bore a son to Abram[a], and Abram called the name of his son, whom Hagar bore, Ishmael.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'Abram named his son, whom Hagar bore, Ishmael.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶד
  chosen: bore
  alternatives:
  - gave birth
  lexicon: HALOT
  rationale: The verb ילד in the Qal with a female subject commonly means 'bear' or 'give birth.' 'Bore' is concise, idiomatic in genealogical/narrative contexts, and fits the direct-object construction with 'a son.'
- source_word: לְאַבְרָם
  chosen: to Abram
  alternatives:
  - for Abram
  lexicon: HALOT
  rationale: 'The preposition ל marks relation/beneficiary here: Hagar bore the child to Abram, i.e., as his son. ''To Abram'' is the most natural literal English rendering in this context.'
- source_word: בֵּן
  chosen: a son
  alternatives:
  - son
  lexicon: HALOT
  rationale: Indefinite 'a son' reflects the Hebrew noun without article and is standard English after 'bore.'
- source_word: וַיִּקְרָא ... שֵׁם
  chosen: called the name of
  alternatives:
  - named
  - called
  lexicon: HALOT
  rationale: The Hebrew idiom קרא שם literally means 'call the name of.' Retaining 'called the name of' preserves the source structure more transparently than the smoother but less explicit 'named.'
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - the name of his son
  lexicon: HALOT
  rationale: The suffix marks possession by Abram. The phrase is incorporated into the larger idiom 'called the name of his son.'
- source_word: אֲשֶׁר יָלְדָה הָגָר
  chosen: whom Hagar bore
  alternatives:
  - that Hagar bore
  - whom Hagar had borne
  lexicon: HALOT
  rationale: This relative clause identifies the son just mentioned. 'Whom Hagar bore' is natural English and preserves the explicit mention of Hagar in the Hebrew.
- source_word: יִשְׁמָעֵאל
  chosen: Ishmael
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per translation philosophy. 'Ishmael' is the established English transliteration of יִשְׁמָעֵאל.
