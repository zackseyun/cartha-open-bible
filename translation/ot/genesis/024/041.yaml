id: GEN.24.41
reference: Genesis 24:41
source:
  edition: WLC
  text: אָ֤ז תִּנָּקֶה֙ מֵ/אָ֣לָתִ֔/י כִּ֥י תָב֖וֹא אֶל מִשְׁפַּחְתִּ֑/י וְ/אִם לֹ֤א יִתְּנוּ֙ לָ֔/ךְ וְ/הָיִ֥יתָ נָקִ֖י מֵ/אָלָתִֽ/י־־׃
translation:
  text: Then you will be free from my oath when you come to my family; and if they do not give to you[a], you will be free from my oath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from my curse'; the Hebrew term can denote an oath with an implied curse or sanction.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּנָּקֶה
  chosen: you will be free
  alternatives:
  - you will be cleared
  - you will be released
  - you will be innocent
  lexicon: HALOT
  rationale: The Niphal of נקה here conveys being exempted or released from obligation/liability, not moral innocence in an abstract sense. 'Free' is natural English and fits the legal-oath context.
- source_word: מֵאָלָתִי
  chosen: from my oath
  alternatives:
  - from my curse
  - from the oath I imposed
  lexicon: HALOT
  rationale: אָלָה can denote an oath, often with an implied curse/sanction. In this narrative context Abraham refers to the sworn obligation placed on the servant, so 'oath' is the best main-text rendering; the curse nuance is secondary and can be preserved as an alternative.
- source_word: כִּי
  chosen: when
  alternatives:
  - if
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the circumstance under which the servant is released. English 'when' best captures the temporal/conditional sense in context.
- source_word: תָבֹא אֶל מִשְׁפַּחְתִּי
  chosen: you come to my family
  alternatives:
  - you go to my clan
  - you come to my relatives
  lexicon: HALOT
  rationale: מִשְׁפָּחָה refers to extended family/clan. 'Family' is readable modern English and sufficiently broad; 'clan' is possible but less natural in contemporary English.
- source_word: וְאִם לֹא יִתְּנוּ לָךְ
  chosen: and if they do not give her to you
  alternatives:
  - and if they will not give her to you
  - and if they do not grant her to you
  lexicon: HALOT
  rationale: 'The Hebrew object is implicit from context: Rebekah as the prospective bride. English requires the object to be supplied for clarity. ''Give her to you'' reflects the marriage-arrangement idiom without excessive paraphrase.'
- source_word: וְהָיִיתָ נָקִי
  chosen: you will be free
  alternatives:
  - you will be innocent
  - you will be clear
  lexicon: HALOT
  rationale: נָקִי parallels תִּנָּקֶה earlier in the verse and should be rendered consistently. In context it means exempt from the binding obligation of the oath.
