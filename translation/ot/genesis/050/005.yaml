id: GEN.50.5
reference: Genesis 50:5
source:
  edition: WLC
  text: אָבִ֞/י הִשְׁבִּיעַ֣/נִי לֵ/אמֹ֗ר הִנֵּ֣ה אָנֹכִי֮ מֵת֒ בְּ/קִבְרִ֗/י אֲשֶׁ֨ר
    כָּרִ֤יתִי לִ/י֙ בְּ/אֶ֣רֶץ כְּנַ֔עַן שָׁ֖מָּ/ה תִּקְבְּרֵ֑/נִי וְ/עַתָּ֗ה אֶֽעֱלֶה
    נָּ֛א וְ/אֶקְבְּרָ֥ה אֶת אָבִ֖/י וְ/אָשֽׁוּבָה־־׃
translation:
  text: My father made me swear, saying, ‘Look, I am dying. In my grave that I dug
    for myself in the land of Canaan, there you shall bury me.’ So now, please let
    me go up and bury my father; then I will return.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hewed out for myself.' The Hebrew verb literally means 'dug,' though
      in burial contexts it can refer more broadly to preparing a grave.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשְׁבִּיעַנִי
  chosen: made me swear
  alternatives:
  - put me under oath
  - adjured me
  lexicon: HALOT
  rationale: Hiphil of שׁבע means to cause someone to swear or place under oath. 'Made
    me swear' is natural modern English and preserves the force of an imposed oath.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing direct speech; 'saying' is
    the normal English equivalent.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Retains the deictic and attention-getting force without archaic diction.
    'Behold' would be too archaic for the stated philosophy.
- source_word: מֵת
  chosen: am dying
  alternatives:
  - am about to die
  - am dead/dying
  lexicon: HALOT
  rationale: The participle expresses imminent or ongoing dying in context. 'Am dying'
    fits Jacob's quoted words naturally; 'am about to die' is possible but slightly
    more interpretive.
- source_word: בְּקִבְרִי
  chosen: In my grave
  alternatives:
  - in my tomb
  - in my burial place
  lexicon: HALOT
  rationale: קבר commonly denotes grave/tomb/burial place. 'Grave' is straightforward
    and readable; 'tomb' is possible but may suggest a more monumental structure than
    the Hebrew requires.
- source_word: כָּרִיתִי לִי
  chosen: I dug for myself
  alternatives:
  - I hewed out for myself
  - I prepared for myself
  lexicon: HALOT
  rationale: כּרה literally means to dig. Although burial places in rock can be 'hewn,'
    the Hebrew verb here is best represented by 'dug,' preserving the concrete image.
    An alternative is worth preserving because some English traditions use 'made'
    or 'hewed out.'
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - therein
  lexicon: HALOT
  rationale: Simple locative adverb; 'there' is idiomatic modern English.
- source_word: תִּקְבְּרֵנִי
  chosen: you shall bury me
  alternatives:
  - you must bury me
  lexicon: HALOT
  rationale: The imperfect in quoted instruction carries directive force. 'You shall
    bury me' preserves the solemnity of the oath language without over-paraphrasing.
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - And now
  - Now therefore
  lexicon: HALOT
  rationale: Connects Joseph's request to the preceding oath explanation. 'So now'
    is natural English and preserves the inferential transition.
- source_word: אֶעֱלֶה נָּא
  chosen: please let me go up
  alternatives:
  - please let me go
  - please allow me to go up
  lexicon: HALOT
  rationale: 'עלה reflects travel from Egypt up to Canaan, so ''go up'' should be
    retained. The particle נָא adds politeness/entreaty, represented by ''please.''
    Because the cohortative is used in a request to Pharaoh, English idiom requires
    an implied permission sense: ''please let me go up.'''
- source_word: וְאֶקְבְּרָה
  chosen: and bury
  alternatives:
  - that I may bury
  lexicon: HALOT
  rationale: Cohortative continuation of Joseph's request. In English, after 'let
    me go up,' the infinitive-like coordination 'and bury' is smooth and faithful.
- source_word: וְאָשׁוּבָה
  chosen: then I will return
  alternatives:
  - and return
  - afterward I will return
  lexicon: HALOT
  rationale: The verb promises Joseph's return after burial. 'Then I will return'
    makes the sequence explicit in natural English.
