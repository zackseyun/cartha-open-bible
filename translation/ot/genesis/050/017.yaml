theological_decisions:
- issue: Rendering of moral vocabulary פֶּשַׁע / חַטָּאת
  chosen_reading: Distinguish as 'transgression' and 'sin'
  alternative_readings:
  - Render both generically as 'wrong' or 'offense'
  rationale: The Hebrew uses two related but distinct terms, and preserving both maintains
    the rhetorical weight of the brothers' plea without overinterpreting the distinction.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
