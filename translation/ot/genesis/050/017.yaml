id: GEN.50.17
reference: Genesis 50:17
source:
  edition: WLC
  text: כֹּֽה תֹאמְר֣וּ לְ/יוֹסֵ֗ף אָ֣נָּ֡א שָׂ֣א נָ֠א פֶּ֣שַׁע אַחֶ֤י/ךָ וְ/חַטָּאתָ/ם֙
    כִּי רָעָ֣ה גְמָל֔וּ/ךָ וְ/עַתָּה֙ שָׂ֣א נָ֔א לְ/פֶ֥שַׁע עַבְדֵ֖י אֱלֹהֵ֣י אָבִ֑י/ךָ
    וַ/יֵּ֥בְךְּ יוֹסֵ֖ף בְּ/דַבְּרָ֥/ם אֵלָֽי/ו־־׃
translation:
  text: 'This is what you shall say to Yosef: ‘Please forgive the transgression of
    your brothers and their sin, for they repaid you with evil. And now, please forgive
    the transgression of the servants of the God of your father.’ And Yosef wept when
    they spoke to him.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Please pardon the offense of your brothers and their sin.' The Hebrew
      idiom literally uses 'lift/carry' for forgiving guilt.
    reason: lexical_alternative
  - marker: b
    text: '''Yosef'' is the direct transliteration of the Hebrew name traditionally
      rendered ''Joseph.'''
    reason: cultural_note
lexical_decisions:
- source_word: כֹּה
  chosen: This is what
  alternatives:
  - Thus
  - Like this
  lexicon: HALOT
  rationale: Introduces direct reported speech idiomatically. 'This is what' is natural
    modern English while preserving the deictic force of the Hebrew.
- source_word: תֹאמְרוּ
  chosen: you shall say
  alternatives:
  - you must say
  - say
  lexicon: HALOT
  rationale: Imperfect here functions as instruction for what message is to be delivered.
    'Shall say' preserves the directive force without sounding overly colloquial.
- source_word: לְיוֹסֵף
  chosen: to Yosef
  alternatives:
  - to Joseph
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. 'Yosef' reflects the Hebrew name directly rather than the traditional
    Anglicized 'Joseph'.
- source_word: אָנָּא ... נָא
  chosen: Please
  alternatives:
  - I beg you
  - Please now
  lexicon: HALOT
  rationale: The paired particles intensify entreaty. English typically expresses
    this with 'Please' rather than a wooden double particle rendering.
- source_word: שָׂא
  chosen: forgive
  alternatives:
  - bear away
  - pardon
  lexicon: HALOT
  rationale: Literally 'lift/carry,' but in this idiom with פשע it means to forgive
    or bear away guilt/offense. 'Forgive' best conveys the sense in clear English.
- source_word: פֶּשַׁע
  chosen: transgression
  alternatives:
  - offense
  - rebellion
  lexicon: HALOT
  rationale: פֶּשַׁע often denotes a breach or rebellion. 'Transgression' preserves
    the moral seriousness and pairs well with the following 'sin' without collapsing
    the two terms.
- source_word: אַחֶיךָ
  chosen: your brothers
  alternatives:
  - your brothers and sisters
  - your kin
  lexicon: HALOT
  rationale: The referent is Joseph's male siblings specifically, so 'brothers' is
    both literal and contextually precise.
- source_word: וְחַטָּאתָם
  chosen: and their sin
  alternatives:
  - and their wrongdoing
  lexicon: HALOT
  rationale: Keeps the second moral term distinct from פשע. 'Sin' is the most direct
    and theologically transparent rendering.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the plea for forgiveness. 'Because' is clearer
    in contemporary English than 'for' here.
- source_word: רָעָה
  chosen: evil
  alternatives:
  - harm
  - wrong
  lexicon: HALOT
  rationale: Retains the moral weight of the Hebrew rather than softening it to mere
    injury.
- source_word: גְמָלוּךָ
  chosen: they repaid you
  alternatives:
  - they dealt with you
  - they did to you
  lexicon: HALOT
  rationale: 'גמל commonly carries the idea of dealing out or repaying. ''Repaid you''
    preserves the reciprocal nuance: they returned evil for good.'
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - So now
  - Now then
  lexicon: HALOT
  rationale: Marks the renewed plea in the second half of the message. 'And now' is
    straightforward and natural.
- source_word: לְפֶשַׁע
  chosen: the transgression
  alternatives:
  - the offense
  lexicon: HALOT
  rationale: The prefixed ל here is governed by the idiom with שָׂא and is best represented
    in English simply by the object 'the transgression' after 'forgive.'
- source_word: עַבְדֵי אֱלֹהֵי אָבִיךָ
  chosen: the servants of the God of your father
  alternatives:
  - the slaves of the God of your father
  lexicon: HALOT
  rationale: While עבד can denote slave/servant, here it is a reverential self-designation
    before a powerful superior and in relation to God. 'Servants' is the most natural
    and contextually fitting English.
- source_word: וַיֵּבְךְּ
  chosen: wept
  alternatives:
  - began to weep
  - cried
  lexicon: HALOT
  rationale: Simple narrative preterite; 'wept' is concise and suitably solemn.
- source_word: בְּדַבְּרָם אֵלָיו
  chosen: when they spoke to him
  alternatives:
  - as they spoke to him
  - at their speaking to him
  lexicon: HALOT
  rationale: The preposition ב with infinitive construct can be temporal. 'When they
    spoke to him' gives the natural temporal sense in English.
