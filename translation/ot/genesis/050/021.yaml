id: GEN.50.21
reference: Genesis 50:21
source:
  edition: WLC
  text: וְ/עַתָּה֙ אַל תִּירָ֔אוּ אָנֹכִ֛י אֲכַלְכֵּ֥ל אֶתְ/כֶ֖ם וְ/אֶֽת טַפְּ/כֶ֑ם וַ/יְנַחֵ֣ם אוֹתָ֔/ם וַ/יְדַבֵּ֖ר עַל לִבָּֽ/ם־־־׃
translation:
  text: So now[a], do not be afraid. I myself will provide for you and your little ones.” Thus he comforted them and spoke to their hearts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spoke kindly to them' / 'spoke reassuringly to them'; literally, 'spoke to their hearts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - And now
  - Now therefore
  lexicon: HALOT
  rationale: Introduces Joseph's concluding reassurance with a natural discourse marker. 'So now' preserves the connective force of ו plus the temporal adverb without sounding wooden.
- source_word: אַל תִּירָאוּ
  chosen: do not be afraid
  alternatives:
  - do not fear
  lexicon: HALOT
  rationale: Standard negative jussive/imperfect expression of reassurance. 'Be afraid' is idiomatic modern English while preserving the imperative force.
- source_word: אָנֹכִי
  chosen: I myself
  alternatives:
  - I
  - as for me, I
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. 'I myself' brings out Joseph's personal assurance and commitment.
- source_word: אֲכַלְכֵּל
  chosen: will provide for
  alternatives:
  - will sustain
  - will support
  - will nourish
  lexicon: HALOT
  rationale: The verb denotes sustaining materially, especially with food/provision. 'Provide for' is clear modern English and fits the context of ongoing care for the family.
- source_word: טַפְּכֶם
  chosen: your little ones
  alternatives:
  - your children
  - your dependents
  lexicon: HALOT
  rationale: Refers to small children or little ones. 'Your little ones' preserves the familial tenderness and likely age nuance better than the broader 'children.'
- source_word: וַיְנַחֵם אֹתָם
  chosen: Thus he comforted them
  alternatives:
  - And he comforted them
  - So he consoled them
  lexicon: HALOT
  rationale: Narrative wayyiqtol summarizing Joseph's response. 'Comforted' is the standard rendering of נחם in this stem and context.
- source_word: וַיְדַבֵּר עַל לִבָּם
  chosen: spoke to their hearts
  alternatives:
  - spoke kindly to them
  - spoke reassuringly to them
  - spoke to their heart
  lexicon: HALOT
  rationale: Literally 'spoke upon/to their heart,' a Hebrew idiom for tender, reassuring speech. The more literal 'spoke to their hearts' preserves the imagery while remaining understandable in English.
