theological_decisions:
- issue: Rendering of עבד in a non-theologically charged household context
  chosen_reading: servants
  alternative_readings:
  - slaves
  rationale: Per translation philosophy, 'slave' is preferred where bonded status
    is salient. In this verse the focus is Joseph's command to members of his household,
    specifically identified as physicians, not the social institution of slavery.
    'Servants' better reflects the immediate function while remaining faithful to
    the source.
