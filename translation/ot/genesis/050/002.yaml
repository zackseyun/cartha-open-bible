id: GEN.50.2
reference: Genesis 50:2
source:
  edition: WLC
  text: וַ/יְצַ֨ו יוֹסֵ֤ף אֶת עֲבָדָי/ו֙ אֶת הָ/רֹ֣פְאִ֔ים לַ/חֲנֹ֖ט אֶת אָבִ֑י/ו
    וַ/יַּחַנְט֥וּ הָ/רֹפְאִ֖ים אֶת יִשְׂרָאֵֽל־־־־׃
translation:
  text: Then Joseph commanded his servants, the physicians, to embalm his father,
    and the physicians embalmed Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his slaves'; the Hebrew term can denote servants or slaves depending
      on context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Israel,' that is, Jacob.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְצַו
  chosen: commanded
  alternatives:
  - ordered
  - instructed
  lexicon: HALOT
  rationale: The waw-consecutive verb from צוה denotes giving a directive with authority.
    'Commanded' best preserves the force without sounding overly harsh.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his slaves
  - his attendants
  lexicon: HALOT
  rationale: עבד can mean servant or slave depending on context. Here it refers to
    Joseph's household personnel in an administrative setting; the bonded status is
    not the focus, so 'servants' fits the context while remaining natural English.
- source_word: הָרֹפְאִים
  chosen: the physicians
  alternatives:
  - the doctors
  - the healers
  lexicon: HALOT
  rationale: The participial form from רפא refers to those who practice healing. 'Physicians'
    is slightly more formal and fits the ancient court context better than 'doctors.'
- source_word: לַחֲנֹט
  chosen: to embalm
  alternatives:
  - to prepare with spices
  - to mummify
  lexicon: HALOT
  rationale: חנט in this context refers specifically to embalming a body, especially
    in Egyptian practice. 'To embalm' is the clearest and most idiomatic English equivalent.
- source_word: אָבִיו
  chosen: his father
  lexicon: HALOT
  rationale: Straightforward possessive noun; no contextual pressure suggests any
    alternative rendering.
- source_word: וַיַּחַנְטוּ
  chosen: embalmed
  alternatives:
  - prepared for burial by embalming
  lexicon: HALOT
  rationale: The repeated verb should be rendered consistently with לַחֲנֹט. English
    past tense 'embalmed' preserves the narrative sequence cleanly.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - Jacob
  lexicon: HALOT
  rationale: The Hebrew text explicitly uses 'Israel' here rather than 'Jacob.' The
    translation should preserve that naming choice rather than harmonize it away.
