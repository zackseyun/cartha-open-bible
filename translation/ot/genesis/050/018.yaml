theological_decisions:
- issue: Rendering of עֲבָדִים in a self-subordination context
  chosen_reading: slaves
  alternative_readings:
  - servants
  rationale: This is not a major doctrinal crux, but it intersects with the project's
    policy on bonded-service terminology. The brothers are not merely offering polite
    service; they are placing themselves under Joseph's authority in a strongly submissive
    way. 'Slaves' preserves that force better than the softer 'servants.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος / bonded-service language
