id: GEN.50.18
reference: Genesis 50:18
source:
  edition: WLC
  text: וַ/יֵּלְכוּ֙ גַּם אֶחָ֔י/ו וַֽ/יִּפְּל֖וּ לְ/פָנָ֑י/ו וַ/יֹּ֣אמְר֔וּ הִנֶּ֥/נּֽוּ
    לְ/ךָ֖ לַ/עֲבָדִֽים־׃
translation:
  text: Then his brothers also came and fell down before him and said, “Here we are,
    your slaves.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “your servants.” The Hebrew עֲבָדִים can denote either servants or slaves;
      here “slaves” was chosen to preserve the brothers’ strong expression of submission.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  chosen: came
  alternatives:
  - went
  lexicon: HALOT
  rationale: הלך literally means 'go/walk,' but in English narrative, with movement
    toward Joseph in view, 'came' is the natural idiomatic rendering and reflects
    the deictic perspective of the scene.
- source_word: גַּם
  chosen: also
  alternatives:
  - even
  - too
  lexicon: HALOT
  rationale: 'Marks addition/emphasis: the brothers themselves, in addition to the
    message already sent, now personally approach Joseph.'
- source_word: אֶחָיו
  chosen: his brothers
  alternatives:
  - his brothers themselves
  lexicon: HALOT
  rationale: Straightforward familial plural with 3ms suffix referring to Joseph.
- source_word: וַיִּפְּלוּ לְפָנָיו
  chosen: fell down before him
  alternatives:
  - prostrated themselves before him
  - fell before him
  lexicon: HALOT
  rationale: נפל + לפני commonly denotes falling/prostrating oneself before someone
    in submission. 'Fell down before him' is clear modern English and preserves the
    physical and deferential sense.
- source_word: וַיֹּאמְרוּ
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing direct speech.
- source_word: הִנֶּנּוּ
  chosen: Here we are
  alternatives:
  - Behold, we are here
  - Look, here we are
  lexicon: HALOT
  rationale: Idiomatic self-presentation formula. 'Here we are' preserves the force
    without archaic 'behold.'
- source_word: לְךָ
  chosen: your
  alternatives:
  - to you
  - for you
  lexicon: HALOT
  rationale: 'With the predicate phrase ''for slaves/to slaves,'' English idiom is
    best expressed possessively: ''your slaves.'' This conveys their offered status
    of subjection to Joseph.'
- source_word: לַעֲבָדִים
  chosen: slaves
  alternatives:
  - servants
  lexicon: HALOT
  rationale: עבדים can mean servants or slaves, but here the brothers offer themselves
    in a posture of total subordination. Per translation philosophy, 'slave' is preferred
    where bonded status is salient; thus 'your slaves' best reflects the force of
    the statement.
