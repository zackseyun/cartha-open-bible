theological_decisions:
- issue: Force of Joseph's rhetorical question about divine prerogative
  chosen_reading: Joseph denies that he occupies God's place as judge or avenger.
  alternative_readings:
  - Joseph asks whether he is under God's authority.
  rationale: The idiom תַּחַת with 'God' in this context most naturally means 'in the place of God,' especially given the brothers' fear of retaliation and the following verse's emphasis on God's sovereign intent. This preserves the theological distinction between divine and human roles without importing extra doctrinal claims.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
