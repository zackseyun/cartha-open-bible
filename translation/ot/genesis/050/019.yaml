id: GEN.50.19
reference: Genesis 50:19
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר אֲלֵ/הֶ֛ם יוֹסֵ֖ף אַל תִּירָ֑אוּ כִּ֛י הֲ/תַ֥חַת אֱלֹהִ֖ים אָֽנִי־׃
translation:
  text: But Joseph said to them[a], “Do not fear, for am I in the place of God?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Am I under God?” The Hebrew phrase is idiomatic; here it most likely means “Am I in the place of God?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר is most naturally rendered 'said' in English narrative.
- source_word: אֲלֵהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Direct object of speech with אל plus pronominal suffix indicates the addressees.
- source_word: יוֹסֵף
  chosen: Joseph
  rationale: Personal name is transliterated by standard English convention per translation philosophy.
- source_word: אַל תִּירָאוּ
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: Negative imperative/jussive construction with ירא addresses Joseph's brothers directly. 'Do not fear' is slightly more formal and concise, while remaining natural English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the ground for Joseph's reassurance. 'For' best preserves the explanatory force in a compact way.
- source_word: הֲתַחַת
  chosen: in the place of
  alternatives:
  - under
  - instead of
  lexicon: HALOT
  rationale: The idiom הֲתַחַת אֱלֹהִים expresses substitution or usurpation of God's role. 'In the place of' communicates the idiomatic sense better than a more literal 'under'.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although morphologically plural, the referent here is the singular God of Israel in a common Hebrew usage; singular English 'God' is required by sense and context.
- source_word: אָֽנִי
  chosen: I
  lexicon: HALOT
  rationale: 'Independent pronoun retained for the rhetorical question, giving emphasis: ''am I...?''.'
