id: GEN.50.25
reference: Genesis 50:25
source:
  edition: WLC
  text: וַ/יַּשְׁבַּ֣ע יוֹסֵ֔ף אֶת בְּנֵ֥י יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר פָּקֹ֨ד יִפְקֹ֤ד אֱלֹהִים֙ אֶתְ/כֶ֔ם וְ/הַעֲלִתֶ֥ם אֶת עַצְמֹתַ֖/י מִ/זֶּֽה־־׃
translation:
  text: Then Joseph made the sons of Israel swear[a], saying, “God will surely visit you, and you shall bring up my bones from here.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “God will surely visit you.” The Hebrew uses an intensified form of the verb, expressing certainty and active divine attention.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁבַּע
  chosen: made ... swear
  alternatives:
  - put ... under oath
  - adjured
  lexicon: HALOT
  rationale: 'Hiphil of שׁבע here is causative: Joseph causes the sons of Israel to swear an oath. ''Made ... swear'' is clear modern English and preserves the oath-setting force better than the more archaic ''adjured.'''
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' In Genesis this expression still carries familial/tribal concreteness, so the more formal 'sons of Israel' preserves the source wording better than the traditional but less precise 'children of Israel' or the more interpretive 'Israelites.' This follows the gender-accurate principle.
- source_word: פָּקֹד יִפְקֹד
  chosen: will surely attend to
  alternatives:
  - will surely visit
  - will surely take notice of
  - will surely come to the aid of
  lexicon: HALOT
  rationale: 'The infinitive absolute plus imperfect intensifies the verb: ''will surely ...'' The verb פקד in this covenantal context conveys decisive divine attention/intervention, not mere observation. ''Attend to'' is natural English that preserves the sense of God turning toward his people in action. A more literal alternative ''visit'' is preserved in a footnote because it is traditional and semantically important.'
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Standard rendering for אֱלֹהִים here, referring to the God of Israel. No contextual reason to render otherwise.
- source_word: וְהַעֲלִתֶם
  chosen: you must bring up
  alternatives:
  - then you shall bring up
  - and you are to bring up
  lexicon: HALOT
  rationale: Hiphil of עלה means to cause to go up/bring up. In context it expresses the obligation resulting from the oath. 'You must bring up' communicates the solemn imperative force in idiomatic English.
- source_word: עַצְמֹתַי
  chosen: my bones
  alternatives:
  - my remains
  lexicon: HALOT
  rationale: Literally 'my bones.' This concrete wording should be retained rather than generalized to 'remains,' since the Hebrew is specific and the phrase is echoed in later biblical fulfillment texts.
- source_word: מִזֶּה
  chosen: from here
  alternatives:
  - from this place
  lexicon: HALOT
  rationale: The demonstrative with preposition points to the present location. 'From here' is concise, natural, and faithful.
