theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל with gendered language
  chosen_reading: the sons of Israel
  alternative_readings:
  - the children of Israel
  - the Israelites
  rationale: The Hebrew is grammatically masculine plural construct and in this patriarchal setting refers to Israel's descendants in a family-line sense. Per the doctrine's gender-accurate principle, the translation preserves the masculine familial wording rather than flattening it to a neutral collective.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Nuance of פָּקֹד יִפְקֹד אֱלֹהִים אֶתְכֶם
  chosen_reading: God will surely attend to you
  alternative_readings:
  - God will surely visit you
  rationale: The phrase is a key covenantal assurance of divine intervention. 'Attend to' communicates active concern in contemporary English without reducing the expression to mere visitation. Because 'visit' is a longstanding literal rendering with biblical resonance, it is preserved in a footnote to maintain theological and intertextual transparency.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
