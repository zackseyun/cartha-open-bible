id: GEN.50.6
reference: Genesis 50:6
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר פַּרְעֹ֑ה עֲלֵ֛ה וּ/קְבֹ֥ר אֶת אָבִ֖י/ךָ כַּ/אֲשֶׁ֥ר הִשְׁבִּיעֶֽ/ךָ־׃
translation:
  text: And Pharaoh said[a], “Go up and bury your father, as he made you swear.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “as he put you under oath.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' preserves the Hebrew narrative flow in natural English without overinterpreting sequence.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration/title for the Egyptian ruler; proper name/title is transliterated rather than translated per project philosophy.
- source_word: עֲלֵה
  chosen: Go up
  alternatives:
  - Go
  - Ascend
  lexicon: HALOT
  rationale: עלה literally means 'go up.' In context it refers to traveling from Egypt to Canaan, and the idiomatic directional sense is significant enough to preserve rather than flatten to merely 'go.'
- source_word: וּקְבֹר
  chosen: and bury
  alternatives:
  - and inter
  - and bury him
  lexicon: HALOT
  rationale: קבר straightforwardly means 'bury.' 'Inter' is too formal for the stated readability target. The object is supplied by the following phrase 'your father,' so 'bury' is sufficient.
- source_word: אֶת אָבִיךָ
  chosen: your father
  lexicon: HALOT
  rationale: Direct-object marker plus noun with 2ms suffix. Rendered simply as 'your father' in idiomatic English.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according to how
  lexicon: HALOT
  rationale: Introduces comparison/manner. 'As' is concise and natural here, linking Pharaoh's permission to the prior oath.
- source_word: הִשְׁבִּיעֶךָ
  chosen: he made you swear
  alternatives:
  - he put you under oath
  - he adjured you
  lexicon: HALOT
  rationale: The Hiphil of שׁבע means to cause someone to swear, not merely that someone swore on his own initiative. 'He made you swear' preserves the causative force clearly in modern English.
