id: GEN.50.23
reference: Genesis 50:23
source:
  edition: WLC
  text: וַ/יַּ֤רְא יוֹסֵף֙ לְ/אֶפְרַ֔יִם בְּנֵ֖י שִׁלֵּשִׁ֑ים גַּ֗ם בְּנֵ֤י מָכִיר֙
    בֶּן מְנַשֶּׁ֔ה יֻלְּד֖וּ עַל בִּרְכֵּ֥י יוֹסֵֽף־־׃
translation:
  text: Joseph saw Ephraim’s children to the third generation. Also, the children
    of Machir son of Manasseh were born on Joseph’s knees.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Joseph lived to see Ephraim’s children to the third generation.' The
      Hebrew says literally 'Joseph saw.'
    reason: lexical_alternative
  - marker: b
    text: '''Were born on Joseph’s knees'' is a Hebrew idiom that may imply familial
      acknowledgment, reception, or special acceptance of the children.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - lived to see
  lexicon: HALOT
  rationale: The verb is literally 'saw.' In this genealogical/longevity context,
    English idiom can imply that Joseph lived long enough to see these descendants;
    however, 'saw' preserves the Hebrew wording while remaining natural.
- source_word: לְאֶפְרַיִם
  chosen: Ephraim’s
  alternatives:
  - for Ephraim
  - belonging to Ephraim
  lexicon: HALOT
  rationale: 'The preposition ל with a descendant formula is best rendered possessively
    in English: ''Ephraim’s children.'' This communicates lineage rather than direction
    or benefit.'
- source_word: בְּנֵי שִׁלֵּשִׁים
  chosen: children to the third generation
  alternatives:
  - third-generation children
  - grandchildren of the third generation
  lexicon: HALOT
  rationale: The phrase denotes descendants extending to a third generation. 'Children
    to the third generation' is idiomatic and preserves the genealogical scope without
    over-specifying exact family relationships beyond the Hebrew expression.
- source_word: גַּם
  chosen: Also
  alternatives:
  - Even
  - Moreover
  lexicon: HALOT
  rationale: Marks an additional statement parallel to the first clause. 'Also' is
    simple, natural, and sufficient.
- source_word: בְּנֵי מָכִיר בֶּן מְנַשֶּׁה
  chosen: the children of Machir son of Manasseh
  alternatives:
  - Machir’s children, the son of Manasseh
  - the sons of Machir, son of Manasseh
  lexicon: HALOT
  rationale: '''Children'' is preferred over ''sons'' because בְּנֵי can function
    broadly for descendants/children, and the verse is about lineage rather than male
    offspring specifically. The appositional ''son of Manasseh'' identifies Machir.'
- source_word: יֻלְּדוּ
  chosen: were born
  alternatives:
  - were brought forth
  lexicon: HALOT
  rationale: Passive of ילד, straightforwardly 'were born.'
- source_word: עַל בִּרְכֵּי יוֹסֵף
  chosen: on Joseph’s knees
  alternatives:
  - upon Joseph’s knees
  - on the knees of Joseph
  lexicon: HALOT
  rationale: A literal rendering preserves the cultural image. The phrase likely signifies
    acknowledgment/adoption-like reception or affectionate acceptance of the newborns,
    but the text itself uses the concrete idiom and should not be paraphrased away
    in the main text.
