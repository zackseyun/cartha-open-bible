id: GEN.50.12
reference: Genesis 50:12
source:
  edition: WLC
  text: וַ/יַּעֲשׂ֥וּ בָנָ֖י/ו ל֑/וֹ כֵּ֖ן כַּ/אֲשֶׁ֥ר צִוָּֽ/ם׃
translation:
  text: So his sons did for him as he had commanded them.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  chosen: did
  alternatives:
  - acted
  - carried out
  - made
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make'). In this context of fulfilling burial
    instructions, 'did' is the most natural English rendering and pairs well with
    the following comparative clause.
- source_word: בָנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically says 'his sons,' not a gender-neutral term. This
    follows the gender-accurate principle and matches the immediate context of Jacob's
    sons carrying out his instructions.
- source_word: לוֹ
  chosen: for him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: The preposition ל with this verb in context indicates action done on
    his behalf, namely carrying out the burial arrangements for Jacob. 'For him' is
    more idiomatic and contextually precise than 'to him.'
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: HALOT
  rationale: 'כֵּן marks manner/result: they acted ''so'' or ''thus.'' ''So'' is concise,
    natural modern English and preserves the connection to the following clause.'
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according to what
  lexicon: HALOT
  rationale: The comparative particle introduces conformity to Jacob's command. 'As'
    is the cleanest idiomatic rendering in English.
- source_word: צִוָּם
  chosen: he had commanded them
  alternatives:
  - he commanded them
  - he had ordered them
  lexicon: HALOT
  rationale: The verb צוה means 'command.' English past perfect ('had commanded')
    clarifies that Jacob's command preceded the sons' action, which is implicit in
    the narrative sequence. 'Commanded' is preferable to 'ordered' for consistency
    with the lexical force of the Hebrew.
