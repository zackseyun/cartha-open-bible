id: GEN.50.7
reference: Genesis 50:7
source:
  edition: WLC
  text: וַ/יַּ֥עַל יוֹסֵ֖ף לִ/קְבֹּ֣ר אֶת אָבִ֑י/ו וַ/יַּֽעֲל֨וּ אִתּ֜/וֹ כָּל עַבְדֵ֤י פַרְעֹה֙ זִקְנֵ֣י בֵית֔/וֹ וְ/כֹ֖ל זִקְנֵ֥י אֶֽרֶץ מִצְרָֽיִם־־־׃
translation:
  text: So Joseph went up to bury his father[a], and with him went up all Pharaoh’s servants, the elders of his household, and all the elders of the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'went up' reflects the customary way of describing travel from Egypt to Canaan.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - went
  - set out
  - ascended
  lexicon: HALOT
  rationale: The verb עָלָה literally means 'go up/ascend.' Because the journey is from Egypt to Canaan, 'went up' preserves the Hebrew geographical idiom and is natural English in this context.
- source_word: לִקְבֹּר
  chosen: to bury
  alternatives:
  - to inter
  - to bury him
  lexicon: HALOT
  rationale: The infinitive of קָבַר straightforwardly means 'to bury.' 'Inter' is possible but less natural for modern readers.
- source_word: אָבִיו
  chosen: his father
  alternatives:
  - his own father
  lexicon: HALOT
  rationale: Simple possessive rendering best matches the Hebrew suffix without adding emphasis not present in the text.
- source_word: וַיַּעֲלוּ אִתּוֹ
  chosen: with him went up
  alternatives:
  - went up with him
  - accompanied him
  lexicon: HALOT
  rationale: Retains the repeated 'went up' from עָלָה, preserving the narrative rhythm and geographical nuance. Word order is adjusted slightly for smooth English.
- source_word: כָּל עַבְדֵי פַרְעֹה
  chosen: all Pharaoh’s servants
  alternatives:
  - all the servants of Pharaoh
  - all Pharaoh’s officials
  lexicon: HALOT
  rationale: עֶבֶד commonly means 'servant' or 'slave.' In a royal court context, 'servants' is the most natural broad rendering and avoids over-specifying rank, while still reflecting their service to Pharaoh.
- source_word: זִקְנֵי בֵיתוֹ
  chosen: the elders of his household
  alternatives:
  - the elders of his house
  - the senior members of his court
  lexicon: HALOT
  rationale: זִקְנֵי literally means 'elders.' 'Household' is preferable to 'house' in modern English for a royal establishment and likely refers to senior members of Pharaoh's court/household.
- source_word: וְכֹל זִקְנֵי אֶרֶץ מִצְרַיִם
  chosen: and all the elders of the land of Egypt
  alternatives:
  - and all the elders of Egypt
  - and all the senior men of the land of Egypt
  lexicon: HALOT
  rationale: This preserves both זִקְנֵי ('elders') and אֶרֶץ ('land'). Including 'land' reflects the Hebrew more fully and suggests the broader national leadership beyond Pharaoh's household.
