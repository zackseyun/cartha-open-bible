id: GEN.50.22
reference: Genesis 50:22
source:
  edition: WLC
  text: וַ/יֵּ֤שֶׁב יוֹסֵף֙ בְּ/מִצְרַ֔יִם ה֖וּא וּ/בֵ֣ית אָבִ֑י/ו וַ/יְחִ֣י יוֹסֵ֔ף מֵאָ֥ה וָ/עֶ֖שֶׂר שָׁנִֽים׃
translation:
  text: Joseph remained in Egypt[a], he and his father's household, and Joseph lived 110 years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dwelt in Egypt, he and his father's house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  chosen: remained
  alternatives:
  - dwelt
  - lived
  - stayed
  lexicon: HALOT
  rationale: The verb ישב commonly means 'sit, dwell, remain.' In this narrative summary, 'remained' best conveys continued residence in Egypt after Jacob's death without sounding overly static or archaic. 'Dwelt' is more formal; 'lived' would blur with the later ויחי in the same verse.
- source_word: בְּמִצְרַיִם
  chosen: in Egypt
  lexicon: HALOT
  rationale: Straightforward locative phrase indicating Joseph's place of residence.
- source_word: הוּא וּבֵית אָבִיו
  chosen: he and his father's household
  alternatives:
  - he and his father's house
  - he and his father's family
  lexicon: HALOT
  rationale: בַּיִת/בֵּית in this construct often refers not merely to a building but to a household or family unit. 'Household' best captures the social unit intended. 'House' is more literal but less clear in modern English; 'family' is possible but can underrepresent the broader household sense.
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - survived
  lexicon: HALOT
  rationale: The verb חיה here introduces Joseph's lifespan. 'Lived' is the natural English rendering in age statements.
- source_word: מֵאָה וָעֶשֶׂר שָׁנִים
  chosen: 110 years
  alternatives:
  - a hundred and ten years
  lexicon: HALOT
  rationale: This is the standard age expression. Numerals are rendered in digits for readability in modern English while preserving the exact value.
- source_word: יוֹסֵף
  chosen: Joseph
  rationale: Personal name transliterated by standard English convention, in keeping with the translation philosophy to transliterate names.
