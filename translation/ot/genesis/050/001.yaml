id: GEN.50.1
reference: Genesis 50:1
source:
  edition: WLC
  text: וַ/יִּפֹּ֥ל יוֹסֵ֖ף עַל פְּנֵ֣י אָבִ֑י/ו וַ/יֵּ֥בְךְּ עָלָ֖י/ו וַ/יִּשַּׁק
    לֽ/וֹ־־׃
translation:
  text: Then Joseph fell on his father's face and wept over him and kissed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fell upon his father's face,' preserving the Hebrew's vivid physical
      imagery more formally.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/יִּפֹּל
  chosen: fell
  alternatives:
  - threw himself down
  - collapsed
  lexicon: HALOT
  rationale: Wayyiqtol of נפל, narrating a completed past action. 'Fell' is the most
    direct rendering; in context it conveys Joseph's physical movement onto/over his
    deceased father without adding interpretive intensity beyond the Hebrew.
- source_word: עַל פְּנֵי אָבִיו
  chosen: on his father's face
  alternatives:
  - upon his father's face
  - over his father's face
  lexicon: HALOT
  rationale: The Hebrew literally says 'upon the face of his father.' Retaining 'face'
    preserves the concrete imagery and avoids flattening it to a vague emotional gesture.
    English 'on his father's face' is idiomatic enough in context, though the sense
    includes being bent/fallen over him.
- source_word: וַ/יֵּבְךְּ עָלָיו
  chosen: wept over him
  alternatives:
  - wept on him
  - cried over him
  lexicon: HALOT
  rationale: בכה means 'weep/cry.' 'Wept' fits the solemn register. With עַל + pronoun,
    'over him' best conveys mourning at the father's body; 'on him' is possible but
    less natural in English.
- source_word: וַ/יִּשַּׁק לוֹ
  chosen: kissed him
  alternatives:
  - gave him a kiss
  lexicon: HALOT
  rationale: נשק in the Qal commonly means 'kiss.' The preposition ל marks the indirect
    object in Hebrew idiom; standard English expresses this simply as 'kissed him.'
- source_word: יוֹסֵף
  chosen: Joseph
  rationale: Standard English transliteration of the personal name, following the
    translation philosophy to transliterate names rather than translate them.
