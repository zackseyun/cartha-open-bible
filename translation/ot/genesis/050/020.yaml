theological_decisions:
- issue: Divine providence and human evil in parallel uses of חשב
  chosen_reading: Retain the same core verb ('intended') for both the brothers and God
  alternative_readings:
  - Use different verbs such as 'meant' for humans and 'turned' for God
  rationale: 'The Hebrew deliberately parallels human evil intention and God''s good intention without softening either side. Using the same English verb preserves the theological tension: the brothers truly intended evil, and God truly intended that same event for good, without implying God authored moral evil in the same manner as the brothers.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Moral versus merely circumstantial sense of רָעָה
  chosen_reading: Translate as 'evil'
  alternative_readings:
  - harm
  rationale: The context concerns the brothers' culpable action against Joseph, not merely unfortunate circumstances. 'Evil' preserves the moral dimension while still allowing the providential contrast with 'good.'
