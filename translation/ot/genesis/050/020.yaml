id: GEN.50.20
reference: Genesis 50:20
source:
  edition: WLC
  text: וְ/אַתֶּ֕ם חֲשַׁבְתֶּ֥ם עָלַ֖/י רָעָ֑ה אֱלֹהִים֙ חֲשָׁבָ֣/הּ לְ/טֹבָ֔ה לְמַ֗עַן עֲשֹׂ֛ה כַּ/יּ֥וֹם הַ/זֶּ֖ה לְ/הַחֲיֹ֥ת עַם רָֽב־׃
translation:
  text: As for you[a], you intended evil against me, but God intended it for good, in order to do as it is this day—to keep many people alive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more formally, 'as it is this day.' The Hebrew idiom points to the present outcome now visible.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲשַׁבְתֶּם
  chosen: you intended
  alternatives:
  - you planned
  - you meant
  - you devised
  lexicon: HALOT
  rationale: חשב in this context conveys purposeful reckoning or intention toward an outcome, not merely abstract thought. 'Intended' fits both the parallel with God's action and natural English.
- source_word: עָלַי
  chosen: against me
  alternatives:
  - concerning me
  - for me
  - toward me
  lexicon: HALOT
  rationale: With חשב and a hostile object, על carries adversative force. 'Against me' best reflects the brothers' harmful intent.
- source_word: רָעָה
  chosen: evil
  alternatives:
  - harm
  - disaster
  - wrong
  lexicon: HALOT
  rationale: רָעָה can denote moral evil or harmful intent. Here the brothers' action is morally charged, so 'evil' preserves that weight better than the softer 'harm,' while still fitting the contrast with God's good purpose.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The noun is singular in sense here and clearly refers to the God of Israel acting providentially.
- source_word: חֲשָׁבָהּ
  chosen: intended it
  alternatives:
  - planned it
  - meant it
  - reckoned it
  lexicon: HALOT
  rationale: The same verb as earlier is rendered consistently. The 3fs suffix refers back to רָעָה, so 'it' is supplied in idiomatic English.
- source_word: לְטֹבָה
  chosen: for good
  alternatives:
  - for benefit
  - for what is good
  lexicon: HALOT
  rationale: This is the standard and natural rendering of the preposition plus noun/adjective form, preserving the sharp contrast with 'evil.'
- source_word: לְמַעַן
  chosen: in order to
  alternatives:
  - so that
  - for the sake of
  lexicon: HALOT
  rationale: This introduces purpose. 'In order to' clearly marks the purposive relationship in contemporary English.
- source_word: עֲשֹׂה
  chosen: to bring about
  alternatives:
  - to do
  - to accomplish
  - to act
  lexicon: HALOT
  rationale: עשה is broad ('do/make'), but in this construction with the following phrase it refers to effecting a result in history. 'Bring about' communicates that sense more idiomatically than a bare 'do.'
- source_word: כַּיּוֹם הַזֶּה
  chosen: what is happening this day
  alternatives:
  - as it is this day
  - as on this day
  - as today
  lexicon: HALOT
  rationale: The idiom points to the present state of affairs as now evident. 'What is happening this day' makes the sense explicit in readable English. A more formal alternative is preserved in a footnote.
- source_word: לְהַחֲיוֹת
  chosen: to keep alive
  alternatives:
  - to preserve alive
  - to let live
  - to save alive
  lexicon: HALOT
  rationale: The Hiphil of חיה means to preserve life or keep alive. 'To keep alive' is clear and natural.
- source_word: עַם רָב
  chosen: many people
  alternatives:
  - a numerous people
  - many persons
  - a great multitude
  lexicon: HALOT
  rationale: The phrase denotes a large number of people preserved through Joseph's rise. 'Many people' is idiomatic and avoids implying a single ethnic group by rendering עם as 'people' collectively.
