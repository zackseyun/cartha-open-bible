id: GEN.50.3
reference: Genesis 50:3
source:
  edition: WLC
  text: וַ/יִּמְלְאוּ ל/וֹ֙ אַרְבָּעִ֣ים י֔וֹם כִּ֛י כֵּ֥ן יִמְלְא֖וּ יְמֵ֣י הַ/חֲנֻטִ֑ים
    וַ/יִּבְכּ֥וּ אֹת֛/וֹ מִצְרַ֖יִם שִׁבְעִ֥ים יֽוֹם־׃
translation:
  text: Forty days were completed for him, for that is how the days of embalming are
    completed; and Egypt wept for him seventy days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Egypt,' used collectively for the Egyptians.
    reason: lexical_alternative
  - marker: b
    text: Or 'the days for embalming are fulfilled/completed.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּמְלְאוּ לּוֹ
  chosen: were completed for him
  alternatives:
  - were fulfilled for him
  - they completed for him
  lexicon: HALOT
  rationale: The verb מלא in this context refers to the completion of a set period
    of time. An English passive-like rendering is most natural, since the subject
    is indefinite and the focus is on the elapsed period rather than the actors.
- source_word: אַרְבָּעִים יוֹם
  chosen: Forty days
  lexicon: HALOT
  rationale: Straightforward cardinal number plus noun; retained in natural English
    order.
- source_word: כִּי כֵּן
  chosen: for that is how
  alternatives:
  - for thus
  - because so
  lexicon: HALOT
  rationale: This pair gives the explanation for the forty-day period. 'For that is
    how' is idiomatic modern English that preserves the explanatory force.
- source_word: יִמְלְאוּ יְמֵי הַחֲנֻטִים
  chosen: the days of embalming are completed
  alternatives:
  - the days of the embalmed are completed
  - the days for embalmers are completed
  lexicon: HALOT
  rationale: The noun חֲנֻטִים is best understood here in relation to embalming/mummification,
    as the surrounding context concerns Joseph's physicians embalming Jacob (v. 2).
    'Days of embalming' communicates the process rather than awkwardly literalizing
    the passive participial form.
- source_word: וַיִּבְכּוּ אֹתוֹ
  chosen: wept for him
  alternatives:
  - mourned him
  - wept over him
  lexicon: HALOT
  rationale: בכה means 'weep.' With the object suffix, English idiom prefers 'wept
    for him' rather than the less natural 'wept him.' This preserves the emotional
    force without overinterpreting as formal mourning rites.
- source_word: מִצְרַיִם
  chosen: Egypt
  alternatives:
  - the Egyptians
  lexicon: HALOT
  rationale: The singular place-name is used collectively. Rendering it as 'Egypt'
    preserves the Hebrew wording while still naturally implying the people of Egypt
    in context.
- source_word: שִׁבְעִים יוֹם
  chosen: seventy days
  lexicon: HALOT
  rationale: Straightforward numeral expression; retained directly.
