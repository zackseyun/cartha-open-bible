id: GEN.50.4
reference: Genesis 50:4
source:
  edition: WLC
  text: וַ/יַּֽעַבְרוּ֙ יְמֵ֣י בְכִית֔/וֹ וַ/יְדַבֵּ֣ר יוֹסֵ֔ף אֶל בֵּ֥ית פַּרְעֹ֖ה לֵ/אמֹ֑ר אִם נָ֨א מָצָ֤אתִי חֵן֙ בְּ/עֵ֣ינֵי/כֶ֔ם דַּבְּרוּ נָ֕א בְּ/אָזְנֵ֥י פַרְעֹ֖ה לֵ/אמֹֽר־־־׃
translation:
  text: When the days of his mourning had passed[a], Joseph spoke to Pharaoh’s household, saying, “If I have now found favor in your eyes, please speak in Pharaoh’s hearing[b], saying,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'in Pharaoh’s ears,' an idiom meaning 'so that Pharaoh hears.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the days of weeping for him had passed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַבְרוּ
  chosen: had passed
  alternatives:
  - passed by
  - were over
  lexicon: HALOT
  rationale: 'From עבר in the sense of passing or elapsing of time. English pluperfect fits the narrative sequence: first the mourning period ended, then Joseph spoke.'
- source_word: יְמֵי בְכִיתוֹ
  chosen: the days of his mourning
  alternatives:
  - the days of weeping for him
  - his days of mourning
  lexicon: HALOT
  rationale: בכי literally denotes weeping, but in this funerary context 'mourning' best captures the idiomatic sense in natural English while preserving the formal time expression 'days of'.
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: דבר commonly means 'speak.' 'Spoke' works well with the following indirect object and infinitive of quotation.
- source_word: אֶל בֵּית פַּרְעֹה
  chosen: to Pharaoh’s household
  alternatives:
  - to the house of Pharaoh
  - to Pharaoh’s court
  lexicon: HALOT
  rationale: בית here refers not merely to the physical building but to the royal household/court personnel through whom Joseph makes his request. 'Household' preserves the Hebrew image while communicating the social referent.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard rendering of the quotative infinitive introducing direct speech.
- source_word: אִם נָא
  chosen: If I have now
  alternatives:
  - If indeed I have
  - If please I have
  lexicon: HALOT
  rationale: נָא is a particle of entreaty/politeness. In English it is not naturally rendered at this exact point with 'please,' so 'now' softens the appeal and keeps the deferential tone, while the later נָא is rendered explicitly as 'please' with the imperative.
- source_word: מָצָאתִי חֵן בְּעֵינֵיכֶם
  chosen: found favor in your eyes
  alternatives:
  - found grace in your sight
  - met with your approval
  lexicon: HALOT
  rationale: A common Hebrew idiom for receiving favor. 'Favor in your eyes' is a transparent and established English equivalent that preserves the metaphor.
- source_word: דַּבְּרוּ נָא
  chosen: please speak
  alternatives:
  - please tell
  - speak, please
  lexicon: HALOT
  rationale: Imperative plural with entreaty particle. 'Please speak' is natural modern English and preserves the polite request.
- source_word: בְּאָזְנֵי פַרְעֹה
  chosen: in Pharaoh’s hearing
  alternatives:
  - in the ears of Pharaoh
  - to Pharaoh directly
  lexicon: HALOT
  rationale: Hebrew idiom 'in the ears of' means to speak so that someone hears. 'In Pharaoh’s hearing' is idiomatic English that preserves the metaphorical force better than a wooden rendering.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Retained to reflect the Hebrew introduction to the message Joseph wants conveyed to Pharaoh; the sentence continues into the next verse.
