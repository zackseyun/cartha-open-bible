id: GEN.50.26
reference: Genesis 50:26
source:
  edition: WLC
  text: וַ/יָּ֣מָת יוֹסֵ֔ף בֶּן מֵאָ֥ה וָ/עֶ֖שֶׂר שָׁנִ֑ים וַ/יַּחַנְט֣וּ אֹת֔/וֹ
    וַ/יִּ֥ישֶׂם בָּ/אָר֖וֹן בְּ/מִצְרָֽיִם־׃
translation:
  text: So Joseph died at the age of a hundred and ten years, and they embalmed him
    and placed him in a coffin in Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And Joseph died at the age of a hundred and ten years.' The opening
      conjunction can be rendered simply as 'And'; 'So' reflects the concluding narrative
      flow.
    reason: lexical_alternative
  - marker: b
    text: Or 'they mummified him.' The Hebrew verb refers to embalming, especially
      in an Egyptian setting.
    reason: cultural_note
  - marker: c
    text: The Hebrew word here is the same noun used elsewhere for a chest or ark;
      in this burial context it means 'coffin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - passed away
  lexicon: HALOT
  rationale: The verb מות plainly denotes death. 'Died' is the direct, natural English
    equivalent and avoids euphemism.
- source_word: בֶּן מֵאָה וָעֶשֶׂר שָׁנִים
  chosen: at the age of a hundred and ten years
  alternatives:
  - being a hundred and ten years old
  - a son of a hundred and ten years
  lexicon: HALOT
  rationale: The Hebrew idiom literally uses 'son of' for age. English idiom requires
    'at the age of' or equivalent. 'A hundred and ten years' preserves the full number
    without compression.
- source_word: וַיַּחַנְטוּ
  chosen: they embalmed
  alternatives:
  - they mummified
  lexicon: HALOT
  rationale: The verb חנט refers to embalming, especially in Egyptian context. 'Embalmed'
    is the most accurate and readable rendering; 'mummified' is more interpretive
    and culturally specific than the verb itself requires.
- source_word: וַיִּישֶׂם
  chosen: placed
  alternatives:
  - put
  - set
  lexicon: HALOT
  rationale: The verb שׂים is a common verb meaning 'put/place/set.' 'Placed' fits
    the solemn narrative tone better than the more colloquial 'put'.
- source_word: בָּאָרוֹן
  chosen: in a coffin
  alternatives:
  - in the coffin
  - in a chest
  - in a sarcophagus
  lexicon: HALOT
  rationale: אָרוֹן can denote a chest, ark, or coffin depending on context. Here,
    with embalming and burial context, 'coffin' is the best contextual rendering.
    The prefixed article is naturally rendered indefinitely in English because this
    introduces the burial container rather than referring back to a previously identified
    coffin.
- source_word: בְּמִצְרָיִם
  chosen: in Egypt
  lexicon: HALOT
  rationale: Standard rendering of the place name; no contextual reason for variation.
- source_word: וַ
  chosen: So
  alternatives:
  - And
  lexicon: Hebrew waw-consecutive usage
  rationale: The initial waw continues the narrative and also gives a concluding sense
    at the end of Genesis. 'So' captures the discourse flow in natural English, while
    remaining faithful to the narrative linkage.
