id: GEN.50.15
reference: Genesis 50:15
source:
  edition: WLC
  text: וַ/יִּרְא֤וּ אֲחֵֽי יוֹסֵף֙ כִּי מֵ֣ת אֲבִי/הֶ֔ם וַ/יֹּ֣אמְר֔וּ ל֥וּ יִשְׂטְמֵ֖/נוּ יוֹסֵ֑ף וְ/הָשֵׁ֤ב יָשִׁיב֙ לָ֔/נוּ אֵ֚ת כָּל הָ֣/רָעָ֔ה אֲשֶׁ֥ר גָּמַ֖לְנוּ אֹתֽ/וֹ־־־׃
translation:
  text: When Joseph’s brothers saw that their father was dead[a], they said[b], “Perhaps Joseph will hate us and surely repay us for all the evil that we did to him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “bears a grudge against us.” The Hebrew verb can denote sustained hostility, not only an immediate emotional reaction.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew has an emphatic form: “repaying he will repay,” meaning “he will surely/fully repay.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאוּ
  chosen: saw
  alternatives:
  - realized
  - perceived
  lexicon: HALOT
  rationale: The verb ראה literally means 'see.' In context it introduces their recognition of a new situation after Jacob's death. 'Saw' preserves the Hebrew narrative style while remaining natural in English.
- source_word: אֲחֵי יוֹסֵף
  chosen: Joseph’s brothers
  alternatives:
  - the brothers of Joseph
  lexicon: HALOT
  rationale: Construct phrase meaning 'the brothers of Joseph.' The possessive form is standard, natural English and preserves the familial relationship.
- source_word: כִּי מֵת אֲבִיהֶם
  chosen: that their father was dead
  alternatives:
  - that their father had died
  lexicon: HALOT
  rationale: The clause gives the content of what they saw/recognized. The stative perfect מֵת can be rendered 'was dead' or 'had died.' 'Was dead' follows the Hebrew state closely and fits the immediate context.
- source_word: לוּ
  chosen: What if
  alternatives:
  - perhaps
  - if only
  lexicon: HALOT
  rationale: Here לוּ introduces a fearful supposition rather than a wish. 'What if' best captures the brothers' anxious concern in idiomatic modern English.
- source_word: יִשְׂטְמֵנוּ
  chosen: hates us
  alternatives:
  - bears a grudge against us
  - is hostile toward us
  lexicon: HALOT
  rationale: The verb שׂטם denotes hostility or enmity, often with the sense of harboring hatred. 'Hates us' is concise and strong; 'bears a grudge' is possible but slightly more interpretive.
- source_word: וְהָשֵׁב יָשִׁיב
  chosen: fully repays
  alternatives:
  - surely repays
  - indeed repays
  - repays in full
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the action. 'Fully repays' communicates the emphatic force in smooth English without awkward literalism.
- source_word: לָנוּ
  chosen: us
  alternatives:
  - to us
  lexicon: HALOT
  rationale: English idiom normally absorbs the preposition into the object with 'repay us,' though 'to us' is semantically present in the Hebrew.
- source_word: אֵת כָּל הָרָעָה
  chosen: for all the evil
  alternatives:
  - all the harm
  - all the wrong
  lexicon: HALOT
  rationale: רָעָה here refers to the moral evil/wrong they committed against Joseph. 'Evil' preserves the ethical weight better than the softer 'harm' or 'wrong.'
- source_word: אֲשֶׁר גָּמַלְנוּ אֹתוֹ
  chosen: that we did to him
  alternatives:
  - that we dealt out to him
  - that we inflicted on him
  lexicon: HALOT
  rationale: גמל can mean to deal with, repay, or requite. In this context it refers to their prior treatment of Joseph. 'Did to him' is idiomatic and broad enough to cover the Hebrew without over-specifying the manner.
