id: 1KI.4.17
reference: 1 Kings 4:17
source:
  edition: WLC
  text: יְהוֹשָׁפָ֥ט בֶּן פָּר֖וּחַ בְּ/יִשָׂשכָֽר־׃ס
translation:
  text: Jehoshaphat son of Paruah[a], in Issachar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'over Issachar,' making the administrative sense explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוֹשָׁפָט
  chosen: Jehoshaphat
  rationale: Proper personal name; per translation philosophy, personal names are transliterated rather than translated.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - ben
  lexicon: HALOT
  rationale: Standard genealogical marker meaning 'son of'; in administrative lists this identifies lineage/patronymic.
- source_word: פָּרוּחַ
  chosen: Paruah
  rationale: Proper personal name; transliterated by standard convention.
- source_word: בְּ/יִשָׂשכָר
  chosen: in Issachar
  alternatives:
  - over Issachar
  lexicon: HALOT
  rationale: The preposition בְ commonly means 'in' or 'within.' In this administrative list, the elliptical construction names the official and his district/tribal territory. 'In Issachar' is a close rendering of the Hebrew form while naturally implying his jurisdiction there; 'over Issachar' is interpretive and not required by the preposition itself.
