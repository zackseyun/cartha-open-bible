id: 1KI.7.11
reference: 1 Kings 7:11
source:
  edition: WLC
  text: וּ/מִ/לְ/מַ֗עְלָ/ה אֲבָנִ֧ים יְקָר֛וֹת כְּ/מִדּ֥וֹת גָּזִ֖ית וָ/אָֽרֶז׃
translation:
  text: And above were costly stones[a], cut according to measure, and cedar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to measurements of hewn stone.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִלְמַעְלָה
  chosen: And above
  alternatives:
  - And from above
  - And upward
  lexicon: HALOT
  rationale: The compound prepositional form means 'and from/above, upward.' In this architectural description, 'And above' is the most natural English transition, indicating what was present in the structure above the foundation courses mentioned previously.
- source_word: אֲבָנִים
  chosen: stones
  alternatives:
  - stone blocks
  lexicon: HALOT
  rationale: The common plural noun means 'stones.' 'Stone blocks' is possible in building context, but 'stones' is sufficient and keeps closer to the Hebrew while the following modifiers clarify their worked quality.
- source_word: יְקָרוֹת
  chosen: costly
  alternatives:
  - precious
  - valuable
  lexicon: HALOT
  rationale: In construction contexts this adjective denotes high-value, fine-quality materials. 'Costly' fits the description of expensive building stone better than 'precious,' which can sound overly gem-like in English.
- source_word: כְּמִדּוֹת
  chosen: cut to measure
  alternatives:
  - according to measurements
  - by measure
  lexicon: HALOT
  rationale: Literally 'according to measures.' In context with hewn stone, the phrase describes stones prepared to specified dimensions. 'Cut to measure' expresses the idiomatic sense in natural English while preserving the construction detail.
- source_word: גָּזִית
  chosen: cut
  alternatives:
  - hewn stone
  - dressed stone
  lexicon: HALOT
  rationale: The noun refers to hewn/dressed stone. Because it follows 'according to measures,' rendering the combined phrase as 'cut to measure' avoids awkward English while preserving the idea of carefully worked masonry. The fuller alternative 'hewn stone' is preserved in a footnote.
- source_word: וָאָרֶז
  chosen: and cedar
  alternatives:
  - with cedar
  - and cedarwood
  lexicon: HALOT
  rationale: 'The noun means ''cedar.'' English can supply ''wood,'' but the Hebrew simply says ''cedar.'' The conjunction is retained straightforwardly: the upper structure included both worked stone and cedar.'
