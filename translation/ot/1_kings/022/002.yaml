id: 1KI.22.2
reference: 1 Kings 22:2
source:
  edition: WLC
  text: וַ/יְהִ֖י בַּ/שָּׁנָ֣ה הַ/שְּׁלִישִׁ֑ית וַ/יֵּ֛רֶד יְהוֹשָׁפָ֥ט מֶֽלֶךְ יְהוּדָ֖ה אֶל מֶ֥לֶךְ יִשְׂרָאֵֽל־־׃
translation:
  text: In the third year[a], Jehoshaphat king of Judah went down to the king of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came down to the king of Israel.' The Hebrew verb literally means 'went down' and may reflect geographical elevation as well as simple travel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: In
  alternatives:
  - And it happened
  - Now it happened
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions here as a narrative temporal introducer. In natural English, its force is best carried by beginning the sentence with the temporal phrase rather than a wooden 'And it happened.' The temporal sense is preserved without unnecessary formulaic wording.
- source_word: בַּשָּׁנָה הַשְּׁלִישִׁית
  chosen: the third year
  alternatives:
  - in the third year
  lexicon: HALOT
  rationale: This phrase gives the time reference. In English the full clause is best rendered 'In the third year,' preserving the definite article and ordinal sense.
- source_word: וַיֵּרֶד
  chosen: went down
  alternatives:
  - came down
  - descended
  lexicon: HALOT
  rationale: ירד literally means 'go down/descend.' 'Went down' preserves the directional/topographical nuance common in Hebrew narrative, likely reflecting travel from Judah/Jerusalem to Israel/Samaria, and is more idiomatic than 'descended.'
- source_word: יְהוֹשָׁפָט
  chosen: Jehoshaphat
  rationale: Personal names are transliterated by standard English convention per project philosophy.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  alternatives:
  - the king of Judah
  lexicon: HALOT
  rationale: 'The construct chain identifies Jehoshaphat''s royal office. English apposition naturally omits the article before the title in this position: ''Jehoshaphat king of Judah.'''
- source_word: אֶל מֶלֶךְ יִשְׂרָאֵל
  chosen: to the king of Israel
  alternatives:
  - to Israel's king
  lexicon: HALOT
  rationale: אֶל marks movement toward a person. 'To the king of Israel' is the most direct and transparent rendering of the prepositional phrase and preserves the formal political designation.
