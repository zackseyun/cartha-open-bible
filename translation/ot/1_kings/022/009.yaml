id: 1KI.22.9
reference: 1 Kings 22:9
source:
  edition: WLC
  text: וַ/יִּקְרָא֙ מֶ֣לֶךְ יִשְׂרָאֵ֔ל אֶל סָרִ֖יס אֶחָ֑ד וַ/יֹּ֕אמֶר מַהֲרָ֖/ה מִיכָ֥יְהוּ בֶן יִמְלָֽה־־׃
translation:
  text: Then the king of Israel called one officer and said[a], “Bring Micaiah son of Imlah quickly.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew saris can mean 'eunuch' or more generally 'court official/officer.' Here the broader administrative sense is likely.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: The verb קרא in this narrative context means to call for or summon someone. 'Called' is natural English and sufficiently formal; 'summoned' is possible but slightly stronger than the context requires.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  lexicon: HALOT
  rationale: A straightforward construct chain identifying the speaker. The definite sense is carried in English by 'the king of Israel' in narrative context.
- source_word: אֶל סָרִיס אֶחָד
  chosen: one officer
  alternatives:
  - one eunuch
  - a court official
  lexicon: HALOT
  rationale: סָרִיס can denote a literal eunuch or, more broadly, a royal officer/court official. In this context the official function is in view, not sexual status, so 'officer' is the clearest main-text rendering. The broader lexical possibility is preserved in a footnote.
- source_word: מַהֲרָה
  chosen: Quickly bring
  alternatives:
  - Hurry, bring
  - Bring quickly
  - Make haste and bring
  lexicon: HALOT
  rationale: 'The form is an adverbial imperative expression from מהר, conveying urgency: ''quickly'' or ''make haste.'' Because the object Micaiah follows without an explicit separate verb in Hebrew, idiomatic English supplies ''bring'' to express the king''s command. ''Quickly bring'' preserves both the urgency and the implied action.'
- source_word: מִיכָיְהוּ
  chosen: Micaiah
  alternatives:
  - Micaiahu
  rationale: Personal names are transliterated by standard English convention per project philosophy. 'Micaiah' is the established English form.
- source_word: בֶן יִמְלָה
  chosen: son of Imlah
  rationale: A standard patronymic construction, best rendered formally as 'son of Imlah.'
