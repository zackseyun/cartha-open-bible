theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Geographical force of עַל פְּנֵי הַיַּרְדֵּן
  chosen_reading: east of the Jordan
  alternative_readings:
  - before the Jordan
  - opposite the Jordan
  rationale: The Hebrew idiom is somewhat flexible, but in this narrative setting the intended location is best conveyed as the Transjordan side. This is a geographical interpretation, not a doctrinally loaded one, but it is significant enough to document because more formal alternatives are possible.
