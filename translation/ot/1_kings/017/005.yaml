id: 1KI.17.5
reference: 1 Kings 17:5
source:
  edition: WLC
  text: וַ/יֵּ֥לֶךְ וַ/יַּ֖עַשׂ כִּ/דְבַ֣ר יְהוָ֑ה וַ/יֵּ֗לֶךְ וַ/יֵּ֨שֶׁב֙ בְּ/נַ֣חַל כְּרִ֔ית אֲשֶׁ֖ר עַל פְּנֵ֥י הַ/יַּרְדֵּֽן־׃
translation:
  text: So he went and did according to the word of Yahweh[a], and he went and stayed by the Wadi Cherith[b], which is before the Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the brook Cherith' or 'the stream Cherith'; the Hebrew term can refer to a wadi, ravine, or seasonal watercourse.
    reason: lexical_alternative
  - marker: b
    text: Literally 'which is before/opposite the Jordan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: So he went
  alternatives:
  - And he went
  - Then he went
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So he went' gives natural English sequence and reflects response to the prior command.
- source_word: וַיַּעַשׂ כִּדְבַר יְהוָה
  chosen: did according to the word of the LORD
  alternatives:
  - did according to the LORD's word
  - did as the LORD had spoken
  lexicon: HALOT
  rationale: Keeps the formal sense of obedience to a spoken command. 'The LORD' follows the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֵּשֶׁב
  chosen: stayed
  alternatives:
  - dwelt
  - lived
  - settled
  lexicon: HALOT
  rationale: ישב here denotes taking up residence or remaining in a place. 'Stayed' is natural modern English and fits the temporary context better than the more permanent-sounding 'settled' or archaic 'dwelt'.
- source_word: בְּנַחַל
  chosen: by the Wadi
  alternatives:
  - at the brook
  - by the stream
  - in the wadi
  lexicon: HALOT
  rationale: נחל can denote a wadi, ravine, or seasonal watercourse. 'Wadi' preserves the geographic sense more precisely than traditional 'brook,' while 'by' fits the English idiom with 'stayed.'
- source_word: כְּרִית
  chosen: Cherith
  lexicon: HALOT
  rationale: Proper place name, transliterated per project policy for names.
- source_word: אֲשֶׁר עַל פְּנֵי הַיַּרְדֵּן
  chosen: which is east of the Jordan
  alternatives:
  - which is before the Jordan
  - which is opposite the Jordan
  - which is facing the Jordan
  lexicon: HALOT
  rationale: The idiom עַל־פְּנֵי often means 'in front of/opposite/before.' In this geographical context, with Cherith understood on the Transjordan side, 'east of the Jordan' communicates the location clearly in idiomatic English.
- source_word: הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: Standard English rendering of the river name; adding 'River' is unnecessary here.
