id: 1KI.5.27
reference: 1 Kings 5:27
source:
  edition: WLC
  text: וַ/יַּ֨עַל הַ/מֶּ֧לֶךְ שְׁלֹמֹ֛ה מַ֖ס מִ/כָּל יִשְׂרָאֵ֑ל וַ/יְהִ֣י הַ/מַּ֔ס שְׁלֹשִׁ֥ים אֶ֖לֶף אִֽישׁ־׃
translation:
  text: King Solomon conscripted forced labor from all Israel[b][a], and the forced labor was thirty thousand men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'levied a labor force from all Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew מַס refers to compulsory labor service, not primarily to a monetary tax.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַל
  chosen: conscripted
  alternatives:
  - levied
  - raised up
  lexicon: HALOT
  rationale: The hiphil of עלה with מַס in this administrative context means to impose or raise a levy. 'Conscripted' communicates the act of drafting laborers more naturally in modern English than the more literal but less transparent 'raised' or the somewhat archaic 'levied.'
- source_word: מַס
  chosen: forced labor
  alternatives:
  - labor levy
  - corvée
  - tribute
  lexicon: HALOT
  rationale: In the Solomonic building context, מַס refers not to monetary taxation but to compulsory labor service. 'Forced labor' is the clearest modern rendering. 'Corvée' is precise but too technical for the target audience; 'tribute' would mislead toward payment rather than labor.
- source_word: מִכָּל יִשְׂרָאֵל
  chosen: from all Israel
  alternatives:
  - out of all Israel
  lexicon: HALOT
  rationale: The phrase indicates the source population from which the labor force was drawn. 'From all Israel' is natural and preserves the comprehensiveness of the levy.
- source_word: וַיְהִי הַמַּס
  chosen: and the forced labor numbered
  alternatives:
  - and the labor levy was
  - and the forced labor force was
  lexicon: HALOT
  rationale: The clause introduces the size of the drafted workforce. Rendering with 'numbered' makes explicit the idiomatic sense in English while staying close to the Hebrew structure.
- source_word: שְׁלֹשִׁים אֶלֶף אִישׁ
  chosen: thirty thousand men
  alternatives:
  - thirty thousand men of labor
  - thirty thousand persons
  lexicon: HALOT
  rationale: אִישׁ here counts adult male laborers. Per the translation philosophy, gender-accurate language is preferred where the source is masculine and specific; therefore 'men' is better than the generic 'persons'.
