id: 1KI.3.23
reference: 1 Kings 3:23
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר הַ/מֶּ֔לֶךְ זֹ֣את אֹמֶ֔רֶת זֶה בְּנִ֥/י הַ/חַ֖י וּ/בְנֵ֣/ךְ הַ/מֵּ֑ת וְ/זֹ֤את אֹמֶ֨רֶת֙ לֹ֣א כִ֔י בְּנֵ֥/ךְ הַ/מֵּ֖ת וּ/בְנִ֥/י הֶ/חָֽי־׃פ
translation:
  text: Then the king said[a], “This one says, ‘This is my son, the living one, and your son is the dead one,’ and this one says, ‘No, for your son is the dead one, and my son is the living one.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'This woman says ... and that woman says ...' The Hebrew uses feminine demonstratives, literally 'this one ... and this one,' referring to the two women.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural English narrative flow while preserving sequence.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward definite noun; no reason to substitute the proper name here since the Hebrew uses the title.
- source_word: זֹאת ... וְזֹאת
  chosen: This one ... and this one
  alternatives:
  - This woman ... and that woman
  - One ... and the other
  lexicon: HALOT
  rationale: The feminine demonstratives refer to the two women just mentioned. 'This one ... and this one' preserves the deictic, contrastive force without adding 'woman' where Hebrew leaves it implicit.
- source_word: אֹמֶרֶת
  chosen: says
  alternatives:
  - is saying
  - said
  lexicon: HALOT
  rationale: 'The participle functions here as vivid present in reported summary: ''says.'' This keeps the king''s recitation of each claim immediate and clear.'
- source_word: זֶה
  chosen: This living one
  alternatives:
  - This is
  - This one
  lexicon: HALOT
  rationale: Because זֶה is followed by בְּנִי הַחַי, the clause identifies the child. Rendering with 'This living one' preserves the demonstrative emphasis and avoids a flatter paraphrase.
- source_word: בְּנִי / בְּנֵךְ
  chosen: my son / your son
  alternatives:
  - my child / your child
  lexicon: HALOT
  rationale: בֵּן normally means 'son'; the context is a male infant, so 'son' is both accurate and natural.
- source_word: הַחַי
  chosen: the living one / is the living one
  alternatives:
  - alive
  - the live one
  lexicon: HALOT
  rationale: The adjective with article functions substantivally. 'The living one' preserves the Hebrew form better than simply 'alive,' while remaining readable.
- source_word: הַמֵּת
  chosen: the dead one / is the dead one
  alternatives:
  - dead
  - the one who died
  lexicon: HALOT
  rationale: Like הַחַי, this participial/adjectival form is substantival. 'The dead one' mirrors the Hebrew contrast with 'the living one.'
- source_word: לֹא כִי
  chosen: No, for
  alternatives:
  - 'No'
  - No, rather
  - Not so, because
  lexicon: HALOT
  rationale: The combination expresses contradiction followed by correction. 'No, for' preserves both the denial and the explanatory/assertive force of כִּי.
