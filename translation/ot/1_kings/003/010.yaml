id: 1KI.3.10
reference: 1 Kings 3:10
source:
  edition: WLC
  text: וַ/יִּיטַ֥ב הַ/דָּבָ֖ר בְּ/עֵינֵ֣י אֲדֹנָ֑/י כִּ֚י שָׁאַ֣ל שְׁלֹמֹ֔ה אֶת הַ/דָּבָ֖ר הַ/זֶּֽה־׃
translation:
  text: And the matter was good in the eyes of the Lord[a], because Solomon had asked this thing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the matter was pleasing in the eyes of the Lord.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּיטַב
  chosen: was good
  alternatives:
  - pleased
  - was pleasing
  lexicon: HALOT
  rationale: From יטב, here a wayyiqtol describing the evaluation of the request. 'Was good' preserves the Hebrew idiom with minimal smoothing; 'pleased' is possible in English but is more interpretive.
- source_word: הַדָּבָר
  chosen: the matter
  alternatives:
  - the thing
  - the request
  lexicon: HALOT
  rationale: דבר is broad ('word, matter, thing'). 'The matter' is natural English and leaves the referent slightly open, while still pointing to Solomon's request. 'The request' is contextually accurate but more specific than the Hebrew term itself.
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: This is a common Hebrew evaluative idiom. 'In the eyes of' preserves the metaphor transparently; 'in the sight of' is a viable English alternative.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: The form here is אֲדֹנָי ('Lord'), not the Tetragrammaton יהוה. Therefore 'the Lord' is the direct lexical rendering. 'The LORD' is reserved by doctrine for YHWH.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - that
  lexicon: HALOT
  rationale: Here כִּי introduces the reason the matter was good in the Lord's eyes. 'Because' best conveys the causal sense in contemporary English.
- source_word: שָׁאַל
  chosen: had asked for
  alternatives:
  - asked
  - requested
  lexicon: HALOT
  rationale: The verb means 'ask, request.' 'Had asked for' makes explicit the object relationship with אֶת הַדָּבָר הַזֶּה and reads naturally in English. The pluperfect sense fits the narrative sequence in English, though Hebrew itself does not mark pluperfect morphologically.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  rationale: Standard English transliteration of the personal name.
- source_word: אֶת הַדָּבָר הַזֶּה
  chosen: this
  alternatives:
  - this matter
  - this thing
  lexicon: HALOT
  rationale: The object phrase repeats דבר with the demonstrative. English can naturally compress this to 'this' after 'asked for' without loss of meaning. The fuller 'this matter' is possible but slightly heavier in style.
