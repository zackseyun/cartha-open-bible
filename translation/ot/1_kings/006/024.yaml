id: 1KI.6.24
reference: 1 Kings 6:24
source:
  edition: WLC
  text: וְ/חָמֵ֣שׁ אַמּ֗וֹת כְּנַ֤ף הַ/כְּרוּב֙ הָֽ/אֶחָ֔ת וְ/חָמֵ֣שׁ אַמּ֔וֹת כְּנַ֥ף הַ/כְּר֖וּב הַ/שֵּׁנִ֑ית עֶ֣שֶׂר אַמּ֔וֹת מִ/קְצ֥וֹת כְּנָפָ֖י/ו וְ/עַד קְצ֥וֹת כְּנָפָֽי/ו־׃
translation:
  text: And five cubits was the one wing of the cherub[a], and five cubits the second wing of the cherub; ten cubits from the end of its wings to the end of its wings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the tip of its wings to the tip of its wings,' that is, the full span from one wingtip to the other.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָמֵשׁ אַמּוֹת
  chosen: five cubits
  alternatives:
  - five ammah
  lexicon: HALOT
  rationale: Standard measurement phrase. 'Cubits' is the conventional and clear English equivalent for אַמָּה in architectural description.
- source_word: כְּנַף
  chosen: wing
  alternatives:
  - extremity
  lexicon: HALOT
  rationale: In the context of cherubim imagery and temple furnishings, כָּנָף plainly refers to a wing, not merely an edge or extremity.
- source_word: הַכְּרוּב
  chosen: the cherub
  alternatives:
  - the cherubim figure
  lexicon: HALOT
  rationale: Singular noun referring to each individual carved heavenly creature. 'Cherub' is standard English usage for כְּרוּב.
- source_word: הָאֶחָת
  chosen: the one
  alternatives:
  - the first
  lexicon: HALOT
  rationale: The Hebrew says 'the one' rather than explicitly 'first.' English preserves this with 'the one wing' to reflect the source more closely.
- source_word: הַשֵּׁנִית
  chosen: the second
  alternatives:
  - the other
  lexicon: HALOT
  rationale: Ordinal feminine agreeing with 'wing.' 'The second' is the most direct rendering, pairing naturally with 'the one.'
- source_word: עֶשֶׂר אַמּוֹת
  chosen: ten cubits
  lexicon: HALOT
  rationale: Straightforward measurement total for the full wingspan.
- source_word: מִקְצוֹת ... וְעַד קְצוֹת
  chosen: from the end of ... to the end of
  alternatives:
  - from the tip of ... to the tip of
  lexicon: HALOT
  rationale: The phrase marks extent from one extremity to the other. 'End' is slightly more formal and suits the architectural description; 'tip' is possible but more interpretive.
- source_word: כְּנָפָיו
  chosen: its wings
  alternatives:
  - his wings
  lexicon: HALOT
  rationale: Although the Hebrew suffix is grammatically masculine singular, English uses 'its' for an object/figure in temple description. This avoids implying personal maleness while remaining faithful to the referent.
