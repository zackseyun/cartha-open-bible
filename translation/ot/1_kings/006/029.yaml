id: 1KI.6.29
reference: 1 Kings 6:29
source:
  edition: WLC
  text: וְ/אֵת֩ כָּל קִיר֨וֹת הַ/בַּ֜יִת מֵסַ֣ב קָלַ֗ע פִּתּוּחֵי֙ מִקְלְעוֹת֙ כְּרוּבִ֣ים וְ/תִֽמֹרֹ֔ת וּ/פְטוּרֵ֖י צִצִּ֑ים מִ/לִּ/פְנִ֖ים וְ/לַ/חִיצֽוֹן־׀׃
translation:
  text: He carved all the walls of the house all around with engraved figures of cherubim[a], palm trees, and open flowers[c][b], on the inner and outer walls.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'flower blossoms' or 'unfolding flowers'; the Hebrew expression refers to floral decorative motifs, but the exact artistic form is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house,' a common designation here for the temple structure.
    reason: cultural_note
  - marker: c
    text: The final phrase may also be understood more generally as 'inside and outside,' though in this context it likely refers to the inner and outer sections of the sanctuary.
    reason: alternative_reading
lexical_decisions:
- source_word: קִירוֹת הַבַּיִת
  chosen: the walls of the house
  alternatives:
  - the walls of the temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In this temple-building context it refers to the temple structure, but 'house' preserves the Hebrew wording and echoes the broader usage of 'house' for the sanctuary in Kings.
- source_word: מֵסַב
  chosen: all around
  alternatives:
  - round about
  - on every side
  lexicon: HALOT
  rationale: The noun/adverb conveys surrounding extent. 'All around' is idiomatic modern English and preserves the sense that the carving covered the walls on every side.
- source_word: קָלַע
  chosen: carved
  alternatives:
  - engraved
  - carved in relief
  lexicon: HALOT
  rationale: In this architectural/decorative context the verb refers to ornamental carving on wood or wall surfaces. 'Carved' is the clearest natural rendering; the more specific idea of engraving is then carried by the following phrase.
- source_word: פִּתּוּחֵי מִקְלְעוֹת
  chosen: engraved figures
  alternatives:
  - carvings
  - carved engravings
  - relief carvings
  lexicon: HALOT
  rationale: The paired nouns intensify the idea of worked decorative carving. 'Engraved figures' captures both the crafted nature and the representational content without overtechnical wording.
- source_word: כְּרוּבִים
  chosen: cherubim
  alternatives:
  - cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' is the standard English transliteration for the heavenly beings and preserves the biblical/temple register better than the more colloquial ''cherubs.'''
- source_word: תִמֹרֹת
  chosen: palm trees
  alternatives:
  - palm forms
  - palm motifs
  lexicon: HALOT
  rationale: The noun denotes palm-tree forms in decorative art. 'Palm trees' is straightforward and fits the temple ornamentation context.
- source_word: פְטוּרֵי צִצִּים
  chosen: open flowers
  alternatives:
  - flower blossoms
  - unfolding flowers
  - gourd-shaped flowers
  lexicon: HALOT
  rationale: The phrase denotes floral ornamentation, likely blossoms opening outward. 'Open flowers' is concise and readable while preserving the visual sense. Because the exact botanical/artistic nuance is uncertain, a lexical alternative is preserved in a footnote.
- source_word: מִלִּפְנִים וְלַחִיצוֹן
  chosen: on the inner and outer rooms
  alternatives:
  - inside and outside
  - from the inner room to the outer room
  - within and without
  lexicon: HALOT
  rationale: The expression contrasts interior and exterior sections/surfaces. In the temple context, it most naturally refers to the inner and outer rooms/areas of the sanctuary rather than the building's exterior facade. 'On the inner and outer rooms' makes the architectural sense explicit in English.
