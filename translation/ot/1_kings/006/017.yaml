id: 1KI.6.17
reference: 1 Kings 6:17
source:
  edition: WLC
  text: וְ/אַרְבָּעִ֥ים בָּ/אַמָּ֖ה הָיָ֣ה הַ/בָּ֑יִת ה֖וּא הַ/הֵיכָ֥ל לִ/פְנָֽ/י׃
translation:
  text: And the house[a], that is, the nave before the inner sanctuary, was forty cubits long.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the main hall in front of it.' The Hebrew identifies 'the house' more specifically as the הֵיכָל, the main room before the inner sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַרְבָּעִים
  chosen: And ... forty
  alternatives:
  - Now ... forty
  - and forty
  lexicon: HALOT
  rationale: The conjunction links this verse to the preceding architectural description. 'Forty' straightforwardly renders the cardinal number.
- source_word: בָּ/אַמָּה
  chosen: cubits long
  alternatives:
  - in cubits
  - cubits
  lexicon: HALOT
  rationale: אַמָּה is the standard linear measure 'cubit.' English idiom requires supplying 'long' to express the dimension naturally in context.
- source_word: הָיָה
  chosen: was
  alternatives:
  - measured
  - amounted to
  lexicon: HALOT
  rationale: The simple copula best reflects the Hebrew verb of being in this descriptive clause.
- source_word: הַ/בָּיִת
  chosen: the house
  alternatives:
  - the temple
  - the building
  lexicon: HALOT
  rationale: בַּיִת literally means 'house' and is a common designation for the temple. Retaining 'house' preserves the Hebrew wording while the appositional phrase clarifies which part is meant.
- source_word: ה֖וּא
  chosen: that is
  alternatives:
  - it was
  - namely
  lexicon: HALOT
  rationale: The pronoun functions appositionally/explanatorily, identifying 'the house' more specifically. 'That is' communicates this clarifying force in natural English.
- source_word: הַ/הֵיכָל
  chosen: the nave
  alternatives:
  - the main hall
  - the temple nave
  - the holy place
  lexicon: HALOT
  rationale: הֵיכָל here refers to the main room of the temple building, distinct from the inner sanctuary mentioned in the surrounding context. 'Nave' is a precise architectural term; 'main hall' is possible but less specific. 'Holy place' is interpretive and can import later technical terminology.
- source_word: לִ/פְנָֽ/י
  chosen: in front of the inner sanctuary
  alternatives:
  - before it
  - at the front
  lexicon: HALOT
  rationale: The form is a shortened spelling for 'before/at the front of,' referring contextually to the inner sanctuary described in the previous verse. Explicitly supplying 'the inner sanctuary' makes the relation clear in English without changing the sense.
