id: 1KI.6.33
reference: 1 Kings 6:33
source:
  edition: WLC
  text: וְ/כֵ֥ן עָשָׂ֛ה לְ/פֶ֥תַח הַֽ/הֵיכָ֖ל מְזוּז֣וֹת עֲצֵי שָׁ֑מֶן מֵ/אֵ֖ת רְבִעִֽית־׃
translation:
  text: And so he made for the entrance of the nave doorposts of olivewood[a], four-sided.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'with four-sided framing' or 'square.' The Hebrew phrase 'from a fourth part' is architecturally difficult and may describe the shape of the doorway.
    reason: alternative_reading
lexical_decisions:
- source_word: וְכֵן
  chosen: And so
  alternatives:
  - And likewise
  - And in the same way
  lexicon: HALOT
  rationale: Introduces correspondence with the preceding description; 'And so' is natural English while preserving the connective sense of continuation/comparison.
- source_word: עָשָׂה
  chosen: he made
  alternatives:
  - he fashioned
  - he constructed
  lexicon: HALOT
  rationale: Standard rendering of עשה in a construction context; simple and direct.
- source_word: לְפֶתַח
  chosen: for the entrance
  alternatives:
  - for the doorway
  - for the opening
  lexicon: HALOT
  rationale: פתח here refers to the architectural entryway rather than merely an abstract opening; 'entrance' reads naturally in context.
- source_word: הַהֵיכָל
  chosen: the nave
  alternatives:
  - the temple hall
  - the main hall
  lexicon: HALOT
  rationale: In this temple-building context, היכל refers specifically to the main room of the temple building, distinct from the inner sanctuary. 'Nave' is a concise architectural equivalent, though somewhat specialized.
- source_word: מְזוּזוֹת
  chosen: doorposts
  alternatives:
  - doorframes
  - side posts
  lexicon: HALOT
  rationale: The term denotes the vertical posts of a doorway. 'Doorposts' is the most standard and precise English rendering.
- source_word: עֲצֵי שָׁמֶן
  chosen: olivewood
  alternatives:
  - wood of olive trees
  - olive tree wood
  lexicon: HALOT
  rationale: A compact English rendering of the construct phrase 'woods of oil,' idiomatically referring to olivewood.
- source_word: מֵאֵת רְבִעִית
  chosen: from a fourth part
  alternatives:
  - four-sided
  - square
  - with four-sided framing
  lexicon: HALOT
  rationale: This phrase is difficult and likely describes the shape/proportion of the doorway structure. A relatively literal rendering preserves the Hebrew's opacity without over-interpreting. Because many understand it as indicating a four-sided or square form, that alternative is preserved in a footnote.
