- issue: Duration of judgment on David's line
  chosen_reading: The judgment is temporary, not perpetual.
  alternative_readings:
  - The phrase could be rendered more idiomatically as 'not forever.'
  rationale: 'The Hebrew explicitly limits the duration of the affliction. The translation preserves that theological tension: real judgment, yet not final or endless. This aligns with the broader Davidic promise without importing more than the verse states.'
