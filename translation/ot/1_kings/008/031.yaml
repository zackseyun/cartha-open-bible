theological_decisions:
- issue: Rendering the legal term אָלָה in a temple-judicial context
  chosen_reading: oath
  alternative_readings:
  - curse
  rationale: In this verse the immediate context is a judicial oath taken before the altar. While אָלָה can denote a curse, especially the sanction attached to an oath, 'oath' best fits the procedural sense here. The curse nuance is preserved in a footnote rather than made primary.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
