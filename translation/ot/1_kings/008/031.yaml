id: 1KI.8.31
reference: 1 Kings 8:31
source:
  edition: WLC
  text: אֵת֩ אֲשֶׁ֨ר יֶחֱטָ֥א אִישׁ֙ לְ/רֵעֵ֔/הוּ וְ/נָֽשָׁא ב֥/וֹ אָלָ֖ה לְ/הַֽאֲלֹת֑/וֹ וּ/בָ֗א אָלָ֛ה לִ/פְנֵ֥י מִֽזְבַּחֲ/ךָ֖ בַּ/בַּ֥יִת הַ/זֶּֽה־׃
translation:
  text: If a man sins against his neighbor[a], and an oath is laid on him to make him swear, and the oath comes before your altar in this house,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a curse'; the Hebrew term can refer to the oath itself or to the curse invoked if the oath is broken.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶחֱטָא
  chosen: sins
  alternatives:
  - does wrong
  - offends
  lexicon: HALOT
  rationale: The verb חטא commonly means 'to sin' or 'miss the mark.' In this judicial context it refers to wrongdoing against another person, but 'sins' preserves the moral-religious force of the Hebrew better than a flatter legal paraphrase.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and functions generically. Per the translation philosophy, a gender-accurate rendering is preferred over a gender-neutral one where the source uses masculine representative language.
- source_word: לְרֵעֵהוּ
  chosen: against his neighbor
  alternatives:
  - against his fellow
  - against another
  lexicon: HALOT
  rationale: רֵעַ denotes one's fellow, companion, or neighbor. 'Neighbor' is idiomatic and preserves the interpersonal covenantal-ethical sense familiar in biblical usage.
- source_word: וְנָשָׂא בוֹ אָלָה
  chosen: an oath is laid on him
  alternatives:
  - he is put under an oath
  - a curse is imposed on him
  lexicon: HALOT
  rationale: The idiom נשא + אָלָה in this context refers to placing someone under an oath, especially in a judicial setting. 'An oath is laid on him' preserves the passive sense in natural English. Because אָלָה can also carry the sense of a curse attached to oath-breaking, that nuance is preserved in a footnote rather than foregrounded in the main text.
- source_word: לְהַאֲלֹתוֹ
  chosen: to make him swear
  alternatives:
  - to put him under oath
  - to adjure him
  lexicon: HALOT
  rationale: The Hiphil infinitive of אלה means to cause someone to swear or place under oath. 'To make him swear' is clear modern English and captures the causative force.
- source_word: וּבָא אָלָה
  chosen: and the oath comes
  alternatives:
  - and he comes under the oath
  - and the oath is brought
  lexicon: HALOT
  rationale: The Hebrew subject is most naturally 'the oath' (אָלָה), not the accused person. Rendering it this way preserves the syntax and the legal imagery of the oath being brought before God.
- source_word: לִפְנֵי מִזְבַּחֲךָ
  chosen: before your altar
  alternatives:
  - in the presence of your altar
  lexicon: HALOT
  rationale: A straightforward spatial/judicial expression. 'Before your altar' is both literal and idiomatic in English.
- source_word: בַּבַּיִת הַזֶּה
  lemma: בַּיִת
  chosen: in this house
  alternatives:
  - in this temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In Solomon's prayer it refers to the temple, but 'house' preserves the Hebrew wording and its theological resonance as the house built for the LORD.
