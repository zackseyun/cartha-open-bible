id: 1KI.8.21
reference: 1 Kings 8:21
source:
  edition: WLC
  text: וָ/אָשִׂ֨ם שָׁ֤ם מָקוֹם֙ לָֽ/אָר֔וֹן אֲשֶׁר שָׁ֖ם בְּרִ֣ית יְהוָ֑ה אֲשֶׁ֤ר כָּרַת֙ עִם אֲבֹתֵ֔י/נוּ בְּ/הוֹצִיא֥/וֹ אֹתָ֖/ם מֵ/אֶ֥רֶץ מִצְרָֽיִם־־׃ס
translation:
  text: And there I have set a place for the ark[b][a], in which is the covenant of Yahweh that he made with our fathers when he brought them out of the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the covenant of the LORD that he cut with our fathers.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''with our ancestors.'' Hebrew: ''with our fathers.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָשִׂם
  chosen: I have provided
  alternatives:
  - I have set
  - I have placed
  - I have made
  lexicon: HALOT
  rationale: The verb שׂוּם commonly means 'put/set/place.' In this context with מָקוֹם לָאָרוֹן ('a place for the ark'), idiomatic English is better served by 'have provided a place' rather than the more wooden 'have set a place.' The perfect with prefixed waw in Solomon's speech refers to a completed action.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: A straightforward adverb of place; retained as 'there' for natural English and to preserve the deictic emphasis.
- source_word: מָקוֹם
  chosen: a place
  alternatives:
  - room
  - site
  lexicon: HALOT
  rationale: The noun broadly means 'place.' 'A place' is the most direct rendering in this temple-setting context.
- source_word: לָאָרוֹן
  chosen: for the ark
  alternatives:
  - for the chest
  lexicon: HALOT
  rationale: אָרוֹן here refers specifically to the ark of the covenant, but since the following clause identifies the covenant, 'the ark' is sufficient and standard without overloading the phrase.
- source_word: אֲשֶׁר שָׁם
  chosen: in which is
  alternatives:
  - where is
  - there is in it
  lexicon: HALOT
  rationale: The relative clause literally reads 'which there [is] the covenant of the LORD.' English requires smoothing; 'in which is' preserves the locative sense tied to the ark.
- source_word: בְּרִית יְהוָה
  chosen: the covenant of the LORD
  alternatives:
  - the LORD's covenant
  lexicon: HALOT
  rationale: This construct phrase is rendered transparently. The divine name יְהוָה follows the project's default as 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כָּרַת
  chosen: made
  alternatives:
  - cut
  lexicon: HALOT
  rationale: Though the Hebrew idiom is literally 'cut' a covenant, idiomatic English is 'made' a covenant. The literal idiom is not preserved in the main text because it would sound unnatural here.
- source_word: עִם אֲבֹתֵינוּ
  chosen: with our fathers
  alternatives:
  - with our ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'our fathers.' Per the project's gender-accurate policy, this is retained rather than neutralized to 'ancestors,' though that alternative is possible in contemporary English.
- source_word: בְּהוֹצִיאוֹ אֹתָם
  chosen: when he brought them out
  alternatives:
  - when he led them out
  - in his bringing them out
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed ב conveys temporal sense here: ''when he brought them out.'' ''Brought out'' is the standard rendering of יצא in the Hiphil in exodus contexts.'
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: out of the land of Egypt
  alternatives:
  - from the land of Egypt
  lexicon: HALOT
  rationale: This is the conventional and precise rendering of the exodus formula. 'Out of the land of Egypt' matches the movement implied by the preceding verb.
