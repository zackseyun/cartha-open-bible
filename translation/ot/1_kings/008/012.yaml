  chosen_reading: Yahweh said that he would dwell in the thick darkness
  alternative_readings:
  - The LORD said that he would dwell in the dark cloud
  rationale: The verse presents the paradoxical theophanic motif of God's presence in obscurity. 'Thick darkness' preserves that theological tension rather than softening it into merely atmospheric cloud imagery.
  doctrine_reference: Preserve theological tension rather than resolve it.
