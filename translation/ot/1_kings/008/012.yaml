id: 1KI.8.12
reference: 1 Kings 8:12
source:
  edition: WLC
  text: אָ֖ז אָמַ֣ר שְׁלֹמֹ֑ה יְהוָ֣ה אָמַ֔ר לִ/שְׁכֹּ֖ן בָּ/עֲרָפֶֽל׃
translation:
  text: Then Solomon said[a], “Yahweh said that he would dwell in the thick darkness.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in the dark cloud.” The Hebrew עֲרָפֶל can denote dense darkness or dark cloud, especially in descriptions of the LORD’s manifest presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal discourse marker introducing Solomon's statement; 'Then' is natural modern English and preserves the narrative sequence.
- source_word: אָמַר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard rendering of אמר in narrative speech introduction. 'Said' fits both occurrences, with the second introducing reported divine speech.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  rationale: Standard English transliteration of the personal name, following the policy to transliterate names.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לִשְׁכֹּן
  chosen: would dwell
  alternatives:
  - to dwell
  - to reside
  lexicon: HALOT
  rationale: Infinitive construct with ל after 'said' expresses the content of what was said/purposed. In idiomatic English, 'said that he would dwell' best conveys the sense without woodenness.
- source_word: בָּעֲרָפֶל
  chosen: in the thick darkness
  alternatives:
  - in the dark cloud
  - in the gloom
  lexicon: HALOT
  rationale: עֲרָפֶל denotes dense darkness/gloom, often associated with the divine presence. 'Thick darkness' preserves both the physical imagery and the theophanic weight better than the more meteorological 'dark cloud'.
