id: 1KI.13.13
reference: 1 Kings 13:13
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ אֶל בָּנָ֔י/ו חִבְשׁוּ לִ֖/י הַ/חֲמ֑וֹר וַ/יַּחְבְּשׁוּ ל֣/וֹ הַ/חֲמ֔וֹר וַ/יִּרְכַּ֖ב עָלָֽי/ו־־־׃
translation:
  text: And he said to his sons[a], “Saddle the donkey for me.” So they saddled the donkey for him, and he rode on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And they saddled the donkey for him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative progression; 'And he said' preserves the Hebrew narrative flow without overinterpreting temporal sequence.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew noun is specifically masculine plural, not gender-neutral. 'Sons' is the gender-accurate rendering required by the translation philosophy.
- source_word: חִבְשׁוּ לִי הַחֲמוֹר
  chosen: Saddle the donkey for me
  alternatives:
  - Bind the donkey for me
  - Saddle me the donkey
  lexicon: HALOT
  rationale: חבש in this context means to saddle or prepare an animal for riding. 'Saddle the donkey for me' is idiomatic modern English and matches the action described.
- source_word: הַחֲמוֹר
  chosen: the donkey
  alternatives:
  - the ass
  lexicon: HALOT
  rationale: חמור is the common term for a donkey. 'Ass' is traditional but archaic or potentially distracting in modern English; 'donkey' is clear and accurate.
- source_word: וַיַּחְבְּשׁוּ לוֹ הַחֲמוֹר
  chosen: So they saddled the donkey for him
  alternatives:
  - And they saddled the donkey for him
  lexicon: HALOT
  rationale: Repeats the same verb as the command, now in fulfilled action. 'So' communicates the responsive result naturally in English while preserving the narrative sequence.
- source_word: וַיִּרְכַּב עָלָיו
  chosen: and he rode on it
  alternatives:
  - and he mounted it
  - and he rode on him
  lexicon: HALOT
  rationale: רכב על commonly means to ride on an animal. English idiom prefers 'rode on it.' Although the Hebrew pronominal suffix is grammatically masculine, English normally uses 'it' for an animal in this context unless personhood is emphasized.
