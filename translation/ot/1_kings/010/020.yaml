id: 1KI.10.20
reference: 1 Kings 10:20
source:
  edition: WLC
  text: וּ/שְׁנֵ֧ים עָשָׂ֣ר אֲרָיִ֗ים עֹמְדִ֥ים שָׁ֛ם עַל שֵׁ֥שׁ הַֽ/מַּעֲל֖וֹת מִ/זֶּ֣ה וּ/מִ/זֶּ֑ה לֹֽא נַעֲשָׂ֥ה כֵ֖ן לְ/כָל מַמְלָכֽוֹת־־־׃
translation:
  text: And twelve lions were standing there on the six steps[a], on this side and on that side[b]; nothing like it had been made in any kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'on one side and on the other.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'it had not been made so for all the kingdoms.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁנֵים עָשָׂר
  chosen: And twelve
  alternatives:
  - and there were twelve
  lexicon: HALOT
  rationale: Cardinal number introducing the next clause. English can omit an explicit existential verb because the participle עֹמְדִים supplies the predication.
- source_word: אֲרָיִים
  chosen: lions
  lexicon: HALOT
  rationale: Straightforward plural noun referring to lion figures associated with the throne setting; 'lions' is the natural and literal rendering.
- source_word: עֹמְדִים
  chosen: were standing
  alternatives:
  - stood
  lexicon: HALOT
  rationale: Qal participle plural conveys a stative/descriptive scene. 'Were standing' preserves the visual descriptive force better than the simple past, though 'stood' would also be possible.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Locative adverb pointing back to the throne setting just described; 'there' is the direct equivalent.
- source_word: עַל שֵׁשׁ הַמַּעֲלוֹת
  chosen: on the six steps
  alternatives:
  - by the six steps
  - upon the six steps
  lexicon: HALOT
  rationale: מַעֲלוֹת here refers to stair-steps leading up to the throne. 'On the six steps' follows the Hebrew preposition and fits the image of lions positioned along the staircase.
- source_word: מִזֶּה וּמִזֶּה
  chosen: on this side and on that side
  alternatives:
  - on one side and on the other
  - from here and from there
  lexicon: HALOT
  rationale: Idiomatic distributive expression indicating placement on both sides. 'On this side and on that side' preserves the symmetry and spatial sense.
- source_word: לֹא נַעֲשָׂה כֵן
  chosen: nothing like it had been made
  alternatives:
  - it had not been made so
  - nothing had been made like this
  lexicon: HALOT
  rationale: Nifal perfect of עשה with כֵן expresses that no comparable object/work had been produced. English idiom is best captured by 'nothing like it had been made.'
- source_word: לְכָל מַמְלָכוֹת
  chosen: for any kingdom
  alternatives:
  - for all kingdoms
  - in any kingdom
  lexicon: HALOT
  rationale: The ל with כָל in this negative-comparative context means 'for/in any of the kingdoms.' Singular 'any kingdom' is idiomatic English while preserving the distributive sense of the Hebrew plural.
