id: ISA.42.23
reference: Isaiah 42:23
source:
  edition: WLC
  text: מִ֥י בָ/כֶ֖ם יַאֲזִ֣ין זֹ֑את יַקְשִׁ֥ב וְ/יִשְׁמַ֖ע לְ/אָחֽוֹר׃
translation:
  text: Who among you will listen to this, will pay attention and hear hereafter?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the future,' 'hereafter,' or 'afterward.' The Hebrew literally has
      'for behind/back,' used idiomatically for what comes later.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who
  alternatives:
  - Who is there that
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question; simple 'Who'
    is natural and sufficiently formal.
- source_word: בָכֶם
  chosen: among you
  alternatives:
  - of you
  - in you
  lexicon: HALOT
  rationale: The preposition ב with the 2mp suffix here idiomatically means 'among
    you' or 'of you' in the sense 'which one of you.' 'Among you' reads naturally
    in English and preserves the collective address.
- source_word: יַאֲזִין
  chosen: will listen
  alternatives:
  - will give ear
  - will hear
  lexicon: HALOT
  rationale: Hiphil of אזן means to give ear, listen attentively. 'Will listen' is
    clear modern English; 'give ear' is more formal but archaic.
- source_word: זֹאת
  chosen: this
  alternatives:
  - these things
  lexicon: HALOT
  rationale: Feminine singular demonstrative, referring to the present message or
    warning. Singular 'this' best matches the form and discourse function.
- source_word: יַקְשִׁב
  chosen: will pay attention
  alternatives:
  - will attend
  - will listen carefully
  lexicon: HALOT
  rationale: קשב in Hiphil intensifies attentive listening. Rendering it differently
    from יאזין preserves the Hebrew's paired but non-identical verbs.
- source_word: וְיִשְׁמַע
  chosen: and hear
  alternatives:
  - and obey
  - and listen
  lexicon: HALOT
  rationale: שמע can include obedience, but in this context of auditory attentiveness
    and warning, 'hear' is the most textually grounded rendering.
- source_word: לְאָחוֹר
  chosen: for the time to come
  alternatives:
  - for the future
  - hereafter
  - afterward
  lexicon: HALOT
  rationale: Literally 'for behind/back/afterward.' In context it points to heeding
    the lesson with a view to what lies ahead. 'For the time to come' expresses the
    temporal sense idiomatically in English while preserving the exhortational force.
