theological_decisions:
- issue: Scope of the servant's mission
  chosen_reading: universal scope implied by 'earth' and 'coastlands'
  alternative_readings:
  - primarily the land of Israel with secondary wider implications
  rationale: The verse itself points beyond Israel by pairing 'earth' with 'coastlands,'
    so the translation reflects the broader horizon without importing later theological
    conclusions beyond the text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
