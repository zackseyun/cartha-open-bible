id: ISA.42.4
reference: Isaiah 42:4
source:
  edition: WLC
  text: לֹ֤א יִכְהֶה֙ וְ/לֹ֣א יָר֔וּץ עַד יָשִׂ֥ים בָּ/אָ֖רֶץ מִשְׁפָּ֑ט וּ/לְ/תוֹרָת֖/וֹ
    אִיִּ֥ים יְיַחֵֽילוּ־׃פ
translation:
  text: He will not grow dim or be crushed until he establishes justice in the earth,
    and the coastlands will wait for his instruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will hope for his instruction.' The Hebrew verb carries the sense of
      waiting with expectation.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִכְהֶה
  chosen: grow dim
  alternatives:
  - be faint
  - be extinguished
  lexicon: HALOT
  rationale: The verb from כהה commonly denotes becoming dim or faint. In context,
    paired with יָרוּץ and echoing the previous verse's imagery of a dimly burning
    wick, 'grow dim' preserves the metaphorical force without over-paraphrasing.
- source_word: יָרוּץ
  chosen: be crushed
  alternatives:
  - be broken
  - be bruised
  lexicon: HALOT
  rationale: The verb רצץ means to crush or break. Because the previous verse used
    the same root for a 'bruised/crushed reed,' 'be crushed' preserves the lexical
    link across the servant song better than a looser rendering.
- source_word: עַד יָשִׂים
  chosen: until he establishes
  alternatives:
  - until he sets
  - until he puts in place
  lexicon: HALOT
  rationale: שׂים literally means 'set/put,' but with מִשְׁפָּט in context it idiomatically
    conveys establishing or setting in place justice. 'Establishes' is natural English
    and reflects the resultative sense.
- source_word: בָּאָרֶץ
  chosen: in the earth
  alternatives:
  - in the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' Here the following mention of אִיִּים
    ('coastlands/islands') broadens the scope beyond a local territory, so 'earth'
    best fits the universal horizon of the passage.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - justice and judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט in Isaiah often carries the sense of just order or justice
    rather than merely a judicial verdict. 'Justice' is the clearest modern English
    rendering here.
- source_word: לְתוֹרָתוֹ
  chosen: his instruction
  alternatives:
  - his law
  - his teaching
  lexicon: HALOT
  rationale: תּוֹרָה fundamentally denotes instruction or teaching, not only statutory
    law. In this servant context, 'instruction' preserves the broader semantic range
    and avoids narrowing the term to legal code alone. 'Teaching' is possible, but
    'instruction' better reflects the covenantal weight of torah.
- source_word: אִיִּים
  chosen: the coastlands
  alternatives:
  - the islands
  - the distant shores
  lexicon: HALOT
  rationale: In prophetic literature אִיִּים often refers to maritime lands or distant
    coastlands, not strictly islands. 'The coastlands' is the standard idiomatic rendering
    in this context.
- source_word: יְיַחֵילוּ
  chosen: will wait for
  alternatives:
  - will hope for
  - will eagerly expect
  lexicon: HALOT
  rationale: יחל in the Piel can express waiting in hope or expectant longing. 'Will
    wait for' keeps the verbal idea while allowing the hopeful nuance to be supplied
    by context; the alternative 'hope for' is worth preserving in a footnote.
