id: ISA.42.16
reference: Isaiah 42:16
source:
  edition: WLC
  text: וְ/הוֹלַכְתִּ֣י עִוְרִ֗ים בְּ/דֶ֨רֶךְ֙ לֹ֣א יָדָ֔עוּ בִּ/נְתִיב֥וֹת לֹֽא יָדְע֖וּ
    אַדְרִיכֵ֑/ם אָשִׂים֩ מַחְשָׁ֨ךְ לִ/פְנֵי/הֶ֜ם לָ/א֗וֹר וּ/מַֽעֲקַשִּׁים֙ לְ/מִישׁ֔וֹר
    אֵ֚לֶּה הַ/דְּבָרִ֔ים עֲשִׂיתִ֖/ם וְ/לֹ֥א עֲזַבְתִּֽי/ם־׃
translation:
  text: And I will lead the blind in a way they have not known; in paths they have
    not known I will guide them. I will make the darkness before them into light,
    and the crooked places into level ground. These are the things I have done, and
    I have not forsaken them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'These are the things I will do, and I will not forsake them.' The Hebrew
      uses perfect verbs here, which may express completed action or prophetic certainty
      about what God promises to do.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהוֹלַכְתִּי
  chosen: And I will lead
  alternatives:
  - And I will cause to walk
  - And I will bring
  lexicon: HALOT
  rationale: Hiphil of הלך is causative, 'cause to go/walk,' but idiomatic English
    in this context is 'lead.' This preserves divine guidance without wooden phrasing.
- source_word: עִוְרִים
  chosen: the blind
  alternatives:
  - blind people
  lexicon: HALOT
  rationale: The masculine plural adjective functions substantivally. 'The blind'
    is concise and natural English, preserving the image of those lacking sight, likely
    both literal and metaphorical.
- source_word: בְּדֶרֶךְ
  chosen: by a way
  alternatives:
  - in a way
  - on a road
  lexicon: HALOT
  rationale: דרך can mean road, way, or manner. Here it is a route of guidance; 'by
    a way' fits the preposition and pairs well with the following parallel 'on paths.'
- source_word: לֹא יָדָעוּ
  chosen: they have not known
  alternatives:
  - they did not know
  - they have not experienced
  lexicon: HALOT
  rationale: ידע denotes knowing, including familiarity by experience. The perfect
    is rendered with English present perfect to convey a state of prior unfamiliarity
    relevant to the promised guidance.
- source_word: בִּנְתִיבוֹת
  chosen: on paths
  alternatives:
  - in tracks
  - by pathways
  lexicon: HALOT
  rationale: נתיבות is a poetic plural for paths or tracks. 'Paths' is natural and
    preserves the parallelism with 'way.'
- source_word: אַדְרִיכֵם
  chosen: I will guide them
  alternatives:
  - I will cause them to tread
  - I will direct them
  lexicon: HALOT
  rationale: Hiphil of דרך means to lead or guide. 'Guide' avoids redundancy with
    the earlier 'lead' while preserving the semantic field of directed movement.
- source_word: אָשִׂים
  chosen: I will make
  alternatives:
  - I will set
  - I will turn
  lexicon: HALOT
  rationale: שים is broad ('put, set, make'). In the transformation clauses, 'make'
    is the most idiomatic English rendering.
- source_word: מַחְשָׁךְ
  chosen: the darkness
  alternatives:
  - darkness
  lexicon: HALOT
  rationale: The noun denotes darkness; with the following phrase 'before them,' the
    image is of obscurity or danger ahead. The article in English helps the concrete
    imagery.
- source_word: לִפְנֵיהֶם
  chosen: before them
  alternatives:
  - in front of them
  lexicon: HALOT
  rationale: Literally 'to/for the face of them,' idiomatically 'before them.' This
    preserves the spatial metaphor.
- source_word: לָאוֹר
  chosen: into light
  alternatives:
  - to light
  lexicon: HALOT
  rationale: 'The lamed here marks result in context: darkness is transformed into
    light. ''Into light'' makes the transformation explicit in idiomatic English.'
- source_word: וּמַעֲקַשִּׁים
  chosen: the crooked places
  alternatives:
  - crooked things
  - rough places
  - twisted places
  lexicon: HALOT
  rationale: From עקשׁ, denoting what is crooked or twisted. Because it parallels
    route imagery, 'crooked places' best fits the context of travel and terrain.
- source_word: לְמִישׁוֹר
  chosen: into level ground
  alternatives:
  - into straightness
  - into a plain
  - into smooth ground
  lexicon: HALOT
  rationale: מישור can denote level place, plain, or uprightness. In this travel metaphor,
    'level ground' communicates terrain made passable more clearly than the abstract
    'straightness.'
- source_word: אֵלֶּה הַדְּבָרִים
  chosen: These are the things
  alternatives:
  - These things
  - These are the matters
  lexicon: HALOT
  rationale: A resumptive phrase emphasizing the certainty of Yahweh's acts. 'These
    are the things' is natural English and preserves the demonstrative emphasis.
- source_word: עֲשִׂיתִם
  chosen: I have done
  alternatives:
  - I will do them
  - I do them
  lexicon: HALOT
  rationale: The form is morphologically perfect 1cs + 3mp suffix ('I have done them').
    Although some translations smooth it futuristically because of the surrounding
    promises, the Hebrew perfect can present the action as certain/accomplished. Retaining
    'I have done' preserves the prophetic perfect nuance without over-interpreting.
- source_word: וְלֹא עֲזַבְתִּים
  chosen: and I have not forsaken them
  alternatives:
  - and I will not forsake them
  - and I have not abandoned them
  lexicon: HALOT
  rationale: עזב means leave, forsake, abandon. 'Forsaken' preserves covenantal resonance.
    The perfect is kept as English present perfect to match the preceding clause and
    preserve the sense of assured, enduring commitment.
