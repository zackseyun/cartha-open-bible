theological_decisions:
- issue: Rendering the final perfect verbs in a context of future promise
  chosen_reading: Use English present perfect ('I have done ... I have not forsaken')
    to preserve the Hebrew perfects as prophetic-certainty language
  alternative_readings:
  - 'Use simple future: ''I will do ... I will not forsake'''
  - 'Use present: ''I do ... I do not forsake'''
  rationale: 'The verse begins with clear future-oriented promises, but the final
    clauses shift to perfect forms. Rather than flattening them into future, the translation
    preserves the Hebrew aspectual shift as a rhetorical assertion of certainty: what
    God promises is spoken of as accomplished. This avoids importing a narrower temporal
    scheme while keeping the line intelligible in English.'
  doctrine_reference: Translation philosophy §1, §3, §5
