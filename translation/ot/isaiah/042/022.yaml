id: ISA.42.22
reference: Isaiah 42:22
source:
  edition: WLC
  text: וְ/הוּא֮ עַם בָּז֣וּז וְ/שָׁסוּי֒ הָפֵ֤חַ בַּֽ/חוּרִים֙ כֻּלָּ֔/ם וּ/בְ/בָתֵּ֥י
    כְלָאִ֖ים הָחְבָּ֑אוּ הָי֤וּ לָ/בַז֙ וְ/אֵ֣ין מַצִּ֔יל מְשִׁסָּ֖ה וְ/אֵין אֹמֵ֥ר
    הָשַֽׁב־־׃
translation:
  text: But this is a people plundered and pillaged, all of them trapped in holes
    and hidden away in prison houses. They have become spoil, with no one to rescue
    them; plunder, with no one saying, “Restore!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'all of them are trapped among young men,' if בַּחוּרִים is
      taken in its more common sense 'young men'; the context, however, favors a sense
      like 'holes' or 'pits.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא
  chosen: But this is
  alternatives:
  - And he/it is
  - Yet it is
  lexicon: HALOT
  rationale: The pronoun refers back to the people/nation under discussion and introduces
    a contrastive description. English idiom prefers an explicit demonstrative construction
    ('this is') rather than a bare 'and he/it is.' 'But' captures the adversative
    force in context.
- source_word: עַם
  chosen: a people
  alternatives:
  - the people
  - a nation
  lexicon: HALOT
  rationale: עַם commonly means 'people' in the collective sense. The anarthrous form
    works naturally as 'a people' here, describing their condition rather than naming
    them formally as 'the people.'
- source_word: בָּזוּז
  chosen: plundered
  alternatives:
  - robbed
  - despoiled
  lexicon: HALOT
  rationale: From בזז, denoting being taken as spoil or plundered. 'Plundered' preserves
    the warfare/raid nuance better than the more general 'robbed.'
- source_word: וְשָׁסוּי
  chosen: pillaged
  alternatives:
  - stripped
  - despoiled
  lexicon: HALOT
  rationale: Paired with בָּזוּז, this term intensifies the picture of violent devastation.
    'Pillaged' gives a distinct but related English term, preserving the Hebrew doublet
    without flattening it into repetition.
- source_word: הָפֵחַ
  chosen: trapped
  alternatives:
  - snared
  - blown/puffed
  lexicon: HALOT
  rationale: In this difficult form and context, the sense is that they are ensnared
    or trapped. 'Trapped' is clear modern English and fits the following locative
    phrase. A more literal but less transparent option like 'snared' is possible.
- source_word: בַּחוּרִים
  chosen: in holes
  alternatives:
  - in pits
  - among young men
  lexicon: HALOT
  rationale: Context strongly favors a noun referring to holes/pits or hiding places
    rather than 'young men.' The image is of people trapped in concealed places, parallel
    to being hidden in prison houses. Because the form is somewhat difficult, the
    alternative is preserved in a footnote.
- source_word: כֻּלָּם
  chosen: all of them
  alternatives:
  - all
  - every one of them
  lexicon: HALOT
  rationale: The suffix makes the distributive force explicit. 'All of them' is natural
    and emphatic in English.
- source_word: וּבְבָתֵּי כְלָאִים
  chosen: in prison houses
  alternatives:
  - in prisons
  - in houses of confinement
  lexicon: HALOT
  rationale: Literally 'in houses of confinement/imprisonment.' 'Prison houses' preserves
    the concrete Hebrew imagery better than simply 'prisons,' while remaining understandable.
- source_word: הָחְבָּאוּ
  chosen: hidden away
  alternatives:
  - they were hidden
  - they hid themselves
  lexicon: HALOT
  rationale: The passive/reflexive nuance indicates being concealed. 'Hidden away'
    communicates the state resulting from the action and fits the lament tone.
- source_word: הָיוּ לָבַז
  chosen: They have become spoil
  alternatives:
  - They became plunder
  - They were for prey
  lexicon: HALOT
  rationale: The idiom היה ל + noun means 'become' or 'come to be as.' 'Spoil' is
    a natural singular collective in English and echoes the plundering vocabulary
    already present.
- source_word: וְאֵין מַצִּיל
  chosen: with no one to rescue them
  alternatives:
  - and there is no deliverer
  - and none rescues
  lexicon: HALOT
  rationale: The participle denotes one who rescues/delivers. 'With no one to rescue
    them' is idiomatic and preserves the existential force of אֵין.
- source_word: מְשִׁסָּה
  chosen: plunder
  alternatives:
  - booty
  - spoliation
  lexicon: HALOT
  rationale: A noun parallel to לָבַז, again emphasizing their condition as prey to
    others. 'Plunder' is the clearest modern equivalent.
- source_word: וְאֵין אֹמֵר
  chosen: with no one saying
  alternatives:
  - and no one says
  - and there is none who says
  lexicon: HALOT
  rationale: This repeats the existential lament structure. 'With no one saying' matches
    the previous clause stylistically in English.
- source_word: הָשַׁב
  chosen: Restore!
  alternatives:
  - Give back!
  - Bring back!
  lexicon: HALOT
  rationale: Imperative from שוב, here likely calling for the return of captives or
    stolen goods. 'Restore!' is broad enough to include both persons and property
    and suits the prophetic context.
