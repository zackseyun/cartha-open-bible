theological_decisions:
- issue: Metaphorical portrayal of the servant's treatment of the weak
  chosen_reading: Retain the concrete metaphors 'bruised reed' and 'dimly burning wick' rather than interpret them explicitly as weak people.
  alternative_readings:
  - A weak person he will not crush, and a failing one he will not snuff out.
  rationale: The Hebrew presents vivid metaphors and does not itself unpack them. Preserving the imagery maintains the poetic force and avoids importing an interpretation into the main text.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Rendering לֶאֱמֶת
  chosen_reading: faithfully
  alternative_readings:
  - in truth
  - truly
  rationale: The term אֱמֶת can denote truth, faithfulness, or reliability. In this context the servant's manner of establishing justice is best expressed adverbially as faithful reliability, but the more literal 'in truth' remains viable and is preserved in a footnote to maintain interpretive transparency.
  doctrine_reference: Translation philosophy §3, §5
