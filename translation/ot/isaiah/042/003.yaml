id: ISA.42.3
reference: Isaiah 42:3
source:
  edition: WLC
  text: קָנֶ֤ה רָצוּץ֙ לֹ֣א יִשְׁבּ֔וֹר וּ/פִשְׁתָּ֥ה כֵהָ֖ה לֹ֣א יְכַבֶּ֑/נָּה לֶ/אֱמֶ֖ת יוֹצִ֥יא מִשְׁפָּֽט׃
translation:
  text: A bruised reed he will not break[a], and a dimly burning wick he will not extinguish[b]; he will faithfully bring forth justice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "a faint/smoldering flax wick." The Hebrew literally refers to flax, here likely meaning a lamp wick made from flax.
    reason: lexical_alternative
  - marker: b
    text: Or "in truth he will bring forth justice."
    reason: alternative_reading
lexical_decisions:
- source_word: קָנֶה
  chosen: reed
  alternatives:
  - stalk
  - cane
  lexicon: HALOT
  rationale: The noun commonly denotes a reed or cane plant. 'Reed' is the established and most natural English equivalent in this metaphorical context.
- source_word: רָצוּץ
  chosen: bruised
  alternatives:
  - crushed
  - broken
  lexicon: HALOT
  rationale: The passive participial sense is something damaged or crushed. 'Bruised' preserves the image of fragility without overstating it as already fully broken.
- source_word: יִשְׁבּוֹר
  chosen: he will not break
  alternatives:
  - he does not break
  lexicon: HALOT
  rationale: The imperfect here expresses characteristic future/ongoing action in the servant description. 'Will not break' fits the prophetic portrayal in English.
- source_word: פִשְׁתָּה
  chosen: wick
  alternatives:
  - flax
  - linen fiber
  lexicon: HALOT
  rationale: Literally 'flax,' but in this collocation with כֵהָה and כבה the referent is flax used as a lamp wick. 'Wick' communicates the intended image in natural English while staying close to the source sense.
- source_word: כֵהָה
  chosen: dimly burning
  alternatives:
  - faint
  - smoldering
  - growing dim
  lexicon: HALOT
  rationale: The adjective describes something faint or dim. With 'wick,' English idiom requires an expression like 'dimly burning' to convey a wick near extinction without importing the stronger image of smoke alone.
- source_word: יְכַבֶּנָּה
  chosen: he will not extinguish
  alternatives:
  - quench
  - put out
  lexicon: HALOT
  rationale: The verb means to quench or extinguish. 'Extinguish' is clear modern English and preserves the lamp/wick imagery.
- source_word: לֶאֱמֶת
  chosen: faithfully
  alternatives:
  - in truth
  - truly
  lexicon: HALOT
  rationale: The phrase can mean 'in truth' or 'faithfully.' Here it modifies the servant's bringing forth justice in a way that emphasizes reliability and genuineness. 'Faithfully' is idiomatic and captures the adverbial force well; the more literal alternative is preserved in a footnote because the phrase is interpretively significant.
- source_word: יוֹצִיא
  chosen: he will bring forth
  alternatives:
  - he will bring out
  - he will cause to go out
  lexicon: HALOT
  rationale: The Hiphil of יצא here means to bring forth or produce. 'Bring forth' is both natural and suitably formal for prophetic diction.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - justice and judgment
  lexicon: HALOT
  rationale: In Isaiah this term often carries the sense of just order or justice rather than merely a judicial verdict. 'Justice' is the clearest modern rendering in context.
