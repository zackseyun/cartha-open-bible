theological_decisions:
- issue: Imagery of divine judgment over creation
  chosen_reading: Render the verse as a declaration of the LORD's power to desolate
    terrain and waters without softening the imagery into mere metaphor.
  alternative_readings:
  - Read primarily as figurative language for removing obstacles
  rationale: The Hebrew uses concrete environmental imagery. While the broader context
    may allow metaphorical implications, the translation should preserve the literal
    force of the imagery and not resolve whether it is exclusively figurative or also
    historical/cosmic.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
