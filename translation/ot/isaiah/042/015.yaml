id: ISA.42.15
reference: Isaiah 42:15
source:
  edition: WLC
  text: אַחֲרִ֤יב הָרִים֙ וּ/גְבָע֔וֹת וְ/כָל עֶשְׂבָּ֖/ם אוֹבִ֑ישׁ וְ/שַׂמְתִּ֤י
    נְהָרוֹת֙ לָֽ/אִיִּ֔ים וַ/אֲגַמִּ֖ים אוֹבִֽישׁ־׃
translation:
  text: I will lay waste mountains and hills, and dry up all their vegetation; I will
    turn rivers into islands, and dry up pools.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'coastlands' for 'islands'; the Hebrew term can denote islands or maritime
      lands.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרִיב
  chosen: I will lay waste
  alternatives:
  - I will devastate
  - I will destroy
  lexicon: HALOT
  rationale: Hiphil of חרב conveys causing desolation or ruin. 'Lay waste' preserves
    the causative force and prophetic judgment tone without overstating to total annihilation.
- source_word: הָרִים
  chosen: mountains
  lexicon: HALOT
  rationale: Standard rendering of הרים.
- source_word: וּגְבָעוֹת
  chosen: and hills
  alternatives:
  - and high places
  lexicon: HALOT
  rationale: גבעות normally denotes hills. 'High places' would import cultic associations
    not signaled here.
- source_word: וְכָל עֶשְׂבָּם
  chosen: and all their vegetation
  alternatives:
  - and all their grass
  - and all their herbage
  lexicon: HALOT
  rationale: עֵשֶׂב can mean grass, herb, or vegetation broadly. Because the suffix
    refers to the mountains and hills collectively, 'vegetation' best captures all
    plant growth on them in natural English.
- source_word: אוֹבִישׁ
  chosen: I will dry up
  alternatives:
  - I will wither
  - I will make dry
  lexicon: HALOT
  rationale: 'Hiphil of יבש is causative: to make dry. ''Dry up'' fits both vegetation
    and waters in this verse and preserves the repeated verbal pattern.'
- source_word: וְשַׂמְתִּי
  chosen: I will turn
  alternatives:
  - I will make
  - I will set
  lexicon: HALOT
  rationale: שׂים literally means 'set/put/make.' In the construction with object
    plus predicate complement ('rivers' + 'into islands'), 'turn' is idiomatic English
    and preserves the transformational sense.
- source_word: נְהָרוֹת
  chosen: rivers
  alternatives:
  - streams
  lexicon: HALOT
  rationale: נהרות ordinarily means rivers; no contextual reason to weaken it to 'streams.'
- source_word: לָאִיִּים
  chosen: into islands
  alternatives:
  - into coastlands
  - into dry land
  lexicon: HALOT
  rationale: אִיִּים commonly denotes islands or coastlands. Here, in parallel with
    drying up pools, the image is of waters reduced to dry land masses. 'Islands'
    is the more direct lexical rendering, while the alternative 'coastlands' is preserved
    in a footnote because the Hebrew term can bear that sense.
- source_word: וַאֲגַמִּים
  chosen: and pools
  alternatives:
  - and marshes
  - and ponds
  lexicon: HALOT
  rationale: אגמים refers to pools or marshy waters. 'Pools' is concise and fits the
    parallel with rivers.
- source_word: אוֹבִישׁ
  chosen: I will dry up
  alternatives:
  - I will make dry
  lexicon: HALOT
  rationale: Repeated verb retained with the same English gloss for consistency and
    to preserve the verse's rhetorical repetition.
