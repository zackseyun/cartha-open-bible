id: ISA.42.17
reference: Isaiah 42:17
source:
  edition: WLC
  text: נָסֹ֤גוּ אָחוֹר֙ יֵבֹ֣שׁוּ בֹ֔שֶׁת הַ/בֹּטְחִ֖ים בַּ/פָּ֑סֶל הָ/אֹמְרִ֥ים לְ/מַסֵּכָ֖ה אַתֶּ֥ם אֱלֹהֵֽי/נוּ׃ס
translation:
  text: They will be turned back[a]; they will be utterly put to shame—those who trust in an idol, who say to a cast image[d][c][b], “You are our gods.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “will retreat backward”; the Hebrew verb can denote turning back or being driven back.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, “will be ashamed with shame,” an emphatic expression meaning “will be utterly put to shame.”
    reason: lexical_alternative
  - marker: c
    text: Or “carved image” for “idol,” and “molten image” for “cast image.” The Hebrew uses two distinct terms for manufactured objects of worship.
    reason: lexical_alternative
  - marker: d
    text: Hebrew “You are our gods,” with a plural noun; some translations smooth this to “our god.”
    reason: alternative_reading
lexical_decisions:
- source_word: נָסֹגוּ
  chosen: will be turned back
  alternatives:
  - have turned back
  - will retreat
  lexicon: HALOT
  rationale: From נסג/סוג 'to turn back, retreat, be driven back.' In context with the following imperfect and judgment tone, an English future fits well. Passive-like English ('be turned back') captures the likely resultative sense better than a simple active 'retreat.'
- source_word: אָחוֹר
  chosen: back
  alternatives:
  - backward
  - to the rear
  lexicon: HALOT
  rationale: Adverbial accusative meaning 'back/backward.' 'Back' is the most natural modern English collocation with 'turned.'
- source_word: יֵבֹשׁוּ בֹשֶׁת
  chosen: will be utterly put to shame
  alternatives:
  - will be ashamed with shame
  - will be greatly ashamed
  - will be put to shame
  lexicon: HALOT
  rationale: The verb בוש with the cognate noun בֹשֶׁת intensifies the idea. English cannot naturally reproduce the exact cognate construction, so 'utterly put to shame' conveys the emphatic force without awkwardness.
- source_word: הַבֹּטְחִים
  chosen: those who trust
  alternatives:
  - the ones trusting
  - those who rely
  lexicon: HALOT
  rationale: Substantival participle referring to a class of people. 'Those who trust' is natural and preserves the ongoing characteristic sense.
- source_word: בַּפָּסֶל
  chosen: in an idol
  alternatives:
  - in a carved image
  - in the idol
  lexicon: HALOT
  rationale: פֶּסֶל denotes an idol/image, often carved. 'Idol' foregrounds the polemical religious sense in context. The article with prefixed preposition is generic here, so English indefinite is preferable.
- source_word: הָאֹמְרִים
  chosen: who say
  alternatives:
  - those saying
  lexicon: HALOT
  rationale: Substantival participle continuing description of the same group. Relative clause English is most readable.
- source_word: לְמַסֵּכָה
  chosen: to a cast image
  alternatives:
  - to a molten image
  - to an image of metal
  lexicon: HALOT
  rationale: מַסֵּכָה commonly refers to a cast/metal image. 'Cast image' is a clear, fairly standard rendering that preserves the manufacturing nuance better than simply 'idol.'
- source_word: אַתֶּם אֱלֹהֵינוּ
  chosen: You are our gods
  alternatives:
  - You are our god
  lexicon: HALOT
  rationale: The predicate noun is morphologically plural ('our gods'), and the 2mp pronoun matches the plural form. Although an idol may be addressed collectively or with plural-of-deity language, the Hebrew form is plural and should be reflected rather than normalized to singular.
