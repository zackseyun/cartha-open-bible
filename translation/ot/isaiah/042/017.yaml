theological_decisions:
- issue: Rendering of idolatry terms פֶּסֶל and מַסֵּכָה
  chosen_reading: Differentiate them as 'idol' and 'cast image'
  alternative_readings:
  - Render both simply as 'idol'
  - Render as 'carved image' and 'molten image'
  rationale: The verse uses two related but distinct terms for manufactured objects of worship. Differentiating them preserves the rhetorical fullness of the denunciation without overloading the English. 'Idol' captures the religious function of פֶּסֶל, while 'cast image' preserves the production nuance of מַסֵּכָה.
- issue: Number of אֱלֹהֵינוּ in the idolaters' speech
  chosen_reading: Retain the plural 'our gods'
  alternative_readings:
  - Normalize to singular 'our god' for smoother English
  rationale: The Hebrew form is plural, and the translation should not smooth away that grammatical feature. Preserving 'our gods' keeps the source-text wording transparent, even if English readers may find singular more idiomatic when speaking to one image.
  doctrine_reference: Translation philosophy §1, §5
