id: ISA.42.9
reference: Isaiah 42:9
source:
  edition: WLC
  text: הָ/רִֽאשֹׁנ֖וֹת הִנֵּה בָ֑אוּ וַֽ/חֲדָשׁוֹת֙ אֲנִ֣י מַגִּ֔יד בְּ/טֶ֥רֶם תִּצְמַ֖חְנָה
    אַשְׁמִ֥יע אֶתְ/כֶֽם־׃פ
translation:
  text: Behold, the former things have come to pass, and I declare new things; before
    they spring up, I announce them to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the first things.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'have come'; idiomatically, 'have come to pass' or 'have happened.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew verb literally means 'sprout' or 'spring up,' using plant-growth
      imagery for events not yet visible.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרִאשֹׁנוֹת
  chosen: the former things
  alternatives:
  - the earlier things
  - the first things
  lexicon: HALOT
  rationale: Plural adjective used substantivally. 'Former things' is idiomatic English
    and fits Isaiah's contrast with 'new things.' 'First things' is possible but can
    sound more abstract or temporal in a less natural way here.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Deictic/interjection marking attention. 'Behold' preserves the prophetic
    force and solemnity better than the more colloquial 'look' or 'see,' while remaining
    understandable in context.
- source_word: בָּאוּ
  chosen: have come to pass
  alternatives:
  - have come
  - have happened
  lexicon: HALOT
  rationale: Although literally 'have come,' in context of predicted events the idiomatic
    sense is fulfillment or occurrence. 'Have come to pass' best conveys that the
    former predictions/events have now occurred.
- source_word: חֲדָשׁוֹת
  chosen: new things
  alternatives:
  - new events
  - new matters
  lexicon: HALOT
  rationale: Plural adjective used substantivally, parallel to 'former things.' 'New
    things' preserves the concise Hebrew parallelism without over-interpreting the
    referent.
- source_word: מַגִּיד
  chosen: declare
  alternatives:
  - tell
  - proclaim
  lexicon: HALOT
  rationale: The Hiphil of נגד commonly means to make known or declare. 'Declare'
    fits prophetic speech and pairs well with divine announcement.
- source_word: בְּטֶרֶם
  chosen: before
  alternatives:
  - before ever
  - ere
  lexicon: HALOT
  rationale: Temporal preposition meaning 'before.' Simple 'before' is clear and natural.
- source_word: תִּצְמַחְנָה
  chosen: they spring up
  alternatives:
  - they sprout
  - they arise
  lexicon: HALOT
  rationale: The verb literally evokes sprouting/germinating. 'Spring up' preserves
    the organic metaphor in readable English better than the more wooden 'sprout,'
    while 'arise' would lose the imagery.
- source_word: אַשְׁמִיעַ אֶתְכֶם
  chosen: I announce them to you
  alternatives:
  - I make you hear them
  - I let you hear of them
  lexicon: HALOT
  rationale: Hiphil of שמע is causative, literally 'I cause you to hear.' In idiomatic
    English, 'I announce them to you' captures the communicative force while preserving
    the object and audience. 'Them' is supplied from context, referring to the new
    things.
