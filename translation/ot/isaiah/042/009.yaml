theological_decisions:
- issue: Prophetic fulfillment language
  chosen_reading: The verse contrasts previously announced events now fulfilled with
    newly announced future acts of God.
  alternative_readings:
  - The verse may be read more generally as a contrast between past acts and future
    acts, without explicit emphasis on prior prediction.
  rationale: The combination of 'former things have come to pass' and 'I declare new
    things' strongly suggests divine foretelling and fulfillment, a major theme in
    Isaiah 40–48. The translation reflects this without adding doctrinal claims beyond
    the text.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing extra doctrinal claims.'
