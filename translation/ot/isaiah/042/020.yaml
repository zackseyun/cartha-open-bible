id: ISA.42.20
reference: Isaiah 42:20
source:
  edition: WLC
  text: ראית רַבּ֖וֹת וְ/לֹ֣א תִשְׁמֹ֑ר פָּק֥וֹחַ אָזְנַ֖יִם וְ/לֹ֥א יִשְׁמָֽע׃
translation:
  text: You have seen many things[a], but you do not observe; his ears are open, but he does not hear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew shifts from 'you' in the first half of the verse to 'his/he' in the second half. Some translations smooth this to 'your/you.'
    reason: alternative_reading
lexical_decisions:
- source_word: ראית
  chosen: You have seen
  alternatives:
  - You see
  - You saw
  lexicon: HALOT
  rationale: Qal perfect 2ms of ראה, addressed to the servant/people in the singular. The perfect can be rendered as present in prophetic discourse, but 'have seen' best preserves the completed aspect while fitting the rebuke.
- source_word: רַבּוֹת
  chosen: many things
  alternatives:
  - much
  - great things
  lexicon: HALOT
  rationale: Feminine plural adjective used substantivally after 'seen'; 'many things' is the most natural English equivalent.
- source_word: וְלֹא תִשְׁמֹר
  chosen: but you do not keep watch
  alternatives:
  - but you do not observe
  - but you do not keep them
  - but you do not pay attention
  lexicon: HALOT
  rationale: שׁמר commonly means 'keep, guard, observe.' In this context of sensory perception and failure to respond, 'keep watch' preserves the vigilance nuance without over-paraphrasing. 'Observe' is possible, but would blur with the preceding 'seen.'
- source_word: פָּקוֹחַ
  chosen: are open
  alternatives:
  - open
  - fully opened
  lexicon: HALOT
  rationale: 'Passive/resultative participial adjective from פקח, describing the state of the ears. English idiom requires a finite verb: ''are open.'''
- source_word: אָזְנַיִם
  chosen: his ears
  alternatives:
  - ears
  lexicon: HALOT
  rationale: Dual noun 'ears.' Although no explicit pronominal suffix is present, English idiom in this clause is smoother with 'his ears,' reflecting the shift from second-person address to third-person description in the Hebrew verb that follows.
- source_word: וְלֹא יִשְׁמָע
  chosen: but he does not hear
  alternatives:
  - yet he does not listen
  - but he will not hear
  lexicon: HALOT
  rationale: Qal imperfect 3ms of שמע. 'Hear' keeps the sensory parallel with 'ears are open.' 'Listen' is interpretive; 'will not hear' is possible but less direct than the simple present in this rebuke.
