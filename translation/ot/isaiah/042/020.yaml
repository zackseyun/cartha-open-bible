theological_decisions:
- issue: Shift in grammatical person within the verse
  chosen_reading: Retain the Hebrew's move from second person ('you have seen ... you do not keep watch') to third person ('his ears ... he does not hear')
  alternative_readings:
  - 'Regularize all clauses to second person: ''your ears are open, but you do not hear'''
  - Regularize all clauses to third person
  rationale: The Masoretic text presents a real person shift, likely rhetorical, matching the surrounding prophetic indictment of the servant/people. Preserving the tension is preferable to smoothing it away, in keeping with the translation philosophy of not resolving ambiguities unnecessarily.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
