id: ISA.42.1
reference: Isaiah 42:1
source:
  edition: WLC
  text: הֵ֤ן עַבְדִּ/י֙ אֶתְמָךְ בּ֔/וֹ בְּחִירִ֖/י רָצְתָ֣ה נַפְשִׁ֑/י נָתַ֤תִּי
    רוּחִ/י֙ עָלָ֔י/ו מִשְׁפָּ֖ט לַ/גּוֹיִ֥ם יוֹצִֽיא־׃
translation:
  text: Behold my servant, whom I uphold, my chosen one, in whom my soul delights.
    I have put my Spirit upon him; he will bring forth justice to the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with whom I am pleased' for 'in whom my soul delights.'
    reason: lexical_alternative
  - marker: b
    text: '''Justice'' could also be rendered ''judgment''; the Hebrew mishpat can
      denote judicial decision, justice, or just order.'
    reason: lexical_alternative
  - marker: c
    text: In the New Testament, this verse is applied to Jesus the Messiah (see Matt
      12:18).
    reason: cross_reference
lexical_decisions:
- source_word: הֵן
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Introduces the servant with an attention-getting deictic particle. 'Behold'
    preserves the elevated prophetic tone better than the more colloquial 'look' or
    'see'.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עבד can denote a slave, in this prophetic and royal-servant
    context 'servant' is the most natural English rendering and matches the role designation
    without importing the bonded-status emphasis that is more salient in some NT δοῦλος
    contexts.
- source_word: אֶתְמָךְ בּוֹ
  chosen: whom I uphold
  alternatives:
  - I uphold him
  - in whom I take hold
  - whom I support
  lexicon: HALOT
  rationale: The verb תמך with ב conveys support/sustaining. Rendering it as a relative
    clause in English produces natural syntax while preserving the sense of divine
    sustaining.
- source_word: בְּחִירִי
  chosen: my chosen one
  alternatives:
  - my chosen
  lexicon: HALOT
  rationale: The nominal adjective denotes one specially chosen. 'Chosen one' is idiomatic
    English and preserves the personal force.
- source_word: רָצְתָה נַפְשִׁי
  chosen: in whom my soul delights
  alternatives:
  - with whom I am pleased
  - whom my soul accepts
  lexicon: HALOT
  rationale: The Hebrew literally says 'my soul delights/is pleased.' Retaining 'my
    soul' preserves the anthropomorphic intensity of divine pleasure; 'in whom' fits
    the English relative construction with the preceding apposition.
- source_word: נָתַתִּי רוּחִי עָלָיו
  chosen: I have put my Spirit upon him
  alternatives:
  - I have given my Spirit upon him
  - I place my Spirit on him
  lexicon: HALOT
  rationale: נתן + רוח + על is naturally rendered 'put ... upon.' Capitalizing 'Spirit'
    reflects the possessive 'my Spirit' in a divine speech context, where God's empowering
    Spirit is intended rather than mere breath or disposition.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - just order
  lexicon: HALOT
  rationale: In this context of the servant's mission to the nations, משפט is broader
    than a courtroom verdict and denotes the establishment/publication of justice.
    'Justice' communicates this better in contemporary English than 'judgment.'
- source_word: לַגּוֹיִם
  chosen: to the nations
  alternatives:
  - for the nations
  - to the Gentiles
  lexicon: HALOT
  rationale: גוים here refers broadly to the peoples/nations beyond Israel. 'Nations'
    is the standard and least interpretively loaded rendering; 'Gentiles' would narrow
    the sense through later Jewish/Christian usage.
- source_word: יוֹצִיא
  chosen: he will bring forth
  alternatives:
  - he will bring out
  - he will cause to go out
  - he will make known
  lexicon: HALOT
  rationale: The Hiphil of יצא means to bring out/forth. 'Bring forth' preserves the
    metaphorical force and works well with 'justice' as something publicly established
    or manifested.
