theological_decisions:
- issue: Identity and role of the servant
  chosen_reading: Render neutrally as 'my servant' without making the messianic identification
    explicit in the translation text.
  alternative_readings:
  - A corporate reference to Israel
  - A prophetic individual
  - A messianic figure ultimately fulfilled in Jesus
  rationale: Historic Christian orthodoxy recognizes this servant song as fulfilled
    in Christ, but the Hebrew text itself here names only 'my servant.' To avoid importing
    interpretation into the translation, the main text remains lexically neutral while
    allowing readers and cross-references to identify canonical fulfillment.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
- issue: רוּחִי as divine Spirit
  chosen_reading: Capitalize 'Spirit' in 'my Spirit.'
  alternative_readings:
  - my spirit
  rationale: Because the speaker is God and the phrase denotes divine empowerment
    bestowed upon the servant, 'Spirit' best signals the referent in English. This
    reflects theological weight present in the text without adding content beyond
    the possessive construction.
  doctrine_reference: Translation philosophy §6
