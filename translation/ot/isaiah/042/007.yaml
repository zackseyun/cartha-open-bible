theological_decisions:
- issue: Metaphorical and literal scope of blindness and imprisonment
  chosen_reading: Retain the concrete imagery ('blind eyes,' 'prisoner,' 'darkness')
    without explicating spiritual meaning in the main text.
  alternative_readings:
  - Interpret explicitly as spiritual illumination and liberation
  rationale: In Isaiah 42 the servant's mission carries both literal and metaphorical
    resonance, but the Hebrew here states the imagery without interpretive expansion.
    Preserving the tension accords with the translation philosophy.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
