id: ISA.42.7
reference: Isaiah 42:7
source:
  edition: WLC
  text: לִ/פְקֹ֖חַ עֵינַ֣יִם עִוְר֑וֹת לְ/הוֹצִ֤יא מִ/מַּסְגֵּר֙ אַסִּ֔יר מִ/בֵּ֥ית
    כֶּ֖לֶא יֹ֥שְׁבֵי חֹֽשֶׁךְ׃
translation:
  text: to open blind eyes, to bring a prisoner out from confinement, from the prison
    house those who sit in darkness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the eyes of the blind.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from the dungeon' or 'from the prison'; the Hebrew term can denote confinement
      or a place of restraint.
    reason: lexical_alternative
  - marker: c
    text: Or 'those dwelling in darkness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִ/פְקֹחַ
  chosen: to open
  alternatives:
  - to unseal
  - to cause to see
  lexicon: HALOT
  rationale: The infinitive construct expresses purpose. 'Open' is the plain idiomatic
    rendering with 'eyes' as its object in English and matches the Hebrew collocation.
- source_word: עֵינַיִם עִוְרוֹת
  chosen: blind eyes
  alternatives:
  - the eyes of the blind
  lexicon: HALOT
  rationale: The adjective directly modifies 'eyes.' 'Blind eyes' is concise and natural
    English while preserving the Hebrew image; 'the eyes of the blind' is possible
    but less direct here.
- source_word: לְ/הוֹצִיא
  chosen: to bring out
  alternatives:
  - to lead out
  - to bring forth
  lexicon: HALOT
  rationale: Another purpose infinitive. 'Bring out' is natural modern English and
    fits the object 'a prisoner' with the source sense of causing to go out.
- source_word: מִ/מַּסְגֵּר
  chosen: from confinement
  alternatives:
  - from the dungeon
  - from the prison
  lexicon: HALOT
  rationale: The noun denotes a place or state of restraint/confinement. 'Confinement'
    preserves the broader sense and avoids forcing a more specific architectural image
    than the Hebrew requires.
- source_word: אַסִּיר
  chosen: a prisoner
  alternatives:
  - the prisoner
  - a captive
  lexicon: HALOT
  rationale: An indefinite singular works well in English as a representative singular.
    'Prisoner' fits the immediate context of release from confinement and prison house.
- source_word: מִ/בֵּית כֶּלֶא
  chosen: from the prison house
  alternatives:
  - from the house of imprisonment
  - from prison
  lexicon: HALOT
  rationale: The construct phrase is literally 'from the house of prison/imprisonment.'
    'Prison house' preserves the Hebrew imagery more closely than the flatter 'from
    prison' while remaining readable.
- source_word: יֹשְׁבֵי חֹשֶׁךְ
  chosen: those who sit in darkness
  alternatives:
  - those dwelling in darkness
  - the dwellers in darkness
  lexicon: HALOT
  rationale: The participle of ישב commonly means 'sit,' 'dwell,' or 'inhabit.' 'Sit
    in darkness' preserves the vivid metaphor and the Hebrew verbal image, which is
    common in biblical poetry for remaining in a condition.
