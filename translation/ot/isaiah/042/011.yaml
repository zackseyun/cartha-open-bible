id: ISA.42.11
reference: Isaiah 42:11
source:
  edition: WLC
  text: יִשְׂא֤וּ מִדְבָּר֙ וְ/עָרָ֔י/ו חֲצֵרִ֖ים תֵּשֵׁ֣ב קֵדָ֑ר יָרֹ֨נּוּ֙ יֹ֣שְׁבֵי
    סֶ֔לַע מֵ/רֹ֥אשׁ הָרִ֖ים יִצְוָֽחוּ׃
translation:
  text: Let the wilderness and its cities lift up their voice, the settlements where
    Kedar dwells; let the inhabitants of Sela sing for joy; let them shout from the
    tops of the mountains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the inhabitants of the rock,' if סֶלַע is taken as a common noun rather
      than the place name Sela.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׂאוּ
  chosen: let ... lift up
  alternatives:
  - raise
  - lift up their voice
  - exalt
  lexicon: HALOT
  rationale: From נשׂא, here jussive/imperfect in a volitional sequence. In context
    with no explicit object until implied 'voice,' English idiom requires supplying
    'their voice' to express the call to praise. 'Lift up' preserves the metaphor
    better than a flatter 'raise.'
- source_word: מִדְבָּר
  chosen: the wilderness
  alternatives:
  - the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is the more common prophetic register for מדבר and fits
    the poetic personification of remote regions joining praise.'
- source_word: וְעָרָיו
  chosen: and its cities
  alternatives:
  - and his cities
  lexicon: HALOT
  rationale: The 3ms suffix most naturally refers back to 'wilderness' as a grammatical
    antecedent in Hebrew poetry, yielding 'its cities.' English 'his cities' would
    wrongly personify the wilderness as masculine.
- source_word: חֲצֵרִים
  chosen: the settlements
  alternatives:
  - villages
  - encampments
  - hamlets
  lexicon: HALOT
  rationale: חצרים denotes unwalled settlements or villages. 'Settlements' is broad
    enough to include semi-nomadic habitation associated with Kedar while remaining
    natural English.
- source_word: תֵּשֵׁב קֵדָר
  chosen: where Kedar dwells
  alternatives:
  - that Kedar inhabits
  - where Kedar lives
  lexicon: HALOT
  rationale: The feminine singular verb agrees with חצרים as a collective or with
    an understood singular sense. Rendering the clause relatively ('where Kedar dwells')
    communicates the Hebrew succinctly and naturally. 'Kedar' is transliterated as
    a proper name, likely the Arabian tribe/region descended from Ishmael.
- source_word: יָרֹנּוּ
  chosen: let ... sing for joy
  alternatives:
  - cry out joyfully
  - sing
  lexicon: HALOT
  rationale: רנן commonly conveys jubilant singing or ringing cries. 'Sing for joy'
    captures both the vocal and celebratory force.
- source_word: יֹשְׁבֵי
  chosen: the inhabitants of
  alternatives:
  - those who dwell in
  - the dwellers of
  lexicon: HALOT
  rationale: A participial noun meaning those dwelling in a place. 'Inhabitants of'
    is idiomatic and concise.
- source_word: סֶלַע
  chosen: Sela
  alternatives:
  - the rock
  lexicon: HALOT
  rationale: Likely a place name here, parallel to Kedar and followed by 'inhabitants
    of.' As a proper noun it is transliterated per project philosophy. The lexical
    sense 'rock' is worth preserving in a footnote because the Hebrew form can bear
    that meaning.
- source_word: מֵרֹאשׁ הָרִים
  chosen: from the tops of the mountains
  alternatives:
  - from the mountain tops
  - from the head of the mountains
  lexicon: HALOT
  rationale: A spatial phrase meaning from the summits. 'Tops of the mountains' is
    clear modern English while preserving the plural imagery.
- source_word: יִצְוָחוּ
  chosen: let them shout
  alternatives:
  - cry aloud
  - shout aloud
  lexicon: HALOT
  rationale: צוח denotes a loud cry or shout. In this praise context, 'shout' communicates
    exuberant acclamation rather than distress.
