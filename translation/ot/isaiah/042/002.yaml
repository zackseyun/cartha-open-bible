id: ISA.42.2
reference: Isaiah 42:2
source:
  edition: WLC
  text: לֹ֥א יִצְעַ֖ק וְ/לֹ֣א יִשָּׂ֑א וְ/לֹֽא יַשְׁמִ֥יעַ בַּ/ח֖וּץ קוֹלֽ/וֹ־׃
translation:
  text: He will not cry out or raise his voice, or make his voice heard in the street.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He does not cry out or lift up, and does not let his voice be heard
      outside.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִצְעַק
  chosen: cry out
  alternatives:
  - shout
  - cry aloud
  - call out
  lexicon: HALOT
  rationale: The verb צעק commonly denotes crying out loudly, often in distress or
    public appeal. Here, in a triad describing restrained public demeanor, 'cry out'
    preserves the audible/public sense without overstating emotional anguish.
- source_word: יִשָּׂא
  chosen: raise his voice
  alternatives:
  - lift up
  - raise
  - exalt
  lexicon: HALOT
  rationale: The verb נשׂא by itself means 'lift/carry,' but in this context, with
    the following reference to his voice, it idiomatically refers to raising the voice.
    Supplying 'his voice' in English clarifies the ellipsis and matches the parallelism.
- source_word: יַשְׁמִיעַ
  chosen: make his voice heard
  alternatives:
  - let his voice be heard
  - cause his voice to be heard
  - proclaim
  lexicon: HALOT
  rationale: 'The Hiphil of שׁמע here is causative: ''cause to be heard.'' ''Make
    his voice heard'' is idiomatic modern English that preserves the causative nuance
    and parallels the previous clauses.'
- source_word: בַּחוּץ
  chosen: in the street
  alternatives:
  - outside
  - in the open
  - in the marketplace
  lexicon: HALOT
  rationale: חוּץ denotes the outside/public space, often the street. 'In the street'
    best fits the image of public proclamation and is a natural English equivalent
    in prophetic poetry.
- source_word: קוֹלוֹ
  chosen: his voice
  alternatives:
  - his sound
  lexicon: HALOT
  rationale: קוֹל regularly means 'voice' in contexts of speech or public utterance.
    Repeating 'his voice' in English preserves the Hebrew focus and clarifies the
    object of both the second and third verbs.
- source_word: לֹא ... וְלֹא ... וְלֹא
  chosen: will not ... or ... or
  alternatives:
  - does not ... and does not ... and does not
  lexicon: Hebrew syntax
  rationale: The chained negatives create a rhythmic sequence of denials. Rendering
    with 'will not' aligns with the prophetic description of the servant's characteristic
    action, and 'or' reflects the English coordination of parallel negated actions
    more naturally than repeated 'and.'
