theological_decisions:
- issue: Temporal/aspectual force of the imperfect verbs in a servant-song context
  chosen_reading: future-like descriptive rendering ('He will not ...')
  alternative_readings:
  - present habitual ('He does not ...')
  rationale: In prophetic discourse, imperfects may describe characteristic future
    action. Because Isaiah 42 presents the servant in a programmatic, forward-looking
    portrait, 'will not' best reflects the discourse setting while still conveying
    habitual character.
