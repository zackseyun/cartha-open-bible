id: ISA.42.25
reference: Isaiah 42:25
source:
  edition: WLC
  text: וַ/יִּשְׁפֹּ֤ךְ עָלָי/ו֙ חֵמָ֣ה אַפּ֔/וֹ וֶ/עֱז֖וּז מִלְחָמָ֑ה וַ/תְּלַהֲטֵ֤/הוּ מִ/סָּבִיב֙ וְ/לֹ֣א יָדָ֔ע וַ/תִּבְעַר בּ֖/וֹ וְ/לֹא יָשִׂ֥ים עַל לֵֽב־־־׃פ
translation:
  text: So he poured out on him the heat of his anger and the might of battle[a]; it set him ablaze all around, but he did not know; it burned in him[d][c][b], but he did not take it to heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fury of his anger.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the violence/fierceness of war.'
    reason: lexical_alternative
  - marker: c
    text: The singular 'him/he' refers to Israel as a people personified as one man.
    reason: cultural_note
  - marker: d
    text: Literally 'did not set it upon the heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁפֹּךְ
  chosen: poured out
  alternatives:
  - poured
  - shed out
  lexicon: HALOT
  rationale: The verb שׁפךְ literally means 'to pour out.' In context of wrath/judgment, 'poured out' is idiomatic English and preserves the metaphor of wrath as something discharged upon the people.
- source_word: עָלָיו
  chosen: on him
  alternatives:
  - upon him
  lexicon: HALOT
  rationale: The preposition עַל with 3ms suffix is straightforwardly 'on/upon him.' Singular is retained, reflecting the prophetic use of singular Israel/Jacob as a corporate individual.
- source_word: חֵמָה אַפּוֹ
  chosen: the heat of his anger
  alternatives:
  - the fury of his anger
  - his burning anger
  lexicon: HALOT
  rationale: חֵמָה denotes heat, rage, wrath; אַף literally 'nose' idiomatically 'anger.' 'The heat of his anger' preserves the Hebrew's intensification and fire imagery that continues in the verse.
- source_word: וֶעֱזוּז מִלְחָמָה
  chosen: and the might of battle
  alternatives:
  - and the violence of war
  - and the fierceness of battle
  lexicon: HALOT
  rationale: עֱזוּז conveys strength, might, or fierce force. With מִלְחָמָה, 'the might of battle' preserves the noun pairing without overinterpreting it as merely emotional fury or literal combat alone.
- source_word: וַתְּלַהֲטֵהוּ
  chosen: it set him ablaze
  alternatives:
  - it burned him
  - it kindled against him
  lexicon: HALOT
  rationale: From להב/להט, the verb evokes flaming or setting ablaze. 'Set him ablaze' keeps the vivid fire metaphor and matches the feminine singular subject referring back to the outpoured wrath/judgment as a collective force.
- source_word: מִסָּבִיב
  chosen: all around
  alternatives:
  - round about
  - on every side
  lexicon: HALOT
  rationale: This adverbial expression indicates surrounding on every side. 'All around' is natural modern English.
- source_word: וְלֹא יָדָע
  chosen: but he did not understand
  alternatives:
  - but he did not know
  - yet he did not perceive
  lexicon: HALOT
  rationale: ידע can mean know, perceive, understand. Here the sense is not mere lack of information but failure to recognize the meaning of the judgment, so 'understand' best fits the context.
- source_word: וַתִּבְעַר בּוֹ
  chosen: it burned in him
  alternatives:
  - it burned him
  - it burned against him
  lexicon: HALOT
  rationale: בער means burn, consume. With בּוֹ, 'in him' or 'upon him' are possible. 'Burned in him' preserves the preposition more closely and conveys the inwardly felt consuming effect of judgment.
- source_word: וְלֹא יָשִׂים עַל לֵב
  chosen: but he did not take it to heart
  alternatives:
  - but he did not lay it to heart
  - but he did not pay attention
  lexicon: HALOT
  rationale: The idiom שׂים על לב means to set upon the heart, i.e., take seriously, internalize, heed. 'Take it to heart' is a clear modern equivalent that preserves the Hebrew metaphor.
