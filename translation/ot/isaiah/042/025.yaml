theological_decisions:
- issue: Referent of the singular pronouns
  chosen_reading: The singular 'him/he' is retained, referring corporately to Israel/Jacob as a personified nation.
  alternative_readings:
  - Pluralizing to 'them/they' for contemporary clarity
  rationale: The Hebrew consistently uses singular forms in this context for the corporate people. Retaining the singular preserves the prophetic personification and avoids smoothing away the literary form.
  doctrine_reference: Translation philosophy §1, §5
- issue: Subject of the judgment verbs
  chosen_reading: '''He'' in the opening clause is understood as God, while the subsequent feminine-singular verbs are rendered with impersonal ''it'' referring to the outpoured wrath/battle-force.'
  alternative_readings:
  - Making God the explicit subject throughout in English
  - Rendering the feminine verbs as 'she' to mirror grammatical gender
  rationale: Hebrew shifts naturally from God's action to the effect of the wrath/judgment as the operative force. English handles this best with 'it,' preserving coherence without importing a different theological claim.
  doctrine_reference: Translation philosophy §1, §6
