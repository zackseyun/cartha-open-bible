id: ISA.42.14
reference: Isaiah 42:14
source:
  edition: WLC
  text: הֶחֱשֵׁ֨יתִי֙ מֵֽ/עוֹלָ֔ם אַחֲרִ֖ישׁ אֶתְאַפָּ֑ק כַּ/יּוֹלֵדָ֣ה אֶפְעֶ֔ה אֶשֹּׁ֥ם
    וְ/אֶשְׁאַ֖ף יָֽחַד׃
translation:
  text: I have kept silent from long ago; I have been quiet and restrained myself.
    Like a woman in labor I will cry out; I will gasp and pant together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a long time' or 'from of old' for 'from long ago.'
    reason: lexical_alternative
  - marker: b
    text: The final clause could also be rendered 'I will gasp and pant all at once.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶחֱשֵׁיתִי
  chosen: I have kept silent
  alternatives:
  - I was silent
  - I have been silent
  lexicon: HALOT
  rationale: Hiphil of חרשׁ in first person singular conveys causing silence/keeping
    oneself silent. Present perfect English fits the retrospective force at the start
    of the verse.
- source_word: מֵעוֹלָם
  chosen: from long ago
  alternatives:
  - for a long time
  - from of old
  - forever
  lexicon: HALOT
  rationale: In context this refers to a long prior duration, not eternity in the
    absolute sense. 'From long ago' is natural English and preserves the temporal
    sweep.
- source_word: אַחֲרִישׁ
  chosen: I have been quiet
  alternatives:
  - I was still
  - I kept silent
  lexicon: HALOT
  rationale: From חרשׁ/חרשׁה semantic field of being silent or quiet. Since the previous
    verb already uses 'silent,' varying with 'quiet' preserves the parallelism without
    awkward repetition while keeping the same semantic domain.
- source_word: אֶתְאַפָּק
  chosen: restrained myself
  alternatives:
  - held myself back
  - contained myself
  lexicon: HALOT
  rationale: Hitpael of אפק conveys self-restraint or holding oneself in. 'Restrained
    myself' captures the reflexive nuance and the image of delayed action.
- source_word: כַּיּוֹלֵדָה
  chosen: Like a woman in labor
  alternatives:
  - like a woman giving birth
  - like a laboring woman
  lexicon: HALOT
  rationale: The comparison is to a woman in childbirth. 'Woman in labor' is idiomatic
    modern English and preserves the vivid simile.
- source_word: אֶפְעֶה
  chosen: I will cry out
  alternatives:
  - I will groan
  - I will gasp
  lexicon: HALOT
  rationale: The verb פעה denotes crying out or uttering a sound, especially in distress.
    'Cry out' best introduces the childbirth imagery before the following breathing
    verbs intensify it.
- source_word: אֶשֹּׁם
  chosen: I will gasp
  alternatives:
  - I will pant
  - I will desolate
  lexicon: HALOT
  rationale: Given the immediate childbirth/breathing context and pairing with the
    next verb, this is best taken in the sense of gasping/snorting rather than a rarer
    unrelated sense. Context strongly favors an audible breathing image.
- source_word: וְאֶשְׁאַף
  chosen: and pant
  alternatives:
  - and gasp
  - and snort
  lexicon: HALOT
  rationale: שׁאף often carries the sense of panting or gasping for breath. 'Pant'
    complements 'gasp' and preserves the climactic breathing imagery.
- source_word: יָחַד
  chosen: together
  alternatives:
  - at once
  - all at once
  lexicon: HALOT
  rationale: The adverb marks the two actions as simultaneous. 'Together' is straightforward,
    though the sense also approaches 'all at once.'
