theological_decisions:
- issue: Divine self-description using childbirth imagery
  chosen_reading: Retain the simile 'Like a woman in labor' without softening or allegorizing
    it.
  alternative_readings:
  - Replace with a generic image of intense crying out
  - Interpret metaphorically in commentary only
  rationale: The Hebrew explicitly compares the speaker's sudden action to a woman
    in labor. Preserving the image maintains the text's force and does not imply a
    change in divine nature; it is a simile for pent-up intensity and imminent action.
  doctrine_reference: Preserve theological tension rather than resolve it.
