id: ISA.42.18
reference: Isaiah 42:18
source:
  edition: WLC
  text: הַ/חֵרְשִׁ֖ים שְׁמָ֑עוּ וְ/הַ/עִוְרִ֖ים הַבִּ֥יטוּ לִ/רְאֽוֹת׃
translation:
  text: Hear[a], you deaf; and look, you blind[b], that you may see.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the deaf ... the blind.' The Hebrew adjectives with the article can be read as direct address ('you deaf ... you blind') or as substantival descriptions ('the deaf ... the blind').
    reason: lexical_alternative
  - marker: b
    text: 'Or ''to see.'' The final phrase expresses purpose: ''look ... so that you may see.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֵרְשִׁים
  chosen: you deaf
  alternatives:
  - the deaf
  - deaf ones
  lexicon: HALOT
  rationale: The adjective with article functions vocatively in context, directly addressing a group. Rendering it as 'you deaf' preserves the prophetic summons more naturally in English than a bare nominal 'the deaf.'
- source_word: שְׁמָעוּ
  chosen: Hear
  alternatives:
  - listen
  - hear!
  lexicon: HALOT
  rationale: Imperative plural from שׁמע. 'Hear' is the standard and suitably forceful prophetic command; 'listen' is possible but slightly more interpretive.
- source_word: וְהַעִוְרִים
  chosen: and look, you blind
  alternatives:
  - and you blind
  - and the blind
  lexicon: HALOT
  rationale: 'The conjunction links a second vocative address. In English, supplying the imperative with the following verb yields a natural command sequence: ''and look, you blind.'' This preserves the direct address and parallelism.'
- source_word: הַבִּיטוּ
  chosen: look
  alternatives:
  - gaze
  - look attentively
  - behold
  lexicon: HALOT
  rationale: Hiphil imperative of נבט calls for directed looking. 'Look' is clear modern English and fits the parallel with 'hear.' 'Behold' is too archaic; 'gaze' overstates duration.
- source_word: לִרְאוֹת
  chosen: that you may see
  alternatives:
  - to see
  - so as to see
  lexicon: HALOT
  rationale: The infinitive with ל expresses purpose/result after the imperative. 'That you may see' communicates the intended outcome in idiomatic English better than the more wooden 'to see,' while remaining close to the Hebrew.
