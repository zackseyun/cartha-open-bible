theological_decisions:
- issue: Whether 'deaf' and 'blind' should be rendered literally or interpreted immediately as spiritual insensibility
  chosen_reading: Literal sensory terms retained in the main text, leaving metaphorical force to context
  alternative_readings:
  - insensible
  - spiritually deaf and blind
  rationale: In Isaiah 42 the language functions metaphorically for Israel's unresponsiveness, but the Hebrew uses the concrete terms 'deaf' and 'blind.' Preserving the literal wording maintains the prophetic imagery and avoids importing interpretation into the translation itself.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; Original-language primacy over translation tradition.'
