id: ISA.45.15
reference: Isaiah 45:15
source:
  edition: WLC
  text: אָכֵ֕ן אַתָּ֖ה אֵ֣ל מִסְתַּתֵּ֑ר אֱלֹהֵ֥י יִשְׂרָאֵ֖ל מוֹשִֽׁיעַ׃
translation:
  text: Truly[a], you are a God who hides himself, the God of Israel, the Savior.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you are a hidden God.' The Hebrew participle may be understood either as reflexive ('who hides himself') or more statively ('who is hidden').
    reason: lexical_alternative
lexical_decisions:
- source_word: אָכֵן
  chosen: Truly
  alternatives:
  - Surely
  - Indeed
  lexicon: HALOT
  rationale: Introduces an emphatic affirmation or realization. 'Truly' preserves the solemn, confessional force in natural English without sounding overly colloquial.
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: Second masculine singular pronoun directly addressing God. English requires the simple 'you.'
- source_word: אֵל
  chosen: God
  alternatives:
  - god
  - Mighty God
  lexicon: HALOT
  rationale: In context this clearly refers to the God of Israel, so the capitalized 'God' is appropriate. 'Mighty God' would over-translate the bare noun here.
- source_word: מִסְתַּתֵּר
  chosen: who hides himself
  alternatives:
  - who is hidden
  - who hides
  lexicon: HALOT
  rationale: 'The Hitpael participle conveys reflexive or middle sense: God as one who conceals himself. ''Who hides himself'' best reflects the verbal force and avoids flattening it into a mere adjective like ''hidden.'''
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: O God of Israel
  alternatives:
  - God of Israel
  lexicon: HALOT
  rationale: This appositional phrase further identifies the addressee. The vocative 'O' is not separately marked in Hebrew but is idiomatic in English prayer/confession language and fits the direct address already established by 'you are.'
- source_word: מוֹשִׁיעַ
  chosen: Savior
  alternatives:
  - saving one
  - deliverer
  lexicon: HALOT
  rationale: The Hiphil participle from ישׁע denotes one who saves/delivers. 'Savior' is the most natural and theologically weighty English rendering, while remaining faithful to the participial sense as a characteristic title.
