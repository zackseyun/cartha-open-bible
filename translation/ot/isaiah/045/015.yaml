theological_decisions:
- issue: Meaning of God's hiddenness
  chosen_reading: Render the phrase as a confession that God hides himself, without explaining whether this refers to inscrutability, hidden providence, or temporary concealment.
  alternative_readings:
  - you are a hidden God
  - you are a God who is hidden
  rationale: The Hebrew participle allows the idea of hiddenness/concealment, but the verse itself does not specify the theological mechanism. The translation preserves the tension rather than resolving it into a doctrinal explanation.
  doctrine_reference: Preserve theological tension rather than resolve it.
