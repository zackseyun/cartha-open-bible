theological_decisions:
- issue: Gendered language in בֶּן בִּטְנָהּ
  chosen_reading: the son of her womb
  alternative_readings:
  - the child of her womb
  rationale: The Hebrew explicitly uses בן ('son'). In keeping with the project's
    gender-accurate principle, the masculine term is retained in the main text rather
    than neutralized, while the broader maternal sense is already clear from context.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Force of the rhetorical comparison
  chosen_reading: Even these may forget, yet I will not forget you
  alternative_readings:
  - Even if these forget, I will not forget you
  rationale: The Hebrew presents a concession followed by emphatic divine contrast.
    The chosen wording preserves the tension without overstating the likelihood of
    maternal failure, and it highlights God's surpassing covenantal faithfulness without
    importing additional doctrinal language.
  doctrine_reference: DOCTRINE.md § Translation philosophy, points 3 and 6
