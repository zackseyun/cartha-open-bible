id: ISA.49.15
reference: Isaiah 49:15
source:
  edition: WLC
  text: הֲ/תִשְׁכַּ֤ח אִשָּׁה֙ עוּלָ֔/הּ מֵ/רַחֵ֖ם בֶּן בִּטְנָ֑/הּ גַּם אֵ֣לֶּה תִשְׁכַּ֔חְנָה
    וְ/אָנֹכִ֖י לֹ֥א אֶשְׁכָּחֵֽ/ךְ־־׃
translation:
  text: Can a woman forget her nursing child, and have no compassion on the son of
    her womb? Even these may forget, yet I will not forget you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''the child of her womb.'' Hebrew: ''the son of her womb.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/תִשְׁכַּח
  chosen: Can ... forget
  alternatives:
  - Does ... forget
  - Will ... forget
  lexicon: HALOT
  rationale: The interrogative הֲ with imperfect 3fs introduces a rhetorical question.
    English 'Can ... forget' best conveys the sense of an almost unthinkable possibility,
    fitting the rhetorical force better than a simple present or future.
- source_word: אִשָּׁה
  chosen: a woman
  alternatives:
  - a mother
  lexicon: HALOT
  rationale: The noun means 'woman' or 'wife.' Although the context is maternal, the
    Hebrew does not use a distinct word for 'mother' here, so 'a woman' preserves
    the source wording while the following phrases make the maternal sense explicit.
- source_word: עוּלָהּ
  chosen: her nursing child
  alternatives:
  - her infant
  - her suckling
  lexicon: HALOT
  rationale: The noun refers to a suckling/nursing child. 'Nursing child' is clear
    modern English and preserves the image of a child still dependent on the mother's
    milk.
- source_word: מֵ/רַחֵם
  chosen: have no compassion
  alternatives:
  - cease to have compassion
  - not pity
  lexicon: HALOT
  rationale: From רחם, associated with compassion/mercy, here in the construction
    'from having compassion' after the first clause. In idiomatic English, 'and have
    no compassion' expresses the sense naturally while retaining the emotional force.
- source_word: בֶּן בִּטְנָהּ
  chosen: the son of her womb
  alternatives:
  - the child of her womb
  lexicon: HALOT
  rationale: A formally close rendering preserves the vivid maternal imagery and the
    Hebrew idiom. 'Son' is retained because בן is explicitly present; this follows
    the project's gender-accurate principle rather than neutralizing to 'child' in
    the main text.
- source_word: גַּם אֵלֶּה
  chosen: Even these
  alternatives:
  - Even they
  - Though these
  lexicon: HALOT
  rationale: 'The phrase points back to the just-mentioned mothers/women as an emphatic
    concession: even such persons may fail. ''Even these'' preserves the demonstrative
    emphasis.'
- source_word: תִשְׁכַּחְנָה
  chosen: may forget
  alternatives:
  - will forget
  - do forget
  lexicon: HALOT
  rationale: 'The imperfect here expresses possibility within the concessive statement,
    not certainty. ''May forget'' best captures the rhetorical contrast: even if such
    an unlikely thing happens, God''s remembrance does not fail.'
- source_word: וְ/אָנֹכִי
  chosen: yet I
  alternatives:
  - but I
  - and I
  lexicon: HALOT
  rationale: אָנֹכִי is an emphatic first-person pronoun. 'Yet I' brings out the strong
    contrast with the preceding concession.
- source_word: לֹא אֶשְׁכָּחֵךְ
  chosen: will not forget you
  alternatives:
  - shall not forget you
  lexicon: HALOT
  rationale: A straightforward future negation best conveys the divine assurance.
    English 'will not' is modern and suitably emphatic.
