id: ISA.49.20
reference: Isaiah 49:20
source:
  edition: WLC
  text: ע֚וֹד יֹאמְר֣וּ בְ/אָזְנַ֔יִ/ךְ בְּנֵ֖י שִׁכֻּלָ֑יִ/ךְ צַר לִ֥/י הַ/מָּק֖וֹם
    גְּשָׁ/ה לִּ֥/י וְ/אֵשֵֽׁבָה־־׃
translation:
  text: Yet the children of your bereavement will still say in your hearing, ‘The
    place is too cramped for me; make room for me so that I may dwell.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'draw near for me' or 'come close for me'; the Hebrew
      idiom here likely means 'make room for me' in the context of overcrowding.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of your bereavement'; rendered 'children' for natural English
      and collective sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ע֚וֹד
  chosen: Yet ... will still
  alternatives:
  - Still
  - Again
  - Yet
  lexicon: HALOT
  rationale: ע֚וֹד marks continuation/addition in context. Rendering it with both
    adversative-continuative force ('Yet') and persistence ('still') fits the flow
    from prior promises and the future speech that follows.
- source_word: יֹאמְר֣וּ
  chosen: will ... say
  alternatives:
  - shall say
  - will speak
  lexicon: HALOT
  rationale: Qal imperfect 3mp of אמר is straightforward future in this prophetic
    context.
- source_word: בְ/אָזְנַ֔יִ/ךְ
  chosen: in your hearing
  alternatives:
  - in your ears
  - to your ears
  lexicon: HALOT
  rationale: The idiom 'in your hearing' is natural English and preserves the sense
    of speech heard directly by Zion.
- source_word: בְּנֵ֖י שִׁכֻּלָ֑יִ/ךְ
  chosen: the children of your bereavement
  alternatives:
  - the sons of your bereavement
  - the children you were bereaved of
  - your bereaved children
  lexicon: HALOT
  rationale: בני is literally 'sons/children of.' Given English idiom and likely mixed
    or collective reference, 'children' is preferable. שִׁכֻּלַיִךְ denotes bereavement/child-loss;
    the phrase refers to children associated with Zion's bereaved condition, not necessarily
    children who themselves are bereaved. 'Children of your bereavement' preserves
    the metaphor and compactness of the Hebrew.
- source_word: צַר לִ֥י הַמָּק֖וֹם
  chosen: The place is too cramped for me
  alternatives:
  - The place is too narrow for me
  - There is too little room for me
  lexicon: HALOT
  rationale: צַר with מקום expresses spatial constriction. 'Too cramped' is idiomatic
    modern English and conveys overcrowding more vividly than the more wooden 'narrow.'
- source_word: גְּשָׁ/ה לִּ֥י
  chosen: make room for me
  alternatives:
  - come near to me
  - draw near for me
  - move over for me
  - give way for me
  lexicon: HALOT
  rationale: From נגשׁ in imperative form, the literal sense is 'come near/draw near,'
    but in this context of overcrowding it functions idiomatically as a request for
    others to move aside or make space. 'Make room for me' best captures the contextual
    force in natural English while remaining faithful to the image.
- source_word: וְ/אֵשֵֽׁבָה
  chosen: so that I may dwell
  alternatives:
  - that I may live
  - that I may sit
  - and I may dwell
  lexicon: HALOT
  rationale: 'From ישׁב, the sense here is settling/dwelling in a place, not merely
    sitting. Rendering the conjunction purposively (''so that'') reflects the sequence:
    make room, with the result/purpose that I may dwell there.'
