id: ISA.49.12
reference: Isaiah 49:12
source:
  edition: WLC
  text: הִנֵּה אֵ֕לֶּה מֵ/רָח֖וֹק יָבֹ֑אוּ וְ/הִֽנֵּה אֵ֨לֶּה֙ מִ/צָּפ֣וֹן וּ/מִ/יָּ֔ם
    וְ/אֵ֖לֶּה מֵ/אֶ֥רֶץ סִינִֽים־־׃
translation:
  text: Look, these will come from far away, and look, these from the north and from
    the sea, and these from the land of Sinim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'from the west,' since 'the sea' can function as a western geographical
      reference in Hebrew usage.
    reason: lexical_alternative
  - marker: b
    text: '''Sinim'' is an uncertain place-name. Proposed identifications include
      Syene/Aswan in southern Egypt; some have suggested a more distant eastern region,
      but the location is not certain.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Rendered as the attention-getting interjection 'Look' to preserve the
    deictic force in readable modern English without archaic tone. Repeated in both
    occurrences to reflect the Hebrew repetition.
- source_word: אֵלֶּה
  chosen: these
  alternatives:
  - these ones
  lexicon: HALOT
  rationale: Straight demonstrative plural; 'these' is the natural English equivalent
    and preserves the repeated pointing structure of the verse.
- source_word: מֵרָחוֹק
  chosen: from far away
  alternatives:
  - from afar
  - from a distance
  lexicon: HALOT
  rationale: '''From far away'' is idiomatic modern English and conveys spatial remoteness
    clearly. ''From afar'' is possible but slightly more literary.'
- source_word: יָבֹאוּ
  chosen: will come
  alternatives:
  - shall come
  lexicon: HALOT
  rationale: Simple imperfect with future sense in context; 'will come' is natural
    modern English.
- source_word: מִצָּפוֹן
  chosen: from the north
  alternatives:
  - out of the north
  lexicon: HALOT
  rationale: Directional noun with prefixed preposition; 'from the north' is the standard
    and clear rendering.
- source_word: וּמִיָּם
  chosen: from the sea
  alternatives:
  - from the west
  - from the Mediterranean
  lexicon: HALOT
  rationale: Literally 'from the sea.' In Hebrew geographical idiom 'sea' can imply
    the west, likely because of the Mediterranean, but the text itself says 'sea';
    the more literal rendering is retained in the main text, with the geographical
    alternative preserved in a footnote.
- source_word: מֵאֶרֶץ
  chosen: from the land of
  alternatives:
  - from the country of
  lexicon: HALOT
  rationale: Construct phrase introducing a place-name; 'land of' is the most natural
    formal equivalent.
- source_word: סִינִים
  chosen: Sinim
  alternatives:
  - Syene
  - Aswan
  - China
  lexicon: HALOT
  rationale: The place-name is uncertain, so it is transliterated in keeping with
    the philosophy to transliterate names rather than translate speculative identifications.
    Major proposals are preserved in a footnote rather than resolved in the main text.
