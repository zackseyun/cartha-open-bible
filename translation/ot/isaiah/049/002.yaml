theological_decisions:
- issue: Metaphorical weapon imagery for the servant's speech and vocation
  chosen_reading: Retain the concrete metaphors 'sharp sword' and 'polished arrow' without explicating them as preaching, prophecy, or messianic mission in the main text.
  alternative_readings:
  - Interpret the imagery explicitly as powerful speech
  - Interpret the verse christologically in the wording itself
  rationale: The verse uses vivid metaphor but does not itself specify the full theological referent. Preserving the imagery maintains the text's poetic force and theological openness, in keeping with the instruction not to import doctrinal claims the text does not make.
  doctrine_reference: Translation philosophy items 1 and 3
