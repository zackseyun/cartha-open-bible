id: ISA.49.2
reference: Isaiah 49:2
source:
  edition: WLC
  text: וַ/יָּ֤שֶׂם פִּ/י֙ כְּ/חֶ֣רֶב חַדָּ֔ה בְּ/צֵ֥ל יָד֖/וֹ הֶחְבִּיאָ֑/נִי וַ/יְשִׂימֵ֨/נִי֙ לְ/חֵ֣ץ בָּר֔וּר בְּ/אַשְׁפָּת֖/וֹ הִסְתִּירָֽ/נִי׃
translation:
  text: And he made my mouth like a sharp sword; in the shadow of his hand he hid me[a]. And he made me a polished arrow; in his quiver he concealed me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a select arrow,' 'a sharpened arrow,' or 'a purified arrow' for 'a polished arrow.' The Hebrew adjective carries the sense of something purified/refined, and in context likely describes an arrow carefully prepared for use.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  chosen: he made
  alternatives:
  - he set
  - he placed
  lexicon: HALOT
  rationale: שׂוּם commonly means 'put/set/place,' but with predicate complements ('my mouth like a sharp sword') English 'made' better conveys the resulting state idiomatically without over-paraphrasing.
- source_word: פִּי
  chosen: my mouth
  lexicon: HALOT
  rationale: Literal rendering of 'my mouth' preserves the bodily metaphor for speech rather than abstracting to 'my words' or 'my speech.'
- source_word: כְּחֶרֶב חַדָּה
  chosen: like a sharp sword
  alternatives:
  - like a sharpened sword
  lexicon: HALOT
  rationale: Simile is retained directly. 'Sharp sword' is natural English and preserves the image of penetrating, effective speech.
- source_word: בְּצֵל יָדוֹ
  chosen: in the shadow of his hand
  alternatives:
  - under the shadow of his hand
  lexicon: HALOT
  rationale: Literal imagery is preserved. 'In the shadow of' closely reflects the Hebrew construct and communicates protection/concealment without interpretive expansion.
- source_word: הֶחְבִּיאָנִי
  chosen: he hid me
  alternatives:
  - he concealed me
  lexicon: HALOT
  rationale: The Hiphil of חבא means to hide/conceal. 'Hid' is chosen in the first clause for simple, direct English; the semantic force is concealment for protection or reserve.
- source_word: וַיְשִׂימֵנִי
  chosen: he made me into
  alternatives:
  - he set me as
  - he made me
  lexicon: HALOT
  rationale: With לְחֵץ, the sense is appointing or fashioning into a role/object. 'Made me into' best expresses the transformation/result in idiomatic English.
- source_word: לְחֵץ בָּרוּר
  chosen: into a polished arrow
  alternatives:
  - as a select arrow
  - as a sharpened arrow
  - as a purified arrow
  lexicon: HALOT
  rationale: בָּרוּר can denote something purified/cleansed and by extension choice or polished. In the arrow image, 'polished' fits the concrete metaphor well and matches the sense of a prepared, refined weapon. Alternatives are possible and worth preserving.
- source_word: בְּאַשְׁפָּתוֹ
  chosen: in his quiver
  lexicon: HALOT
  rationale: Standard rendering of אַשְׁפָּה in this context; the possessive suffix is retained.
- source_word: הִסְתִּירָנִי
  chosen: he concealed me
  alternatives:
  - he hid me
  lexicon: HALOT
  rationale: The Hiphil of סתר means to hide/conceal. 'Concealed' is used here to avoid monotonous repetition while preserving the same core meaning; the variation is stylistic, not semantic.
