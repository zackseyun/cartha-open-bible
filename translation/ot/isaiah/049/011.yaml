id: ISA.49.11
reference: Isaiah 49:11
source:
  edition: WLC
  text: וְ/שַׂמְתִּ֥י כָל הָרַ֖/י לַ/דָּ֑רֶךְ וּ/מְסִלֹּתַ֖/י יְרֻמֽוּ/ן־׃
translation:
  text: And I will make all my mountains into a road[b][a], and my highways will be raised up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a road' or 'as a way.' The Hebrew may emphasize either result ('make into a road') or purpose ('set for a road').
    reason: lexical_alternative
  - marker: b
    text: Or 'my roads will be lifted up.' The Hebrew term can refer to a built-up roadway or highway.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  chosen: And I will make
  alternatives:
  - And I will set
  - And I will appoint
  lexicon: HALOT
  rationale: The verb שׂים commonly means 'set, place, make.' In this context with לַדָּרֶךְ, 'make ... into a road' best captures the transformative sense in natural English without over-paraphrasing.
- source_word: כָל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Standard distributive/collective sense; 'all' fits the poetic parallelism smoothly.
- source_word: הָרַי
  chosen: my mountains
  alternatives:
  - the mountains of mine
  - my hill-country
  lexicon: HALOT
  rationale: The noun הַר means 'mountain/hill.' With the 1cs suffix, 'my mountains' is the most direct rendering. It likely refers to obstacles under God's control being turned into passable ways, but the concrete image should be preserved in translation.
- source_word: לַדָּרֶךְ
  chosen: into a road
  alternatives:
  - for a road
  - as a way
  lexicon: HALOT
  rationale: דֶּרֶךְ can mean 'way, road, path.' Here the prefixed ל marks result/purpose after שׂים. 'Into a road' communicates that the mountains become a traversable route. 'Road' is more concrete than 'way' and suits the travel imagery.
- source_word: וּמְסִלֹּתַי
  chosen: and my highways
  alternatives:
  - and my roads
  - and my raised roads
  lexicon: HALOT
  rationale: מְסִלָּה often denotes a built-up highway or raised roadway. 'Highways' preserves the elevated, prepared-road nuance and matches the parallel with דֶּרֶךְ.
- source_word: יְרֻמוּן
  chosen: will be raised up
  alternatives:
  - will rise
  - will be lifted up
  - will be exalted
  lexicon: HALOT
  rationale: 'From רום, here likely passive/intransitive in sense: the highways are elevated. ''Will be raised up'' best fits the road-building imagery and avoids the more abstract ''exalted''.'
