theological_decisions:
- issue: Interpretation of the travel/restoration imagery
  chosen_reading: Retain the concrete image of God transforming terrain for the return of his people rather than making the line explicitly metaphorical in translation.
  alternative_readings:
  - God removes obstacles spiritually or providentially
  - God prepares a literal route for exiles' return
  rationale: The verse uses physical topography as restoration imagery. The translation should preserve that tension and not resolve whether the referent is strictly literal, metaphorical, or both.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
