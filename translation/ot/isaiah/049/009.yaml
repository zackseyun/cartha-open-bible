id: ISA.49.9
reference: Isaiah 49:9
source:
  edition: WLC
  text: לֵ/אמֹ֤ר לַֽ/אֲסוּרִים֙ צֵ֔אוּ לַ/אֲשֶׁ֥ר בַּ/חֹ֖שֶׁךְ הִגָּל֑וּ עַל דְּרָכִ֣ים
    יִרְע֔וּ וּ/בְ/כָל שְׁפָיִ֖ים מַרְעִיתָֽ/ם־־׃
translation:
  text: saying to the prisoners, “Come out,” to those in darkness, “Show yourselves.”
    They will graze along the roads, and on all the bare heights will be their pasture.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Be revealed” / “Appear” for “Show yourselves.”
    reason: lexical_alternative
  - marker: b
    text: “Bare heights” refers to exposed hilltops or treeless heights; alternatively,
      “bare hills.”
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Infinitive construct of אמר introducing the content of the servant's
    commission; 'saying' is natural English while preserving the connective force
    to the previous verse.
- source_word: לַאֲסוּרִים
  chosen: to the prisoners
  alternatives:
  - to the bound ones
  - to the captives
  lexicon: HALOT
  rationale: Passive participial form from אסר denotes those bound or imprisoned.
    'Prisoners' is idiomatic and fits the liberation context.
- source_word: צֵאוּ
  chosen: Come out
  alternatives:
  - Go out
  - Come forth
  lexicon: HALOT
  rationale: Imperative plural of יצא. 'Come out' is direct, idiomatic, and suits
    a summons to release; 'go out' is possible but less natural in English direct
    speech here.
- source_word: לַאֲשֶׁר בַּחֹשֶׁךְ
  chosen: to those in darkness
  alternatives:
  - to those in the darkness
  lexicon: HALOT
  rationale: Relative phrase identifying a second group. 'Darkness' may be literal
    or metaphorical; the English preserves that breadth.
- source_word: הִגָּלוּ
  chosen: Show yourselves
  alternatives:
  - Be revealed
  - Appear
  lexicon: HALOT
  rationale: Niphal imperative/plural from גלה in the sense of becoming visible or
    uncovered. 'Show yourselves' best captures the command addressed to those hidden
    in darkness and matches common English idiom.
- source_word: עַל דְּרָכִים
  chosen: along the roads
  alternatives:
  - on the roads
  - by the ways
  lexicon: HALOT
  rationale: The preposition על with plural 'roads/ways' here describes the places
    where they will feed. 'Along the roads' reads naturally and conveys distributed
    grazing beside travel routes.
- source_word: יִרְעוּ
  chosen: They will graze
  alternatives:
  - They will pasture
  - They will feed
  lexicon: HALOT
  rationale: Qal imperfect of רעה, used of grazing/shepherding. With the people as
    the subject in a restoration image, 'graze' preserves the pastoral metaphor without
    overinterpreting.
- source_word: שְׁפָיִם
  chosen: bare heights
  alternatives:
  - bare hills
  - high places
  lexicon: HALOT
  rationale: Refers to treeless or exposed heights. 'Bare heights' preserves the topographical
    sense and avoids the cultic associations that 'high places' can carry elsewhere.
- source_word: מַרְעִיתָם
  chosen: their pasture
  alternatives:
  - their grazing place
  - their pastureland
  lexicon: HALOT
  rationale: Noun for pasture/grazing place with 3mp suffix. Singular in Hebrew functions
    collectively; 'their pasture' is concise and natural.
