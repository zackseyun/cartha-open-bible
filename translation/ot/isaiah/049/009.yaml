theological_decisions:
- issue: Metaphorical versus literal sense of imprisonment and darkness
  chosen_reading: Retain the concrete imagery ('prisoners,' 'darkness') without explicating
    whether it refers to exile, spiritual bondage, or both.
  alternative_readings:
  - Interpret explicitly as exiles returning from captivity
  - Interpret explicitly as spiritual liberation
  rationale: The verse uses restoration imagery that can encompass both historical
    exile and broader salvific themes. Per translation philosophy, the English preserves
    the theological tension rather than narrowing it.
  doctrine_reference: Translation philosophy §3
