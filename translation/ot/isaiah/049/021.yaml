theological_decisions:
- issue: Personification of Zion/Jerusalem as a woman speaking of children
  chosen_reading: Retain maternal imagery directly in the translation
  alternative_readings:
  - Flatten to a more abstract corporate reading such as 'citizens' or 'people'
  rationale: The Hebrew presents the city/people as a bereaved woman astonished at the return/increase of her children. Preserving the maternal language is textually grounded and avoids importing an abstract interpretation into the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
