id: ISA.49.21
reference: Isaiah 49:21
source:
  edition: WLC
  text: וְ/אָמַ֣רְתְּ בִּ/לְבָבֵ֗/ךְ מִ֤י יָֽלַד לִ/י֙ אֶת אֵ֔לֶּה וַ/אֲנִ֥י שְׁכוּלָ֖ה וְ/גַלְמוּדָ֑ה גֹּלָ֣ה וְ/סוּרָ֗ה וְ/אֵ֨לֶּה֙ מִ֣י גִדֵּ֔ל הֵ֤ן אֲנִי֙ נִשְׁאַ֣רְתִּי לְ/בַדִּ֔/י אֵ֖לֶּה אֵיפֹ֥ה הֵֽם־־׀׃פ
translation:
  text: Then you will say in your heart[a], ‘Who has borne these for me, since I was bereaved and barren, exiled and cast away? And these—who has raised them? Behold, I was left alone[b]; these—where were they?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Who has begotten these for me?' The Hebrew verb can be rendered more generally, but the personified female speaker favors the childbirth nuance 'borne.'
    reason: lexical_alternative
  - marker: b
    text: 'Literally, ''these—where are they?'' The translation makes explicit the implied question of origin: ''where then did these come from?'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתְּ
  chosen: Then you will say
  alternatives:
  - And you will say
  lexicon: HALOT
  rationale: Consecutive waw with qatal 2fs in prophetic discourse is naturally rendered as a future/sequential statement. 'Then' captures the discourse progression slightly better in English than a bare 'and.'
- source_word: בִּלְבָבֵךְ
  chosen: in your heart
  alternatives:
  - to yourself
  - in your mind
  lexicon: HALOT
  rationale: לבב commonly denotes the inner self/thoughts. 'In your heart' preserves the Hebrew idiom while remaining natural English.
- source_word: מִי יָלַד לִי אֶת־אֵלֶּה
  chosen: Who has borne these for me
  alternatives:
  - Who has begotten these for me
  - Who gave birth to these for me
  lexicon: HALOT
  rationale: ילד in a feminine/Zion context evokes childbirth. 'Borne' is concise and maternal in sense, fitting the personified female speaker better than the more generic 'begotten.'
- source_word: שְׁכוּלָה
  chosen: bereaved
  alternatives:
  - childless by bereavement
  lexicon: HALOT
  rationale: The adjective denotes one deprived of children, especially by loss. 'Bereaved' preserves the grief-laden nuance.
- source_word: גַלְמוּדָה
  chosen: barren
  alternatives:
  - childless
  - desolate
  lexicon: HALOT
  rationale: The term is rare and denotes being deprived of children; in this pairing with שכולה, 'barren' gives a distinct nuance from bereavement, expressing inability/lack rather than loss alone.
- source_word: גֹּלָה
  chosen: exiled
  alternatives:
  - in exile
  - banished
  lexicon: HALOT
  rationale: The participial/adjectival form describes Zion as one in exile. 'Exiled' is compact and idiomatic in the series of predicates.
- source_word: וְסוּרָה
  chosen: cast off
  alternatives:
  - turned aside
  - removed
  - rejected
  lexicon: HALOT
  rationale: In context the sense is not physical turning but being removed/driven away. 'Cast off' communicates abandonment and social displacement in natural English.
- source_word: מִי גִדֵּל
  chosen: who has raised them
  alternatives:
  - who has reared them
  - who made them grow
  lexicon: HALOT
  rationale: גדל in the piel here refers to bringing up children. 'Raised them' is the most natural contemporary English equivalent.
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  lexicon: HALOT
  rationale: The particle draws attention emphatically. 'Look' is readable modern English and preserves the deictic force without archaic tone.
- source_word: נִשְׁאַרְתִּי לְבַדִּי
  chosen: I was left alone
  alternatives:
  - I remained by myself
  - I was left by myself
  lexicon: HALOT
  rationale: The Niphal of שאר plus לבד conveys being left as the sole one remaining. 'I was left alone' is idiomatic and preserves the passive nuance.
- source_word: אֵלֶּה אֵיפֹה הֵם
  chosen: where then did these come from
  alternatives:
  - where are these from
  - where were these
  lexicon: HALOT
  rationale: Literally, 'these—where are they?' In English, because the context asks about origin, 'where then did these come from' makes explicit the implied sense while staying close to the rhetorical force.
