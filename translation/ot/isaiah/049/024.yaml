theological_decisions:
- issue: Interpretation of צַדִּיק in a context describing a captor
  chosen_reading: Retain the Masoretic Text's plain sense 'righteous one' in the main
    text without resolving the interpretive tension.
  alternative_readings:
  - '''tyrant'' or similar contextual reinterpretation'
  - text-critical alternatives reflected in some versions, such as readings equivalent
    to 'the terrible'
  rationale: The translation philosophy requires preserving genuine tension rather
    than smoothing it away. Since the Hebrew text before us reads צַדִּיק, the main
    text should reflect that wording. Because this creates an interpretive and possibly
    textual difficulty, alternatives are preserved in a footnote rather than adopted
    silently.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
