id: ISA.49.24
reference: Isaiah 49:24
source:
  edition: WLC
  text: הֲ/יֻקַּ֥ח מִ/גִּבּ֖וֹר מַלְק֑וֹחַ וְ/אִם שְׁבִ֥י צַדִּ֖יק יִמָּלֵֽט־׃
translation:
  text: Can plunder be taken from a mighty man, or can the captives of a righteous
    one be rescued?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prey' instead of 'plunder.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the captives of a righteous one.' The phrase is difficult in context.
      Some understand it differently, and some ancient versions reflect a reading
      closer to 'the captives of a tyrant/terrible one.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֲיֻקַּח
  chosen: Can ... be taken
  alternatives:
  - Is ... taken
  - Can ... be seized
  lexicon: HALOT
  rationale: The interrogative particle with the passive/imperfect of לקח introduces
    a rhetorical question. 'Can ... be taken' gives natural English while preserving
    the modal force of the Hebrew question.
- source_word: מִגִּבּוֹר
  chosen: from a mighty man
  alternatives:
  - from a warrior
  - from a strong man
  lexicon: HALOT
  rationale: גִּבּוֹר commonly denotes a strong or mighty man, often a warrior. 'Mighty
    man' preserves the broad sense without over-specifying military imagery, though
    that nuance is present.
- source_word: מַלְקוֹחַ
  chosen: plunder
  alternatives:
  - prey
  - booty
  - what was taken
  lexicon: HALOT
  rationale: The noun refers to spoil or something seized. 'Plunder' is idiomatic
    in English and fits the parallel with captives. 'Prey' is possible and traditional,
    but can sound more zoological in modern English.
- source_word: וְאִם
  chosen: or can
  alternatives:
  - or if
  - and if
  lexicon: HALOT
  rationale: In this rhetorical parallelism, וְאִם functions idiomatically to introduce
    the second question rather than a conditional clause. 'Or can' best reflects the
    sense in smooth English.
- source_word: שְׁבִי
  chosen: captives
  alternatives:
  - captivity
  - prisoners
  lexicon: HALOT
  rationale: Although the noun can denote captivity or captives, the context asks
    whether persons seized can be delivered. 'Captives' best fits the parallelism
    and the following verb 'be rescued.'
- source_word: צַדִּיק
  chosen: a righteous one
  alternatives:
  - the righteous
  - a just one
  - a victorious one
  lexicon: HALOT
  rationale: The plain lexical sense of צַדִּיק is 'righteous/just.' In context this
    creates a difficulty, since the captor is normally not morally righteous. Some
    interpreters take it in a forensic or ironic sense, or emend/understand it differently,
    but the MT reading should be preserved in the main text. 'A righteous one' translates
    the consonantal text straightforwardly while allowing the tension to remain.
- source_word: יִמָּלֵט
  chosen: be rescued
  alternatives:
  - escape
  - be delivered
  lexicon: HALOT
  rationale: The Niphal of מלט conveys escaping or being delivered. 'Be rescued' fits
    the passive sense and reads naturally in English in parallel with 'be taken.'
