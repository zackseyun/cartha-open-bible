id: ISA.49.3
reference: Isaiah 49:3
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר לִ֖/י עַבְדִּ/י אָ֑תָּה יִשְׂרָאֵ֕ל אֲשֶׁר בְּ/ךָ֖ אֶתְפָּאָֽר־־׃
translation:
  text: And he said to me[a], “You are my servant, Israel, in whom I will be glorified.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “in you I will be glorified.” The Hebrew verb can be rendered more literally this way; the main text brings out the sense of God displaying his glory in or through his servant.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the next event in sequence. 'And he said' preserves the narrative progression without overinterpreting the conjunction.
- source_word: לִי
  chosen: to me
  lexicon: HALOT
  rationale: 'The preposition ל with 1cs suffix straightforwardly marks indirect object: the speaker addresses the servant directly.'
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Though עבד can denote slave/servant, in Isaiah's servant passages 'servant' is the established and contextually fitting rendering, emphasizing commissioned service rather than bonded status. Unlike some NT δοῦλος contexts, the bonded nature is not foregrounded here.
- source_word: אָתָּה
  chosen: you are
  alternatives:
  - you
  lexicon: HALOT
  rationale: 'The independent pronoun is explicit and emphatic. English idiom naturally supplies the copula: ''You are.'''
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: 'Proper name retained by transliteration. Its appositional relation to ''my servant'' is preserved: ''my servant, Israel.'''
- source_word: אֲשֶׁר
  chosen: in whom
  alternatives:
  - through whom
  - in you, I who
  lexicon: HALOT
  rationale: Relative particle introducing the clause about Israel/servant. Combined with בך, 'in whom' is the most natural English rendering when the antecedent is personal and singular.
- source_word: בְּךָ
  chosen: in whom
  alternatives:
  - in you
  - through you
  lexicon: HALOT
  rationale: The preposition ב with 2ms suffix is most basically 'in you.' Because the antecedent is 'Israel' and English relative style prefers 'in whom' for persons in elevated diction, that rendering preserves both sense and register. 'Through you' is possible interpretively but less literal.
- source_word: אֶתְפָּאָר
  chosen: I will display my glory
  alternatives:
  - I will be glorified
  - I will glorify myself
  - I will show my splendor
  lexicon: HALOT
  rationale: Hitpael of פאר can mean 'show oneself glorious/beautiful,' 'glorify oneself,' or in context 'display one's glory.' 'I will display my glory' communicates the reflexive nuance in idiomatic English without implying vanity. 'I will be glorified' is traditional and possible, but it can sound more passive than the Hebrew reflexive stem suggests.
