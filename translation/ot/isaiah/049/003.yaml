theological_decisions:
- issue: Identity and function of 'Israel' in the servant address
  chosen_reading: 'Render the text straightforwardly as direct address: ''You are my servant, Israel,'' without resolving in translation whether ''Israel'' refers to the nation collectively, the faithful remnant, or the individual servant with representative identity.'
  alternative_readings:
  - '''Israel'' as the nation as a whole'
  - '''Israel'' as the faithful remnant'
  - '''Israel'' as the individual servant/Messiah representing Israel'
  rationale: The verse itself names the servant 'Israel,' but the wider servant songs create interpretive tension about whether the servant is identical with, distinct from, or representative of Israel. Per translation philosophy, the rendering preserves that tension rather than resolving it doctrinally in the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
