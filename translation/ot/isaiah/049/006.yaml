id: ISA.49.6
reference: Isaiah 49:6
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר נָקֵ֨ל מִֽ/הְיוֹתְ/ךָ֥ לִ/י֙ עֶ֔בֶד לְ/הָקִים֙ אֶת שִׁבְטֵ֣י יַעֲקֹ֔ב
    ו/נצירי יִשְׂרָאֵ֖ל לְ/הָשִׁ֑יב וּ/נְתַתִּ֨י/ךָ֙ לְ/א֣וֹר גּוֹיִ֔ם לִֽ/הְי֥וֹת
    יְשׁוּעָתִ֖/י עַד קְצֵ֥ה הָ/אָֽרֶץ־־׃ס
translation:
  text: And he said, “It is too small a thing for you to be my servant to raise up
    the tribes of Jacob and to bring back the preserved ones of Israel; I will also
    make you a light for the nations, to be my salvation to the end of the earth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the survivors of Israel” for “the preserved ones of Israel.”
    reason: lexical_alternative
  - marker: b
    text: Or “a light to the nations”; also, “Gentiles” is a possible rendering of
      “nations.”
    reason: lexical_alternative
  - marker: c
    text: Or “to the ends of the earth.”
    reason: lexical_alternative
lexical_decisions:
- source_word: נָקֵל
  chosen: too small a thing
  alternatives:
  - too light
  - too insignificant
  lexicon: HALOT
  rationale: The adjective conveys something slight, trifling, or insufficient. In
    this idiom, 'too small a thing' is natural English and preserves the force that
    the servant's mission to Israel alone would be inadequate relative to the larger
    divine purpose.
- source_word: עֶבֶד
  chosen: servant
  alternatives:
  - slave
  lexicon: HALOT
  rationale: Although עבד can denote a slave, in Isaiah's servant passages it functions
    as an honorific and vocational designation for the one commissioned by God. 'Servant'
    best fits the prophetic context without importing the bonded-status emphasis that
    is more salient in some NT δοῦλος contexts.
- source_word: לְהָקִים
  chosen: to raise up
  alternatives:
  - to establish
  - to restore
  lexicon: HALOT
  rationale: The Hiphil of קום here refers to reestablishing or setting upright the
    tribes of Jacob. 'Raise up' preserves the concrete metaphor and remains idiomatic
    in English.
- source_word: שִׁבְטֵי יַעֲקֹב
  chosen: the tribes of Jacob
  alternatives:
  - the tribes of Israel
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'Jacob,' and the tribal language should be
    retained rather than generalized. This preserves the parallelism with the following
    phrase about Israel.
- source_word: נְצִירֵי יִשְׂרָאֵל
  chosen: the preserved ones of Israel
  alternatives:
  - the survivors of Israel
  - the guarded ones of Israel
  lexicon: HALOT
  rationale: From נצר, the participial/adjectival form most naturally denotes those
    kept, preserved, or guarded. 'Preserved ones' best reflects the lexical sense
    and avoids over-specifying as merely 'survivors,' though that is a plausible contextual
    alternative.
- source_word: לְהָשִׁיב
  chosen: to bring back
  alternatives:
  - to restore
  lexicon: HALOT
  rationale: The Hiphil of שוב commonly means to cause to return. 'Bring back' is
    more transparent in English, while still allowing the restoration sense to be
    heard in context.
- source_word: וּנְתַתִּיךָ
  chosen: I will also make you
  alternatives:
  - I will give you
  - I have made you
  lexicon: HALOT
  rationale: Literally 'I will give you,' but in the construction 'give as/for' with
    a predicate complement, English idiom is better served by 'make you.' The prefixed
    conjunction is rendered 'also' to show expansion from Israel to the nations.
- source_word: לְאוֹר גּוֹיִם
  chosen: a light for the nations
  alternatives:
  - a light to the nations
  - a light for the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם here refers to the peoples beyond Israel. 'Nations' is preferable
    in Isaiah's prophetic context and avoids the more NT-loaded 'Gentiles.' 'For'
    is idiomatic with the predicate use, though 'to' is also possible.
- source_word: יְשׁוּעָתִי
  chosen: my salvation
  alternatives:
  - my deliverance
  lexicon: HALOT
  rationale: The noun can denote salvation or deliverance. 'My salvation' preserves
    the theological breadth of God's saving action and matches the wider Isaianic
    usage.
- source_word: עַד קְצֵה הָאָרֶץ
  chosen: to the end of the earth
  alternatives:
  - to the ends of the earth
  lexicon: HALOT
  rationale: The Hebrew is singular, literally 'to the end/extremity of the earth.'
    The singular is retained in the main text for formal fidelity, while the familiar
    plural idiom is preserved as an alternative.
