theological_decisions:
- issue: Identity and scope of the servant's mission
  chosen_reading: 'The verse is translated to preserve the twofold mission stated
    in the text: restoration of Israel and extension of God''s salvation to the nations.'
  alternative_readings:
  - A purely collective reading focused only on Israel
  - An exclusively messianic reading made explicit in the translation
  rationale: The Hebrew text itself presents the servant as commissioned both toward
    Jacob/Israel and toward the nations. The translation does not resolve the debated
    identity of the servant beyond what the verse states, thereby preserving theological
    tension rather than importing a narrower interpretive conclusion.
  doctrine_reference: Translation philosophy §3
- issue: Rendering גּוֹיִם
  chosen_reading: nations
  alternative_readings:
  - Gentiles
  rationale: The term can carry either sense depending on context. Here 'nations'
    better preserves the universal horizon of the passage without prematurely narrowing
    the reference to an ethnic contrast alone.
