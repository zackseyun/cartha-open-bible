id: ISA.49.19
reference: Isaiah 49:19
source:
  edition: WLC
  text: כִּ֤י חָרְבֹתַ֨יִ/ךְ֙ וְ/שֹׁ֣מְמֹתַ֔יִ/ךְ וְ/אֶ֖רֶץ הֲרִֽסֻתֵ֑י/ךְ כִּ֤י עַתָּה֙
    תֵּצְרִ֣י מִ/יּוֹשֵׁ֔ב וְ/רָחֲק֖וּ מְבַלְּעָֽיִ/ךְ׃
translation:
  text: For your ruins, your desolate places, and your devastated land—surely now
    you will be too cramped for inhabitants, and those who swallowed you up will be
    far away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will be too narrow because of inhabitants.' The Hebrew expression
      is compact and may be rendered more formally.
    reason: lexical_alternative
  - marker: b
    text: Or 'those who devoured you.' The Hebrew keeps the vivid image of swallowing
      rather than using a more general term for destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָרְבֹתַיִךְ
  chosen: your ruins
  alternatives:
  - your waste places
  - your devastated places
  lexicon: HALOT
  rationale: From חרבה, denoting ruined or wasted places. 'Ruins' is natural modern
    English and fits the parallelism with desolate places and devastated land.
- source_word: שֹׁמְמֹתַיִךְ
  chosen: your desolate places
  alternatives:
  - your desolations
  - your deserted places
  lexicon: HALOT
  rationale: Participle/plural form from שמם conveying desolation. 'Desolate places'
    preserves the adjectival force while reading smoothly in English.
- source_word: אֶרֶץ הֲרִסֻתֵיךְ
  chosen: your devastated land
  alternatives:
  - the land of your destruction
  - your demolished land
  lexicon: HALOT
  rationale: The phrase refers to the land characterized by destruction. 'Devastated
    land' is idiomatic and captures the resultative sense without over-literal awkwardness.
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Indeed
  - Because
  lexicon: HALOT
  rationale: The first כי introduces the reason or ground for the preceding promise,
    so 'For' best fits the discourse flow.
- source_word: כִּי עַתָּה
  chosen: surely now
  alternatives:
  - for now
  - indeed now
  - now
  lexicon: HALOT
  rationale: The second כי is emphatic rather than causal. 'Surely now' conveys the
    rhetorical emphasis and transition to reversal.
- source_word: תֵּצְרִי
  chosen: you will be too cramped
  alternatives:
  - you will be too narrow
  - you will be constricted
  lexicon: HALOT
  rationale: From צרר/צר in the sense of being narrow or cramped. In context of population
    increase, 'too cramped' communicates spatial insufficiency clearly in modern English.
- source_word: מִיּוֹשֵׁב
  chosen: for inhabitants
  alternatives:
  - because of inhabitants
  - from inhabiting
  - for those dwelling in you
  lexicon: HALOT
  rationale: 'The preposition מן with ישב here expresses relation to occupancy: the
    land is too cramped with respect to inhabitants. ''For inhabitants'' is concise
    and idiomatic in English.'
- source_word: וְרָחֲקוּ
  chosen: will be far away
  alternatives:
  - will be removed
  - will go far away
  - have gone far away
  lexicon: HALOT
  rationale: Qal perfect in prophetic discourse can express a future result. 'Will
    be far away' fits the parallel future sense and avoids an overly wooden past tense.
- source_word: מְבַלְּעָיִךְ
  chosen: those who swallowed you up
  alternatives:
  - your destroyers
  - those who devoured you
  lexicon: HALOT
  rationale: From בלע 'swallow, devour.' The vivid metaphor is worth preserving rather
    than flattening to 'destroyers,' while 'swallowed you up' is idiomatic English.
