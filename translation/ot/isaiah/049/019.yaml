theological_decisions:
- issue: Prophetic perfect / temporal reference in the final clause
  chosen_reading: Render the perfect verb as future-oriented ('will be far away')
  alternative_readings:
  - Render as present perfect ('have gone far away')
  - Render as simple past ('went far away')
  rationale: In this salvation oracle, the clause describes the promised reversal
    accompanying Zion's restoration. English future better communicates the prophetic
    force in context than a bare past or present perfect.
  doctrine_reference: Translation philosophy §1, §6
