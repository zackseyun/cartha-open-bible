theological_decisions:
- issue: Metaphorical depiction of divine hands and engraving
  chosen_reading: 'Retain the anthropomorphic metaphor directly: ''I have engraved
    you on the palms of my hands.'''
  alternative_readings:
  - Paraphrastic renderings that soften the image, such as 'I always remember you'
  rationale: The Hebrew uses a vivid bodily metaphor to communicate God's enduring
    remembrance and commitment to Zion. Optimal equivalence favors preserving the
    metaphor rather than reducing it to its interpreted meaning.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Referent of the feminine singular suffixes
  chosen_reading: Translate with second-person singular 'you/your,' leaving the addressee
    as Zion/Jerusalem from context rather than inserting the name into the verse.
  alternative_readings:
  - '''Jerusalem, I have engraved you...'''
  - '''Zion, your walls...'''
  rationale: The suffixes are feminine singular and contextually refer to Zion/Jerusalem,
    but the verse itself addresses her simply as 'you.' Keeping the pronoun preserves
    the source wording while allowing context to identify the referent.
  doctrine_reference: Translation philosophy §1, §5
