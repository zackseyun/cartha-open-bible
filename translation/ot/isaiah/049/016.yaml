id: ISA.49.16
reference: Isaiah 49:16
source:
  edition: WLC
  text: הֵ֥ן עַל כַּפַּ֖יִם חַקֹּתִ֑י/ךְ חוֹמֹתַ֥יִ/ךְ נֶגְדִּ֖/י תָּמִֽיד־׃
translation:
  text: Look, I have engraved you on the palms of my hands; your walls are continually
    before me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'inscribed you.' The Hebrew verb conveys engraving or carving, emphasizing
      permanence.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic/interjection drawing attention. 'Look' is natural modern English
    and preserves the emphatic force better than the more archaic 'Behold.'
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: Basic spatial preposition. 'On' is idiomatic in modern English and fits
    the image of inscription on the hands.
- source_word: כַּפַּיִם
  chosen: the palms of my hands
  alternatives:
  - my palms
  - the palms
  lexicon: HALOT
  rationale: Dual form of 'palm/hand.' Rendering explicitly as 'the palms of my hands'
    preserves the concrete bodily image and avoids ambiguity in English.
- source_word: חַקֹּתִיךְ
  chosen: I have engraved you
  alternatives:
  - I have inscribed you
  - I have carved you
  lexicon: HALOT
  rationale: The verb denotes engraving/inscribing. 'Engraved' best conveys permanence
    and vividness in this metaphor. The direct object suffix is second feminine singular,
    referring to Zion/Jerusalem personified, so 'you' is retained.
- source_word: חוֹמֹתַיִךְ
  chosen: your walls
  alternatives:
  - your city walls
  - your ramparts
  lexicon: HALOT
  rationale: Plural of 'wall,' referring to Jerusalem/Zion's walls. 'Your walls' is
    sufficiently clear and stays close to the Hebrew without over-specifying.
- source_word: נֶגְדִּי
  chosen: before me
  alternatives:
  - in front of me
  - before my face
  lexicon: HALOT
  rationale: Common expression for being before someone's sight/presence. 'Before
    me' is idiomatic and preserves the sense of continual divine attention.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - always
  - constantly
  lexicon: HALOT
  rationale: Adverb expressing ongoing continuity. 'Continually' matches the solemn
    tone and avoids sounding colloquial.
