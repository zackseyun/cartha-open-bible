theological_decisions:
- issue: Variant understanding of בָּנָיִךְ
  chosen_reading: your children
  alternative_readings:
  - your builders
  rationale: 'The MT reads ''your children/sons,'' which fits the restoration theme:
    Zion''s offspring return while her destroyers leave. Some ancient versions and
    interpreters reflect ''your builders,'' likely influenced by the similar consonants
    and the rebuilding context. Following original-language primacy and preserving
    genuine ambiguity, the main text keeps the MT reading and the alternative is footnoted.'
  doctrine_reference: Translation philosophy §1, §3
