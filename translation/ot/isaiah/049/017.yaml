id: ISA.49.17
reference: Isaiah 49:17
source:
  edition: WLC
  text: מִֽהֲר֖וּ בָּנָ֑יִ/ךְ מְהָֽרְסַ֥יִ/ךְ וּ/מַחֲרִבַ֖יִ/ךְ מִמֵּ֥/ךְ יֵצֵֽאוּ׃
translation:
  text: Your children hurry back; those who tore you down and devastated you will
    depart from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Your builders hurry.' Some ancient witnesses reflect 'builders' instead
      of 'children.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִהֲרוּ
  chosen: hurry back
  alternatives:
  - hasten
  - make haste
  - come quickly
  lexicon: HALOT
  rationale: 'From מהר, ''to hasten.'' In context the verb stands with ''your children''
    and contrasts with the destroyers leaving, so an ingressive/restorative sense
    is natural in English: the children are quickly returning/rebuilding rather than
    merely moving fast in the abstract. ''Hurry back'' makes the implied motion clear
    without over-paraphrasing.'
- source_word: בָּנָיִךְ
  chosen: your children
  alternatives:
  - your sons
  - your builders
  lexicon: HALOT
  rationale: The consonantal text points to 'your sons/children' from בן with 2fs
    suffix. Because the addressee is Zion/Jerusalem personified, 'your children' is
    natural modern English and can include the city's inhabitants/offspring. 'Your
    builders' reflects an ancient alternative vocalization/reading and is preserved
    in a footnote rather than adopted in the main text.
- source_word: מְהָרְסַיִךְ
  chosen: those who tore you down
  alternatives:
  - your destroyers
  - those who demolish you
  lexicon: HALOT
  rationale: Participle from הרס, 'to tear down, demolish.' Rendering as a relative
    clause is smoother in English while preserving the participial force. 'Tore you
    down' fits the city/building imagery established by the surrounding context.
- source_word: וּמַחֲרִבַיִךְ
  chosen: and devastated you
  alternatives:
  - and laid you waste
  - and ruined you
  lexicon: HALOT
  rationale: Participle from חרב in the causative/destructive sense, referring to
    those who make desolate. 'Devastated you' communicates severe ruin in readable
    modern English. The object 'you' is carried over naturally from the suffix.
- source_word: מִמֵּךְ
  chosen: from you
  alternatives:
  - away from you
  - out of you
  lexicon: HALOT
  rationale: Straightforward separative preposition with 2fs suffix. 'From you' preserves
    the directness of the Hebrew.
- source_word: יֵצֵאוּ
  chosen: will depart
  alternatives:
  - will go out
  - will leave
  lexicon: HALOT
  rationale: From יצא, 'go out, come out, depart.' Because the subject is the destroyers
    and the prepositional phrase is 'from you,' 'will depart' gives idiomatic English
    and highlights their removal from Zion.
