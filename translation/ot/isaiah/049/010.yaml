id: ISA.49.10
reference: Isaiah 49:10
source:
  edition: WLC
  text: לֹ֤א יִרְעָ֨בוּ֙ וְ/לֹ֣א יִצְמָ֔אוּ וְ/לֹא יַכֵּ֥/ם שָׁרָ֖ב וָ/שָׁ֑מֶשׁ כִּי מְרַחֲמָ֣/ם יְנַהֲגֵ֔/ם וְ/עַל מַבּ֥וּעֵי מַ֖יִם יְנַהֲלֵֽ/ם־־־׃
translation:
  text: They will not hunger or thirst[a], nor will scorching heat or sun strike them; for he who has compassion on them will lead them[b], and he will guide them beside springs of water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nor will parching heat or the sun strike them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and he will guide them beside springs of water.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְעָבוּ
  chosen: will hunger
  alternatives:
  - will be hungry
  lexicon: HALOT
  rationale: Qal imperfect of רָעֵב denotes becoming or being hungry. 'Will hunger' preserves the verbal force and parallels 'will thirst' cleanly in English.
- source_word: יִצְמָאוּ
  chosen: will thirst
  alternatives:
  - will be thirsty
  lexicon: HALOT
  rationale: Qal imperfect of צָמֵא means to thirst. 'Will thirst' matches the Hebrew verbal form and the poetic pairing with hunger.
- source_word: יַכֵּם
  chosen: strike them
  alternatives:
  - smite them
  - beat upon them
  lexicon: HALOT
  rationale: Hiphil of נכה commonly means 'strike' or 'smite.' 'Strike them' is natural modern English and preserves the concrete image of harmful impact from heat and sun.
- source_word: שָׁרָב
  chosen: scorching heat
  alternatives:
  - heat
  - parching heat
  - glowing heat
  lexicon: HALOT
  rationale: שָׁרָב refers to burning or parching heat, often the oppressive desert heat. 'Scorching heat' conveys the intensity better than the flatter 'heat.'
- source_word: שָׁמֶשׁ
  chosen: sun
  lexicon: HALOT
  rationale: The ordinary sense is the physical sun. No contextual reason suggests a figurative rendering here.
- source_word: מְרַחֲמָם
  chosen: the one who has compassion on them
  alternatives:
  - their compassionate one
  - their merciful one
  - the one who shows them mercy
  lexicon: HALOT
  rationale: 'Participle of רָחַם with 3mp suffix: literally ''their one showing compassion.'' The phrase refers to God by description rather than by explicit name. ''The one who has compassion on them'' preserves the participial, ongoing sense and avoids over-compressing the expression into an abstract noun.'
- source_word: יְנַהֲגֵם
  chosen: will lead them
  alternatives:
  - will guide them
  lexicon: HALOT
  rationale: Piel of נָהַג commonly means to lead or drive. In this pastoral/restorative context, 'lead them' fits well and leaves room for the following verb to carry the nuance of guidance.
- source_word: מַבּוּעֵי מַיִם
  chosen: springs of water
  alternatives:
  - fountains of water
  - water sources
  - water springs
  lexicon: HALOT
  rationale: מַבּוּעַ denotes a spring or fountain, a natural source of flowing water. 'Springs of water' is idiomatic and preserves the concrete image.
- source_word: יְנַהֲלֵם
  chosen: he will guide them to
  alternatives:
  - he will lead them beside
  - he will conduct them to
  lexicon: HALOT
  rationale: Piel of נהל can mean lead, guide, or conduct, often with a gentle nuance. Because the preposition עַל before 'springs of water' can idiomatically indicate movement toward or by a location, 'guide them to' communicates the sense clearly in English without wooden literalism.
- source_word: וְעַל
  chosen: to
  alternatives:
  - beside
  - by
  - upon
  lexicon: HALOT
  rationale: Although עַל often means 'on/upon,' in poetic guidance contexts it can indicate direction toward or relation to a place. 'To springs of water' is the most natural English expression here and fits the promise of provision.
