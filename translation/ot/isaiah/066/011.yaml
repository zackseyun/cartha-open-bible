id: ISA.66.11
reference: Isaiah 66:11
source:
  edition: WLC
  text: לְמַ֤עַן תִּֽינְקוּ֙ וּ/שְׂבַעְתֶּ֔ם מִ/שֹּׁ֖ד תַּנְחֻמֶ֑י/הָ לְמַ֧עַן תָּמֹ֛צּוּ וְ/הִתְעַנַּגְתֶּ֖ם מִ/זִּ֥יז כְּבוֹדָֽ/הּ׃ס
translation:
  text: so that you may nurse and be satisfied from her comforting breast[c][b][a], so that you may drink deeply and delight yourselves from the abundance of her glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the breast of her consolations'; the Hebrew is more literally 'from the breast of her comforts/consolations.'
    reason: lexical_alternative
  - marker: b
    text: Or 'draw out' or 'suck out'; the Hebrew verb is vivid and continues the nursing imagery.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew noun rendered 'abundance' may also be understood as 'fullness' or 'overflow.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - that
  - in order that
  lexicon: HALOT
  rationale: Introduces purpose/result in both cola. 'So that' is natural modern English and preserves the purposive force.
- source_word: תִּינְקוּ
  chosen: you may nurse
  alternatives:
  - you may suck
  - you may suckle
  lexicon: HALOT
  rationale: From ינק, literally to suck/nurse. 'Nurse' is idiomatic and readable in English while retaining the maternal imagery. 'Suck' is more wooden but less natural here.
- source_word: וּשְׂבַעְתֶּם
  chosen: and be satisfied
  alternatives:
  - and be filled
  - and be sated
  lexicon: HALOT
  rationale: From שבע, to be satisfied/full. 'Be satisfied' best conveys fullness from nourishment without sounding archaic.
- source_word: מִשֹּׁד
  chosen: from her breast
  alternatives:
  - from the breast
  - from her bosom
  lexicon: HALOT
  rationale: שׁד denotes breast in a nursing context. The 3fs suffix is supplied from the following word and the larger context of Jerusalem as mother; 'her breast' makes the English explicit and coherent.
- source_word: תַּנְחֻמֶיהָ
  chosen: comforting
  alternatives:
  - of her consolations
  - that comforts
  - of her comfort
  lexicon: HALOT
  rationale: Plural of תנחומים/comforts with 3fs suffix, functioning adjectivally with 'breast.' Rather than the awkwardly literal 'breast of her consolations,' 'comforting breast' preserves the sense in natural English.
- source_word: תָּמֹצּוּ
  chosen: you may drink deeply
  alternatives:
  - you may suck out
  - you may draw out
  lexicon: HALOT
  rationale: From מצה/מוץ in this context, to suck out or drain. 'Drink deeply' communicates the intensive nourishment image in idiomatic English.
- source_word: וְהִתְעַנַּגְתֶּם
  chosen: and delight yourselves
  alternatives:
  - and be delighted
  - and luxuriate
  lexicon: HALOT
  rationale: Hitpael of ענג conveys taking exquisite delight or luxuriating. 'Delight yourselves' preserves the reflexive nuance and remains readable.
- source_word: מִזִּיז
  chosen: in the abundance of
  alternatives:
  - from the abundance of
  - from the fullness of
  - from the overflow of
  lexicon: HALOT
  rationale: זִיז is a difficult noun here, commonly understood as abundance/fullness/overflow. Rendering with 'abundance' fits the parallelism and avoids overcommitting to a rarer nuance.
- source_word: כְּבוֹדָהּ
  chosen: her glory
  alternatives:
  - her splendor
  - her honor
  lexicon: HALOT
  rationale: כבוד commonly denotes glory, honor, splendor. 'Glory' best fits Isaiah's theological and literary usage, especially for Jerusalem's exalted state.
