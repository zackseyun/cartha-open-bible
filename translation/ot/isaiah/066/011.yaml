theological_decisions:
- issue: Maternal imagery for Jerusalem/Zion
  chosen_reading: Retain the maternal nursing imagery straightforwardly as referring to Jerusalem/Zion in context, without allegorizing beyond the text.
  alternative_readings:
  - More generalized image of divine comfort without explicit maternal embodiment
  - More literal but less idiomatic phrasing ('breast of her consolations')
  rationale: The verse continues the personification of Jerusalem as a mother who nourishes and comforts her children. The translation preserves this image directly and does not flatten it into abstraction.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it.'
