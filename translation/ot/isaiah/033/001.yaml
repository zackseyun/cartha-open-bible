id: ISA.33.1
reference: Isaiah 33:1
source:
  edition: WLC
  text: ה֣וֹי שׁוֹדֵ֗ד וְ/אַתָּה֙ לֹ֣א שָׁד֔וּד וּ/בוֹגֵ֖ד וְ/לֹא בָ֣גְדוּ ב֑/וֹ כַּ/הֲתִֽמְ/ךָ֤ שׁוֹדֵד֙ תּוּשַּׁ֔ד כַּ/נְּלֹתְ/ךָ֥ לִ/בְגֹּ֖ד יִבְגְּדוּ בָֽ/ךְ־־׃ס
translation:
  text: Woe to you[a], destroyer, though you yourself have not been destroyed, and betrayer, though they have not betrayed you. When you finish destroying, you will be destroyed; when you cease betraying[c][b], they will betray you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and they have not betrayed him.'' The main text follows the sense of the direct address and parallelism; the more literal third-person reading may also be understood.'
    reason: alternative_reading
  - marker: b
    text: Or 'plunderer ... you will be plundered.' The Hebrew root can emphasize violent despoiling as well as broader devastation.
    reason: lexical_alternative
  - marker: c
    text: Or 'when you finish betraying' / 'when you cease dealing treacherously.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: Introduces a prophetic denunciation or lament. 'Woe' is the standard concise English equivalent in prophetic judgment contexts and preserves the oracular force better than the softer 'alas.'
- source_word: שׁוֹדֵד
  chosen: destroyer
  alternatives:
  - plunderer
  - spoiler
  - ravager
  lexicon: HALOT
  rationale: The participle denotes one who devastates or despoils. 'Destroyer' best fits the broader context of violent aggression and allows the repeated wordplay with the passive/reciprocal forms later in the verse. 'Plunderer' is possible but narrower and more economic.
- source_word: שָׁדוּד
  chosen: been destroyed
  alternatives:
  - been plundered
  - been devastated
  lexicon: HALOT
  rationale: Uses the same English root as שׁוֹדֵד/תּוּשַּׁד to preserve the Hebrew wordplay and reversal theme. Although 'plundered' is possible, 'destroyed' better matches the chosen rendering of the participle and keeps the rhetorical symmetry.
- source_word: בּוֹגֵד
  chosen: traitor
  alternatives:
  - betrayer
  - treacherous one
  lexicon: HALOT
  rationale: The participle refers to one acting treacherously. 'Traitor' is idiomatic and forceful in English, while still conveying covenantal/political treachery. 'Betrayer' is possible but less natural as a vocative parallel to 'destroyer.'
- source_word: בָגְדוּ בוֹ
  chosen: they have not betrayed you
  alternatives:
  - they have not dealt treacherously with you
  lexicon: HALOT
  rationale: Although the Hebrew preposition is third masculine singular ('in/against him'), the discourse directly addresses the destroyer/traitor, and many interpreters understand the clause as continuing the second-person address. Rendering 'you' produces coherent parallelism in English with the surrounding direct address. The more formally literal 'him' is preserved in a footnote because the consonantal text reads third person.
- source_word: כַּהֲתִמְךָ
  chosen: When you finish
  alternatives:
  - As soon as you finish
  - When you have completed
  lexicon: HALOT
  rationale: From תמם in a temporal construction with כ, introducing the point at which the destroyer's activity reaches its end. 'When you finish' is natural modern English and adequately conveys the temporal force without over-specifying aspect.
- source_word: תּוּשַּׁד
  chosen: you will be destroyed
  alternatives:
  - you will be plundered
  - you will be devastated
  lexicon: HALOT
  rationale: Future passive corresponding to the earlier שׁוֹדֵד. 'You will be destroyed' preserves the reversal and lexical consistency established in the verse.
- source_word: כַּנְּלֹתְךָ לִבְגֹּד
  chosen: when you stop betraying
  alternatives:
  - when you finish betraying
  - when you cease to deal treacherously
  lexicon: HALOT
  rationale: The infinitive/construct sequence expresses the completion or cessation of treacherous action. 'Stop betraying' is clear, idiomatic, and captures the sense of bringing that conduct to an end.
- source_word: יִבְגְּדוּ בָךְ
  chosen: they will betray you
  alternatives:
  - they will deal treacherously with you
  lexicon: HALOT
  rationale: Maintains the lexical repetition with בוגד/בגדו and expresses the retaliatory reversal succinctly in contemporary English.
