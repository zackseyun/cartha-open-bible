id: ISA.54.12
reference: Isaiah 54:12
source:
  edition: WLC
  text: וְ/שַׂמְתִּ֤י כַּֽדְכֹד֙ שִׁמְשֹׁתַ֔יִ/ךְ וּ/שְׁעָרַ֖יִ/ךְ לְ/אַבְנֵ֣י אֶקְדָּ֑ח
    וְ/כָל גְּבוּלֵ֖/ךְ לְ/אַבְנֵי חֵֽפֶץ־־׃
translation:
  text: And I will make your pinnacles of ruby, your gates of sparkling stone, and
    all your boundary walls of precious stones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew כַּדְכֹד likely names a red or brilliant gemstone; possible renderings
      include 'garnet' or 'red jasper.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term translated 'pinnacles' is rare and may also be understood
      as 'battlements' or 'windows.'
    reason: lexical_alternative
  - marker: c
    text: The expression translated 'sparkling stone' refers to a bright or fiery
      gemstone; older translations often render it 'carbuncle.'
    reason: lexical_alternative
  - marker: d
    text: Or 'all your borders' or 'all your territory,' though the city-building
      imagery here favors an architectural sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  chosen: And I will make
  alternatives:
  - And I will set
  - And I will place
  lexicon: HALOT
  rationale: The verb שׂוּם commonly means 'set, place, make.' In this architectural
    context, 'make' reads naturally in English while preserving the causative/building
    sense.
- source_word: כַּדְכֹד
  chosen: ruby
  alternatives:
  - garnet
  - red jasper
  lexicon: HALOT
  rationale: The gemstone identification is uncertain. 'Ruby' is a traditional and
    plausible rendering for a brilliant red precious stone, but the exact mineral
    cannot be established with certainty.
- source_word: שִׁמְשֹׁתַיִךְ
  chosen: your pinnacles
  alternatives:
  - your battlements
  - your windows
  - your sun-like towers
  lexicon: HALOT
  rationale: The noun is rare and difficult. In context with gates and boundaries,
    it likely refers to prominent architectural features at the top of the city structure.
    'Pinnacles' fits the poetic building imagery without overcommitting to a more
    specific but uncertain identification such as 'windows.'
- source_word: וּשְׁעָרַיִךְ
  chosen: your gates
  lexicon: HALOT
  rationale: Standard rendering of שַׁעַר in a city-building context.
- source_word: לְאַבְנֵי אֶקְדָּח
  chosen: of sparkling stone
  alternatives:
  - of carbuncle stones
  - of fiery stones
  - with stones of antimony
  lexicon: HALOT
  rationale: The phrase denotes some kind of gleaming or fiery precious stone, but
    the exact identification of אֶקְדָּח is uncertain. 'Sparkling stone' preserves
    the sense of brilliance and ornamentation in accessible English.
- source_word: וְכָל גְּבוּלֵךְ
  chosen: and all your boundary walls
  alternatives:
  - and all your borders
  - and all your territory
  lexicon: HALOT
  rationale: גְּבוּל can mean border, boundary, or territory. In this immediate architectural
    context, 'boundary walls' best fits the imagery of a restored, jewel-adorned city.
- source_word: לְאַבְנֵי חֵפֶץ
  chosen: of precious stones
  alternatives:
  - of delightful stones
  - of desirable stones
  lexicon: HALOT
  rationale: חֵפֶץ denotes delight, desire, or preciousness. In context, the phrase
    refers to stones valued for beauty and desirability; 'precious stones' communicates
    that clearly in idiomatic English.
