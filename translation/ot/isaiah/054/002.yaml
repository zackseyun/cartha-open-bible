theological_decisions:
- issue: Metaphorical habitation language for Zion
  chosen_reading: Retain the tent/dwelling metaphor literally rather than interpret
    it as population growth or restoration in the main text.
  alternative_readings:
  - Expand your home
  - Make room for more inhabitants
  rationale: The verse uses concrete imperatives drawn from tent expansion. Optimal
    equivalence favors preserving the prophetic metaphor and letting its broader theological
    significance emerge from context rather than paraphrasing it away.
  doctrine_reference: Translation philosophy §1, §3, §6
