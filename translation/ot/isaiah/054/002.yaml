id: ISA.54.2
reference: Isaiah 54:2
source:
  edition: WLC
  text: הַרְחִ֣יבִי מְק֣וֹם אָהֳלֵ֗/ךְ וִ/ירִיע֧וֹת מִשְׁכְּנוֹתַ֛יִ/ךְ יַטּ֖וּ אַל
    תַּחְשֹׂ֑כִי הַאֲרִ֨יכִי֙ מֵֽיתָרַ֔יִ/ךְ וִ/יתֵדֹתַ֖יִ/ךְ חַזֵּֽקִי׀־׃
translation:
  text: Enlarge the place of your tent, and let the curtains of your dwellings be
    stretched out; do not hold back. Lengthen your cords, and strengthen your stakes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not spare' or 'do not restrain.'
    reason: lexical_alternative
  - marker: b
    text: '''Curtains'' refers to the fabric hangings of a tent; ''stakes'' are tent
      pegs.'
    reason: cultural_note
lexical_decisions:
- source_word: הַרְחִיבִי
  chosen: Enlarge
  alternatives:
  - Make wide
  - Widen
  lexicon: HALOT
  rationale: 'Hiphil imperative 2fs of רחב calls for a causative command: ''make wide/enlarge.''
    ''Enlarge'' is idiomatic modern English and preserves the imperative force addressed
    to Zion as feminine singular.'
- source_word: מְקוֹם
  chosen: the place
  alternatives:
  - space
  - site
  lexicon: HALOT
  rationale: The noun denotes place/space. 'The place' fits the construct with 'your
    tent' and keeps the concrete image rather than abstracting it.
- source_word: אָהֳלֵךְ
  chosen: your tent
  lexicon: HALOT
  rationale: Literal singular 'tent' preserves the metaphor of habitation and expansion.
- source_word: וִירִיעוֹת
  chosen: the curtains
  alternatives:
  - curtain cloths
  - tent curtains
  lexicon: HALOT
  rationale: יריעות refers to tent curtains/hangings. 'Curtains' is concise and natural;
    the tent context already signals the kind of curtains in view.
- source_word: מִשְׁכְּנוֹתַיִךְ
  chosen: your dwellings
  alternatives:
  - your tabernacles
  - your habitations
  lexicon: HALOT
  rationale: Plural of משכן can denote dwelling places/tabernacles. 'Dwellings' is
    readable modern English and avoids overly ecclesiastical 'tabernacles' in a poetic
    habitation image.
- source_word: יַטּוּ
  chosen: be stretched out
  alternatives:
  - be spread out
  - let them extend
  lexicon: HALOT
  rationale: 'Hiphil imperfect 3mp of נטה after the preceding noun phrase functions
    jussively: ''let ... be stretched out.'' Passive English best captures the implied
    action upon the curtains.'
- source_word: אַל תַּחְשֹׂכִי
  chosen: do not hold back
  alternatives:
  - do not spare
  - do not restrain
  lexicon: HALOT
  rationale: חשׂך in prohibitions often means withhold/spare. In this context of expansive
    preparation, 'do not hold back' communicates the idiom naturally and fits the
    exhortation.
- source_word: הַאֲרִיכִי
  chosen: Lengthen
  alternatives:
  - Make long
  - Extend
  lexicon: HALOT
  rationale: Hiphil imperative of ארך means to make long/lengthen. 'Lengthen' is the
    most direct and idiomatic rendering for cords.
- source_word: מֵיתָרַיִךְ
  chosen: your cords
  alternatives:
  - your ropes
  lexicon: HALOT
  rationale: The noun denotes tent cords/ropes. 'Cords' is traditional and suitably
    precise in the tent metaphor.
- source_word: וִיתֵדֹתַיִךְ
  chosen: your stakes
  alternatives:
  - your pegs
  - your tent pegs
  lexicon: HALOT
  rationale: יתד denotes peg/stake, especially a tent peg. 'Stakes' is concise and
    pairs well with 'cords'; the tent imagery is already established.
- source_word: חַזֵּקִי
  chosen: strengthen
  alternatives:
  - make firm
  - secure
  lexicon: HALOT
  rationale: Piel imperative of חזק means strengthen/make strong. 'Strengthen' preserves
    the verbal force and the image of securing the expanded tent.
