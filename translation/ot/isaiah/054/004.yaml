id: ISA.54.4
reference: Isaiah 54:4
source:
  edition: WLC
  text: אַל תִּֽירְאִי֙ כִּי לֹ֣א תֵב֔וֹשִׁי וְ/אַל תִּכָּלְמִ֖י כִּ֣י לֹ֣א תַחְפִּ֑ירִי
    כִּ֣י בֹ֤שֶׁת עֲלוּמַ֨יִ/ךְ֙ תִּשְׁכָּ֔חִי וְ/חֶרְפַּ֥ת אַלְמְנוּתַ֖יִ/ךְ לֹ֥א
    תִזְכְּרִי עֽוֹד־־־־׃
translation:
  text: Do not fear, for you will not be put to shame; and do not be humiliated, for
    you will not be disgraced. For you will forget the shame of your youth, and you
    will remember the reproach of your widowhood no more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not be afraid.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you will not be ashamed.' The Hebrew shame-language in this verse overlaps
      in meaning across several verbs, emphasizing the end of Zion's public disgrace.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּירְאִי
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: Imperative + negation addressed to feminine singular Zion/Jerusalem personified.
    'Do not fear' is concise, idiomatic, and preserves the direct prohibition.
- source_word: תֵבֹשִׁי
  chosen: you will not be put to shame
  alternatives:
  - you will not be ashamed
  lexicon: HALOT
  rationale: בושׁ often carries the sense of being shamed or disappointed. 'Be put
    to shame' better captures the resulting public dishonor in this restoration context
    than a purely internal feeling of shame.
- source_word: תִּכָּלְמִי
  chosen: do not be humiliated
  alternatives:
  - do not be ashamed
  - do not be confounded
  lexicon: HALOT
  rationale: The Niphal of כלם conveys being humiliated or dishonored. Rendering it
    distinctly from בושׁ avoids flattening the parallelism while keeping natural English.
- source_word: תַחְפִּירִי
  chosen: you will not be disgraced
  alternatives:
  - you will not be put to shame
  - you will not be embarrassed
  lexicon: HALOT
  rationale: חפר in the Hiphil here refers to being disgraced or dishonored. 'Disgraced'
    pairs well with 'humiliated' and preserves the progression of shame-language without
    unnecessary repetition.
- source_word: בֹשֶׁת עֲלוּמַיִךְ
  chosen: the shame of your youth
  alternatives:
  - the shame of your young age
  - the disgrace of your youth
  lexicon: HALOT
  rationale: עֲלוּמִים refers to youth/young adulthood. 'The shame of your youth'
    is the most natural English rendering and fits the prophetic metaphor of Zion's
    former reproach.
- source_word: תִּשְׁכָּחִי
  chosen: you will forget
  lexicon: HALOT
  rationale: 'Simple future sense fits the promise context: former shame will no longer
    define her memory.'
- source_word: חֶרְפַּת אַלְמְנוּתַיִךְ
  chosen: the reproach of your widowhood
  alternatives:
  - the disgrace of your widowhood
  - the taunt of your widowhood
  lexicon: HALOT
  rationale: חֶרְפָּה denotes reproach, scorn, or taunt. 'Reproach' preserves the
    social dimension of public disgrace. 'Widowhood' keeps the covenantal-marital
    metaphor intact.
- source_word: לֹא תִזְכְּרִי עוֹד
  chosen: you will remember ... no more
  alternatives:
  - you will no longer remember
  lexicon: HALOT
  rationale: English idiom places 'no more' at the end smoothly while preserving the
    force of עוֹד as 'any longer/again.'
