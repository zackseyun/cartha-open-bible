theological_decisions:
- issue: Referent of the feminine singular addressee
  chosen_reading: The verse addresses Zion/Jerusalem personified as a woman.
  alternative_readings:
  - A generic female individual
  rationale: The immediate context in Isaiah 54 uses feminine singular marital and
    widowhood imagery for restored Zion. The translation preserves the second-person
    feminine singular as 'you' without over-explaining in the main text.
- issue: Marital metaphor in 'widowhood'
  chosen_reading: Retain the metaphor literally as 'widowhood' rather than interpret
    it away.
  alternative_readings:
  - abandonment
  - desolation
  rationale: The prophetic imagery is theologically significant in the chapter's portrayal
    of covenant rupture and restoration. Optimal equivalence favors preserving the
    metaphor in the main text.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it'
