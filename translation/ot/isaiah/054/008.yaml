theological_decisions:
- issue: Rendering חֶסֶד in a covenant context
  chosen_reading: everlasting covenant love
  alternative_readings:
  - everlasting steadfast love
  - everlasting lovingkindness
  rationale: The verse contrasts temporary divine anger with enduring covenantal favor.
    Rendering חֶסֶד as 'covenant love' foregrounds the relational and covenantal dimension
    without importing a sectarian theological system. The more traditional 'steadfast
    love' remains a viable alternative and is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This preserves consistency and aligns with the stated translation policy.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
