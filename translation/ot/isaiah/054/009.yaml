id: ISA.54.9
reference: Isaiah 54:9
source:
  edition: WLC
  text: כִּי מֵ֥י נֹ֨חַ֙ זֹ֣את לִ֔/י אֲשֶׁ֣ר נִשְׁבַּ֗עְתִּי מֵ/עֲבֹ֥ר מֵי נֹ֛חַ ע֖וֹד
    עַל הָ/אָ֑רֶץ כֵּ֥ן נִשְׁבַּ֛עְתִּי מִ/קְּצֹ֥ף עָלַ֖יִ/ךְ וּ/מִ/גְּעָר בָּֽ/ךְ־־־־׃
translation:
  text: 'For this is like the waters of Noah to me: just as I swore that the waters
    of Noah would never again pass over the earth, so I have sworn not to be angry
    with you and not to rebuke you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For this is to me as the waters of Noah.' Some translations, influenced
      by ancient versions, read 'days of Noah,' but the Hebrew text says 'waters of
      Noah.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding assurance; 'For'
    best preserves the connective force in natural English.
- source_word: מֵי נֹחַ
  chosen: the waters of Noah
  alternatives:
  - Noah's waters
  - the floodwaters of Noah
  lexicon: HALOT
  rationale: Construct phrase literally means 'waters of Noah.' 'The waters of Noah'
    is transparent and preserves the allusion to the flood without over-paraphrasing.
- source_word: זֹאת לִי
  chosen: this is like ... to me
  alternatives:
  - this is to me
  - this is as ... to me
  lexicon: HALOT
  rationale: 'The Hebrew is somewhat elliptical. In context, the sense is comparative:
    the present situation is like the days/waters of Noah from God''s perspective.
    Supplying ''like'' makes the English intelligible while reflecting the implied
    comparison.'
- source_word: אֲשֶׁר
  chosen: just as
  alternatives:
  - that
  - whereby
  lexicon: HALOT
  rationale: Links the comparison with the content of the oath. 'Just as' brings out
    the comparative logic that is completed by כֵּן ('so') later in the verse.
- source_word: נִשְׁבַּעְתִּי
  chosen: I swore / I have sworn
  alternatives:
  - I took an oath
  lexicon: HALOT
  rationale: The verb means 'to swear, take an oath.' English uses simple past in
    the first clause and present perfect in the second for smoothness, while preserving
    the solemnity of divine oath language.
- source_word: מֵעֲבֹר
  chosen: would ... pass over
  alternatives:
  - from passing over
  - cross over
  lexicon: HALOT
  rationale: From עבר, 'to pass over/across.' With the preceding preposition after
    'swore,' the sense is that the waters would not again sweep over the earth. 'Pass
    over' is close to the Hebrew and idiomatic enough here.
- source_word: עוֹד
  chosen: never again
  alternatives:
  - again
  - any longer
  lexicon: HALOT
  rationale: In this oath context, עוֹד conveys repetition negated by implication
    from the oath formula; 'never again' expresses the intended force clearly in English.
- source_word: עַל הָאָרֶץ
  chosen: over the earth
  alternatives:
  - upon the earth
  - over the land
  lexicon: HALOT
  rationale: '''Earth'' fits the Noahic flood context better than the more local ''land,''
    and ''over'' matches the motion of floodwaters.'
- source_word: כֵּן
  chosen: so
  alternatives:
  - in the same way
  - thus
  lexicon: HALOT
  rationale: 'Marks the apodosis of the comparison: as with Noah, so now with Zion.
    ''So'' is concise and natural.'
- source_word: מִקְּצֹף עָלַיִךְ
  chosen: not to be angry with you
  alternatives:
  - from being wrathful toward you
  - from raging against you
  lexicon: HALOT
  rationale: The infinitive from קצף denotes being angry/wroth. English requires an
    explicit negative sense after 'I have sworn'; 'not to be angry with you' conveys
    the oath's content clearly.
- source_word: וּמִגְּעָר בָּךְ
  chosen: and not to rebuke you
  alternatives:
  - and not to reprove you
  - and not to chide you
  lexicon: HALOT
  rationale: גער commonly means 'rebuke, reprove.' 'Rebuke' is direct, readable, and
    preserves the verbal parallel with divine anger in the prior phrase.
