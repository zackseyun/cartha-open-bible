theological_decisions:
- issue: Elliptical comparison in זֹאת לִי
  chosen_reading: For this is like the waters of Noah to me
  alternative_readings:
  - For this is to me as the waters of Noah
  - For this is as the days of Noah to me
  rationale: The MT reads 'waters of Noah,' not 'days of Noah' as in some ancient
    versions/translation traditions. Following original-language primacy, the main
    text keeps 'waters of Noah.' Because the Hebrew is elliptical, 'like' is supplied
    for intelligibility but no broader doctrinal claim is imported.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of the oath with prefixed מִן + infinitive clauses
  chosen_reading: I have sworn not to be angry with you and not to rebuke you
  alternative_readings:
  - I have sworn that I will not be angry with you or rebuke you
  rationale: English must make explicit the negative force implied by the Hebrew oath
    construction. This is a grammatical clarification, not an interpretive expansion.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
