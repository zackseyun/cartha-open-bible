id: ISA.54.7
reference: Isaiah 54:7
source:
  edition: WLC
  text: בְּ/רֶ֥גַע קָטֹ֖ן עֲזַבְתִּ֑י/ךְ וּ/בְ/רַחֲמִ֥ים גְּדֹלִ֖ים אֲקַבְּצֵֽ/ךְ׃
translation:
  text: For a brief moment I abandoned you, but with great compassion I will gather
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For a little moment I forsook you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרֶגַע
  chosen: for a moment
  alternatives:
  - in a moment
  - for an instant
  lexicon: HALOT
  rationale: רֶגַע denotes a very short span of time, an instant or moment. With בְּ,
    English idiom is best represented as a temporal phrase. In context, 'for a moment'
    communicates duration more naturally than the more wooden 'in a moment'.
- source_word: קָטֹן
  chosen: brief
  alternatives:
  - small
  - little
  - short
  lexicon: HALOT
  rationale: The adjective literally means 'small/little,' but with a time noun it
    idiomatically indicates short duration. 'Brief' gives natural English while preserving
    the sense of limited duration.
- source_word: עֲזַבְתִּיךְ
  chosen: I abandoned you
  alternatives:
  - I forsook you
  - I left you
  lexicon: HALOT
  rationale: עזב commonly means 'leave, forsake, abandon.' 'Abandoned' is strong but
    appropriate, reflecting the covenantal and emotional force of the verb. 'Forsook'
    is traditional but archaic for the target audience; 'left' is too weak.
- source_word: וּבְרַחֲמִים
  chosen: but with compassion
  alternatives:
  - and with mercies
  - and with compassion
  lexicon: HALOT
  rationale: The conjunction is rendered adversatively as 'but' because the clause
    contrasts the brief abandonment with the promised restoration. רַחֲמִים is plural
    in Hebrew but often functions as an abstract noun in English; 'compassion' is
    the most natural singular rendering.
- source_word: גְּדֹלִים
  chosen: great
  alternatives:
  - abundant
  - vast
  lexicon: HALOT
  rationale: The adjective intensifies רַחֲמִים. 'Great' is straightforward and preserves
    the scale without overinterpreting.
- source_word: אֲקַבְּצֵךְ
  chosen: I will gather you
  alternatives:
  - I will bring you together
  - I will collect you
  lexicon: HALOT
  rationale: קבץ in the Piel commonly means 'gather' or 'assemble,' often with restoration
    overtones. 'I will gather you' preserves both the literal sense and the prophetic
    restoration nuance without paraphrase.
