theological_decisions:
- issue: Nature of the addressee
  chosen_reading: The verse addresses personified Zion/Jerusalem as a feminine singular
    'afflicted one.'
  alternative_readings:
  - A generic afflicted woman
  - The covenant community more abstractly
  rationale: The feminine singular forms and the immediate context of Isaiah 54 favor
    personified Zion/Jerusalem. The translation preserves the personified address
    without importing additional ecclesiological claims.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
