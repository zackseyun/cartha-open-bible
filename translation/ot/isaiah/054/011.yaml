id: ISA.54.11
reference: Isaiah 54:11
source:
  edition: WLC
  text: עֲנִיָּ֥ה סֹעֲרָ֖ה לֹ֣א נֻחָ֑מָה הִנֵּ֨ה אָנֹכִ֜י מַרְבִּ֤יץ בַּ/פּוּךְ֙ אֲבָנַ֔יִ/ךְ
    וִ/יסַדְתִּ֖י/ךְ בַּ/סַּפִּירִֽים׃
translation:
  text: O afflicted one, storm-tossed and not comforted, behold, I am setting your
    stones in antimony and laying your foundations with sapphires.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with lapis lazuli'; the Hebrew term traditionally rendered 'sapphires'
      may refer to a blue precious stone not identical to the modern sapphire.
    reason: lexical_alternative
  - marker: b
    text: '''In antimony'' likely refers to a decorative setting material for the
      stones; some understand a dark mortar or inlay.'
    reason: cultural_note
lexical_decisions:
- source_word: עֲנִיָּה
  chosen: afflicted one
  alternatives:
  - afflicted
  - poor one
  - oppressed one
  lexicon: HALOT
  rationale: The feminine singular adjective is used vocatively/personally of Zion/Jerusalem.
    'Afflicted one' preserves both the adjectival sense and the direct address better
    than the flatter 'afflicted' or the narrower socioeconomic 'poor one'.
- source_word: סֹעֲרָה
  chosen: storm-tossed
  alternatives:
  - storm-beaten
  - tempest-tossed
  lexicon: HALOT
  rationale: The participial form conveys being battered by storm. 'Storm-tossed'
    is idiomatic modern English and preserves the image without archaic tone.
- source_word: לֹא נֻחָמָה
  chosen: not comforted
  alternatives:
  - uncomforted
  - not consoled
  lexicon: HALOT
  rationale: A straightforward passive sense is best. 'Not comforted' is more natural
    and transparent than the slightly archaic 'uncomforted.'
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: The particle marks emphatic divine announcement. 'Behold' retains the
    elevated prophetic force better than 'look' while remaining understandable.
- source_word: מַרְבִּיץ
  chosen: am setting
  alternatives:
  - will set
  - am laying
  lexicon: HALOT
  rationale: The Hiphil participle with אָנֹכִי after הִנֵּה presents imminent or
    vivid future action. English present progressive captures the vividness. The verb
    here refers to placing stones in decorative material rather than merely causing
    to lie down.
- source_word: בַּפּוּךְ
  chosen: in antimony
  alternatives:
  - with antimony
  - in mortar of antimony
  - with black mortar
  lexicon: HALOT
  rationale: פּוּךְ normally denotes antimony/black cosmetic mineral. In this building
    metaphor it likely refers to a dark setting medium or decorative inlay. 'In antimony'
    stays close to the Hebrew and preserves the concrete lexical value without over-interpreting
    the construction.
- source_word: אֲבָנַיִךְ
  chosen: your stones
  alternatives:
  - your building stones
  - your jewels
  lexicon: HALOT
  rationale: The ordinary sense is 'stones,' here in the architectural metaphor for
    restored Zion. 'Jewels' would over-specify; the beautifying sense is already conveyed
    by the surrounding materials.
- source_word: וִיסַדְתִּיךְ
  chosen: and laying your foundations
  alternatives:
  - and I will found you
  - and I will lay your foundation
  lexicon: HALOT
  rationale: The verb יסד means to found or lay foundations. English idiom prefers
    an explicit object related to construction. Plural 'foundations' is natural with
    the following plural material term and common in English architectural phrasing.
- source_word: בַּסַּפִּירִים
  chosen: with sapphires
  alternatives:
  - in sapphires
  - with lapis lazuli
  lexicon: HALOT
  rationale: סַפִּיר traditionally renders as 'sapphire,' though the ancient stone
    may have been lapis lazuli. Because 'sapphire' is the standard English biblical
    rendering and the exact mineral identification is uncertain, it is retained in
    the main text, with the more technical alternative preserved in a footnote.
