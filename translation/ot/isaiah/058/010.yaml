theological_decisions:
- issue: Anthropological sense of נֶפֶשׁ in repeated phrases
  chosen_reading: Render contextually as 'yourself' in the first clause and 'soul'
    in the second phrase ('afflicted soul')
  alternative_readings:
  - Render both occurrences uniformly as 'soul'
  - Render both as 'person'
  rationale: The verse uses נֶפֶשׁ idiomatically for the whole person/life. In the
    first clause, strict 'your soul' would sound unnatural and potentially misleading
    in English, so 'yourself' best conveys self-giving. In the second clause, 'afflicted
    soul' preserves the Hebrew imagery while remaining understandable. This balances
    consistency with natural English and avoids importing a technical doctrine of
    the soul not demanded by the text.
  doctrine_reference: Translation philosophy §§1, 5, 6
