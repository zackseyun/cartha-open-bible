id: ISA.58.10
reference: Isaiah 58:10
source:
  edition: WLC
  text: וְ/תָפֵ֤ק לָֽ/רָעֵב֙ נַפְשֶׁ֔/ךָ וְ/נֶ֥פֶשׁ נַעֲנָ֖ה תַּשְׂבִּ֑יעַ וְ/זָרַ֤ח
    בַּ/חֹ֨שֶׁךְ֙ אוֹרֶ֔/ךָ וַ/אֲפֵלָתְ/ךָ֖ כַּֽ/צָּהֳרָֽיִם׃
translation:
  text: and if you pour yourself out for the hungry and satisfy the afflicted soul,
    then your light will rise in the darkness, and your gloom will be like noonday.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'draw out your soul to the hungry.' The Hebrew idiom uses 'soul' (נֶפֶשׁ)
      for the self or life.
    reason: lexical_alternative
  - marker: b
    text: Or 'the afflicted person'; Hebrew 'soul' here often refers to the whole
      person, not only the immaterial aspect.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתָפֵק
  chosen: pour yourself out
  alternatives:
  - extend yourself
  - offer yourself
  - draw out your soul
  lexicon: HALOT
  rationale: The Hiphil of פוק here is idiomatic with נֶפֶשׁ, conveying expending
    oneself on behalf of another rather than merely giving an object. 'Pour yourself
    out' captures the reflexive, self-giving force in natural English better than
    a wooden 'draw out your soul.'
- source_word: לָרָעֵב
  chosen: for the hungry
  alternatives:
  - to the hungry
  - for the famished
  lexicon: HALOT
  rationale: רָעֵב is an adjective/substantive meaning 'hungry.' 'For the hungry'
    fits the English idiom with 'pour yourself out' and preserves the beneficiary
    sense of ל.
- source_word: נַפְשֶׁךָ
  chosen: yourself
  alternatives:
  - your soul
  - your life
  lexicon: HALOT
  rationale: נֶפֶשׁ often denotes the whole person or life, not merely an immaterial
    soul. In this idiom, English 'yourself' best communicates the sense without suggesting
    a narrow body-soul anthropology.
- source_word: וְנֶפֶשׁ נַעֲנָה
  chosen: the afflicted soul
  alternatives:
  - the afflicted person
  - the humbled soul
  lexicon: HALOT
  rationale: נֶפֶשׁ again denotes the person/life, while נַעֲנָה ('afflicted, humbled')
    describes one in distress. 'Afflicted soul' is close to the Hebrew wording and
    remains intelligible in modern English.
- source_word: תַּשְׂבִּיעַ
  chosen: satisfy
  alternatives:
  - fill
  - fully satisfy
  lexicon: HALOT
  rationale: The Hiphil of שׂבע means to satisfy or fill to fullness. 'Satisfy' is
    concise and idiomatic with 'the afflicted soul.'
- source_word: וְזָרַח
  chosen: will rise
  alternatives:
  - will dawn
  - will shine forth
  lexicon: HALOT
  rationale: Though morphologically a wayyiqtol, in this conditional context it carries
    future/result force. 'Will rise' naturally describes light emerging and matches
    the imagery.
- source_word: בַּחֹשֶׁךְ
  chosen: in the darkness
  alternatives:
  - in darkness
  lexicon: HALOT
  rationale: The prepositional phrase is locative. 'In the darkness' preserves the
    concrete imagery.
- source_word: אוֹרֶךָ
  chosen: your light
  lexicon: HALOT
  rationale: Straightforward rendering of אוֹר with 2ms suffix; metaphorically refers
    to restored blessing/guidance, but the image should remain untranslated in the
    main text.
- source_word: וַאֲפֵלָתְךָ
  chosen: your gloom
  alternatives:
  - your darkness
  - your deep darkness
  lexicon: HALOT
  rationale: אֲפֵלָה denotes deep darkness or gloom. 'Your gloom' avoids awkward repetition
    with the previous 'darkness' while preserving the metaphor of distress.
- source_word: כַּצָּהֳרָיִם
  chosen: like noonday
  alternatives:
  - like the noon
  - like midday
  lexicon: HALOT
  rationale: צָהֳרַיִם means noon/midday. 'Like noonday' is idiomatic and preserves
    the simile of brightest light.
