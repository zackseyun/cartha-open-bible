id: ISA.58.2
reference: Isaiah 58:2
source:
  edition: WLC
  text: וְ/אוֹתִ֗/י י֥וֹם יוֹם֙ יִדְרֹשׁ֔וּ/ן וְ/דַ֥עַת דְּרָכַ֖/י יֶחְפָּצ֑וּ/ן כְּ/ג֞וֹי
    אֲשֶׁר צְדָקָ֣ה עָשָׂ֗ה וּ/מִשְׁפַּ֤ט אֱלֹהָי/ו֙ לֹ֣א עָזָ֔ב יִשְׁאָל֨וּ/נִי֙
    מִשְׁפְּטֵי צֶ֔דֶק קִרְבַ֥ת אֱלֹהִ֖ים יֶחְפָּצֽוּ/ן־־׃
translation:
  text: Yet day after day they seek me, and they delight to know my ways, as if they
    were a nation that practiced righteousness and had not forsaken the justice of
    its God. They ask me for righteous judgments; they delight in the nearness of
    God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they delight in drawing near to God' or 'they delight in approach to
      God.' The Hebrew phrase can refer either to God's nearness or to the act of
      approaching him.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאוֹתִי
  chosen: Yet ... me
  alternatives:
  - And ... me
  - Me also
  lexicon: HALOT
  rationale: The conjunction with the object marker introduces a contrast with the
    previous verse's denunciation; 'Yet' brings out the adversative force in context
    while preserving the direct object 'me' as the one sought.
- source_word: יוֹם יוֹם
  chosen: day after day
  alternatives:
  - daily
  - day by day
  lexicon: HALOT
  rationale: The repetition is an idiomatic distributive expression indicating continual
    or habitual action. 'Day after day' preserves the repetition more vividly than
    the flatter 'daily'.
- source_word: יִדְרֹשׁוּן
  chosen: they seek
  alternatives:
  - they inquire of
  - they consult
  lexicon: HALOT
  rationale: דרשׁ in this context refers to seeking God in worship or inquiry. 'Seek'
    is the most natural and theologically resonant English equivalent here.
- source_word: וְדַעַת דְּרָכַי יֶחְפָּצוּן
  chosen: they delight to know my ways
  alternatives:
  - they desire the knowledge of my ways
  - they take pleasure in knowing my ways
  lexicon: HALOT
  rationale: The construct 'knowledge of my ways' with חפץ expresses desire or delight
    in knowing God's ways. 'Delight to know' is idiomatic English that preserves both
    the volitional and cognitive elements.
- source_word: כְּגוֹי אֲשֶׁר
  chosen: as if they were a nation that
  alternatives:
  - like a nation that
  - as a nation that
  lexicon: HALOT
  rationale: The comparison is ironic rather than straightforward. 'As if they were'
    makes the prophetic irony explicit in natural English without adding content beyond
    the context.
- source_word: צְדָקָה עָשָׂה
  chosen: practiced righteousness
  alternatives:
  - did righteousness
  - acted justly
  lexicon: HALOT
  rationale: The idiom 'do righteousness' is best rendered in contemporary English
    as 'practice righteousness.' This preserves the ethical sense without wooden phrasing.
- source_word: וּמִשְׁפַּט אֱלֹהָיו לֹא עָזָב
  chosen: had not forsaken the justice of its God
  alternatives:
  - had not abandoned the ordinance of its God
  - had not left the judgment of its God
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote justice, judgment, or ordinance. Here it refers
    broadly to God's just order/requirements. 'Justice' fits the ethical context of
    Isaiah 58 and reads naturally.
- source_word: יִשְׁאָלוּנִי
  chosen: They ask me
  alternatives:
  - They inquire of me
  - They request from me
  lexicon: HALOT
  rationale: The verb means to ask or inquire. 'Ask me' is simple and fits the parallelism
    with the surrounding religious actions.
- source_word: מִשְׁפְּטֵי צֶדֶק
  chosen: righteous judgments
  alternatives:
  - just judgments
  - judgments of righteousness
  lexicon: HALOT
  rationale: The plural construct likely refers to judicial decisions or declarations
    aligned with righteousness. 'Righteous judgments' preserves the lexical link with
    צְדָקָה earlier in the verse.
- source_word: קִרְבַת אֱלֹהִים
  chosen: the nearness of God
  alternatives:
  - approach to God
  - drawing near to God
  lexicon: HALOT
  rationale: The noun קִרְבָה denotes nearness or approach. The phrase can mean either
    God's nearness or the act of approaching God. 'The nearness of God' best matches
    the nominal form and the likely object of their professed delight, while an alternative
    is preserved in a footnote because the phrase is genuinely ambiguous.
- source_word: יֶחְפָּצוּן
  chosen: they delight
  alternatives:
  - they desire
  - they take pleasure
  lexicon: HALOT
  rationale: חפץ conveys pleasure, desire, or delight. 'Delight' fits both occurrences
    in the verse and gives a coherent portrayal of their professed religious enthusiasm.
