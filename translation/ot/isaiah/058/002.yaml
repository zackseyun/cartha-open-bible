theological_decisions:
- issue: Whether to make the verse's irony explicit in English
  chosen_reading: Render the comparison as 'as if they were a nation that...'
  alternative_readings:
  - like a nation that...
  rationale: The context is a prophetic rebuke exposing hypocritical religiosity.
    Making the ironic force explicit helps modern readers hear the contrast already
    present in the Hebrew comparison and surrounding context, without importing extra
    doctrine.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Meaning of קִרְבַת אֱלֹהִים
  chosen_reading: '''the nearness of God'' in the main text'
  alternative_readings:
  - '''drawing near to God'''
  - '''approach to God'''
  rationale: The Hebrew noun can denote nearness or approach. The genitive allows
    either an objective sense (approach to God) or a more direct nominal sense (God's
    nearness). The main text keeps the nominal force; the alternative is preserved
    in a footnote to maintain the ambiguity rather than over-resolve it.
  doctrine_reference: Translation philosophy §3
