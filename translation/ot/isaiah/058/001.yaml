id: ISA.58.1
reference: Isaiah 58:1
source:
  edition: WLC
  text: קְרָ֤א בְ/גָרוֹן֙ אַל תַּחְשֹׂ֔ךְ כַּ/שּׁוֹפָ֖ר הָרֵ֣ם קוֹלֶ֑/ךָ וְ/הַגֵּ֤ד
    לְ/עַמִּ/י֙ פִּשְׁעָ֔/ם וּ/לְ/בֵ֥ית יַעֲקֹ֖ב חַטֹּאתָֽ/ם־׃
translation:
  text: Cry out with your throat; do not hold back. Raise your voice like a trumpet,
    and declare to my people their rebellion, and to the house of Jacob their sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a ram's horn'; the Hebrew shofar refers to a horn used for signaling
      or proclamation.
    reason: cultural_note
  - marker: b
    text: Or 'their transgression'; the Hebrew term can emphasize willful rebellion
      against God.
    reason: lexical_alternative
lexical_decisions:
- source_word: קְרָא
  chosen: Cry out
  alternatives:
  - Call out
  - Proclaim
  lexicon: HALOT
  rationale: Imperative of קרא in a public, forceful sense. 'Cry out' best conveys
    loud, urgent proclamation in context.
- source_word: בְגָרוֹן
  chosen: with your throat
  alternatives:
  - at full throat
  - with full voice
  - from your throat
  lexicon: HALOT
  rationale: Literally 'with the throat.' Kept relatively concrete to preserve the
    bodily vividness of the Hebrew while remaining intelligible in English.
- source_word: אַל תַּחְשֹׂךְ
  chosen: do not hold back
  alternatives:
  - do not spare
  - do not restrain yourself
  lexicon: HALOT
  rationale: The idiom means not to withhold or restrain. 'Do not hold back' is natural
    modern English and fits the exhortation to fearless proclamation.
- source_word: כַּשּׁוֹפָר
  chosen: like a trumpet
  alternatives:
  - like a ram's horn
  lexicon: HALOT
  rationale: שׁוֹפָר is specifically a horn trumpet, often ram's horn, but 'trumpet'
    communicates the loud signaling function clearly in modern English. The more specific
    cultural form is preserved in a footnote.
- source_word: הָרֵם קוֹלֶךָ
  chosen: Raise your voice
  alternatives:
  - Lift up your voice
  lexicon: HALOT
  rationale: Idiomatic English equivalent of the Hebrew expression. 'Raise your voice'
    preserves the imperative force while sounding natural.
- source_word: וְהַגֵּד
  chosen: declare
  alternatives:
  - tell
  - announce
  - make known
  lexicon: HALOT
  rationale: The verb calls for direct, authoritative disclosure. 'Declare' fits the
    prophetic tone better than the more neutral 'tell'.
- source_word: לְעַמִּי
  chosen: to my people
  lexicon: HALOT
  rationale: Straightforward possessive phrase; preserves the covenantal relationship
    implied by 'my people.'
- source_word: פִּשְׁעָם
  chosen: their rebellion
  alternatives:
  - their transgression
  - their revolt
  lexicon: HALOT
  rationale: פֶּשַׁע often denotes willful breach or rebellion, not merely generic
    wrongdoing. 'Rebellion' best captures the defiant nuance.
- source_word: וּלְבֵית יַעֲקֹב
  chosen: and to the house of Jacob
  alternatives:
  - and to Jacob's house
  lexicon: HALOT
  rationale: Traditional and clear rendering of the covenantal/national designation.
- source_word: חַטֹּאתָם
  chosen: their sins
  alternatives:
  - their sin
  lexicon: HALOT
  rationale: Plural form in Hebrew; 'sins' preserves the plurality and complements
    'rebellion' as a broader category of offenses.
