theological_decisions:
- issue: Relation between 'my people' and 'the house of Jacob'
  chosen_reading: Both expressions are retained distinctly in the main text without
    collapsing them into a single phrase.
  alternative_readings:
  - Treating the second phrase as simple apposition to the first
  rationale: The Hebrew presents parallel objects, which heightens the prophetic indictment
    while preserving covenantal language. Retaining both avoids flattening the rhetoric
    or importing a narrower theological conclusion.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
