theological_decisions:
- issue: Referent of 'on high'
  chosen_reading: Retain the spatial expression 'on high' without explicitly specifying God or heaven.
  alternative_readings:
  - in heaven
  - before God
  rationale: The Hebrew says 'in/on the height' and implies divine hearing, but does not explicitly name God here. Preserving 'on high' avoids importing a more explicit theological claim than the text states while still conveying the likely sense.
  doctrine_reference: Translation philosophy §1, §3
