id: ISA.58.4
reference: Isaiah 58:4
source:
  edition: WLC
  text: הֵ֣ן לְ/רִ֤יב וּ/מַצָּה֙ תָּצ֔וּמוּ וּ/לְ/הַכּ֖וֹת בְּ/אֶגְרֹ֣ף רֶ֑שַׁע לֹא תָצ֣וּמוּ כַ/יּ֔וֹם לְ/הַשְׁמִ֥יעַ בַּ/מָּר֖וֹם קוֹלְ/כֶֽם־׃
translation:
  text: Look[a], you fast for strife and contention, and to strike with a wicked fist[b]. You are not fasting today to make your voice heard on high.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'with a fist of wickedness.'
    reason: lexical_alternative
  - marker: b
    text: '''On high'' may refer to the heavenly realm, that is, to making their voice heard before God.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  lexicon: HALOT
  rationale: Introduces an emphatic attention-getter. 'Look' is natural modern English and preserves the confrontational force better than the more archaic 'Behold.'
- source_word: לְרִיב
  chosen: for strife
  alternatives:
  - for quarreling
  - for dispute
  lexicon: HALOT
  rationale: רִיב denotes contention or dispute. 'Strife' fits the prophetic denunciation and pairs well with the following noun.
- source_word: וּמַצָּה
  chosen: and contention
  alternatives:
  - and fighting
  - and quarrel
  lexicon: HALOT
  rationale: מַצָּה here refers to conflict or quarrel. 'Contention' gives a close semantic parallel to רִיב without sounding overly repetitive.
- source_word: תָּצוּמוּ
  chosen: you fast
  lexicon: HALOT
  rationale: Directly renders the 2mp imperfect in context as a present habitual/repeated action in prophetic rebuke.
- source_word: וּלְהַכּוֹת
  chosen: and to strike
  alternatives:
  - and to hit
  - and to smite
  lexicon: HALOT
  rationale: Infinitive construct with prefixed ל expresses purpose/result. 'Strike' is idiomatic and suitably forceful.
- source_word: בְּאֶגְרֹף רֶשַׁע
  chosen: with a wicked fist
  alternatives:
  - with a fist of wickedness
  - with an evil fist
  lexicon: HALOT
  rationale: The construct-like phrase is somewhat idiomatic. 'With a wicked fist' communicates violent wrongdoing in natural English while preserving the moral quality attached to the act. A more literal 'fist of wickedness' is preserved in a footnote.
- source_word: לֹא תָצוּמוּ כַיּוֹם
  chosen: You do not fast as you do today
  alternatives:
  - You are not fasting today
  - You shall not fast as on this day
  lexicon: HALOT
  rationale: The clause contrasts their current manner of fasting with the kind acceptable to God. 'As you do today' preserves the comparative force of כַּיּוֹם and fits the rebuke better than a simple temporal 'today.'
- source_word: לְהַשְׁמִיעַ
  chosen: to make ... heard
  alternatives:
  - to cause ... to be heard
  - to proclaim
  lexicon: HALOT
  rationale: Hiphil infinitive of שמע means to cause to hear/make heard. Here it governs 'your voice' naturally in English.
- source_word: בַּמָּרוֹם
  chosen: on high
  alternatives:
  - in the height
  - in heaven
  lexicon: HALOT
  rationale: מָרוֹם literally means height/high place. 'On high' preserves the elevated, possibly divine-hearing sense without over-interpreting it as a direct synonym for 'heaven.'
- source_word: קוֹלְכֶם
  chosen: your voice
  alternatives:
  - your sound
  - your cry
  lexicon: HALOT
  rationale: קוֹל commonly means 'voice.' In context it refers to their prayerful or public outcry; 'voice' is the most direct rendering.
