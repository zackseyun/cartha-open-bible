id: ISA.58.7
reference: Isaiah 58:7
source:
  edition: WLC
  text: הֲ/ל֨וֹא פָרֹ֤ס לָֽ/רָעֵב֙ לַחְמֶ֔/ךָ וַ/עֲנִיִּ֥ים מְרוּדִ֖ים תָּ֣בִיא בָ֑יִת
    כִּֽי תִרְאֶ֤ה עָרֹם֙ וְ/כִסִּית֔/וֹ וּ/מִ/בְּשָׂרְ/ךָ֖ לֹ֥א תִתְעַלָּֽם־׃
translation:
  text: Is it not to share your bread with the hungry, and bring the poor who are
    cast out into your house? When you see the naked, to cover him, and not hide yourself
    from your own flesh?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the poor homeless'; the Hebrew likely refers to poor people who have
      been driven out or left without shelter.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your own flesh,' an idiom that can mean your own kin or family,
      and by extension those bound to you in shared humanity.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָרֹס
  chosen: share
  alternatives:
  - divide
  - break
  lexicon: HALOT
  rationale: The verb literally denotes dividing or breaking apart. In context with
    bread given to the hungry, English 'share' best captures the intended charitable
    action while preserving the concrete sense behind the Hebrew.
- source_word: לָרָעֵב
  chosen: with the hungry
  alternatives:
  - to the hungry
  - for the hungry
  lexicon: HALOT
  rationale: The preposition plus adjective marks the recipient of the bread. 'With
    the hungry' fits idiomatic English after 'share your bread,' while still indicating
    the hungry person as beneficiary.
- source_word: לַחְמֶךָ
  chosen: your bread
  alternatives:
  - your food
  lexicon: HALOT
  rationale: Hebrew 'bread' can stand concretely for bread or more broadly for food.
    Here retaining 'bread' preserves the vividness and common biblical idiom without
    obscuring meaning.
- source_word: עֲנִיִּים
  chosen: the poor
  alternatives:
  - the afflicted
  - the needy
  lexicon: HALOT
  rationale: The term commonly denotes those in poverty or affliction. 'The poor'
    is the most natural and contextually fitting rendering in this social-justice
    exhortation.
- source_word: מְרוּדִים
  chosen: who are cast out
  alternatives:
  - homeless
  - wandering
  - oppressed
  lexicon: HALOT
  rationale: This participial/noun form is difficult and can suggest those driven
    out or left without shelter. 'Who are cast out' stays closer to the likely verbal
    idea of being expelled or displaced, while avoiding over-specifying modern categories.
- source_word: תָּבִיא בָיִת
  chosen: bring ... into your house
  alternatives:
  - bring home
  - take into the house
  lexicon: HALOT
  rationale: The Hiphil of 'come/go' with 'house' means to bring someone into one's
    home. 'Into your house' makes the hospitable action explicit and natural in English.
- source_word: כִּי תִרְאֶה
  chosen: When you see
  alternatives:
  - if you see
  lexicon: HALOT
  rationale: Here כִּי introduces a circumstance within the series of expected righteous
    actions. 'When you see' better conveys the practical inevitability of the situation
    than a merely hypothetical 'if.'
- source_word: עָרֹם
  chosen: the naked
  alternatives:
  - someone naked
  - one who is naked
  lexicon: HALOT
  rationale: The adjective functions substantivally. 'The naked' is concise, idiomatic,
    and preserves the representative singular sense.
- source_word: וְכִסִּיתוֹ
  chosen: to cover him
  alternatives:
  - and clothe him
  lexicon: HALOT
  rationale: The verb is literally 'cover.' In context it implies clothing, but 'cover
    him' preserves the Hebrew wording while remaining clear.
- source_word: וּמִבְּשָׂרְךָ
  chosen: from your own flesh
  alternatives:
  - from your own kin
  - from your own family
  lexicon: HALOT
  rationale: '''Flesh'' can denote blood relation or close kin. Retaining ''your own
    flesh'' preserves the Hebrew metaphor and its moral force, while allowing readers
    to sense both literal kinship and shared human solidarity.'
- source_word: לֹא תִתְעַלָּם
  chosen: not hide yourself
  alternatives:
  - not ignore him
  - not turn yourself away
  lexicon: HALOT
  rationale: The Hitpael conveys concealing oneself or withdrawing from notice. 'Not
    hide yourself' is more literal and vivid than the interpretive 'not ignore him,'
    while still understandable in context.
