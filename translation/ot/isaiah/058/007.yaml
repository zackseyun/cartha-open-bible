theological_decisions:
- issue: Scope of 'your own flesh'
  chosen_reading: Retain the Hebrew idiom rather than narrowing it to family only.
  alternative_readings:
  - your own family
  - your relatives
  rationale: The phrase may point especially to one's kin, but the Hebrew metaphor
    'flesh' carries broader ethical resonance. Preserving the idiom avoids prematurely
    resolving the scope and keeps the prophetic force open.
  doctrine_reference: Preserve theological tension rather than resolve it.
