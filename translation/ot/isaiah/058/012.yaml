id: ISA.58.12
reference: Isaiah 58:12
source:
  edition: WLC
  text: וּ/בָנ֤וּ מִמְּ/ךָ֙ חָרְב֣וֹת עוֹלָ֔ם מוֹסְדֵ֥י דוֹר וָ/ד֖וֹר תְּקוֹמֵ֑ם וְ/קֹרָ֤א
    לְ/ךָ֙ גֹּדֵ֣ר פֶּ֔רֶץ מְשֹׁבֵ֥ב נְתִיב֖וֹת לָ/שָֽׁבֶת־׃
translation:
  text: Those from among you will rebuild the ancient ruins; you will raise up the
    foundations of generation after generation, and you will be called the repairer
    of the breach, the restorer of paths for dwelling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the foundations of many generations.' The Hebrew phrase is literally
      'the foundations of generation and generation.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the restorer of paths to dwell in' or 'the restorer of streets for habitation.'
      The final phrase likely refers to making the community inhabitable again.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָנוּ מִמְּךָ
  chosen: Those from among you will rebuild
  alternatives:
  - Your people will rebuild
  - They will build from you
  lexicon: HALOT
  rationale: The idiom מִמְּךָ after a plural verb indicates people coming from the
    addressee ('from among you'), not material source. 'Rebuild' fits בנה in a restoration
    context better than simply 'build'.
- source_word: חָרְבוֹת עוֹלָם
  chosen: the ancient ruins
  alternatives:
  - the age-old ruins
  - the everlasting desolations
  lexicon: HALOT
  rationale: חָרְבוֹת are ruins/desolations; עוֹלָם here most naturally denotes antiquity
    or long duration in context, so 'ancient ruins' is idiomatic and clear.
- source_word: מוֹסְדֵי דוֹר וָדוֹר
  chosen: the foundations of generation after generation
  alternatives:
  - the foundations of many generations
  - age-old foundations
  lexicon: HALOT
  rationale: מוֹסְדֵי are foundations. דוֹר וָדוֹר is literally 'generation and generation,'
    an idiom for successive generations. The chosen rendering preserves the distributive
    sense while remaining natural English.
- source_word: תְּקוֹמֵם
  chosen: you will raise up
  alternatives:
  - you will establish
  - you will restore
  lexicon: HALOT
  rationale: From קום in the Hiphil/causative sense, 'raise up' preserves the image
    of causing ruined foundations to stand again. 'Establish' is possible but less
    vivid.
- source_word: וְקֹרָא לְךָ
  chosen: and you will be called
  alternatives:
  - and one will call you
  - and they will call you
  lexicon: HALOT
  rationale: The impersonal 3ms active is commonly rendered as a passive in English.
    This is the most natural equivalent and preserves the sense of bestowed reputation/title.
- source_word: גֹּדֵר פֶּרֶץ
  chosen: the repairer of the breach
  alternatives:
  - the one who walls up the breach
  - the mender of the broken wall
  lexicon: HALOT
  rationale: גֹּדֵר is one who walls up/fences/rebuilds; with פֶּרֶץ ('breach, gap'),
    the idiom points to repairing a broken place in communal defenses or structures.
    'Repairer of the breach' is concise and established without being archaic.
- source_word: מְשֹׁבֵב נְתִיבוֹת
  chosen: the restorer of paths
  alternatives:
  - the one who turns back paths
  - the renewer of roads
  lexicon: HALOT
  rationale: From שוב in a causative/restorative participial form, the sense is bringing
    back or restoring. נְתִיבוֹת are paths/roadways. 'Restorer' best captures the
    restorative nuance in parallel with the previous title.
- source_word: לָשָׁבֶת
  chosen: for dwelling
  alternatives:
  - to dwell in
  - for habitation
  lexicon: HALOT
  rationale: 'The infinitive of ישב here expresses purpose/result: paths restored
    so that places may again be inhabited. ''For dwelling'' is compact and preserves
    the teleological sense.'
