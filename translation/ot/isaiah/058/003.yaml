id: ISA.58.3
reference: Isaiah 58:3
source:
  edition: WLC
  text: לָ֤/מָּה צַּ֨מְנוּ֙ וְ/לֹ֣א רָאִ֔יתָ עִנִּ֥ינוּ נַפְשֵׁ֖/נוּ וְ/לֹ֣א תֵדָ֑ע הֵ֣ן בְּ/י֤וֹם צֹֽמְ/כֶם֙ תִּמְצְאוּ חֵ֔פֶץ וְ/כָל עַצְּבֵי/כֶ֖ם תִּנְגֹּֽשׂוּ־־׃
translation:
  text: Why have we fasted[a], and you have not seen? Why have we humbled ourselves, and you do not know it? Behold, on the day of your fast you find your own pleasure[c][b], and you oppress all your laborers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have we afflicted ourselves' or 'have we denied ourselves?' Literally, 'have we afflicted our soul.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you find pleasure,' 'you seek your own desire,' or possibly 'you pursue your own business.'
    reason: lexical_alternative
  - marker: c
    text: Or 'you oppress all your workers' or 'you exact all your labors/tasks.' The Hebrew may refer either to laborers or to the labor exacted from them.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  chosen: Why
  lexicon: HALOT
  rationale: Introduces the people's complaint as a direct question.
- source_word: צַּמְנוּ
  chosen: have we fasted
  alternatives:
  - did we fast
  lexicon: HALOT
  rationale: Qal perfect 1cp of צום, rendered as present perfect in English to reflect a completed act with present complaint relevance.
- source_word: רָאִיתָ
  chosen: have not seen
  alternatives:
  - did not see
  - have not looked
  lexicon: HALOT
  rationale: With לֹא, expresses the complaint that God has taken no notice. 'Seen' preserves the concrete Hebrew verb ראה.
- source_word: עִנִּינוּ נַפְשֵׁנוּ
  chosen: have we humbled ourselves
  alternatives:
  - have we afflicted ourselves
  - have we denied ourselves
  lexicon: HALOT
  rationale: The idiom 'afflict the soul/self' commonly refers to self-denial associated with fasting. 'Humbled ourselves' communicates the ritual self-abasement clearly in modern English while staying close to the idiom's force; alternatives are preserved because 'afflicted ourselves' is more formally literal.
- source_word: תֵדָע
  chosen: do not notice
  alternatives:
  - do not know
  - do not acknowledge
  lexicon: HALOT
  rationale: ידע here is relational/experiential rather than mere cognition; in parallel with 'seen,' it conveys failure to take notice. 'Notice' gives the sense in idiomatic English.
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  lexicon: HALOT
  rationale: Marks the divine rebuttal emphatically. 'Look' is readable modern English for the deictic particle.
- source_word: בְּיוֹם צֹמְכֶם
  chosen: on the day of your fast
  alternatives:
  - in the day of your fasting
  - when you fast
  lexicon: HALOT
  rationale: Keeps the temporal expression explicit and close to the Hebrew construct phrase.
- source_word: תִּמְצְאוּ חֵפֶץ
  chosen: you pursue your own pleasure
  alternatives:
  - you find pleasure
  - you seek your own desire
  - you pursue your own business
  lexicon: HALOT
  rationale: מצא + חפץ here likely means pursuing what pleases oneself rather than merely discovering pleasure. In context of hypocritical fasting, it points to self-interest. 'Your own' is supplied idiomatically from the context of rebuke.
- source_word: עַצְּבֵיכֶם
  chosen: your laborers
  alternatives:
  - your workers
  - your toilers
  - your labors
  lexicon: HALOT
  rationale: The noun likely refers to those who labor for them, not abstract 'labors,' in view of the following verb 'drive hard/press.' This yields the social-justice force of the accusation.
- source_word: תִּנְגֹּשׂוּ
  chosen: you drive all your laborers hard
  alternatives:
  - you oppress all your workers
  - you exact all your labors
  - you press all your laborers
  lexicon: HALOT
  rationale: נגשׂ commonly carries the sense of driving, exacting, or oppressing. In this context of exploitative fasting, 'drive ... hard' is natural English and conveys coercive economic pressure.
