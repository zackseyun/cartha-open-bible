theological_decisions:
- issue: Interpretation of the social accusation in the second colon
  chosen_reading: The verse condemns fasting accompanied by self-serving conduct and exploitation of workers/laborers.
  alternative_readings:
  - The verse condemns pursuing one's own business and exacting labor/tasks rather than specifically oppressing workers.
  rationale: The combination of חפץ and נגשׂ in context favors a critique of economic exploitation during religious observance. The translation preserves that force without importing later doctrinal categories.
  doctrine_reference: Translation philosophy §1, §5
