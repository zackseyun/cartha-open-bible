id: ISA.10.30
reference: Isaiah 10:30
source:
  edition: WLC
  text: צַהֲלִ֥י קוֹלֵ֖/ךְ בַּת גַּלִּ֑ים הַקְשִׁ֥יבִי לַ֖יְשָׁה עֲנִיָּ֥ה עֲנָתֽוֹת־׃
translation:
  text: Cry aloud[a], daughter of Gallim! Listen[c][b], Laishah! O poor Anathoth!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Raise a shrill cry with your voice, daughter of Gallim.' The Hebrew verb can denote a piercing or ringing cry.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'daughter of Gallim,' a personified way of addressing the town or its inhabitants.
    reason: cultural_note
  - marker: c
    text: Or 'Afflicted Anathoth' or 'Wretched Anathoth.' The adjective may express misery or oppression.
    reason: lexical_alternative
lexical_decisions:
- source_word: צַהֲלִי
  chosen: Cry aloud
  alternatives:
  - Raise a shrill cry
  - Shout
  lexicon: HALOT
  rationale: Imperative 2fs from צהל, used for a loud cry or ringing shout. 'Cry aloud' preserves the urgency and audible force without over-specifying whether the sound is joyful or fearful; in this invasion context it is best heard as an alarmed cry.
- source_word: קוֹלֵךְ
  chosen: with your voice
  alternatives:
  - your voice
  - lift your voice
  lexicon: HALOT
  rationale: Literally 'your voice.' Rendering with the preposition 'with' in English smooths the idiom after the imperative while preserving the concrete Hebrew expression.
- source_word: בַּת גַּלִּים
  chosen: daughter of Gallim
  alternatives:
  - O daughter Gallim
  - Gallim's daughter
  lexicon: HALOT
  rationale: A common prophetic/address formula for a town or its inhabitants personified as a daughter. 'Daughter of Gallim' keeps the metaphor and place-name intact rather than flattening it to 'people of Gallim.'
- source_word: הַקְשִׁיבִי
  chosen: Listen
  alternatives:
  - Pay attention
  - Give heed
  lexicon: HALOT
  rationale: Imperative 2fs from קשׁב, calling for attentive hearing. 'Listen' is natural modern English and retains the direct summons.
- source_word: לַיְשָׁה
  chosen: Laishah
  alternatives:
  - Laish
  lexicon: HALOT
  rationale: Treated as a place-name and transliterated per translation policy. The form here is best represented as 'Laishah' rather than assimilated to the more familiar 'Laish.'
- source_word: עֲנִיָּה
  chosen: Poor
  alternatives:
  - Afflicted
  - Wretched
  lexicon: HALOT
  rationale: Adjective meaning poor, afflicted, or miserable. 'Poor' works idiomatically as an exclamation over the town's plight and avoids over-interpretation.
- source_word: עֲנָתוֹת
  chosen: Anathoth
  lexicon: HALOT
  rationale: 'Place-name, transliterated. In context it stands in apposition with ''Poor,'' yielding an exclamatory address: ''Poor Anathoth!'''
