id: ISA.10.32
reference: Isaiah 10:32
source:
  edition: WLC
  text: ע֥וֹד הַ/יּ֖וֹם בְּ/נֹ֣ב לַֽ/עֲמֹ֑ד יְנֹפֵ֤ף יָד/וֹ֙ הַ֣ר בית צִיּ֔וֹן גִּבְעַ֖ת יְרוּשָׁלִָֽם־׃ס
translation:
  text: Still this very day he will halt at Nob[a]; he will shake his hand at the mountain of the daughter of Zion[b], the hill of Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will wave/brandish his hand.' The Hebrew verb can denote a threatening gesture.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the mountain of the house of Zion.' Some translations smooth the phrase differently, but the supplied Hebrew text includes 'house.'
    reason: alternative_reading
lexical_decisions:
- source_word: ע֥וֹד
  chosen: Still
  alternatives:
  - Yet
  - Even now
  - Still yet
  lexicon: HALOT
  rationale: Here עוֹד functions adverbially to mark continuation or immediacy in the prophetic scene. 'Still' captures the sense that the action is not yet complete and is unfolding up to this point.
- source_word: הַיּוֹם
  chosen: this very day
  alternatives:
  - today
  - the day
  lexicon: HALOT
  rationale: 'With the article, הַיּוֹם is best taken deictically in context: ''this day/today.'' ''This very day'' brings out the vivid immediacy of the prophetic taunt without over-paraphrasing.'
- source_word: בְּנֹב
  chosen: at Nob
  alternatives:
  - in Nob
  lexicon: HALOT
  rationale: Nob is a place name and is transliterated. 'At Nob' fits the military-movement context slightly better than 'in Nob,' though either is possible.
- source_word: לַעֲמֹד
  chosen: will halt
  alternatives:
  - to stand
  - to stop
  - to take his stand
  lexicon: HALOT
  rationale: The infinitive of עמד after the locative phrase conveys stopping/standing at a place. In context of an advancing invader, 'will halt' is idiomatic and preserves the sense of pausing at Nob.
- source_word: יְנֹפֵף
  chosen: he will shake
  alternatives:
  - he will wave
  - he will brandish
  lexicon: HALOT
  rationale: נוף can denote waving or brandishing. Because the object is 'his hand' directed threateningly toward Zion/Jerusalem, 'shake' best conveys a hostile gesture in natural English.
- source_word: יָדוֹ
  chosen: his hand
  lexicon: HALOT
  rationale: Straightforward possessive construction. 'Hand' should be retained rather than generalized to 'fist' since the Hebrew does not specify that.
- source_word: הַר בֵּית צִיּוֹן
  chosen: the mountain of the house of Zion
  alternatives:
  - the mount of daughter Zion
  - Mount Zion
  - the mountain of Zion's house
  lexicon: HALOT
  rationale: The consonantal text reads הר בית ציון, literally 'mountain of the house of Zion.' Although some English versions smooth this toward 'mount/daughter Zion,' the given source text supports retaining 'house.' This preserves the wording of the Hebrew as supplied while remaining intelligible.
- source_word: גִּבְעַת יְרוּשָׁלִָם
  chosen: the hill of Jerusalem
  alternatives:
  - the hill of daughter Jerusalem
  - Jerusalem's hill
  lexicon: HALOT
  rationale: Construct chain rendered transparently. 'Hill of Jerusalem' parallels the preceding phrase and preserves the topographical imagery.
