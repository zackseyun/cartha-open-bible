id: ISA.21.16
reference: Isaiah 21:16
source:
  edition: WLC
  text: כִּי כֹ֛ה אָמַ֥ר אֲדֹנָ֖/י אֵלָ֑/י בְּ/ע֤וֹד שָׁנָה֙ כִּ/שְׁנֵ֣י שָׂכִ֔יר וְ/כָלָ֖ה כָּל כְּב֥וֹד קֵדָֽר־־׃
translation:
  text: 'For thus the Lord said to me: Within a year[a], like the years of a hired worker, all the glory of Kedar will come to an end.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the splendor/wealth of Kedar.' The Hebrew word can denote glory, honor, splendor, or material abundance.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the explanation or ground for the preceding statement; 'For' best preserves the connective force in context.
- source_word: כֹה
  chosen: thus
  alternatives:
  - this is what
  lexicon: HALOT
  rationale: A standard prophetic/declarative formula with אָמַר; 'thus' keeps the formal announcement style without unnecessary expansion.
- source_word: אָמַר
  chosen: said
  alternatives:
  - has said
  - spoke
  lexicon: HALOT
  rationale: Simple past fits the narrative report of divine speech.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: This is the divine title אֲדֹנָי, not the Tetragrammaton. Per doctrine, titles are translated; 'the Lord' is the natural English rendering here.
- source_word: אֵלַי
  chosen: to me
  lexicon: HALOT
  rationale: Direct object of the speech verb indicating Isaiah as recipient.
- source_word: בְּעוֹד שָׁנָה
  chosen: Within a year
  alternatives:
  - In yet a year
  - In one more year
  lexicon: HALOT
  rationale: The phrase denotes the time remaining until fulfillment. 'Within a year' is idiomatic modern English and preserves the temporal sense.
- source_word: כִּשְׁנֵי שָׂכִיר
  chosen: like the years of a hired worker
  alternatives:
  - according to the years of a hired laborer
  - as a hired worker counts the years
  lexicon: HALOT
  rationale: This idiom conveys a fixed, exact period, as in time carefully counted by a wage-earner. 'Like the years of a hired worker' preserves the simile while remaining readable.
- source_word: וְכָלָה
  chosen: will come to an end
  alternatives:
  - will be finished
  - will fail
  - will vanish
  lexicon: HALOT
  rationale: The verb כלה here indicates completion/exhaustion of Kedar's splendor. 'Will come to an end' communicates the result clearly in natural English.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: Retains the comprehensive scope of the judgment.
- source_word: כְּבוֹד
  chosen: glory
  alternatives:
  - splendor
  - wealth
  - honor
  lexicon: HALOT
  rationale: כָּבוֹד can denote honor, splendor, or abundance/wealth. 'Glory' is the broadest rendering and fits prophetic judgment language; the more specific economic nuance is worth preserving in a footnote.
- source_word: קֵדָר
  chosen: Kedar
  lexicon: HALOT
  rationale: Proper name of the Arabian tribal group/region; per philosophy, names are transliterated rather than translated.
