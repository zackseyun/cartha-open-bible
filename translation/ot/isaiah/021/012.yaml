id: ISA.21.12
reference: Isaiah 21:12
source:
  edition: WLC
  text: אָמַ֣ר שֹׁמֵ֔ר אָתָ֥ה בֹ֖קֶר וְ/גַם לָ֑יְלָה אִם תִּבְעָי֥וּ/ן בְּעָ֖יוּ שֻׁ֥בוּ
    אֵתָֽיוּ־־׃ס
translation:
  text: The watchman says, “Morning comes, and also night. If you would inquire, inquire;
    return, come.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Morning has come, and also night”; the Hebrew can be heard either as
      a general statement of arrival or as a more immediate announcement.
    reason: lexical_alternative
  - marker: b
    text: The final commands may also be understood as “turn back, come again,” suggesting
      either repentance or simply returning later to ask again; the Hebrew leaves
      the nuance open.
    reason: alternative_reading
lexical_decisions:
- source_word: שֹׁמֵר
  chosen: the watchman
  alternatives:
  - the guard
  - the keeper
  lexicon: HALOT
  rationale: As a substantive participle from שׁמר, it denotes one who keeps watch.
    'Watchman' fits the immediate oracle context and matches the role established
    in the surrounding passage.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: Although morphologically perfect, Hebrew narrative and prophetic speech
    often uses the perfect to introduce direct discourse. Present 'says' gives natural
    English in this quoted-response setting while preserving the force of the speech
    introduction.
- source_word: אָתָה
  chosen: comes
  alternatives:
  - has come
  - is coming
  lexicon: HALOT
  rationale: From אתה 'to come.' With בֹקֶר as subject, the sense is the arrival of
    morning. 'Comes' is idiomatic and concise in English.
- source_word: בֹקֶר
  chosen: morning
  alternatives:
  - dawn
  lexicon: HALOT
  rationale: The basic sense is 'morning.' 'Dawn' is possible, but 'morning' better
    preserves the lexical value without narrowing the time reference.
- source_word: וְגַם לָיְלָה
  chosen: and also night
  alternatives:
  - but also night
  - yet also night
  lexicon: HALOT
  rationale: The phrase juxtaposes relief and renewed darkness. 'And also night' preserves
    the Hebrew coordination without over-interpreting the adversative nuance, which
    readers can infer from context.
- source_word: אִם תִּבְעָיוּן
  chosen: if you would inquire
  alternatives:
  - if you will inquire
  - if you want to ask
  lexicon: HALOT
  rationale: The conditional plus imperfect addresses the inquirers directly. 'Would
    inquire' conveys volition and invitation in natural English without becoming too
    colloquial.
- source_word: בְּעָיוּ
  chosen: inquire
  alternatives:
  - ask
  - seek
  lexicon: HALOT
  rationale: The imperative repeats the same root as the previous verb for emphasis.
    Rendering both with 'inquire' preserves the rhetorical repetition.
- source_word: שֻׁבוּ
  chosen: return
  alternatives:
  - turn back
  - come back
  lexicon: HALOT
  rationale: שׁוב commonly means 'return/turn back.' 'Return' is compact and leaves
    open whether the sense is physical return or renewed approach.
- source_word: אֵתָיוּ
  chosen: come
  alternatives:
  - come again
  - approach
  lexicon: HALOT
  rationale: An imperative from אתה, likely functioning as a second command after
    'return.' 'Come' is the most direct rendering; the sequence 'return, come' preserves
    the terse Hebrew cadence and ambiguity.
