id: ISA.21.13
reference: Isaiah 21:13
source:
  edition: WLC
  text: מַשָּׂ֖א בַּ/עְרָ֑ב בַּ/יַּ֤עַר בַּ/עְרַב֙ תָּלִ֔ינוּ אֹֽרְח֖וֹת דְּדָנִֽים׃
translation:
  text: 'An oracle concerning Arabia: In the forest in Arabia you will spend the night[c][b][a], O caravans of Dedanites.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A burden concerning Arabia'; Hebrew מַשָּׂא can also be rendered 'burden' or 'pronouncement' in prophetic headings.
    reason: lexical_alternative
  - marker: b
    text: Or 'In the thicket in Arabia.' The Hebrew יַעַר normally means 'forest/woodland,' but in this setting it may refer to scrub or brush country.
    reason: cultural_note
  - marker: c
    text: Hebrew אֹרְחוֹת literally can mean 'paths/ways,' but here likely refers to traveling companies, that is, caravans.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשָּׂא
  chosen: An oracle
  alternatives:
  - A burden
  - A pronouncement
  lexicon: HALOT
  rationale: In prophetic headings מַשָּׂא commonly introduces a prophetic utterance or pronouncement. 'Oracle' is idiomatic modern English and preserves the superscription function better than the archaic-literal 'burden.'
- source_word: בַּעְרָב
  chosen: concerning Arabia
  alternatives:
  - in Arabia
  - against Arabia
  lexicon: HALOT
  rationale: 'With מַשָּׂא, the preposition is naturally taken as indicating the subject matter of the oracle: ''concerning Arabia.'' ''Against Arabia'' is possible in judgment contexts, but the preposition itself does not require hostility, and ''concerning'' is broader and closer to the Hebrew construction.'
- source_word: בַּיַּעַר
  chosen: In the forest
  alternatives:
  - In the thicket
  - In the scrubland
  lexicon: HALOT
  rationale: יַעַר normally means 'forest/woodland.' In the Arabian setting it may denote brush or thicket rather than dense forest, but 'forest' is the straightforward lexical rendering and keeps the imagery without over-interpreting the terrain.
- source_word: בַּעְרַב
  chosen: in Arabia
  alternatives:
  - in the desert plain
  - in the evening
  lexicon: HALOT
  rationale: Here the noun is best read again as 'Arabia,' matching the place-name in the heading and yielding the sense 'In the forest in Arabia.' Although the consonants can relate to 'evening,' the parallel with the heading and the ethnic reference to Dedanites favor the geographic sense.
- source_word: תָּלִינוּ
  chosen: you will spend the night
  alternatives:
  - you will lodge
  - you will stay overnight
  lexicon: HALOT
  rationale: From לין, 'to lodge/spend the night.' 'Spend the night' is natural modern English and preserves the temporal force.
- source_word: אֹרְחוֹת
  chosen: caravans
  alternatives:
  - traveling companies
  - ways/paths
  lexicon: HALOT
  rationale: Although the noun can denote 'paths/ways,' in context with a direct address and the following ethnic designation it refers metonymically to traveling groups or caravans. 'Caravans' best fits the Arabian trade-travel setting.
- source_word: דְּדָנִים
  chosen: of Dedanites
  alternatives:
  - of Dedan
  - O Dedanites
  lexicon: HALOT
  rationale: The form denotes the people associated with Dedan. Rendering it as 'Dedanites' makes the ethnic sense explicit. Combined with אֹרְחוֹת, the phrase is best taken as 'caravans of Dedanites,' with vocative force in context.
