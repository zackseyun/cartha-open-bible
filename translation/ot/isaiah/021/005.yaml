id: ISA.21.5
reference: Isaiah 21:5
source:
  edition: WLC
  text: עָרֹ֧ךְ הַ/שֻּׁלְחָ֛ן צָפֹ֥ה הַ/צָּפִ֖ית אָכ֣וֹל שָׁתֹ֑ה ק֥וּמוּ הַ/שָּׂרִ֖ים
    מִשְׁח֥וּ מָגֵֽן׃פ
translation:
  text: They set the table, they spread the rugs, they eat, they drink. Rise up, princes;
    oil the shield.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they watch the watchtower' / 'they set a watch.' The Hebrew in this
      clause is difficult; the main text follows the banquet-preparation sense that
      fits the surrounding sequence.
    reason: alternative_reading
  - marker: b
    text: Literally 'anoint the shield,' that is, prepare the shield for battle by
      oiling it.
    reason: cultural_note
lexical_decisions:
- source_word: עָרֹךְ
  chosen: they set
  alternatives:
  - set in order
  - arrange
  lexicon: HALOT
  rationale: Qal form from ערך commonly means to arrange or set in order. Here it
    introduces a rapid sequence of scene-setting actions, so 'they set' is concise
    and natural while preserving the concrete action.
- source_word: הַשֻּׁלְחָן
  chosen: the table
  lexicon: HALOT
  rationale: Straightforward noun meaning 'table.' Retained literally rather than
    generalized to 'feast' so the imagery remains vivid and concrete.
- source_word: צָפֹה
  chosen: they spread
  alternatives:
  - watch
  - look out
  - prepare
  lexicon: HALOT
  rationale: Although the consonants could suggest a root related to watching, in
    this collocation with הַצָּפִית the sense is best taken as preparing/spreading
    the covering or rug for a banquet setting. The parallel sequence of banquet actions
    supports this reading.
- source_word: הַצָּפִית
  chosen: the rugs
  alternatives:
  - the watch
  - the lookout
  - the covering
  lexicon: HALOT
  rationale: This rare noun is traditionally understood here as a spread, covering,
    or carpet associated with banquet preparation. 'Rugs' gives a clear modern English
    equivalent for the banquet scene. Because the term is difficult and alternatives
    exist, they are preserved in a footnote.
- source_word: אָכוֹל
  chosen: they eat
  alternatives:
  - eat
  lexicon: HALOT
  rationale: Infinitive absolute used vividly in sequence; in English a finite verb
    best conveys the ongoing scene. 'They eat' matches the narrative-like string of
    actions.
- source_word: שָׁתֹה
  chosen: they drink
  alternatives:
  - drink
  lexicon: HALOT
  rationale: Like אָכוֹל, this infinitive absolute functions vividly in the sequence.
    Rendering as 'they drink' gives idiomatic English while preserving the banquet
    imagery.
- source_word: קוּמוּ
  chosen: Rise up
  alternatives:
  - Arise
  - Get up
  lexicon: HALOT
  rationale: Imperative plural marking a sudden shift from description to urgent command.
    'Rise up' preserves the elevated tone and urgency.
- source_word: הַשָּׂרִים
  chosen: princes
  alternatives:
  - officials
  - leaders
  - captains
  lexicon: HALOT
  rationale: שׂרים often denotes princes, rulers, or officials. 'Princes' fits the
    courtly/royal setting and preserves the likely social rank in the oracle.
- source_word: מִשְׁחוּ
  chosen: oil
  alternatives:
  - anoint
  lexicon: HALOT
  rationale: The verb literally means 'anoint/smear with oil.' In context of preparing
    military equipment, 'oil' is more idiomatic and specific in English than 'anoint,'
    which could sound overly ceremonial.
- source_word: מָגֵן
  chosen: the shield
  alternatives:
  - shield
  lexicon: HALOT
  rationale: Likely a collective or representative singular for battle readiness.
    English idiom naturally uses 'the shield' in this command, preserving the concrete
    military image.
