id: ISA.21.15
reference: Isaiah 21:15
source:
  edition: WLC
  text: כִּֽי מִ/פְּנֵ֥י חֲרָב֖וֹת נָדָ֑דוּ מִ/פְּנֵ֣י חֶ֣רֶב נְטוּשָׁ֗ה וּ/מִ/פְּנֵי֙ קֶ֣שֶׁת דְּרוּכָ֔ה וּ/מִ/פְּנֵ֖י כֹּ֥בֶד מִלְחָמָֽה־׀׃ס
translation:
  text: For they have fled from swords[a], from the drawn sword, and from the bent bow[c][b], and from the weight of battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the unsheathed sword.' The Hebrew adjective can denote a sword stretched out or made ready for use.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the drawn/strung bow.' The Hebrew describes a bow prepared for shooting.
    reason: lexical_alternative
  - marker: c
    text: Or 'from the severity of war.' The Hebrew literally says 'the weight of battle/warfare.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding statement. 'For' preserves the explanatory force in concise English.
- source_word: מִפְּנֵי
  chosen: from
  alternatives:
  - from before
  - because of
  lexicon: HALOT
  rationale: Repeated four times to express movement away in fear or avoidance. 'From' is the most natural English rendering here while preserving the causal-spatial sense.
- source_word: חֲרָבוֹת
  chosen: swords
  alternatives:
  - blades
  lexicon: HALOT
  rationale: Plural of 'sword'; rendered straightforwardly as 'swords.' The plural likely gives a general sense of armed threat.
- source_word: נָדָדוּ
  chosen: have fled
  alternatives:
  - have wandered
  - have fled away
  lexicon: HALOT
  rationale: In this military-danger context the verb denotes flight or retreat rather than aimless wandering. Present perfect English fits the prophetic description of completed action.
- source_word: חֶרֶב
  chosen: sword
  alternatives:
  - blade
  lexicon: HALOT
  rationale: Standard rendering for the singular noun.
- source_word: נְטוּשָׁה
  chosen: drawn
  alternatives:
  - unsheathed
  - stretched out
  lexicon: HALOT
  rationale: Describes the sword as extended/brandished. 'Drawn' is idiomatic in English for a sword made ready for use; 'unsheathed' is possible but less natural in the sequence.
- source_word: קֶשֶׁת
  chosen: bow
  lexicon: HALOT
  rationale: Standard rendering of the weapon term.
- source_word: דְּרוּכָה
  chosen: bent
  alternatives:
  - drawn
  - strung
  lexicon: HALOT
  rationale: The participial/adjectival form depicts a bow made ready for shooting. 'Bent' preserves the physical image and avoids confusion with the previous 'drawn sword.'
- source_word: כֹּבֶד
  chosen: weight
  alternatives:
  - heaviness
  - burden
  - severity
  lexicon: HALOT
  rationale: Literally 'weight/heaviness.' In context it refers to the oppressive intensity of warfare. 'Weight of battle' keeps the metaphor while remaining intelligible.
- source_word: מִלְחָמָה
  chosen: battle
  alternatives:
  - war
  - warfare
  lexicon: HALOT
  rationale: Rendered 'battle' to fit the immediate scene of armed conflict and to pair naturally with 'weight.' 'War' or 'warfare' are possible, but 'battle' is more vivid and local to the verse.
