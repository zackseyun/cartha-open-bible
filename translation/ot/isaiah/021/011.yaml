theological_decisions:
- issue: Identity of דּוּמָה
  chosen_reading: Proper name 'Dumah' in the main text
  alternative_readings:
  - common noun nuance 'silence'
  - an indirect reference to Edom
  rationale: The superscription format favors a place/people name, and the following
    mention of Seir points toward the Edomite setting. Transliteration avoids prematurely
    resolving the historical identification while preserving the Hebrew form. The
    lexical/thematic link to 'silence' is preserved in a footnote rather than imported
    into the translation.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names;
    preserve tension rather than resolve it.'
