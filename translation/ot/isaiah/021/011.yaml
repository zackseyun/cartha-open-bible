id: ISA.21.11
reference: Isaiah 21:11
source:
  edition: WLC
  text: מַשָּׂ֖א דּוּמָ֑ה אֵלַ/י֙ קֹרֵ֣א מִ/שֵּׂעִ֔יר שֹׁמֵר֙ מַה מִ/לַּ֔יְלָה שֹׁמֵ֖ר
    מַה מִ/לֵּֽיל־־׃
translation:
  text: 'An oracle concerning Dumah: One calls to me from Seir, “Watchman, what of
    the night? Watchman, what of the night?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Dumah may also echo the Hebrew word for “silence,” and some interpreters
      connect it with Edom because the next line mentions Seir.
    reason: lexical_alternative
  - marker: b
    text: Or “How far gone is the night?” The Hebrew idiom asks about the state or
      progress of the night.
    reason: alternative_reading
lexical_decisions:
- source_word: מַשָּׂא
  chosen: oracle
  alternatives:
  - burden
  - pronouncement
  lexicon: HALOT
  rationale: In prophetic headings מַשָּׂא commonly introduces a prophetic utterance
    or pronouncement. 'Oracle' is established, readable modern English and avoids
    the misleadingly concrete sense of 'burden' while preserving the formal heading
    style.
- source_word: דּוּמָה
  chosen: Dumah
  alternatives:
  - silence
  lexicon: HALOT
  rationale: Treated here as a proper name in the superscription, likely the place/people
    addressed in the oracle. Per translation philosophy, names are transliterated.
    The lexical association with 'silence' is not brought into the main text but is
    worth preserving as an alternative nuance.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Straightforward preposition plus 1cs suffix. 'To me' is natural modern
    English.
- source_word: קֹרֵא
  chosen: One calls
  alternatives:
  - someone calls
  - he calls
  lexicon: HALOT
  rationale: The Hebrew participle is singular masculine with no explicit subject.
    'One calls' preserves the indefinite sense without over-specifying the speaker.
- source_word: מִשֵּׂעִיר
  chosen: from Seir
  lexicon: HALOT
  rationale: Proper place name, conventionally transliterated. The preposition indicates
    the call comes from Seir/Edom.
- source_word: שֹׁמֵר
  chosen: Watchman
  alternatives:
  - guard
  - keeper
  lexicon: HALOT
  rationale: In context this is a vocative address to the one keeping watch. 'Watchman'
    best fits the night-watch imagery and preserves the repeated rhetorical call.
- source_word: מַה מִלַּיְלָה
  chosen: what of the night?
  alternatives:
  - how far gone is the night?
  - what time of the night?
  lexicon: HALOT
  rationale: This idiom asks about the state or progress of the night rather than
    merely naming it. 'What of the night?' is concise, traditional enough to preserve
    the poetic force, and understandable in context.
- source_word: מַה מִלֵּיל
  chosen: what of the night?
  alternatives:
  - how far gone is the night?
  lexicon: HALOT
  rationale: A poetic variation of the previous phrase using a shorter form for 'night.'
    Rendering both identically in English preserves the rhetorical repetition, while
    the lexical variation is noted here rather than forced awkwardly into the main
    text.
