theological_decisions:
- issue: Degree of interpretation in the superscription/geographical phrase
  chosen_reading: Retain the poetic phrase 'the wilderness of the sea' rather than
    resolving it to a specific nation in the main text.
  alternative_readings:
  - the desert by the sea as an interpreted geographical label, often linked with
    Babylon
  rationale: The verse itself presents an enigmatic heading. Optimal equivalence and
    the instruction not to import claims beyond the text favor preserving the Hebrew
    imagery in the main text, while allowing interpretive identification to remain
    outside the translation.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
