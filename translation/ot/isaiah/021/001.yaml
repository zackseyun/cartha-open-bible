id: ISA.21.1
reference: Isaiah 21:1
source:
  edition: WLC
  text: מַשָּׂ֖א מִדְבַּר יָ֑ם כְּ/סוּפ֤וֹת בַּ/נֶּ֨גֶב֙ לַֽ/חֲלֹ֔ף מִ/מִּדְבָּ֣ר
    בָּ֔א מֵ/אֶ֖רֶץ נוֹרָאָֽה־׃
translation:
  text: 'An oracle concerning the wilderness of the sea: like whirlwinds in the Negev
    sweeping through, it comes from the wilderness, from a fearful land.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the desert by the sea.' The Hebrew phrase is unusual and may function
      as a poetic geographical designation.
    reason: lexical_alternative
  - marker: b
    text: Or 'like storms in the south passing through.' 'Negev' can mean the southern
      region or simply 'south.'
    reason: lexical_alternative
  - marker: c
    text: The subject of 'comes' is implicit in Hebrew and may refer to the storm-like
      force just described.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשָּׂא
  chosen: oracle
  alternatives:
  - burden
  - pronouncement
  lexicon: HALOT
  rationale: In prophetic headings מַשָּׂא commonly introduces a prophetic utterance
    of judgment or announcement. 'Oracle' is idiomatic modern English and avoids the
    misleadingly physical sense of 'burden' while preserving the superscriptional
    force.
- source_word: מִדְבַּר יָם
  chosen: the wilderness of the sea
  alternatives:
  - the desert by the sea
  - the sea-desert
  lexicon: HALOT
  rationale: A construct chain is best preserved here. Although likely a poetic/geographical
    designation, the Hebrew wording is striking and should remain visible in translation
    rather than being overly interpreted. 'Wilderness of the sea' keeps the metaphor/toponymic
    ambiguity.
- source_word: כְּסוּפוֹת
  chosen: like whirlwinds
  alternatives:
  - like storms
  - like tempests
  lexicon: HALOT
  rationale: סוּפוֹת denotes violent stormwinds; 'whirlwinds' captures the force and
    suits the simile. 'Storms' is possible but less vivid.
- source_word: בַּנֶּגֶב
  chosen: in the Negev
  alternatives:
  - in the south
  - through the south
  lexicon: HALOT
  rationale: נֶגֶב can mean 'southland/south,' but here it likely evokes the southern
    desert region known for such storms. 'Negev' preserves the geographical color
    and avoids flattening the image to a mere compass direction.
- source_word: לַחֲלֹף
  chosen: sweeping through
  alternatives:
  - passing through
  - to pass through
  lexicon: HALOT
  rationale: The infinitive conveys movement through a region. 'Sweeping through'
    fits the storm comparison and yields natural English while preserving the sense
    of rapid passage.
- source_word: מִמִּדְבָּר בָּא
  chosen: it comes from the wilderness
  alternatives:
  - one comes from the wilderness
  - he comes from the wilderness
  lexicon: HALOT
  rationale: The Hebrew has a singular verb without an explicit subject. In context,
    the most natural English subject is the storm-like phenomenon/oracle force just
    described, so 'it comes' avoids overpersonalizing an ambiguous subject.
- source_word: מֵאֶרֶץ נוֹרָאָה
  chosen: from a fearful land
  alternatives:
  - from a terrible land
  - from a dreadful land
  lexicon: HALOT
  rationale: נוֹרָאָה denotes something fearsome or awe-inspiring in a negative sense
    here. 'Fearful land' is concise and preserves the emotional force without overinterpreting
    the exact nature of the terror.
