- issue: Rendering of the divine title אֲדֹנָי
  chosen_reading: the Lord
  alternative_readings:
  - Lord
  - my Lord
  rationale: The source uses the title אֲדֹנָי rather than YHWH. Following the project's
    principle to translate titles, 'the Lord' best conveys the divine title in natural
    English without confusing it with the covenant name rendered 'the LORD.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table distinguishes YHWH as ''the LORD''.'
