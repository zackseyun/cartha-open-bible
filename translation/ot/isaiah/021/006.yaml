id: ISA.21.6
reference: Isaiah 21:6
source:
  edition: WLC
  text: כִּ֣י כֹ֥ה אָמַ֛ר אֵלַ֖/י אֲדֹנָ֑/י לֵ֚ךְ הַעֲמֵ֣ד הַֽ/מְצַפֶּ֔ה אֲשֶׁ֥ר יִרְאֶ֖ה
    יַגִּֽיד׃
translation:
  text: 'For thus the Lord said to me: “Go, station the watchman; let him report what
    he sees.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''station the watchman; what he sees, let him report.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces an explanation or grounding for the preceding oracle context.
    'For' fits the discourse flow in English better than the more wooden 'indeed'
    or the more causally narrow 'because'.
- source_word: כֹה
  chosen: thus
  alternatives:
  - this
  - in this way
  lexicon: HALOT
  rationale: Idiomatic prophetic speech formula כֹה אָמַר is best rendered 'thus said'
    / 'thus says.' Here with the perfect אָמַר in narrative frame, 'thus ... said'
    is natural English.
- source_word: אָמַר
  chosen: said
  alternatives:
  - has said
  - spoke
  lexicon: HALOT
  rationale: Qal perfect 3ms in narrative context is most naturally rendered as simple
    past, 'said.'
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Direct object of speech; standard modern English is 'to me.'
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  - my Lord
  lexicon: HALOT
  rationale: This is the divine title אֲדֹנָי, not the Tetragrammaton. English convention
    and sense favor 'the Lord' here. 'My Lord' would over-press the 1cs pronominal
    form as possessive in a way not idiomatic for this divine title in context.
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Go on
  - Come, go
  lexicon: HALOT
  rationale: Straightforward imperative opening the commission.
- source_word: הַעֲמֵד
  chosen: station
  alternatives:
  - set
  - post
  - appoint
  lexicon: HALOT
  rationale: Hiphil imperative of עמד here means to cause someone to stand in position,
    especially as a lookout. 'Station' captures the causative force and military/watch
    context better than the more generic 'set' or 'appoint.'
- source_word: הַמְצַפֶּה
  chosen: the watchman
  alternatives:
  - the lookout
  - the one watching
  lexicon: HALOT
  rationale: Substantival participle from צפה denotes one who keeps watch. 'Watchman'
    is the most idiomatic and contextually precise English rendering.
- source_word: אֲשֶׁר יִרְאֶה
  chosen: what he sees
  alternatives:
  - whatever he sees
  - that which he sees
  lexicon: HALOT
  rationale: The relative clause functions as the content to be reported. English
    idiom prefers 'what he sees' over the more formal 'that which he sees.'
- source_word: יַגִּיד
  chosen: let him report
  alternatives:
  - let him declare
  - let him tell
  - he shall report
  lexicon: HALOT
  rationale: 'Hiphil imperfect of נגד after an imperative is naturally jussive in
    force: the watchman is to make known what he sees. ''Let him report'' captures
    the instruction clearly and idiomatically; ''declare'' is possible but sounds
    more elevated than the context requires.'
