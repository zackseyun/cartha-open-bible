id: ISA.21.7
reference: Isaiah 21:7
source:
  edition: WLC
  text: וְ/רָ֣אָה רֶ֗כֶב צֶ֚מֶד פָּֽרָשִׁ֔ים רֶ֥כֶב חֲמ֖וֹר רֶ֣כֶב גָּמָ֑ל וְ/הִקְשִׁ֥יב קֶ֖שֶׁב רַב קָֽשֶׁב־׃
translation:
  text: And he saw riders, pairs of horsemen[a], riders on donkeys, riders on camels; and he listened intently, with great attentiveness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'attention, great attention' or 'he listened, much listening,' an emphatic repetition stressing careful listening.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  chosen: And he saw
  alternatives:
  - Then he saw
  - When he saw
  lexicon: HALOT
  rationale: Qal perfect 3ms with prefixed conjunction. In this prophetic/reporting sequence, simple past narrative English is the most natural rendering. 'And' preserves the Hebrew coordination without overinterpreting temporal force.
- source_word: רֶכֶב
  chosen: riders
  alternatives:
  - chariot
  - chariotry
  - mounted troop
  lexicon: HALOT
  rationale: Although רכב often denotes 'chariot' or 'chariotry,' here the following appositional phrases ('pair of horsemen,' 'donkey,' 'camel') indicate mounted units rather than a literal wheeled vehicle. 'Riders' best captures the collective military sense in readable English.
- source_word: צֶמֶד פָּרָשִׁים
  chosen: pairs of horsemen
  alternatives:
  - a pair of horsemen
  - horsemen in pairs
  - a troop of horsemen
  lexicon: HALOT
  rationale: צֶמֶד denotes a pair/yoke; פָּרָשִׁים are horsemen. The plural sense is preserved by 'pairs of horsemen,' matching the likely collective force after רכב.
- source_word: רֶכֶב חֲמוֹר
  chosen: riders on donkeys
  alternatives:
  - a donkey rider
  - donkey cavalry
  - a troop of donkeys
  lexicon: HALOT
  rationale: Construct phrase literally 'riding/vehicle of donkey.' In context with horsemen and camels, it refers to mounted messengers or troops using donkeys. 'Riders on donkeys' is clearer than a wooden literalism.
- source_word: רֶכֶב גָּמָל
  chosen: riders on camels
  alternatives:
  - camel riders
  - camel cavalry
  lexicon: HALOT
  rationale: Parallel to the previous phrase; the collective military/transport sense is best conveyed by 'riders on camels.'
- source_word: וְהִקְשִׁיב
  chosen: and he listened intently
  alternatives:
  - and he paid close attention
  - and he listened carefully
  lexicon: HALOT
  rationale: Hiphil of קשׁב conveys active, focused listening. 'Listened intently' preserves the verbal force and fits the heightened watchman context.
- source_word: קֶשֶׁב רַב קָשֶׁב
  chosen: with great attentiveness
  alternatives:
  - very attentively
  - with much attention
  - carefully, very carefully
  lexicon: HALOT
  rationale: The repeated noun with רַב intensifies the action. Rather than reproduce awkward repetition woodenly, 'with great attentiveness' communicates the emphatic Hebrew in natural English. The alternative more literal sense is worth preserving in a footnote.
