id: ISA.26.6
reference: Isaiah 26:6
source:
  edition: WLC
  text: תִּרְמְסֶ֖/נָּה רָ֑גֶל רַגְלֵ֥י עָנִ֖י פַּעֲמֵ֥י דַלִּֽים׃
translation:
  text: The foot tramples it— the feet of the poor[b][a], the steps of the needy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will trample it down.' The Hebrew verb may be understood with future force in context.
    reason: lexical_alternative
  - marker: b
    text: '''The weak'' may also be rendered ''the needy'' or ''the lowly.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּרְמְסֶנָּה
  chosen: tramples it
  alternatives:
  - will trample it
  - treads it down
  lexicon: HALOT
  rationale: From רמס, 'to trample, tread down.' The 3fs form with 3fs suffix refers back to the feminine antecedent in context (the lofty city, v. 5), so English supplies 'it.' Present tense is used for vivid poetic force; future is possible but less natural in English here.
- source_word: רָגֶל
  chosen: the foot
  alternatives:
  - a foot
  lexicon: HALOT
  rationale: Singular noun used collectively/poetically before the appositional expansion that follows. 'The foot' preserves the Hebrew singular and the vivid image.
- source_word: רַגְלֵי
  chosen: the feet of
  alternatives:
  - the feet belonging to
  lexicon: HALOT
  rationale: Construct plural of 'foot,' introducing the possessors of the trampling. Rendering as 'the feet of' is the natural English equivalent.
- source_word: עָנִי
  chosen: the poor
  alternatives:
  - the afflicted
  - the humble
  lexicon: HALOT
  rationale: עָנִי commonly denotes one who is poor, afflicted, or oppressed. In this context of reversal and humiliation of the lofty city, 'the poor' best captures the socioeconomic and oppressed sense in accessible English.
- source_word: פַּעֲמֵי
  chosen: the steps of
  alternatives:
  - the footsteps of
  lexicon: HALOT
  rationale: Literally 'steps/footsteps.' 'The steps of' gives a natural parallel to 'the feet of' while preserving the poetic synonymous structure.
- source_word: דַלִּים
  chosen: the weak
  alternatives:
  - the needy
  - the lowly
  - the poor
  lexicon: HALOT
  rationale: דַל often denotes one who is weak, lowly, or poor. Since עָנִי has already been rendered 'poor,' 'weak' preserves the semantic distinction and the parallelism without flattening both terms into the same English gloss.
