theological_decisions:
- issue: Rendering of קֹסֵם in a prophetic denunciation context
  chosen_reading: the diviner
  alternative_readings:
  - the soothsayer
  - the fortune-teller
  rationale: The verse lists categories of leaders/supports that the Lord will remove
    from Jerusalem and Judah. Translating the term straightforwardly preserves the
    text's descriptive force without implying divine approval. No doctrinally driven
    softening is warranted.
