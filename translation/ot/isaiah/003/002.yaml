id: ISA.3.2
reference: Isaiah 3:2
source:
  edition: WLC
  text: גִּבּ֖וֹר וְ/אִ֣ישׁ מִלְחָמָ֑ה שׁוֹפֵ֥ט וְ/נָבִ֖יא וְ/קֹסֵ֥ם וְ/זָקֵֽן׃
translation:
  text: the mighty man and the man of war, the judge and the prophet, the diviner
    and the elder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the soothsayer.' The Hebrew term refers to one who practices divination.
    reason: lexical_alternative
lexical_decisions:
- source_word: גִּבּוֹר
  chosen: the mighty man
  alternatives:
  - the mighty one
  - the warrior
  - the hero
  lexicon: HALOT
  rationale: In this list of social leaders being removed (continuing from v. 1),
    גִּבּוֹר denotes a strong or valiant man. 'The mighty man' preserves the masculine
    singular form and the representative social role better than the more interpretive
    'warrior,' especially since the next phrase explicitly covers military function.
- source_word: אִישׁ מִלְחָמָה
  chosen: the man of war
  alternatives:
  - the warrior
  - the soldier
  lexicon: HALOT
  rationale: A fairly literal rendering best preserves the Hebrew idiom while remaining
    intelligible in English. 'Warrior' is possible, but 'man of war' keeps the distinct
    wording from גִּבּוֹר and reflects the gender-accurate policy where the source
    is masculine.
- source_word: שׁוֹפֵט
  chosen: the judge
  alternatives:
  - the ruler
  lexicon: HALOT
  rationale: The participial/noun form here denotes one who judges in a civic or legal
    sense. 'Judge' is the most direct and contextually appropriate rendering in a
    list of societal offices.
- source_word: נָבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Standard rendering for the recognized office of one who speaks prophetically.
    No contextual pressure suggests variation.
- source_word: קֹסֵם
  chosen: the diviner
  alternatives:
  - the soothsayer
  - the fortune-teller
  lexicon: HALOT
  rationale: The term refers to one who practices divination. 'Diviner' is precise,
    readable, and avoids the overly colloquial tone of 'fortune-teller.' Although
    divination is illicit in the Torah, Isaiah's point here is descriptive of social
    figures present in Judah, not approving.
- source_word: זָקֵן
  chosen: the elder
  alternatives:
  - the old man
  lexicon: HALOT
  rationale: In this context of public leadership roles, 'elder' better captures the
    social office/status than merely age. 'Old man' would flatten the institutional
    nuance of the term in many Hebrew contexts.
- source_word: וְ
  chosen: and
  alternatives:
  - ','
  - asyndetic list in English
  rationale: The repeated conjunction structures a formal catalog. English smooths
    the sequence with commas while retaining 'and' at natural points, preserving the
    list-like cadence without wooden repetition.
