id: ISA.3.10
reference: Isaiah 3:10
source:
  edition: WLC
  text: אִמְר֥וּ צַדִּ֖יק כִּי ט֑וֹב כִּֽי פְרִ֥י מַעַלְלֵי/הֶ֖ם יֹאכֵֽלוּ־־׃
translation:
  text: Say of the righteous that it will be well[a], for they will eat the fruit of their deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Say of the righteous one that it is good, for they/he will eat the fruit of their/his deeds.' The Hebrew shifts from a representative singular ('righteous') to plural forms in the final clause.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִמְרוּ
  chosen: Say
  alternatives:
  - Tell
  - Declare
  lexicon: HALOT
  rationale: Imperative plural of אמר, a direct command to speak or announce. 'Say' is the most straightforward English equivalent and preserves the terseness of the Hebrew.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - the righteous one
  - the just
  lexicon: HALOT
  rationale: Adjective used substantivally. 'The righteous' works naturally in English as a representative singular/class term. It preserves the moral-ethical sense without sounding archaic like 'the just.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: 'The first כִּי introduces the content of what is to be said: ''Say ... that ...''. Rendering it as ''that'' best reflects its syntactic function here.'
- source_word: טוֹב
  chosen: it will be well
  alternatives:
  - it is good
  - good
  lexicon: HALOT
  rationale: Though literally 'good,' the idiomatic sense in context is that things will go well for the righteous. 'It will be well' communicates the sense clearly in natural English and fits the following causal clause.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: The second כִּי is causal, explaining why it will be well for the righteous. 'For' preserves the explanatory connection succinctly.
- source_word: פְרִי
  chosen: the fruit
  alternatives:
  - fruit
  - produce
  - result
  lexicon: HALOT
  rationale: '''Fruit'' is the standard literal rendering and works metaphorically in English for outcome or recompense.'
- source_word: מַעַלְלֵיהֶם
  chosen: their deeds
  alternatives:
  - their actions
  - their practices
  lexicon: HALOT
  rationale: Refers to acts or doings. 'Deeds' is concise, morally weighted, and idiomatic with 'fruit' in English.
- source_word: יֹאכֵלוּ
  chosen: they will eat
  alternatives:
  - they will enjoy
  - they will consume
  lexicon: HALOT
  rationale: Literal future plural of אכל. 'They will eat' preserves the agricultural/recompense metaphor rather than flattening it into an interpretive paraphrase.
