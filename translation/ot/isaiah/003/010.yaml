theological_decisions:
- issue: Representative singular and number shift
  chosen_reading: Render צַדִּיק as a representative class term ('the righteous') and retain plural pronouns/verb in the final clause ('they will eat').
  alternative_readings:
  - 'Render singular throughout: ''Say of the righteous one that it shall be well with him, for he shall eat the fruit of his deeds.'''
  rationale: The Hebrew begins with a substantival singular adjective but concludes with a plural verb and suffixes. English can naturally represent the class sense with 'the righteous' and then follow the Hebrew's plural outcome clause. This avoids forcing an artificial singular and preserves the text's collective application.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral) and §5 (consistency/documented exception).
