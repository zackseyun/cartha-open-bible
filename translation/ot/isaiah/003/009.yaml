theological_decisions:
- issue: Meaning of נֶפֶשׁ in לְנַפְשָׁם
  chosen_reading: reflexive 'themselves'/'their own selves' rather than a narrowly
    immaterial 'soul'
  alternative_readings:
  - their soul
  - their life
  rationale: The Hebrew נפש often denotes the person or self, not only the immaterial
    soul. In this judgment context, the prophet announces woe upon the people themselves.
    Rendering it reflexively avoids importing a more technical anthropology than the
    text states.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of the final clause
  chosen_reading: self-incurred judgment/consequence
  alternative_readings:
  - divine retribution stated more explicitly
  - mere social consequence
  rationale: The Hebrew says they have dealt evil to themselves; it does not explicitly
    spell out the mechanism here. The translation preserves the text's statement that
    their evil rebounds upon them without overdefining the theological process.
  doctrine_reference: Translation philosophy §3
