id: ISA.3.9
reference: Isaiah 3:9
source:
  edition: WLC
  text: הַכָּרַ֤ת פְּנֵי/הֶם֙ עָ֣נְתָה בָּ֔/ם וְ/חַטָּאתָ֛/ם כִּ/סְדֹ֥ם הִגִּ֖ידוּ
    לֹ֣א כִחֵ֑דוּ א֣וֹי לְ/נַפְשָׁ֔/ם כִּֽי גָמְל֥וּ לָ/הֶ֖ם רָעָֽה־׃
translation:
  text: The look on their faces testifies against them, and they proclaim their sin
    like Sodom; they do not hide it. Woe to themselves, for they have brought evil
    on themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The expression of their faces bears witness against them.' The Hebrew
      may refer to their visible countenance or expression as evidence of guilt.
    reason: lexical_alternative
  - marker: b
    text: '''Like Sodom'' evokes shameless, public wickedness; compare Genesis 13:13;
      19:5.'
    reason: cross_reference
  - marker: c
    text: Or 'Woe to their soul' or 'Woe to them.' Hebrew nephesh often means 'self,'
      'life,' or 'person,' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכָּרַת פְּנֵיהֶם
  chosen: The look on their faces
  alternatives:
  - The expression of their faces
  - The appearance of their faces
  - The partiality of their faces
  lexicon: HALOT
  rationale: הַכָּרַת from נכר in this nominal form likely refers to what is recognizable
    in their face/expression. 'The look on their faces' is idiomatic modern English
    and fits the following verb 'testifies against them.' 'Partiality' is possible
    in some contexts for נכר פנים, but here the sense of visible expression/countenance
    better suits the immediate context of public shamelessness.
- source_word: עָנְתָה בָּם
  chosen: testifies against them
  alternatives:
  - answers against them
  - bears witness against them
  lexicon: HALOT
  rationale: ענה with ב can carry the sense of responding or testifying against someone.
    In context, their facial expression functions as evidence against them. 'Testifies
    against them' communicates the forensic nuance clearly in natural English.
- source_word: וְחַטָּאתָם
  chosen: and they proclaim their sin
  alternatives:
  - and their sin
  - and their sinfulness
  lexicon: HALOT
  rationale: The noun 'their sin' is the object of the following verb הִגִּידוּ. English
    requires the verbal relationship to be made explicit for clarity, so the clause
    is rendered 'and they proclaim their sin.' Singular 'sin' preserves the Hebrew
    collective singular.
- source_word: כִּסְדֹם
  chosen: like Sodom
  alternatives:
  - as in Sodom
  - like the people of Sodom
  lexicon: HALOT
  rationale: The comparison is direct and allusive. 'Like Sodom' preserves the terseness
    and evokes the biblical paradigm of notorious, shameless wickedness without overexpanding
    the text.
- source_word: הִגִּידוּ
  chosen: they proclaim
  alternatives:
  - they declare
  - they announce
  - they tell
  lexicon: HALOT
  rationale: נגד in Hiphil means to tell, declare, make known. 'Proclaim' fits the
    public, unabashed force in context better than the flatter 'tell.'
- source_word: לֹא כִחֵדוּ
  chosen: they do not hide it
  alternatives:
  - they do not conceal it
  - they have not hidden it
  lexicon: HALOT
  rationale: כחד means to hide or conceal. 'Hide it' is concise, natural, and captures
    the shameless openness of the accusation.
- source_word: אוֹי לְנַפְשָׁם
  chosen: Woe to themselves
  alternatives:
  - Woe to their soul
  - Woe to them
  lexicon: HALOT
  rationale: נפש here refers reflexively to their own selves/lives rather than introducing
    a technical anthropology. 'Woe to themselves' preserves the reflexive force and
    avoids suggesting a narrower 'soul' concept than the Hebrew requires.
- source_word: כִּי גָמְלוּ לָהֶם רָעָה
  chosen: for they have brought evil on themselves
  alternatives:
  - for they have repaid themselves with evil
  - for they have dealt out evil to themselves
  - for they have done evil to themselves
  lexicon: HALOT
  rationale: גמל can mean deal with, repay, requite. Here the sense is that their
    actions have resulted in their own harm. 'Brought evil on themselves' communicates
    the reflexive consequence clearly in contemporary English while preserving the
    moral weight of רָעָה as 'evil,' not merely 'harm.'
