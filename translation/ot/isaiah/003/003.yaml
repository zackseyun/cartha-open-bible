id: ISA.3.3
reference: Isaiah 3:3
source:
  edition: WLC
  text: שַׂר חֲמִשִּׁ֖ים וּ/נְשׂ֣וּא פָנִ֑ים וְ/יוֹעֵ֛ץ וַ/חֲכַ֥ם חֲרָשִׁ֖ים וּ/נְב֥וֹן
    לָֽחַשׁ־׃
translation:
  text: the captain of fifty, and the man of rank, and the counselor, and the skillful
    craftsman, and the expert enchanter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the skillful charmer.' The Hebrew phrase literally refers to one discerning
      or expert in whispering/incantation.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׂר חֲמִשִּׁים
  chosen: the captain of fifty
  alternatives:
  - the commander of fifty
  - the officer of fifty
  lexicon: HALOT
  rationale: שַׂר denotes a ruler, chief, or officer; with חֲמִשִּׁים it refers to
    a military or administrative officer over fifty men. 'Captain of fifty' is a natural,
    established English rendering that preserves the numeric construction without
    over-paraphrase.
- source_word: נְשׂוּא פָנִים
  chosen: the man of rank
  alternatives:
  - the honorable man
  - the one lifted up in face
  - the dignitary
  lexicon: HALOT
  rationale: Literally 'lifted of face,' an idiom for one shown honor or holding elevated
    social standing. 'Man of rank' communicates status clearly in modern English while
    preserving the personal reference better than the more abstract 'dignitary.'
- source_word: יוֹעֵץ
  chosen: the counselor
  alternatives:
  - the adviser
  lexicon: HALOT
  rationale: The participial form denotes one who gives counsel. 'Counselor' is the
    most direct and idiomatic rendering in this list of social leaders.
- source_word: חֲכַם חֲרָשִׁים
  chosen: the skillful craftsman
  alternatives:
  - the wise artisan
  - the expert among craftsmen
  lexicon: HALOT
  rationale: חכם means wise/skillful, and חרשים refers to craftsmen/artisans. In context
    the phrase points to technical skill rather than abstract wisdom. Singular English
    is used to match the series of representative roles.
- source_word: נְבוֹן לָחַשׁ
  chosen: the expert enchanter
  alternatives:
  - the skillful charmer
  - the one discerning in whispering spells
  lexicon: HALOT
  rationale: נבון conveys discernment or expertise; לחש can denote whispering, incantation,
    or charm-spell. In this catalog of societal figures, the phrase most naturally
    refers to one skilled in incantations. 'Expert enchanter' is concise and intelligible,
    while preserving the likely occult/ritual sense.
