theological_decisions:
- issue: Rendering of a term associated with magical practice
  chosen_reading: the expert enchanter
  alternative_readings:
  - the skillful charmer
  rationale: The Hebrew likely refers to one skilled in incantations or whispered
    charms. The translation preserves the text's plain sense without softening it
    into merely rhetorical persuasion or importing approval/disapproval beyond the
    context of judgment on Judah's leadership structures.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
