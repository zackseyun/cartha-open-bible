id: ISA.3.23
reference: Isaiah 3:23
source:
  edition: WLC
  text: וְ/הַ/גִּלְיֹנִים֙ וְ/הַ/סְּדִינִ֔ים וְ/הַ/צְּנִיפ֖וֹת וְ/הָ/רְדִידִֽים׃
translation:
  text: and the mirrors[a], and the linen garments, and the turbans[b], and the veils.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tablets' for 'mirrors'; the Hebrew term may refer more broadly to smooth polished objects, but in this context 'mirrors' best fits the list of luxury adornments.
    reason: lexical_alternative
  - marker: b
    text: Or 'shawls' or 'wraps' for 'veils.' The exact form of the garment is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: גִּלְיֹנִים
  chosen: mirrors
  alternatives:
  - tablets
  - polished metal mirrors
  lexicon: HALOT, BDB
  rationale: The noun likely denotes smooth, polished objects used as mirrors, fitting the context of women's luxury items in Isaiah 3. 'Mirrors' is the clearest modern English rendering. 'Tablets' is possible etymologically from the idea of a smooth sheet, but is less contextually persuasive here.
- source_word: סְּדִינִים
  chosen: linen garments
  alternatives:
  - linen wraps
  - undergarments
  - fine linen robes
  lexicon: HALOT, BDB
  rationale: The term refers to garments made of fine linen. 'Linen garments' preserves the material sense without over-specifying the exact cut or use. More specific options such as 'undergarments' or 'robes' go beyond what the Hebrew securely indicates.
- source_word: צְּנִיפוֹת
  chosen: turbans
  alternatives:
  - headdresses
  - headwraps
  lexicon: HALOT, BDB
  rationale: This word denotes something wrapped around the head. 'Turbans' is a standard and sufficiently precise English equivalent, though 'headdresses' or 'headwraps' are possible broader renderings.
- source_word: רְדִידִים
  chosen: veils
  alternatives:
  - shawls
  - mantles
  - wraps
  lexicon: HALOT, BDB
  rationale: In this apparel list, the term most naturally refers to an outer light covering worn by women. 'Veils' fits the likely sense and traditional understanding, while 'shawls' or 'wraps' remain possible if the item is conceived more as a draped outer garment than a face covering.
