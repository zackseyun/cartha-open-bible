id: ISA.3.25
reference: Isaiah 3:25
source:
  edition: WLC
  text: מְתַ֖יִ/ךְ בַּ/חֶ֣רֶב יִפֹּ֑לוּ וּ/גְבוּרָתֵ֖/ךְ בַּ/מִּלְחָמָֽה׃
translation:
  text: Your men will fall by the sword[a], and your mighty men in battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your heroes' or 'your warriors' for 'your mighty ones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְתַיִךְ
  chosen: your men
  alternatives:
  - your dead
  - your mortals
  lexicon: HALOT
  rationale: The noun from מֵת can denote men/persons in poetic usage here, not corpses in context. Since the following verb is 'will fall,' rendering it as 'your dead' would be awkward and premature. 'Your men' fits the sense of the city's male population or fighting men addressed as feminine Zion/Jerusalem.
- source_word: בַּחֶרֶב
  chosen: by the sword
  alternatives:
  - with the sword
  lexicon: HALOT
  rationale: 'The preposition with the article plus ''sword'' is idiomatically instrumental: death comes through warfare. ''By the sword'' is standard, natural English and preserves the martial force.'
- source_word: יִפֹּלוּ
  chosen: will fall
  alternatives:
  - shall fall
  lexicon: HALOT
  rationale: Qal imperfect 3mp of נפל in a prophetic context indicates future outcome. 'Will fall' is contemporary English and preserves the common biblical idiom for dying in battle.
- source_word: וּגְבוּרָתֵךְ
  chosen: your mighty ones
  alternatives:
  - your strength
  - your warriors
  - your heroes
  lexicon: HALOT
  rationale: Though גְּבוּרָה often means 'might/strength,' in context parallel to 'your men' and followed by 'in battle,' it most naturally refers metonymically to the city's strong men, warriors, or heroes. 'Your mighty ones' preserves the lexical connection to might while making good sense in English.
- source_word: בַּמִּלְחָמָה
  chosen: in battle
  alternatives:
  - in war
  lexicon: HALOT
  rationale: The noun means 'war/battle.' 'In battle' is more idiomatic in parallel with 'fall by the sword' and suits the immediate scene of combat.
