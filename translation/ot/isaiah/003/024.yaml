id: ISA.3.24
reference: Isaiah 3:24
source:
  edition: WLC
  text: וְ/הָיָה֩ תַ֨חַת בֹּ֜שֶׂם מַ֣ק יִֽהְיֶ֗ה וְ/תַ֨חַת חֲגוֹרָ֤ה נִקְפָּה֙ וְ/תַ֨חַת מַעֲשֶׂ֤ה מִקְשֶׁה֙ קָרְחָ֔ה וְ/תַ֥חַת פְּתִיגִ֖יל מַחֲגֹ֣רֶת שָׂ֑ק כִּי תַ֖חַת יֹֽפִי־׃
translation:
  text: 'And it shall be: instead of perfume[a], rottenness; and instead of a belt, a rope; and instead of well-set hair, baldness; and instead of a rich robe, a girding of sackcloth[c][b]; branding instead of beauty.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a cord.' The rare Hebrew term may refer either to a rope replacing an ornamental belt or to a rope-like mark of humiliation.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew phrase rendered 'well-set hair' is difficult and may refer more broadly to elaborate adornment or finely worked attire; the pairing with 'baldness' favors a reference to dressed hair.
    reason: lexical_alternative
  - marker: c
    text: The final clause is textually and lexically difficult. Many understand the sense to be 'branding instead of beauty,' while some translations render more generally 'instead of beauty, shame' or similar.
    reason: textual_variant
lexical_decisions:
- source_word: בֹּשֶׂם
  chosen: perfume
  alternatives:
  - fragrance
  - sweet smell
  lexicon: HALOT
  rationale: Refers to aromatic perfume or balsam. 'Perfume' is natural modern English and fits the contrast with bodily decay.
- source_word: מַק
  chosen: rottenness
  alternatives:
  - decay
  - putrefaction
  - stench
  lexicon: HALOT
  rationale: The noun denotes rottenness/decay, likely the foul condition replacing perfume. 'Rotteness' preserves the concrete image better than the more interpretive 'stench,' though the latter is an implied effect.
- source_word: חֲגוֹרָה
  chosen: belt
  alternatives:
  - girdle
  - sash
  lexicon: HALOT
  rationale: A general term for something girded around the waist. 'Belt' is clear modern English; 'girdle' is archaic and potentially misleading.
- source_word: נִקְפָּה
  chosen: a rope
  alternatives:
  - a cord
  - a rope mark
  lexicon: HALOT
  rationale: This rare noun is commonly understood as a rope or cord, likely replacing an ornamental belt with something coarse or humiliating. The exact nuance is uncertain, so a lexical alternative is preserved in a footnote.
- source_word: מַעֲשֶׂה מִקְשֶׁה
  chosen: well-set hair
  alternatives:
  - elaborate coiffure
  - finely worked hair arrangement
  - embroidered work
  lexicon: HALOT
  rationale: The phrase is difficult. In context, among women's adornments and paired with 'baldness,' it most plausibly refers to carefully arranged or elaborately dressed hair rather than textile craftsmanship. 'Well-set hair' keeps the likely sense while remaining readable.
- source_word: קָרְחָה
  chosen: baldness
  alternatives:
  - a bald scalp
  lexicon: HALOT
  rationale: Straightforward noun meaning baldness, fitting the judgment reversal of beauty and adornment.
- source_word: פְּתִיגִיל
  chosen: a rich robe
  alternatives:
  - a festive robe
  - a mantle
  - a fine garment
  lexicon: HALOT
  rationale: A rare term for a costly or festive outer garment. 'Rich robe' conveys luxury and social display without overcommitting to a specific cut of clothing.
- source_word: מַחֲגֹרֶת שָׂק
  chosen: a girding of sackcloth
  alternatives:
  - a belt of sackcloth
  - sackcloth around the waist
  lexicon: HALOT
  rationale: Literally a girding/binding of sackcloth. This preserves the image of mourning attire replacing luxury clothing.
- source_word: כִּי תַחַת יֹפִי
  chosen: branding instead of beauty
  alternatives:
  - for instead of beauty there will be shame
  - indeed, instead of beauty
  lexicon: HALOT
  rationale: 'The Hebrew here is notoriously difficult because the expected noun for ''branding'' is not explicit in the consonantal text, yet the sense is well supported by context and ancient/modern interpretation: disfigurement replacing beauty. Rendering ''branding instead of beauty'' captures the terse, shocking reversal. The difficulty and alternatives are preserved in a footnote.'
