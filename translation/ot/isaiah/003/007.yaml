id: ISA.3.7
reference: Isaiah 3:7
source:
  edition: WLC
  text: יִשָּׂא֩ בַ/יּ֨וֹם הַ/ה֤וּא לֵ/אמֹר֙ לֹא אֶהְיֶ֣ה חֹבֵ֔שׁ וּ/בְ/בֵיתִ֕/י אֵ֥ין
    לֶ֖חֶם וְ/אֵ֣ין שִׂמְלָ֑ה לֹ֥א תְשִׂימֻ֖/נִי קְצִ֥ין עָֽם׀־׃
translation:
  text: On that day he will cry out, saying, “I will not be a healer, for in my house
    there is no bread and there is no cloak; you must not make me leader of the people.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I will not be one who binds up,” preserving the literal image behind
      “healer.”
    reason: lexical_alternative
  - marker: b
    text: Or “chief of the people” or “ruler of the people.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשָּׂא
  chosen: he will cry out
  alternatives:
  - he will lift up
  - he will protest
  lexicon: HALOT
  rationale: The verb literally means 'lift/carry,' but in this idiom with speech
    it means to raise the voice or make a declaration. 'Cry out' captures the public,
    emphatic refusal better than a wooden 'lift up.'
- source_word: חֹבֵשׁ
  chosen: healer
  alternatives:
  - binder
  - one who binds up
  - ruler
  lexicon: HALOT
  rationale: The participle from חבש literally denotes one who binds up, especially
    wounds; by extension it can refer metaphorically to one who remedies a social
    crisis. 'Healer' communicates the metaphor naturally in English while preserving
    the image of someone able to repair the community's condition. 'Ruler' is too
    interpretive for the main text.
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: The basic sense is 'bread,' often standing for food more broadly. Here
    the concrete image is important, so 'bread' is retained.
- source_word: שִׂמְלָה
  chosen: cloak
  alternatives:
  - garment
  - clothing
  lexicon: HALOT
  rationale: The noun denotes an outer garment or cloak. 'Cloak' is more specific
    than generic 'clothing' and pairs well with 'bread' as basic necessities.
- source_word: תְשִׂימֻנִי
  chosen: you must not make me
  alternatives:
  - do not appoint me
  - you shall not set me
  lexicon: HALOT
  rationale: The verb means 'put, set, appoint.' In context it is a refusal of appointment
    to office. 'You must not make me' is idiomatic and preserves the force of direct
    address.
- source_word: קְצִין עָם
  chosen: leader of the people
  alternatives:
  - chief of the people
  - ruler of the people
  - captain of the people
  lexicon: HALOT
  rationale: קצין denotes an official, chief, or leader. 'Leader of the people' is
    natural modern English and avoids over-specifying military nuance such as 'captain.'
