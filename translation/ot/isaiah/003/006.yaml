id: ISA.3.6
reference: Isaiah 3:6
source:
  edition: WLC
  text: כִּֽי יִתְפֹּ֨שׂ אִ֤ישׁ בְּ/אָחִי/ו֙ בֵּ֣ית אָבִ֔י/ו שִׂמְלָ֣ה לְ/כָ֔ה קָצִ֖ין
    תִּֽהְיֶה לָּ֑/נוּ וְ/הַ/מַּכְשֵׁלָ֥ה הַ/זֹּ֖את תַּ֥חַת יָדֶֽ/ךָ־־׃
translation:
  text: 'For a man will seize his brother in his father''s house: “You have a cloak;
    you shall be our leader, and this ruin shall be under your hand.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “this collapse” or, more literally, “this stumbling block.”
    reason: lexical_alternative
  - marker: b
    text: “Under your hand” is a Hebrew idiom meaning under your authority or in your
      charge.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - When
  lexicon: HALOT
  rationale: Introduces an explanatory or illustrative clause flowing from the prior
    context of social collapse. 'For' best preserves the causal/explanatory force
    in readable English.
- source_word: יִתְפֹּשׂ
  chosen: will seize
  alternatives:
  - will take hold of
  - will grasp
  lexicon: HALOT
  rationale: The verb תפשׂ conveys laying hold of someone. 'Seize' preserves the forceful
    social pressure implied in the scene better than the softer 'take hold of.'
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and refers to an individual
    male in the illustrative scenario. Per gender-accurate policy, 'a man' is preferred
    over a neutral substitute.
- source_word: בְּאָחִיו
  chosen: his brother
  alternatives:
  - his kinsman
  lexicon: HALOT
  rationale: The ordinary sense of אָח is 'brother.' While kinship can be broader,
    the immediate family setting ('his father's house') supports the more direct rendering.
- source_word: בֵּית אָבִיו
  chosen: in his father's house
  alternatives:
  - from his father's house
  - of his father's household
  lexicon: HALOT
  rationale: The phrase locates the action within the paternal household/clan setting.
    'In his father's house' is the most natural rendering and preserves the familial
    context.
- source_word: שִׂמְלָה
  chosen: a cloak
  alternatives:
  - a garment
  - clothing
  lexicon: HALOT
  rationale: שׂמלה denotes an outer garment or cloak. 'Cloak' better reflects a specific
    article of clothing and fits the context, where mere possession of a respectable
    garment marks someone as fit to lead.
- source_word: לְכָה
  chosen: You have
  alternatives:
  - You possess
  lexicon: HALOT
  rationale: 'The particle with pronominal suffix here functions idiomatically: ''you
    have a cloak.'' English requires supplying the implied possession rather than
    rendering woodenly.'
- source_word: קָצִין
  chosen: leader
  alternatives:
  - chief
  - ruler
  - captain
  lexicon: HALOT
  rationale: קצין denotes one in authority. 'Leader' is natural modern English and
    avoids overly military ('captain') or archaic ('chief') connotations not demanded
    by context.
- source_word: תִּהְיֶה לָּנוּ
  chosen: you shall be our leader
  alternatives:
  - be our ruler
  lexicon: HALOT
  rationale: The imperfect here expresses the community's demand or appointment. 'You
    shall be our leader' captures both the imperative-like force and the future-oriented
    sense.
- source_word: הַמַּכְשֵׁלָה
  chosen: this ruin
  alternatives:
  - this stumbling block
  - this collapse
  lexicon: HALOT
  rationale: Though the noun is literally related to stumbling, in context it refers
    metaphorically to the societal breakdown or disaster described in the chapter.
    'Ruin' communicates the referent clearly in English while preserving the gravity.
- source_word: תַּחַת יָדֶךָ
  chosen: shall be under your hand
  alternatives:
  - shall be under your authority
  - shall be in your charge
  lexicon: HALOT
  rationale: The idiom literally means under one's hand, denoting control or responsibility.
    The main text keeps the vivid Hebrew idiom; a footnote preserves the interpretive
    gloss.
