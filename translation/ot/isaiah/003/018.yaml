id: ISA.3.18
reference: Isaiah 3:18
source:
  edition: WLC
  text: בַּ/יּ֨וֹם הַ/ה֜וּא יָסִ֣יר אֲדֹנָ֗/י אֵ֣ת תִּפְאֶ֧רֶת הָ/עֲכָסִ֛ים וְ/הַ/שְּׁבִיסִ֖ים
    וְ/הַ/שַּׂהֲרֹנִֽים׃
translation:
  text: In that day the Lord will take away the beauty of the anklets, the headbands,
    and the crescent ornaments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'On that day.'
    reason: lexical_alternative
  - marker: b
    text: The precise meaning of 'headbands' is uncertain; alternatives include 'caps'
      or 'hairnets.'
    reason: lexical_alternative
  - marker: c
    text: Or 'crescent necklaces'; the Hebrew refers to crescent-shaped ornaments.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: In that day
  alternatives:
  - On that day
  lexicon: HALOT
  rationale: Standard temporal idiom introducing a prophetic time of judgment. 'In
    that day' is natural English and preserves the prophetic register.
- source_word: יָסִיר
  chosen: will take away
  alternatives:
  - will remove
  lexicon: HALOT
  rationale: The Hiphil of סור here conveys causing removal. 'Will take away' is idiomatic
    and fits the context of stripping adornments in judgment.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: This is the divine title Adonai, not the Tetragrammaton. Per translation
    philosophy, titles are translated. 'The Lord' is the most natural English rendering
    in this clause.
- source_word: תִּפְאֶרֶת
  chosen: the beauty of
  alternatives:
  - the finery of
  - the splendor of
  lexicon: HALOT
  rationale: The noun denotes beauty, glory, or finery. In this context of women's
    ornaments, it refers to the attractive finery constituted by the listed items.
    'The beauty of' preserves the lexical sense while fitting the construct relationship.
- source_word: הָעֲכָסִים
  chosen: the anklets
  alternatives:
  - the ankle chains
  lexicon: HALOT
  rationale: The term refers to ornaments worn on the feet/ankles. 'Anklets' is the
    clearest modern English equivalent.
- source_word: הַשְּׁבִיסִים
  chosen: the headbands
  alternatives:
  - the caps
  - the hairnets
  lexicon: HALOT
  rationale: The exact item is somewhat uncertain, but it is generally understood
    as a head ornament or headdress. 'Headbands' is a cautious, readable rendering
    that avoids overprecision while staying within the semantic range.
- source_word: הַשַּׂהֲרֹנִים
  chosen: the crescent ornaments
  alternatives:
  - the crescent necklaces
  - the moon-shaped ornaments
  lexicon: HALOT
  rationale: Derived from a word for 'moon' or 'crescent'; it denotes crescent-shaped
    jewelry. 'Crescent ornaments' preserves the imagery without specifying a form
    the Hebrew does not require.
