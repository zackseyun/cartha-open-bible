id: ISA.3.4
reference: Isaiah 3:4
source:
  edition: WLC
  text: וְ/נָתַתִּ֥י נְעָרִ֖ים שָׂרֵי/הֶ֑ם וְ/תַעֲלוּלִ֖ים יִמְשְׁלוּ בָֽ/ם־׃
translation:
  text: And I will make youths their princes[a], and capricious children will rule over them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'children,' 'infants,' or 'babes'; the Hebrew term may emphasize either youth or childish, capricious behavior.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: And I will make
  alternatives:
  - And I will give
  - And I will appoint
  lexicon: HALOT
  rationale: 'נתן literally means ''give,'' but in this governance context the sense is causative/appointive: YHWH sets rulers over the people. ''Make'' is idiomatic in English and preserves the force without awkwardness.'
- source_word: נְעָרִים
  chosen: youths
  alternatives:
  - boys
  - young men
  - children
  lexicon: HALOT
  rationale: נְעָרִים denotes young males/youths. 'Youths' preserves the idea of immaturity without forcing the narrower 'boys' or the more mature 'young men.' In context the emphasis is on unfitness and inexperience.
- source_word: שָׂרֵיהֶם
  chosen: their princes
  alternatives:
  - their officials
  - their rulers
  - their leaders
  lexicon: HALOT
  rationale: שַׂר commonly refers to a prince, chief, or official. 'Princes' is a standard rendering and fits the plural construct with suffix. It preserves the elevated governing role better than the flatter 'leaders.'
- source_word: וְתַעֲלוּלִים
  chosen: capricious children
  alternatives:
  - children
  - infants
  - babes
  - mockers
  - whimsical ones
  lexicon: HALOT
  rationale: תַעֲלוּלִים is difficult and can denote childishness, caprice, or wanton behavior. The context is judgment through incompetent, immature rule. 'Capricious children' brings out both the likely age imagery and the behavioral nuance of instability. Because the term is lexically debated, alternatives are preserved in a footnote.
- source_word: יִמְשְׁלוּ בָם
  chosen: will rule over them
  alternatives:
  - will govern them
  - will dominate them
  lexicon: HALOT
  rationale: משל with ב expresses exercising rule over someone. 'Rule over them' is the most direct and natural rendering in English.
