theological_decisions:
- issue: Nature of the judgment image
  chosen_reading: The verse depicts divine judgment by installing immature and unstable rulers, whether literally young rulers or figuratively childish ones.
  alternative_readings:
  - Strictly literal age reference only
  - Entirely metaphorical reference to incompetent rulers
  rationale: The Hebrew uses terms associated with youth/childishness, but prophetic judgment language may include both literal and figurative force. The translation preserves the imagery without over-resolving the interpretive question.
  doctrine_reference: Preserve theological tension rather than resolve it.
