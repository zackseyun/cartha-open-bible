theological_decisions:
- issue: Potential occult connotation of לְחָשִׁים
  chosen_reading: Rendered as 'amulets' in the main text
  alternative_readings:
  - charms
  - whispered spells
  rationale: The verse is a catalog of physical adornments removed in judgment, so a concrete object is preferable in the main text. Because the Hebrew term is connected with incantation/whispering, the translation preserves that semantic background in a footnote rather than flattening it or turning the item into a purely verbal act.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
