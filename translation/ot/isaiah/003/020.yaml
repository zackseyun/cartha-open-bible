id: ISA.3.20
reference: Isaiah 3:20
source:
  edition: WLC
  text: הַ/פְּאֵרִ֤ים וְ/הַ/צְּעָדוֹת֙ וְ/הַ/קִּשֻּׁרִ֔ים וּ/בָתֵּ֥י הַ/נֶּ֖פֶשׁ וְ/הַ/לְּחָשִֽׁים׃
translation:
  text: the headdresses[a], the ankle chains, the sashes, the perfume boxes[b], and the amulets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'charms'; the Hebrew term is related to whispering or incantation, so it may refer to amulets associated with spells.
    reason: lexical_alternative
  - marker: b
    text: Literally 'houses of the soul/life,' likely small containers for perfume or fragrant substances.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפְּאֵרִים
  chosen: the headdresses
  alternatives:
  - the turbans
  - the ornaments
  lexicon: HALOT
  rationale: פְּאֵרִים denotes ornamental headwear or finery worn on the head. 'Headdresses' is clear modern English and fits the catalog of women's adornments in context better than the more specific 'turbans' or the vaguer 'ornaments'.
- source_word: הַצְּעָדוֹת
  chosen: the ankle chains
  alternatives:
  - the anklets
  - the step-chains
  lexicon: HALOT
  rationale: From a root associated with stepping or marching, the term refers to ornaments worn on the feet/ankles. 'Ankle chains' preserves the likely form of the jewelry and matches the context of luxury items; 'anklets' is possible but slightly less concrete about the linked-chain sense.
- source_word: הַקִּשֻּׁרִים
  chosen: the sashes
  alternatives:
  - the bands
  - the girdles
  lexicon: HALOT
  rationale: From a root meaning 'to bind,' this likely refers to items used for tying or binding as part of dress. 'Sashes' is idiomatic modern English for ornamental binding garments; 'bands' is too vague and 'girdles' is archaic in contemporary usage.
- source_word: בָּתֵּי הַנֶּפֶשׁ
  chosen: the perfume boxes
  alternatives:
  - the scent bottles
  - the soul houses
  lexicon: HALOT
  rationale: Literally 'houses of the נפשׁ.' In this adornment list, the phrase is widely understood as containers for perfume or fragrant substances, likely worn on the person. 'Perfume boxes' communicates the probable referent in natural English. The literal expression is obscure in English and would mislead without explanation.
- source_word: הַלְּחָשִׁים
  chosen: the amulets
  alternatives:
  - the charms
  - the whispered spells
  lexicon: HALOT
  rationale: The noun is related to whispering/incantation and in this material context most naturally denotes charm-objects or amulets associated with incantations. 'Amulets' fits the list of wearable luxury items while preserving the superstitious/magical association better than the broader 'charms'.
