id: ISA.3.21
reference: Isaiah 3:21
source:
  edition: WLC
  text: הַ/טַּבָּע֖וֹת וְ/נִזְמֵ֥י הָ/אָֽף׃
translation:
  text: the rings and nose rings[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'signet rings' for 'rings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַטַּבָּעוֹת
  chosen: the rings
  alternatives:
  - the signet rings
  - the finger rings
  lexicon: HALOT
  rationale: טַבָּעוֹת is the plural of טַבַּעַת, a ring. In an inventory of women's adornments, the broad term 'rings' fits the plain sense without over-specifying type. 'Signet rings' is possible in other contexts, but here jewelry is in view; 'finger rings' is interpretive and unnecessary since the next item specifies nose jewelry.
- source_word: וְנִזְמֵי הָאָף
  chosen: and nose rings
  alternatives:
  - and nose jewels
  - and rings of the nose
  lexicon: HALOT
  rationale: נֶזֶם commonly denotes a ring or ornament, and with הָאָף ('the nose') the phrase naturally means 'nose rings.' This is idiomatic modern English and preserves the concrete image of personal adornment.
- source_word: הָאָף
  chosen: nose
  alternatives:
  - nostril
  lexicon: HALOT
  rationale: אָף ordinarily means 'nose' here in a literal anatomical sense. 'Nostril' is too narrow and less natural in English for this jewelry list.
