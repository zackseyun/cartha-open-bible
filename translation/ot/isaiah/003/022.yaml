id: ISA.3.22
reference: Isaiah 3:22
source:
  edition: WLC
  text: הַ/מַּֽחֲלָצוֹת֙ וְ/הַ/מַּ֣עֲטָפ֔וֹת וְ/הַ/מִּטְפָּח֖וֹת וְ/הָ/חֲרִיטִֽים׃
translation:
  text: the festal robes, and the cloaks, and the shawls, and the purses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fine robes' for 'festal robes.' The Hebrew likely refers to special,
      costly garments rather than ordinary clothing.
    reason: lexical_alternative
  - marker: b
    text: Or 'wraps' for 'cloaks.'
    reason: lexical_alternative
  - marker: c
    text: Or 'scarves' or 'veils' for 'shawls.' The exact type of cloth accessory
      is uncertain.
    reason: lexical_alternative
  - marker: d
    text: Or 'bags' or 'pouches' for 'purses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַּחֲלָצוֹת
  chosen: festal robes
  alternatives:
  - changeable suits of apparel
  - fine robes
  - holiday garments
  lexicon: HALOT, BDB
  rationale: The noun refers to costly or special garments, likely worn on festive
    or formal occasions. 'Festal robes' communicates distinctive, high-status clothing
    in clear modern English better than the traditional but opaque 'changeable suits
    of apparel.'
- source_word: מַּעֲטָפוֹת
  chosen: cloaks
  alternatives:
  - wraps
  - mantles
  lexicon: HALOT, BDB
  rationale: From a root associated with wrapping or enveloping, this term denotes
    an outer garment. 'Cloaks' is natural English and preserves the sense of a substantial
    outer wrap; 'wraps' is possible but slightly less specific.
- source_word: מִּטְפָּחוֹת
  chosen: shawls
  alternatives:
  - veils
  - scarves
  - kerchiefs
  lexicon: HALOT, BDB
  rationale: This term denotes a covering cloth or wrap. In this clothing/jewelry
    inventory, 'shawls' best fits a wearable textile accessory without overcommitting
    to face-covering implied by 'veils.'
- source_word: חֲרִיטִים
  chosen: purses
  alternatives:
  - bags
  - handbags
  lexicon: HALOT, BDB
  rationale: The noun denotes a bag or pouch for carrying valuables or money. 'Purses'
    fits the context of women's luxury items and is more precise than the generic
    'bags.'
