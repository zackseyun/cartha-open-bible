id: ISA.3.12
reference: Isaiah 3:12
source:
  edition: WLC
  text: עַמִּ/י֙ נֹגְשָׂ֣י/ו מְעוֹלֵ֔ל וְ/נָשִׁ֖ים מָ֣שְׁלוּ ב֑/וֹ עַמִּ/י֙ מְאַשְּׁרֶ֣י/ךָ
    מַתְעִ֔ים וְ/דֶ֥רֶךְ אֹֽרְחֹתֶ֖י/ךָ בִּלֵּֽעוּ׃ס
translation:
  text: My people—children are their oppressors, and women rule over them. My people,
    your guides lead you astray and swallow up the course of your paths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'your blessers' or 'those who call you blessed'; the Hebrew form can
      carry that sense, but in context it likely refers to leaders or guides who misdirect
      the people.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew literally says, 'the way of your paths they have swallowed up,'
      a vivid metaphor for obliterating the people's proper course.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹגְשָׂיו
  chosen: his oppressors
  alternatives:
  - his taskmasters
  - those who drive him
  lexicon: HALOT
  rationale: From נגשׂ, referring to those who exact, oppress, or drive hard. 'Oppressors'
    best fits the social-political denunciation in context and is more natural than
    the narrower 'taskmasters.' The 3ms suffix is retained with 'his,' referring back
    to 'my people' as a collective singular.
- source_word: מְעוֹלֵל
  chosen: are children
  alternatives:
  - is a child
  - are childish
  - a child exploits
  lexicon: HALOT
  rationale: The form and syntax are difficult, but in context it most plausibly characterizes
    the oppressors as childlike/children. English supplies 'are' for smooth sense.
    'Children' preserves the image of immature, unfit rule better than the more interpretive
    'childish.'
- source_word: וְנָשִׁים מָשְׁלוּ בוֹ
  chosen: and women rule over him
  alternatives:
  - and women govern him
  - and wives rule over him
  lexicon: HALOT
  rationale: A straightforward rendering of the clause. 'Women' is the plain sense
    of נָשִׁים. 'Rule over' reflects משל with ב. The collective singular suffix in
    בוֹ is represented by 'him,' again referring to the people as a corporate singular.
- source_word: מְאַשְּׁרֶיךָ
  chosen: your guides
  alternatives:
  - those who lead you
  - those who call you blessed
  lexicon: HALOT
  rationale: Although the piel of אשר can mean 'pronounce blessed,' in this context
    the parallel with 'lead astray' strongly supports the sense of leaders/guides,
    likely those who direct the people. This avoids a wooden rendering that obscures
    the prophetic accusation. The alternative is preserved in a footnote because the
    lexical possibility is real.
- source_word: מַתְעִים
  chosen: lead you astray
  alternatives:
  - mislead you
  - cause you to wander
  lexicon: HALOT
  rationale: From תעה in the causative sense, 'cause to err/wander.' 'Lead you astray'
    is idiomatic and preserves the metaphor of misdirection.
- source_word: דֶרֶךְ אֹרְחֹתֶיךָ
  chosen: the course of your paths
  alternatives:
  - the way of your paths
  - your paths
  lexicon: HALOT
  rationale: The Hebrew uses both דֶרֶךְ and אֹרְחוֹת, creating an emphatic path/way
    expression. 'The course of your paths' preserves both terms without becoming too
    awkward. A simpler 'your paths' would lose the doubled imagery.
- source_word: בִּלֵּעוּ
  chosen: they swallow up
  alternatives:
  - they devour
  - they confuse
  - they destroy
  lexicon: HALOT
  rationale: From בלע, literally 'swallow, engulf, devour.' Here it is metaphorical
    for obliterating or consuming the people's proper way. 'Swallow up' keeps the
    vivid metaphor better than the more abstract 'destroy' or 'confuse.'
