theological_decisions:
- issue: Potentially pejorative reference to 'women' ruling
  chosen_reading: Retain the literal 'women rule over him' as a prophetic image of
    social inversion/disorder in context, without softening or expanding into a doctrinal
    statement about women generally.
  alternative_readings:
  - Render more generally as 'the weak rule over him'
  - Interpret as 'creditors rule over him' via emendation or alternate vocalization
  rationale: The Hebrew text explicitly says 'women.' In keeping with gender-accurate
    translation and original-language primacy, the wording should not be neutralized.
    At the same time, the translation should not import a universal theological claim
    beyond Isaiah's immediate rhetoric of judgment and disorder.
  doctrine_reference: Translation philosophy §§1, 4
