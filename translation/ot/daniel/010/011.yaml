id: DAN.10.11
reference: Daniel 10:11
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֡/י דָּנִיֵּ֣אל אִישׁ חֲ֠מֻדוֹת הָבֵ֨ן בַּ/דְּבָרִ֜ים אֲשֶׁר֩
    אָנֹכִ֨י דֹבֵ֤ר אֵלֶ֨י/ךָ֙ וַ/עֲמֹ֣ד עַל עָמְדֶ֔/ךָ כִּ֥י עַתָּ֖ה שֻׁלַּ֣חְתִּי
    אֵלֶ֑י/ךָ וּ/בְ/דַבְּר֥/וֹ עִמִּ֛/י אֶת הַ/דָּבָ֥ר הַ/זֶּ֖ה עָמַ֥דְתִּי מַרְעִֽיד־־־׃
translation:
  text: And he said to me, “Daniel, man greatly beloved, understand the words that
    I am speaking to you, and stand in your place, for now I have been sent to you.”
    And when he spoke this word with me, I stood trembling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “highly esteemed man.” The Hebrew expression literally describes Daniel
      as a man of preciousness or desirability, functioning here as an honorific.
    reason: lexical_alternative
  - marker: b
    text: Or “stand upright” or “stand at your station.” The Hebrew idiom is literally
      “stand upon your standing/place.”
    reason: lexical_alternative
  - marker: c
    text: Or “when he spoke this message to me.” Hebrew has “this word,” which can
      also mean “this matter” or “this message.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ חֲמֻדוֹת
  chosen: man greatly beloved
  alternatives:
  - man of preciousness
  - highly esteemed man
  - man of delights
  lexicon: HALOT
  rationale: The construct-like expression literally denotes a man characterized by
    desirability/preciousness. In context it is an honorific address from the heavenly
    messenger. 'Greatly beloved' is idiomatic and preserves the relational force better
    than the more wooden 'man of preciousness.'
- source_word: הָבֵן
  chosen: understand
  alternatives:
  - consider carefully
  - discern
  lexicon: HALOT
  rationale: The imperative calls Daniel to grasp the meaning of what follows, not
    merely to hear it. 'Understand' is the most natural and sufficiently formal rendering.
- source_word: בַּדְּבָרִים
  chosen: the words
  alternatives:
  - the matters
  - the things
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'thing.' Here, because the messenger
    immediately says 'that I am speaking to you,' the speech sense is primary, so
    'the words' fits best.
- source_word: דֹבֵר אֵלֶיךָ
  chosen: I am speaking to you
  alternatives:
  - I speak to you
  - I am about to tell you
  lexicon: HALOT
  rationale: The participle conveys ongoing or immediate speech. 'I am speaking to
    you' reflects the present progressive sense in natural English.
- source_word: וַעֲמֹד עַל עָמְדֶךָ
  chosen: stand in your place
  alternatives:
  - stand at your station
  - stand upright
  lexicon: HALOT
  rationale: The idiom literally uses the noun from the same root as the verb ('stand
    upon your standing/place'). It likely means to take one's proper standing position.
    'Stand in your place' preserves the idiomatic force without overinterpreting it
    as merely 'stand upright,' though that nuance is present.
- source_word: שֻׁלַּחְתִּי אֵלֶיךָ
  chosen: I have been sent to you
  alternatives:
  - I was sent to you
  lexicon: HALOT
  rationale: The passive perfect can be rendered either as English present perfect
    or simple past. 'I have been sent' keeps the present relevance of the commission
    in the scene.
- source_word: וּבְדַבְּרוֹ עִמִּי אֶת־הַדָּבָר הַזֶּה
  chosen: when he spoke this word with me
  alternatives:
  - when he spoke this message to me
  - while he was speaking this word with me
  lexicon: HALOT
  rationale: The infinitive construct with prefixed preposition marks contemporaneous
    action. 'When he spoke' is smooth English. Retaining singular 'word' reflects
    the Hebrew, though in English 'message' is a viable interpretive alternative.
- source_word: מַרְעִיד
  chosen: trembling
  alternatives:
  - shaking
  - quaking
  lexicon: HALOT
  rationale: The Hiphil participle from רעד expresses physical trembling. 'Trembling'
    is concise, natural, and fits Daniel's fearful response.
