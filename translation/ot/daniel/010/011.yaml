theological_decisions:
- issue: Honorific description of Daniel in angelic address
  chosen_reading: man greatly beloved
  alternative_readings:
  - highly esteemed man
  rationale: The phrase expresses divine favor toward Daniel without importing later
    doctrinal categories. 'Greatly beloved' preserves the affectionate and honorific
    tone of the Hebrew while remaining readable.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Force of the command וַעֲמֹד עַל עָמְדֶךָ
  chosen_reading: stand in your place
  alternative_readings:
  - stand upright
  - stand at your station
  rationale: The wording preserves the Hebrew idiom and avoids flattening it into
    a purely physical command. It may include both physical standing and resuming
    one's appointed position, so the translation keeps that tension rather than resolving
    it.
  doctrine_reference: Translation philosophy §3
