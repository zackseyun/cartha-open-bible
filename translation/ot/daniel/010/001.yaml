id: DAN.10.1
reference: Daniel 10:1
source:
  edition: WLC
  text: בִּ/שְׁנַ֣ת שָׁל֗וֹשׁ לְ/כ֨וֹרֶשׁ֙ מֶ֣לֶךְ פָּרַ֔ס דָּבָר֙ נִגְלָ֣ה לְ/דָֽנִיֵּ֔אל אֲשֶׁר נִקְרָ֥א שְׁמ֖/וֹ בֵּלְטְשַׁאצַּ֑ר וֶ/אֱמֶ֤ת הַ/דָּבָר֙ וְ/צָבָ֣א גָד֔וֹל וּ/בִין֙ אֶת הַ/דָּבָ֔ר וּ/בִ֥ינָה ל֖/וֹ בַּ/מַּרְאֶֽה־־׃
translation:
  text: In the third year of Cyrus king of Persia[a], a word was revealed to Daniel, who was called Belteshazzar. The word was true, and it concerned a great conflict; and he understood the word and had understanding in the vision.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and a great warfare.' The Hebrew phrase can also be rendered more formally in military terms.
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּבָר
  chosen: a word
  alternatives:
  - a message
  - a matter
  lexicon: HALOT
  rationale: דָּבָר has a broad semantic range including 'word,' 'matter,' and 'message.' Here it introduces revelatory content disclosed to Daniel, so 'word' preserves the Hebrew idiom while remaining natural in English.
- source_word: נִגְלָה
  chosen: was revealed
  alternatives:
  - was disclosed
  - appeared
  lexicon: HALOT
  rationale: The Niphal of גלה commonly denotes something being revealed or uncovered. 'Was revealed' is the standard and clearest rendering for divine disclosure.
- source_word: נִקְרָא שְׁמוֹ
  chosen: who was called
  alternatives:
  - whose name was called
  - who was named
  lexicon: HALOT
  rationale: This idiom identifies Daniel by his Babylonian name. 'Who was called' is idiomatic English and preserves the passive naming sense.
- source_word: בֵּלְטְשַׁאצַּר
  chosen: Belteshazzar
  rationale: Personal names are transliterated by standard convention per translation philosophy.
- source_word: וֶאֱמֶת הַדָּבָר
  chosen: The word was true
  alternatives:
  - the message was true
  - the matter was true
  lexicon: HALOT
  rationale: This clause affirms the reliability of the revelation. 'The word was true' keeps the repeated דָּבָר visible in English and preserves the terse Hebrew style.
- source_word: וְצָבָא גָדוֹל
  chosen: it concerned a great conflict
  alternatives:
  - and a great warfare
  - and great hardship
  - and a great host
  lexicon: HALOT
  rationale: צָבָא can denote army, warfare, military service, or by extension conflict/hardship. In this apocalyptic context, the sense is not merely 'army' as an object but the severe conflict bound up with the revelation. 'Great conflict' communicates the likely sense in readable English while avoiding over-specification. The more formal 'great warfare' is preserved in a footnote.
- source_word: וּבִין
  chosen: he understood
  alternatives:
  - he discerned
  - he gave attention to
  lexicon: HALOT
  rationale: The Qal form of בין here is best taken as Daniel's grasping or discerning the message. 'He understood' is straightforward and matches the following noun בינה.
- source_word: וּבִינָה לוֹ
  chosen: understanding came to him
  alternatives:
  - there was understanding for him
  - he had understanding
  lexicon: HALOT
  rationale: The noun בִּינָה with לּוֹ expresses possession or reception of understanding. 'Understanding came to him' renders the clause naturally while preserving the sense that insight was granted.
- source_word: בַּמַּרְאֶה
  chosen: in the vision
  alternatives:
  - in the appearance
  - through the vision
  lexicon: HALOT
  rationale: מַרְאֶה can mean appearance or vision. In Daniel's revelatory context, 'vision' is the most fitting and idiomatic rendering.
