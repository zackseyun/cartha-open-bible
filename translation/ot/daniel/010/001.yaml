theological_decisions:
- issue: Sense of צָבָא גָדוֹל in an apocalyptic revelation
  chosen_reading: it concerned a great conflict
  alternative_readings:
  - and a great warfare
  - and a great host
  rationale: The phrase is semantically difficult. Given the context of Daniel 10–12, which unveils prolonged heavenly and earthly struggle, rendering the phrase as the content or burden of the revelation ('it concerned a great conflict') best captures the likely sense without forcing a strictly military noun phrase. A more formal alternative is preserved in a footnote for auditability.
