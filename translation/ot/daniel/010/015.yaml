id: DAN.10.15
reference: Daniel 10:15
source:
  edition: WLC
  text: וּ/בְ/דַבְּר֣/וֹ עִמִּ֔/י כַּ/דְּבָרִ֖ים הָ/אֵ֑לֶּה נָתַ֧תִּי פָנַ֛/י אַ֖רְצָ/ה
    וְ/נֶאֱלָֽמְתִּי׃
translation:
  text: And when he spoke these words with me, I set my face toward the ground and
    became speechless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'while he was speaking with me these words.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and was silenced' or 'and became mute.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְדַבְּרוֹ
  chosen: when he spoke
  alternatives:
  - while he was speaking
  - as he spoke
  lexicon: HALOT
  rationale: The preposition ב with infinitive construct plus suffix commonly gives
    a temporal sense, here best rendered 'when he spoke' in smooth English. 'While
    he was speaking' is possible but the following clause reads naturally as a response
    after or during the speech without requiring durative emphasis.
- source_word: עִמִּי
  chosen: with me
  alternatives:
  - to me
  lexicon: HALOT
  rationale: The preposition עם normally means 'with.' In English, 'spoke with me'
    is natural and preserves the Hebrew wording better than shifting to 'spoke to
    me,' though the latter is idiomatic and contextually similar.
- source_word: כַּדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - such words
  - these things
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words' or 'matters/things.' In this immediate speech
    context, 'these words' is the most direct and natural rendering.
- source_word: נָתַתִּי פָנַי אַרְצָה
  chosen: I set my face toward the ground
  alternatives:
  - I turned my face to the ground
  - I lowered my face to the ground
  lexicon: HALOT
  rationale: The idiom literally uses 'gave/set my face earthward.' 'I set my face
    toward the ground' preserves the Hebrew image while remaining readable. 'Toward
    the ground' reflects the directional ending on אַרְצָה.
- source_word: אַרְצָה
  chosen: toward the ground
  alternatives:
  - to the earth
  - earthward
  lexicon: HALOT
  rationale: Though formally related to 'earth/land,' in this bodily posture context
    'ground' is the clearest English equivalent. The directional ending is represented
    by 'toward.'
- source_word: וְנֶאֱלָמְתִּי
  chosen: and became speechless
  alternatives:
  - and was silenced
  - and became mute
  lexicon: HALOT
  rationale: The Niphal of אלם here denotes becoming unable or unwilling to speak.
    'Became speechless' communicates the result naturally in modern English without
    implying a permanent physical muteness. 'Was silenced' could suggest external
    coercion more strongly than the context requires.
