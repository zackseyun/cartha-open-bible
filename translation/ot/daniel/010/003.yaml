id: DAN.10.3
reference: Daniel 10:3
source:
  edition: WLC
  text: לֶ֣חֶם חֲמֻד֞וֹת לֹ֣א אָכַ֗לְתִּי וּ/בָשָׂ֥ר וָ/יַ֛יִן לֹא בָ֥א אֶל פִּ֖/י
    וְ/ס֣וֹךְ לֹא סָ֑כְתִּי עַד מְלֹ֕את שְׁלֹ֥שֶׁת שָׁבֻעִ֖ים יָמִֽים־־־־׃פ
translation:
  text: I ate no delicacies, and no meat or wine entered my mouth, nor did I anoint
    myself at all, until the completion of three full weeks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'bread of desirabilities'; that is, choice or pleasant food.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'three weeks of days,' meaning three full weeks.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחֶם חֲמֻדוֹת
  chosen: delicacies
  alternatives:
  - pleasant bread
  - choice food
  - desirable food
  lexicon: HALOT
  rationale: The phrase is literally 'bread of desirabilities/precious things,' an
    idiom for rich or choice food rather than bread specifically. 'Delicacies' captures
    the idiomatic sense in natural English without over-paraphrasing.
- source_word: בָשָׂר
  chosen: meat
  alternatives:
  - flesh
  lexicon: HALOT
  rationale: In food context, 'meat' is the natural English equivalent. 'Flesh' would
    sound overly literal and less idiomatic here.
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: Standard and direct rendering.
- source_word: לֹא בָא אֶל־פִּי
  chosen: entered my mouth
  alternatives:
  - came into my mouth
  lexicon: HALOT
  rationale: This preserves the Hebrew idiom closely while remaining readable English.
    It refers to abstaining from consumption.
- source_word: סוֹךְ ... סָכְתִּי
  chosen: did I anoint myself at all
  alternatives:
  - did I oil myself
  - did I apply ointment to myself
  lexicon: HALOT
  rationale: The verb denotes anointing/applying oil to the body as normal grooming
    or refreshment. 'Anoint myself' is concise and accurate; 'at all' reflects the
    emphatic negation in context.
- source_word: עַד מְלֹאת
  chosen: until the completion of
  alternatives:
  - until were fulfilled
  - until the end of
  lexicon: HALOT
  rationale: The infinitive construct of מלא conveys the period being completed or
    fulfilled. 'Until the completion of' is slightly formal but clear and close to
    the Hebrew.
- source_word: שְׁלֹשֶׁת שָׁבֻעִים יָמִים
  chosen: three full weeks
  alternatives:
  - three weeks of days
  - three whole weeks
  lexicon: HALOT
  rationale: Literally 'three weeks, days,' an expression often understood as 'three
    full weeks' to distinguish from symbolic weeks. This is the clearest idiomatic
    English rendering while preserving the temporal force.
