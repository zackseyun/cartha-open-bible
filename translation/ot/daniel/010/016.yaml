id: DAN.10.16
reference: Daniel 10:16
source:
  edition: WLC
  text: וְ/הִנֵּ֗ה כִּ/דְמוּת֙ בְּנֵ֣י אָדָ֔ם נֹגֵ֖עַ עַל שְׂפָתָ֑/י וָ/אֶפְתַּח פִּ֗/י וָ/אֲדַבְּרָ/ה֙ וָ/אֹֽמְרָ/ה֙ אֶל הָ/עֹמֵ֣ד לְ/נֶגְדִּ֔/י אֲדֹנִ֗/י בַּ/מַּרְאָה֙ נֶהֶפְכ֤וּ צִירַ/י֙ עָלַ֔/י וְ/לֹ֥א עָצַ֖רְתִּי כֹּֽחַ־־־׃
translation:
  text: And behold[a], something like the likeness of a son of man touched my lips. Then I opened my mouth and spoke, and I said to the one standing before me, “My lord, because of the vision my pains have come upon me[c][b], and I have retained no strength.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or more idiomatically, ''one in human likeness'' or ''something like a human form.'' The Hebrew is unusually layered: ''something like the likeness of the sons of man.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'my anguish came upon me' or 'my pangs came upon me.' The Hebrew expression depicts intense distress overtaking Daniel.
    reason: lexical_alternative
  - marker: c
    text: Or 'and no strength remained in me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּדְמוּת בְּנֵי אָדָם
  chosen: something like the likeness of the sons of man
  alternatives:
  - one in human likeness
  - something like a human form
  - one like a man
  lexicon: HALOT
  rationale: 'The phrase is deliberately layered and somewhat indirect: כְּ marks comparison, דְּמוּת means ''likeness/form,'' and בְּנֵי אָדָם is literally ''sons of man/humans.'' Rendering the full expression preserves the visionary imprecision rather than collapsing it into a simpler idiom. ''Sons of man'' here is not a messianic title but an idiom for human beings.'
- source_word: נֹגֵעַ עַל שְׂפָתַי
  chosen: touched my lips
  alternatives:
  - was touching my lips
  - touched upon my lips
  lexicon: HALOT
  rationale: נגע with עַל commonly denotes touching. English idiom prefers 'touched my lips' rather than the more wooden 'touched upon my lips.' The participle in context is naturally rendered as a finite past action in the narrative sequence.
- source_word: וָאֶפְתַּח פִּי
  chosen: Then I opened my mouth
  alternatives:
  - and I opened my mouth
  lexicon: HALOT
  rationale: A standard Hebrew idiom for beginning to speak. 'Then' reflects the narrative progression and reads naturally in English while preserving the sequence.
- source_word: וָאֲדַבְּרָה וָאֹמְרָה
  chosen: and spoke, and I said
  alternatives:
  - and began to speak and said
  - and spoke and said
  lexicon: HALOT
  rationale: The cohortative-like forms here function in sequence after the opening of the mouth. Keeping both verbs preserves the Hebrew's fullness rather than reducing them to a single English verb.
- source_word: הָעֹמֵד לְנֶגְדִּי
  chosen: the one standing before me
  alternatives:
  - the one standing opposite me
  - the one standing in front of me
  lexicon: HALOT
  rationale: לְנֶגֶד indicates being in front of or opposite. 'Before me' is natural English and fits the reverential setting.
- source_word: אֲדֹנִי
  chosen: My lord
  alternatives:
  - Lord
  - sir
  - my master
  lexicon: HALOT
  rationale: Here אֲדֹנִי is a respectful address to the heavenly figure, not the divine name. Lowercase 'lord' avoids conflating it with YHWH while preserving deference. 'Sir' is too weak for the scene; 'master' may overstate servile nuance.
- source_word: בַּמַּרְאָה
  chosen: because of the vision
  alternatives:
  - in the vision
  - by the vision
  - at the vision
  lexicon: HALOT
  rationale: In context Daniel explains the cause of his distress. The preposition ב can be rendered causally here, and 'because of the vision' best conveys the sense in idiomatic English.
- source_word: נֶהֶפְכוּ צִירַי עָלַי
  chosen: my pains have come upon me
  alternatives:
  - my anguish has turned upon me
  - my convulsions came upon me
  - my pangs came upon me
  lexicon: HALOT
  rationale: צִירִים can denote pains, pangs, or writhing distress. Combined with נהפכו עלי, the sense is that intense pain/distress has overtaken him. 'Pains have come upon me' is clear modern English without over-specifying the bodily imagery.
- source_word: וְלֹא עָצַרְתִּי כֹחַ
  chosen: and I have retained no strength
  alternatives:
  - and I kept no strength
  - and no strength remained in me
  - and I could not muster strength
  lexicon: HALOT
  rationale: עצר in this construction conveys holding back, retaining, or maintaining. The sense is that Daniel has no strength left. 'Retained no strength' stays close to the Hebrew while remaining readable.
