theological_decisions:
- issue: Rendering of בְּנֵי אָדָם in a visionary description
  chosen_reading: 'non-titular human reference: ''sons of man'' within ''something like the likeness of the sons of man'''
  alternative_readings:
  - messianic 'Son of Man' allusion
  - generic smoothing to 'human form'
  rationale: The phrase is plural and embedded in a comparison formula, so it should not be rendered as the title 'Son of Man.' Preserving the human-reference language avoids importing christological significance the text itself does not state.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; do not import doctrinal claims the text does not make.'
- issue: Rendering of אֲדֹנִי
  chosen_reading: My lord
  alternative_readings:
  - My Lord
  - sir
  - my master
  rationale: This is a respectful address to the figure in the vision, not the covenant name YHWH. Lowercase 'lord' preserves reverence without implying identity with the LORD.
  doctrine_reference: 'DOCTRINE.md contested terms: YHWH rendered ''the LORD''; titles translated according to source sense.'
