theological_decisions:
- issue: Rendering of אֲדֹנִי in a human-address context
  chosen_reading: my lord
  alternative_readings:
  - my master
  rationale: The term here refers to an exalted figure addressed directly, but not
    to the divine name YHWH. 'My lord' preserves the respectful, elevated register
    without importing the covenantal rendering 'the LORD.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; and contested
    term guidance for κύριος/Lord by analogy to title rendering.'
