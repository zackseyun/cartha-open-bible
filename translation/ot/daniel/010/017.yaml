id: DAN.10.17
reference: Daniel 10:17
source:
  edition: WLC
  text: וְ/הֵ֣יךְ יוּכַ֗ל עֶ֤בֶד אֲדֹנִ/י֙ זֶ֔ה לְ/דַבֵּ֖ר עִם אֲדֹ֣נִ/י זֶ֑ה וַ/אֲנִ֤י
    מֵ/עַ֨תָּה֙ לֹֽא יַעֲמָד בִּ֣/י כֹ֔חַ וּ/נְשָׁמָ֖ה לֹ֥א נִשְׁאֲרָה בִֽ/י־־־־׃
translation:
  text: So how can this servant of my lord speak with my lord like this? As for me,
    from now on no strength remains in me, and no breath is left in me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my master' in both occurrences of 'my lord.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'this servant of my lord ... my lord like this,' with the repeated
      'this' expressing immediacy; the English smooths the repetition idiomatically.
    reason: lexical_alternative
  - marker: c
    text: Or 'now' for 'from now on.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵיךְ
  chosen: So how can
  alternatives:
  - And how can
  - How can
  lexicon: HALOT
  rationale: Introduces a rhetorical question flowing from the previous verse. 'So
    how can' captures both the conjunction and the interrogative force in natural
    English.
- source_word: יוּכַל
  chosen: can
  alternatives:
  - be able to
  lexicon: HALOT
  rationale: The verb denotes ability. 'Can' is the most natural English equivalent
    in this rhetorical question.
- source_word: עֶבֶד אֲדֹנִי זֶה
  chosen: this servant of my lord
  alternatives:
  - this servant of my master
  lexicon: HALOT
  rationale: עֶבֶד here is a courtly self-designation of humility, not a statement
    about chattel status, so 'servant' fits better than 'slave.' אֲדֹנִי in this human-address
    context is best rendered 'my lord' rather than the more modern but potentially
    flattening 'master.' זֶה is retained as 'this' for the speaker's self-reference.
- source_word: לְדַבֵּר עִם
  chosen: speak with
  alternatives:
  - talk with
  - speak to
  lexicon: HALOT
  rationale: The idiom is straightforward. 'Speak with' preserves the preposition
    עִם ('with') and the formal tone.
- source_word: אֲדֹנִי זֶה
  chosen: my lord like this
  alternatives:
  - my lord this one
  - my lord here
  lexicon: HALOT
  rationale: The repeated זֶה is awkward if rendered woodenly in English. In context
    it points to the immediate encounter and manner of address; 'like this' conveys
    the deictic force idiomatically.
- source_word: וַאֲנִי
  chosen: As for me
  alternatives:
  - And I
  - But I
  lexicon: HALOT
  rationale: Marks a shift to Daniel's own condition. 'As for me' brings out the emphatic
    pronoun naturally.
- source_word: מֵעַתָּה
  chosen: from now on
  alternatives:
  - now
  - at this time
  lexicon: HALOT
  rationale: The phrase literally means 'from now' or 'from this time.' In context
    it refers to Daniel's present state following the vision; 'from now on' is a natural
    rendering, though the temporal force is immediate rather than long-term.
- source_word: לֹא יַעֲמָד בִּי כֹחַ
  chosen: no strength remains in me
  alternatives:
  - strength does not stand in me
  - I have no strength left
  lexicon: HALOT
  rationale: The Hebrew idiom 'stand in me' means that strength is not remaining or
    holding up within him. 'No strength remains in me' preserves the internal sense
    while reading naturally.
- source_word: וּנְשָׁמָה
  chosen: and no breath
  alternatives:
  - and no spirit
  - and no life-breath
  lexicon: HALOT
  rationale: נְשָׁמָה commonly denotes breath or life-breath. Here, paired with loss
    of strength, it most naturally refers to physical breath rather than the human
    spirit.
- source_word: לֹא נִשְׁאֲרָה בִּי
  chosen: is left in me
  alternatives:
  - remains in me
  - has remained in me
  lexicon: HALOT
  rationale: The Niphal of שׁאר expresses what is left or remains. 'Is left in me'
    is idiomatic and fits the physical exhaustion described.
