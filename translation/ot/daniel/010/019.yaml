theological_decisions:
- issue: Rendering of אֲדֹנִי in address to the speaker
  chosen_reading: my lord
  alternative_readings:
  - my master
  - Lord
  rationale: The Hebrew form is a respectful singular address. In this context it
    refers to the figure speaking with Daniel, not the Tetragrammaton. Lowercase 'my
    lord' preserves the honorific sense without importing a stronger theological identification
    than the verse itself states.
  doctrine_reference: Translation philosophy §1, §3
