id: DAN.10.19
reference: Daniel 10:19
source:
  edition: WLC
  text: וַ/יֹּ֜אמֶר אַל תִּירָ֧א אִישׁ חֲמֻד֛וֹת שָׁל֥וֹם לָ֖/ךְ חֲזַ֣ק וַ/חֲזָ֑ק
    וּֽ/בְ/דַבְּר֤/וֹ עִמִּ/י֙ הִתְחַזַּ֔קְתִּי וָ/אֹֽמְרָ֛/ה יְדַבֵּ֥ר אֲדֹנִ֖/י
    כִּ֥י חִזַּקְתָּֽ/נִי־־׃
translation:
  text: And he said, “Do not fear, man greatly beloved; peace be to you. Be strong,
    yes, be strong.” And when he spoke with me, I was strengthened and said, “Let
    my lord speak, for you have strengthened me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “highly esteemed man” or “man much desired.” The Hebrew expression literally
      reads “man of desires/preciousness,” an idiom of special favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ חֲמֻדוֹת
  chosen: man greatly beloved
  alternatives:
  - man of preciousness
  - man much desired
  - highly esteemed man
  lexicon: HALOT
  rationale: The construct-like expression literally combines 'man' with 'desires/precious
    things,' functioning idiomatically as an address of special favor or preciousness.
    'Greatly beloved' is natural English and preserves the personal, affectionate
    force better than a more wooden 'man of preciousness.' 'Man' is retained for gender
    accuracy because the addressee is Daniel, a male individual, not generic humanity.
- source_word: שָׁלוֹם לָךְ
  chosen: peace be to you
  alternatives:
  - peace to you
  - peace to you!
  lexicon: HALOT
  rationale: שָׁלוֹם here is a blessing/wish formula, not merely an abstract noun.
    'Peace be to you' makes the benedictory force explicit in idiomatic English while
    staying close to the Hebrew.
- source_word: חֲזַק וַחֲזָק
  chosen: Be strong, yes, be strong
  alternatives:
  - be strong and strong
  - take courage, yes, take courage
  - be strong, indeed be strong
  lexicon: HALOT
  rationale: The repeated imperative intensifies the exhortation. Rendering the first
    as 'be strong' and the second with emphatic 'yes' preserves the repetition and
    rhetorical force without sounding unnatural. 'Take courage' is possible but shifts
    from strength language; retaining 'strong' also matches the later strengthening
    verb.
- source_word: וּבְדַבְּרוֹ עִמִּי
  chosen: when he spoke with me
  alternatives:
  - while he was speaking with me
  - as he spoke with me
  lexicon: HALOT
  rationale: The preposition with infinitive construct plus suffix gives a temporal
    sense. 'When he spoke with me' is smooth English and fits the narrative sequence.
- source_word: הִתְחַזַּקְתִּי
  chosen: I was strengthened
  alternatives:
  - I grew strong
  - I strengthened myself
  lexicon: HALOT
  rationale: The Hitpael here conveys entering a strengthened state in response to
    the speaker's words. 'I was strengthened' best captures the resultant effect in
    context and aligns with the following acknowledgment, 'you have strengthened me.'
- source_word: יְדַבֵּר אֲדֹנִי
  chosen: Let my lord speak
  alternatives:
  - May my lord speak
  - my lord may speak
  lexicon: HALOT
  rationale: The imperfect here has jussive force in polite request. Lowercase 'lord'
    is appropriate because this is a respectful address to the heavenly messenger,
    not the divine name or necessarily a messianic title.
- source_word: כִּי חִזַּקְתָּנִי
  chosen: for you have strengthened me
  alternatives:
  - because you have made me strong
  - for you have encouraged me
  lexicon: HALOT
  rationale: The causal conjunction explains why Daniel is now ready to hear. 'Strengthened'
    preserves the lexical link with the repeated חזק forms throughout the verse.
