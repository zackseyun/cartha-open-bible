theological_decisions:
- issue: Identity of the 'prince of the kingdom of Persia' and 'chief princes'
  chosen_reading: Retain 'prince' language without specifying in the main text whether these are angelic beings, human rulers, or both in a layered sense.
  alternative_readings:
  - supernatural territorial angel/prince
  - human political ruler
  - a blended heavenly-earthly representation
  rationale: The context strongly suggests supernatural conflict, especially with Michael in parallel, but the translation should not import an interpretive gloss such as 'angel' where the Hebrew says שַׂר. Preserving 'prince' keeps the text auditable and lets the context carry the implication.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of מַלְכֵי פָרָס in the plural
  chosen_reading: Translate literally as 'the kings of Persia.'
  alternative_readings:
  - the king of Persia
  - the Persian kings as a dynastic/plural expression
  rationale: The Hebrew is plural, and the translation should preserve that form rather than smooth it into the singular. The plural may refer to the Persian royal line or to multiple royal authorities, but the text itself should remain literal here.
  doctrine_reference: Original-language primacy over translation tradition.
