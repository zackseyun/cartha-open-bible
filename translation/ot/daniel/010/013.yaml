id: DAN.10.13
reference: Daniel 10:13
source:
  edition: WLC
  text: וְ/שַׂ֣ר מַלְכ֣וּת פָּרַ֗ס עֹמֵ֤ד לְ/נֶגְדִּ/י֙ עֶשְׂרִ֣ים וְ/אֶחָ֣ד י֔וֹם וְ/הִנֵּ֣ה מִֽיכָאֵ֗ל אַחַ֛ד הַ/שָּׂרִ֥ים הָ/רִאשֹׁנִ֖ים בָּ֣א לְ/עָזְרֵ֑/נִי וַ/אֲנִי֙ נוֹתַ֣רְתִּי שָׁ֔ם אֵ֖צֶל מַלְכֵ֥י פָרָֽס׀׃
translation:
  text: But the prince of the kingdom of Persia stood against me for twenty-one days[a], and behold, Michael, one of the chief princes, came to help me[b], and I was left there beside the kings of Persia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one of the first princes' or 'one of the foremost princes.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the kings of Persia'; some translations smooth this to 'the king of Persia,' but the Hebrew text is plural.
    reason: alternative_reading
lexical_decisions:
- source_word: שַׂר
  chosen: prince
  alternatives:
  - ruler
  - commander
  lexicon: HALOT
  rationale: In Daniel's angelic-political context, שַׂר denotes a high-ranking ruler/prince, likely a supernatural patron associated with a nation. 'Prince' preserves the ambiguity between political and heavenly rank better than 'commander' and matches the parallel use for Michael.
- source_word: מַלְכוּת פָּרַס
  chosen: the kingdom of Persia
  alternatives:
  - the realm of Persia
  - Persia
  lexicon: HALOT
  rationale: מַלְכוּת is 'kingdom/realm.' Rendering the full construct as 'the kingdom of Persia' preserves the formal relationship in the Hebrew and clarifies that the prince is associated with Persia's dominion.
- source_word: עֹמֵד לְנֶגְדִּי
  chosen: stood against me
  alternatives:
  - was standing opposite me
  - opposed me
  lexicon: HALOT
  rationale: The participle with לְנֶגֶד conveys standing in opposition. 'Stood against me' is idiomatic English that preserves the adversarial force without over-paraphrasing.
- source_word: עֶשְׂרִים וְאֶחָד יוֹם
  chosen: for twenty-one days
  alternatives:
  - twenty-one days
  lexicon: HALOT
  rationale: English idiom naturally supplies 'for' with a duration expression. The numeral is rendered in standard modern English as 'twenty-one.'
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - then
  lexicon: HALOT
  rationale: הִנֵּה marks sudden attention or vividness. 'Behold' preserves the discourse force and solemn tone better than a flattened connective.
- source_word: מִיכָאֵל
  chosen: Michael
  rationale: Personal names are transliterated by standard convention per project philosophy.
- source_word: אַחַד הַשָּׂרִים הָרִאשֹׁנִים
  chosen: one of the chief princes
  alternatives:
  - one of the first princes
  - one of the foremost princes
  lexicon: HALOT
  rationale: הָרִאשֹׁנִים can mean 'first' in rank or prominence. 'Chief' communicates status naturally in English while preserving the hierarchical sense among the princes.
- source_word: בָּא לְעָזְרֵנִי
  chosen: came to help me
  alternatives:
  - came to assist me
  lexicon: HALOT
  rationale: A straightforward rendering of motion plus infinitive. 'Help' is more natural modern English than 'assist' while remaining accurate.
- source_word: נוֹתַרְתִּי
  chosen: I was left
  alternatives:
  - I remained
  - I was left behind
  lexicon: HALOT
  rationale: The Niphal of יתר can mean 'be left, remain.' 'I was left' best reflects the passive nuance and explains why the messenger could continue after Michael's intervention.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Simple locative adverb; retained for spatial continuity in the narrative.
- source_word: אֵצֶל מַלְכֵי פָרָס
  chosen: with the kings of Persia
  alternatives:
  - beside the kings of Persia
  - against the kings of Persia
  lexicon: HALOT
  rationale: אֵצֶל commonly means 'beside, with, in the company of.' 'With the kings of Persia' is the most natural rendering, though the exact nuance is difficult in context. The plural 'kings' is retained as in the Hebrew rather than harmonized to singular.
