id: DAN.10.12
reference: Daniel 10:12
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ/י֮ אַל תִּירָ֣א דָנִיֵּאל֒ כִּ֣י מִן הַ/יּ֣וֹם הָ/רִאשׁ֗וֹן
    אֲשֶׁ֨ר נָתַ֧תָּ אֶֽת לִבְּ/ךָ֛ לְ/הָבִ֧ין וּ/לְ/הִתְעַנּ֛וֹת לִ/פְנֵ֥י אֱלֹהֶ֖י/ךָ
    נִשְׁמְע֣וּ דְבָרֶ֑י/ךָ וַ/אֲנִי בָ֖אתִי בִּ/דְבָרֶֽי/ךָ־׀־־־׃
translation:
  text: Then he said to me, “Do not fear, Daniel, because from the first day that
    you set your heart to understand and to humble yourself before your God, your
    words were heard, and I have come because of your words.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to afflict yourself.” The Hebrew can denote self-denial or self-humbling
      in a devotional context.
    reason: lexical_alternative
  - marker: b
    text: Or “in response to your words.”
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּירָא
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: Imperative + negative from ירא naturally yields a prohibition of fear.
    'Do not fear' is slightly more formal and concise, fitting angelic reassurance
    language while remaining natural English.
- source_word: מִן הַיּוֹם הָרִאשׁוֹן
  chosen: from the first day
  alternatives:
  - since the first day
  lexicon: HALOT
  rationale: A straightforward temporal expression. 'From the first day' preserves
    the Hebrew structure; 'since the first day' is possible but slightly more interpretive.
- source_word: נָתַתָּ אֶת לִבְּךָ
  chosen: you set your heart
  alternatives:
  - you gave your heart
  - you applied your mind
  lexicon: HALOT
  rationale: This Hebrew idiom means to direct one's inner resolve or attention toward
    something. 'Set your heart' preserves the idiom and its affective-volitional force
    better than a purely cognitive paraphrase.
- source_word: לְהָבִין
  chosen: to understand
  alternatives:
  - to gain understanding
  - to discern
  lexicon: HALOT
  rationale: בין in the Hiphil commonly means to understand or gain insight. 'To understand'
    is the clearest and most direct rendering here.
- source_word: וּלְהִתְעַנּוֹת
  chosen: to humble yourself
  alternatives:
  - to afflict yourself
  - to deny yourself
  lexicon: HALOT
  rationale: The Hitpael of ענה here refers to self-humbling or self-affliction in
    a devotional context. 'To humble yourself' communicates the religious posture
    clearly in modern English without over-specifying ascetic practice; the more literal
    'afflict yourself' is preserved as an alternative.
- source_word: לִפְנֵי אֱלֹהֶיךָ
  chosen: before your God
  alternatives:
  - in the presence of your God
  lexicon: HALOT
  rationale: לִפְנֵי is a standard relational/spatial expression meaning 'before,
    in the presence of.' 'Before your God' is idiomatic and preserves the devotional
    setting.
- source_word: נִשְׁמְעוּ דְבָרֶיךָ
  chosen: your words were heard
  alternatives:
  - your words have been heard
  - your prayers were heard
  lexicon: HALOT
  rationale: The Niphal of שמע here is best rendered as divine hearing of Daniel's
    spoken petitions. 'Your words were heard' stays close to the Hebrew; 'your prayers'
    would be interpretive, though contextually plausible.
- source_word: וַאֲנִי בָאתִי בִּדְבָרֶיךָ
  chosen: and I have come because of your words
  alternatives:
  - and I have come in response to your words
  - and I came because of your words
  lexicon: HALOT
  rationale: The preposition ב with דְבָרֶיךָ is idiomatically causal or responsive
    here. 'Because of your words' is a transparent rendering; 'in response to your
    words' is also possible but slightly more expansive. The English present perfect
    'have come' fits the speaker's present arrival with past causation.
