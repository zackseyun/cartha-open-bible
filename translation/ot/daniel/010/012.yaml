theological_decisions:
- issue: Meaning of Daniel's devotional action in וּלְהִתְעַנּוֹת
  chosen_reading: to humble yourself
  alternative_readings:
  - to afflict yourself
  rationale: The verse describes Daniel's penitential/devotional posture before God
    without requiring a technical ascetic term in English. 'To humble yourself' preserves
    the spiritual sense and avoids importing a narrower ritual claim, while the more
    literal alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §3, §6
- issue: Force of בִּדְבָרֶיךָ at the end of the verse
  chosen_reading: because of your words
  alternative_readings:
  - in response to your words
  rationale: The text indicates that the messenger's coming is occasioned by Daniel's
    words. 'Because of your words' preserves the causal link without over-interpreting
    the mechanics of angelic mission.
  doctrine_reference: Translation philosophy §1, §3
