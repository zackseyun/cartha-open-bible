id: DAN.10.10
reference: Daniel 10:10
source:
  edition: WLC
  text: וְ/הִנֵּה יָ֖ד נָ֣גְעָה בִּ֑/י וַ/תְּנִיעֵ֥/נִי עַל בִּרְכַּ֖/י וְ/כַפּ֥וֹת
    יָדָֽ/י־־׃
translation:
  text: And behold, a hand touched me and set me trembling on my knees and the palms
    of my hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shook me' or 'moved me'; the Hebrew verb can denote causing someone
      to move or tremble.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - And look
  - Suddenly
  lexicon: HALOT
  rationale: Retains the discourse marker's vivid, attention-directing force. 'Behold'
    is slightly formal but still natural in prophetic/narrative context and preserves
    the suddenness better than a flatter connective alone.
- source_word: יָד
  chosen: a hand
  alternatives:
  - the hand
  lexicon: HALOT
  rationale: The noun is anarthrous here, so 'a hand' best reflects the Hebrew. This
    also preserves the narrative suspense about whose hand it is.
- source_word: נָגְעָה בִּי
  chosen: touched me
  alternatives:
  - reached me
  - struck me
  lexicon: HALOT
  rationale: נגע commonly means 'touch' or 'reach.' In this context of physical contact
    that revives or moves Daniel, 'touched me' is the plain and natural rendering.
- source_word: וַתְּנִיעֵנִי
  chosen: set me trembling
  alternatives:
  - shook me
  - moved me
  lexicon: HALOT
  rationale: The Hiphil of נוע can mean to cause to move, shake, or make tremble.
    Given Daniel's weakened state in the immediate context, 'set me trembling' captures
    both the causative sense and the bodily instability implied, better than the more
    mechanical 'moved me.'
- source_word: עַל
  chosen: 'on'
  alternatives:
  - onto
  lexicon: HALOT
  rationale: The preposition straightforwardly indicates resulting position. 'On'
    is idiomatic in English with body posture.
- source_word: בִּרְכַּי
  chosen: my knees
  lexicon: HALOT
  rationale: Direct rendering of the plural construct with first-person suffix.
- source_word: וְכַפּוֹת יָדַי
  chosen: and the palms of my hands
  alternatives:
  - and my hands
  - and the soles of my hands
  lexicon: HALOT
  rationale: כפות ידיים refers specifically to the palms/hollows of the hands, not
    merely 'hands.' Rendering the phrase fully preserves the bodily image of being
    positioned on knees and hands.
