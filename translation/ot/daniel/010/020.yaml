id: DAN.10.20
reference: Daniel 10:20
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר הֲ/יָדַ֨עְתָּ֙ לָ/מָּה בָּ֣אתִי אֵלֶ֔י/ךָ וְ/עַתָּ֣ה אָשׁ֔וּב לְ/הִלָּחֵ֖ם עִם שַׂ֣ר פָּרָ֑ס וַ/אֲנִ֣י יוֹצֵ֔א וְ/הִנֵּ֥ה שַׂר יָוָ֖ן בָּֽא־־־׃
translation:
  text: Then he said[a], “Do you know why I have come to you? And now I will return to fight against the prince of Persia; and when I go out, behold[c][b], the prince of Greece is coming.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''and I am going out''; the Hebrew clause is terse, and the exact nuance may be either simple departure or a temporal sequence: ''when I go out.'''
    reason: lexical_alternative
  - marker: b
    text: '''Prince'' here likely refers to a supernatural ruler associated with a nation, though the text does not explicitly label him as such in this verse.'
    reason: alternative_reading
  - marker: c
    text: Hebrew 'Javan,' a term commonly referring to Greece or the Greek realm.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיָדַעְתָּ
  chosen: Do you know
  alternatives:
  - Have you understood
  - Do you understand
  lexicon: HALOT
  rationale: The interrogative with ידע naturally asks whether Daniel knows/understands the reason for the speaker's coming. 'Do you know' is idiomatic modern English and fits the immediate context.
- source_word: לָמָּה
  chosen: why
  alternatives:
  - for what reason
  lexicon: HALOT
  rationale: Standard interrogative of reason; 'why' is the most natural concise rendering.
- source_word: בָּאתִי אֵלֶיךָ
  chosen: I have come to you
  alternatives:
  - I came to you
  lexicon: HALOT
  rationale: English present perfect best conveys the relevance of the completed action to the present conversation, while remaining faithful to the Hebrew perfect.
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: The conjunction plus temporal adverb marks progression in the discourse. 'And now' preserves the transition.
- source_word: אָשׁוּב
  chosen: I will return
  alternatives:
  - I am returning
  - I will go back
  lexicon: HALOT
  rationale: The imperfect here is future-oriented in context. 'Return' fits the narrative sense of going back to a prior conflict.
- source_word: לְהִלָּחֵם עִם
  chosen: to fight against
  alternatives:
  - to wage war with
  - to contend with
  lexicon: HALOT
  rationale: The infinitive of לחם with עִם denotes engaging in conflict. 'Fight against' makes the adversarial sense explicit in natural English.
- source_word: שַׂר פָּרָס
  chosen: the prince of Persia
  alternatives:
  - the ruler of Persia
  lexicon: HALOT
  rationale: שַׂר commonly means 'prince,' 'chief,' or 'official.' In Daniel 10 the term refers to a supernatural territorial ruler, and 'prince' preserves the established sense without over-interpreting.
- source_word: וַאֲנִי יוֹצֵא
  chosen: when I go out
  alternatives:
  - and I am going out
  - and I go out
  - and I leave
  lexicon: HALOT
  rationale: The clause is somewhat terse. Rendering it temporally as 'when I go out' best captures the sequence before the following 'behold' clause in idiomatic English. This avoids an awkward coordinate 'and I go out' while preserving the sense of departure.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: The particle draws attention to what follows. 'Behold' preserves the heightened, solemn tone of the vision better than the more colloquial 'look' or 'see.'
- source_word: שַׂר יָוָן
  chosen: the prince of Greece
  alternatives:
  - the prince of Javan
  lexicon: HALOT
  rationale: יָוָן in this context conventionally denotes Greece/Greek power. 'Greece' communicates the referent clearly to modern readers; 'Javan' would be less transparent here.
- source_word: בָּא
  chosen: is coming
  alternatives:
  - comes
  - is about to come
  lexicon: HALOT
  rationale: The participial form conveys an action in progress or imminent approach. 'Is coming' is the most natural English equivalent.
