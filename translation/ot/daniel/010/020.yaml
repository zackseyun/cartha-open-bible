theological_decisions:
- issue: Identity of 'the prince of Persia' and 'the prince of Greece'
  chosen_reading: Retain 'prince' in the main text without specifying 'angelic' or 'demonic.'
  alternative_readings:
  - supernatural territorial prince
  - human political ruler
  rationale: The broader context strongly suggests supernatural beings, but the translation should not import an interpretive label not explicit in the Hebrew wording of this verse. Preserving 'prince' maintains the text's theological tension and lets the context inform interpretation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
