id: DAN.10.7
reference: Daniel 10:7
source:
  edition: WLC
  text: וְ/רָאִיתִי֩ אֲנִ֨י דָנִיֵּ֤אל לְ/בַדִּ/י֙ אֶת הַ/מַּרְאָ֔ה וְ/הָ/אֲנָשִׁים֙
    אֲשֶׁ֣ר הָי֣וּ עִמִּ֔/י לֹ֥א רָא֖וּ אֶת הַ/מַּרְאָ֑ה אֲבָ֗ל חֲרָדָ֤ה גְדֹלָה֙
    נָפְלָ֣ה עֲלֵי/הֶ֔ם וַֽ/יִּבְרְח֖וּ בְּ/הֵחָבֵֽא־־׃
translation:
  text: And I, Daniel, alone saw the vision, and the men who were with me did not
    see the vision; but a great trembling fell upon them, and they fled to hide themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a great terror fell upon them.' The Hebrew חֲרָדָה can denote trembling,
      dread, or terror.
    reason: lexical_alternative
  - marker: b
    text: Or 'they fled and hid themselves' / 'they fled into hiding.' The Hebrew
      infinitive בְּהֵחָבֵא expresses the purpose or manner of their flight.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאִיתִי
  chosen: And ... saw
  alternatives:
  - And ... looked at
  - And ... perceived
  lexicon: HALOT
  rationale: Qal perfect of ראה here reports completed visual perception. 'Saw' is
    the plain English equivalent and fits the narrative sequence.
- source_word: אֲנִי דָנִיֵּאל
  chosen: I, Daniel,
  alternatives:
  - I Daniel,
  lexicon: HALOT
  rationale: The explicit pronoun plus name is emphatic. Rendering as 'I, Daniel,'
    preserves the self-identification and emphasis without awkwardness.
- source_word: לְבַדִּי
  chosen: alone
  alternatives:
  - by myself
  - only I
  lexicon: HALOT
  rationale: 'The term marks exclusivity: Daniel alone saw the vision. ''Alone'' is
    concise and natural in English.'
- source_word: הַמַּרְאָה
  chosen: the vision
  alternatives:
  - the appearance
  - the sight
  lexicon: HALOT
  rationale: מַרְאָה can denote appearance or visionary sight. In Daniel's apocalyptic
    context, 'vision' best captures the revelatory experience rather than merely an
    outward appearance.
- source_word: וְהָאֲנָשִׁים אֲשֶׁר הָיוּ עִמִּי
  chosen: and the men who were with me
  alternatives:
  - and the people who were with me
  lexicon: HALOT
  rationale: אֲנָשִׁים is grammatically masculine plural and ordinarily means 'men.'
    Per translation philosophy, gender-accurate rendering is preferred unless context
    clearly broadens it.
- source_word: לֹא רָאוּ אֶת הַמַּרְאָה
  chosen: did not see the vision
  alternatives:
  - did not see the appearance
  lexicon: HALOT
  rationale: Repeats the earlier wording for consistency and preserves the contrast
    between Daniel and his companions.
- source_word: אֲבָל
  chosen: but
  alternatives:
  - however
  - yet
  lexicon: HALOT
  rationale: Simple adversative linking their not seeing with their nevertheless reacting
    in fear.
- source_word: חֲרָדָה גְדֹלָה
  chosen: a great trembling
  alternatives:
  - great terror
  - a great dread
  lexicon: HALOT
  rationale: חֲרָדָה can denote trembling, terror, or dread. 'A great trembling' preserves
    the bodily and emotional force and matches the verb 'fell upon them' idiomatically.
- source_word: נָפְלָה עֲלֵיהֶם
  chosen: fell upon them
  alternatives:
  - came over them
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for an overpowering experience. 'Fell upon
    them' keeps the vivid metaphor of the source text.
- source_word: וַיִּבְרְחוּ
  chosen: and they fled
  alternatives:
  - and they ran away
  lexicon: HALOT
  rationale: The wayyiqtol advances the narrative. 'Fled' is more literary and suitably
    weighty for a fear response.
- source_word: בְּהֵחָבֵא
  chosen: to hide themselves
  alternatives:
  - into hiding
  - to hide
  lexicon: HALOT
  rationale: The infinitive conveys purpose or result accompanying their flight. 'To
    hide themselves' makes the reflexive sense explicit and reads naturally in English.
