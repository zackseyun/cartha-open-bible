id: DAN.10.6
reference: Daniel 10:6
source:
  edition: WLC
  text: וּ/גְוִיָּת֣/וֹ כְ/תַרְשִׁ֗ישׁ וּ/פָנָ֞י/ו כְּ/מַרְאֵ֤ה בָרָק֙ וְ/עֵינָי/ו֙ כְּ/לַפִּ֣ידֵי אֵ֔שׁ וּ/זְרֹֽעֹתָי/ו֙ וּ/מַרְגְּלֹתָ֔י/ו כְּ/עֵ֖ין נְחֹ֣שֶׁת קָלָ֑ל וְ/ק֥וֹל דְּבָרָ֖י/ו כְּ/ק֥וֹל הָמֽוֹן׃
translation:
  text: His body was like beryl[a], his face like the appearance of lightning, his eyes like torches of fire, his arms and his feet like the gleam of polished bronze[c][b], and the sound of his words like the sound of a multitude.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'topaz,' 'chrysolite,' or another precious stone; the exact identification of Hebrew tarshish is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'like the appearance of burnished bronze.'
    reason: lexical_alternative
  - marker: c
    text: Or 'like the sound of a crowd' or 'like the roar of a multitude.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גְוִיָּתוֹ
  chosen: his body
  alternatives:
  - his torso
  - his form
  lexicon: HALOT
  rationale: גְוִיָּה refers to the body or physical frame. 'His body' is the most natural and sufficiently concrete English rendering in this visionary description.
- source_word: כְתַרְשִׁישׁ
  chosen: like beryl
  alternatives:
  - like topaz
  - like chrysolite
  - like Tarshish-stone
  lexicon: HALOT
  rationale: תַרְשִׁישׁ names a precious stone, but its exact mineral identification is uncertain. 'Beryl' is a common modern English rendering and preserves the gemstone imagery without overclaiming precision; the uncertainty is worth preserving in a footnote.
- source_word: פָנָיו
  chosen: his face
  alternatives:
  - his face/presence
  lexicon: HALOT
  rationale: Though פָּנִים can mean 'face' or 'presence,' the immediate sequence describes visible features, so 'his face' best fits the context.
- source_word: כְמַרְאֵה בָרָק
  chosen: like the appearance of lightning
  alternatives:
  - like lightning
  - like the look of lightning
  lexicon: HALOT
  rationale: מַרְאֶה adds the nuance of visible appearance. Retaining 'the appearance of' reflects the Hebrew more closely than the simpler 'like lightning' while remaining readable.
- source_word: עֵינָיו
  chosen: his eyes
  lexicon: HALOT
  rationale: Straightforward anatomical term in a visual description.
- source_word: כְלַפִּידֵי אֵשׁ
  chosen: like torches of fire
  alternatives:
  - like flaming torches
  - like firebrands
  lexicon: HALOT
  rationale: לַפִּיד denotes a torch or flaming brand. 'Torches of fire' is a natural, vivid rendering that preserves the Hebrew genitive imagery.
- source_word: זְרֹעֹתָיו
  chosen: his arms
  alternatives:
  - his forearms
  lexicon: HALOT
  rationale: זְרוֹעַ commonly means 'arm.' No narrower rendering is demanded here.
- source_word: מַרְגְּלֹתָיו
  chosen: his feet
  alternatives:
  - his legs
  - his lower limbs
  lexicon: HALOT
  rationale: Though the term can refer to feet or lower extremities, 'feet' is the standard and best fits the parallel with Revelation-like visionary language.
- source_word: כְעֵין נְחֹשֶׁת קָלָל
  chosen: like the gleam of polished bronze
  alternatives:
  - like the appearance of burnished bronze
  - like gleaming bronze
  lexicon: HALOT
  rationale: עֵין in this idiom means 'appearance' or 'gleam.' נְחֹשֶׁת is bronze/copper, and קָלָל here likely conveys something polished, burnished, or glowing. 'The gleam of polished bronze' captures both the visual idiom and the likely sense of the adjective in smooth English.
- source_word: קוֹל דְּבָרָיו
  chosen: the sound of his words
  alternatives:
  - the sound of his speech
  - the voice of his words
  lexicon: HALOT
  rationale: Literally 'the sound/voice of his words.' 'The sound of his words' preserves the Hebrew structure and emphasizes the auditory effect of his speech.
- source_word: כְקוֹל הָמוֹן
  chosen: like the sound of a multitude
  alternatives:
  - like the sound of a crowd
  - like the roar of a multitude
  - like the sound of an uproar
  lexicon: HALOT
  rationale: הָמוֹן denotes a multitude, crowd, or tumultuous noise. 'Like the sound of a multitude' preserves the ambiguity between many people and the overwhelming noise they make, matching the Hebrew image well.
