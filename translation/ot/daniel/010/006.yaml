theological_decisions:
- issue: Nature of the figure described
  chosen_reading: Render the description straightforwardly as a visionary humanlike figure without identifying him in the translation text.
  alternative_readings:
  - an angelic messenger
  - a theophanic manifestation
  - a preincarnate appearance of Christ
  rationale: The verse itself gives a descriptive vision but does not explicitly identify the figure. To avoid importing doctrinal conclusions the text does not state, the translation remains descriptive and leaves identification to interpretation.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
