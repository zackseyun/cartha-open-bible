id: DAN.10.5
reference: Daniel 10:5
source:
  edition: WLC
  text: וָ/אֶשָּׂ֤א אֶת עֵינַ/י֙ וָ/אֵ֔רֶא וְ/הִנֵּ֥ה אִישׁ אֶחָ֖ד לָב֣וּשׁ בַּדִּ֑ים וּ/מָתְנָ֥י/ו חֲגֻרִ֖ים בְּ/כֶ֥תֶם אוּפָֽז־־׃
translation:
  text: I lifted up my eyes and looked[a], and behold, a man clothed in linen, with his waist girded with the gold of Uphaz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with fine gold of Uphaz.' The Hebrew expression may emphasize the quality of the gold as well as its source.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשָּׂא
  chosen: I lifted up
  alternatives:
  - I raised
  lexicon: HALOT
  rationale: The verb נשׂא with 'eyes' is a standard Hebrew idiom for directing one's gaze upward or outward. 'Lifted up' preserves the idiom naturally in English and matches the narrative solemnity.
- source_word: עֵינַי
  chosen: my eyes
  lexicon: HALOT
  rationale: Literal rendering is appropriate because the Hebrew idiom explicitly uses 'eyes'; this should not be flattened to merely 'I looked' since the verse then also includes וָאֵרֶא.
- source_word: וָאֵרֶא
  chosen: and looked
  alternatives:
  - and saw
  lexicon: HALOT
  rationale: Although ראה often means 'see/saw,' here after 'I lifted up my eyes' the sequence is well represented by 'looked,' allowing the following הִנֵּה to introduce what was seen. This avoids awkward repetition while preserving the two-step perception.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and there was
  - and look
  lexicon: HALOT
  rationale: '''Behold'' preserves the deictic force and heightened visionary tone better than a flatter modern equivalent.'
- source_word: אִישׁ אֶחָד
  chosen: a man
  alternatives:
  - one man
  - a certain man
  lexicon: HALOT
  rationale: The phrase denotes a single male figure. 'A man' is the most natural English rendering; 'one man' is possible but less idiomatic here. The masculine should be preserved per gender-accurate policy.
- source_word: לָבוּשׁ בַּדִּים
  chosen: clothed in linen
  alternatives:
  - dressed in linen garments
  lexicon: HALOT
  rationale: בַּדִּים refers to linen fabric/garments, often associated with priestly or exalted attire. 'Clothed in linen' is concise, natural, and preserves the material reference without over-specifying the garment type.
- source_word: מָתְנָיו
  chosen: his waist
  alternatives:
  - his loins
  lexicon: HALOT
  rationale: The Hebrew literally refers to the loins/waist area. 'Waist' communicates the sense in readable modern English without archaic connotations, while still referring to the bodily location of the belt.
- source_word: חֲגֻרִים
  chosen: girded
  alternatives:
  - belted
  - wrapped with a belt
  lexicon: HALOT
  rationale: The passive participle means bound or girded. 'Girded' preserves the elevated register and imagery of formal attire; 'belted' is possible but less literary.
- source_word: בְּכֶתֶם אוּפָז
  chosen: with the gold of Uphaz
  alternatives:
  - with fine gold of Uphaz
  - with pure gold of Uphaz
  lexicon: HALOT
  rationale: כֶּתֶם denotes refined or precious gold; Uphaz is best treated as a place name transliterated per policy on names. 'The gold of Uphaz' preserves the phrase straightforwardly. 'Fine gold' is interpretive and may be preserved in a footnote as a lexical alternative.
