theological_decisions:
- issue: Identity of the figure described as having the appearance of a man
  chosen_reading: Render descriptively without identifying the being
  alternative_readings:
  - an angelic being
  - the preincarnate Christ
  rationale: The Hebrew text only states that the figure had the appearance of a man
    and touched Daniel. The translation should preserve that description and not import
    a specific theological identification not made explicit in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
