id: DAN.10.18
reference: Daniel 10:18
source:
  edition: WLC
  text: וַ/יֹּ֧סֶף וַ/יִּגַּע בִּ֛/י כְּ/מַרְאֵ֥ה אָדָ֖ם וַֽ/יְחַזְּקֵֽ/נִי־׃
translation:
  text: Again one with the appearance of a man touched me and strengthened me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'like the appearance of a man' or 'one like a man.' The Hebrew describes
      the figure's visible likeness without explicitly identifying him as merely human.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסֶף
  chosen: Again
  alternatives:
  - And he continued
  - And he added
  lexicon: HALOT
  rationale: The verb יסף with a following finite verb commonly introduces repeated
    action ('again' / 'once more'). 'Again' is idiomatic English and captures the
    resumptive force better than the more wooden 'added.'
- source_word: וַיִּגַּע בִּי
  chosen: touched me
  alternatives:
  - reached out to me
  - struck me
  lexicon: HALOT
  rationale: נגע with ב marks physical contact here in Daniel's visionary encounter.
    'Touched me' is the plain contextual sense and fits the strengthening action that
    follows.
- source_word: כְּמַרְאֵה אָדָם
  chosen: one with the appearance of a man
  alternatives:
  - like the appearance of a man
  - one like a man
  - in human appearance
  lexicon: HALOT
  rationale: מַרְאֶה denotes appearance or visible form. With כ, the phrase describes
    likeness rather than identifying the being as simply a man. Because אָדָם here
    refers to an individual male figure in appearance, 'a man' is preferable to 'humankind'
    or 'humanity.'
- source_word: אָדָם
  chosen: man
  alternatives:
  - human
  - person
  lexicon: HALOT
  rationale: Per the doctrine guidance on אָדָם, the context determines whether 'man'
    or 'humankind' is appropriate. Here it modifies visionary appearance in the singular,
    so 'man' is the most accurate gender- and context-sensitive rendering.
- source_word: וַיְחַזְּקֵנִי
  chosen: strengthened me
  alternatives:
  - made me strong
  - encouraged me
  lexicon: HALOT
  rationale: חזק in the piel commonly means to strengthen or make strong. In this
    immediate context of Daniel being physically and emotionally overwhelmed, 'strengthened
    me' preserves the broad sense without narrowing it to merely emotional encouragement.
