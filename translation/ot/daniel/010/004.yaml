id: DAN.10.4
reference: Daniel 10:4
source:
  edition: WLC
  text: וּ/בְ/י֛וֹם עֶשְׂרִ֥ים וְ/אַרְבָּעָ֖ה לַ/חֹ֣דֶשׁ הָ/רִאשׁ֑וֹן וַ/אֲנִ֗י הָיִ֛יתִי עַ֣ל יַ֧ד הַ/נָּהָ֛ר הַ/גָּד֖וֹל ה֥וּא חִדָּֽקֶל׃
translation:
  text: On the twenty-fourth day of the first month[a], I was by the side of the great river—that is, the Tigris.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: Hiddekel, the standard Hebrew name for the Tigris.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְיוֹם
  chosen: On the ... day
  alternatives:
  - And on the ... day
  - In the ... day
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition with יוֹם introduce a temporal setting. English idiom prefers 'On the ... day.' The conjunction need not be separately represented if the sentence flows naturally without it.
- source_word: עֶשְׂרִים וְאַרְבָּעָה
  chosen: twenty-fourth
  alternatives:
  - twenty-four
  lexicon: HALOT
  rationale: In date formulas, English normally uses the ordinal expression 'twenty-fourth day' rather than the more literal 'twenty-four day.' This is a natural equivalent for the Hebrew cardinal construction in calendrical usage.
- source_word: לַחֹדֶשׁ הָרִאשׁוֹן
  chosen: of the first month
  alternatives:
  - in the first month
  lexicon: HALOT
  rationale: The phrase specifies the month within the date formula. 'Of the first month' fits standard English dating style and preserves the genitival relationship.
- source_word: וַאֲנִי הָיִיתִי
  chosen: I was
  alternatives:
  - I came to be
  - I found myself
  lexicon: HALOT
  rationale: The verb היה here simply locates Daniel in a place at a time. 'I was' is the most straightforward and idiomatic rendering.
- source_word: עַל יַד
  chosen: by the side of
  alternatives:
  - beside
  - on the bank of
  - at
  lexicon: HALOT
  rationale: The idiom עַל יַד means 'beside' or 'at the side of.' 'By the side of' preserves the spatial sense clearly. 'On the bank of' is possible by implication, but the Hebrew idiom itself is broader than the specific noun 'bank.'
- source_word: הַנָּהָר הַגָּדוֹל
  chosen: the great river
  alternatives:
  - the large river
  - the mighty river
  lexicon: HALOT
  rationale: A straightforward rendering of the noun plus adjective. 'Great river' is natural English and preserves the descriptive force.
- source_word: הוּא חִדָּקֶל
  chosen: that is, the Tigris
  alternatives:
  - which is Hiddekel
  - namely, Hiddekel
  lexicon: HALOT
  rationale: חִדָּקֶל is the Hebrew name conventionally identified in English as the Tigris. Following the translation philosophy to transliterate names by standard conventions, the standard English form 'Tigris' is preferred. 'That is' naturally renders the explanatory pronoun הוּא.
