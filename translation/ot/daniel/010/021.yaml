id: DAN.10.21
reference: Daniel 10:21
source:
  edition: WLC
  text: אֲבָל֙ אַגִּ֣יד לְ/ךָ֔ אֶת הָ/רָשׁ֥וּם בִּ/כְתָ֖ב אֱמֶ֑ת וְ/אֵ֨ין אֶחָ֜ד מִתְחַזֵּ֤ק עִמִּ/י֙ עַל אֵ֔לֶּה כִּ֥י אִם מִיכָאֵ֖ל שַׂרְ/כֶֽם־־־׃פ
translation:
  text: But I will tell you what is recorded in the writing of truth[a]. And there is no one who stands firmly with me against these except Michael[b], your prince.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what is written in the writing of truth.'
    reason: lexical_alternative
  - marker: b
    text: Or 'who supports me in these matters.' The Hebrew expression may denote standing strong alongside someone, and 'these' may refer either to hostile powers or to the matters under discussion.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲבָל
  chosen: But
  alternatives:
  - However
  lexicon: HALOT
  rationale: Adversative particle marking contrast with the preceding discussion; 'But' is natural and sufficiently direct.
- source_word: אַגִּיד לְךָ
  chosen: I will tell you
  alternatives:
  - I will declare to you
  - I will make known to you
  lexicon: HALOT
  rationale: Hiphil of נגד commonly means to tell, declare, or make known. 'I will tell you' is clear modern English while preserving the future sense and direct address.
- source_word: הָרָשׁוּם
  chosen: what is recorded
  alternatives:
  - what is written
  - the thing inscribed
  lexicon: HALOT
  rationale: Passive participle from רשם, referring to something officially written down or recorded. Rendering it as 'what is recorded' fits the substantival participle and avoids over-literal awkwardness.
- source_word: בִּכְתָב אֱמֶת
  chosen: in the book of truth
  alternatives:
  - in the writing of truth
  - in the true writing
  lexicon: HALOT
  rationale: כְּתָב denotes a writing/document; in this context a heavenly written record is in view, and 'book of truth' is idiomatic English that preserves the genitival force of אֱמֶת. 'Book' is a contextual smoothing of 'writing' to reflect a written record rather than a mere act of writing.
- source_word: וְאֵין אֶחָד
  chosen: And there is no one
  alternatives:
  - And no one is
  - And there is not one
  lexicon: HALOT
  rationale: 'Existential אין plus אחד yields a natural English existential clause: ''there is no one.'''
- source_word: מִתְחַזֵּק עִמִּי
  chosen: who stands firmly with me
  alternatives:
  - who strengthens himself with me
  - who holds strong with me
  - who supports me
  lexicon: HALOT
  rationale: Hitpael of חזק here conveys taking a strong stand or showing oneself strong alongside someone. 'Stands firmly with me' captures the reflexive-strength nuance in idiomatic English better than the wooden 'strengthens himself with me.'
- source_word: עַל אֵלֶּה
  chosen: against these
  alternatives:
  - concerning these
  - in these matters
  lexicon: HALOT
  rationale: 'Given the conflict context of Daniel 10 and the idiom with התחזק, על is best taken adversatively: standing with me against these opposing powers/matters. This fits the immediate context better than a neutral ''concerning these.'''
- source_word: כִּי אִם
  chosen: except
  alternatives:
  - but only
  - unless
  lexicon: HALOT
  rationale: 'Idiomatic exceptive construction after a negation: ''no one ... except.'''
- source_word: מִיכָאֵל
  chosen: Michael
  lexicon: HALOT
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: שַׂרְכֶם
  chosen: your prince
  alternatives:
  - your chief prince
  - your ruler
  lexicon: HALOT
  rationale: שַׂר denotes a prince, ruler, or chief official. In Daniel's angelic-national context, 'prince' is the established and contextually apt rendering; 'chief prince' would add nuance not explicit in this verse itself.
