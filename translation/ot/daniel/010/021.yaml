theological_decisions:
- issue: Identity and role of Michael
  chosen_reading: Michael is rendered as 'your prince,' preserving the text's portrayal of him as a heavenly prince associated with Daniel's people without importing later doctrinal elaboration.
  alternative_readings:
  - Michael as an archangel
  - Michael as a symbolic representative of Israel
  rationale: The verse itself identifies Michael by the title שַׂרְכֶם, 'your prince.' It does not explicitly use later terminology such as 'archangel' here, so the translation stays with the verse's own wording and leaves broader theological identification to interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
