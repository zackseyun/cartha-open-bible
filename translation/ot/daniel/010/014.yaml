id: DAN.10.14
reference: Daniel 10:14
source:
  edition: WLC
  text: וּ/בָ֨אתִי֙ לַ/הֲבִ֣ינְ/ךָ֔ אֵ֛ת אֲשֶׁר יִקְרָ֥ה לְ/עַמְּ/ךָ֖ בְּ/אַחֲרִ֣ית הַ/יָּמִ֑ים כִּי ע֥וֹד חָז֖וֹן לַ/יָּמִֽים־־׃
translation:
  text: And I have come to make you understand what will happen to your people in the latter days[b][a], for the vision is yet for days to come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in the last days." The Hebrew expression is a prophetic idiom for the future culmination of events.
    reason: alternative_reading
  - marker: b
    text: Or "for many days" or "for future days." The phrase indicates that the vision concerns a time still ahead.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאתִי
  chosen: And I have come
  alternatives:
  - And I came
  - So I have come
  lexicon: HALOT
  rationale: Qal perfect 1cs of בוא with prefixed conjunction. In context, the speaker explains his present purpose after arriving; English present perfect communicates resultant present relevance better than a simple past, while retaining the completed action.
- source_word: לַהֲבִינְךָ
  chosen: to make you understand
  alternatives:
  - to give you understanding
  - to cause you to understand
  lexicon: HALOT
  rationale: 'Hiphil infinitive construct of בין with 2ms suffix is causative: not merely ''understand'' but ''make/enable you to understand.'' The chosen wording is natural modern English and preserves the causative force.'
- source_word: אֵת אֲשֶׁר
  chosen: what
  alternatives:
  - that which
  - that
  lexicon: HALOT
  rationale: The object marker plus relative particle introduces the content to be understood. English idiom is best served by 'what,' which is semantically equivalent without unnecessary stiffness.
- source_word: יִקְרָה
  chosen: will happen
  alternatives:
  - will befall
  - will occur
  lexicon: HALOT
  rationale: Qal imperfect 3ms of קרה in this context refers to events that will come upon Daniel's people. 'Will happen' is clear and natural; 'befall' is possible but more marked and slightly more ominous than the Hebrew requires.
- source_word: לְעַמְּךָ
  chosen: to your people
  alternatives:
  - for your people
  - upon your people
  lexicon: HALOT
  rationale: The preposition ל with קרה can mark the party affected by what occurs. 'To your people' is idiomatic and sufficiently broad; 'upon' would overstate adversity, and 'for' could imply benefit.
- source_word: בְּאַחֲרִית הַיָּמִים
  chosen: in the latter days
  alternatives:
  - in the last days
  - in the end of days
  lexicon: HALOT
  rationale: This is a recognized Hebrew eschatological expression. 'In the latter days' preserves the idiom without importing a narrower end-times scheme that some readers may hear in 'the last days.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the preceding statement. 'For' fits the explanatory sense and reads smoothly in elevated but accessible English.
- source_word: עוֹד
  chosen: yet
  alternatives:
  - still
  - again
  lexicon: HALOT
  rationale: The adverb marks that the vision pertains to a future time not yet realized. 'Yet' captures this prospective nuance compactly.
- source_word: חָזוֹן
  chosen: the vision
  alternatives:
  - a vision
  lexicon: HALOT
  rationale: Although formally anarthrous, the noun refers back to the specific revelatory vision under discussion in the chapter, so English naturally uses the definite article.
- source_word: לַיָּמִים
  chosen: for days to come
  alternatives:
  - for many days
  - for future days
  - concerns days yet to come
  lexicon: HALOT
  rationale: The phrase indicates futurity extending beyond the immediate present. 'For days to come' is idiomatic and avoids the possible quantitative misunderstanding of 'for many days,' while preserving the temporal orientation.
