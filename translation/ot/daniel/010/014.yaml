theological_decisions:
- issue: Eschatological expression בְּאַחֲרִית הַיָּמִים
  chosen_reading: in the latter days
  alternative_readings:
  - in the last days
  rationale: The Hebrew idiom can denote the future culmination of events without requiring a fully systematized eschatological framework. 'In the latter days' preserves the prophetic horizon and avoids over-specifying a denominational end-times reading.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
