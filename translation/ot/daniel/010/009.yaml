  chosen_reading: physical collapse into deep sleep/prostration
  alternative_readings:
  - ecstatic trance
  rationale: The Hebrew נִרְדָּם most naturally denotes deep sleep or heavy slumber. The verse describes Daniel's overwhelmed bodily state without requiring a technical ecstatic category.
