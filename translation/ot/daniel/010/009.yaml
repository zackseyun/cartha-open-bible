id: DAN.10.9
reference: Daniel 10:9
source:
  edition: WLC
  text: וָ/אֶשְׁמַ֖ע אֶת ק֣וֹל דְּבָרָ֑י/ו וּ/כְ/שָׁמְעִ/י֙ אֶת ק֣וֹל דְּבָרָ֔י/ו וַ/אֲנִ֗י הָיִ֛יתִי נִרְדָּ֥ם עַל פָּנַ֖/י וּ/פָנַ֥/י אָֽרְצָ/ה־־־׃
translation:
  text: Then I heard the sound of his words[a], and when I heard the sound of his words, I fell into a deep sleep on my face[b], with my face to the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the voice of his words.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I fell asleep' or 'I was stunned into sleep'; the Hebrew denotes a deep, heavy sleep.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁמַע
  chosen: Then I heard
  alternatives:
  - And I heard
  - So I heard
  lexicon: HALOT
  rationale: Qal wayyiqtol of שׁמע marks narrative sequence. 'Then I heard' gives natural English narrative progression while preserving the simple sense of hearing.
- source_word: קוֹל דְּבָרָיו
  chosen: the sound of his words
  alternatives:
  - the voice of his words
  - the sound of his speech
  lexicon: HALOT
  rationale: קוֹל is broadly 'sound/voice,' and דְּבָרָיו is 'his words.' The collocation is somewhat redundant in English; 'the sound of his words' preserves the Hebrew expression without over-literal awkwardness.
- source_word: וּכְשָׁמְעִי
  chosen: and when I heard
  alternatives:
  - and as I heard
  - and upon hearing
  lexicon: HALOT
  rationale: The prefixed conjunction and כ plus infinitive/construct-like form with suffix expresses temporal sense. 'When I heard' is the clearest natural rendering.
- source_word: נִרְדָּם
  chosen: in a deep sleep
  alternatives:
  - asleep
  - stunned into sleep
  - in a trance
  lexicon: HALOT
  rationale: The Niphal participial/adjectival form from רדם denotes being in deep sleep or heavy slumber. 'In a deep sleep' preserves the intensity better than simply 'asleep.' 'Trance' is interpretive and not required by the Hebrew.
- source_word: עַל פָּנַי
  chosen: on my face
  alternatives:
  - on my face before him
  - face down
  lexicon: HALOT
  rationale: A straightforward spatial expression. 'On my face' keeps the Hebrew idiom and pairs with the following phrase for emphasis.
- source_word: וּפָנַי אָרְצָה
  chosen: with my face to the ground
  alternatives:
  - and my face to the ground
  - with my face earthward
  lexicon: HALOT
  rationale: אָרְצָה is directional ('to the earth/ground'). Rendering the clause as 'with my face to the ground' avoids clumsy repetition while preserving the emphatic picture of prostration.
