theological_decisions:
- issue: Nature of הַמַּרְאָה in apocalyptic context
  chosen_reading: vision
  alternative_readings:
  - appearance
  - sight
  rationale: The term itself can denote visible appearance, but in Daniel 10 the broader
    context is revelatory and visionary. Rendering it 'vision' reflects the genre
    without importing extra doctrinal content.
  doctrine_reference: Translation philosophy §1, §6
- issue: Meaning of הוֹדִי in relation to Daniel's condition
  chosen_reading: my splendor
  alternative_readings:
  - my appearance
  - my vigor
  rationale: The Hebrew most directly denotes splendor or majesty, likely referring
    to Daniel's outward appearance losing its normal vitality. The translation preserves
    the lexical core rather than flattening it to a purely interpretive paraphrase.
  doctrine_reference: Translation philosophy §1, §5
