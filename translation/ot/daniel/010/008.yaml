id: DAN.10.8
reference: Daniel 10:8
source:
  edition: WLC
  text: וַ/אֲנִי֙ נִשְׁאַ֣רְתִּי לְ/בַדִּ֔/י וָֽ/אֶרְאֶ֗ה אֶת הַ/מַּרְאָ֤ה הַ/גְּדֹלָה֙
    הַ/זֹּ֔את וְ/לֹ֥א נִשְׁאַר בִּ֖/י כֹּ֑ח וְ/הוֹדִ֗/י נֶהְפַּ֤ךְ עָלַ/י֙ לְ/מַשְׁחִ֔ית
    וְ/לֹ֥א עָצַ֖רְתִּי כֹּֽחַ־־׃
translation:
  text: So I alone was left and saw this great vision, and no strength remained in
    me; my splendor was turned to ruin upon me, and I retained no strength.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this great appearance' or 'this great sight.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my appearance was changed to ruin' or 'my vigor was turned to ruin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁאַרְתִּי לְבַדִּי
  chosen: I alone was left
  alternatives:
  - I was left by myself
  - I remained alone
  lexicon: HALOT
  rationale: Combines the passive/reflexive sense of שׁאר ('be left, remain') with
    לְבַדִּי ('alone, by myself'). 'Was left' fits the narrative context after others
    are gone, while 'alone' preserves the emphasis of לבד.
- source_word: הַמַּרְאָה הַגְּדֹלָה הַזֹּאת
  chosen: this great vision
  alternatives:
  - this great appearance
  - this great sight
  lexicon: HALOT
  rationale: מַרְאָה can denote an appearance or visionary sight. In Daniel's apocalyptic
    context, 'vision' is the most natural English rendering and preserves the revelatory
    force.
- source_word: כֹּחַ
  chosen: strength
  alternatives:
  - power
  - vigor
  lexicon: HALOT
  rationale: In both occurrences the term refers to Daniel's physical capacity failing
    under the experience. 'Strength' is idiomatic and contextually precise.
- source_word: וְלֹא נִשְׁאַר בִּי כֹּחַ
  chosen: and no strength remained in me
  alternatives:
  - and there was no strength left in me
  lexicon: HALOT
  rationale: Preserves the passive sense of נִשְׁאַר and the internal location marked
    by בִּי. The clause expresses total loss of physical strength.
- source_word: הוֹדִי
  chosen: my splendor
  alternatives:
  - my majesty
  - my appearance
  - my vigor
  lexicon: HALOT
  rationale: הוֹד often denotes splendor, majesty, or outward radiance. Here it refers
    to Daniel's normal healthy appearance or dignity being altered by the vision.
    'Splendor' is the most direct lexical equivalent, though the context implies visible
    appearance.
- source_word: נֶהְפַּךְ עָלַי לְמַשְׁחִית
  chosen: was turned upon me to ruin
  alternatives:
  - was changed in me into ruin
  - was turned to a ruinous state
  - was changed to corruption
  lexicon: HALOT
  rationale: נֶהְפַּךְ means 'was turned/changed,' and לְמַשְׁחִית indicates a destructive
    or ruined condition. 'Upon me' reflects עָלַי literally, though idiomatically
    the sense is that his appearance changed for the worse. 'To ruin' preserves the
    starkness without overinterpreting as purely physical decay.
- source_word: וְלֹא עָצַרְתִּי כֹּחַ
  chosen: and I retained no strength
  alternatives:
  - and I kept no strength
  - and I had no strength left
  lexicon: HALOT
  rationale: עצר in this construction conveys holding back, retaining, or keeping.
    The sense is that Daniel could not preserve any strength. 'Retained no strength'
    is concise and faithful.
