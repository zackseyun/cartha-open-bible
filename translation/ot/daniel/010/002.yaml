id: DAN.10.2
reference: Daniel 10:2
source:
  edition: WLC
  text: בַּ/יָּמִ֖ים הָ/הֵ֑ם אֲנִ֤י דָֽנִיֵּאל֙ הָיִ֣יתִי מִתְאַבֵּ֔ל שְׁלֹשָׁ֥ה שָׁבֻעִ֖ים
    יָמִֽים׃
translation:
  text: In those days, I, Daniel, was mourning for three full weeks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'three weeks of days,' an idiom emphasizing three ordinary, full
      weeks rather than symbolic 'weeks.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  chosen: In those days
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: The preposition ב plus יָמִים with the demonstrative הָהֵם is a standard
    temporal expression meaning 'in those days.' 'At that time' is possible, but 'in
    those days' more closely reflects the plural noun in Hebrew and preserves the
    narrative setting.
- source_word: אֲנִי דָנִיֵּאל
  chosen: I, Daniel,
  alternatives:
  - I Daniel
  lexicon: HALOT
  rationale: The independent pronoun plus proper name is emphatic/self-identifying.
    English apposition with commas naturally conveys this emphasis without sounding
    archaic.
- source_word: הָיִיתִי מִתְאַבֵּל
  chosen: was mourning
  alternatives:
  - was in mourning
  - was grieving
  lexicon: HALOT
  rationale: The construction combines היה with the Hitpael participle of אבל, expressing
    an ongoing state or activity in past time. 'Was mourning' is natural modern English
    and preserves the durative sense. 'Was in mourning' is also possible, but slightly
    more idiomatic than verbal; 'grieving' is broader and less tied to the lexical
    sense of mourning.
- source_word: שְׁלֹשָׁה שָׁבֻעִים יָמִים
  chosen: for three full weeks
  alternatives:
  - for three weeks of days
  - for three weeks
  lexicon: HALOT
  rationale: The phrase literally reads 'three weeks, days.' In context this idiom
    distinguishes literal weeks of days from symbolic 'weeks' (heptads), so 'three
    full weeks' communicates the force clearly in English. 'Three weeks of days' is
    overly literal and awkward; 'three weeks' is understandable but loses the emphatic
    clarification supplied by יָמִים.
