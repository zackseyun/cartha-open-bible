id: DAN.4.25
reference: Daniel 4:25
source:
  edition: WLC
  text: כֹּ֣לָּ/א מְּטָ֔א עַל נְבוּכַדְנֶצַּ֖ר מַלְכָּֽ/א־׃פ
translation:
  text: All this came upon King Nebuchadnezzar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'befell King Nebuchadnezzar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּלָּא
  chosen: All this
  alternatives:
  - The whole of this
  - All of it
  lexicon: HALOT
  rationale: Aramaic demonstrative/totalizing expression referring back to the announced
    judgment; 'All this' is natural English and preserves the comprehensive sense
    without over-literal awkwardness.
- source_word: מְּטָא
  chosen: came upon
  alternatives:
  - reached
  - happened to
  - befell
  lexicon: HALOT
  rationale: The Aramaic verb means to arrive, reach, or come. With עַל ('upon'),
    'came upon' best preserves the idiom of judgment overtaking someone while remaining
    readable modern English.
- source_word: עַל
  chosen: upon
  alternatives:
  - 'on'
  - against
  lexicon: HALOT
  rationale: In combination with מְּטָא, the preposition marks what came upon Nebuchadnezzar.
    English idiom favors 'came upon' rather than a more wooden 'reached against/on'.
- source_word: נְבוּכַדְנֶצַּר
  chosen: Nebuchadnezzar
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: מַלְכָּא
  chosen: King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: The emphatic state can be rendered definitely, but in English apposition
    with a proper name is most natural as 'King Nebuchadnezzar.' This preserves the
    royal title without unnecessary stiffness.
