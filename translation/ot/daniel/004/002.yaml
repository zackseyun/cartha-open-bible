id: DAN.4.2
reference: Daniel 4:2
source:
  edition: WLC
  text: חֵ֥לֶם חֲזֵ֖ית וִֽ/ידַחֲלִנַּ֑/נִי וְ/הַרְהֹרִין֙ עַֽל מִשְׁכְּבִ֔/י וְ/חֶזְוֵ֥י רֵאשִׁ֖/י יְבַהֲלֻנַּֽ/נִי־׃
translation:
  text: I saw a dream[a], and it frightened me; and the thoughts on my bed and the visions of my head terrified me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the reflections on my bed and the visions in my head alarmed me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵלֶם
  chosen: a dream
  alternatives:
  - dream
  lexicon: HALOT
  rationale: 'The Aramaic noun denotes a dream. The indefinite English expression fits the predicative opening naturally: ''I saw a dream.'''
- source_word: חֲזֵית
  chosen: I saw
  alternatives:
  - I had seen
  - I beheld
  lexicon: HALOT
  rationale: Peal perfect 1cs of חזי, the standard verb for seeing. 'I saw' is the most natural English rendering and preserves the directness of the report.
- source_word: וִידַחֲלִנַּנִי
  chosen: and it frightened me
  alternatives:
  - and it made me afraid
  - and it alarmed me
  lexicon: HALOT
  rationale: From דחל, 'to fear, be afraid,' here causative/resultative in sense with 1cs object suffix. The singular verb most naturally refers back to the singular 'dream,' so 'it frightened me' makes the linkage explicit in English.
- source_word: וְהַרְהֹרִין
  chosen: and the thoughts
  alternatives:
  - and the reflections
  - and the imaginings
  lexicon: HALOT
  rationale: The noun refers to thoughts or mental reflections. 'Thoughts' is the clearest modern English equivalent and fits the parallel with 'visions.'
- source_word: עַל מִשְׁכְּבִי
  chosen: on my bed
  alternatives:
  - upon my bed
  - while on my bed
  lexicon: HALOT
  rationale: A straightforward prepositional phrase. 'On my bed' preserves the spatial imagery and the dream-setting.
- source_word: וְחֶזְוֵי רֵאשִׁי
  chosen: and the visions of my head
  alternatives:
  - and the visions in my head
  - and the visions of my mind
  lexicon: HALOT
  rationale: חזוי denotes visions; the construct with 'my head' is a Semitic expression. Retaining 'of my head' preserves the source imagery, though English readers will understand it idiomatically as mental visions.
- source_word: יְבַהֲלֻנַּנִי
  chosen: terrified me
  alternatives:
  - alarmed me
  - dismayed me
  lexicon: HALOT
  rationale: From בהל, 'to terrify, disturb, alarm.' Because the subject is plural ('thoughts' and 'visions'), the plural verbal sense is preserved by 'terrified me.' This also gives a stronger distinction from the earlier verb 'frightened me.'
