theological_decisions:
- issue: Identity of 'watchers' and 'holy ones'
  chosen_reading: Retain the heavenly-court terminology 'watchers' and 'holy ones'
    rather than interpretively rendering them as angels.
  alternative_readings:
  - angels
  - heavenly beings
  rationale: The verse presents a heavenly deliberative scene. Translating the technical
    terms literally preserves the text's own imagery and avoids collapsing distinct
    Danielic language into a more generalized category.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering אֱנוֹשָׁא with gender-accurate language
  chosen_reading: Use 'mankind' and 'men' where the Aramaic has generic human reference
    and an idiomatic masculine expression.
  alternative_readings:
  - humanity
  - people
  rationale: The source uses masculine/generic human terminology. Per project policy,
    the translation should match the source's intent rather than neutralize it, while
    remaining natural English.
  doctrine_reference: Translation philosophy §4
