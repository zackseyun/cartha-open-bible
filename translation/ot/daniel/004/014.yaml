id: DAN.4.14
reference: Daniel 4:14
source:
  edition: WLC
  text: בִּ/גְזֵרַ֤ת עִירִין֙ פִּתְגָמָ֔/א וּ/מֵאמַ֥ר קַדִּישִׁ֖ין שְׁאֵֽלְתָ֑/א עַד
    דִּבְרַ֡ת דִּ֣י יִנְדְּע֣וּן חַ֠יַּיָּ/א דִּֽי שַׁלִּ֨יט עלי/א בְּ/מַלְכ֣וּת אנוש/א
    וּ/לְ/מַן דִּ֤י יִצְבֵּא֙ יִתְּנִנַּ֔/הּ וּ/שְׁפַ֥ל אֲנָשִׁ֖ים יְקִ֥ים עלי/ה־־־׃
translation:
  text: The sentence is by the decree of the watchers, and the decision by the word
    of the holy ones, so that the living may know that the Most High rules in the
    kingdom of mankind and gives it to whom he wills, and sets up over it the lowliest
    of men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The sentence is by the decree of the watchers, and the decision is a
      request by the word of the holy ones.' The Aramaic wording is compressed, and
      שְׁאֵלְתָא can be rendered 'request' or 'petition.'
    reason: lexical_alternative
  - marker: b
    text: '''Watchers'' is a literal rendering of a Danielic term for heavenly beings;
      many interpreters understand them to be angels.'
    reason: cultural_note
  - marker: c
    text: Or 'over the kingdom of men' or 'over the kingdom of humanity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּגְזֵרַת
  chosen: by the decree of
  alternatives:
  - by the decision of
  - according to the decree of
  lexicon: HALOT
  rationale: גְזֵרָה in Aramaic denotes a formal decision or decree. 'By the decree
    of' preserves the juridical force and the instrumental beth preposition.
- source_word: עִירִין
  chosen: the watchers
  alternatives:
  - the wakeful ones
  - the angels
  lexicon: HALOT
  rationale: The Aramaic term literally denotes 'watchers' and is a technical term
    in Daniel for heavenly beings. 'Angels' is interpretive and therefore kept as
    an alternative rather than the main text.
- source_word: פִּתְגָמָא
  chosen: the sentence
  alternatives:
  - the matter
  - the word
  - the decree
  lexicon: HALOT
  rationale: In this context the term refers to the announced judicial pronouncement.
    'Sentence' fits the legal setting better than the broader 'matter' or 'word'.
- source_word: וּמֵאמַר
  chosen: and the decision
  alternatives:
  - and the word
  - and the command
  lexicon: HALOT
  rationale: Paired with פִּתְגָמָא and followed by שְׁאֵלְתָא, this term contributes
    to the formal declaration. 'Decision' communicates the authoritative sense in
    idiomatic English.
- source_word: קַדִּישִׁין
  chosen: the holy ones
  alternatives:
  - the saints
  - the holy beings
  lexicon: HALOT
  rationale: In this Aramaic court scene the referent is heavenly holy beings, parallel
    to 'watchers.' 'Holy ones' is accurate and avoids importing later ecclesial associations
    of 'saints.'
- source_word: שְׁאֵלְתָא
  chosen: the word
  alternatives:
  - the request
  - the demand
  - the petition
  lexicon: HALOT
  rationale: Though the noun can mean 'request' or 'petition,' in this elevated parallelism
    it functions as the authoritative utterance associated with the holy ones. Rendering
    it woodenly as 'request' could wrongly imply uncertainty or dependence. 'Word'
    preserves the parallel structure while remaining intelligible.
- source_word: עַד דִּבְרַת דִּי
  chosen: so that
  alternatives:
  - to the end that
  - for the purpose that
  lexicon: HALOT
  rationale: This construction introduces purpose/result. 'So that' is natural modern
    English and preserves the clause's teleological force.
- source_word: חַיַּיָּא
  chosen: the living
  alternatives:
  - those alive
  - all living people
  lexicon: HALOT
  rationale: The expression is broad and generic. 'The living' is concise and preserves
    the universal scope without over-specifying human referents, though humans are
    primarily in view in context.
- source_word: שַׁלִּיט עִלָּיָא
  chosen: the Most High rules
  alternatives:
  - the Most High is sovereign
  - the Most High has dominion
  lexicon: HALOT
  rationale: The adjective/title עִלָּיָא is best rendered 'the Most High.' שַׁלִּיט
    conveys ruling authority. 'Rules' is clear, active, and preserves the verbal force.
- source_word: בְּמַלְכוּת אֱנוֹשָׁא
  chosen: in the kingdom of mankind
  alternatives:
  - over the kingdom of men
  - in the kingdom of humanity
  lexicon: HALOT
  rationale: אֱנוֹשָׁא refers to humankind/man in a collective sense. Following the
    project's gender-accurate policy, 'mankind' preserves the representative force
    better than flattening to a purely abstract term. 'In the kingdom of mankind'
    follows the preposition as transmitted, though English readers may hear the sense
    as dominion over the human realm.
- source_word: וּלְמַן דִּי יִצְבֵּא יִתְּנִנַּהּ
  chosen: and gives it to whom he wills
  alternatives:
  - and gives it to anyone he wants
  - and gives it to whomever he pleases
  lexicon: HALOT
  rationale: The clause emphasizes divine freedom in granting kingship. 'Whom he wills'
    is concise and preserves the elevated register and theological weight.
- source_word: וּשְׁפַל אֲנָשִׁים
  chosen: the lowliest of men
  alternatives:
  - the humblest of men
  - a lowly man
  - the basest of men
  lexicon: HALOT
  rationale: The phrase is singular adjective plus plural noun in an idiom meaning
    one from the lowest rank among humans. 'The lowliest of men' preserves the superlative
    sense and the masculine/generic form.
- source_word: יְקִים עֲלַיְהּ
  chosen: sets up over it
  alternatives:
  - raises up over it
  - appoints over it
  lexicon: HALOT
  rationale: The verb means to raise or set up. In context of installing a ruler,
    'sets up over it' is idiomatic and keeps the imagery of elevation/appointment.
