id: DAN.4.1
reference: Daniel 4:1
source:
  edition: WLC
  text: אֲנָ֣ה נְבוּכַדְנֶצַּ֗ר שְׁלֵ֤ה הֲוֵית֙ בְּ/בֵיתִ֔/י וְ/רַעְנַ֖ן בְּ/הֵיכְלִֽ/י׃
translation:
  text: I, Nebuchadnezzar, was at ease in my house and flourishing in my palace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'secure' for 'at ease'; the Aramaic term can emphasize tranquility or
      security.
    reason: lexical_alternative
  - marker: b
    text: Or 'thriving' for 'flourishing'; the term conveys vigorous well-being or
      prosperity.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנָה
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: First-person independent pronoun; English simply uses 'I.' The appositional
    structure with the proper name is preserved.
- source_word: נְבוּכַדְנֶצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  rationale: Personal name is transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: שְׁלֵה
  chosen: at ease
  alternatives:
  - prosperous
  - secure
  - undisturbed
  lexicon: HALOT
  rationale: The Aramaic adjective denotes ease, tranquility, or security. 'At ease'
    best captures the personal state in idiomatic English without overreading material
    prosperity.
- source_word: הֲוֵית
  chosen: was
  alternatives:
  - became
  lexicon: HALOT
  rationale: 'Simple copular sense in context: Nebuchadnezzar describes his condition
    prior to the dream. English past tense ''was'' is the natural rendering.'
- source_word: בְּבֵיתִי
  chosen: in my house
  alternatives:
  - at home
  lexicon: HALOT
  rationale: Literally 'in my house.' Retained rather than the more idiomatic 'at
    home' to preserve the concrete setting and parallelism with 'in my palace.'
- source_word: וְרַעְנַן
  chosen: flourishing
  alternatives:
  - thriving
  - luxuriant
  - prosperous
  lexicon: HALOT
  rationale: The adjective conveys freshness, vigor, and flourishing well-being. 'Flourishing'
    communicates both vitality and prosperity without sounding overly botanical or
    archaic.
- source_word: בְּהֵיכְלִי
  chosen: in my palace
  alternatives:
  - in my temple
  - in my hall
  lexicon: HALOT
  rationale: In imperial Aramaic context, הֵיכַל can denote a palace as well as a
    temple. Since Nebuchadnezzar is speaking of his royal residence, 'palace' is contextually
    correct and avoids misleading cultic associations.
