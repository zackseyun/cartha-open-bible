theological_decisions:
- issue: Rendering of עִדָּנִין in Nebuchadnezzar's judgment
  chosen_reading: seven times
  alternative_readings:
  - seven years
  - seven periods of time
  rationale: The Aramaic term can denote a time/period and has often been interpreted
    as years from context, but the word itself is less specific. To preserve the textual
    wording and avoid importing a more precise duration than the verse states, the
    main text keeps 'seven times,' with the more interpretive alternatives preserved
    in a footnote.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
- issue: Anthropological term אֲנָשָׁא
  chosen_reading: men
  alternative_readings:
  - people
  - human beings
  rationale: The verse contrasts human society with beasts and later speaks of the
    'kingdom of men.' Following the gender-accurate guideline, 'men' is retained rather
    than flattened to a neutral term, while the sense is collective humanity.
  doctrine_reference: Translation philosophy §4, Gender-accurate over gender-neutral.
