id: DAN.4.29
reference: Daniel 4:29
source:
  edition: WLC
  text: וּ/מִן אֲנָשָׁ/א֩ לָ֨/ךְ טָֽרְדִ֜ין וְֽ/עִם חֵיוַ֧ת בָּרָ֣/א מְדֹרָ֗/ךְ עִשְׂבָּ֤/א
    כְ/תוֹרִין֙ לָ֣/ךְ יְטַעֲמ֔וּן וְ/שִׁבְעָ֥ה עִדָּנִ֖ין יַחְלְפ֣וּן עלי/ך עַ֣ד
    דִּֽי תִנְדַּ֗ע דִּֽי שַׁלִּ֤יט עִלָּיָ/א֙ בְּ/מַלְכ֣וּת אֲנָשָׁ֔/א וּ/לְ/מַן
    דִּ֥י יִצְבֵּ֖א יִתְּנִנַּֽ/הּ־־־־־׃
translation:
  text: And you will be driven away from men, and your dwelling will be with the beasts
    of the field. You will be made to eat grass like oxen, and seven times will pass
    over you, until you know that the Most High rules in the kingdom of men and gives
    it to whomever he wills.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aramaic 'seven times'; possibly 'seven years' or more generally 'seven periods
      of time.'
    reason: alternative_reading
  - marker: b
    text: '''Men'' here means human beings in contrast to the beasts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טָֽרְדִ֜ין
  chosen: you will be driven away
  alternatives:
  - they will drive you away
  - you will be expelled
  lexicon: HALOT
  rationale: The Aramaic verb denotes being driven out/away. Although the form is
    3mp active ('they will drive'), English naturally uses a passive here to match
    the idiom and the parallel versions of the judgment oracle.
- source_word: אֲנָשָׁא
  chosen: men
  alternatives:
  - people
  - humanity
  lexicon: HALOT
  rationale: The noun refers to human beings in contrast to beasts. 'Men' preserves
    the source's anthropological contrast and matches the repeated phrase 'kingdom
    of men.'
- source_word: מְדֹרָךְ
  chosen: your dwelling
  alternatives:
  - your habitation
  - your abode
  lexicon: HALOT
  rationale: A straightforward rendering of the noun for dwelling place; 'dwelling'
    is readable modern English without loss of sense.
- source_word: חֵיוַת בָּרָא
  chosen: the beasts of the field
  alternatives:
  - the wild animals
  - the animals of the open country
  lexicon: HALOT
  rationale: This is the standard biblical expression for non-domestic land animals.
    'Beasts of the field' preserves the register and imagery.
- source_word: עִשְׂבָּא
  chosen: grass
  alternatives:
  - vegetation
  - herbage
  lexicon: HALOT
  rationale: In context of animal grazing, 'grass' is the most natural and specific
    English rendering.
- source_word: כְתוֹרִין
  chosen: like oxen
  alternatives:
  - like cattle
  - like bulls
  lexicon: HALOT
  rationale: The Aramaic term refers to bovines/oxen. 'Oxen' fits the traditional
    imagery and the grazing comparison better than the broader 'cattle.'
- source_word: יְטַעֲמ֔וּן
  chosen: you will be made to eat
  alternatives:
  - they will feed you
  - you will eat
  lexicon: HALOT
  rationale: The verb literally concerns causing to taste/eat. 'You will be made to
    eat' preserves the imposed nature of the judgment better than the simple 'you
    will eat.'
- source_word: שִׁבְעָה עִדָּנִין
  chosen: seven times
  alternatives:
  - seven periods
  - seven years
  lexicon: HALOT
  rationale: The Aramaic expression is intentionally somewhat open-ended. 'Seven times'
    preserves the wording without over-specifying the duration as years in the main
    text.
- source_word: יַחְלְפ֣וּן עֲלָךְ
  chosen: will pass over you
  alternatives:
  - will pass by for you
  - will elapse over you
  lexicon: HALOT
  rationale: This idiom marks the passage of a period affecting Nebuchadnezzar. 'Pass
    over you' is idiomatic and preserves the personal impact.
- source_word: תִנְדַּע
  chosen: you know
  alternatives:
  - you learn
  - you acknowledge
  lexicon: HALOT
  rationale: The verb means to know/come to know. 'Know' is the most direct rendering;
    the context already implies experiential recognition.
- source_word: שַׁלִּיט עִלָּיָא
  chosen: the Most High rules
  alternatives:
  - the Most High is sovereign
  - the Most High has dominion
  lexicon: HALOT
  rationale: The adjective/title plus predicate emphasizes active dominion. 'Rules'
    is clear modern English and preserves the royal theme.
- source_word: בְּמַלְכוּת אֲנָשָׁא
  chosen: in the kingdom of men
  alternatives:
  - over the kingdom of mankind
  - in human kingship
  lexicon: HALOT
  rationale: A fairly literal rendering that preserves the singular collective sense
    of human rule. 'Kingdom of men' also echoes the source's contrast with the heavenly
    sovereign.
- source_word: וּלְמַן דִּי יִצְבֵּא יִתְּנִנַּהּ
  chosen: and gives it to whomever he wills
  alternatives:
  - and gives it to anyone he wants
  - and sets it over to whom he pleases
  lexicon: HALOT
  rationale: This clause expresses divine freedom in granting kingship. 'Whomever
    he wills' is natural, dignified English and preserves the volitional force.
