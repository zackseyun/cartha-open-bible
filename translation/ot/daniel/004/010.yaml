id: DAN.4.10
reference: Daniel 4:10
source:
  edition: WLC
  text: חָזֵ֥ה הֲוֵ֛ית בְּ/חֶזְוֵ֥י רֵאשִׁ֖/י עַֽל מִשְׁכְּבִ֑/י וַ/אֲלוּ֙ עִ֣יר וְ/קַדִּ֔ישׁ
    מִן שְׁמַיָּ֖/א נָחִֽת־־׃
translation:
  text: 'These were the visions of my head as I lay on my bed: and behold, a watcher,
    a holy one, came down from heaven.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an angelic watcher'; the Aramaic literally reads 'a watcher, a holy
      one.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָזֵה הֲוֵית
  chosen: These were
  alternatives:
  - I was seeing
  - I saw
  lexicon: HALOT
  rationale: The participle with the verb of being forms a periphrastic expression
    meaning ongoing perception in past time. In English, 'These were' naturally introduces
    the content of the dream report and fits the following nominal clause better than
    the more wooden 'I was seeing.'
- source_word: בְּחֶזְוֵי
  chosen: the visions
  alternatives:
  - visions
  - appearance(s)
  lexicon: HALOT
  rationale: The noun refers to visionary sights or dream-visions. The definite sense
    is supplied naturally in English because the phrase introduces the specific dream
    content Nebuchadnezzar is recounting.
- source_word: רֵאשִׁי
  chosen: of my head
  alternatives:
  - in my mind
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the idiom of the Aramaic. 'In
    my mind' is interpretive and smoother, but 'of my head' keeps the concrete imagery
    while remaining understandable.
- source_word: עַל מִשְׁכְּבִי
  chosen: as I lay on my bed
  alternatives:
  - upon my bed
  - on my bed
  lexicon: HALOT
  rationale: This phrase locates the visions during lying in bed. 'As I lay on my
    bed' is idiomatic modern English and preserves the temporal setting better than
    the stiffer 'upon my bed.'
- source_word: וַאֲלוּ
  chosen: and behold
  alternatives:
  - and look
  - then behold
  lexicon: HALOT
  rationale: This Aramaic discourse particle draws attention to what appears next.
    'And behold' is a conventional but still clear English equivalent for sudden narrative
    focus.
- source_word: עִיר
  chosen: a watcher
  alternatives:
  - an angelic watcher
  lexicon: HALOT
  rationale: The term literally denotes a 'watcher,' a heavenly being. The translation
    keeps the distinctive term rather than flattening it to 'angel,' since the source
    text uses a more specific designation.
- source_word: וְקַדִּישׁ
  chosen: a holy one
  alternatives:
  - and holy
  - even a holy one
  lexicon: HALOT
  rationale: 'The adjective functions substantivally alongside ''watcher.'' Rendering
    both nouns explicitly in English preserves the appositional force: the watcher
    is identified as a holy one.'
- source_word: מִן שְׁמַיָּא
  chosen: from heaven
  alternatives:
  - from the heavens
  lexicon: HALOT
  rationale: Although formally plural in Aramaic, this commonly corresponds to singular
    'heaven' in idiomatic English. This is the most natural rendering in context.
- source_word: נָחִת
  chosen: came down
  alternatives:
  - descended
  lexicon: HALOT
  rationale: The verb means to go or come down. 'Came down' is natural English in
    a narrative viewpoint from earth; 'descended' is possible but more elevated in
    register.
