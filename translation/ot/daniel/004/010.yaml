theological_decisions:
- issue: Identity of עִיר וְקַדִּישׁ
  chosen_reading: Render literally as 'a watcher, a holy one' without identifying
    the being more specifically.
  alternative_readings:
  - an angel
  - a heavenly messenger
  rationale: The text itself uses the distinctive Aramaic designation rather than
    the more general term 'angel.' Preserving the literal wording avoids importing
    a more specific theological identification than the verse states, while still
    allowing readers to infer a heavenly being from context.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
