theological_decisions:
- issue: Rendering the predicates קְשֹׁט and דִּין as abstract nouns or adjectives
  chosen_reading: all his works are truth, and his ways are justice
  alternative_readings:
  - all his works are true, and his ways are just
  rationale: The Aramaic uses nominal predicates, and preserving them as abstract
    nouns gives the line a stronger doxological and theological force without distorting
    English. The adjectival alternative is viable but slightly flattens the parallelism.
  doctrine_reference: Translation philosophy §1, §6
- issue: Divine title שְׁמַיָּא in singular English idiom
  chosen_reading: the King of heaven
  alternative_readings:
  - the King of the heavens
  rationale: Although the Aramaic form is morphologically plural, English idiom normally
    uses singular 'heaven' in this title. This preserves meaning and readability without
    theological alteration.
  doctrine_reference: Translation philosophy §6
