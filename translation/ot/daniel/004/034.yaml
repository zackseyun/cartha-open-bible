id: DAN.4.34
reference: Daniel 4:34
source:
  edition: WLC
  text: כְּעַ֞ן אֲנָ֣ה נְבוּכַדְנֶצַּ֗ר מְשַׁבַּ֨ח וּ/מְרוֹמֵ֤ם וּ/מְהַדַּר֙ לְ/מֶ֣לֶךְ
    שְׁמַיָּ֔/א דִּ֤י כָל מַעֲבָד֨וֹ/הִי֙ קְשֹׁ֔ט וְ/אֹרְחָתֵ֖/הּ דִּ֑ין וְ/דִי֙ מַהְלְכִ֣ין
    בְּ/גֵוָ֔ה יָכִ֖ל לְ/הַשְׁפָּלָֽה־׃פ
translation:
  text: Now I, Nebuchadnezzar, praise and exalt and honor the King of heaven, for
    all his works are truth, and his ways are justice; and those who walk in pride
    he is able to humble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'all his works are true, and his ways are just.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'he can abase' or 'bring low.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּעַן
  chosen: Now
  alternatives:
  - At that time
  - Therefore
  lexicon: HALOT
  rationale: Aramaic discourse adverb marking the present conclusion of Nebuchadnezzar's
    testimony. 'Now' is natural English and preserves the transition without over-specifying
    temporal nuance.
- source_word: מְשַׁבַּח וּמְרוֹמֵם וּמְהַדַּר
  chosen: praise and exalt and honor
  alternatives:
  - praise and extol and glorify
  - praise, exalt, and magnify
  lexicon: HALOT
  rationale: The three participles form a rhetorical triad of royal doxology. 'Exalt'
    fits מרומם well; 'honor' for מהדר preserves the sense of giving splendor/honor
    in idiomatic English. I retained all three verbs rather than compressing them.
- source_word: לְמֶלֶךְ שְׁמַיָּא
  chosen: the King of heaven
  alternatives:
  - the King of the heavens
  - Heaven's King
  lexicon: HALOT
  rationale: Construct phrase with definite force in context. 'King of heaven' is
    the established and natural English rendering; singular 'heaven' is idiomatic
    for the Aramaic plural form.
- source_word: דִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the grounds for Nebuchadnezzar's praise. 'Because' makes the
    causal relation explicit in clear modern English.
- source_word: מַעֲבָדֹוהִי
  chosen: his works
  alternatives:
  - his deeds
  - what he does
  lexicon: HALOT
  rationale: Refers broadly to God's actions/works. 'Works' is concise and preserves
    the formal tone of the doxology.
- source_word: קְשֹׁט
  chosen: truth
  alternatives:
  - 'true'
  - faithfulness
  lexicon: HALOT
  rationale: Predicate noun meaning truth/trueness. 'Are truth' is slightly more literal
    and weighty than 'are true,' preserving the nominal force of the Aramaic.
- source_word: אֹרְחָתֵהּ
  chosen: his ways
  alternatives:
  - his paths
  - his conduct
  lexicon: HALOT
  rationale: Common metaphor for manner of acting/governing. 'Ways' is idiomatic and
    preserves biblical resonance.
- source_word: דִּין
  chosen: justice
  alternatives:
  - judgment
  - just
  lexicon: HALOT
  rationale: Predicate noun denoting justice/judgment. 'Justice' best matches the
    abstract nominal parallel with 'truth' in English.
- source_word: מַהְלְכִין בְּגֵוָה
  chosen: those who walk in pride
  alternatives:
  - those who live in pride
  - those who conduct themselves proudly
  lexicon: HALOT
  rationale: Idiomatic expression using 'walk' for conduct. Retaining 'walk' preserves
    the metaphor and biblical style while remaining understandable.
- source_word: יָכִל לְהַשְׁפָּלָה
  chosen: he is able to humble
  alternatives:
  - he can abase
  - he is able to bring low
  lexicon: HALOT
  rationale: Expresses divine ability/power to humiliate the proud. 'Humble' is clear
    modern English; 'abase' is possible but less accessible.
