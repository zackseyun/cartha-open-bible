id: DAN.4.17
reference: Daniel 4:17
source:
  edition: WLC
  text: אִֽילָנָ/א֙ דִּ֣י חֲזַ֔יְתָ דִּ֥י רְבָ֖ה וּ/תְקִ֑ף וְ/רוּמֵ/הּ֙ יִמְטֵ֣א לִ/שְׁמַיָּ֔/א וַ/חֲזוֹתֵ֖/הּ לְ/כָל אַרְעָֽ/א־׃
translation:
  text: The tree that you saw[a], which grew and became strong, whose height reached to the heavens and was visible to all the earth—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aramaic אַרְעָא can also mean 'land'; here 'earth' best fits the global scope of the dream imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִילָנָא
  chosen: the tree
  alternatives:
  - the tree itself
  lexicon: HALOT
  rationale: Common Aramaic noun for 'tree.' The definite force is carried naturally in English as 'the tree' in reference to the specific tree from the dream.
- source_word: דִּי
  chosen: that / which
  alternatives:
  - which
  - that
  lexicon: HALOT
  rationale: Relative particle used twice in the verse to link descriptive clauses. English varies naturally between 'that' and 'which' for readability while preserving the relative structure.
- source_word: חֲזַיְתָ
  chosen: you saw
  alternatives:
  - you beheld
  lexicon: HALOT
  rationale: Direct second masculine singular perfect. 'You saw' is clear modern English and fits the narrative context of recounting the king's vision.
- source_word: רְבָה
  chosen: grew
  alternatives:
  - became great
  - became large
  lexicon: HALOT
  rationale: The verb denotes becoming great/large. 'Grew' fits the tree imagery idiomatically and preserves the organic metaphor.
- source_word: וּתְקִף
  chosen: and became strong
  alternatives:
  - and was strong
  - and grew strong
  lexicon: HALOT
  rationale: The verb conveys becoming strong or mighty. 'Became strong' matches the sequential description after 'grew' and reflects the verbal aspect.
- source_word: וְרוּמֵהּ
  chosen: whose top
  alternatives:
  - and its height
  - and its top
  lexicon: HALOT
  rationale: The noun from 'height' with 3ms suffix can be rendered 'its height,' but in context with 'reached to the heavens' English idiom favors 'whose top,' expressing the tree's lofty extent more naturally.
- source_word: יִמְטֵא
  chosen: reached
  alternatives:
  - came
  - extended
  lexicon: HALOT
  rationale: The verb means to reach or attain. 'Reached' is the most natural English rendering with the destination phrase 'to the heavens.'
- source_word: לִשְׁמַיָּא
  chosen: to the heavens
  alternatives:
  - to heaven
  - to the sky
  lexicon: HALOT
  rationale: Aramaic plural form 'heavens' is retained, matching biblical idiom and avoiding flattening to merely atmospheric 'sky.'
- source_word: וַחֲזוֹתֵהּ
  chosen: and was visible
  alternatives:
  - and its appearance was visible
  - and its sight was visible
  lexicon: HALOT
  rationale: The noun relates to appearance/visibility. In this context the sense is that the tree could be seen. 'Was visible' gives the plain sense in natural English.
- source_word: לְכָל אַרְעָא
  chosen: to all the earth
  alternatives:
  - throughout all the earth
  - to the whole earth
  lexicon: HALOT
  rationale: Literally 'to all the earth/land.' In the cosmic dream imagery, 'all the earth' best preserves the universal scope rather than limiting it to a local 'land.'
