theological_decisions:
- issue: Scope of אַרְעָא in apocalyptic royal-dream imagery
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: Although אַרְעָא can mean 'land,' the imagery of a tree visible to all the earth and reaching the heavens is intentionally universalized. 'Earth' better preserves the scale of the vision without importing later theological claims.
  doctrine_reference: Translation philosophy §1, §3, §5
