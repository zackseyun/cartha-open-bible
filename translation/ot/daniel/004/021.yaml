theological_decisions:
- issue: Rendering the divine title עִלָּיָא
  chosen_reading: the Most High
  alternative_readings:
  - the Highest One
  rationale: This title for God in Daniel emphasizes divine supremacy over earthly
    kings. 'The Most High' is both accurate and idiomatic, and does not import additional
    doctrinal content beyond the text.
