id: DAN.4.21
reference: Daniel 4:21
source:
  edition: WLC
  text: דְּנָ֥ה פִשְׁרָ֖/א מַלְכָּ֑/א וּ/גְזֵרַ֤ת עלי/א הִ֔יא דִּ֥י מְטָ֖ת עַל מרא/י
    מַלְכָּֽ/א־׃
translation:
  text: 'This is the interpretation, O king, and it is a decree of the Most High that
    has come upon my lord the king:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Highest One.' The Aramaic title refers to God as supreme over all
      rulers.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּנָה
  chosen: This
  alternatives:
  - This is
  lexicon: HALOT
  rationale: Demonstrative introducing Daniel's explanation; English supplies the
    copula naturally with the following predicate.
- source_word: פִשְׁרָא
  chosen: the interpretation
  alternatives:
  - the meaning
  - the explanation
  lexicon: HALOT
  rationale: In Biblical Aramaic this term commonly denotes the interpretation of
    a dream or mystery; 'interpretation' best fits the court-dream context and preserves
    formal correspondence.
- source_word: מַלְכָּא
  chosen: O king
  alternatives:
  - king
  lexicon: HALOT
  rationale: Vocative use after 'the interpretation'; English idiom naturally renders
    the direct address as 'O king' or 'king.' 'O king' preserves the elevated court
    style.
- source_word: וּגְזֵרַת
  chosen: and it is a decree
  alternatives:
  - and the decree
  - and this is the decree
  lexicon: HALOT
  rationale: The conjunction links a second predicate to the implied copula from the
    first clause. 'Decree' is the standard sense in royal/divine judgment contexts.
    English supplies 'it is' for clarity.
- source_word: עִלָּיָא
  chosen: the Most High
  alternatives:
  - the Highest One
  lexicon: HALOT
  rationale: Standard divine title in Daniel. 'The Most High' is established, accurate,
    and preserves the theological force of God's supremacy.
- source_word: הִיא
  chosen: it is
  alternatives:
  - this is
  lexicon: HALOT
  rationale: Independent pronoun functioning as the subject of the nominal clause;
    English requires an explicit copular expression.
- source_word: דִּי
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Relative particle introducing the clause modifying 'decree.' 'That' is
    the most natural restrictive relative in modern English.
- source_word: מְטָת
  chosen: has come
  alternatives:
  - has reached
  - has arrived
  lexicon: HALOT
  rationale: Verb conveys arrival or coming upon. 'Has come' is idiomatic with the
    following preposition 'upon' in a judgment context.
- source_word: עַל
  chosen: upon
  alternatives:
  - against
  - 'on'
  lexicon: HALOT
  rationale: The preposition marks the decree as coming upon the king. 'Upon' preserves
    the solemn tone and avoids overinterpreting as hostile 'against,' though that
    nuance is contextually present.
- source_word: מָרִי
  chosen: my lord
  alternatives:
  - my master
  lexicon: HALOT
  rationale: Courtly address to the king. 'My lord' best reflects respectful royal
    speech in English without flattening the honorific force.
- source_word: מַלְכָּא
  chosen: the king
  alternatives:
  - O king
  lexicon: HALOT
  rationale: Second occurrence appositional to 'my lord'; 'my lord the king' is a
    natural English rendering of the full honorific expression.
