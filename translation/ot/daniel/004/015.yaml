theological_decisions:
- issue: Rendering the phrase רוּחַ אֱלָהִין קַדִּישִׁין in Nebuchadnezzar's speech
  chosen_reading: the spirit of the holy gods
  alternative_readings:
  - the Spirit of the holy God
  rationale: The speaker is a Babylonian king, and both אֱלָהִין and קַדִּישִׁין are
    morphologically plural. To avoid importing a confessional monotheistic reading
    not demanded by the text, the main text preserves the likely pagan idiom. Because
    some translations construe the phrase as a singular reference to Israel's God,
    that alternative is preserved in a footnote rather than adopted in the main text.
  doctrine_reference: Translation philosophy §§1, 3; Preserve theological tension
    rather than resolve it.
