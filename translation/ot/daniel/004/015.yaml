id: DAN.4.15
reference: Daniel 4:15
source:
  edition: WLC
  text: דְּנָה֙ חֶלְמָ֣/א חֲזֵ֔ית אֲנָ֖ה מַלְכָּ֣/א נְבוּכַדְנֶצַּ֑ר ו/אנתה בֵּלְטְשַׁאצַּ֜ר
    פִּשְׁרֵ֣/א אֱמַ֗ר כָּ/ל קֳבֵל֙ דִּ֣י כָּל חַכִּימֵ֣י מַלְכוּתִ֗/י לָֽא יָכְלִ֤ין
    פִּשְׁרָ/א֙ לְ/הוֹדָ֣עֻתַ֔/נִי ו/אנתה כָּהֵ֔ל דִּ֛י רֽוּחַ אֱלָהִ֥ין קַדִּישִׁ֖ין
    בָּֽ/ךְ׀־׀־־־׃
translation:
  text: This is the dream that I, King Nebuchadnezzar, saw. And you, Belteshazzar,
    tell its interpretation, because all the wise men of my kingdom are not able to
    make its interpretation known to me, but you are able, for the spirit of the holy
    gods is in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Spirit of the holy God is in you.' The Aramaic forms are plural,
      but some take the phrase as a singular reference.
    reason: alternative_reading
lexical_decisions:
- source_word: דְּנָה
  chosen: This
  alternatives:
  - This is
  lexicon: HALOT
  rationale: Aramaic demonstrative introducing the statement; rendered deictically
    as 'This' and completed naturally in English with the copula in the clause.
- source_word: חֶלְמָא
  chosen: the dream
  alternatives:
  - dream
  lexicon: HALOT
  rationale: Definite state noun; 'the dream' reflects the marked definiteness in
    Aramaic.
- source_word: חֲזֵית
  chosen: saw
  alternatives:
  - have seen
  lexicon: HALOT
  rationale: Peal perfect 1cs of חזי, straightforward past in narrative/reporting
    context.
- source_word: אֲנָה מַלְכָּא נְבוּכַדְנֶצַּר
  chosen: I, King Nebuchadnezzar,
  alternatives:
  - I, Nebuchadnezzar the king,
  lexicon: HALOT
  rationale: Appositional self-identification; English word order adjusted for natural
    style while preserving emphasis on the speaker's royal identity.
- source_word: וְאַנתָּה
  chosen: And you
  alternatives:
  - But you
  - Now you
  lexicon: HALOT
  rationale: Simple conjunction plus pronoun. 'And you' preserves the direct address
    and discourse flow without over-interpreting contrast.
- source_word: בֵּלְטְשַׁאצַּר
  chosen: Belteshazzar
  lexicon: HALOT
  rationale: Personal name transliterated per translation philosophy.
- source_word: פִּשְׁרֵא אֱמַר
  chosen: tell its interpretation
  alternatives:
  - declare the interpretation
  - say its interpretation
  lexicon: HALOT
  rationale: פשר means 'interpretation' in Daniel's Aramaic; אמר in imperative is
    best rendered idiomatically as 'tell' rather than the wooden 'say.' The pronominal
    sense 'its' is supplied from context in English.
- source_word: כָּל־קֳבֵל דִּי
  chosen: because
  alternatives:
  - inasmuch as
  - for this reason that
  lexicon: HALOT
  rationale: Aramaic causal expression introducing the reason for the request; 'because'
    is the clearest modern equivalent.
- source_word: כָּל חַכִּימֵי מַלְכוּתִי
  chosen: all the wise men of my kingdom
  alternatives:
  - all the sages of my kingdom
  lexicon: HALOT
  rationale: חכמים refers to court wise men/sages. 'Wise men' is the most familiar
    and contextually fitting English rendering in Daniel.
- source_word: לָא יָכְלִין
  chosen: are not able
  alternatives:
  - cannot
  - were not able
  lexicon: HALOT
  rationale: Imperfect/plural verbal form expressing inability; present 'are not able'
    fits the king's current statement about their incapacity.
- source_word: פִּשְׁרָא לְהוֹדָעוּתַנִי
  chosen: to make its interpretation known to me
  alternatives:
  - to tell me the interpretation
  - to inform me of its interpretation
  lexicon: HALOT
  rationale: The causative infinitive of ידע means 'to make known'; retaining 'interpretation'
    keeps lexical consistency with פשר.
- source_word: וְאַנתָּה כָּהֵל
  chosen: but you are able
  alternatives:
  - and you are able
  lexicon: HALOT
  rationale: Though the conjunction is formally 'and,' English idiom favors 'but'
    here to mark the contrast with the inability of the wise men. כָּהֵל denotes ability/competence.
- source_word: דִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the ground for Daniel's ability; 'for' reads naturally after
    the preceding clause.
- source_word: רוּחַ אֱלָהִין קַדִּישִׁין
  chosen: the spirit of the holy gods
  alternatives:
  - the Spirit of the holy God
  - a spirit of holy gods
  lexicon: HALOT
  rationale: In the Aramaic of Daniel, the plural forms naturally yield 'gods' and
    fit Nebuchadnezzar's pagan speech. The phrase is therefore rendered according
    to its surface grammar rather than harmonized to later monotheistic interpretation.
    A notable alternative, 'Spirit of the holy God,' is preserved in a footnote because
    the phrase is debated in translation tradition.
- source_word: בָּךְ
  chosen: is in you
  alternatives:
  - is within you
  lexicon: HALOT
  rationale: Simple prepositional phrase indicating indwelling/presence; 'is in you'
    is the most direct rendering.
