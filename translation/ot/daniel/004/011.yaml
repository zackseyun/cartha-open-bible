theological_decisions:
- issue: Imperative/jussive force in the proclamation
  chosen_reading: Render the commands directly and supply the implied jussive verb in the final clause
  alternative_readings:
  - 'Translate the final clause more literally without an explicit verb: ''and the birds from its branches'''
  rationale: The Aramaic uses a sequence of imperatives followed by a jussive/imperfect and then an elliptical parallel clause. Supplying 'let ... flee' for both animals and birds communicates the syntax and sense clearly in English without adding theological interpretation.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §5 (documented exception/consistency)
