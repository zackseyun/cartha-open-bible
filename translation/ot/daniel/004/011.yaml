id: DAN.4.11
reference: Daniel 4:11
source:
  edition: WLC
  text: קָרֵ֨א בְ/חַ֜יִל וְ/כֵ֣ן אָמַ֗ר גֹּ֤דּוּ אִֽילָנָ/א֙ וְ/קַצִּ֣צוּ עַנְפ֔וֹ/הִי אַתַּ֥רוּ עָפְיֵ֖/הּ וּ/בַדַּ֣רוּ אִנְבֵּ֑/הּ תְּנֻ֤ד חֵֽיוְתָ/א֙ מִן תַּחְתּ֔וֹ/הִי וְ/צִפְּרַיָּ֖/א מִן עַנְפֽוֹ/הִי־־׃
translation:
  text: 'He cried aloud and said thus: ‘Cut down the tree[a], and chop off its branches; strip off its foliage, and scatter its fruit. Let the beasts flee from beneath it[b], and the birds from its branches.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cut down the tree.'
    reason: lexical_alternative
  - marker: b
    text: The final clause is elliptical in Aramaic; the sense is that the birds also are to flee from its branches.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרֵא בְחַיִל
  chosen: He cried aloud
  alternatives:
  - He called with might
  - He proclaimed loudly
  lexicon: HALOT
  rationale: The participle plus prepositional phrase literally conveys calling with force/strength. In idiomatic English, 'cried aloud' best captures the loud, forceful proclamation without sounding wooden.
- source_word: וְכֵן אָמַר
  chosen: and said this
  alternatives:
  - and thus he said
  - and this is what he said
  lexicon: HALOT
  rationale: כֵן here introduces the content of the proclamation ('thus/so'). 'Said this' is natural modern English while preserving the discourse function.
- source_word: גֹּדּוּ
  chosen: Chop down
  alternatives:
  - Cut down
  - Fell
  lexicon: HALOT
  rationale: The imperative refers to cutting down the tree. 'Chop down' preserves the vividness and force of the command better than the more generic 'cut down.'
- source_word: אִילָנָא
  chosen: the tree
  lexicon: HALOT
  rationale: Standard Aramaic term for 'tree.' The definite sense is appropriate in context, referring to the specific tree in the vision.
- source_word: וְקַצִּצוּ עַנְפוֹהִי
  chosen: and cut off its branches
  alternatives:
  - and lop off its branches
  - and cut away its boughs
  lexicon: HALOT
  rationale: The verb means to cut off or sever; 'branches' is the straightforward rendering of עֲנַף in this context.
- source_word: אַתַּרוּ עָפְיֵהּ
  chosen: strip off its foliage
  alternatives:
  - shake off its leaves
  - strip away its leaves
  lexicon: HALOT
  rationale: The verb conveys removing/stripping away, and עָפְיֵהּ refers to leafy growth/foliage rather than a single leaf term. 'Foliage' is natural and comprehensive.
- source_word: וּבַדַּרוּ אִנְבֵּהּ
  chosen: and scatter its fruit
  alternatives:
  - and disperse its fruit
  - and cast away its fruit
  lexicon: HALOT
  rationale: The verb means to scatter/disperse, and אִנְבֵּהּ denotes the tree's produce or fruit. 'Scatter its fruit' is both accurate and vivid.
- source_word: תְּנֻד חֵיוְתָא
  chosen: Let the beasts flee
  alternatives:
  - Let the animals move away
  - May the beasts wander off
  lexicon: HALOT
  rationale: The verb denotes moving away, fleeing, or being driven off. In this judgment scene, 'flee' best conveys the sudden departure caused by the tree's destruction.
- source_word: מִן תַּחְתּוֹהִי
  chosen: from beneath it
  alternatives:
  - from under it
  lexicon: HALOT
  rationale: A spatial expression meaning from under/beneath the tree. 'Beneath it' is slightly more literary but still natural.
- source_word: וְצִפְּרַיָּא מִן עַנְפוֹהִי
  chosen: and the birds from its branches
  alternatives:
  - and the birds from its boughs
  lexicon: HALOT
  rationale: 'The verbless final clause depends on the jussive force of תְּנֻד, so English supplies the implied verb: the birds are likewise to depart from the branches.'
