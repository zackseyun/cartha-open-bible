theological_decisions:
- issue: Rendering of רוּחַ אֱלָהִין קַדִּישִׁין in Nebuchadnezzar's speech
  chosen_reading: the spirit of the holy gods
  alternative_readings:
  - the Spirit of the holy God
  - the spirit of the holy God
  rationale: Because the speaker is Nebuchadnezzar and the Aramaic uses the plural
    אֱלָהִין with plural adjective קַדִּישִׁין, the main text preserves his polytheistic
    framing rather than harmonizing it into a monotheistic confession. Alternative
    singular renderings are worth preserving because similar phrases elsewhere are
    sometimes understood as reverent singulars in context.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
