id: DAN.4.5
reference: Daniel 4:5
source:
  edition: WLC
  text: וְ/עַ֣ד אָחֳרֵ֡ין עַל֩ קָֽדָמַ֨/י דָּנִיֵּ֜אל דִּֽי שְׁמֵ֤/הּ בֵּלְטְשַׁאצַּר֙
    כְּ/שֻׁ֣ם אֱלָהִ֔/י וְ/דִ֛י רֽוּחַ אֱלָהִ֥ין קַדִּישִׁ֖ין בֵּ֑/הּ וְ/חֶלְמָ֖/א
    קָֽדָמ֥וֹ/הִי אַמְרֵֽת־־׃
translation:
  text: 'At last Daniel came in before me—he whose name was Belteshazzar, after the
    name of my god, and in whom is the spirit of the holy gods—and I told the dream
    before him:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''the Spirit of the holy God'' or ''the spirit of the holy God.'' The
      Aramaic can be understood differently, but here the king''s wording most naturally
      reflects his pagan perspective: ''the spirit of the holy gods.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַד אָחֳרֵין
  chosen: At last
  alternatives:
  - Finally
  - But at last
  lexicon: HALOT
  rationale: The idiom combines the conjunction with a temporal adverb meaning 'afterward/at
    last.' 'At last' is natural English and preserves the sense of delayed arrival.
- source_word: עַל קָדָמַי
  chosen: came in before me
  alternatives:
  - came before me
  - entered my presence
  lexicon: HALOT
  rationale: The phrase literally denotes coming before someone's presence. 'Came
    in before me' preserves both the motion and courtly setting.
- source_word: דָּנִיֵּאל
  chosen: Daniel
  rationale: Personal name transliterated according to standard English convention.
- source_word: דִּי שְׁמֵהּ בֵּלְטְשַׁאצַּר
  chosen: he whose name was Belteshazzar
  alternatives:
  - whose name was Belteshazzar
  lexicon: HALOT
  rationale: The relative clause identifies Daniel by his Babylonian name. Expanded
    slightly with 'he whose' for smooth English while preserving the appositional
    force.
- source_word: כְּשֻׁם אֱלָהִי
  chosen: after the name of my god
  alternatives:
  - according to the name of my god
  - named after my god
  lexicon: HALOT
  rationale: The preposition with 'name' indicates correspondence or naming after.
    'After the name of my god' is idiomatic and close to the Aramaic.
- source_word: וְדִי רוּחַ אֱלָהִין קַדִּישִׁין בֵּהּ
  chosen: and in whom is the spirit of the holy gods
  alternatives:
  - and in whom is a spirit of the holy gods
  - and in whom is the Spirit of the holy gods
  lexicon: HALOT
  rationale: The Aramaic construction lacks the definiteness and singular-personal
    specificity needed to justify 'the Holy Spirit.' In Nebuchadnezzar's pagan speech,
    'the spirit of the holy gods' best reflects the plural אֱלָהִין and adjective
    קַדִּישִׁין.
- source_word: וְחֶלְמָא קָדָמוֹהִי אַמְרֵת
  chosen: and I told the dream before him
  alternatives:
  - and I told him the dream
  - and I spoke the dream in his presence
  lexicon: HALOT
  rationale: The verb means 'I said/told,' with 'the dream' as object and 'before
    him' marking Daniel's presence. This keeps the formal courtroom flavor of the
    Aramaic.
