theological_decisions:
- issue: Rendering Nebuchadnezzar's boast about Babylon's greatness
  chosen_reading: Babylon the Great
  alternative_readings:
  - great Babylon
  rationale: The phrase is descriptive rather than a technical title, but 'Babylon
    the Great' best preserves the emphatic grandeur and the memorable rhetorical force
    of the king's pride.
