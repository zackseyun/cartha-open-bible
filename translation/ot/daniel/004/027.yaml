id: DAN.4.27
reference: Daniel 4:27
source:
  edition: WLC
  text: עָנֵ֤ה מַלְכָּ/א֙ וְ/אָמַ֔ר הֲ/לָ֥א דָא הִ֖יא בָּבֶ֣ל רַבְּתָ֑/א דִּֽי אֲנָ֤ה
    בֱנַיְתַ/הּ֙ לְ/בֵ֣ית מַלְכ֔וּ בִּ/תְקַ֥ף חִסְנִ֖/י וְ/לִ/יקָ֥ר הַדְרִֽ/י־־׃
translation:
  text: The king answered and said, “Is this not Babylon the Great, which I myself
    built as a royal house by the might of my power and for the glory of my majesty?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “great Babylon.”
    reason: lexical_alternative
  - marker: b
    text: Or “for a royal residence” or “for the house of the kingdom.”
    reason: lexical_alternative
lexical_decisions:
- source_word: עָנֵה ... וְאָמַר
  chosen: answered and said
  alternatives:
  - responded and said
  - answered, saying
  lexicon: HALOT
  rationale: A standard Aramaic narrative formula. Retaining both verbs reflects the
    source text without awkwardness in English.
- source_word: הֲלָא
  chosen: Is ... not
  alternatives:
  - Is this not indeed
  - Surely this is
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting affirmation. 'Is ... not'
    preserves the interrogative force more transparently than a declarative paraphrase.
- source_word: דָא הִיא
  chosen: this
  alternatives:
  - this here
  - this is
  lexicon: HALOT
  rationale: The demonstrative plus pronoun is naturally rendered in English simply
    as 'this' within the rhetorical question.
- source_word: בָּבֶל רַבְּתָא
  chosen: Babylon the Great
  alternatives:
  - great Babylon
  - Babylon the great city
  lexicon: HALOT
  rationale: The emphatic adjective after the proper name is well represented by the
    appositional title 'Babylon the Great,' which also preserves the king's boastful
    tone.
- source_word: דִּי
  chosen: which
  alternatives:
  - that
  - for
  lexicon: HALOT
  rationale: Relative particle introducing the clause describing Babylon. 'Which'
    is idiomatic and sufficiently formal.
- source_word: אֲנָה
  chosen: I myself
  alternatives:
  - I
  - I alone
  lexicon: HALOT
  rationale: The explicit independent pronoun before the verb is emphatic. 'I myself'
    conveys the self-exalting emphasis without overstating exclusivity.
- source_word: בֱנַיְתַהּ
  chosen: built
  alternatives:
  - have built
  - constructed
  lexicon: HALOT
  rationale: Simple past fits the narrative context in English. 'Built' is the direct
    and natural equivalent.
- source_word: לְבֵית מַלְכוּ
  chosen: as a royal house
  alternatives:
  - for a royal residence
  - for the house of the kingdom
  - as the seat of royalty
  lexicon: HALOT
  rationale: Literally 'for a house of kingship/kingdom.' In context Nebuchadnezzar
    is speaking of Babylon as the center and expression of royal rule. 'As a royal
    house' preserves the house imagery while remaining intelligible. 'Royal residence'
    is possible but narrows the sense too much to a palace alone.
- source_word: בִּתְקַף חִסְנִי
  chosen: by the might of my power
  alternatives:
  - by the strength of my power
  - with the force of my might
  lexicon: HALOT
  rationale: The phrase is intentionally grand and somewhat redundant. 'Might of my
    power' preserves the boastful intensification better than smoothing it out.
- source_word: וְלִיקָר הַדְרִי
  chosen: and for the glory of my majesty
  alternatives:
  - and for the honor of my splendor
  - and for the glory of my splendor
  lexicon: HALOT
  rationale: לִיקָר denotes honor/glory, and הַדְרִי denotes majesty/splendor. 'Glory
    of my majesty' is elevated but readable, matching the king's self-glorifying rhetoric.
