theological_decisions:
- issue: Degree of explicitness regarding divine agency in the king's restoration
  chosen_reading: Use passive formulations ('returned to me,' 'was reestablished,'
    'was added to me') without inserting 'by God' into the verse.
  alternative_readings:
  - Make divine agency explicit in translation
  rationale: The broader context clearly attributes the restoration to the Most High,
    but this verse itself expresses that agency implicitly. Preserving the passive
    wording avoids importing a doctrinally true claim beyond what this verse explicitly
    states.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
