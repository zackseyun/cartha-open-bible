id: DAN.4.33
reference: Daniel 4:33
source:
  edition: WLC
  text: בֵּ/הּ זִמְנָ֞/א מַנְדְּעִ֣/י יְת֣וּב עֲלַ֗/י וְ/לִ/יקַ֨ר מַלְכוּתִ֜/י הַדְרִ֤/י
    וְ/זִוִ/י֙ יְת֣וּב עֲלַ֔/י וְ/לִ֕/י הַדָּֽבְרַ֥/י וְ/רַבְרְבָנַ֖/י יְבַע֑וֹן וְ/עַל
    מַלְכוּתִ֣/י הָתְקְנַ֔ת וּ/רְב֥וּ יַתִּירָ֖ה ה֥וּסְפַת לִֽ/י־׀־׃
translation:
  text: At that time my reason returned to me, and for the glory of my kingdom, my
    majesty and splendor returned to me. My counselors and my nobles sought me out,
    and I was reestablished over my kingdom, and surpassing greatness was added to
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my understanding' for 'my reason.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my advisers and my great men sought me.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I was restored/confirmed over my kingdom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּהּ זִמְנָא
  chosen: At that time
  alternatives:
  - At the same time
  - In that moment
  lexicon: HALOT
  rationale: Temporal Aramaic expression introducing the restoration; 'At that time'
    is natural English and preserves the narrative sequence without over-specifying
    immediacy.
- source_word: מַנְדְּעִי
  chosen: my reason
  alternatives:
  - my understanding
  - my mind
  - my knowledge
  lexicon: HALOT
  rationale: In context of Nebuchadnezzar's restoration after madness, the term refers
    to restored mental capacity or rational understanding. 'My reason' is concise,
    idiomatic, and contextually precise.
- source_word: יְתוּב עֲלַי
  chosen: returned to me
  alternatives:
  - came back to me
  - was restored to me
  lexicon: HALOT
  rationale: The verb literally means 'returned' or 'came back.' 'Returned to me'
    preserves the repeated verbal pattern in the verse and reads naturally in English.
- source_word: לִיקַר מַלְכוּתִי
  chosen: for the glory of my kingdom
  alternatives:
  - for the honor of my kingdom
  - for the splendor of my kingdom
  lexicon: HALOT
  rationale: The preposition ל marks relation or purpose/result. 'For the glory of
    my kingdom' best captures that the restoration of his faculties is connected with
    the royal dignity of his reign.
- source_word: הַדְרִי
  chosen: my majesty
  alternatives:
  - my honor
  - my grandeur
  lexicon: HALOT
  rationale: This noun denotes royal majesty or dignity. 'Majesty' fits the kingly
    context and pairs well with the following term.
- source_word: זִוִי
  chosen: splendor
  alternatives:
  - brightness
  - radiance
  - appearance
  lexicon: HALOT
  rationale: The term can denote brightness or outward appearance; in royal context
    'splendor' conveys restored regal bearing rather than mere physical appearance.
- source_word: הַדָּבְרַי
  chosen: my counselors
  alternatives:
  - my advisers
  lexicon: HALOT
  rationale: The noun refers to those who advise the king. 'Counselors' is a standard
    and clear rendering in court context.
- source_word: רַבְרְבָנַי
  chosen: my nobles
  alternatives:
  - my lords
  - my great men
  - my officials
  lexicon: HALOT
  rationale: The term denotes high-ranking persons or magnates in the kingdom. 'Nobles'
    is idiomatic and suitably royal.
- source_word: יְבַעוֹן
  chosen: sought me out
  alternatives:
  - sought me
  - looked for me
  - consulted me
  lexicon: HALOT
  rationale: The verb means to seek or request. In this restoration scene, 'sought
    me out' conveys that his officials came to him again in recognition of his restored
    rule.
- source_word: עַל מַלְכוּתִי הָתְקְנַת
  chosen: I was reestablished over my kingdom
  alternatives:
  - I was restored over my kingdom
  - I was confirmed over my kingdom
  lexicon: HALOT
  rationale: The passive/causative form indicates being set firmly back in place in
    relation to the kingdom. 'Reestablished' captures both restoration and stabilization.
- source_word: רְבוּ יַתִּירָה
  chosen: surpassing greatness
  alternatives:
  - extraordinary greatness
  - abundant greatness
  - exceeding greatness
  lexicon: HALOT
  rationale: The phrase intensifies the increase granted to the king. 'Surpassing
    greatness' preserves the comparative force without sounding wooden.
- source_word: הוּסְפַת לִי
  chosen: was added to me
  alternatives:
  - was granted to me
  - was increased for me
  lexicon: HALOT
  rationale: The passive verb means 'was added.' Retaining this wording preserves
    the sense that the increase came to him from outside himself, fitting the broader
    context of divine restoration.
