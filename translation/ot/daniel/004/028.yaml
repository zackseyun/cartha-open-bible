id: DAN.4.28
reference: Daniel 4:28
source:
  edition: WLC
  text: ע֗וֹד מִלְּתָ/א֙ בְּ/פֻ֣ם מַלְכָּ֔/א קָ֖ל מִן שְׁמַיָּ֣/א נְפַ֑ל לָ֤/ךְ אָֽמְרִין֙
    נְבוּכַדְנֶצַּ֣ר מַלְכָּ֔/א מַלְכוּתָ֖/ה עֲדָ֥ת מִנָּֽ/ךְ־׃
translation:
  text: 'While the word was still in the king’s mouth, a voice fell from heaven: “To
    you it is said, King Nebuchadnezzar, the kingdom has departed from you.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the kingdom has been removed from you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹד
  chosen: while ... still
  alternatives:
  - still
  - yet
  lexicon: HALOT
  rationale: 'In context with the following clause, עוֹד marks ongoing action at the
    moment of interruption: the word was still in the king''s mouth.'
- source_word: מִלְּתָא
  chosen: the word
  alternatives:
  - the matter
  - the statement
  lexicon: HALOT
  rationale: The singular refers to the king's utterance just spoken. 'Word' is natural
    and sufficiently formal; 'statement' is possible but less idiomatic here.
- source_word: בְּפֻם מַלְכָּא
  chosen: in the king’s mouth
  alternatives:
  - on the king’s lips
  lexicon: HALOT
  rationale: This idiom is best preserved fairly literally. 'In the king’s mouth'
    communicates that he was still speaking when interrupted.
- source_word: קָל
  chosen: a voice
  alternatives:
  - a sound
  lexicon: HALOT
  rationale: Given the participle 'saying' and direct speech that follows, the noun
    clearly denotes an articulate voice, not merely a sound.
- source_word: מִן שְׁמַיָּא
  chosen: from heaven
  alternatives:
  - from the heavens
  - from the sky
  lexicon: HALOT
  rationale: In biblical idiom this refers to the heavenly realm, not merely the physical
    sky. 'From heaven' is the most natural English rendering.
- source_word: נְפַל
  chosen: fell
  alternatives:
  - came down
  - descended
  lexicon: HALOT
  rationale: The verb is literally 'fell.' Retaining 'fell' preserves the vividness
    of the Aramaic while remaining intelligible in English with 'a voice fell from
    heaven.'
- source_word: לָךְ אָמְרִין
  chosen: To you it is said
  alternatives:
  - they say to you
  - it is being said to you
  lexicon: HALOT
  rationale: The plural participle functions as an impersonal passive-like expression.
    'To you it is said' is idiomatic English and preserves the formal announcement
    tone.
- source_word: נְבוּכַדְנֶצַּר מַלְכָּא
  chosen: King Nebuchadnezzar
  alternatives:
  - Nebuchadnezzar the king
  lexicon: HALOT
  rationale: English title order normally places the title before the name. This preserves
    the vocative force in direct address.
- source_word: מַלְכוּתָה
  chosen: the kingdom
  alternatives:
  - royal rule
  - kingship
  lexicon: HALOT
  rationale: The noun denotes the royal dominion/kingdom. 'The kingdom' is the most
    direct and contextually fitting rendering.
- source_word: עֲדָת
  chosen: has departed
  alternatives:
  - has passed away
  - has been removed
  lexicon: HALOT
  rationale: The verb indicates that the kingdom has been taken away or passed from
    him. 'Has departed' stays close to the Aramaic wording while fitting the context
    of loss of rule.
- source_word: מִנָּךְ
  chosen: from you
  alternatives:
  - away from you
  lexicon: HALOT
  rationale: Simple prepositional phrase indicating separation; 'from you' is sufficient
    in English because the verb already conveys departure.
