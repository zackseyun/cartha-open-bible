theological_decisions:
- issue: Nature of 'heaven' in the announcement
  chosen_reading: from heaven
  alternative_readings:
  - from the heavens
  - from the sky
  rationale: The context is a divine judgment oracle, so the phrase should retain
    its theological resonance rather than be flattened to meteorological language.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; readable modern English'
