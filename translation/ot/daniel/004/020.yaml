id: DAN.4.20
reference: Daniel 4:20
source:
  edition: WLC
  text: וְ/דִ֣י חֲזָ֣ה מַלְכָּ֡/א עִ֣יר וְ/קַדִּ֣ישׁ נָחִ֣ת מִן שְׁמַיָּ֡/א וְ/אָמַר֩
    גֹּ֨דּוּ אִֽילָנָ֜/א וְ/חַבְּל֗וּ/הִי בְּרַ֨ם עִקַּ֤ר שָׁרְשׁ֨וֹ/הִי֙ בְּ/אַרְעָ֣/א
    שְׁבֻ֔קוּ וּ/בֶ/אֱסוּר֙ דִּֽי פַרְזֶ֣ל וּ/נְחָ֔שׁ בְּ/דִתְאָ֖/א דִּ֣י בָרָ֑/א
    וּ/בְ/טַ֧ל שְׁמַיָּ֣/א יִצְטַבַּ֗ע וְ/עִם חֵיוַ֤ת בָּרָ/א֙ חֲלָקֵ֔/הּ עַ֛ד דִּֽי
    שִׁבְעָ֥ה עִדָּנִ֖ין יַחְלְפ֥וּן עֲלֽוֹ/הִי׀־־־־׃
translation:
  text: And because the king saw a watcher, a holy one, coming down from heaven and
    saying, ‘Cut down the tree and destroy it, but leave the stump of its roots in
    the earth, with a band of iron and bronze, in the grass of the field, and let
    him be drenched with the dew of heaven, and let his portion be with the beasts
    of the field until seven times pass over him’—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sentinel'; the Aramaic term denotes a heavenly being characterized as
      watchful.
    reason: lexical_alternative
  - marker: b
    text: Or 'with a fetter of iron and bronze.'
    reason: lexical_alternative
  - marker: c
    text: '''Seven times'' may mean seven periods of time; the text does not specify
      the exact unit.'
    reason: alternative_reading
lexical_decisions:
- source_word: עִיר
  chosen: watcher
  alternatives:
  - sentinel
  lexicon: HALOT
  rationale: In Daniel's Aramaic, עִיר denotes a heavenly being characterized as one
    who is awake/watchful. 'Watcher' is the established and most transparent rendering
    in context; 'sentinel' is possible but less natural and less tied to the term's
    traditional sense.
- source_word: וְקַדִּישׁ
  chosen: a holy one
  alternatives:
  - and holy one
  lexicon: HALOT
  rationale: 'The conjunction links two appositional descriptions of the same heavenly
    figure: ''a watcher, a holy one.'' Rendering with a repeated article in English
    clarifies the apposition naturally.'
- source_word: נָחִת מִן שְׁמַיָּא
  chosen: coming down from heaven
  alternatives:
  - descending from heaven
  lexicon: HALOT
  rationale: 'A participial idea is conveyed: the figure is seen in the act of descent.
    ''Coming down from heaven'' is idiomatic modern English while preserving the motion.'
- source_word: גֹּדּוּ
  chosen: Cut down
  alternatives:
  - hew down
  - chop down
  lexicon: HALOT
  rationale: An imperative addressed to multiple agents. 'Cut down' is clear modern
    English and fits the image of felling a tree.
- source_word: וְחַבְּלוּהִי
  chosen: destroy it
  alternatives:
  - ruin it
  - strip it
  lexicon: HALOT
  rationale: The verb carries the sense of damaging or destroying. In the tree metaphor,
    'destroy it' best matches the command's force in English.
- source_word: בְּרַם
  chosen: but
  alternatives:
  - nevertheless
  - however
  lexicon: HALOT
  rationale: Marks a strong contrast between cutting down the tree and preserving
    its root-stump.
- source_word: עִקַּר שָׁרְשׁוֹהִי
  chosen: the stump of its roots
  alternatives:
  - the root-stump
  - the stock of its roots
  lexicon: HALOT
  rationale: This phrase refers not merely to roots abstractly but to the remaining
    rooted stump. 'The stump of its roots' is literal enough while remaining readable.
- source_word: שְׁבֻקוּ
  chosen: leave
  alternatives:
  - let remain
  lexicon: HALOT
  rationale: Imperative plural meaning to leave or permit to remain.
- source_word: וּבֶאֱסוּר דִּי פַרְזֶל וּנְחָשׁ
  chosen: even with a band of iron and bronze
  alternatives:
  - and with a fetter of iron and bronze
  - bound with iron and bronze
  lexicon: HALOT
  rationale: אֱסוּר denotes a binding/band. 'Band' fits the image of encircling the
    stump; 'bronze' is preferred for נְחָשׁ in this metal context.
- source_word: בְּדִתְאָא דִּי בָרָא
  chosen: in the grass of the field
  alternatives:
  - in the tender grass of the field
  lexicon: HALOT
  rationale: The phrase denotes vegetation/grass in the open field. 'Grass of the
    field' is the most natural concise rendering.
- source_word: יִצְטַבַּע
  chosen: let him be drenched
  alternatives:
  - let him be wet
  - let him be soaked
  lexicon: HALOT
  rationale: The verb indicates being moistened or drenched. 'Drenched' conveys the
    passive intensity more vividly than merely 'wet.'
- source_word: וְעִם חֵיוַת בָּרָא חֲלָקֵהּ
  chosen: let his portion be with the beasts of the field
  alternatives:
  - let his lot be with the animals of the field
  lexicon: HALOT
  rationale: חֲלָק means share/portion/lot. 'Portion' preserves the formal sense while
    remaining understandable. 'Beasts' matches the elevated tone and common biblical
    usage.
- source_word: שִׁבְעָה עִדָּנִין
  chosen: seven times
  alternatives:
  - seven periods
  lexicon: HALOT
  rationale: עִדָּן in Daniel commonly denotes a time/period. 'Seven times' preserves
    the traditional ambiguity of the unit rather than over-specifying it.
- source_word: יַחְלְפוּן עֲלֹוהִי
  chosen: pass over him
  alternatives:
  - pass by him
  - pass upon him
  lexicon: HALOT
  rationale: The idiom indicates the passing of a period over someone. 'Pass over
    him' is the most literal and recognizable English equivalent.
