theological_decisions:
- issue: Identity of the 'watcher, a holy one'
  chosen_reading: Render as a heavenly being without specifying angelic taxonomy beyond
    the text
  alternative_readings:
  - angel
  - divine council member
  rationale: The Aramaic text uses its own designation, 'watcher, a holy one.' To
    preserve theological precision and avoid importing a more specific system, the
    translation keeps the source terminology rather than resolving the being's exact
    classification.
  doctrine_reference: Preserve theological tension rather than resolve it.
