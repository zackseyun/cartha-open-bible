id: DAN.4.26
reference: Daniel 4:26
source:
  edition: WLC
  text: לִ/קְצָ֥ת יַרְחִ֖ין תְּרֵֽי עֲשַׂ֑ר עַל הֵיכַ֧ל מַלְכוּתָ֛/א דִּ֥י בָבֶ֖ל
    מְהַלֵּ֥ךְ הֲוָֽה־־׃
translation:
  text: At the end of twelve months, he was walking on the palace of the kingdom of
    Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'walking on the roof of the royal palace of Babylon.' The Aramaic literally
      says 'on the palace of the kingdom of Babylon,' and the location may refer to
      the palace roof or upper structure.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִ/קְצָת
  chosen: At the end of
  alternatives:
  - After
  - At the completion of
  lexicon: HALOT
  rationale: The noun קְצָת/קְצֵה in this temporal construction marks the conclusion
    of a period. 'At the end of' is idiomatic English and preserves the temporal sense
    without over-paraphrase.
- source_word: יַרְחִין תְּרֵי עֲשַׂר
  chosen: twelve months
  alternatives:
  - twelve moons
  - a year
  lexicon: HALOT
  rationale: Aramaic יַרְחִין means 'months.' 'Twelve months' is the most direct rendering.
    'A year' would be interpretive compression, and 'moons' would be overly literal
    in English.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: The preposition most naturally means 'on/upon' here, indicating location.
    In context it likely refers to movement on the roof/upper structure of the palace,
    but the text itself says 'on,' which should be retained in the main text.
- source_word: הֵיכַל
  chosen: palace
  alternatives:
  - temple
  - great house
  lexicon: HALOT
  rationale: In this royal Babylonian context, הֵיכַל refers to a palace rather than
    a temple. 'Palace' fits the immediate setting and standard usage in Daniel.
- source_word: מַלְכוּתָא
  chosen: the kingdom of
  alternatives:
  - the royal
  - the kingship of
  lexicon: HALOT
  rationale: The noun denotes kingdom/royal dominion. The construct-like sequence
    with 'Babylon' is best represented as 'the kingdom of Babylon,' preserving the
    political sense rather than reducing it to an adjective.
- source_word: דִּי
  chosen: of
  alternatives:
  - which was
  - that belonged to
  lexicon: HALOT
  rationale: The relative particle links 'kingdom' and 'Babylon.' In English, a simple
    genitival 'of' is the most natural equivalent in this phrase.
- source_word: בָבֶל
  chosen: Babylon
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: מְהַלֵּךְ הֲוָה
  chosen: he was walking
  alternatives:
  - he walked
  - he was going about
  lexicon: HALOT
  rationale: The participle with the form of היה expresses ongoing past action. 'He
    was walking' captures the progressive aspect better than the simple past.
