theological_decisions:
- issue: Whether שְׁמַיָּא should be rendered literally as 'the heavens' or as the
    reverential metonym 'Heaven' for God
  chosen_reading: Heaven rules
  alternative_readings:
  - the heavens rule
  rationale: In the immediate context of Daniel, 'Heaven' functions as a reverential
    way of speaking about God's sovereign rule. Rendering it as singular and capitalized
    preserves the theological idiom without over-paraphrasing into 'God rules.'
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
