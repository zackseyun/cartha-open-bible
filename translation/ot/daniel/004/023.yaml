id: DAN.4.23
reference: Daniel 4:23
source:
  edition: WLC
  text: וְ/דִ֣י אֲמַ֗רוּ לְ/מִשְׁבַּ֞ק עִקַּ֤ר שָׁרְשׁ֨וֹ/הִי֙ דִּ֣י אִֽילָנָ֔/א מַלְכוּתָ֖/ךְ
    לָ֣/ךְ קַיָּמָ֑ה מִן דִּ֣י תִנְדַּ֔ע דִּ֥י שַׁלִּטִ֖ן שְׁמַיָּֽ/א־׃
translation:
  text: And because they said to leave the stump of the tree with its roots, your
    kingdom will remain yours from the time that you know that Heaven rules.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the heavens rule.' The Aramaic uses 'heavens' as a reverential expression
      for God's sovereign authority.
    reason: alternative_reading
lexical_decisions:
- source_word: וְדִי
  chosen: And because
  alternatives:
  - And whereas
  - And that
  lexicon: HALOT
  rationale: The conjunction plus relative particle introduces an explanatory clause
    tied to the previous verse. 'And because' best captures the causal force in smooth
    English.
- source_word: אֲמַרוּ
  chosen: they said
  alternatives:
  - it was said
  lexicon: HALOT
  rationale: Peal perfect 3mp, active. An indefinite plural in Aramaic can function
    impersonally, but the active 'they said' preserves the source form and matches
    the narrative context of the watchers' decree.
- source_word: לְמִשְׁבַּק
  chosen: to leave
  alternatives:
  - to let remain
  - to spare
  lexicon: HALOT
  rationale: Infinitive of שבק in Biblical Aramaic means 'leave, permit, spare.' 'Leave'
    fits the construction most naturally here.
- source_word: עִקַּר שָׁרְשׁוֹהִי
  chosen: the stump of the tree with its roots
  alternatives:
  - the root of its roots
  - the stock of its roots
  lexicon: HALOT
  rationale: The phrase denotes the remaining base/root system of the felled tree.
    English idiom requires supplying 'stump' to convey the image clearly; this is
    confirmed by the immediate apposition with 'the tree.'
- source_word: דִּי אִילָנָא
  chosen: of the tree
  alternatives:
  - that is, the tree
  lexicon: HALOT
  rationale: The relative particle here links the stump/roots to the tree. In English,
    a genitival rendering is the most natural.
- source_word: מַלְכוּתָךְ לָךְ קַיָּמָה
  chosen: your kingdom will remain for you
  alternatives:
  - your kingdom will be established for you
  - your kingdom will stand for you
  lexicon: HALOT
  rationale: קַיָּמָה carries the sense of enduring, standing firm, remaining in place.
    In context the point is that Nebuchadnezzar's royal rule is not permanently removed
    but preserved for restoration.
- source_word: מִן דִּי
  chosen: from the time that
  alternatives:
  - after
  - when
  lexicon: HALOT
  rationale: This idiom marks the point from which the kingdom's restoration/continuance
    is realized. 'From the time that' preserves the temporal nuance more precisely
    than the simpler 'when.'
- source_word: תִנְדַּע
  chosen: you know
  alternatives:
  - you come to know
  - you acknowledge
  lexicon: HALOT
  rationale: The verb means 'know,' but in context it includes recognition or acknowledgment.
    The simpler 'know' keeps closer to the source while allowing the contextual force
    to be inferred.
- source_word: שַׁלִּטִן
  chosen: rules
  alternatives:
  - are sovereign
  - have dominion
  lexicon: HALOT
  rationale: Plural adjective/participle-like form used predicatively with 'Heaven'
    as a reverential metonym. 'Rules' is concise, idiomatic, and conveys sovereign
    authority.
- source_word: שְׁמַיָּא
  chosen: Heaven
  alternatives:
  - the heavens
  - Heaven above
  lexicon: HALOT
  rationale: In Daniel this term can function as a reverential circumlocution for
    God. Capitalized singular 'Heaven' preserves the metonymic force and matches the
    idiom of the passage.
