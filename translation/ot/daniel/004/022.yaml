theological_decisions:
- issue: Meaning of עִדָּנִין in Nebuchadnezzar's judgment
  chosen_reading: seven times
  alternative_readings:
  - seven years
  - seven periods
  - seven seasons
  rationale: The Aramaic term is broader than a precise calendrical unit. The main
    text preserves the lexical ambiguity rather than resolving it to 'years,' which
    is interpretive. An alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Rendering אֲנָשָׁא in this verse
  chosen_reading: men
  alternative_readings:
  - people
  - humanity
  rationale: The verse contrasts human society with beasts and later speaks of the
    'kingdom of men.' Following the gender-accurate principle, 'men' best matches
    the representative/generic force here without flattening the source to a modern
    neutral term.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
