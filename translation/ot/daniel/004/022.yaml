id: DAN.4.22
reference: Daniel 4:22
source:
  edition: WLC
  text: וְ/לָ֣/ךְ טָֽרְדִ֣ין מִן אֲנָשָׁ֡/א וְ/עִם חֵיוַ֣ת בָּרָ/א֩ לֶהֱוֵ֨ה מְדֹרָ֜/ךְ
    וְ/עִשְׂבָּ֥/א כְ/תוֹרִ֣ין לָ֣/ךְ יְטַֽעֲמ֗וּן וּ/מִ/טַּ֤ל שְׁמַיָּ/א֙ לָ֣/ךְ
    מְצַבְּעִ֔ין וְ/שִׁבְעָ֥ה עִדָּנִ֖ין יַחְלְפ֣וּן עֲלָ֑/יךְ עַ֣ד דִּֽי תִנְדַּ֗ע
    דִּֽי שַׁלִּ֤יט עִלָּיָ/א֙ בְּ/מַלְכ֣וּת אֲנָשָׁ֔/א וּ/לְ/מַן דִּ֥י יִצְבֵּ֖א
    יִתְּנִנַּֽ/הּ־־׀־־־׃
translation:
  text: And you will be driven away from men, and your dwelling will be with the beasts
    of the field. You will be made to eat grass like oxen, and you will be drenched
    with the dew of heaven, and seven times will pass over you, until you know that
    the Most High rules in the kingdom of men and gives it to whomever he wills.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seven periods'; many understand this as 'seven years.'
    reason: alternative_reading
  - marker: b
    text: '''Kingdom of men'' means human rule or the realm of mankind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טָרְדִין
  chosen: you will be driven away
  alternatives:
  - they will drive you away
  - you will be expelled
  lexicon: HALOT
  rationale: Aramaic plural active form with indefinite subject naturally yields an
    English passive/impersonal sense. 'Driven away' preserves the force of forcible
    removal better than the softer 'sent away.'
- source_word: אֲנָשָׁא
  chosen: men
  alternatives:
  - people
  - humanity
  lexicon: HALOT
  rationale: Here the contrast is between human society and animal life. 'Men' preserves
    the source's human/social contrast and aligns with the phrase later in the verse,
    'kingdom of men.'
- source_word: חֵיוַת בָּרָא
  chosen: the beasts of the field
  alternatives:
  - wild animals
  - animals of the open country
  lexicon: HALOT
  rationale: Traditional but accurate rendering of the Aramaic expression for wild
    land animals. 'Beasts of the field' preserves the elevated tone and the imagery
    of living outside civilized human space.
- source_word: מְדֹרָךְ
  chosen: your dwelling
  alternatives:
  - your habitation
  - your abode
  lexicon: HALOT
  rationale: Refers to place of habitation. 'Dwelling' is natural modern English while
    retaining the concrete sense.
- source_word: וְעִשְׂבָּא
  chosen: grass
  alternatives:
  - vegetation
  - herbage
  lexicon: HALOT
  rationale: In context of animal grazing, 'grass' is the most idiomatic and specific
    English equivalent.
- source_word: כְתוֹרִין
  chosen: like oxen
  alternatives:
  - like cattle
  - like bulls
  lexicon: HALOT
  rationale: The term denotes bovines; 'oxen' fits the comparative image of grazing
    animals and matches longstanding English usage without implying only male breeding
    animals as 'bulls' might.
- source_word: יְטַעֲמוּן
  chosen: you will be made to eat
  alternatives:
  - they will feed you
  - you will eat
  lexicon: HALOT
  rationale: 'The causative nuance is significant: this is something imposed on Nebuchadnezzar,
    not merely his voluntary action. ''Be made to eat'' captures that force.'
- source_word: מִטַּל שְׁמַיָּא
  chosen: with the dew of heaven
  alternatives:
  - by the dew of heaven
  - with heavenly dew
  lexicon: HALOT
  rationale: A literal rendering preserves the vivid image and the idiom. 'Heaven'
    rather than 'sky' suits the elevated register and the theological context of divine
    sovereignty.
- source_word: מְצַבְּעִין
  chosen: you will be drenched
  alternatives:
  - you will be wet
  - they will soak you
  lexicon: HALOT
  rationale: The verb conveys being moistened/soaked. 'Drenched' is vivid and natural
    in English, fitting exposure to dew outdoors.
- source_word: שִׁבְעָה עִדָּנִין
  chosen: seven times
  alternatives:
  - seven periods
  - seven seasons
  lexicon: HALOT
  rationale: The Aramaic term can denote a period or appointed time. 'Seven times'
    is the most direct and traditional rendering, preserving the ambiguity of the
    exact duration rather than over-specifying it.
- source_word: יַחְלְפוּן עֲלָיִךְ
  chosen: will pass over you
  alternatives:
  - will pass by for you
  - will elapse over you
  lexicon: HALOT
  rationale: Idiomatic English equivalent for time passing upon a person. 'Pass over
    you' preserves the personal, experiential force of the Aramaic.
- source_word: עַד דִּי תִנְדַּע
  chosen: until you know
  alternatives:
  - until you acknowledge
  - until you learn
  lexicon: HALOT
  rationale: The verb is 'know,' but in context it implies experiential recognition.
    'Know' keeps the wording close to the source while allowing the context to supply
    the fuller sense.
- source_word: שַׁלִּיט עִלָּיָא
  chosen: the Most High rules
  alternatives:
  - the Most High is sovereign
  - the Most High has dominion
  lexicon: HALOT
  rationale: The adjective/title 'Most High' is standard for עִלָּיָא in Daniel. 'Rules'
    is a clear verbal equivalent for the predicate expressing dominion, accessible
    without losing theological weight.
- source_word: בְּמַלְכוּת אֲנָשָׁא
  chosen: in the kingdom of men
  alternatives:
  - over the kingdom of mankind
  - in human kingship
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the phrase's texture and the contrast
    between divine sovereignty and human rule. 'Kingdom of men' is understandable
    and echoes the source structure.
- source_word: וּלְמַן דִּי יִצְבֵּא
  chosen: to whomever he wills
  alternatives:
  - to anyone he wants
  - to whom he pleases
  lexicon: HALOT
  rationale: This expresses divine volition. 'Whomever he wills' preserves the solemn
    register and avoids colloquial flattening.
- source_word: יִתְּנִנַּהּ
  chosen: gives it
  alternatives:
  - sets it
  - bestows it
  lexicon: HALOT
  rationale: The pronoun refers back to the kingdom/kingship. 'Gives it' is the straightforward
    equivalent and fits the statement of God's sovereign disposal of rule.
