id: DAN.4.16
reference: Daniel 4:16
source:
  edition: WLC
  text: אֱדַ֨יִן דָּֽנִיֵּ֜אל דִּֽי שְׁמֵ֣/הּ בֵּלְטְשַׁאצַּ֗ר אֶשְׁתּוֹמַם֙ כְּ/שָׁעָ֣ה חֲדָ֔ה וְ/רַעְיֹנֹ֖/הִי יְבַהֲלֻנֵּ֑/הּ עָנֵ֨ה מַלְכָּ֜/א וְ/אָמַ֗ר בֵּלְטְשַׁאצַּר֙ חֶלְמָ֤/א וּ/פִשְׁרֵ/א֙ אַֽל יְבַהֲלָ֔/ךְ עָנֵ֤ה בֵלְטְשַׁאצַּר֙ וְ/אָמַ֔ר מרא/י חֶלְמָ֥/א ל/שנאי/ך וּ/פִשְׁרֵ֥/הּ ל/ערי/ך־־׃
translation:
  text: Then Daniel[a], whose name was Belteshazzar, was appalled for about an hour, and his thoughts terrified him. The king answered and said, “Belteshazzar, do not let the dream or its interpretation terrify you.” Belteshazzar answered and said, “My lord, may the dream be for those who hate you[b], and its interpretation for your enemies.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was stunned' or 'was astonished.' The Aramaic verb can denote being shocked into silence; here the context favors emotional dismay.
    reason: lexical_alternative
  - marker: b
    text: Literally 'for one hour.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence; 'Then' is natural modern English and preserves narrative flow.
- source_word: דָּנִיֵּאל דִּי שְׁמֵהּ בֵּלְטְשַׁאצַּר
  chosen: Daniel, whose name was Belteshazzar
  alternatives:
  - Daniel, who was named Belteshazzar
  - Daniel, whose name is Belteshazzar
  lexicon: HALOT
  rationale: The relative construction identifies Daniel by his Babylonian name for the king's context. 'Whose name was' is idiomatic in past narrative and preserves the explanatory apposition.
- source_word: אֶשְׁתּוֹמַם
  chosen: was appalled
  alternatives:
  - was stunned
  - was astonished
  - was desolated
  lexicon: HALOT
  rationale: The verb conveys being stunned or appalled into silence. In context Daniel is disturbed by the ominous meaning of the dream, so 'was appalled' better captures emotional shock than the more neutral 'was astonished.'
- source_word: כְּשָׁעָה חֲדָה
  chosen: for about an hour
  alternatives:
  - for one hour
  - for a moment
  lexicon: HALOT
  rationale: Literally 'for one hour.' In Biblical Aramaic this can denote a period of time approximated as an hour; 'about an hour' is idiomatic and avoids an overly mechanical sense while preserving the temporal duration.
- source_word: וְרַעְיֹנֹהִי
  chosen: and his thoughts
  alternatives:
  - and his reflections
  - and his reasonings
  lexicon: HALOT
  rationale: The noun refers to thoughts or mental reflections. 'Thoughts' is the clearest modern equivalent and fits the psychological context.
- source_word: יְבַהֲלֻנֵּהּ
  chosen: terrified him
  alternatives:
  - alarmed him
  - troubled him
  lexicon: HALOT
  rationale: The verb denotes causing dread or alarm. Because the same root recurs in the king's reassurance, 'terrified' preserves the stronger emotional force and lexical consistency.
- source_word: עָנֵה מַלְכָּא וְאָמַר
  chosen: The king answered and said
  alternatives:
  - The king responded and said
  - The king said
  lexicon: HALOT
  rationale: This is a standard Semitic speech formula. Retaining both verbs reflects the source text without sounding unnatural in English.
- source_word: חֶלְמָא וּפִשְׁרֵא אַל יְבַהֲלָךְ
  chosen: do not let the dream or its interpretation terrify you
  alternatives:
  - do not let the dream and its interpretation alarm you
  - let not the dream or its interpretation trouble you
  lexicon: HALOT
  rationale: The singular verb with two coordinated nouns is naturally rendered with 'the dream or its interpretation' as the things that might terrify Daniel. 'Do not let ... terrify you' is idiomatic English and preserves the causative sense.
- source_word: מָרִי
  chosen: My lord
  alternatives:
  - My master
  - Sir
  lexicon: HALOT
  rationale: A respectful address to the king. 'My lord' preserves courtly deference without importing divine overtones in this context.
- source_word: לְשָׂנְאָיִךְ
  chosen: for those who hate you
  alternatives:
  - to those who hate you
  - for your haters
  lexicon: HALOT
  rationale: 'The lamed here expresses reference or application: Daniel wishes the dream''s fulfillment to apply to the king''s haters. ''For those who hate you'' is idiomatic and clear.'
- source_word: לְעָרָיִךְ
  chosen: for your enemies
  alternatives:
  - to your adversaries
  - for your foes
  lexicon: HALOT
  rationale: The noun denotes enemies or adversaries. 'Enemies' is the standard and most transparent rendering.
- source_word: וּפִשְׁרֵהּ
  chosen: its interpretation
  alternatives:
  - its meaning
  lexicon: HALOT
  rationale: The noun specifically refers to interpretation or explanation of a dream, not merely abstract meaning. 'Interpretation' preserves the dream-report context.
