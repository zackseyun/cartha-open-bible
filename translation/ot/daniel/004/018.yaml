id: DAN.4.18
reference: Daniel 4:18
source:
  edition: WLC
  text: וְ/עָפְיֵ֤/הּ שַׁפִּיר֙ וְ/אִנְבֵּ֣/הּ שַׂגִּ֔יא וּ/מָז֨וֹן לְ/כֹ֖לָּ/א בֵ֑/הּ תְּחֹת֗וֹ/הִי תְּדוּר֙ חֵיוַ֣ת בָּרָ֔/א וּ/בְ/עַנְפ֕וֹ/הִי יִשְׁכְּנָ֖ן צִפֲּרֵ֥י שְׁמַיָּֽ/א־׃
translation:
  text: Its foliage was beautiful and its fruit abundant[a], and in it was food for all. Under it the beasts of the field lived, and in its branches the birds of the heavens dwelled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the birds of the sky.' The Aramaic literally says 'the birds of the heavens.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָפְיֵהּ
  chosen: its foliage
  alternatives:
  - its leaves
  - its canopy
  lexicon: HALOT
  rationale: Aramaic term for the leafy covering of a tree. 'Foliage' is natural English and captures the collective sense better than the more atomized 'leaves'; 'canopy' is possible but slightly more interpretive.
- source_word: שַׁפִּיר
  chosen: beautiful
  alternatives:
  - fair
  - lovely
  lexicon: HALOT
  rationale: The adjective denotes beauty or attractiveness. 'Beautiful' is clear modern English; 'fair' is traditional but archaic/ambiguous.
- source_word: אִנְבֵּהּ
  chosen: its fruit
  alternatives:
  - its produce
  lexicon: HALOT
  rationale: Refers to the tree's fruit. 'Fruit' is the direct and contextually fitting rendering.
- source_word: שַׂגִּיא
  chosen: abundant
  alternatives:
  - great
  - plentiful
  lexicon: HALOT
  rationale: Conveys largeness or abundance. With 'fruit,' 'abundant' is the most idiomatic English collocation.
- source_word: מָזוֹן
  chosen: food
  alternatives:
  - nourishment
  - provision
  lexicon: HALOT
  rationale: Denotes food or sustenance. 'Food' is the simplest and most direct rendering.
- source_word: לְכֹלָּא בֵהּ
  chosen: in it was food for all
  alternatives:
  - it had food for all
  - food for all was in it
  lexicon: HALOT
  rationale: The phrase literally locates sustenance 'in it.' The chosen wording preserves the locative sense while remaining readable.
- source_word: תְּחֹתוֹהִי
  chosen: under it
  alternatives:
  - beneath it
  lexicon: HALOT
  rationale: Straightforward prepositional phrase indicating location beneath the tree.
- source_word: תְּדוּר
  chosen: lived
  alternatives:
  - dwelt
  - stayed
  lexicon: HALOT
  rationale: The verb means to dwell or reside. 'Lived' is idiomatic with animals in English; 'dwelt' is possible but less natural in contemporary style.
- source_word: חֵיוַת בָּרָא
  chosen: the beasts of the field
  alternatives:
  - the wild animals
  - the animals of the open country
  lexicon: HALOT
  rationale: Traditional biblical expression for land animals in the open country/field. It is both accurate and readable here.
- source_word: וּבְעַנְפוֹהִי
  chosen: in its branches
  alternatives:
  - among its boughs
  lexicon: HALOT
  rationale: Refers to the tree's branches. 'Branches' is standard modern English; 'boughs' is more literary.
- source_word: יִשְׁכְּנָן
  chosen: dwelled
  alternatives:
  - nested
  - lived
  lexicon: HALOT
  rationale: The verb means to settle, dwell, or reside. For birds in branches, 'dwelled' preserves the residence imagery without over-specifying nesting.
- source_word: צִפֲּרֵי שְׁמַיָּא
  chosen: the birds of the heavens
  alternatives:
  - the birds of the sky
  - the birds of heaven
  lexicon: HALOT
  rationale: Literally 'birds of the heavens/sky.' The plural 'heavens' reflects the Aramaic form and preserves biblical texture; 'sky' is a viable smoother alternative.
