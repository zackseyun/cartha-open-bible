id: DAN.4.12
reference: Daniel 4:12
source:
  edition: WLC
  text: בְּרַ֨ם עִקַּ֤ר שָׁרְשׁ֨וֹ/הִי֙ בְּ/אַרְעָ֣/א שְׁבֻ֔קוּ וּ/בֶֽ/אֱסוּר֙ דִּֽי פַרְזֶ֣ל וּ/נְחָ֔שׁ בְּ/דִתְאָ֖/א דִּ֣י בָרָ֑/א וּ/בְ/טַ֤ל שְׁמַיָּ/א֙ יִצְטַבַּ֔ע וְ/עִם חֵיוְתָ֥/א חֲלָקֵ֖/הּ בַּ/עֲשַׂ֥ב אַרְעָֽ/א־־׃
translation:
  text: Nevertheless[a], leave the stump of its roots in the earth, even with a band of iron and bronze in the grass of the field; and let him be drenched with the dew of heaven, and let his portion be with the beasts in the grass of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a fetter of iron and bronze.' The Aramaic term can denote a binding or restraint; 'band' is chosen in the main text for natural English in the tree image.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרַם
  chosen: Nevertheless
  alternatives:
  - But
  - However
  lexicon: HALOT
  rationale: Adversative particle introducing an exception to the command to cut down the tree. 'Nevertheless' preserves the formal contrast and the elevated tone of the decree.
- source_word: עִקַּר שָׁרְשׁוֹהִי
  chosen: the stump of its roots
  alternatives:
  - the root of its roots
  - its root-stump
  lexicon: HALOT
  rationale: The phrase refers not merely to roots abstractly but to the remaining rooted base of the felled tree. 'Stump of its roots' is idiomatic English that preserves both the visible stump and the continuing root system.
- source_word: בְּאַרְעָא
  chosen: in the earth
  alternatives:
  - in the ground
  - on the earth
  lexicon: HALOT
  rationale: Here the sense is local and agricultural, referring to the stump remaining in the soil. 'In the earth' is slightly more formal and matches the Aramaic locative well.
- source_word: שְׁבֻקוּ
  chosen: leave
  alternatives:
  - let remain
  - abandon
  lexicon: HALOT
  rationale: Imperative plural in context of a command. 'Leave' is concise and natural in English for permitting the stump to remain.
- source_word: וּבֶאֱסוּר דִּי פַרְזֶל וּנְחָשׁ
  chosen: even with a band of iron and bronze
  alternatives:
  - and with a fetter of iron and bronze
  - and in a binding of iron and bronze
  lexicon: HALOT
  rationale: אֱסוּר denotes a binding or restraint. 'Band' fits the image of encircling the stump and is standard in this passage, while avoiding over-specification. 'Bronze' is preferred over 'brass' for ancient metallurgy.
- source_word: בְּדִתְאָא דִּי בָרָא
  chosen: in the grass of the field
  alternatives:
  - in the new growth of the open field
  - among the vegetation of the countryside
  lexicon: HALOT
  rationale: The phrase points to field grass/vegetation in the open country. 'Grass of the field' is clear, natural, and preserves the imagery that links the tree image to the coming humiliation.
- source_word: וּבְטַל שְׁמַיָּא יִצְטַבַּע
  chosen: let him be drenched with the dew of heaven
  alternatives:
  - let him be wet with the dew of heaven
  - let him be soaked by the dew of heaven
  lexicon: HALOT
  rationale: The verb shifts from tree imagery toward the human referent in Nebuchadnezzar's judgment. 'Be drenched' captures the passive/reflexive sense vividly without paraphrase. 'Dew of heaven' is retained as a literal and theologically resonant expression.
- source_word: וְעִם חֵיוְתָא חֲלָקֵהּ
  chosen: let his portion be with the beasts
  alternatives:
  - let his lot be with the animals
  - his share shall be with the beasts
  lexicon: HALOT
  rationale: חֲלָק means portion/share/lot. 'Portion' preserves the formal register and the decree-like tone, while 'beasts' fits the wild-animal context better than the more domesticated 'animals.'
- source_word: בַּעֲשַׂב אַרְעָא
  chosen: in the grass of the earth
  alternatives:
  - among the plants of the earth
  - in the vegetation of the land
  lexicon: HALOT
  rationale: This phrase likely resumes the setting of Nebuchadnezzar's abasement among the earth's vegetation. 'Grass of the earth' keeps the lexical connection with the prior field-grass phrase while sounding natural enough in English.
