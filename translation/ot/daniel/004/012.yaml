theological_decisions:
- issue: Shift from tree imagery to personal referent
  chosen_reading: 'Retain the explicit personal pronoun in English: ''let him be drenched ... let his portion be ...'''
  alternative_readings:
  - 'Maintain impersonal tree imagery throughout: ''let it be drenched'''
  rationale: The Aramaic intentionally moves from the tree symbol to the king symbolized by it. Preserving the shift is important for the narrative logic and avoids flattening the vision into mere botany.
  doctrine_reference: Translation philosophy §1, §3
