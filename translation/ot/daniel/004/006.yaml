theological_decisions:
- issue: Whether רוּחַ אֱלָהִין קַדִּישִׁין should be rendered as a plural pagan expression
    or a singular reference to God
  chosen_reading: the spirit of the holy gods
  alternative_readings:
  - the Spirit of the holy God
  - the spirit of the holy God
  rationale: The immediate speaker is Nebuchadnezzar, and the plural morphology of
    both אֱלָהִין and קַדִּישִׁין supports a plural expression reflecting his viewpoint.
    To avoid importing later monotheistic interpretation into the king's speech, the
    main text preserves the plural. Because the phrase is debated and some understand
    it as a singular divine reference, the alternative is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it
