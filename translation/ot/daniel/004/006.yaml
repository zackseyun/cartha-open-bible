id: DAN.4.6
reference: Daniel 4:6
source:
  edition: WLC
  text: בֵּלְטְשַׁאצַּר֮ רַ֣ב חַרְטֻמַיָּ/א֒ דִּ֣י אֲנָ֣ה יִדְעֵ֗ת דִּ֠י ר֣וּחַ אֱלָהִ֤ין
    קַדִּישִׁין֙ בָּ֔/ךְ וְ/כָל רָ֖ז לָא אָנֵ֣ס לָ֑/ךְ חֶזְוֵ֨י חֶלְמִ֧/י דִֽי חֲזֵ֛ית
    וּ/פִשְׁרֵ֖/הּ אֱמַֽר׀־־־׃
translation:
  text: Belteshazzar, chief of the magicians, whom I know has the spirit of the holy
    gods in you, and no mystery is too difficult for you, tell me the visions of my
    dream that I saw, and its interpretation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Spirit of the holy God' or 'the spirit of the holy God.'
    reason: alternative_reading
lexical_decisions:
- source_word: רַב חַרְטֻמַיָּא
  chosen: chief of the magicians
  alternatives:
  - chief of the scribes
  - chief of the occult priests
  lexicon: HALOT
  rationale: חַרְטֻמַיָּא in Daniel refers to the class of Babylonian wise men commonly
    rendered 'magicians.' רַב marks Daniel as the head/chief over them. 'Chief of
    the magicians' is idiomatic and matches the court setting better than more obscure
    alternatives.
- source_word: ר֣וּחַ אֱלָהִין קַדִּישִׁין
  chosen: the spirit of the holy gods
  alternatives:
  - the Spirit of the holy God
  - a spirit of holy gods
  lexicon: HALOT
  rationale: In Aramaic, אֱלָהִין with plural adjective קַדִּישִׁין most naturally
    reads as a plural, fitting Nebuchadnezzar's pagan perspective in the narrative.
    Although some translations construe it as singular ('the holy God'), the plural
    agreement favors 'the holy gods.' The alternative is preserved in a footnote because
    the phrase is interpretively contested in Daniel.
- source_word: וְכָל רָז
  chosen: and no mystery
  alternatives:
  - and no secret
  - and no hidden matter
  lexicon: HALOT
  rationale: רָז in Daniel regularly denotes a hidden matter, especially a dream-secret
    or mystery. 'Mystery' preserves the established Danielic sense better than the
    flatter 'secret.'
- source_word: לָא אָנֵס לָךְ
  chosen: is too difficult for you
  alternatives:
  - troubles you
  - constrains you
  - is beyond you
  lexicon: HALOT
  rationale: The idiom conveys that no mystery is beyond Daniel's ability or too hard
    for him. 'Is too difficult for you' is clear modern English and fits the context
    of interpretation ability.
- source_word: חֶזְוֵי חֶלְמִי
  chosen: the visions of my dream
  alternatives:
  - the appearance of my dream
  - the dream visions
  lexicon: HALOT
  rationale: The plural construct 'visions of my dream' is retained rather than flattened
    to simply 'my dream,' since the verse specifically refers to the visionary contents
    seen within the dream.
- source_word: דִי חֲזֵית
  chosen: that I saw
  alternatives:
  - which I saw
  - that I beheld
  lexicon: HALOT
  rationale: A straightforward relative clause preserving the first-person experience
    of the dream.
- source_word: וּפִשְׁרֵהּ
  chosen: and its interpretation
  alternatives:
  - and its meaning
  - and the interpretation of it
  lexicon: HALOT
  rationale: פִּשְׁרָא/פִּשְׁרֵהּ in Daniel is the standard term for the interpretation
    of a dream or mystery. 'Interpretation' is the most precise contextual rendering.
- source_word: אֱמַר
  chosen: tell me
  alternatives:
  - say
  - declare
  lexicon: HALOT
  rationale: The imperative is directed to Daniel with the sense of reporting or explaining.
    'Tell me' is natural English and suits the direct address.
