id: DAN.4.8
reference: Daniel 4:8
source:
  edition: WLC
  text: רְבָ֥ה אִֽילָנָ֖/א וּ/תְקִ֑ף וְ/רוּמֵ/הּ֙ יִמְטֵ֣א לִ/שְׁמַיָּ֔/א וַ/חֲזוֹתֵ֖/הּ לְ/ס֥וֹף כָּל אַרְעָֽ/א־׃
translation:
  text: The tree grew large and became strong[a], and its height reached to the heavens, and it was visible to the end of the whole earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its appearance was to the end of the whole earth.' The Aramaic noun can denote 'appearance/aspect' as well as what is seen, but the context favors the sense of visibility.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְבָה
  chosen: grew large
  alternatives:
  - became great
  - grew great
  lexicon: HALOT
  rationale: The verb denotes becoming great/increasing. 'Grew large' fits the tree imagery naturally in English while preserving the sense of increase rather than merely a static description.
- source_word: אִילָנָא
  chosen: the tree
  alternatives:
  - a tree
  lexicon: HALOT
  rationale: 'The emphatic state here is best rendered definitively in context: the narrative is describing the specific tree seen in the dream.'
- source_word: וּתְקִף
  chosen: became strong
  alternatives:
  - grew strong
  - was strong
  lexicon: HALOT
  rationale: The verb conveys strengthening or becoming mighty. 'Became strong' pairs well with the preceding growth verb and reflects the developmental sequence in the vision.
- source_word: וְרוּמֵהּ
  chosen: its height
  alternatives:
  - its stature
  - its loftiness
  lexicon: HALOT
  rationale: The noun from 'to be high' refers to the tree's height/elevation. 'Its height' is the most direct and natural rendering.
- source_word: יִמְטֵא לִשְׁמַיָּא
  chosen: reached to the heavens
  alternatives:
  - reached to heaven
  - came to the heavens
  lexicon: HALOT
  rationale: The verb means 'reach, arrive' and the plural noun is the standard Aramaic form for 'heavens.' 'Reached to the heavens' preserves the elevated imagery without flattening it to singular 'sky.'
- source_word: וַחֲזוֹתֵהּ
  chosen: it was visible
  alternatives:
  - its appearance
  - its sight
  - it could be seen
  lexicon: HALOT
  rationale: Although the noun can denote appearance or aspect, in this construction with 'to the end of the whole earth' the sense is that it was seen/visible from everywhere. Rendering the clause verbally gives idiomatic English while preserving the meaning.
- source_word: לְסוֹף כָּל אַרְעָא
  chosen: to the end of the whole earth
  alternatives:
  - to the ends of all the earth
  - to the extremity of the whole land
  lexicon: HALOT
  rationale: The phrase is idiomatic for the farthest extent of the earth/land. 'The whole earth' best fits the cosmic scope of the dream imagery; 'land' would sound too local in context.
