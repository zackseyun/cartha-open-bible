id: DAN.4.9
reference: Daniel 4:9
source:
  edition: WLC
  text: עָפְיֵ֤/הּ שַׁפִּיר֙ וְ/אִנְבֵּ֣/הּ שַׂגִּ֔יא וּ/מָז֨וֹן לְ/כֹ֖לָּ/א בֵ֑/הּ תְּחֹת֜וֹ/הִי תַּטְלֵ֣ל חֵיוַ֣ת בָּרָ֗/א וּ/בְ/עַנְפ֨וֹ/הִי֙ ידרון צִפֲּרֵ֣י שְׁמַיָּ֔/א וּ/מִנֵּ֖/הּ יִתְּזִ֥ין כָּל בִּשְׂרָֽ/א־׀־׃
translation:
  text: Its foliage was beautiful and its fruit abundant[a], and in it was food for all. Under it the beasts of the field found shade, and in its branches the birds of the heavens dwelt, and from it all flesh was fed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all living creatures.' The Aramaic literally reads 'all flesh,' a biblical idiom for all animate beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָפְיֵהּ
  chosen: its foliage
  alternatives:
  - its leaves
  lexicon: HALOT
  rationale: The Aramaic term refers to the tree's leafy covering or foliage. 'Foliage' is slightly more natural in English for the collective sense than 'leaves,' while still remaining close to the source.
- source_word: שַׁפִּיר
  chosen: beautiful
  alternatives:
  - fair
  - lovely
  lexicon: HALOT
  rationale: A straightforward adjectival rendering meaning 'beautiful/fair.' 'Beautiful' is clear modern English and fits the description of the tree.
- source_word: אִנְבֵּהּ
  chosen: its fruit
  alternatives:
  - its produce
  lexicon: HALOT
  rationale: The noun denotes the fruit or produce of the tree. 'Fruit' is the most direct and idiomatic rendering in context.
- source_word: שַׂגִּיא
  chosen: abundant
  alternatives:
  - great
  - much
  - plentiful
  lexicon: HALOT
  rationale: The adjective conveys greatness or abundance. 'Abundant' best matches the context of plentiful fruit.
- source_word: מָזוֹן
  chosen: food
  alternatives:
  - nourishment
  - provision
  lexicon: HALOT
  rationale: The noun means food or sustenance. 'Food' is the simplest and most direct rendering.
- source_word: לְכֹלָּא
  chosen: for all
  alternatives:
  - for everyone
  - for all creatures
  lexicon: HALOT
  rationale: Literally 'for all.' The broader referent is clarified by the following clauses, so the concise rendering is retained.
- source_word: בֵהּ
  chosen: in it
  alternatives:
  - on it
  - therein
  lexicon: HALOT
  rationale: The prepositional phrase indicates that food was found in the tree, i.e., in connection with it. 'In it' preserves the source wording.
- source_word: תְּחֹתוֹהִי
  chosen: under it
  alternatives:
  - beneath it
  lexicon: HALOT
  rationale: A spatial term meaning 'under/beneath it.' 'Under it' is direct and natural.
- source_word: תַּטְלֵל
  chosen: found shade
  alternatives:
  - took shelter
  - were shaded
  lexicon: HALOT
  rationale: From a verb related to shade/shelter. 'Found shade' captures the sense idiomatically in English and fits the singular feminine verb with the collective subject phrase.
- source_word: חֵיוַת בָּרָא
  chosen: the beasts of the field
  alternatives:
  - the wild animals
  - the animals of the open country
  lexicon: HALOT
  rationale: A standard biblical expression for land animals living outside domesticated settings. 'Beasts of the field' preserves the imagery and register.
- source_word: בְעַנְפוֹהִי
  chosen: in its branches
  alternatives:
  - among its boughs
  lexicon: HALOT
  rationale: The noun denotes branches or boughs. 'Branches' is more accessible modern English.
- source_word: ידרון
  chosen: dwelt
  alternatives:
  - lodged
  - nested
  lexicon: HALOT
  rationale: The verb means to dwell, lodge, or stay. 'Dwelt' preserves the elevated but still readable biblical tone; 'nested' would be too specific since the verb itself is broader.
- source_word: צִפֲּרֵי שְׁמַיָּא
  chosen: the birds of the heavens
  alternatives:
  - the birds of the sky
  - the birds of heaven
  lexicon: HALOT
  rationale: A common Semitic expression. 'Birds of the heavens' stays close to the Aramaic and preserves the elevated imagery; 'sky' is possible but slightly less formal.
- source_word: וּמִנֵּהּ
  chosen: from it
  alternatives:
  - from him
  lexicon: HALOT
  rationale: The antecedent is the tree in the vision, so the impersonal 'it' is required in English.
- source_word: יִתְּזִין
  chosen: was fed
  alternatives:
  - was nourished
  - received food
  lexicon: HALOT
  rationale: The verb denotes being nourished or fed. The passive 'was fed' matches the form and keeps the focus on the tree as source of sustenance.
- source_word: כָּל בִּשְׂרָא
  chosen: all flesh
  alternatives:
  - all living creatures
  - every creature
  lexicon: HALOT
  rationale: Literally 'all flesh.' This biblical idiom can mean all living beings. The main text preserves the idiom, with a footnote giving the more explicit sense.
