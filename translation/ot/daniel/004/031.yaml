theological_decisions:
- issue: Rendering Nebuchadnezzar's doxology to God with personal pronouns
  chosen_reading: and I praised and honored him who lives forever
  alternative_readings:
  - and I praised and honored the one who lives forever
  rationale: The Aramaic uses a prepositional phrase followed by participial description.
    Using 'him who lives forever' yields natural English while preserving the personal,
    doxological force of the address to Israel's God.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic.'
