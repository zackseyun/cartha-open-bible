id: DAN.4.13
reference: Daniel 4:13
source:
  edition: WLC
  text: לִבְבֵ/הּ֙ מִן אנוש/א יְשַׁנּ֔וֹן וּ/לְבַ֥ב חֵיוָ֖ה יִתְיְהִ֣ב לֵ֑/הּ וְ/שִׁבְעָ֥ה
    עִדָּנִ֖ין יַחְלְפ֥וּן עֲלֽוֹ/הִי־׃
translation:
  text: Let his heart be changed from that of a man, and let the heart of a beast
    be given to him, and let seven times pass over him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seven periods' or 'seven seasons'; the Aramaic term denotes appointed
      times/periods, and the exact length is not specified here.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְבֵהּ
  chosen: his heart
  alternatives:
  - his mind
  lexicon: HALOT
  rationale: Aramaic לְבַב/לִבְבָא commonly denotes the inner self, including thought
    and disposition. 'Heart' preserves the concrete metaphor and matches biblical
    usage better than the more interpretive 'mind'.
- source_word: מִן אֱנוֹשָׁא
  chosen: from that of a man
  alternatives:
  - from mankind
  - from a human
  lexicon: HALOT
  rationale: אֱנוֹשׁ in Aramaic denotes a human being/man. Because the suffix on 'heart'
    is already expressed, English idiom requires supplying 'that of.' 'Man' is gender-accurate
    and idiomatic here, referring to human rather than specifically male qualities.
- source_word: יְשַׁנּוֹן
  chosen: be changed
  alternatives:
  - alter
  - transform
  lexicon: HALOT
  rationale: The plural verb functions with an indefinite/impersonal subject in context
    ('they shall change' = 'let it be changed'). English passive best conveys the
    sense naturally without importing a specific agent.
- source_word: וּלְבַב חֵיוָה
  chosen: and the heart of a beast
  alternatives:
  - and a beast's heart
  - and the heart of an animal
  lexicon: HALOT
  rationale: חֵיוָה here refers to a beast/animal. 'Beast' fits the royal-judgment
    context and traditional biblical register without becoming archaic. The construct
    phrase is rendered straightforwardly.
- source_word: יִתְיְהִב לֵהּ
  chosen: be given to him
  alternatives:
  - be granted to him
  lexicon: HALOT
  rationale: The verb means 'be given.' Passive English preserves the form and avoids
    overinterpretation.
- source_word: שִׁבְעָה עִדָּנִין
  chosen: seven times
  alternatives:
  - seven periods
  - seven seasons
  lexicon: HALOT
  rationale: עִדָּן in Daniel often denotes a period or appointed time. In this context,
    'times' is the most established and least over-specific rendering, since the exact
    duration is not defined in the verse itself.
- source_word: יַחְלְפוּן עֲלֹוהִי
  chosen: pass over him
  alternatives:
  - pass by him
  - pass upon him
  lexicon: HALOT
  rationale: The idiom literally involves passing over/upon someone. 'Pass over him'
    is natural English and preserves the sense of a span of time elapsing in relation
    to him.
