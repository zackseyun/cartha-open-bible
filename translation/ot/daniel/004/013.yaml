theological_decisions:
- issue: Nature of the judgment described
  chosen_reading: The verse describes Nebuchadnezzar's human disposition being replaced
    with that of a beast, without specifying in this verse whether this is literal
    transformation or a divinely imposed beast-like mental state.
  alternative_readings:
  - literal metamorphosis
  - figurative description of madness/derangement
  rationale: The Aramaic speaks of the heart of a man being changed and a beast's
    heart being given. The translation preserves this imagery and ambiguity rather
    than resolving it interpretively.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
