theological_decisions:
- issue: Whether to render the final clause as inability ('could not tell me') or
    simple non-disclosure ('did not make known to me')
  chosen_reading: simple non-disclosure/failure to make known
  alternative_readings:
  - they could not tell me
  - they were unable to make known to me
  rationale: The Aramaic wording itself uses negation with a causative participle
    ('were not making known to me'), which directly states that the interpretation
    was not disclosed. Context may imply inability, but the verse does not explicitly
    say so, so the translation preserves the textual restraint.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
