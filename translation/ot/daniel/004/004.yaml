id: DAN.4.4
reference: Daniel 4:4
source:
  edition: WLC
  text: בֵּ/אדַ֣יִן עללין חַרְטֻמַיָּ/א֙ אָֽשְׁפַיָּ֔/א כשדי/א וְ/גָזְרַיָּ֑/א וְ/חֶלְמָ֗/א
    אָמַ֤ר אֲנָה֙ קֳדָ֣מֵי/ה֔וֹן וּ/פִשְׁרֵ֖/הּ לָא מְהוֹדְעִ֥ין לִֽ/י־׃
translation:
  text: Then the magicians, enchanters, Chaldeans, and diviners came in, and I told
    the dream before them, but they did not make its interpretation known to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they could not make its interpretation known to me.' The Aramaic directly
      says they did not make it known; inability is a contextual inference reflected
      in some translations.
    reason: alternative_reading
  - marker: b
    text: '''Chaldeans'' may refer here not merely to an ethnic group but to a class
      of Babylonian court experts.'
    reason: cultural_note
lexical_decisions:
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence. 'Then'
    is natural modern English and preserves the narrative flow.
- source_word: עללין
  chosen: came in
  alternatives:
  - entered
  - came
  lexicon: HALOT
  rationale: The plural verb denotes entering/presenting themselves. 'Came in' is
    idiomatic and fits a court setting without sounding stiff.
- source_word: חַרְטֻמַיָּא
  chosen: magicians
  alternatives:
  - scribes
  - occult priests
  lexicon: HALOT
  rationale: Traditional and contextually fitting term for a class of Babylonian wise
    men associated with secret arts. 'Magicians' is the clearest established English
    equivalent here.
- source_word: אָשְׁפַיָּא
  chosen: enchanters
  alternatives:
  - astrologers
  - conjurers
  lexicon: HALOT
  rationale: Refers to another class of court specialists in mantic/occult practice.
    'Enchanters' distinguishes them from the other groups better than the more generic
    'astrologers' in this list.
- source_word: כַּשְׂדָּיָא
  chosen: Chaldeans
  alternatives:
  - Chaldean astrologers
  - wise men
  lexicon: HALOT
  rationale: Although the term can function professionally for a guild of wise men,
    it is best preserved as 'Chaldeans' here because the source uses the ethnonym/title
    directly and the court-list context in Daniel makes this a recognizable technical
    designation.
- source_word: גָזְרַיָּא
  chosen: diviners
  alternatives:
  - soothsayers
  - decree-makers
  lexicon: HALOT
  rationale: In this context the term denotes practitioners who determine or pronounce
    interpretations by divination. 'Diviners' is clear, concise, and contextually
    appropriate.
- source_word: חֶלְמָא
  chosen: the dream
  alternatives:
  - a dream
  lexicon: HALOT
  rationale: The emphatic state here is definite in context, referring to Nebuchadnezzar's
    specific dream already in view.
- source_word: אָמַר אֲנָה קֳדָמֵיהוֹן
  chosen: I told the dream before them
  alternatives:
  - I spoke the dream in their presence
  - I related the dream to them
  lexicon: HALOT
  rationale: The idiom literally involves speaking/saying before them. 'I told the
    dream before them' preserves the public setting while remaining readable. 'Before
    them' is retained rather than reduced to merely 'to them' because the Aramaic
    highlights their presence.
- source_word: וּפִשְׁרֵהּ
  chosen: its interpretation
  alternatives:
  - its meaning
  - the interpretation of it
  lexicon: HALOT
  rationale: פִשְׁרָא in Daniel regularly refers to the interpretation of dreams or
    mysteries. 'Interpretation' preserves the technical sense better than the broader
    'meaning'.
- source_word: לָא מְהוֹדְעִין לִי
  chosen: they did not make its interpretation known to me
  alternatives:
  - they did not tell me its interpretation
  - they could not make known its interpretation to me
  lexicon: HALOT
  rationale: The causative form means 'make known, inform.' The chosen rendering stays
    close to the Aramaic wording. I did not add 'could not' because the verse states
    failure to disclose, not explicitly inability, though that may be inferred from
    context.
