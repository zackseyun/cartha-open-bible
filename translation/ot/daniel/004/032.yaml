id: DAN.4.32
reference: Daniel 4:32
source:
  edition: WLC
  text: וְ/כָל דארי אַרְעָ/א֙ כְּ/לָ֣ה חֲשִׁיבִ֔ין וּֽ/כְ/מִצְבְּיֵ֗/הּ עָבֵד֙ בְּ/חֵ֣יל
    שְׁמַיָּ֔/א ו/דארי אַרְעָ֑/א וְ/לָ֤א אִיתַי֙ דִּֽי יְמַחֵ֣א בִ/ידֵ֔/הּ וְ/יֵ֥אמַר
    לֵ֖/הּ מָ֥ה עֲבַֽדְתְּ־־׃
translation:
  text: And all the inhabitants of the earth are regarded as nothing, and he does
    according to his will among the host of heaven and among the inhabitants of the
    earth; and there is no one who can restrain his hand or say to him, “What have
    you done?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the host of heaven.'
    reason: lexical_alternative
  - marker: b
    text: 'Literally ''strike his hand''; that is, hinder or restrain him. Traditional
      English: ''stay his hand.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: דארי אַרְעָא
  chosen: the inhabitants of the earth
  alternatives:
  - those who dwell on the earth
  - the dwellers of the earth
  lexicon: HALOT
  rationale: The Aramaic participial expression literally denotes those dwelling in
    the earth/land. 'Inhabitants of the earth' is idiomatic modern English and preserves
    the universal scope in context.
- source_word: כְּלָה חֲשִׁיבִין
  chosen: are regarded as nothing
  alternatives:
  - are accounted as nothing
  - are considered as nothing
  lexicon: HALOT
  rationale: The phrase expresses evaluation or reckoning. 'Regarded as nothing' is
    natural English and preserves the sense that earthly inhabitants count for nothing
    before God's sovereignty, without overstating into nonexistence.
- source_word: וּכְמִצְבְּיֵהּ
  chosen: according to his will
  alternatives:
  - as he pleases
  - according to his pleasure
  lexicon: HALOT
  rationale: The noun conveys will, desire, or pleasure. 'According to his will' is
    both idiomatic and theologically weighty, fitting the context of divine sovereignty.
- source_word: עָבֵד
  chosen: he does
  alternatives:
  - he acts
  - he works
  lexicon: HALOT
  rationale: A common verb for doing or acting. 'He does' keeps the statement direct
    and closely aligned to the source.
- source_word: בְּחֵיל שְׁמַיָּא
  chosen: among the army of heaven
  alternatives:
  - among the host of heaven
  - in the army of heaven
  lexicon: HALOT
  rationale: חֵיל can denote force, army, or host. 'Army of heaven' is a transparent
    rendering of the military imagery. 'Host of heaven' is traditional and viable,
    but 'army' better reflects the lexical force for modern readers.
- source_word: וְלָא אִיתַי דִּי
  chosen: and there is no one who
  alternatives:
  - and none can
  - and there is none who
  lexicon: HALOT
  rationale: This existential construction introduces the impossibility that follows.
    'There is no one who' preserves the syntax and emphasis.
- source_word: יְמַחֵא בִידֵהּ
  chosen: can strike his hand
  alternatives:
  - can stay his hand
  - can slap his hand away
  - can restrain his hand
  lexicon: HALOT
  rationale: The verb literally means strike/smite, with the idiom conveying interference
    or restraint. To preserve the vivid source image, the main text keeps 'strike
    his hand,' while the more interpretive traditional sense is preserved as an alternative.
- source_word: מָה עֲבַדְתְּ
  chosen: What have you done?
  alternatives:
  - What are you doing?
  - What did you do?
  lexicon: HALOT
  rationale: A direct challenge to divine action. The perfect is well represented
    by 'What have you done?' in English, preserving the rhetorical force.
