theological_decisions:
- issue: Referent of the sovereign actor
  chosen_reading: The verse refers to the Most High/God acting with absolute sovereignty
    over heaven and earth.
  rationale: The immediate context in Daniel 4 identifies the actor as the Most High.
    The translation preserves the pronoun 'he' from the Aramaic rather than inserting
    'God,' maintaining textual fidelity while allowing the context to identify the
    referent.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Scope of heavenly beings in בְּחֵיל שְׁמַיָּא
  chosen_reading: Rendered generically as 'the army of heaven' without specifying
    angels or stars.
  alternative_readings:
  - the host of heaven understood as angels
  - the host of heaven understood as celestial bodies
  rationale: The Aramaic phrase can encompass the heavenly host broadly. The translation
    preserves that breadth rather than resolving the referent more narrowly than the
    text requires.
  doctrine_reference: Translation philosophy §3
