theological_decisions:
- issue: Anthropological term אֲנָשָׁא
  chosen_reading: men
  alternative_readings:
  - mankind
  - people
  - human beings
  rationale: The Aramaic term refers to humans in contrast to Nebuchadnezzar's beast-like
    condition. Following the project's gender-accurate principle, 'men' is retained
    because the phrase is idiomatic ('from among men') and reflects the source form
    without introducing unnecessary abstraction. The sense is exclusion from human
    society generally, not a male-only claim.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
