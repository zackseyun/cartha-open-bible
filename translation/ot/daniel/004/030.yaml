id: DAN.4.30
reference: Daniel 4:30
source:
  edition: WLC
  text: בַּ/הּ שַׁעֲתָ֗/א מִלְּתָ/א֮ סָ֣פַת עַל נְבוּכַדְנֶצַּר֒ וּ/מִן אֲנָשָׁ֣/א
    טְרִ֔יד וְ/עִשְׂבָּ֤/א כְ/תוֹרִין֙ יֵאכֻ֔ל וּ/מִ/טַּ֥ל שְׁמַיָּ֖/א גִּשְׁמֵ֣/הּ
    יִצְטַבַּ֑ע עַ֣ד דִּ֥י שַׂעְרֵ֛/הּ כְּ/נִשְׁרִ֥ין רְבָ֖ה וְ/טִפְר֥וֹ/הִי כְ/צִפְּרִֽין־־־׃
translation:
  text: At that moment the sentence was fulfilled against Nebuchadnezzar. He was driven
    away from among men, and he ate grass like oxen, and his body was drenched with
    the dew of heaven, until his hair grew like eagles’ feathers and his nails like
    birds’ claws.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his hair grew like vultures’ feathers'; the Aramaic term can refer more
      broadly to large birds of prey, though 'eagles' is the traditional rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּהּ שַׁעֲתָא
  chosen: At that moment
  alternatives:
  - In that hour
  - At that time
  lexicon: HALOT
  rationale: The Aramaic idiom literally means 'in that hour/time.' 'At that moment'
    is natural modern English and preserves the immediacy of the judgment.
- source_word: מִלְּתָא סָפַת
  chosen: the sentence was fulfilled
  alternatives:
  - the word was completed
  - the matter was accomplished
  lexicon: HALOT
  rationale: מִלְּתָא can mean 'word, matter, decree/sentence' in context; here it
    refers back to the announced judgment. סָפַת conveys coming to completion. 'The
    sentence was fulfilled' best captures the judicial force and result in idiomatic
    English.
- source_word: עַל נְבוּכַדְנֶצַּר
  chosen: against Nebuchadnezzar
  alternatives:
  - upon Nebuchadnezzar
  - on Nebuchadnezzar
  lexicon: HALOT
  rationale: With a judgment context, עַל is best rendered 'against' rather than the
    more spatial 'upon,' making the adverse force clear.
- source_word: וּמִן אֲנָשָׁא טְרִיד
  chosen: He was driven away from among men
  alternatives:
  - he was driven from mankind
  - he was expelled from people
  lexicon: HALOT
  rationale: טְרִיד denotes being driven away/banished. 'From among men' reflects
    the Aramaic closely while remaining readable; it indicates exclusion from human
    society.
- source_word: וְעִשְׂבָּא כְתוֹרִין יֵאכֻל
  chosen: and he ate grass like oxen
  alternatives:
  - and he would eat vegetation like cattle
  - and he ate herbage like bulls
  lexicon: HALOT
  rationale: עִשְׂבָּא is vegetation/grass. תּוֹרִין refers to bovines/oxen. 'Grass
    like oxen' is the most natural concise rendering in English and matches the imagery.
- source_word: וּמִטַּל שְׁמַיָּא גִּשְׁמֵהּ יִצְטַבַּע
  chosen: and his body was drenched with the dew of heaven
  alternatives:
  - and his body was wet with the dew of heaven
  - and his body was soaked by the dew of the sky
  lexicon: HALOT
  rationale: גִּשְׁמֵהּ means 'his body.' יִצְטַבַּע indicates becoming wet/soaked.
    'Drenched' vividly but accurately conveys the passive result. 'Dew of heaven'
    preserves the traditional biblical expression and the source wording.
- source_word: עַד דִּי
  chosen: until
  alternatives:
  - until the time when
  - until that
  lexicon: HALOT
  rationale: Standard temporal conjunction introducing the duration of the condition.
- source_word: שַׂעְרֵהּ כְּנִשְׁרִין רְבָה
  chosen: his hair grew like eagles’ feathers
  alternatives:
  - his hair became great like eagles' feathers
  - his hair grew like vultures' feathers
  lexicon: HALOT
  rationale: נִשְׁרִין is traditionally rendered 'eagles,' though the term can denote
    large birds of prey, including vultures. 'Eagles' is retained in the main text
    as the conventional and likely intended image; 'grew' expresses רְבָה idiomatically
    with hair as subject.
- source_word: וְטִפְרוֹהִי כְצִפְּרִין
  chosen: and his nails like birds’ claws
  alternatives:
  - and his nails like birds' nails
  lexicon: HALOT
  rationale: טִפְרִין are nails/claws. Since the comparison is to birds, 'claws' better
    communicates the image in natural English than repeating 'nails.'
