id: DAN.4.7
reference: Daniel 4:7
source:
  edition: WLC
  text: וְ/חֶזְוֵ֥י רֵאשִׁ֖/י עַֽל מִשְׁכְּבִ֑/י חָזֵ֣ה הֲוֵ֔ית וַ/אֲל֥וּ אִילָ֛ן
    בְּ/ג֥וֹא אַרְעָ֖/א וְ/רוּמֵ֥/הּ שַׂגִּֽיא־׃
translation:
  text: 'These were the visions of my head as I lay on my bed: and behold, a tree
    in the midst of the earth, and its height was great.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aramaic literally, 'the visions of my head.' The phrase refers to what Nebuchadnezzar
      saw inwardly in the dream.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחֶזְוֵי
  chosen: These were the visions
  alternatives:
  - And the visions
  - the visions
  lexicon: HALOT
  rationale: Aramaic plural construct 'visions of' introducing dream content. Rendering
    with 'These were' makes the verbless opening natural in English while preserving
    the demonstrative force of the clause in context.
- source_word: רֵאשִׁי
  chosen: of my head
  alternatives:
  - in my mind
  - of my mind
  lexicon: HALOT
  rationale: Literally 'my head.' Kept in the main text to preserve the idiom 'visions
    of my head,' a recurring expression in Daniel, rather than flattening immediately
    to 'mind.'
- source_word: עַל מִשְׁכְּבִי
  chosen: as I lay on my bed
  alternatives:
  - upon my bed
  - on my bed
  lexicon: HALOT
  rationale: The prepositional phrase is rendered idiomatically with the participial
    sense supplied by the surrounding verbal construction. 'As I lay on my bed' is
    natural English and reflects the setting of the vision.
- source_word: חָזֵה הֲוֵית
  chosen: were
  alternatives:
  - I was seeing
  - I saw
  lexicon: HALOT
  rationale: 'The Aramaic participle plus היה forms a periphrastic expression, literally
    ''I was seeing.'' In English, the clause is best represented by a simple copular
    introduction to the vision report: ''These were ... as I lay...'' rather than
    a wooden progressive.'
- source_word: וַאֲלוּ
  chosen: and behold
  alternatives:
  - behold
  - look
  lexicon: HALOT
  rationale: Standard deictic/interjective marker introducing a striking element in
    the vision. 'And behold' preserves the elevated narrative force.
- source_word: אִילָן
  chosen: a tree
  lexicon: HALOT
  rationale: Straightforward Aramaic noun for 'tree.' Indefinite article fits the
    first mention.
- source_word: בְּגוֹא אַרְעָא
  chosen: in the midst of the earth
  alternatives:
  - in the middle of the earth
  - in the midst of the land
  lexicon: HALOT
  rationale: בְּגוֹא means 'in the midst/middle of.' אַרְעָא can mean 'earth' or 'land';
    here the cosmic scope of the dream favors 'earth' over 'land.'
- source_word: וְרוּמֵהּ
  chosen: its height
  alternatives:
  - its stature
  lexicon: HALOT
  rationale: Noun with 3ms suffix, referring to the tree's vertical extent. 'Height'
    is the most direct rendering.
- source_word: שַׂגִּיא
  chosen: was great
  alternatives:
  - was enormous
  - was very great
  lexicon: HALOT
  rationale: Adjective meaning 'great, much, exceedingly large.' 'Was great' preserves
    the simple predicate without over-intensifying.
