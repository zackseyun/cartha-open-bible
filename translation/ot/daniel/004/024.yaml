id: DAN.4.24
reference: Daniel 4:24
source:
  edition: WLC
  text: לָהֵ֣ן מַלְכָּ֗/א מִלְכִּ/י֙ יִשְׁפַּ֣ר עלי/ך ו/חטי/ך בְּ/צִדְקָ֣ה פְרֻ֔ק
    וַ/עֲוָיָתָ֖/ךְ בְּ/מִחַ֣ן עֲנָ֑יִן הֵ֛ן תֶּהֱוֵ֥א אַרְכָ֖ה לִ/שְׁלֵוְתָֽ/ךְ׃
translation:
  text: 'Therefore, O king, let my counsel be acceptable to you: break off your sins
    by righteousness, and your iniquities by showing mercy to the poor, that there
    may perhaps be a prolonging of your prosperity.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'redeem your sins by righteousness, and your iniquities by mercy to the
      poor.' The Aramaic verb can be understood more literally as 'break off' or,
      in some contexts, 'redeem/deliver.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a prolonging of your tranquility' or 'peace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָהֵן
  chosen: Therefore
  alternatives:
  - Therefore then
  - For this reason
  lexicon: HALOT
  rationale: Aramaic inferential particle introducing Daniel's conclusion from the
    dream's interpretation. 'Therefore' is the natural English discourse marker.
- source_word: מַלְכָּא
  chosen: O king
  alternatives:
  - king
  lexicon: HALOT
  rationale: Vocative address. 'O king' preserves the direct courtly appeal in natural
    English.
- source_word: מִלְכִּי
  chosen: my counsel
  alternatives:
  - my advice
  lexicon: HALOT
  rationale: Refers to Daniel's counsel/advice to the king. 'Counsel' preserves the
    formal tone better than the more casual 'advice'.
- source_word: יִשְׁפַּר עֲלָיִךְ
  chosen: let my counsel be acceptable to you
  alternatives:
  - may my counsel please you
  - let my advice seem good to you
  lexicon: HALOT
  rationale: Idiomatic Aramaic expression meaning that the advice should be pleasing
    or acceptable to the hearer. The chosen rendering is clear modern English while
    preserving the deferential force.
- source_word: וְחֲטָיָךְ
  chosen: your sins
  alternatives:
  - your offenses
  lexicon: HALOT
  rationale: Standard moral term for sins. 'Sins' best matches the ethical and theological
    force of the word.
- source_word: בְּצִדְקָה
  chosen: by righteousness
  alternatives:
  - by doing what is right
  - by justice
  lexicon: HALOT
  rationale: The noun denotes righteousness/right conduct. 'By righteousness' stays
    close to the source while remaining intelligible. 'By justice' is possible but
    narrower; 'by doing what is right' is more interpretive.
- source_word: פְרֻק
  chosen: break off
  alternatives:
  - redeem
  - remove
  - renounce
  lexicon: HALOT
  rationale: The verb literally conveys breaking off or snapping away. In context
    it calls for decisive cessation of sinful conduct. 'Break off' preserves the metaphor
    and avoids importing later theological senses such as 'redeem.'
- source_word: וַעֲוָיָתָךְ
  chosen: your iniquities
  alternatives:
  - your wrongs
  - your sins
  lexicon: HALOT
  rationale: A near-synonym to the previous term but with a nuance of guilt/wickedness.
    'Iniquities' preserves the distinction without flattening the parallelism.
- source_word: בְּמִחַן עֲנָיִן
  chosen: by showing mercy to the poor
  alternatives:
  - by mercy to the poor
  - by kindness to the afflicted
  - by compassion to the poor
  lexicon: HALOT
  rationale: The phrase denotes compassionate treatment of the poor/afflicted. 'Showing
    mercy to the poor' makes the verbal sense explicit in idiomatic English and fits
    the ethical exhortation.
- source_word: הֵן
  chosen: perhaps
  alternatives:
  - if perhaps
  - it may be that
  lexicon: HALOT
  rationale: Introduces a contingent possibility rather than certainty. 'Perhaps'
    preserves the tentativeness of Daniel's statement.
- source_word: תֶּהֱוֵא אַרְכָה
  chosen: there may perhaps be a prolonging
  alternatives:
  - there may be a lengthening
  - your tranquility may be prolonged
  lexicon: HALOT
  rationale: Literally 'there will be a lengthening/prolonging.' The impersonal English
    construction fits the Aramaic and keeps the contingent tone introduced by הֵן.
- source_word: לִשְׁלֵוְתָךְ
  chosen: of your prosperity
  alternatives:
  - of your peace
  - of your tranquility
  - of your ease
  lexicon: HALOT
  rationale: The noun can denote ease, tranquility, or prosperity. In Nebuchadnezzar's
    royal context, material and political well-being are in view, so 'prosperity'
    best captures the sense, though 'tranquility' remains possible.
