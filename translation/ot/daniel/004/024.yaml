theological_decisions:
- issue: Whether Daniel's exhortation implies meritorious atonement for sin or a call
    to repentance evidenced by righteous action
  chosen_reading: A call for the king to turn from sin through righteous and merciful
    conduct, without implying that human works independently atone for guilt.
  alternative_readings:
  - A stronger sense of 'redeem your sins by almsgiving'
  rationale: The verb פְרֻק is rendered 'break off' rather than 'redeem' because the
    immediate context is ethical repentance and cessation of wrongdoing. This avoids
    importing a doctrine of meritorious expiation not required by the Aramaic while
    preserving the text's demand for concrete righteousness and mercy.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than import doctrinal claims the text does not make.'
