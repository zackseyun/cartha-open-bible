id: DAN.4.19
reference: Daniel 4:19
source:
  edition: WLC
  text: אנתה ה֣וּא מַלְכָּ֔/א דִּ֥י רְבַ֖ית וּ/תְקֵ֑פְתְּ וּ/רְבוּתָ֤/ךְ רְבָת֙ וּ/מְטָ֣ת
    לִ/שְׁמַיָּ֔/א וְ/שָׁלְטָנָ֖/ךְ לְ/ס֥וֹף אַרְעָֽ/א־׃
translation:
  text: You are the king, who has grown great and strong; your greatness has become
    great and reached to heaven, and your dominion to the end of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the ends of the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְתָּה הוּא
  chosen: You are
  alternatives:
  - It is you who are
  lexicon: HALOT
  rationale: The pronoun plus demonstrative gives emphatic direct address. 'You are'
    is natural English and preserves the identification without overloading the line.
- source_word: מַלְכָּא
  chosen: the king
  alternatives:
  - O king
  - king
  lexicon: HALOT
  rationale: With the emphatic identification, the definite form is best rendered
    'the king.' 'O king' would sound vocative, but here the clause identifies Nebuchadnezzar
    as the tree from the dream.
- source_word: דִּי
  chosen: who
  alternatives:
  - that
  lexicon: HALOT
  rationale: The relative particle introduces a descriptive clause about the king;
    'who' is idiomatic for a personal antecedent.
- source_word: רְבַית
  chosen: has grown great
  alternatives:
  - became great
  - grew
  lexicon: HALOT
  rationale: From רבה, denoting becoming great/increasing. 'Has grown great' captures
    the completed rise in status and matches the royal context.
- source_word: וּתְקֵפְתְּ
  chosen: and strong
  alternatives:
  - and mighty
  - and powerful
  lexicon: HALOT
  rationale: The verb from תקף conveys becoming strong or powerful. In English, after
    'has grown great,' the predicate adjective 'and strong' reads smoothly while preserving
    the sense.
- source_word: וּרְבוּתָךְ
  chosen: your greatness
  alternatives:
  - your majesty
  - your greatness
  lexicon: HALOT
  rationale: The noun denotes greatness/magnitude. 'Your greatness' keeps the lexical
    link with the surrounding רבה forms; 'majesty' is possible but less transparent
    to the repetition.
- source_word: רְבָת
  chosen: has become great
  alternatives:
  - is great
  - has increased
  lexicon: HALOT
  rationale: The feminine verb agrees with 'your greatness.' Rendering it verbally
    preserves the source's repetition rather than collapsing it into a single adjective.
- source_word: וּמְטָת לִשְׁמַיָּא
  chosen: and reached to heaven
  alternatives:
  - and reached the heavens
  - and extends to heaven
  lexicon: HALOT
  rationale: The verb means 'reached/arrived.' 'To heaven' is a natural singular rendering
    for the Aramaic plural form used idiomatically for the sky/heavens.
- source_word: וְשָׁלְטָנָךְ
  chosen: and your dominion
  alternatives:
  - and your rule
  - and your sovereignty
  lexicon: HALOT
  rationale: The noun denotes ruling authority or dominion. 'Dominion' fits royal
    language and echoes the broader Danielic vocabulary.
- source_word: לְסוֹף אַרְעָא
  chosen: to the end of the earth
  alternatives:
  - to the ends of the earth
  - to the extremity of the earth
  lexicon: HALOT
  rationale: Literally 'to the end of the earth.' The singular is retained because
    it closely reflects the Aramaic while remaining idiomatic enough in English.
