theological_decisions:
- issue: Extent of the king's rule
  chosen_reading: hyperbolic universal royal dominion rendered as 'to the end of the
    earth'
  alternative_readings:
  - strictly global political control
  - merely local imperial reach
  rationale: The phrase is standard ancient royal hyperbole for vast dominion. The
    translation preserves the wording without resolving the historical scope beyond
    what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
