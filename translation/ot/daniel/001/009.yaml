id: DAN.1.9
reference: Daniel 1:9
source:
  edition: WLC
  text: וַ/יִּתֵּ֤ן הָֽ/אֱלֹהִים֙ אֶת דָּ֣נִיֵּ֔אל לְ/חֶ֖סֶד וּֽ/לְ/רַחֲמִ֑ים לִ/פְנֵ֖י שַׂ֥ר הַ/סָּרִיסִֽים־׃
translation:
  text: And God gave Daniel favor and compassion before the chief of the eunuchs[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the chief of the court officials' or 'the chief of the palace officials'; the Hebrew term can refer either to literal eunuchs or to royal officers more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - caused to receive
  - granted
  lexicon: HALOT
  rationale: The wayyiqtol of נתן here straightforwardly narrates divine action. 'Gave' is the most direct and natural English rendering and preserves the sense that God is the active source of what follows.
- source_word: הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The noun refers to the true God in context. 'God' is the standard English rendering; no covenant name is present here, so not 'the LORD.'
- source_word: אֶת דָּנִיֵּאל
  chosen: Daniel
  rationale: The direct-object marker has no independent English equivalent. The personal name is transliterated per translation philosophy.
- source_word: לְחֶסֶד
  chosen: favor
  alternatives:
  - steadfast love
  - kindness
  - lovingkindness
  lexicon: HALOT
  rationale: In this construction, the sense is not covenant loyalty shown by God to Daniel, but Daniel being placed into a state of favorable regard in the eyes of an official. 'Favor' best fits the interpersonal setting and idiomatic English.
- source_word: וּלְרַחֲמִים
  chosen: compassion
  alternatives:
  - mercy
  - tender mercy
  - pity
  lexicon: HALOT
  rationale: The plural noun often conveys compassionate feelings or mercies. 'Compassion' pairs naturally with 'favor' and communicates the official's sympathetic disposition toward Daniel without sounding archaic.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the sight of
  - with
  lexicon: HALOT
  rationale: Literally 'before' or 'in the presence of.' 'Before' preserves the Hebrew idiom while remaining clear in English; it indicates the perspective of the official toward Daniel.
- source_word: שַׂר
  chosen: chief
  alternatives:
  - commander
  - official
  - captain
  lexicon: HALOT
  rationale: שַׂר denotes a ruler or official of rank. In construct with 'the eunuchs,' 'chief' clearly conveys supervisory authority in the court setting.
- source_word: הַסָּרִיסִים
  chosen: the eunuchs
  alternatives:
  - the court officials
  - the palace officials
  lexicon: HALOT
  rationale: סָרִיס can denote either literal eunuchs or, in some contexts, high court officials. The default lexical sense is 'eunuch,' and in Daniel this traditional rendering remains plausible. Because the broader semantic possibility is real, the alternative is preserved in a footnote rather than replacing the main text.
