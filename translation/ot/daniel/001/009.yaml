theological_decisions:
- issue: Meaning of סָרִיסִים in the Babylonian court context
  chosen_reading: the eunuchs
  alternative_readings:
  - the court officials
  - the palace officials
  rationale: The Hebrew term can refer literally to eunuchs or more broadly to royal officials. Since the lexical default is 'eunuchs' and the text does not require a euphemistic rendering, the main text keeps the more direct translation. Because some interpreters understand the term institutionally rather than physically in this context, that alternative is preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: Translation philosophy §3, §5
