id: DAN.1.5
reference: Daniel 1:5
source:
  edition: WLC
  text: וַ/יְמַן֩ לָ/הֶ֨ם הַ/מֶּ֜לֶךְ דְּבַר י֣וֹם בְּ/יוֹמ֗/וֹ מִ/פַּת בַּ֤ג הַ/מֶּ֨לֶךְ֙
    וּ/מִ/יֵּ֣ין מִשְׁתָּ֔י/ו וּֽ/לְ/גַדְּלָ֖/ם שָׁנִ֣ים שָׁל֑וֹשׁ וּ/מִ֨/קְצָתָ֔/ם
    יַֽעַמְד֖וּ לִ/פְנֵ֥י הַ/מֶּֽלֶךְ־־׃
translation:
  text: And the king assigned to them a daily portion from the king’s food and from
    the wine he drank, and to raise them for three years; and at the end of them they
    were to stand before the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the king’s delicacies' or 'from the king’s rich food.' The Hebrew
      refers to provisions from the royal table and may imply luxury food.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'at the end of them,' referring to the end of the three years.
    reason: lexical_alternative
  - marker: c
    text: '''Stand before the king'' is a court expression meaning to appear in royal
      service or attendance.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְמַן
  chosen: assigned
  alternatives:
  - appointed
  - allotted
  - designated
  lexicon: HALOT
  rationale: The verb denotes appointing or assigning something for someone. 'Assigned'
    fits the administrative context of royal provision better than the more generic
    'appointed.'
- source_word: דְּבַר יוֹם בְּיוֹמוֹ
  chosen: a daily portion
  alternatives:
  - the portion of a day in its day
  - day by day
  lexicon: HALOT
  rationale: This idiom refers to the fixed allotment for each day. 'A daily portion'
    renders the sense naturally in English while preserving the concrete idea of an
    allotted ration.
- source_word: מִפַּת בַּג הַמֶּלֶךְ
  chosen: from the king’s food
  alternatives:
  - from the king’s delicacies
  - from the king’s rich food
  - from the portion of the king’s provisions
  lexicon: HALOT
  rationale: The expression refers to royal provisions/choice food from the king's
    table. 'The king’s food' is clear and restrained; 'delicacies' may over-specify
    luxury, though that nuance is possible and worth preserving in a footnote.
- source_word: וּמִיֵּין מִשְׁתָּיו
  chosen: from the wine he drank
  alternatives:
  - from the wine of his drinking
  - from the king’s wine
  - from the wine of his feasting
  lexicon: HALOT
  rationale: The phrase literally points to the wine associated with the king's drinking/banqueting.
    'From the wine he drank' keeps the personal royal source explicit and is idiomatic
    English.
- source_word: וּלְגַדְּלָם
  chosen: to raise them
  alternatives:
  - to bring them up
  - to nourish them
  - to educate them
  lexicon: HALOT
  rationale: The infinitive of גדל here refers to causing them to grow up or be brought
    to maturity through this regimen. 'To raise them' captures the developmental sense
    without narrowing it merely to physical feeding or formal education.
- source_word: שָׁנִים שָׁלוֹשׁ
  chosen: for three years
  alternatives:
  - three years
  lexicon: HALOT
  rationale: Straightforward temporal duration. 'For three years' expresses the intended
    period of training/provision.
- source_word: וּמִקְצָתָם
  chosen: at the end of them
  alternatives:
  - at the end of that time
  - after them
  - from the end of them
  lexicon: HALOT
  rationale: The phrase literally means 'from their end,' referring to the completion
    of the three-year period. 'At the end of them' stays close to the Hebrew while
    remaining understandable; the smoother idiom is preserved in a footnote.
- source_word: יַעַמְדוּ לִפְנֵי הַמֶּלֶךְ
  chosen: they were to stand before the king
  alternatives:
  - they were to enter the king’s service
  - they were to attend before the king
  lexicon: HALOT
  rationale: The idiom 'stand before' commonly denotes appearing in service before
    a superior, especially a king. Retaining 'stand before the king' preserves the
    formal court idiom and allows readers to infer service context.
