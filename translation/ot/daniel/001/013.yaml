- issue: Rendering of עֲבָדֶיךָ
  chosen_reading: your servants
  alternative_readings:
  - your slaves
  rationale: Per translation philosophy, עבד-related terms are rendered contextually.
    Here Daniel uses deferential court language toward an official; the verse does
    not foreground bonded status as a theological or social emphasis. Therefore 'servants'
    is preferred over 'slaves.'
