id: DAN.1.13
reference: Daniel 1:13
source:
  edition: WLC
  text: וְ/יֵרָא֤וּ לְ/פָנֶ֨י/ךָ֙ מַרְאֵ֔י/נוּ וּ/מַרְאֵה֙ הַ/יְלָדִ֔ים הָ/אֹ֣כְלִ֔ים
    אֵ֖ת פַּתְבַּ֣ג הַ/מֶּ֑לֶךְ וְ/כַ/אֲשֶׁ֣ר תִּרְאֵ֔ה עֲשֵׂ֖ה עִם עֲבָדֶֽי/ךָ־׃
translation:
  text: Then let our appearance and the appearance of the youths who are eating the
    king’s food be seen before you, and according to what you see, deal with your
    servants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the king’s portion' or 'the king’s delicacies.' The Hebrew term refers
      to royal provisions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֵרָאוּ
  chosen: let ... be examined
  alternatives:
  - let ... be seen
  - let ... appear
  lexicon: HALOT
  rationale: 'Niphal/jussive of ראה here has a passive nuance in Daniel’s proposal:
    he asks that their condition be looked at or inspected after the test. ''Be examined''
    brings out the evaluative sense in context better than the more wooden ''be seen.'''
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in your presence
  - before your face
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression meaning in the official’s presence or before
    his judgment. 'Before you' is natural modern English and preserves the direct
    address.
- source_word: מַרְאֵינוּ
  chosen: our appearance
  alternatives:
  - our look
  - our countenance
  lexicon: HALOT
  rationale: מַרְאֶה refers to visible appearance. 'Appearance' is clear and contemporary;
    'countenance' is too archaic.
- source_word: וּמַרְאֵה הַיְלָדִים
  chosen: and the appearance of the youths
  alternatives:
  - and the appearance of the young men
  - and the appearance of the boys
  lexicon: HALOT
  rationale: יְלָדִים can denote youths/young men in court-training context, not necessarily
    small children. 'Youths' best fits the setting and keeps the age nuance without
    sounding childish.
- source_word: הָאֹכְלִים
  chosen: who are eating
  alternatives:
  - who eat
  - eating
  lexicon: HALOT
  rationale: The participle marks the ongoing customary action of consuming the royal
    provisions. 'Who are eating' preserves the participial force in readable English.
- source_word: פַּתְבַּג הַמֶּלֶךְ
  chosen: the king’s food
  alternatives:
  - the king’s portion
  - the king’s rich food
  - the king’s delicacies
  lexicon: HALOT
  rationale: פַּתְבַּג is a Persian loanword for royal provisions/choice food. 'The
    king’s food' is accurate and straightforward in context; 'delicacies' is possible
    but slightly interpretive.
- source_word: וְכַאֲשֶׁר תִּרְאֶה
  chosen: according to what you see
  alternatives:
  - as you see
  - according to what you observe
  lexicon: HALOT
  rationale: This clause grounds the requested action in the official’s own observation
    after inspection. 'According to what you see' is explicit and natural.
- source_word: עֲשֵׂה עִם עֲבָדֶיךָ
  chosen: deal with your servants
  alternatives:
  - do with your servants
  - act toward your servants
  lexicon: HALOT
  rationale: The idiom עשה עם means to act/deal with someone. 'Deal with your servants'
    is idiomatic English and preserves the deferential address. 'Servants' fits court
    service context better than 'slaves' here, since bonded status is not the salient
    point in this verse.
