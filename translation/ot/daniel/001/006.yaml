id: DAN.1.6
reference: Daniel 1:6
source:
  edition: WLC
  text: וַ/יְהִ֥י בָ/הֶ֖ם מִ/בְּנֵ֣י יְהוּדָ֑ה דָּנִיֵּ֣אל חֲנַנְיָ֔ה מִֽישָׁאֵ֖ל
    וַ/עֲזַרְיָֽה׃
translation:
  text: And among them, from the sons of Judah, were Daniel, Hananiah, Mishael, and
    Azariah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the Judeans.' The Hebrew reads more literally 'from the sons of
      Judah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... were
  alternatives:
  - Now there were
  - And there were
  - And it happened that there were
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the narrative statement. In English,
    an existential/copular rendering is most natural here. 'And ... were' preserves
    the narrative flow without the overly wooden 'and it happened.'
- source_word: בָהֶם
  chosen: among them
  alternatives:
  - in them
  - with them
  lexicon: HALOT
  rationale: The preposition ב with pronominal suffix in this context indicates inclusion
    within a larger group previously mentioned. 'Among them' is idiomatic and contextually
    precise.
- source_word: מִבְּנֵי יְהוּדָה
  chosen: from the sons of Judah
  alternatives:
  - from the people of Judah
  - from the Judeans
  - from the children of Judah
  lexicon: HALOT
  rationale: בני יהודה is literally 'sons of Judah.' Following the project's gender-accurate
    principle, the masculine form is retained rather than neutralized. 'Judah' is
    preferable to 'Judea/Judeans' because the Hebrew names the tribal/people designation
    directly, not the later geographic term.
- source_word: דָּנִיֵּאל
  chosen: Daniel
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names.
- source_word: חֲנַנְיָה
  chosen: Hananiah
  rationale: Standard English transliteration of the personal name.
- source_word: מִישָׁאֵל
  chosen: Mishael
  rationale: Standard English transliteration of the personal name.
- source_word: וַעֲזַרְיָה
  chosen: and Azariah
  rationale: The conjunction joins the final name in the list. 'Azariah' is the standard
    English transliteration.
