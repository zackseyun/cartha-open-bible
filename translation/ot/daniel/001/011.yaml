id: DAN.1.11
reference: Daniel 1:11
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר דָּנִיֵּ֖אל אֶל הַ/מֶּלְצַ֑ר אֲשֶׁ֤ר מִנָּה֙ שַׂ֣ר הַ/סָּֽרִיסִ֔ים
    עַל דָּנִיֵּ֣אל חֲנַנְיָ֔ה מִֽישָׁאֵ֖ל וַ/עֲזַרְיָֽה־־׃
translation:
  text: Then Daniel said to the steward whom the chief of the eunuchs had appointed
    over Daniel, Hananiah, Mishael, and Azariah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the chief official'; the Hebrew term translated 'eunuchs' can in some
      contexts refer more broadly to royal court officials.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence better than a bare 'and.'
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition introducing the addressee of speech.
- source_word: הַמֶּלְצַר
  chosen: the steward
  alternatives:
  - the overseer
  - the attendant
  lexicon: HALOT
  rationale: The term is likely a loanword/titled role for the immediate official
    responsible for the youths. 'Steward' fits the context of supervision over provisions
    and care better than a mere transliteration, and accords with the translation
    philosophy of translating titles.
- source_word: אֲשֶׁר מִנָּה
  chosen: whom ... had appointed
  alternatives:
  - whom ... assigned
  - whom ... set
  lexicon: HALOT
  rationale: The relative clause identifies the steward by the action of appointment.
    English past perfect ('had appointed') clarifies that the appointment preceded
    Daniel's speech.
- source_word: שַׂר הַסָּרִיסִים
  chosen: the chief of the eunuchs
  alternatives:
  - the commander of the court officials
  - the chief official
  lexicon: HALOT
  rationale: שַׂר is 'chief/commander/official over,' and סָרִיסִים commonly means
    'eunuchs,' though in some court contexts it can denote royal officials more broadly.
    Here 'chief of the eunuchs' is the most direct rendering of the Hebrew and matches
    the narrative setting; the broader sense is worth preserving in a footnote.
- source_word: עַל
  chosen: over
  alternatives:
  - in charge of
  - for
  lexicon: HALOT
  rationale: In appointment contexts עַל marks supervisory responsibility. 'Over'
    is concise and formally close.
- source_word: דָּנִיֵּאל חֲנַנְיָה מִישָׁאֵל וַעֲזַרְיָה
  chosen: Daniel, Hananiah, Mishael, and Azariah
  rationale: Personal names are transliterated per project philosophy. The Hebrew
    names are retained rather than the Babylonian names because that is what the source
    text uses here.
