id: DAN.1.12
reference: Daniel 1:12
source:
  edition: WLC
  text: נַס נָ֥א אֶת עֲבָדֶ֖י/ךָ יָמִ֣ים עֲשָׂרָ֑ה וְ/יִתְּנוּ לָ֜/נוּ מִן הַ/זֵּרֹעִ֛ים
    וְ/נֹאכְלָ֖ה וּ/מַ֥יִם וְ/נִשְׁתֶּֽה־־־־׃
translation:
  text: 'Please test your servants for ten days: let us be given some vegetables to
    eat and water to drink.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'foods from seeds' or 'seed-food'; the Hebrew term refers broadly to
      plant-based food grown from seed.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַס
  chosen: test
  alternatives:
  - try
  - prove
  lexicon: HALOT
  rationale: Imperative of נסה in the sense of putting someone to the test or making
    a trial. 'Test' is natural modern English and fits Daniel's request for an evaluative
    trial period.
- source_word: נָא
  chosen: please
  alternatives:
  - now
  - I pray
  lexicon: HALOT
  rationale: Polite particle softening the imperative. Rendered as 'please' to reflect
    courteous request in readable modern English.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here Daniel uses a deferential
    courtly self-reference to an official superior. 'Your servants' best matches the
    social register without importing the stronger bonded emphasis.
- source_word: יָמִים עֲשָׂרָה
  chosen: for ten days
  alternatives:
  - ten days
  lexicon: HALOT
  rationale: English idiom naturally expresses the duration with 'for.' The Hebrew
    accusative of duration indicates the length of the test period.
- source_word: וְיִתְּנוּ לָנוּ
  chosen: let us be given
  alternatives:
  - and let them give us
  - and they should give us
  lexicon: HALOT
  rationale: 'The 3mp jussive expresses a request: ''let them give.'' In English,
    an impersonal passive, ''let us be given,'' is smoother and keeps the focus on
    the requested provisions rather than unspecified agents.'
- source_word: מִן הַזֵּרֹעִים
  chosen: some vegetables
  alternatives:
  - seed-food
  - foods from seeds
  - pulse
  lexicon: HALOT
  rationale: The term refers to edible plant food, likely things grown from seed.
    Traditional 'pulse' is archaic; 'vegetables' is the clearest modern rendering,
    while the more literal seed-based nuance is preserved in a footnote.
- source_word: וְנֹאכְלָה
  chosen: to eat
  alternatives:
  - and let us eat
  lexicon: HALOT
  rationale: Following the request formula, English idiom expresses purpose/result
    more naturally as 'to eat' after 'be given.'
- source_word: וּמַיִם וְנִשְׁתֶּה
  chosen: and water to drink
  alternatives:
  - and let us drink water
  - and water, and we will drink
  lexicon: HALOT
  rationale: Parallel to 'some vegetables to eat.' This preserves the simple diet
    requested in clear English.
