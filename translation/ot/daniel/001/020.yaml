theological_decisions:
- issue: Rendering of Babylonian court specialist terms without importing later or
    overly specific categories
  chosen_reading: magicians and enchanters
  alternative_readings:
  - magicians and astrologers
  - occult priests and conjurers
  rationale: The verse contrasts God-given wisdom in Daniel and his companions with
    the recognized wisdom specialists of Babylon. The translation should reflect the
    court-occult setting without overstating technical precision where the Hebrew
    terms are debated. 'Magicians and enchanters' preserves the contrast and remains
    accessible.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; preserve theological tension rather than resolve it'
