id: DAN.1.20
reference: Daniel 1:20
source:
  edition: WLC
  text: וְ/כֹ֗ל דְּבַר֙ חָכְמַ֣ת בִּינָ֔ה אֲשֶׁר בִּקֵּ֥שׁ מֵ/הֶ֖ם הַ/מֶּ֑לֶךְ וַֽ/יִּמְצָאֵ֞/ם
    עֶ֣שֶׂר יָד֗וֹת עַ֤ל כָּל הַֽ/חַרְטֻמִּים֙ הָֽ/אַשָּׁפִ֔ים אֲשֶׁ֖ר בְּ/כָל מַלְכוּתֽ/וֹ־־־׃
translation:
  text: And in every matter of wisdom and understanding that the king asked of them,
    he found them ten times better than all the magicians and enchanters who were
    in all his kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'ten hands above.' The Hebrew idiom expresses marked superiority;
      compare 'ten times better.'
    reason: lexical_alternative
  - marker: b
    text: Or 'magicians and astrologers.' The second term refers to a class of Babylonian
      wise men, but its precise English equivalent is uncertain.
    reason: alternative_reading
lexical_decisions:
- source_word: וְכֹל
  chosen: And in every
  alternatives:
  - And every
  - In every
  lexicon: HALOT
  rationale: The conjunction plus 'all/every' introduces a new statement linked to
    the previous verse. Rendering with 'And in every' brings out the sense that what
    follows concerns each category or matter under discussion.
- source_word: דְּבַר
  chosen: matter
  alternatives:
  - word
  - thing
  - affair
  lexicon: HALOT
  rationale: Here דָּבָר refers not to a spoken word but to a subject, issue, or matter
    brought before them for evaluation.
- source_word: חָכְמַת בִּינָה
  chosen: of wisdom and understanding
  alternatives:
  - of wise understanding
  - of wisdom and insight
  lexicon: HALOT
  rationale: The construct chain expresses a category of intellectual discernment.
    'Wisdom and understanding' is a natural English pairing that preserves both nouns
    distinctly.
- source_word: אֲשֶׁר בִּקֵּשׁ מֵהֶם הַמֶּלֶךְ
  chosen: that the king asked of them
  alternatives:
  - that the king sought from them
  - which the king requested of them
  lexicon: HALOT
  rationale: בקש with מן can mean seek, request, or inquire of. In context of examination
    and consultation, 'asked of them' is idiomatic and clear.
- source_word: וַיִּמְצָאֵם
  chosen: he found them
  alternatives:
  - he discovered them to be
  - he found
  lexicon: HALOT
  rationale: The verb introduces the king's evaluative conclusion about Daniel and
    his companions. 'He found them' preserves the direct object and the assessment
    sense.
- source_word: עֶשֶׂר יָדוֹת
  chosen: ten times better
  alternatives:
  - ten hands above
  - tenfold superior
  - ten times as much
  lexicon: HALOT
  rationale: The idiom literally reads 'ten hands,' but in context it denotes a degree
    of superiority. 'Ten times better' communicates the comparative force naturally
    in English while preserving the hyperbolic numerical expression.
- source_word: עַל
  chosen: than
  alternatives:
  - above
  - over
  lexicon: HALOT
  rationale: With a comparative idiom, עַל marks superiority over others. English
    'than' best fits the construction after 'better.'
- source_word: הַחַרְטֻמִּים
  chosen: the magicians
  alternatives:
  - the diviner-priests
  - the occult scribes
  lexicon: HALOT
  rationale: This term commonly refers to Egyptian/Babylonian court specialists in
    sacred or occult arts. 'Magicians' is the standard concise rendering and fits
    the court-comparison context.
- source_word: הָאַשָּׁפִים
  chosen: and enchanters
  alternatives:
  - and conjurers
  - and astrologers
  lexicon: HALOT
  rationale: The exact nuance is debated, but the term denotes another class of Babylonian
    wise men associated with incantation or occult practice. 'Enchanters' is broad
    enough to avoid overprecision while distinguishing them from the previous group.
    'Astrologers' is possible in some traditions but less lexically secure here.
- source_word: אֲשֶׁר בְּכָל מַלְכוּתוֹ
  chosen: who were in all his kingdom
  alternatives:
  - who were throughout his whole kingdom
  - who were in his entire realm
  lexicon: HALOT
  rationale: The phrase locates these specialists across the extent of Nebuchadnezzar's
    realm. 'In all his kingdom' is a close and readable rendering.
