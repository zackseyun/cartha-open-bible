id: DAN.1.3
reference: Daniel 1:3
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר הַ/מֶּ֔לֶךְ לְ/אַשְׁפְּנַ֖ז רַ֣ב סָרִיסָ֑י/ו לְ/הָבִ֞יא מִ/בְּנֵ֧י
    יִשְׂרָאֵ֛ל וּ/מִ/זֶּ֥רַע הַ/מְּלוּכָ֖ה וּ/מִן הַֽ/פַּרְתְּמִֽים־׃
translation:
  text: Then the king told Ashpenaz, the chief of his court officials, to bring some
    of the sons of Israel, both from the royal offspring and from the nobles,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the chief of his eunuchs.' The Hebrew term can denote either literal
      eunuchs or high royal officials more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... told
  alternatives:
  - said
  - commanded
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, so 'Then' reflects the sequence
    naturally in English. 'Told' fits the infinitive of command that follows ('to
    bring') better than the more wooden 'said,' while avoiding the stronger 'commanded,'
    which the Hebrew verb itself does not require.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of the common noun with article.
- source_word: לְאַשְׁפְּנַז
  chosen: Ashpenaz
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: רַב סָרִיסָיו
  chosen: the chief of his court officials
  alternatives:
  - the chief of his eunuchs
  - the master of his eunuchs
  lexicon: HALOT
  rationale: רַב denotes a chief or head official. סָרִיס can mean 'eunuch' or more
    broadly a royal/court official. In this court setting the broader sense is possible
    and reads naturally in English; however, because 'eunuchs' is a longstanding and
    plausible rendering, it is preserved in a footnote.
- source_word: לְהָבִיא
  chosen: to bring
  alternatives:
  - to bring in
  lexicon: HALOT
  rationale: Standard rendering of the Hiphil infinitive of בוא in a causative/ingressive
    sense after a verb of speaking or ordering.
- source_word: מִבְּנֵי יִשְׂרָאֵל
  chosen: some of the sons of Israel
  alternatives:
  - some of the Israelites
  - some of the children of Israel
  lexicon: HALOT
  rationale: בְּנֵי יִשְׂרָאֵל is literally 'sons of Israel.' Because the phrase here
    refers to members of the people group rather than only males in a narrow sense,
    'some of the sons of Israel' preserves the Hebrew form while remaining understandable.
    'Israelites' is possible but less formally transparent.
- source_word: וּמִזֶּרַע הַמְּלוּכָה
  chosen: from the royal offspring
  alternatives:
  - from the royal seed
  - from the royal family
  lexicon: HALOT
  rationale: זֶרַע literally means 'seed/offspring.' 'Royal offspring' preserves the
    descent idea in idiomatic English better than the archaic 'royal seed.' 'Royal
    family' is interpretive and slightly broader than the Hebrew.
- source_word: וּמִן הַפַּרְתְּמִים
  chosen: and from the nobles
  alternatives:
  - and from the aristocracy
  - and from the prominent men
  lexicon: HALOT
  rationale: This rare term likely refers to nobles or high-ranking elite persons.
    'Nobles' is concise, natural, and fits the social class sense without over-specifying
    a technical title.
