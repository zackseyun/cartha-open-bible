id: DAN.1.1
reference: Daniel 1:1
source:
  edition: WLC
  text: בִּ/שְׁנַ֣ת שָׁל֔וֹשׁ לְ/מַלְכ֖וּת יְהוֹיָקִ֣ים מֶֽלֶךְ יְהוּדָ֑ה בָּ֣א נְבוּכַדְנֶאצַּ֧ר
    מֶֽלֶךְ בָּבֶ֛ל יְרוּשָׁלִַ֖ם וַ/יָּ֥צַר עָלֶֽי/הָ־־׃
translation:
  text: In the third year of the reign of Jehoiakim king of Judah, Nebuchadnezzar
    king of Babylon came to Jerusalem and besieged it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and laid siege to it.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Nebuchadnezzar'; some English traditions also use 'Nebuchadrezzar'
      in certain passages.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/שְׁנַת
  chosen: In the ... year of
  alternatives:
  - In year ... of
  - During the ... year of
  lexicon: HALOT
  rationale: The preposition ב plus 'year' introduces a temporal setting. English
    idiom normally requires 'In the ... year of' for natural readability while preserving
    the formal temporal construction.
- source_word: שָׁל֔וֹשׁ
  chosen: third
  alternatives:
  - three
  lexicon: HALOT
  rationale: With 'year' in a regnal dating formula, English uses the ordinal 'third'
    rather than the cardinal 'three'.
- source_word: לְ/מַלְכ֖וּת
  chosen: of the reign of
  alternatives:
  - of the kingship of
  - of the rule of
  lexicon: HALOT
  rationale: מַלְכוּת here denotes royal reign/kingship in a chronological formula.
    'Reign' is the most idiomatic and precise English rendering in this context.
- source_word: יְהוֹיָקִים
  chosen: Jehoiakim
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: מֶֽלֶךְ יְהוּדָ֑ה
  chosen: king of Judah
  alternatives:
  - the king of Judah
  lexicon: HALOT
  rationale: 'The construct phrase identifies Jehoiakim''s office and realm. English
    omits the article naturally in apposition after a proper name: ''Jehoiakim king
    of Judah.'''
- source_word: בָּ֣א
  chosen: came
  alternatives:
  - arrived
  - marched
  lexicon: HALOT
  rationale: The verb בוא straightforwardly means 'come.' Although in military context
    'marched' is possible as an interpretive expansion, 'came' stays closer to the
    Hebrew and lets the following verb express the hostile action.
- source_word: נְבוּכַדְנֶאצַּ֧ר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  rationale: Standard English biblical convention is 'Nebuchadnezzar.' The Hebrew
    spelling here supports that familiar transliteration, though 'Nebuchadrezzar'
    appears in some contexts/traditions.
- source_word: מֶֽלֶךְ בָּבֶ֛ל
  chosen: king of Babylon
  alternatives:
  - the king of Babylon
  lexicon: HALOT
  rationale: As with 'king of Judah,' this is an appositional title following the
    proper name.
- source_word: יְרוּשָׁלִַ֖ם
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
- source_word: וַ/יָּ֥צַר עָלֶֽי/הָ
  chosen: and besieged it
  alternatives:
  - and laid siege to it
  - and encamped against it
  lexicon: HALOT
  rationale: The verb צור with על in military context means to besiege or lay siege
    against a city. 'Besieged it' is concise, natural English and accurately conveys
    the military action. 'Laid siege to it' is a close alternative preserved in a
    footnote as a lexical option.
