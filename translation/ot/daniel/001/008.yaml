theological_decisions:
- issue: Nature of Daniel's concern in refusing royal provisions
  chosen_reading: Render the concern as 'defile himself' without specifying whether the defilement was ceremonial, dietary-law related, or tied to idolatrous association.
  alternative_readings:
  - ceremonial uncleanness
  - violation of Mosaic dietary law
  - complicity with pagan royal culture or idol-offered food
  rationale: The Hebrew states only that Daniel sought to avoid defilement; it does not explain the exact basis. Preserving the broader term maintains the text's theological tension rather than resolving a debated interpretive question beyond the wording of the verse.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Meaning of סָרִיסִים
  chosen_reading: Translate as 'eunuchs' in the main text, while preserving 'court officials' as an alternative in a footnote.
  alternative_readings:
  - court officials
  - palace officials
  rationale: The Hebrew term can denote literal eunuchs or royal officials more generally. Since the lexical core often includes 'eunuch,' the main text keeps that rendering for transparency, but the broader administrative sense is preserved in a footnote because the historical referent may be debated.
  doctrine_reference: 'Translation philosophy §5: Consistency of key terms, or documented exception.'
