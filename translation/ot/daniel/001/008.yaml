id: DAN.1.8
reference: Daniel 1:8
source:
  edition: WLC
  text: וַ/יָּ֤שֶׂם דָּנִיֵּאל֙ עַל לִבּ֔/וֹ אֲשֶׁ֧ר לֹֽא יִתְגָּאַ֛ל בְּ/פַתְבַּ֥ג הַ/מֶּ֖לֶךְ וּ/בְ/יֵ֣ין מִשְׁתָּ֑י/ו וַ/יְבַקֵּשׁ֙ מִ/שַּׂ֣ר הַ/סָּרִיסִ֔ים אֲשֶׁ֖ר לֹ֥א יִתְגָּאָֽל־־׃
translation:
  text: But Daniel resolved in his heart that he would not defile himself with the king’s food or with the wine he drank[a], and he sought permission from the chief of the eunuchs that he might not defile himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the chief official' / 'the commander of the court officials'; the Hebrew term can refer either to literal eunuchs or to high royal officials more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם ... עַל לִבּוֹ
  chosen: resolved in his heart
  alternatives:
  - set upon his heart
  - purposed in his heart
  - determined
  lexicon: HALOT
  rationale: The idiom literally means 'set on his heart,' expressing inward resolve or determination. 'Resolved in his heart' preserves the Hebrew idiom's internal, volitional sense while reading naturally in English.
- source_word: יִתְגָּאַל
  chosen: defile himself
  alternatives:
  - pollute himself
  - make himself unclean
  lexicon: HALOT
  rationale: The hitpael of גאל here refers to ritual or covenantal defilement in context. 'Defile himself' is the standard, clear English rendering that preserves the moral-ritual force without over-specifying the mechanism.
- source_word: פַּתְבַּג
  chosen: food
  alternatives:
  - portion of food
  - choice food
  - delicacies
  lexicon: HALOT
  rationale: The term refers to the king's allotted provisions, likely rich court food. 'Food' is broad and accurate; 'delicacies' may overstate luxury, while 'portion of food' is more cumbersome. The royal source is retained by 'the king’s food.'
- source_word: יֵין מִשְׁתָּיו
  chosen: the wine he drank
  alternatives:
  - the wine of his drinking
  - his banquet wine
  - the wine from his feasts
  lexicon: HALOT
  rationale: The construct phrase is literally 'the wine of his drinking/feasting.' 'The wine he drank' is idiomatic English that preserves the reference to the king's own provision without awkward literalism.
- source_word: שַׂר הַסָּרִיסִים
  chosen: the chief of the eunuchs
  alternatives:
  - the commander of the court officials
  - the chief official
  lexicon: HALOT
  rationale: סָרִיס can mean 'eunuch' or more broadly a royal court official. In Daniel, the court setting makes either possible, but the lexical default sense is 'eunuch.' To preserve transparency to the source, 'chief of the eunuchs' is retained, with the broader administrative sense preserved in a footnote.
- source_word: וַיְבַקֵּשׁ
  chosen: he sought permission
  alternatives:
  - he requested
  - he asked
  lexicon: HALOT
  rationale: 'The verb means ''seek'' or ''request.'' ''Sought permission'' makes explicit the implied object in context: Daniel approached the official for authorization not to partake.'
- source_word: אֲשֶׁר לֹא יִתְגָּאָל
  chosen: that he might not defile himself
  alternatives:
  - so that he would not defile himself
  - that he should not defile himself
  lexicon: HALOT
  rationale: This clause expresses the content/purpose of Daniel's request. 'That he might not defile himself' captures the purposive nuance in smooth English.
