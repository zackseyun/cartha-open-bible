id: DAN.1.15
reference: Daniel 1:15
source:
  edition: WLC
  text: וּ/מִ/קְצָת֙ יָמִ֣ים עֲשָׂרָ֔ה נִרְאָ֤ה מַרְאֵי/הֶם֙ ט֔וֹב וּ/בְרִיאֵ֖י בָּשָׂ֑ר
    מִן כָּל הַ/יְלָדִ֔ים הָ/אֹ֣כְלִ֔ים אֵ֖ת פַּתְבַּ֥ג הַ/מֶּֽלֶךְ־־׃
translation:
  text: And at the end of ten days, their appearance was better, and they were healthier
    in flesh than all the youths who were eating the king’s food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fatter in body' or 'better nourished.' The Hebrew expression literally
      refers to being more full or healthy in flesh.
    reason: lexical_alternative
  - marker: b
    text: The term rendered 'food' refers to the royal provision from the king’s table;
      some translations render it 'delicacies' or 'portion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִקְצָת יָמִים עֲשָׂרָה
  chosen: And at the end of ten days
  alternatives:
  - And after ten days
  - And from the end of ten days
  lexicon: HALOT
  rationale: The idiom literally involves 'from/end of ten days.' In context it marks
    the completion of the ten-day test. 'At the end of ten days' is natural English
    and preserves the temporal sense more precisely than the looser 'after ten days.'
- source_word: נִרְאָה
  chosen: seemed
  alternatives:
  - was seen
  - appeared
  lexicon: HALOT
  rationale: Niphal of ראה here conveys visual appearance/perception. 'Seemed' fits
    the comparative observation being made about their condition; the following noun
    'appearance' makes 'appeared' awkward in English ('their appearance appeared').
- source_word: מַרְאֵיהֶם
  chosen: their appearance
  alternatives:
  - their countenance
  - their look
  lexicon: HALOT
  rationale: Refers to visible appearance. 'Appearance' is clear modern English and
    avoids archaic 'countenance.'
- source_word: טוֹב
  chosen: better
  alternatives:
  - good
  - more pleasing
  lexicon: HALOT
  rationale: Because the phrase is followed by מִן ('than') introducing comparison,
    English requires the comparative sense 'better.'
- source_word: וּבְרִיאֵי בָשָׂר
  chosen: healthier in flesh
  alternatives:
  - fatter
  - better nourished
  - plumper of body
  lexicon: HALOT
  rationale: The phrase literally means 'fat/healthy of flesh,' describing bodily
    condition. 'Healthier in flesh' preserves the concrete bodily reference without
    implying mere obesity; 'fatter' is possible but can mislead modern readers away
    from the ancient sense of robust health.
- source_word: מִן כָּל הַיְלָדִים
  chosen: than all the youths
  alternatives:
  - than all the boys
  - than all the young men
  lexicon: HALOT
  rationale: יְלָדִים here refers to the group of young trainees in the royal court.
    'Youths' is suitably broad and natural in English, avoiding the overly juvenile
    'boys' while not overstating age with 'young men.'
- source_word: הָאֹכְלִים
  chosen: who were eating
  alternatives:
  - who ate
  - eating
  lexicon: HALOT
  rationale: The participle denotes the ongoing practice of the comparison group during
    the test period. 'Who were eating' captures this durative sense.
- source_word: אֵת פַּתְבַּג הַמֶּלֶךְ
  chosen: the king’s food
  alternatives:
  - the king's portion
  - the king's rich food
  - the king's delicacies
  lexicon: HALOT
  rationale: פַּתְבַּג is a Persian loanword for the royal provision/choice food.
    'The king's food' is straightforward and accurate; 'delicacies' is possible but
    slightly interpretive, while 'portion' may sound too technical without context.
