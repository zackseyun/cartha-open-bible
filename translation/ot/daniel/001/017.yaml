theological_decisions:
- issue: Agency of God in the youths' abilities
  chosen_reading: The text explicitly attributes their knowledge and wisdom to God as a divine gift.
  alternative_readings:
  - A purely natural development of skill
  rationale: The subject הָאֱלֹהִים with נָתַן makes divine agency explicit. The translation preserves this without softening it into impersonal providence.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Nature of Daniel's gift regarding visions and dreams
  chosen_reading: Daniel is described as having understanding in interpreting/handling revelatory visions and dreams, not necessarily as receiving all such revelations at this point.
  alternative_readings:
  - Daniel himself received every vision and dream
  - Daniel was merely educated in dream literature
  rationale: The wording emphasizes understanding in relation to visions and dreams. The translation keeps the statement broad and does not over-specify interpretation versus reception, preserving the text's tension.
  doctrine_reference: Translation philosophy §3
