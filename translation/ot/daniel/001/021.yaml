id: DAN.1.21
reference: Daniel 1:21
source:
  edition: WLC
  text: וַֽ/יְהִי֙ דָּֽנִיֵּ֔אל עַד שְׁנַ֥ת אַחַ֖ת לְ/כ֥וֹרֶשׁ הַ/מֶּֽלֶךְ־׃פ
translation:
  text: And Daniel remained until the first year of King Cyrus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And Daniel was there until the first year of King Cyrus.' The Hebrew
      verb is literally 'was,' but here likely carries the sense of continued presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: remained
  alternatives:
  - was
  - continued
  - came to be
  lexicon: HALOT
  rationale: Although the verb is literally 'and he was,' in this context with a personal
    subject and the temporal marker עַד, idiomatic English is better expressed as
    'remained' or 'continued.' 'Remained' clearly conveys Daniel's continuing presence
    up to the stated time without awkwardness.
- source_word: דָּנִיֵּאל
  chosen: Daniel
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: עַד
  chosen: until
  alternatives:
  - up to
  lexicon: HALOT
  rationale: Standard temporal preposition indicating duration up to a point in time.
- source_word: שְׁנַת אַחַת
  chosen: the first year
  alternatives:
  - year one
  - one year
  lexicon: HALOT
  rationale: The construct phrase with cardinal אַחַת functions idiomatically as an
    ordinal expression here, referring to the first regnal year. 'The first year'
    is the natural English rendering.
- source_word: לְכוֹרֶשׁ
  chosen: of Cyrus
  alternatives:
  - for Cyrus
  - belonging to Cyrus
  lexicon: HALOT
  rationale: The preposition ל in regnal dating idiom marks the ruler whose year is
    in view; in English this is best rendered 'of Cyrus' rather than a more wooden
    'to/for Cyrus.'
- source_word: הַמֶּלֶךְ
  chosen: King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: In English regnal expressions, 'King Cyrus' is more natural than 'Cyrus
    the king,' while preserving the royal title explicitly present in the Hebrew.
