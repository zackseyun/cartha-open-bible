id: DAN.1.19
reference: Daniel 1:19
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר אִתָּ/ם֮ הַ/מֶּלֶךְ֒ וְ/לֹ֤א נִמְצָא֙ מִ/כֻּלָּ֔/ם כְּ/דָנִיֵּ֣אל חֲנַנְיָ֔ה מִֽישָׁאֵ֖ל וַ/עֲזַרְיָ֑ה וַ/יַּֽעַמְד֖וּ לִ/פְנֵ֥י הַ/מֶּֽלֶךְ׃
translation:
  text: The king spoke with them[a], and among them all no one was found like Daniel, Hananiah, Mishael, and Azariah; so they stood before the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and they entered the king’s service.' The Hebrew literally says 'they stood before the king,' a court expression for serving in royal presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר אִתָּם
  chosen: spoke with them
  alternatives:
  - talked with them
  - interviewed them
  lexicon: HALOT
  rationale: דבר with אֵת/אִתָּם here denotes direct conversation. 'Spoke with them' is the most straightforward rendering; 'interviewed them' captures context but is more interpretive than the Hebrew itself.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Standard rendering of מֶלֶךְ. The article is preserved.
- source_word: וְלֹא נִמְצָא מִכֻּלָּם
  chosen: and among them all no one was found
  alternatives:
  - and from all of them none was found
  - and no one among all of them was found
  lexicon: HALOT
  rationale: The Niphal of מצא is idiomatically rendered 'was found.' מִכֻּלָּם expresses comparison from the whole group, naturally conveyed in English as 'among them all.'
- source_word: כְּדָנִיֵּאל חֲנַנְיָה מִישָׁאֵל וַעֲזַרְיָה
  chosen: like Daniel, Hananiah, Mishael, and Azariah
  alternatives:
  - equal to Daniel, Hananiah, Mishael, and Azariah
  lexicon: HALOT
  rationale: כְּ marks comparison, 'like/as.' The four Judean names are transliterated per project policy to transliterate personal names rather than translate them.
- source_word: וַיַּעַמְדוּ
  chosen: so they stood
  alternatives:
  - and they stood
  - and they entered service
  lexicon: HALOT
  rationale: עמד literally means 'stand.' In this court context it implies taking up service or attendance, but the literal image should be preserved in the main text. 'So' reflects the consequential sense in context without over-paraphrasing.
- source_word: לִפְנֵי הַמֶּלֶךְ
  chosen: before the king
  alternatives:
  - in the presence of the king
  - in attendance on the king
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in the presence of.' 'Before the king' is concise and preserves both the spatial and court-service nuance.
