id: DAN.1.2
reference: Daniel 1:2
source:
  edition: WLC
  text: וַ/יִּתֵּן֩ אֲדֹנָ֨/י בְּ/יָד֜/וֹ אֶת יְהוֹיָקִ֣ים מֶֽלֶךְ יְהוּדָ֗ה וּ/מִ/קְצָת֙
    כְּלֵ֣י בֵית הָֽ/אֱלֹהִ֔ים וַ/יְבִיאֵ֥/ם אֶֽרֶץ שִׁנְעָ֖ר בֵּ֣ית אֱלֹהָ֑י/ו וְ/אֶת
    הַ/כֵּלִ֣ים הֵבִ֔יא בֵּ֖ית אוֹצַ֥ר אֱלֹהָֽי/ו־־־־־׃
translation:
  text: And the Lord gave Jehoiakim king of Judah into his hand, along with some of
    the vessels of the house of God. He brought them to the land of Shinar, to the
    house of his god, and he brought the vessels into the treasury of his god.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'delivered Jehoiakim king of Judah into his hand.'
    reason: lexical_alternative
  - marker: b
    text: Shinar is the ancient name for Babylonia.
    reason: cultural_note
  - marker: c
    text: Or 'temple of his god' and 'treasury/storehouse of his god.' The Hebrew
      uses 'house' for both God's house and the Babylonian deity's house.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - the LORD
  - Lord
  lexicon: HALOT
  rationale: The consonantal text reads אֲדֹנָי, not the divine name YHWH. Therefore
    'the Lord' is the most direct rendering. Capitalized small-caps 'the LORD' is
    reserved in this project for יְהוָה per doctrine guidance.
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - delivered
  - handed over
  lexicon: HALOT
  rationale: נתן has the broad sense 'give.' In this context it conveys divine handing
    over, but 'gave' preserves the Hebrew's simplicity without over-interpreting.
- source_word: בְּיָדוֹ
  chosen: into his hand
  alternatives:
  - into his power
  - into his control
  lexicon: HALOT
  rationale: The idiom literally means 'into his hand.' 'Into his hand' is natural
    enough in English and preserves the concrete Hebrew image of power and control.
- source_word: יְהוֹיָקִים מֶלֶךְ יְהוּדָה
  chosen: Jehoiakim king of Judah
  alternatives:
  - Jehoiakim, the king of Judah
  lexicon: HALOT
  rationale: Standard transliteration of the personal name, with the royal title rendered
    directly. The appositional structure is preserved.
- source_word: וּמִקְצָת כְּלֵי בֵית הָאֱלֹהִים
  chosen: along with some of the vessels of the house of God
  alternatives:
  - and some of the articles from the house of God
  - together with part of the vessels of the temple of God
  lexicon: HALOT
  rationale: מִקְצָת means 'some/part of.' כְּלֵי are physical objects or utensils;
    'vessels' fits temple furnishings well. בֵית הָאֱלֹהִים is rendered formally as
    'the house of God' rather than 'temple' to preserve the Hebrew wording.
- source_word: וַיְבִיאֵם
  chosen: He brought them
  alternatives:
  - and he brought them
  - he carried them
  lexicon: HALOT
  rationale: The suffix refers most naturally to Jehoiakim and the vessels together
    as the preceding compound object. English 'them' preserves that collective reference.
- source_word: אֶרֶץ שִׁנְעָר
  chosen: the land of Shinar
  alternatives:
  - Shinar
  lexicon: HALOT
  rationale: אֶרֶץ explicitly means 'land,' and שִׁנְעָר is a place-name retained
    by transliteration.
- source_word: בֵּית אֱלֹהָיו
  chosen: to the house of his god
  alternatives:
  - to the temple of his god
  lexicon: HALOT
  rationale: בֵּית is literally 'house.' Since the verse contrasts the house of God
    with the house of Nebuchadnezzar's god, retaining 'house' preserves the literary
    parallel. 'god' is lowercase because the referent is a pagan deity.
- source_word: וְאֶת הַכֵּלִים הֵבִיא בֵּית אוֹצַר אֱלֹהָיו
  chosen: and he brought the vessels into the treasury of his god
  alternatives:
  - and he placed the vessels in the treasure-house of his god
  - and he brought the articles into the storehouse of his god
  lexicon: HALOT
  rationale: אוֹצָר denotes a treasury or storehouse. 'Treasury' is concise and idiomatic.
    Repeating 'he brought' reflects the Hebrew repetition rather than smoothing it
    away.
