theological_decisions:
- issue: Divine sovereignty in Jerusalem's fall
  chosen_reading: The verse states that the Lord gave Jehoiakim into Nebuchadnezzar's
    hand.
  alternative_readings:
  - The Lord merely permitted Jehoiakim to fall
  rationale: The Hebrew verb נתן with God as subject presents active divine agency
    in the event. The translation preserves that claim without softening it to mere
    permission.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
