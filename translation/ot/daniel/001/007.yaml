id: DAN.1.7
reference: Daniel 1:7
source:
  edition: WLC
  text: וַ/יָּ֧שֶׂם לָ/הֶ֛ם שַׂ֥ר הַ/סָּרִיסִ֖ים שֵׁמ֑וֹת וַ/יָּ֨שֶׂם לְ/דָֽנִיֵּ֜אל
    בֵּ֣לְטְשַׁאצַּ֗ר וְ/לַֽ/חֲנַנְיָה֙ שַׁדְרַ֔ךְ וּ/לְ/מִֽישָׁאֵ֣ל מֵישַׁ֔ךְ וְ/לַ/עֲזַרְיָ֖ה
    עֲבֵ֥ד נְגֽוֹ׃
translation:
  text: 'And the chief of the eunuchs gave them names: he gave Daniel the name Belteshazzar,
    Hananiah Shadrach, Mishael Meshach, and Azariah Abed-nego.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the chief official' or 'the commander of the court officials'; the Hebrew
      term can denote a eunuch or, by extension, a royal court official.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם ... שֵׁמוֹת
  chosen: gave them names
  alternatives:
  - assigned them names
  - set names for them
  lexicon: HALOT
  rationale: The idiom literally uses 'set/put' with 'names,' but in English 'gave
    them names' best conveys the act of assigning new names without sounding wooden.
- source_word: שַׂר הַסָּרִיסִים
  chosen: the chief of the eunuchs
  alternatives:
  - the chief official
  - the commander of the court officials
  lexicon: HALOT
  rationale: סָרִיס often denotes a eunuch and can by extension refer to a court official.
    In Daniel 1 the court setting allows either nuance, but the plain lexical sense
    is 'eunuchs,' and this is a natural English rendering. 'Chief' reflects שַׂר as
    leader/official over them.
- source_word: וַיָּשֶׂם
  chosen: he gave
  alternatives:
  - he assigned
  - he set
  lexicon: HALOT
  rationale: 'The repeated verb is rendered idiomatically in English according to
    context: first collectively (''gave them names''), then distributively (''he gave
    Daniel...''). This preserves the repetition in sense while remaining readable.'
- source_word: לְדָנִיֵּאל ... בֵּלְטְשַׁאצַּר
  chosen: Daniel the name Belteshazzar
  alternatives:
  - Daniel, Belteshazzar
  lexicon: HALOT
  rationale: The preposition plus personal name followed by the assigned Babylonian
    name is best represented as 'Daniel the name Belteshazzar' to make explicit that
    a renaming is taking place.
- source_word: שַׁדְרַךְ / מֵישַׁךְ / עֲבֵד נְגוֹ
  chosen: Shadrach / Meshach / Abed-nego
  lexicon: HALOT
  rationale: These are personal names, so per translation philosophy they are transliterated
    by standard English conventions rather than translated.
- source_word: עֲבֵד נְגוֹ
  chosen: Abed-nego
  alternatives:
  - Abednego
  lexicon: HALOT
  rationale: The conventional English transliteration with a hyphen transparently
    reflects the two-part form in Hebrew/Aramaic tradition and aids readability.
