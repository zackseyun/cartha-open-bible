id: DAN.1.16
reference: Daniel 1:16
source:
  edition: WLC
  text: וַ/יְהִ֣י הַ/מֶּלְצַ֗ר נֹשֵׂא֙ אֶת פַּתְבָּגָ֔/ם וְ/יֵ֖ין מִשְׁתֵּי/הֶ֑ם וְ/נֹתֵ֥ן לָ/הֶ֖ם זֵרְעֹנִֽים־׃
translation:
  text: So the steward kept taking away their choice food and the wine they were to drink[b][a], and kept giving them vegetables.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their portion of the king's delicacies.' The Hebrew פַּתְבָּגָם refers to the specially assigned royal food.
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'pulse.' The Hebrew זֵרְעֹנִים refers to food from plants or seeds, likely vegetables and legumes.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמֶּלְצַר
  chosen: the steward
  alternatives:
  - the overseer
  - the attendant
  lexicon: HALOT
  rationale: מֶלְצַר refers to the official assigned over the youths' provisions in this context. 'Steward' fits the role of one managing food and drink better than a mere 'servant' or overly technical transliteration.
- source_word: נֹשֵׂא
  chosen: kept taking away
  alternatives:
  - was carrying away
  - took away
  lexicon: HALOT
  rationale: The participle with וַיְהִי gives an ongoing or customary sense in narrative. 'Kept taking away' conveys repeated action more naturally in English than a simple past.
- source_word: פַּתְבָּגָם
  chosen: their choice food
  alternatives:
  - their portion of the king's delicacies
  - their rich food
  lexicon: HALOT
  rationale: This loanword denotes the allotted royal food/delicacies. 'Choice food' is concise, natural English and preserves the sense of specially selected rich provisions without overloading the line.
- source_word: יֵין מִשְׁתֵּיהֶם
  chosen: the wine they were to drink
  alternatives:
  - their drinking wine
  - the wine of their drink
  lexicon: HALOT
  rationale: The construct phrase refers to the wine assigned for their drinking. 'The wine they were to drink' expresses the idiom clearly in modern English.
- source_word: וְנֹתֵן
  chosen: and kept giving
  alternatives:
  - and was giving
  - and gave
  lexicon: HALOT
  rationale: Like נֹשֵׂא, the participle indicates ongoing customary action. 'Kept giving' matches the iterative sense in context.
- source_word: זֵרְעֹנִים
  chosen: vegetables
  alternatives:
  - pulse
  - seed-foods
  - plant food
  lexicon: HALOT
  rationale: The term denotes food grown from seeds, i.e., vegetables/legumes. 'Vegetables' is the clearest contemporary rendering; 'pulse' is traditional but archaic, while 'seed-foods' is too wooden.
