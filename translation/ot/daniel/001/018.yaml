id: DAN.1.18
reference: Daniel 1:18
source:
  edition: WLC
  text: וּ/לְ/מִ/קְצָת֙ הַ/יָּמִ֔ים אֲשֶׁר אָמַ֥ר הַ/מֶּ֖לֶךְ לַ/הֲבִיאָ֑/ם וַ/יְבִיאֵ/ם֙
    שַׂ֣ר הַ/סָּרִיסִ֔ים לִ/פְנֵ֖י נְבֻכַדְנֶצַּֽר־׃
translation:
  text: And at the end of the days that the king had said to bring them in, the chief
    of the eunuchs brought them before Nebuchadnezzar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the chief official' / 'the commander of the court officials.' The Hebrew
      term can denote a eunuch or, more broadly, a royal court officer.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְמִקְצָת הַיָּמִים
  chosen: And at the end of the days
  alternatives:
  - And at the end of the time
  - And after the days
  lexicon: HALOT
  rationale: מִקְצָת with הַיָּמִים denotes the end/termination of a specified period.
    'At the end of the days' stays close to the Hebrew while remaining intelligible;
    'time' is possible but less concrete than the plural 'days' in the source.
- source_word: אֲשֶׁר אָמַר הַמֶּלֶךְ
  chosen: that the king had said
  alternatives:
  - which the king had appointed
  - that the king had ordered
  lexicon: HALOT
  rationale: אָמַר is the common verb 'say.' In context it refers to the king's prior
    directive, so English past perfect 'had said' best reflects sequence without over-interpreting
    as a formal appointment.
- source_word: לַהֲבִיאָם
  chosen: to bring them in
  alternatives:
  - to present them
  - to bring them
  lexicon: HALOT
  rationale: The Hiphil of בוא means 'cause to come/bring.' 'Bring them in' captures
    both the causative sense and the court setting. 'Present them' is contextually
    plausible but slightly more interpretive.
- source_word: וַיְבִיאֵם
  chosen: brought them
  alternatives:
  - presented them
  - brought them in
  lexicon: HALOT
  rationale: Again from בוא in Hiphil, narrating the official action. 'Brought them'
    is the straightforward rendering; the destination is supplied by the following
    phrase 'before Nebuchadnezzar.'
- source_word: שַׂר הַסָּרִיסִים
  chosen: the chief of the eunuchs
  alternatives:
  - the chief official
  - the commander of the court officials
  lexicon: HALOT
  rationale: סָרִיס often means 'eunuch,' especially in royal court contexts, though
    it can extend to court officials. Since the Hebrew expression is explicit and
    traditional court terminology is in view, 'chief of the eunuchs' is preferred,
    with the broader official sense preserved as an alternative.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - into the presence of
  lexicon: HALOT
  rationale: לִפְנֵי commonly means 'before' in the sense of appearing in someone's
    presence. 'Before' is concise and natural English.
- source_word: נְבֻכַדְנֶצַּר
  chosen: Nebuchadnezzar
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
