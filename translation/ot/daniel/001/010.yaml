id: DAN.1.10
reference: Daniel 1:10
source:
  edition: WLC
  text: וַ/יֹּ֜אמֶר שַׂ֤ר הַ/סָּרִיסִים֙ לְ/דָ֣נִיֵּ֔אל יָרֵ֤א אֲנִי֙ אֶת אֲדֹנִ֣/י הַ/מֶּ֔לֶךְ אֲשֶׁ֣ר מִנָּ֔ה אֶת מַאֲכַלְ/כֶ֖ם וְ/אֶת מִשְׁתֵּי/כֶ֑ם אֲשֶׁ֡ר לָ/מָּה֩ יִרְאֶ֨ה אֶת פְּנֵי/כֶ֜ם זֹֽעֲפִ֗ים מִן הַ/יְלָדִים֙ אֲשֶׁ֣ר כְּ/גִֽילְ/כֶ֔ם וְ/חִיַּבְתֶּ֥ם אֶת רֹאשִׁ֖/י לַ/מֶּֽלֶךְ־־־־־־׃
translation:
  text: But the chief of the eunuchs said to Daniel[a], “I fear my lord the king, who assigned your food and your drink[c][b]. Why should he see your faces looking worse than the youths who are of your own age? Then you would endanger my head with the king.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the chief official.' The Hebrew term for 'eunuchs' can also refer more broadly to royal court officials.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'your faces gloomy' or 'troubled.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'you would make my head liable to the king,' an idiom meaning to put his life in danger before the king.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׂר הַסָּרִיסִים
  chosen: the chief of the eunuchs
  alternatives:
  - the commander of the officials
  - the chief official
  lexicon: HALOT
  rationale: שַׂר is a leader/chief, and סָרִיס commonly denotes a eunuch or court official. In Daniel's Babylonian court setting, 'chief of the eunuchs' is the most direct rendering of the Hebrew expression, while alternatives reflect the broader semantic range of סָרִיס.
- source_word: יָרֵא אֲנִי
  chosen: I fear
  alternatives:
  - I am afraid of
  lexicon: HALOT
  rationale: The participial construction expresses present apprehension. 'I fear' is concise and close to the Hebrew, while naturally conveying ongoing concern.
- source_word: אֶת אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  lexicon: HALOT
  rationale: אֲדֹנִי is a respectful title meaning 'my lord' or 'my master.' 'My lord the king' preserves the courtly register and direct address relationship.
- source_word: מִנָּה
  chosen: assigned
  alternatives:
  - appointed
  - allotted
  - determined
  lexicon: HALOT
  rationale: The verb refers to setting or appointing something for someone. 'Assigned' fits the context of the king designating provisions.
- source_word: מַאֲכַלְכֶם
  chosen: your food
  alternatives:
  - your portion of food
  lexicon: HALOT
  rationale: The noun denotes food/eating provision. 'Your food' is natural English and sufficient in context.
- source_word: מִשְׁתֵּיכֶם
  chosen: your drink
  alternatives:
  - your wine
  - your beverages
  lexicon: HALOT
  rationale: The noun can refer to drinking or drink provision, sometimes specifically a drinking feast. Here it refers to what they are given to drink. 'Your drink' is broad enough without over-specifying wine, which the Hebrew term itself does not require in this verse.
- source_word: לָמָּה יִרְאֶה
  chosen: Why should he see
  alternatives:
  - Why would he see
  lexicon: HALOT
  rationale: The interrogative plus imperfect expresses anticipated consequence. 'Why should he see' captures the rhetorical concern.
- source_word: פְּנֵיכֶם זֹעֲפִים
  chosen: your faces looking worse
  alternatives:
  - your faces downcast
  - your faces troubled
  - your faces gloomy
  lexicon: HALOT
  rationale: Literally the phrase speaks of faces being troubled/gloomy. In context the concern is visible poor condition compared with the others. 'Looking worse' brings out the practical sense in idiomatic English while remaining tied to appearance.
- source_word: מִן הַיְלָדִים
  chosen: than the youths
  alternatives:
  - than the young men
  - than the boys
  lexicon: HALOT
  rationale: יְלָדִים can denote youths/young men in this court-training context. 'Youths' fits the age and setting better than 'boys.'
- source_word: אֲשֶׁר כְּגִילְכֶם
  chosen: who are of your own age
  alternatives:
  - who are your age
  - who are of the same age as you
  lexicon: HALOT
  rationale: The phrase compares them with others in the same age group. 'Of your own age' is natural and precise.
- source_word: וְחִיַּבְתֶּם
  chosen: Then you would endanger
  alternatives:
  - and you would make liable
  - and you would forfeit
  - and you would bring guilt upon
  lexicon: HALOT
  rationale: The verb carries the sense of making someone liable or bringing danger/guilt upon them. In context the official fears for his life if the king notices their poor condition. 'Endanger' communicates the practical force clearly.
- source_word: אֶת רֹאשִׁי לַמֶּלֶךְ
  chosen: my head with the king
  alternatives:
  - my head to the king
  - my life before the king
  lexicon: HALOT
  rationale: '''My head'' is a Hebrew idiom for one''s life in a context of capital accountability. Retaining ''my head'' preserves the vividness of the source, while ''with the king'' conveys accountability before him.'
