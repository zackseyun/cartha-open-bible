id: EZR.4.19
reference: Ezra 4:19
source:
  edition: WLC
  text: וּ/מִנִּ/י֮ שִׂ֣ים טְעֵם֒ וּ/בַקַּ֣רוּ וְ/הַשְׁכַּ֔חוּ דִּ֚י קִרְיְתָ֣/א דָ֔ךְ
    מִן יוֹמָת֙ עָֽלְמָ֔/א עַל מַלְכִ֖ין מִֽתְנַשְּׂאָ֑ה וּ/מְרַ֥ד וְ/אֶשְׁתַּדּ֖וּר
    מִתְעֲבֶד בַּֽ/הּ־־־׃
translation:
  text: And a decree was issued by me, and they searched and found that this city
    has from ancient days risen up against kings, and rebellion and sedition have
    been carried out in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has exalted itself against kings.' The Aramaic verb can suggest self-exaltation,
      but in this context it carries the sense of rising up in opposition.
    reason: lexical_alternative
  - marker: b
    text: Or 'rebellion and insurrection have been done in it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂים טְעֵם
  chosen: a decree was issued
  alternatives:
  - an order was made
  - a command was given
  lexicon: HALOT
  rationale: Aramaic idiom literally 'set a decree.' Passive English captures the
    official administrative sense naturally while preserving that the speaker is the
    authority behind it ('by me').
- source_word: וּמִנִּי
  chosen: by me
  alternatives:
  - from me
  lexicon: HALOT
  rationale: Marks the decree as proceeding from the king. 'By me' fits the passive
    construction in English better than the more literal 'from me.'
- source_word: וּבַקַּרוּ
  chosen: they searched
  alternatives:
  - they investigated
  - they examined
  lexicon: HALOT
  rationale: Refers to an official inquiry into records. 'Searched' is straightforward
    and pairs well with the following verb 'found.'
- source_word: וְהַשְׁכַּחוּ
  chosen: found
  alternatives:
  - discovered
  lexicon: HALOT
  rationale: In context of archival investigation, 'found' is the natural English
    equivalent and preserves the result of the search.
- source_word: קִרְיְתָא דָךְ
  chosen: this city
  alternatives:
  - that city
  lexicon: HALOT
  rationale: The demonstrative points to the city under discussion. 'This city' reflects
    the deictic force in the royal letter.
- source_word: מִן יוֹמָת עָלְמָא
  chosen: from ancient days
  alternatives:
  - from days of old
  - from long ago
  lexicon: HALOT
  rationale: Idiomatic Aramaic expression for antiquity. 'From ancient days' is readable
    modern English while retaining the historical depth.
- source_word: עַל מַלְכִין מִתְנַשְּׂאָה
  chosen: has ... risen up against kings
  alternatives:
  - has exalted itself against kings
  - has rebelled against kings
  lexicon: HALOT
  rationale: The reflexive form of נשׂא conveys self-exaltation or rising up. In this
    political context, 'risen up against kings' preserves both the hostile and insubordinate
    sense without collapsing it into the next explicit noun 'rebellion.'
- source_word: וּמְרַד
  chosen: rebellion
  alternatives:
  - revolt
  lexicon: HALOT
  rationale: Standard political term for insurrection against royal authority.
- source_word: וְאֶשְׁתַּדּוּר
  chosen: sedition
  alternatives:
  - insurrection
  - treachery
  lexicon: HALOT
  rationale: Distinct from the previous term yet overlapping in semantic field. 'Sedition'
    preserves the political-legal nuance of subversive disorder without making it
    identical to 'rebellion.'
- source_word: מִתְעֲבֶד בַּהּ
  chosen: have been carried out in it
  alternatives:
  - have been done in it
  - have occurred in it
  lexicon: HALOT
  rationale: Passive/impersonal verbal sense indicating such acts were practiced within
    the city. 'Carried out' fits the context of repeated political acts.
