id: EZR.4.7
reference: Ezra 4:7
source:
  edition: WLC
  text: וּ/בִ/ימֵ֣י אַרְתַּחְשַׁ֗שְׂתָּא כָּתַ֨ב בִּשְׁלָ֜ם מִתְרְדָ֤ת טָֽבְאֵל֙ וּ/שְׁאָ֣ר כנות/ו עַל ארתחששתא מֶ֣לֶךְ פָּרָ֑ס וּ/כְתָב֙ הַֽ/נִּשְׁתְּוָ֔ן כָּת֥וּב אֲרָמִ֖ית וּ/מְתֻרְגָּ֥ם אֲרָמִֽית־׃פ
translation:
  text: And in the days of Artaxerxes[a], Bishlam, Mithredath, Tabeel, and the rest of his associates wrote to Artaxerxes king of Persia[b]. The text of the letter was written in Aramaic and translated from Aramaic.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The document was written in the Aramaic script and translated into Aramaic.' The Hebrew/Aramaic wording is difficult, and interpreters differ on whether the distinction is between script and language or between writing and translation.
    reason: lexical_alternative
  - marker: b
    text: Or 'and the rest of their associates.' The suffix in 'his associates' is singular in form, but the group reference may be collective.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִימֵי
  chosen: And in the days of
  alternatives:
  - And during the reign of
  - Now in the days of
  lexicon: HALOT
  rationale: Temporal idiom literally means 'and in the days of.' This is natural in English and preserves the narrative linkage without over-interpreting it as a technical regnal formula.
- source_word: אַרְתַּחְשַׁשְׂתָּא
  chosen: Artaxerxes
  lexicon: HALOT
  rationale: Standard English transliteration of the royal name, following the translation philosophy to transliterate personal names.
- source_word: כָּתַב
  chosen: wrote
  alternatives:
  - sent a written accusation
  - wrote a letter
  lexicon: HALOT
  rationale: The verb simply means 'wrote.' Although the object is implied by context, the verse itself does not specify 'accusation' here, so a minimal rendering avoids importing detail from surrounding verses.
- source_word: בִּשְׁלָם מִתְרְדָת טָבְאֵל
  chosen: Bishlam, Mithredath, Tabeel
  lexicon: HALOT
  rationale: These are personal names and are therefore transliterated.
- source_word: וּשְׁאָר כנותו
  chosen: and the rest of his associates
  alternatives:
  - and the rest of his companions
  - and the rest of their colleagues
  lexicon: HALOT
  rationale: שְׁאָר means 'rest/remainder.' The difficult noun כנותו is commonly understood as 'companions/associates/colleagues.' 'Associates' is clear modern English. The 3ms suffix is retained as 'his,' though the referent may function collectively.
- source_word: עַל
  chosen: to
  alternatives:
  - against
  - concerning
  lexicon: HALOT
  rationale: Although the preposition often means 'on/upon/against,' with כתב in this administrative context it idiomatically introduces the recipient or target of the writing. 'To' best fits the English syntax here without forcing an adversarial nuance into this verse alone.
- source_word: מֶלֶךְ פָּרָס
  chosen: king of Persia
  alternatives:
  - the king of Persia
  lexicon: HALOT
  rationale: Appositional royal title identifying Artaxerxes. The anarthrous English apposition 'Artaxerxes king of Persia' is acceptable and close to the Hebrew style.
- source_word: וּכְתָב הַנִּשְׁתְּוָן
  chosen: The text of the letter
  alternatives:
  - The document
  - The copy of the letter
  lexicon: HALOT
  rationale: כְתָב is 'writing/text/document.' The rare loanword נִּשְׁתְּוָן refers to a written document, often understood as a letter or copy. 'The text of the letter' communicates that what follows concerns the written communication itself.
- source_word: כָּתוּב אֲרָמִית
  chosen: was written in Aramaic
  alternatives:
  - was written in the Aramaic script
  - was written in Aramaic language
  lexicon: HALOT
  rationale: The phrase most naturally indicates the language of composition. Some take it as referring to script, but 'in Aramaic' is the broadest and most readable rendering.
- source_word: וּמְתֻרְגָּם אֲרָמִית
  chosen: and translated in Aramaic
  alternatives:
  - and interpreted in Aramaic
  - and set forth in Aramaic
  lexicon: HALOT
  rationale: The passive participle from the root behind 'translate/interpret' is difficult because Aramaic appears again as the complement. A formally close rendering preserves the wording without over-resolving whether the distinction is between script and language or between composition and interpretation.
