id: EZR.4.6
reference: Ezra 4:6
source:
  edition: WLC
  text: וּ/בְ/מַלְכוּת֙ אֲחַשְׁוֵר֔וֹשׁ בִּ/תְחִלַּ֖ת מַלְכוּת֑/וֹ כָּתְב֣וּ שִׂטְנָ֔ה
    עַל יֹשְׁבֵ֥י יְהוּדָ֖ה וִ/ירוּשָׁלִָֽם־׃ס
translation:
  text: And in the reign of Ahasuerus, at the beginning of his reign, they wrote an
    accusation against the inhabitants of Judah and Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a complaint' or 'a hostile accusation.' The Hebrew term carries the
      sense of opposition expressed in a formal charge.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/מַלְכוּת
  chosen: And in the reign of
  alternatives:
  - And during the reign of
  - Now in the kingdom of
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition with מַלְכוּת introduce a temporal
    setting. 'In the reign of' is idiomatic English for the period of a king's rule
    and preserves the formal sense better than the less natural 'in the kingdom of.'
- source_word: אֲחַשְׁוֵרוֹשׁ
  chosen: Ahasuerus
  alternatives:
  - Xerxes
  lexicon: HALOT
  rationale: Personal names are transliterated by project policy. Although historically
    identified by many with Xerxes, the Hebrew form is retained as 'Ahasuerus.'
- source_word: בִּ/תְחִלַּת מַלְכוּתוֹ
  chosen: at the beginning of his reign
  alternatives:
  - in the beginning of his reign
  - at the start of his kingship
  lexicon: HALOT
  rationale: The construct phrase denotes the initial period of his rule. 'At the
    beginning of his reign' is natural modern English and accurately reflects the
    temporal nuance.
- source_word: כָּתְבוּ
  chosen: they wrote
  alternatives:
  - they sent in writing
  - they composed
  lexicon: HALOT
  rationale: The verb simply means 'wrote.' The subject is left indefinite in Hebrew,
    and English preserves that with 'they.'
- source_word: שִׂטְנָה
  chosen: an accusation
  alternatives:
  - a complaint
  - an adversarial letter
  - hostility
  lexicon: HALOT
  rationale: The noun refers to an accusation or written charge in a hostile/legal
    sense. 'An accusation' best captures the concrete act of writing against someone
    in this administrative context without overinterpreting the exact genre of the
    document.
- source_word: עַל
  chosen: against
  alternatives:
  - concerning
  - about
  lexicon: HALOT
  rationale: In context with 'wrote an accusation,' the preposition marks the target
    of the hostile writing; 'against' is the clearest English equivalent.
- source_word: יֹשְׁבֵי יְהוּדָה וִירוּשָׁלִָם
  chosen: the inhabitants of Judah and Jerusalem
  alternatives:
  - those dwelling in Judah and Jerusalem
  - the residents of Judah and Jerusalem
  lexicon: HALOT
  rationale: The participle 'those dwelling' functions substantivally. 'Inhabitants'
    is concise, natural, and preserves the reference to the people living in both
    Judah and Jerusalem.
