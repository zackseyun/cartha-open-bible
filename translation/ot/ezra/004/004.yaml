id: EZR.4.4
reference: Ezra 4:4
source:
  edition: WLC
  text: וַ/יְהִי֙ עַם הָ/אָ֔רֶץ מְרַפִּ֖ים יְדֵ֣י עַם יְהוּדָ֑ה ו/מבלהים אוֹתָ֖/ם לִ/בְנֽוֹת־־׃
translation:
  text: Then the people of the land kept weakening the hands of the people of Judah and frightening them from building[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''weakening the hands of,'' an idiom for discouraging or undermining resolve.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and making them afraid to build.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: Then
  alternatives:
  - And it came to pass
  - So
  lexicon: HALOT
  rationale: The waw-consecutive introduces the next event in the narrative. Rendering it as 'Then' preserves narrative flow in natural modern English without the archaic 'and it came to pass.'
- source_word: עַם הָאָרֶץ
  chosen: the people of the land
  alternatives:
  - the people of the country
  - the local population
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew expression and its contextual sense of the surrounding inhabitants opposed to the returnees. 'People of the land' is also a recognizable biblical phrase in Ezra.
- source_word: מְרַפִּים יְדֵי
  chosen: kept weakening the hands of
  alternatives:
  - discouraging
  - making the hands slack of
  lexicon: HALOT
  rationale: The idiom literally refers to weakening the hands, meaning to sap strength or resolve. The translation keeps the Hebrew image while making the verbal force clear with 'kept weakening.'
- source_word: עַם יְהוּדָה
  chosen: the people of Judah
  alternatives:
  - the people of Yehudah
  - Judah's people
  lexicon: HALOT
  rationale: This is the straightforward sense of the construct phrase, referring to the Judean community engaged in rebuilding.
- source_word: וּמְבַלְהִים
  chosen: and frightening
  alternatives:
  - and terrifying
  - and troubling
  - and making afraid
  lexicon: HALOT
  rationale: The participle from בהל conveys causing alarm or panic. 'Frightening' is natural English and fits the parallel with weakening their hands.
- source_word: אוֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct object pronoun referring back to the people of Judah.
- source_word: לִבְנוֹת
  chosen: from building
  alternatives:
  - to keep them from building
  - to build
  lexicon: HALOT
  rationale: The infinitive with ל here expresses the activity they were being deterred from. In English, 'frightening them from building' best captures the hostile prevention implied by the context; a more wooden 'frightening them to build' would be misleading.
