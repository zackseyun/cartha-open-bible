id: EZR.4.11
reference: Ezra 4:11
source:
  edition: WLC
  text: דְּנָה֙ פַּרְשֶׁ֣גֶן אִגַּרְתָּ֔/א דִּ֚י שְׁלַ֣חוּ עֲל֔וֹ/הִי עַל אַרְתַּחְשַׁ֖שְׂתְּא מַלְכָּ֑/א עַבְדָ֛י/ךְ אֱנָ֥שׁ עֲבַֽר נַהֲרָ֖/ה וּ/כְעֶֽנֶת־־׃פ
translation:
  text: 'This is a copy of the letter that they sent to King Artaxerxes: “Your servants[a], the men of Beyond the River[b], and now—”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from Beyond the River”; the phrase is the Persian provincial designation often rendered “Trans-Euphrates.”
    reason: lexical_alternative
  - marker: b
    text: The Aramaic expression at the end is a formal epistolary formula, traditionally rendered “and at such a time” or understood as “and so forth.” The text continues in the next verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּנָה
  chosen: This is
  alternatives:
  - This
  - Here is
  lexicon: HALOT
  rationale: Aramaic demonstrative introducing the document citation. Rendering as 'This is' gives natural English while preserving the presentational force.
- source_word: פַּרְשֶׁגֶן
  chosen: copy
  alternatives:
  - text
  - transcript
  lexicon: HALOT
  rationale: Refers to a copy or transcript of an official document. 'Copy' is the clearest modern English equivalent.
- source_word: אִגַּרְתָּא
  chosen: of the letter
  alternatives:
  - of the document
  - of the epistle
  lexicon: HALOT
  rationale: Official written communication; 'letter' is the standard and most natural rendering in this administrative context.
- source_word: דִּי
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Relative particle linking 'letter' with the clause that follows.
- source_word: שְׁלַחוּ
  chosen: they sent
  alternatives:
  - they dispatched
  lexicon: HALOT
  rationale: Simple verbal form for sending a document; 'sent' is idiomatic and sufficient.
- source_word: עֲלוֹהִי
  chosen: to him
  alternatives:
  - against him
  lexicon: HALOT
  rationale: 'With the following specification ''to King Artaxerxes,'' the sense is directional rather than adversative here: the letter was sent to him, namely to the king.'
- source_word: עַל
  chosen: to
  alternatives:
  - concerning
  - against
  lexicon: HALOT
  rationale: In this epistolary formula, the preposition introduces the recipient, not the subject matter. English 'to' best conveys the function in context.
- source_word: אַרְתַּחְשַׁשְׂתְּא
  chosen: Artaxerxes
  lexicon: HALOT
  rationale: Standard English transliteration of the royal name, following the translation philosophy to transliterate personal names.
- source_word: מַלְכָּא
  chosen: King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: Appositional royal title attached to the proper name. English idiom prefers 'King Artaxerxes'.
- source_word: עַבְדָיךְ
  chosen: Your servants
  alternatives:
  - your officials
  lexicon: HALOT
  rationale: Formal self-designation of subordinates addressing the king. 'Your servants' preserves the deferential court language better than the more interpretive 'officials.'
- source_word: אֱנָשׁ
  chosen: the men
  alternatives:
  - the people
  - the menfolk
  lexicon: HALOT
  rationale: The noun is masculine singular used collectively. 'The men' is gender-accurate and reflects the source wording; broader 'people' would smooth away the lexical form.
- source_word: עֲבַר נַהֲרָה
  chosen: of Beyond the River
  alternatives:
  - from Beyond the River
  - from Trans-Euphrates
  lexicon: HALOT
  rationale: Administrative-geographical designation for the province west of the Euphrates. 'Beyond the River' preserves the literal expression and known Persian provincial terminology.
- source_word: וּכְעֶנֶת
  chosen: and now—
  alternatives:
  - and at such a time
  - and so forth
  lexicon: HALOT
  rationale: A conventional Aramaic epistolary ending/opening formula here left hanging because the verse ends mid-document citation. 'And now—' preserves the incomplete transition into the next verse better than supplying a fuller sense not yet stated.
