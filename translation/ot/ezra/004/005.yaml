id: EZR.4.5
reference: Ezra 4:5
source:
  edition: WLC
  text: וְ/סֹכְרִ֧ים עֲלֵי/הֶ֛ם יוֹעֲצִ֖ים לְ/הָפֵ֣ר עֲצָתָ֑/ם כָּל יְמֵ֗י כּ֚וֹרֶשׁ
    מֶ֣לֶךְ פָּרַ֔ס וְ/עַד מַלְכ֖וּת דָּרְיָ֥וֶשׁ מֶֽלֶךְ פָּרָֽס־־־׃
translation:
  text: And they hired counselors against them to frustrate their plan all the days
    of Cyrus king of Persia, even until the reign of Darius king of Persia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to thwart their counsel.' The Hebrew עֲצָה can mean 'counsel,' 'plan,'
      or 'purpose.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסֹכְרִים
  chosen: they hired
  alternatives:
  - they bribed
  - they retained
  lexicon: HALOT
  rationale: The participle from שׂכר in this context denotes paying for services.
    'Hired' is the most natural modern English rendering and fits the object 'counselors.'
    'Bribed' is possible in some contexts but is too specific here, since the text
    states the purpose was to employ advisers against Judah rather than explicitly
    to corrupt officials.
- source_word: עֲלֵיהֶם
  chosen: against them
  alternatives:
  - concerning them
  - over them
  lexicon: HALOT
  rationale: With hostile context and the following infinitive of thwarting, עַל clearly
    carries adversative force here.
- source_word: יוֹעֲצִים
  chosen: counselors
  alternatives:
  - advisers
  lexicon: HALOT
  rationale: The noun/participle from יעץ refers to those who give counsel. 'Counselors'
    preserves the formal sense and suits the administrative-political setting.
- source_word: לְהָפֵר
  chosen: to frustrate
  alternatives:
  - to thwart
  - to nullify
  - to break
  lexicon: HALOT
  rationale: הפר often means to break, annul, or frustrate. Here the object is 'their
    plan/counsel,' so 'frustrate' communicates the intended obstruction in idiomatic
    English.
- source_word: עֲצָתָם
  chosen: their plan
  alternatives:
  - their counsel
  - their purpose
  lexicon: HALOT
  rationale: עֵצָה can mean counsel, plan, or purpose. In context of opposition to
    rebuilding, 'plan' is clearer for modern readers while still faithful to the Hebrew.
- source_word: כָּל יְמֵי
  chosen: all the days of
  alternatives:
  - throughout the days of
  - all during the time of
  lexicon: HALOT
  rationale: This is a standard temporal expression. 'All the days of' is transparent
    and formally close.
- source_word: כּוֹרֶשׁ מֶלֶךְ פָּרַס
  chosen: Cyrus king of Persia
  alternatives:
  - Cyrus, king of Persia
  lexicon: HALOT
  rationale: Personal name is transliterated; royal title is translated. This follows
    the project's name/title policy.
- source_word: וְעַד
  chosen: even until
  alternatives:
  - and until
  - until
  lexicon: HALOT
  rationale: The conjunction plus preposition marks continuation from Cyrus's days
    up to Darius's reign. 'Even until' makes the extent of the period explicit in
    natural English.
- source_word: מַלְכוּת
  chosen: the reign
  alternatives:
  - the kingdom
  - the kingship
  lexicon: HALOT
  rationale: In this temporal construction, מַלְכוּת refers to the period of royal
    rule rather than the realm itself. 'Reign' is the idiomatic English equivalent.
- source_word: דָּרְיָוֶשׁ מֶלֶךְ פָּרָס
  chosen: Darius king of Persia
  alternatives:
  - Darius, king of Persia
  lexicon: HALOT
  rationale: As with Cyrus, the name is transliterated and the title translated.
