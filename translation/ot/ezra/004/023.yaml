id: EZR.4.23
reference: Ezra 4:23
source:
  edition: WLC
  text: אֱדַ֗יִן מִן דִּ֞י פַּרְשֶׁ֤גֶן נִשְׁתְּוָנָ/א֙ דִּ֚י ארתחששתא מַלְכָּ֔/א
    קֱרִ֧י קֳדָם רְח֛וּם וְ/שִׁמְשַׁ֥י סָפְרָ֖/א וּ/כְנָוָתְ/ה֑וֹן אֲזַ֨לוּ בִ/בְהִיל֤וּ
    לִ/ירֽוּשְׁלֶם֙ עַל יְה֣וּדָיֵ֔/א וּ/בַטִּ֥לוּ הִמּ֖וֹ בְּ/אֶדְרָ֥ע וְ/חָֽיִל־־־׃ס
translation:
  text: Then, as soon as the copy of the letter of King Artaxerxes was read before
    Rehum and Shimshai the scribe and their associates, they went in haste to Jerusalem,
    to the Jews, and made them stop by force and power.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went up against the Jews'; the Aramaic preposition can carry a hostile
      sense, which is reflected by the following action of stopping the work.
    reason: lexical_alternative
  - marker: b
    text: Or 'stopped them with force and strength.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse adverb marking the next event in sequence; 'Then' is
    natural modern English and preserves narrative flow.
- source_word: פַּרְשֶׁגֶן נִשְׁתְּוָנָא
  chosen: the copy of the letter
  alternatives:
  - the text of the document
  - the copy of the official letter
  lexicon: HALOT
  rationale: פַּרְשֶׁגֶן denotes a copy/transcript; נִשְׁתְּוָנָא is an official written
    communication or letter. The construct sense is best represented as 'the copy
    of the letter.'
- source_word: קֱרִי קֳדָם
  chosen: was read before
  alternatives:
  - was proclaimed before
  - was read in the presence of
  lexicon: HALOT
  rationale: 'Passive-like sense in context: once the document had been read in the
    presence of the officials. ''Before'' is idiomatic for קֳדָם here.'
- source_word: רְחוּם וְשִׁמְשַׁי סָפְרָא וּכְנָוָתְהוֹן
  chosen: Rehum and Shimshai the scribe and their associates
  alternatives:
  - Rehum, Shimshai the secretary, and their companions
  lexicon: HALOT
  rationale: Personal names are transliterated. סָפְרָא can mean scribe/secretary;
    'scribe' is retained as a transparent title. כְנָוָתְהוֹן refers to their colleagues/associates.
- source_word: אֲזַלוּ בִבְהִילוּ
  chosen: they went in haste
  alternatives:
  - they hurried
  - they went quickly
  lexicon: HALOT
  rationale: Verb plus abstract noun intensifies speed/urgency. 'Went in haste' preserves
    both motion and urgency without over-paraphrase.
- source_word: עַל יְהוּדָיֵא
  chosen: to the Jews
  alternatives:
  - against the Jews
  - upon the Jews
  lexicon: HALOT
  rationale: The preposition עַל can indicate hostile movement against someone, but
    in English after a motion verb here 'to the Jews' reads naturally, with the hostile
    action clarified by the following verb. The adversative nuance is preserved by
    context.
- source_word: וּבַטִּלוּ הִמּוֹ
  chosen: made them stop
  alternatives:
  - stopped them
  - caused them to cease
  lexicon: HALOT
  rationale: 'The causative sense is explicit: they caused the Jews'' work to cease.
    ''Made them stop'' is clear modern English and preserves the causative force.'
- source_word: בְּאֶדְרָע וְחָיִל
  chosen: by force and power
  alternatives:
  - with force and strength
  - by arm and force
  lexicon: HALOT
  rationale: This idiom expresses coercive compulsion. 'By force and power' is concise
    and natural, preserving the sense of imposed might rather than lawful persuasion.
