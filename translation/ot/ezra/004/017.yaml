id: EZR.4.17
reference: Ezra 4:17
source:
  edition: WLC
  text: פִּתְגָמָ֞/א שְׁלַ֣ח מַלְכָּ֗/א עַל רְח֤וּם בְּעֵל טְעֵם֙ וְ/שִׁמְשַׁ֣י סָֽפְרָ֔/א וּ/שְׁאָר֙ כְּנָוָ֣תְ/ה֔וֹן דִּ֥י יָתְבִ֖ין בְּ/שָֽׁמְרָ֑יִן וּ/שְׁאָ֧ר עֲבַֽר נַהֲרָ֛/ה שְׁלָ֖ם וּ/כְעֶֽת־־־׃ס
translation:
  text: 'The king sent a reply to Rehum the commander[a], Shimshai the scribe, and the rest of their associates who live in Samaria, and the rest beyond the River: Peace[c][b]. And now—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aramaic 'Beyond the River' refers to the Persian administrative region west of the Euphrates.
    reason: cultural_note
  - marker: b
    text: Or 'Greetings' for 'Peace.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the chancellor' for 'the commander.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּתְגָמָא
  chosen: a reply
  alternatives:
  - a decree
  - a message
  - an answer
  lexicon: HALOT
  rationale: In Imperial Aramaic context the term denotes an official word or written communication. Here, because it is explicitly something the king 'sent' in response to the previous letter, 'reply' best captures the responsive force in natural English without overstating it as a formal decree.
- source_word: שְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard rendering of the verb 'to send'; simple past fits the narrative style.
- source_word: מַלְכָּא
  chosen: the king
  lexicon: HALOT
  rationale: Definite form in context; refers to the Persian king already in view.
- source_word: עַל
  chosen: to
  alternatives:
  - concerning
  - against
  lexicon: HALOT
  rationale: Although literally 'upon/to,' in epistolary address after 'sent' it functions idiomatically for the recipient, so English 'to' is the clearest rendering.
- source_word: בְּעֵל טְעֵם
  chosen: the commander
  alternatives:
  - the chancellor
  - the official in charge
  - the governor
  lexicon: HALOT
  rationale: The phrase literally means something like 'master of counsel/discretion.' Traditional 'chancellor' is possible, but it is archaic and institutionally specific. 'Commander' reflects the likely administrative leadership role in readable modern English while avoiding overprecision.
- source_word: סָפְרָא
  chosen: the scribe
  alternatives:
  - the secretary
  lexicon: HALOT
  rationale: A standard administrative title. 'Scribe' preserves the official-literary role and is familiar in biblical English.
- source_word: שְׁאָר כְּנָוָתְהוֹן
  chosen: the rest of their associates
  alternatives:
  - the rest of their companions
  - the rest of their colleagues
  lexicon: HALOT
  rationale: The expression refers to those aligned with or belonging to the named officials. 'Associates' is natural modern English and broad enough for the administrative setting.
- source_word: דִּי יָתְבִין בְּשָׁמְרָיִן
  chosen: who live in Samaria
  alternatives:
  - who dwell in Samaria
  - who are settled in Samaria
  lexicon: HALOT
  rationale: The participial construction denotes residence. 'Live' is idiomatic modern English.
- source_word: וּשְׁאָר עֲבַר נַהֲרָה
  chosen: and the rest of the province Beyond the River
  alternatives:
  - and the rest beyond the River
  - and the rest of Trans-Euphrates
  lexicon: HALOT
  rationale: The phrase names the Persian satrapy/region west of the Euphrates. Rendering it as 'the province Beyond the River' preserves its administrative sense and the conventional proper-regional force. 'Trans-Euphrates' is informative but less transparent for general readers.
- source_word: שְׁלָם
  chosen: Peace
  alternatives:
  - Greetings
  - All peace
  lexicon: HALOT
  rationale: This is an epistolary salutation. 'Peace' preserves the lexical content more directly than the smoother but less literal 'Greetings.'
- source_word: וּכְעֶת
  chosen: And now—
  alternatives:
  - and now
  - and at such a time
  lexicon: HALOT
  rationale: This formula introduces the body of the royal reply. The dash reflects the fact that the thought continues into the next verse.
