id: EZR.4.22
reference: Ezra 4:22
source:
  edition: WLC
  text: וּ/זְהִירִ֥ין הֱו֛וֹ שָׁל֖וּ לְ/מֶעְבַּ֣ד עַל דְּנָ֑ה לְ/מָה֙ יִשְׂגֵּ֣א חֲבָלָ֔/א
    לְ/הַנְזָקַ֖ת מַלְכִֽין־׃ס
translation:
  text: And be careful not to neglect doing this. Why should the damage increase to
    the detriment of kings?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be warned not to be negligent in carrying this out.'
    reason: lexical_alternative
  - marker: b
    text: The plural 'kings' is retained from the Aramaic rather than simplified to
      'the king,' likely referring more broadly to the royal interest or dynasty.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּזְהִירִין
  chosen: be careful
  alternatives:
  - be warned
  - be diligent
  - take care
  lexicon: HALOT
  rationale: Aramaic adjective meaning cautious/watchful; with הֱו֛וֹ it forms an
    imperative-like expression. 'Be careful' is natural modern English and preserves
    the warning force.
- source_word: הֱו֛וֹ
  chosen: be
  alternatives:
  - become
  lexicon: HALOT
  rationale: Auxiliary verb with the adjective זְהִירִין, yielding 'be careful.'
- source_word: שָׁלוּ
  chosen: to neglect
  alternatives:
  - to be negligent
  - to err
  - to fail
  lexicon: HALOT
  rationale: In Imperial Aramaic this noun/adverbial form conveys negligence or slackness.
    In context the sense is a prohibition against letting the matter lapse; 'neglect'
    is concise and idiomatic.
- source_word: לְמֶעְבַּד
  chosen: doing
  alternatives:
  - to do
  - to carry out
  lexicon: HALOT
  rationale: 'Infinitive of עבַד, here complementing שָׁלוּ: ''to neglect doing/carrying
    out.'' ''Doing'' fits smooth English after ''neglect.'''
- source_word: עַל דְּנָה
  chosen: this
  alternatives:
  - in this matter
  - concerning this
  lexicon: HALOT
  rationale: Demonstrative phrase referring to the royal directive just given. 'This'
    is sufficient in English, with the object supplied by context.
- source_word: לְמָה
  chosen: Why should
  alternatives:
  - why
  - for what reason should
  lexicon: HALOT
  rationale: Introduces a rhetorical question. 'Why should' captures both interrogative
    and modal nuance in context.
- source_word: יִשְׂגֵּא
  chosen: increase
  alternatives:
  - grow great
  - be multiplied
  lexicon: HALOT
  rationale: Verb means to become great/increase. 'Increase' is idiomatic with 'damage'
    in English.
- source_word: חֲבָלָא
  chosen: the damage
  alternatives:
  - harm
  - loss
  - injury
  lexicon: HALOT
  rationale: Refers to harm or detriment resulting from disobedience/rebellion. 'Damage'
    works well with 'increase' and matches the administrative context.
- source_word: לְהַנְזָקַת
  chosen: to the detriment of
  alternatives:
  - to the injury of
  - for the damage of
  lexicon: HALOT
  rationale: Noun from נזק, denoting injury/damage, with prefixed ל indicating result
    or disadvantage. 'To the detriment of' is clear modern English.
- source_word: מַלְכִין
  chosen: kings
  alternatives:
  - the kings
  lexicon: HALOT
  rationale: Plural is explicit in the Aramaic. The plural likely refers generally
    to imperial rulers/the royal house, so 'kings' is retained rather than smoothing
    to singular.
