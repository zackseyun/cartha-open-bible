theological_decisions:
- issue: Religious claim of the settlers
  chosen_reading: Rendered their claim neutrally as 'we seek your God' and 'we have
    been sacrificing to him' without validating its sincerity or orthodoxy.
  alternative_readings:
  - we worship your God
  - we inquire of your God
  rationale: The verse reports the claim of the adversaries/surrounding peoples. The
    translation should not import a theological judgment into the wording itself;
    the narrative context supplies the tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
