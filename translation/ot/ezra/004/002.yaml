id: EZR.4.2
reference: Ezra 4:2
source:
  edition: WLC
  text: וַ/יִּגְּשׁ֨וּ אֶל זְרֻבָּבֶ֜ל וְ/אֶל רָאשֵׁ֣י הָֽ/אָב֗וֹת וַ/יֹּאמְר֤וּ לָ/הֶם֙
    נִבְנֶ֣ה עִמָּ/כֶ֔ם כִּ֣י כָ/כֶ֔ם נִדְר֖וֹשׁ לֵֽ/אלֹהֵי/כֶ֑ם ו/לא אֲנַ֣חְנוּ זֹבְחִ֗ים
    מִ/ימֵי֙ אֵסַ֤ר חַדֹּן֙ מֶ֣לֶךְ אַשּׁ֔וּר הַ/מַּעֲלֶ֥ה אֹתָ֖/נוּ פֹּֽה־־׀׃
translation:
  text: Then they approached Zerubbabel and the heads of the fathers’ houses and said
    to them, “Let us build with you, for like you we seek your God, and we have been
    sacrificing to him since the days of Esar-haddon king of Assyria, who brought
    us up here.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads 'and not we are sacrificing'; many understand this as a scribal
      form for 'and to him we are sacrificing' or otherwise take it idiomatically
      in a positive sense from the context.
    reason: textual_variant
  - marker: b
    text: Or 'we worship your God' / 'we inquire of your God.' The Hebrew verb 'seek'
      can carry religious overtones.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְּשׁוּ
  chosen: they approached
  alternatives:
  - they came near
  - they drew near
  lexicon: HALOT
  rationale: Narrative wayyiqtol of נגשׁ. 'Approached' is natural modern English and
    preserves the movement toward Zerubbabel and the leaders without overformal archaism.
- source_word: רָאשֵׁי הָאָבוֹת
  chosen: the heads of the fathers’ houses
  alternatives:
  - the family heads
  - the heads of the ancestral houses
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the social-kinship structure behind
    the Hebrew idiom. 'Family heads' is smoother but loses the explicit 'fathers'
    houses' terminology common in Ezra.
- source_word: נִבְנֶה עִמָּכֶם
  chosen: Let us build with you
  alternatives:
  - We will build with you
  - Let us help you build
  lexicon: HALOT
  rationale: First person plural imperfect used volitively in direct speech is well
    represented by 'Let us build with you.' This keeps the invitation/proposal nuance
    better than a simple future.
- source_word: כִּי כָכֶם
  chosen: for like you
  alternatives:
  - for as you do
  - because we are like you
  lexicon: HALOT
  rationale: The phrase introduces the claimed basis for cooperation. 'Like you' is
    concise and leaves the comparison to be completed by the following verb.
- source_word: נִדְרֹשׁ לֵאלֹהֵיכֶם
  chosen: we seek your God
  alternatives:
  - we worship your God
  - we inquire of your God
  lexicon: HALOT
  rationale: דרשׁ with ל can mean seek, consult, or worship in a religious sense.
    'Seek your God' preserves the Hebrew wording and its possible breadth better than
    the more interpretive 'worship.'
- source_word: וְלֹא אֲנַחְנוּ זֹבְחִים
  chosen: and we have been sacrificing to him
  alternatives:
  - and we too are sacrificing
  - and we sacrifice
  lexicon: HALOT
  rationale: The clause is textually difficult because of the written לא ('not') where
    context suggests an affirmative sense, often understood via the traditional reading
    לו ('to him'). The translation reflects the contextual sense of the speakers'
    claim while preserving the issue in a footnote.
- source_word: מִימֵי אֵסַר חַדֹּן
  chosen: since the days of Esar-haddon
  alternatives:
  - from the days of Esar-haddon
  lexicon: HALOT
  rationale: מִן with 'days' idiomatically marks time from a past period until the
    present. 'Since the days of' is idiomatic English.
- source_word: הַמַּעֲלֶה אֹתָנוּ פֹּה
  chosen: who brought us up here
  alternatives:
  - who caused us to come up here
  - who brought us here
  lexicon: HALOT
  rationale: The participle modifies Esar-haddon. 'Brought us up here' preserves the
    causative and the directional 'up' common in Hebrew movement language, while remaining
    readable.
