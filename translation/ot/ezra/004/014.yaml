id: EZR.4.14
reference: Ezra 4:14
source:
  edition: WLC
  text: כְּעַ֗ן כָּ/ל קֳבֵל֙ דִּֽי מְלַ֤ח הֵֽיכְלָ/א֙ מְלַ֔חְנָא וְ/עַרְוַ֣ת מַלְכָּ֔/א
    לָ֥א אֲֽרִֽיךְ לַ֖/נָא לְ/מֶֽחֱזֵ֑א עַ֨ל דְּנָ֔ה שְׁלַ֖חְנָא וְ/הוֹדַ֥עְנָא לְ/מַלְכָּֽ/א־־־׃
translation:
  text: Now because we eat the salt of the palace, and it is not fitting for us to
    witness the king’s dishonor, therefore we have sent and informed the king,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Aramaic: ''eat the salt of the palace,'' an idiom meaning to receive support
      from or be in service to the royal court.'
    reason: cultural_note
  - marker: b
    text: Literally, 'the king’s nakedness,' an idiom for the king’s dishonor, detriment,
      or injury.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּעַן כָּל־קֳבֵל דִּי
  chosen: Now because
  alternatives:
  - Therefore
  - Accordingly, because
  lexicon: HALOT
  rationale: This Aramaic discourse sequence introduces the grounds for the action
    being reported. 'Now because' preserves both the transitional force and the causal
    sense without sounding overly wooden.
- source_word: מְלַח הֵיכְלָא מְלַחְנָא
  chosen: we eat the salt of the palace
  alternatives:
  - we are salted with the salt of the palace
  - we receive support from the palace
  lexicon: HALOT
  rationale: Literally 'we have salted/eaten the salt of the palace,' an idiom for
    being maintained by or in the service of the royal court. The main text keeps
    the salt idiom because it is transparent enough in English and preserves the source
    texture; the more interpretive sense is preserved in a footnote.
- source_word: הֵיכְלָא
  chosen: the palace
  alternatives:
  - the temple
  - the court
  lexicon: HALOT
  rationale: In Imperial Aramaic this term can denote a palace or temple, but here
    the context is the Persian royal administration and the king's interests, so 'palace'
    is the best contextual rendering.
- source_word: וְעַרְוַת מַלְכָּא
  chosen: the king’s dishonor
  alternatives:
  - the king’s shame
  - damage to the king
  - the king’s nakedness
  lexicon: HALOT
  rationale: Literally 'the nakedness of the king,' an idiom for disgrace, injury,
    or detriment to the king's interests. 'Dishonor' captures the idiomatic sense
    while remaining broad enough to include political harm.
- source_word: לָא אֲרִיךְ לַנָא
  chosen: it is not fitting for us
  alternatives:
  - it is not proper for us
  - it is not right for us
  lexicon: HALOT
  rationale: The phrase expresses propriety or appropriateness rather than mere ability.
    'It is not fitting for us' is natural English and preserves the formal tone of
    the petition.
- source_word: לְמֶחֱזֵא
  chosen: to see
  alternatives:
  - to witness
  - to look upon
  lexicon: HALOT
  rationale: The infinitive is straightforwardly 'to see.' 'Witness' would be slightly
    more interpretive; the simpler rendering better matches the source.
- source_word: עַל־דְּנָה
  chosen: therefore
  alternatives:
  - for this reason
  - because of this
  lexicon: HALOT
  rationale: This phrase marks the consequence drawn from the preceding grounds. 'Therefore'
    gives a concise and idiomatic English transition.
- source_word: שְׁלַחְנָא
  chosen: we have sent
  alternatives:
  - we sent
  lexicon: HALOT
  rationale: The perfect can be rendered as an English present perfect in epistolary/reporting
    context, linking the completed action to the present communication.
- source_word: וְהוֹדַעְנָא לְמַלְכָּא
  chosen: and informed the king
  alternatives:
  - and made known to the king
  - and notified the king
  lexicon: HALOT
  rationale: The verb means to make known. 'Informed the king' is idiomatic modern
    English while preserving the formal register.
