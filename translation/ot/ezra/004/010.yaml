id: EZR.4.10
reference: Ezra 4:10
source:
  edition: WLC
  text: וּ/שְׁאָ֣ר אֻמַּיָּ֗/א דִּ֤י הַגְלִי֙ אָסְנַפַּר֙ רַבָּ֣/א וְ/יַקִּירָ֔/א וְ/הוֹתֵ֣ב הִמּ֔וֹ בְּ/קִרְיָ֖ה דִּ֣י שָׁמְרָ֑יִן וּ/שְׁאָ֥ר עֲבַֽר נַהֲרָ֖/ה וּ/כְעֶֽנֶת־׃
translation:
  text: 'and the rest of the peoples whom the great and noble Osnappar deported and settled in the city of Samaria[c][b][a], and in the rest of Beyond the River—and now:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Osnappar is often identified with the Assyrian king Ashurbanipal, but the translation keeps the Aramaic name form found in the text.
    reason: cross_reference
  - marker: b
    text: Or 'beyond the River.' This was a Persian administrative term for the region west of the Euphrates.
    reason: cultural_note
  - marker: c
    text: The final expression is an Aramaic letter formula; alternatively, 'and so forth' or 'at such a time.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁאָר
  chosen: the rest
  alternatives:
  - remainder
  lexicon: HALOT
  rationale: The noun denotes what remains of a larger group. 'The rest' is idiomatic in English and fits the list-like continuation from the previous verse.
- source_word: אֻמַּיָּא
  chosen: the peoples
  alternatives:
  - nations
  - ethnic groups
  lexicon: HALOT
  rationale: In Imperial Aramaic this term refers to peoples or population groups. 'Peoples' preserves the collective-ethnic sense better than the more political 'nations'.
- source_word: דִּי
  chosen: whom
  alternatives:
  - that
  - who
  lexicon: HALOT
  rationale: Here the relative particle introduces the clause modifying 'peoples.' 'Whom' is the most natural English relative after a personal object.
- source_word: הַגְלִי
  chosen: deported
  alternatives:
  - carried away into exile
  - exiled
  lexicon: HALOT
  rationale: The verb means to remove into exile. 'Deported' is concise, historically appropriate for imperial population transfer, and avoids unnecessary expansion.
- source_word: אָסְנַפַּר
  chosen: Osnappar
  alternatives:
  - Ashurbanipal
  lexicon: HALOT
  rationale: As a personal name, it is transliterated per translation philosophy. Although often identified historically with Ashurbanipal, the text gives the Aramaic form Osnappar, so that form is retained in the main text.
- source_word: רַבָּא וְיַקִּירָא
  chosen: the great and noble
  alternatives:
  - great and honorable
  - great and illustrious
  lexicon: HALOT
  rationale: These paired adjectives function as honorifics for Osnappar. 'Great and noble' is natural English and preserves the elevated courtly tone.
- source_word: וְהוֹתֵב
  chosen: settled
  alternatives:
  - caused to dwell
  - made live
  lexicon: HALOT
  rationale: The causative verb indicates resettlement. 'Settled' communicates the administrative action clearly in modern English.
- source_word: הִמּוֹ
  chosen: them
  alternatives:
  - those people
  lexicon: HALOT
  rationale: Third person plural pronoun referring back to the deported peoples.
- source_word: בְּקִרְיָה דִּי שָׁמְרָיִן
  chosen: in the city of Samaria
  alternatives:
  - in Samaria city
  - in the cities of Samaria
  lexicon: HALOT
  rationale: The singular 'city' is what the consonantal text presents here. Although 'cities of Samaria' appears in some English traditions by contextual smoothing, the extant form is singular and should be preserved.
- source_word: וּשְׁאָר עֲבַר נַהֲרָה
  chosen: and the rest in Beyond the River
  alternatives:
  - and the rest beyond the River
  - and the rest in Trans-Euphrates
  lexicon: HALOT
  rationale: עֲבַר נַהֲרָה is the Persian provincial designation for the region west of the Euphrates. Capitalizing 'Beyond the River' signals it as a proper administrative term rather than a mere directional phrase.
- source_word: וּכְעֶנֶת
  chosen: 'and now:'
  alternatives:
  - and so forth
  - at such a time
  - etc.
  lexicon: HALOT
  rationale: This Aramaic epistolary formula marks transition into the body of the letter. 'And now:' best captures its discourse function in readable English, better than a wooden transliteration or the vague 'and so forth.'
