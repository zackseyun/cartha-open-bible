id: EZR.4.20
reference: Ezra 4:20
source:
  edition: WLC
  text: וּ/מַלְכִ֣ין תַּקִּיפִ֗ין הֲווֹ֙ עַל יְר֣וּשְׁלֶ֔ם וְ/שַׁ֨לִּיטִ֔ין בְּ/כֹ֖ל
    עֲבַ֣ר נַהֲרָ֑/ה וּ/מִדָּ֥ה בְל֛וֹ וַ/הֲלָ֖ךְ מִתְיְהֵ֥ב לְ/הֽוֹן־׃
translation:
  text: And mighty kings were over Jerusalem, ruling over all the region Beyond the
    River, and tribute, tax, and toll were paid to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'over all Beyond the River'; the phrase is an official designation for
      the imperial territory west of the Euphrates.
    reason: cultural_note
  - marker: b
    text: The three terms 'tribute, tax, and toll' are distinct categories of imperial
      revenue; alternatives include 'tribute, custom, and toll' or 'tribute, tax,
      and customs duty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְכִין
  chosen: kings
  alternatives:
  - royal rulers
  lexicon: HALOT
  rationale: Plural noun meaning 'kings'; straightforward political title in context.
- source_word: תַּקִּיפִין
  chosen: mighty
  alternatives:
  - powerful
  - strong
  lexicon: HALOT
  rationale: Aramaic adjective denoting strength or power. 'Mighty' fits idiomatic
    English and the royal context.
- source_word: הֲווֹ
  chosen: were
  alternatives:
  - existed
  - there were
  lexicon: HALOT
  rationale: Past plural form of 'to be'; simple copular rendering is sufficient.
- source_word: עַל יְרוּשְׁלֶם
  chosen: over Jerusalem
  alternatives:
  - in Jerusalem
  lexicon: HALOT
  rationale: The preposition עַל here indicates authority over Jerusalem rather than
    mere location, matching the following statement about rule.
- source_word: שַׁלִּיטִין
  chosen: ruling
  alternatives:
  - having dominion
  - governing
  lexicon: HALOT
  rationale: 'Adjectival/participial idea of exercising dominion. Rendered verbally
    in English for natural flow: ''ruling over.'''
- source_word: בְּכֹל עֲבַר נַהֲרָה
  chosen: over all the region Beyond the River
  alternatives:
  - over all Beyond the River
  - throughout the whole province Beyond the River
  lexicon: HALOT
  rationale: Official imperial-geographical expression for the territory west of the
    Euphrates. 'Region Beyond the River' preserves the title-like sense while remaining
    readable.
- source_word: מִדָּה
  chosen: tribute
  alternatives:
  - tribute payment
  lexicon: HALOT
  rationale: Part of a standard tax triad in Imperial Aramaic. 'Tribute' is the conventional
    and likely sense for a levy imposed by imperial authority.
- source_word: בְלוֹ
  chosen: tax
  alternatives:
  - custom
  - excise
  lexicon: HALOT
  rationale: In the recurring administrative formula, this term denotes a category
    of taxation distinct from the others. 'Tax' is a clear general rendering.
- source_word: הֲלָךְ
  chosen: toll
  alternatives:
  - customs duty
  - transit toll
  lexicon: HALOT
  rationale: Likely refers to a road, transport, or transit duty. 'Toll' preserves
    the distinction within the threefold revenue formula.
- source_word: מִתְיְהֵב לְהוֹן
  chosen: were paid to them
  alternatives:
  - was given to them
  - was rendered to them
  lexicon: HALOT
  rationale: Passive verbal expression indicating these revenues were delivered to
    the kings. English plural verb agrees naturally with the compound subject 'tribute,
    tax, and toll'.
