id: EZR.4.24
reference: Ezra 4:24
source:
  edition: WLC
  text: בֵּ/אדַ֗יִן בְּטֵלַת֙ עֲבִידַ֣ת בֵּית אֱלָהָ֔/א דִּ֖י בִּ/ירוּשְׁלֶ֑ם וַ/הֲוָת֙
    בָּֽטְלָ֔א עַ֚ד שְׁנַ֣ת תַּרְתֵּ֔ין לְ/מַלְכ֖וּת דָּרְיָ֥וֶשׁ מֶֽלֶךְ פָּרָֽס־־׃פ
translation:
  text: Then the work on the house of God that is in Jerusalem stopped, and it remained
    stopped until the second year of the reign of Darius king of Persia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ceased' / 'was stopped' for the first verb; the Aramaic root בטל carries
      the sense of stopping or ceasing.
    reason: lexical_alternative
  - marker: b
    text: Or 'the temple of God.' Literally, 'the house of God.'
    reason: lexical_alternative
  - marker: c
    text: The clause 'and it remained stopped' expresses an ongoing state, not merely
      a second mention of the stoppage.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse adverb marking sequence from the preceding narrative.
    'Then' is natural modern English and preserves the temporal/narrative connection.
- source_word: בְּטֵלַת
  chosen: stopped
  alternatives:
  - ceased
  - was stopped
  lexicon: HALOT
  rationale: From the Aramaic root בטל, 'to stop, cease, be interrupted.' Given the
    following explicit continuation clause ('it remained stopped'), rendering this
    first verb actively as 'stopped' avoids awkward repetition while preserving the
    sense that the work came to a halt.
- source_word: עֲבִידַת
  chosen: the work
  alternatives:
  - the work of building
  - the labor
  lexicon: HALOT
  rationale: Construct noun meaning 'work/service.' In context it refers to the temple-building
    project. 'The work' is sufficiently specific when followed by 'on the house of
    God' and avoids adding 'building' beyond what the text explicitly states.
- source_word: בֵּית אֱלָהָא
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: HALOT
  rationale: A formally transparent rendering of the construct phrase. 'House of God'
    preserves the source wording; 'temple' is interpretive but contextually true.
- source_word: דִּי בִּירוּשְׁלֶם
  chosen: that is in Jerusalem
  alternatives:
  - which was in Jerusalem
  lexicon: HALOT
  rationale: Relative particle plus location. Present-tense English relative clause
    is idiomatic here and identifies the temple's location without implying a temporal
    contrast.
- source_word: וַהֲוָת בָּטְלָא
  chosen: and it remained stopped
  alternatives:
  - and it was stopped
  - and it continued to be stopped
  - and it lay idle
  lexicon: HALOT
  rationale: The combination of 'was/became' with the adjective/participle from בטל
    expresses continuing state. 'Remained stopped' best captures the durative force
    and distinguishes it from the initial cessation.
- source_word: עַד שְׁנַת תַּרְתֵּין
  chosen: until the second year
  alternatives:
  - until year two
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the temporal phrase. 'Second year' is
    the natural English equivalent.
- source_word: לְמַלְכוּת דָּרְיָוֶשׁ
  chosen: of the reign of Darius
  alternatives:
  - of Darius's reign
  - of the kingship of Darius
  lexicon: HALOT
  rationale: The preposition with 'reign/kingship' marks regnal dating. 'Of the reign
    of Darius' is clear and idiomatic in English Bible style.
- source_word: מֶלֶךְ פָּרָס
  chosen: king of Persia
  alternatives:
  - the Persian king
  lexicon: HALOT
  rationale: Appositional royal title. 'King of Persia' follows the source order and
    standard English convention.
