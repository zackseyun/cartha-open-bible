id: EZR.4.12
reference: Ezra 4:12
source:
  edition: WLC
  text: יְדִ֨יעַ֙ לֶהֱוֵ֣א לְ/מַלְכָּ֔/א דִּ֣י יְהוּדָיֵ֗/א דִּ֤י סְלִ֨קוּ֙ מִן לְוָתָ֔/ךְ עֲלֶ֥י/נָא אֲת֖וֹ לִ/ירוּשְׁלֶ֑ם קִרְיְתָ֨/א מָֽרָדְתָּ֤/א ו/באישת/א בָּנַ֔יִן ו/שורי אשכללו וְ/אֻשַּׁיָּ֖/א יַחִֽיטוּ־׃
translation:
  text: Let it be known to the king that the Jews who came up from you to us have come to Jerusalem[a]. They are rebuilding the rebellious and wicked city[b], finishing the walls and repairing the foundations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Judeans.” The Aramaic term can denote the people of Judah/Judea as well as the Jews more broadly.
    reason: lexical_alternative
  - marker: b
    text: Or “laying/setting the foundations.” The Aramaic expression is somewhat difficult and may refer either to repairing existing foundations or setting them in place.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְדִיעַ לֶהֱוֵא
  chosen: Let it be known
  alternatives:
  - Be it known
  - May it be known
  lexicon: HALOT
  rationale: Standard Aramaic epistolary formula introducing information to the king; English idiom 'Let it be known' preserves the formal register.
- source_word: לְמַלְכָּא
  chosen: to the king
  alternatives:
  - for the king
  lexicon: HALOT
  rationale: Dative marking the recipient of the report; 'to the king' is the natural English rendering in this formula.
- source_word: יְהוּדָיֵא
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: HALOT
  rationale: The term can denote ethnic Jews or people of Judah/Judea. In Ezra's imperial-letter context, 'Jews' is the most idiomatic and widely recognized English rendering, though 'Judeans' is lexically possible.
- source_word: סְלִקוּ מִן לְוָתָךְ עֲלֶינָא
  chosen: came up from you to us
  alternatives:
  - went up from you to us
  - came from you to us
  lexicon: HALOT
  rationale: סלק commonly means 'go up/come up.' Because the speakers write from the province to the king and describe the Jews' arrival in their region, 'came up from you to us' best reflects both motion and viewpoint.
- source_word: אֲתוֹ לִירוּשְׁלֶם
  chosen: have come to Jerusalem
  alternatives:
  - came to Jerusalem
  lexicon: HALOT
  rationale: A second verb of arrival resumes the report more specifically. English present perfect fits the letter-report style and the current relevance of the action.
- source_word: קִרְיְתָא מָרָדְתָּא וּבִאישְׁתָּא
  chosen: that rebellious and wicked city
  alternatives:
  - the rebellious and bad city
  - the rebellious and evil city
  lexicon: HALOT
  rationale: The adjectives are hostile descriptors in the accusers' letter. 'Wicked' conveys the moral-political force of בִאישְׁתָּא more naturally than 'bad' in modern English.
- source_word: בָּנַיִן
  chosen: They are rebuilding
  alternatives:
  - they are building
  - they are rebuilding
  lexicon: HALOT
  rationale: In context Jerusalem previously existed and is now being restored, so English 'rebuilding' makes the situational sense explicit without over-paraphrasing.
- source_word: וְשׁוּרַיָּא אֶשְׁכְּלָלוּ
  chosen: finishing the walls
  alternatives:
  - completing the walls
  - restoring the walls
  lexicon: HALOT
  rationale: The noun refers to the city's walls, and the verb conveys completing or making whole. 'Finishing the walls' is concise and natural.
- source_word: וְאֻשַּׁיָּא יַחִיטוּ
  chosen: repairing the foundations
  alternatives:
  - laying the foundations
  - joining the foundations
  - setting the foundations
  lexicon: HALOT
  rationale: The phrase is difficult, but in context it refers to work on the city's structural base. 'Repairing the foundations' fits the restoration setting and avoids implying first-time construction too strongly.
