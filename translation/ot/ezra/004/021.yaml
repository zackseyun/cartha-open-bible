id: EZR.4.21
reference: Ezra 4:21
source:
  edition: WLC
  text: כְּעַן֙ שִׂ֣ימוּ טְּעֵ֔ם לְ/בַטָּלָ֖א גֻּבְרַיָּ֣/א אִלֵּ֑ךְ וְ/קִרְיְתָ֥/א
    דָךְ֙ לָ֣א תִתְבְּנֵ֔א עַד מִנִּ֖/י טַעְמָ֥/א יִתְּשָֽׂם־׃
translation:
  text: Now issue a decree to make these men stop, so that this city may not be rebuilt
    until a decree is issued by me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'set forth an order' or 'make a decree'; the Aramaic idiom is literally
      'set a decree.'
    reason: lexical_alternative
  - marker: b
    text: Or 'until I issue a decree.' Literally, 'until from me a decree is set.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּעַן
  chosen: Now
  alternatives:
  - Therefore
  - So now
  lexicon: HALOT
  rationale: Aramaic adverb introducing the king's immediate command. 'Now' is natural
    and preserves the urgency without overinterpreting logical force.
- source_word: שִׂימוּ טְּעֵם
  chosen: issue a decree
  alternatives:
  - set forth a command
  - make an order
  lexicon: HALOT
  rationale: The idiom literally means 'set a decree/decision.' 'Issue a decree' is
    idiomatic English and fits royal-administrative context.
- source_word: לְבַטָּלָא
  chosen: to make ... stop
  alternatives:
  - to stop
  - to cause to cease
  lexicon: HALOT
  rationale: Infinitive of a verb meaning to stop, annul, or cause to cease. 'To make
    ... stop' captures the causative force in clear English.
- source_word: גֻּבְרַיָּא אִלֵּךְ
  chosen: these men
  alternatives:
  - these people
  lexicon: HALOT
  rationale: Literally 'these men.' Gender-accurate rendering is preferred, and in
    context it refers to the specific male opponents/builders addressed in the correspondence.
- source_word: וְקִרְיְתָא דָךְ
  chosen: this city
  alternatives:
  - and this city
  lexicon: HALOT
  rationale: The conjunction introduces the next clause, but English does not require
    a separate 'and' here. 'This city' is the natural referent.
- source_word: לָא תִתְבְּנֵא
  chosen: may not be rebuilt
  alternatives:
  - must not be rebuilt
  - is not to be rebuilt
  lexicon: HALOT
  rationale: Imperfect in a prohibitive/resultative administrative statement. 'May
    not be rebuilt' fits the decree style and preserves the passive sense.
- source_word: עַד מִנִּי טַעְמָא יִתְּשָׂם
  chosen: until a decree is issued by me
  alternatives:
  - until an order is set by me
  - until I issue a decree
  lexicon: HALOT
  rationale: Literally 'until from me a decree is set.' The passive English keeps
    the formal administrative tone while making explicit that the decree originates
    with the king.
