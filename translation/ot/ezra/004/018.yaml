id: EZR.4.18
reference: Ezra 4:18
source:
  edition: WLC
  text: נִשְׁתְּוָנָ֕/א דִּ֥י שְׁלַחְתּ֖וּן עֲלֶ֑י/נָא מְפָרַ֥שׁ קֱרִ֖י קָדָמָֽ/י׃
translation:
  text: The document that you sent to us has been read plainly before me[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The letter that you sent to us has been clearly read before me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁתְּוָנָא
  chosen: the document
  alternatives:
  - the letter
  - the written document
  lexicon: HALOT
  rationale: Imperial Aramaic term for an official written communication. 'Document' is broad enough to fit the administrative context, while 'letter' is possible but slightly narrower.
- source_word: דִּי
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Relative particle introducing the clause modifying 'document.' In idiomatic English, 'that' fits naturally.
- source_word: שְׁלַחְתּוּן
  chosen: you sent
  alternatives:
  - you have sent
  lexicon: HALOT
  rationale: Second masculine plural perfect in Aramaic. Simple past is the most natural English rendering in this narrative-administrative reply.
- source_word: עֲלֶינָא
  chosen: to us
  alternatives:
  - against us
  - upon us
  lexicon: HALOT
  rationale: Though the preposition can have a range of senses, in this epistolary context it most naturally means the document was sent 'to us' (i.e., to the royal court), not 'against us.'
- source_word: מְפָרַשׁ
  chosen: plainly
  alternatives:
  - distinctly
  - clearly
  - explicitly
  lexicon: HALOT
  rationale: Adverbial/passive participial form conveying that the reading or interpretation was made clear. 'Plainly' preserves the sense of clarity without overinterpreting whether the emphasis is on translation or explanation.
- source_word: קֱרִי
  chosen: has been read
  alternatives:
  - was read
  - was proclaimed
  lexicon: HALOT
  rationale: 'Passive sense in context: the document was read aloud before the king. English present perfect fits the king''s immediate response to a recently completed action.'
- source_word: קָדָמָי
  chosen: before me
  alternatives:
  - in my presence
  lexicon: HALOT
  rationale: Standard court expression indicating action done in the king's presence. 'Before me' is concise and idiomatic.
