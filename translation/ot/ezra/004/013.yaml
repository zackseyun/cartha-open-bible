id: EZR.4.13
reference: Ezra 4:13
source:
  edition: WLC
  text: כְּעַ֗ן יְדִ֨יעַ֙ לֶהֱוֵ֣א לְ/מַלְכָּ֔/א דִּ֠י הֵ֣ן קִרְיְתָ֥/א דָךְ֙ תִּתְבְּנֵ֔א וְ/שׁוּרַיָּ֖/ה יִֽשְׁתַּכְלְל֑וּן מִנְדָּֽה בְל֤וֹ וַ/הֲלָךְ֙ לָ֣א יִנְתְּנ֔וּן וְ/אַפְּתֹ֥ם מַלְכִ֖ים תְּהַנְזִֽק־׃
translation:
  text: Now let it be known to the king that if this city is rebuilt and its walls are completed[a], they will not pay tribute, tax, or toll, and in the end it will damage the kings' revenue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and finally it will cause loss to the kings.' The Aramaic expression is concise, and the exact nuance of the loss is inferred from the context of unpaid tribute, tax, and toll.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּעַן
  chosen: Now
  alternatives:
  - Therefore
  - So now
  lexicon: HALOT
  rationale: Aramaic discourse adverb introducing the warning/conclusion. 'Now' is natural English and preserves the transitional force without overinterpreting it as strictly inferential.
- source_word: יְדִיעַ לֶהֱוֵא
  chosen: let it be known
  alternatives:
  - be it known
  - know
  lexicon: HALOT
  rationale: This is a standard official formula in Imperial Aramaic correspondence. 'Let it be known' preserves the formal register better than the flatter 'know.'
- source_word: לְמַלְכָּא
  chosen: to the king
  alternatives:
  - for the king
  lexicon: HALOT
  rationale: The dative marks the addressee of the formal notice. 'To the king' is the idiomatic English equivalent in this epistolary setting.
- source_word: דִּי הֵן
  chosen: that if
  alternatives:
  - that, behold, if
  - for if
  lexicon: HALOT
  rationale: The combination introduces the content of the notice with a conditional clause. Rendering it as 'that if' best reflects the syntax in smooth English.
- source_word: קִרְיְתָא דָךְ
  chosen: this city
  alternatives:
  - that city
  lexicon: HALOT
  rationale: The demonstrative points to Jerusalem from the writers' perspective. 'This city' follows the deictic force of the Aramaic.
- source_word: תִּתְבְּנֵא
  chosen: is rebuilt
  alternatives:
  - is being rebuilt
  - will be rebuilt
  lexicon: HALOT
  rationale: The imperfect in this conditional context can be rendered with an English present passive after 'if.' 'Is rebuilt' is idiomatic and fits the warning scenario.
- source_word: וְשׁוּרַיָּה
  chosen: and its walls
  alternatives:
  - and the walls
  lexicon: HALOT
  rationale: The plural noun with pronominal sense refers to the city's fortifications. 'Its walls' makes the relation explicit in English.
- source_word: יִשְׁתַּכְלְלוּן
  chosen: are completed
  alternatives:
  - are finished
  - are restored
  lexicon: HALOT
  rationale: The verb conveys being finished or brought to completion. 'Are completed' matches the building context and formal tone.
- source_word: מִנְדָּה
  chosen: tribute
  alternatives:
  - tax
  - custom
  lexicon: HALOT
  rationale: In the recurring Persian administrative triad, this term denotes a form of state levy, often rendered 'tribute.' Using 'tribute' helps distinguish it from the following fiscal terms.
- source_word: בְלוֹ
  chosen: tax
  alternatives:
  - custom
  - excise
  lexicon: HALOT
  rationale: This term belongs to the tax triad and is commonly distinguished from מִנְדָּה and הֲלָךְ. 'Tax' is a broad but clear rendering in modern English.
- source_word: הֲלָךְ
  chosen: toll
  alternatives:
  - customs duty
  - transit toll
  lexicon: HALOT
  rationale: This term likely refers to a duty associated with transport or passage. 'Toll' is concise and preserves the distinction within the triad.
- source_word: לָא יִנְתְּנוּן
  chosen: they will not pay
  alternatives:
  - they will not give
  lexicon: HALOT
  rationale: Although the verb is literally 'give,' in a taxation context English idiom requires 'pay.' The plural subject is indefinite, referring to the inhabitants/city.
- source_word: וְאַפְּתֹם
  chosen: and in the end
  alternatives:
  - and finally
  - and consequently
  lexicon: HALOT
  rationale: The term is somewhat difficult, but in context it points to the eventual outcome/result. 'In the end' preserves temporal-resultative force without overprecision.
- source_word: מַלְכִים
  chosen: the kings
  alternatives:
  - kings
  lexicon: HALOT
  rationale: The plural is retained as in the Aramaic. It likely refers to the line or authority of Persian kings rather than a single monarch, so the plural should not be flattened.
- source_word: תְּהַנְזִק
  chosen: it will damage the revenue of
  alternatives:
  - you will suffer loss to
  - it will cause loss to
  - it will damage the interests of
  lexicon: HALOT
  rationale: The verb means 'cause damage/loss.' In this fiscal context, the object is best understood as royal income or tax base. Supplying 'the revenue of' makes explicit the economic sense implied by the taxation context and avoids the awkwardly vague 'damage the kings.'
