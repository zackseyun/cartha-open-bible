id: EZR.4.8
reference: Ezra 4:8
source:
  edition: WLC
  text: רְח֣וּם בְּעֵל טְעֵ֗ם וְ/שִׁמְשַׁי֙ סָֽפְרָ֔/א כְּתַ֛בוּ אִגְּרָ֥ה חֲדָ֖ה עַל יְרוּשְׁלֶ֑ם לְ/אַרְתַּחְשַׁ֥שְׂתְּא מַלְכָּ֖/א כְּנֵֽמָא־־׃
translation:
  text: Rehum the commander and Shimshai the scribe wrote one letter against Jerusalem to King Artaxerxes as follows:[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the chancellor.' The Aramaic title בְּעֵל טְעֵם is an official designation whose exact Persian administrative equivalent is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעֵל טְעֵם
  chosen: the commander
  alternatives:
  - the chancellor
  - the lord/master of counsel
  - the governor/official in charge
  lexicon: HALOT
  rationale: The Aramaic title literally combines 'owner/master' with 'decree/counsel/command.' In Ezra it functions as an official title. 'Commander' is a clear modern rendering that conveys administrative authority without overcommitting to a highly specific Persian office. 'Chancellor' is traditional but may sound anachronistically bureaucratic and is less transparent to modern readers.
- source_word: סָפְרָא
  chosen: the scribe
  alternatives:
  - the secretary
  lexicon: HALOT
  rationale: The term denotes a scribal/secretarial official. 'Scribe' preserves the lexical connection and is standard, while still understandable in modern English.
- source_word: כְּתַבוּ
  chosen: wrote
  alternatives:
  - composed
  - sent in writing
  lexicon: HALOT
  rationale: Simple past 'wrote' directly matches the verbal sense and avoids adding nuance not explicit in the source.
- source_word: אִגְּרָה חֲדָה
  chosen: a letter
  alternatives:
  - one letter
  - a single letter
  lexicon: HALOT
  rationale: The adjective can mean 'one' or function like an indefinite marker in Imperial Aramaic. In English, 'a letter' is the most natural equivalent; 'one letter' would overemphasize number where the context simply introduces the document.
- source_word: עַל יְרוּשְׁלֶם
  chosen: against Jerusalem
  alternatives:
  - concerning Jerusalem
  - about Jerusalem
  lexicon: HALOT
  rationale: In context the letter is accusatory and hostile, so 'against Jerusalem' best captures the adversative force. A more neutral 'concerning' would undertranslate the context established by the surrounding narrative.
- source_word: לְאַרְתַּחְשַׁשְׂתְּא מַלְכָּא
  chosen: to King Artaxerxes
  alternatives:
  - to Artaxerxes the king
  lexicon: HALOT
  rationale: English idiom favors 'to King Artaxerxes,' while preserving both the royal title and the personal name.
- source_word: כְּנֵמָא
  chosen: 'as follows:'
  alternatives:
  - accordingly
  - thus
  - in this manner
  lexicon: HALOT
  rationale: This discourse marker introduces the content of the letter in the next verse. 'As follows' is idiomatic and signals that what comes next is the letter's wording.
- source_word: רְחוּם
  chosen: Rehum
  rationale: Personal name transliterated per translation philosophy.
- source_word: שִׁמְשַׁי
  chosen: Shimshai
  rationale: Personal name transliterated per translation philosophy.
- source_word: אַרְתַּחְשַׁשְׂתְּא
  chosen: Artaxerxes
  rationale: Royal personal name transliterated by standard English convention.
