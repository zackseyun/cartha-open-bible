id: EZR.4.15
reference: Ezra 4:15
source:
  edition: WLC
  text: דִּ֡י יְבַקַּר֩ בִּֽ/סְפַר דָּכְרָ֨נַיָּ֜/א דִּ֣י אֲבָהָתָ֗/ךְ וּ֠/תְהַשְׁכַּח
    בִּ/סְפַ֣ר דָּכְרָנַיָּ/א֮ וְ/תִנְדַּע֒ דִּי֩ קִרְיְתָ֨/א דָ֜ךְ קִרְיָ֣א מָֽרָדָ֗א
    וּֽ/מְהַנְזְקַ֤ת מַלְכִין֙ וּ/מְדִנָ֔ן וְ/אֶשְׁתַּדּוּר֙ עָבְדִ֣ין בְּ/גַוַּ֔/הּ
    מִן יוֹמָ֖ת עָלְמָ֑/א עַ֨ל דְּנָ֔ה קִרְיְתָ֥/א דָ֖ךְ הָֽחָרְבַֽת־־־׃
translation:
  text: so that a search may be made in the book of records of your fathers, and you
    may find in the book of records and know that this city is a rebellious city,
    harmful to kings and provinces, and that rebellion has been stirred up within
    it from ancient days; for this reason this city was laid waste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your ancestors' or 'your predecessors'; literally 'your fathers.'
    reason: lexical_alternative
  - marker: b
    text: The Aramaic expression rendered 'rebellion has been stirred up' refers to
      sedition or revolt being fomented within the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְבַקַּר
  chosen: a search may be made
  alternatives:
  - he may search
  - one may investigate
  lexicon: HALOT
  rationale: The Aramaic verb in the intensive stem here functions in an impersonal/jussive-like
    request after דִּי, fitting the letter's petitionary style. English passive captures
    the formal administrative tone better than a personal subject.
- source_word: סְפַר דָּכְרָנַיָּא
  chosen: book of records
  alternatives:
  - record book
  - book of memorials
  - archive
  lexicon: HALOT
  rationale: The phrase denotes an official written archive or record. 'Book of records'
    preserves the concrete imagery of a written register while remaining natural English.
- source_word: אֲבָהָתָךְ
  chosen: your fathers
  alternatives:
  - your ancestors
  - your predecessors
  lexicon: HALOT
  rationale: Literally 'your fathers.' In context it refers to prior kings/rulers
    in the imperial line. The formal wording is retained in the main text, with the
    broader sense understandable from context.
- source_word: וּתְהַשְׁכַּח
  chosen: you may find
  alternatives:
  - you will find
  - you may discover
  lexicon: HALOT
  rationale: Though the root commonly means 'find,' the form here continues the requested-result
    sequence after the initial petition. 'May find' matches the deferential tone of
    the letter.
- source_word: וְתִנְדַּע
  chosen: and know
  alternatives:
  - and learn
  - and ascertain
  lexicon: HALOT
  rationale: A straightforward rendering of the verb for knowing/coming to know. 'Know'
    is concise and fits the legal-administrative context.
- source_word: קִרְיְתָא דָךְ
  chosen: this city
  alternatives:
  - that city
  lexicon: HALOT
  rationale: The demonstrative points to Jerusalem as the city under discussion. 'This
    city' reflects the deictic force from the writers' perspective in the letter.
- source_word: קִרְיָא מָרָדָא
  chosen: a rebellious city
  alternatives:
  - a city of rebellion
  - a revolting city
  lexicon: HALOT
  rationale: The adjective describes the city's character as insubordinate to imperial
    authority. 'Rebellious city' is idiomatic and preserves the accusation.
- source_word: מְהַנְזְקַת
  chosen: harmful to
  alternatives:
  - damaging to
  - injurious to
  lexicon: HALOT
  rationale: The participial form describes causing damage or loss. 'Harmful to' is
    natural English and broad enough to include political and economic injury.
- source_word: מַלְכִין וּמְדִנָן
  chosen: kings and provinces
  alternatives:
  - kings and states
  - kings and satrapies
  lexicon: HALOT
  rationale: The plural nouns refer to rulers and their administrative regions. 'Provinces'
    is the standard and clearest rendering for the imperial context.
- source_word: אֶשְׁתַּדּוּר עָבְדִין
  chosen: rebellion has been stirred up
  alternatives:
  - sedition has been made
  - insurrection has been carried out
  - they have practiced revolt
  lexicon: HALOT
  rationale: This collocation is difficult, but in context it refers to fomenting
    revolt/sedition. Rendering the nominal element plus verb as 'rebellion has been
    stirred up' best conveys the sense in idiomatic English.
- source_word: בְּגַוַּהּ
  chosen: within it
  alternatives:
  - in its midst
  - inside it
  lexicon: HALOT
  rationale: Refers to activity occurring in the city's interior/community. 'Within
    it' is concise and natural.
- source_word: מִן יוֹמָת עָלְמָא
  chosen: from ancient days
  alternatives:
  - from days of old
  - from everlasting days
  lexicon: HALOT
  rationale: An idiom for long-standing antiquity, not eternity in a strict metaphysical
    sense. 'From ancient days' communicates the historical claim clearly.
- source_word: עַל דְּנָה
  chosen: for this reason
  alternatives:
  - therefore
  - because of this
  lexicon: HALOT
  rationale: This phrase introduces the inference drawn from the preceding accusation.
    'For this reason' preserves the causal logic.
- source_word: הָחָרְבַת
  chosen: was laid waste
  alternatives:
  - was destroyed
  - was made desolate
  lexicon: HALOT
  rationale: The passive/descriptive sense fits the city's prior devastation. 'Was
    laid waste' preserves the formal register and the resultative force without over-specifying
    the means.
