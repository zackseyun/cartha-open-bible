id: EZR.4.9
reference: Ezra 4:9
source:
  edition: WLC
  text: אֱדַ֜יִן רְח֣וּם בְּעֵל טְעֵ֗ם וְ/שִׁמְשַׁי֙ סָֽפְרָ֔/א וּ/שְׁאָ֖ר כְּנָוָתְ/ה֑וֹן דִּ֠ינָיֵ/א וַ/אֲפַרְסַתְכָיֵ֞/א טַרְפְּלָיֵ֣/א אֲפָֽרְסָיֵ֗/א ארכוי בָבְלָיֵ/א֙ שֽׁוּשַׁנְכָיֵ֔/א ד/הוא עֵלְמָיֵֽ/א־׃
translation:
  text: Then Rehum the commander[a], Shimshai the scribe, and the rest of their associates—the judges, the officials, the Tarpelites, the Persians, the Erechites, the Babylonians, the men of Susa (that is[b], the Elamites)—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Dinaites'; the Aramaic term דִּינָיֵא may be read as an ethnic group name in traditional translations, but here it is rendered 'the judges' because the form also suits an administrative title and fits the surrounding official context.
    reason: alternative_reading
  - marker: b
    text: Or 'the Apharsathchites'; the Aramaic term אֲפַרְסַתְכָיֵא is difficult and has often been transliterated as a people-group name. Here it is rendered 'the lesser officials' as a plausible administrative designation.
    reason: alternative_reading
lexical_decisions:
- source_word: אֱדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse adverb introducing the next step in the narrative/document formula. 'Then' is natural English and preserves sequence.
- source_word: רְחוּם
  chosen: Rehum
  rationale: Personal name; transliterated per translation philosophy.
- source_word: בְּעֵל טְעֵם
  chosen: the commander
  alternatives:
  - the chancellor
  - the lord of counsel
  - the governor
  lexicon: HALOT
  rationale: The title is debated, but in this imperial-administrative context it denotes an official in charge or command. 'Commander' is a clear modern rendering that avoids the potentially misleading and archaic 'chancellor' while preserving official authority.
- source_word: שִׁמְשַׁי
  chosen: Shimshai
  rationale: Personal name; transliterated.
- source_word: סָפְרָא
  chosen: the scribe
  alternatives:
  - the secretary
  lexicon: HALOT
  rationale: Administrative title meaning scribe/secretary. 'Scribe' is the more literal and biblically recognizable rendering; the bureaucratic function is clear from context.
- source_word: שְׁאָר
  chosen: the rest of
  alternatives:
  - the remainder of
  lexicon: HALOT
  rationale: Straightforward quantitative term introducing the remainder of the group.
- source_word: כְּנָוָתְהוֹן
  chosen: their associates
  alternatives:
  - their companions
  - their colleagues
  lexicon: HALOT
  rationale: The term refers to those aligned with or belonging to the same group. 'Associates' fits the official setting and reads naturally in English.
- source_word: דִּינָיֵא
  chosen: the judges
  alternatives:
  - the Dinaites
  lexicon: HALOT
  rationale: Though sometimes taken as an ethnicon in traditional translations, the underlying form naturally corresponds to 'judges' in Imperial Aramaic administrative context. This yields a coherent list beginning with offices before moving to peoples. The ethnicon alternative is preserved in a footnote because it has translation history.
- source_word: אֲפַרְסַתְכָיֵא
  chosen: the lesser officials
  alternatives:
  - the Apharsathchites
  lexicon: HALOT
  rationale: This difficult term is plausibly an administrative designation rather than an ethnic name. 'Lesser officials' captures a likely bureaucratic sense and avoids opaque transliteration in the main text. The traditional ethnicon is preserved in a footnote.
- source_word: טַרְפְּלָיֵא
  chosen: the Tarpelites
  lexicon: HALOT
  rationale: Likely an ethnicon/group name of uncertain identification; transliteration is the most transparent choice.
- source_word: אֲפָרְסָיֵא
  chosen: the Persians
  lexicon: HALOT
  rationale: Clear ethnicon referring to Persians.
- source_word: ארכוי
  chosen: the Erechites
  alternatives:
  - the men of Erech
  lexicon: HALOT
  rationale: Ethnicon from Erech/Uruk. 'Erechites' is concise and conventional enough in English.
- source_word: בָבְלָיֵא
  chosen: the Babylonians
  lexicon: HALOT
  rationale: Clear ethnicon.
- source_word: שׁוּשַׁנְכָיֵא
  chosen: the men of Susa
  alternatives:
  - the Susanchites
  - the Susians
  lexicon: HALOT
  rationale: Refers to inhabitants of Susa. 'The men of Susa' is more transparent to modern readers than the opaque traditional transliteration.
- source_word: דְּהוּא
  chosen: that is
  alternatives:
  - who are
  - namely
  lexicon: HALOT
  rationale: Explanatory relative phrase identifying the preceding group more specifically.
- source_word: עֵלְמָיֵא
  chosen: the Elamites
  lexicon: HALOT
  rationale: Clear ethnicon; appositional explanation of 'the men of Susa'.
