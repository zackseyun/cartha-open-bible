id: EZR.8.23
reference: Ezra 8:23
source:
  edition: WLC
  text: וַ/נָּצ֛וּמָ/ה וַ/נְּבַקְשָׁ֥/ה מֵ/אֱלֹהֵ֖י/נוּ עַל זֹ֑את וַ/יֵּעָתֵ֖ר לָֽ/נוּ־׃
translation:
  text: So we fasted and sought our God concerning this, and he answered our plea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'and he was entreated by us' or 'and he responded to
      our prayer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנָּצוּמָה
  chosen: we fasted
  alternatives:
  - we proclaimed a fast
  lexicon: HALOT
  rationale: From צום, 'to fast.' The 1cp form straightforwardly reports the group's
    action. 'We fasted' is the plain sense; 'we proclaimed a fast' would overread
    the verb here.
- source_word: וַנְּבַקְשָׁה
  chosen: we sought
  alternatives:
  - we asked
  - we entreated
  lexicon: HALOT
  rationale: From בקשׁ, commonly 'seek' or 'request.' In prayer context it can mean
    'ask,' but 'sought' preserves the Hebrew wording and pairs naturally with the
    following prepositional phrase.
- source_word: מֵאֱלֹהֵינוּ
  chosen: from our God
  alternatives:
  - of our God
  lexicon: HALOT
  rationale: The preposition מן after בקשׁ marks the one from whom the request is
    sought. 'From our God' is idiomatic enough in English and preserves the source
    relation.
- source_word: עַל זֹאת
  chosen: this
  alternatives:
  - concerning this
  - for this
  lexicon: HALOT
  rationale: Literally 'upon/for this,' referring back to the matter just mentioned
    in context. 'This' is concise modern English; the fuller sense can be preserved
    in a footnote if needed, but the main text reads naturally.
- source_word: וַיֵּעָתֵר
  chosen: he answered our plea
  alternatives:
  - he was entreated by us
  - he responded to our prayer
  - he let himself be sought by us
  lexicon: HALOT
  rationale: עתר in the Niphal commonly means 'to be moved by entreaty, to respond
    favorably to prayer.' 'He answered our plea' communicates the favorable divine
    response in natural English better than the wooden passive 'he was entreated by
    us.'
- source_word: לָנוּ
  chosen: our
  alternatives:
  - to us
  - by us
  lexicon: HALOT
  rationale: The preposition with pronominal suffix is incorporated idiomatically
    into 'answered our plea.' A more formal rendering would be 'was entreated by us'
    or 'answered us,' but the chosen phrasing best reflects the sense of favorable
    response to petition.
