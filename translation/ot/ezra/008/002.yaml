id: EZR.8.2
reference: Ezra 8:2
source:
  edition: WLC
  text: מִ/בְּנֵ֤י פִֽינְחָס֙ גֵּֽרְשֹׁ֔ם מִ/בְּנֵ֥י אִיתָמָ֖ר דָּנִיֵּ֑אל מִ/בְּנֵ֥י
    דָוִ֖יד חַטּֽוּשׁסס׃ס
translation:
  text: from the sons of Phinehas, Gershom; from the sons of Ithamar, Daniel; from
    the sons of David, Hattush.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מִ/בְּנֵי
  chosen: from the sons of
  alternatives:
  - from the descendants of
  - of the sons of
  lexicon: HALOT
  rationale: The preposition מִן plus construct plural of בֵּן introduces lineage/source
    within this list of returnees. 'From the sons of' preserves the genealogical formula
    and the repeated structure of the Hebrew better than the more interpretive 'from
    the descendants of,' though that sense is possible.
- source_word: פִֽינְחָס
  chosen: Phinehas
  rationale: Proper personal name; transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: גֵּרְשֹׁם
  chosen: Gershom
  rationale: Proper personal name; transliterated rather than translated.
- source_word: אִיתָמָר
  chosen: Ithamar
  rationale: Proper personal name; standard English transliteration.
- source_word: דָּנִיֵּאל
  chosen: Daniel
  rationale: Proper personal name; standard English transliteration.
- source_word: דָוִיד
  chosen: David
  rationale: 'Proper personal name; standard English transliteration. Here it marks
    royal lineage: ''from the sons of David.'''
- source_word: חַטּוּשׁ
  chosen: Hattush
  rationale: Proper personal name; transliterated according to standard English convention.
