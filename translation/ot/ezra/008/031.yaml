theological_decisions:
- issue: Anthropomorphic idiom for divine protection
  chosen_reading: Retain the literal expression 'the hand of our God was upon us'
    in the main text
  alternative_readings:
  - our God protected us
  - our God was watching over us
  rationale: The Hebrew explicitly uses the idiom of God's hand, a recurring theological
    motif in Ezra-Nehemiah for divine favor and protection. Preserving the image maintains
    literary and theological continuity without obscuring meaning.
  doctrine_reference: Translation philosophy §§1, 3, 6
