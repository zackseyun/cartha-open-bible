id: EZR.8.31
reference: Ezra 8:31
source:
  edition: WLC
  text: וַֽ/נִּסְעָ֞/ה מִ/נְּהַ֣ר אַֽהֲוָ֗א בִּ/שְׁנֵ֤ים עָשָׂר֙ לַ/חֹ֣דֶשׁ הָ/רִאשׁ֔וֹן
    לָ/לֶ֖כֶת יְרוּשָׁלִָ֑ם וְ/יַד אֱלֹהֵ֨י/נוּ֙ הָיְתָ֣ה עָלֵ֔י/נוּ וַ/יַּ֨צִּילֵ֔/נוּ
    מִ/כַּ֥ף אוֹיֵ֛ב וְ/אוֹרֵ֖ב עַל הַ/דָּֽרֶךְ־־׃
translation:
  text: Then we set out from the river Ahava on the twelfth day of the first month
    to go to Jerusalem, and the hand of our God was upon us, and he delivered us from
    the hand of the enemy and the ambushes along the way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the ambusher' or 'from one lying in wait.' The Hebrew participle
      can refer either to the person lying in wait or, by English idiom, to the danger
      of ambush.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנִּסְעָה
  chosen: Then we set out
  alternatives:
  - Then we departed
  - Then we journeyed
  lexicon: HALOT
  rationale: The verb נסע in this travel context means to pull up camp and depart.
    'Set out' is natural modern English and preserves the narrative movement better
    than the more formal 'departed.' The prefixed waw is represented with 'Then' to
    maintain sequence.
- source_word: מִנְּהַר אֲהֲוָא
  chosen: from the river Ahava
  alternatives:
  - from the Ahava River
  lexicon: HALOT
  rationale: נָהָר is straightforwardly 'river.' The place name is transliterated
    as 'Ahava' in keeping with the philosophy of transliterating names.
- source_word: בִּשְׁנֵים עָשָׂר לַחֹדֶשׁ הָרִאשׁוֹן
  chosen: on the twelfth day of the first month
  alternatives:
  - on the twelfth of the first month
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'on twelve of the first month,' with
    'day' understood. English normally supplies 'day' for clarity.
- source_word: לָלֶכֶת יְרוּשָׁלִָם
  chosen: to go to Jerusalem
  alternatives:
  - to travel to Jerusalem
  lexicon: HALOT
  rationale: The infinitive of הלך expresses purpose. 'To go to Jerusalem' is the
    most direct rendering; 'travel' is possible but less literal.
- source_word: וְיַד אֱלֹהֵינוּ הָיְתָה עָלֵינוּ
  chosen: and the hand of our God was upon us
  alternatives:
  - and our God's hand was over us
  - and the hand of our God was on us
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for God's active favor and protection.
    The literal image should be preserved rather than paraphrased away, since it is
    intelligible in English and theologically significant in Ezra.
- source_word: וַיַּצִּילֵנוּ
  chosen: and he delivered us
  alternatives:
  - and he rescued us
  - and he saved us
  lexicon: HALOT
  rationale: נצל commonly means to deliver or rescue from danger. 'Delivered' fits
    the formal register of the narrative and pairs well with the following prepositional
    phrases.
- source_word: מִכַּף אוֹיֵב
  chosen: from the hand of the enemy
  alternatives:
  - from the grasp of the enemy
  - from the power of the enemy
  lexicon: HALOT
  rationale: כַּף literally means 'palm/hand,' and in this idiom denotes power or
    control. Retaining 'hand' preserves the Hebrew parallel with 'the hand of our
    God' while remaining understandable in English.
- source_word: וְאוֹרֵב
  chosen: and from ambush
  alternatives:
  - and from the ambusher
  - and from one lying in wait
  lexicon: HALOT
  rationale: The participle ארב can denote one lying in wait, but English idiom after
    'delivered us from' is smoother with the abstract/concrete sense 'from ambush.'
    This captures hostile danger on the route without awkwardness.
- source_word: עַל הַדָּרֶךְ
  chosen: along the way
  alternatives:
  - on the road
  - on the journey
  lexicon: HALOT
  rationale: Literally 'on the way/road.' 'Along the way' is idiomatic English in
    a travel narrative and naturally modifies the threat of ambush during the journey.
