id: EZR.8.33
reference: Ezra 8:33
source:
  edition: WLC
  text: וּ/בַ/יּ֣וֹם הָ/רְבִיעִ֡י נִשְׁקַ֣ל הַ/כֶּסֶף֩ וְ/הַ/זָּהָ֨ב וְ/הַ/כֵּלִ֜ים
    בְּ/בֵ֣ית אֱלֹהֵ֗י/נוּ עַ֠ל יַד מְרֵמ֤וֹת בֶּן אֽוּרִיָּה֙ הַ/כֹּהֵ֔ן וְ/עִמּ֖/וֹ
    אֶלְעָזָ֣ר בֶּן פִּֽינְחָ֑ס וְ/עִמָּ/הֶ֞ם יוֹזָבָ֧ד בֶּן יֵשׁ֛וּעַ וְ/נֽוֹעַדְיָ֥ה
    בֶן בִּנּ֖וּי הַ/לְוִיִּֽם־־־־־׃
translation:
  text: And on the fourth day, the silver and the gold and the vessels were weighed
    in the house of our God into the hand of Meremoth son of Uriah the priest, and
    with him was Eleazar son of Phinehas, and with them were Jozabad son of Jeshua
    and Noadiah son of Binnui, the Levites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the charge of Meremoth son of Uriah the priest.' The Hebrew idiom
      literally reads 'into the hand of.'
    reason: lexical_alternative
  - marker: b
    text: That is, temple vessels or articles.
    reason: cultural_note
lexical_decisions:
- source_word: וּבַיּוֹם הָרְבִיעִי
  chosen: And on the fourth day
  alternatives:
  - And on the fourth day after that
  - Now on the fourth day
  lexicon: HALOT
  rationale: Temporal phrase with prefixed conjunction and preposition is most naturally
    rendered as a narrative continuation, 'And on the fourth day.' This preserves
    the sequence from the prior context without adding unwarranted detail.
- source_word: נִשְׁקַל
  chosen: were weighed
  alternatives:
  - was weighed
  lexicon: HALOT
  rationale: The Niphal perfect 3ms is formally singular, but the compound subject
    'the silver and the gold and the vessels' is naturally rendered with an English
    plural verb. Passive 'were weighed' best reflects the Hebrew stem and the administrative
    action described.
- source_word: הַכֶּסֶף וְהַזָּהָב וְהַכֵּלִים
  chosen: the silver and the gold and the vessels
  alternatives:
  - the silver and the gold and the articles
  - the silver, the gold, and the utensils
  lexicon: HALOT
  rationale: '''Vessels'' is a standard and sufficiently clear rendering of כֵּלִים
    in temple-inventory context, referring to cultic objects or containers. It preserves
    the concrete sense better than the broader ''articles.'''
- source_word: בְּבֵית אֱלֹהֵינוּ
  chosen: in the house of our God
  alternatives:
  - at the house of our God
  - in the temple of our God
  lexicon: HALOT
  rationale: Literally 'in the house of our God.' Although this refers to the temple,
    'house of our God' preserves the Hebrew expression and its covenantal tone without
    over-paraphrasing.
- source_word: עַל יַד
  chosen: into the hand of
  alternatives:
  - under the authority of
  - by the hand of
  - in the charge of
  lexicon: HALOT
  rationale: The idiom denotes entrusting or placing under someone's custody. 'Into
    the hand of' is slightly more formal but remains intelligible and preserves the
    Hebrew imagery of transfer into responsible custody.
- source_word: מְרֵמוֹת בֶּן אֽוּרִיָּה הַכֹּהֵן
  chosen: Meremoth son of Uriah the priest
  alternatives:
  - Meremoth, son of Uriah the priest
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy. 'The priest'
    most naturally apposes Meremoth in context.
- source_word: וְעִמּוֹ
  chosen: and with him was
  alternatives:
  - and Eleazar son of Phinehas was with him
  - with him also was
  lexicon: HALOT
  rationale: This preserves the Hebrew coordination and keeps the focus on the accompanying
    officials without unnecessary restructuring.
- source_word: וְעִמָּהֶם
  chosen: and with them were
  alternatives:
  - and accompanying them were
  - and with them was
  lexicon: HALOT
  rationale: Plural pronoun requires plural English. This introduces the additional
    pair of officials in a way that mirrors the Hebrew syntax.
- source_word: יוֹזָבָד בֶּן יֵשׁוּעַ וְנֹעַדְיָה בֶן בִּנּוּי הַלְוִיִּם
  chosen: Jozabad son of Jeshua and Noadiah son of Binnui, the Levites
  alternatives:
  - Jozabad son of Jeshua and Noadiah son of Binnui, who were Levites
  lexicon: HALOT
  rationale: The final plural noun 'the Levites' identifies the last two named men
    collectively. The appositional rendering is concise and faithful; adding 'who
    were' is interpretive and unnecessary.
