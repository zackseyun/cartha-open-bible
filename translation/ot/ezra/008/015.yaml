id: EZR.8.15
reference: Ezra 8:15
source:
  edition: WLC
  text: וָֽ/אֶקְבְּצֵ֗/ם אֶל הַ/נָּהָר֙ הַ/בָּ֣א אֶֽל אַהֲוָ֔א וַ/נַּחֲנֶ֥ה שָׁ֖ם
    יָמִ֣ים שְׁלֹשָׁ֑ה וָ/אָבִ֤ינָ/ה בָ/עָם֙ וּ/בַ/כֹּ֣הֲנִ֔ים וּ/מִ/בְּנֵ֥י לֵוִ֖י
    לֹא מָצָ֥אתִי שָֽׁם־־־׃
translation:
  text: I gathered them to the river that comes to Ahava, and we camped there three
    days. Then I examined the people and the priests, but I found none of the sons
    of Levi there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the canal that goes to Ahava.' The Hebrew term can denote a river or
      a man-made watercourse in this setting.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''of the sons of Levi,'' that is, Levites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶקְבְּצֵם
  chosen: I gathered them
  alternatives:
  - I assembled them
  lexicon: HALOT
  rationale: קבץ commonly means to gather or assemble. 'Gathered' is natural modern
    English and preserves Ezra's active role in bringing the group together.
- source_word: הַנָּהָר הַבָּא אֶל אַהֲוָא
  chosen: the river that comes to Ahava
  alternatives:
  - the river flowing to Ahava
  - the canal that goes to Ahava
  lexicon: HALOT
  rationale: נָהָר is normally 'river,' though in exilic/post-exilic contexts it can
    denote a canal or watercourse. הַבָּא literally 'that comes/goes' is retained
    with a relative sense. 'That comes to Ahava' stays close to the Hebrew while remaining
    readable.
- source_word: וַנַּחֲנֶה
  chosen: we camped
  alternatives:
  - we encamped
  lexicon: HALOT
  rationale: חנה means to camp or encamp. 'We camped' is the clearer modern equivalent.
- source_word: יָמִים שְׁלֹשָׁה
  chosen: three days
  lexicon: HALOT
  rationale: Straightforward numeral expression; standard English order is reversed
    from Hebrew.
- source_word: וָאָבִינָה
  chosen: I examined
  alternatives:
  - I considered
  - I understood
  - I inspected
  lexicon: HALOT
  rationale: From בין in the Hiphil-like usage here, the sense is giving careful attention
    or discerning after inspection. In context Ezra is reviewing the composition of
    the group, so 'I examined' best conveys the practical sense.
- source_word: בָעָם
  chosen: the people
  alternatives:
  - the laypeople
  lexicon: HALOT
  rationale: עָם here refers to the assembled community generally, distinguished from
    priests and Levites. 'The people' is the most direct rendering.
- source_word: וּבַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֲנִים.
- source_word: וּמִבְּנֵי לֵוִי
  chosen: of the sons of Levi
  alternatives:
  - of the Levites
  - from the sons of Levi
  lexicon: HALOT
  rationale: Literally 'from the sons of Levi.' The phrase denotes Levitical descendants.
    The more literal 'sons of Levi' is preserved in the main text to reflect the Hebrew
    expression and genealogical emphasis.
- source_word: לֹא מָצָאתִי שָׁם
  chosen: I found none ... there
  alternatives:
  - I did not find any ... there
  lexicon: HALOT
  rationale: The negated perfect with implied object is idiomatically rendered 'I
    found none ... there,' which is concise and natural in English while preserving
    the force of absence.
