id: EZR.8.7
reference: Ezra 8:7
source:
  edition: WLC
  text: וּ/מִ/בְּנֵ֣י עֵילָ֔ם יְשַֽׁעְיָ֖ה בֶּן עֲתַלְיָ֑ה וְ/עִמּ֖/וֹ שִׁבְעִ֥ים
    הַ/זְּכָרִֽים־׃ס
translation:
  text: 'And from the sons of Elam: Jeshaiah son of Athaliah, and with him seventy
    males.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "seventy men." The Hebrew more specifically says "the males."
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  chosen: And from the sons of
  alternatives:
  - And from the descendants of
  - And from the family of
  lexicon: HALOT
  rationale: The compound conjunction and preposition with בנים introduces the next
    clan in Ezra's list. "Sons of" is the most direct rendering of בְּנֵי and preserves
    the genealogical/list structure, though in context it denotes members or descendants
    of the family line rather than only immediate sons.
- source_word: עֵילָם
  chosen: Elam
  lexicon: HALOT
  rationale: Proper name; transliterated per translation philosophy for personal/family
    names.
- source_word: יְשַׁעְיָה
  chosen: Jeshaiah
  alternatives:
  - Jeshaia
  lexicon: HALOT
  rationale: Proper name; standard English transliteration retained. "Jeshaiah" is
    a familiar and clear representation of the Hebrew form.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In this immediate patronymic construction, "son of" is the natural and
    formally accurate rendering.
- source_word: עֲתַלְיָה
  chosen: Athaliah
  lexicon: HALOT
  rationale: Proper name; transliterated.
- source_word: וְ/עִמּוֹ
  chosen: and with him
  alternatives:
  - with him
  lexicon: HALOT
  rationale: 'The conjunction plus preposition marks accompaniment in the list. Rendering
    both elements keeps the cadence of the register: named leader followed by the
    number accompanying him.'
- source_word: שִׁבְעִים
  chosen: seventy
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: הַזְּכָרִים
  chosen: males
  alternatives:
  - men
  lexicon: HALOT
  rationale: The Hebrew explicitly says "the males," not the more general term for
    men. "Males" preserves the gender-specific and somewhat administrative sense of
    the census-style listing better than "men."
