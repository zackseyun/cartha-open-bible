id: EZR.8.8
reference: Ezra 8:8
source:
  edition: WLC
  text: וּ/מִ/בְּנֵ֣י שְׁפַטְיָ֔ה זְבַדְיָ֖ה בֶּן מִֽיכָאֵ֑ל וְ/עִמּ֖/וֹ שְׁמֹנִ֥ים
    הַ/זְּכָרִֽים־׃ס
translation:
  text: 'And from the sons of Shephatiah: Zebadiah son of Michael, and with him eighty
    males.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of' may denote a broader clan line, that is, 'descendants of,'
      not necessarily immediate sons.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  chosen: And from the sons of
  alternatives:
  - And from the descendants of
  - And from the family of
  lexicon: HALOT
  rationale: The phrase literally combines conjunction + preposition + 'sons of.'
    In this genealogical/list context, 'sons of' is a conventional Hebrew clan designation
    and can denote descendants, not only immediate sons. 'From the sons of' preserves
    the source form while remaining natural in English.
- source_word: שְׁפַטְיָה
  chosen: Shephatiah
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: זְבַדְיָה
  chosen: Zebadiah
  rationale: Personal name transliterated by standard convention.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In immediate apposition to a named father, the ordinary genealogical
    sense 'son of' is most natural and sufficiently precise.
- source_word: מִיכָאֵל
  chosen: Michael
  rationale: Personal name transliterated by standard convention.
- source_word: וְ/עִמּוֹ
  chosen: and with him
  alternatives:
  - with him
  lexicon: HALOT
  rationale: The conjunction is retained to mirror the list structure of the passage,
    where each entry adds the leader and the number accompanying him.
- source_word: שְׁמֹנִים
  chosen: eighty
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: הַזְּכָרִים
  chosen: males
  alternatives:
  - men
  - male persons
  lexicon: HALOT
  rationale: The Hebrew specifically denotes males. 'Males' is more lexically exact
    than 'men,' since the term marks sex rather than age or social status. This also
    aligns with the gender-accurate principle.
