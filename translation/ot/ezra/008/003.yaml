id: EZR.8.3
reference: Ezra 8:3
source:
  edition: WLC
  text: מִ/בְּנֵ֣י שְׁכַנְיָ֔ה מִ/בְּנֵ֥י פַרְעֹ֖שׁ זְכַרְיָ֑ה וְ/עִמּ֛/וֹ הִתְיַחֵ֥שׂ
    לִ/זְכָרִ֖ים מֵאָ֥ה וַ/חֲמִשִּֽׁיםס׃ס
translation:
  text: 'From the sons of Shecaniah, from the sons of Parosh: Zechariah, and with
    him were enrolled by genealogy 150 males.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were registered by genealogy 150 males.' The Hebrew verb refers to formal
      genealogical enrollment or reckoning.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבְּנֵי
  chosen: From the sons of
  alternatives:
  - Of the sons of
  - From among the sons of
  lexicon: HALOT
  rationale: The preposition מִן with בְּנֵי introduces a subgroup within the larger
    returnee list. 'From the sons of' is natural English while preserving the genealogical/list
    structure.
- source_word: שְׁכַנְיָה
  chosen: Shecaniah
  alternatives:
  - Shechaniah
  rationale: Standard English transliteration of the personal name; spelling variation
    exists, but 'Shecaniah' is common and recognizable.
- source_word: פַרְעֹשׁ
  chosen: Parosh
  rationale: Standard transliteration of the family name in Ezra.
- source_word: זְכַרְיָה
  chosen: Zechariah
  alternatives:
  - Zekariah
  rationale: Standard English transliteration of the personal name.
- source_word: וְעִמּוֹ
  chosen: and with him
  alternatives:
  - and accompanying him
  - and with him there were
  lexicon: HALOT
  rationale: The phrase marks those associated with Zechariah in the register. 'And
    with him' preserves the compact Hebrew coordination.
- source_word: הִתְיַחֵשׂ
  chosen: were enrolled by genealogy
  alternatives:
  - were registered by genealogy
  - were reckoned by genealogy
  - were listed in the genealogy
  lexicon: HALOT
  rationale: The hitpael of יחס refers to being entered or reckoned in a genealogical
    register. 'Were enrolled by genealogy' conveys formal registration rather than
    mere biological descent.
- source_word: לִזְכָרִים
  chosen: males
  alternatives:
  - men
  - male persons
  lexicon: HALOT
  rationale: The Hebrew explicitly specifies sex rather than adult status. 'Males'
    is more precise than 'men' and follows the gender-accurate principle.
- source_word: מֵאָה וַחֲמִשִּׁים
  chosen: '150'
  alternatives:
  - one hundred fifty
  rationale: Rendered as a numeral for readability in a census-style list while preserving
    the exact count.
