id: EZR.8.20
reference: Ezra 8:20
source:
  edition: WLC
  text: וּ/מִן הַ/נְּתִינִ֗ים שֶׁ/נָּתַ֨ן דָּוִ֤יד וְ/הַ/שָּׂרִים֙ לַ/עֲבֹדַ֣ת הַ/לְוִיִּ֔ם
    נְתִינִ֖ים מָאתַ֣יִם וְ/עֶשְׂרִ֑ים כֻּלָּ֖/ם נִקְּב֥וּ בְ/שֵׁמֽוֹת־׃
translation:
  text: And from the temple servants whom David and the officials had assigned to
    the service of the Levites, there were 220 temple servants; all of them were designated
    by name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew נְתִינִים (Nethinim), a technical term for a class of temple servants.
    reason: lexical_alternative
  - marker: b
    text: Or 'all of them were listed by name.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַנְּתִינִים / נְתִינִים
  chosen: temple servants
  alternatives:
  - Nethinim
  - given ones
  - servants
  lexicon: HALOT
  rationale: The term refers to a recognized class attached to temple service, not
    merely generic servants. 'Temple servants' translates the function clearly for
    modern readers, while 'Nethinim' is preserved as a possible alternative but would
    be opaque without explanation.
- source_word: שֶׁנָּתַן
  chosen: had assigned
  alternatives:
  - gave
  - appointed
  lexicon: HALOT
  rationale: Although the verb is literally 'gave,' in this administrative context
    with persons assigned for cultic labor, 'had assigned' best conveys the sense
    in idiomatic English without obscuring the underlying act of designation.
- source_word: וְהַשָּׂרִים
  chosen: the officials
  alternatives:
  - the princes
  - the leaders
  lexicon: HALOT
  rationale: In this postexilic administrative setting, 'officials' communicates the
    governing role more naturally than the more archaic 'princes,' while remaining
    faithful to the social rank indicated by the Hebrew.
- source_word: לַעֲבֹדַת הַלְוִיִּם
  chosen: to the service of the Levites
  alternatives:
  - for the work of the Levites
  - for serving the Levites
  lexicon: HALOT
  rationale: The phrase most naturally indicates assignment to support the Levites
    in their service. 'To the service of the Levites' preserves the cultic/work sense
    of עֲבֹדָה without overinterpreting whether they served alongside or under the
    Levites.
- source_word: מָאתַיִם וְעֶשְׂרִים
  chosen: '220'
  alternatives:
  - two hundred and twenty
  lexicon: HALOT
  rationale: Using numerals improves readability in modern English while preserving
    the exact number.
- source_word: כֻּלָּם
  chosen: all of them
  alternatives:
  - all
  lexicon: HALOT
  rationale: The fuller English phrase preserves the distributive emphasis of the
    Hebrew suffix construction.
- source_word: נִקְּבוּ בְשֵׁמוֹת
  chosen: were designated by name
  alternatives:
  - were listed by name
  - were specified by name
  - were called by names
  lexicon: HALOT
  rationale: The passive of נקב with 'by names' indicates explicit identification
    or registration. 'Were designated by name' captures the formal, administrative
    nuance; 'listed by name' is also possible, but 'designated' better reflects the
    act of being specifically named.
