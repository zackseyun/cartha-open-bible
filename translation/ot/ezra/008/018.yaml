theological_decisions:
- issue: Rendering the providential idiom about God's hand
  chosen_reading: by the good hand of our God upon us
  alternative_readings:
  - as the good hand of our God was upon us
  rationale: The phrase expresses divine favor and providence without requiring interpretive
    expansion. The chosen wording preserves the metaphor and avoids flattening it
    into a purely abstract statement of blessing.
  doctrine_reference: Translation philosophy §1, §3
