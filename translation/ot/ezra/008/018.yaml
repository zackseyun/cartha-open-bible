id: EZR.8.18
reference: Ezra 8:18
source:
  edition: WLC
  text: וַ/יָּבִ֨יאּוּ לָ֜/נוּ כְּ/יַד אֱלֹהֵ֨י/נוּ הַ/טּוֹבָ֤ה עָלֵ֨י/נוּ֙ אִ֣ישׁ
    שֶׂ֔כֶל מִ/בְּנֵ֣י מַחְלִ֔י בֶּן לֵוִ֖י בֶּן יִשְׂרָאֵ֑ל וְ/שֵׁרֵֽבְיָ֛ה וּ/בָנָ֥י/ו
    וְ/אֶחָ֖י/ו שְׁמֹנָ֥ה עָשָֽׂר־־־׃
translation:
  text: And by the good hand of our God upon us, they brought to us a man of insight
    from the sons of Mahli son of Levi, son of Israel—namely Sherebiah, and his sons
    and his brothers, eighteen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'as the good hand of our God was upon us.' The Hebrew idiom speaks of
      God's favorable providence.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבִיאוּ
  chosen: they brought
  alternatives:
  - they brought in
  - they led
  lexicon: HALOT
  rationale: Hiphil of בוא commonly means 'bring' or 'cause to come.' 'They brought'
    is the most natural English rendering in this narrative context.
- source_word: כְּיַד אֱלֹהֵינוּ הַטּוֹבָה עָלֵינוּ
  chosen: by the good hand of our God upon us
  alternatives:
  - according to the good hand of our God upon us
  - as the good hand of our God was upon us
  lexicon: HALOT
  rationale: This idiom in Ezra-Nehemiah denotes God's favorable providential action.
    'By the good hand of our God upon us' preserves the Hebrew imagery while remaining
    readable.
- source_word: אִישׁ שֶׂכֶל
  chosen: a man of insight
  alternatives:
  - a wise man
  - a man of discretion
  - a skilled man
  lexicon: HALOT
  rationale: שׂכל here refers to prudence, understanding, or insight rather than merely
    technical skill. 'A man of insight' preserves both the masculine singular form
    and the sense of discernment.
- source_word: מִבְּנֵי מַחְלִי
  chosen: from the sons of Mahli
  alternatives:
  - from the descendants of Mahli
  - from the family of Mahli
  lexicon: HALOT
  rationale: בני literally means 'sons,' but in genealogical contexts can mean descendants.
    Here 'from the sons of Mahli' keeps the Hebrew form and fits the lineage notice.
- source_word: בֶּן לֵוִי בֶּן יִשְׂרָאֵל
  chosen: son of Levi, son of Israel
  alternatives:
  - descendant of Levi, descendant of Israel
  lexicon: HALOT
  rationale: The repeated בן is a standard genealogical formula. Rendering it literally
    preserves the structure and emphasis of the lineage.
- source_word: וְשֵׁרֵבְיָה
  chosen: namely Sherebiah
  alternatives:
  - and Sherebiah
  lexicon: HALOT
  rationale: The conjunction introduces the specific individual just described. English
    'namely' clarifies apposition better than a bare 'and'.
- source_word: וּבָנָיו וְאֶחָיו
  chosen: and his sons and his brothers
  alternatives:
  - along with his sons and brothers
  lexicon: HALOT
  rationale: A straightforward rendering preserves the familial relations attached
    to Sherebiah.
- source_word: שְׁמֹנָה עָשָׂר
  chosen: eighteen
  alternatives:
  - eighteen men
  lexicon: HALOT
  rationale: The Hebrew gives the number without repeating a noun. 'Eighteen' is sufficient
    in English; adding 'men' would slightly overtranslate.
