id: EZR.8.16
reference: Ezra 8:16
source:
  edition: WLC
  text: וָ/אֶשְׁלְחָ֡/ה לֶ/אֱלִיעֶ֡זֶר לַ/אֲרִיאֵ֡ל לִֽ֠/שְׁמַעְיָה וּ/לְ/אֶלְנָתָ֨ן
    וּ/לְ/יָרִ֜יב וּ/לְ/אֶלְנָתָ֧ן וּ/לְ/נָתָ֛ן וְ/לִ/זְכַרְיָ֥ה וְ/לִ/מְשֻׁלָּ֖ם
    רָאשִׁ֑ים וּ/לְ/יוֹיָרִ֥יב וּ/לְ/אֶלְנָתָ֖ן מְבִינִֽים׃
translation:
  text: Then I sent for Eliezer, Ariel, Shemaiah, Elnathan, Jarib, Elnathan, Nathan,
    Zechariah, and Meshullam, heads, and for Joiarib and Elnathan, men of understanding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'leaders' for 'heads' (Hebrew literally 'heads').
    reason: lexical_alternative
  - marker: b
    text: '''Men of understanding'' may also be rendered ''men of insight'' or ''learned
      men.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁלְחָה
  chosen: Then I sent for
  alternatives:
  - So I sent
  - Then I sent
  lexicon: HALOT
  rationale: Wayyiqtol of שׁלח introduces the next action in narrative sequence. 'Sent
    for' fits the English idiom here because the object is a list of persons summoned
    to Ezra, not merely recipients of a dispatched message.
- source_word: לֶאֱלִיעֶזֶר ... וּלְאֶלְנָתָן
  chosen: for Eliezer ... and Elnathan
  alternatives:
  - to Eliezer ... and Elnathan
  lexicon: HALOT
  rationale: The repeated ל marks the persons to whom Ezra directed the summons. In
    English, with 'sent for,' the preposition is naturally absorbed as 'for' rather
    than repeated as 'to'.
- source_word: רָאשִׁים
  chosen: heads
  alternatives:
  - chief men
  - leaders
  lexicon: HALOT
  rationale: Literally 'heads.' In context it denotes persons of leading status. 'Heads'
    is retained in the main text with a relative clause to preserve the concrete Hebrew
    expression while remaining intelligible.
- source_word: מְבִינִים
  chosen: men of understanding
  alternatives:
  - men of insight
  - teachers
  - wise men
  lexicon: HALOT
  rationale: Participle of בין, 'understanding/discerning.' Here it likely describes
    men known for discernment or learning. 'Men of understanding' preserves the lexical
    sense without over-specifying an official role such as 'teachers.'
- source_word: וּלְיוֹיָרִיב וּלְאֶלְנָתָן מְבִינִים
  chosen: and for Joiarib and Elnathan, who were men of understanding
  alternatives:
  - and Joiarib and Elnathan, men of understanding
  lexicon: HALOT
  rationale: The final appositional phrase most naturally modifies the last two names,
    distinguishing them from the previous group called 'heads.' The relative clause
    makes that distinction clear in English.
- source_word: יוֹיָרִיב
  chosen: Joiarib
  alternatives:
  - Jehoiarib
  lexicon: HALOT
  rationale: A standard English transliteration for this proper name in Ezra is 'Joiarib.'
    'Jehoiarib' is a possible fuller transliteration, but 'Joiarib' is more conventional
    in this context.
- source_word: אֶלְנָתָן (repeated)
  chosen: Elnathan
  lexicon: HALOT
  rationale: The name occurs three times in the verse and should be preserved each
    time rather than harmonized away; the repetition reflects the source text and
    likely refers to different individuals sharing the same name.
