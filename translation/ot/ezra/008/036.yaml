id: EZR.8.36
reference: Ezra 8:36
source:
  edition: WLC
  text: וַֽ/יִּתְּנ֣וּ אֶת דָּתֵ֣י הַ/מֶּ֗לֶךְ לַ/אֲחַשְׁדַּרְפְּנֵי֙ הַ/מֶּ֔לֶךְ
    וּ/פַחֲו֖וֹת עֵ֣בֶר הַ/נָּהָ֑ר וְ/נִשְּׂא֥וּ אֶת הָ/עָ֖ם וְ/אֶת בֵּֽית הָ/אֱלֹהִֽים׀־־־־׃ס
translation:
  text: And they delivered the king’s decrees to the king’s satraps and the governors
    Beyond the River, and they supported the people and the house of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “helped” / “assisted”; the Hebrew verb literally means “lifted up” or
      “carried,” here in the sense of giving support.
    reason: lexical_alternative
  - marker: b
    text: “Beyond the River” is the Persian administrative term for the region west
      of the Euphrates.
    reason: cultural_note
  - marker: c
    text: Or “the temple of God.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  chosen: they delivered
  alternatives:
  - they gave
  - they handed over
  lexicon: HALOT
  rationale: נתן literally means 'give,' but in the context of official documents
    being presented to imperial authorities, 'delivered' best conveys formal transmission
    without over-paraphrasing.
- source_word: דָּתֵי הַמֶּלֶךְ
  chosen: the king’s decrees
  alternatives:
  - the king’s laws
  - the king’s edicts
  lexicon: HALOT
  rationale: דָּת in Persian-period contexts commonly refers to official legal directives
    or decrees. 'Decrees' fits the administrative setting and avoids implying a full
    legal code.
- source_word: אֲחַשְׁדַּרְפְּנֵי
  chosen: satraps
  alternatives:
  - provincial officials
  lexicon: HALOT
  rationale: This is the standard term for Persian provincial rulers. 'Satraps' is
    the historically precise English equivalent and is sufficiently established in
    modern Bible translation.
- source_word: פַחֲוֹת
  chosen: governors
  alternatives:
  - provincial governors
  - officials
  lexicon: HALOT
  rationale: פחה refers to regional governors or administrators. 'Governors' is the
    clearest natural rendering in English.
- source_word: עֵבֶר הַנָּהָר
  chosen: Beyond the River
  alternatives:
  - across the River
  - the province Beyond the River
  lexicon: HALOT
  rationale: This is a standard Persian administrative designation for the region
    west of the Euphrates. Capitalizing 'Beyond the River' reflects its quasi-technical
    geographical-administrative use in Ezra.
- source_word: וְנִשְּׂאוּ
  chosen: they supported
  alternatives:
  - they assisted
  - they lifted up
  - they helped
  lexicon: HALOT
  rationale: נשא literally means 'lift, carry, bear,' but here in relation to 'the
    people and the house of God' it idiomatically indicates giving support or assistance.
    'Supported' preserves the sense of practical backing without becoming too interpretive.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the people of Israel
  - the community
  lexicon: HALOT
  rationale: The Hebrew simply says 'the people.' No narrower identification should
    be imported into the text.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: HALOT
  rationale: The phrase literally means 'house of God.' This is a common temple designation,
    but the more literal rendering preserves the Hebrew expression while remaining
    clear in English.
