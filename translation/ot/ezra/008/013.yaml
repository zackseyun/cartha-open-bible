id: EZR.8.13
reference: Ezra 8:13
source:
  edition: WLC
  text: וּ/מִ/בְּנֵ֣י אֲדֹנִיקָם֮ אַחֲרֹנִים֒ וְ/אֵ֣לֶּה שְׁמוֹתָ֔/ם אֱלִיפֶ֖לֶט יְעִיאֵ֣ל
    וּֽ/שְׁמַעְיָ֑ה וְ/עִמָּ/הֶ֖ם שִׁשִּׁ֥ים הַ/זְּכָרִֽים׃ס
translation:
  text: 'And from the sons of Adonikam, the last ones: and these were their names:
    Eliphelet, Jeiel, and Shemaiah, and with them sixty males.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the latter ones' or 'the last.' The Hebrew likely identifies this as
      the final group from the line of Adonikam, possibly in distinction from an earlier
      group listed elsewhere.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִבְּנֵי
  chosen: And from the sons of
  alternatives:
  - And from the descendants of
  - And from the family of
  lexicon: HALOT
  rationale: בְּנֵי literally means 'sons of,' but in genealogical/list contexts can
    denote descendants or members of a family line. 'Sons of' preserves the Hebrew
    form and the list structure while remaining understandable in English.
- source_word: אֲדֹנִיקָם
  chosen: Adonikam
  rationale: 'Personal name transliterated according to the translation philosophy:
    translate titles, transliterate names.'
- source_word: אַחֲרֹנִים
  chosen: the last ones
  alternatives:
  - the latter ones
  - the later ones
  - the last
  lexicon: HALOT
  rationale: אַחֲרֹנִים means 'last, latter, later.' In this context it likely distinguishes
    a final subgroup of Adonikam's descendants, perhaps in contrast to an earlier
    group in Ezra 2:13. 'The last ones' preserves the adjectival force and the likely
    sense of finality.
- source_word: וְאֵלֶּה שְׁמוֹתָם
  chosen: and these were their names
  alternatives:
  - and these are their names
  - and these their names
  lexicon: HALOT
  rationale: A standard list-introducing formula. Although the Hebrew lacks an explicit
    finite verb, idiomatic English supplies 'were' in this narrative/list context.
- source_word: אֱלִיפֶלֶט
  chosen: Eliphelet
  rationale: Personal name transliterated.
- source_word: יְעִיאֵל
  chosen: Jeiel
  alternatives:
  - Jeiel
  rationale: Personal name transliterated by standard English convention.
- source_word: וּשְׁמַעְיָה
  chosen: and Shemaiah
  rationale: Personal name transliterated; conjunction retained to mirror the Hebrew
    list.
- source_word: וְעִמָּהֶם
  chosen: and with them
  alternatives:
  - with them
  lexicon: HALOT
  rationale: עִם with pronominal suffix indicates accompaniment. Retaining 'and' reflects
    the Hebrew coordination and list style.
- source_word: שִׁשִּׁים
  chosen: sixty
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: הַזְּכָרִים
  chosen: males
  alternatives:
  - men
  - male persons
  lexicon: HALOT
  rationale: זְכָרִים specifically denotes males. 'Males' is more precise than 'men'
    here, since the term marks sex rather than social status or age. This also aligns
    with the gender-accurate principle.
