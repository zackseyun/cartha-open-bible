id: EZR.8.14
reference: Ezra 8:14
source:
  edition: WLC
  text: וּ/מִ/בְּנֵ֥י בִגְוַ֖י עוּתַ֣י ו/זבוד וְ/עִמּ֖/וֹ שִׁבְעִ֥ים הַ/זְּכָרִֽים׃פ
translation:
  text: 'And from the sons of Bigvai: Uthai and Zabbud, and with him seventy males.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads 'with him' (singular), though some translations smooth this
      to 'with them' because two names are mentioned.
    reason: lexical_alternative
  - marker: b
    text: Some textual traditions and ancient versions reflect a different second
      name here; the Masoretic Text reads 'Zabbud.'
    reason: textual_variant
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  chosen: And from the sons of
  alternatives:
  - And from the descendants of
  - And from the family of
  lexicon: HALOT
  rationale: מִן + בְּנֵי introduces another clan/family group in Ezra's list. 'Sons
    of' is the most direct rendering and preserves the genealogical/list structure,
    though it can denote descendants more broadly.
- source_word: בִגְוַי
  chosen: Bigvai
  rationale: Proper personal/family name; transliterated per translation philosophy.
- source_word: עוּתַי
  chosen: Uthai
  alternatives:
  - Uthaiy
  rationale: Proper name; standard English transliteration favors 'Uthai'.
- source_word: ו/זבוד
  chosen: Zabbud
  alternatives:
  - and Zaccur
  rationale: The consonantal text points to the proper name זבוד, conventionally rendered
    'Zabbud.' The prefixed conjunction is retained as 'and.' An alternate textual
    tradition reflected in some versions reads a different name, but the MT supports
    'Zabbud'.
- source_word: וְ/עִמּ/וֹ
  chosen: and with him
  alternatives:
  - and with them
  lexicon: HALOT
  rationale: 'The preposition עִם with 3ms suffix is singular: ''with him.'' Although
    some may expect a plural after two names, the Hebrew suffix is singular and should
    be preserved in the main text.'
- source_word: שִׁבְעִים
  chosen: seventy
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: הַ/זְּכָרִים
  chosen: males
  alternatives:
  - men
  lexicon: HALOT
  rationale: זְכָרִים specifically denotes males. 'Males' is more precise than 'men,'
    especially in a census/list context, and follows the gender-accurate principle.
