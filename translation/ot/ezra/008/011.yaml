id: EZR.8.11
reference: Ezra 8:11
source:
  edition: WLC
  text: וּ/מִ/בְּנֵ֣י בֵבַ֔י זְכַרְיָ֖ה בֶּן בֵּבָ֑י וְ/עִמּ֕/וֹ עֶשְׂרִ֥ים וּ/שְׁמֹנָ֖ה הַ/זְּכָרִֽים־׃ס
translation:
  text: 'And from the sons of Bebai: Zechariah son of Bebai[a], and with him twenty-eight males.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Bebai' may refer more broadly to descendants or members of Bebai's family line.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִבְּנֵי
  chosen: And from the sons of
  alternatives:
  - And from the descendants of
  - And from the family of
  lexicon: HALOT
  rationale: The phrase literally means 'and from the sons of.' In genealogical/list contexts, 'sons of' can denote descendants or members of a family line, but retaining 'sons of' best reflects the Hebrew form while remaining understandable in English.
- source_word: בֵבַי
  chosen: Bebai
  rationale: 'Proper name transliterated according to the translation philosophy: names are transliterated rather than translated.'
- source_word: זְכַרְיָה
  chosen: Zechariah
  alternatives:
  - Zekhariah
  rationale: Standard English transliteration of the personal name.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In this immediate patronymic construction, 'son of' is the most natural and direct rendering.
- source_word: וְעִמּוֹ
  chosen: and with him
  alternatives:
  - with him
  lexicon: HALOT
  rationale: The conjunction is retained to match the list structure of the passage, and the prepositional phrase indicates those accompanying Zechariah.
- source_word: עֶשְׂרִים וּשְׁמֹנָה
  chosen: twenty-eight
  lexicon: HALOT
  rationale: Straightforward cardinal number rendered idiomatically in English.
- source_word: הַזְּכָרִים
  chosen: males
  alternatives:
  - men
  - male persons
  lexicon: HALOT
  rationale: The Hebrew specifically marks sex ('the males'), not adult status. 'Males' is therefore more precise than 'men,' especially in a census/list context.
