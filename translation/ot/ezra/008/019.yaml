id: EZR.8.19
reference: Ezra 8:19
source:
  edition: WLC
  text: וְ/אֶת חֲשַׁבְיָ֔ה וְ/אִתּ֥/וֹ יְשַֽׁעְיָ֖ה מִ/בְּנֵ֣י מְרָרִ֑י אֶחָ֥י/ו וּ/בְנֵי/הֶ֖ם עֶשְׂרִֽים־׃ס
translation:
  text: and Hashabiah[a], and with him Jeshaiah, from the sons of Merari, his brothers and their sons, twenty[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of the Merarites.' The Hebrew reads literally 'from the sons of Merari.'
    reason: lexical_alternative
  - marker: b
    text: '''His brothers'' likely refers to clan-brothers or close male relatives within the Merarite line, not necessarily only biological brothers.'
    reason: cultural_note
lexical_decisions:
- source_word: וְאֶת
  chosen: and
  alternatives:
  - and [I brought]
  - also
  lexicon: HALOT
  rationale: The conjunction plus object marker continues the list from the previous verse. In English the object marker is not represented directly, so the natural rendering is simply the coordinating 'and,' with the sense of addition carried over from context.
- source_word: חֲשַׁבְיָה
  chosen: Hashabiah
  alternatives:
  - Hashabyah
  lexicon: HALOT
  rationale: Personal name transliterated according to standard English convention, following the translation philosophy to transliterate names rather than translate them.
- source_word: וְאִתּוֹ
  chosen: and with him
  alternatives:
  - with him
  - and alongside him
  lexicon: HALOT
  rationale: The preposition with 3ms suffix indicates accompaniment. 'And with him' preserves the Hebrew coordination and the relational sense.
- source_word: יְשַׁעְיָה
  chosen: Jeshaiah
  alternatives:
  - Jesha'yah
  - Isaiah
  lexicon: HALOT
  rationale: This is a personal name distinct in English convention from the major prophet's usual spelling 'Isaiah.' 'Jeshaiah' is the standard transliteration in this context.
- source_word: מִבְּנֵי מְרָרִי
  chosen: from the sons of Merari
  alternatives:
  - from the descendants of Merari
  - of the Merarites
  lexicon: HALOT
  rationale: Literally 'from the sons of Merari.' This preserves the genealogical idiom while remaining readable. 'Descendants' is possible, but 'sons of' better reflects the Hebrew construction.
- source_word: אֶחָיו
  chosen: his brothers
  alternatives:
  - his kinsmen
  - his fellow Levites
  lexicon: HALOT
  rationale: The noun is the ordinary term for 'brothers' with 3ms suffix. In this genealogical/list context it likely refers to clan-brothers or close male relatives, but 'his brothers' best preserves the source wording without over-interpreting.
- source_word: וּבְנֵיהֶם
  chosen: and their sons
  alternatives:
  - and their children
  - with their sons
  lexicon: HALOT
  rationale: Literally 'and their sons.' The masculine plural and genealogical setting favor the more specific 'sons' rather than the broader 'children.' English does not require an added preposition.
- source_word: עֶשְׂרִים
  chosen: twenty
  alternatives:
  - '20'
  lexicon: HALOT
  rationale: Cardinal number rendered in words in keeping with normal Bible translation style. It most naturally totals the group just mentioned.
