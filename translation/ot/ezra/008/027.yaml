id: EZR.8.27
reference: Ezra 8:27
source:
  edition: WLC
  text: וּ/כְפֹרֵ֤י זָהָב֙ עֶשְׂרִ֔ים לַ/אֲדַרְכֹנִ֖ים אָ֑לֶף וּ/כְלֵ֨י נְחֹ֜שֶׁת
    מֻצְהָ֤ב טוֹבָה֙ שְׁנַ֔יִם חֲמוּדֹ֖ת כַּ/זָּהָֽב׃
translation:
  text: and twenty bowls of gold worth a thousand darics, and two vessels of fine
    gleaming bronze, precious as gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'twenty gold bowls worth one thousand darics.' The Hebrew may be read
      as giving the total valuation of the bowls.
    reason: lexical_alternative
  - marker: b
    text: Or 'two vessels of good burnished bronze.' The rare expression describing
      the bronze likely refers to especially fine, gleaming workmanship.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְפֹרֵי
  chosen: bowls
  alternatives:
  - basins
  - cups
  lexicon: HALOT
  rationale: The noun refers to bowl-like vessels used for valuable contents or temple
    service. 'Bowls' is natural modern English and fits the inventory context better
    than the more technical 'basins' or the narrower 'cups'.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward material term; rendered consistently as 'gold'.
- source_word: עֶשְׂרִים
  chosen: twenty
  rationale: Cardinal number directly rendered.
- source_word: לַאֲדַרְכֹנִים אָלֶף
  chosen: worth a thousand darics
  alternatives:
  - of a thousand darics
  - for a thousand darics
  lexicon: HALOT
  rationale: אדרכונים denotes Persian darics, a coin/weight term. The prefixed ל likely
    marks valuation here, so 'worth a thousand darics' communicates the sense idiomatically
    in English while preserving the historical term 'darics' rather than flattening
    it to a generic 'gold pieces'.
- source_word: וּכְלֵי
  chosen: and ... vessels
  alternatives:
  - and ... articles
  - and ... utensils
  lexicon: HALOT
  rationale: כלי is a broad term for objects/vessels. In a temple-treasury inventory,
    'vessels' is the most fitting and traditional without being archaic.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: נחשת can denote copper or bronze depending on context. For crafted vessels
    in an ancient inventory, 'bronze' is the more likely and idiomatic rendering in
    English.
- source_word: מֻצְהָב
  chosen: polished
  alternatives:
  - gleaming
  - golden-colored
  - burnished
  lexicon: HALOT
  rationale: The form is difficult and traditionally understood as describing a high-quality
    shining finish. Since the vessels are explicitly bronze, rendering it as 'polished'
    avoids implying they were literally gold-plated while preserving the idea of lustrous
    workmanship. 'Burnished' is possible but less accessible.
- source_word: טוֹבָה
  chosen: fine
  alternatives:
  - good
  - excellent
  lexicon: HALOT
  rationale: As an attributive adjective describing quality, 'fine' gives natural
    English for high-grade material/workmanship.
- source_word: שְׁנַיִם
  chosen: two
  rationale: Cardinal number directly rendered.
- source_word: חֲמוּדֹת
  chosen: precious
  alternatives:
  - desirable
  - valuable
  lexicon: HALOT
  rationale: The adjective conveys desirability/high value. 'Precious' fits the comparison
    with gold and reads naturally in English.
- source_word: כַּזָּהָב
  chosen: as gold
  alternatives:
  - like gold
  lexicon: HALOT
  rationale: The comparison is explicit. 'As gold' is concise and idiomatic in the
    clause 'as precious as gold.'
