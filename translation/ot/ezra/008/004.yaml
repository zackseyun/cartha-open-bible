id: EZR.8.4
reference: Ezra 8:4
source:
  edition: WLC
  text: מִ/בְּנֵי֙ פַּחַ֣ת מוֹאָ֔ב אֶלְיְהֽוֹעֵינַ֖י בֶּן זְרַֽחְיָ֑ה וְ/עִמּ֖/וֹ מָאתַ֥יִם הַ/זְּכָרִֽים־׃ס
translation:
  text: 'From the sons of Pahath-moab: Eliehoenai son of Zerahiah[a], and with him two hundred males.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "men." The Hebrew specifically says "the males," emphasizing sex rather than using a more general term for people.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/בְּנֵי
  chosen: From the sons of
  alternatives:
  - From the descendants of
  - Of the sons of
  lexicon: HALOT
  rationale: The construct phrase literally means 'from the sons of.' In this genealogical/list context, 'sons of' is a standard Hebrew clan designation and is best preserved rather than flattened, while 'from' reflects the prefixed preposition מִן.
- source_word: פַּחַת מוֹאָב
  chosen: Pahath-moab
  alternatives:
  - Pahath Moab
  lexicon: HALOT
  rationale: This is a proper family/clan name and should be transliterated, not translated. The hyphenated form is a standard English convention for this name and helps signal that it is one compound proper name.
- source_word: אֶלְיְהוֹעֵינַי
  chosen: Elyhoenai
  alternatives:
  - Eliehoenai
  - Elihoenai
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions. 'Elyhoenai' closely reflects the Hebrew consonants and vowels without attempting to translate the theophoric elements.
- source_word: בֶּן זְרַחְיָה
  chosen: son of Zerahiah
  alternatives:
  - the son of Zerahiah
  lexicon: HALOT
  rationale: The filial relationship is explicit and straightforward. English idiom does not require the article here in a list, so 'son of Zerahiah' is concise and natural.
- source_word: וְ/עִמּוֹ
  chosen: and with him
  alternatives:
  - with him
  lexicon: HALOT
  rationale: The conjunction plus prepositional phrase introduces the number accompanying the named leader. Retaining 'and' reflects the Hebrew coordination and keeps the list structure clear.
- source_word: מָאתַיִם
  chosen: two hundred
  lexicon: HALOT
  rationale: Direct cardinal number rendering.
- source_word: הַזְּכָרִים
  chosen: males
  alternatives:
  - men
  lexicon: HALOT
  rationale: The Hebrew specifically denotes males rather than the more general 'people' or socially marked 'men.' 'Males' preserves the gender-specific census/list terminology more precisely, in keeping with the gender-accurate policy.
