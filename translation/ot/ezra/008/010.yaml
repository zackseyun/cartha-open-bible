id: EZR.8.10
reference: Ezra 8:10
source:
  edition: WLC
  text: וּ/מִ/בְּנֵ֥י שְׁלוֹמִ֖ית בֶּן יוֹסִפְיָ֑ה וְ/עִמּ֕/וֹ מֵאָ֥ה וְ/שִׁשִּׁ֖ים הַ/זְּכָרִֽים־׃ס
translation:
  text: And from the sons of Shelomith[a], the son of Josiphiah, and with him 160 males.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "descendants of Shelomith"; Hebrew literally "sons of Shelomith."
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  chosen: And from the sons of
  alternatives:
  - And from the descendants of
  - And from the family of
  lexicon: HALOT
  rationale: The phrase literally combines conjunction + preposition + 'sons of.' In genealogical/list contexts in Ezra, 'sons of' is a standard clan/family designation and should be preserved rather than flattened, while 'from' reflects the partitive/listing function.
- source_word: שְׁלוֹמִית
  chosen: Shelomith
  alternatives:
  - Shelomith
  rationale: Personal names are transliterated by standard convention per translation philosophy.
- source_word: בֶּן
  chosen: the son of
  alternatives:
  - son of
  lexicon: HALOT
  rationale: This appositional marker identifies Shelomith more specifically as 'the son of Josiphiah.' Including the article in English improves naturalness and reflects the construct relationship in context.
- source_word: יוֹסִפְיָה
  chosen: Josiphiah
  alternatives:
  - Josephiah
  rationale: The Hebrew proper name is best represented by a direct transliteration. 'Josiphiah' stays close to the consonantal form in many English traditions for Ezra.
- source_word: וְ/עִמּוֹ
  chosen: and with him
  alternatives:
  - with him
  lexicon: HALOT
  rationale: The conjunction links this entry to the ongoing list, and the prepositional phrase indicates those accompanying the named leader.
- source_word: מֵאָה וְשִׁשִּׁים
  chosen: '160'
  alternatives:
  - one hundred and sixty
  lexicon: HALOT
  rationale: Rendering the number in digits is clear modern English and does not alter meaning.
- source_word: הַזְּכָרִים
  chosen: males
  alternatives:
  - men
  - male members
  lexicon: HALOT
  rationale: The Hebrew specifically denotes males, not necessarily adult men. 'Males' is the most gender-accurate rendering and fits the census/list context.
