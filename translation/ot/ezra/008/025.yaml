id: EZR.8.25
reference: Ezra 8:25
source:
  edition: WLC
  text: ו/אשקול/ה לָ/הֶ֔ם אֶת הַ/כֶּ֥סֶף וְ/אֶת הַ/זָּהָ֖ב וְ/אֶת הַ/כֵּלִ֑ים תְּרוּמַ֣ת
    בֵּית אֱלֹהֵ֗י/נוּ הַ/הֵרִ֨ימוּ֙ הַ/מֶּ֨לֶךְ֙ וְ/יֹעֲצָ֣י/ו וְ/שָׂרָ֔י/ו וְ/כָל
    יִשְׂרָאֵ֖ל הַ/נִּמְצָאִֽים־־־־־׃
translation:
  text: And I weighed out to them the silver, the gold, and the vessels—the contribution
    for the house of our God that the king, his counselors, his officials, and all
    Israel who were present had offered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the offering for the house of our God." The Hebrew term can denote a
      contribution set apart for sacred use.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁקֳלָה
  chosen: And I weighed out
  alternatives:
  - And I weighed
  - And I apportioned by weight
  lexicon: HALOT
  rationale: The verb שקל denotes weighing. In context Ezra is formally entrusting
    measured valuables to the priests, so 'weighed out' captures both the literal
    act of weighing and the distributive sense implied by לָהֶם ('to them').
- source_word: לָהֶם
  chosen: to them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The preposition ל with pronoun naturally indicates direction/recipient.
    'To them' fits the context of handing over custody of the weighed items.
- source_word: הַכֶּסֶף
  chosen: the silver
  alternatives:
  - the money
  lexicon: HALOT
  rationale: Although כסף can sometimes mean money, here it is listed alongside gold
    and vessels as temple valuables, so the material term 'silver' is preferable.
- source_word: הַזָּהָב
  chosen: the gold
  lexicon: HALOT
  rationale: Straightforward material noun referring to the precious metal among the
    offerings.
- source_word: הַכֵּלִים
  chosen: the vessels
  alternatives:
  - the articles
  - the utensils
  lexicon: HALOT
  rationale: כֵּלִים is a broad term for objects/implements. In temple context, 'vessels'
    is the most natural and established English rendering without becoming archaic.
- source_word: תְּרוּמַת
  chosen: the contribution
  alternatives:
  - the offering
  - the heave offering
  lexicon: HALOT
  rationale: תְּרוּמָה often denotes a contribution set apart or lifted up for sacred
    use. 'Contribution' communicates the donated nature of the goods in accessible
    modern English. 'Heave offering' is too technical here; 'offering' is possible
    but less precise about the donated valuables.
- source_word: בֵּית אֱלֹהֵינוּ
  chosen: the house of our God
  alternatives:
  - our God's house
  - the temple of our God
  lexicon: HALOT
  rationale: A formally transparent rendering preserves the temple idiom of the Hebrew.
    'Temple' would be interpretive but acceptable; 'house of our God' better reflects
    the source wording.
- source_word: הֵרִימוּ
  chosen: had offered
  alternatives:
  - had contributed
  - had lifted up
  lexicon: HALOT
  rationale: From רום in the Hiphil, literally 'caused to be raised/lifted up,' idiomatically
    used for presenting a contribution. 'Had offered' is idiomatic English for sacred
    donation, while preserving the cultic sense. The perfect is rendered as pluperfect
    in English because it refers to an action completed prior to Ezra's weighing.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Direct rendering of the royal donor.
- source_word: יֹעֲצָיו
  chosen: his counselors
  alternatives:
  - his advisers
  lexicon: HALOT
  rationale: The noun denotes those who give counsel. 'Counselors' is a clear and
    natural rendering.
- source_word: שָׂרָיו
  chosen: his officials
  alternatives:
  - his princes
  - his leaders
  lexicon: HALOT
  rationale: שָׂרִים can mean princes, officials, or leaders. In the Persian imperial-administrative
    context, 'officials' best conveys function without implying royal blood.
- source_word: כָּל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - all the Israelites
  lexicon: HALOT
  rationale: '''All Israel'' is the conventional and sufficiently transparent rendering
    of the collective covenant people.'
- source_word: הַנִּמְצָאִים
  chosen: who were present
  alternatives:
  - who were found there
  - who were available
  lexicon: HALOT
  rationale: The participle of מצא here refers to those found/present at the location.
    'Who were present' is idiomatic English and fits the narrative setting.
