theological_decisions:
- issue: Cultic term תְּרוּמָה in temple-donation context
  chosen_reading: the contribution
  alternative_readings:
  - the offering
  - the heave offering
  rationale: The verse concerns valuables donated for the temple. 'Contribution' preserves
    the idea of something set apart and given without importing a more specific sacrificial
    rite than the context requires. This follows optimal equivalence and avoids unnecessary
    technical jargon.
  doctrine_reference: Translation philosophy §6 (readable modern English, not archaic
    or academic)
- issue: Rendering בֵּית אֱלֹהֵינוּ
  chosen_reading: the house of our God
  alternative_readings:
  - the temple of our God
  rationale: The Hebrew literally says 'house of our God.' Retaining 'house' preserves
    the source-text imagery and avoids over-interpreting, though the referent is the
    temple.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition)
