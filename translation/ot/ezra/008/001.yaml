id: EZR.8.1
reference: Ezra 8:1
source:
  edition: WLC
  text: וְ/אֵ֛לֶּה רָאשֵׁ֥י אֲבֹתֵי/הֶ֖ם וְ/הִתְיַחְשָׂ֑/ם הָ/עֹלִ֣ים עִמִּ֗/י בְּ/מַלְכ֛וּת
    אַרְתַּחְשַׁ֥סְתְּא הַ/מֶּ֖לֶךְ מִ/בָּבֶֽל׃ס
translation:
  text: 'Now these are the heads of their fathers’ houses, and their genealogy, of
    those who went up with me from Babylon in the reign of King Artaxerxes:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “their genealogy” or “those enrolled by genealogy.” The Hebrew term refers
      to a genealogical registration or record, not merely ancestry in the abstract.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: Now these are
  alternatives:
  - And these are
  - These are
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces a new section/list. 'Now
    these are' is natural modern English while preserving the discourse-linking force
    better than a bare 'These are.'
- source_word: רָאשֵׁי
  chosen: heads
  alternatives:
  - chiefs
  - leaders
  lexicon: HALOT
  rationale: In construct with 'fathers' houses,' the idiom denotes leading representatives.
    'Heads' preserves the Hebrew metaphor and common genealogical/list style.
- source_word: אֲבֹתֵיהֶם
  chosen: their fathers’ houses
  alternatives:
  - their ancestral houses
  - their family houses
  lexicon: HALOT
  rationale: Though literally 'their fathers,' in this administrative-genealogical
    context it refers to paternal households/clans. 'Fathers’ houses' is the standard
    idiomatic rendering in English Bible style and best matches the social unit intended.
- source_word: וְהִתְיַחְשָׂם
  chosen: their genealogical record
  alternatives:
  - their genealogy
  - those enrolled by genealogy
  - their registration by ancestry
  lexicon: HALOT
  rationale: The hitpael-derived nominal form refers to genealogical enrollment/registration
    rather than merely abstract lineage. 'Their genealogical record' communicates
    a documented register and fits the list-setting.
- source_word: הָעֹלִים
  chosen: those who went up
  alternatives:
  - the ones going up
  - those coming up
  lexicon: HALOT
  rationale: עלה is the conventional verb for going up to Judah/Jerusalem from exile
    lands. English past tense is required by context, and 'went up' preserves the
    idiomatic pilgrimage/return language.
- source_word: עִמִּי
  chosen: with me
  lexicon: HALOT
  rationale: Straightforward preposition plus first-person singular suffix; Ezra is
    speaking in the first person.
- source_word: בְּמַלְכוּת
  chosen: in the reign of
  alternatives:
  - during the kingdom of
  - in the kingship of
  lexicon: HALOT
  rationale: The noun here marks the period of royal rule. 'In the reign of' is the
    idiomatic English equivalent.
- source_word: אַרְתַּחְשַׁסְתְּא
  chosen: Artaxerxes
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: הַמֶּלֶךְ
  chosen: King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: In English, 'King Artaxerxes' is the natural appositional form. This
    slightly restructures the Hebrew 'Artaxerxes the king' without loss of meaning.
- source_word: מִבָּבֶל
  chosen: from Babylon
  lexicon: HALOT
  rationale: Standard geographic rendering; placed after 'with me' to reflect the
    source order and the origin of the ascent.
