id: EZR.8.32
reference: Ezra 8:32
source:
  edition: WLC
  text: וַ/נָּב֖וֹא יְרוּשָׁלִָ֑ם וַ/נֵּ֥שֶׁב שָׁ֖ם יָמִ֥ים שְׁלֹשָֽׁה׃
translation:
  text: So we came to Jerusalem and stayed there three days.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַ/נָּב֖וֹא
  chosen: So we came
  alternatives:
  - And we came
  - Then we came
  - So we arrived
  lexicon: HALOT
  rationale: Wayyiqtol of בוא narrates the next event in sequence. 'Came' is the plain
    sense; 'So' reflects the narrative continuation naturally in English. 'Arrived'
    is possible but slightly more interpretive than the basic motion verb.
- source_word: יְרוּשָׁלִָ֑ם
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name, in keeping with the
    policy to transliterate names.
- source_word: וַ/נֵּ֥שֶׁב
  chosen: and stayed
  alternatives:
  - and sat
  - and remained
  - and dwelt
  lexicon: HALOT
  rationale: From ישב, whose broad range includes sit, dwell, remain, stay. In this
    travel context, 'stayed' best conveys temporary lodging after arrival. 'Sat' would
    be overly literal and misleading in English.
- source_word: שָׁ֖ם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Simple locative adverb referring back to Jerusalem; 'there' is the natural
    English equivalent.
- source_word: יָמִ֥ים שְׁלֹשָֽׁה
  chosen: three days
  alternatives:
  - for three days
  lexicon: HALOT
  rationale: The accusative of duration indicates the length of time. English can
    express this idiomatically as 'three days'; the verb 'stayed' already implies
    duration, so an added 'for' is optional rather than necessary.
