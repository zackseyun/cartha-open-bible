id: EZR.8.34
reference: Ezra 8:34
source:
  edition: WLC
  text: בְּ/מִסְפָּ֥ר בְּ/מִשְׁקָ֖ל לַ/כֹּ֑ל וַ/יִּכָּתֵ֥ב כָּֽל הַ/מִּשְׁקָ֖ל בָּ/עֵ֥ת
    הַ/הִֽיא־׃פ
translation:
  text: Everything was counted by number and by weight, and the total weight was recorded
    at that time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'by number, by weight, for all; and all the weight was
      written at that time.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּמִסְפָּר
  chosen: counted by number
  alternatives:
  - by number
  - according to the number
  lexicon: HALOT
  rationale: מִסְפָּר denotes number or count. In context of inventorying temple valuables,
    'counted by number' makes the procedural sense explicit in natural English while
    preserving the underlying noun.
- source_word: בְּמִשְׁקָל
  chosen: by weight
  alternatives:
  - according to weight
  - weighed
  lexicon: HALOT
  rationale: מִשְׁקָל refers to weight. The paired prepositional phrases 'by number
    and by weight' reflect the Hebrew structure and the inventory context.
- source_word: לַכֹּל
  chosen: everything
  alternatives:
  - for all of it
  - for everything
  - for the whole
  lexicon: HALOT
  rationale: 'The phrase indicates comprehensiveness: the counting and weighing applied
    to the whole consignment. ''Everything'' is concise modern English that captures
    this total scope.'
- source_word: וַיִּכָּתֵב
  chosen: was recorded
  alternatives:
  - was written
  - was inscribed
  lexicon: HALOT
  rationale: The Niphal of כתב is passive, 'was written.' In this administrative context,
    'was recorded' best conveys formal documentation without over-paraphrasing.
- source_word: כָּל הַמִּשְׁקָל
  chosen: the total weight
  alternatives:
  - all the weight
  - the whole weight
  lexicon: HALOT
  rationale: Literally 'all the weight.' In idiomatic English, 'the total weight'
    communicates the summed amount that was entered into the record.
- source_word: בָּעֵת הַהִיא
  chosen: at that time
  alternatives:
  - at that same time
  - then
  lexicon: HALOT
  rationale: The temporal phrase points to the moment of delivery and verification.
    'At that time' is a straightforward rendering that preserves the demonstrative
    force better than the looser 'then'.
