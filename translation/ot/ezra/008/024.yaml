id: EZR.8.24
reference: Ezra 8:24
source:
  edition: WLC
  text: וָ/אַבְדִּ֛ילָ/ה מִ/שָּׂרֵ֥י הַ/כֹּהֲנִ֖ים שְׁנֵ֣ים עָשָׂ֑ר לְ/שֵׁרֵֽבְיָ֣ה
    חֲשַׁבְיָ֔ה וְ/עִמָּ/הֶ֥ם מֵ/אֲחֵי/הֶ֖ם עֲשָׂרָֽה׃
translation:
  text: 'Then I set apart twelve of the leading priests: Sherebiah, Hashabiah, and
    with them ten of their brothers.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the chiefs of the priests.'
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' may refer more broadly to their fellow kinsmen or associates,
      but the Hebrew uses the masculine familial term.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאַבְדִּילָה
  chosen: Then I set apart
  alternatives:
  - Then I separated
  - Then I selected
  lexicon: HALOT
  rationale: The Hiphil of בדל means to separate or set apart. 'Set apart' fits the
    context of appointing men for a sacred trust and reads naturally in English. The
    prefixed conjunction is rendered 'Then' to carry the narrative sequence.
- source_word: מִשָּׂרֵי הַכֹּהֲנִים
  chosen: of the leading priests
  alternatives:
  - from the chiefs of the priests
  - from the priestly leaders
  lexicon: HALOT
  rationale: שָׂרִים denotes leaders, chiefs, or officials. In idiomatic English,
    'leading priests' communicates that these were prominent priests without the awkwardness
    of 'chiefs of the priests.' The preposition מִן is represented by 'of' in the
    partitive sense after 'set apart.'
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: לְשֵׁרֵבְיָה חֲשַׁבְיָה
  chosen: Sherebiah, Hashabiah
  rationale: These are personal names and are therefore transliterated rather than
    translated, following project policy.
- source_word: וְעִמָּהֶם
  chosen: and with them
  alternatives:
  - with them
  lexicon: HALOT
  rationale: The conjunction plus prepositional phrase is retained explicitly to preserve
    the additive structure of the Hebrew.
- source_word: מֵאֲחֵיהֶם
  chosen: of their brothers
  alternatives:
  - from their brothers
  - of their kinsmen
  lexicon: HALOT
  rationale: אָח in plural with pronominal suffix commonly means brothers or close
    kinsmen. 'Brothers' is the most direct rendering and matches the masculine familial
    language of the source; in this priestly context it likely refers to fellow Levitical/ministerial
    associates, but the text itself says 'brothers.'
- source_word: עֲשָׂרָה
  chosen: ten
  lexicon: HALOT
  rationale: Straightforward cardinal number.
