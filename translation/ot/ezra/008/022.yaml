theological_decisions:
- issue: Rendering the anthropomorphic expression יַד אֱלֹהֵינוּ
  chosen_reading: Retain the metaphor as 'The hand of our God' rather than interpret
    it as abstract 'power' or 'favor.'
  alternative_readings:
  - The power of our God
  - Our God’s favor
  rationale: The Hebrew intentionally uses embodied imagery for divine action. Preserving
    the metaphor maintains theological texture and avoids reducing the statement to
    a single abstract category, while the following clauses clarify that the hand
    signifies beneficial action toward seekers and opposition toward forsakers.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Rendering divine opposition in וְעֻזּוֹ וְאַפּוֹ עַל כָּל עֹזְבָיו
  chosen_reading: Translate both terms distinctly as 'his strength and his anger are
    against all who forsake him.'
  alternative_readings:
  - his power and wrath are against all who forsake him
  - his mighty anger is against all who forsake him
  rationale: 'The Hebrew presents two coordinated nouns, not a single merged concept.
    Keeping both preserves the fullness of the statement: God is not only emotionally
    opposed but actively powerful against those who forsake him.'
  doctrine_reference: Translation philosophy §3, §5
