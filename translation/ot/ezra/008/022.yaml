id: EZR.8.22
reference: Ezra 8:22
source:
  edition: WLC
  text: כִּ֣י בֹ֗שְׁתִּי לִ/שְׁא֤וֹל מִן הַ/מֶּ֨לֶךְ֙ חַ֣יִל וּ/פָרָשִׁ֔ים לְ/עָזְרֵ֥/נוּ
    מֵ/אוֹיֵ֖ב בַּ/דָּ֑רֶךְ כִּֽי אָמַ֨רְנוּ לַ/מֶּ֜לֶךְ לֵ/אמֹ֗ר יַד אֱלֹהֵ֤י/נוּ
    עַל כָּל מְבַקְשָׁי/ו֙ לְ/טוֹבָ֔ה וְ/עֻזּ֣/וֹ וְ/אַפּ֔/וֹ עַ֖ל כָּל עֹזְבָֽי/ו־־־־־־׃
translation:
  text: For I was ashamed to ask the king for troops and horsemen to help us against
    the enemy on the way, because we had said to the king, “The hand of our God is
    for good on all who seek him, but his strength and his anger are against all who
    forsake him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from the enemy on the journey.” The Hebrew phrase can be rendered more
      literally this way, but “against the enemy on the way” better fits the request
      for military protection.
    reason: lexical_alternative
  - marker: b
    text: “The hand of our God” is a Hebrew expression for his active favor or power.
    reason: cultural_note
lexical_decisions:
- source_word: בֹשְׁתִּי
  chosen: I was ashamed
  alternatives:
  - I felt ashamed
  - I was embarrassed
  lexicon: HALOT
  rationale: The verb בוש conveys shame/disgrace rather than mere social embarrassment.
    'I was ashamed' is the most natural and sufficiently weighty English rendering
    in context.
- source_word: לִשְׁאוֹל
  chosen: to ask
  alternatives:
  - to request
  lexicon: HALOT
  rationale: The infinitive of שאל here means to ask/request from someone. 'Ask' is
    idiomatic with a personal object ('ask the king') and keeps the sentence readable.
- source_word: חַיִל
  chosen: troops
  alternatives:
  - army
  - military force
  - soldiers
  lexicon: HALOT
  rationale: In this context חַיִל refers to armed force supplied by the king. 'Troops'
    fits the paired expression with 'horsemen' and avoids implying the entire army.
- source_word: פָרָשִׁים
  chosen: horsemen
  alternatives:
  - cavalry
  lexicon: HALOT
  rationale: The term denotes mounted riders. 'Horsemen' is a transparent rendering
    and preserves the concrete image; 'cavalry' is possible but slightly more interpretive
    and military-technical.
- source_word: לְעָזְרֵנוּ
  chosen: to help us
  alternatives:
  - to assist us
  lexicon: HALOT
  rationale: A straightforward infinitive of purpose. 'Help us' is natural modern
    English and adequately formal.
- source_word: מֵאוֹיֵב
  chosen: against the enemy
  alternatives:
  - from the enemy
  lexicon: HALOT
  rationale: With the preceding request for military protection, English idiom prefers
    'against the enemy.' A more literal 'from the enemy' is possible, but 'against'
    better conveys defensive protection in travel.
- source_word: בַּדָּרֶךְ
  chosen: on the way
  alternatives:
  - on the journey
  - along the road
  lexicon: HALOT
  rationale: The phrase refers to the travel route. 'On the way' is idiomatic and
    concise.
- source_word: יַד אֱלֹהֵינוּ
  chosen: The hand of our God
  alternatives:
  - Our God's hand
  - the power of our God
  lexicon: HALOT
  rationale: '''Hand'' is a common Hebrew metaphor for active power or favor. Retaining
    the metaphor preserves the source texture and avoids over-interpreting it as mere
    abstract ''power''.'
- source_word: עַל כָּל מְבַקְשָׁיו לְטוֹבָה
  chosen: is for good on all who seek him
  alternatives:
  - is favorably upon all who seek him
  - is on all who seek him for good
  - is for the good of all who seek him
  lexicon: HALOT
  rationale: The construction expresses God's beneficial favor toward seekers. 'Is
    for good on all who seek him' preserves both the preposition and the beneficent
    sense without flattening the Hebrew image.
- source_word: וְעֻזּוֹ
  chosen: his strength
  alternatives:
  - his might
  - his power
  lexicon: HALOT
  rationale: עֹז denotes strength/might. 'Strength' is clear and pairs well with the
    retained metaphorical language of divine action.
- source_word: וְאַפּוֹ
  chosen: his anger
  alternatives:
  - his wrath
  - his nose
  lexicon: HALOT
  rationale: Though literally related to 'nose,' the idiom means anger/wrath. 'Anger'
    is accessible modern English; 'wrath' is possible but more elevated than the context
    requires.
- source_word: עַל כָּל עֹזְבָיו
  chosen: are against all who forsake him
  alternatives:
  - are upon all who abandon him
  - are against all who leave him
  lexicon: HALOT
  rationale: עזב in covenantal contexts commonly means forsake/abandon. 'Forsake'
    preserves the relational and covenantal force better than the flatter 'leave'.
