id: EZR.8.12
reference: Ezra 8:12
source:
  edition: WLC
  text: וּ/מִ/בְּנֵ֣י עַזְגָּ֔ד יוֹחָנָ֖ן בֶּן הַ/קָּטָ֑ן וְ/עִמּ֕/וֹ מֵאָ֥ה וַ/עֲשָׂרָ֖ה
    הַ/זְּכָרִֽים־׃ס
translation:
  text: 'And from the sons of Azgad: Johanan son of Hakkatan, and with him 110 males.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants of Azgad.' The Hebrew 'sons of' can denote a broader family
      line, not only immediate sons.
    reason: lexical_alternative
  - marker: b
    text: Or 'son of the younger' if הַקָּטָן is taken descriptively rather than as
      the proper name Hakkatan.
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  chosen: And from the sons of
  alternatives:
  - And from the descendants of
  - And from the family of
  lexicon: HALOT
  rationale: מִן + בְּנֵי introduces another clan/group in the list. 'Sons of' is
    the most formally accurate rendering and preserves the genealogical/list structure,
    though it can denote descendants more broadly.
- source_word: עַזְגָּד
  chosen: Azgad
  rationale: Proper personal/family name; transliterated per translation philosophy
    for names.
- source_word: יוֹחָנָן
  chosen: Johanan
  alternatives:
  - Jehohanan
  - John
  rationale: Proper name; standard English transliteration is preferred. 'John' would
    be an anglicized equivalent rather than a direct transliteration.
- source_word: בֶּן הַ/קָּטָן
  chosen: son of Hakkatan
  alternatives:
  - son of the younger
  - son of Katan
  lexicon: HALOT
  rationale: The phrase functions as a patronymic with the article attached to קָטָן.
    In this name list, it is best taken as a proper name, conventionally represented
    as 'Hakkatan,' rather than translated adjectivally as 'the younger,' which could
    imply a comparison not explicit in the list.
- source_word: וְ/עִמּוֹ
  chosen: and with him
  alternatives:
  - with him
  lexicon: HALOT
  rationale: Standard listing formula in Ezra 8 introducing the number accompanying
    the named leader. Retaining 'and' reflects the Hebrew conjunction and the cadence
    of the register.
- source_word: מֵאָה וַ/עֲשָׂרָה
  chosen: '110'
  alternatives:
  - a hundred and ten
  lexicon: HALOT
  rationale: The Hebrew cardinal construction means 'one hundred and ten.' Numerals
    are rendered in modern readable English as digits here without loss of meaning.
- source_word: הַ/זְּכָרִים
  chosen: males
  alternatives:
  - men
  - male members
  lexicon: HALOT
  rationale: זְכָרִים denotes males specifically. 'Males' is more precise than 'men,'
    since the term marks sex rather than necessarily adult status. This also preserves
    the gender-specific wording of the source.
