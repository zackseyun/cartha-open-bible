id: EZR.8.26
reference: Ezra 8:26
source:
  edition: WLC
  text: וָ/אֶשְׁקֲלָ֨/ה עַל יָדָ֜/ם כֶּ֗סֶף כִּכָּרִים֙ שֵֽׁשׁ מֵא֣וֹת וַ/חֲמִשִּׁ֔ים וּ/כְלֵי כֶ֥סֶף מֵאָ֖ה לְ/כִכָּרִ֑ים זָהָ֖ב מֵאָ֥ה כִכָּֽר־־־׃
translation:
  text: And I weighed out into their hands six hundred and fifty talents of silver[a], and one hundred talents worth of silver vessels, and one hundred talents of gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one hundred silver vessels valued at one hundred talents.' The Hebrew is elliptical at this point, and the sense is that the silver vessels together amounted to a valuation of one hundred talents.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁקֲלָה
  chosen: I weighed out
  alternatives:
  - I weighed
  lexicon: HALOT
  rationale: The verb שׁקל in this context refers to measuring valuables by weight for transfer. 'Weighed out' captures both the act of weighing and the handing over of a specified amount.
- source_word: עַל יָדָם
  chosen: into their hands
  alternatives:
  - to them
  - into their charge
  lexicon: HALOT
  rationale: The idiom literally involves the hand and commonly denotes entrusting or delivering something to someone's custody. 'Into their hands' preserves the concrete Hebrew image while remaining natural English.
- source_word: כֶּסֶף
  chosen: silver
  alternatives:
  - money
  lexicon: HALOT
  rationale: Here the context is weighed precious metal, not coined currency, so 'silver' is the most precise rendering.
- source_word: כִּכָּרִים
  chosen: talents
  alternatives:
  - talent-weight units
  lexicon: HALOT
  rationale: כִּכָּר is the standard large unit of weight often rendered 'talent.' This traditional rendering is clear and appropriate in a list of weighed temple valuables.
- source_word: שֵׁשׁ מֵאוֹת וַחֲמִשִּׁים
  chosen: six hundred and fifty
  lexicon: HALOT
  rationale: Straightforward cardinal number modifying 'talents of silver.'
- source_word: וּכְלֵי כֶסֶף
  chosen: and silver vessels
  alternatives:
  - and articles of silver
  - and utensils of silver
  lexicon: HALOT
  rationale: כְּלִי is a broad term for vessels, articles, or utensils. In a temple-treasury inventory, 'vessels' is a natural and suitably formal choice.
- source_word: מֵאָה לְכִכָּרִים
  chosen: one hundred ... worth talents
  alternatives:
  - one hundred worth a hundred talents
  - one hundred for talents
  lexicon: HALOT
  rationale: 'The phrase is elliptical. The ל likely indicates valuation: one hundred silver vessels amounting to or valued at talents. To avoid over-specifying beyond the Hebrew, the English keeps the sense of valuation, though the noun ''one hundred talents'' must be supplied idiomatically.'
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Standard rendering for the precious metal in this inventory list.
- source_word: מֵאָה כִכָּר
  chosen: one hundred talents
  lexicon: HALOT
  rationale: Straightforward number plus weight unit referring to the amount of gold.
