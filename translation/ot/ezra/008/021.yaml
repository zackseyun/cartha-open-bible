theological_decisions:
- issue: Rendering the fasting idiom לְהִתְעַנּוֹת
  chosen_reading: that we might humble ourselves before our God
  alternative_readings:
  - to afflict ourselves before our God
  rationale: The Hebrew idiom can be rendered more literally as 'afflict ourselves,'
    but in English that wording can mislead readers toward physical harm rather than
    the penitential self-humbling associated with fasting. The chosen rendering preserves
    the spiritual posture without importing extra theology.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Rendering דֶּרֶךְ יְשָׁרָה
  chosen_reading: a straight path
  alternative_readings:
  - a right way
  - a safe journey
  rationale: The phrase could be interpreted concretely as safe travel or more broadly
    as right guidance. The translation preserves the Hebrew metaphorical tension rather
    than narrowing it to physical safety alone.
  doctrine_reference: Translation philosophy §3
