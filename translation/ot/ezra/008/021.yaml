id: EZR.8.21
reference: Ezra 8:21
source:
  edition: WLC
  text: וָ/אֶקְרָ֨א שָׁ֥ם צוֹם֙ עַל הַ/נָּהָ֣ר אַהֲוָ֔א לְ/הִתְעַנּ֖וֹת לִ/פְנֵ֣י
    אֱלֹהֵ֑י/נוּ לְ/בַקֵּ֤שׁ מִמֶּ֨/נּוּ֙ דֶּ֣רֶךְ יְשָׁרָ֔ה לָ֥/נוּ וּ/לְ/טַפֵּ֖/נוּ
    וּ/לְ/כָל רְכוּשֵֽׁ/נוּ־־׃
translation:
  text: Then I proclaimed a fast there, at the Ahava River, that we might humble ourselves
    before our God, to seek from him a straight path for us, for our little ones,
    and for all our possessions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to afflict ourselves before our God.' The Hebrew idiom refers to self-denial
      or self-humbling, especially in fasting.
    reason: lexical_alternative
  - marker: b
    text: Or 'a right way' or 'a safe journey.' The Hebrew literally says 'a straight
      path.'
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֶקְרָא
  chosen: Then I proclaimed
  alternatives:
  - And I proclaimed
  - Then I called
  lexicon: HALOT
  rationale: קרא in this context means to announce or proclaim publicly rather than
    merely to call out. 'Then' captures the narrative waw in smooth English.
- source_word: צוֹם
  chosen: a fast
  alternatives:
  - fasting
  lexicon: HALOT
  rationale: The noun denotes the observance itself; 'a fast' is the most natural
    English equivalent.
- source_word: עַל הַנָּהָר אַהֲוָא
  chosen: there, at the Ahava River
  alternatives:
  - there by the river Ahava
  - there at the river Ahava
  lexicon: HALOT
  rationale: עַל with a river can indicate location by/at. 'Ahava' is transliterated
    as a place name per translation philosophy. 'River' is capitalized as part of
    the geographic designation in English style.
- source_word: לְהִתְעַנּוֹת
  chosen: that we might humble ourselves
  alternatives:
  - to afflict ourselves
  - to humble ourselves
  lexicon: HALOT
  rationale: The hitpael of ענה in fasting contexts refers to self-humbling or self-denial
    before God. 'Humble ourselves' communicates the idiom clearly in modern English
    without losing the religious sense.
- source_word: לִפְנֵי אֱלֹהֵינוּ
  chosen: before our God
  alternatives:
  - in the presence of our God
  lexicon: HALOT
  rationale: A standard relational phrase indicating posture before God; 'before our
    God' is both natural and sufficiently formal.
- source_word: לְבַקֵּשׁ מִמֶּנּוּ
  chosen: to seek from him
  alternatives:
  - to ask from him
  - to seek from before him
  lexicon: HALOT
  rationale: בקש commonly means seek, request, or inquire. Here it introduces petitionary
    seeking directed to God; 'seek from him' preserves both prayerful dependence and
    the verbal link.
- source_word: דֶּרֶךְ יְשָׁרָה
  chosen: a straight path
  alternatives:
  - a right way
  - an upright way
  - a safe journey
  lexicon: HALOT
  rationale: Literally 'a straight way/path.' While the context concerns travel, the
    Hebrew image is broader than mere safety and includes right guidance. 'Straight
    path' preserves the metaphor and remains intelligible.
- source_word: לָנוּ וּלְטַפֵּנוּ וּלְכָל רְכוּשֵׁנוּ
  chosen: for us, for our little ones, and for all our possessions
  alternatives:
  - for us, our children, and all our goods
  - for us, our dependents, and all our property
  lexicon: HALOT
  rationale: טף refers to little children or dependents, often the vulnerable members
    of a traveling group; 'little ones' preserves that nuance. רְכוּשׁ denotes possessions/property
    carried with them; 'possessions' is clear modern English.
