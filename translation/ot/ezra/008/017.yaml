id: EZR.8.17
reference: Ezra 8:17
source:
  edition: WLC
  text: ו/אוצא/ה אוֹתָ/ם֙ עַל אִדּ֣וֹ הָ/רֹ֔אשׁ בְּ/כָסִפְיָ֖א הַ/מָּק֑וֹם וָ/אָשִׂימָ/ה֩
    בְּ/פִי/הֶ֨ם דְּבָרִ֜ים לְ֠/דַבֵּר אֶל אִדּ֨וֹ אָחִ֤י/ו ה/נתונים בְּ/כָסִפְיָ֣א
    הַ/מָּק֔וֹם לְ/הָֽבִיא לָ֥/נוּ מְשָׁרְתִ֖ים לְ/בֵ֥ית אֱלֹהֵֽי/נוּ־־־׃
translation:
  text: And I sent them to Iddo, the chief at the place Casiphia, and I put in their
    mouths words to speak to Iddo and his brothers, the temple servants at the place
    Casiphia, to bring us ministers for the house of our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Nethinim,” a recognized class of temple servants attached to sanctuary
      service.
    reason: lexical_alternative
  - marker: b
    text: “Ministers” here means those who serve in the temple, not necessarily holders
      of a later formal religious office.
    reason: cultural_note
lexical_decisions:
- source_word: וָאֹוצִיאָה
  chosen: And I sent
  alternatives:
  - And I brought out
  - And I dispatched
  lexicon: HALOT
  rationale: The Hiphil of יצא commonly means 'cause to go out' and in this context
    of commissioning envoys is best rendered idiomatically as 'sent.' 'Dispatched'
    is possible but slightly more formal; 'brought out' is too literal for the context.
- source_word: עַל
  chosen: to
  alternatives:
  - upon
  - against
  - concerning
  lexicon: HALOT
  rationale: With a verb of sending and a personal object, עַל here functions idiomatically
    for direction toward a person. English 'to' communicates the sense naturally.
- source_word: אִדּוֹ הָרֹאשׁ
  chosen: Iddo, the chief
  alternatives:
  - Iddo, the leader
  - Iddo, the head
  lexicon: HALOT
  rationale: הָרֹאשׁ literally 'the head' is a title for one in charge. 'The chief'
    is concise and natural English for an administrative leader.
- source_word: בְּכָסִפְיָא הַמָּקוֹם
  chosen: at the place Casiphia
  alternatives:
  - in Casiphia, the place
  - at Casiphia
  lexicon: HALOT
  rationale: The phrase apposes the proper name with 'the place.' Retaining 'the place
    Casiphia' reflects the Hebrew wording while remaining readable. 'At Casiphia'
    is smoother but omits מָקוֹם.
- source_word: וָאָשִׂימָה בְּפִיהֶם דְּבָרִים
  chosen: and I put in their mouths words
  alternatives:
  - and I told them what to say
  - and I placed words in their mouth
  lexicon: HALOT
  rationale: This is a Hebrew idiom for giving a message to deliver. The translation
    keeps the imagery ('put in their mouths words') while remaining intelligible.
    Singular 'mouth' was avoided because the Hebrew has plural.
- source_word: לְדַבֵּר
  chosen: to speak
  alternatives:
  - to say
  lexicon: HALOT
  rationale: The infinitive expresses the purpose of the words given to the envoys.
    'To speak' is the straightforward rendering.
- source_word: אֶל אִדּוֹ אָחִיו
  chosen: to Iddo and his brothers
  alternatives:
  - to Iddo, his brother
  - to Iddo and his kinsmen
  lexicon: HALOT
  rationale: Although the consonantal form could be read singularly, the following
    plural participle and the sense of the passage support taking 'his brothers' collectively
    with Iddo as the leading figure. This yields coherent syntax with the plural group
    addressed.
- source_word: הַנְּתוּנִים
  chosen: the temple servants
  alternatives:
  - the given ones
  - the Nethinim
  lexicon: HALOT
  rationale: In Ezra this term refers to the נתינים, a recognized class attached to
    temple service. Translating the function as 'temple servants' is more transparent
    for modern readers than transliterating 'Nethinim,' while preserving the institutional
    sense.
- source_word: לְהָבִיא לָנוּ
  chosen: to bring us
  alternatives:
  - to bring to us
  lexicon: HALOT
  rationale: Simple purpose clause; 'bring us' is idiomatic English.
- source_word: מְשָׁרְתִים
  chosen: ministers
  alternatives:
  - servants
  - attendants
  lexicon: HALOT
  rationale: The participle denotes those who perform service, here in a cultic setting
    for the house of God. 'Ministers' conveys official service without implying ordained
    clergy in a later Christian sense; 'servants' risks confusion with the already-mentioned
    temple servants as a class.
- source_word: לְבֵית אֱלֹהֵינוּ
  chosen: for the house of our God
  alternatives:
  - for the temple of our God
  - for our God's house
  lexicon: HALOT
  rationale: '''House of our God'' preserves the Hebrew expression and its theological
    resonance. ''Temple'' is interpretive but accurate; the more literal phrase was
    preferred.'
