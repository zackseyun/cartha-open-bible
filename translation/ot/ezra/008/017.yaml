theological_decisions:
- issue: Rendering הַנְּתוּנִים in Ezra's temple-service context
  chosen_reading: the temple servants
  alternative_readings:
  - the Nethinim
  rationale: This is primarily a lexical-historical decision rather than a doctrinal
    one. The functional translation aids readability and transparency for modern readers,
    while the traditional transliteration is preserved in a footnote because it names
    a recognized temple class in Ezra-Nehemiah.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering מְשָׁרְתִים distinctly from הַנְּתוּנִים
  chosen_reading: ministers
  alternative_readings:
  - servants
  - attendants
  rationale: Using a distinct English term preserves the apparent distinction between
    the class called נתינים and the additional personnel Ezra seeks for temple service.
    'Ministers' here denotes service roles, not later ecclesiastical office.
  doctrine_reference: Translation philosophy §5
