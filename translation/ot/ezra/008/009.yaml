id: EZR.8.9
reference: Ezra 8:9
source:
  edition: WLC
  text: מִ/בְּנֵ֣י יוֹאָ֔ב עֹבַדְיָ֖ה בֶּן יְחִיאֵ֑ל וְ/עִמּ֕/וֹ מָאתַ֛יִם וּ/שְׁמֹנָ֥ה
    עָשָׂ֖ר הַ/זְּכָרִֽים־׃ס
translation:
  text: 'From the sons of Joab: Obadiah son of Jehiel, and with him 218 males.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'two hundred and eighteen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/בְּנֵי
  chosen: From the sons of
  alternatives:
  - Of the sons of
  - From the descendants of
  lexicon: HALOT
  rationale: The preposition מִן with בְּנֵי introduces a subgroup within the larger
    returnee list. 'From the sons of' is a natural English rendering that preserves
    the genealogical/list structure without overstating literal sonship.
- source_word: יוֹאָב
  chosen: Joab
  rationale: Proper name transliterated according to standard English convention,
    following the translation philosophy to transliterate personal names.
- source_word: עֹבַדְיָה
  chosen: Obadiah
  rationale: Proper name transliterated by standard convention.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard filial marker in Hebrew genealogical notices. English omits
    the article naturally in this list format.
- source_word: יְחִיאֵל
  chosen: Jehiel
  alternatives:
  - Jehi'el
  rationale: Proper name transliterated by standard English biblical convention.
- source_word: וְ/עִמּוֹ
  chosen: and with him
  alternatives:
  - with him
  lexicon: HALOT
  rationale: The conjunction plus preposition marks the number accompanying the named
    leader. Retaining 'and' reflects the Hebrew coordination and the repetitive style
    of the census list.
- source_word: מָאתַיִם וּשְׁמֹנָה עָשָׂר
  chosen: '218'
  alternatives:
  - two hundred and eighteen
  lexicon: HALOT
  rationale: The Hebrew compound numeral literally means 'two hundred and eighteen.'
    Numerals are rendered as digits for readability in a list context without loss
    of meaning.
- source_word: הַזְּכָרִים
  chosen: males
  alternatives:
  - men
  - male members
  lexicon: HALOT
  rationale: The Hebrew specifically denotes males, not necessarily adult men. 'Males'
    preserves the gender-specific sense more accurately than 'men,' in keeping with
    the gender-accurate translation philosophy.
