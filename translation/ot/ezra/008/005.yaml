id: EZR.8.5
reference: Ezra 8:5
source:
  edition: WLC
  text: מִ/בְּנֵ֥י שְׁכַנְיָ֖ה בֶּן יַחֲזִיאֵ֑ל וְ/עִמּ֕/וֹ שְׁלֹ֥שׁ מֵא֖וֹת הַ/זְּכָרִֽים־׃ס
translation:
  text: From the sons of Shecaniah, the son of Jahaziel, and with him three hundred
    males.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “men.” The Hebrew specifically says “males,” emphasizing sex rather than
      age or social status.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/בְּנֵי
  chosen: From the sons of
  alternatives:
  - Of the sons of
  - From the descendants of
  lexicon: HALOT
  rationale: 'The preposition מִן with בְּנֵי introduces a subgroup within the larger
    returnee list: ''from the sons of.'' ''Sons of'' is retained rather than ''descendants
    of'' to preserve the genealogical/list formula, though the latter is a possible
    smoothing.'
- source_word: שְׁכַנְיָה
  chosen: Shecaniah
  alternatives:
  - Shechaniah
  rationale: Personal name transliterated per translation philosophy. English convention
    varies between Shecaniah and Shechaniah; the chosen form is a standard transliteration.
- source_word: בֶּן
  chosen: the son of
  alternatives:
  - son of
  lexicon: HALOT
  rationale: 'Rendered explicitly to reflect the construct relationship with Jahaziel.
    The article in English improves readability in apposition: ''Shecaniah, the son
    of Jahaziel.'''
- source_word: יַחֲזִיאֵל
  chosen: Jahaziel
  alternatives:
  - Jahaziel
  rationale: Personal name transliterated by standard convention.
- source_word: וְ/עִמּוֹ
  chosen: and with him
  alternatives:
  - with him
  lexicon: HALOT
  rationale: 'The conjunction plus preposition/pronominal suffix naturally continues
    the list entry: the named leader is accompanied by a numbered group. ''And with
    him'' preserves the Hebrew coordination.'
- source_word: שְׁלֹשׁ מֵאוֹת
  chosen: three hundred
  lexicon: HALOT
  rationale: Straightforward cardinal expression.
- source_word: הַזְּכָרִים
  chosen: males
  alternatives:
  - men
  lexicon: HALOT
  rationale: זְכָרִים denotes males specifically, not merely adult men. 'Males' is
    more gender-accurate and reflects the Hebrew term in this census-like context.
