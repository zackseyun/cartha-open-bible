id: EZR.8.6
reference: Ezra 8:6
source:
  edition: WLC
  text: וּ/מִ/בְּנֵ֣י עָדִ֔ין עֶ֖בֶד בֶּן יוֹנָתָ֑ן וְ/עִמּ֖/וֹ חֲמִשִּׁ֥ים הַ/זְּכָרִֽים־׃ס
translation:
  text: 'And from the sons of Adin: Ebed son of Jonathan, and with him fifty males.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "fifty men." The Hebrew specifically says "males," preserving the sex-specific
      wording of the list.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  chosen: And from the sons of
  alternatives:
  - And from the descendants of
  - And from the family of
  lexicon: HALOT
  rationale: The compound conjunction and preposition with בנים introduces the next
    clan grouping in the list. 'Sons of' is the most formally accurate rendering for
    בני in genealogical/list contexts, while still idiomatic in English.
- source_word: עָדִין
  chosen: Adin
  rationale: Proper name; transliterated according to the translation philosophy to
    transliterate names rather than translate them.
- source_word: עֶבֶד
  chosen: Ebed
  alternatives:
  - Obed
  rationale: Here עבד is a personal name, not the common noun 'servant/slave.' It
    should therefore be transliterated. 'Ebed' more directly reflects the Hebrew consonants
    in this name.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard genealogical marker. English omits the article naturally here;
    'son of' is concise and accurate.
- source_word: יוֹנָתָן
  chosen: Jonathan
  alternatives:
  - Jehonathan
  rationale: Proper name; standard English transliteration is 'Jonathan.'
- source_word: וְ/עִמּוֹ
  chosen: and with him
  alternatives:
  - with him
  lexicon: HALOT
  rationale: The conjunction plus preposition/pronominal suffix links the named leader
    with the number accompanying him. Retaining 'and' reflects the Hebrew list structure.
- source_word: חֲמִשִּׁים
  chosen: fifty
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: הַזְּכָרִים
  chosen: males
  alternatives:
  - men
  lexicon: HALOT
  rationale: זכרים denotes males specifically. 'Males' is more lexically precise than
    'men,' especially in a census/list context, and it preserves the gender-specific
    wording of the Hebrew.
