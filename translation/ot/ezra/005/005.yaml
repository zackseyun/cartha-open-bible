theological_decisions:
- issue: Anthropomorphic description of divine oversight
  chosen_reading: Retain the metaphor 'the eye of their God was on' in the main text
  alternative_readings:
  - their God was watching over
  rationale: The text uses concrete anthropomorphic imagery for God's providential
    oversight. Preserving the metaphor maintains the literary force without importing
    extra doctrinal explanation.
  doctrine_reference: Translation philosophy §1, §3, §6
