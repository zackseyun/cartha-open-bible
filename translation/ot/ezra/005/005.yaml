id: EZR.5.5
reference: Ezra 5:5
source:
  edition: WLC
  text: וְ/עֵ֣ין אֱלָהֲ/הֹ֗ם הֲוָת֙ עַל שָׂבֵ֣י יְהוּדָיֵ֔/א וְ/לָא בַטִּ֣לוּ הִמּ֔וֹ
    עַד טַעְמָ֖/א לְ/דָרְיָ֣וֶשׁ יְהָ֑ךְ וֶ/אֱדַ֛יִן יְתִיב֥וּן נִשְׁתְּוָנָ֖/א עַל
    דְּנָֽה־־־־׃פ
translation:
  text: But the eye of their God was on the elders of the Jews, and they did not make
    them stop until a decree should go to Darius; then they would send back a letter
    concerning this matter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was watching over the elders of the Jews.'
    reason: lexical_alternative
  - marker: b
    text: Or 'until a decision/order should go to Darius.'
    reason: lexical_alternative
  - marker: c
    text: Or 'then they would send a reply in writing concerning this.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעֵין
  chosen: But the eye
  alternatives:
  - And the eye
  - But the watchful eye
  lexicon: HALOT
  rationale: Retains the singular metaphor 'eye' rather than paraphrasing to 'care'
    or 'providence.' 'But' fits the discourse contrast with the officials' challenge
    in the previous verse.
- source_word: אֱלָהֲהֹם
  chosen: of their God
  alternatives:
  - of God
  lexicon: HALOT
  rationale: 'The pronominal suffix is explicit in Aramaic and should be preserved:
    this is the God belonging to/identified with the Jewish elders.'
- source_word: הֲוָת עַל
  chosen: was on
  alternatives:
  - was upon
  - watched over
  lexicon: HALOT
  rationale: A natural English rendering of the idiom while preserving the concrete
    imagery. 'Watched over' is interpretive and therefore left as an alternative rather
    than main text.
- source_word: שָׂבֵי יְהוּדָיֵא
  chosen: the elders of the Jews
  alternatives:
  - the Jewish elders
  - the leaders of the Jews
  lexicon: HALOT
  rationale: שָׂבֵי denotes elders, not merely generic leaders. The construct relationship
    is preserved straightforwardly.
- source_word: וְלָא בַטִּלוּ הִמּוֹ
  chosen: and they did not make them stop
  alternatives:
  - and they did not stop them
  - and they did not hinder them
  lexicon: HALOT
  rationale: The verb in the Pael conveys causing cessation or hindering. 'Make them
    stop' best captures the causative force with clear English.
- source_word: עַד טַעְמָא
  chosen: until a decree
  alternatives:
  - until a decision
  - until an order
  lexicon: HALOT
  rationale: טַעַם in Imperial Aramaic commonly refers to an official decision/decree.
    'Decree' fits the Persian administrative context.
- source_word: לְדָרְיָוֶשׁ יְהָךְ
  chosen: should go to Darius
  alternatives:
  - might go to Darius
  - went to Darius
  lexicon: HALOT
  rationale: The verb is imperfect and in context points to a pending referral of
    the matter to the king, not a completed action. 'Should go' conveys expected future
    movement of the decree/decision to Darius.
- source_word: וֶאֱדַיִן
  chosen: then
  alternatives:
  - and then
  - afterward
  lexicon: HALOT
  rationale: Marks the next step in sequence succinctly.
- source_word: יְתִיבוּן
  chosen: they would send back
  alternatives:
  - they would return
  - they would reply
  lexicon: HALOT
  rationale: The root can mean return/bring back. In context with 'letter' it refers
    to sending back a written response after consultation. 'Reply' is possible but
    less formally tied to the concrete noun that follows.
- source_word: נִשְׁתְּוָנָא
  chosen: a letter
  alternatives:
  - a written report
  - an official letter
  lexicon: HALOT
  rationale: Refers to an official written communication. 'Letter' is clear and sufficient
    in English; the administrative nuance can be preserved in a footnote alternative
    if desired.
- source_word: עַל דְּנָה
  chosen: concerning this matter
  alternatives:
  - about this
  - concerning this
  lexicon: HALOT
  rationale: Expands the demonstrative slightly for natural English while keeping
    the referent explicit.
