id: EZR.5.12
reference: Ezra 5:12
source:
  edition: WLC
  text: לָהֵ֗ן מִן דִּ֨י הַרְגִּ֤זוּ אֲבָהֳתַ֨/נָא֙ לֶ/אֱלָ֣הּ שְׁמַיָּ֔/א יְהַ֣ב
    הִמּ֔וֹ בְּ/יַ֛ד נְבוּכַדְנֶצַּ֥ר מֶֽלֶךְ בָּבֶ֖ל כסדי/א וּ/בַיְתָ֤/ה דְנָה֙ סַתְרֵ֔/הּ
    וְ/עַמָּ֖/ה הַגְלִ֥י לְ/בָבֶֽל־־׃ס
translation:
  text: Therefore, because our fathers provoked the God of heaven to wrath, he gave
    them into the hand of Nebuchadnezzar king of Babylon, the Chaldean, and he destroyed
    this house and carried the people away to Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'angered the God of heaven.'
    reason: lexical_alternative
  - marker: b
    text: Aramaic 'this house,' that is, the temple.
    reason: cultural_note
  - marker: c
    text: Or 'exiled the people to Babylon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָהֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the consequence of the previous
    statement. 'Therefore' best preserves the inferential force in natural English.
- source_word: מִן דִּי
  chosen: because
  alternatives:
  - since
  - for that
  lexicon: HALOT
  rationale: The combination functions idiomatically as a causal conjunction in Imperial
    Aramaic. 'Because' is the clearest modern English equivalent.
- source_word: הַרְגִּזוּ
  chosen: provoked ... to wrath
  alternatives:
  - angered
  - provoked
  lexicon: HALOT
  rationale: The verb from רגז in the causative conveys causing anger or agitation.
    'Provoked ... to wrath' preserves both the causative nuance and the solemn register
    of divine anger better than the flatter 'angered'.
- source_word: אֲבָהֳתַנָא
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: HALOT
  rationale: Literally 'our fathers.' This is a conventional ancestral reference,
    and 'our fathers' preserves the source wording and biblical style; 'our ancestors'
    is possible but less formally aligned.
- source_word: לֶאֱלָהּ שְׁמַיָּא
  chosen: the God of heaven
  alternatives:
  - God of heaven
  lexicon: HALOT
  rationale: A standard postexilic title for Israel's God. Including 'the' reflects
    the determined expression in context and reads naturally in English.
- source_word: יְהַב הִמּוֹ בְּיַד
  chosen: he gave them into the hand of
  alternatives:
  - he delivered them into the hand of
  - he handed them over to
  lexicon: HALOT
  rationale: This is a common biblical idiom for delivering someone into another's
    power. 'Gave them into the hand of' preserves the idiom with good readability.
- source_word: נְבוּכַדְנֶצַּר מֶלֶךְ בָּבֶל
  chosen: Nebuchadnezzar king of Babylon
  alternatives:
  - Nebuchadrezzar king of Babylon
  lexicon: HALOT
  rationale: Standard English transliteration is 'Nebuchadnezzar.' The royal title
    is rendered straightforwardly.
- source_word: כסדיא
  chosen: the Chaldean
  alternatives:
  - of the Chaldeans
  - the Babylonian
  lexicon: HALOT
  rationale: The gentilic is singular appositional to Nebuchadnezzar. 'The Chaldean'
    most directly reflects the Aramaic form; 'the Babylonian' would interpret rather
    than translate.
- source_word: וּבַיְתָה דְנָה
  chosen: and this house
  alternatives:
  - and this temple
  lexicon: HALOT
  rationale: '''House'' is the literal term and in Ezra commonly refers to the temple.
    The more explicit ''temple'' is interpretive, so ''this house'' is retained.'
- source_word: סַתְרֵהּ
  chosen: he destroyed
  alternatives:
  - he tore down
  - he demolished
  lexicon: HALOT
  rationale: The verb denotes pulling down or destroying a structure. 'Destroyed'
    is broad enough for the temple context and standard in English Bible style.
- source_word: וְעַמָּה הַגְלִי
  chosen: and carried the people away
  alternatives:
  - and exiled the people
  - and deported the people
  lexicon: HALOT
  rationale: The verb גלה in the causative means to take into exile. 'Carried the
    people away' preserves the motion and exile sense in idiomatic English; 'exiled'
    is possible but slightly more abstract.
- source_word: לְבָבֶל
  chosen: to Babylon
  alternatives:
  - into Babylon
  lexicon: HALOT
  rationale: Simple directional phrase; 'to Babylon' is the most natural rendering.
