theological_decisions:
- issue: Rendering divine judgment language without softening causation
  chosen_reading: he gave them into the hand of Nebuchadnezzar
  alternative_readings:
  - he allowed them to fall into the hand of Nebuchadnezzar
  rationale: The text explicitly attributes the handing over to the God of heaven
    as judgment for provocation. The translation preserves that direct causative statement
    rather than softening it into mere permission.
  doctrine_reference: Translation philosophy §1, §3
- issue: Temple terminology
  chosen_reading: this house
  alternative_readings:
  - this temple
  rationale: Although the referent is the temple, the source text uses 'house.' Retaining
    'house' preserves the biblical-theological diction associated with God's house
    without adding interpretation to the main text.
  doctrine_reference: Translation philosophy §1, §5
