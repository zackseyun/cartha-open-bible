theological_decisions:
- issue: Reference of 'the house of God'
  chosen_reading: Retain the literal phrase 'the house of God' rather than substituting
    'temple' in the main text.
  alternative_readings:
  - the temple of God
  rationale: The source text literally says 'house of God.' Using the literal expression
    preserves the biblical idiom and avoids importing a more interpretive label into
    the main text, though 'temple' is a valid contextual alternative.
  doctrine_reference: Translation philosophy §1, §5
