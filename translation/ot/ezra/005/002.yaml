id: EZR.5.2
reference: Ezra 5:2
source:
  edition: WLC
  text: בֵּ/אדַ֡יִן קָ֠מוּ זְרֻבָּבֶ֤ל בַּר שְׁאַלְתִּיאֵל֙ וְ/יֵשׁ֣וּעַ בַּר יֽוֹצָדָ֔ק
    וְ/שָׁרִ֣יו לְ/מִבְנֵ֔א בֵּ֥ית אֱלָהָ֖/א דִּ֣י בִ/ירֽוּשְׁלֶ֑ם וְ/עִמְּ/ה֛וֹן
    נביאי/א דִֽי אֱלָהָ֖/א מְסָעֲדִ֥ין לְ/הֽוֹן־־־׃פ
translation:
  text: Then Zerubbabel son of Shealtiel and Jeshua son of Jozadak arose and began
    to build the house of God that is in Jerusalem, and with them were the prophets
    of God, supporting them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple of God.' The Aramaic reads literally 'the house of God.'
    reason: lexical_alternative
  - marker: b
    text: Jeshua is the personal name form used here; compare the related name form
      'Joshua' elsewhere.
    reason: lexical_alternative
  - marker: c
    text: Or 'helping them' or 'assisting them.' The participle conveys active support.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence. 'Then'
    is natural modern English and preserves the narrative progression.
- source_word: קָמוּ
  chosen: arose
  alternatives:
  - rose up
  - set out
  lexicon: HALOT
  rationale: The verb literally means 'arose/stood up.' 'Arose' preserves the formal
    sense while fitting the narrative idiom of initiating action.
- source_word: זְרֻבָּבֶל
  chosen: Zerubbabel
  rationale: Standard English transliteration of the personal name, following the
    translation policy to transliterate names.
- source_word: בַּר
  chosen: son of
  lexicon: HALOT
  rationale: Aramaic patronymic marker; 'son of' is the direct and standard rendering.
- source_word: שְׁאַלְתִּיאֵל
  chosen: Shealtiel
  alternatives:
  - Salathiel
  rationale: Standard English transliteration of the Hebrew/Aramaic name in OT context.
- source_word: יֵשׁוּעַ
  chosen: Jeshua
  alternatives:
  - Joshua
  rationale: The form here is Jeshua, not the full form Joshua. Rendering it as 'Jeshua'
    preserves the actual name form in the source text.
- source_word: יוֹצָדָק
  chosen: Jozadak
  alternatives:
  - Jehozadak
  rationale: The Aramaic/Hebrew form here supports 'Jozadak' in this context; 'Jehozadak'
    reflects a fuller related form used elsewhere.
- source_word: וְשָׁרִיו
  chosen: and began
  alternatives:
  - and they started
  - and they set about
  lexicon: HALOT
  rationale: 'This is the auxiliary verb ''they began.'' In English it is best brought
    forward with the infinitive ''to build'' to produce idiomatic sense: ''arose and
    began to build.'''
- source_word: לְמִבְנֵא
  chosen: to build
  alternatives:
  - building
  lexicon: HALOT
  rationale: Infinitive complement to 'began'; 'to build' is the most natural English
    rendering.
- source_word: בֵּית אֱלָהָא
  chosen: the house of God
  alternatives:
  - God's house
  - the temple of God
  lexicon: HALOT
  rationale: Literally 'house of God.' This preserves the source wording while clearly
    referring to the temple. 'Temple' is interpretive and therefore left as an alternative
    rather than main text.
- source_word: דִּי בִירוּשְׁלֶם
  chosen: that is in Jerusalem
  alternatives:
  - which was in Jerusalem
  lexicon: HALOT
  rationale: Relative clause identifying the location of the house of God. Present
    tense 'is' works naturally in English narrative description.
- source_word: וְעִמְּהוֹן
  chosen: and with them were
  alternatives:
  - and with them was
  - while with them were
  lexicon: HALOT
  rationale: Prepositional phrase introducing accompanying persons. English inverts
    naturally to 'with them were the prophets of God.'
- source_word: נביאיא דִי אֱלָהָא
  chosen: the prophets of God
  alternatives:
  - God's prophets
  lexicon: HALOT
  rationale: Straightforward construct/relative expression. 'The prophets of God'
    preserves the formal tone and emphasis.
- source_word: מְסָעֲדִין לְהוֹן
  chosen: supporting them
  alternatives:
  - helping them
  - assisting them
  - strengthening them
  lexicon: HALOT
  rationale: The participle denotes giving support or aid. 'Supporting them' captures
    both practical and moral assistance without over-specifying the manner.
