id: EZR.5.17
reference: Ezra 5:17
source:
  edition: WLC
  text: וּ/כְעַ֞ן הֵ֧ן עַל מַלְכָּ֣/א טָ֗ב יִ֠תְבַּקַּר בְּ/בֵ֨ית גִּנְזַיָּ֜/א דִּי
    מַלְכָּ֣/א תַמָּה֮ דִּ֣י בְּ/בָבֶל֒ הֵ֣ן אִיתַ֗י דִּֽי מִן כּ֤וֹרֶשׁ מַלְכָּ/א֙
    שִׂ֣ים טְעֵ֔ם לְ/מִבְנֵ֛א בֵּית אֱלָהָ֥/א דֵ֖ךְ בִּ/ירוּשְׁלֶ֑ם וּ/רְע֥וּת מַלְכָּ֛/א
    עַל דְּנָ֖ה יִשְׁלַ֥ח עֲלֶֽי/נָא־־־־־־׃ס
translation:
  text: And now, if it seems good to the king, let a search be made in the royal treasury
    there in Babylon, whether it is so that a decree was issued by King Cyrus to rebuild
    this house of God in Jerusalem; and let the king send to us his pleasure concerning
    this matter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to build this house of God in Jerusalem.' The Aramaic verb can be rendered
      simply 'build'; 'rebuild' reflects the restoration context.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the king's will' or 'the king's decision.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְעַן
  chosen: And now
  alternatives:
  - Now therefore
  - So now
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the request's conclusion or next
    step. 'And now' is natural English and preserves the connective force.
- source_word: הֵן עַל מַלְכָּא טָב
  chosen: if it seems good to the king
  alternatives:
  - if it is good to the king
  - if it pleases the king
  lexicon: HALOT
  rationale: Idiomatic court language. 'Seems good to the king' preserves the deferential
    register without sounding archaic.
- source_word: יִתְבַּקַּר
  chosen: let a search be made
  alternatives:
  - let it be investigated
  - let inquiry be made
  lexicon: HALOT
  rationale: Passive/imperfect jussive sense in context. 'Let a search be made' fits
    the archival setting better than the broader 'investigated.'
- source_word: בְּבֵית גִּנְזַיָּא
  chosen: in the royal treasury
  alternatives:
  - in the house of treasures
  - in the archive house
  - in the treasury house
  lexicon: HALOT
  rationale: Literally 'house of treasures,' referring to the place where royal valuables/documents
    were kept. 'Royal treasury' is idiomatic and contextually appropriate for an archive
    search.
- source_word: דִּי מַלְכָּא תַמָּה דִּי בְּבָבֶל
  chosen: there in Babylon
  alternatives:
  - which is there in Babylon
  - there, in Babylon
  lexicon: HALOT
  rationale: The relative construction specifies the location of the royal treasury.
    'There in Babylon' is concise and preserves the locative emphasis.
- source_word: הֵן אִיתַי דִּי
  chosen: whether it is so that
  alternatives:
  - whether indeed
  - whether there is
  lexicon: HALOT
  rationale: 'Introduces the content of the search: whether such a decree actually
    exists. ''Whether it is so that'' captures the existential and confirmatory force
    in smooth English.'
- source_word: מִן כּוֹרֶשׁ מַלְכָּא שִׂים טְעֵם
  chosen: a decree was issued by King Cyrus
  alternatives:
  - King Cyrus set forth a decree
  - an order was made by King Cyrus
  lexicon: HALOT
  rationale: טְעֵם in Imperial Aramaic commonly denotes an official decision/decree;
    שִׂים with it means to set/issue such an order. Passive English foregrounds the
    existence of the decree, which is the point of the inquiry.
- source_word: לְמִבְנֵא
  chosen: to rebuild
  alternatives:
  - to build
  - for building
  lexicon: HALOT
  rationale: Though formally 'to build,' in context of temple restoration after destruction,
    English 'rebuild' communicates the historical sense more clearly without exceeding
    the context.
- source_word: בֵּית אֱלָהָא דֵךְ
  chosen: this house of God
  alternatives:
  - this temple of God
  - that house of God
  lexicon: HALOT
  rationale: דֵךְ is a demonstrative, here best rendered 'this' from the speakers'
    perspective. 'House of God' preserves the source wording; 'temple' is interpretive
    though contextually true.
- source_word: וּרְעוּת מַלְכָּא
  chosen: the king's pleasure
  alternatives:
  - the king's will
  - the king's decision
  - the king's desire
  lexicon: HALOT
  rationale: Court formula for the sovereign's will or good pleasure. 'Pleasure' preserves
    the formal royal idiom found in similar administrative contexts.
- source_word: עַל דְּנָה
  chosen: concerning this matter
  alternatives:
  - about this
  - regarding this
  lexicon: HALOT
  rationale: Expands the demonstrative into natural English while keeping the official
    tone.
- source_word: יִשְׁלַח עֲלֵינָא
  chosen: let the king send to us
  alternatives:
  - let him send to us
  - let the king send us word
  lexicon: HALOT
  rationale: Retains the jussive request and explicit subject. 'Send to us' is literal;
    the object, namely his decision, is supplied by context in English.
