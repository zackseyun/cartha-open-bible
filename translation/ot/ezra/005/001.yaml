theological_decisions:
- issue: Referent and force of the closing phrase עֲלֵיהוֹן
  chosen_reading: It modifies 'the God of Israel' and is rendered 'who was over them,' expressing God's oversight/authority over the Jews.
  alternative_readings:
  - It could be taken more loosely as 'upon them,' emphasizing divine presence rather than authority.
  - 'Some translations leave the phrase more compressed: ''in the name of the God of Israel, unto them.'''
  rationale: The syntax most plausibly links the phrase to 'the God of Israel' rather than to the act of prophesying alone. Rendering it with a relative clause preserves the theological sense of God's covenantal oversight without overinterpreting it.
