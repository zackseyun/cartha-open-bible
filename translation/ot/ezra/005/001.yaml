id: EZR.5.1
reference: Ezra 5:1
source:
  edition: WLC
  text: וְ/הִתְנַבִּ֞י חַגַּ֣י נביא/ה וּ/זְכַרְיָ֤ה בַר עִדּוֹא֙ נביאי/א עַל יְה֣וּדָיֵ֔/א דִּ֥י בִ/יה֖וּד וּ/בִ/ירוּשְׁלֶ֑ם בְּ/שֻׁ֛ם אֱלָ֥הּ יִשְׂרָאֵ֖ל עֲלֵי/הֽוֹן־־׃ס
translation:
  text: Now Haggai the prophet and Zechariah son of Iddo[a], the prophets, prophesied to the Jews who were in Judah and in Jerusalem[b], in the name of the God of Israel who was over them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Judeans.' The Aramaic term can denote the Jewish people or, more geographically, the people of Judah.
    reason: lexical_alternative
  - marker: b
    text: Or 'by the authority of the God of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִתְנַבִּי
  chosen: Now ... prophesied
  alternatives:
  - And ... prophesied
  - began to prophesy
  lexicon: HALOT
  rationale: The verb is Peal perfect 3ms in Biblical Aramaic from נבא, introducing the narrative action. English supplies both prophets as compound subject, so 'prophesied' is the natural rendering. Initial waw is rendered 'Now' to mark narrative progression smoothly in English.
- source_word: חַגַּי
  chosen: Haggai
  rationale: Personal name transliterated by standard English convention, per translation philosophy.
- source_word: נביאה
  chosen: the prophet
  alternatives:
  - a prophet
  lexicon: HALOT
  rationale: 'The emphatic/determined form functions appositionally with Haggai: ''Haggai the prophet.'' Definite rendering best reflects the form and idiomatic English.'
- source_word: וּזְכַרְיָה בַר עִדּוֹא
  chosen: and Zechariah son of Iddo
  alternatives:
  - and Zechariah the son of Iddo
  rationale: Names are transliterated; בַר is the Aramaic filial term 'son of.' The article is not required in English before 'son of Iddo.'
- source_word: נביאיא
  chosen: the prophets
  lexicon: HALOT
  rationale: Plural apposition summarizing both Haggai and Zechariah. Rendering it explicitly preserves the Hebrew/Aramaic structure rather than omitting it as redundant.
- source_word: עַל
  chosen: to
  alternatives:
  - against
  - concerning
  - over
  lexicon: HALOT
  rationale: With the verb 'prophesy,' עַל can mark the object or audience. Here the sense is directed speech to the Judeans, not hostile prophecy against them, especially given the rebuilding context.
- source_word: יְהוּדָיֵא
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: HALOT
  rationale: The term can denote Judeans ethnically/geographically. In Ezra it often refers to the returned Jewish community. 'The Jews' is the more familiar and likely sense in English, while 'Judeans' is preserved as a lexical alternative because the geographic nuance is possible.
- source_word: דִּי בִיהוּד וּבִירוּשְׁלֶם
  chosen: who were in Judah and in Jerusalem
  alternatives:
  - who were in Judea and Jerusalem
  lexicon: HALOT
  rationale: דִּי introduces the relative clause. 'Judah' matches the postexilic provincial/territorial reference better than the later Greek/English form 'Judea' in this OT context.
- source_word: בְּשֻׁם
  chosen: in the name of
  alternatives:
  - by the authority of
  lexicon: HALOT
  rationale: This idiom denotes speaking under divine authority and representation. 'In the name of' is the standard and sufficiently transparent rendering; the authority nuance is noted as an alternative.
- source_word: אֱלָהּ יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct chain; definite in sense.
- source_word: עֲלֵיהוֹן
  chosen: who was over them
  alternatives:
  - over them
  - upon them
  lexicon: HALOT
  rationale: The phrase most naturally modifies 'the God of Israel' and expresses his oversight/protective authority over the Jews. English requires an explicit relative clause for clarity. 'Upon them' is more literal but less idiomatic here.
