id: EZR.5.8
reference: Ezra 5:8
source:
  edition: WLC
  text: יְדִ֣יעַ לֶהֱוֵ֣א לְ/מַלְכָּ֗/א דִּֽי אֲזַ֜לְנָא לִ/יה֤וּד מְדִֽינְתָּ/א֙ לְ/בֵית֙ אֱלָהָ֣/א רַבָּ֔/א וְ/ה֤וּא מִתְבְּנֵא֙ אֶ֣בֶן גְּלָ֔ל וְ/אָ֖ע מִתְּשָׂ֣ם בְּ/כֻתְלַיָּ֑/א וַ/עֲבִ֥ידְתָּ/א דָ֛ךְ אָסְפַּ֥רְנָא מִתְעַבְדָ֖א וּ/מַצְלַ֥ח בְּ/יֶדְ/הֹֽם׀־׃ס
translation:
  text: Let it be known to the king that we went to the province of Judah[a], to the house of the great God. It is being built with great stones, and timber is being laid in the walls[b]. This work is being done diligently and is prospering in their hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with great stones.' The Aramaic phrase may refer generally to very large building stones.
    reason: lexical_alternative
  - marker: b
    text: Or 'carefully' or possibly 'rapidly' for 'diligently.' The adverb's nuance is debated, but it clearly describes the work as proceeding effectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְדִיעַ לֶהֱוֵא
  chosen: Let it be known
  alternatives:
  - Be it known
  - May it be known
  lexicon: HALOT
  rationale: Aramaic administrative formula introducing an official report. 'Let it be known' preserves the formal register while remaining natural English.
- source_word: לְמַלְכָּא
  chosen: to the king
  alternatives:
  - before the king
  lexicon: HALOT
  rationale: The dative/prepositional construction naturally marks the addressee of the report.
- source_word: אֲזַלְנָא
  chosen: we went
  alternatives:
  - we came
  - we traveled
  lexicon: HALOT
  rationale: The verb means 'go/went.' 'We went' best reflects the reporters' movement from their own standpoint.
- source_word: לִיהוּד מְדִינְתָּא
  chosen: to the province of Judah
  alternatives:
  - to the province Yehud
  - to Judah province
  lexicon: HALOT
  rationale: מְדִינְתָּא denotes an imperial province. 'Judah' is the standard English form of Yehud; 'province of Judah' is clear and historically fitting.
- source_word: לְבֵית אֱלָהָא רַבָּא
  chosen: to the house of the great God
  alternatives:
  - to the temple of the great God
  - to the house of God the Great
  lexicon: HALOT
  rationale: Literally 'house of the great God.' While this refers to the temple, retaining 'house' preserves the source wording and its reverential tone.
- source_word: מִתְבְּנֵא
  chosen: It is being built
  alternatives:
  - it is under construction
  - they are building it
  lexicon: HALOT
  rationale: The passive/reflexive form is best represented by an English passive progressive.
- source_word: אֶבֶן גְּלָל
  chosen: with huge stones
  alternatives:
  - with great stones
  - with rolled stones
  lexicon: HALOT
  rationale: The phrase denotes large dressed or massive stones used in construction. 'Huge stones' communicates the sense clearly in modern English. 'Rolled stones' is too literal and misleading in context.
- source_word: וְאָע
  chosen: and timber
  alternatives:
  - and wood
  - and beams
  lexicon: HALOT
  rationale: The noun broadly denotes wood/timber. 'Timber' fits a construction context better than the generic 'wood.'
- source_word: מִתְּשָׂם בְּכֻתְלַיָּא
  chosen: is being laid in the walls
  alternatives:
  - is being set in the walls
  - is being placed in the walls
  lexicon: HALOT
  rationale: The passive/reflexive verb plus 'in the walls' describes timber being inserted or laid into the wall structure.
- source_word: וַעֲבִידְתָּא דָךְ
  chosen: This work
  alternatives:
  - This project
  - This construction
  lexicon: HALOT
  rationale: A straightforward rendering of the demonstrative plus noun. 'Work' is broad enough to cover the building activity without over-specifying.
- source_word: אָסְפַּרְנָא
  chosen: diligently
  alternatives:
  - carefully
  - rapidly
  lexicon: HALOT
  rationale: The adverb is somewhat debated, but in this context it most naturally conveys energetic or careful execution. 'Diligently' captures competent, earnest progress without overstating speed.
- source_word: מִתְעַבְדָא
  chosen: is being done
  alternatives:
  - is being carried out
  - is being made
  lexicon: HALOT
  rationale: Passive/reflexive participial form describing the ongoing execution of the work.
- source_word: וּמַצְלַח בְּיֶדְהֹם
  chosen: and is prospering in their hands
  alternatives:
  - and succeeds in their hands
  - and is making progress by their hand
  lexicon: HALOT
  rationale: A common idiom for successful progress under someone's agency. 'Prospering in their hands' preserves the idiom while remaining understandable.
