id: EZR.5.15
reference: Ezra 5:15
source:
  edition: WLC
  text: וַ/אֲמַר לֵ֓/הּ אלה מָֽאנַיָּ֔/א שֵׂ֚א אֵֽזֶל אֲחֵ֣ת הִמּ֔וֹ בְּ/הֵיכְלָ֖/א
    דִּ֣י בִ/ירוּשְׁלֶ֑ם וּ/בֵ֥ית אֱלָהָ֖/א יִתְבְּנֵ֥א עַל אַתְרֵֽ/הּ־׀־־׃ס
translation:
  text: And he said to him, ‘Take these vessels, go, put them in the temple that is
    in Jerusalem, and let the house of God be rebuilt on its site.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “be built on its place.” The Aramaic expression emphasizes rebuilding
      the house of God at its proper location.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲמַר לֵהּ
  chosen: And he said to him
  alternatives:
  - and said to him
  lexicon: HALOT
  rationale: Standard narrative introduction in Biblical Aramaic. Including 'he' reflects
    the 3ms verbal form and keeps the discourse clear.
- source_word: אֵלֶּה מָאנַיָּא
  chosen: these vessels
  alternatives:
  - these articles
  - these utensils
  lexicon: HALOT
  rationale: מָאנַיָּא refers to implements/containers, here specifically temple items
    previously taken from Jerusalem. 'Vessels' is the most natural and contextually
    appropriate English rendering for sacred temple objects.
- source_word: שֵׂא
  chosen: Take
  alternatives:
  - lift up
  - carry
  lexicon: HALOT
  rationale: Imperative of נשׂא. In this sequence of commands, 'Take' is idiomatic
    English and fits the sense of receiving and transporting the temple vessels.
- source_word: אֵזֶל
  chosen: go
  alternatives:
  - depart
  lexicon: HALOT
  rationale: Common Aramaic verb of motion. 'Go' is the plain and natural imperative.
- source_word: אֲחֵת הִמּוֹ
  chosen: put them
  alternatives:
  - set them down
  - deposit them
  lexicon: HALOT
  rationale: The verb means to place or set, with הִמּוֹ as the 3mp object 'them.'
    'Put them' is concise and natural in English.
- source_word: בְּהֵיכְלָא
  chosen: in the temple
  alternatives:
  - in the palace
  - in the sanctuary
  lexicon: HALOT
  rationale: Although הֵיכְל can denote a palace in some contexts, here the reference
    is clearly to the Jerusalem temple and its sacred vessels, so 'temple' is required
    by context.
- source_word: דִּי בִירוּשְׁלֶם
  chosen: that is in Jerusalem
  alternatives:
  - which is in Jerusalem
  - in Jerusalem
  lexicon: HALOT
  rationale: The relative particle דִּי introduces a defining clause. 'That is in
    Jerusalem' preserves the syntax while remaining readable.
- source_word: וּבֵית אֱלָהָא
  chosen: and let the house of God
  alternatives:
  - and the house of God
  lexicon: HALOT
  rationale: The noun phrase is the subject of the following passive/imperfect verb.
    'House of God' is the standard literal rendering for the temple as God's house.
- source_word: יִתְבְּנֵא
  chosen: be rebuilt
  alternatives:
  - be built
  - be reconstructed
  lexicon: HALOT
  rationale: 'The Ithpeel/imperfect form is passive/reflexive in sense: ''be built.''
    Because the context in Ezra concerns restoration after destruction, ''be rebuilt''
    makes the historical sense explicit without distorting the verb''s force.'
- source_word: עַל אַתְרֵהּ
  chosen: on its site
  alternatives:
  - in its place
  - upon its former place
  lexicon: HALOT
  rationale: אַתְרָא means place/site. 'On its site' is idiomatic and conveys rebuilding
    at the proper location; 'its' refers to the house of God.
