id: EZR.5.11
reference: Ezra 5:11
source:
  edition: WLC
  text: וּ/כְנֵ֥מָא פִתְגָמָ֖/א הֲתִיב֣וּ/נָא לְ/מֵמַ֑ר אֲנַ֣חְנָא הִמּ֡וֹ עַבְדוֹ/הִי֩ דִֽי אֱלָ֨הּ שְׁמַיָּ֜/א וְ/אַרְעָ֗/א וּ/בָנַ֤יִן בַּיְתָ/א֙ דִּֽי הֲוָ֨א בְנֵ֜ה מִ/קַּדְמַ֤ת דְּנָה֙ שְׁנִ֣ין שַׂגִּיאָ֔ן וּ/מֶ֤לֶךְ לְ/יִשְׂרָאֵל֙ רַ֔ב בְּנָ֖/הִי וְ/שַׁכְלְלֵֽ/הּ־־׃
translation:
  text: 'And this is the answer they returned to us[a], saying: We are the servants of the God of heaven and earth, and we are rebuilding the house that was built many years ago[b], which a great king of Israel built and completed.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And thus the message they returned to us was.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'we are building the house'; the Aramaic participle can denote ongoing action, and 'rebuilding' makes explicit that this temple had existed previously.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְנֵמָא פִתְגָמָא
  chosen: And this is the answer
  alternatives:
  - And thus the message
  - And this is the response
  lexicon: HALOT
  rationale: The Aramaic phrase introduces the content of the reply. פִתְגָם can mean 'word, decree, message, answer'; in this context of reporting what the Jews said in reply, 'answer' best fits the discourse function. וּכְנֵמָא gives the sense 'and thus/and this is how.'
- source_word: הֲתִיבוּנָא
  chosen: they returned to us
  alternatives:
  - they answered us
  - they gave back to us
  lexicon: HALOT
  rationale: The verb means 'to return/bring back' and in context idiomatically refers to returning an answer. 'Returned to us' preserves the verbal image while remaining natural English.
- source_word: לְמֵמַר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard Aramaic quotative infinitive introducing direct speech; 'saying' is the natural English equivalent.
- source_word: עַבְדוֹהִי
  chosen: servants
  alternatives:
  - slaves
  lexicon: HALOT
  rationale: Although the term can denote bonded service, here it is a conventional designation of worshipful allegiance to God rather than emphasizing chattel status. 'Servants' is the most contextually appropriate rendering.
- source_word: אֱלָהּ שְׁמַיָּא וְאַרְעָא
  chosen: the God of heaven and earth
  alternatives:
  - the God of the heavens and the earth
  lexicon: HALOT
  rationale: A genitival title for Israel's God emphasizing universal sovereignty. Singular 'heaven' is idiomatic in English, though the Aramaic form is plural.
- source_word: וּבָנַיִן
  chosen: and we are rebuilding
  alternatives:
  - and we build
  - and we are building
  lexicon: HALOT
  rationale: The participial form conveys ongoing action. 'We are rebuilding' fits the context because the temple had existed before and is now being built again after destruction.
- source_word: בַּיְתָא
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: Literally 'the house.' Since the referent is the temple, 'house' preserves the source wording while remaining intelligible in context.
- source_word: דִּי הֲוָא בְנֵה
  chosen: that was built
  alternatives:
  - which had been built
  lexicon: HALOT
  rationale: The relative clause refers to the earlier construction of the temple. Simple past in English communicates the sense clearly.
- source_word: מִקַּדְמַת דְּנָה שְׁנִין שַׂגִּיאָן
  chosen: many years ago
  alternatives:
  - from ancient times
  - before this, many years
  lexicon: HALOT
  rationale: Literally 'before this, many years.' The idiomatic English expression 'many years ago' captures the temporal sense without awkwardness.
- source_word: וּמֶלֶךְ לְיִשְׂרָאֵל רַב
  chosen: a great king of Israel
  alternatives:
  - a mighty king of Israel
  - a great king for Israel
  lexicon: HALOT
  rationale: The phrase identifies Solomon without naming him. רַב here conveys greatness or eminence, not merely size or rank.
- source_word: בְּנָהִי וְשַׁכְלְלֵהּ
  chosen: built and completed
  alternatives:
  - built and finished
  - built and perfected
  lexicon: HALOT
  rationale: The paired verbs distinguish initial construction and bringing the structure to completion. 'Completed' best reflects שׁכלל in this building context.
