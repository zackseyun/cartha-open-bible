theological_decisions:
- issue: Divine title in imperial correspondence
  chosen_reading: the God of heaven and earth
  alternative_readings:
  - the God of the heavens and the earth
  rationale: The title should be translated straightforwardly as a universal claim about Israel's God, without reducing it to a merely local or political deity. No doctrinally contested term from the table is involved, but the wording preserves the text's monotheistic scope.
