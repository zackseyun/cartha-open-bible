id: EZR.5.13
reference: Ezra 5:13
source:
  edition: WLC
  text: בְּרַם֙ בִּ/שְׁנַ֣ת חֲדָ֔ה לְ/כ֥וֹרֶשׁ מַלְכָּ֖/א דִּ֣י בָבֶ֑ל כּ֤וֹרֶשׁ מַלְכָּ/א֙
    שָׂ֣ם טְעֵ֔ם בֵּית אֱלָהָ֥/א דְנָ֖ה לִ/בְּנֵֽא־׃
translation:
  text: However, in the first year of Cyrus king of Babylon, Cyrus the king issued
    a decree to rebuild this house of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to build this house of God.' The Aramaic verb itself means 'to build';
      'rebuild' reflects the restoration context.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרַם
  chosen: However
  alternatives:
  - But
  - Nevertheless
  lexicon: HALOT
  rationale: Aramaic adversative introducing a contrast with the preceding statement.
    'However' preserves the discourse turn in natural modern English.
- source_word: בִּשְׁנַת חֲדָה
  chosen: in the first year
  alternatives:
  - in year one
  - in the one year
  lexicon: HALOT
  rationale: Idiomatic regnal-year expression; 'first year' is the natural English
    equivalent.
- source_word: לְכוֹרֶשׁ מַלְכָּא דִּי בָבֶל
  chosen: of Cyrus king of Babylon
  alternatives:
  - belonging to Cyrus, the king of Babylon
  - under Cyrus king of Babylon
  lexicon: HALOT
  rationale: 'The lamed with the royal name in dating formulas marks the regnal reference:
    the first year of Cyrus as king of Babylon.'
- source_word: שָׂם
  chosen: issued
  alternatives:
  - set
  - made
  - established
  lexicon: HALOT
  rationale: Literally 'set/placed,' but with טְעֵם in imperial-administrative context
    it means to promulgate or issue an official order. 'Issued' best captures the
    idiom in clear English.
- source_word: טְעֵם
  chosen: decree
  alternatives:
  - order
  - decision
  - edict
  lexicon: HALOT
  rationale: Imperial administrative term for an official command or ruling. 'Decree'
    fits the formal royal context and common usage in Ezra.
- source_word: בֵּית אֱלָהָא דְנָה
  chosen: this house of God
  alternatives:
  - this temple of God
  - this house, God's house
  lexicon: HALOT
  rationale: Literally 'this house of God.' While the referent is the temple, retaining
    'house of God' preserves the source wording and biblical idiom.
- source_word: לִבְנֵא
  chosen: to rebuild
  alternatives:
  - to build
  - for building
  lexicon: HALOT
  rationale: Aramaic infinitive of בנה, 'to build.' In context of the temple restoration
    after destruction, English 'to rebuild' makes the situational sense explicit without
    distorting the verb's core meaning.
