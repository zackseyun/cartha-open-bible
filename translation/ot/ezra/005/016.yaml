id: EZR.5.16
reference: Ezra 5:16
source:
  edition: WLC
  text: אֱדַ֨יִן֙ שֵׁשְׁבַּצַּ֣ר דֵּ֔ךְ אֲתָ֗א יְהַ֧ב אֻשַּׁיָּ֛/א דִּי בֵ֥ית אֱלָהָ֖/א
    דִּ֣י בִ/ירוּשְׁלֶ֑ם וּ/מִן אֱדַ֧יִן וְ/עַד כְּעַ֛ן מִתְבְּנֵ֖א וְ/לָ֥א שְׁלִֽם־־־׃
translation:
  text: Then this Sheshbazzar came and laid the foundations of the house of God that
    is in Jerusalem; and from then until now it has been being built, but it is not
    finished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'set the foundations.' The Aramaic idiom is literally
      'gave foundations.'
    reason: lexical_alternative
  - marker: b
    text: Or 'it is being built'; the Aramaic verb can be rendered as an ongoing passive
      process.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic adverb marking sequence in narrative. 'Then' is natural modern
    English and preserves temporal progression.
- source_word: שֵׁשְׁבַּצַּר
  chosen: Sheshbazzar
  rationale: Personal name is transliterated per translation philosophy.
- source_word: דֵּךְ
  chosen: this
  alternatives:
  - that
  lexicon: HALOT
  rationale: Demonstrative modifying the proper name. 'This Sheshbazzar' reflects
    the Aramaic deictic force in context, referring back to the person just mentioned.
- source_word: אֲתָא
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: Simple past narrative verb; 'came' is the most direct rendering.
- source_word: יְהַב אֻשַּׁיָּא
  chosen: laid the foundations
  alternatives:
  - set the foundations
  - gave the foundations
  lexicon: HALOT
  rationale: The idiom literally involves 'gave foundations,' but in English the established
    equivalent is 'laid the foundations,' which best conveys the construction action
    without woodenness.
- source_word: בֵית אֱלָהָא
  chosen: the house of God
  alternatives:
  - God's house
  - the temple of God
  lexicon: HALOT
  rationale: Literal rendering preserves the wording of the Aramaic. 'Temple' would
    be interpretive; 'house of God' keeps the source expression.
- source_word: דִּי בִירוּשְׁלֶם
  chosen: that is in Jerusalem
  alternatives:
  - which was in Jerusalem
  lexicon: HALOT
  rationale: Relative clause with locative phrase. Present 'is' works idiomatically
    in English for a standing location reference.
- source_word: וּמִן אֱדַיִן וְעַד כְּעַן
  chosen: and from then until now
  alternatives:
  - and from that time until now
  - and since then until now
  lexicon: HALOT
  rationale: Temporal span from the foundation-laying to the speaker's present. 'From
    then until now' is concise and accurate.
- source_word: מִתְבְּנֵא
  chosen: it has been under construction
  alternatives:
  - it is being built
  - it has been built
  lexicon: HALOT
  rationale: The form is passive/reflexive and durative in context. 'Has been under
    construction' captures the ongoing process from past to present better than a
    simple present passive.
- source_word: וְלָא שְׁלִם
  chosen: but it is not finished
  alternatives:
  - but it has not been completed
  - and it is not complete
  lexicon: HALOT
  rationale: Expresses non-completion at the present point. 'Not finished' is clear
    modern English; 'completed' is a viable formal alternative.
