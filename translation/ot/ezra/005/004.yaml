id: EZR.5.4
reference: Ezra 5:4
source:
  edition: WLC
  text: אֱדַ֥יִן כְּנֵ֖מָא אֲמַ֣רְנָא לְּ/הֹ֑ם מַן אִנּוּן֙ שְׁמָהָ֣ת גֻּבְרַיָּ֔/א
    דִּֽי דְנָ֥ה בִנְיָנָ֖/א בָּנַֽיִן־־׃
translation:
  text: 'Then we told them this: “What are the names of the men who are building this
    building?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more formally, “Then we said to them thus: ‘What are the names of the
      men who are building this building?’”'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: HALOT
  rationale: Temporal/sequential adverb introducing the next action in the narrative.
    'Then' is natural modern English and preserves the flow.
- source_word: כְּנֵמָא
  chosen: this
  alternatives:
  - thus
  - as follows
  lexicon: HALOT
  rationale: Adverb meaning 'thus/like this.' In idiomatic English with a following
    quotation, 'this' best conveys 'we said as follows' without sounding wooden.
- source_word: אֲמַרְנָא לְּהֹם
  chosen: we told them
  alternatives:
  - we said to them
  - we asked them
  lexicon: HALOT
  rationale: The verb is 'said,' but in English direct speech introduced to an indirect
    object is often better rendered 'told them.' Because the content is an interrogative,
    'asked them' is possible, but the Aramaic uses the common verb 'say,' so 'told
    them' keeps closer to the source while remaining natural.
- source_word: מַן אִנּוּן
  chosen: What are
  alternatives:
  - Who are
  - What
  lexicon: HALOT
  rationale: Introduces a question about identity, followed specifically by 'the names
    of the men.' English idiom prefers 'What are the names...?' rather than a more
    literal 'Who are the names...?' or bare 'What...'.
- source_word: שְׁמָהָת
  chosen: the names
  alternatives:
  - names
  lexicon: HALOT
  rationale: Construct plural 'names of.' The article is supplied in English for naturalness.
- source_word: גֻּבְרַיָּא
  chosen: the men
  alternatives:
  - the menfolk
  - the persons
  lexicon: HALOT
  rationale: Aramaic term for men/males. Per gender-accurate philosophy, 'men' is
    retained rather than a gender-neutral substitute, since the source is specifically
    masculine.
- source_word: דִּי
  chosen: who
  alternatives:
  - that
  - which
  lexicon: HALOT
  rationale: Relative particle linking 'the men' to the participle. 'Who' is the appropriate
    English relative for persons.
- source_word: דְנָה
  chosen: this
  alternatives:
  - this here
  lexicon: HALOT
  rationale: Demonstrative modifying 'building.' Simple 'this' is sufficient and natural.
- source_word: בִנְיָנָא
  chosen: building
  alternatives:
  - structure
  - construction
  lexicon: HALOT
  rationale: Noun referring to the thing being built. 'Building' preserves the lexical
    connection with the following verb and fits the immediate context.
- source_word: בָּנַיִן
  chosen: are building
  alternatives:
  - build
  - are rebuilding
  lexicon: HALOT
  rationale: Participle expressing ongoing action. English progressive 'are building'
    captures the aspect. 'Rebuilding' would import contextual interpretation not explicit
    in this word.
