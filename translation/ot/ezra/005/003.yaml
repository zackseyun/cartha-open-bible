id: EZR.5.3
reference: Ezra 5:3
source:
  edition: WLC
  text: בֵּ/הּ זִמְנָ/א֩ אֲתָ֨א עֲלֵי/ה֜וֹן תַּ֠תְּנַי פַּחַ֧ת עֲבַֽר נַהֲרָ֛/ה וּ/שְׁתַ֥ר בּוֹזְנַ֖י וּ/כְנָוָתְ/ה֑וֹן וְ/כֵן֙ אָמְרִ֣ין לְ/הֹ֔ם מַן שָׂ֨ם לְ/כֹ֜ם טְעֵ֗ם בַּיְתָ֤/א דְנָה֙ לִ/בְּנֵ֔א וְ/אֻשַּׁרְנָ֥/א דְנָ֖ה לְ/שַׁכְלָלָֽה־־־׃ס
translation:
  text: 'At that time Tattenai[a], the governor of Beyond the River[c][b], and Shethar-bozenai and their associates came to them and spoke thus to them: “Who gave you a decree to build this house and to complete this structure?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Who gave you a command/decree to build this house and to finish this structure?' The Aramaic טְעֵם can denote an official order or decree.
    reason: lexical_alternative
  - marker: b
    text: '''Beyond the River'' is the Persian administrative name for the region west of the Euphrates.'
    reason: cultural_note
  - marker: c
    text: The term rendered 'structure' may refer more specifically to the temple's building work; some understand it as 'wall' or 'framework.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּהּ זִמְנָא
  chosen: At that time
  alternatives:
  - At the same time
  - Then
  lexicon: HALOT
  rationale: Idiomatic Aramaic temporal expression; 'At that time' is natural English and preserves the narrative setting without over-literal awkwardness.
- source_word: אֲתָא עֲלֵיהוֹן
  chosen: came to them
  alternatives:
  - came upon them
  - approached them
  lexicon: HALOT
  rationale: The verb plus preposition indicates approach to the Judean builders; 'came to them' is the most straightforward narrative rendering.
- source_word: תַּתְּנַי
  chosen: Tattenai
  rationale: Personal name is transliterated per translation philosophy.
- source_word: פַּחַת עֲבַר נַהֲרָה
  chosen: the governor of Beyond the River
  alternatives:
  - the governor of Trans-Euphrates
  - the governor of the province Beyond the River
  lexicon: HALOT
  rationale: פַּחַת denotes a provincial governor. עֲבַר נַהֲרָה is the Persian administrative designation for the region west of the Euphrates. 'Beyond the River' is a transparent rendering of the title; capitalization reflects its quasi-official regional sense.
- source_word: וּשְׁתַר בּוֹזְנַי
  chosen: and Shethar-bozenai
  alternatives:
  - and Shethar-boznai
  rationale: Proper name transliterated; hyphenation preserves the compound form customary in English renderings.
- source_word: וּכְנָוָתְהוֹן
  chosen: and their associates
  alternatives:
  - and their companions
  - and their colleagues
  lexicon: HALOT
  rationale: The noun refers to those attached to or aligned with them. 'Associates' is natural modern English and suitably broad.
- source_word: וְכֵן אָמְרִין לְהֹם
  chosen: and spoke thus to them
  alternatives:
  - and said this to them
  - and said to them as follows
  lexicon: HALOT
  rationale: The construction introduces direct speech. 'Spoke thus to them' preserves the formal narrative tone while remaining readable.
- source_word: מַן שָׂם לְכֹם טְעֵם
  chosen: Who set a decree for you
  alternatives:
  - Who gave you an order
  - Who issued a command to you
  lexicon: HALOT
  rationale: טְעֵם in Imperial Aramaic commonly denotes an official decision, command, or decree. 'Set a decree' reflects the underlying verb שָׂם ('set/place') while sounding acceptable in English; the sense is an authorized order.
- source_word: בַּיְתָא דְנָה לִבְנֵא
  chosen: to build this house
  alternatives:
  - to rebuild this house
  - to construct this temple
  lexicon: HALOT
  rationale: The infinitive means 'to build.' 'House' preserves the source term and its temple reference in context without importing 'rebuild' into the verb itself; the referent is clear from Ezra's context.
- source_word: וְאֻשַּׁרְנָא דְנָה
  chosen: this structure
  alternatives:
  - this wall
  - this framework
  - this edifice
  lexicon: HALOT
  rationale: The noun is somewhat uncertain but denotes the built work/structure associated with the temple project. 'Structure' is broad enough to preserve the ambiguity without forcing the more specific 'wall.'
- source_word: לְשַׁכְלָלָה
  chosen: to complete
  alternatives:
  - to finish
  - to make complete
  lexicon: HALOT
  rationale: The verb conveys bringing something to completion or finishing it. 'Complete' fits the formal inquiry and pairs well with 'structure.'
