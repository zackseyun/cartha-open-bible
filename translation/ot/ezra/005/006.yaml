id: EZR.5.6
reference: Ezra 5:6
source:
  edition: WLC
  text: פַּרְשֶׁ֣גֶן אִ֠גַּרְתָּ/א דִּֽי שְׁלַ֞ח תַּתְּנַ֣י פַּחַ֣ת עֲבַֽר נַהֲרָ֗/ה
    וּ/שְׁתַ֤ר בּוֹזְנַי֙ וּ/כְנָ֣וָתֵ֔/הּ אֲפַ֨רְסְכָיֵ֔/א דִּ֖י בַּ/עֲבַ֣ר נַהֲרָ֑/ה
    עַל דָּרְיָ֖וֶשׁ מַלְכָּֽ/א־׀־־׃
translation:
  text: This is a copy of the letter that Tattenai, the governor of Beyond the River,
    and Shethar-bozenai and his associates, the officials who were in Beyond the River,
    sent to King Darius.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the Afarsachites," if the term is taken as the name of a people or administrative
      group rather than a functional title.
    reason: alternative_reading
lexical_decisions:
- source_word: פַּרְשֶׁגֶן
  chosen: copy
  alternatives:
  - text
  - transcript
  lexicon: HALOT
  rationale: The noun denotes a written copy or transcript of a document. 'Copy' is
    natural modern English and fits the documentary setting better than the more technical
    'transcript.'
- source_word: אִגַּרְתָּא
  chosen: letter
  alternatives:
  - epistle
  - document
  lexicon: HALOT
  rationale: The term refers to an official written communication. 'Letter' is the
    clearest idiomatic rendering in English for this administrative context.
- source_word: דִּי
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Here the relative particle introduces the clause modifying 'letter.'
    English can render it smoothly as 'that.'
- source_word: שְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: The verb simply states the act of sending the letter. 'Sent' is accurate
    and idiomatic.
- source_word: תַּתְּנַי
  chosen: Tattenai
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: פַּחַת
  chosen: governor
  alternatives:
  - prefect
  lexicon: HALOT
  rationale: In Achaemenid administrative usage the term denotes a provincial governor.
    'Governor' is the standard and most accessible English equivalent.
- source_word: עֲבַר נַהֲרָה
  chosen: Beyond the River
  alternatives:
  - Across the River
  - the province Beyond the River
  lexicon: HALOT
  rationale: This is the conventional Persian provincial designation for the territory
    west of the Euphrates. Capitalizing preserves its force as an administrative region
    rather than a mere geographic description.
- source_word: וּשְׁתַר בּוֹזְנַי
  chosen: and Shethar-bozenai
  rationale: This is a personal name and is therefore transliterated. The hyphen reflects
    standard English presentation of the compound name.
- source_word: וּכְנָוָתֵהּ
  chosen: and his associates
  alternatives:
  - and his companions
  - and their colleagues
  lexicon: HALOT
  rationale: The noun refers to those associated with him. 'Associates' fits the official-administrative
    context better than the more generic 'companions.' The singular pronominal suffix
    is retained as 'his.'
- source_word: אֲפַרְסְכָיֵא
  chosen: the officials
  alternatives:
  - the Afarsachites
  - the Persian officials
  lexicon: HALOT
  rationale: The term is difficult and may denote a class of officials or an ethnic/administrative
    group. In this context, rendering it functionally as 'the officials' best fits
    the syntax with 'who were in Beyond the River' and communicates the role without
    overclaiming a precise ethnic identification.
- source_word: עַל
  chosen: to
  alternatives:
  - concerning
  - unto
  lexicon: HALOT
  rationale: With the verb 'sent' and the recipient 'King Darius,' the preposition
    is best rendered idiomatically as 'to.'
- source_word: דָּרְיָוֶשׁ מַלְכָּא
  chosen: King Darius
  alternatives:
  - Darius the king
  rationale: Both are accurate; 'King Darius' is more natural in contemporary English
    while preserving the royal title.
