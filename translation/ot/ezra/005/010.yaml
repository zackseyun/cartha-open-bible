id: EZR.5.10
reference: Ezra 5:10
source:
  edition: WLC
  text: וְ/אַ֧ף שְׁמָהָתְ/הֹ֛ם שְׁאֵ֥לְנָא לְּ/הֹ֖ם לְ/הוֹדָעוּתָ֑/ךְ דִּ֛י נִכְתֻּ֥ב שֻׁם גֻּבְרַיָּ֖/א דִּ֥י בְ/רָאשֵׁי/הֹֽם־׃ס
translation:
  text: We also asked them their names[a], to make them known to you[b], that we might write down the names of the men who were at their head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'to inform you' for 'so as to make them known to you.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'who were at their head'; that is, the leading men among them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַף
  chosen: We also
  alternatives:
  - and also
  - moreover
  lexicon: HALOT
  rationale: The conjunction plus adverb adds another item in the officials' report. 'We also' fits the narrative flow in natural English while preserving the additive force.
- source_word: שְׁמָהָתְהֹם
  chosen: their names
  alternatives:
  - the names of them
  lexicon: HALOT
  rationale: The plural noun with 3mp suffix is straightforwardly possessive. 'Their names' is idiomatic English.
- source_word: שְׁאֵלְנָא לְּהֹם
  chosen: asked them
  alternatives:
  - inquired of them
  lexicon: HALOT
  rationale: The Aramaic verb 'ask/inquire' with indirect object pronoun is best rendered simply 'asked them' in contemporary English.
- source_word: לְהוֹדָעוּתָךְ
  chosen: so as to make them known to you
  alternatives:
  - to inform you
  - to make known to you
  lexicon: HALOT
  rationale: 'The causative infinitive of ידע with 2ms suffix expresses purpose: the officials asked in order to report the information to the king. ''Make them known to you'' preserves the verbal idea and the object (''their names'') better than the more compressed ''inform you''.'
- source_word: דִּי
  chosen: that
  alternatives:
  - so that
  - for
  lexicon: HALOT
  rationale: Here the particle introduces the content/purpose clause following the inquiry. 'That' is the most natural connector in English.
- source_word: נִכְתֻּב
  chosen: we might write down
  alternatives:
  - we might write
  - we would record
  lexicon: HALOT
  rationale: The verb means 'write'; 'write down' makes explicit the documentary sense in context without overtranslating.
- source_word: שֻׁם
  chosen: the names of
  alternatives:
  - the name of
  lexicon: HALOT
  rationale: Although singular in form, this noun commonly functions collectively in Aramaic. Given the plural referent ('men') and the preceding plural 'their names,' English plural 'the names of' best conveys the sense.
- source_word: גֻּבְרַיָּא
  chosen: the men
  alternatives:
  - the persons
  - the leaders
  lexicon: HALOT
  rationale: The noun denotes men/persons. 'The men' is the plain lexical sense; leadership is specified by the following phrase, so it should not be built into this noun.
- source_word: דִּי בְרָאשֵׁיהֹם
  chosen: who were at their head
  alternatives:
  - who were their leaders
  - who were over them
  lexicon: HALOT
  rationale: Literally 'who [were] at their heads.' The idiom identifies the leading men among the group. 'Who were at their head' preserves the metaphor while remaining understandable.
