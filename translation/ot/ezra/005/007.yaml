id: EZR.5.7
reference: Ezra 5:7
source:
  edition: WLC
  text: פִּתְגָמָ֖/א שְׁלַ֣חוּ עֲל֑וֹ/הִי וְ/כִ/דְנָה֙ כְּתִ֣יב בְּ/גַוֵּ֔/הּ לְ/דָרְיָ֥וֶשׁ מַלְכָּ֖/א שְׁלָמָ֥/א כֹֽלָּ/א׃ס
translation:
  text: 'They sent a report to him[b][a], and this was what was written in it: “To Darius the king: all peace.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “They sent him a letter/report, and this is what was written in it.” The Aramaic פתגמא can denote an official message, report, or document.
    reason: lexical_alternative
  - marker: b
    text: “All peace” is a formal epistolary greeting meaning complete peace or well-being.
    reason: cultural_note
lexical_decisions:
- source_word: פִּתְגָמָא
  chosen: report
  alternatives:
  - message
  - document
  - letter
  lexicon: HALOT
  rationale: Imperial Aramaic פתגמא can denote an official communication or report. In this context introducing the contents of a written communication to the king, 'report' fits the administrative setting better than the more generic 'message.'
- source_word: שְׁלַחוּ
  chosen: they sent
  alternatives:
  - they dispatched
  lexicon: HALOT
  rationale: Straightforward verbal rendering of the Peal perfect 3mp. 'Sent' is natural modern English and preserves the action without embellishment.
- source_word: עֲלֹוהִי
  chosen: to him
  alternatives:
  - concerning him
  - upon him
  lexicon: HALOT
  rationale: With שלח in this context, the preposition על with pronominal suffix idiomatically indicates direction toward the recipient. Since the following clause names Darius as recipient, 'to him' is the best contextual rendering.
- source_word: וְכִדְנָה
  chosen: and this was what
  alternatives:
  - and thus
  - and as follows
  lexicon: HALOT
  rationale: The phrase introduces the exact wording or form of the document. 'And this was what' gives readable English while preserving the deictic force of 'thus/like this.'
- source_word: כְּתִיב
  chosen: was written
  alternatives:
  - written
  lexicon: HALOT
  rationale: 'Passive sense is required in English: the content of the report ''was written.'''
- source_word: בְּגַוֵּהּ
  chosen: in it
  alternatives:
  - within it
  - inside it
  lexicon: HALOT
  rationale: Refers to the contents of the written report/document. 'In it' is idiomatic and sufficiently formal.
- source_word: לְדָרְיָוֶשׁ
  chosen: To Darius
  lexicon: HALOT
  rationale: The preposition marks the addressee in the letter heading. Standard epistolary English uses 'To Darius.'
- source_word: מַלְכָּא
  chosen: the king
  alternatives:
  - King
  lexicon: HALOT
  rationale: Here the noun functions as an appositional title after the name. 'Darius the king' is the most natural English equivalent.
- source_word: שְׁלָמָא
  chosen: peace
  alternatives:
  - welfare
  - greetings
  lexicon: HALOT
  rationale: The noun denotes peace/well-being in an epistolary salutation. 'Peace' preserves the lexical content better than the more interpretive 'greetings.'
- source_word: כֹלָּא
  chosen: all
  alternatives:
  - complete
  - abundant
  lexicon: HALOT
  rationale: Used adverbially/intensively with 'peace' to express fullness or completeness. Rendered as 'all peace' to stay close to the source while remaining intelligible.
