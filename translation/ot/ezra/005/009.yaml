id: EZR.5.9
reference: Ezra 5:9
source:
  edition: WLC
  text: אֱדַ֗יִן שְׁאֵ֨לְנָא֙ לְ/שָׂבַיָּ֣/א אִלֵּ֔ךְ כְּנֵ֖מָא אֲמַ֣רְנָא לְּ/הֹ֑ם
    מַן שָׂ֨ם לְ/כֹ֜ם טְעֵ֗ם בַּיְתָ֤/א דְנָה֙ לְ/מִבְנְיָ֔ה וְ/אֻשַּׁרְנָ֥/א דְנָ֖ה
    לְ/שַׁכְלָלָֽה־׃
translation:
  text: 'Then we asked those elders and said to them as follows: “Who gave you a decree
    to build this house and to complete this structure?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “this house and this structure,” preserving the more literal wording;
      “house” refers to the temple.
    reason: lexical_alternative
  - marker: b
    text: The Aramaic term rendered “structure” may refer more specifically to the
      building’s fabric, framework, or associated construction.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Aramaic adverb marking sequence in narrative/report. 'Then' is natural
    modern English and preserves the temporal progression.
- source_word: שְׁאֵלְנָא
  chosen: we asked
  alternatives:
  - we questioned
  - we inquired of
  lexicon: HALOT
  rationale: Straightforward verbal report of inquiry. 'Asked' is the most idiomatic
    and sufficiently formal rendering here.
- source_word: לְשָׂבַיָּא אִלֵּךְ
  chosen: those elders
  alternatives:
  - these elders
  lexicon: HALOT
  rationale: Refers to the Judean leaders previously encountered. 'Those elders' fits
    the deictic sense from the perspective of the report writer.
- source_word: כְּנֵמָא
  chosen: as follows
  alternatives:
  - thus
  - like this
  lexicon: HALOT
  rationale: Introduces the content of the quoted speech. 'As follows' is clear modern
    English.
- source_word: אֲמַרְנָא לְּהֹם
  chosen: said to them
  alternatives:
  - we told them
  lexicon: HALOT
  rationale: Standard speech introduction before direct quotation; 'said to them'
    is more neutral than 'told them'.
- source_word: מַן
  chosen: Who
  alternatives:
  - What person
  lexicon: HALOT
  rationale: Interrogative pronoun asking for the authorizing party.
- source_word: שָׂם לְכֹם טְעֵם
  chosen: gave you a decree
  alternatives:
  - set for you a command
  - issued you an order
  - authorized you
  lexicon: HALOT
  rationale: טְעֵם in Imperial Aramaic commonly denotes an official decision, command,
    or decree. 'Gave you a decree' keeps the concrete administrative sense without
    over-paraphrasing.
- source_word: בַּיְתָא דְנָה
  chosen: this house
  alternatives:
  - this temple
  lexicon: HALOT
  rationale: Literally 'this house.' In Ezra this refers to the temple, but the source
    wording is 'house,' so the main text preserves that form.
- source_word: לְמִבְנְיָה
  chosen: to build
  alternatives:
  - to rebuild
  lexicon: HALOT
  rationale: Infinitive of building. Although the context is rebuilding the temple,
    the verb itself is simply 'to build'; importing 'rebuild' would add nuance not
    explicit in this clause.
- source_word: וְאֻשַּׁרְנָא דְנָה
  chosen: this structure
  alternatives:
  - this wall
  - this framework
  - this edifice
  lexicon: HALOT
  rationale: The noun is less common and denotes the constructed fabric/structure
    associated with the building. 'Structure' is broad enough to preserve the uncertainty
    while fitting the context.
- source_word: לְשַׁכְלָלָה
  chosen: to complete
  alternatives:
  - to finish
  - to make complete
  lexicon: HALOT
  rationale: Conveys bringing the work to completion or full repair. 'Complete' is
    slightly more formal and matches the administrative tone.
