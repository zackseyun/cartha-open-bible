id: EZR.10.35
reference: Ezra 10:35
source:
  edition: WLC
  text: בְּנָיָ֥ה בֵדְיָ֖ה כלהי׃
translation:
  text: Benaiah, Bediah, Cheluhi.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'Bedeiah' for the second name, reflecting a fuller transliteration
      of the Hebrew form.
    reason: lexical_alternative
  - marker: b
    text: The third name is uncommon; possible transliterations include 'Cheluhi'
      or 'Keluhai.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנָיָה
  chosen: Benaiah
  alternatives:
  - Benaiah
  rationale: Proper personal name (HNp). Following the translation philosophy, personal
    names are transliterated rather than translated. 'Benaiah' is the standard English
    transliteration of this Hebrew name.
- source_word: בֵדְיָה
  chosen: Bediah
  alternatives:
  - Bedeiah
  rationale: Proper personal name (HNp). Transliterated as a personal name. The consonantal
    form supports 'Bediah'; a fuller transliteration 'Bedeiah' is possible, but the
    shorter standard form is preferred for readability unless a project-wide naming
    convention dictates otherwise.
- source_word: כלהי
  chosen: Keluhi
  alternatives:
  - Cheluhi
  - Keluhai
  rationale: Proper personal name (HNp). Since this verse is a list of names, the
    word is best understood as a personal name and transliterated. Because the form
    is uncommon, alternative transliterations are worth preserving; 'Keluhi' reflects
    a straightforward rendering of the consonants into readable modern English.
