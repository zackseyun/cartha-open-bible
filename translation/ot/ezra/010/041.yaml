  text: עֲזַרְאֵ֥ל וְ/שֶׁלֶמְיָ֖הוּ שְׁמַרְיָֽה׃
translation:
  text: Azarel, Shelemiah, and Shemariah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: עֲזַרְאֵל
  chosen: Azarel
  alternatives:
  - Azareel
  rationale: Proper personal name; transliterated rather than translated in keeping
    with the stated philosophy for names. 'Azarel' reflects a standard English transliteration
    of the Hebrew form.
- source_word: וְ/שֶׁלֶמְיָהוּ
  chosen: and Shelemiah
  alternatives:
  - and Shelemyahu
  rationale: The prefixed conjunction וְ is rendered 'and.' The personal name is transliterated
    as 'Shelemiah,' the conventional English form, rather than a more phonetic 'Shelemyahu.'
- source_word: שְׁמַרְיָה
  chosen: Shemariah
  alternatives:
  - Shemaryah
  rationale: Proper personal name; transliterated by standard English convention as
    'Shemariah.'
