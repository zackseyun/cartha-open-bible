id: EZR.10.39
reference: Ezra 10:39
source:
  edition: WLC
  text: וְ/שֶֽׁלֶמְיָ֥ה וְ/נָתָ֖ן וַ/עֲדָיָֽה׃
translation:
  text: and Shelemiah[a], and Nathan[b], and Adaiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Shelemiah may also be spelled 'Shelamiah' in English transliteration.
    reason: lexical_alternative
  - marker: b
    text: Adaiah may also be transliterated 'Adayah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁלֶמְיָה
  chosen: Shelemiah
  alternatives:
  - Shelamiah
  rationale: Proper personal name; transliterated rather than translated per project philosophy. 'Shelemiah' reflects a standard English transliteration of the Hebrew name.
- source_word: נָתָן
  chosen: Nathan
  rationale: Proper personal name; transliterated by standard convention. The form is well established in English and directly reflects the Hebrew name.
- source_word: עֲדָיָה
  chosen: Adaiah
  alternatives:
  - Adayah
  rationale: Proper personal name; transliterated rather than translated. 'Adaiah' is the conventional English form for this Hebrew name.
- source_word: וְ / וַ
  chosen: and
  rationale: Each prefixed conjunction is the simple Hebrew waw joining names in a list. Rendering each explicitly as 'and' preserves the list structure of the source text.
