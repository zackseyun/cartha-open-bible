id: EZR.10.22
reference: Ezra 10:22
source:
  edition: WLC
  text: וּ/מִ/בְּנֵ֖י פַּשְׁח֑וּר אֶלְיוֹעֵינַ֤י מַֽעֲשֵׂיָה֙ יִשְׁמָעֵ֣אל נְתַנְאֵ֔ל
    יוֹזָבָ֖ד וְ/אֶלְעָשָֽׂה׃ס
translation:
  text: 'And from the sons of Pashhur: Elioenai, Maaseiah, Ishmael, Nethanel, Jozabad,
    and Elasah.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  chosen: And from the sons of
  alternatives:
  - And from among the sons of
  - And of the sons of
  lexicon: HALOT
  rationale: The compound conjunction + preposition + construct plural of בן introduces
    another subgroup within the list. 'And from the sons of' preserves both the connective
    force and the partitive sense in natural English.
- source_word: פַּשְׁחוּר
  chosen: Pashhur
  lexicon: HALOT
  rationale: Proper personal/family name; transliterated according to standard English
    convention, following the translation philosophy to transliterate names rather
    than translate them.
- source_word: אֶלְיוֹעֵינַי
  chosen: Elioenai
  alternatives:
  - Elyoenai
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention. 'Elioenai' is the
    familiar English form and preserves recognizability.
- source_word: מַעֲשֵׂיָה
  chosen: Maaseiah
  alternatives:
  - Maaseyah
  lexicon: HALOT
  rationale: Proper name transliterated in its conventional English biblical form.
- source_word: יִשְׁמָעֵאל
  chosen: Ishmael
  alternatives:
  - Yishmael
  lexicon: HALOT
  rationale: Proper name transliterated using the standard English biblical form rather
    than a more phonetic transliteration.
- source_word: נְתַנְאֵל
  chosen: Nethanel
  alternatives:
  - Netanel
  lexicon: HALOT
  rationale: Proper name transliterated in the conventional English biblical form.
- source_word: יוֹזָבָד
  chosen: Jozabad
  alternatives:
  - Yozabad
  lexicon: HALOT
  rationale: Proper name transliterated in standard English biblical convention.
- source_word: וְ/אֶלְעָשָׂה
  chosen: and Elasah
  alternatives:
  - and Eleasah
  lexicon: HALOT
  rationale: The prefixed conjunction is rendered explicitly as 'and.' The proper
    name is transliterated as 'Elasah,' a common English form for אֶלְעָשָׂה.
