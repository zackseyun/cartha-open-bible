id: EZR.10.26
reference: Ezra 10:26
source:
  edition: WLC
  text: וּ/מִ/בְּנֵ֖י עֵילָ֑ם מַתַּנְיָ֤ה זְכַרְיָה֙ וִ/יחִיאֵ֣ל וְ/עַבְדִּ֔י וִ/ירֵמ֖וֹת
    וְ/אֵלִיָּֽה׃ס
translation:
  text: 'And from the sons of Elam: Mattaniah, Zechariah, Jehiel, Abdi, Jeremoth,
    and Elijah.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  chosen: And from the sons of
  alternatives:
  - And from the descendants of
  - And among the sons of
  lexicon: HALOT
  rationale: The phrase consists of conjunction + preposition + construct plural of
    בֵּן. In this genealogical/list context, 'sons of' is the most transparent formal
    rendering and matches the Hebrew idiom for clan membership. 'Descendants of' is
    possible dynamically, but the list formula in Ezra is better preserved with 'sons
    of.'
- source_word: עֵילָם
  chosen: Elam
  lexicon: HALOT
  rationale: Proper name of the family/clan ancestor in this context, so it is transliterated
    rather than translated, following the policy to transliterate personal names.
- source_word: מַתַּנְיָה
  chosen: Mattaniah
  alternatives:
  - Matteniah
  lexicon: HALOT
  rationale: Standard English transliteration of the Hebrew personal name. 'Mattaniah'
    is the conventional and recognizable form.
- source_word: זְכַרְיָה
  chosen: Zechariah
  alternatives:
  - Zekariah
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name; 'Zechariah' is
    the established form in English Bible usage and accurately reflects the Hebrew
    name.
- source_word: וִ/יחִיאֵל
  chosen: Jehiel
  alternatives:
  - Yehiel
  lexicon: HALOT
  rationale: Proper name with prefixed conjunction. 'Jehiel' is the standard English
    transliteration; the conjunction is represented by the list comma and final 'and'
    in English.
- source_word: וְ/עַבְדִּי
  chosen: Abdi
  alternatives:
  - Abdai
  lexicon: HALOT
  rationale: Proper name with conjunction. 'Abdi' is the conventional transliteration
    and should not be confused with the common noun 'my servant' in this context,
    since the morphology and list structure indicate a personal name.
- source_word: וִ/ירֵמ֖וֹת
  chosen: Jeremoth
  alternatives:
  - Jerimoth
  lexicon: HALOT
  rationale: Proper name with conjunction. 'Jeremoth' is a standard English transliteration;
    'Jerimoth' is a known variant but less common here.
- source_word: וְ/אֵלִיָּה
  chosen: Elijah
  alternatives:
  - Elijah
  lexicon: HALOT
  rationale: Proper name with conjunction. The Hebrew form corresponds to the familiar
    English name 'Elijah,' which is the clearest standard transliteration for readers.
