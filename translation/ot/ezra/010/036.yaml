id: EZR.10.36
reference: Ezra 10:36
source:
  edition: WLC
  text: וַנְיָ֥ה מְרֵמ֖וֹת אֶלְיָשִֽׁיב׃
translation:
  text: Vaniah, Meremoth, Eliashib.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: These are personal names in a list of men; the Hebrew contains no verb in
      this verse.
    reason: cultural_note
lexical_decisions:
- source_word: וַנְיָה
  chosen: Vaniah
  alternatives:
  - Vania
  - Baniyah
  rationale: Proper personal name (HNp). Following the translation philosophy, personal
    names are transliterated rather than translated. 'Vaniah' reflects a standard
    English transliteration of the Hebrew form; alternate spellings are possible depending
    on how the initial waw and final theophoric element are represented.
- source_word: מְרֵמוֹת
  chosen: Meremoth
  alternatives:
  - Meremot
  rationale: Proper personal name (HNp). Transliterated by standard convention. The
    final taw is commonly represented as 'th' in established English biblical name
    forms, yielding 'Meremoth.'
- source_word: אֶלְיָשִׁיב
  chosen: Eliashib
  alternatives:
  - Elyashib
  rationale: Proper personal name (HNp). Transliterated rather than translated. 'Eliashib'
    is the conventional English form and preserves recognizability across biblical
    references.
