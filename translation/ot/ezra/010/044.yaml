id: EZR.10.44
reference: Ezra 10:44
source:
  edition: WLC
  text: כָּל אֵ֕לֶּה נשא/י נָשִׁ֣ים נָכְרִיּ֑וֹת וְ/יֵ֣שׁ מֵ/הֶ֣ם נָשִׁ֔ים וַ/יָּשִׂ֖ימוּ
    בָּנִֽים־׃פ
translation:
  text: All these had married foreign women, and some of them had wives who had borne
    children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'and there were among them wives, and they had sons.'
      The Hebrew at the end of the verse is terse and somewhat difficult.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons'; here rendered 'children' because the term can refer more
      broadly to offspring in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: נשא/י
  chosen: had married
  alternatives:
  - had taken
  - had borne
  lexicon: HALOT
  rationale: From נשׂא in the idiom 'take/marry women'; in this context the marital
    sense is standard and clearer in English than the more literal 'had taken.' The
    consonantal form could in other contexts relate to 'bear/carry,' but here the
    object 'women' fixes the sense as marriage.
- source_word: נָשִׁים נָכְרִיּוֹת
  chosen: foreign women
  alternatives:
  - foreign wives
  - strange women
  lexicon: HALOT
  rationale: נָכְרִיּוֹת denotes women from outside the covenant community/people
    group. 'Foreign women' is natural English and preserves the ethnic/covenantal
    distinction without archaic wording like 'strange women.'
- source_word: וְיֵשׁ מֵהֶם
  chosen: and some of them
  alternatives:
  - and there were among them
  - and among them there were
  lexicon: HALOT
  rationale: Existential יֵשׁ plus prepositional phrase מֵהֶם is idiomatically rendered
    'some of them' in English. This keeps the sense concise and readable.
- source_word: נָשִׁים
  chosen: wives
  alternatives:
  - women
  lexicon: HALOT
  rationale: Although the noun is the same as earlier, here context favors 'wives'
    because the clause specifies a subset among the men and then refers to children
    born in that union. English distinguishes the relational sense more clearly here.
- source_word: וַיָּשִׂימוּ בָּנִים
  chosen: had children
  alternatives:
  - they set children
  - they produced sons
  - they had sons
  lexicon: HALOT
  rationale: The Hebrew expression is difficult and somewhat elliptical. A wooden
    rendering 'they set children' is not meaningful in English. In context the point
    is that some of these marriages had produced offspring. 'Had children' best conveys
    the sense in readable English. 'Sons' is possible from בָּנִים, but in many contexts
    בָּנִים can function generically for children/offspring.
- source_word: בָּנִים
  chosen: children
  alternatives:
  - sons
  - offspring
  lexicon: HALOT
  rationale: Though formally masculine plural ('sons'), the term can denote children
    more generally. Because the verse's concern is the existence of offspring from
    these unions rather than specifically male children, 'children' is the better
    contextual rendering; the more literal 'sons' is preserved in a footnote.
