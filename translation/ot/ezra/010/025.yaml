id: EZR.10.25
reference: Ezra 10:25
source:
  edition: WLC
  text: וּ/מִֽ/יִּשְׂרָאֵ֑ל מִ/בְּנֵ֣י פַרְעֹ֡שׁ רַ֠מְיָה וְ/יִזִּיָּ֤ה וּ/מַלְכִּיָּה֙ וּ/מִיָּמִ֣ן וְ/אֶלְעָזָ֔ר וּ/מַלְכִּיָּ֖ה וּ/בְנָיָֽה׃ס
translation:
  text: 'And from Israel[a], from the sons of Parosh: Ramiah, Izziah, Malkijah, Mijamin, Eleazar, Malkijah, and Benaiah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew repeats the name Malkijah twice in this list, likely referring to two different men with the same name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִיִּשְׂרָאֵל
  chosen: And from Israel
  alternatives:
  - And of Israel
  - And among Israel
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition are best carried over straightforwardly. In this list context, 'from Israel' naturally introduces a subgroup within the broader community. 'And' preserves the continuation from the previous verse.
- source_word: מִבְּנֵי
  chosen: from the sons of
  alternatives:
  - from the descendants of
  - from the family of
  lexicon: HALOT
  rationale: בְּנֵי literally means 'sons of' and in genealogical/list contexts often denotes descendants or members of a clan. Here 'sons of' preserves the formal structure of the register while remaining idiomatic enough in English.
- source_word: פַרְעֹשׁ
  chosen: Parosh
  rationale: Proper name transliterated according to standard English convention, in keeping with the translation philosophy to transliterate personal and family names.
- source_word: רַמְיָה
  chosen: Ramiah
  alternatives:
  - Ramia
  rationale: Proper name transliterated conventionally. The final -h reflects the Hebrew ending and helps distinguish the name in English.
- source_word: יִזִּיָּה
  chosen: Izziah
  alternatives:
  - Jeziah
  - Yizziah
  rationale: Proper name transliterated rather than translated. 'Izziah' is a straightforward English-form transliteration from the Hebrew consonants and vowels.
- source_word: מַלְכִּיָּה
  chosen: Malkijah
  alternatives:
  - Malchijah
  - Malchiah
  rationale: Proper name transliterated. 'Malkijah' reflects a common modern transliteration choice; the same form is retained consistently for both occurrences in the verse.
- source_word: מִיָּמִן
  chosen: Mijamin
  alternatives:
  - Miamin
  - Miniamin
  rationale: Proper name transliterated. 'Mijamin' closely reflects the Hebrew form and avoids over-assimilation to more familiar but less direct English spellings.
- source_word: אֶלְעָזָר
  chosen: Eleazar
  rationale: Well-established English transliteration of the Hebrew proper name; no reason to depart from standard usage.
- source_word: וּמַלְכִּיָּה ... וּבְנָיָה
  chosen: Malkijah, and Benaiah
  rationale: The repeated conjunctions in Hebrew are represented by standard English list punctuation, with 'and' before the final item. The second occurrence of Malkijah is retained as a distinct listed individual, since the Hebrew text repeats the name.
