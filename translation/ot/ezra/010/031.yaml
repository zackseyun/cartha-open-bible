id: EZR.10.31
reference: Ezra 10:31
source:
  edition: WLC
  text: וּ/בְנֵ֖י חָרִ֑ם אֱלִיעֶ֧זֶר יִשִּׁיָּ֛ה מַלְכִּיָּ֖ה שְׁמַֽעְיָ֥ה שִׁמְעֽוֹן׃
translation:
  text: 'And from the sons of Harim: Eliezer, Isshijah, Malkijah, Shemaiah, and Shimeon.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “the sons of Harim: Eliezer, Isshijah, Malkijah, Shemaiah, and Shimeon,”
      taking the phrase as a simple list heading rather than explicitly supplying
      “from.”'
    reason: lexical_alternative
  - marker: b
    text: Isshijah may also be transliterated “Jeshiah” or “Ishijah.”
    reason: lexical_alternative
  - marker: c
    text: Shimeon is traditionally rendered “Simeon.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: And from the sons of
  alternatives:
  - And the sons of
  - And among the sons of
  lexicon: HALOT
  rationale: The prefixed conjunction plus construct plural of בֵּן introduces the
    next family group in this list. 'From the sons of' fits the list context in Ezra
    10, where named individuals are being identified out of a clan. Including 'And'
    preserves the connective force.
- source_word: חָרִם
  chosen: Harim
  lexicon: HALOT
  rationale: Proper personal/family name; transliterated according to the translation
    philosophy for names.
- source_word: אֱלִיעֶזֶר
  chosen: Eliezer
  lexicon: HALOT
  rationale: Proper name; standard English transliteration.
- source_word: יִשִּׁיָּה
  chosen: Isshijah
  alternatives:
  - Jeshiah
  - Ishijah
  lexicon: HALOT
  rationale: Proper name with some variation in English transliteration. 'Isshijah'
    closely reflects the Hebrew consonants and vowels while remaining readable. Alternatives
    are preserved as possible transliteration conventions.
- source_word: מַלְכִּיָּה
  chosen: Malkijah
  alternatives:
  - Malchijah
  lexicon: HALOT
  rationale: Proper name; 'Malkijah' is a straightforward transliteration of the Hebrew.
    'Malchijah' reflects an older convention influenced by representing כ with 'ch'.
- source_word: שְׁמַעְיָה
  chosen: Shemaiah
  alternatives:
  - Shemaiahu
  lexicon: HALOT
  rationale: Proper name; standard English biblical transliteration is retained.
- source_word: שִׁמְעוֹן
  chosen: Shimeon
  alternatives:
  - Simeon
  lexicon: HALOT
  rationale: Proper name. 'Shimeon' more transparently reflects the initial שׁ sound
    in Hebrew, though 'Simeon' is a familiar traditional English form.
