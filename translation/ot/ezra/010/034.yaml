id: EZR.10.34
reference: Ezra 10:34
source:
  edition: WLC
  text: מִ/בְּנֵ֣י בָנִ֔י מַעֲדַ֥י עַמְרָ֖ם וְ/אוּאֵֽל׃ס
translation:
  text: 'From the sons of Bani: Maadai, Amram, and Uel.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מִ/בְּנֵי
  chosen: From the sons of
  alternatives:
  - Of the sons of
  - Among the sons of
  lexicon: HALOT
  rationale: The prefixed preposition מִן with construct בְּנֵי introduces a subgroup
    within the larger family list. 'From the sons of' is natural English in this genealogical/list
    context and preserves the partitive sense.
- source_word: בָנִי
  chosen: Bani
  rationale: Proper personal name; transliterated according to the translation philosophy
    rather than translated.
- source_word: מַעֲדַי
  chosen: Maadai
  alternatives:
  - Maadai
  rationale: Proper personal name; standard transliteration retained. No translation
    is appropriate.
- source_word: עַמְרָם
  chosen: Amram
  rationale: Proper personal name; transliterated in standard English form.
- source_word: וְ/אוּאֵל
  chosen: and Uel
  alternatives:
  - and U'el
  - and Uel
  rationale: The conjunction וְ is rendered 'and.' The name אוּאֵל is transliterated
    as 'Uel,' a straightforward English representation of the Hebrew proper name.
