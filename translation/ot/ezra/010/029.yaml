id: EZR.10.29
reference: Ezra 10:29
source:
  edition: WLC
  text: וּ/מִ/בְּנֵ֖י בָּנִ֑י מְשֻׁלָּ֤ם מַלּוּךְ֙ וַ/עֲדָיָ֔ה יָשׁ֖וּב וּ/שְׁאָ֥ל
    ירמות׃ס
translation:
  text: 'And from the sons of Bani: Meshullam, Malluk, Adaiah, Jashub, Sheal, and
    Jeremoth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Malluk is also spelled Malluch in some English renderings.
    reason: lexical_alternative
  - marker: b
    text: Jeremoth may reflect a variant vocalization or name-form in some traditions.
    reason: textual_variant
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  chosen: And from the sons of
  alternatives:
  - And from among the sons of
  - And of the sons of
  lexicon: HALOT
  rationale: The sequence combines conjunction + preposition + construct plural of
    'son.' In this list context, 'from the sons of' is the natural English rendering
    introducing a subgroup within a clan list. Retaining 'sons' rather than 'descendants'
    preserves the formal genealogical/list language of the Hebrew.
- source_word: בָּנִי
  chosen: Bani
  lexicon: HALOT
  rationale: Proper name, transliterated according to the project's policy to transliterate
    personal names rather than translate them.
- source_word: מְשֻׁלָּם
  chosen: Meshullam
  lexicon: HALOT
  rationale: Proper name; standard English transliteration used.
- source_word: מַלּוּךְ
  chosen: Malluk
  alternatives:
  - Malluch
  lexicon: HALOT
  rationale: Proper name. 'Malluk' reflects a straightforward transliteration of the
    consonantal form here. 'Malluch' is a familiar English variant and is worth preserving
    in a footnote as a lexical/name-form alternative.
- source_word: וַ/עֲדָיָה
  chosen: Adaiah
  lexicon: HALOT
  rationale: Conjunction plus proper name. In English list style, the conjunction
    is absorbed into the comma-separated series until the final item.
- source_word: יָשׁוּב
  chosen: Jashub
  alternatives:
  - Jeshub
  lexicon: HALOT
  rationale: Proper name. 'Jashub' is a standard transliteration from the pointed
    Hebrew here; minor English spelling variation exists.
- source_word: וּ/שְׁאָל
  chosen: Sheal
  alternatives:
  - Shaal
  lexicon: HALOT
  rationale: Conjunction plus proper name. 'Sheal' follows the vocalization in the
    Masoretic pointing; alternate transliteration may appear in English traditions.
- source_word: ירמות
  chosen: Jeremoth
  alternatives:
  - Ramoth
  lexicon: HALOT
  rationale: The consonantal form is read as the personal name Jeremoth in this context
    and in major translations/list traditions. Because the spelling can invite a different
    vocalization/transliteration, an alternative is preserved in a footnote as a textual/name-form
    note.
