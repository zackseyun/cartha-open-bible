id: EZR.10.18
reference: Ezra 10:18
source:
  edition: WLC
  text: וַ/יִּמָּצֵא֙ מִ/בְּנֵ֣י הַ/כֹּהֲנִ֔ים אֲשֶׁ֥ר הֹשִׁ֖יבוּ נָשִׁ֣ים נָכְרִיּ֑וֹת
    מִ/בְּנֵ֨י יֵשׁ֤וּעַ בֶּן יֽוֹצָדָק֙ וְ/אֶחָ֔י/ו מַֽעֲשֵׂיָה֙ וֶֽ/אֱלִיעֶ֔זֶר
    וְ/יָרִ֖יב וּ/גְדַלְיָֽה־׃
translation:
  text: 'And among the sons of the priests who had taken foreign wives, there were
    found from the sons of Jeshua son of Jozadak and his brothers: Maaseiah, Eliezer,
    Jarib, and Gedaliah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who had married foreign women.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמָּצֵא
  chosen: there were found
  alternatives:
  - were found
  - was found
  lexicon: HALOT
  rationale: The verb is morphologically singular, but it introduces a list of multiple
    men. English idiom is best served by the existential plural 'there were found,'
    reflecting the collective sense rather than a wooden singular 'and it was found.'
- source_word: מִבְּנֵי הַכֹּהֲנִים
  chosen: among the sons of the priests
  alternatives:
  - from the sons of the priests
  - among the priestly descendants
  lexicon: HALOT
  rationale: בְּנֵי literally means 'sons of,' and the phrase denotes membership within
    a priestly lineage/group. 'Among the sons of the priests' preserves the familial
    language while reading naturally in English.
- source_word: אֲשֶׁר הֹשִׁיבוּ נָשִׁים נָכְרִיּוֹת
  chosen: who had taken foreign wives
  alternatives:
  - who had married foreign women
  - who had settled with foreign wives
  lexicon: HALOT
  rationale: In this context the idiom refers to entering or maintaining marriages
    with non-Israelite women. 'Taken foreign wives' is concise and close to the Hebrew
    usage, while 'foreign wives' reflects נָשִׁים נָכְרִיּוֹת naturally in English.
- source_word: נָשִׁים נָכְרִיּוֹת
  chosen: foreign wives
  alternatives:
  - foreign women
  lexicon: HALOT
  rationale: Although literally 'foreign women,' the immediate context is marital
    unions under review in Ezra 10, so 'foreign wives' makes the relational sense
    explicit without adding foreign content.
- source_word: מִבְּנֵי יֵשׁוּעַ בֶּן יוֹצָדָק
  chosen: from the sons of Jeshua son of Jozadak
  alternatives:
  - from the descendants of Jeshua son of Jozadak
  lexicon: HALOT
  rationale: The repeated מִבְּנֵי marks a subgroup within the priests. 'Sons of'
    is retained for transparency to the Hebrew genealogical idiom; 'Jeshua' and 'Jozadak'
    are standard transliterations of the personal names.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  lexicon: HALOT
  rationale: The suffix refers back to Jeshua. 'Brothers' is the direct lexical equivalent
    and fits the genealogical/list context; there is no need to broaden it to 'kinsmen'
    here.
- source_word: מַעֲשֵׂיָה וֶאֱלִיעֶזֶר וְיָרִיב וּגְדַלְיָה
  chosen: Maaseiah, Eliezer, Jarib, and Gedaliah
  rationale: These are personal names and are therefore transliterated rather than
    translated, following the project's policy to transliterate names.
