id: EZR.10.21
reference: Ezra 10:21
source:
  edition: WLC
  text: וּ/מִ/בְּנֵ֖י חָרִ֑ם מַעֲשֵׂיָ֤ה וְ/אֵֽלִיָּה֙ וּֽ/שְׁמַֽעְיָ֔ה וִ/יחִיאֵ֖ל
    וְ/עֻזִיָּֽה׃
translation:
  text: 'And from the sons of Harim: Maaseiah, Elijah, Shemaiah, Jehiel, and Uzziah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And of the sons of Harim.' The Hebrew construction marks
      this as another family subgroup in the list.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  chosen: And from the sons of
  alternatives:
  - And from among the sons of
  - And of the sons of
  lexicon: HALOT
  rationale: The prefixed conjunction ו plus preposition מִן with בְּנֵי introduces
    another subgroup within the larger list. 'And from the sons of' preserves both
    the connective and the partitive sense naturally in English.
- source_word: חָרִם
  chosen: Harim
  rationale: Proper personal/family name; transliterated according to the translation
    philosophy for names.
- source_word: מַעֲשֵׂיָה
  chosen: Maaseiah
  alternatives:
  - Maaseya
  rationale: Proper name transliterated by standard English convention. The familiar
    biblical form 'Maaseiah' best reflects established pronunciation without translating
    the name's meaning.
- source_word: וְ/אֵלִיָּה
  chosen: Elijah
  alternatives:
  - Eliyyah
  rationale: Proper name with conjunction. 'Elijah' is the standard English transliteration;
    the conjunction is represented in the running list by 'and'.
- source_word: וּֽ/שְׁמַֽעְיָה
  chosen: Shemaiah
  alternatives:
  - Shemayah
  rationale: Proper name transliterated conventionally; conjunction carried by the
    English list structure.
- source_word: וִ/יחִיאֵל
  chosen: Jehiel
  alternatives:
  - Yehiel
  rationale: Proper name transliterated by common English biblical convention. 'Jehiel'
    is more recognizable to English readers than a stricter transliteration.
- source_word: וְ/עֻזִיָּה
  chosen: Uzziah
  alternatives:
  - Uzziyah
  rationale: Proper name transliterated conventionally. The standard English form
    'Uzziah' is clear and consistent with common Bible usage.
