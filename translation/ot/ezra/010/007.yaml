id: EZR.10.7
reference: Ezra 10:7
source:
  edition: WLC
  text: וַ/יַּעֲבִ֨ירוּ ק֜וֹל בִּ/יהוּדָ֣ה וִ/ירֽוּשָׁלִַ֗ם לְ/כֹל֙ בְּנֵ֣י הַ/גּוֹלָ֔ה
    לְ/הִקָּבֵ֖ץ יְרוּשָׁלִָֽם׃
translation:
  text: And they made a proclamation throughout Judah and Jerusalem to all the sons
    of the exile, that they should gather in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to all the exiles' / 'to all the returned exiles.' Literally, 'to all
      the sons of the exile.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבִירוּ
  chosen: they made
  alternatives:
  - they caused to pass
  - they sent out
  - they proclaimed
  lexicon: HALOT
  rationale: The Hiphil of עבר with קול is an idiom meaning to circulate or send out
    a message/proclamation. In English, 'made' works naturally with the following
    noun 'proclamation' while preserving the causative sense.
- source_word: קוֹל
  chosen: a proclamation
  alternatives:
  - a voice
  - an announcement
  - a message
  lexicon: HALOT
  rationale: Although literally 'voice/sound,' in this administrative context with
    עבר it refers to a public announcement or proclamation. 'Proclamation' best captures
    the formal public nature of the notice.
- source_word: בִּיהוּדָה וִירוּשָׁלַם
  chosen: throughout Judah and Jerusalem
  alternatives:
  - in Judah and Jerusalem
  lexicon: HALOT
  rationale: With the idiom 'send out a proclamation,' the preposition ב conveys the
    area within which the announcement was circulated. 'Throughout' brings out the
    distributive sense in idiomatic English.
- source_word: לְכֹל בְּנֵי הַגּוֹלָה
  chosen: to all the sons of the exile
  alternatives:
  - to all the children of the exile
  - to all the exiles
  - to all the returned exiles
  lexicon: HALOT
  rationale: בני הגולה is literally 'sons of the exile,' an idiom for the community
    of those who had gone into exile and returned. Following the project's gender-accurate
    policy, the masculine form is retained in the main text rather than flattened
    to 'people,' while the idiomatic sense is preserved by keeping 'of the exile'
    rather than a more interpretive paraphrase.
- source_word: הַגּוֹלָה
  chosen: the exile
  alternatives:
  - the deportation
  - the exiled community
  lexicon: HALOT
  rationale: The noun can denote either the state/event of exile or the community
    defined by it. In this construct phrase, 'the exile' is concise and preserves
    the Hebrew expression; the communal sense is inferable from the idiom 'sons of
    the exile.'
- source_word: לְהִקָּבֵץ
  chosen: that they should gather
  alternatives:
  - to gather
  - to assemble themselves
  lexicon: HALOT
  rationale: The Niphal infinitive with ל expresses purpose or content of the proclamation.
    'That they should gather' makes the intended summons explicit in natural English.
- source_word: יְרוּשָׁלָם
  chosen: in Jerusalem
  alternatives:
  - to Jerusalem
  lexicon: HALOT
  rationale: After a verb of gathering, English idiom prefers 'gather in Jerusalem'
    for assembling at a location. 'To Jerusalem' is possible but less natural here.
