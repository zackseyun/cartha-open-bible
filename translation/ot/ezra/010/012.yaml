id: EZR.10.12
reference: Ezra 10:12
source:
  edition: WLC
  text: וַ/יַּֽעְנ֧וּ כָֽל הַ/קָּהָ֛ל וַ/יֹּאמְר֖וּ ק֣וֹל גָּד֑וֹל כֵּ֛ן כ/דברי/ך עָלֵ֖י/נוּ לַ/עֲשֽׂוֹת־׃
translation:
  text: Then all the assembly answered and said with a loud voice[a], “Yes, according to your words, so it is upon us to do.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, “As you have said, so we must do.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲנוּ
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: The verb ענה in this narrative context introduces the people's reply to Ezra's charge. 'Answered' is the standard and natural rendering in English for this discourse function.
- source_word: כָל הַקָּהָל
  chosen: all the assembly
  alternatives:
  - the whole assembly
  - all the congregation
  lexicon: HALOT
  rationale: קָהָל denotes the gathered community. 'Assembly' preserves the corporate, gathered sense without importing later ecclesiastical associations. 'All' reflects כָל directly.
- source_word: וַיֹּאמְרוּ
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: 'אָמַר is the ordinary verb of speech. ''Said'' is the most idiomatic and transparent rendering in this sequence: ''answered and said.'''
- source_word: קוֹל גָּדוֹל
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - loudly
  lexicon: HALOT
  rationale: Literally 'a great voice.' 'With a loud voice' preserves the concrete Hebrew idiom while remaining natural English. It also conveys the public, emphatic unanimity of the response better than the adverb 'loudly.'
- source_word: כֵּן
  chosen: 'Yes'
  alternatives:
  - So
  - Indeed
  lexicon: HALOT
  rationale: Here כֵּן functions as an affirmation of Ezra's proposal. 'Yes' best captures the direct assent in idiomatic English.
- source_word: כִּדְבָרֶיךָ
  chosen: according to your words
  alternatives:
  - as you have said
  - according to your word
  lexicon: HALOT
  rationale: The plural construct with 2ms suffix is literally 'according to your words.' This keeps the wording close to the Hebrew while still sounding natural. 'As you have said' is possible but slightly more interpretive.
- source_word: עָלֵינוּ
  chosen: it is upon us
  alternatives:
  - it is our duty
  - it falls to us
  lexicon: HALOT
  rationale: The prepositional expression conveys obligation resting on the speakers. 'It is upon us' preserves the Hebrew metaphor of responsibility without over-paraphrasing. More idiomatic alternatives are possible but less formally transparent.
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to act
  - to carry out
  lexicon: HALOT
  rationale: עשה is broad and here refers to carrying out the demanded action. 'To do' is the most direct rendering and fits the concise force of the Hebrew.
