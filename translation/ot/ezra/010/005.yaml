id: EZR.10.5
reference: Ezra 10:5
source:
  edition: WLC
  text: וַ/יָּ֣קָם עֶזְרָ֡א וַ/יַּשְׁבַּ֣ע אֶת שָׂרֵי֩ הַ/כֹּהֲנִ֨ים הַ/לְוִיִּ֜ם
    וְ/כָל יִשְׂרָאֵ֗ל לַ/עֲשׂ֛וֹת כַּ/דָּבָ֥ר הַ/זֶּ֖ה וַ/יִּשָּׁבֵֽעוּ־־׃
translation:
  text: So Ezra arose and made the chief priests, the Levites, and all Israel swear
    to do according to this word, and they swore.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to this matter' or 'according to this proposal.' The Hebrew
      word can refer either to a spoken word or to the matter under discussion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - stood up
  - got up
  lexicon: HALOT
  rationale: From קום in the wayyiqtol, indicating Ezra's decisive rising to act.
    'Arose' preserves the formal narrative movement better than the more colloquial
    'got up.'
- source_word: וַיַּשְׁבַּע
  chosen: made ... swear
  alternatives:
  - put ... under oath
  - adjured
  lexicon: HALOT
  rationale: Hiphil of שׁבע means to cause someone to swear or place under oath. 'Made
    ... swear' is clear modern English and preserves the causative force.
- source_word: שָׂרֵי הַכֹּהֲנִים
  chosen: the leading priests
  alternatives:
  - the chiefs of the priests
  - the priestly leaders
  lexicon: HALOT
  rationale: שָׂרִים are leaders/princes/officials. In context, these are the principal
    figures among the priests. 'Leading priests' is idiomatic and concise while preserving
    status.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal/cultic group לְוִיִּם.
- source_word: וְכָל יִשְׂרָאֵל
  chosen: and all Israel
  alternatives:
  - and all the Israelites
  lexicon: HALOT
  rationale: Retains the covenantal collective expression as written. 'All Israel'
    is the standard and more textually transparent rendering.
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to act
  - to carry out
  lexicon: HALOT
  rationale: עשה is broad and here governs obedience to the stated matter. 'To do'
    is simple and close to the Hebrew.
- source_word: כַּדָּבָר הַזֶּה
  chosen: according to this word
  alternatives:
  - according to this matter
  - according to this proposal
  - this thing
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' Here it refers to the specific
    proposal just stated. 'According to this word' stays close to the Hebrew while
    remaining understandable; the broader sense is preserved in alternatives.
- source_word: וַיִּשָּׁבֵעוּ
  chosen: and they swore
  alternatives:
  - and they took the oath
  lexicon: HALOT
  rationale: 'Niphal of שׁבע gives the straightforward result: they swore. This mirrors
    the Hebrew repetition and keeps the solemnity of the oath scene.'
