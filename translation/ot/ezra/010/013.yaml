theological_decisions:
- issue: Nature of the offense described by לִפְשֹׁעַ
  chosen_reading: Render as 'transgressed' without specifying a doctrinal category
    beyond the text.
  alternative_readings:
  - sinned
  - acted rebelliously
  rationale: The verse acknowledges serious covenant violation but does not itself
    define the full theological taxonomy of the offense. 'Transgressed' preserves
    the gravity while avoiding interpretive overreach.
  doctrine_reference: Preserve theological tension rather than resolve it.
