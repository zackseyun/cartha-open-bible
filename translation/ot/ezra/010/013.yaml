id: EZR.10.13
reference: Ezra 10:13
source:
  edition: WLC
  text: אֲבָ֞ל הָ/עָ֥ם רָב֙ וְ/הָ/עֵ֣ת גְּשָׁמִ֔ים וְ/אֵ֥ין כֹּ֖חַ לַ/עֲמ֣וֹד בַּ/ח֑וּץ
    וְ/הַ/מְּלָאכָ֗ה לֹֽא לְ/י֤וֹם אֶחָד֙ וְ/לֹ֣א לִ/שְׁנַ֔יִם כִּֽי הִרְבִּ֥ינוּ
    לִ/פְשֹׁ֖עַ בַּ/דָּבָ֥ר הַ/זֶּֽה־־׃
translation:
  text: But the people are many, and it is the rainy season, and there is no strength
    to stand outside. And the work is not for one day or for two, for we have greatly
    transgressed in this matter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the time is one of rains.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the work cannot be done in one day or two.'
    reason: lexical_alternative
  - marker: c
    text: Or 'we have sinned greatly in this matter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲבָל
  chosen: But
  alternatives:
  - However
  lexicon: HALOT
  rationale: Marks a contrast with the proposal in the previous verse; 'But' is natural
    and sufficiently formal.
- source_word: הָעָם רָב
  chosen: the people are many
  alternatives:
  - the people are numerous
  - the crowd is large
  lexicon: HALOT
  rationale: Retains the predicate adjective sense of רָב with the collective noun
    עָם. 'People are many' is slightly more literal than 'crowd is large' and fits
    the context of a gathered assembly.
- source_word: וְהָעֵת גְּשָׁמִים
  chosen: it is the rainy season
  alternatives:
  - the time is one of rains
  - it is a time of heavy rain
  lexicon: HALOT
  rationale: The Hebrew is literally 'the time [of] rains.' English idiom favors 'it
    is the rainy season,' which preserves the sense without awkwardness.
- source_word: וְאֵין כֹּחַ לַעֲמֹד בַּחוּץ
  chosen: there is no strength to stand outside
  alternatives:
  - there is no power to remain outside
  - we are not able to stand outdoors
  lexicon: HALOT
  rationale: Keeps the impersonal construction 'there is no strength' close to the
    Hebrew while remaining readable. 'Stand outside' here conveys enduring exposure
    outdoors in the rain.
- source_word: וְהַמְּלָאכָה
  chosen: the work
  alternatives:
  - the task
  - the matter
  lexicon: HALOT
  rationale: מְלָאכָה here refers to the practical undertaking of investigating and
    resolving the issue, not manual labor specifically. 'Work' is broad and natural.
- source_word: לֹא לְיוֹם אֶחָד וְלֹא לִשְׁנַיִם
  chosen: is not for one day or for two
  alternatives:
  - cannot be done in one day or two
  - is not a matter of one or two days
  lexicon: HALOT
  rationale: 'This preserves the Hebrew structure closely. The sense is duration:
    the task cannot be completed quickly. A more idiomatic paraphrase was avoided
    to stay near the source wording.'
- source_word: כִּי הִרְבִּינוּ
  chosen: for we have greatly
  alternatives:
  - for we have multiplied
  - for many of us have
  lexicon: HALOT
  rationale: 'With the infinitive לִפְשֹׁעַ, the hiphil of רבה intensifies the extent
    of the offense: ''we have greatly [done so].'' This avoids importing the narrower
    sense ''many of us'' into the verb itself.'
- source_word: לִפְשֹׁעַ
  chosen: transgressed
  alternatives:
  - acted rebelliously
  - sinned
  lexicon: HALOT
  rationale: פשׁע often carries the sense of transgression or rebellion. 'Transgressed'
    preserves the seriousness without over-specifying political rebellion.
- source_word: בַּדָּבָר הַזֶּה
  chosen: in this matter
  alternatives:
  - in this thing
  - in this affair
  lexicon: HALOT
  rationale: A standard idiomatic rendering of דָּבָר in this context, referring to
    the issue of unlawful marriages under discussion.
