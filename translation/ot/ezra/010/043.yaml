id: EZR.10.43
reference: Ezra 10:43
source:
  edition: WLC
  text: מִ/בְּנֵ֖י נְב֑וֹ יְעִיאֵ֤ל מַתִּתְיָה֙ זָבָ֣ד זְבִינָ֔א ידו וְ/יוֹאֵ֖ל בְּנָיָֽה׃
translation:
  text: 'From the sons of Nebo: Jeiel, Mattithiah, Zabad, Zebina, Jaddai, and Joel,
    Benaiah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew name rendered Jaddai is uncertain; it may also be represented
      as Iddo or Jedo in English transliteration.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/בְּנֵי
  chosen: From the sons of
  alternatives:
  - Of the sons of
  - From among the sons of
  lexicon: HALOT
  rationale: The prefixed preposition מִן with בְּנֵי introduces a subgroup within
    the larger list. 'From the sons of' is natural English and preserves the genealogical/listing
    function better than a bare 'of,' while avoiding over-interpretation.
- source_word: נְבוֹ
  chosen: Nebo
  lexicon: HALOT
  rationale: 'Proper name transliterated according to the translation philosophy:
    personal/family names are transliterated rather than translated.'
- source_word: יְעִיאֵל
  chosen: Jeiel
  alternatives:
  - Jeiel
  lexicon: HALOT
  rationale: Standard English transliteration of the Hebrew personal name.
- source_word: מַתִּתְיָה
  chosen: Mattithiah
  alternatives:
  - Mattithia
  lexicon: HALOT
  rationale: Standard transliteration preserving the recognizable Hebrew name form.
- source_word: זָבָד
  chosen: Zabad
  lexicon: HALOT
  rationale: Proper name transliterated directly.
- source_word: זְבִינָא
  chosen: Zebina
  alternatives:
  - Zebinah
  lexicon: HALOT
  rationale: Proper name transliterated; 'Zebina' is a conventional English form.
- source_word: ידו
  chosen: Jaddai
  alternatives:
  - Iddo
  - Jedo
  lexicon: HALOT
  rationale: The consonantal form here is difficult and English versions vary. Given
    the Masoretic pointing/traditional handling in this verse's name list, 'Jaddai'
    is adopted as the main text rendering, while preserving other possible transliterations
    in a footnote because the underlying proper name identification is uncertain.
- source_word: וְ/יוֹאֵל
  chosen: and Joel
  lexicon: HALOT
  rationale: Conjunction plus proper name; rendered straightforwardly.
- source_word: בְּנָיָה
  chosen: Benaiah
  alternatives:
  - Benayah
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
