id: EZR.10.27
reference: Ezra 10:27
source:
  edition: WLC
  text: וּ/מִ/בְּנֵ֖י זַתּ֑וּא אֶלְיוֹעֵנַ֤י אֶלְיָשִׁיב֙ מַתַּנְיָ֣ה וִֽ/ירֵמ֔וֹת
    וְ/זָבָ֖ד וַ/עֲזִיזָֽא׃ס
translation:
  text: 'And from the sons of Zattu: Elioenai, Eliashib, Mattaniah, Jeremoth, Zabad,
    and Aziza.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  chosen: And from the sons of
  alternatives:
  - And from the descendants of
  - And from the family of
  lexicon: HALOT
  rationale: The phrase combines conjunction + preposition + construct plural of בן.
    In this genealogical/list context, 'sons of' is the most direct and conventional
    rendering, while still allowing the broader clan sense inherent in Hebrew genealogical
    usage. 'And' preserves the list-continuing function of waw.
- source_word: זַתּוּא
  chosen: Zattu
  lexicon: HALOT
  rationale: Proper personal/family name; transliterated according to standard English
    convention, following the translation philosophy to transliterate names rather
    than translate them.
- source_word: אֶלְיוֹעֵנַי
  chosen: Elioenai
  alternatives:
  - Elyoenai
  lexicon: HALOT
  rationale: Proper name transliterated in its conventional English biblical form.
    The standard form 'Elioenai' is more recognizable in English than a stricter letter-by-letter
    transliteration.
- source_word: אֶלְיָשִׁיב
  chosen: Eliashib
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention.
- source_word: מַתַּנְיָה
  chosen: Mattaniah
  alternatives:
  - Matteniah
  lexicon: HALOT
  rationale: Proper name transliterated in the familiar English biblical form. The
    final -iah reflects the theophoric element and standard convention.
- source_word: וִֽ/ירֵמ֔וֹת
  chosen: Jeremoth
  alternatives:
  - Jerimoth
  lexicon: HALOT
  rationale: Proper name with prefixed conjunction. 'Jeremoth' is a common English
    biblical spelling for יְרֵמוֹת/יְרִימוֹת-type forms; the conjunction is represented
    by the final English 'and' before the last item grouping in the series rather
    than repeated before every name.
- source_word: וְ/זָבָד
  chosen: Zabad
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention; conjunction absorbed
    into normal English list style.
- source_word: וַ/עֲזִיזָא
  chosen: Aziza
  alternatives:
  - Azizah
  lexicon: HALOT
  rationale: Proper name transliterated directly. The prefixed conjunction is rendered
    through English list punctuation and the final 'and.'
