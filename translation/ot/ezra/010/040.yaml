  rationale: Proper personal name (HNp). Following the translation philosophy, personal names are transliterated rather than translated. 'Machnadebai' reflects a standard English transliteration of the Hebrew consonants and vowels; minor spelling variation is possible in English transliteration systems.
- source_word: שָׁשַׁי
  chosen: Shashai
  alternatives:
  - Shashay
  rationale: Proper personal name (HNp). Transliterated directly into English. The chosen form preserves the Hebrew name shape in readable modern English; alternate transliteration reflects a different way of representing the final vowel.
- source_word: שָׁרָי
  chosen: Sharai
  alternatives:
  - Sharai
  rationale: Proper personal name (HNp). Transliterated rather than translated. The chosen form follows the straightforward representation of the Hebrew letters and vowels in English.
