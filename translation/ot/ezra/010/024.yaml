id: EZR.10.24
reference: Ezra 10:24
source:
  edition: WLC
  text: וּ/מִן הַ/מְשֹׁרְרִ֖ים אֶלְיָשִׁ֑יב וּ/מִן הַ/שֹּׁ֣עֲרִ֔ים שַׁלֻּ֥ם וָ/טֶ֖לֶם
    וְ/אוּרִֽי־־׃ס
translation:
  text: 'And from the singers: Eliashib; and from the gatekeepers: Shallum, Telem,
    and Uri.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּמִן
  chosen: And from
  alternatives:
  - From
  - And among
  lexicon: HALOT
  rationale: The conjunction plus preposition introduces another subgroup within the
    larger list. 'And from' preserves the additive structure of the Hebrew list better
    than simply 'from.'
- source_word: הַמְשֹׁרְרִים
  chosen: the singers
  alternatives:
  - the singing men
  - the musicians
  lexicon: HALOT
  rationale: The participial form from שׁיר denotes those serving as singers in temple
    worship. 'Singers' is the most natural and sufficiently precise English rendering.
- source_word: אֶלְיָשִׁיב
  chosen: Eliashib
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: הַשֹּׁעֲרִים
  chosen: the gatekeepers
  alternatives:
  - the doorkeepers
  - the guards at the gates
  lexicon: HALOT
  rationale: In temple-administrative context, שֹׁעֲרִים refers to those assigned
    to guard or keep the gates. 'Gatekeepers' is the standard clear rendering.
- source_word: שַׁלֻּם
  chosen: Shallum
  rationale: Personal name transliterated by standard convention.
- source_word: טֶלֶם
  chosen: Telem
  rationale: Personal name transliterated by standard convention.
- source_word: אוּרִי
  chosen: Uri
  rationale: Personal name transliterated by standard convention.
