  text: שַׁלּ֥וּם אֲמַרְיָ֖ה יוֹסֵֽף׃ס
translation:
  text: Shallum, Amariah, Joseph.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: שַׁלּוּם
  chosen: Shallum
  alternatives:
  - Shallun
  rationale: Proper personal name (HNp). Following the translation philosophy, personal
    names are transliterated rather than translated. 'Shallum' is the standard English
    transliteration for this Hebrew name.
- source_word: אֲמַרְיָה
  chosen: Amariah
  alternatives:
  - Amaryah
  rationale: Proper personal name (HNp). Transliterated as a personal name. 'Amariah'
    is the conventional English form and preserves readability while reflecting the
    Hebrew name.
- source_word: יוֹסֵף
  chosen: Joseph
  alternatives:
  - Yoseph
  rationale: Proper personal name (HNp). Transliterated using the standard English
    biblical form 'Joseph' rather than a more phonetic transliteration, for readability
    and consistency with established English name conventions.
