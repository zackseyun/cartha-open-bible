id: EZR.10.37
reference: Ezra 10:37
source:
  edition: WLC
  text: מַתַּנְיָ֥ה מַתְּנַ֖י ו/יעשו׃
translation:
  text: Mattaniah, Mattenai, and Jaasai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final name is a rare personal name and is rendered variously in English
      versions, including 'Jeshai.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַתַּנְיָה
  chosen: Mattaniah
  alternatives:
  - Matteniah
  rationale: Proper personal name; transliterated rather than translated in keeping
    with the stated philosophy for names. The form is conventionally rendered 'Mattaniah'
    in English biblical usage.
- source_word: מַתְּנַי
  chosen: Mattenai
  alternatives:
  - Mattenai
  rationale: Proper personal name; transliterated by standard convention. The short
    final vowel is represented with '-ai' in common English biblical transliteration.
- source_word: ו/יעשו
  chosen: and Jaasai
  alternatives:
  - and Jeshai
  - and Jaasu
  lexicon: HALOT
  rationale: The prefixed conjunction ו is rendered 'and'. The following form is a
    proper name in this list context. Because this verse is part of a name list and
    the morphology identifies a proper noun, the most natural translation is a transliterated
    personal name. 'Jaasai' reflects a straightforward transliteration of the consonantal
    form as pointed in the Masoretic Text, while noting that English traditions vary
    in representing this relatively rare name.
