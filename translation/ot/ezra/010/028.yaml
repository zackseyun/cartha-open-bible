id: EZR.10.28
reference: Ezra 10:28
source:
  edition: WLC
  text: וּ/מִ/בְּנֵ֖י בֵּבָ֑י יְהוֹחָנָ֥ן חֲנַנְיָ֖ה זַבַּ֥י עַתְלָֽי׃ס
translation:
  text: 'And from the sons of Bebai: Jehohanan, Hananiah, Zabbai, Athlai.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of' may refer more broadly to members or descendants of the
      family line of Bebai.
    reason: lexical_alternative
  - marker: b
    text: Jehohanan is often simplified in English as 'Johanan.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  chosen: And from the sons of
  alternatives:
  - And from the descendants of
  - And from the family of
  lexicon: HALOT
  rationale: The compound conjunction + preposition + construct plural literally means
    'and from the sons of.' In this genealogical/list context, 'sons of' is a conventional
    Hebrew clan expression and can denote members of a family line, but retaining
    'sons of' best preserves the form of the source while remaining natural in English.
- source_word: בֵּבָי
  chosen: Bebai
  rationale: Proper personal/family name, transliterated according to the project's
    policy to transliterate names rather than translate them.
- source_word: יְהוֹחָנָן
  chosen: Jehohanan
  alternatives:
  - Johanan
  rationale: Proper name transliterated directly from the Hebrew form. 'Johanan' is
    a common English simplification, but 'Jehohanan' more closely reflects the full
    Hebrew spelling with the theophoric element.
- source_word: חֲנַנְיָה
  chosen: Hananiah
  rationale: Proper name transliterated by standard English convention.
- source_word: זַבַּי
  chosen: Zabbai
  alternatives:
  - Zabbay
  rationale: Proper name transliterated; 'Zabbai' is a standard English representation
    of the Hebrew ending here.
- source_word: עַתְלָי
  chosen: Athlai
  rationale: Proper name transliterated directly from the Hebrew.
