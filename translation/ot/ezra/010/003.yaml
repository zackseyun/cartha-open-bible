id: EZR.10.3
reference: Ezra 10:3
source:
  edition: WLC
  text: וְ/עַתָּ֣ה נִֽכְרָת בְּרִ֣ית לֵ֠/אלֹהֵי/נוּ לְ/הוֹצִ֨יא כָל נָשִׁ֜ים וְ/הַ/נּוֹלָ֤ד
    מֵ/הֶם֙ בַּ/עֲצַ֣ת אֲדֹנָ֔/י וְ/הַ/חֲרֵדִ֖ים בְּ/מִצְוַ֣ת אֱלֹהֵ֑י/נוּ וְ/כַ/תּוֹרָ֖ה
    יֵעָשֶֽׂה־־׃
translation:
  text: So now let us make a covenant with our God to send away all the women and
    what has been born from them, according to the counsel of my lord and of those
    who tremble at the commandment of our God; and let it be done according to the
    law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the wives'; the context concerns foreign wives taken in marriage.
    reason: lexical_alternative
  - marker: b
    text: Or 'and the children born to them' or 'and their offspring.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'my lord' here likely refers to Ezra, not to God.
    reason: alternative_reading
  - marker: d
    text: Or 'according to the Torah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִכְרָת בְּרִית
  chosen: let us make a covenant
  alternatives:
  - let us cut a covenant
  - let us enter into a covenant
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'cut a covenant,' but idiomatic English
    is 'make a covenant.' 'Let us' reflects the 1cp cohortative sense.
- source_word: לֵאלֹהֵינוּ
  chosen: with our God
  alternatives:
  - to our God
  lexicon: HALOT
  rationale: With כרת ברית, the preposition ל commonly marks the covenantal party;
    in English 'with our God' best conveys the relational sense.
- source_word: לְהוֹצִיא
  chosen: to send away
  alternatives:
  - to put out
  - to dismiss
  lexicon: HALOT
  rationale: In this context of removing foreign wives, 'send away' is the most natural
    and sufficiently formal rendering of the Hiphil infinitive of יצא.
- source_word: כָל נָשִׁים
  chosen: all the women
  alternatives:
  - all the wives
  lexicon: HALOT
  rationale: The noun is 'women,' but in context these are the foreign wives mentioned
    in the surrounding passage. I retained the formally closer 'women' in the main
    text and preserved 'wives' as an alternative because the immediate context makes
    the marital sense clear.
- source_word: וְהַנּוֹלָד מֵהֶם
  chosen: and what has been born from them
  alternatives:
  - and the children born to them
  - and their offspring
  lexicon: HALOT
  rationale: The singular participle with article functions collectively. The literal
    sense is 'the born thing/one from them.' I chose a close rendering that preserves
    the collective force without over-specifying, while noting the smoother English
    alternatives.
- source_word: בַּעֲצַת
  chosen: according to the counsel of
  alternatives:
  - by the counsel of
  - in accordance with the advice of
  lexicon: HALOT
  rationale: This prepositional phrase indicates conformity to advice or deliberation.
    'According to the counsel of' is both natural and suitably formal.
- source_word: אֲדֹנָי
  chosen: my lord
  alternatives:
  - the Lord
  - my master
  lexicon: HALOT
  rationale: Here the form refers to a human superior, not the divine name or title.
    Lowercase 'my lord' best reflects the speaker's deferential address to Ezra in
    context.
- source_word: וְהַחֲרֵדִים בְּמִצְוַת אֱלֹהֵינוּ
  chosen: and of those who tremble at the commandment of our God
  alternatives:
  - and of those who fear the commandment of our God
  - and of those who tremble at the commands of our God
  lexicon: HALOT
  rationale: חרד conveys trembling in reverent fear. The singular 'commandment' is
    retained from the Hebrew, likely as a collective or representative singular.
- source_word: וְכַתּוֹרָה יֵעָשֶׂה
  chosen: and let it be done according to the law
  alternatives:
  - and let it be done according to the Torah
  - and it shall be done according to the law
  lexicon: HALOT
  rationale: תּוֹרָה can be rendered 'law' or transliterated 'Torah.' For accessible
    modern English in this legal-covenantal context, 'law' is preferred, while 'Torah'
    is preserved as an alternative. The imperfect/jussive nuance is reflected by 'let
    it be done'.
