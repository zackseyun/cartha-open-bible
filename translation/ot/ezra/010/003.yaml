theological_decisions:
- issue: Referent of אֲדֹנָי
  chosen_reading: human 'my lord' (addressing Ezra), not a divine title
  alternative_readings:
  - the Lord
  rationale: The immediate narrative context is Shecaniah speaking to Ezra and proposing
    action in line with Ezra's leadership and the counsel of the faithful. Rendering
    this as divine 'the Lord' would obscure the human referent and distort the syntax.
