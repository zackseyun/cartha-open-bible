id: EZR.10.32
reference: Ezra 10:32
source:
  edition: WLC
  text: בְּנְיָמִ֥ן מַלּ֖וּךְ שְׁמַרְיָֽה׃ס
translation:
  text: Binyamin[a], Malluk, Shemaryah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or traditional English spellings: ''Benjamin, Malluch, Shemariah.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנְיָמִן
  chosen: Binyamin
  alternatives:
  - Benjamin
  lexicon: HALOT
  rationale: Proper personal name. Following the philosophy to transliterate names rather than translate titles, the Hebrew form is represented directly as 'Binyamin.' 'Benjamin' is the conventional anglicized form and could be used, but the direct transliteration better reflects the source form in this name list.
- source_word: מַלּוּךְ
  chosen: Malluk
  alternatives:
  - Malluch
  lexicon: HALOT
  rationale: Proper personal name in a list. Rendered by transliteration. 'Malluch' reflects a more traditional English spelling, but 'Malluk' more directly represents the final kaf sound in standard transliteration.
- source_word: שְׁמַרְיָה
  chosen: Shemaryah
  alternatives:
  - Shemariah
  lexicon: HALOT
  rationale: Proper personal name. Transliterated directly from Hebrew. 'Shemariah' is a common anglicized alternative; 'Shemaryah' preserves the Hebrew divine-name element more transparently in transliteration.
