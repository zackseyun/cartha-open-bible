id: EZR.10.38
reference: Ezra 10:38
source:
  edition: WLC
  text: וּ/בָנִ֥י וּ/בִנּ֖וּי שִׁמְעִֽי׃
translation:
  text: and Bani, and Binnui, Shimei.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/בָנִי
  chosen: and Bani
  alternatives:
  - and Banih
  lexicon: HALOT
  rationale: The prefixed conjunction וּ is rendered as 'and' in this list of names.
    בָנִי is a proper personal name, so it is transliterated rather than translated,
    following the translation philosophy for names. 'Bani' is the standard English
    transliteration in Ezra.
- source_word: וּ/בִנּוּי
  chosen: and Binnui
  alternatives:
  - and Binnuy
  lexicon: HALOT
  rationale: The prefixed conjunction וּ is again rendered 'and.' בִנּוּי is a proper
    name and is therefore transliterated. 'Binnui' reflects conventional English representation
    of the Hebrew name in Ezra genealogical lists.
- source_word: שִׁמְעִי
  chosen: Shimei
  alternatives:
  - Shimi
  lexicon: HALOT
  rationale: This is a proper personal name, transliterated as 'Shimei,' the standard
    English form for שִׁמְעִי. No conjunction precedes it in Hebrew, so it is simply
    presented as the final name in the sequence.
