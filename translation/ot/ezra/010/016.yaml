id: EZR.10.16
reference: Ezra 10:16
source:
  edition: WLC
  text: וַ/יַּֽעֲשׂוּ כֵן֮ בְּנֵ֣י הַ/גּוֹלָה֒ וַ/יִּבָּדְלוּ֩ עֶזְרָ֨א הַ/כֹּהֵ֜ן אֲנָשִׁ֨ים רָאשֵׁ֧י הָ/אָב֛וֹת לְ/בֵ֥ית אֲבֹתָ֖/ם וְ/כֻלָּ֣/ם בְּ/שֵׁמ֑וֹת וַ/יֵּשְׁב֗וּ בְּ/י֤וֹם אֶחָד֙ לַ/חֹ֣דֶשׁ הָ/עֲשִׂירִ֔י לְ/דַרְי֖וֹשׁ הַ/דָּבָֽר־׃
translation:
  text: So the sons of the exile did so[a]. And Ezra the priest selected men, heads of fathers’ houses according to their fathers’ houses, all of them by name[c][b]; and they sat down on the first day of the tenth month to investigate the matter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the exiles did so.' The Hebrew is literally 'the sons of the exile,' a corporate designation for the returned community.
    reason: lexical_alternative
  - marker: b
    text: Or 'separated themselves.' The Hebrew verb can be understood more literally as separation, though here it functions in context for appointing or setting apart representatives.
    reason: alternative_reading
  - marker: c
    text: Hebrew 'heads of fathers’ houses,' referring to clan or family leaders.
    reason: cultural_note
lexical_decisions:
- source_word: בְּנֵי הַגּוֹלָה
  chosen: the sons of the exile
  alternatives:
  - the exiles
  - the children of the captivity
  - the returned exiles
  lexicon: HALOT
  rationale: Formally, the phrase is 'sons of the exile/captivity.' Following the gender-accurate principle, 'sons' is retained rather than neutralizing to 'people,' while the idiom still refers corporately to the returned community.
- source_word: וַיִּבָּדְלוּ
  chosen: set apart
  alternatives:
  - separated themselves
  - were separated
  - selected
  lexicon: HALOT
  rationale: The Niphal of בדל carries the sense of being separated or set apart. In context, the clause introduces Ezra's appointment of representatives for inquiry; 'set apart' preserves the separation idea while reading naturally in English.
- source_word: עֶזְרָא הַכֹּהֵן
  chosen: Ezra the priest
  alternatives:
  - Ezra the priestly scribe
  rationale: The Hebrew here explicitly gives only 'Ezra the priest,' so the translation should not import 'scribe' from nearby contexts.
- source_word: אֲנָשִׁים רָאשֵׁי הָאָבוֹת
  chosen: men, heads of fathers’ houses
  alternatives:
  - men who were heads of ancestral houses
  - family heads
  lexicon: HALOT
  rationale: אֲנָשִׁים is explicitly 'men,' and רָאשֵׁי הָאָבוֹת denotes clan/family heads. 'Fathers’ houses' preserves the Hebrew social unit more closely than the flatter 'families.'
- source_word: לְבֵית אֲבֹתָם
  chosen: according to their fathers’ houses
  alternatives:
  - by their ancestral houses
  - by their family groups
  lexicon: HALOT
  rationale: This phrase classifies the selected men by paternal household/clan structure. 'According to their fathers’ houses' is slightly formal but transparent and preserves the repeated בית/אבות language.
- source_word: וְכֻלָּם בְּשֵׁמוֹת
  chosen: all of them by name
  alternatives:
  - each of them by name
  - all of them named individually
  lexicon: HALOT
  rationale: The phrase indicates individual identification or registration. 'All of them by name' is concise and faithful.
- source_word: וַיֵּשְׁבוּ
  chosen: they sat down
  alternatives:
  - they convened
  - they sat
  lexicon: HALOT
  rationale: ישב literally means 'sit/dwell.' In administrative/judicial context it can imply convening for deliberation. 'Sat down' keeps the literal image while fitting the context.
- source_word: בְּיוֹם אֶחָד לַחֹדֶשׁ הָעֲשִׂירִי
  chosen: on the first day of the tenth month
  alternatives:
  - on day one of the tenth month
  lexicon: HALOT
  rationale: The Hebrew idiom 'day one' of a month is standardly rendered 'the first day' in English.
- source_word: לְדַרְיוֹשׁ הַדָּבָר
  chosen: to investigate the matter
  alternatives:
  - to examine the matter
  - to seek out the matter
  lexicon: HALOT
  rationale: The consonantal text here reflects an infinitival sense from דרש, 'to seek/inquire into,' followed by 'the matter.' 'Investigate the matter' communicates the administrative inquiry clearly in modern English.
