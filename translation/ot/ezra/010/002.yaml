theological_decisions:
- issue: Covenantal nuance of מָעַלְנוּ
  chosen_reading: Rendered as 'have acted unfaithfully' rather than a flatter term like 'have sinned.'
  alternative_readings:
  - have sinned
  - have trespassed
  - have committed a breach of faith
  rationale: The Hebrew verb carries the sense of breach of faith, especially against God. The chosen rendering preserves the covenantal and theological weight without importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §1, §5
- issue: Ethnic/social designation in נָשִׁים נָכְרִיּוֹת
  chosen_reading: Rendered as 'foreign women' in line with the text's ethnic/covenantal concern.
  alternative_readings:
  - foreign wives
  rationale: The verse addresses marriages with women from surrounding peoples. 'Foreign women' stays close to the Hebrew wording while allowing the marriage verb to carry the marital sense. This avoids over-specifying where the noun itself does not.
  doctrine_reference: Translation philosophy §1, §6
