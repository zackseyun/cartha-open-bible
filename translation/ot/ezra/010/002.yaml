id: EZR.10.2
reference: Ezra 10:2
source:
  edition: WLC
  text: וַ/יַּעַן֩ שְׁכַנְיָ֨ה בֶן יְחִיאֵ֜ל מִ/בְּנֵ֤י עולם וַ/יֹּ֣אמֶר לְ/עֶזְרָ֔א אֲנַ֨חְנוּ֙ מָעַ֣לְנוּ בֵ/אלֹהֵ֔י/נוּ וַ/נֹּ֛שֶׁב נָשִׁ֥ים נָכְרִיּ֖וֹת מֵ/עַמֵּ֣י הָ/אָ֑רֶץ וְ/עַתָּ֛ה יֵשׁ מִקְוֶ֥ה לְ/יִשְׂרָאֵ֖ל עַל זֹֽאת־־־׃
translation:
  text: Then Shecaniah son of Jehiel[a], from the sons of Elam, answered and said to Ezra, “We have acted unfaithfully against our God and have married foreign women from the peoples of the land[c][b]. Yet now there is hope for Israel concerning this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have committed a breach of faith against our God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'have taken foreign women as wives from the peoples of the land.'
    reason: lexical_alternative
  - marker: c
    text: Or 'there is hope for Israel concerning this.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: Standard narrative verb for replying; 'answered' fits the discourse context and preserves the formal feel of the Hebrew wayyiqtol.
- source_word: שְׁכַנְיָה
  chosen: Shecaniah
  alternatives:
  - Shechaniah
  rationale: Personal name is transliterated per project philosophy. 'Shecaniah' is a standard English transliteration for שְׁכַנְיָה.
- source_word: בֶן יְחִיאֵל
  chosen: son of Jehiel
  rationale: Straightforward filial construction; 'son of' preserves the Hebrew relationship marker.
- source_word: מִבְּנֵי עוֹלָם
  chosen: from the sons of Elam
  alternatives:
  - of the sons of Elam
  - one of the sons of Elam
  rationale: The proper name here is Elam, not 'world/eternity'; the phrase identifies clan lineage. 'From the sons of Elam' is natural English while preserving the Hebrew preposition and family-group sense.
- source_word: וַיֹּאמֶר לְעֶזְרָא
  chosen: said to Ezra
  alternatives:
  - spoke to Ezra
  lexicon: HALOT
  rationale: Common speech formula; 'said to Ezra' is the most idiomatic and transparent rendering.
- source_word: מָעַלְנוּ
  chosen: have acted unfaithfully
  alternatives:
  - have been unfaithful
  - have trespassed
  - have committed a breach of faith
  lexicon: HALOT
  rationale: מעל often denotes breach of faith or unfaithfulness, especially in covenantal/religious contexts. 'Have acted unfaithfully' captures both the moral and covenantal dimension better than the more generic 'sinned'.
- source_word: בֵּאלֹהֵינוּ
  chosen: against our God
  alternatives:
  - with our God
  lexicon: HALOT
  rationale: With מעל, the preposition ב often functions idiomatically to mark the offended party; English 'against our God' best conveys the sense of covenant violation.
- source_word: וַנֹּשֶׁב
  chosen: have married
  alternatives:
  - have taken as wives
  - have settled with
  lexicon: HALOT
  rationale: From ישׁב in the Hiphil/causative-like usage here, the idiom means taking women in marriage. 'Have married' is clear modern English and accurately reflects the sense.
- source_word: נָשִׁים נָכְרִיּוֹת
  chosen: foreign women
  alternatives:
  - foreign wives
  - strange women
  lexicon: HALOT
  rationale: נכריות means foreign/alien women. 'Foreign women' is the most direct rendering; 'wives' is interpretive, though contextually implied by the marriage verb.
- source_word: מֵעַמֵּי הָאָרֶץ
  chosen: from the peoples of the land
  alternatives:
  - from the peoples of the lands
  - from the people groups of the land
  lexicon: HALOT
  rationale: Plural עמי indicates multiple surrounding peoples. 'Peoples of the land' preserves the plural and the socio-ethnic sense better than a singular rendering.
- source_word: וְעַתָּה
  chosen: But now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Marks a turn from confession to possibility. 'But now' brings out the rhetorical contrast in English.
- source_word: יֵשׁ מִקְוֶה
  chosen: there is hope
  alternatives:
  - there is a hope
  - there is expectation
  lexicon: HALOT
  rationale: מִקְוֶה here denotes hope or grounds for hope, not a literal gathering/place. English idiom prefers 'there is hope' without the article.
- source_word: לְיִשְׂרָאֵל
  chosen: for Israel
  lexicon: HALOT
  rationale: Simple dative/benefactive sense; 'for Israel' is natural and direct.
- source_word: עַל זֹאת
  chosen: in spite of this
  alternatives:
  - concerning this
  - regarding this
  - because of this
  lexicon: HALOT
  rationale: The phrase is somewhat idiomatic in context. Here it points to hope existing despite the present offense/situation. 'In spite of this' best fits the discourse logic of confession followed by remaining hope.
