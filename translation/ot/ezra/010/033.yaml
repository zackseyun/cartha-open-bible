id: EZR.10.33
reference: Ezra 10:33
source:
  edition: WLC
  text: מִ/בְּנֵ֖י חָשֻׁ֑ם מַתְּנַ֤י מַתַּתָּה֙ זָבָ֣ד אֱלִיפֶ֔לֶט יְרֵמַ֥י מְנַשֶּׁ֖ה
    שִׁמְעִֽי׃ס
translation:
  text: 'From the sons of Hashum: Mattenai, Mattattah, Zabad, Eliphelet, Jeremai,
    Manasseh, and Shimei.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Mattattah may also be spelled 'Mattathah' in English transliteration.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/בְּנֵי
  chosen: From the sons of
  alternatives:
  - Among the sons of
  - Of the sons of
  lexicon: HALOT
  rationale: The preposition מִן with בְּנֵי in this list context introduces members
    drawn from a family group. 'From the sons of' is natural English and preserves
    the genealogical/listing force better than a bare 'of.'
- source_word: חָשֻׁם
  chosen: Hashum
  lexicon: HALOT
  rationale: Proper personal/family name; transliterated according to standard English
    convention, following the translation philosophy to transliterate names rather
    than translate them.
- source_word: מַתְּנַי
  chosen: Mattenai
  alternatives:
  - Mattenai
  lexicon: HALOT
  rationale: Proper name transliterated directly. 'Mattenai' reflects the consonantal
    form and common English representation.
- source_word: מַתַּתָּה
  chosen: Mattattah
  alternatives:
  - Mattathah
  lexicon: HALOT
  rationale: Proper name transliterated. 'Mattattah' closely reflects the doubled
    tav in the Hebrew spelling; an alternative English form is worth noting as a lexical
    alternative.
- source_word: זָבָד
  chosen: Zabad
  lexicon: HALOT
  rationale: Proper name transliterated straightforwardly.
- source_word: אֱלִיפֶלֶט
  chosen: Eliphelet
  alternatives:
  - Eliphelet
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention; no translation is
    attempted for names.
- source_word: יְרֵמַי
  chosen: Jeremai
  alternatives:
  - Jeremay
  lexicon: HALOT
  rationale: Proper name transliterated. 'Jeremai' is the conventional English form
    corresponding to the Hebrew ending.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  lexicon: HALOT
  rationale: Proper name transliterated by established English convention.
- source_word: שִׁמְעִי
  chosen: Shimei
  alternatives:
  - Shimi
  lexicon: HALOT
  rationale: Proper name transliterated. 'Shimei' is the standard English form and
    best matches familiar biblical usage.
