id: EZR.10.23
reference: Ezra 10:23
source:
  edition: WLC
  text: וּ/מִֽן הַ/לְוִיִּ֑ם יוֹזָבָ֣ד וְ/שִׁמְעִ֗י וְ/קֵֽלָיָה֙ ה֣וּא קְלִיטָ֔א פְּתַֽחְיָ֥ה
    יְהוּדָ֖ה וֶ/אֱלִיעֶֽזֶר־׃ס
translation:
  text: 'And from the Levites: Jozabad, Shimei, Keliah (that is, Kelita), Pethahiah,
    Judah, and Eliezer.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Keliah, he is Kelita,'' indicating that Kelita is an alternate
      name or form of the same person''s name.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן הַלְוִיִּם
  chosen: And from the Levites
  alternatives:
  - And from among the Levites
  - Now from the Levites
  lexicon: HALOT
  rationale: The phrase introduces a subgroup within the larger list. 'From the Levites'
    is concise and natural in English, while preserving the partitive sense of מִן.
- source_word: יוֹזָבָד
  chosen: Jozabad
  alternatives:
  - Jozabad
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: וְשִׁמְעִי
  chosen: Shimei
  alternatives:
  - Shimi
  rationale: Standard English transliteration of the personal name.
- source_word: וְקֵלָיָה הוּא קְלִיטָא
  chosen: Keliah (that is, Kelita)
  alternatives:
  - Keliah—he is Kelita
  - Keliah, also called Kelita
  lexicon: HALOT
  rationale: The pronoun הוּא here functions appositionally/explanatorily, identifying
    an alternate form of the same person's name. 'That is' communicates this clearly
    in modern English without over-paraphrasing.
- source_word: פְּתַחְיָה
  chosen: Pethahiah
  alternatives:
  - Pethaiah
  rationale: Standard English transliteration of the personal name.
- source_word: יְהוּדָה
  chosen: Judah
  alternatives:
  - Judah
  rationale: Standard English form of the personal name; context indicates an individual,
    not the tribe or region.
- source_word: וֶאֱלִיעֶזֶר
  chosen: and Eliezer
  alternatives:
  - and Eleazar
  rationale: The consonantal form and vocalization support Eliezer rather than Eleazar;
    standard English transliteration used.
