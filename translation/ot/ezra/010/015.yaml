id: EZR.10.15
reference: Ezra 10:15
source:
  edition: WLC
  text: אַ֣ךְ יוֹנָתָ֧ן בֶּן עֲשָׂהאֵ֛ל וְ/יַחְזְיָ֥ה בֶן תִּקְוָ֖ה עָמְד֣וּ עַל זֹ֑את וּ/מְשֻׁלָּ֛ם וְ/שַׁבְּתַ֥י הַ/לֵּוִ֖י עֲזָרֻֽ/ם־־־׃
translation:
  text: Only Jonathan son of Asahel and Jahzeiah son of Tikvah stood against this[b][a], and Meshullam and Shabbethai the Levite supported them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jahaziah son of Tikvah.'
    reason: lexical_alternative
  - marker: b
    text: Or 'helped them' or 'assisted them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: Only
  alternatives:
  - However
  - Nevertheless
  - Surely
  lexicon: HALOT
  rationale: Here אַךְ marks limitation/exceptions to the broader agreement just expressed in context. 'Only' best conveys the restrictive force in natural English.
- source_word: יוֹנָתָן בֶּן עֲשָׂהאֵל
  chosen: Jonathan son of Asahel
  rationale: Personal names are transliterated by standard English biblical convention; בֶּן is rendered 'son of' in genealogical identification.
- source_word: יַחְזְיָה בֶן תִּקְוָה
  chosen: Jahzeiah son of Tikvah
  alternatives:
  - Jahaziah son of Tikvah
  rationale: The consonantal form supports a transliteration like 'Jahzeiah'; 'Jahaziah' reflects a familiar traditional spelling and is worth preserving as an alternative.
- source_word: עָמְדוּ עַל זֹאת
  chosen: stood against this
  alternatives:
  - opposed this
  - stood over this matter
  - took their stand concerning this
  lexicon: HALOT
  rationale: The idiom עמד על + demonstrative in this context most naturally conveys taking a stand in opposition to the proposal just mentioned. 'Stood against this' preserves the concrete verbal imagery while making the adversative sense clear.
- source_word: וּמְשֻׁלָּם וְשַׁבְּתַי הַלֵּוִי
  chosen: and Meshullam and Shabbethai the Levite
  rationale: Names are transliterated. The appositional הַלֵּוִי most naturally modifies Shabbethai alone in the Hebrew sequence, so it is rendered 'Shabbethai the Levite' rather than applying to both names.
- source_word: עֲזָרֻם
  chosen: supported them
  alternatives:
  - helped them
  - assisted them
  lexicon: HALOT
  rationale: The verb עזר with 3mp suffix means 'helped/assisted them.' 'Supported them' fits the procedural context of backing the two named men in their stance.
