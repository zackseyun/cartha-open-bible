theological_decisions:
- issue: Rendering of מַעַל in a covenantal failure context
  chosen_reading: unfaithfulness
  alternative_readings:
  - treachery
  - faithlessness
  rationale: The verse describes Ezra's grief over the community's breach of covenant fidelity. 'Unfaithfulness' preserves the theological weight without narrowing it to a merely legal or emotional category.
  doctrine_reference: Translation philosophy §3, §5
- issue: Whether to render בֵּית הָאֱלֹהִים as 'house of God' or interpretively as 'temple'
  chosen_reading: house of God
  alternative_readings:
  - temple of God
  rationale: The source text's wording is retained unless clarity demands otherwise. Here 'house of God' is understandable in modern English and preserves the Hebrew expression.
  doctrine_reference: Translation philosophy §1, §5
