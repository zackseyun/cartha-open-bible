id: EZR.10.6
reference: Ezra 10:6
source:
  edition: WLC
  text: וַ/יָּ֣קָם עֶזְרָ֗א מִ/לִּ/פְנֵי֙ בֵּ֣ית הָֽ/אֱלֹהִ֔ים וַ/יֵּ֕לֶךְ אֶל לִשְׁכַּ֖ת יְהוֹחָנָ֣ן בֶּן אֶלְיָשִׁ֑יב וַ/יֵּ֣לֶךְ שָׁ֗ם לֶ֤חֶם לֹֽא אָכַל֙ וּ/מַ֣יִם לֹֽא שָׁתָ֔ה כִּ֥י מִתְאַבֵּ֖ל עַל מַ֥עַל הַ/גּוֹלָֽה־־־־־׃ס
translation:
  text: Then Ezra rose from before the house of God and went to the chamber of Jehohanan son of Eliashib[a]. He went there and ate no bread and drank no water[c][b], because he was mourning over the unfaithfulness of the exiles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Johanan son of Eliashib.'
    reason: lexical_alternative
  - marker: b
    text: '''Unfaithfulness'' could also be rendered ''treachery'' or ''faithlessness.'''
    reason: lexical_alternative
  - marker: c
    text: '''The exiles'' refers to the returned exile community.'
    reason: cultural_note
lexical_decisions:
- source_word: מִלִּפְנֵי
  chosen: from before
  alternatives:
  - from in front of
  - from the presence of
  lexicon: HALOT
  rationale: The idiom literally means 'from before.' In this narrative setting, 'from before the house of God' preserves the Hebrew spatial expression while remaining natural enough in English.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: HALOT
  rationale: The Hebrew is literally 'house of God.' While it refers to the temple, retaining 'house of God' preserves the source wording and its reverential tone.
- source_word: לִשְׁכַּת
  chosen: the chamber
  alternatives:
  - the room
  - the cell
  lexicon: HALOT
  rationale: לשכה commonly denotes a chamber or room in a temple or official complex. 'Chamber' fits the architectural and temple-adjacent context better than the more generic 'room'.
- source_word: יְהוֹחָנָן בֶּן אֶלְיָשִׁיב
  chosen: Jehohanan son of Eliashib
  alternatives:
  - Johanan son of Eliashib
  rationale: Personal names are transliterated. 'Jehohanan' more closely reflects the Hebrew form יְהוֹחָנָן, though 'Johanan' is a common English simplification.
- source_word: וַיֵּלֶךְ שָׁם
  chosen: He went there
  alternatives:
  - He entered there
  - He stayed there
  lexicon: HALOT
  rationale: The Hebrew repeats 'and he went' followed by 'there.' The clause is somewhat abrupt; 'He went there' preserves the repetition without overinterpreting it as 'stayed' or 'entered,' though the following fasting occurs at that location.
- source_word: לֶחֶם לֹא אָכַל
  chosen: ate no bread
  alternatives:
  - did not eat food
  - ate nothing
  lexicon: HALOT
  rationale: '''Bread'' can stand metonymically for food, but the Hebrew specifically says ''bread.'' Retaining ''ate no bread'' keeps the concrete expression and pairs well with ''drank no water'' as a fasting formula.'
- source_word: וּמַיִם לֹא שָׁתָה
  chosen: drank no water
  alternatives:
  - did not drink
  lexicon: HALOT
  rationale: The explicit object 'water' should be preserved; together with 'ate no bread' it communicates a total fast in idiomatic biblical style.
- source_word: מִתְאַבֵּל
  chosen: was mourning
  alternatives:
  - was grieving
  - was lamenting
  lexicon: HALOT
  rationale: The Hitpael of אבל denotes mourning, often with visible grief practices such as fasting. 'Was mourning' best matches the solemn, penitential context.
- source_word: מַעַל
  chosen: unfaithfulness
  alternatives:
  - treachery
  - faithlessness
  - guilt
  lexicon: HALOT
  rationale: מעל often denotes breach of faith, especially covenantal or sacrilegious unfaithfulness. 'Unfaithfulness' communicates both moral and covenantal dimensions without sounding overly technical.
- source_word: הַגּוֹלָה
  chosen: the exiles
  alternatives:
  - the returned exiles
  - the exile community
  lexicon: HALOT
  rationale: The term refers to the community of the exile/returned exiles. 'The exiles' is concise and faithful; the context in Ezra makes clear this is the post-exilic community.
