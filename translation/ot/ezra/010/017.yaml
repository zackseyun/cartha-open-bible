id: EZR.10.17
reference: Ezra 10:17
source:
  edition: WLC
  text: וַ/יְכַלּ֣וּ בַ/כֹּ֔ל אֲנָשִׁ֕ים הַ/הֹשִׁ֖יבוּ נָשִׁ֣ים נָכְרִיּ֑וֹת עַ֛ד י֥וֹם אֶחָ֖ד לַ/חֹ֥דֶשׁ הָ/רִאשֽׁוֹן׃פ
translation:
  text: And they finished with all the men who had taken foreign wives by the first day of the first month[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until the first day of the first month.' The Hebrew temporal expression can be rendered either way; the main text uses idiomatic English to show the date by which the inquiry was completed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְכַלּוּ
  chosen: they finished
  alternatives:
  - they completed
  - they came to an end
  lexicon: HALOT
  rationale: From כלה in the waw-consecutive imperfect, indicating completion of the process described in context. 'They finished' is natural modern English and preserves the sense of bringing the matter to completion.
- source_word: בַּכֹּל
  chosen: with all
  alternatives:
  - all of
  - concerning all
  lexicon: HALOT
  rationale: The preposition ב with כֹּל here is idiomatic in context, marking the total scope of the cases handled. 'With all' fits the English construction 'finished with all the men' and reflects the procedural sense.
- source_word: אֲנָשִׁים
  chosen: the men
  alternatives:
  - the people
  - the husbands
  lexicon: HALOT
  rationale: The noun is specifically masculine plural, not a generic term for people. In context it refers to the male offenders under investigation, so 'the men' is gender-accurate and contextually precise.
- source_word: הַהֹשִׁיבוּ
  chosen: had taken
  alternatives:
  - had caused to dwell
  - had married
  - had settled with
  lexicon: HALOT
  rationale: Literally from ישב/הושיב, 'caused to dwell,' but in Ezra 10 the idiom refers to taking women into the household as wives. 'Had taken' preserves the idiomatic marital sense without over-paraphrasing; 'had married' is possible but slightly more interpretive than the Hebrew idiom itself.
- source_word: נָשִׁים נָכְרִיּוֹת
  chosen: foreign wives
  alternatives:
  - foreign women
  - strange wives
  lexicon: HALOT
  rationale: The phrase in context refers to women taken as wives from outside the covenant community. 'Foreign wives' is the established contextual sense and is more precise than merely 'foreign women.' 'Strange wives' is archaic and potentially misleading in modern English.
- source_word: עַד יוֹם אֶחָד
  chosen: by the first day
  alternatives:
  - until the first day
  - up to day one
  lexicon: HALOT
  rationale: The temporal phrase marks the endpoint by which the process was completed. In English, 'by the first day' communicates completed action reached at that date more naturally than 'until the first day,' while preserving the temporal boundary.
- source_word: לַחֹדֶשׁ הָרִאשׁוֹן
  chosen: of the first month
  alternatives:
  - of month one
  - of the initial month
  lexicon: HALOT
  rationale: A straightforward date expression. 'The first month' is the natural English rendering and preserves the calendrical reference.
