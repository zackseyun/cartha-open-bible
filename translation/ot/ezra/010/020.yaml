id: EZR.10.20
reference: Ezra 10:20
source:
  edition: WLC
  text: וּ/מִ/בְּנֵ֣י אִמֵּ֔ר חֲנָ֖נִי וּ/זְבַדְיָֽה׃ס
translation:
  text: 'And from the sons of Immer: Hanani and Zebadiah.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  chosen: And from the sons of
  alternatives:
  - And from the descendants of
  - And among the sons of
  lexicon: HALOT
  rationale: The conjunction ו plus preposition מִן with construct בְּנֵי introduces
    another family grouping in the list. 'And from the sons of' preserves the list
    structure and the genealogical sense of בְּנֵי without overinterpreting it. 'Descendants
    of' is possible but slightly broader than the immediate list formula.
- source_word: אִמֵּר
  chosen: Immer
  lexicon: HALOT
  rationale: Proper name of a priestly family, transliterated in keeping with the
    translation philosophy to transliterate personal and family names rather than
    translate them.
- source_word: חֲנָנִי
  chosen: Hanani
  lexicon: HALOT
  rationale: Proper personal name; standard English transliteration is retained.
- source_word: וּ/זְבַדְיָה
  chosen: and Zebadiah
  lexicon: HALOT
  rationale: The prefixed conjunction joins the final named individual in the list.
    'Zebadiah' is the standard transliteration of the proper name.
