theological_decisions:
- issue: Rendering divine anger language without softening or over-systematizing
  chosen_reading: the burning anger of our God
  alternative_readings:
  - the wrath of our God
  - the fierce anger of our God
  rationale: The Hebrew explicitly speaks of God's חרון אף in response to covenant violation. The translation preserves this theological reality without importing later doctrinal categories beyond the text itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
