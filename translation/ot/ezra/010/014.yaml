id: EZR.10.14
reference: Ezra 10:14
source:
  edition: WLC
  text: יַֽעֲמְדוּ נָ֣א שָׂ֠רֵי/נוּ לְֽ/כָל הַ/קָּהָ֞ל וְ/כֹ֣ל אֲשֶׁ֣ר בֶּ/עָרֵ֗י/נוּ הַ/הֹשִׁ֞יב נָשִׁ֤ים נָכְרִיּוֹת֙ יָבֹא֙ לְ/עִתִּ֣ים מְזֻמָּנִ֔ים וְ/עִמָּ/הֶ֛ם זִקְנֵי עִ֥יר וָ/עִ֖יר וְ/שֹׁפְטֶ֑י/הָ עַ֠ד לְ/הָשִׁ֞יב חֲר֤וֹן אַף אֱלֹהֵ֨י/נוּ֙ מִמֶּ֔/נּוּ עַ֖ד לַ/דָּבָ֥ר הַ/זֶּֽה־־׀־־׃פ
translation:
  text: Please let our leaders stand for the whole assembly[a], and let everyone in our cities who has taken foreign wives come at appointed times, with them the elders of each city and its judges[b], until the burning anger of our God is turned back from us in this matter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who has married foreign women.' The Hebrew idiom is literally 'has caused to dwell / has settled' foreign wives, referring to taking them into the household as wives.
    reason: lexical_alternative
  - marker: b
    text: Or 'until the fierce anger of our God is turned away from us concerning this matter.'
    reason: alternative_reading
lexical_decisions:
- source_word: יַעֲמְדוּ נָא
  chosen: Please let ... stand
  alternatives:
  - let ... stand
  - let ... take their stand
  lexicon: HALOT
  rationale: The jussive with particle נָא expresses a polite proposal/request rather than a bare future. 'Please let ... stand' preserves the hortatory force in natural English.
- source_word: שָׂרֵינוּ
  chosen: our leaders
  alternatives:
  - our officials
  - our princes
  lexicon: HALOT
  rationale: שָׂרִים denotes leaders/officials. 'Leaders' is clear modern English and fits the administrative context better than the archaic 'princes.'
- source_word: לְכָל הַקָּהָל
  chosen: for the whole assembly
  alternatives:
  - for all the assembly
  - on behalf of the whole assembly
  lexicon: HALOT
  rationale: The phrase indicates representative function. 'For the whole assembly' is concise and idiomatic, while preserving the sense that the leaders act in relation to the gathered community.
- source_word: הַהֹשִׁיב נָשִׁים נָכְרִיּוֹת
  chosen: who has taken foreign wives
  alternatives:
  - who has married foreign women
  - who has caused foreign wives to dwell
  lexicon: HALOT
  rationale: The idiom with ישׁב here refers to taking women into one's household in marriage. 'Taken foreign wives' is a standard, sufficiently literal rendering; 'married foreign women' is possible but slightly less tied to the Hebrew idiom.
- source_word: נָשִׁים נָכְרִיּוֹת
  chosen: foreign wives
  alternatives:
  - foreign women
  - strange wives
  lexicon: HALOT
  rationale: Given the marital context, 'wives' is preferable to the more generic 'women.' 'Strange wives' is archaic and potentially misleading in modern English.
- source_word: יָבֹא
  chosen: let ... come
  alternatives:
  - shall come
  - must come
  lexicon: HALOT
  rationale: Although morphologically singular, the verb functions distributively with כֹּל אֲשֶׁר ('everyone who'). 'Let ... come' matches the proposal/jussive flow of the verse.
- source_word: לְעִתִּים מְזֻמָּנִים
  chosen: at appointed times
  alternatives:
  - at fixed times
  - at scheduled times
  lexicon: HALOT
  rationale: The phrase refers to designated occasions for hearing these cases. 'Appointed times' is natural and preserves the formal, official sense.
- source_word: וְעִמָּהֶם זִקְנֵי עִיר וָעִיר וְשֹׁפְטֶיהָ
  chosen: and with them the elders of each city and its judges
  alternatives:
  - together with the elders of every city and its judges
  - with them the elders and judges of each city
  lexicon: HALOT
  rationale: עִיר וָעִיר is distributive ('each city' / 'every city'). The suffix on 'its judges' refers back to each city. This rendering keeps the local judicial-administrative structure clear.
- source_word: עַד לְהָשִׁיב
  chosen: until ... is turned back
  alternatives:
  - until ... is averted
  - until ... turns back
  lexicon: HALOT
  rationale: The infinitive of שוב with חרון אף expresses the removal/turning away of wrath. Passive English ('is turned back') communicates the result without over-specifying the agent.
- source_word: חֲרוֹן אַף אֱלֹהֵינוּ
  chosen: the burning anger of our God
  alternatives:
  - the fierce anger of our God
  - the wrath of our God
  lexicon: HALOT
  rationale: The idiom literally combines 'burning' and 'nose/anger' to denote fierce anger. 'Burning anger' preserves the metaphor more closely than the abstract 'wrath,' while remaining readable.
- source_word: מִמֶּנּוּ
  chosen: from us
  alternatives:
  - from him
  - from it
  lexicon: HALOT
  rationale: In context the prepositional suffix refers collectively to the community under judgment; English idiom prefers 'from us' to make the communal reference explicit.
- source_word: עַד לַדָּבָר הַזֶּה
  chosen: in this matter
  alternatives:
  - concerning this matter
  - with regard to this matter
  lexicon: HALOT
  rationale: The closing phrase identifies the issue under adjudication. 'In this matter' is idiomatic and concise.
