id: EZR.10.30
reference: Ezra 10:30
source:
  edition: WLC
  text: וּ/מִ/בְּנֵ֛י פַּחַ֥ת מוֹאָ֖ב עַדְנָ֣א וּ/כְלָ֑ל בְּנָיָ֤ה מַעֲשֵׂיָה֙ מַתַּנְיָ֣ה
    בְצַלְאֵ֔ל וּ/בִנּ֖וּי וּ/מְנַשֶּֽׁה׃ס
translation:
  text: 'And from the sons of Pahath-moab: Adna, Chelal, Benaiah, Maaseiah, Mattaniah,
    Bezalel, Binnui, and Manasseh.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  chosen: And from the sons of
  alternatives:
  - And from the descendants of
  - And from among the sons of
  lexicon: HALOT
  rationale: The phrase introduces another family grouping within the list. 'Sons
    of' is the most direct rendering of בְּנֵי and preserves the genealogical/list
    structure; 'from' reflects the prefixed מִן, and 'And' reflects the conjunction
    linking this entry to the preceding list item.
- source_word: פַּחַת מוֹאָב
  chosen: Pahath-moab
  alternatives:
  - Pahath Moab
  lexicon: HALOT
  rationale: This is a proper family/clan name, conventionally transliterated rather
    than translated, in keeping with the philosophy to transliterate personal and
    family names. The hyphen preserves the compound form familiar in English Bible
    tradition and reflects the bound relationship of the two elements.
- source_word: עַדְנָא
  chosen: Adna
  alternatives:
  - Adnah
  lexicon: HALOT
  rationale: A proper name transliterated into standard English form. 'Adna' matches
    common English rendering for this Ezra name and avoids adding a final 'h' not
    required by the consonantal form here.
- source_word: וּ/כְלָל
  chosen: Chelal
  alternatives:
  - Kelal
  lexicon: HALOT
  rationale: Proper name transliterated. 'Chelal' reflects the Hebrew כ with a conventional
    English 'Ch' transliteration used in many biblical names; 'Kelal' is possible
    but less standard in English Bible usage.
- source_word: בְּנָיָה
  chosen: Benaiah
  lexicon: HALOT
  rationale: Standard English transliteration of the proper name.
- source_word: מַעֲשֵׂיָה
  chosen: Maaseiah
  alternatives:
  - Maasiah
  lexicon: HALOT
  rationale: Standard transliteration preserving the fuller Hebrew form; this avoids
    over-compressing the vowels and better matches common English biblical usage.
- source_word: מַתַּנְיָה
  chosen: Mattaniah
  alternatives:
  - Mattaniah
  lexicon: HALOT
  rationale: Standard English transliteration of the proper name, preserving the doubled
    t sound commonly represented in English Bible forms.
- source_word: בְצַלְאֵל
  chosen: Bezalel
  lexicon: HALOT
  rationale: Standard English transliteration of the proper name.
- source_word: וּ/בִנּוּי
  chosen: Binnui
  alternatives:
  - Binui
  lexicon: HALOT
  rationale: Proper name transliterated. 'Binnui' is the conventional English biblical
    form and reflects the geminated consonant indicated in the Hebrew pointing.
- source_word: וּ/מְנַשֶּׁה
  chosen: and Manasseh
  lexicon: HALOT
  rationale: Proper name transliterated in its standard English form. The conjunction
    is carried into English for the final item in the list.
