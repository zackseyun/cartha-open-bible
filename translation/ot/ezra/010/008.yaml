id: EZR.10.8
reference: Ezra 10:8
source:
  edition: WLC
  text: וְ/כֹל֩ אֲשֶׁ֨ר לֹֽא יָב֜וֹא לִ/שְׁלֹ֣שֶׁת הַ/יָּמִ֗ים כַּ/עֲצַ֤ת הַ/שָּׂרִים֙
    וְ/הַ/זְּקֵנִ֔ים יָחֳרַ֖ם כָּל רְכוּשׁ֑/וֹ וְ/ה֥וּא יִבָּדֵ֖ל מִ/קְּהַ֥ל הַ/גּוֹלָֽה־־׃ס
translation:
  text: And everyone who does not come within three days, according to the counsel
    of the officials and the elders, all his property shall be devoted to destruction,
    and he himself shall be separated from the assembly of the exiles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall be forfeited' or 'shall be put under the ban.' The Hebrew verb
      denotes being placed under חרם, a ban/devotion that can imply destruction or
      confiscation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל אֲשֶׁר
  chosen: And everyone who
  alternatives:
  - And whoever
  - And all who
  lexicon: HALOT
  rationale: Introduces a general conditional class. 'Everyone who' is natural modern
    English and preserves the distributive force.
- source_word: לֹא יָבוֹא
  chosen: does not come
  alternatives:
  - does not arrive
  - will not come
  lexicon: HALOT
  rationale: Qal of בוא here refers to appearing in response to the summons. Present-tense
    English in a legal/conditional clause is idiomatic.
- source_word: לִשְׁלֹשֶׁת הַיָּמִים
  chosen: within three days
  alternatives:
  - by the end of three days
  - in three days
  lexicon: HALOT
  rationale: The phrase marks the deadline for compliance. 'Within three days' communicates
    the temporal limit clearly in English.
- source_word: כַּעֲצַת
  chosen: according to the counsel of
  alternatives:
  - according to the decision of
  - by the advice of
  lexicon: HALOT
  rationale: עֵצָה can denote counsel, advice, or decision. Here it refers to the
    authoritative determination of the leaders; 'according to the counsel of' preserves
    the lexical sense while fitting the legal context.
- source_word: הַשָּׂרִים וְהַזְּקֵנִים
  chosen: the officials and the elders
  alternatives:
  - the princes and the elders
  - the leaders and the elders
  lexicon: HALOT
  rationale: שָׂרִים in postexilic administrative context is better rendered 'officials'
    than the more archaic 'princes.' 'Elders' is the standard rendering for זקנים.
- source_word: יָחֳרַם
  chosen: shall be devoted to destruction
  alternatives:
  - shall be forfeited
  - shall be put under the ban
  lexicon: HALOT
  rationale: Hiphil of חרם denotes placing under the ban, devoting something irrevocably,
    often to destruction. Because the object is property, the phrase likely indicates
    confiscation under ban; the more literal 'devoted to destruction' preserves the
    severity and lexical connection, with alternatives noted.
- source_word: כָּל רְכוּשׁוֹ
  chosen: all his property
  alternatives:
  - all his possessions
  - all his goods
  lexicon: HALOT
  rationale: רְכוּשׁ refers to movable property or possessions. 'Property' fits the
    legal-penal setting.
- source_word: וְהוּא יִבָּדֵל
  chosen: and he himself shall be separated
  alternatives:
  - and he shall be excluded
  - and he shall be set apart
  lexicon: HALOT
  rationale: Niphal of בדל means to be separated. In this judicial context it implies
    exclusion from the community; 'he himself' reflects the explicit pronoun and heightens
    the personal consequence.
- source_word: מִקְּהַל הַגּוֹלָה
  chosen: from the assembly of the exiles
  alternatives:
  - from the congregation of the exiles
  - from the community of the returned exiles
  lexicon: HALOT
  rationale: קהל is 'assembly' or 'congregation'; 'assembly' is clear and non-ecclesiastical
    here. הַגּוֹלָה refers to the exile community, i.e., those of the deportation/returnee
    community; 'the exiles' is the most direct rendering.
