theological_decisions:
- issue: Meaning of חרם penalty on property
  chosen_reading: Render literally as 'devoted to destruction' in the main text, while
    preserving 'forfeited' as an alternative nuance.
  alternative_readings:
  - shall be forfeited
  - shall be put under the ban
  rationale: The Hebrew verb חרם carries the technical sense of placing under ban/devotion,
    not merely generic confiscation. In this administrative context the practical
    effect may be forfeiture, but translating more literally preserves the lexical
    and theological weight of the term rather than flattening it to a modern legal
    paraphrase.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Nature of exclusion from the community
  chosen_reading: Translate יבדל as 'shall be separated' rather than interpretively
    as 'excommunicated.'
  alternative_readings:
  - shall be excluded
  - shall be excommunicated
  rationale: The text states separation from the assembly of the exiles without specifying
    later ecclesiastical categories. 'Separated' preserves the source wording and
    avoids importing doctrinal or institutional concepts the text itself does not
    make explicit.
  doctrine_reference: Translation philosophy §§1, 3
