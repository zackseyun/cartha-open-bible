id: EZR.10.4
reference: Ezra 10:4
source:
  edition: WLC
  text: ק֛וּם כִּֽי עָלֶ֥י/ךָ הַ/דָּבָ֖ר וַ/אֲנַ֣חְנוּ עִמָּ֑/ךְ חֲזַ֖ק וַ/עֲשֵֽׂה־׃פ
translation:
  text: Rise up[a], for this matter is on you, and we are with you. Be strong and do it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the matter is upon you' or 'this responsibility is yours.' The Hebrew idiom indicates that the charge for dealing with this issue rests with Ezra.
    reason: lexical_alternative
lexical_decisions:
- source_word: קוּם
  chosen: Rise up
  alternatives:
  - Arise
  - Get up
  lexicon: HALOT
  rationale: Imperative of קום calling for immediate action. 'Rise up' is natural modern English and preserves the exhortational force better than the more archaic 'Arise.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the command. 'For' fits the concise explanatory sense in English.
- source_word: עָלֶיךָ הַדָּבָר
  chosen: this matter is on you
  alternatives:
  - the matter is upon you
  - this responsibility is yours
  lexicon: HALOT
  rationale: The idiom על + person conveys responsibility or charge resting on someone. 'This matter is on you' preserves the metaphor while remaining idiomatic. 'Responsibility is yours' is interpretive and slightly less tied to the Hebrew wording.
- source_word: וַאֲנַחְנוּ עִמָּךְ
  chosen: and we are with you
  alternatives:
  - and we are beside you
  lexicon: HALOT
  rationale: Expresses solidarity and support. 'With you' is the plain and natural rendering.
- source_word: חֲזַק
  chosen: Be strong
  alternatives:
  - Take courage
  - Be resolute
  lexicon: HALOT
  rationale: Imperative of חזק in an exhortational context. 'Be strong' is the standard, direct rendering and preserves the verbal link to strength rather than shifting to a more interpretive emotional sense.
- source_word: וַעֲשֵׂה
  chosen: and do it
  alternatives:
  - and act
  - and do
  lexicon: HALOT
  rationale: Imperative of עשה following the exhortation to strength, urging concrete action. 'Do it' makes the implied object clear from context ('this matter') without over-paraphrasing; 'and act' is possible but less directly tied to the Hebrew verb.
