id: ZEC.13.5
reference: Zechariah 13:5
source:
  edition: WLC
  text: וְ/אָמַ֕ר לֹ֥א נָבִ֖יא אָנֹ֑כִי אִישׁ עֹבֵ֤ד אֲדָמָה֙ אָנֹ֔כִי כִּ֥י אָדָ֖ם הִקְנַ֥/נִי מִ/נְּעוּרָֽ/י־׃
translation:
  text: And he will say[a], ‘I am not a prophet; I am a man who works the ground, for the land has been my possession from my youth.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bought me from my youth' or 'has had me since my youth.' The Hebrew verb can denote acquiring, buying, or possessing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַר
  chosen: And he will say
  alternatives:
  - And he said
  - Then he will say
  lexicon: HALOT
  rationale: The waw + qatal in prophetic discourse commonly carries a future sense in context. The surrounding passage describes what will happen in that day, so future English best reflects the discourse flow.
- source_word: נָבִיא
  chosen: prophet
  lexicon: HALOT
  rationale: Standard rendering for נָבִיא. The speaker denies prophetic identity in the context of repudiating false prophecy.
- source_word: אִישׁ עֹבֵד אֲדָמָה
  chosen: a man who works the ground
  alternatives:
  - a tiller of the soil
  - a farmer
  - a man working the land
  lexicon: HALOT
  rationale: This preserves both אִישׁ ('man') and the participial sense of עֹבֵד with אֲדָמָה ('ground/soil'). 'Works the ground' is natural modern English while staying close to the Hebrew.
- source_word: אֲדָמָה
  chosen: ground
  alternatives:
  - soil
  - land
  lexicon: HALOT
  rationale: '''Ground'' fits the agricultural sense and echoes the earthy nuance of אֲדָמָה better than the broader ''land''.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the explanation for the denial of being a prophet. 'For' keeps the explanatory connection concise and formal enough for the context.
- source_word: אָדָם
  chosen: a man
  alternatives:
  - someone
  - a human being
  lexicon: HALOT
  rationale: The noun is singular and indefinite here. Per the project's gender-accurate policy, 'a man' is retained rather than neutralizing to 'someone,' since the Hebrew uses masculine singular wording.
- source_word: הִקְנַנִי
  chosen: acquired me
  alternatives:
  - bought me
  - possessed me
  - made me his own
  lexicon: HALOT
  rationale: The Hiphil of קנה can mean acquire, buy, or possess. 'Acquired me' is broad enough to preserve the ambiguity without over-specifying slavery or ownership, both of which are possible interpretive inferences.
- source_word: מִנְּעוּרָי
  chosen: from my youth
  alternatives:
  - since my youth
  - from my boyhood
  lexicon: HALOT
  rationale: This is the most direct and idiomatic rendering. It preserves the temporal sense without adding interpretive detail.
