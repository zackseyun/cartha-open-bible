theological_decisions:
- issue: Interpretation of the speaker's claimed occupation and status
  chosen_reading: The speaker denies being a prophet and claims ordinary agricultural identity without resolving whether this is a truthful renunciation or a deceptive self-protective claim.
  alternative_readings:
  - The speaker is a false prophet concealing his past by claiming to be a farmer
  - The speaker is a former prophet renouncing prophetic pretensions
  rationale: The immediate context concerns shame and disavowal among prophets. The verse itself does not explicitly settle whether the claim is sincere or evasive, so the translation preserves the statement without importing an interpretive verdict.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Sense of הִקְנַנִי
  chosen_reading: Rendered broadly as 'acquired me' rather than specifying 'bought me' or 'trained me.'
  alternative_readings:
  - bought me
  - made me a servant
  - trained me
  rationale: The Hebrew verb permits a range of ownership/acquisition senses, and the object plus temporal phrase leaves the exact social relationship somewhat opaque. A broad rendering avoids overstating one reconstruction while remaining faithful to the lexical core.
  doctrine_reference: Original-language primacy over translation tradition; preserve tension where ambiguity is genuine.
