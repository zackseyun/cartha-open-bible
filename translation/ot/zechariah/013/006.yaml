id: ZEC.13.6
reference: Zechariah 13:6
source:
  edition: WLC
  text: וְ/אָמַ֣ר אֵלָ֔י/ו מָ֧ה הַ/מַּכּ֛וֹת הָ/אֵ֖לֶּה בֵּ֣ין יָדֶ֑י/ךָ וְ/אָמַ֕ר אֲשֶׁ֥ר הֻכֵּ֖יתִי בֵּ֥ית מְאַהֲבָֽ/י׃ס
translation:
  text: And if one says to him[a], “What are these wounds between your hands?” he will say[c][b], “Those with which I was wounded in the house of those who love me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''between your hands,'' likely referring idiomatically to the chest or torso area (''between your arms'').'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the house of my lovers'; the Hebrew may refer to close companions, loved ones, or intimate associates.
    reason: lexical_alternative
  - marker: c
    text: Some Christian interpreters understand these wounds messianically, in connection with the suffering of the Messiah; the verse itself does not state this explicitly.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאָמַר
  chosen: And if one says
  alternatives:
  - And he will say
  - And someone will say
  lexicon: HALOT
  rationale: The Hebrew form is a qatal with prefixed conjunction in prophetic discourse, functioning here in a future-like or modal sequence. English idiom is improved by making the implied indefinite subject explicit as 'one' and supplying 'if' from the discourse context of interrogation in the surrounding verses.
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: Straightforward preposition plus 3ms suffix; the questioned person is masculine singular.
- source_word: מָה
  chosen: What are
  alternatives:
  - What mean
  - What are these
  lexicon: HALOT
  rationale: Introduces the direct question; rendered in natural modern English with the copula supplied.
- source_word: הַמַּכּוֹת
  chosen: wounds
  alternatives:
  - blows
  - marks
  - stripes
  lexicon: HALOT
  rationale: From מכה, which can denote blows or the resulting wounds. 'Wounds' best fits the visible injuries being asked about.
- source_word: הָאֵלֶּה
  chosen: these
  lexicon: HALOT
  rationale: Demonstrative retained directly.
- source_word: בֵּין יָדֶיךָ
  chosen: between your hands
  alternatives:
  - on your chest
  - between your arms
  lexicon: HALOT
  rationale: Formally, the phrase is 'between your hands.' In Hebrew idiom this likely refers to the area of the chest or torso, but the more literal rendering preserves the source wording and its ambiguity. The idiomatic alternative is preserved in a footnote.
- source_word: וְאָמַר
  chosen: he will say
  alternatives:
  - and he says
  lexicon: HALOT
  rationale: Continues the prophetic dialogue with future-like narrative force.
- source_word: אֲשֶׁר
  chosen: Those with which
  alternatives:
  - which
  - that
  lexicon: HALOT
  rationale: Used here to introduce the explanation of the wounds. 'Those with which' makes the antecedent 'wounds' explicit in English.
- source_word: הֻכֵּיתִי
  chosen: I was wounded
  alternatives:
  - I was struck
  - I was beaten
  lexicon: HALOT
  rationale: Hophal of נכה is passive/causative passive. 'I was wounded' matches the noun 'wounds' and keeps the injury result in view.
- source_word: בֵּית
  chosen: in the house of
  alternatives:
  - at the house of
  - in the household of
  lexicon: HALOT
  rationale: Construct form of 'house'; 'in the house of' is the most direct rendering, though it may imply household/company as well as location.
- source_word: מְאַהֲבָי
  chosen: those who love me
  alternatives:
  - my lovers
  - my friends
  lexicon: HALOT
  rationale: The participial form from אהב with 1cs suffix literally denotes 'my lovers' or 'those loving me.' Because 'my lovers' in contemporary English strongly suggests a sexual sense that may be too narrow here, 'those who love me' preserves the relational force without importing that implication. 'My friends' is interpretive and weaker than the Hebrew.
