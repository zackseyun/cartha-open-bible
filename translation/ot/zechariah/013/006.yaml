theological_decisions:
- issue: Whether the verse should be translated in a way that directly identifies the speaker as the Messiah and the wounds as crucifixion wounds
  chosen_reading: The translation remains text-immanent and does not make an explicit messianic identification in the main text.
  alternative_readings:
  - A christological reading connecting the wounds to Jesus' crucifixion
  - A non-messianic reading in which the speaker is a false prophet explaining cultic or disciplinary wounds
  rationale: Historic Christian interpretation often reads this verse christologically, especially in light of the surrounding context and canonical connections. However, the Hebrew wording itself presents a dialogue about visible wounds and their explanation, without explicitly naming the Messiah or crucifixion. In keeping with the translation philosophy, the main text preserves the ambiguity rather than resolving it doctrinally.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
