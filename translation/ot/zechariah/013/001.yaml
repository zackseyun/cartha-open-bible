id: ZEC.13.1
reference: Zechariah 13:1
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֗וּא יִֽהְיֶה֙ מָק֣וֹר נִפְתָּ֔ח לְ/בֵ֥ית דָּוִ֖יד וּ/לְ/יֹשְׁבֵ֣י יְרֽוּשָׁלִָ֑ם לְ/חַטַּ֖את וּ/לְ/נִדָּֽה׃
translation:
  text: On that day a fountain will be opened for the house of David and for the inhabitants of Jerusalem[c][b][a], for sin and for impurity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spring' or 'source' for 'fountain.'
    reason: lexical_alternative
  - marker: b
    text: '''Sin'' may also be understood by some as ''sin-offering,'' though the context of cleansing favors ''sin'' here.'
    reason: lexical_alternative
  - marker: c
    text: Or 'uncleanness'; the Hebrew term can refer specifically to menstrual impurity or more broadly to ritual impurity.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: On that day
  alternatives:
  - In that day
  lexicon: HALOT
  rationale: Standard temporal prophetic formula. 'On that day' is idiomatic modern English and preserves the eschatological/deictic force without archaic tone.
- source_word: יִהְיֶה
  chosen: will be
  alternatives:
  - shall be
  lexicon: HALOT
  rationale: Simple future of היה. 'Will be' is readable modern English and adequately conveys the predictive sense.
- source_word: מָקוֹר
  chosen: fountain
  alternatives:
  - spring
  - source
  lexicon: HALOT
  rationale: מָקוֹר denotes a spring/fountain/source of flowing water. 'Fountain' best fits the image of an available, cleansing water source in this context and matches the following passive participle 'opened.'
- source_word: נִפְתָּח
  chosen: opened
  alternatives:
  - opened up
  lexicon: HALOT
  rationale: Passive participle from פתח. Rendering it attributively as 'an opened fountain' preserves the Hebrew's compact predication and highlights the fountain as made accessible.
- source_word: לְבֵית דָּוִיד
  chosen: for the house of David
  alternatives:
  - to the house of David
  lexicon: HALOT
  rationale: The preposition ל here marks benefit/availability rather than mere direction. 'For' communicates that the fountain is provided for David's house.
- source_word: וּלְיֹשְׁבֵי יְרוּשָׁלִָם
  chosen: and for the inhabitants of Jerusalem
  alternatives:
  - and for those dwelling in Jerusalem
  lexicon: HALOT
  rationale: יֹשְׁבֵי is a participial substantive meaning those who dwell/live there. 'Inhabitants' is natural English and preserves the collective reference.
- source_word: לְחַטָּאת
  chosen: for sin
  alternatives:
  - for sin-offering
  - for purification from sin
  lexicon: HALOT
  rationale: חַטָּאת can denote either 'sin' or 'sin offering' depending on context. Here, paired with נִדָּה and governed by the fountain imagery, the sense is the removal/cleansing of sin rather than a sacrificial object. 'For sin' keeps the wording concise while allowing the cleansing sense to arise from context.
- source_word: וּלְנִדָּה
  chosen: and for impurity
  alternatives:
  - and for uncleanness
  - and for menstrual impurity
  lexicon: HALOT
  rationale: נִדָּה can refer specifically to menstrual impurity or more broadly to ritual uncleanness/impurity. In this prophetic cleansing context, the broader sense is preferable in the main text. 'Impurity' is accessible modern English and avoids over-specifying where the context may intentionally generalize.
