theological_decisions:
- issue: Scope of cleansing language in a prophetic context
  chosen_reading: Render the verse in terms of cleansing from sin and impurity without importing later doctrinal explanation into the main text.
  alternative_readings:
  - Interpret the fountain explicitly as atonement
  - Interpret the fountain explicitly as messianic blood/cleansing
  rationale: The verse clearly presents a divinely provided means of cleansing for David's house and Jerusalem's inhabitants, but it does not itself specify the mechanism in doctrinal terms. The translation preserves the imagery and theological openness of the Hebrew rather than resolving it with later Christian interpretation in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
