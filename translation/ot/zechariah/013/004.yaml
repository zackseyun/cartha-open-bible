id: ZEC.13.4
reference: Zechariah 13:4
source:
  edition: WLC
  text: וְ/הָיָ֣ה בַּ/יּ֣וֹם הַ/ה֗וּא יֵבֹ֧שׁוּ הַ/נְּבִיאִ֛ים אִ֥ישׁ מֵ/חֶזְיֹנ֖/וֹ
    בְּ/הִנָּֽבְאֹת֑/וֹ וְ/לֹ֧א יִלְבְּשׁ֛וּ אַדֶּ֥רֶת שֵׂעָ֖ר לְמַ֥עַן כַּחֵֽשׁ׀׃
translation:
  text: And on that day the prophets will each be ashamed of his vision when he prophesies,
    and they will not put on a hairy cloak in order to deceive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a mantle of hair'—a rough garment associated with prophetic appearance.
    reason: lexical_alternative
  - marker: b
    text: Or 'in order to lie.' The Hebrew verb can denote falsehood or deception;
      here it refers to adopting prophetic dress to mislead.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... will be
  alternatives:
  - And it will happen
  - And it shall come to pass
  lexicon: HALOT
  rationale: Introduces a future scene with standard narrative-transition force. In
    English, the idiom is naturally carried by 'And on that day ... will ...' rather
    than the more wooden 'it will happen.'
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard temporal prophetic formula. 'On that day' is idiomatic modern
    English and preserves the eschatological/prophetic marker.
- source_word: יֵבֹשׁוּ
  chosen: will ... be ashamed
  alternatives:
  - will be put to shame
  - will be embarrassed
  lexicon: HALOT
  rationale: The verb denotes shame/disgrace. 'Be ashamed' fits the context of false
    prophets being exposed and avoids overinterpreting whether the shame is internal
    or externally imposed.
- source_word: הַנְּבִיאִים
  chosen: the prophets
  alternatives:
  - the prophetic ones
  lexicon: HALOT
  rationale: Direct rendering of the noun. In context these are prophets whose claims
    are discredited, likely false prophets, but the Hebrew term itself is simply 'prophets,'
    so the translation does not add 'false' in the main text.
- source_word: אִישׁ
  chosen: each
  alternatives:
  - each man
  - every one
  lexicon: HALOT
  rationale: 'Distributive use: ''each'' captures the individualizing force in natural
    English. This avoids awkward repetition while preserving the singular distributive
    sense.'
- source_word: מֵחֶזְיֹנוֹ
  chosen: of his vision
  alternatives:
  - because of his vision
  - from his vision
  lexicon: HALOT
  rationale: With verbs of shame, the preposition can mark the occasion/object of
    shame. 'Ashamed of his vision' is the most natural English expression and fits
    the sense that each prophet is disgraced regarding the revelation he claimed.
- source_word: בְּהִנָּבְאֹתוֹ
  chosen: when he prophesies
  alternatives:
  - in his prophesying
  - as he prophesies
  lexicon: HALOT
  rationale: Temporal infinitive construct with prefixed beth. 'When he prophesies'
    is idiomatic and preserves the temporal sense.
- source_word: וְלֹא יִלְבְּשׁוּ
  chosen: and they will not put on
  alternatives:
  - and they will not wear
  - nor will they clothe themselves with
  lexicon: HALOT
  rationale: The verb means 'wear/put on.' 'Put on' works well with the following
    garment and may imply deliberate adoption of prophetic dress.
- source_word: אַדֶּרֶת שֵׂעָר
  chosen: a hairy cloak
  alternatives:
  - a mantle of hair
  - a hair garment
  lexicon: HALOT
  rationale: Refers to a distinctive rough, hairy outer garment associated with prophets
    or ascetics. 'Hairy cloak' is readable modern English while preserving the concrete
    image.
- source_word: לְמַעַן כַּחֵשׁ
  chosen: in order to deceive
  alternatives:
  - in order to lie
  - so as to deny
  lexicon: HALOT
  rationale: The infinitive from כחש can denote lying/deception. In this context of
    deceptive prophetic self-presentation, 'deceive' best captures the intended effect
    of wearing the garment.
