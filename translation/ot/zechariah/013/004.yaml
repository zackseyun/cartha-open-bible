theological_decisions:
- issue: Whether to identify these as 'false prophets' explicitly in the main text
  chosen_reading: Retain 'the prophets' without adding 'false'
  alternative_readings:
  - the false prophets
  rationale: The broader context concerns the removal of false prophecy, but the Hebrew
    noun here is simply 'the prophets.' Adding 'false' would interpret the context
    correctly yet go beyond the explicit wording of this verse. The translation preserves
    the source wording and lets context supply the judgment.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
