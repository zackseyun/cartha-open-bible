id: ZEC.11.17
reference: Zechariah 11:17
source:
  edition: WLC
  text: ה֣וֹי רֹעִ֤י הָֽ/אֱלִיל֙ עֹזְבִ֣י הַ/צֹּ֔אן חֶ֥רֶב עַל זְרוֹע֖/וֹ וְ/עַל עֵ֣ין יְמִינ֑/וֹ זְרֹע/וֹ֙ יָב֣וֹשׁ תִּיבָ֔שׁ וְ/עֵ֥ין יְמִינ֖/וֹ כָּהֹ֥ה תִכְהֶֽה־־׃ס
translation:
  text: Woe to the worthless shepherd[a], who abandons the flock! A sword is against his arm and against his right eye. His arm will completely wither, and his right eye will be utterly dimmed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the idol shepherd.' The Hebrew term can mean 'worthless' or 'idol-like/empty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: An interjection of denunciation or lament. 'Woe' best preserves the prophetic judgment tone in English.
- source_word: רֹעִי הָאֱלִיל
  chosen: the worthless shepherd
  alternatives:
  - the idol shepherd
  - the foolish shepherd
  - the empty shepherd
  lexicon: HALOT
  rationale: אֱלִיל often denotes something worthless, vain, or idol-like. In this context of denunciation against a failed leader, 'worthless shepherd' communicates the moral and functional emptiness more naturally than the more opaque 'idol shepherd,' while preserving the pejorative force.
- source_word: עֹזְבִי הַצֹּאן
  chosen: who abandons the flock
  alternatives:
  - leaving the flock
  - forsaking the flock
  lexicon: HALOT
  rationale: The participle from עזב marks the shepherd as one characterized by abandoning the flock. 'Who abandons the flock' is natural English and preserves the ongoing/defining force.
- source_word: חֶרֶב עַל זְרוֹעוֹ וְעַל עֵין יְמִינוֹ
  chosen: A sword is against his arm and against his right eye
  alternatives:
  - A sword upon his arm and upon his right eye
  - May a sword strike his arm and his right eye
  lexicon: HALOT
  rationale: The Hebrew is verbless, expressing a judgment declaration. 'Is against' preserves the oracular force without over-interpreting it as either a mere description or an explicit optative curse. 'Arm' and 'right eye' are retained literally.
- source_word: זְרֹעוֹ יָבוֹשׁ תִּיבָשׁ
  chosen: His arm will completely wither
  alternatives:
  - His arm will surely dry up
  - His arm will utterly wither
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea. 'Will completely wither' conveys the emphatic certainty and severity in idiomatic English.
- source_word: וְעֵין יְמִינוֹ כָּהֹה תִכְהֶה
  chosen: and his right eye will be utterly dimmed
  alternatives:
  - and his right eye will surely grow dim
  - and his right eye will be completely blinded
  lexicon: HALOT
  rationale: The construction again uses intensification. כהה denotes dimness or loss of brightness/clarity; 'utterly dimmed' preserves the image without overstating it to total blindness, which the Hebrew does not explicitly require.
