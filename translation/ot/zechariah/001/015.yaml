id: ZEC.1.15
reference: Zechariah 1:15
source:
  edition: WLC
  text: וְ/קֶ֤צֶף גָּדוֹל֙ אֲנִ֣י קֹצֵ֔ף עַל הַ/גּוֹיִ֖ם הַ/שַּֽׁאֲנַנִּ֑ים אֲשֶׁ֤ר אֲנִי֙ קָצַ֣פְתִּי מְּעָ֔ט וְ/הֵ֖מָּה עָזְר֥וּ לְ/רָעָֽה־׃
translation:
  text: And I am exceedingly angry with the nations that are at ease[a]; for I was only a little angry[d][c][b], but they helped forward the disaster.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with great wrath' for 'exceedingly angry.'
    reason: lexical_alternative
  - marker: b
    text: Or 'complacent' for 'at ease.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I was angry for a little while'; the Hebrew may be understood as limited duration, though 'only a little angry' better fits the contrast here.
    reason: alternative_reading
  - marker: d
    text: Literally 'they helped toward evil,' that is, they intensified the calamity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/קֶצֶף גָּדוֹל
  chosen: exceedingly angry
  alternatives:
  - with great wrath
  - very angry
  - with great indignation
  lexicon: HALOT
  rationale: The noun קֶצֶף with adjective גָּדוֹל intensifies divine anger. Rendering the phrase adverbially with the following participle ('exceedingly angry') produces natural English while preserving the force of 'great wrath/anger.'
- source_word: קֹצֵף
  chosen: am ... angry
  alternatives:
  - am wrathful
  - am furious
  lexicon: HALOT
  rationale: The participle expresses a present state or ongoing disposition. 'Am angry' is idiomatic modern English and fits the immediate divine declaration.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentile nations
  - the peoples
  lexicon: HALOT
  rationale: גּוֹיִם here refers to the foreign nations surrounding/oppressing Judah, not specifically 'Gentiles' as a later Jewish-Christian contrast term. 'The nations' is the most direct and contextually appropriate rendering.
- source_word: הַשַּׁאֲנַנִּים
  chosen: that are at ease
  alternatives:
  - complacent
  - secure
  - carefree
  lexicon: HALOT
  rationale: The adjective conveys self-satisfied security and ease. 'At ease' preserves the image without overinterpreting it psychologically; 'complacent' is possible but slightly more interpretive.
- source_word: אֲשֶׁר
  chosen: for
  alternatives:
  - who
  - because
  - whereas
  lexicon: HALOT
  rationale: Although formally a relative particle ('who/which'), in context it introduces the reason for God's anger against the nations. 'For' communicates the causal force clearly in English.
- source_word: קָצַפְתִּי מְּעָט
  chosen: I was only a little angry
  alternatives:
  - I was angry a little
  - I was but slightly angry
  - I was angry for a little while
  lexicon: HALOT
  rationale: מְּעָט most naturally modifies the degree here ('a little') rather than duration, contrasting God's limited anger with the nations' excessive action. 'Only' helps bring out the contrast.
- source_word: וְהֵמָּה
  chosen: but they
  alternatives:
  - and they
  - while they
  lexicon: HALOT
  rationale: The pronoun is emphatic. In context the clause is adversative, contrasting God's limited anger with the nations' conduct. 'But they' captures that emphasis and contrast.
- source_word: עָזְרוּ לְרָעָה
  chosen: helped forward the disaster
  alternatives:
  - helped toward evil
  - furthered the harm
  - assisted in calamity
  lexicon: HALOT
  rationale: The idiom means they contributed to or intensified the harmful outcome beyond God's limited disciplinary intent. 'Helped forward the disaster' is a clear English rendering that preserves the sense of active aggravation.
