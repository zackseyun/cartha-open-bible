id: ZEC.1.8
reference: Zechariah 1:8
source:
  edition: WLC
  text: רָאִ֣יתִי הַ/לַּ֗יְלָה וְ/הִנֵּה אִישׁ֙ רֹכֵב֙ עַל ס֣וּס אָדֹ֔ם וְ/ה֣וּא עֹמֵ֔ד
    בֵּ֥ין הַ/הֲדַסִּ֖ים אֲשֶׁ֣ר בַּ/מְּצֻלָ֑ה וְ/אַחֲרָי/ו֙ סוּסִ֣ים אֲדֻמִּ֔ים שְׂרֻקִּ֖ים
    וּ/לְבָנִֽים׀־־׃
translation:
  text: I saw in the night, and behold, a man riding on a red horse! He was standing
    among the myrtle trees that were in the ravine, and behind him were red, sorrel,
    and white horses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the depths' or 'in the hollow'; the Hebrew likely refers to a low-lying
      place or depression.
    reason: lexical_alternative
  - marker: b
    text: Or 'dappled,' 'speckled,' or possibly another reddish-brown horse color.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִיתִי
  chosen: I saw
  alternatives:
  - I looked
  - I had a vision
  lexicon: HALOT
  rationale: Qal perfect 1cs of ראה straightforwardly means 'I saw.' 'Had a vision'
    would over-interpret; the visionary context is conveyed by the surrounding narrative,
    not by this verb alone.
- source_word: הַלַּיְלָה
  chosen: in the night
  alternatives:
  - at night
  - this night
  lexicon: HALOT
  rationale: With the article, the phrase is idiomatic for a specific nighttime setting.
    'In the night' preserves the Hebrew feel while remaining natural English.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention to the vision scene. 'And
    behold' preserves the suddenness and vividness better than flatter alternatives.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a figure
  lexicon: HALOT
  rationale: The noun is the ordinary masculine singular 'man.' Per gender-accurate
    policy, it should not be neutralized to 'someone' or 'figure' unless context requires
    it.
- source_word: רֹכֵב עַל סוּס
  chosen: riding on a horse
  alternatives:
  - mounted on a horse
  - riding a horse
  lexicon: HALOT
  rationale: The participle plus preposition עַל naturally describes being mounted.
    'Riding on a horse' is clear and close to the Hebrew construction.
- source_word: אָדֹם
  chosen: red
  lexicon: HALOT
  rationale: The adjective plainly denotes the color red for the horse.
- source_word: וְהוּא עֹמֵד
  chosen: He was standing
  alternatives:
  - and he stood
  - and he was stationed
  lexicon: HALOT
  rationale: The pronoun plus participle gives a descriptive scene-setting sense.
    English past progressive best captures the ongoing posture within the vision.
- source_word: בֵּין הַהֲדַסִּים
  chosen: among the myrtle trees
  alternatives:
  - between the myrtles
  lexicon: HALOT
  rationale: הֲדַסִּים refers to myrtles; in English 'myrtle trees' is clearer for
    modern readers. 'Among' is more idiomatic than the overly literal 'between' for
    a cluster of trees.
- source_word: בַּמְּצֻלָה
  chosen: in the ravine
  alternatives:
  - in the deep place
  - in the depths
  - in the hollow
  lexicon: HALOT
  rationale: The noun can denote a depth or low-lying hollow. In this landscape context,
    'ravine' gives a natural topographical sense without excessive paraphrase. Because
    the exact nuance is debated, an alternative is preserved in a footnote.
- source_word: וְאַחֲרָיו
  chosen: and behind him were
  alternatives:
  - and after him were
  - with him behind
  lexicon: HALOT
  rationale: Spatially, 'behind him' best fits the vision of horses positioned after
    the lead rider.
- source_word: סוּסִים
  chosen: horses
  lexicon: HALOT
  rationale: Straightforward plural noun.
- source_word: אֲדֻמִּים
  chosen: red
  lexicon: HALOT
  rationale: Plural adjective matching the horses; same color term as earlier.
- source_word: שְׂרֻקִּים
  chosen: sorrel
  alternatives:
  - dappled
  - speckled
  - chestnut
  lexicon: HALOT
  rationale: The color term is uncommon and debated. 'Sorrel' is a recognized horse-color
    term that avoids overcommitting to a spotted pattern, while preserving a distinct
    color category from red and white. Alternatives are worth preserving in a footnote.
- source_word: וּלְבָנִים
  chosen: and white
  lexicon: HALOT
  rationale: Simple color adjective in the plural, coordinated with the previous colors.
