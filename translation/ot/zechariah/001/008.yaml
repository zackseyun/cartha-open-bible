theological_decisions:
- issue: Identity of the 'man' on the red horse
  chosen_reading: Render generically as 'a man' without identifying him in the translation.
  alternative_readings:
  - the angel of the LORD
  - a symbolic rider
  - a preincarnate appearance of Christ
  rationale: The verse itself introduces the figure simply as 'a man.' Later context
    may clarify his role, but this verse should not import a theological identification
    not explicit in the Hebrew here.
  doctrine_reference: Preserve theological tension rather than resolve it.
