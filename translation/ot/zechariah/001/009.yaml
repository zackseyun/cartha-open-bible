theological_decisions:
- issue: Referent and force of אֲדֹנִי
  chosen_reading: A respectful human-style address, rendered 'my lord,' directed to the interpreting angel rather than a divine title.
  alternative_readings:
  - sir
  - my master
  rationale: The context is a dialogue between the prophet and the interpreting angel. Rendering it as 'my lord' preserves the honorific without implying that the addressed figure is YHWH. This avoids importing a stronger theological identification than the verse itself states.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Sense of בִּי in הַדֹּבֵר בִּי
  chosen_reading: 'Idiomatic relational sense: ''speaking with me.'''
  alternative_readings:
  - speaking in me
  rationale: Although the preposition is literally 'in,' the recurring Zecharian expression refers to the angel's communicative interaction with the prophet. Translating woodenly as 'in me' would suggest interior inspiration rather than dialogue and would distort the plain sense.
  doctrine_reference: Translation philosophy §§1, 6
