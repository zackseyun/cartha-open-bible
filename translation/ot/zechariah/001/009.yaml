id: ZEC.1.9
reference: Zechariah 1:9
source:
  edition: WLC
  text: וָ/אֹמַ֖ר מָה אֵ֣לֶּה אֲדֹנִ֑/י וַ/יֹּ֣אמֶר אֵלַ֗/י הַ/מַּלְאָךְ֙ הַ/דֹּבֵ֣ר בִּ֔/י אֲנִ֥י אַרְאֶ֖/ךָּ מָה הֵ֥מָּה אֵֽלֶּה־־׃
translation:
  text: Then I said[a], “What are these, my lord?” And the angel who was speaking with me said to me[b], “I will show you what these are.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sir' for 'my lord'; the Hebrew אֲדֹנִי is a respectful form of address here, not the divine name.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the angel who was speaking in me'; the Hebrew expression is idiomatic for speaking with or to the prophet in this vision context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: Then I said
  alternatives:
  - And I said
  - So I said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר advances the narrative. 'Then' captures the sequential force in natural English without overformal repetition of 'and.'
- source_word: מָה אֵלֶּה
  chosen: What are these
  alternatives:
  - What are these things
  lexicon: HALOT
  rationale: Interrogative מָה with demonstrative אֵלֶּה asks for identification. English idiom naturally supplies 'are.' 'Things' is unnecessary because the demonstrative already functions substantivally.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - sir
  - my master
  lexicon: HALOT
  rationale: Here אֲדֹנִי is a respectful address to the interpreting figure, not the divine name. 'My lord' preserves the elevated tone and the lexical link to אדון better than the flatter 'sir.' 'My master' is possible but sounds less idiomatic in this dialog.
- source_word: הַמַּלְאָךְ
  chosen: the angel
  alternatives:
  - the messenger
  lexicon: HALOT
  rationale: מלאך can mean 'messenger' or 'angel.' In this visionary context, the being functions as a heavenly interpreter, so 'angel' best fits the scene and standard biblical usage.
- source_word: הַדֹּבֵר בִּי
  chosen: who was speaking with me
  alternatives:
  - who spoke with me
  - who was speaking in me
  lexicon: HALOT
  rationale: The participle דֹּבֵר with בִּי is an idiom in Zechariah for the interpreting angel in communication with the prophet. In English, 'speaking with me' conveys the relational sense clearly. A hyper-literal 'in me' would be misleading here.
- source_word: אֲנִי אַרְאֶךָּ
  chosen: I will show you
  alternatives:
  - I myself will show you
  - let me show you
  lexicon: HALOT
  rationale: Hiphil of ראה means 'cause to see, show.' The explicit pronoun אֲנִי adds emphasis, but English need not mark it heavily here; the future 'I will show you' is natural and sufficient.
- source_word: מָה הֵמָּה אֵלֶּה
  chosen: what these are
  alternatives:
  - what these things are
  - what they are, these
  lexicon: HALOT
  rationale: The clause repeats the prophet's question with הֵמָּה adding explicit pronominal emphasis. English smooths this to 'what these are' while preserving the sense. More wooden renderings are possible but less readable.
