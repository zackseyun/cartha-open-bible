theological_decisions:
- issue: Referent and rhetorical force of 'the prophets'
  chosen_reading: The verse states that both the ancestors and the prophets are mortal;
    it does not imply the prophets' message failed or expired.
  alternative_readings:
  - The question could be taken merely as a contrast between dead ancestors and once-living
    prophets without explicit emphasis on prophetic word's endurance until the next
    verse.
  rationale: The Hebrew asks whether the prophets live forever, underscoring human
    mortality. The broader context (v. 6) contrasts mortal messengers with the enduring
    divine words, but this verse itself should not import more than that rhetorical
    setup.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
