id: ZEC.1.5
reference: Zechariah 1:5
source:
  edition: WLC
  text: אֲבֽוֹתֵי/כֶ֖ם אַיֵּה הֵ֑ם וְ/הַ֨/נְּבִאִ֔ים הַ/לְ/עוֹלָ֖ם יִֽחְיֽוּ־׃
translation:
  text: Your fathers—where are they? And the prophets, do they live forever?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your ancestors.' The Hebrew is literally 'your fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲבֹתֵיכֶם
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: Literal plural construct with 2mp suffix, referring to the preceding
    generations of the audience. 'Fathers' preserves the Hebrew wording and rhetorical
    force; 'ancestors' is possible but less direct. Gender-accurate policy supports
    retaining the masculine familial term where intended.
- source_word: אַיֵּה
  chosen: where
  alternatives:
  - where are
  lexicon: HALOT
  rationale: Interrogative adverb meaning 'where?'; in English the copula is supplied
    by context.
- source_word: הֵם
  chosen: they
  lexicon: HALOT
  rationale: 'Independent 3mp pronoun used for emphasis after the interrogative: ''where
    are they?'' Retained explicitly in English for the rhetorical question.'
- source_word: וְהַנְּבִאִים
  chosen: And the prophets
  alternatives:
  - As for the prophets
  lexicon: HALOT
  rationale: Simple conjunction plus definite noun. 'And the prophets' best preserves
    the parallel structure with the first clause.
- source_word: הַלְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  lexicon: HALOT
  rationale: 'Idiomatic interrogative use with the article and preposition: ''do they
    live forever?'' ''Forever'' is natural modern English and preserves the sense
    of enduring perpetually.'
- source_word: יִחְיוּ
  chosen: do they live
  alternatives:
  - will they live
  - are they living
  lexicon: HALOT
  rationale: 'Qal imperfect 3mp of ''live.'' In this rhetorical question, English
    present ''do they live'' best conveys the gnomic/general force: whether prophets
    continue living indefinitely. Future is possible but less idiomatic in context.'
