theological_decisions:
- issue: Rendering the divine reversal expressed by שוב + זמם in context of prior
    judgment and present blessing
  chosen_reading: So now I have returned and purposed ... to do good
  alternative_readings:
  - So I have turned and planned ... for good
  - Thus I have again determined ... to do good
  rationale: The verse contrasts God's former purpose to bring disaster (v. 14) with
    his present purpose to bless. The translation preserves that covenantal reversal
    without importing stronger theological categories not explicit in the Hebrew.
    'Returned' keeps the metaphor of turning, while 'purposed' expresses intentionality.
  doctrine_reference: Translation philosophy §§1, 3, 5
