id: ZEC.8.15
reference: Zechariah 8:15
source:
  edition: WLC
  text: כֵּ֣ן שַׁ֤בְתִּי זָמַ֨מְתִּי֙ בַּ/יָּמִ֣ים הָ/אֵ֔לֶּה לְ/הֵיטִ֥יב אֶת יְרוּשָׁלִַ֖ם
    וְ/אֶת בֵּ֣ית יְהוּדָ֑ה אַל תִּירָֽאוּ־־־׃
translation:
  text: So I have returned and purposed in these days to do good to Jerusalem and
    to the house of Judah. Do not fear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Thus I have turned again and planned in these days to do good to Jerusalem
      and to the house of Judah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  chosen: So now
  alternatives:
  - Thus
  - So
  lexicon: HALOT
  rationale: Introduces an inference/transition from the preceding contrast (v. 14).
    'So now' brings out the resumptive force in natural English while keeping the
    connective sense.
- source_word: שַׁבְתִּי
  chosen: I have returned
  alternatives:
  - I have turned
  - I turned again
  lexicon: HALOT
  rationale: From שוב, here idiomatically expressing a reversal of prior intention/action.
    'I have returned' preserves the verbal imagery and fits the perfect as a present
    state resulting from completed action. 'Turned again' is possible but less natural
    in English here.
- source_word: זָמַמְתִּי
  chosen: purposed
  alternatives:
  - planned
  - determined
  - devised
  lexicon: HALOT
  rationale: The verb denotes forming an intention or plan. 'Purposed' preserves deliberateness
    without the potentially colder or more negative English nuance of 'devised,' and
    is slightly weightier than 'planned' in this divine speech context.
- source_word: בַּיָּמִים הָאֵלֶּה
  chosen: in these days
  alternatives:
  - at this time
  - in these days now
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'In these days' keeps the Hebrew wording
    and its prophetic-historical flavor better than the more interpretive 'at this
    time.'
- source_word: לְהֵיטִיב
  chosen: to do good
  alternatives:
  - to do well for
  - to prosper
  - to treat favorably
  lexicon: HALOT
  rationale: The Hiphil of יטב here means to act beneficially toward. 'To do good'
    is clear, idiomatic, and broad enough to include covenant blessing without over-specifying
    material prosperity.
- source_word: יְרוּשָׁלַם
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
- source_word: בֵּית יְהוּדָה
  chosen: the house of Judah
  alternatives:
  - Judah
  - the household of Judah
  lexicon: HALOT
  rationale: Retains the covenantal/corporate expression בית + tribal name. 'House
    of Judah' is more formally transparent than simply 'Judah' and avoids narrowing
    to a domestic household.
- source_word: אַל תִּירָאוּ
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  - Do not fear it
  lexicon: HALOT
  rationale: A direct negative imperative/plural. 'Do not fear' is concise and preserves
    the elevated prophetic tone; the plural addressees are implicit in English.
