id: ZEC.8.5
reference: Zechariah 8:5
source:
  edition: WLC
  text: וּ/רְחֹב֤וֹת הָ/עִיר֙ יִמָּ֣לְא֔וּ יְלָדִ֖ים וִֽ/ילָד֑וֹת מְשַׂחֲקִ֖ים בִּ/רְחֹֽבֹתֶֽי/הָ׃ס
translation:
  text: And the streets of the city will be filled with boys and girls playing in
    its streets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the open squares of the city ... playing in its squares.' The Hebrew
      term can refer to broad streets or public squares.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/רְחֹבוֹת
  chosen: And the streets
  alternatives:
  - And the open squares
  - And the plazas
  lexicon: HALOT
  rationale: רְחֹבוֹת denotes broad public spaces/streets within a city. 'Streets'
    is natural modern English and fits the parallel with the final phrase, while 'open
    squares' is a viable more formal alternative.
- source_word: הָ/עִיר
  chosen: of the city
  alternatives:
  - of the town
  lexicon: HALOT
  rationale: עִיר is the standard term for 'city.' 'Town' is possible in some contexts,
    but 'city' is the straightforward rendering here.
- source_word: יִמָּלְאוּ
  chosen: will be filled
  alternatives:
  - will be full
  lexicon: HALOT
  rationale: Nifal imperfect of מלא expresses a future/passive sense. 'Will be filled'
    preserves the verbal force better than the stative-sounding 'will be full.'
- source_word: יְלָדִים
  chosen: boys
  alternatives:
  - children
  - young boys
  lexicon: HALOT
  rationale: In contrast with יְלָדוֹת ('girls'), the masculine plural here is best
    rendered specifically as 'boys,' not the generic 'children.' This preserves the
    gendered pairing in the Hebrew.
- source_word: וִֽ/ילָדוֹת
  chosen: and girls
  alternatives:
  - and young girls
  lexicon: HALOT
  rationale: The feminine plural pairs naturally with יְלָדִים. 'Girls' is the clearest
    and most idiomatic English equivalent.
- source_word: מְשַׂחֲקִים
  chosen: playing
  alternatives:
  - laughing
  - sporting
  - at play
  lexicon: HALOT
  rationale: The participle from שׂחק here describes the children's activity in the
    restored city. 'Playing' best captures the ordinary, joyful sense in context.
- source_word: בִּ/רְחֹבֹתֶי/הָ
  chosen: in its streets
  alternatives:
  - in its squares
  - in her streets
  lexicon: HALOT
  rationale: The prepositional phrase repeats רְחֹבוֹת with a 3fs suffix referring
    back to the city. 'Its streets' is idiomatic English for a city; 'her streets'
    is possible but less natural in contemporary English. Repeating 'streets' preserves
    the Hebrew emphasis, even if slightly redundant in English.
