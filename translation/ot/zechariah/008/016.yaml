theological_decisions:
- issue: Gendered representative singular in ethical instruction
  chosen_reading: each man to his neighbor
  alternative_readings:
  - each one to his neighbor
  rationale: The Hebrew uses אִישׁ, a grammatically masculine singular with representative
    force. Per doctrine, gender-accurate rendering is preferred over flattening to
    a neutral form, while the representative sense can be noted if needed.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Meaning of שָׁלוֹם in judicial phrase
  chosen_reading: a judgment of peace
  alternative_readings:
  - peaceable judgment
  - judgment that makes for peace
  rationale: The text calls for judgments characterized by truth and peace, not merely
    procedural correctness. The chosen rendering preserves the theological-ethical
    linkage between justice and communal peace without importing a later doctrinal
    framework.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
