id: ZEC.8.16
reference: Zechariah 8:16
source:
  edition: WLC
  text: אֵ֥לֶּה הַ/דְּבָרִ֖ים אֲשֶׁ֣ר תַּֽעֲשׂ֑וּ דַּבְּר֤וּ אֱמֶת֙ אִ֣ישׁ אֶת רֵעֵ֔/הוּ
    אֱמֶת֙ וּ/מִשְׁפַּ֣ט שָׁל֔וֹם שִׁפְט֖וּ בְּ/שַׁעֲרֵי/כֶֽם־׃
translation:
  text: 'These are the things that you must do: speak truth to one another; judge
    with truth and a judgment of peace in your gates.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'speak the truth, each one to his neighbor.' The Hebrew has 'each man,'
      using a representative singular.
    reason: lexical_alternative
  - marker: b
    text: '''In your gates'' refers to the city gates, the customary place where legal
      cases were heard and judgments were rendered.'
    reason: cultural_note
  - marker: c
    text: Or 'judge true and peaceable judgment in your gates.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֵלֶּה הַדְּבָרִים
  chosen: These are the things
  alternatives:
  - These are the words
  - These are the matters
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words,' 'things,' or 'matters.' In this context introducing
    practical ethical commands, 'things' best captures the sense of required actions
    rather than merely spoken words.
- source_word: אֲשֶׁר תַּעֲשׂוּ
  chosen: that you must do
  alternatives:
  - that you shall do
  - that you are to do
  lexicon: HALOT
  rationale: The imperfect here functions instructionally in context. 'Must do' conveys
    obligation in natural English without overstating beyond the imperative force
    of the surrounding commands.
- source_word: דַּבְּרוּ אֱמֶת
  chosen: speak truth
  alternatives:
  - speak the truth
  - speak honestly
  lexicon: HALOT
  rationale: The imperative plus אֱמֶת is concise and forceful. 'Speak truth' preserves
    the Hebrew terseness and ethical emphasis; 'speak the truth' is possible but slightly
    more idiomatic than the source requires.
- source_word: אִישׁ אֶת־רֵעֵהוּ
  chosen: each man to his neighbor
  alternatives:
  - each one to his neighbor
  - a man to his companion
  lexicon: HALOT
  rationale: In line with the gender-accurate policy, אִישׁ is rendered 'man' where
    the Hebrew uses the masculine representative singular. 'Neighbor' fits רֵעַ well
    in an ethical context of community relations.
- source_word: אֱמֶת וּמִשְׁפַּט שָׁלוֹם
  chosen: with truth and a judgment of peace
  alternatives:
  - true and peaceable judgment
  - truth and peace judgment
  - justice of peace
  lexicon: HALOT
  rationale: The phrase stacks nouns compactly. Rendering מִשְׁפַּט as 'judgment'
    fits the judicial setting, while שָׁלוֹם here denotes peace-producing or peace-preserving
    outcome. 'A judgment of peace' preserves the construct-like force without over-paraphrasing.
- source_word: שִׁפְטוּ
  chosen: judge
  alternatives:
  - render judgment
  - decide
  lexicon: HALOT
  rationale: A direct imperative is best preserved. 'Judge' is simple and matches
    the legal context.
- source_word: בְּשַׁעֲרֵיכֶם
  chosen: in your gates
  alternatives:
  - within your gates
  - at your city gates
  lexicon: HALOT
  rationale: The gate was the place of public judgment in ancient Israelite towns.
    'In your gates' keeps the Hebrew image; the cultural sense can be clarified in
    a footnote rather than expanded in the main text.
