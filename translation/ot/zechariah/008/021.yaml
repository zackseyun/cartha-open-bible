theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Following the project's stated
    default, it is rendered 'the LORD' rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering צְבָאוֹת in the divine title
  chosen_reading: the LORD of hosts
  alternative_readings:
  - the LORD Almighty
  - the LORD of armies
  rationale: No doctrinal dispute is at stake, but the title carries theological weight.
    'Hosts' preserves the traditional breadth of heavenly and earthly forces under
    God's command without interpretive narrowing.
