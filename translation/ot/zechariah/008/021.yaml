id: ZEC.8.21
reference: Zechariah 8:21
source:
  edition: WLC
  text: וְֽ/הָלְכ֡וּ יֹשְׁבֵי֩ אַחַ֨ת אֶל אַחַ֜ת לֵ/אמֹ֗ר נֵלְכָ֤ה הָלוֹךְ֙ לְ/חַלּוֹת֙
    אֶת פְּנֵ֣י יְהוָ֔ה וּ/לְ/בַקֵּ֖שׁ אֶת יְהוָ֣ה צְבָא֑וֹת אֵלְכָ֖ה גַּם אָֽנִי־־־־׃
translation:
  text: And the inhabitants of one city will go to another, saying, ‘Let us surely
    go to entreat the favor of the LORD and to seek the LORD of hosts.’ ‘I myself
    am going too.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Let us go at once' or 'Come, let us go'; the Hebrew uses an emphatic
      construction ('let us go, going') to intensify the invitation.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'to entreat the face of the LORD,' an idiom meaning to seek his
      favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָלְכוּ
  chosen: will go
  alternatives:
  - shall go
  - will walk
  lexicon: HALOT
  rationale: Qal perfect with vav in prophetic discourse functions futurally. 'Go'
    fits the context of travel between cities better than the more literal 'walk.'
- source_word: יֹשְׁבֵי אַחַת אֶל אַחַת
  chosen: the inhabitants of one city ... to another
  alternatives:
  - those dwelling in one city ... to another
  - the residents of one ... to another
  lexicon: HALOT
  rationale: יֹשְׁבֵי means 'inhabitants/dwellers.' The paired feminine numerals with
    אֶל imply one city to another city; 'city' is supplied naturally in English from
    the idiom.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and saying
  lexicon: HALOT
  rationale: Standard infinitive construct introducing direct speech.
- source_word: נֵלְכָה הָלוֹךְ
  chosen: Let us surely go
  alternatives:
  - Let us go at once
  - Come, let us go
  lexicon: HALOT
  rationale: The cohortative plus infinitive absolute intensifies the exhortation.
    'Surely go' preserves the emphatic force without over-paraphrasing.
- source_word: לְחַלּוֹת אֶת־פְּנֵי יְהוָה
  chosen: to entreat the favor of the LORD
  alternatives:
  - to seek the favor of the LORD
  - to appease the face of the LORD
  - to entreat the LORD
  lexicon: HALOT
  rationale: This idiom literally involves softening or appeasing the face/presence
    of YHWH and commonly means to entreat favor. Rendering the idiom as 'entreat the
    favor of' communicates the sense clearly while preserving the relational nuance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: וּלְבַקֵּשׁ אֶת־יְהוָה צְבָאוֹת
  chosen: and to seek the LORD of hosts
  alternatives:
  - and to seek the LORD Almighty
  - and to seek the LORD of armies
  lexicon: HALOT
  rationale: בקשׁ means 'seek.' צְבָאוֹת is retained as 'hosts' to preserve the established
    title's breadth, including heavenly armies, rather than narrowing it to 'armies'
    alone.
- source_word: אֵלְכָה גַּם־אָֽנִי
  chosen: I myself am going too
  alternatives:
  - I also will go
  - I too will go
  lexicon: HALOT
  rationale: The first person singular imperfect/cohortative-like form expresses personal
    resolve in response to the invitation. 'I myself ... too' preserves the emphatic
    גם אני.
