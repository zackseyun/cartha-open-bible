id: ZEC.8.4
reference: Zechariah 8:4
source:
  edition: WLC
  text: כֹּ֤ה אָמַר֙ יְהוָ֣ה צְבָא֔וֹת עֹ֤ד יֵֽשְׁבוּ֙ זְקֵנִ֣ים וּ/זְקֵנ֔וֹת בִּ/רְחֹב֖וֹת
    יְרוּשָׁלִָ֑ם וְ/אִ֧ישׁ מִשְׁעַנְתּ֛/וֹ בְּ/יָד֖/וֹ מֵ/רֹ֥ב יָמִֽים׃
translation:
  text: 'Thus says the LORD of hosts: Old men and old women will yet sit in the streets
    of Jerusalem, each with his staff in his hand because of great age.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in the squares".
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'Thus says' preserves the formal
    prophetic tone without unnecessary archaism.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'hosts' is the established and semantically
    broad rendering, encompassing heavenly armies and sovereign power.
- source_word: עֹד
  chosen: yet
  alternatives:
  - again
  - still
  lexicon: HALOT
  rationale: Here עֹד marks future restoration and renewed normalcy; 'yet' fits the
    promise that this condition will once more be seen.
- source_word: יֵשְׁבוּ
  chosen: will ... sit
  alternatives:
  - will dwell
  - will remain seated
  lexicon: HALOT
  rationale: The verb ישב commonly means 'sit' or 'dwell'; in this scene of elderly
    people occupying public spaces, the concrete image 'sit' best matches the context.
- source_word: זְקֵנִים וּזְקֵנוֹת
  chosen: Old men and old women
  alternatives:
  - elderly men and elderly women
  - elders, men and women
  lexicon: HALOT
  rationale: The paired masculine and feminine forms explicitly denote aged males
    and females, not civic 'elders' as an office. 'Old men and old women' is direct
    and faithful.
- source_word: בִּרְחֹבוֹת
  chosen: in the streets
  alternatives:
  - in the squares
  - in the open places
  lexicon: HALOT
  rationale: רחובות can denote broad public places or squares, but 'streets' is natural
    English and fits the urban restoration image. An alternative is worth preserving
    in a footnote because 'squares' is also plausible.
- source_word: וְאִישׁ
  chosen: each
  alternatives:
  - and each man
  - and a man
  lexicon: HALOT
  rationale: Although איש is formally singular masculine ('man'), in distributive
    construction it means 'each one.' Rendering 'each' preserves the distributive
    sense while avoiding awkward English repetition after 'old men and old women.'
- source_word: מִשְׁעַנְתּוֹ
  chosen: his staff
  alternatives:
  - his walking stick
  - his support
  lexicon: HALOT
  rationale: The noun denotes a staff or support. 'Staff' is concise and preserves
    the concrete image; 'walking stick' is interpretive but possible.
- source_word: בְּיָדוֹ
  chosen: in his hand
  alternatives:
  - in hand
  lexicon: HALOT
  rationale: A straightforward locative phrase; retaining 'his hand' preserves the
    vividness of the Hebrew.
- source_word: מֵרֹב יָמִים
  chosen: because of great age
  alternatives:
  - because of the abundance of days
  - from fullness of days
  lexicon: HALOT
  rationale: Literally 'from abundance of days,' an idiom for advanced age. 'Because
    of great age' communicates the sense clearly in modern English while preserving
    the causal force of מִן.
