theological_decisions:
- issue: Semantic range of שָׁלוֹם in an agricultural blessing context
  chosen_reading: Rendered in the main text as 'peace' within the phrase 'seed of
    peace,' preserving both peace and prosperity overtones.
  alternative_readings:
  - '''prosperity'' as the primary sense'
  - '''peaceful sowing'' as an idiomatic paraphrase'
  rationale: The verse promises covenant restoration through agricultural abundance.
    Because שָׁלוֹם includes well-being/prosperity, some translations paraphrase more
    explicitly. However, the Hebrew wording is metaphorical and compact; preserving
    'peace' keeps the theological breadth and avoids reducing the term to economics
    alone.
  doctrine_reference: Translation philosophy §3, §5
- issue: Inheritance language in וְהִנְחַלְתִּי
  chosen_reading: Kept explicit inheritance wording rather than reducing to simple
    possession.
  alternative_readings:
  - '''I will give the remnant ... all these things'''
  - '''I will let the remnant ... possess all these things'''
  rationale: The causative inheritance verb evokes covenantal gift and possession
    themes. Retaining 'inherit' preserves that theological resonance while remaining
    intelligible.
  doctrine_reference: Translation philosophy §1, §5
