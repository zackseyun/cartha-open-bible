id: ZEC.8.12
reference: Zechariah 8:12
source:
  edition: WLC
  text: כִּֽי זֶ֣רַע הַ/שָּׁל֗וֹם הַ/גֶּ֜פֶן תִּתֵּ֤ן פִּרְיָ/הּ֙ וְ/הָ/אָ֨רֶץ֙ תִּתֵּ֣ן
    אֶת יְבוּלָ֔/הּ וְ/הַ/שָּׁמַ֖יִם יִתְּנ֣וּ טַלָּ֑/ם וְ/הִנְחַלְתִּ֗י אֶת שְׁאֵרִ֛ית
    הָ/עָ֥ם הַ/זֶּ֖ה אֶת כָּל אֵֽלֶּה־־־־־׃
translation:
  text: 'For there will be the seed of peace: the vine will give its fruit, the land
    will give its produce, and the heavens will give their dew; and I will cause the
    remnant of this people to inherit all these things.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there will be prosperous seed,' 'the sowing will be peaceful,' or 'the
      seed of well-being.' The Hebrew phrase is compact and may summarize the whole
      scene of restored agricultural blessing.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶרַע הַשָּׁלוֹם
  chosen: seed of peace
  alternatives:
  - prosperous seed
  - a crop of peace
  - the sowing will be peaceful
  lexicon: HALOT
  rationale: The Hebrew phrase is compressed and somewhat idiomatic. זֶרַע can mean
    'seed,' 'sowing,' or 'offspring,' and שָׁלוֹם carries the broad sense of peace,
    well-being, wholeness, and prosperity. Given the immediate agricultural context
    (vine, land, heavens, dew), an agrarian sense is primary. 'Seed of peace' preserves
    the metaphor and theological richness without over-paraphrasing into mere 'prosperity.'
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding promise. 'For'
    best preserves the explanatory force in context.
- source_word: הַגֶּפֶן תִּתֵּן פִּרְיָהּ
  chosen: the vine will give its fruit
  alternatives:
  - the vine will yield its fruit
  lexicon: HALOT
  rationale: A straightforward agricultural promise. 'Give its fruit' closely follows
    נתן while remaining natural English.
- source_word: יְבוּל
  chosen: produce
  alternatives:
  - yield
  - harvest
  lexicon: HALOT
  rationale: Refers to what the land brings forth. 'Produce' is natural modern English
    and broad enough to cover agricultural yield without narrowing to a single crop
    or to the act of harvesting.
- source_word: הַשָּׁמַיִם יִתְּנוּ טַלָּם
  chosen: the heavens will give their dew
  alternatives:
  - the sky will give its dew
  - the heavens will send dew
  lexicon: HALOT
  rationale: Retains the plural 'heavens' of the Hebrew and the concrete imagery of
    covenant blessing. 'Give their dew' mirrors the repeated נתן pattern in the verse.
- source_word: וְהִנְחַלְתִּי
  chosen: I will cause ... to inherit
  alternatives:
  - I will give ... possession of
  - I will make ... possess
  lexicon: HALOT
  rationale: 'The Hiphil of נחל commonly has a causative sense: to cause someone to
    inherit or possess. ''Cause ... to inherit'' preserves both the causative force
    and the covenantal inheritance nuance.'
- source_word: שְׁאֵרִית הָעָם הַזֶּה
  chosen: the remnant of this people
  alternatives:
  - the remainder of this people
  - the survivors of this people
  lexicon: HALOT
  rationale: '''Remnant'' is the established and contextually appropriate prophetic
    term, carrying both literal and theological significance in Zechariah without
    importing more than the Hebrew itself conveys.'
- source_word: אֶת כָּל אֵלֶּה
  chosen: all these things
  alternatives:
  - all these
  - all this
  lexicon: HALOT
  rationale: English idiom prefers 'all these things' to make the object explicit,
    referring to the listed blessings of fruitfulness and provision.
