id: ZEC.8.18
reference: Zechariah 8:18
source:
  edition: WLC
  text: וַ/יְהִ֛י דְּבַר יְהוָ֥ה צְבָא֖וֹת אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: 'And the word of the LORD of hosts came to me, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh of hosts.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - Then ... came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions here as a standard narrative/sequential
    introduction. In English, rendering the existential idiom woodenly ('and it happened')
    is unnecessary; the sense is carried naturally by attaching the verb to 'the word
    ... came.'
- source_word: דְּבַר
  chosen: the word
  alternatives:
  - a word
  - the message
  lexicon: HALOT
  rationale: In prophetic formulae, דְּבַר יְהוָה conventionally denotes a specific
    divine communication. 'The word' preserves the formal prophetic idiom better than
    the more interpretive 'message.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD,'
    following established reverential convention and the pattern reflected in the
    Septuagint tradition.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  - Almighty
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'of hosts' is the most transparent and
    established rendering, preserving the imagery of heavenly armies/hosts without
    collapsing it into the interpretive title 'Almighty.'
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Simple prepositional phrase indicating the recipient of the prophetic
    word; 'to me' is clear modern English.
- source_word: לֵאמֹר
  chosen: 'saying:'
  alternatives:
  - thus saying
  - to say
  lexicon: HALOT
  rationale: Standard introductory infinitive in speech formulas. 'Saying:' is idiomatic
    and signals that the content follows in the next verse.
