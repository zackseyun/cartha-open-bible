id: ZEC.8.13
reference: Zechariah 8:13
source:
  edition: WLC
  text: וְ/הָיָ֡ה כַּ/אֲשֶׁר֩ הֱיִיתֶ֨ם קְלָלָ֜ה בַּ/גּוֹיִ֗ם בֵּ֤ית יְהוּדָה֙ וּ/בֵ֣ית
    יִשְׂרָאֵ֔ל כֵּ֚ן אוֹשִׁ֣יעַ אֶתְ/כֶ֔ם וִ/הְיִיתֶ֖ם בְּרָכָ֑ה אַל תִּירָ֖אוּ תֶּחֱזַ֥קְנָה
    יְדֵי/כֶֽם־׃ס
translation:
  text: And it shall happen that just as you were a curse among the nations, O house
    of Judah and house of Israel, so I will save you, and you shall be a blessing.
    Do not fear; let your hands be strong.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an object of cursing'—that is, a people whose name was used in curse
      formulas among the nations.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will deliver you.' The Hebrew verb can denote rescue or salvation
      in a broad sense.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'let your hands be strong,' a Hebrew idiom for courage and resolute
      action.
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall happen
  alternatives:
  - And it will be
  - And it shall come to pass
  lexicon: HALOT
  rationale: Introduces a future state/result formula. 'And it shall happen' preserves
    the prophetic forward-looking sense without archaic heaviness; 'come to pass'
    is more traditional but less natural in modern English.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Marks close comparison between former condition and coming reversal.
    'Just as' clearly signals the correspondence.
- source_word: הֱיִיתֶם
  chosen: you were
  alternatives:
  - you became
  lexicon: HALOT
  rationale: Qal perfect of היה here denotes prior state rather than ingressive nuance.
- source_word: קְלָלָה
  chosen: a curse
  alternatives:
  - an object of cursing
  - a curse formula
  lexicon: HALOT
  rationale: The noun denotes being regarded as a curse or invoked in curses. 'A curse'
    is the most direct and idiomatic rendering; the fuller nuance is preserved by
    context and could be paraphrased only at the cost of overtranslation.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - in the nations
  lexicon: HALOT
  rationale: גוים in prophetic literature commonly means the surrounding peoples/nations.
    'Among the nations' is contextually apt and avoids importing NT-era Jew/Gentile
    framing.
- source_word: בֵּית יְהוּדָה וּבֵית יִשְׂרָאֵל
  chosen: O house of Judah and house of Israel
  alternatives:
  - house of Judah and house of Israel
  - Judah and Israel
  lexicon: HALOT
  rationale: Retains the covenantal/corporate designation 'house of'. The vocative
    force is brought out with 'O' because the phrase addresses the people directly
    within the sentence.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: Balances 'just as' and introduces the corresponding future reversal.
- source_word: אוֹשִׁיעַ
  chosen: I will save you
  alternatives:
  - I will deliver you
  - I will bring you salvation
  lexicon: HALOT
  rationale: Hiphil of ישׁע means to save/deliver. 'Save' is the default, broad enough
    to include restoration from distress without narrowing to merely military or political
    rescue.
- source_word: וִהְיִיתֶם בְּרָכָה
  chosen: and you shall be a blessing
  alternatives:
  - and you shall become a blessing
  - and you shall be for a blessing
  lexicon: HALOT
  rationale: Echoes common biblical idiom in which a people become a source or embodiment
    of blessing. 'Be a blessing' is idiomatic English and preserves the covenantal
    resonance.
- source_word: אַל תִּירָאוּ
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: A standard prohibition. 'Do not fear' is concise and preserves the biblical
    register naturally.
- source_word: תֶּחֱזַקְנָה יְדֵיכֶם
  chosen: let your hands be strong
  alternatives:
  - let your hands be strengthened
  - be strong-handed
  - take courage
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of hands being strong, conveying courage
    and resolve for action. The more literal rendering is retained in the main text
    because it is intelligible in English and preserves the imagery; more interpretive
    alternatives would flatten the metaphor.
