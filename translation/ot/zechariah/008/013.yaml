theological_decisions:
- issue: Scope of divine salvation in אוֹשִׁיעַ
  chosen_reading: I will save you
  alternative_readings:
  - I will deliver you
  rationale: The verse speaks of covenant restoration for Judah and Israel after being
    a curse among the nations. 'Save' preserves the broader theological and covenantal
    resonance of ישׁע without restricting the action to political deliverance alone,
    while not importing later soteriological specifics absent from the context.
  doctrine_reference: Translation philosophy §1, §3
- issue: Corporate identity of Judah and Israel
  chosen_reading: O house of Judah and house of Israel
  alternative_readings:
  - Judah and Israel
  rationale: Retaining 'house of' preserves the corporate covenantal identity of the
    addressed people and avoids reducing the phrase to mere geographic shorthand.
  doctrine_reference: Translation philosophy §1, §5
