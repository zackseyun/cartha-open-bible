id: ZEC.8.10
reference: Zechariah 8:10
source:
  edition: WLC
  text: כִּ֗י לִ/פְנֵי֙ הַ/יָּמִ֣ים הָ/הֵ֔ם שְׂכַ֤ר הָֽ/אָדָם֙ לֹ֣א נִֽהְיָ֔ה וּ/שְׂכַ֥ר
    הַ/בְּהֵמָ֖ה אֵינֶ֑/נָּה וְ/לַ/יּוֹצֵ֨א וְ/לַ/בָּ֤א אֵין שָׁלוֹם֙ מִן הַ/צָּ֔ר
    וַ/אֲשַׁלַּ֥ח אֶת כָּל הָ/אָדָ֖ם אִ֥ישׁ בְּ/רֵעֵֽ/הוּ־־־־׃
translation:
  text: For before those days there was no wage for man, and no wage for beast; and
    for the one going out and the one coming in there was no peace because of the
    adversary, and I set every man against his neighbor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there was no safety/well-being'; Hebrew shalom can include peace, safety,
      and welfare.
    reason: lexical_alternative
  - marker: b
    text: Or 'because of the enemy' or 'from the foe'; the Hebrew term can denote
      an adversary in a hostile sense.
    reason: lexical_alternative
  - marker: c
    text: Literally 'I sent every man, each against his neighbor'; the sense is that
      God gave them over to mutual hostility.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation for the contrast in the surrounding context.
    'For' fits the discourse flow in English while preserving the causal/explanatory
    force.
- source_word: לִפְנֵי הַיָּמִים הָהֵם
  chosen: before those days
  alternatives:
  - before those times
  lexicon: HALOT
  rationale: A straightforward temporal expression. 'Days' is retained rather than
    generalized to 'times' to stay closer to the Hebrew while remaining idiomatic.
- source_word: שְׂכַר הָאָדָם
  chosen: wage for man
  alternatives:
  - pay for man
  - wages for a man
  - wage for humankind
  lexicon: HALOT
  rationale: שׂכר denotes wages/pay. Singular 'wage' works idiomatically as a collective.
    הָאָדָם here refers to human labor in contrast with beast, so 'man' preserves
    the gender-accurate representative sense per doctrine, rather than flattening
    to an abstract term.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - people
  lexicon: HALOT
  rationale: In this labor contrast ('man' / 'beast') the noun is representative of
    human beings generally. The doctrine excerpt specifies 'man / humankind' contextually;
    'man' best preserves the Hebrew contrast and generic force.
- source_word: לֹא נִהְיָה
  chosen: there was no
  alternatives:
  - did not exist
  - did not come to be
  lexicon: HALOT
  rationale: 'An existential rendering is the most natural English equivalent here:
    wages were not to be had / did not exist.'
- source_word: וּשְׂכַר הַבְּהֵמָה אֵינֶנָּה
  chosen: and no wage for beast
  alternatives:
  - and no pay for cattle
  - and the wage of the animal was nothing
  lexicon: HALOT
  rationale: Maintains the parallel with human labor. 'Beast' is a natural singular
    collective for בהמה here and preserves the broad livestock sense without over-specifying.
- source_word: וְלַיּוֹצֵא וְלַבָּא
  chosen: for the one going out and the one coming in
  alternatives:
  - for him who goes out and comes in
  - for those going out and coming in
  lexicon: HALOT
  rationale: The Hebrew uses singular participles substantivally. This rendering preserves
    the idiom while remaining readable. It likely refers broadly to ordinary movement
    and commerce/travel.
- source_word: אֵין שָׁלוֹם
  chosen: there was no peace
  alternatives:
  - there was no safety
  - there was no well-being
  lexicon: HALOT
  rationale: שׁלום includes peace, safety, and well-being. 'Peace' is the default
    rendering and fits the context of insecurity; broader nuance is preserved in a
    footnote.
- source_word: מִן הַצָּר
  chosen: because of the adversary
  alternatives:
  - from the foe
  - because of the enemy
  - from distress
  lexicon: HALOT
  rationale: The noun can denote an adversary/enemy, and in context of unsafe movement
    this personal sense is most likely. The preposition מן is rendered causally ('because
    of') for natural English and to express the source of the lack of peace.
- source_word: וַאֲשַׁלַּח
  chosen: I set
  alternatives:
  - I sent
  - I let loose
  lexicon: HALOT
  rationale: 'Literally ''I sent,'' but with the object-complement construction (''every
    man against his neighbor'') the sense is causative: God caused social hostility.
    ''I set'' is idiomatic and faithful to the construction.'
- source_word: אֶת כָּל הָאָדָם אִישׁ בְּרֵעֵהוּ
  chosen: every man against his neighbor
  alternatives:
  - all the people, each against his neighbor
  - each man against another
  lexicon: HALOT
  rationale: This captures the distributive force of כָּל הָאָדָם with אִישׁ plus
    the hostile relational phrase. 'Neighbor' is the standard rendering of רֵעַ in
    this interpersonal context.
