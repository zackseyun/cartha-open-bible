theological_decisions:
- issue: Rendering of אָדָם in a generic/representative sense
  chosen_reading: man
  alternative_readings:
  - humankind
  - people
  rationale: The doctrine excerpt directs gender-accurate rendering over gender-neutral
    where the source has representative masculine force. In this verse the contrast
    is between human and animal labor, so 'man' preserves the Hebrew framing without
    implying only males are in view.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
- issue: Agency in social strife
  chosen_reading: and I set every man against his neighbor
  alternative_readings:
  - and I sent all men, each against his neighbor
  rationale: The Hebrew explicitly attributes the resulting social discord to God's
    action. The translation preserves that theological tension rather than softening
    divine agency.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
