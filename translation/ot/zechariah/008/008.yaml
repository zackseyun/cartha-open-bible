theological_decisions:
- issue: Covenant formula language
  chosen_reading: Retain the traditional covenantal phrasing 'they will be my people,
    and I will be their God.'
  alternative_readings:
  - Use more interpretive relational language such as 'they will belong to me, and
    I will care for them as God'
  rationale: The Hebrew uses a well-established covenant formula that should be preserved
    rather than paraphrased. This maintains intertextual links across the Old Testament
    and avoids importing explanatory wording not present in the text.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Original-language primacy over translation tradition'
- issue: Semantic force of בֶּאֱמֶת וּבִצְדָקָה
  chosen_reading: Attach the phrase to the covenant relationship as rendered 'in truth
    and in righteousness.'
  alternative_readings:
  - Interpret adverbially as 'truly and righteously'
  - Apply primarily to God's manner of being their God
  rationale: The Hebrew leaves the exact scope somewhat open, but the prepositional
    noun pair is best preserved formally in English. This keeps the ambiguity and
    theological richness rather than narrowing the phrase to only divine action or
    only covenant status.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it'
