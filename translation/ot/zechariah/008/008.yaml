id: ZEC.8.8
reference: Zechariah 8:8
source:
  edition: WLC
  text: וְ/הֵבֵאתִ֣י אֹתָ֔/ם וְ/שָׁכְנ֖וּ בְּ/ת֣וֹךְ יְרוּשָׁלִָ֑ם וְ/הָיוּ לִ֣/י
    לְ/עָ֗ם וַֽ/אֲנִי֙ אֶהְיֶ֤ה לָ/הֶם֙ לֵֽ/אלֹהִ֔ים בֶּ/אֱמֶ֖ת וּ/בִ/צְדָקָֽה־׃ס
translation:
  text: I will bring them, and they will dwell in the midst of Jerusalem; and they
    will be my people, and I will be their God, in truth and in righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'within Jerusalem.' The Hebrew more literally says 'in the midst of Jerusalem.'
    reason: lexical_alternative
  - marker: b
    text: '''In truth'' may also be understood as ''faithfully'' or ''truly.'''
    reason: lexical_alternative
  - marker: c
    text: '''Righteousness'' may also be rendered ''justice'' in this context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבֵאתִי
  chosen: I will bring
  alternatives:
  - I will bring back
  - I will cause to come
  lexicon: HALOT
  rationale: Hiphil of בוא commonly means 'bring' or 'cause to come.' In this restoration
    context, 'bring' is natural and sufficiently explicit without adding 'back' beyond
    the immediate wording, though the broader context implies return.
- source_word: וְשָׁכְנוּ
  chosen: they will dwell
  alternatives:
  - they will live
  - they will settle
  lexicon: HALOT
  rationale: שכן regularly denotes dwelling or residing. 'Dwell' preserves the covenantal
    and settlement nuance better than the more generic 'live.'
- source_word: בְּתוֹךְ יְרוּשָׁלִָם
  chosen: in the midst of Jerusalem
  alternatives:
  - within Jerusalem
  - in Jerusalem
  lexicon: HALOT
  rationale: בְּתוֹךְ is more specific than a simple 'in'; 'in the midst of Jerusalem'
    preserves the spatial force and solemn tone, though 'within Jerusalem' is a viable
    smoother alternative.
- source_word: וְהָיוּ לִי לְעָם
  chosen: they will be my people
  alternatives:
  - they will become a people to me
  lexicon: HALOT
  rationale: This is standard covenant formula language. 'They will be my people'
    is the idiomatic and theologically transparent English equivalent.
- source_word: וַאֲנִי אֶהְיֶה לָהֶם לֵאלֹהִים
  chosen: and I will be their God
  alternatives:
  - and I will become God to them
  lexicon: HALOT
  rationale: Another standard covenant formula. 'I will be their God' is the natural
    English rendering and preserves the covenant relationship without awkward literalism.
- source_word: בֶּאֱמֶת
  chosen: in truth
  alternatives:
  - faithfully
  - truly
  lexicon: HALOT
  rationale: אֱמֶת can denote truth, faithfulness, or reliability. 'In truth' best
    preserves the nominal form and pairs well with the following noun, while allowing
    the covenantal sense of faithfulness to remain audible.
- source_word: וּבִצְדָקָה
  chosen: and in righteousness
  alternatives:
  - and in justice
  - and with righteousness
  lexicon: HALOT
  rationale: צְדָקָה can mean righteousness or justice. The default rendering in doctrinal
    guidance for the cognate Greek term favors 'righteousness' with alternatives preserved
    where relevant; here 'righteousness' fits the covenant formula and parallelism
    with 'truth' best.
