id: 1CH.23.29
reference: 1 Chronicles 23:29
source:
  edition: WLC
  text: וּ/לְ/לֶ֨חֶם הַֽ/מַּעֲרֶ֜כֶת וּ/לְ/סֹ֤לֶת לְ/מִנְחָה֙ וְ/לִ/רְקִיקֵ֣י הַ/מַּצּ֔וֹת
    וְ/לַֽ/מַּחֲבַ֖ת וְ/לַ/מֻּרְבָּ֑כֶת וּ/לְ/כָל מְשׂוּרָ֖ה וּ/מִדָּֽה־׃
translation:
  text: and for the bread of the arrangement, and the fine flour for the grain offering,
    and the wafers of unleavened bread, and for what is cooked on the griddle, and
    for what is mixed, and for every measure and size,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the showbread' or 'the bread of the Presence.' The Hebrew is literally
      'the bread of the arrangement.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחֶם הַמַּעֲרֶכֶת
  chosen: the bread of the arrangement
  alternatives:
  - the showbread
  - the bread set out in rows
  - the bread of the Presence
  lexicon: HALOT
  rationale: Literally 'bread of the arrangement/ordering.' A more traditional cultic
    term is 'showbread,' but that is archaic and less transparent. 'Bread of the Presence'
    is a familiar interpretive rendering influenced by related priestly texts, but
    this verse uses מַעֲרֶכֶת ('arrangement, row, ordering'), so the translation stays
    closer to the Hebrew while preserving the cultic sense in a footnote alternative.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: Standard rendering for the refined flour used in offerings; clear and
    idiomatic in English.
- source_word: מִנְחָה
  chosen: grain offering
  alternatives:
  - offering
  - gift offering
  lexicon: HALOT
  rationale: In cultic context this refers specifically to the cereal/grain offering,
    not a generic gift. 'Grain offering' is the clearest established English equivalent.
- source_word: רְקִיקֵי הַמַּצּוֹת
  chosen: the wafers of unleavened bread
  alternatives:
  - unleavened wafers
  - cakes of unleavened bread
  lexicon: HALOT
  rationale: רְקִיקִים are thin cakes/wafers; הַמַּצּוֹת specifies that they are unleavened.
    'Wafers of unleavened bread' preserves both elements naturally.
- source_word: מַּחֲבַת
  chosen: what is cooked on the griddle
  alternatives:
  - the griddle
  - the pan offering
  lexicon: HALOT
  rationale: The term denotes a flat pan/griddle used in preparing offerings. Because
    the list concerns priestly responsibilities for food items/preparations, rendering
    the prepared item rather than only the utensil best fits the syntax and sense.
- source_word: מֻּרְבָּכֶת
  chosen: what is mixed
  alternatives:
  - what is well-mixed
  - what is soaked
  - the mixed offering
  lexicon: HALOT
  rationale: This passive participial form refers to a prepared mixture, likely of
    oil and flour in offering preparation. 'What is mixed' is intentionally broad
    enough to reflect the Hebrew without over-specifying the exact culinary process.
- source_word: מְשׂוּרָה
  chosen: measure
  alternatives:
  - measured quantity
  - capacity measure
  lexicon: HALOT
  rationale: Refers to a standard measure or measured amount. 'Measure' is concise
    and fits the paired expression with מִדָּה.
- source_word: מִדָּה
  chosen: size
  alternatives:
  - dimension
  - measurement
  lexicon: HALOT
  rationale: Paired with מְשׂוּרָה, this likely broadens the idea from quantity to
    dimension/standard. 'Size' gives a natural distinction in English while preserving
    the sense of regulated standards.
