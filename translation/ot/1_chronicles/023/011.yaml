id: 1CH.23.11
reference: 1 Chronicles 23:11
source:
  edition: WLC
  text: וַֽ/יְהִי יַ֣חַת הָ/רֹ֔אשׁ וְ/זִיזָ֖ה הַ/שֵּׁנִ֑י וִ/יע֤וּשׁ וּ/בְרִיעָה֙
    לֹֽא הִרְבּ֣וּ בָנִ֔ים וַ/יִּֽהְיוּ֙ לְ/בֵ֣ית אָ֔ב לִ/פְקֻדָּ֖ה אֶחָֽת־־׃ס
translation:
  text: Jahath was the first and Zizah the second; Jeush and Beriah did not have many
    sons, so they became one father’s house for one reckoning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Zizah is rendered by some English versions as 'Ziza.'
    reason: lexical_alternative
  - marker: b
    text: Or 'one ancestral house for one division' / 'for one reckoning.' The Hebrew
      refers to a single paternal clan counted as one administrative unit.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: was
  alternatives:
  - became
  lexicon: HALOT
  rationale: In this genealogical notice, היה functions as a simple copular/identifying
    verb rather than emphasizing transition, so 'was' is the most natural English
    rendering.
- source_word: יַחַת
  chosen: Jahath
  rationale: Proper name; transliterated by standard English convention.
- source_word: הָרֹאשׁ
  chosen: the first
  alternatives:
  - the head
  - the chief
  lexicon: HALOT
  rationale: Although ראש literally means 'head/chief,' in this ordered list paired
    with 'the second' it most naturally denotes rank/order, hence 'the first.'
- source_word: זִיזָה
  chosen: Zizah
  alternatives:
  - Ziza
  rationale: Proper name; transliterated. 'Zizah' follows a straightforward representation
    of the final ה, while 'Ziza' is a known English alternative preserved in a footnote.
- source_word: הַשֵּׁנִי
  chosen: the second
  lexicon: HALOT
  rationale: Ordinal adjective marking Zizah's place in the sequence.
- source_word: יְעוּשׁ
  chosen: Jeush
  alternatives:
  - Jeuš
  rationale: Proper name; standard English transliteration.
- source_word: בְּרִיעָה
  chosen: Beriah
  rationale: Proper name; standard English transliteration.
- source_word: לֹא הִרְבּוּ בָנִים
  chosen: did not have many sons
  alternatives:
  - did not multiply sons
  - did not have many children
  lexicon: HALOT
  rationale: The idiom literally says they 'did not multiply sons.' In idiomatic English,
    'did not have many sons' best conveys the sense while preserving the male-specific
    reference of בנים.
- source_word: וַיִּהְיוּ
  chosen: they became
  alternatives:
  - they were
  lexicon: HALOT
  rationale: 'Here the verb introduces the resulting status after the previous clause:
    because they had few sons, they functioned as a single unit. ''Became'' captures
    that resultant sense better than a flat ''were.'''
- source_word: לְבֵית אָב
  chosen: one father’s house
  alternatives:
  - one ancestral house
  - one family household
  lexicon: HALOT
  rationale: בית אב is a technical kinship term for a paternal clan/household unit.
    'Father’s house' keeps the familial and social structure visible, though it may
    sound slightly formal in English.
- source_word: לִפְקֻדָּה אֶחָת
  chosen: for one assignment
  alternatives:
  - for one reckoning
  - for one office
  - for one division
  lexicon: HALOT
  rationale: פקדה in administrative/genealogical contexts can denote oversight, appointment,
    or official reckoning. In this context of Levitical organization, 'for one assignment'
    communicates that they were counted/treated as a single administrative unit.
