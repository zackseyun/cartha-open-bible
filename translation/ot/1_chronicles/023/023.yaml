id: 1CH.23.23
reference: 1 Chronicles 23:23
source:
  edition: WLC
  text: בְּנֵ֣י מוּשִׁ֗י מַחְלִ֥י וְ/עֵ֛דֶר וִ/ירֵמ֖וֹת שְׁלֹשָֽׁה׃
translation:
  text: 'The sons of Mushi: Mahli, Eder, and Jeremoth—three.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jeremoth is alternatively spelled Jerimoth in some English renderings.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: Construct plural of 'son' introducing a genealogical list. 'Sons of'
    is the most direct and conventional rendering here; 'descendants of' is possible
    in broader genealogical contexts but unnecessary since the verse immediately lists
    three named individuals.
- source_word: מוּשִׁי
  chosen: Mushi
  rationale: Proper personal name; transliterated according to the project's policy
    to transliterate names rather than translate them.
- source_word: מַחְלִי
  chosen: Mahli
  rationale: Proper personal name; transliterated.
- source_word: וְעֵדֶר
  chosen: and Eder
  rationale: Conjunction plus proper name. Rendered with simple coordination in English.
- source_word: וִירֵמוֹת
  chosen: and Jeremoth
  alternatives:
  - and Jerimoth
  rationale: Proper personal name with conjunction. 'Jeremoth' is a standard English
    transliteration of יְרֵמוֹת/יִירֵמוֹת-type forms in Chronicles; 'Jerimoth' is
    a known alternative spelling in English tradition and is worth preserving as a
    lexical alternative.
- source_word: שְׁלֹשָׁה
  chosen: three
  lexicon: HALOT
  rationale: Cardinal number summarizing the total number of sons listed. Rendered
    as a concluding appositional summary, best represented in English with a dash
    before 'three' to preserve the list-plus-total structure.
