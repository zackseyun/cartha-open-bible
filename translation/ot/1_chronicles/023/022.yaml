id: 1CH.23.22
reference: 1 Chronicles 23:22
source:
  edition: WLC
  text: וַ/יָּ֨מָת֙ אֶלְעָזָ֔ר וְ/לֹא הָ֥יוּ ל֛/וֹ בָּנִ֖ים כִּ֣י אִם בָּנ֑וֹת וַ/יִּשָּׂא֥וּ/ם בְּנֵי קִ֖ישׁ אֲחֵי/הֶֽם־־־׃
translation:
  text: Eleazar died and had no sons[a], but only daughters; and the sons of Kish, their brothers[b], married them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'took them as wives.'
    reason: lexical_alternative
  - marker: b
    text: '''Their brothers'' likely refers to close clan relatives in the related family line, not necessarily uterine brothers.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - passed away
  lexicon: HALOT
  rationale: The verb מות straightforwardly means 'to die.' 'Died' is the plain, direct rendering and avoids euphemism.
- source_word: אֶלְעָזָר
  chosen: Eleazar
  rationale: Personal names are transliterated by standard English convention.
- source_word: וְלֹא הָיוּ לוֹ בָּנִים
  chosen: had no sons
  alternatives:
  - had no children
  lexicon: HALOT
  rationale: Although בנים can sometimes mean 'children,' the contrast with 'daughters' in the next clause requires the more specific 'sons.' English idiom naturally renders 'there were not to him sons' as 'he had no sons.'
- source_word: כִּי אִם בָּנוֹת
  chosen: but only daughters
  alternatives:
  - except daughters
  lexicon: HALOT
  rationale: כי אם here is an exceptive/adversative expression meaning 'but only' or 'except.' 'But only daughters' is natural English and preserves the contrast.
- source_word: וַיִּשָּׂאוּם
  chosen: married them
  alternatives:
  - took them as wives
  lexicon: HALOT
  rationale: The verb נשׂא with women as object commonly means 'to take in marriage.' 'Married them' is clear modern English; the more formal 'took them as wives' is a viable literal alternative.
- source_word: בְּנֵי קִישׁ
  chosen: the sons of Kish
  alternatives:
  - Kish's sons
  rationale: A straightforward construct-chain rendering. 'The sons of Kish' preserves the formal genealogical style of Chronicles.
- source_word: אֲחֵיהֶם
  chosen: their brothers
  alternatives:
  - their kinsmen
  - their relatives
  lexicon: HALOT
  rationale: The masculine plural with 3mp suffix most naturally means 'their brothers.' In context, this refers to the daughters' male relatives from the related family line. The text presents them as brothers/close clan kin, and the translation preserves that wording rather than broadening it interpretively.
