id: 1CH.23.3
reference: 1 Chronicles 23:3
source:
  edition: WLC
  text: וַ/יִּסָּֽפְרוּ֙ הַ/לְוִיִּ֔ם מִ/בֶּ֛ן שְׁלֹשִׁ֥ים שָׁנָ֖ה וָ/מָ֑עְלָ/ה וַ/יְהִ֨י
    מִסְפָּרָ֤/ם לְ/גֻלְגְּלֹתָ/ם֙ לִ/גְבָרִ֔ים שְׁלֹשִׁ֥ים וּ/שְׁמוֹנָ֖ה אָֽלֶף׃
translation:
  text: The Levites were counted from thirty years old and upward, and their number
    by heads, man by man, was thirty-eight thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'by their heads, as men'; the expression indicates an
      individual count of adult males.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסָּפְרוּ
  chosen: were counted
  alternatives:
  - were numbered
  - were enrolled
  lexicon: HALOT
  rationale: 'Passive rendering best reflects the Niphal form of ספר here: the Levites
    are the ones being counted/numbered. ''Counted'' is natural modern English while
    preserving the census sense.'
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard transliteration of the tribal/clan name; a proper ethnoreligious
    designation is best preserved as 'Levites'.
- source_word: מִבֶּן שְׁלֹשִׁים שָׁנָה וָמָעְלָה
  chosen: from thirty years old and upward
  alternatives:
  - from the age of thirty and above
  - from thirty years and up
  lexicon: HALOT
  rationale: This idiom marks the lower age threshold for eligibility in the count.
    'Thirty years old and upward' is idiomatic English and closely tracks the Hebrew.
- source_word: וַיְהִי מִסְפָּרָם
  chosen: and their number ... was
  alternatives:
  - and the number of them was
  lexicon: HALOT
  rationale: A straightforward rendering of the clause introducing the total count.
- source_word: לְגֻלְגְּלֹתָם
  chosen: by heads
  alternatives:
  - by skulls
  - head by head
  lexicon: HALOT
  rationale: Literally 'by their skulls/heads,' an idiom for individual counting.
    'By heads' preserves the concrete Hebrew image while remaining intelligible.
- source_word: לִגְבָרִים
  chosen: man by man
  alternatives:
  - as men
  - males
  - by men
  lexicon: HALOT
  rationale: The phrase specifies the counted individuals as adult males. 'Man by
    man' works naturally with the preceding 'by heads' and preserves the masculine
    specificity required by the source.
- source_word: שְׁלֹשִׁים וּשְׁמוֹנָה אָלֶף
  chosen: thirty-eight thousand
  lexicon: HALOT
  rationale: Direct rendering of the final total.
