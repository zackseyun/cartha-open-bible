id: 1CH.23.16
reference: 1 Chronicles 23:16
source:
  edition: WLC
  text: בְּנֵ֥י גֵרְשׁ֖וֹם שְׁבוּאֵ֥ל הָ/רֹֽאשׁ׃
translation:
  text: 'The sons of Gershom: Shebuel the chief.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the head."
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: Construct plural of בֵּן, introducing the line of descent. 'Sons of'
    is the most direct rendering in a genealogical/organizational list; 'descendants
    of' is possible in broader lineage contexts but is less precise here.
- source_word: גֵרְשׁוֹם
  chosen: Gershom
  alternatives:
  - Gershon
  lexicon: HALOT
  rationale: Proper name transliterated rather than translated, following the project's
    policy for personal names. The Hebrew form here is Gershom, not Gershon.
- source_word: שְׁבוּאֵל
  chosen: Shebuel
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
- source_word: הָרֹאשׁ
  chosen: the chief
  alternatives:
  - the head
  - the first
  lexicon: HALOT
  rationale: רֹאשׁ with the article here functions as a title in an administrative/genealogical
    context, indicating primacy or leadership. 'The chief' is idiomatic modern English
    and fits the Chronicler's organizational listing better than the more literal
    but less natural 'the head.' 'The first' is possible in some contexts but is less
    likely here because the emphasis is on status, not merely sequence.
