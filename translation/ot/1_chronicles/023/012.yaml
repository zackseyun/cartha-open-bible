id: 1CH.23.12
reference: 1 Chronicles 23:12
source:
  edition: WLC
  text: בְּנֵ֣י קְהָ֗ת עַמְרָ֥ם יִצְהָ֛ר חֶבְר֥וֹן וְ/עֻזִּיאֵ֖ל אַרְבָּעָֽה׃ס
translation:
  text: 'The sons of Kohath: Amram, Izhar, Hebron, and Uzziel—four.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: Construct plural of בן introducing a genealogy/list. 'Sons of' is the
    most direct and standard rendering in this context; 'descendants of' is possible
    in broader genealogical usage but unnecessary here because the verse immediately
    lists four named sons.
- source_word: קְהָת
  chosen: Kohath
  alternatives:
  - Qehath
  rationale: Personal name; per translation philosophy, names are transliterated by
    standard English convention. 'Kohath' is the established and recognizable English
    form.
- source_word: עַמְרָם
  chosen: Amram
  rationale: Proper name transliterated by standard convention.
- source_word: יִצְהָר
  chosen: Izhar
  alternatives:
  - Jizhar
  rationale: Proper name transliterated in its standard English biblical form.
- source_word: חֶבְרוֹן
  chosen: Hebron
  rationale: Proper name transliterated by standard convention. Although also a place
    name elsewhere, here morphology and context show it is a personal name in a genealogical
    list.
- source_word: וְעֻזִּיאֵל
  chosen: and Uzziel
  alternatives:
  - and Uzzielu
  rationale: Conjunction plus proper name. Rendered with simple English coordination
    in a list. 'Uzziel' is the standard English transliteration.
- source_word: אַרְבָּעָה
  chosen: four
  lexicon: HALOT
  rationale: 'Cardinal number summarizing the total number of Kohath''s sons listed.
    English idiom is best served by apposition/dash: ''—four.'''
