id: 1CH.23.19
reference: 1 Chronicles 23:19
source:
  edition: WLC
  text: בְּנֵ֖י חֶבְר֑וֹן יְרִיָּ֤הוּ הָ/רֹאשׁ֙ אֲמַרְיָ֣ה הַ/שֵּׁנִ֔י יַחֲזִיאֵל֙
    הַ/שְּׁלִישִׁ֔י וִֽ/יקַמְעָ֖ם הָ/רְבִיעִֽי׃
translation:
  text: 'The sons of Hebron: Jeriah the first, Amariah the second, Jahaziel the third,
    and Jekameam the fourth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the head' could be rendered more literally, but here it functions
      as 'the first' in a sequence parallel to 'the second,' 'the third,' and 'the
      fourth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: Construct plural of בן, introducing a genealogical list. 'Sons of' is
    the most direct rendering and fits the immediate context of named offspring; 'descendants
    of' is broader and less precise here.
- source_word: חֶבְרוֹן
  chosen: Hebron
  rationale: Proper personal name, transliterated according to the translation philosophy
    for names.
- source_word: יְרִיָּהוּ
  chosen: Jeriah
  alternatives:
  - Jeriiah
  rationale: Proper name transliterated into standard English form. 'Jeriah' is a
    common conventional rendering; spelling variation exists because of transliteration
    choices.
- source_word: הָרֹאשׁ
  chosen: the first
  alternatives:
  - the chief
  - the head
  lexicon: HALOT
  rationale: Although ראשׁ can mean 'head' or 'chief,' in this list it functions ordinally
    in parallel with 'the second,' 'the third,' and 'the fourth.' Rendering it as
    'the first' preserves the list structure and avoids implying office rather than
    birth/order.
- source_word: אֲמַרְיָה
  chosen: Amariah
  alternatives:
  - Amariahu
  rationale: Proper name transliterated by standard English convention.
- source_word: הַשֵּׁנִי
  chosen: the second
  lexicon: HALOT
  rationale: Straightforward ordinal adjective marking sequence in the genealogy.
- source_word: יַחֲזִיאֵל
  chosen: Jahaziel
  alternatives:
  - Jahaziel
  rationale: Proper name transliterated into a standard English form; minor spelling
    variation is possible.
- source_word: הַשְּׁלִישִׁי
  chosen: the third
  lexicon: HALOT
  rationale: Straightforward ordinal adjective marking sequence in the genealogy.
- source_word: וִיקַמְעָם
  chosen: and Jekameam
  alternatives:
  - and Jokmeam
  rationale: Conjunction plus proper name. The name is transliterated in a conventional
    English form; spelling varies in English traditions due to vocalization/transliteration
    choices.
- source_word: הָרְבִיעִי
  chosen: the fourth
  lexicon: HALOT
  rationale: Straightforward ordinal adjective marking sequence in the genealogy.
