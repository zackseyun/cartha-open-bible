id: 1CH.23.26
reference: 1 Chronicles 23:26
source:
  edition: WLC
  text: וְ/גַ֖ם לַ/לְוִיִּ֑ם אֵין לָ/שֵׂ֧את אֶת הַ/מִּשְׁכָּ֛ן וְ/אֶת כָּל כֵּלָ֖י/ו
    לַ/עֲבֹדָתֽ/וֹ־־־־׃
translation:
  text: And also, the Levites no longer need to carry the tabernacle or any of its
    utensils for its service.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there is no need for the Levites to carry the tabernacle and all its
      vessels for its service.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: And also
  alternatives:
  - Also
  - And furthermore
  lexicon: HALOT
  rationale: The conjunction plus additive particle continues the preceding statement
    and adds emphasis. 'And also' preserves both the connective and additive force
    without sounding overly stiff.
- source_word: לַלְוִיִּם
  chosen: the Levites
  alternatives:
  - for the Levites
  lexicon: HALOT
  rationale: The prefixed ל here marks the affected party in the clause ('for the
    Levites there is not...'). In idiomatic English this is best represented simply
    as the subject-like phrase 'the Levites'.
- source_word: אֵין לָשֵׂאת
  chosen: no longer need to carry
  alternatives:
  - there is no need to carry
  - do not have to carry
  - are not to carry
  lexicon: HALOT
  rationale: Literally, 'there is not to carry.' In context, following David's reorganization
    of Levitical duties, the sense is that carrying is no longer required of them,
    not that it is morally forbidden. 'No longer need to carry' brings out the practical
    force in natural English.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  - the sanctuary tent
  lexicon: HALOT
  rationale: '''Tabernacle'' is the standard and contextually precise rendering for
    מִשְׁכָּן in Israel''s cultic setting. It is recognizable and accurate here.'
- source_word: וְאֶת כָּל כֵּלָיו
  chosen: or any of its utensils
  alternatives:
  - and all its vessels
  - and any of its furnishings
  - and all its equipment
  lexicon: HALOT
  rationale: כֵּלִים is a broad term for articles/implements/vessels. 'Utensils' fits
    the tabernacle-service context in readable modern English. 'Any of' works naturally
    with the negated need-to-carry construction.
- source_word: לַעֲבֹדָתוֹ
  chosen: for its service
  alternatives:
  - for its ministry
  - for serving it
  - for the service
  lexicon: HALOT
  rationale: 'The suffix most naturally refers back to the tabernacle: the implements
    used in its service. ''For its service'' preserves the relationship clearly and
    idiomatically.'
