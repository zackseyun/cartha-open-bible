id: 1CH.23.21
reference: 1 Chronicles 23:21
source:
  edition: WLC
  text: בְּנֵ֤י מְרָרִי֙ מַחְלִ֣י וּ/מוּשִׁ֔י בְּנֵ֥י מַחְלִ֖י אֶלְעָזָ֥ר וְ/קִֽישׁ׃
translation:
  text: 'The sons of Merari: Mahli and Mushi. The sons of Mahli: Eleazar and Kish.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - descendants of
  - children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן introducing a genealogical list. 'Sons of' is
    the most direct and conventional rendering in this context; broader options like
    'descendants of' are possible in genealogies but are not required here.
- source_word: מְרָרִי
  chosen: Merari
  rationale: Proper name, transliterated according to the translation philosophy of
    transliterating personal names.
- source_word: מַחְלִי
  chosen: Mahli
  rationale: Proper name, transliterated. The name occurs twice in the verse, first
    as a son of Merari and then in the construct phrase 'sons of Mahli.'
- source_word: וּמוּשִׁי
  chosen: and Mushi
  rationale: Conjunction plus proper name. Rendered straightforwardly as the second
    member of the list of Merari's sons.
- source_word: בְּנֵי מַחְלִי
  chosen: The sons of Mahli
  alternatives:
  - The descendants of Mahli
  lexicon: HALOT
  rationale: A second genealogical heading within the verse. Repeating 'The sons of'
    preserves the Hebrew structure and keeps the list clear in English.
- source_word: אֶלְעָזָר
  chosen: Eleazar
  rationale: Proper name, transliterated by standard English convention.
- source_word: וְקִישׁ
  chosen: and Kish
  rationale: Conjunction plus proper name. Rendered as the second son named under
    Mahli.
