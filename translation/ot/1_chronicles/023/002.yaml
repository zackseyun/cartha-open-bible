id: 1CH.23.2
reference: 1 Chronicles 23:2
source:
  edition: WLC
  text: וַ/יֶּאֱסֹף֙ אֶת כָּל שָׂרֵ֣י יִשְׂרָאֵ֔ל וְ/הַ/כֹּהֲנִ֖ים וְ/הַ/לְוִיִּֽם־־׃
translation:
  text: And he gathered all the leaders of Israel[a], and the priests and the Levites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the princes of Israel,' 'the officials of Israel,' or 'the chiefs of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּאֱסֹף
  chosen: And he gathered
  alternatives:
  - Then he assembled
  - And he assembled
  lexicon: HALOT
  rationale: The waw-consecutive with אסף advances the narrative, naturally rendered 'And he gathered.' 'Assembled' is possible, but 'gathered' more directly reflects the common sense of the verb while remaining natural English.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: The quantifier indicates totality. 'All' is the most idiomatic rendering with a following plural noun in English.
- source_word: שָׂרֵי יִשְׂרָאֵל
  chosen: the leaders of Israel
  alternatives:
  - the princes of Israel
  - the officials of Israel
  - the chiefs of Israel
  lexicon: HALOT
  rationale: שָׂרִים can denote princes, rulers, officials, or leaders. In this administrative context, 'leaders' is clear modern English and avoids the overly monarchical nuance of 'princes' where royal sons are not specifically in view.
- source_word: וְהַכֹּהֲנִים
  chosen: and the priests
  lexicon: HALOT
  rationale: A straightforward rendering of the definite plural noun with conjunction.
- source_word: וְהַלְוִיִּם
  chosen: and the Levites
  lexicon: HALOT
  rationale: Standard transliteration of the tribal/clan designation is preferable to paraphrase, and it is the conventional clear English form.
