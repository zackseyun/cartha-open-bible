theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of the LORD's dwelling in Jerusalem
  chosen_reading: and he dwells in Jerusalem forever
  alternative_readings:
  - and he has dwelt in Jerusalem forever
  - and he will dwell in Jerusalem forever
  rationale: The verse reports David's rationale in terms of the LORD's settled presence associated with Jerusalem and the temple project. The Hebrew wayyiqtol after a quoted perfect can be rendered in English as a present state within the quotation. This preserves the theological claim of enduring divine dwelling without over-specifying tense beyond what the Hebrew requires.
