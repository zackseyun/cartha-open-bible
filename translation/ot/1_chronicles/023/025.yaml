id: 1CH.23.25
reference: 1 Chronicles 23:25
source:
  edition: WLC
  text: כִּ֚י אָמַ֣ר דָּוִ֔יד הֵנִ֛יחַ יְהוָ֥ה אֱלֹהֵֽי יִשְׂרָאֵ֖ל לְ/עַמּ֑/וֹ וַ/יִּשְׁכֹּ֥ן בִּ/ירוּשָׁלִַ֖ם עַד לְ/עוֹלָֽם־־׃
translation:
  text: For David said[a], “Yahweh, the God of Israel, has given rest to his people, and he has dwelt in Jerusalem forever.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “and he will dwell in Jerusalem forever.” The Hebrew verb may be understood as expressing the LORD’s settled, enduring dwelling there.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding instruction; 'for' best preserves the explanatory force in natural English.
- source_word: אָמַר דָּוִיד
  chosen: David said
  alternatives:
  - David had said
  lexicon: HALOT
  rationale: Straightforward past narration. English simple past is sufficient here.
- source_word: הֵנִיחַ
  chosen: has given rest
  alternatives:
  - has caused to rest
  - has granted rest
  - has given relief
  lexicon: HALOT
  rationale: The hiphil of נוח here means to give rest or settle securely. 'Has given rest' is idiomatic and preserves the causative/resultative sense better than a bare 'rested.' Present perfect in English fits the quoted speech's present relevance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Standard construct rendering; appositional to 'the LORD'.
- source_word: לְעַמּוֹ
  chosen: to his people
  alternatives:
  - for his people
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object/beneficiary. 'To his people' is the most direct rendering in English with 'given rest.'
- source_word: וַיִּשְׁכֹּן
  chosen: and he dwells
  alternatives:
  - and he has dwelt
  - and he will dwell
  - and he settled
  lexicon: HALOT
  rationale: From שכן, 'to dwell.' In the context of David's statement about the LORD's settled presence, an English present best captures the enduring state expressed in the quotation. The subject is the LORD, continuing from the previous clause.
- source_word: בִּירוּשָׁלַם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Direct locative rendering.
- source_word: עַד לְעוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - unto the age
  lexicon: HALOT
  rationale: Idiomatic rendering of the Hebrew expression for enduring perpetuity. 'Forever' is clear modern English and preserves the force without archaism.
