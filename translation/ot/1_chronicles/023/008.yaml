id: 1CH.23.8
reference: 1 Chronicles 23:8
source:
  edition: WLC
  text: בְּנֵ֣י לַעְדָּ֗ן הָ/רֹ֧אשׁ יְחִיאֵ֛ל וְ/זֵתָ֥ם וְ/יוֹאֵ֖ל שְׁלֹשָֽׁה׃ס
translation:
  text: 'The sons of Ladan: Jehiel the first, and Zetham and Joel—three.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the chief" or "the head"; the Hebrew likely marks Jehiel as the leading
      or first son.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons of.' In genealogical contexts
    it can extend to descendants, but here it introduces an immediate list of named
    offspring, so 'sons of' is the most direct and natural rendering.
- source_word: לַעְדָּן
  chosen: Ladan
  alternatives:
  - Laadan
  lexicon: HALOT
  rationale: Proper name transliterated per translation philosophy. English tradition
    varies between 'Ladan' and 'Laadan'; the consonantal form supports either, but
    'Ladan' is a standard concise transliteration.
- source_word: הָרֹאשׁ
  chosen: the first
  alternatives:
  - the chief
  - the head
  lexicon: HALOT
  rationale: Literally 'the head/chief.' In this genealogical listing, the term most
    naturally identifies the firstborn or leading son. 'The first' communicates the
    likely sense in idiomatic English without implying official rank beyond the family
    order.
- source_word: יְחִיאֵל
  chosen: Jehiel
  rationale: Proper name transliterated by standard English convention.
- source_word: וְזֵתָם
  chosen: and Zetham
  rationale: Conjunction plus proper name; rendered straightforwardly.
- source_word: וְיוֹאֵל
  chosen: and Joel
  rationale: Conjunction plus proper name; rendered straightforwardly.
- source_word: שְׁלֹשָׁה
  chosen: three
  lexicon: HALOT
  rationale: Cardinal number summarizing the total sons listed. Retained explicitly
    because it is present in the Hebrew and confirms the count.
