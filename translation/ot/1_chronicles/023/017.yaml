id: 1CH.23.17
reference: 1 Chronicles 23:17
source:
  edition: WLC
  text: וַ/יִּֽהְי֥וּ בְנֵי אֱלִיעֶ֖זֶר רְחַבְיָ֣ה הָ/רֹ֑אשׁ וְ/לֹא הָיָ֤ה לֶ/אֱלִיעֶ֨זֶר֙ בָּנִ֣ים אֲחֵרִ֔ים וּ/בְנֵ֥י רְחַבְיָ֖ה רָב֥וּ לְ/מָֽעְלָ/ה־־׃
translation:
  text: 'The sons of Eliezer: Rehabiah was the chief[a], and Eliezer had no other sons; but the sons of Rehabiah became very many.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "multiplied greatly."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: 'The sons of Eliezer:'
  alternatives:
  - And the sons of Eliezer were
  - Now the sons of Eliezer were
  lexicon: HALOT
  rationale: The verb introduces a genealogical listing formula. In English, a verbless heading-like construction reads more naturally while preserving the sense of enumeration.
- source_word: בְנֵי אֱלִיעֶזֶר
  chosen: The sons of Eliezer
  alternatives:
  - Eliezer's sons
  lexicon: HALOT
  rationale: Standard construct-chain rendering in genealogical context; keeps the formal structure clear.
- source_word: רְחַבְיָה
  chosen: Rehabiah
  rationale: Personal name transliterated according to standard English convention, following the translation philosophy to transliterate names.
- source_word: הָרֹאשׁ
  chosen: was the chief
  alternatives:
  - was the head
  - was the first
  lexicon: HALOT
  rationale: In this genealogical/organizational context, הָרֹאשׁ denotes the principal or leading descendant/household head. 'Chief' is idiomatic and preserves the status sense better than the more wooden 'head.'
- source_word: וְלֹא הָיָה לֶאֱלִיעֶזֶר בָּנִים אֲחֵרִים
  chosen: and Eliezer had no other sons
  alternatives:
  - and there were no other sons for Eliezer
  lexicon: HALOT
  rationale: Possessive existential construction rendered idiomatically in English. 'Other' reflects אֲחֵרִים and makes clear that Rehabiah was Eliezer's only son.
- source_word: וּבְנֵי רְחַבְיָה
  chosen: but the sons of Rehabiah
  alternatives:
  - and the sons of Rehabiah
  lexicon: HALOT
  rationale: The conjunction can be rendered simply 'and,' but 'but' better reflects the contrast between Eliezer's lack of additional sons and the numerous descendants through Rehabiah.
- source_word: רָבוּ
  chosen: became very many
  alternatives:
  - were many
  - multiplied
  lexicon: HALOT
  rationale: The verb conveys increase/multiplication. 'Became very many' captures resultant abundance in natural English without over-paraphrasing.
- source_word: לְמָעְלָה
  chosen: very
  alternatives:
  - exceedingly
  - abundantly
  lexicon: HALOT
  rationale: Here the adverb intensifies the preceding verb, indicating abundance beyond the ordinary. 'Very' is concise and natural in modern English.
