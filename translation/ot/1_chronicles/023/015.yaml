id: 1CH.23.15
reference: 1 Chronicles 23:15
source:
  edition: WLC
  text: בְּנֵ֣י מֹשֶׁ֔ה גֵּרְשֹׁ֖ם וֶ/אֱלִיעֶֽזֶר׃
translation:
  text: 'The sons of Moses: Gershom and Eliezer.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  - The children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן here introduces a genealogical listing. 'The
    sons of' is the most direct and natural rendering in this context, more precise
    than the broader 'descendants of' and less ambiguous than 'children of'.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Proper personal name, transliterated by standard English convention in
    keeping with the translation philosophy to transliterate names.
- source_word: גֵּרְשֹׁם
  chosen: Gershom
  alternatives:
  - Gershon
  lexicon: HALOT
  rationale: Proper name of Moses's son. 'Gershom' matches the Hebrew form here and
    standard English usage for this individual; 'Gershon' would reflect a different
    but similar name elsewhere and is not the form in this verse.
- source_word: וֶ/אֱלִיעֶזֶר
  chosen: and Eliezer
  alternatives:
  - and Eleazar
  lexicon: HALOT
  rationale: The conjunction ו is simply additive, rendered 'and.' The proper name
    is אֱלִיעֶזֶר, standardly transliterated 'Eliezer.' 'Eleazar' is a distinct though
    related name and should not be substituted.
