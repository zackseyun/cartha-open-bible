theological_decisions:
- issue: Status of Moses' sons in Israel's tribal structure
  chosen_reading: his sons were called among the tribe of Levi
  alternative_readings:
  - his sons were counted as part of the tribe of Levi
  - his sons were named over the tribe of Levi
  rationale: 'The verse distinguishes Moses from Aaron in the surrounding context:
    Aaron''s line receives priestly distinction, while Moses'' sons are included within
    the broader Levite tribe rather than set apart as a separate priestly house. The
    translation preserves that administrative/genealogical point without overstating
    it.'
