id: 1CH.23.14
reference: 1 Chronicles 23:14
source:
  edition: WLC
  text: וּ/מֹשֶׁ֖ה אִ֣ישׁ הָ/אֱלֹהִ֑ים בָּנָ֕י/ו יִקָּרְא֖וּ עַל שֵׁ֥בֶט הַ/לֵּוִֽי־׃
translation:
  text: And as for Moses, the man of God, his sons were called among the tribe of
    Levi.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his sons were counted as part of the tribe of Levi.' The Hebrew verb
      can denote being designated or reckoned within a group.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מֹשֶׁה
  chosen: And as for Moses
  alternatives:
  - And Moses
  - Now Moses
  lexicon: HALOT
  rationale: The conjunction waw here introduces a new item in the list and can be
    represented simply as 'and'; 'as for' helps signal the topical shift in natural
    English without adding content beyond the discourse function.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - a man of God
  lexicon: HALOT
  rationale: This is a recognized title for Moses. The article supports the definite
    rendering 'the man of God,' preserving the honorific force of the Hebrew.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The noun is explicitly masculine plural, so 'sons' is the gender-accurate
    rendering required by the translation philosophy, not the gender-neutral 'children'.
- source_word: יִקָּרְאוּ
  chosen: were called
  alternatives:
  - were reckoned
  - were named
  - were counted
  lexicon: HALOT
  rationale: The Niphal of קרא here is passive/reflexive. In this genealogical/tribal
    context it conveys designation or being known/registered by association. 'Were
    called' is the most direct rendering, while the following prepositional phrase
    clarifies the sense.
- source_word: עַל
  chosen: among
  alternatives:
  - under
  - over
  - with reference to
  lexicon: HALOT
  rationale: Although על commonly means 'on/upon,' in this administrative-genealogical
    context with 'be called' and 'tribe' it indicates classification or inclusion.
    'Among' best communicates that Moses' sons were reckoned within the Levite tribal
    grouping.
- source_word: שֵׁבֶט הַלֵּוִי
  chosen: the tribe of Levi
  alternatives:
  - the tribe of the Levites
  - the Levite tribe
  lexicon: HALOT
  rationale: שֵׁבֶט is 'tribe,' and הַלֵּוִי here refers to Levi as the tribal ancestor/name.
    'The tribe of Levi' is the most idiomatic and precise English rendering.
