id: 1CH.23.1
reference: 1 Chronicles 23:1
source:
  edition: WLC
  text: וְ/דָוִ֥יד זָקֵ֖ן וְ/שָׂבַ֣ע יָמִ֑ים וַ/יַּמְלֵ֛ךְ אֶת שְׁלֹמֹ֥ה בְנ֖/וֹ עַל
    יִשְׂרָאֵֽל־־׃
translation:
  text: Now David was old and full of days, and he made his son Solomon king over
    Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'advanced in years'; literally 'old and full of days.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָקֵן
  chosen: was old
  alternatives:
  - had grown old
  - was elderly
  lexicon: HALOT
  rationale: The qatal form with David as subject states his advanced age. 'Was old'
    is idiomatic, concise English and matches the narrative summary without adding
    nuance beyond the Hebrew.
- source_word: וְשָׂבַע יָמִים
  chosen: and full of days
  alternatives:
  - advanced in years
  - satisfied with days
  - having lived many days
  lexicon: HALOT
  rationale: This Hebrew idiom literally means being full/sated with days, a conventional
    expression for having reached a full lifespan. 'Full of days' preserves the idiom
    and its literary resonance better than flattening it to 'advanced in years.'
- source_word: וַיַּמְלֵךְ
  chosen: he made ... king
  alternatives:
  - he caused ... to reign
  - he crowned
  lexicon: HALOT
  rationale: 'The Hiphil of מלך here is causative: David installed Solomon as king.
    ''Made ... king'' is natural English and preserves the causative force better
    than the more interpretive ''crowned,'' which adds ceremony not stated in the
    text.'
- source_word: אֶת שְׁלֹמֹה בְנוֹ
  chosen: his son Solomon
  alternatives:
  - Solomon his son
  lexicon: HALOT
  rationale: English style prefers 'his son Solomon' in this clause, while preserving
    the filial identification explicit in the Hebrew.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - over all Israel
  - for Israel
  lexicon: HALOT
  rationale: The preposition עַל with enthronement language indicates rule over a
    people. 'Over Israel' is the straightforward rendering. 'All Israel' is not explicit
    in this verse and should not be added.
- source_word: וְ
  chosen: Now
  alternatives:
  - And
  - Then
  lexicon: HALOT
  rationale: The initial conjunction marks narrative continuation. 'Now' is a readable
    English discourse marker that signals transition without woodenly repeating 'And'
    at the start of the sentence.
