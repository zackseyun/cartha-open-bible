id: 1CH.23.9
reference: 1 Chronicles 23:9
source:
  edition: WLC
  text: בְּנֵ֣י שִׁמְעִ֗י שלמות וַ/חֲזִיאֵ֛ל וְ/הָרָ֖ן שְׁלֹשָׁ֑ה אֵ֛לֶּה רָאשֵׁ֥י הָ/אָב֖וֹת לְ/לַעְדָּֽן׃ס
translation:
  text: 'The sons of Shimei: Shelomoth[a], Haziel, and Haran—three. These were the heads of the fathers’ houses of Ladan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Shelomith,” a common alternative transliteration of the name.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: The construct phrase בְּנֵי שִׁמְעִי most naturally means 'the sons of Shimei' in this genealogical list. 'Descendants' is possible in broader genealogical contexts, but here the immediate naming of three individuals favors the more specific 'sons.'
- source_word: שִׁמְעִי
  chosen: Shimei
  rationale: 'Personal name transliterated according to the translation philosophy: names are transliterated rather than translated.'
- source_word: שלמות
  chosen: Shelomoth
  alternatives:
  - Shelomith
  rationale: The consonantal form here supports the masculine personal name commonly rendered 'Shelomoth' in this genealogical context. 'Shelomith' is a familiar alternative transliteration in English tradition, but 'Shelomoth' better reflects the form as pointed here.
- source_word: וַחֲזִיאֵל
  chosen: Haziel
  alternatives:
  - Jahaziel
  rationale: The name is transliterated directly from the Hebrew form חֲזִיאֵל. 'Jahaziel' reflects a different but related name form elsewhere and should not be imported here.
- source_word: וְהָרָן
  chosen: and Haran
  rationale: Simple conjunction plus personal name. 'Haran' is the standard transliteration.
- source_word: שְׁלֹשָׁה
  chosen: three
  lexicon: HALOT
  rationale: Cardinal number summarizing the named sons. It is retained explicitly rather than absorbed into the syntax because the Hebrew marks the total.
- source_word: אֵלֶּה
  chosen: These
  alternatives:
  - These men
  lexicon: HALOT
  rationale: Demonstrative pronoun referring to the three named individuals. 'These' is sufficient and natural in English without adding 'men,' which is not explicit in the Hebrew.
- source_word: רָאשֵׁי
  chosen: heads of
  alternatives:
  - chiefs of
  - leaders of
  lexicon: HALOT
  rationale: In genealogical/administrative contexts רֹאשׁ often denotes a leading representative or head. 'Heads of' preserves the familial-household structure more formally than 'leaders of.'
- source_word: הָאָבוֹת
  chosen: the fathers’ houses
  alternatives:
  - the ancestral houses
  - the family houses
  lexicon: HALOT
  rationale: In Chronicles this phrase refers to clan-based paternal households or family divisions. 'Fathers’ houses' is a standard, fairly transparent rendering that preserves the source's kinship structure better than a flattened 'families.'
- source_word: לְלַעְדָּן
  chosen: of Ladan
  alternatives:
  - belonging to Ladan
  - for Ladan
  rationale: 'The prefixed ל here marks relation within the genealogy: these heads belong to or are associated with the line of Ladan. English idiom is best served by ''of Ladan.'''
