id: 1CH.23.10
reference: 1 Chronicles 23:10
source:
  edition: WLC
  text: וּ/בְנֵ֣י שִׁמְעִ֔י יַ֣חַת זִינָ֔א וִ/יע֖וּשׁ וּ/בְרִיעָ֑ה אֵ֥לֶּה בְנֵי שִׁמְעִ֖י
    אַרְבָּעָֽה־׃
translation:
  text: 'And the sons of Shimei: Jahath, Zina, Jeush, and Beriah. These were the sons
    of Shimei—four.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some translations read the second name as “Zizah” (compare 1 Chr 23:11);
      the Hebrew here reads Zina.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: The conjunction ו is rendered as simple narrative linkage, 'And,' and
    בְנֵי is the construct plural 'sons of.' In a genealogy/list context, 'sons of'
    is the natural formal rendering and may denote descendants within a clan list.
- source_word: שִׁמְעִי
  chosen: Shimei
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: יַחַת
  chosen: Jahath
  alternatives:
  - Yahath
  rationale: Proper name transliterated in a conventional English biblical form.
- source_word: זִינָא
  chosen: Zina
  alternatives:
  - Zizah
  rationale: The consonantal form here supports 'Zina.' An alternative spelling tradition
    appears in related passages/translations, so that alternative is preserved in
    a footnote as a lexical/name-form note rather than adopted in the main text.
- source_word: וִיעוּשׁ
  chosen: Jeush
  alternatives:
  - Jeush
  rationale: Proper name transliterated in standard English biblical form; the prefixed
    conjunction is absorbed into the list as 'and Jeush.'
- source_word: וּבְרִיעָה
  chosen: and Beriah
  rationale: Proper name transliterated; conjunction rendered explicitly to complete
    the list.
- source_word: אֵלֶּה
  chosen: These were
  alternatives:
  - These are
  lexicon: HALOT
  rationale: Although the Hebrew is nominal ('these'), English idiom in a genealogical
    summary naturally supplies 'were.' Past tense fits the historical register of
    Chronicles.
- source_word: בְנֵי שִׁמְעִי
  chosen: the sons of Shimei
  alternatives:
  - Shimei's sons
  lexicon: HALOT
  rationale: Repeated phrase retained rather than reduced, preserving the Hebrew's
    resumptive style and clarity.
- source_word: אַרְבָּעָה
  chosen: four
  lexicon: HALOT
  rationale: Cardinal number rendered straightforwardly. The verse explicitly totals
    the listed sons as four.
