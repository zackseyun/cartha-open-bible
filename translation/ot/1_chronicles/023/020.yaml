id: 1CH.23.20
reference: 1 Chronicles 23:20
source:
  edition: WLC
  text: בְּנֵ֖י עֻזִּיאֵ֑ל מִיכָ֣ה הָ/רֹ֔אשׁ וְ/יִשִּׁיָּ֖ה הַ/שֵּׁנִֽי׃ס
translation:
  text: 'The sons of Uzziel: Micah the first, and Isshiah the second.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Micah the chief'; Hebrew literally 'Micah the head.'
    reason: lexical_alternative
  - marker: b
    text: The name 'Isshiah' is rendered variously in English versions, including
      'Jeshaiah' and 'Ishshiah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: Construct plural of בֵּן introducing a genealogical list. 'Sons of' is
    the most direct and natural rendering here; 'descendants of' is possible in some
    genealogical contexts but unnecessary since the verse immediately names two direct
    filial members.
- source_word: עֻזִּיאֵל
  chosen: Uzziel
  rationale: Personal name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: מִיכָה
  chosen: Micah
  alternatives:
  - Mica
  rationale: Standard English transliteration of the personal name. Although the Hebrew
    form here is מִיכָה rather than the longer מִיכָיְהוּ-type forms, 'Micah' is the
    conventional and recognizable rendering.
- source_word: הָרֹאשׁ
  chosen: the first
  alternatives:
  - the head
  - the chief
  lexicon: HALOT
  rationale: Though רֹאשׁ literally means 'head,' in genealogical and administrative
    lists it commonly denotes rank or primacy. Here, paired with 'the second' for
    the next named son, English 'the first' best conveys the ordinal sense in context
    more idiomatically than 'the head' or 'the chief.'
- source_word: וְיִשִּׁיָּה
  chosen: and Isshiah
  alternatives:
  - and Jeshaiah
  - and Ishshiah
  rationale: Personal name with conjunction. 'Isshiah' is a close transliteration
    of the consonantal form here. Other English traditions vary in representing the
    initial yod and doubled shin, but this form stays close to the Hebrew.
- source_word: הַשֵּׁנִי
  chosen: the second
  lexicon: HALOT
  rationale: Straightforward ordinal adjective marking the second son in the list.
