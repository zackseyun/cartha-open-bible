id: 1CH.23.6
reference: 1 Chronicles 23:6
source:
  edition: WLC
  text: וַ/יֶּֽחָלְקֵ֥/ם דָּוִ֖יד מַחְלְק֑וֹת לִ/בְנֵ֣י לֵוִ֔י לְ/גֵרְשׁ֖וֹן קְהָ֥ת
    וּ/מְרָרִֽיס׃ס
translation:
  text: 'David divided them into divisions for the sons of Levi: Gershon, Kohath,
    and Merari.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for Gershon, Kohath, and Merari,' making the clan list more explicitly
      governed by the preposition.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּחָלְקֵם
  chosen: divided them
  alternatives:
  - apportioned them
  - organized them
  lexicon: HALOT
  rationale: From חלק in the piel/causative sense of dividing or apportioning. The
    3mp suffix requires an object, so 'them' should be retained rather than leaving
    the verb intransitive. 'Divided' is the plain sense; 'organized' is interpretive
    and less direct.
- source_word: מַחְלְקוֹת
  chosen: into divisions
  alternatives:
  - by divisions
  - into groups
  lexicon: HALOT
  rationale: The noun denotes divisions, courses, or organized groupings. In context
    of Levitical ordering, 'divisions' is both natural English and close to the Hebrew.
    Rendering with 'into' reflects the resultative sense with the verb 'divided them.'
- source_word: לִבְנֵי לֵוִי
  chosen: for the sons of Levi
  alternatives:
  - among the sons of Levi
  - for the Levites
  lexicon: HALOT
  rationale: Literally 'for the sons of Levi.' This preserves the genealogical framing
    of the verse. 'Levites' is possible and idiomatic, but the Hebrew explicitly uses
    the filial expression, which suits the following clan names.
- source_word: לְגֵרְשׁוֹן קְהָת וּמְרָרִי
  chosen: Gershon, Kohath, and Merari
  alternatives:
  - for Gershon, Kohath, and Merari
  lexicon: HALOT
  rationale: These are the three major Levitical clan names. In English they function
    naturally as an appositional list after a colon. The prefixed ל on the first name
    can be carried by the overall phrase rather than repeated before each name.
