id: 1CH.23.18
reference: 1 Chronicles 23:18
source:
  edition: WLC
  text: בְּנֵ֥י יִצְהָ֖ר שְׁלֹמִ֥ית הָ/רֹֽאשׁ׃ס
translation:
  text: 'The sons of Izhar: Shelomith the chief.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the head" or "the first."
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: Construct plural of בֵּן, introducing the members of Izhar's line. 'Sons
    of' is the most direct and natural rendering in this genealogical context; 'descendants
    of' is possible but broader than the immediate wording.
- source_word: יִצְהָר
  chosen: Izhar
  lexicon: HALOT
  rationale: Proper personal name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: שְׁלֹמִית
  chosen: Shelomith
  alternatives:
  - Shelomithh
  lexicon: HALOT
  rationale: Proper personal name, transliterated by standard English convention.
    This identifies the named member within Izhar's line.
- source_word: הָרֹאשׁ
  chosen: the chief
  alternatives:
  - the head
  - the first
  lexicon: HALOT
  rationale: With the article, רֹאשׁ here functions as a title in a genealogical/organizational
    list, indicating the leading or principal member. 'The chief' communicates rank
    clearly in modern English. 'The head' is more literal but less idiomatic here;
    'the first' is possible in list contexts but less precise for status.
