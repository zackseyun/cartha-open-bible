id: 1CH.23.7
reference: 1 Chronicles 23:7
source:
  edition: WLC
  text: לַ/גֵּרְשֻׁנִּ֖י לַעְדָּ֥ן וְ/שִׁמְעִֽי׃ס
translation:
  text: 'For the Gershonites: Ladan and Shimei.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ladan is also spelled Laadan in some English translations and in the parallel
      listing context.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַגֵּרְשֻׁנִּי
  chosen: For the Gershonites
  alternatives:
  - Of the Gershonites
  - To the Gershonite clan
  lexicon: HALOT
  rationale: The prefixed ל here introduces the subdivision/category within the Levites
    being listed. In English, 'For the Gershonites' naturally signals the heading-like
    function of the phrase in this genealogical/organizational context. The gentilic/plural
    sense is best represented by 'Gershonites' rather than a singular 'Gershonite'.
- source_word: לַעְדָּן
  chosen: Ladan
  alternatives:
  - Laadan
  lexicon: HALOT
  rationale: This is a proper name and should be transliterated rather than translated,
    per project philosophy. 'Ladan' is a standard English transliteration; 'Laadan'
    reflects the fuller vowel pattern and is preserved as an alternative spelling.
- source_word: וְשִׁמְעִי
  chosen: and Shimei
  lexicon: HALOT
  rationale: The conjunction ו is straightforwardly 'and,' joining the second proper
    name in the list. 'Shimei' is the standard English transliteration of the personal
    name.
