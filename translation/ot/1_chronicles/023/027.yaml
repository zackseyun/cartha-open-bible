id: 1CH.23.27
reference: 1 Chronicles 23:27
source:
  edition: WLC
  text: כִּ֣י בְ/דִבְרֵ֤י דָוִיד֙ הָ/אַ֣חֲרֹנִ֔ים הֵ֖מָּה מִסְפַּ֣ר בְּנֵי לֵוִ֑י מִ/בֶּ֛ן עֶשְׂרִ֥ים שָׁנָ֖ה וּ/לְ/מָֽעְלָ/ה־׃
translation:
  text: For by the last words of David[a], the sons of Levi were numbered from twenty years old and upward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "according to the last words of David." The Hebrew may indicate that this numbering was carried out on the basis of David's final directive.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding statement; 'For' fits the discourse connection in natural English.
- source_word: בְּדִבְרֵי דָוִיד הָאַחֲרֹנִים
  chosen: by the last words of David
  alternatives:
  - according to the last words of David
  - in the last words of David
  lexicon: HALOT
  rationale: The preposition ב with דִּבְרֵי can express basis or means. In context, it refers to David's final directive/order as the basis for the numbering. 'By the last words of David' is concise and preserves the Hebrew construction.
- source_word: הָאַחֲרֹנִים
  chosen: last
  alternatives:
  - final
  - later
  lexicon: HALOT
  rationale: Here it denotes David's final words/instructions, not merely later words. 'Last' is the most direct rendering.
- source_word: הֵמָּה מִסְפַּר
  chosen: were numbered
  alternatives:
  - they were the number
  - they were counted
  lexicon: HALOT
  rationale: 'The Hebrew is somewhat elliptical: literally, ''they [were] number/of the number.'' In context it clearly means the Levites were included in the census/count. ''Were numbered'' is idiomatic English that reflects the intended sense without over-paraphrase.'
- source_word: בְּנֵי לֵוִי
  chosen: the sons of Levi
  alternatives:
  - the Levites
  - the descendants of Levi
  lexicon: HALOT
  rationale: A formally closer rendering is preferable here. 'Sons of Levi' preserves the genealogical expression, though it refers to the Levites corporately.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה
  chosen: from twenty years old
  alternatives:
  - from a son of twenty years
  - from the age of twenty years
  - twenty years old and above
  lexicon: HALOT
  rationale: This is the standard Hebrew age formula. 'From twenty years old' preserves the source structure while remaining natural in English.
- source_word: וּלְמַעְלָה
  chosen: and upward
  alternatives:
  - and above
  - and older
  lexicon: HALOT
  rationale: A conventional rendering for the age-range expression; it communicates inclusion of all older ages.
