theological_decisions:
- issue: Meaning of 'the king’s seer in the words of God'
  chosen_reading: Heman is described as the king’s seer with respect to divine revelation.
  alternative_readings:
  - Heman is the king’s seer in matters pertaining to God
  - Heman is the king’s seer by means of God’s words
  rationale: The Hebrew construction does not require a more specific theological claim than that Heman exercised a revelatory role connected to God’s words/matters. The translation preserves this without over-resolving the syntax.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Sense of 'to exalt the horn'
  chosen_reading: The phrase is retained as a biblical metaphor for exaltation of strength, honor, or status.
  alternative_readings:
  - to increase his power
  - to honor him
  rationale: The text does not specify whose horn is exalted or reduce the image to a single abstract meaning. Retaining the metaphor avoids importing a narrower doctrinal or interpretive conclusion.
  doctrine_reference: Original-language primacy over translation tradition; preserve ambiguity where the source is genuinely open.
