id: 1CH.25.5
reference: 1 Chronicles 25:5
source:
  edition: WLC
  text: כָּל אֵ֨לֶּה בָנִ֜ים לְ/הֵימָ֗ן חֹזֵ֥ה הַ/מֶּ֛לֶךְ בְּ/דִבְרֵ֥י הָ/אֱלֹהִ֖ים לְ/הָרִ֣ים קָ֑רֶן וַ/יִּתֵּ֨ן הָ/אֱלֹהִ֜ים לְ/הֵימָ֗ן בָּנִ֛ים אַרְבָּעָ֥ה עָשָׂ֖ר וּ/בָנ֥וֹת שָׁלֽוֹשׁ־׃
translation:
  text: All these were sons of Heman[a], the king’s seer in the words of God, to exalt the horn[b]. And God gave Heman fourteen sons and three daughters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to raise up the horn.' The Hebrew 'horn' is a figurative image for strength, honor, or exalted status.
    reason: lexical_alternative
  - marker: b
    text: Or 'the king’s seer in matters of God' or 'by the words of God.' The Hebrew phrase is compact and may denote Heman’s role in relation to divine revelation.
    reason: alternative_reading
lexical_decisions:
- source_word: חֹזֵה
  chosen: seer
  alternatives:
  - visionary
  - prophet
  lexicon: HALOT
  rationale: חֹזֶה commonly denotes a seer, one who receives revelatory insight. 'Seer' preserves the court/prophetic nuance better than the broader 'prophet' and is a standard rendering in Chronicles.
- source_word: בְּדִבְרֵי הָאֱלֹהִים
  chosen: in the words of God
  alternatives:
  - concerning the words of God
  - by the words of God
  - in the matters of God
  lexicon: HALOT
  rationale: 'The phrase is somewhat compressed. Rendering it literally as ''in the words of God'' preserves the Hebrew wording and leaves the exact relation open: Heman functions as the king’s seer in matters involving divine revelation. More interpretive options are possible, but the literal rendering best preserves the text’s ambiguity.'
- source_word: לְהָרִים קָרֶן
  chosen: to exalt the horn
  alternatives:
  - to raise up the horn
  - to lift up the horn
  lexicon: HALOT
  rationale: This idiom refers to the raising or exalting of strength, honor, or status. 'Exalt the horn' is readable modern English while preserving the biblical metaphor. 'Raise up the horn' is possible but slightly less idiomatic in contemporary English.
- source_word: קָרֶן
  chosen: horn
  alternatives:
  - strength
  - might
  lexicon: HALOT
  rationale: The Hebrew image of the horn as a symbol of power or honor should be retained in the main text rather than interpreted away. The metaphor is common in biblical poetry and narrative.
- source_word: וַיִּתֵּן הָאֱלֹהִים לְהֵימָן
  chosen: And God gave to Heman
  alternatives:
  - And God gave Heman
  - Now God gave Heman
  lexicon: HALOT
  rationale: The clause states divine bestowal of offspring. 'Gave to Heman' follows the Hebrew preposition closely; English could omit 'to,' but retaining it lightly reflects the source structure without sounding unnatural.
- source_word: בָנִים ... וּבָנוֹת
  chosen: sons ... daughters
  alternatives:
  - children ... daughters
  - male children ... female children
  lexicon: HALOT
  rationale: The Hebrew explicitly distinguishes male and female offspring. 'Sons' and 'daughters' is the most direct and natural rendering, preserving the gendered wording of the text.
- source_word: אַרְבָּעָה עָשָׂר וּבָנוֹת שָׁלֹשׁ
  chosen: fourteen sons and three daughters
  alternatives:
  - fourteen male children and three daughters
  lexicon: HALOT
  rationale: The numbers are straightforward. The English order follows the Hebrew sense naturally and keeps the explicit count of sons and daughters.
- source_word: כָּל אֵלֶּה
  chosen: All these
  alternatives:
  - All of these
  lexicon: HALOT
  rationale: A standard, natural rendering of the demonstrative phrase introducing the list’s summary.
