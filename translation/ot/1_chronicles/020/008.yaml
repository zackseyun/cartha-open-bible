id: 1CH.20.8
reference: 1 Chronicles 20:8
source:
  edition: WLC
  text: אֵ֛ל נוּלְּד֥וּ לְ/הָ/רָפָ֖א בְּ/גַ֑ת וַ/יִּפְּל֥וּ בְ/יַד דָּוִ֖יד וּ/בְ/יַד עֲבָדָֽי/ו־־׃פ
translation:
  text: These were born to Rapha in Gath[a], and they fell by the hand of David and by the hand of his servants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to Rapha'; possibly referring to descendants of the Rephaim, that is, a giant lineage in Gath.
    reason: alternative_reading
lexical_decisions:
- source_word: אֵל
  chosen: These
  alternatives:
  - These men
  - These ones
  lexicon: HALOT
  rationale: Demonstrative pronoun referring back to the warriors just described. English 'These' is sufficient and avoids adding 'men' where the Hebrew does not explicitly repeat it.
- source_word: נוּלְּדוּ
  chosen: were born
  alternatives:
  - were descendants of
  - were begotten to
  lexicon: HALOT
  rationale: Nifal of ילד normally means 'be born.' In this genealogical/ancestral context it can imply descent, but 'were born' preserves the Hebrew wording most directly while allowing the idiom to signal lineage.
- source_word: לְהָרָפָא
  chosen: to the Rapha
  alternatives:
  - to Rapha
  - to the giant
  - to the Rephaim
  lexicon: HALOT
  rationale: The phrase likely denotes descent from a figure or clan called Rapha/Repha in Gath. 'To the Rapha' keeps the prefixed ל and article visible in English as an idiomatic marker of lineage. 'The giant' would overinterpret, and 'Rephaim' would import a plural ethnonym not present in this form. Because the referent is debated, an alternative is preserved in a footnote.
- source_word: בְּגַת
  chosen: in Gath
  alternatives:
  - at Gath
  lexicon: HALOT
  rationale: Standard locative use of ב with the place name Gath.
- source_word: וַיִּפְּלוּ
  chosen: and they fell
  alternatives:
  - and they were struck down
  - and they died
  lexicon: HALOT
  rationale: The verb נפל literally means 'fall.' In battle context it implies death/defeat, but 'fell' is the conventional and sufficiently transparent rendering that preserves the Hebrew image.
- source_word: בְיַד
  chosen: by the hand of
  alternatives:
  - at the hand of
  - by
  lexicon: HALOT
  rationale: This idiom denotes agency or instrumentality. 'By the hand of' preserves the Hebrew idiom and suits the martial context.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his servants/attendants
  - his men
  lexicon: HALOT
  rationale: עבד commonly means 'servant.' In royal/military context it can refer to those in David's service, including fighting men. 'Servants' preserves the lexical sense; 'men' would be more interpretive.
