id: 1CH.15.6
reference: 1 Chronicles 15:6
source:
  edition: WLC
  text: לִ/בְנֵ֖י מְרָרִ֑י עֲשָׂיָ֣ה הַ/שָּׂ֔ר וְ/אֶחָ֖י/ו מָאתַ֥יִם וְ/עֶשְׂרִֽים׃ס
translation:
  text: 'For the sons of Merari: Asaiah the chief[a], and 220 of his brothers.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kinsmen' for 'brothers,' since the Hebrew term can refer more broadly to male members of the same clan or family group.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִ/בְנֵי
  chosen: For the sons of
  alternatives:
  - To the sons of
  - Of the sons of
  lexicon: HALOT
  rationale: The prefixed ל here introduces the next clan/group in a list, so 'For the sons of' is natural English while preserving the list structure. 'Sons of' is retained rather than flattening to 'descendants of' because this is a standard genealogical/clan expression.
- source_word: מְרָרִי
  chosen: Merari
  lexicon: HALOT
  rationale: 'Proper name transliterated according to the translation philosophy: names are transliterated rather than translated.'
- source_word: עֲשָׂיָה
  chosen: Asaiah
  alternatives:
  - Asayah
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
- source_word: הַ/שָּׂר
  chosen: the chief
  alternatives:
  - the leader
  - the prince
  - the official
  lexicon: HALOT
  rationale: שַׂר commonly denotes a leader, chief, or official. In this clan-list context, 'the chief' best conveys a recognized head of the group without implying royal status that 'prince' might suggest.
- source_word: וְ/אֶחָי/ו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  - and his brethren
  lexicon: HALOT
  rationale: Although אחים can sometimes extend to clan-members or kinsmen, 'brothers' is the most direct rendering and fits the representative male group in this genealogical/Levitical context. This follows the gender-accurate principle rather than neutralizing the term.
- source_word: מָאתַיִם וְ/עֶשְׂרִים
  chosen: '220'
  alternatives:
  - two hundred and twenty
  lexicon: HALOT
  rationale: The Hebrew cardinal number is straightforwardly rendered as 220 for readability in modern English; the meaning is unchanged.
