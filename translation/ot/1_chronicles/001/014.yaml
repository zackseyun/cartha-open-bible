id: 1CH.1.14
reference: 1 Chronicles 1:14
source:
  edition: WLC
  text: וְ/אֶת הַ/יְבוּסִי֙ וְ/אֶת הָ֣/אֱמֹרִ֔י וְ/אֵ֖ת הַ/גִּרְגָּשִֽׁי־־׃
translation:
  text: the Jebusites[a], the Amorites, and the Girgashites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew singular gentilic forms are used here collectively, referring to the peoples: Jebusites, Amorites, and Girgashites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיְבוּסִי
  chosen: the Jebusites
  alternatives:
  - the Jebusite
  lexicon: HALOT
  rationale: Although the Hebrew form is morphologically singular gentilic, in genealogical nation lists it functions collectively for a people group. English idiom normally renders such entries as plural ethnonyms in this context.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: As with the surrounding ethnonyms, the singular gentilic is used collectively for the nation descended from Canaan. The plural English ethnonym best matches the list style and natural English usage.
- source_word: הַגִּרְגָּשִׁי
  chosen: the Girgashites
  alternatives:
  - the Girgashite
  lexicon: HALOT
  rationale: Rendered as a plural people-group name for consistency with the genealogy's collective ethnonyms and standard English expression.
- source_word: וְאֶת / וְאֵת
  chosen: and
  alternatives:
  - (untranslated direct-object marker)
  lexicon: Hebrew grammar
  rationale: The repeated conjunction plus direct-object marker introduces each coordinated item in the list. In English, the object marker is not represented, and the coordination is naturally conveyed by commas and a final 'and'.
