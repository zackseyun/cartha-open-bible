id: 1CH.6.9
reference: 1 Chronicles 6:9
source:
  edition: WLC
  text: תַּ֤חַת בְּנ/וֹ֙ אוּרִיאֵ֣ל בְּנ֔/וֹ עֻזִּיָּ֥ה בְנ֖/וֹ וְ/שָׁא֥וּל בְּנֽ/וֹ׃
translation:
  text: Tahath his son[a], Uriel his son, Uzziah his son, and Shaul his son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Shaul is the Hebrew name more commonly Anglicized as Saul.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת
  chosen: Tahath
  alternatives:
  - Tahath
  rationale: Proper personal name in a genealogy; per translation philosophy, personal names are transliterated rather than translated.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - his descendant
  lexicon: HALOT
  rationale: In genealogical lists, בֵּן commonly means 'son' but can sometimes function more broadly as 'descendant.' Here 'his son' is retained as the standard genealogical formula, preserving the Hebrew wording without over-interpreting lineage compression.
- source_word: אוּרִיאֵל
  chosen: Uriel
  rationale: Proper personal name; transliterated by standard English convention.
- source_word: עֻזִּיָּה
  chosen: Uzziah
  alternatives:
  - Uziah
  rationale: Proper personal name; 'Uzziah' reflects the conventional English transliteration and preserves the doubled consonant implied in Hebrew.
- source_word: וְשָׁאוּל
  chosen: and Shaul
  alternatives:
  - and Saul
  rationale: Proper personal name with conjunction. 'Shaul' more directly reflects the Hebrew vocalization שָׁאוּל; 'Saul' is the traditional Anglicized form. Given the translation philosophy's preference for source-language primacy and transliteration of names, 'Shaul' is preferred, while the familiar form is preserved in a footnote.
