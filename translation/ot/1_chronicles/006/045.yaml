id: 1CH.6.45
reference: 1 Chronicles 6:45
source:
  edition: WLC
  text: וּ/מִ/מַּטֵּ֣ה בִנְיָמִ֗ן אֶת גֶּ֤בַע וְ/אֶת מִגְרָשֶׁ֨י/הָ֙ וְ/אֶת עָלֶ֣מֶת
    וְ/אֶת מִגְרָשֶׁ֔י/הָ וְ/אֶת עֲנָת֖וֹת וְ/אֶת מִגְרָשֶׁ֑י/הָ כָּל עָרֵי/הֶ֛ם שְׁלֹשׁ
    עֶשְׂרֵ֥ה עִ֖יר בְּ/מִשְׁפְּחוֹתֵי/הֶֽם־־־־־־־־׃ס
translation:
  text: 'and from the tribe of Benjamin: Geba with its pasturelands, Alemeth with
    its pasturelands, and Anathoth with its pasturelands—all their cities were thirteen
    cities according to their families.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Alemeth'; the parallel list in Joshua 21:18 reads 'Almon.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִמַּטֵּה בִנְיָמִן
  chosen: and from the tribe of Benjamin
  alternatives:
  - and from Benjamin's tribe
  lexicon: HALOT
  rationale: מַטֶּה in tribal allotment contexts refers to a tribe/tribal division,
    not a literal staff. The prefixed conjunction and preposition are carried over
    as 'and from,' continuing the list from the previous verse.
- source_word: גֶּבַע
  chosen: Geba
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated per project
    policy for names.
- source_word: מִגְרָשֶׁיהָ
  chosen: its pasturelands
  alternatives:
  - its common lands
  - its surrounding pasturelands
  lexicon: HALOT
  rationale: מִגְרָשׁ denotes the open land/common pasture around a town, especially
    Levitical cities. 'Pasturelands' is clear modern English and fits the land-use
    sense in Chronicles.
- source_word: עָלֶמֶת
  chosen: Alemeth
  alternatives:
  - Almon
  lexicon: HALOT
  rationale: The Chronicler's form here is עָלֶמֶת, best represented as 'Alemeth.'
    'Almon' reflects the parallel in Joshua 21:18, but this verse's own form should
    stand in the main text.
- source_word: עֲנָתוֹת
  chosen: Anathoth
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard convention.
- source_word: כָּל עָרֵיהֶם
  chosen: all their cities
  alternatives:
  - the total of their cities
  lexicon: HALOT
  rationale: A summary phrase concluding the list. The plural pronominal suffix refers
    to the listed Levitical holdings/families; 'all their cities' preserves the Hebrew
    wording naturally.
- source_word: שְׁלֹשׁ עֶשְׂרֵה עִיר
  chosen: thirteen cities
  lexicon: HALOT
  rationale: Straightforward cardinal-number construction with singular עִיר after
    the number, idiomatically rendered in English as plural 'cities.'
- source_word: בְּמִשְׁפְּחוֹתֵיהֶם
  chosen: according to their families
  alternatives:
  - by their clans
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת can mean extended families or clans. 'According to their
    families' stays close to the Hebrew while remaining understandable; it likely
    indicates distribution by family groups among the Kohathites.
