id: 1CH.6.57
reference: 1 Chronicles 6:57
source:
  edition: WLC
  text: וּ/מִ/מַּטֵּ֣ה יִשָׂשכָ֔ר אֶת קֶ֖דֶשׁ וְ/אֶת מִגְרָשֶׁ֑י/הָ אֶת דָּבְרַ֖ת
    וְ/אֶת מִגְרָשֶֽׁי/הָ־־־־׃
translation:
  text: 'And from the tribe of Issachar: Kedesh with its pasturelands, and Daberath
    with its pasturelands.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Daberath is also spelled Dabareth in some English translations and in the
      parallel city list (cf. Josh 21:28).
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/מִ/מַּטֵּה
  chosen: And from the tribe of
  alternatives:
  - From the tribe of
  - And from the clan of
  lexicon: HALOT
  rationale: מַטֶּה in tribal allotment contexts refers to a tribe/tribal division.
    The prefixed conjunction and preposition yield 'and from the tribe of,' continuing
    the list from the previous verse.
- source_word: יִשָׂשכָר
  chosen: Issachar
  rationale: Standard English transliteration of the tribal name.
- source_word: קֶדֶשׁ
  chosen: Kedesh
  alternatives:
  - Kedesh in Issachar
  rationale: Proper place name, transliterated rather than translated. No qualifier
    is added in the main text because the Hebrew simply names the city.
- source_word: מִגְרָשֶׁיהָ
  chosen: its pasturelands
  alternatives:
  - its surrounding pasturelands
  - its common lands
  lexicon: HALOT
  rationale: מִגְרָשׁ denotes the open land/common pasture around a Levitical city.
    'Pasturelands' is clear modern English and fits the land-allotment context better
    than the more archaic 'suburbs' or less precise 'lands.' The 3fs suffix is rendered
    'its' referring to each city.
- source_word: דָּבְרַת
  chosen: Daberath
  alternatives:
  - Dabareth
  rationale: Proper place name, transliterated. English tradition varies between 'Daberath'
    and 'Dabareth'; the Hebrew form here supports 'Daberath,' while the alternative
    is worth preserving in a footnote because of familiar usage elsewhere.
