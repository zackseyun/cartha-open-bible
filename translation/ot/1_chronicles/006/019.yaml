id: 1CH.6.19
reference: 1 Chronicles 6:19
source:
  edition: WLC
  text: בֶּן אֶלְקָנָה֙ בֶּן יְרֹחָ֔ם בֶּן אֱלִיאֵ֖ל בֶּן תּֽוֹחַ־־־־׃
translation:
  text: son of Elkanah[a], son of Jeroham, son of Eliel[b], son of Tohah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Tohah; some compare the parallel genealogy in 1 Samuel 1:1, which has Nahath in a corresponding position.
    reason: cross_reference
  - marker: b
    text: Or 'Tohu,' reflecting a slightly different English transliteration of the same Hebrew name.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In genealogical lists, בֶּן regularly marks immediate or lineal descent. 'Son of' is the standard formal rendering and fits the repetitive genealogy style here better than the broader 'descendant of.'
- source_word: אֶלְקָנָה
  chosen: Elkanah
  rationale: 'Personal name transliterated according to the translation philosophy: names are transliterated rather than translated.'
- source_word: יְרֹחָם
  chosen: Jeroham
  rationale: Personal name transliterated by standard English convention.
- source_word: אֱלִיאֵל
  chosen: Eliel
  alternatives:
  - Eliel
  rationale: The consonants and vowels support the standard English transliteration 'Eliel.' 'Eliel' reflects essentially the same name with a minor orthographic variation in English representation.
- source_word: תּוֹחַ
  chosen: Tohah
  alternatives:
  - Tohu
  - Nahath
  rationale: The MT/WLC form here is תּוֹחַ, best represented as 'Tohah.' 'Tohu' is a possible tighter transliteration of the consonantal form, while 'Nahath' reflects the parallel genealogy in related passages rather than the form of this verse itself; the main text follows the source text of this verse.
