id: 1CH.6.15
reference: 1 Chronicles 6:15
source:
  edition: WLC
  text: שִׁמְעָ֥א בְנ֛/וֹ חַגִּיָּ֥ה בְנ֖/וֹ עֲשָׂיָ֥ה בְנֽ/וֹ׃פ
translation:
  text: Shimea his son[a], Haggiah his son, Asaiah his son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew repeats the genealogical formula literally: ''his son ... his son ... his son,'' marking successive descent in the lineage.'
    reason: cultural_note
lexical_decisions:
- source_word: שִׁמְעָא
  chosen: Shimea
  alternatives:
  - Shimea
  lexicon: HALOT
  rationale: Proper name; transliterated rather than translated, following the project policy for personal names. English convention commonly renders this form as 'Shimea,' though 'Shimea' is a possible transliteration.
- source_word: בְנוֹ
  chosen: his son
  alternatives:
  - son of him
  lexicon: HALOT
  rationale: Construct noun בֵּן with 3ms suffix, indicating direct genealogical descent. 'His son' is idiomatic modern English and preserves the repeated genealogical formula.
- source_word: חַגִּיָּה
  chosen: Haggiah
  alternatives:
  - Haggiyah
  lexicon: HALOT
  rationale: Proper name; transliterated by standard English convention. The final divine element may also be represented with 'yah,' but 'Haggiah' is the smoother conventional form.
- source_word: עֲשָׂיָה
  chosen: Asaiah
  alternatives:
  - Asayah
  lexicon: HALOT
  rationale: Proper name; transliterated rather than translated. 'Asaiah' is the standard English form for this Hebrew name.
