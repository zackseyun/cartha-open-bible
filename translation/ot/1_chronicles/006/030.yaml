id: 1CH.6.30
reference: 1 Chronicles 6:30
source:
  edition: WLC
  text: בֶּן חֲשַׁבְיָ֥ה בֶן אֲמַצְיָ֖ה בֶּן חִלְקִיָּֽה־־־׃
translation:
  text: the son of Hashabiah, the son of Amaziah, the son of Hilkiah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן
  chosen: the son of
  alternatives:
  - son of
  - descendant of
  lexicon: HALOT
  rationale: In genealogical lists, בֶּן marks immediate or lineal descent. 'The son
    of' preserves the repetitive formula and reads naturally in English within a list.
    'Descendant of' is possible in genealogical contexts but is less literal and not
    required here.
- source_word: חֲשַׁבְיָה
  chosen: Hashabiah
  alternatives:
  - Hashabyah
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. 'Hashabiah' is the conventional English transliteration of the Hebrew
    proper name.
- source_word: אֲמַצְיָה
  chosen: Amaziah
  alternatives:
  - Amatsyah
  rationale: Personal names are transliterated rather than translated. 'Amaziah' is
    the standard English form of this Hebrew name.
- source_word: חִלְקִיָּה
  chosen: Hilkiah
  alternatives:
  - Hilqiyah
  rationale: Personal names are transliterated rather than translated. 'Hilkiah' is
    the standard English form and preserves recognizability across English Bible tradition
    while remaining faithful to the Hebrew name.
