id: 1CH.6.50
reference: 1 Chronicles 6:50
source:
  edition: WLC
  text: וַ/יִּתְּנ֣וּ בַ/גּוֹרָ֗ל מִ/מַּטֵּ֤ה בְנֵי יְהוּדָה֙ וּ/מִ/מַּטֵּ֣ה בְנֵי שִׁמְע֔וֹן וּ/מִ/מַּטֵּ֖ה בְּנֵ֣י בִנְיָמִ֑ן אֵ֚ת הֶ/עָרִ֣ים הָ/אֵ֔לֶּה אֲשֶׁר יִקְרְא֥וּ אֶתְ/הֶ֖ם בְּ/שֵׁמֽוֹת־־־׃ס
translation:
  text: They assigned by lot from the tribe of the sons of Judah[a], and from the tribe of the sons of Simeon, and from the tribe of the sons of Benjamin, these cities, which they called by name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more dynamically, 'these cities, which are listed by name.' The Hebrew literally uses the verb 'called' with 'by names,' a formula introducing the named list that follows.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  chosen: They assigned
  alternatives:
  - they gave
  - they allotted
  lexicon: HALOT
  rationale: נתן literally means 'give,' but in the context of distributing Levitical cities by lot, 'assigned' best captures the administrative allotment sense in natural English without over-paraphrasing.
- source_word: בַגּוֹרָל
  chosen: by lot
  alternatives:
  - by the lot
  lexicon: HALOT
  rationale: גורל refers to the lot-casting mechanism or resulting allotment. 'By lot' is idiomatic English and preserves the formal sense.
- source_word: מִמַּטֵּה
  chosen: from the tribe of
  alternatives:
  - from the staff of
  - from the branch of
  lexicon: HALOT
  rationale: 'מַטֶּה in tribal lists means ''tribe.'' Adding ''of'' yields clear English syntax: ''from the tribe of the sons of Judah.'''
- source_word: בְנֵי יְהוּדָה
  chosen: the sons of Judah
  alternatives:
  - Judah
  - the people of Judah
  lexicon: HALOT
  rationale: The Hebrew construct is literally 'sons of Judah.' This is retained for transparency and because it is standard genealogical/tribal language in Chronicles.
- source_word: בְנֵי שִׁמְעוֹן
  chosen: the sons of Simeon
  alternatives:
  - Simeon
  - the people of Simeon
  lexicon: HALOT
  rationale: Same tribal-genealogical expression as with Judah; retained consistently.
- source_word: בְּנֵי בִנְיָמִן
  chosen: the sons of Benjamin
  alternatives:
  - Benjamin
  - the people of Benjamin
  lexicon: HALOT
  rationale: Same tribal-genealogical expression as with Judah and Simeon; retained consistently.
- source_word: הֶעָרִים הָאֵלֶּה
  chosen: these cities
  alternatives:
  - the cities האלה
  - these towns
  lexicon: HALOT
  rationale: A straightforward demonstrative phrase. 'Cities' is the normal rendering of עָרִים in allotment contexts.
- source_word: אֲשֶׁר יִקְרְאוּ אֶתְהֶם בְּשֵׁמוֹת
  chosen: which they called by name
  alternatives:
  - which are named by names
  - which they designated by name
  - whose names were called
  lexicon: HALOT
  rationale: The Hebrew is somewhat formulaic and awkward literally. The clause indicates that the cities are then specified individually by name. 'Which they called by name' preserves the verbal idea while remaining readable. A more dynamic option like 'which are listed by name' is possible but less formally tied to קרא.
