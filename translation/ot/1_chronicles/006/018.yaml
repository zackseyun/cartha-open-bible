id: 1CH.6.18
reference: 1 Chronicles 6:18
source:
  edition: WLC
  text: וְ/אֵ֥לֶּה הָ/עֹמְדִ֖ים וּ/בְנֵי/הֶ֑ם מִ/בְּנֵי֙ הַ/קְּהָתִ֔י הֵימָן֙ הַ/מְשׁוֹרֵ֔ר בֶּן יוֹאֵ֖ל בֶּן שְׁמוּאֵֽל־־׃
translation:
  text: 'And these are the ones who stood[a], and their sons: from the sons of the Kohathites: Heman the singer, son of Joel[b], son of Samuel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and their sons'; the Hebrew conjunction can be rendered more literally, but 'with their sons' better reflects the relationship in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the descendants of Kohath' or 'from the Kohathites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: And these are
  alternatives:
  - Now these are
  - These are
  lexicon: HALOT
  rationale: Introduces a new list or identification. 'And these are' preserves the conjunctive waw and the demonstrative force without sounding overly wooden.
- source_word: הָעֹמְדִים
  chosen: the ones who stood
  alternatives:
  - those who served
  - those who stood
  lexicon: HALOT
  rationale: From עמד, literally 'standing.' In this genealogical/organizational context it can imply standing in service or office, but 'stood' keeps the concrete Hebrew image while remaining intelligible. 'Served' would be more interpretive than the source requires.
- source_word: וּבְנֵיהֶם
  chosen: with their sons
  alternatives:
  - and their sons
  lexicon: HALOT
  rationale: The prefixed waw joins this phrase to the preceding participial expression. English 'with their sons' best conveys that these men are identified together with their descendants/associated sons in the list. A more literal 'and their sons' is possible, but 'with' reads more naturally in English while preserving the relationship.
- source_word: מִבְּנֵי הַקְּהָתִי
  chosen: from the sons of the Kohathite
  alternatives:
  - from the Kohathites
  - from the descendants of Kohath
  lexicon: HALOT
  rationale: Literally 'from the sons of the Kohathite.' This identifies clan descent from Kohath. 'Kohathite' preserves the singular gentilic/adjectival form in Hebrew; 'from the descendants of Kohath' is smoother but slightly more expansive.
- source_word: הֵימָן
  chosen: Heman
  rationale: Standard English transliteration of the personal name.
- source_word: הַמְשׁוֹרֵר
  chosen: the singer
  alternatives:
  - the musician
  - the cantor
  lexicon: HALOT
  rationale: Derived from שׁיר/שׁורר, denoting one who sings. 'The singer' is the most direct and accessible rendering. 'Musician' is broader than the Hebrew, and 'cantor' is too specialized.
- source_word: בֶּן יוֹאֵל בֶּן שְׁמוּאֵל
  chosen: son of Joel, son of Samuel
  rationale: Standard genealogical construction preserved directly in English.
