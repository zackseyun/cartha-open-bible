id: 1CH.6.58
reference: 1 Chronicles 6:58
source:
  edition: WLC
  text: וְ/אֶת רָאמוֹת֙ וְ/אֶת מִגְרָשֶׁ֔י/הָ וְ/אֶת עָנֵ֖ם וְ/אֶת מִגְרָשֶֽׁי/הָ־־־־׃ס
translation:
  text: Ramoth with its pasturelands, and Anem with its pasturelands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Anem'; the parallel list in Joshua 21:25 reads 'Aner.'
    reason: alternative_reading
lexical_decisions:
- source_word: רָאמוֹת
  chosen: Ramoth
  alternatives:
  - Ramot
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated per project
    philosophy. 'Ramoth' is the conventional English transliteration of the Hebrew
    toponym.
- source_word: מִגְרָשֶׁיהָ
  chosen: its pasturelands
  alternatives:
  - its common lands
  - its surrounding lands
  - its open land
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the land or open area belonging to a town, often for
    pasture. 'Pasturelands' is clear modern English and fits the Levitical-city context
    better than the archaic 'suburbs' or the vaguer 'common lands.' The 3fs suffix
    is rendered as 'its,' referring to each city.
- source_word: עָנֵם
  chosen: Anem
  alternatives:
  - Aner
  lexicon: HALOT
  rationale: Proper place name; transliterated. The MT here reads עָנֵם ('Anem').
    Because the parallel in Joshua 21:25 has 'Aner,' that alternative is preserved
    in a footnote rather than adopted into the main text.
- source_word: וְאֶת
  chosen: and
  rationale: The repeated object marker with conjunction structures a list of cities
    and their pasturelands. In idiomatic English, the object marker is not represented,
    while the conjunction is carried by commas and the final 'and.'
