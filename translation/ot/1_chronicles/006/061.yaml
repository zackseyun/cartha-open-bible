id: 1CH.6.61
reference: 1 Chronicles 6:61
source:
  edition: WLC
  text: וּ/מִ/מַּטֵּ֣ה נַפְתָּלִ֗י אֶת קֶ֤דֶשׁ בַּ/גָּלִיל֙ וְ/אֶת מִגְרָשֶׁ֔י/הָ
    וְ/אֶת חַמּ֖וֹן וְ/אֶת מִגְרָשֶׁ֑י/הָ וְ/אֶת קִרְיָתַ֖יִם וְ/אֶת מִגְרָשֶֽׁי/הָ־־־־־־׃ס
translation:
  text: 'And from the tribe of Naphtali: Kedesh in Galilee with its pasturelands,
    Hammon with its pasturelands, and Kiriathaim with its pasturelands.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'common lands' for 'pasturelands'; the Hebrew refers to the open land
      belonging to each city.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִמַּטֵּה
  chosen: And from the tribe of
  alternatives:
  - And from the stock of
  - And from the branch of
  lexicon: HALOT
  rationale: מַטֶּה in tribal allotment contexts commonly means 'tribe.' The prefixed
    conjunction and preposition together are naturally rendered 'And from.'
- source_word: נַפְתָּלִי
  chosen: Naphtali
  lexicon: HALOT
  rationale: Proper tribal name; transliterated according to standard English convention.
- source_word: קֶדֶשׁ בַּגָּלִיל
  chosen: Kedesh in Galilee
  alternatives:
  - Kedesh of Galilee
  lexicon: HALOT
  rationale: The place name is distinguished by the regional designation בַּגָּלִיל,
    best rendered idiomatically as 'in Galilee' in English.
- source_word: מִגְרָשֶׁיהָ
  chosen: its pasturelands
  alternatives:
  - its surrounding lands
  - its common lands
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the open land or pasture area belonging to a Levitical
    city. 'Pasturelands' is a clear and established rendering in this allotment context.
    The 3fs suffix is rendered 'its' referring to each city.
- source_word: חַמּוֹן
  chosen: Hammon
  alternatives:
  - Hammon
  lexicon: HALOT
  rationale: Proper place name; transliterated directly from the Hebrew. English tradition
    varies slightly, but 'Hammon' reflects the consonantal form well.
- source_word: קִרְיָתַיִם
  chosen: Kiriathaim
  alternatives:
  - Kiryathaim
  lexicon: HALOT
  rationale: Proper place name; standard English transliteration favors 'Kiriathaim.'
