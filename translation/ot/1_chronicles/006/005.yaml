id: 1CH.6.5
reference: 1 Chronicles 6:5
source:
  edition: WLC
  text: לְֽ/גֵרְשׁ֑וֹם לִבְנִ֥י בְנ֛/וֹ יַ֥חַת בְּנ֖/וֹ זִמָּ֥ה בְנֽ/וֹ׃
translation:
  text: 'To Gershom: Libni his son, Jahath his son, Zimmah his son.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְגֵרְשׁוֹם
  chosen: To Gershom
  alternatives:
  - For Gershom
  - Of Gershom
  lexicon: HALOT
  rationale: The prefixed ל introduces the genealogical heading for the descendant
    line. 'To Gershom' is a natural English way to mark the line being traced, while
    preserving the terse list structure of the Hebrew.
- source_word: לִבְנִי
  chosen: Libni
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to the project's policy
    to transliterate names rather than translate them.
- source_word: בְנוֹ
  chosen: his son
  alternatives:
  - son of him
  lexicon: HALOT
  rationale: The construct noun with 3ms suffix marks direct filial descent in the
    genealogy. 'His son' is the standard, readable English rendering.
- source_word: יַחַת
  chosen: Jahath
  lexicon: HALOT
  rationale: Proper personal name; transliterated in standard English biblical form.
- source_word: זִמָּה
  chosen: Zimmah
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated, despite
    the common-noun sense of the root elsewhere, because here it functions as a personal
    name.
