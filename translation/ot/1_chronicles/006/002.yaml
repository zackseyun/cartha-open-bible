id: 1CH.6.2
reference: 1 Chronicles 6:2
source:
  edition: WLC
  text: וְ/אֵ֛לֶּה שְׁמ֥וֹת בְּֽנֵי גֵרְשׁ֖וֹם לִבְנִ֥י וְ/שִׁמְעִֽי־׃
translation:
  text: 'These are the names of the sons of Gershom: Libni and Shimei[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew manuscripts here read Gershom; some English traditions use Gershon in related genealogical contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: These are
  alternatives:
  - And these are
  - Now these are
  lexicon: HALOT
  rationale: The conjunction with the demonstrative introduces a list. 'These are' is natural modern English and preserves the presentational force; 'and' is not required in English here.
- source_word: שְׁמוֹת
  chosen: the names
  alternatives:
  - names
  lexicon: HALOT
  rationale: The construct phrase שְׁמוֹת בְּנֵי is most naturally rendered 'the names of the sons of.' Including the article makes the English idiomatic while preserving the Hebrew sense.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - sons of
  - descendants of
  lexicon: HALOT
  rationale: In this genealogical context, בְּנֵי can sometimes denote descendants more broadly, but here the following two named individuals are presented as Gershom's immediate sons, so 'the sons of' is the most precise rendering.
- source_word: גֵרְשׁוֹם
  chosen: Gershom
  alternatives:
  - Gershon
  lexicon: HALOT
  rationale: The consonantal form here is גֵרְשׁוֹם, conventionally transliterated 'Gershom.' Personal names are transliterated rather than translated.
- source_word: לִבְנִי
  chosen: Libni
  lexicon: HALOT
  rationale: Proper name; standard English transliteration is retained.
- source_word: וְשִׁמְעִי
  chosen: and Shimei
  lexicon: HALOT
  rationale: The prefixed conjunction simply coordinates the second name in the list. 'Shimei' is the standard transliteration of the proper name.
