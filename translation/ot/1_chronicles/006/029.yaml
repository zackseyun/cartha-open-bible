id: 1CH.6.29
reference: 1 Chronicles 6:29
source:
  edition: WLC
  text: וּ/בְנֵ֧י מְרָרִ֛י אֲחֵי/הֶ֖ם עַֽל הַ/שְּׂמֹ֑אול אֵיתָן֙ בֶּן קִישִׁ֔י בֶּן
    עַבְדִּ֖י בֶּן מַלּֽוּךְ־־־־׃
translation:
  text: 'And the sons of Merari, their brothers, were on the left: Ethan son of Kishi,
    son of Abdi, son of Malluch.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their kinsmen'; the Hebrew 'brothers' can refer more broadly to fellow
      clan members in genealogical contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - And the descendants of
  lexicon: HALOT
  rationale: בני literally means 'sons of,' and in genealogical/tribal contexts can
    denote descendants. Here it introduces a clan line parallel to the surrounding
    Levitical listings; 'sons of' preserves the Hebrew form while remaining natural
    in English.
- source_word: מְרָרִי
  chosen: Merari
  lexicon: HALOT
  rationale: Proper name transliterated according to standard English convention,
    per translation philosophy for personal names.
- source_word: אֲחֵיהֶם
  chosen: their brothers
  alternatives:
  - their kinsmen
  - their relatives
  lexicon: HALOT
  rationale: אחים commonly means 'brothers,' and in tribal contexts can extend to
    fellow clan members. 'Their brothers' keeps the familial language of the Hebrew
    and fits the representative sense here.
- source_word: עַל הַשְּׂמֹאול
  chosen: were on the left
  alternatives:
  - on the left side
  - at the left
  lexicon: HALOT
  rationale: The phrase literally means 'on the left.' Because the verse is elliptical
    in a list describing positions relative to others, supplying 'were' makes acceptable
    English while preserving the spatial sense.
- source_word: אֵיתָן
  chosen: Ethan
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In genealogical chains בן is most naturally rendered 'son of.' Although
    it can sometimes mean a more remote descendant, there is no need to weaken the
    direct genealogical formula here.
- source_word: קִישִׁי
  chosen: Kishi
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
- source_word: עַבְדִּי
  chosen: Abdi
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
- source_word: מַלּוּךְ
  chosen: Malluch
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
