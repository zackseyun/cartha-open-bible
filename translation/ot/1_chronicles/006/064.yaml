id: 1CH.6.64
reference: 1 Chronicles 6:64
source:
  edition: WLC
  text: וְ/אֶת קְדֵמוֹת֙ וְ/אֶת מִגְרָשֶׁ֔י/הָ וְ/אֶת מֵיפַ֖עַת וְ/אֶת מִגְרָשֶֽׁי/הָ־־־־׃
translation:
  text: and Kedemoth with its pasturelands, and Mephaath with its pasturelands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'common lands' for 'pasturelands'; the Hebrew term denotes the open land
      belonging to a town.
    reason: lexical_alternative
lexical_decisions:
- source_word: קְדֵמוֹת
  chosen: Kedemoth
  alternatives:
  - Kedemot
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated in keeping with
    the philosophy of transliterating names. English convention commonly uses 'Kedemoth.'
- source_word: מִגְרָשֶׁיהָ
  chosen: its pasturelands
  alternatives:
  - its common lands
  - its surrounding lands
  - its pasture-grounds
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the open land or pastureland belonging to a city,
    especially Levitical cities. 'Pasturelands' is clear modern English and fits the
    chronicler's land-allotment context better than the less transparent 'common lands.'
    The 3fs suffix is rendered 'its' referring to each city.
- source_word: מֵיפַעַת
  chosen: Mephaath
  alternatives:
  - Mefaath
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention as 'Mephaath.'
- source_word: וְאֶת ... וְאֶת
  chosen: and ... and
  alternatives:
  - with ... with
  lexicon: BDB
  rationale: The repeated direct-object marker with conjunction structures a list
    of allotted cities and their lands. In English, a simple coordinated list is most
    natural; 'and' preserves the additive force without awkward literalism.
