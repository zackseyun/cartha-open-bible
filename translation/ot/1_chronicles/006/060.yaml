id: 1CH.6.60
reference: 1 Chronicles 6:60
source:
  edition: WLC
  text: וְ/אֶת חוּקֹק֙ וְ/אֶת מִגְרָשֶׁ֔י/הָ וְ/אֶת רְחֹ֖ב וְ/אֶת מִגְרָשֶֽׁי/הָ־־־־׃
translation:
  text: and Hukok with its pasturelands, and Rehob with its pasturelands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Hukok.'' The parallel in Joshua 21:31 has ''Helkath.'''
    reason: textual_variant
lexical_decisions:
- source_word: חוּקֹק
  chosen: Hukok
  alternatives:
  - Helkath
  lexicon: HALOT
  rationale: Proper place name; transliterated per translation philosophy ('translate
    titles; transliterate names'). The MT here reads Hukok. 'Helkath' reflects the
    parallel list in Joshua 21:31 rather than the Chronicles consonantal text, so
    it is preserved only as an alternative note, not adopted in the main text.
- source_word: מִגְרָשֶׁיהָ
  chosen: its pasturelands
  alternatives:
  - its surrounding lands
  - its common lands
  lexicon: HALOT
  rationale: Refers to the open land/pasture area belonging to a town, often for grazing
    and communal use. 'Pasturelands' is a clear, established rendering in these Levitical-city
    lists and fits the concrete sense better than the more generic 'surrounding lands.'
- source_word: רְחֹב
  chosen: Rehob
  lexicon: HALOT
  rationale: Proper place name; transliterated in standard English form.
- source_word: וְאֶת
  chosen: and
  alternatives:
  - with
  rationale: In this list context, the repeated object marker with conjunction is
    naturally represented by English coordination. The relation of each town to its
    pasturelands is then conveyed idiomatically by 'with its pasturelands.'
