id: 1CH.6.52
reference: 1 Chronicles 6:52
source:
  edition: WLC
  text: וַ/יִּתְּנ֨וּ לָ/הֶ֜ם אֶת עָרֵ֧י הַ/מִּקְלָ֛ט אֶת שְׁכֶ֥ם וְ/אֶת מִגְרָשֶׁ֖י/הָ בְּ/הַ֣ר אֶפְרָ֑יִם וְ/אֶת גֶּ֖זֶר וְ/אֶת מִגְרָשֶֽׁי/הָ־־־־־׃
translation:
  text: 'They gave them the cities of refuge: Shechem with its pasturelands in the hill country of Ephraim[a], and Gezer with its pasturelands.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more formally, ''the refuge cities: Shechem and its pasturelands in the hill country of Ephraim, and Gezer and its pasturelands.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  chosen: They gave
  alternatives:
  - And they gave
  - So they gave
  lexicon: HALOT
  rationale: Wayyiqtol of נתן introduces the narrative action. English can omit the conjunction for smoother style while preserving the sequential sense.
- source_word: לָהֶם
  chosen: them
  lexicon: HALOT
  rationale: Refers to the recipients named in the broader context; simple objective pronoun is sufficient.
- source_word: עָרֵי הַמִּקְלָט
  chosen: the cities of refuge
  alternatives:
  - the refuge cities
  - the asylum cities
  lexicon: HALOT
  rationale: Standard and clear rendering of the technical term for designated sanctuary cities in Israelite law.
- source_word: שְׁכֶם
  chosen: Shechem
  rationale: Proper place name is transliterated according to the translation philosophy.
- source_word: מִגְרָשֶׁיהָ
  chosen: its pasturelands
  alternatives:
  - its common lands
  - its surrounding pasturelands
  lexicon: HALOT
  rationale: Refers to the open land belonging to a town, especially for grazing. 'Pasturelands' is idiomatic and fits the Levitical-city context better than the archaic 'suburbs' or the vaguer 'common lands'.
- source_word: בְּהַר אֶפְרָיִם
  chosen: in the hill country of Ephraim
  alternatives:
  - in the mountains of Ephraim
  - in Mount Ephraim
  lexicon: HALOT
  rationale: The Hebrew expression denotes the hill country/highlands region associated with Ephraim, not a single mountain peak. This is the most natural modern English rendering.
- source_word: גֶּזֶר
  chosen: Gezer
  rationale: Proper place name is transliterated.
- source_word: וְאֶת ... וְאֶת
  chosen: and ... with
  alternatives:
  - and ... and
  rationale: The repeated object markers and conjunctions are rendered in smoother English syntax by pairing each city with its dependent phrase using 'with its pasturelands'.
