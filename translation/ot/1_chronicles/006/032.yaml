id: 1CH.6.32
reference: 1 Chronicles 6:32
source:
  edition: WLC
  text: בֶּן מַחְלִי֙ בֶּן מוּשִׁ֔י בֶּן מְרָרִ֖י בֶּן לֵוִֽי־־־־׃ס
translation:
  text: son of Mahli, son of Mushi, son of Merari, son of Levi.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The repeated genealogical formula בֶּן in Chronicles is most naturally
    rendered 'son of' in English. Although Hebrew genealogies can sometimes telescope
    generations and thus permit 'descendant of,' nothing in this immediate sequence
    requires weakening the direct filial sense, so the standard genealogical rendering
    is retained.
- source_word: מַחְלִי
  chosen: Mahli
  rationale: 'Personal name transliterated according to the translation philosophy:
    translate titles, transliterate names.'
- source_word: מוּשִׁי
  chosen: Mushi
  rationale: Personal name transliterated by standard English convention.
- source_word: מְרָרִי
  chosen: Merari
  rationale: Personal name transliterated by standard English convention.
- source_word: לֵוִי
  chosen: Levi
  rationale: Personal name transliterated by standard English convention; in this
    genealogy it refers to the patriarch Levi, not the tribal designation in the abstract.
