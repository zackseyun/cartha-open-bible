id: 1CH.6.22
reference: 1 Chronicles 6:22
source:
  edition: WLC
  text: בֶּן תַּ֨חַת֙ בֶּן אַסִּ֔יר בֶּן אֶבְיָסָ֖ף בֶּן קֹֽרַח־־־־׃
translation:
  text: son of Tahath, son of Assir, son of Ebiasaph, son of Korah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Abiasaph' for Ebiasaph, a common English spelling of the same name.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In this genealogical chain, בֶּן marks direct filial descent in the list
    format. 'Son of' is the standard and most transparent rendering; while genealogies
    can sometimes telescope generations, nothing in this verse itself requires the
    broader 'descendant of.'
- source_word: תַּחַת
  chosen: Tahath
  rationale: Proper personal name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: אַסִּיר
  chosen: Assir
  rationale: Proper personal name; transliterated by standard English convention.
- source_word: אֶבְיָסָף
  chosen: Ebiasaph
  alternatives:
  - Abiasaph
  rationale: Proper personal name. 'Ebiasaph' closely reflects the consonantal/vocalized
    Hebrew form here; 'Abiasaph' is a familiar English variant preserved as a lexical
    alternative.
- source_word: קֹרַח
  chosen: Korah
  rationale: Proper personal name; standard English transliteration.
