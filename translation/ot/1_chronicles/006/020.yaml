id: 1CH.6.20
reference: 1 Chronicles 6:20
source:
  edition: WLC
  text: בֶּן ציף בֶּן אֶלְקָנָ֔ה בֶּן מַ֖חַת בֶּן עֲמָשָֽׂי־־־־׃
translation:
  text: the son of Ziph, the son of Elkanah, the son of Mahath, the son of Amasai.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן
  chosen: the son of
  alternatives:
  - son of
  lexicon: HALOT
  rationale: In a genealogy, בֶּן marks direct descent. Rendering it as 'the son of'
    preserves the repetitive genealogical structure of the Hebrew while producing
    natural English in a list context.
- source_word: ציף
  chosen: Ziph
  rationale: Proper personal name; transliterated according to the project's policy
    to transliterate names rather than translate them.
- source_word: אֶלְקָנָה
  chosen: Elkanah
  rationale: Proper personal name; standard English transliteration retained.
- source_word: מַחַת
  chosen: Mahath
  rationale: Proper personal name; transliterated rather than translated.
- source_word: עֲמָשָׂי
  chosen: Amasai
  rationale: Proper personal name; transliterated by standard convention.
