id: 1CH.6.24
reference: 1 Chronicles 6:24
source:
  edition: WLC
  text: וְ/אָחִ֣י/ו אָסָ֔ף הָ/עֹמֵ֖ד עַל יְמִינ֑/וֹ אָסָ֥ף בֶּן בֶּרֶכְיָ֖הוּ בֶּן
    שִׁמְעָֽא־־־׃
translation:
  text: 'And his brother Asaph stood at his right hand: Asaph son of Berechiah, son
    of Shimea.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to his right.' The Hebrew expression denotes position at someone's right
      side.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָחִיו
  chosen: And his brother
  alternatives:
  - and his kinsman
  - now his brother
  lexicon: HALOT
  rationale: וְ is the simple conjunction 'and.' אָח with 3ms suffix is most naturally
    'his brother.' In this genealogical/organizational context, a broader sense like
    'kinsman' is possible in Hebrew generally, but the plain sense 'brother' best
    fits and should be retained unless context compels otherwise.
- source_word: אָסָף
  chosen: Asaph
  rationale: Proper personal name; transliterated per translation philosophy. The
    name occurs twice in the verse, first identifying the brother and then repeated
    before the patronymic expansion.
- source_word: הָעֹמֵד
  chosen: stood
  alternatives:
  - was standing
  - the one standing
  lexicon: HALOT
  rationale: Qal participle of עמד, literally 'standing.' In English narrative/genealogical
    description, finite 'stood' is more natural than a wooden participial form while
    preserving the sense of position/service.
- source_word: עַל יְמִינוֹ
  chosen: at his right hand
  alternatives:
  - on his right
  - to his right
  lexicon: HALOT
  rationale: The idiom עַל + 'right hand' denotes position at someone's right side.
    'At his right hand' is idiomatic English and preserves the spatial nuance better
    than a more literal but less natural 'on his right.'
- source_word: בֶּן
  chosen: son of
  lexicon: HALOT
  rationale: 'Standard genealogical formula. Repeated twice to preserve the Hebrew
    lineage structure: ''son of Berechiah, son of Shimea.'''
- source_word: בֶּרֶכְיָהוּ
  chosen: Berechiah
  alternatives:
  - Berachiah
  rationale: Proper name transliterated by standard English convention. 'Berechiah'
    is the familiar and phonetically suitable form.
- source_word: שִׁמְעָא
  chosen: Shimea
  alternatives:
  - Shimea
  rationale: Proper name transliterated. 'Shimea' is a standard English representation
    of the Hebrew name.
