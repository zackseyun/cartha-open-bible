id: 1CH.6.8
reference: 1 Chronicles 6:8
source:
  edition: WLC
  text: אֶלְקָנָ֥ה בְנ֛/וֹ וְ/אֶבְיָסָ֥ף בְּנ֖/וֹ וְ/אַסִּ֥יר בְּנֽ/וֹ׃
translation:
  text: Elkanah his son[a], and Ebiasaph his son, and Assir his son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Abiasaph,” following a more familiar traditional transliteration found in some English versions and parallel genealogical forms.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶלְקָנָה
  chosen: Elkanah
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated in keeping with the project's policy for names.
- source_word: בְנוֹ
  chosen: his son
  alternatives:
  - his descendant
  lexicon: HALOT
  rationale: The noun בן with 3ms suffix most directly means 'his son.' In genealogical contexts it can sometimes denote a broader descendant relationship, but the immediate form is singular filial language, so 'his son' is the most transparent rendering.
- source_word: וְ
  chosen: and
  rationale: Simple conjunction linking names in the genealogy; rendered with standard English 'and.'
- source_word: אֶבְיָסָף
  chosen: Ebiasaph
  alternatives:
  - Abiasaph
  lexicon: HALOT
  rationale: Proper personal name. The Chronicles spelling here supports the transliteration 'Ebiasaph' from the given Hebrew form אֶבְיָסָף. 'Abiasaph' reflects a more familiar transliteration in some English traditions and parallel passages, so it is preserved as an alternative.
- source_word: אַסִּיר
  chosen: Assir
  lexicon: HALOT
  rationale: Proper personal name; transliterated directly from the Hebrew.
