id: 1CH.6.49
reference: 1 Chronicles 6:49
source:
  edition: WLC
  text: וַ/יִּתְּנ֥וּ בְנֵי יִשְׂרָאֵ֖ל לַ/לְוִיִּ֑ם אֶת הֶ/עָרִ֖ים וְ/אֶת מִגְרְשֵׁי/הֶֽם־־־׃
translation:
  text: And the sons of Israel gave to the Levites the cities and their pasturelands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their common lands' or 'their surrounding lands.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  chosen: gave
  alternatives:
  - assigned
  - granted
  lexicon: HALOT
  rationale: Qal wayyiqtol of נתן, the standard verb for giving. 'Gave' is the plain
    and natural rendering in this narrative context.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Formally, the Hebrew is 'sons of Israel.' Following the gender-accurate
    principle, the main text preserves the literal expression rather than flattening
    it to 'Israelites,' though that is a valid idiomatic alternative.
- source_word: לַלְוִיִּם
  chosen: to the Levites
  lexicon: HALOT
  rationale: Straightforward dative with the gentilic/tribal designation לְוִיִּם;
    'Levites' is the standard and precise rendering.
- source_word: הֶעָרִים
  chosen: the cities
  alternatives:
  - towns
  lexicon: HALOT
  rationale: עָרִים commonly denotes cities/towns. 'Cities' is retained for consistency
    with the established terminology of Levitical cities in the surrounding context.
- source_word: מִגְרְשֵׁיהֶם
  chosen: their pasturelands
  alternatives:
  - their common lands
  - their surrounding lands
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the open land or pasture area belonging to a city,
    especially in priestly and Levitical allotment texts. 'Pasturelands' best captures
    the concrete land-use sense in readable modern English.
