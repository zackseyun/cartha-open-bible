id: 1CH.6.7
reference: 1 Chronicles 6:7
source:
  edition: WLC
  text: בְּנֵ֖י קְהָ֑ת עַמִּינָדָ֣ב בְּנ֔/וֹ קֹ֥רַח בְּנ֖/וֹ אַסִּ֥יר בְּנֽ/וֹ׃
translation:
  text: 'The sons of Kohath: Amminadab his son[a], Korah his son, Assir his son.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some compare parallel genealogies where the corresponding ancestor is named Izhar rather than Amminadab; the Hebrew text here reads Amminadab.
    reason: textual_variant
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - Descendants of
  lexicon: HALOT
  rationale: Construct plural of בֵּן introducing a genealogy. 'The sons of' is the standard and sufficiently flexible genealogical formula in English; while genealogies can sometimes skip generations, the repeated 'his son' that follows favors retaining the direct filial wording rather than broadening to 'descendants' in the main text.
- source_word: קְהָת
  chosen: Kohath
  alternatives:
  - Qehath
  rationale: Personal name transliterated by standard English biblical convention, per translation philosophy to transliterate names rather than translate them.
- source_word: עַמִּינָדָב
  chosen: Amminadab
  rationale: Personal name transliterated by standard convention. Although this name can be confused with Izhar in comparison with some parallel genealogical traditions, the consonantal text here reads Amminadab and should be represented as such in the main text.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - his descendant
  lexicon: HALOT
  rationale: The singular construct with 3ms suffix marks filial succession in the genealogy. 'His son' preserves the Hebrew form directly; 'his descendant' is possible in genealogical compression but is less textually transparent here.
- source_word: קֹרַח
  chosen: Korah
  rationale: Personal name transliterated by standard English convention.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - his descendant
  lexicon: HALOT
  rationale: Repeated genealogical term; rendered consistently with the prior occurrence to preserve the chain structure of the Hebrew.
- source_word: אַסִּיר
  chosen: Assir
  alternatives:
  - Assirh
  rationale: Personal name transliterated by standard English convention. The form is a proper name here, not translated according to its possible lexical sense.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - his descendant
  lexicon: HALOT
  rationale: Final repeated genealogical term; rendered consistently as 'his son' to mirror the Hebrew genealogy.
