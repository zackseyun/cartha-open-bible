id: 1CH.6.43
reference: 1 Chronicles 6:43
source:
  edition: WLC
  text: וְ/אֶת חִילֵז֙ וְ/אֶת מִגְרָשֶׁ֔י/הָ אֶת דְּבִ֖יר וְ/אֶת מִגְרָשֶֽׁי/הָ־־־־׃
translation:
  text: and Hilen with its pasturelands, Debir with its pasturelands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The place name 'Hilen' reflects the Hebrew form in Chronicles. The parallel
      list in Joshua 21:15 has 'Holon.'
    reason: alternative_reading
lexical_decisions:
- source_word: חִילֵז
  chosen: Hilen
  alternatives:
  - Hilez
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated per project
    philosophy. English tradition often reflects the parallel in Joshua 21:15 as 'Holon,'
    but the Chronicles form here is best represented directly from the Hebrew consonantal/vocalized
    form as 'Hilen.'
- source_word: מִגְרָשֶׁיהָ
  chosen: its pasturelands
  alternatives:
  - its common lands
  - its surrounding lands
  lexicon: HALOT
  rationale: Refers to the open land or pasture area belonging to a Levitical city.
    'Pasturelands' is a clear, established rendering in these allotment lists and
    fits the likely function of the land better than the less transparent 'common
    lands.'
- source_word: דְּבִיר
  chosen: Debir
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention.
- source_word: וְ/אֶת
  chosen: and
  alternatives:
  - with
  lexicon: HALOT
  rationale: In this list context, the conjunction plus object marker introduces another
    listed item. English idiom omits explicit representation of every object marker
    and uses 'and' to connect the sequence naturally.
- source_word: אֶת
  chosen: —
  lexicon: HALOT
  rationale: Direct-object marker has no direct English equivalent and is therefore
    left untranslated, though its syntactic function is reflected in the list structure.
