id: 1CH.6.14
reference: 1 Chronicles 6:14
source:
  edition: WLC
  text: בְּנֵ֥י מְרָרִ֖י מַחְלִ֑י לִבְנִ֥י בְנ֛/וֹ שִׁמְעִ֥י בְנ֖/וֹ עֻזָּ֥ה בְנֽ/וֹ׃
translation:
  text: 'The sons of Merari: Mahli, Libni his son, Shimei his son, Uzzah his son.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more broadly in genealogical style, 'descendants of Merari.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: Construct plural of בֵּן introducing a genealogy. 'Sons of' is the most
    direct rendering and fits the immediate listing of lineage; 'descendants of' is
    possible in genealogical contexts but is less precise here.
- source_word: מְרָרִי
  chosen: Merari
  rationale: Proper personal name; transliterated according to the project's policy
    to transliterate names rather than translate them.
- source_word: מַחְלִי
  chosen: Mahli
  rationale: Proper personal name; standard English transliteration.
- source_word: לִבְנִי
  chosen: Libni
  rationale: Proper personal name; standard English transliteration.
- source_word: בְנוֹ
  chosen: his son
  alternatives:
  - son of him
  lexicon: HALOT
  rationale: The noun with 3ms suffix marks filial relationship in the genealogy.
    English idiom prefers 'his son' after the named individual, preserving the chain
    of descent.
- source_word: שִׁמְעִי
  chosen: Shimei
  rationale: Proper personal name; standard English transliteration.
- source_word: עֻזָּה
  chosen: Uzzah
  alternatives:
  - Uzza
  rationale: Proper personal name. 'Uzzah' is the conventional English transliteration
    for this spelling and helps distinguish it from other similar names.
