id: 1CH.6.54
reference: 1 Chronicles 6:54
source:
  edition: WLC
  text: וְ/אֶת אַיָּלוֹן֙ וְ/אֶת מִגְרָשֶׁ֔י/הָ וְ/אֶת גַּת רִמּ֖וֹן וְ/אֶת מִגְרָשֶֽׁי/הָ־־־־־׃פ
translation:
  text: and Aijalon with its pasturelands[a], and Gath-rimmon with its pasturelands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'common lands' or 'surrounding lands' for 'pasturelands.' The Hebrew term refers to the open land belonging to a city.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַיָּלוֹן
  chosen: Aijalon
  alternatives:
  - Ayalon
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated per project philosophy. 'Aijalon' follows a standard English biblical form.
- source_word: מִגְרָשֶׁיהָ
  chosen: its pasturelands
  alternatives:
  - its common lands
  - its surrounding lands
  - its open land
  lexicon: HALOT
  rationale: Refers to the land surrounding a Levitical city used as open pasture/common land. 'Pasturelands' is clear modern English and fits the chronicler's city-list context better than the less familiar 'suburbs' or more ambiguous 'lands'.
- source_word: גַּת רִמּוֹן
  chosen: Gath-rimmon
  alternatives:
  - Gath Rimmon
  lexicon: HALOT
  rationale: Compound place name; transliterated as a proper noun. Hyphenation helps modern readers recognize it as a single toponym.
- source_word: וְאֶת
  chosen: and
  alternatives:
  - —
  lexicon: BDB
  rationale: The repeated object marker with conjunction structures a list. In English, rendering each occurrence with 'and' produces a natural coordinate list without forcing a wooden repetition of the object marker.
