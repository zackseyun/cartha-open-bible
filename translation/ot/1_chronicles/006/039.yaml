id: 1CH.6.39
reference: 1 Chronicles 6:39
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה֙ מוֹשְׁבוֹתָ֔/ם לְ/טִירוֹתָ֖/ם בִּ/גְבוּלָ֑/ם לִ/בְנֵ֤י אַהֲרֹן֙ לְ/מִשְׁפַּחַ֣ת הַ/קְּהָתִ֔י כִּ֥י לָ/הֶ֖ם הָיָ֥ה הַ/גּוֹרָֽל׃
translation:
  text: These were their dwelling places according to their settlements within their territory[a], for the sons of Aaron, of the family of the Kohathites; for the lot was theirs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to their encampments' or 'in their villages' for 'according to their settlements.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹשְׁבוֹתָם
  chosen: their dwelling places
  alternatives:
  - their habitations
  - their places of residence
  lexicon: HALOT
  rationale: The noun denotes places of dwelling or residence. 'Dwelling places' is natural modern English and preserves the concrete sense better than the more archaic 'habitations'.
- source_word: לְטִירוֹתָם
  chosen: according to their settlements
  alternatives:
  - for their encampments
  - in their villages
  lexicon: HALOT
  rationale: טִירָה can denote a settlement, camp, or enclosed village. In this allotment context, 'settlements' best fits the relation to inhabited sites without overcommitting to either nomadic 'encampments' or specifically rural 'villages'.
- source_word: בִּגְבוּלָם
  chosen: within their territory
  alternatives:
  - in their border
  - within their region
  lexicon: HALOT
  rationale: גְּבוּל commonly refers to a boundary or territory. Because the phrase describes the area assigned to them, 'within their territory' communicates the territorial sense more idiomatically than the literal 'in their border.'
- source_word: לִבְנֵי אַהֲרֹן
  chosen: for the sons of Aaron
  alternatives:
  - belonging to the sons of Aaron
  - to the descendants of Aaron
  lexicon: HALOT
  rationale: A straightforward rendering preserves the familial and priestly designation. 'Sons of Aaron' is the standard biblical idiom and should be retained here.
- source_word: לְמִשְׁפַּחַת הַקְּהָתִי
  chosen: of the family of the Kohathites
  alternatives:
  - of the Kohathite clan
  - for the family of the Kohathite
  lexicon: HALOT
  rationale: The phrase identifies the broader clan affiliation. 'Family of the Kohathites' is clear in English and reflects the collective sense of the gentilic.
- source_word: כִּי לָהֶם הָיָה הַגּוֹרָל
  chosen: for the lot fell to them
  alternatives:
  - because the lot was theirs
  - for theirs was the lot
  lexicon: HALOT
  rationale: The idiom refers to the assignment by lot. 'The lot fell to them' is a natural English equivalent that preserves the allotment imagery better than a flatter possessive construction.
