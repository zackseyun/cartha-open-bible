id: 1CH.6.47
reference: 1 Chronicles 6:47
source:
  edition: WLC
  text: וְ/לִ/בְנֵ֨י גֵרְשׁ֜וֹם לְ/מִשְׁפְּחוֹתָ֗/ם מִ/מַּטֵּ֣ה יִ֠שָׂשכָר וּ/מִ/מַּטֵּ֨ה אָשֵׁ֜ר וּ/מִ/מַּטֵּ֣ה נַפְתָּלִ֗י וּ/מִ/מַּטֵּ֤ה מְנַשֶּׁה֙ בַּ/בָּשָׁ֔ן עָרִ֖ים שְׁלֹ֥שׁ עֶשְׂרֵֽה׃ס
translation:
  text: 'And to the sons of Gershom[a], according to their clans, from the tribe of Issachar, and from the tribe of Asher, and from the tribe of Naphtali[b], and from the tribe of Manasseh in Bashan: thirteen cities.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew spells the clan name here as 'Gershom'; many English versions have 'Gershon.'
    reason: alternative_reading
  - marker: b
    text: Some translations expand 'Manasseh in Bashan' to 'the half-tribe of Manasseh in Bashan' to make the geographical reference explicit; 'half-tribe' is not stated in the Hebrew of this verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִבְנֵי
  chosen: And to the sons of
  alternatives:
  - And for the sons of
  - And to the descendants of
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition with בנים introduces the next allocation in the list. 'Sons of' is a standard genealogical/tribal expression and is natural here; 'descendants of' is possible but less formally aligned with the Hebrew wording.
- source_word: גֵרְשׁוֹם
  chosen: Gershom
  alternatives:
  - Gershon
  lexicon: HALOT
  rationale: The consonantal form here is Gershom. English tradition often has 'Gershon' for the Levitical clan, but this verse's Hebrew spelling supports 'Gershom,' and the translation philosophy prioritizes the source form over inherited English convention.
- source_word: לְמִשְׁפְּחוֹתָם
  chosen: according to their clans
  alternatives:
  - by their families
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal-allotment contexts refers to clan groupings within a tribe. 'Clans' is more precise than the broader English 'families' and fits the administrative/genealogical setting.
- source_word: מִמַּטֵּה
  chosen: from the tribe of
  alternatives:
  - from the staff of
  - from the branch of
  lexicon: HALOT
  rationale: In territorial and genealogical contexts מַטֶּה means 'tribe.' 'From the tribe of' is the idiomatic English equivalent for repeated allotment formulas.
- source_word: יִשָׂשכָר
  chosen: Issachar
  lexicon: HALOT
  rationale: Standard English transliteration of the tribal name.
- source_word: אָשֵׁר
  chosen: Asher
  lexicon: HALOT
  rationale: Standard English transliteration of the tribal name.
- source_word: נַפְתָּלִי
  chosen: Naphtali
  lexicon: HALOT
  rationale: Standard English transliteration of the tribal name.
- source_word: מְנַשֶּׁה בַּבָּשָׁן
  chosen: Manasseh in Bashan
  alternatives:
  - the half-tribe of Manasseh in Bashan
  - Manasseh, in Bashan
  lexicon: HALOT
  rationale: The Hebrew text reads simply 'Manasseh in Bashan.' Since Bashan identifies the Transjordanian Manassite territory, some English versions expand to 'half-tribe,' but that adds information not explicit in this verse. The more restrained rendering preserves the source wording while remaining clear.
- source_word: עָרִים שְׁלֹשׁ עֶשְׂרֵה
  chosen: thirteen cities
  alternatives:
  - 13 cities
  lexicon: HALOT
  rationale: This is the straightforward cardinal-number phrase. Spelling out the number suits Bible translation style better than numerals.
