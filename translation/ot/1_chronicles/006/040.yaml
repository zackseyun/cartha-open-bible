id: 1CH.6.40
reference: 1 Chronicles 6:40
source:
  edition: WLC
  text: וַֽ/יִּתְּנ֥וּ לָ/הֶ֛ם אֶת חֶבְר֖וֹן בְּ/אֶ֣רֶץ יְהוּדָ֑ה וְ/אֶת מִגְרָשֶׁ֖י/הָ
    סְבִיבֹתֶֽי/הָ־־׃
translation:
  text: They gave them Hebron in the land of Judah, with its pasturelands around it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its common lands.' The Hebrew term refers to the open land attached
      to a town, often used for grazing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  chosen: They gave
  alternatives:
  - And they gave
  - So they gave
  lexicon: HALOT
  rationale: Qal wayyiqtol of נתן, the standard narrative form meaning 'and/then they
    gave.' English can omit the conjunction for natural narrative flow while preserving
    the simple past sense.
- source_word: לָהֶם
  chosen: them
  alternatives:
  - to them
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object. In English, 'gave them Hebron'
    is idiomatic and equivalent to 'gave to them Hebron.'
- source_word: חֶבְרוֹן
  chosen: Hebron
  lexicon: HALOT
  rationale: Proper place name; transliterated according to the translation philosophy
    of transliterating names.
- source_word: בְּאֶרֶץ יְהוּדָה
  chosen: in the land of Judah
  alternatives:
  - in Judah
  - in the territory of Judah
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'territory.' 'Land of Judah' is a clear, natural
    rendering that preserves the geographic designation without over-specifying.
- source_word: מִגְרָשֶׁיהָ
  chosen: its pasturelands
  alternatives:
  - its common lands
  - its surrounding lands
  - its open land
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the open land or pasture area belonging to a city,
    especially in Levitical-city contexts. 'Pasturelands' best conveys the functional
    sense in accessible modern English.
- source_word: סְבִיבֹתֶיהָ
  chosen: around it
  alternatives:
  - surrounding it
  - all around it
  lexicon: HALOT
  rationale: This noun with suffix denotes the areas around the city. 'Around it'
    is concise and natural, and it modifies the pasturelands as belonging to the area
    surrounding Hebron.
