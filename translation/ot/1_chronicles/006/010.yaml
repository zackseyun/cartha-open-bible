id: 1CH.6.10
reference: 1 Chronicles 6:10
source:
  edition: WLC
  text: וּ/בְנֵי֙ אֶלְקָנָ֔ה עֲמָשַׂ֖י וַ/אֲחִימֽוֹת׃
translation:
  text: 'And the sons of Elkanah: Amasai and Ahimoth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following some English spelling conventions, 'Amassai.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: The conjunction ו is carried forward as 'And' to preserve the genealogical
    sequence, and בְנֵי in construct with the following proper name is most naturally
    'sons of.'
- source_word: אֶלְקָנָה
  chosen: Elkanah
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to the project's policy
    to transliterate names rather than translate them.
- source_word: עֲמָשַׂי
  chosen: Amasai
  alternatives:
  - Amassai
  lexicon: HALOT
  rationale: Proper personal name. 'Amasai' is a standard English transliteration
    of the Hebrew form; alternate spellings exist in English tradition.
- source_word: וַ/אֲחִימוֹת
  chosen: and Ahimoth
  lexicon: HALOT
  rationale: The prefixed conjunction is rendered 'and,' and the proper name is transliterated
    'Ahimoth.'
