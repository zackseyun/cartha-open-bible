id: 1CH.6.11
reference: 1 Chronicles 6:11
source:
  edition: WLC
  text: אֶלְקָנָ֑ה בנ/ו אֶלְקָנָ֔ה צוֹפַ֥י בְּנ֖/וֹ וְ/נַ֥חַת בְּנֽ/וֹ׃
translation:
  text: Elkanah his son, Elkanah his son, Zophai his son, and Nahath his son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Zuphai,” reflecting a different vocalization/transliteration tradition
      for the name צוֹפַי.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶלְקָנָה
  chosen: Elkanah
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated in keeping
    with the project's policy for names.
- source_word: בְּנוֹ / בנו
  chosen: his son
  alternatives:
  - son of him
  lexicon: HALOT
  rationale: Construct noun with 3ms suffix in a genealogy; idiomatic English is 'his
    son.' Repeated each time to preserve the genealogical cadence of the Hebrew.
- source_word: צוֹפַי
  chosen: Zophai
  alternatives:
  - Zuphai
  lexicon: HALOT
  rationale: Proper name transliterated. The consonantal form here supports 'Zophai';
    an alternative English transliteration 'Zuphai' reflects a different vocalization/tradition
    and is worth preserving in a footnote.
- source_word: וְ
  chosen: and
  alternatives:
  - then
  lexicon: HALOT
  rationale: Simple conjunction linking the final name in the sequence; 'and' is the
    natural genealogical connective in English.
- source_word: נַחַת
  chosen: Nahath
  lexicon: HALOT
  rationale: Proper personal name; transliterated directly.
