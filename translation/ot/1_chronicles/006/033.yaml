theological_decisions:
- issue: Relation of "tabernacle" and "house of God" in a Chronicler context
  chosen_reading: Rendered both terms distinctly as "the tabernacle of the house of God" rather than collapsing them into a single term like "temple."
  alternative_readings:
  - '"the service of God''s temple tent"'
  - '"the service of the house of God"'
  rationale: The Hebrew contains both מִשְׁכַּן and בֵּית הָאֱלֹהִים. Preserving both avoids flattening the Chronicler's wording and respects the textual tension between tabernacle language and house/temple language.
  doctrine_reference: Translation philosophy §3, §5
