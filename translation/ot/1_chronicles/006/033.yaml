id: 1CH.6.33
reference: 1 Chronicles 6:33
source:
  edition: WLC
  text: וַ/אֲחֵי/הֶ֖ם הַ/לְוִיִּ֑ם נְתוּנִ֕ים לְ/כָ֨ל עֲבוֹדַ֔ת מִשְׁכַּ֖ן בֵּ֥ית הָ/אֱלֹהִֽים־׃
translation:
  text: And their brothers the Levites were appointed for all the service of the tabernacle of the house of God[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "were given"; the Hebrew participle is literally "given," here in the sense of being assigned or appointed to duty.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲחֵיהֶם
  chosen: And their brothers
  alternatives:
  - And their kinsmen
  - Now their brothers
  lexicon: HALOT
  rationale: The conjunction waw is rendered simply as "And" in narrative/list context. אֲחֵי with 3mp suffix means "their brothers," which can denote fellow clan members/kinsmen; "brothers" preserves the Hebrew kinship term more transparently.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Straightforward gentilic/tribal designation referring to members of Levi. "Levites" is the standard and precise English rendering.
- source_word: נְתוּנִים
  chosen: were appointed
  alternatives:
  - were given
  - were assigned
  lexicon: HALOT
  rationale: Passive participle from נתן, literally "given." In this administrative/cultic context, the sense is functional designation or assignment to duty. "Were appointed" communicates the idiomatic force in natural English while staying close to the source. The more literal "were given" is preserved as an alternative because it reflects the Hebrew form directly.
- source_word: לְכָל
  chosen: for all
  alternatives:
  - for every
  - to all
  lexicon: HALOT
  rationale: 'The preposition ל plus כָּל here marks purpose/sphere of assignment: they were appointed for the entirety of the work. "For all" is concise and natural.'
- source_word: עֲבוֹדַת
  chosen: the service
  alternatives:
  - the work
  - the ministry
  lexicon: HALOT
  rationale: עֲבוֹדָה in cultic contexts denotes service/work performed in worship settings. "Service" best captures the temple/tabernacle labor without importing later ecclesiastical terminology. "Ministry" would sound too anachronistic here.
- source_word: מִשְׁכַּן
  chosen: the tabernacle
  alternatives:
  - the dwelling
  - the sanctuary
  lexicon: HALOT
  rationale: מִשְׁכָּן commonly refers to the tabernacle/dwelling place of God. In Chronicles' cultic register, "tabernacle" is the most recognizable and contextually fitting rendering.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - God's house
  - the temple of God
  lexicon: HALOT
  rationale: Literally "house of God." Although "temple of God" could fit conceptually, the Hebrew says "house," and retaining it preserves the wording while remaining clear. The construct with "tabernacle" yields "the tabernacle of the house of God," likely referring to the sacred dwelling associated with God's house.
