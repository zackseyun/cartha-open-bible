id: 1CH.6.6
reference: 1 Chronicles 6:6
source:
  edition: WLC
  text: יוֹאָ֤ח בְּנ/וֹ֙ עִדּ֣וֹ בְנ֔/וֹ זֶ֥רַח בְּנ֖/וֹ יְאָתְרַ֥י בְּנֽ/וֹ׃
translation:
  text: Joah his son, Iddo his son, Zerah his son, Jeatherai his son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Jetherai.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹאָח
  chosen: Joah
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated in keeping
    with the project policy for names.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - his descendant
  lexicon: HALOT
  rationale: בן with 3ms suffix in a genealogy most naturally means direct filial
    succession in the list format. While genealogies can sometimes telescope generations,
    the lexical value here is still 'son,' and English genealogy style preserves that
    wording.
- source_word: עִדּוֹ
  chosen: Iddo
  lexicon: HALOT
  rationale: Proper personal name; standard English transliteration.
- source_word: זֶרַח
  chosen: Zerah
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard convention.
- source_word: יְאָתְרַי
  chosen: Jeatherai
  alternatives:
  - Jetherai
  lexicon: HALOT
  rationale: Proper personal name. The consonantal form supports a transliteration
    like 'Jeatherai'; 'Jetherai' reflects a common alternate English representation
    and is worth preserving as a lexical alternative.
