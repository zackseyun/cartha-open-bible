id: 1CH.6.4
reference: 1 Chronicles 6:4
source:
  edition: WLC
  text: בְּנֵ֥י מְרָרִ֖י מַחְלִ֣י וּ/מֻשִׁ֑י וְ/אֵ֛לֶּה מִשְׁפְּח֥וֹת הַ/לֵּוִ֖י לַ/אֲבוֹתֵי/הֶֽם׃
translation:
  text: 'The sons of Merari: Mahli and Mushi. These were the clans of the Levites
    according to their fathers’ houses.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “families” for “clans.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally “according to their fathers”; the sense in this genealogical
      context is classification by paternal houses or ancestral households.
    reason: cultural_note
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: Construct plural of בן introducing a genealogy. 'Sons of' is the standard
    and sufficiently natural rendering in genealogical contexts; 'descendants of'
    is possible but broader than the immediate list of named offspring.
- source_word: מְרָרִי
  chosen: Merari
  rationale: Proper personal name; transliterated per translation philosophy.
- source_word: מַחְלִי
  chosen: Mahli
  rationale: Proper personal name; transliterated.
- source_word: וּמֻשִׁי
  chosen: and Mushi
  rationale: Proper personal name with conjunction; transliterated and coordinated
    with the previous name.
- source_word: וְאֵלֶּה
  chosen: These were
  alternatives:
  - And these were
  - These are
  lexicon: HALOT
  rationale: Deictic plural introducing a summarizing statement. English supplies
    'were' for smooth idiom in a past genealogical narrative. The conjunction is not
    emphasized in English because it would sound wooden.
- source_word: מִשְׁפְּחוֹת
  chosen: the clans
  alternatives:
  - the families
  lexicon: HALOT
  rationale: In tribal/genealogical contexts, מִשְׁפָּחוֹת denotes kinship groupings
    larger than nuclear families. 'Clans' best captures the social unit in modern
    English.
- source_word: הַלֵּוִי
  chosen: of the Levite
  alternatives:
  - of Levi
  - of the Levites
  lexicon: HALOT
  rationale: The singular gentilic/adjectival form with article most naturally refers
    to the tribal ancestor Levi in a genealogical formula. 'Of the Levite' preserves
    the Hebrew form more closely than 'of Levi,' while still indicating lineage. 'Of
    the Levites' would shift to a plural group not expressed here.
- source_word: לַאֲבוֹתֵיהֶם
  chosen: according to their fathers’ houses
  alternatives:
  - by their fathers
  - according to their ancestral houses
  lexicon: HALOT
  rationale: Literally 'to/according to their fathers.' In genealogical register this
    idiom points to paternal-house classification. English commonly makes the implied
    sense explicit as 'fathers’ houses' or 'ancestral houses'; this avoids an opaque
    literalism while preserving the organizational idea.
