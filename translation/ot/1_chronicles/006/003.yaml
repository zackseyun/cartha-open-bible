id: 1CH.6.3
reference: 1 Chronicles 6:3
source:
  edition: WLC
  text: וּ/בְנֵ֖י קְהָ֑ת עַמְרָ֣ם וְ/יִצְהָ֔ר וְ/חֶבְר֖וֹן וְ/עֻזִּיאֵֽל׃
translation:
  text: 'And the sons of Kohath: Amram, Izhar, Hebron, and Uzziel.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: The conjunction ו is rendered as "And" to preserve the genealogical sequence,
    and בְנֵי in construct is most naturally "sons of" in a lineage list. Although
    "descendants of" can sometimes be used in genealogies, here the following four
    named individuals are the immediate sons of Kohath, so the more specific "sons
    of" is preferred.
- source_word: קְהָת
  chosen: Kohath
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention, following
    the translation philosophy to transliterate personal names rather than translate
    them.
- source_word: עַמְרָם
  chosen: Amram
  lexicon: HALOT
  rationale: Proper name transliterated in its standard English form.
- source_word: וְיִצְהָר
  chosen: Izhar
  lexicon: HALOT
  rationale: The prefixed conjunction is represented in the English list structure;
    the personal name is transliterated in standard English form.
- source_word: וְחֶבְרוֹן
  chosen: Hebron
  lexicon: HALOT
  rationale: Here חֶבְרוֹן is a personal name, not the city name in a geographical
    sense. It is therefore transliterated as the standard English proper name within
    the genealogy.
- source_word: וְעֻזִּיאֵל
  chosen: Uzziel
  lexicon: HALOT
  rationale: Proper name transliterated in its standard English form; the conjunction
    is carried by the English "and" before the final item.
