id: 1CH.6.55
reference: 1 Chronicles 6:55
source:
  edition: WLC
  text: וּ/מִֽ/מַּחֲצִית֙ מַטֵּ֣ה מְנַשֶּׁ֔ה אֶת עָנֵר֙ וְ/אֶת מִגְרָשֶׁ֔י/הָ וְ/אֶת בִּלְעָ֖ם וְ/אֶת מִגְרָשֶׁ֑י/הָ לְ/מִשְׁפַּ֥חַת לִ/בְנֵי קְהָ֖ת הַ/נּוֹתָרִֽים־־־־־׃פ
translation:
  text: 'And from the half-tribe of Manasseh: Aner with its pasturelands[a], and Bileam with its pasturelands, for the clan of the remaining sons of Kohath.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Bileam; the parallel in Joshua 21:25 reads Ibleam.
    reason: textual_variant
lexical_decisions:
- source_word: וּמִמַּחֲצִית מַטֵּה מְנַשֶּׁה
  chosen: And from the half-tribe of Manasseh
  alternatives:
  - And from half the tribe of Manasseh
  lexicon: HALOT
  rationale: מַחֲצִית means 'half' or 'half-part,' and מַטֶּה in tribal allotment contexts is 'tribe.' English idiom favors 'half-tribe' as a compact rendering for the territorial subdivision.
- source_word: אֶת עָנֵר
  chosen: Aner
  rationale: Personal/place name transliterated according to the project's policy to transliterate names rather than translate them.
- source_word: מִגְרָשֶׁיהָ
  chosen: its pasturelands
  alternatives:
  - its surrounding lands
  - its common lands
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the open land or pastureland attached to a town, especially Levitical cities. 'Pasturelands' is clear and contextually appropriate in allotment lists.
- source_word: בִּלְעָם
  chosen: Bileam
  alternatives:
  - Ibleam
  rationale: The consonantal text here reads בִּלְעָם, best represented as 'Bileam.' However, the parallel in Joshua 21:25 has 'Ibleam,' so the alternative is worth preserving in a footnote as a likely harmonizing or textual consideration.
- source_word: לְמִשְׁפַּחַת לִבְנֵי קְהָת הַנּוֹתָרִים
  chosen: for the clan of the remaining sons of Kohath
  alternatives:
  - for the families of the remaining sons of Kohath
  - for the family of the rest of the sons of Kohath
  lexicon: HALOT
  rationale: מִשְׁפָּחָה can denote a clan or family-group within a tribe. The singular here is naturally collective in English, hence 'the clan.' הַנּוֹתָרִים means 'the remaining' or 'those left over,' referring to the Kohathite lines not yet assigned cities.
