id: 1CH.6.28
reference: 1 Chronicles 6:28
source:
  edition: WLC
  text: בֶּן יַ֥חַת בֶּן גֵּרְשֹׁ֖ם בֶּן לֵוִֽי־־־׃ס
translation:
  text: son of Jahath, son of Gershom, son of Levi.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more broadly in genealogical style, 'descendant of Jahath ... descendant
      of Gershom ... descendant of Levi.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew reads 'Gershom'; some readers may expect 'Gershon' from other genealogical
      contexts, but the form here is distinct in the source text.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The construct noun בֶּן in a genealogy most naturally means 'son of.'
    Although genealogies can sometimes telescope generations and thus imply broader
    descent, nothing in this short lineage requires weakening the immediate filial
    sense in the main text.
- source_word: יַחַת
  chosen: Jahath
  alternatives:
  - Yahath
  rationale: Personal names are transliterated by standard English convention per
    project philosophy. 'Jahath' is a common conventional English form for יַחַת.
- source_word: גֵּרְשֹׁם
  chosen: Gershom
  alternatives:
  - Gershon
  rationale: The consonantal form here is גֵּרְשֹׁם, which is conventionally transliterated
    'Gershom.' This should not be normalized to 'Gershon,' a distinct though related
    name form found elsewhere.
- source_word: לֵוִי
  chosen: Levi
  rationale: Personal name transliterated directly and conventionally into English
    as 'Levi.'
