id: 1CH.6.27
reference: 1 Chronicles 6:27
source:
  edition: WLC
  text: בֶּן אֵיתָ֥ן בֶּן זִמָּ֖ה בֶּן שִׁמְעִֽי־־־׃
translation:
  text: son of Ethan[a], son of Zimmah, son of Shimei.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew genealogies may sometimes skip generations; thus 'son of' can, in some contexts, function more broadly as 'descendant of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The construct noun בֶּן in genealogical lists is most naturally rendered 'son of.' While Hebrew genealogies can sometimes telescope generations and thus imply 'descendant of,' the immediate form here is the standard genealogical formula, so 'son of' best reflects the surface text without over-interpreting.
- source_word: אֵיתָן
  chosen: Ethan
  rationale: Personal name transliterated according to standard English convention, following the translation philosophy to transliterate names rather than translate them.
- source_word: זִמָּה
  chosen: Zimmah
  rationale: Personal name transliterated by standard convention. Although the underlying root can carry lexical meaning elsewhere, here it functions strictly as a proper name.
- source_word: שִׁמְעִי
  chosen: Shimei
  alternatives:
  - Shimi
  rationale: Proper name transliterated in its conventional English biblical form 'Shimei.' A more tightly phonetic rendering such as 'Shimi' is possible, but 'Shimei' is the established and recognizable transliteration for this name in English Bible tradition.
