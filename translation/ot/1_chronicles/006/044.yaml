id: 1CH.6.44
reference: 1 Chronicles 6:44
source:
  edition: WLC
  text: וְ/אֶת עָשָׁן֙ וְ/אֶת מִגְרָשֶׁ֔י/הָ וְ/אֶת בֵּ֥ית שֶׁ֖מֶשׁ וְ/אֶת מִגְרָשֶֽׁי/הָ־־־־׃ס
translation:
  text: Ashan with its pasturelands, and Beth-shemesh with its pasturelands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some parallel witnesses and translations list 'Ain' instead of 'Ashan' here;
      the Masoretic Text of Chronicles reads 'Ashan.'
    reason: textual_variant
lexical_decisions:
- source_word: עָשָׁן
  chosen: Ashan
  alternatives:
  - Ain
  lexicon: HALOT
  rationale: Proper place name; transliterated per translation philosophy. Although
    some parallel lists read 'Ain' (cf. Josh 21:16), the Chronicles text here reads
    עָשָׁן, so the main text follows the MT form.
- source_word: מִגְרָשֶׁיהָ
  chosen: its pasturelands
  alternatives:
  - its common lands
  - its surrounding lands
  lexicon: HALOT
  rationale: מִגְרָשׁ denotes the open land or pasture area belonging to a town. 'Pasturelands'
    is a clear, established rendering in Levitical-city contexts and fits the plural
    construct with 3fs suffix ('her/its').
- source_word: בֵּית שֶׁמֶשׁ
  chosen: Beth-shemesh
  alternatives:
  - بيت شׁמש transliterated without hyphen
  - House of the Sun
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated, in keeping
    with the policy to transliterate names. The hyphen reflects standard English convention
    for this toponym.
- source_word: וְאֶת
  chosen: and
  alternatives:
  - —
  lexicon: Hebrew grammar
  rationale: The repeated object marker with conjunction structures a list of towns
    and their lands. In idiomatic English, the object marker is not represented, while
    the conjunction is carried by 'and'.
