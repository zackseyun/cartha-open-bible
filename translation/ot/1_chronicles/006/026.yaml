id: 1CH.6.26
reference: 1 Chronicles 6:26
source:
  edition: WLC
  text: בֶּן אֶתְנִ֥י בֶן זֶ֖רַח בֶּן עֲדָיָֽה־־־׃
translation:
  text: the son of Ethni, the son of Zerah, the son of Adaiah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן
  chosen: the son of
  alternatives:
  - son of
  lexicon: HALOT
  rationale: In this genealogical list, בֶּן marks direct descent. Rendering it as
    'the son of' preserves the formal genealogical structure in clear English. The
    repeated article helps the line read naturally as a sequence within a genealogy.
- source_word: אֶתְנִי
  chosen: Ethni
  alternatives:
  - Ethniy
  rationale: Personal names are transliterated rather than translated, following the
    project philosophy. 'Ethni' is the standard English transliteration of the Hebrew
    proper name here.
- source_word: זֶרַח
  chosen: Zerah
  alternatives:
  - Zerach
  rationale: This is a proper name and is therefore transliterated. 'Zerah' is the
    conventional and readable English form.
- source_word: עֲדָיָה
  chosen: Adaiah
  alternatives:
  - Adayah
  rationale: This proper name is transliterated by standard convention. 'Adaiah' is
    the established English form and fits the translation philosophy of readable modern
    English while preserving the Hebrew name.
