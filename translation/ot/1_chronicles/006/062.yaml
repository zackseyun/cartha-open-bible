id: 1CH.6.62
reference: 1 Chronicles 6:62
source:
  edition: WLC
  text: לִ/בְנֵ֣י מְרָרִי֮ הַ/נּוֹתָרִים֒ מִ/מַּטֵּ֣ה זְבוּלֻ֔ן אֶת רִמּוֹנ֖וֹ וְ/אֶת מִגְרָשֶׁ֑י/הָ אֶת תָּב֖וֹר וְ/אֶת מִגְרָשֶֽׁי/הָ־־־־׃
translation:
  text: 'To the sons of Merari who remained[a], from the tribe of Zebulun: Rimmono and its pasturelands, Tabor and its pasturelands.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads 'Rimmono'; the parallel in Joshua 21:35 has 'Dimnah.'
    reason: textual_variant
lexical_decisions:
- source_word: לִבְנֵי
  chosen: To the sons of
  alternatives:
  - For the sons of
  lexicon: HALOT
  rationale: The prefixed ל marks indirect object/allotment in this distribution list. 'To the sons of' fits the context of cities being assigned.
- source_word: מְרָרִי
  chosen: Merari
  lexicon: HALOT
  rationale: Proper personal name; transliterated per translation philosophy.
- source_word: הַנּוֹתָרִים
  chosen: who remained
  alternatives:
  - the rest
  - who were left
  lexicon: HALOT
  rationale: Participial form from יתר/נותר indicates those remaining after prior allotments. 'Who remained' is natural English and preserves the sequential sense.
- source_word: מִמַּטֵּה זְבוּלֻן
  chosen: from the tribe of Zebulun
  alternatives:
  - from the staff/tribe of Zebulun
  lexicon: HALOT
  rationale: מַטֶּה in tribal-allotment contexts means 'tribe,' not literal 'staff.' 'From the tribe of Zebulun' is the standard contextual sense.
- source_word: רִמּוֹנוֹ
  chosen: Rimmono
  alternatives:
  - Dimnah
  lexicon: HALOT
  rationale: The MT reads the place-name Rimmono. The alternative 'Dimnah' reflects the parallel list in Joshua 21:35 and some versions, but the consonantal Hebrew here supports 'Rimmono.'
- source_word: מִגְרָשֶׁיהָ
  chosen: its pasturelands
  alternatives:
  - its common lands
  - its surrounding lands
  lexicon: HALOT
  rationale: In Levitical city lists, מִגְרָשׁ denotes the open land/pastureland belonging to a town. 'Pasturelands' is clear and contextually precise.
- source_word: תָּבוֹר
  chosen: Tabor
  lexicon: HALOT
  rationale: Proper place name; transliterated. In this list it refers to the town so named, not necessarily the mountain as a topographical feature.
