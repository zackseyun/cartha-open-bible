id: 1CH.6.42
reference: 1 Chronicles 6:42
source:
  edition: WLC
  text: וְ/לִ/בְנֵ֣י אַהֲרֹ֗ן נָתְנוּ֙ אֶת עָרֵ֣י הַ/מִּקְלָ֔ט אֶת חֶבְר֥וֹן וְ/אֶת
    לִבְנָ֖ה וְ/אֶת מִגְרָשֶׁ֑י/הָ וְ/אֶת יַתִּ֥ר וְ/אֶֽת אֶשְׁתְּמֹ֖עַ וְ/אֶת מִגְרָשֶֽׁי/הָ־־־־־־־׃
translation:
  text: 'And to the sons of Aaron they gave the cities of refuge: Hebron, and Libnah
    with its pasturelands, and Jattir, and Eshtemoa with its pasturelands.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'common lands' for 'pasturelands'; the Hebrew refers to the open land
      belonging to a town.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לִ/בְנֵי אַהֲרֹן
  chosen: And to the sons of Aaron
  alternatives:
  - And for the sons of Aaron
  - And to Aaron's sons
  lexicon: HALOT
  rationale: The preposition ל marks indirect object/recipient, so 'to the sons of
    Aaron' is the most straightforward rendering. 'Sons' is retained rather than 'descendants'
    for gender-accurate fidelity to the Hebrew while still idiomatic in genealogical/tribal
    context.
- source_word: נָתְנוּ
  chosen: they gave
  alternatives:
  - they assigned
  - they granted
  lexicon: HALOT
  rationale: נתן commonly means 'give.' In this allotment context 'assigned' is possible,
    but 'gave' stays closer to the Hebrew and remains clear in English.
- source_word: עָרֵי הַמִּקְלָט
  chosen: the cities of refuge
  alternatives:
  - the refuge cities
  - the asylum cities
  lexicon: HALOT
  rationale: This is the standard and accurate rendering of the legal term for designated
    asylum cities in the Torah. 'Cities of refuge' is both clear and established without
    being misleading.
- source_word: אֶת חֶבְרוֹן
  chosen: Hebron
  lexicon: HALOT
  rationale: Proper place name, transliterated by standard English convention.
- source_word: וְאֶת לִבְנָה
  chosen: and Libnah
  lexicon: HALOT
  rationale: Proper place name, transliterated by standard English convention.
- source_word: מִגְרָשֶׁיהָ
  chosen: with its pasturelands
  alternatives:
  - with its surrounding pasturelands
  - with its common lands
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the open land/pastureland belonging to a town. 'Pasturelands'
    is natural modern English and fits the Levitical-city context better than the
    archaic 'suburbs' or less transparent 'common lands.' The suffix is singular feminine,
    referring to the immediately preceding city.
- source_word: וְאֶת יַתִּר
  chosen: and Jattir
  lexicon: HALOT
  rationale: Proper place name, transliterated by standard English convention.
- source_word: וְאֶת אֶשְׁתְּמֹעַ
  chosen: and Eshtemoa
  alternatives:
  - and Eshtemoa
  lexicon: HALOT
  rationale: Proper place name. 'Eshtemoa' is a standard English transliteration;
    a minor spelling variant exists in English tradition.
- source_word: וְאֶת מִגְרָשֶׁיהָ
  chosen: with its pasturelands
  alternatives:
  - with its surrounding pasturelands
  - with its common lands
  lexicon: HALOT
  rationale: Repeated term rendered consistently. The suffix again refers to the immediately
    preceding city, Eshtemoa.
