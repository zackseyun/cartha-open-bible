id: 1CH.6.37
reference: 1 Chronicles 6:37
source:
  edition: WLC
  text: מְרָי֥וֹת בְּנ֛/וֹ אֲמַרְיָ֥ה בְנ֖/וֹ אֲחִיט֥וּב בְּנֽ/וֹ׃
translation:
  text: Meraioth his son, Amariah his son, Ahitub his son.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מְרָי֥וֹת
  chosen: Meraioth
  alternatives:
  - Merayoth
  rationale: Proper personal name; per translation philosophy, names are transliterated
    rather than translated. 'Meraioth' follows standard English biblical convention.
- source_word: בְּנ֛וֹ
  chosen: his son
  alternatives:
  - son of him
  lexicon: HALOT
  rationale: Construct form of בֵּן with 3ms suffix in a genealogy. 'His son' is natural
    English and preserves the filial succession indicated in the Hebrew.
- source_word: אֲמַרְיָ֥ה
  chosen: Amariah
  alternatives:
  - Amaryah
  rationale: Proper personal name, transliterated by standard convention.
- source_word: בְנ֖וֹ
  chosen: his son
  alternatives:
  - son of him
  lexicon: HALOT
  rationale: Repeated genealogical formula; rendered consistently with the previous
    occurrence for clarity and lineage structure.
- source_word: אֲחִיט֥וּב
  chosen: Ahitub
  alternatives:
  - Ahiṭub
  rationale: Proper personal name, transliterated in standard English form.
- source_word: בְּנֽוֹ
  chosen: his son
  alternatives:
  - son of him
  lexicon: HALOT
  rationale: Final repetition of the genealogical marker. Retained explicitly rather
    than compressed, because the Hebrew lists each generation individually.
