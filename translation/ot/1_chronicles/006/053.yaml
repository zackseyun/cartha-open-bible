id: 1CH.6.53
reference: 1 Chronicles 6:53
source:
  edition: WLC
  text: וְ/אֶֽת יָקְמְעָם֙ וְ/אֶת מִגְרָשֶׁ֔י/הָ וְ/אֶת בֵּ֥ית חוֹר֖וֹן וְ/אֶת מִגְרָשֶֽׁי/הָ־־־־׃
translation:
  text: and Jokmeam with its pasturelands[b][a], and Beth-horon with its pasturelands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Jokmeam''; some English traditions read ''Jokneam'' in relation to parallel place-name traditions.'
    reason: alternative_reading
  - marker: b
    text: Or 'common lands' or 'surrounding pasturelands' for the land attached to each city.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָקְמְעָם
  chosen: Jokmeam
  alternatives:
  - Jokneam
  lexicon: HALOT
  rationale: Transliterated as a place name according to the consonantal form in Chronicles. An alternative English form 'Jokneam' appears in some traditions due to relation with other biblical references, but the MT here supports 'Jokmeam'.
- source_word: מִגְרָשֶׁיהָ
  chosen: its pasturelands
  alternatives:
  - its common lands
  - its surrounding lands
  lexicon: HALOT
  rationale: מִגְרָשׁ in Levitical-city contexts refers to the open land or pastureland belonging to a town. 'Pasturelands' is clear modern English and fits the chronicler's city-list context better than the less transparent 'common lands'.
- source_word: בֵּית חוֹרוֹן
  chosen: Beth-horon
  alternatives:
  - Beth Horon
  lexicon: HALOT
  rationale: Transliterated as the standard English place name. Hyphenation helps readers recognize the compound Hebrew toponym while preserving conventional form.
- source_word: וְאֶת
  chosen: and
  alternatives:
  - with
  lexicon: HALOT
  rationale: In this list context, the repeated object marker with conjunction is naturally rendered by simple English coordination, 'and,' rather than mechanically reproducing each object marker.
