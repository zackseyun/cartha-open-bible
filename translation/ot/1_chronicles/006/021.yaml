id: 1CH.6.21
reference: 1 Chronicles 6:21
source:
  edition: WLC
  text: בֶּן אֶלְקָנָה֙ בֶּן יוֹאֵ֔ל בֶּן עֲזַרְיָ֖ה בֶּן צְפַנְיָֽה־־־־׃
translation:
  text: the son of Elkanah[a], the son of Joel, the son of Azariah, the son of Zephaniah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'descendant of' at each occurrence of 'son of,' since Hebrew genealogies can sometimes telescope generations; here, however, the immediate genealogical sequence supports 'son of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן
  chosen: the son of
  alternatives:
  - son of
  - descendant of
  lexicon: HALOT
  rationale: In genealogical lists, בֶּן marks filial descent. Rendering it as 'the son of' preserves the repetitive genealogical style of the Hebrew and reads naturally in English. 'Descendant of' is possible in some genealogies, but here the immediate chain favors the more specific 'son of'.
- source_word: אֶלְקָנָה
  chosen: Elkanah
  rationale: 'Personal name transliterated according to the translation philosophy: names are transliterated rather than translated.'
- source_word: יוֹאֵל
  chosen: Joel
  alternatives:
  - Yoel
  rationale: Standard English transliteration of the personal name. 'Yoel' is a more directly phonetic transliteration from Hebrew, but 'Joel' is the established standard English form and remains transparent.
- source_word: עֲזַרְיָה
  chosen: Azariah
  rationale: Personal name transliterated by standard English convention.
- source_word: צְפַנְיָה
  chosen: Zephaniah
  alternatives:
  - Zephanyah
  rationale: Personal name transliterated by standard English convention. 'Zephaniah' is the familiar English form; a more phonetic transliteration is possible but less idiomatic for readers.
