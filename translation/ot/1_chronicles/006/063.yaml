id: 1CH.6.63
reference: 1 Chronicles 6:63
source:
  edition: WLC
  text: וּ/מֵ/עֵ֜בֶר לְ/יַרְדֵּ֣ן יְרֵחוֹ֮ לְ/מִזְרַ֣ח הַ/יַּרְדֵּן֒ מִ/מַּטֵּ֣ה רְאוּבֵ֔ן אֶת בֶּ֥צֶר בַּ/מִּדְבָּ֖ר וְ/אֶת מִגְרָשֶׁ֑י/הָ וְ/אֶת יַ֖הְצָ/ה וְ/אֶת מִגְרָשֶֽׁי/הָ־־־־׃
translation:
  text: 'And beyond the Jordan at Jericho[a], east of the Jordan, from the tribe of Reuben: Bezer in the wilderness, with its pasturelands, and Jahzah, with its pasturelands.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jahzah is also rendered 'Jahaz' in some English translations.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵעֵבֶר
  chosen: And beyond
  alternatives:
  - And from across
  - And on the other side of
  lexicon: HALOT
  rationale: The prepositional compound introduces the next geographic allotment in the list. 'Beyond' is concise and natural in English while preserving the spatial sense of the Hebrew.
- source_word: לְיַרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: Refers to the Jordan as a known geographic boundary. English commonly uses 'the Jordan'; 'River' is possible but not required by the Hebrew.
- source_word: יְרֵחוֹ
  chosen: at Jericho
  alternatives:
  - Jericho
  lexicon: HALOT
  rationale: Used appositionally to locate the region relative to Jericho. 'At Jericho' gives the locative force naturally in English.
- source_word: לְמִזְרַח הַיַּרְדֵּן
  chosen: east of the Jordan
  alternatives:
  - toward the sunrise of the Jordan
  - on the east side of the Jordan
  lexicon: HALOT
  rationale: מִזְרָח denotes east/eastward. 'East of the Jordan' is idiomatic and accurately conveys the geographic orientation.
- source_word: מִמַּטֵּה רְאוּבֵן
  chosen: from the tribe of Reuben
  alternatives:
  - from the staff/tribe of Reuben
  - from the clan of Reuben
  lexicon: HALOT
  rationale: מַטֶּה in tribal allotment contexts means 'tribe.' 'From the tribe of Reuben' is the standard and contextually precise rendering.
- source_word: בֶּצֶר
  chosen: Bezer
  lexicon: HALOT
  rationale: Proper place name; transliterated according to the translation philosophy of transliterating names.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the pastureland
  - in the desert
  lexicon: HALOT
  rationale: The phrase distinguishes this Bezer geographically. 'Wilderness' is the most common and contextually suitable rendering of מִדְבָּר here.
- source_word: מִגְרָשֶׁיהָ
  chosen: its pasturelands
  alternatives:
  - its common lands
  - its surrounding lands
  lexicon: HALOT
  rationale: In Levitical-city lists, מִגְרָשׁ refers to the open land/pastureland belonging to a city. 'Pasturelands' is both accurate and readable.
- source_word: יַהְצָה
  chosen: Jahzah
  alternatives:
  - Jahaz
  lexicon: HALOT
  rationale: The Hebrew form here supports the transliteration 'Jahzah.' 'Jahaz' is a familiar variant in English tradition and is worth preserving as an alternative.
