id: 1CH.6.48
reference: 1 Chronicles 6:48
source:
  edition: WLC
  text: לִ/בְנֵ֨י מְרָרִ֜י לְ/מִשְׁפְּחוֹתָ֗/ם מִ/מַּטֵּ֣ה רְ֠אוּבֵן וּֽ/מִ/מַּטֵּה
    גָ֞ד וּ/מִ/מַּטֵּ֤ה זְבוּלֻן֙ בַּ/גּוֹרָ֔ל עָרִ֖ים שְׁתֵּ֥ים עֶשְׂרֵֽה־׃
translation:
  text: To the sons of Merari, according to their clans, from the tribe of Reuben,
    from the tribe of Gad, and from the tribe of Zebulun, twelve cities by lot.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לִבְנֵי
  chosen: to the sons of
  alternatives:
  - for the sons of
  - to the descendants of
  lexicon: HALOT
  rationale: The preposition ל with בנים here introduces the allotment recipient.
    'Sons of' is the standard genealogical/allotment expression and preserves the
    formal linkage to the Levitical line; 'descendants of' is possible but less literal.
- source_word: מְרָרִי
  chosen: Merari
  lexicon: HALOT
  rationale: 'Personal name transliterated according to the translation philosophy:
    names are transliterated rather than translated.'
- source_word: לְמִשְׁפְּחוֹתָם
  chosen: according to their clans
  alternatives:
  - by their families
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal distribution contexts often denotes clan-level
    subdivisions within a tribe. 'Clans' is more precise than the broader English
    'families' here.
- source_word: מִמַּטֵּה
  chosen: from the tribe of
  alternatives:
  - from the staff of
  - from the branch of
  lexicon: HALOT
  rationale: מַטֶּה in census and allotment contexts means 'tribe.' The repeated phrase
    marks the source tribes from which the cities were assigned.
- source_word: רְאוּבֵן
  chosen: Reuben
  lexicon: HALOT
  rationale: Standard transliteration of the tribal name.
- source_word: גָד
  chosen: Gad
  lexicon: HALOT
  rationale: Standard transliteration of the tribal name.
- source_word: זְבוּלֻן
  chosen: Zebulun
  lexicon: HALOT
  rationale: Standard transliteration of the tribal name.
- source_word: בַּגּוֹרָל
  chosen: by lot
  alternatives:
  - by the lot
  - by casting lots
  lexicon: HALOT
  rationale: The phrase indicates the means of allocation. 'By lot' is idiomatic English
    and preserves the formal sense without over-expanding to an explicit verbal phrase.
- source_word: עָרִים
  chosen: cities
  alternatives:
  - towns
  lexicon: HALOT
  rationale: In allotment lists, עָרִים commonly refers to settled population centers.
    'Cities' is the conventional and sufficiently precise rendering.
- source_word: שְׁתֵּים עֶשְׂרֵה
  chosen: twelve
  lexicon: HALOT
  rationale: Standard rendering of the compound numeral in smooth English.
