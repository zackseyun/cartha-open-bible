id: 1CH.6.36
reference: 1 Chronicles 6:36
source:
  edition: WLC
  text: בֻּקִּ֥י בְנ֛/וֹ עֻזִּ֥י בְנ֖/וֹ זְרַֽחְיָ֥ה בְנֽ/וֹ׃
translation:
  text: Bukki his son, Uzzi his son, Zerahiah his son.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֻּקִּי
  chosen: Bukki
  alternatives:
  - Bukkiah
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated per project
    philosophy. 'Bukki' follows standard English convention for this name in genealogical
    contexts.
- source_word: בְנ/וֹ
  chosen: his son
  alternatives:
  - son of him
  - his descendant
  lexicon: HALOT
  rationale: Construct noun בֵּן with 3ms suffix literally means 'his son.' In this
    genealogy, the repeated formula marks direct filial succession, so 'his son' is
    the most natural and sufficiently formal rendering.
- source_word: עֻזִּי
  chosen: Uzzi
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English convention.
- source_word: זְרַחְיָה
  chosen: Zerahiah
  alternatives:
  - Zerachiah
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated. 'Zerahiah'
    reflects common English biblical spelling and preserves recognizability.
