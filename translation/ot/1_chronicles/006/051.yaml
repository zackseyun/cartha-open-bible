id: 1CH.6.51
reference: 1 Chronicles 6:51
source:
  edition: WLC
  text: וּ/מִֽ/מִּשְׁפְּח֖וֹת בְּנֵ֣י קְהָ֑ת וַ/יְהִי֙ עָרֵ֣י גְבוּלָ֔/ם מִ/מַּטֵּ֖ה
    אֶפְרָֽיִם׃
translation:
  text: And from the families of the sons of Kohath, the cities of their territory
    were from the tribe of Ephraim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from among the clans of the sons of Kohath.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their border cities'; Hebrew גְּבוּל can denote 'border,' 'boundary,'
      or 'territory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִמִּשְׁפְּחוֹת
  chosen: And from the families of
  alternatives:
  - And from among the clans of
  - Now from the families of
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת commonly denotes family groups or clans. 'Families' is clear
    modern English, while 'from' preserves the partitive/source force of מִן. The
    prefixed conjunction is rendered 'And' to maintain the list-like narrative flow.
- source_word: בְּנֵי קְהָת
  chosen: the sons of Kohath
  alternatives:
  - the descendants of Kohath
  - the Kohathites
  lexicon: HALOT
  rationale: Literally 'sons of Kohath.' This genealogical/tribal idiom can mean descendants,
    but retaining 'sons of' preserves the Hebrew form and fits the chronicler's style.
    'Kohathites' is possible but less directly tied to the source wording here.
- source_word: וַיְהִי
  chosen: were
  alternatives:
  - there were
  - it came to be
  lexicon: HALOT
  rationale: In this context היה functions as a simple copular/existential link introducing
    the allocation statement. English idiom is best served by 'were' rather than a
    more wooden 'it came to be.'
- source_word: עָרֵי גְבוּלָם
  chosen: the cities of their territory
  alternatives:
  - their border cities
  - the cities of their borderland
  - the cities of their district
  lexicon: HALOT
  rationale: עָרֵי is 'cities of,' and גְבוּל can mean border, boundary, or territory.
    Here the sense is the territorial allotment associated with them, not merely cities
    located on a border line. 'The cities of their territory' communicates the land-allotment
    sense naturally.
- source_word: מִמַּטֵּה אֶפְרָיִם
  chosen: from the tribe of Ephraim
  alternatives:
  - from the staff of Ephraim
  - out of the tribe of Ephraim
  lexicon: HALOT
  rationale: מַטֶּה in tribal-allotment contexts means 'tribe.' 'From the tribe of
    Ephraim' is the standard contextual sense and fits the distribution of Levitical
    cities.
