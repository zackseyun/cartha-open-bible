id: 1CH.6.59
reference: 1 Chronicles 6:59
source:
  edition: WLC
  text: וּ/מִ/מַּטֵּ֣ה אָשֵׁ֔ר אֶת מָשָׁ֖ל וְ/אֶת מִגְרָשֶׁ֑י/הָ וְ/אֶת עַבְדּ֖וֹן
    וְ/אֶת מִגְרָשֶֽׁי/הָ־־־־׃
translation:
  text: 'and from the tribe of Asher: Mashal with its pasturelands, and Abdon with
    its pasturelands.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Mashal is rendered from the Chronicles form here; the parallel list in Joshua
      21:30 has Mishal.
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/מִ/מַּטֵּה
  chosen: and from the tribe of
  alternatives:
  - and from the stock of
  - and from the clan of
  lexicon: HALOT
  rationale: מַטֶּה in tribal allotment contexts refers to a tribe. The prefixed conjunction
    and preposition are carried over as 'and from.'
- source_word: אָשֵׁר
  chosen: Asher
  lexicon: HALOT
  rationale: Proper tribal name; transliterated according to the translation philosophy
    for names.
- source_word: אֶת מָשָׁל
  chosen: Mashal
  alternatives:
  - Mishal
  lexicon: HALOT
  rationale: Direct-object marker is not represented in English. The place name is
    transliterated. Because the parallel in Joshua 21:30 is commonly given as 'Mishal,'
    that alternative is worth preserving in a footnote, but the Chronicles consonantal
    form supports 'Mashal.'
- source_word: מִגְרָשֶׁיהָ
  chosen: its pasturelands
  alternatives:
  - its common lands
  - its surrounding pasturelands
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the open land/pastureland belonging to a town, especially
    in Levitical city lists. 'Pasturelands' is clear modern English and fits the land-allotment
    context better than the older 'suburbs' or the vaguer 'common lands.' The 3fs
    suffix is rendered 'its,' referring to the city.
- source_word: עַבְדּוֹן
  chosen: Abdon
  lexicon: HALOT
  rationale: Proper place name; transliterated.
