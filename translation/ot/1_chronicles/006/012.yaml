id: 1CH.6.12
reference: 1 Chronicles 6:12
source:
  edition: WLC
  text: אֱלִיאָ֥ב בְּנ֛/וֹ יְרֹחָ֥ם בְּנ֖/וֹ אֶלְקָנָ֥ה בְנֽ/וֹ׃
translation:
  text: Eliab his son, Jeroham his son, Elkanah his son.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֱלִיאָב
  chosen: Eliab
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English convention in
    keeping with the translation philosophy to transliterate names rather than translate
    them.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - son of
  - was his son
  lexicon: HALOT
  rationale: The construct noun בֵּן with 3ms suffix literally means 'his son.' In
    this genealogical chain, retaining 'his son' preserves the Hebrew style and clarifies
    descent without adding a finite verb.
- source_word: יְרֹחָם
  chosen: Jeroham
  lexicon: HALOT
  rationale: Proper personal name; transliterated in standard English form.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - son of
  - was his son
  lexicon: HALOT
  rationale: Repeated genealogical formula; rendered consistently with the prior occurrence
    to preserve the structure of the lineage.
- source_word: אֶלְקָנָה
  chosen: Elkanah
  lexicon: HALOT
  rationale: Proper personal name; transliterated in standard English form.
- source_word: בְנוֹ
  chosen: his son
  alternatives:
  - son of
  - was his son
  lexicon: HALOT
  rationale: Final occurrence of the genealogical formula; translated consistently
    as 'his son' to mirror the Hebrew repetition and indicate successive descent.
