theological_decisions:
- issue: Referent of קֹדֶשׁ הַקֳּדָשִׁים
  chosen_reading: the phrase is rendered as a place reference, 'the Most Holy Place'
  alternative_readings:
  - the holy of holies
  - the most holy things
  rationale: The Hebrew expression can function as a superlative for either the innermost sanctuary or especially holy things. Given the immediate context of priestly altar ministry and atonement, a sanctuary-location reading is plausible and readable in English, but the lexical ambiguity is preserved in a footnote.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
- issue: Rendering of כפר
  chosen_reading: make atonement
  alternative_readings:
  - atone
  - make expiation
  rationale: The translation keeps the broad sacrificial term rather than narrowing it to a specific theological model. This aligns with the instruction not to import doctrinal claims beyond the text.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make'
