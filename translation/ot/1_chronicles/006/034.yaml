id: 1CH.6.34
reference: 1 Chronicles 6:34
source:
  edition: WLC
  text: וְֽ/אַהֲרֹ֨ן וּ/בָנָ֜י/ו מַקְטִירִ֨ים עַל מִזְבַּ֤ח הָֽ/עוֹלָה֙ וְ/עַל מִזְבַּ֣ח הַ/קְּטֹ֔רֶת לְ/כֹ֕ל מְלֶ֖אכֶת קֹ֣דֶשׁ הַ/קֳּדָשִׁ֑ים וּ/לְ/כַפֵּר֙ עַל יִשְׂרָאֵ֔ל כְּ/כֹל֙ אֲשֶׁ֣ר צִוָּ֔ה מֹשֶׁ֖ה עֶ֥בֶד הָ/אֱלֹהִֽים־־־׃פ
translation:
  text: And Aaron and his sons were offering on the altar of burnt offering and on the altar of incense[a], for all the work of the Most Holy Place and to make atonement for Israel, according to all that Moses the servant of God had commanded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the holy of holies'; the Hebrew phrase can also denote 'the most holy things' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַקְטִירִים
  chosen: were offering up sacrifices
  alternatives:
  - were burning offerings
  - were making offerings smoke
  lexicon: HALOT
  rationale: The Hiphil participle of קטר refers to causing sacrificial offerings or incense to go up in smoke. Because the verse mentions both the altar of burnt offering and the altar of incense, an English rendering must cover sacrificial burning broadly. 'Were offering up sacrifices' communicates the cultic action naturally in English while preserving the sense of ritual offering by fire.
- source_word: מִזְבַּח הָעֹלָה
  chosen: the altar of burnt offering
  alternatives:
  - the altar of the burnt offering
  lexicon: HALOT
  rationale: This is the standard cultic expression for the altar associated with the עולה offering. 'Altar of burnt offering' is clear, idiomatic, and specific.
- source_word: מִזְבַּח הַקְּטֹרֶת
  chosen: the altar of incense
  alternatives:
  - the incense altar
  lexicon: HALOT
  rationale: A straightforward construct-like rendering in English. 'Altar of incense' is the most transparent and recognizable equivalent.
- source_word: לְכֹל מְלֶאכֶת
  chosen: for all the work of
  alternatives:
  - for every service of
  - for all the duties of
  lexicon: HALOT
  rationale: מְלָאכָה here denotes assigned work or service in the sanctuary context. 'Work' preserves the lexical sense without overinterpreting as exclusively liturgical or administrative.
- source_word: קֹדֶשׁ הַקֳּדָשִׁים
  chosen: the Most Holy Place
  alternatives:
  - the holy of holies
  - the most holy things
  lexicon: HALOT
  rationale: The phrase can denote either the innermost sanctuary or superlative holiness more generally. In this context, paired with priestly altar service and atonement, 'the Most Holy Place' gives a clear cultic referent in readable modern English. The alternative 'the holy of holies' is worth preserving as a traditional lexical option.
- source_word: וּלְכַפֵּר עַל יִשְׂרָאֵל
  chosen: and to make atonement for Israel
  alternatives:
  - and to atone for Israel
  lexicon: HALOT
  rationale: כפר in priestly contexts is best rendered with 'make atonement,' which preserves the sacrificial and covenantal sense without importing a narrower theory of atonement.
- source_word: כְּכֹל אֲשֶׁר צִוָּה
  chosen: according to all that ... had commanded
  alternatives:
  - just as ... commanded
  - according to everything that ... commanded
  lexicon: HALOT
  rationale: כְּכֹל אֲשֶׁר introduces conformity to the full scope of Moses's command. 'According to all that' preserves that comprehensiveness.
- source_word: עֶבֶד הָאֱלֹהִים
  chosen: the servant of God
  alternatives:
  - God's servant
  lexicon: HALOT
  rationale: A formal title for Moses. 'The servant of God' preserves the appositional dignity and traditional biblical phrasing.
