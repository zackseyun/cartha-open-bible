id: 1CH.6.56
reference: 1 Chronicles 6:56
source:
  edition: WLC
  text: לִ/בְנֵי֮ גֵּרְשׁוֹם֒ מִ/מִּשְׁפַּ֗חַת חֲצִי֙ מַטֵּ֣ה מְנַשֶּׁ֔ה אֶת גּוֹלָ֥ן בַּ/בָּשָׁ֖ן וְ/אֶת מִגְרָשֶׁ֑י/הָ וְ/אֶת עַשְׁתָּר֖וֹת וְ/אֶת מִגְרָשֶֽׁי/הָ־־־־׃ס
translation:
  text: 'To the sons of Gershom[a], from the clan of the half-tribe of Manasseh: Golan in Bashan with its pasturelands, and Ashtaroth with its pasturelands.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'common lands' for 'pasturelands'; the Hebrew refers to the open land belonging to a city, often used for grazing.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי גֵּרְשׁוֹם
  chosen: To the sons of Gershom
  alternatives:
  - For the sons of Gershom
  - To the descendants of Gershom
  lexicon: HALOT
  rationale: The prefixed ל marks indirect object/allotment ('to/for'). 'Sons of Gershom' is the standard genealogical idiom and is more source-close than 'descendants,' though the latter captures broader lineage.
- source_word: מִמִּשְׁפַּחַת
  chosen: from the clan of
  alternatives:
  - from the family of
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal allotment contexts refers to a clan-level subdivision within a tribe. 'Clan' is more precise in English than the broader 'family.'
- source_word: חֲצִי מַטֵּה מְנַשֶּׁה
  chosen: the half-tribe of Manasseh
  alternatives:
  - half the tribe of Manasseh
  lexicon: HALOT
  rationale: This is the conventional and accurate rendering for the territorial subdivision of Manasseh. 'Half-tribe' is concise and idiomatic in English.
- source_word: אֶת גּוֹלָן בַּבָּשָׁן
  chosen: Golan in Bashan
  alternatives:
  - Golan in the Bashan
  lexicon: HALOT
  rationale: Golan is the city name; Bashan is the region. English normally omits the article before regional proper names here.
- source_word: מִגְרָשֶׁיהָ
  chosen: its pasturelands
  alternatives:
  - its common lands
  - its surrounding lands
  lexicon: HALOT
  rationale: מִגְרָשׁ denotes the open land around a Levitical city used for grazing and related communal use. 'Pasturelands' best captures the concrete sense in this allotment context.
- source_word: עַשְׁתָּרוֹת
  chosen: Ashtaroth
  alternatives:
  - Ashteroth
  lexicon: HALOT
  rationale: A standard English transliteration of the place name. The form 'Ashtaroth' is widely recognized and reflects the Hebrew consonants/vowels reasonably well.
- source_word: וְאֶת ... וְאֶת
  chosen: and ... with
  alternatives:
  - and ... and
  lexicon: HALOT
  rationale: The repeated accusative markers list the allotted cities and their pasturelands. Rendering the second element as 'with its pasturelands' produces natural English while preserving the coordination.
