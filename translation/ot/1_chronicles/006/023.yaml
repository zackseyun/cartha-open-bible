id: 1CH.6.23
reference: 1 Chronicles 6:23
source:
  edition: WLC
  text: בֶּן יִצְהָ֣ר בֶּן קְהָ֔ת בֶּן לֵוִ֖י בֶּן יִשְׂרָאֵֽל־־־־׃
translation:
  text: son of Izhar, son of Kohath, son of Levi, son of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Israel'; that is, Jacob under his covenant name.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The repeated genealogical construct בן is most naturally rendered 'son
    of' in a lineage formula. Although Hebrew genealogies can sometimes telescope
    generations and thus imply 'descendant of,' nothing in this immediate verse requires
    weakening the direct filial wording, so the formal genealogical expression is
    preserved.
- source_word: יִצְהָר
  chosen: Izhar
  alternatives:
  - Jizhar
  rationale: Personal names are transliterated by standard conventions per translation
    philosophy. 'Izhar' is the conventional English transliteration of the Hebrew
    name.
- source_word: קְהָת
  chosen: Kohath
  alternatives:
  - Qehath
  rationale: Personal names are transliterated rather than translated. 'Kohath' follows
    established English convention and is readily recognizable.
- source_word: לֵוִי
  chosen: Levi
  rationale: Proper name transliterated by standard English convention.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - Jacob
  rationale: The Hebrew text reads 'Israel,' the covenant name of Jacob. Since the
    source uses the proper name ישראל rather than יעקב, 'Israel' should be retained
    in the main text. 'Jacob' is a possible interpretive identification but not the
    lexical form present here.
