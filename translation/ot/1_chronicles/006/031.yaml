id: 1CH.6.31
reference: 1 Chronicles 6:31
source:
  edition: WLC
  text: בֶּן אַמְצִ֥י בֶן בָּנִ֖י בֶּן שָֽׁמֶר־־־׃
translation:
  text: son of Amzi[a], son of Bani, son of Shemer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendant of' at each occurrence of 'son of,' since Hebrew genealogies can compress generations.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In genealogical lists, בֶּן commonly marks immediate or lineal descent. 'Son of' is the standard, formally transparent rendering in English genealogies; 'descendant of' is possible in broader genealogical compression but is not required by this verse alone.
- source_word: אַמְצִי
  chosen: Amzi
  alternatives:
  - Amazi
  rationale: Personal name transliterated according to standard English convention, following the translation philosophy to transliterate names rather than translate them.
- source_word: בָּנִי
  chosen: Bani
  rationale: Personal name transliterated directly. No contextual reason to alter the standard English form.
- source_word: שָׁמֶר
  chosen: Shemer
  alternatives:
  - Shamer
  rationale: Personal name transliterated in a conventional English form reflecting the Hebrew consonants and vowels. 'Shemer' is the established and readable form in English biblical usage.
