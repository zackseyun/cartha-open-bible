id: 1CH.6.1
reference: 1 Chronicles 6:1
source:
  edition: WLC
  text: בְּנֵ֖י לֵוִ֑י גֵּרְשֹׁ֕ם קְהָ֖ת וּ/מְרָרִֽי׃
translation:
  text: 'The sons of Levi: Gershom[a], Kohath[b], and Merari.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew genealogical language often uses 'sons' for direct sons or, in some contexts, broader descendants. Here the context indicates Levi's immediate sons.
    reason: cultural_note
  - marker: b
    text: The Hebrew text reads 'Gershom'; some English traditions use the spelling 'Gershon' in related passages.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - descendants of
  - children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן. In genealogical contexts, 'sons of' is the standard and most transparent rendering, even though Hebrew can sometimes denote broader descendants. Here the immediate list names Levi's three direct sons, so 'sons of' is both formally accurate and contextually precise.
- source_word: לֵוִי
  chosen: Levi
  lexicon: HALOT
  rationale: Proper personal name; per translation philosophy, names are transliterated rather than translated.
- source_word: גֵּרְשֹׁם
  chosen: Gershom
  alternatives:
  - Gershon
  lexicon: HALOT
  rationale: Proper name. The consonantal form here supports 'Gershom' in Chronicles. 'Gershon' is a familiar alternative spelling associated with related genealogical traditions, but the MT form in this verse is best represented as 'Gershom'.
- source_word: קְהָת
  chosen: Kohath
  lexicon: HALOT
  rationale: Proper personal name; standard English transliteration of the Hebrew name.
- source_word: וּ/מְרָרִי
  chosen: and Merari
  lexicon: HALOT
  rationale: Conjunction ו plus proper name מְרָרִי. Rendered straightforwardly as the final coordinated item in the list.
