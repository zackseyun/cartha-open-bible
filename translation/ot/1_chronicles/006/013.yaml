theological_decisions:
- issue: Genealogical name/order difficulty involving Samuel's sons
  chosen_reading: Retain the Masoretic form 'Vashni' in the main text
  alternative_readings:
  - Read the phrase as 'the firstborn, and the second, Abijah'
  - Harmonize with 1 Samuel 8:2 by supplying 'Joel' as the firstborn
  rationale: This is not a doctrinally charged issue but a textual/genealogical one.
    Following original-language primacy, the main text reflects the received Hebrew
    form rather than harmonizing to 1 Samuel 8:2. Because the wording is unusual and
    likely connected to a textual difficulty, the alternatives are preserved in a
    footnote rather than silently resolved.
  doctrine_reference: Translation philosophy §§1, 3, 5
