id: 1CH.6.13
reference: 1 Chronicles 6:13
source:
  edition: WLC
  text: וּ/בְנֵ֧י שְׁמוּאֵ֛ל הַ/בְּכֹ֥ר וַשְׁנִ֖י וַ/אֲבִיָּֽה׃ס
translation:
  text: 'And the sons of Samuel: the firstborn, Vashni, and Abijah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Vashni. The phrase may also be understood as 'and the second'; compare
      1 Samuel 8:2, which names Samuel's sons as Joel and Abijah.
    reason: textual_variant
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: The conjunction ו is carried as 'And' to preserve the genealogical sequence,
    and בְנֵי in construct with a personal name is naturally rendered 'sons of.'
- source_word: שְׁמוּאֵל
  chosen: Samuel
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: הַבְּכֹר
  chosen: the firstborn
  alternatives:
  - the first
  - his firstborn
  lexicon: HALOT
  rationale: The noun with article denotes rank/order in the family line. 'The firstborn'
    is the most precise genealogical rendering.
- source_word: וַשְׁנִי
  chosen: Vashni
  alternatives:
  - and the second
  - Vashni (possibly from 'and the second')
  lexicon: HALOT
  rationale: Although the form can be understood as 'and the second,' the Masoretic
    pointing presents it as a proper name here, and English translations often preserve
    it as such in Chronicles. Because the parallel in 1 Samuel 8:2 names Joel and
    Abijah, the alternative understanding is significant and is preserved in a footnote.
- source_word: וַאֲבִיָּה
  chosen: and Abijah
  lexicon: HALOT
  rationale: Conjunction plus personal name; rendered straightforwardly as 'and Abijah.'
