id: 1CH.6.65
reference: 1 Chronicles 6:65
source:
  edition: WLC
  text: וּ/מִ֨/מַּטֵּה גָ֔ד אֶת רָאמ֥וֹת בַּ/גִּלְעָ֖ד וְ/אֶת מִגְרָשֶׁ֑י/הָ וְ/אֶֽת מַחֲנַ֖יִם וְ/אֶת מִגְרָשֶֽׁי/הָ־־־־־׃
translation:
  text: 'And from the tribe of Gad: Ramoth in Gilead with its pasturelands[a], and Mahanaim with its pasturelands.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Ramoth-gilead,' the traditional English form of the place name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/מַּטֵּה
  chosen: And from the tribe of
  alternatives:
  - And from the staff of
  - And from the branch of
  lexicon: HALOT
  rationale: מַטֶּה in tribal allotment contexts means 'tribe.' The prefixed conjunction and preposition are naturally rendered together as 'And from.'
- source_word: גָד
  chosen: Gad
  rationale: Proper tribal name; transliterated by standard English convention.
- source_word: רָאמוֹת בַּגִּלְעָד
  chosen: Ramoth in Gilead
  alternatives:
  - Ramoth-gilead
  - Ramoth of Gilead
  lexicon: HALOT
  rationale: A place name. Rendering with 'in Gilead' preserves the Hebrew construction while remaining natural English. The hyphenated traditional form is a valid English equivalent but less directly reflects the preposition בְּ.
- source_word: מִגְרָשֶׁיהָ
  chosen: its pasturelands
  alternatives:
  - its surrounding lands
  - its common lands
  - its open land
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the open land/pastureland belonging to a Levitical city. 'Pasturelands' is a standard, clear rendering in this allotment context.
- source_word: מַחֲנַיִם
  chosen: Mahanaim
  rationale: Proper place name; transliterated by standard English convention.
- source_word: וְאֶת
  chosen: and
  alternatives:
  - also
  rationale: The repeated direct-object marker with conjunction structures the list; in English simple coordination with 'and' is the most natural equivalent.
