id: 1CH.6.66
reference: 1 Chronicles 6:66
source:
  edition: WLC
  text: וְ/אֶת חֶשְׁבּוֹן֙ וְ/אֶת מִגְרָשֶׁ֔י/הָ וְ/אֶת יַעְזֵ֖יר וְ/אֶת מִגְרָשֶֽׁי/הָ־־־־׃ס
translation:
  text: and Heshbon with its pasturelands[a], and Jazer with its pasturelands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'common lands' or 'surrounding pasturelands' for the Hebrew term referring to the open land belonging to a city.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶשְׁבּוֹן
  chosen: Heshbon
  alternatives:
  - Hesbon
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated, following the project's policy for names. 'Heshbon' is the standard English form.
- source_word: מִגְרָשֶׁיהָ
  chosen: its pasturelands
  alternatives:
  - its common lands
  - its surrounding lands
  - its pasture-grounds
  lexicon: HALOT
  rationale: מִגְרָשׁ in Levitical-city contexts refers to the open land/pasture area belonging to a city. 'Pasturelands' is clear modern English and fits the chronicler's allotment context better than the archaic 'suburbs' or the vaguer 'surrounding lands.' The 3fs suffix is rendered as 'its' referring to each city.
- source_word: יַעְזֵיר
  chosen: Jazer
  alternatives:
  - Jaazer
  lexicon: HALOT
  rationale: Proper place name; transliterated. 'Jazer' is the conventional English form.
- source_word: וְאֶת
  chosen: and
  alternatives:
  - also
  - with
  lexicon: HALOT
  rationale: The repeated object marker with conjunction structures a list of cities. In English, the object marker is not represented directly; the conjunction is carried by 'and' to preserve the list form.
