id: 1CH.6.25
reference: 1 Chronicles 6:25
source:
  edition: WLC
  text: בֶּן מִיכָאֵ֥ל בֶּן בַּעֲשֵׂיָ֖ה בֶּן מַלְכִּיָּֽה־־־׃
translation:
  text: son of Michael, son of Baaseiah, son of Malkijah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew בַּעֲשֵׂיָה is rendered 'Baaseiah' from the received text here; some
      readers may recognize the similar name 'Maaseiah' from other biblical genealogies
      or translation traditions.
    reason: lexical_alternative
  - marker: b
    text: Or 'Malchijah,' a traditional English spelling of the same Hebrew name.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In a genealogical list, בֶּן most directly marks immediate filial descent
    in the chain. 'Son of' preserves the formal structure and rhythm of the Hebrew
    genealogy better than the broader 'descendant of,' though the latter can be possible
    in genealogical contexts.
- source_word: מִיכָאֵל
  chosen: Michael
  alternatives:
  - Micael
  rationale: Personal names are transliterated by standard English conventions per
    project philosophy. 'Michael' is the conventional English transliteration of the
    Hebrew proper name.
- source_word: בַּעֲשֵׂיָה
  chosen: Baaseiah
  alternatives:
  - Maaseiah
  rationale: The consonantal form in the provided Hebrew is בַּעֲשֵׂיָה, which supports
    transliteration as 'Baaseiah.' 'Maaseiah' is a familiar biblical name and may
    arise from confusion with other passages or textual traditions, but the present
    source text is best represented as 'Baaseiah.'
- source_word: מַלְכִּיָּה
  chosen: Malkijah
  alternatives:
  - Malchijah
  rationale: The Hebrew proper name is transliterated into readable modern English.
    'Malkijah' closely reflects the Hebrew consonants and vowels; 'Malchijah' is a
    traditional variant spelling in some English versions.
