id: 1CH.6.35
reference: 1 Chronicles 6:35
source:
  edition: WLC
  text: וְ/אֵ֖לֶּה בְּנֵ֣י אַהֲרֹ֑ן אֶלְעָזָ֥ר בְּנ֛/וֹ פִּֽינְחָ֥ס בְּנ֖/וֹ אֲבִישׁ֥וּעַ
    בְּנֽ/וֹ׃
translation:
  text: 'And these were the sons of Aaron: Eleazar his son, Phinehas his son, Abishua
    his son.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/אֵלֶּה
  chosen: And these were
  alternatives:
  - And these are
  - Now these were
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces a genealogical list. English
    idiom in this narrative-genealogical context is best represented by 'And these
    were,' though a more formally present-tense 'these are' is possible.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  lexicon: HALOT
  rationale: In a genealogy, בנים can sometimes broaden to 'descendants,' but here
    the following sequence names direct filial succession, so 'sons of' preserves
    the formal genealogical wording.
- source_word: אַהֲרֹן
  chosen: Aaron
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: אֶלְעָזָר
  chosen: Eleazar
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - son of him
  lexicon: HALOT
  rationale: The construct noun with 3ms suffix marks direct descent in the genealogy.
    'His son' is the natural and accurate English rendering.
- source_word: פִּינְחָס
  chosen: Phinehas
  alternatives:
  - Pinhas
  lexicon: HALOT
  rationale: Standard English biblical transliteration favors 'Phinehas.'
- source_word: אֲבִישׁוּעַ
  chosen: Abishua
  alternatives:
  - Abishuah
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name; 'Abishua' is the
    conventional form in English Bible tradition and adequately reflects the Hebrew.
