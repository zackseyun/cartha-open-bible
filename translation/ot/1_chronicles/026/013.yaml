id: 1CH.26.13
reference: 1 Chronicles 26:13
source:
  edition: WLC
  text: וַ/יַּפִּ֨ילוּ גוֹרָל֜וֹת כַּ/קָּטֹ֧ן כַּ/גָּד֛וֹל לְ/בֵ֥ית אֲבוֹתָ֖/ם לְ/שַׁ֥עַר וָ/שָֽׁעַר׃פ
translation:
  text: And they cast lots[a], small and great alike, according to their fathers’ houses, for each gate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “for gate by gate.” The Hebrew repeats the singular noun for distributive emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּפִּילוּ
  chosen: they cast
  alternatives:
  - they caused to fall
  - they threw
  lexicon: HALOT
  rationale: Hiphil of נפל with גּוֹרָלוֹת is the idiom 'cast lots.' A more literal 'caused to fall' would be obscure in English.
- source_word: גוֹרָלוֹת
  chosen: lots
  alternatives:
  - lot assignments
  lexicon: HALOT
  rationale: Standard rendering for the objects used in allotment decisions; plural retained.
- source_word: כַּקָּטֹן כַּגָּדוֹל
  chosen: the small and the great alike
  alternatives:
  - the least and the greatest
  - young and old alike
  lexicon: HALOT
  rationale: The phrase expresses equal participation without distinction of status. 'Small and great alike' preserves the Hebrew idiom better than interpretive expansions such as 'young and old.'
- source_word: לְבֵית אֲבוֹתָם
  chosen: according to their fathers’ houses
  alternatives:
  - by their ancestral houses
  - by their family houses
  lexicon: HALOT
  rationale: This refers to clan/family divisions organized by paternal house. 'According to' fits the distributive sense in the allotment context.
- source_word: לְשַׁעַר וָשָׁעַר
  chosen: for each gate
  alternatives:
  - for gate by gate
  - for every gate
  lexicon: HALOT
  rationale: The repeated singular conveys distributive force. 'For each gate' is natural English and preserves the sense that assignments were made individually gate by gate.
