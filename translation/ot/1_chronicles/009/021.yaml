id: 1CH.9.21
reference: 1 Chronicles 9:21
source:
  edition: WLC
  text: זְכַרְיָה֙ בֶּ֣ן מְשֶֽׁלֶמְיָ֔ה שֹׁעֵ֥ר פֶּ֖תַח לְ/אֹ֥הֶל מוֹעֵֽד׃
translation:
  text: Zechariah son of Meshelemiah was gatekeeper at the entrance to the tent of
    meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'doorkeeper at the doorway of the tent of meeting.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכַרְיָה
  chosen: Zechariah
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The immediate genealogical context favors the ordinary filial sense 'son
    of' rather than the broader 'descendant of.'
- source_word: מְשֶׁלֶמְיָה
  chosen: Meshelemiah
  lexicon: HALOT
  rationale: Personal name transliterated rather than translated.
- source_word: שֹׁעֵר
  chosen: gatekeeper
  alternatives:
  - doorkeeper
  - keeper of the threshold
  lexicon: HALOT
  rationale: The noun denotes one who guards an entrance. 'Gatekeeper' is clear modern
    English and fits the cultic/temple context better than the more traditional but
    less natural 'doorkeeper.'
- source_word: פֶּתַח
  chosen: entrance
  alternatives:
  - doorway
  - opening
  lexicon: HALOT
  rationale: פֶּתַח refers to the entryway/opening. 'Entrance' reads naturally in
    English and suits the phrase with 'gatekeeper.'
- source_word: לְאֹהֶל
  chosen: to the tent
  alternatives:
  - of the tent
  - for the tent
  lexicon: HALOT
  rationale: 'The preposition ל here is best taken directionally/relationally with
    פֶּתַח: ''at the entrance to the tent.'' This yields idiomatic English while preserving
    the Hebrew construction.'
- source_word: מוֹעֵד
  chosen: meeting
  alternatives:
  - appointed meeting
  - assembly
  lexicon: HALOT
  rationale: In the fixed expression אֹהֶל מוֹעֵד, the established sense is the sanctuary
    known as the 'tent of meeting.' 'Meeting' preserves the covenantal sense of appointed
    encounter without paraphrase.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the tabernacle
  - the tent of appointment
  lexicon: HALOT
  rationale: This is a standard sanctuary designation. 'Tent of meeting' is more directly
    tied to the Hebrew than the interpretive shorthand 'tabernacle,' while remaining
    familiar and readable.
