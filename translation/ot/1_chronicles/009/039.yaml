id: 1CH.9.39
reference: 1 Chronicles 9:39
source:
  edition: WLC
  text: וְ/נֵר֙ הוֹלִ֣יד אֶת קִ֔ישׁ וְ/קִ֖ישׁ הוֹלִ֣יד אֶת שָׁא֑וּל וְ/שָׁא֗וּל הוֹלִ֤יד
    אֶת יְהֽוֹנָתָן֙ וְ/אֶת מַלְכִּי שׁ֔וּעַ וְ/אֶת אֲבִינָדָ֖ב וְ/אֶת אֶשְׁבָּֽעַל־־־־־־־׃
translation:
  text: Ner fathered Kish, and Kish fathered Saul, and Saul fathered Jonathan, Malchi-shua,
    Abinadab, and Eshbaal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Eshbaal is called Ish-bosheth in 2 Samuel 2:8 and related passages.
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: In a genealogy, ילד in the Hiphil denotes begetting/fathering. 'Fathered'
    is natural modern English and more concise than 'became the father of,' while
    avoiding the archaic tone of 'begot.'
- source_word: נֵר
  chosen: Ner
  rationale: Proper personal name; transliterated according to the translation philosophy
    for names.
- source_word: קִישׁ
  chosen: Kish
  rationale: Proper personal name; standard English transliteration.
- source_word: שָׁאוּל
  chosen: Saul
  alternatives:
  - Shaul
  rationale: Proper personal name; 'Saul' is the standard English form and readily
    recognizable.
- source_word: יְהוֹנָתָן
  chosen: Jonathan
  alternatives:
  - Jehonathan
  rationale: Proper personal name; standard English transliteration/conventional form.
- source_word: מַלְכִּי שׁוּעַ
  chosen: Malchi-shua
  alternatives:
  - Malki-shua
  rationale: The name is represented by two elements in Hebrew but functions as one
    personal name. Hyphenation in English helps signal the compound name while preserving
    transliteration.
- source_word: אֲבִינָדָב
  chosen: Abinadab
  rationale: Proper personal name; standard English form.
- source_word: אֶשְׁבָּעַל
  chosen: Eshbaal
  alternatives:
  - Ish-bosheth
  rationale: The Chronicler's Hebrew text reads אֶשְׁבָּעַל, so the translation should
    follow the source text directly rather than harmonize to the alternative form
    known from Samuel. The alternative is worth preserving in a footnote because readers
    may know the figure by that other name.
- source_word: וְ
  chosen: and
  rationale: The repeated waw conjunctions are represented with simple coordination
    in English, preserving the genealogical sequence without over-literal repetition
    beyond normal English style.
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker has no direct English equivalent and is therefore
    left untranslated, though its function is reflected in the syntax.
