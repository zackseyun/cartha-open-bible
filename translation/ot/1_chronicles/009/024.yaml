id: 1CH.9.24
reference: 1 Chronicles 9:24
source:
  edition: WLC
  text: לְ/אַרְבַּ֣ע רוּח֔וֹת יִהְי֖וּ הַ/שֹּׁעֲרִ֑ים מִזְרָ֥ח יָ֖מָּ/ה צָפ֥וֹנָ/ה
    וָ/נֶֽגְבָּ/ה׃
translation:
  text: 'The gatekeepers were at the four directions: east, west, north, and south.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'to/for the four winds'; here 'winds' means the four directions
      or quarters.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאַרְבַּע
  chosen: at the four
  alternatives:
  - for the four
  - to the four
  lexicon: HALOT
  rationale: The preposition ל with the numeral marks distribution or assignment here,
    introducing the locations to which the gatekeepers were assigned. In idiomatic
    English, 'at the four' works naturally with 'directions.'
- source_word: רוּחוֹת
  chosen: directions
  alternatives:
  - winds
  - quarters
  - sides
  lexicon: HALOT
  rationale: Although literally 'winds,' in spatial context with the cardinal points
    that follow it denotes the four directions/quarters of the compass. 'Directions'
    is the clearest modern English rendering.
- source_word: יִהְיוּ
  chosen: were stationed
  alternatives:
  - were
  - shall be
  - were positioned
  lexicon: HALOT
  rationale: The verb is simply 'were/will be,' but in context of gatekeepers assigned
    to compass points, English benefits from making the implied sense explicit. 'Were
    stationed' conveys assigned placement without over-paraphrasing.
- source_word: הַשֹּׁעֲרִים
  chosen: the gatekeepers
  alternatives:
  - the doorkeepers
  - the guards at the gates
  lexicon: HALOT
  rationale: The noun refers to those responsible for guarding/keeping the gates.
    'Gatekeepers' is the standard and most natural rendering in this temple context.
- source_word: מִזְרָח
  chosen: east
  alternatives:
  - the east
  lexicon: HALOT
  rationale: Cardinal direction listed in sequence; simple compass rendering is best.
- source_word: יָמָּה
  chosen: west
  alternatives:
  - seaward
  - toward the sea
  lexicon: HALOT
  rationale: Though derived from 'sea' and literally directional 'seaward,' in standard
    geographic usage for the land of Israel it means 'west.' Since it appears in a
    list of cardinal points, 'west' is the clearest equivalent.
- source_word: צָפוֹנָה
  chosen: north
  alternatives:
  - toward the north
  lexicon: HALOT
  rationale: Directional form rendered idiomatically as the cardinal point 'north.'
- source_word: וָנֶגְבָּה
  chosen: and south
  alternatives:
  - and toward the Negeb
  - and toward the south
  lexicon: HALOT
  rationale: Here נגב functions as the southern direction, not specifically the Negeb
    region, because it stands in a list of compass points. 'South' is therefore the
    appropriate rendering.
