id: 1CH.9.14
reference: 1 Chronicles 9:14
source:
  edition: WLC
  text: וּ/מִֽן הַ/לְוִיִּ֑ם שְׁמַֽעְיָ֧ה בֶן חַשּׁ֛וּב בֶּן עַזְרִיקָ֥ם בֶּן חֲשַׁבְיָ֖ה
    מִן בְּנֵ֥י מְרָרִֽי־־־־־׃
translation:
  text: 'And from the Levites: Shemaiah son of Hasshub, son of Azrikam, son of Hashabiah,
    from the sons of Merari.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from the descendants of Merari.” The Hebrew expression “sons of” can
      denote a broader clan lineage, though “sons of Merari” is retained in the main
      text for formal transparency.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִן
  chosen: And from
  alternatives:
  - From
  - Now from
  lexicon: HALOT
  rationale: The conjunction prefixed to מִן links this entry with the preceding list,
    so 'And from' preserves the additive force in natural English.
- source_word: הַלְוִיִּם
  chosen: the Levites
  alternatives:
  - the Levitical men
  lexicon: HALOT
  rationale: Standard rendering of the tribal/clan designation לְוִיִּם in genealogical
    and administrative lists is 'Levites.' The article is retained.
- source_word: שְׁמַעְיָה
  chosen: Shemaiah
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: בֶן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In a genealogy/list context בן most naturally marks immediate filiation
    in the chain presented. 'Son of' is the standard and sufficiently transparent
    rendering, though Hebrew can sometimes allow broader descent.
- source_word: חַשּׁוּב
  chosen: Hasshub
  alternatives:
  - Hashub
  rationale: Transliterated personal name. 'Hasshub' reflects the doubled consonant
    indicated in the Hebrew spelling.
- source_word: עַזְרִיקָם
  chosen: Azrikam
  rationale: Transliterated personal name by standard convention.
- source_word: חֲשַׁבְיָה
  chosen: Hashabiah
  alternatives:
  - Hashabya
  rationale: Transliterated personal name; 'Hashabiah' is the conventional English
    form.
- source_word: מִן בְּנֵי מְרָרִי
  chosen: from the sons of Merari
  alternatives:
  - of the sons of Merari
  - from the descendants of Merari
  lexicon: HALOT
  rationale: This phrase identifies clan lineage within the Levites. 'From the sons
    of Merari' is formally close and clear in English; 'descendants' is possible but
    less literal. 'Merari' is transliterated as a personal/clan ancestor name.
