id: 1CH.9.5
reference: 1 Chronicles 9:5
source:
  edition: WLC
  text: וּ/מִן הַ/שִּׁ֣ילוֹנִ֔י עֲשָׂיָ֥ה הַ/בְּכ֖וֹר וּ/בָנָֽי/ו־׃
translation:
  text: 'And from the Shilonites: Asaiah the firstborn and his sons[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'the Shelonites,' following an alternative traditional identification of this clan name.
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/מִן
  chosen: And from
  alternatives:
  - From
  - Now from
  lexicon: HALOT
  rationale: The conjunction prefixed to מִן naturally links this item to the preceding list, so 'And from' preserves the additive force in a genealogical/register context.
- source_word: הַ/שִּׁילוֹנִי
  chosen: the Shilonites
  alternatives:
  - the Shilonite
  - the Shelonites
  lexicon: HALOT
  rationale: Although morphologically singular, the gentilic with the preposition in this list functions collectively ('from the Shilonites'), matching the clan/group sense in the context of inhabitants by family line. 'Shelonites' is possible in some traditions, but the consonantal form here supports 'Shilonites' as a direct transliteration.
- source_word: עֲשָׂיָה
  chosen: Asaiah
  alternatives:
  - Asiah
  rationale: This is a personal name and is transliterated rather than translated, following project policy for names. 'Asaiah' is the standard English transliteration for this form.
- source_word: הַ/בְּכֹר
  chosen: the firstborn
  alternatives:
  - the eldest
  lexicon: HALOT
  rationale: בכור denotes the firstborn son, not merely the oldest in a loose sense. 'The firstborn' preserves the lexical and familial nuance.
- source_word: וּ/בָנָיו
  chosen: and his sons
  alternatives:
  - with his sons
  - and his children
  lexicon: HALOT
  rationale: The noun means 'sons' specifically, not generic 'children.' The conjunction is rendered simply as 'and' to preserve the list structure.
