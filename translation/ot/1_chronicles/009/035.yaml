id: 1CH.9.35
reference: 1 Chronicles 9:35
source:
  edition: WLC
  text: וּ/בְ/גִבְע֛וֹן יָשְׁב֥וּ אֲבִֽי גִבְע֖וֹן יעואל וְ/שֵׁ֥ם אִשְׁתּ֖/וֹ מַעֲכָֽה־׃
translation:
  text: In Gibeon lived Jeiel the father of Gibeon, and his wife's name was Maacah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the founder of Gibeon' or 'the chief of Gibeon'; Hebrew literally 'the
      father of Gibeon.'
    reason: lexical_alternative
  - marker: b
    text: The name is also spelled 'Jeuel' in some representations of the Hebrew;
      compare the parallel in 1 Chronicles 8:29.
    reason: textual_variant
lexical_decisions:
- source_word: וּ/בְ/גִבְע֛וֹן
  chosen: In Gibeon
  alternatives:
  - And in Gibeon
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition literally yields 'and/in Gibeon.'
    In English, beginning the verse with 'In Gibeon' is natural and preserves the
    locative sense; the conjunction is not always necessary to represent explicitly
    at the start of a sentence.
- source_word: יָשְׁב֥וּ
  chosen: lived
  alternatives:
  - dwelt
  - settled
  lexicon: HALOT
  rationale: From ישב, here indicating residence. 'Lived' is idiomatic modern English
    and fits the genealogical notice better than the more archaic 'dwelt.' Although
    the Hebrew form is plural, the clause functions as a genealogical formula introducing
    the named resident; English smooths this as singular with the following proper
    name.
- source_word: אֲבִֽי גִבְע֖וֹן
  chosen: the father of Gibeon
  alternatives:
  - the founder of Gibeon
  - the chief of Gibeon
  lexicon: HALOT
  rationale: The construct phrase literally reads 'father of Gibeon.' In genealogical
    and settlement contexts, 'father' can denote founder, ancestor, or leading figure
    of a town/clan. The main text keeps the more literal 'father of Gibeon' for transparency;
    a footnote preserves the likely contextual sense 'founder' or 'chief.'
- source_word: יעואל
  chosen: Jeiel
  alternatives:
  - Jeuel
  lexicon: HALOT
  rationale: The Ketiv/Qere tradition and parallel in 8:29 support the common English
    form 'Jeiel.' Because the consonantal form here can be represented as 'Jeuel,'
    that alternative is worth preserving in a footnote as a textual/name-form variant.
- source_word: וְ/שֵׁ֥ם אִשְׁתּ֖/וֹ
  chosen: and his wife's name was
  alternatives:
  - and the name of his wife was
  lexicon: HALOT
  rationale: This is a straightforward nominal expression. The chosen rendering is
    natural modern English while preserving the possessive relationship.
- source_word: מַעֲכָֽה
  chosen: Maacah
  lexicon: HALOT
  rationale: Standard transliteration of the personal name.
