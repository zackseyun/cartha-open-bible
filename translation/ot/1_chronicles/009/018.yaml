id: 1CH.9.18
reference: 1 Chronicles 9:18
source:
  edition: WLC
  text: וְֽ/עַד הֵ֔נָּה בְּ/שַׁ֥עַר הַ/מֶּ֖לֶךְ מִזְרָ֑חָ/ה הֵ֚מָּה הַ/שֹּׁ֣עֲרִ֔ים
    לְ/מַחֲנ֖וֹת בְּנֵ֥י לֵוִֽי־׃
translation:
  text: Until then they were at the king’s gate on the east; they were the gatekeepers
    for the camps of the sons of Levi.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Until now' or 'Up to that point.' The Hebrew idiom can be understood
      as a temporal note of continuation.
    reason: lexical_alternative
  - marker: b
    text: Or 'for the camps' or 'for the companies of the sons of Levi.' The Hebrew
      term can denote camps or organized divisions depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַד הֵנָּה
  chosen: Until then
  alternatives:
  - And until now
  - Up to that point
  lexicon: HALOT
  rationale: The idiom marks continuation up to a stated time. 'Until then' is natural
    English and fits the retrospective note in context better than the more wooden
    'until now.'
- source_word: בְּשַׁעַר הַמֶּלֶךְ
  chosen: at the king’s gate
  alternatives:
  - in the king’s gate
  - at the royal gate
  lexicon: HALOT
  rationale: שַׁעַר is 'gate.' The preposition ב here is locative; 'at the king’s
    gate' is idiomatic English. 'Royal gate' is possible but less literal than the
    construct phrase.
- source_word: מִזְרָחָה
  chosen: on the east
  alternatives:
  - eastward
  - to the east
  lexicon: HALOT
  rationale: The directional form indicates eastern location/orientation. 'On the
    east' communicates the gate’s eastern side in smooth English; 'eastward' is possible
    but less natural here.
- source_word: הֵמָּה
  chosen: they were
  alternatives:
  - these were
  - they
  lexicon: HALOT
  rationale: The independent pronoun is emphatic, identifying the group just mentioned.
    English commonly supplies the copular sense in this verbless clause.
- source_word: הַשֹּׁעֲרִים
  chosen: the gatekeepers
  alternatives:
  - the doorkeepers
  - the guards at the gate
  lexicon: HALOT
  rationale: The noun denotes those assigned to guard/watch the gates. 'Gatekeepers'
    is the standard and clearest rendering in this temple-administrative context.
- source_word: לְמַחֲנוֹת
  chosen: for the divisions
  alternatives:
  - for the camps
  - for the companies
  lexicon: HALOT
  rationale: Although מַחֲנֶה often means 'camp,' in this organizational context it
    refers to grouped bodies or divisions. 'Divisions' best conveys the administrative
    sense for modern readers.
- source_word: בְּנֵי לֵוִי
  chosen: the sons of Levi
  alternatives:
  - the Levites
  - the descendants of Levi
  lexicon: HALOT
  rationale: Formally the phrase is 'sons of Levi.' This preserves the Hebrew expression
    while remaining understandable. 'Levites' is interpretive shorthand and could
    obscure the genealogical phrasing.
