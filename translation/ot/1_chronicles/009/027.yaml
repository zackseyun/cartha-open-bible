id: 1CH.9.27
reference: 1 Chronicles 9:27
source:
  edition: WLC
  text: וּ/סְבִיב֥וֹת בֵּית הָ/אֱלֹהִ֖ים יָלִ֑ינוּ כִּֽי עֲלֵי/הֶ֣ם מִשְׁמֶ֔רֶת וְ/הֵ֥ם
    עַל הַ/מַּפְתֵּ֖חַ וְ/לַ/בֹּ֥קֶר לַ/בֹּֽקֶר־־־׃
translation:
  text: They spent the night around the house of God, because the duty of guarding
    it was upon them, and they were in charge of opening it morning by morning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'they were over the key'; the Hebrew may refer either
      to custody of the key or to responsibility for opening the house of God.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּסְבִיבוֹת
  chosen: around
  alternatives:
  - in the vicinity of
  - all around
  lexicon: HALOT
  rationale: The noun/adverbial form indicates the surrounding area. 'Around' is natural
    English and preserves the spatial sense without overcomplicating the phrase.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: HALOT
  rationale: Literally 'house of God.' Although it refers to the temple complex, retaining
    'house of God' preserves the Hebrew expression and avoids importing a more specific
    institutional term than the text uses.
- source_word: יָלִינוּ
  chosen: spent the night
  alternatives:
  - lodged
  - slept
  lexicon: HALOT
  rationale: The verb means to lodge or remain overnight. 'Spent the night' is idiomatic
    modern English and communicates the durative overnight watch context better than
    the bare 'slept.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for their staying there. 'Because' is clearer in
    contemporary English than 'for' while preserving the causal force.
- source_word: עֲלֵיהֶם מִשְׁמֶרֶת
  chosen: the duty of guarding it was upon them
  alternatives:
  - the watch was over them
  - they had the responsibility of guard duty
  lexicon: HALOT
  rationale: The idiom literally says 'upon them was the guard/watch.' The chosen
    rendering makes explicit the sense of assigned responsibility while preserving
    the burden/responsibility nuance of עֲלֵיהֶם.
- source_word: מִשְׁמֶרֶת
  chosen: the duty of guarding
  alternatives:
  - the watch
  - guard duty
  - the charge
  lexicon: HALOT
  rationale: This noun can denote watch, guard, charge, or duty. In this context of
    gatekeepers and temple security, 'the duty of guarding' best captures the functional
    sense in natural English.
- source_word: וְהֵם עַל הַמַּפְתֵּחַ
  chosen: they were in charge of opening it
  alternatives:
  - they were over the key
  - they were responsible for the opening
  lexicon: HALOT
  rationale: מַפְתֵּחַ can mean 'key,' but in context the phrase likely refers metonymically
    to responsibility for opening the temple/gates. Rendering the sense avoids an
    awkward literalism ('over the key') while preserving the administrative role.
- source_word: הַמַּפְתֵּחַ
  chosen: opening it
  alternatives:
  - the key
  lexicon: HALOT
  rationale: Although the noun commonly means 'key,' the immediate continuation 'morning
    by morning' points to the daily act of opening. The translation reflects the likely
    contextual sense while preserving the lexical alternative in a footnote.
- source_word: וְלַבֹּקֶר לַבֹּקֶר
  chosen: morning by morning
  alternatives:
  - every morning
  - from morning to morning
  lexicon: HALOT
  rationale: The repeated phrase expresses regular recurrence. 'Morning by morning'
    preserves the Hebrew rhythm and iterative force better than the flatter 'every
    morning.'
