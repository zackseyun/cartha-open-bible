id: 1CH.9.42
reference: 1 Chronicles 9:42
source:
  edition: WLC
  text: וְ/אָחָז֙ הוֹלִ֣יד אֶת יַעְרָ֔ה וְ/יַעְרָ֗ה הוֹלִ֛יד אֶת עָלֶ֥מֶת וְ/אֶת עַזְמָ֖וֶת וְ/אֶת זִמְרִ֑י וְ/זִמְרִ֖י הוֹלִ֥יד אֶת מוֹצָֽא־־־־־׃
translation:
  text: Ahaz fathered Jarah[a], and Jarah fathered Alemeth, Azmaveth, and Zimri; and Zimri fathered Moza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The parallel genealogy in 1 Chronicles 8:36 reads 'Jehoaddah' instead of 'Jarah.' The Chronicles manuscripts here read 'Jarah,' which is retained in the main text.
    reason: textual_variant
lexical_decisions:
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: In genealogical context, the Hiphil of ילד denotes begetting/fathering. 'Fathered' is natural modern English and preserves the male genealogical sense better than the archaic 'begot.'
- source_word: יַעְרָה
  chosen: Jarah
  alternatives:
  - Jearah
  rationale: This is a personal name and is transliterated rather than translated, following the project's policy for names. 'Jarah' reflects the consonantal form directly; 'Jearah' is a traditional English form influenced by parallel passages.
- source_word: עָלֶמֶת
  chosen: Alemeth
  rationale: Proper name; transliterated directly into standard English form.
- source_word: עַזְמָוֶת
  chosen: Azmaveth
  alternatives:
  - Azmavet
  rationale: Proper name; transliterated. 'Azmaveth' follows familiar English convention for this Hebrew name.
- source_word: זִמְרִי
  chosen: Zimri
  rationale: Proper name; transliterated directly.
- source_word: מוֹצָא
  chosen: Moza
  alternatives:
  - Moza
  rationale: Proper name; transliterated. 'Moza' is the standard English representation of this name.
- source_word: וְ
  chosen: and
  alternatives:
  - now
  lexicon: HALOT
  rationale: The prefixed conjunction links the genealogy in a straightforward additive way; 'and' best preserves the sequence.
- source_word: אֶת
  chosen: '[not translated]'
  lexicon: HALOT
  rationale: The direct-object marker has no direct English equivalent and is therefore left untranslated while its syntactic function is reflected in the sentence structure.
