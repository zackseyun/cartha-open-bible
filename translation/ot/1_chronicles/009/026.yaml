id: 1CH.9.26
reference: 1 Chronicles 9:26
source:
  edition: WLC
  text: כִּ֣י בֶ/אֱמוּנָ֞ה הֵ֗מָּה אַרְבַּ֨עַת֙ גִּבֹּרֵ֣י הַ/שֹּׁעֲרִ֔ים הֵ֖ם הַ/לְוִיִּ֑ם
    וְ/הָיוּ֙ עַל הַ/לְּשָׁכ֔וֹת וְ/עַ֥ל הָ/אֹצְר֖וֹת בֵּ֥ית הָ/אֱלֹהִֽים־׃
translation:
  text: For these four mighty gatekeepers, who were Levites, were entrusted with the
    chambers and with the storehouses of the house of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in faithfulness' / 'faithfully'; the Hebrew emphasizes the reliability
      or trustworthiness with which these four gatekeepers held their office.
    reason: lexical_alternative
  - marker: b
    text: Or 'treasuries' for 'storehouses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces an explanation for the preceding arrangement of duties; 'for'
    fits the discourse flow better than a stronger causal 'because' or emphatic 'indeed'.
- source_word: בֶאֱמוּנָה
  chosen: were entrusted
  alternatives:
  - in faithfulness
  - faithfully
  - in trust
  lexicon: HALOT
  rationale: The noun אֱמוּנָה literally denotes faithfulness/reliability, but in
    this administrative context with named officials it idiomatically conveys that
    they held a trusted office or charge. Rendering it verbally as 'were entrusted'
    communicates the sense naturally in English while preserving the idea of reliability
    and official trust.
- source_word: הֵמָּה
  chosen: these
  alternatives:
  - they
  lexicon: HALOT
  rationale: The pronoun is resumptive/emphatic. In English, 'these' helps point back
    to the previously mentioned gatekeepers and avoids a clumsy repetition of 'they'.
- source_word: אַרְבַּעַת
  chosen: four
  lexicon: HALOT
  rationale: Straightforward cardinal number in construct with the following noun
    phrase.
- source_word: גִּבֹּרֵי
  chosen: mighty
  alternatives:
  - chief
  - valiant
  - strong
  lexicon: HALOT
  rationale: גִּבּוֹר often means 'mighty/valiant man.' Here it qualifies the gatekeepers
    as prominent or capable men. 'Mighty' preserves the lexical force better than
    the more interpretive 'chief,' though the context implies rank and responsibility.
- source_word: הַשֹּׁעֲרִים
  chosen: gatekeepers
  alternatives:
  - doorkeepers
  - guards of the gates
  lexicon: HALOT
  rationale: Standard rendering for temple personnel responsible for the gates; more
    idiomatic and contextually precise than 'doorkeepers'.
- source_word: הֵם הַלְוִיִּם
  chosen: who were Levites
  alternatives:
  - they were the Levites
  - they, the Levites
  lexicon: HALOT
  rationale: The appositional clause identifies these gatekeepers as Levites. 'Who
    were Levites' is smooth English and preserves the identification without overemphasizing
    exclusivity.
- source_word: וְהָיוּ עַל
  chosen: were entrusted with
  alternatives:
  - were over
  - had charge of
  - were responsible for
  lexicon: HALOT
  rationale: The verb היה with עַל commonly indicates supervisory responsibility.
    Because the verse already emphasizes trustworthiness (בֶאֱמוּנָה), 'were entrusted
    with' neatly conveys both oversight and trusted responsibility in one English
    expression.
- source_word: הַלְּשָׁכוֹת
  chosen: the chambers
  alternatives:
  - the rooms
  - the cells
  lexicon: HALOT
  rationale: In temple context, לְשָׁכוֹת refers to chambers/rooms associated with
    temple service. 'Chambers' is the established and suitably formal rendering.
- source_word: הָאֹצְרוֹת
  chosen: the storehouses
  alternatives:
  - the treasuries
  - the storerooms
  lexicon: HALOT
  rationale: אֹצָר can denote treasury or storehouse. In this temple-administrative
    context, 'storehouses' is broad enough to include stored goods and valuables without
    implying only money. The alternative 'treasuries' is worth preserving because
    some readers may understand the term financially.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - God's house
  - the temple of God
  lexicon: HALOT
  rationale: A formally transparent rendering of the Hebrew phrase. 'Temple of God'
    is contextually accurate but less literal; 'house of God' preserves the source
    wording and temple connotations.
