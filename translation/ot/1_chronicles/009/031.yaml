id: 1CH.9.31
reference: 1 Chronicles 9:31
source:
  edition: WLC
  text: וּ/מַתִּתְיָה֙ מִן הַ/לְוִיִּ֔ם ה֥וּא הַ/בְּכ֖וֹר לְ/שַׁלֻּ֣ם הַ/קָּרְחִ֑י
    בֶּ/אֱמוּנָ֕ה עַ֖ל מַעֲשֵׂ֥ה הַ/חֲבִתִּֽים־׃
translation:
  text: And Mattithiah, from the Levites, the firstborn of Shallum the Korahite, was
    entrusted with the work of the flat cakes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faithfully'; the Hebrew phrase can describe either Mattithiah's trustworthy
      manner or his being placed in a trusted charge.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term refers to a kind of baked cake, possibly griddle cakes.
    reason: cultural_note
lexical_decisions:
- source_word: וּמַתִּתְיָה
  chosen: And Mattithiah
  alternatives:
  - Now Mattithiah
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention; conjunction rendered
    simply as 'And' to continue the personnel list.
- source_word: מִן הַלְוִיִּם
  chosen: from the Levites
  alternatives:
  - one of the Levites
  - among the Levites
  lexicon: HALOT
  rationale: מן marks membership/source; 'from the Levites' is a natural but still
    close rendering in English.
- source_word: הוּא הַבְּכוֹר לְשַׁלֻּם
  chosen: the firstborn of Shallum
  alternatives:
  - the eldest son of Shallum
  lexicon: HALOT
  rationale: בכור normally means 'firstborn.' Here it identifies Mattithiah by family
    relation. 'Firstborn' preserves the lexical form better than the more interpretive
    'eldest son.'
- source_word: הַקָּרְחִי
  chosen: the Korahite
  alternatives:
  - the descendant of Korah
  lexicon: HALOT
  rationale: Gentilic/familial designation rendered with the established English form
    'Korahite.'
- source_word: בֶּאֱמוּנָה
  chosen: was entrusted
  alternatives:
  - in faithfulness
  - faithfully
  - in a position of trust
  lexicon: HALOT
  rationale: In this administrative context, the noun אֱמוּנָה conveys trustworthiness/reliable
    charge. Rendering it verbally as 'was entrusted' communicates the idiom naturally
    in English while preserving the sense of assigned responsibility.
- source_word: עַל
  chosen: with
  alternatives:
  - over
  - in charge of
  lexicon: HALOT
  rationale: With verbs/ideas of responsibility, על indicates oversight or charge.
    Because 'was entrusted over' is awkward English, 'with' is used in the main text
    while retaining the sense of responsibility.
- source_word: מַעֲשֵׂה
  chosen: the work
  alternatives:
  - the preparation
  - the making
  lexicon: HALOT
  rationale: מעשה is a broad term for work/deed/product. In context of food preparation,
    'work' is sufficiently literal and idiomatic when followed by the object.
- source_word: הַחֲבִתִּים
  chosen: the flat cakes
  alternatives:
  - the cakes
  - the griddle cakes
  - the baked offerings
  lexicon: HALOT
  rationale: The term refers to a kind of baked cake, elsewhere associated with pan/griddle
    preparation. 'Flat cakes' preserves the concrete culinary sense without importing
    sacrificial terminology not explicit here.
