lexical_decisions:
- source_word: וּ/גְד֣וֹר
  chosen: and Gedor
  alternatives:
  - and Gedor
  lexicon: HALOT
  rationale: Proper name with prefixed conjunction ו. Standard English transliteration
    of the personal name is retained rather than translating it. Spelling 'Gedor'
    reflects common English convention for גְּדוֹר.
- source_word: וְ/אַחְי֔וֹ
  chosen: and Ahio
  lexicon: HALOT
  rationale: Proper name with prefixed conjunction ו. The name is transliterated,
    not translated, in keeping with the translation philosophy for personal names.
- source_word: וּ/זְכַרְיָ֖ה
  chosen: and Zechariah
  alternatives:
  - and Zekaryah
  lexicon: HALOT
  rationale: Proper name with prefixed conjunction ו. 'Zechariah' is the standard
    English transliteration; a more phonetic transliteration is possible but less
    idiomatic in English Bible style.
- source_word: וּ/מִקְלֽוֹת
  chosen: and Mikloth
  alternatives:
  - and Miklot
  lexicon: HALOT
  rationale: Proper name with prefixed conjunction ו. The final consonant cluster
    is represented by the conventional English form 'Mikloth.'
