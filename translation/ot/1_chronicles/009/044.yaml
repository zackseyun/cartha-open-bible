id: 1CH.9.44
reference: 1 Chronicles 9:44
source:
  edition: WLC
  text: וּ/לְ/אָצֵל֮ שִׁשָּׁ֣ה בָנִים֒ וְ/אֵ֣לֶּה שְׁמוֹתָ֗/ם עַזְרִיקָ֥ם בֹּ֨כְרוּ֙
    וְ/יִשְׁמָעֵ֣אל וּ/שְׁעַרְיָ֔ה וְ/עֹבַדְיָ֖ה וְ/חָנָ֑ן אֵ֖לֶּה בְּנֵ֥י אָצַֽל׀׃פ
translation:
  text: 'Azel had six sons, and these were their names: Azrikam his firstborn, Ishmael,
    Sheariah, Obadiah, and Hanan. These were the sons of Azel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more literally, ''And to Azel: six sons.'' The English smooths a common
      Hebrew genealogical formula.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his firstborn' identifies Azrikam as Azel's firstborn son.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְאָצֵל
  chosen: Azel had
  alternatives:
  - And to Azel were born
  - To Azel
  lexicon: HALOT
  rationale: The preposition ל with a genealogical formula naturally indicates possession/descent
    in English. 'Azel had' is idiomatic and preserves the genealogical sense without
    awkward literalism.
- source_word: שִׁשָּׁה בָנִים
  chosen: six sons
  alternatives:
  - six children
  lexicon: HALOT
  rationale: בָנִים specifically means 'sons,' not generic 'children,' so the gender-specific
    rendering is required by the source.
- source_word: וְאֵלֶּה שְׁמוֹתָם
  chosen: and these were their names
  alternatives:
  - and these are their names
  - and these were his names
  lexicon: HALOT
  rationale: This is a standard genealogical introduction. 'Their names' matches the
    plural pronominal suffix on שְׁמוֹתָם and refers to the sons just mentioned.
- source_word: עַזְרִיקָם
  chosen: Azrikam
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: בֹּכְרוּ
  chosen: his firstborn
  alternatives:
  - the firstborn
  - his eldest
  lexicon: HALOT
  rationale: The form denotes 'his firstborn.' Rendering with the possessive clarifies
    that Azrikam is Azel's firstborn son.
- source_word: יִשְׁמָעֵאל
  chosen: Ishmael
  lexicon: HALOT
  rationale: Personal name transliterated conventionally.
- source_word: שְׁעַרְיָה
  chosen: Sheariah
  alternatives:
  - Sheariah
  lexicon: HALOT
  rationale: Transliterated personal name. 'Sheariah' is a standard English form that
    reflects the Hebrew consonants and vowels reasonably well.
- source_word: עֹבַדְיָה
  chosen: Obadiah
  lexicon: HALOT
  rationale: Conventional transliteration of the personal name.
- source_word: חָנָן
  chosen: Hanan
  lexicon: HALOT
  rationale: Conventional transliteration of the personal name.
- source_word: אֵלֶּה בְּנֵי אָצַל
  chosen: These were the sons of Azel
  alternatives:
  - These were Azel's sons
  lexicon: HALOT
  rationale: This closing formula summarizes the genealogy. Repeating 'Azel' rather
    than using a pronoun preserves clarity and mirrors the Hebrew structure.
