id: 1CH.9.17
reference: 1 Chronicles 9:17
source:
  edition: WLC
  text: וְ/הַ/שֹּׁעֲרִים֙ שַׁלּ֣וּם וְ/עַקּ֔וּב וְ/טַלְמֹ֖ן וַ/אֲחִימָ֑ן וַ/אֲחִי/הֶ֥ם
    שַׁלּ֖וּם הָ/רֹֽאשׁ׃
translation:
  text: And the gatekeepers were Shallum, Akkub, Talmon, Ahiman, and their brothers;
    Shallum was the chief.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their kinsmen'; the Hebrew literally says 'their brothers,' which in
      such lists can refer either to biological brothers or to fellow clan members.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֹּׁעֲרִים
  chosen: the gatekeepers
  alternatives:
  - the doorkeepers
  - the porters
  lexicon: HALOT
  rationale: Refers to those assigned to guard/watch the gates. 'Gatekeepers' is clear
    modern English and fits temple context better than archaic 'porters' or potentially
    domestic-sounding 'doorkeepers'.
- source_word: שַׁלּוּם
  chosen: Shallum
  rationale: Personal name; transliterated per translation philosophy.
- source_word: עַקּוּב
  chosen: Akkub
  alternatives:
  - Akkub
  rationale: Personal name; standard English transliteration retained.
- source_word: טַלְמֹן
  chosen: Talmon
  rationale: Personal name; transliterated.
- source_word: אֲחִימָן
  chosen: Ahiman
  rationale: Personal name; transliterated.
- source_word: אֲחִיהֶם
  chosen: their brothers
  alternatives:
  - their kinsmen
  lexicon: HALOT
  rationale: Literally 'their brothers.' In genealogical/tribal lists this can extend
    to clan associates, but the literal rendering is preferable here and remains natural
    in English.
- source_word: הָרֹאשׁ
  chosen: the chief
  alternatives:
  - the head
  - the leader
  lexicon: HALOT
  rationale: Here the noun denotes rank or leadership status. 'The chief' is idiomatic
    English for the principal officer among the named gatekeepers; 'the head' is more
    literal but less natural.
- source_word: וְ...וְ...וַ...וַ
  chosen: and ... and ... and ... and
  alternatives:
  - with asyndetic English list punctuation
  rationale: The repeated conjunctions structure a simple list. English smooths this
    into a natural coordinated series while preserving the additive force.
