id: 1CH.9.4
reference: 1 Chronicles 9:4
source:
  edition: WLC
  text: עוּתַ֨י בֶּן עַמִּיה֤וּד בֶּן עָמְרִי֙ בֶּן אִמְרִ֣י בֶן בני/מן בְּנֵי פֶ֖רֶץ
    בֶּן יְהוּדָֽה־־־־־־־׃
translation:
  text: Uthai son of Ammihud, son of Omri, son of Imri, son of Bani, from the sons
    of Perez son of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew textual tradition here is difficult; the word rendered ''Bani''
      may alternatively be read ''from,'' which would yield: ''son of Imri, from the
      sons of Perez son of Judah.'' The main text follows the genealogical-name reading
      because it best fits the sequence of names.'
    reason: textual_variant
lexical_decisions:
- source_word: עוּתַי
  chosen: Uthai
  lexicon: HALOT
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In genealogical context, בֶּן most directly means 'son of,' though Hebrew
    genealogies can telescope generations. 'Son of' preserves the form of the source
    while allowing genealogical compression to be understood from context.
- source_word: עַמִּיהוּד
  chosen: Ammihud
  lexicon: HALOT
  rationale: Personal name transliterated.
- source_word: עָמְרִי
  chosen: Omri
  lexicon: HALOT
  rationale: Personal name transliterated in its standard English form.
- source_word: אִמְרִי
  chosen: Imri
  lexicon: HALOT
  rationale: Personal name transliterated.
- source_word: בני/מן
  chosen: Bani
  alternatives:
  - from
  lexicon: HALOT
  rationale: The consonantal issue reflected in the morphology table suggests either
    a proper name ('Bani') or the preposition מן ('from'). In context, the genealogical
    chain in Chronicles strongly favors reading a personal name here, yielding a continuous
    ancestry line before the clan designation 'from the sons of Perez.' The alternative
    is preserved in a footnote because the textual form is not entirely straightforward.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  lexicon: HALOT
  rationale: Construct plural of בן in a clan/genealogical expression. 'The sons of'
    is the standard formal rendering and fits the tribal lineage context; 'descendants
    of' is possible but less textually transparent.
- source_word: פֶּרֶץ
  chosen: Perez
  alternatives:
  - Perez
  lexicon: HALOT
  rationale: Personal name transliterated in its conventional English form.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Personal/tribal name transliterated. Here it identifies Perez as belonging
    to Judah's line.
