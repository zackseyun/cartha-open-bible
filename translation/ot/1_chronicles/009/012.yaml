id: 1CH.9.12
reference: 1 Chronicles 9:12
source:
  edition: WLC
  text: וַ/עֲדָיָה֙ בֶּן יְרֹחָ֔ם בֶּן פַּשְׁח֖וּר בֶּן מַלְכִּיָּ֑ה וּ/מַעְשַׂ֨י בֶּן עֲדִיאֵ֧ל בֶּן יַחְזֵ֛רָה בֶּן מְשֻׁלָּ֥ם בֶּן מְשִׁלֵּמִ֖ית בֶּן אִמֵּֽר־־־־־־־־׃
translation:
  text: and Adaiah son of Jeroham[a], son of Pashhur, son of Malchijah, and Maasai son of Adiel, son of Jahzerah, son of Meshullam, son of Meshillemith, son of Immer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew מְשִׁלֵּמִית is rendered "Meshillemith" here; a related name form appears elsewhere as "Meshillemoth."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/עֲדָיָה
  chosen: and Adaiah
  alternatives:
  - Adaiah
  lexicon: HALOT
  rationale: The prefixed conjunction ו is rendered as "and," continuing the list from the previous verse. The personal name is transliterated per project policy to transliterate names rather than translate them.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: בן in genealogical sequences is most naturally rendered "son of." While it can sometimes denote a more remote descendant, the standard genealogical English rendering here is "son of," preserving the Hebrew structure.
- source_word: יְרֹחָם
  chosen: Jeroham
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
- source_word: פַּשְׁחוּר
  chosen: Pashhur
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
- source_word: מַלְכִּיָּה
  chosen: Malchijah
  alternatives:
  - Malkijah
  lexicon: HALOT
  rationale: Proper name transliterated in a familiar English biblical form. "Malchijah" is a standard convention; "Malkijah" is a possible closer transliteration.
- source_word: וּ/מַעְשַׂי
  chosen: and Maasai
  alternatives:
  - and Maaseiah
  - and Maassai
  lexicon: HALOT
  rationale: The conjunction is rendered "and." The name מַעְשַׂי is best represented as "Maasai" following the consonantal form here, distinguishing it from the longer name Maaseiah. Alternative spellings reflect transliteration uncertainty in English tradition.
- source_word: עֲדִיאֵל
  chosen: Adiel
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
- source_word: יַחְזֵרָה
  chosen: Jahzerah
  alternatives:
  - Jahzerah
  lexicon: HALOT
  rationale: Proper name transliterated. "Jahzerah" reflects common English handling of initial י as J in Hebrew names; minor spelling variation is possible.
- source_word: מְשֻׁלָּם
  chosen: Meshullam
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
- source_word: מְשִׁלֵּמִית
  chosen: Meshillemith
  alternatives:
  - Meshillemoth
  lexicon: HALOT
  rationale: The MT here reads מְשִׁלֵּמִית, which is most directly transliterated "Meshillemith." A related spelling tradition appears elsewhere as "Meshillemoth," but this draft follows the form of the present Hebrew text.
- source_word: אִמֵּר
  chosen: Immer
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
