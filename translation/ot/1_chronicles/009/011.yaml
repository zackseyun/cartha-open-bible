id: 1CH.9.11
reference: 1 Chronicles 9:11
source:
  edition: WLC
  text: וַ/עֲזַרְיָ֨ה בֶן חִלְקִיָּ֜ה בֶּן מְשֻׁלָּ֣ם בֶּן צָד֗וֹק בֶּן מְרָיוֹת֙
    בֶּן אֲחִיט֔וּב נְגִ֖יד בֵּ֥ית הָ/אֱלֹהִֽים־־־־־׃ס
translation:
  text: and Azariah son of Hilkiah, son of Meshullam, son of Zadok, son of Meraioth,
    son of Ahitub, the chief officer of the house of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'leader,' 'chief,' or 'ruler' of the house of God.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/עֲזַרְיָה
  chosen: and Azariah
  alternatives:
  - Azariah
  lexicon: HALOT
  rationale: The prefixed conjunction ו is rendered as 'and' to reflect the continuation
    of the list from the previous verse. The personal name is transliterated per project
    policy.
- source_word: בֶן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: Repeated genealogical בֶן is rendered consistently as 'son of.' While
    Hebrew genealogies can sometimes telescope generations and thus imply 'descendant
    of,' the immediate form is singular and genealogical, so 'son of' best matches
    the source while allowing normal genealogical compression to be understood from
    context.
- source_word: חִלְקִיָּה
  chosen: Hilkiah
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
- source_word: מְשֻׁלָּם
  chosen: Meshullam
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
- source_word: צָדוֹק
  chosen: Zadok
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
- source_word: מְרָיוֹת
  chosen: Meraioth
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
- source_word: אֲחִיטוּב
  chosen: Ahitub
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
- source_word: נְגִיד
  chosen: chief officer
  alternatives:
  - leader
  - ruler
  - prince
  - chief
  lexicon: HALOT
  rationale: נְגִיד denotes one placed in charge, a leader or ruler. In this administrative-temple
    context, 'chief officer' communicates oversight responsibility more naturally
    in modern English than 'prince' and more specifically than bare 'leader' or 'chief.'
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - God's house
  - the temple of God
  lexicon: HALOT
  rationale: A formally transparent rendering of the construct phrase. 'The temple
    of God' is contextually accurate, but 'house of God' preserves the Hebrew expression
    and its broader cultic resonance.
