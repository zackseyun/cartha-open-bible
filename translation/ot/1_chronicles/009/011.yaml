theological_decisions:
- issue: Rendering of אֱלֹהִים in the temple designation
  chosen_reading: God
  alternative_readings:
  - the gods
  rationale: In this context referring to Israel's sanctuary, אֱלֹהִים unambiguously
    refers to the God of Israel. No doctrinally contested issue is present, but the
    singular English rendering is necessary for accuracy.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English'
