id: 1CH.9.15
reference: 1 Chronicles 9:15
source:
  edition: WLC
  text: וּ/בַקְבַּקַּ֥ר חֶ֖רֶשׁ וְ/גָלָ֑ל וּ/מַתַּנְיָה֙ בֶּן מִיכָ֔א בֶּן זִכְרִ֖י
    בֶּן אָסָֽף־־־׃
translation:
  text: and Bakbakkar, Heresh, and Galal, and Mattaniah son of Mica, son of Zichri,
    son of Asaph.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew "son of" can sometimes denote a more remote descendant, but here
      it is rendered literally in the genealogical chain.
    reason: lexical_alternative
  - marker: b
    text: The name "Mica" reflects the Hebrew form here; some readers may expect the
      more familiar "Micah."
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַקְבַּקַּר
  chosen: and Bakbakkar
  alternatives:
  - Bakbakkar
  rationale: The prefixed conjunction ו is rendered as "and," continuing the list
    of Levites in the context. The proper name is transliterated rather than translated,
    following the project policy for personal names.
- source_word: חֶרֶשׁ
  chosen: Heresh
  alternatives:
  - Heres
  rationale: Proper name rendered by standard transliteration. English forms vary
    slightly; "Heresh" reflects the consonantal form most transparently.
- source_word: וְ/גָלָל
  chosen: and Galal
  alternatives:
  - Galal
  rationale: The conjunction is translated "and" to preserve the serial listing, and
    the name is transliterated.
- source_word: וּ/מַתַּנְיָה
  chosen: and Mattaniah
  alternatives:
  - Mattaniah
  rationale: The conjunction is retained as "and" in this genealogical list. The personal
    name is transliterated in standard English form.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In genealogical notices בן normally means "son of," though it can more
    broadly indicate descent. Here the immediate chain of ancestry is best represented
    by the straightforward "son of."
- source_word: מִיכָא
  chosen: Mica
  alternatives:
  - Micah
  rationale: The Hebrew form here is מיכא, conventionally represented as "Mica" in
    many English translations to distinguish it from the more common prophetic name
    "Micah" (מיכה). This preserves the specific form of the name in the source text.
- source_word: זִכְרִי
  chosen: Zichri
  alternatives:
  - Zicri
  rationale: Proper name transliterated by a standard English convention. "Zichri"
    is the most familiar biblical English form.
- source_word: אָסָף
  chosen: Asaph
  rationale: Proper name transliterated in its standard English biblical form.
