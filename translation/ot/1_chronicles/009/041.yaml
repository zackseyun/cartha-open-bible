id: 1CH.9.41
reference: 1 Chronicles 9:41
source:
  edition: WLC
  text: וּ/בְנֵ֖י מִיכָ֑ה פִּית֥וֹן וָ/מֶ֖לֶךְ וְ/תַחְרֵֽעַ׃
translation:
  text: 'And the sons of Micah: Pithon, Melech, and Tahrea.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: The conjunction ו plus construct plural of בן introduces the next genealogical
    line. 'And the sons of' preserves the connective force and the genealogical formula
    common in Chronicles.
- source_word: מִיכָה
  chosen: Micah
  alternatives:
  - Mica
  lexicon: HALOT
  rationale: Proper personal name, transliterated by standard English convention in
    keeping with the translation philosophy to transliterate names rather than translate
    them.
- source_word: פִּיתוֹן
  chosen: Pithon
  lexicon: HALOT
  rationale: Proper personal name; straightforward transliteration.
- source_word: וָמֶלֶךְ
  chosen: Melech
  alternatives:
  - and Melech
  lexicon: HALOT
  rationale: Proper personal name with prefixed conjunction. In English name lists,
    the conjunction is naturally represented before the final item rather than repeated
    before each name, so the name itself is rendered 'Melech' within the list.
- source_word: וְתַחְרֵעַ
  chosen: and Tahrea
  alternatives:
  - Tahrea
  lexicon: HALOT
  rationale: Proper personal name with prefixed conjunction. English list style places
    'and' before the final item, yielding a natural but source-faithful rendering.
