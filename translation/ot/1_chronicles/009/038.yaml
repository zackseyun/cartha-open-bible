id: 1CH.9.38
reference: 1 Chronicles 9:38
source:
  edition: WLC
  text: וּ/מִקְל֖וֹת הוֹלִ֣יד אֶת שִׁמְאָ֑ם וְ/אַף הֵ֗ם נֶ֧גֶד אֲחֵי/הֶ֛ם יָשְׁב֥וּ
    בִ/ירֽוּשָׁלִַ֖ם עִם אֲחֵי/הֶֽם־־־׃ס
translation:
  text: Mikloth fathered Shimeam. They also lived opposite their brothers in Jerusalem,
    with their brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Shimeam; some translations read 'Shimea,' likely by harmonization
      with parallel genealogical forms.
    reason: alternative_reading
  - marker: b
    text: Or 'before their brothers' / 'near their brothers' for 'opposite their brothers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִקְלוֹת
  chosen: Mikloth
  alternatives:
  - Miklot
  lexicon: HALOT
  rationale: Proper name; transliterated rather than translated per project philosophy.
    The prefixed conjunction is carried by the English sentence flow rather than separately
    rendered as 'and Mikloth' at the start, since the verse already continues genealogical
    narration smoothly.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: In genealogical context ילד in Hiphil means to beget/father. 'Fathered'
    is concise, natural modern English, and preserves the male genealogical sense
    better than the more cumbersome 'became the father of.'
- source_word: אֶת שִׁמְאָם
  chosen: Shimeam
  alternatives:
  - Shimea
  lexicon: HALOT
  rationale: Direct-object marker is not translated. The name is rendered 'Shimeam'
    following the consonantal form here; some English traditions harmonize to 'Shimea,'
    but this verse's form supports 'Shimeam.'
- source_word: וְאַף הֵם
  chosen: And they also
  alternatives:
  - and even they
  - they too
  lexicon: HALOT
  rationale: וְאַף adds an emphatic/additive sense. 'And they also' preserves both
    the conjunction and the additive emphasis in readable English.
- source_word: נֶגֶד
  chosen: opposite
  alternatives:
  - before
  - in front of
  - near
  lexicon: HALOT
  rationale: נגד commonly denotes spatial correspondence such as 'opposite' or 'in
    front of.' In this settlement notice, 'opposite' best preserves the relational/spatial
    nuance without overinterpreting.
- source_word: אֲחֵיהֶם
  chosen: their brothers
  alternatives:
  - their kinsmen
  - their relatives
  lexicon: HALOT
  rationale: The Hebrew literally says 'their brothers.' In tribal/genealogical context
    it can denote kin-group members, but the project prefers gender-accurate renderings
    matching the source unless context clearly demands a broader paraphrase.
- source_word: יָשְׁבוּ
  chosen: lived
  alternatives:
  - dwelt
  - settled
  lexicon: HALOT
  rationale: ישב in this context refers to residence. 'Lived' is natural modern English;
    'dwelt' is archaic, and 'settled' may imply initial establishment rather than
    ongoing residence.
- source_word: בִירוּשָׁלִַם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard rendering of the place name with the preposition preserved.
- source_word: עִם אֲחֵיהֶם
  chosen: with their brothers
  alternatives:
  - alongside their brothers
  lexicon: HALOT
  rationale: עִם marks association. The repetition of 'their brothers' is retained
    rather than smoothed away, because the Hebrew repeats it and the repetition may
    emphasize kin proximity.
