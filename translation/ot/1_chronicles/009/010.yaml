id: 1CH.9.10
reference: 1 Chronicles 9:10
source:
  edition: WLC
  text: וּ/מִן הַֽ/כֹּהֲנִ֑ים יְדַֽעְיָ֥ה וִ/יהוֹיָרִ֖יב וְ/יָכִֽין־׃
translation:
  text: 'And from the priests: Jedaiah, Jehoiarib, and Jakin.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּמִן
  chosen: And from
  alternatives:
  - From
  - Now from
  lexicon: HALOT
  rationale: The conjunction ו plus preposition מן introduces the next group in the
    list. 'And from' preserves the connective force and the source structure in this
    genealogical context.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  alternatives:
  - the priestly men
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֲנִים. With the article, it refers to the priestly
    group being enumerated.
- source_word: יְדַעְיָה
  chosen: Jedaiah
  alternatives:
  - Jedayah
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: וִיהוֹיָרִיב
  chosen: Jehoiarib
  alternatives:
  - Yehoyarib
  rationale: Personal name with prefixed conjunction. The conjunction is absorbed
    into the English list with 'and,' while the name is transliterated by standard
    convention.
- source_word: וְיָכִין
  chosen: and Jakin
  alternatives:
  - and Yakin
  rationale: Personal name with prefixed conjunction, rendered as the final item in
    the list. 'Jakin' is the conventional English transliteration.
