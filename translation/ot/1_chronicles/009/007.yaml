id: 1CH.9.7
reference: 1 Chronicles 9:7
source:
  edition: WLC
  text: וּ/מִן בְּנֵ֖י בִּנְיָמִ֑ן סַלּוּא֙ בֶּן מְשֻׁלָּ֔ם בֶּן הוֹדַוְיָ֖ה בֶּן הַ/סְּנֻאָֽה־־־־׃
translation:
  text: 'And from the sons of Benjamin: Sallu son of Meshullam[a], son of Hodaviah[c][b], son of Hassenuah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'from the sons of Benjamin.' This refers to members of the tribe of Benjamin.
    reason: lexical_alternative
  - marker: b
    text: Hebrew repeats 'son of' throughout the genealogy; this may denote direct sonship or a genealogical descendant.
    reason: cultural_note
  - marker: c
    text: The name Hodaviah is spelled differently in some related genealogical traditions.
    reason: textual_variant
lexical_decisions:
- source_word: וּ/מִן
  chosen: And from
  alternatives:
  - From
  - Now from
  lexicon: HALOT
  rationale: The conjunction prefixed to מִן links this verse to the preceding list, so 'And from' preserves the connective force while remaining natural in English.
- source_word: בְּנֵי בִּנְיָמִן
  chosen: the sons of Benjamin
  alternatives:
  - the Benjamites
  - the descendants of Benjamin
  lexicon: HALOT
  rationale: Literally 'sons of Benjamin.' In a genealogical/register context, this idiom denotes members/descendants of the tribe. 'Sons of Benjamin' keeps the formal genealogical flavor better than the more interpretive 'Benjamites.'
- source_word: סַלּוּא
  chosen: Sallu
  alternatives:
  - Sallu
  rationale: Personal names are transliterated by standard English convention. 'Sallu' is the common transliteration of the Hebrew proper name here.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: Repeated בֶּן in genealogical chains is most naturally rendered 'son of' in English. Although Hebrew genealogies can sometimes telescope generations, the formal register favors the literal expression.
- source_word: מְשֻׁלָּם
  chosen: Meshullam
  rationale: Proper name transliterated according to standard convention.
- source_word: הוֹדַוְיָה
  chosen: Hodaviah
  alternatives:
  - Hodevah
  rationale: The Masoretic form here is Hodaviah, so the translation follows the received Hebrew text. A variant spelling/tradition exists elsewhere, but this verse's consonantal/vocalized form supports 'Hodaviah.'
- source_word: הַ/סְּנֻאָה
  chosen: Hassenuah
  alternatives:
  - the Senuah
  - Hasenuah
  rationale: This is best taken as a proper name with the article assimilated in pronunciation/spelling, conventionally represented in English as 'Hassenuah.' Rendering it as a common noun is not warranted in this genealogical context.
