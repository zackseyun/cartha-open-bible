id: 1CH.9.16
reference: 1 Chronicles 9:16
source:
  edition: WLC
  text: וְ/עֹבַדְיָה֙ בֶּֽן שְׁמַֽעְיָ֔ה בֶּן גָּלָ֖ל בֶּן יְדוּת֑וּן וּ/בֶרֶכְיָ֤ה
    בֶן אָסָא֙ בֶּן אֶלְקָנָ֔ה הַ/יּוֹשֵׁ֖ב בְּ/חַצְרֵ֥י נְטוֹפָתִֽי־־־־־׃
translation:
  text: and Obadiah son of Shemaiah, son of Galal, son of Jeduthun, and Berechiah
    son of Asa, son of Elkanah, who lived in the villages of the Netophathites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who lived in the settlements of Netophah'—the Hebrew gentilic can be
      represented either by the people-group ('Netophathites') or by the place name
      ('Netophah').
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עֹבַדְיָה
  chosen: and Obadiah
  alternatives:
  - Obadiah
  lexicon: HALOT
  rationale: The prefixed conjunction links this name with the preceding list, so
    'and Obadiah' is retained rather than starting a new sentence without the connective.
    The personal name is transliterated per project policy.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In genealogical listing בן is most naturally rendered 'son of.' While
    Hebrew genealogies can sometimes telescope generations, the immediate sense in
    this register is filial descent, so 'son of' preserves the form of the source.
- source_word: שְׁמַעְיָה
  chosen: Shemaiah
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
- source_word: גָּלָל
  chosen: Galal
  lexicon: HALOT
  rationale: Personal name transliterated.
- source_word: יְדוּתוּן
  chosen: Jeduthun
  lexicon: HALOT
  rationale: Personal name transliterated in its conventional English form.
- source_word: וּ/בֶרֶכְיָה
  chosen: and Berechiah
  alternatives:
  - Berechiah
  lexicon: HALOT
  rationale: The conjunction continues the list with a second Levite. The name is
    transliterated.
- source_word: אָסָא
  chosen: Asa
  lexicon: HALOT
  rationale: Personal name transliterated. Although some English readers may associate
    Asa with the king of Judah, the text here simply gives a patronymic.
- source_word: אֶלְקָנָה
  chosen: Elkanah
  lexicon: HALOT
  rationale: Personal name transliterated.
- source_word: הַ/יּוֹשֵׁב
  chosen: who lived
  alternatives:
  - the one dwelling
  - who was living
  - who dwelt
  lexicon: HALOT
  rationale: The participle with article functions substantivally/relatively, describing
    Berechiah. 'Who lived' gives natural English while preserving the ongoing/residential
    sense of the Hebrew participle.
- source_word: בְּ/חַצְרֵי
  chosen: in the villages of
  alternatives:
  - in the settlements of
  - in the courts of
  lexicon: HALOT
  rationale: חָצֵר can denote an enclosure, hamlet, or village. In this geographic
    expression with an ethnicon, 'villages of' best fits the sense of rural settlements
    rather than literal courtyards.
- source_word: נְטוֹפָתִי
  chosen: the Netophathites
  alternatives:
  - Netophah
  - the people of Netophah
  lexicon: HALOT
  rationale: The gentilic adjective refers to inhabitants associated with Netophah.
    'The Netophathites' is the most direct rendering; with 'villages of' it yields
    the idiomatic phrase 'the villages of the Netophathites.'
