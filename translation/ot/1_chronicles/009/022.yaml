theological_decisions:
- issue: Sense of בֶּאֱמוּנָתָם at the end of the verse
  chosen_reading: David and Samuel established them in a trusted office/charge
  alternative_readings:
  - David and Samuel established them because of their faithfulness
  - David and Samuel established them in their faithfulness
  rationale: The phrase is not a major doctrinal crux, but it is syntactically compressed
    and semantically flexible. The context concerns temple gatekeepers and their official
    registration, so an administrative sense tied to a trustworthy charge fits best.
    This preserves the text's institutional emphasis without excluding the moral nuance
    of faithfulness, which is preserved in a footnote.
  doctrine_reference: 'Translation philosophy #3: preserve theological tension rather
    than resolve it'
