id: 1CH.9.22
reference: 1 Chronicles 9:22
source:
  edition: WLC
  text: כֻּלָּ֤/ם הַ/בְּרוּרִים֙ לְ/שֹׁעֲרִ֣ים בַּ/סִּפִּ֔ים מָאתַ֖יִם וּ/שְׁנֵ֣ים
    עָשָׂ֑ר הֵ֤מָּה בְ/חַצְרֵי/הֶם֙ הִתְיַחְשָׂ֔/ם הֵ֣מָּה יִסַּ֥ד דָּוִ֛יד וּ/שְׁמוּאֵ֥ל
    הָ/רֹאֶ֖ה בֶּ/אֱמוּנָתָֽ/ם׃
translation:
  text: All these who were chosen as gatekeepers at the thresholds were two hundred
    and twelve. They were enrolled by genealogy in their villages. David and Samuel
    the seer established them in their office of trust.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, "David and Samuel the seer established them because of their faithfulness,"
      or "established them in their faithfulness."
    reason: alternative_reading
lexical_decisions:
- source_word: הַבְּרוּרִים
  chosen: who were chosen
  alternatives:
  - who were selected
  - who were appointed
  lexicon: HALOT
  rationale: Passive participle from בחר/ברר contextually denotes those picked out
    for a role. 'Chosen' is natural English and preserves the sense of selection without
    over-specifying the mechanism.
- source_word: לְשֹׁעֲרִים
  chosen: as gatekeepers
  alternatives:
  - for gatekeepers
  - as doorkeepers
  lexicon: HALOT
  rationale: שֹׁעֵר refers to one who guards a gate/entrance. 'Gatekeepers' is the
    standard and clearest rendering in this temple-service context.
- source_word: בַּסִּפִּים
  chosen: at the thresholds
  alternatives:
  - at the entrances
  - at the gateposts
  lexicon: HALOT
  rationale: סַף commonly means threshold/sill; in this context it refers to the entry
    points they guarded. 'Thresholds' is more textually precise than the broader 'gates,'
    while still understandable.
- source_word: מָאתַיִם וּשְׁנֵים עָשָׂר
  chosen: two hundred and twelve
  rationale: Straightforward cardinal number.
- source_word: בְחַצְרֵיהֶם
  chosen: in their villages
  alternatives:
  - in their settlements
  - in their courts
  lexicon: HALOT
  rationale: Though חָצֵר can mean courtyard/enclosure, in genealogical and settlement
    contexts it often denotes unwalled villages or settlements. Here the sense is
    their local places of residence, not temple courtyards.
- source_word: הִתְיַחְשָׂם
  chosen: were enrolled by genealogy
  alternatives:
  - were registered by genealogy
  - were reckoned by genealogy
  lexicon: HALOT
  rationale: The hitpael of יחס refers to being entered in genealogical records. 'Enrolled
    by genealogy' communicates formal registration tied to lineage.
- source_word: יִסַּד
  chosen: established
  alternatives:
  - founded
  - ordained
  - appointed
  lexicon: HALOT
  rationale: יסד fundamentally means found/establish. In this administrative context,
    'established' best captures setting the arrangement in place without importing
    later ecclesiastical terminology.
- source_word: הָרֹאֶה
  chosen: the seer
  alternatives:
  - the prophet
  lexicon: HALOT
  rationale: רֹאֶה is the older title 'seer.' Since the Hebrew uses this specific
    term for Samuel, it should be preserved rather than flattened to 'prophet'.
- source_word: בֶּאֱמוּנָתָם
  chosen: in their office of trust
  alternatives:
  - in their faithfulness
  - in their trusted office
  - because of their faithfulness
  lexicon: HALOT
  rationale: אֱמוּנָה can denote faithfulness, reliability, or trustworthiness. Here,
    attached to David and Samuel's establishing of these gatekeepers, it most naturally
    describes a trusted charge/office characterized by reliability. 'In their office
    of trust' captures both the institutional and moral nuance better than a bare
    abstract noun in English.
