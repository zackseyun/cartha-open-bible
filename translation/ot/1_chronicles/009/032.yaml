id: 1CH.9.32
reference: 1 Chronicles 9:32
source:
  edition: WLC
  text: וּ/מִן בְּנֵ֧י הַ/קְּהָתִ֛י מִן אֲחֵי/הֶ֖ם עַל לֶ֣חֶם הַֽ/מַּעֲרָ֑כֶת לְ/הָכִ֖ין
    שַׁבַּ֥ת שַׁבָּֽת־־־׃ס
translation:
  text: And some of the sons of the Kohathites, from among their brothers, were in
    charge of the bread of the arrangement, to prepare it Sabbath by Sabbath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditionally 'the showbread' or 'the bread of the Presence.' The Hebrew
      literally refers to bread arranged or set out in order.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן
  chosen: And some of
  alternatives:
  - And from
  - Now from among
  lexicon: HALOT
  rationale: The conjunction plus preposition introduces a subset within the larger
    Levitical group just described. In English, 'And some of' naturally conveys the
    partitive sense better than a bare 'and from.'
- source_word: בְּנֵי הַקְּהָתִי
  chosen: the sons of the Kohathites
  alternatives:
  - the sons of Kohath
  - the Kohathites
  lexicon: HALOT
  rationale: The phrase denotes members of the Kohathite clan. 'Sons of the Kohathites'
    preserves the Hebrew familial/clan expression while remaining understandable.
    'Kohathites' alone is possible but slightly less formally transparent.
- source_word: מִן אֲחֵיהֶם
  chosen: from among their brothers
  alternatives:
  - from their brothers
  - from among their kinsmen
  lexicon: HALOT
  rationale: 'The second מִן is partitive: these Kohathites are selected from among
    their fellow Levites/clansmen. ''Brothers'' follows the gender-accurate policy
    and reflects the Hebrew directly; ''kinsmen'' is interpretive.'
- source_word: עַל
  chosen: were in charge of
  alternatives:
  - were over
  - had responsibility for
  lexicon: HALOT
  rationale: In administrative contexts עַל commonly indicates oversight or responsibility.
    'Were in charge of' expresses the function idiomatically in modern English while
    preserving the sense of authority/assignment.
- source_word: לֶחֶם הַמַּעֲרָכֶת
  chosen: the bread of the arrangement
  alternatives:
  - the arranged bread
  - the row bread
  - the showbread
  - the bread set out in rows
  lexicon: HALOT
  rationale: The Hebrew literally refers to bread associated with an arrangement/order,
    likely the bread laid out in rows before YHWH. 'Showbread' is traditional but
    opaque to modern readers and reflects translation tradition more than plain sense.
    'Bread of the arrangement' stays close to the Hebrew while remaining intelligible;
    a footnote preserves the familiar alternative.
- source_word: לְהָכִין
  chosen: to prepare it
  alternatives:
  - to prepare
  - to set in order
  lexicon: HALOT
  rationale: The infinitive expresses the purpose of their charge. Adding 'it' in
    English clarifies the object implied by context, namely the bread.
- source_word: שַׁבַּת שַׁבָּת
  chosen: Sabbath by Sabbath
  alternatives:
  - every Sabbath
  - week by week on the Sabbath
  lexicon: HALOT
  rationale: The repeated noun is distributive/iterative. 'Sabbath by Sabbath' preserves
    the Hebrew rhythm and repeated form better than the smoother but less formal 'every
    Sabbath.'
