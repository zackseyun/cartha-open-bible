id: 1CH.9.25
reference: 1 Chronicles 9:25
source:
  edition: WLC
  text: וַ/אֲחֵי/הֶ֨ם בְּ/חַצְרֵי/הֶ֜ם לָ/ב֨וֹא לְ/שִׁבְעַ֧ת הַ/יָּמִ֛ים מֵ/עֵ֥ת אֶל
    עֵ֖ת עִם אֵֽלֶּה־־׃
translation:
  text: And their brothers in their villages were to come in every seven days, from
    time to time, with these.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for seven days'; the Hebrew phrase likely refers to a seven-day rotation
      of service.
    reason: lexical_alternative
  - marker: b
    text: Literally 'with these,' referring to those already serving.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲחֵיהֶם
  chosen: And their brothers
  alternatives:
  - And their kinsmen
  lexicon: HALOT
  rationale: אֲחֵיהֶם literally means 'their brothers.' In this administrative/genealogical
    context it can extend to fellow Levites/kinsmen, but 'brothers' preserves the
    Hebrew wording and social sense best.
- source_word: בְּחַצְרֵיהֶם
  chosen: in their villages
  alternatives:
  - in their settlements
  - in their courts
  lexicon: HALOT
  rationale: חָצֵר can mean courtyard, enclosure, or village/settlement. In Chronicles,
    with people living outside the temple precincts, 'villages' fits the residential
    sense better than 'courts.'
- source_word: לָבוֹא
  chosen: were to come
  alternatives:
  - came
  - should come
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ל expresses purpose/obligation
    in context. English 'were to come' captures the scheduled duty implied by the
    surrounding administrative description.
- source_word: לְשִׁבְעַת הַיָּמִים
  chosen: in every seven days
  alternatives:
  - for seven days
  - every seven days
  - at intervals of seven days
  lexicon: HALOT
  rationale: The phrase most naturally indicates a seven-day rotation or interval.
    'In every seven days' preserves the temporal cycle without over-specifying beyond
    the Hebrew.
- source_word: מֵעֵת אֶל עֵת
  chosen: from time to time
  alternatives:
  - at the appointed time
  - from one time to another
  lexicon: HALOT
  rationale: This idiom denotes recurring occasions or successive times. 'From time
    to time' is idiomatic English and fits the sense of periodic rotation.
- source_word: עִם אֵלֶּה
  chosen: to be with them
  alternatives:
  - with these
  - alongside these
  lexicon: HALOT
  rationale: Literally 'with these.' Since the demonstrative points to the gatekeepers/Levites
    just mentioned, 'to be with them' makes natural English while preserving the relational
    sense.
