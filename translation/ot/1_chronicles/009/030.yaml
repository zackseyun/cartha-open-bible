id: 1CH.9.30
reference: 1 Chronicles 9:30
source:
  edition: WLC
  text: וּ/מִן בְּנֵי֙ הַ/כֹּ֣הֲנִ֔ים רֹקְחֵ֥י הַ/מִּרְקַ֖חַת לַ/בְּשָׂמִֽים־׃
translation:
  text: And some of the sons of the priests were compounders of the ointment of spices.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'compounders of the perfumed mixture for the aromatic spices.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן
  chosen: And some of
  alternatives:
  - And from
  - Now from
  lexicon: HALOT
  rationale: The conjunction plus preposition literally means 'and/from' or 'and some
    from.' In this list context, idiomatic English is best conveyed by 'And some of,'
    which preserves the partitive sense without awkwardness.
- source_word: בְּנֵי הַכֹּהֲנִים
  chosen: the sons of the priests
  alternatives:
  - the priestly sons
  - the descendants of the priests
  lexicon: HALOT
  rationale: A formal rendering preserves the Hebrew familial expression. 'Sons of
    the priests' here denotes members of priestly families, but the literal form is
    natural enough in English and keeps the genealogical flavor of Chronicles.
- source_word: רֹקְחֵי
  chosen: mixers
  alternatives:
  - compounders
  - perfumers
  - apothecaries
  lexicon: HALOT
  rationale: The participle refers to those who prepare compounded mixtures. 'Mixers'
    is clear modern English and avoids the archaic 'apothecaries.' 'Perfumers' is
    possible but may over-specify the trade beyond the immediate context.
- source_word: הַמִּרְקַחַת
  chosen: the ointment
  alternatives:
  - the compound
  - the mixture
  - the perfumed ointment
  lexicon: HALOT
  rationale: The noun denotes a compounded preparation, often of ointment or perfume.
    'Ointment' fits the cultic preparation context and reads naturally in English,
    while still reflecting a prepared aromatic substance.
- source_word: לַבְּשָׂמִים
  chosen: for the spices
  alternatives:
  - for the aromatic spices
  - of spices
  - with spices
  lexicon: HALOT
  rationale: 'בְּשָׂמִים refers to aromatic substances/spices. The prefixed preposition
    is best taken here as indicating purpose or relation: the ointment prepared for
    use with the spices/aromatics. ''For the spices'' is concise and preserves the
    Hebrew structure.'
