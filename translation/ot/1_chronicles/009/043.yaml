id: 1CH.9.43
reference: 1 Chronicles 9:43
source:
  edition: WLC
  text: וּ/מוֹצָ֖א הוֹלִ֣יד אֶת בִּנְעָ֑א וּ/רְפָיָ֥ה בְנ֛/וֹ אֶלְעָשָׂ֥ה בְנ֖/וֹ
    אָצֵ֥ל בְּנֽ/וֹ־׃
translation:
  text: And Moza fathered Binea; and his son was Rephaiah, his son Eleasah, his son
    Azel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'and Rephaiah his son, Eleasah his son, Azel his son.'
      The English supplies 'was' in the first clause to make the genealogical sequence
      read naturally.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹצָא
  chosen: Moza
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated in keeping
    with the translation philosophy for names.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: The Hiphil of ילד in genealogical contexts denotes begetting/fathering.
    'Fathered' is concise, natural modern English and preserves the genealogical force
    better than the archaic 'begot.'
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no independent English equivalent.
- source_word: בִּנְעָא
  chosen: Binea
  alternatives:
  - Bina
  lexicon: HALOT
  rationale: Proper name transliterated from the Hebrew form. 'Binea' closely reflects
    the Masoretic vocalization.
- source_word: וּרְפָיָה בְנוֹ
  chosen: and his son was Rephaiah
  alternatives:
  - and Rephaiah his son
  - and Rephaiah was his son
  lexicon: HALOT
  rationale: The sequence shifts from the verb 'fathered' to a verbless genealogical
    chain with 'his son.' English requires some smoothing for readability. 'And his
    son was Rephaiah' preserves the filial succession without implying a new finite
    verb in Hebrew beyond what is necessary for English.
- source_word: אֶלְעָשָׂה בְנוֹ
  chosen: his son Eleasah
  alternatives:
  - Eleasah his son
  lexicon: HALOT
  rationale: Continues the genealogical chain in apposition. Rendered in natural English
    while preserving the repeated filial notation.
- source_word: אָצֵל בְּנוֹ
  chosen: his son Azel
  alternatives:
  - Azel his son
  lexicon: HALOT
  rationale: Final member of the genealogy; transliterated name with filial relationship
    preserved.
