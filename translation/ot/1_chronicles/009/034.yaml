id: 1CH.9.34
reference: 1 Chronicles 9:34
source:
  edition: WLC
  text: אֵלֶּה֩ רָאשֵׁ֨י הָ/אָב֧וֹת לַ/לְוִיִּ֛ם לְ/תֹלְדוֹתָ֖/ם רָאשִׁ֑ים אֵ֖לֶּה
    יָשְׁב֥וּ בִ/ירוּשָׁלִָֽם׃פ
translation:
  text: These were the heads of the fathers’ houses of the Levites, according to their
    generations, chief men. These lived in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “chiefs” or “heads” for “chief men.” The Hebrew repeats the same root
      used earlier in the verse for emphasis.
    reason: lexical_alternative
  - marker: b
    text: “Fathers’ houses” refers to clan or ancestral family units, not merely individual
      households.
    reason: cultural_note
lexical_decisions:
- source_word: רָאשֵׁי
  chosen: heads of
  alternatives:
  - chiefs of
  - leaders of
  lexicon: HALOT
  rationale: The construct form of רֹאשׁ here denotes persons at the head of a social
    unit. 'Heads of' preserves the Hebrew idiom and fits the genealogical/administrative
    context better than the more interpretive 'leaders of.'
- source_word: הָאָבוֹת
  chosen: the fathers’ houses
  alternatives:
  - the ancestral houses
  - the families
  lexicon: HALOT
  rationale: In Chronicles this expression refers to clan-based family houses, not
    merely individual fathers. 'Fathers’ houses' is a standard, sufficiently transparent
    rendering that preserves the social structure in view.
- source_word: לַלְוִיִּם
  chosen: of the Levites
  alternatives:
  - for the Levites
  - among the Levites
  lexicon: HALOT
  rationale: The prefixed ל here marks relation/classification within the genealogical
    notice. 'Of the Levites' is the most natural English expression for identifying
    these fathers' houses as belonging to the Levites.
- source_word: לְתֹלְדוֹתָם
  chosen: according to their generations
  alternatives:
  - by their generations
  - according to their family records
  lexicon: HALOT
  rationale: תּוֹלְדוֹת in genealogical contexts refers to lines of descent or generations.
    'According to their generations' preserves the formal genealogical sense without
    overinterpreting it as written records.
- source_word: רָאשִׁים
  chosen: chief men
  alternatives:
  - chiefs
  - heads
  lexicon: HALOT
  rationale: The repeated noun is appositional, emphasizing status. 'Chief men' avoids
    an awkward repetition of 'heads ... heads' in English while retaining the sense
    of prominent leaders.
- source_word: יָשְׁבוּ
  chosen: lived
  alternatives:
  - dwelt
  - settled
  lexicon: HALOT
  rationale: In this context ישׁב indicates residence. 'Lived' is clear modern English;
    'dwelt' is more formal/archaic, and 'settled' may imply a process rather than
    simple residence.
- source_word: בִירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard locative rendering of the place name.
