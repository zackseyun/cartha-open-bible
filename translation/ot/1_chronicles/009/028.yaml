id: 1CH.9.28
reference: 1 Chronicles 9:28
source:
  edition: WLC
  text: וּ/מֵ/הֶ֖ם עַל כְּלֵ֣י הָ/עֲבוֹדָ֑ה כִּֽי בְ/מִסְפָּ֣ר יְבִיא֔וּ/ם וּ/בְ/מִסְפָּ֖ר
    יוֹצִיאֽוּ/ם־־׃
translation:
  text: Some of them were in charge of the vessels of service, for they brought them
    in by count and took them out by count.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the articles of service' or 'the utensils used in the service.' The
      Hebrew term can refer broadly to vessels, utensils, or implements.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵהֶם
  chosen: Some of them
  alternatives:
  - And from them
  - And some of them
  lexicon: HALOT
  rationale: The preposition מִן with the pronominal suffix indicates a subset drawn
    from the previously mentioned group. In idiomatic English, 'Some of them' best
    conveys the partitive sense.
- source_word: עַל
  chosen: were in charge of
  alternatives:
  - were over
  - had oversight of
  lexicon: HALOT
  rationale: With persons and responsibilities, עַל commonly marks supervision or
    responsibility. 'Were in charge of' is natural modern English while preserving
    the oversight sense.
- source_word: כְּלֵי הָעֲבוֹדָה
  chosen: the vessels used in the service
  alternatives:
  - the articles of service
  - the utensils of the service
  - the equipment for the ministry
  lexicon: HALOT
  rationale: כְּלִי is a broad term for vessels, utensils, or articles; in temple
    context it refers to cultic implements. הָעֲבוֹדָה here denotes the temple service/duty.
    'Vessels used in the service' is clear and contextually appropriate without becoming
    overly technical.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for their assigned oversight. 'For' fits the explanatory
    relationship smoothly in English.
- source_word: בְמִסְפָּר
  chosen: by count
  alternatives:
  - by number
  - according to the number
  lexicon: HALOT
  rationale: The phrase indicates numerical accounting or inventory control. 'By count'
    is concise, idiomatic, and preserves the sense of exact reckoning.
- source_word: יְבִיאוּם
  chosen: they brought them in
  alternatives:
  - they would bring them in
  - they entered them
  lexicon: HALOT
  rationale: Hiphil of בוא with object suffix means to bring in/cause to come in.
    The imperfect here describes customary practice in context, which English can
    express with simple past in narrative description.
- source_word: וּבְמִסְפָּר
  chosen: and ... by count
  alternatives:
  - and by number
  - and according to the number
  lexicon: HALOT
  rationale: The repeated phrase mirrors the first and should be reflected consistently
    in English to preserve the inventory/accountability emphasis.
- source_word: יוֹצִיאוּם
  chosen: took them out
  alternatives:
  - brought them out
  - removed them
  lexicon: HALOT
  rationale: Hiphil of יצא means to bring out/take out. In this administrative context,
    'took them out' sounds natural for checked-out items and pairs well with 'brought
    them in'.
