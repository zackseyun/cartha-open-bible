id: 1CH.9.36
reference: 1 Chronicles 9:36
source:
  edition: WLC
  text: וּ/בְנ֥/וֹ הַ/בְּכ֖וֹר עַבְדּ֑וֹן וְ/צ֣וּר וְ/קִ֔ישׁ וּ/בַ֥עַל וְ/נֵ֖ר וְ/נָדָֽב׃
translation:
  text: And his firstborn son was Abdon, then Zur, Kish, Baal, Ner, and Nadab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: "And his son, the firstborn: Abdon, then Zur, Kish, Baal, Ner,
      and Nadab." The conjunction before each name is represented idiomatically in
      English as a list.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנוֹ
  chosen: And his ... son
  alternatives:
  - Now his ... son
  - And his son
  lexicon: HALOT
  rationale: The conjunction ו is rendered as "And" to continue the genealogy smoothly.
    בְנוֹ means "his son" with 3ms suffix; the possessive is retained explicitly.
- source_word: הַבְּכוֹר
  chosen: firstborn
  alternatives:
  - oldest
  lexicon: HALOT
  rationale: הַבְּכוֹר is the standard term for "the firstborn." "Oldest" is possible
    in sense, but "firstborn" preserves the genealogical and formal register of the
    Hebrew.
- source_word: עַבְדּוֹן
  chosen: Abdon
  rationale: Proper personal name; transliterated according to standard English convention,
    following the translation philosophy to transliterate names.
- source_word: וְצוּר
  chosen: then Zur
  alternatives:
  - and Zur
  rationale: The repeated conjunction before each name can be rendered woodenly as
    "and" throughout, but in English a simple list after the first named son reads
    more naturally. "Then Zur" signals continuation of the name list without implying
    sequence beyond coordination.
- source_word: וְקִישׁ
  chosen: Kish
  alternatives:
  - and Kish
  rationale: Proper name transliterated. The conjunction is absorbed into the English
    list structure for readability.
- source_word: וּבַעַל
  chosen: Baal
  rationale: Proper name transliterated directly from Hebrew. Although the name is
    identical in form to the title/name of the Canaanite deity, in this genealogical
    context it functions as a personal name and should not be altered.
- source_word: וְנֵר
  chosen: Ner
  alternatives:
  - Ner
  rationale: Proper name transliterated. Conjunction absorbed into the English list.
- source_word: וְנָדָב
  chosen: and Nadab
  alternatives:
  - Nadab
  rationale: Proper name transliterated. Final conjunction is naturally represented
    by "and" before the last item in the English series.
