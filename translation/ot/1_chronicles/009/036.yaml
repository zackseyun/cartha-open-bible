theological_decisions:
- issue: Rendering of the personal name בַּעַל within an Israelite genealogy
  chosen_reading: Baal as a personal name
  alternative_readings:
  - Beeliada-like substitution patterns found elsewhere for some names containing
    baal
  - a euphemistic alteration to avoid the divine-name association
  rationale: The Hebrew text here plainly gives the personal name בַּעַל. The translation
    should reflect the source text rather than harmonize to alternate naming traditions
    or avoid the form because of later theological sensitivities. This is a lexical/genealogical
    matter, not an endorsement of idolatry.
  doctrine_reference: Translation philosophy §1, §2
