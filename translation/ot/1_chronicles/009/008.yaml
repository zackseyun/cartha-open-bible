id: 1CH.9.8
reference: 1 Chronicles 9:8
source:
  edition: WLC
  text: וְ/יִבְנְיָה֙ בֶּן יְרֹחָ֔ם וְ/אֵלָ֥ה בֶן עֻזִּ֖י בֶּן מִכְרִ֑י וּ/מְשֻׁלָּם֙
    בֶּן שְׁפַטְיָ֔ה בֶּן רְעוּאֵ֖ל בֶּן יִבְנִיָּֽה־־־־־־׃
translation:
  text: and Ibneiah son of Jeroham, and Elah son of Uzzi, son of Michri, and Meshullam
    son of Shephatiah, son of Reuel, son of Ibnijah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew personal names are transliterated rather than translated; some names
      also appear in English with variant spellings such as Jibneiah or Raguel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ
  chosen: and
  lexicon: HALOT
  rationale: The prefixed conjunction simply links this name list to the preceding
    genealogy and is best rendered with repeated 'and' in English to reflect the Hebrew
    sequence.
- source_word: יִבְנְיָה
  chosen: Ibneiah
  alternatives:
  - Jibneiah
  lexicon: HALOT
  rationale: A personal name, so transliteration rather than translation follows project
    policy. 'Ibneiah' reflects a standard English transliteration of the Hebrew form.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In genealogical lists בן normally denotes immediate filiation unless
    context suggests a broader descent line. Here 'son of' is the most natural and
    sufficiently precise rendering.
- source_word: יְרֹחָם
  chosen: Jeroham
  lexicon: HALOT
  rationale: Personal name transliterated directly.
- source_word: אֵלָה
  chosen: Elah
  lexicon: HALOT
  rationale: Personal name transliterated directly.
- source_word: עֻזִּי
  chosen: Uzzi
  alternatives:
  - Uzzi
  lexicon: HALOT
  rationale: Personal name transliterated directly; 'Uzzi' is the conventional English
    form.
- source_word: מִכְרִי
  chosen: Michri
  alternatives:
  - Mikri
  lexicon: HALOT
  rationale: Personal name transliterated directly. 'Michri' follows common English
    representation of the consonants.
- source_word: מְשֻׁלָּם
  chosen: Meshullam
  lexicon: HALOT
  rationale: Personal name transliterated directly.
- source_word: שְׁפַטְיָה
  chosen: Shephatiah
  alternatives:
  - Shephatya
  lexicon: HALOT
  rationale: Personal name transliterated directly using the familiar English biblical
    form.
- source_word: רְעוּאֵל
  chosen: Reuel
  alternatives:
  - Raguel
  lexicon: HALOT
  rationale: Personal name transliterated from the Hebrew form. 'Reuel' is preferred
    because it reflects the Masoretic Hebrew directly; 'Raguel' is a traditional variant
    influenced by other transmission forms.
- source_word: יִבְנִיָּה
  chosen: Ibnijah
  alternatives:
  - Jibnijah
  lexicon: HALOT
  rationale: Personal name transliterated directly from the Hebrew form. The final
    -jah preserves the theophoric element in standard English biblical style.
