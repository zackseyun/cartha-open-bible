id: 1CH.9.1
reference: 1 Chronicles 9:1
source:
  edition: WLC
  text: וְ/כָל יִשְׂרָאֵל֙ הִתְיַחְשׂ֔וּ וְ/הִנָּ֣/ם כְּתוּבִ֔ים עַל סֵ֖פֶר מַלְכֵ֣י יִשְׂרָאֵ֑ל וִ/יהוּדָ֛ה הָגְל֥וּ לְ/בָבֶ֖ל בְּ/מַעֲלָֽ/ם־־׃ס
translation:
  text: So all Israel was enrolled by genealogy[a], and behold, they are written in the Book of the Kings of Israel[b]; and Judah was taken into exile to Babylon because of their unfaithfulness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was reckoned by genealogies' or 'was registered by genealogy.'
    reason: lexical_alternative
  - marker: b
    text: Or 'because of their trespass' or 'because of their faithlessness.' The Hebrew term carries the sense of covenantal breach or unfaithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְיַחְשׂוּ
  chosen: was enrolled by genealogy
  alternatives:
  - was reckoned by genealogies
  - registered by genealogy
  - was listed in the genealogical records
  lexicon: HALOT
  rationale: The hitpael of יחס refers to establishing or recording lineage/genealogical registration, not merely counting. 'Was enrolled by genealogy' preserves the administrative-genealogical sense in natural English.
- source_word: וְהִנָּם
  chosen: and behold
  alternatives:
  - and indeed
  - and see
  lexicon: HALOT
  rationale: הִנֵּה/הִנָּם is a discourse marker drawing attention. 'Behold' is slightly formal but still readable and preserves the emphatic-presentative force better than omitting it.
- source_word: כְּתוּבִים
  chosen: they are written
  alternatives:
  - they were written
  - they are recorded
  lexicon: HALOT
  rationale: 'The passive participle functions statively: ''are written/recorded.'' ''Are written'' stays closer to the Hebrew while remaining idiomatic.'
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the record/book
  lexicon: HALOT
  rationale: Although עַל is literally 'on,' with כתב and documentary contexts English idiom prefers 'in the book.' 'Book' is a conventional rendering of סֵפֶר here for an official written record.
- source_word: מַלְכֵי יִשְׂרָאֵל
  chosen: the Kings of Israel
  alternatives:
  - the kings of Israel
  lexicon: HALOT
  rationale: Rendered as the title of a known record source. Capitalization reflects an identifiable book/record in English style, not a theological claim.
- source_word: וִיהוּדָה
  chosen: And Judah
  alternatives:
  - and Judah
  lexicon: HALOT
  rationale: The conjunction introduces the next clause, shifting from all Israel's registration to Judah's exile. 'Judah' here denotes the southern kingdom/people.
- source_word: הָגְלוּ
  chosen: was taken into exile
  alternatives:
  - went into exile
  - was exiled
  - were carried away into exile
  lexicon: HALOT
  rationale: 'The hofal is passive/causative-passive: Judah did not simply depart but was deported. Singular English agrees with the collective noun ''Judah.'''
- source_word: לְבָבֶל
  chosen: to Babylon
  alternatives:
  - into Babylon
  lexicon: HALOT
  rationale: Standard destination rendering for the place name.
- source_word: בְּמַעֲלָם
  chosen: because of their unfaithfulness
  alternatives:
  - for their trespass
  - because of their faithlessness
  - for their act of unfaithfulness
  lexicon: HALOT
  rationale: מַעַל denotes breach of faith, treachery, or unfaithfulness, often covenantal. 'Because of their unfaithfulness' communicates both causation and covenant breach in clear modern English.
