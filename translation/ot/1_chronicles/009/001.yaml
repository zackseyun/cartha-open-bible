theological_decisions:
- issue: Nature of Judah's offense in בְּמַעֲלָם
  chosen_reading: covenantal unfaithfulness
  alternative_readings:
  - trespass
  - transgression
  rationale: The term מַעַל often carries the sense of breach of faith against God, not merely generic wrongdoing. 'Unfaithfulness' preserves the covenantal dimension without over-expanding the text.
  doctrine_reference: Translation philosophy §1, §6
- issue: Voice of הָגְלוּ
  chosen_reading: passive deportation ('was taken into exile')
  alternative_readings:
  - active/intransitive 'went into exile'
  rationale: The hofal form indicates that Judah underwent exile rather than initiating it. This avoids softening the judgment context.
  doctrine_reference: Translation philosophy §1, §5
