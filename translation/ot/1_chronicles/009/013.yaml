theological_decisions:
- issue: Rendering of kinship language in a representative male plural context
  chosen_reading: brothers
  alternative_readings:
  - kinsmen
  rationale: The translation follows the gender-accurate principle by retaining the
    masculine familial term present in the Hebrew rather than neutralizing it. In
    this genealogical and priestly context, the referents are male household heads
    and associated male personnel.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Temple terminology
  chosen_reading: house of God
  alternative_readings:
  - temple of God
  rationale: No doctrinal dispute is at stake, but the more literal phrase better
    reflects the Hebrew and avoids importing a more interpretive label where the source
    text uses 'house.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 1
