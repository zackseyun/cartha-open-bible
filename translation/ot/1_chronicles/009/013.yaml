id: 1CH.9.13
reference: 1 Chronicles 9:13
source:
  edition: WLC
  text: וַ/אֲחֵי/הֶ֗ם רָאשִׁים֙ לְ/בֵ֣ית אֲבוֹתָ֔/ם אֶ֕לֶף וּ/שְׁבַ֥ע מֵא֖וֹת וְ/שִׁשִּׁ֑ים
    גִּבּ֣וֹרֵי חֵ֔יל מְלֶ֖אכֶת עֲבוֹדַ֥ת בֵּית הָ/אֱלֹהִֽים־׃
translation:
  text: And their brothers, heads of their fathers’ houses, were 1,760 mighty men
    of valor for the work of the service of the house of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kinsmen.' The Hebrew 'brothers' can denote wider clan relations, not
      only literal siblings.
    reason: lexical_alternative
  - marker: b
    text: Or 'valiant men' or 'capable men.' The phrase is an honorific expression
      for strength or proven ability, not necessarily military combat in this context.
    reason: lexical_alternative
  - marker: c
    text: Literally 'the house of God'; that is, the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲחֵיהֶם
  chosen: And their brothers
  alternatives:
  - And their kinsmen
  - And their fellow Levites
  lexicon: HALOT
  rationale: אָח in the plural with 3mp suffix commonly means literal or clan-related
    'brothers/kinsmen.' 'Brothers' preserves the source wording and the familial/corporate
    sense without over-interpreting the relationship.
- source_word: רָאשִׁים לְבֵית אֲבוֹתָם
  chosen: heads of their fathers’ houses
  alternatives:
  - chiefs of their ancestral houses
  - heads of their family houses
  lexicon: HALOT
  rationale: This is a standard genealogical-administrative expression. 'Heads' reflects
    רָאשִׁים, and 'fathers’ houses' preserves the idiom בית אבות rather than flattening
    it to simply 'families.'
- source_word: אֶלֶף וּשְׁבַע מֵאוֹת וְשִׁשִּׁים
  chosen: 1,760
  alternatives:
  - one thousand seven hundred sixty
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence straightforwardly totals 1,760. Numerals
    are rendered in standard modern English style.
- source_word: גִּבּוֹרֵי חַיִל
  chosen: mighty men of valor
  alternatives:
  - valiant men
  - mighty warriors
  - capable men
  lexicon: HALOT
  rationale: The phrase often denotes strength, capability, or valor. Here, because
    the context is temple service rather than combat, 'mighty men of valor' preserves
    the idiom's honorific force without restricting it to battlefield warriors.
- source_word: מְלֶאכֶת עֲבוֹדַת
  chosen: for the work of the service
  alternatives:
  - for the work of ministry
  - for the service work
  - for the duties of service
  lexicon: HALOT
  rationale: מְלָאכָה denotes work/task and עֲבוֹדָה denotes service/duty. The construct
    chain likely intensifies or specifies the kind of work. 'Work of the service'
    keeps both nouns visible rather than collapsing them into one English term.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: HALOT
  rationale: Literally 'house of God.' Although it refers to the temple, the more
    literal rendering preserves the Hebrew expression and its theological resonance.
