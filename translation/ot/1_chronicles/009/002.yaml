id: 1CH.9.2
reference: 1 Chronicles 9:2
source:
  edition: WLC
  text: וְ/הַ/יּוֹשְׁבִים֙ הָ/רִ֣אשֹׁנִ֔ים אֲשֶׁ֥ר בַּ/אֲחֻזָּתָ֖/ם בְּ/עָרֵי/הֶ֑ם
    יִשְׂרָאֵל֙ הַ/כֹּ֣הֲנִ֔ים הַ/לְוִיִּ֖ם וְ/הַ/נְּתִינִֽים׃
translation:
  text: Now the first inhabitants who lived in their possessions in their cities were
    Israel, the priests, the Levites, and the temple servants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Nethinim,' a traditional transliteration for a class assigned to
      temple service.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַיּוֹשְׁבִים
  chosen: the inhabitants
  alternatives:
  - those who lived
  - the dwellers
  lexicon: HALOT
  rationale: The participle from ישׁב denotes those dwelling or residing. 'Inhabitants'
    is natural English and fits the census/restoration context.
- source_word: הָרִאשֹׁנִים
  chosen: the first
  alternatives:
  - former
  - earliest
  lexicon: HALOT
  rationale: The adjective means 'first' or 'former.' Here it refers to the first
    group to resettle after the exile context of the chapter, so 'the first' is retained
    in close connection with 'inhabitants.'
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  lexicon: HALOT
  rationale: A relative pronoun introducing the descriptive clause; 'who' is appropriate
    for persons.
- source_word: בַּאֲחֻזָּתָם
  chosen: in their possession
  alternatives:
  - on their property
  - in their inheritance
  lexicon: HALOT
  rationale: אֲחֻזָּה commonly denotes a possession or landed holding. 'In their possession'
    preserves the idea of hereditary holding without over-specifying the legal nuance.
- source_word: בְּעָרֵיהֶם
  chosen: in their cities
  alternatives:
  - in their towns
  lexicon: HALOT
  rationale: עָרִים are settled population centers; 'cities' is the standard rendering
    and works well in this genealogical-historical context.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - the Israelites
  lexicon: HALOT
  rationale: The bare noun stands appositionally before the following groups. Rendering
    it as 'Israel' preserves the Hebrew form and allows the sense that the first inhabitants
    consisted of Israelites broadly, alongside priests, Levites, and temple servants.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֲנִים; no contextual reason to vary.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of לְוִיִּם as the Levitical tribe/class distinct
    from priests.
- source_word: וְהַנְּתִינִים
  chosen: the temple servants
  alternatives:
  - the Nethinim
  - the given ones
  lexicon: HALOT
  rationale: נְתִינִים refers to a recognized class attached to temple service. 'Temple
    servants' translates the function for modern readers; the traditional transliteration
    'Nethinim' is preserved in a footnote.
