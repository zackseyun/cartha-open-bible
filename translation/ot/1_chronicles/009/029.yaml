id: 1CH.9.29
reference: 1 Chronicles 9:29
source:
  edition: WLC
  text: וּ/מֵ/הֶ֗ם מְמֻנִּים֙ עַל הַ/כֵּלִ֔ים וְ/עַ֖ל כָּל כְּלֵ֣י הַ/קֹּ֑דֶשׁ וְ/עַל הַ/סֹּ֨לֶת֙ וְ/הַ/יַּ֣יִן וְ/הַ/שֶּׁ֔מֶן וְ/הַ/לְּבוֹנָ֖ה וְ/הַ/בְּשָׂמִֽים־־־׃
translation:
  text: And some of them were appointed over the vessels[a], over all the holy vessels, and over the fine flour, the wine, the oil, the frankincense, and the spices.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the vessels of the sanctuary.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵהֶם
  chosen: And some of them
  alternatives:
  - And from among them
  - And of them
  lexicon: HALOT
  rationale: The preposition מן with pronominal suffix indicates selection from a larger group. 'Some of them' is idiomatic English that preserves the partitive sense better than the more wooden 'from among them.'
- source_word: מְמֻנִּים
  chosen: were appointed
  alternatives:
  - were in charge
  - were overseers
  - were entrusted
  lexicon: HALOT
  rationale: The passive participle denotes being assigned or placed in responsibility. 'Were appointed' preserves the formal sense of delegated duty without overinterpreting office title.
- source_word: עַל
  chosen: over
  alternatives:
  - in charge of
  - responsible for
  lexicon: HALOT
  rationale: Repeated עַל marks sphere of responsibility. 'Over' is concise and formally close; the governance nuance is supplied by 'were appointed.'
- source_word: הַכֵּלִים
  chosen: the vessels
  alternatives:
  - the utensils
  - the articles
  - the equipment
  lexicon: HALOT
  rationale: כֵּלִים is a broad term for implements or articles. In temple/tabernacle context, 'vessels' is a natural and established English rendering that fits sacred implements.
- source_word: כָּל כְּלֵי הַקֹּדֶשׁ
  chosen: all the holy vessels
  alternatives:
  - all the vessels of the sanctuary
  - all the sacred utensils
  lexicon: HALOT
  rationale: The construct phrase literally means 'all the vessels of holiness/the sanctuary.' 'Holy vessels' is compact and clear, preserving consecrated status. 'Of the sanctuary' is possible but slightly more interpretive than the Hebrew wording here.
- source_word: הַסֹּלֶת
  chosen: the fine flour
  alternatives:
  - the choice flour
  - the flour
  lexicon: HALOT
  rationale: סֹלֶת refers specifically to fine flour used in offerings, not flour generically. 'Fine flour' preserves the cultic specificity.
- source_word: הַיַּיִן
  chosen: the wine
  lexicon: HALOT
  rationale: Straightforward lexical rendering; in this context it refers to temple stores used in offerings.
- source_word: הַשֶּׁמֶן
  chosen: the oil
  alternatives:
  - the olive oil
  lexicon: HALOT
  rationale: '''Oil'' is the direct rendering. Although olive oil is likely, the Hebrew does not specify it explicitly here.'
- source_word: הַלְּבוֹנָה
  chosen: the frankincense
  alternatives:
  - the incense
  lexicon: HALOT
  rationale: לְבוֹנָה specifically denotes frankincense, not incense in general. The more precise term should be retained.
- source_word: הַבְּשָׂמִים
  chosen: the spices
  alternatives:
  - the balsam spices
  - the aromatic substances
  - the perfumes
  lexicon: HALOT
  rationale: The term denotes aromatic substances used in sacred preparation. 'Spices' is the most natural broad English equivalent, while 'perfumes' would sound too cosmetic in this context.
