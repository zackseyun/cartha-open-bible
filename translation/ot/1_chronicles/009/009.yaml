id: 1CH.9.9
reference: 1 Chronicles 9:9
source:
  edition: WLC
  text: וַ/אֲחֵי/הֶם֙ לְ/תֹ֣לְדוֹתָ֔/ם תְּשַׁ֥ע מֵא֖וֹת וַ/חֲמִשִּׁ֣ים וְ/שִׁשָּׁ֑ה כָּל אֵ֣לֶּה אֲנָשִׁ֔ים רָאשֵׁ֥י אָב֖וֹת לְ/בֵ֥ית אֲבֹתֵי/הֶֽם־׃ס
translation:
  text: And their brothers[a], according to their generations, were nine hundred and fifty-six[b]. All these men were heads of fathers’ houses in their fathers’ households.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “by their genealogies.” The Hebrew term refers to lines of descent or family records.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “heads of fathers’ houses,” a clan-based genealogical designation.
    reason: cultural_note
lexical_decisions:
- source_word: וַאֲחֵיהֶם
  chosen: And their brothers
  alternatives:
  - And their kinsmen
  - And their relatives
  lexicon: HALOT
  rationale: אָח commonly means 'brother,' but in genealogical/tribal contexts can extend to fellow clan members or kinsmen. 'Brothers' preserves the Hebrew kinship term and fits the representative male genealogy context.
- source_word: לְתֹלְדוֹתָם
  chosen: according to their generations
  alternatives:
  - by their genealogies
  - according to their family records
  lexicon: HALOT
  rationale: תּוֹלְדוֹת in genealogical contexts refers to descent lines or family generations. 'According to their generations' is a fairly literal rendering that preserves the genealogical register style of Chronicles.
- source_word: תְּשַׁע מֵאוֹת וַחֲמִשִּׁים וְשִׁשָּׁה
  chosen: nine hundred and fifty-six
  lexicon: HALOT
  rationale: Straightforward cardinal number sequence; rendered idiomatically in English.
- source_word: כָּל אֵלֶּה אֲנָשִׁים
  chosen: All these men
  alternatives:
  - All these persons
  lexicon: HALOT
  rationale: אֲנָשִׁים is the masculine plural of 'man' and here refers to the listed male genealogical heads. Per gender-accurate policy, 'men' is preferable to a neutral term.
- source_word: רָאשֵׁי אָבוֹת
  chosen: heads of fathers’ houses
  alternatives:
  - heads of ancestral houses
  - chiefs of families
  lexicon: HALOT
  rationale: This is a technical genealogical/social expression in Chronicles. 'Heads of fathers’ houses' preserves the Hebrew structure and clan-based sense better than the smoother but less transparent 'chiefs of families.'
- source_word: לְבֵית אֲבֹתֵיהֶם
  chosen: in their fathers’ households
  alternatives:
  - for their ancestral houses
  - of their fathers' houses
  lexicon: HALOT
  rationale: The phrase locates these men within their broader paternal households/clans. Because the preceding phrase already uses 'fathers’ houses,' varying the second expression to 'households' avoids awkward repetition while preserving the paternal-household idea.
