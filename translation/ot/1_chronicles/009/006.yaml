id: 1CH.9.6
reference: 1 Chronicles 9:6
source:
  edition: WLC
  text: וּ/מִן בְּנֵי זֶ֖רַח יְעוּאֵ֑ל וַ/אֲחֵי/הֶ֖ם שֵׁשׁ מֵא֥וֹת וְ/תִשְׁעִֽים־־־׃
translation:
  text: 'And from the sons of Zerah: Jeuel and their brothers, six hundred and ninety.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Jeuel and his brothers, six hundred and ninety,' if the relationship
      is taken distributively with Jeuel as the representative head of the clan. The
      Hebrew suffix in 'their brothers' is plural, but English versions sometimes
      smooth it to singular for readability.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִן
  chosen: And from
  alternatives:
  - From
  - Now from
  lexicon: HALOT
  rationale: The conjunction prefixed to מִן links this verse to the preceding tribal
    list, so 'And from' preserves the additive flow of the genealogy/list.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In genealogical/register contexts, בְּנֵי commonly denotes lineage membership.
    'Sons of' is the most direct and conventional rendering, while still allowing
    a broader clan sense.
- source_word: זֶרַח
  chosen: Zerah
  rationale: Personal name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: יְעוּאֵל
  chosen: Jeuel
  alternatives:
  - Juel
  rationale: Personal name transliterated by standard English convention. 'Jeuel'
    is a common conventional form for this Hebrew name.
- source_word: וַ/אֲחֵי/הֶם
  chosen: and their brothers
  alternatives:
  - and his brothers
  - with their brothers
  lexicon: HALOT
  rationale: The ketiv-like consonantal form with 3mp suffix naturally yields 'their
    brothers.' In this register formula, it refers to clan kinsmen associated with
    Jeuel. 'His brothers' would smooth the sense toward singular antecedent Jeuel,
    but the Hebrew suffix is plural.
- source_word: שֵׁשׁ מֵא֥וֹת וְ/תִשְׁעִים
  chosen: six hundred and ninety
  alternatives:
  - '690'
  lexicon: HALOT
  rationale: The cardinal number is rendered in words for normal Bible style. It gives
    the total number of Jeuel and his brothers/kinsmen in the register.
