id: 1CH.9.33
reference: 1 Chronicles 9:33
source:
  edition: WLC
  text: וְ/אֵ֣לֶּה הַ֠/מְשֹׁרְרִים רָאשֵׁ֨י אָב֧וֹת לַ/לְוִיִּ֛ם בַּ/לְּשָׁכֹ֖ת פטירים
    כִּֽי יוֹמָ֥ם וָ/לַ֛יְלָה עֲלֵי/הֶ֖ם בַּ/מְּלָאכָֽה־׃
translation:
  text: These were the singers, heads of fathers’ houses of the Levites, free from
    duty in the chambers, for they were occupied in the work day and night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'exempt' or 'released'; the Hebrew term is rare and likely means they
      were freed from other duties because of their continual responsibility for the
      singing service.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְשֹׁרְרִים
  chosen: the singers
  alternatives:
  - the musicians
  lexicon: HALOT
  rationale: The participle from שׁיר denotes those engaged in singing. 'Singers'
    is the most direct rendering; 'musicians' is broader than the Hebrew here.
- source_word: רָאשֵׁי אָבוֹת
  chosen: heads of fathers’ houses
  alternatives:
  - heads of ancestral houses
  - family heads
  lexicon: HALOT
  rationale: A standard genealogical/social expression in Chronicles. 'Heads of fathers’
    houses' preserves the formal clan structure more closely than the smoother but
    less specific 'family heads.'
- source_word: לַלְוִיִּם
  chosen: of the Levites
  alternatives:
  - among the Levites
  lexicon: HALOT
  rationale: The phrase identifies these heads as belonging to the Levites. 'Of the
    Levites' is the most natural and sufficiently precise English rendering.
- source_word: בַּלְּשָׁכוֹת
  chosen: in the chambers
  alternatives:
  - in the rooms
  - in the temple chambers
  lexicon: HALOT
  rationale: לשכה commonly refers to chambers/rooms, often in a temple complex. 'Chambers'
    preserves the institutional setting without adding 'temple,' which is contextually
    likely but not explicit in the word itself.
- source_word: פטירים
  chosen: free from duty
  alternatives:
  - exempt
  - released
  lexicon: HALOT
  rationale: This rare form is commonly understood to mean exempt or free, likely
    from other Levitical duties. 'Free from duty' makes the implied sense explicit
    in idiomatic English while staying close to the context.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for their exempt status. 'For' is concise and natural
    in English narrative explanation.
- source_word: יוֹמָם וָלַיְלָה
  chosen: day and night
  alternatives:
  - by day and by night
  - continually
  lexicon: HALOT
  rationale: A straightforward temporal pair indicating ongoing responsibility. 'Day
    and night' preserves the idiom without over-paraphrasing.
- source_word: עֲלֵיהֶם
  chosen: they were occupied in
  alternatives:
  - it was upon them
  - it was their responsibility to do
  lexicon: HALOT
  rationale: Literally 'upon them,' but in context it conveys obligation/responsibility.
    Rendering the idiom as 'they were occupied in' fits the syntax with the following
    phrase and communicates the burden of continual work.
- source_word: בַּמְּלָאכָה
  chosen: the work
  alternatives:
  - the service
  - the task
  lexicon: HALOT
  rationale: מלאכה is general 'work' or 'occupation.' 'The work' is broad enough to
    preserve the Hebrew while allowing the cultic context to supply the nature of
    the labor.
