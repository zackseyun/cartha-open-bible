id: 1CH.9.3
reference: 1 Chronicles 9:3
source:
  edition: WLC
  text: וּ/בִ/ירוּשָׁלִַ֨ם֙ יָשְׁב֔וּ מִן בְּנֵ֥י יְהוּדָ֖ה וּ/מִן בְּנֵ֣י בִנְיָמִ֑ן
    וּ/מִן בְּנֵ֥י אֶפְרַ֖יִם וּ/מְנַשֶּֽׁה־־־׃
translation:
  text: And in Jerusalem some of the sons of Judah, and some of the sons of Benjamin,
    and some of the sons of Ephraim and Manasseh lived there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'from the sons of Judah ... from the sons of Benjamin
      ... from the sons of Ephraim and Manasseh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בִ/ירוּשָׁלִַם
  chosen: And in Jerusalem
  alternatives:
  - Now in Jerusalem
  - In Jerusalem
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition is naturally rendered 'And
    in Jerusalem' to maintain the narrative linkage from the preceding context while
    preserving the locative sense.
- source_word: יָשְׁבוּ
  chosen: lived there
  alternatives:
  - dwelt
  - settled
  - lived
  lexicon: HALOT
  rationale: The verb ישב commonly means 'to dwell/live/settle.' 'Lived there' is
    idiomatic modern English and makes explicit the residence sense in context. 'There'
    is supplied in English for naturalness, referring back to Jerusalem.
- source_word: מִן
  chosen: some from
  alternatives:
  - from
  - certain ones from
  lexicon: HALOT
  rationale: Repeated מִן before each tribal group indicates members drawn from those
    groups. Because English requires a subject for 'lived,' 'some from' best conveys
    that representatives of each tribe resided in Jerusalem without implying the entire
    tribe did so.
- source_word: בְּנֵי יְהוּדָה
  chosen: the sons of Judah
  alternatives:
  - the people of Judah
  - the descendants of Judah
  - the Judeans
  lexicon: HALOT
  rationale: A formally close rendering of בני + tribal name is 'sons of Judah.' This
    preserves the genealogical/tribal idiom of Chronicles better than the more interpretive
    'Judeans' or 'people of Judah'.
- source_word: בְּנֵי בִנְיָמִן
  chosen: the sons of Benjamin
  alternatives:
  - the people of Benjamin
  - the Benjaminites
  - the descendants of Benjamin
  lexicon: HALOT
  rationale: As with Judah, 'sons of Benjamin' preserves the tribal-genealogical wording
    and keeps consistency across the verse.
- source_word: בְּנֵי אֶפְרַיִם
  chosen: the sons of Ephraim
  alternatives:
  - the Ephraimites
  - the descendants of Ephraim
  lexicon: HALOT
  rationale: The phrase is rendered consistently with the previous tribal expressions
    to preserve the repetitive structure of the Hebrew.
- source_word: וּ/מְנַשֶּׁה
  chosen: and Manasseh
  alternatives:
  - and from Manasseh
  - and the sons of Manasseh
  lexicon: HALOT
  rationale: Hebrew omits a repeated בני after Ephraim, so 'and Manasseh' is the most
    direct rendering. In English, within the coordinated phrase 'the sons of Ephraim
    and Manasseh,' the sense 'sons of' carries over naturally to Manasseh.
