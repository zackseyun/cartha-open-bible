id: NEH.9.5
reference: Nehemiah 9:5
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ הַ/לְוִיִּ֡ם יֵשׁ֣וּעַ וְ֠/קַדְמִיאֵל בָּנִ֨י חֲשַׁבְנְיָ֜ה שֵׁרֵֽבְיָ֤ה הֽוֹדִיָּה֙ שְׁבַנְיָ֣ה פְתַֽחְיָ֔ה ק֗וּמוּ בָּרֲכוּ֙ אֶת יְהוָ֣ה אֱלֹֽהֵי/כֶ֔ם מִן הָ/עוֹלָ֖ם עַד הָ/עוֹלָ֑ם וִ/יבָֽרְכוּ֙ שֵׁ֣ם כְּבוֹדֶ֔/ךָ וּ/מְרוֹמַ֥ם עַל כָּל בְּרָכָ֖ה וּ/תְהִלָּֽה־־־־־׃
translation:
  text: Then the Levites—Jeshua[a], Kadmiel, Bani, Hashabneiah, Sherebiah, Hodiah, Shebaniah, and Pethahiah—said, “Stand up; bless Yahweh your God from everlasting to everlasting. Blessed be your glorious name[b], which is exalted above all blessing and praise.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “And let them bless your glorious name.” The Hebrew verb is third person plural with a volitive sense.
    reason: alternative_reading
  - marker: b
    text: Literally, “the name of your glory.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: Then ... said
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural English narrative flow while preserving the sequential sense.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal/cultic designation; definite article retained.
- source_word: יֵשׁוּעַ וְקַדְמִיאֵל בָּנִי חֲשַׁבְנְיָה שֵׁרֵבְיָה הוֹדִיָּה שְׁבַנְיָה פְתַחְיָה
  chosen: Jeshua, Kadmiel, Bani, Hashabneiah, Sherebiah, Hodiah, Shebaniah, and Pethahiah
  alternatives:
  - Jeshua ... Pethahiah (without serial comma/polished punctuation)
  rationale: Personal names are transliterated per project philosophy. English punctuation with em dashes cleanly marks the appositional list of Levites.
- source_word: קוּמוּ
  chosen: Stand up
  alternatives:
  - Rise
  - Arise
  lexicon: HALOT
  rationale: Imperative plural calling the assembly to action. 'Stand up' is idiomatic modern English and fits the public liturgical setting.
- source_word: בָּרֲכוּ
  chosen: bless
  alternatives:
  - praise
  lexicon: HALOT
  rationale: ברך in the piel here is best rendered 'bless.' Although 'praise' overlaps in effect, 'bless' preserves the lexical form and allows the following noun 'blessing' to echo the same root family.
- source_word: אֶת יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - the Lord
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The direct-object marker is not represented in English.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with 2mp suffix; 'your God' preserves covenantal address to the people.
- source_word: מִן הָעוֹלָם עַד הָעוֹלָם
  chosen: from everlasting to everlasting
  alternatives:
  - forever and ever
  - from age to age
  lexicon: HALOT
  rationale: This idiom expresses unbounded duration. 'From everlasting to everlasting' is both accurate and suitably elevated for worship language.
- source_word: וִיבָרְכוּ
  chosen: And may they bless
  alternatives:
  - And let them bless
  - and bless
  lexicon: HALOT
  rationale: The 3mp jussive/volitive sense is best captured by 'may they bless.' The subject shifts from the direct imperative to a wish/prayer concerning the worshipers.
- source_word: שֵׁם כְּבוֹדֶךָ
  chosen: your glorious name
  alternatives:
  - the name of your glory
  - your name of glory
  lexicon: HALOT
  rationale: The construct is somewhat wooden if rendered literally. 'Your glorious name' is a natural English equivalent that preserves the sense of the name characterized by divine glory.
- source_word: וּמְרוֹמַם
  chosen: which is exalted
  alternatives:
  - and exalted
  - being exalted
  - and it is exalted
  lexicon: HALOT
  rationale: The passive/participle-like form functions predicatively of God's name. Rendering it as a relative clause in English yields a smooth sentence while preserving the descriptive force.
- source_word: עַל כָּל בְּרָכָה וּתְהִלָּה
  chosen: above all blessing and praise
  alternatives:
  - beyond every blessing and praise
  - above every blessing and praise
  lexicon: HALOT
  rationale: The phrase states that God's name transcends all human ascription of blessing and praise. 'Above all blessing and praise' is concise and faithful.
