id: NEH.8.12
reference: Nehemiah 8:12
source:
  edition: WLC
  text: וַ/יֵּלְכ֨וּ כָל הָ/עָ֜ם לֶ/אֱכֹ֤ל וְ/לִ/שְׁתּוֹת֙ וּ/לְ/שַׁלַּ֣ח מָנ֔וֹת
    וְ/לַ/עֲשׂ֖וֹת שִׂמְחָ֣ה גְדוֹלָ֑ה כִּ֤י הֵבִ֨ינוּ֙ בַּ/דְּבָרִ֔ים אֲשֶׁ֥ר הוֹדִ֖יעוּ
    לָ/הֶֽם־׃ס
translation:
  text: And all the people went away to eat and drink, to send portions, and to celebrate
    with great joy, because they had understood the words that had been made known
    to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to send food portions'—that is, portions to others as part of the festival
      celebration.
    reason: lexical_alternative
  - marker: b
    text: Or 'the matters that had been explained to them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  chosen: went away
  alternatives:
  - went
  - departed
  lexicon: HALOT
  rationale: הלך in the waw-consecutive narrative form marks the people's departure
    from the assembly. 'Went away' captures both movement and the sense of leaving
    for the activities that follow.
- source_word: כָל הָעָם
  chosen: all the people
  alternatives:
  - all the people there
  - the whole people
  lexicon: HALOT
  rationale: A straightforward collective expression; 'all the people' is natural
    English and preserves the comprehensiveness of the Hebrew.
- source_word: לֶאֱכֹל וְלִשְׁתּוֹת
  chosen: to eat and drink
  lexicon: HALOT
  rationale: Infinitives of purpose following 'went away'; the idiom is common and
    should be rendered directly.
- source_word: וּלְשַׁלַּח מָנוֹת
  chosen: to send portions
  alternatives:
  - to send food portions
  - to distribute portions
  lexicon: HALOT
  rationale: מָנוֹת refers to allotted portions, especially of food in a festive context.
    'Send portions' is concise and preserves the likely allusion to sharing food with
    others, as in the preceding verse.
- source_word: וְלַעֲשׂוֹת שִׂמְחָה גְדוֹלָה
  chosen: to celebrate with great joy
  alternatives:
  - to make great rejoicing
  - to hold a great celebration
  lexicon: HALOT
  rationale: Literally 'to make great joy/rejoicing.' A slightly dynamic rendering
    is warranted for idiomatic English while preserving the intensity signaled by
    גְדוֹלָה.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for their rejoicing; 'because' is clearer in contemporary
    English than the more formal 'for.'
- source_word: הֵבִינוּ
  chosen: had understood
  alternatives:
  - understood
  - gained understanding of
  lexicon: HALOT
  rationale: The perfect verb indicates completed comprehension as the basis for the
    ensuing actions. The pluperfect-like English 'had understood' fits the causal
    relation in context.
- source_word: בַּדְּבָרִים
  chosen: the words
  alternatives:
  - the matters
  - the message
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words' or 'matters.' In this context of public reading
    and explanation of the law, 'words' best preserves the verbal content they grasped.
- source_word: אֲשֶׁר הוֹדִיעוּ לָהֶם
  chosen: that had been made known to them
  alternatives:
  - that were explained to them
  - that had been declared to them
  lexicon: HALOT
  rationale: The Hiphil of ידע means 'make known, inform.' The passive English construction
    keeps focus on the content received, matching the context of instruction without
    over-specifying the method.
