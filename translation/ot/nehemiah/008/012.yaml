theological_decisions:
- issue: Nature of the people's response to the law
  chosen_reading: Their joy is grounded in understanding the revealed words, not in
    a doctrinally expanded notion beyond the text.
  alternative_readings:
  - Their joy is primarily repentance turned to celebration
  - Their joy is covenant renewal in a more technical theological sense
  rationale: The verse explicitly states that they rejoiced because they understood
    the words made known to them. The translation preserves that causal link without
    importing broader theological conclusions not stated here.
  doctrine_reference: Translation philosophy items 1 and 3
