id: NEH.8.8
reference: Nehemiah 8:8
source:
  edition: WLC
  text: וַֽ/יִּקְרְא֥וּ בַ/סֵּ֛פֶר בְּ/תוֹרַ֥ת הָ/אֱלֹהִ֖ים מְפֹרָ֑שׁ וְ/שׂ֣וֹם שֶׂ֔כֶל
    וַ/יָּבִ֖ינוּ בַּ/מִּקְרָֽא׃ס
translation:
  text: They read from the book, from the law of God, clearly, and they gave the sense,
    so that they understood the reading.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'distinctly'; the Hebrew term may denote reading in a clear manner, making
      the text plain by explanation, or possibly translating it for the hearers.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְאוּ
  chosen: They read
  alternatives:
  - they proclaimed
  - they called out
  lexicon: HALOT
  rationale: קרא commonly means 'read' when the object is a written text. The direct
    object 'the book' makes 'read' the plain sense here.
- source_word: בַּסֵּפֶר
  chosen: from the book
  alternatives:
  - in the book
  lexicon: HALOT
  rationale: With קרא in this context, ב can indicate the source from which the reading
    is done. 'From the book' is idiomatic in English and fits the public reading scene.
- source_word: בְּתוֹרַת הָאֱלֹהִים
  chosen: from the law of God
  alternatives:
  - in the law of God
  - from the instruction of God
  lexicon: HALOT
  rationale: תּוֹרָה can mean 'instruction,' but in Ezra-Nehemiah it often refers
    concretely to the Mosaic law being read publicly. 'Law of God' preserves that
    covenantal-textual sense. Repeating 'from' reflects the second ב preposition and
    clarifies apposition to 'the book.'
- source_word: מְפֹרָשׁ
  chosen: clearly
  alternatives:
  - distinctly
  - with interpretation
  - translated
  lexicon: HALOT
  rationale: The participle from פרש conveys making something plain or distinct. 'Clearly'
    is natural modern English and leaves open whether the clarity came by careful
    enunciation, explanation, or translation. More specific renderings such as 'translated'
    are possible in context but go beyond what the word itself requires.
- source_word: וְשׂוֹם שֶׂכֶל
  chosen: and they gave the sense
  alternatives:
  - and they explained the meaning
  - and they provided understanding
  lexicon: HALOT
  rationale: The idiom literally involves 'placing understanding.' 'Gave the sense'
    is a concise English rendering that preserves the explanatory function without
    over-paraphrasing.
- source_word: וַיָּבִינוּ
  chosen: so that they understood
  alternatives:
  - and they understood
  - and they caused understanding
  lexicon: HALOT
  rationale: 'The verb בין here most naturally expresses the result of the Levites''
    explanation in context. Rendering it as a result clause in English captures the
    flow: they read and explained, with the outcome that the people understood.'
- source_word: בַּמִּקְרָא
  chosen: the reading
  alternatives:
  - what was read
  - the recitation
  lexicon: HALOT
  rationale: מִקְרָא denotes the act/content of reading aloud. 'The reading' is both
    natural and sufficiently formal for the public-scripture context.
