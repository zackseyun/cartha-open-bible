id: NEH.8.11
reference: Nehemiah 8:11
source:
  edition: WLC
  text: וְ/הַ/לְוִיִּ֞ם מַחְשִׁ֤ים לְ/כָל הָ/עָם֙ לֵ/אמֹ֣ר הַ֔סּוּ כִּ֥י הַ/יּ֖וֹם
    קָדֹ֑שׁ וְ/אַל תֵּעָצֵֽבוּ־־׃
translation:
  text: And the Levites were quieting all the people, saying, “Be still, for the day
    is holy; do not be grieved.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Be quiet” or “Hush.”
    reason: lexical_alternative
  - marker: b
    text: Or “do not mourn” or “do not be sad.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַלְוִיִּם
  chosen: And the Levites
  alternatives:
  - And the Levitical men
  lexicon: HALOT
  rationale: Standard rendering of the ethnoreligious group serving in temple-related
    roles. Proper group designation is best transliterated by established English
    form 'Levites'.
- source_word: מַחְשִׁים
  chosen: were quieting
  alternatives:
  - silenced
  - were calming
  - kept quiet
  lexicon: HALOT
  rationale: 'The participle from חשׁה/related quieting sense depicts ongoing action:
    the Levites were actively trying to hush or calm the crowd. ''Were quieting''
    preserves the durative force better than a simple past like ''silenced'' and fits
    the immediate speech that follows.'
- source_word: לְכָל הָעָם
  chosen: all the people
  alternatives:
  - the whole people
  - all the assembly
  lexicon: HALOT
  rationale: עם here refers to the gathered populace. 'All the people' is the most
    natural modern English rendering and preserves the distributive sense of כָל.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and saying
  lexicon: HALOT
  rationale: Standard infinitive-of-quotation marker introducing direct speech.
- source_word: הַסּוּ
  chosen: Be still
  alternatives:
  - Be quiet
  - Hush
  lexicon: HALOT
  rationale: An imperative calling for silence or quiet. 'Be still' is idiomatic and
    suitably solemn in this sacred setting, while still conveying the command to cease
    noisy lament.
- source_word: כִּי הַיּוֹם קָדֹשׁ
  chosen: for this day is holy
  alternatives:
  - for the day is holy
  - because today is holy
  lexicon: HALOT
  rationale: כִּי gives the reason for the command. 'This day' fits the immediate
    occasion in context; 'holy' is the direct and theologically appropriate rendering
    of קָדֹשׁ.
- source_word: וְאַל תֵּעָצֵבוּ
  chosen: do not be grieved
  alternatives:
  - do not mourn
  - do not be sad
  lexicon: HALOT
  rationale: The verb עצב in the Niphal can denote being pained, grieved, or saddened.
    'Do not be grieved' preserves the emotional sense without over-specifying ritual
    mourning, and matches the context of the people weeping at the hearing of the
    law.
