id: NEH.8.4
reference: Nehemiah 8:4
source:
  edition: WLC
  text: וַֽ/יַּעֲמֹ֞ד עֶזְרָ֣א הַ/סֹּפֵ֗ר עַֽל מִגְדַּל עֵץ֮ אֲשֶׁ֣ר עָשׂ֣וּ לַ/דָּבָר֒
    וַ/יַּֽעֲמֹ֣ד אֶצְל֡/וֹ מַתִּתְיָ֡ה וְ/שֶׁ֡מַע וַ֠/עֲנָיָה וְ/אוּרִיָּ֧ה וְ/חִלְקִיָּ֛ה
    וּ/מַעֲשֵׂיָ֖ה עַל יְמִינ֑/וֹ וּ/מִ/שְּׂמֹאל֗/וֹ פְּ֠דָיָה וּ/מִֽישָׁאֵ֧ל וּ/מַלְכִּיָּ֛ה
    וְ/חָשֻׁ֥ם וְ/חַשְׁבַּדָּ֖נָה זְכַרְיָ֥ה מְשֻׁלָּֽם־־־׃פ
translation:
  text: Ezra the scribe stood on a wooden platform that they had made for the occasion,
    and beside him stood Mattithiah, Shema, Anaiah, Uriah, Hilkiah, and Maaseiah on
    his right hand, and Pedaiah, Mishael, Malchijah, Hashum, Hashbaddanah, Zechariah,
    and Meshullam on his left hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''a tower of wood''; that is, a raised wooden structure or stand.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for the matter' or 'for the purpose.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִגְדַּל עֵץ
  chosen: a wooden platform
  alternatives:
  - a tower of wood
  - a wooden tower
  - a wooden stand
  lexicon: HALOT
  rationale: Literally 'tower of wood,' but in this public-reading context it refers
    to a raised wooden structure for standing before the people. 'Platform' communicates
    the function in natural English without over-literalizing 'tower.'
- source_word: לַדָּבָר
  chosen: for the occasion
  alternatives:
  - for the matter
  - for the purpose
  - for this event
  lexicon: HALOT
  rationale: דָּבָר can mean 'word, matter, affair, thing.' Here the sense is the
    specific purpose/event for which the structure was prepared. 'For the occasion'
    is idiomatic and fits the narrative setting of the assembly and reading.
- source_word: אֶצְלוֹ
  chosen: beside him
  alternatives:
  - with him
  - next to him
  - at his side
  lexicon: HALOT
  rationale: The preposition indicates proximity. 'Beside him' is clear, natural English
    and suits the following list of men stationed at Ezra's sides.
- source_word: עַל יְמִינוֹ
  chosen: on his right hand
  alternatives:
  - at his right
  - on his right side
  lexicon: HALOT
  rationale: The Hebrew literally says 'on his right.' 'Right hand' preserves the
    concrete directional idiom while remaining understandable in English.
- source_word: וּמִשְּׂמֹאלוֹ
  chosen: on his left hand
  alternatives:
  - at his left
  - on his left side
  lexicon: HALOT
  rationale: Parallel to 'on his right.' 'Left hand' preserves the Hebrew's bodily
    directional language and balances the clause stylistically.
- source_word: הַסֹּפֵר
  chosen: the scribe
  alternatives:
  - the scholar
  - the secretary
  lexicon: HALOT
  rationale: סֹפֵר commonly denotes a scribe, especially one skilled in the law and
    texts. 'Scribe' is the standard and most precise rendering here.
- source_word: וַיַּעֲמֹד
  chosen: stood
  alternatives:
  - took his stand
  - was standing
  lexicon: HALOT
  rationale: The wayyiqtol of עמד narrates simple past action. 'Stood' is straightforward
    and preserves the repeated verb used both for Ezra and those beside him.
