id: NEH.8.7
reference: Nehemiah 8:7
source:
  edition: WLC
  text: וְ/יֵשׁ֡וּעַ וּ/בָנִ֡י וְ/שֵׁרֵ֥בְיָ֣ה יָמִ֡ין עַקּ֡וּב שַׁבְּתַ֣י הֽוֹדִיָּ֡ה מַעֲשֵׂיָ֡ה קְלִיטָ֣א עֲזַרְיָה֩ יוֹזָבָ֨ד חָנָ֤ן פְּלָאיָה֙ וְ/הַ/לְוִיִּ֔ם מְבִינִ֥ים אֶת הָ/עָ֖ם לַ/תּוֹרָ֑ה וְ/הָ/עָ֖ם עַל עָמְדָֽ/ם׀׀־־׃
translation:
  text: And Jeshua[a], Bani, Sherebiah, Jamin, Akkub, Shabbethai, Hodiah, Maaseiah, Kelita, Azariah, Jozabad, Hanan[b], Pelaiah, and the Levites gave the people understanding in the law, while the people remained in their places.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''helped the people understand the law.'' The Hebrew verb is causative: the Levites were making the law understood.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'while the people stood in their place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יֵשׁוּעַ ... פְּלָאיָה
  chosen: Jeshua, Bani, Sherebiah, Jamin, Akkub, Shabbethai, Hodiah, Maaseiah, Kelita, Azariah, Jozabad, Hanan, Pelaiah
  alternatives:
  - Jeshua ... Pelaiah (with minor spelling variants such as Akkub/Accub, Kelita/Kelitha)
  rationale: Personal names are transliterated rather than translated, following project philosophy. Standard English OT spellings are used where established and recognizable.
- source_word: וְהַלְוִיִּם
  chosen: and the Levites
  alternatives:
  - that is, the Levites
  lexicon: HALOT
  rationale: The conjunction plus noun is rendered straightforwardly. Although the listed men may themselves be Levites, the Hebrew appositionally adds 'and the Levites'; retaining it preserves the structure without over-resolving whether the names are a subset or followed by a broader group.
- source_word: מְבִינִים
  chosen: explained
  alternatives:
  - gave understanding
  - instructed
  - helped ... understand
  lexicon: HALOT
  rationale: The Hiphil participle of בין here denotes causing understanding. 'Explained' is natural modern English and fits the context of public Torah reading and interpretation, while preserving the causative sense.
- source_word: אֶת־הָעָם
  chosen: to the people
  alternatives:
  - the people
  - the people to understand
  lexicon: HALOT
  rationale: Although marked with the direct-object particle, English idiom with 'explained' normally takes an indirect object ('explained ... to the people'). This is an optimal-equivalence adjustment for readable English.
- source_word: לַתּוֹרָה
  chosen: the law
  alternatives:
  - the Torah
  - the instruction
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction broadly or the Torah/Law more specifically. In this narrative of covenantal public reading, 'the law' is the most idiomatic and contextually fitting English rendering. 'Torah' is possible but less accessible for general readers.
- source_word: וְהָעָם עַל עָמְדָם
  chosen: while the people remained in their places
  alternatives:
  - and the people were standing in their place
  - while the people stood where they were
  lexicon: HALOT
  rationale: The phrase literally refers to the people being upon their standing/place of standing. The sense is that they stayed where they were as the Levites explained. 'Remained in their places' conveys the idiom clearly in modern English without unnecessary stiffness.
