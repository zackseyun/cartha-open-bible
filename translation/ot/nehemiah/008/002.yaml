theological_decisions:
- issue: Gendered audience description
  chosen_reading: from man to woman
  alternative_readings:
  - both men and women
  rationale: The Hebrew explicitly uses singular gendered terms to mark the full scope
    of the assembly. The translation preserves that wording in line with the project's
    gender-accurate policy, while still conveying inclusiveness.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering תּוֹרָה
  chosen_reading: the law
  alternative_readings:
  - the Torah
  - the instruction
  rationale: No doctrinal controversy is at stake here, but the term carries covenantal
    weight. 'The law' best fits the immediate context of public reading of the Mosaic
    corpus while remaining readable modern English.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
