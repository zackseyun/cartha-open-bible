id: NEH.8.2
reference: Nehemiah 8:2
source:
  edition: WLC
  text: וַ/יָּבִ֣יא עֶזְרָ֣א הַ֠/כֹּהֵן אֶֽת הַ/תּוֹרָ֞ה לִ/פְנֵ֤י הַ/קָּהָל֙ מֵ/אִ֣ישׁ
    וְ/עַד אִשָּׁ֔ה וְ/כֹ֖ל מֵבִ֣ין לִ/שְׁמֹ֑עַ בְּ/י֥וֹם אֶחָ֖ד לַ/חֹ֥דֶשׁ הַ/שְּׁבִיעִֽי־־׃
translation:
  text: Then Ezra the priest brought the law before the assembly, both men and women,
    and all who could understand what they heard, on the first day of the seventh
    month.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “both men and women.” The Hebrew reads literally “from man to woman,”
      expressing the full range of the assembly.
    reason: lexical_alternative
  - marker: b
    text: Or “all who could understand by hearing,” that is, all who were able to
      comprehend the reading.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבִיא
  chosen: Then ... brought
  alternatives:
  - and ... brought
  - so ... brought
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... brought' gives
    natural English narrative sequence without flattening the verbal force.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: A straightforward title appositional to Ezra; retained explicitly because
    it is present in the Hebrew and situates Ezra's role.
- source_word: הַתּוֹרָה
  chosen: the law
  alternatives:
  - the instruction
  - the Torah
  lexicon: HALOT
  rationale: In this context the referent is the Mosaic law being publicly read. 'The
    law' is the most idiomatic and contextually clear English rendering. 'Torah' is
    possible but less transparent for general readers; 'instruction' is lexically
    possible but too broad here.
- source_word: לִפְנֵי הַקָּהָל
  chosen: before the assembly
  alternatives:
  - in the presence of the assembly
  - before the congregation
  lexicon: HALOT
  rationale: '''Before the assembly'' preserves the public, formal setting. ''Assembly''
    is preferred over ''congregation'' to avoid importing specifically ecclesial overtones
    not required by the Hebrew.'
- source_word: מֵאִישׁ וְעַד אִשָּׁה
  chosen: from man to woman
  alternatives:
  - both men and women
  - from men to women
  lexicon: HALOT
  rationale: This preserves the Hebrew distributive range and the gendered wording
    of the source. It follows the project's gender-accurate principle rather than
    neutralizing the expression.
- source_word: וְכֹל מֵבִין לִשְׁמֹעַ
  chosen: and all who could understand what they heard
  alternatives:
  - and everyone able to understand by hearing
  - and all who understood to hear
  - and all who were able to listen with understanding
  lexicon: HALOT
  rationale: The phrase denotes those capable of comprehending the reading, not merely
    physically hearing. The English expansion 'what they heard' makes the idiom natural
    while preserving the sense of auditory comprehension.
- source_word: בְּיוֹם אֶחָד לַחֹדֶשׁ הַשְּׁבִיעִי
  chosen: on the first day of the seventh month
  alternatives:
  - on day one of the seventh month
  lexicon: HALOT
  rationale: This is the standard idiomatic rendering of the Hebrew date formula in
    English.
