id: NEH.8.13
reference: Nehemiah 8:13
source:
  edition: WLC
  text: וּ/בַ/יּ֣וֹם הַ/שֵּׁנִ֡י נֶאֶסְפוּ֩ רָאשֵׁ֨י הָ/אָב֜וֹת לְ/כָל הָ/עָ֗ם הַ/כֹּֽהֲנִים֙ וְ/הַ/לְוִיִּ֔ם אֶל עֶזְרָ֖א הַ/סֹּפֵ֑ר וּ/לְ/הַשְׂכִּ֖יל אֶל דִּבְרֵ֥י הַ/תּוֹרָֽה־־־׃
translation:
  text: And on the second day[a], the heads of the fathers’ houses of all the people, the priests, and the Levites gathered to Ezra the scribe to gain insight into the words of the law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the family heads.' The Hebrew literally says 'the heads of the fathers’ houses,' referring to clan or extended-family leaders.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַיּוֹם הַשֵּׁנִי
  chosen: And on the second day
  alternatives:
  - On the second day
  - Then on the second day
  lexicon: HALOT
  rationale: Temporal phrase with conjunction waw. 'And on the second day' preserves the narrative linkage and the straightforward temporal sense.
- source_word: נֶאֶסְפוּ
  chosen: gathered
  alternatives:
  - were gathered
  - assembled
  lexicon: HALOT
  rationale: Niphal plural of אסף here is naturally rendered intransitively as 'gathered' or 'assembled.' 'Gathered' is idiomatic and concise in English while preserving the collective action.
- source_word: רָאשֵׁי הָאָבוֹת
  chosen: the heads of the fathers’ houses
  alternatives:
  - the family heads
  - the heads of ancestral houses
  - the chiefs of the fathers
  lexicon: HALOT
  rationale: This expression denotes clan/family leaders. 'Heads of the fathers’ houses' keeps the social structure visible and stays close to the Hebrew, while avoiding over-paraphrase. A more dynamic alternative is preserved in a footnote.
- source_word: לְכָל הָעָם
  chosen: of all the people
  alternatives:
  - for all the people
  - belonging to all the people
  lexicon: HALOT
  rationale: The phrase modifies 'heads of the fathers’ houses' and indicates these leaders were drawn from the whole people. 'Of all the people' is the most natural English construal in context.
- source_word: הַכֹּהֲנִים וְהַלְוִיִּם
  chosen: the priests, and the Levites
  alternatives:
  - the priests and Levites
  lexicon: HALOT
  rationale: These groups are listed alongside the family heads as those who gathered. The comma helps reflect the appositional/list structure of the Hebrew.
- source_word: אֶל עֶזְרָא הַסֹּפֵר
  chosen: to Ezra the scribe
  alternatives:
  - to Ezra the scholar
  - before Ezra the scribe
  lexicon: HALOT
  rationale: אֶל marks movement toward Ezra. 'Scribe' is the standard and contextually appropriate rendering of סֹפֵר here, referring to Ezra's recognized role as a learned expert in the law.
- source_word: וּלְהַשְׂכִּיל
  chosen: to gain insight
  alternatives:
  - to understand
  - to become wise
  - to study carefully
  lexicon: HALOT
  rationale: The Hiphil infinitive of שׂכל conveys acting with understanding or gaining insight. 'To gain insight' captures the purposive nuance without flattening it to mere cognition.
- source_word: אֶל דִּבְרֵי הַתּוֹרָה
  chosen: into the words of the law
  alternatives:
  - concerning the words of the law
  - in the words of the law
  - the matters of the law
  lexicon: HALOT
  rationale: With השׂכיל, אֶל can indicate direction toward the object of understanding. 'Into the words of the law' is idiomatic enough in English and preserves the sense of seeking understanding regarding the specific wording/content of the Torah. 'Law' is appropriate for תּוֹרָה in this covenantal-instructional context.
