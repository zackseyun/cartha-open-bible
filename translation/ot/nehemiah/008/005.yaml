id: NEH.8.5
reference: Nehemiah 8:5
source:
  edition: WLC
  text: וַ/יִּפְתַּ֨ח עֶזְרָ֤א הַ/סֵּ֨פֶר֙ לְ/עֵינֵ֣י כָל הָ/עָ֔ם כִּֽי מֵ/עַ֥ל כָּל הָ/עָ֖ם הָיָ֑ה וּ/כְ/פִתְח֖/וֹ עָֽמְד֥וּ כָל הָ/עָֽם־־־־׃
translation:
  text: Ezra opened the book in the sight of all the people[a], for he was above all the people; and when he opened it, all the people stood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the scroll.' The Hebrew סֵפֶר can refer to a written document in scroll form.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְתַּח
  chosen: opened
  alternatives:
  - unrolled
  lexicon: HALOT
  rationale: The verb פתח means 'to open.' Although a scroll may physically be 'unrolled,' the Hebrew uses the ordinary verb 'open,' and English can naturally say a book or scroll was opened.
- source_word: הַסֵּפֶר
  chosen: the book
  alternatives:
  - the scroll
  lexicon: HALOT
  rationale: סֵפֶר can denote a written document, book, or scroll. 'Book' is a conventional and sufficiently broad rendering in English, while the likely ancient physical form ('scroll') is preserved as an alternative.
- source_word: לְעֵינֵי
  chosen: in the sight of
  alternatives:
  - before
  - in full view of
  lexicon: HALOT
  rationale: Literally 'to the eyes of.' 'In the sight of' preserves the visual/public sense with good English style.
- source_word: כָל הָעָם
  chosen: all the people
  alternatives:
  - all the assembly
  lexicon: HALOT
  rationale: עָם here refers to the gathered populace. 'All the people' is the most direct and natural rendering and fits the repeated emphasis in the verse.
- source_word: כִּי מֵעַל כָּל הָעָם הָיָה
  chosen: for he was above all the people
  alternatives:
  - because he was standing higher than all the people
  - for he was elevated above all the people
  lexicon: HALOT
  rationale: The clause explains why everyone could see him. מֵעַל indicates physical elevation here, not social superiority. 'He was above all the people' is concise and faithful; the physical sense is clarified by context.
- source_word: וּכְפִתְחוֹ
  chosen: and when he opened it
  alternatives:
  - and as he opened it
  lexicon: HALOT
  rationale: The prefixed כ marks temporal sense, 'when/as.' English idiom favors 'when he opened it.' The object 'it' is supplied naturally from 'the book.'
- source_word: עָמְדוּ
  chosen: stood
  alternatives:
  - rose to their feet
  lexicon: HALOT
  rationale: The verb עמד means 'stand.' 'Stood' is the direct rendering; 'rose to their feet' is interpretive expansion and therefore left as an alternative only.
