id: NEH.8.16
reference: Nehemiah 8:16
source:
  edition: WLC
  text: וַ/יֵּצְא֣וּ הָ/עָם֮ וַ/יָּבִיאוּ֒ וַ/יַּעֲשׂוּ֩ לָ/הֶ֨ם סֻכּ֜וֹת אִ֤ישׁ עַל גַּגּ/וֹ֙ וּ/בְ/חַצְרֹ֣תֵי/הֶ֔ם וּ/בְ/חַצְר֖וֹת בֵּ֣ית הָ/אֱלֹהִ֑ים וּ/בִ/רְחוֹב֙ שַׁ֣עַר הַ/מַּ֔יִם וּ/בִ/רְח֖וֹב שַׁ֥עַר אֶפְרָֽיִם־׃
translation:
  text: So the people went out and brought them[a], and made booths for themselves, each on his roof, and in their courtyards, and in the courtyards of the house of God, and in the square of the Water Gate[b], and in the square of the Gate of Ephraim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shelters' for סֻכּוֹת; 'booths' is retained to preserve the connection with the Feast of Booths.
    reason: lexical_alternative
  - marker: b
    text: Hebrew רְחוֹב refers to an open public area or plaza near a gate; traditionally, 'broad place.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּצְאוּ
  chosen: went out
  alternatives:
  - went forth
  lexicon: HALOT
  rationale: Common wayyiqtol of יצא, narrating the people's action of going out from where they were to gather materials. 'Went out' is natural modern English and sufficiently formal.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: עם here refers collectively to the covenant community present in the narrative. 'The people' is the standard and most transparent rendering.
- source_word: וַיָּבִיאוּ
  chosen: brought them
  alternatives:
  - brought
  - brought in
  lexicon: HALOT
  rationale: The verb בוא in Hiphil means 'bring.' The object is implicit from the previous verse's branches and foliage; 'them' makes the English intelligible without over-paraphrasing.
- source_word: וַיַּעֲשׂוּ לָהֶם סֻכּוֹת
  chosen: made booths for themselves
  alternatives:
  - made shelters for themselves
  - made temporary shelters for themselves
  lexicon: HALOT
  rationale: סֻכּוֹת refers to the temporary festival structures of the Feast of Booths. 'Booths' preserves the biblical-festival connection better than the more generic 'shelters,' while 'for themselves' reflects לָהֶם.
- source_word: אִישׁ
  chosen: each
  alternatives:
  - every man
  - each man
  lexicon: HALOT
  rationale: Although אִישׁ is formally singular masculine, in distributive construction it means 'each' or 'each one.' This preserves the distributive sense without awkward repetition. The following singular possessive in English still reflects the individualizing force.
- source_word: עַל גַּגּוֹ
  chosen: on his roof
  alternatives:
  - on his housetop
  - on the roof of his house
  lexicon: HALOT
  rationale: גָּג is a flat roof/housetop. 'Roof' is readable modern English; 'his' matches the singular distributive force after אִישׁ.
- source_word: וּבְחַצְרֹתֵיהֶם
  chosen: in their courtyards
  alternatives:
  - in their courts
  - in their yards
  lexicon: HALOT
  rationale: חָצֵר denotes an enclosed court/courtyard. 'Courtyards' is more precise and natural than 'courts' in contemporary English.
- source_word: וּבְחַצְרוֹת בֵּית הָאֱלֹהִים
  chosen: in the courtyards of the house of God
  alternatives:
  - in the courts of the house of God
  - in the courtyards of God's house
  lexicon: HALOT
  rationale: The phrase refers to the temple precincts. 'House of God' is a transparent formal rendering of בֵּית הָאֱלֹהִים and fits the narrative setting.
- source_word: וּבִרְחוֹב
  chosen: in the square
  alternatives:
  - in the broad place
  - in the plaza
  lexicon: HALOT
  rationale: רְחוֹב denotes an open public space, often a plaza or square near a gate. 'Square' is idiomatic and contextually apt.
- source_word: שַׁעַר הַמַּיִם
  chosen: the Water Gate
  alternatives:
  - the gate of water
  lexicon: HALOT
  rationale: As a named city gate, capitalization and the conventional order 'Water Gate' communicate that this is a proper place-name.
- source_word: שַׁעַר אֶפְרָיִם
  chosen: the Gate of Ephraim
  alternatives:
  - the Ephraim Gate
  lexicon: HALOT
  rationale: This is another named gate. 'Gate of Ephraim' is a transparent rendering that preserves the Hebrew genitival form while remaining natural English.
