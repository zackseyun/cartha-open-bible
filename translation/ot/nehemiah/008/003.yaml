theological_decisions:
- issue: Rendering תּוֹרָה in a public-reading covenant context
  chosen_reading: Law
  alternative_readings:
  - instruction
  - Torah
  rationale: While תּוֹרָה can broadly mean 'instruction,' in Nehemiah 8 the reference is to the authoritative written covenantal corpus being read publicly. 'Law' best matches the historical and literary context. 'Torah' is a viable transliteration but less transparent for general readers.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern English, not archaic or academic.'
- issue: Gender representation in the audience description
  chosen_reading: the men and the women and those who could understand
  alternative_readings:
  - men, women, and all who were able to understand
  rationale: The Hebrew explicitly distinguishes men and women, then adds a third group defined by comprehension. The translation preserves these distinctions rather than smoothing them into a generic audience description, consistent with the project's gender-accurate principle.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
