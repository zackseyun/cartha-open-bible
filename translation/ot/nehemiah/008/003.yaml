id: NEH.8.3
reference: Nehemiah 8:3
source:
  edition: WLC
  text: וַ/יִּקְרָא ב/וֹ֩ לִ/פְנֵ֨י הָ/רְח֜וֹב אֲשֶׁ֣ר לִ/פְנֵ֣י שַֽׁעַר הַ/מַּ֗יִם מִן הָ/אוֹר֙ עַד מַחֲצִ֣ית הַ/יּ֔וֹם נֶ֛גֶד הָ/אֲנָשִׁ֥ים וְ/הַ/נָּשִׁ֖ים וְ/הַ/מְּבִינִ֑ים וְ/אָזְנֵ֥י כָל הָ/עָ֖ם אֶל סֵ֥פֶר הַ/תּוֹרָֽה־׀־־־־־׃
translation:
  text: And he read from it before the square that was in front of the Water Gate[a], from daybreak until midday, in the presence of the men and the women and those who could understand[c][b]; and the ears of all the people were attentive to the Book of the Law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from dawn.' Literally, 'from the light.'
    reason: lexical_alternative
  - marker: b
    text: Or 'those with understanding,' likely referring to all who were old enough to comprehend the reading.
    reason: lexical_alternative
  - marker: c
    text: '''Book'' may also be rendered ''scroll.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: he read
  alternatives:
  - he proclaimed
  - he called out
  lexicon: HALOT
  rationale: In context with בּוֹ ('from/in it') referring to the scroll/book, קרא most naturally means 'read' rather than the broader 'call/proclaim.' The narrative setting is public reading of the law.
- source_word: בּוֹ
  chosen: from it
  alternatives:
  - in it
  lexicon: HALOT
  rationale: The preposition ב can be rendered literally 'in it,' but idiomatic English with a written text is 'read from it.' This preserves the sense without awkwardness.
- source_word: לִפְנֵי הָרְחוֹב
  chosen: before the square
  alternatives:
  - in front of the plaza
  - before the open place
  lexicon: HALOT
  rationale: רְחוֹב denotes an open public space or square. 'Square' is clear modern English and fits the civic setting.
- source_word: אֲשֶׁר לִפְנֵי שַׁעַר הַמַּיִם
  chosen: that was in front of the Water Gate
  alternatives:
  - which was before the Water Gate
  lexicon: HALOT
  rationale: This relative clause identifies the location of the square. 'Water Gate' is retained as a place name by standard transliteration/translation convention.
- source_word: מִן הָאוֹר
  chosen: from daybreak
  alternatives:
  - from the light
  - from dawn
  lexicon: HALOT
  rationale: Literally 'from the light,' but temporally it refers to first light/daybreak. 'Daybreak' is natural English and accurately conveys the time reference.
- source_word: עַד מַחֲצִית הַיּוֹם
  chosen: until midday
  alternatives:
  - until half the day
  - until noon
  lexicon: HALOT
  rationale: The phrase means the middle of the day. 'Midday' is a natural rendering that stays close to the Hebrew.
- source_word: נֶגֶד
  chosen: in the presence of
  alternatives:
  - before
  - facing
  lexicon: HALOT
  rationale: Here נֶגֶד marks the assembled audience before whom the reading took place. 'In the presence of' communicates this relational sense clearly.
- source_word: הָאֲנָשִׁים וְהַנָּשִׁים
  chosen: the men and the women
  alternatives:
  - the men and women
  lexicon: HALOT
  rationale: The Hebrew explicitly marks both groups. The translation preserves the gendered pair rather than collapsing it into a generic collective, in keeping with gender-accurate translation.
- source_word: וְהַמְּבִינִים
  chosen: those who could understand
  alternatives:
  - those with understanding
  - the ones understanding
  lexicon: HALOT
  rationale: The participle from בין refers to those capable of comprehension, likely including children old enough to follow the reading. 'Those who could understand' is idiomatic and contextually precise.
- source_word: וְאָזְנֵי כָל הָעָם
  chosen: the ears of all the people were attentive
  alternatives:
  - all the people listened attentively
  - the ears of all the people were toward
  lexicon: HALOT
  rationale: The Hebrew uses a concrete idiom with 'ears.' Retaining 'ears' preserves the vividness of the source while adding 'were attentive' to make the idiom natural in English.
- source_word: אֶל סֵפֶר הַתּוֹרָה
  chosen: to the Book of the Law
  alternatives:
  - to the scroll of the law
  - to the book of the Torah
  lexicon: HALOT
  rationale: סֵפֶר can mean book/scroll/document; 'Book' is conventional and understandable. תּוֹרָה here refers specifically to the Mosaic law/instructional corpus; 'Law' is the clearest contextual rendering, while capitalized as part of the recognized expression 'Book of the Law.'
