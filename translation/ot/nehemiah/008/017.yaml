theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The Hebrew is grammatically masculine and functions as a covenantal ethnonym.
    Following the doctrine's gender-accurate principle, the translation preserves
    the masculine form rather than neutralizing it in the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Identity of יֵשׁוּעַ בִּן נוּן
  chosen_reading: Jeshua son of Nun
  alternative_readings:
  - Joshua son of Nun
  rationale: The Hebrew form in this verse is יֵשׁוּעַ rather than the fuller יְהוֹשֻׁעַ.
    To reflect original-language primacy, the main text follows the attested form,
    while the familiar English identification is preserved in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 2
