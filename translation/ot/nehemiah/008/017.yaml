id: NEH.8.17
reference: Nehemiah 8:17
source:
  edition: WLC
  text: וַ/יַּֽעֲשׂ֣וּ כָֽל הַ֠/קָּהָל הַ/שָּׁבִ֨ים מִן הַ/שְּׁבִ֥י סֻכּוֹת֮ וַ/יֵּשְׁב֣וּ
    בַ/סֻּכּוֹת֒ כִּ֣י לֹֽא עָשׂ֡וּ מִ/ימֵי֩ יֵשׁ֨וּעַ בִּן נ֥וּן כֵּן֙ בְּנֵ֣י יִשְׂרָאֵ֔ל
    עַ֖ד הַ/יּ֣וֹם הַ/ה֑וּא וַ/תְּהִ֥י שִׂמְחָ֖ה גְּדוֹלָ֥ה מְאֹֽד־־׀־־׃
translation:
  text: And all the assembly of those who had returned from the captivity made booths
    and lived in the booths, for the sons of Israel had not done so from the days
    of Jeshua son of Nun until that day. And there was very great rejoicing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jeshua son of Nun, that is, Joshua son of Nun.
    reason: alternative_reading
lexical_decisions:
- source_word: הַקָּהָל
  chosen: the assembly
  alternatives:
  - the congregation
  - the community
  lexicon: HALOT
  rationale: קָהָל denotes the gathered community. 'Assembly' preserves the corporate,
    gathered sense without sounding overly ecclesiastical.
- source_word: הַשָּׁבִים מִן הַשְּׁבִי
  chosen: those who had returned from the captivity
  alternatives:
  - those who had returned from exile
  - the returned exiles
  lexicon: HALOT
  rationale: The participle plus prepositional phrase identifies the returned community.
    'From the captivity' is a close rendering of the Hebrew; 'from exile' is possible
    but slightly more interpretive.
- source_word: סֻכּוֹת
  chosen: booths
  alternatives:
  - temporary shelters
  - tabernacles
  lexicon: HALOT
  rationale: The term refers to temporary shelters used in the Feast of Booths. 'Booths'
    is the standard, clear English equivalent; 'tabernacles' is traditional but potentially
    misleading to modern readers because of its association with the sanctuary.
- source_word: וַיֵּשְׁבוּ בַסֻּכּוֹת
  chosen: lived in the booths
  alternatives:
  - dwelt in the booths
  - sat in the booths
  lexicon: HALOT
  rationale: יָשַׁב commonly means 'sit,' 'dwell,' or 'live' depending on context.
    Here the festival practice requires habitation, so 'lived in' best conveys the
    sense in natural English.
- source_word: כִּי לֹא עָשׂוּ ... כֵּן
  chosen: for ... had not done so
  alternatives:
  - for ... had not celebrated it this way
  - for ... had not done this
  lexicon: HALOT
  rationale: The idiom refers not to absolute non-observance of the feast in all history,
    but to not doing it in this manner, namely making and living in booths as just
    described. 'Had not done so' preserves the Hebrew terseness while allowing the
    anaphoric force of כֵּן.
- source_word: מִימֵי יֵשׁוּעַ בִּן נוּן
  chosen: from the days of Jeshua son of Nun
  alternatives:
  - since the days of Joshua son of Nun
  lexicon: HALOT
  rationale: The consonantal form here is יֵשׁוּעַ, which can be represented as 'Jeshua.'
    Because the same figure is elsewhere widely known in English as 'Joshua son of
    Nun,' that alternative is worth preserving in a footnote.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Per the project's gender-accurate philosophy, the masculine plural construct
    is retained as 'sons of Israel.' It is a conventional covenantal designation and
    should not be flattened unless context requires.
- source_word: וַתְּהִי שִׂמְחָה גְּדוֹלָה מְאֹד
  chosen: And there was very great rejoicing
  alternatives:
  - And there was exceedingly great joy
  - And there was very great gladness
  lexicon: HALOT
  rationale: שִׂמְחָה can be rendered 'joy,' 'gladness,' or 'rejoicing.' 'Rejoicing'
    captures the communal, active celebration implied by the context, while 'very
    great' reflects גְּדוֹלָה מְאֹד straightforwardly.
