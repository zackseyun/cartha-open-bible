id: NEH.8.15
reference: Nehemiah 8:15
source:
  edition: WLC
  text: וַ/אֲשֶׁ֣ר יַשְׁמִ֗יעוּ וְ/יַעֲבִ֨ירוּ ק֥וֹל בְּ/כָל עָרֵי/הֶם֮ וּ/בִ/ירוּשָׁלִַ֣ם
    לֵ/אמֹר֒ צְא֣וּ הָ/הָ֗ר וְ/הָבִ֨יאוּ֙ עֲלֵי זַ֨יִת֙ וַ/עֲלֵי עֵ֣ץ שֶׁ֔מֶן וַ/עֲלֵ֤י
    הֲדַס֙ וַ/עֲלֵ֣י תְמָרִ֔ים וַ/עֲלֵ֖י עֵ֣ץ עָבֹ֑ת לַ/עֲשֹׂ֥ת סֻכֹּ֖ת כַּ/כָּתֽוּב־־־׃פ
translation:
  text: and that they should proclaim and spread the message through all their cities
    and in Jerusalem, saying, “Go out to the hill country and bring branches of olive,
    oil tree, myrtle, palm, and other leafy trees, to make booths, as it is written.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''oil tree'' or ''oleaster'' for ''wild olive'' (Hebrew: עֵץ שֶׁמֶן).
      The exact species identification is uncertain.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally 'leaves of olive ... leaves of myrtle ...' The translation
      uses 'branches' where English more naturally expresses the construction material
      gathered for the booths.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲשֶׁר
  chosen: and that
  alternatives:
  - that
  - namely that
  lexicon: HALOT
  rationale: Introduces the content of what was found written in the law (continuing
    from v. 14). 'And that' preserves the conjunction with the relative particle in
    smooth English.
- source_word: יַשְׁמִיעוּ
  chosen: they should proclaim
  alternatives:
  - they should make heard
  - they should publish
  lexicon: HALOT
  rationale: Hiphil of שׁמע means to cause to hear, hence 'proclaim' or 'make known.'
    'Proclaim' is idiomatic and preserves the public-announcement sense.
- source_word: וְיַעֲבִירוּ קוֹל
  chosen: and spread the message
  alternatives:
  - and cause a proclamation to pass
  - and send the sound throughout
  lexicon: HALOT
  rationale: The idiom 'cause a voice/sound to pass' means to circulate a proclamation
    broadly. 'Spread the message' captures the idiom in natural English while retaining
    the public-broadcast sense.
- source_word: בְּכָל עָרֵיהֶם וּבִירוּשָׁלַם
  chosen: through all their cities and in Jerusalem
  alternatives:
  - in all their towns and in Jerusalem
  lexicon: HALOT
  rationale: עִיר can be 'city' or 'town.' 'Cities' is retained for consistency and
    because the phrase contrasts the wider settlements with Jerusalem specifically.
- source_word: צְאוּ הָהָר
  chosen: Go out to the hill country
  alternatives:
  - Go out to the mountain
  - Go out to the hills
  lexicon: HALOT
  rationale: הָהָר literally 'the mountain/hill country.' In this context of gathering
    foliage from the surrounding uplands, 'hill country' is the most natural geographic
    rendering.
- source_word: וְהָבִיאוּ
  chosen: and bring
  alternatives:
  - and fetch
  lexicon: HALOT
  rationale: Simple imperative to bring back the listed materials.
- source_word: עֲלֵי זַיִת
  chosen: branches of olive
  alternatives:
  - olive leaves
  - olive branches
  lexicon: HALOT
  rationale: Though עֲלֵי is literally 'leaves of,' in English the practical sense
    for construction material is better conveyed by 'branches of olive,' which naturally
    includes leafy boughs.
- source_word: עֵץ שֶׁמֶן
  chosen: wild olive
  alternatives:
  - oil tree
  - oleaster
  lexicon: HALOT
  rationale: The species identification is debated. 'Wild olive' is a common and accessible
    rendering for עֵץ שֶׁמֶן in this list of foliage-bearing trees; alternatives are
    preserved in a footnote.
- source_word: הֲדַס
  chosen: myrtle
  lexicon: HALOT
  rationale: Standard rendering of the plant name.
- source_word: תְמָרִים
  chosen: palm
  alternatives:
  - palm trees
  - date palms
  lexicon: HALOT
  rationale: In a list governed by 'branches/leaves of,' English can shorten to 'palm'
    without loss. The sense is palm branches.
- source_word: עֵץ עָבֹת
  chosen: other leafy trees
  alternatives:
  - thick trees
  - trees with dense foliage
  - leafy trees
  lexicon: HALOT
  rationale: The adjective עָבֹת denotes thick/dense foliage. 'Other leafy trees'
    communicates the category naturally in context, after the specific species already
    named.
- source_word: לַעֲשׂוֹת סֻכּוֹת
  chosen: to make booths
  alternatives:
  - to make shelters
  - to make temporary shelters
  lexicon: HALOT
  rationale: סֻכּוֹת refers to the temporary booths used for the feast. 'Booths' preserves
    the festival terminology and links to the Feast of Booths.
- source_word: כַּכָּתוּב
  chosen: as it is written
  alternatives:
  - as written
  - according to what is written
  lexicon: HALOT
  rationale: Standard idiomatic rendering indicating conformity to scriptural instruction.
