id: NEH.8.18
reference: Nehemiah 8:18
source:
  edition: WLC
  text: וַ֠/יִּקְרָא בְּ/סֵ֨פֶר תּוֹרַ֤ת הָ/אֱלֹהִים֙ י֣וֹם בְּ/י֔וֹם מִן הַ/יּוֹם֙ הָֽ/רִאשׁ֔וֹן עַ֖ד הַ/יּ֣וֹם הָ/אַחֲר֑וֹן וַ/יַּֽעֲשׂוּ חָג֙ שִׁבְעַ֣ת יָמִ֔ים וּ/בַ/יּ֧וֹם הַ/שְּׁמִינִ֛י עֲצֶ֖רֶת כַּ/מִּשְׁפָּֽט׀־־׃פ
translation:
  text: And he read from the Book of the Law of God day by day[a], from the first day to the last day. And they kept the feast seven days, and on the eighth day there was a solemn assembly[c][b], according to the ordinance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the scroll of the law of God.' The Hebrew word can refer to a written document generally, including a scroll.
    reason: lexical_alternative
  - marker: b
    text: Or 'they celebrated the feast seven days.'
    reason: lexical_alternative
  - marker: c
    text: Or 'as prescribed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: he read
  alternatives:
  - he proclaimed
  - one read
  lexicon: HALOT
  rationale: The verb קרא in this context with בְּסֵפֶר naturally means reading aloud from a written text. The singular subject is retained as 'he,' matching the Hebrew verbal form, even though Ezra is the implied referent from context.
- source_word: בְּסֵפֶר תּוֹרַת הָאֱלֹהִים
  chosen: from the Book of the Law of God
  alternatives:
  - in the book of the law of God
  - from the scroll of the law of God
  lexicon: HALOT
  rationale: בְּ with קרא can be rendered idiomatically as 'from' in English when reading from a book. 'Book' is kept as the default for סֵפֶר, though 'scroll' is historically possible; 'Book of the Law of God' best reflects the construct chain without over-specifying format.
- source_word: יוֹם בְּיוֹם
  chosen: day by day
  alternatives:
  - every day
  - day after day
  lexicon: HALOT
  rationale: The idiom expresses repeated daily action. 'Day by day' preserves the Hebrew rhythm and iterative sense more closely than the smoother 'every day.'
- source_word: מִן הַיּוֹם הָרִאשׁוֹן עַד הַיּוֹם הָאַחֲרוֹן
  chosen: from the first day to the last day
  alternatives:
  - from the first day until the last day
  lexicon: HALOT
  rationale: A straightforward temporal span. 'To the last day' is natural English and preserves the inclusio of the Hebrew phrasing.
- source_word: וַיַּעֲשׂוּ חָג
  chosen: they kept the feast
  alternatives:
  - they celebrated the feast
  - they observed the festival
  lexicon: HALOT
  rationale: עשה + חג commonly means to keep or celebrate a feast. 'Kept the feast' is concise and suitably formal without sounding archaic in this context.
- source_word: שִׁבְעַת יָמִים
  chosen: seven days
  lexicon: HALOT
  rationale: Direct numerical expression with no special idiomatic complication.
- source_word: עֲצֶרֶת
  chosen: a solemn assembly
  alternatives:
  - an assembly
  - a closing assembly
  lexicon: HALOT
  rationale: עֲצֶרֶת denotes a special concluding sacred gathering associated with a feast. 'Solemn assembly' is the established and semantically accurate rendering, preserving the cultic weight better than the generic 'assembly.'
- source_word: כַּמִּשְׁפָּט
  chosen: according to the ordinance
  alternatives:
  - according to the rule
  - as prescribed
  - according to the custom
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers to the prescribed legal requirement governing the feast observance. 'According to the ordinance' preserves the normative, legal sense better than the looser 'custom.'
