theological_decisions:
- issue: Singular subject of the reading verb versus plural festival observance
  chosen_reading: Retain 'he read' and 'they kept' as in the Hebrew forms
  alternative_readings:
  - Use an impersonal plural such as 'they read' for smoother English
  rationale: The verse intentionally distinguishes the singular reader from the plural community. Preserving that distinction respects the source text and avoids flattening the narrative roles.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cultic term עֲצֶרֶת
  chosen_reading: Render as 'solemn assembly'
  alternative_readings:
  - assembly
  - closing assembly
  rationale: The term refers to a prescribed sacred gathering at the conclusion of the feast. The chosen rendering preserves the religious and legal character of the observance without importing later doctrinal claims.
  doctrine_reference: Translation philosophy §1, §6
