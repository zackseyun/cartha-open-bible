id: NEH.13.4
reference: Nehemiah 13:4
source:
  edition: WLC
  text: וְ/לִ/פְנֵ֣י מִ/זֶּ֔ה אֶלְיָשִׁיב֙ הַ/כֹּהֵ֔ן נָת֖וּן בְּ/לִשְׁכַּ֣ת בֵּית אֱלֹהֵ֑י/נוּ קָר֖וֹב לְ/טוֹבִיָּֽה־׃
translation:
  text: Now before this[a], Eliashib the priest, who had been appointed over the chamber of the house of our God, was related to Tobiah—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was an associate of Tobiah.' The Hebrew expression can denote close relationship, whether familial or social.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִפְנֵי מִזֶּה
  chosen: Now before this
  alternatives:
  - Before this
  - And before this
  lexicon: HALOT
  rationale: Temporal expression introducing prior circumstances. 'Now' helps natural English discourse flow while preserving the temporal sense of 'before this.'
- source_word: אֶלְיָשִׁיב
  chosen: Eliashib
  rationale: Personal name transliterated per translation philosophy.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Definite title identifying Eliashib's office; straightforwardly rendered 'the priest.'
- source_word: נָתוּן
  chosen: who had been appointed over
  alternatives:
  - being put in charge of
  - assigned to
  lexicon: HALOT
  rationale: Passive participial/adjectival form from נתן used idiomatically for being placed in charge. The phrase indicates official responsibility, not merely physical placement.
- source_word: בְּלִשְׁכַּת בֵּית אֱלֹהֵינוּ
  chosen: over the chamber of the house of our God
  alternatives:
  - in the chamber of the house of our God
  - over the storeroom of the house of our God
  lexicon: HALOT
  rationale: לשכה can denote a chamber/room, often a temple chamber or storeroom. Here 'chamber' preserves the architectural sense; 'over' is supplied from the idiom with נָתוּן to express oversight of that chamber.
- source_word: קָרוֹב לְטוֹבִיָּה
  chosen: was closely related to Tobiah
  alternatives:
  - was near to Tobiah
  - was an associate of Tobiah
  lexicon: HALOT
  rationale: קָרוֹב with ל can indicate relational closeness, including kinship or close association. In this context of compromised temple administration, 'closely related to' best captures the likely social/familial connection without overstating beyond the text.
