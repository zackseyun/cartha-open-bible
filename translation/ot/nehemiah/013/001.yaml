id: NEH.13.1
reference: Nehemiah 13:1
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֗וּא נִקְרָ֛א בְּ/סֵ֥פֶר מֹשֶׁ֖ה בְּ/אָזְנֵ֣י הָ/עָ֑ם וְ/נִמְצָא֙ כָּת֣וּב בּ֔/וֹ אֲ֠שֶׁר לֹא יָב֨וֹא עַמֹּנִ֧י וּ/מֹאָבִ֛י בִּ/קְהַ֥ל הָ/אֱלֹהִ֖ים עַד עוֹלָֽם־־׃
translation:
  text: On that day the Book of Moses was read in the hearing of the people[c][b][a], and it was found written in it that no Ammonite or Moabite should ever enter the assembly of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the scroll of Moses.' The Hebrew word can refer to a scroll or book.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the congregation of God.'
    reason: lexical_alternative
  - marker: c
    text: That is, 'for all time' or 'forever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: On that day
  alternatives:
  - On that same day
  - At that time
  lexicon: HALOT
  rationale: Temporal phrase marking a specific occasion. 'On that day' is the most natural and sufficiently formal rendering.
- source_word: נִקְרָא
  chosen: was read aloud
  alternatives:
  - was read
  - one read
  lexicon: HALOT
  rationale: Nifal of קרא here is passive/impersonal in context. 'Read aloud' makes explicit the public oral reading implied by the following phrase 'in the hearing of the people.'
- source_word: בְּסֵפֶר מֹשֶׁה
  chosen: the Book of Moses
  alternatives:
  - the book of Moses
  - the scroll of Moses
  lexicon: HALOT
  rationale: סֵפֶר can denote book/scroll/document. 'Book of Moses' is the conventional and clear English rendering for the Mosaic law corpus; capitalization reflects a recognized work rather than a generic object.
- source_word: בְּאָזְנֵי הָעָם
  chosen: in the hearing of the people
  alternatives:
  - before the people
  - to the people
  lexicon: HALOT
  rationale: Literally 'in the ears of the people,' an idiom for public hearing. 'In the hearing of' preserves the idiomatic force without awkward literalism.
- source_word: וְנִמְצָא כָּתוּב בּוֹ
  chosen: and it was found written in it
  alternatives:
  - and it was found written there
  - and they found written in it
  lexicon: HALOT
  rationale: The passive sequence is retained to match the Hebrew style. 'In it' refers back to the Book of Moses.
- source_word: אֲשֶׁר לֹא יָבוֹא
  chosen: that ... should ... enter
  alternatives:
  - that ... may not enter
  - that ... must not come
  lexicon: HALOT
  rationale: The clause reports the content of what was written as a prohibition. 'Should enter' is idiomatic English for cited legal prescription.
- source_word: עַמֹּנִי וּמֹאָבִי
  chosen: Ammonite or Moabite
  alternatives:
  - an Ammonite and a Moabite
  lexicon: HALOT
  rationale: The pair is distributive under negation; English idiom prefers 'or' after 'no' to express either member of the prohibited classes.
- source_word: בִּקְהַל הָאֱלֹהִים
  chosen: the assembly of God
  alternatives:
  - the congregation of God
  - the assembly of God's people
  lexicon: HALOT
  rationale: קָהָל denotes the gathered community/assembly. 'Assembly of God' is a direct and readable rendering that preserves the genitive relation without importing later ecclesial terminology.
- source_word: עַד עוֹלָם
  chosen: should ever
  alternatives:
  - forever
  - to eternity
  - for all time
  lexicon: HALOT
  rationale: In legal/prohibitive contexts עַד עוֹלָם denotes enduring perpetuity. 'Should ever enter' communicates the force naturally in English while avoiding a wooden placement of 'forever.'
