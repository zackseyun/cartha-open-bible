theological_decisions:
- issue: Rendering of בִּקְהַל הָאֱלֹהִים
  chosen_reading: the assembly of God
  alternative_readings:
  - the congregation of God
  - the assembly of God's people
  rationale: The phrase refers to the covenant community in its gathered identity. 'Assembly of God' preserves the Hebrew expression without importing later church-specific terminology or softening the divine genitive.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Force of עַד עוֹלָם in a legal exclusion formula
  chosen_reading: should ever enter
  alternative_readings:
  - shall not enter forever
  - shall not enter for all time
  rationale: The Hebrew expresses enduring exclusion in the legal text being cited. 'Should ever enter' preserves the prohibition's perpetual force in idiomatic modern English without overstating beyond the source.
  doctrine_reference: Translation philosophy §§1, 6
