translation:
  text: 'In those days I saw in Judah people treading winepresses on the Sabbath, and bringing in heaps of grain and loading them on donkeys—and also wine, grapes, figs, and every kind of load—and bringing them into Jerusalem on the Sabbath day. So I testified against them on the day they sold food.'
