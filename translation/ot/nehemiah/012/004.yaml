id: NEH.12.4
reference: Nehemiah 12:4
source:
  edition: WLC
  text: עִדּ֥וֹא גִנְּת֖וֹי אֲבִיָּֽה׃
translation:
  text: Iddo[a], Ginnethoi[b], Abijah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew consists only of three proper names in a list: ''Iddo, Ginnethoi, Abijah.'''
    reason: cultural_note
  - marker: b
    text: Some English versions reflect a different spelling for the second name, such as 'Ginnethon,' likely influenced by related forms elsewhere; the Hebrew here reads Ginnethoi.
    reason: alternative_reading
lexical_decisions:
- source_word: עִדּוֹא
  chosen: Iddo
  alternatives:
  - Iddoa
  rationale: Proper personal name (HNp). Standard English transliteration is preferred for Hebrew names. The final aleph does not require an extra vowel in English, though a more letter-for-letter form 'Iddoa' is possible.
- source_word: גִנְּתוֹי
  chosen: Ginnethoi
  alternatives:
  - Ginnethon
  - Ginnetho
  rationale: Proper personal name (HNp). Rendered by transliteration from the consonantal/vocalized Hebrew form in this verse. Alternative spellings reflect related name forms elsewhere in the textual tradition and English tradition, but this draft follows the form present here.
- source_word: אֲבִיָּה
  chosen: Abijah
  alternatives:
  - Abiah
  rationale: Proper personal name (HNp). Standard English biblical transliteration favors 'Abijah'; 'Abiah' is a possible simplified form but is less common in English Bible usage.
