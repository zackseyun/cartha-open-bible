  text: בְּנֵ֣י חָרִ֔ם שְׁלֹ֥שׁ מֵא֖וֹת וְ/עֶשְׂרִֽים׃ס
translation:
  text: the sons of Harim, three hundred twenty.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In post-exilic census/genealogical lists, בְּנֵי commonly introduces
    a family or clan grouping. 'The sons of' preserves the formal structure of the
    Hebrew while remaining idiomatic in English; alternatives such as 'descendants
    of' are possible but slightly more interpretive.
- source_word: חָרִם
  chosen: Harim
  rationale: Proper personal/clan name; transliterated according to the translation
    philosophy to transliterate names rather than translate them.
- source_word: שְׁלֹשׁ מֵאוֹת וְעֶשְׂרִים
  chosen: three hundred twenty
  alternatives:
  - three hundred and twenty
  lexicon: HALOT
  rationale: The Hebrew cardinal number is straightforward. 'Three hundred twenty'
    uses readable modern English, while 'three hundred and twenty' is a stylistic
    alternative in more traditional English.
