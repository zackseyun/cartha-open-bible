id: NEH.7.33
reference: Nehemiah 7:33
source:
  edition: WLC
  text: אַנְשֵׁ֥י נְב֛וֹ אַחֵ֖ר חֲמִשִּׁ֥ים וּ/שְׁנָֽיִם׃ס
translation:
  text: the men of the other Nebo[a], fifty-two.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "another Nebo." The Hebrew adjective can mean either "other" or "another"; here it likely distinguishes this locality from the Nebo named elsewhere in the list.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי
  chosen: the men of
  alternatives:
  - the people of
  - the inhabitants of
  lexicon: HALOT
  rationale: Construct plural of אִישׁ, here in a census/list context referring to male members or household representatives from a locality. 'The men of' is the most direct and conventional rendering for this register.
- source_word: נְבוֹ
  chosen: Nebo
  lexicon: HALOT
  rationale: Proper place name; per translation philosophy, names are transliterated rather than translated.
- source_word: אַחֵר
  chosen: the other
  alternatives:
  - another
  - other
  lexicon: HALOT
  rationale: Adjective meaning 'other/another.' In this returnee list it distinguishes this Nebo from another place/group called Nebo already mentioned, so 'the other Nebo' is the clearest English expression.
- source_word: חֲמִשִּׁים וּשְׁנָיִם
  chosen: fifty-two
  alternatives:
  - two and fifty
  lexicon: HALOT
  rationale: Standard English rendering of the cardinal number sequence. Hyphenated modern English is preferred for readability.
