id: AMO.6.13
reference: Amos 6:13
source:
  edition: WLC
  text: הַ/שְּׂמֵחִ֖ים לְ/לֹ֣א דָבָ֑ר הָ/אֹ֣מְרִ֔ים הֲ/ל֣וֹא בְ/חָזְקֵ֔/נוּ לָקַ֥חְנוּ
    לָ֖/נוּ קַרְנָֽיִם׃
translation:
  text: you who rejoice over nothing, who say, “Have we not by our own strength taken
    horns for ourselves?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'over nothing' may also echo the place-name Lo-debar, creating a
      wordplay on rejoicing over a captured town whose name sounds like 'nothing'
      or 'no thing.'
    reason: lexical_alternative
  - marker: b
    text: Or possibly 'Have we not by our own strength taken Karnaim for ourselves?'
      The Hebrew word rendered 'horns' can also evoke Karnaim, likely as a wordplay
      on military power and conquest.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְּׂמֵחִים
  chosen: you who rejoice
  alternatives:
  - those who rejoice
  - who are glad
  lexicon: HALOT
  rationale: The participle is plural and continues the prophetic address from the
    surrounding context. Rendering it vocatively as 'you who rejoice' preserves the
    direct accusation and reads naturally in English.
- source_word: לְלֹא דָבָר
  chosen: over nothing
  alternatives:
  - in what is not a thing
  - over Lo-debar
  - over a thing of nothing
  lexicon: HALOT
  rationale: Literally 'for not a thing' or 'for nothing.' The phrase can be taken
    as an idiom meaning rejoicing in something worthless. Some interpreters see a
    wordplay on the place-name Lo-debar, but the plain sense of the Hebrew here is
    best represented in the main text, with the place-name possibility preserved in
    a footnote.
- source_word: הָאֹמְרִים
  chosen: who say
  alternatives:
  - saying
  lexicon: HALOT
  rationale: A second plural participle parallel to the first; 'who say' keeps the
    structure and links the boast to the preceding description.
- source_word: הֲלוֹא
  chosen: Have we not
  alternatives:
  - Is it not that we
  - Did we not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expressing self-congratulatory confidence.
    'Have we not' is idiomatic English and preserves the force.
- source_word: בְחָזְקֵנוּ
  chosen: by our own strength
  alternatives:
  - by our strength
  - with our might
  lexicon: HALOT
  rationale: The noun denotes strength or might, with the 1cp suffix. Adding 'own'
    brings out the boastful emphasis implicit in the claim without exceeding the sense.
- source_word: לָקַחְנוּ
  chosen: taken
  alternatives:
  - acquired
  - captured
  lexicon: HALOT
  rationale: The common verb 'take' is broad enough to cover military acquisition
    here and avoids over-specifying the manner of obtaining.
- source_word: קַרְנָיִם
  chosen: horns
  alternatives:
  - Karnaim
  - strength
  lexicon: HALOT
  rationale: The literal sense is 'horns,' a common Hebrew image for power. In context
    it may also allude to the city Karnaim, recently taken, creating a wordplay with
    'strength.' The literal rendering preserves the metaphor and allows the place-name
    possibility to be footnoted.
