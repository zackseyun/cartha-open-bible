id: AMO.6.5
reference: Amos 6:5
source:
  edition: WLC
  text: הַ/פֹּרְטִ֖ים עַל פִּ֣י הַ/נָּ֑בֶל כְּ/דָוִ֕יד חָשְׁב֥וּ לָ/הֶ֖ם כְּלֵי שִֽׁיר־־׃
translation:
  text: who strum on the mouth of the harp, and like David invent for themselves instruments
    of song—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'on the mouth of the harp'; the phrase may mean 'to the sound
      of the harp' or simply 'with the harp.'
    reason: lexical_alternative
  - marker: b
    text: Or 'devise for themselves musical instruments,' since the verb can mean
      'devise' or 'contrive' in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפֹּרְטִים
  chosen: who strum
  alternatives:
  - who improvise
  - who pluck
  lexicon: HALOT
  rationale: The participle from פרט refers to plucking/playing stringed instruments.
    'Strum' gives a natural modern English equivalent for musical performance without
    over-paraphrasing. 'Pluck' is more literal but less idiomatic here; 'improvise'
    reflects some contextual interpretations but is less directly tied to the verb
    itself.
- source_word: עַל פִּי הַנָּבֶל
  chosen: on the mouth of the harp
  alternatives:
  - to the sound of the harp
  - with the harp
  lexicon: HALOT
  rationale: Literally, the phrase is 'upon the mouth of the nebel.' Retaining 'mouth'
    preserves the concrete Hebrew expression and its auditable form, while 'harp'
    is the best conventional rendering of נבל in this context. Because 'mouth of the
    harp' may sound unusual in English, an alternative is preserved in a footnote.
- source_word: נָּבֶל
  chosen: harp
  alternatives:
  - lute
  - lyre
  lexicon: HALOT
  rationale: נבל denotes a stringed instrument; exact identification is uncertain.
    'Harp' is a standard and understandable English rendering. 'Lute' and 'lyre' are
    possible but more specific than the evidence warrants.
- source_word: כְּדָוִיד
  chosen: like David
  alternatives:
  - as David did
  lexicon: HALOT
  rationale: The comparison marker כ is straightforwardly comparative. 'Like David'
    preserves the terseness and leaves the force of the comparison to the reader.
- source_word: חָשְׁבוּ
  chosen: invent
  alternatives:
  - devise
  - considered
  lexicon: HALOT
  rationale: Although חשׁב often means 'think' or 'consider,' in this context with
    'for themselves instruments of song' it carries the sense of devising or contriving.
    'Invent' communicates the creative force implied in the comparison with David.
    'Devise' is close and could also work.
- source_word: לָהֶם
  chosen: for themselves
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The preposition with pronominal suffix indicates advantage or possession.
    'For themselves' best captures the reflexive/self-serving nuance in context, fitting
    the prophet's critique of self-indulgence.
- source_word: כְּלֵי שִׁיר
  chosen: instruments of song
  alternatives:
  - musical instruments
  - instruments for singing
  lexicon: HALOT
  rationale: The construct phrase is literally 'vessels/instruments of song.' 'Instruments
    of song' stays close to the Hebrew while remaining intelligible. 'Musical instruments'
    is smoother but slightly more interpretive.
