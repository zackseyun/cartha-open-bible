id: AMO.6.4
reference: Amos 6:4
source:
  edition: WLC
  text: הַ/שֹּֽׁכְבִים֙ עַל מִטּ֣וֹת שֵׁ֔ן וּ/סְרֻחִ֖ים עַל עַרְשׂוֹתָ֑/ם וְ/אֹכְלִ֤ים
    כָּרִים֙ מִ/צֹּ֔אן וַ/עֲגָלִ֖ים מִ/תּ֥וֹךְ מַרְבֵּֽק־־׃
translation:
  text: those who lie on beds of ivory and lounge on their couches, and eat lambs
    from the flock and calves from the stall—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stretch themselves out' or 'sprawl' on their couches.
    reason: lexical_alternative
  - marker: b
    text: '''From the stall'' may also be rendered ''from the fattening stall,'' emphasizing
      specially fed animals reserved for luxury eating.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֹּׁכְבִים
  chosen: those who lie
  alternatives:
  - those lying
  - who lie down
  lexicon: HALOT
  rationale: The participle functions substantivally, continuing the woe description
    from the previous verse. 'Those who lie' is natural English and preserves the
    ongoing/habitual sense.
- source_word: מִטּוֹת שֵׁן
  chosen: beds of ivory
  alternatives:
  - ivory beds
  - beds inlaid with ivory
  lexicon: HALOT
  rationale: Literally 'beds of ivory.' This likely denotes luxurious beds adorned
    with ivory rather than made entirely of ivory, but the Hebrew expression is concise
    and idiomatic enough to preserve directly in English.
- source_word: וּסְרֻחִים
  chosen: and lounge
  alternatives:
  - and sprawl
  - and stretch themselves out
  - and recline
  lexicon: HALOT
  rationale: The verb conveys sprawling or lounging in self-indulgent ease. 'Lounge'
    communicates luxury and complacency in readable modern English without over-paraphrasing.
- source_word: עַל עַרְשׂוֹתָם
  chosen: on their couches
  alternatives:
  - on their beds
  - on their divans
  lexicon: HALOT
  rationale: עֶרֶשׂ can mean couch/bed. Since מִטּוֹת has already been rendered 'beds,'
    'couches' preserves the lexical distinction and fits a banquet-luxury setting.
- source_word: וְאֹכְלִים
  chosen: and eat
  alternatives:
  - and are eating
  - eating
  lexicon: HALOT
  rationale: Simple present best reflects the participial series in idiomatic English.
- source_word: כָּרִים
  chosen: lambs
  alternatives:
  - young rams
  - choice lambs
  lexicon: HALOT
  rationale: The noun refers to young sheep, often choice animals suitable for feasting.
    'Lambs' is the clearest standard rendering; the nuance of select quality is supplied
    by context.
- source_word: מִצֹּאן
  chosen: from the flock
  alternatives:
  - out of the flock
  lexicon: HALOT
  rationale: A straightforward rendering of the source phrase, preserving the image
    of selecting animals from the flock.
- source_word: וַעֲגָלִים
  chosen: and calves
  alternatives:
  - and young calves
  lexicon: HALOT
  rationale: Direct lexical equivalent; the point is luxurious consumption of tender
    animals.
- source_word: מִתּוֹךְ מַרְבֵּק
  chosen: from the stall
  alternatives:
  - from the fattening stall
  - from the feedlot
  lexicon: HALOT
  rationale: מַרְבֵּק denotes a stall or pen where animals are kept and fattened.
    'From the stall' is concise and natural; the fattening nuance is possible but
    not required in the main text.
