id: AMO.6.7
reference: Amos 6:7
source:
  edition: WLC
  text: לָ/כֵ֛ן עַתָּ֥ה יִגְל֖וּ בְּ/רֹ֣אשׁ גֹּלִ֑ים וְ/סָ֖ר מִרְזַ֥ח סְרוּחִֽים׃פ
translation:
  text: Therefore now they will go into exile at the head of the exiles, and the revelry
    of those who sprawl will pass away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the banquet of those stretched out' or 'the carousing of the sprawlers.'
      The Hebrew expression is compact and likely echoes the lounging on couches in
      the previous verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks a consequential conclusion from the preceding denunciation; 'Therefore'
    preserves the prophetic logic clearly.
- source_word: עַתָּה
  chosen: now
  alternatives:
  - at once
  - soon
  lexicon: HALOT
  rationale: Temporal adverb indicating the imminent turn of judgment; 'now' is concise
    and natural.
- source_word: יִגְלוּ
  chosen: they will go into exile
  alternatives:
  - they will be exiled
  - they will be led away captive
  lexicon: HALOT
  rationale: From גלה in the sense of going into exile/deportation. The active English
    phrasing reflects the Hebrew verbal form while conveying the exile sense idiomatically.
- source_word: בְּרֹאשׁ
  chosen: at the head of
  alternatives:
  - first among
  - at the front of
  lexicon: HALOT
  rationale: Literally 'at the head'; here it indicates leading position or first
    rank among those deported. 'At the head of' preserves the metaphor and the irony
    that the elite go first.
- source_word: גֹּלִים
  chosen: the exiles
  alternatives:
  - those going into exile
  - the captives
  lexicon: HALOT
  rationale: Participle from the same root as יגלו, functioning substantivally. 'The
    exiles' is concise and preserves the wordplay with 'go into exile.'
- source_word: וְסָר
  chosen: will pass away
  alternatives:
  - will depart
  - will be removed
  - will cease
  lexicon: HALOT
  rationale: From סור, 'turn aside/depart/remove.' In context of feasting, 'will pass
    away' communicates the ending of their indulgent celebration in natural English.
- source_word: מִרְזַח
  chosen: the revelry
  alternatives:
  - the banquet
  - the feast
  - the carousing
  lexicon: HALOT
  rationale: מִרְזַח denotes a feast/reveling assembly, often with a negative nuance
    of excessive drinking or self-indulgence. 'Revelry' best fits Amos's condemnatory
    tone.
- source_word: סְרוּחִים
  chosen: those who lounge
  alternatives:
  - those stretched out
  - the sprawlers
  lexicon: HALOT
  rationale: Participle from סרח, referring back to the complacent elite reclining
    on couches (cf. previous verse). 'Those who lounge' is readable modern English
    and preserves the image of self-indulgent ease.
