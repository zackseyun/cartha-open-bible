id: AMO.6.12
reference: Amos 6:12
source:
  edition: WLC
  text: הַ/יְרֻצ֤וּ/ן בַּ/סֶּ֨לַע֙ סוּסִ֔ים אִֽם יַחֲר֖וֹשׁ בַּ/בְּקָרִ֑ים כִּֽי הֲפַכְתֶּ֤ם
    לְ/רֹאשׁ֙ מִשְׁפָּ֔ט וּ/פְרִ֥י צְדָקָ֖ה לְ/לַעֲנָֽה־־׃
translation:
  text: Do horses run on rock? Does one plow there with oxen? Yet you have turned
    justice into poison, and the fruit of righteousness into wormwood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into gall' for 'into poison'; Hebrew רֹאשׁ can denote a bitter or poisonous
      substance/plant.
    reason: lexical_alternative
  - marker: b
    text: '''Wormwood'' is a bitter plant used metaphorically for moral corruption
      and bitter consequence.'
    reason: cultural_note
  - marker: c
    text: Or 'and the fruit of justice' for 'the fruit of righteousness'; Hebrew צְדָקָה
      can carry both moral and judicial nuance depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיְרֻצוּן
  chosen: Do ... run
  alternatives:
  - Will ... run
  lexicon: HALOT
  rationale: Interrogative with imperfect 3mp expresses a rhetorical question about
    what is absurd or impossible. English present 'Do ... run' fits the proverbial
    force better than a simple future.
- source_word: בַּסֶּלַע
  chosen: on rock
  alternatives:
  - on the rock
  - on a crag
  lexicon: HALOT
  rationale: סֶלַע denotes rock/crag. 'On rock' gives natural English in a generic
    proverbial statement; the sense is rocky ground or a rock face, not a specific
    named rock.
- source_word: סוּסִים
  chosen: horses
  lexicon: HALOT
  rationale: Straightforward plural noun.
- source_word: אִם
  chosen: Does one
  alternatives:
  - or does one
  - if
  lexicon: HALOT
  rationale: Here אִם introduces the second rhetorical question. In context it functions
    idiomatically as a parallel alternative question rather than a conditional 'if.'
- source_word: יַחֲרֹשׁ
  chosen: plow
  alternatives:
  - plow it
  - till
  lexicon: HALOT
  rationale: Basic sense 'plow.' The object is left implicit in Hebrew, so English
    should not over-specify beyond what the context suggests.
- source_word: בַּבְּקָרִים
  chosen: with oxen
  alternatives:
  - with cattle
  - with cows
  lexicon: HALOT
  rationale: בקר can denote cattle broadly, but in plowing context 'oxen' is the most
    natural and specific English rendering.
- source_word: כִּי
  chosen: Yet
  alternatives:
  - For
  - Because
  lexicon: HALOT
  rationale: Though כִּי often means 'for/because,' here it introduces the reason
    the absurd comparison applies to Israel. 'Yet' captures the adversative punch
    in English after the rhetorical questions.
- source_word: הֲפַכְתֶּם
  chosen: you have turned
  alternatives:
  - you turned
  - you have changed
  lexicon: HALOT
  rationale: Perfect 2mp with direct accusation. Present perfect communicates a completed
    action with present moral consequence.
- source_word: לְרֹאשׁ
  chosen: into poison
  alternatives:
  - into gall
  - into bitterness
  lexicon: HALOT
  rationale: רֹאשׁ refers to a poisonous/bitter plant or venomous substance in prophetic
    denunciation. 'Poison' communicates the metaphor clearly in modern English; 'gall'
    is traditional but less transparent. Alternative preserved in footnote.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: In prophetic social-ethical context, 'justice' best conveys the public,
    juridical sense.
- source_word: וּפְרִי צְדָקָה
  chosen: and the fruit of righteousness
  alternatives:
  - and righteousness's fruit
  - and the fruit of justice
  lexicon: HALOT
  rationale: Construct phrase rendered naturally in English. 'Righteousness' is the
    default for צדקה and fits the moral metaphor; 'justice' is possible in prophetic
    contexts but less likely here given the paired contrast with מִשְׁפָּט.
- source_word: לְלַעֲנָה
  chosen: into wormwood
  alternatives:
  - into bitterness
  lexicon: HALOT
  rationale: לענה is wormwood, a bitter plant frequently used metaphorically for bitter
    corruption or calamity. The concrete image is worth preserving in the main text.
