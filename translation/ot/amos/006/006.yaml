id: AMO.6.6
reference: Amos 6:6
source:
  edition: WLC
  text: הַ/שֹּׁתִ֤ים בְּ/מִזְרְקֵי֙ יַ֔יִן וְ/רֵאשִׁ֥ית שְׁמָנִ֖ים יִמְשָׁ֑חוּ וְ/לֹ֥א
    נֶחְל֖וּ עַל שֵׁ֥בֶר יוֹסֵֽף־
translation:
  text: who drink wine from bowls and anoint themselves with the finest oils, but
    are not grieved over the ruin of Joseph—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the choicest oils'; literally 'the first of oils.'
    reason: lexical_alternative
  - marker: b
    text: '''Joseph'' here refers poetically to the people of Israel, especially the
      northern kingdom.'
    reason: cultural_note
lexical_decisions:
- source_word: הַשֹּׁתִים
  chosen: who drink
  alternatives:
  - those who drink
  lexicon: HALOT
  rationale: Participle with article continuing the woe-description from the previous
    verse; relative-style English ('who drink') fits the syntax and keeps the ongoing
    characterization.
- source_word: בְּמִזְרְקֵי יַיִן
  chosen: wine from bowls
  alternatives:
  - wine in bowls
  - wine by the bowlful
  lexicon: HALOT
  rationale: מִזְרָק denotes a bowl/basin, often a large vessel used for sprinkling
    or libation contexts. 'From bowls' preserves the image of extravagant drinking
    from large vessels better than a more interpretive paraphrase.
- source_word: וְרֵאשִׁית שְׁמָנִים
  chosen: the finest oils
  alternatives:
  - the choicest oils
  - the best oils
  - the first of the oils
  lexicon: HALOT
  rationale: רֵאשִׁית literally means 'first/beginning/chief,' here idiomatically
    indicating the best or choicest portion. 'Finest oils' communicates luxury in
    natural English while staying close to the Hebrew sense.
- source_word: יִמְשָׁחוּ
  chosen: anoint themselves with
  alternatives:
  - rub themselves with
  - apply
  lexicon: HALOT
  rationale: משׁח commonly means 'anoint.' In this context it refers to lavish personal
    application of oil rather than ritual consecration. 'Anoint themselves with' preserves
    the lexical link while making the reflexive sense explicit in English.
- source_word: וְלֹא נֶחְלוּ
  chosen: but are not grieved
  alternatives:
  - but do not grieve
  - but are not sickened
  - but do not become weak with grief
  lexicon: HALOT
  rationale: The Niphal of חלה can denote becoming weak/sick, and in contexts of sympathy
    or mourning it conveys being pained or grieved. 'Are not grieved' best captures
    the moral-emotional force here without woodenly importing physical illness.
- source_word: עַל שֵׁבֶר יוֹסֵף
  chosen: over the ruin of Joseph
  alternatives:
  - over the fracture of Joseph
  - over the affliction of Joseph
  - over the collapse of Joseph
  lexicon: HALOT
  rationale: שֵׁבֶר literally 'breaking/breach,' often extended to disaster, ruin,
    or collapse. 'Joseph' stands metonymically for the northern kingdom/people of
    Israel. 'Ruin of Joseph' is idiomatic and preserves the prophetic metaphor.
- source_word: יוֹסֵף
  chosen: Joseph
  alternatives:
  - the house of Joseph
  - Israel
  lexicon: HALOT
  rationale: The Hebrew text has the proper name 'Joseph.' Retaining the name preserves
    the prophetic idiom and intertribal/covenantal resonance; the referent can be
    clarified in a footnote rather than flattened in the main text.
