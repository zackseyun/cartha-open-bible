theological_decisions:
- issue: Metonymic use of 'Joseph'
  chosen_reading: Retain 'Joseph' in the main text as a poetic designation for the
    northern kingdom/people of Israel.
  alternative_readings:
  - Translate interpretively as 'Israel' or 'the house of Joseph'
  rationale: The verse does not present a doctrinal dispute, but preserving the prophetic
    name maintains the source-text imagery and avoids over-interpreting the referent
    in the main text. A footnote can clarify the metonymy for readers.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; translate names by transliteration.'
