id: AMO.6.9
reference: Amos 6:9
source:
  edition: WLC
  text: וְ/הָיָ֗ה אִם יִוָּ֨תְר֜וּ עֲשָׂרָ֧ה אֲנָשִׁ֛ים בְּ/בַ֥יִת אֶחָ֖ד וָ/מֵֽתוּ־׃
translation:
  text: And it will happen that if ten men remain in one house, they will die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'are left' instead of 'remain.' The Hebrew verb denotes being left over
      or remaining after others are gone.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it will happen
  alternatives:
  - And it shall be
  - Then it will happen
  lexicon: HALOT
  rationale: The waw + qatal of היה introduces a future circumstance or ensuing situation.
    'And it will happen' preserves the discourse function in readable modern English
    without archaic 'shall be.'
- source_word: אִם
  chosen: if
  alternatives:
  - when
  lexicon: HALOT
  rationale: 'The particle most naturally introduces a conditional clause here: ''if
    ten men remain.'' ''When'' would overstate certainty in the syntax.'
- source_word: יִוָּתְרוּ
  chosen: remain
  alternatives:
  - are left
  - are left over
  - survive
  lexicon: HALOT
  rationale: Niphal of יתר means 'be left/remain.' 'Remain' is concise and natural.
    'Survive' is interpretive; the text states that they are left in the house, not
    explicitly that they have escaped danger permanently.
- source_word: עֲשָׂרָה אֲנָשִׁים
  chosen: ten men
  alternatives:
  - ten people
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'men.' Following the gender-accurate
    principle, 'ten men' is preferred over the more neutral 'ten people.'
- source_word: בְּבַיִת אֶחָד
  chosen: in one house
  alternatives:
  - in a single house
  - in one household
  lexicon: HALOT
  rationale: The phrase is spatial and concrete. 'In one house' is the most direct
    rendering; 'household' would shift from building to family unit, which the Hebrew
    does not require.
- source_word: וָמֵתוּ
  chosen: they will die
  alternatives:
  - then they will die
  - and they will die
  lexicon: HALOT
  rationale: The waw + qatal here continues the future result. 'They will die' gives
    clear English sense. The conjunction's force is represented by the overall sentence
    flow; adding 'then' is possible but not necessary.
