id: AMO.6.3
reference: Amos 6:3
source:
  edition: WLC
  text: הַֽ/מְנַדִּ֖ים לְ/י֣וֹם רָ֑ע וַ/תַּגִּישׁ֖וּ/ן שֶׁ֥בֶת חָמָֽס׃
translation:
  text: you who put far away the evil day and bring near the seat of violence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'put off the day of disaster.'
    reason: lexical_alternative
  - marker: b
    text: Or 'bring near the throne of violence' or 'the reign of violence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְנַדִּים
  chosen: you who put far away
  alternatives:
  - you who put off
  - you who banish
  - those who are far from
  lexicon: HALOT
  rationale: From נדד/נדה-like verbal idea in participial form addressing the hearers;
    context favors an active sense of causing distance or dismissing. 'Put far away'
    preserves the concrete imagery and the accusatory force better than a more interpretive
    'ignore.'
- source_word: לְיוֹם רָע
  chosen: the evil day
  alternatives:
  - the day of disaster
  - the bad day
  - a day of calamity
  lexicon: HALOT
  rationale: יוֹם רָע is an idiomatic expression for a coming day of trouble/judgment.
    'The evil day' is formally close and readable, while allowing the prophetic sense
    of impending calamity to remain implicit rather than overexplained.
- source_word: וַתַּגִּישׁוּן
  chosen: and bring near
  alternatives:
  - and cause to come near
  - and draw near
  lexicon: HALOT
  rationale: 'From נגשׁ, causative sense ''bring near.'' The form addresses the audience
    directly. ''Bring near'' keeps the irony: they think they distance judgment, yet
    they usher in something worse.'
- source_word: שֶׁבֶת
  chosen: the seat
  alternatives:
  - the sitting
  - the throne
  - the reign
  lexicon: HALOT
  rationale: שׁבת here likely denotes seat/session/dwelling of rule rather than the
    abstract act of sitting. 'Seat' is concise and preserves the image of an established
    place or rule of violence. 'Throne' is possible but too specific without clearer
    royal markers in the immediate phrase.
- source_word: חָמָס
  chosen: violence
  alternatives:
  - wrongdoing
  - oppression
  - injustice
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence or ruthless wrongdoing. 'Violence' is
    the most direct and common prophetic gloss, fitting Amos's social-judgment context.
