theological_decisions:
- issue: Interpretation of the verse's irony
  chosen_reading: The line accuses the complacent elite of dismissing the coming day
    of calamity while at the same time hastening the establishment of violent oppression
    or the judgment it invites.
  alternative_readings:
  - The line means they postpone concern for judgment and enthrone violence in society.
  - The line means they think they can delay disaster, but actually bring the day
    of violence near.
  rationale: The Hebrew imagery is compressed and allows some ambiguity in how 'seat
    of violence' relates to the 'evil day.' The translation preserves the tension
    rather than resolving it into either purely social oppression or purely eschatological
    judgment.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
