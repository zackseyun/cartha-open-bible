theological_decisions:
- issue: Referent of 'Zion' and 'Samaria' in the denunciation
  chosen_reading: The verse addresses complacent elites in both Judah (Zion) and Israel (Samaria).
  alternative_readings:
  - The whole verse addresses only northern leaders, with Zion included rhetorically or text-critically questioned.
  rationale: The parallel structure naturally names both southern and northern centers of power. The translation preserves both place names straightforwardly without collapsing them into one audience.
