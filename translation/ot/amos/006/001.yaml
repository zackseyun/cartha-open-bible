id: AMO.6.1
reference: Amos 6:1
source:
  edition: WLC
  text: ה֚וֹי הַ/שַּׁאֲנַנִּ֣ים בְּ/צִיּ֔וֹן וְ/הַ/בֹּטְחִ֖ים בְּ/הַ֣ר שֹׁמְר֑וֹן נְקֻבֵי֙ רֵאשִׁ֣ית הַ/גּוֹיִ֔ם וּ/בָ֥אוּ לָ/הֶ֖ם בֵּ֥ית יִשְׂרָאֵֽל׃
translation:
  text: Woe to those who are at ease in Zion[a], and to those who feel secure on the mountain of Samaria, the distinguished men of the foremost of the nations[c][b], to whom the house of Israel comes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those designated' or 'those named,' referring to prominent or notable people.
    reason: lexical_alternative
  - marker: b
    text: Or 'the first of the nations' or 'the chief of the nations.'
    reason: lexical_alternative
  - marker: c
    text: 'The Hebrew clause is compressed: literally, ''and the house of Israel comes to them.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: Prophetic interjection of denunciation/lament. 'Woe' is the standard English equivalent that preserves both warning and lament better than the softer 'ah' or 'alas'.
- source_word: הַשַּׁאֲנַנִּים
  chosen: those who are at ease
  alternatives:
  - the complacent
  - those who are secure
  lexicon: HALOT
  rationale: From שׁאנן, denoting ease, complacency, or careless security. 'Those who are at ease' preserves the participial force and the moral tone without over-paraphrasing.
- source_word: בְּצִיּוֹן
  chosen: in Zion
  alternatives:
  - on Zion
  lexicon: HALOT
  rationale: Locative phrase referring to Jerusalem/Zion. 'In Zion' is idiomatic and natural in English while preserving the place reference.
- source_word: וְהַבֹּטְחִים
  chosen: those who feel secure
  alternatives:
  - those who trust
  - those who are confident
  lexicon: HALOT
  rationale: בטח can mean trust or feel secure. Here the context is false security in political/religious centers, so 'feel secure' better captures the complacent sense than a more positive 'trust'.
- source_word: בְּהַר שֹׁמְרוֹן
  chosen: on the mountain of Samaria
  alternatives:
  - on Mount Samaria
  - in the hill of Samaria
  lexicon: HALOT
  rationale: Geographical expression. 'Mountain of Samaria' is a close rendering of the construct phrase and avoids over-specifying a formal place-name not explicit in the Hebrew.
- source_word: נְקֻבֵי
  chosen: distinguished men
  alternatives:
  - those designated
  - those marked out
  - those named
  lexicon: HALOT
  rationale: Literally 'those designated/named.' In context it refers to notable or prominent persons. 'Distinguished men' communicates social prominence in readable English, while the more literal sense is preserved in a footnote.
- source_word: רֵאשִׁית הַגּוֹיִם
  chosen: the foremost of the nations
  alternatives:
  - the first of the nations
  - the chief of the nations
  lexicon: HALOT
  rationale: The phrase likely describes prominence or preeminence among nations. 'Foremost' is natural English and preserves the superlative sense without flattening it.
- source_word: וּבָאוּ לָהֶם
  chosen: to whom ... comes
  alternatives:
  - and they came to them
  - and people come to them
  lexicon: HALOT
  rationale: The clause is syntactically compressed. The sense is that the house of Israel comes to these notable leaders. Rendering it as a relative clause in English clarifies the relationship while staying close to the Hebrew sense.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  - the people of Israel
  lexicon: HALOT
  rationale: Retained as 'house of Israel' to preserve the covenantal-national expression rather than reducing it to the simpler 'Israel'.
