id: AMO.6.2
reference: Amos 6:2
source:
  edition: WLC
  text: עִבְר֤וּ כַֽלְנֵה֙ וּ/רְא֔וּ וּ/לְכ֥וּ מִ/שָּׁ֖ם חֲמַ֣ת רַבָּ֑ה וּ/רְד֣וּ
    גַת פְּלִשְׁתּ֗ים הֲ/טוֹבִים֙ מִן הַ/מַּמְלָכ֣וֹת הָ/אֵ֔לֶּה אִם רַ֥ב גְּבוּלָ֖/ם
    מִ/גְּבֻלְ/כֶֽם־־־׃
translation:
  text: Cross over to Calneh and see; from there go to Hamath the great; then go down
    to Gath of the Philistines. Are they better than these kingdoms? Or is their territory
    greater than your territory?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Are you better than these kingdoms?' The Hebrew adjective 'better'
      has no explicit subject, so the comparison may be understood either of the named
      cities/kingdoms or of the people being addressed.
    reason: alternative_reading
  - marker: b
    text: Calneh is a place name; some identify it with a city in northern Syria or
      Mesopotamia, but the identification is uncertain.
    reason: cultural_note
lexical_decisions:
- source_word: עִבְרוּ
  chosen: Cross over
  alternatives:
  - Pass over
  - Go over
  lexicon: HALOT
  rationale: Qal imperative plural of עבר, a movement verb meaning to pass/cross over.
    'Cross over' is natural English and preserves the directional force better than
    the more generic 'go.'
- source_word: כַּלְנֵה
  chosen: Calneh
  alternatives:
  - Kalneh
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated per philosophy.
- source_word: וּרְאוּ
  chosen: and see
  alternatives:
  - and look
  lexicon: HALOT
  rationale: Imperative of ראה. 'See' is the most direct rendering and fits the rhetorical
    invitation to inspect these cities.
- source_word: וּלְכוּ מִשָּׁם
  chosen: from there go
  alternatives:
  - and go from there
  - then go from there
  lexicon: HALOT
  rationale: Sequential imperative with adverbial phrase. Rendered smoothly in English
    while preserving the progression of locations.
- source_word: חֲמַת רַבָּה
  chosen: Hamath the great
  alternatives:
  - great Hamath
  - Hamath Rabbah
  lexicon: HALOT
  rationale: The adjective רַבָּה means 'great.' Here it distinguishes the well-known
    city Hamath. 'Hamath the great' is a transparent rendering of the Hebrew word
    order and sense.
- source_word: וּרְדוּ
  chosen: then go down
  alternatives:
  - and go down
  - descend
  lexicon: HALOT
  rationale: Imperative of ירד, commonly used for descending geographically. 'Go down'
    preserves the idiom; 'then' clarifies sequence in English.
- source_word: גַּת פְּלִשְׁתִּים
  chosen: Gath of the Philistines
  alternatives:
  - Philistine Gath
  - Gath in Philistia
  lexicon: HALOT
  rationale: Construct phrase identifying the city by its people group. 'Gath of the
    Philistines' is formally close and clear.
- source_word: הֲטוֹבִים מִן הַמַּמְלָכוֹת הָאֵלֶּה
  chosen: Are they better than these kingdoms?
  alternatives:
  - Are they better than those kingdoms?
  - Are you better than these kingdoms?
  lexicon: HALOT
  rationale: The masculine plural adjective 'better' lacks an explicit subject. In
    context the nearest referents are the named cities/realms just mentioned, so 'they'
    is supplied in English. 'These kingdoms' follows the demonstrative הָאֵלֶּה. Some
    interpreters take the implied subject as the addressees ('you'), but the Hebrew
    leaves it implicit; the main text follows the more immediate referent.
- source_word: אִם
  chosen: Or
  alternatives:
  - If
  - whether
  lexicon: HALOT
  rationale: In this rhetorical question pair, אִם introduces the second alternative,
    best rendered 'Or' in idiomatic English rather than the more wooden 'if.'
- source_word: רַב גְּבוּלָם מִגְּבֻלְכֶם
  chosen: is their territory greater than your territory
  alternatives:
  - is their border larger than your border
  - is their domain greater than yours
  lexicon: HALOT
  rationale: גְּבוּל can mean border, boundary, or territory. In this comparative
    political context, 'territory' best communicates the extent of their realm rather
    than a boundary line alone.
