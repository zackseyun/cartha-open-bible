id: EST.7.7
reference: Esther 7:7
source:
  edition: WLC
  text: וְ/הַ/מֶּ֜לֶךְ קָ֤ם בַּ/חֲמָת/וֹ֙ מִ/מִּשְׁתֵּ֣ה הַ/יַּ֔יִן אֶל גִּנַּ֖ת הַ/בִּיתָ֑ן
    וְ/הָמָ֣ן עָמַ֗ד לְ/בַקֵּ֤שׁ עַל נַפְשׁ/וֹ֙ מֵֽ/אֶסְתֵּ֣ר הַ/מַּלְכָּ֔ה כִּ֣י
    רָאָ֔ה כִּֽי כָלְתָ֥ה אֵלָ֛י/ו הָ/רָעָ֖ה מֵ/אֵ֥ת הַ/מֶּֽלֶךְ־־־׃
translation:
  text: Then the king rose in his wrath from the wine banquet and went into the palace
    garden, but Haman remained to beg Queen Esther for his life, for he saw that the
    evil against him had been determined by the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stood to seek his life from Esther the queen.' The Hebrew is more literally
      'stood to seek for his life from Esther the queen.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for he saw that the disaster against him was finished/decided from the
      king.' The Hebrew expression conveys that the king's judgment against Haman
      was now fixed.
    reason: lexical_alternative
  - marker: c
    text: '''Palace garden'' translates a phrase that could also be rendered ''garden
      of the pavilion'' or ''garden of the palace complex.'''
    reason: cultural_note
lexical_decisions:
- source_word: בַּחֲמָתוֹ
  chosen: in his wrath
  alternatives:
  - in his anger
  - in his fury
  lexicon: HALOT
  rationale: חֵמָה denotes burning anger/wrath. 'Wrath' preserves the intensity better
    than the flatter 'anger' while remaining natural English.
- source_word: מִמִּשְׁתֵּה הַיַּיִן
  chosen: from the wine banquet
  alternatives:
  - from the banquet of wine
  - from the drinking feast
  lexicon: HALOT
  rationale: מִשְׁתֶּה is a feast/banquet, often specifically a drinking banquet in
    Esther. 'Wine banquet' is idiomatic and preserves the explicit mention of wine.
- source_word: גִּנַּת הַבִּיתָן
  chosen: the palace garden
  alternatives:
  - the garden of the palace
  - the garden of the pavilion
  lexicon: HALOT
  rationale: גִּנָּה is 'garden.' בִּיתָן can refer to a palace/pavilion complex.
    In Esther's Persian court setting, 'palace garden' is the clearest natural rendering.
    'Pavilion' is possible but less transparent in modern English.
- source_word: עָמַד
  chosen: remained
  alternatives:
  - stood
  lexicon: HALOT
  rationale: Literally 'stood,' but in context the contrast is between the king leaving
    and Haman staying behind to plead. 'Remained' captures the narrative force without
    denying the underlying posture.
- source_word: לְבַקֵּשׁ עַל נַפְשׁוֹ
  chosen: to beg ... for his life
  alternatives:
  - to seek his life from
  - to plead for his life from
  lexicon: HALOT
  rationale: The idiom means to seek or plead for one's life. 'Beg ... for his life'
    conveys the desperation of the scene in natural English.
- source_word: מֵאֶסְתֵּר הַמַּלְכָּה
  chosen: Queen Esther
  alternatives:
  - from Esther the queen
  lexicon: HALOT
  rationale: English normally places the royal title before the name. This preserves
    the same referential content in idiomatic form.
- source_word: כִּי רָאָה
  chosen: for he saw
  alternatives:
  - because he saw
  lexicon: HALOT
  rationale: כִּי here introduces the reason for Haman's pleading. 'For he saw' fits
    the narrative register well.
- source_word: כִּי כָלְתָה
  chosen: had been determined
  alternatives:
  - was finished
  - was completed
  - was decided
  lexicon: HALOT
  rationale: כלה in this construction conveys that the matter was settled or brought
    to completion. In context it refers to the king's decision of doom being fixed,
    not merely an action being completed. 'Had been determined' best communicates
    that judicial finality.
- source_word: הָרָעָה
  chosen: the evil
  alternatives:
  - the disaster
  - the harm
  - the doom
  lexicon: HALOT
  rationale: רָעָה can denote evil, harm, or calamity. Here it refers to the disastrous
    judgment coming upon Haman. 'The evil against him' stays close to the Hebrew while
    allowing readers to sense both moral and calamitous force.
- source_word: מֵאֵת הַמֶּלֶךְ
  chosen: by the king
  alternatives:
  - from the king
  lexicon: HALOT
  rationale: מֵאֵת marks source/origin. In English, with a passive idea like 'had
    been determined,' 'by the king' communicates agency more naturally than 'from
    the king.'
