id: EST.7.2
reference: Esther 7:2
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ הַ/מֶּ֨לֶךְ לְ/אֶסְתֵּ֜ר גַּ֣ם בַּ/יּ֤וֹם הַ/שֵּׁנִי֙ בְּ/מִשְׁתֵּ֣ה הַ/יַּ֔יִן מַה שְּׁאֵלָתֵ֛/ךְ אֶסְתֵּ֥ר הַ/מַּלְכָּ֖ה וְ/תִנָּ֣תֵֽן לָ֑/ךְ וּ/מַה בַּקָּשָׁתֵ֛/ךְ עַד חֲצִ֥י הַ/מַּלְכ֖וּת וְ/תֵעָֽשׂ־־־׃
translation:
  text: And the king said to Esther on the second day also[a], at the banquet of wine, “What is your petition, Queen Esther? It shall be granted to you. And what is your request? Even to half the kingdom[b], it shall be done.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'at the banquet of wine.'
    reason: lexical_alternative
  - marker: b
    text: The expression 'up to half the kingdom' is a conventional royal offer expressing extraordinary favor, not necessarily a literal proposal to divide the realm.
    reason: cultural_note
lexical_decisions:
- source_word: גַּם
  chosen: as well
  alternatives:
  - again
  - also
  lexicon: HALOT
  rationale: Marks continuation from the previous banquet/day context. 'As well' naturally conveys that the king spoke to Esther again on this second day.
- source_word: בַּיּוֹם הַשֵּׁנִי
  chosen: on the second day
  alternatives:
  - on the second day also
  - the next day
  lexicon: HALOT
  rationale: A straightforward temporal expression. 'On the second day' preserves the formal sense without over-paraphrasing to 'the next day.'
- source_word: בְּמִשְׁתֵּה הַיַּיִן
  chosen: at the wine banquet
  alternatives:
  - at the banquet of wine
  - during the wine feast
  lexicon: HALOT
  rationale: The phrase refers to the drinking banquet setting. 'Wine banquet' is idiomatic modern English and preserves the specific mention of wine.
- source_word: מַה שְּׁאֵלָתֵךְ
  chosen: What is your petition
  alternatives:
  - What is your request
  - What do you ask
  lexicon: HALOT
  rationale: שְׁאֵלָה often denotes a formal petition or asked-for matter. 'Petition' preserves the courtly tone appropriate to the royal setting.
- source_word: וְתִנָּתֵן לָךְ
  chosen: It will be granted to you
  alternatives:
  - it will be given to you
  lexicon: HALOT
  rationale: Though literally 'it will be given to you,' in context of a royal petition 'granted' is the natural English equivalent and preserves the performative force.
- source_word: בַּקָּשָׁתֵךְ
  chosen: your request
  alternatives:
  - your petition
  - what you seek
  lexicon: HALOT
  rationale: While close in meaning to שְׁאֵלָה, בַּקָּשָׁה can be rendered 'request.' Using a different but related English term reflects the Hebrew variation without overstating a semantic distinction.
- source_word: עַד חֲצִי הַמַּלְכוּת
  chosen: Even up to half the kingdom
  alternatives:
  - up to half my kingdom
  - up to half of the kingdom
  lexicon: HALOT
  rationale: This is a conventional royal hyperbolic offer. The Hebrew says 'the kingdom,' not explicitly 'my kingdom,' so the translation keeps the more literal form while remaining idiomatic.
- source_word: וְתֵעָשׂ
  chosen: it will be done
  alternatives:
  - it shall be done
  - it will be carried out
  lexicon: HALOT
  rationale: 'The passive-like sense in English best captures the jussive/niphal-like resultative force here: the request will be fulfilled.'
- source_word: אֶסְתֵּר הַמַּלְכָּה
  chosen: Queen Esther
  alternatives:
  - Esther the queen
  lexicon: HALOT
  rationale: English title order normally places the title first. This preserves the honorific force in natural English.
