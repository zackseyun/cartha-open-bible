id: EST.7.4
reference: Esther 7:4
source:
  edition: WLC
  text: כִּ֤י נִמְכַּ֨רְנוּ֙ אֲנִ֣י וְ/עַמִּ֔/י לְ/הַשְׁמִ֖יד לַ/הֲר֣וֹג וּ/לְ/אַבֵּ֑ד
    וְ֠/אִלּוּ לַ/עֲבָדִ֨ים וְ/לִ/שְׁפָח֤וֹת נִמְכַּ֨רְנוּ֙ הֶחֱרַ֔שְׁתִּי כִּ֣י אֵ֥ין
    הַ/צָּ֛ר שֹׁוֶ֖ה בְּ/נֵ֥זֶק הַ/מֶּֽלֶךְ׃ס
translation:
  text: For we have been sold, I and my people, to be destroyed, to be killed, and
    to perish. But if we had been sold as male slaves and female slaves, I would have
    kept silent, for the adversary is not worth the damage to the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the king’s loss.' The Hebrew expression can denote damage, injury, or
      financial loss to the king.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִמְכַּרְנוּ
  chosen: have been sold
  alternatives:
  - have been handed over
  - have been sold off
  lexicon: HALOT
  rationale: Passive of מכר naturally denotes being sold. 'Have been sold' preserves
    the commercial metaphor that underlies Esther's appeal and anticipates the contrast
    with literal enslavement in the next clause.
- source_word: עַמִּי
  chosen: my people
  alternatives:
  - my nation
  lexicon: HALOT
  rationale: עַם commonly means 'people' in the ethnic/national sense. 'My people'
    is the most natural English rendering and preserves Esther's identification with
    the threatened group.
- source_word: לְהַשְׁמִיד לַהֲרֹג וּלְאַבֵּד
  chosen: to be destroyed, to be killed, and to perish
  alternatives:
  - to destroy, to kill, and to annihilate
  - to be exterminated, to be slain, and to be wiped out
  lexicon: HALOT
  rationale: The Hebrew piles up three near-synonymous infinitives for rhetorical
    force. Rendering them with passive/resultative English ('to be destroyed, to be
    killed, and to perish') reflects the victims' perspective in context while preserving
    the triadic escalation. 'Perish' for אבד avoids overloading all three with the
    same English register while retaining the sense of total loss.
- source_word: וְאִלּוּ
  chosen: But if
  alternatives:
  - and if
  - even if
  lexicon: HALOT
  rationale: Introduces a contrary-to-fact or hypothetical contrast. 'But if' best
    signals Esther's shift from actual genocidal threat to a lesser hypothetical circumstance.
- source_word: לַעֲבָדִים וְלִשְׁפָחוֹת
  chosen: as male slaves and female slaves
  alternatives:
  - as slaves and servant girls
  - as bondmen and bondwomen
  lexicon: HALOT
  rationale: The pair explicitly distinguishes male and female forms of servitude.
    In keeping with the project's preference to preserve bonded-force language where
    salient, 'male slaves and female slaves' is clearer and more accurate than the
    softer 'servants'.
- source_word: הֶחֱרַשְׁתִּי
  chosen: I would have kept silent
  alternatives:
  - I would have remained quiet
  - I would have said nothing
  lexicon: HALOT
  rationale: The perfect here functions in the hypothetical apodosis. 'I would have
    kept silent' captures both the idiomatic sense and the counterfactual force in
    English.
- source_word: הַצָּר
  chosen: the adversary
  alternatives:
  - the enemy
  - the oppressor
  lexicon: HALOT
  rationale: The noun denotes one who shows hostility or causes distress. 'Adversary'
    fits the courtly setting and avoids prematurely narrowing the term, while still
    clearly referring to Haman.
- source_word: שֹׁוֶה
  chosen: is not worth
  alternatives:
  - cannot compare with
  - does not compensate for
  lexicon: HALOT
  rationale: The participial form from שוה conveys equivalence or being of equal value.
    In this idiom, Esther means the matter would not justify troubling the king. 'Is
    not worth' communicates the pragmatic sense in natural English.
- source_word: בְּנֵזֶק הַמֶּלֶךְ
  chosen: the damage to the king
  alternatives:
  - the king's loss
  - the injury to the king
  lexicon: HALOT
  rationale: נזק denotes damage, loss, or injury. 'The damage to the king' preserves
    the concrete sense and leaves open whether Esther means financial loss, political
    harm, or royal inconvenience. A footnote preserves the common alternative 'the
    king's loss.'
