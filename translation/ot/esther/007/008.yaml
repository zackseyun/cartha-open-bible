id: EST.7.8
reference: Esther 7:8
source:
  edition: WLC
  text: וְ/הַ/מֶּ֡לֶךְ שָׁב֩ מִ/גִּנַּ֨ת הַ/בִּיתָ֜ן אֶל בֵּ֣ית מִשְׁתֵּ֣ה הַ/יַּ֗יִן
    וְ/הָמָן֙ נֹפֵ֔ל עַל הַ/מִּטָּה֙ אֲשֶׁ֣ר אֶסְתֵּ֣ר עָלֶ֔י/הָ וַ/יֹּ֣אמֶר הַ/מֶּ֔לֶךְ
    הֲ֠/גַם לִ/כְבּ֧וֹשׁ אֶת הַ/מַּלְכָּ֛ה עִמִּ֖/י בַּ/בָּ֑יִת הַ/דָּבָ֗ר יָצָא֙
    מִ/פִּ֣י הַ/מֶּ֔לֶךְ וּ/פְנֵ֥י הָמָ֖ן חָפֽוּ־׀־־׃ס
translation:
  text: The king returned from the palace garden to the house of the wine feast, and
    Haman was falling on the couch where Esther was. Then the king said, “Will he
    even assault the queen while I am in the house?” As the word went out from the
    king’s mouth, they covered Haman’s face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Will he even overpower/violate the queen with me in the house?” The
      Hebrew verb can mean to subdue or overpower; here it carries the king’s accusation
      of an outrageous assault.
    reason: lexical_alternative
  - marker: b
    text: That is, court attendants immediately veiled Haman’s face, a sign that judgment
      had effectively fallen on him.
    reason: cultural_note
lexical_decisions:
- source_word: גִּנַּת הַבִּיתָן
  chosen: the palace garden
  alternatives:
  - the garden of the palace
  - the garden of the pavilion
  lexicon: HALOT
  rationale: גִּנָּה is 'garden.' בִּיתָן refers to the royal palace/pavilion complex.
    'Palace garden' is natural modern English and preserves the royal setting without
    awkward literalism.
- source_word: בֵּית מִשְׁתֵּה הַיַּיִן
  chosen: the house of the wine feast
  alternatives:
  - the banquet hall of wine
  - the house of the banquet
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the repeated banquet motif in
    Esther. מִשְׁתֶּה is 'feast/banquet,' and הַיַּיִן specifies a wine-drinking feast.
    'House of the wine feast' is slightly literal but still intelligible.
- source_word: נֹפֵל
  chosen: was falling
  alternatives:
  - had fallen
  - was lying prostrate
  - was throwing himself down
  lexicon: HALOT
  rationale: The participle presents Haman in the act when the king reenters. 'Was
    falling' preserves the vivid immediacy better than the stative 'had fallen,' while
    allowing the sense that he had thrown himself onto Esther's couch to plead.
- source_word: הַמִּטָּה
  chosen: the couch
  alternatives:
  - the bed
  - the divan
  lexicon: HALOT
  rationale: In banquet context, מִטָּה commonly refers to a reclining couch rather
    than a sleeping bed. 'Couch' best fits the Persian banquet setting and avoids
    oversexualizing the furniture term itself.
- source_word: עָלֶיהָ
  chosen: where Esther was
  alternatives:
  - on which Esther was
  - where Esther was reclining
  lexicon: HALOT
  rationale: The preposition literally means 'upon it,' referring to Esther's position
    on the couch. 'Where Esther was' is idiomatic English and leaves the scene clear
    without adding an explicit verb not present in Hebrew.
- source_word: הֲגַם לִכְבּוֹשׁ
  chosen: Will he even assault
  alternatives:
  - Will he even overpower
  - Will he even violate
  - Will he even ravish
  lexicon: HALOT
  rationale: כָּבַשׁ means to subdue or overpower. In this charged context the king
    interprets Haman's action as an attack on the queen. 'Assault' conveys the force
    and implied sexual threat without overstating the lexical specificity to completed
    rape.
- source_word: עִמִּי בַּבָּיִת
  chosen: while I am in the house
  alternatives:
  - with me in the house
  - in my presence in the house
  lexicon: HALOT
  rationale: Literally 'with me in the house.' In idiomatic English the force is that
    the outrage is occurring while the king is present in the palace. 'While I am
    in the house' captures that sense naturally.
- source_word: הַדָּבָר יָצָא מִפִּי הַמֶּלֶךְ
  chosen: As the word went out from the king’s mouth
  alternatives:
  - As soon as the king spoke
  - When the statement left the king's mouth
  lexicon: HALOT
  rationale: This formula marks the immediacy and authority of the king's utterance.
    A moderately literal rendering preserves the narrative force and royal finality.
- source_word: וּפְנֵי הָמָן חָפוּ
  chosen: they covered Haman’s face
  alternatives:
  - Haman's face was covered
  lexicon: HALOT
  rationale: The Hebrew uses an active plural verb with Haman's face as object. English
    naturally supplies an indefinite subject, 'they,' indicating attendants acted
    at once. This preserves the sudden move toward condemnation.
