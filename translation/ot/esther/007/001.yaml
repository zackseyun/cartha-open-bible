id: EST.7.1
reference: Esther 7:1
source:
  edition: WLC
  text: וַ/יָּבֹ֤א הַ/מֶּ֨לֶךְ֙ וְ/הָמָ֔ן לִ/שְׁתּ֖וֹת עִם אֶסְתֵּ֥ר הַ/מַּלְכָּֽה־׃
translation:
  text: So the king and Haman came to drink with Queen Esther[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And the king and Haman came to drink with Esther the queen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went in
  - entered
  lexicon: HALOT
  rationale: The wayyiqtol of בוא advances the narrative with a simple past. 'Came' is natural English and fits the movement to Esther's banquet; 'entered' is possible but adds specificity not explicit in the verb alone.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Standard rendering of מֶלֶךְ with the article. The narrative has already identified the Persian king, so 'the king' is sufficient and natural.
- source_word: וְהָמָן
  chosen: and Haman
  lexicon: HALOT
  rationale: Proper name is transliterated per translation philosophy; conjunction rendered straightforwardly as 'and'.
- source_word: לִשְׁתּוֹת
  chosen: to drink
  alternatives:
  - to feast
  - to drink wine
  lexicon: HALOT
  rationale: The infinitive construct of שׁתה means 'to drink.' In Esther this often refers to banquet drinking, but the Hebrew here does not explicitly say 'wine' or use a broader verb for feasting, so 'to drink' best preserves the source wording.
- source_word: עִם
  chosen: with
  lexicon: HALOT
  rationale: Direct and standard rendering of the preposition meaning accompaniment.
- source_word: אֶסְתֵּר
  chosen: Esther
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
- source_word: הַמַּלְכָּה
  chosen: Queen Esther
  alternatives:
  - Esther the queen
  lexicon: HALOT
  rationale: The appositional phrase literally reads 'Esther the queen.' English idiom more naturally places the title before the name as 'Queen Esther' without loss of meaning.
- source_word: וַ
  chosen: So
  alternatives:
  - And
  lexicon: HALOT
  rationale: The initial waw on the finite verb is the normal narrative conjunction. 'So' gives smooth modern English narrative flow while preserving the sequential sense; 'And' would be more formally literal.
