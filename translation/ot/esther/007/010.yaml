id: EST.7.10
reference: Esther 7:10
source:
  edition: WLC
  text: וַ/יִּתְלוּ֙ אֶת הָמָ֔ן עַל הָ/עֵ֖ץ אֲשֶׁר הֵכִ֣ין לְ/מָרְדֳּכָ֑י וַ/חֲמַ֥ת
    הַ/מֶּ֖לֶךְ שָׁכָֽכָה־־־׃פ
translation:
  text: So they hanged Haman on the gallows that he had prepared for Mordecai, and
    the king’s wrath subsided.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they impaled Haman on the stake/tree that he had prepared for Mordecai.'
      The Hebrew uses עֵץ ('tree,' 'wood,' 'stake'), and the verb can refer more broadly
      to hanging up a body; the exact execution method is debated.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְלוּ
  chosen: they hanged
  alternatives:
  - they impaled
  - they hung up
  lexicon: HALOT
  rationale: The verb תלה commonly means to hang up/suspend. In Esther, the exact
    mode of execution is debated because עֵץ can denote a wooden stake or gallows.
    'Hanged' is retained in the main text because it is the conventional and contextually
    natural English rendering here, while the alternative 'impaled' is preserved in
    a footnote due to the Persian context and possible stake-execution background.
- source_word: הָמָן
  chosen: Haman
  rationale: Personal name transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: עַל הָעֵץ
  chosen: on the gallows
  alternatives:
  - on the tree
  - on the stake
  - on the wooden pole
  lexicon: HALOT
  rationale: עֵץ literally means 'tree' or 'wood,' but in Esther it refers to the
    execution device Haman prepared. 'Gallows' communicates the narrative function
    in idiomatic English, though 'stake' or 'tree' are lexically possible and worth
    preserving in a footnote because the underlying Hebrew is broader than the English
    term.
- source_word: אֲשֶׁר הֵכִין לְמָרְדֳּכָי
  chosen: that he had prepared for Mordecai
  alternatives:
  - which he had set up for Mordecai
  - that he had made ready for Mordecai
  lexicon: HALOT
  rationale: הכין means 'prepare, make ready, set up.' 'Had prepared for' is natural
    English and preserves the irony that Haman suffers the fate he intended for Mordecai.
- source_word: וַחֲמַת הַמֶּלֶךְ
  chosen: and the king’s wrath
  alternatives:
  - and the king’s anger
  - and the king’s fury
  lexicon: HALOT
  rationale: חֵמָה denotes heat, wrath, or fury. 'Wrath' best preserves the intensity
    of the king’s emotional state without sounding overly archaic in this context.
- source_word: שָׁכָכָה
  chosen: subsided
  alternatives:
  - abated
  - was pacified
  - quieted down
  lexicon: HALOT
  rationale: The verb שׁכך means to subside, diminish, or be quieted. 'Subsided' is
    clear modern English and fits the feminine subject 'wrath' idiomatically.
