id: EST.7.6
reference: Esther 7:6
source:
  edition: WLC
  text: וַ/תֹּ֣אמֶר אֶסְתֵּ֔ר אִ֚ישׁ צַ֣ר וְ/אוֹיֵ֔ב הָמָ֥ן הָ/רָ֖ע הַ/זֶּ֑ה וְ/הָמָ֣ן נִבְעַ֔ת מִ/לִּ/פְנֵ֥י הַ/מֶּ֖לֶךְ וְ/הַ/מַּלְכָּֽה־׃
translation:
  text: And Esther said[a], “A foe and an enemy—this evil Haman!” Then Haman was terrified before the king and the queen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'A man, an adversary and an enemy—this evil Haman.' The Hebrew is abrupt and elliptical, heightening Esther's accusation.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  - one
  lexicon: HALOT
  rationale: Basic noun meaning 'man' or 'person.' Here retained as 'man' because the Hebrew explicitly uses אִישׁ and the referent is male; this also preserves the abrupt accusatory structure of Esther's reply.
- source_word: צַר
  chosen: hostile
  alternatives:
  - adversary
  - foe
  - oppressor
  lexicon: HALOT
  rationale: צַר denotes one who is in opposition, in distressing hostility. 'Hostile' works idiomatically in the paired expression with 'enemy' while preserving the force of antagonism.
- source_word: אוֹיֵב
  chosen: enemy
  alternatives:
  - foe
  lexicon: HALOT
  rationale: Standard rendering for אוֹיֵב. Kept distinct from צַר so the Hebrew's double accusation is preserved rather than collapsed into a single English term.
- source_word: הָמָן הָרָע הַזֶּה
  chosen: this evil Haman
  alternatives:
  - Haman this evil man
  - this wicked Haman
  lexicon: HALOT
  rationale: 'The Hebrew apposition identifies the accused emphatically: ''Haman, this evil one/man.'' ''This evil Haman'' is natural English and preserves the demonstrative force and moral condemnation.'
- source_word: נִבְעַת
  chosen: was terrified
  alternatives:
  - was frightened
  - was panic-stricken
  - was dismayed
  lexicon: HALOT
  rationale: The Niphal form conveys being suddenly overcome with terror. 'Was terrified' best captures the intensity without overparaphrasing.
- source_word: מִלִּפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - from before
  lexicon: HALOT
  rationale: Literally 'from before,' but in this context it idiomatically indicates being terrified in the presence of the king and queen. 'Before' is concise and natural.
- source_word: וַתֹּאמֶר אֶסְתֵּר
  chosen: And Esther said
  alternatives:
  - Then Esther said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introduction. 'And Esther said' preserves the Hebrew sequencing straightforwardly.
