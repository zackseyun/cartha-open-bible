id: EST.7.5
reference: Esther 7:5
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ הַ/מֶּ֣לֶךְ אֲחַשְׁוֵר֔וֹשׁ וַ/יֹּ֖אמֶר לְ/אֶסְתֵּ֣ר הַ/מַּלְכָּ֑ה
    מִ֣י ה֥וּא זֶה֙ וְ/אֵֽי זֶ֣ה ה֔וּא אֲשֶׁר מְלָא֥/וֹ לִבּ֖/וֹ לַ/עֲשׂ֥וֹת כֵּֽן־־׃
translation:
  text: Then King Ahasuerus said to Esther the queen, “Who is he, and where is he,
    who has filled his heart to do this?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'who has filled his heart to do this,' an idiom meaning 'who has
      dared' or 'who has presumed' to do such a thing.
    reason: lexical_alternative
  - marker: b
    text: Or, less likely, 'and which one is he?' if the phrase is taken as identifying
      the person rather than asking his whereabouts.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence; 'and said' is more formally
    possible.
- source_word: הַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  chosen: King Ahasuerus
  alternatives:
  - the king, Ahasuerus
  lexicon: HALOT
  rationale: English idiom normally places the royal title before the name. The proper
    name is transliterated per project philosophy.
- source_word: וַיֹּאמֶר לְאֶסְתֵּר הַמַּלְכָּה
  chosen: said to Esther the queen
  alternatives:
  - said to Queen Esther
  lexicon: HALOT
  rationale: The Hebrew apposition is literally 'to Esther the queen.' This is retained
    in close form for transparency, though 'to Queen Esther' would also be idiomatic
    English.
- source_word: מִי הוּא זֶה
  chosen: Who is he
  alternatives:
  - Who is this man
  - Who is this
  lexicon: HALOT
  rationale: The phrase is an emphatic identification question. 'Who is he' preserves
    the pronoun emphasis without adding 'man,' which is not explicit in the Hebrew.
- source_word: וְאֵי זֶה הוּא
  chosen: and where is he
  alternatives:
  - and which one is he
  - and where is this one
  lexicon: HALOT
  rationale: אֵי commonly asks location ('where?'). In this context the king asks
    both identity and whereabouts. Rendering it as 'which one' is less likely here
    than a locative sense.
- source_word: אֲשֶׁר מְלָאוֹ לִבּוֹ
  chosen: who has filled his heart
  alternatives:
  - whose heart has filled him
  - who has dared in his heart
  - who has presumed
  lexicon: HALOT
  rationale: Literally, 'who filled his heart,' an idiom for emboldening oneself or
    presuming to act. The translation keeps the underlying heart-language in the main
    text for auditability rather than collapsing immediately to an interpretive gloss
    like 'dared' or 'presumed.'
- source_word: לַעֲשׂוֹת כֵּן
  chosen: to do this
  alternatives:
  - to do so
  - to act this way
  lexicon: HALOT
  rationale: כֵּן refers back to the threatened action just described. 'To do this'
    is natural and specific in English; 'to do so' is also possible.
