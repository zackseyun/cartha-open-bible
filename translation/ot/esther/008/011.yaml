id: EST.8.11
reference: Esther 8:11
source:
  edition: WLC
  text: אֲשֶׁר֩ נָתַ֨ן הַ/מֶּ֜לֶךְ לַ/יְּהוּדִ֣ים אֲשֶׁ֣ר בְּ/כָל עִיר וָ/עִ֗יר לְ/הִקָּהֵל֮
    וְ/לַ/עֲמֹ֣ד עַל נַפְשָׁ/ם֒ לְ/הַשְׁמִיד֩ וְ/לַ/הֲרֹ֨ג וּ/לְ/אַבֵּ֜ד אֶת כָּל
    חֵ֨יל עַ֧ם וּ/מְדִינָ֛ה הַ/צָּרִ֥ים אֹתָ֖/ם טַ֣ף וְ/נָשִׁ֑ים וּ/שְׁלָלָ֖/ם לָ/בֽוֹז׀־־־־־׃
translation:
  text: that the king granted the Jews in every city to assemble and to stand for
    their lives, to destroy, to kill, and to annihilate every armed force of any people
    or province that would attack them, children and women, and to plunder their spoil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that were hostile to them.' The Hebrew participle can denote those acting
      as enemies toward them; 'that might attack them' makes the hostile sense explicit
      in context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'children and women.' The decree's wording explicitly includes them
      within the enemy group described.
    reason: cultural_note
lexical_decisions:
- source_word: אֲשֶׁר נָתַן
  chosen: that ... granted
  alternatives:
  - which ... gave
  - that ... authorized
  lexicon: HALOT
  rationale: The relative clause continues the content of the decree from the previous
    verse. 'Granted' fits royal authorization better than the more wooden 'gave' and
    preserves the legal-administrative sense.
- source_word: בְּכָל עִיר וָעִיר
  chosen: in every single city
  alternatives:
  - in every city and city
  - in each and every city
  lexicon: HALOT
  rationale: The distributive repetition emphasizes comprehensiveness. 'Every single
    city' renders the idiomatic force in natural English.
- source_word: לְהִקָּהֵל
  chosen: to assemble
  alternatives:
  - to gather themselves together
  lexicon: HALOT
  rationale: The Niphal infinitive conveys gathering together. 'Assemble' is concise,
    natural, and preserves the formal public sense.
- source_word: וְלַעֲמֹד עַל נַפְשָׁם
  chosen: and to stand for their lives
  alternatives:
  - and to stand for themselves
  - and to defend their lives
  lexicon: HALOT
  rationale: Literally 'stand on/for their life.' 'Stand for their lives' keeps the
    concrete Hebrew imagery while clearly conveying self-defense. 'Defend their lives'
    is interpretive; the chosen wording stays closer to the source.
- source_word: לְהַשְׁמִיד וְלַהֲרֹג וּלְאַבֵּד
  chosen: to destroy, to kill, and to annihilate
  alternatives:
  - to destroy, slay, and cause to perish
  - to exterminate, kill, and destroy
  lexicon: HALOT
  rationale: The three near-synonymous verbs are intentionally cumulative and should
    all be represented. 'Annihilate' gives distinct force to אבד in this legal-violent
    formula without collapsing the triad.
- source_word: כָּל חֵיל
  chosen: every armed force
  alternatives:
  - all the force
  - every host
  - all the army
  lexicon: HALOT
  rationale: חֵיל here refers to military strength or armed company rather than wealth.
    'Armed force' best fits the context of authorized self-defense.
- source_word: עַם וּמְדִינָה
  chosen: of any people or province
  alternatives:
  - of people and province
  - of any nation or province
  lexicon: HALOT
  rationale: The pair denotes any ethnic-political grouping within the empire. 'Any
    people or province' communicates the indefinite, comprehensive scope.
- source_word: הַצָּרִים אֹתָם
  chosen: that might attack them
  alternatives:
  - that were hostile to them
  - that oppressed them
  - their adversaries
  lexicon: HALOT
  rationale: The participle from צרר denotes showing hostility or treating as an enemy.
    In this context, 'might attack them' makes explicit the hostile action implied
    by the decree's defensive setting, while remaining within the semantic range.
- source_word: טַף וְנָשִׁים
  chosen: including children and women
  alternatives:
  - little ones and women
  - children and women
  lexicon: HALOT
  rationale: טַף refers to dependents/children. 'Including' signals that these are
    encompassed within the hostile group named in the decree, not a separate object
    disconnected from the syntax.
- source_word: וּשְׁלָלָם לָבוֹז
  chosen: and to plunder their spoil
  alternatives:
  - and to seize their plunder
  - and to take their goods as plunder
  lexicon: HALOT
  rationale: The phrase is an infinitival clause authorizing seizure of goods. 'Plunder
    their spoil' is slightly tautological in English but reflects the Hebrew legal
    formula; 'spoil' is retained as the direct object of plundering.
