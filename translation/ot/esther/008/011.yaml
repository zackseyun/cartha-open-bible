theological_decisions:
- issue: Violence language in a royal decree
  chosen_reading: Render the decree's violent authorization directly without softening
    it, while preserving its defensive framing in context.
  alternative_readings:
  - Use softened terms such as 'defeat' or 'overcome'
  - Translate more dynamically as 'defend themselves against any attackers'
  rationale: The Hebrew uses a formal triad of destruction verbs and explicitly authorizes
    lethal action and plunder. The translation should not mute the severity of the
    text. At the same time, the phrase 'stand for their lives' and the hostile participle
    indicate a defensive setting, which is reflected in the wording 'that might attack
    them.'
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Scope of 'children and women'
  chosen_reading: Treat 'children and women' as part of the hostile group described
    in the decree and translate transparently without resolving ethical tension.
  alternative_readings:
  - Recast to obscure or omit the phrase
  - Interpret it as referring only to the Jews' right to seize noncombatants
  rationale: The syntax most naturally apposes 'children and women' to the targeted
    enemy force. Because the text itself presents morally difficult language, the
    translation should preserve rather than sanitize that tension.
  doctrine_reference: Translation philosophy §3
