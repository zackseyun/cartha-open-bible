id: EST.8.4
reference: Esther 8:4
source:
  edition: WLC
  text: וַ/יּ֤וֹשֶׁט הַ/מֶּ֨לֶךְ֙ לְ/אֶסְתֵּ֔ר אֵ֖ת שַׁרְבִ֣ט הַ/זָּהָ֑ב וַ/תָּ֣קָם
    אֶסְתֵּ֔ר וַֽ/תַּעֲמֹ֖ד לִ/פְנֵ֥י הַ/מֶּֽלֶךְ׃
translation:
  text: Then the king held out the golden scepter to Esther, and Esther rose and stood
    before the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'extended the golden scepter to Esther.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹשֶׁט
  chosen: held out
  alternatives:
  - extended
  - stretched out
  lexicon: HALOT
  rationale: The verb denotes extending or reaching out. 'Held out' is idiomatic modern
    English for extending a scepter toward someone and fits the courtly context better
    than the more wooden 'stretched out.'
- source_word: שַׁרְבִיט הַזָּהָב
  chosen: the golden scepter
  alternatives:
  - the scepter of gold
  - the gold scepter
  lexicon: HALOT
  rationale: This phrase refers to the royal scepter made of gold or golden in appearance.
    'The golden scepter' is the most natural English rendering and preserves the definite,
    royal object already established in Esther.
- source_word: וַתָּקָם
  chosen: rose
  alternatives:
  - got up
  - stood up
  lexicon: HALOT
  rationale: The verb means to arise. 'Rose' is concise and suitably dignified in
    narrative style; 'stood up' would blur the distinction from the following verb
    'stood.'
- source_word: וַתַּעֲמֹד לִפְנֵי הַמֶּלֶךְ
  chosen: stood before the king
  alternatives:
  - took her stand before the king
  - stood in the presence of the king
  lexicon: HALOT
  rationale: The idiom לִפְנֵי means 'before' or 'in the presence of.' 'Stood before
    the king' is both literal and natural, preserving the formal court setting.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  lexicon: Hebrew waw-consecutive usage
  rationale: The initial waw advances the narrative. 'Then' communicates sequential
    movement in smooth English better than repeatedly using 'And,' while remaining
    faithful to the discourse function.
- source_word: לְאֶסְתֵּר
  chosen: to Esther
  alternatives:
  - toward Esther
  lexicon: HALOT
  rationale: The preposition marks the indirect object of the king's action. 'To Esther'
    is the standard and natural rendering.
