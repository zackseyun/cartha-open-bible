id: EST.8.3
reference: Esther 8:3
source:
  edition: WLC
  text: וַ/תּ֣וֹסֶף אֶסְתֵּ֗ר וַ/תְּדַבֵּר֙ לִ/פְנֵ֣י הַ/מֶּ֔לֶךְ וַ/תִּפֹּ֖ל לִ/פְנֵ֣י
    רַגְלָ֑י/ו וַ/תֵּ֣בְךְּ וַ/תִּתְחַנֶּן ל֗/וֹ לְ/הַֽעֲבִיר֙ אֶת רָעַת֙ הָמָ֣ן הָֽ/אֲגָגִ֔י
    וְ/אֵת֙ מַֽחֲשַׁבְתּ֔/וֹ אֲשֶׁ֥ר חָשַׁ֖ב עַל הַ/יְּהוּדִֽים־־־׃
translation:
  text: Then Esther spoke again before the king. She fell before his feet, wept, and
    pleaded with him to avert the evil of Haman the Agagite and his scheme that he
    had devised against the Jews.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'remove' or 'cause to pass away'; the Hebrew verb conveys making Haman's
      evil and plan pass away or be set aside.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתּוֹסֶף
  chosen: Then Esther spoke again
  alternatives:
  - And Esther continued
  - And Esther added and spoke
  lexicon: HALOT
  rationale: יסף + following finite verb commonly conveys repetition or continuation
    ('again/continued'). In idiomatic English, folding this into 'spoke again' best
    preserves the sense without woodenly rendering 'added.'
- source_word: וַתְּדַבֵּר לִפְנֵי הַמֶּלֶךְ
  chosen: spoke again before the king
  alternatives:
  - continued speaking before the king
  - spoke before the king
  lexicon: HALOT
  rationale: דבר is the ordinary verb 'speak.' לִפְנֵי here is spatial/courtly, 'before/in
    the presence of.' 'Before the king' preserves the formal court setting.
- source_word: וַתִּפֹּל לִפְנֵי רַגְלָיו
  chosen: She fell before his feet
  alternatives:
  - fell at his feet
  - threw herself down before his feet
  lexicon: HALOT
  rationale: נפל + לפני רגליו depicts physical prostration/suppliant posture. 'Before
    his feet' is slightly more formal and closely reflects the Hebrew wording, while
    remaining natural English.
- source_word: וַתֵּבְךְּ
  chosen: wept
  alternatives:
  - cried
  lexicon: HALOT
  rationale: בכה denotes weeping/crying. 'Wept' fits the solemn register of the narrative
    better than the more colloquial 'cried.'
- source_word: וַתִּתְחַנֶּן לוֹ
  chosen: pleaded with him
  alternatives:
  - begged him
  - implored him
  - sought favor from him
  lexicon: HALOT
  rationale: חנן in the hitpael expresses earnest supplication for favor or mercy.
    'Pleaded with him' captures both the emotional urgency and the petitionary force
    without overstating.
- source_word: לְהַעֲבִיר
  chosen: to avert
  alternatives:
  - to cause to pass away
  - to remove
  - to revoke
  lexicon: HALOT
  rationale: עבר in the hiphil means to cause to pass/remove. Here Esther asks that
    Haman's evil plan be made to pass away or be nullified. 'Avert' is concise, idiomatic,
    and fits the object 'evil' and 'scheme.'
- source_word: אֶת רָעַת הָמָן
  chosen: the evil of Haman
  alternatives:
  - Haman's evil plan
  - the harm intended by Haman
  - the wickedness of Haman
  lexicon: HALOT
  rationale: רָעָה can denote evil, harm, or calamity. Because the next phrase separately
    mentions his 'scheme,' rendering this first term as 'evil' preserves the moral
    dimension and avoids collapsing the two expressions into one.
- source_word: הָאֲגָגִי
  chosen: the Agagite
  lexicon: HALOT
  rationale: A gentilicial/title identifying Haman. Standard transliteration is appropriate
    for names and ethnic/dynastic designations.
- source_word: וְאֵת מַחֲשַׁבְתּוֹ אֲשֶׁר חָשַׁב
  chosen: and his scheme that he had devised
  alternatives:
  - and the plan that he planned
  - and his plot that he had conceived
  - and his device that he devised
  lexicon: HALOT
  rationale: The noun-verb pairing from חשב is emphatic. English should preserve the
    deliberative sense without awkward tautology. 'Scheme that he had devised' reflects
    intentional plotting and keeps the emphasis distinct from the prior 'evil.'
- source_word: עַל הַיְּהוּדִים
  chosen: against the Jews
  alternatives:
  - concerning the Jews
  lexicon: HALOT
  rationale: עַל with חשב in hostile contexts means plotting against someone. 'Against
    the Jews' makes the adversative force explicit in natural English.
