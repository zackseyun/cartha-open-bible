id: EST.8.6
reference: Esther 8:6
source:
  edition: WLC
  text: כִּ֠י אֵיכָכָ֤ה אוּכַל֙ וְֽ/רָאִ֔יתִי בָּ/רָעָ֖ה אֲשֶׁר יִמְצָ֣א אֶת עַמִּ֑/י וְ/אֵֽיכָכָ֤ה אוּכַל֙ וְֽ/רָאִ֔יתִי בְּ/אָבְדַ֖ן מוֹלַדְתִּֽ/י־־׃ס
translation:
  text: For how could I bear to see the disaster that will come upon my people? And how could I bear to see the destruction of my kindred?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the annihilation of my people of birth' / 'my relatives.' The Hebrew מוֹלַדְתִּי can denote those of one's birth or kindred, not only a birthplace.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - How
  lexicon: HALOT
  rationale: Introduces Esther's reason for her plea in the preceding context. 'For' best preserves the causal force in natural English.
- source_word: אֵיכָכָה
  chosen: how
  alternatives:
  - how can
  - how could
  lexicon: HALOT
  rationale: Interrogative adverb expressing incredulity. Rendered with 'how' and completed idiomatically by the following verb phrase.
- source_word: אוּכַל
  chosen: could I bear
  alternatives:
  - can I
  - could I
  - am I able
  lexicon: HALOT
  rationale: From יכל, 'be able.' In this emotional rhetorical question, simple ability in English is better expressed as 'bear' or 'endure' rather than mere capacity. The imperfect is rendered modally as 'could I bear' to fit the lamenting appeal.
- source_word: וְרָאִיתִי
  chosen: to see
  alternatives:
  - and see
  - and look on
  - to witness
  lexicon: HALOT
  rationale: 'Literally ''and I see/have seen,'' but after ''how could I bear'' English idiom prefers an infinitival complement: ''to see.'' This preserves the sense of being forced to witness calamity.'
- source_word: בָּרָעָה
  chosen: the disaster
  alternatives:
  - the evil
  - the calamity
  - the harm
  lexicon: HALOT
  rationale: רָעָה here denotes calamity or harm coming on a people, not moral evil. 'Disaster' is clear modern English and fits the context of threatened annihilation.
- source_word: אֲשֶׁר יִמְצָא
  chosen: that will come upon
  alternatives:
  - that will find
  - that will befall
  lexicon: HALOT
  rationale: The idiom 'find' someone in Hebrew often means 'befall' or 'come upon.' 'Will come upon' is natural English while preserving the future threat.
- source_word: עַמִּי
  chosen: my people
  alternatives:
  - my nation
  lexicon: HALOT
  rationale: Standard rendering for עַם with first-person suffix; it reflects Esther's identification with the Jewish people.
- source_word: בְּאָבְדַן
  chosen: the destruction
  alternatives:
  - the annihilation
  - the ruin
  - the perishing
  lexicon: HALOT
  rationale: Noun from אבד, denoting destruction/perishing. 'Destruction' is broad and accurate; 'annihilation' is possible in context but slightly more interpretive.
- source_word: מוֹלַדְתִּי
  chosen: my kindred
  alternatives:
  - my relatives
  - my family line
  - my birthplace
  lexicon: HALOT
  rationale: In context this refers to Esther's own kin/people of her birth, not merely geographic birthplace. 'My kindred' captures familial and ethnic connection without narrowing it to immediate relatives.
