id: EST.8.10
reference: Esther 8:10
source:
  edition: WLC
  text: וַ/יִּכְתֹּ֗ב בְּ/שֵׁם֙ הַ/מֶּ֣לֶךְ אֲחַשְׁוֵרֹ֔שׁ וַ/יַּחְתֹּ֖ם בְּ/טַבַּ֣עַת הַ/מֶּ֑לֶךְ וַ/יִּשְׁלַ֣ח סְפָרִ֡ים בְּ/יַד֩ הָ/רָצִ֨ים בַּ/סּוּסִ֜ים רֹכְבֵ֤י הָ/רֶ֨כֶשׁ֙ הָֽ/אֲחַשְׁתְּרָנִ֔ים בְּנֵ֖י הָֽ/רַמָּכִֽים׃
translation:
  text: He wrote in the name of King Ahasuerus[a], sealed it with the king’s signet ring, and sent letters by couriers on horses, riding royal steeds, the sons of mares.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew terms for the horses in this verse are rare and difficult. The phrase rendered “the royal steeds bred from swift stock” may also be understood more literally as “the steeds, the achashteranim, sons of the rammakim,” referring to animals from the royal stud or postal service.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְתֹּב
  chosen: He wrote
  alternatives:
  - Then he wrote
  - And he wrote
  lexicon: HALOT
  rationale: Wayyiqtol narrative verb; simple past in English best fits the sequence.
- source_word: בְּשֵׁם הַמֶּלֶךְ אֲחַשְׁוֵרֹשׁ
  chosen: in the name of King Ahasuerus
  alternatives:
  - under the name of King Ahasuerus
  - in King Ahasuerus’s name
  lexicon: HALOT
  rationale: בְּשֵׁם idiomatically means acting under official authority; 'in the name of' is standard and clear.
- source_word: וַיַּחְתֹּם בְּטַבַּעַת הַמֶּלֶךְ
  chosen: sealed it with the king’s signet ring
  alternatives:
  - sealed them with the king’s ring
  - affixed the king’s seal
  lexicon: HALOT
  rationale: The singular verb with the following plural 'letters' likely treats the written decree collectively; English naturally supplies 'it' for the document/decree. 'Signet ring' makes explicit the sealing instrument denoted by טַבַּעַת in royal context.
- source_word: וַיִּשְׁלַח סְפָרִים
  chosen: and sent letters
  alternatives:
  - and dispatched documents
  - and sent written orders
  lexicon: HALOT
  rationale: סְפָרִים here refers to official written communications; 'letters' is idiomatic and sufficiently formal.
- source_word: בְּיַד הָרָצִים
  chosen: by couriers
  alternatives:
  - by the hand of the couriers
  - through the runners
  lexicon: HALOT
  rationale: בְּיַד is an idiom for agency/instrumentality. הָרָצִים are royal messengers; 'couriers' communicates function better than the overly literal 'runners' in this mounted context.
- source_word: בַּסּוּסִים
  chosen: on horses
  alternatives:
  - mounted on horses
  lexicon: HALOT
  rationale: Straightforward locative/instrumental phrase; retained explicitly before the more descriptive participial phrase.
- source_word: רֹכְבֵי
  chosen: riding
  alternatives:
  - mounted on
  lexicon: HALOT
  rationale: Participle describing the couriers; 'riding' keeps the flow of the Hebrew apposition.
- source_word: הָרֶכֶשׁ
  chosen: the royal steeds
  alternatives:
  - the swift steeds
  - the stud horses
  lexicon: HALOT
  rationale: רֶכֶשׁ is a difficult Persian-period term for select riding horses/steeds. 'Royal steeds' fits the court context and the specialized quality of the animals.
- source_word: הָאֲחַשְׁתְּרָנִים
  chosen: the royal
  alternatives:
  - state-bred
  - courier
  - mule
  lexicon: HALOT
  rationale: This rare loanword is uncertain. In context it modifies the horses as animals associated with the royal postal service or royal stud. Rendering its force adjectivally as 'royal' avoids false precision while preserving the courtly sense.
- source_word: בְּנֵי הָרַמָּכִים
  chosen: bred from swift stock
  alternatives:
  - sons of mares
  - offspring of the stud
  - bred from mares
  lexicon: HALOT
  rationale: Literally 'sons of ...' is a Hebrew idiom for belonging to a class or lineage. The final noun is rare and uncertain, likely referring to breeding stock. 'Bred from swift stock' conveys pedigree and speed without overcommitting to a debated zoological detail.
