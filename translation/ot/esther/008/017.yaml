theological_decisions:
- issue: Sense of מִתְיַהֲדִים in relation to conversion or ethnic identification
  chosen_reading: were becoming Jews
  alternative_readings:
  - were declaring themselves Jews
  - were adopting Jewish identity/practice
  rationale: The verse reports a social-religious alignment with the Jews motivated
    by fear. The Hebrew verb does not require a later formal notion of proselyte conversion,
    but it does indicate more than mere sympathy. The chosen rendering keeps the source's
    directness while a footnote preserves the narrower interpretive alternatives.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
