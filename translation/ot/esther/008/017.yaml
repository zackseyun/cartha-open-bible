id: EST.8.17
reference: Esther 8:17
source:
  edition: WLC
  text: וּ/בְ/כָל מְדִינָ֨ה וּ/מְדִינָ֜ה וּ/בְ/כָל עִ֣יר וָ/עִ֗יר מְקוֹם֙ אֲשֶׁ֨ר
    דְּבַר הַ/מֶּ֤לֶךְ וְ/דָת/וֹ֙ מַגִּ֔יעַ שִׂמְחָ֤ה וְ/שָׂשׂוֹן֙ לַ/יְּהוּדִ֔ים
    מִשְׁתֶּ֖ה וְ/י֣וֹם ט֑וֹב וְ/רַבִּ֞ים מֵֽ/עַמֵּ֤י הָ/אָ֨רֶץ֙ מִֽתְיַהֲדִ֔ים כִּֽי
    נָפַ֥ל פַּֽחַד הַ/יְּהוּדִ֖ים עֲלֵי/הֶֽם־־־־־׃
translation:
  text: And in every province and province, and in every city and city, wherever the
    king’s word and his decree reached, there was joy and gladness for the Jews, a
    feast and a good day. And many from the peoples of the land were becoming Jews,
    because the fear of the Jews had fallen on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were declaring themselves Jews' or 'were adopting Jewish identity/practice';
      the Hebrew verb is rare and may denote identifying with the Jews rather than
      formal conversion in a later technical sense.
    reason: alternative_reading
  - marker: b
    text: Literally 'a good day,' that is, a festive or celebratory day.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְדִינָה ... וּמְדִינָה
  chosen: province and province
  alternatives:
  - province after province
  - every province
  lexicon: HALOT
  rationale: The Hebrew repeats the noun distributively for emphasis. I preserved
    the repetition in English rather than collapsing it entirely, to reflect the source
    texture, though smoother alternatives exist.
- source_word: עִיר ... וָעִיר
  chosen: city and city
  alternatives:
  - city after city
  - every city
  lexicon: HALOT
  rationale: As with 'province and province,' the repeated noun is distributive. Retaining
    the repetition keeps the rhetorical force of the Hebrew.
- source_word: מְקוֹם אֲשֶׁר
  chosen: wherever
  alternatives:
  - in every place where
  - where
  lexicon: HALOT
  rationale: This compresses the idiom into natural English while preserving the universal
    scope of the clause.
- source_word: דְּבַר הַמֶּלֶךְ וְדָתוֹ
  chosen: the king’s word and his decree
  alternatives:
  - the king’s command and his edict
  - the king’s message and his law
  lexicon: HALOT
  rationale: דָּבָר here refers to the king's communicated order, while דָּת in Esther
    commonly denotes an official decree/edict. 'Word and decree' preserves the distinction
    without over-paraphrasing.
- source_word: מַגִּיעַ
  chosen: reached
  alternatives:
  - came
  - arrived
  lexicon: HALOT
  rationale: The participle denotes arrival or reaching a destination. 'Reached' fits
    the administrative circulation of the royal decree.
- source_word: שִׂמְחָה וְשָׂשׂוֹן
  chosen: joy and gladness
  alternatives:
  - gladness and rejoicing
  - joy and rejoicing
  lexicon: HALOT
  rationale: A common paired expression for celebration. 'Joy and gladness' is idiomatic
    and preserves the two related but distinct nouns.
- source_word: מִשְׁתֶּה
  chosen: a feast
  alternatives:
  - banquet
  - drinking feast
  lexicon: HALOT
  rationale: The noun denotes a festive banquet, often with drinking. 'Feast' is broad,
    natural English and suits the celebratory context.
- source_word: יוֹם טוֹב
  chosen: a good day
  alternatives:
  - a holiday
  - a festive day
  lexicon: HALOT
  rationale: Literally 'a good day.' I retained the literal sense in the main text
    rather than importing later technical connotations, while acknowledging that it
    denotes festal celebration.
- source_word: רַבִּים מֵעַמֵּי הָאָרֶץ
  chosen: many from the peoples of the land
  alternatives:
  - many of the peoples of the land
  - many from among the peoples of the land
  lexicon: HALOT
  rationale: The phrase refers broadly to the non-Jewish populations within the realm/land.
    'Peoples' preserves the plural and avoids flattening it to a single ethnic group.
- source_word: מִתְיַהֲדִים
  chosen: were becoming Jews
  alternatives:
  - declared themselves Jews
  - were Judaizing
  - became Jewish
  lexicon: HALOT
  rationale: The hitpael of יהד is rare and contextually means identifying oneself
    as Jewish or joining the Jews. 'Were becoming Jews' is the clearest natural rendering,
    while the exact social/religious nuance remains debated and is preserved in a
    footnote.
- source_word: פַּחַד הַיְּהוּדִים
  chosen: the fear of the Jews
  alternatives:
  - dread of the Jews
  - terror of the Jews
  lexicon: HALOT
  rationale: The construct phrase most naturally means fear directed toward the Jews,
    i.e., fear of them. 'Fear' is broad enough to include dread without overstating
    the term.
- source_word: נָפַל ... עֲלֵיהֶם
  chosen: had fallen on them
  alternatives:
  - fell upon them
  - came over them
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for an overwhelming emotion or condition
    coming upon someone. 'Had fallen on them' preserves the metaphor closely.
