id: EST.8.5
reference: Esther 8:5
source:
  edition: WLC
  text: וַ֠/תֹּאמֶר אִם עַל הַ/מֶּ֨לֶךְ ט֜וֹב וְ/אִם מָצָ֧אתִי חֵ֣ן לְ/פָנָ֗י/ו וְ/כָשֵׁ֤ר הַ/דָּבָר֙ לִ/פְנֵ֣י הַ/מֶּ֔לֶךְ וְ/טוֹבָ֥ה אֲנִ֖י בְּ/עֵינָ֑י/ו יִכָּתֵ֞ב לְ/הָשִׁ֣יב אֶת הַ/סְּפָרִ֗ים מַחֲשֶׁ֜בֶת הָמָ֤ן בֶּֽן הַמְּדָ֨תָא֙ הָ/אֲגָגִ֔י אֲשֶׁ֣ר כָּתַ֗ב לְ/אַבֵּד֙ אֶת הַ/יְּהוּדִ֔ים אֲשֶׁ֖ר בְּ/כָל מְדִינ֥וֹת הַ/מֶּֽלֶךְ־־־־־־־׃
translation:
  text: And she said[a], “If it seems good to the king, and if I have found favor before him, and if the matter is proper before the king, and if I am pleasing in his eyes, let it be written to revoke the letters devised by Haman son of Hammedatha the Agagite[b], which he wrote to destroy the Jews who are in all the provinces of the king.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to reverse the letters'; the Hebrew verb can mean 'to turn back' or 'to revoke' in this administrative context.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the letters, the scheme of Haman'; the translation 'letters devised by Haman' makes explicit that the letters embodied Haman's plot.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם עַל־הַמֶּלֶךְ טוֹב
  chosen: If it seems good to the king
  alternatives:
  - If it is good to the king
  - If it pleases the king
  lexicon: HALOT
  rationale: A standard courtly formula. 'Seems good to the king' preserves the deferential idiom while remaining natural English. 'Pleases the king' is possible, but the Hebrew wording is slightly more formal and impersonal.
- source_word: מָצָאתִי חֵן לְפָנָיו
  chosen: I have found favor before him
  alternatives:
  - I have found favor in his sight
  - I have found grace before him
  lexicon: HALOT
  rationale: חֵן commonly denotes favor in royal petition contexts. 'Favor' is idiomatic and clear. 'Before him' follows לְפָנָיו more closely than smoothing to 'in his sight,' while still sounding natural enough in context.
- source_word: וְכָשֵׁר הַדָּבָר לִפְנֵי הַמֶּלֶךְ
  chosen: and if the matter is proper before the king
  alternatives:
  - and if the matter is right before the king
  - and if the proposal is acceptable to the king
  lexicon: HALOT
  rationale: כָשֵׁר carries the sense of being fitting, proper, or suitable. 'Proper' best captures suitability in a formal court setting. 'Proposal' is interpretive; 'matter' stays closer to דָּבָר.
- source_word: וְטוֹבָה אֲנִי בְּעֵינָיו
  chosen: and if I am pleasing in his eyes
  alternatives:
  - and if I am good in his eyes
  - and if I am favorable in his sight
  lexicon: HALOT
  rationale: The phrase expresses personal approval or acceptability. 'Pleasing in his eyes' communicates the idiom clearly without flattening it into mere abstract favor.
- source_word: יִכָּתֵב
  chosen: let it be written
  alternatives:
  - let an order be written
  - may it be written
  lexicon: HALOT
  rationale: The Niphal/jussive-like form is well represented by 'let it be written.' This preserves the passive and the formal petition style. Supplying 'an order' would be interpretive beyond the explicit wording.
- source_word: לְהָשִׁיב
  chosen: to revoke
  alternatives:
  - to reverse
  - to call back
  lexicon: HALOT
  rationale: In context Esther asks for the prior written decree to be undone. 'Revoke' fits legal-administrative English well. 'Reverse' is possible and common, but 'revoke' better matches the object 'letters' as official documents.
- source_word: הַסְּפָרִים
  chosen: the letters
  alternatives:
  - the documents
  - the dispatches
  lexicon: HALOT
  rationale: In Esther this term often refers to royal written communications sent through the empire. 'Letters' is the conventional and sufficiently precise rendering; 'dispatches' is possible but more specialized.
- source_word: מַחֲשֶׁבֶת הָמָן
  chosen: devised by Haman
  alternatives:
  - the scheme of Haman
  - the plan of Haman
  lexicon: HALOT
  rationale: The construct phrase literally refers to Haman's device/scheme. Because it directly modifies 'the letters' in English, 'devised by Haman' yields a natural rendering while preserving the sense that the letters embodied his plot.
- source_word: לְאַבֵּד
  chosen: to destroy
  alternatives:
  - to annihilate
  - to wipe out
  lexicon: HALOT
  rationale: The verb denotes causing perishing/destruction. 'Destroy' is the broad, standard rendering and fits the legal-genocidal context without over-paraphrase. 'Annihilate' is stronger but more interpretive.
- source_word: הַיְּהוּדִים אֲשֶׁר בְּכָל מְדִינוֹת הַמֶּלֶךְ
  chosen: the Jews who are in all the provinces of the king
  alternatives:
  - the Jews who are in all the king's provinces
  - the Jews throughout all the king's provinces
  lexicon: HALOT
  rationale: This preserves the relative clause and the distributive scope. 'Of the king' is slightly more formal and mirrors the Hebrew genitive, though the sense is equivalent to 'the king's provinces.'
