theological_decisions:
- issue: Potential softening of violent judicial language
  chosen_reading: to avenge themselves
  alternative_readings:
  - to defend themselves
  rationale: The Hebrew verb נקם explicitly denotes vengeance/avenging, not merely
    defense. Although the wider narrative includes self-protection, this verse's wording
    should not be softened beyond the source text.
  doctrine_reference: Translation philosophy §1, §3
