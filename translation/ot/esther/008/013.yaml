id: EST.8.13
reference: Esther 8:13
source:
  edition: WLC
  text: פַּתְשֶׁ֣גֶן הַ/כְּתָ֗ב לְ/הִנָּ֤תֵֽן דָּת֙ בְּ/כָל מְדִינָ֣ה וּ/מְדִינָ֔ה
    גָּל֖וּי לְ/כָל הָ/עַמִּ֑ים וְ/לִ/הְי֨וֹת ה/יהודיים עתודים לַ/יּ֣וֹם הַ/זֶּ֔ה
    לְ/הִנָּקֵ֖ם מֵ/אֹיְבֵי/הֶֽם־־׃
translation:
  text: A copy of the written decree was to be issued as law in every province and
    province, being made public to all the peoples, and so that the Jews would be
    ready on that day to avenge themselves on their enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in each and every province.' The Hebrew repeats 'province and province'
      as a distributive expression.
    reason: lexical_alternative
  - marker: b
    text: Or 'published' or 'openly displayed.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for this day.' Hebrew literally reads 'for this day,' referring to the
      appointed date.
    reason: lexical_alternative
  - marker: d
    text: Or 'to take vengeance on their enemies.' Some translations render more interpretively,
      'to defend themselves,' but the Hebrew verb specifically means 'to avenge themselves'
      or 'to take vengeance.'
    reason: alternative_reading
lexical_decisions:
- source_word: פַּתְשֶׁגֶן
  chosen: copy
  alternatives:
  - text
  - copy of the document
  lexicon: HALOT
  rationale: The Persian loanword refers to a copy or transcript of an official document,
    not the original itself. 'Copy' is concise and fits the administrative context.
- source_word: הַכְּתָב
  chosen: the written decree
  alternatives:
  - the document
  - the writing
  lexicon: HALOT
  rationale: Literally 'the writing,' but in this royal-administrative setting it
    refers to the written edict/decree. 'Written decree' makes the function clear
    in natural English.
- source_word: לְהִנָּתֵן דָּת
  chosen: was to be issued as law
  alternatives:
  - was to be given as a decree
  - was to be promulgated as law
  lexicon: HALOT
  rationale: The infinitive plus דָּת expresses the issuing/promulgation of an official
    legal order. 'Issued as law' balances formal accuracy and readable English.
- source_word: בְּכָל מְדִינָה וּמְדִינָה
  chosen: in every province and province
  alternatives:
  - in every single province
  - in each and every province
  lexicon: HALOT
  rationale: The Hebrew distributive idiom is literally 'province and province.' I
    preserved the repetition in the main text for auditability, though it is somewhat
    wooden in English; it signals the empire-wide scope.
- source_word: גָּלוּי
  chosen: being made public
  alternatives:
  - openly displayed
  - published
  lexicon: HALOT
  rationale: The passive participle means 'revealed/open/public.' In context of an
    edict, 'being made public' conveys official publication to the populace.
- source_word: לְכָל הָעַמִּים
  chosen: to all the peoples
  alternatives:
  - to all the nations
  - to all the peoples of the empire
  lexicon: HALOT
  rationale: עַמִּים here refers to the various ethnic peoples under Persian rule.
    'Peoples' preserves the plural-ethnic nuance better than the more political 'nations.'
- source_word: וְלִהְיוֹת
  chosen: and so that ... would be
  alternatives:
  - and for ... to be
  - and that ... might be
  lexicon: HALOT
  rationale: This infinitive continues the purpose/result sense of the decree. 'And
    so that' makes the syntax intelligible in English.
- source_word: הַיְּהוּדִים
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: HALOT
  rationale: In Esther, the term denotes the Jewish people in the Persian diaspora,
    not merely inhabitants of Judea. 'The Jews' is the standard and contextually accurate
    rendering.
- source_word: עֲתוּדִים
  chosen: ready
  alternatives:
  - prepared
  - equipped
  lexicon: HALOT
  rationale: The adjective means prepared/ready. 'Ready' is natural and sufficient
    here.
- source_word: לַיּוֹם הַזֶּה
  chosen: on that day
  alternatives:
  - for that day
  - for this day
  lexicon: HALOT
  rationale: Although literally 'for this day,' in narrative reference to the appointed
    date announced in the decree, English idiom prefers 'on that day.' This avoids
    implying immediacy at the moment of writing.
- source_word: לְהִנָּקֵם
  chosen: to avenge themselves
  alternatives:
  - to take vengeance
  - to defend themselves
  lexicon: HALOT
  rationale: The Niphal of נקם means to avenge oneself / take vengeance. 'Defend themselves'
    is interpretive and better reflects the broader context of the chapter than this
    specific verb. The main text should preserve the lexical force of vengeance/avenging.
- source_word: מֵאֹיְבֵיהֶם
  chosen: on their enemies
  alternatives:
  - against their enemies
  - from their enemies
  lexicon: HALOT
  rationale: With נקם, English idiom commonly uses 'on' or 'against.' 'On their enemies'
    is concise and natural.
