id: EST.8.1
reference: Esther 8:1
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֗וּא נָתַ֞ן הַ/מֶּ֤לֶךְ אֲחַשְׁוֵרוֹשׁ֙ לְ/אֶסְתֵּ֣ר הַ/מַּלְכָּ֔ה אֶת בֵּ֥ית הָמָ֖ן צֹרֵ֣ר ה/יהודיים וּ/מָרְדֳּכַ֗י בָּ֚א לִ/פְנֵ֣י הַ/מֶּ֔לֶךְ כִּֽי הִגִּ֥ידָה אֶסְתֵּ֖ר מַ֥ה הוּא לָֽ/הּ־־־׃
translation:
  text: On that day King Ahasuerus gave Queen Esther the house of Haman[a], the enemy of the Jews, and Mordecai came before the king, for Esther had told what he was to her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'how he was related to her.' The Hebrew does not specify the relationship in this clause, though earlier context identifies Mordecai as Esther's relative and guardian.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: On that day
  alternatives:
  - That same day
  - On that very day
  lexicon: HALOT
  rationale: Temporal idiom introducing the events of the verse. 'On that day' is natural modern English and preserves the Hebrew deictic force without overemphasis.
- source_word: נָתַן
  chosen: gave
  alternatives:
  - granted
  - handed over
  lexicon: HALOT
  rationale: The basic sense of נתן is 'give.' Here it refers to transfer of Haman's estate to Esther; 'gave' is sufficiently broad and faithful.
- source_word: בֵּית הָמָן
  chosen: the house of Haman
  alternatives:
  - Haman's house
  - the estate of Haman
  lexicon: HALOT
  rationale: Hebrew 'house' can denote household/property as well as the physical house. The phrase is kept formally as 'the house of Haman,' while the context allows readers to understand the broader estate. A more interpretive rendering like 'estate' was not adopted in the main text to avoid over-paraphrase.
- source_word: צֹרֵר הַיְּהוּדִים
  chosen: the enemy of the Jews
  alternatives:
  - the adversary of the Jews
  - the foe of the Jews
  lexicon: HALOT
  rationale: צֹרֵר denotes one who shows hostility or causes distress. 'Enemy' is the clearest idiomatic English equivalent here and matches the narrative portrayal of Haman.
- source_word: וּמָרְדֳּכַי בָּא לִפְנֵי הַמֶּלֶךְ
  chosen: and Mordecai came before the king
  alternatives:
  - and Mordecai entered the king's presence
  - and Mordecai came into the presence of the king
  lexicon: HALOT
  rationale: The idiom 'came before the king' is understandable in English and preserves the court-access sense of the Hebrew without unnecessary expansion.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason Mordecai was admitted before the king. 'Because' is the most transparent causal connector in contemporary English.
- source_word: הִגִּידָה
  chosen: had told
  alternatives:
  - told
  - made known
  - informed
  lexicon: HALOT
  rationale: 'The Hifil of נגד means ''declare, make known, tell.'' English past perfect fits the discourse relation: Esther''s disclosure precedes Mordecai''s appearance before the king.'
- source_word: מַה הוּא לָהּ
  chosen: what he was to her
  alternatives:
  - how he was related to her
  - what relation he was to her
  lexicon: HALOT
  rationale: The Hebrew is somewhat elliptical, referring to Mordecai's relationship to Esther. 'What he was to her' preserves that compactness and ambiguity without importing a more specific kinship term than the text states here.
