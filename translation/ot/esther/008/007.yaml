id: EST.8.7
reference: Esther 8:7
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר הַ/מֶּ֤לֶךְ אֲחַשְׁוֵרֹשׁ֙ לְ/אֶסְתֵּ֣ר הַ/מַּלְכָּ֔ה וּֽ/לְ/מָרְדֳּכַ֖י
    הַ/יְּהוּדִ֑י הִנֵּ֨ה בֵית הָמָ֜ן נָתַ֣תִּי לְ/אֶסְתֵּ֗ר וְ/אֹת/וֹ֙ תָּל֣וּ עַל
    הָ/עֵ֔ץ עַ֛ל אֲשֶׁר שָׁלַ֥ח יָד֖/וֹ ב/יהודיים־־־׃
translation:
  text: Then King Ahasuerus said to Queen Esther and to Mordecai the Jew, “Look, I
    have given Haman’s house to Esther, and they have hanged him on the gallows because
    he stretched out his hand against the Jews.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'on the tree.' Here it refers to the execution structure used for
      Haman; hence 'gallows.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: הַמֶּלֶךְ אֲחַשְׁוֵרֹשׁ
  chosen: King Ahasuerus
  alternatives:
  - the king, Ahasuerus
  lexicon: HALOT
  rationale: English idiom naturally places the title before the proper name. The
    personal name is transliterated per translation philosophy.
- source_word: לְאֶסְתֵּר הַמַּלְכָּה
  chosen: to Queen Esther
  alternatives:
  - to Esther the queen
  lexicon: HALOT
  rationale: Both are accurate; 'Queen Esther' is smoother modern English while preserving
    the royal title.
- source_word: וּלְמָרְדֳּכַי הַיְּהוּדִי
  chosen: and to Mordecai the Jew
  alternatives:
  - and to Mordecai, the Jew
  - and to Mordecai the Judean
  lexicon: HALOT
  rationale: '''The Jew'' is the standard rendering of the ethnic designation in Esther
    and fits the court setting. ''Judean'' is possible but less natural here and may
    narrow the broader ethnic sense.'
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  - Indeed
  lexicon: HALOT
  rationale: '''Look'' preserves the deictic force in readable modern English. ''Behold''
    is too archaic for the stated philosophy.'
- source_word: בֵית הָמָן
  chosen: Haman’s house
  alternatives:
  - the house of Haman
  - Haman’s estate
  lexicon: HALOT
  rationale: The construct phrase literally means 'house of Haman.' In this context
    it refers to his household/property; 'Haman’s house' is both literal and idiomatic.
- source_word: נָתַתִּי
  chosen: I have given
  alternatives:
  - I gave
  lexicon: HALOT
  rationale: The perfect can be rendered as a present-result perfect in English, fitting
    the king's reference to a completed action with current effect.
- source_word: וְאֹתוֹ תָּלוּ
  chosen: and they have hanged him
  alternatives:
  - and they hanged him
  - and he was hanged
  lexicon: HALOT
  rationale: The Hebrew uses a third person plural active with an unspecified subject.
    English commonly uses 'they' for such indefinite agency. Perfect aspect is represented
    with present-result force.
- source_word: עַל הָעֵץ
  chosen: on the gallows
  alternatives:
  - on the tree
  - on the stake
  - on the wooden structure
  lexicon: HALOT
  rationale: Although עֵץ literally means 'tree/wood,' in Esther it refers to the
    execution device prepared for hanging. 'Gallows' best communicates the contextual
    sense in idiomatic English.
- source_word: עַל אֲשֶׁר
  chosen: because
  alternatives:
  - for which
  - on account of which
  lexicon: HALOT
  rationale: This prepositional-relative combination introduces the reason for the
    punishment. 'Because' is the clearest natural rendering.
- source_word: שָׁלַח יָדוֹ
  chosen: he stretched out his hand against
  alternatives:
  - he laid his hand on
  - he raised his hand against
  lexicon: HALOT
  rationale: The idiom denotes hostile action or attempted violence. 'Stretched out
    his hand against' preserves the Hebrew imagery while remaining understandable.
- source_word: בַּיְּהוּדִים
  chosen: against the Jews
  alternatives:
  - against the Judeans
  lexicon: HALOT
  rationale: The preposition marks hostile direction here. 'The Jews' is the conventional
    and contextually fitting rendering in Esther.
