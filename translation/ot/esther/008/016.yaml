id: EST.8.16
reference: Esther 8:16
source:
  edition: WLC
  text: לַ/יְּהוּדִ֕ים הָֽיְתָ֥ה אוֹרָ֖ה וְ/שִׂמְחָ֑ה וְ/שָׂשֹׂ֖ן וִ/יקָֽר׃
translation:
  text: For the Jews there was light and gladness and joy and honor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The Jews had light and gladness and joy and honor.' The Hebrew construction can be rendered either existentially ('there was') or possessively ('had').
    reason: lexical_alternative
lexical_decisions:
- source_word: לַיְּהוּדִים
  chosen: For the Jews
  alternatives:
  - The Jews had
  - To the Jews
  lexicon: HALOT
  rationale: The prefixed ל marks reference or possession here. 'For the Jews' preserves the Hebrew construction naturally in English and sets up the existential clause without over-paraphrasing. 'The Jews had' is possible but more interpretive.
- source_word: הָיְתָה
  chosen: there was
  alternatives:
  - was
  - came to be
  lexicon: HALOT
  rationale: The verb היה with a fronted dative-like phrase is well represented by an existential expression in English. 'There was' communicates the clause idiomatically while preserving the simple verbal sense.
- source_word: אוֹרָה
  chosen: light
  alternatives:
  - illumination
  lexicon: HALOT
  rationale: The noun denotes light, here metaphorically for deliverance and well-being. 'Light' is the plain lexical equivalent and preserves the imagery; 'illumination' is too interpretive and abstract.
- source_word: שִׂמְחָה
  chosen: gladness
  alternatives:
  - rejoicing
  - joy
  lexicon: HALOT
  rationale: Because the verse already includes שָׂשׂוֹן, rendering שִׂמְחָה as 'gladness' helps preserve the distinction between the paired celebration terms without collapsing both into 'joy.'
- source_word: שָׂשׂוֹן
  chosen: joy
  alternatives:
  - rejoicing
  - exultation
  lexicon: HALOT
  rationale: This term often denotes jubilant joy or rejoicing. 'Joy' is natural modern English and pairs well with 'gladness' to reflect the Hebrew's near-synonymous accumulation.
- source_word: יְקָר
  chosen: honor
  alternatives:
  - esteem
  - splendor
  lexicon: HALOT
  rationale: In this context the word points to dignity, esteem, or honor bestowed on the Jews after their reversal of fortune. 'Honor' best fits the social dimension in context; 'splendor' would overemphasize visual magnificence.
