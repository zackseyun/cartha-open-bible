id: EST.8.2
reference: Esther 8:2
source:
  edition: WLC
  text: וַ/יָּ֨סַר הַ/מֶּ֜לֶךְ אֶת טַבַּעְתּ֗/וֹ אֲשֶׁ֤ר הֶֽעֱבִיר֙ מֵֽ/הָמָ֔ן וַֽ/יִּתְּנָ֖/הּ לְ/מָרְדֳּכָ֑י וַ/תָּ֧שֶׂם אֶסְתֵּ֛ר אֶֽת מָרְדֳּכַ֖י עַל בֵּ֥ית הָמָֽן־־־׃פ
translation:
  text: Then the king removed his signet ring[a], which he had taken away from Haman, and gave it to Mordecai. And Esther appointed Mordecai over the house of Haman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Haman's household" or "Haman's estate."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסַר
  chosen: removed
  alternatives:
  - took off
  - took away
  lexicon: HALOT
  rationale: The verb סוּר in the Hiphil here denotes causing something to depart/remove. 'Removed' is natural English and fits the action of taking off a ring from oneself.
- source_word: טַבַּעְתּוֹ
  chosen: his signet ring
  alternatives:
  - his ring
  lexicon: HALOT
  rationale: טַבַּעַת can mean ring generally, but in the Esther court context it is specifically the royal sealing ring used for authorization; 'signet ring' makes the function explicit without overtranslation.
- source_word: אֲשֶׁר הֶעֱבִיר מֵהָמָן
  chosen: which he had taken away from Haman
  alternatives:
  - which he had transferred from Haman
  - which he had removed from Haman
  lexicon: HALOT
  rationale: הֶעֱבִיר from עבר in Hiphil can mean remove, take away, or transfer. Given the narrative context of Haman's fall and the ring's reassignment, 'had taken away from Haman' best captures the prior confiscation.
- source_word: וַיִּתְּנָהּ לְמָרְדֳּכָי
  chosen: and gave it to Mordecai
  alternatives:
  - and placed it in Mordecai's hand
  lexicon: HALOT
  rationale: נתן is the standard verb 'give.' The feminine suffix refers back to the ring. Straightforward rendering is best.
- source_word: וַתָּשֶׂם אֶסְתֵּר אֶת מָרְדֳּכַי עַל
  chosen: And Esther appointed Mordecai over
  alternatives:
  - set Mordecai over
  - placed Mordecai over
  lexicon: HALOT
  rationale: שׂוּם with עַל commonly means to set or appoint someone over a sphere of responsibility. 'Appointed' communicates the administrative sense in idiomatic English.
- source_word: בֵּית הָמָן
  chosen: the house of Haman
  alternatives:
  - Haman's household
  - Haman's estate
  lexicon: HALOT
  rationale: בַּיִת can mean house, household, or estate depending on context. Since Esther 8:1 concerns the transfer of Haman's property and authority, 'house of Haman' preserves the Hebrew expression while allowing the broader household/estate sense to remain implicit.
