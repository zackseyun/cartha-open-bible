id: EST.8.12
reference: Esther 8:12
source:
  edition: WLC
  text: בְּ/י֣וֹם אֶחָ֔ד בְּ/כָל מְדִינ֖וֹת הַ/מֶּ֣לֶךְ אֲחַשְׁוֵר֑וֹשׁ בִּ/שְׁלוֹשָׁ֥ה
    עָשָׂ֛ר לְ/חֹ֥דֶשׁ שְׁנֵים עָשָׂ֖ר הוּא חֹ֥דֶשׁ אֲדָֽר־־־׃
translation:
  text: on one day in all the provinces of King Ahasuerus, on the thirteenth day of
    the twelfth month, that is, the month Adar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּיוֹם אֶחָד
  chosen: on one day
  alternatives:
  - in one day
  - on a single day
  lexicon: HALOT
  rationale: The preposition ב with יוֹם is naturally temporal, 'on [a] day.' 'One
    day' preserves the Hebrew numeral אֶחָד without overinterpreting it. 'On one day'
    is idiomatic and fits the dating formula.
- source_word: בְּכָל מְדִינוֹת
  chosen: in all the provinces
  alternatives:
  - throughout all the provinces
  lexicon: HALOT
  rationale: מְדִינוֹת refers to administrative provinces of the empire. 'In all the
    provinces' is a straightforward locative rendering; 'throughout' is possible but
    slightly more expansive than the Hebrew requires.
- source_word: הַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  chosen: of King Ahasuerus
  alternatives:
  - of the king, Ahasuerus
  lexicon: HALOT
  rationale: The construct chain identifies whose provinces are meant. English idiom
    prefers 'of King Ahasuerus' rather than the more wooden 'of the king Ahasuerus.'
    The personal name is transliterated per project policy.
- source_word: בִּשְׁלוֹשָׁה עָשָׂר
  chosen: on the thirteenth day
  alternatives:
  - on the thirteenth
  lexicon: HALOT
  rationale: The preposition ב marks time, and the cardinal expression functions idiomatically
    as an ordinal date in context. Supplying 'day' in English makes the date formula
    clear and natural.
- source_word: לְחֹדֶשׁ שְׁנֵים עָשָׂר
  chosen: of the twelfth month
  alternatives:
  - in the twelfth month
  lexicon: HALOT
  rationale: 'The phrase continues the date specification: literally ''of month twelve.''
    English date style is best represented as ''of the twelfth month.'''
- source_word: הוּא חֹדֶשׁ אֲדָר
  chosen: that is, the month Adar
  alternatives:
  - which is the month Adar
  - that is, Adar
  lexicon: HALOT
  rationale: הוּא here serves an appositional/explanatory function, clarifying the
    name of the twelfth month. 'That is' captures the explanatory force in readable
    English. 'The month Adar' preserves the formal dating style.
