id: EST.8.8
reference: Esther 8:8
source:
  edition: WLC
  text: וְ֠/אַתֶּם כִּתְב֨וּ עַל הַ/יְּהוּדִ֜ים כַּ/טּ֤וֹב בְּ/עֵֽינֵי/כֶם֙ בְּ/שֵׁ֣ם הַ/מֶּ֔לֶךְ וְ/חִתְמ֖וּ בְּ/טַבַּ֣עַת הַ/מֶּ֑לֶךְ כִּֽי כְתָ֞ב אֲשֶׁר נִכְתָּ֣ב בְּ/שֵׁם הַ/מֶּ֗לֶךְ וְ/נַחְתּ֛וֹם בְּ/טַבַּ֥עַת הַ/מֶּ֖לֶךְ אֵ֥ין לְ/הָשִֽׁיב־־־־׃
translation:
  text: But you may write concerning the Jews as seems good in your eyes[a], in the king’s name, and seal it with the king’s signet ring[b], for a document that is written in the king’s name and sealed with the king’s signet ring cannot be revoked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as you see fit.' The Hebrew idiom is literally 'as is good in your eyes.'
    reason: lexical_alternative
  - marker: b
    text: Or 'cannot be reversed.' The Hebrew expression means that such a royal document cannot be recalled or rescinded.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתֶּם
  chosen: But you
  alternatives:
  - And you
  - Now you
  lexicon: HALOT
  rationale: The conjunction plus pronoun marks contrast with the preceding statement that the earlier edict cannot be reversed; 'But you' brings out the adversative force naturally in English while retaining the explicit second-person plural subject.
- source_word: כִּתְבוּ
  chosen: may write
  alternatives:
  - write
  - must write
  lexicon: HALOT
  rationale: Imperative plural addressed to Mordecai and Esther's agents. 'May write' conveys royal authorization in context without overstating as obligation; simple 'write' is possible but less idiomatic after 'But you' in English.
- source_word: עַל הַיְּהוּדִים
  chosen: concerning the Jews
  alternatives:
  - for the Jews
  - about the Jews
  lexicon: HALOT
  rationale: עַל here introduces the matter or concern of the writing. 'Concerning the Jews' is broad enough to cover an edict on their behalf without importing a narrower sense than the preposition itself requires.
- source_word: כַּטּוֹב בְּעֵינֵיכֶם
  chosen: as seems good in your eyes
  alternatives:
  - as is good in your eyes
  - as you see fit
  lexicon: HALOT
  rationale: This idiom means according to one's judgment or pleasure. The chosen rendering preserves the Hebrew imagery ('in your eyes') while remaining readable. 'As you see fit' is smoother but less formally transparent.
- source_word: בְּשֵׁם הַמֶּלֶךְ
  chosen: in the king’s name
  alternatives:
  - under the king’s name
  - by the king’s authority
  lexicon: HALOT
  rationale: Standard idiomatic rendering for acting under royal authority. 'By the king's authority' interprets the implication correctly but moves away from the lexical form 'name.'
- source_word: וְחִתְמוּ
  chosen: and seal it
  alternatives:
  - and affix a seal to it
  - and seal
  lexicon: HALOT
  rationale: The verb means to seal. English normally supplies the object from context, namely the written document; adding 'it' improves readability without altering meaning.
- source_word: בְּטַבַּעַת הַמֶּלֶךְ
  chosen: with the king’s signet ring
  alternatives:
  - with the king’s ring
  - with the king’s seal-ring
  lexicon: HALOT
  rationale: טַבַּעַת in this administrative context refers specifically to the signet ring used for sealing official decrees. 'Signet ring' makes the function explicit for modern readers.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding command. 'For' is concise and fits formal explanatory style.
- source_word: כְתָב
  chosen: a document
  alternatives:
  - a writing
  - an edict
  - a decree
  lexicon: HALOT
  rationale: The noun broadly denotes a written document. 'Document' preserves the generality of the Hebrew; 'edict' or 'decree' may fit contextually but are somewhat more specific than the term itself.
- source_word: אֲשֶׁר נִכְתָּב
  chosen: that is written
  alternatives:
  - which has been written
  - that was written
  lexicon: HALOT
  rationale: Passive participial/relative construction. Present English 'is written' expresses the general legal principle in a timeless way.
- source_word: וְנַחְתּוֹם
  chosen: and sealed
  alternatives:
  - and has been sealed
  lexicon: HALOT
  rationale: Passive participle coordinated with 'written.' The simple past participial sense works naturally in English within the legal maxim.
- source_word: אֵין לְהָשִׁיב
  chosen: cannot be revoked
  alternatives:
  - cannot be reversed
  - there is no revoking
  lexicon: HALOT
  rationale: The idiom literally means 'there is no causing to return,' i.e., no undoing or rescinding. 'Cannot be revoked' fits the legal-administrative context of royal decrees more precisely than the more general 'reversed.'
