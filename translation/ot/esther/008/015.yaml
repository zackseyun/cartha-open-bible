id: EST.8.15
reference: Esther 8:15
source:
  edition: WLC
  text: וּ/מָרְדֳּכַ֞י יָצָ֣א מִ/לִּ/פְנֵ֣י הַ/מֶּ֗לֶךְ בִּ/לְב֤וּשׁ מַלְכוּת֙ תְּכֵ֣לֶת וָ/ח֔וּר וַ/עֲטֶ֤רֶת זָהָב֙ גְּדוֹלָ֔ה וְ/תַכְרִ֥יךְ בּ֖וּץ וְ/אַרְגָּמָ֑ן וְ/הָ/עִ֣יר שׁוּשָׁ֔ן צָהֲלָ֖ה וְ/שָׂמֵֽחָה׀׃
translation:
  text: And Mordecai went out from the presence of the king in royal clothing of blue and white[a], with a large crown of gold and a robe of fine linen and purple[e][d][c][b]; and the city of Susa shouted and rejoiced.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came out from before the king.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term for 'blue' may refer to a blue-purple royal dye.
    reason: lexical_alternative
  - marker: c
    text: Or 'a great golden crown.'
    reason: lexical_alternative
  - marker: d
    text: The term rendered 'robe' can also refer to a mantle or wrapping garment.
    reason: lexical_alternative
  - marker: e
    text: Or 'cried out and was glad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָצָא
  chosen: went out
  alternatives:
  - came out
  - departed
  lexicon: HALOT
  rationale: The verb straightforwardly denotes going out. 'Went out' is natural English and preserves the movement from the king's presence without adding nuance.
- source_word: מִלִּפְנֵי הַמֶּלֶךְ
  chosen: from the presence of the king
  alternatives:
  - from before the king
  - from the king's presence
  lexicon: HALOT
  rationale: The idiom literally means 'from before the king.' 'From the presence of the king' preserves the courtly sense and remains readable.
- source_word: לְבוּשׁ מַלְכוּת
  chosen: royal clothing
  alternatives:
  - royal apparel
  - a royal garment
  lexicon: HALOT
  rationale: This construct denotes attire associated with royalty. 'Royal clothing' is clear modern English and fits the following color and material descriptions.
- source_word: תְּכֵלֶת
  chosen: blue
  alternatives:
  - violet
  - blue-purple
  lexicon: HALOT
  rationale: The term refers to a prestigious blue or blue-purple dye. 'Blue' is the standard concise rendering in English Bible tradition and is sufficient here.
- source_word: חוּר
  chosen: white
  alternatives:
  - linen-white
  - bright white
  lexicon: HALOT
  rationale: The word denotes whiteness or white fabric. 'White' best matches the paired color description with blue.
- source_word: עֲטֶרֶת זָהָב גְּדוֹלָה
  chosen: a large crown of gold
  alternatives:
  - a great golden crown
  - a large gold headdress
  lexicon: HALOT
  rationale: עֲטֶרֶת is a crown or wreath-like headpiece. 'A large crown of gold' is idiomatic and preserves both material and grandeur. 'Great golden crown' is possible but slightly more interpretive in tone.
- source_word: תַכְרִיךְ
  chosen: a robe
  alternatives:
  - a mantle
  - a wrap
  lexicon: HALOT
  rationale: The noun denotes a wrapping garment or cloak-like outer garment. 'Robe' communicates a formal, dignified article of clothing in context.
- source_word: בּוּץ
  chosen: fine linen
  alternatives:
  - linen
  - byssus
  lexicon: HALOT
  rationale: The term refers to fine linen, often luxurious. 'Fine linen' preserves the quality distinction better than simply 'linen.'
- source_word: אַרְגָּמָן
  chosen: purple
  alternatives:
  - purple cloth
  - red-purple
  lexicon: HALOT
  rationale: The word denotes purple dye or purple fabric associated with status. 'Purple' is the standard and sufficient rendering.
- source_word: הָעִיר שׁוּשָׁן
  chosen: the city of Susa
  alternatives:
  - Susa the city
  - the city, Susa
  lexicon: HALOT
  rationale: The phrase identifies the city by name. 'The city of Susa' is the most natural English expression.
- source_word: צָהֲלָה
  chosen: shouted
  alternatives:
  - cried out
  - rang out with joy
  - exulted
  lexicon: HALOT
  rationale: The verb can denote crying out or ringing with joy. Because it is paired with 'rejoiced,' 'shouted' preserves the audible public response without collapsing the two verbs into one idea.
- source_word: שָׂמֵחָה
  chosen: rejoiced
  alternatives:
  - was glad
  - celebrated
  lexicon: HALOT
  rationale: The verb expresses gladness or joy. 'Rejoiced' is concise and suitably elevated, while complementing 'shouted' as a second distinct action.
