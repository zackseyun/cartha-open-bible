translation:
  text: 'And let the robe and the horse be entrusted to the hand of one of the king’s noble officials, and let them clothe the man whom the king delights to honor, and let them mount him on the horse through the open square of the city, and proclaim before him, ‘Thus shall it be done for the man whom the king delights to honor.’'
