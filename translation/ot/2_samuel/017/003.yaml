id: 2SA.17.3
reference: 2 Samuel 17:3
source:
  edition: WLC
  text: וְ/אָשִׁ֥יבָה כָל הָ/עָ֖ם אֵלֶ֑י/ךָ כְּ/שׁ֣וּב הַ/כֹּ֔ל הָ/אִישׁ֙ אֲשֶׁ֣ר
    אַתָּ֣ה מְבַקֵּ֔שׁ כָּל הָ/עָ֖ם יִהְיֶ֥ה שָׁלֽוֹם־־׃
translation:
  text: and I will bring back all the people to you, as when all return, the man whom
    you seek will be gone; all the people will be at peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew is difficult: literally, ''as the return of all, the man whom you
      seek.'' The sense is that if the one man sought is dealt with, everyone else
      will return.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָשִׁיבָה
  chosen: and I will bring back
  alternatives:
  - and I will restore
  - and I will return
  lexicon: HALOT
  rationale: Hiphil of שוב is causative, so 'bring back' best reflects causing the
    people to return, rather than the intransitive 'return.' 'Restore' is possible
    but less concrete in this military-political context.
- source_word: כָל הָעָם
  chosen: all the people
  alternatives:
  - all the army
  - all the people
  lexicon: HALOT
  rationale: עָם commonly means 'people.' In context it refers to the followers aligned
    with Absalom/David, but 'people' preserves the Hebrew wording without over-specifying
    'army.'
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - unto you
  lexicon: HALOT
  rationale: Simple directional preposition; modern English favors 'to you.'
- source_word: כְּשׁוּב הַכֹּל
  chosen: as the return of all depends on
  alternatives:
  - when all return
  - like the return of all
  - for the whole is as returning
  lexicon: HALOT
  rationale: This clause is syntactically difficult and elliptical. In context Ahithophel
    means that once the sought man is removed, everyone else will come back. The chosen
    rendering makes explicit the implied sense while staying close to the Hebrew idea
    of 'the return of all.'
- source_word: הָאִישׁ אֲשֶׁר אַתָּה מְבַקֵּשׁ
  chosen: the man whom you seek
  alternatives:
  - the man you are seeking
  - the one you seek
  lexicon: HALOT
  rationale: Straightforward relative clause. 'The man' preserves the singular האיש,
    referring to David as the specific target.
- source_word: יִהְיֶה שָׁלוֹם
  chosen: will be at peace
  alternatives:
  - will be peace
  - will be safe
  - will be whole
  lexicon: HALOT
  rationale: שָׁלוֹם here denotes a state of peace/well-being after the conflict is
    resolved. 'Will be at peace' is idiomatic English and preserves the political-social
    sense better than the wooden 'will be peace.'
