id: 2SA.17.8
reference: 2 Samuel 17:8
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר חוּשַׁ֗י אַתָּ֣ה יָ֠דַעְתָּ אֶת אָבִ֨י/ךָ וְ/אֶת אֲנָשָׁ֜י/ו כִּ֧י גִבֹּרִ֣ים הֵ֗מָּה וּ/מָרֵ֥י נֶ֨פֶשׁ֙ הֵ֔מָּה כְּ/דֹ֥ב שַׁכּ֖וּל בַּ/שָּׂדֶ֑ה וְ/אָבִ֨י/ךָ֙ אִ֣ישׁ מִלְחָמָ֔ה וְ/לֹ֥א יָלִ֖ין אֶת הָ/עָֽם־־־׃
translation:
  text: Hushai said[a], “You know your father and his men, that they are mighty men and bitter of soul, like a bear robbed of her cubs in the field. And your father is a man of war[b]; he will not spend the night with the troops.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fierce' or 'embittered'; literally 'bitter of soul.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he will not lodge with the people'; here 'people' likely refers to David's fighting force.
    reason: lexical_alternative
lexical_decisions:
- source_word: גִבֹּרִים
  chosen: mighty men
  alternatives:
  - mighty warriors
  - valiant men
  lexicon: HALOT
  rationale: The term denotes strength/valor, often in martial contexts. 'Mighty men' preserves the lexical force and the masculine plural form, while fitting the immediate military setting.
- source_word: מָרֵי נֶפֶשׁ
  chosen: bitter of soul
  alternatives:
  - fierce
  - embittered
  - enraged
  lexicon: HALOT
  rationale: Literally 'masters/possessors of soul,' an idiom for persons of bitter, fierce, or enraged disposition. 'Bitter of soul' keeps the Hebrew imagery and emotional intensity better than flattening it to merely 'fierce.'
- source_word: כְּדֹב שַׁכּוּל
  chosen: like a bear robbed of her cubs
  alternatives:
  - like a bereaved bear
  - like a bear deprived of offspring
  lexicon: HALOT
  rationale: This is a standard Hebrew simile for dangerous ferocity. 'Robbed of her cubs' is idiomatic modern English and makes explicit the feminine image implied by the comparison.
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - in the open country
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'In the field' is the most direct rendering and preserves the familiar biblical idiom.
- source_word: אִישׁ מִלְחָמָה
  chosen: a man of war
  alternatives:
  - a warrior
  - a fighting man
  lexicon: HALOT
  rationale: The phrase characterizes David as experienced and skilled in warfare. 'A man of war' is a natural English equivalent that preserves the idiomatic force and the masculine singular wording.
- source_word: לֹא יָלִין אֶת־הָעָם
  chosen: he will not spend the night with the troops
  alternatives:
  - he will not lodge with the people
  - he will not remain overnight with the army
  lexicon: HALOT
  rationale: לין means to lodge or spend the night. Here עָם refers to the fighting force accompanying David, not 'people' in a generic sense. 'Troops' best fits the military context and avoids misunderstanding.
- source_word: יָדַעְתָּ
  chosen: You know
  alternatives:
  - You yourself know
  - You are acquainted with
  lexicon: HALOT
  rationale: A simple direct address to Absalom. 'You know' is natural English and adequately conveys the perfect verb in context.
- source_word: אֲנָשָׁיו
  chosen: his men
  alternatives:
  - his soldiers
  - his followers
  lexicon: HALOT
  rationale: The noun is literally 'his men.' In context these are David's fighting companions, but 'his men' preserves the Hebrew wording without over-specifying.
