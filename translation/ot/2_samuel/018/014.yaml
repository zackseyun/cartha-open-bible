id: 2SA.18.14
reference: 2 Samuel 18:14
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יוֹאָ֔ב לֹא כֵ֖ן אֹחִ֣ילָה לְ/פָנֶ֑י/ךָ וַ/יִּקַּח֩ שְׁלֹשָׁ֨ה שְׁבָטִ֜ים בְּ/כַפּ֗/וֹ וַ/יִּתְקָעֵ/ם֙ בְּ/לֵ֣ב אַבְשָׁל֔וֹם עוֹדֶ֥/נּוּ חַ֖י בְּ/לֵ֥ב הָ/אֵלָֽה־׃
translation:
  text: Joab said[a], “Not so[b]; I will not wait before you.” Then he took three spears in his hand and drove them into the heart of Absalom while he was still alive in the heart of the terebinth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'three rods/staffs'; the Hebrew term can denote a rod, staff, or scepter, but here likely refers to weapons used for thrusting.
    reason: lexical_alternative
  - marker: b
    text: Or 'oak.' The Hebrew אֵלָה often refers to a terebinth; some translations render it more generally as 'oak.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹחִילָה
  chosen: I will not wait
  alternatives:
  - I will not tarry
  - I will not linger
  - I will not delay
  lexicon: HALOT
  rationale: The Hiphil of יחל here most naturally conveys delaying or waiting. In context Joab rejects the young man's hesitation and says he himself will not delay. 'Wait' is concise modern English; 'tarry' is traditional but archaic. The negated idiom with לְפָנֶיךָ is rendered as refusal to delay in the other man's presence.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in your presence
  - with you watching
  lexicon: HALOT
  rationale: Literally 'before your face/presence.' 'Before you' preserves the Hebrew idiom with readable English. The phrase modifies Joab's refusal to delay in front of the messenger.
- source_word: שְׁבָטִים
  chosen: spears
  alternatives:
  - rods
  - staffs
  - darts
  lexicon: HALOT
  rationale: Although שֵׁבֶט often means rod or staff, in this military context and with the action of thrusting them into Absalom's heart, an implement like a spear or javelin is intended. 'Spears' communicates the likely sense in natural English. Because the lexical range includes 'rods/staffs,' that alternative is preserved in a footnote.
- source_word: וַיִּתְקָעֵם
  chosen: drove them into
  alternatives:
  - thrust them into
  - pierced with them
  lexicon: HALOT
  rationale: תקע with a direct object here denotes forceful thrusting or driving in. 'Drove them into' captures the violent action clearly in modern English.
- source_word: בְּלֵב אַבְשָׁלוֹם
  chosen: into the heart of Absalom
  alternatives:
  - into Absalom's heart
  lexicon: HALOT
  rationale: The phrase is anatomically direct. 'Heart' should be retained rather than generalized to 'chest,' since the Hebrew explicitly says heart.
- source_word: עוֹדֶנּוּ חַי
  chosen: while he was still alive
  alternatives:
  - while he was yet alive
  - while he was still living
  lexicon: HALOT
  rationale: This clause emphasizes that Absalom had not yet died when Joab struck him. 'While he was still alive' is clear and natural.
- source_word: בְּלֵב הָאֵלָה
  chosen: in the heart of the terebinth
  alternatives:
  - in the midst of the terebinth
  - in the oak
  lexicon: HALOT
  rationale: אֵלָה commonly denotes a terebinth tree. 'Heart of the terebinth' is a literal Hebrew idiom for the interior/midst of the tree; retaining 'heart' preserves the wordplay with the earlier 'heart of Absalom' and reflects the source text closely. Since many English versions use 'oak,' that alternative is preserved in a footnote as a lexical option rather than adopted in the main text.
