id: 2SA.20.25
reference: 2 Samuel 20:25
source:
  edition: WLC
  text: ו/שיא סֹפֵ֑ר וְ/צָד֥וֹק וְ/אֶבְיָתָ֖ר כֹּהֲנִֽים׃
translation:
  text: and Sheva was secretary, and Zadok and Abiathar were priests.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'scribe.' The Hebrew term can denote a royal scribe or secretary; 'secretary'
      is used here to clarify the administrative office.
    reason: lexical_alternative
lexical_decisions:
- source_word: שיא
  chosen: Sheva
  alternatives:
  - Shavsha
  rationale: Proper name transliterated by standard English convention. The consonantal
    form here supports 'Sheva'; some compare the parallel administrative list in 2
    Samuel 8:17 / 1 Chronicles 18:16 and suggest a related or variant name, but this
    verse's form is best represented directly.
- source_word: סֹפֵר
  chosen: secretary
  alternatives:
  - scribe
  - recorder
  lexicon: HALOT
  rationale: The noun denotes an official scribe/secretarial officer in royal administration.
    'Secretary' communicates the governmental office in clear modern English better
    than the more ambiguous 'scribe,' while remaining within the semantic range. 'Recorder'
    is less suitable because that office is usually represented by a different Hebrew
    term (e.g., מַזְכִּיר).
- source_word: צָדוֹק
  chosen: Zadok
  rationale: Proper name transliterated.
- source_word: אֶבְיָתָר
  chosen: Abiathar
  rationale: Proper name transliterated.
- source_word: כֹּהֲנִים
  chosen: priests
  lexicon: HALOT
  rationale: Standard rendering of the plural noun for cultic priests. In this administrative
    list, it identifies Zadok and Abiathar by their priestly office.
- source_word: וְ
  chosen: and
  rationale: The repeated conjunction links the offices and names in a straightforward
    list; English preserves this with repeated 'and' for formal clarity.
