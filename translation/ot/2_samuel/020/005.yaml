id: 2SA.20.5
reference: 2 Samuel 20:5
source:
  edition: WLC
  text: וַ/יֵּ֥לֶךְ עֲמָשָׂ֖א לְ/הַזְעִ֣יק אֶת יְהוּדָ֑ה ו/ייחר מִן הַ/מּוֹעֵ֖ד אֲשֶׁ֥ר
    יְעָדֽ/וֹ־־׃ס
translation:
  text: So Amasa went to summon Judah, but he delayed beyond the appointed time that
    he had set for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to muster Judah.' The Hebrew verb can denote an urgent calling together,
      and in this context it likely includes military mobilization.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - set out
  - departed
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of הלך, introducing Amasa's action. 'Went'
    is the most natural modern English narrative equivalent.
- source_word: לְהַזְעִיק
  chosen: to summon
  alternatives:
  - to call together
  - to muster
  lexicon: HALOT
  rationale: The Hiphil of זעק here means to call people together urgently. 'Summon'
    preserves the official, urgent sense without over-specifying military nuance,
    though the context involves mobilization.
- source_word: אֶת יְהוּדָה
  chosen: Judah
  alternatives:
  - the men of Judah
  - the tribe of Judah
  lexicon: HALOT
  rationale: The object is the collective Judah. English can naturally render this
    simply as 'Judah'; the context already implies the people of Judah being gathered.
- source_word: וייחר
  chosen: he delayed
  alternatives:
  - he tarried
  - he was late
  lexicon: HALOT
  rationale: From אחר in this context, the sense is being late or delaying beyond
    an expected time. 'He delayed' is idiomatic and fits the following phrase with
    מן.
- source_word: מִן הַמּוֹעֵד
  chosen: beyond the appointed time
  alternatives:
  - past the appointed time
  - later than the set time
  lexicon: HALOT
  rationale: מוֹעֵד denotes an appointed time or fixed meeting time. With מן after
    אחר, the phrase indicates exceeding or going beyond that set time.
- source_word: אֲשֶׁר יְעָדוֹ
  chosen: that he had set for him
  alternatives:
  - that he had appointed him
  - that he had fixed for him
  lexicon: HALOT
  rationale: יעד means to appoint or set a time. The 3ms suffix most naturally refers
    to the one who gave Amasa the deadline, namely David in the prior verse. English
    past perfect clarifies the prior action.
