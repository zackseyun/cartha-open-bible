id: 2SA.20.4
reference: 2 Samuel 20:4
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר הַ/מֶּ֨לֶךְ֙ אֶל עֲמָשָׂ֔א הַזְעֶק לִ֥/י אֶת אִישׁ יְהוּדָ֖ה שְׁלֹ֣שֶׁת יָמִ֑ים וְ/אַתָּ֖ה פֹּ֥ה עֲמֹֽד־־־־׃
translation:
  text: Then the king said to Amasa[a], “Call the men of Judah together for me within three days, and you, remain here.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the men of Judah' uses a masculine collective expression. The phrase likely refers to the fighting men or mobilizable men of Judah, but the wording itself does not explicitly say 'warriors.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English narrative flow while preserving sequence better than a bare 'and.'
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward definite noun referring to David in context; no need to substitute the proper name in translation.
- source_word: הַזְעֶק
  chosen: Call ... together
  alternatives:
  - summon
  - assemble
  - cry out for
  lexicon: HALOT
  rationale: The Hiphil imperative of זעק here means to cause a public summons or muster. 'Call ... together' captures the causative sense in idiomatic English better than the more wooden 'cry out' and is slightly more explicit than 'summon' about gathering.
- source_word: לִי
  chosen: for me
  alternatives:
  - to me
  lexicon: HALOT
  rationale: The dative marks action done on the king's behalf. 'For me' is the most natural English rendering here.
- source_word: אֶת אִישׁ יְהוּדָה
  chosen: the men of Judah
  alternatives:
  - the people of Judah
  - the warriors of Judah
  - the men of Judah
  lexicon: HALOT
  rationale: Although אִישׁ is singular in form, the expression is collective. 'The men of Judah' is the most direct rendering and preserves the masculine collective force; adding 'the' reflects the object marker with the collective phrase. Context suggests a military muster, but 'warriors' would over-specify beyond the wording.
- source_word: שְׁלֹשֶׁת יָמִים
  chosen: within three days
  alternatives:
  - three days
  - for three days
  lexicon: HALOT
  rationale: In command context, the phrase indicates the time limit for completing the summons rather than duration. 'Within three days' best conveys the deadline implied by the narrative.
- source_word: וְאַתָּה
  chosen: and you
  alternatives:
  - but you
  lexicon: HALOT
  rationale: The pronoun is explicit for emphasis. 'And you' preserves the coordination and emphasis without importing stronger contrast unless context demands it.
- source_word: פֹּה
  chosen: here
  alternatives:
  - in this place
  lexicon: HALOT
  rationale: Simple adverb of place; 'here' is idiomatic and sufficient.
- source_word: עֲמֹד
  chosen: remain
  alternatives:
  - stand
  - stay
  lexicon: HALOT
  rationale: While the verb literally means 'stand,' in this context of royal instruction about waiting in place, 'remain' communicates the intended sense more naturally than the overly physical 'stand.' 'Stay' is also possible, but 'remain' better matches the formal tone.
