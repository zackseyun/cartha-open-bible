id: 2SA.20.20
reference: 2 Samuel 20:20
source:
  edition: WLC
  text: וַ/יַּ֥עַן יוֹאָ֖ב וַ/יֹּאמַ֑ר חָלִ֤ילָ/ה חָלִ֨ילָ/ה֙ לִ֔/י אִם אֲבַלַּ֖ע
    וְ/אִם אַשְׁחִֽית־־׃
translation:
  text: Joab answered and said, “Far be it from me, far be it, if I should swallow
    up or destroy!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if I should engulf or bring to ruin.' The Hebrew uses vivid verbs for
      consuming and destroying.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: Standard narrative verb for replying to speech. 'Answered' preserves
    the formal dialogue structure of the Hebrew.
- source_word: יוֹאָב
  chosen: Joab
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Common Hebrew speech introducer. Retaining 'and said' reflects the Hebrew
    narrative sequence without awkwardness.
- source_word: חָלִילָה חָלִילָה לִי
  chosen: Far be it from me, far be it
  alternatives:
  - Far be it from me! Far be it!
  - Never, never for me
  lexicon: HALOT
  rationale: The doubled interjection expresses strong repudiation. 'Far be it from
    me' is a natural English equivalent for this idiom, and repeating it preserves
    the emphatic duplication in Hebrew.
- source_word: אִם
  chosen: if
  alternatives:
  - that
  - surely not that
  lexicon: HALOT
  rationale: 'After חָלִילָה, אִם introduces the rejected possibility: ''far be it
    ... if I should ...''. This keeps the Hebrew construction visible in English.'
- source_word: אֲבַלַּע
  chosen: I should swallow up
  alternatives:
  - I should engulf
  - I should consume
  lexicon: HALOT
  rationale: From בלע, literally 'swallow.' In siege context it can metaphorically
    mean engulf or consume, but 'swallow up' preserves the vivid Hebrew image while
    remaining idiomatic.
- source_word: וְאִם
  chosen: or
  alternatives:
  - and if
  lexicon: HALOT
  rationale: In English, 'or' best conveys the pairing of two rejected actions after
    the first conditional clause, avoiding wooden repetition while preserving the
    sense.
- source_word: אַשְׁחִית
  chosen: destroy
  alternatives:
  - ruin
  - bring to ruin
  lexicon: HALOT
  rationale: From שׁחת in the Hiphil, meaning to destroy or bring to ruin. 'Destroy'
    is the clearest and most direct rendering in this military context.
