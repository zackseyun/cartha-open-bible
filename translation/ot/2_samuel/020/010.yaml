id: 2SA.20.10
reference: 2 Samuel 20:10
source:
  edition: WLC
  text: וַ/עֲמָשָׂ֨א לֹֽא נִשְׁמַ֜ר בַּ/חֶ֣רֶב אֲשֶׁ֣ר בְּ/יַד יוֹאָ֗ב וַ/יַּכֵּ/הוּ֩ בָ֨/הּ אֶל הַ/חֹ֜מֶשׁ וַ/יִּשְׁפֹּ֨ךְ מֵעָ֥י/ו אַ֛רְצָ/ה וְ/לֹא שָׁ֥נָה ל֖/וֹ וַ/יָּמֹ֑ת וְ/יוֹאָב֙ וַ/אֲבִישַׁ֣י אָחִ֔י/ו רָדַ֕ף אַחֲרֵ֖י שֶׁ֥בַע בֶּן בִּכְרִֽי־׀־־־ס־׃
translation:
  text: But Amasa was not on guard against the sword that was in Joab’s hand[a], and he struck him with it in the belly, and his entrails spilled out to the ground; he did not strike him again, and he died. Then Joab and Abishai his brother pursued Sheba son of Bichri.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the fifth rib.' The Hebrew expression has traditionally been rendered this way in older English versions, but the term more likely refers generally to the belly or abdomen in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁמַר
  chosen: was not on guard
  alternatives:
  - did not beware
  - was not watching out
  - did not guard himself
  lexicon: HALOT
  rationale: The Niphal of שׁמר here conveys being watchful or on guard rather than passive protection by another. 'Was not on guard' is idiomatic modern English and preserves Amasa’s lack of alertness to Joab’s concealed weapon.
- source_word: חֶרֶב
  chosen: sword
  alternatives:
  - blade
  lexicon: HALOT
  rationale: Standard rendering for חֶרֶב. 'Sword' is the plain sense and fits the narrative context.
- source_word: בְּיַד יוֹאָב
  chosen: in Joab’s hand
  alternatives:
  - at Joab’s hand
  lexicon: HALOT
  rationale: The phrase is spatial and concrete here, referring to the weapon Joab held. 'In Joab’s hand' is the most natural English equivalent.
- source_word: וַיַּכֵּהוּ בָהּ
  chosen: he struck him with it
  alternatives:
  - he stabbed him with it
  - he hit him with it
  lexicon: HALOT
  rationale: נכה is broad ('strike'). Given the sword and fatal wound, 'struck him with it' preserves the Hebrew verb without over-specifying beyond the context. 'Stabbed' is plausible but slightly more interpretive.
- source_word: אֶל הַחֹמֶשׁ
  chosen: in the belly
  alternatives:
  - in the abdomen
  - in the fifth rib
  lexicon: HALOT
  rationale: חֹמֶשׁ in these Samuel battle narratives refers to the abdomen/belly region. Traditional 'fifth rib' is likely an inherited rendering not demanded by the Hebrew. Following original-language primacy, 'belly' better reflects the plain sense for modern readers.
- source_word: וַיִּשְׁפֹּךְ מֵעָיו אַרְצָה
  chosen: his entrails spilled out to the ground
  alternatives:
  - his inward parts poured out on the ground
  - his guts spilled out on the ground
  lexicon: HALOT
  rationale: The singular verb with plural noun vividly describes the spilling out of internal organs. 'Entrails' is graphic but appropriately grave and less colloquial than 'guts.' 'To the ground' reflects אַרְצָה.
- source_word: וְלֹא שָׁנָה לוֹ
  chosen: he did not strike him again
  alternatives:
  - he did not repeat it to him
  - he needed no second blow
  lexicon: HALOT
  rationale: The idiom literally means he did not repeat to him, with the implied action being the blow. 'He did not strike him again' makes the ellipsis explicit in natural English while staying close to the sense.
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - so he died
  lexicon: HALOT
  rationale: Simple narrative wayyiqtol; 'and he died' preserves the sequence plainly.
- source_word: רָדַף אַחֲרֵי
  chosen: pursued
  alternatives:
  - went after
  - chased
  lexicon: HALOT
  rationale: Standard military pursuit language. 'Pursued' is concise and fits the narrative register.
- source_word: שֶׁבַע בֶּן בִּכְרִי
  chosen: Sheba son of Bichri
  rationale: Personal names are transliterated per project philosophy.
