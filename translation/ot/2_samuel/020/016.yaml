id: 2SA.20.16
reference: 2 Samuel 20:16
source:
  edition: WLC
  text: וַ/תִּקְרָ֛א אִשָּׁ֥ה חֲכָמָ֖ה מִן הָ/עִ֑יר שִׁמְע֤וּ שִׁמְעוּ֙ אִמְרוּ נָ֣א
    אֶל יוֹאָ֔ב קְרַ֣ב עַד הֵ֔נָּה וַ/אֲדַבְּרָ֖ה אֵלֶֽי/ךָ־־־־׃
translation:
  text: Then a wise woman called out from the city, “Listen, listen! Please say to
    Joab, ‘Come near here, so that I may speak with you.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Come here, that I may speak to you.” The Hebrew more literally says,
      “Come near to here, and let me speak to you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקְרָא
  chosen: Then ... called out
  alternatives:
  - cried out
  - called
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative; 'then' captures the sequence naturally
    in English. קרא in this context is a loud public call from the city wall area,
    so 'called out' is more idiomatic than simple 'called' and less interpretive than
    'cried out'.
- source_word: אִשָּׁה חֲכָמָה
  chosen: a wise woman
  alternatives:
  - a woman, wise
  - a skillful woman
  lexicon: HALOT
  rationale: The adjective חכמה here describes the woman as possessing wisdom; 'wise
    woman' is the natural English equivalent and preserves the characterization without
    overexplaining.
- source_word: מִן הָעִיר
  chosen: from the city
  alternatives:
  - out of the city
  lexicon: HALOT
  rationale: מן marks source. 'From the city' is straightforward and idiomatic; the
    context already implies she is speaking from within the besieged city.
- source_word: שִׁמְעוּ שִׁמְעוּ
  chosen: Listen! Listen!
  alternatives:
  - Hear! Hear!
  - Listen, listen
  lexicon: HALOT
  rationale: The doubled imperative is emphatic and urgent. 'Listen! Listen!' preserves
    the repetition and urgency in contemporary English better than the more archaic
    'Hear! Hear!'.
- source_word: אִמְרוּ נָא
  chosen: Please tell
  alternatives:
  - Say, please
  - Please say
  lexicon: HALOT
  rationale: The imperative plus particle נא softens the command into a polite request.
    Because the object of the speech is introduced immediately ('to Joab'), 'Please
    tell' is idiomatic English that preserves both imperative force and politeness.
- source_word: אֶל יוֹאָב
  chosen: Joab
  alternatives:
  - to Joab
  lexicon: HALOT
  rationale: In English, 'tell Joab' naturally incorporates the preposition. The indirect
    object is preserved in sense without woodenly reproducing the Hebrew preposition.
- source_word: קְרַב עַד הֵנָּה
  chosen: Come near to here
  alternatives:
  - Come here
  - Come near here
  - Approach this place
  lexicon: HALOT
  rationale: קרב means 'come near/approach.' עַד הֵנָּה adds spatial specificity,
    literally 'up to here.' 'Come near to here' preserves the movement toward the
    speaker more fully than the flatter 'Come here,' though the latter is a viable
    idiomatic alternative.
- source_word: וַאֲדַבְּרָה אֵלֶיךָ
  chosen: so that I may speak with you
  alternatives:
  - and let me speak with you
  - that I may speak to you
  lexicon: HALOT
  rationale: 'The cohortative expresses the speaker''s intention/purpose. In context,
    after the summons, English naturally renders this as purpose: ''so that I may
    speak with you.'' ''With you'' fits the conversational setting, though ''to you''
    is also possible.'
