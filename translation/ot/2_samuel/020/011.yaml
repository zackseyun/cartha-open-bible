id: 2SA.20.11
reference: 2 Samuel 20:11
source:
  edition: WLC
  text: וְ/אִישׁ֙ עָמַ֣ד עָלָ֔י/ו מִֽ/נַּעֲרֵ֖י יוֹאָ֑ב וַ/יֹּ֗אמֶר מִי֩ אֲשֶׁ֨ר חָפֵ֧ץ
    בְּ/יוֹאָ֛ב וּ/מִ֥י אֲשֶׁר לְ/דָוִ֖ד אַחֲרֵ֥י יוֹאָֽב־׃
translation:
  text: And one of Joab’s young men stood over him and said, “Whoever favors Joab,
    and whoever is for David—follow Joab!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew literally, “after Joab.” The sense in context is a call to rally
      behind him: “follow Joab.”'
    reason: lexical_alternative
  - marker: b
    text: “Young men” may also be rendered “servants” or “attendants,” referring to
      Joab’s subordinate retainers.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  chosen: And one
  alternatives:
  - And a man
  - And someone
  lexicon: HALOT
  rationale: אִישׁ literally means 'man,' but here it introduces an indefinite individual
    from Joab’s men. 'And one' is natural English and preserves the indefinite force
    without over-specifying.
- source_word: עָמַד עָלָיו
  chosen: stood over him
  alternatives:
  - stood by him
  - stood beside him
  lexicon: HALOT
  rationale: The verb עמד with עַל can denote standing over or by someone. Given the
    immediate context of Amasa lying where he had fallen, 'stood over him' best captures
    the physical scene and the sense of taking position at the body.
- source_word: מִנַּעֲרֵי יוֹאָב
  chosen: of Joab’s young men
  alternatives:
  - from Joab’s servants
  - from Joab’s attendants
  lexicon: HALOT
  rationale: נַעַר can mean youth, servant, attendant, or armor-bearer depending on
    context. Here it refers to one of Joab’s subordinate men. 'Young men' is a transparent
    rendering of the Hebrew form and fits the military-retainer context.
- source_word: מִי אֲשֶׁר חָפֵץ בְּיוֹאָב
  chosen: Whoever favors Joab
  alternatives:
  - Whoever delights in Joab
  - Whoever is for Joab
  - Whoever desires Joab's cause
  lexicon: HALOT
  rationale: חָפֵץ means to take pleasure in, desire, or favor. In this rallying cry,
    'favors Joab' idiomatically conveys allegiance or support better than a more wooden
    'delights in Joab.'
- source_word: וּמִי אֲשֶׁר לְדָוִד
  chosen: and whoever is for David
  alternatives:
  - and whoever belongs to David
  - and whoever is on David's side
  lexicon: HALOT
  rationale: The lamed with David expresses allegiance or belonging. 'Is for David'
    is concise and preserves the political/military sense of loyalty.
- source_word: אַחֲרֵי יוֹאָב
  chosen: follow Joab
  alternatives:
  - after Joab
  - let him go after Joab
  lexicon: HALOT
  rationale: אַחֲרֵי literally means 'after,' but in a call to action it idiomatically
    means to go after or follow. English requires an explicit verb for clarity, and
    'follow Joab' best conveys the intended exhortation.
