id: 2SA.20.12
reference: 2 Samuel 20:12
source:
  edition: WLC
  text: וַ/עֲמָשָׂ֛א מִתְגֹּלֵ֥ל בַּ/דָּ֖ם בְּ/ת֣וֹךְ הַֽ/מְסִּלָּ֑ה וַ/יַּ֨רְא הָ/אִ֜ישׁ כִּֽי עָמַ֣ד כָּל הָ/עָ֗ם וַ/יַּסֵּב֩ אֶת עֲמָשָׂ֨א מִן הַֽ/מְסִלָּ֤ה הַ/שָּׂדֶה֙ וַ/יַּשְׁלֵ֤ךְ עָלָי/ו֙ בֶּ֔גֶד כַּ/אֲשֶׁ֣ר רָאָ֔ה כָּל הַ/בָּ֥א עָלָ֖י/ו וְ/עָמָֽד־־־־־׃
translation:
  text: Now Amasa was wallowing in blood in the middle of the highway. When the man saw that all the people were stopping[a], he moved Amasa from the highway into the field and threw a garment over him, because he saw that everyone who came upon him stopped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was rolling about in the blood.' The Hebrew verb is more literally 'rolling oneself,' here likely describing Amasa's agonized movement as he lay wounded.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִתְגֹּלֵל
  chosen: was writhing
  alternatives:
  - was wallowing
  - was rolling about
  lexicon: HALOT
  rationale: The Hitpolel participle of גלל here describes Amasa's movement while mortally wounded and lying in blood. 'Writhing' communicates involuntary rolling/moving in agony more naturally in English than the more literal but potentially misleading 'rolling about' or the morally colored 'wallowing.'
- source_word: בַּדָּם
  chosen: in blood
  alternatives:
  - in the blood
  - in his blood
  lexicon: HALOT
  rationale: The Hebrew has the article ('in the blood'), but English idiom commonly omits it in this construction. 'In blood' preserves the vivid scene without adding 'his,' which is not explicit in the text.
- source_word: בְּתוֹךְ הַמְסִלָּה
  chosen: in the middle of the highway
  alternatives:
  - in the midst of the road
  - in the middle of the roadway
  lexicon: HALOT
  rationale: מְסִלָּה often denotes a raised road or highway. 'Highway' best captures a main public route, and 'in the middle of' reflects בְּתוֹךְ clearly.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - a man
  lexicon: HALOT
  rationale: The article points to a specific man already understood from context, so 'the man' is preferable to the indefinite 'a man.'
- source_word: כִּי עָמַד כָּל הָעָם
  chosen: that all the people were stopping
  alternatives:
  - that all the people stood still
  - that all the people halted
  lexicon: HALOT
  rationale: עמד here refers to people coming to a halt because of the body in the road. The progressive 'were stopping' fits the narrative flow and explains the obstruction more naturally than the stative 'stood.'
- source_word: וַיַּסֵּב
  chosen: he moved
  alternatives:
  - he turned aside
  - he removed
  lexicon: HALOT
  rationale: The Hiphil of סבב here means causing Amasa to be moved aside from the road. 'Moved' is natural English and avoids the ambiguity of 'turned aside' while not overstating with 'dragged,' which the Hebrew does not specify.
- source_word: מִן הַמְסִלָּה הַשָּׂדֶה
  chosen: from the highway into the field
  alternatives:
  - from the road to the field
  lexicon: HALOT
  rationale: The construction indicates relocation away from the roadway and into the adjacent field. English idiom prefers 'into the field' to make the destination explicit.
- source_word: בֶּגֶד
  chosen: a garment
  alternatives:
  - a cloak
  - a covering
  lexicon: HALOT
  rationale: בֶּגֶד is a general term for clothing/garment. 'Garment' is broad and textually restrained; 'cloak' is too specific, and 'covering' loses the clothing sense.
- source_word: כָּל הַבָּא עָלָיו
  chosen: everyone who came upon him
  alternatives:
  - everyone who came to him
  - everyone passing by him
  lexicon: HALOT
  rationale: The phrase refers to those arriving at the scene and encountering Amasa. 'Came upon him' captures the sense of coming upon the body in the road better than the more relational 'came to him.'
- source_word: וְעָמָד
  chosen: stopped
  alternatives:
  - stood still
  - halted
  lexicon: HALOT
  rationale: 'The repeated עמד resumes the earlier observation: passersby stopped when they saw him. ''Stopped'' is the clearest modern English equivalent in this narrative context.'
