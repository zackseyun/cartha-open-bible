id: 2SA.20.3
reference: 2 Samuel 20:3
source:
  edition: WLC
  text: וַ/יָּבֹ֨א דָוִ֣ד אֶל בֵּית/וֹ֮ יְרֽוּשָׁלִַם֒ וַ/יִּקַּ֣ח הַ/מֶּ֡לֶךְ אֵ֣ת
    עֶֽשֶׂר נָשִׁ֣ים פִּלַגְשִׁ֡ים אֲשֶׁ֣ר הִנִּיחַ֩ לִ/שְׁמֹ֨ר הַ/בַּ֜יִת וַֽ/יִּתְּנֵ֤/ם
    בֵּית מִשְׁמֶ֨רֶת֙ וַֽ/יְכַלְכְּלֵ֔/ם וַ/אֲלֵי/הֶ֖ם לֹא בָ֑א וַ/תִּהְיֶ֧ינָה צְרֻר֛וֹת
    עַד י֥וֹם מֻתָ֖/ן אַלְמְנ֥וּת חַיּֽוּת־־׀־־־׃ס
translation:
  text: When David came to his house at Jerusalem, the king took the ten women, the
    concubines whom he had left to keep the house, and put them in guarded custody
    and provided for them, but he did not go in to them. So they were kept confined
    until the day of their death, living as widows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a house of custody' or 'confinement'; the Hebrew is literally 'house
      of custody/guard.'
    reason: lexical_alternative
  - marker: b
    text: '''He did not go in to them'' is a Hebrew euphemism for sexual relations.'
    reason: cultural_note
  - marker: c
    text: Literally 'widowhood of livingness'—that is, they lived like widows though
      David was still alive.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּיתוֹ
  chosen: his house
  alternatives:
  - his palace
  - his household
  lexicon: HALOT
  rationale: בַּיִת can mean house, palace, or household depending on context. Here
    David returns to his royal residence in Jerusalem; 'house' preserves the Hebrew
    wording while remaining natural English. 'Palace' is possible but slightly more
    interpretive.
- source_word: פִּלַגְשִׁים
  chosen: concubines
  alternatives:
  - secondary wives
  lexicon: HALOT
  rationale: The term denotes women of recognized but lesser marital status in the
    ancient Near Eastern royal household. 'Concubines' is the standard concise English
    equivalent and best matches the social-legal nuance.
- source_word: הִנִּיחַ לִשְׁמֹר הַבַּיִת
  chosen: had left to keep the house
  alternatives:
  - had left to guard the house
  - had left in charge of the house
  lexicon: HALOT
  rationale: שׁמר with house can mean guard/keep/watch over. 'Keep the house' is slightly
    more idiomatic in English while still preserving the sense that these women had
    been left behind to care for and watch the residence.
- source_word: בֵּית מִשְׁמֶרֶת
  chosen: guarded custody
  alternatives:
  - a house of custody
  - protective custody
  - confinement
  lexicon: HALOT
  rationale: Literally 'house of custody/guard.' The phrase indicates seclusion under
    watch rather than ordinary residence. 'Guarded custody' conveys both the concrete
    and custodial sense without sounding overly technical.
- source_word: וַיְכַלְכְּלֵם
  chosen: provided for them
  alternatives:
  - sustained them
  - supported them
  - maintained them
  lexicon: HALOT
  rationale: The verb commonly means sustain, support, or provide necessities. 'Provided
    for them' is clear modern English and captures ongoing material support.
- source_word: וַאֲלֵיהֶם לֹא בָא
  chosen: he did not go in to them
  alternatives:
  - he did not have relations with them
  - he did not come to them
  lexicon: HALOT
  rationale: בוא אל in this context is a conventional euphemism for sexual relations.
    'Go in to them' preserves the idiom and its gravity without flattening it into
    paraphrase.
- source_word: צְרֻרוֹת
  chosen: kept confined
  alternatives:
  - shut up
  - secluded
  - confined
  lexicon: HALOT
  rationale: The passive participial form from צרר here conveys being shut away or
    confined. 'Kept confined' makes the passive/resultative sense explicit and fits
    the preceding custody language.
- source_word: עַד יוֹם מֻתָן
  chosen: until the day of their death
  alternatives:
  - until the day they died
  lexicon: HALOT
  rationale: A straightforward rendering of the Hebrew idiom; 'their death' preserves
    the nominal construction.
- source_word: אַלְמְנוּת חַיּוּת
  chosen: living as widows
  alternatives:
  - in living widowhood
  - widowed while alive
  lexicon: HALOT
  rationale: Literally 'widowhood of livingness/aliveness,' an unusual phrase describing
    women whose husband is alive yet inaccessible to them. 'Living as widows' is idiomatic
    English that preserves the paradoxical force.
