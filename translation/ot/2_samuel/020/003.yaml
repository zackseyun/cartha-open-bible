theological_decisions:
- issue: Moral and social status of David's treatment of the concubines
  chosen_reading: Translate descriptively without softening or justifying the action.
  alternative_readings:
  - Use euphemistic language that implies protection only
  - Use condemnatory language not explicit in the text
  rationale: The verse narrates David's action and the women's resulting condition.
    The translation should preserve the text's starkness—custody, provision, no further
    sexual access, and widow-like living—without importing moral evaluation beyond
    what the wording states.
  doctrine_reference: Translation philosophy §§1, 3, 6
