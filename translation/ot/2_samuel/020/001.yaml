theological_decisions:
- issue: Whether בְּלִיַּעַל should be rendered as a proper name ('Belial') or a descriptive
    term
  chosen_reading: 'descriptive term: ''worthless man'''
  alternative_readings:
  - a man of Belial
  rationale: In this context the Hebrew expression functions as a characterization
    of Sheba's moral worthlessness or lawlessness, not as a developed demonic title.
    Rendering it descriptively avoids importing later theological associations not
    demanded by the text.
  doctrine_reference: Translation philosophy §1, Original-language primacy over translation
    tradition
