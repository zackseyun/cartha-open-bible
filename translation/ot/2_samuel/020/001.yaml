id: 2SA.20.1
reference: 2 Samuel 20:1
source:
  edition: WLC
  text: וְ/שָׁ֨ם נִקְרָ֜א אִ֣ישׁ בְּלִיַּ֗עַל וּ/שְׁמ֛/וֹ שֶׁ֥בַע בֶּן בִּכְרִ֖י אִ֣ישׁ
    יְמִינִ֑י וַ/יִּתְקַ֣ע בַּ/שֹּׁפָ֗ר וַ֠/יֹּאמֶר אֵֽין לָ֨/נוּ חֵ֜לֶק בְּ/דָוִ֗ד
    וְ/לֹ֤א נַֽחֲלָה לָ֨/נוּ֙ בְּ/בֶן יִשַׁ֔י אִ֥ישׁ לְ/אֹהָלָ֖י/ו יִשְׂרָאֵֽל־־־־׃
translation:
  text: Now there happened to be there a worthless man, whose name was Sheba son of
    Bichri, a Benjaminite. He blew the trumpet and said, “We have no share in David,
    and no inheritance in the son of Jesse. Every man to his tents, O Israel!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a wicked man,' 'a scoundrel,' or more literally 'a man of Belial.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew shofar, a horn used as a public signal; traditionally understood
      as a ram's horn.
    reason: cultural_note
  - marker: c
    text: Or 'We have no portion in David.'
    reason: lexical_alternative
  - marker: d
    text: The Hebrew says 'Every man to his tents,' a distributive idiom meaning each
      person should depart to his own home or camp.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִקְרָא
  chosen: there happened to be
  alternatives:
  - was there
  - was found there
  lexicon: HALOT
  rationale: 'Although the verb is from קרא (''to call''), in this Niphal/passive-like
    idiom with שָׁם it functions existentially: ''there was/there happened to be there.''
    ''There happened to be'' preserves the narrative introduction naturally in English
    without implying naming.'
- source_word: אִישׁ בְּלִיַּעַל
  chosen: a worthless man
  alternatives:
  - a wicked man
  - a scoundrel
  - a man of Belial
  lexicon: HALOT
  rationale: בְּלִיַּעַל here is a common noun expression for a base or lawless person,
    not necessarily a proper name. 'Worthless man' is a transparent rendering that
    avoids importing later demonological associations of 'Belial' into this historical
    narrative.
- source_word: שֶׁבַע בֶּן בִּכְרִי
  chosen: Sheba son of Bichri
  rationale: Personal names are transliterated by standard conventions per project
    philosophy.
- source_word: אִישׁ יְמִינִי
  chosen: a Benjaminite
  alternatives:
  - a man of Benjamin
  - a Benjamite
  lexicon: HALOT
  rationale: The phrase identifies tribal affiliation. 'Benjaminite' is idiomatic
    modern English and preserves the ethnic/tribal sense.
- source_word: וַיִּתְקַע בַּשּׁוֹפָר
  chosen: He blew the trumpet
  alternatives:
  - he sounded the ram's horn
  - he blew the shofar
  lexicon: HALOT
  rationale: שׁוֹפָר is specifically a horn, often a ram's horn, but 'trumpet' is
    the most natural English rendering in narrative. The action is a public signal
    to rally rebellion. A more specific rendering is worth preserving in a footnote.
- source_word: אֵין לָנוּ חֵלֶק בְּדָוִד
  chosen: We have no share in David
  alternatives:
  - We have no portion in David
  lexicon: HALOT
  rationale: חֵלֶק denotes a share or portion. 'Share' is clear modern English and
    fits the political sense of having no stake in David's rule.
- source_word: וְלֹא נַחֲלָה לָנוּ בְּבֶן יִשַׁי
  chosen: and no inheritance in the son of Jesse
  alternatives:
  - and no portion in the son of Jesse
  lexicon: HALOT
  rationale: נַחֲלָה commonly means inheritance, possession, or allotted holding.
    Retaining 'inheritance' preserves the covenantal-land resonance while fitting
    the metaphorical political claim.
- source_word: בְּבֶן יִשַׁי
  chosen: the son of Jesse
  alternatives:
  - Jesse's son
  rationale: The expression is intentionally somewhat dismissive, referring to David
    by lineage rather than royal title. 'The son of Jesse' preserves that rhetorical
    effect.
- source_word: אִישׁ לְאֹהָלָיו
  chosen: Every man to his tents
  alternatives:
  - Each man to his tents
  - To your tents, O Israel
  lexicon: HALOT
  rationale: Literally singular אִישׁ plus plural 'his tents' is a distributive idiom.
    'Every man to his tents' preserves the masculine singular representative force
    and the slogan-like cadence. It also reflects the source's gendered form per project
    policy.
- source_word: יִשְׂרָאֵל
  chosen: O Israel
  alternatives:
  - Israel
  rationale: Vocative force is present in context as a rallying cry addressed to the
    northern tribes; 'O Israel' makes the address explicit in English.
