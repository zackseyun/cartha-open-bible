id: 2SA.20.9
reference: 2 Samuel 20:9
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יוֹאָב֙ לַ/עֲמָשָׂ֔א הֲ/שָׁל֥וֹם אַתָּ֖ה אָחִ֑/י וַ/תֹּ֜חֶז יַד
    יְמִ֥ין יוֹאָ֛ב בִּ/זְקַ֥ן עֲמָשָׂ֖א לִ/נְשָׁק לֽ/וֹ־־׃
translation:
  text: Joab said to Amasa, “Is it well with you, my brother?” And Joab took hold
    of Amasa’s beard with his right hand to kiss him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Grabbing the beard and kissing were gestures associated with a familiar
      greeting; here the action is deceptive in context.
    reason: cultural_note
lexical_decisions:
- source_word: הֲשָׁלוֹם
  chosen: Is it well with you
  alternatives:
  - Are you in peace
  - Is all well
  lexicon: HALOT
  rationale: The idiom asks after a person's well-being or peace. 'Is it well with
    you' preserves the Hebrew sense more closely than a flatter greeting like 'How
    are you?' while remaining natural English.
- source_word: אָחִי
  chosen: my brother
  alternatives:
  - brother
  lexicon: HALOT
  rationale: The possessive suffix is explicit in Hebrew. In context it functions
    as a familiar or conciliatory address, but 'my brother' preserves both the literal
    kinship term and Joab's feigned warmth.
- source_word: וַתֹּחֶז
  chosen: took hold of
  alternatives:
  - seized
  - grasped
  lexicon: HALOT
  rationale: The verb denotes grasping or taking hold. 'Took hold of' fits the narrative
    action without overstating violence at this point in the verse, since the deceptive
    gesture leads into the next verse's attack.
- source_word: יַד יְמִין יוֹאָב
  chosen: with his right hand Joab
  alternatives:
  - Joab's right hand
  - the right hand of Joab
  lexicon: HALOT
  rationale: The Hebrew literally names 'the right hand of Joab.' Rendering it adverbially
    as 'with his right hand Joab' gives idiomatic English while preserving the detail
    that the right hand performed the action.
- source_word: בִּזְקַן עֲמָשָׂא
  chosen: Amasa’s beard
  alternatives:
  - the beard of Amasa
  lexicon: HALOT
  rationale: Direct possessive English is the most natural rendering. The beard-grasping
    detail is culturally significant as part of a greeting gesture preceding a kiss.
- source_word: לִנְשָׁק לוֹ
  chosen: to kiss him
  alternatives:
  - for kissing him
  lexicon: HALOT
  rationale: 'The infinitive with ל expresses purpose: Joab took hold of the beard
    in order to kiss Amasa. ''To kiss him'' is the clearest idiomatic rendering.'
