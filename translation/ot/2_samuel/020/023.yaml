id: 2SA.20.23
reference: 2 Samuel 20:23
source:
  edition: WLC
  text: וְ/יוֹאָ֕ב אֶ֥ל כָּל הַ/צָּבָ֖א יִשְׂרָאֵ֑ל וּ/בְנָיָה֙ בֶּן יְה֣וֹיָדָ֔ע עַל ה/כרי וְ/עַל הַ/פְּלֵתִֽי־־־־׃
translation:
  text: Now Joab was over all the army of Israel[a], and Benaiah son of Jehoiada was over the Cherethites and the Pelethites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'the Kerethites.' The exact form of the group name is uncertain in English transliteration.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יוֹאָב
  chosen: Now Joab
  alternatives:
  - And Joab
  - Joab
  lexicon: HALOT
  rationale: The prefixed conjunction here introduces a new item in an administrative summary list. 'Now' gives natural English discourse flow while preserving the transitional force; 'Joab' is transliterated as a personal name per translation philosophy.
- source_word: אֶל
  chosen: was over
  alternatives:
  - over
  - to
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to/toward,' in this verbless administrative formula it functions idiomatically with the following phrase to indicate office or authority. English requires an implied copula and role expression; 'was over' best captures the sense of holding command.
- source_word: כָּל הַ/צָּבָא יִשְׂרָאֵל
  chosen: all the army of Israel
  alternatives:
  - all the host of Israel
  - the whole army of Israel
  lexicon: HALOT
  rationale: צָבָא in this context denotes the organized military force. 'Army' is the clearest modern equivalent; 'all' preserves כָּל and signals Joab's authority over the entire force.
- source_word: וּ/בְנָיָה בֶּן יְהוֹיָדָע
  chosen: and Benaiah son of Jehoiada
  alternatives:
  - and Benaiah the son of Jehoiada
  lexicon: HALOT
  rationale: Both are personal names and are transliterated. 'Son of' is retained in straightforward genealogical style without unnecessary expansion.
- source_word: עַל
  chosen: was over
  alternatives:
  - over
  - in charge of
  lexicon: HALOT
  rationale: As with the first עַל-phrase, the preposition marks authority/supervision in an office list. 'Was over' keeps the parallel structure and reads naturally in English.
- source_word: ה/כרי
  chosen: the Cherethites
  alternatives:
  - the Kerethites
  lexicon: HALOT
  rationale: The ethnicon/group name is best transliterated rather than interpreted, since its precise derivation is debated. 'Cherethites' follows common English convention.
- source_word: וְ/עַל הַ/פְּלֵתִי
  chosen: and the Pelethites
  alternatives:
  - and over the Pelethites
  lexicon: HALOT
  rationale: The second prepositional phrase is coordinated with the first and shares the same implied predicate. In English, repeating 'was over' once before the pair avoids awkwardness while preserving meaning. 'Pelethites' is transliterated as a group name.
