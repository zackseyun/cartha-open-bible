id: 2SA.20.24
reference: 2 Samuel 20:24
source:
  edition: WLC
  text: וַ/אֲדֹרָ֖ם עַל הַ/מַּ֑ס וִ/יהוֹשָׁפָ֥ט בֶּן אֲחִיל֖וּד הַ/מַּזְכִּֽיר־־׃
translation:
  text: Adoram was over the forced labor[a], and Jehoshaphat the son of Ahilud was the recorder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the labor levy' or 'the corvée'; the Hebrew term refers to compulsory state labor rather than ordinary taxation.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹרָם
  chosen: Adoram
  rationale: 'Personal name transliterated according to the translation philosophy: names are transliterated rather than translated.'
- source_word: עַל
  chosen: was over
  alternatives:
  - was in charge of
  - was over
  lexicon: HALOT
  rationale: In administrative contexts עַל indicates oversight or authority over a department or function. English 'was over' is concise and natural, while supplying the implied copula from the nominal clause.
- source_word: הַמַּס
  chosen: the forced labor
  alternatives:
  - the labor levy
  - the corvée
  - the tribute
  lexicon: HALOT
  rationale: מַס in royal administrative contexts refers to compulsory labor service or levy, not merely taxation in money. 'Forced labor' communicates the plain sense clearly for modern readers; 'labor levy' and 'corvée' are possible but less accessible.
- source_word: יְהוֹשָׁפָט
  chosen: Jehoshaphat
  rationale: Personal name transliterated by standard English convention.
- source_word: בֶּן אֲחִילוּד
  chosen: the son of Ahilud
  alternatives:
  - son of Ahilud
  rationale: Standard Hebrew patronymic construction. Including 'the' fits smooth English prose in this list of officials.
- source_word: הַמַּזְכִּיר
  chosen: the recorder
  alternatives:
  - the chronicler
  - the secretary
  - the remembrancer
  lexicon: HALOT
  rationale: This title denotes a royal official who kept records and handled state memoranda. 'Recorder' is the conventional and suitably precise rendering in this court-administration context; 'secretary' may overlap with another office and 'chronicler' can suggest a historian rather than an active court official.
