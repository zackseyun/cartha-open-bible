id: 2SA.20.17
reference: 2 Samuel 20:17
source:
  edition: WLC
  text: וַ/יִּקְרַ֣ב אֵלֶ֔י/הָ וַ/תֹּ֧אמֶר הָ/אִשָּׁ֛ה הַ/אַתָּ֥ה יוֹאָ֖ב וַ/יֹּ֣אמֶר
    אָ֑נִי וַ/תֹּ֣אמֶר ל֗/וֹ שְׁמַע֙ דִּבְרֵ֣י אֲמָתֶ֔/ךָ וַ/יֹּ֖אמֶר שֹׁמֵ֥עַ אָנֹֽכִי׃
translation:
  text: He came near to her, and the woman said, “Are you Joab?” He said, “I am.”
    Then she said to him, “Listen to the words of your servant.” He said, “I am listening.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “your maidservant.” The Hebrew term is a feminine self-designation of
      humility and service.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרַב
  chosen: He came near
  alternatives:
  - He approached
  - He drew near
  lexicon: HALOT
  rationale: The verb קרב in the qal wayyiqtol denotes physical approach. 'Came near'
    is a natural, fairly formal rendering that preserves the movement toward her without
    overinterpreting intent.
- source_word: אֵלֶיהָ
  chosen: to her
  alternatives:
  - near her
  lexicon: HALOT
  rationale: The preposition with pronominal suffix marks direction toward the woman.
    In English, 'came near to her' is idiomatic and preserves the relational target.
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the wife
  lexicon: HALOT
  rationale: In this narrative context אִשָּׁה refers to an adult female speaker,
    not specifically a wife. 'The woman' is the plain contextual sense.
- source_word: הַאַתָּה יוֹאָב
  chosen: Are you Joab?
  alternatives:
  - Is it you, Joab?
  lexicon: HALOT
  rationale: The interrogative plus independent pronoun asks for identification. 'Are
    you Joab?' is direct, natural English and preserves the recognition question.
- source_word: אָ֑נִי
  chosen: I am
  alternatives:
  - Yes, I am
  - It is I
  lexicon: HALOT
  rationale: The standalone pronoun functions as a concise self-identification. 'I
    am' is simple and idiomatic without adding emphasis not explicit in the Hebrew.
- source_word: שְׁמַע
  chosen: Listen
  alternatives:
  - Hear
  lexicon: HALOT
  rationale: The imperative of שמע can mean 'hear' or 'listen.' 'Listen' better conveys
    the requested attentive response in contemporary English.
- source_word: דִּבְרֵי
  chosen: the words of
  alternatives:
  - the message of
  - what ... says
  lexicon: HALOT
  rationale: The construct plural of דבר is straightforwardly 'words of.' A more dynamic
    rendering like 'message' is possible, but 'words' better preserves the source
    form and tone.
- source_word: אֲמָתֶךָ
  chosen: your female servant
  alternatives:
  - your maidservant
  - your servant
  lexicon: HALOT
  rationale: אָמָה denotes a female servant/slave woman used as a deferential self-reference.
    'Your female servant' preserves both the gender and the humble social register
    better than the archaic 'maidservant' or the gender-neutral 'servant.'
- source_word: שֹׁמֵעַ אָנֹכִי
  chosen: I am listening
  alternatives:
  - I am hearing
  - I am listening attentively
  lexicon: HALOT
  rationale: The participle plus pronoun expresses ongoing attentiveness. 'I am listening'
    is idiomatic English that captures the progressive sense without unnecessary expansion.
