id: 2SA.20.2
reference: 2 Samuel 20:2
source:
  edition: WLC
  text: וַ/יַּ֜עַל כָּל אִ֤ישׁ יִשְׂרָאֵל֙ מֵ/אַחֲרֵ֣י דָוִ֔ד אַחֲרֵ֖י שֶׁ֣בַע בֶּן
    בִּכְרִ֑י וְ/אִ֤ישׁ יְהוּדָה֙ דָּבְק֣וּ בְ/מַלְכָּ֔/ם מִן הַ/יַּרְדֵּ֖ן וְ/עַד
    יְרוּשָׁלִָֽם־־־־׃
translation:
  text: So every man of Israel went up from following David to follow Sheba son of
    Bichri, but the men of Judah held fast to their king, from the Jordan to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the men of Israel.' The Hebrew is literally 'every man of Israel,'
      a collective masculine expression.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'went up ... after Sheba.' The wording reflects a transfer of allegiance
      from David to Sheba.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - withdrew
  - went away
  lexicon: HALOT
  rationale: The verb עלה literally means 'go up.' In narrative contexts it can function
    idiomatically for movement or departure. Here, because the text contrasts leaving
    David to follow Sheba, 'went up' preserves the Hebrew wording while still making
    sense in English; alternatives such as 'withdrew' interpret the motion more strongly
    than the source requires.
- source_word: כָּל אִישׁ יִשְׂרָאֵל
  chosen: every man of Israel
  alternatives:
  - all the men of Israel
  - every Israelite
  lexicon: HALOT
  rationale: Literally 'every man of Israel.' Per the gender-accurate policy, the
    masculine singular collective is preserved rather than neutralized to 'everyone.'
    'Every man of Israel' also reflects the distributive force of כָּל + אִישׁ.
- source_word: מֵאַחֲרֵי דָוִד
  chosen: from following David
  alternatives:
  - from after David
  - away from David
  lexicon: HALOT
  rationale: The preposition plus אַחֲרֵי expresses being behind/following someone.
    'From following David' captures the idea of ceasing allegiance to him without
    overparaphrasing.
- source_word: אַחֲרֵי שֶׁבַע בֶּן בִּכְרִי
  chosen: to follow Sheba son of Bichri
  alternatives:
  - after Sheba son of Bichri
  lexicon: HALOT
  rationale: The repeated אַחֲרֵי marks transferred allegiance. English idiom is clearer
    with an infinitive phrase, 'to follow,' rather than the more wooden 'after.'
- source_word: וְאִישׁ יְהוּדָה
  chosen: but the men of Judah
  alternatives:
  - and each man of Judah
  - and the men of Judah
  lexicon: HALOT
  rationale: Although singular in form, the phrase is collective. English naturally
    renders it as a plural collective. 'But' brings out the adversative contrast with
    Israel's defection, which is contextually implied by the clause juxtaposition.
- source_word: דָּבְקוּ
  chosen: held fast
  alternatives:
  - clung
  - remained loyal
  lexicon: HALOT
  rationale: דבק commonly denotes clinging closely or sticking firmly, often with
    covenantal or loyalty overtones. 'Held fast' preserves the concrete metaphor and
    the sense of steadfast allegiance better than the more interpretive 'remained
    loyal.'
- source_word: במלכם
  chosen: to their king
  alternatives:
  - with their king
  lexicon: HALOT
  rationale: With דבק, the preposition ב can be rendered idiomatically in English
    as 'to' ('held fast to'). The suffix is plural, referring to the men of Judah's
    king, David.
- source_word: מִן הַיַּרְדֵּן וְעַד יְרוּשָׁלָם
  chosen: from the Jordan all the way to Jerusalem
  alternatives:
  - from the Jordan to Jerusalem
  lexicon: HALOT
  rationale: The phrase marks the geographical extent of Judah's adherence accompanying
    David. 'All the way to' gives natural English emphasis to the span without adding
    new information.
