id: 2SA.20.14
reference: 2 Samuel 20:14
source:
  edition: WLC
  text: וַֽ/יַּעֲבֹ֞ר בְּ/כָל שִׁבְטֵ֣י יִשְׂרָאֵ֗ל אָבֵ֛לָ/ה וּ/בֵ֥ית מַעֲכָ֖ה וְ/כָל הַ/בֵּרִ֑ים ו/יקלהו וַ/יָּבֹ֖אוּ אַף אַחֲרָֽי/ו־־ס־׃
translation:
  text: He passed through all the tribes of Israel to Abel and Beth-maacah[b][a], and all the Berites assembled and also followed after him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'all the Berites.' Some translations read 'all the Bichrites,' connecting the phrase to Sheba son of Bichri from the context; the Masoretic Text here more directly supports 'Berites.'
    reason: alternative_reading
  - marker: b
    text: Or 'and they too came after him.' The Hebrew idiom can be rendered more literally this way, though 'followed after him' better conveys the sense in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹר
  chosen: He passed through
  alternatives:
  - He went through
  - He passed on
  lexicon: HALOT
  rationale: The verb עבר in the wayyiqtol form narrates movement through territory. 'Passed through' best captures the sense of traversing the tribes/regions in pursuit or progress.
- source_word: בְּכָל שִׁבְטֵי יִשְׂרָאֵל
  chosen: through all the tribes of Israel
  alternatives:
  - among all the tribes of Israel
  - throughout all the tribes of Israel
  lexicon: HALOT
  rationale: The preposition ב with 'all the tribes of Israel' here is locative/distributive in context, indicating movement through the tribal territories. 'Through all the tribes of Israel' is natural English and preserves the geographic scope.
- source_word: אָבֵלָה
  chosen: to Abel
  alternatives:
  - to Abelah
  - to Abel-beth-maacah
  lexicon: HALOT
  rationale: The directional he marks motion toward Abel. Since the following phrase names Beth-maacah separately, the Hebrew is best represented as 'to Abel and Beth-maacah' rather than conflating the place-name into the fuller compound at this point.
- source_word: וּבֵית מַעֲכָה
  chosen: and Beth-maacah
  alternatives:
  - and Beth Maacah
  - and the house of Maacah
  lexicon: HALOT
  rationale: In this context this is a place-name, not a literal 'house of Maacah.' Standard English transliteration of the toponym is appropriate.
- source_word: וְכָל הַבֵּרִים
  chosen: and all the Berites
  alternatives:
  - and all the Bichrites
  - and all the men of Berim
  lexicon: HALOT
  rationale: The consonantal text points to 'Berites' (a gentilic/plural people-group designation). Because the identification is uncertain and the MT differs from some traditional renderings influenced by context, the transliterated ethnic designation is the most transparent main-text choice.
- source_word: וַיִּקָּהֲלוּ
  chosen: assembled
  alternatives:
  - gathered together
  - were gathered
  lexicon: HALOT
  rationale: From קהל, the Niphal/related passive-reflexive sense in narrative is that they gathered or assembled. 'Assembled' is concise and idiomatic.
- source_word: וַיָּבֹאוּ אַף אַחֲרָיו
  chosen: and also followed after him
  alternatives:
  - and they too came after him
  - and they also went after him
  lexicon: HALOT
  rationale: The sequence of 'came' plus 'after him' in context conveys joining his movement rather than merely arriving behind him. 'Followed after him' expresses the idiomatic sense, while 'also' renders אַף.
