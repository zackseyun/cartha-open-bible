id: 2SA.20.8
reference: 2 Samuel 20:8
source:
  edition: WLC
  text: הֵ֗ם עִם הָ/אֶ֤בֶן הַ/גְּדוֹלָה֙ אֲשֶׁ֣ר בְּ/גִבְע֔וֹן וַ/עֲמָשָׂ֖א בָּ֣א לִ/פְנֵי/הֶ֑ם וְ/יוֹאָ֞ב חָג֣וּר מִדּ֣/וֹ לְבֻשׁ֗/וּ ו/על/ו חֲג֥וֹר חֶ֨רֶב֙ מְצֻמֶּ֤דֶת עַל מָתְנָי/ו֙ בְּ/תַעְרָ֔/הּ וְ/ה֥וּא יָצָ֖א וַ/תִּפֹּֽל־׀־׃ס
translation:
  text: When they were by the great stone that is in Gibeon[a], Amasa came before them. Now Joab was clothed in his garment, and over it was a belt with a sword fastened to his waist in its sheath; and as he went out[c][b], it fell.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Amasa came to meet them.' The Hebrew literally says 'came before them.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'his robe' or 'the garment he wore'; the Hebrew likely refers to Joab's military attire.
    reason: lexical_alternative
  - marker: c
    text: The subject of 'it fell' is most likely the sword, implied by the feminine verb in Hebrew.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵם עִם הָאֶבֶן הַגְּדוֹלָה
  chosen: When they were by the great stone
  alternatives:
  - They were with the great stone
  - They were near the great stone
  lexicon: HALOT
  rationale: עִם with a location can idiomatically indicate being at/near a place. 'By' is natural English and preserves the spatial sense without over-literal awkwardness.
- source_word: אֲשֶׁר בְּגִבְעוֹן
  chosen: that is in Gibeon
  alternatives:
  - which was at Gibeon
  lexicon: HALOT
  rationale: The relative clause identifies the stone's location. Present tense in English is idiomatic for a place marker in narrative.
- source_word: וַעֲמָשָׂא בָּא לִפְנֵיהֶם
  chosen: Amasa came before them
  alternatives:
  - Amasa came to meet them
  - Amasa came in front of them
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in front of.' 'Came before them' preserves the Hebrew wording and leaves the exact nuance open.
- source_word: חָגוּר
  chosen: was dressed
  alternatives:
  - was girded
  - was belted
  lexicon: HALOT
  rationale: The participle describes Joab's outfitted state. 'Was dressed' communicates the state naturally in modern English; the more specific belting imagery is retained in the following phrase about the belt and sword.
- source_word: מִדּוֹ לְבֻשׁוֹ
  chosen: in his military garment
  alternatives:
  - in his robe
  - in the garment he wore
  lexicon: HALOT
  rationale: מַד commonly refers to military attire or a distinctive garment. In this martial context, 'military garment' best fits the scene and avoids the misleadingly civilian 'robe.'
- source_word: וְעָלָיו חֲגוֹר
  chosen: and over it was a belt
  alternatives:
  - and on him was a belt
  - and over it he had a belt girded
  lexicon: HALOT
  rationale: חֲגוֹר denotes a belt/girding piece. 'Over it was a belt' reflects the layering of garment and weapon-belt in readable English.
- source_word: חֶרֶב מְצֻמֶּדֶת
  chosen: with a sword fastened
  alternatives:
  - with a sword strapped
  - with a sword attached
  lexicon: HALOT
  rationale: מְצֻמֶּדֶת conveys something closely attached or fastened. 'Fastened' is clear and suitably literal.
- source_word: עַל מָתְנָיו
  chosen: to his waist
  alternatives:
  - on his loins
  - at his side
  lexicon: HALOT
  rationale: מָתְנַיִם literally refers to the loins/hips. 'Waist' is the most natural modern equivalent in this clothing description.
- source_word: בְּתַעְרָהּ
  chosen: in its sheath
  alternatives:
  - in its scabbard
  lexicon: HALOT
  rationale: The feminine suffix refers to the sword. 'Sheath' is standard modern English; 'scabbard' is accurate but less common.
- source_word: וְהוּא יָצָא
  chosen: as he went out
  alternatives:
  - and he went out
  - as he came forward
  lexicon: HALOT
  rationale: The clause is somewhat abrupt; in context it introduces the circumstance under which the sword fell. 'As he went out' preserves the motion and links naturally to the next clause.
- source_word: וַתִּפֹּל
  chosen: it fell
  alternatives:
  - and it fell
  lexicon: HALOT
  rationale: The feminine verb most naturally refers back to the sword. Making the pronoun explicit in English clarifies the referent without adding new content.
