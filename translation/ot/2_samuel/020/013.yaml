id: 2SA.20.13
reference: 2 Samuel 20:13
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֥ר הֹגָ֖ה מִן הַֽ/מְסִלָּ֑ה עָבַ֤ר כָּל אִישׁ֙ אַחֲרֵ֣י יוֹאָ֔ב לִ/רְדֹּ֕ף
    אַחֲרֵ֖י שֶׁ֥בַע בֶּן בִּכְרִֽי־־־׃
translation:
  text: As soon as he had been removed from the highway, every man passed on after
    Joab to pursue Sheba son of Bichri.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the road' / 'from the roadway.' The Hebrew מְסִלָּה can denote
      a highway or main road.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: As soon as
  alternatives:
  - When
  - After
  lexicon: HALOT
  rationale: Introduces a temporal clause. 'As soon as' captures the immediate sequence
    implied by the narrative context better than the more neutral 'when.'
- source_word: הֹגָה
  chosen: he had been removed
  alternatives:
  - he was taken away
  - he was moved aside
  lexicon: HALOT
  rationale: Passive Hophal form of the verb conveys that Amasa's body was caused
    to be moved. The pronoun 'he' is supplied from context, referring to the corpse
    mentioned in the preceding verse. 'Removed' is natural English and fits the movement
    out of the roadway.
- source_word: מִן הַמְסִלָּה
  chosen: from the highway
  alternatives:
  - from the road
  - from the roadway
  lexicon: HALOT
  rationale: מְסִלָּה often denotes a raised road or highway. 'Highway' preserves
    the more marked sense, though in context it simply refers to the main road where
    the body obstructed the troops.
- source_word: עָבַר
  chosen: passed on
  alternatives:
  - went on
  - passed by
  lexicon: HALOT
  rationale: The verb here indicates movement onward once the obstruction was cleared.
    'Passed on' communicates resumed advance better than 'passed by,' which could
    imply merely going past the body.
- source_word: כָּל אִישׁ
  chosen: every man
  alternatives:
  - everyone
  - all the men
  lexicon: HALOT
  rationale: The Hebrew is singular collective, literally 'every man.' Following the
    gender-accurate policy, 'every man' is retained rather than neutralizing to 'everyone,'
    since it refers to the fighting force following Joab.
- source_word: אַחֲרֵי יוֹאָב
  chosen: after Joab
  alternatives:
  - behind Joab
  - following Joab
  lexicon: HALOT
  rationale: This prepositional phrase indicates following in pursuit. 'After Joab'
    is concise and idiomatic in English narrative.
- source_word: לִרְדֹּף
  chosen: to pursue
  alternatives:
  - to chase
  - to go in pursuit of
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To pursue' is the standard military/narrative
    rendering and matches the seriousness of the action.
- source_word: אַחֲרֵי שֶׁבַע בֶּן בִּכְרִי
  chosen: Sheba son of Bichri
  alternatives:
  - Sheba the son of Bichri
  lexicon: HALOT
  rationale: Standard English rendering of the Hebrew patronymic. 'Son of Bichri'
    is direct and preserves the Hebrew naming structure.
