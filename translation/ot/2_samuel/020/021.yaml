id: 2SA.20.21
reference: 2 Samuel 20:21
source:
  edition: WLC
  text: לֹא כֵ֣ן הַ/דָּבָ֗ר כִּ֡י אִישׁ֩ מֵ/הַ֨ר אֶפְרַ֜יִם שֶׁ֧בַע בֶּן בִּכְרִ֣י
    שְׁמ֗/וֹ נָשָׂ֤א יָד/וֹ֙ בַּ/מֶּ֣לֶךְ בְּ/דָוִ֔ד תְּנֽוּ אֹת֣/וֹ לְ/בַדּ֔/וֹ וְ/אֵלְכָ֖ה
    מֵ/עַ֣ל הָ/עִ֑יר וַ/תֹּ֤אמֶר הָֽ/אִשָּׁה֙ אֶל יוֹאָ֔ב הִנֵּ֥ה רֹאשׁ֛/וֹ מֻשְׁלָ֥ךְ
    אֵלֶ֖י/ךָ בְּעַ֥ד הַ/חוֹמָֽה־־־־׃
translation:
  text: That is not the matter. Rather, a man from the hill country of Ephraim, Sheba
    son of Bichri by name, has raised his hand against the king, against David. Hand
    him over alone, and I will withdraw from the city.” And the woman said to Joab,
    “Look, his head will be thrown to you over the wall.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, “has rebelled against the king, against David.”
      The Hebrew idiom is literally “has raised his hand.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “from the hill country of Ephraim”; traditionally also rendered “from
      Mount Ephraim.”
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא כֵן הַדָּבָר
  chosen: That is not the matter
  alternatives:
  - It is not so
  - That is not the case
  - The matter is not like that
  lexicon: HALOT
  rationale: Idiomatic denial of the woman's prior assumption; 'That is not the matter'
    preserves the sense without woodenly reproducing Hebrew word order.
- source_word: כִּי
  chosen: Rather
  alternatives:
  - but
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the corrective explanation after the denial. 'Rather'
    captures the adversative/explanatory force in natural English.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  lexicon: HALOT
  rationale: Gender-accurate and straightforward; the referent is a specific male
    individual, so 'a man' is appropriate.
- source_word: מֵהַר אֶפְרַיִם
  chosen: from the hill country of Ephraim
  alternatives:
  - from Mount Ephraim
  - from the mountains of Ephraim
  lexicon: HALOT
  rationale: The expression commonly denotes the hill country/region of Ephraim rather
    than a single mountain peak. 'Hill country' is the most natural geographic rendering.
- source_word: שֶׁבַע בֶּן בִּכְרִי שְׁמוֹ
  chosen: Sheba son of Bichri by name
  alternatives:
  - whose name is Sheba son of Bichri
  - named Sheba son of Bichri
  lexicon: HALOT
  rationale: Preserves the naming formula while keeping readable English. 'By name'
    reflects שְׁמוֹ without over-literal awkwardness.
- source_word: נָשָׂא יָדוֹ
  chosen: has raised his hand
  alternatives:
  - has lifted up his hand
  - has rebelled
  lexicon: HALOT
  rationale: The idiom literally means to raise the hand, often in hostile defiance.
    The literal image is retained in the main text, while the rebellious sense is
    conveyed by context.
- source_word: בַּמֶּלֶךְ בְּדָוִד
  chosen: against the king, against David
  alternatives:
  - against King David
  - against the king David
  lexicon: HALOT
  rationale: The repeated preposition is preserved for emphasis. Rendering both elements
    explicitly reflects the Hebrew apposition and rhetorical force.
- source_word: תְּנוּ אֹתוֹ לְבַדּוֹ
  chosen: Hand over him alone
  alternatives:
  - Give him up alone
  - Deliver only him
  lexicon: HALOT
  rationale: Imperative demand for surrender of the guilty party only. 'Hand over'
    is idiomatic for surrendering a person; 'alone' preserves לְבַדּוֹ.
- source_word: וְאֵלְכָה מֵעַל הָעִיר
  chosen: and I will withdraw from the city
  alternatives:
  - and I will go away from the city
  - and I will depart from against the city
  - and I will leave the city
  lexicon: HALOT
  rationale: In siege context, the sense is to move away from besieging the city.
    'Withdraw from the city' communicates that military sense better than a bare 'go
    away.'
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces an emphatic assurance. 'Look' is readable modern English without
    archaic tone.
- source_word: רֹאשׁוֹ מֻשְׁלָךְ אֵלֶיךָ בְּעַד הַחוֹמָה
  chosen: his head will be thrown to you over the wall
  alternatives:
  - his head is about to be thrown to you over the wall
  - his head will be cast to you through/over the wall
  lexicon: HALOT
  rationale: The passive participle with הִנֵּה can express imminent future/result.
    In context the woman promises what will happen next, so an English future is natural.
    'Over the wall' best fits the action in context.
