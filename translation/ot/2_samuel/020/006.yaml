id: 2SA.20.6
reference: 2 Samuel 20:6
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר דָּוִד֙ אֶל אֲבִישַׁ֔י עַתָּ֗ה יֵ֧רַֽע לָ֛/נוּ שֶׁ֥בַע בֶּן בִּכְרִ֖י
    מִן אַבְשָׁל֑וֹם אַ֠תָּה קַ֞ח אֶת עַבְדֵ֤י אֲדֹנֶ֨י/ךָ֙ וּ/רְדֹ֣ף אַחֲרָ֔י/ו פֶּן
    מָ֥צָא ל֛/וֹ עָרִ֥ים בְּצֻר֖וֹת וְ/הִצִּ֥יל עֵינֵֽ/נוּ־־־־־׃
translation:
  text: Then David said to Abishai, “Now Sheba son of Bichri will do us more harm
    than Absalom. You, take your lord’s servants and pursue after him, lest he find
    fortified cities for himself and escape our sight.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'and deliver our eyes,' an idiom meaning 'escape from
      our sight' or 'elude us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵרַע לָנוּ
  chosen: will do us more harm
  alternatives:
  - will be more evil to us
  - will harm us more
  lexicon: HALOT
  rationale: The verb רעע in this context expresses causing injury or trouble, not
    moral evil in the abstract. 'Will do us more harm' is idiomatic modern English
    and preserves the comparative force with מִן אַבְשָׁלוֹם.
- source_word: שֶׁבַע בֶּן בִּכְרִי
  chosen: Sheba son of Bichri
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: מִן אַבְשָׁלוֹם
  chosen: than Absalom
  alternatives:
  - more than Absalom did
  rationale: The comparative preposition מִן is naturally rendered 'than.' English
    supplies the comparison smoothly without over-expanding the clause.
- source_word: אַתָּה קַח
  chosen: You, take
  alternatives:
  - Take
  - You must take
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis. Retaining 'You' reflects David’s
    pointed charge to Abishai.
- source_word: עַבְדֵי אֲדֹנֶיךָ
  chosen: your lord’s servants
  alternatives:
  - your master's servants
  - the servants of your lord
  lexicon: HALOT
  rationale: אֲדֹנֶיךָ is singular with second masculine singular suffix, referring
    to Abishai's lord, i.e., David. 'Your lord’s servants' is a natural rendering
    and preserves the hierarchical language without importing 'slave' where bonded
    status is not the point.
- source_word: וּרְדֹף אַחֲרָיו
  chosen: and pursue him
  alternatives:
  - and chase after him
  lexicon: HALOT
  rationale: רדף commonly means pursue in military contexts. 'Pursue him' is concise
    and fitting here.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - so that he may not
  lexicon: HALOT
  rationale: פֶּן introduces a negative purpose or apprehension clause. 'Lest' is
    compact and accurate, though slightly elevated; it remains readable in this context.
- source_word: מָצָא לוֹ עָרִים בְּצֻרוֹת
  chosen: he find fortified cities for himself
  alternatives:
  - he secure fortified cities
  - he find himself fortified cities
  lexicon: HALOT
  rationale: מצא literally means 'find.' The dative לוֹ likely conveys advantage ('for
    himself'). The phrase suggests obtaining refuge in defensible urban strongholds,
    and the translation keeps that sense without paraphrasing too far.
- source_word: וְהִצִּיל עֵינֵינוּ
  chosen: and escape from our sight
  alternatives:
  - and deliver himself from our eyes
  - and elude us
  lexicon: HALOT
  rationale: The Hebrew is literally 'and snatch/deliver our eyes,' an idiom meaning
    to escape notice or get out of sight. 'Escape from our sight' preserves the imagery
    more closely than the smoother but less literal 'elude us.'
