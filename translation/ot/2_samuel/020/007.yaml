id: 2SA.20.7
reference: 2 Samuel 20:7
source:
  edition: WLC
  text: וַ/יֵּצְא֤וּ אַֽחֲרָי/ו֙ אַנְשֵׁ֣י יוֹאָ֔ב וְ/הַ/כְּרֵתִ֥י וְ/הַ/פְּלֵתִ֖י
    וְ/כָל הַ/גִּבֹּרִ֑ים וַ/יֵּֽצְאוּ֙ מִ/יר֣וּשָׁלִַ֔ם לִ/רְדֹּ֕ף אַחֲרֵ֖י שֶׁ֥בַע
    בֶּן בִּכְרִֽי־־׃
translation:
  text: Joab’s men, the Kerethites, the Pelethites, and all the mighty men went out
    after him. They went out from Jerusalem to pursue Sheba son of Bichri.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditional English versions often render הַכְּרֵתִי as 'the Cherethites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצְאוּ ... אַחֲרָיו
  chosen: went out after him
  alternatives:
  - went out behind him
  - followed him
  lexicon: HALOT
  rationale: The idiom יצא + אחרי literally means 'go out after,' indicating movement
    in pursuit or following. 'Went out after him' preserves the Hebrew sequence and
    leaves the referent of 'him' as in context rather than over-interpreting.
- source_word: אַנְשֵׁי יוֹאָב
  chosen: Joab’s men
  alternatives:
  - the men of Joab
  lexicon: HALOT
  rationale: Construct phrase meaning the men belonging to or under Joab. 'Joab’s
    men' is natural modern English while remaining formally close.
- source_word: הַכְּרֵתִי
  chosen: the Kerethites
  alternatives:
  - the Cherethites
  lexicon: HALOT
  rationale: A group name/customary ethnicon or title for Davidic royal troops. 'Kerethites'
    follows a more direct transliteration from Hebrew כ rather than the traditional
    'Cherethites.' The traditional form is worth preserving in a footnote.
- source_word: הַפְּלֵתִי
  chosen: the Pelethites
  lexicon: HALOT
  rationale: Proper group designation, commonly paired with the Kerethites. Transliteration
    is preferable to speculative translation.
- source_word: כָל הַגִּבֹּרִים
  chosen: all the mighty men
  alternatives:
  - all the warriors
  - all the valiant men
  lexicon: HALOT
  rationale: גִּבּוֹרִים often denotes mighty warriors or valiant fighting men. 'Mighty
    men' preserves the established military nuance and remains readable.
- source_word: מִירוּשָׁלִַם
  chosen: from Jerusalem
  lexicon: HALOT
  rationale: Straightforward prepositional phrase indicating point of departure.
- source_word: לִרְדֹּף אַחֲרֵי
  chosen: to pursue
  alternatives:
  - to chase after
  - to pursue after
  lexicon: HALOT
  rationale: רדף with אחרי means to pursue/chase. English normally does not require
    repeating 'after,' so 'to pursue' is the most natural equivalent.
- source_word: שֶׁבַע בֶּן בִּכְרִי
  chosen: Sheba son of Bichri
  alternatives:
  - Sheba, the son of Bichri
  lexicon: HALOT
  rationale: Standard rendering of Hebrew patronymic. 'Son of' is retained rather
    than reduced to 'ben' or paraphrased.
