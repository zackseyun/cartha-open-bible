id: 2SA.20.26
reference: 2 Samuel 20:26
source:
  edition: WLC
  text: וְ/גַ֗ם עִירָא֙ הַ/יָּ֣אִרִ֔י הָיָ֥ה כֹהֵ֖ן לְ/דָוִֽד׃ס
translation:
  text: And Ira the Jairite also was priest to David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chief minister' or 'royal advisor'; the Hebrew word is literally 'priest,'
      but in some royal contexts it may denote a high court official.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: And ... also
  alternatives:
  - Also
  - Moreover
  lexicon: HALOT
  rationale: The conjunction plus additive particle marks continuation with emphasis.
    Rendering with both 'And' and 'also' preserves the connective force and the additive
    nuance in natural English.
- source_word: עִירָא
  chosen: Ira
  rationale: 'Personal name transliterated according to the translation philosophy:
    names are transliterated rather than translated.'
- source_word: הַיָּאִרִי
  chosen: the Jairite
  alternatives:
  - the descendant of Jair
  lexicon: HALOT
  rationale: The gentilic/adjectival form is most naturally rendered as an ethnic
    or clan designation, 'the Jairite.' This is more idiomatic and concise than an
    expanded genealogical paraphrase.
- source_word: הָיָה
  chosen: was
  alternatives:
  - became
  lexicon: HALOT
  rationale: The Qal perfect of היה here functions as a simple copular past in a list
    of officials, not as an ingressive 'became.' 'Was' best fits the administrative
    notice style.
- source_word: כֹהֵן
  chosen: priest
  alternatives:
  - chief minister
  - advisor
  lexicon: HALOT
  rationale: The plain lexical sense of כֹּהֵן is 'priest.' In royal-administrative
    contexts it can denote a high official associated with the king, but the source
    word itself is still 'priest.' To avoid importing an interpretive narrowing into
    the main text, the default lexical sense is retained, with the functional alternative
    preserved in a footnote.
- source_word: לְדָוִד
  chosen: to David
  alternatives:
  - for David
  lexicon: HALOT
  rationale: The preposition ל here indicates relation or service to David. 'To David'
    is a formally close rendering and idiomatic enough in English, while preserving
    the ambiguity of exact function better than the more interpretive 'for David.'
