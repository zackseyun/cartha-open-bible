theological_decisions:
- issue: Meaning of כֹּהֵן in a royal court context
  chosen_reading: Retain 'priest' in the main text
  alternative_readings:
  - chief minister
  - royal advisor
  rationale: Although some interpreters understand כֹּהֵן here as a non-cultic court
    office because David's sons and other royal associates are elsewhere called כֹּהֲנִים,
    the Hebrew term's default meaning is 'priest.' Following original-language primacy
    and preserving ambiguity rather than resolving it, the main text keeps 'priest'
    and a footnote preserves the administrative alternative.
  doctrine_reference: Translation philosophy §§1, 3, 5
