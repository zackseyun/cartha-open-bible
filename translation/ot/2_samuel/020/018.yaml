id: 2SA.20.18
reference: 2 Samuel 20:18
source:
  edition: WLC
  text: וַ/תֹּ֖אמֶר לֵ/אמֹ֑ר דַּבֵּ֨ר יְדַבְּר֤וּ בָ/רִֽאשֹׁנָה֙ לֵ/אמֹ֔ר שָׁאֹ֧ל
    יְשָׁאֲל֛וּ בְּ/אָבֵ֖ל וְ/כֵ֥ן הֵתַֽמּוּ׃
translation:
  text: Then she said, “They used to say in former times, ‘Let them surely ask at
    Abel,’ and so they settled the matter.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “They would surely say in former times, ‘Let them surely inquire in Abel,’
      and thus they would bring it to an end.’” The Hebrew contains emphatic infinitive-absolute
      constructions in both clauses, and the final verb may be rendered more literally
      as “bring it to an end” or “finish.”
    reason: lexical_alternative
  - marker: b
    text: “Abel” is the shortened form of Abel-beth-maacah, the city under siege in
      this context.
    reason: cultural_note
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: Then she said
  alternatives:
  - And she said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the woman's continued speech in narrative
    sequence. 'Then' reflects the narrative progression naturally in English.
- source_word: לֵאמֹר
  chosen: “
  alternatives:
  - saying
  lexicon: HALOT
  rationale: The infinitive construct functions as a speech introducer. In idiomatic
    English it is best represented by direct quotation punctuation rather than a wooden
    'saying.'
- source_word: דַּבֵּר יְדַבְּרוּ
  chosen: They used to say
  alternatives:
  - They would indeed speak
  - They would surely say
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect of דבר intensifies the verbal
    idea. In this proverbial recollection, English idiom is best captured by 'used
    to say,' conveying customary past speech; the emphatic force is carried by the
    construction and context rather than a separate adverb.
- source_word: בָרִאשֹׁנָה
  chosen: in former times
  alternatives:
  - at the first
  - formerly
  lexicon: HALOT
  rationale: The phrase refers to earlier custom or precedent, not merely the first
    step in a sequence. 'In former times' communicates that sense clearly.
- source_word: לֵאמֹר
  chosen: ‘
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Second speech introducer marking the content of the old saying; rendered
    with quotation punctuation in natural English.
- source_word: שָׁאֹל יְשָׁאֲלוּ
  chosen: Let them surely ask
  alternatives:
  - They should certainly inquire
  - Let them ask
  lexicon: HALOT
  rationale: 'Infinitive absolute plus imperfect of שאל gives emphasis: ''surely ask/inquire.''
    Because it appears within a quoted maxim, ''Let them surely ask'' preserves the
    proverbial, directive flavor.'
- source_word: בְּאָבֵל
  chosen: at Abel
  alternatives:
  - in Abel
  lexicon: HALOT
  rationale: Refers to the city Abel-beth-maacah by shortened place name. 'At Abel'
    fits the sense of going to that place for counsel; English may also say 'in Abel,'
    so that alternative is preserved.
- source_word: וְכֵן
  chosen: and so
  alternatives:
  - thus
  - and in this way
  lexicon: HALOT
  rationale: Connective plus adverb draws an inference from the quoted custom to its
    result. 'And so' is natural modern English.
- source_word: הֵתַמּוּ
  chosen: they settled the matter
  alternatives:
  - they finished
  - they came to an end
  - they resolved it
  lexicon: HALOT
  rationale: From תמם in the Hiphil/perfect, here likely meaning to bring a matter
    to completion or resolution. In context of seeking counsel from a wise city, 'settled
    the matter' best conveys the practical sense rather than a bare 'finished.'
