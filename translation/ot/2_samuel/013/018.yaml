id: 2SA.13.18
reference: 2 Samuel 13:18
source:
  edition: WLC
  text: וְ/עָלֶ֨י/הָ֙ כְּתֹ֣נֶת פַּסִּ֔ים כִּי֩ כֵ֨ן תִּלְבַּ֧שְׁןָ בְנוֹת הַ/מֶּ֛לֶךְ הַ/בְּתוּלֹ֖ת מְעִילִ֑ים וַ/יֹּצֵ֨א אוֹתָ֤/הּ מְשָֽׁרְת/וֹ֙ הַ/ח֔וּץ וְ/נָעַ֥ל הַ/דֶּ֖לֶת אַחֲרֶֽי/הָ־׃
translation:
  text: Now she was wearing a richly ornamented robe[a], for this is how the virgin daughters of the king used to dress. Then his attendant put her outside and bolted the door behind her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a richly ornamented robe,' 'a robe of many colors,' or 'a long robe with sleeves'; the exact sense of the garment term is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּתֹנֶת פַּסִּים
  chosen: a long-sleeved robe
  alternatives:
  - a richly ornamented robe
  - a robe of many colors
  - a long robe with sleeves
  lexicon: HALOT, BDB
  rationale: The phrase denotes a distinctive garment. פַּסִּים is uncertain in precise sense; traditional 'many colors' is influenced by Genesis 37 and is not certain here. 'Long-sleeved robe' captures a likely sense of an extended or distinguished tunic while remaining readable. Because the exact nuance is debated, alternatives are preserved in a footnote.
- source_word: כִּי כֵן תִּלְבַּשְׁןָ
  chosen: for this is how ... used to dress
  alternatives:
  - for thus ... wore
  - for so ... dressed themselves
  lexicon: HALOT, BDB
  rationale: The construction explains customary practice. English idiom favors 'this is how ... used to dress' to express habitual action clearly.
- source_word: בְנוֹת הַמֶּלֶךְ הַבְּתוּלֹת
  chosen: the virgin daughters of the king
  alternatives:
  - the king's virgin daughters
  - the unmarried daughters of the king
  lexicon: HALOT, BDB
  rationale: The Hebrew explicitly identifies both royal status and virginity. 'Virgin daughters of the king' preserves both elements without softening the social marker to merely 'unmarried.'
- source_word: מְעִילִים
  chosen: in robes
  alternatives:
  - robes
  - outer garments
  lexicon: HALOT, BDB
  rationale: The noun likely refers to outer garments or robes. Rendering it with 'in robes' avoids awkward repetition while preserving the explanatory note about customary attire.
- source_word: מְשָׁרְתוֹ
  chosen: his attendant
  alternatives:
  - his servant
  - his minister
  lexicon: HALOT, BDB
  rationale: In this narrative context the word refers to a personal attendant serving Amnon. 'Attendant' is natural modern English and avoids possible confusion from 'minister.'
- source_word: וַיֹּצֵא אֹתָהּ הַחוּץ
  chosen: put her outside
  alternatives:
  - brought her out outside
  - drove her out
  lexicon: HALOT, BDB
  rationale: The idiom means causing her to go out to the outside. 'Put her outside' is concise and natural. 'Drove her out' may overstate the force, though the context is harsh.
- source_word: וְנָעַל הַדֶּלֶת אַחֲרֶיהָ
  chosen: bolted the door behind her
  alternatives:
  - locked the door behind her
  - shut the door behind her
  lexicon: HALOT, BDB
  rationale: נעל commonly means to lock or bolt. 'Bolted' conveys the deliberate finality of the action more vividly than merely 'shut.'
