id: 2SA.16.4
reference: 2 Samuel 16:4
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר הַ/מֶּ֨לֶךְ֙ לְ/צִבָ֔א הִנֵּ֣ה לְ/ךָ֔ כֹּ֖ל אֲשֶׁ֣ר לִ/מְפִי בֹ֑שֶׁת
    וַ/יֹּ֤אמֶר צִיבָא֙ הִֽשְׁתַּחֲוֵ֔יתִי אֶמְצָא חֵ֥ן בְּ/עֵינֶ֖י/ךָ אֲדֹנִ֥/י הַ/מֶּֽלֶךְ־־׃
translation:
  text: Then the king said to Ziba, “Behold, all that belongs to Mephibosheth is yours.”
    And Ziba said, “I bow down; may I find favor in your eyes, my lord the king.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I prostrate myself' / 'I pay homage.' The Hebrew verb denotes bowing
      down in submission or reverence.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Rendered as the discourse particle 'Look' to preserve the king's emphatic
    announcement in natural modern English without archaic tone.
- source_word: לְךָ
  chosen: is yours
  alternatives:
  - to you
  - belongs to you
  lexicon: HALOT
  rationale: The preposition plus pronoun after הִנֵּה functions idiomatically to
    assign possession. 'Is yours' expresses the legal transfer clearly in English.
- source_word: כֹּל אֲשֶׁר לִמְפִי בֹשֶׁת
  chosen: all that belongs to Mephibosheth
  alternatives:
  - all that is Mephibosheth's
  - everything that belonged to Mephibosheth
  lexicon: HALOT
  rationale: The phrase denotes Mephibosheth's property/holdings. 'Belongs to' is
    idiomatic and clear. Present tense fits the king's decree of transfer in direct
    speech.
- source_word: מְפִי בֹשֶׁת
  chosen: Mephibosheth
  alternatives:
  - Merib-baal
  lexicon: HALOT
  rationale: Used the standard English transliteration of the Masoretic form in this
    verse. The alternative form reflects a different traditional/name form, not the
    consonantal reading here.
- source_word: הִשְׁתַּחֲוֵיתִי
  chosen: I bow down
  alternatives:
  - I prostrate myself
  - I pay homage
  - I have bowed down
  lexicon: HALOT
  rationale: The verb commonly denotes bowing down in reverence or submission. 'I
    bow down' preserves the gesture and avoids overinterpreting it as worship. Present
    English works well as Ziba's immediate deferential response.
- source_word: אֶמְצָא חֵן בְּעֵינֶיךָ
  chosen: may I find favor in your eyes
  alternatives:
  - let me find favor in your sight
  - may I find grace in your sight
  lexicon: HALOT
  rationale: This is a standard Hebrew favor-formula. 'Favor' is more idiomatic and
    accessible than 'grace' here, while 'in your eyes' preserves the Hebrew imagery
    better than flattening it completely to 'in your sight'.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  lexicon: HALOT
  rationale: Courtly address is best represented by 'my lord the king.' 'Master' is
    possible but sounds less natural in royal address and may imply household servitude
    rather than political deference.
