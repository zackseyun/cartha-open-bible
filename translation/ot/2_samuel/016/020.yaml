id: 2SA.16.20
reference: 2 Samuel 16:20
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר אַבְשָׁל֖וֹם אֶל אֲחִיתֹ֑פֶל הָב֥וּ לָ/כֶ֛ם עֵצָ֖ה מַֽה נַּעֲשֶֽׂה־־׃
translation:
  text: Then Absalom said to Ahithophel, “Give your counsel. What should we do?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “Give counsel among yourselves: what shall we do?” The Hebrew plural
      forms may reflect address to Ahithophel together with others present, though
      Ahithophel is the named addressee.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving the sequential force better than a bare 'and said'.
- source_word: אַבְשָׁלוֹם
  chosen: Absalom
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: אֶל
  chosen: to
  lexicon: HALOT
  rationale: Standard directional preposition introducing the addressee.
- source_word: אֲחִיתֹפֶל
  chosen: Ahithophel
  rationale: Personal name transliterated by standard English convention.
- source_word: הָבוּ
  chosen: Give
  alternatives:
  - Provide
  - Offer
  lexicon: HALOT
  rationale: Imperative plural from יהב/נתן-like usage meaning 'give' or 'provide.'
    'Give' is the most direct and idiomatic rendering in this request for counsel.
- source_word: לָכֶם
  chosen: your
  alternatives:
  - for yourselves
  - among yourselves
  lexicon: HALOT
  rationale: Literally 'for yourselves/to yourselves' with plural reference. In idiomatic
    English, the sense is a request directed to Ahithophel and likely the advisers
    present to produce counsel from their side; 'your' captures the possessive force
    naturally in 'Give your advice.'
- source_word: עֵצָה
  chosen: advice
  alternatives:
  - counsel
  - plan
  lexicon: HALOT
  rationale: עֵצָה denotes counsel/advice. 'Advice' is clear modern English; 'counsel'
    is possible but slightly more formal. 'Plan' is too specific at this point.
- source_word: מַה
  chosen: What
  lexicon: HALOT
  rationale: Interrogative pronoun introducing the content question.
- source_word: נַּעֲשֶׂה
  chosen: should we do
  alternatives:
  - shall we do
  - are we to do
  lexicon: HALOT
  rationale: First person plural imperfect of עשה in deliberative context. 'Should
    we do' best conveys the consultative, deliberative nuance in contemporary English;
    'shall we do' is more formal/archaic.
