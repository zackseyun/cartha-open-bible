id: 2SA.16.13
reference: 2 Samuel 16:13
source:
  edition: WLC
  text: וַ/יֵּ֧לֶךְ דָּוִ֛ד וַ/אֲנָשָׁ֖י/ו בַּ/דָּ֑רֶךְ וְ/שִׁמְעִ֡י הֹלֵךְ֩ בְּ/צֵ֨לַע
    הָ/הָ֜ר לְ/עֻמָּת֗/וֹ הָלוֹךְ֙ וַ/יְקַלֵּ֔ל וַ/יְסַקֵּ֤ל בָּֽ/אֲבָנִים֙ לְ/עֻמָּת֔/וֹ
    וְ/עִפַּ֖ר בֶּ/עָפָֽרס׃פ
translation:
  text: So David and his men went on the road, while Shimei went along on the hillside
    opposite him, going along and cursing, and throwing stones at him and flinging
    dust.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the side of the hill opposite him.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew repeats the idea of ongoing movement: ''going along and cursing.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'pelting him with stones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּדָּרֶךְ
  chosen: on the road
  alternatives:
  - along the way
  - by the road
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means 'way, road, path.' Here the definite article and
    preposition indicate David's route of travel; 'on the road' is natural modern
    English and preserves the concrete setting.
- source_word: בְּצֵלַע הָהָר
  chosen: on the hillside
  alternatives:
  - on the side of the hill
  - along the flank of the mountain
  lexicon: HALOT
  rationale: צֵלַע literally denotes a side/flank. With הָהָר, the phrase refers to
    the side of the hill/mountain. 'On the hillside' is a concise, readable rendering
    that preserves the topographical contrast with David on the road below.
- source_word: לְעֻמָּתוֹ
  chosen: opposite him
  alternatives:
  - parallel to him
  - facing him
  lexicon: HALOT
  rationale: The noun with preposition conveys spatial correspondence or being opposite/alongside.
    In this scene Shimei is moving on the slope across from David, so 'opposite him'
    best captures the adversarial spatial relation. The second occurrence is absorbed
    into the English syntax with 'at him' to avoid awkward repetition while preserving
    sense.
- source_word: הֹלֵךְ ... הָלוֹךְ
  chosen: went along ... going along
  alternatives:
  - kept going
  - went continually
  lexicon: HALOT
  rationale: The finite/participle plus infinitive absolute construction intensifies
    or gives durative force. Rendering with repeated motion language ('went along
    ... going along') preserves the ongoing action without sounding wooden.
- source_word: וַיְקַלֵּל
  chosen: cursing
  alternatives:
  - kept cursing
  - pronouncing curses
  lexicon: HALOT
  rationale: קלל in the Piel means 'to curse.' The participial flow in English fits
    the Hebrew sequence of ongoing hostile actions.
- source_word: וַיְסַקֵּל בָּאֲבָנִים
  chosen: throwing stones
  alternatives:
  - stoning
  - pelting with stones
  lexicon: HALOT
  rationale: סקל can mean 'stone' in the sense of executing by stoning, but here the
    context is harassment from a distance, not formal execution. 'Throwing stones'
    avoids overreading judicial connotations while keeping the concrete action.
- source_word: וְעִפַּר בֶּעָפָר
  chosen: flinging dust
  alternatives:
  - throwing dust
  - casting dust
  lexicon: HALOT
  rationale: The verb from עפר here denotes tossing dust/loose earth. 'Flinging dust'
    is vivid, idiomatic, and matches the hostile gesture.
- source_word: וַאֲנָשָׁיו
  chosen: his men
  alternatives:
  - the men with him
  lexicon: HALOT
  rationale: אֲנָשִׁים here refers to David's male companions/followers. 'His men'
    is the natural contextual rendering and is gender-accurate to the Hebrew.
- source_word: וַיֵּלֶךְ
  chosen: went on
  alternatives:
  - went
  - continued on
  lexicon: HALOT
  rationale: הלך is the basic verb 'go/walk.' In narrative context, 'went on' conveys
    continued movement amid Shimei's abuse.
