id: 2SA.16.19
reference: 2 Samuel 16:19
source:
  edition: WLC
  text: וְ/הַ/שֵּׁנִ֗ית לְ/מִי֙ אֲנִ֣י אֶֽעֱבֹ֔ד הֲ/ל֖וֹא לִ/פְנֵ֣י בְנ֑/וֹ כַּ/אֲשֶׁ֤ר
    עָבַ֨דְתִּי֙ לִ/פְנֵ֣י אָבִ֔י/ךָ כֵּ֖ן אֶהְיֶ֥ה לְ/פָנֶֽי/ךָ׃פ
translation:
  text: And secondly, whom should I serve? Should it not be before his son? As I served
    before your father, so I will be before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'before his son ... before your father ... before you,'
      a courtly idiom for serving in the presence of or under a king.
    reason: cultural_note
lexical_decisions:
- source_word: וְהַשֵּׁנִית
  chosen: And secondly
  alternatives:
  - And the second time
  - And in the second place
  lexicon: HALOT
  rationale: Idiomatic discourse marker introducing Hushai's second argument. 'Secondly'
    captures the adverbial force better than a wooden 'the second.'
- source_word: לְמִי ... אֶעֱבֹד
  chosen: whom should I serve
  alternatives:
  - for whom should I labor
  - whom shall I serve
  lexicon: HALOT
  rationale: עבד in this courtly context means to serve in allegiance. 'Should I serve'
    reflects the rhetorical question naturally in English.
- source_word: הֲלוֹא
  chosen: Should it not be
  alternatives:
  - Is it not
  - Surely
  lexicon: HALOT
  rationale: Introduces an expected affirmative answer. 'Should it not be' fits the
    rhetorical force in smooth English.
- source_word: לִפְנֵי בְנוֹ
  chosen: his son
  alternatives:
  - before his son
  - in the presence of his son
  lexicon: HALOT
  rationale: The idiom 'serve before' in royal context means to serve under or in
    attendance on someone. English can omit 'before' here without loss, since the
    next clause preserves the fuller idiom for comparison.
- source_word: כַּאֲשֶׁר עָבַדְתִּי לִפְנֵי אָבִיךָ
  chosen: As I served before your father
  alternatives:
  - Just as I served your father
  - As I ministered before your father
  lexicon: HALOT
  rationale: Retains the courtly idiom לִפְנֵי ('before/in the presence of') while
    remaining readable. 'Served' is preferable to 'ministered' in this political setting.
- source_word: כֵּן אֶהְיֶה לְפָנֶיךָ
  chosen: so I will be before you
  alternatives:
  - so I will be with you
  - so I will serve before you
  lexicon: HALOT
  rationale: The Hebrew uses היה rather than repeating עבד, so the translation preserves
    the shift with 'be before you' rather than supplying 'serve' again. This keeps
    the formal parallelism and the sense of standing in attendance before the king.
