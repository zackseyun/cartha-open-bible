id: 2SA.16.23
reference: 2 Samuel 16:23
source:
  edition: WLC
  text: וַ/עֲצַ֣ת אֲחִיתֹ֗פֶל אֲשֶׁ֤ר יָעַץ֙ בַּ/יָּמִ֣ים הָ/הֵ֔ם כַּ/אֲשֶׁ֥ר יִשְׁאַל
    בִּ/דְבַ֣ר הָ/אֱלֹהִ֑ים כֵּ֚ן כָּל עֲצַ֣ת אֲחִיתֹ֔פֶל גַּם לְ/דָוִ֖ד גַּ֥ם לְ/אַבְשָׁלֹֽם־־־׃ס
translation:
  text: Now the counsel of Ahithophel that he gave in those days was as if one inquired
    of the word of God; so was all the counsel of Ahithophel both to David and to
    Absalom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as when one inquires of a word from God.' The Hebrew comparison emphasizes
      how highly Ahithophel’s counsel was regarded.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲצַת
  chosen: counsel
  alternatives:
  - advice
  - plan
  lexicon: HALOT
  rationale: The noun denotes advice/deliberation given by a counselor. 'Counsel'
    preserves the formal and courtly sense better than the flatter 'advice' and fits
    the repeated use in the verse.
- source_word: יָעַץ
  chosen: he gave
  alternatives:
  - he counseled
  - he advised
  lexicon: HALOT
  rationale: In English, 'the counsel ... that he gave' is more idiomatic than 'the
    counsel ... that he counseled,' while still reflecting the verbal idea of giving
    advice.
- source_word: בַּיָּמִים הָהֵם
  chosen: in those days
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: A standard temporal expression. 'In those days' is natural and sufficiently
    formal.
- source_word: כַּאֲשֶׁר יִשְׁאַל
  chosen: as if one inquired
  alternatives:
  - as when one inquires
  - just as one would inquire
  lexicon: HALOT
  rationale: The comparison is generic rather than tied to a specific subject. 'As
    if one inquired' captures the idiomatic force in smooth English.
- source_word: בִּדְבַר הָאֱלֹהִים
  chosen: of the word of God
  alternatives:
  - of God’s word
  - of a word from God
  - at the word of God
  lexicon: HALOT
  rationale: The phrase most naturally refers to seeking divine guidance, and 'the
    word of God' preserves the lexical value of דָּבָר while remaining readable. 'A
    word from God' is possible, but the construct phrase is adequately represented
    by 'the word of God.'
- source_word: כֵּן
  chosen: so was
  alternatives:
  - so it was
  - thus was
  lexicon: HALOT
  rationale: This introduces the result/comparison in the second clause. 'So was'
    preserves the concise emphatic structure.
- source_word: כָּל עֲצַת אֲחִיתֹפֶל
  chosen: all the counsel of Ahithophel
  alternatives:
  - every counsel of Ahithophel
  - all Ahithophel’s counsel
  lexicon: HALOT
  rationale: This keeps the repeated noun phrase visible and mirrors the Hebrew structure
    closely.
- source_word: גַּם לְדָוִד גַּם לְאַבְשָׁלֹם
  chosen: both to David and to Absalom
  alternatives:
  - for both David and Absalom
  - to David as well as to Absalom
  lexicon: HALOT
  rationale: The repeated גַּם ... גַּם is best rendered with 'both ... and ...'.
    'To' is retained to reflect the lamed preposition and the relational sense of
    counsel given to each.
