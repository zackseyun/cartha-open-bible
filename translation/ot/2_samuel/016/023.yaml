theological_decisions:
- issue: Force of the comparison to divine inquiry
  chosen_reading: Ahithophel’s counsel is described as being regarded with the authority
    and reliability of an inquiry of God, without asserting that it was itself inspired
    revelation.
  alternative_readings:
  - The verse hyperbolically states only that his advice was highly esteemed.
  - The verse implies his counsel functioned practically like an oracle.
  rationale: The Hebrew uses a comparison ('as if one inquired of the word of God'),
    not an identification. The translation preserves the simile and avoids overstating
    Ahithophel’s status while retaining the extraordinary weight attributed to his
    counsel.
  doctrine_reference: Preserve theological tension rather than resolve it.
