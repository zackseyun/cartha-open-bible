id: 2SA.16.6
reference: 2 Samuel 16:6
source:
  edition: WLC
  text: וַ/יְסַקֵּ֤ל בָּֽ/אֲבָנִים֙ אֶת דָּוִ֔ד וְ/אֶת כָּל עַבְדֵ֖י הַ/מֶּ֣לֶךְ דָּוִ֑ד
    וְ/כָל הָ/עָם֙ וְ/כָל הַ/גִּבֹּרִ֔ים מִ/ימִינ֖/וֹ וּ/מִ/שְּׂמֹאלֽ/וֹ־־־־־׃
translation:
  text: And he threw stones at David and at all the servants of King David, while
    all the people and all the mighty men were at his right hand and at his left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he stoned David and all the servants of King David.' The Hebrew verb
      can be rendered more literally this way, but in English that wording may suggest
      a formal execution by stoning rather than hostile pelting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְסַקֵּל
  chosen: he threw stones at
  alternatives:
  - he stoned
  - he pelted with stones
  lexicon: HALOT
  rationale: The piel of סקל means to stone or throw stones at. In English, 'stoned'
    can imply execution by stoning, which is not the point here; the context is hostile
    pelting as Shimei curses David. 'Threw stones at' preserves the concrete action
    clearly.
- source_word: בָּאֲבָנִים
  chosen: stones
  alternatives:
  - with stones
  lexicon: HALOT
  rationale: The preposition plus noun is incorporated naturally into the English
    verbal phrase 'threw stones at.' This preserves the instrumental sense without
    awkwardness.
- source_word: עַבְדֵי
  chosen: servants
  alternatives:
  - officials
  - attendants
  lexicon: HALOT
  rationale: Although עבד can denote a range from slave to servant to royal official,
    here it refers broadly to those in the king's service. 'Servants' is the most
    direct and contextually fitting rendering; 'slaves' would overstate bonded status
    in this royal-court setting.
- source_word: הַמֶּלֶךְ דָּוִד
  chosen: King David
  alternatives:
  - the king, David
  lexicon: HALOT
  rationale: The construct phrase identifies David by title. 'King David' is idiomatic
    English and preserves both the royal designation and the personal name.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the troops
  - all the company
  lexicon: HALOT
  rationale: עם commonly means 'people.' In this context it refers to the body of
    people accompanying David, not necessarily only soldiers. 'All the people' keeps
    the broader sense.
- source_word: הַגִּבֹּרִים
  chosen: the mighty men
  alternatives:
  - the warriors
  - the strong men
  lexicon: HALOT
  rationale: גִּבּוֹרִים often refers to valiant fighting men, and 'mighty men' is
    a well-established but still understandable English rendering in Samuel. It preserves
    the likely military nuance and possible connection to David's elite warriors.
- source_word: מִימִינוֹ וּמִשְּׂמֹאלוֹ
  chosen: at his right hand and at his left
  alternatives:
  - on his right and on his left
  - to his right and to his left
  lexicon: HALOT
  rationale: 'The suffix most naturally refers to David in context: the people and
    mighty men were positioned around him protectively. ''At his right hand and at
    his left'' is idiomatic and conveys surrounding presence.'
