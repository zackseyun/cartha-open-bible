theological_decisions:
- issue: Sexual euphemism in royal-political counsel
  chosen_reading: 'Render the euphemism transparently but not crudely: ''Go in to
    your father’s concubines.'''
  alternative_readings:
  - '''Sleep with your father’s concubines'''
  - '''Have relations with your father’s concubines'''
  rationale: The verse describes a politically charged sexual act intended to signal
    irreversible rupture with David. The translation should preserve the Hebrew euphemism
    and gravity without either obscuring or sensationalizing it.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s plain sense without paraphrase beyond what it warrants.'
