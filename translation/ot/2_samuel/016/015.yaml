id: 2SA.16.15
reference: 2 Samuel 16:15
source:
  edition: WLC
  text: וְ/אַבְשָׁל֗וֹם וְ/כָל הָ/עָם֙ אִ֣ישׁ יִשְׂרָאֵ֔ל בָּ֖אוּ יְרוּשָׁלִָ֑ם וַ/אֲחִיתֹ֖פֶל
    אִתּֽ/וֹ־׃
translation:
  text: Now Absalom and all the people, the men of Israel, came to Jerusalem, and
    Ahithophel was with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'all the people, every man of Israel' or 'all the people,
      the men of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַבְשָׁלוֹם
  chosen: Now Absalom
  alternatives:
  - And Absalom
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply as 'and,' but in narrative sequence
    English often uses 'now' to mark a scene shift smoothly. The proper name is transliterated
    per translation philosophy.
- source_word: וְ/כָל הָעָם
  chosen: and all the people
  alternatives:
  - and all the army
  - and all the populace
  lexicon: HALOT
  rationale: עָם most naturally means 'people' here, referring collectively to those
    aligned with Absalom. 'Army' is too narrow, and 'populace' is less natural in
    modern English.
- source_word: אִישׁ יִשְׂרָאֵל
  chosen: the men of Israel
  alternatives:
  - every man of Israel
  - the people of Israel
  lexicon: HALOT
  rationale: The phrase is literally 'man of Israel' used collectively. 'The men of
    Israel' preserves the masculine representative force and the distributive-national
    sense better than the more neutral 'people of Israel.' 'Every man of Israel' is
    possible but sounds overly wooden in English in apposition to 'all the people.'
- source_word: בָּאוּ
  chosen: came
  alternatives:
  - entered
  - arrived
  lexicon: HALOT
  rationale: בוא commonly means 'come' or 'enter.' 'Came' is the most natural narrative
    rendering with Jerusalem as destination.
- source_word: יְרוּשָׁלִָם
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: HALOT
  rationale: The place name is transliterated conventionally. English idiom prefers
    'came to Jerusalem,' though 'into Jerusalem' is a possible more explicit directional
    rendering.
- source_word: וַ/אֲחִיתֹפֶל אִתּוֹ
  chosen: and Ahithophel was with him
  alternatives:
  - and Ahithophel with him
  - with Ahithophel accompanying him
  lexicon: HALOT
  rationale: The Hebrew is verbless in effect after the prior finite verb, so English
    supplies 'was' for clarity. The pronoun most naturally refers to Absalom in context.
    Retaining Ahithophel by transliteration follows the name policy.
