id: 2SA.16.9
reference: 2 Samuel 16:9
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֲבִישַׁ֤י בֶּן צְרוּיָה֙ אֶל הַ/מֶּ֔לֶךְ לָ֣/מָּה יְקַלֵּ֞ל הַ/כֶּ֤לֶב הַ/מֵּת֙ הַ/זֶּ֔ה אֶת אֲדֹנִ֖/י הַ/מֶּ֑לֶךְ אֶעְבְּרָה נָּ֖א וְ/אָסִ֥ירָה אֶת רֹאשֽׁ/וֹ־־־־־׃ס
translation:
  text: Then Abishai son of Zeruiah said to the king[a], “Why should this dead dog curse my lord the king? Please let me go over and take off his head.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “and remove his head.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural English narrative flow while preserving sequence.
- source_word: אֲבִישַׁי בֶּן צְרוּיָה
  chosen: Abishai son of Zeruiah
  rationale: Personal names are transliterated by standard convention per translation philosophy.
- source_word: אֶל הַמֶּלֶךְ
  chosen: to the king
  lexicon: HALOT
  rationale: Straightforward directional phrase; 'to the king' is the natural rendering.
- source_word: לָמָּה
  chosen: Why should
  alternatives:
  - Why does
  - Why is
  lexicon: HALOT
  rationale: Introduces a rhetorical objection. With the imperfect verb that follows, 'Why should ...' captures the force better than a flat present tense.
- source_word: יְקַלֵּל
  chosen: curse
  alternatives:
  - revile
  lexicon: HALOT
  rationale: קלל in the piel here means to curse or treat with contempt verbally. 'Curse' fits the immediate context of Shimei's abusive speech and is the standard, clear English equivalent.
- source_word: הַכֶּלֶב הַמֵּת הַזֶּה
  chosen: this dead dog
  alternatives:
  - this worthless dog
  - this contemptible dog
  lexicon: HALOT
  rationale: A Hebrew insult expressing contempt and low status. 'This dead dog' preserves the metaphor and intensity without paraphrase.
- source_word: אֶת אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  lexicon: HALOT
  rationale: אדני is a courtly address to the king. 'My lord the king' preserves the deferential royal idiom in readable English.
- source_word: אֶעְבְּרָה נָּא
  chosen: Please let me go over
  alternatives:
  - Let me cross over, please
  - Please let me pass over
  lexicon: HALOT
  rationale: The cohortative with נָא expresses a polite request. In context Abishai asks permission to move across to Shimei; 'Please let me go over' is idiomatic and sufficiently literal.
- source_word: וְאָסִירָה אֶת רֹאשׁוֹ
  chosen: and take off his head
  alternatives:
  - and remove his head
  - and cut off his head
  - and strike off his head
  lexicon: HALOT
  rationale: Literally 'remove his head,' an idiom for decapitation. 'Take off his head' is natural modern English that preserves the violent literal sense without euphemism.
