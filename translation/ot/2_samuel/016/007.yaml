id: 2SA.16.7
reference: 2 Samuel 16:7
source:
  edition: WLC
  text: וְ/כֹֽה אָמַ֥ר שִׁמְעִ֖י בְּ/קַֽלְל֑/וֹ צֵ֥א צֵ֛א אִ֥ישׁ הַ/דָּמִ֖ים וְ/אִ֥ישׁ הַ/בְּלִיָּֽעַל־׃
translation:
  text: And Shimei said as he cursed him[a], “Get out, get out[b], man of bloodshed and worthless man!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'man of blood' / 'bloody man.' The Hebrew idiom literally uses 'bloods' and refers to bloodguilt or bloodshed.
    reason: lexical_alternative
  - marker: b
    text: Or 'wicked man.' Hebrew 'man of belial' is an idiom for a worthless or base person, not necessarily the proper name 'Belial.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/כֹה
  chosen: And ... as follows
  alternatives:
  - And thus
  - And this is what
  lexicon: HALOT
  rationale: Introduces the manner/content of Shimei's speech. In idiomatic English, the sense is carried by 'And Shimei said ...' without needing a wooden 'thus'; the content that follows supplies the 'thus' force.
- source_word: אָמַר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard narrative verb for speech; 'said' is the natural English equivalent.
- source_word: שִׁמְעִי
  chosen: Shimei
  rationale: Personal names are transliterated by standard convention per translation philosophy.
- source_word: בְּ/קַֽלְל/וֹ
  chosen: as he cursed him
  alternatives:
  - while cursing him
  - in his cursing
  lexicon: HALOT
  rationale: 'The preposition with infinitive construct plus suffix expresses contemporaneous action: Shimei spoke while cursing David. ''As he cursed him'' is natural and preserves the temporal nuance. The object ''him'' is contextually David, supplied by the 3ms suffix.'
- source_word: צֵא צֵא
  chosen: Get out, get out
  alternatives:
  - Go out, go out
  - Away, away
  lexicon: HALOT
  rationale: The repeated imperative intensifies the expulsion/repudiation. 'Get out, get out' captures the force in idiomatic modern English better than the more spatially neutral 'go out.'
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  - fellow
  lexicon: HALOT
  rationale: Gender-accurate singular insult directed at David. 'Man' matches the Hebrew and the direct address.
- source_word: הַ/דָּמִים
  chosen: of bloodshed
  alternatives:
  - of blood
  - bloodthirsty
  - bloody
  lexicon: HALOT
  rationale: The plural 'bloods' is an idiom for bloodguilt/bloodshed. 'Man of bloodshed' preserves the genitival construction while communicating culpability for violent killing. 'Bloody man' in modern English can sound merely adjectival or colloquial; 'bloodthirsty' overinterprets motive.
- source_word: וְ/אִישׁ
  chosen: and ... man
  alternatives:
  - and ... fellow
  lexicon: HALOT
  rationale: Coordinates a second pejorative designation; repeating 'man' preserves the Hebrew parallelism.
- source_word: הַ/בְּלִיָּעַל
  chosen: worthless
  alternatives:
  - wicked
  - base
  - Belial
  lexicon: HALOT
  rationale: In this context the term functions as a common noun/adjectival insult meaning worthlessness or wickedness, not necessarily as the later personified proper name 'Belial.' 'Worthless man' is a common and contextually fitting rendering; 'wicked man' is possible but less tied to the lexical sense of worthlessness.
