theological_decisions:
- issue: Rendering בְּלִיַּעַל
  chosen_reading: 'common-noun insult: ''worthless man'''
  alternative_readings:
  - '''wicked man'''
  - '''man of Belial'''
  rationale: The Hebrew here is best read in its OT idiomatic sense as a term of moral worthlessness rather than a developed demonic proper name. Translating it as 'Belial' would import later associations not required by the text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; do not import doctrinal claims the text does not make.'
