id: 2SA.16.3
reference: 2 Samuel 16:3
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר הַ/מֶּ֔לֶךְ וְ/אַיֵּ֖ה בֶּן אֲדֹנֶ֑י/ךָ וַ/יֹּ֨אמֶר צִיבָ֜א אֶל
    הַ/מֶּ֗לֶךְ הִנֵּה֙ יוֹשֵׁ֣ב בִּ/ירוּשָׁלִַ֔ם כִּ֣י אָמַ֔ר הַ/יּ֗וֹם יָשִׁ֤יבוּ
    לִ/י֙ בֵּ֣ית יִשְׂרָאֵ֔ל אֵ֖ת מַמְלְכ֥וּת אָבִֽ/י־־׃
translation:
  text: Then the king said, “And where is your master's son?” Ziba said to the king,
    “Look, he is staying in Jerusalem, for he said, ‘Today the house of Israel will
    restore to me my father's kingdom.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is remaining in Jerusalem.' The Hebrew participle can denote continued
      residence or staying in place, not only literal sitting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun.
- source_word: וְאַיֵּה
  chosen: And where is
  alternatives:
  - Where is
  lexicon: HALOT
  rationale: Interrogative of location. Retaining 'And' reflects the Hebrew connective
    and the king's continuing inquiry.
- source_word: בֶּן אֲדֹנֶיךָ
  chosen: your master's son
  alternatives:
  - the son of your lord
  - your lord's son
  lexicon: HALOT
  rationale: אדון here refers to Ziba's master, Mephibosheth, not a divine or royal
    title needing capitalization. 'Master' is the most natural social term in context.
- source_word: צִיבָא
  chosen: Ziba
  rationale: Standard English transliteration of the personal name.
- source_word: הִנֵּה
  chosen: Look,
  alternatives:
  - Behold,
  - See,
  lexicon: HALOT
  rationale: Deictic particle introducing Ziba's reply. 'Look' is readable modern
    English and preserves the discourse force better than the archaic 'Behold.'
- source_word: יוֹשֵׁב
  chosen: is staying
  alternatives:
  - is sitting
  - remains
  - is dwelling
  lexicon: HALOT
  rationale: The participle of ישׁב here denotes remaining/residing in a place, not
    literal sitting. 'Is staying' fits the immediate situational context during David's
    flight.
- source_word: בִּירוּשָׁלַםִ
  chosen: in Jerusalem
  rationale: Standard place-name transliteration with preposition.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason Ziba gives for Mephibosheth's remaining in Jerusalem.
- source_word: הַיּוֹם
  chosen: Today
  alternatives:
  - This day
  lexicon: HALOT
  rationale: Temporal adverbial noun rendered idiomatically in direct speech.
- source_word: יָשִׁיבוּ לִי
  chosen: will restore to me
  alternatives:
  - will bring back to me
  - will return to me
  lexicon: HALOT
  rationale: Hiphil of שוב commonly means 'cause to return/restore.' 'Restore to me'
    best fits the object 'my father's kingdom.'
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The construct phrase is retained rather than flattened to 'Israel,' preserving
    the corporate-national expression of the Hebrew.
- source_word: אֵת מַמְלְכוּת אָבִי
  chosen: my father's kingdom
  alternatives:
  - the kingdom of my father
  - my father's kingship
  lexicon: HALOT
  rationale: ממלכות denotes kingdom/royal rule. 'My father's kingdom' is natural English
    and preserves the dynastic claim implied in the phrase.
