theological_decisions:
- issue: Reported speech from Ziba about Mephibosheth's motive
  chosen_reading: Translate Ziba's accusation straightforwardly without endorsing
    its truthfulness.
  alternative_readings:
  - Render with added distancing language such as 'claimed' or 'allegedly said'
  rationale: The Hebrew simply reports what Ziba said to David. Adding explicit skepticism
    would import an interpretive judgment from the broader narrative rather than this
    verse itself. The translation preserves the statement as reported speech and lets
    context evaluate it.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over interpretive tradition.
