id: 2SA.16.22
reference: 2 Samuel 16:22
source:
  edition: WLC
  text: וַ/יַּטּ֧וּ לְ/אַבְשָׁל֛וֹם הָ/אֹ֖הֶל עַל הַ/גָּ֑ג וַ/יָּבֹ֤א אַבְשָׁלוֹם֙
    אֶל פִּֽלַגְשֵׁ֣י אָבִ֔י/ו לְ/עֵינֵ֖י כָּל יִשְׂרָאֵֽל־־־׃
translation:
  text: So they pitched the tent for Absalom on the roof, and Absalom went in to his
    father's concubines in the sight of all Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before all Israel' or 'in full view of all Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּטּוּ
  chosen: they pitched
  alternatives:
  - they spread out
  - they set up
  lexicon: HALOT
  rationale: The verb from נטה in this context refers to setting up or stretching
    out a tent. 'Pitched' is idiomatic modern English for erecting a tent and fits
    the narrative context well.
- source_word: הָאֹהֶל
  chosen: the tent
  alternatives:
  - a tent
  lexicon: HALOT
  rationale: 'With the article, the noun is definite: ''the tent.'' This likely refers
    to the tent specifically prepared for the public act Ahithophel advised.'
- source_word: עַל הַגָּג
  chosen: on the roof
  alternatives:
  - on the rooftop
  lexicon: HALOT
  rationale: Both are possible; 'on the roof' is slightly more direct and natural
    here while preserving the location's public visibility.
- source_word: וַיָּבֹא ... אֶל
  chosen: went in to
  alternatives:
  - went to
  - had relations with
  lexicon: HALOT
  rationale: The idiom 'went in to' is the standard biblical euphemism for sexual
    relations and preserves the Hebrew expression without flattening it into either
    a vague movement verb or an overly explicit paraphrase.
- source_word: פִּלַגְשֵׁי אָבִיו
  chosen: his father's concubines
  alternatives:
  - the concubines of his father
  lexicon: HALOT
  rationale: This is the straightforward construct relationship. 'His father's concubines'
    is natural English and preserves the familial and royal context.
- source_word: לְעֵינֵי כָּל יִשְׂרָאֵל
  chosen: in the sight of all Israel
  alternatives:
  - before all Israel
  - in full view of all Israel
  lexicon: HALOT
  rationale: The phrase literally means 'to the eyes of all Israel.' 'In the sight
    of all Israel' preserves the public, witnessed nature of the act with formal clarity.
