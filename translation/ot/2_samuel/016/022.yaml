theological_decisions:
- issue: Rendering of the sexual idiom in a morally charged royal-usurpation context
  chosen_reading: Retain the Hebrew euphemism as 'went in to' rather than making it
    either more clinical or more explicit.
  alternative_readings:
  - had sexual relations with
  - slept with
  rationale: The verse reports a public act of sexual appropriation tied to Absalom's
    rebellion and fulfillment of prior judgment. Preserving the idiom maintains the
    text's gravity and literary register without euphemistically obscuring the meaning
    or adding modern phrasing not present in the source.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text
    sense without paraphrase.'
