id: 2SA.16.1
reference: 2 Samuel 16:1
source:
  edition: WLC
  text: וְ/דָוִ֗ד עָבַ֤ר מְעַט֙ מֵֽ/הָ/רֹ֔אשׁ וְ/הִנֵּ֥ה צִיבָ֛א נַ֥עַר מְפִי בֹ֖שֶׁת
    לִ/קְרָאת֑/וֹ וְ/צֶ֨מֶד חֲמֹרִ֜ים חֲבֻשִׁ֗ים וַ/עֲלֵי/הֶם֩ מָאתַ֨יִם לֶ֜חֶם וּ/מֵאָ֧ה
    צִמּוּקִ֛ים וּ/מֵ֥אָה קַ֖יִץ וְ/נֵ֥בֶל יָֽיִן־׃
translation:
  text: When David had passed a little beyond the summit, behold, Ziba the servant
    of Mephibosheth was there to meet him, with a pair of saddled donkeys, and on
    them were two hundred loaves of bread, a hundred clusters of raisins, a hundred
    summer fruits, and a skin of wine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a little past the top.' The Hebrew literally says 'a little from the
      head,' with 'head' used for the summit of the hill or mount.
    reason: lexical_alternative
  - marker: b
    text: '''Servant'' could also be rendered ''young man'' or ''attendant''; here
      the context favors Ziba''s role as Mephibosheth''s servant.'
    reason: lexical_alternative
  - marker: c
    text: '''Summer fruits'' may refer more specifically to figs, but the Hebrew term
      is broader.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְעַט מֵהָרֹאשׁ
  chosen: a little beyond the summit
  alternatives:
  - a little past the top
  - a little from the head
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head,' but in topographical context it refers
    to the top/summit of the hill or mount. 'A little beyond the summit' gives natural
    English while preserving the spatial sense.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - there was
  lexicon: HALOT
  rationale: This discourse marker signals sudden appearance or vividness. 'Behold'
    preserves the narrative force better than flattening it to a simple existential.
- source_word: נַעַר מְפִי בֹשֶׁת
  chosen: the servant of Mephibosheth
  alternatives:
  - the young man of Mephibosheth
  - the attendant of Mephibosheth
  lexicon: HALOT
  rationale: נַעַר can mean 'young man' or 'servant/attendant.' In this context Ziba
    is identified by his role relative to Mephibosheth, so 'servant' best fits the
    narrative relationship.
- source_word: צֶמֶד חֲמֹרִים
  chosen: a pair of donkeys
  alternatives:
  - a yoke of donkeys
  - two donkeys
  lexicon: HALOT
  rationale: צֶמֶד denotes a pair, often a yoked pair. Since donkeys are not necessarily
    pictured as yoked here, 'a pair of donkeys' is the clearest idiomatic rendering.
- source_word: חֲבֻשִׁים
  chosen: saddled
  alternatives:
  - bound
  - equipped
  lexicon: HALOT
  rationale: In context of donkeys prepared for riding or carrying goods, the passive
    participle is best rendered 'saddled' rather than the more wooden 'bound.'
- source_word: מָאתַיִם לֶחֶם
  chosen: two hundred loaves of bread
  alternatives:
  - two hundred breads
  lexicon: HALOT
  rationale: English idiom requires a countable unit; 'loaves of bread' conveys the
    distributive sense naturally.
- source_word: צִמּוּקִים
  chosen: clusters of raisins
  alternatives:
  - raisin cakes
  - raisins
  lexicon: HALOT
  rationale: The term refers to pressed or clustered raisins/dried grapes. 'Clusters
    of raisins' preserves the likely sense without over-specifying cakes, which is
    less certain here.
- source_word: קַיִץ
  chosen: summer fruits
  alternatives:
  - summer fruit
  - figs
  lexicon: HALOT
  rationale: The noun can denote summer fruit generally, though figs are often intended
    in context. The broader 'summer fruits' avoids narrowing beyond what the Hebrew
    explicitly states.
- source_word: נֵבֶל יָיִן
  chosen: a skin of wine
  alternatives:
  - a bottle of wine
  - a wineskin of wine
  lexicon: HALOT
  rationale: נֵבֶל here denotes a skin-container. 'A skin of wine' is concise, natural,
    and materially accurate.
