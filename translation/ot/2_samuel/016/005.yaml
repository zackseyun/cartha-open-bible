id: 2SA.16.5
reference: 2 Samuel 16:5
source:
  edition: WLC
  text: וּ/בָ֛א הַ/מֶּ֥לֶךְ דָּוִ֖ד עַד בַּֽחוּרִ֑ים וְ/הִנֵּ֣ה מִ/שָּׁם֩ אִ֨ישׁ יוֹצֵ֜א מִ/מִּשְׁפַּ֣חַת בֵּית שָׁא֗וּל וּ/שְׁמ/וֹ֙ שִׁמְעִ֣י בֶן גֵּרָ֔א יֹצֵ֥א יָצ֖וֹא וּ/מְקַלֵּֽל־־־׃
translation:
  text: When King David came to Bahurim[a], behold, a man came out from there, from the clan of the house of Saul, whose name was Shimei son of Gera; he came out continually, cursing as he came.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he kept coming out and cursing.' The Hebrew intensifies the verb 'came out' (participle + infinitive absolute), likely expressing repeated or sustained action.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָא
  chosen: When ... came
  alternatives:
  - And ... came
  - Now ... came
  lexicon: HALOT
  rationale: The waw + qatal advances the narrative. Rendering with 'When' fits the temporal setup for the following scene in natural English while preserving the arrival event.
- source_word: הַמֶּלֶךְ דָּוִד
  chosen: King David
  alternatives:
  - the king, David
  lexicon: HALOT
  rationale: Appositional construction; 'King David' is idiomatic English and preserves both title and name.
- source_word: עַד בַּחוּרִים
  chosen: to Bahurim
  alternatives:
  - as far as Bahurim
  lexicon: HALOT
  rationale: עַד marks movement reaching a place. 'To Bahurim' is the most natural English equivalent here.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - and there was
  lexicon: HALOT
  rationale: Retains the vivid deictic force that introduces a sudden noteworthy development in the narrative.
- source_word: מִשָּׁם אִישׁ יוֹצֵא
  chosen: a man came out from there
  alternatives:
  - there came out from there a man
  - a man was coming out from there
  lexicon: HALOT
  rationale: יוֹצֵא as participle in narrative can describe the action in progress at the scene; English simple past is smoother while preserving the event.
- source_word: מִמִּשְׁפַּחַת בֵּית שָׁאוּל
  chosen: from the clan of the house of Saul
  alternatives:
  - from the family of the house of Saul
  - from Saul's household clan
  lexicon: HALOT
  rationale: מִשְׁפָּחָה denotes a kinship group or clan; 'house of Saul' preserves the dynastic/household sense of בֵּית.
- source_word: וּשְׁמוֹ שִׁמְעִי בֶן גֵּרָא
  chosen: whose name was Shimei son of Gera
  alternatives:
  - and his name was Shimei the son of Gera
  lexicon: HALOT
  rationale: Smooth English relative clause preserves the identifying formula without loss of content.
- source_word: יֹצֵא יָצוֹא
  chosen: he came out continually
  alternatives:
  - he kept coming out
  - coming out and coming out
  - he came out repeatedly
  lexicon: HALOT
  rationale: The participle plus infinitive absolute intensifies/iterates the action. 'Continually' captures the repeated or sustained force in idiomatic English.
- source_word: וּמְקַלֵּל
  chosen: cursing as he came
  alternatives:
  - and cursing
  - while cursing
  lexicon: HALOT
  rationale: The participle is contemporaneous with the repeated coming out; 'cursing as he came' expresses the ongoing accompanying action clearly.
