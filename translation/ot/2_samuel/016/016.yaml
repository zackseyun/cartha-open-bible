id: 2SA.16.16
reference: 2 Samuel 16:16
source:
  edition: WLC
  text: וַ/יְהִ֗י כַּֽ/אֲשֶׁר בָּ֞א חוּשַׁ֧י הָ/אַרְכִּ֛י רֵעֶ֥ה דָוִ֖ד אֶל אַבְשָׁל֑וֹם
    וַ/יֹּ֤אמֶר חוּשַׁי֙ אֶל אַבְשָׁלֹ֔ם יְחִ֥י הַ/מֶּ֖לֶךְ יְחִ֥י הַ/מֶּֽלֶךְ־־־׃
translation:
  text: And when Hushai the Archite, David’s friend, came to Absalom, Hushai said
    to Absalom, “Long live the king! Long live the king!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “May the king live!” The Hebrew is a royal acclamation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  chosen: And when
  alternatives:
  - Now when
  - And it happened when
  lexicon: HALOT
  rationale: The Hebrew narrative formula introduces the next event. 'And when' preserves
    the sequential force without the wooden English of 'and it happened when.'
- source_word: בָּא
  chosen: came
  alternatives:
  - entered
  - arrived
  lexicon: HALOT
  rationale: Common motion verb meaning 'came' fits the context of Hushai's arrival
    before Absalom.
- source_word: חוּשַׁי הָאַרְכִּי
  chosen: Hushai the Archite
  lexicon: HALOT
  rationale: Personal name is transliterated; the gentilic/title הָאַרְכִּי is rendered
    'the Archite,' the standard and natural English form.
- source_word: רֵעֶה דָוִד
  chosen: David’s friend
  alternatives:
  - friend of David
  - companion of David
  lexicon: HALOT
  rationale: Construct phrase indicating Hushai's relationship to David. 'David’s
    friend' is concise, natural English and preserves the political/personal sense.
- source_word: אֶל אַבְשָׁלוֹם
  chosen: to Absalom
  alternatives:
  - before Absalom
  lexicon: HALOT
  rationale: The preposition אֶל normally indicates motion or address toward someone;
    'to Absalom' works both for arrival and speech context here.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard rendering for אמר in direct speech introduction.
- source_word: יְחִי הַמֶּלֶךְ
  chosen: Long live the king!
  alternatives:
  - May the king live!
  - Let the king live!
  lexicon: HALOT
  rationale: Jussive חי in acclamatory context is best rendered idiomatically in English
    as 'Long live the king!' This preserves the force of a royal salute better than
    a more literal but less idiomatic wording.
- source_word: יְחִי הַמֶּלֶךְ (repeated)
  chosen: Long live the king!
  alternatives:
  - May the king live!
  lexicon: HALOT
  rationale: The repetition is retained because it is present in the Hebrew and conveys
    emphatic public acclamation, while also fitting the narrative irony of Hushai's
    ambiguous loyalty.
