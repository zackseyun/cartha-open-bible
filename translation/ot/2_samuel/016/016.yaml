theological_decisions:
- issue: Ambiguity of Hushai's acclamation toward Absalom
  chosen_reading: Retain the literal royal acclamation without interpretive expansion
  alternative_readings:
  - Render in a way that signals irony explicitly
  - Add wording to indicate deceptive intent
  rationale: The verse itself presents Hushai's words as a standard royal salute.
    Although the broader context reveals strategic ambiguity, the translation should
    preserve the narrative tension rather than resolve it by inserting irony into
    the wording.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
