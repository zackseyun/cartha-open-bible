id: 2SA.16.17
reference: 2 Samuel 16:17
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אַבְשָׁלוֹם֙ אֶל חוּשַׁ֔י זֶ֥ה חַסְדְּ/ךָ֖ אֶת רֵעֶ֑/ךָ לָ֥/מָּה לֹֽא הָלַ֖כְתָּ אֶת רֵעֶֽ/ךָ־־־־׃
translation:
  text: Absalom said to Hushai[a], “Is this your loyalty to your friend? Why did you not go with your friend?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kindness' or 'steadfast love' for 'loyalty' (Hebrew חֶסֶד).
    reason: lexical_alternative
lexical_decisions:
- source_word: חַסְדְּךָ
  chosen: your loyalty
  alternatives:
  - your kindness
  - your steadfast love
  lexicon: HALOT
  rationale: חֶסֶד can denote covenant loyalty, kindness, or faithful love. In this immediate context Absalom is accusing Hushai of failing in allegiance to David, so 'loyalty' best captures the relational and political sense without importing overtly theological covenant language.
- source_word: רֵעֶךָ
  chosen: your friend
  alternatives:
  - your companion
  - your associate
  lexicon: HALOT
  rationale: רֵעַ commonly means friend, companion, or associate. Here it refers to David from Absalom's perspective. 'Friend' is the most natural English rendering and fits the repeated accusation.
- source_word: לָמָּה לֹא הָלַכְתָּ אֶת רֵעֶךָ
  chosen: Why did you not go with your friend?
  alternatives:
  - Why did you not go with your companion?
  - Why did you not accompany your friend?
  lexicon: HALOT
  rationale: הלך with אֶת here expresses accompanying someone. 'Go with' is straightforward modern English and preserves the verbal simplicity of the Hebrew better than the more interpretive 'accompany.'
- source_word: זֶה חַסְדְּךָ אֶת רֵעֶךָ
  chosen: Is this your loyalty to your friend?
  alternatives:
  - Is this your kindness to your friend?
  - This is your loyalty to your friend?
  lexicon: HALOT
  rationale: The Hebrew is a verbless, rhetorical question. English idiom naturally supplies 'Is this...?' to convey Absalom's incredulous challenge. 'To your friend' reflects the relational force of אֶת here in the sense of conduct toward someone.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - asked
  lexicon: HALOT
  rationale: Although the content is interrogative, ויאמר is the standard narrative verb 'said.' English can preserve this while letting the quotation carry the question.
