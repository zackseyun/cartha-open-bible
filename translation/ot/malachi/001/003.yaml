theological_decisions:
- issue: Force of divine hatred toward Esau
  chosen_reading: Retain the direct wording 'I hated' in the main text without softening
    it.
  alternative_readings:
  - I rejected
  - I loved less
  rationale: The Hebrew verb plainly states hatred, and the translation philosophy
    requires preserving theological tension rather than resolving it. Interpretive
    softenings may reflect later theological explanation or intertextual nuance, but
    they should not replace the source text's direct expression here.
  doctrine_reference: Translation philosophy §1, §3
