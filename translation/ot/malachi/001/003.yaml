id: MAL.1.3
reference: Malachi 1:3
source:
  edition: WLC
  text: וְ/אֶת עֵשָׂ֖ו שָׂנֵ֑אתִי וָ/אָשִׂ֤ים אֶת הָרָי/ו֙ שְׁמָמָ֔ה וְ/אֶת נַחֲלָת֖/וֹ
    לְ/תַנּ֥וֹת מִדְבָּֽר־־־׃
translation:
  text: but Esau I hated, and I made his mountains a desolation and his inheritance
    for the jackals of the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I rejected' or 'I loved less.' The Hebrew verb normally means 'hate';
      these alternatives reflect interpretive attempts to express covenantal preference
      or rejection.
    reason: lexical_alternative
  - marker: b
    text: Or 'his hill country.'
    reason: lexical_alternative
  - marker: c
    text: Traditionally 'for the dragons of the wilderness'; the Hebrew likely refers
      to jackals.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂנֵאתִי
  chosen: I hated
  alternatives:
  - I rejected
  - I loved less
  lexicon: HALOT
  rationale: The verb שׂנא in the Qal normally means 'hate.' Although some contexts
    use covenantal/elective language that can imply rejection or preference, the plain
    lexical sense should be preserved in the main text. Softer paraphrases import
    interpretation beyond the Hebrew.
- source_word: וָאָשִׂים
  chosen: and I made
  alternatives:
  - and I set
  - and I turned
  lexicon: HALOT
  rationale: The verb שׂים commonly means 'put, set, make.' In this resultative construction
    with שְׁמָמָה, 'made' is idiomatic English and clearly conveys the caused state.
- source_word: הָרָיו
  chosen: his mountains
  alternatives:
  - his hill country
  lexicon: HALOT
  rationale: The plural of הַר is most directly 'mountains.' 'Hill country' is possible
    as a regional sense, but the plural possessive is naturally rendered 'his mountains'
    here.
- source_word: שְׁמָמָה
  chosen: a desolation
  alternatives:
  - desolate
  - wasteland
  - ruin
  lexicon: HALOT
  rationale: The noun denotes devastation/desolation. 'A desolation' preserves the
    nominal form and the solemn prophetic tone better than a flatter adjective.
- source_word: נַחֲלָתוֹ
  chosen: his inheritance
  alternatives:
  - his heritage
  - his land
  lexicon: HALOT
  rationale: נַחֲלָה often means inherited possession or heritage. 'Inheritance' keeps
    the covenant-land nuance without over-specifying.
- source_word: לְתַנּוֹת מִדְבָּר
  chosen: for the jackals of the wilderness
  alternatives:
  - for desert jackals
  - for dragons of the wilderness
  lexicon: HALOT
  rationale: תַנּוֹת is the plural of תַן, commonly understood as jackals in desolate
    places. 'Dragons' reflects older tradition but not current lexical consensus.
    The construct-like relation with מִדְבָּר is well rendered 'of the wilderness.'
- source_word: וְאֶת
  chosen: but
  alternatives:
  - and
  lexicon: Hebrew syntax
  rationale: Although the conjunction is formally 'and,' in context it contrasts Jacob
    with Esau from the previous verse. English idiom calls for 'but' to make the adversative
    force explicit.
