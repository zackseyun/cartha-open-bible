  text: בֵּ֛ן יְכַבֵּ֥ד אָ֖ב וְ/עֶ֣בֶד אֲדֹנָ֑י/ו וְ/אִם אָ֣ב אָ֣נִי אַיֵּ֣ה כְבוֹדִ֡/י וְ/אִם אֲדוֹנִ֣ים אָנִי֩ אַיֵּ֨ה מוֹרָאִ֜/י אָמַ֣ר יְהוָ֣ה צְבָא֗וֹת לָ/כֶם֙ הַ/כֹּֽהֲנִים֙ בּוֹזֵ֣י שְׁמִ֔/י וַ/אֲמַרְתֶּ֕ם בַּ/מֶּ֥ה בָזִ֖ינוּ אֶת שְׁמֶֽ/ךָ־־׀־׃
translation:
  text: 'A son honors his father, and a slave his master. If, then, I am a father, where is my honor? And if I am a master, where is the fear due me? says the LORD of Armies to you, O priests who despise my name. Yet you say, “How have we despised your name?”'
