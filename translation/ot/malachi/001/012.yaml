theological_decisions:
- issue: Referent of the object pronoun in 'you are profaning it'
  chosen_reading: The pronoun refers to the Lord's name (from the preceding verse/context), rendered impersonally as 'it.'
  alternative_readings:
  - The pronoun refers directly to the Lord, yielding 'profaning him.'
  rationale: Malachi 1:11 has just spoken of 'my name' being great among the nations, and v.12 contrasts that by saying the priests profane it. Translating with 'it' preserves the likely antecedent and avoids introducing a more personal object than the immediate discourse requires.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of the divine title אֲדֹנָי
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  rationale: The Hebrew form here is the title אֲדֹנָי rather than YHWH. The project's contested-terms guidance reserves 'the LORD' for YHWH and uses 'Lord' for the title.
  doctrine_reference: 'Contested terms: יְהוָה YHWH; κύριος/Kyrios default rendering'
