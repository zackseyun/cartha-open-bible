id: MAL.1.12
reference: Malachi 1:12
source:
  edition: WLC
  text: וְ/אַתֶּ֖ם מְחַלְּלִ֣ים אוֹת֑/וֹ בֶּ/אֱמָרְ/כֶ֗ם שֻׁלְחַ֤ן אֲדֹנָ/י֙ מְגֹאָ֣ל ה֔וּא וְ/נִיב֖/וֹ נִבְזֶ֥ה אָכְלֽ/וֹ׃
translation:
  text: But you are profaning it by saying[a], ‘The table of the Lord is defiled, and its fruit, its food[b], is despised.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you are profaning him,' if the pronoun is taken as referring directly to the Lord rather than to his name.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'its fruit, its food.' The phrase likely refers to the food offerings associated with the altar/table.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְחַלְּלִים
  chosen: are profaning
  alternatives:
  - are defiling
  - are desecrating
  - profane
  lexicon: HALOT
  rationale: From חלל in the piel, here meaning to treat as common/profane what is holy. 'Profaning' best preserves the cultic/religious force in context, stronger and more precise than the more generic 'defiling.'
- source_word: אוֹתוֹ
  chosen: it
  alternatives:
  - him
  lexicon: HALOT
  rationale: The direct object most naturally refers back to the Lord's name in the preceding context (Mal 1:11), which in English is idiomatically rendered 'it' when the antecedent is 'my name.' 'Him' is possible if taken personally of the Lord, but the immediate discourse centers on profaning his name.
- source_word: בֶּאֱמָרְכֶם
  chosen: by saying
  alternatives:
  - when you say
  - in that you say
  lexicon: HALOT
  rationale: 'The preposition with infinitive construct expresses means or attendant circumstance. ''By saying'' clearly conveys the instrumental sense: their profanation occurs through their speech.'
- source_word: שֻׁלְחַן אֲדֹנָי
  chosen: the table of the Lord
  alternatives:
  - the Lord's table
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the sacrificial/cultic image. 'Table of the Lord' is natural English and retains the genitival relationship without over-paraphrase.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: The consonantal text here reads אֲדֹנָי, not the Tetragrammaton. Per project guidance, κύριος/אדני-type divine title is rendered 'Lord.' Small-caps 'LORD' is reserved for YHWH.
- source_word: מְגֹאָל
  chosen: defiled
  alternatives:
  - polluted
  - unclean
  lexicon: HALOT
  rationale: From גאל in the passive participial sense 'defiled/polluted.' 'Defiled' is idiomatic and suitably weighty in sacrificial context.
- source_word: נִיבוֹ
  chosen: its fruit
  alternatives:
  - its produce
  - its yield
  lexicon: HALOT
  rationale: ניב commonly denotes produce/fruit. In this context it refers to what the altar/table provides or presents. 'Fruit' is the most direct lexical equivalent, while the following apposition clarifies the sense.
- source_word: נִבְזֶה
  chosen: is despised
  alternatives:
  - is contemptible
  - is treated with contempt
  lexicon: HALOT
  rationale: The niphal/passive-like adjective conveys that it is regarded as despicable. 'Is despised' is clear and natural in English.
- source_word: אָכְלוֹ
  chosen: its food
  alternatives:
  - its meal
  - what is eaten from it
  lexicon: HALOT
  rationale: Literally 'its food.' Because the relation between ניבו and אָכְלוֹ is compressed, rendering the second term appositionally ('its fruit—its food') preserves both Hebrew terms without flattening the syntax.
