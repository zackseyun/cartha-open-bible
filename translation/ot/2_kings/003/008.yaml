id: 2KI.3.8
reference: 2 Kings 3:8
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר אֵי זֶ֥ה הַ/דֶּ֖רֶךְ נַעֲלֶ֑ה וַ/יֹּ֕אמֶר דֶּ֖רֶךְ מִדְבַּ֥ר אֱדֽוֹם־׃
translation:
  text: And he said[a], “Which way shall we go up?” And he said, “By the way of the wilderness of Edom.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “By the road through the wilderness of Edom.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance from אמר, best rendered with simple past in English. 'And' preserves the Hebrew narrative sequencing without overinterpreting temporal nuance.
- source_word: אֵי זֶה
  chosen: Which
  alternatives:
  - Where is this
  - What
  lexicon: HALOT
  rationale: The interrogative phrase אֵי זֶה before הַדֶּרֶךְ idiomatically asks 'which' or 'which one' rather than a strictly locative 'where.' This yields natural English while matching the Hebrew sense.
- source_word: הַדֶּרֶךְ
  chosen: way
  alternatives:
  - road
  - route
  lexicon: HALOT
  rationale: דֶּרֶךְ can mean road, way, or route. 'Way' works idiomatically both in the question and answer and preserves lexical consistency across the verse.
- source_word: נַעֲלֶה
  chosen: shall we go up
  alternatives:
  - shall we march up
  - shall we ascend
  lexicon: HALOT
  rationale: עלה in military/travel context commonly means 'go up' or 'march up.' 'Go up' preserves the Hebrew verb directly and avoids adding military specificity not explicit in this clause.
- source_word: דֶּרֶךְ מִדְבַּר אֱדוֹם
  chosen: By the way of the wilderness of Edom
  alternatives:
  - By the road through the wilderness of Edom
  - By way of the Edomite wilderness
  lexicon: HALOT
  rationale: The verbless reply names the route. Supplying 'By' makes the English answer idiomatic. מִדְבַּר is best taken as 'wilderness' rather than 'desert' here, and the construct chain is preserved straightforwardly as 'the wilderness of Edom.'
- source_word: אֱדוֹם
  chosen: Edom
  lexicon: HALOT
  rationale: Standard English transliteration of the place name, in keeping with the philosophy of transliterating names.
