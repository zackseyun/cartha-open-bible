theological_decisions:
- issue: Sense of רָעָה in divine judgment
  chosen_reading: disaster
  alternative_readings:
  - evil
  - calamity
  rationale: The verse speaks of the LORD bringing punitive catastrophe, not moral evil in God. Rendering רָעָה as 'disaster' preserves the judgment sense without implying moral wrongdoing by God.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve the text''s plain sense without importing doctrinal claims.'
