id: 2KI.21.12
reference: 2 Kings 21:12
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּֽה אָמַ֤ר יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל הִנְ/נִי֙ מֵבִ֣יא רָעָ֔ה עַל יְרוּשָׁלִַ֖ם וִֽ/יהוּדָ֑ה אֲשֶׁר֙ כָּל שמעי/ו תִּצַּ֖לְנָה שְׁתֵּ֥י אָזְנָֽי/ו־־־׃
translation:
  text: 'Therefore[a], this is what Yahweh, the God of Israel, says: Behold, I am bringing disaster on Jerusalem and Judah[b], so that both ears of everyone who hears of it will tingle.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'calamity.' The Hebrew רָעָה here refers to disastrous judgment, not moral evil.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''both his ears will tingle,'' expressing shock or horror at the report.'
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks the statement as a consequence of the preceding context; 'Therefore' preserves the inferential force in natural English.
- source_word: כֹּה אָמַר
  chosen: this is what ... says
  alternatives:
  - thus says
  - so says
  lexicon: HALOT
  rationale: A standard prophetic messenger formula. 'This is what ... says' is more readable modern English while preserving the formal announcement.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase identifying the LORD covenantally.
- source_word: הִנְנִי
  chosen: Behold, I am
  alternatives:
  - Look, I am
  - See, I am
  lexicon: HALOT
  rationale: Retains the deictic and emphatic force of the Hebrew announcement. 'Behold' is slightly elevated but still concise and fitting for prophetic speech.
- source_word: מֵבִיא
  chosen: bringing
  alternatives:
  - about to bring
  - causing to come
  lexicon: HALOT
  rationale: The participle with הִנְנִי expresses imminent divine action. 'I am bringing' captures the vividness without over-interpreting temporality.
- source_word: רָעָה
  chosen: disaster
  alternatives:
  - evil
  - calamity
  lexicon: HALOT
  rationale: In judgment contexts this noun refers to calamity/disaster rather than moral evil. 'Disaster' communicates the sense clearly in modern English.
- source_word: עַל יְרוּשָׁלַם וִיהוּדָה
  chosen: on Jerusalem and Judah
  alternatives:
  - against Jerusalem and Judah
  - upon Jerusalem and Judah
  lexicon: HALOT
  rationale: '''On'' is a natural rendering of עַל here with the sense of judgment falling upon these places.'
- source_word: אֲשֶׁר
  chosen: such that
  alternatives:
  - which
  - so that
  lexicon: HALOT
  rationale: Introduces the result of the coming disaster; 'such that' makes the consequential force explicit in idiomatic English.
- source_word: כָּל שֹׁמְעָיו
  chosen: everyone who hears of it
  alternatives:
  - all who hear it
  - everyone hearing of it
  lexicon: HALOT
  rationale: The suffix most naturally refers to the reported disaster/judgment. English idiom prefers 'hears of it' for hearing news about an event.
- source_word: תִּצַּלְנָה שְׁתֵּי אָזְנָיו
  chosen: both ears ... will tingle
  alternatives:
  - both ears ... will ring
  - both ears ... will quiver
  lexicon: HALOT
  rationale: This is an idiom for a shocking, horrifying report (also in 1 Sam 3:11; Jer 19:3). 'Will tingle' is the established and semantically fitting English equivalent.
