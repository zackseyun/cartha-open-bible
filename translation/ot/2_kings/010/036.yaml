id: 2KI.10.36
reference: 2 Kings 10:36
source:
  edition: WLC
  text: וְ/הַ/יָּמִ֗ים אֲשֶׁ֨ר מָלַ֤ךְ יֵהוּא֙ עַל יִשְׂרָאֵ֔ל עֶשְׂרִ֥ים וּ/שְׁמֹנֶֽה
    שָׁנָ֖ה בְּ/שֹׁמְרֽוֹן־־׃פ
translation:
  text: Now the days that Jehu reigned over Israel in Samaria were twenty-eight years.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְהַיָּמִים
  chosen: The time
  alternatives:
  - The days
  - The period
  lexicon: HALOT
  rationale: Although literally 'the days,' this idiom introduces the duration of
    a reign. 'The time' communicates the idiomatic sense in natural English without
    obscuring the temporal reference.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  - during which
  lexicon: HALOT
  rationale: A simple relative pronoun best fits the Hebrew construction linking 'the
    time' with Jehu's reign.
- source_word: מָלַךְ
  chosen: reigned
  alternatives:
  - was king
  - ruled
  lexicon: HALOT
  rationale: The standard rendering of מלך in royal summary formulas is 'reigned.'
    It preserves the monarchical sense more precisely than the broader 'ruled.'
- source_word: יֵהוּא
  chosen: Jehu
  rationale: Personal names are transliterated by standard English convention.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - in Israel
  lexicon: HALOT
  rationale: The preposition עַל with מלך commonly indicates rule over a people or
    kingdom. 'Over Israel' is the most direct and idiomatic rendering.
- source_word: עֶשְׂרִים וּשְׁמֹנֶה שָׁנָה
  chosen: twenty-eight years
  alternatives:
  - twenty and eight years
  lexicon: HALOT
  rationale: This is the straightforward cardinal-number expression for the length
    of Jehu's reign. Modern English contracts the number naturally as 'twenty-eight
    years.'
- source_word: בְּשֹׁמְרוֹן
  chosen: in Samaria
  alternatives:
  - at Samaria
  lexicon: HALOT
  rationale: The phrase identifies the location of Jehu's reign, that is, his royal
    seat/capital. 'In Samaria' is the normal English rendering for the place name
    with בְּ.
