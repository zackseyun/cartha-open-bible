id: 2KI.6.22
reference: 2 Kings 6:22
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ לֹ֣א תַכֶּ֔ה הַ/אֲשֶׁ֥ר שָׁבִ֛יתָ בְּ/חַרְבְּ/ךָ֥ וּֽ/בְ/קַשְׁתְּ/ךָ֖ אַתָּ֣ה מַכֶּ֑ה שִׂים֩ לֶ֨חֶם וָ/מַ֜יִם לִ/פְנֵי/הֶ֗ם וְ/יֹֽאכְלוּ֙ וְ/יִשְׁתּ֔וּ וְ/יֵלְכ֖וּ אֶל אֲדֹנֵי/הֶֽם־׃
translation:
  text: But he said[a], “You shall not strike them down. Would you strike down those whom you have taken captive with your sword and with your bow? Set bread and water before them[b], so that they may eat and drink and go to their master.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Do you strike down those whom you have captured with your sword and your bow?' The Hebrew wording is rhetorical, reinforcing the command not to kill them.
    reason: alternative_reading
  - marker: b
    text: '''Bread and water'' may function idiomatically for basic provisions, but the Hebrew names these items explicitly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַכֶּה / מַכֶּה
  chosen: strike them down / do you strike down
  alternatives:
  - kill
  - attack
  - slay
  lexicon: HALOT
  rationale: The verb נכה commonly means to strike, smite, or kill depending on context. Here Elisha forbids execution of the captured Arameans and then frames a rhetorical question. 'Strike down' preserves the physical force and likely lethal sense without overcommitting to a more archaic 'slay.' The first instance is rendered with explicit object 'them' for natural English from context.
- source_word: הַאֲשֶׁר שָׁבִיתָ
  chosen: those whom you have taken captive
  alternatives:
  - those whom you have captured
  - your captives
  lexicon: HALOT
  rationale: שבה means to take captive, not merely to seize. 'Taken captive' preserves the military sense and explains the logic of the rhetorical question.
- source_word: בְּחַרְבְּךָ וּבְקַשְׁתְּךָ
  chosen: with your sword and with your bow
  alternatives:
  - by your sword and your bow
  lexicon: HALOT
  rationale: 'A formal rendering is appropriate because the paired weapons are part of the argument: these are not prisoners won in ordinary combat by the king himself.'
- source_word: שִׂים
  chosen: Set
  alternatives:
  - Place
  - Put
  lexicon: HALOT
  rationale: A direct imperative fits the concise Hebrew command and sounds natural in English.
- source_word: לֶחֶם וָמַיִם
  chosen: bread and water
  alternatives:
  - food and water
  lexicon: HALOT
  rationale: Although 'bread' can sometimes stand broadly for food, the Hebrew explicitly says 'bread and water.' Retaining the concrete terms preserves the source wording and the modest but hospitable provision.
- source_word: לִפְנֵיהֶם
  chosen: before them
  alternatives:
  - in front of them
  lexicon: HALOT
  rationale: This is the standard idiom for setting food before someone.
- source_word: וְיֹאכְלוּ וְיִשְׁתּוּ וְיֵלְכוּ
  chosen: so that they may eat and drink and go
  alternatives:
  - and let them eat and drink and go
  lexicon: HALOT
  rationale: The sequence expresses intended result following the imperative. 'So that they may' gives smooth English while preserving the purpose nuance.
- source_word: אֶל אֲדֹנֵיהֶם
  chosen: to their masters
  alternatives:
  - to their lord
  - to their master
  - to their masters/commanders
  lexicon: HALOT
  rationale: אדנים here refers to the Syrian captives' superiors. The plural suffix and military context favor 'their masters' or 'their lords.' 'Masters' is clear modern English for those in authority over them, without implying a singular royal referent.
