id: 2KI.15.31
reference: 2 Kings 15:31
source:
  edition: WLC
  text: וְ/יֶ֥תֶר דִּבְרֵי פֶ֖קַח וְ/כָל אֲשֶׁ֣ר עָשָׂ֑ה הִנָּ֣/ם כְּתוּבִ֗ים עַל
    סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יִשְׂרָאֵֽל־־־׃פ
translation:
  text: Now the rest of the acts of Pekah, and all that he did—behold, they are written
    in the Book of the Chronicles of the Kings of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the annals of the kings of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - As for the rest of
  lexicon: HALOT
  rationale: יֶתֶר means 'remainder, rest.' The prefixed conjunction can be rendered
    simply 'and,' but in this recurring regnal-summary formula, 'Now the rest of'
    gives natural English while preserving the transitional force.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - matters
  - deeds
  - events
  lexicon: HALOT
  rationale: Though literally 'words/matters,' in the formula 'the rest of the words/matters
    of [king]' it idiomatically refers to the king's recorded acts or affairs. 'Acts'
    is the clearest idiomatic English in this historiographic context.
- source_word: פֶקַח
  chosen: Pekah
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  chosen: and all that he did
  alternatives:
  - and everything that he did
  lexicon: HALOT
  rationale: A straightforward rendering of the relative clause, preserving the comprehensive
    scope of כָל and the simple verbal sense of עָשָׂה.
- source_word: הִנָּם
  chosen: behold, they are
  alternatives:
  - indeed they are
  - surely they are
  - are they not
  lexicon: HALOT
  rationale: 'הִנֵּה with pronominal suffix functions as a deictic-presentative: ''behold,
    they are.'' Retaining ''behold'' preserves the formal register and the formulaic
    emphasis of the Hebrew rather than flattening it to a bare copula.'
- source_word: כְּתוּבִים
  chosen: written
  alternatives:
  - recorded
  lexicon: HALOT
  rationale: Passive participle meaning 'written.' 'Written' preserves the concrete
    documentary sense; 'recorded' is possible but slightly more interpretive.
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  lexicon: HALOT
  rationale: Literally 'on the book/scroll,' but idiomatic English for documentary
    reference is 'in the Book.' 'Book' is conventional and understandable, while still
    reflecting סֵפֶר as a written record.
- source_word: דִּבְרֵי הַיָּמִים
  chosen: the Chronicles
  alternatives:
  - the events of the days
  - the annals
  lexicon: HALOT
  rationale: This expression in royal-summary formulas refers to annalistic records.
    'Chronicles' is a natural established equivalent here; capitalized within the
    title of the source document. 'Annals' is also possible, but 'Chronicles' fits
    the construct title smoothly.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  chosen: of the Kings of Israel
  alternatives:
  - for the kings of Israel
  lexicon: HALOT
  rationale: 'The prefixed ל in this title is best rendered idiomatically as part
    of a genitival title: ''of the Kings of Israel,'' not ''for,'' since the sense
    is the chronicle pertaining to Israel''s kings.'
