id: 2KI.15.21
reference: 2 Kings 15:21
source:
  edition: WLC
  text: וְ/יֶ֛תֶר דִּבְרֵ֥י מְנַחֵ֖ם וְ/כָל אֲשֶׁ֣ר עָשָׂ֑ה הֲ/לוֹא הֵ֣ם כְּתוּבִ֗ים עַל סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יִשְׂרָאֵֽל־־־׃
translation:
  text: Now the rest of the acts of Menahem[a], and all that he did, are they not written in the Book of the Chronicles of the Kings of Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the book of the annals of the kings of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - The remainder of
  lexicon: HALOT
  rationale: יֶתֶר means 'remainder, rest.' The prefixed conjunction is rendered 'Now' in this standard narrative-summary formula to produce natural English while preserving the transitional force.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: In the regnal formula 'the rest of the words/matters of X' the idiom refers to the king's recorded deeds or acts, not merely his spoken words. 'Acts' is idiomatic and contextually precise.
- source_word: מְנַחֵם
  chosen: Menahem
  rationale: Personal name transliterated by standard English convention, in keeping with the translation philosophy to transliterate names.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  chosen: and all that he did
  alternatives:
  - and everything that he did
  lexicon: HALOT
  rationale: A straightforward rendering of the relative clause; 'all that he did' preserves the formulaic style of the Hebrew.
- source_word: הֲלוֹא
  chosen: are they not
  alternatives:
  - is it not the case that
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting a positive answer. In English, 'are they not' matches the plural predicate with the implied subject ('the acts ... and all that he did').
- source_word: הֵם כְּתוּבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  - are they not inscribed
  lexicon: HALOT
  rationale: כְּתוּבִים is the passive participle 'written.' 'Written' is retained in the main text for formal transparency; 'recorded' would be a possible dynamic alternative.
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  lexicon: HALOT
  rationale: Although עַל is literally 'on/upon,' in this archival formula English idiom prefers 'in the Book.' 'Book' is conventional for סֵפֶר here, referring to an official written record.
- source_word: סֵפֶר דִּבְרֵי הַיָּמִים
  chosen: the Book of the Chronicles
  alternatives:
  - the book of the annals
  - the book of the events of the days
  lexicon: HALOT
  rationale: This phrase denotes an official annalistic record. 'Chronicles' is the familiar and accurate rendering in this formula, though 'annals' is also possible.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  chosen: of the Kings of Israel
  alternatives:
  - belonging to the kings of Israel
  - for the kings of Israel
  lexicon: HALOT
  rationale: The ל here is best taken as marking relation within the title of the source document. 'Of the Kings of Israel' is the standard and natural English rendering.
