id: 2KI.15.15
reference: 2 Kings 15:15
source:
  edition: WLC
  text: וְ/יֶ֨תֶר֙ דִּבְרֵ֣י שַׁלּ֔וּם וְ/קִשְׁר֖/וֹ אֲשֶׁ֣ר קָשָׁ֑ר הִנָּ֣/ם כְּתֻבִ֗ים עַל סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יִשְׂרָאֵֽל־׃ס
translation:
  text: Now the rest of the acts of Shallum[a], and the conspiracy that he conspired—behold[c][b], they are written in the Book of the Chronicles of the Kings of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and his plot that he plotted.' The Hebrew uses a cognate noun-verb construction for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'behold, they are written'; the expression is a formulaic pointer to the royal records.
    reason: lexical_alternative
  - marker: c
    text: That is, the official royal annals/source record cited throughout Kings.
    reason: cultural_note
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - The remainder of
  lexicon: HALOT
  rationale: יֶתֶר in this recurring regnal formula means 'the rest/remainder.' Rendering with 'Now the rest of' fits the narrative-summary style in English while preserving the formulaic sense.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: In the formula 'the rest of the words/matters of X,' דִּבְרֵי idiomatically refers to the recorded acts or affairs of a king, not merely his spoken words. 'Acts' is the most natural established equivalent here.
- source_word: שַׁלּוּם
  chosen: Shallum
  rationale: Personal name transliterated according to standard English convention, per translation philosophy.
- source_word: וְקִשְׁרוֹ
  chosen: and his conspiracy
  alternatives:
  - and his plot
  - and his treason
  lexicon: HALOT
  rationale: The noun from קשר denotes a conspiracy or plot. 'Conspiracy' best matches the political context and preserves the formal tone.
- source_word: אֲשֶׁר קָשָׁר
  chosen: that he conspired
  alternatives:
  - which he plotted
  - that he made
  lexicon: HALOT
  rationale: The Hebrew repeats the cognate verb after the noun ('his conspiracy which he conspired/plotted'). Keeping 'that he conspired' preserves the emphatic Hebrew construction better than smoothing it away entirely.
- source_word: הִנָּם
  chosen: behold, they are
  alternatives:
  - indeed they are
  - see, they are
  - they are
  lexicon: HALOT
  rationale: הִנָּם is a deictic particle meaning 'behold' with plural pronominal force. Including 'behold' preserves the formulaic demonstrative emphasis, though it is somewhat formal in English.
- source_word: כְּתֻבִים
  chosen: written
  alternatives:
  - recorded
  lexicon: HALOT
  rationale: Passive participle meaning 'written.' 'Written' is the direct and standard rendering in this archival formula.
- source_word: עַל סֵפֶר דִּבְרֵי הַיָּמִים
  chosen: in the Book of the Chronicles
  alternatives:
  - on the scroll/book of the events of the days
  - in the book of the annals
  lexicon: HALOT
  rationale: This is the standard title for the royal record source cited in Kings. 'In the Book of the Chronicles' communicates the idiomatic sense clearly; 'in' is more natural than a wooden 'on' in English for material contained in a book.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  chosen: of the Kings of Israel
  alternatives:
  - for the kings of Israel
  lexicon: HALOT
  rationale: In this source-title formula, ל marks relation rather than purpose; 'of the Kings of Israel' is the idiomatic English rendering of the archival title.
