id: 2KI.15.2
reference: 2 Kings 15:2
source:
  edition: WLC
  text: בֶּן שֵׁ֨שׁ עֶשְׂרֵ֤ה שָׁנָה֙ הָיָ֣ה בְ/מָלְכ֔/וֹ וַ/חֲמִשִּׁ֤ים וּ/שְׁתַּ֨יִם֙
    שָׁנָ֔ה מָלַ֖ךְ בִּ/ירוּשָׁלִָ֑ם וְ/שֵׁ֣ם אִמּ֔/וֹ יְכָלְיָ֖הוּ מִ/ירוּשָׁלִָֽם־׃
translation:
  text: He was sixteen years old when he became king, and he reigned fifty-two years
    in Jerusalem. His mother’s name was Jecoliah of Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from Jerusalem.”
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן שֵׁשׁ עֶשְׂרֵה שָׁנָה
  chosen: sixteen years old
  alternatives:
  - a son of sixteen years
  - sixteen years of age
  lexicon: HALOT
  rationale: Hebrew idiom literally reads 'a son of sixteen years,' a standard age
    formula. Natural English requires 'sixteen years old' while preserving the precise
    age.
- source_word: הָיָה בְמָלְכוֹ
  chosen: when he became king
  alternatives:
  - at his becoming king
  - when he began to reign
  lexicon: HALOT
  rationale: The construction marks his age at accession. 'When he became king' is
    clear modern English and accurately conveys the temporal sense.
- source_word: וַחֲמִשִּׁים וּשְׁתַּיִם שָׁנָה
  chosen: fifty-two years
  alternatives:
  - fifty and two years
  lexicon: HALOT
  rationale: Standard English rendering of the numeral phrase.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  - he ruled as king
  lexicon: HALOT
  rationale: In regnal formulas, מלך is best rendered 'reigned,' the conventional
    and accurate English equivalent.
- source_word: בִּירוּשָׁלָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Locative preposition indicates the place of reign.
- source_word: וְשֵׁם אִמּוֹ
  chosen: His mother’s name was
  alternatives:
  - and the name of his mother was
  lexicon: HALOT
  rationale: This is a common formula in Kings. The chosen rendering is idiomatic
    English while preserving the informational content.
- source_word: יְכָלְיָהוּ
  chosen: Jecoliah
  alternatives:
  - Jecholiah
  - Yekholyahu
  lexicon: HALOT
  rationale: A standard English transliteration of the personal name, following common
    conventions for Hebrew names rather than a hyper-literal transliteration.
- source_word: מִירוּשָׁלָם
  chosen: of Jerusalem
  alternatives:
  - from Jerusalem
  lexicon: HALOT
  rationale: The preposition מן can mean 'from,' but in this genealogical notice 'of
    Jerusalem' is more idiomatic in English and conveys provenance or hometown without
    implying motion.
