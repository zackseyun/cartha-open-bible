id: 2KI.15.11
reference: 2 Kings 15:11
source:
  edition: WLC
  text: וְ/יֶ֖תֶר דִּבְרֵ֣י זְכַרְיָ֑ה הִנָּ֣/ם כְּתוּבִ֗ים עַל סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים
    לְ/מַלְכֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: Now the rest of the acts of Zechariah—behold, they are written in the Book
    of the Chronicles of the Kings of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the annals of the kings of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - The remainder of
  lexicon: HALOT
  rationale: יֶתֶר commonly introduces the remaining matters of a king's reign in
    Kings. Rendering with 'the rest of' preserves the formulaic historiographical
    style; 'Now' smoothly represents the prefixed conjunction in readable English.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: In the recurring royal-summary formula, דִּבְרֵי often refers broadly
    to the deeds/matters of a reign rather than spoken words alone. 'Acts' is idiomatic
    and fits the context of annalistic record.
- source_word: זְכַרְיָה
  chosen: Zechariah
  alternatives:
  - Zekaryah
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: הִנָּם
  chosen: behold, they are
  alternatives:
  - indeed they are
  - see, they are
  lexicon: HALOT
  rationale: הִנֵּה/הִנָּם is a deictic particle drawing attention. 'Behold' preserves
    the marked, formulaic emphasis of the Hebrew better than omitting it entirely,
    while remaining understandable in this solemn register.
- source_word: כְּתוּבִים
  chosen: written
  alternatives:
  - recorded
  lexicon: HALOT
  rationale: The passive participle straightforwardly means 'written.' 'Recorded'
    is possible, but 'written' more directly reflects the Hebrew.
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  lexicon: HALOT
  rationale: Although עַל is literally 'on/upon,' in this archival formula English
    idiom is best served by 'in the Book.' 'Scroll' is possible for סֵפֶר, but 'Book'
    is the conventional and natural rendering in this formula.
- source_word: דִּבְרֵי הַיָּמִים
  chosen: the Chronicles
  alternatives:
  - the events of the days
  - the annals
  lexicon: HALOT
  rationale: This expression is the standard title-like designation for royal annals.
    'Chronicles' is concise and idiomatic; 'annals' is also accurate but less familiar
    for general readers.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  chosen: of the Kings of Israel
  alternatives:
  - belonging to the kings of Israel
  - for the kings of Israel
  lexicon: HALOT
  rationale: The לְ here functions in the established title of the source document.
    'Of the Kings of Israel' is the most natural English representation of the construct-like
    relationship in this formula.
