theological_decisions:
- issue: Meaning of 'his father' in 'David his father'
  chosen_reading: dynastic ancestor rather than immediate biological father
  alternative_readings:
  - immediate father
  rationale: In royal formulas, 'father' can denote an ancestor within the Davidic line. Since Jotham's immediate father was Uzziah/Azariah, the phrase must refer to David as forefather. The translation preserves the Hebrew wording while understanding the kinship term in its dynastic sense.
