id: 2KI.15.38
reference: 2 Kings 15:38
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֤ב יוֹתָם֙ עִם אֲבֹתָ֔י/ו וַ/יִּקָּבֵר֙ עִם אֲבֹתָ֔י/ו בְּ/עִ֖יר דָּוִ֣ד אָבִ֑י/ו וַ/יִּמְלֹ֛ךְ אָחָ֥ז בְּנ֖/וֹ תַּחְתָּֽי/ו־־׃פ
translation:
  text: And Jotham lay down with his fathers and was buried with his fathers in the city of David his father[b][a], and Ahaz his son reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with his ancestors.' The Hebrew literally says 'with his fathers' in a standard royal death formula.
    reason: lexical_alternative
  - marker: b
    text: '''David his father'' uses ''father'' in the sense of forefather or dynastic ancestor, not immediate biological father.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: lay down
  alternatives:
  - slept
  - rested
  lexicon: HALOT
  rationale: The idiom שׁכב with 'with his fathers' is a standard death formula. 'Lay down' preserves the Hebrew imagery more transparently than the traditional but potentially euphemistic 'slept,' while the following burial clause makes the meaning clear.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: A conventional royal obituary formula. 'Fathers' is retained for formal correspondence and because it reflects the dynastic/ancestral sense of the Hebrew; 'ancestors' is possible but less literal.
- source_word: וַיִּקָּבֵר
  chosen: was buried
  alternatives:
  - and he was buried
  lexicon: HALOT
  rationale: Passive rendering matches the Hebrew verbal form and keeps the sequence of events clear in natural English.
- source_word: בְּעִיר דָּוִד אָבִיו
  chosen: in the city of David his father
  alternatives:
  - in the city of David, his father
  - in David's city, his ancestor
  lexicon: HALOT
  rationale: The phrase most naturally identifies David as Jotham's dynastic father/ancestor. The appositional wording is kept close to the Hebrew. A comma is omitted in the main text to preserve flow, though the sense is 'David, his father' in the broader ancestral sense.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: Standard rendering for מלך in royal succession notices. 'Reigned' is concise and idiomatic; the context already implies succession.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: Idiomatic English for succession that accurately reflects the sense of replacement/succession in the Hebrew preposition.
