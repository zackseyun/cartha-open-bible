id: 2KI.15.26
reference: 2 Kings 15:26
source:
  edition: WLC
  text: וְ/יֶ֛תֶר דִּבְרֵ֥י פְקַחְיָ֖ה וְ/כָל אֲשֶׁ֣ר עָשָׂ֑ה הִנָּ֣/ם כְּתוּבִ֗ים
    עַל סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יִשְׂרָאֵֽל־־׃פ
translation:
  text: Now the rest of the acts of Pekahiah, and all that he did, behold, they are
    written in the Book of the Chronicles of the Kings of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And the rest of the acts of Pekahiah ... indeed they are written in
      the annals of the kings of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - The rest of
  lexicon: HALOT
  rationale: יֶתֶר in this formulaic regnal-summary context means 'the remainder/rest.'
    The prefixed conjunction can be rendered simply 'and,' but 'now' is a natural
    English discourse marker in this recurring narrative formula without changing
    sense.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: In the expression 'the rest of the words/matters of X' within Kings,
    דִּבְרֵי idiomatically refers to the recorded acts or affairs of a king, not merely
    his spoken words. 'Acts' is the standard idiomatic English equivalent here.
- source_word: פְקַחְיָה
  chosen: Pekahiah
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  chosen: and all that he did
  alternatives:
  - and all that he accomplished
  - and everything he did
  lexicon: HALOT
  rationale: A straightforward rendering of the relative clause. 'Did' preserves the
    broad scope of עשה without over-specifying accomplishment or achievement.
- source_word: הִנָּם
  chosen: behold, they are
  alternatives:
  - indeed they are
  - surely they are
  - they are
  lexicon: HALOT
  rationale: הִנָּם is a presentational particle plus pronominal suffix, drawing attention
    to what follows. 'Behold' preserves the formal rhetorical force; omission would
    be smoother English but would lose a marked element of the Hebrew.
- source_word: כְּתוּבִים
  chosen: written
  alternatives:
  - recorded
  lexicon: HALOT
  rationale: Passive participle meaning 'written.' 'Recorded' is possible idiomatically,
    but 'written' stays closer to the Hebrew while remaining natural in this archival
    formula.
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  lexicon: HALOT
  rationale: Although עַל is literally 'on/upon,' in this documentary formula English
    idiom prefers 'written in the book.' 'Book' is conventional for סֵפֶר here, though
    a physical scroll is historically possible.
- source_word: דִּבְרֵי הַיָּמִים
  chosen: the Chronicles
  alternatives:
  - the events of the days
  - the annals
  lexicon: HALOT
  rationale: This construct phrase is the established designation for an annalistic
    record. 'Chronicles' is concise and idiomatic in English; 'annals' is also possible
    but less familiar for general readers.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  chosen: of the Kings of Israel
  alternatives:
  - belonging to the kings of Israel
  - for the kings of Israel
  lexicon: HALOT
  rationale: The prefixed ל in this title-like expression is best rendered idiomatically
    as 'of,' yielding the standard archival title 'the Book of the Chronicles of the
    Kings of Israel.'
