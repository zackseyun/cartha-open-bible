id: 2KI.15.7
reference: 2 Kings 15:7
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֤ב עֲזַרְיָה֙ עִם אֲבֹתָ֔י/ו וַ/יִּקְבְּר֥וּ אֹת֛/וֹ עִם אֲבֹתָ֖י/ו
    בְּ/עִ֣יר דָּוִ֑ד וַ/יִּמְלֹ֛ךְ יוֹתָ֥ם בְּנ֖/וֹ תַּחְתָּֽי/ו־־׃פ
translation:
  text: And Azariah slept with his fathers, and they buried him with his fathers in
    the city of David. And Jotham his son reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with his ancestors.' The Hebrew idiom 'slept with his fathers' is a
      conventional way of referring to death and burial among prior generations.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: slept
  alternatives:
  - lay down
  - died
  lexicon: HALOT
  rationale: In the idiom 'slept with his fathers,' the verb is conventionally rendered
    'slept' to preserve the Hebrew euphemism for death rather than flattening it to
    'died.'
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: A formal rendering preserves the stock royal-burial formula and its intergenerational
    nuance. 'Ancestors' is possible but less literal and less idiomatic in this formula.
- source_word: וַיִּקְבְּרוּ אֹתוֹ
  chosen: they buried him
  alternatives:
  - he was buried
  lexicon: HALOT
  rationale: The Hebrew has an active plural verb with unspecified subject; English
    commonly renders this as 'they buried him,' preserving the narrative form better
    than a passive.
- source_word: בְּעִיר דָּוִד
  chosen: in the city of David
  alternatives:
  - in David's city
  lexicon: HALOT
  rationale: This is the standard place-name expression in English Bible style and
    clearly identifies the royal burial location.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: The verb means 'to reign/be king.' In this succession formula, 'reigned'
    is concise and natural; English does not require explicit ingressive force here.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: '''In his place'' best captures succession to office. ''After him'' is
    temporally true but weaker; ''instead of him'' can sound adversative in English.'
