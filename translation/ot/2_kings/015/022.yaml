id: 2KI.15.22
reference: 2 Kings 15:22
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֥ב מְנַחֵ֖ם עִם אֲבֹתָ֑י/ו וַ/יִּמְלֹ֛ךְ פְּקַחְיָ֥ה בְנ֖/וֹ תַּחְתָּֽי/ו־׃פ
translation:
  text: And Menahem lay down with his fathers, and Pekahiah his son reigned in his
    place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'slept with his fathers.' The Hebrew idiom is a standard formula for
      a king's death and succession.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: lay down
  alternatives:
  - slept
  - died
  lexicon: HALOT
  rationale: The idiom שׁכב with 'with his fathers' is a standard royal death formula.
    'Lay down' preserves the Hebrew imagery more transparently than the traditional
    'slept,' while avoiding over-paraphrasing to simply 'died.' The death sense is
    supplied by the full idiom in context.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: This is the conventional Hebrew burial/death formula. 'With his fathers'
    preserves the idiomatic and dynastic sense of the source text better than the
    more interpretive 'with his ancestors.'
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: In regnal formulas, מלך is naturally rendered 'reigned.' Although the
    form can mark accession, English narrative style is best served by 'reigned' here,
    with the succession context making the accession clear.
- source_word: פְּקַחְיָה
  chosen: Pekahiah
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: בְּנוֹ
  chosen: his son
  lexicon: HALOT
  rationale: Straightforward filial designation; retained explicitly because it is
    part of the succession notice.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - after him
  - instead of him
  lexicon: HALOT
  rationale: '''In his place'' is the most natural English rendering in a royal succession
    formula and accurately conveys replacement/succession without awkwardness.'
