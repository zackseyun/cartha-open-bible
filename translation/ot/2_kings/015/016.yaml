id: 2KI.15.16
reference: 2 Kings 15:16
source:
  edition: WLC
  text: אָ֣ז יַכֶּֽה מְ֠נַחֵם אֶת תִּפְסַ֨ח וְ/אֶת כָּל אֲשֶׁר בָּ֤/הּ וְ/אֶת גְּבוּלֶ֨י/הָ֙ מִ/תִּרְצָ֔ה כִּ֛י לֹ֥א פָתַ֖ח וַ/יַּ֑ךְ אֵ֛ת כָּל הֶ/הָ֥רוֹתֶ֖י/הָ בִּקֵּֽעַ־־־־־־־׃פ
translation:
  text: Then Menahem struck Tiphsah[a], and all who were in it, and its territory from Tirzah, because it had not opened to him; and he struck it[c][b], ripping open all its pregnant women.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all that was in it.' The Hebrew phrase can be read broadly, though in context it likely includes the inhabitants of the city.
    reason: lexical_alternative
  - marker: b
    text: '''Opened'' refers to opening the city to Menahem, that is, refusing to surrender or admit him.'
    reason: cultural_note
  - marker: c
    text: Or 'split open' or 'tore open.' The Hebrew verb denotes violently opening by force.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal/sequential adverb introducing the next event in the narrative. 'Then' is the most natural narrative connector in English.
- source_word: יַכֶּה / וַיַּךְ
  chosen: struck
  alternatives:
  - attacked
  - smote
  lexicon: HALOT
  rationale: From נכה, a common verb for striking/attacking. 'Struck' preserves the concrete violence while fitting English narrative style. Using the same gloss for both forms preserves consistency.
- source_word: תִּפְסַח
  chosen: Tiphsah
  alternatives:
  - Tappuah? (not supported here)
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated, per project philosophy.
- source_word: כָּל אֲשֶׁר בָּהּ
  chosen: all who were in it
  alternatives:
  - everything in it
  - all that was in it
  lexicon: HALOT
  rationale: The phrase can be broad, but in a military sack context it naturally includes inhabitants. 'All who were in it' foregrounds the people affected, while the following phrase separately mentions the territory.
- source_word: גְּבוּלֶיהָ
  chosen: its territory
  alternatives:
  - its borders
  - its surrounding region
  lexicon: HALOT
  rationale: גְּבוּל can mean border/territory. Here, with 'from Tirzah,' the sense is the city's dependent region or territorial extent, not merely boundary lines.
- source_word: מִתִּרְצָה
  chosen: from Tirzah
  alternatives:
  - starting from Tirzah
  lexicon: HALOT
  rationale: The preposition מן is rendered straightforwardly as 'from.' The phrase likely indicates the point from which Menahem launched the attack or the territorial relation in the narrative.
- source_word: כִּי לֹא פָתַח
  chosen: because it had not opened to him
  alternatives:
  - because it did not open
  - because they did not open the city to him
  lexicon: HALOT
  rationale: פתח here refers to opening the city/gates in surrender. The Hebrew subject is singular, matching the city as a collective. 'To him' is supplied in English because the context implies refusal to admit Menahem.
- source_word: הֶהָרוֹתֶיהָ
  chosen: its pregnant women
  alternatives:
  - the women pregnant within it
  lexicon: HALOT
  rationale: Adjective/substantive from הרה, 'pregnant.' The possessive suffix ties them to the city. The direct, modern phrasing best communicates the horror without euphemism.
- source_word: בִּקֵּעַ
  chosen: ripping open
  alternatives:
  - split open
  - tore open
  lexicon: HALOT
  rationale: בקע in the Piel denotes violent splitting/opening. 'Ripping open' is vivid and idiomatic in English, matching the brutality of the act.
