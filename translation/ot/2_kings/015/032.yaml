id: 2KI.15.32
reference: 2 Kings 15:32
source:
  edition: WLC
  text: בִּ/שְׁנַ֣ת שְׁתַּ֔יִם לְ/פֶ֥קַח בֶּן רְמַלְיָ֖הוּ מֶ֣לֶךְ יִשְׂרָאֵ֑ל מָלַ֛ךְ
    יוֹתָ֥ם בֶּן עֻזִיָּ֖הוּ מֶ֥לֶךְ יְהוּדָֽה־־׃
translation:
  text: In the second year of Pekah son of Remaliah, king of Israel, Jotham son of
    Uzziah, king of Judah, became king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'began to reign.' The Hebrew verb can denote accession to kingship or
      the start of a reign.
    reason: lexical_alternative
  - marker: b
    text: Uzziah is elsewhere also called Azariah.
    reason: cross_reference
lexical_decisions:
- source_word: בִּ/שְׁנַת
  chosen: In the ... year of
  alternatives:
  - In the year of
  - During the year of
  lexicon: HALOT
  rationale: The preposition ב plus שְׁנַת introduces a regnal-year dating formula.
    English idiom naturally renders this as 'In the ... year of'.
- source_word: שְׁתַּיִם
  chosen: second
  alternatives:
  - two
  lexicon: HALOT
  rationale: Although formally the cardinal 'two,' in Hebrew regnal formulas it functions
    idiomatically for the ordinal sense 'second' with 'year.'
- source_word: לְ/פֶקַח
  chosen: of Pekah
  alternatives:
  - belonging to Pekah
  - for Pekah
  lexicon: HALOT
  rationale: The preposition ל marks the person whose regnal year is being counted;
    in English this is best expressed simply as 'of Pekah' in the dating formula.
- source_word: בֶּן רְמַלְיָהוּ
  chosen: son of Remaliah
  lexicon: HALOT
  rationale: Standard patronymic construction; retained formally for historical precision.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  lexicon: HALOT
  rationale: Straightforward royal title identifying Pekah's realm.
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - began to reign
  - reigned
  lexicon: HALOT
  rationale: The verb means 'to become king/reign.' In accession notices, 'became
    king' clearly conveys enthronement, while 'began to reign' is also possible. 'Reigned'
    alone can sound durative rather than ingressive.
- source_word: יוֹתָם
  chosen: Jotham
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
- source_word: בֶּן עֻזִיָּהוּ
  chosen: son of Uzziah
  alternatives:
  - son of Azariah
  lexicon: HALOT
  rationale: The Hebrew here reads עֻזִיָּהוּ, conventionally 'Uzziah.' 'Azariah'
    is a known alternate name for the same king elsewhere, but this verse specifically
    uses 'Uzziah,' so that form is retained.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Appositional royal title identifying Jotham's realm. Retained explicitly
    rather than smoothing away, since it is present in the Hebrew.
