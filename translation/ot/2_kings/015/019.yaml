id: 2KI.15.19
reference: 2 Kings 15:19
source:
  edition: WLC
  text: בָּ֣א פ֤וּל מֶֽלֶךְ אַשּׁוּר֙ עַל הָ/אָ֔רֶץ וַ/יִּתֵּ֤ן מְנַחֵם֙ לְ/פ֔וּל אֶ֖לֶף כִּכַּר כָּ֑סֶף לִ/הְי֤וֹת יָדָי/ו֙ אִתּ֔/וֹ לְ/הַחֲזִ֥יק הַ/מַּמְלָכָ֖ה בְּ/יָדֽ/וֹ־־־׃
translation:
  text: Pul king of Assyria came against the land[b][a], and Menahem gave Pul a thousand talents of silver so that his hand might be with him to strengthen the kingdom in his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'so that he might support him in strengthening the kingdom under his control.' The Hebrew reads literally, 'so that his hand might be with him to strengthen the kingdom in his hand.'
    reason: lexical_alternative
  - marker: b
    text: '''The land'' likely refers to the land of Israel.'
    reason: cultural_note
lexical_decisions:
- source_word: בָּא
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: Qal perfect of בוא in narrative commonly denotes coming/arrival. 'Came' is the natural narrative rendering.
- source_word: פ֤וּל
  chosen: Pul
  rationale: Personal name; per philosophy, names are transliterated rather than translated.
- source_word: מֶֽלֶךְ אַשּׁוּר
  chosen: king of Assyria
  alternatives:
  - the Assyrian king
  lexicon: HALOT
  rationale: Construct chain is most directly rendered 'king of Assyria.' This preserves the Hebrew syntax and identifies Pul's office.
- source_word: עַל הָאָרֶץ
  chosen: against the land
  alternatives:
  - against the הארץ
  - against the country
  lexicon: HALOT
  rationale: With על after verbs of military movement, the sense is hostile advance 'against.' 'The land' is a standard rendering of הארץ here, likely referring to the land of Israel; keeping 'the land' preserves the Hebrew's terseness without over-specifying.
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - paid
  lexicon: HALOT
  rationale: נתן literally means 'gave.' Although the context is tribute/bribery, 'gave' preserves the lexical form while allowing the reader to infer the political nature from context.
- source_word: אֶלֶף כִּכַּר כָּסֶף
  chosen: a thousand talents of silver
  lexicon: HALOT
  rationale: Standard weight-and-metal expression. 'Talent' is the conventional English rendering for ככר in monetary/weight contexts.
- source_word: לִהְיוֹת יָדוֹ אִתּוֹ
  chosen: so that his hand might be with him
  alternatives:
  - so that he might support him
  - for his support to be with him
  lexicon: HALOT
  rationale: The idiom literally speaks of one's hand being with another, conveying support or backing. The main text keeps the Hebrew image ('his hand ... with him') because the following infinitive clarifies the political support involved.
- source_word: לְהַחֲזִיק
  chosen: to strengthen
  alternatives:
  - to support
  - to make firm
  - to hold fast
  lexicon: HALOT
  rationale: Hiphil of חזק here means to make firm/strengthen. In context it refers to consolidating Menahem's rule. 'Strengthen' is both readable and close to the Hebrew.
- source_word: הַמַּמְלָכָה
  chosen: the kingdom
  alternatives:
  - the kingship
  - the royal rule
  lexicon: HALOT
  rationale: ממלכה can denote kingdom or reign. 'Kingdom' is the most straightforward rendering and fits the political context.
- source_word: בְּיָדוֹ
  chosen: in his hand
  alternatives:
  - under his control
  - in his power
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'in his hand,' denoting possession/control. Retaining the idiom preserves the source texture; the preceding clause makes the sense intelligible.
