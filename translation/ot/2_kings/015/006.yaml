id: 2KI.15.6
reference: 2 Kings 15:6
source:
  edition: WLC
  text: וְ/יֶ֛תֶר דִּבְרֵ֥י עֲזַרְיָ֖הוּ וְ/כָל אֲשֶׁ֣ר עָשָׂ֑ה הֲ/לֹא הֵ֣ם כְּתוּבִ֗ים עַל סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יְהוּדָֽה־־־׃
translation:
  text: Now the rest of the acts of Azariah[a], and all that he did[b], are they not written in the Book of the Chronicles of the Kings of Judah?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'recorded' instead of 'written' for הֵם כְּתוּבִים; the main text keeps the more literal wording.
    reason: lexical_alternative
  - marker: b
    text: '''The Book of the Chronicles of the Kings of Judah'' refers to a royal record or annal source cited throughout Kings.'
    reason: cultural_note
lexical_decisions:
- source_word: יֶתֶר
  chosen: the rest of
  alternatives:
  - the remainder of
  lexicon: HALOT
  rationale: Idiomatic formula in Kings referring to remaining matters not narrated here; 'the rest of' is standard, natural English and preserves the archival sense.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: In the regnal-summary formula 'rest of the words/matters of X ... and all that he did,' English 'acts' best captures the historical record of a king's deeds rather than mere speech.
- source_word: עֲזַרְיָהוּ
  chosen: Azariah
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  chosen: and all that he did
  alternatives:
  - and all that he accomplished
  lexicon: HALOT
  rationale: Straightforward rendering of the relative clause; 'did' is broad and fits the formulaic historical style.
- source_word: הֲלֹא
  chosen: are they not
  alternatives:
  - surely they are
  - are they not indeed
  lexicon: HALOT
  rationale: Preserves the Hebrew rhetorical question introducing the citation formula.
- source_word: הֵם כְּתוּבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  lexicon: HALOT
  rationale: '''Written'' is the direct sense of כְּתוּבִים; retained in the main text for transparency to the source, though ''recorded'' is a viable idiomatic alternative.'
- source_word: עַל־סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  lexicon: HALOT
  rationale: Although literally 'on/upon the book/scroll,' English archival idiom prefers 'written in the Book.' 'Book' is conventional and understandable for סֵפֶר here.
- source_word: דִּבְרֵי הַיָּמִים
  chosen: the Chronicles
  alternatives:
  - the annals
  - the events of the days
  lexicon: HALOT
  rationale: This phrase names a royal record source. 'Chronicles' is the established and accurate rendering in this archival context; 'annals' is possible but less directly tied to the Hebrew expression.
- source_word: לְמַלְכֵי יְהוּדָה
  chosen: of the Kings of Judah
  alternatives:
  - for the kings of Judah
  lexicon: HALOT
  rationale: In this source-title formula, ל has a genitival/title function best rendered 'of.' Capitalization of 'Kings' is stylistic within the formal title of the source document.
