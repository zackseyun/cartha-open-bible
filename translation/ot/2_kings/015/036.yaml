id: 2KI.15.36
reference: 2 Kings 15:36
source:
  edition: WLC
  text: וְ/יֶ֛תֶר דִּבְרֵ֥י יוֹתָ֖ם אֲשֶׁ֣ר עָשָׂ֑ה הֲ/לֹא הֵ֣ם כְּתוּבִ֗ים עַל סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יְהוּדָֽה־־׃
translation:
  text: Now the rest of the acts of Jotham[a], which he did[b], are they not written in the Book of the Chronicles of the Kings of Judah?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'recorded' instead of 'written'; the Hebrew participle is literally 'written,' but the sense is that these acts were entered in an official royal record.
    reason: lexical_alternative
  - marker: b
    text: '''Book of the Chronicles'' refers to a royal annalistic source, not necessarily the biblical book of Chronicles.'
    reason: cross_reference
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest
  alternatives:
  - And the rest
  - As for the rest
  lexicon: HALOT
  rationale: יֶתֶר means 'remainder' or 'rest.' The prefixed conjunction can be rendered simply 'and,' but in this recurring regnal-summary formula, 'Now the rest' gives natural English while preserving the transitional force.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: Though דִּבְרֵי is literally 'words/matters,' in the formula 'the rest of the דברי of X אשר עשה' it refers broadly to the king's recorded deeds or acts. 'Acts' best captures the idiomatic sense in English.
- source_word: יוֹתָם
  chosen: Jotham
  rationale: Personal name transliterated by standard English convention, in keeping with the translation philosophy to transliterate names.
- source_word: אֲשֶׁר עָשָׂה
  chosen: which he did
  alternatives:
  - that he did
  - which he accomplished
  lexicon: HALOT
  rationale: A straightforward relative clause modifying 'acts.' 'Which he did' preserves the Hebrew structure and the conventional regnal-summary wording.
- source_word: הֲלֹא
  chosen: are they not
  alternatives:
  - behold, are they not
  - surely they are
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting a positive answer. 'Are they not' preserves both the interrogative form and the formulaic style.
- source_word: הֵם כְּתוּבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  - are they not inscribed
  lexicon: HALOT
  rationale: כְּתוּבִים is literally 'written.' 'Written' is retained in the main text for formal transparency, though 'recorded' is a viable idiomatic alternative.
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  lexicon: HALOT
  rationale: Literally 'on/upon the book,' but idiomatic English for documentary inclusion is 'in the Book.' 'Book' is acceptable for סֵפֶר in this archival context, though historically a scroll is in view.
- source_word: דִּבְרֵי הַיָּמִים
  chosen: the Chronicles
  alternatives:
  - the events of the days
  - the annals
  lexicon: HALOT
  rationale: This phrase in royal-source citations refers to annalistic records. 'Chronicles' is the established and clear rendering here; capitalization reflects a title-like source designation.
- source_word: לְמַלְכֵי יְהוּדָה
  chosen: of the Kings of Judah
  alternatives:
  - for the kings of Judah
  - belonging to the kings of Judah
  lexicon: HALOT
  rationale: The preposition ל in this source-title construction is best rendered idiomatically as 'of,' yielding the standard sense of a record concerning the kings of Judah.
