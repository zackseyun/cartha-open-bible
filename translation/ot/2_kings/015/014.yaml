id: 2KI.15.14
reference: 2 Kings 15:14
source:
  edition: WLC
  text: וַ/יַּעַל֩ מְנַחֵ֨ם בֶּן גָּדִ֜י מִ/תִּרְצָ֗ה וַ/יָּבֹא֙ שֹׁמְר֔וֹן וַ/יַּ֛ךְ
    אֶת שַׁלּ֥וּם בֶּן יָבֵ֖ישׁ בְּ/שֹׁמְר֑וֹן וַ/יְמִיתֵ֖/הוּ וַ/יִּמְלֹ֥ךְ תַּחְתָּֽי/ו־־־׃
translation:
  text: Then Menahem son of Gadi went up from Tirzah and came to Samaria, and he struck
    down Shallum son of Jabesh in Samaria and put him to death, and he reigned in
    his place.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - came up
  - marched up
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' 'Went up' preserves the narrative
    idiom without overinterpreting it as specifically military, though the context
    is a coup.
- source_word: מְנַחֵם בֶּן גָּדִי
  chosen: Menahem son of Gadi
  rationale: Personal names are transliterated by standard English conventions per
    project philosophy.
- source_word: מִתִּרְצָה
  chosen: from Tirzah
  rationale: The preposition מן marks source/origin; 'from Tirzah' is the straightforward
    locative rendering.
- source_word: וַיָּבֹא שֹׁמְרוֹן
  chosen: came to Samaria
  alternatives:
  - entered Samaria
  - came into Samaria
  lexicon: HALOT
  rationale: בוא with a place name can mean 'come to/into.' 'Came to Samaria' is natural
    English and sufficiently precise.
- source_word: וַיַּךְ אֶת
  chosen: struck down
  alternatives:
  - struck
  - attacked
  - smote
  lexicon: HALOT
  rationale: נכה in royal-assassination contexts often implies a lethal blow. 'Struck
    down' communicates the violent action while avoiding archaic 'smote.'
- source_word: שַׁלּוּם בֶּן יָבֵישׁ
  chosen: Shallum son of Jabesh
  rationale: Personal names are transliterated; filial identification is retained
    formally.
- source_word: בְּשֹׁמְרוֹן
  chosen: in Samaria
  alternatives:
  - at Samaria
  lexicon: HALOT
  rationale: The preposition ב marks location; 'in Samaria' is the natural rendering
    and preserves the repeated place reference in the Hebrew.
- source_word: וַיְמִיתֵהוּ
  chosen: put him to death
  alternatives:
  - killed him
  - caused him to die
  lexicon: HALOT
  rationale: The Hiphil of מות is causative. 'Put him to death' reflects the causative
    force more clearly than the simpler 'killed him,' while remaining idiomatic.
- source_word: וַיִּמְלֹךְ תַּחְתָּיו
  chosen: he reigned in his place
  alternatives:
  - he became king in his place
  - he reigned instead of him
  lexicon: HALOT
  rationale: מלך means 'reign/be king.' 'He reigned in his place' is idiomatic English
    for succession and preserves the narrative sequence after the assassination.
