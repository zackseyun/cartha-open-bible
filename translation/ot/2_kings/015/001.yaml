id: 2KI.15.1
reference: 2 Kings 15:1
source:
  edition: WLC
  text: בִּ/שְׁנַ֨ת עֶשְׂרִ֤ים וָ/שֶׁ֨בַע֙ שָׁנָ֔ה לְ/יָרָבְעָ֖ם מֶ֣לֶךְ יִשְׂרָאֵ֑ל
    מָלַ֛ךְ עֲזַרְיָ֥ה בֶן אֲמַצְיָ֖ה מֶ֥לֶךְ יְהוּדָֽה־׃
translation:
  text: In the twenty-seventh year of Jeroboam king of Israel, Azariah son of Amaziah,
    king of Judah, began to reign.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בִּ/שְׁנַת
  chosen: In the ... year of
  alternatives:
  - In the year of
  lexicon: HALOT
  rationale: The preposition ב plus construct of שָׁנָה introduces a regnal-year dating
    formula. English idiom naturally supplies 'In the ... year of'.
- source_word: עֶשְׂרִים וָ/שֶׁבַע שָׁנָה
  chosen: twenty-seventh year
  alternatives:
  - twenty and seven years
  lexicon: HALOT
  rationale: This is the standard Hebrew cardinal-number expression in regnal formulas,
    best rendered idiomatically in English as the ordinal 'twenty-seventh year' rather
    than a wooden cardinal phrasing.
- source_word: לְ/יָרָבְעָם
  chosen: of Jeroboam
  alternatives:
  - belonging to Jeroboam
  lexicon: HALOT
  rationale: The preposition ל marks the person whose regnal year is being counted
    in this dating formula; English expresses this simply with 'of Jeroboam'.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  lexicon: HALOT
  rationale: Standard royal title; no reason to vary from the conventional rendering.
- source_word: מָלַךְ
  chosen: began to reign
  alternatives:
  - reigned
  - became king
  lexicon: HALOT
  rationale: In accession notices, the qatal of מלך commonly marks the start of a
    reign rather than the entire duration. 'Began to reign' makes the narrative function
    explicit in natural English.
- source_word: עֲזַרְיָה
  chosen: Azariah
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: בֶן אֲמַצְיָה
  chosen: son of Amaziah
  lexicon: HALOT
  rationale: Standard filial expression indicating lineage.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Appositional royal title identifying Azariah's office and realm.
