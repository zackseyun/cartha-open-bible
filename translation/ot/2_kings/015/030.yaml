id: 2KI.15.30
reference: 2 Kings 15:30
source:
  edition: WLC
  text: וַ/יִּקְשָׁר קֶ֜שֶׁר הוֹשֵׁ֣עַ בֶּן אֵלָ֗ה עַל פֶּ֨קַח֙ בֶּן רְמַלְיָ֔הוּ
    וַ/יַּכֵּ֨/הוּ֙ וַ/יְמִיתֵ֔/הוּ וַ/יִּמְלֹ֖ךְ תַּחְתָּ֑י/ו בִּ/שְׁנַ֣ת עֶשְׂרִ֔ים
    לְ/יוֹתָ֖ם בֶּן עֻזִיָּֽה־־־־־׃
translation:
  text: Then Hoshea son of Elah conspired in a conspiracy against Pekah son of Remaliah,
    struck him down, put him to death, and reigned in his place, in the twentieth
    year of Jotham son of Uzziah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''conspired a conspiracy,'' an emphatic expression for plotting
      against the king.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew reads 'in the twentieth year of Jotham son of Uzziah.' This creates
      a chronological difficulty in the regnal data; some interpreters attempt to
      harmonize it with Ahaz's reign, but the translation follows the Hebrew wording.
    reason: textual_variant
lexical_decisions:
- source_word: וַיִּקְשָׁר קֶשֶׁר
  chosen: conspired in a conspiracy
  alternatives:
  - formed a conspiracy
  - made a conspiracy
  - plotted a plot
  lexicon: HALOT
  rationale: The Hebrew uses a cognate construction (verb + noun from the same root
    קשׁר) for emphasis. Rendering both elements preserves the force and auditable
    structure of the source better than collapsing to a single English verb. 'Conspired
    in a conspiracy' is slightly wooden but communicates the emphatic idiom without
    paraphrase.
- source_word: הוֹשֵׁעַ
  chosen: Hoshea
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: בֶּן אֵלָה
  chosen: son of Elah
  rationale: Standard filial construction; retained formally for historical identification.
- source_word: עַל
  chosen: against
  alternatives:
  - concerning
  - over
  lexicon: HALOT
  rationale: In conspiracy contexts על marks hostile action directed toward a person;
    'against' is the natural English equivalent.
- source_word: פֶּקַח בֶּן רְמַלְיָהוּ
  chosen: Pekah son of Remaliah
  rationale: Personal names transliterated; patronymic retained for identification.
- source_word: וַיַּכֵּהוּ
  chosen: struck him down
  alternatives:
  - struck him
  - attacked him
  - smote him
  lexicon: HALOT
  rationale: נכה often means to strike/strike down. Because the next verb explicitly
    states death, 'struck him down' preserves the violent action without making this
    verb alone mean 'killed' and thus avoids flattening the sequence.
- source_word: וַיְמִיתֵהוּ
  chosen: put him to death
  alternatives:
  - killed him
  - caused him to die
  lexicon: HALOT
  rationale: The Hiphil of מות is causative. 'Put him to death' preserves that causative
    force more clearly than the simpler 'killed him,' while remaining idiomatic.
- source_word: וַיִּמְלֹךְ תַּחְתָּיו
  chosen: reigned in his place
  alternatives:
  - became king in his place
  - reigned instead of him
  lexicon: HALOT
  rationale: מלך means 'reign/be king'; with תחתיו the sense is succession. 'Reigned
    in his place' is idiomatic and close to the Hebrew.
- source_word: בִּשְׁנַת עֶשְׂרִים
  chosen: in the twentieth year
  alternatives:
  - in year twenty
  lexicon: HALOT
  rationale: Standard regnal-year dating formula in Kings; rendered in conventional
    readable English.
- source_word: לְיוֹתָם בֶּן עֻזִיָּה
  chosen: of Jotham son of Uzziah
  rationale: The ל marks the regnal reference ('of Jotham'). Patronymic retained.
    Although the chronology is historically difficult in the wider context, the translation
    should reflect the Hebrew wording rather than harmonize it.
