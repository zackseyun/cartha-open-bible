theological_decisions:
- issue: Chronological tension in the regnal formula
  chosen_reading: Translate the Masoretic dating formula straightforwardly as 'in
    the twentieth year of Jotham son of Uzziah.'
  alternative_readings:
  - Harmonize implicitly to Ahaz's reign
  - Emend the text to resolve the chronological difficulty
  rationale: This verse presents a known chronological tension within Kings, since
    Jotham's reign is elsewhere shorter than twenty years. The translation should
    not resolve a historical/text-critical problem by altering the wording in the
    main text without textual warrant. A footnote can alert readers to the issue while
    preserving the source text.
  doctrine_reference: Translation philosophy §1, §3, §5
