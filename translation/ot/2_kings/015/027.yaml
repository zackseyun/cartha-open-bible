id: 2KI.15.27
reference: 2 Kings 15:27
source:
  edition: WLC
  text: בִּ/שְׁנַ֨ת חֲמִשִּׁ֤ים וּ/שְׁתַּ֨יִם֙ שָׁנָ֔ה לַ/עֲזַרְיָ֖ה מֶ֣לֶךְ יְהוּדָ֑ה
    מָ֠לַךְ פֶּ֣קַח בֶּן רְמַלְיָ֧הוּ עַל יִשְׂרָאֵ֛ל בְּ/שֹׁמְר֖וֹן עֶשְׂרִ֥ים שָׁנָֽה־־׃
translation:
  text: In the fifty-second year of Azariah king of Judah, Pekah son of Remaliah became
    king over Israel in Samaria, and he reigned twenty years.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בִּ/שְׁנַת חֲמִשִּׁים וּ/שְׁתַּיִם שָׁנָה
  chosen: In the fifty-second year
  alternatives:
  - In year fifty-two
  - In the fifty and second year
  lexicon: HALOT
  rationale: Standard regnal-year formula. English ordinal style best captures the
    Hebrew dating construction naturally while remaining formally close.
- source_word: לַ/עֲזַרְיָה מֶלֶךְ יְהוּדָה
  chosen: of Azariah king of Judah
  alternatives:
  - of Azariah, the king of Judah
  lexicon: HALOT
  rationale: Construct relationship indicates the regnal year belongs to Azariah.
    Kept the royal title explicit and straightforward.
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - reigned
  - began to reign
  - was king
  lexicon: HALOT
  rationale: The qatal of מלך in regnal notices commonly marks accession to the throne.
    'Became king' distinguishes accession from the later duration statement, avoiding
    the awkward repetition 'reigned ... and reigned twenty years.'
- source_word: פֶּקַח בֶּן רְמַלְיָהוּ
  chosen: Pekah son of Remaliah
  alternatives:
  - Pekah, the son of Remaliah
  lexicon: HALOT
  rationale: Standard transliteration of personal names; 'son of' preserves the Hebrew
    patronymic plainly.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - over the kingdom of Israel
  - in Israel
  lexicon: HALOT
  rationale: עַל with מלך indicates rule over a people or realm. 'Over Israel' is
    the most direct rendering.
- source_word: בְּ/שֹׁמְרֹון
  chosen: in Samaria
  alternatives:
  - at Samaria
  lexicon: HALOT
  rationale: Locative phrase indicating the seat of rule. 'In Samaria' is idiomatic
    English for the capital location.
- source_word: עֶשְׂרִים שָׁנָה
  chosen: twenty years
  lexicon: HALOT
  rationale: Direct rendering of the duration of Pekah's reign.
