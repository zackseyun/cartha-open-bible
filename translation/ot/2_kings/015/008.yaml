id: 2KI.15.8
reference: 2 Kings 15:8
source:
  edition: WLC
  text: בִּ/שְׁנַ֨ת שְׁלֹשִׁ֤ים וּ/שְׁמֹנֶה֙ שָׁנָ֔ה לַ/עֲזַרְיָ֖הוּ מֶ֣לֶךְ יְהוּדָ֑ה
    מָ֠לַךְ זְכַרְיָ֨הוּ בֶן יָרָבְעָ֧ם עַל יִשְׂרָאֵ֛ל בְּ/שֹׁמְר֖וֹן שִׁשָּׁ֥ה חֳדָשִֽׁים־־׃
translation:
  text: In the thirty-eighth year of Azariah king of Judah, Zechariah son of Jeroboam
    became king over Israel in Samaria for six months.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בִּשְׁנַת
  chosen: In the ... year of
  alternatives:
  - In year ... of
  lexicon: HALOT
  rationale: Temporal preposition ב plus שְׁנַת introduces the dating formula. Idiomatic
    English requires 'In the ... year of'.
- source_word: שְׁלֹשִׁים וּשְׁמֹנֶה שָׁנָה
  chosen: thirty-eighth year
  alternatives:
  - thirty and eight years
  lexicon: HALOT
  rationale: The cardinal construction in Hebrew functions ordinally in regnal dating.
    English naturally renders this as 'thirty-eighth year' rather than a wooden cardinal
    phrase.
- source_word: לַעֲזַרְיָהוּ
  chosen: of Azariah
  alternatives:
  - belonging to Azariah
  lexicon: HALOT
  rationale: The prefixed ל marks reference to Azariah's regnal year in the standard
    chronological formula; 'of Azariah' is the natural English equivalent.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Straightforward construct chain identifying Azariah's office and realm.
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - reigned
  - began to reign
  - was king
  lexicon: HALOT
  rationale: Qal of מלך here marks accession rather than the whole duration of rule.
    'Became king' captures the ingressive sense clearly in modern English; the duration
    is then specified separately by 'for six months.'
- source_word: זְכַרְיָהוּ
  chosen: Zechariah
  alternatives:
  - Zekaryahu
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: בֶן יָרָבְעָם
  chosen: son of Jeroboam
  lexicon: HALOT
  rationale: Standard filial identification.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - upon Israel
  - for Israel
  lexicon: HALOT
  rationale: עַל with מלך commonly indicates rule over a people or territory; 'over
    Israel' is the normal English rendering.
- source_word: בְּשֹׁמְרוֹן
  chosen: in Samaria
  alternatives:
  - at Samaria
  lexicon: HALOT
  rationale: Locative phrase indicating the seat/location of his reign. 'In Samaria'
    is the most natural English expression.
- source_word: שִׁשָּׁה חֳדָשִׁים
  chosen: for six months
  alternatives:
  - six months
  lexicon: HALOT
  rationale: Accusative of duration is best expressed idiomatically in English with
    'for six months,' making explicit that this is the length of his reign.
