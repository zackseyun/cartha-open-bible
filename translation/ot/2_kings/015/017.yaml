id: 2KI.15.17
reference: 2 Kings 15:17
source:
  edition: WLC
  text: בִּ/שְׁנַ֨ת שְׁלֹשִׁ֤ים וָ/תֵ֨שַׁע֙ שָׁנָ֔ה לַ/עֲזַרְיָ֖ה מֶ֣לֶךְ יְהוּדָ֑ה
    מָ֠לַךְ מְנַחֵ֨ם בֶּן גָּדִ֧י עַל יִשְׂרָאֵ֛ל עֶ֥שֶׂר שָׁנִ֖ים בְּ/שֹׁמְרֽוֹן־־׃
translation:
  text: In the thirty-ninth year of Azariah king of Judah, Menahem son of Gadi became
    king over Israel, and he reigned ten years in Samaria.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בִּ/שְׁנַת
  chosen: In the ... year
  alternatives:
  - In year ...
  - During the ... year
  lexicon: HALOT
  rationale: The preposition ב plus שְׁנַת introduces a regnal-year synchronism. English
    idiom normally supplies 'In the ... year'.
- source_word: שְׁלֹשִׁים וָ/תֵשַׁע שָׁנָה
  chosen: thirty-ninth year
  alternatives:
  - thirty-nine years
  lexicon: HALOT
  rationale: The numeral phrase with שָׁנָה is ordinal in sense within regnal dating
    formulas, so 'thirty-ninth year' is the natural English rendering.
- source_word: לַ/עֲזַרְיָה
  chosen: of Azariah
  alternatives:
  - belonging to Azariah
  lexicon: HALOT
  rationale: The preposition ל marks reference to Azariah's regnal year in the synchronism.
    'Of Azariah' is standard and clear in English regnal formulas.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  alternatives:
  - Judah's king
  lexicon: HALOT
  rationale: Straightforward construct chain; standard English royal title.
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - reigned
  - began to reign
  lexicon: HALOT
  rationale: Here the verb marks accession, not the full duration of rule, since the
    duration follows separately ('ten years'). 'Became king' avoids ambiguity and
    reflects the event of enthronement.
- source_word: מְנַחֵם בֶּן גָּדִי
  chosen: Menahem son of Gadi
  alternatives:
  - Menahem the son of Gadi
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy; 'son of' is
    the natural rendering of בן in narrative genealogy/identification.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - for Israel
  - upon Israel
  lexicon: HALOT
  rationale: עַל with מלך in royal contexts indicates rule over a people or territory.
    'Over Israel' is idiomatic and accurate.
- source_word: עֶשֶׂר שָׁנִים
  chosen: ten years
  lexicon: HALOT
  rationale: Simple duration phrase indicating the length of Menahem's reign.
- source_word: בְּ/שֹׁמְרוֹן
  chosen: in Samaria
  alternatives:
  - at Samaria
  lexicon: HALOT
  rationale: Locative phrase indicating the seat/location of his reign. 'In Samaria'
    is standard English usage for the capital city.
