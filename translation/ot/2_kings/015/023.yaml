id: 2KI.15.23
reference: 2 Kings 15:23
source:
  edition: WLC
  text: בִּ/שְׁנַת֙ חֲמִשִּׁ֣ים שָׁנָ֔ה לַ/עֲזַרְיָ֖ה מֶ֣לֶךְ יְהוּדָ֑ה מָ֠לַךְ פְּקַֽחְיָ֨ה
    בֶן מְנַחֵ֧ם עַל יִשְׂרָאֵ֛ל בְּ/שֹׁמְר֖וֹן שְׁנָתָֽיִם־־׃
translation:
  text: In the fiftieth year of Azariah king of Judah, Pekahiah son of Menahem became
    king over Israel in Samaria, and he reigned two years.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בִּ/שְׁנַת ... חֲמִשִּׁים שָׁנָה
  chosen: In the fiftieth year
  alternatives:
  - In year fifty
  - In the fiftieth year of
  lexicon: HALOT
  rationale: The Hebrew regnal formula uses ב + שְׁנַת with an ordinal-like cardinal
    construction to date the event. Standard idiomatic English is 'In the fiftieth
    year.'
- source_word: לַ/עֲזַרְיָה
  chosen: of Azariah
  alternatives:
  - belonging to Azariah
  - under Azariah
  lexicon: HALOT
  rationale: 'The prefixed ל marks the regnal reference point: the year is counted
    with respect to Azariah''s reign. In English this is most naturally expressed
    as ''of Azariah.'''
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Straightforward construct chain identifying Azariah's office and realm.
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - reigned
  - began to reign
  - was king
  lexicon: HALOT
  rationale: In regnal notices, מלך often marks accession rather than the whole duration
    of rule. Since the duration is separately given later in the verse, 'became king'
    best captures the initial event without redundancy.
- source_word: פְּקַחְיָה
  chosen: Pekahiah
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names.
- source_word: בֶן מְנַחֵם
  chosen: son of Menahem
  lexicon: HALOT
  rationale: Standard filial identification; retained formally because it is part
    of the regnal notice.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - over the kingdom of Israel
  - in Israel
  lexicon: HALOT
  rationale: The preposition עַל with מלך commonly indicates rule over a people or
    territory. 'Over Israel' is the most direct rendering.
- source_word: בְּ/שֹׁמְרוֹן
  chosen: in Samaria
  alternatives:
  - at Samaria
  lexicon: HALOT
  rationale: Locative ב indicates the place of his reign's seat. 'In Samaria' is idiomatic
    and fits the royal capital context.
- source_word: שְׁנָתָיִם
  chosen: two years
  lexicon: HALOT
  rationale: Dual form meaning 'two years,' referring to the length of his reign.
    English supplies 'he reigned' for a complete and natural clause.
