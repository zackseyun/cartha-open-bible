id: 2KI.15.29
reference: 2 Kings 15:29
source:
  edition: WLC
  text: בִּ/ימֵ֞י פֶּ֣קַח מֶֽלֶךְ יִשְׂרָאֵ֗ל בָּא֮ תִּגְלַ֣ת פִּלְאֶסֶר֮ מֶ֣לֶךְ
    אַשּׁוּר֒ וַ/יִּקַּ֣ח אֶת עִיּ֡וֹן וְ/אֶת אָבֵ֣ל בֵּֽית מַעֲכָ֡ה וְ/אֶת יָ֠נוֹחַ
    וְ/אֶת קֶ֨דֶשׁ וְ/אֶת חָצ֤וֹר וְ/אֶת הַ/גִּלְעָד֙ וְ/אֶת הַ/גָּלִ֔ילָ/ה כֹּ֖ל
    אֶ֣רֶץ נַפְתָּלִ֑י וַ/יַּגְלֵ֖/ם אַשּֽׁוּרָ/ה־־־־־־־־־׃
translation:
  text: In the days of Pekah king of Israel, Tiglath-pileser king of Assyria came
    and captured Ijon, Abel-beth-maacah, Janoah, Kedesh, Hazor, Gilead, and Galilee—all
    the land of Naphtali—and he carried them away to Assyria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he exiled them to Assyria' / 'he deported them to Assyria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּימֵי
  chosen: In the days of
  alternatives:
  - During the reign of
  - In the time of
  lexicon: HALOT
  rationale: Idiomatic temporal formula introducing the historical setting. 'In the
    days of' is a standard, natural rendering that preserves the Hebrew construction
    without over-paraphrase.
- source_word: בָּא
  chosen: came
  alternatives:
  - invaded
  - arrived
  lexicon: HALOT
  rationale: The verb literally means 'came.' Although the military context implies
    invasion, 'came' preserves the source wording and lets the following verbs specify
    the hostile action.
- source_word: וַיִּקַּח
  chosen: captured
  alternatives:
  - took
  - seized
  lexicon: HALOT
  rationale: Literally 'took,' but in a military context with a list of cities and
    regions, 'captured' communicates the sense more clearly in modern English while
    remaining faithful to the event described.
- source_word: עִיּוֹן
  chosen: Ijon
  alternatives:
  - Iyyon
  rationale: Standard English transliteration of the place name.
- source_word: אָבֵל בֵּית מַעֲכָה
  chosen: Abel-beth-maacah
  alternatives:
  - Abel Beth Maacah
  - Abel of Beth-maacah
  rationale: Conventional English transliteration of the compound place name; hyphenation
    helps signal a single toponym.
- source_word: יָנוֹחַ
  chosen: Janoah
  alternatives:
  - Janohah
  rationale: Standard English form of the place name.
- source_word: קֶדֶשׁ
  chosen: Kedesh
  rationale: Standard transliteration of the place name.
- source_word: חָצוֹר
  chosen: Hazor
  rationale: Standard transliteration of the place name.
- source_word: הַגִּלְעָד
  chosen: Gilead
  alternatives:
  - the Gilead
  rationale: Although the Hebrew includes the article, English proper geographic names
    normally omit it. 'Gilead' is the natural rendering.
- source_word: הַגָּלִילָה
  chosen: Galilee
  alternatives:
  - the Galilee
  - the district of Galilee
  lexicon: HALOT
  rationale: The term denotes the region of Galilee. English idiom normally uses 'Galilee'
    without the article in a list of regions.
- source_word: כֹּל אֶרֶץ נַפְתָּלִי
  chosen: all the land of Naphtali
  alternatives:
  - the whole land of Naphtali
  - all the territory of Naphtali
  lexicon: HALOT
  rationale: This appositional summary gathers the preceding conquests into a broader
    territorial statement. 'Land' is a straightforward rendering of אֶרֶץ here.
- source_word: וַיַּגְלֵם
  chosen: he carried them away
  alternatives:
  - he exiled them
  - he deported them
  lexicon: HALOT
  rationale: The hiphil of גלה here means to remove people into exile. 'Carried them
    away' preserves the narrative style and the pronominal object 'them'; the destination
    phrase then clarifies exile. 'Deported' is possible but more technical.
- source_word: אַשּׁוּרָה
  chosen: into Assyria
  alternatives:
  - to Assyria
  lexicon: HALOT
  rationale: The directional ending indicates movement toward Assyria. 'Into Assyria'
    makes the forced relocation explicit and reads naturally with 'carried them away'.
