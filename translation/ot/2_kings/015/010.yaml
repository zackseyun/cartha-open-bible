id: 2KI.15.10
reference: 2 Kings 15:10
source:
  edition: WLC
  text: וַ/יִּקְשֹׁ֤ר עָלָי/ו֙ שַׁלֻּ֣ם בֶּן יָבֵ֔שׁ וַ/יַּכֵּ֥/הוּ קָֽבָלְ עָ֖ם וַ/יְמִיתֵ֑/הוּ וַ/יִּמְלֹ֖ךְ תַּחְתָּֽי/ו־־׃
translation:
  text: Then Shallum son of Jabesh conspired against him and struck him down before the people[a], and put him to death and reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in public' / 'before the assembly' for the difficult phrase קָבָל־עָם.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְשֹׁר עָלָיו
  chosen: conspired against him
  alternatives:
  - plotted against him
  - made a conspiracy against him
  lexicon: HALOT
  rationale: קשר in the political context of royal succession commonly denotes conspiracy or treasonous plotting. 'Conspired against him' is idiomatic modern English and preserves the hostile political sense.
- source_word: שַׁלֻּם בֶּן־יָבֵשׁ
  chosen: Shallum son of Jabesh
  rationale: Personal names are transliterated by standard convention per project philosophy; בן is rendered with the genealogical formula 'son of.'
- source_word: וַיַּכֵּהוּ
  chosen: struck him down
  alternatives:
  - struck him
  - attacked him
  lexicon: HALOT
  rationale: נכה can mean strike/smite. Because the next verb explicitly states death, 'struck him down' conveys the violent blow without making the first verb itself mean 'killed,' thus preserving the sequence of actions.
- source_word: קָבָל־עָם
  chosen: before the people
  alternatives:
  - in public
  - before the assembly
  lexicon: HALOT
  rationale: The phrase is difficult and somewhat rare; in context it most naturally indicates a public setting, i.e., in the presence of the people. 'Before the people' stays relatively close to the Hebrew while remaining intelligible.
- source_word: וַיְמִיתֵהוּ
  chosen: he put him to death
  alternatives:
  - killed him
  - caused him to die
  lexicon: HALOT
  rationale: מות in the Hiphil means 'put to death' or 'kill.' 'Put him to death' preserves the causative force and avoids collapsing it into the previous verb, which already described the assault.
- source_word: וַיִּמְלֹךְ תַּחְתָּיו
  chosen: reigned in his place
  alternatives:
  - became king in his place
  - reigned instead of him
  lexicon: HALOT
  rationale: מלך plus תחתיו indicates succession to the throne. 'Reigned in his place' is natural English and keeps the royal nuance explicit.
