theological_decisions:
- issue: Nature of the prohibited worship activity at the high places
  chosen_reading: The verse reports ongoing unauthorized worship at local cult sites
    without specifying whether every act was idolatrous.
  alternative_readings:
  - The people were practicing outright idolatry there
  - The people were merely worshiping the LORD in unauthorized locations
  rationale: The Hebrew states that the people continued sacrificing and making smoke-offerings
    at the high places, but does not itself specify the deity addressed in this verse.
    The translation should preserve that textual restraint rather than import a fuller
    theological judgment than the wording provides.
  doctrine_reference: Preserve theological tension rather than resolve it.
