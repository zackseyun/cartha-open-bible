id: 2KI.15.4
reference: 2 Kings 15:4
source:
  edition: WLC
  text: רַ֥ק הַ/בָּמ֖וֹת לֹא סָ֑רוּ ע֥וֹד הָ/עָ֛ם מְזַבְּחִ֥ים וּֽ/מְקַטְּרִ֖ים בַּ/בָּמֽוֹת־׃
translation:
  text: Only the high places were not removed; the people still were sacrificing and
    burning incense on the high places.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'burning incense on the high places.' The Hebrew verb can refer specifically
      to burning incense or more broadly to making an offering go up in smoke.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: Only
  alternatives:
  - However
  - Nevertheless
  - But
  lexicon: HALOT
  rationale: Marks an exception to the positive evaluation of the king; 'Only' is
    the standard concise adversative/exclusive rendering in this formulaic Kings context.
- source_word: הַבָּמוֹת
  chosen: the high places
  alternatives:
  - the shrines
  lexicon: HALOT
  rationale: בָּמוֹת refers to elevated cultic sites. 'High places' is the established
    and accurate English rendering in Kings, preserving the historical-religious setting
    better than the more interpretive 'shrines'.
- source_word: לֹא סָרוּ
  chosen: were not removed
  alternatives:
  - did not depart
  - were not taken away
  lexicon: HALOT
  rationale: With בָּמוֹת as subject, the idiom means the cult sites remained in place.
    Passive English best conveys the sense naturally.
- source_word: עוֹד
  chosen: still
  alternatives:
  - yet
  - continuingly
  lexicon: HALOT
  rationale: Signals ongoing action despite the king's reforms or otherwise positive
    reign summary.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: Straightforward collective reference to the population engaged in worship
    practices.
- source_word: מְזַבְּחִים
  chosen: were sacrificing
  alternatives:
  - were offering sacrifices
  lexicon: HALOT
  rationale: From זבח, the core act is sacrificial offering. 'Were sacrificing' is
    concise and preserves the verbal force.
- source_word: וּמְקַטְּרִים
  chosen: making offerings in smoke
  alternatives:
  - burning incense
  - making smoke offerings
  lexicon: HALOT
  rationale: קטר in cultic contexts can denote burning incense or turning offerings
    into smoke more broadly. Because the object is not specified here, 'making offerings
    in smoke' preserves the cultic act without narrowing it too specifically to incense.
- source_word: בַּבָּמוֹת
  chosen: on the high places
  alternatives:
  - at the high places
  lexicon: HALOT
  rationale: Locative phrase referring to the cult sites. 'On' matches the conventional
    rendering of elevated worship sites.
