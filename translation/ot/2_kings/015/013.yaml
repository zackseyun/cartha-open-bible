id: 2KI.15.13
reference: 2 Kings 15:13
source:
  edition: WLC
  text: שַׁלּ֤וּם בֶּן יָבֵישׁ֙ מָלַ֔ךְ בִּ/שְׁנַ֨ת שְׁלֹשִׁ֤ים וָ/תֵ֨שַׁע֙ שָׁנָ֔ה לְ/עֻזִיָּ֖ה מֶ֣לֶךְ יְהוּדָ֑ה וַ/יִּמְלֹ֥ךְ יֶֽרַח יָמִ֖ים בְּ/שֹׁמְרֽוֹן־־׃
translation:
  text: Shallum son of Jabesh became king in the thirty-ninth year of Uzziah king of Judah[a], and he reigned for a month of days in Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''a month of days,'' that is, about one month.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - began to reign
  - reigned
  lexicon: HALOT
  rationale: 'The qatal here marks accession: Shallum came to the throne in a specified regnal year. ''Became king'' communicates enthronement more precisely than simple ''reigned'' in this clause.'
- source_word: בִּשְׁנַת שְׁלֹשִׁים וָתֵשַׁע שָׁנָה
  chosen: in the thirty-ninth year
  alternatives:
  - in year thirty-nine
  lexicon: HALOT
  rationale: Standard regnal-year formula. English idiom prefers the ordinal expression 'the thirty-ninth year.'
- source_word: לְעֻזִיָּה מֶלֶךְ יְהוּדָה
  chosen: of Uzziah king of Judah
  alternatives:
  - belonging to Uzziah king of Judah
  - under Uzziah king of Judah
  lexicon: HALOT
  rationale: The preposition ל in regnal synchronisms is naturally rendered 'of,' indicating the year counted in Uzziah's reign.
- source_word: וַיִּמְלֹךְ
  chosen: and he reigned
  alternatives:
  - and he was king
  lexicon: HALOT
  rationale: Here the wayyiqtol advances the narrative from accession to duration of rule; 'and he reigned' is the natural English rendering.
- source_word: יֶרַח יָמִים
  chosen: for a month of days
  alternatives:
  - for one month
  - for a full month
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'a month of days.' Retaining it more closely preserves the source texture while remaining intelligible. The sense is approximately one month.
- source_word: בְּשֹׁמְרוֹן
  chosen: in Samaria
  alternatives:
  - at Samaria
  lexicon: HALOT
  rationale: Locative ב is straightforwardly rendered 'in'; Samaria is the capital where he exercised his brief reign.
