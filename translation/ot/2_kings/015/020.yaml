id: 2KI.15.20
reference: 2 Kings 15:20
source:
  edition: WLC
  text: וַ/יֹּצֵא֩ מְנַחֵ֨ם אֶת הַ/כֶּ֜סֶף עַל יִשְׂרָאֵ֗ל עַ֚ל כָּל גִּבּוֹרֵ֣י הַ/חַ֔יִל
    לָ/תֵת֙ לְ/מֶ֣לֶךְ אַשּׁ֔וּר חֲמִשִּׁ֧ים שְׁקָלִ֛ים כֶּ֖סֶף לְ/אִ֣ישׁ אֶחָ֑ד וַ/יָּ֨שָׁב֙
    מֶ֣לֶךְ אַשּׁ֔וּר וְ/לֹא עָ֥מַד שָׁ֖ם בָּ/אָֽרֶץ־־־־׃
translation:
  text: Then Menahem exacted the money from Israel, from all the mighty men of valor,
    to give to the king of Assyria fifty shekels of silver from each man. So the king
    of Assyria turned back and did not remain there in the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from all the wealthy men' or 'from all the mighty men of valor.' The
      Hebrew phrase can denote men of military strength, social standing, or wealth;
      the taxation context favors the sense of men of means.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּצֵא
  chosen: exacted
  alternatives:
  - brought out
  - collected
  - imposed
  lexicon: HALOT
  rationale: Although the verb literally means 'caused to go out/brought out,' with
    כסף and the preposition עַל plus the people, the sense is that Menahem extracted
    or levied the money from the population. 'Exacted' captures the coercive fiscal
    sense better than the more neutral 'brought out' or 'collected'.
- source_word: הַכֶּסֶף
  chosen: the money
  alternatives:
  - the silver
  lexicon: HALOT
  rationale: כסף can mean either 'silver' or 'money.' Here the first occurrence refers
    generally to the payment raised, so 'the money' is more natural English; the later
    quantified phrase is rendered 'silver' to preserve the metal-denomination wording.
- source_word: עַל יִשְׂרָאֵל
  chosen: from Israel
  alternatives:
  - upon Israel
  - against Israel
  lexicon: HALOT
  rationale: The preposition עַל after a verb of exaction indicates the burden laid
    on the people. In idiomatic English, 'from Israel' best conveys that the money
    was taken from the nation.
- source_word: עַל כָּל גִּבּוֹרֵי הַחַיִל
  chosen: from all the mighty men of wealth
  alternatives:
  - from all the mighty men of valor
  - from all the wealthy men
  - upon all the men of substance
  lexicon: HALOT
  rationale: גִּבּוֹרֵי הַחַיִל can denote not only warriors but also prominent, capable,
    or wealthy men. In this taxation context, the phrase points to men of means rather
    than soldiers specifically. 'Mighty men of wealth' preserves the Hebrew idiom
    while signaling socioeconomic status.
- source_word: לָתֵת לְמֶלֶךְ אַשּׁוּר
  chosen: to give to the king of Assyria
  alternatives:
  - to pay to the king of Assyria
  lexicon: HALOT
  rationale: The infinitive purpose clause is straightforward. 'To give' stays close
    to the Hebrew while remaining natural in context.
- source_word: חֲמִשִּׁים שְׁקָלִים כֶּסֶף
  chosen: fifty shekels of silver
  alternatives:
  - fifty silver shekels
  lexicon: HALOT
  rationale: This is the standard weight-and-metal expression. 'Fifty shekels of silver'
    is clear, conventional, and formally accurate.
- source_word: לְאִישׁ אֶחָד
  chosen: from each man
  alternatives:
  - for each man
  - per man
  - from every man
  lexicon: HALOT
  rationale: In context this specifies the amount assessed on each individual. 'From
    each man' makes explicit that this was the levy exacted from every qualifying
    person.
- source_word: וַיָּשָׁב
  chosen: turned back
  alternatives:
  - returned
  - went back
  lexicon: HALOT
  rationale: The verb means 'returned/turned back.' 'Turned back' fits the narrative
    flow after receiving payment and suggests withdrawal.
- source_word: וְלֹא עָמַד שָׁם בָּאָרֶץ
  chosen: did not remain there in the land
  alternatives:
  - did not stay there in the land
  - did not stand there in the land
  lexicon: HALOT
  rationale: עמד literally means 'stood,' but in this context it idiomatically means
    to stay, remain, or maintain a position. 'Did not remain there in the land' communicates
    that the Assyrian king did not continue his presence or intervention in the land.
