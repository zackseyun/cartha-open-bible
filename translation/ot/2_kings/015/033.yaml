id: 2KI.15.33
reference: 2 Kings 15:33
source:
  edition: WLC
  text: בֶּן עֶשְׂרִ֨ים וְ/חָמֵ֤שׁ שָׁנָה֙ הָיָ֣ה בְ/מָלְכ֔/וֹ וְ/שֵׁשׁ עֶשְׂרֵ֣ה
    שָׁנָ֔ה מָלַ֖ךְ בִּ/ירוּשָׁלִָ֑ם וְ/שֵׁ֣ם אִמּ֔/וֹ יְרוּשָׁ֖א בַּת צָדֽוֹק־־־׃
translation:
  text: He was twenty-five years old when he began to reign, and he reigned sixteen
    years in Jerusalem. His mother’s name was Jerusha daughter of Zadok.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jerusha is alternatively spelled Jerushah in some English translations.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וְחָמֵשׁ שָׁנָה
  chosen: twenty-five years old
  alternatives:
  - a son of twenty-five years
  lexicon: HALOT
  rationale: This is the standard Hebrew age idiom. A literal rendering with 'son'
    would be unnatural in modern English and would obscure the plain sense.
- source_word: הָיָה בְמָלְכוֹ
  chosen: when he began to reign
  alternatives:
  - when he became king
  - at his reigning
  lexicon: HALOT
  rationale: The construction literally means 'he was in his reigning' and idiomatically
    introduces the age at accession. 'When he began to reign' is a natural English
    equivalent commonly used for this regnal formula.
- source_word: וְשֵׁשׁ עֶשְׂרֵה שָׁנָה מָלַךְ
  chosen: and he reigned sixteen years
  alternatives:
  - and sixteen years he reigned
  lexicon: HALOT
  rationale: This preserves the straightforward regnal notice while using natural
    English word order.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard place-name transliteration and prepositional sense.
- source_word: וְשֵׁם אִמּוֹ
  chosen: His mother’s name was
  alternatives:
  - and the name of his mother was
  lexicon: HALOT
  rationale: The Hebrew formula is rendered in idiomatic modern English without loss
    of meaning.
- source_word: יְרוּשָׁא
  chosen: Jerusha
  alternatives:
  - Jerushah
  lexicon: HALOT
  rationale: A standard English transliteration of the personal name. An alternate
    spelling exists in English tradition and is worth preserving in a footnote.
- source_word: בַּת צָדוֹק
  chosen: daughter of Zadok
  lexicon: HALOT
  rationale: Literal familial designation; no reason to paraphrase.
