id: 2KI.9.19
reference: 2 Kings 9:19
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֗ח רֹכֵ֣ב סוּס֮ שֵׁנִי֒ וַ/יָּבֹ֣א אֲלֵ/הֶ֔ם וַ/יֹּ֛אמֶר כֹּֽה אָמַ֥ר הַ/מֶּ֖לֶךְ שָׁל֑וֹם וַ/יֹּ֧אמֶר יֵה֛וּא מַה לְּ/ךָ֥ וּ/לְ/שָׁל֖וֹם סֹ֥ב אֶֽל אַחֲרָֽ/י־־־׃
translation:
  text: 'So he sent a second horseman[a], and he came to them and said, “Thus says the king: Is it peace?” But Jehu said, “What do you have to do with peace? Turn behind me.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Is all well?” The Hebrew שָׁלוֹם can mean “peace,” “welfare,” or “well-being.”
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹכֵב סוּס שֵׁנִי
  chosen: a second horseman
  alternatives:
  - a second rider
  - another rider on horseback
  lexicon: HALOT
  rationale: The phrase is literally 'a rider of a horse, second.' In natural English narrative, 'a second horseman' preserves the military/messenger sense without awkwardness.
- source_word: כֹּה אָמַר הַמֶּלֶךְ
  chosen: Thus says the king
  alternatives:
  - This is what the king says
  lexicon: HALOT
  rationale: This is the standard messenger formula. 'Thus says' preserves the formal royal proclamation style better than a looser paraphrase.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - all is well
  lexicon: HALOT
  rationale: The noun denotes peace, welfare, or well-being. Here it functions in the king's inquiry about whether matters are peaceful. 'Peace' keeps the lexical link with Jehu's reply, which repeats the same term.
- source_word: מַה לְּךָ וּלְשָׁלוֹם
  chosen: What do you have to do with peace?
  alternatives:
  - What have you to do with peace?
  - What is peace to you?
  lexicon: HALOT
  rationale: The idiom dismisses the messenger's concern with the matter of peace. This rendering is idiomatic modern English while preserving the confrontational force and the repeated noun 'peace' from the king's question.
- source_word: סֹב אֶל אַחֲרָי
  chosen: Turn around and follow me
  alternatives:
  - Turn behind me
  - Turn and go after me
  lexicon: HALOT
  rationale: Literally 'turn to/behind me.' In context Jehu is ordering the rider to leave his current course and join Jehu's company. 'Follow me' makes the directional sense explicit in natural English.
