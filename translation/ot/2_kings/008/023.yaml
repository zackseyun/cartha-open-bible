id: 2KI.8.23
reference: 2 Kings 8:23
source:
  edition: WLC
  text: וְ/יֶ֛תֶר דִּבְרֵ֥י יוֹרָ֖ם וְ/כָל אֲשֶׁ֣ר עָשָׂ֑ה הֲ/לֽוֹא הֵ֣ם כְּתוּבִ֗ים
    עַל סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יְהוּדָֽה־־־׃
translation:
  text: Now the rest of the acts of Yoram, and all that he did—are they not written
    in the Book of the Chronicles of the Kings of Judah?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the book of the annals of the kings of Judah.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew Yoram; traditionally Jehoram.
    reason: alternative_reading
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - The remainder of
  lexicon: HALOT
  rationale: יֶתֶר means 'remainder' or 'rest.' In this recurring regnal-summary formula,
    'the rest of' is idiomatic English. The prefixed וְ is rendered as 'Now' to fit
    the narrative-transition formula naturally in English.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - matters
  - deeds
  - events
  lexicon: HALOT
  rationale: Though literally 'words/matters,' in the formula 'the rest of the words/matters
    of [king]' it refers broadly to the king's recorded acts or affairs. 'Acts' is
    the most natural concise rendering in English for this historiographic formula.
- source_word: יוֹרָם
  chosen: Yoram
  alternatives:
  - Jehoram
  rationale: Personal names are transliterated by standard conventions. The Hebrew
    form here is יוֹרָם, best represented as 'Yoram.' 'Jehoram' reflects a traditional
    English form but is less directly tied to the consonantal form in this verse.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  chosen: and all that he did
  alternatives:
  - and everything that he did
  - with all that he did
  lexicon: HALOT
  rationale: A straightforward rendering of the relative clause. 'All that he did'
    preserves the formal structure while remaining natural English.
- source_word: הֲלוֹא
  chosen: are they not
  alternatives:
  - is it not the case that
  - surely
  lexicon: HALOT
  rationale: This interrogative particle introduces a rhetorical question expecting
    a positive answer. 'Are they not' preserves the rhetorical force and matches the
    plural predicate that follows.
- source_word: הֵם כְּתוּבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  - are they not inscribed
  lexicon: HALOT
  rationale: כְּתוּבִים is literally 'written.' Because the Hebrew uses the plural
    pronoun הֵם with the plural referent ('acts' and 'all that he did'), English naturally
    renders the whole clause as 'are they not written.'
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  lexicon: HALOT
  rationale: Literally 'on/upon the book/scroll,' but idiomatic English for citation
    of a written record is 'in the Book.' 'Book' is acceptable here for readability,
    though the ancient referent would have been a scroll.
- source_word: סֵפֶר דִּבְרֵי הַיָּמִים
  chosen: the Book of the Chronicles
  alternatives:
  - the book of the annals
  - the book of the events of the days
  lexicon: HALOT
  rationale: This is a standard royal-record formula. 'Chronicles' is the conventional
    and accurate rendering for דִּבְרֵי הַיָּמִים in this context, though 'annals'
    is also possible. Capitalization reflects a title-like reference to an official
    source.
- source_word: לְמַלְכֵי יְהוּדָה
  chosen: of the Kings of Judah
  alternatives:
  - belonging to the kings of Judah
  - for the kings of Judah
  lexicon: HALOT
  rationale: 'The לְ here functions in a genitival/title relationship in this formula:
    the chronicle pertaining to the kings of Judah. ''Of the Kings of Judah'' is the
    most idiomatic English title rendering.'
