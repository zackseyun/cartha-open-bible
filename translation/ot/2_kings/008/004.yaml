id: 2KI.8.4
reference: 2 Kings 8:4
source:
  edition: WLC
  text: וְ/הַ/מֶּ֗לֶךְ מְדַבֵּר֙ אֶל גֵּ֣חֲזִ֔י נַ֥עַר אִישׁ הָ/אֱלֹהִ֖ים לֵ/אמֹ֑ר
    סַפְּרָ/ה נָּ֣א לִ֔/י אֵ֥ת כָּל הַ/גְּדֹל֖וֹת אֲשֶׁר עָשָׂ֥ה אֱלִישָֽׁע־־־־־׃
translation:
  text: Now the king was speaking with Gehazi, the servant of the man of God, saying,
    “Please tell me all the great things that Elisha has done.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the attendant of the man of God' or 'the young man of the man of God';
      the Hebrew נַעַר can denote a servant, attendant, or youth depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְדַבֵּר
  chosen: was speaking
  alternatives:
  - spoke
  - was talking
  lexicon: HALOT
  rationale: The participle with the prefixed subject functions as a past progressive/backgrounded
    action in narrative, best rendered 'was speaking' rather than simple past to preserve
    the scene-setting aspect.
- source_word: גֵּחֲזִי
  chosen: Gehazi
  rationale: Personal name is transliterated according to the project's policy to
    transliterate names rather than translate them.
- source_word: נַעַר
  chosen: servant
  alternatives:
  - attendant
  - young man
  lexicon: HALOT
  rationale: Though נַעַר can denote a youth or young man, in construct with 'the
    man of God' and in this court/narrative context it identifies Gehazi by role in
    relation to Elisha. 'Servant' best captures that functional sense in natural English.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet of God
  lexicon: HALOT
  rationale: This is a standard Hebrew title for a prophet or holy man. The more literal
    'man of God' preserves the established biblical idiom and avoids over-specifying
    beyond the source text.
- source_word: סַפְּרָה נָּא לִי
  chosen: Please tell me
  alternatives:
  - Please recount to me
  - Tell me, please
  lexicon: HALOT
  rationale: The imperative of ספר means to recount or tell; נָא adds politeness/entreaty.
    'Please tell me' is idiomatic modern English while preserving both command and
    courtesy.
- source_word: כָּל הַגְּדֹלוֹת
  chosen: all the great things
  alternatives:
  - all the great deeds
  - all the mighty things
  lexicon: HALOT
  rationale: The feminine plural adjective used substantivally refers to notable great
    acts. 'Great things' is broad and natural, leaving the nature of the acts open
    as in Hebrew.
- source_word: עָשָׂה
  chosen: has done
  alternatives:
  - did
  - had done
  lexicon: HALOT
  rationale: English present perfect fits the king's request about Elisha's notable
    acts up to the present conversational moment. It communicates relevance to the
    current discussion better than simple past.
- source_word: וְהַמֶּלֶךְ
  chosen: Now the king
  alternatives:
  - And the king
  lexicon: HALOT
  rationale: Initial waw here advances the narrative. 'Now' is a natural discourse
    marker in English narrative, preferable to mechanically repeating 'And'.
