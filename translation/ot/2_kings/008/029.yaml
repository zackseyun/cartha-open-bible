id: 2KI.8.29
reference: 2 Kings 8:29
source:
  edition: WLC
  text: וַ/יָּשָׁב֩ יוֹרָ֨ם הַ/מֶּ֜לֶךְ לְ/הִתְרַפֵּ֣א בְ/יִזְרְעֶ֗אל מִן הַ/מַּכִּים֙
    אֲשֶׁ֨ר יַכֻּ֤/הוּ אֲרַמִּים֙ בָּֽ/רָמָ֔ה בְּ/הִלָּ֣חֲמ֔/וֹ אֶת חֲזָהאֵ֖ל מֶ֣לֶךְ
    אֲרָ֑ם וַ/אֲחַזְיָ֨הוּ בֶן יְהוֹרָ֜ם מֶ֣לֶךְ יְהוּדָ֗ה יָרַ֡ד לִ/רְא֞וֹת אֶת יוֹרָ֧ם
    בֶּן אַחְאָ֛ב בְּ/יִזְרְעֶ֖אל כִּֽי חֹלֶ֥ה הֽוּא־־־־־־׃פ
translation:
  text: Then King Yoram returned to Jezreel to recover from the wounds that the Arameans
    had inflicted on him at Ramah when he fought against Hazael king of Aram. And
    Ahaziah son of Jehoram, king of Judah, went down to see Yoram son of Ahab in Jezreel,
    because he was sick.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to be healed' for 'to recover.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Arameans'; traditionally 'Syrians.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to visit Yoram.' The Hebrew literally says 'to see Yoram.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - went back
  - turned back
  lexicon: HALOT
  rationale: The verb שוב in the wayyiqtol narrative sequence most naturally means
    'returned' here, indicating Yoram's movement back to Jezreel after battle.
- source_word: לְהִתְרַפֵּא
  chosen: to recover
  alternatives:
  - to be healed
  - to heal himself
  lexicon: HALOT
  rationale: The hitpael of רפא can mean 'to heal oneself' or more idiomatically 'to
    recover.' In modern English, 'to recover' best fits the context of convalescence
    from battle wounds without implying self-healing.
- source_word: מִן הַמַּכִּים
  chosen: from the wounds
  alternatives:
  - from the blows
  - from the injuries
  lexicon: HALOT
  rationale: מַכִּים literally refers to blows/strikes, but in this military-medical
    context it denotes the resulting wounds. 'Wounds' is the clearest natural English
    rendering.
- source_word: אֲשֶׁר יַכֻּהוּ אֲרַמִּים
  chosen: that the Arameans had inflicted on him
  alternatives:
  - that the Arameans had struck him with
  - that the Syrians had given him
  lexicon: HALOT
  rationale: The clause explains the source of the wounds. 'Inflicted on him' expresses
    the causative sense naturally in English. 'Arameans' is preferred over 'Syrians'
    because it more directly reflects אֲרַמִּים and the ancient setting.
- source_word: בָּרָמָה
  chosen: at Ramah
  alternatives:
  - in Ramah
  lexicon: HALOT
  rationale: The preposition ב can be rendered 'at' or 'in'; 'at Ramah' reads naturally
    for a battle location.
- source_word: בְּהִלָּחֲמוֹ
  chosen: when he fought
  alternatives:
  - while he was fighting
  - in his fighting
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב marks the circumstance/time
    of the wounding. 'When he fought' is concise and natural.
- source_word: אֶת חֲזָהאֵל מֶלֶךְ אֲרָם
  chosen: against Hazael king of Aram
  alternatives:
  - with Hazael king of Aram
  - Hazael, the king of Aram
  lexicon: HALOT
  rationale: With הלחם, English idiom requires 'fight against.' 'King of Aram' preserves
    the Hebrew national designation consistently.
- source_word: וַאֲחַזְיָהוּ...יָרַד
  chosen: And Ahaziah...went down
  alternatives:
  - Then Ahaziah...went down
  - came down
  lexicon: HALOT
  rationale: The wayyiqtol continues the narrative. 'Went down' preserves the directional
    nuance of ירד, likely from Jerusalem/Judah down to Jezreel.
- source_word: לִרְאוֹת אֶת יוֹרָם
  chosen: to see Yoram
  alternatives:
  - to visit Yoram
  - to look in on Yoram
  lexicon: HALOT
  rationale: Literally 'to see,' but in context it denotes a visit to an ill person.
    The more literal 'to see' is retained, since English readers readily understand
    the idiom.
- source_word: כִּי חֹלֶה הוּא
  chosen: because he was sick
  alternatives:
  - for he was ill
  - because he was wounded
  lexicon: HALOT
  rationale: חֹלֶה denotes sickness/illness. Although his condition arose from wounds,
    the Hebrew states his present condition, so 'sick' or 'ill' is preferable to 'wounded.'
