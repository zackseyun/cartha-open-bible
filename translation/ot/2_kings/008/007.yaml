id: 2KI.8.7
reference: 2 Kings 8:7
source:
  edition: WLC
  text: וַ/יָּבֹ֤א אֱלִישָׁע֙ דַּמֶּ֔שֶׂק וּ/בֶן הֲדַ֥ד מֶֽלֶךְ אֲרָ֖ם חֹלֶ֑ה וַ/יֻּגַּד
    ל֣/וֹ לֵ/אמֹ֔ר בָּ֛א אִ֥ישׁ הָ/אֱלֹהִ֖ים עַד הֵֽנָּה־־־־׃
translation:
  text: Then Elisha came to Damascus. Now Ben-hadad king of Aram was sick, and it
    was told him, saying, “The man of God has come here.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “king of Syria.” The Hebrew reads “Aram.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: Then ... came
  alternatives:
  - And ... came
  - So ... came
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative progression without over-paraphrasing; 'came' is the plain sense of
    בוא.
- source_word: אֱלִישָׁע
  chosen: Elisha
  rationale: Personal name is transliterated per translation philosophy.
- source_word: דַּמֶּשֶׂק
  chosen: Damascus
  rationale: Standard English transliteration of the place name.
- source_word: וּבֶן־הֲדַד
  chosen: Now Ben-hadad
  alternatives:
  - and Ben-hadad
  lexicon: HALOT
  rationale: The prefixed waw here introduces a circumstantial/background clause rather
    than a simple next event. 'Now Ben-hadad' signals the shift to background information
    in idiomatic English while preserving the connection.
- source_word: מֶלֶךְ אֲרָם
  chosen: king of Aram
  alternatives:
  - king of Syria
  lexicon: HALOT
  rationale: Aram is the Hebrew ethnogeographic term; 'Aram' is preferred over the
    traditional but interpretive 'Syria' to reflect original-language primacy.
- source_word: חֹלֶה
  chosen: was sick
  alternatives:
  - was ill
  lexicon: HALOT
  rationale: Predicate participle describing Ben-hadad's condition. 'Was sick' is
    straightforward and natural.
- source_word: וַיֻּגַּד לוֹ
  chosen: it was told him
  alternatives:
  - he was told
  - word was brought to him
  lexicon: HALOT
  rationale: The Hophal is passive/causative passive. 'It was told him' preserves
    the impersonal passive force of the Hebrew more closely than the smoother 'he
    was told,' though both are possible.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - that
  lexicon: HALOT
  rationale: Retained as 'saying' to reflect the Hebrew quotative formula and preserve
    a slightly formal narrative cadence.
- source_word: בָּא
  chosen: has come
  alternatives:
  - came
  - is here
  lexicon: HALOT
  rationale: 'The perfect in reported speech naturally conveys a present-result sense
    in English: the arrival has occurred and the person is now present. ''Has come''
    captures this better than simple past.'
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet of God
  lexicon: HALOT
  rationale: This is a recognized Hebrew title for a prophet, but the text literally
    says 'the man of God.' The more literal rendering preserves the source expression
    and its narrative resonance.
- source_word: עַד הֵנָּה
  chosen: here
  alternatives:
  - to here
  - as far as here
  lexicon: HALOT
  rationale: The idiom indicates arrival at the speaker's location. 'Here' is idiomatic
    English and conveys the sense without awkwardness.
