id: 2KI.8.28
reference: 2 Kings 8:28
source:
  edition: WLC
  text: וַ/יֵּ֜לֶךְ אֶת יוֹרָ֣ם בֶּן אַחְאָ֗ב לַ/מִּלְחָמָ֛ה עִם חֲזָהאֵ֥ל מֶֽלֶךְ
    אֲרָ֖ם בְּ/רָמֹ֣ת גִּלְעָ֑ד וַ/יַּכּ֥וּ אֲרַמִּ֖ים אֶת יוֹרָֽם־־־־־׃
translation:
  text: He went with Joram son of Ahab to war against Hazael king of Aram at Ramoth-gilead,
    and the Arameans wounded Joram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'struck Joram.' The Hebrew verb can mean 'struck' more generally; 'wounded'
      is chosen because the battle context and the parallel account indicate injury
      rather than death.
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'king of Syria' and 'the Syrians'; Hebrew has 'Aram' and 'Arameans.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: He went
  alternatives:
  - He went out
  - He marched
  lexicon: HALOT
  rationale: Basic wayyiqtol of הלך, narrating movement. 'He went' is the plain sense;
    the accompanying phrases supply the military context.
- source_word: אֶת יוֹרָם
  chosen: with Joram
  alternatives:
  - Joram
  - along with Joram
  lexicon: HALOT
  rationale: After הלך, אֵת can mark accompaniment rather than direct object. The
    sense is that Ahaziah went together with Joram, not that he 'went Joram.' English
    idiom requires 'with.'
- source_word: לַמִּלְחָמָה
  chosen: to war
  alternatives:
  - to battle
  - for the war
  lexicon: HALOT
  rationale: Idiomatic military expression with הלך. 'To war' is concise and natural
    while preserving the formal sense of going for battle.
- source_word: עִם חֲזָהאֵל
  chosen: against Hazael
  alternatives:
  - with Hazael
  lexicon: HALOT
  rationale: Although עִם commonly means 'with,' in battle contexts it can denote
    opposition/engagement. Since the phrase is followed by 'king of Aram' and the
    narrative context is warfare, 'against Hazael' correctly conveys the adversarial
    sense.
- source_word: מֶלֶךְ אֲרָם
  chosen: king of Aram
  alternatives:
  - king of Syria
  lexicon: HALOT
  rationale: Aram is the Hebrew ethnogeographic name and should be transliterated
    rather than replaced by the traditional but less source-transparent 'Syria.'
- source_word: בְּרָמֹת גִּלְעָד
  chosen: at Ramoth-gilead
  alternatives:
  - in Ramoth-gilead
  lexicon: HALOT
  rationale: Location of the battle. 'At' is the most natural English preposition
    for a battle site.
- source_word: וַיַּכּוּ
  chosen: wounded
  alternatives:
  - struck
  - defeated
  lexicon: HALOT
  rationale: נכה has a broad range including 'strike' and 'smite,' but here the immediate
    context in the parallel account specifies that Joram was injured in battle. 'Wounded'
    captures the likely sense without archaic wording.
- source_word: אֲרַמִּים
  chosen: the Arameans
  alternatives:
  - Aram
  - the Syrians
  lexicon: HALOT
  rationale: Ethnic plural noun; 'the Arameans' is the transparent rendering from
    Hebrew and matches 'Aram' above.
- source_word: אֶת יוֹרָם
  chosen: Joram
  alternatives:
  - Jehoram
  lexicon: HALOT
  rationale: The Hebrew form here is יוֹרָם. Rendering it as 'Joram' reflects the
    form present in this verse; 'Jehoram' is a known variant English representation
    but not required by the immediate spelling.
