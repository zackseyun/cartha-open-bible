id: 2KI.8.21
reference: 2 Kings 8:21
source:
  edition: WLC
  text: וַ/יַּעֲבֹ֤ר יוֹרָם֙ צָעִ֔ירָ/ה וְ/כָל הָ/רֶ֖כֶב עִמּ֑/וֹ וַֽ/יְהִי ה֞וּא
    קָ֣ם לַ֗יְלָה וַ/יַּכֶּ֨ה אֶת אֱד֜וֹם הַ/סֹּבֵ֤יב אֵלָי/ו֙ וְ/אֵת֙ שָׂרֵ֣י הָ/רֶ֔כֶב
    וַ/יָּ֥נָס הָ/עָ֖ם לְ/אֹהָלָֽי/ו־־־׃
translation:
  text: So Joram crossed over to Zair, with all the chariots with him. Then he arose
    by night and struck Edom, which had surrounded him, and the commanders of the
    chariots; but the people fled to their tents.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'to Seir'; the Hebrew place name צָעִירָה is difficult, and
      some take it as a variant related to Seir/Edom rather than the distinct place
      name Zair.
    reason: alternative_reading
  - marker: b
    text: '''Fled to their tents'' is a Hebrew idiom meaning they dispersed and returned
      home.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעֲבֹר
  chosen: crossed over
  alternatives:
  - went over
  - passed over
  lexicon: HALOT
  rationale: The verb עבר commonly means to pass or cross over. In this military movement
    context, 'crossed over' preserves the sense of advancing to or into a location
    without overinterpreting the route.
- source_word: צָעִירָה
  chosen: Zair
  alternatives:
  - Zehir
  - to Seir
  lexicon: HALOT
  rationale: The consonantal form is traditionally taken as a place name here. 'Zair'
    follows the pointing of the MT as a proper name. Because some understand the reading
    as related to Seir/Edom, that alternative is preserved in a footnote rather than
    adopted in the main text.
- source_word: הָרֶכֶב
  chosen: the chariots
  alternatives:
  - the chariot force
  - the cavalry
  lexicon: HALOT
  rationale: Although רכב can denote chariotry collectively, 'the chariots' is a natural
    English rendering that stays close to the Hebrew while fitting the military context.
- source_word: קָם לַיְלָה
  chosen: arose by night
  alternatives:
  - rose at night
  - set out by night
  lexicon: HALOT
  rationale: This idiom indicates nighttime action. 'Arose by night' is slightly formal
    but clear and preserves the sequence of the Hebrew narrative.
- source_word: וַיַּכֶּה
  chosen: struck
  alternatives:
  - attacked
  - defeated
  - smote
  lexicon: HALOT
  rationale: נכה is a broad verb for striking or smiting. 'Struck' is suitably literal
    and does not overstate the outcome as a total defeat.
- source_word: אֱדוֹם הַסֹּבֵיב אֵלָיו
  chosen: Edom, which had surrounded him
  alternatives:
  - the Edomites surrounding him
  - Edom around him
  lexicon: HALOT
  rationale: The participle with the article describes Edom as encircling him. Rendering
    it as a relative clause gives clear English while preserving the military image
    of being surrounded.
- source_word: שָׂרֵי הָרֶכֶב
  chosen: the commanders of the chariots
  alternatives:
  - the chariot commanders
  - the officers of the chariot force
  lexicon: HALOT
  rationale: שׂרים are officials or commanders. 'Commanders of the chariots' keeps
    the construct relationship and military sense.
- source_word: וַיָּנָס הָעָם לְאֹהָלָיו
  chosen: the people fled to their tents
  alternatives:
  - the troops fled to their tents
  - the people fled to their homes
  lexicon: HALOT
  rationale: This is a standard idiom for dispersing home after military failure.
    'To their tents' preserves the Hebrew image; 'people' is retained rather than
    'troops' because the Hebrew uses the broader term העם, though the military setting
    is evident.
