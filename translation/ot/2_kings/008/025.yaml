id: 2KI.8.25
reference: 2 Kings 8:25
source:
  edition: WLC
  text: בִּ/שְׁנַת֙ שְׁתֵּים עֶשְׂרֵ֣ה שָׁנָ֔ה לְ/יוֹרָ֥ם בֶּן אַחְאָ֖ב מֶ֣לֶךְ יִשְׂרָאֵ֑ל
    מָלַ֛ךְ אֲחַזְיָ֥הוּ בֶן יְהוֹרָ֖ם מֶ֥לֶךְ יְהוּדָֽה־־־׃
translation:
  text: In the twelfth year of Joram son of Ahab, king of Israel, Ahaziah son of Jehoram,
    king of Judah, became king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has 'Joram' for the king of Israel and 'Jehoram' for the king of
      Judah; these are related name forms and are sometimes both rendered 'Joram'
      in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/שְׁנַת שְׁתֵּים עֶשְׂרֵה שָׁנָה
  chosen: In the twelfth year
  alternatives:
  - In year twelve
  - In the twelfth year [of the reign]
  lexicon: HALOT
  rationale: The Hebrew dating formula literally reads 'in the year of twelve years,'
    an idiomatic regnal expression best rendered in natural English as 'In the twelfth
    year.'
- source_word: לְ/יוֹרָם
  chosen: of Joram
  alternatives:
  - for Joram
  - belonging to Joram
  lexicon: HALOT
  rationale: The preposition ל in regnal formulas marks the king whose regnal year
    is being counted; 'of Joram' is the natural English equivalent.
- source_word: בֶּן אַחְאָב
  chosen: son of Ahab
  lexicon: HALOT
  rationale: Standard patronymic construction; retained formally.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  lexicon: HALOT
  rationale: Straightforward royal title; translated rather than transliterated per
    project philosophy.
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - began to reign
  - reigned
  lexicon: HALOT
  rationale: The qatal of מלך in accession notices commonly denotes the beginning
    of a reign. 'Became king' is clear modern English and avoids the possible ambiguity
    of simple 'reigned' as ongoing rule.
- source_word: אֲחַזְיָהוּ
  chosen: Ahaziah
  rationale: Personal name transliterated by standard English convention.
- source_word: בֶן יְהוֹרָם
  chosen: son of Jehoram
  alternatives:
  - son of Joram
  rationale: The Judahite king's name here is יְהוֹרָם, conventionally transliterated
    'Jehoram.' This also helps distinguish him in English from the Israelite Joram
    named earlier, though the two names are related forms.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Straightforward royal title; translated directly.
