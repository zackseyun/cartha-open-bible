theological_decisions:
- issue: Unstated subject of the verbs 'took,' 'dipped,' and 'spread'
  chosen_reading: Render with the English pronoun 'he' without identifying the subject
    by name in the main text
  alternative_readings:
  - Interpret the subject specifically as Hazael
  - treat the subject as an unspecified attendant
  rationale: The Hebrew leaves the subject implicit in the verbal forms. In the immediate
    context many interpreters infer Hazael, but the verse itself does not explicitly
    name him as the actor until the final clause. To avoid importing more certainty
    than the text states, the main text keeps the pronoun 'he'; the likely identification
    is preserved in a footnote.
  doctrine_reference: 'Translation philosophy items 1 and 3: original-language primacy;
    preserve ambiguity rather than resolve it.'
