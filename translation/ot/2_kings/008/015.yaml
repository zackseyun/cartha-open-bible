id: 2KI.8.15
reference: 2 Kings 8:15
source:
  edition: WLC
  text: וַ/יְהִ֣י מִֽ/מָּחֳרָ֗ת וַ/יִּקַּ֤ח הַ/מַּכְבֵּר֙ וַ/יִּטְבֹּ֣ל בַּ/מַּ֔יִם
    וַ/יִּפְרֹ֥שׂ עַל פָּנָ֖י/ו וַ/יָּמֹ֑ת וַ/יִּמְלֹ֥ךְ חֲזָהאֵ֖ל תַּחְתָּֽי/ו־׃פ
translation:
  text: And it happened on the next day that he took the covering cloth, dipped it
    in water, and spread it over his face, so that he died. Then Hazael reigned in
    his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bedcover,' 'the quilt,' or 'the woven/netted cloth'; the Hebrew
      term is rare, so the exact kind of cloth is uncertain.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew does not explicitly name who performed these actions. In context,
      many understand the subject to be Hazael, but the text itself states only 'he'
      until Hazael is named in the final clause.
    reason: alternative_reading
lexical_decisions:
- source_word: מִמָּחֳרָת
  chosen: on the next day
  alternatives:
  - the next day
  - on the following day
  lexicon: HALOT
  rationale: Temporal expression meaning the day after the previous events. 'On the
    next day' is natural modern English and preserves the narrative sequence.
- source_word: הַמַּכְבֵּר
  chosen: the covering cloth
  alternatives:
  - the bedcover
  - the quilt
  - the netted cloth
  lexicon: HALOT
  rationale: The noun is rare and denotes a covering or woven cloth. 'Covering cloth'
    preserves the object’s function without overcommitting to a specific modern item
    such as 'quilt.' Because the exact object is uncertain, a lexical alternative
    is preserved in a footnote.
- source_word: וַיִּטְבֹּל בַּמַּיִם
  chosen: dipped it in water
  alternatives:
  - soaked it in water
  lexicon: HALOT
  rationale: The verb means to dip/immerse. 'Dipped it in water' is the most straightforward
    rendering and fits the sequence of actions.
- source_word: וַיִּפְרֹשׂ עַל־פָּנָיו
  chosen: spread it over his face
  alternatives:
  - laid it over his face
  - stretched it over his face
  lexicon: HALOT
  rationale: The verb means to spread out or lay out. 'Spread it over his face' is
    idiomatic and preserves the physical action described.
- source_word: וַיָּמֹת
  chosen: so that he died
  alternatives:
  - and he died
  lexicon: HALOT
  rationale: 'The Hebrew waw-consecutive simply advances the narrative: ''and he died.''
    In English, ''so that he died'' makes the causal sequence implied by the preceding
    actions clearer without adding content beyond the narrative flow.'
- source_word: וַיִּמְלֹךְ חֲזָהאֵל תַּחְתָּיו
  chosen: Then Hazael reigned in his place
  alternatives:
  - And Hazael became king in his place
  - and Hazael reigned instead of him
  lexicon: HALOT
  rationale: The verb is 'reign/be king.' 'Reigned in his place' is clear and preserves
    the succession formula. 'Then' reflects the narrative progression.
