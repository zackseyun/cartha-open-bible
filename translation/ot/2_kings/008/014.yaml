- issue: Rendering of אֲדֹנָיו in a non-divine context
  chosen_reading: his master
  alternative_readings:
  - his lord
  rationale: The term is not a divine title here but a designation for Hazael's superior.
    Using 'master' avoids confusion with 'Lord' as a theological title and better
    reflects the courtly/master-servant relationship in context.
  doctrine_reference: 'Translation philosophy: translate titles by meaning; avoid
    importing doctrinal claims the text does not make.'
