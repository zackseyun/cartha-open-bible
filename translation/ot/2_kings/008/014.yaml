id: 2KI.8.14
reference: 2 Kings 8:14
source:
  edition: WLC
  text: וַ/יֵּ֣לֶךְ מֵ/אֵ֣ת אֱלִישָׁ֗ע וַ/יָּבֹא֙ אֶל אֲדֹנָ֔י/ו וַ/יֹּ֣אמֶר ל֔/וֹ
    מָֽה אָמַ֥ר לְ/ךָ֖ אֱלִישָׁ֑ע וַ/יֹּ֕אמֶר אָ֥מַר לִ֖/י חָיֹ֥ה תִחְיֶֽה׀־־׃
translation:
  text: So he went away from Elisha and came to his master, who said to him, “What
    did Elisha say to you?” And he said, “He told me, ‘You will surely recover.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, “He said to me, ‘You shall surely live.’” The Hebrew literally repeats
      the verb for emphasis: “living, you will live.” In context this refers to recovery
      from illness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went away
  alternatives:
  - went
  - departed
  lexicon: HALOT
  rationale: הלך in the wayyiqtol advances the narrative. 'Went away' brings out the
    movement from Elisha's presence more naturally in English than a bare 'went,'
    while remaining close to the source.
- source_word: מֵאֵת
  chosen: from
  alternatives:
  - away from
  lexicon: HALOT
  rationale: The preposition marks separation from Elisha. 'From' is the straightforward
    rendering; the nuance of departure is already carried by 'went away.'
- source_word: אֱלִישָׁע
  chosen: Elisha
  rationale: Personal name transliterated by standard English convention per translation
    philosophy.
- source_word: וַיָּבֹא אֶל אֲדֹנָיו
  chosen: came to his master
  alternatives:
  - came to his lord
  - went to his master
  lexicon: HALOT
  rationale: בוא + אֶל is naturally 'came to.' אֲדֹנָיו here refers to Hazael's human
    superior, Ben-hadad, so 'his master' is clearer in modern English than 'his lord,'
    which could sound overly theological.
- source_word: אֲדֹנָיו
  chosen: his master
  alternatives:
  - his lord
  lexicon: HALOT
  rationale: Although from אדון, in this court setting it denotes Hazael's superior/master
    rather than a divine title. 'Master' best fits the social relationship in context.
- source_word: מָה אָמַר לְךָ אֱלִישָׁע
  chosen: What did Elisha say to you?
  alternatives:
  - What has Elisha said to you?
  lexicon: HALOT
  rationale: English idiom prefers simple past in this narrative question. The Hebrew
    perfect after מָה is well represented by 'did ... say' in context.
- source_word: אָמַר לִי
  chosen: He told me
  alternatives:
  - He said to me
  lexicon: HALOT
  rationale: Either is possible; 'He told me' reads naturally in reported speech and
    preserves the sense without adding content.
- source_word: חָיֹה תִחְיֶה
  chosen: You will certainly recover
  alternatives:
  - You shall surely live
  - You will surely live
  lexicon: HALOT
  rationale: 'The infinitive absolute + imperfect intensifies the verb: ''certainly/surely.''
    In this illness context, English ''recover'' communicates the intended sense more
    clearly than the more wooden ''live,'' especially since the statement concerns
    the king''s sickness rather than abstract continued existence.'
