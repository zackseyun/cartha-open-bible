theological_decisions:
- issue: Genealogical expression in 'daughter of Omri'
  chosen_reading: 'Retain the literal familial term in the main text: ''the daughter of Omri,'' while noting the possible broader sense ''descendant of Omri'' in a footnote.'
  alternative_readings:
  - descendant of Omri
  rationale: This is not primarily a doctrinal issue, but it is an interpretive one. Hebrew kinship terms often have broader lineage force. Optimal equivalence favors the literal wording in the text with the broader possibility preserved for auditability.
