id: 2KI.8.26
reference: 2 Kings 8:26
source:
  edition: WLC
  text: בֶּן עֶשְׂרִ֨ים וּ/שְׁתַּ֤יִם שָׁנָה֙ אֲחַזְיָ֣הוּ בְ/מָלְכ֔/וֹ וְ/שָׁנָ֣ה אַחַ֔ת מָלַ֖ךְ בִּ/ירוּשָׁלִָ֑ם וְ/שֵׁ֤ם אִמּ/וֹ֙ עֲתַלְיָ֔הוּ בַּת עָמְרִ֖י מֶ֥לֶךְ יִשְׂרָאֵֽל־־׃
translation:
  text: Ahaziah was twenty-two years old when he became king[a], and he reigned one year in Jerusalem. His mother's name was Athaliah, the daughter of Omri king of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendant of Omri.' Hebrew 'daughter' can sometimes denote a female descendant or member of a dynasty rather than an immediate daughter.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וּשְׁתַּיִם שָׁנָה
  chosen: was twenty-two years old
  alternatives:
  - was a son of twenty-two years
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'a son of twenty-two years,' a standard age formula. Natural English expresses this as 'was twenty-two years old' while preserving the precise age.
- source_word: בְמָלְכוֹ
  chosen: when he became king
  alternatives:
  - in his reigning
  - when he began to reign
  lexicon: HALOT
  rationale: The infinitive/construct-like royal accession formula is idiomatically rendered in English as 'when he became king.' This is standard and clearer than a more wooden 'in his reigning.'
- source_word: וְשָׁנָה אַחַת מָלַךְ
  chosen: and he reigned one year
  alternatives:
  - and he reigned for one year
  lexicon: HALOT
  rationale: This preserves the straightforward statement of duration. English may optionally include 'for,' but it is not necessary.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard locative rendering.
- source_word: וְשֵׁם אִמּוֹ
  chosen: His mother's name was
  alternatives:
  - and the name of his mother was
  lexicon: HALOT
  rationale: The Hebrew formula is slightly formal; this English rendering is natural and accurate.
- source_word: עֲתַלְיָהוּ
  chosen: Athaliah
  rationale: Personal names are transliterated by standard English convention.
- source_word: בַּת עָמְרִי
  chosen: the daughter of Omri
  alternatives:
  - a daughter/descendant of Omri
  lexicon: HALOT
  rationale: Hebrew 'daughter' can denote a female descendant, but the plain lexical value is 'daughter.' Because the expression may be dynastic rather than immediate, the alternative is preserved in a footnote.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  lexicon: HALOT
  rationale: Standard construct-chain rendering identifying Omri's royal status.
