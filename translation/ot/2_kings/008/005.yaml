id: 2KI.8.5
reference: 2 Kings 8:5
source:
  edition: WLC
  text: וַ֠/יְהִי ה֥וּא מְסַפֵּ֣ר לַ/מֶּלֶךְ֮ אֵ֣ת אֲשֶׁר הֶחֱיָ֣ה אֶת הַ/מֵּת֒ וְ/הִנֵּ֨ה
    הָ/אִשָּׁ֜ה אֲשֶׁר הֶחֱיָ֤ה אֶת בְּנָ/הּ֙ צֹעֶ֣קֶת אֶל הַ/מֶּ֔לֶךְ עַל בֵּיתָ֖/הּ
    וְ/עַל שָׂדָ֑/הּ וַ/יֹּ֤אמֶר גֵּֽחֲזִי֙ אֲדֹנִ֣/י הַ/מֶּ֔לֶךְ זֹ֚את הָֽ/אִשָּׁ֔ה
    וְ/זֶה בְּנָ֖/הּ אֲשֶׁר הֶחֱיָ֥ה אֱלִישָֽׁע־־־־־־־־־׃
translation:
  text: And as he was telling the king how he had restored the dead to life, behold,
    the woman whose son he had restored to life was crying out to the king about her
    house and about her field. And Gehazi said, “My lord the king, this is the woman,
    and this is her son whom Elisha restored to life.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'how he had revived the dead' / 'how he had brought the dead back to
      life.' The Hebrew uses the causative of 'live' (החיה).
    reason: lexical_alternative
  - marker: b
    text: '''Behold'' marks the sudden, striking coincidence that the woman arrived
      at that very moment.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי הוּא מְסַפֵּר
  chosen: And as he was telling
  alternatives:
  - And it happened, as he was telling
  - Now as he was recounting
  lexicon: HALOT
  rationale: The waw-consecutive with היה introduces a narrative circumstance; in
    idiomatic modern English, 'And as he was telling' captures the temporal setup
    without the wooden 'and it happened.' The participle מְסַפֵּר conveys ongoing
    action.
- source_word: לַמֶּלֶךְ
  chosen: the king
  alternatives:
  - to the king
  lexicon: HALOT
  rationale: English idiom with 'telling' naturally takes a direct object here, though
    the Hebrew preposition marks the indirect object. The sense is unchanged.
- source_word: אֵת אֲשֶׁר הֶחֱיָה אֶת הַמֵּת
  chosen: how he had restored the dead to life
  alternatives:
  - what he had done in bringing the dead back to life
  - how he had revived the dead
  lexicon: HALOT
  rationale: הֶחֱיָה means 'cause to live, restore to life.' 'Restored ... to life'
    is natural English and preserves causative force. 'The dead' reflects the singular
    collective/formal Hebrew expression better than the more interpretive 'a dead
    person,' though context points to the specific boy.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - suddenly
  lexicon: HALOT
  rationale: The particle marks a vivid, surprising coincidence in the narrative.
    'Behold' preserves that discourse effect more transparently than a flatter connective.
- source_word: הָאִשָּׁה אֲשֶׁר הֶחֱיָה אֶת בְּנָהּ
  chosen: the woman whose son he had restored to life
  alternatives:
  - the woman whose son he had revived
  - the woman for whom he had restored her son to life
  lexicon: HALOT
  rationale: Hebrew literally says 'the woman whom he had caused her son to live,'
    but idiomatic English expresses the relation as 'whose son he had restored to
    life.' This preserves the meaning without awkwardness.
- source_word: צֹעֶקֶת אֶל הַמֶּלֶךְ
  chosen: was crying out to the king
  alternatives:
  - was appealing to the king
  - was calling out to the king
  lexicon: HALOT
  rationale: צעק often denotes a strong cry for help or justice. 'Crying out' preserves
    the urgency better than the more bureaucratic 'appealing,' though the latter is
    contextually possible.
- source_word: עַל בֵּיתָהּ וְעַל שָׂדָהּ
  chosen: about her house and about her field
  alternatives:
  - for her house and for her field
  - concerning her house and her land
  lexicon: HALOT
  rationale: In context the preposition עַל introduces the matter of her plea. 'About'
    is natural English. שָׂדֶה is more specifically 'field' than the broader 'land,'
    fitting the property-restoration setting.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: My lord the king
  alternatives:
  - My lord, O king
  - My master the king
  lexicon: HALOT
  rationale: This is a standard courtly address. 'My lord the king' is the most natural
    formal English equivalent and avoids importing the stronger servile nuance of
    'master' where not required.
- source_word: זֹאת הָאִשָּׁה וְזֶה בְּנָהּ
  chosen: this is the woman, and this is her son
  alternatives:
  - here is the woman, and here is her son
  lexicon: HALOT
  rationale: The demonstratives identify the persons present. 'This is' is straightforward
    and natural in English direct speech.
- source_word: אֲשֶׁר הֶחֱיָה אֱלִישָׁע
  chosen: whom Elisha restored to life
  alternatives:
  - whom Elisha revived
  - whom Elisha brought back to life
  lexicon: HALOT
  rationale: Again, הֶחֱיָה is causative 'restore to life.' Repeating the same English
    phrase maintains consistency within the verse, as the same Hebrew verb is used
    three times.
