theological_decisions:
- issue: Rendering of לִבְנֵי יִשְׂרָאֵל
  chosen_reading: to the sons of Israel
  alternative_readings:
  - to the people of Israel
  - to the Israelites
  rationale: The Hebrew idiom is grammatically masculine plural and refers corporately to Israel. Following the project's gender-accurate principle, the formal expression is retained rather than neutralized, while alternatives are acknowledged as idiomatic possibilities.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Retention of graphic violence in prophetic speech
  chosen_reading: Explicitly render the atrocities without euphemism
  alternative_readings:
  - Use softened expressions such as 'harm' or 'attack'
  rationale: The Hebrew text is intentionally graphic and morally weighty. Optimal equivalence here requires preserving the severity of the prophecy rather than muting it for readability.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 6
