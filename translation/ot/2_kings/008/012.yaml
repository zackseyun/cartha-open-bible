id: 2KI.8.12
reference: 2 Kings 8:12
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר חֲזָאֵ֔ל מַדּ֖וּעַ אֲדֹנִ֣/י בֹכֶ֑ה וַ/יֹּ֡אמֶר כִּֽי יָדַ֡עְתִּי אֵ֣ת אֲשֶׁר תַּעֲשֶׂה֩ לִ/בְנֵ֨י יִשְׂרָאֵ֜ל רָעָ֗ה מִבְצְרֵי/הֶ֞ם תְּשַׁלַּ֤ח בָּ/אֵשׁ֙ וּ/בַחֻֽרֵי/הֶם֙ בַּ/חֶ֣רֶב תַּהֲרֹ֔ג וְ/עֹלְלֵי/הֶ֣ם תְּרַטֵּ֔שׁ וְ/הָרֹתֵי/הֶ֖ם תְּבַקֵּֽעַ־־׃
translation:
  text: 'Hazael said[a], “Why is my lord weeping?” And he said, “Because I know the evil that you will do to the sons of Israel: you will set their fortresses on fire, kill their young men with the sword, dash their little children to pieces[b], and rip open their pregnant women.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the Israelites” / “to the people of Israel.” The Hebrew reads “to the sons of Israel.”
    reason: lexical_alternative
  - marker: b
    text: Or “burn their strongholds.” Literally, “send their fortresses into the fire.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  lexicon: HALOT
  rationale: In direct address to Elisha, the term is a respectful title, not a divine title. 'My lord' preserves the social deference and matches idiomatic English for such address better than 'my master' here.
- source_word: בֹכֶה
  chosen: weeping
  alternatives:
  - crying
  lexicon: HALOT
  rationale: The participle denotes ongoing weeping. 'Weeping' is slightly more elevated and fits the solemn tone of the scene.
- source_word: כִּי יָדַעְתִּי
  chosen: Because I know
  alternatives:
  - For I know
  - Because I have known
  lexicon: HALOT
  rationale: The conjunction introduces Elisha's explanation. 'Because I know' is natural modern English and adequately reflects the perfect verb with present relevance.
- source_word: אֵת אֲשֶׁר תַּעֲשֶׂה
  chosen: the evil that you will do
  alternatives:
  - what you will do
  - that which you will do
  lexicon: HALOT
  rationale: The object marker plus relative clause points forward to the content of Elisha's knowledge; in English the clause is best completed by carrying רָעָה into the phrase as 'the evil that you will do.'
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: to the sons of Israel
  alternatives:
  - to the people of Israel
  - to the Israelites
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, 'sons of Israel' preserves the Hebrew expression. It can denote the covenant people corporately; a more idiomatic alternative is possible, but the formal phrase is retained here.
- source_word: רָעָה
  chosen: the evil
  alternatives:
  - harm
  - disaster
  lexicon: HALOT
  rationale: The noun denotes grievous wrongdoing/harm. 'Evil' preserves the moral weight of the atrocities foretold better than the softer 'harm' or the more impersonal 'disaster.'
- source_word: מִבְצְרֵיהֶם תְּשַׁלַּח בָּאֵשׁ
  chosen: you will set their fortresses on fire
  alternatives:
  - you will send their fortified places into the fire
  - you will burn their strongholds
  lexicon: HALOT
  rationale: The idiom literally involves sending into fire; 'set ... on fire' is the clearest natural English equivalent. 'Fortresses' renders the military sense of מִבְצָר.
- source_word: וּבַחֻרֵיהֶם
  chosen: their young men
  alternatives:
  - their chosen men
  - their warriors
  lexicon: HALOT
  rationale: The noun commonly refers to young men in their prime, often those fit for battle. 'Young men' is the most direct rendering; the military implication is supplied by the context of killing with the sword.
- source_word: בַּחֶרֶב תַּהֲרֹג
  chosen: kill their young men with the sword
  alternatives:
  - slay ... with the sword
  lexicon: HALOT
  rationale: '''Kill'' is clear modern English; ''with the sword'' preserves the instrumental phrase and the violent concreteness of the Hebrew.'
- source_word: עֹלְלֵיהֶם
  chosen: their little children
  alternatives:
  - their infants
  - their children
  lexicon: HALOT
  rationale: The term refers to small children/infants. 'Little children' preserves the vulnerability in view without over-narrowing to newborns only.
- source_word: תְּרַטֵּשׁ
  chosen: dash ... to pieces
  alternatives:
  - tear apart
  - crush
  lexicon: HALOT
  rationale: The verb denotes brutal smashing or dashing, especially in warfare. 'Dash ... to pieces' is the established and semantically strong English equivalent.
- source_word: הָרֹתֵיהֶם
  chosen: their pregnant women
  alternatives:
  - their expectant mothers
  lexicon: HALOT
  rationale: The adjective/noun refers to women who are pregnant. The direct wording preserves the starkness of the prophecy.
- source_word: תְּבַקֵּעַ
  chosen: rip open
  alternatives:
  - split open
  lexicon: HALOT
  rationale: The verb means to cleave or split open. 'Rip open' communicates the horrific violence in idiomatic modern English.
