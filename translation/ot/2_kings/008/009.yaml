id: 2KI.8.9
reference: 2 Kings 8:9
source:
  edition: WLC
  text: וַ/יֵּ֣לֶךְ חֲזָאֵל֮ לִ/קְרָאת/וֹ֒ וַ/יִּקַּ֨ח מִנְחָ֤ה בְ/יָד/וֹ֙ וְ/כָל
    ט֣וּב דַּמֶּ֔שֶׂק מַשָּׂ֖א אַרְבָּעִ֣ים גָּמָ֑ל וַ/יָּבֹא֙ וַ/יַּעֲמֹ֣ד לְ/פָנָ֔י/ו
    וַ/יֹּ֗אמֶר בִּנְ/ךָ֨ בֶן הֲדַ֤ד מֶֽלֶךְ אֲרָם֙ שְׁלָחַ֤/נִי אֵלֶ֨י/ךָ֙ לֵ/אמֹ֔ר
    הַ/אֶחְיֶ֖ה מֵ/חֳלִ֥י זֶֽה־־־׃
translation:
  text: So Hazael went to meet him and took a gift in his hand, and every good thing
    of Damascus, a load of forty camels. He came and stood before him and said, “Your
    son Ben-hadad king of Aram has sent me to you, saying, ‘Will I recover from this
    sickness?’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Your son” is a deferential expression of humility toward a respected superior;
      it does not necessarily indicate literal sonship.
    reason: cultural_note
  - marker: b
    text: Or more literally, “Will I live from this sickness?”
    reason: lexical_alternative
lexical_decisions:
- source_word: לִקְרָאתוֹ
  chosen: to meet him
  alternatives:
  - to encounter him
  - to greet him
  lexicon: HALOT
  rationale: The idiom with קרא plus ל indicates going out to meet someone. 'Meet
    him' is natural English and preserves the directional sense without overinterpreting
    the encounter as merely ceremonial.
- source_word: מִנְחָה
  chosen: a gift
  alternatives:
  - tribute
  - offering
  - present
  lexicon: HALOT
  rationale: In this diplomatic context, מִנְחָה refers to a present brought to a
    superior or prophet, not a cultic offering. 'Gift' is clear modern English; 'tribute'
    would imply political subjection more strongly than the context requires.
- source_word: בְיָדוֹ
  chosen: in his hand
  alternatives:
  - with him
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'in his hand.' Retaining it preserves
    the concrete phrasing and is still idiomatic enough in English in a narrative
    of carrying a gift.
- source_word: וְכָל טוּב דַּמֶּשֶׂק
  chosen: even every good thing of Damascus
  alternatives:
  - and all the good things of Damascus
  - and every kind of good thing from Damascus
  - all the finest goods of Damascus
  lexicon: HALOT
  rationale: טוּב here denotes the good produce or choice goods of Damascus. 'Every
    good thing of Damascus' stays close to the Hebrew while conveying abundance and
    quality. 'Even' helps connect this phrase appositionally to the gift.
- source_word: מַשָּׂא אַרְבָּעִים גָּמָל
  chosen: a load for forty camels
  alternatives:
  - the load of forty camels
  - forty camels' load
  lexicon: HALOT
  rationale: מַשָּׂא means a burden/load. The phrase describes the quantity of goods
    as enough to load forty camels. 'A load for forty camels' is readable and faithful.
- source_word: וַיַּעֲמֹד לְפָנָיו
  chosen: stood before him
  alternatives:
  - presented himself before him
  lexicon: HALOT
  rationale: This is a standard audience formula. 'Stood before him' preserves the
    formal posture before Elisha without adding explanatory wording.
- source_word: בִּנְךָ
  chosen: Your son
  alternatives:
  - your servant
  lexicon: HALOT
  rationale: The literal Hebrew is 'your son,' a deferential courtly expression used
    toward a superior. The main text preserves the familial metaphor rather than flattening
    it to 'servant'; the nuance can be noted in a footnote.
- source_word: שְׁלָחַנִי אֵלֶיךָ
  chosen: has sent me to you
  alternatives:
  - sent me to you
  lexicon: HALOT
  rationale: The perfect verb in direct speech naturally renders as English present
    perfect in this context, indicating the completed commissioning with present relevance.
- source_word: הַאֶחְיֶה
  chosen: Will I recover
  alternatives:
  - Shall I live
  - Will I survive
  lexicon: HALOT
  rationale: Although the verb is literally 'live,' in context of illness and with
    מֵחֳלִי ('from this sickness') it idiomatically asks about recovery. 'Will I recover'
    communicates the intended sense in natural English.
- source_word: מֵחֳלִי זֶה
  chosen: from this sickness
  alternatives:
  - from this disease
  - of this illness
  lexicon: HALOT
  rationale: חֳלִי denotes sickness/illness. 'From this sickness' matches the Hebrew
    preposition and fits the recovery idiom.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - Syria
  lexicon: HALOT
  rationale: Per translation philosophy, names are transliterated rather than replaced
    with later geopolitical equivalents. 'Aram' preserves the historical setting better
    than 'Syria'.
