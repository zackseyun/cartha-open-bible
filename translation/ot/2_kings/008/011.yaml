theological_decisions:
- issue: Ambiguity of the subject experiencing shame in the clause עַד־בֹּשׁ
  chosen_reading: Preserve the Hebrew ambiguity with 'until he was ashamed' rather
    than specifying Hazael or Elisha.
  alternative_readings:
  - until Hazael was ashamed
  - until he was embarrassed
  rationale: The Hebrew does not explicitly identify the subject in a way that removes
    all ambiguity, and the surrounding narrative has been understood in more than
    one way. Following the translation philosophy, the rendering preserves the tension
    rather than resolving it interpretively.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
