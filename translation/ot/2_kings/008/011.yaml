id: 2KI.8.11
reference: 2 Kings 8:11
source:
  edition: WLC
  text: וַ/יַּעֲמֵ֥ד אֶת פָּנָ֖י/ו וַ/יָּ֣שֶׂם עַד בֹּ֑שׁ וַ/יֵּ֖בְךְּ אִ֥ישׁ הָ/אֱלֹהִֽים־־׃
translation:
  text: And he fixed his face and set it until he was ashamed, and the man of God
    wept.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'until Hazael was ashamed.' The Hebrew leaves the subject of 'was ashamed'
      less explicit than English normally prefers.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲמֵד
  chosen: fixed
  alternatives:
  - held steady
  - set
  - stared
  lexicon: HALOT
  rationale: From עמד in the Hiphil/waw-consecutive, here with 'his face' as object.
    The sense is causing/holding the face in a fixed position, hence 'fixed' rather
    than the more wooden 'caused to stand.'
- source_word: אֶת־פָּנָיו
  chosen: his face
  alternatives:
  - his gaze
  - his countenance
  lexicon: HALOT
  rationale: Literal object 'his face' is retained. 'Gaze' is interpretive and possible
    in context, but 'face' better preserves the Hebrew imagery while remaining natural
    enough in English.
- source_word: וַיָּשֶׂם
  chosen: set
  alternatives:
  - kept
  - held
  lexicon: HALOT
  rationale: Common verb שׂים 'put/set.' In this idiom with the preceding clause it
    likely continues the idea of maintaining the fixed stare. 'Set' preserves the
    lexical link without over-paraphrasing.
- source_word: עַד־בֹּשׁ
  chosen: until he was ashamed
  alternatives:
  - until he became embarrassed
  - until shame came
  - until he was disconcerted
  lexicon: HALOT
  rationale: בוש denotes shame/embarrassment. The clause is syntactically difficult
    because the subject of the shame is not explicit in English; 'until he was ashamed'
    is the most direct rendering of the Hebrew verbal idea. The ambiguity of who is
    ashamed is preserved rather than resolved.
- source_word: וַיֵּבְךְּ
  chosen: wept
  alternatives:
  - cried
  lexicon: HALOT
  rationale: בכה is straightforwardly 'weep.' 'Wept' better matches the solemn tone
    than the broader 'cried.'
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  lexicon: HALOT
  rationale: Standard title for the prophet, here Elisha. It should be translated
    rather than paraphrased as 'the prophet' in order to preserve the source expression.
