id: 2KI.8.3
reference: 2 Kings 8:3
source:
  edition: WLC
  text: וַ/יְהִ֗י מִ/קְצֵה֙ שֶׁ֣בַע שָׁנִ֔ים וַ/תָּ֥שָׁב הָ/אִשָּׁ֖ה מֵ/אֶ֣רֶץ פְּלִשְׁתִּ֑ים וַ/תֵּצֵא֙ לִ/צְעֹ֣ק אֶל הַ/מֶּ֔לֶךְ אֶל בֵּיתָ֖/הּ וְ/אֶל שָׂדָֽ/הּ־־־׃
translation:
  text: At the end of seven years[a], the woman returned from the land of the Philistines, and she went out to cry out to the king for her house and for her field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to cry out to the king' or 'to plead with the king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְצֵה
  chosen: at the end of
  alternatives:
  - from the end of
  - after
  lexicon: HALOT
  rationale: The preposition מִן with קֵץ/קָצֶה idiomatically marks the conclusion of a period. 'At the end of' is natural English and preserves the temporal sense without over-literal awkwardness.
- source_word: וַתָּשָׁב
  chosen: returned
  alternatives:
  - came back
  lexicon: HALOT
  rationale: שׁוּב in this narrative context denotes returning from the place of sojourn mentioned in the previous verse. 'Returned' is the standard and suitably formal narrative rendering.
- source_word: אֶרֶץ פְּלִשְׁתִּים
  chosen: the land of the Philistines
  alternatives:
  - Philistia
  lexicon: HALOT
  rationale: The Hebrew is literally 'land of the Philistines.' This is more transparent to the source text than the more conventional but less explicit geographical label 'Philistia.'
- source_word: וַתֵּצֵא
  chosen: she went out
  alternatives:
  - she came out
  - she went
  lexicon: HALOT
  rationale: יָצָא is literally 'go out/come out.' Retaining 'went out' preserves the narrative movement from her return to her formal approach to the king, without collapsing the verb into a mere auxiliary.
- source_word: לִצְעֹק
  chosen: to appeal
  alternatives:
  - to cry out
  - to plead
  lexicon: HALOT
  rationale: צָעַק literally means 'cry out,' but in legal or petitionary contexts it can denote an appeal for redress. Because the object is the king and the matter concerns restoration of property, 'appeal' conveys the judicial sense in idiomatic English. The more literal alternative is preserved in a footnote.
- source_word: אֶל־הַמֶּלֶךְ
  chosen: to the king
  alternatives:
  - before the king
  lexicon: HALOT
  rationale: אֶל straightforwardly marks direction toward the king as the one petitioned. 'To the king' is the most direct rendering.
- source_word: בֵּיתָהּ
  chosen: her house
  alternatives:
  - her household
  - her home
  lexicon: HALOT
  rationale: בַּיִת can mean house, household, or home depending on context. Here paired with 'field' and in a property-restoration setting, the concrete sense 'house' is most likely.
- source_word: שָׂדָהּ
  chosen: her field
  alternatives:
  - her land
  lexicon: HALOT
  rationale: שָׂדֶה commonly means 'field' or cultivated land. Since it is coordinated with 'house,' 'field' preserves the specific property term better than the broader 'land.'
