id: 2KI.8.24
reference: 2 Kings 8:24
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֤ב יוֹרָם֙ עִם אֲבֹתָ֔י/ו וַ/יִּקָּבֵ֥ר עִם אֲבֹתָ֖י/ו בְּ/עִ֣יר
    דָּוִ֑ד וַ/יִּמְלֹ֛ךְ אֲחַזְיָ֥הוּ בְנ֖/וֹ תַּחְתָּֽי/ו־־׃פ
translation:
  text: And Yoram lay down with his fathers and was buried with his fathers in the
    City of David, and Ahaziah his son reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'slept with his fathers.' The Hebrew uses a conventional royal death
      formula.
    reason: lexical_alternative
  - marker: b
    text: Yoram is traditionally rendered 'Jehoram' in some English versions.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: lay down
  alternatives:
  - slept
  - died
  lexicon: HALOT
  rationale: The verb שׁכב literally means 'lie down' and in royal death notices functions
    as a conventional idiom for death. 'Lay down' preserves the Hebrew idiom without
    over-paraphrasing to 'died'; 'slept' is possible but can sound overly euphemistic
    or import later theological associations.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: This is the standard dynastic formula in Kings. 'With his fathers' preserves
    the idiomatic and genealogical force of the Hebrew more closely than the more
    interpretive 'with his ancestors.'
- source_word: וַיִּקָּבֵר
  chosen: was buried
  alternatives:
  - and he was buried
  lexicon: HALOT
  rationale: The Niphal form is passive/reflexive in sense here, naturally rendered
    'was buried.' English omits the repeated subject smoothly while preserving the
    sequence.
- source_word: בְּעִיר דָּוִד
  chosen: in the City of David
  alternatives:
  - in David's city
  lexicon: HALOT
  rationale: '''City of David'' is the established and transparent rendering of the
    place name expression, preserving its status as a recognized location rather than
    a generic description.'
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: The verb מלך in succession formulas is well rendered 'reigned.' 'Became
    king' foregrounds accession rather than the standard regnal notice, and 'began
    to reign' adds aspect not explicit here.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: In succession contexts תַּחַת commonly means 'in place of.' This is idiomatic
    modern English and accurately conveys royal succession.
- source_word: יוֹרָם
  chosen: Yoram
  alternatives:
  - Jehoram
  rationale: The Hebrew form here is Yoram. Following original-language primacy and
    transliteration of names, 'Yoram' is preferred over the traditional harmonized
    form 'Jehoram.'
- source_word: אֲחַזְיָהוּ
  chosen: Ahaziah
  rationale: Standard English transliteration of the personal name, consistent with
    common biblical usage and the Hebrew form.
