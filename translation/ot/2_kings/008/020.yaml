id: 2KI.8.20
reference: 2 Kings 8:20
source:
  edition: WLC
  text: בְּ/יָמָי/ו֙ פָּשַׁ֣ע אֱד֔וֹם מִ/תַּ֖חַת יַד יְהוּדָ֑ה וַ/יַּמְלִ֥כוּ עֲלֵי/הֶ֖ם מֶֽלֶךְ־׃
translation:
  text: In his days Edom rebelled from under the hand of Judah and made a king over themselves[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more dynamically, 'Edom revolted from Judah's control.' The Hebrew reads literally, 'rebelled from under the hand of Judah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיָמָיו
  chosen: In his days
  alternatives:
  - During his days
  - In his time
  lexicon: HALOT
  rationale: Temporal idiom marking the period of the king's reign or lifetime; 'In his days' is a natural and conventional English rendering that preserves the Hebrew expression.
- source_word: פָּשַׁע
  chosen: rebelled
  alternatives:
  - revolted
  - transgressed
  lexicon: HALOT
  rationale: In this political context with Edom breaking away from Judah's control, the verb denotes rebellion/revolt rather than moral transgression. 'Rebelled' is clear modern English and fits the historical setting.
- source_word: אֱדוֹם
  chosen: Edom
  rationale: Standard transliteration of the place/people name.
- source_word: מִתַּחַת יַד יְהוּדָה
  chosen: from under the hand of Judah
  alternatives:
  - from under Judah's power
  - from Judah's control
  lexicon: HALOT
  rationale: The Hebrew idiom literally means release from another's hand, expressing political domination or control. The main text keeps the concrete idiom 'under the hand' while remaining intelligible in English.
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Standard English form for the kingdom/tribal polity.
- source_word: וַיַּמְלִכוּ
  chosen: made
  alternatives:
  - appointed
  - set up
  - caused to reign
  lexicon: HALOT
  rationale: Hiphil of מלך here means to make someone king or cause someone to reign. 'Made' is concise and idiomatic when followed by 'a king over themselves.'
- source_word: עֲלֵיהֶם
  chosen: over themselves
  alternatives:
  - over them
  lexicon: HALOT
  rationale: The pronoun refers back to the Edomites; in English, 'over themselves' makes explicit that they installed their own independent ruler.
- source_word: מֶלֶךְ
  chosen: a king
  alternatives:
  - king
  lexicon: HALOT
  rationale: The anarthrous singular is naturally rendered 'a king,' indicating the establishment of an independent monarch rather than naming him.
