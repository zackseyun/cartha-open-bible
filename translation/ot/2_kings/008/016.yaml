id: 2KI.8.16
reference: 2 Kings 8:16
source:
  edition: WLC
  text: וּ/בִ/שְׁנַ֣ת חָמֵ֗שׁ לְ/יוֹרָ֤ם בֶּן אַחְאָב֙ מֶ֣לֶךְ יִשְׂרָאֵ֔ל וִ/יהוֹשָׁפָ֖ט מֶ֣לֶךְ יְהוּדָ֑ה מָלַ֛ךְ יְהוֹרָ֥ם בֶּן יְהוֹשָׁפָ֖ט מֶ֥לֶךְ יְהוּדָֽה־־׃
translation:
  text: And in the fifth year of Joram son of Ahab king of Israel[a], while Jehoshaphat was king of Judah, Jehoram son of Jehoshaphat, king of Judah[b], began to reign.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'and Jehoshaphat king of Judah.' The Hebrew clause is compressed; some understand it as reflecting a period of coregency.
    reason: alternative_reading
  - marker: b
    text: 'Hebrew distinguishes the names: ''Joram'' (king of Israel) and ''Jehoram'' (son of Jehoshaphat, king of Judah), though these forms are closely related.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בִ/שְׁנַת
  chosen: And in the ... year of
  alternatives:
  - Now in the ... year of
  - In the ... year of
  lexicon: HALOT
  rationale: The prefixed conjunction plus beth preposition introduces a chronological notice. 'And in' preserves the narrative linkage and temporal force without sounding wooden.
- source_word: חָמֵשׁ
  chosen: fifth
  alternatives:
  - five
  lexicon: HALOT
  rationale: English idiom in regnal formulas uses the ordinal, 'the fifth year,' though the Hebrew cardinal functions in that sense here.
- source_word: לְ/יוֹרָם
  chosen: of Joram
  alternatives:
  - belonging to Joram
  - for Joram
  lexicon: HALOT
  rationale: The preposition marks the regnal year reckoned to Joram. 'Of Joram' is the standard and clear English rendering in chronological formulas.
- source_word: בֶּן אַחְאָב
  chosen: son of Ahab
  lexicon: HALOT
  rationale: A straightforward patronymic; retained formally for historical identification.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  lexicon: HALOT
  rationale: Standard royal title; no reason to vary.
- source_word: וִ/יהוֹשָׁפָט מֶלֶךְ יְהוּדָה
  chosen: while Jehoshaphat was king of Judah
  alternatives:
  - and Jehoshaphat king of Judah
  - with Jehoshaphat king of Judah
  lexicon: HALOT
  rationale: The clause is verbless in Hebrew and somewhat compressed. Rendering it as 'while Jehoshaphat was king of Judah' makes explicit the temporal circumstance in natural English and reflects the likely sense that Jehoshaphat was still reigning at this point, possibly as coregent context.
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - began to reign
  - reigned
  lexicon: HALOT
  rationale: In regnal notices, the verb denotes accession to kingship. 'Became king' is readable modern English and avoids the ambiguity of simple 'reigned,' which can suggest the whole reign rather than its beginning.
- source_word: יְהוֹרָם
  chosen: Jehoram
  alternatives:
  - Joram
  lexicon: HALOT
  rationale: The Judahite king is named יְהוֹרָם here, distinct in spelling from the Israelite king יוֹרָם earlier in the verse. Preserving the distinction as 'Jehoram' versus 'Joram' helps the English reader track the two different kings represented by different Hebrew forms.
- source_word: בֶּן יְהוֹשָׁפָט
  chosen: son of Jehoshaphat
  lexicon: HALOT
  rationale: Formal patronymic retained for clarity and historical identification.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: The final appositional title identifies Jehoram's realm. Retained even though somewhat repetitive in English, because it is present in the Hebrew and clarifies the accession notice.
