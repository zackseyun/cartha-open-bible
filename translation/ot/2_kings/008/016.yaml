theological_decisions:
- issue: Compressed chronological clause involving Jehoshaphat's reign and Jehoram's accession
  chosen_reading: Render the verbless phrase temporally as 'while Jehoshaphat was king of Judah' without attempting to resolve the broader chronology beyond the verse itself.
  alternative_readings:
  - Render more literally as 'and Jehoshaphat king of Judah'
  - Interpret as implying a formal coregency and make that explicit in the main text
  rationale: The verse presents a known chronological tension in Kings, often discussed in terms of coregency. The Hebrew itself does not explicitly state 'coregency,' so the translation should not import that conclusion into the main text. A temporal rendering communicates the plain sense in readable English while preserving the tension rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
