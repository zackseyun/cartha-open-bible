id: 2KI.8.6
reference: 2 Kings 8:6
source:
  edition: WLC
  text: וַ/יִּשְׁאַ֥ל הַ/מֶּ֛לֶךְ לָ/אִשָּׁ֖ה וַ/תְּסַפֶּר ל֑/וֹ וַ/יִּתֶּן לָ֣/הּ
    הַ/מֶּלֶךְ֩ סָרִ֨יס אֶחָ֜ד לֵ/אמֹ֗ר הָשֵׁ֤יב אֶת כָּל אֲשֶׁר לָ/הּ֙ וְ/אֵת֙ כָּל
    תְּבוּאֹ֣ת הַ/שָּׂדֶ֔ה מִ/יּ֛וֹם עָזְבָ֥ה אֶת הָ/אָ֖רֶץ וְ/עַד עָֽתָּה־־־־־־־־׃פ
translation:
  text: So the king asked the woman, and she told him. Then the king assigned to her
    one court official, saying, “Restore all that belongs to her, along with all the
    produce of the field from the day she left the land until now.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “one eunuch,” if סָרִיס is taken in its more literal sense rather than
      the broader sense “court official.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁאַל
  chosen: asked
  alternatives:
  - questioned
  - inquired of
  lexicon: HALOT
  rationale: The verb שׁאל here introduces the king's inquiry to the woman. 'Asked'
    is the most natural modern English rendering and adequately reflects the simple
    narrative action without overformalizing it.
- source_word: לָאִשָּׁה
  chosen: the woman
  alternatives:
  - the wife
  lexicon: HALOT
  rationale: אִשָּׁה can mean 'woman' or 'wife.' In this context it refers to the
    Shunammite woman already in view, not primarily her marital status, so 'the woman'
    is preferable.
- source_word: וַתְּסַפֶּר לוֹ
  chosen: she told him
  alternatives:
  - she recounted to him
  - she related it to him
  lexicon: HALOT
  rationale: ספר in the piel commonly means to recount or tell. 'She told him' is
    concise, idiomatic, and fits the narrative flow.
- source_word: וַיִּתֶּן לָהּ ... סָרִיס אֶחָד
  chosen: assigned to her one court official
  alternatives:
  - gave her one eunuch
  - appointed for her one officer
  lexicon: HALOT
  rationale: סָרִיס can denote a literal eunuch or, more broadly in royal contexts,
    a court official. Because the administrative function is foregrounded here and
    literal castration is not, 'court official' best conveys the likely sense in readable
    English. 'Assigned to her' captures נתן in this administrative context better
    than the overly literal 'gave her.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - with the order
  - commanding
  lexicon: HALOT
  rationale: The infinitive introduces direct speech in standard Hebrew narrative
    style. 'Saying' preserves the form naturally.
- source_word: הָשֵׁיב
  chosen: Restore
  alternatives:
  - Return
  - Give back
  lexicon: HALOT
  rationale: The hiphil imperative of שוב here commands the official to cause property
    to be returned. 'Restore' fits both the property and the accumulated agricultural
    income that follows.
- source_word: אֶת כָּל אֲשֶׁר לָהּ
  chosen: all that belongs to her
  alternatives:
  - all that is hers
  - everything that was hers
  lexicon: HALOT
  rationale: The phrase denotes her property or rightful possessions. 'All that belongs
    to her' makes the possessive/legal sense explicit in natural English.
- source_word: תְּבוּאֹת הַשָּׂדֶה
  chosen: the produce of the field
  alternatives:
  - the yield of the field
  - the crops of the field
  lexicon: HALOT
  rationale: תְּבוּאָה refers to produce, yield, or harvest. 'Produce of the field'
    is broad enough to include all agricultural returns and stays close to the Hebrew.
- source_word: מִיּוֹם עָזְבָה אֶת הָאָרֶץ
  chosen: from the day she left the land
  alternatives:
  - from the day she departed from the land
  - since the day she left the country
  lexicon: HALOT
  rationale: עָזַב here means to leave/depart from. 'The land' preserves the Hebrew
    term אֶרֶץ without overinterpreting whether it means region or country; in context
    it refers to her homeland/territory.
- source_word: וְעַד עָתָּה
  chosen: until now
  alternatives:
  - up to now
  - to this day
  lexicon: HALOT
  rationale: A standard temporal expression meaning up to the present moment of the
    narrative action. 'Until now' is the most straightforward rendering.
