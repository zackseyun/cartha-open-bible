id: 2KI.8.22
reference: 2 Kings 8:22
source:
  edition: WLC
  text: וַ/יִּפְשַׁ֣ע אֱד֗וֹם מִ/תַּ֨חַת֙ יַד יְהוּדָ֔ה עַ֖ד הַ/יּ֣וֹם הַ/זֶּ֑ה אָ֛ז
    תִּפְשַׁ֥ע לִבְנָ֖ה בָּ/עֵ֥ת הַ/הִֽיא־׃
translation:
  text: So Edom rebelled from under the hand of Judah to this day. Then Libnah also
    rebelled at that time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'revolted' / 'broke away.' The Hebrew verb carries the sense of political
      rebellion against rule.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְשַׁע
  chosen: rebelled
  alternatives:
  - revolted
  - broke away
  lexicon: HALOT
  rationale: פשע in this political context denotes rebellion or revolt against established
    rule. 'Rebelled' is clear modern English and preserves the political sense without
    over-paraphrase.
- source_word: מִתַּחַת יַד יְהוּדָה
  chosen: from under the hand of Judah
  alternatives:
  - from under Judah's power
  - from Judah's control
  lexicon: HALOT
  rationale: The idiom 'under the hand of' expresses subjection or control. Retaining
    'hand' preserves the Hebrew imagery while remaining intelligible in English.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is a standard Hebrew temporal formula indicating the situation continued
    to the writer's present standpoint. 'To this day' is idiomatic English.
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  - So
  lexicon: HALOT
  rationale: Here אָז marks the next event in sequence tied to the same historical
    moment. 'Then' fits the narrative flow; the more specific temporal phrase is already
    supplied later by 'at that time.'
- source_word: תִּפְשַׁע
  chosen: rebelled
  alternatives:
  - revolted
  - broke away
  lexicon: HALOT
  rationale: Same verb as earlier in the verse. Although the form differs, the sense
    remains political rebellion. Consistency favors 'rebelled.'
- source_word: לִבְנָה
  chosen: Libnah
  rationale: Proper place name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: בָּעֵת הַהִיא
  chosen: at that time
  alternatives:
  - in that time
  - on that occasion
  lexicon: HALOT
  rationale: A temporal phrase locating Libnah's rebellion in the same historical
    period. 'At that time' is natural and sufficiently formal.
