id: 2KI.8.2
reference: 2 Kings 8:2
source:
  edition: WLC
  text: וַ/תָּ֨קָם֙ הָֽ/אִשָּׁ֔ה וַ/תַּ֕עַשׂ כִּ/דְבַ֖ר אִ֣ישׁ הָ/אֱלֹהִ֑ים וַ/תֵּ֤לֶךְ הִיא֙ וּ/בֵיתָ֔/הּ וַ/תָּ֥גָר בְּ/אֶֽרֶץ פְּלִשְׁתִּ֖ים שֶׁ֥בַע שָׁנִֽים־׃
translation:
  text: So the woman arose and did according to the word of the man of God. She went[a], she and her household, and lived as a foreign resident in the land of the Philistines for seven years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'sojourned in the land of the Philistines for seven years.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּקָם
  chosen: arose
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: From קום in the wayyiqtol, marking the woman's responsive action. 'Arose' preserves the narrative sequence and slightly formal tone without overstating motion.
- source_word: וַתַּעַשׂ כִּדְבַר
  chosen: did according to the word of
  alternatives:
  - did as
  - acted according to what ... said
  lexicon: HALOT
  rationale: This idiom means to act in accordance with someone's spoken instruction. 'According to the word of' keeps the Hebrew flavor while remaining natural English.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet
  - the holy man
  lexicon: HALOT
  rationale: A standard biblical title for a prophet or divinely commissioned figure. 'The man of God' is the established and most transparent rendering of the Hebrew expression.
- source_word: וַתֵּלֶךְ הִיא וּבֵיתָהּ
  chosen: She went with her household
  alternatives:
  - she and her household went
  - she went, and her household with her
  lexicon: HALOT
  rationale: בַּיִת with pronominal suffix often denotes one's household, not merely the physical house. 'With her household' communicates that she departed together with those belonging to her house.
- source_word: וַתָּגָר
  chosen: lived as a foreign resident
  alternatives:
  - sojourned
  - stayed
  - lived temporarily
  lexicon: HALOT
  rationale: From גור, commonly used for residing as a sojourner/alien rather than simply dwelling. 'Lived as a foreign resident' makes the social nuance clearer for modern readers than the more archaic 'sojourned'.
- source_word: בְּאֶרֶץ פְּלִשְׁתִּים
  chosen: in the land of the Philistines
  alternatives:
  - in Philistia
  lexicon: HALOT
  rationale: A transparent rendering of the construct phrase. 'Land of the Philistines' preserves the ethnogeographic wording of the Hebrew.
- source_word: שֶׁבַע שָׁנִים
  chosen: for seven years
  alternatives:
  - seven years
  lexicon: HALOT
  rationale: English idiom normally supplies 'for' with a duration phrase after a verb of residence.
