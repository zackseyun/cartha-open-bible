id: 2KI.8.17
reference: 2 Kings 8:17
source:
  edition: WLC
  text: בֶּן שְׁלֹשִׁ֥ים וּ/שְׁתַּ֛יִם שָׁנָ֖ה הָיָ֣ה בְ/מָלְכ֑/וֹ וּ/שְׁמֹנֶ֣ה שנה
    מָלַ֖ךְ בִּ/ירוּשָׁלִָֽם־׃
translation:
  text: He was thirty-two years old when he became king, and he reigned eight years
    in Jerusalem.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן
  chosen: was ... years old
  alternatives:
  - son of
  lexicon: HALOT
  rationale: In age formulas, בֶּן + number + שָׁנָה is an idiom meaning 'X years
    old,' not a literal filial expression. English idiom requires restructuring.
- source_word: שְׁלֹשִׁים וּשְׁתַּיִם שָׁנָה
  chosen: thirty-two years old
  alternatives:
  - a son of thirty-two years
  lexicon: HALOT
  rationale: Standard rendering of the Hebrew age expression; preserves the precise
    age while using natural English.
- source_word: הָיָה בְמָלְכוֹ
  chosen: when he became king
  alternatives:
  - was at his reigning
  - was when he began to reign
  lexicon: HALOT
  rationale: The phrase marks the time of accession. 'When he became king' is clear
    modern English and accurately conveys the sense of the infinitive-like construction
    with ב plus מלך.
- source_word: וּשְׁמֹנֶה שנה
  chosen: eight years
  lexicon: HALOT
  rationale: Direct numerical expression for the duration of reign.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  lexicon: HALOT
  rationale: The verb specifically denotes exercising kingship/reigning, not merely
    holding the title.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Locative preposition indicating the place from which he reigned as king
    of Judah.
