id: 2CH.18.16
reference: 2 Chronicles 18:16
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר רָאִ֤יתִי אֶת כָּל יִשְׂרָאֵל֙ נְפוֹצִ֣ים עַל הֶֽ/הָרִ֔ים כַּ/צֹּ֕אן אֲשֶׁ֥ר אֵין לָ/הֶ֖ן רֹעֶ֑ה וַ/יֹּ֤אמֶר יְהוָה֙ לֹֽא אֲדֹנִ֣ים לָ/אֵ֔לֶּה יָשׁ֥וּבוּ אִישׁ לְ/בֵית֖/וֹ בְּ/שָׁלֽוֹם־־־־־־׃
translation:
  text: And he said[a], “I saw all Israel scattered on the mountains, like sheep that have no shepherd. And Yahweh said, ‘These have no master[b]; let each man return to his house in peace.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “like sheep without a shepherd.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “These have no masters.” Some translations smooth the plural to “no master” or “no lord.”
    reason: lexical_alternative
lexical_decisions:
- source_word: נְפוֹצִים
  chosen: scattered
  alternatives:
  - dispersed
  - scattered abroad
  lexicon: HALOT
  rationale: The passive participle from פוץ depicts Israel as broken up and spread out after defeat. 'Scattered' is natural English and preserves the military/pastoral image without overinterpreting.
- source_word: עַל הֶהָרִים
  chosen: on the mountains
  alternatives:
  - upon the hills
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'Mountains' reflects הָרִים more directly than 'hills' and matches the elevated terrain imagery.
- source_word: כַּצֹּאן אֲשֶׁר אֵין לָהֶן רֹעֶה
  chosen: like sheep that have no shepherd
  alternatives:
  - like sheep without a shepherd
  lexicon: HALOT
  rationale: This preserves the simile and its familiar biblical resonance. The fuller relative clause closely follows the Hebrew while remaining idiomatic.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֹא אֲדֹנִים לָאֵלֶּה
  chosen: These have no masters
  alternatives:
  - These have no lord
  - There are no masters for these
  - These have no master
  lexicon: HALOT
  rationale: אֲדֹנִים is plural, so 'masters' best reflects the form and the sense that the people are leaderless after the king's death. 'Lord' would sound overly theological here, while singular 'master' would flatten the Hebrew plural.
- source_word: יָשׁוּבוּ אִישׁ לְבֵיתוֹ
  chosen: let each man return to his house
  alternatives:
  - each one should return to his house
  - let every man go back to his home
  lexicon: HALOT
  rationale: The imperfect here functions jussively in reported divine speech. 'Let each man return' captures the force well. 'Man' preserves the distributive אִישׁ in line with the gender-accurate policy.
- source_word: בְּשָׁלוֹם
  chosen: in peace
  alternatives:
  - safely
  - peacefully
  lexicon: HALOT
  rationale: '''In peace'' is the standard rendering of בְּשָׁלוֹם and preserves both the idiom and the irony of a defeated army being dismissed to return unharmed.'
