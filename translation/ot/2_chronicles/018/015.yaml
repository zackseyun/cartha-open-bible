id: 2CH.18.15
reference: 2 Chronicles 18:15
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֵלָי/ו֙ הַ/מֶּ֔לֶךְ עַד כַּ/מֶּ֥ה פְעָמִ֖ים אֲנִ֣י מַשְׁבִּיעֶ֑/ךָ אֲ֠שֶׁר לֹֽא תְדַבֵּ֥ר אֵלַ֛/י רַק אֱמֶ֖ת בְּ/שֵׁ֥ם יְהוָֽה־־־׃
translation:
  text: Then the king said to him, “How many times must I make you swear that you tell me nothing but the truth in the name of Yahweh?”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English narrative flow while preserving sequence.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward definite noun; no need to supply the personal name since the Hebrew uses the title.
- source_word: עַד כַּמֶּה פְעָמִים
  chosen: How many times
  alternatives:
  - How often
  - Until how many times
  lexicon: HALOT
  rationale: Idiomatic expression of repeated frustration. 'How many times' is the most natural and sufficiently formal rendering.
- source_word: מַשְׁבִּיעֶךָ
  chosen: must I make you swear
  alternatives:
  - do I adjure you
  - am I putting you under oath
  lexicon: HALOT
  rationale: Hiphil of שבע means to cause someone to swear, i.e., place under oath. 'Make you swear' is clear modern English; 'must' conveys the exasperated force in context.
- source_word: אֲשֶׁר לֹא תְדַבֵּר אֵלַי
  chosen: that you speak to me
  alternatives:
  - that you not speak to me
  - that you tell me
  lexicon: HALOT
  rationale: 'After a verb of adjuration, אֲשֶׁר + negated imperfect functions as the content of the oath: ''that you speak/tell me not...'' In English this is best expressed positively with the following restriction: ''that you speak to me nothing but...'' rather than preserving a wooden negative construction.'
- source_word: רַק אֱמֶת
  chosen: nothing but the truth
  alternatives:
  - only truth
  - only what is true
  lexicon: HALOT
  rationale: רַק marks exclusivity and אֱמֶת means truth. 'Nothing but the truth' is an idiomatic English equivalent that also fits the oath context without adding foreign content.
- source_word: בְּשֵׁם יְהוָה
  chosen: in the name of the LORD
  alternatives:
  - by the name of the LORD
  - in the name of Yahweh
  lexicon: HALOT
  rationale: בְּשֵׁם here indicates the solemn sphere/authority of the oath or prophetic speech. 'In the name of the LORD' is standard, clear English. Per doctrine, יְהוָה is rendered 'the LORD,' with 'Yahweh' preserved as an alternative only in documentation, not main text.
