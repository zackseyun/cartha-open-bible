id: 2CH.30.17
reference: 2 Chronicles 30:17
source:
  edition: WLC
  text: כִּי רַבַּ֥ת בַּ/קָּהָ֖ל אֲשֶׁ֣ר לֹא הִתְקַדָּ֑שׁוּ וְ/הַ/לְוִיִּ֞ם עַל שְׁחִיטַ֣ת הַ/פְּסָחִ֗ים לְ/כֹל֙ לֹ֣א טָה֔וֹר לְ/הַקְדִּ֖ישׁ לַ/יהוָֽה־־־׃
translation:
  text: For many in the assembly had not sanctified themselves[a], and the Levites were over the slaughter of the Passover lambs for everyone who was not clean[c][b], to consecrate them to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had not consecrated themselves.' The Hebrew uses sanctification language, though ritual purification is the immediate issue.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the Passovers'; that is, the Passover sacrificial animals.
    reason: lexical_alternative
  - marker: c
    text: Or 'for all who were unclean.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבַּת בַּקָּהָל
  chosen: many in the assembly
  alternatives:
  - a great number in the assembly
  - many of the congregation
  lexicon: HALOT
  rationale: רַבַּת with בַּקָּהָל expresses a large number within the gathered community. 'Assembly' is a clear modern rendering of קָהָל and fits the cultic gathering context.
- source_word: הִתְקַדָּשׁוּ
  chosen: had not sanctified themselves
  alternatives:
  - had not consecrated themselves
  - had not purified themselves
  lexicon: HALOT
  rationale: The hitpael of קדשׁ denotes entering a state of consecration/sanctification for worship. 'Sanctified themselves' preserves the cultic and theological sense better than the narrower 'purified themselves,' though ritual purity is involved contextually.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal/cultic group name.
- source_word: עַל
  chosen: were over
  alternatives:
  - were in charge of
  - were responsible for
  lexicon: HALOT
  rationale: Here עַל marks responsibility or oversight. 'Were over' is slightly more formal and stays close to the Hebrew while still natural in English.
- source_word: שְׁחִיטַת הַפְּסָחִים
  chosen: the slaughtering of the Passover lambs
  alternatives:
  - the slaughter of the Passovers
  - killing the Passover offerings
  lexicon: HALOT
  rationale: שְׁחִיטָה is ritual slaughter. Though פְּסָחִים is literally 'Passovers,' in context it refers to the Passover sacrificial animals; 'Passover lambs' communicates the referent idiomatically in English.
- source_word: לְכֹל לֹא טָהוֹר
  chosen: for everyone who was not clean
  alternatives:
  - for all who were unclean
  - for everyone not ritually clean
  lexicon: HALOT
  rationale: טָהוֹר in this context is ritual cleanness. 'Not clean' is readable modern English and preserves the cultic contrast without overtechnical wording; the ritual sense is clear from context.
- source_word: לְהַקְדִּישׁ לַיהוָה
  chosen: to consecrate them to the LORD
  alternatives:
  - to sanctify them to the LORD
  - to make them holy to the LORD
  lexicon: HALOT
  rationale: The infinitive of קדשׁ here expresses the purpose of the Levites' action in relation to those who were unclean. 'Consecrate them to the LORD' best captures the cultic purpose in natural English. The object 'them' is supplied from context, referring to the Passover lambs on behalf of the unclean participants.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
