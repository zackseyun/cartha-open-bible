theological_decisions:
- issue: Cultic language of קדשׁ in a Passover context
  chosen_reading: Use 'sanctified/consecrate' language rather than reducing both instances to mere ritual purification.
  alternative_readings:
  - Use 'purified themselves' and 'make holy'
  - Use 'consecrated themselves' and 'consecrate'
  rationale: The verse concerns ritual eligibility, but the Hebrew root קדשׁ carries consecratory holiness language, not only cleanliness terminology. Preserving this wording maintains the theological distinction between purity and holiness while still fitting the immediate cultic setting.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Implied object in 'to consecrate ... to the LORD'
  chosen_reading: Understand the consecration as referring to the Passover lambs slaughtered on behalf of those who were unclean.
  alternative_readings:
  - Understand the object as the unclean people themselves
  rationale: Syntactically the Hebrew infinitive lacks an explicit object, but the nearest and most natural referent in context is the Passover sacrifices being slaughtered by the Levites for those unable to do so. This avoids implying that the Levites directly consecrated the people by slaughtering, while still reflecting the purpose of the action.
  doctrine_reference: Translation philosophy §1
