translation:
  text: 'Now there was a prophet of the LORD there, whose name was Oded; and he went out before the army that came to Samaria and said to them, “Look, because the LORD, the God of your fathers, was angry with Judah, he gave them into your hand, but you have killed them in a rage that has reached up to heaven.”'
