  text: וַ/יָּבֹ֣אוּ הַ֠/כֹּהֲנִים לִ/פְנִ֣ימָה בֵית יְהוָה֮ לְ/טַהֵר֒ וַ/יּוֹצִ֗יאוּ אֵ֤ת כָּל הַ/טֻּמְאָה֙ אֲשֶׁ֤ר מָֽצְאוּ֙ בְּ/הֵיכַ֣ל יְהוָ֔ה לַ/חֲצַ֖ר בֵּ֣ית יְהוָ֑ה וַֽ/יְקַבְּלוּ֙ הַ/לְוִיִּ֔ם לְ/הוֹצִ֥יא לְ/נַֽחַל קִדְר֖וֹן חֽוּצָ/ה־־־׃
translation:
  text: 'Then the priests went into the inner part of the house of the LORD to cleanse it, and they brought out to the court of the house of the LORD all the uncleanness that they found in the temple of the LORD. Then the Levites received it to carry it outside to the Kidron Valley.'
