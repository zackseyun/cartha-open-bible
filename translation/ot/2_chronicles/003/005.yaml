id: 2CH.3.5
reference: 2 Chronicles 3:5
source:
  edition: WLC
  text: וְ/אֵ֣ת הַ/בַּ֣יִת הַ/גָּד֗וֹל חִפָּה֙ עֵ֣ץ בְּרוֹשִׁ֔ים וַ/יְחַפֵּ֖/הוּ זָהָ֣ב ט֑וֹב וַ/יַּ֧עַל עָלָ֛י/ו תִּמֹרִ֖ים וְ/שַׁרְשְׁרֽוֹת׀׃
translation:
  text: He paneled the great house with cypress wood[a], overlaid it with fine gold[b], and put palm trees and chains on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'juniper wood' or 'fir wood' for 'cypress wood.' The identity of בְּרוֹשׁ is debated.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'palm trees and chains'; these likely refer to decorative motifs or ornamentation applied to the room.
    reason: cultural_note
lexical_decisions:
- source_word: הַבַּיִת הַגָּדוֹל
  chosen: the great house
  alternatives:
  - the main hall
  - the great temple room
  lexicon: HALOT
  rationale: בַּיִת literally means 'house,' but in temple-building contexts it can denote a major structure or chamber. Retaining 'house' is formally closer and preserves the architectural idiom, while 'great' reflects הַגָּדוֹל straightforwardly.
- source_word: חִפָּה
  chosen: paneled
  alternatives:
  - covered
  - ceiled
  lexicon: HALOT
  rationale: The verb חפה means 'to cover/overlay.' Because the direct object is עֵץ בְּרוֹשִׁים ('cypress wood'), 'paneled' communicates that the large room was lined or covered with wood, which fits the construction sequence better than a bare 'covered.' 'Ceiled' is traditional but too narrow/archaic.
- source_word: עֵץ בְּרוֹשִׁים
  chosen: cypress wood
  alternatives:
  - juniper wood
  - fir wood
  lexicon: HALOT
  rationale: בְּרוֹשׁ is traditionally rendered 'cypress,' though 'juniper' and 'fir' are also proposed. 'Cypress' is a common modern rendering for temple timber contexts and best fits current lexical consensus; 'wood' brings out עֵץ as material.
- source_word: וַיְחַפֵּהוּ זָהָב טוֹב
  chosen: overlaid it with fine gold
  alternatives:
  - covered it with good gold
  - plated it with pure gold
  lexicon: HALOT
  rationale: The repeated חפה again means 'cover/overlay.' 'Overlaid' is idiomatic in English for architectural gilding. זָהָב טוֹב is literally 'good gold'; 'fine gold' is natural English that preserves the sense of high-quality gold without sounding awkward.
- source_word: וַיַּעַל עָלָיו
  chosen: put on it
  alternatives:
  - applied to it
  - caused to go up on it
  lexicon: HALOT
  rationale: עלה in the Hiphil here likely means to place or apply onto a surface. 'Put on it' is clear modern English and fits the decorative context.
- source_word: תִּמֹרִים
  chosen: palm trees
  alternatives:
  - palm-tree figures
  - palms
  lexicon: HALOT
  rationale: תִּמֹרִים denotes palm trees or palm-tree forms. In this decorative setting, the referent is likely carved or embossed palm-tree motifs, but the Hebrew itself simply says 'palm trees,' so that is retained in the main text.
- source_word: שַׁרְשְׁרוֹת
  chosen: chains
  alternatives:
  - chainwork
  - garlands
  lexicon: HALOT
  rationale: The noun refers to chains or chain-like ornamentation. 'Chains' is the most direct rendering; 'chainwork' is possible but slightly more interpretive.
