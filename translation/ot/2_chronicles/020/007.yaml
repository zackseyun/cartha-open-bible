id: 2CH.20.7
reference: 2 Chronicles 20:7
source:
  edition: WLC
  text: הֲ/לֹ֣א אַתָּ֣ה אֱלֹהֵ֗י/נוּ הוֹרַ֨שְׁתָּ֙ אֶת יֹשְׁבֵי֙ הָ/אָ֣רֶץ הַ/זֹּ֔את
    מִ/לִּ/פְנֵ֖י עַמְּ/ךָ֣ יִשְׂרָאֵ֑ל וַֽ/תִּתְּנָ֗/הּ לְ/זֶ֛רַע אַבְרָהָ֥ם אֹֽהַבְ/ךָ֖
    לְ/עוֹלָֽם׀־׃
translation:
  text: Did you not, our God, drive out the inhabitants of this land before your people
    Israel and give it forever to the offspring of Abraham, your friend?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “the one who loved you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Did you not
  alternatives:
  - Have you not
  - Are you not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. In
    context it governs the following verbal clause, so English interrogative 'Did
    you not' best captures the force.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  alternatives:
  - O our God
  lexicon: HALOT
  rationale: Direct address in prayer. 'Our God' is the plain possessive form; adding
    'O' is stylistic and not required by the Hebrew.
- source_word: הוֹרַשְׁתָּ
  chosen: drive out
  alternatives:
  - dispossess
  - expel
  lexicon: HALOT
  rationale: 'From ירשׁ in the causative sense: to cause prior inhabitants to lose
    possession, i.e., drive them out/dispossess them. ''Drive out'' is idiomatic modern
    English while preserving the conquest sense.'
- source_word: יֹשְׁבֵי הָאָרֶץ הַזֹּאת
  chosen: the inhabitants of this land
  alternatives:
  - those dwelling in this land
  - the residents of this land
  lexicon: HALOT
  rationale: Construct phrase literally 'the dwellers of this land.' 'Inhabitants'
    is natural English and preserves the reference to the people living there.
- source_word: מִלִּפְנֵי
  chosen: before
  alternatives:
  - from before
  - from the presence of
  lexicon: HALOT
  rationale: In conquest contexts the idiom means removal from before someone, i.e.,
    before their advance/presence. 'Before' is concise and idiomatic in English.
- source_word: עַמְּךָ יִשְׂרָאֵל
  chosen: your people Israel
  alternatives:
  - Israel your people
  lexicon: HALOT
  rationale: Retains the covenantal designation and appositional name. This is the
    most natural English order.
- source_word: וַתִּתְּנָהּ
  chosen: and give it
  alternatives:
  - and gave it
  lexicon: HALOT
  rationale: Coordinated past action in the rhetorical question. English auxiliary
    'give' after 'Did you not' yields smooth, accurate syntax.
- source_word: לְזֶרַע אַבְרָהָם
  chosen: to the offspring of Abraham
  alternatives:
  - to the seed of Abraham
  - to Abraham's descendants
  lexicon: HALOT
  rationale: זֶרַע is a collective singular. 'Offspring' preserves the singular collective
    nuance better than 'descendants,' while remaining readable. 'Seed' is more formal
    but less natural in contemporary English.
- source_word: אֹהַבְךָ
  chosen: your friend
  alternatives:
  - the one who loved you
  - your beloved
  lexicon: HALOT
  rationale: The participle of אהב can mean 'one who loves/loved.' In this covenantal
    epithet for Abraham, English 'your friend' communicates the established relational
    sense naturally and matches biblical usage elsewhere (cf. Isa 41:8; Jas 2:23),
    while not overstating beyond the Hebrew.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  lexicon: HALOT
  rationale: Standard rendering for enduring duration. 'Forever' is clear modern English
    and fits the covenantal promise context.
