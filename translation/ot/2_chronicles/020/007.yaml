theological_decisions:
- issue: Rendering Abraham's epithet אֹהַבְךָ
  chosen_reading: your friend
  alternative_readings:
  - the one who loved you
  - your beloved
  rationale: The Hebrew participle literally denotes one who loves/loved God, but
    in covenantal and intertextual usage Abraham is identified as God's friend. Rendering
    it 'your friend' communicates the relational title recognized elsewhere in Scripture
    without denying the underlying verbal sense. The more literal alternative is preserved
    in a footnote for auditability.
  doctrine_reference: Translation philosophy §3 (preserve theological tension where
    ambiguity is genuine)
