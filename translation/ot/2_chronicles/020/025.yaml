id: 2CH.20.25
reference: 2 Chronicles 20:25
source:
  edition: WLC
  text: וַ/יָּבֹ֨א יְהוֹשָׁפָ֣ט וְ/עַמּ/וֹ֮ לָ/בֹ֣ז אֶת שְׁלָלָ/ם֒ וַ/יִּמְצְאוּ֩
    בָ/הֶ֨ם לָ/רֹ֜ב וּ/רְכ֤וּשׁ וּ/פְגָרִים֙ וּ/כְלֵ֣י חֲמֻד֔וֹת וַ/יְנַצְּל֥וּ לָ/הֶ֖ם
    לְ/אֵ֣ין מַשָּׂ֑א וַ/יִּֽהְי֞וּ יָמִ֧ים שְׁלוֹשָׁ֛ה בֹּזְזִ֥ים אֶת הַ/שָּׁלָ֖ל
    כִּ֥י רַב הֽוּא־־־׃
translation:
  text: Then Jehoshaphat and his people came to plunder their spoil, and they found
    among them in abundance goods, garments, and desirable articles; and they took
    for themselves more than they could carry. They were three days plundering the
    spoil, because it was so much.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''corpses.'' Some ancient witnesses and translations reflect a
      reading such as ''garments'' or omit the term to smooth the sense of the inventory,
      but the Masoretic Text reads ''corpses,'' likely indicating the fallen enemy
      bodies among whom the spoil was found.'
    reason: textual_variant
lexical_decisions:
- source_word: לָבֹז
  chosen: to plunder
  alternatives:
  - to take spoil
  - to loot
  lexicon: HALOT
  rationale: The infinitive of בזז/בוז here expresses the purpose of their coming.
    'Plunder' is natural modern English and preserves the military-spoil sense better
    than the more formal 'take spoil.'
- source_word: שְׁלָלָם
  chosen: their spoil
  alternatives:
  - their plunder
  lexicon: HALOT
  rationale: שָׁלָל denotes spoil taken in war. 'Their spoil' reflects the 3mp suffix
    and keeps the concrete sense of goods belonging to the defeated enemies.
- source_word: בָהֶם
  chosen: among them
  alternatives:
  - on them
  - with them
  lexicon: HALOT
  rationale: The preposition plus pronoun most naturally refers to the fallen enemy
    forces and what was found in their midst/on their persons. 'Among them' is idiomatic
    and broad enough to include both the bodies and their possessions.
- source_word: לָרֹב
  chosen: in abundance
  alternatives:
  - in great quantity
  - abundantly
  lexicon: HALOT
  rationale: This adverbial phrase modifies what they found, emphasizing quantity.
    'In abundance' is concise and idiomatic.
- source_word: רְכוּשׁ
  chosen: goods
  alternatives:
  - property
  - possessions
  - wealth
  lexicon: HALOT
  rationale: רְכוּשׁ refers broadly to movable property/possessions. 'Goods' fits
    the inventory-like list in context without overstating monetary value.
- source_word: פְגָרִים
  chosen: corpses
  alternatives:
  - dead bodies
  - carcasses
  lexicon: HALOT
  rationale: The noun normally means corpses/carcasses. 'Corpses' is the most direct
    rendering in this battle context. Although some ancient versions and translations
    reflect a different reading, the MT plainly reads 'corpses,' which should be preserved
    in the main text.
- source_word: כְלֵי חֲמֻדוֹת
  chosen: desirable articles
  alternatives:
  - precious vessels
  - valuable items
  - objects of desire
  lexicon: HALOT
  rationale: The phrase literally means 'articles/vessels of desirables/precious things.'
    'Desirable articles' keeps the broad sense without restricting the items to containers
    or cultic vessels.
- source_word: וַיְנַצְּלוּ לָהֶם
  chosen: they stripped off for themselves
  alternatives:
  - they took for themselves
  - they plundered for themselves
  lexicon: HALOT
  rationale: The piel of נצל in this context means to strip off or snatch away spoil
    from the dead/enemy. 'Stripped off for themselves' captures the vivid action and
    the reflexive benefit indicated by לָהֶם.
- source_word: לְאֵין מַשָּׂא
  chosen: more than they could carry
  alternatives:
  - until there was no carrying
  - beyond bearing
  lexicon: HALOT
  rationale: Literally 'to there being no load/carrying'; idiomatically it means the
    amount exceeded what could be carried away. The chosen rendering communicates
    the sense clearly in modern English.
- source_word: וַיִּהְיוּ יָמִים שְׁלוֹשָׁה בֹּזְזִים
  chosen: They were three days plundering
  alternatives:
  - For three days they kept plundering
  - they spent three days taking spoil
  lexicon: HALOT
  rationale: This construction indicates duration of ongoing action. 'They were three
    days plundering' is slightly formal but transparent; it preserves the Hebrew aspect
    of sustained activity.
- source_word: כִּי רַב הוּא
  chosen: because it was so much
  alternatives:
  - because it was abundant
  - for it was great
  lexicon: HALOT
  rationale: The clause explains the three-day duration by the sheer quantity of spoil.
    'So much' is natural English and conveys abundance without wooden literalism.
