theological_decisions:
- issue: Divine agency in the kingdom's peace
  chosen_reading: 'The verse explicitly attributes Jehoshaphat''s peace and security
    to God''s action: ''his God gave him rest on every side.'''
  alternative_readings:
  - 'A more neutral coordination: ''and his God gave him rest on every side'''
  rationale: The Hebrew presents sequential clauses, but the second explains the basis
    of the first. Rendering the conjunction as 'for' preserves the theological emphasis
    that peace came from God, without adding claims beyond the text.
  doctrine_reference: Translation philosophy §1, §3, §6
