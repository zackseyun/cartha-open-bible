id: 2CH.20.8
reference: 2 Chronicles 20:8
source:
  edition: WLC
  text: וַ/יֵּשְׁב֖וּ בָ֑/הּ וַ/יִּבְנ֨וּ לְ/ךָ֧ בָּ֛/הּ מִקְדָּ֖שׁ לְ/שִׁמְ/ךָ֥ לֵ/אמֹֽר־׀׃
translation:
  text: And they lived in it and built for you in it a sanctuary for your name, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dwelt in it' or 'settled in it.'
    reason: lexical_alternative
  - marker: b
    text: '''Sanctuary for your name'' refers to a holy place dedicated to the LORD''s
      name—that is, to his revealed presence and honor.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּשְׁבוּ
  chosen: they lived
  alternatives:
  - they dwelt
  - they settled
  lexicon: HALOT
  rationale: From ישׁב, here referring to taking up residence in the land. 'Lived'
    is natural modern English; 'dwelt' is more traditional but less contemporary,
    and 'settled' slightly foregrounds initial occupation rather than ongoing residence.
- source_word: בָהּ
  chosen: in it
  alternatives:
  - therein
  - in her
  lexicon: HALOT
  rationale: The feminine singular pronominal suffix refers back to the land. English
    idiom prefers 'in it' for land/country; 'in her' would sound overly personified
    here.
- source_word: וַיִּבְנוּ
  chosen: built
  alternatives:
  - constructed
  lexicon: HALOT
  rationale: Straightforward rendering of בנה. 'Built' is the standard, clear English
    equivalent.
- source_word: לְךָ
  chosen: for you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: 'The lamed here expresses advantage/dedication: the sanctuary was built
    for God. ''For you'' communicates purpose and dedication more naturally than ''to
    you'' in English.'
- source_word: מִקְדָּשׁ
  chosen: a sanctuary
  alternatives:
  - a holy place
  - a temple
  lexicon: HALOT
  rationale: מקדש denotes a holy sanctuary. 'Sanctuary' preserves the sacred sense
    without collapsing it into 'temple' as a fixed institutional term, though the
    referent is the temple. This also matches the prayer's wording about a place consecrated
    to God.
- source_word: לְשִׁמְךָ
  chosen: for your name
  alternatives:
  - for the sake of your name
  - in your name
  lexicon: HALOT
  rationale: A standard biblical expression for dedication to God's revealed name/presence/renown.
    'For your name' is the most direct and idiomatic rendering; 'in your name' would
    suggest agency rather than dedication.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - saying that
  - 'with these words:'
  lexicon: HALOT
  rationale: Introduces the content of Solomon's declaration in the following verse.
    Retaining 'saying,' preserves the formal linkage to the quotation that follows.
