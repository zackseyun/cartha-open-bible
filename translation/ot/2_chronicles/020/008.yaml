theological_decisions:
- issue: Referent and nuance of 'sanctuary for your name'
  chosen_reading: A sanctuary dedicated to God's name/presence
  alternative_readings:
  - A temple for your honor
  - A holy place bearing your name
  rationale: The phrase reflects standard Old Testament theology of the temple as
    the place associated with God's name, without implying that God is spatially contained
    there. 'Sanctuary for your name' preserves that biblical tension and avoids over-interpretation.
  doctrine_reference: Translation philosophy §3
