id: 2CH.20.33
reference: 2 Chronicles 20:33
source:
  edition: WLC
  text: אַ֥ךְ הַ/בָּמ֖וֹת לֹא סָ֑רוּ וְ/ע֤וֹד הָ/עָם֙ לֹא הֵכִ֣ינוּ לְבָבָ֔/ם לֵ/אלֹהֵ֖י
    אֲבֹתֵי/הֶֽם־־׃
translation:
  text: However, the high places were not removed, and the people still had not set
    their hearts toward the God of their fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had not prepared their hearts for the God of their fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: However
  alternatives:
  - Nevertheless
  - But
  lexicon: HALOT
  rationale: Marks a concessive/contrastive transition from the positive assessment
    of Jehoshaphat to a remaining deficiency. 'However' is natural modern English
    and preserves the adversative force.
- source_word: הַבָּמוֹת
  chosen: the high places
  alternatives:
  - the shrines
  lexicon: HALOT
  rationale: Standard rendering for cultic elevated worship sites in the Hebrew Bible.
    'High places' preserves the historical-religious term without overinterpreting
    whether all were illicit shrines in every context.
- source_word: לֹא סָרוּ
  chosen: were not removed
  alternatives:
  - did not depart
  - were not taken away
  lexicon: HALOT
  rationale: 'Passive English best conveys the idiomatic sense in context: the high
    places remained in place. Although the Hebrew verb is active plural (''did not
    turn aside/depart''), English naturally expresses the state of cult sites as ''were
    not removed.'''
- source_word: וְעוֹד
  chosen: still
  alternatives:
  - yet
  - even then
  lexicon: HALOT
  rationale: Adverb indicating continuation of an unresolved condition. 'Still' is
    concise and idiomatic.
- source_word: הָעָם
  chosen: the people
  lexicon: HALOT
  rationale: Straightforward collective noun referring to the populace.
- source_word: לֹא הֵכִינוּ לְבָבָם
  chosen: had not set their hearts
  alternatives:
  - had not prepared their hearts
  - had not established their hearts
  lexicon: HALOT
  rationale: The Hiphil of כון with 'heart' can mean prepare, direct, or set firmly.
    'Set their hearts' communicates intentional inward orientation in readable English
    while preserving the volitional sense. 'Prepared their hearts' is possible, but
    here the following preposition and object favor directed devotion.
- source_word: לֵאלֹהֵי אֲבֹתֵיהֶם
  chosen: toward the God of their fathers
  alternatives:
  - to the God of their fathers
  - for the God of their fathers
  lexicon: HALOT
  rationale: The preposition ל here expresses orientation/direction of the heart.
    'Toward' makes that nuance explicit in English and fits the idiom 'set their hearts
    toward.' 'God of their fathers' preserves the covenant-historical reference.
