id: 2CH.20.34
reference: 2 Chronicles 20:34
source:
  edition: WLC
  text: וְ/יֶ֨תֶר֙ דִּבְרֵ֣י יְהוֹשָׁפָ֔ט הָ/רִאשֹׁנִ֖ים וְ/הָ/אַחֲרֹנִ֑ים הִנָּ֣/ם כְּתוּבִ֗ים בְּ/דִבְרֵי֙ יֵה֣וּא בֶן חֲנָ֔נִי אֲשֶׁ֣ר הֹֽעֲלָ֔ה עַל סֵ֖פֶר מַלְכֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: Now the rest of the acts of Jehoshaphat[a], the first and the last, behold, they are written in the records of Jehu son of Hanani[b], which are included in the Book of the Kings of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the account of Jehu son of Hanani'; Hebrew 'in the words/records of Jehu son of Hanani.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew clause literally says 'which he caused to go up upon the Book of the Kings of Israel,' likely meaning that Jehu's record was incorporated into or included in that larger royal source.
    reason: alternative_reading
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - The remainder of
  lexicon: HALOT
  rationale: יֶתֶר commonly introduces the remaining matters of a reign or narrative section. 'Now the rest of' is idiomatic in English historiographic style and preserves the transitional force of the prefixed conjunction.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - events
  lexicon: HALOT
  rationale: In royal-summary formulas, דִּבְרֵי often refers broadly to the deeds, affairs, or acts of a king rather than merely his spoken words. 'Acts' best matches the chronicler's historiographic usage in English.
- source_word: הָרִאשֹׁנִים וְהָאַחֲרֹנִים
  chosen: the first and the last
  alternatives:
  - the earlier and the later
  - from first to last
  lexicon: HALOT
  rationale: The pair is a conventional merism covering the whole span of Jehoshaphat's acts. 'The first and the last' is a close and natural rendering that preserves the formulaic character.
- source_word: הִנָּם
  chosen: behold, they are
  alternatives:
  - indeed they are
  - they are
  lexicon: HALOT
  rationale: הִנָּם adds deictic/emphatic force. Retaining 'behold' preserves the formal register and emphasis of the Hebrew, though English could omit it for smoother style.
- source_word: כְּתוּבִים
  chosen: written
  alternatives:
  - recorded
  lexicon: HALOT
  rationale: Passive participle of כתב straightforwardly means 'written.' 'Recorded' is interpretive; 'written' stays closer to the source while still reading naturally with the archival formula.
- source_word: בְּדִבְרֵי
  chosen: in the records of
  alternatives:
  - in the words of
  - in the account of
  - in the annals of
  lexicon: HALOT
  rationale: Here דִּבְרֵי introduces a written source associated with Jehu son of Hanani. 'Records of' communicates a documentary source more clearly than the overly literal 'words of' and avoids overcommitting to a technical genre like 'annals.'
- source_word: יֵהוּא בֶן חֲנָנִי
  chosen: Jehu son of Hanani
  alternatives:
  - Jehu the son of Hanani
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy. 'Son of' is the standard concise rendering of בן in genealogical identification.
- source_word: אֲשֶׁר הֹעֲלָה עַל סֵפֶר מַלְכֵי יִשְׂרָאֵל
  chosen: which were incorporated into the Book of the Kings of Israel
  alternatives:
  - which he inserted into the Book of the Kings of Israel
  - which was brought up into the Book of the Kings of Israel
  - which is included in the Book of the Kings of Israel
  lexicon: HALOT
  rationale: The clause is syntactically difficult because the singular verb הֹעֲלָה ('caused to go up/bring up') follows a relative clause after Jehu son of Hanani. In context it most naturally means that Jehu's records were taken up into, or incorporated into, the larger royal source. Rendering the relative as 'which were incorporated into' conveys the archival relationship in idiomatic English without forcing an awkwardly literal 'brought up upon.'
- source_word: סֵפֶר מַלְכֵי יִשְׂרָאֵל
  chosen: the Book of the Kings of Israel
  alternatives:
  - the book of the kings of Israel
  - the annals of the kings of Israel
  lexicon: HALOT
  rationale: סֵפֶר is 'book/document.' Capitalizing 'Book' reflects a title-like source citation in English. 'Kings of Israel' is the plain sense of the construct chain and should not be paraphrased away.
