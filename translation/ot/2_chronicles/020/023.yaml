theological_decisions:
- issue: Rendering of חרם language in a warfare context
  chosen_reading: to devote them to destruction
  alternative_readings:
  - to utterly destroy
  - to put them under the ban
  rationale: The verse uses cultically charged destruction language, not merely ordinary
    killing. The chosen rendering preserves that theological and lexical weight without
    archaic jargon. An alternative is preserved in a footnote because 'put under the
    ban' is more formally precise but less accessible.
  doctrine_reference: Translation philosophy §§1, 5, 6
