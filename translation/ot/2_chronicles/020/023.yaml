id: 2CH.20.23
reference: 2 Chronicles 20:23
source:
  edition: WLC
  text: וַ֠/יַּֽעַמְדוּ בְּנֵ֨י עַמּ֧וֹן וּ/מוֹאָ֛ב עַל יֹשְׁבֵ֥י הַר שֵׂעִ֖יר לְ/הַחֲרִ֣ים
    וּ/לְ/הַשְׁמִ֑יד וּ/כְ/כַלּוֹתָ/ם֙ בְּ/יוֹשְׁבֵ֣י שֵׂעִ֔יר עָזְר֥וּ אִישׁ בְּ/רֵעֵ֖/הוּ
    לְ/מַשְׁחִֽית־־־׃
translation:
  text: Then the Ammonites and Moabites rose up against the inhabitants of Mount Seir
    to devote them to destruction and to wipe them out; and when they had finished
    with the inhabitants of Seir, they helped each other destroy one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'to put them under the ban,' that is, to devote them to destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַמְדוּ
  chosen: rose up against
  alternatives:
  - stood against
  - took their stand against
  lexicon: HALOT
  rationale: The verb עמד literally means 'stand,' but in military context with עַל
    it commonly conveys hostile action or taking a stand against. 'Rose up against'
    is idiomatic and preserves the adversative force without over-paraphrasing.
- source_word: בְּנֵי עַמּוֹן וּמוֹאָב
  chosen: the Ammonites and Moabites
  alternatives:
  - the sons of Ammon and Moab
  lexicon: HALOT
  rationale: Ethnic gentilic rendering is natural English and accurately reflects
    the collective peoples intended by 'sons of Ammon' and 'Moab.'
- source_word: יֹשְׁבֵי הַר שֵׂעִיר
  chosen: the inhabitants of Mount Seir
  alternatives:
  - those dwelling in the hill country of Seir
  - the dwellers of Mount Seir
  lexicon: HALOT
  rationale: יֹשְׁבֵי is a participial substantive meaning 'inhabitants/dwellers.'
    'Mount Seir' is the standard place-name rendering for הַר שֵׂעִיר.
- source_word: לְהַחֲרִים
  chosen: to devote them to destruction
  alternatives:
  - to utterly destroy
  - to put under the ban
  lexicon: HALOT
  rationale: חרם in the Hiphil carries the sense of placing under the ban, devoting
    to destruction. Because this term has covenantal/holy-war overtones beyond mere
    killing, 'devote ... to destruction' best preserves the lexical force.
- source_word: וּלְהַשְׁמִיד
  chosen: to wipe them out
  alternatives:
  - to destroy
  - to annihilate
  lexicon: HALOT
  rationale: שׁמד intensifies the destruction language. 'Wipe them out' is readable
    modern English and distinguishes it from the preceding חרם while retaining severe
    force.
- source_word: וּכְכַלּוֹתָם
  chosen: and when they had finished
  alternatives:
  - and as they finished
  - and after they finished
  lexicon: HALOT
  rationale: 'The preposition כ with infinitive construct here is temporal: ''when/as
    they finished.'' The pluperfect-style English fits the narrative sequence.'
- source_word: עָזְרוּ אִישׁ בְּרֵעֵהוּ
  chosen: they helped each other
  alternatives:
  - each man helped his companion
  - they helped one another
  lexicon: HALOT
  rationale: The idiom literally says 'a man helped his companion,' a distributive
    expression. 'They helped each other' is natural English and preserves the reciprocal
    sense.
- source_word: לְמַשְׁחִית
  chosen: destroy one another
  alternatives:
  - for destruction
  - to destroy
  - in destroying
  lexicon: HALOT
  rationale: 'The infinitival/resultative sense after עזרו indicates the purpose/result
    of their mutual aid: they assisted one another in destruction. Since the context
    is reciprocal infighting after Seir''s destruction, ''destroy one another'' makes
    the implied object explicit in idiomatic English.'
