id: 2CH.20.16
reference: 2 Chronicles 20:16
source:
  edition: WLC
  text: מָחָר֙ רְד֣וּ עֲלֵי/הֶ֔ם הִנָּ֥/ם עֹלִ֖ים בְּ/מַעֲלֵ֣ה הַ/צִּ֑יץ וּ/מְצָאתֶ֤ם
    אֹתָ/ם֙ בְּ/ס֣וֹף הַ/נַּ֔חַל פְּנֵ֖י מִדְבַּ֥ר יְרוּאֵֽל׃
translation:
  text: Tomorrow go down against them. Look, they are coming up by the ascent of Ziz,
    and you will find them at the end of the wadi, before the wilderness of Jeruel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ravine' or 'brook' for 'wadi' (Hebrew נחל), a term for a valley or seasonal
      watercourse.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָחָר
  chosen: Tomorrow
  alternatives:
  - tomorrow morning
  lexicon: HALOT
  rationale: Temporal adverb indicating the time of the commanded action; simple 'Tomorrow'
    is the plain sense without adding specificity not in the Hebrew.
- source_word: רְדוּ
  chosen: go down
  alternatives:
  - descend
  lexicon: HALOT
  rationale: Qal imperative plural of ירד. 'Go down' is natural modern English and
    preserves the directional force better than the more formal 'descend.'
- source_word: עֲלֵיהֶם
  chosen: against them
  alternatives:
  - to them
  - upon them
  lexicon: HALOT
  rationale: With ירד in a military context, על commonly has hostile force. 'Against
    them' best conveys marching out in opposition rather than mere movement toward
    them.
- source_word: הִנָּם
  chosen: Look,
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: Deictic particle drawing attention to the following information. 'Look'
    is readable modern English and preserves the discourse function without archaic
    tone.
- source_word: עֹלִים
  chosen: they are coming up
  alternatives:
  - they are going up
  - they are ascending
  lexicon: HALOT
  rationale: Participle of עלה describing current or imminent movement. 'Coming up'
    fits the speaker's perspective and sounds natural in English.
- source_word: בְּמַעֲלֵה
  chosen: by the ascent of
  alternatives:
  - at the ascent of
  - through the pass of
  lexicon: HALOT
  rationale: מַעֲלֶה denotes an ascent or uphill approach. 'By the ascent of' keeps
    the topographical sense while remaining idiomatic. 'Pass' is possible but slightly
    more interpretive.
- source_word: הַצִּיץ
  chosen: Ziz
  lexicon: HALOT
  rationale: Place name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: וּמְצָאתֶם אֹתָם
  chosen: and you will find them
  alternatives:
  - and you shall encounter them
  lexicon: HALOT
  rationale: Straightforward future/result sense following the command. 'Find' is
    the direct lexical equivalent and suits the military scouting context.
- source_word: בְּסוֹף
  chosen: at the end of
  alternatives:
  - at the edge of
  - at the far end of
  lexicon: HALOT
  rationale: סוֹף denotes an extremity or end point. 'At the end of' is the most direct
    rendering.
- source_word: הַנַּחַל
  chosen: the wadi
  alternatives:
  - the valley
  - the brook
  - the ravine
  lexicon: HALOT
  rationale: נחל often refers to a seasonal watercourse or ravine. 'Wadi' preserves
    the specific Judean geographical feature better than 'brook,' which can mislead
    modern readers into imagining a perennial stream.
- source_word: פְּנֵי
  chosen: before
  alternatives:
  - in front of
  - facing
  lexicon: HALOT
  rationale: In this spatial expression, פני means 'before' or 'in front of.' 'Before'
    is concise and idiomatic in geographic description.
- source_word: מִדְבַּר
  chosen: the wilderness of
  alternatives:
  - the desert of
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness or steppe rather than sandy desert
    specifically. 'Wilderness' is the better default.
- source_word: יְרוּאֵל
  chosen: Jeruel
  lexicon: HALOT
  rationale: Place name; transliterated according to the project's naming policy.
