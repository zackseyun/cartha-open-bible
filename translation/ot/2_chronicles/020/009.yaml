theological_decisions:
- issue: Temple-name theology in the phrase 'your name is in this house'
  chosen_reading: 'Retain the Hebrew idiom in the main text: ''your name is in this house.'''
  alternative_readings:
  - your name is upon this house
  - this house bears your name
  rationale: The idiom expresses God's covenantal claim and presence associated with the temple without collapsing it into a single theological explanation. Preserving the idiom maintains the text's tension and avoids over-interpretation.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
