id: 2CH.20.9
reference: 2 Chronicles 20:9
source:
  edition: WLC
  text: אִם תָּב֨וֹא עָלֵ֜י/נוּ רָעָ֗ה חֶרֶב֮ שְׁפוֹט֮ וְ/דֶ֣בֶר וְ/רָעָב֒ נַֽעַמְדָ֞ה לִ/פְנֵ֨י הַ/בַּ֤יִת הַ/זֶּה֙ וּ/לְ/פָנֶ֔י/ךָ כִּ֥י שִׁמְ/ךָ֖ בַּ/בַּ֣יִת הַ/זֶּ֑ה וְ/נִזְעַ֥ק אֵלֶ֛י/ךָ מִ/צָּרָתֵ֖/נוּ וְ/תִשְׁמַ֥ע וְ/תוֹשִֽׁיעַ־׃
translation:
  text: If disaster comes upon us—sword[a], judgment, pestilence, or famine—we will stand before this house and before you, for your name is in this house, and we will cry out to you from our distress, and you will hear and save.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'your name is upon this house,' that is, this house bears your name.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָעָה
  chosen: disaster
  alternatives:
  - evil
  - calamity
  lexicon: HALOT
  rationale: In this context the noun refers to harmful calamity coming upon the people, not moral evil. 'Disaster' is natural modern English and fits the following list of covenant curses.
- source_word: חֶרֶב
  chosen: sword
  alternatives:
  - war
  lexicon: HALOT
  rationale: Retained the concrete 'sword' rather than abstracting to 'war,' since the Hebrew lists specific forms of disaster in terse apposition.
- source_word: שְׁפוֹט
  chosen: judgment
  alternatives:
  - acts of judgment
  - punishment
  lexicon: HALOT
  rationale: 'Taken as a noun in the disaster list: ''sword, judgment, pestilence, or famine.'' This preserves the Hebrew form and likely alludes to punitive judgment rather than a legal process. ''Judgment'' is concise and traditional without being archaic.'
- source_word: דֶבֶר
  chosen: pestilence
  alternatives:
  - plague
  - disease
  lexicon: HALOT
  rationale: A standard rendering for epidemic affliction in covenant-curse contexts. 'Pestilence' preserves the biblical register better than the broader 'disease.'
- source_word: רָעָב
  chosen: famine
  alternatives:
  - hunger
  lexicon: HALOT
  rationale: Refers to widespread scarcity, not merely personal hunger.
- source_word: נַעַמְדָה
  chosen: we will stand
  alternatives:
  - let us stand
  - we stand
  lexicon: HALOT
  rationale: 'Rendered as a cohortative with future force in the conditional setting: the people pledge what they will do if disaster comes.'
- source_word: לִפְנֵי הַבַּיִת הַזֶּה
  chosen: before this house
  alternatives:
  - in front of this house
  - before this temple
  lexicon: HALOT
  rationale: '''House'' reflects the Hebrew term and preserves temple theology; ''temple'' is interpretive though contextually correct. ''Before'' matches the prayer posture language.'
- source_word: וּלְפָנֶיךָ
  chosen: and before you
  alternatives:
  - and in your presence
  lexicon: HALOT
  rationale: Keeps the parallelism between standing before the house and before God, emphasizing that prayer at the temple is directed to God himself.
- source_word: כִּי שִׁמְךָ בַּבַּיִת הַזֶּה
  chosen: for your name is in this house
  alternatives:
  - for your name is upon this house
  - for this house bears your name
  lexicon: HALOT
  rationale: A formally close rendering of the Hebrew. The idiom denotes God's ownership/presence/claim in relation to the temple. A more idiomatic alternative is preserved in a footnote.
- source_word: וְנִזְעַק
  chosen: and we will cry out
  alternatives:
  - and we will call out
  - and we will appeal
  lexicon: HALOT
  rationale: Conveys urgent prayer in distress, stronger than a neutral 'pray.'
- source_word: מִצָּרָתֵנוּ
  chosen: from our distress
  alternatives:
  - in our distress
  - out of our trouble
  lexicon: HALOT
  rationale: The preposition marks source or circumstance; 'from our distress' is a natural rendering that preserves the sense of desperate appeal arising out of affliction.
- source_word: וְתִשְׁמַע וְתוֹשִׁיעַ
  chosen: and you will hear and save
  alternatives:
  - then you will hear and deliver
  - and you will listen and rescue
  lexicon: HALOT
  rationale: Kept the two verbs distinct and direct. 'Save' is broad and theologically resonant without over-specifying the mode of deliverance.
