id: 2CH.20.36
reference: 2 Chronicles 20:36
source:
  edition: WLC
  text: וַ/יְחַבְּרֵ֣/הוּ עִמּ֔/וֹ לַ/עֲשׂ֥וֹת אֳנִיּ֖וֹת לָ/לֶ֣כֶת תַּרְשִׁ֑ישׁ וַ/יַּעֲשׂ֥וּ
    אֳנִיּ֖וֹת בְּ/עֶצְי֥וֹן גָּֽבֶר׃
translation:
  text: So he allied himself with him to make ships to go to Tarshish, and they made
    ships at Ezion-geber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'partnered with him' or 'joined him.' The Hebrew verb denotes entering
      into association or alliance.
    reason: lexical_alternative
  - marker: b
    text: Or 'to sail to Tarshish.' Some interpreters understand Tarshish-language
      in shipping contexts more idiomatically, but here the Hebrew most naturally
      expresses destination.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַבְּרֵהוּ
  chosen: allied himself with him
  alternatives:
  - joined him
  - associated himself with him
  - partnered with him
  lexicon: HALOT
  rationale: The Hiphil of חבר here conveys forming an association or partnership,
    not merely physical joining. 'Allied himself with him' captures the political/commercial
    partnership in context and fits the accusative + עִם construction.
- source_word: לַעֲשׂוֹת
  chosen: to make
  alternatives:
  - to build
  lexicon: HALOT
  rationale: עשה is broadly 'do/make.' With ships as the object, English can idiomatically
    use either 'make' or 'build'; 'make' stays closer to the Hebrew while remaining
    natural.
- source_word: אֳנִיּוֹת
  chosen: ships
  alternatives:
  - boats
  - vessels
  lexicon: HALOT
  rationale: The noun denotes seagoing ships. 'Ships' is the standard and most precise
    rendering in this trade-voyage context.
- source_word: לָלֶכֶת תַּרְשִׁישׁ
  chosen: to go to Tarshish
  alternatives:
  - to sail to Tarshish
  - for Tarshish
  lexicon: HALOT
  rationale: 'The infinitive of הלך with Tarshish most straightforwardly means destination:
    ''to go to Tarshish.'' Although some contexts use ''ships of Tarshish'' idiomatically,
    here the syntax is verbal rather than adjectival, so destination is best in the
    main text.'
- source_word: תַּרְשִׁישׁ
  chosen: Tarshish
  lexicon: HALOT
  rationale: This is a place name and should be transliterated per translation philosophy.
- source_word: וַיַּעֲשׂוּ
  chosen: they made
  alternatives:
  - they built
  lexicon: HALOT
  rationale: The plural verb naturally refers to the joint action of the allied parties.
    'They made' preserves the Hebrew wording and links with the earlier infinitive.
- source_word: בְּעֶצְיוֹן גָּבֶר
  chosen: at Ezion-geber
  alternatives:
  - in Ezion-geber
  lexicon: HALOT
  rationale: As a place name with ב, English idiom prefers 'at' for the site of shipbuilding.
    The name is transliterated.
