id: 2CH.20.35
reference: 2 Chronicles 20:35
source:
  edition: WLC
  text: וְ/אַחֲרֵי כֵ֗ן אֶתְחַבַּר֙ יְהוֹשָׁפָ֣ט מֶֽלֶךְ יְהוּדָ֔ה עִ֖ם אֲחַזְיָ֣ה
    מֶֽלֶךְ יִשְׂרָאֵ֑ל ה֖וּא הִרְשִׁ֥יעַ לַ/עֲשֽׂוֹת־־׃
translation:
  text: After this, Jehoshaphat king of Judah allied himself with Ahaziah king of
    Israel, who acted wickedly in doing so.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'joined with Ahaziah king of Israel.'
    reason: lexical_alternative
  - marker: b
    text: The clause 'who acted wickedly in doing so' most naturally refers to Ahaziah;
      the Hebrew could be rendered more literally, 'he acted wickedly to do.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אַחֲרֵי כֵן
  chosen: After this
  alternatives:
  - Afterward
  - After these things
  lexicon: HALOT
  rationale: Temporal transition marking what follows the preceding events. 'After
    this' is natural modern English and preserves the sequence without unnecessary
    expansion.
- source_word: אֶתְחַבַּר
  chosen: allied himself with
  alternatives:
  - joined with
  - associated with
  - made an alliance with
  lexicon: HALOT
  rationale: The Hitpael of חבר here indicates entering into association or alliance.
    'Allied himself with' captures the political and relational sense better than
    the more generic 'joined with.'
- source_word: יְהוֹשָׁפָט
  chosen: Jehoshaphat
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  rationale: Standard royal title construction rendered directly.
- source_word: עִם אֲחַזְיָה מֶלֶךְ יִשְׂרָאֵל
  chosen: with Ahaziah king of Israel
  alternatives:
  - with Ahaziah, the king of Israel
  rationale: Direct rendering of the prepositional phrase and appositional royal title;
    article omitted in English for smoother style.
- source_word: הוּא
  chosen: who
  alternatives:
  - he
  lexicon: HALOT
  rationale: Rendered as a relative pronoun in English because the Hebrew independent
    pronoun introduces a descriptive clause about Ahaziah. This avoids awkward repetition
    while preserving the referent.
- source_word: הִרְשִׁיעַ
  chosen: acted wickedly
  alternatives:
  - did wickedly
  - was guilty of wickedness
  - behaved wickedly
  lexicon: HALOT
  rationale: The Hiphil of רשע here conveys acting wickedly or doing evil. 'Acted
    wickedly' is idiomatic modern English while retaining the moral force.
- source_word: לַ/עֲשׂוֹת
  chosen: in doing so
  alternatives:
  - to do
  - in his actions
  - in what he did
  lexicon: HALOT
  rationale: The infinitive with ל after הִרְשִׁיעַ is somewhat terse. 'In doing so'
    makes explicit that the wickedness is expressed in his conduct, likely in the
    alliance/project context, without over-specifying beyond the Hebrew.
