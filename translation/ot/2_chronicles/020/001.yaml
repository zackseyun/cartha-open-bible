id: 2CH.20.1
reference: 2 Chronicles 20:1
source:
  edition: WLC
  text: וַ/יְהִ֣י אַֽחֲרֵי כֵ֡ן בָּ֣אוּ בְנֵי מוֹאָב֩ וּ/בְנֵ֨י עַמּ֜וֹן וְ/עִמָּ/הֶ֧ם
    מֵֽ/הָ/עַמּוֹנִ֛ים עַל יְהוֹשָׁפָ֖ט לַ/מִּלְחָמָֽה־׀־׃
translation:
  text: After this, the Moabites and the Ammonites, and with them some of the Meunites,
    came against Jehoshaphat for battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''some of the Ammonites.'' Many interpreters, following context
      and ancient versions, understand this as referring to the Meunites or a similar
      allied group rather than repeating the Ammonites.'
    reason: textual_variant
lexical_decisions:
- source_word: וַיְהִי אֲחֲרֵי כֵן
  chosen: After this
  alternatives:
  - Afterward
  - And it happened after this
  lexicon: HALOT
  rationale: Narrative transition formula. 'After this' preserves the temporal sequence
    naturally in modern English without woodenly reproducing the Hebrew idiom 'and
    it happened.'
- source_word: בָּאוּ
  chosen: came
  alternatives:
  - advanced
  - came up
  lexicon: HALOT
  rationale: Common verb of motion. In this military context 'came against' is idiomatic
    once paired with עַל, and avoids overinterpreting with a more specific military
    verb.
- source_word: בְנֵי מוֹאָב
  chosen: the Moabites
  alternatives:
  - the sons of Moab
  lexicon: HALOT
  rationale: Ethnic designation is the natural English equivalent here; 'sons of Moab'
    would be overly literal and less readable.
- source_word: בְנֵי עַמּוֹן
  chosen: the Ammonites
  alternatives:
  - the sons of Ammon
  lexicon: HALOT
  rationale: As with 'Moabites,' the ethnic term best represents the Hebrew construct
    in idiomatic English.
- source_word: וְעִמָּהֶם
  chosen: and with them
  alternatives:
  - together with them
  lexicon: HALOT
  rationale: Straightforward rendering of the preposition with pronominal suffix,
    preserving that this additional group accompanied the Moabites and Ammonites.
- source_word: מֵהָעַמּוֹנִים
  chosen: some of the Meunites
  alternatives:
  - some of the Ammonites
  lexicon: HALOT
  rationale: Although the consonantal text points to 'Ammonites,' the context and
    ancient versions have led many translations to understand a different allied people,
    commonly rendered 'Meunites' (cf. 2 Chr 26:7). Rendering 'Meunites' best fits
    the likely sense while preserving the textual alternative in a footnote.
- source_word: עַל יְהוֹשָׁפָט
  chosen: against Jehoshaphat
  alternatives:
  - to Jehoshaphat
  - upon Jehoshaphat
  lexicon: HALOT
  rationale: With a verb of hostile movement in military context, עַל is best rendered
    'against.'
- source_word: לַמִּלְחָמָה
  chosen: for battle
  alternatives:
  - for war
  - to wage war
  lexicon: HALOT
  rationale: Expresses hostile purpose succinctly. 'For battle' is natural English
    and keeps the military sense without adding verbal material not explicit in the
    Hebrew.
