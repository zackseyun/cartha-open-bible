id: 2CH.20.31
reference: 2 Chronicles 20:31
source:
  edition: WLC
  text: וַ/יִּמְלֹ֥ךְ יְהוֹשָׁפָ֖ט עַל יְהוּדָ֑ה בֶּן שְׁלֹשִׁים֩ וְ/חָמֵ֨שׁ שָׁנָ֜ה
    בְּ/מָלְכ֗/וֹ וְ/עֶשְׂרִ֨ים וְ/חָמֵ֤שׁ שָׁנָה֙ מָלַ֣ךְ בִּֽ/ירוּשָׁלִַ֔ם וְ/שֵׁ֣ם
    אִמּ֔/וֹ עֲזוּבָ֖ה בַּת שִׁלְחִֽי־־־׃
translation:
  text: And Jehoshaphat reigned over Judah. He was thirty-five years old when he began
    to reign, and he reigned twenty-five years in Jerusalem. And his mother’s name
    was Azubah daughter of Shilhi.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: The wayyiqtol of מלך introduces the regnal notice. 'Reigned' is idiomatic
    in English royal formulas, while the following infinitive construction more specifically
    expresses the beginning of his reign.
- source_word: עַל
  chosen: over
  alternatives:
  - in
  lexicon: HALOT
  rationale: With מלך, על commonly marks the realm or people ruled. 'Over Judah' is
    the most natural English rendering.
- source_word: בֶּן שְׁלֹשִׁים וְחָמֵשׁ שָׁנָה
  chosen: thirty-five years old
  alternatives:
  - a son of thirty-five years
  lexicon: HALOT
  rationale: This is the standard Hebrew age formula. Idiomatic English requires 'years
    old' rather than a wooden retention of 'son of.'
- source_word: בְּמָלְכוֹ
  chosen: when he began to reign
  alternatives:
  - at his becoming king
  - when he became king
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct with suffix marks the time
    of accession. 'When he began to reign' clearly conveys the temporal sense in standard
    regnal English.
- source_word: וְעֶשְׂרִים וְחָמֵשׁ שָׁנָה מָלַךְ
  chosen: he reigned twenty-five years
  alternatives:
  - he was king twenty-five years
  lexicon: HALOT
  rationale: A straightforward duration statement with מלך. 'Reigned twenty-five years'
    is both accurate and idiomatic.
- source_word: בִּירוּשָׁלִַם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: The location of the royal reign is given in the standard regnal formula;
    'in Jerusalem' is direct and natural.
- source_word: וְשֵׁם אִמּוֹ
  chosen: And his mother’s name was
  alternatives:
  - And the name of his mother was
  lexicon: HALOT
  rationale: This preserves the Hebrew formula while using natural English word order
    and possessive style.
- source_word: עֲזוּבָה
  chosen: Azubah
  lexicon: HALOT
  rationale: Personal names are transliterated by project policy.
- source_word: בַּת שִׁלְחִי
  chosen: daughter of Shilhi
  lexicon: HALOT
  rationale: בת marks filial relationship. 'Daughter of Shilhi' is the standard genealogical
    rendering, with the proper name transliterated.
