id: 2CH.20.12
reference: 2 Chronicles 20:12
source:
  edition: WLC
  text: אֱלֹהֵ֨י/נוּ֙ הֲ/לֹ֣א תִשְׁפָּט בָּ֔/ם כִּ֣י אֵ֥ין בָּ֨/נוּ֙ כֹּ֔חַ לִ֠/פְנֵי
    הֶ/הָמ֥וֹן הָ/רָ֛ב הַ/זֶּ֖ה הַ/בָּ֣א עָלֵ֑י/נוּ וַ/אֲנַ֗חְנוּ לֹ֤א נֵדַע֙ מַֽה
    נַּעֲשֶׂ֔ה כִּ֥י עָלֶ֖י/ךָ עֵינֵֽי/נוּ־־׃
translation:
  text: Our God, will you not judge them? For we have no power before this great multitude
    that is coming against us. We do not know what to do, but our eyes are on you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'for our eyes are upon you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהֵינוּ
  chosen: Our God
  alternatives:
  - O our God
  - our God
  lexicon: HALOT
  rationale: Vocative address in prayer. 'Our God' is natural English and preserves
    the covenantal appeal without adding archaic 'O'.
- source_word: הֲלֹא תִשְׁפָּט בָּם
  chosen: will you not judge them?
  alternatives:
  - will you not execute judgment on them?
  - will you not punish them?
  lexicon: HALOT
  rationale: שׁפט in this context refers to God acting judicially against hostile
    nations. 'Judge them' is the most direct rendering; 'execute judgment' is possible
    but heavier, while 'punish' is too narrow because the verb includes juridical
    vindication as well as sentence.
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the grounds of the plea. 'For' fits the prayer's formal logic
    and reads naturally in English.
- source_word: אֵין בָּנוּ כֹּחַ
  chosen: we have no power
  alternatives:
  - there is no strength in us
  - we have no strength
  lexicon: HALOT
  rationale: כֹּחַ can mean strength, power, or capacity. 'Power' fits the military
    crisis and idiomatic English; 'strength' is also possible but slightly less pointed
    in context.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - against
  - in the face of
  lexicon: HALOT
  rationale: Literally 'before/in the face of.' 'Before this great multitude' preserves
    the Hebrew image of being confronted by an overwhelming force. The following clause
    already supplies 'coming against us,' so varying the preposition avoids redundancy.
- source_word: הֶהָמוֹן הָרָב הַזֶּה
  chosen: this great multitude
  alternatives:
  - this vast horde
  - this great army
  lexicon: HALOT
  rationale: הָמוֹן denotes a large crowd or multitude. 'Multitude' is broad enough
    to reflect the term without over-specifying 'army,' though the context is military.
    'Horde' carries pejorative overtones not explicit in the Hebrew.
- source_word: הַבָּא עָלֵינוּ
  chosen: that is coming against us
  alternatives:
  - coming upon us
  - advancing against us
  lexicon: HALOT
  rationale: The participle marks an imminent threat. 'Coming against us' is clear,
    idiomatic, and preserves the hostile force of עַל in context.
- source_word: וַאֲנַחְנוּ לֹא נֵדַע מַה נַּעֲשֶׂה
  chosen: We do not know what to do
  alternatives:
  - and we do not know what we should do
  - we do not know what we are to do
  lexicon: HALOT
  rationale: A straightforward confession of helplessness. The concise English best
    matches the Hebrew's simplicity and urgency.
- source_word: כִּי עָלֶיךָ עֵינֵינוּ
  chosen: but our eyes are on you
  alternatives:
  - for our eyes are toward you
  - because our eyes are upon you
  lexicon: HALOT
  rationale: Literally 'for/toward you are our eyes,' an idiom of dependence and expectant
    trust. 'Our eyes are on you' is idiomatic modern English that preserves the metaphor.
    'But' is supplied in English to mark the contrast with their ignorance and inability.
