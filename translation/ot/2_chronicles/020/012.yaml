theological_decisions:
- issue: Rendering the final כִּי clause in relation to the preceding confession
  chosen_reading: 'Translate idiomatically as a contrast: ''but our eyes are on you'''
  alternative_readings:
  - 'Translate more formally: ''for our eyes are upon you'''
  rationale: Although כִּי often means 'for/because,' here the sense after 'we do
    not know what to do' is climactic reliance on God. English commonly expresses
    this as adversative contrast. This does not alter theology; it clarifies the prayer's
    movement from helplessness to trust while preserving the underlying idiom in documentation.
  doctrine_reference: Translation philosophy §6; §3
