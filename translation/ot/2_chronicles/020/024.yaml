id: 2CH.20.24
reference: 2 Chronicles 20:24
source:
  edition: WLC
  text: וִֽ/יהוּדָ֛ה בָּ֥א עַל הַ/מִּצְפֶּ֖ה לַ/מִּדְבָּ֑ר וַ/יִּפְנוּ֙ אֶל הֶ֣/הָמ֔וֹן וְ/הִנָּ֧/ם פְּגָרִ֛ים נֹפְלִ֥ים אַ֖רְצָ/ה וְ/אֵ֥ין פְּלֵיטָֽה־־׃
translation:
  text: When Judah came to the lookout over the wilderness[a], they turned toward the multitude, and behold, there were corpses lying on the ground, and there was no survivor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dead bodies fallen to the ground.' The Hebrew phrase is more literally 'corpses, fallen to the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וִיהוּדָה
  chosen: Judah
  alternatives:
  - the people of Judah
  lexicon: HALOT
  rationale: Proper name referring collectively to the Judean force/people. 'Judah' is the most natural transliterated rendering, with the collective sense carried by the following plural verb.
- source_word: בָּא
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: Qal perfect of בוא, standard motion verb. 'Came' fits the narrative style and pairs naturally with the destination phrase.
- source_word: עַל הַמִּצְפֶּה לַמִּדְבָּר
  chosen: to the lookout over the wilderness
  alternatives:
  - to the watchtower of the wilderness
  - to the lookout point toward the wilderness
  lexicon: HALOT
  rationale: מִצְפֶּה denotes a lookout/watchpoint. The preposition עַל with the article suggests coming up to or onto the lookout. לַמִּדְבָּר is best taken as oriented toward/over the wilderness. 'Lookout over the wilderness' is idiomatic and preserves the topographical sense.
- source_word: וַיִּפְנוּ
  chosen: they turned
  alternatives:
  - they looked
  - they faced
  lexicon: HALOT
  rationale: פנה literally means 'turn' and in context implies turning one's attention/gaze. 'They turned' preserves the concrete motion, with the object phrase clarifying what they turned toward.
- source_word: אֶל הֶהָמוֹן
  chosen: toward the multitude
  alternatives:
  - toward the horde
  - toward the crowd
  lexicon: HALOT
  rationale: הָמוֹן can denote a multitude, mass, or throng. Here it refers to the assembled enemy forces. 'Multitude' is broad and suitably elevated without overinterpreting as specifically military, though that sense is present contextually.
- source_word: וְהִנָּם
  chosen: and behold, there were
  alternatives:
  - and behold, they were
  - and look, there were
  lexicon: HALOT
  rationale: 'הִנֵּה with pronominal suffix functions deictically: ''behold, there they were.'' In English, existential ''there were'' is smoother while preserving the suddenness with ''behold.'''
- source_word: פְּגָרִים
  chosen: corpses
  alternatives:
  - dead bodies
  - carcasses
  lexicon: HALOT
  rationale: פֶּגֶר refers to a corpse/dead body. 'Corpses' is concise, vivid, and appropriate for a battlefield scene.
- source_word: נֹפְלִים אַרְצָה
  chosen: lying on the ground
  alternatives:
  - fallen to the ground
  - collapsed to the earth
  lexicon: HALOT
  rationale: Literally 'fallen earthward/to the ground.' In English, with 'corpses,' 'lying on the ground' communicates the resultant state naturally, while still reflecting the participial description.
- source_word: וְאֵין פְּלֵיטָה
  chosen: and there was no survivor
  alternatives:
  - and there was no escapee
  - and none had escaped
  lexicon: HALOT
  rationale: פְּלֵיטָה denotes one who escapes or escape/survival. In this context the sense is that no one remained alive by escaping. Singular collective 'no survivor' is idiomatic English.
