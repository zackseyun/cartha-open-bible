id: 2CH.20.2
reference: 2 Chronicles 20:2
source:
  edition: WLC
  text: וַ/יָּבֹ֗אוּ וַ/יַּגִּ֤ידוּ לִֽ/יהוֹשָׁפָט֙ לֵ/אמֹ֔ר בָּ֣א עָלֶ֜י/ךָ הָמ֥וֹן
    רָ֛ב מֵ/עֵ֥בֶר לַ/יָּ֖ם מֵ/אֲרָ֑ם וְ/הִנָּ/ם֙ בְּ/חַֽצְצ֣וֹן תָּמָ֔ר הִ֖יא עֵ֥ין
    גֶּֽדִי׃
translation:
  text: Then they came and reported to Jehoshaphat, saying, “A great multitude is
    coming against you from beyond the sea, from Aram; and behold, they are in Hazazon-tamar”
    (that is, En-gedi).
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from across the sea.”
    reason: lexical_alternative
  - marker: b
    text: Aram is the Hebrew place-name often rendered “Syria.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: Then they came
  alternatives:
  - And they came
  lexicon: HALOT
  rationale: Wayyiqtol narrative form of בוא introduces the next event in sequence.
    'Then they came' gives natural English narrative progression while preserving
    the temporal-consecutive force.
- source_word: וַיַּגִּידוּ
  chosen: reported
  alternatives:
  - told
  - announced
  - informed
  lexicon: HALOT
  rationale: Hiphil of נגד means to make known or report. 'Reported' fits the formal
    setting of messengers bringing urgent news to the king.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard quotative infinitive construction; 'saying' preserves the Hebrew
    discourse marker cleanly.
- source_word: בָּא
  chosen: is coming
  alternatives:
  - has come
  - comes
  lexicon: HALOT
  rationale: Although formally a qatal 3ms, with a collective subject and in direct
    speech announcing an approaching threat, English present progressive best conveys
    imminent movement toward Jehoshaphat.
- source_word: הָמוֹן רָב
  chosen: a great multitude
  alternatives:
  - a vast multitude
  - a large army
  - a great horde
  lexicon: HALOT
  rationale: הָמוֹן denotes a large crowd, throng, or mass; with רָב it intensifies
    size. 'Great multitude' is natural and broad enough not to over-specify as only
    a formal army, though military force is implied by context.
- source_word: עָלֶיךָ
  chosen: against you
  alternatives:
  - upon you
  - toward you
  lexicon: HALOT
  rationale: With hostile movement in military context, על is best rendered 'against'
    rather than the more literal but less idiomatic 'upon.'
- source_word: מֵעֵבֶר לַיָּם
  chosen: from beyond the sea
  alternatives:
  - from across the sea
  - from the other side of the sea
  lexicon: HALOT
  rationale: The phrase literally means 'from across/beyond the sea.' 'Beyond the
    sea' preserves the spatial sense while remaining idiomatic.
- source_word: מֵאֲרָם
  chosen: from Aram
  alternatives:
  - from Syria
  lexicon: HALOT
  rationale: Per translation philosophy, names are transliterated rather than replaced
    by later conventional equivalents. 'Aram' reflects the Hebrew proper name more
    directly than 'Syria.'
- source_word: וְהִנָּם
  chosen: and behold, they are
  alternatives:
  - and look, they are
  - and there they are
  lexicon: HALOT
  rationale: הִנֵּה with pronominal suffix draws vivid attention to the immediacy
    of the report. 'And behold' preserves the urgency and deictic force.
- source_word: בְּחַצְצוֹן תָּמָר
  chosen: in Hazazon-tamar
  alternatives:
  - at Hazazon-tamar
  lexicon: HALOT
  rationale: Proper place name retained by transliteration. The preposition ב is locative;
    'in' is acceptable for a place-name and reads naturally in English.
- source_word: הִיא עֵין גֶּדִי
  chosen: that is, En-gedi
  alternatives:
  - which is En-gedi
  lexicon: HALOT
  rationale: The clause identifies Hazazon-tamar with the better-known place En-gedi.
    'That is' communicates apposition clearly in modern English while preserving the
    explanatory function.
