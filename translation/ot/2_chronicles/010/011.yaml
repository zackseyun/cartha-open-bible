id: 2CH.10.11
reference: 2 Chronicles 10:11
source:
  edition: WLC
  text: וְ/עַתָּ֗ה אָבִ/י֙ הֶעְמִ֤יס עֲלֵי/כֶם֙ עֹ֣ל כָּבֵ֔ד וַ/אֲנִ֖י אֹסִ֣יף עַֽל עֻלְּ/כֶ֑ם אָבִ֗/י יִסַּ֤ר אֶתְ/כֶם֙ בַּ/שּׁוֹטִ֔ים וַ/אֲנִ֖י בָּֽ/עֲקְרַבִּֽים־׃ס
translation:
  text: And now[a], my father made your yoke heavy, but I will add to your yoke. My father disciplined you with whips, but I with scorpions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'with scorpion-whips,' that is, whips fitted with sharp points or barbs; the Hebrew reads literally 'with scorpions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶעְמִיס
  chosen: loaded
  alternatives:
  - made heavy
  - laid on
  lexicon: HALOT
  rationale: Hiphil of עמס conveys causing a burden to be borne; 'loaded' naturally expresses placing a burden on someone while preserving the yoke metaphor.
- source_word: עֹל כָּבֵד
  chosen: a heavy yoke
  alternatives:
  - a hard yoke
  - a burdensome yoke
  lexicon: HALOT
  rationale: עֹל is literally 'yoke,' a standard metaphor for imposed labor or political burden; כָּבֵד means 'heavy.' The literal image should be retained.
- source_word: אֹסִיף עַל עֻלְּכֶם
  chosen: I will add to your yoke
  alternatives:
  - I will make your yoke heavier
  - I will increase your burden
  lexicon: HALOT
  rationale: The Hebrew says literally 'I will add to your yoke.' This preserves the metaphor and the verbal parallel with the previous clause better than a more interpretive rendering.
- source_word: יִסַּר
  chosen: disciplined
  alternatives:
  - chastised
  - corrected
  - punished
  lexicon: HALOT
  rationale: יסר commonly denotes disciplinary correction or chastening. 'Disciplined' is readable modern English and preserves the punitive-training sense without sounding archaic like 'chastised.'
- source_word: בַּשּׁוֹטִים
  chosen: with whips
  alternatives:
  - with lashes
  - with scourges
  lexicon: HALOT
  rationale: שׁוֹט refers to a whip/scourge. 'Whips' is the clearest modern equivalent.
- source_word: בָּעֲקְרַבִּים
  chosen: with scorpions
  alternatives:
  - with scorpion-whips
  lexicon: HALOT
  rationale: The noun literally means 'scorpions.' In context it may refer metaphorically to especially cruel whips, but the Hebrew wording itself is simply 'scorpions,' so the main text preserves the literal term and the likely idiomatic sense is noted in a footnote.
