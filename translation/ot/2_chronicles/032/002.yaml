id: 2CH.32.2
reference: 2 Chronicles 32:2
source:
  edition: WLC
  text: וַ/יַּרְא֙ יְחִזְקִיָּ֔הוּ כִּי בָ֖א סַנְחֵרִ֑יב וּ/פָנָ֕י/ו לַ/מִּלְחָמָ֖ה עַל יְרוּשָׁלִָֽם־־׃
translation:
  text: When Hezekiah saw that Sennacherib had come and that his purpose was to make war against Jerusalem,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'his face was for war against Jerusalem,' an idiom meaning that he was determined to fight against it.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - realized
  - perceived
  lexicon: HALOT
  rationale: The verb ראה in the waw-consecutive narrative form is naturally rendered 'saw.' In context it can imply perception or realization, but 'saw' preserves the Hebrew narrative style while allowing the contextual sense to be inferred.
- source_word: כִּי
  chosen: that
  alternatives:
  - when
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what Hezekiah saw: ''that Sennacherib had come...'' Rendering it as ''that'' best fits the syntax.'
- source_word: בָא
  chosen: had come
  alternatives:
  - came
  - was coming
  lexicon: HALOT
  rationale: The qatal after וירא reports the situation Hezekiah observed. English past perfect ('had come') smoothly conveys prior action relative to Hezekiah's seeing.
- source_word: סַנְחֵרִיב
  chosen: Sennacherib
  rationale: Personal name transliterated by standard English convention, in keeping with the translation philosophy to transliterate names.
- source_word: וּפָנָיו
  chosen: his purpose
  alternatives:
  - his face
  - he was determined
  - his intention
  lexicon: HALOT
  rationale: Literally 'and his face,' but the idiom 'set one's face' or 'one's face being for...' conveys intention or resolve. 'His purpose' expresses the idiomatic sense in clear modern English without over-paraphrasing.
- source_word: לַמִּלְחָמָה
  chosen: to make war
  alternatives:
  - for battle
  - for war
  lexicon: HALOT
  rationale: The noun 'war/battle' with the preceding idiom yields the sense of hostile intent. 'To make war' is idiomatic English and preserves the military force of the phrase.
- source_word: עַל
  chosen: against
  alternatives:
  - upon
  - 'on'
  lexicon: HALOT
  rationale: With מלחמה and a city object, עַל indicates hostile direction. 'Against' is the natural English rendering.
- source_word: יְרוּשָׁלִָם
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
