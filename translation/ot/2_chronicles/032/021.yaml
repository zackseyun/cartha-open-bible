  text: וַ/יִּשְׁלַ֤ח יְהוָה֙ מַלְאָ֔ךְ וַ/יַּכְחֵ֞ד כָּל גִּבּ֥וֹר חַ֨יִל֙ וְ/נָגִ֣יד וְ/שָׂ֔ר בְּ/מַחֲנֵ֖ה מֶ֣לֶךְ אַשּׁ֑וּר וַ/יָּשָׁב֩ בְּ/בֹ֨שֶׁת פָּנִ֜ים לְ/אַרְצ֗/וֹ וַ/יָּבֹא֙ בֵּ֣ית אֱלֹהָ֔י/ו ו/מ/יציא/ו מֵעָ֔י/ו שָׁ֖ם הִפִּילֻ֥/הוּ בֶ/חָֽרֶב־׃
translation:
  text: 'And the LORD sent an angel, who wiped out every mighty warrior, commander, and officer in the camp of the king of Assyria. So he returned to his own land with shame on his face. And when he entered the house of his god, some of those who came from his own body struck him down there with the sword.'
