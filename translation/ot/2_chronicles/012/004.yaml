id: 2CH.12.4
reference: 2 Chronicles 12:4
source:
  edition: WLC
  text: וַ/יִּלְכֹּ֛ד אֶת עָרֵ֥י הַ/מְּצֻר֖וֹת אֲשֶׁ֣ר לִֽ/יהוּדָ֑ה וַ/יָּבֹ֖א עַד
    יְרוּשָׁלִָֽם־־׃ס
translation:
  text: He captured the fortified cities that belonged to Judah and came as far as
    Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and advanced as far as Jerusalem.' The Hebrew says literally 'came as
      far as Jerusalem,' emphasizing that he reached Jerusalem after taking Judah's
      fortified cities.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְכֹּד
  chosen: captured
  alternatives:
  - took
  - seized
  lexicon: HALOT
  rationale: The verb לכד commonly means to capture or seize, especially of taking
    cities in warfare. 'Captured' is natural modern English and preserves the military
    sense better than the more generic 'took'.
- source_word: עָרֵי הַמְּצֻרוֹת
  chosen: the fortified cities
  alternatives:
  - the fortified towns
  - the strongholds
  lexicon: HALOT
  rationale: The construct phrase literally denotes 'the cities of fortification/fortified
    cities.' 'Fortified cities' is the standard and most precise rendering for defended
    urban centers; 'strongholds' would be less exact because the Hebrew explicitly
    says 'cities'.
- source_word: אֲשֶׁר לִיהוּדָה
  chosen: that belonged to Judah
  alternatives:
  - that were in Judah
  - of Judah
  lexicon: HALOT
  rationale: The preposition ל here marks possession or affiliation. 'Belonged to
    Judah' communicates political possession more clearly in English than the bare
    'of Judah,' while avoiding the potentially narrower geographic sense of 'in Judah'.
- source_word: וַיָּבֹא עַד יְרוּשָׁלָם
  chosen: and came as far as Jerusalem
  alternatives:
  - and came to Jerusalem
  - and advanced as far as Jerusalem
  lexicon: HALOT
  rationale: בוא with עַד indicates movement up to a limit. 'Came as far as Jerusalem'
    preserves that nuance better than simply 'came to Jerusalem,' which could imply
    entry into the city. 'Advanced' is possible but adds a military coloring not explicit
    in the verb itself.
