id: 2CH.12.8
reference: 2 Chronicles 12:8
source:
  edition: WLC
  text: כִּ֥י יִהְיוּ ל֖/וֹ לַ/עֲבָדִ֑ים וְ/יֵדְעוּ֙ עֲב֣וֹדָתִ֔/י וַ/עֲבוֹדַ֖ת מַמְלְכ֥וֹת
    הָ/אֲרָצֽוֹת־׃ס
translation:
  text: For they will become his slaves, so that they may know my service and the
    service of the kingdoms of the lands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my worship ... and the service of the kingdoms of the lands.' The Hebrew
      word for 'service' can include worshipful service as well as servitude or labor.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding divine action; 'for' fits the
    explanatory force in context.
- source_word: יִהְיוּ לּוֹ לַעֲבָדִים
  chosen: they will become his slaves
  alternatives:
  - they will be his servants
  - they will belong to him as slaves
  lexicon: HALOT
  rationale: The construction with היה + ל + noun expresses becoming/coming to be.
    עֲבָדִים can mean 'servants' or 'slaves'; here subjugation to Shishak is in view,
    so the bonded and political force is salient, favoring 'slaves' per the project's
    contextual handling of servitude terms.
- source_word: וְיֵדְעוּ
  chosen: so that they may know
  alternatives:
  - and they will know
  - and they may learn
  lexicon: HALOT
  rationale: 'The prefixed waw with imperfect after the preceding clause can express
    result/purpose in context: their subjugation is intended to teach them. ''Know''
    preserves the Hebrew verb ידע while allowing the pedagogical sense to emerge from
    context.'
- source_word: עֲבוֹדָתִי
  chosen: my service
  alternatives:
  - my worship
  - serving me
  lexicon: HALOT
  rationale: עֲבוֹדָה can denote service, labor, or cultic service/worship. In this
    contrast between serving the LORD and serving foreign kingdoms, 'service' best
    preserves the broader ambiguity, including covenantal allegiance and worship,
    without narrowing too quickly to liturgy alone.
- source_word: וַעֲבוֹדַת
  chosen: and the service of
  alternatives:
  - and serving
  - and the slavery of
  lexicon: HALOT
  rationale: Maintains lexical consistency with עֲבוֹדָתִי in the parallel contrast.
    'Service' allows the reader to hear the deliberate comparison between two kinds
    of servitude/allegiance.
- source_word: מַמְלְכוֹת הָאֲרָצוֹת
  chosen: the kingdoms of the lands
  alternatives:
  - the kingdoms of the countries
  - the kingdoms of the earth
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the plural 'lands' and the political
    sense of multiple foreign realms. 'Earth' would sound too universal here; 'countries'
    is possible but less textually transparent.
