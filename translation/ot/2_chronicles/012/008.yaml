theological_decisions:
- issue: Whether עֲבוֹדָה should be rendered as 'service' or more specifically 'worship'
    in reference to God
  chosen_reading: service
  alternative_readings:
  - worship
  - serving me
  rationale: The verse contrasts allegiance to the LORD with subjection to earthly
    kingdoms. 'Service' preserves both religious and political dimensions of עֲבוֹדָה
    and better mirrors the parallelism than the narrower 'worship.'
  doctrine_reference: Translation philosophy §3, §5
