id: 2CH.12.3
reference: 2 Chronicles 12:3
source:
  edition: WLC
  text: בְּ/אֶ֤לֶף וּ/מָאתַ֨יִם֙ רֶ֔כֶב וּ/בְ/שִׁשִּׁ֥ים אֶ֖לֶף פָּרָשִׁ֑ים וְ/אֵ֣ין
    מִסְפָּ֗ר לָ/עָ֞ם אֲשֶׁר בָּ֤אוּ עִמּ/וֹ֙ מִ/מִּצְרַ֔יִם לוּבִ֥ים סֻכִּיִּ֖ים
    וְ/כוּשִֽׁים־׃
translation:
  text: 'with 1,200 chariots and 60,000 horsemen, and the people who came with him
    from Egypt were without number: Libyans, Sukkites, and Cushites.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'innumerable'; literally, 'there was no number to the people.'
    reason: lexical_alternative
  - marker: b
    text: '''Sukkites'' renders a people-group name of uncertain precise identification;
      some translations transliterate it as ''Sukkiim.'''
    reason: cultural_note
  - marker: c
    text: Or 'Ethiopians' for 'Cushites,' though 'Cushites' more directly reflects
      the Hebrew ethnic-geographical term.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/אֶלֶף וּ/מָאתַיִם
  chosen: with 1,200
  alternatives:
  - at 1,200
  - in 1,200
  lexicon: HALOT
  rationale: The prefixed ב on the numeral phrase is idiomatic in military enumeration,
    indicating accompaniment or possession of forces. 'With 1,200' is natural English
    and fits the syntax with the following military noun.
- source_word: רֶכֶב
  chosen: chariots
  alternatives:
  - chariotry
  - chariot force
  lexicon: HALOT
  rationale: Although the noun can denote chariotry collectively, in English military
    counts are most naturally rendered as countable 'chariots' when paired with a
    numeral.
- source_word: וּ/בְ/שִׁשִּׁים אֶלֶף
  chosen: and 60,000
  lexicon: HALOT
  rationale: Straightforward cardinal number phrase continuing the military inventory.
- source_word: פָּרָשִׁים
  chosen: horsemen
  alternatives:
  - cavalrymen
  - mounted troops
  lexicon: HALOT
  rationale: The term refers to mounted warriors. 'Horsemen' is a clear, conventional
    rendering in historical narrative and matches the concrete style of the verse.
- source_word: וְ/אֵין מִסְפָּר
  chosen: were without number
  alternatives:
  - were innumerable
  - there was no number
  lexicon: HALOT
  rationale: The Hebrew idiom means that the quantity could not be counted. 'Were
    without number' preserves the idiomatic force while remaining readable.
- source_word: לָ/עָם
  chosen: the people
  alternatives:
  - the troops
  - the army
  lexicon: HALOT
  rationale: עָם ordinarily means 'people.' In this military context it refers to
    the mass of accompanying forces, but 'the people' best preserves the Hebrew wording
    without over-specifying.
- source_word: אֲשֶׁר בָּאוּ עִמּוֹ מִמִּצְרַיִם
  chosen: who came with him from Egypt
  alternatives:
  - who came with him out of Egypt
  lexicon: HALOT
  rationale: This relative clause identifies the origin of the accompanying forces.
    'From Egypt' is the most natural rendering of מִן here.
- source_word: לוּבִים
  chosen: Libyans
  alternatives:
  - Lubim
  lexicon: HALOT
  rationale: This ethnonym is commonly identified with Libyans. Since the philosophy
    is to translate titles but transliterate names by standard convention, a standard
    English people-name is appropriate here.
- source_word: סֻכִּיִּים
  chosen: Sukkites
  alternatives:
  - Sukkiim
  lexicon: HALOT
  rationale: The ethnonym is uncertain in precise identification. 'Sukkites' gives
    a transparent transliteration into standard English form without claiming more
    specificity than the Hebrew warrants.
- source_word: וְ/כוּשִׁים
  chosen: and Cushites
  alternatives:
  - and Ethiopians
  lexicon: HALOT
  rationale: '''Cushites'' preserves the historical-geographical term כוש without
    importing the potentially anachronistic specificity of ''Ethiopians.'' This follows
    original-language primacy over translation tradition.'
