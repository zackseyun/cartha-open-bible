id: 2CH.12.16
reference: 2 Chronicles 12:16
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֤ב רְחַבְעָם֙ עִם אֲבֹתָ֔י/ו וַ/יִּקָּבֵ֖ר בְּ/עִ֣יר דָּוִ֑יד וַ/יִּמְלֹ֛ךְ אֲבִיָּ֥ה בְנ֖/וֹ תַּחְתָּֽי/ו־׃פ
translation:
  text: And Rehoboam slept with his fathers and was buried in the city of David[a], and Abijah his son reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'slept with his fathers,' a customary expression for death and joining the ancestral line.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: slept
  alternatives:
  - lay down
  - died
  lexicon: HALOT
  rationale: The idiom 'slept with his fathers' is a standard royal death formula. 'Slept' preserves the Hebrew wording and literary convention better than flattening it to 'died,' while the following burial clause makes the meaning clear.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: This preserves the conventional dynastic idiom used in the historical books. 'Ancestors' is possible but less literal and less resonant with the formulaic expression.
- source_word: וַיִּקָּבֵר
  chosen: was buried
  alternatives:
  - was entombed
  lexicon: HALOT
  rationale: Passive 'was buried' directly reflects the Hebrew verbal form and is the natural English equivalent.
- source_word: בְּעִיר דָּוִיד
  chosen: in the city of David
  alternatives:
  - in David's city
  lexicon: HALOT
  rationale: This is the standard and clear rendering of the place name expression, preserving the recognized biblical designation.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: '''Reigned'' is the normal rendering for מלך in succession notices. ''Became king'' is possible, but ''reigned'' better matches the narrative formula.'
- source_word: אֲבִיָּה
  chosen: Abijah
  alternatives:
  - Abijam
  rationale: The Chronicler's form here is אֲבִיָּה, conventionally transliterated 'Abijah.' 'Abijam' reflects a different form found elsewhere, not this verse.
- source_word: בְנוֹ
  chosen: his son
  lexicon: HALOT
  rationale: A straightforward filial designation; no contextual reason to expand or paraphrase.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - after him
  - instead of him
  lexicon: HALOT
  rationale: '''In his place'' idiomatically conveys royal succession and closely matches the sense of תחתיו in this context.'
