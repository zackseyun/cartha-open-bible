id: 2CH.12.15
reference: 2 Chronicles 12:15
source:
  edition: WLC
  text: וְ/דִבְרֵ֣י רְחַבְעָ֗ם הָ/רִאשֹׁנִים֙ וְ/הָ/אֲ֣חַרוֹנִ֔ים הֲ/לֹא הֵ֨ם כְּתוּבִ֜ים
    בְּ/דִבְרֵ֨י שְׁמַֽעְיָ֧ה הַ/נָּבִ֛יא וְ/עִדּ֥וֹ הַ/חֹזֶ֖ה לְ/הִתְיַחֵ֑שׂ וּ/מִלְחֲמ֧וֹת
    רְחַבְעָ֛ם וְ/יָרָבְעָ֖ם כָּל הַ/יָּמִֽים־־׃
translation:
  text: Now the acts of Rehoboam, the first and the last, are they not written in
    the records of Shemaiah the prophet and of Iddo the seer, according to genealogical
    enrollment? And there were wars between Rehoboam and Jeroboam all their days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the genealogical records,' or 'for genealogical enrollment.' The
      Hebrew phrase is difficult and may describe the form or purpose of the source
      material associated with Iddo.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - events
  lexicon: HALOT
  rationale: In royal-summary formulas, דִבְרֵי commonly refers not merely to spoken
    words but to the deeds/events of a king's reign. 'Acts' is idiomatic in English
    and fits the historiographical context.
- source_word: הָרִאשֹׁנִים וְהָאֲחַרוֹנִים
  chosen: the first and the last
  alternatives:
  - the earlier and the later
  - from first to last
  lexicon: HALOT
  rationale: A conventional formula referring to the whole course of a reign. 'The
    first and the last' preserves the Hebrew structure while remaining clear.
- source_word: הֲלֹא הֵם כְּתוּבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  - surely they are written
  lexicon: HALOT
  rationale: This is the standard rhetorical formula introducing a source citation.
    'Are they not written' preserves both the rhetorical question and the formal register.
- source_word: בְּדִבְרֵי
  chosen: in the records of
  alternatives:
  - in the words of
  - in the account of
  - in the chronicles of
  lexicon: HALOT
  rationale: Here again דִבְרֵי introduces written source material. 'Records of' communicates
    documentary/historiographical force better than the overly literal 'words of.'
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Standard rendering of נָבִיא; no contextual reason to vary.
- source_word: הַחֹזֶה
  chosen: the seer
  alternatives:
  - the visionary
  lexicon: HALOT
  rationale: חֹזֶה is a recognized prophetic title distinct from נָבִיא in wording,
    and 'seer' preserves that distinction in English.
- source_word: לְהִתְיַחֵשׂ
  chosen: according to genealogical enrollment
  alternatives:
  - in genealogical records
  - for genealogical registration
  - to be enrolled by genealogy
  lexicon: HALOT
  rationale: The infinitive of יחס relates to reckoning or enrolling by genealogy.
    The phrase is difficult, but this rendering preserves the likely sense without
    over-paraphrasing. It may qualify the written records as arranged with genealogical
    reference.
- source_word: וּמִלְחֲמוֹת
  chosen: And there were wars
  alternatives:
  - and the wars of
  - as for the wars of
  lexicon: HALOT
  rationale: The Hebrew is formally a noun phrase ('and the wars of Rehoboam and Jeroboam'),
    but English reads more naturally by making the implied predication explicit from
    the context of summary notice. This is a modest optimal-equivalence adjustment.
- source_word: כָּל הַיָּמִים
  chosen: all their days
  alternatives:
  - continually
  - all the time
  lexicon: HALOT
  rationale: In context with two named kings, 'all their days' most naturally means
    throughout their lifetimes/reigns. It preserves the Hebrew idiom more closely
    than 'continually.'
