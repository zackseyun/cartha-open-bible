id: 2CH.9.29
reference: 2 Chronicles 9:29
source:
  edition: WLC
  text: וּ/שְׁאָר֙ דִּבְרֵ֣י שְׁלֹמֹ֔ה הָ/רִאשֹׁנִ֖ים וְ/הָ/אֲחֲרוֹנִ֑ים הֲ/לֹא הֵ֣ם כְּתוּבִ֗ים עַל דִּבְרֵי֙ נָתָ֣ן הַ/נָּבִ֔יא וְ/עַל נְבוּאַ֞ת אֲחִיָּ֣ה הַ/שִּֽׁילוֹנִ֗י וּ/בַ/חֲזוֹת֙ יעדי הַ/חֹזֶ֔ה עַל יָרָבְעָ֖ם בֶּן נְבָֽט־־־־־׃
translation:
  text: Now the rest of the acts of Solomon[a], from first to last, are they not written in the records of Nathan the prophet, and in the prophecy of Ahijah the Shilonite[b], and in the visions of Iddo the seer concerning Jeroboam son of Nebat?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the words/account of Nathan the prophet.' The Hebrew term can denote either spoken words or a written record; here it likely refers to a documentary source.
    reason: lexical_alternative
  - marker: b
    text: Or 'about' or possibly 'against Jeroboam son of Nebat.' The Hebrew preposition can carry several related senses; 'concerning' best fits the source-citation context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁאָר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - As for the rest of
  lexicon: HALOT
  rationale: שְׁאָר means 'rest, remainder.' The prefixed conjunction can be rendered simply 'and,' but 'now' gives natural English discourse flow for a concluding source citation formula without adding content.
- source_word: דִּבְרֵי שְׁלֹמֹה
  chosen: the acts of Solomon
  alternatives:
  - the words of Solomon
  - the matters concerning Solomon
  - the affairs of Solomon
  lexicon: HALOT
  rationale: In royal-summary formulas, דִּבְרֵי often refers broadly to deeds, matters, or acts rather than only spoken words. 'Acts' fits the historiographic context and standard English idiom for annalistic summaries.
- source_word: הָרִאשֹׁנִים וְהָאֲחֲרוֹנִים
  chosen: from first to last
  alternatives:
  - the former and the latter
  - the first and the last
  lexicon: HALOT
  rationale: This idiom denotes the whole span of Solomon's reign or history. 'From first to last' is a natural English rendering that preserves the totalizing sense.
- source_word: הֲלֹא הֵם כְּתוּבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  - behold, they are written
  lexicon: HALOT
  rationale: This is a conventional rhetorical formula introducing documentary sources. 'Are they not written' preserves both the interrogative form and the formal register.
- source_word: עַל דִּבְרֵי נָתָן הַנָּבִיא
  chosen: in the records of Nathan the prophet
  alternatives:
  - in the words of Nathan the prophet
  - in the account of Nathan the prophet
  - upon the words of Nathan the prophet
  lexicon: HALOT
  rationale: With כתב plus על in source-citation formulas, English idiom is better served by 'written in.' דִּבְרֵי here likely means a written account or record, not merely spoken words, so 'records' best conveys the documentary sense.
- source_word: נְבוּאַת אֲחִיָּה הַשִּׁילוֹנִי
  chosen: the prophecy of Ahijah the Shilonite
  alternatives:
  - the prophetic writing of Ahijah the Shilonite
  - the oracle of Ahijah the Shilonite
  lexicon: HALOT
  rationale: נְבוּאָה straightforwardly denotes 'prophecy.' 'Shilonite' is a standard transliteration of the gentilicial form, preserving the personal designation.
- source_word: וּבַחֲזוֹת יֶעְדּוֹ הַחֹזֶה
  chosen: and in the visions of Iddo the seer
  alternatives:
  - and in the vision-records of Iddo the seer
  - and in the visions of Jedo the seer
  lexicon: HALOT
  rationale: חֲזוֹת is the plural/collective form related to visionary revelation, naturally rendered 'visions.' The proper name is commonly vocalized in English as 'Iddo.' חֹזֶה is a prophetic title; 'seer' preserves the distinction from נָבִיא ('prophet').
- source_word: עַל יָרָבְעָם בֶּן נְבָט
  chosen: concerning Jeroboam son of Nebat
  alternatives:
  - about Jeroboam son of Nebat
  - against Jeroboam son of Nebat
  lexicon: HALOT
  rationale: The preposition עַל can mean 'concerning/about' in documentary contexts. 'Against' is possible in some contexts, but here the source list most naturally identifies the subject matter of Iddo's visions.
