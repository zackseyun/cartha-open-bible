id: 2CH.9.1
reference: 2 Chronicles 9:1
source:
  edition: WLC
  text: וּ/מַֽלְכַּת שְׁבָ֗א שָֽׁמְעָה֮ אֶת שֵׁ֣מַע שְׁלֹמֹה֒ וַ/תָּב֣וֹא לְ/נַסּוֹת֩
    אֶת שְׁלֹמֹ֨ה בְ/חִיד֜וֹת בִּ/ירֽוּשָׁלִַ֗ם בְּ/חַ֣יִל כָּבֵ֣ד מְאֹ֡ד וּ֠/גְמַלִּים
    נֹשְׂאִ֨ים בְּשָׂמִ֧ים וְ/זָהָ֛ב לָ/רֹ֖ב וְ/אֶ֣בֶן יְקָרָ֑ה וַ/תָּבוֹא֙ אֶל שְׁלֹמֹ֔ה
    וַ/תְּדַבֵּ֣ר עִמּ֔/וֹ אֵ֛ת כָּל אֲשֶׁ֥ר הָיָ֖ה עִם לְבָבָֽ/הּ־־־־־־׃
translation:
  text: Now the queen of Sheba heard of Solomon’s fame, and she came to Jerusalem
    to test Solomon with riddles, with a very great retinue and camels carrying spices,
    gold in abundance, and precious stones. When she came to Solomon, she spoke with
    him about all that was in her heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heard the report about Solomon.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to test Solomon with hard questions.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'all that was in her heart,' an idiom for the full range of her thoughts
      and concerns.
    reason: cultural_note
lexical_decisions:
- source_word: שֵׁמַע
  chosen: fame
  alternatives:
  - report
  - renown
  lexicon: HALOT
  rationale: In the collocation 'heard the shemaʿ of Solomon,' the noun refers not
    merely to a sound but to the report/news concerning Solomon that had spread. 'Fame'
    captures the idiomatic sense in natural English better than the more wooden 'report,'
    while still reflecting what was heard about him.
- source_word: לְנַסּוֹת
  chosen: to test
  alternatives:
  - to try
  - to prove
  lexicon: HALOT
  rationale: The infinitive of נסה here denotes putting Solomon to the test intellectually.
    'Test' is the clearest modern English equivalent and fits the following phrase
    'with riddles.'
- source_word: בְחִידוֹת
  chosen: with riddles
  alternatives:
  - with hard questions
  - with enigmas
  lexicon: HALOT
  rationale: חִידוֹת refers to riddles, enigmatic sayings, or puzzles. 'Riddles' preserves
    the lexical concreteness of the Hebrew better than the traditional but broader
    'hard questions.'
- source_word: בִּירוּשָׁלִַם
  chosen: to Jerusalem
  alternatives:
  - in Jerusalem
  lexicon: HALOT
  rationale: Although the preposition is ב ('in/at'), with the motion verb 'came'
    English idiom normally expresses destination as 'to Jerusalem.' This is an optimal-equivalence
    adjustment for natural English.
- source_word: בְּחַיִל כָּבֵד מְאֹד
  chosen: with a very great retinue
  alternatives:
  - with a very large force
  - with a very great company
  lexicon: HALOT
  rationale: חַיִל can denote strength, wealth, army, or company. In this travel context,
    accompanied by camels and luxury goods, it most naturally refers to an impressive
    entourage/retinue rather than a military force.
- source_word: בְּשָׂמִים
  chosen: spices
  alternatives:
  - balsam
  - aromatics
  lexicon: HALOT
  rationale: The plural denotes fragrant spices or aromatics. 'Spices' is the standard
    accessible rendering in this royal-gift context.
- source_word: לָרֹב
  chosen: in abundance
  alternatives:
  - in great quantity
  - abundantly
  lexicon: HALOT
  rationale: The phrase modifies the gold and indicates large quantity. 'In abundance'
    is idiomatic and preserves the sense of exceptional amount.
- source_word: אֶבֶן יְקָרָה
  chosen: precious stones
  alternatives:
  - precious stone
  - valuable gems
  lexicon: HALOT
  rationale: Though singular in form, the expression functions collectively in English
    in this list of luxury items. 'Precious stones' communicates the collective sense
    naturally.
- source_word: וַתְּדַבֵּר עִמּוֹ
  chosen: she spoke with him
  alternatives:
  - she spoke to him
  - she talked with him
  lexicon: HALOT
  rationale: The verb דבר with עִם commonly conveys speaking with someone, suggesting
    exchange rather than a one-sided address. 'Spoke with him' preserves that nuance.
- source_word: אֵת כָּל אֲשֶׁר הָיָה עִם לְבָבָהּ
  chosen: about all that was in her heart
  alternatives:
  - all that was on her mind
  - everything she had in her heart
  lexicon: HALOT
  rationale: The idiom refers to the full content of her thoughts, concerns, or questions.
    'In her heart' preserves the Hebrew anthropological expression without flattening
    it to mere cognition.
