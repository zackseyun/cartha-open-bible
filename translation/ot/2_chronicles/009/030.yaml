id: 2CH.9.30
reference: 2 Chronicles 9:30
source:
  edition: WLC
  text: וַ/יִּמְלֹ֨ךְ שְׁלֹמֹ֧ה בִֽ/ירוּשָׁלִַ֛ם עַל כָּל יִשְׂרָאֵ֖ל אַרְבָּעִ֥ים
    שָׁנָֽה־־׃
translation:
  text: And Solomon reigned in Jerusalem over all Israel forty years.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - was king
  - ruled
  lexicon: HALOT
  rationale: The waw-consecutive imperfect of מלך narrates a past event/state. 'Reigned'
    is the standard and natural English rendering for royal rule, more idiomatic than
    'was king' and more specific than 'ruled.'
- source_word: שְׁלֹמֹה
  chosen: Solomon
  rationale: Standard English transliteration of the personal name, following the
    translation philosophy of transliterating names rather than translating them.
- source_word: בִירוּשָׁלַםִ
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  rationale: The preposition ב marks location. 'In Jerusalem' is the normal modern
    English rendering; 'at Jerusalem' is possible but less natural here.
- source_word: עַל כָּל יִשְׂרָאֵל
  chosen: over all Israel
  alternatives:
  - over the whole of Israel
  - over all the Israelites
  lexicon: HALOT
  rationale: עַל with מלך expresses dominion or kingship over a people. 'All Israel'
    is a conventional and accurate rendering that preserves the corporate/national
    sense without over-paraphrasing to 'the Israelites.'
- source_word: אַרְבָּעִים שָׁנָה
  chosen: forty years
  lexicon: HALOT
  rationale: Straightforward cardinal number plus singular noun used idiomatically
    for a plural duration in Hebrew; rendered naturally in English as 'forty years.'
