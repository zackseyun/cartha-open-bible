id: 2CH.9.14
reference: 2 Chronicles 9:14
source:
  edition: WLC
  text: לְ/בַ֞ד מֵ/אַנְשֵׁ֧י הַ/תָּרִ֛ים וְ/הַ/סֹּחֲרִ֖ים מְבִיאִ֑ים וְ/כָל מַלְכֵ֤י
    עֲרַב֙ וּ/פַח֣וֹת הָ/אָ֔רֶץ מְבִיאִ֛ים זָהָ֥ב וָ/כֶ֖סֶף לִ/שְׁלֹמֹֽה־׃
translation:
  text: Besides what the traders and merchants brought, all the kings of Arabia and
    the governors of the land were bringing gold and silver to Solomon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the traveling merchants' for 'the traders'; the Hebrew expression is
      somewhat difficult and may distinguish itinerant traders from merchants more
      generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבַד
  chosen: Besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: Introduces an exception/addition to the previously stated total. 'Besides'
    is concise and natural in English, fitting the sense of something additional to
    the amount just mentioned.
- source_word: מֵאַנְשֵׁי הַתָּרִים
  chosen: the traders
  alternatives:
  - the men of those who explore/travel
  - the traveling merchants
  lexicon: HALOT
  rationale: The phrase is difficult, but in this commercial context it refers to
    people engaged in trade journeys. Rendering it as 'the traders' captures the economic
    sense without over-literal awkwardness.
- source_word: וְהַסֹּחֲרִים
  chosen: and merchants
  alternatives:
  - and traders
  lexicon: HALOT
  rationale: סחר clearly denotes commerce/merchant activity. 'Merchants' provides
    a useful distinction alongside the previous term, preserving the likely nuance
    of different classes of commercial agents.
- source_word: מְבִיאִים
  chosen: brought
  alternatives:
  - were bringing
  lexicon: HALOT
  rationale: 'For the first occurrence, English idiom works best with a relative clause
    summarizing the source of the revenue: ''what the traders and merchants brought.''
    The participle has iterative/customary force, but simple past is acceptable in
    this summarizing construction.'
- source_word: כָל מַלְכֵי עֲרַב
  chosen: all the kings of Arabia
  alternatives:
  - all the kings of Arab
  - all the kings of the Arabians
  lexicon: HALOT
  rationale: עֲרַב refers to Arabia/Arabian peoples or region. 'Arabia' is the most
    natural standard English geographical rendering here.
- source_word: וּפַחוֹת הָאָרֶץ
  chosen: and the governors of the land
  alternatives:
  - and the provincial governors of the land
  - and the governors of the country
  lexicon: HALOT
  rationale: פחות denotes governors or provincial officials. 'Governors of the land'
    is a straightforward rendering that preserves the Hebrew expression without over-specifying
    administrative structure.
- source_word: מְבִיאִים
  chosen: were bringing
  alternatives:
  - brought
  - kept bringing
  lexicon: HALOT
  rationale: The second participle likely expresses customary or repeated action.
    'Were bringing' preserves the ongoing/iterative sense in readable English.
- source_word: זָהָב וָכֶסֶף
  chosen: gold and silver
  lexicon: HALOT
  rationale: Standard literal rendering of the tribute materials.
- source_word: לִשְׁלֹמֹה
  chosen: to Solomon
  alternatives:
  - for Solomon
  lexicon: HALOT
  rationale: The preposition marks the recipient of the tribute. 'To Solomon' is the
    most direct English equivalent.
