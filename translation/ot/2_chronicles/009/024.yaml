id: 2CH.9.24
reference: 2 Chronicles 9:24
source:
  edition: WLC
  text: וְ/הֵ֣ם מְבִיאִ֣ים אִ֣ישׁ מִנְחָת֡/וֹ כְּלֵ֣י כֶסֶף֩ וּ/כְלֵ֨י זָהָ֤ב וּ/שְׂלָמוֹת֙
    נֵ֣שֶׁק וּ/בְשָׂמִ֔ים סוּסִ֖ים וּ/פְרָדִ֑ים דְּבַר שָׁנָ֖ה בְּ/שָׁנָֽה־׃פ
translation:
  text: 'And they were bringing, each man his tribute: articles of silver and articles
    of gold, garments, weapons, spices, horses, and mules, year by year.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'each one his gift' or 'each man his present'; the Hebrew מִנְחָה can
      denote a gift or offering, but in this royal context it likely carries the sense
      of tribute.
    reason: lexical_alternative
  - marker: b
    text: Or 'robes' for 'garments.'
    reason: lexical_alternative
  - marker: c
    text: Or 'armor' or 'arms' for 'weapons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְבִיאִים
  chosen: were bringing
  alternatives:
  - brought
  - kept bringing
  lexicon: HALOT
  rationale: The participle conveys ongoing or customary action in context; 'were
    bringing' reflects repeated presentation of gifts without over-paraphrasing.
- source_word: אִישׁ מִנְחָתוֹ
  chosen: each man his tribute
  alternatives:
  - each man his gift
  - each his present
  lexicon: HALOT
  rationale: אִישׁ distributively means 'each man/each one.' מִנְחָה here is not a
    grain offering but a presented gift to a king, so 'tribute' best fits the royal
    context of regular offerings from visitors or subject peoples.
- source_word: כְּלֵי כֶסֶף
  chosen: articles of silver
  alternatives:
  - vessels of silver
  - objects of silver
  lexicon: HALOT
  rationale: כְּלִי is broad ('article, vessel, implement'). 'Articles' is natural
    English and leaves the category open, matching the Hebrew's generality.
- source_word: וּכְלֵי זָהָב
  chosen: articles of gold
  alternatives:
  - vessels of gold
  - objects of gold
  lexicon: HALOT
  rationale: Parallel to כְּלֵי כֶסֶף; consistency favors the same rendering.
- source_word: וּשְׂלָמוֹת
  chosen: garments
  alternatives:
  - robes
  - cloaks
  lexicon: HALOT
  rationale: The term denotes clothing items, likely costly outer garments. 'Garments'
    is broad and fits a tribute list without over-specifying style.
- source_word: נֵשֶׁק
  chosen: weapons
  alternatives:
  - armor
  - arms
  lexicon: HALOT
  rationale: נֵשֶׁק commonly refers to weaponry or military equipment. 'Weapons' is
    the clearest modern English rendering.
- source_word: וּבְשָׂמִים
  chosen: spices
  alternatives:
  - balsam
  - aromatics
  lexicon: HALOT
  rationale: A standard rendering in royal gift contexts; 'spices' is idiomatic and
    sufficiently broad.
- source_word: סוּסִים
  chosen: horses
  lexicon: HALOT
  rationale: Direct lexical equivalent.
- source_word: וּפְרָדִים
  chosen: mules
  lexicon: HALOT
  rationale: Direct lexical equivalent.
- source_word: דְּבַר שָׁנָה בְּשָׁנָה
  chosen: year by year
  alternatives:
  - the matter of a year in its year
  - annually
  - as each year required
  lexicon: HALOT
  rationale: This idiom indicates regular annual recurrence. 'Year by year' preserves
    the iterative sense in natural English.
