id: 2CH.9.13
reference: 2 Chronicles 9:13
source:
  edition: WLC
  text: וַ/יְהִי֙ מִשְׁקַ֣ל הַ/זָּהָ֔ב אֲשֶׁר בָּ֥א לִ/שְׁלֹמֹ֖ה בְּ/שָׁנָ֣ה אֶחָ֑ת
    שֵׁ֥שׁ מֵא֛וֹת וְ/שִׁשִּׁ֥ים וָ/שֵׁ֖שׁ כִּכְּרֵ֥י זָהָֽב־׃
translation:
  text: Now the weight of the gold that came to Solomon in one year was six hundred
    sixty-six talents of gold,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that was brought to Solomon'; the Hebrew literally says 'that came to
      Solomon,' without specifying the agent.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now ... was
  alternatives:
  - And ... was
  - It was
  lexicon: HALOT
  rationale: The waw-consecutive with היה introduces the statement in narrative sequence.
    'Now ... was' gives natural English while preserving the discourse flow better
    than a bare 'and.'
- source_word: מִשְׁקַל
  chosen: the weight
  alternatives:
  - the amount by weight
  - the weight measure
  lexicon: HALOT
  rationale: The noun refers specifically to weight, not merely quantity or value.
    'The weight' is the most direct and idiomatic rendering.
- source_word: הַזָּהָב
  chosen: of the gold
  alternatives:
  - of gold
  lexicon: HALOT
  rationale: The definite article is present in Hebrew. English can render this naturally
    as 'the gold' in a specific referential sense, namely the gold received by Solomon.
- source_word: אֲשֶׁר בָּא
  chosen: that came
  alternatives:
  - that came in
  - that arrived
  - that was brought
  lexicon: HALOT
  rationale: The clause literally says 'that came.' While the context implies receipt,
    the Hebrew verb does not explicitly state agency, so 'that came' preserves the
    source wording without over-specifying.
- source_word: לִשְׁלֹמֹה
  chosen: to Solomon
  alternatives:
  - for Solomon
  lexicon: HALOT
  rationale: The preposition ל marks direction or receipt here; 'to Solomon' is the
    most straightforward rendering.
- source_word: בְּשָׁנָה אֶחָת
  chosen: in one year
  alternatives:
  - in a single year
  - in one particular year
  lexicon: HALOT
  rationale: This phrase denotes the amount received within the span of one year.
    'In one year' is both literal and clear.
- source_word: שֵׁשׁ מֵאוֹת וְשִׁשִּׁים וָשֵׁשׁ
  chosen: six hundred sixty-six
  alternatives:
  - six hundred and sixty-six
  lexicon: HALOT
  rationale: This is the straightforward cardinal number. The version without 'and'
    fits contemporary readable English while preserving the exact figure.
- source_word: כִּכְּרֵי זָהָב
  chosen: talents of gold
  alternatives:
  - gold talents
  lexicon: HALOT
  rationale: כִּכָּר is the standard large unit of weight commonly rendered 'talent.'
    'Talents of gold' is the established and clear English expression.
