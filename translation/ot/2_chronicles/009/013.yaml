theological_decisions:
- issue: Potential symbolic significance of the number 666
  chosen_reading: Render the number straightforwardly as a historical quantity without
    interpretive signaling.
  alternative_readings:
  - A translation that highlights possible later symbolic resonance with other biblical
    uses of 666
  rationale: The Hebrew text here presents an annual weight of gold and does not itself
    interpret the number symbolically. The translation should not import later theological
    associations into the main text.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
