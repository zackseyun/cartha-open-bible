id: 2CH.9.28
reference: 2 Chronicles 9:28
source:
  edition: WLC
  text: וּ/מוֹצִיאִ֨ים סוּסִ֧ים מִ/מִּצְרַ֛יִם לִ/שְׁלֹמֹ֖ה וּ/מִ/כָּל הָ/אֲרָצֽוֹת־׃
translation:
  text: And they were importing horses for Solomon from Egypt and from all the lands[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And they were bringing out horses from Egypt for Solomon, and from all the lands.' The Hebrew verb literally means 'causing to go out/bringing out,' but in this context refers to trade supply.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מוֹצִיאִים
  chosen: they were importing
  alternatives:
  - they brought out
  - they exported
  - horses were imported
  lexicon: HALOT
  rationale: The Hiphil participle of יצא literally means 'causing to go out/bringing out.' In this trade context with horses coming from Egypt to Solomon, idiomatic English is 'importing.' The plural participle has an indefinite/impersonal sense, so English supplies 'they' rather than forcing a passive, though a passive sense is also possible contextually.
- source_word: סוּסִים
  chosen: horses
  lexicon: HALOT
  rationale: Straightforward plural noun meaning 'horses.'
- source_word: מִ/מִּצְרַיִם
  chosen: from Egypt
  lexicon: HALOT
  rationale: 'The preposition מן marks source/origin: the horses came from Egypt.'
- source_word: לִ/שְׁלֹמֹה
  chosen: for Solomon
  alternatives:
  - to Solomon
  lexicon: HALOT
  rationale: The preposition ל can mean 'to' or 'for.' In a commercial supply context, 'for Solomon' better conveys destination/beneficiary in natural English.
- source_word: וּ/מִ/כָּל הָ/אֲרָצוֹת
  chosen: and from all the lands
  alternatives:
  - and from all the countries
  - and from every land
  lexicon: HALOT
  rationale: כָּל plus the plural of אֶרֶץ denotes a broad range of territories/nations. 'Lands' preserves the Hebrew image more closely than the more interpretive 'countries,' while remaining natural English.
