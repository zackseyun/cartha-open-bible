id: 2CH.9.23
reference: 2 Chronicles 9:23
source:
  edition: WLC
  text: וְ/כֹל֙ מַלְכֵ֣י הָ/אָ֔רֶץ מְבַקְשִׁ֖ים אֶת פְּנֵ֣י שְׁלֹמֹ֑ה לִ/שְׁמֹ֨עַ֙
    אֶת חָכְמָת֔/וֹ אֲשֶׁר נָתַ֥ן הָ/אֱלֹהִ֖ים בְּ/לִבּֽ/וֹ־־־׃
translation:
  text: And all the kings of the earth were seeking the presence of Solomon, to hear
    his wisdom that God had put in his heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''were seeking the face of Solomon,'' an idiom for seeking his
      presence or audience.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל
  chosen: And all
  alternatives:
  - Now all
  lexicon: HALOT
  rationale: 'The conjunction plus quantifier naturally continues the narrative: ''And
    all.'' ''Now all'' is possible but less necessary in English.'
- source_word: מַלְכֵי הָאָרֶץ
  chosen: the kings of the earth
  alternatives:
  - the kings of the land
  lexicon: HALOT
  rationale: אָרֶץ can mean 'land' or 'earth.' In this royal-international context,
    referring to surrounding rulers broadly, 'earth' best matches the idiom and conventional
    sense of worldwide renown without overstating universality beyond the Hebrew expression.
- source_word: מְבַקְשִׁים אֶת־פְּנֵי
  chosen: were seeking the presence of
  alternatives:
  - sought an audience with
  - were seeking the face of
  - were seeking
  lexicon: HALOT
  rationale: The idiom 'seek the face/presence of' means to seek access to or audience
    with someone. 'Were seeking the presence of' preserves the Hebrew imagery better
    than the more interpretive 'sought an audience with,' while remaining natural
    English. The participle is rendered progressively ('were seeking') to reflect
    ongoing action.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  rationale: Standard English transliteration of the personal name.
- source_word: לִשְׁמֹעַ
  chosen: to hear
  alternatives:
  - to listen to
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To hear' is the most direct rendering
    and works idiomatically with 'wisdom' in English.
- source_word: חָכְמָתוֹ
  chosen: his wisdom
  lexicon: HALOT
  rationale: Straightforward possessive noun; no contextual reason to expand or paraphrase.
- source_word: אֲשֶׁר נָתַן הָאֱלֹהִים
  chosen: that God had put
  alternatives:
  - which God had given
  - that God gave
  lexicon: HALOT
  rationale: נתן literally means 'give,' but with בְּלֵב/בְּלִבּוֹ ('in his heart')
    English idiom prefers 'put in his heart.' The pluperfect 'had put' fits the relative
    clause describing wisdom already bestowed.
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: Although the Hebrew has the article, English normally omits it with the
    singular referent 'God' in this context.
- source_word: בְּלִבּוֹ
  chosen: in his heart
  alternatives:
  - in his mind
  lexicon: HALOT
  rationale: לֵב/לֵבָב in Hebrew includes the inner person, mind, and will, but 'heart'
    should be retained here to preserve the biblical anthropological expression rather
    than flatten it to 'mind.'
