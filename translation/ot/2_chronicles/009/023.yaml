theological_decisions:
- issue: Divine source of Solomon's wisdom
  chosen_reading: that God had put in his heart
  alternative_readings:
  - that God had given him
  rationale: The verse explicitly attributes Solomon's wisdom to God's action. Rendering
    בְּלִבּוֹ as 'in his heart' preserves the text's theological anthropology and
    avoids reducing the statement to a generic bestowal detached from the inner person.
  doctrine_reference: Translation philosophy §§1, 3, 6
