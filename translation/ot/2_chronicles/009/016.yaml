id: 2CH.9.16
reference: 2 Chronicles 9:16
source:
  edition: WLC
  text: וּ/שְׁלֹשׁ מֵא֤וֹת מָֽגִנִּים֙ זָהָ֣ב שָׁח֔וּט שְׁלֹ֤שׁ מֵאוֹת֙ זָהָ֔ב יַעֲלֶ֖ה עַל הַ/מָּגֵ֣ן הָ/אֶחָ֑ת וַ/יִּתְּנֵ֣/ם הַ/מֶּ֔לֶךְ בְּ/בֵ֖ית יַ֥עַר הַ/לְּבָנֽוֹן־־׃פ
translation:
  text: and three hundred shields of beaten gold[a]; three hundred shekels of gold went onto each shield[c][b]. And the king put them in the House of the Forest of Lebanon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''three hundred gold'' for each shield; ''shekels'' is supplied for clarity, likely implied by the parallel in 1 Kings 10:17.'
    reason: lexical_alternative
  - marker: b
    text: Or 'hammered gold' for 'beaten gold.'
    reason: lexical_alternative
  - marker: c
    text: The House of the Forest of Lebanon was a named royal building; alternatively, 'the palace of the Forest of Lebanon.'
    reason: cultural_note
lexical_decisions:
- source_word: מָגִנִּים
  chosen: shields
  alternatives:
  - bucklers
  lexicon: HALOT
  rationale: The noun מָגֵן refers to a shield. English 'shield' is the clear, natural rendering. 'Buckler' appears in some traditional translations but is archaic and not required by the Hebrew here.
- source_word: זָהָב שָׁחוּט
  chosen: beaten gold
  alternatives:
  - hammered gold
  - gold beaten thin
  lexicon: HALOT
  rationale: שָׁחוּט here describes worked metal, likely beaten or hammered into thin plates. 'Beaten gold' is idiomatic, concise, and matches the likely manufacturing sense without overexplaining.
- source_word: שְׁלֹשׁ מֵאוֹת זָהָב
  chosen: three hundred shekels of gold
  alternatives:
  - three hundred gold pieces
  - three hundred of gold
  lexicon: HALOT
  rationale: The Hebrew literally says 'three hundred gold' without stating the unit. In this construction, the implied unit is commonly understood as shekels from the parallel in 1 Kings 10:17 and standard ancient Near Eastern weight-language. Supplying 'shekels' makes the sense intelligible in English while remaining closely tied to the source.
- source_word: יַעֲלֶה עַל
  chosen: went onto
  alternatives:
  - was used for
  - came upon
  - covered
  lexicon: HALOT
  rationale: The Hiphil of עלה with עַל literally indicates that the stated amount 'went up on' each shield, i.e., was applied to it. 'Went onto' preserves the concrete imagery better than a more interpretive rendering like 'was used for,' while remaining readable.
- source_word: הַמָּגֵן הָאֶחָת
  chosen: each shield
  alternatives:
  - one shield
  - the one shield
  lexicon: HALOT
  rationale: 'Although formally singular (''the one shield''), the distributive sense in context is clear: the amount applied to each individual shield among the three hundred. ''Each shield'' is the natural English equivalent.'
- source_word: וַיִּתְּנֵם
  chosen: put them
  alternatives:
  - placed them
  - set them
  lexicon: HALOT
  rationale: נתן often means 'give,' but with an object and location it commonly means 'put/place.' 'Put them' is straightforward modern English.
- source_word: בֵּית יַעַר הַלְּבָנוֹן
  chosen: the House of the Forest of Lebanon
  alternatives:
  - the palace of the Forest of Lebanon
  lexicon: HALOT
  rationale: This is the established name of a specific royal building. A relatively formal rendering preserves the proper-name character and matches the Hebrew construct chain. 'Palace' is interpretive and therefore kept as an alternative only.
