id: 2CH.9.19
reference: 2 Chronicles 9:19
source:
  edition: WLC
  text: וּ/שְׁנֵ֧ים עָשָׂ֣ר אֲרָי֗וֹת עֹמְדִ֥ים שָׁ֛ם עַל שֵׁ֥שׁ הַֽ/מַּעֲל֖וֹת מִ/זֶּ֣ה
    וּ/מִ/זֶּ֑ה לֹא נַעֲשָׂ֥ה כֵ֖ן לְ/כָל מַמְלָכָֽה־־־׃
translation:
  text: And twelve lions were standing there on the six steps, on this side and on
    that side. Nothing like it had been made for any kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'twelve lions stood there on the six steps, one on each side.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁנֵים עָשָׂר
  chosen: And twelve
  alternatives:
  - Now twelve
  - There were twelve
  lexicon: HALOT
  rationale: Cardinal number introducing the next feature of the throne description.
    The conjunction is carried forward naturally as 'And' in English narrative description.
- source_word: אֲרָיוֹת
  chosen: lions
  lexicon: HALOT
  rationale: Straightforward plural noun referring to lion figures associated with
    the throne.
- source_word: עֹמְדִים
  chosen: were standing
  alternatives:
  - stood
  lexicon: HALOT
  rationale: Participle conveys a stative/descriptive sense in the scene. 'Were standing'
    preserves the visual description, though 'stood' would also be acceptable in smoother
    English.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Locative adverb referring to the throne setting already under description.
- source_word: עַל שֵׁשׁ הַמַּעֲלוֹת
  chosen: on the six steps
  alternatives:
  - by the six steps
  - upon the six steps
  lexicon: HALOT
  rationale: מַעֲלוֹת here refers to stair-steps leading up to the throne. 'On the
    six steps' follows the Hebrew closely and matches the image of lions positioned
    along the staircase.
- source_word: מִזֶּה וּמִזֶּה
  chosen: on this side and on that side
  alternatives:
  - on one side and on the other
  - from here and from there
  lexicon: HALOT
  rationale: Idiomatic distributive expression indicating placement on both sides
    of the steps. 'On this side and on that side' preserves the symmetry and concrete
    spatial sense.
- source_word: לֹא נַעֲשָׂה כֵן
  chosen: Nothing like it had been made
  alternatives:
  - It had not been made like this
  - Nothing had been made like this
  lexicon: HALOT
  rationale: Passive verbal construction with כֵן expresses uniqueness by comparison.
    'Nothing like it had been made' is idiomatic English that preserves the superlative
    force.
- source_word: לְכָל מַמְלָכָה
  chosen: for any kingdom
  alternatives:
  - in any kingdom
  - for all the kingdoms
  lexicon: HALOT
  rationale: The phrase indicates comparison across kingdoms generally. 'For any kingdom'
    best captures the sense that no kingdom possessed anything comparable.
