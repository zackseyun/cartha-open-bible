id: 2CH.9.9
reference: 2 Chronicles 9:9
source:
  edition: WLC
  text: וַ/תִּתֵּ֨ן לַ/מֶּ֜לֶךְ מֵאָ֥ה וְ/עֶשְׂרִ֣ים כִּכַּ֣ר זָהָ֗ב וּ/בְשָׂמִ֛ים לָ/רֹ֥ב מְאֹ֖ד וְ/אֶ֣בֶן יְקָרָ֑ה וְ/לֹ֤א הָיָה֙ כַּ/בֹּ֣שֶׂם הַ/ה֔וּא אֲשֶׁר נָתְנָ֥ה מַֽלְכַּת שְׁבָ֖א לַ/מֶּ֥לֶךְ שְׁלֹמֹֽה׀־־׃
translation:
  text: And she gave the king one hundred twenty talents of gold[a], and spices in great abundance, and precious stones. There had never been spices like those that the queen of Sheba gave to King Solomon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'There were never again spices like those that the queen of Sheba gave to King Solomon.' The Hebrew can be understood as a statement of unmatched quality up to that time, or more broadly as an unmatched gift in Israel's memory.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתֵּן
  chosen: And she gave
  alternatives:
  - Then she gave
  lexicon: HALOT
  rationale: Wayyiqtol of נתן advances the narrative; 'And she gave' preserves the sequential force in natural English.
- source_word: לַמֶּלֶךְ
  chosen: the king
  alternatives:
  - to the king
  lexicon: HALOT
  rationale: The indirect object is naturally expressed in English without repeating 'to' after 'gave' when the recipient immediately follows.
- source_word: מֵאָה וְעֶשְׂרִים כִּכַּר זָהָב
  chosen: one hundred twenty talents of gold
  alternatives:
  - a hundred and twenty talents of gold
  lexicon: HALOT
  rationale: כִּכָּר is a weight measure, conventionally 'talent.' The numeral is rendered in standard modern English.
- source_word: וּבְשָׂמִים
  chosen: and spices
  alternatives:
  - and balsam spices
  - and aromatics
  lexicon: HALOT
  rationale: בְּשָׂמִים refers broadly to fragrant spices/aromatics. 'Spices' is the most idiomatic and contextually fitting rendering here.
- source_word: לָרֹב מְאֹד
  chosen: in great abundance
  alternatives:
  - very many
  - in very great quantity
  lexicon: HALOT
  rationale: The phrase intensifies quantity; 'in great abundance' is natural English that preserves the emphatic sense.
- source_word: וְאֶבֶן יְקָרָה
  chosen: and precious stones
  alternatives:
  - and precious stone
  - and costly stones
  lexicon: HALOT
  rationale: Although אֶבֶן is singular, Hebrew often uses singular collectives; English idiom prefers the plural here for a list of luxury gifts.
- source_word: וְלֹא הָיָה
  chosen: There had never been
  alternatives:
  - And there was not
  - Never had there been
  lexicon: HALOT
  rationale: The clause states nonexistence up to that point. English pluperfect best conveys the retrospective comparison in narrative context.
- source_word: כַּבֹּשֶׂם הַהוּא
  chosen: spices like those
  alternatives:
  - such spices
  - that kind of spice
  lexicon: HALOT
  rationale: כְּ marks comparison, and בֹּשֶׂם here is a collective for aromatic spice. 'Spices like those' communicates the comparison clearly in idiomatic English.
- source_word: אֲשֶׁר נָתְנָה מַלְכַּת שְׁבָא
  chosen: that the queen of Sheba gave
  alternatives:
  - which the queen of Sheba had given
  lexicon: HALOT
  rationale: This relative clause identifies the incomparable spices; simple past is sufficient in English after the pluperfect main clause.
- source_word: לַמֶּלֶךְ שְׁלֹמֹה
  chosen: to King Solomon
  alternatives:
  - to the king, Solomon
  lexicon: HALOT
  rationale: English idiom naturally renders the title-name combination as 'King Solomon.'
