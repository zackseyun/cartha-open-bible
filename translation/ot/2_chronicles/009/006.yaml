id: 2CH.9.6
reference: 2 Chronicles 9:6
source:
  edition: WLC
  text: וְ/לֹֽא הֶאֱמַ֣נְתִּי לְ/דִבְרֵי/הֶ֗ם עַ֤ד אֲשֶׁר בָּ֨אתִי֙ וַ/תִּרְאֶ֣ינָה
    עֵינַ֔/י וְ/הִנֵּה֙ לֹ֣א הֻגַּד לִ֔/י חֲצִ֖י מַרְבִּ֣ית חָכְמָתֶ֑/ךָ יָסַ֕פְתָּ
    עַל הַ/שְּׁמוּעָ֖ה אֲשֶׁ֥ר שָׁמָֽעְתִּי־־־־׃
translation:
  text: But I did not believe their words until I came and my own eyes saw it; and
    behold, not even half of the greatness of your wisdom had been told to me. You
    have surpassed the report that I heard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the abundance of your wisdom.'
    reason: lexical_alternative
  - marker: b
    text: Or 'You have exceeded the report that I heard.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶאֱמַנְתִּי
  chosen: I did not believe
  alternatives:
  - I did not trust
  - I could not believe
  lexicon: HALOT
  rationale: The Hiphil of אמן here means to regard as true or credible. 'Believe'
    best fits the queen's response to reported claims, while 'trust' would suggest
    personal reliance rather than acceptance of testimony.
- source_word: לְדִבְרֵיהֶם
  chosen: their words
  alternatives:
  - their reports
  - what they said
  lexicon: HALOT
  rationale: דבר commonly means 'word(s)' or 'matter(s).' 'Their words' is formally
    close to the Hebrew; the broader sense of reported speech is clear from context.
- source_word: וַתִּרְאֶינָה עֵינַי
  chosen: my own eyes saw it
  alternatives:
  - my eyes saw
  - I saw with my own eyes
  lexicon: HALOT
  rationale: The Hebrew literally says 'my eyes saw.' English idiom is improved by
    'my own eyes saw it,' which preserves the emphatic firsthand verification implied
    by the expression.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and see
  - indeed
  lexicon: HALOT
  rationale: הִנֵּה marks vivid attention and surprise. 'Behold' preserves that discourse
    force better than a flatter connective, while remaining understandable in context.
- source_word: חֲצִי
  chosen: half
  alternatives:
  - the half
  lexicon: HALOT
  rationale: Simple quantitative term; 'half' is the natural English rendering.
- source_word: מַרְבִּית חָכְמָתֶךָ
  chosen: the greatness of your wisdom
  alternatives:
  - the abundance of your wisdom
  - your great wisdom
  lexicon: HALOT
  rationale: מַרְבִּית denotes abundance, increase, or greatness. 'The greatness of
    your wisdom' captures both the magnitude and evaluative force without sounding
    wooden. 'Your great wisdom' is possible but slightly compresses the noun phrase.
- source_word: הֻגַּד לִי
  chosen: had been told to me
  alternatives:
  - was reported to me
  - was declared to me
  lexicon: HALOT
  rationale: 'The Hophal of נגד is passive/causative passive: ''was told/reported.''
    The pluperfect ''had been told'' fits the temporal sequence relative to her arrival
    and observation.'
- source_word: יָסַפְתָּ עַל
  chosen: You have surpassed
  alternatives:
  - You have exceeded
  - You have added to
  lexicon: HALOT
  rationale: יסף with על here expresses exceeding or going beyond. 'Surpassed' is
    idiomatic and conveys comparison with the prior report. 'Added to' would be too
    literal and unclear in English.
- source_word: הַשְּׁמוּעָה
  chosen: the report
  alternatives:
  - the rumor
  - the news
  - the account
  lexicon: HALOT
  rationale: שְׁמוּעָה refers to something heard, a report or news. 'Report' is neutral
    and fits the queen's prior hearsay. 'Rumor' can imply unreliability more strongly
    than the Hebrew requires.
- source_word: אֲשֶׁר שָׁמָעְתִּי
  chosen: that I heard
  alternatives:
  - which I had heard
  lexicon: HALOT
  rationale: A straightforward relative clause. 'That I heard' is natural modern English
    and preserves the connection to שְׁמוּעָה ('report').
