id: 2CH.9.31
reference: 2 Chronicles 9:31
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֤ב שְׁלֹמֹה֙ עִם אֲבֹתָ֔י/ו וַֽ/יִּקְבְּרֻ֔/הוּ בְּ/עִ֖יר דָּוִ֣יד אָבִ֑י/ו וַ/יִּמְלֹ֛ךְ רְחַבְעָ֥ם בְּנ֖/וֹ תַּחְתָּֽי/ו־׃פ
translation:
  text: And Solomon slept with his fathers[a], and they buried him in the city of David his father. And Rehoboam his son reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'slept with his fathers,' a customary expression for death and burial among one's ancestors.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: slept
  alternatives:
  - lay down
  - died
  lexicon: HALOT
  rationale: In the idiom 'slept with his fathers,' the verb literally means 'slept/lay down' and functions as a conventional euphemism for death. Retaining 'slept' preserves the Hebrew idiom and its intertextual resonance in royal death notices better than flattening it to 'died'.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: A standard dynastic formula. 'Fathers' is more formally faithful and preserves the stock biblical expression; 'ancestors' is possible but less transparent to the Hebrew wording.
- source_word: וַיִּקְבְּרֻהוּ
  chosen: they buried him
  alternatives:
  - he was buried
  lexicon: HALOT
  rationale: The Hebrew verb is active plural with object suffix ('they buried him'). English can leave the subject indefinite, and this is preferable to a passive because it reflects the source form without forcing identification of the buriers.
- source_word: בְּעִיר דָּוִיד
  chosen: in the city of David
  alternatives:
  - in David's city
  lexicon: HALOT
  rationale: This is the conventional biblical place-name expression. 'The city of David' is the most natural and recognizable rendering.
- source_word: אָבִיו
  chosen: his father
  alternatives:
  - his ancestor
  lexicon: HALOT
  rationale: Here the suffix refers to David in relation to Solomon. 'Father' is the plain sense and suits royal genealogical language; no contextual pressure requires the broader 'ancestor.'
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: The verb means 'to reign/be king.' In succession notices, English 'reigned' is concise and idiomatic. 'Became king' foregrounds accession rather than the standard regnal formula.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: The preposition indicates succession/substitution. 'In his place' is idiomatic English for royal succession and closely matches the Hebrew sense.
