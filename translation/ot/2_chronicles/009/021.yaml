id: 2CH.9.21
reference: 2 Chronicles 9:21
source:
  edition: WLC
  text: כִּֽי אֳנִיּ֤וֹת לַ/מֶּ֨לֶךְ֙ הֹלְכ֣וֹת תַּרְשִׁ֔ישׁ עִ֖ם עַבְדֵ֣י חוּרָ֑ם אַחַת֩ לְ/שָׁל֨וֹשׁ שָׁנִ֜ים תָּב֣וֹאנָה אֳנִיּ֣וֹת תַּרְשִׁ֗ישׁ נֹֽשְׂאוֹת֙ זָהָ֣ב וָ/כֶ֔סֶף שֶׁנְהַבִּ֥ים וְ/קוֹפִ֖ים וְ/תוּכִּיִּֽים־׀׃פ
translation:
  text: For the king had ships going to Tarshish with Huram’s servants; once every three years the ships of Tarshish would come[a], carrying gold and silver, ivory, monkeys, and peacocks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'parrots' for the final item in the cargo list; the Hebrew animal name is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces an explanatory clause giving the reason for Solomon's wealth in context; 'for' fits the discourse flow better than the more causal-sounding 'because' in English verse style.
- source_word: אֳנִיּוֹת
  chosen: ships
  alternatives:
  - fleet
  - ships
  lexicon: HALOT
  rationale: Standard rendering for seagoing vessels; plural noun retained.
- source_word: לַמֶּלֶךְ
  chosen: the king had
  alternatives:
  - belonging to the king
  - for the king
  lexicon: HALOT
  rationale: 'The Hebrew prepositional phrase literally means ''to/for the king,'' but in English idiom with the following clause it naturally expresses possession: the king had such ships.'
- source_word: הֹלְכוֹת תַּרְשִׁישׁ
  chosen: going to Tarshish
  alternatives:
  - going to Tarshish
  - Tarshish ships
  - seagoing ships
  lexicon: HALOT
  rationale: Here the participle plus place name most naturally indicates destination or route. Although 'ships of Tarshish' can function idiomatically for large seagoing vessels elsewhere, this first occurrence is best rendered verbally as movement toward Tarshish.
- source_word: עִם עַבְדֵי חוּרָם
  chosen: with Huram’s servants
  alternatives:
  - with the servants of Huram
  - with Huram's men
  lexicon: HALOT
  rationale: עבדים here refers to royal personnel in service to Huram. 'Servants' is the most direct rendering; no bonded-status nuance is foregrounded in this context.
- source_word: אַחַת לְשָׁלֹשׁ שָׁנִים
  chosen: once every three years
  alternatives:
  - once in three years
  - every three years
  lexicon: HALOT
  rationale: Idiomatic English rendering of the distributive time expression.
- source_word: תָּבֹאנָה
  chosen: would come
  alternatives:
  - came
  - arrived
  lexicon: HALOT
  rationale: Imperfect feminine plural describes customary repeated action; 'would come' captures habitual sense in past narrative.
- source_word: אֳנִיּוֹת תַּרְשִׁישׁ
  chosen: the ships of Tarshish
  alternatives:
  - Tarshish ships
  - the ships going to Tarshish
  lexicon: HALOT
  rationale: This construct phrase is traditionally rendered 'ships of Tarshish.' It may denote ships associated with the Tarshish trade/route rather than necessarily ships physically from Tarshish; the traditional phrase is retained because the Hebrew form here is nominal, not verbal.
- source_word: נֹשְׂאוֹת
  chosen: carrying
  alternatives:
  - bringing
  - bearing
  lexicon: HALOT
  rationale: Participial form describing what the ships customarily transported.
- source_word: זָהָב וָכֶסֶף
  chosen: gold and silver
  lexicon: HALOT
  rationale: Straightforward commodity terms.
- source_word: שֶׁנְהַבִּים
  chosen: ivory
  alternatives:
  - elephant tusks
  lexicon: HALOT
  rationale: The term conventionally denotes ivory; 'ivory' is the natural English commodity equivalent.
- source_word: וְקֹפִים
  chosen: monkeys
  alternatives:
  - apes
  lexicon: HALOT
  rationale: The animal term is commonly understood as monkeys or apes. 'Monkeys' is chosen as the more common and likely specific modern term, while preserving 'apes' as a lexical alternative.
- source_word: וְתוּכִּיִּים
  chosen: peacocks
  alternatives:
  - parrots
  lexicon: HALOT
  rationale: Traditional rendering is 'peacocks,' though the exact species is uncertain and some modern scholars suggest 'parrots.' Because the identification is debated, the alternative is preserved in a footnote.
