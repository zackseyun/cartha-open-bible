id: 2CH.9.20
reference: 2 Chronicles 9:20
source:
  edition: WLC
  text: וְ֠/כֹל כְּלֵ֞י מַשְׁקֵ֨ה הַ/מֶּ֤לֶךְ שְׁלֹמֹה֙ זָהָ֔ב וְ/כֹ֗ל כְּלֵ֛י בֵּֽית
    יַ֥עַר הַ/לְּבָנ֖וֹן זָהָ֣ב סָג֑וּר אֵ֣ין כֶּ֗סֶף נֶחְשָׁ֛ב בִּ/ימֵ֥י שְׁלֹמֹ֖ה
    לִ/מְאֽוּמָה־׃
translation:
  text: All King Solomon’s drinking vessels were gold, and all the vessels of the
    House of the Forest of Lebanon were pure gold. Silver was not considered anything
    in the days of Solomon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the palace of the Forest of Lebanon,' a named royal building.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'gold shut up/closed,' an idiom commonly understood as 'pure' or
      'refined' gold.
    reason: lexical_alternative
  - marker: c
    text: Or 'silver was not considered of any value in the days of Solomon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּלֵי מַשְׁקֵה
  chosen: drinking vessels
  alternatives:
  - drinking utensils
  - cups
  lexicon: HALOT
  rationale: כְּלֵי is a broad term for articles/vessels, and מַשְׁקֵה specifies drinking.
    'Drinking vessels' preserves the concrete sense without narrowing too far to 'cups,'
    since the Hebrew may include more than cups alone.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward material term; repeated in the verse for emphasis and
    retained consistently.
- source_word: בֵּית יַעַר הַלְּבָנוֹן
  chosen: the House of the Forest of Lebanon
  alternatives:
  - the palace of the Forest of Lebanon
  lexicon: HALOT
  rationale: This is the established name of a specific royal building. 'House' reflects
    בֵּית directly and preserves the proper-name character; 'palace' is interpretive
    and therefore kept as an alternative rather than the main text.
- source_word: זָהָב סָגוּר
  chosen: pure gold
  alternatives:
  - refined gold
  - closed gold
  lexicon: HALOT
  rationale: סָגוּר with gold is an idiom for high-quality/refined gold. 'Pure gold'
    is idiomatic modern English and communicates the sense better than the overly
    literal but opaque 'closed gold.'
- source_word: אֵין כֶּסֶף נֶחְשָׁב ... לִמְאוּמָה
  chosen: Silver was not considered anything
  alternatives:
  - silver was accounted as nothing
  - silver was not considered of any value
  lexicon: HALOT
  rationale: The clause expresses silver's insignificance in Solomon's time. 'Was
    not considered anything' stays close to the Hebrew while remaining natural English.
    'Of any value' is a valid interpretive expansion but slightly more explicit than
    the source.
- source_word: בִּימֵי שְׁלֹמֹה
  chosen: in the days of Solomon
  alternatives:
  - during Solomon's reign
  lexicon: HALOT
  rationale: The Hebrew literally refers to Solomon's days. 'In the days of Solomon'
    preserves the idiom and historical framing without over-specifying political nuance.
