id: 2CH.9.12
reference: 2 Chronicles 9:12
source:
  edition: WLC
  text: וְ/הַ/מֶּ֨לֶךְ שְׁלֹמֹ֜ה נָתַ֣ן לְ/מַֽלְכַּת שְׁבָ֗א אֶת כָּל חֶפְצָ/הּ֙ אֲשֶׁ֣ר
    שָׁאָ֔לָה מִ/לְּ/בַ֖ד אֲשֶׁר הֵבִ֣יאָה אֶל הַ/מֶּ֑לֶךְ וַֽ/תַּהֲפֹ֛ךְ וַ/תֵּ֥לֶךְ
    לְ/אַרְצָ֖/הּ הִ֥יא וַ/עֲבָדֶֽי/הָ־־־־־׃פ
translation:
  text: And King Solomon gave the queen of Sheba all that she desired, whatever she
    asked, besides what she had brought to the king. Then she turned and went to her
    own land, she and her servants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'apart from what she had brought to the king.' The Hebrew phrase may
      be understood as distinguishing Solomon's gifts from the gifts the queen had
      brought him.
    reason: lexical_alternative
  - marker: b
    text: Or 'she returned and went to her land.' The Hebrew literally says 'she turned
      and went.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָתַן
  chosen: gave
  alternatives:
  - granted
  - presented
  lexicon: HALOT
  rationale: Standard rendering for נתן in a straightforward transfer/gift context;
    'gave' is natural and sufficiently formal.
- source_word: מַלְכַּת שְׁבָא
  chosen: the queen of Sheba
  alternatives:
  - the queen of Sheba
  lexicon: HALOT
  rationale: Title translated and place name transliterated per project philosophy.
- source_word: כָּל חֶפְצָהּ
  chosen: all that she desired
  alternatives:
  - all her desire
  - everything she wanted
  lexicon: HALOT
  rationale: חֵפֶץ can denote desire, pleasure, or thing desired. In this context,
    an idiomatic English rendering is needed; 'all that she desired' preserves the
    sense without awkward literalism.
- source_word: אֲשֶׁר שָׁאָלָה
  chosen: whatever she asked
  alternatives:
  - that she asked for
  - which she requested
  lexicon: HALOT
  rationale: שׁאל here specifies the content of her desire as requested items. 'Whatever
    she asked' is concise and idiomatic.
- source_word: מִלְּבַד אֲשֶׁר הֵבִיאָה אֶל הַמֶּלֶךְ
  chosen: besides what she had brought to the king
  alternatives:
  - apart from what she had brought to the king
  - in addition to what she had brought to the king
  lexicon: HALOT
  rationale: מִלְּבַד marks exception/addition. In context, the sense is that Solomon's
    gifts were over and above the gifts she had brought. 'Besides' preserves the comparative/additive
    force compactly.
- source_word: וַתַּהֲפֹךְ
  chosen: she turned
  alternatives:
  - she returned
  - she turned back
  lexicon: HALOT
  rationale: The verb literally means 'turned' and, followed by 'went to her land,'
    naturally conveys departure/return. Retaining 'turned' preserves the Hebrew narrative
    movement without over-paraphrasing.
- source_word: וַתֵּלֶךְ לְאַרְצָהּ
  chosen: went to her own land
  alternatives:
  - went to her land
  - returned to her land
  lexicon: HALOT
  rationale: The directional phrase indicates travel back to her homeland. 'Own land'
    makes the possessive explicit in natural English.
- source_word: הִיא וַעֲבָדֶיהָ
  chosen: she and her servants
  alternatives:
  - she and her attendants
  lexicon: HALOT
  rationale: עֲבָדִים commonly means servants/slaves depending on context. Here court
    personnel accompanying a queen are best rendered 'servants'; the bonded status
    is not the focus.
