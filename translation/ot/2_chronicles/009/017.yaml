id: 2CH.9.17
reference: 2 Chronicles 9:17
source:
  edition: WLC
  text: וַ/יַּ֧עַשׂ הַ/מֶּ֛לֶךְ כִּסֵּא שֵׁ֖ן גָּד֑וֹל וַ/יְצַפֵּ֖/הוּ זָהָ֥ב טָהֽוֹר־׃
translation:
  text: The king made a great ivory throne and overlaid it with pure gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'a throne of tooth'; the expression means an ivory throne.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: made
  alternatives:
  - constructed
  - fashioned
  lexicon: HALOT
  rationale: The verb עשה in this narrative context straightforwardly means 'made'
    or 'fashioned.' 'Made' is the most natural modern English rendering and fits optimal
    equivalence without adding nuance not explicit in the Hebrew.
- source_word: הַמֶּלֶךְ
  chosen: The king
  lexicon: HALOT
  rationale: Definite noun with article; rendered directly as 'The king.' In context
    this refers to Solomon, but the Hebrew uses the title rather than the personal
    name, so the translation preserves that.
- source_word: כִּסֵּא
  chosen: throne
  alternatives:
  - seat
  lexicon: HALOT
  rationale: כסא commonly denotes a royal seat or throne. Because the subject is 'the
    king,' 'throne' best reflects the regal sense.
- source_word: שֵׁן
  chosen: ivory
  alternatives:
  - tooth
  lexicon: HALOT
  rationale: Although the noun literally means 'tooth,' in this construction כסא שן
    it idiomatically refers to ivory, as in a throne made of or adorned with ivory.
    'Ivory' communicates the material plainly in English.
- source_word: גָּדוֹל
  chosen: great
  alternatives:
  - large
  lexicon: HALOT
  rationale: גדול can mean 'great' or 'large.' Here it likely describes the throne's
    impressive size and grandeur. 'Great' preserves both physical and majestic connotations
    better than the merely dimensional 'large.'
- source_word: וַיְצַפֵּהוּ
  chosen: overlaid it
  alternatives:
  - covered it
  - plated it
  lexicon: HALOT
  rationale: The piel of צפה with object suffix commonly means to overlay or plate
    an object with a material. 'Overlaid it' is idiomatic English for furnishing an
    object with a precious-metal covering.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Direct rendering of the material noun.
- source_word: טָהוֹר
  chosen: pure
  alternatives:
  - refined
  lexicon: HALOT
  rationale: טהור means 'pure' or 'clean.' With gold, 'pure gold' is the standard
    and accurate English collocation, indicating high-quality, unmixed gold.
