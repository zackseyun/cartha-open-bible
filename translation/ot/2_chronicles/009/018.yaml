id: 2CH.9.18
reference: 2 Chronicles 9:18
source:
  edition: WLC
  text: וְ/שֵׁ֣שׁ מַעֲל֣וֹת לַ֠/כִּסֵּא וְ/כֶ֨בֶשׁ בַּ/זָּהָ֤ב לַ/כִּסֵּא֙ מָאֳחָזִ֔ים
    וְ/יָד֛וֹת מִ/זֶּ֥ה וּ/מִ/זֶּ֖ה עַל מְק֣וֹם הַ/שָּׁ֑בֶת וּ/שְׁנַ֣יִם אֲרָי֔וֹת
    עֹמְדִ֖ים אֵ֥צֶל הַ/יָּדֽוֹת־׃
translation:
  text: There were six steps to the throne, and a gold footstool attached to the throne,
    and armrests on this side and on that beside the seat, and two lions standing
    beside the armrests.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'a gold ramp/stairway attached to the throne.' The Hebrew word
      כבשׁ can be understood differently, though 'footstool' fits the throne context
      well.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲלוֹת
  chosen: steps
  alternatives:
  - ascents
  - stairs
  lexicon: HALOT
  rationale: In throne architecture, the noun refers to the ascending steps leading
    up to the throne. 'Steps' is natural modern English and sufficiently formal.
- source_word: כֶּבֶשׁ
  chosen: footstool
  alternatives:
  - ramp
  - stairway
  lexicon: HALOT
  rationale: In the parallel throne description (1 Kgs 10:19), the term is traditionally
    understood as a feature associated with the throne. Here 'footstool' best fits
    the royal-seat context and the likely sense of a support before the throne; 'ramp'
    is possible lexically but less likely in this setting.
- source_word: מָאֳחָזִים
  chosen: attached
  alternatives:
  - fastened
  - fixed
  lexicon: HALOT
  rationale: The passive participle indicates that the gold footstool was secured
    to the throne. 'Attached' is clear, idiomatic, and preserves the architectural
    detail.
- source_word: יָדוֹת
  chosen: armrests
  alternatives:
  - arms
  - handholds
  - side supports
  lexicon: HALOT
  rationale: In furniture context, literally 'hands' refers to the side pieces of
    a seat where hands rest. 'Armrests' communicates the function in contemporary
    English better than the bare 'arms'.
- source_word: מִזֶּה וּמִזֶּה
  chosen: on this side and on that
  alternatives:
  - on either side
  - on one side and on the other
  lexicon: HALOT
  rationale: The phrase marks bilateral placement. The chosen rendering stays close
    to the Hebrew while remaining readable.
- source_word: מְקוֹם הַשָּׁבֶת
  chosen: beside the seat
  alternatives:
  - at the place of the seat
  - beside the sitting place
  lexicon: HALOT
  rationale: Literally 'upon the place of the seat/sitting.' In idiomatic English,
    this describes the location of the armrests relative to the throne seat. 'Beside
    the seat' conveys the furniture layout naturally.
- source_word: אֲרָיוֹת
  chosen: lions
  lexicon: HALOT
  rationale: Straightforward plural of 'lion'; likely sculpted lions in context, but
    the Hebrew simply says 'lions,' so the translation does not over-specify.
- source_word: עֹמְדִים
  chosen: standing
  alternatives:
  - stationed
  - set
  lexicon: HALOT
  rationale: The participle describes the lions as positioned upright beside the armrests.
    'Standing' is the direct and natural rendering.
- source_word: אֵצֶל
  chosen: beside
  alternatives:
  - next to
  - at the side of
  lexicon: HALOT
  rationale: This preposition indicates close proximity. 'Beside' is concise and fits
    the descriptive style.
