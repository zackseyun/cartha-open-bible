id: 2CH.9.3
reference: 2 Chronicles 9:3
source:
  edition: WLC
  text: וַ/תֵּ֨רֶא֙ מַֽלְכַּת שְׁבָ֔א אֵ֖ת חָכְמַ֣ת שְׁלֹמֹ֑ה וְ/הַ/בַּ֖יִת אֲשֶׁ֥ר בָּנָֽה־׃
translation:
  text: When the queen of Sheba saw Solomon’s wisdom and the house that he had built,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the palace that he had built.' The Hebrew says 'the house,' which in this royal setting may refer specifically to Solomon’s palace complex.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶא
  chosen: When ... saw
  alternatives:
  - And ... saw
  - Now ... saw
  lexicon: HALOT
  rationale: 'The waw-consecutive with ראה advances the narrative: literally ''and she saw.'' In English, ''When ... saw'' best prepares for the continuation into the next verse while preserving the temporal force often conveyed in context.'
- source_word: מַלְכַּת שְׁבָא
  chosen: the queen of Sheba
  alternatives:
  - the queen from Sheba
  lexicon: HALOT
  rationale: Construct chain identifying the royal figure by realm/place. 'The queen of Sheba' is the natural English rendering and standard transliteration of the place name.
- source_word: אֵת
  chosen: '[not separately translated]'
  lexicon: Hebrew grammar
  rationale: Direct-object marker with no independent English equivalent; its function is reflected by the object placement in English.
- source_word: חָכְמַת שְׁלֹמֹה
  chosen: Solomon’s wisdom
  alternatives:
  - the wisdom of Solomon
  lexicon: HALOT
  rationale: Construct chain rendered idiomatically with the English possessive. 'Wisdom' here denotes Solomon's renowned insight and discernment, not merely accumulated knowledge.
- source_word: וְהַבַּיִת
  chosen: and the house
  alternatives:
  - and the palace
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In this royal context it likely refers to Solomon's palace complex, but the Hebrew term itself is broader. To avoid over-specifying beyond the source, the main text keeps 'house,' while preserving 'palace' as a lexical alternative in a footnote.
- source_word: אֲשֶׁר בָּנָה
  chosen: that he had built
  alternatives:
  - which he built
  lexicon: HALOT
  rationale: Relative clause modifying 'house.' English past perfect ('had built') fits the narrative sequence naturally, indicating prior completed action relative to her seeing it.
