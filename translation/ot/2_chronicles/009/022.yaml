id: 2CH.9.22
reference: 2 Chronicles 9:22
source:
  edition: WLC
  text: וַ/יִּגְדַּל֙ הַ/מֶּ֣לֶךְ שְׁלֹמֹ֔ה מִ/כֹּ֖ל מַלְכֵ֣י הָ/אָ֑רֶץ לְ/עֹ֖שֶׁר
    וְ/חָכְמָֽה׃
translation:
  text: King Solomon surpassed all the kings of the earth in wealth and wisdom.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּגְדַּל
  chosen: surpassed
  alternatives:
  - became greater than
  - was greater than
  - grew greater
  lexicon: HALOT
  rationale: The verb גדל in this comparative construction with מִן conveys superiority
    or greatness relative to others, not merely physical growth. 'Surpassed' expresses
    the comparative sense naturally in English while preserving the idea of exceeding
    others.
- source_word: הַמֶּלֶךְ שְׁלֹמֹה
  chosen: King Solomon
  alternatives:
  - the king, Solomon
  - the king Solomon
  lexicon: HALOT
  rationale: The appositional phrase identifies Solomon by title and name. 'King Solomon'
    is the most natural English rendering and preserves both elements.
- source_word: מִכֹּל מַלְכֵי הָאָרֶץ
  chosen: all the kings of the earth
  alternatives:
  - all the kings of the land
  - every king on earth
  lexicon: HALOT
  rationale: אָרֶץ can mean 'land' or 'earth'; here, in a superlative royal comparison,
    'earth' best fits the broad international scope. 'All the kings of the earth'
    is also a conventional biblical expression matching the Hebrew phrase closely.
- source_word: לְעֹשֶׁר
  chosen: in wealth
  alternatives:
  - for wealth
  - in riches
  - in riches and
  lexicon: HALOT
  rationale: The prefixed ל marks the sphere or respect in which Solomon exceeded
    others. 'In wealth' is idiomatic modern English and accurately conveys the comparative
    category.
- source_word: וְחָכְמָה
  chosen: and wisdom
  alternatives:
  - and in wisdom
  lexicon: HALOT
  rationale: 'The noun means ''wisdom.'' English commonly omits repeating the preposition
    in a paired construction: ''in wealth and wisdom.'' This preserves the Hebrew
    sense without awkwardness.'
