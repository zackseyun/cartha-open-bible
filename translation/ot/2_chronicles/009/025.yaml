id: 2CH.9.25
reference: 2 Chronicles 9:25
source:
  edition: WLC
  text: וַ/יְהִ֨י לִ/שְׁלֹמֹ֜ה אַרְבַּעַת֩ אֲלָפִ֨ים אֻֽרְי֤וֹת סוּסִים֙ וּ/מַרְכָּב֔וֹת
    וּ/שְׁנֵים עָשָׂ֥ר אֶ֖לֶף פָּרָשִׁ֑ים וַ/יַּנִּיחֵ/ם֙ בְּ/עָרֵ֣י הָ/רֶ֔כֶב וְ/עִם
    הַ/מֶּ֖לֶךְ בִּ/ירוּשָׁלִָֽם־־׃
translation:
  text: Solomon had four thousand stalls for horses and chariots, and twelve thousand
    horsemen; he stationed them in the chariot cities and with the king in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stables' instead of 'stalls' for אֻרְיוֹת; the Hebrew term refers to
      housing units for horses.
    reason: lexical_alternative
  - marker: b
    text: The parallel in 1 Kings 4:26 reads 'forty thousand stalls,' whereas Chronicles
      here reads 'four thousand.'
    reason: cross_reference
lexical_decisions:
- source_word: וַיְהִי לִשְׁלֹמֹה
  chosen: Solomon had
  alternatives:
  - there were for Solomon
  - it belonged to Solomon
  lexicon: HALOT
  rationale: The idiom with היה + ל expresses possession/existence. In natural English,
    'Solomon had' best conveys the sense without unnecessary stiffness.
- source_word: אַרְבַּעַת אֲלָפִים
  chosen: four thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number construction.
- source_word: אֻרְיוֹת
  chosen: stalls
  alternatives:
  - stables
  - horse stalls
  lexicon: HALOT
  rationale: The noun refers to stalls or stable-units. 'Stalls' fits the immediate
    construction with horses and avoids implying entire stable complexes unless context
    requires it.
- source_word: סוּסִים וּמַרְכָּבוֹת
  chosen: for horses and chariots
  alternatives:
  - of horses and chariots
  - for chariot horses
  lexicon: HALOT
  rationale: The phrase most naturally identifies what the stalls were for. 'For horses
    and chariots' preserves both nouns as given in Hebrew, even if the sense may involve
    horses used with chariots.
- source_word: וּשְׁנֵים עָשָׂר אֶלֶף
  chosen: and twelve thousand
  lexicon: HALOT
  rationale: Direct rendering of the number phrase.
- source_word: פָּרָשִׁים
  chosen: horsemen
  alternatives:
  - cavalrymen
  - mounted troops
  lexicon: HALOT
  rationale: The term denotes riders/horsemen. 'Horsemen' is the most direct and traditional
    equivalent; 'cavalrymen' is possible but somewhat more interpretive and anachronistic
    in tone.
- source_word: וַיַּנִּיחֵם
  chosen: he stationed them
  alternatives:
  - he placed them
  - he settled them
  lexicon: HALOT
  rationale: In this military-administrative context, the verb means to place or station.
    'Stationed' best fits the deployment of horses/chariots/horsemen in designated
    locations.
- source_word: בְּעָרֵי הָרֶכֶב
  chosen: in the chariot cities
  alternatives:
  - in the cities of the chariots
  - in the chariot towns
  lexicon: HALOT
  rationale: This refers to designated cities associated with chariot forces. 'Chariot
    cities' is concise and idiomatic while preserving the construct relationship.
- source_word: וְעִם הַמֶּלֶךְ
  chosen: and with the king
  alternatives:
  - and some with the king
  lexicon: HALOT
  rationale: The Hebrew simply says 'and with the king.' English can leave the implied
    subset unstated, as the pronoun 'them' already covers the distributed forces.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard place-name rendering.
