id: 2CH.9.5
reference: 2 Chronicles 9:5
source:
  edition: WLC
  text: וַ/תֹּ֨אמֶר֙ אֶל הַ/מֶּ֔לֶךְ אֱמֶת֙ הַ/דָּבָ֔ר אֲשֶׁ֥ר שָׁמַ֖עְתִּי בְּ/אַרְצִ֑/י עַל דְּבָרֶ֖י/ךָ וְ/עַל חָכְמָתֶֽ/ךָ־־־׃
translation:
  text: Then she said to the king[a], “The report that I heard in my own land about your words and your wisdom was true.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “The word/matter that I heard in my land concerning your affairs and your wisdom was true.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: Then she said
  alternatives:
  - And she said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the next event in sequence. 'Then she said' gives natural English narrative flow while preserving the consecutive sense; 'And she said' is possible but less idiomatic here.
- source_word: אֶל־הַמֶּלֶךְ
  chosen: to the king
  lexicon: HALOT
  rationale: Straightforward prepositional phrase marking the addressee.
- source_word: אֱמֶת הַדָּבָר
  chosen: The report ... was true
  alternatives:
  - The word ... was true
  - It was true, the matter ...
  - True is the word/report
  lexicon: HALOT
  rationale: The Hebrew literally reads 'truth the matter/word.' In context this idiom affirms the truthfulness of what was heard. Rendering with 'report' fits the sense of received news better than the more wooden 'word' or 'matter' in contemporary English.
- source_word: אֲשֶׁר שָׁמַעְתִּי
  chosen: that I heard
  alternatives:
  - which I heard
  lexicon: HALOT
  rationale: Standard relative clause; 'that I heard' is natural modern English.
- source_word: בְּאַרְצִי
  chosen: in my own land
  alternatives:
  - in my land
  - in my country
  lexicon: HALOT
  rationale: The 1cs suffix is preserved with 'my.' Adding 'own' brings out the personal reference naturally in English without changing the sense. 'Land' is retained rather than 'country' to stay closer to the Hebrew and biblical register.
- source_word: עַל־דְּבָרֶיךָ
  chosen: about your words
  alternatives:
  - about your matters
  - about your affairs
  - about your accomplishments
  lexicon: HALOT
  rationale: דברים can mean words, matters, or affairs. Here, in parallel with 'your wisdom,' it likely refers broadly to what was said concerning Solomon—his sayings, matters, or reputation. 'Your words' is the most direct rendering and preserves the lexical link to דבר, while remaining intelligible.
- source_word: וְעַל־חָכְמָתֶךָ
  chosen: and your wisdom
  lexicon: HALOT
  rationale: Direct rendering of the noun with 2ms suffix; 'wisdom' is the central theme of the passage and should be preserved plainly.
