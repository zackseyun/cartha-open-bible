id: 2CH.9.7
reference: 2 Chronicles 9:7
source:
  edition: WLC
  text: אַשְׁרֵ֣י אֲנָשֶׁ֔י/ךָ וְ/אַשְׁרֵ֖י עֲבָדֶ֣י/ךָ אֵ֑לֶּה הָ/עֹמְדִ֤ים לְ/פָנֶ֨י/ךָ֙
    תָּמִ֔יד וְ/שֹׁמְעִ֖ים אֶת חָכְמָתֶֽ/ךָ־׃
translation:
  text: Blessed are your men, and blessed are these your servants who stand before
    you continually and hear your wisdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Happy are your men.' The Hebrew אַשְׁרֵי can denote a happy or fortunate
      condition as well as blessedness.
    reason: lexical_alternative
  - marker: b
    text: '''Stand before you'' is a court expression for attending a king in his
      presence.'
    reason: cultural_note
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Blessed are
  alternatives:
  - Happy are
  - Fortunate are
  lexicon: HALOT
  rationale: The interjection expresses a state of enviable blessedness or fortunate
    condition. 'Blessed are' preserves the elevated tone of royal praise better than
    'happy are' while remaining natural English.
- source_word: אֲנָשֶׁיךָ
  chosen: your men
  alternatives:
  - your people
  - your attendants
  lexicon: HALOT
  rationale: The noun אֲנָשִׁים is the ordinary term for 'men.' In this court setting
    it likely refers to the king's male courtiers or officials, but 'your men' stays
    closer to the Hebrew and follows the gender-accurate principle rather than broadening
    to 'people.'
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  - your officials
  lexicon: HALOT
  rationale: Although עֶבֶד can denote slave or servant, here the context is royal
    court service rather than emphasizing bonded status. 'Servants' is the most contextually
    fitting and idiomatic rendering in this praise formula.
- source_word: אֵלֶּה
  chosen: these
  alternatives:
  - who are
  - those
  lexicon: HALOT
  rationale: The demonstrative points specifically to the servants being described.
    Rendering it as 'these' preserves the deictic force present in the Hebrew.
- source_word: הָעֹמְדִים לְפָנֶיךָ
  chosen: who stand before you
  alternatives:
  - who attend you
  - who serve in your presence
  lexicon: HALOT
  rationale: The participial phrase literally means 'the ones standing before you'
    and is a standard court expression for attendance in a ruler's presence. The translation
    keeps the literal image while remaining understandable.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - always
  - constantly
  lexicon: HALOT
  rationale: The adverb conveys regular ongoing attendance. 'Continually' fits the
    formal register and avoids overstating the sense as absolute unbroken presence.
- source_word: וְשֹׁמְעִים
  chosen: and hear
  alternatives:
  - and listen to
  lexicon: HALOT
  rationale: The participle from שׁמע commonly means 'hear' or 'listen.' 'Hear' is
    concise and works well with the object 'your wisdom,' implying receptive listening
    in context.
- source_word: חָכְמָתֶךָ
  chosen: your wisdom
  alternatives:
  - the wisdom you speak
  lexicon: HALOT
  rationale: The noun directly denotes wisdom possessed and expressed by the king.
    'Your wisdom' is the straightforward rendering and matches the queen's praise
    of Solomon's renowned wisdom.
