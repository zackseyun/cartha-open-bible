id: 2CH.9.15
reference: 2 Chronicles 9:15
source:
  edition: WLC
  text: וַ/יַּ֨עַשׂ הַ/מֶּ֧לֶךְ שְׁלֹמֹ֛ה מָאתַ֥יִם צִנָּ֖ה זָהָ֣ב שָׁח֑וּט שֵׁ֤שׁ מֵאוֹת֙ זָהָ֣ב שָׁח֔וּט יַעֲלֶ֖ה עַל הַ/צִּנָּ֥ה הָ/אֶחָֽת־׃
translation:
  text: King Solomon made two hundred large shields of beaten gold[a]; six hundred shekels of beaten gold went onto each shield.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'six hundred of beaten gold went onto the one shield.' The Hebrew implies a weight measure; 'shekels' is supplied in English for clarity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: made
  alternatives:
  - fashioned
  lexicon: HALOT
  rationale: The verb עשה is the standard verb 'make/do.' 'Made' is the most natural and sufficiently formal rendering in this inventory-style narrative context.
- source_word: הַמֶּלֶךְ שְׁלֹמֹה
  chosen: King Solomon
  alternatives:
  - the king, Solomon
  lexicon: HALOT
  rationale: English idiom naturally renders the appositional phrase as the royal title plus name, 'King Solomon.'
- source_word: מָאתַיִם
  chosen: two hundred
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: צִנָּה
  chosen: large shields
  alternatives:
  - shields
  lexicon: HALOT
  rationale: צִנָּה commonly denotes the larger body-shield, in contrast to smaller shield terms such as מָגֵן. 'Large shields' preserves the likely distinction and matches the parallel context in Solomon's armory descriptions.
- source_word: זָהָב שָׁחוּט
  chosen: beaten gold
  alternatives:
  - hammered gold
  - gold beaten thin
  lexicon: HALOT
  rationale: The participle שָׁחוּט here describes worked gold, likely hammered or beaten out into plates. 'Beaten gold' is concise, idiomatic, and traditional without being archaic.
- source_word: שֵׁשׁ מֵאוֹת
  chosen: six hundred
  lexicon: HALOT
  rationale: Straightforward numeral phrase.
- source_word: יַעֲלֶה עַל
  chosen: went onto
  alternatives:
  - was applied to
  - went up on
  - covered
  lexicon: HALOT
  rationale: The Hiphil of עלה with עַל literally indicates that the quantity of gold 'went onto' each shield, i.e., was used on or applied to it. 'Went onto' preserves the Hebrew image while remaining understandable. 'Covered' would overinterpret the manufacturing detail.
- source_word: הַצִּנָּה הָאֶחָת
  chosen: each shield
  alternatives:
  - one shield
  - the one shield
  lexicon: HALOT
  rationale: Although literally 'the one shield,' in distributive numerical contexts English idiom is best expressed as 'each shield,' indicating the amount used per individual shield.
- source_word: '[implied unit after six hundred]'
  chosen: shekels
  alternatives:
  - pieces
  - units
  lexicon: HALOT
  rationale: The Hebrew text does not explicitly repeat a weight unit here, but in this construction and in the parallel passage the amount is understood as a weight of gold. 'Shekels' makes the sense explicit for English readers without materially adding interpretation beyond the conventional implied measure.
