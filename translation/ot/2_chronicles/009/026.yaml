id: 2CH.9.26
reference: 2 Chronicles 9:26
source:
  edition: WLC
  text: וַ/יְהִ֥י מוֹשֵׁ֖ל בְּ/כָל הַ/מְּלָכִ֑ים מִן הַ/נָּהָר֙ וְ/עַד אֶ֣רֶץ פְּלִשְׁתִּ֔ים
    וְ/עַ֖ד גְּב֥וּל מִצְרָֽיִם־־־׃
translation:
  text: And he ruled over all the kings from the River to the land of the Philistines
    and to the border of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"the River" likely refers to the Euphrates River, a standard geographic
      designation in the Hebrew Bible.'
    reason: cross_reference
lexical_decisions:
- source_word: וַיְהִי
  chosen: And he was
  alternatives:
  - And he became
  - And it happened that he was
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the clause and, with the following
    participle, forms a past progressive/state description. In idiomatic English,
    this is best absorbed into the finite verb phrase 'he ruled' rather than rendered
    woodenly as 'he was.'
- source_word: מוֹשֵׁל
  chosen: ruled
  alternatives:
  - ruling
  - was ruler
  - exercised dominion
  lexicon: HALOT
  rationale: The participle of משל denotes exercising rule or dominion. Combined with
    ויהי, the sense is that Solomon was in a state of ruling. 'Ruled' is natural modern
    English and preserves the political sense without overformal wording.
- source_word: בְּכָל הַמְּלָכִים
  chosen: over all the kings
  alternatives:
  - over every king
  - among all the kings
  lexicon: HALOT
  rationale: With משל, the preposition ב can mark the sphere or objects of rule. 'Over
    all the kings' best conveys suzerainty over subordinate rulers; 'among' would
    weaken the sense.
- source_word: מִן הַנָּהָר
  chosen: from the River
  alternatives:
  - from the Euphrates River
  - from the Euphrates
  lexicon: HALOT
  rationale: הנהר with the article commonly refers to the Euphrates in this geopolitical
    formula. The main text keeps the more literal 'the River,' while the referent
    can be clarified in a footnote for readers.
- source_word: וְעַד אֶרֶץ פְּלִשְׁתִּים
  chosen: to the land of the Philistines
  alternatives:
  - as far as the land of the Philistines
  - to Philistia
  lexicon: HALOT
  rationale: The phrase marks the western extent of the realm or influence. 'The land
    of the Philistines' is transparent and close to the Hebrew; 'Philistia' is possible
    but slightly more interpretive.
- source_word: וְעַד גְּבוּל מִצְרָיִם
  chosen: and to the border of Egypt
  alternatives:
  - and as far as the border of Egypt
  - and to Egypt's border
  lexicon: HALOT
  rationale: גבול denotes border or boundary. The phrase gives the southwestern limit.
    'Border of Egypt' is straightforward and preserves the territorial sense.
