id: 2CH.9.10
reference: 2 Chronicles 9:10
source:
  edition: WLC
  text: וְ/גַם עַבְדֵ֤י חירם וְ/עַבְדֵ֣י שְׁלֹמֹ֔ה אֲשֶׁר הֵבִ֥יאוּ זָהָ֖ב מֵ/אוֹפִ֑יר
    הֵבִ֛יאוּ עֲצֵ֥י אַלְגּוּמִּ֖ים וְ/אֶ֥בֶן יְקָרָֽה־־׃
translation:
  text: And also the servants of Hiram and the servants of Solomon, who brought gold
    from Ophir, brought algum wood and precious stones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'almug wood'; the precise species denoted by the Hebrew term is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'precious stone,' singular in form, likely used collectively for
      precious stones.
    reason: lexical_alternative
  - marker: c
    text: Some English traditions render the name as 'Huram' in Chronicles; here the
      Hebrew form is represented as 'Hiram.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  chosen: And also
  alternatives:
  - Also
  - Moreover
  lexicon: HALOT
  rationale: The conjunction plus additive particle continues the narrative while
    adding emphasis. 'And also' preserves both the connective and additive force better
    than a single 'also'.
- source_word: עַבְדֵי
  chosen: servants
  alternatives:
  - slaves
  - officials
  lexicon: HALOT
  rationale: In this royal-administrative context, עבד commonly refers to servants/retainers
    in the service of a king rather than emphasizing chattel status. 'Servants' is
    the most natural and contextually accurate rendering here.
- source_word: חירם
  chosen: Hiram
  alternatives:
  - Huram
  rationale: The consonantal form here supports the standard English transliteration
    'Hiram.' 'Huram' appears in some Chronicles contexts, but this verse's form is
    best represented as 'Hiram.'
- source_word: וְעַבְדֵי שְׁלֹמֹה
  chosen: and the servants of Solomon
  alternatives:
  - and Solomon's servants
  lexicon: HALOT
  rationale: The construct chain is rendered transparently and parallels the preceding
    phrase, preserving the symmetry of the Hebrew.
- source_word: אֲשֶׁר הֵבִיאוּ זָהָב מֵאוֹפִיר
  chosen: who brought gold from Ophir
  alternatives:
  - who had brought gold from Ophir
  lexicon: HALOT
  rationale: The relative clause identifies these servants as the ones associated
    with bringing gold from Ophir. Simple past reads naturally in English; pluperfect
    is possible but not necessary in context.
- source_word: אוֹפִיר
  chosen: Ophir
  rationale: A place name, so it is transliterated rather than translated, in keeping
    with the translation philosophy.
- source_word: הֵבִיאוּ
  chosen: brought
  alternatives:
  - imported
  lexicon: HALOT
  rationale: The verb בוא in the Hiphil means 'bring.' 'Imported' would be interpretive
    and more commercial than the Hebrew requires.
- source_word: עֲצֵי אַלְגּוּמִּים
  chosen: algum wood
  alternatives:
  - almug wood
  - sandalwood
  lexicon: HALOT
  rationale: The Hebrew term names a specific wood but its precise botanical identification
    is uncertain. 'Algum wood' preserves the Hebrew form in readable English without
    overclaiming identification. 'Almug' reflects a variant tradition, and 'sandalwood'
    is interpretive.
- source_word: וְאֶבֶן יְקָרָה
  chosen: and precious stones
  alternatives:
  - and precious stone
  - and costly stone
  lexicon: HALOT
  rationale: Although אֶבֶן is singular in form, Hebrew often uses singular collectively.
    English idiom prefers the plural 'precious stones' for a cargo list of luxury
    goods.
