id: 2CH.9.27
reference: 2 Chronicles 9:27
source:
  edition: WLC
  text: וַ/יִּתֵּ֨ן הַ/מֶּ֧לֶךְ אֶת הַ/כֶּ֛סֶף בִּ/ירוּשָׁלִַ֖ם כָּ/אֲבָנִ֑ים וְ/אֵ֣ת
    הָ/אֲרָזִ֗ים נָתַ֛ן כַּ/שִּׁקְמִ֥ים אֲשֶׁר בַּ/שְּׁפֵלָ֖ה לָ/רֹֽב־־׃
translation:
  text: The king made silver as common as stones in Jerusalem, and he made cedars
    as plentiful as sycamore trees in the lowland.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in the Shephelah,” the Judean foothill region west of the central hill
      country.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּתֵּן / נָתַן
  chosen: made
  alternatives:
  - gave
  - placed
  - made ... as common/plentiful as
  lexicon: HALOT
  rationale: Although the verb is literally 'gave/put,' in this idiom it means to
    cause something to be in such abundance that it was like something common. 'Made'
    communicates the resultant state naturally in English while preserving the causative
    sense.
- source_word: הַכֶּסֶף
  chosen: silver
  alternatives:
  - the silver
  - money
  lexicon: HALOT
  rationale: The noun denotes silver as a precious metal; here it refers to silver
    in abundance, not specifically coined money. English idiom omits the article.
- source_word: כָּאֲבָנִים
  chosen: as common as stones
  alternatives:
  - like stones
  - as stones
  lexicon: HALOT
  rationale: The comparison is not merely visual but quantitative/commonness. 'As
    common as stones' makes the implied abundance explicit in natural English.
- source_word: בִּירוּשָׁלִַם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative rendering.
- source_word: הָאֲרָזִים
  chosen: cedars
  alternatives:
  - cedar wood
  - cedar trees
  lexicon: HALOT
  rationale: The plural likely refers to cedar timber/trees as a commodity. 'Cedars'
    is concise and preserves the Hebrew image.
- source_word: כַּשִּׁקְמִים
  chosen: as plentiful as the sycamore trees
  alternatives:
  - like sycamore trees
  - as the sycamores
  lexicon: HALOT
  rationale: The comparison again concerns abundance. 'Sycamore trees' clarifies the
    referent for modern readers, since 'sycamore' alone can be ambiguous.
- source_word: אֲשֶׁר בַּשְּׁפֵלָה
  chosen: in the lowland
  alternatives:
  - that are in the Shephelah
  - in the foothills
  - in the lowlands
  lexicon: HALOT
  rationale: שְׁפֵלָה refers to the Judean lowland/foothill region. 'Lowland' is understandable
    modern English; the more technical regional name 'Shephelah' is preserved in a
    footnote as an alternative.
- source_word: לָרֹב
  chosen: plentiful
  alternatives:
  - in abundance
  - for abundance
  - very many
  lexicon: HALOT
  rationale: This phrase intensifies the comparison by stressing abundance. Rendering
    it with 'plentiful' integrates the sense smoothly into English.
