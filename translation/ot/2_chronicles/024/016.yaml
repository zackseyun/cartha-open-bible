theological_decisions:
- issue: Referent of 'his house'
  chosen_reading: '''his house'' refers to God''s house, the temple'
  alternative_readings:
  - '''his house'' refers to Jehoiada''s own household'
  rationale: The immediate antecedent is 'God,' and the broader context centers on
    Jehoiada's faithful work regarding the temple. This reading best fits both syntax
    and narrative context without adding interpretive wording into the main text.
