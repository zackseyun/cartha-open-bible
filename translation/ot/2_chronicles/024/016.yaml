id: 2CH.24.16
reference: 2 Chronicles 24:16
source:
  edition: WLC
  text: וַ/יִּקְבְּרֻ֥/הוּ בְ/עִיר דָּוִ֖יד עִם הַ/מְּלָכִ֑ים כִּֽי עָשָׂ֤ה טוֹבָה֙
    בְּ/יִשְׂרָאֵ֔ל וְ/עִ֥ם הָ/אֱלֹהִ֖ים וּ/בֵיתֽ/וֹ־־־׃ס
translation:
  text: And they buried him in the city of David among the kings, because he had done
    good in Israel, and toward God and his house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the kings.'
    reason: lexical_alternative
  - marker: b
    text: That is, toward God and toward God's house, the temple.
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּקְבְּרֻהוּ
  chosen: And they buried him
  alternatives:
  - And he was buried
  lexicon: HALOT
  rationale: The verb is active plural with 3ms object suffix, so an active rendering
    ('they buried him') best reflects the Hebrew form. English leaves the subject
    indefinite, matching the Hebrew's unspecified plural.
- source_word: בְעִיר דָּוִיד
  chosen: in the city of David
  alternatives:
  - in David's city
  lexicon: HALOT
  rationale: This is the standard place-name expression and should be preserved in
    its familiar form rather than recast idiomatically.
- source_word: עִם הַמְּלָכִים
  chosen: among the kings
  alternatives:
  - with the kings
  lexicon: HALOT
  rationale: The preposition literally means 'with,' but in burial context English
    'among the kings' more naturally conveys burial in their company or burial area
    without losing the sense.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here the conjunction gives the reason for his honorable burial. 'Because'
    is clearer in modern English than the more formal 'for.'
- source_word: עָשָׂה טוֹבָה
  chosen: he had done good
  alternatives:
  - he had done what was good
  - he had done kindness
  lexicon: HALOT
  rationale: The phrase denotes performing good or beneficial deeds. 'Had done good'
    is concise, natural, and fits the retrospective explanation.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - for Israel
  lexicon: HALOT
  rationale: The preposition is straightforwardly locative here, indicating the sphere
    in which his good was done.
- source_word: וְעִם הָאֱלֹהִים
  chosen: and toward God
  alternatives:
  - and with God
  - and for God
  lexicon: HALOT
  rationale: Although literally 'and with God,' English 'toward God' better expresses
    the relational direction of his good deeds in this evaluative context. It avoids
    implying companionship and captures beneficent devotion directed to God.
- source_word: וּבֵיתוֹ
  chosen: and his house
  alternatives:
  - and for his house
  - and the house of God
  lexicon: HALOT
  rationale: 'The suffix most naturally refers back to God: ''his house,'' i.e., God''s
    house, the temple. Retaining the pronoun mirrors the Hebrew while allowing the
    antecedent to remain clear from context.'
