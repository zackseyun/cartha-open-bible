id: 2CH.24.15
reference: 2 Chronicles 24:15
source:
  edition: WLC
  text: וַ/יִּזְקַ֧ן יְהוֹיָדָ֛ע וַ/יִּשְׂבַּ֥ע יָמִ֖ים וַ/יָּמֹ֑ת בֶּן מֵאָ֧ה וּ/שְׁלֹשִׁ֛ים
    שָׁנָ֖ה בְּ/מוֹתֽ/וֹ־׃
translation:
  text: And Jehoiada grew old and was full of days, and he died. He was one hundred
    and thirty years old at his death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'had lived a full life.' The Hebrew says 'was full
      of days.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְקַן
  chosen: grew old
  alternatives:
  - became old
  - was old
  lexicon: HALOT
  rationale: The verb זקן in the wayyiqtol sequence denotes advancing in age. 'Grew
    old' is natural modern English and preserves the processive sense better than
    the stative 'was old'.
- source_word: יְהוֹיָדָע
  chosen: Jehoiada
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: וַיִּשְׂבַּע יָמִים
  chosen: was full of days
  alternatives:
  - had his fill of days
  - was satisfied with days
  lexicon: HALOT
  rationale: This Hebrew idiom conveys a full, complete lifespan. The rendering 'was
    full of days' keeps the idiomatic imagery while remaining understandable in English;
    more interpretive options like 'lived a full life' were avoided to stay closer
    to the source.
- source_word: וַיָּמֹת
  chosen: he died
  alternatives:
  - and died
  lexicon: HALOT
  rationale: Standard rendering of מות in the narrative sequence. Including the pronoun
    clarifies the English sentence after the idiomatic clause.
- source_word: בֶּן מֵאָה וּשְׁלֹשִׁים שָׁנָה
  chosen: one hundred and thirty years old
  alternatives:
  - a son of one hundred and thirty years
  - aged one hundred thirty years
  lexicon: HALOT
  rationale: The Hebrew age formula literally uses 'son of,' but idiomatic English
    expresses age as 'X years old.' This is a routine optimal-equivalence adjustment.
- source_word: בְּמוֹתוֹ
  chosen: at his death
  alternatives:
  - when he died
  lexicon: HALOT
  rationale: The preposition ב with the noun 'death' and pronominal suffix is most
    naturally rendered 'at his death' here, preserving the temporal note attached
    to the age statement.
