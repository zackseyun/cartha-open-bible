id: 2CH.24.2
reference: 2 Chronicles 24:2
source:
  edition: WLC
  text: וַ/יַּ֧עַשׂ יוֹאָ֛שׁ הַ/יָּשָׁ֖ר בְּ/עֵינֵ֣י יְהוָ֑ה כָּל יְמֵ֖י יְהוֹיָדָ֥ע
    הַ/כֹּהֵֽן־׃
translation:
  text: Joash did what was right in the eyes of the LORD all the days of Jehoiada
    the priest.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - made
  lexicon: HALOT
  rationale: 'The verb עשה commonly means ''do/make.'' In the idiom with ''the right''
    it is best rendered ''did'' in natural English: ''did what was right.'''
- source_word: הַיָּשָׁר
  chosen: what was right
  alternatives:
  - the right
  - what was upright
  lexicon: HALOT
  rationale: The adjective יָשָׁר means 'straight, right, upright.' In this evaluative
    royal formula, English idiom favors 'what was right' rather than the more wooden
    'the right.'
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for evaluation from someone's perspective.
    'In the eyes of' preserves the metaphor and remains clear in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD,'
    following established reverential convention and the pattern reflected in the
    Septuagint.
- source_word: כָּל יְמֵי
  chosen: all the days of
  alternatives:
  - throughout the days of
  - as long as
  lexicon: HALOT
  rationale: The phrase literally means 'all the days of.' This preserves the temporal
    scope clearly and closely.
- source_word: יְהוֹיָדָע
  chosen: Jehoiada
  rationale: Personal names are transliterated by standard English convention.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: The appositional title identifies Jehoiada's office. Rendering it explicitly
    as 'the priest' preserves the Hebrew designation without expansion.
