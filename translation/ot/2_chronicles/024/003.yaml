id: 2CH.24.3
reference: 2 Chronicles 24:3
source:
  edition: WLC
  text: וַ/יִּשָּׂא ל֥/וֹ יְהוֹיָדָ֖ע נָשִׁ֣ים שְׁתָּ֑יִם וַ/יּ֖וֹלֶד בָּנִ֥ים וּ/בָנֽוֹת־׃
translation:
  text: Jehoiada took for him two wives, and he fathered sons and daughters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, less likely, 'Jehoiada took two wives and fathered sons and daughters,'
      if Jehoiada is taken as the subject throughout the verse.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשָּׂא
  chosen: took
  alternatives:
  - procured
  - gave
  lexicon: HALOT
  rationale: The verb נשׂא with אשה/נשים commonly means 'take' in marriage. Here the
    indirect object לּוֹ ('for him') and the subject Jehoiada indicate Jehoiada arranged
    or secured wives for Joash rather than marrying them himself. 'Took for him' preserves
    the Hebrew idiom while signaling the causative sense from context.
- source_word: לּוֹ
  chosen: for him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: The preposition plus pronominal suffix marks the beneficiary of Jehoiada's
    action. 'For him' is more idiomatic in English in this marriage-arrangement context.
- source_word: יְהוֹיָדָע
  chosen: Jehoiada
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: נָשִׁים שְׁתָּיִם
  chosen: two wives
  alternatives:
  - two women
  lexicon: HALOT
  rationale: In a marital context, נשים is best rendered 'wives,' not merely 'women.'
    The numeral is retained explicitly.
- source_word: וַיּוֹלֶד
  chosen: he fathered
  alternatives:
  - he begot
  - he had
  lexicon: HALOT
  rationale: ילד in the Hiphil with a male subject means 'beget' or 'father.' 'Fathered'
    is clear modern English and preserves the male-subject nuance better than the
    more generic 'had.'
- source_word: בָּנִים וּבָנוֹת
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly distinguishes male and female children, so 'sons
    and daughters' should be preserved rather than flattened to 'children.'
