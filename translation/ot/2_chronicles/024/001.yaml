id: 2CH.24.1
reference: 2 Chronicles 24:1
source:
  edition: WLC
  text: בֶּן שֶׁ֤בַע שָׁנִים֙ יֹאָ֣שׁ בְּ/מָלְכ֔/וֹ וְ/אַרְבָּעִ֣ים שָׁנָ֔ה מָלַ֖ךְ
    בִּֽ/ירוּשָׁלִָ֑ם וְ/שֵׁ֣ם אִמּ֔/וֹ צִבְיָ֖ה מִ/בְּאֵ֥ר שָֽׁבַע־׃
translation:
  text: Joash was seven years old when he began to reign, and he reigned forty years
    in Jerusalem. His mother’s name was Zibiah from Beer-sheba.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן שֶׁבַע שָׁנִים
  chosen: was seven years old
  alternatives:
  - was a son of seven years
  lexicon: HALOT
  rationale: Hebrew age formula literally reads 'a son of seven years,' but idiomatic
    English requires 'was seven years old.' This preserves the plain sense without
    wooden phrasing.
- source_word: בְּמָלְכוֹ
  chosen: when he began to reign
  alternatives:
  - when he became king
  - at his reigning
  lexicon: HALOT
  rationale: The preposition ב plus infinitive/verb form here marks the time of accession.
    'When he began to reign' is a standard, clear English rendering that reflects
    the temporal sense.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  lexicon: HALOT
  rationale: The verb means 'to reign, be king.' 'He reigned' fits the narrative formula
    used in royal summaries and preserves the verbal force.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative use of the preposition ב with the place name.
- source_word: וְשֵׁם אִמּוֹ
  chosen: His mother’s name was
  alternatives:
  - and the name of his mother was
  lexicon: HALOT
  rationale: This is a common genealogical formula. The chosen rendering is natural
    English while preserving the informational structure.
- source_word: צִבְיָה
  chosen: Zibiah
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: מִבְּאֵר שָׁבַע
  chosen: from Beer-sheba
  alternatives:
  - from Beersheba
  lexicon: HALOT
  rationale: The prefixed מ indicates origin. 'Beer-sheba' is a standard English transliteration
    of the place name; the hyphen helps reflect the compound form.
