id: 2CH.24.5
reference: 2 Chronicles 24:5
source:
  edition: WLC
  text: וַ/יִּקְבֹּץ֮ אֶת הַ/כֹּהֲנִ֣ים וְ/הַ/לְוִיִּם֒ וַ/יֹּ֣אמֶר לָ/הֶ֡ם צְא֣וּ לְ/עָרֵ֪י יְהוּדָ֟ה וְ/קִבְצוּ֩ מִ/כָּל יִשְׂרָאֵ֨ל כֶּ֜סֶף לְ/חַזֵּ֣ק אֶת בֵּ֣ית אֱלֹֽהֵי/כֶ֗ם מִ/דֵּ֤י שָׁנָה֙ בְּ/שָׁנָ֔ה וְ/אַתֶּ֖ם תְּמַהֲר֣וּ לַ/דָּבָ֑ר וְ/לֹ֥א מִֽהֲר֖וּ הַֽ/לְוִיִּֽם־־׀־׃
translation:
  text: So he gathered the priests and the Levites and said to them[a], “Go out to the cities of Judah and collect silver from all Israel to repair the house of your God year by year[b], and you must act quickly in this matter.” But the Levites did not act quickly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'money' for 'silver.' The Hebrew uses 'silver' as the concrete term for monetary collection.
    reason: lexical_alternative
  - marker: b
    text: Or 'to strengthen' the house of your God; here the sense is repairing or restoring the temple structure.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבֹּץ
  chosen: he gathered
  alternatives:
  - he assembled
  - he collected
  lexicon: HALOT
  rationale: Qal wayyiqtol of קבץ commonly means to gather or assemble people. 'Gathered' is natural English and fits the direct object 'the priests and the Levites.'
- source_word: הַכֹּהֲנִים וְהַלְוִיִּם
  chosen: the priests and the Levites
  lexicon: HALOT
  rationale: Standard rendering of the two temple-service groups; retaining both explicitly preserves the distinction in the Hebrew.
- source_word: צְאוּ
  chosen: Go out
  alternatives:
  - Go
  - Set out
  lexicon: HALOT
  rationale: Imperative of יצא. 'Go out' reflects the directional nuance without sounding unnatural.
- source_word: לְעָרֵי יְהוּדָה
  chosen: to the cities of Judah
  alternatives:
  - throughout the cities of Judah
  lexicon: HALOT
  rationale: Literal destination phrase. 'Cities' is preferable to 'towns' here for consistency with common biblical English.
- source_word: וְקִבְצוּ
  chosen: and collect
  alternatives:
  - and gather
  lexicon: HALOT
  rationale: Same root קבץ as earlier, but with money as object. 'Collect' is more idiomatic in English for gathering funds.
- source_word: מִכָּל יִשְׂרָאֵל
  chosen: from all Israel
  alternatives:
  - from all the Israelites
  - from all Israelite territory
  lexicon: HALOT
  rationale: The phrase likely refers to the covenant people broadly, not merely the southern kingdom. 'From all Israel' preserves the Hebrew wording and its historical-theological breadth.
- source_word: כֶּסֶף
  chosen: silver
  alternatives:
  - money
  lexicon: HALOT
  rationale: Hebrew literally says 'silver,' often functioning as money. 'Silver' preserves the concrete wording while remaining understandable.
- source_word: לְחַזֵּק
  chosen: to repair
  alternatives:
  - to strengthen
  - to restore
  lexicon: HALOT
  rationale: Though the verb חזק literally means 'to strengthen,' in building context it refers to making structurally sound or repairing. 'Repair' best communicates the intended sense in modern English.
- source_word: בֵּית אֱלֹהֵיכֶם
  chosen: the house of your God
  alternatives:
  - the temple of your God
  lexicon: HALOT
  rationale: '''House'' is the formal biblical expression and should be preserved here; ''temple'' is interpretive though contextually correct.'
- source_word: מִדֵּי שָׁנָה בְּשָׁנָה
  chosen: year by year
  alternatives:
  - from year to year
  - every year
  lexicon: HALOT
  rationale: This idiom denotes regular annual recurrence. 'Year by year' is concise and close to the Hebrew.
- source_word: וְאַתֶּם תְּמַהֲרוּ לַדָּבָר
  chosen: and you must act quickly in this matter
  alternatives:
  - and you shall hurry with the matter
  - and be quick about this matter
  lexicon: HALOT
  rationale: The hiphil/piel nuance of מהר here conveys urgency. 'Act quickly in this matter' is idiomatic and preserves the command's force.
- source_word: וְלֹא מִהֲרוּ הַלְוִיִּם
  chosen: But the Levites did not act quickly
  alternatives:
  - But the Levites did not hurry
  - But the Levites were not quick to do it
  lexicon: HALOT
  rationale: Repetition of מהר should be reflected in English for discourse coherence. 'Did not act quickly' echoes the prior command while reading naturally.
