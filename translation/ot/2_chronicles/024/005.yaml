theological_decisions:
- issue: Scope of 'all Israel'
  chosen_reading: Retain 'from all Israel' in the main text
  alternative_readings:
  - from all the people of Judah
  - from all the Israelites
  rationale: The Chronicler often uses 'Israel' in a broad covenantal sense even in Judah-focused contexts. Rendering it literally preserves the text's historical and theological framing without narrowing it to Judah alone.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
