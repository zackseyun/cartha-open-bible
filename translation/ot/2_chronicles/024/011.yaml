id: 2CH.24.11
reference: 2 Chronicles 24:11
source:
  edition: WLC
  text: וַ/יְהִ֡י בְּ/עֵת֩ יָבִ֨יא אֶת הָֽ/אָר֜וֹן אֶל פְּקֻדַּ֣ת הַ/מֶּלֶךְ֮ בְּ/יַ֣ד
    הַ/לְוִיִּם֒ וְ/כִ/רְאוֹתָ֞/ם כִּי רַ֣ב הַ/כֶּ֗סֶף וּ/בָ֨א סוֹפֵ֤ר הַ/מֶּ֨לֶךְ֙
    וּ/פְקִיד֙ כֹּהֵ֣ן הָ/רֹ֔אשׁ וִ/יעָ֨רוּ֙ אֶת הָ֣/אָר֔וֹן וְ/יִשָּׂאֻ֖/הוּ וִֽ/ישִׁיבֻ֣/הוּ
    אֶל מְקֹמ֑/וֹ כֹּ֤ה עָשׂוּ֙ לְ/י֣וֹם בְּ/י֔וֹם וַ/יַּֽאַסְפוּ כֶ֖סֶף לָ/רֹֽב־־־־־׀־׃
translation:
  text: And whenever the chest was brought, by the Levites, to the king’s oversight,
    and when they saw that the money was abundant, the king’s scribe and the chief
    priest’s officer would come and empty the chest, then carry it and return it to
    its place. Thus they did day by day, and they gathered money in abundance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ark' if taken more literally from the Hebrew term; here it refers
      to the collection chest, not the ark of the covenant.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'silver'; in this administrative context the term refers to collected
      money.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָרוֹן
  chosen: the chest
  alternatives:
  - the ark
  - the box
  lexicon: HALOT
  rationale: In this context the object is the collection container set up for offerings,
    not the ark of the covenant. 'Chest' is natural modern English and avoids misleading
    readers into thinking of the covenant ark.
- source_word: פְּקֻדַּת הַמֶּלֶךְ
  chosen: the king’s oversight
  alternatives:
  - the king’s inspection
  - the king’s office
  - the king’s supervision
  lexicon: HALOT
  rationale: פְּקֻדָּה here denotes oversight/supervision or official charge rather
    than a mere visit. 'Oversight' fits the administrative setting and the repeated
    handling of funds.
- source_word: בְּיַד הַלְוִיִּם
  chosen: by the Levites
  alternatives:
  - by the hand of the Levites
  - under the care of the Levites
  lexicon: HALOT
  rationale: The idiom בְּיַד commonly marks agency or instrumentality. 'By the Levites'
    gives the sense in clear English while preserving their role as the ones transporting
    it.
- source_word: וְכִרְאוֹתָם
  chosen: when they saw
  alternatives:
  - when they observed
  - when it was seen by them
  lexicon: HALOT
  rationale: A temporal clause with infinitive construct plus suffix. 'When they saw'
    is the most natural rendering; the antecedent is the officials/handlers in the
    process described.
- source_word: רַב הַכֶּסֶף
  chosen: the money was abundant
  alternatives:
  - there was much money
  - the silver was plentiful
  lexicon: HALOT
  rationale: כֶּסֶף can mean silver or money. In a collection context, 'money' communicates
    function better than the more literal 'silver,' while 'abundant' reflects רַב.
- source_word: סוֹפֵר הַמֶּלֶךְ
  chosen: the king’s scribe
  alternatives:
  - the royal secretary
  lexicon: HALOT
  rationale: סוֹפֵר is a scribe/secretary in administrative contexts. 'Scribe' preserves
    the historical office and is widely understood.
- source_word: פְקִיד כֹּהֵן הָרֹאשׁ
  chosen: the chief priest’s officer
  alternatives:
  - the officer of the chief priest
  - the chief priest’s deputy
  lexicon: HALOT
  rationale: Construct chain indicates an official subordinate to the chief priest.
    'Officer' is broad enough for the administrative role without over-specifying
    rank.
- source_word: וִיעָרוּ
  chosen: empty
  alternatives:
  - pour out
  - clear out
  lexicon: HALOT
  rationale: The verb here refers to removing the contents of the chest. 'Empty' is
    idiomatic and matches the collection context.
- source_word: וְיִשָּׂאֻהוּ
  chosen: carry it
  alternatives:
  - lift it
  - bear it
  lexicon: HALOT
  rationale: נשא can mean lift/carry. Since the chest is then returned to its place,
    'carry it' best fits the sequence.
- source_word: וִישִׁיבֻהוּ אֶל מְקֹמוֹ
  chosen: return it to its place
  alternatives:
  - bring it back to its place
  - set it back in its place
  lexicon: HALOT
  rationale: Hiphil of שוב here is causative/returnative. 'Return it to its place'
    is concise and natural.
- source_word: כֹּה עָשׂוּ לְיוֹם בְּיוֹם
  chosen: Thus they did day by day
  alternatives:
  - So they did from day to day
  - This is what they did daily
  lexicon: HALOT
  rationale: The idiom לְיוֹם בְּיוֹם expresses repeated daily action. 'Day by day'
    preserves the iterative sense.
- source_word: וַיַּאַסְפוּ כֶסֶף לָרֹב
  chosen: they gathered money in abundance
  alternatives:
  - they collected much money
  - they gathered silver in great quantity
  lexicon: HALOT
  rationale: אָסַף means gather/collect. לָרֹב intensifies quantity; 'in abundance'
    is idiomatic and reflects the result of the repeated collections.
