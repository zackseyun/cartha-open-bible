id: 2CH.24.26
reference: 2 Chronicles 24:26
source:
  edition: WLC
  text: וְ/אֵ֖לֶּה הַ/מִּתְקַשְּׁרִ֣ים עָלָ֑י/ו זָבָ֗ד בֶּן שִׁמְעָת֙ הָֽ/עַמּוֹנִ֔ית וִ/יה֣וֹזָבָ֔ד בֶּן שִׁמְרִ֖ית הַ/מּוֹאָבִֽית־־׃
translation:
  text: 'And these were the men who conspired against him: Zabad son of Shimeath the Ammonite woman[a], and Jehozabad son of Shimrith the Moabite woman.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “those who conspired against him.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: And these were
  alternatives:
  - Now these were
  - And these are
  lexicon: HALOT
  rationale: Introduces the identification of the conspirators. Past-tense English fits the narrative context better than a present-tense literalism.
- source_word: הַמִּתְקַשְּׁרִים
  chosen: the men who conspired
  alternatives:
  - those who conspired
  - the conspirators
  - those who bound themselves together
  lexicon: HALOT
  rationale: The hitpael participle of קשר denotes entering into a conspiracy or plotting together. 'The men who conspired' is natural English and preserves the participial sense by identifying them as the conspirators.
- source_word: עָלָיו
  chosen: against him
  alternatives:
  - concerning him
  - over him
  lexicon: HALOT
  rationale: With קשר in this context, על marks the target of the conspiracy; 'against him' is the idiomatic and contextually correct rendering.
- source_word: זָבָד
  chosen: Zabad
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard genealogical rendering in English narrative.
- source_word: שִׁמְעָת
  chosen: Shimeath
  alternatives:
  - Shimath
  rationale: Personal name transliterated; this form reflects a standard English representation of the Hebrew name.
- source_word: הָעַמּוֹנִית
  chosen: the Ammonite woman
  alternatives:
  - the Ammonitess
  - the Ammonite
  lexicon: HALOT
  rationale: The Hebrew form is feminine singular, referring to the mother. 'The Ammonite woman' is clear modern English and preserves the gender marking better than the archaic 'Ammonitess' or the potentially ambiguous 'Ammonite'.
- source_word: וִיהוֹזָבָד
  chosen: and Jehozabad
  rationale: Personal name transliterated; conjunction carried into English.
- source_word: שִׁמְרִית
  chosen: Shimrith
  alternatives:
  - Shomerith
  rationale: Personal name transliterated by standard convention.
- source_word: הַמּוֹאָבִית
  chosen: the Moabite woman
  alternatives:
  - the Moabitess
  - the Moabite
  lexicon: HALOT
  rationale: The feminine singular identifies the mother as a Moabite woman. This rendering is accurate, readable, and avoids archaic ethnicity terms.
