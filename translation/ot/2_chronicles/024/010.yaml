id: 2CH.24.10
reference: 2 Chronicles 24:10
source:
  edition: WLC
  text: וַ/יִּשְׂמְח֥וּ כָל הַ/שָּׂרִ֖ים וְ/כָל הָ/עָ֑ם וַ/יָּבִ֛יאוּ וַ/יַּשְׁלִ֥יכוּ
    לָ/אָר֖וֹן עַד לְ/כַלֵּֽה־־־׃
translation:
  text: Then all the officials and all the people rejoiced, and they brought their
    contributions and threw them into the chest until it was full.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until they finished.' The Hebrew expression can more generally mean
      'until completion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂמְחוּ
  chosen: rejoiced
  alternatives:
  - were glad
  lexicon: HALOT
  rationale: The verb from שׂמח denotes joy/gladness. 'Rejoiced' fits the narrative
    register and conveys active communal joy better than the flatter 'were glad.'
- source_word: כָל הַשָּׂרִים
  chosen: all the officials
  alternatives:
  - all the princes
  - all the leaders
  lexicon: HALOT
  rationale: שָׂרִים refers to ruling authorities or officials. 'Officials' is clearer
    in modern English than the traditional 'princes,' which can misleadingly suggest
    royal sons.
- source_word: וְכָל הָעָם
  chosen: and all the people
  lexicon: HALOT
  rationale: A straightforward rendering preserving the collective scope of the Hebrew.
- source_word: וַיָּבִיאוּ
  chosen: they brought their contributions
  alternatives:
  - they brought
  - they came and brought
  lexicon: HALOT
  rationale: The verb itself means 'they brought.' Because the direct object is implicit
    in Hebrew and the context is the collection for temple repairs, 'their contributions'
    makes the English idiomatic without adding a new idea beyond the immediate context.
- source_word: וַיַּשְׁלִיכוּ
  chosen: threw
  alternatives:
  - cast
  - put
  lexicon: HALOT
  rationale: The verb שלך commonly means 'throw' or 'cast.' 'Threw' preserves the
    concrete force of depositing money into the chest more vividly than the weaker
    'put.'
- source_word: לָאָרוֹן
  chosen: into the chest
  alternatives:
  - into the box
  - into the ark
  lexicon: HALOT
  rationale: אָרוֹן can mean chest, box, or ark depending on context. Here it refers
    to the collection container set out for offerings, not the ark of the covenant,
    so 'chest' is the clearest contextual rendering.
- source_word: עַד לְכַלֵּה
  chosen: until it was full
  alternatives:
  - until they finished
  - until it was completed
  lexicon: HALOT
  rationale: The infinitive of כלה can denote completion or coming to an end. In this
    collection context, the sense is that the depositing continued until the chest
    was filled/completed. 'Until it was full' communicates the likely practical sense
    in natural English, while preserving the endpoint implied by the Hebrew.
