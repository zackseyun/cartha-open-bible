id: 2CH.24.23
reference: 2 Chronicles 24:23
source:
  edition: WLC
  text: וַ/יְהִ֣י לִ/תְקוּפַ֣ת הַ/שָּׁנָ֗ה עָלָ֣ה עָלָי/ו֮ חֵ֣יל אֲרָם֒ וַ/יָּבֹ֗אוּ אֶל יְהוּדָה֙ וִ/יר֣וּשָׁלִַ֔ם וַ/יַּשְׁחִ֛יתוּ אֶת כָּל שָׂרֵ֥י הָ/עָ֖ם מֵ/עָ֑ם וְ/כָל שְׁלָלָ֥/ם שִׁלְּח֖וּ לְ/מֶ֥לֶךְ דַּרְמָֽשֶׂק׀־־־־׃
translation:
  text: At the turn of the year[a], the army of Aram came up against him. They came to Judah and Jerusalem, and destroyed all the leaders of the people from among the people[c][b], and sent all their spoil to the king of Damascus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "At the end of the year"; the Hebrew idiom refers to the year's turning or seasonal cycle.
    reason: lexical_alternative
  - marker: b
    text: '"Aram" is the Hebrew name often rendered "Syria."'
    reason: cultural_note
  - marker: c
    text: Or "all their plunder."
    reason: lexical_alternative
lexical_decisions:
- source_word: לִתְקוּפַת הַשָּׁנָה
  chosen: At the turn of the year
  alternatives:
  - At the end of the year
  - When the year had turned
  lexicon: HALOT
  rationale: תְּקוּפָה denotes a circuit, turning, or seasonal turning point. In this narrative context it refers to the year's turning, idiomatically the change of season/new year, not merely a vague time later.
- source_word: עָלָה עָלָיו
  chosen: came up against him
  alternatives:
  - went up against him
  - marched against him
  lexicon: HALOT
  rationale: עלה with עַל in military contexts commonly means to go up against or attack. 'Came up against him' preserves the Hebrew idiom while remaining natural English.
- source_word: חֵיל אֲרָם
  chosen: the army of Aram
  alternatives:
  - the force of Aram
  - the Syrian army
  lexicon: HALOT
  rationale: חֵיל here is a military force/army. 'Aram' is preferred over 'Syria' because the philosophy favors transliterating names rather than substituting later geopolitical labels.
- source_word: וַיָּבֹאוּ אֶל יְהוּדָה וִירוּשָׁלַם
  chosen: They came to Judah and Jerusalem
  alternatives:
  - They invaded Judah and Jerusalem
  - They entered Judah and Jerusalem
  lexicon: HALOT
  rationale: בוא is the ordinary verb 'come/enter.' 'Came to' is sufficiently natural and leaves the military force of the context to surrounding clauses rather than overtranslating the verb itself.
- source_word: וַיַּשְׁחִיתוּ
  chosen: destroyed
  alternatives:
  - wiped out
  - ruined
  lexicon: HALOT
  rationale: שׁחת in the Hiphil often means destroy, ruin, or corrupt. Here the object is persons, so 'destroyed' conveys lethal devastation without colloquial excess.
- source_word: כָּל שָׂרֵי הָעָם
  chosen: all the leaders of the people
  alternatives:
  - all the princes of the people
  - all the officials of the people
  lexicon: HALOT
  rationale: שָׂרִים are rulers, officials, or leaders. 'Leaders' is clear modern English; 'princes' could misleadingly suggest royal sons, while 'officials' may sound too bureaucratic.
- source_word: מֵעָם
  chosen: from among the people
  alternatives:
  - out of the people
  lexicon: HALOT
  rationale: 'The preposition מן with עָם indicates separation from the larger populace: the leaders were taken/destroyed from among the people. This preserves the Hebrew nuance that these were selected from the populace rather than a separate class.'
- source_word: וְכָל שְׁלָלָם
  chosen: all their spoil
  alternatives:
  - all their plunder
  lexicon: HALOT
  rationale: שָׁלָל is spoil/plunder taken in war. 'Spoil' is slightly more formal and fits the historical narrative register; the suffix refers to what the invaders took from Judah/Jerusalem.
- source_word: שִׁלְּחוּ לְמֶלֶךְ דַּרְמָשֶׂק
  chosen: sent ... to the king of Damascus
  alternatives:
  - sent ... to the king in Damascus
  lexicon: HALOT
  rationale: The phrase most naturally means the spoil was sent to the Aramean king whose seat was Damascus. 'King of Damascus' is the standard English rendering for the political ruler centered there.
