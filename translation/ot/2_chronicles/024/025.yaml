id: 2CH.24.25
reference: 2 Chronicles 24:25
source:
  edition: WLC
  text: וּ/בְ/לֶכְתָּ֣/ם מִמֶּ֗/נּוּ כִּֽי עָזְב֣וּ אֹת/וֹ֮ ב/מחליים רַבִּים֒ הִתְקַשְּׁר֨וּ
    עָלָ֜י/ו עֲבָדָ֗י/ו בִּ/דְמֵי֙ בְּנֵי֙ יְהוֹיָדָ֣ע הַ/כֹּהֵ֔ן וַ/יַּֽהַרְגֻ֥/הוּ
    עַל מִטָּת֖/וֹ וַ/יָּמֹ֑ת וַֽ/יִּקְבְּרֻ֨/הוּ֙ בְּ/עִ֣יר דָּוִ֔יד וְ/לֹ֥א קְבָרֻ֖/הוּ
    בְּ/קִבְר֥וֹת הַ/מְּלָכִֽים־־׃ס
translation:
  text: When they departed from him—for they left him with many diseases—his servants
    conspired against him because of the blood of the sons of Jehoiada the priest,
    and they killed him on his bed, and he died. They buried him in the city of David,
    but they did not bury him in the tombs of the kings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the blood of the sons of Jehoiada the priest.'' In context this
      may refer specifically to ''the son of Jehoiada,'' that is, Zechariah (24:20–22).'
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְלֶכְתָּם
  chosen: When they departed
  alternatives:
  - And when they went
  - As they were leaving
  lexicon: HALOT
  rationale: The preposition ב with infinitive construct plus suffix gives a temporal
    sense, 'when/as they went.' 'Departed' fits the context of the Arameans withdrawing
    after the prior verse.
- source_word: מִמֶּנּוּ
  chosen: from him
  alternatives:
  - away from him
  lexicon: HALOT
  rationale: The suffix refers to Joash; straightforward spatial separation.
- source_word: כִּי עָזְבוּ אֹתוֹ בְּמַחֳלָיִם רַבִּים
  chosen: for they left him with many diseases
  alternatives:
  - because they left him very sick
  - for they abandoned him in great afflictions
  lexicon: HALOT
  rationale: כִּי is causal here. מַחֳלָיִם denotes sicknesses/diseases rather than
    merely wounds. 'With many diseases' preserves the plural and the likely sense
    that he was left in severe illness after the attack.
- source_word: הִתְקַשְּׁרוּ
  chosen: conspired
  alternatives:
  - plotted together
  - made a conspiracy
  lexicon: HALOT
  rationale: The hitpael of קשר commonly denotes entering into a conspiracy. 'Conspired'
    is idiomatic and precise.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  lexicon: HALOT
  rationale: In a royal court context this can denote royal servants/officials. 'Servants'
    is the more direct lexical rendering and suits optimal equivalence here.
- source_word: בִּדְמֵי
  chosen: because of the blood of
  alternatives:
  - for the blood of
  - on account of the blood of
  - for shedding the blood of
  lexicon: HALOT
  rationale: The preposition ב here is causal/in reference to bloodguilt. 'Because
    of the blood of' communicates motive tied to bloodshed without adding words not
    present in the Hebrew.
- source_word: בְּנֵי יְהוֹיָדָע
  chosen: the sons of Jehoiada
  alternatives:
  - the son of Jehoiada
  lexicon: HALOT
  rationale: The Masoretic Text reads the plural 'sons of.' Although the immediate
    narrative in 24:20 speaks explicitly of Zechariah son of Jehoiada, the translation
    should follow the Hebrew text in the main line and preserve the singular as an
    alternative in a footnote.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Appositional identification of Jehoiada; straightforward.
- source_word: וַיַּהַרְגֻהוּ עַל מִטָּתוֹ
  chosen: they killed him on his bed
  alternatives:
  - they struck him down on his bed
  lexicon: HALOT
  rationale: הרג is the ordinary verb 'kill.' 'On his bed' is literal and contextually
    important, indicating assassination while bedridden.
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - so that he died
  lexicon: HALOT
  rationale: Simple narrative sequence; English keeps the explicit result.
- source_word: וַיִּקְבְּרֻהוּ בְּעִיר דָּוִיד
  chosen: They buried him in the city of David
  alternatives:
  - And they buried him in the city of David
  lexicon: HALOT
  rationale: Straightforward narrative statement. A new sentence improves readability
    while preserving sequence.
- source_word: וְלֹא קְבָרֻהוּ בְּקִבְרוֹת הַמְּלָכִים
  chosen: but they did not bury him in the tombs of the kings
  alternatives:
  - but not in the tombs of the kings
  lexicon: HALOT
  rationale: 'The contrast marks dishonor: burial in David''s city, yet exclusion
    from the royal tombs. ''Tombs'' is more natural than ''graves'' for a royal burial
    complex.'
