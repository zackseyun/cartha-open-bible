theological_decisions:
- issue: Masoretic plural 'sons of Jehoiada' versus contextual expectation of singular
    'son of Jehoiada'
  chosen_reading: Retain the MT-based main text 'sons of Jehoiada' and preserve the
    singular in a footnote.
  alternative_readings:
  - the blood of the son of Jehoiada the priest
  rationale: The Hebrew source provided reads plural, and the translation philosophy
    prioritizes original-language primacy and preserving textual tension rather than
    silently harmonizing to 24:20. Since the narrative context strongly suggests Zechariah
    son of Jehoiada, the singular is worth preserving in a footnote as an alternative
    reading or interpretive clarification.
  doctrine_reference: Translation philosophy §§1, 3, 5
