id: 2CH.24.24
reference: 2 Chronicles 24:24
source:
  edition: WLC
  text: כִּי֩ בְ/מִצְעַ֨ר אֲנָשִׁ֜ים בָּ֣אוּ חֵ֣יל אֲרָ֗ם וַֽ/יהוָה֙ נָתַ֨ן בְּ/יָדָ֥/ם
    חַ֨יִל֙ לָ/רֹ֣ב מְאֹ֔ד כִּ֣י עָֽזְב֔וּ אֶת יְהוָ֖ה אֱלֹהֵ֣י אֲבוֹתֵי/הֶ֑ם וְ/אֶת
    יוֹאָ֖שׁ עָשׂ֥וּ שְׁפָטִֽים׀־־׃
translation:
  text: For the army of Aram came with few men, but the LORD gave a very great army
    into their hand, because they had forsaken the LORD, the God of their fathers.
    Thus they executed judgments on Joash.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a small number of men.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'into their hand,' an idiom meaning 'into their power.'
    reason: lexical_alternative
  - marker: c
    text: Or 'they carried out judgment on Joash.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּמִצְעַר אֲנָשִׁים
  chosen: with few men
  alternatives:
  - with a small number of men
  - with a handful of men
  lexicon: HALOT
  rationale: The phrase denotes smallness in number. 'With few men' is concise and
    natural English while preserving the contrast with the much larger force later
    in the verse.
- source_word: חֵיל אֲרָם
  chosen: the army of Aram
  alternatives:
  - the force of Aram
  - the army of Syria
  lexicon: HALOT
  rationale: חֵיל commonly refers to military force or army in this context. 'Aram'
    is preferred over 'Syria' because the Hebrew proper name is Aram and the project
    favors original-language primacy with standard transliteration of names.
- source_word: נָתַן בְּיָדָם
  chosen: gave ... into their hand
  alternatives:
  - delivered ... into their hand
  - gave ... into their power
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for handing someone over to another's power.
    'Gave ... into their hand' preserves the idiom with readable English.
- source_word: חַיִל לָרֹב מְאֹד
  chosen: a very great army
  alternatives:
  - a very large force
  - an exceedingly great host
  lexicon: HALOT
  rationale: Here חַיִל again refers to military force. לָרֹב מְאֹד intensifies the
    size, so 'a very great army' captures both magnitude and military sense.
- source_word: עָזְבוּ
  chosen: had forsaken
  alternatives:
  - had abandoned
  - had left
  lexicon: HALOT
  rationale: The verb carries covenantal weight in contexts of apostasy. 'Forsaken'
    preserves that gravity better than the flatter 'left'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: אֱלֹהֵי אֲבוֹתֵיהֶם
  chosen: the God of their fathers
  alternatives:
  - the God of their ancestors
  lexicon: HALOT
  rationale: This preserves the covenantal and genealogical language of the Hebrew.
    'Fathers' is retained in keeping with the project's gender-accurate policy and
    the source wording.
- source_word: עָשׂוּ שְׁפָטִים
  chosen: they executed judgments on Joash
  alternatives:
  - they carried out judgment on Joash
  - they inflicted judgments on Joash
  lexicon: HALOT
  rationale: The plural שְׁפָטִים is more naturally represented as 'judgments' than
    singular 'judgment.' The phrase indicates punitive acts understood as judicial
    retribution, not merely a legal verdict.
