id: 2CH.24.13
reference: 2 Chronicles 24:13
source:
  edition: WLC
  text: וַֽ/יַּעֲשׂוּ֙ עֹשֵׂ֣י הַ/מְּלָאכָ֔ה וַ/תַּ֧עַל אֲרוּכָ֛ה לַ/מְּלָאכָ֖ה בְּ/יָדָ֑/ם
    וַֽ/יַּעֲמִ֜ידוּ אֶת בֵּ֧ית הָֽ/אֱלֹהִ֛ים עַל מַתְכֻּנְתּ֖/וֹ וַֽ/יְאַמְּצֻֽ/הוּ־־׃
translation:
  text: So the workmen labored, and the repair work progressed by their hand; they
    restored the house of God to its proper condition and strengthened it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the restoration of the work advanced by their hands.' The Hebrew phrase
      uses אֲרוּכָה, a term that can mean healing or restoration, here applied to
      building repair.
    reason: lexical_alternative
  - marker: b
    text: Or 'they set the house of God on its proper footing' or 'to its original
      form.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ עֹשֵׂי הַמְּלָאכָה
  chosen: the workmen labored
  alternatives:
  - the workers worked
  - the doers of the work acted
  lexicon: HALOT
  rationale: The verb עשה with the participial phrase עֹשֵׂי הַמְּלָאכָה is idiomatic
    and would be wooden if rendered literally ('the doers of the work did'). 'The
    workmen labored' preserves the sense of active engagement in the assigned task
    in readable English.
- source_word: וַתַּעַל אֲרוּכָה לַמְּלָאכָה
  chosen: the repair work progressed
  alternatives:
  - healing came up for the work
  - restoration advanced
  - the work was restored
  lexicon: HALOT
  rationale: אֲרוּכָה can denote healing, restoration, or repair. In the context of
    temple renovation, 'repair work' best captures the concrete sense. The verb עלה
    here conveys advancement or successful progress rather than literal upward motion.
- source_word: בְּיָדָם
  chosen: by their hand
  alternatives:
  - under their hand
  - through their hands
  lexicon: HALOT
  rationale: This Hebrew idiom indicates agency or instrumentality. 'By their hand'
    is slightly formal but natural enough in English and preserves the concrete imagery
    of the Hebrew.
- source_word: וַיַּעֲמִידוּ
  chosen: they restored
  alternatives:
  - they set up
  - they established
  - they caused to stand
  lexicon: HALOT
  rationale: The Hiphil of עמד literally means 'caused to stand,' but in a building-repair
    context it refers to restoring or reestablishing the structure. 'Restored' communicates
    the intended sense clearly.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: HALOT
  rationale: The Hebrew is literally 'house of God.' This is a standard designation
    for the temple; retaining 'house of God' preserves the source wording while remaining
    clear.
- source_word: עַל מַתְכֻּנְתּוֹ
  chosen: to its proper condition
  alternatives:
  - according to its measure
  - to its fixed arrangement
  - to its original form
  lexicon: HALOT
  rationale: מַתְכֹּנֶת refers to a proper arrangement, fixed form, or prescribed
    condition. In this context of repair, the phrase means restoring the temple to
    the condition or structural order it ought to have.
- source_word: וַיְאַמְּצֻהוּ
  chosen: and strengthened it
  alternatives:
  - and made it strong
  - and reinforced it
  lexicon: HALOT
  rationale: The Piel of אמץ means to strengthen or make firm. 'Strengthened it' is
    direct and fits the building context well.
