id: 2CH.24.17
reference: 2 Chronicles 24:17
source:
  edition: WLC
  text: וְ/אַֽחֲרֵ֥י מוֹת֙ יְה֣וֹיָדָ֔ע בָּ֚אוּ שָׂרֵ֣י יְהוּדָ֔ה וַ/יִּֽשְׁתַּחֲו֖וּ
    לַ/מֶּ֑לֶךְ אָ֛ז שָׁמַ֥ע הַ/מֶּ֖לֶךְ אֲלֵי/הֶֽם׃
translation:
  text: After the death of Jehoiada, the officials of Judah came and bowed down to
    the king. Then the king listened to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the princes of Judah' or 'the leaders of Judah.'
    reason: lexical_alternative
  - marker: b
    text: '''Listened to them'' may also carry the sense ''heeded them'' or ''complied
      with them.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַחֲרֵי
  chosen: After
  alternatives:
  - And after
  - Now after
  lexicon: HALOT
  rationale: Temporal preposition introducing the sequence of events. English omits
    the conjunction for natural style while preserving the temporal sense.
- source_word: מוֹת
  chosen: the death of
  alternatives:
  - the dying of
  lexicon: HALOT
  rationale: Construct noun with following proper name; standard English idiom is
    'the death of Jehoiada.'
- source_word: יְהוֹיָדָע
  chosen: Jehoiada
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: בָּאוּ
  chosen: came
  alternatives:
  - arrived
  - entered
  lexicon: HALOT
  rationale: Common verb of motion. 'Came' is the most natural and contextually sufficient
    rendering without implying a specific destination beyond approach to the king.
- source_word: שָׂרֵי יְהוּדָה
  chosen: the officials of Judah
  alternatives:
  - the princes of Judah
  - the leaders of Judah
  lexicon: HALOT
  rationale: שָׂרִים denotes rulers, officials, or princes. 'Officials' communicates
    governing status in clear modern English without the aristocratic overtones of
    'princes,' though that remains a viable alternative.
- source_word: וַיִּשְׁתַּחֲווּ
  chosen: bowed down
  alternatives:
  - prostrated themselves
  - paid homage
  lexicon: HALOT
  rationale: The verb denotes an act of bowing/prostration before a superior. 'Bowed
    down' preserves the physical gesture and avoids overinterpreting whether the act
    was merely respectful or politically manipulative.
- source_word: לַמֶּלֶךְ
  chosen: to the king
  alternatives:
  - before the king
  lexicon: HALOT
  rationale: The preposition with this verb can be rendered 'to' or idiomatically
    'before.' 'To the king' is straightforward and fits the English verbal phrase
    'bowed down to the king.'
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: HALOT
  rationale: Marks the next consequential step in the narrative. 'Then' is concise
    and natural.
- source_word: שָׁמַע ... אֲלֵיהֶם
  chosen: listened to them
  alternatives:
  - heard them
  - heeded them
  lexicon: HALOT
  rationale: The idiom שׁמע אל often means to listen to or heed someone. 'Listened
    to them' preserves the immediate sense without yet making explicit the stronger
    implication of compliance, though that implication is contextually present.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun referring to the king already introduced in the verse;
    retained explicitly in English for clarity and narrative emphasis.
