theological_decisions:
- issue: Nature of the officials' act toward the king
  chosen_reading: Rendered as 'bowed down' rather than a more interpretive expression
    such as 'paid homage' or 'worshiped.'
  alternative_readings:
  - paid homage
  - prostrated themselves
  - did obeisance
  rationale: The Hebrew verb can denote physical prostration ranging from respect
    to worship depending on context. Here the object is a human king, so 'worshiped'
    would overstate the act; 'bowed down' preserves the gesture without importing
    theological worship language.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve
    it)
