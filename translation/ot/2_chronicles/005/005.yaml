id: 2CH.5.5
reference: 2 Chronicles 5:5
source:
  edition: WLC
  text: וַ/יַּעֲל֤וּ אֶת הָ/אָרוֹן֙ וְ/אֶת אֹ֣הֶל מוֹעֵ֔ד וְ/אֶת כָּל כְּלֵ֥י הַ/קֹּ֖דֶשׁ
    אֲשֶׁ֣ר בָּ/אֹ֑הֶל הֶעֱל֣וּ אֹתָ֔/ם הַ/כֹּהֲנִ֖ים הַ/לְוִיִּֽם־־־־׃
translation:
  text: And they brought up the ark, the tent of meeting, and all the holy vessels
    that were in the tent; the Levitical priests brought them up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the priests, the Levites.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲלוּ / הֶעֱלוּ
  chosen: brought up
  alternatives:
  - carried up
  - took up
  lexicon: HALOT
  rationale: The verb עלה in the Hiphil commonly means to cause to go up, here in
    the context of transporting sacred objects to the temple. 'Brought up' is idiomatic
    English and preserves the directional sense without sounding wooden. Using the
    same gloss for both occurrences reflects the repetition in Hebrew.
- source_word: הָאָרוֹן
  chosen: the ark
  alternatives:
  - the ark of the covenant
  lexicon: HALOT
  rationale: The Hebrew here has simply 'the ark,' not the fuller phrase 'ark of the
    covenant.' The shorter rendering best matches the source text while remaining
    clear in context.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the tabernacle
  - the meeting tent
  lexicon: HALOT
  rationale: This is the standard sense of the phrase. 'Tent of meeting' preserves
    the Hebrew wording more directly than 'tabernacle,' while remaining familiar and
    readable.
- source_word: כָּל כְּלֵי הַקֹּדֶשׁ
  chosen: all the holy vessels
  alternatives:
  - all the holy furnishings
  - all the sacred articles
  lexicon: HALOT
  rationale: כְּלִים is a broad term for implements or articles. 'Vessels' fits temple/tabernacle
    context well and is concise; 'holy' reflects הַקֹּדֶשׁ straightforwardly.
- source_word: אֲשֶׁר בָּאֹהֶל
  chosen: that were in the tent
  alternatives:
  - that were in the tabernacle
  lexicon: HALOT
  rationale: The relative clause modifies the holy vessels and identifies their location.
    Rendering אֹהֶל again as 'tent' maintains consistency with the immediately preceding
    'tent of meeting.'
- source_word: הַכֹּהֲנִים הַלְוִיִּם
  chosen: the Levitical priests
  alternatives:
  - the priests, the Levites
  - the priests who were Levites
  lexicon: HALOT
  rationale: The Hebrew apposition literally reads 'the priests, the Levites.' In
    Chronicles this expression commonly refers to priests identified as Levitical.
    'Levitical priests' is natural English and preserves the sense without implying
    all Levites were priests.
