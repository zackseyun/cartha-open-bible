theological_decisions:
- issue: Rendering of הַכֹּהֲנִים הַלְוִיִּם
  chosen_reading: the Levitical priests
  alternative_readings:
  - the priests, the Levites
  - the priests who were Levites
  rationale: This avoids a potentially misleading reading that would collapse the
    distinction between priests and Levites, while still reflecting the Chronicler's
    wording. The phrase is rendered in a way that is both grammatically plausible
    and contextually coherent for those authorized to handle the sacred objects.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
