id: 2CH.5.8
reference: 2 Chronicles 5:8
source:
  edition: WLC
  text: וַ/יִּהְי֤וּ הַ/כְּרוּבִים֙ פֹּרְשִׂ֣ים כְּנָפַ֔יִם עַל מְק֖וֹם הָ/אָר֑וֹן וַ/יְכַסּ֧וּ הַ/כְּרוּבִ֛ים עַל הָ/אָר֥וֹן וְ/עַל בַּדָּ֖י/ו מִ/לְ/מָֽעְלָ/ה־־־׃
translation:
  text: And the cherubim were spreading out their wings over the place of the ark[a], and the cherubim covered the ark and its poles from above.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stretching out their wings over the ark's place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - came to be
  - became
  lexicon: HALOT
  rationale: 'With the participle פֹּרְשִׂים, היה functions as a periphrastic verbal construction describing ongoing posture/state: ''were spreading out,'' not simple existential ''there were.'''
- source_word: הַכְּרוּבִים
  chosen: the cherubim
  alternatives:
  - the cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' preserves the established transliterated name for these throne-guardian beings; ''cherubs'' is too colloquial for this temple context.'
- source_word: פֹּרְשִׂים כְּנָפַיִם
  chosen: spreading out their wings
  alternatives:
  - stretching out wings
  - spreading wings
  lexicon: HALOT
  rationale: The participle of פרשׂ conveys extension/spreading. Supplying 'their' is natural English because the subject is the cherubim.
- source_word: עַל מְקוֹם הָאָרוֹן
  chosen: over the place of the ark
  alternatives:
  - over the location of the ark
  - over the ark's place
  lexicon: HALOT
  rationale: מָקוֹם is literally 'place.' Retaining 'place of the ark' reflects the Hebrew wording more closely than simplifying to 'over the ark,' especially since the next clause explicitly mentions the ark itself.
- source_word: וַיְכַסּוּ
  chosen: covered
  alternatives:
  - overshadowed
  - screened
  lexicon: HALOT
  rationale: כסה commonly means 'cover.' 'Overshadowed' is interpretive and less direct here.
- source_word: עַל הָאָרוֹן וְעַל בַּדָּיו
  chosen: the ark and its poles
  alternatives:
  - the ark and its carrying poles
  - the ark and its staves
  lexicon: HALOT
  rationale: בַּדִּים are the poles/staves used to carry the ark. 'Poles' is clear modern English; 'staves' is archaic.
- source_word: מִלְמָעְלָה
  chosen: from above
  alternatives:
  - above
  - overhead
  lexicon: HALOT
  rationale: The adverb specifies the direction/location of the covering. 'From above' is the most straightforward rendering of the prefixed form.
