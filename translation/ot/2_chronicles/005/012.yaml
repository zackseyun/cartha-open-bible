id: 2CH.5.12
reference: 2 Chronicles 5:12
source:
  edition: WLC
  text: וְ/הַ/לְוִיִּ֣ם הַ/מְשֹׁרֲרִ֣ים לְ/כֻלָּ֡/ם לְ/אָסָ֡ף לְ/הֵימָ֣ן לִֽ֠/ידֻתוּן
    וְ/לִ/בְנֵי/הֶ֨ם וְ/לַ/אֲחֵי/הֶ֜ם מְלֻבָּשִׁ֣ים בּ֗וּץ בִּ/מְצִלְתַּ֨יִם֙ וּ/בִ/נְבָלִ֣ים
    וְ/כִנֹּר֔וֹת עֹמְדִ֖ים מִזְרָ֣ח לַ/מִּזְבֵּ֑חַ וְ/עִמָּ/הֶ֤ם כֹּֽהֲנִים֙ לְ/מֵאָ֣ה
    וְ/עֶשְׂרִ֔ים מחצררים בַּ/חֲצֹֽצְרֽוֹת׃
translation:
  text: And the Levites who were the singers—all of them, Asaph, Heman, Jeduthun,
    and their sons and their brothers—were clothed in fine linen, with cymbals, harps,
    and lyres, standing east of the altar; and with them were one hundred twenty priests
    blowing trumpets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'harp-like instruments' for נְבָלִים; the precise distinction between
      the ancient stringed instruments named here is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'standing on the east side of the altar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal/cultic group; definite article preserved.
- source_word: הַמְשֹׁרֲרִים
  chosen: who were the singers
  alternatives:
  - the singers
  - the singing ones
  lexicon: HALOT
  rationale: Participial form functions attributively to identify the Levites by role.
    'Who were the singers' reads naturally in English while preserving the descriptive
    force.
- source_word: לְכֻלָּם
  chosen: all of them
  alternatives:
  - all together
  - all
  lexicon: HALOT
  rationale: Emphasizes that the named guild leaders and their associated groups are
    all included.
- source_word: לְאָסָף לְהֵימָן לִידוּתוּן
  chosen: Asaph, Heman, Jeduthun
  rationale: Personal names are transliterated per translation philosophy.
- source_word: וְלִבְנֵיהֶם וְלַאֲחֵיהֶם
  chosen: and their sons and their brothers
  alternatives:
  - and their sons and kinsmen
  - and their sons and relatives
  lexicon: HALOT
  rationale: Retains the familial terms as given. 'Brothers' is gender-accurate to
    the Hebrew and likely refers to male clan/guild associates in this cultic setting.
- source_word: מְלֻבָּשִׁים בּוּץ
  chosen: were clothed in fine linen
  alternatives:
  - were arrayed in linen
  - were dressed in fine linen
  lexicon: HALOT
  rationale: Passive participle plus material noun indicates attire. 'Fine linen'
    best captures בּוּץ as high-quality linen used in sacred/royal contexts.
- source_word: בִּמְצִלְתַּיִם
  chosen: with cymbals
  lexicon: HALOT
  rationale: Instrumental beth rendered naturally with 'with.' Standard identification
    of the instrument.
- source_word: וּבִנְבָלִים
  chosen: harps
  alternatives:
  - harp-like instruments
  - lutes
  lexicon: HALOT
  rationale: Traditional and broadly accepted rendering for נבל in musical lists;
    exact ancient instrument taxonomy is uncertain, but 'harps' is the clearest conventional
    equivalent.
- source_word: וְכִנֹּרוֹת
  chosen: lyres
  alternatives:
  - harps
  lexicon: HALOT
  rationale: Differentiates כִּנּוֹר from נבל by rendering it 'lyres,' a common modern
    distinction in scholarly and translation usage.
- source_word: עֹמְדִים מִזְרָח לַמִּזְבֵּחַ
  chosen: standing east of the altar
  alternatives:
  - standing on the east side of the altar
  - standing to the east of the altar
  lexicon: HALOT
  rationale: מִזְרָח functions adverbially/locatively. 'East of the altar' is concise
    and natural.
- source_word: וְעִמָּהֶם כֹּהֲנִים
  chosen: and with them were ... priests
  alternatives:
  - and with them, priests
  lexicon: HALOT
  rationale: English requires an explicit copular sense for smoothness; the Hebrew
    coordination indicates accompanying priests.
- source_word: לְמֵאָה וְעֶשְׂרִים
  chosen: one hundred twenty
  alternatives:
  - a hundred and twenty
  lexicon: HALOT
  rationale: Modern English number style.
- source_word: מְחַצְרְרִים בַּחֲצֹצְרוֹת
  chosen: blowing trumpets
  alternatives:
  - sounding trumpets
  - trumpeting with trumpets
  lexicon: HALOT
  rationale: The denominative participle from the trumpet noun means to blow/sound
    trumpets. 'Blowing trumpets' is idiomatic and preserves the action-instrument
    relation.
