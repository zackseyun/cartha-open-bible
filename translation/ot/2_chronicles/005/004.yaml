id: 2CH.5.4
reference: 2 Chronicles 5:4
source:
  edition: WLC
  text: וַ/יָּבֹ֕אוּ כֹּ֖ל זִקְנֵ֣י יִשְׂרָאֵ֑ל וַ/יִּשְׂא֥וּ הַ/לְוִיִּ֖ם אֶת הָ/אָרֽוֹן־׃
translation:
  text: And all the elders of Israel came[a], and the Levites carried the ark.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the ark of the covenant, as the surrounding context makes clear.
    reason: cross_reference
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - arrived
  - entered
  lexicon: HALOT
  rationale: Wayyiqtol of בוא narrates the next event in sequence. 'Came' is the most natural and sufficiently formal rendering in English narrative.
- source_word: כֹּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: Quantifies the following construct phrase 'elders of Israel.' 'All' is the straightforward rendering and preserves the comprehensiveness of the gathering.
- source_word: זִקְנֵי יִשְׂרָאֵל
  chosen: the elders of Israel
  alternatives:
  - Israel's elders
  lexicon: HALOT
  rationale: Construct chain denoting the recognized leaders of Israel. 'The elders of Israel' is idiomatic and preserves the formal representative sense.
- source_word: וַיִּשְׂאוּ
  chosen: carried
  alternatives:
  - lifted
  - bore
  lexicon: HALOT
  rationale: From נשׂא, here in the context of transporting the ark. 'Carried' best communicates the action in clear modern English; 'bore' is more formal but less natural.
- source_word: הַלְוִיִּם
  chosen: the Levites
  alternatives:
  - the Levitical men
  lexicon: HALOT
  rationale: Standard rendering of the tribal/cultic group name לְוִיִּם. 'The Levites' is the conventional and accurate English form.
- source_word: אֶת הָאָרוֹן
  chosen: the ark
  alternatives:
  - the chest
  lexicon: HALOT
  rationale: אָרוֹן in this temple context refers specifically to the ark of the covenant. The Hebrew here says simply 'the ark'; English should not expand beyond the source text in the main line, though the referent is clear from context.
