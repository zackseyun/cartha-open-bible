id: 2CH.5.3
reference: 2 Chronicles 5:3
source:
  edition: WLC
  text: וַ/יִּקָּהֲל֧וּ אֶל הַ/מֶּ֛לֶךְ כָּל אִ֥ישׁ יִשְׂרָאֵ֖ל בֶּ/חָ֑ג ה֖וּא הַ/חֹ֥דֶשׁ
    הַ/שְּׁבִעִֽי־־׃
translation:
  text: And all the men of Israel assembled before the king at the feast, that is,
    in the seventh month.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all Israel assembled to the king at the feast, in the seventh month.'
      The Hebrew is literally 'every man of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּהֲלוּ
  chosen: assembled
  alternatives:
  - gathered together
  - were assembled
  lexicon: HALOT
  rationale: The Niphal/waw-consecutive form of קהל here denotes coming together as
    an assembly. 'Assembled' is natural English and preserves the formal sense without
    unnecessary passivity.
- source_word: אֶל
  chosen: before
  alternatives:
  - to
  - unto
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to,' with gathering in the presence of a
    royal figure English idiom is better expressed as 'before the king.' This reflects
    the relational sense in context rather than mere motion.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun; the referent is Solomon
    from context, but the Hebrew uses the title rather than the name.
- source_word: כָּל אִישׁ יִשְׂרָאֵל
  chosen: all the men of Israel
  alternatives:
  - every man of Israel
  - all Israel
  lexicon: HALOT
  rationale: The phrase is literally 'every man of Israel.' Following the gender-accurate
    principle, 'men' is retained rather than flattening to 'people,' while 'all the
    men of Israel' gives idiomatic English. 'All Israel' is possible but omits the
    explicit איש element.
- source_word: בֶּחָג
  chosen: at the feast
  alternatives:
  - at the festival
  - during the feast
  lexicon: HALOT
  rationale: חג refers to a pilgrimage feast/festival. 'Feast' is concise and traditional
    while still understandable; the definite article is preserved.
- source_word: הוּא
  chosen: that is
  alternatives:
  - it was
  - namely
  lexicon: HALOT
  rationale: Here הוּא functions appositionally/explanatorily, identifying the feast
    more specifically. 'That is' captures the explanatory force in smooth English.
- source_word: הַחֹדֶשׁ הַשְּׁבִיעִי
  chosen: the seventh month
  lexicon: HALOT
  rationale: Direct rendering of the temporal phrase. In context it identifies when
    the feast occurred, likely the feast in the seventh month, without specifying
    the feast's name in the Hebrew of this verse.
