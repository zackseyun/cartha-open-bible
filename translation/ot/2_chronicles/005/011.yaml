id: 2CH.5.11
reference: 2 Chronicles 5:11
source:
  edition: WLC
  text: וַ/יְהִ֕י בְּ/צֵ֥את הַ/כֹּהֲנִ֖ים מִן הַ/קֹּ֑דֶשׁ כִּ֠י כָּל הַ/כֹּהֲנִ֤ים
    הַֽ/נִּמְצְאִים֙ הִתְקַדָּ֔שׁוּ אֵ֖ין לִ/שְׁמ֥וֹר לְ/מַחְלְקֽוֹת־־׃
translation:
  text: And when the priests came out of the Holy Place—for all the priests who were
    present had consecrated themselves, without regard to divisions—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without keeping to their divisions,' that is, without observing the
      normal priestly courses.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And when
  alternatives:
  - And it happened
  - Now when
  lexicon: HALOT
  rationale: The waw-consecutive with היה introduces the next event in narrative sequence.
    'And when' gives natural English while preserving the temporal setup better than
    the more wooden 'and it happened.'
- source_word: בְּצֵאת
  chosen: came out
  alternatives:
  - went out
  - on the coming out of
  lexicon: HALOT
  rationale: Infinitive construct of יצא with prefixed ב marks a temporal clause,
    'when ... came out.' 'Came out' fits the narrative viewpoint from the sanctuary.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כהנים.
- source_word: מִן־הַקֹּדֶשׁ
  chosen: of the Holy Place
  alternatives:
  - from the sanctuary
  - from the holy place
  lexicon: HALOT
  rationale: In temple context, הַקֹּדֶשׁ refers to the holy area/holy place rather
    than holiness abstractly. Capitalized 'Holy Place' signals the cultic space in
    readable English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי explains the circumstance just mentioned. 'For' preserves the
    explanatory force and fits the parenthetical clause.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Retains the comprehensive scope of the statement.
- source_word: הַנִּמְצְאִים
  chosen: who were present
  alternatives:
  - who were found there
  - who were available
  lexicon: HALOT
  rationale: The participle of מצא in this context means those present/on hand. 'Who
    were present' is idiomatic and contextually precise.
- source_word: הִתְקַדָּשׁוּ
  chosen: had consecrated themselves
  alternatives:
  - had sanctified themselves
  - had made themselves holy
  lexicon: HALOT
  rationale: Hitpael of קדש denotes ritual self-consecration. 'Consecrated themselves'
    communicates cultic preparation in accessible English.
- source_word: אֵין לִשְׁמֹר לְמַחְלְקוֹת
  chosen: without regard to divisions
  alternatives:
  - without keeping to their divisions
  - there was no observing of divisions
  lexicon: HALOT
  rationale: Literally, 'there was no keeping/observing by divisions.' The sense is
    that the normal priestly courses were not being observed for this occasion. 'Without
    regard to divisions' is concise and clear, while preserving the institutional
    meaning of מַחְלְקוֹת as priestly divisions/courses.
