theological_decisions:
- issue: Cultic terminology for priestly preparation
  chosen_reading: had consecrated themselves
  alternative_readings:
  - had sanctified themselves
  rationale: The verse describes ritual preparation for temple service, not a later
    doctrinal concept of moral sanctification. 'Consecrated themselves' best preserves
    the temple-cultic sense without importing extra theology.
  doctrine_reference: 'Translation philosophy: preserve source-text sense; readable
    modern English, not ecclesiastical jargon.'
