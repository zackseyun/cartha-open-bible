id: 2CH.4.10
reference: 2 Chronicles 4:10
source:
  edition: WLC
  text: וְ/אֶת הַ/יָּ֗ם נָתַ֞ן מִ/כֶּ֧תֶף הַ/יְמָנִ֛ית קֵ֖דְמָ/ה מִ/מּ֥וּל נֶֽגְבָּ/ה־׃
translation:
  text: And he set the Sea at the southeast side[a], facing south.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'at the right side eastward, opposite the south.' Since Hebrew spatial orientation commonly assumes facing east, 'the right side' corresponds to the south; together the phrase indicates the southeast side.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  chosen: And
  alternatives:
  - Now
  - And as for
  lexicon: HALOT
  rationale: The conjunction links this placement notice with the preceding description. The object marker אֵת is not represented directly in English.
- source_word: הַיָּם
  chosen: the Sea
  alternatives:
  - the basin
  - the molten sea
  lexicon: HALOT
  rationale: Refers to the large bronze basin known from the temple furnishings. 'Sea' preserves the established literal designation in the Hebrew, while capitalization marks it as the named temple vessel.
- source_word: נָתַן
  chosen: set
  alternatives:
  - placed
  - put
  lexicon: HALOT
  rationale: '''Set'' is natural English for positioning an object and fits the furnishing context without over-paraphrasing.'
- source_word: מִכֶּתֶף
  chosen: at the ... side
  alternatives:
  - from the shoulder of
  - at the flank of
  lexicon: HALOT
  rationale: כָּתֵף literally means 'shoulder,' but in spatial descriptions it denotes a side or flank. 'At the ... side' gives the idiomatic sense in English.
- source_word: הַיְמָנִית
  chosen: southeast
  alternatives:
  - right
  - right-hand
  - southern/right side
  lexicon: HALOT
  rationale: '''Right side'' in Hebrew orientation assumes facing east, so the right-hand side corresponds to the south. Because the next adverb is ''eastward,'' the combined sense is the southeast side. Rendering the composite spatial sense directly is clearer than a wooden ''right side eastward.'''
- source_word: קֵדְמָה
  chosen: southeast
  alternatives:
  - eastward
  - on the east
  lexicon: HALOT
  rationale: This adverb contributes the eastern component of the location. In combination with 'the right side,' it specifies the southeast placement.
- source_word: מִמּוּל
  chosen: facing
  alternatives:
  - opposite
  - in front of
  lexicon: HALOT
  rationale: The preposition indicates orientation relative to the south. 'Facing' reads smoothly in English while preserving the relational sense.
- source_word: נֶגְבָּה
  chosen: south
  alternatives:
  - the south side
  - southward
  lexicon: HALOT
  rationale: Denotes the south/southward direction. 'South' works idiomatically after 'facing.'
