id: NUM.16.13
reference: Numbers 16:13
source:
  edition: WLC
  text: הַ/מְעַ֗ט כִּ֤י הֶֽעֱלִיתָ֨/נוּ֙ מֵ/אֶ֨רֶץ זָבַ֤ת חָלָב֙ וּ/דְבַ֔שׁ לַ/הֲמִיתֵ֖/נוּ בַּ/מִּדְבָּ֑ר כִּֽי תִשְׂתָּרֵ֥ר עָלֵ֖י/נוּ גַּם הִשְׂתָּרֵֽר־־׃
translation:
  text: Is it a small thing that you have brought us up out of a land flowing with milk and honey to kill us in the wilderness[b][a], that you should also make yourself a ruler over us?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The speakers sarcastically describe Egypt as 'a land flowing with milk and honey,' language elsewhere used for the promised land.
    reason: cultural_note
  - marker: b
    text: Or 'lord it over us' for 'make yourself a ruler over us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְעַט
  chosen: Is it a small thing
  alternatives:
  - Is it too little
  - Is it not enough
  lexicon: HALOT
  rationale: Idiomatic interrogative expression of indignation. 'Is it a small thing' preserves the Hebrew rhetorical force while remaining natural English.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here introduces the content of the complaint after the rhetorical question rather than a causal clause; 'that' fits the syntax in English.
- source_word: הֶעֱלִיתָנוּ
  chosen: you have brought us up
  alternatives:
  - you brought us up
  - you led us up
  lexicon: HALOT
  rationale: The Hiphil of עלה means 'bring up' or 'cause to go up.' 'Brought us up' preserves the Exodus-oriented movement language and the irony of the speakers describing Egypt this way.
- source_word: מֵאֶרֶץ זָבַת חָלָב וּדְבַשׁ
  chosen: out of a land flowing with milk and honey
  alternatives:
  - from a land flowing with milk and honey
  lexicon: HALOT
  rationale: Standard idiom for abundance. Here it is intentionally ironic, since the rebels apply to Egypt language normally used of the promised land; the translation preserves that irony without softening it.
- source_word: לַהֲמִיתֵנוּ
  chosen: to kill us
  alternatives:
  - to put us to death
  lexicon: HALOT
  rationale: Direct infinitive of purpose. 'To kill us' is straightforward and forceful, matching the accusation.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is the conventional and contextually apt rendering for מִדְבָּר in the Pentateuch, evoking Israel''s setting without implying only sandy desert.'
- source_word: תִשְׂתָּרֵר ... הִשְׂתָּרֵר
  chosen: you would also make yourself a ruler over us
  alternatives:
  - you would also lord it over us
  - you would indeed keep acting as prince over us
  lexicon: HALOT
  rationale: The verb שׂרר conveys exercising rule or acting as a prince/ruler. The infinitive absolute with finite verb intensifies the accusation. 'Make yourself a ruler over us' captures both the claim of self-exaltation and the ruling sense in idiomatic English.
- source_word: גַּם
  chosen: also
  alternatives:
  - even
  lexicon: HALOT
  rationale: 'Marks an added grievance: not only have they accused Moses of leading them to death, but also of exalting himself over them.'
