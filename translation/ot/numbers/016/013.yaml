theological_decisions:
- issue: Ironic designation of Egypt as 'a land flowing with milk and honey'
  chosen_reading: Retain the phrase literally in the main text
  alternative_readings:
  - Paraphrase to signal sarcasm explicitly, e.g. 'what you call a land flowing with milk and honey'
  rationale: The Hebrew itself supplies the irony through context; adding an explicit sarcasm marker would import interpretation beyond the wording. Preserving the literal phrase best reflects the rebels' distorted accusation.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
