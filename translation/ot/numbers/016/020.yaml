id: NUM.16.20
reference: Numbers 16:20
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר יְהוָ֔ה אֶל מֹשֶׁ֥ה וְ/אֶֽל אַהֲרֹ֖ן לֵ/אמֹֽר־־׃
translation:
  text: And the LORD spoke to Moses and to Aaron, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively rendered ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: 'The waw-consecutive imperfect of דבר introduces narrative progression:
    ''and ... spoke.'' ''Spoke'' preserves the standard narrative formula and distinguishes
    דבר from אמר, while remaining natural English.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention rooted
    in the LXX pattern.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the addressee of speech. 'To' is the natural modern
    English equivalent.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name מֹשֶׁה.
- source_word: וְאֶל
  chosen: and to
  alternatives:
  - and
  lexicon: HALOT
  rationale: The conjunction plus repeated preposition is best represented explicitly
    as 'and to,' preserving the Hebrew coordination of two distinct addressees rather
    than collapsing it into a single phrase.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Standard English transliteration of the personal name אַהֲרֹן.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - to say
  lexicon: HALOT
  rationale: This infinitive construct functions as the conventional speech introducer
    after 'spoke.' 'Saying' preserves the Hebrew structure without unnecessary expansion.
