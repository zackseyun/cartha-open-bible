id: NUM.16.1
reference: Numbers 16:1
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח קֹ֔רַח בֶּן יִצְהָ֥ר בֶּן קְהָ֖ת בֶּן לֵוִ֑י וְ/דָתָ֨ן וַ/אֲבִירָ֜ם
    בְּנֵ֧י אֱלִיאָ֛ב וְ/א֥וֹן בֶּן פֶּ֖לֶת בְּנֵ֥י רְאוּבֵֽן־־־־׃
translation:
  text: Now Korah son of Izhar, son of Kohath, son of Levi, along with Dathan and
    Abiram, sons of Eliab, and On son of Peleth, sons of Reuben, took men,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and he took.'' The object is unstated in the Hebrew; ''men''
      is supplied from the context of the next verse for clarity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took men
  alternatives:
  - took
  - took action
  - banded together
  lexicon: HALOT
  rationale: The Hebrew literally reads 'and he took,' but the object is absent, making
    the clause elliptical in English. In context, the following verse names 250 men,
    so supplying 'men' makes the sense intelligible without excessive paraphrase.
    A more literal 'took' is possible but awkward and obscure in English; 'banded
    together' is interpretive and goes beyond the lexical value of לקח.
- source_word: קֹרַח
  chosen: Korah
  rationale: Personal name transliterated by standard English convention.
- source_word: בֶּן יִצְהָר בֶּן קְהָת בֶּן לֵוִי
  chosen: son of Izhar, son of Kohath, son of Levi
  alternatives:
  - descendant of Izhar, Kohath, and Levi
  lexicon: HALOT
  rationale: Retains the formal genealogical chain with repeated 'son of,' matching
    Hebrew style and preserving lineage emphasis.
- source_word: וְדָתָן וַאֲבִירָם
  chosen: along with Dathan and Abiram
  alternatives:
  - and Dathan and Abiram
  rationale: The conjunction links these figures with Korah in the action. 'Along
    with' clarifies in English that they are associated participants, while remaining
    close to the syntax.
- source_word: בְּנֵי אֱלִיאָב
  chosen: sons of Eliab
  alternatives:
  - descendants of Eliab
  lexicon: HALOT
  rationale: Standard genealogical rendering; 'sons' is the direct and contextually
    appropriate gloss.
- source_word: וְאוֹן בֶּן פֶּלֶת
  chosen: and On son of Peleth
  alternatives:
  - and On, the son of Peleth
  rationale: Transliterates names and preserves the genealogical apposition straightforwardly.
- source_word: בְּנֵי רְאוּבֵן
  chosen: sons of Reuben
  alternatives:
  - Reubenites
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Reuben.' 'Reubenites' is idiomatic but
    less formally transparent; the literal form better preserves the genealogical
    framing of the verse.
