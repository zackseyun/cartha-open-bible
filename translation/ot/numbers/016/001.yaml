theological_decisions:
- issue: Elliptical syntax of the opening clause
  chosen_reading: 'Supply the implied object in English: ''took men'''
  alternative_readings:
  - Leave the clause formally as 'took' without an object
  - Render more interpretively as 'rose up' or 'banded together'
  rationale: This is primarily a translational rather than doctrinal issue, but it
    affects how the rebellion narrative begins. Supplying 'men' best reflects the
    likely implied object from context (v. 2) while avoiding a paraphrastic resolution
    not present in the Hebrew verb itself.
  doctrine_reference: Translation philosophy §1, §5
