id: NUM.16.34
reference: Numbers 16:34
source:
  edition: WLC
  text: וְ/כָל יִשְׂרָאֵ֗ל אֲשֶׁ֛ר סְבִיבֹתֵי/הֶ֖ם נָ֣סוּ לְ/קֹלָ֑/ם כִּ֣י אָֽמְר֔וּ
    פֶּן תִּבְלָעֵ֖/נוּ הָ/אָֽרֶץ־־׃
translation:
  text: And all Israel who were around them fled at their cry, for they said, “Lest
    the earth swallow us up!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at their cry.' The Hebrew qōl can mean 'sound,' 'voice,' or 'cry.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל יִשְׂרָאֵל
  chosen: And all Israel
  alternatives:
  - And the whole of Israel
  - And all the Israelites
  lexicon: HALOT
  rationale: כָל with the proper name יִשְׂרָאֵל is naturally rendered collectively
    as 'all Israel.' This preserves the corporate sense without over-specifying ethnicity
    as 'Israelites.'
- source_word: אֲשֶׁר סְבִיבֹתֵי/הֶם
  chosen: who were around them
  alternatives:
  - who were surrounding them
  - who were on every side of them
  lexicon: HALOT
  rationale: The relative clause identifies the Israelites in the vicinity of Korah,
    Dathan, and Abiram. 'Around them' is idiomatic modern English and reflects the
    plural construct סְבִיבֹתֵי with pronominal suffix.
- source_word: נָסוּ
  chosen: fled
  alternatives:
  - ran away
  - took flight
  lexicon: HALOT
  rationale: The verb נוּס commonly means 'flee.' 'Fled' is concise and preserves
    the urgency of the reaction.
- source_word: לְ/קֹלָם
  chosen: at their sound
  alternatives:
  - at their cry
  - at the sound of them
  - because of their noise
  lexicon: HALOT
  rationale: קוֹל can denote sound, voice, cry, or noise. In context, the people are
    reacting to what they hear from the judgment event. 'At their sound' stays close
    to the Hebrew while allowing the antecedent to include the cries/noise associated
    with those being judged. Because English readers may hear 'their cry' more specifically,
    that alternative is preserved in a footnote.
- source_word: כִּי אָמְרוּ
  chosen: for they said
  alternatives:
  - because they said
  lexicon: HALOT
  rationale: כִּי here introduces the reason for their flight. 'For they said' is
    natural and slightly more formal, fitting the narrative style.
- source_word: פֶּן
  chosen: Lest
  alternatives:
  - Otherwise
  - Or else
  - In case
  lexicon: HALOT
  rationale: פֶּן introduces feared consequence. 'Lest' is the most compact equivalent
    and preserves the urgency of the direct speech, though slightly elevated in register.
- source_word: תִּבְלָעֵנוּ
  chosen: swallow us up
  alternatives:
  - swallow us
  - consume us
  lexicon: HALOT
  rationale: בלע in this context refers to the earth opening and swallowing people.
    'Swallow us up' is idiomatic English and matches the vivid imagery of the preceding
    judgment scene.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the ground
  - the land
  lexicon: HALOT
  rationale: אָרֶץ can mean earth, land, or ground. Here the immediate context is
    the earth opening its mouth (v. 32), so 'the earth' best preserves the narrative
    linkage and personified force.
