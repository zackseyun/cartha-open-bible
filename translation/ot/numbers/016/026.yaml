theological_decisions:
- issue: Corporate participation in judgment through association with the wicked
  chosen_reading: The warning is rendered as separation from the wicked and their
    possessions to avoid being swept away in the judgment connected with their sins.
  alternative_readings:
  - 'A more interpretive rendering could make the final clause purely causal: ''lest
    you be destroyed because of all their sins.'''
  rationale: The Hebrew wording links the people's danger to proximity/association
    and the coming judgment. The translation preserves that tension without importing
    a fuller doctrine of imputed guilt or reducing it to mere causation.
  doctrine_reference: Preserve theological tension rather than resolve it.
