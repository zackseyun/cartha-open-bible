id: NUM.16.26
reference: Numbers 16:26
source:
  edition: WLC
  text: וַ/יְדַבֵּ֨ר אֶל הָ/עֵדָ֜ה לֵ/אמֹ֗ר ס֣וּרוּ נָ֡א מֵ/עַל֩ אָהֳלֵ֨י הָ/אֲנָשִׁ֤ים
    הָֽ/רְשָׁעִים֙ הָ/אֵ֔לֶּה וְ/אַֽל תִּגְּע֖וּ בְּ/כָל אֲשֶׁ֣ר לָ/הֶ֑ם פֶּן תִּסָּפ֖וּ
    בְּ/כָל חַטֹּאתָֽ/ם־־־־־׃
translation:
  text: And he spoke to the congregation, saying, “Please move away from the tents
    of these wicked men, and do not touch anything that belongs to them, lest you
    be swept away in all their sins.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lest you be destroyed because of all their sins.' The Hebrew can be
      understood with a more explicitly causal nuance.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֵדָה
  chosen: the congregation
  alternatives:
  - the assembly
  - the community
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the gathered Israelite community. 'Congregation'
    is a natural English rendering in Pentateuchal narrative and preserves the corporate
    sense better than the broader 'community.'
- source_word: סוּרוּ נָא
  chosen: Please move away
  alternatives:
  - Turn aside, please
  - Depart, please
  - Move away now
  lexicon: HALOT
  rationale: סוּר in the imperative calls for turning aside or moving away; נָא adds
    urgency/politeness rather than simple temporal 'now.' 'Please move away' captures
    both the imperative force and the urgent appeal in readable English.
- source_word: מֵעַל אָהֳלֵי
  chosen: from the tents of
  alternatives:
  - from beside the tents of
  - from upon the tents of
  lexicon: HALOT
  rationale: מֵעַל literally means 'from upon/from over,' but idiomatically here it
    means to get away from the vicinity of the tents. 'From the tents of' is clear
    English and fits the warning context.
- source_word: הָאֲנָשִׁים הָרְשָׁעִים הָאֵלֶּה
  chosen: these wicked men
  alternatives:
  - these evil men
  - these guilty men
  lexicon: HALOT
  rationale: The phrase is definite and demonstrative, identifying a specific group.
    רְשָׁעִים is well rendered 'wicked' in moral/judicial contexts. 'Men' is retained
    as gender-accurate to the Hebrew.
- source_word: וְאַל תִּגְּעוּ
  chosen: and do not touch
  alternatives:
  - and do not come into contact with
  - and do not lay a hand on
  lexicon: HALOT
  rationale: נגע commonly means 'touch' or 'come into contact with.' The simple 'do
    not touch' best preserves the direct prohibition without overinterpreting the
    nature of the contact.
- source_word: בְּכָל אֲשֶׁר לָהֶם
  chosen: anything that belongs to them
  alternatives:
  - anything of theirs
  - all that is theirs
  lexicon: HALOT
  rationale: The expression refers comprehensively to their possessions. 'Anything
    that belongs to them' communicates the distributive force naturally in English
    after a negative command.
- source_word: פֶּן תִּסָּפוּ
  chosen: lest you be swept away
  alternatives:
  - lest you be destroyed
  - lest you be consumed
  - lest you perish
  lexicon: HALOT
  rationale: The Niphal of ספה can mean to be swept away, destroyed, or consumed,
    often in judgment contexts. 'Be swept away' preserves the passive sense and the
    idea of being caught up in the coming judgment.
- source_word: בְּכָל חַטֹּאתָם
  chosen: in all their sins
  alternatives:
  - because of all their sins
  - for all their sins
  - with all their sins
  lexicon: HALOT
  rationale: 'The preposition ב here can express association or circumstance: being
    swept away in connection with their sins. ''In all their sins'' is a close rendering
    that preserves the Hebrew texture without flattening it into a purely causal paraphrase.'
