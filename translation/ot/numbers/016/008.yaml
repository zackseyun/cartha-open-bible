id: NUM.16.8
reference: Numbers 16:8
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר מֹשֶׁ֖ה אֶל קֹ֑רַח שִׁמְעוּ נָ֖א בְּנֵ֥י לֵוִֽי־־׃
translation:
  text: Then Moses said to Korah[a], “Hear now, you sons of Levi.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Listen, please, you sons of Levi,” or “Listen now, you Levites.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural English narrative flow while preserving sequence; 'and ... said' is more formally literal but less idiomatic here.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard preposition of direction/addressee; 'to' is the natural modern English equivalent.
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Hear' preserves the formal summons and rhetorical force common in biblical speech; 'listen' is possible but slightly more colloquial.
- source_word: נָא
  chosen: now
  alternatives:
  - please
  lexicon: HALOT
  rationale: נָא softens or urges the imperative. In this confrontational setting, 'now' better conveys an urgent appeal or summons than the more polite-sounding 'please'.
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: Construct plural of 'sons.' Per gender-accurate philosophy, 'sons of Levi' matches the masculine plural and the immediate address to male Levites in context better than the broader 'children of'.
- source_word: לֵוִי
  chosen: Levi
  lexicon: HALOT
  rationale: Personal/tribal name is transliterated per translation philosophy.
- source_word: קֹרַח
  chosen: Korah
  lexicon: HALOT
  rationale: Personal name is transliterated by standard English convention.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Personal name is transliterated by standard English convention.
