theological_decisions:
- issue: Rendering שְׁאֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the underworld
  - the realm of the dead
  rationale: The Hebrew term is theologically and conceptually broader than a mere
    burial place. Transliteration preserves the Old Testament concept without importing
    a later, more systematized doctrine of hell. Because English readers may think
    of 'grave,' that alternative is preserved in a footnote as a lexical option rather
    than adopted in the main text.
  doctrine_reference: Translation philosophy §1, §3
