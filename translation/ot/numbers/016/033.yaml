id: NUM.16.33
reference: Numbers 16:33
source:
  edition: WLC
  text: וַ/יֵּ֨רְד֜וּ הֵ֣ם וְ/כָל אֲשֶׁ֥ר לָ/הֶ֛ם חַיִּ֖ים שְׁאֹ֑לָ/ה וַ/תְּכַ֤ס עֲלֵי/הֶם֙ הָ/אָ֔רֶץ וַ/יֹּאבְד֖וּ מִ/תּ֥וֹךְ הַ/קָּהָֽל־׃
translation:
  text: So they went down alive into Sheol—they and all that belonged to them—and the earth covered them[a], and they perished from the midst of the assembly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the grave' or 'the realm of the dead.' Hebrew 'Sheol.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרְדוּ
  chosen: went down
  alternatives:
  - descended
  lexicon: HALOT
  rationale: The verb ירד commonly means 'go down, descend.' 'Went down' is natural modern English and preserves the narrative movement without sounding overly formal.
- source_word: הֵם וְכָל אֲשֶׁר לָהֶם
  chosen: they and all that belonged to them
  alternatives:
  - they and all that was theirs
  - they and all who belonged to them
  lexicon: HALOT
  rationale: The phrase includes both the persons and all possessions/dependents associated with them. 'All that belonged to them' is broad enough to cover the Hebrew without narrowing it unnecessarily to either people or property alone.
- source_word: חַיִּים
  chosen: alive
  alternatives:
  - living
  lexicon: HALOT
  rationale: Predicate use here emphasizes that they went down while still alive. 'Alive' is the most idiomatic English rendering in this construction.
- source_word: שְׁאֹלָה
  chosen: into Sheol
  alternatives:
  - to Sheol
  - into the grave
  - into the underworld
  lexicon: HALOT
  rationale: Sheol is best transliterated here rather than reduced to 'grave,' since the Hebrew term carries the broader sense of the realm of the dead. The directional ending is reflected by 'into Sheol.'
- source_word: וַתְּכַס עֲלֵיהֶם הָאָרֶץ
  chosen: the earth covered over them
  alternatives:
  - the earth covered them
  - the ground covered them
  lexicon: HALOT
  rationale: The Hebrew places 'the earth' as subject and uses כסה 'cover.' 'Covered over them' preserves the force of the preposition עַל and the vividness of the scene.
- source_word: וַיֹּאבְדוּ
  chosen: they perished
  alternatives:
  - they were destroyed
  - they vanished
  lexicon: HALOT
  rationale: אבד in this context denotes perishing or being lost. 'They perished' fits the judgment context without over-specifying the mode beyond what the verb itself states.
- source_word: מִתּוֹךְ הַקָּהָל
  chosen: from the midst of the assembly
  alternatives:
  - from among the assembly
  - from the congregation
  lexicon: HALOT
  rationale: קהל is often 'assembly' or 'congregation.' 'Assembly' is clear modern English and preserves the communal setting; 'from the midst of' reflects the Hebrew idiom more closely than a flatter 'from among.'
