id: NUM.16.14
reference: Numbers 16:14
source:
  edition: WLC
  text: אַ֡ף לֹ֣א אֶל אֶרֶץ֩ זָבַ֨ת חָלָ֤ב וּ/דְבַשׁ֙ הֲבִ֣יאֹתָ֔/נוּ וַ/תִּ֨תֶּן
    לָ֔/נוּ נַחֲלַ֖ת שָׂדֶ֣ה וָ/כָ֑רֶם הַ/עֵינֵ֞י הָ/אֲנָשִׁ֥ים הָ/הֵ֛ם תְּנַקֵּ֖ר
    לֹ֥א נַעֲלֶֽה־־׃
translation:
  text: Indeed, you have not brought us into a land flowing with milk and honey, nor
    have you given us an inheritance of field and vineyard. Will you gouge out the
    eyes of these men? We will not come up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Will you blind these men?' The Hebrew idiom is literally 'gouge out
      the eyes,' which may also imply treating them as if they were blind to the truth.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף לֹא
  chosen: Indeed, ... not
  alternatives:
  - Certainly not
  - Moreover, not
  - Even
  lexicon: HALOT
  rationale: אַף here intensifies the complaint rather than simply adding a clause.
    'Indeed' captures the emphatic force in natural English while preserving the negation
    with לֹא.
- source_word: אֶל אֶרֶץ זָבַת חָלָב וּדְבַשׁ
  chosen: into a land flowing with milk and honey
  alternatives:
  - to a land flowing with milk and honey
  lexicon: HALOT
  rationale: This is the standard Hebrew idiom for the promised land's abundance.
    'Into' fits the motion implied by הֲבִיאֹתָנוּ ('brought us').
- source_word: הֲבִיאֹתָנוּ
  chosen: you have not brought us
  alternatives:
  - have you brought us
  lexicon: HALOT
  rationale: The interrogative form functions rhetorically within a complaint. In
    English, a declarative rendering with 'you have not brought us' best conveys the
    accusation without awkwardness.
- source_word: וַתִּתֶּן לָנוּ נַחֲלַת שָׂדֶה וָכָרֶם
  chosen: nor have you given us an inheritance of field and vineyard
  alternatives:
  - and given us an inheritance of fields and vineyards
  - nor given us a possession of field and vineyard
  lexicon: HALOT
  rationale: נַחֲלָה denotes an inherited possession/allotment. The singular collective
    nouns 'field and vineyard' reflect the Hebrew singulars while remaining idiomatic
    in English.
- source_word: הַעֵינֵי הָאֲנָשִׁים הָהֵם תְּנַקֵּר
  chosen: Will you gouge out the eyes of these men?
  alternatives:
  - Would you put out the eyes of those men?
  - Will you blind those men?
  lexicon: HALOT
  rationale: נקר in the Piel means to pick out/gouge out, a vivid idiom for brutal
    blinding and, figuratively, shameless deception. The concrete image should be
    preserved in the main text; the figurative sense is worth noting in a footnote.
- source_word: הָאֲנָשִׁים הָהֵם
  chosen: these men
  alternatives:
  - those men
  lexicon: HALOT
  rationale: Though הָהֵם can be rendered 'those,' in direct speech English often
    uses 'these' for people immediately under discussion. This keeps the rhetoric
    natural while still referring to the group in view.
- source_word: לֹא נַעֲלֶה
  chosen: We will not come up
  alternatives:
  - We will not go up
  lexicon: HALOT
  rationale: עלה literally means 'go up/ascend.' In this context, Dathan and Abiram
    refuse Moses' summons, so 'come up' fits the deictic perspective of the summons
    better than the more generic 'go up.'
