id: NUM.16.21
reference: Numbers 16:21
source:
  edition: WLC
  text: הִבָּ֣דְל֔וּ מִ/תּ֖וֹךְ הָ/עֵדָ֣ה הַ/זֹּ֑את וַ/אַכַלֶּ֥ה אֹתָ֖/ם כְּ/רָֽגַע׃
translation:
  text: Separate yourselves from the midst of this congregation, so that I may consume
    them in an instant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from among this assembly.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in a moment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִבָּדְלוּ
  chosen: Separate yourselves
  alternatives:
  - Set yourselves apart
  - Withdraw yourselves
  lexicon: HALOT
  rationale: Niphal imperative plural of בדל, reflexive/passive nuance in context
    addressed to multiple hearers; 'Separate yourselves' is natural modern English
    and preserves the command to move away distinctly from the group.
- source_word: מִתּוֹךְ
  chosen: from the midst of
  alternatives:
  - from among
  - out of the midst of
  lexicon: HALOT
  rationale: The preposition plus תוך denotes separation from within a group. 'From
    the midst of' preserves the spatial force more fully than the simpler 'from among,'
    while remaining readable.
- source_word: הָעֵדָה הַזֹּאת
  chosen: this congregation
  alternatives:
  - this assembly
  - this community
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled community of Israel. 'Congregation'
    fits Pentateuchal usage and the corporate sense here better than the more generic
    'community.'
- source_word: וַאֲכַלֶּה
  chosen: so that I may consume
  alternatives:
  - and I will consume
  - that I may put an end to
  lexicon: HALOT
  rationale: כלה in the Piel/Hiphil-like causative-intensive sense here means to finish
    off, consume, or bring to an end. Given the imperative followed by cohortative-like
    first person form, 'so that I may consume' captures the volitional/result nuance
    better than a simple future.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct object pronoun referring to the congregation under judgment.
- source_word: כְּרָגַע
  chosen: in an instant
  alternatives:
  - in a moment
  - at once
  lexicon: HALOT
  rationale: רֶגַע denotes a brief moment. 'In an instant' communicates the suddenness
    and brevity of the threatened judgment in idiomatic English.
