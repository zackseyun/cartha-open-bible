theological_decisions:
- issue: Nature of the divine threat/judgment expression
  chosen_reading: Render the statement as a real divine intention to destroy the congregation
    swiftly, without softening it into mere hyperbole.
  alternative_readings:
  - Render more weakly as 'deal with them' or 'remove them'
  rationale: The verb כלה in this context carries strong judgment force. The translation
    should preserve the severity of God's announced action without importing later
    theological mitigation.
  doctrine_reference: Preserve theological tension rather than resolve it.
