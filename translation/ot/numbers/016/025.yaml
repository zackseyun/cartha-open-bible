id: NUM.16.25
reference: Numbers 16:25
source:
  edition: WLC
  text: וַ/יָּ֣קָם מֹשֶׁ֔ה וַ/יֵּ֖לֶךְ אֶל דָּתָ֣ן וַ/אֲבִירָ֑ם וַ/יֵּלְכ֥וּ אַחֲרָ֖י/ו
    זִקְנֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: Then Moses rose and went to Dathan and Abiram, and the elders of Israel went
    after him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the elders of Israel followed him.' The Hebrew more literally reads
      'went after him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: rose
  alternatives:
  - got up
  - stood up
  lexicon: HALOT
  rationale: From קום in the wayyiqtol, narrating a new action in sequence. 'Rose'
    is concise and idiomatic in narrative English, preserving the sense of getting
    up to act without over-paraphrasing.
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - walked
  - proceeded
  lexicon: HALOT
  rationale: הלך commonly means 'go/walk.' Here 'went' best fits normal English narrative
    and does not over-specify manner.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks movement directed to persons; 'to' is the natural
    English equivalent here.
- source_word: דָּתָן וַאֲבִירָם
  chosen: Dathan and Abiram
  rationale: Personal names are transliterated by standard conventions per translation
    philosophy.
- source_word: וַיֵּלְכוּ
  chosen: went
  alternatives:
  - followed
  lexicon: HALOT
  rationale: The verb is again הלך, here plural. Because the following adverbial phrase
    already expresses following ('after him'), rendering the verb simply as 'went'
    preserves the Hebrew structure more transparently than collapsing the whole phrase
    into 'followed.'
- source_word: אַחֲרָיו
  chosen: after him
  alternatives:
  - behind him
  - following him
  lexicon: HALOT
  rationale: This prepositional expression indicates movement in Moses' wake. 'After
    him' is a close and natural rendering that preserves the narrative image.
- source_word: זִקְנֵי יִשְׂרָאֵל
  chosen: the elders of Israel
  alternatives:
  - Israel's elders
  lexicon: HALOT
  rationale: A standard construct phrase meaning the recognized leaders/older men
    of Israel. 'The elders of Israel' is the most transparent and conventional rendering.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  rationale: The initial waw in Hebrew narrative often advances the storyline. 'Then'
    communicates sequential development in readable modern English better than a mechanically
    repeated 'And,' while remaining faithful to the discourse flow.
