id: NUM.16.22
reference: Numbers 16:22
source:
  edition: WLC
  text: וַ/יִּפְּל֤וּ עַל פְּנֵי/הֶם֙ וַ/יֹּ֣אמְר֔וּ אֵ֕ל אֱלֹהֵ֥י הָ/רוּחֹ֖ת לְ/כָל בָּשָׂ֑ר הָ/אִ֤ישׁ אֶחָד֙ יֶחֱטָ֔א וְ/עַ֥ל כָּל הָ/עֵדָ֖ה תִּקְצֹֽף־־־׃פ
translation:
  text: Then they fell on their faces and said[a], “God, the God of the spirits of all flesh, shall one man sin[b], and will you be angry with the whole congregation?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the God of the breath of all flesh,' emphasizing God as the giver of life to every living being.
    reason: lexical_alternative
  - marker: b
    text: '''One man'' may function representatively: the plea is that the sin of an individual should not bring wrath on the entire congregation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְּלוּ עַל־פְּנֵיהֶם
  chosen: they fell on their faces
  alternatives:
  - they fell facedown
  - they prostrated themselves
  lexicon: HALOT
  rationale: Idiomatic Hebrew for falling down in humility, alarm, or intercession. 'Fell on their faces' preserves the concrete imagery and is natural English.
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty God
  - O God
  lexicon: HALOT
  rationale: Vocative address to God. 'God' is the most natural English rendering here; the vocative force is conveyed by punctuation and direct address.
- source_word: אֱלֹהֵי הָרוּחֹת לְכָל־בָּשָׂר
  chosen: the God of the spirits of all flesh
  alternatives:
  - the God of the spirits of all people
  - the God of the breath of all flesh
  lexicon: HALOT
  rationale: Retains the genitival structure and the broad anthropological scope of 'all flesh.' 'Spirits' is preferred over 'breath' because רוּחֹת here most naturally refers to the inner life/spirit of human beings under God's knowledge and authority, fitting the plea that God knows individual culpability.
- source_word: בָּשָׂר
  chosen: flesh
  alternatives:
  - people
  - humanity
  lexicon: HALOT
  rationale: A formally close rendering that preserves the Hebrew idiom 'all flesh.' Because the phrase is established biblical language and understandable in context, it is kept in the main text rather than flattened to 'all people.'
- source_word: הָאִישׁ אֶחָד
  chosen: one man
  alternatives:
  - one person
  - a single man
  lexicon: HALOT
  rationale: Gender-accurate rendering of the masculine singular noun אישׁ with numeral 'one.' This follows the stated philosophy to preserve masculine representative language where present unless context clearly demands neutralization.
- source_word: יֶחֱטָא
  chosen: sin
  alternatives:
  - sins
  - should sin
  lexicon: HALOT
  rationale: Rendered as 'sin' within an English interrogative construction ('shall one man sin...?'). This preserves the simple verbal idea without over-specifying aspect.
- source_word: וְעַל כָּל־הָעֵדָה
  chosen: with the whole congregation
  alternatives:
  - against the whole congregation
  - with all the assembly
  lexicon: HALOT
  rationale: The preposition עַל with קצף commonly marks the object of wrath. English idiom prefers 'be angry with' rather than a more wooden 'be angry against.' 'Congregation' is a standard rendering for עֵדָה in Israel's communal setting.
- source_word: תִּקְצֹף
  chosen: will you be angry
  alternatives:
  - will you be wrathful
  - will you be enraged
  lexicon: HALOT
  rationale: A clear, readable rendering of the verb for divine anger. 'Be angry' communicates the sense without archaic or overly intensified diction.
