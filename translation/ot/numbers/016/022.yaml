theological_decisions:
- issue: Anthropological sense of 'the spirits of all flesh'
  chosen_reading: A title for God emphasizing his sovereign knowledge of and authority over the inner life of every human being.
  alternative_readings:
  - A title emphasizing God as giver of breath/life to all living creatures
  rationale: In this context Moses and Aaron appeal to God's ability to distinguish individual guilt from corporate punishment. Rendering רוּחוֹת as 'spirits' best supports that contextual logic while preserving the Hebrew expression.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; document contextual choice.'
- issue: Gender rendering of הָאִישׁ אֶחָד
  chosen_reading: one man
  alternative_readings:
  - one person
  rationale: The Hebrew is grammatically masculine singular. The phrase likely has representative force, but the translation philosophy directs gender-accurate rendering rather than neutralization unless context requires otherwise.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral.'
