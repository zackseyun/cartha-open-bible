id: NUM.16.24
reference: Numbers 16:24
source:
  edition: WLC
  text: דַּבֵּ֥ר אֶל הָ/עֵדָ֖ה לֵ/אמֹ֑ר הֵֽעָלוּ֙ מִ/סָּבִ֔יב לְ/מִשְׁכַּן קֹ֖רַח
    דָּתָ֥ן וַ/אֲבִירָֽם־־׃
translation:
  text: Speak to the congregation, saying, ‘Go up from around the dwelling of Korah,
    Dathan, and Abiram.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Move away from the vicinity of the dwelling of Korah, Dathan, and Abiram.”
      The Hebrew verb is literally “go up,” but here it functions as a command to
      withdraw.
    reason: lexical_alternative
  - marker: b
    text: “Dwelling” translates Hebrew mishkan here in the sense of a habitation or
      tent-area, not necessarily the sanctuary tabernacle.
    reason: cultural_note
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  - Address
  lexicon: HALOT
  rationale: Piel imperative 2ms of דבר, a direct command to address the people. 'Speak'
    is the most straightforward English imperative and fits the formal force of the
    command.
- source_word: הָעֵדָה
  chosen: the congregation
  alternatives:
  - the assembly
  - the community
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled Israelite community. 'Congregation'
    preserves the collective, covenant-community sense better than the more generic
    'community,' while remaining natural English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and say
  - thus
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the content of speech. 'Saying'
    keeps the Hebrew structure transparent in readable English.
- source_word: הֵעָלוּ
  chosen: Go up
  alternatives:
  - Move away
  - Withdraw
  lexicon: HALOT
  rationale: Imperative plural from עלה, literally 'go up.' In context it functions
    as a command to remove themselves from the vicinity. 'Go up' preserves the lexical
    sense, while the following phrase 'from around' makes the intended movement away
    from the area clear.
- source_word: מִסָּבִיב
  chosen: from around
  alternatives:
  - away from around
  - from the vicinity of
  lexicon: HALOT
  rationale: The preposition plus noun indicates movement away from the surrounding
    area. 'From around' is concise and close to the Hebrew; the fuller sense is carried
    by the whole clause.
- source_word: לְמִשְׁכַּן
  chosen: the dwelling
  alternatives:
  - the tabernacle
  - the tent-dwelling
  lexicon: HALOT
  rationale: מִשְׁכָּן can denote a dwelling place or tabernacle. Here the referent
    is the habitation/encampment associated with Korah, Dathan, and Abiram, not the
    sanctuary proper. 'The dwelling' avoids misleading readers into thinking the holy
    tabernacle itself is meant.
- source_word: קֹרַח דָּתָן וַאֲבִירָם
  chosen: Korah, Dathan, and Abiram
  rationale: Personal names are transliterated by standard conventions per project
    philosophy.
