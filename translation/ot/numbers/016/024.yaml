theological_decisions:
- issue: Referent of מִשְׁכָּן in this context
  chosen_reading: Rendered as 'dwelling' rather than 'tabernacle'
  alternative_readings:
  - tabernacle
  - tent
  rationale: Although מִשְׁכָּן often refers to the tabernacle, attaching it here
    to Korah, Dathan, and Abiram indicates their dwelling place/tents rather than
    the central sanctuary. This avoids importing a cultic reference the text does
    not require.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
