id: NUM.16.18
reference: Numbers 16:18
source:
  edition: WLC
  text: וַ/יִּקְח֞וּ אִ֣ישׁ מַחְתָּת֗/וֹ וַ/יִּתְּנ֤וּ עֲלֵי/הֶם֙ אֵ֔שׁ וַ/יָּשִׂ֥ימוּ
    עֲלֵי/הֶ֖ם קְטֹ֑רֶת וַֽ/יַּעַמְד֗וּ פֶּ֛תַח אֹ֥הֶל מוֹעֵ֖ד וּ/מֹשֶׁ֥ה וְ/אַהֲרֹֽן׃
translation:
  text: So each man took his firepan, and they put fire in them and put incense on
    them, and they stood at the entrance of the tent of meeting, with Moses and Aaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'censer' for 'firepan.' The Hebrew term refers to a vessel for carrying
      burning coals used in offering incense.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ מַחְתָּתוֹ
  chosen: each man took his firepan
  alternatives:
  - each one took his censer
  - every man took his fire holder
  lexicon: HALOT
  rationale: אִישׁ distributively with the singular possessive means each individual
    among the group took his own implement. מַחְתָּה denotes a firepan/censer used
    for carrying burning coals; 'firepan' is chosen as a clear, concrete rendering,
    while 'censer' is a viable traditional alternative preserved in a footnote.
- source_word: וַיִּתְּנוּ עֲלֵיהֶם אֵשׁ
  chosen: they put fire in them
  alternatives:
  - they put fire on them
  lexicon: HALOT
  rationale: The Hebrew preposition is literally 'on/upon them,' but with vessels
    in English idiom the natural sense is placing fire into the pans. This is an optimal-equivalence
    adjustment for readability while preserving the ritual action.
- source_word: וַיָּשִׂימוּ עֲלֵיהֶם קְטֹרֶת
  chosen: laid incense on them
  alternatives:
  - put incense on them
  - placed incense on them
  lexicon: HALOT
  rationale: The preposition 'on them' is retained more formally here because incense
    is placed on the burning coals in the pans. 'Laid' gives a natural English ritual
    register without becoming archaic.
- source_word: קְטֹרֶת
  chosen: incense
  lexicon: HALOT
  rationale: Standard rendering for the aromatic substance burned in worship contexts.
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  chosen: the entrance of the tent of meeting
  alternatives:
  - the doorway of the tent of meeting
  - the entrance to the tent of meeting
  lexicon: HALOT
  rationale: פֶּתַח is 'opening/entrance.' 'Entrance of the tent of meeting' is idiomatic
    and sufficiently formal. 'Tent of meeting' is the established rendering of אֹהֶל
    מוֹעֵד and preserves the cultic setting.
- source_word: וּמֹשֶׁה וְאַהֲרֹן
  chosen: with Moses and Aaron
  alternatives:
  - and Moses and Aaron
  lexicon: HALOT
  rationale: The verbless addition after the location most naturally indicates that
    Moses and Aaron were also stationed there. English requires an explicit connective
    for clarity; 'with' best conveys accompaniment at the entrance.
