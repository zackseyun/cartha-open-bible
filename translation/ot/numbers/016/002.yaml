id: NUM.16.2
reference: Numbers 16:2
source:
  edition: WLC
  text: וַ/יָּקֻ֨מוּ֙ לִ/פְנֵ֣י מֹשֶׁ֔ה וַ/אֲנָשִׁ֥ים מִ/בְּנֵֽי יִשְׂרָאֵ֖ל חֲמִשִּׁ֣ים
    וּ/מָאתָ֑יִם נְשִׂיאֵ֥י עֵדָ֛ה קְרִאֵ֥י מוֹעֵ֖ד אַנְשֵׁי שֵֽׁם־־׃
translation:
  text: and rose up before Moses, with two hundred fifty men from the sons of Israel,
    leaders of the congregation, called to the assembly, men of renown.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the Israelites.' The Hebrew reads 'from the sons of Israel,' a
      covenantal designation retained here for source-language transparency.
    reason: lexical_alternative
  - marker: b
    text: Or 'those summoned to the meeting.' The Hebrew phrase may denote men officially
      called to the community's appointed assembly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  chosen: rose up
  alternatives:
  - stood up
  - arose
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום in narrative sequence; 'rose up' preserves the idiom
    of taking action or standing in opposition before Moses without overinterpreting
    it as rebellion in the verb itself.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - against
  lexicon: HALOT
  rationale: Spatial-relational preposition meaning 'before/in front of.' In context
    it can imply confrontation, but 'before' preserves the Hebrew while allowing the
    narrative context to supply the adversarial sense.
- source_word: וַאֲנָשִׁים
  chosen: along with ... men
  alternatives:
  - and men
  - namely men
  lexicon: HALOT
  rationale: The clause is elliptical after the verb; English requires smoothing.
    'Along with two hundred fifty men' captures the coordination with those who rose
    up, without adding more than the syntax warrants.
- source_word: מִבְּנֵי יִשְׂרָאֵל
  chosen: from the sons of Israel
  alternatives:
  - from the Israelites
  - from the children of Israel
  lexicon: HALOT
  rationale: Gender-accurate rendering follows the stated philosophy. 'Sons of Israel'
    reflects בְּנֵי directly and preserves the traditional covenantal designation;
    a more idiomatic alternative is preserved in a footnote.
- source_word: חֲמִשִּׁים וּמָאתָיִם
  chosen: two hundred fifty
  alternatives:
  - two hundred and fifty
  lexicon: HALOT
  rationale: Standard contemporary English number expression.
- source_word: נְשִׂיאֵי עֵדָה
  chosen: leaders of the congregation
  alternatives:
  - chiefs of the congregation
  - princes of the assembly
  lexicon: HALOT
  rationale: נָשִׂיא denotes a lifted-up leader/chieftain. 'Leaders' is clear modern
    English; עֵדָה here is the assembled community, well rendered 'congregation.'
- source_word: קְרִאֵי מוֹעֵד
  chosen: called to the assembly
  alternatives:
  - those summoned to the meeting
  - called ones of the appointed meeting
  lexicon: HALOT
  rationale: The passive adjectival sense of קְרִאֵי with מוֹעֵד likely refers to
    men summoned for communal deliberation. 'Called to the assembly' is natural English
    and preserves the institutional sense without overtechnical wording.
- source_word: אַנְשֵׁי שֵׁם
  chosen: men of renown
  alternatives:
  - men of name
  - famous men
  lexicon: HALOT
  rationale: Hebrew idiom for men of reputation or distinction. 'Men of renown' is
    established, clear English that preserves the idiomatic force.
