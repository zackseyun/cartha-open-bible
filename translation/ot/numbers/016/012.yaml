id: NUM.16.12
reference: Numbers 16:12
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֣ח מֹשֶׁ֔ה לִ/קְרֹ֛א לְ/דָתָ֥ן וְ/לַ/אֲבִירָ֖ם בְּנֵ֣י אֱלִיאָ֑ב
    וַ/יֹּאמְר֖וּ לֹ֥א נַעֲלֶֽה׃
translation:
  text: Then Moses sent to summon Dathan and Abiram, the sons of Eliab, but they said,
    “We will not come up.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “We will not go up.” The Hebrew verb literally means “go up/ascend,”
      and may refer to going up to Moses' location or appearing before him when summoned.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - sent word
  - dispatched
  lexicon: HALOT
  rationale: The verb שׁלח in this construction means Moses initiated a summons by
    sending for them. 'Sent' is the most natural concise English rendering and avoids
    over-specifying the messenger.
- source_word: לִקְרֹא
  chosen: to summon
  alternatives:
  - to call
  - to invite
  lexicon: HALOT
  rationale: קרא with ל plus person here means to call for or summon someone. 'Summon'
    better captures the official force of Moses' action in the dispute context than
    the more generic 'call'.
- source_word: דָתָן וַאֲבִירָם
  chosen: Dathan and Abiram
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: בְּנֵי אֱלִיאָב
  chosen: the sons of Eliab
  alternatives:
  - sons of Eliab
  lexicon: HALOT
  rationale: A literal filial designation identifying Dathan and Abiram. Including
    'the' fits natural English apposition after the names.
- source_word: וַיֹּאמְרוּ
  chosen: but they said
  alternatives:
  - and they said
  lexicon: HALOT
  rationale: 'The waw-consecutive formally means ''and,'' but in context the response
    is adversative: Moses summons them, and they refuse. ''But'' communicates the
    discourse contrast naturally in English without altering the sense.'
- source_word: לֹא נַעֲלֶה
  chosen: We will not come up
  alternatives:
  - We will not go up
  - We are not coming up
  lexicon: HALOT
  rationale: עלה literally means 'go up/ascend.' In this context it refers to going
    up to Moses' location or appearing before him. 'Come up' preserves the directional
    nuance from the speakers' perspective toward the summoned meeting; 'will not'
    reflects the imperfect as a volitional refusal.
