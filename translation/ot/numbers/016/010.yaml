theological_decisions:
- issue: Cultic status distinction between Levites and priests
  chosen_reading: the priesthood
  alternative_readings:
  - priestly service
  - priestly office
  rationale: The verse rebukes Korah and his company for seeking a role beyond the Levitical service already granted to them. Rendering כְּהֻנָּה as 'the priesthood' preserves the theological and institutional distinction central to the passage.
