id: NUM.16.10
reference: Numbers 16:10
source:
  edition: WLC
  text: וַ/יַּקְרֵב֙ אֹֽתְ/ךָ֔ וְ/אֶת כָּל אַחֶ֥י/ךָ בְנֵי לֵוִ֖י אִתָּ֑/ךְ וּ/בִקַּשְׁתֶּ֖ם גַּם כְּהֻנָּֽה־־־־׃
translation:
  text: He has brought you near[a], and all your brothers, the sons of Levi, with you; yet you are seeking the priesthood as well.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and all your brothers, the Levites, with you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרֵב
  chosen: has brought ... near
  alternatives:
  - brought close
  - caused to come near
  lexicon: HALOT
  rationale: From קרב in the Hiphil, meaning to bring near or grant access. In this context of cultic privilege, 'brought near' preserves both the spatial and status-related sense better than a flatter 'brought close.' The English present perfect fits the rebuke's reference to a prior act with present significance.
- source_word: אֹתְךָ
  chosen: you
  rationale: Direct object singular masculine, referring to Korah individually.
- source_word: וְאֶת כָּל אַחֶיךָ בְנֵי לֵוִי
  chosen: and all your brothers, the sons of Levi
  alternatives:
  - and all your brothers, the Levites
  - and all your fellow Levites
  lexicon: HALOT
  rationale: אַחֶיךָ is literally 'your brothers,' and בְנֵי לֵוִי appositionally identifies them as Levi's descendants. 'The sons of Levi' is more formally transparent to the Hebrew than simply 'the Levites,' while remaining natural English.
- source_word: אִתָּךְ
  chosen: with you
  rationale: Though pointed here with a form that appears feminine in the morphology table, the contextual sense is plainly 'with you,' referring to Korah and his fellow Levites together.
- source_word: וּבִקַּשְׁתֶּם
  chosen: yet you are seeking
  alternatives:
  - and you seek
  - and you have sought
  lexicon: HALOT
  rationale: 'בקש means to seek, desire, or request. The conjunction is rendered ''yet'' to bring out the adversative force in context: despite being granted Levitical privilege, they are still seeking more. The plural verb is preserved in English by context, addressing Korah and his company collectively.'
- source_word: גַּם
  chosen: as well
  alternatives:
  - also
  - even
  lexicon: HALOT
  rationale: 'גַּם adds the sense of addition: beyond their current status, they seek something further. ''As well'' is idiomatic and clear.'
- source_word: כְּהֻנָּה
  chosen: the priesthood
  alternatives:
  - priestly office
  lexicon: HALOT
  rationale: Refers not merely to priestly activity in general but to the office or status of priesthood, which in context distinguishes Aaronic priesthood from Levitical service.
