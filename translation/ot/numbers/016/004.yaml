id: NUM.16.4
reference: Numbers 16:4
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֣ע מֹשֶׁ֔ה וַ/יִּפֹּ֖ל עַל פָּנָֽי/ו־׃
translation:
  text: When Moses heard it[a], he fell on his face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fell facedown' or 'prostrated himself.' The Hebrew idiom is literally 'fell on his face.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - listened
  - heard of
  lexicon: HALOT
  rationale: The verb שׁמע in the wayyiqtol narrative sequence most naturally means 'heard.' English 'heard it' supplies the implied object from context (the rebels' words in the preceding verse) and makes the sentence idiomatic without adding interpretive content beyond what the Hebrew narrative assumes.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name מֹשֶׁה, in keeping with the policy to transliterate names rather than translate them.
- source_word: וַיִּפֹּל
  chosen: fell
  alternatives:
  - prostrated himself
  - threw himself down
  lexicon: HALOT
  rationale: The verb נפל literally means 'fell.' In this context it describes a posture of abasement or urgent appeal before God, but the more literal 'fell' preserves the Hebrew wording while allowing the idiom 'on his face' to convey the posture.
- source_word: עַל פָּנָיו
  chosen: on his face
  alternatives:
  - face down
  - with his face to the ground
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for prostration. 'On his face' is both natural English and close to the source form. It preserves the physical imagery and the likely connotations of humility, grief, or intercession without over-specifying which nuance is primary here.
