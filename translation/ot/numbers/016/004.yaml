theological_decisions:
- issue: Interpretive force of Moses' posture
  chosen_reading: Render the physical action straightforwardly as 'he fell on his face' without explicating whether it signifies prayer, shock, humility, or intercession.
  alternative_readings:
  - he prostrated himself in prayer
  - he fell facedown in grief
  rationale: The Hebrew states the action but does not explicitly interpret it. Preserving the concrete gesture maintains the narrative's theological tension and avoids importing a more specific devotional or emotional explanation than the text itself gives.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
