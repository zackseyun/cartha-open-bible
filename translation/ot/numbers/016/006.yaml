id: NUM.16.6
reference: Numbers 16:6
source:
  edition: WLC
  text: זֹ֖את עֲשׂ֑וּ קְחוּ לָ/כֶ֣ם מַחְתּ֔וֹת קֹ֖רַח וְ/כָל עֲדָתֽ/וֹ־־׃
translation:
  text: 'Do this: take censers for yourselves, Korah and all his congregation.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fire pans.' The Hebrew term refers to vessels used to carry burning
      coals, especially in incense rites.
    reason: lexical_alternative
  - marker: b
    text: Or 'and all his assembly' or 'and all his company.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: this
  alternatives:
  - this thing
  lexicon: HALOT
  rationale: Demonstrative feminine singular referring forward to the action Moses
    is about to prescribe. English idiom favors 'Do this' rather than the more wooden
    'Do this thing.'
- source_word: עֲשׂוּ
  chosen: Do
  alternatives:
  - Make
  - Carry out
  lexicon: HALOT
  rationale: Qal imperative plural of עשה. In collocation with זֹאת, the idiomatic
    command is 'Do this.'
- source_word: קְחוּ
  chosen: take
  alternatives:
  - get
  - bring
  lexicon: HALOT
  rationale: Qal imperative plural of לקח. 'Take' is the most direct and natural rendering
    in this instruction.
- source_word: לָכֶם
  chosen: for yourselves
  alternatives:
  - for you
  - to yourselves
  lexicon: HALOT
  rationale: 'The preposition with 2mp pronoun adds reflexive nuance: they are to
    take the censers for their own use. ''For yourselves'' preserves that force better
    than a flat ''for you.'''
- source_word: מַחְתּוֹת
  chosen: censers
  alternatives:
  - fire pans
  lexicon: HALOT
  rationale: Refers to vessels for carrying burning coals/incense. 'Censers' is the
    clearest standard English term in this cultic context; 'fire pans' is possible
    but less specific to the immediate ritual setting.
- source_word: קֹרַח
  chosen: Korah
  rationale: Proper name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: וְכָל עֲדָתוֹ
  chosen: and all his congregation
  alternatives:
  - and all his company
  - and all his assembly
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the gathered community or assembly. 'Congregation'
    fits the communal and quasi-cultic setting well and is natural English here. The
    singular suffix on עֲדָתוֹ is represented by 'his.'
