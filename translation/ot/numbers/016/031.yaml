id: NUM.16.31
reference: Numbers 16:31
source:
  edition: WLC
  text: וַ/יְהִי֙ כְּ/כַלֹּת֔/וֹ לְ/דַבֵּ֕ר אֵ֥ת כָּל הַ/דְּבָרִ֖ים הָ/אֵ֑לֶּה וַ/תִּבָּקַ֥ע
    הָ/אֲדָמָ֖ה אֲשֶׁ֥ר תַּחְתֵּי/הֶֽם־׃
translation:
  text: And when he had finished speaking all these words, the ground that was beneath
    them split open.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  chosen: And as soon as
  alternatives:
  - And it happened
  - And it came to pass
  - And when
  lexicon: HALOT
  rationale: 'The waw-consecutive of היה here introduces the next event in narrative
    sequence. In English, a natural temporal transition is preferable to a wooden
    ''and it happened.'' Combined with the following infinitive construct, the sense
    is immediate succession: ''as soon as.'''
- source_word: כְּכַלֹּתוֹ
  chosen: he had finished
  alternatives:
  - when he finished
  - as he finished
  - at the finishing of him
  lexicon: HALOT
  rationale: 'The preposition כ with the infinitive construct of כלה plus 3ms suffix
    expresses temporal completion: ''when/as soon as he finished.'' English pluperfect
    fits the sequence before the main verb ''split open.'''
- source_word: לְדַבֵּר
  chosen: speaking
  alternatives:
  - to speak
  - speaking out
  lexicon: HALOT
  rationale: 'With כְּכַלֹּתוֹ, this infinitive complements the idea of finishing
    an action: ''finished speaking.'''
- source_word: אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  chosen: all these words
  alternatives:
  - all these things
  - all these statements
  lexicon: HALOT
  rationale: דברים most basically means 'words' or 'matters.' In this immediate speech
    context, 'words' is the most direct and formally faithful rendering.
- source_word: וַתִּבָּקַע
  chosen: split open
  alternatives:
  - was split
  - broke open
  - cleft open
  lexicon: HALOT
  rationale: From בקע, 'to split, cleave open.' 'Split open' is vivid, natural modern
    English, and captures the sudden rupture indicated by the narrative verb.
- source_word: הָאֲדָמָה
  chosen: the ground
  alternatives:
  - the land
  - the earth
  - the soil
  lexicon: HALOT
  rationale: אדמה can mean ground/land/soil. In this context of the earth opening
    beneath people, 'ground' is the most idiomatic and precise English choice.
- source_word: אֲשֶׁר תַּחְתֵּיהֶם
  chosen: beneath them
  alternatives:
  - that was under them
  - which was under them
  lexicon: HALOT
  rationale: The relative clause identifies the location of the rupture. English idiom
    naturally compresses 'the ground which was under them' to 'the ground beneath
    them' without loss of meaning.
