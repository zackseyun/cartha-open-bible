id: NUM.16.27
reference: Numbers 16:27
source:
  edition: WLC
  text: וַ/יֵּעָל֗וּ מֵ/עַ֧ל מִשְׁכַּן קֹ֛רֶח דָּתָ֥ן וַ/אֲבִירָ֖ם מִ/סָּבִ֑יב וְ/דָתָ֨ן וַ/אֲבִירָ֜ם יָצְא֣וּ נִצָּבִ֗ים פֶּ֚תַח אָֽהֳלֵי/הֶ֔ם וּ/נְשֵׁי/הֶ֥ם וּ/בְנֵי/הֶ֖ם וְ/טַפָּֽ/ם־׃
translation:
  text: So they moved away from around the dwelling of Korah[a], Dathan, and Abiram. And Dathan and Abiram came out, standing at the entrance of their tents, with their wives, their sons[b], and their little children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went up from around the dwelling of Korah, Dathan, and Abiram.' The Hebrew verb is literally 'went up,' but here likely functions idiomatically for withdrawing from the area.
    reason: lexical_alternative
  - marker: b
    text: '''Dwelling'' renders Hebrew mishkan here as the residence/place of encampment associated with Korah, Dathan, and Abiram, not the tabernacle of the LORD.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּעָלוּ
  chosen: moved away
  alternatives:
  - went up
  - withdrew
  lexicon: HALOT
  rationale: Although the verb literally means 'went up,' in the idiom with מֵעַל and the surrounding context of separation from the rebels' dwelling, the sense is movement away/back from the area rather than upward motion. 'Moved away' communicates the action naturally in English without over-paraphrasing.
- source_word: מֵעַל
  chosen: from around
  alternatives:
  - from upon
  - away from
  lexicon: HALOT
  rationale: Combined with מִסָּבִיב and the context of distancing, this expresses removal from the vicinity. Rendering the phrase as part of 'moved away from around' captures the spatial sense idiomatically.
- source_word: מִשְׁכַּן
  chosen: dwelling
  alternatives:
  - tabernacle
  - habitation
  lexicon: HALOT
  rationale: Here the word refers to the dwelling/place associated with Korah, Dathan, and Abiram, not the tabernacle of YHWH. 'Dwelling' avoids confusion with the sanctuary while preserving the concrete sense of a residence/place of encampment.
- source_word: מִסָּבִיב
  chosen: around
  alternatives:
  - on every side
  - from all around
  lexicon: HALOT
  rationale: This adverb/prepositional expression specifies the surrounding area. 'Around' is concise and natural in English.
- source_word: יָצְאוּ
  chosen: came out
  alternatives:
  - went out
  lexicon: HALOT
  rationale: From the perspective of the narrative, Dathan and Abiram emerge from their tents into view. 'Came out' is idiomatic English for this scene.
- source_word: נִצָּבִים
  chosen: standing
  alternatives:
  - stationed
  - taking their stand
  lexicon: HALOT
  rationale: The participle describes their posture at the tent entrance. 'Standing' is the most straightforward rendering; 'taking their stand' would add a more interpretive nuance of defiance, which the context may imply but the word itself need not explicitly encode.
- source_word: פֶּתַח
  chosen: the entrance of
  alternatives:
  - the doorway of
  - the opening of
  lexicon: HALOT
  rationale: Standard rendering for the opening/entryway of a tent. 'Entrance' reads naturally in modern English.
- source_word: אָֽהֳלֵיהֶם
  chosen: their tents
  alternatives:
  - their tent dwellings
  lexicon: HALOT
  rationale: Plural form in the Hebrew is best preserved as 'their tents.' This may reflect each household's tent(s) rather than a single shared tent.
- source_word: וּנְשֵׁיהֶם
  chosen: with their wives
  alternatives:
  - and their wives
  lexicon: HALOT
  rationale: The conjunction here joins accompanying family members to the scene. 'With' smooths the English while preserving the sense of accompaniment.
- source_word: וּבְנֵיהֶם
  chosen: their sons
  alternatives:
  - their children
  lexicon: HALOT
  rationale: Because the next term separately mentions dependents/little ones, בנים is better kept as 'sons' rather than the broader 'children,' preserving the distinction in the Hebrew.
- source_word: וְטַפָּם
  chosen: their little children
  alternatives:
  - their little ones
  - their dependents
  lexicon: HALOT
  rationale: טַף refers to small children/dependents. 'Little children' is clear and concrete in English, preserving the pathos of the scene.
