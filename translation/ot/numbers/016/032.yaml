id: NUM.16.32
reference: Numbers 16:32
source:
  edition: WLC
  text: וַ/תִּפְתַּ֤ח הָ/אָ֨רֶץ֙ אֶת פִּ֔י/הָ וַ/תִּבְלַ֥ע אֹתָ֖/ם וְ/אֶת בָּתֵּי/הֶ֑ם וְ/אֵ֤ת כָּל הָ/אָדָם֙ אֲשֶׁ֣ר לְ/קֹ֔רַח וְ/אֵ֖ת כָּל הָ/רֲכֽוּשׁ־־־־׃
translation:
  text: and the earth opened its mouth and swallowed them[a], their households, all the people who belonged to Korah[b], and all their possessions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their houses.' The Hebrew can refer either to the physical houses or, by extension, to their households.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the people who belonged to Korah.' The Hebrew reads 'every man who belonged to Korah,' using אָדָם in a collective expression.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּפְתַּח
  chosen: opened
  alternatives:
  - split open
  lexicon: HALOT
  rationale: Qal wayyiqtol of פתח, straightforwardly 'opened.' 'Split open' is possible in context but adds vividness not explicit in the verb itself.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the ground
  - the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'earth,' 'land,' or 'ground.' Here the image is the earth itself opening and swallowing, so 'the earth' best preserves the dramatic personification and common biblical idiom.
- source_word: אֶת־פִּיהָ
  chosen: its mouth
  alternatives:
  - its opening
  lexicon: HALOT
  rationale: Literally 'its mouth.' Retaining the metaphor matches the Hebrew vividness and avoids flattening the imagery.
- source_word: וַתִּבְלַע
  chosen: swallowed
  alternatives:
  - consumed
  - engulfed
  lexicon: HALOT
  rationale: בלע commonly means 'swallow.' This is the most direct and idiomatic rendering in this context.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct object pronoun referring to the judged rebels immediately in view.
- source_word: בָּתֵּיהֶם
  chosen: their households
  alternatives:
  - their houses
  lexicon: HALOT
  rationale: Though literally 'their houses,' in this judgment context the sense likely includes the members of their domestic units, not merely structures. 'Households' communicates that broader sense in natural English while fitting the narrative context.
- source_word: כָּל־הָאָדָם אֲשֶׁר לְקֹרַח
  chosen: every man who belonged to Korah
  alternatives:
  - all the people who belonged to Korah
  - every person who was with Korah
  lexicon: HALOT
  rationale: אָדָם here is singular collective with כָּל, and per project guidance should be rendered gender-accurately where the source is masculine. 'Every man' preserves the form, while 'who belonged to Korah' reflects the lamed relation as association/attachment. A more inclusive rendering is possible interpretively, so it is preserved in a footnote.
- source_word: כָּל־הָרֲכוּשׁ
  chosen: all their possessions
  alternatives:
  - all the property
  - all the goods
  lexicon: HALOT
  rationale: רְכוּשׁ denotes movable property/possessions. 'Possessions' is clear modern English and broad enough for the term's scope.
