theological_decisions:
- issue: Rendering of אָדָם in a collective phrase
  chosen_reading: every man who belonged to Korah
  alternative_readings:
  - all the people who belonged to Korah
  - every person who was with Korah
  rationale: The Hebrew uses הָאָדָם, a grammatically masculine singular collective. Following the project's gender-accurate principle, the main text preserves 'man' rather than neutralizing to 'people' or 'person.' Because English readers may understand the phrase generically, an alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table for אָדָם
