id: NUM.35.33
reference: Numbers 35:33
source:
  edition: WLC
  text: וְ/לֹֽא תַחֲנִ֣יפוּ אֶת הָ/אָ֗רֶץ אֲשֶׁ֤ר אַתֶּם֙ בָּ֔/הּ כִּ֣י הַ/דָּ֔ם ה֥וּא יַחֲנִ֖יף אֶת הָ/אָ֑רֶץ וְ/לָ/אָ֣רֶץ לֹֽא יְכֻפַּ֗ר לַ/דָּם֙ אֲשֶׁ֣ר שֻׁפַּךְ בָּ֔/הּ כִּי אִ֖ם בְּ/דַ֥ם שֹׁפְכֽ/וֹ־־־־־־׃
translation:
  text: You shall not pollute the land in which you are[a], for blood pollutes the land, and no atonement can be made for the land for the blood that was shed in it[b], except by the blood of the one who shed it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pollute the land.' The Hebrew verb carries the sense of making the land morally unclean or contaminated.
    reason: lexical_alternative
  - marker: b
    text: Or 'no expiation can be made for the land concerning the blood shed in it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַחֲנִיפוּ / יַחֲנִיף (חנף, Hiphil)
  chosen: defile
  alternatives:
  - pollute
  - profane
  lexicon: HALOT
  rationale: In this context the verb refers to rendering the land morally contaminated by bloodshed. 'Defile' is natural English and fits the parallel with blood contaminating the land. 'Pollute' is possible and common in some versions, but 'defile' better preserves the moral-sacral force rather than sounding merely environmental.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: In Numbers this commonly refers to the specific land inhabited by Israel rather than the whole earth. 'Land' preserves both territorial and covenantal resonance.
- source_word: כִּי הַדָּם הוּא
  chosen: for blood itself
  alternatives:
  - for it is blood
  - for the blood
  lexicon: HALOT
  rationale: The pronoun הוּא adds emphasis. 'Blood itself' brings out that emphasis in idiomatic English.
- source_word: יְכֻפַּר
  chosen: atonement can be made
  alternatives:
  - it can be expiated
  - it can be purged
  - it can be covered
  lexicon: HALOT
  rationale: The passive of כפר here concerns removal of bloodguilt from the land. 'Atonement can be made' is the clearest accessible rendering in modern English and preserves the cultic-moral sense. More technical alternatives like 'expiated' are accurate but less readable.
- source_word: וְלָאָרֶץ לֹא יְכֻפַּר לַדָּם
  chosen: and no atonement can be made for the land for the blood
  alternatives:
  - and the land cannot be atoned for because of the blood
  - and no expiation can be made for the land concerning the blood
  lexicon: HALOT
  rationale: The syntax links the land's need for atonement to the blood shed in it. This rendering keeps 'land' as the entity affected while preserving the causal relation to the bloodshed.
- source_word: שֻׁפַּךְ
  chosen: was shed
  alternatives:
  - was poured out
  lexicon: HALOT
  rationale: For bloodshed in legal context, 'was shed' is the standard and idiomatic English equivalent.
- source_word: כִּי אִם
  chosen: except
  alternatives:
  - but only
  - unless
  lexicon: HALOT
  rationale: The phrase introduces the sole exception or means. 'Except' is concise and idiomatic here.
- source_word: בְּדַם שֹׁפְכוֹ
  chosen: by the blood of the one who shed it
  alternatives:
  - by the blood of its shedder
  - by the blood of the one who poured it out
  lexicon: HALOT
  rationale: The suffix refers back to the bloodshed, meaning the killer's own blood. 'The one who shed it' is clearer than the more literal but awkward 'its shedder.'
