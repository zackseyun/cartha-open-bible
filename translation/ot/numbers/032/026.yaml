id: NUM.32.26
reference: Numbers 32:26
source:
  edition: WLC
  text: טַפֵּ֣/נוּ נָשֵׁ֔י/נוּ מִקְנֵ֖/נוּ וְ/כָל בְּהֶמְתֵּ֑/נוּ יִֽהְיוּ שָׁ֖ם בְּ/עָרֵ֥י
    הַ/גִּלְעָֽד־־׃
translation:
  text: Our little children, our wives, our livestock, and all our animals will remain
    there in the cities of Gilead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our children.' The Hebrew טַף often refers especially to little ones
      or dependent children.
    reason: lexical_alternative
  - marker: b
    text: Or 'will be there.' The Hebrew verb is simply 'will be,' but in context
      it implies remaining there while others go on campaign.
    reason: lexical_alternative
lexical_decisions:
- source_word: טַפֵּינוּ
  chosen: our little children
  alternatives:
  - our children
  - our dependents
  lexicon: HALOT
  rationale: טַף refers to small children or dependents, often the noncombatant young.
    'Our little children' preserves the sense of young children more clearly than
    the broader 'our children.'
- source_word: נָשֵׁינוּ
  chosen: our wives
  alternatives:
  - our women
  lexicon: HALOT
  rationale: In this familial and tribal setting, 'wives' is the natural contextual
    sense of אִשָּׁה in the plural with first person plural suffix, referring to the
    women belonging to the speakers' households.
- source_word: מִקְנֵנוּ
  chosen: our livestock
  alternatives:
  - our cattle
  - our possessions in livestock
  lexicon: HALOT
  rationale: מִקְנֶה commonly denotes livestock as movable property, especially herds
    and flocks. 'Livestock' is the clearest modern English rendering.
- source_word: וְכָל בְּהֶמְתֵּנוּ
  chosen: and all our cattle
  alternatives:
  - and all our animals
  - and all our beasts
  lexicon: HALOT
  rationale: בְּהֵמָה is a broad term for beasts/animals, especially domesticated
    animals. Because מִקְנֶה already covers livestock broadly, rendering this as 'all
    our cattle' preserves a distinction in English without becoming awkward. The phrase
    likely emphasizes the totality of their domesticated animals.
- source_word: יִהְיוּ
  chosen: will remain
  alternatives:
  - will be
  - shall stay
  lexicon: HALOT
  rationale: Although the verb is simply 'will be,' in context it indicates staying
    behind in place while the men go to war. 'Will remain' makes the situational force
    explicit while staying within the source sense.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Simple locative adverb; 'there' is direct and natural.
- source_word: בְּעָרֵי הַגִּלְעָד
  chosen: in the cities of Gilead
  alternatives:
  - in Gilead's cities
  - in the towns of Gilead
  lexicon: HALOT
  rationale: עָרִים can be rendered 'cities' or 'towns'; 'cities of Gilead' is a standard
    and sufficiently natural rendering. The definite article on Gilead marks the region
    name.
