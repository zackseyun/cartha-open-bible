id: NUM.32.38
reference: Numbers 32:38
source:
  edition: WLC
  text: וְ/אֶת נְב֞וֹ וְ/אֶת בַּ֧עַל מְע֛וֹן מֽוּסַבֹּ֥ת שֵׁ֖ם וְ/אֶת שִׂבְמָ֑ה וַ/יִּקְרְא֣וּ
    בְ/שֵׁמֹ֔ת אֶת שְׁמ֥וֹת הֶ/עָרִ֖ים אֲשֶׁ֥ר בָּנֽוּ־־־־׃
translation:
  text: and Nebo, and Baal-meon, their names having been changed, and Sibmah. And
    they gave names to the cities that they had built.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with changed names” / “whose names were changed.” The Hebrew phrase
      likely notes that Nebo and Baal-meon bore altered names.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְבוֹ
  chosen: Nebo
  lexicon: HALOT
  rationale: Proper place name; transliterated per translation philosophy rather than
    translated.
- source_word: בַּעַל מְע֛וֹן
  chosen: Baal-meon
  alternatives:
  - Baal Meon
  lexicon: HALOT
  rationale: Compound place name; retained as a transliteration. Hyphenation helps
    modern readability while preserving the name's components.
- source_word: מֽוּסַבֹּת שֵׁם
  chosen: their names having been changed
  alternatives:
  - with changed names
  - whose names were changed
  - renamed
  lexicon: HALOT
  rationale: Passive participle from סבב with שֵׁם indicates a change of name(s).
    Because the phrase follows Nebo and Baal-meon, the plural is best understood collectively
    of those towns' names. The rendering makes explicit the passive/resultative sense
    without over-paraphrasing.
- source_word: שִׂבְמָה
  chosen: Sibmah
  alternatives:
  - Shibmah
  lexicon: HALOT
  rationale: Proper place name; transliterated. 'Sibmah' reflects the Hebrew consonants
    straightforwardly in standard English form.
- source_word: וַיִּקְרְאוּ בְשֵׁמוֹת
  chosen: they gave names
  alternatives:
  - they called by names
  - they named
  lexicon: HALOT
  rationale: Idiomatic English for קרא + ב + שם in a naming context. 'Gave names'
    preserves the act of assigning names more clearly than a wooden rendering.
- source_word: אֶת שְׁמוֹת הֶעָרִים
  chosen: to the cities
  alternatives:
  - the names of the cities
  - the cities' names
  lexicon: HALOT
  rationale: The Hebrew literally includes 'the names of the cities,' but in English
    the sense is that they assigned names to the cities. This is a modest smoothing
    consistent with optimal equivalence.
- source_word: אֲשֶׁר בָּנוּ
  chosen: that they built
  alternatives:
  - which they rebuilt
  lexicon: HALOT
  rationale: בנה normally means 'build.' Although the broader context may imply rebuilding
    or fortifying existing towns, the verse itself uses the standard verb 'built,'
    so the translation keeps that wording.
