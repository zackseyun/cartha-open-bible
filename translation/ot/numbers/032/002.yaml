id: NUM.32.2
reference: Numbers 32:2
source:
  edition: WLC
  text: וַ/יָּבֹ֥אוּ בְנֵֽי גָ֖ד וּ/בְנֵ֣י רְאוּבֵ֑ן וַ/יֹּאמְר֤וּ אֶל מֹשֶׁה֙ וְ/אֶל
    אֶלְעָזָ֣ר הַ/כֹּהֵ֔ן וְ/אֶל נְשִׂיאֵ֥י הָ/עֵדָ֖ה לֵ/אמֹֽר־־־־׃
translation:
  text: Then the sons of Gad and the sons of Reuben came and spoke to Moses, to Eleazar
    the priest, and to the leaders of the congregation, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Gadites and the Reubenites.' The Hebrew reads literally 'the sons
      of Gad and the sons of Reuben.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the chiefs/princes of the congregation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - went
  - approached
  lexicon: HALOT
  rationale: The waw-consecutive verb from בוא commonly advances narrative with 'came.'
    In this context it introduces their approach to the leaders. 'Approached' is possible
    dynamically, but 'came' preserves the simple narrative movement.
- source_word: בְנֵי גָד
  chosen: the sons of Gad
  alternatives:
  - the Gadites
  - the descendants of Gad
  lexicon: HALOT
  rationale: Literally 'sons of Gad.' This keeps the Hebrew kinship expression and
    matches the paired tribal designation in the verse. 'Gadites' is smoother but
    less formally transparent.
- source_word: וּבְנֵי רְאוּבֵן
  chosen: and the sons of Reuben
  alternatives:
  - and the Reubenites
  - and the descendants of Reuben
  lexicon: HALOT
  rationale: As with 'sons of Gad,' the literal kinship expression is retained for
    consistency and transparency.
- source_word: וַיֹּאמְרוּ
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: Although the verb is the common 'said,' English style is improved by
    'spoke' before the sequence of addressees and the infinitive 'saying.' Rendering
    it 'said ... saying' is awkwardly repetitive in English.
- source_word: אֶל
  chosen: to
  alternatives:
  - before
  lexicon: HALOT
  rationale: The preposition marks the addressee of speech; 'to' is the standard and
    most direct rendering.
- source_word: אֶלְעָזָר הַכֹּהֵן
  chosen: Eleazar the priest
  alternatives:
  - Eleazar, the priest
  lexicon: HALOT
  rationale: The appositional title identifies Eleazar's office. No article is needed
    in English beyond 'the priest.' Comma punctuation is stylistic rather than lexical.
- source_word: נְשִׂיאֵי הָעֵדָה
  chosen: the leaders of the congregation
  alternatives:
  - the chiefs of the congregation
  - the princes of the congregation
  - the leaders of the community
  lexicon: HALOT
  rationale: נשיאים denotes tribal leaders/chiefs. 'Leaders' is clear modern English
    without the archaic or potentially misleading 'princes.' עֵדָה is often 'congregation'
    in Pentateuchal contexts for the assembled covenant community; 'community' is
    possible but 'congregation' preserves the formal communal sense.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: This infinitive introduces the following speech. 'Saying' is the standard
    formal rendering and fits the narrative style.
