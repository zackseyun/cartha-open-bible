id: NUM.32.6
reference: Numbers 32:6
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מֹשֶׁ֔ה לִ/בְנֵי גָ֖ד וְ/לִ/בְנֵ֣י רְאוּבֵ֑ן הַ/אַֽחֵי/כֶ֗ם יָבֹ֨אוּ֙
    לַ/מִּלְחָמָ֔ה וְ/אַתֶּ֖ם תֵּ֥שְׁבוּ פֹֽה־׃
translation:
  text: But Moses said to the sons of Gad and to the sons of Reuben, “Shall your brothers
    go to the war while you sit here?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “go to battle.” The Hebrew says “go to the war,” using a common idiom
      for entering military conflict.
    reason: lexical_alternative
  - marker: b
    text: “Your brothers” refers to their fellow Israelites from the other tribes.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. English can omit repeated
    'and' for natural style without loss of meaning; 'said' preserves the speech introduction.
- source_word: לִבְנֵי גָד וְלִבְנֵי רְאוּבֵן
  chosen: to the sons of Gad and to the sons of Reuben
  alternatives:
  - to the Gadites and to the Reubenites
  - to the descendants of Gad and the descendants of Reuben
  lexicon: HALOT
  rationale: בני literally means 'sons of.' Because this refers to tribal groups,
    either a literal or gentilic rendering is possible. 'Sons of Gad ... sons of Reuben'
    keeps the Hebrew form and preserves the direct address to the tribal descendants.
- source_word: הַאַחֵיכֶם
  chosen: your brothers
  alternatives:
  - your brothers and kinsmen
  - your fellow Israelites
  lexicon: HALOT
  rationale: The noun is literally 'your brothers.' In context it refers to fellow
    Israelites from the other tribes. Per translation philosophy, the gendered familial
    term is retained rather than neutralized.
- source_word: יָבֹאוּ
  chosen: shall ... go
  alternatives:
  - will ... go
  - must ... go
  lexicon: HALOT
  rationale: The verb literally means 'come/go in, enter.' With לַמִּלְחָמָה it idiomatically
    means to go out/enter into battle. In this rhetorical question, 'shall ... go'
    captures the rebuking force better than a flat future.
- source_word: לַמִּלְחָמָה
  chosen: to the war
  alternatives:
  - to battle
  - to the fighting
  lexicon: HALOT
  rationale: The noun means 'war/battle.' 'To the war' is slightly more formal but
    reflects the definite article in Hebrew and the corporate military campaign in
    view. 'Battle' is possible, but 'war' better suits the broader campaign context.
- source_word: וְאַתֶּם תֵּשְׁבוּ פֹה
  chosen: while you sit here
  alternatives:
  - and you sit here
  - while you remain here
  - and you stay here
  lexicon: HALOT
  rationale: ישב literally means 'sit, dwell, remain.' In context Moses contrasts
    their remaining settled east of the Jordan with their brothers going to war. 'Sit
    here' preserves the concrete force and rhetorical sharpness; 'while' makes the
    contrast explicit in natural English.
