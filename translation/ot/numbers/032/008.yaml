id: NUM.32.8
reference: Numbers 32:8
source:
  edition: WLC
  text: כֹּ֥ה עָשׂ֖וּ אֲבֹתֵי/כֶ֑ם בְּ/שָׁלְחִ֥/י אֹתָ֛/ם מִ/קָּדֵ֥שׁ בַּרְנֵ֖עַ לִ/רְא֥וֹת
    אֶת הָ/אָֽרֶץ־׃
translation:
  text: 'This is what your fathers did when I sent them from Kadesh-barnea to see
    the land:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to inspect' or 'to spy out the land.' The Hebrew verb is literally 'to
      see,' but in context it refers to exploring the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: This is what
  alternatives:
  - Thus
  - In this way
  lexicon: HALOT
  rationale: Introduces comparison with the present situation by pointing to a prior
    example. 'This is what' is natural modern English and preserves the demonstrative
    force better than the more archaic 'thus.'
- source_word: עָשׂוּ
  chosen: did
  alternatives:
  - acted
  - have done
  lexicon: HALOT
  rationale: Simple past fits the narrative recollection. 'Did' is the most direct
    rendering of עשה here.
- source_word: אֲבֹתֵיכֶם
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'your fathers.' In context Moses addresses
    the current tribes by reference to the previous generation. 'Ancestors' is possible
    dynamically, but 'your fathers' better preserves the source wording and generational
    force.
- source_word: בְּשָׁלְחִי
  chosen: when I sent
  alternatives:
  - in my sending
  - when I had sent
  lexicon: HALOT
  rationale: 'The prefixed ב plus infinitive construct with 1cs suffix is naturally
    rendered temporally here: ''when I sent.'' This is idiomatic English and reflects
    the temporal sense in context.'
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct object pronoun referring to the fathers/the earlier generation.
- source_word: מִקָּדֵשׁ בַּרְנֵעַ
  chosen: from Kadesh-barnea
  alternatives:
  - from Kadesh Barnea
  lexicon: HALOT
  rationale: Place name is transliterated per translation philosophy. Hyphenation
    is a standard English convention for this compound toponym.
- source_word: לִרְאוֹת
  chosen: to see
  alternatives:
  - to inspect
  - to spy out
  lexicon: HALOT
  rationale: The infinitive of ראה is literally 'to see.' In this context it refers
    to viewing/exploring the land. 'Spy out' is interpretive and more specific than
    the Hebrew verb itself, so 'to see' is preferred in the main text.
- source_word: אֶת הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: Definite direct object plus noun means 'the land.' In Israel's wilderness
    context this refers to the promised land, but the Hebrew expression itself is
    simply 'the land,' which should be retained.
