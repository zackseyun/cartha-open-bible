id: NUM.32.1
reference: Numbers 32:1
source:
  edition: WLC
  text: וּ/מִקְנֶ֣ה רַ֗ב הָיָ֞ה לִ/בְנֵ֧י רְאוּבֵ֛ן וְ/לִ/בְנֵי גָ֖ד עָצ֣וּם מְאֹ֑ד
    וַ/יִּרְא֞וּ אֶת אֶ֤רֶץ יַעְזֵר֙ וְ/אֶת אֶ֣רֶץ גִּלְעָ֔ד וְ/הִנֵּ֥ה הַ/מָּק֖וֹם
    מְק֥וֹם מִקְנֶֽה׀־־־׃
translation:
  text: Now the sons of Reuben and the sons of Gad had a very great amount of livestock,
    and when they saw the land of Jazer and the land of Gilead, behold, the place
    was a place for livestock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Reubenites and the Gadites.' The Hebrew reads literally 'the sons
      of Reuben and the sons of Gad.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''the place was suitable for livestock.'' The Hebrew repeats ''place''
      for emphasis: ''the place was a place for livestock.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְנֶה רַב
  chosen: a very great amount of livestock
  alternatives:
  - much livestock
  - abundant livestock
  - many cattle
  lexicon: HALOT
  rationale: מִקְנֶה denotes livestock/cattle as movable property; 'livestock' is
    the broad modern equivalent. רַב marks abundance. Rendering the phrase as 'a very
    great amount of livestock' reflects both the initial רַב and the later intensifier
    עָצוּם מְאֹד without reducing it to the narrower 'cattle'.
- source_word: לִבְנֵי רְאוּבֵן וְלִבְנֵי גָד
  chosen: the sons of Reuben and the sons of Gad
  alternatives:
  - the Reubenites and the Gadites
  - the descendants of Reuben and the descendants of Gad
  lexicon: HALOT
  rationale: בְּנֵי literally means 'sons of.' Because this is a tribal designation,
    'Reubenites and Gadites' is possible, but the Hebrew repeats 'sons of' with both
    names, so the more transparent rendering is retained.
- source_word: עָצוּם מְאֹד
  chosen: very great
  alternatives:
  - extremely numerous
  - exceedingly large
  - very abundant
  lexicon: HALOT
  rationale: עָצוּם conveys strength, vastness, or great magnitude; with מְאֹד it
    intensifies the abundance of the livestock. 'Very great' is idiomatic and preserves
    the emphasis without overinterpreting whether the focus is number or wealth.
- source_word: וַיִּרְאוּ
  chosen: when they saw
  alternatives:
  - and they saw
  - they looked at
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. In English, 'and when they
    saw' smooths the sequence into natural narrative flow while preserving the causal
    setup for what follows.
- source_word: אֶרֶץ יַעְזֵר וְאֶרֶץ גִּלְעָד
  chosen: the land of Jazer and the land of Gilead
  alternatives:
  - the region of Jazer and the region of Gilead
  - the territory of Jazer and the territory of Gilead
  lexicon: HALOT
  rationale: אֶרֶץ can mean land, region, or territory. 'Land' is the most direct
    and flexible rendering here, preserving the repeated Hebrew structure.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - indeed
  - and look
  - it turned out that
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention to what is discovered.
    'Behold' preserves the rhetorical force and observational immediacy of the Hebrew.
- source_word: הַמָּקוֹם מְקוֹם מִקְנֶה
  chosen: the place was a place for livestock
  alternatives:
  - the place was suitable for livestock
  - it was a place for cattle
  - the area was pastureland
  lexicon: HALOT
  rationale: The Hebrew uses a deliberate repetition of מָקוֹם for emphasis. Rendering
    it literally as 'the place was a place for livestock' preserves that repetition
    and avoids importing the more interpretive 'pastureland,' though the sense is
    suitability for grazing/keeping livestock.
