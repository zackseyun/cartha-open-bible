id: NUM.32.33
reference: Numbers 32:33
source:
  edition: WLC
  text: וַ/יִּתֵּ֣ן לָ/הֶ֣ם מֹשֶׁ֡ה לִ/בְנֵי גָד֩ וְ/לִ/בְנֵ֨י רְאוּבֵ֜ן וְ/לַ/חֲצִ֣י
    שֵׁ֣בֶט מְנַשֶּׁ֣ה בֶן יוֹסֵ֗ף אֶת מַמְלֶ֨כֶת֙ סִיחֹן֙ מֶ֣לֶךְ הָֽ/אֱמֹרִ֔י וְ/אֶת
    מַמְלֶ֔כֶת ע֖וֹג מֶ֣לֶךְ הַ/בָּשָׁ֑ן הָ/אָ֗רֶץ לְ/עָרֶ֨י/הָ֙ בִּ/גְבֻלֹ֔ת עָרֵ֥י
    הָ/אָ֖רֶץ סָבִֽיב׀־׀׀־־־׃
translation:
  text: So Moses gave to the sons of Gad, to the sons of Reuben, and to the half-tribe
    of Manasseh son of Joseph, the kingdom of Sihon king of the Amorites and the kingdom
    of Og king of Bashan—the land with its cities within their borders, the cities
    of the surrounding land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and the land, its cities with their territories, the cities of the surrounding
      land.' The final Hebrew phrase is syntactically compressed, and several closely
      related renderings are possible.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - assigned
  - granted
  lexicon: HALOT
  rationale: The verb נתן in this narrative context straightforwardly denotes giving/assigning
    territory. 'Gave' is the plainest English and preserves the narrative style.
- source_word: לָהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Explicitly retained to mirror the Hebrew indirect object before the recipients
    are named.
- source_word: לִבְנֵי גָד ... וְלִבְנֵי רְאוּבֵן
  chosen: to the sons of Gad, to the sons of Reuben
  alternatives:
  - to the Gadites, to the Reubenites
  lexicon: HALOT
  rationale: '''Sons of'' closely reflects בְּנֵי and preserves the tribal/familial
    idiom. The ethnicon-style alternatives are possible but less formally aligned
    with the Hebrew wording.'
- source_word: וְלַחֲצִי שֵׁבֶט מְנַשֶּׁה
  chosen: and to the half-tribe of Manasseh
  alternatives:
  - and to half the tribe of Manasseh
  lexicon: HALOT
  rationale: Both are natural English. 'The half-tribe of Manasseh' is a conventional
    and clear rendering of the construct phrase.
- source_word: בֶן יוֹסֵף
  chosen: son of Joseph
  lexicon: HALOT
  rationale: Retained to identify Manasseh genealogically, as in the Hebrew.
- source_word: מַמְלֶכֶת
  chosen: kingdom
  alternatives:
  - royal domain
  - realm
  lexicon: HALOT
  rationale: ממלכה normally denotes a kingdom or realm. 'Kingdom' is the most direct
    and idiomatic choice here for the territories formerly ruled by Sihon and Og.
- source_word: סִיחֹן מֶלֶךְ הָאֱמֹרִי
  chosen: Sihon king of the Amorites
  alternatives:
  - Sihon, the Amorite king
  lexicon: HALOT
  rationale: This preserves the Hebrew appositional structure with minimal expansion.
- source_word: עוֹג מֶלֶךְ הַבָּשָׁן
  chosen: Og king of Bashan
  alternatives:
  - Og, king of Bashan
  lexicon: HALOT
  rationale: Direct rendering of the title-name sequence.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the territory
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the territorial land just mentioned. 'Land' is the
    standard and sufficiently broad rendering.
- source_word: לְעָרֶיהָ
  chosen: with its cities
  alternatives:
  - for its cities
  - including its cities
  lexicon: HALOT
  rationale: The phrase is elliptical in Hebrew. In English, 'with its cities' best
    conveys that the land was given together with its cities. 'For its cities' would
    be obscure.
- source_word: בִּגְבֻלֹת
  chosen: within their borders
  alternatives:
  - by territories
  - according to boundaries
  - in the regions of
  lexicon: HALOT
  rationale: גבול denotes border/boundary/territory. Here it qualifies the cities
    as situated within defined borders. 'Within their borders' gives a clear sense
    in English.
- source_word: עָרֵי הָאָרֶץ סָבִיב
  chosen: the cities of the surrounding land
  alternatives:
  - the cities of the land all around
  - the surrounding cities of the land
  lexicon: HALOT
  rationale: The Hebrew closing phrase is compressed and somewhat appositional. This
    rendering preserves the sense that the grant included the cities belonging to
    the land round about, while remaining readable.
