id: NUM.32.36
reference: Numbers 32:36
source:
  edition: WLC
  text: וְ/אֶת בֵּ֥ית נִמְרָ֖ה וְ/אֶת בֵּ֣ית הָרָ֑ן עָרֵ֥י מִבְצָ֖ר וְ/גִדְרֹ֥ת צֹֽאן־־׃
translation:
  text: and Beth-nimrah and Beth-haran, fortified cities, and sheepfolds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fortress cities.'
    reason: lexical_alternative
  - marker: b
    text: Or 'folds for sheep' or 'pens for flocks.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּית נִמְרָה
  chosen: Beth-nimrah
  alternatives:
  - بيت Nimrah
  - House of Nimrah
  lexicon: HALOT
  rationale: A place name; per translation philosophy, names are transliterated rather
    than translated. The construct form בֵּית is preserved within the conventional
    toponym 'Beth-' rather than rendered 'house of.'
- source_word: בֵּית הָרָן
  chosen: Beth-haran
  alternatives:
  - Beth-haran
  - House of Haran
  lexicon: HALOT
  rationale: A place name in construct form; transliterated as a toponym. Rendering
    'house of Haran' would obscure that this is the established city name.
- source_word: עָרֵי מִבְצָר
  chosen: fortified cities
  alternatives:
  - fortress cities
  - cities of fortification
  lexicon: HALOT
  rationale: The construct phrase literally means 'cities of fortification/fortress.'
    'Fortified cities' is idiomatic modern English and preserves the military-defensive
    sense without awkwardness.
- source_word: גִדְרֹת צֹאן
  chosen: sheepfolds
  alternatives:
  - folds for sheep
  - pens for flocks
  lexicon: HALOT
  rationale: The phrase denotes enclosures for sheep/small livestock. 'Sheepfolds'
    is the natural concise English equivalent and fits the pastoral context of the
    chapter.
- source_word: וְאֶת ... וְאֶת ... וְ
  chosen: and ... and ... and
  alternatives:
  - also ... and ... with
  lexicon: Hebrew grammar
  rationale: The repeated conjunction/object marker sequence continues the list from
    the previous verse. In English, a simple series with 'and' best reflects the additive
    structure without overtranslating the object marker אֵת.
