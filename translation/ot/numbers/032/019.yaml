id: NUM.32.19
reference: Numbers 32:19
source:
  edition: WLC
  text: כִּ֣י לֹ֤א נִנְחַל֙ אִתָּ֔/ם מֵ/עֵ֥בֶר לַ/יַּרְדֵּ֖ן וָ/הָ֑לְאָה כִּ֣י בָ֤אָה נַחֲלָתֵ֨/נוּ֙ אֵלֵ֔י/נוּ מֵ/עֵ֥בֶר הַ/יַּרְדֵּ֖ן מִזְרָֽחָ/ה׃פ
translation:
  text: For we will not inherit with them beyond the Jordan and farther on[a], because our inheritance has come to us on this side of the Jordan, to the east.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'our inheritance has fallen to us on the east side of the Jordan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִנְחַל
  chosen: we will not inherit
  alternatives:
  - we will not receive an inheritance
  - we will not have a possession
  lexicon: HALOT
  rationale: 'The verb from נחל in the Qal can denote receiving or possessing an inheritance. ''Inherit'' is concise and preserves the covenant-land allotment sense. Future force fits the discourse: they are stating what will not be their allotment.'
- source_word: אִתָּם
  chosen: with them
  alternatives:
  - along with them
  lexicon: HALOT
  rationale: The preposition with pronominal suffix straightforwardly indicates shared participation in inheritance with the western tribes.
- source_word: מֵעֵבֶר לַיַּרְדֵּן וָהָלְאָה
  chosen: on the other side of the Jordan and beyond
  alternatives:
  - across the Jordan and farther on
  - beyond the Jordan and onward
  lexicon: HALOT
  rationale: The phrase denotes the region across the Jordan from the speaker's perspective, with וָהָלְאָה adding the sense 'and beyond/onward.' 'On the other side of the Jordan and beyond' preserves the spatial emphasis without over-paraphrase.
- source_word: בָאָה
  chosen: has come
  alternatives:
  - has fallen
  - has been assigned
  lexicon: HALOT
  rationale: The perfect feminine singular agrees with 'our inheritance' and expresses completed acquisition. 'Has come to us' is the plain sense; 'has fallen to us' is idiomatic but more interpretive, though common in allotment contexts.
- source_word: נַחֲלָתֵנוּ
  chosen: our inheritance
  alternatives:
  - our allotted inheritance
  - our possession
  lexicon: HALOT
  rationale: '''Inheritance'' is the standard rendering for נחלה in land-allotment contexts and preserves the covenantal allotment nuance.'
- source_word: אֵלֵינוּ
  chosen: to us
  alternatives:
  - for us
  lexicon: HALOT
  rationale: The preposition אֶל with suffix is most naturally rendered 'to us'; it complements 'has come' idiomatically in English.
- source_word: מֵעֵבֶר הַיַּרְדֵּן מִזְרָחָה
  chosen: on this side of the Jordan, to the east
  alternatives:
  - from the eastern side of the Jordan
  - beyond the Jordan eastward
  lexicon: HALOT
  rationale: Because the speakers are east of the Jordan, English idiom is clearer with 'on this side of the Jordan, to the east' rather than repeating 'beyond the Jordan,' which can be ambiguous in English. 'To the east' renders מִזְרָחָה naturally.
