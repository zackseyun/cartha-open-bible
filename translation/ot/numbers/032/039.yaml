id: NUM.32.39
reference: Numbers 32:39
source:
  edition: WLC
  text: וַ/יֵּ֨לְכ֜וּ בְּנֵ֨י מָכִ֧יר בֶּן מְנַשֶּׁ֛ה גִּלְעָ֖דָ/ה וַֽ/יִּלְכְּדֻ֑/הָ וַ/יּ֖וֹרֶשׁ אֶת הָ/אֱמֹרִ֥י אֲשֶׁר בָּֽ/הּ־־־׃
translation:
  text: The sons of Machir son of Manasseh went to Gilead and captured it[b][a], and dispossessed the Amorites who were in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has a singular verb, 'and he dispossessed,' after the preceding plural verbs. This may treat Machir's line as a collective singular, or it may reflect a textual or stylistic shift. Some translations smooth it to 'they dispossessed.'
    reason: textual_variant
  - marker: b
    text: Hebrew 'the Amorite' uses a singular ethnonym collectively, referring to the Amorite inhabitants.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  chosen: went
  alternatives:
  - went up
  - marched
  lexicon: HALOT
  rationale: הלך in the waw-consecutive imperfect here is the standard narrative verb 'went.' 'Went up' is possible in some geographic contexts, but the text does not require elevation emphasis.
- source_word: בְּנֵי מָכִיר בֶּן מְנַשֶּׁה
  chosen: The sons of Machir son of Manasseh
  alternatives:
  - The descendants of Machir son of Manasseh
  - The clan of Machir son of Manasseh
  lexicon: HALOT
  rationale: בני literally means 'sons of,' but can denote descendants or clan members. The more formal 'sons of' preserves the Hebrew kinship expression while remaining understandable in context.
- source_word: גִּלְעָדָה
  chosen: to Gilead
  alternatives:
  - toward Gilead
  lexicon: HALOT
  rationale: The directional he indicates motion toward a place. English idiom is best represented by 'to Gilead.'
- source_word: וַיִּלְכְּדֻהָ
  chosen: captured it
  alternatives:
  - took it
  - seized it
  lexicon: HALOT
  rationale: לכד commonly means to capture or seize, especially of taking a place. 'Captured it' is natural and suitably military.
- source_word: וַיּוֹרֶשׁ
  chosen: he dispossessed
  alternatives:
  - they dispossessed
  - drove out
  - took possession from
  lexicon: HALOT
  rationale: ירש in the Hiphil commonly means to dispossess or drive out. The Masoretic form is 3ms ('he dispossessed'), which is somewhat abrupt after plural verbs; this may function collectively or with Machir/the clan as a collective subject. 'Dispossessed' preserves the legal-territorial force better than the more interpretive 'drove out.'
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: Although morphologically singular in form, 'the Amorite' often functions as a collective ethnonym. In English, 'the Amorites' communicates the collective people group more clearly.
- source_word: אֲשֶׁר בָּהּ
  chosen: who were in it
  alternatives:
  - that were in it
  lexicon: HALOT
  rationale: The relative clause refers to the inhabitants within Gilead. 'Who' is preferable in English for persons, even though Hebrew uses the general relative particle אֲשֶׁר.
