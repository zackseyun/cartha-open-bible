id: NUM.32.25
reference: Numbers 32:25
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר בְּנֵי גָד֙ וּ/בְנֵ֣י רְאוּבֵ֔ן אֶל מֹשֶׁ֖ה לֵ/אמֹ֑ר עֲבָדֶ֣י/ךָ יַעֲשׂ֔וּ כַּ/אֲשֶׁ֥ר אֲדֹנִ֖/י מְצַוֶּֽה־־׃
translation:
  text: Then the sons of Gad and the sons of Reuben said to Moses[a], “Your servants will do just as my lord commands.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “your slaves.” The Hebrew term can denote either servants or slaves; here it is likely a respectful self-designation before Moses.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural English narrative flow while preserving the sequential force better than a bare 'said.'
- source_word: בְּנֵי גָד וּבְנֵי רְאוּבֵן
  chosen: the sons of Gad and the sons of Reuben
  alternatives:
  - the Gadites and the Reubenites
  - the descendants of Gad and the descendants of Reuben
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew construction and keeps the familial/tribal designation explicit. 'Gadites/Reubenites' is possible but less transparent to the source wording.
- source_word: אֶל מֹשֶׁה
  chosen: to Moses
  alternatives:
  - unto Moses
  lexicon: HALOT
  rationale: Standard rendering of אֶל with a speech verb.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - ':'
  - —
  lexicon: HALOT
  rationale: Though often omitted in smoother English, retaining 'saying' preserves the Hebrew speech-introduction formula and keeps the translation auditable to the source.
- source_word: עֲבָדֶיךָ
  chosen: Your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Although עֶבֶד can denote slave/servant, here it functions as a deferential self-designation in direct address to a leader rather than emphasizing bonded status. Therefore 'servants' best matches the discourse function.
- source_word: יַעֲשׂוּ
  chosen: will do
  alternatives:
  - shall do
  - do
  lexicon: HALOT
  rationale: The imperfect here expresses intended future action in response to Moses' command. 'Will do' is natural modern English.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according to what
  lexicon: HALOT
  rationale: '''Just as'' clearly conveys correspondence between command and obedience.'
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  - sir
  lexicon: HALOT
  rationale: Here אֲדֹנִי is a respectful title addressed to Moses, not the divine name. 'My lord' preserves the elevated deference of the Hebrew better than 'sir,' while avoiding confusion with YHWH, which is not present here.
- source_word: מְצַוֶּה
  chosen: commands
  alternatives:
  - is commanding
  - has commanded
  lexicon: HALOT
  rationale: The participle with present force in context is well represented by the English simple present, especially after 'will do just as.'
