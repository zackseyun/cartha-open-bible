id: NUM.32.30
reference: Numbers 32:30
source:
  edition: WLC
  text: וְ/אִם לֹ֧א יַֽעַבְר֛וּ חֲלוּצִ֖ים אִתְּ/כֶ֑ם וְ/נֹֽאחֲז֥וּ בְ/תֹכְ/כֶ֖ם בְּ/אֶ֥רֶץ כְּנָֽעַן־׃
translation:
  text: But if they do not cross over armed with you[a], then they shall receive property among you in the land of Canaan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'then they shall be settled among you in the land of Canaan.' The Hebrew verb can denote being established in possession, not merely the act of receiving it.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אִם
  chosen: But if
  alternatives:
  - and if
  - if
  lexicon: HALOT
  rationale: The conjunction introduces the contrasting conditional counterpart to the previous verse; 'But if' captures the adversative force in context better than a bare 'if'.
- source_word: לֹא
  chosen: do not
  alternatives:
  - not
  lexicon: HALOT
  rationale: Standard negation of the following imperfect verb, rendered idiomatically in English with auxiliary 'do'.
- source_word: יַעַבְרוּ
  chosen: cross over
  alternatives:
  - pass over
  - go across
  lexicon: HALOT
  rationale: עבר commonly means 'cross over/pass over.' In this Transjordan/Canaan context, 'cross over' is the most natural geographic rendering.
- source_word: חֲלוּצִים
  chosen: armed
  alternatives:
  - equipped for battle
  - in battle array
  - as armed men
  lexicon: HALOT
  rationale: The participle refers to being equipped/arrayed for war. 'Armed' is concise, natural English and fits the military context established in the chapter.
- source_word: אִתְּכֶם
  chosen: with you
  alternatives:
  - along with you
  lexicon: HALOT
  rationale: Directly expresses accompaniment with the rest of Israel in the crossing.
- source_word: וְנֹאחֲזוּ
  chosen: then they shall receive property
  alternatives:
  - then they shall be settled
  - then they shall be given a possession
  - then they shall take possession
  lexicon: HALOT
  rationale: From אחז in the Niphal, here in land-allotment context it conveys being granted/holding a possession. 'Receive property' makes explicit the passive-result sense in idiomatic English without overstating agency.
- source_word: בְּתֹכְכֶם
  chosen: among you
  alternatives:
  - in your midst
  lexicon: HALOT
  rationale: The phrase indicates location within the community of Israel west of the Jordan; 'among you' is clear modern English.
- source_word: בְּאֶרֶץ כְּנָעַן
  chosen: in the land of Canaan
  alternatives:
  - in Canaan
  lexicon: HALOT
  rationale: Retains the full geographic expression of the Hebrew and clarifies that the possession would be within Canaan proper.
