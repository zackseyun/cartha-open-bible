id: NUM.32.22
reference: Numbers 32:22
source:
  edition: WLC
  text: וְ/נִכְבְּשָׁ֨ה הָ/אָ֜רֶץ לִ/פְנֵ֤י יְהוָה֙ וְ/אַחַ֣ר תָּשֻׁ֔בוּ וִ/הְיִיתֶ֧ם
    נְקִיִּ֛ים מֵ/יְהוָ֖ה וּ/מִ/יִּשְׂרָאֵ֑ל וְ֠/הָיְתָה הָ/אָ֨רֶץ הַ/זֹּ֥את לָ/כֶ֛ם
    לַ/אֲחֻזָּ֖ה לִ/פְנֵ֥י יְהוָֽה׃
translation:
  text: and the land is subdued before the LORD, then afterward you may return and
    be clear of obligation before the LORD and before Israel, and this land shall
    be yours as a possession before the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'guiltless' or 'innocent' before the LORD and before Israel.
    reason: lexical_alternative
  - marker: b
    text: '''The LORD'' renders the divine name YHWH.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְנִכְבְּשָׁה
  chosen: is subdued
  alternatives:
  - is conquered
  - is brought into subjection
  lexicon: HALOT
  rationale: Nifal of כבש conveys the land being brought under control/subdued. 'Is
    subdued' preserves the passive/resultative sense without overstating military
    violence beyond the Hebrew.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי is idiomatically 'before/in the presence of.' 'Before the LORD'
    is concise and preserves the covenantal/judicial nuance. Per doctrine, יְהוָה
    is rendered 'the LORD.'
- source_word: וְאַחַר תָּשֻׁבוּ
  chosen: then afterward you may return
  alternatives:
  - afterward you shall return
  - then you may come back
  lexicon: HALOT
  rationale: The sequence marker וְאַחַר is temporal. The imperfect here follows the
    condition and expresses permitted/future action after fulfillment of the obligation.
    'May return' fits the context of authorized return to their allotted territory.
- source_word: וִהְיִיתֶם נְקִיִּים
  chosen: and be clear of obligation
  alternatives:
  - and be guiltless
  - and be innocent
  - and be free
  lexicon: HALOT
  rationale: נָקִי often means clean, innocent, free from guilt/liability. In this
    context Moses is speaking of fulfillment of a pledged duty; 'clear of obligation'
    brings out the covenantal-liability sense more naturally in English than the more
    abstract 'guiltless.'
- source_word: מֵיְהוָה וּמִיִּשְׂרָאֵל
  chosen: before the LORD and before Israel
  alternatives:
  - from the LORD and from Israel
  - in relation to the LORD and Israel
  lexicon: HALOT
  rationale: Though the preposition is מן, with נָקִי the idiom means being free/clear
    with respect to someone, i.e., not liable before them. Rendering with repeated
    'before' communicates the forensic/accountability sense in idiomatic English.
- source_word: וְהָיְתָה הָאָרֶץ הַזֹּאת לָכֶם
  chosen: and this land shall be yours
  alternatives:
  - and this land will belong to you
  - and this land shall become yours
  lexicon: HALOT
  rationale: Simple predication of possession. 'Shall be yours' is natural and preserves
    the future/result sense.
- source_word: לַאֲחֻזָּה
  chosen: as a possession
  alternatives:
  - for a possession
  - as a hereditary possession
  - as property
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a landed holding/possession, often with inheritance
    overtones. 'As a possession' is accurate and readable; 'hereditary possession'
    is possible but slightly more specific than the immediate wording requires.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, the default rendering of יְהוָה
    is 'the LORD.'
