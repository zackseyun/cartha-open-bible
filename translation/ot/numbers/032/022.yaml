theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by the project's contested-terms policy; this also aligns with
    the reverential and traditional English convention while preserving covenantal
    reference.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of נְקִיִּים in covenant context
  chosen_reading: clear of obligation
  alternative_readings:
  - guiltless
  - innocent
  rationale: The verse concerns fulfillment of a military pledge before God and Israel.
    The Hebrew can denote innocence/freedom from liability; here the practical sense
    is release from accountability once the condition is met.
