id: NUM.32.32
reference: Numbers 32:32
source:
  edition: WLC
  text: נַ֣חְנוּ נַעֲבֹ֧ר חֲלוּצִ֛ים לִ/פְנֵ֥י יְהוָ֖ה אֶ֣רֶץ כְּנָ֑עַן וְ/אִתָּ֨/נוּ֙
    אֲחֻזַּ֣ת נַחֲלָתֵ֔/נוּ מֵ/עֵ֖בֶר לַ/יַּרְדֵּֽן׃
translation:
  text: We ourselves will cross over, armed, before the LORD into the land of Canaan,
    and with us will be the possession of our inheritance on this side of the Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beyond the Jordan' or 'across the Jordan'; the Hebrew expression is
      perspective-dependent. Here 'on this side of the Jordan' reflects the speakers'
      location east of the river.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַחְנוּ
  chosen: We ourselves
  alternatives:
  - We
  - We on our part
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis beyond the 1cp verb; 'we ourselves'
    preserves that stress in natural English.
- source_word: נַעֲבֹר
  chosen: will cross over
  alternatives:
  - will pass over
  - shall cross
  lexicon: HALOT
  rationale: Qal imperfect 1cp of עבר here denotes crossing over the Jordan in future
    commitment language. 'Will cross over' is clear modern English.
- source_word: חֲלוּצִים
  chosen: armed
  alternatives:
  - equipped for battle
  - in battle array
  lexicon: HALOT
  rationale: In this military context the term refers to men prepared for war. 'Armed'
    is concise and idiomatic, though the fuller sense is military readiness.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  - before Yahweh
  lexicon: HALOT
  rationale: לִפְנֵי is spatial/relational 'before.' Per doctrine, יְהוָה is rendered
    'the LORD,' not transliterated. The phrase likely carries covenantal/theological
    force, not merely geographic sequence.
- source_word: אֶרֶץ כְּנָעַן
  chosen: into the land of Canaan
  alternatives:
  - to the land of Canaan
  - the land Canaan
  lexicon: HALOT
  rationale: Although no explicit preposition stands before 'land of Canaan,' in English
    the motion verb 'cross over' naturally takes 'into' to express destination. This
    is an optimal-equivalence smoothing warranted by the syntax and context.
- source_word: וְאִתָּנוּ
  chosen: and with us will be
  alternatives:
  - and with us is
  - but with us remains
  lexicon: HALOT
  rationale: The prepositional phrase is verbless in Hebrew and must be supplied in
    English. Future 'will be' matches the forward-looking pledge and links naturally
    with the preceding imperfect.
- source_word: אֲחֻזַּת נַחֲלָתֵנוּ
  chosen: the possession of our inheritance
  alternatives:
  - our hereditary possession
  - our landed inheritance
  - our possession as an inheritance
  lexicon: HALOT
  rationale: The construct chain combines the idea of a holding/possession with inherited
    allotment. 'The possession of our inheritance' preserves both elements more transparently
    than collapsing to a single term.
- source_word: מֵעֵבֶר לַיַּרְדֵּן
  chosen: on this side of the Jordan
  alternatives:
  - beyond the Jordan
  - across the Jordan
  lexicon: HALOT
  rationale: The phrase is deictic and depends on speaker location. Since the speakers
    are east of the Jordan claiming inheritance there, 'on this side of the Jordan'
    best reflects their perspective in context. 'Beyond the Jordan' is possible but
    less clear in English because it can invert perspective.
