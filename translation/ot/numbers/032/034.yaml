id: NUM.32.34
reference: Numbers 32:34
source:
  edition: WLC
  text: וַ/יִּבְנ֣וּ בְנֵי גָ֔ד אֶת דִּיבֹ֖ן וְ/אֶת עֲטָרֹ֑ת וְ/אֵ֖ת עֲרֹעֵֽר־־־׃
translation:
  text: The sons of Gad built Dibon, Ataroth, and Aroer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rebuilt' or 'fortified' in context; the Hebrew verb itself is simply
      'built.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Gad'; that is, members of the tribe of Gad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְנוּ
  chosen: built
  alternatives:
  - rebuilt
  - fortified
  lexicon: HALOT
  rationale: The waw-consecutive with בנה straightforwardly narrates past action,
    'built.' In this context of settling and establishing towns, 'rebuilt' or 'fortified'
    are possible contextual inferences, but the Hebrew verb itself does not require
    either nuance, so the simpler gloss is preferred.
- source_word: בְנֵי גָד
  chosen: The sons of Gad
  alternatives:
  - The Gadites
  - The descendants of Gad
  lexicon: HALOT
  rationale: Literally 'sons of Gad.' This preserves the Hebrew kinship expression
    while remaining natural English. 'Gadites' is idiomatic and possible, but the
    more literal rendering better reflects the source wording in this tribal context.
- source_word: אֶת
  chosen: '[not translated separately]'
  lexicon: HALOT
  rationale: Direct-object marker with no independent English equivalent; its function
    is represented by English word order.
- source_word: דִּיבֹן
  chosen: Dibon
  rationale: Place name transliterated according to standard English convention, following
    the translation philosophy to transliterate names.
- source_word: עֲטָרֹת
  chosen: Ataroth
  rationale: Place name transliterated according to standard English convention.
- source_word: עֲרֹעֵר
  chosen: Aroer
  rationale: Place name transliterated according to standard English convention.
