id: NUM.32.16
reference: Numbers 32:16
source:
  edition: WLC
  text: וַ/יִּגְּשׁ֤וּ אֵלָי/ו֙ וַ֣/יֹּאמְר֔וּ גִּדְרֹ֥ת צֹ֛אן נִבְנֶ֥ה לְ/מִקְנֵ֖/נוּ
    פֹּ֑ה וְ/עָרִ֖ים לְ/טַפֵּֽ/נוּ׃
translation:
  text: Then they came near to him and said, “We will build sheepfolds here for our
    livestock, and cities for our little ones.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “children.” The Hebrew טַף refers to little ones or dependents, often
      emphasizing the vulnerable members of the community.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְּשׁוּ
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: HALOT
  rationale: The verb נגשׁ in the waw-consecutive narrative form indicates physical
    approach. 'Came near' is natural modern English and preserves the movement toward
    Moses without overformal archaism.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - near him
  lexicon: HALOT
  rationale: The preposition plus pronoun marks the object of approach. In English,
    'came near to him' is idiomatic and clear.
- source_word: וַיֹּאמְרוּ
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Standard narrative introduction to direct speech. 'And said' fits the
    sequential Hebrew style.
- source_word: גִּדְרֹת צֹאן
  chosen: sheepfolds
  alternatives:
  - folds for sheep
  - pens for sheep
  - sheep pens
  lexicon: HALOT
  rationale: The construct phrase literally means 'enclosures/fences of flock.' 'Sheepfolds'
    is the most idiomatic concise English equivalent and preserves the pastoral sense.
- source_word: נִבְנֶה
  chosen: we will build
  alternatives:
  - let us build
  - we shall build
  lexicon: HALOT
  rationale: First person common plural imperfect here expresses intention/proposal
    in direct speech. 'We will build' best conveys their stated plan in context.
- source_word: לְמִקְנֵנוּ
  chosen: for our livestock
  alternatives:
  - for our cattle
  - for our possessions of livestock
  lexicon: HALOT
  rationale: מִקְנֶה refers broadly to livestock rather than specifically cattle in
    every context. 'Livestock' is the most accurate general term here.
- source_word: פֹּה
  chosen: here
  alternatives:
  - in this place
  lexicon: HALOT
  rationale: Simple locative adverb; 'here' is the natural English equivalent.
- source_word: וְעָרִים
  chosen: and cities
  alternatives:
  - and towns
  lexicon: HALOT
  rationale: עָרִים is the plural of 'city.' Although smaller settlements may be in
    view, 'cities' is the direct lexical equivalent and should be retained unless
    context demands otherwise.
- source_word: לְטַפֵּנוּ
  chosen: for our little ones
  alternatives:
  - for our children
  - for our dependents
  lexicon: HALOT
  rationale: טַף refers to little children or dependents, often including households'
    vulnerable members. 'Little ones' preserves the familial and vulnerable nuance
    better than the flatter 'children.'
