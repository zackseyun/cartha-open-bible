id: NUM.32.18
reference: Numbers 32:18
source:
  edition: WLC
  text: לֹ֥א נָשׁ֖וּב אֶל בָּתֵּ֑י/נוּ עַ֗ד הִתְנַחֵל֙ בְּנֵ֣י יִשְׂרָאֵ֔ל אִ֖ישׁ
    נַחֲלָתֽ/וֹ־׃
translation:
  text: We will not return to our houses until the sons of Israel have each taken
    possession of his inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' Hebrew 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation governing the verbal clause; rendered directly as 'not'
    within English future construction.
- source_word: נָשׁוּב
  chosen: we will return
  alternatives:
  - we shall return
  - we will go back
  lexicon: HALOT
  rationale: Qal imperfect 1cp of שוב expresses future/intended action in context.
    'We will return' is natural modern English and preserves the commitment being
    made.
- source_word: אֶל
  chosen: to
  alternatives:
  - into
  lexicon: HALOT
  rationale: Directional preposition with 'houses'; in idiomatic English with 'return'
    this is best absorbed as 'return to'.
- source_word: בָּתֵּינוּ
  chosen: our houses
  alternatives:
  - our homes
  lexicon: HALOT
  rationale: Literal plural of 'house.' 'Houses' preserves the concrete Hebrew better
    than the slightly more interpretive 'homes,' while still reading naturally.
- source_word: עַד
  chosen: until
  alternatives:
  - before
  lexicon: HALOT
  rationale: Temporal marker introducing the limit of their non-return; 'until' is
    the straightforward rendering.
- source_word: הִתְנַחֵל
  chosen: have taken possession
  alternatives:
  - have received as an inheritance
  - have inherited
  - have come into possession
  lexicon: HALOT
  rationale: Hitpael of נחל here refers to coming into one's allotted landed inheritance.
    'Have taken possession' communicates the settlement/allotment sense in context
    better than the potentially abstract 'have inherited.' The perfective sense after
    עַד is naturally rendered in English with present perfect.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Following the project's gender-accurate principle, the masculine plural
    construct is preserved as 'sons of Israel' rather than neutralizing to 'Israelites.'
    This also maintains the covenantal familial idiom of the Hebrew.
- source_word: אִישׁ
  chosen: each
  alternatives:
  - every man
  - each man
  lexicon: HALOT
  rationale: Though literally 'man,' in distributive construction with the following
    noun it functions idiomatically as 'each.' This preserves the distributive force
    without awkward English repetition.
- source_word: נַחֲלָתוֹ
  chosen: his inheritance
  alternatives:
  - his allotted inheritance
  - his possession
  lexicon: HALOT
  rationale: Refers to each Israelite's allotted tribal/familial landholding. 'His
    inheritance' is the standard and sufficiently clear rendering; the land-allotment
    nuance is carried by the context and the verb choice.
