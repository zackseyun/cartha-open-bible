theological_decisions:
- issue: Gendered covenantal expression in בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The doctrine excerpt directs gender-accurate rather than gender-neutral
    rendering where the source is grammatically masculine and representative. 'Sons
    of Israel' preserves the Hebrew form and familial covenant language. Because modern
    readers may expect a more inclusive idiom, an alternative is preserved in a footnote.
