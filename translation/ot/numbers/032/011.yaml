id: NUM.32.11
reference: Numbers 32:11
source:
  edition: WLC
  text: אִם יִרְא֨וּ הָ/אֲנָשִׁ֜ים הָ/עֹלִ֣ים מִ/מִּצְרַ֗יִם מִ/בֶּ֨ן עֶשְׂרִ֤ים שָׁנָה֙
    וָ/מַ֔עְלָ/ה אֵ֚ת הָ/אֲדָמָ֔ה אֲשֶׁ֥ר נִשְׁבַּ֛עְתִּי לְ/אַבְרָהָ֥ם לְ/יִצְחָ֖ק
    וּֽ/לְ/יַעֲקֹ֑ב כִּ֥י לֹא מִלְא֖וּ אַחֲרָֽ/י־־׃
translation:
  text: Surely none of the men who came up from Egypt, from twenty years old and upward,
    shall see the land that I swore to Abraham, to Isaac, and to Jacob, because they
    have not fully followed me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew literally uses an oath formula with ''if'': ''if the men ... shall
      see the land,'' implying a strong negation: ''surely none ... shall see.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'they have not followed after me completely.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: Surely none ... shall
  alternatives:
  - if
  - surely
  lexicon: HALOT
  rationale: 'In oath contexts, אִם introduces an elliptical negative oath (''if they
    shall...''), idiomatically rendered in English as a strong denial: ''surely none
    ... shall.'' A literal ''if'' would be misleading without the implied negation.'
- source_word: יִרְאוּ
  chosen: shall see
  alternatives:
  - will see
  - look upon
  lexicon: HALOT
  rationale: ראה here means 'see' in the sense of experiencing or entering into possession
    of the land. 'Shall see' preserves the solemn oath style.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the people
  - the menfolk
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural 'men,' not a generic term
    for people. This matches the census-age military context and follows the gender-accurate
    policy.
- source_word: הָעֹלִים מִמִּצְרַיִם
  chosen: who came up from Egypt
  alternatives:
  - who went up from Egypt
  - who came out of Egypt
  lexicon: HALOT
  rationale: עלה with מִן in exodus contexts commonly means 'go up/come up from.'
    'Came up from Egypt' is natural English and preserves the Hebrew idiom better
    than flattening to merely 'came out.'
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  chosen: from twenty years old and upward
  alternatives:
  - twenty years old and above
  - aged twenty and up
  lexicon: HALOT
  rationale: This is the standard age-threshold formula. 'From twenty years old and
    upward' closely reflects the Hebrew while remaining readable.
- source_word: הָאֲדָמָה
  chosen: the land
  alternatives:
  - the ground
  - the soil
  lexicon: HALOT
  rationale: Although אֲדָמָה can mean 'ground/soil,' in this covenantal context it
    refers to the promised land as territory. 'Land' is the natural contextual rendering.
- source_word: נִשְׁבַּעְתִּי
  chosen: I swore
  alternatives:
  - I solemnly swore
  - I took an oath
  lexicon: HALOT
  rationale: The Niphal of שׁבע in divine speech is the standard oath formula. 'I
    swore' is concise and sufficiently weighty in context.
- source_word: לְאַבְרָהָם לְיִצְחָק וּלְיַעֲקֹב
  chosen: to Abraham, to Isaac, and to Jacob
  alternatives:
  - to Abraham, Isaac, and Jacob
  lexicon: HALOT
  rationale: Repeating 'to' mirrors the Hebrew prepositions and preserves the formal
    covenantal cadence.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי gives the reason for the oath judgment. 'Because' makes the
    causal force explicit in contemporary English.
- source_word: לֹא מִלְאוּ אַחֲרַי
  chosen: they have not fully followed me
  alternatives:
  - they have not followed after me completely
  - they have not been wholly faithful to me
  lexicon: HALOT
  rationale: The idiom מלא אחרי means 'to follow fully/wholly.' 'Fully followed me'
    is a standard and accurate rendering. Adding 'fully' is necessary to convey the
    idiom's force; 'been wholly faithful' is interpretive and broader than the Hebrew
    wording.
