theological_decisions:
- issue: Rendering the oath formula introduced by אִם
  chosen_reading: Surely none of the men ... shall see the land
  alternative_readings:
  - If the men ... shall see the land
  rationale: The Hebrew uses an elliptical oath formula in which אִם carries an implied
    negative. Rendering it woodenly with 'if' would obscure the sense and undertranslate
    the solemn divine judgment. The chosen wording preserves the force without importing
    extra theology.
  doctrine_reference: Translation philosophy §1, §6
- issue: Extent of the idiom לֹא מִלְאוּ אַחֲרַי
  chosen_reading: they have not fully followed me
  alternative_readings:
  - they have not been wholly faithful to me
  rationale: The idiom concerns complete following after the LORD, not an abstract
    doctrinal category. 'Fully followed me' preserves the relational and covenantal
    language while avoiding interpretive expansion.
  doctrine_reference: Translation philosophy §3, §5
