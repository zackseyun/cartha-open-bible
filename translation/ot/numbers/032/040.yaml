id: NUM.32.40
reference: Numbers 32:40
source:
  edition: WLC
  text: וַ/יִּתֵּ֤ן מֹשֶׁה֙ אֶת הַ/גִּלְעָ֔ד לְ/מָכִ֖יר בֶּן מְנַשֶּׁ֑ה וַ/יֵּ֖שֶׁב בָּֽ/הּ־־׃
translation:
  text: So Moses gave Gilead to Machir son of Manasseh[a], and he settled in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dwelt in it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - assigned
  - granted
  lexicon: HALOT
  rationale: The verb נתן in this narrative context straightforwardly means 'gave.' 'Assigned' or 'granted' are possible contextual expansions, but 'gave' best preserves the simple verbal force without adding administrative nuance.
- source_word: הַגִּלְעָד
  chosen: Gilead
  alternatives:
  - the Gilead
  - the region of Gilead
  lexicon: HALOT
  rationale: As a place name, 'Gilead' is the natural English rendering. Although the Hebrew includes the article, English idiom normally omits it with established place names.
- source_word: לְמָכִיר
  chosen: to Machir
  alternatives:
  - for Machir
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object/recipient here. 'To Machir' is the most direct and idiomatic rendering.
- source_word: בֶּן מְנַשֶּׁה
  chosen: son of Manasseh
  alternatives:
  - descendant of Manasseh
  lexicon: HALOT
  rationale: בן most naturally means 'son' in genealogical notices. While broader descendant language can occur in Hebrew, nothing in this verse requires expansion beyond the immediate filial expression.
- source_word: וַיֵּשֶׁב
  chosen: settled
  alternatives:
  - dwelt
  - lived
  lexicon: HALOT
  rationale: ישב commonly means 'sit, dwell, settle.' In a land-allotment context, 'settled' captures the establishment of residence more naturally than the more static 'dwelt' while remaining faithful to the source.
- source_word: בָּהּ
  chosen: in it
  alternatives:
  - there
  - in her
  lexicon: HALOT
  rationale: The feminine singular pronominal suffix refers back to the land/region. English idiom prefers 'in it' for a place name here. 'There' is possible but less formally tied to the antecedent.
