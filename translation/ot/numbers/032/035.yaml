id: NUM.32.35
reference: Numbers 32:35
source:
  edition: WLC
  text: וְ/אֶת עַטְרֹ֥ת שׁוֹפָ֛ן וְ/אֶת יַעְזֵ֖ר וְ/יָגְבֳּהָֽה־־׃
translation:
  text: and Atroth-shophan, and Jazer, and Jogbehah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Ataroth-shophan.' The Hebrew form is a compound place name; English
      transliterations vary.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  chosen: and
  alternatives:
  - and [direct-object marker left untranslated]
  lexicon: HALOT
  rationale: The conjunction וְ is rendered 'and.' The particle אֶת marks the definite
    direct object in Hebrew but is not normally represented in English; in a simple
    place-name list, natural English omits any explicit equivalent.
- source_word: עַטְרֹת שׁוֹפָן
  chosen: Atroth-shophan
  alternatives:
  - Ataroth-shophan
  - Atroth of Shophan
  lexicon: HALOT
  rationale: This is a compound place name and is best transliterated rather than
    translated, per the translation philosophy for names. 'Atroth-shophan' reflects
    a straightforward English transliteration of the Hebrew form. 'Ataroth-shophan'
    is a familiar alternative reflecting a fuller vocalic representation of עטרות.
- source_word: יַעְזֵר
  chosen: Jazer
  alternatives:
  - Jaazer
  - Yaazer
  lexicon: HALOT
  rationale: A place name, so transliteration is preferred. 'Jazer' is the standard
    English form and is readily recognizable.
- source_word: יָגְבֳּהָה
  chosen: Jogbehah
  alternatives:
  - Jogbeha
  - Yogbohah
  lexicon: HALOT
  rationale: A place name, transliterated into conventional English form. 'Jogbehah'
    is the established rendering and preserves the identity of the location.
