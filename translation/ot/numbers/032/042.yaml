id: NUM.32.42
reference: Numbers 32:42
source:
  edition: WLC
  text: וְ/נֹ֣בַח הָלַ֔ךְ וַ/יִּלְכֹּ֥ד אֶת קְנָ֖ת וְ/אֶת בְּנֹתֶ֑י/הָ וַ/יִּקְרָ֧א
    לָ֦/ה נֹ֖בַח בִּ/שְׁמֽ/וֹ־־׃פ
translation:
  text: And Nobah went and captured Kenath and its villages, and called it Nobah,
    after his own name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'its daughters,' an idiom referring to the smaller settlements
      dependent on Kenath.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹבַח
  chosen: Nobah
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to the translation philosophy
    for names.
- source_word: הָלַךְ
  chosen: went
  alternatives:
  - went out
  - proceeded
  lexicon: HALOT
  rationale: In narrative sequence, הָלַךְ commonly functions as a simple motion verb.
    'Went' is natural English and preserves the action without overinterpreting.
- source_word: וַיִּלְכֹּד
  chosen: captured
  alternatives:
  - took
  - seized
  lexicon: HALOT
  rationale: לכד in military context means to capture or seize. 'Captured' best fits
    the conquest setting and is clear modern English.
- source_word: קְנָת
  chosen: Kenath
  lexicon: HALOT
  rationale: Place name; transliterated rather than translated.
- source_word: בְּנֹתֶיהָ
  chosen: its villages
  alternatives:
  - its daughters
  - its dependent towns
  lexicon: HALOT
  rationale: Literally 'its daughters,' an idiom for satellite settlements or dependent
    towns surrounding a main city. 'Its villages' communicates the sense in idiomatic
    English while remaining faithful to the referent.
- source_word: וַיִּקְרָא לָהּ
  chosen: he called it
  alternatives:
  - he named it
  - he gave it the name
  lexicon: HALOT
  rationale: קרא + ל marks naming. 'He called it' is straightforward and preserves
    the narrative style.
- source_word: נֹבַח
  chosen: Nobah
  lexicon: HALOT
  rationale: The city is renamed with the same form as the man's name; English preserves
    the repetition.
- source_word: בִּשְׁמוֹ
  chosen: after his own name
  alternatives:
  - by his name
  - with his name
  - according to his name
  lexicon: HALOT
  rationale: The phrase indicates that the place was named from the conqueror's name.
    'After his own name' makes the relationship explicit in natural English. 'Own'
    clarifies that the suffix refers back to Nobah, not to the city.
