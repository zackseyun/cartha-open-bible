id: NUM.32.5
reference: Numbers 32:5
source:
  edition: WLC
  text: וַ/יֹּאמְר֗וּ אִם מָצָ֤אנוּ חֵן֙ בְּ/עֵינֶ֔י/ךָ יֻתַּ֞ן אֶת הָ/אָ֧רֶץ הַ/זֹּ֛את לַ/עֲבָדֶ֖י/ךָ לַ/אֲחֻזָּ֑ה אַל תַּעֲבִרֵ֖/נוּ אֶת הַ/יַּרְדֵּֽן־־־־׃
translation:
  text: And they said[a], “If we have found favor in your sight, let this land be given to your servants as a possession. Do not make us cross the Jordan.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Do not bring us across the Jordan.' The Hebrew verb is causative and can be rendered with several close English equivalents.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָצָאנוּ חֵן בְּעֵינֶיךָ
  chosen: if we have found favor in your sight
  alternatives:
  - if we have found grace in your eyes
  - if we have found favor in your eyes
  lexicon: HALOT
  rationale: A standard Hebrew idiom for receiving favorable regard. 'Favor' is more natural modern English than 'grace' here, and 'in your sight' is a clear idiomatic equivalent that preserves the relational nuance.
- source_word: יֻתַּן
  chosen: let ... be given
  alternatives:
  - may ... be given
  - grant
  lexicon: HALOT
  rationale: The passive/jussive-like sense fits a polite request. 'Let this land be given' preserves the formal request structure better than the more interpretive 'grant.'
- source_word: הָאָרֶץ הַזֹּאת
  chosen: this land
  alternatives:
  - this הארץ
  - this territory
  lexicon: HALOT
  rationale: '''Land'' is the most direct and natural rendering for אֶרֶץ in this context of territorial inheritance. ''Territory'' is possible but less idiomatic here.'
- source_word: לַעֲבָדֶיךָ
  chosen: to your servants
  alternatives:
  - to your slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here it functions as a deferential self-reference to Moses in a petition. The bonded-status nuance is not foregrounded, so 'servants' best fits the discourse context.
- source_word: לַאֲחֻזָּה
  chosen: as a possession
  alternatives:
  - for a possession
  - as property
  - as an inheritance
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a landed holding or possession. 'As a possession' is clear, natural, and preserves the idea of a permanent holding without overloading it with later inheritance terminology.
- source_word: אַל תַּעֲבִרֵנוּ אֶת הַיַּרְדֵּן
  chosen: Do not make us cross the Jordan
  alternatives:
  - Do not bring us across the Jordan
  - Do not take us over the Jordan
  lexicon: HALOT
  rationale: 'The Hiphil of עבר is causative: not merely ''do not let us cross'' but ''do not cause/make us cross.'' ''The Jordan'' is the natural English rendering for the river name in this context.'
