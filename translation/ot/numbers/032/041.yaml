id: NUM.32.41
reference: Numbers 32:41
source:
  edition: WLC
  text: וְ/יָאִ֤יר בֶּן מְנַשֶּׁה֙ הָלַ֔ךְ וַ/יִּלְכֹּ֖ד אֶת חַוֺּתֵי/הֶ֑ם וַ/יִּקְרָ֥א אֶתְ/הֶ֖ן חַוֺּ֥ת יָאִֽיר־־׃
translation:
  text: And Jair son of Manasseh went and captured their villages[a], and he called them Havvoth-jair.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Havvoth-jair means 'villages of Jair' or 'settlements of Jair.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָאִיר
  chosen: Jair
  lexicon: HALOT
  rationale: Standard transliteration of the personal name, following the philosophy of transliterating names rather than translating them.
- source_word: בֶּן מְנַשֶּׁה
  chosen: son of Manasseh
  alternatives:
  - descendant of Manasseh
  lexicon: HALOT
  rationale: The construct phrase literally means 'son of Manasseh.' Although genealogical usage can sometimes mean descendant, the Hebrew wording itself is best preserved in the main text.
- source_word: הָלַךְ
  chosen: went
  alternatives:
  - went out
  - proceeded
  lexicon: HALOT
  rationale: A straightforward rendering of הלך in narrative sequence; 'went' is natural modern English and does not overinterpret direction or purpose.
- source_word: וַיִּלְכֹּד
  chosen: captured
  alternatives:
  - took
  - seized
  lexicon: HALOT
  rationale: לכד commonly denotes capture or seizure, especially in military or territorial contexts. 'Captured' best fits the conquest setting.
- source_word: חַוֹּתֵיהֶם
  chosen: their villages
  alternatives:
  - their tent-settlements
  - their hamlets
  - their encampments
  lexicon: HALOT
  rationale: חַוּוֹת refers to small settlements or unwalled village-type habitations. 'Villages' is the clearest natural English equivalent, while more etymological options like 'tent-settlements' are less idiomatic here.
- source_word: וַיִּקְרָא אֶתְהֶן
  chosen: he called them
  alternatives:
  - he named them
  lexicon: HALOT
  rationale: קרא with object can mean to call or name. 'He called them' stays close to the Hebrew while remaining clear in English.
- source_word: חַוֹּת יָאִיר
  chosen: Havvoth-jair
  alternatives:
  - the villages of Jair
  - Jair's villages
  lexicon: HALOT
  rationale: This is a place-name formed from the same noun חַוּוֹת plus the personal name Jair. Because it functions as a proper toponym, transliteration is preferable in the main text; the meaning can be preserved in a footnote.
