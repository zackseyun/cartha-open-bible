id: NUM.32.17
reference: Numbers 32:17
source:
  edition: WLC
  text: וַ/אֲנַ֜חְנוּ נֵחָלֵ֣ץ חֻשִׁ֗ים לִ/פְנֵי֙ בְּנֵ֣י יִשְׂרָאֵ֔ל עַ֛ד אֲשֶׁ֥ר אִם הֲבִֽיאֹנֻ֖/ם אֶל מְקוֹמָ֑/ם וְ/יָשַׁ֤ב טַפֵּ֨/נוּ֙ בְּ/עָרֵ֣י הַ/מִּבְצָ֔ר מִ/פְּנֵ֖י יֹשְׁבֵ֥י הָ/אָֽרֶץ־־׃
translation:
  text: But we ourselves will arm ourselves quickly before the sons of Israel[a], until we have brought them to their place[b]; and our little ones will remain in the fortified cities because of the inhabitants of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ahead of the Israelites'; the phrase literally reads 'before the sons of Israel' and likely refers to going in front of them in battle.
    reason: lexical_alternative
  - marker: b
    text: '''Our little ones'' refers broadly to children and dependents.'
    reason: cultural_note
lexical_decisions:
- source_word: נֵחָלֵץ
  chosen: will arm ourselves
  alternatives:
  - will be armed
  - will go as shock troops
  lexicon: HALOT
  rationale: 'Niphal of חלץ here is reflexive/middle in context: the speakers pledge to equip themselves for battle. ''Arm ourselves'' is natural English and fits the following adverb and prepositional phrase.'
- source_word: חֻשִׁים
  chosen: quickly
  alternatives:
  - in haste
  - armed for battle
  lexicon: HALOT
  rationale: The adverb commonly conveys haste/readiness. Some translations take it in a military sense ('armed'), but because the arming idea is already expressed by נחלץ, rendering it adverbially as 'quickly' avoids redundancy while preserving the sense of prompt readiness.
- source_word: לִפְנֵי בְּנֵי יִשְׂרָאֵל
  chosen: before the sons of Israel
  alternatives:
  - before the Israelites
  - ahead of the Israelites
  lexicon: HALOT
  rationale: Literally 'before the sons of Israel.' In this military context it likely means going in front of the Israelite force. 'Sons of Israel' preserves the source expression and the gender-accurate policy, while remaining understandable.
- source_word: עַד אֲשֶׁר אִם
  chosen: until
  alternatives:
  - until such time as
  - until indeed
  lexicon: HALOT
  rationale: The combination functions idiomatically to mark the endpoint of the action. Smooth English is best achieved with simple 'until'.
- source_word: הֲבִיאֹנֻם
  chosen: we have brought them
  alternatives:
  - we bring them
  - we have led them
  lexicon: HALOT
  rationale: Hiphil of בוא means cause to come/bring. With the object suffix referring to the other Israelites, 'brought them' is the most direct rendering.
- source_word: אֶל מְקוֹמָם
  chosen: to their place
  alternatives:
  - to their place of settlement
  - to their destination
  lexicon: HALOT
  rationale: The phrase is straightforward. 'Their place' leaves the referent broad enough to include their allotted settlement.
- source_word: וְיָשַׁב טַפֵּנוּ
  chosen: our little ones will remain
  alternatives:
  - our children will dwell
  - our dependents will stay
  lexicon: HALOT
  rationale: Though the verb is singular with a collective subject, English naturally uses plural agreement with 'little ones.' 'Little ones' reflects טף, referring to children and dependents, without over-specifying.
- source_word: בְּעָרֵי הַמִּבְצָר
  chosen: in the fortified cities
  alternatives:
  - in the fortress cities
  - in fortified towns
  lexicon: HALOT
  rationale: The construct denotes cities characterized by fortification. 'Fortified cities' is idiomatic and clear.
- source_word: מִפְּנֵי יֹשְׁבֵי הָאָרֶץ
  chosen: because of the inhabitants of the land
  alternatives:
  - from before the inhabitants of the land
  - for protection from the inhabitants of the land
  lexicon: HALOT
  rationale: 'מִפְּנֵי here expresses cause or threat: the little ones stay in fortified cities on account of the danger posed by the land''s inhabitants. ''Because of'' is concise; the protective nuance is inferable from context.'
