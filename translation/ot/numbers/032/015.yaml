theological_decisions:
- issue: Referent of singular pronouns in 'leave him' after plural addressees and
    before 'all this people'
  chosen_reading: Retain the singular pronoun in English ('leave him') as a collective
    reference to Israel/the people.
  alternative_readings:
  - 'Smooth to plural: ''leave them in the wilderness'''
  - 'Specify the referent: ''leave Israel in the wilderness'''
  rationale: The Hebrew text has a singular suffix on לְהַנִּיחוֹ. Retaining the singular
    preserves the source form and likely collective sense, even though English might
    more smoothly use a plural or explicit noun. Because the next clause refers to
    'all this people,' the singular is best understood collectively rather than as
    referring to Moses alone or an individual tribe.
  doctrine_reference: Translation philosophy §1, §5
