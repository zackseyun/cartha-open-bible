id: NUM.32.15
reference: Numbers 32:15
source:
  edition: WLC
  text: כִּ֤י תְשׁוּבֻ/ן֙ מֵֽ/אַחֲרָ֔י/ו וְ/יָסַ֣ף ע֔וֹד לְ/הַנִּיח֖/וֹ בַּ/מִּדְבָּ֑ר
    וְ/שִֽׁחַתֶּ֖ם לְ/כָל הָ/עָ֥ם הַ/זֶּֽה־׃ס
translation:
  text: For if you turn back from following him, he will again leave them in the wilderness,
    and you will destroy all this people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'from after him,' an idiom meaning 'from following him.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew reads 'leave him in the wilderness,' with a singular pronoun
      likely used collectively for Israel/the people. Some translations smooth this
      to 'leave them' or 'leave Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For if
  alternatives:
  - If
  - For
  lexicon: HALOT
  rationale: Here כִּי introduces the ground for Moses' warning and carries a conditional
    sense in context. 'For if' preserves both the explanatory connection to the previous
    verse and the conditional force.
- source_word: תְשׁוּבֻן
  chosen: you turn back
  alternatives:
  - you return
  - you turn away
  lexicon: HALOT
  rationale: From שוב, here with מֵאַחֲרָיו, the sense is not mere physical return
    but turning back/away from following. 'Turn back' is idiomatic and fits the warning
    context.
- source_word: מֵאַחֲרָיו
  chosen: from following him
  alternatives:
  - from after him
  - from behind him
  lexicon: HALOT
  rationale: Literally 'from after him,' an idiom for ceasing to follow. 'From following
    him' communicates the Hebrew idiom naturally in English while preserving the personal
    object.
- source_word: וְיָסַף עוֹד
  chosen: he will again
  alternatives:
  - he will continue further
  - he will add again
  lexicon: HALOT
  rationale: יסף with עוד forms an idiom meaning to do something again or further.
    'He will again' captures the iterative force succinctly.
- source_word: לְהַנִּיחוֹ
  chosen: leave him
  alternatives:
  - let him remain
  - abandon him
  lexicon: HALOT
  rationale: The infinitive of נוח in Hiphil can mean cause to rest, leave, or let
    remain. In this wilderness-judgment context, 'leave him' best conveys the sense
    of God allowing Israel to remain there. The singular pronominal suffix is retained.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is the standard rendering for מִדְבָּר in the Pentateuch
    and preserves the theological and narrative resonance of Israel''s setting.'
- source_word: וְשִׁחַתֶּם
  chosen: you will bring ruin on
  alternatives:
  - you will destroy
  - you will ruin
  lexicon: HALOT
  rationale: שׁחת in this causative/destructive sense can mean destroy or ruin. 'Bring
    ruin on' fits the object 'all this people' and avoids implying immediate physical
    annihilation alone; it reflects the consequence of causing the people's destruction/judgment.
- source_word: לְכָל הָעָם הַזֶּה
  chosen: on all this people
  alternatives:
  - all this people
  - all these people
  lexicon: HALOT
  rationale: The Hebrew is singular collective, literally 'all this people.' English
    idiom prefers 'all this people' or 'all these people'; 'all this people' more
    closely reflects the collective singular of the source.
