id: NUM.32.37
reference: Numbers 32:37
source:
  edition: WLC
  text: וּ/בְנֵ֤י רְאוּבֵן֙ בָּנ֔וּ אֶת חֶשְׁבּ֖וֹן וְ/אֶת אֶלְעָלֵ֑א וְ/אֵ֖ת קִרְיָתָֽיִם־־׃
translation:
  text: And the sons of Reuben built Heshbon[a], Elealeh, and Kiriathaim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Reubenites built Heshbon, Elealeh, and Kiriathaim.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי רְאוּבֵן
  chosen: And the sons of Reuben
  alternatives:
  - And the Reubenites
  lexicon: HALOT
  rationale: בְנֵי literally means 'sons of,' and the construct with the tribal name identifies the tribal descendants. 'Sons of Reuben' preserves the Hebrew form and lineage emphasis; 'Reubenites' is idiomatic but less formally transparent.
- source_word: בָּנוּ
  chosen: built
  alternatives:
  - rebuilt
  - fortified
  lexicon: HALOT
  rationale: The qal perfect of בנה normally means 'built.' In this settlement context it can imply rebuilding or establishing towns, but the base sense 'built' is the most textually warranted without importing additional nuance.
- source_word: אֶת
  chosen: '[not translated separately]'
  lexicon: Hebrew grammar
  rationale: The direct-object marker has no standalone English equivalent and is represented by normal English word order.
- source_word: חֶשְׁבּוֹן
  chosen: Heshbon
  lexicon: HALOT
  rationale: Proper place name; transliterated according to standard English convention, consistent with the translation philosophy to transliterate names.
- source_word: אֶלְעָלֵא
  chosen: Elealeh
  alternatives:
  - Eleale
  lexicon: HALOT
  rationale: Proper place name. 'Elealeh' is a standard English transliteration reflecting the Hebrew form; a shorter spelling exists in some traditions but is less directly tied to the Masoretic vocalization.
- source_word: קִרְיָתָיִם
  chosen: Kiriathaim
  alternatives:
  - Kiryathaim
  lexicon: HALOT
  rationale: Proper place name; transliterated in a conventional English form. The initial 'Ki-' spelling is standard in many English Bible traditions while still transparently reflecting the Hebrew.
