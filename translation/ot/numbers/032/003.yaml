id: NUM.32.3
reference: Numbers 32:3
source:
  edition: WLC
  text: עֲטָר֤וֹת וְ/דִיבֹן֙ וְ/יַעְזֵ֣ר וְ/נִמְרָ֔ה וְ/חֶשְׁבּ֖וֹן וְ/אֶלְעָלֵ֑ה
    וּ/שְׂבָ֥ם וּ/נְב֖וֹ וּ/בְעֹֽן׃
translation:
  text: Ataroth, Dibon, Jazer, Nimrah, Heshbon, Elealeh, Sebam, Nebo, and Beon—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Sebam'; elsewhere the related place name appears as 'Sibmah' or
      'Shibmah.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Beon'; elsewhere the related place name appears in the expanded
      form 'Baal-meon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲטָרוֹת
  chosen: Ataroth
  alternatives:
  - Atarot
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated per project
    philosophy. 'Ataroth' follows a conventional English transliteration of the Hebrew
    form.
- source_word: דִיבֹן
  chosen: Dibon
  lexicon: HALOT
  rationale: Proper place name; transliterated directly into standard English form.
- source_word: יַעְזֵר
  chosen: Jazer
  alternatives:
  - Jaazer
  lexicon: HALOT
  rationale: Proper place name. 'Jazer' is the standard English transliteration in
    this context; 'Jaazer' reflects a more expanded representation of the Hebrew vowels
    but is less idiomatic in English Bible usage.
- source_word: נִמְרָה
  chosen: Nimrah
  alternatives:
  - Beth-nimrah (in related contexts)
  lexicon: HALOT
  rationale: Proper place name; transliterated as it appears here. The longer form
    'Beth-nimrah' occurs elsewhere, but this verse has the shorter toponym and should
    not be harmonized.
- source_word: חֶשְׁבּוֹן
  chosen: Heshbon
  lexicon: HALOT
  rationale: Proper place name; standard English transliteration.
- source_word: אֶלְעָלֵה
  chosen: Elealeh
  alternatives:
  - Elealah
  lexicon: HALOT
  rationale: Proper place name; transliterated. 'Elealeh' is the conventional English
    form and reflects the final heh adequately.
- source_word: שְׂבָם
  chosen: Sebam
  alternatives:
  - Sibmah
  - Shibmah
  lexicon: HALOT
  rationale: The consonantal form here is שׂבם, which most directly supports 'Sebam.'
    Because the place is elsewhere associated with 'Sibmah/Shibmah,' those alternatives
    are worth preserving, but the translation should reflect the form present in this
    verse rather than normalize it.
- source_word: נְבוֹ
  chosen: Nebo
  lexicon: HALOT
  rationale: Proper place name; standard English transliteration.
- source_word: בְּעֹן
  chosen: Beon
  alternatives:
  - Baal-meon (in related contexts)
  lexicon: HALOT
  rationale: Proper place name; transliterated as written here. The text here reads
    'Beon,' and it should not be replaced with the expanded related name 'Baal-meon'
    found elsewhere.
- source_word: וְ / וּ
  chosen: and
  alternatives:
  - ','
  - listing without repeated conjunction
  lexicon: Hebrew grammar
  rationale: The repeated waw conjunctions structure the verse as a straightforward
    list of place names. Rendering each with 'and' preserves the Hebrew polysyndeton
    and the cadence of the source text.
