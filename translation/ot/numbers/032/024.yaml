id: NUM.32.24
reference: Numbers 32:24
source:
  edition: WLC
  text: בְּנֽוּ לָ/כֶ֤ם עָרִים֙ לְ/טַפְּ/כֶ֔ם וּ/גְדֵרֹ֖ת לְ/צֹנַאֲ/כֶ֑ם וְ/הַ/יֹּצֵ֥א
    מִ/פִּי/כֶ֖ם תַּעֲשֽׂוּ־׃
translation:
  text: Build for yourselves cities for your little ones, and enclosures for your
    flocks, and do what has gone out from your mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do what you have promised.' The Hebrew reads literally, 'do what has
      gone out from your mouth,' an idiom for carrying out one's spoken word.
    reason: lexical_alternative
  - marker: b
    text: '''Enclosures'' may also be rendered ''folds'' or ''pens'' for livestock.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנוּ
  chosen: Build
  alternatives:
  - Rebuild
  - Construct
  lexicon: HALOT
  rationale: Imperative plural of בנה, a straightforward command to build/construct.
    'Build' is the most natural and direct English imperative.
- source_word: לָכֶם
  chosen: for yourselves
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition with 2mp pronoun can be rendered simply 'for you,' but
    'for yourselves' better reflects the reflexive/practical force in context without
    overtranslation.
- source_word: עָרִים
  chosen: cities
  alternatives:
  - towns
  lexicon: HALOT
  rationale: עיר commonly denotes a city or town. 'Cities' is the standard rendering
    and fits the settlement context in Numbers 32.
- source_word: לְטַפְּכֶם
  chosen: for your little ones
  alternatives:
  - for your children
  - for your dependents
  lexicon: HALOT
  rationale: טַף refers to small children or little ones, often including the vulnerable
    members of a household. 'Little ones' preserves the concrete and familial sense
    better than the broader 'dependents.'
- source_word: וּגְדֵרֹת
  chosen: and enclosures
  alternatives:
  - and folds
  - and walls
  - and pens
  lexicon: HALOT
  rationale: גדרות are fenced enclosures, here specifically for livestock. 'Enclosures'
    is clear modern English and broad enough to cover the pastoral setting; 'folds'
    is possible but somewhat more idiomatic and less transparent for some readers.
- source_word: לְצֹנַאֲכֶם
  chosen: for your flocks
  alternatives:
  - for your sheep
  - for your small livestock
  lexicon: HALOT
  rationale: צאן denotes small livestock, especially sheep and goats, often collectively
    'flocks.' 'Flocks' is idiomatic and contextually appropriate.
- source_word: וְהַיֹּצֵא
  chosen: and do what has gone out
  alternatives:
  - and whatever goes out
  - and what came out
  lexicon: HALOT
  rationale: The substantival participle with article means 'that which goes/has gone
    out.' In context it refers to what they have spoken/promised. English perfect
    'has gone out' best captures the completed force relative to their prior pledge.
- source_word: מִפִּיכֶם
  chosen: from your mouth
  alternatives:
  - from your lips
  - what you have said
  lexicon: HALOT
  rationale: A literal idiom is retained because it is clear in English and preserves
    the covenantal/pledge language of the Hebrew.
- source_word: תַּעֲשׂוּ
  chosen: do
  alternatives:
  - carry out
  - perform
  - fulfill
  lexicon: HALOT
  rationale: עשה is broad and commonly rendered 'do' or 'make.' Here 'do' keeps the
    wording concise and allows the idiom 'do what has gone out from your mouth' to
    convey fulfilling one's spoken commitment.
