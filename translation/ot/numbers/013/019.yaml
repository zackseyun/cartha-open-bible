id: NUM.13.19
reference: Numbers 13:19
source:
  edition: WLC
  text: וּ/מָ֣ה הָ/אָ֗רֶץ אֲשֶׁר הוּא֙ יֹשֵׁ֣ב בָּ֔/הּ הֲ/טוֹבָ֥ה הִ֖וא אִם רָעָ֑ה וּ/מָ֣ה הֶֽ/עָרִ֗ים אֲשֶׁר הוּא֙ יוֹשֵׁ֣ב בָּ/הֵ֔נָּה הַ/בְּ/מַֽחֲנִ֖ים אִ֥ם בְּ/מִבְצָרִֽים־־־׃
translation:
  text: And what is the land like in which he lives? Is it good or bad? And what are the cities like in which he lives? Are they in camps or in fortifications?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in encampments ... in strongholds.' The Hebrew contrasts camp-like settlements with fortified places.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָה
  chosen: And what ... like
  alternatives:
  - And what
  - And how
  lexicon: HALOT
  rationale: Introduces an inquiry about the character/condition of the land and cities. In idiomatic English, 'what is ... like' best conveys the interrogative force without wooden literalism.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  lexicon: HALOT
  rationale: '''Land'' is the standard and contextually appropriate rendering for הארץ in the reconnaissance of Canaan.'
- source_word: אֲשֶׁר הוּא יֹשֵׁב בָּהּ
  chosen: in which he lives
  alternatives:
  - where he dwells
  - in which he is living
  lexicon: HALOT
  rationale: The singular pronoun refers collectively to the people inhabiting the land, but the Hebrew keeps the singular 'he.' 'Lives' gives natural English while preserving the sense of habitation.
- source_word: הֲטוֹבָה הִוא אִם רָעָה
  chosen: Is it good or bad?
  alternatives:
  - whether it is good or bad
  - Is it fertile or poor?
  lexicon: HALOT
  rationale: A straightforward evaluative question about the quality of the land. 'Good or bad' preserves the broad Hebrew adjectives without narrowing them to agricultural fertility alone.
- source_word: הֶעָרִים
  chosen: the cities
  alternatives:
  - the towns
  lexicon: HALOT
  rationale: '''Cities'' is the normal rendering and fits the contrast with camps and fortified places.'
- source_word: הַבְּמַחֲנִים
  chosen: in camps
  alternatives:
  - in encampments
  - unwalled camps
  lexicon: HALOT
  rationale: מחנה denotes a camp or encampment. The prefixed preposition and article yield 'in the camps,' but idiomatic English in this contrast is simply 'in camps.' The sense is of open or temporary-style settlements as opposed to fortified ones.
- source_word: בְּמִבְצָרִים
  chosen: in fortifications
  alternatives:
  - in strongholds
  - in fortified places
  lexicon: HALOT
  rationale: מבצר refers to fortified places/strongholds. 'Fortifications' preserves the military-defensive sense and matches the contrast with camps.
