id: NUM.6.4
reference: Numbers 6:4
source:
  edition: WLC
  text: כֹּ֖ל יְמֵ֣י נִזְר֑/וֹ מִ/כֹּל֩ אֲשֶׁ֨ר יֵעָשֶׂ֜ה מִ/גֶּ֣פֶן הַ/יַּ֗יִן מֵ/חַרְצַנִּ֛ים
    וְ/עַד זָ֖ג לֹ֥א יֹאכֵֽל־׃
translation:
  text: All the days of his Nazirite vow, he shall not eat anything that is made from
    the grapevine, from the seeds even to the skin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'from the seeds to the skin,' a way of saying every part
      of the grape.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִזְרוֹ
  chosen: his Nazirite vow
  alternatives:
  - his separation
  - his consecration
  lexicon: HALOT
  rationale: The noun נֵזֶר can denote consecration/separation, but in the immediate
    legal context of Numbers 6 it refers specifically to the Nazirite status/vow.
    Rendering it as 'Nazirite vow' makes the referent clear in natural English while
    preserving the technical sense of the institution.
- source_word: מִכֹּל אֲשֶׁר יֵעָשֶׂה
  chosen: anything that is made
  alternatives:
  - nothing that is made
  - anything produced
  lexicon: HALOT
  rationale: The preposition מִן with כֹּל introduces the class of prohibited items,
    and the negated verb later supplies the prohibition. English expresses this most
    naturally as 'he shall not eat anything that is made...' rather than a more wooden
    sequence.
- source_word: מִגֶּפֶן הַיַּיִן
  chosen: from the grapevine
  alternatives:
  - from the wine vine
  - from the vine of wine
  lexicon: HALOT
  rationale: Literally 'from the vine of wine,' an idiom for the grapevine. 'Grapevine'
    is the clearest idiomatic English equivalent and avoids the awkwardly literal
    'wine vine.'
- source_word: מֵחַרְצַנִּים וְעַד זָג
  chosen: from the seeds even to the skin
  alternatives:
  - from the grape seeds to the skin
  - from the kernels to the husk
  lexicon: HALOT
  rationale: This merism specifies the prohibition comprehensively, covering all parts
    of the grape. חַרְצַנִּים is commonly understood as grape seeds/pips, and זָג
    as the skin/husk. 'From the seeds even to the skin' preserves the range idiom
    while remaining readable.
- source_word: לֹא יֹאכֵל
  chosen: he shall not eat
  alternatives:
  - he may not eat
  - he must not eat
  lexicon: HALOT
  rationale: The imperfect with negation in legal material is well rendered as a prohibition.
    'Shall not eat' fits the legal-register style of the passage and preserves the
    force of the command.
- source_word: כֹּל יְמֵי
  chosen: All the days of
  alternatives:
  - Throughout the days of
  - For all the days of
  lexicon: HALOT
  rationale: This phrase marks the full duration of the vow. 'All the days of' is
    both natural and formally close to the Hebrew.
