id: NUM.6.10
reference: Numbers 6:10
source:
  edition: WLC
  text: וּ/בַ/יּ֣וֹם הַ/שְּׁמִינִ֗י יָבִא֙ שְׁתֵּ֣י תֹרִ֔ים א֥וֹ שְׁנֵ֖י בְּנֵ֣י יוֹנָ֑ה אֶל הַ/כֹּהֵ֔ן אֶל פֶּ֖תַח אֹ֥הֶל מוֹעֵֽד־־׃
translation:
  text: And on the eighth day he shall bring two turtledoves or two young pigeons to the priest[a], to the entrance of the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'two young doves'; the Hebrew expression literally reads 'two sons of a dove,' an idiom for young pigeons/doves.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/יּוֹם
  chosen: And on the ... day
  alternatives:
  - And in the ... day
  - Now on the ... day
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition on יוֹם is most naturally rendered temporally as 'and on the ... day' in smooth English, preserving the sequential force from the prior instructions.
- source_word: הַשְּׁמִינִי
  chosen: eighth
  lexicon: HALOT
  rationale: Straightforward ordinal adjective modifying 'day.'
- source_word: יָבִא
  chosen: he shall bring
  alternatives:
  - he must bring
  - he is to bring
  lexicon: HALOT
  rationale: Hiphil imperfect of בוא here functions in legal/instructional context with directive force. 'He shall bring' preserves the prescriptive tone common in English legal-style rendering of Torah without over-paraphrasing.
- source_word: שְׁתֵּי תֹרִים
  chosen: two turtledoves
  alternatives:
  - two turtle doves
  - two doves
  lexicon: HALOT
  rationale: תֹרִים refers specifically to turtledoves, not generic doves. The closed compound 'turtledoves' is standard modern English.
- source_word: אוֹ
  chosen: or
  lexicon: HALOT
  rationale: Simple disjunctive conjunction presenting the permitted alternative offering.
- source_word: שְׁנֵי בְּנֵי יוֹנָה
  chosen: two young pigeons
  alternatives:
  - two sons of a dove
  - two young doves
  lexicon: HALOT
  rationale: The idiom 'sons of a dove' denotes young pigeons/doves used for sacrifice. 'Young pigeons' is the clearest idiomatic English rendering and matches sacrificial terminology.
- source_word: אֶל הַכֹּהֵן
  chosen: to the priest
  alternatives:
  - unto the priest
  lexicon: HALOT
  rationale: Direct object of presentation; 'to the priest' is natural and sufficiently formal.
- source_word: אֶל פֶּתַח אֹהֶל מוֹעֵד
  chosen: to the entrance of the tent of meeting
  alternatives:
  - to the doorway of the tent of meeting
  - to the entrance of the appointed tent
  lexicon: HALOT
  rationale: פֶּתַח is 'entrance/opening.' 'Entrance' is clear modern English. אֹהֶל מוֹעֵד is the standard tabernacle designation 'tent of meeting,' which preserves the Hebrew sense better than paraphrastic alternatives.
