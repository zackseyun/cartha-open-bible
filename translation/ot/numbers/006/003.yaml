id: NUM.6.3
reference: Numbers 6:3
source:
  edition: WLC
  text: מִ/יַּ֤יִן וְ/שֵׁכָר֙ יַזִּ֔יר חֹ֥מֶץ יַ֛יִן וְ/חֹ֥מֶץ שֵׁכָ֖ר לֹ֣א יִשְׁתֶּ֑ה
    וְ/כָל מִשְׁרַ֤ת עֲנָבִים֙ לֹ֣א יִשְׁתֶּ֔ה וַ/עֲנָבִ֛ים לַחִ֥ים וִ/יבֵשִׁ֖ים לֹ֥א
    יֹאכֵֽל־׃
translation:
  text: he shall abstain from wine and strong drink; he shall not drink vinegar from
    wine or vinegar from strong drink, and he shall not drink any juice of grapes
    or eat grapes, fresh or dried.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'any steeped liquid of grapes' or 'any grape juice'; the Hebrew term
      may refer broadly to liquid derived from soaked or processed grapes.
    reason: lexical_alternative
  - marker: b
    text: Or 'grapes, fresh or raisins.' The Hebrew literally says 'grapes, fresh
      and dried.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִיַּיִן
  chosen: from wine
  alternatives:
  - from grape wine
  lexicon: HALOT
  rationale: יַיִן is the standard term for wine. The prefixed מִן with יַזִּיר expresses
    separation/abstinence from it, which is carried by the verbal phrase 'abstain
    from' rather than repeated literally as 'separate himself from.'
- source_word: וְשֵׁכָר
  chosen: and strong drink
  alternatives:
  - and intoxicating drink
  lexicon: HALOT
  rationale: שֵׁכָר denotes an intoxicating beverage other than ordinary wine, commonly
    rendered 'strong drink.' This preserves the distinction from יַיִן without over-specifying
    the exact beverage.
- source_word: יַזִּיר
  chosen: he shall abstain
  alternatives:
  - he shall separate himself
  - he shall keep away
  lexicon: HALOT
  rationale: From נזר in the Hiphil, here in Nazirite legislation it means to abstain
    or keep separate from specified substances. 'Abstain' gives clear modern English
    while preserving the consecratory sense in context.
- source_word: חֹמֶץ יַיִן
  chosen: vinegar made from wine
  alternatives:
  - wine vinegar
  - sour wine
  lexicon: HALOT
  rationale: חֹמֶץ is sour wine/vinegar. 'Vinegar made from wine' makes explicit the
    construct relation and avoids ambiguity with modern condiment usage while preserving
    the fermented grape-product idea.
- source_word: וְחֹמֶץ שֵׁכָר
  chosen: or vinegar made from strong drink
  alternatives:
  - or strong-drink vinegar
  - or sour drink from strong drink
  lexicon: HALOT
  rationale: Parallel to the previous phrase; the rendering keeps the symmetry of
    the Hebrew and shows that even derivative sour beverages are prohibited.
- source_word: וְכָל מִשְׁרַת עֲנָבִים
  chosen: and any juice of grapes
  alternatives:
  - and any grape juice
  - and any infusion of grapes
  - and any steeped liquid of grapes
  lexicon: HALOT
  rationale: מִשְׁרָה refers to liquid produced by soaking/steeping, here from grapes.
    'Juice of grapes' is idiomatic and captures the broad prohibition of grape-derived
    drink, though the Hebrew may be slightly broader than freshly pressed juice.
- source_word: עֲנָבִים
  chosen: grapes
  lexicon: HALOT
  rationale: Standard rendering of the noun for grapes.
- source_word: לַחִים
  chosen: fresh
  alternatives:
  - moist
  - raw
  lexicon: HALOT
  rationale: In contrast with dried grapes, לַחִים means fresh/moist. 'Fresh' is the
    natural English antonym to 'dried' in this food context.
- source_word: וִיבֵשִׁים
  chosen: or dried
  alternatives:
  - or dried ones
  - or raisins
  lexicon: HALOT
  rationale: יבשים means dried. Although 'raisins' is a possible contextual rendering,
    the Hebrew adjective simply contrasts with 'fresh,' so 'dried' preserves the form
    and keeps the pair explicit.
- source_word: לֹא יֹאכֵל
  chosen: or eat
  alternatives:
  - he shall not eat
  lexicon: HALOT
  rationale: The finite prohibition is rendered straightforwardly. In English, the
    subject need not be repeated after the prior coordinated clauses.
