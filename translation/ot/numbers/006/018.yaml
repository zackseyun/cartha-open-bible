theological_decisions:
- issue: Rendering of the cultic term שְׁלָמִים
  chosen_reading: peace offerings
  alternative_readings:
  - fellowship offerings
  - offerings of well-being
  rationale: This is primarily a lexical and ritual decision rather than a doctrinal
    one. 'Peace offerings' preserves the established sacrificial category and avoids
    narrowing the term to table fellowship alone. Alternatives are viable and worth
    preserving because modern readers may better understand the broader sense of well-being
    or fellowship.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
