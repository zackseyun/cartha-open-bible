id: NUM.6.18
reference: Numbers 6:18
source:
  edition: WLC
  text: וְ/גִלַּ֣ח הַ/נָּזִ֗יר פֶּ֛תַח אֹ֥הֶל מוֹעֵ֖ד אֶת רֹ֣אשׁ נִזְר֑/וֹ וְ/לָקַ֗ח
    אֶת שְׂעַר֙ רֹ֣אשׁ נִזְר֔/וֹ וְ/נָתַן֙ עַל הָ/אֵ֔שׁ אֲשֶׁר תַּ֖חַת זֶ֥בַח הַ/שְּׁלָמִֽים־־־־׃
translation:
  text: Then the Nazirite shall shave the head of his consecration at the entrance
    of the tent of meeting, and shall take the hair from the head of his consecration
    and put it on the fire that is under the sacrifice of peace offerings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sacrifice of fellowship offerings' or 'the sacrifice of well-being
      offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָּזִיר
  chosen: Nazirite
  alternatives:
  - one under a vow
  - consecrated one
  lexicon: HALOT
  rationale: The term denotes a person under the specific Nazirite vow described in
    this chapter, so the established transliteration 'Nazirite' best preserves the
    technical ritual sense without flattening it to a generic 'consecrated person.'
- source_word: גִלַּח
  chosen: shall shave
  alternatives:
  - shall shave off
  - must shave
  lexicon: HALOT
  rationale: The verb refers to shaving the hair. 'Shall shave' is natural legal-instruction
    English and preserves the procedural force of the Hebrew wayyiqtol/qatal sequence
    in context.
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  chosen: at the entrance of the tent of meeting
  alternatives:
  - at the doorway of the tent of meeting
  - at the entrance to the tent of meeting
  lexicon: HALOT
  rationale: פֶּתַח is 'entrance/opening.' 'At the entrance of the tent of meeting'
    is a standard, clear rendering for the sanctuary location and fits the ritual
    setting.
- source_word: רֹאשׁ נִזְרוֹ
  chosen: the head of his consecration
  alternatives:
  - his consecrated head
  - the head of his Nazirite vow
  lexicon: HALOT
  rationale: Literally the phrase is 'the head of his consecration/separation.' Rendering
    it this way preserves the link between the hair and the state of consecration
    marked by the vow. A more idiomatic expansion like 'his consecrated head' is possible
    but less transparent to the Hebrew structure.
- source_word: שְׂעַר רֹאשׁ נִזְרוֹ
  chosen: the hair from the head of his consecration
  alternatives:
  - the hair of his consecrated head
  - the hair of the head of his Nazirite vow
  lexicon: HALOT
  rationale: This keeps the repeated Hebrew wording visible while using idiomatic
    English with 'from' to avoid awkwardness. It also preserves the ritual significance
    of the hair as associated with the Nazirite's consecration.
- source_word: נֵזֶר / נִזְרוֹ
  chosen: consecration
  alternatives:
  - separation
  - Nazirite vow
  lexicon: HALOT
  rationale: In this context the noun refers to the state/sign of special dedication
    marked by the Nazirite vow. 'Consecration' communicates sacred dedication more
    clearly in English than 'separation,' while 'Nazirite vow' would be more interpretive
    than the noun itself.
- source_word: הָאֵשׁ
  chosen: the fire
  alternatives:
  - the flame
  lexicon: HALOT
  rationale: The ordinary sense is 'the fire.' No contextual reason requires a more
    figurative rendering.
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  - underneath
  lexicon: HALOT
  rationale: The preposition is spatial. 'Under' is the most direct rendering, likely
    referring to the fire beneath the peace offering sacrifice apparatus or cooking/altar
    arrangement.
- source_word: זֶבַח הַשְּׁלָמִים
  chosen: the sacrifice of peace offerings
  alternatives:
  - the sacrifice of fellowship offerings
  - the peace offering sacrifice
  lexicon: HALOT
  rationale: זֶבַח is 'sacrifice,' and שְׁלָמִים is the technical sacrificial category
    often rendered 'peace offerings.' 'Peace offerings' preserves traditional cultic
    terminology and the likely semantic connection to wholeness/well-being better
    than the more interpretive 'fellowship offerings.'
