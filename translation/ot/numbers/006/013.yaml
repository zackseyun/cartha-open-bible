theological_decisions:
- issue: Meaning of נֵזֶר/נָזִיר terminology in Numbers 6
  chosen_reading: Render with 'Nazirite' and 'separation' language
  alternative_readings:
  - Render more dynamically as 'consecrated person' and 'consecration'
  - Render as 'Nazirite vow' throughout
  rationale: The passage concerns a specific Israelite institution, so retaining 'Nazirite'
    preserves the technical category. For נִזְרוֹ, 'separation' reflects the lexical
    core of being set apart, preserving the chapter's theological emphasis on consecrated
    separation without importing later doctrinal nuance.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Voice of יָבִיא אֹתוֹ
  chosen_reading: Use English passive 'he shall be brought'
  alternative_readings:
  - Use active 'he shall bring him'
  - Use indefinite active 'someone shall bring him'
  rationale: The Hebrew form is formally active, but the referent of the subject is
    not explicit and a literal active rendering is awkward in English. The passive
    preserves the ritual-procedural force and keeps focus on the Nazirite's presentation
    at the sanctuary. This is a translation-level decision, not a doctrinal one.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
