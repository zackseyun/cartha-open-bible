id: NUM.6.13
reference: Numbers 6:13
source:
  edition: WLC
  text: וְ/זֹ֥את תּוֹרַ֖ת הַ/נָּזִ֑יר בְּ/י֗וֹם מְלֹאת֙ יְמֵ֣י נִזְר֔/וֹ יָבִ֣יא אֹת֔/וֹ
    אֶל פֶּ֖תַח אֹ֥הֶל מוֹעֵֽד־׃
translation:
  text: 'And this is the law of the Nazirite: on the day the days of his separation
    are completed, he shall be brought to the entrance of the tent of meeting.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'he shall bring him to the entrance of the tent of meeting.'
      The Hebrew verb is active ('bring'), but the subject is not explicit in the
      verse.
    reason: lexical_alternative
  - marker: b
    text: '''The days of his separation'' may also be rendered ''the days of his Nazirite
      vow'' or ''the period of his consecration.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/זֹאת
  chosen: And this is
  alternatives:
  - Now this is
  - This is
  lexicon: HALOT
  rationale: The conjunction ו plus demonstrative naturally introduces a legal prescription.
    'And this is' preserves the connective force and the formal legal style.
- source_word: תּוֹרַת
  chosen: the law of
  alternatives:
  - the instruction for
  - the regulation for
  lexicon: HALOT
  rationale: תּוֹרָה in priestly/legal contexts commonly denotes law or instruction.
    Here a specific ritual prescription follows, so 'the law of' best preserves the
    formal legal sense without excessive paraphrase.
- source_word: הַנָּזִיר
  chosen: the Nazirite
  alternatives:
  - the one under a Nazirite vow
  - the consecrated one
  lexicon: HALOT
  rationale: '''Nazirite'' is the standard transliteration for the technical term
    נָזִיר in Numbers 6 and preserves the institution-specific meaning better than
    a generic paraphrase.'
- source_word: בְּיוֹם
  chosen: on the day
  alternatives:
  - when
  lexicon: HALOT
  rationale: A formal temporal expression is used in Hebrew. 'On the day' preserves
    the idiom more closely than the smoother but less formal 'when.'
- source_word: מְלֹאת
  chosen: are completed
  alternatives:
  - are fulfilled
  - come to an end
  lexicon: HALOT
  rationale: The infinitive construct from מלא conveys completion/fullness. In English,
    'are completed' naturally expresses the finishing of the vowed period.
- source_word: יְמֵי נִזְרוֹ
  chosen: the days of his separation
  alternatives:
  - the days of his Nazirite vow
  - the period of his consecration
  lexicon: HALOT
  rationale: נֵזֶר here refers to the state/vow of separation consecrating the Nazirite.
    'Separation' reflects the root idea and matches the chapter's emphasis on being
    set apart, while avoiding over-interpretation. The alternative 'Nazirite vow'
    is possible but slightly more interpretive.
- source_word: יָבִיא אֹתוֹ
  chosen: he shall be brought
  alternatives:
  - he shall bring him
  - one shall bring him
  lexicon: HALOT
  rationale: Although the consonantal form is Hiphil 3ms ('he shall bring'), the object
    suffix 'him' creates an awkward shift if rendered woodenly. In context the Nazirite
    is the one presented at the sanctuary, and English passive idiom best captures
    the procedural sense without forcing an unidentified subject. This is a documented
    contextual smoothing from the Hebrew form.
- source_word: אֶל פֶּתַח
  chosen: to the entrance
  alternatives:
  - to the doorway
  - to the opening
  lexicon: HALOT
  rationale: פֶּתַח denotes an entrance/opening. 'Entrance' is natural modern English
    for the sanctuary setting and slightly more formal than 'doorway.'
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  lexicon: HALOT
  rationale: This is the standard rendering of the tabernacle designation in the Pentateuch
    and accurately reflects the Hebrew construct phrase.
