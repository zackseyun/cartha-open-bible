id: NUM.6.27
reference: Numbers 6:27
source:
  edition: WLC
  text: וְ/שָׂמ֥וּ אֶת שְׁמִ֖/י עַל בְּנֵ֣י יִשְׂרָאֵ֑ל וַ/אֲנִ֖י אֲבָרֲכֵֽ/ם־־׃פ
translation:
  text: So they shall put my name on the sons of Israel[b][a], and I myself will bless them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the Israelites'' or ''the people of Israel.'' Hebrew: ''the sons of Israel.'''
    reason: lexical_alternative
  - marker: b
    text: The expression 'put my name on' likely signifies invoking the LORD's covenant name over them and marking them as belonging to him.
    reason: cultural_note
lexical_decisions:
- source_word: וְשָׂמוּ
  chosen: So they shall put
  alternatives:
  - And they shall put
  - Thus they shall place
  lexicon: HALOT
  rationale: שׂוּם commonly means 'put, place, set.' The prefixed conjunction here is rendered 'So' to connect this verse as the result/instruction flowing from the priestly blessing just given, while preserving the future-like force of the Hebrew verbal form.
- source_word: אֶת שְׁמִי
  chosen: my name
  lexicon: HALOT
  rationale: Direct object marker plus 'my name.' 'Name' should be retained literally because it carries covenantal and representative significance; paraphrases such as 'my authority' or 'my blessing' would overinterpret the idiom.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: 'The preposition is most naturally rendered ''on/upon'' in this idiom: placing the divine name on the people. ''On'' is idiomatic modern English and preserves the concrete metaphor.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Per the gender-accurate policy, the masculine form is preserved where it refers to the covenant people corporately. More idiomatic alternatives are possible, but the literal form better reflects the Hebrew expression and its continuity in the Pentateuch.
- source_word: וַאֲנִי
  chosen: and I myself
  alternatives:
  - and I
  - then I
  lexicon: HALOT
  rationale: The explicit independent pronoun adds emphasis. 'I myself' brings out the emphatic force without adding content beyond the Hebrew.
- source_word: אֲבָרֲכֵם
  chosen: will bless them
  alternatives:
  - shall bless them
  lexicon: HALOT
  rationale: From ברך, 'to bless.' Future English best conveys the divine response promised here. 'Them' refers back to the sons of Israel collectively.
