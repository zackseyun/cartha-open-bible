theological_decisions:
- issue: Meaning of placing God's name on Israel
  chosen_reading: Retain the concrete covenantal expression 'put my name on' without interpretive expansion.
  alternative_readings:
  - invoke my name over
  - mark them as belonging to me
  rationale: The phrase likely conveys covenant identification, divine ownership, and blessing mediated through the priestly benediction, but the text itself states this through the idiom of placing the divine name on the people. The translation preserves that theological richness without collapsing it into one explanatory paraphrase.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The Hebrew is grammatically masculine plural in a standard covenantal ethnonym. Following the gender-accurate policy, the translation keeps the masculine form rather than neutralizing it, while recognizing that it refers to the whole covenant community.
  doctrine_reference: Translation philosophy §4
