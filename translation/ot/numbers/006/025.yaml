theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file explicitly sets 'the LORD' as the default rendering
    for יְהוָה. This also aligns with the blessing's liturgical register in English
    while preserving covenantal reference.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Anthropomorphic idiom 'his face shine'
  chosen_reading: Preserve the idiom literally in the main text
  alternative_readings:
  - let his presence shine on you
  - look favorably on you
  rationale: The Hebrew blessing uses embodied imagery for divine favor. Preserving
    the idiom maintains the theological-poetic texture without forcing a reduction
    to abstract interpretation. The favorable sense is clear in context.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s
    plain sense; do not paraphrase beyond what the source warrants'
