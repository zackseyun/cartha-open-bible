id: NUM.6.15
reference: Numbers 6:15
source:
  edition: WLC
  text: וְ/סַ֣ל מַצּ֗וֹת סֹ֤לֶת חַלֹּת֙ בְּלוּלֹ֣ת בַּ/שֶּׁ֔מֶן וּ/רְקִיקֵ֥י מַצּ֖וֹת
    מְשֻׁחִ֣ים בַּ/שָּׁ֑מֶן וּ/מִנְחָתָ֖/ם וְ/נִסְכֵּי/הֶֽם׃
translation:
  text: 'and a basket of unleavened bread: fine flour cakes mixed with oil, and unleavened
    wafers anointed with oil, along with their grain offering and their drink offerings.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unleavened cakes' for the first occurrence of מַצּוֹת; the Hebrew term
      is broad, and the verse then specifies cakes and wafers within that category.
    reason: lexical_alternative
  - marker: b
    text: Or 'spread with oil' for 'anointed with oil'; the Hebrew verb is the usual
      word for anointing, but here it describes the preparation of the wafers.
    reason: lexical_alternative
lexical_decisions:
- source_word: סַל
  chosen: basket
  alternatives:
  - basketful
  lexicon: HALOT
  rationale: The noun denotes a container, here the vessel holding the unleavened
    items. 'Basket' is the plain and natural rendering.
- source_word: מַצּוֹת
  chosen: unleavened bread
  alternatives:
  - unleavened cakes
  - unleavened things
  lexicon: HALOT
  rationale: The term broadly denotes unleavened bread/products. Because the verse
    then specifies cakes and wafers, rendering the first occurrence generically as
    'unleavened bread' avoids redundancy while preserving the category.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  - fine wheat flour
  lexicon: HALOT
  rationale: Standard sacrificial term for finely milled flour. 'Fine flour' is conventional
    and accurate.
- source_word: חַלֹּת
  chosen: cakes
  alternatives:
  - loaves
  lexicon: HALOT
  rationale: In offering contexts this refers to shaped bread-cakes rather than large
    modern loaves. 'Cakes' fits the ritual food context.
- source_word: בְּלוּלֹת בַּשֶּׁמֶן
  chosen: mixed with oil
  alternatives:
  - kneaded with oil
  - mingled with oil
  lexicon: HALOT
  rationale: The participle indicates the flour cakes are combined/mixed with oil.
    'Mixed with oil' is clear modern English and sufficiently formal.
- source_word: רְקִיקֵי מַצּוֹת
  chosen: unleavened wafers
  alternatives:
  - thin unleavened cakes
  lexicon: HALOT
  rationale: רְקִיקִים are thin flat pieces used in offerings; 'wafers' best captures
    the thinness and established cultic sense.
- source_word: מְשֻׁחִים בַּשָּׁמֶן
  chosen: anointed with oil
  alternatives:
  - spread with oil
  - smeared with oil
  lexicon: HALOT
  rationale: The passive participle from משׁח commonly means 'anointed.' In this food-offering
    context it refers to application of oil to the wafers. 'Anointed' preserves the
    lexical link without overstating theological significance.
- source_word: מִנְחָתָם
  chosen: their grain offering
  alternatives:
  - their offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial legislation specifically denotes the grain offering.
    The 3mp suffix refers back to the associated sacrificial items/animals in the
    larger context, so 'their grain offering' is the most literal rendering.
- source_word: נִסְכֵּיהֶם
  chosen: their drink offerings
  alternatives:
  - their libations
  lexicon: HALOT
  rationale: The noun denotes poured liquid offerings accompanying sacrifices. 'Drink
    offerings' is standard, transparent English; 'libations' is possible but less
    accessible.
