theological_decisions:
- issue: Meaning of חַטָּאת in priestly sacrificial context
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The term can be understood as either the offering dealing with sin or
    more specifically purification from impurity. Because the immediate context involves
    defilement by contact with death, 'purification offering' has lexical merit; however,
    'sin offering' remains the most recognizable and broadly accurate English rendering
    for the sacrificial category. The alternative is preserved in a footnote for transparency.
  doctrine_reference: Translation philosophy §3, §5
- issue: Referent of הַנָּפֶשׁ
  chosen_reading: dead person
  alternative_readings:
  - corpse
  rationale: Literally 'the person/soul,' but in this legal context the expression
    refers to a dead human body/person whose death defiles the Nazirite. Rendering
    it woodenly as 'soul' or 'person' would obscure the sense. 'Dead person' preserves
    the human referent better than the more objectifying 'corpse.'
  doctrine_reference: Translation philosophy §1, §6
