id: NUM.6.11
reference: Numbers 6:11
source:
  edition: WLC
  text: וְ/עָשָׂ֣ה הַ/כֹּהֵ֗ן אֶחָ֤ד לְ/חַטָּאת֙ וְ/אֶחָ֣ד לְ/עֹלָ֔ה וְ/כִפֶּ֣ר עָלָ֔י/ו
    מֵ/אֲשֶׁ֥ר חָטָ֖א עַל הַ/נָּ֑פֶשׁ וְ/קִדַּ֥שׁ אֶת רֹאשׁ֖/וֹ בַּ/יּ֥וֹם הַ/הֽוּא־־׃
translation:
  text: And the priest shall offer one as a sin offering and one as a burnt offering,
    and he shall make atonement for him because he sinned in regard to the dead person,
    and he shall consecrate his head that same day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one for a purification offering.' The Hebrew term חַטָּאת can denote
      the sin/purification offering, especially in ritual-impurity contexts.
    reason: lexical_alternative
  - marker: b
    text: Literally 'upon the נפשׁ'; here, in context, it refers to a dead person,
      that is, a corpse that caused defilement.
    reason: cultural_note
lexical_decisions:
- source_word: וְעָשָׂה
  chosen: shall offer
  alternatives:
  - shall make
  - shall prepare
  lexicon: HALOT
  rationale: Although the verb is literally 'do/make,' in sacrificial context with
    specified offerings it idiomatically means to offer/present the sacrifice. 'Shall
    offer' is natural English and reflects cultic usage.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of the cultic official; no contextual reason to vary.
- source_word: אֶחָד לְחַטָּאת
  chosen: one as a sin offering
  alternatives:
  - one for a purification offering
  lexicon: HALOT
  rationale: חַטָּאת can denote either 'sin' or the offering associated with sin/purification.
    In sacrificial legislation it commonly refers to the offering. 'Sin offering'
    is the conventional and still clear rendering; 'purification offering' is a viable
    alternative but less established in English Bible usage.
- source_word: וְאֶחָד לְעֹלָה
  chosen: one as a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard whole burnt offering. 'As a burnt offering' fits
    the sacrificial syntax parallel to the previous phrase.
- source_word: וְכִפֶּר עָלָיו
  chosen: he shall make atonement for him
  alternatives:
  - he shall purge him
  - he shall effect expiation for him
  lexicon: HALOT
  rationale: כפר in priestly sacrificial contexts is best rendered 'make atonement.'
    This preserves the cultic and theological force without importing a narrower theory
    of atonement.
- source_word: מֵאֲשֶׁר חָטָא
  chosen: because he sinned
  alternatives:
  - for what he sinned
  - from that he sinned
  lexicon: HALOT
  rationale: The phrase explains the ground for atonement. 'Because he sinned' gives
    the causal sense naturally in English.
- source_word: עַל הַנָּפֶשׁ
  chosen: in regard to the dead person
  alternatives:
  - because of the corpse
  - against the person
  - by the dead body
  lexicon: HALOT
  rationale: In Nazirite law, נֶפֶשׁ here is an idiom for a dead person/corpse, as
    shown by the immediate context (vv. 6–12). 'In regard to the dead person' preserves
    the preposition עַל without over-specifying beyond the context. 'Corpse' is possible
    but slightly harsher in English style.
- source_word: וְקִדַּשׁ אֶת רֹאשׁוֹ
  chosen: and he shall consecrate his head
  alternatives:
  - and he shall reconsecrate his head
  - and he shall sanctify his head
  lexicon: HALOT
  rationale: The Nazirite's head/hair symbolizes the consecrated status of the vow.
    'Consecrate' is the clearest modern English equivalent. 'Reconsecrate' captures
    the renewal idea from context, but the Hebrew verb itself simply says 'consecrate,'
    so the contextual nuance is left implicit.
- source_word: בַּיּוֹם הַהוּא
  chosen: that same day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: '''That same day'' conveys the immediacy of the ritual action in idiomatic
    English, while remaining faithful to the temporal phrase.'
