id: NUM.6.7
reference: Numbers 6:7
source:
  edition: WLC
  text: לְ/אָבִ֣י/ו וּ/לְ/אִמּ֗/וֹ לְ/אָחִי/ו֙ וּ/לְ/אַ֣חֹת֔/וֹ לֹא יִטַּמָּ֥א לָ/הֶ֖ם
    בְּ/מֹתָ֑/ם כִּ֛י נֵ֥זֶר אֱלֹהָ֖י/ו עַל רֹאשֽׁ/וֹ־־׃
translation:
  text: He shall not make himself unclean for them at their death, not even for his
    father or his mother, for his brother or his sister, because the consecration
    of his God is on his head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He shall not become unclean for them when they die.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew nezer; in the Nazirite context this denotes the sign/state of consecration
      or separation to God, symbolized by the hair on his head.
    reason: cultural_note
lexical_decisions:
- source_word: לְאָבִיו ... וּלְאִמּוֹ ... לְאָחִיו ... וּלְאַחֹתוֹ
  chosen: not even for his father or his mother, for his brother or his sister
  alternatives:
  - for his father, or for his mother, for his brother, or for his sister
  - with respect to his father ... mother ... brother ... sister
  lexicon: HALOT
  rationale: The prepositional phrases are fronted for emphasis. In English, moving
    them after the main prohibition with 'not even for' preserves the emphatic force
    and reads naturally. Singular kinship terms should remain singular and gender-accurate,
    matching the Hebrew.
- source_word: לֹא יִטַּמָּא
  chosen: He shall not make himself unclean
  alternatives:
  - he shall not become unclean
  - he shall not defile himself
  lexicon: HALOT
  rationale: 'The Hitpael of טמא here is reflexive: the Nazirite is not to render
    himself ritually unclean. ''Make himself unclean'' preserves the reflexive nuance
    more clearly than the simpler ''become unclean.'' ''Defile himself'' is possible
    but can sound morally charged rather than specifically ritual.'
- source_word: לָהֶם
  chosen: for them
  alternatives:
  - because of them
  - on account of them
  lexicon: HALOT
  rationale: The pronoun refers back to the listed relatives. 'For them' is concise
    and idiomatic in the context of ritual impurity incurred on behalf of deceased
    kin.
- source_word: בְּמֹתָם
  chosen: at their death
  alternatives:
  - when they die
  - upon their death
  - for the dead
  lexicon: HALOT
  rationale: The phrase denotes the occasion of death as the circumstance in which
    impurity would be contracted. 'At their death' is a natural rendering. 'When they
    die' is also possible, but 'at their death' better preserves the nominal form.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: This introduces the reason for the prohibition. 'Because' is clearer
    in modern English than 'for' while preserving the causal sense.
- source_word: נֵזֶר
  chosen: the consecration
  alternatives:
  - the Nazirite dedication
  - the separation
  - the crown
  lexicon: HALOT
  rationale: In the Nazirite context, נֵזֶר denotes the state/sign of consecration
    or separation to God, not merely a physical crown. 'Consecration' communicates
    the cultic meaning clearly. The hair is the visible token, but the term here points
    to the consecrated status.
- source_word: אֱלֹהָיו
  chosen: his God
  alternatives:
  - God
  lexicon: HALOT
  rationale: 'The suffix is explicit in Hebrew and should be preserved: the consecration
    belongs to or is related to ''his God.'' This also maintains the covenantal-personal
    force of the phrase.'
- source_word: עַל רֹאשׁוֹ
  chosen: is on his head
  alternatives:
  - rests on his head
  - is upon his head
  lexicon: HALOT
  rationale: A straightforward rendering preserves the concrete imagery. 'On his head'
    likely alludes to the Nazirite hair as the visible sign of consecration, but the
    text itself should remain concise.
