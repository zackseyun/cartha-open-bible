theological_decisions:
- issue: Nature of impurity in Nazirite legislation
  chosen_reading: Render the prohibition in ritual/cultic terms rather than moral
    terms.
  alternative_readings:
  - Use morally freighted language such as 'defile himself' without qualification
  rationale: The context is Nazirite purity law concerning corpse contamination. The
    translation should not imply personal sinfulness beyond what the text states;
    it concerns ritual uncleanness associated with death.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make.'
