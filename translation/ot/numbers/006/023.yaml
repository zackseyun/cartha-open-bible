id: NUM.6.23
reference: Numbers 6:23
source:
  edition: WLC
  text: דַּבֵּ֤ר אֶֽל אַהֲרֹן֙ וְ/אֶל בָּנָ֣י/ו לֵ/אמֹ֔ר כֹּ֥ה תְבָרֲכ֖וּ אֶת בְּנֵ֣י יִשְׂרָאֵ֑ל אָמ֖וֹר לָ/הֶֽם־־־׃ס
translation:
  text: Speak to Aaron and to his sons[a], saying, ‘Thus you shall bless the sons of Israel. Say to them,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “the Israelites” or “the people of Israel.” The Hebrew reads “the sons of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  - Address
  lexicon: HALOT
  rationale: Piel imperative 2ms of דבר, a direct command to Moses. 'Speak' is the standard and sufficiently direct rendering in this instruction formula.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Marks the addressee of the command. 'To' is natural modern English.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Personal name is transliterated per translation philosophy.
- source_word: וְאֶל בָּנָיו
  chosen: and to his sons
  alternatives:
  - and to his children
  lexicon: HALOT
  rationale: בָּנִים here refers specifically to Aaron's male priestly descendants in context, so 'sons' is more accurate than the broader 'children.' This also follows the gender-accurate principle.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and say
  - to say
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the content of the speech. 'Saying' preserves the Hebrew discourse structure cleanly.
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is how
  - So
  lexicon: HALOT
  rationale: Introduces the prescribed formula. 'Thus' is concise and suitably formal, while still natural in English.
- source_word: תְבָרֲכוּ
  chosen: you shall bless
  alternatives:
  - you are to bless
  - you must bless
  lexicon: HALOT
  rationale: Piel imperfect 2mp of ברך in an instructional context. 'You shall bless' preserves the directive force without overinterpreting it as either mere future or stronger obligation.
- source_word: אֶת בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'the sons of Israel.' Because the phrase is a standard covenantal ethnonym, 'the sons of Israel' preserves the Hebrew form and familial-covenantal nuance. A more idiomatic alternative is possible, but the literal rendering remains clear here.
- source_word: אָמֹר לָהֶם
  chosen: say to them
  alternatives:
  - you shall say to them
  - saying to them
  lexicon: HALOT
  rationale: Introduces the exact words of the blessing in the following verse. 'Say to them' is straightforward and preserves the imperative force.
