theological_decisions:
- issue: Gendered covenantal expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the people of Israel
  - the Israelites
  rationale: Following the gender-accurate principle, the masculine plural construct is preserved where it carries the covenantal family identity of Israel. Since the phrase is also a conventional national designation, alternatives are viable, but the more literal rendering best exposes the source wording here.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Priestly instruction formula
  chosen_reading: Thus you shall bless
  alternative_readings:
  - This is how you are to bless
  rationale: The Hebrew gives a formal prescription for the Aaronic blessing. 'Thus you shall bless' preserves the liturgical and authoritative tone without paraphrasing beyond the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy, optimal equivalence
