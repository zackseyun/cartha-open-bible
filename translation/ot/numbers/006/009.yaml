id: NUM.6.9
reference: Numbers 6:9
source:
  edition: WLC
  text: וְ/כִֽי יָמ֨וּת מֵ֤ת עָלָי/ו֙ בְּ/פֶ֣תַע פִּתְאֹ֔ם וְ/טִמֵּ֖א רֹ֣אשׁ נִזְר֑/וֹ
    וְ/גִלַּ֤ח רֹאשׁ/וֹ֙ בְּ/י֣וֹם טָהֳרָת֔/וֹ בַּ/יּ֥וֹם הַ/שְּׁבִיעִ֖י יְגַלְּחֶֽ/נּוּ־׃
translation:
  text: And if someone dies suddenly beside him, and he defiles his consecrated head,
    then he shall shave his head on the day of his cleansing; on the seventh day he
    shall shave it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his head of consecration.' The Hebrew expression literally links the
      head with his Nazirite consecration.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says literally, 'if a dead person dies beside him, suddenly suddenly,'
      an idiom expressing an abrupt, unexpected death in his immediate presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: And if
  alternatives:
  - But if
  - Now if
  lexicon: HALOT
  rationale: Introduces a conditional case within the Nazirite legislation. 'And if'
    preserves the connective force of ו plus the conditional sense of כי in context.
- source_word: יָמוּת מֵת
  chosen: someone dies
  alternatives:
  - a dead person dies
  - a person dies
  lexicon: HALOT
  rationale: The construction uses the verb 'die' with the cognate noun 'dead person'
    idiomatically to indicate that a person dies. English smooths the idiom naturally
    as 'someone dies' rather than preserving an awkward cognate expression.
- source_word: עָלָיו
  chosen: beside him
  alternatives:
  - near him
  - upon him
  lexicon: HALOT
  rationale: With death impurity context, על here indicates proximity to the Nazirite
    rather than physical contact in the narrow sense. 'Beside him' communicates that
    the death occurs in his immediate presence, causing defilement.
- source_word: בפתע פתאם
  chosen: suddenly
  alternatives:
  - in an instant, unexpectedly
  - all at once
  lexicon: HALOT
  rationale: The paired adverbial expression intensifies abruptness and unexpectedness.
    'Suddenly' captures the force in concise modern English without overtranslation.
- source_word: וְטִמֵּא
  chosen: and he defiles
  alternatives:
  - and it defiles
  - thus he becomes defiled
  lexicon: HALOT
  rationale: The verb is transitive in form, with the dead person's sudden death effectively
    defiling the Nazirite's head of consecration. English keeps the Hebrew sequence
    by rendering the subject generically as 'he' referring to the dying person/evental
    circumstance, while the object is the Nazirite's consecrated head.
- source_word: רֹאשׁ נִזְרוֹ
  chosen: his consecrated head
  alternatives:
  - the head of his consecration
  - his dedicated head
  lexicon: HALOT
  rationale: נזר refers to the Nazirite's consecration/dedication, represented especially
    in the uncut hair. 'His consecrated head' is readable modern English that preserves
    the ritual significance better than the more wooden 'head of his consecration.'
- source_word: וְגִלַּח רֹאשׁוֹ
  chosen: then he shall shave his head
  alternatives:
  - and he shall shave his head
  lexicon: HALOT
  rationale: The clause gives the required response after defilement. 'Then' makes
    the procedural sequence explicit in English while remaining faithful to the Hebrew
    narrative-legal flow.
- source_word: בְּיוֹם טָהֳרָתוֹ
  chosen: on the day of his cleansing
  alternatives:
  - on the day of his purification
  - when he becomes clean
  lexicon: HALOT
  rationale: טהרה here refers to ritual purification/cleansing after impurity. 'Cleansing'
    is accessible modern English; 'purification' is possible but slightly more technical.
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  chosen: on the seventh day
  alternatives:
  - on day seven
  lexicon: HALOT
  rationale: A straightforward temporal specification. Traditional and clear in English.
- source_word: יְגַלְּחֶנּוּ
  chosen: he shall shave it
  alternatives:
  - he shall shave him
  - he shall shave his head
  lexicon: HALOT
  rationale: The pronominal suffix refers back to 'his head.' English can either repeat
    the noun or use 'it'; using 'it' preserves the Hebrew anaphora while avoiding
    unnecessary repetition after the prior clause.
