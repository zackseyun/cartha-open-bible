theological_decisions:
- issue: Nature of Nazirite defilement language
  chosen_reading: Render נזר in ritual-consecration terms as 'consecrated head' rather
    than importing later theological categories.
  alternative_readings:
  - his separated head
  - the head of his vow
  rationale: The verse concerns ritual impurity interrupting Nazirite consecration.
    'Consecrated head' preserves the cultic significance of the hair/head without
    overstating the vow language in this clause.
  doctrine_reference: Translation philosophy §§1, 5
