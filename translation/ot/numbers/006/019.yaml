id: NUM.6.19
reference: Numbers 6:19
source:
  edition: WLC
  text: וְ/לָקַ֨ח הַ/כֹּהֵ֜ן אֶת הַ/זְּרֹ֣עַ בְּשֵׁלָה֮ מִן הָ/אַיִל֒ וְֽ/חַלַּ֨ת
    מַצָּ֤ה אַחַת֙ מִן הַ/סַּ֔ל וּ/רְקִ֥יק מַצָּ֖ה אֶחָ֑ד וְ/נָתַן֙ עַל כַּפֵּ֣י הַ/נָּזִ֔יר
    אַחַ֖ר הִֽתְגַּלְּח֥/וֹ אֶת נִזְרֽ/וֹ־־־־־׃
translation:
  text: Then the priest shall take the boiled shoulder from the ram, one unleavened
    loaf from the basket, and one unleavened wafer, and put them on the palms of the
    Nazirite after he has shaved his consecrated head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'after he has shaved his consecration.' In context this
      refers to the hair/head that marked his Nazirite consecration.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  chosen: Then ... shall take
  alternatives:
  - and ... shall take
  - and took
  lexicon: HALOT
  rationale: Converted the Hebrew waw + qatal in procedural legal context into English
    sequential future/modal style ('Then ... shall take') for natural legislative
    instruction while preserving the action sequence.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering for the cultic officiant; definite article preserved.
- source_word: הַזְּרֹעַ
  chosen: the ... shoulder
  alternatives:
  - foreleg
  - upper leg
  lexicon: HALOT
  rationale: In sacrificial contexts זְרוֹעַ refers to the foreleg/shoulder portion
    given to the priest. 'Shoulder' is idiomatic and widely understood in English,
    while still matching the sacrificial cut.
- source_word: בְּשֵׁלָה
  chosen: boiled
  alternatives:
  - cooked
  - sodden
  lexicon: HALOT
  rationale: The adjective specifies that this portion is boiled/cooked. 'Boiled'
    is the most precise and transparent rendering in this ritual context.
- source_word: מִן הָאַיִל
  chosen: from the ram
  alternatives:
  - of the ram
  lexicon: HALOT
  rationale: The preposition מן is naturally rendered 'from' here, indicating the
    source animal from which the shoulder is taken.
- source_word: חַלַּת מַצָּה אַחַת
  chosen: one unleavened loaf
  alternatives:
  - one cake of unleavened bread
  - one unleavened cake
  lexicon: HALOT
  rationale: חלה is a round loaf/cake; 'loaf' communicates a bread item more naturally
    in modern English, while 'unleavened' preserves מַצָּה.
- source_word: מִן הַסַּל
  chosen: from the basket
  alternatives:
  - out of the basket
  lexicon: HALOT
  rationale: Straightforward prepositional phrase; 'basket' is the normal rendering
    of סל.
- source_word: וּרְקִיק מַצָּה אֶחָד
  chosen: and one unleavened wafer
  alternatives:
  - and one unleavened thin cake
  - and one wafer of unleavened bread
  lexicon: HALOT
  rationale: רקיק denotes a thin bread item; 'wafer' best captures the thinness and
    ritual bread sense in concise modern English.
- source_word: וְנָתַן
  chosen: and put
  alternatives:
  - and place
  - and set
  lexicon: HALOT
  rationale: Simple concrete action; 'put' is natural modern English for placing the
    items onto the Nazirite's hands.
- source_word: עַל כַּפֵּי
  chosen: on the palms of
  alternatives:
  - on the hands of
  - into the hands of
  lexicon: HALOT
  rationale: The dual/plural construct of כף refers specifically to the palms/hollow
    of the hands. 'On the palms of' preserves the physical image more exactly than
    the broader 'hands.'
- source_word: הַנָּזִיר
  chosen: the Nazirite
  alternatives:
  - the one under the Nazirite vow
  lexicon: HALOT
  rationale: Standard transliterated term for the consecrated person under this vow;
    clearer and more concise than an explanatory paraphrase.
- source_word: אַחַר הִתְגַּלְּחוֹ
  chosen: after he has shaved
  alternatives:
  - after his shaving
  - after he shaved
  lexicon: HALOT
  rationale: The infinitive construct with suffix after אַחַר is best rendered as
    a temporal clause. English perfect ('has shaved') fits the prior completed action
    relative to the main ritual act.
- source_word: אֶת נִזְרוֹ
  chosen: his consecrated head
  alternatives:
  - his consecration
  - the hair of his consecration
  - his Nazirite head
  lexicon: HALOT
  rationale: Literally the phrase refers to 'his consecration,' but in this context
    it is shorthand for the hair/head bearing the Nazirite consecration, as shown
    by the shaving action. 'His consecrated head' preserves the ritual sense without
    awkwardness. The more explicit alternative is preserved in a footnote because
    the Hebrew is compressed.
