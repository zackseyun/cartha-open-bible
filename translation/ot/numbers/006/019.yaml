theological_decisions:
- issue: Rendering of נִזְרוֹ in Nazirite ritual context
  chosen_reading: his consecrated head
  alternative_readings:
  - his consecration
  - the hair of his consecration
  rationale: The text refers to the Nazirite's consecrated status as embodied in the
    uncut hair/head now being shaved. Rendering it woodenly as 'his consecration'
    in English would sound abstract and obscure the ritual action. The chosen wording
    keeps the embodied ritual meaning while avoiding doctrinal overinterpretation.
  doctrine_reference: Translation philosophy §§1, 3, 6
