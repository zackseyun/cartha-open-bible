id: NUM.4.24
reference: Numbers 4:24
source:
  edition: WLC
  text: זֹ֣את עֲבֹדַ֔ת מִשְׁפְּחֹ֖ת הַ/גֵּרְשֻׁנִּ֑י לַ/עֲבֹ֖ד וּ/לְ/מַשָּֽׂא׃
translation:
  text: This is the service of the families of the Gershonites[a], for serving and for carrying.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for serving and for bearing burdens.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: This is
  alternatives:
  - This
  lexicon: HALOT
  rationale: Demonstrative feminine singular introducing the statement; in English, 'This is' naturally supplies the copula implied in Hebrew nominal clauses.
- source_word: עֲבֹדַת
  chosen: the service
  alternatives:
  - the work
  - the duty
  lexicon: HALOT
  rationale: From עֲבֹדָה, denoting service/work/duty. 'Service' fits the cultic and Levitical context without over-specifying manual labor alone.
- source_word: מִשְׁפְּחֹת
  chosen: of the families
  alternatives:
  - of the clans
  lexicon: HALOT
  rationale: The plural construct refers to family groupings within the Gershonites. 'Families' is the most transparent rendering; 'clans' is possible but less literal.
- source_word: הַגֵּרְשֻׁנִּי
  chosen: the Gershonites
  alternatives:
  - the Gershonite clan
  - the Gershonite
  lexicon: HALOT
  rationale: Collective gentilic referring to the descendants/group of Gershon. English idiom prefers the plural ethnicon 'Gershonites' after 'families of.'
- source_word: לַעֲבֹד
  chosen: for serving
  alternatives:
  - to serve
  - for work
  lexicon: HALOT
  rationale: Infinitive construct of עבד with prefixed ל expressing purpose/function. 'For serving' preserves the parallel structure with the following phrase and links naturally to the preceding statement of duty.
- source_word: וּלְמַשָּׂא
  chosen: and for carrying loads
  alternatives:
  - and for bearing burdens
  - and for transport
  lexicon: HALOT
  rationale: מַשָּׂא denotes load, burden, or what is carried. In this tabernacle-duty context, 'carrying loads' communicates the practical task clearly in modern English while retaining the sense of burden-bearing.
