id: NUM.1.40
reference: Numbers 1:40
source:
  edition: WLC
  text: לִ/בְנֵ֣י אָשֵׁ֔ר תּוֹלְדֹתָ֥/ם לְ/מִשְׁפְּחֹתָ֖/ם לְ/בֵ֣ית אֲבֹתָ֑/ם בְּ/מִסְפַּ֣ר
    שֵׁמֹ֗ת מִ/בֶּ֨ן עֶשְׂרִ֤ים שָׁנָה֙ וָ/מַ֔עְלָ/ה כֹּ֖ל יֹצֵ֥א צָבָֽא׃
translation:
  text: 'For the sons of Asher, by their generations, by their clans, by their fathers’
    houses, according to the number of names, from twenty years old and upward, every
    man going out to war:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'every going out to war,' an idiom for those eligible
      for military service.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי אָשֵׁר
  chosen: For the sons of Asher
  alternatives:
  - For the descendants of Asher
  - Of the sons of Asher
  lexicon: HALOT
  rationale: לְ here introduces the tribal heading in the census formula. 'Sons of
    Asher' is a transparent, conventional rendering that preserves the filial/tribal
    language better than the more interpretive 'descendants.'
- source_word: תּוֹלְדֹתָם
  chosen: by their generations
  alternatives:
  - according to their generations
  - by their family records
  lexicon: HALOT
  rationale: In this census context the term marks descent lines/genealogical divisions.
    'By their generations' keeps the formal structure of the repeated formula without
    over-interpreting it as written records.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal enumeration is more specific than the broad English
    'families'; 'clans' better reflects sub-tribal kinship units.
- source_word: לְבֵית אֲבֹתָם
  chosen: by their fathers’ houses
  alternatives:
  - by their ancestral houses
  - by their family houses
  lexicon: HALOT
  rationale: This is a standard Israelite kinship expression. 'Fathers’ houses' preserves
    the source idiom and social structure more accurately than smoothing it away.
- source_word: בְּמִסְפַּר שֵׁמוֹת
  chosen: according to the number of names
  alternatives:
  - by number of names
  - by name, according to their number
  lexicon: HALOT
  rationale: The phrase indicates enumeration of individuals by counted names. 'According
    to the number of names' is natural English while remaining close to the Hebrew
    formula.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  chosen: from twenty years old and upward
  alternatives:
  - from twenty years old and above
  - aged twenty years and up
  lexicon: HALOT
  rationale: This is the standard age threshold formula in the chapter. 'And upward'
    preserves the formal cadence and scope of eligibility.
- source_word: כֹּל יֹצֵא צָבָא
  chosen: every man going out to war
  alternatives:
  - everyone able to go out to war
  - all who go out in the army
  lexicon: HALOT
  rationale: The phrase denotes those eligible for military service. 'Every man' makes
    explicit the male census context, and 'going out to war' closely reflects the
    Hebrew idiom without flattening it to mere ability.
