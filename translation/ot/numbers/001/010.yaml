id: NUM.1.10
reference: Numbers 1:10
source:
  edition: WLC
  text: לִ/בְנֵ֣י יוֹסֵ֔ף לְ/אֶפְרַ֕יִם אֱלִישָׁמָ֖ע בֶּן עַמִּיה֑וּד לִ/מְנַשֶּׁ֕ה
    גַּמְלִיאֵ֖ל בֶּן פְּדָהצֽוּר־־׃
translation:
  text: 'For the sons of Joseph: for Ephraim, Elishama son of Ammihud; for Manasseh,
    Gamaliel son of Pedahzur.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לִ/בְנֵי יוֹסֵף
  chosen: For the sons of Joseph
  alternatives:
  - For the descendants of Joseph
  - Of the sons of Joseph
  lexicon: HALOT
  rationale: The preposition ל introduces the tribal designation in this census list,
    best rendered idiomatically as 'for.' בְנֵי is literally 'sons of,' and here refers
    to Joseph's tribal branches; 'sons' preserves the Hebrew form, while the following
    appositional clauses specify Ephraim and Manasseh.
- source_word: לְ/אֶפְרַיִם
  chosen: for Ephraim
  alternatives:
  - for the tribe of Ephraim
  - to Ephraim
  lexicon: HALOT
  rationale: The repeated ל marks the specific subdivision under Joseph. 'For Ephraim'
    is concise and matches the list structure. 'Tribe of' is interpretive and unnecessary
    because the census context already makes the tribal reference clear.
- source_word: אֱלִישָׁמָע
  chosen: Elishama
  rationale: 'Personal name transliterated according to the translation philosophy:
    names are transliterated rather than translated.'
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: The construct relationship is naturally rendered 'son of' in English
    genealogical style. The article is absent in Hebrew and unnecessary in this list
    format.
- source_word: עַמִּיהוּד
  chosen: Ammihud
  rationale: Personal name transliterated by standard convention.
- source_word: לִ/מְנַשֶּׁה
  chosen: for Manasseh
  alternatives:
  - for the tribe of Manasseh
  - to Manasseh
  lexicon: HALOT
  rationale: Parallel to 'for Ephraim,' preserving the list's structure under Joseph's
    two sons.
- source_word: גַּמְלִיאֵל
  chosen: Gamaliel
  rationale: Personal name transliterated by standard convention.
- source_word: פְּדָהצוּר
  chosen: Pedahzur
  rationale: Personal name transliterated by standard convention.
