id: NUM.1.8
reference: Numbers 1:8
source:
  edition: WLC
  text: לְ/יִ֨שָּׂשכָ֔ר נְתַנְאֵ֖ל בֶּן צוּעָֽר־׃
translation:
  text: 'For Issachar: Nethanel son of Zuar.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְיִשָּׂשכָר
  chosen: For Issachar
  alternatives:
  - Of Issachar
  - To/for the tribe of Issachar
  lexicon: HALOT
  rationale: The prefixed לְ marks association in this census-leader list, best rendered
    idiomatically as 'For Issachar,' introducing the representative from that tribe.
    'Issachar' is a personal/tribal name and is transliterated per project policy.
- source_word: נְתַנְאֵל
  chosen: Nethanel
  alternatives:
  - Netanel
  lexicon: HALOT
  rationale: Proper name; transliterated in standard English biblical form rather
    than translated ('God has given'), since personal names are to be transliterated.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  - descendant of
  lexicon: HALOT
  rationale: In genealogical identification, בֶּן is most naturally 'son of.' 'Descendant
    of' is possible in some contexts, but nothing here requires broadening the relationship.
- source_word: צוּעָר
  chosen: Zuar
  alternatives:
  - Tsuar
  lexicon: HALOT
  rationale: Proper name; transliterated by standard convention. 'Zuar' is the familiar
    English form.
