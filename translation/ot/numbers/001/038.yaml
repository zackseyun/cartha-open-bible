id: NUM.1.38
reference: Numbers 1:38
source:
  edition: WLC
  text: לִ/בְנֵ֣י דָ֔ן תּוֹלְדֹתָ֥/ם לְ/מִשְׁפְּחֹתָ֖/ם לְ/בֵ֣ית אֲבֹתָ֑/ם בְּ/מִסְפַּ֣ר שֵׁמֹ֗ת מִ/בֶּ֨ן עֶשְׂרִ֤ים שָׁנָה֙ וָ/מַ֔עְלָ/ה כֹּ֖ל יֹצֵ֥א צָבָֽא׃
translation:
  text: 'For the sons of Dan[a], by their generations, by their clans, by their fathers’ houses, according to the number of names, from twenty years old and upward, every male able to go out to war:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every one fit for military service.' The Hebrew idiom literally speaks of going out to war.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי דָן
  chosen: For the sons of Dan
  alternatives:
  - For the descendants of Dan
  - Of the sons of Dan
  lexicon: HALOT
  rationale: ל marks the tribal heading in this census formula; 'For the sons of Dan' preserves the repetitive structure of the passage. 'Sons' is retained rather than gender-neutralizing because the census concerns male tribal members eligible for military service, and the source is explicitly masculine.
- source_word: תּוֹלְדֹתָם
  chosen: by their generations
  alternatives:
  - according to their records
  - by their descendants
  lexicon: HALOT
  rationale: In this census context תולדות refers to lineage/genealogical divisions rather than biological offspring alone. 'By their generations' is a conventional but still intelligible rendering that fits the formulaic sequence.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal organization is well rendered as 'clan,' which distinguishes it from the next phrase about fathers' houses and avoids flattening both terms into 'families.'
- source_word: לְבֵית אֲבֹתָם
  chosen: by their fathers’ houses
  alternatives:
  - by their ancestral houses
  - according to their family houses
  lexicon: HALOT
  rationale: This is a technical kinship expression in Israelite census organization. 'Fathers’ houses' preserves the social structure more precisely than the broader 'families.'
- source_word: בְּמִסְפַּר שֵׁמוֹת
  chosen: according to the number of names
  alternatives:
  - by number of names
  - by headcount
  lexicon: HALOT
  rationale: The phrase is idiomatic for enumeration of individuals. 'According to the number of names' stays close to the Hebrew while remaining natural enough in English; 'headcount' is too interpretive for the main text.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  chosen: from twenty years old and upward
  alternatives:
  - from twenty years old and above
  - aged twenty years and up
  lexicon: HALOT
  rationale: This is the standard age threshold formula in the census. 'And upward' preserves the formal cadence and meaning.
- source_word: כֹּל יֹצֵא צָבָא
  chosen: every man able to go out to war
  alternatives:
  - everyone going out to the army
  - every one fit for military service
  lexicon: HALOT
  rationale: The idiom denotes those eligible for military service. 'Every man' makes explicit the male referent in context, and 'able to go out to war' expresses the functional sense without over-paraphrasing.
