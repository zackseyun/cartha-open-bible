id: NUM.1.43
reference: Numbers 1:43
source:
  edition: WLC
  text: פְּקֻדֵי/הֶ֖ם לְ/מַטֵּ֣ה נַפְתָּלִ֑י שְׁלֹשָׁ֧ה וַ/חֲמִשִּׁ֛ים אֶ֖לֶף וְ/אַרְבַּ֥ע
    מֵאֽוֹת׃פ
translation:
  text: those counted from the tribe of Naphtali were fifty-three thousand four hundred.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: פְּקֻדֵיהֶם
  chosen: those counted
  alternatives:
  - their counted men
  - their enrollment
  - those numbered
  lexicon: HALOT
  rationale: From פקד in the passive/participle sense referring to those registered
    or counted in the census. 'Those counted' is natural English and preserves the
    census context without adding words not present in the Hebrew.
- source_word: לְמַטֵּה
  chosen: from the tribe of
  alternatives:
  - for the tribe of
  - belonging to the tribe of
  lexicon: HALOT
  rationale: The preposition ל with מַטֶּה in this census formula identifies tribal
    affiliation. 'From the tribe of' is idiomatic in English and fits the repeated
    structure in Numbers 1.
- source_word: נַפְתָּלִי
  chosen: Naphtali
  rationale: 'Proper name transliterated according to the translation philosophy:
    names are transliterated rather than translated.'
- source_word: שְׁלֹשָׁה וַחֲמִשִּׁים אֶלֶף
  chosen: fifty-three thousand
  alternatives:
  - three and fifty thousand
  lexicon: HALOT
  rationale: Hebrew numbers are rendered in standard contemporary English order rather
    than mechanically preserving the source order.
- source_word: וְאַרְבַּע מֵאוֹת
  chosen: four hundred
  lexicon: HALOT
  rationale: Rendered straightforwardly as the final component of the census total
    in natural English number style.
