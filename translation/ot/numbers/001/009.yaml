id: NUM.1.9
reference: Numbers 1:9
source:
  edition: WLC
  text: לִ/זְבוּלֻ֕ן אֱלִיאָ֖ב בֶּן חֵלֹֽן־׃
translation:
  text: 'For Zebulun: Eliab son of Helon.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לִ/זְבוּלֻן
  chosen: For Zebulun
  alternatives:
  - Of Zebulun
  - For the tribe of Zebulun
  lexicon: HALOT
  rationale: The prefixed ל marks association/designation in this census list, introducing
    the representative for each tribe. 'For Zebulun' is concise and natural in English
    while preserving the list structure better than the more interpretive 'For the
    tribe of Zebulun.' 'Of Zebulun' is possible but less idiomatic in this repeated
    formula.
- source_word: אֱלִיאָב
  chosen: Eliab
  rationale: 'Personal name transliterated according to the translation philosophy:
    names are transliterated rather than translated.'
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard genealogical rendering. English commonly omits the article in
    this naming formula, and 'son of' accurately reflects the construct relationship.
- source_word: חֵלֹן
  chosen: Helon
  rationale: Personal name transliterated by standard convention.
