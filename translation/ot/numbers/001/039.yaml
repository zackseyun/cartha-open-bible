id: NUM.1.39
reference: Numbers 1:39
source:
  edition: WLC
  text: פְּקֻדֵי/הֶ֖ם לְ/מַטֵּ֣ה דָ֑ן שְׁנַ֧יִם וְ/שִׁשִּׁ֛ים אֶ֖לֶף וּ/שְׁבַ֥ע מֵאֽוֹת׃פ
translation:
  text: Those counted from the tribe of Dan were sixty-two thousand seven hundred.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: פְּקֻדֵיהֶם
  chosen: those counted
  alternatives:
  - their counted men
  - their number
  - those registered
  lexicon: HALOT
  rationale: From פקד in the passive/participle-like nominal form with 3mp suffix,
    referring to the enrolled/countable members in the census. 'Those counted' is
    natural English and preserves the census sense without adding 'men' explicitly,
    since the immediate context already defines the counted population.
- source_word: לְמַטֵּה
  chosen: from the tribe of
  alternatives:
  - for the tribe of
  - by the tribe of
  lexicon: HALOT
  rationale: The preposition ל with מַטֶּה in this census formula identifies tribal
    affiliation. 'From the tribe of' is idiomatic in English and fits the repeated
    structure in Numbers 1.
- source_word: דָן
  chosen: Dan
  lexicon: HALOT
  rationale: Standard transliteration of the tribal/personal name, following the translation
    philosophy to transliterate names.
- source_word: שְׁנַיִם וְשִׁשִּׁים אֶלֶף
  chosen: sixty-two thousand
  alternatives:
  - two and sixty thousand
  lexicon: HALOT
  rationale: Hebrew numbers are rendered in standard contemporary English order rather
    than preserving the Semitic sequence.
- source_word: וּשְׁבַע מֵאוֹת
  chosen: seven hundred
  lexicon: HALOT
  rationale: Straightforward rendering of the remaining numeral phrase in natural
    English.
