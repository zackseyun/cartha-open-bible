id: NUM.1.27
reference: Numbers 1:27
source:
  edition: WLC
  text: פְּקֻדֵי/הֶ֖ם לְ/מַטֵּ֣ה יְהוּדָ֑ה אַרְבָּעָ֧ה וְ/שִׁבְעִ֛ים אֶ֖לֶף וְ/שֵׁ֥שׁ מֵאֽוֹת׃פ
translation:
  text: Those counted from the tribe of Judah were seventy-four thousand six hundred[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those registered.' The Hebrew participle in this census formula can be rendered either way.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּקֻדֵיהֶם
  chosen: those counted
  alternatives:
  - their counted men
  - their number
  - those registered
  lexicon: HALOT
  rationale: The passive participial form from פקד in this census context refers to those who were counted/registered. 'Those counted' is natural English and preserves the census sense without adding 'men,' which is not explicit in this verse though supplied by the broader context.
- source_word: לְמַטֵּה
  chosen: from the tribe of
  alternatives:
  - for the tribe of
  - belonging to the tribe of
  lexicon: HALOT
  rationale: The preposition ל with מַטֶּה here marks tribal affiliation in the census list. 'From the tribe of' is idiomatic in English and fits the repeated formula in Numbers 1.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Standard English transliteration of the tribal name.
- source_word: אַרְבָּעָה וְשִׁבְעִים אֶלֶף וְשֵׁשׁ מֵאוֹת
  chosen: seventy-four thousand six hundred
  alternatives:
  - four and seventy thousand and six hundred
  lexicon: HALOT
  rationale: Rendered in standard contemporary English number style. The Hebrew sequence literally gives 'four and seventy thousand and six hundred,' which idiomatically corresponds to 'seventy-four thousand six hundred.'
