id: NUM.1.54
reference: Numbers 1:54
source:
  edition: WLC
  text: וַֽ/יַּעֲשׂ֖וּ בְּנֵ֣י יִשְׂרָאֵ֑ל כְּ֠/כֹל אֲשֶׁ֨ר צִוָּ֧ה יְהוָ֛ה אֶת מֹשֶׁ֖ה
    כֵּ֥ן עָשֽׂוּ־׃פ
translation:
  text: So the sons of Israel did according to all that the LORD had commanded Moses;
    so they did.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel.' The Hebrew is literally
      'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  chosen: did
  alternatives:
  - acted
  - carried out
  lexicon: HALOT
  rationale: From עשה, a broad verb meaning 'do/make.' 'Did' is the most natural and
    sufficiently formal rendering here, matching the summary statement of obedience.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' In keeping with gender-accurate translation
    philosophy, the masculine plural is preserved rather than neutralized to 'Israelites,'
    while remaining idiomatic enough in English.
- source_word: כְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - just as everything that
  - in accordance with all that
  lexicon: HALOT
  rationale: This combination expresses conformity to the full extent of the command.
    'According to all that' preserves both the comparative force and the comprehensiveness.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: The perfect verb refers to the prior divine command relative to Israel's
    action. English past perfect makes that sequence clear and natural.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following longstanding reverential convention and the LXX/English
    Bible pattern.
- source_word: אֶת מֹשֶׁה
  chosen: Moses
  alternatives:
  - to Moses
  lexicon: HALOT
  rationale: The direct-object marker with Moses after 'commanded' yields the sense
    'commanded Moses.' English does not require a preposition here.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: HALOT
  rationale: כֵּן resumes and emphasizes the exact correspondence of Israel's action
    to the command. 'So' is concise and natural, and it preserves the emphatic repetition
    with the final verb.
- source_word: עָשׂוּ
  chosen: they did
  alternatives:
  - they acted
  - they carried it out
  lexicon: HALOT
  rationale: The repeated verb mirrors the Hebrew's emphatic closure. Retaining 'so
    they did' preserves the stylistic repetition rather than smoothing it away.
