theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name. Per DOCTRINE.md, the default rendering
    is 'the LORD,' with alternatives preserved only as documented options, not adopted
    in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering בְּנֵי יִשְׂרָאֵל with gender accuracy
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is explicitly masculine plural construct. Following the gender-accurate
    principle, the translation preserves the form rather than replacing it with a
    gender-neutral collective, while recognizing the alternatives as idiomatic English
    options.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
