id: NUM.1.17
reference: Numbers 1:17
source:
  edition: WLC
  text: וַ/יִּקַּ֥ח מֹשֶׁ֖ה וְ/אַהֲרֹ֑ן אֵ֚ת הָ/אֲנָשִׁ֣ים הָ/אֵ֔לֶּה אֲשֶׁ֥ר נִקְּב֖וּ
    בְּ/שֵׁמֽוֹת׃
translation:
  text: So Moses and Aaron took these men, who had been designated by name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who had been named by name,' that is, 'who had been specifically identified.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - received
  - summoned
  lexicon: HALOT
  rationale: The verb לקח in the waw-consecutive narrative form most naturally means
    'took.' In context, Moses and Aaron are taking charge of or gathering the previously
    identified leaders. 'Received' is possible contextually, but 'took' preserves
    the Hebrew's plain verbal sense.
- source_word: מֹשֶׁה וְאַהֲרֹן
  chosen: Moses and Aaron
  rationale: Personal names are transliterated by standard English conventions per
    project philosophy.
- source_word: אֵת הָאֲנָשִׁים הָאֵלֶּה
  chosen: these men
  alternatives:
  - these persons
  - these leaders
  lexicon: HALOT
  rationale: הָאֲנָשִׁים is the masculine plural of אִישׁ, here referring to specific
    male representatives named in the preceding context. 'Men' is gender-accurate
    and contextually precise; 'leaders' is interpretive and better left implicit from
    context.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - whom
  - that
  rationale: A simple relative pronoun is required in English. 'Who' fits the personal
    antecedent naturally.
- source_word: נִקְּבוּ
  chosen: had been designated
  alternatives:
  - had been named
  - had been specified
  - had been called out
  lexicon: HALOT
  rationale: The Niphal of נקב with בְּשֵׁמוֹת conveys being explicitly identified
    or designated. 'Designated' captures the formal selection sense in this census-administrative
    context better than the more bare 'named,' while remaining faithful to the Hebrew.
- source_word: בְּשֵׁמוֹת
  chosen: by name
  alternatives:
  - by their names
  - individually by name
  lexicon: HALOT
  rationale: The idiom means identification by name. 'By name' is idiomatic English
    and preserves the Hebrew sense without unnecessary expansion.
