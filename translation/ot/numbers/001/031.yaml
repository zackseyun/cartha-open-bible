id: NUM.1.31
reference: Numbers 1:31
source:
  edition: WLC
  text: פְּקֻדֵי/הֶ֖ם לְ/מַטֵּ֣ה זְבוּלֻ֑ן שִׁבְעָ֧ה וַ/חֲמִשִּׁ֛ים אֶ֖לֶף וְ/אַרְבַּ֥ע
    מֵאֽוֹת׃פ
translation:
  text: Those registered from the tribe of Zebulun were 57,400.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: פְּקֻדֵיהֶם
  chosen: those registered
  alternatives:
  - their counted ones
  - their mustered men
  - those numbered among them
  lexicon: HALOT
  rationale: From פקד in the passive/participle sense of those enrolled, counted,
    or mustered in the census. 'Those registered' is natural modern English and fits
    the census context without over-specifying military nuance beyond what the immediate
    formula requires.
- source_word: לְמַטֵּה
  chosen: from the tribe of
  alternatives:
  - for the tribe of
  - belonging to the tribe of
  lexicon: HALOT
  rationale: The preposition ל with מַטֶּה in this repeated census formula identifies
    tribal affiliation. 'From the tribe of' is idiomatic in English and preserves
    the sense of belonging/source.
- source_word: זְבוּלֻן
  chosen: Zebulun
  rationale: Standard English transliteration of the tribal name, following the policy
    to transliterate personal and tribal names.
- source_word: שִׁבְעָה וַחֲמִשִּׁים אֶלֶף וְאַרְבַּע מֵאוֹת
  chosen: 57,400
  alternatives:
  - fifty-seven thousand four hundred
  lexicon: HALOT
  rationale: The Hebrew number sequence is literally 'seven and fifty thousand and
    four hundred.' Rendering as numerals gives clear modern readability while preserving
    the exact total.
