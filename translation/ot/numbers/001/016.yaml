id: NUM.1.16
reference: Numbers 1:16
source:
  edition: WLC
  text: אֵ֚לֶּה קריאי הָ/עֵדָ֔ה נְשִׂיאֵ֖י מַטּ֣וֹת אֲבוֹתָ֑/ם רָאשֵׁ֛י אַלְפֵ֥י יִשְׂרָאֵ֖ל
    הֵֽם׃
translation:
  text: These were the called ones of the congregation, the leaders of the tribes
    of their fathers, the heads of the thousands of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “those summoned from the assembly.” The Hebrew participle can denote
      those called, summoned, or designated.
    reason: lexical_alternative
  - marker: b
    text: “Thousands of Israel” may refer literally to groups of a thousand, or more
      broadly to clan or military subdivisions within Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These
  alternatives:
  - These were
  lexicon: HALOT
  rationale: Demonstrative plural introducing the identified men. English supplies
    the copular sense with the following clause.
- source_word: קריאי
  chosen: the ones called
  alternatives:
  - those summoned
  - the called ones
  - chosen men
  lexicon: HALOT
  rationale: Passive participial form from קרא, here meaning those who were called/summoned
    or designated. 'The ones called' preserves the participial force without overinterpreting
    as formal election; 'summoned' is possible but slightly narrower.
- source_word: הָעֵדָה
  chosen: the congregation
  alternatives:
  - the assembly
  - the community
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the gathered community of Israel. 'Congregation'
    is a natural and established rendering in Pentateuchal census/legal contexts,
    while remaining understandable in modern English.
- source_word: נְשִׂיאֵי
  chosen: the leaders
  alternatives:
  - the chiefs
  - the princes
  lexicon: HALOT
  rationale: נָשִׂיא in tribal/governing contexts refers to elevated leaders or chiefs.
    'Leaders' is clearer in modern English than 'princes' and less archaic than 'chiefs,'
    while fitting the administrative setting.
- source_word: מַטּוֹת אֲבוֹתָם
  chosen: their fathers’ tribes
  alternatives:
  - the tribes of their fathers
  - their ancestral tribes
  lexicon: HALOT
  rationale: מַטּוֹת are tribal staffs/tribes; with אֲבוֹתָם the phrase denotes the
    tribal divisions associated with their fathers' houses/ancestry. 'Their fathers’
    tribes' is concise and preserves the paternal/ancestral reference present in the
    Hebrew.
- source_word: רָאשֵׁי
  chosen: the heads
  alternatives:
  - the chiefs
  - the leaders
  lexicon: HALOT
  rationale: Literally 'heads,' a common Hebrew metaphor for chief persons. Retained
    here because the phrase 'heads of the thousands' is intelligible and reflects
    the source imagery.
- source_word: אַלְפֵי יִשְׂרָאֵל
  chosen: the thousands of Israel
  alternatives:
  - the clans of Israel
  - the military units of Israel
  lexicon: HALOT
  rationale: אֶלֶף can denote 'thousand' and by extension a clan or military subdivision.
    In this census context, 'thousands of Israel' preserves the Hebrew wording and
    leaves the exact social-military nuance open rather than collapsing it into one
    interpretation.
- source_word: הֵם
  chosen: were
  alternatives:
  - they were
  - these were
  lexicon: HALOT
  rationale: Independent pronoun used for emphasis/identification at the end of the
    clause. In English the force is naturally represented by the copular clause rather
    than a separate final 'they.'
