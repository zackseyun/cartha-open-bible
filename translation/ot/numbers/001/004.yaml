id: NUM.1.4
reference: Numbers 1:4
source:
  edition: WLC
  text: וְ/אִתְּ/כֶ֣ם יִהְי֔וּ אִ֥ישׁ אִ֖ישׁ לַ/מַּטֶּ֑ה אִ֛ישׁ רֹ֥אשׁ לְ/בֵית אֲבֹתָ֖י/ו
    הֽוּא־׃
translation:
  text: And with you there shall be one man from each tribe, each man the head of
    his fathers’ house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the chief of his ancestral house.' The Hebrew literally says 'the head
      of his fathers’ house,' referring to the leading male representative of a patrilineal
      household or clan.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אִתְּ/כֶם
  chosen: And with you
  alternatives:
  - And alongside you
  - And there shall be with you
  lexicon: HALOT
  rationale: The prepositional phrase introduces those who are to accompany Moses
    and Aaron. 'With you' is the most natural and sufficiently formal rendering in
    English.
- source_word: יִהְיוּ
  chosen: there shall be
  alternatives:
  - shall be
  - will be
  lexicon: HALOT
  rationale: The imperfect here has directive/future force in context, specifying
    who is to be present for the census. 'There shall be' brings out existence/presence
    in idiomatic English.
- source_word: אִישׁ אִישׁ
  chosen: one man from each
  alternatives:
  - a man, a man from each
  - one man each from
  lexicon: HALOT
  rationale: The repetition of אִישׁ is distributive, indicating one representative
    per tribe. English expresses this naturally as 'one man from each' rather than
    preserving the exact repetition woodenly.
- source_word: לַמַּטֶּה
  chosen: tribe
  alternatives:
  - staff
  - branch
  - tribal division
  lexicon: HALOT
  rationale: In Numbers census and organization contexts, מַטֶּה refers to a tribal
    unit, not a literal staff. 'Tribe' is the standard contextual sense.
- source_word: אִישׁ רֹאשׁ
  chosen: each man the head
  alternatives:
  - each one a chief
  - a man who is head
  lexicon: HALOT
  rationale: This appositional phrase further defines the representative as the leading
    man of his clan-group. 'Head' preserves the concrete Hebrew metaphor and remains
    clear in English.
- source_word: לְבֵית אֲבֹתָיו
  chosen: of his fathers’ house
  alternatives:
  - of his ancestral house
  - of his father's household
  - of his family line
  lexicon: HALOT
  rationale: The phrase denotes the patrilineal household/clan structure central to
    Israel's organization. 'Fathers’ house' is a transparent, fairly literal rendering
    that preserves the social structure better than the flatter 'family.'
- source_word: הוּא
  chosen: (implicit in English)
  alternatives:
  - he
  - he himself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis or resumptive force in Hebrew,
    but explicit repetition would sound awkward in English. Its sense is adequately
    conveyed by the appositional structure 'each man the head of his fathers’ house.'
