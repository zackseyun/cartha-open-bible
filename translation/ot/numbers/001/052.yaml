id: NUM.1.52
reference: Numbers 1:52
source:
  edition: WLC
  text: וְ/חָנ֖וּ בְּנֵ֣י יִשְׂרָאֵ֑ל אִ֧ישׁ עַֽל מַחֲנֵ֛/הוּ וְ/אִ֥ישׁ עַל דִּגְל֖/וֹ לְ/צִבְאֹתָֽ/ם־־׃
translation:
  text: The sons of Israel shall camp[a], each man by his camp and each man by his banner, according to their divisions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The Israelites shall camp, each one by his camp and each one by his standard, according to their companies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחָנוּ
  chosen: shall camp
  alternatives:
  - will camp
  - are to camp
  - shall encamp
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in legal/instructional context functions futurally/prescriptively. 'Shall camp' fits the census-and-camp-order instructions and preserves the formal tone better than the more colloquial 'will camp.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: The sons of Israel
  alternatives:
  - The Israelites
  - The children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Chosen to preserve the source expression and the gender-accurate policy, while still being natural English. 'Israelites' is smoother but less formally transparent; 'children of Israel' is traditional but less idiomatic in modern English.
- source_word: אִישׁ ... וְאִישׁ
  chosen: each man ... and each man
  alternatives:
  - each one ... and each one
  - every man ... and every man
  - each person ... and each person
  lexicon: HALOT
  rationale: The repeated אִישׁ is distributive, emphasizing individual placement within the camp structure. 'Each man' preserves the masculine singular form in line with the gender-accurate policy. 'Each one' would be possible but would flatten the explicit lexical repetition.
- source_word: עַל מַחֲנֵהוּ
  chosen: by his camp
  alternatives:
  - at his camp
  - in his camp
  - with his camp
  lexicon: HALOT
  rationale: מַחֲנֶה means 'camp,' and עַל here marks position/association. 'By his camp' communicates assignment to one's own camp grouping without over-specifying exact spatial relation. 'In his camp' is possible, but the parallel with 'by his banner' favors a consistent English preposition.
- source_word: דִּגְלוֹ
  chosen: his banner
  alternatives:
  - his standard
  - his flag
  lexicon: HALOT
  rationale: דֶּגֶל denotes a military/tribal standard or banner. 'Banner' is readable modern English and preserves the emblematic sense. 'Standard' is also strong and somewhat more technical; 'flag' is too modern and potentially anachronistic.
- source_word: לְצִבְאֹתָם
  chosen: according to their divisions
  alternatives:
  - by their companies
  - according to their hosts
  - by their armies
  lexicon: HALOT
  rationale: צָבָא often carries military organization sense ('host,' 'army'). In this camp-order context, the phrase indicates arrangement by organized tribal groupings. 'According to their divisions' conveys ordered military-style arrangement in clear modern English without implying active combat. 'Hosts' is too archaic; 'armies' may overstate the immediate sense.
