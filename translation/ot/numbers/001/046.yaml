id: NUM.1.46
reference: Numbers 1:46
source:
  edition: WLC
  text: וַ/יִּֽהְיוּ֙ כָּל הַ/פְּקֻדִ֔ים שֵׁשׁ מֵא֥וֹת אֶ֖לֶף וּ/שְׁלֹ֣שֶׁת אֲלָפִ֑ים וַ/חֲמֵ֥שׁ מֵא֖וֹת וַ/חֲמִשִּֽׁים־־׃
translation:
  text: So all those who were counted were six hundred three thousand five hundred and fifty[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the numbered men' or 'those mustered.' The Hebrew refers to those registered in the census.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: So ... were
  alternatives:
  - And ... were
  - Thus ... were
  lexicon: HALOT
  rationale: The waw-consecutive with היה advances the narrative and sums up the census result. 'So ... were' gives natural English while preserving the resultative sense.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole number of
  lexicon: HALOT
  rationale: Retains the comprehensive force of the Hebrew and fits the summary statement.
- source_word: הַפְּקֻדִים
  chosen: those who were counted
  alternatives:
  - the numbered men
  - the enrolled ones
  - those mustered
  lexicon: HALOT
  rationale: From פקד in the passive/participle sense of those registered in the census. 'Those who were counted' is clear modern English and avoids adding 'men' explicitly where this verse itself does not repeat it, though the broader context is the military census of eligible males.
- source_word: שֵׁשׁ מֵאוֹת אֶלֶף
  chosen: six hundred ... thousand
  alternatives:
  - six hundred thousand
  lexicon: HALOT
  rationale: Rendered idiomatically as part of the full number expression 'six hundred three thousand...' rather than preserving a wooden segmented English numeral.
- source_word: וּשְׁלֹשֶׁת אֲלָפִים
  chosen: three thousand
  alternatives:
  - and three thousand
  lexicon: HALOT
  rationale: Integrated into standard English number style while preserving the additive structure of the Hebrew.
- source_word: וַחֲמֵשׁ מֵאוֹת וַחֲמִשִּׁים
  chosen: five hundred fifty
  alternatives:
  - and five hundred and fifty
  lexicon: HALOT
  rationale: Uses contemporary English number formatting. The Hebrew additive sequence is preserved in value, but not with repeated 'and,' for readability.
