theological_decisions:
- issue: Cultic terminology for משכן
  chosen_reading: tabernacle
  alternative_readings:
  - dwelling
  - tent
  rationale: The verse concerns the portable sanctuary and its sacred service. 'Tabernacle'
    best preserves the technical cultic sense without paraphrase.
- issue: Rendering of שרת in sanctuary context
  chosen_reading: minister at it
  alternative_readings:
  - serve it
  - attend to it
  rationale: A sacred-service nuance is present, but the wording avoids importing
    later priestly theology beyond the text itself. 'Minister at it' reflects cultic
    service while remaining text-bound.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Readable modern English, not archaic or academic.'
