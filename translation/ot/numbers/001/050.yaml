id: NUM.1.50
reference: Numbers 1:50
source:
  edition: WLC
  text: וְ/אַתָּ֡ה הַפְקֵ֣ד אֶת הַ/לְוִיִּם֩ עַל מִשְׁכַּ֨ן הָ/עֵדֻ֜ת וְ/עַ֣ל כָּל
    כֵּלָי/ו֮ וְ/עַ֣ל כָּל אֲשֶׁר ל/וֹ֒ הֵ֜מָּה יִשְׂא֤וּ אֶת הַ/מִּשְׁכָּן֙ וְ/אֶת
    כָּל כֵּלָ֔י/ו וְ/הֵ֖ם יְשָׁרְתֻ֑/הוּ וְ/סָבִ֥יב לַ/מִּשְׁכָּ֖ן יַחֲנֽוּ־־־־־־־־׃
translation:
  text: But you, appoint the Levites over the tabernacle of the testimony, and over
    all its furnishings, and over all that belongs to it. They are to carry the tabernacle
    and all its furnishings, and they are to minister at it, and they are to camp
    around the tabernacle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tent of the testimony.' The Hebrew מִשְׁכַּן can denote a dwelling/tabernacle,
      and some English versions render the phrase more explicitly as 'tent of meeting/testimony'
      depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'serve it' or 'attend to it.' The verb carries the sense of ministering
      in a sacred-service context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפְקֵד
  chosen: appoint
  alternatives:
  - assign
  - put in charge of
  lexicon: HALOT
  rationale: Hiphil imperative of פקד here conveys commissioning/assigning responsibility
    rather than merely counting or visiting. 'Appoint' fits the administrative force
    in context.
- source_word: עַל
  chosen: over
  alternatives:
  - in charge of
  - for
  lexicon: HALOT
  rationale: Repeated עַל after הַפְקֵד marks sphere of responsibility. 'Over' preserves
    the formal structure and sense of oversight.
- source_word: מִשְׁכַּן הָעֵדֻת
  chosen: the tabernacle of the testimony
  alternatives:
  - the dwelling of the testimony
  - the tent of the testimony
  lexicon: HALOT
  rationale: מִשְׁכָּן is the sanctuary dwelling/tabernacle; 'tabernacle' is the established
    and accurate English term in this cultic context. הָעֵדֻת likely refers to the
    covenant testimony housed there, so the construct is preserved formally as 'of
    the testimony.'
- source_word: כֵּלָיו
  chosen: its furnishings
  alternatives:
  - its vessels
  - its equipment
  - its articles
  lexicon: HALOT
  rationale: כֵּלִים in tabernacle contexts refers broadly to cultic objects/implements.
    'Furnishings' is readable modern English and suitably broad.
- source_word: כָּל אֲשֶׁר לוֹ
  chosen: all that belongs to it
  alternatives:
  - everything that is in it
  - all that pertains to it
  lexicon: HALOT
  rationale: The phrase denotes all appurtenances associated with the tabernacle.
    'Belongs to it' is natural English and broad enough to include associated items.
- source_word: יִשְׂאוּ
  chosen: carry
  alternatives:
  - bear
  - transport
  lexicon: HALOT
  rationale: נשא here refers to physically bearing the tabernacle and its items during
    movement. 'Carry' is clear and idiomatic.
- source_word: יְשָׁרְתֻהוּ
  chosen: minister at it
  alternatives:
  - serve it
  - attend to it
  lexicon: HALOT
  rationale: The piel of שרת often denotes ministerial/service activity in sacred
    contexts. 'Minister at it' preserves the cultic nuance better than the flatter
    'serve it.' The pronominal suffix is rendered locatively in English for naturalness.
- source_word: סָבִיב לַמִּשְׁכָּן
  chosen: around the tabernacle
  alternatives:
  - all around the tabernacle
  - surrounding the tabernacle
  lexicon: HALOT
  rationale: The phrase indicates encampment in a perimeter around the sanctuary.
    'Around the tabernacle' is straightforward and sufficient.
- source_word: יַחֲנוּ
  chosen: they are to camp
  alternatives:
  - they shall camp
  - they must camp
  lexicon: HALOT
  rationale: Imperfect in this instructional context has directive force. 'They are
    to camp' communicates commanded duty in contemporary English.
- source_word: וְאַתָּה
  chosen: But you
  alternatives:
  - And you
  - You
  lexicon: HALOT
  rationale: The conjunction marks contrast with the previous exclusion of the Levites
    from the census/numbering of the other tribes. 'But you' brings out the contrastive
    force in context.
