id: NUM.1.51
reference: Numbers 1:51
source:
  edition: WLC
  text: וּ/בִ/נְסֹ֣עַ הַ/מִּשְׁכָּ֗ן יוֹרִ֤ידוּ אֹת/וֹ֙ הַ/לְוִיִּ֔ם וּ/בַ/חֲנֹת֙
    הַ/מִּשְׁכָּ֔ן יָקִ֥ימוּ אֹת֖/וֹ הַ/לְוִיִּ֑ם וְ/הַ/זָּ֥ר הַ/קָּרֵ֖ב יוּמָֽת׃
translation:
  text: When the tabernacle is to set out, the Levites shall take it down; and when
    the tabernacle is to camp, the Levites shall set it up. And the outsider who comes
    near shall be put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the stranger' or 'the unauthorized person'; the Hebrew refers to one
      not authorized to approach the sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִנְסֹעַ
  chosen: When ... is to set out
  alternatives:
  - when ... sets out
  - in the setting out of
  lexicon: HALOT
  rationale: The preposition ב with infinitive construct of נסע introduces a temporal
    clause. 'When ... is to set out' gives natural English while preserving the forward
    movement sense of the camp/tabernacle beginning travel.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  - the tent dwelling
  lexicon: HALOT
  rationale: Mishkan is the standard term for the sacred portable sanctuary. 'Tabernacle'
    is established and accurate in this cultic context.
- source_word: יוֹרִידוּ אֹתוֹ
  chosen: shall take it down
  alternatives:
  - shall bring it down
  - shall lower it
  lexicon: HALOT
  rationale: Hiphil of ירד here refers to dismantling/lowering the tabernacle for
    transport. 'Take it down' is idiomatic English that matches the practical action
    better than the more wooden 'bring it down.'
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal/clan designation; they are the authorized
    personnel for handling the sanctuary.
- source_word: וּבַחֲנֹת
  chosen: when ... camps
  alternatives:
  - when ... encamps
  - when ... comes to rest
  lexicon: HALOT
  rationale: From חנה, 'to camp/encamp.' 'Camps' is clear modern English; 'encamps'
    is possible but slightly more formal. Singular English verb matches the singular
    subject 'tabernacle' even though the Hebrew infinitive is impersonal.
- source_word: יָקִימוּ אֹתוֹ
  chosen: shall set it up
  alternatives:
  - shall erect it
  - shall raise it
  lexicon: HALOT
  rationale: Hiphil of קום in this context means to erect or establish the tabernacle
    in camp. 'Set it up' is natural and precise.
- source_word: וְהַזָּר
  chosen: the outsider
  alternatives:
  - the stranger
  - the unauthorized person
  - the non-Levite
  lexicon: HALOT
  rationale: זָר here denotes one who is not authorized to approach the sanctuary
    service, not merely a foreign ethnic stranger. 'Outsider' best captures exclusion
    from sacred duty without over-specifying ethnicity.
- source_word: הַקָּרֵב
  chosen: who comes near
  alternatives:
  - who approaches
  - who draws near
  lexicon: HALOT
  rationale: The participle of קרב describes approaching the sanctuary. 'Who comes
    near' is straightforward and preserves the warning formula.
- source_word: יוּמָת
  chosen: shall be put to death
  alternatives:
  - shall die
  - must be executed
  lexicon: HALOT
  rationale: The Hophal of מות is causative/passive, indicating imposed death penalty
    rather than mere consequence. 'Shall be put to death' best reflects that force.
