theological_decisions:
- issue: Nature of the penalty in יוּמָת
  chosen_reading: 'judicial/passive: ''shall be put to death'''
  alternative_readings:
  - 'consequential: ''shall die'''
  rationale: The Hebrew Hophal form normally indicates that death is inflicted, not
    merely predicted. This preserves the legal-sanctity warning of the passage without
    specifying the exact human or divine agent.
- issue: Referent of זָר
  chosen_reading: an unauthorized outsider to sanctuary service
  alternative_readings:
  - a foreigner ethnically
  - any non-Levite
  rationale: In priestly/tabernacle contexts, זָר commonly marks someone outside the
    authorized sacred role. 'Outsider' preserves the cultic restriction while avoiding
    an overly narrow ethnic reading.
