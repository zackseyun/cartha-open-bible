id: NUM.1.23
reference: Numbers 1:23
source:
  edition: WLC
  text: פְּקֻדֵי/הֶ֖ם לְ/מַטֵּ֣ה שִׁמְע֑וֹן תִּשְׁעָ֧ה וַ/חֲמִשִּׁ֛ים אֶ֖לֶף וּ/שְׁלֹ֥שׁ
    מֵאֽוֹת׃פ
translation:
  text: their counted men from the tribe of Simeon were fifty-nine thousand three
    hundred.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: פְּקֻדֵיהֶם
  chosen: those counted
  alternatives:
  - their counted ones
  - their mustered men
  - those registered
  lexicon: HALOT
  rationale: The passive participial form from פקד in this census context refers to
    persons who were counted/enrolled. 'Those counted' is natural English and preserves
    the census sense without adding 'men,' which is not explicit in this verse though
    supplied by the broader context.
- source_word: לְמַטֵּה
  chosen: from the tribe of
  alternatives:
  - for the tribe of
  - by tribe of
  lexicon: HALOT
  rationale: In this formulaic census expression, ל plus מַטֶּה identifies tribal
    affiliation. 'From the tribe of' is idiomatic English and fits the repeated pattern
    in Numbers 1.
- source_word: שִׁמְעוֹן
  chosen: Simeon
  lexicon: HALOT
  rationale: Standard English transliteration of the tribal/personal name.
- source_word: תִּשְׁעָה וַחֲמִשִּׁים אֶלֶף וּשְׁלֹשׁ מֵאוֹת
  chosen: fifty-nine thousand three hundred
  alternatives:
  - nine and fifty thousand and three hundred
  lexicon: HALOT
  rationale: The Hebrew number sequence is rendered in standard contemporary English
    number style. This preserves the exact total while avoiding wooden word order.
