id: NUM.1.6
reference: Numbers 1:6
source:
  edition: WLC
  text: לְ/שִׁמְע֕וֹן שְׁלֻמִיאֵ֖ל בֶּן צוּרִֽישַׁדָּֽי־׃
translation:
  text: 'for Simeon: Shelumiel son of Zurishaddai;'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְ/שִׁמְעוֹן
  chosen: for Simeon
  alternatives:
  - of Simeon
  - to/for the tribe of Simeon
  lexicon: HALOT
  rationale: 'The prefixed לְ here marks tribal affiliation within the census-leader
    list: ''for Simeon'' = the representative assigned to the tribe of Simeon. ''For''
    is concise and natural in English while preserving the list structure better than
    expanding to ''the leader of the tribe of Simeon.'' ''Simeon'' is a standard transliteration
    of the personal/tribal name.'
- source_word: שְׁלֻמִיאֵל
  chosen: Shelumiel
  alternatives:
  - Shlumiel
  lexicon: HALOT
  rationale: Personal names are transliterated rather than translated, per project
    philosophy. 'Shelumiel' follows standard English convention for this Hebrew name.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  - descendant of
  lexicon: HALOT
  rationale: In genealogical identification, בֶּן is most directly rendered 'son of.'
    Although Hebrew can sometimes mean broader descent, in this naming formula 'son
    of' is the normal and sufficiently precise English rendering.
- source_word: צוּרִישַׁדָּי
  chosen: Zurishaddai
  alternatives:
  - Tsurishaddai
  lexicon: HALOT
  rationale: This is a personal name and is therefore transliterated. 'Zurishaddai'
    reflects standard English biblical-name convention, using Z rather than Ts for
    initial צ in established forms.
