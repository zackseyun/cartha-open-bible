id: NUM.1.24
reference: Numbers 1:24
source:
  edition: WLC
  text: לִ/בְנֵ֣י גָ֔ד תּוֹלְדֹתָ֥/ם לְ/מִשְׁפְּחֹתָ֖/ם לְ/בֵ֣ית אֲבֹתָ֑/ם בְּ/מִסְפַּ֣ר
    שֵׁמ֗וֹת מִ/בֶּ֨ן עֶשְׂרִ֤ים שָׁנָה֙ וָ/מַ֔עְלָ/ה כֹּ֖ל יֹצֵ֥א צָבָֽא׃
translation:
  text: 'For the sons of Gad, by their generations, by their clans, by their fathers’
    houses, according to the number of names, from twenty years old and upward, every
    man able to go out to war:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Gad.' The expression refers to the male tribal members being
      counted in the census.
    reason: cultural_note
  - marker: b
    text: Or 'according to their families' for 'by their clans.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'every one going out to war' or 'every one going out to military
      service.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי גָד
  chosen: For the sons of Gad
  alternatives:
  - Of the sons of Gad
  - From the sons of Gad
  lexicon: HALOT
  rationale: The prefixed ל here introduces the tribal heading in the census formula.
    'For the sons of Gad' reads naturally in English while preserving the formulaic
    structure. 'Sons' is retained rather than 'descendants' to match the Hebrew idiom
    and the gender-accurate policy.
- source_word: תּוֹלְדֹתָם
  chosen: by their generations
  alternatives:
  - according to their generations
  - their genealogical records
  lexicon: HALOT
  rationale: The term denotes lineage/descent grouping in this census context. 'By
    their generations' preserves the formal census formula without over-interpreting
    it as written records.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  lexicon: HALOT
  rationale: '''Clans'' better reflects kinship subdivisions within a tribe than the
    more modern and potentially misleading ''families.'''
- source_word: לְבֵית אֲבֹתָם
  chosen: by their fathers’ houses
  alternatives:
  - according to their ancestral houses
  - by their family houses
  lexicon: HALOT
  rationale: This is a technical kinship expression in the census lists. 'Fathers’
    houses' is a standard, transparent rendering that preserves the patriarchal household
    structure of the Hebrew.
- source_word: בְּמִסְפַּר שֵׁמוֹת
  chosen: according to the number of names
  alternatives:
  - by number of names
  - one by one by name
  lexicon: HALOT
  rationale: The phrase refers to enumeration by individual names. 'According to the
    number of names' is slightly smoother than a hyper-literal rendering while remaining
    close to the source.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  chosen: from twenty years old and upward
  alternatives:
  - from a son of twenty years and upward
  - from twenty years old and above
  lexicon: HALOT
  rationale: This is the standard age threshold formula in the census. The idiomatic
    English rendering communicates the meaning clearly without woodenly reproducing
    the Hebrew singular 'son of.'
- source_word: כֹּל יֹצֵא צָבָא
  chosen: every man able to go out to war
  alternatives:
  - everyone going out to the army
  - every one who goes out to military service
  lexicon: HALOT
  rationale: The phrase denotes those eligible for military service. 'Every man able
    to go out to war' makes the implied male military context explicit and natural
    in English; 'able' is supplied to convey eligibility rather than mere motion.
