id: NUM.1.36
reference: Numbers 1:36
source:
  edition: WLC
  text: לִ/בְנֵ֣י בִנְיָמִ֔ן תּוֹלְדֹתָ֥/ם לְ/מִשְׁפְּחֹתָ֖/ם לְ/בֵ֣ית אֲבֹתָ֑/ם בְּ/מִסְפַּ֣ר
    שֵׁמֹ֗ת מִ/בֶּ֨ן עֶשְׂרִ֤ים שָׁנָה֙ וָ/מַ֔עְלָ/ה כֹּ֖ל יֹצֵ֥א צָבָֽא׃
translation:
  text: 'For the sons of Benjamin, by their generations, by their clans, by their
    fathers’ houses, according to the number of names, from twenty years old and upward,
    every man able to go out to war:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “every one going out to war,” an idiom for those eligible
      for military service.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי בִנְיָמִן
  chosen: For the sons of Benjamin
  alternatives:
  - For the descendants of Benjamin
  - Of the sons of Benjamin
  lexicon: HALOT
  rationale: ל marks the tribal heading in this census formula; 'For the sons of Benjamin'
    preserves the list-like structure while keeping the masculine filial language
    of the Hebrew. 'Benjamin' is transliterated as a personal/tribal name per philosophy.
- source_word: תּוֹלְדֹתָם
  chosen: by their generations
  alternatives:
  - according to their generations
  - by their family records
  lexicon: HALOT
  rationale: In this census context תולדות refers to lineage/descent grouping. 'By
    their generations' keeps the formal census formula without over-paraphrasing into
    modern bureaucratic language.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal organization is well rendered 'clan,' distinguishing
    it from the larger tribal unit and from the following fathers' houses.
- source_word: לְבֵית אֲבֹתָם
  chosen: by their fathers’ houses
  alternatives:
  - by their ancestral houses
  - by their family houses
  lexicon: HALOT
  rationale: This is a standard Israelite kinship term. 'Fathers’ houses' is the most
    transparent formal rendering and preserves the patriarchal household structure
    named in the Hebrew.
- source_word: בְּמִסְפַּר שֵׁמוֹת
  chosen: according to the number of names
  alternatives:
  - by number of names
  - one by one by name
  lexicon: HALOT
  rationale: The phrase indicates enumeration by counted individuals. 'According to
    the number of names' is idiomatic enough in English while staying close to the
    Hebrew formula.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  chosen: from twenty years old and upward
  alternatives:
  - from twenty years old and above
  - aged twenty years and up
  lexicon: HALOT
  rationale: This is the standard age threshold formula in the census. The chosen
    rendering is natural and preserves the lower-bound sense of מִן ... וָמַעְלָה.
- source_word: כֹּל יֹצֵא צָבָא
  chosen: every man able to go out to war
  alternatives:
  - everyone going out to the army
  - all who go out to war
  lexicon: HALOT
  rationale: The idiom refers to men eligible for military service. 'Every man' reflects
    the masculine singular collective and the military census context; 'able to go
    out to war' makes the functional sense clear without adding more than the idiom
    warrants.
