id: NUM.1.12
reference: Numbers 1:12
source:
  edition: WLC
  text: לְ/דָ֕ן אֲחִיעֶ֖זֶר בֶּן עַמִּֽישַׁדָּֽי־׃
translation:
  text: 'For Dan: Ahiezer son of Ammishaddai.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְ/דָן
  chosen: For Dan
  alternatives:
  - Of Dan
  - for the tribe of Dan
  lexicon: HALOT
  rationale: The prefixed לְ marks association/reference in this census-leader list,
    introducing the representative for each tribe. 'For Dan' is concise and natural
    in English while preserving the list structure. 'Of Dan' is possible but less
    explicit about representative function; 'for the tribe of Dan' is interpretive
    expansion beyond the terse Hebrew.
- source_word: אֲחִיעֶזֶר
  chosen: Ahiezer
  alternatives:
  - Ahi-ezer
  rationale: Personal names are transliterated by standard convention per translation
    philosophy. 'Ahiezer' is the conventional English transliteration of the Hebrew
    name.
- source_word: בֶּן
  chosen: son of
  alternatives: []
  lexicon: HALOT
  rationale: The construct noun בן straightforwardly denotes filiation. 'Son of' is
    the standard and accurate rendering in genealogical and identification formulas.
- source_word: עַמִּישַׁדָּי
  chosen: Ammishaddai
  alternatives:
  - Ammi-shaddai
  rationale: This is a personal name and is therefore transliterated rather than translated.
    'Ammishaddai' is the standard English transliteration.
