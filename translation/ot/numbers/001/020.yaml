id: NUM.1.20
reference: Numbers 1:20
source:
  edition: WLC
  text: וַ/יִּהְי֤וּ בְנֵֽי רְאוּבֵן֙ בְּכֹ֣ר יִשְׂרָאֵ֔ל תּוֹלְדֹתָ֥/ם לְ/מִשְׁפְּחֹתָ֖/ם
    לְ/בֵ֣ית אֲבֹתָ֑/ם בְּ/מִסְפַּ֤ר שֵׁמוֹת֙ לְ/גֻלְגְּלֹתָ֔/ם כָּל זָכָ֗ר מִ/בֶּ֨ן
    עֶשְׂרִ֤ים שָׁנָה֙ וָ/מַ֔עְלָ/ה כֹּ֖ל יֹצֵ֥א צָבָֽא־־׃
translation:
  text: 'The sons of Reuben, the firstborn of Israel, by their generations, by their
    clans, by their fathers’ houses, according to the number of names, head by head,
    every male from twenty years old and upward, everyone going out to war:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'by their skulls/heads,' an idiom meaning each individual
      was counted separately.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: The sons of Reuben ...
  alternatives:
  - Now the sons of Reuben were
  - And the sons of Reuben were
  lexicon: HALOT
  rationale: The verb introduces the census formula and is not naturally carried into
    English as a standalone 'were' without awkwardness. It is absorbed into the nominal
    census heading structure, which matches the syntax of the surrounding passage
    while preserving the sense.
- source_word: בְנֵי רְאוּבֵן
  chosen: The sons of Reuben
  alternatives:
  - The descendants of Reuben
  lexicon: HALOT
  rationale: '''Sons'' is the more literal rendering of בנים and fits the tribal/genealogical
    context. ''Descendants'' is possible but less textually transparent here.'
- source_word: בְּכֹר יִשְׂרָאֵל
  chosen: the firstborn of Israel
  alternatives:
  - Israel's firstborn
  lexicon: HALOT
  rationale: A straightforward appositional phrase identifying Reuben. 'The firstborn
    of Israel' preserves the formal relationship and echoes the Hebrew word order
    closely enough in natural English.
- source_word: תּוֹלְדֹתָם
  chosen: by their generations
  alternatives:
  - according to their generations
  - by their family records
  lexicon: HALOT
  rationale: תולדות in census/genealogical contexts refers to lineal descent or generational
    divisions. 'By their generations' preserves the formal flavor without overinterpreting
    as written records.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal organization is well rendered as 'clan,' which
    distinguishes it from the broader 'fathers’ houses' that follows.
- source_word: לְבֵית אֲבֹתָם
  chosen: by their fathers’ houses
  alternatives:
  - by their ancestral houses
  - by their family houses
  lexicon: HALOT
  rationale: This is a technical kinship expression in the census material. 'Fathers’
    houses' is a transparent and fairly standard rendering that preserves the patriarchal
    household structure of the Hebrew.
- source_word: בְּמִסְפַּר שֵׁמוֹת
  chosen: according to the number of names
  alternatives:
  - by the number of names
  - by name count
  lexicon: HALOT
  rationale: The phrase indicates enumeration by counted individuals listed by name.
    'According to the number of names' is idiomatic enough while staying close to
    the Hebrew.
- source_word: לְגֻלְגְּלֹתָם
  chosen: head by head
  alternatives:
  - one by one
  - by their skulls
  - individually
  lexicon: HALOT
  rationale: Literally 'by their skulls/heads,' an idiom for individual counting.
    'Head by head' preserves the concrete Hebrew imagery better than the smoother
    but less vivid 'one by one.'
- source_word: כָּל זָכָר
  chosen: every male
  alternatives:
  - every man
  lexicon: HALOT
  rationale: The Hebrew specifies sex rather than social status or adulthood alone.
    'Every male' is therefore more precise than 'every man,' especially since age
    qualification follows.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  chosen: from twenty years old and upward
  alternatives:
  - from twenty years old and above
  - twenty years old or older
  lexicon: HALOT
  rationale: This is the standard age threshold formula for military eligibility.
    'And upward' preserves the Hebrew idiom naturally.
- source_word: כֹּל יֹצֵא צָבָא
  chosen: everyone able to go out to war
  alternatives:
  - everyone going out to the army
  - everyone fit for military service
  - everyone who goes out to war
  lexicon: HALOT
  rationale: Literally 'everyone going out to the host/army.' In this census context
    the sense is military eligibility. 'Able to go out to war' makes the functional
    meaning explicit without excessive paraphrase.
