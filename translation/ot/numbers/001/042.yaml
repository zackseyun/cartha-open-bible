id: NUM.1.42
reference: Numbers 1:42
source:
  edition: WLC
  text: בְּנֵ֣י נַפְתָּלִ֔י תּוֹלְדֹתָ֥/ם לְ/מִשְׁפְּחֹתָ֖/ם לְ/בֵ֣ית אֲבֹתָ֑/ם בְּ/מִסְפַּ֣ר
    שֵׁמֹ֗ת מִ/בֶּ֨ן עֶשְׂרִ֤ים שָׁנָה֙ וָ/מַ֔עְלָ/ה כֹּ֖ל יֹצֵ֥א צָבָֽא׃
translation:
  text: 'The sons of Naphtali, by their generations, by their clans, by their fathers’
    houses, according to the number of names, from twenty years old and upward, every
    man able to go out to war:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'all going out to war' or 'every one going out to the
      host/army.' The Hebrew idiom refers to those eligible for military service.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי נַפְתָּלִי
  chosen: The sons of Naphtali
  alternatives:
  - The descendants of Naphtali
  - The children of Naphtali
  lexicon: HALOT
  rationale: בְּנֵי literally means 'sons of.' In this census formula it refers to
    the male tribal members descended from Naphtali. 'Sons' preserves the gendered
    and genealogical force better than the broader 'descendants' or 'children,' in
    keeping with gender-accurate translation.
- source_word: תּוֹלְדֹתָם
  chosen: by their generations
  alternatives:
  - according to their generations
  - by their lineage
  lexicon: HALOT
  rationale: The term denotes family descent/genealogical divisions. 'By their generations'
    preserves the formal census formula used repeatedly in Numbers 1 while remaining
    understandable in English.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal census contexts is more specific than the modern
    nuclear 'family' and is well represented by 'clans.'
- source_word: לְבֵית אֲבֹתָם
  chosen: by their fathers’ houses
  alternatives:
  - by their ancestral houses
  - by their paternal households
  lexicon: HALOT
  rationale: This is a standard Israelite kinship expression referring to paternal
    household groupings. 'Fathers’ houses' is a transparent, fairly literal rendering
    that preserves the social structure named in the Hebrew.
- source_word: בְּמִסְפַּר שֵׁמוֹת
  chosen: according to the number of names
  alternatives:
  - by the number of names
  - by name, according to the number
  lexicon: HALOT
  rationale: The phrase indicates enumeration by counted individuals listed by name.
    'According to the number of names' keeps the formal census wording without over-paraphrasing.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  chosen: from twenty years old and upward
  alternatives:
  - from twenty years old and above
  - aged twenty years and up
  lexicon: HALOT
  rationale: This is the standard age threshold formula in the chapter. 'From twenty
    years old and upward' is idiomatic and close to the Hebrew.
- source_word: כֹּל יֹצֵא צָבָא
  chosen: every man able to go out to war
  alternatives:
  - everyone going out to the army
  - every one fit for military service
  - all who go out to war
  lexicon: HALOT
  rationale: Literally, 'every one going out to the army/warfare.' In this census
    context it refers to men eligible for military service. 'Every man able to go
    out to war' makes the implied military eligibility explicit while preserving the
    martial sense of צָבָא.
