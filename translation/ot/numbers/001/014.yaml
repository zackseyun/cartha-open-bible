id: NUM.1.14
reference: Numbers 1:14
source:
  edition: WLC
  text: לְ/גָ֕ד אֶלְיָסָ֖ף בֶּן דְּעוּאֵֽל־׃
translation:
  text: from Gad[a], Eliasaph son of Deuel;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts and parallel passages give the name as Reuel (compare Numbers 2:14).
    reason: textual_variant
lexical_decisions:
- source_word: לְ/גָד
  chosen: from Gad
  alternatives:
  - for Gad
  lexicon: HALOT
  rationale: The prefixed לְ here marks tribal affiliation within the census-leader list, best rendered idiomatically as 'from Gad' in English. 'For Gad' is more formally possible, but 'from' better communicates that Eliasaph is the representative of the tribe of Gad in this context.
- source_word: אֶלְיָסָף
  chosen: Eliasaph
  rationale: 'Personal name transliterated according to the translation philosophy: translate titles, transliterate names.'
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard genealogical construction in Hebrew. 'Son of' is the natural concise English rendering in name lists.
- source_word: דְּעוּאֵל
  chosen: Deuel
  alternatives:
  - Reuel
  rationale: The MT/WLC form here is דְּעוּאֵל, which is most directly transliterated 'Deuel.' Because a parallel passage (Num 2:14) has 'Reuel,' that alternative is worth preserving in a footnote as a textual/name-form variant, but the main text should reflect the source text of this verse.
