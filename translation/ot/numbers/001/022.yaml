id: NUM.1.22
reference: Numbers 1:22
source:
  edition: WLC
  text: לִ/בְנֵ֣י שִׁמְע֔וֹן תּוֹלְדֹתָ֥/ם לְ/מִשְׁפְּחֹתָ֖/ם לְ/בֵ֣ית אֲבֹתָ֑/ם פְּקֻדָ֗י/ו
    בְּ/מִסְפַּ֤ר שֵׁמוֹת֙ לְ/גֻלְגְּלֹתָ֔/ם כָּל זָכָ֗ר מִ/בֶּ֨ן עֶשְׂרִ֤ים שָׁנָה֙
    וָ/מַ֔עְלָ/ה כֹּ֖ל יֹצֵ֥א צָבָֽא־׃
translation:
  text: 'For the sons of Simeon, by their generations, by their clans, by their fathers’
    houses, those numbered of them, by the number of names, head by head, every male
    from twenty years old and upward, everyone going out to war:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “those mustered from them” for “those numbered of them”; the Hebrew participle
      from פקד can carry census or muster nuance in this military-count context.
    reason: lexical_alternative
  - marker: b
    text: Literally “by their skulls/heads,” an idiom meaning individual counting,
      rendered here as “head by head.”
    reason: cultural_note
  - marker: c
    text: Or “everyone fit for military service”; the Hebrew reads more literally,
      “everyone going out to war.”
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי שִׁמְעוֹן
  chosen: For the sons of Simeon
  alternatives:
  - For the descendants of Simeon
  - For the children of Simeon
  lexicon: HALOT
  rationale: בני in tribal census formulas refers to the male descendants/tribal members
    of a named ancestor. 'Sons' preserves the formal linkage to the eponymous ancestor
    and the masculine census context.
- source_word: תּוֹלְדֹתָם
  chosen: by their generations
  alternatives:
  - according to their generations
  - by their family records
  lexicon: HALOT
  rationale: In census/genealogical contexts תולדות denotes lines of descent or generations.
    'By their generations' keeps the formal administrative-genealogical sense without
    over-paraphrasing.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  lexicon: HALOT
  rationale: משפחה commonly denotes a clan-level kinship unit within a tribe. 'Clans'
    is more precise than the broader English 'families' in this tribal census setting.
- source_word: לְבֵית אֲבֹתָם
  chosen: by their fathers’ houses
  alternatives:
  - according to their ancestral houses
  - by their paternal households
  lexicon: HALOT
  rationale: בית אבות is a standard social unit in Israelite organization. 'Fathers’
    houses' is a conventional but still transparent rendering that preserves the patriarchal
    household structure of the source.
- source_word: פְּקֻדָיו
  chosen: those numbered of them
  alternatives:
  - their counted men
  - those mustered from them
  lexicon: HALOT
  rationale: From פקד in the passive/participle census sense, referring to persons
    enrolled or counted. 'Those numbered of them' stays close to the Hebrew formula
    and avoids importing a stronger military nuance too early.
- source_word: בְּמִסְפַּר שֵׁמוֹת
  chosen: by the number of names
  alternatives:
  - according to the number of names
  - by name count
  lexicon: HALOT
  rationale: A formal census expression indicating enumeration by individual names.
    The literal rendering is clear in English and preserves the administrative precision.
- source_word: לְגֻלְגְּלֹתָם
  chosen: head by head
  alternatives:
  - one by one
  - by their skulls
  lexicon: HALOT
  rationale: Literally 'by their skulls/heads,' an idiom for individual counting.
    'Head by head' preserves the concrete Hebrew imagery while remaining idiomatic
    enough for English.
- source_word: כָּל זָכָר
  chosen: every male
  alternatives:
  - every man
  lexicon: HALOT
  rationale: זכר specifies sex, not merely adult status. 'Every male' is more exact
    than 'every man,' especially in a census formula.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  chosen: from twenty years old and upward
  alternatives:
  - from twenty years old and above
  - aged twenty years and up
  lexicon: HALOT
  rationale: Standard age-threshold formula. 'From twenty years old and upward' is
    natural and close to the Hebrew wording.
- source_word: כֹּל יֹצֵא צָבָא
  chosen: every one going out to war
  alternatives:
  - everyone able to go out to war
  - everyone fit for military service
  lexicon: HALOT
  rationale: Literally 'everyone going out to the army/war.' The phrase denotes military
    eligibility, but the Hebrew expression itself is retained rather than interpreted
    more dynamically as 'fit for military service.'
