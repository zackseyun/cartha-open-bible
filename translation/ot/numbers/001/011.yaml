id: NUM.1.11
reference: Numbers 1:11
source:
  edition: WLC
  text: לְ/בִ֨נְיָמִ֔ן אֲבִידָ֖ן בֶּן גִּדְעֹנִֽי־׃
translation:
  text: 'For Benjamin: Abidan son of Gideoni.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְ/בִנְיָמִן
  chosen: For Benjamin
  alternatives:
  - Of Benjamin
  - For the tribe of Benjamin
  lexicon: HALOT
  rationale: The prefixed לְ here introduces the tribal representative in a list,
    so 'For Benjamin' is a natural, concise English rendering that preserves the list
    structure without adding more than the Hebrew states. 'Of Benjamin' is possible
    but less clearly representative in English; 'for the tribe of Benjamin' is interpretive
    expansion beyond the terse source.
- source_word: אֲבִידָן
  chosen: Abidan
  rationale: Personal names are transliterated by standard conventions per translation
    philosophy. 'Abidan' is the conventional English transliteration of the Hebrew
    proper name.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: The construct בֶּן regularly denotes filiation. 'Son of' is the standard
    concise rendering in genealogical/list contexts. Adding 'the' is unnecessary in
    this appositional naming formula.
- source_word: גִּדְעֹנִי
  chosen: Gideoni
  rationale: This is a proper name and is therefore transliterated rather than translated,
    following the project's policy for personal names.
