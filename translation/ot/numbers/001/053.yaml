theological_decisions:
- issue: Nature of קֶצֶף in this cultic context
  chosen_reading: wrath refers to divine wrath/judicial outbreak if the sanctuary
    is not properly guarded
  alternative_readings:
  - general anger
  - human displeasure
  rationale: In Numbers' sanctuary context, the danger is not merely social disorder
    but holy judgment breaking out on Israel if sacred boundaries are violated. 'Wrath'
    preserves that theological weight without adding details not explicit in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    flatten covenantal/judicial language.
- issue: Rendering בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  - people of Israel
  rationale: The Hebrew is explicitly filial and masculine plural. Per the gender-accurate
    policy, the translation retains the form matching the source rather than neutralizing
    it, while preserving a more idiomatic alternative in a footnote.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
