id: NUM.1.53
reference: Numbers 1:53
source:
  edition: WLC
  text: וְ/הַ/לְוִיִּ֞ם יַחֲנ֤וּ סָבִיב֙ לְ/מִשְׁכַּ֣ן הָ/עֵדֻ֔ת וְ/לֹֽא יִהְיֶ֣ה
    קֶ֔צֶף עַל עֲדַ֖ת בְּנֵ֣י יִשְׂרָאֵ֑ל וְ/שָׁמְרוּ֙ הַ/לְוִיִּ֔ם אֶת מִשְׁמֶ֖רֶת
    מִשְׁכַּ֥ן הָ/עֵדֽוּת־־־׃
translation:
  text: But the Levites shall camp around the tabernacle of the testimony, so that
    there may be no wrath on the congregation of the sons of Israel; and the Levites
    shall keep charge of the tabernacle of the testimony.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “against the congregation of the Israelites.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַלְוִיִּם
  chosen: But the Levites
  alternatives:
  - And the Levites
  - Now the Levites
  lexicon: HALOT
  rationale: The conjunction links this instruction contrastively with the preceding
    arrangement of the other tribes, so 'But' best captures the discourse flow in
    natural English while preserving the conjunction. 'Levites' is the standard transliteration
    of the tribal name.
- source_word: יַחֲנוּ
  chosen: shall camp
  alternatives:
  - are to camp
  - must camp
  lexicon: HALOT
  rationale: The imperfect here expresses instruction/future obligation in the census-camp
    arrangement context. 'Shall camp' preserves the directive force without over-paraphrasing.
- source_word: סָבִיב
  chosen: around
  alternatives:
  - all around
  - surrounding
  lexicon: HALOT
  rationale: '''Around'' is the plain spatial sense and reads naturally with ''camp.'''
- source_word: לְמִשְׁכַּן הָעֵדֻת
  chosen: the tabernacle of the testimony
  alternatives:
  - the dwelling place of the testimony
  - the tabernacle of the covenant document
  lexicon: HALOT
  rationale: מִשְׁכָּן commonly denotes the tabernacle/dwelling, and in Pentateuchal
    cultic context 'tabernacle' is the clearest established English equivalent. הָעֵדוּת/הָעֵדֻת
    literally refers to the testimony, likely the covenant testimony housed there;
    retaining 'testimony' preserves the Hebrew term and avoids interpretive narrowing.
- source_word: וְלֹא יִהְיֶה קֶצֶף
  chosen: so that there may be no wrath
  alternatives:
  - and there will be no wrath
  - lest there be wrath
  - so that there will be no anger
  lexicon: HALOT
  rationale: 'The clause gives the purpose/result of the Levites'' encampment: preventing
    divine outbreak against Israel. ''Wrath'' better conveys covenantal/judicial force
    than the weaker ''anger.'' ''So that there may be no'' expresses the preventative
    sense naturally.'
- source_word: עַל עֲדַת בְּנֵי יִשְׂרָאֵל
  chosen: on the congregation of the sons of Israel
  alternatives:
  - against the congregation of the Israelites
  - upon the community of the people of Israel
  lexicon: HALOT
  rationale: עֵדָה is well rendered 'congregation' in Israel's assembled/covenantal
    setting. בְּנֵי יִשְׂרָאֵל is formally 'sons of Israel'; per gender-accurate policy,
    this is retained rather than flattened to 'Israelites,' though that alternative
    is viable idiomatic English.
- source_word: וְשָׁמְרוּ
  chosen: and ... shall keep
  alternatives:
  - and ... must guard
  - and ... are to observe
  lexicon: HALOT
  rationale: שׁמר here carries the sense of guarding/keeping an assigned duty. 'Shall
    keep' works idiomatically with מִשְׁמֶרֶת in the following phrase.
- source_word: מִשְׁמֶרֶת
  chosen: charge
  alternatives:
  - duty
  - guard
  - obligation
  lexicon: HALOT
  rationale: In priestly/tabernacle contexts, מִשְׁמֶרֶת often denotes an entrusted
    responsibility or charge. 'Keep charge of' is a natural English rendering that
    preserves both custody and duty.
- source_word: מִשְׁכַּן הָעֵדוּת
  chosen: the tabernacle of the testimony
  alternatives:
  - the tabernacle of the covenant testimony
  lexicon: HALOT
  rationale: Repeated phrase rendered consistently within the verse per translation
    philosophy. Consistency is especially important in cultic terminology.
