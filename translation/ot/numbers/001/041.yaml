id: NUM.1.41
reference: Numbers 1:41
source:
  edition: WLC
  text: פְּקֻדֵי/הֶ֖ם לְ/מַטֵּ֣ה אָשֵׁ֑ר אֶחָ֧ד וְ/אַרְבָּעִ֛ים אֶ֖לֶף וַ/חֲמֵ֥שׁ
    מֵאֽוֹת׃פ
translation:
  text: Those counted from the tribe of Asher were forty-one thousand five hundred.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: פְּקֻדֵיהֶם
  chosen: those counted
  alternatives:
  - their counted men
  - their number
  - those registered
  lexicon: HALOT
  rationale: From פקד in the passive/participle-like nominal form with 3mp suffix,
    referring to the enrolled/counted members of the tribe in the census context.
    'Those counted' is natural English and preserves the census sense without adding
    'men' explicitly where this verse itself only gives the tally formula.
- source_word: לְמַטֵּה
  chosen: from the tribe of
  alternatives:
  - for the tribe of
  - by tribe of
  lexicon: HALOT
  rationale: The preposition ל with מַטֶּה in this census formula identifies tribal
    affiliation. 'From the tribe of' is idiomatic in English and fits the repeated
    pattern in Numbers 1.
- source_word: אָשֵׁר
  chosen: Asher
  rationale: Proper tribal name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: אֶחָד וְאַרְבָּעִים אֶלֶף וַחֲמֵשׁ מֵאוֹת
  chosen: forty-one thousand five hundred
  alternatives:
  - one and forty thousand and five hundred
  lexicon: HALOT
  rationale: Standard English rendering of the Hebrew number sequence. The more literal
    order is less natural in modern English; the value is preserved exactly.
