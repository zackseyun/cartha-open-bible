  text: לְ/נַ֨פְתָּלִ֔י אֲחִירַ֖ע בֶּן עֵינָֽן־׃
translation:
  text: 'For Naphtali: Ahira son of Enan.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְ/נַפְתָּלִי
  chosen: For Naphtali
  alternatives:
  - Of Naphtali
  - From Naphtali
  lexicon: HALOT
  rationale: 'The prefixed לְ marks tribal association in this census-leader list:
    ''for Naphtali'' idiomatically conveys the representative assigned to the tribe.
    ''Of Naphtali'' is possible but less explicit in English about representative
    function.'
- source_word: אֲחִירַע
  chosen: Ahira
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard genealogical construction. 'Son of' is the natural concise English
    rendering in name lists.
- source_word: עֵינָן
  chosen: Enan
  rationale: Personal name transliterated by standard convention.
