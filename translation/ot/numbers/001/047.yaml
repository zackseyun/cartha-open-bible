id: NUM.1.47
reference: Numbers 1:47
source:
  edition: WLC
  text: וְ/הַ/לְוִיִּ֖ם לְ/מַטֵּ֣ה אֲבֹתָ֑/ם לֹ֥א הָתְפָּקְד֖וּ בְּ/תוֹכָֽ/ם׃פ
translation:
  text: But the Levites[a], by their fathers' tribe[b], were not counted among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'according to the tribe of their fathers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'were not registered' or 'were not mustered' among them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַלְוִיִּם
  chosen: But the Levites
  alternatives:
  - And the Levites
  - Now the Levites
  lexicon: HALOT
  rationale: וְ here is rendered adversatively in context because verse 47 contrasts the Levites with the previously numbered tribes. 'Levites' is the standard transliteration of the tribal name לְוִי.
- source_word: לְמַטֵּה אֲבֹתָם
  chosen: by their ancestral tribe
  alternatives:
  - according to the tribe of their fathers
  - by the tribe of their fathers
  lexicon: HALOT
  rationale: מַטֶּה in census/tribal contexts means 'tribe.' אֲבֹתָם literally 'their fathers' refers idiomatically to ancestral lineage or fathers' houses. 'Ancestral tribe' preserves the genealogical sense in natural English without over-paraphrasing.
- source_word: לֹא הָתְפָּקְדוּ
  chosen: were not counted
  alternatives:
  - were not registered
  - were not mustered
  lexicon: HALOT
  rationale: The hitpael of פקד in this census context refers to being enrolled/numbered in the official count. 'Were not counted' is clear modern English and fits the immediate context of the chapter's census.
- source_word: בְּתוֹכָם
  chosen: among them
  alternatives:
  - in their midst
  lexicon: HALOT
  rationale: בְּתוֹךְ commonly means 'in the midst/middle of.' Here it indicates inclusion within the counted body of the other tribes, so 'among them' best conveys the sense idiomatically.
