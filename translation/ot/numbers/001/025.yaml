id: NUM.1.25
reference: Numbers 1:25
source:
  edition: WLC
  text: פְּקֻדֵי/הֶ֖ם לְ/מַטֵּ֣ה גָ֑ד חֲמִשָּׁ֤ה וְ/אַרְבָּעִים֙ אֶ֔לֶף וְ/שֵׁ֥שׁ
    מֵא֖וֹת וַ/חֲמִשִּֽׁים׃פ
translation:
  text: Those counted from the tribe of Gad were forty-five thousand six hundred fifty.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: פְּקֻדֵיהֶם
  chosen: Those counted
  alternatives:
  - their counted ones
  - their numbered men
  lexicon: HALOT
  rationale: The passive participial form from פקד in this census context refers to
    those enrolled or counted. 'Those counted' is natural modern English and preserves
    the census sense without adding 'men,' which is implied by the broader context
    but not explicit in this verse alone.
- source_word: לְמַטֵּה
  chosen: from the tribe of
  alternatives:
  - for the tribe of
  - belonging to the tribe of
  lexicon: HALOT
  rationale: In this formulaic census expression, ל plus מַטֶּה identifies tribal
    affiliation. 'From the tribe of' is idiomatic in English and fits the enumerative
    context.
- source_word: גָד
  chosen: Gad
  rationale: Proper tribal name; transliterated according to standard convention.
- source_word: חֲמִשָּׁה וְאַרְבָּעִים אֶלֶף
  chosen: forty-five thousand
  alternatives:
  - five and forty thousand
  lexicon: HALOT
  rationale: Hebrew gives the number in ascending order, but standard English expresses
    it as 'forty-five thousand.'
- source_word: וְשֵׁשׁ מֵאוֹת וַחֲמִשִּׁים
  chosen: six hundred fifty
  alternatives:
  - and fifty-six hundred
  lexicon: HALOT
  rationale: The remaining number is rendered in standard English order and style.
    'Six hundred fifty' is clear and accurate.
