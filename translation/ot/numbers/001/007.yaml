  text: לִֽ/יהוּדָ֕ה נַחְשׁ֖וֹן בֶּן עַמִּינָדָֽב־׃
translation:
  text: for Judah, Nahshon son of Amminadab;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לִיהוּדָה
  chosen: for Judah
  alternatives:
  - of Judah
  - belonging to Judah
  lexicon: HALOT
  rationale: The prefixed ל marks association/representation in this tribal-leader
    list; 'for Judah' best conveys that Nahshon is the representative assigned to
    the tribe of Judah in idiomatic English.
- source_word: נַחְשׁוֹן
  chosen: Nahshon
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  - descendant of
  lexicon: HALOT
  rationale: The construct chain with a personal name most naturally denotes immediate
    filiation here; 'son of' is the standard and sufficiently formal rendering.
- source_word: עַמִּינָדָב
  chosen: Amminadab
  rationale: Personal name transliterated by standard English convention.
