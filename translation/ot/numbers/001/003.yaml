id: NUM.1.3
reference: Numbers 1:3
source:
  edition: WLC
  text: מִ/בֶּ֨ן עֶשְׂרִ֤ים שָׁנָה֙ וָ/מַ֔עְלָ/ה כָּל יֹצֵ֥א צָבָ֖א בְּ/יִשְׂרָאֵ֑ל
    תִּפְקְד֥וּ אֹתָ֛/ם לְ/צִבְאֹתָ֖/ם אַתָּ֥ה וְ/אַהֲרֹֽן־׃
translation:
  text: From twenty years old and upward, every man going out to war in Israel—you
    and Aaron shall count them by their companies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every one going out to war.' The Hebrew expression is a military idiom
      for those eligible for service; the context in this chapter specifies males.
    reason: lexical_alternative
  - marker: b
    text: Or 'by their companies' or 'by their military units.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  chosen: From twenty years old and upward
  alternatives:
  - From twenty years and above
  - From the age of twenty and up
  lexicon: HALOT
  rationale: The idiom marks the lower age threshold for eligibility. 'Years old'
    is natural English and preserves the Hebrew sense without unnecessary stiffness.
- source_word: כָּל
  chosen: every
  alternatives:
  - all
  lexicon: HALOT
  rationale: With the following singular participle, 'every' better reflects distributive
    force in English than 'all'.
- source_word: יֹצֵא צָבָא
  chosen: man going out to war
  alternatives:
  - one going out to the army
  - able to go out to war
  lexicon: HALOT
  rationale: The phrase is a military idiom for those eligible for military service.
    'Going out to war' preserves the concrete Hebrew expression. 'Man' is supplied
    because the census context is explicitly male in this chapter and the Hebrew masculine
    form is gender-accurate here rather than generic.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - among Israel
  lexicon: HALOT
  rationale: '''In Israel'' is the most direct rendering and fits the national sense
    here.'
- source_word: תִּפְקְדוּ אֹתָם
  chosen: you and Aaron shall count them
  alternatives:
  - you and Aaron shall number them
  - you and Aaron shall muster them
  lexicon: HALOT
  rationale: פקד in this census context means to register/count for service. 'Count'
    is clear modern English. The explicit subject 'you and Aaron' is brought forward
    for natural English emphasis while preserving the command.
- source_word: לְצִבְאֹתָם
  chosen: by their divisions
  alternatives:
  - according to their companies
  - by their hosts
  - by their military units
  lexicon: HALOT
  rationale: Related to צבא, the phrase indicates organization for military service.
    'By their divisions' is readable and suitably military without sounding archaic
    like 'hosts.'
- source_word: אַתָּה וְאַהֲרֹן
  chosen: you and Aaron
  alternatives:
  - you, with Aaron
  lexicon: HALOT
  rationale: The explicit pronoun plus name emphasizes the agents charged with the
    counting; straightforwardly rendered.
