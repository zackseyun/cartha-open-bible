  chosen_reading: every man going out to war
  alternative_readings:
  - everyone going out to war
  - every one able to serve in the army
  rationale: The chapter's census is specifically of males eligible for military service,
    so gender-accurate language is required by the source and by the translation philosophy
    rather than a gender-neutral rendering.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
