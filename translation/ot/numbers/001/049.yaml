id: NUM.1.49
reference: Numbers 1:49
source:
  edition: WLC
  text: אַ֣ךְ אֶת מַטֵּ֤ה לֵוִי֙ לֹ֣א תִפְקֹ֔ד וְ/אֶת רֹאשָׁ֖/ם לֹ֣א תִשָּׂ֑א בְּ/ת֖וֹךְ בְּנֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: Only the tribe of Levi you shall not count[a], and you shall not take their number among the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel.' The Hebrew reads 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: Only
  alternatives:
  - However
  - But
  lexicon: HALOT
  rationale: אַךְ here marks an exception to the preceding census instructions. 'Only' captures the restrictive/exceptive force more precisely than a simple adversative like 'but.'
- source_word: מַטֵּה לֵוִי
  chosen: the tribe of Levi
  alternatives:
  - the staff of Levi
  - the branch of Levi
  lexicon: HALOT
  rationale: מַטֶּה in census and tribal contexts denotes 'tribe.' Rendering it as 'tribe' reflects the established semantic value in this context rather than the literal sense 'staff.'
- source_word: תִפְקֹד
  chosen: count
  alternatives:
  - muster
  - number
  - enroll
  lexicon: HALOT
  rationale: פקד in this military-census setting refers to taking a census or mustering. 'Count' is clear modern English and fits the immediate context without becoming overly technical.
- source_word: רֹאשָׁם
  chosen: their number
  alternatives:
  - their head count
  - their heads
  - the sum of them
  lexicon: HALOT
  rationale: Although literally 'their head,' the idiom with נשׂא means to take or lift up the total/head count in a census. 'Their number' expresses the idiomatic sense naturally in English.
- source_word: תִשָּׂא
  chosen: take
  alternatives:
  - lift up
  - take account of
  lexicon: HALOT
  rationale: With רֹאשׁ in census language, נשׂא forms the idiom 'take a count/number.' Rendering only the literal 'lift up' would obscure the idiomatic meaning.
- source_word: בְּתוֹךְ
  chosen: among
  alternatives:
  - in the midst of
  - in the middle of
  lexicon: HALOT
  rationale: בְּתוֹךְ with a people group here indicates inclusion within a larger counted body. 'Among' is the most natural English equivalent in this census context.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Per the project's gender-accurate philosophy, the masculine plural construct is preserved as 'sons of Israel.' 'Israelites' is possible but less formally transparent to the Hebrew wording.
