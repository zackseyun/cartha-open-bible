id: NUM.1.2
reference: Numbers 1:2
source:
  edition: WLC
  text: שְׂא֗וּ אֶת רֹאשׁ֙ כָּל עֲדַ֣ת בְּנֵֽי יִשְׂרָאֵ֔ל לְ/מִשְׁפְּחֹתָ֖/ם לְ/בֵ֣ית אֲבֹתָ֑/ם בְּ/מִסְפַּ֣ר שֵׁמ֔וֹת כָּל זָכָ֖ר לְ/גֻלְגְּלֹתָֽ/ם־־־־׃
translation:
  text: Take a census of the whole congregation of the sons of Israel[a], by their clans, by their fathers’ houses, according to the number of names, every male[c][b], head by head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'lift up the head of'; that is, count or enroll for a census.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites.' Literally, 'the sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: 'Literally, ''head by head.'' Hebrew: ''by their skulls/heads,'' an idiom for counting individuals one at a time.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂאוּ אֶת רֹאשׁ
  chosen: Take a census
  alternatives:
  - Lift up the head of
  - Count
  lexicon: HALOT
  rationale: The idiom literally reads 'lift up the head of' and in this administrative context means to count or enroll. 'Take a census' best captures the established sense in clear modern English while preserving the formal force of an official numbering.
- source_word: כָּל עֲדַת
  chosen: the whole congregation
  alternatives:
  - all the assembly
  - the whole community
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled community/congregation of Israel. 'Congregation' preserves the corporate sense without over-paraphrasing.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the masculine filial expression is retained rather than neutralized. 'Sons of Israel' is formally closer than 'Israelites,' while still natural enough in context.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה here refers to kinship subdivisions within the tribes. 'Clans' communicates the social-unit sense more precisely than modern English 'families.'
- source_word: לְבֵית אֲבֹתָם
  chosen: by their fathers’ houses
  alternatives:
  - according to their ancestral houses
  - by their paternal households
  lexicon: HALOT
  rationale: The phrase denotes descent groups organized by paternal lineage. 'Fathers’ houses' is a standard, transparent rendering that preserves the patriarchal household structure of the Hebrew.
- source_word: בְּמִסְפַּר שֵׁמוֹת
  chosen: according to the number of names
  alternatives:
  - by number of names
  - by name, according to the count
  lexicon: HALOT
  rationale: The Hebrew specifies enumeration by registered names. 'According to the number of names' keeps the formal administrative wording and avoids collapsing the phrase into a simple 'count them.'
- source_word: כָּל זָכָר
  chosen: every male
  alternatives:
  - all the males
  - every man
  lexicon: HALOT
  rationale: זָכָר is specifically biological/sexed language, so 'male' is more precise than 'man' here.
- source_word: לְגֻלְגְּלֹתָם
  chosen: head by head
  alternatives:
  - one by one
  - by their skulls
  - per head
  lexicon: HALOT
  rationale: Literally 'by their skulls/heads,' an idiom for individual counting. 'Head by head' preserves the concrete Hebrew imagery better than the more idiomatic but less formal 'one by one.'
