id: NUM.1.35
reference: Numbers 1:35
source:
  edition: WLC
  text: פְּקֻדֵי/הֶ֖ם לְ/מַטֵּ֣ה מְנַשֶּׁ֑ה שְׁנַ֧יִם וּ/שְׁלֹשִׁ֛ים אֶ֖לֶף וּ/מָאתָֽיִם׃פ
translation:
  text: Their numbered men from the tribe of Manasseh were thirty-two thousand two
    hundred.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: פְּקֻדֵיהֶם
  chosen: their numbered men
  alternatives:
  - those counted from them
  - their enrollment
  - their mustered men
  lexicon: HALOT
  rationale: The passive participial form from פקד in this census context refers to
    those who were counted/mustered. English needs an explicit referent; 'numbered
    men' captures the census sense naturally. 'Mustered men' is possible, but here
    the immediate context is numerical registration rather than military action alone.
- source_word: לְמַטֵּה
  chosen: from the tribe of
  alternatives:
  - for the tribe of
  - belonging to the tribe of
  lexicon: HALOT
  rationale: The preposition ל with מַטֶּה in this recurring census formula identifies
    tribal affiliation. 'From the tribe of' is idiomatic in English and fits the sense
    of those counted as belonging to that tribe.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  rationale: Proper name transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: שְׁנַיִם וּשְׁלֹשִׁים אֶלֶף וּמָאתָיִם
  chosen: thirty-two thousand two hundred
  alternatives:
  - two and thirty thousand and two hundred
  lexicon: HALOT
  rationale: This is the straightforward cardinal number sequence. Modern English
    reverses the Hebrew order for readability while preserving the exact value.
