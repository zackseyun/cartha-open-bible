id: NUM.1.34
reference: Numbers 1:34
source:
  edition: WLC
  text: לִ/בְנֵ֣י מְנַשֶּׁ֔ה תּוֹלְדֹתָ֥/ם לְ/מִשְׁפְּחֹתָ֖/ם לְ/בֵ֣ית אֲבֹתָ֑/ם בְּ/מִסְפַּ֣ר שֵׁמ֗וֹת מִ/בֶּ֨ן עֶשְׂרִ֤ים שָׁנָה֙ וָ/מַ֔עְלָ/ה כֹּ֖ל יֹצֵ֥א צָבָֽא׃
translation:
  text: 'From the sons of Manasseh[a], by their generations, by their clans, by their fathers’ houses, by the number of names, from twenty years old and upward, every man going out for military service:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “every one going out to war.” The Hebrew expression refers to those eligible for military duty.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי מְנַשֶּׁה
  chosen: From the sons of Manasseh
  alternatives:
  - For the sons of Manasseh
  - Of the sons of Manasseh
  lexicon: HALOT
  rationale: The prefixed ל in this census formula introduces the tribal heading. 'From the sons of Manasseh' fits the elliptical structure carried over from the surrounding verses and reads naturally in English while preserving the genealogical sense of בנים as 'sons,' not a more generic 'descendants'.
- source_word: תּוֹלְדֹתָם
  chosen: by their generations
  alternatives:
  - according to their generations
  - by their ancestry
  lexicon: HALOT
  rationale: In this repeated census formula, תולדות denotes lineal descent/genealogical divisions. 'By their generations' preserves the formal structure and avoids overinterpreting it as merely 'ancestry.'
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal census contexts refers to kinship subdivisions within a tribe. 'Clans' is more precise in English than 'families,' which can sound too narrow or modern.
- source_word: לְבֵית אֲבֹתָם
  chosen: by their fathers’ houses
  alternatives:
  - according to their ancestral houses
  - by their paternal houses
  lexicon: HALOT
  rationale: This is a standard Israelite kinship expression. 'Fathers’ houses' is a conventional and transparent rendering that preserves the social structure indicated by the Hebrew.
- source_word: בְּמִסְפַּר שֵׁמוֹת
  chosen: by the number of names
  alternatives:
  - according to the number of names
  - by name, according to the number
  lexicon: HALOT
  rationale: The phrase indicates enumeration of individuals by counted names. 'By the number of names' keeps the formal census language and matches the repeated pattern in the chapter.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  chosen: from twenty years old and upward
  alternatives:
  - from a son of twenty years and upward
  - twenty years old and above
  lexicon: HALOT
  rationale: This idiom marks the age threshold for military eligibility. 'From twenty years old and upward' is idiomatic modern English while staying close to the Hebrew.
- source_word: כֹּל יֹצֵא צָבָא
  chosen: every man going out for military service
  alternatives:
  - everyone going out to the army
  - every one going out to war
  - all who go out to the host
  lexicon: HALOT
  rationale: The expression refers to those eligible for organized military duty. 'Military service' communicates צָבָא clearly in contemporary English. 'Every man' is supplied because the census concerns males of military age, and the Hebrew masculine singular participle in this context is gender-specific rather than generic.
