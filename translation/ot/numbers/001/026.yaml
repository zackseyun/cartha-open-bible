id: NUM.1.26
reference: Numbers 1:26
source:
  edition: WLC
  text: לִ/בְנֵ֣י יְהוּדָ֔ה תּוֹלְדֹתָ֥/ם לְ/מִשְׁפְּחֹתָ֖/ם לְ/בֵ֣ית אֲבֹתָ֑/ם בְּ/מִסְפַּ֣ר שֵׁמֹ֗ת מִ/בֶּ֨ן עֶשְׂרִ֤ים שָׁנָה֙ וָ/מַ֔עְלָ/ה כֹּ֖ל יֹצֵ֥א צָבָֽא׃
translation:
  text: 'For the sons of Judah[a], by their generations, by their clans, by their fathers’ houses, according to the number of names, from twenty years old and upward, every male going out to war:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all who go out to war.' The Hebrew idiom refers to those eligible for military service.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי יְהוּדָה
  chosen: For the sons of Judah
  alternatives:
  - For the descendants of Judah
  - Of the sons of Judah
  lexicon: HALOT
  rationale: בני literally means 'sons of.' In this census formula it denotes the tribal members descended from Judah. 'Sons' preserves the Hebrew form and the gendered census context better than the more generalized 'descendants,' while 'For' fits the list structure carried over from the preceding verse.
- source_word: תּוֹלְדֹתָם
  chosen: by their generations
  alternatives:
  - according to their genealogical records
  - by their lineage
  lexicon: HALOT
  rationale: תולדות can denote generations, genealogical descent, or family records. In this census context it refers to lineage ordering. 'By their generations' stays close to the Hebrew and matches the formulaic sequence without over-interpreting as written documents.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  lexicon: HALOT
  rationale: משפחה in tribal census contexts is narrower than the modern English 'family' and often refers to a clan subdivision within a tribe. 'Clans' best communicates the social unit intended.
- source_word: לְבֵית אֲבֹתָם
  chosen: by their fathers’ houses
  alternatives:
  - by their ancestral houses
  - by their family houses
  lexicon: HALOT
  rationale: The phrase literally means 'by the house of their fathers' and refers to paternal household groupings. 'Fathers’ houses' preserves the idiom and patriarchal structure of the source better than smoothing it away.
- source_word: בְּמִסְפַּר שֵׁמוֹת
  chosen: according to the number of names
  alternatives:
  - by number of names
  - by headcount
  lexicon: HALOT
  rationale: Literally 'in/by the number of names.' This formula indicates counting individuals by name. 'According to the number of names' is clear and fairly formal; 'headcount' is too interpretive and colloquial.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  chosen: from twenty years old and upward
  alternatives:
  - from twenty years old and above
  - aged twenty years and up
  lexicon: HALOT
  rationale: This is the standard age threshold formula in the census. 'From twenty years old and upward' is natural English and preserves the formal register.
- source_word: כֹּל יֹצֵא צָבָא
  chosen: every man able to go out to war
  alternatives:
  - everyone going out to the army
  - all who go out to war
  lexicon: HALOT
  rationale: The idiom literally means 'everyone going out to the army/warfare' and refers to those eligible for military service. 'Every man able to go out to war' makes the military-eligibility sense explicit in idiomatic English. 'Man' is appropriate because the census concerns adult males eligible for war service.
