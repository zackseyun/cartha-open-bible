id: NUM.1.30
reference: Numbers 1:30
source:
  edition: WLC
  text: לִ/בְנֵ֣י זְבוּלֻ֔ן תּוֹלְדֹתָ֥/ם לְ/מִשְׁפְּחֹתָ֖/ם לְ/בֵ֣ית אֲבֹתָ֑/ם בְּ/מִסְפַּ֣ר
    שֵׁמֹ֗ת מִ/בֶּ֨ן עֶשְׂרִ֤ים שָׁנָה֙ וָ/מַ֔עְלָ/ה כֹּ֖ל יֹצֵ֥א צָבָֽא׃
translation:
  text: 'For the sons of Zebulun, by their generations, by their clans, by their fathers’
    houses, according to the number of names, from twenty years old and upward, every
    man able to go out to war:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fit for military service.' The Hebrew idiom is literally 'going out
      to war.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי
  chosen: For the sons of
  alternatives:
  - Of the sons of
  - For the descendants of
  lexicon: HALOT
  rationale: The prefixed ל here introduces the tribal heading in the census formula.
    'For the sons of' preserves the repetitive administrative style of the passage
    better than a more interpretive 'descendants of.'
- source_word: זְבוּלֻן
  chosen: Zebulun
  lexicon: HALOT
  rationale: Standard English transliteration of the tribal/personal name, following
    the policy to transliterate names rather than translate them.
- source_word: תּוֹלְדֹתָם
  chosen: by their generations
  alternatives:
  - according to their generations
  - by their family records
  lexicon: HALOT
  rationale: In this census context the term refers to lineage/descent grouping. 'By
    their generations' keeps the formal structure and genealogical sense without over-paraphrasing.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  - by their families
  lexicon: HALOT
  rationale: '''Clans'' communicates extended kinship subdivisions within the tribe
    more precisely in contemporary English than the broader ''families.'''
- source_word: לְבֵית אֲבֹתָם
  chosen: by their fathers’ houses
  alternatives:
  - by their ancestral houses
  - by their paternal houses
  lexicon: HALOT
  rationale: This is a technical kinship expression in census and inheritance contexts.
    'Fathers’ houses' is the most transparent formal rendering; 'ancestral houses'
    is smoother but less exact.
- source_word: בְּמִסְפַּר שֵׁמוֹת
  chosen: according to the number of names
  alternatives:
  - by number of names
  - by headcount
  lexicon: HALOT
  rationale: The phrase is idiomatic for enumeration of individuals. 'According to
    the number of names' preserves the wording of the source; 'headcount' would be
    too interpretive for the main text.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  chosen: from twenty years old and upward
  alternatives:
  - from twenty years old and above
  - aged twenty years and up
  lexicon: HALOT
  rationale: This is the standard age-threshold formula in the chapter. The chosen
    rendering is natural English while remaining close to the Hebrew structure.
- source_word: כֹּל
  chosen: every man
  alternatives:
  - everyone
  - every male
  lexicon: HALOT
  rationale: In context this refers specifically to males eligible for military service.
    'Every man' is gender-accurate and fits the doctrinal guidance better than the
    gender-neutral 'everyone.'
- source_word: יֹצֵא צָבָא
  chosen: able to go out to war
  alternatives:
  - going out to war
  - fit for military service
  lexicon: HALOT
  rationale: The idiom denotes those eligible for military duty. 'Able to go out to
    war' makes the functional sense explicit while staying close to the Hebrew military
    idiom.
