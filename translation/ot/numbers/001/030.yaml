theological_decisions:
- issue: Gendered military census language
  chosen_reading: every man able to go out to war
  alternative_readings:
  - everyone able to go out to war
  - every male fit for military service
  rationale: The Hebrew census formula is explicitly male and military in scope. Following
    the translation philosophy's gender-accurate principle, the rendering preserves
    the masculine reference rather than neutralizing it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
