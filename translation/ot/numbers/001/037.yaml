id: NUM.1.37
reference: Numbers 1:37
source:
  edition: WLC
  text: פְּקֻדֵי/הֶ֖ם לְ/מַטֵּ֣ה בִנְיָמִ֑ן חֲמִשָּׁ֧ה וּ/שְׁלֹשִׁ֛ים אֶ֖לֶף וְ/אַרְבַּ֥ע
    מֵאֽוֹת׃פ
translation:
  text: Those counted from the tribe of Benjamin were thirty-five thousand four hundred.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: פְּקֻדֵיהֶם
  chosen: those counted
  alternatives:
  - their counted ones
  - their numbered men
  - those registered
  lexicon: HALOT
  rationale: From פקד in the passive/participle-like nominal form with 3mp suffix,
    referring to the census total for this tribe. 'Those counted' is natural English
    and preserves the census sense without adding 'men' explicitly, since that is
    supplied by the broader context rather than this word alone in the verse.
- source_word: לְמַטֵּה
  chosen: from the tribe of
  alternatives:
  - for the tribe of
  - by the tribe of
  lexicon: HALOT
  rationale: The preposition ל with מַטֶּה in this census formula identifies tribal
    affiliation. 'From the tribe of' is idiomatic in English and fits the repeated
    pattern in Numbers 1.
- source_word: בִנְיָמִן
  chosen: Benjamin
  rationale: Standard English transliteration of the personal/tribal name.
- source_word: חֲמִשָּׁה וּשְׁלֹשִׁים אֶלֶף וְאַרְבַּע מֵאוֹת
  chosen: thirty-five thousand four hundred
  alternatives:
  - five and thirty thousand and four hundred
  lexicon: HALOT
  rationale: Rendered into standard contemporary English number style while preserving
    the exact value of the Hebrew expression.
