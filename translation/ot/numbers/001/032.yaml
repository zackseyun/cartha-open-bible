id: NUM.1.32
reference: Numbers 1:32
source:
  edition: WLC
  text: לִ/בְנֵ֤י יוֹסֵף֙ לִ/בְנֵ֣י אֶפְרַ֔יִם תּוֹלְדֹתָ֥/ם לְ/מִשְׁפְּחֹתָ֖/ם לְ/בֵ֣ית אֲבֹתָ֑/ם בְּ/מִסְפַּ֣ר שֵׁמֹ֗ת מִ/בֶּ֨ן עֶשְׂרִ֤ים שָׁנָה֙ וָ/מַ֔עְלָ/ה כֹּ֖ל יֹצֵ֥א צָבָֽא׃
translation:
  text: 'For the sons of Joseph[a], for the sons of Ephraim, by their generations, by their clans, by their fathers’ houses, by the number of names, from twenty years old and upward, every man going out to war:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all who go out for military service.' The Hebrew idiom literally speaks of going out to war.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי יוֹסֵף
  chosen: For the sons of Joseph
  alternatives:
  - For the descendants of Joseph
  - Of the sons of Joseph
  lexicon: HALOT
  rationale: לְ introducing this census formula is best carried as 'for' in English, marking the tribal heading. בנים here refers to tribal descendants; 'sons' preserves the formal genealogical idiom.
- source_word: לִבְנֵי אֶפְרַיִם
  chosen: for the sons of Ephraim
  alternatives:
  - for the descendants of Ephraim
  lexicon: HALOT
  rationale: Continues the tribal specification under Joseph. 'Sons' is retained for genealogical precision and consistency with the Hebrew construction.
- source_word: תּוֹלְדֹתָם
  chosen: by their generations
  alternatives:
  - according to their generations
  - their genealogical records
  lexicon: HALOT
  rationale: In this census context תולדות denotes lineage/generational descent. 'By their generations' matches the repeated administrative formula without overinterpreting it as written records.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal organization is more specific than the modern nuclear 'family'; 'clans' better reflects the social unit.
- source_word: לְבֵית אֲבֹתָם
  chosen: by their fathers’ houses
  alternatives:
  - by their ancestral houses
  - by their paternal households
  lexicon: HALOT
  rationale: A technical kinship expression in census lists. 'Fathers’ houses' preserves the formal structure and patriarchal lineage terminology of the Hebrew.
- source_word: בְּמִסְפַּר שֵׁמוֹת
  chosen: by the number of names
  alternatives:
  - by number of names
  - according to the number of names
  lexicon: HALOT
  rationale: A standard census phrase indicating individual enumeration. 'By the number of names' is clear and close to the Hebrew wording.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  chosen: from twenty years old and upward
  alternatives:
  - from twenty years old and above
  - aged twenty years and up
  lexicon: HALOT
  rationale: This is the conventional age threshold formula for military eligibility. 'And upward' preserves the idiom naturally.
- source_word: כֹּל יֹצֵא צָבָא
  chosen: every man going out to war
  alternatives:
  - everyone able to go out to war
  - all who go out for military service
  lexicon: HALOT
  rationale: The phrase denotes those eligible for military service. Because the census concerns adult males in Israel's tribal muster, 'every man' makes the gendered reference explicit and accurate; 'going out to war' preserves the Hebrew military idiom more closely than a purely administrative paraphrase.
