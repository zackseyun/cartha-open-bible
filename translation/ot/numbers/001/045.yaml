id: NUM.1.45
reference: Numbers 1:45
source:
  edition: WLC
  text: וַ/יִּֽהְי֛וּ כָּל פְּקוּדֵ֥י בְנֵֽי יִשְׂרָאֵ֖ל לְ/בֵ֣ית אֲבֹתָ֑/ם מִ/בֶּ֨ן עֶשְׂרִ֤ים שָׁנָה֙ וָ/מַ֔עְלָ/ה כָּל יֹצֵ֥א צָבָ֖א בְּ/יִשְׂרָאֵֽל־־־׃
translation:
  text: So all those counted of the sons of Israel[a], by their fathers’ houses, from twenty years old and upward, every one able to go out to war in Israel[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads 'the sons of Israel,' which is retained here because the census is explicitly organized in male, military terms.
    reason: lexical_alternative
  - marker: b
    text: Or 'everyone fit for military service.' Literally, 'every one going out to war/army.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: So ... were
  alternatives:
  - And ... were
  - Thus ... were
  lexicon: HALOT
  rationale: Wayyiqtol of היה continues the narrative/result from the preceding census totals. 'So' captures the summative force in context, while 'were' supplies the copular sense.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole number of
  lexicon: HALOT
  rationale: Retains the comprehensive scope of the census statement.
- source_word: פְּקוּדֵי
  chosen: those counted
  alternatives:
  - numbered men
  - enrolled ones
  - mustered men
  lexicon: HALOT
  rationale: From פקד in a census/mustering context. 'Those counted' is clear modern English and preserves the passive/resultative sense without over-specifying beyond the Hebrew.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Gender-accurate and formally close to the Hebrew. In this military census context, the masculine expression is significant and should not be flattened to a generic ethnic label in the main text.
- source_word: לְבֵית אֲבֹתָם
  chosen: by their fathers’ houses
  alternatives:
  - according to their ancestral houses
  - by their family houses
  lexicon: HALOT
  rationale: This phrase indicates clan/patrilineal organization for the census. 'Fathers’ houses' preserves the social structure named in the Hebrew.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  chosen: from twenty years old and upward
  alternatives:
  - from twenty years old and above
  - aged twenty years and up
  lexicon: HALOT
  rationale: Standard age-threshold formula; this rendering is natural and precise.
- source_word: כָּל יֹצֵא צָבָא
  chosen: every one able to go out to war
  alternatives:
  - everyone going out to the army
  - every military-aged man
  - everyone fit for military service
  lexicon: HALOT
  rationale: Literally 'every goer-out of host/army.' In context it denotes those eligible for warfare. 'Able to go out to war' preserves the idiom while making the military sense explicit.
- source_word: צָבָא
  chosen: war
  alternatives:
  - army
  - service
  - host
  lexicon: HALOT
  rationale: Within the idiom יצא צבא, the sense is military campaign/service. 'War' is the most idiomatic English in this construction.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - among Israel
  lexicon: HALOT
  rationale: A straightforward locative/corporate phrase; 'in Israel' is natural and sufficiently literal.
