theological_decisions:
- issue: Gendered census language
  chosen_reading: every man able to go out to war
  alternative_readings:
  - everyone able to go out to war
  - all able to serve in the army
  rationale: The Hebrew census formula is grammatically masculine and contextually
    refers to military-age males within the tribe. Per the translation philosophy,
    gender-accurate rendering is preferred over gender-neutral language when the source
    intent is male-specific.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
