id: NUM.1.28
reference: Numbers 1:28
source:
  edition: WLC
  text: לִ/בְנֵ֣י יִשָּׂשכָ֔ר תּוֹלְדֹתָ֥/ם לְ/מִשְׁפְּחֹתָ֖/ם לְ/בֵ֣ית אֲבֹתָ֑/ם
    בְּ/מִסְפַּ֣ר שֵׁמֹ֗ת מִ/בֶּ֨ן עֶשְׂרִ֤ים שָׁנָה֙ וָ/מַ֔עְלָ/ה כֹּ֖ל יֹצֵ֥א צָבָֽא׃
translation:
  text: 'For the sons of Issachar, by their generations, by their clans, by their
    fathers’ houses, by the number of names, from twenty years old and upward, every
    man able to go out to war:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every one who goes out to war.' The Hebrew expression is literally 'every
      going-out of army/war' and refers here to military-eligible men.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי יִשָּׂשכָר
  chosen: For the sons of Issachar
  alternatives:
  - For the descendants of Issachar
  - Of the sons of Issachar
  lexicon: HALOT
  rationale: לְ introducing the tribal heading in this census formula is best rendered
    idiomatically as 'For.' בְּנֵי is literally 'sons of,' and in this tribal context
    denotes male descendants/members of the tribe. 'Sons' preserves the gendered and
    genealogical force better than the more generic 'descendants.'
- source_word: תּוֹלְדֹתָם
  chosen: by their generations
  alternatives:
  - according to their generations
  - their genealogies
  lexicon: HALOT
  rationale: In this recurring census formula, תּוֹלְדוֹת refers to lines of descent/generational
    divisions. 'By their generations' preserves the formal structure and avoids over-specifying
    as written records ('genealogies').
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal organization is more specific than the modern English
    'family'; 'clan' better conveys a kinship subdivision within the tribe.
- source_word: לְבֵית אֲבֹתָם
  chosen: by their fathers’ houses
  alternatives:
  - by their ancestral houses
  - according to their fathers' households
  lexicon: HALOT
  rationale: This is a standard Israelite kinship expression. 'Fathers’ houses' is
    a transparent rendering that preserves the patriarchal household structure of
    the Hebrew.
- source_word: בְּמִסְפַּר שֵׁמוֹת
  chosen: by the number of names
  alternatives:
  - by number of names
  - according to the number of names
  lexicon: HALOT
  rationale: 'A fairly literal rendering preserves the census idiom: individuals are
    counted as named persons. ''By the number of names'' is natural enough in English
    while staying close to the Hebrew.'
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  chosen: from twenty years old and upward
  alternatives:
  - from twenty years old and above
  - from a son of twenty years and upward
  lexicon: HALOT
  rationale: This is the standard age-threshold formula. 'From twenty years old and
    upward' is idiomatic modern English and preserves the inclusive lower bound.
- source_word: כֹּל יֹצֵא צָבָא
  chosen: every man able to go out to war
  alternatives:
  - everyone going out to the army
  - every one who goes out to war
  - all who are able to serve in the army
  lexicon: HALOT
  rationale: Literally, 'every one going out to the host/army.' In this census context
    it denotes military eligibility. 'Every man able to go out to war' makes explicit
    the male military sense already implied by the tribal census and age formula,
    while remaining faithful to the function of the phrase.
