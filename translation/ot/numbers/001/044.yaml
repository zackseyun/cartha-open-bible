id: NUM.1.44
reference: Numbers 1:44
source:
  edition: WLC
  text: אֵ֣לֶּה הַ/פְּקֻדִ֡ים אֲשֶׁר֩ פָּקַ֨ד מֹשֶׁ֤ה וְ/אַהֲרֹן֙ וּ/נְשִׂיאֵ֣י יִשְׂרָאֵ֔ל שְׁנֵ֥ים עָשָׂ֖ר אִ֑ישׁ אִישׁ אֶחָ֥ד לְ/בֵית אֲבֹתָ֖י/ו הָיֽוּ־־׃
translation:
  text: These are the ones counted[a], whom Moses and Aaron counted, and the leaders of Israel—twelve men[b], each one for his fathers’ house—were with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “those who were numbered.” The Hebrew can emphasize either the counted persons or the census enrollment itself.
    reason: lexical_alternative
  - marker: b
    text: “Fathers’ house” refers to the ancestral household or clan unit in Israel’s tribal structure.
    reason: cultural_note
lexical_decisions:
- source_word: הַפְּקֻדִים
  chosen: the ones counted
  alternatives:
  - those who were numbered
  - the enrolled men
  - the census totals
  lexicon: HALOT
  rationale: Passive participial form from פקד in this census context refers to persons who were counted/enrolled, not merely an abstract total. 'The ones counted' preserves the personal reference while remaining natural English.
- source_word: פָּקַד
  chosen: counted
  alternatives:
  - numbered
  - enrolled
  - mustered
  lexicon: HALOT
  rationale: In Numbers 1 the verb consistently refers to taking a census/muster. 'Counted' is clear modern English and matches the participle earlier in the verse.
- source_word: נְשִׂיאֵי יִשְׂרָאֵל
  chosen: the leaders of Israel
  alternatives:
  - the chiefs of Israel
  - the princes of Israel
  lexicon: HALOT
  rationale: נָשִׂיא here denotes tribal leaders. 'Leaders' is accurate and readable; 'princes' would sound dynastic and potentially misleading in modern English.
- source_word: שְׁנֵים עָשָׂר אִישׁ
  chosen: twelve men
  alternatives:
  - twelve men in number
  - twelve persons
  lexicon: HALOT
  rationale: The Hebrew explicitly uses masculine אִישׁ. Per gender-accurate policy, 'men' is retained rather than neutralizing to 'persons'.
- source_word: אִישׁ אֶחָד
  chosen: each one
  alternatives:
  - one man each
  - each man
  lexicon: HALOT
  rationale: This distributive expression means one apiece. 'Each one' reads smoothly in English while preserving the distributive force.
- source_word: לְבֵית אֲבֹתָיו
  chosen: for his fathers’ house
  alternatives:
  - for his ancestral house
  - for his father's household
  - by his fathers’ house
  lexicon: HALOT
  rationale: This phrase refers to the patrilineal clan/household unit. 'Fathers’ house' preserves the idiom and social structure better than flattening it to 'family,' while 'for' reflects representative function.
- source_word: הָיוּ
  chosen: were
  alternatives:
  - served as
  - constituted
  lexicon: HALOT
  rationale: The copula links the twelve men to their representative role. In English the sense is naturally absorbed into 'each one for his fathers’ house,' but the translation preserves it through the clause structure.
