id: NUM.1.5
reference: Numbers 1:5
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה֙ שְׁמ֣וֹת הָֽ/אֲנָשִׁ֔ים אֲשֶׁ֥ר יַֽעַמְד֖וּ אִתְּ/כֶ֑ם לִ/רְאוּבֵ֕ן
    אֱלִיצ֖וּר בֶּן שְׁדֵיאֽוּר־׃
translation:
  text: 'And these are the names of the men who shall stand with you: for Reuben,
    Elizur son of Shedeur.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from Reuben, Elizur son of Shedeur.' The Hebrew preposition can be understood
      as marking tribal affiliation or representation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵלֶּה
  chosen: And these are
  alternatives:
  - These are
  lexicon: HALOT
  rationale: 'The conjunction וְ is retained as ''And'' to reflect the narrative/list
    continuity, and אֵלֶּה is rendered ''these'' in a presentational formula common
    in Hebrew lists: ''these are''.'
- source_word: שְׁמוֹת
  chosen: the names of
  alternatives:
  - the names
  lexicon: HALOT
  rationale: Construct plural 'names of' naturally introduces the following genitive
    phrase in English.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the people
  - the males
  lexicon: HALOT
  rationale: אֲנָשִׁים is the ordinary plural of 'man' here referring to specific
    male representatives. Per gender-accurate policy, 'the men' best matches the source
    rather than a gender-neutral rendering.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  - whom
  lexicon: HALOT
  rationale: Relative pronoun introducing the clause describing the men; 'who' is
    the most natural English rendering for persons.
- source_word: יַעַמְדוּ
  chosen: shall stand
  alternatives:
  - will stand
  - shall take their stand
  lexicon: HALOT
  rationale: From עמד, 'stand.' In this administrative context it denotes serving/standing
    alongside Moses and Aaron as representatives. 'Shall stand' preserves the formal
    representative nuance without over-paraphrasing.
- source_word: אִתְּכֶם
  chosen: with you
  alternatives:
  - beside you
  lexicon: HALOT
  rationale: Direct rendering of the preposition with 2mp suffix; 'with you' is clear
    and sufficient.
- source_word: לִרְאוּבֵן
  chosen: for Reuben
  alternatives:
  - from Reuben
  - belonging to Reuben
  lexicon: HALOT
  rationale: The prefixed ל introduces the tribal assignment of each named representative.
    'For Reuben' communicates representation more idiomatically than the more wooden
    'to Reuben'.
- source_word: אֱלִיצוּר
  chosen: Elizur
  lexicon: HALOT
  rationale: Personal name transliterated according to the translation philosophy
    to transliterate names rather than translate them.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard genealogical formula in English; article omitted for smoother
    style.
- source_word: שְׁדֵיאוּר
  chosen: Shedeur
  lexicon: HALOT
  rationale: Personal name transliterated by standard convention.
