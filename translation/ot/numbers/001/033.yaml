id: NUM.1.33
reference: Numbers 1:33
source:
  edition: WLC
  text: פְּקֻדֵי/הֶ֖ם לְ/מַטֵּ֣ה אֶפְרָ֑יִם אַרְבָּעִ֥ים אֶ֖לֶף וַ/חֲמֵ֥שׁ מֵאֽוֹת׃פ
translation:
  text: Those registered from the tribe of Ephraim were forty thousand five hundred.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: פְּקֻדֵיהֶם
  chosen: those registered
  alternatives:
  - their counted ones
  - their mustered men
  - those numbered among them
  lexicon: HALOT
  rationale: From פקד in the passive/participle-like nominal form with 3mp suffix,
    referring to those enrolled/counted in the census. 'Those registered' is natural
    modern English and fits the census context without over-specifying military nuance
    beyond the immediate wording.
- source_word: לְמַטֵּה
  chosen: from the tribe of
  alternatives:
  - for the tribe of
  - by tribe of
  lexicon: HALOT
  rationale: The preposition ל with מַטֶּה in this census formula identifies tribal
    affiliation. 'From the tribe of' is idiomatic in English and accurately conveys
    membership.
- source_word: אֶפְרָיִם
  chosen: Ephraim
  lexicon: HALOT
  rationale: Standard English transliteration of the tribal/personal name, in keeping
    with the policy to transliterate names.
- source_word: אַרְבָּעִים אֶלֶף וַחֲמֵשׁ מֵאוֹת
  chosen: forty thousand five hundred
  alternatives:
  - 40,500
  lexicon: HALOT
  rationale: Straightforward cardinal number. Spelled out in running biblical prose
    for readability and dignity.
