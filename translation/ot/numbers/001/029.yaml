id: NUM.1.29
reference: Numbers 1:29
source:
  edition: WLC
  text: פְּקֻדֵי/הֶ֖ם לְ/מַטֵּ֣ה יִשָּׂשכָ֑ר אַרְבָּעָ֧ה וַ/חֲמִשִּׁ֛ים אֶ֖לֶף וְ/אַרְבַּ֥ע מֵאֽוֹת׃פ
translation:
  text: those counted from the tribe of Issachar were fifty-four thousand four hundred[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "their number" or "those registered." The Hebrew census term refers to those enrolled/counted.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּקֻדֵיהֶם
  chosen: those counted
  alternatives:
  - their counted men
  - their number
  - those registered
  lexicon: HALOT
  rationale: From פקד in the passive participial/noun form with 3mp suffix, referring to the enrolled/countable total in the census context. 'Those counted' is natural English and preserves the census sense without adding 'men' explicitly where this verse itself only states the tally formula.
- source_word: לְמַטֵּה
  chosen: from the tribe of
  alternatives:
  - for the tribe of
  - by tribe of
  lexicon: HALOT
  rationale: The preposition ל with מַטֶּה in this census formula identifies tribal affiliation. 'From the tribe of' is idiomatic in English and fits the repeated pattern in Numbers 1.
- source_word: יִשָּׂשכָר
  chosen: Issachar
  rationale: 'Proper name transliterated according to the translation philosophy: names are transliterated rather than translated.'
- source_word: אַרְבָּעָה וַחֲמִשִּׁים אֶלֶף וְאַרְבַּע מֵאוֹת
  chosen: fifty-four thousand four hundred
  alternatives:
  - four and fifty thousand and four hundred
  lexicon: HALOT
  rationale: The Hebrew number sequence is rendered in standard contemporary English number order. This preserves the exact quantity while avoiding wooden phrasing.
