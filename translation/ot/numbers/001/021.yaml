id: NUM.1.21
reference: Numbers 1:21
source:
  edition: WLC
  text: פְּקֻדֵי/הֶ֖ם לְ/מַטֵּ֣ה רְאוּבֵ֑ן שִׁשָּׁ֧ה וְ/אַרְבָּעִ֛ים אֶ֖לֶף וַ/חֲמֵ֥שׁ
    מֵאֽוֹת׃פ
translation:
  text: Their counted men from the tribe of Reuben were forty-six thousand five hundred.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: פְּקֻדֵיהֶם
  chosen: their counted men
  alternatives:
  - those numbered from them
  - their enrollment
  - their mustered men
  lexicon: HALOT
  rationale: From פקד in the passive/participle-derived nominal form, referring here
    to those registered/counted in the census. In Numbers 1 this consistently denotes
    the census total of eligible males, so 'their counted men' makes the implicit
    referent explicit in natural English without overparaphrasing.
- source_word: לְמַטֵּה
  chosen: from the tribe of
  alternatives:
  - for the tribe of
  - belonging to the tribe of
  lexicon: HALOT
  rationale: The preposition ל with מַטֶּה marks tribal affiliation in this census
    formula. 'From the tribe of' is idiomatic English and fits the repeated pattern
    in the chapter.
- source_word: רְאוּבֵן
  chosen: Reuben
  rationale: Standard English transliteration of the personal/tribal name.
- source_word: שִׁשָּׁה וְאַרְבָּעִים אֶלֶף וַחֲמֵשׁ מֵאוֹת
  chosen: forty-six thousand five hundred
  alternatives:
  - six and forty thousand and five hundred
  lexicon: HALOT
  rationale: Cardinal number sequence rendered in standard contemporary English order
    for readability while preserving the exact total.
