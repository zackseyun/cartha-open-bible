id: NUM.1.13
reference: Numbers 1:13
source:
  edition: WLC
  text: לְ/אָשֵׁ֕ר פַּגְעִיאֵ֖ל בֶּן עָכְרָֽן־׃
translation:
  text: 'From Asher: Pagiel son of Ocran.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְ/אָשֵׁר
  chosen: From Asher
  alternatives:
  - For Asher
  lexicon: HALOT
  rationale: The prefixed לְ here marks tribal affiliation in the census-leader list,
    best rendered idiomatically as 'From Asher' in English. 'For Asher' is more formally
    possible but less natural in this enumerative context.
- source_word: פַּגְעִיאֵל
  chosen: Pagiel
  alternatives:
  - Pagaiel
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: בֶּן
  chosen: son of
  lexicon: HALOT
  rationale: Standard filial construction in Hebrew genealogical identification; 'son
    of' is the natural and transparent English equivalent.
- source_word: עָכְרָן
  chosen: Ocran
  alternatives:
  - Acran
  - Akran
  rationale: Personal name transliterated into conventional English biblical form.
    Alternative spellings reflect different transliteration choices for the initial
    ע and consonant cluster, but 'Ocran' aligns with common English usage.
