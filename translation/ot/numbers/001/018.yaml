id: NUM.1.18
reference: Numbers 1:18
source:
  edition: WLC
  text: וְ/אֵ֨ת כָּל הָ/עֵדָ֜ה הִקְהִ֗ילוּ בְּ/אֶחָד֙ לַ/חֹ֣דֶשׁ הַ/שֵּׁנִ֔י וַ/יִּתְיַֽלְד֥וּ
    עַל מִשְׁפְּחֹתָ֖/ם לְ/בֵ֣ית אֲבֹתָ֑/ם בְּ/מִסְפַּ֣ר שֵׁמ֗וֹת מִ/בֶּ֨ן עֶשְׂרִ֥ים
    שָׁנָ֛ה וָ/מַ֖עְלָ/ה לְ/גֻלְגְּלֹתָֽ/ם־־׃
translation:
  text: And they assembled all the congregation on the first day of the second month,
    and they registered themselves by clans, by their fathers’ houses, according to
    the number of names, from twenty years old and upward, head by head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'declared their ancestry' / 'enrolled themselves by genealogy'; the Hebrew
      verb is a rare genealogical expression indicating registration on the basis
      of descent.
    reason: lexical_alternative
  - marker: b
    text: Literally 'by their heads' or 'by their skulls,' an idiom meaning each individual
      was counted one by one.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִקְהִילוּ
  chosen: assembled
  alternatives:
  - gathered together
  - convened
  lexicon: HALOT
  rationale: The Hiphil of קהל means to cause to gather/assemble. 'Assembled' is natural
    English and preserves the formal sense of convening the whole community.
- source_word: כָּל הָעֵדָה
  chosen: all the congregation
  alternatives:
  - the whole community
  - all the assembly
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled community of Israel. 'Congregation'
    preserves the corporate covenantal sense and fits Pentateuchal usage, while 'all'
    reflects כָּל.
- source_word: בְּאֶחָד לַחֹדֶשׁ הַשֵּׁנִי
  chosen: on the first day of the second month
  alternatives:
  - on day one of the second month
  lexicon: HALOT
  rationale: The idiom literally reads 'on one of the second month' and in context
    means the first day of that month. This is standard Hebrew calendrical usage and
    is best rendered idiomatically in English.
- source_word: וַיִּתְיַלְדוּ
  chosen: registered themselves
  alternatives:
  - declared their ancestry
  - enrolled themselves by genealogy
  lexicon: HALOT
  rationale: The Hitpael of ילד here is an unusual genealogical term meaning to establish
    or declare one's descent. 'Registered themselves' captures the administrative
    action in census context; the genealogical basis is then specified by the following
    phrases.
- source_word: עַל מִשְׁפְּחֹתָם
  chosen: by clans
  alternatives:
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal/census contexts often refers to a clan-level kinship
    grouping. 'By clans' is concise and socially precise.
- source_word: לְבֵית אֲבֹתָם
  chosen: by their fathers’ houses
  alternatives:
  - according to their ancestral houses
  - by their paternal households
  lexicon: HALOT
  rationale: This is a technical kinship expression in Israelite organization. 'Fathers’
    houses' preserves the formal structure of the Hebrew and avoids flattening it
    into a generic 'families.'
- source_word: בְּמִסְפַּר שֵׁמוֹת
  chosen: according to the number of names
  alternatives:
  - by the number of names
  - name by name in number
  lexicon: HALOT
  rationale: The phrase indicates enumeration by named individuals. 'According to
    the number of names' is transparent and keeps the census flavor of the Hebrew.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  chosen: from twenty years old and upward
  alternatives:
  - from twenty years old and above
  - aged twenty years and up
  lexicon: HALOT
  rationale: This is a standard age-threshold formula. 'From twenty years old and
    upward' is idiomatic, clear, and close to the Hebrew.
- source_word: לְגֻלְגְּלֹתָם
  chosen: head by head
  alternatives:
  - by their skulls
  - person by person
  lexicon: HALOT
  rationale: Literally 'by their skulls/heads,' this idiom means counting individuals
    one by one. 'Head by head' preserves the concrete Hebrew image better than the
    more interpretive 'person by person.'
