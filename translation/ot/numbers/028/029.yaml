id: NUM.28.29
reference: Numbers 28:29
source:
  edition: WLC
  text: עִשָּׂרוֹן֙ עִשָּׂר֔וֹן לַ/כֶּ֖בֶשׂ הָ/אֶחָ֑ד לְ/שִׁבְעַ֖ת הַ/כְּבָשִֽׂים׃
translation:
  text: a tenth for each lamb[a], for the seven lambs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'a tenth, a tenth for the one lamb, for the seven lambs.' The Hebrew uses a distributive formula meaning one tenth-measure for each of the seven lambs.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִשָּׂרוֹן עִשָּׂרוֹן
  chosen: a tenth of an ephah
  alternatives:
  - a tenth
  - one-tenth
  lexicon: HALOT
  rationale: The repeated singular noun literally reads 'a tenth, a tenth,' an idiom in sacrificial regulations meaning one tenth-measure apiece. In cultic contexts this refers to a tenth of an ephah of grain/flour, as established by the immediate parallel formulas in this chapter. Supplying 'of an ephah' makes the measure clear in English without over-paraphrasing.
- source_word: לַכֶּבֶשׂ הָאֶחָד
  chosen: for each lamb
  alternatives:
  - for the one lamb
  - for one lamb
  lexicon: HALOT
  rationale: Literally 'for the one lamb.' In this distributive sacrificial formula, English 'for each lamb' best conveys the sense that the stated amount applies per animal.
- source_word: לְשִׁבְעַת הַכְּבָשִׂים
  chosen: for the seven lambs
  alternatives:
  - for seven lambs
  lexicon: HALOT
  rationale: The phrase specifies the total set to which the per-lamb measure applies. Retaining 'the seven lambs' reflects the Hebrew article and links the line to the seven lambs already prescribed in the context.
