id: NUM.28.30
reference: Numbers 28:30
source:
  edition: WLC
  text: שְׂעִ֥יר עִזִּ֖ים אֶחָ֑ד לְ/כַפֵּ֖ר עֲלֵי/כֶֽם׃
translation:
  text: and one male goat to make atonement for you[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew is elliptical: ''and one male goat, to make atonement for you.'' The phrase ''for a sin offering'' is supplied from the immediate sacrificial context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂעִיר
  chosen: male goat
  alternatives:
  - goat
  - he-goat
  lexicon: HALOT
  rationale: שְׂעִיר in sacrificial contexts denotes a male goat. 'Male goat' is clear modern English; 'he-goat' is more formal but less natural.
- source_word: עִזִּים
  chosen: male goat
  alternatives:
  - of goats
  lexicon: HALOT
  rationale: In the construct phrase שְׂעִיר עִזִּים, עִזִּים specifies the animal class ('goats'), yielding the idiomatic sense 'male goat' rather than a wooden 'goat of goats'.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: 'The numeral straightforwardly indicates a single animal: ''one.'''
- source_word: לְכַפֵּר
  chosen: to make atonement
  alternatives:
  - to atone
  - to purge
  lexicon: HALOT
  rationale: כפר in priestly sacrificial usage commonly refers to making atonement. 'To make atonement' is standard, clear English that preserves the cultic sense without over-specifying a theory of atonement.
- source_word: עֲלֵיכֶם
  chosen: for you
  alternatives:
  - upon you
  - on your behalf
  lexicon: HALOT
  rationale: With כפר, עַל often marks the persons for whom atonement is made. 'For you' is idiomatic English and captures the beneficiary sense.
- source_word: '[implied sacrificial function]'
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  lexicon: contextual/syntactic inference
  rationale: Although the Hebrew here is elliptical and does not repeat חטאת, the surrounding sacrificial list and the standard formula in this section imply that the goat is presented as a sin offering. Supplying 'for a sin offering' in English makes the verse intelligible and reflects the established sacrificial pattern without adding new content.
