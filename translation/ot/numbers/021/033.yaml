id: NUM.21.33
reference: Numbers 21:33
source:
  edition: WLC
  text: וַ/יִּפְנוּ֙ וַֽ/יַּעֲל֔וּ דֶּ֖רֶךְ הַ/בָּשָׁ֑ן וַ/יֵּצֵ֣א עוֹג֩ מֶֽלֶךְ הַ/בָּשָׁ֨ן לִ/קְרָאתָ֜/ם ה֧וּא וְ/כָל עַמּ֛/וֹ לַ/מִּלְחָמָ֖ה אֶדְרֶֽעִי־־׃
translation:
  text: Then they turned and went up by the way of Bashan[a], and Og king of Bashan came out to meet them, he and all his people, for battle at Edrei.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to meet them'; the Hebrew expression can be neutral in itself, but here the following phrase 'for battle' shows a hostile encounter.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְנוּ
  chosen: they turned
  alternatives:
  - they turned aside
  - they changed direction
  lexicon: HALOT
  rationale: The verb פנה in the wayyiqtol narrative sequence indicates a change of direction. 'They turned' is the most natural concise English rendering in context.
- source_word: וַיַּעֲלוּ
  chosen: went up
  alternatives:
  - ascended
  - went up toward
  lexicon: HALOT
  rationale: עלה commonly means 'go up.' Retaining 'went up' preserves the directional/topographical sense without overformal 'ascended.'
- source_word: דֶּרֶךְ הַבָּשָׁן
  chosen: by the way of Bashan
  alternatives:
  - on the road to Bashan
  - toward Bashan by the road
  lexicon: HALOT
  rationale: דרך plus place name can denote route or road associated with that region. 'By the way of Bashan' is slightly formal but clear and close to the Hebrew construction.
- source_word: עוֹג מֶלֶךְ הַבָּשָׁן
  chosen: Og king of Bashan
  alternatives:
  - Og, the king of Bashan
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy. The appositional title is rendered straightforwardly.
- source_word: וַיֵּצֵא
  chosen: came out
  alternatives:
  - went out
  - marched out
  lexicon: HALOT
  rationale: יצא in military narrative often means to go out to engage. 'Came out' is idiomatic from the narrator's perspective and does not overinterpret with 'marched out.'
- source_word: לִקְרָאתָם
  chosen: against them
  alternatives:
  - to meet them
  - to encounter them
  lexicon: HALOT
  rationale: Literally 'to meet them,' but in battle context the idiomatic force is hostile encounter. 'Against them' makes the military sense explicit while remaining faithful to context.
- source_word: הוּא וְכָל־עַמּוֹ
  chosen: he and all his people
  alternatives:
  - he and all his army
  - he and all his troops
  lexicon: HALOT
  rationale: עם is literally 'people.' Although military context could suggest fighting force, the Hebrew does not explicitly say 'army,' so 'his people' is retained.
- source_word: לַמִּלְחָמָה
  chosen: for battle
  alternatives:
  - for war
  - to battle
  lexicon: HALOT
  rationale: 'The phrase marks purpose: they came out for combat. ''For battle'' is natural modern English and suitably specific.'
- source_word: אֶדְרֶעִי
  chosen: at Edrei
  alternatives:
  - to Edrei
  - in Edrei
  lexicon: HALOT
  rationale: The place name is transliterated. Given the battle setting, English 'at Edrei' best conveys location of engagement without forcing a directional nuance not explicit in translation.
