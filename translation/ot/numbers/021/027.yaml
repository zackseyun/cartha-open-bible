id: NUM.21.27
reference: Numbers 21:27
source:
  edition: WLC
  text: עַל כֵּ֛ן יֹאמְר֥וּ הַ/מֹּשְׁלִ֖ים בֹּ֣אוּ חֶשְׁבּ֑וֹן תִּבָּנֶ֥ה וְ/תִכּוֹנֵ֖ן עִ֥יר סִיחֽוֹן־׃
translation:
  text: Therefore the proverb-sayers say[a], “Come to Heshbon; let the city of Sihon be built and established.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “those who speak in proverbs,” “the bards”; traditionally, “the rulers.” The Hebrew participle likely refers here to composers or reciters of a proverbial song, not political rulers.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - Thus
  lexicon: HALOT
  rationale: Introduces an inference or explanation from the preceding narrative. 'Therefore' is natural modern English and preserves the connective force.
- source_word: יֹאמְרוּ
  chosen: say
  alternatives:
  - will say
  - are saying
  lexicon: HALOT
  rationale: The imperfect here functions as a customary or gnomic present in introducing a quoted saying. English present 'say' fits the citation formula.
- source_word: הַמֹּשְׁלִים
  chosen: the poets
  alternatives:
  - those who speak in proverbs
  - the bards
  - the rulers
  lexicon: HALOT
  rationale: Although the participle from משל can denote 'rulers,' in this context it introduces a taunt-song or proverb-like saying. 'The poets' communicates the function of composers/reciters of such sayings better than the misleading 'rulers.'
- source_word: בֹּאוּ
  chosen: Come
  alternatives:
  - Come in
  - Go
  lexicon: HALOT
  rationale: A 2mp imperative opening the quoted call. 'Come' is the straightforward rendering in English.
- source_word: חֶשְׁבּוֹן
  chosen: Heshbon
  rationale: Place name is transliterated per translation philosophy.
- source_word: תִּבָּנֶה
  chosen: let ... be built
  alternatives:
  - may ... be built
  - shall ... be built
  lexicon: HALOT
  rationale: 'The imperfect/jussive-like form in poetic quotation is best represented as a volitive: ''let ... be built.'''
- source_word: וְתִכּוֹנֵן
  chosen: and established
  alternatives:
  - and made firm
  - and set in order
  lexicon: HALOT
  rationale: From כון, conveying being established or made secure. 'Established' is idiomatic with 'built' and preserves the parallelism.
- source_word: עִיר סִיחוֹן
  chosen: the city of Sihon
  alternatives:
  - Sihon's city
  - the city belonging to Sihon
  lexicon: HALOT
  rationale: Construct chain indicating possession. 'The city of Sihon' is clear and preserves the Hebrew relationship.
