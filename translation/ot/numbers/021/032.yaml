id: NUM.21.32
reference: Numbers 21:32
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח מֹשֶׁה֙ לְ/רַגֵּ֣ל אֶת יַעְזֵ֔ר וַֽ/יִּלְכְּד֖וּ בְּנֹתֶ֑י/הָ
    ו/יירש אֶת הָ/אֱמֹרִ֥י אֲשֶׁר שָֽׁם־־־׃
translation:
  text: Then Moses sent men to spy out Jazer, and they captured its villages and dispossessed
    the Amorites who were there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'its daughters,' a Hebrew idiom for a city's dependent settlements
      or villages.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard wayyiqtol of שׁלח in narrative; 'sent' is the natural English
    rendering.
- source_word: לְרַגֵּל
  chosen: to spy out
  alternatives:
  - to scout
  - to reconnoiter
  lexicon: HALOT
  rationale: The piel infinitive of רגל here denotes reconnaissance of a place. 'Spy
    out' preserves the military-survey sense familiar in Pentateuchal usage.
- source_word: יַעְזֵר
  chosen: Jazer
  alternatives:
  - Jaazer
  rationale: Standard English transliteration of the place name יַעְזֵר.
- source_word: וַיִּלְכְּדוּ
  chosen: they captured
  alternatives:
  - they took
  - they seized
  lexicon: HALOT
  rationale: לכד commonly means to capture or seize, especially in military contexts.
    'Captured' fits the narrative sequence.
- source_word: בְּנֹתֶיהָ
  chosen: its villages
  alternatives:
  - its daughters
  - its dependent towns
  lexicon: HALOT
  rationale: Although literally 'its daughters,' in Hebrew geographical usage this
    idiom refers to a city's satellite settlements or villages. 'Its villages' gives
    the plain sense in modern English; the literal idiom is worth preserving in a
    footnote.
- source_word: וַיִּירַשׁ
  chosen: dispossessed
  alternatives:
  - drove out
  - took possession of
  lexicon: HALOT
  rationale: ירש in conquest contexts often means to take possession by dispossessing
    prior inhabitants. 'Dispossessed' captures both removal and takeover better than
    the more ambiguous 'inherited' or merely 'possessed'.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite population
  lexicon: HALOT
  rationale: Collective ethnic singular in Hebrew is naturally rendered as the plural
    ethnonym in English.
- source_word: אֲשֶׁר שָׁם
  chosen: who were there
  alternatives:
  - that were there
  lexicon: HALOT
  rationale: Refers to the Amorites present in that location. 'Who' is idiomatic for
    people groups in English.
