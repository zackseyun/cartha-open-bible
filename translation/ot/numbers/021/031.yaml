id: NUM.21.31
reference: Numbers 21:31
source:
  edition: WLC
  text: וַ/יֵּ֨שֶׁב֙ יִשְׂרָאֵ֔ל בְּ/אֶ֖רֶץ הָ/אֱמֹרִֽי׃
translation:
  text: So Israel lived in the land of the Amorites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'So Israel dwelt in the land of the Amorites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  chosen: lived
  alternatives:
  - dwelt
  - settled
  - remained
  lexicon: HALOT
  rationale: The verb ישׁב commonly means 'sit, dwell, live, settle.' In this narrative
    summary, 'lived' gives natural modern English while preserving the sense that
    Israel took up residence in the territory. 'Dwelt' is more formal/archaic; 'settled'
    could imply a stronger emphasis on permanent establishment than the context requires;
    'remained' is possible but less direct.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Standard transliteration of the covenant people/name, as required by
    the translation philosophy to transliterate names rather than translate them.
- source_word: בְּאֶרֶץ
  chosen: in the land
  alternatives:
  - in the territory
  - in the country
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land, earth, territory, country.' Here it refers to a
    defined regional possession, and 'land' is the most idiomatic and biblically consistent
    rendering.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: Although the Hebrew form is morphologically singular/gentilic ('the Amorite'),
    in English such ethnonyms are commonly rendered as collective plurals when referring
    to a people group and their land. 'The land of the Amorites' is the most natural
    English expression and matches the contextual reference to the Amorite population/territory
    rather than a single individual.
