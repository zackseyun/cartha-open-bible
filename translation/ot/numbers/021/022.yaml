id: NUM.21.22
reference: Numbers 21:22
source:
  edition: WLC
  text: אֶעְבְּרָ֣ה בְ/אַרְצֶ֗/ךָ לֹ֤א נִטֶּה֙ בְּ/שָׂדֶ֣ה וּ/בְ/כֶ֔רֶם לֹ֥א נִשְׁתֶּ֖ה
    מֵ֣י בְאֵ֑ר בְּ/דֶ֤רֶךְ הַ/מֶּ֨לֶךְ֙ נֵלֵ֔ךְ עַ֥ד אֲשֶֽׁר נַעֲבֹ֖ר גְּבֻלֶֽ/ךָ־׃
translation:
  text: Let me pass through your land. We will not turn aside into field or vineyard,
    and we will not drink water from a well. We will go by the king’s road until we
    have passed through your territory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “the king’s highway.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶעְבְּרָה
  chosen: Let me pass through
  alternatives:
  - Please let me pass through
  - I would pass through
  lexicon: HALOT
  rationale: Qal cohortative 1cs of עבר expresses a request or resolve. In this diplomatic
    context, English 'Let me pass through' best captures the polite petition directed
    to the king.
- source_word: בְאַרְצְךָ
  chosen: your land
  alternatives:
  - your country
  - your territory
  lexicon: HALOT
  rationale: אֶרֶץ commonly means land/territory. 'Your land' is natural English and
    fits the political-geographical sense here.
- source_word: לֹא נִטֶּה
  chosen: we will not turn aside
  alternatives:
  - we will not deviate
  - we will not turn off
  lexicon: HALOT
  rationale: נטה in this travel context means to turn aside from the route. 'Turn
    aside' is idiomatic and preserves the movement imagery.
- source_word: בְּשָׂדֶה וּבְכֶרֶם
  chosen: into field or vineyard
  alternatives:
  - into a field or a vineyard
  - through field or vineyard
  lexicon: HALOT
  rationale: The preposition with singular nouns is distributive/generic. English
    omits the articles for a smoother generic sense while retaining the contrast between
    cultivated field and vineyard.
- source_word: לֹא נִשְׁתֶּה מֵי בְאֵר
  chosen: we will not drink water from a well
  alternatives:
  - we will not drink well water
  - we will not drink the water of a well
  lexicon: HALOT
  rationale: The construct phrase literally means 'waters of a well.' 'Water from
    a well' is clear modern English and preserves the sense that they will not consume
    local water resources.
- source_word: בְּדֶרֶךְ הַמֶּלֶךְ
  chosen: by the king’s road
  alternatives:
  - on the king’s highway
  - by the royal road
  lexicon: HALOT
  rationale: Literally 'by/in the way of the king,' referring to the main public route.
    'The king’s road' is a clear modern rendering; 'king’s highway' is traditional
    but slightly archaic. 'By' here conveys travel along that route idiomatically.
- source_word: נֵלֵךְ
  chosen: we will go
  alternatives:
  - we will travel
  - we will proceed
  lexicon: HALOT
  rationale: הלך is the common verb for going/traveling. 'We will go' is simple and
    sufficiently formal.
- source_word: עַד אֲשֶׁר נַעֲבֹר
  chosen: until we have passed through
  alternatives:
  - until we pass through
  - until we have crossed
  lexicon: HALOT
  rationale: The clause marks the endpoint of the journey through the territory. English
    present perfect after 'until' conveys completed transit naturally.
- source_word: גְּבֻלֶךָ
  chosen: your border
  alternatives:
  - your territory
  - your boundary
  lexicon: HALOT
  rationale: גְּבוּל denotes border/boundary. 'Your border' keeps the concrete territorial
    sense and matches the travel request.
