id: NUM.21.11
reference: Numbers 21:11
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מֵ/אֹבֹ֑ת וַֽ/יַּחֲנ֞וּ בְּ/עִיֵּ֣י הָֽעֲבָרִ֗ים בַּ/מִּדְבָּר֙
    אֲשֶׁר֙ עַל פְּנֵ֣י מוֹאָ֔ב מִ/מִּזְרַ֖ח הַ/שָּֽׁמֶשׁ־׃
translation:
  text: They set out from Oboth and camped at Iye-abarim in the wilderness that is
    opposite Moab, toward the sunrise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Iye-abarim may also be understood by sense as 'the ruins of Abarim' or 'the
      heaps of Abarim,' though here it functions as a place name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They traveled on
  lexicon: HALOT
  rationale: נסע in the wilderness itinerary formula commonly denotes breaking camp
    and moving on. 'Set out' is natural English and preserves the travel-stage sense
    better than the more generic 'traveled.'
- source_word: מֵאֹבֹת
  chosen: from Oboth
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated in keeping with
    the philosophy of transliterating names.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: חנה means to camp or encamp. 'Camped' is more readable modern English
    while retaining the concrete sense.
- source_word: בְּעִיֵּי הָעֲבָרִים
  chosen: at Iye-abarim
  alternatives:
  - at Iyye-abarim
  - at the ruins of Abarim
  lexicon: HALOT
  rationale: This is best taken as a toponym. Although עִיֵּי can be related to 'ruins/heaps,'
    the construct phrase functions here as a place name in the itinerary, so transliteration
    is preferred in the main text. A lexical alternative is worth preserving in a
    footnote because the name is semantically transparent.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר often denotes wilderness pastureland or desert-steppe. 'Wilderness'
    is the standard biblical rendering and fits Israel's journey context.
- source_word: אֲשֶׁר עַל־פְּנֵי מוֹאָב
  chosen: that is opposite Moab
  alternatives:
  - that is before Moab
  - that faces Moab
  lexicon: HALOT
  rationale: עַל־פְּנֵי in geographical description commonly means 'opposite' or 'facing.'
    'Opposite Moab' is idiomatic and spatially clear.
- source_word: מִמִּזְרַח הַשָּׁמֶשׁ
  chosen: toward the sunrise
  alternatives:
  - eastward
  - to the east of the sunrising
  - on the east side
  lexicon: HALOT
  rationale: Literally 'from the sunrise/east of the sun.' In context it indicates
    the eastern side relative to Moab. 'Toward the sunrise' preserves the Hebrew imagery
    while remaining readable; 'eastward' is possible but flattens the expression.
