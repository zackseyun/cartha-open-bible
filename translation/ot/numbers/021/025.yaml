id: NUM.21.25
reference: Numbers 21:25
source:
  edition: WLC
  text: וַ/יִּקַּח֙ יִשְׂרָאֵ֔ל אֵ֥ת כָּל הֶ/עָרִ֖ים הָ/אֵ֑לֶּה וַ/יֵּ֤שֶׁב יִשְׂרָאֵל֙
    בְּ/כָל עָרֵ֣י הָֽ/אֱמֹרִ֔י בְּ/חֶשְׁבּ֖וֹן וּ/בְ/כָל בְּנֹתֶֽי/הָ־־־׃
translation:
  text: Israel took all these cities, and Israel settled in all the cities of the
    Amorites, in Heshbon and in all its daughter towns.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'and in all its daughters,' an idiom for the smaller dependent
      settlements belonging to a larger city.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - captured
  - seized
  lexicon: HALOT
  rationale: The verb לקח literally means 'take.' In this military context, 'took'
    naturally conveys conquest without adding more interpretation than the Hebrew
    requires. 'Captured' is possible, but 'took' stays closer to the source while
    remaining idiomatic.
- source_word: כָּל הֶעָרִים הָאֵלֶּה
  chosen: all these cities
  alternatives:
  - all these towns
  lexicon: HALOT
  rationale: עיר commonly denotes a city/town. 'Cities' is the standard rendering
    and fits the conquest context. The demonstrative 'these' is retained explicitly.
- source_word: וַיֵּשֶׁב
  chosen: settled
  alternatives:
  - dwelt
  - lived
  lexicon: HALOT
  rationale: ישב often means 'sit, dwell, settle.' Here it refers to occupying and
    residing in the conquered locations. 'Settled' captures the transition to habitation
    better than the more static 'dwelt,' while remaining faithful to the Hebrew.
- source_word: בְּכָל עָרֵי הָאֱמֹרִי
  chosen: in all the cities of the Amorites
  alternatives:
  - in all the Amorite cities
  lexicon: HALOT
  rationale: The construct phrase is rendered transparently. 'Cities of the Amorites'
    preserves the genitival relationship clearly; 'Amorite cities' would also be acceptable
    but is slightly less formal.
- source_word: בְּחֶשְׁבּוֹן
  chosen: in Heshbon
  lexicon: HALOT
  rationale: Proper name transliterated according to standard English convention,
    following the translation philosophy to transliterate names.
- source_word: וּבְכָל בְּנֹתֶיהָ
  chosen: and in all its daughter towns
  alternatives:
  - and in all its villages
  - and in all its dependent towns
  lexicon: HALOT
  rationale: The idiom 'daughters' of a city refers to its dependent settlements.
    Rendering it woodenly as 'daughters' would be obscure in English. 'Daughter towns'
    preserves the metaphor while making the referent clear; a footnote preserves the
    more literal alternative.
