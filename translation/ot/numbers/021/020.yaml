id: NUM.21.20
reference: Numbers 21:20
source:
  edition: WLC
  text: וּ/מִ/בָּמ֗וֹת הַ/גַּיְא֙ אֲשֶׁר֙ בִּ/שְׂדֵ֣ה מוֹאָ֔ב רֹ֖אשׁ הַ/פִּסְגָּ֑ה וְ/נִשְׁקָ֖פָה עַל פְּנֵ֥י הַ/יְשִׁימֹֽן־׃פ
translation:
  text: and from Bamoth to the valley that is in the field of Moab[a], to the top of Pisgah[b], which overlooks the face of the wasteland.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Jeshimon,' treating the Hebrew term as a regional name rather than a descriptive common noun.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the face of the wasteland,' an idiom meaning the area facing or overlooking the wasteland.
    reason: cultural_note
lexical_decisions:
- source_word: וּ/מִ/בָּמוֹת
  chosen: and from Bamoth
  alternatives:
  - and from Bamot
  - and from the high places
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition are carried over as 'and from.' בָּמוֹת here functions as a place name in the itinerary, so it is transliterated as 'Bamoth' rather than translated as the common noun 'high places.'
- source_word: הַגַּיְא
  chosen: the valley
  alternatives:
  - the ravine
  lexicon: HALOT
  rationale: גַּיְא denotes a valley or ravine. 'Valley' is the more natural English choice in this geographic sequence and fits the broader itinerary style.
- source_word: אֲשֶׁר בִּשְׂדֵה מוֹאָב
  chosen: that is in the field of Moab
  alternatives:
  - that is in the territory of Moab
  - that is in the plain of Moab
  lexicon: HALOT
  rationale: שָׂדֶה literally means 'field.' In geographic usage it can denote open country or territory. 'Field of Moab' preserves the Hebrew image while remaining understandable.
- source_word: רֹאשׁ הַפִּסְגָּה
  chosen: to the top of Pisgah
  alternatives:
  - to the head of Pisgah
  - to the summit of Pisgah
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head,' but in topographical context 'top' is idiomatic English. Pisgah is treated as a proper name and transliterated.
- source_word: וְנִשְׁקָפָה
  chosen: which overlooks
  alternatives:
  - and it overlooks
  - and looks down
  lexicon: HALOT
  rationale: The form describes the top of Pisgah as facing out over or overlooking the region. Rendering it as a relative clause in English best reflects the Hebrew connection to 'the top of Pisgah' and reads naturally.
- source_word: עַל פְּנֵי
  chosen: the face of
  alternatives:
  - over
  - toward
  - across from
  lexicon: HALOT
  rationale: פָּנִים in the expression עַל־פְּנֵי is literally 'upon the face of' and often means 'over against' or 'facing.' 'The face of' preserves the Hebrew idiom with acceptable English style here.
- source_word: הַיְשִׁימֹן
  chosen: the wasteland
  alternatives:
  - the desert
  - the Jeshimon
  lexicon: HALOT
  rationale: יְשִׁימוֹן denotes a desolate waste or desert region. 'Wasteland' preserves the sense of barrenness. Because it may also function almost as a regional name, 'the Jeshimon' is preserved as an alternative in a footnote.
