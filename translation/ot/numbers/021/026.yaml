id: NUM.21.26
reference: Numbers 21:26
source:
  edition: WLC
  text: כִּ֣י חֶשְׁבּ֔וֹן עִ֗יר סִיחֹ֛ן מֶ֥לֶךְ הָ/אֱמֹרִ֖י הִ֑וא וְ/ה֣וּא נִלְחַ֗ם בְּ/מֶ֤לֶךְ מוֹאָב֙ הָֽ/רִאשׁ֔וֹן וַ/יִּקַּ֧ח אֶת כָּל אַרְצ֛/וֹ מִ/יָּד֖/וֹ עַד אַרְנֹֽן־־־׃
translation:
  text: For Heshbon was the city of Sihon king of the Amorites[a], and he had fought against the former king of Moab and had taken all his land from his hand as far as the Arnon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from his power'; the Hebrew idiom is literally 'out of his hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces an explanation for the preceding statement about Heshbon; 'For' best preserves the explanatory force in natural English.
- source_word: עִיר
  chosen: city
  alternatives:
  - town
  lexicon: HALOT
  rationale: Standard rendering for עיר; 'city' fits the political significance of Heshbon as a royal center.
- source_word: הִוא
  chosen: was
  alternatives:
  - is
  lexicon: HALOT
  rationale: Although the Hebrew nominal clause lacks an explicit past-tense verb, English idiom in this historical narrative calls for 'was'.
- source_word: נִלְחַם
  chosen: had fought against
  alternatives:
  - fought against
  - waged war with
  lexicon: HALOT
  rationale: The Niphal of לחם here denotes engaging in battle. 'Had fought against' reflects the prior action relative to the narrative explanation and reads smoothly in English.
- source_word: הָרִאשׁוֹן
  chosen: the former
  alternatives:
  - the first
  - the previous
  lexicon: HALOT
  rationale: With 'king of Moab,' the adjective distinguishes an earlier king from the current situation. 'The former' is more idiomatic than 'the first' in English historical narration.
- source_word: וַיִּקַּח
  chosen: had taken
  alternatives:
  - took
  - seized
  lexicon: HALOT
  rationale: Though formally a wayyiqtol ('and he took'), in this explanatory context English pluperfect ('had taken') better conveys that the conquest preceded the present reference point.
- source_word: כָּל אַרְצוֹ
  chosen: all his land
  alternatives:
  - all his territory
  - his whole land
  lexicon: HALOT
  rationale: Refers to the land belonging to the king of Moab. 'Land' is a straightforward rendering; 'territory' is possible but less direct.
- source_word: מִיָּדוֹ
  chosen: out of his hand
  alternatives:
  - from his hand
  - from his power
  lexicon: HALOT
  rationale: The idiom literally means removal from someone's control. 'Out of his hand' preserves the Hebrew imagery while remaining understandable.
- source_word: עַד אַרְנֹן
  chosen: as far as the Arnon
  alternatives:
  - up to the Arnon
  lexicon: HALOT
  rationale: Marks the territorial extent of the conquest. 'As far as the Arnon' is natural English and preserves the boundary sense.
