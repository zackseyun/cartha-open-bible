id: NUM.21.28
reference: Numbers 21:28
source:
  edition: WLC
  text: כִּי אֵשׁ֙ יָֽצְאָ֣ה מֵֽ/חֶשְׁבּ֔וֹן לֶהָבָ֖ה מִ/קִּרְיַ֣ת סִיחֹ֑ן אָֽכְלָה֙
    עָ֣ר מוֹאָ֔ב בַּעֲלֵ֖י בָּמ֥וֹת אַרְנֹֽן־׃
translation:
  text: For fire has gone out from Heshbon, a flame from the city of Sihon; it has
    consumed Ar of Moab, the lords of the high places of the Arnon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the heights of the Arnon.' The Hebrew phrase may refer either to the
      high places associated with the Arnon region or, more generally, to its heights.
    reason: lexical_alternative
  - marker: b
    text: Or 'the masters/possessors of the high places of the Arnon.' The expression
      'lords of' reflects the Hebrew בַּעֲלֵי more directly.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the explanation or ground for the preceding taunt/song line.
    'For' best preserves the causal/explanatory force in context.
- source_word: אֵשׁ
  chosen: fire
  lexicon: HALOT
  rationale: Straightforward literal rendering; paired with 'flame' in the next colon
    for poetic parallelism.
- source_word: יָצְאָה
  chosen: has gone out
  alternatives:
  - came out
  - went out
  lexicon: HALOT
  rationale: The perfect verb in poetic context describes the action vividly as having
    issued forth. 'Has gone out' is idiomatic and preserves the image of fire proceeding
    from a place.
- source_word: מֵחֶשְׁבּוֹן
  chosen: from Heshbon
  lexicon: HALOT
  rationale: Proper place name transliterated per project philosophy.
- source_word: לֶהָבָה
  chosen: a flame
  alternatives:
  - flame
  lexicon: HALOT
  rationale: Indefinite in English fits the poetic parallel with 'fire.' Retains the
    concrete imagery rather than abstracting to 'blaze'.
- source_word: מִקִּרְיַת סִיחֹן
  chosen: from the city of Sihon
  alternatives:
  - from Sihon's city
  - from Kiriath of Sihon
  lexicon: HALOT
  rationale: קִרְיָה means 'city/town.' The construct with Sihon is most naturally
    rendered 'the city of Sihon.' 'Kiriath' would obscure the common noun sense here.
- source_word: אָכְלָה
  chosen: it has consumed
  alternatives:
  - devoured
  - has eaten up
  lexicon: HALOT
  rationale: Common metaphor of fire 'eating/consuming.' 'Consumed' is natural modern
    English and preserves the destructive force.
- source_word: עָר מוֹאָב
  chosen: Ar of Moab
  alternatives:
  - the city of Moab
  lexicon: HALOT
  rationale: עָר here is best taken as the proper place name Ar, not the common noun
    'city,' since it is a known Moabite location and commonly appears as such in this
    context.
- source_word: בַּעֲלֵי
  chosen: the lords of
  alternatives:
  - the masters of
  - the possessors of
  - the inhabitants of
  lexicon: HALOT
  rationale: בַּעַל in plural construct often denotes owners/masters/lords. Here 'lords
    of' best preserves the elevated poetic diction. 'Inhabitants of' is interpretive
    and less direct.
- source_word: בָּמוֹת
  chosen: the high places
  alternatives:
  - the heights
  lexicon: HALOT
  rationale: בָּמוֹת commonly denotes high places/heights. In this geographical-poetic
    context either is possible, but 'high places' is the more established lexical
    sense and fits the construct with Arnon.
- source_word: אַרְנֹן
  chosen: the Arnon
  alternatives:
  - Arnon
  lexicon: HALOT
  rationale: Rendered with the article in English because it refers to the river/wadi
    Arnon; this is idiomatic in English geographical reference.
