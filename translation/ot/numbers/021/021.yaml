id: NUM.21.21
reference: Numbers 21:21
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח יִשְׂרָאֵל֙ מַלְאָכִ֔ים אֶל סִיחֹ֥ן מֶֽלֶךְ הָ/אֱמֹרִ֖י לֵ/אמֹֽר־־׃
translation:
  text: Then Israel sent messengers to Sihon king of the Amorites, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Amorite king.' The Hebrew construct can be rendered either way in
      English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - and sent
  - then sent
  lexicon: HALOT
  rationale: The waw-consecutive imperfect advances the narrative. 'Sent' is the core
    verbal sense of שלח. 'Then' is included in English to reflect narrative progression
    naturally without over-literal repetition of 'and.'
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name referring to the people/nation; standard transliteration
    is appropriate per translation philosophy.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  - angels
  lexicon: HALOT
  rationale: In this diplomatic context מלאכים clearly refers to human representatives,
    not heavenly beings. 'Messengers' is the broad, natural English equivalent; 'envoys'
    is possible but slightly more interpretive/political.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is the most idiomatic English
    rendering here.
- source_word: סִיחֹן
  chosen: Sihon
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard convention.
- source_word: מֶלֶךְ הָאֱמֹרִי
  chosen: king of the Amorites
  alternatives:
  - the Amorite king
  lexicon: HALOT
  rationale: The construct phrase literally means 'king of the Amorite/Amorites.'
    English idiom favors the collective ethnic plural 'the Amorites.' This preserves
    the sense that Sihon rules the Amorite people.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard rendering of the infinitive introducing direct speech. 'Saying'
    is idiomatic in English narrative and prepares for the quotation in the next verse.
