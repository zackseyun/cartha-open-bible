id: NUM.21.30
reference: Numbers 21:30
source:
  edition: WLC
  text: וַ/נִּירָ֛/ם אָבַ֥ד חֶשְׁבּ֖וֹן עַד דִּיב֑וֹן וַ/נַּשִּׁ֣ים עַד נֹ֔פַח אֲשֶׁ֖רׄ עַד מֵֽידְבָֽא־־־׃
translation:
  text: And we shot at them[a]; Heshbon has perished as far as Dibon, and we laid waste as far as Nophah[b], which reaches to Medeba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew of the opening clause is difficult and has been understood in several ways, including 'we overthrew them' or 'their dominion perished.'
    reason: textual_variant
  - marker: b
    text: The clause rendered 'we laid waste' is also uncertain; some take the form differently, but the context favors a verb of devastation in this victory song.
    reason: textual_variant
lexical_decisions:
- source_word: וַנִּירָם
  chosen: And we shot at them
  alternatives:
  - And we overthrew them
  - And their dominion was destroyed
  - And we took possession of them
  lexicon: HALOT
  rationale: The form is notoriously difficult and likely reflects the taunt-song style of the surrounding quotation. Given the consonants related to ירה/ירה-like shooting language and the 1cp + 3mp suffix morphology supplied, 'we shot at them' best accounts for the form as a vivid martial image. Because the word is textually and lexically uncertain, major alternatives are preserved in a footnote.
- source_word: אָבַד
  chosen: has perished
  alternatives:
  - is destroyed
  - has vanished
  lexicon: HALOT
  rationale: The verb means to perish/be destroyed. 'Has perished' preserves the perfective sense in idiomatic English while fitting the taunt-song register.
- source_word: חֶשְׁבּוֹן
  chosen: Heshbon
  rationale: Place name; transliterated per translation philosophy.
- source_word: עַד דִּיבוֹן
  chosen: as far as Dibon
  alternatives:
  - to Dibon
  lexicon: HALOT
  rationale: עַד marks extent. 'As far as' is the most natural English expression for territorial reach.
- source_word: וַנַּשִּׁים
  chosen: and we laid waste
  alternatives:
  - and we desolated
  - and women
  lexicon: HALOT
  rationale: The ketiv-like form is difficult, but in context a first person plural verbal sense of devastation fits the sequence of conquest locations better than the noun 'women.' 'Laid waste' gives clear modern English and matches the military-poetic context. Because of the uncertainty, alternatives are footnoted.
- source_word: עַד נֹפַח
  chosen: as far as Nophah
  alternatives:
  - to Nophah
  lexicon: HALOT
  rationale: Again עַד indicates extent; Nophah is transliterated as a place name.
- source_word: אֲשֶׁר עַד מֵידְבָא
  chosen: which reaches to Medeba
  alternatives:
  - which is by Medeba
  - as far as Medeba
  lexicon: HALOT
  rationale: אֲשֶׁר links Nophah with a further geographical note. 'Which reaches to Medeba' makes the relative clause intelligible in English while preserving the sense of territorial extension.
- source_word: מֵידְבָא
  chosen: Medeba
  rationale: Place name; transliterated by standard convention.
