theological_decisions:
- issue: Referent of the 3ms suffixes in 'his sons' and 'his daughters'
  chosen_reading: The suffixes refer to Chemosh, yielding 'his sons' and 'his daughters.'
  alternative_readings:
  - The suffixes refer collectively to Moab, yielding 'its sons' and 'its daughters.'
  rationale: 'The immediate antecedent is Chemosh, and the taunt mocks Moab through
    the impotence of its god: Chemosh''s people are handed over. Retaining the masculine
    singular personal reference best reflects the Hebrew poetic personification without
    importing additional theology.'
