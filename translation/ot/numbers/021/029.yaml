id: NUM.21.29
reference: Numbers 21:29
source:
  edition: WLC
  text: אוֹי לְ/ךָ֣ מוֹאָ֔ב אָבַ֖דְתָּ עַם כְּמ֑וֹשׁ נָתַ֨ן בָּנָ֤י/ו פְּלֵיטִם֙ וּ/בְנֹתָ֣י/ו
    בַּ/שְּׁבִ֔ית לְ/מֶ֥לֶךְ אֱמֹרִ֖י סִיחֽוֹן־־׃
translation:
  text: Woe to you, Moab! You are ruined, people of Chemosh! He has made his sons
    fugitives and his daughters captives to Sihon, king of the Amorites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its sons fugitives and its daughters into captivity,' taking the suffixes
      as referring to Moab rather than Chemosh.
    reason: alternative_reading
lexical_decisions:
- source_word: אוֹי
  chosen: Woe
  alternatives:
  - Alas
  lexicon: HALOT
  rationale: An interjection of lament/disaster. 'Woe' preserves the prophetic-poetic
    force better than the softer 'alas.'
- source_word: אָבַדְתָּ
  chosen: You are ruined
  alternatives:
  - you have perished
  - you are destroyed
  lexicon: HALOT
  rationale: The perfect of אבד here expresses catastrophic loss addressed directly
    to Moab. 'You are ruined' is idiomatic modern English and fits the taunt-song
    context.
- source_word: עַם כְּמוֹשׁ
  chosen: people of Chemosh
  alternatives:
  - people of Kemosh
  - Chemosh's people
  lexicon: HALOT
  rationale: Construct relationship indicates the people belonging to or identified
    with Chemosh, the god of Moab. 'People of Chemosh' is clear and natural.
- source_word: נָתַן
  chosen: He has made
  alternatives:
  - he gave
  - he delivered
  lexicon: HALOT
  rationale: Although literally 'gave,' the verb here governs resultative complements
    ('sons fugitives,' 'daughters captives'). 'Has made' communicates the resulting
    condition in natural English while preserving agency.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - its sons
  - his children
  lexicon: HALOT
  rationale: 'The 3ms suffix most naturally refers back to Chemosh in the poetic personification:
    Chemosh''s sons. ''His sons'' preserves the masculine singular reference in the
    Hebrew.'
- source_word: פְּלֵיטִם
  chosen: fugitives
  alternatives:
  - escapees
  - survivors
  lexicon: HALOT
  rationale: The noun denotes those who have escaped or fled. 'Fugitives' fits the
    context of defeat and displacement better than 'survivors,' which can underplay
    the flight motif.
- source_word: וּבְנֹתָיו
  chosen: his daughters
  alternatives:
  - its daughters
  lexicon: HALOT
  rationale: Parallel to 'his sons,' continuing the personification of Chemosh as
    having a people under him.
- source_word: בַּשְּׁבִית
  chosen: captives
  alternatives:
  - into captivity
  - as prisoners
  lexicon: HALOT
  rationale: The phrase indicates being taken in captivity. 'Captives' matches the
    parallel nominal structure with 'fugitives' and reads smoothly in English.
- source_word: לְמֶלֶךְ אֱמֹרִי סִיחוֹן
  chosen: to Sihon, king of the Amorites
  alternatives:
  - for Sihon the Amorite king
  - to the Amorite king, Sihon
  lexicon: HALOT
  rationale: This renders the lamed of indirect object/destination and preserves the
    appositional identification of Sihon as king of the Amorites.
