id: NUM.21.4
reference: Numbers 21:4
source:
  edition: WLC
  text: וַ/יִּסְע֞וּ מֵ/הֹ֤ר הָ/הָר֙ דֶּ֣רֶךְ יַם ס֔וּף לִ/סְבֹ֖ב אֶת אֶ֣רֶץ אֱד֑וֹם
    וַ/תִּקְצַ֥ר נֶֽפֶשׁ הָ/עָ֖ם בַּ/דָּֽרֶךְ־־־׃
translation:
  text: Then they set out from Mount Hor by the way of the Red Sea, to go around the
    land of Edom, and the people became impatient on the way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''by the way to the Sea of Reeds.'' Hebrew: yam suph.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the people became discouraged' or 'lost heart on the way.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: they set out
  alternatives:
  - they journeyed
  - they traveled
  lexicon: HALOT
  rationale: נסע in the wilderness itinerary formula commonly denotes breaking camp
    and moving on. 'Set out' is natural modern English and preserves the travel-stage
    sense better than the more generic 'traveled'.
- source_word: מֵהֹר הָהָר
  chosen: from Mount Hor
  alternatives:
  - from Hor the mountain
  lexicon: HALOT
  rationale: This is the standard place name הֹר הָהָר. English idiom and established
    transliteration favor 'Mount Hor' rather than a wooden rendering.
- source_word: דֶּרֶךְ יַם סוּף
  chosen: by the way of the Red Sea
  alternatives:
  - by the way to the Sea of Reeds
  - by the road of the Red Sea
  lexicon: HALOT
  rationale: דֶּרֶךְ here indicates route or road. יַם סוּף is traditionally 'Red
    Sea,' though literally it may denote 'Sea of Reeds.' Because this verse refers
    to a known route designation, 'by the way of the Red Sea' is retained in the main
    text, with the lexical alternative preserved in a footnote.
- source_word: לִסְבֹב
  chosen: to go around
  alternatives:
  - to skirt
  - to bypass
  - to compass
  lexicon: HALOT
  rationale: 'סבב in the infinitive expresses purpose: taking the route in order to
    go around Edom. ''Go around'' is clear and idiomatic.'
- source_word: אֶת אֶרֶץ אֱדוֹם
  chosen: the land of Edom
  alternatives:
  - the territory of Edom
  lexicon: HALOT
  rationale: אֶרֶץ with a people/place name often means land or territory. 'Land of
    Edom' is the most straightforward rendering.
- source_word: וַתִּקְצַר נֶפֶשׁ הָעָם
  chosen: the people became impatient
  alternatives:
  - the people's soul grew short
  - the people became discouraged
  - the people lost heart
  lexicon: HALOT
  rationale: The idiom קצר נפש conveys impatience, vexation, or discouragement under
    strain. 'Became impatient' best captures the emotional sense here without over-paraphrasing;
    a footnote preserves 'discouraged/lost heart' as a viable contextual alternative.
- source_word: בַּדָּרֶךְ
  chosen: on the way
  alternatives:
  - because of the way
  - on the road
  lexicon: HALOT
  rationale: The preposition ב with דֶּרֶךְ can be locative ('on the way') and may
    also shade into causal sense because the route occasioned their impatience. The
    locative rendering is kept in the main text as the more direct reading, with the
    causal nuance noted in rationale rather than elevated to the text.
