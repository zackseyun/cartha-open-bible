id: NUM.21.24
reference: Numbers 21:24
source:
  edition: WLC
  text: וַ/יַּכֵּ֥/הוּ יִשְׂרָאֵ֖ל לְ/פִי חָ֑רֶב וַ/יִּירַ֨שׁ אֶת אַרְצ֜/וֹ מֵֽ/אַרְנֹ֗ן עַד יַבֹּק֙ עַד בְּנֵ֣י עַמּ֔וֹן כִּ֣י עַ֔ז גְּב֖וּל בְּנֵ֥י עַמּֽוֹן־־־־׃
translation:
  text: Israel struck him with the edge of the sword and took possession of his land from the Arnon as far as the Jabbok[a], as far as the sons of Ammon, for the border of the sons of Ammon was strong.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'as far as the Ammonites' ... 'for the border of the Ammonites was strong.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכֵּהוּ
  chosen: struck him
  alternatives:
  - struck him down
  - defeated him
  - killed him
  lexicon: HALOT
  rationale: The verb נכה commonly means 'strike/smite.' 'Struck him' preserves the direct verbal force without over-specifying death, since the following clause narrates territorial conquest. 'Struck him down' or 'killed him' are possible contextual inferences but go beyond the bare lexical value.
- source_word: לְפִי חָרֶב
  chosen: with the edge of the sword
  alternatives:
  - by the sword
  - with the sword
  lexicon: HALOT
  rationale: This idiom literally means 'to the mouth/edge of the sword.' 'With the edge of the sword' preserves the Hebrew imagery while remaining natural English. Simpler alternatives are possible but less transparent to the source expression.
- source_word: וַיִּירַשׁ
  chosen: took possession of
  alternatives:
  - possessed
  - dispossessed
  - inherited
  lexicon: HALOT
  rationale: ירש can denote taking possession, often by dispossessing others. Here the object is 'his land,' so 'took possession of' communicates acquisition of territory in clear modern English without importing inheritance language that may mislead in this military context.
- source_word: אַרְצוֹ
  chosen: his land
  alternatives:
  - his territory
  - his country
  lexicon: HALOT
  rationale: '''Land'' is the most direct rendering of אֶרֶץ here and fits the territorial context. ''Territory'' is interpretive; ''country'' sounds too modern-political.'
- source_word: מֵאַרְנֹן עַד יַבֹּק
  chosen: from the Arnon as far as the Jabbok
  alternatives:
  - from Arnon to Jabbok
  lexicon: HALOT
  rationale: The preposition pair marks territorial extent. Including 'the' before river names follows normal English style and clarifies these are geographic boundaries.
- source_word: עַד בְּנֵי עַמּוֹן
  chosen: as far as the sons of Ammon
  alternatives:
  - up to the Ammonites
  - as far as the people of Ammon
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Ammon.' In keeping with the project's gender-accurate and source-transparent philosophy, this is retained in the main text. A more idiomatic ethnic rendering is possible, but the literal form is understandable and auditable.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason Israel's conquest extended only this far. 'For' is concise and preserves the explanatory relation.
- source_word: עַז
  chosen: strong
  alternatives:
  - fierce
  - fortified
  lexicon: HALOT
  rationale: עַז denotes strength or might. 'Strong' is the broadest and least interpretively loaded choice. 'Fortified' may fit the military setting but is more specific than the adjective itself.
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - boundary
  - frontier
  lexicon: HALOT
  rationale: '''Border'' is a natural rendering for territorial limit in this context. ''Boundary'' is possible but slightly less idiomatic here.'
- source_word: בְּנֵי עַמּוֹן
  chosen: the sons of Ammon
  alternatives:
  - the Ammonites
  - the people of Ammon
  lexicon: HALOT
  rationale: The phrase occurs twice in the verse. Retaining 'sons of Ammon' preserves the Hebrew kinship expression and aligns with the project's preference for gender-accurate rendering where representative force is present.
