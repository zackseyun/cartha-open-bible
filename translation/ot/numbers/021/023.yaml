id: NUM.21.23
reference: Numbers 21:23
source:
  edition: WLC
  text: וְ/לֹא נָתַ֨ן סִיחֹ֣ן אֶת יִשְׂרָאֵל֮ עֲבֹ֣ר בִּ/גְבֻל/וֹ֒ וַ/יֶּאֱסֹ֨ף סִיחֹ֜ן
    אֶת כָּל עַמּ֗/וֹ וַ/יֵּצֵ֞א לִ/קְרַ֤את יִשְׂרָאֵל֙ הַ/מִּדְבָּ֔רָ/ה וַ/יָּבֹ֖א
    יָ֑הְצָ/ה וַ/יִּלָּ֖חֶם בְּ/יִשְׂרָאֵֽל־־־־׃
translation:
  text: But Sihon did not allow Israel to pass through his territory. Instead, Sihon
    gathered all his people and went out into the wilderness to meet Israel. He came
    to Jahaz and fought against Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not permit Israel to pass through his border.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'all his people'; the text does not explicitly say 'army,' though
      the military context implies an armed force.
    reason: lexical_alternative
  - marker: c
    text: Jahaz is also spelled 'Jahzah' in some English renderings.
    reason: alternative_reading
lexical_decisions:
- source_word: נָתַן
  chosen: did not allow
  alternatives:
  - did not give
  - did not permit
  lexicon: HALOT
  rationale: Although the verb is literally 'gave,' in the construction 'did not give
    Israel to pass through' the idiomatic sense is permission. 'Did not allow' is
    natural English and accurately reflects the Hebrew usage without over-paraphrasing.
- source_word: עֲבֹר
  chosen: to pass through
  alternatives:
  - to cross
  - to pass
  lexicon: HALOT
  rationale: The infinitive of עבר here refers to transit through a region. 'Pass
    through' best captures movement across another's land in this context.
- source_word: בִּגְבֻלוֹ
  chosen: through his territory
  alternatives:
  - through his border
  - within his boundary
  lexicon: HALOT
  rationale: גְּבוּל can mean border, boundary, or territory. In context Israel seeks
    passage across Sihon's land, so 'territory' communicates the intended sense more
    clearly than the more literal but potentially misleading 'border.'
- source_word: וַיֶּאֱסֹף ... אֶת כָּל עַמּוֹ
  chosen: gathered all his people
  alternatives:
  - assembled all his people
  - collected all his army
  lexicon: HALOT
  rationale: The Hebrew says 'all his people.' While the military context implies
    fighting men, the text itself does not explicitly say 'army,' so 'people' is retained.
- source_word: לִקְרַאת יִשְׂרָאֵל
  chosen: to meet Israel
  alternatives:
  - against Israel
  - to confront Israel
  lexicon: HALOT
  rationale: The preposition and infinitive literally mean 'to meet/encounter Israel.'
    Because the hostile intent becomes explicit later with 'fought against Israel,'
    the main text preserves the more neutral wording here.
- source_word: הַמִּדְבָּרָה
  chosen: into the wilderness
  alternatives:
  - to the wilderness
  - toward the wilderness
  lexicon: HALOT
  rationale: The directional ending indicates motion toward/into the wilderness. 'Into
    the wilderness' is idiomatic and reflects the movement.
- source_word: יָהְצָה
  chosen: Jahaz
  alternatives:
  - Jahzah
  lexicon: HALOT
  rationale: This is a place name; standard English transliteration is 'Jahaz.' An
    alternative form exists in English tradition, but 'Jahaz' is common and concise.
- source_word: וַיִּלָּחֶם בְּיִשְׂרָאֵל
  chosen: fought against Israel
  alternatives:
  - made war against Israel
  - fought with Israel
  lexicon: HALOT
  rationale: The Niphal/wayyiqtol of לחם with ב marks hostile engagement. 'Fought
    against Israel' makes the adversative force explicit in natural English.
- source_word: וְלֹא
  chosen: But
  alternatives:
  - And not
  - Now ... not
  lexicon: HALOT
  rationale: At the discourse level, the conjunction introduces a contrast with the
    prior request for passage. 'But' conveys that contrast better than a mechanically
    literal 'and not.'
