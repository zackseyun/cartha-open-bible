id: NUM.21.12
reference: Numbers 21:12
source:
  edition: WLC
  text: מִ/שָּׁ֖ם נָסָ֑עוּ וַֽ/יַּחֲנ֖וּ בְּ/נַ֥חַל זָֽרֶד׃
translation:
  text: From there they set out and camped by the Wadi Zered[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the valley/ravine of Zered' or 'the brook of Zered'; Hebrew naḥal can refer to a wadi, ravine, or seasonal streambed.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשָּׁם
  chosen: From there
  alternatives:
  - From that place
  lexicon: HALOT
  rationale: The adverbial expression marks movement from the previous location. 'From there' is the most natural modern English equivalent and preserves the narrative sequence.
- source_word: נָסָעוּ
  chosen: they set out
  alternatives:
  - they journeyed
  - they departed
  lexicon: HALOT
  rationale: נסע in travel narratives commonly means to pull up camp and move on. 'Set out' captures the departure sense idiomatically better than the more general 'journeyed'.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: חנה means to camp or encamp. 'Camped' is preferred for readable modern English, while still accurately reflecting the military/travel setting.
- source_word: בְּנַחַל
  chosen: in the Wadi
  alternatives:
  - by the valley
  - in the ravine
  - at the brook
  lexicon: HALOT
  rationale: נחל often denotes a wadi, ravine, or seasonal watercourse rather than a perennial stream. 'Wadi' best preserves the geographical sense in this wilderness context, though less literal alternatives are possible.
- source_word: זָרֶד
  chosen: Zered
  lexicon: HALOT
  rationale: This is a proper place name, so per translation philosophy it is transliterated rather than translated.
