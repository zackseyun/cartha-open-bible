id: NUM.21.17
reference: Numbers 21:17
source:
  edition: WLC
  text: אָ֚ז יָשִׁ֣יר יִשְׂרָאֵ֔ל אֶת הַ/שִּׁירָ֖ה הַ/זֹּ֑את עֲלִ֥י בְאֵ֖ר עֱנוּ לָֽ/הּ־־׃
translation:
  text: 'Then Israel sang this song: “Spring up, O well! Sing to it!”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “Rise up, O well! Answer to it!” The Hebrew likely reflects
      a responsive or antiphonal singing formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal adverb introducing the ensuing action in narrative sequence;
    'Then' is the natural English narrative connector.
- source_word: יָשִׁיר
  chosen: sang
  alternatives:
  - will sing
  - began to sing
  lexicon: HALOT
  rationale: Although formally an imperfect, in narrative with אָז it commonly has
    preterite/past force ('then ... sang'). English simple past best reflects the
    discourse function.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name of the people/nation; standard transliteration retained.
- source_word: הַשִּׁירָה הַזֹּאת
  chosen: this song
  alternatives:
  - this poem
  lexicon: HALOT
  rationale: Definite noun plus demonstrative naturally rendered 'this song.' 'Song'
    fits the immediate poetic citation that follows.
- source_word: עֲלִי
  chosen: Spring up
  alternatives:
  - Rise up
  - Come up
  lexicon: HALOT
  rationale: Imperative feminine singular addressed to the well. In context of water/well
    imagery, 'Spring up' is idiomatic and vivid in English, better capturing the sense
    than the more wooden 'come up.'
- source_word: בְאֵר
  chosen: O well
  alternatives:
  - well
  lexicon: HALOT
  rationale: Vocative sense is required by the imperative addressed to the well; 'O
    well' marks direct address in elevated poetic style.
- source_word: עֱנוּ לָהּ
  chosen: Sing to it
  alternatives:
  - Answer it
  - Respond to it
  - Sing of it
  lexicon: HALOT
  rationale: ענה in poetic/song contexts can mean respond antiphonally. Here, after
    the call to the well, the community is told to answer it in song. 'Sing to it'
    communicates the responsive musical sense more clearly than the ambiguous 'answer
    it,' while staying within the poetic context.
