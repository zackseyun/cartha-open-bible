id: NUM.21.19
reference: Numbers 21:19
source:
  edition: WLC
  text: וּ/מִ/מַּתָּנָ֖ה נַחֲלִיאֵ֑ל וּ/מִ/נַּחֲלִיאֵ֖ל בָּמֽוֹת׃
translation:
  text: And from Mattanah to Nahaliel[a], and from Nahaliel to Bamoth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Bamoth can also mean 'heights' or 'high places,' but here it is best taken as the name of a location in Israel's travel itinerary.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/מַּתָּנָה
  chosen: and from Mattanah
  alternatives:
  - and from Mattanah
  lexicon: HALOT
  rationale: The prefixed conjunction וּ is rendered 'and,' and the preposition מִן as 'from.' מַתָּנָה is a proper place name here in the itinerary and is therefore transliterated rather than translated, in keeping with the translation philosophy for names.
- source_word: נַחֲלִיאֵל
  chosen: to Nahaliel
  alternatives:
  - Nahaliel
  lexicon: HALOT
  rationale: 'Although no preposition is written before this place name, the elliptical itinerary style implies movement from one station to the next; English idiom requires supplying ''to'' for clarity: ''from Mattanah to Nahaliel.'' The name is transliterated as a proper noun.'
- source_word: וּ/מִ/נַּחֲלִיאֵל
  chosen: and from Nahaliel
  lexicon: HALOT
  rationale: Again, וּ is 'and' and מִן is 'from.' The place name is repeated and transliterated consistently.
- source_word: בָּמֽוֹת
  chosen: Bamoth
  alternatives:
  - the heights
  lexicon: HALOT
  rationale: In this itinerary context, בָּמוֹת functions as a proper place name rather than a common noun meaning 'high places' or 'heights.' It is therefore transliterated as 'Bamoth.' The lexical sense 'heights' is worth preserving as an alternative because the Hebrew form elsewhere can bear that meaning.
