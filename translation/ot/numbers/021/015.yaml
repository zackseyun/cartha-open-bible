id: NUM.21.15
reference: Numbers 21:15
source:
  edition: WLC
  text: וְ/אֶ֨שֶׁד֙ הַ/נְּחָלִ֔ים אֲשֶׁ֥ר נָטָ֖ה לְ/שֶׁ֣בֶת עָ֑ר וְ/נִשְׁעַ֖ן לִ/גְב֥וּל
    מוֹאָֽב׃
translation:
  text: and the slope of the wadis that extends to the site of Ar and leans against
    the border of Moab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the valleys' or 'the ravines'; Hebrew נְחָלִים often refers to seasonal
      streambeds (wadis).
    reason: lexical_alternative
  - marker: b
    text: Or 'to the dwelling/seat of Ar.' The Hebrew phrase is difficult and may
      refer to the location or settlement of Ar.
    reason: alternative_reading
lexical_decisions:
- source_word: אֶשֶׁד
  chosen: slope
  alternatives:
  - outpouring
  - foot of the slope
  - ravine slope
  lexicon: HALOT
  rationale: The noun denotes a declivity or slope, especially the sloping side associated
    with a valley or ravine. 'Slope' is concise and natural in English while fitting
    the topographical context.
- source_word: הַנְּחָלִים
  chosen: the wadis
  alternatives:
  - the valleys
  - the ravines
  - the torrent valleys
  lexicon: HALOT
  rationale: נחל often refers to a seasonal watercourse or wadi rather than a generic
    valley. 'Wadis' best preserves the geographical sense in this wilderness/topographical
    setting; a more familiar alternative is preserved in a footnote.
- source_word: אֲשֶׁר נָטָה
  chosen: that extends
  alternatives:
  - that turns
  - that stretches out
  - that inclines
  lexicon: HALOT
  rationale: נטה literally means 'stretch out, extend, incline.' In this geographic
    description, 'extends' communicates the spatial sense clearly in modern English.
- source_word: לְשֶׁבֶת עָר
  chosen: to the site of Ar
  alternatives:
  - to the dwelling of Ar
  - to the seat of Ar
  - to where Ar is situated
  lexicon: HALOT
  rationale: The infinitive construct of ישב after ל can indicate location or situation.
    Because the phrase is topographical and Ar is a place-name, 'to the site of Ar'
    gives a natural English rendering without implying habitation as the main point.
- source_word: עָר
  chosen: Ar
  rationale: Proper place-name; transliterated according to the translation philosophy.
- source_word: וְנִשְׁעַן
  chosen: and leans against
  alternatives:
  - and rests on
  - and borders on
  - and is supported by
  lexicon: HALOT
  rationale: The verb שען literally means 'lean, rest upon.' In a territorial/topographical
    description, 'leans against' preserves the metaphor while remaining intelligible.
- source_word: לִגְבוּל מוֹאָב
  chosen: the border of Moab
  alternatives:
  - the territory of Moab
  - the boundary of Moab
  lexicon: HALOT
  rationale: גבול commonly means border or boundary. 'Border of Moab' is the most
    straightforward rendering in this context.
