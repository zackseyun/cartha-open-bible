id: NUM.21.9
reference: Numbers 21:9
source:
  edition: WLC
  text: וַ/יַּ֤עַשׂ מֹשֶׁה֙ נְחַ֣שׁ נְחֹ֔שֶׁת וַ/יְשִׂמֵ֖/הוּ עַל הַ/נֵּ֑ס וְ/הָיָ֗ה
    אִם נָשַׁ֤ךְ הַ/נָּחָשׁ֙ אֶת אִ֔ישׁ וְ/הִבִּ֛יט אֶל נְחַ֥שׁ הַ/נְּחֹ֖שֶׁת וָ/חָֽי־־־־׃
translation:
  text: So Moses made a bronze serpent and set it on the pole. And it happened that
    if the serpent bit a man, and he looked at the bronze serpent, he lived.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'copper serpent.' The Hebrew term for the metal can refer to copper or
      bronze.
    reason: lexical_alternative
  - marker: b
    text: Or 'standard' or 'banner' for 'pole.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'a man,' used here in a representative sense for any bitten person.
    reason: lexical_alternative
  - marker: d
    text: This event is later echoed typologically in John 3:14–15.
    reason: cross_reference
lexical_decisions:
- source_word: נְחַשׁ
  chosen: serpent
  alternatives:
  - snake
  lexicon: HALOT
  rationale: Rendered as 'serpent' to preserve the elevated, literary tone common
    in biblical narrative and to distinguish the crafted figure from merely colloquial
    'snake.'
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: Rendered as 'bronze' in line with common English Bible usage for נְחֹשֶׁת
    in material descriptions, while acknowledging that the term can denote copper
    or bronze more broadly.
- source_word: הַנֵּס
  chosen: the pole
  alternatives:
  - the standard
  - the banner
  lexicon: HALOT
  rationale: Rendered as 'the pole' because in this context it refers to the upright
    object on which the serpent was mounted, not primarily a military or symbolic
    banner.
- source_word: וְהָיָה
  chosen: And it happened
  alternatives:
  - And it came about
  - And it was
  lexicon: HALOT
  rationale: This introduces the resulting circumstance. 'And it happened' preserves
    the narrative transition naturally in English without excessive archaism.
- source_word: אִם נָשַׁךְ הַנָּחָשׁ אֶת אִישׁ
  chosen: if the serpent bit a man
  alternatives:
  - if a serpent bit anyone
  - if the snake bit a person
  lexicon: HALOT
  rationale: Kept the singular construction close to the Hebrew. 'A man' reflects
    the gender-accurate policy for אִישׁ used representatively here, while still functioning
    generically in context.
- source_word: וְהִבִּיט אֶל
  chosen: and he looked at
  alternatives:
  - and he gazed at
  - and he looked to
  lexicon: HALOT
  rationale: Rendered with straightforward 'looked at' as the plain sense of the Hifil
    here. 'Looked to' could suggest a more theological nuance than the immediate Hebrew
    requires, though that resonance may be noted elsewhere canonically.
- source_word: וָחָי
  chosen: he lived
  alternatives:
  - he would live
  - he survived
  lexicon: HALOT
  rationale: 'Rendered as simple past narrative result: upon looking, the bitten person
    lived. ''Survived'' is interpretive; ''would live'' is possible but less direct
    in this narrative sequence.'
