theological_decisions:
- issue: Representative masculine language in אִישׁ
  chosen_reading: a man
  alternative_readings:
  - anyone
  - a person
  rationale: Following the translation philosophy's gender-accurate principle, the
    grammatically masculine singular is retained as 'a man' where it functions representatively.
    More inclusive English alternatives are possible but would move away from the
    source form; the generic force is contextually evident.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Potential typological overreading of 'looked at'
  chosen_reading: looked at
  alternative_readings:
  - looked to
  rationale: The verse has later theological significance in John 3:14–15, but the
    Hebrew here should not be expanded to encode that later typological interpretation
    in the main text. The more neutral 'looked at' preserves original-language primacy
    and avoids importing doctrinal claims not explicit in the verse itself.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 3
