id: NUM.21.35
reference: Numbers 21:35
source:
  edition: WLC
  text: וַ/יַּכּ֨וּ אֹת֤/וֹ וְ/אֶת בָּנָי/ו֙ וְ/אֶת כָּל עַמּ֔/וֹ עַד בִּלְתִּ֥י הִשְׁאִֽיר
    ל֖/וֹ שָׂרִ֑יד וַ/יִּֽירְשׁ֖וּ אֶת אַרְצֽ/וֹ־־־־־־׃
translation:
  text: So they struck him down, and his sons, and all his people, until he had no
    survivor left; and they took possession of his land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'until no survivor was left to him.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'they possessed his land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכּוּ
  chosen: struck ... down
  alternatives:
  - defeated
  - killed
  lexicon: HALOT
  rationale: From נכה in a military context, the verb commonly denotes striking/defeating,
    often with lethal force. 'Struck ... down' preserves the concrete force without
    over-specifying beyond the context, though the following clause implies total
    destruction.
- source_word: אֹתוֹ
  chosen: him
  rationale: Direct object pronoun referring to Og, the king mentioned in the preceding
    verse.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: בנים is masculine plural and specifically 'sons' here; per gender-accurate
    policy, the masculine form is retained rather than neutralized.
- source_word: כָּל עַמּוֹ
  chosen: all his people
  alternatives:
  - all his army
  - all his folk
  lexicon: HALOT
  rationale: עם normally means 'people.' In this conquest context it includes the
    population under his rule, not merely soldiers, so 'all his people' is the broadest
    and most text-faithful rendering.
- source_word: עַד בִּלְתִּי הִשְׁאִיר לוֹ שָׂרִיד
  chosen: until he had no survivor left
  alternatives:
  - until no survivor was left to him
  - leaving him no remnant
  lexicon: HALOT
  rationale: 'This idiom expresses totality of defeat: literally, ''until he did not
    leave to him a survivor.'' English smooths the impersonal/indefinite subject.
    ''Survivor'' fits שׂריד well in a warfare context; ''remnant'' is possible but
    can carry theological overtones not required here.'
- source_word: שָׂרִיד
  chosen: survivor
  alternatives:
  - remnant
  lexicon: HALOT
  rationale: In this immediate military setting, 'survivor' is clearer and more natural
    than 'remnant,' which in English may suggest a technical theological category.
- source_word: וַיִּירְשׁוּ
  chosen: took possession of
  alternatives:
  - inherited
  - possessed
  - dispossessed and occupied
  lexicon: HALOT
  rationale: ירשׁ can mean inherit/possess/dispossess depending on context. Here Israel
    seizes territory after victory, so 'took possession of' best captures the result
    in idiomatic English without implying peaceful inheritance.
- source_word: אַרְצוֹ
  chosen: his land
  alternatives:
  - his country
  - his territory
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the territory ruled by Og. 'Land' is the standard
    and sufficiently broad rendering.
