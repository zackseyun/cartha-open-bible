id: NUM.21.13
reference: Numbers 21:13
source:
  edition: WLC
  text: מִ/שָּׁם֮ נָסָעוּ֒ וַֽ/יַּחֲנ֗וּ מֵ/עֵ֤בֶר אַרְנוֹן֙ אֲשֶׁ֣ר בַּ/מִּדְבָּ֔ר
    הַ/יֹּצֵ֖א מִ/גְּב֣וּל הָֽ/אֱמֹרִ֑י כִּ֤י אַרְנוֹן֙ גְּב֣וּל מוֹאָ֔ב בֵּ֥ין מוֹאָ֖ב
    וּ/בֵ֥ין הָ/אֱמֹרִֽי׃
translation:
  text: From there they set out and camped beyond the Arnon, which is in the wilderness
    that extends from the border of the Amorites, for the Arnon is the border of Moab,
    between Moab and the Amorites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the other side of the Arnon.' The Hebrew expression can denote the
      far side or region across from a boundary, depending on perspective.
    reason: lexical_alternative
  - marker: b
    text: Literally 'that goes out from the border of the Amorite.' The sense is that
      the wilderness stretches out from the Amorite border.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשָּׁם
  chosen: From there
  alternatives:
  - From that place
  lexicon: HALOT
  rationale: Standard adverbial expression marking departure from the previous location;
    'From there' is natural modern English and preserves the narrative sequence.
- source_word: נָסָעוּ
  chosen: they set out
  alternatives:
  - they journeyed
  - they traveled on
  lexicon: HALOT
  rationale: The verb נסע in travel narratives commonly means to break camp and move
    on. 'Set out' captures the departure sense better than the broader 'journeyed'.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: Refers to making camp. 'Camped' is readable modern English; 'encamped'
    is more formal but less natural.
- source_word: מֵעֵבֶר אַרְנוֹן
  chosen: beyond the Arnon
  alternatives:
  - on the other side of the Arnon
  - across the Arnon
  lexicon: HALOT
  rationale: עֵבֶר denotes the far side/region beyond. 'Beyond the Arnon' is concise
    and leaves the relative perspective appropriately broad, matching the Hebrew.
- source_word: אֲשֶׁר בַּמִּדְבָּר
  chosen: which is in the wilderness
  alternatives:
  - which was in the wilderness
  lexicon: HALOT
  rationale: The relative clause modifies the camping location near/beyond the Arnon.
    Present tense in English suits the geographic description.
- source_word: הַיֹּצֵא מִגְּבוּל הָאֱמֹרִי
  chosen: that extends from the border of the Amorites
  alternatives:
  - that comes out from the border of the Amorites
  - that reaches out from the territory of the Amorites
  lexicon: HALOT
  rationale: The participle יצא literally means 'going out,' here describing the wilderness
    as stretching out from the Amorite border. 'Extends from' communicates the geographic
    sense idiomatically without over-paraphrase.
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - boundary
  - territory
  lexicon: HALOT
  rationale: In both occurrences the noun denotes a territorial boundary. 'Border'
    is the clearest and most consistent rendering in this verse.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: Though morphologically singular, the term often functions collectively
    for the people group. English idiom prefers the collective plural 'the Amorites'
    in this geographic statement.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces an explanatory clause giving the reason for the geographic
    description. 'For' preserves the explanatory force cleanly.
- source_word: אַרְנוֹן גְּבוּל מוֹאָב
  chosen: the Arnon is the border of Moab
  alternatives:
  - the Arnon was the border of Moab
  lexicon: HALOT
  rationale: A verbless clause expressing a standing geographic fact. Supplying 'is'
    is natural in English and suits the timeless description.
- source_word: בֵּין מוֹאָב וּבֵין הָאֱמֹרִי
  chosen: between Moab and the Amorites
  alternatives:
  - between Moab and the Amorite
  lexicon: HALOT
  rationale: The repeated בין construction marks the two parties separated by the
    border. 'The Amorites' again reflects the collective ethnic sense in idiomatic
    English.
