id: NUM.21.10
reference: Numbers 21:10
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ בְּנֵ֣י יִשְׂרָאֵ֑ל וַֽ/יַּחֲנ֖וּ בְּ/אֹבֹֽת׃
translation:
  text: Then the sons of Israel set out and camped at Oboth[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the sons of Israel.'' Many English versions render this ethnonym as ''the Israelites'' or ''the children of Israel.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: set out
  alternatives:
  - journeyed
  - departed
  - traveled on
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary context, the verb denotes breaking camp and moving on to the next stage. 'Set out' is natural modern English and preserves the travel-sequence sense better than the more archaic 'journeyed.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Given the translation philosophy's preference for gender-accurate renderings and because this is a standard ethnonym with corporate force, the more formal 'the sons of Israel' preserves the Hebrew expression while remaining understandable. 'Israelites' is possible but less transparent to the source wording.
- source_word: וַיַּחֲנוּ
  chosen: camped
  alternatives:
  - encamped
  - pitched camp
  lexicon: HALOT
  rationale: From חנה, the standard wilderness-travel verb for making camp. 'Camped' is clear modern English; 'encamped' is more traditional but less natural.
- source_word: בְּאֹבֹת
  chosen: at Oboth
  alternatives:
  - in Oboth
  lexicon: HALOT
  rationale: Oboth is a place name and should be transliterated rather than translated. With חנה in itinerary formulas, English idiom prefers 'camped at Oboth.'
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  rationale: The prefixed waw on the first verb advances the narrative. 'Then' communicates sequential movement in readable English, while still reflecting the Hebrew narrative progression.
