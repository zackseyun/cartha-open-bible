id: NUM.21.18
reference: Numbers 21:18
source:
  edition: WLC
  text: בְּאֵ֞ר חֲפָר֣וּ/הָ שָׂרִ֗ים כָּר֨וּ/הָ֙ נְדִיבֵ֣י הָ/עָ֔ם בִּ/מְחֹקֵ֖ק בְּ/מִשְׁעֲנֹתָ֑/ם
    וּ/מִ/מִּדְבָּ֖ר מַתָּנָֽה׃
translation:
  text: the well that the princes dug, that the nobles of the people hollowed out
    with the ruler’s staff, with their staffs. And from the wilderness they went to
    Mattanah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the lawgiver,' if מְחֹקֵק is taken as a person rather than the
      ruler’s staff/scepter.
    reason: alternative_reading
  - marker: b
    text: Hebrew simply 'and from the wilderness Mattanah'; the sense is likely an
      itinerary transition, 'and from the wilderness to Mattanah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאֵר
  chosen: the well
  alternatives:
  - a well
  lexicon: HALOT
  rationale: Common noun meaning 'well.' The article is not explicit in Hebrew here,
    but English idiom in this poetic line works naturally with 'the well,' referring
    to the specific well just celebrated in the preceding verse.
- source_word: חֲפָרוּהָ
  chosen: dug
  alternatives:
  - excavated
  lexicon: HALOT
  rationale: From חפר, 'to dig.' The 3fs suffix refers back to בְּאֵר ('well'), so
    'dug [it]' is the sense. English omits the object pronoun because 'the well' is
    already fronted.
- source_word: שָׂרִים
  chosen: princes
  alternatives:
  - leaders
  - chiefs
  - officials
  lexicon: HALOT
  rationale: In this context the term denotes high-ranking leaders. 'Princes' preserves
    the elevated social-political nuance and fits the poetic register better than
    the flatter 'leaders.'
- source_word: כָּרוּהָ
  chosen: hollowed out
  alternatives:
  - dug
  - excavated
  lexicon: HALOT
  rationale: From כרה, another digging verb. To preserve the poetic parallelism without
    flattening both verbs into the same English word, 'hollowed out' gives a natural
    distinction while retaining the basic sense.
- source_word: נְדִיבֵי הָעָם
  chosen: the nobles of the people
  alternatives:
  - the nobles among the people
  - the willing ones of the people
  lexicon: HALOT
  rationale: נְדִיבִים often denotes nobles or generous/high-status persons. In parallel
    with שָׂרִים, the social-rank sense is most likely here, so 'the nobles of the
    people' best fits the context.
- source_word: בִּמְחֹקֵק
  chosen: with the ruler’s staff
  alternatives:
  - with the lawgiver
  - with the scepter
  - by decree
  lexicon: HALOT
  rationale: מְחֹקֵק can denote ruler, lawgiver, or ruler's staff/scepter. In parallel
    with 'with their staffs,' an instrument is most likely, so an implement associated
    with rule is intended rather than a person. 'Ruler’s staff' preserves the governing
    nuance while fitting the instrumental syntax.
- source_word: בְּמִשְׁעֲנֹתָם
  chosen: with their staffs
  alternatives:
  - with their rods
  - with their walking staffs
  lexicon: HALOT
  rationale: מִשְׁעֵנָה is a staff/support. 'Staffs' is the most natural plural here
    and matches the image of leaders ceremonially or symbolically digging the well.
- source_word: וּמִמִּדְבָּר מַתָּנָה
  chosen: and from the wilderness to Mattanah
  alternatives:
  - and from the wilderness, Mattanah
  - and from Wilderness to Mattanah
  lexicon: HALOT
  rationale: 'This clause begins the itinerary sequence continued in the next verse.
    Although the Hebrew lacks an explicit preposition before Mattanah, the sense is
    directional/serial: from the wilderness to Mattanah. Retaining ''Mattanah'' as
    a place name follows the transliterate-names principle.'
