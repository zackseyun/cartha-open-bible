theological_decisions:
- issue: Meaning of בִּמְחֹקֵק in a poetic and potentially ambiguous phrase
  chosen_reading: 'instrumental: ''with the ruler’s staff'''
  alternative_readings:
  - 'personal: ''by the lawgiver'''
  - 'abstract: ''by decree'''
  rationale: The immediate parallel with 'with their staffs' strongly favors an instrumental
    reading rather than introducing a separate person or abstract means. This is a
    lexical-contextual decision, not a doctrinal one, and it avoids importing later
    theological associations into a wilderness-song context.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of וּמִמִּדְבָּר מַתָּנָה
  chosen_reading: 'itinerary transition: ''and from the wilderness to Mattanah'''
  alternative_readings:
  - 'appositional naming: ''and from the wilderness, Mattanah'''
  rationale: The broader context in Numbers 21:18–20 lists stages of travel. Rendering
    the phrase as a movement from one location to the next best preserves the narrative
    flow and avoids an unnatural apposition in English.
  doctrine_reference: Translation philosophy §1, §6
