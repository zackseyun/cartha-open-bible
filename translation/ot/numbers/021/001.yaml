id: NUM.21.1
reference: Numbers 21:1
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֞ע הַ/כְּנַעֲנִ֤י מֶֽלֶךְ עֲרָד֙ יֹשֵׁ֣ב הַ/נֶּ֔גֶב כִּ֚י בָּ֣א
    יִשְׂרָאֵ֔ל דֶּ֖רֶךְ הָ/אֲתָרִ֑ים וַ/יִּלָּ֨חֶם֙ בְּ/יִשְׂרָאֵ֔ל וַ/יִּ֥שְׁבְּ
    מִמֶּ֖/נּוּ שֶֽׁבִי־׀׃
translation:
  text: When the Canaanite, the king of Arad, who lived in the Negev, heard that Israel
    was coming by the way of Atharim, he fought against Israel and took some of them
    captive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''by the way of Atharim.'' The term ''Atharim'' is uncertain; some
      understand it as a place name, while others, influenced by ancient versions,
      take it to mean ''the spies'' or ''the scouts.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - learned
  - came to hear
  lexicon: HALOT
  rationale: The verb שׁמע in narrative commonly means 'heard' in the sense of receiving
    news. 'Heard' is the most natural English narrative equivalent and preserves the
    causal sequence for the attack.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanite
  alternatives:
  - a Canaanite
  lexicon: HALOT
  rationale: 'With the article, the term identifies the figure ethnically/politically:
    ''the Canaanite.'' This likely functions appositionally with ''the king of Arad,''
    not as a generic indefinite.'
- source_word: מֶלֶךְ עֲרָד
  chosen: the king of Arad
  alternatives:
  - king of Arad
  lexicon: HALOT
  rationale: 'A straightforward construct/title plus place name. Including ''the''
    in English yields idiomatic apposition: ''the Canaanite, the king of Arad.'''
- source_word: יֹשֵׁב הַנֶּגֶב
  chosen: who lived in the Negev
  alternatives:
  - dwelling in the Negev
  - inhabiting the Negev
  - who lived in the south
  lexicon: HALOT
  rationale: The participle יֹשֵׁב denotes residence. 'Who lived' is smooth modern
    English. הַנֶּגֶב is best kept as the regional name 'the Negev' rather than generalized
    'the south,' preserving geographic specificity.
- source_word: כִּי בָּא יִשְׂרָאֵל
  chosen: that Israel was coming
  alternatives:
  - that Israel had come
  - that Israel came
  lexicon: HALOT
  rationale: After 'heard,' כִּי introduces reported information. The perfect בָּא
    can be rendered with an English progressive in context because the next clause
    concerns Israel's approach route and the king's response to that approach.
- source_word: דֶּרֶךְ הָאֲתָרִים
  chosen: by the way of Atharim
  alternatives:
  - by the road of Atharim
  - by the way of the spies
  - by the route of Atharim
  lexicon: HALOT
  rationale: דֶּרֶךְ is 'way/road/route.' The noun אֲתָרִים is difficult and may be
    a place name or related to 'spies/scouts' in some ancient versions and interpretations.
    The consonantal Hebrew here is best represented conservatively as the toponym-like
    'Atharim,' while preserving the interpretive alternative in a footnote.
- source_word: וַיִּלָּחֶם בְּיִשְׂרָאֵל
  chosen: he fought against Israel
  alternatives:
  - he attacked Israel
  - he made war on Israel
  lexicon: HALOT
  rationale: The Niphal/warfare form with בְּ marks hostile engagement. 'Fought against'
    is a clear, direct rendering that does not overinterpret the scale of the conflict.
- source_word: וַיִּשְׁבְּ
  chosen: took captive
  alternatives:
  - captured
  - seized
  lexicon: HALOT
  rationale: From שׁבה, the sense is taking prisoners/captives in war. 'Took captive'
    best matches the following cognate noun שֶׁבִי.
- source_word: מִמֶּנּוּ
  chosen: some of them
  alternatives:
  - from them
  - from him
  lexicon: HALOT
  rationale: 'Although the suffix form can be morphologically singular, in context
    it refers back to collective Israel. English idiom requires an explicit partitive
    sense: he took captives from among Israel, hence ''some of them.'''
- source_word: שֶׁבִי
  chosen: captive
  alternatives:
  - captives
  - prisoners
  lexicon: HALOT
  rationale: The noun denotes captivity/captive(s). In English, the idiomatic expression
    with the preceding verb is 'took some of them captive.' This conveys the result
    without awkward literalism such as 'captured a captivity.'
