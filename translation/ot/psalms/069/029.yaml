theological_decisions:
- issue: Meaning of 'book of life' in an imprecatory psalm
  chosen_reading: Retain the metaphor 'book of life' without resolving whether it refers to temporal life, covenant membership, or final eschatological salvation.
  alternative_readings:
  - a register of the living
  - an eschatological book of salvation
  rationale: The Hebrew expression can evoke a divine register, and later biblical usage gives it eschatological resonance. The translation preserves the phrase as-is rather than narrowing it to one theological system, in keeping with the instruction to preserve theological tension where the text itself does not force a single resolution.
  doctrine_reference: Translation philosophy §3
- issue: Force of the imprecation
  chosen_reading: Translate as a petition/wish ('Let them...') rather than as a prediction.
  alternative_readings:
  - They will be blotted out
  - They are blotted out
  rationale: The verbal forms in context function jussively in a sequence of imprecations. Rendering them as petitions preserves the psalm's rhetoric without softening or converting it into mere description.
