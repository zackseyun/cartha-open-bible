  rationale: The Hebrew word מָשָׁל (māšāl) in this context of lament and public scorn does not mean a neutral 'proverb' (a wise saying), but an 'object of mockery' or a 'byword' (a person cited as a notorious example). The current rendering is misleading, as it obscures the psalmist's complaint. While 'proverb' is a possible gloss in other contexts, here it misses the essential meaning of being subjected to derision. 'Byword' accurately conveys this negative connotation, which is central to the clause. Relying on a footnote to convey the primary meaning is not ideal for an optimal-equivalence translation.
