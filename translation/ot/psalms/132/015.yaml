id: PSA.132.15
reference: Psalms 132:15
source:
  edition: WLC
  text: צֵ֭ידָ/הּ בָּרֵ֣ךְ אֲבָרֵ֑ךְ אֶ֝בְיוֹנֶ֗י/הָ אַשְׂבִּ֥יעַֽ לָֽחֶם׃
translation:
  text: I will surely bless her provisions[a]; I will satisfy her poor with bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her food' or 'her sustenance'; the Hebrew term can refer to a city's supply of provisions.
    reason: lexical_alternative
lexical_decisions:
- source_word: צֵידָהּ
  lemma: צֵיד
  chosen: her provisions
  alternatives:
  - her food
  - her sustenance
  - her prey/provision
  lexicon: HALOT
  rationale: The noun צֵיד can denote provision, food supply, or game/provision. In this Zion context, 'provisions' best captures the city's supply of food without the misleading hunting nuance of 'prey.' The 3fs suffix refers back to Zion in the surrounding context, hence 'her.'
- source_word: בָּרֵךְ אֲבָרֵךְ
  chosen: I will surely bless
  alternatives:
  - I will abundantly bless
  - blessing I will bless
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'I will surely bless' preserves the emphatic force in natural English better than a wooden repetition.
- source_word: אֶבְיוֹנֶיהָ
  chosen: her poor
  alternatives:
  - her needy
  - her afflicted poor
  lexicon: HALOT
  rationale: אֶבְיוֹן commonly denotes the poor or needy. 'Her poor' is concise, natural, and fits the social-economic sense in context; the suffix again refers to Zion.
- source_word: אַשְׂבִּיעַ
  chosen: I will satisfy
  alternatives:
  - I will fill
  - I will satisfy fully
  lexicon: HALOT
  rationale: The Hiphil of שׂבע means to cause to be satisfied or filled. 'I will satisfy' communicates both provision and fullness in idiomatic English.
- source_word: לָחֶם
  chosen: with bread
  alternatives:
  - with food
  lexicon: HALOT
  rationale: The Hebrew specifically says 'bread.' Retaining 'bread' preserves the concrete image and avoids unnecessary generalization to 'food.'
