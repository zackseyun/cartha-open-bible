theological_decisions:
- issue: Referent of the feminine suffixes
  chosen_reading: The suffixes ('her provisions,' 'her poor') refer to Zion/Jerusalem from the immediate context.
  alternative_readings:
  - A more generalized reference to the dwelling place of the LORD
  rationale: The feminine singular suffixes most naturally point back to Zion in Psalm 132:13–14. Rendering them explicitly as 'her' preserves the poetic personification without importing additional theological claims.
