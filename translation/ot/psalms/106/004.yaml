theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of בִּרְצוֹן עַמֶּךָ
  chosen_reading: 'temporal/circumstantial: ''when you show favor to your people'''
  alternative_readings:
  - 'instrumental/associative: ''with the favor shown to your people'''
  rationale: 'The phrase is syntactically compact and could be rendered more formally, but the prayer context favors a temporal-circumstantial sense: the psalmist asks to share in God''s favorable regard for the covenant people. This preserves the communal dimension without overinterpreting election or individual merit.'
