id: PSA.106.4
reference: Psalms 106:4
source:
  edition: WLC
  text: זָכְרֵ֣/נִי יְ֭הוָה בִּ/רְצ֣וֹן עַמֶּ֑/ךָ פָּ֝קְדֵ֗/נִי בִּ/ישׁוּעָתֶֽ/ךָ׃
translation:
  text: Remember me[a], O Yahweh, when you show favor to your people[b]; attend to me with your salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'with the favor shown to your people.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'visit me with your salvation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכְרֵנִי
  chosen: Remember me
  alternatives:
  - Remember me favorably
  - Call me to mind
  lexicon: HALOT
  rationale: Qal imperative 2ms + 1cs suffix from זכר, a direct petition for YHWH to remember the psalmist. Simple 'Remember me' preserves the prayerful force without adding interpretive material.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בִּרְצוֹן עַמֶּךָ
  chosen: when you show favor to your people
  alternatives:
  - with the favor of your people
  - in favor toward your people
  - with favor for your people
  lexicon: HALOT
  rationale: 'רָצוֹן denotes favor, goodwill, acceptance. The preposition ב here is best taken in a temporal/circumstantial sense in context: the psalmist asks to be remembered at the time of God''s favorable action toward his people. ''When you show favor to your people'' is clearer in English than a more wooden ''with the favor of your people,'' which could wrongly suggest the people''s favor toward God or the psalmist.'
- source_word: פָּקְדֵנִי
  chosen: attend to me
  alternatives:
  - visit me
  - take note of me
  - care for me
  lexicon: HALOT
  rationale: פקד in prayer contexts can mean to visit, attend to, or intervene for someone. 'Attend to me' communicates gracious divine intervention in contemporary English without the ambiguity of 'visit me,' which can sound merely locative.
- source_word: בִּישׁוּעָתֶךָ
  chosen: with your salvation
  alternatives:
  - for my deliverance
  - with your saving help
  lexicon: HALOT
  rationale: יְשׁוּעָה commonly means salvation/deliverance. 'With your salvation' preserves the noun and the preposition, expressing the means or sphere of God's saving intervention. It also retains the theological breadth of salvation rather than narrowing it to rescue alone.
