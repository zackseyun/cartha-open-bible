id: PSA.15.0
reference: Psalms 15:0
source:
  edition: WLC
  text: מִזְמ֗וֹר לְ/דָ֫וִ֥ד יְ֭הֹוָה מִי יָג֣וּר בְּ/אָהֳלֶ֑/ךָ מִֽי יִ֝שְׁכֹּ֗ן בְּ/הַ֣ר קָדְשֶֽׁ/ךָ־־׃
translation:
  text: A psalm of David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by David' or 'for David'; the Hebrew superscription 'of David' can indicate authorship, association, or dedication.
    reason: alternative_reading
  - marker: b
    text: Or 'tabernacle'; the Hebrew literally says 'tent,' likely evoking the sanctuary as God's dwelling place.
    reason: lexical_alternative
status: revised
is_superscription: true
