theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O LORD
  alternative_readings:
  - the LORD
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies the default rendering 'the LORD' for יְהוָה,
    following Jewish reverence tradition and the Septuagint pattern. Because the verse
    is a direct address, 'O LORD' is used idiomatically without changing the underlying
    translation choice.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
