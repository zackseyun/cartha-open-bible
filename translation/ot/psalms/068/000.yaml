id: PSA.68.0
reference: Psalms 68:0
source:
  edition: WLC
  text: לַ/מְנַצֵּ֥חַ לְ/דָוִ֗ד מִזְמ֥וֹר שִֽׁיר׃
translation:
  text: For the choir director[a]. Of David. A psalm[b]. A song.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By David'; the Hebrew preposition in psalm headings can indicate authorship, dedication, or association.
    reason: alternative_reading
  - marker: b
    text: '''For the choir director'' may also be rendered ''For the music director'' or ''To the choirmaster.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choir director
  alternatives:
  - For the music director
  - To the choirmaster
  - For the leader
  lexicon: HALOT
  rationale: In psalm superscriptions, this term conventionally denotes the person overseeing musical performance. 'Choir director' is clear modern English and fits the liturgical/musical setting better than the more ambiguous 'leader.'
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - By David
  - For David
  - Belonging to David
  lexicon: HALOT
  rationale: The preposition ל in psalm headings is semantically broad. 'Of David' preserves the Hebrew ambiguity regarding authorship, dedication, or association better than the more interpretively specific 'By David.'
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - Melody
  - Musical psalm
  lexicon: HALOT
  rationale: The standard and most natural rendering in superscriptions is 'psalm.' It reflects a song intended for musical accompaniment without over-specifying the form in English.
- source_word: שִׁיר
  chosen: A song
  alternatives:
  - Song
  lexicon: HALOT
  rationale: Rendered straightforwardly as 'song.' Keeping both 'psalm' and 'song' reflects the Hebrew's paired genre labels rather than collapsing them into one term.
