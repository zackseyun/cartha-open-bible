id: PSA.28.7
reference: Psalms 28:7
source:
  edition: WLC
  text: יְהוָ֤ה עֻזִּ֥/י וּ/מָגִנִּ/י֮ בּ֤/וֹ בָטַ֥ח לִבִּ֗/י וְֽ/נֶ֫עֱזָ֥רְתִּי וַ/יַּעֲלֹ֥ז
    לִבִּ֑/י וּֽ/מִ/שִּׁירִ֥/י אֲהוֹדֶֽ/נּוּ׀׃
translation:
  text: The LORD is my strength and my shield; in him my heart trusted, and I was
    helped. So my heart rejoices, and with my song I will praise him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on him my heart trusted.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my heart exults.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I will give thanks to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as
    'the LORD.' Small-caps convention is represented here as 'The LORD' at sentence
    start.
- source_word: עֻזִּי
  chosen: my strength
  alternatives:
  - my stronghold
  - my might
  lexicon: HALOT
  rationale: The noun עֹז commonly denotes strength or might. 'My strength' is the
    most direct and idiomatic rendering here, fitting the parallel with 'my shield.'
- source_word: מָגִנִּי
  chosen: my shield
  alternatives:
  - my protector
  lexicon: HALOT
  rationale: מָגֵן is literally 'shield.' The metaphor is transparent in English and
    should be preserved rather than generalized to 'protector' in the main text.
- source_word: בּוֹ
  chosen: in him
  alternatives:
  - on him
  lexicon: HALOT
  rationale: The preposition ב with בטח can be rendered 'in' or 'on.' 'In him' is
    idiomatic in English for personal trust and preserves the relational sense.
- source_word: בָטַח
  chosen: trusted
  alternatives:
  - trusted securely
  - put confidence
  lexicon: HALOT
  rationale: בטח means to trust, rely on, feel secure. 'Trusted' is concise and natural;
    the object 'in him' carries the sense of reliance.
- source_word: לִבִּי
  chosen: my heart
  lexicon: HALOT
  rationale: לֵב/לֵבָב often denotes the inner self, including will and affections.
    'My heart' is the standard and fitting rendering in this poetic context.
- source_word: נֶעֱזָרְתִּי
  chosen: I was helped
  alternatives:
  - I have been helped
  - I was given help
  lexicon: HALOT
  rationale: 'The Niphal of עזר is passive/reflexive in sense: ''I was helped.'' This
    preserves the straightforward verbal idea without overinterpreting aspect.'
- source_word: וַיַּעֲלֹז
  chosen: rejoices
  alternatives:
  - exults
  - leaps for joy
  lexicon: HALOT
  rationale: עלז conveys exultant joy. 'Rejoices' is clear modern English; 'exults'
    is possible but less common. Present tense in English works well after the resultative
    'so' in poetic style.
- source_word: וּמִשִּׁירִי
  chosen: with my song
  alternatives:
  - from my song
  - by my song
  - with singing
  lexicon: HALOT
  rationale: The prefixed מִן with שִׁיר likely expresses means or accompaniment in
    context. 'With my song' is idiomatic and captures the sense that praise is offered
    in song.
- source_word: אֲהוֹדֶנּוּ
  chosen: I will praise him
  alternatives:
  - I thank him
  - I will give thanks to him
  lexicon: HALOT
  rationale: ידה in the Hiphil can mean 'give thanks' or 'praise.' In parallel with
    'my song,' 'I will praise him' best fits the poetic and worshipful context, while
    the thanksgiving nuance is preserved as an alternative.
