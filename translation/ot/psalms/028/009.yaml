theological_decisions:
- issue: Pastoral metaphor in רְעֵם
  chosen_reading: shepherd them
  alternative_readings:
  - feed them
  rationale: The Hebrew verb includes feeding but extends to the full role of a shepherd.
    Rendering it as 'shepherd them' preserves the richer biblical image of God's ongoing
    care without importing later doctrinal claims.
  doctrine_reference: Translation philosophy §1, §6
- issue: Covenantal identity in נַחֲלָתֶךָ
  chosen_reading: your inheritance
  alternative_readings:
  - your heritage
  - your possession
  rationale: The phrase identifies the people as God's allotted possession/inheritance.
    'Your inheritance' keeps the covenantal register and avoids flattening the metaphor.
  doctrine_reference: Translation philosophy §1, §5
