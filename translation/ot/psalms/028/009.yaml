id: PSA.28.9
reference: Psalms 28:9
source:
  edition: WLC
  text: הוֹשִׁ֤יעָ/ה אֶת עַמֶּ֗/ךָ וּ/בָרֵ֥ךְ אֶת נַחֲלָתֶ֑/ךָ וּֽ/רְעֵ֥/ם וְ֝/נַשְּׂאֵ֗/ם
    עַד הָ/עוֹלָֽם׀־־־׃
translation:
  text: Save your people and bless your inheritance; shepherd them and carry them
    forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'feed them'; the Hebrew verb can denote tending a flock, including feeding,
      but also the broader act of shepherding.
    reason: lexical_alternative
  - marker: b
    text: Or 'lift them up' or 'bear them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹשִׁיעָה
  chosen: Save
  alternatives:
  - Give salvation to
  - Deliver
  lexicon: HALOT
  rationale: Imperative of ישׁע addressed to God. 'Save' is the most natural and direct
    English imperative here, preserving both covenantal and soteriological force without
    unnecessary expansion.
- source_word: עַמֶּךָ
  chosen: your people
  lexicon: HALOT
  rationale: עם with 2ms suffix denotes the covenant people belonging to God. 'Your
    people' is the standard, clear rendering.
- source_word: בָרֵךְ
  chosen: bless
  lexicon: HALOT
  rationale: Imperative of ברך in a prayer request. 'Bless' is the straightforward
    equivalent and preserves the liturgical tone.
- source_word: נַחֲלָתֶךָ
  chosen: your inheritance
  alternatives:
  - your heritage
  - your possession
  lexicon: HALOT
  rationale: נחלה often denotes inherited possession or heritage. 'Your inheritance'
    preserves the covenantal imagery of Israel as belonging to God, while remaining
    idiomatic in English.
- source_word: רְעֵם
  chosen: shepherd them
  alternatives:
  - feed them
  - pasture them
  lexicon: HALOT
  rationale: Imperative of רעה with 3mp suffix. Though older English versions often
    use 'feed them,' the verb broadly means to tend as a shepherd. 'Shepherd them'
    best captures the pastoral and royal imagery without narrowing it to feeding alone.
- source_word: נַשְּׂאֵם
  chosen: carry them
  alternatives:
  - lift them up
  - bear them
  lexicon: HALOT
  rationale: נשא can mean lift, bear, or carry. In parallel with 'shepherd them,'
    'carry them' evokes a shepherd's protective care and reads naturally in modern
    English.
- source_word: עַד הָעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - unto eternity
  - to the age
  lexicon: HALOT
  rationale: The phrase denotes enduring, unending duration. 'Forever' is idiomatic
    modern English and preserves the temporal force.
