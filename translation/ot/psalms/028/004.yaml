theological_decisions:
- issue: Imprecatory language and divine retribution
  chosen_reading: The verse is rendered as a petition that God repay the wicked in
    proportion to their deeds.
  alternative_readings:
  - A softer reading that treats the language as merely descriptive rather than petitionary
  rationale: The repeated imperatives ('Give... give... repay') clearly present a
    prayer for divine justice, not a neutral observation. The translation preserves
    the moral and judicial force without intensifying it beyond the Hebrew.
  doctrine_reference: Translation philosophy §1, §3, §6
