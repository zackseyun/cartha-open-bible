id: PSA.28.4
reference: Psalms 28:4
source:
  edition: WLC
  text: תֶּן לָ/הֶ֣ם כְּ/פָעֳלָ/ם֮ וּ/כְ/רֹ֪עַ מַֽעַלְלֵ֫י/הֶ֥ם כְּ/מַעֲשֵׂ֣ה יְ֭דֵי/הֶם
    תֵּ֣ן לָ/הֶ֑ם הָשֵׁ֖ב גְּמוּלָ֣/ם לָ/הֶֽם־׃
translation:
  text: Give to them according to their work, and according to the evil of their deeds;
    according to the work of their hands give to them; repay them their due.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'repay them their recompense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֶּן
  chosen: Give
  alternatives:
  - Grant
  - Render
  lexicon: HALOT
  rationale: Imperative of נתן addressed to God in a petition. 'Give' is the plain
    and direct English equivalent and preserves the force of the prayer for retributive
    justice.
- source_word: כְּפָעֳלָם
  chosen: according to their work
  alternatives:
  - according to their deed
  - according to what they have done
  lexicon: HALOT
  rationale: פעל denotes work/deed/action. 'According to their work' keeps the singular
    collective sense and matches the repeated measure-for-measure structure of the
    verse.
- source_word: וּכְרֹעַ
  chosen: and according to the evil of
  alternatives:
  - and according to the badness of
  - and according to the wickedness of
  lexicon: HALOT
  rationale: רֹעַ denotes evil/badness. 'Evil' is the most natural and morally weighty
    rendering here, fitting the context of imprecation.
- source_word: מַעַלְלֵיהֶם
  chosen: their deeds
  alternatives:
  - their actions
  - their practices
  lexicon: HALOT
  rationale: מעללים refers to acts/deeds, often with moral coloring from context.
    'Deeds' is concise and idiomatic in English, especially with 'evil of their deeds.'
- source_word: כְּמַעֲשֵׂה יְדֵיהֶם
  chosen: according to the work of their hands
  alternatives:
  - according to the deeds of their hands
  - according to what their hands have done
  lexicon: HALOT
  rationale: The idiom emphasizes what they themselves have produced or done. 'Work
    of their hands' preserves the Hebrew imagery and parallelism.
- source_word: הָשֵׁב
  chosen: repay
  alternatives:
  - return
  - bring back upon
  lexicon: HALOT
  rationale: Hiphil of שוב here has the sense of causing something to return upon
    someone, i.e., requiting or repaying. 'Repay' communicates the judicial sense
    clearly in modern English.
- source_word: גְּמוּלָם
  chosen: what they deserve
  alternatives:
  - their recompense
  - their due reward
  - their repayment
  lexicon: HALOT
  rationale: גמול denotes recompense, repayment, or due. 'What they deserve' expresses
    the sense naturally in contemporary English while preserving the idea of just
    requital; the more formal alternative 'their recompense' is viable but less readable.
