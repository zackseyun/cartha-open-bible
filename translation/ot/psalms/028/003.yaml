id: PSA.28.3
reference: Psalms 28:3
source:
  edition: WLC
  text: אַל תִּמְשְׁכֵ֣/נִי עִם רְשָׁעִים֮ וְ/עִם פֹּ֪עֲלֵ֫י אָ֥וֶן דֹּבְרֵ֣י שָׁ֭לוֹם עִם רֵֽעֵי/הֶ֑ם וְ֝/רָעָ֗ה בִּ/לְבָבָֽ/ם־־־־׃
translation:
  text: Do not drag me away with the wicked[a], with those who work evil[b], who speak peace with their neighbors while evil is in their hearts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not draw me away with the wicked.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their friends' for 'their neighbors.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּמְשְׁכֵנִי
  chosen: drag me away
  alternatives:
  - draw me away
  - pull me away
  lexicon: HALOT
  rationale: The verb משׁך in this context conveys being pulled along into the fate or company of others. 'Drag me away' preserves the forceful negative plea and fits the parallel with being grouped with the wicked.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: A standard rendering for רשׁעים in Psalms, referring to morally evil persons rather than merely legally guilty ones.
- source_word: פֹּעֲלֵי אָוֶן
  chosen: those who work evil
  alternatives:
  - workers of iniquity
  - evildoers
  lexicon: HALOT
  rationale: This phrase is idiomatic for people who actively practice wrongdoing. 'Those who work evil' keeps the verbal force of פֹּעֲלֵי while using accessible modern English. 'Workers of iniquity' is more traditional but less natural.
- source_word: אָוֶן
  chosen: evil
  alternatives:
  - iniquity
  - trouble
  - wickedness
  lexicon: HALOT
  rationale: In this collocation the term denotes moral wrongdoing. 'Evil' is concise and clear in modern English.
- source_word: דֹּבְרֵי שָׁלוֹם
  chosen: who speak peace
  alternatives:
  - who speak peacefully
  - who speak words of peace
  lexicon: HALOT
  rationale: This preserves the Hebrew idiom and highlights the contrast between outward peaceful speech and inward malice.
- source_word: רֵעֵיהֶם
  chosen: their neighbors
  alternatives:
  - their companions
  - their friends
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, or neighbor. Here 'neighbors' best fits the ethical contrast of peaceful speech toward others in ordinary social relations, without implying genuine friendship.
- source_word: רָעָה
  chosen: evil
  alternatives:
  - harm
  - malice
  - wickedness
  lexicon: HALOT
  rationale: The noun here refers to inward evil intent. 'Evil' keeps the lexical link with אָוֶן while the phrase 'in their hearts' clarifies that this is internal disposition.
- source_word: בִּלְבָבָם
  chosen: in their hearts
  alternatives:
  - in their heart
  - within them
  lexicon: HALOT
  rationale: A natural rendering of the Hebrew plural with possessive suffix, preserving the biblical association of the heart with inner thought and intention.
