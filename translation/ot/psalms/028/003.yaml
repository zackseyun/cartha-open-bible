theological_decisions:
- issue: Nature of the psalmist's plea regarding judgment on the wicked
  chosen_reading: A request not to be swept away together with evildoers in their company or fate
  alternative_readings:
  - A request merely not to imitate the wicked
  rationale: The combination of 'do not drag me away' with 'with the wicked' most naturally refers to not being taken along with them, likely in judgment, rather than only avoiding moral imitation. The translation leaves the precise mechanism implicit, as in the Hebrew, and does not over-specify divine judgment in the main text.
