id: PSA.28.8
reference: Psalms 28:8
source:
  edition: WLC
  text: יְהוָ֥ה עֹֽז לָ֑/מוֹ וּ/מָ֘ע֤וֹז יְשׁוּע֖וֹת מְשִׁיח֣/וֹ הֽוּא־׃
translation:
  text: The LORD is strength for them, and he is a stronghold of salvations for his
    anointed one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a stronghold of deliverance' or 'a fortress of saving acts'; the Hebrew
      uses a plural noun, literally 'salvations.'
    reason: lexical_alternative
  - marker: b
    text: '''His anointed one'' can also be rendered ''his Messiah.'' In context it
      likely refers first to the LORD''s anointed king, while also allowing broader
      messianic resonance.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: עֹז
  chosen: strength
  alternatives:
  - might
  - stronghold
  lexicon: HALOT
  rationale: 'The noun denotes strength or might. Here it stands predicatively with
    YHWH: ''The LORD is strength for them.'' ''Strength'' best matches the plain sense
    and avoids conflating it with the following distinct noun מָעוֹז (''stronghold/refuge'').'
- source_word: לָמוֹ
  chosen: for them
  alternatives:
  - for him
  - for his people
  lexicon: HALOT
  rationale: The pronominal form is 3rd person plural, naturally rendered 'for them.'
    Some translations smooth to singular or specify 'his people' from context, but
    the Hebrew form itself is plural and should be preserved.
- source_word: מָעוֹז
  chosen: stronghold
  alternatives:
  - refuge
  - fortress
  lexicon: HALOT
  rationale: The noun refers to a place or source of protection. 'Stronghold' preserves
    the protective, fortress-like imagery while remaining readable modern English.
- source_word: יְשׁוּעוֹת
  chosen: salvations
  alternatives:
  - deliverance
  - victory
  - saving acts
  lexicon: HALOT
  rationale: The plural is explicit in Hebrew. Rendering it as 'salvations' preserves
    the plural form and the sense of repeated or manifold acts of deliverance, rather
    than flattening it to a singular abstraction.
- source_word: מְשִׁיחוֹ
  chosen: his anointed one
  alternatives:
  - his anointed
  - his Messiah
  lexicon: HALOT
  rationale: In this Psalm the term most naturally refers to the LORD's anointed king
    rather than functioning as a fixed messianic title. 'His anointed one' translates
    the Hebrew directly and preserves possible typological resonance without importing
    a more explicit christological claim into the main text.
- source_word: הוּא
  chosen: he is
  alternatives:
  - he
  lexicon: HALOT
  rationale: 'The independent pronoun adds emphasis and supports the explicit English
    copula: ''and he is a stronghold...'' This yields natural English while reflecting
    the Hebrew emphasis.'
