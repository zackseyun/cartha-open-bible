id: PSA.37.15
reference: Psalms 37:15
source:
  edition: WLC
  text: חַ֭רְבָּ/ם תָּב֣וֹא בְ/לִבָּ֑/ם וְ֝/קַשְּׁתוֹתָ֗/ם תִּשָּׁבַֽרְנָה׃
translation:
  text: Their sword will enter their own heart[a], and their bows will be broken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their sword will enter their own hearts'; Hebrew uses a singular 'heart' with a plural possessive, a common collective expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַרְבָּם
  chosen: their sword
  alternatives:
  - their swords
  lexicon: HALOT
  rationale: The noun חֶרֶב is singular with 3mp suffix. English can keep the collective-singular sense naturally as 'their sword,' referring to the weaponry of the wicked as a class or each one distributively.
- source_word: תָּבֹוא
  chosen: will enter
  alternatives:
  - shall come
  - will go
  lexicon: HALOT
  rationale: Qal imperfect 3fs of בוא agrees with the feminine singular subject 'sword.' In this context, with בְּ + 'heart,' the sense is penetration/entering rather than the more generic 'come.' Future-like English fits the poetic predictive force.
- source_word: בְלִבָּם
  chosen: their own heart
  alternatives:
  - their heart
  - into their heart
  lexicon: HALOT
  rationale: 'Literally ''in/into their heart.'' English idiom with verbs of penetration prefers ''enter their heart.'' ''Own'' is supplied to make explicit the reflexive sense already implied by the context: the weapon turns back on its possessors.'
- source_word: וְקַשְּׁתוֹתָם
  chosen: and their bows
  alternatives:
  - and their bow
  lexicon: HALOT
  rationale: Plural noun with 3mp suffix; straightforwardly rendered 'their bows.' The conjunction is retained.
- source_word: תִּשָּׁבַרְנָה
  chosen: will be broken
  alternatives:
  - shall be shattered
  - will be smashed
  lexicon: HALOT
  rationale: Niphal imperfect 3fp of שבר is passive/reflexive in sense. 'Will be broken' is the most direct and natural rendering; 'shattered' is possible but slightly more interpretive in intensity.
