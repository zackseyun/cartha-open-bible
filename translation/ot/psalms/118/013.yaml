id: PSA.118.13
reference: Psalms 118:13
source:
  edition: WLC
  text: דַּחֹ֣ה דְחִיתַ֣/נִי לִ/נְפֹּ֑ל וַ֖/יהוָ֣ה עֲזָרָֽ/נִי׃
translation:
  text: You pushed me hard so that I might fall[b][a], but Yahweh helped me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Pushing, you pushed me,'' an emphatic construction meaning ''you pushed me hard'' or ''you shoved me violently.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'and the LORD helped me.' The Hebrew conjunction can be read simply as 'and,' though the context supports the contrastive sense 'but.'
    reason: alternative_reading
lexical_decisions:
- source_word: דַּחֹה
  chosen: pushed ... hard
  alternatives:
  - surely pushing
  - violently pushing
  - you pushed
  lexicon: HALOT
  rationale: From דחה, an infinitive absolute intensifying the following finite verb. In English, the force is best conveyed adverbially rather than by a wooden repetition ('pushing you pushed'). 'Pushed ... hard' preserves the emphatic sense and the hostile action.
- source_word: דְחִיתַנִי
  chosen: you pushed me
  alternatives:
  - you thrust me
  - you drove me
  lexicon: HALOT
  rationale: Qal perfect 2ms + 1cs object suffix. The verb denotes forceful shoving/thrusting. 'You pushed me' is natural modern English; 'thrust' is possible but less idiomatic here.
- source_word: לִנְפֹּל
  chosen: to make me fall
  alternatives:
  - so that I might fall
  - to fall
  lexicon: HALOT
  rationale: Infinitive construct of נפל with prefixed ל expressing result/purpose. Because English normally requires the object to be restated for clarity after 'you pushed me,' 'to make me fall' communicates the intended result without obscuring the syntax.
- source_word: וַיהוָה
  chosen: but the LORD
  alternatives:
  - and the LORD
  lexicon: HALOT
  rationale: The conjunction waw can be rendered simply 'and,' but in context it marks a strong contrast between the enemy's attack and YHWH's intervention. Per doctrine, יהוה is rendered 'the LORD' rather than 'Yahweh' in the main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֲזָרָנִי
  chosen: helped me
  alternatives:
  - was my help
  - came to my help
  lexicon: HALOT
  rationale: Qal perfect 3ms + 1cs suffix from עזר. 'Helped me' is the most direct and natural rendering. 'Was my help' would import a nominal nuance not present in the verb form.
