id: PSA.102.21
reference: Psalms 102:21
source:
  edition: WLC
  text: לִ֭/שְׁמֹעַ אֶנְקַ֣ת אָסִ֑יר לְ֝/פַתֵּ֗חַ בְּנֵ֣י תְמוּתָֽה׃
translation:
  text: to hear the groaning of the prisoner[a], to release the sons of death,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those doomed to die' or 'those under sentence of death.' The Hebrew reads literally 'sons of death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁמֹעַ
  chosen: to hear
  alternatives:
  - to listen to
  lexicon: HALOT
  rationale: Infinitive construct of שׁמע with prefixed ל expresses purpose/result in the larger sentence. 'To hear' is the most direct rendering and fits the parallel infinitive structure.
- source_word: אֶנְקַת
  chosen: the groaning of
  alternatives:
  - the sighing of
  - the lament of
  lexicon: HALOT
  rationale: From אנקה, denoting groaning or sighing under distress. 'Groaning' preserves the weight of suffering better than the lighter 'sighing'.
- source_word: אָסִיר
  chosen: the prisoner
  alternatives:
  - the captive
  lexicon: HALOT
  rationale: אָסִיר commonly denotes one bound or imprisoned. 'Prisoner' is the clearest modern English equivalent.
- source_word: לְפַתֵּחַ
  chosen: to release
  alternatives:
  - to open
  - to set free
  lexicon: HALOT
  rationale: From פתח, literally 'to open.' In this context with persons under sentence or confinement, the idiomatic sense is opening the way out, hence 'to release.' The more literal 'to open' is possible but less natural in English without supplying an object.
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - children of
  - those destined for
  lexicon: HALOT
  rationale: The Hebrew construct literally reads 'sons of.' Per gender-accurate policy, the masculine form is retained where it reflects the source idiom. Because this is an idiomatic expression, an explanatory alternative is preserved in a footnote.
- source_word: תְמוּתָה
  chosen: death
  alternatives:
  - dying
  - the death sentence
  lexicon: HALOT
  rationale: The noun denotes death. In the phrase 'sons of death' it likely refers to those doomed to die or under sentence of death. 'Death' is kept in the main text to preserve the Hebrew imagery, with the idiomatic sense noted in a footnote.
