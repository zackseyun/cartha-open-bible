id: PSA.102.10
reference: Psalms 102:10
source:
  edition: WLC
  text: כִּי אֵ֭פֶר כַּ/לֶּ֣חֶם אָכָ֑לְתִּי וְ֝/שִׁקֻּוַ֗/י בִּ/בְכִ֥י מָסָֽכְתִּי־׃
translation:
  text: For I have eaten ashes like bread[a], and mixed my drink with weeping.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and mingled my drink with tears.' The Hebrew says 'with weeping,' which may be rendered more concretely as 'with tears.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or ground for the surrounding lament. 'For' fits the poetic flow in English while preserving the causal sense.
- source_word: אֵפֶר
  chosen: ashes
  alternatives:
  - dust
  - ash
  lexicon: HALOT
  rationale: The plural 'ashes' is the natural English idiom in a mourning context and matches the image of humiliation and grief better than singular 'ash' or broader 'dust'.
- source_word: כַּלֶּחֶם
  chosen: like bread
  alternatives:
  - as bread
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like bread' is clear modern English and preserves the simile without over-interpreting it.
- source_word: אָכָלְתִּי
  chosen: I have eaten
  alternatives:
  - I ate
  lexicon: HALOT
  rationale: The qatal first-person singular reports the psalmist's condition. English present perfect works well in lament context to express a state extending into the present, though simple past is also possible.
- source_word: שִׁקֻּוַי
  chosen: my drink
  alternatives:
  - my drink offering
  - my beverage
  - what I drink
  lexicon: HALOT
  rationale: The noun refers to drink or beverage in ordinary sense here. 'My drink' is concise and idiomatic. 'Drink offering' would wrongly import cultic meaning not signaled by the context.
- source_word: בִּבְכִי
  chosen: with weeping
  alternatives:
  - with tears
  - in weeping
  lexicon: HALOT
  rationale: The noun means 'weeping.' The preposition can indicate accompaniment or manner. 'With weeping' preserves the verbal, experiential force better than reducing it to the concrete 'tears,' though that is a plausible interpretive rendering.
- source_word: מָסָכְתִּי
  chosen: mixed
  alternatives:
  - mingled
  - poured
  - diluted
  lexicon: HALOT
  rationale: The verb commonly means to mix or mingle liquids. In context the image is that the psalmist's drink is mingled with weeping. 'Mixed' is natural modern English; 'mingled' is slightly more traditional but less current.
