id: PSA.102.15
reference: Psalms 102:15
source:
  edition: WLC
  text: כִּֽי רָצ֣וּ עֲ֭בָדֶי/ךָ אֶת אֲבָנֶ֑י/הָ וְֽ/אֶת עֲפָרָ֥/הּ יְחֹנֵֽנוּ־־־׃
translation:
  text: For your servants delight in her stones and show favor to her dust[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'take pleasure in her stones and have compassion on her dust.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Surely
  lexicon: HALOT
  rationale: Introduces the reason for the preceding plea/hope in the psalm. 'For' fits the causal connection naturally in English poetry.
- source_word: רָצוּ
  chosen: delight in
  alternatives:
  - take pleasure in
  - favor
  lexicon: HALOT
  rationale: Qal perfect plural of רצה here expresses favorable regard or pleasure. 'Delight in' captures affectionate attachment to Zion's stones better than the flatter 'favor' in this clause.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in address to God within the Psalms 'servants' is the most natural English rendering and does not foreground bonded status as theologically salient here.
- source_word: אֶת אֲבָנֶיהָ
  chosen: her stones
  alternatives:
  - its stones
  lexicon: HALOT
  rationale: The 3fs suffix refers to Zion/Jerusalem personified as feminine. 'Her stones' preserves the personification better than the impersonal 'its stones'.
- source_word: וְאֶת עֲפָרָהּ
  chosen: and ... her dust
  alternatives:
  - and ... its dust
  - and ... her rubble
  lexicon: HALOT
  rationale: עפר is literally 'dust.' In context it refers to the ruined city's dust/debris, but the literal image is important and should be retained.
- source_word: יְחֹנֵנוּ
  chosen: show favor to
  alternatives:
  - have compassion on
  - pity
  - are gracious toward
  lexicon: HALOT
  rationale: From חנן, expressing gracious favor or compassion. With 'dust' as object, the sense is that the servants cherish even Zion's dust. 'Show favor to' preserves the lexical link to grace/favor without becoming awkwardly literal.
