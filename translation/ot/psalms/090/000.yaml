id: PSA.90.0
reference: Psalms 90:0
source:
  edition: WLC
  text: תְּפִלָּה֮ לְ/מֹשֶׁ֪ה אִֽישׁ הָ/אֱלֹ֫הִ֥ים אֲֽדֹנָ֗/י מָע֣וֹן אַ֭תָּה הָיִ֥יתָ לָּ֗/נוּ בְּ/דֹ֣ר וָ/דֹֽר־׃
translation:
  text: A prayer of Moses, the man of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by Moses' or 'for Moses' in the superscription; the Hebrew preposition can indicate authorship, association, or dedication.
    reason: alternative_reading
  - marker: b
    text: Or 'refuge' or 'habitation' for 'dwelling place.'
    reason: lexical_alternative
status: revised
is_superscription: true
