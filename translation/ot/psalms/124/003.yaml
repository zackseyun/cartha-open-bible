id: PSA.124.3
reference: Psalms 124:3
source:
  edition: WLC
  text: אֲ֭זַי חַיִּ֣ים בְּלָע֑וּ/נוּ בַּ/חֲר֖וֹת אַפָּ֣/ם בָּֽ/נוּ׃
translation:
  text: then they would have swallowed us alive when their anger burned against us[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they swallowed us' if taken as a simple past; the broader context (vv. 2–5) supports the counterfactual sense 'they would have swallowed us.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'when their nose burned against us,' a Hebrew idiom for anger.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲזַי
  chosen: then
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: Temporal adverb marking the consequence in the psalm's counterfactual sequence; 'then' is natural and concise in English.
- source_word: חַיִּים
  chosen: alive
  alternatives:
  - living
  - while alive
  lexicon: HALOT
  rationale: Adverbial accusative meaning 'alive' or 'living'; 'swallowed us alive' is the idiomatic English equivalent and preserves the vivid imagery.
- source_word: בְּלָעוּנוּ
  chosen: they would have swallowed us
  alternatives:
  - they swallowed us
  - they would have engulfed us
  lexicon: HALOT
  rationale: Qal perfect in this conditional/counterfactual context is best rendered with English conditional perfect, continuing the implied apodosis from the previous verse. 'Swallowed' preserves the concrete metaphor of being consumed.
- source_word: בַּחֲרוֹת
  chosen: when ... burned
  alternatives:
  - in the burning of
  - when ... was kindled
  lexicon: HALOT
  rationale: Infinitive construct of חרה with prefixed ב conveys temporal circumstance, literally 'in the burning.' English 'when ... burned' communicates the sense smoothly while retaining the fire metaphor.
- source_word: אַפָּם
  chosen: their anger
  alternatives:
  - their nose
  - their wrath
  lexicon: HALOT
  rationale: Though literally 'their nose,' אַף idiomatically denotes anger/wrath in Hebrew. 'Anger' is the clearest modern English rendering; the burning imagery already carries the intensity.
- source_word: בָּנוּ
  chosen: against us
  alternatives:
  - at us
  - toward us
  lexicon: HALOT
  rationale: With verbs of anger, the preposition ב commonly indicates hostility directed against someone. 'Against us' best reflects that adversarial force in idiomatic English.
