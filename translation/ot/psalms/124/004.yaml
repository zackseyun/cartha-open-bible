id: PSA.124.4
reference: Psalms 124:4
source:
  edition: WLC
  text: אֲ֭זַי הַ/מַּ֣יִם שְׁטָפ֑וּ/נוּ נַ֗֜חְלָ/ה עָבַ֥ר עַל נַפְשֵֽׁ/נוּ־׃
translation:
  text: then the waters would have swept us away; the torrent would have passed over
    our soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our life' or simply 'us.' The Hebrew 'soul' here can refer to the whole
      person or life.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲזַי
  chosen: then
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: Temporal adverb continuing the counterfactual sequence from the preceding
    verse; 'then' is natural and concise in English.
- source_word: הַמַּיִם
  chosen: the waters
  alternatives:
  - the water
  lexicon: HALOT
  rationale: Plural form with the article; 'the waters' preserves the vivid, concrete
    imagery of overwhelming danger.
- source_word: שְׁטָפוּנוּ
  chosen: would have swept us away
  alternatives:
  - would have overwhelmed us
  - would have flooded over us
  lexicon: HALOT
  rationale: The verb denotes inundating or washing away. 'Swept us away' captures
    both the flood imagery and the destructive force, while the English modal reflects
    the implied counterfactual sense in context.
- source_word: נַחְלָה
  chosen: the torrent
  alternatives:
  - the stream
  - the flood
  lexicon: HALOT
  rationale: Though often 'wadi/stream,' in poetic context of destructive waters it
    refers to a rushing torrent. 'Torrent' best conveys force and danger.
- source_word: עָבַר
  chosen: would have passed over
  alternatives:
  - would have gone over
  - would have swept over
  lexicon: HALOT
  rationale: Basic sense is 'pass over/across.' 'Passed over' preserves the verbal
    image without overinterpreting, and the modal again reflects the counterfactual
    sequence.
- source_word: עַל
  chosen: over
  alternatives:
  - upon
  - across
  lexicon: HALOT
  rationale: Standard preposition here indicating movement over the psalmist and community.
- source_word: נַפְשֵׁנוּ
  chosen: our soul
  alternatives:
  - our life
  - us
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean 'soul,' 'life,' or 'self.' Here 'our soul' preserves
    the Hebrew idiom and poetic intensity. A footnote preserves the more idiomatic
    alternative 'our life'/'us' for readers.
