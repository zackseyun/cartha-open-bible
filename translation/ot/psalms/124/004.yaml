theological_decisions:
- issue: Rendering of נֶפֶשׁ in a poetic danger context
  chosen_reading: our soul
  alternative_readings:
  - our life
  - us
  rationale: The term does not require a technical anthropological claim here, but
    retaining 'soul' preserves the Hebrew poetic diction and avoids flattening the
    text into mere paraphrase. The broader sense is preserved in a footnote.
  doctrine_reference: Translation philosophy §3, §6
