id: PSA.124.5
reference: Psalms 124:5
source:
  edition: WLC
  text: אֲ֭זַי עָבַ֣ר עַל נַפְשֵׁ֑/נוּ הַ֝/מַּ֗יִם הַ/זֵּֽידוֹנִֽים־׃
translation:
  text: then the raging waters would have passed over our soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the proud waters would have passed over us.' The Hebrew adjective can
      mean 'proud,' 'insolent,' or 'presumptuous'; here it describes the waters metaphorically
      as violently overbearing.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲזַי
  chosen: then
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: Temporal adverb continuing the counterfactual sequence from the preceding
    verses; 'then' is the most natural English connector.
- source_word: עָבַר
  chosen: would have swept over
  alternatives:
  - passed over
  - gone over
  lexicon: HALOT
  rationale: The verb literally means 'passed over,' but with מים as subject and על
    נפשנו as complement, idiomatic English prefers a more vivid expression for floodwaters.
    'Would have swept over' preserves the image and fits the implied unreal condition
    from context.
- source_word: עַל
  chosen: over
  alternatives:
  - upon
  - against
  lexicon: HALOT
  rationale: Standard spatial sense here with the verb עבר and the waters as subject.
- source_word: נַפְשֵׁנוּ
  chosen: us
  alternatives:
  - our soul
  - our lives
  lexicon: HALOT
  rationale: נפש can denote the self or life. In English, 'over us' communicates the
    collective personal object naturally, while preserving the psalm's corporate first-person
    sense. 'Our soul' would sound unnatural in modern English and overly singular.
- source_word: הַמַּיִם
  chosen: the waters
  alternatives:
  - the water
  lexicon: HALOT
  rationale: Hebrew plural is best represented by English plural in this poetic context.
- source_word: הַזֵּידוֹנִים
  chosen: raging
  alternatives:
  - proud
  - insolent
  - arrogant
  lexicon: HALOT
  rationale: From a root associated with presumptuous pride or insolence. Applied
    to waters metaphorically, 'raging' communicates the violent, overbearing force
    in idiomatic English. Because 'proud waters' is a viable more formal alternative
    and preserves the metaphor more literally, it is noted in a footnote.
