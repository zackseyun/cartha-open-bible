id: PSA.124.7
reference: Psalms 124:7
source:
  edition: WLC
  text: נַפְשֵׁ֗/נוּ כְּ/צִפּ֥וֹר נִמְלְטָה֮ מִ/פַּ֪ח י֫וֹקְשִׁ֥ים הַ/פַּ֥ח נִשְׁבָּ֗ר וַ/אֲנַ֥חְנוּ נִמְלָֽטְנוּ׃
translation:
  text: Our soul has escaped like a bird from the snare of the fowlers[a]; the snare is broken[b], and we have escaped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Our soul has escaped like a bird.' Hebrew נֶפֶשׁ often means 'soul,' but here likely refers to life or the whole person.
    reason: lexical_alternative
  - marker: b
    text: Or 'the snare of those who set traps.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַפְשֵׁנוּ
  chosen: our life
  alternatives:
  - our soul
  - we ourselves
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, life, self, or person. In this poetic deliverance context, 'our life' best conveys the concrete sense of preserved life without importing a more dualistic sense that 'soul' may suggest in modern English. The singular with 1cp suffix is naturally rendered collectively.
- source_word: כְּצִפּוֹר
  chosen: like a bird
  alternatives:
  - like a sparrow
  lexicon: HALOT
  rationale: צִפּוֹר is a general term for a small bird, not specifically a sparrow here. 'Like a bird' preserves the simile plainly and naturally.
- source_word: נִמְלְטָה
  chosen: has escaped
  alternatives:
  - was delivered
  - fled away
  lexicon: HALOT
  rationale: The Niphal of מלט carries the sense of escaping or being delivered. 'Has escaped' fits the perfect aspect in English and matches the imagery of evading a trap.
- source_word: מִפַּח
  chosen: from the snare
  alternatives:
  - from the trap
  - from the net
  lexicon: HALOT
  rationale: פַּח refers to a snare or trap, especially for birds. 'Snare' best matches the avian imagery and traditional semantic range.
- source_word: יוֹקְשִׁים
  chosen: of the fowlers
  alternatives:
  - of trappers
  - of those who set snares
  lexicon: HALOT
  rationale: As a participial form from יקשׁ, the word denotes those who lay snares. Because the immediate image is of a bird escaping a snare, 'fowlers' is precise and idiomatic, though somewhat literary.
- source_word: הַפַּח
  chosen: the snare
  alternatives:
  - the trap
  lexicon: HALOT
  rationale: Repeating 'the snare' preserves the Hebrew repetition and the poetic emphasis on the instrument of danger now rendered powerless.
- source_word: נִשְׁבָּר
  chosen: is broken
  alternatives:
  - was broken
  - has been broken
  lexicon: HALOT
  rationale: The passive sense is straightforward. Present perfective force in English can be represented idiomatically by 'is broken' in poetic style, emphasizing the current state resulting from the action.
- source_word: וַאֲנַחְנוּ
  chosen: and we
  alternatives:
  - and we ourselves
  lexicon: HALOT
  rationale: The explicit pronoun adds emphasis after the broken snare. English can preserve this simply with 'and we' without overloading the line.
- source_word: נִמְלָטְנוּ
  chosen: have escaped
  alternatives:
  - have been delivered
  - escaped
  lexicon: HALOT
  rationale: 'Repeating ''have escaped'' mirrors the Hebrew repetition of מלט and preserves the poetic closure: the danger is broken and the people are free.'
