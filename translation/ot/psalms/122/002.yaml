id: PSA.122.2
reference: Psalms 122:2
source:
  edition: WLC
  text: עֹ֭מְדוֹת הָי֣וּ רַגְלֵ֑י/נוּ בִּ֝/שְׁעָרַ֗יִ/ךְ יְרוּשָׁלִָֽם׃
translation:
  text: Our feet are standing within your gates[a], O Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Our feet were standing in your gates, Jerusalem.' The Hebrew uses a participle with 'were,' which can be rendered more formally this way.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹמְדוֹת
  chosen: standing
  alternatives:
  - set
  - stationed
  lexicon: HALOT
  rationale: Qal feminine plural participle from עמד, agreeing with the feminine plural subject 'our feet.' Rendered 'standing' to preserve the durative/stative sense of the participle rather than a simple punctual 'stood.'
- source_word: הָיוּ
  chosen: have been
  alternatives:
  - were
  lexicon: HALOT
  rationale: Perfect of היה used with the participle forms a periphrastic verbal expression. 'Have been standing' captures the resultant present state in natural English better than the more wooden 'were standing,' while still reflecting the Hebrew aspect.
- source_word: רַגְלֵינוּ
  chosen: our feet
  lexicon: HALOT
  rationale: Literal rendering of the construct plural with 1cp suffix. The plural 'feet' is idiomatic in English and preserves the embodied, pilgrim-arrival imagery.
- source_word: בִּשְׁעָרַיִךְ
  chosen: within your gates
  alternatives:
  - in your gates
  - at your gates
  lexicon: HALOT
  rationale: The preposition ב plus 'your gates' is rendered 'within your gates' to convey arrival inside the city entrance area, fitting the pilgrimage context. 'In your gates' is possible but less idiomatic in contemporary English.
- source_word: יְרוּשָׁלִָם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Standard English transliteration of the place name, following the principle to transliterate names rather than translate them.
