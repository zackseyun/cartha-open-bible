id: PSA.83.1
reference: Psalms 83:1
source:
  edition: WLC
  text: שִׁ֖יר מִזְמ֣וֹר לְ/אָסָֽף׃
translation:
  text: A song[a]. A psalm of Asaph.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for Asaph.' The Hebrew preposition can indicate authorship, association, or dedication in psalm headings.
    reason: alternative_reading
lexical_decisions:
- source_word: שִׁיר
  chosen: song
  alternatives:
  - lyric
  - poem
  lexicon: HALOT
  rationale: The noun denotes a song or sung composition. 'Song' is the standard, natural English equivalent and fits a superscription genre label.
- source_word: מִזְמוֹר
  chosen: psalm
  alternatives:
  - melody
  - musical psalm
  lexicon: HALOT
  rationale: This technical term in Psalm superscriptions is best rendered 'psalm' in English, preserving its established genre sense rather than flattening it to a generic musical term.
- source_word: לְ/אָסָף
  chosen: of Asaph
  alternatives:
  - for Asaph
  - belonging to Asaph
  lexicon: HALOT
  rationale: The prefixed ל can mark authorship, association, or dedication in superscriptions. In English Psalm headings, 'of Asaph' is the most idiomatic and least interpretively intrusive rendering, preserving the association without overdefining whether Asaph authored or received it.
