id: PSA.60.11
reference: Psalms 60:11
source:
  edition: WLC
  text: מִ֣י יֹ֭בִלֵ/נִי עִ֣יר מָצ֑וֹר מִ֖י נָחַ֣/נִי עַד אֱדֽוֹם־׃
translation:
  text: Who will bring me to the fortified city? Who will lead me as far as Edom?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Who will lead me to the fortified city? Who has led me to Edom?' The Hebrew verbs allow slightly different aspectual nuances, but the main text preserves the poetic parallelism as two forward-looking questions.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question; straightforwardly rendered as 'Who.'
- source_word: יֹבִלֵנִי
  chosen: will bring me
  alternatives:
  - will lead me
  - will conduct me
  lexicon: HALOT
  rationale: Hiphil of יבל conveys causing someone to go/bringing or leading. 'Bring me' fits the destination-oriented sense with the following place phrase, while preserving the rhetorical force.
- source_word: עִיר מָצוֹר
  chosen: the fortified city
  alternatives:
  - the city of fortification
  - the strong city
  - the besieged city
  lexicon: HALOT
  rationale: Construct phrase meaning a city characterized by fortification/stronghold. 'The fortified city' is idiomatic modern English and best reflects the likely sense of a strong defensive city rather than a city under siege.
- source_word: נָחַנִי
  chosen: will lead me
  alternatives:
  - has led me
  - will guide me
  lexicon: HALOT
  rationale: 'From נחה, ''to lead/guide.'' Although the form can be parsed as perfect, in poetic parallelism after the initial interrogative it functions naturally as a future-like rhetorical question in English: ''Who will lead me...?'' This preserves the parallel with ''Who will bring me...?''.'
- source_word: עַד אֱדוֹם
  chosen: as far as Edom
  alternatives:
  - to Edom
  - up to Edom
  lexicon: HALOT
  rationale: עַד marks extent or endpoint, so 'as far as Edom' most directly reflects the preposition while remaining natural English. 'To Edom' is possible but slightly less precise.
- source_word: אֱדוֹם
  chosen: Edom
  lexicon: HALOT
  rationale: Proper name transliterated according to the translation philosophy.
