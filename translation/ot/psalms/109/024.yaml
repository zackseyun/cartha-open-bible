id: PSA.109.24
reference: Psalms 109:24
source:
  edition: WLC
  text: בִּ֭רְכַּ/י כָּשְׁל֣וּ מִ/צּ֑וֹם וּ֝/בְשָׂרִ֗/י כָּחַ֥שׁ מִ/שָּֽׁמֶן׃
translation:
  text: My knees give way from fasting[a], and my flesh grows lean from lack of fat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my flesh has grown gaunt without fat.' The Hebrew expression refers to the loss of bodily fat, that is, emaciation.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּרְכַּי
  chosen: my knees
  alternatives:
  - my knee joints
  lexicon: HALOT
  rationale: Plural construct with 1cs suffix; the ordinary anatomical sense 'my knees' fits the poetic image of physical weakness.
- source_word: כָּשְׁלוּ
  chosen: give way
  alternatives:
  - stumble
  - grow weak
  - totter
  lexicon: HALOT
  rationale: The verb commonly denotes stumbling or faltering. In this bodily-lament context, 'give way' idiomatically conveys knees failing from weakness without over-paraphrasing.
- source_word: מִצּוֹם
  chosen: from fasting
  alternatives:
  - because of fasting
  - from lack of food
  lexicon: HALOT
  rationale: 'The preposition מִן marks cause/source here: the knees fail as a result of fasting. ''From fasting'' is concise and natural.'
- source_word: וּבְשָׂרִי
  chosen: and my flesh
  alternatives:
  - and my body
  lexicon: HALOT
  rationale: בשר literally means 'flesh.' Since this is a physical description rather than a metaphorical anthropological contrast, the literal rendering should be preserved.
- source_word: כָּחַשׁ
  chosen: grows lean
  alternatives:
  - has grown gaunt
  - wastes away
  - becomes thin
  lexicon: HALOT
  rationale: The verb can mean become lean, emaciated, or diminish. 'Grows lean' preserves the concrete bodily sense and matches the present vividness of the lament in English.
- source_word: מִשָּׁמֶן
  chosen: for lack of fat
  alternatives:
  - from fatness
  - without fat
  - because there is no fat
  lexicon: HALOT
  rationale: The phrase indicates loss or absence of bodily fat, i.e., emaciation. 'For lack of fat' makes the Hebrew idiom intelligible in modern English while staying close to the source.
