id: PSA.109.29
reference: Psalms 109:29
source:
  edition: WLC
  text: יִלְבְּשׁ֣וּ שׂוֹטְנַ֣/י כְּלִמָּ֑ה וְ/יַעֲט֖וּ כַ/מְעִ֣יל בָּשְׁתָּֽ/ם׃
translation:
  text: May my accusers be clothed with disgrace, and wrap themselves in their shame
    like a robe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my adversaries.' The Hebrew term can denote opponents generally or accusers
      in a more legal sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִלְבְּשׁוּ
  chosen: May ... be clothed
  alternatives:
  - will wear
  - let them put on
  lexicon: HALOT
  rationale: Qal imperfect 3mp of לבשׁ. In this imprecatory prayer context, the imperfect
    is best rendered jussively in English ('May ... be clothed') rather than as a
    simple future. 'Be clothed' preserves the passive/resultative sense idiomatically
    with the following noun of shame.
- source_word: שׂוֹטְנַי
  chosen: my accusers
  alternatives:
  - my adversaries
  - my opponents
  - those who accuse me
  lexicon: HALOT
  rationale: From שׂטן in the participial/plural form with 1cs suffix, denoting those
    acting as adversaries or accusers. 'My accusers' fits the legal/hostile context
    of Psalm 109 and preserves the personal suffix.
- source_word: כְּלִמָּה
  chosen: disgrace
  alternatives:
  - shame
  - humiliation
  - dishonor
  lexicon: HALOT
  rationale: The noun denotes public shame/disgrace. 'Disgrace' works well here alongside
    בָּשְׁתָּם rendered 'their shame,' avoiding awkward repetition while preserving
    the semantic field.
- source_word: וְיַעֲטוּ
  chosen: and wrap themselves
  alternatives:
  - and cover themselves
  - and be wrapped
  lexicon: HALOT
  rationale: Qal imperfect 3mp of עטה, 'to wrap/envelop oneself.' The reflexive nuance
    is natural in context with clothing imagery, so 'wrap themselves' is idiomatic
    and faithful.
- source_word: כַמְעִיל
  chosen: like a robe
  alternatives:
  - as with a mantle
  - like a cloak
  lexicon: HALOT
  rationale: מְעִיל refers to an outer garment/robe. 'Robe' is clear modern English
    and suits the metaphor of being enveloped in shame.
- source_word: בָּשְׁתָּם
  chosen: their shame
  alternatives:
  - their humiliation
  - their disgrace
  lexicon: HALOT
  rationale: The noun בֹּשֶׁת/בָּשְׁתּ carries the sense of shame or humiliation,
    here with 3mp suffix. 'Their shame' is the most direct rendering and pairs naturally
    with the clothing metaphor.
