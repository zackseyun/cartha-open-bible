theological_decisions:
- issue: Verbal mood in an imprecatory psalm
  chosen_reading: 'Render the imperfects as a wish/prayer: ''May my accusers be clothed
    ... and wrap themselves ...'''
  alternative_readings:
  - 'Future prediction: ''My accusers will be clothed ...'''
  rationale: In the context of Psalm 109's petitions against enemies, the imperfects
    function naturally as jussive/imprecatory wishes. Rendering them as 'may' preserves
    the psalmist's prayerful appeal without overstating this as a bare prediction.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    and theological tension without importing claims.'
