theological_decisions:
- issue: Force of the verbal forms in this imprecatory context
  chosen_reading: 'Render as jussive-like petition: ''let him come out... let his
    prayer become...'''
  alternative_readings:
  - 'Render as predictive future: ''he will come out... his prayer will become...'''
  rationale: Psalm 109 is an imprecatory prayer, and the sequence here is best understood
    as expressing the psalmist's petition/wish regarding the enemy's judgment. English
    'let him...' preserves that force without over-paraphrasing.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve
    it)
