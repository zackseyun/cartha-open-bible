id: PSA.109.7
reference: Psalms 109:7
source:
  edition: WLC
  text: בְּ֭/הִשָּׁ֣פְט/וֹ יֵצֵ֣א רָשָׁ֑ע וּ֝/תְפִלָּת֗/וֹ תִּהְיֶ֥ה לַֽ/חֲטָאָֽה׃
translation:
  text: When he is judged, let him come out guilty, and let his prayer become sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When he is tried, let him go out wicked.' The Hebrew רָשָׁע can mean
      'wicked,' but in this courtroom context it likely carries the sense 'guilty.'
    reason: lexical_alternative
  - marker: b
    text: Or 'let his prayer be counted as sin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּהִשָּׁפְטוֹ
  chosen: When he is judged
  alternatives:
  - In his being judged
  - When he comes to trial
  lexicon: HALOT
  rationale: The preposition ב plus Niphal infinitive construct of שׁפט with 3ms suffix
    gives a temporal sense, 'when he is judged' or 'when he comes under judgment.'
    'When he is judged' is clear modern English and preserves the passive/judicial
    force.
- source_word: יֵצֵא
  chosen: let him come out
  alternatives:
  - he will come out
  - let him go out
  lexicon: HALOT
  rationale: יצא literally means 'go/come out.' In a judicial context it idiomatically
    refers to the outcome of a case. Because the surrounding verses are imprecatory
    jussives, the English 'let him come out' best reflects the wish/prayer force rather
    than a simple future.
- source_word: רָשָׁע
  chosen: guilty
  alternatives:
  - wicked
  - in the wrong
  lexicon: HALOT
  rationale: Although רָשָׁע often means 'wicked,' in courtroom settings it can denote
    the adverse verdict, i.e., being found guilty. Here the legal context created
    by 'when he is judged' favors 'guilty' over the more character-based 'wicked'.
- source_word: וּתְפִלָּתוֹ
  chosen: and let his prayer
  alternatives:
  - and his prayer
  lexicon: HALOT
  rationale: תְּפִלָּה means 'prayer.' The conjunction links a second imprecation
    parallel to the first, so English supplies 'let' for natural coordination and
    to reflect the jussive force.
- source_word: תִּהְיֶה
  chosen: become
  alternatives:
  - be
  - turn into
  lexicon: HALOT
  rationale: היה with ל can express becoming or resulting in something. 'Become' communicates
    the resultant sense more naturally than a bare 'be' in English.
- source_word: לַחֲטָאָה
  chosen: sin
  alternatives:
  - as sin
  - for sin
  - guilt
  lexicon: HALOT
  rationale: חֲטָאָה commonly means 'sin' and here likely means that even his prayer
    is counted as sinful. 'Sin' is the most direct rendering. The prefixed ל is represented
    idiomatically through 'become.'
