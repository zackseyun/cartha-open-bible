id: PSA.109.16
reference: Psalms 109:16
source:
  edition: WLC
  text: יַ֗עַן אֲשֶׁ֤ר לֹ֥א זָכַר֮ עֲשׂ֪וֹת חָ֥סֶד וַ/יִּרְדֹּ֡ף אִישׁ עָנִ֣י וְ֭/אֶבְיוֹן
    וְ/נִכְאֵ֨ה לֵבָ֬ב לְ/מוֹתֵֽת׀־׃
translation:
  text: because he did not remember to show kindness, but pursued the poor and needy
    man, and the brokenhearted, to put them to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not remember to practice mercy.' The Hebrew חָסֶד can also carry
      the sense of loyal love or covenant faithfulness, but here it refers to concrete
      kindness shown to vulnerable people.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the poor and needy man, and the broken of heart.' The singular
      likely has a representative force, describing the kind of person he targeted.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן אֲשֶׁר
  chosen: because
  alternatives:
  - since
  - for that
  lexicon: HALOT
  rationale: The compound introduces the reason for the judgment in the surrounding
    context. 'Because' is natural modern English and preserves the causal force.
- source_word: לֹא זָכַר עֲשׂוֹת חָסֶד
  chosen: did not remember to show kindness
  alternatives:
  - did not remember to do covenant loyalty
  - did not remember to practice mercy
  lexicon: HALOT
  rationale: זָכַר + infinitive conveys failure to keep in mind so as to act. חָסֶד
    can carry covenantal loyalty/steadfast love, but here in interpersonal ethics
    'show kindness' best fits the object and remains readable without overstating
    covenantal nuance.
- source_word: וַיִּרְדֹּף
  chosen: but pursued
  alternatives:
  - and pursued
  - persecuted
  lexicon: HALOT
  rationale: The waw-consecutive continues the description. English 'but' brings out
    the adversative sense between failing to show kindness and actively hunting the
    vulnerable; 'pursued' is more literal than 'persecuted' and fits the verbal imagery.
- source_word: אִישׁ עָנִי וְאֶבְיוֹן
  chosen: the poor and needy man
  alternatives:
  - a poor and needy man
  - the afflicted and needy man
  lexicon: HALOT
  rationale: אִישׁ is singular and should be represented. 'Poor and needy man' preserves
    the masculine singular and the pairing of vulnerability terms. The article is
    not explicit, but English idiom here favors 'the' for a representative victim
    class embodied in the singular.
- source_word: וְנִכְאֵה לֵבָב
  chosen: and the brokenhearted
  alternatives:
  - and the crushed in heart
  - and the stricken of heart
  lexicon: HALOT
  rationale: נכאה denotes one who is crushed/smitten; with לֵבָב it describes inwardly
    devastated persons. 'Brokenhearted' is idiomatic, accurate, and preserves the
    emotional force.
- source_word: לְמוֹתֵת
  chosen: to put them to death
  alternatives:
  - to kill
  - to bring to death
  lexicon: HALOT
  rationale: The infinitive expresses purpose/result of the pursuit. Although the
    preceding nouns are singular/collective in form, English naturally uses 'them'
    to refer to the vulnerable persons just mentioned. 'Put them to death' preserves
    the lethal intent more clearly than the bare 'kill'.
