theological_decisions:
- issue: Idiomatic force of the verbless clause וַאֲנִי תְפִלָּה
  chosen_reading: Preserve the literal intensity as 'but I am prayer' rather than
    interpretively expanding it.
  alternative_readings:
  - but I pray
  - but I am a man of prayer
  rationale: This is not a doctrinally contested phrase, but it is interpretively
    compressed. Following optimal equivalence and the instruction not to paraphrase
    beyond the source, the main text keeps the metaphorical nominal expression. More
    explicit alternatives are preserved in a footnote.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
