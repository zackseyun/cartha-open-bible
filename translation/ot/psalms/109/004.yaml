id: PSA.109.4
reference: Psalms 109:4
source:
  edition: WLC
  text: תַּֽחַת אַהֲבָתִ֥/י יִשְׂטְנ֗וּ/נִי וַ/אֲנִ֥י תְפִלָּֽה־׃
translation:
  text: In return for my love, they accuse me, but I am prayer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'but I pray' or 'but I am a man of prayer.' The Hebrew
      is literally, 'but I am prayer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת
  chosen: In return for
  alternatives:
  - instead of
  - in exchange for
  - for
  lexicon: HALOT
  rationale: Here תַּחַת introduces recompense/exchange rather than simple spatial
    'under.' 'In return for' captures the adversative exchange sense in natural English.
- source_word: אַהֲבָתִי
  chosen: my love
  alternatives:
  - my affection
  lexicon: HALOT
  rationale: The noun from אהב denotes love/affection. 'My love' is the most direct
    and idiomatic rendering and preserves the lexical connection to the common biblical
    term for love.
- source_word: יִשְׂטְנוּנִי
  chosen: they accuse me
  alternatives:
  - they are my adversaries
  - they oppose me
  - they hate me
  lexicon: HALOT
  rationale: From שטן in the Qal, the sense is to act as an adversary or accuse. In
    this context of hostile response to love, 'they accuse me' best reflects the verbal
    force and common forensic/adversarial nuance, while avoiding the weaker and less
    specific 'oppose me.'
- source_word: וַאֲנִי
  chosen: but I
  alternatives:
  - and I
  lexicon: HALOT
  rationale: Though formally 'and I,' the conjunction here marks contrast with the
    enemies' action. 'But I' brings out the discourse contrast in idiomatic English.
- source_word: תְפִלָּה
  chosen: prayer
  alternatives:
  - a man of prayer
  - I pray
  lexicon: HALOT
  rationale: The Hebrew is verbless and literally 'I [am] prayer.' Retaining the noun
    'prayer' preserves the striking compression and intensity of the Hebrew better
    than smoothing it to a verbal clause. English can bear the idiom with minimal
    interpretation.
