theological_decisions:
- issue: Imprecatory jussive force
  chosen_reading: 'Render the verbs as wishes/prayers: ''May ... seize ... and may
    ... plunder ...'''
  alternative_readings:
  - 'Simple future: ''A creditor will seize ... and strangers will plunder ...'''
  rationale: In the context of Psalm 109's imprecations, the yiqtol forms are best
    understood as jussive/wish expressions rather than straightforward predictions.
    English 'may' preserves the prayer/curse force without overstating certainty as
    mere future narration.
  doctrine_reference: Translation philosophy §3 (preserve tension where present);
    optimal equivalence in context
