id: PSA.109.11
reference: Psalms 109:11
source:
  edition: WLC
  text: יְנַקֵּ֣שׁ נ֭וֹשֶׁה לְ/כָל אֲשֶׁר ל֑/וֹ וְ/יָבֹ֖זּוּ זָרִ֣ים יְגִיעֽ/וֹ־־׃
translation:
  text: May a creditor seize all that belongs to him, and may strangers plunder the
    fruit of his labor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ensnare'; the Hebrew verb can mean to set a snare or catch, here likely
      in the sense of a creditor laying claim to and seizing his assets.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְנַקֵּשׁ
  chosen: seize
  alternatives:
  - ensnare
  - trap
  - exact from
  lexicon: HALOT
  rationale: The Piel of נקש can carry the sense of laying a snare or catching; with
    נֹשֶׁה ('creditor') and the object 'all that belongs to him,' the contextual sense
    is that the creditor aggressively lays claim to or seizes his assets. 'Seize'
    communicates the economic predation clearly in modern English better than the
    more literal but potentially misleading 'ensnare.'
- source_word: נ֭וֹשֶׁה
  chosen: creditor
  alternatives:
  - moneylender
  - one who lends
  lexicon: HALOT
  rationale: The noun denotes one who lends and presses for repayment. 'Creditor'
    is the most natural and sufficiently broad English equivalent in this imprecatory
    context.
- source_word: לְכָל אֲשֶׁר לוֹ
  chosen: all that belongs to him
  alternatives:
  - all that he has
  - everything that is his
  lexicon: HALOT
  rationale: This phrase refers comprehensively to the psalmist's target's possessions.
    'All that belongs to him' is idiomatic and preserves the possessive force.
- source_word: וְיָבֹזּוּ
  chosen: plunder
  alternatives:
  - spoil
  - despoil
  - loot
  lexicon: HALOT
  rationale: בזז commonly denotes taking spoil by force. 'Plunder' preserves the violent,
    predatory nuance better than the more archaic 'spoil'.
- source_word: זָרִים
  chosen: strangers
  alternatives:
  - foreigners
  - outsiders
  lexicon: HALOT
  rationale: The term denotes those outside one's kin/community. 'Strangers' fits
    the poetic register and avoids over-specifying ethnicity or nationality, which
    'foreigners' might imply.
- source_word: יְגִיעוֹ
  chosen: the fruit of his labor
  alternatives:
  - his labor
  - his toil
  - what he has worked for
  lexicon: HALOT
  rationale: יְגִיעַ refers to the product or gain of toil, not merely the act of
    labor itself. 'The fruit of his labor' makes explicit that the object being plundered
    is the produce/proceeds of his work.
