id: PSA.109.17
reference: Psalms 109:17
source:
  edition: WLC
  text: וַ/יֶּאֱהַ֣ב קְ֭לָלָה וַ/תְּבוֹאֵ֑/הוּ וְֽ/לֹא חָפֵ֥ץ בִּ֝/בְרָכָ֗ה וַ/תִּרְחַ֥ק מִמֶּֽ/נּוּ־׃
translation:
  text: He loved cursing[a], and it came upon him; he did not delight in blessing[b], and it was far from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He loved a curse, and it came upon him.' The Hebrew noun can be read as either a category ('cursing') or a concrete instance ('a curse').
    reason: lexical_alternative
  - marker: b
    text: Or 'he took no pleasure in blessing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּאֱהַב
  chosen: he loved
  alternatives:
  - he came to love
  lexicon: HALOT
  rationale: Qal wayyiqtol of אהב straightforwardly denotes affection or desire. 'He loved' is the natural English equivalent and preserves the volitional force.
- source_word: קְלָלָה
  chosen: cursing
  alternatives:
  - a curse
  - curse
  lexicon: HALOT
  rationale: The noun can denote either the act/state of cursing or a curse pronounced. 'Cursing' fits the parallel with 'blessing' as a category he embraced, while still allowing the consequence that it returns upon him.
- source_word: וַתְּבוֹאֵהוּ
  chosen: it came upon him
  alternatives:
  - it came to him
  - it overtook him
  lexicon: HALOT
  rationale: From בוא with 3ms object suffix, feminine subject referring back to 'cursing.' 'Came upon him' idiomatically conveys hostile arrival or consequence in English better than the flatter 'came to him.'
- source_word: וְלֹא חָפֵץ
  chosen: he did not delight in
  alternatives:
  - he did not desire
  - he took no pleasure in
  lexicon: HALOT
  rationale: חפץ expresses pleasure, desire, or delight. 'Did not delight in' preserves the affective contrast with 'loved' and reads naturally in English poetry.
- source_word: בִּבְרָכָה
  chosen: blessing
  alternatives:
  - a blessing
  lexicon: HALOT
  rationale: The noun stands in antithetic parallel to קְלָלָה. The anarthrous singular is well represented by the mass/category sense 'blessing.'
- source_word: וַתִּרְחַק מִמֶּנּוּ
  chosen: it stayed far from him
  alternatives:
  - it was far from him
  - it kept far from him
  - it departed from him
  lexicon: HALOT
  rationale: 'רחק means to be/become far or distant. Because the verb is wayyiqtol with feminine subject referring to ''blessing,'' the sense is resultative: blessing remained distant from him. ''Stayed far from him'' captures the continuing separation more clearly than a simple stative in English.'
