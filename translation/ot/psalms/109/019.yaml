id: PSA.109.19
reference: Psalms 109:19
source:
  edition: WLC
  text: תְּהִי ל֭/וֹ כְּ/בֶ֣גֶד יַעְטֶ֑ה וּ֝/לְ/מֵ֗זַח תָּמִ֥יד יַחְגְּרֶֽ/הָ־׃
translation:
  text: May it be like a garment that he wraps around himself[a], and like a belt that he always girds on.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'May it be for him like clothing he puts on, and like a sash he continually girds around himself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּהִי
  chosen: May it be
  alternatives:
  - Let it be
  - It shall be
  lexicon: HALOT
  rationale: Qal jussive 3fs of היה expresses a wish/imprecation. 'May it be' captures the volitional force in natural English.
- source_word: ל֭וֹ
  chosen: for him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: The preposition with pronominal suffix marks relation toward the cursed person. In English the sense is carried idiomatically by the following clause rather than repeated explicitly.
- source_word: כְּבֶגֶד
  chosen: like a garment
  alternatives:
  - as clothing
  - like a robe
  lexicon: HALOT
  rationale: בגד is a general term for clothing/garment. 'Garment' preserves the metaphor without over-specifying the type of clothing.
- source_word: יַעְטֶה
  chosen: he wraps around himself
  alternatives:
  - he covers himself with
  - he puts on
  lexicon: HALOT
  rationale: עטה means to wrap, cover, or clothe oneself. 'Wraps around himself' preserves the imagery of something enveloping him, fitting the curse metaphor.
- source_word: וּלְמֵזַח
  chosen: and like a belt
  alternatives:
  - and for a girdle
  - and like a sash
  lexicon: HALOT
  rationale: מֵזַח denotes a belt/girding piece. 'Belt' is the clearest modern equivalent; 'girdle' is archaic in contemporary English.
- source_word: תָּמִיד
  chosen: always
  alternatives:
  - continually
  - constantly
  lexicon: HALOT
  rationale: The adverb indicates ongoing regularity. 'Always' is natural modern English and preserves the continual sense.
- source_word: יַחְגְּרֶהָ
  chosen: he always wears
  alternatives:
  - he girds it on
  - he binds it around himself
  lexicon: HALOT
  rationale: חגר with 3fs suffix refers to girding on the feminine antecedent, here the belt-like curse. 'Wears' is a readable rendering of the girding imagery in context, while the belt comparison preserves the original metaphor.
