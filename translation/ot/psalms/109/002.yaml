id: PSA.109.2
reference: Psalms 109:2
source:
  edition: WLC
  text: כִּ֤י פִ֪י רָשָׁ֡ע וּֽ/פִי מִ֭רְמָה עָלַ֣/י פָּתָ֑חוּ דִּבְּר֥וּ אִ֝תִּ֗/י לְשׁ֣וֹן שָֽׁקֶר־׃
translation:
  text: For the mouth of the wicked and the mouth of deceit have opened against me[b][a]; they have spoken to me with a lying tongue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and a deceitful mouth have opened against me.' The Hebrew literally repeats 'mouth,' yielding either 'the mouth of deceit' or the more idiomatic 'a deceitful mouth.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they have spoken with me with a tongue of falsehood.' The phrase likely means hostile speech addressed to the psalmist, hence 'to me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the psalmist's appeal in the surrounding context. 'For' fits natural English while preserving the causal force.
- source_word: פִי רָשָׁע
  chosen: the mouth of the wicked
  alternatives:
  - the mouth of a wicked man
  - the mouth of the wicked one
  lexicon: HALOT
  rationale: Construct phrase literally 'mouth of wicked[one].' The singular adjective functions substantivally. 'The wicked' is idiomatic and avoids over-specifying gender while preserving the singular collective/individual sense.
- source_word: וּפִי מִרְמָה
  chosen: and the mouth of deceit
  alternatives:
  - and a deceitful mouth
  - and the mouth of treachery
  lexicon: HALOT
  rationale: The Hebrew repeats 'mouth' for emphasis and parallelism; this repetition is preserved. מִרְמָה denotes deceit/treachery; 'deceit' is the most straightforward rendering here.
- source_word: עָלַי
  chosen: against me
  alternatives:
  - upon me
  - over me
  lexicon: HALOT
  rationale: 'With פתח (''open'') in hostile speech context, the idiomatic sense is adversative: they open their mouths against the psalmist.'
- source_word: פָּתָחוּ
  chosen: have opened
  alternatives:
  - opened
  lexicon: HALOT
  rationale: The perfect is rendered with English present perfect to convey a completed action with present relevance in the lament context.
- source_word: דִּבְּרוּ אִתִּי
  chosen: they have spoken to me
  alternatives:
  - they have spoken with me
  - they spoke against me
  lexicon: HALOT
  rationale: Although אֵת can sometimes suggest accompaniment ('with'), in this hostile context and with the following accusative-like specification, 'to me' best captures direct address. 'Against me' is already expressed by עָלַי in the previous clause and need not be duplicated.
- source_word: לְשׁוֹן שָׁקֶר
  chosen: with a lying tongue
  alternatives:
  - with a tongue of falsehood
  - falsely
  lexicon: HALOT
  rationale: Retains the concrete Hebrew idiom 'tongue' rather than flattening it to an adverb. 'Lying' is more natural modern English than 'falsehood' while preserving the sense of deceitful speech.
