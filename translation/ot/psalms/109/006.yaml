theological_decisions:
- issue: Whether שָׂטָן should be rendered as the proper name 'Satan' or as a common
    noun
  chosen_reading: 'common noun: ''an accuser'''
  alternative_readings:
  - Satan
  - an adversary
  rationale: 'The Hebrew lacks markers requiring a proper name, and the immediate
    context is judicial-imprecatory: a wicked person is appointed over him and another
    figure stands at his right hand to accuse. Rendering it as ''an accuser'' preserves
    the plain sense without importing a more developed demonological reading the text
    does not require. The traditional ''Satan'' reading is preserved in a footnote.'
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it'
