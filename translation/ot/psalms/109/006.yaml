id: PSA.109.6
reference: Psalms 109:6
source:
  edition: WLC
  text: הַפְקֵ֣ד עָלָ֣י/ו רָשָׁ֑ע וְ֝/שָׂטָ֗ן יַעֲמֹ֥ד עַל יְמִינֽ/וֹ־׃
translation:
  text: Appoint a wicked man over him, and let an accuser stand at his right hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Satan stand at his right hand.' The Hebrew word can mean 'accuser,'
      'adversary,' or, in some contexts, the proper name Satan.
    reason: alternative_reading
lexical_decisions:
- source_word: הַפְקֵד
  chosen: Appoint
  alternatives:
  - Set
  - Charge
  - Commission
  lexicon: HALOT
  rationale: Hiphil imperative of פקד here calls for causing someone to be placed
    in authority or assigned over another. 'Appoint' is natural English and preserves
    the imperative force without over-specifying the office.
- source_word: עָלָיו
  chosen: over him
  alternatives:
  - against him
  lexicon: HALOT
  rationale: With פקד, על commonly marks the person over whom someone is appointed.
    'Over him' best fits the administrative/judicial sense in context; 'against him'
    is possible by context but less directly tied to the verb.
- source_word: רָשָׁע
  chosen: a wicked man
  alternatives:
  - a wicked one
  - an evil man
  lexicon: HALOT
  rationale: The noun/adjective denotes a wicked person. 'A wicked man' is idiomatic
    and keeps the personal reference explicit in English.
- source_word: שָׂטָן
  chosen: an accuser
  alternatives:
  - an adversary
  - Satan
  lexicon: HALOT
  rationale: In this poetic/judicial context, שָׂטָן functions as a common noun meaning
    an accuser or adversary, not necessarily the proper name Satan. 'Accuser' fits
    the courtroom imagery especially with 'stand at his right hand.' The proper-name
    alternative is preserved in a footnote because of translation tradition and possible
    interpretive interest.
- source_word: יַעֲמֹד
  chosen: let ... stand
  alternatives:
  - may ... stand
  - shall ... stand
  lexicon: HALOT
  rationale: The imperfect following the imperative carries a jussive sense in context.
    'Let ... stand' conveys the imprecatory wish naturally in English.
- source_word: עַל יְמִינוֹ
  chosen: at his right hand
  alternatives:
  - on his right hand
  - at his right side
  lexicon: HALOT
  rationale: This is a standard idiom for taking a position beside someone, often
    in legal or adversarial settings. 'At his right hand' preserves the idiom and
    its biblical resonance.
