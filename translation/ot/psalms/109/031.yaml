theological_decisions:
- issue: Anthropological sense of נֶפֶשׁ
  chosen_reading: Rendered as 'life' rather than 'soul'
  alternative_readings:
  - his soul
  - him
  rationale: The verse concerns rescue from hostile judges; the Hebrew term likely
    denotes the person's life or very self, not specifically a separable immaterial
    component. This avoids importing later theological precision where the Hebrew
    context is broader.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
