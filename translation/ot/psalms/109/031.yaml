id: PSA.109.31
reference: Psalms 109:31
source:
  edition: WLC
  text: כִּֽי יַ֭עֲמֹד לִ/ימִ֣ין אֶבְי֑וֹן לְ֝/הוֹשִׁ֗יעַ מִ/שֹּׁפְטֵ֥י נַפְשֽׁ/וֹ־׃
translation:
  text: For he stands at the right hand of the poor, to save him from those who judge
    his life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from his judges'; the Hebrew may refer either to those acting as judges
      over him or, more broadly, to those pronouncing judgment against him.
    reason: lexical_alternative
  - marker: b
    text: Or 'his soul'; Hebrew nephesh can mean 'soul,' 'life,' or 'self,' depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the preceding praise/assurance. 'For'
    fits the poetic flow and explanatory force in context.
- source_word: יַעֲמֹד
  chosen: he stands
  alternatives:
  - he will stand
  - he takes his stand
  lexicon: HALOT
  rationale: The imperfect can express habitual or assured action. In poetic affirmation,
    present 'stands' conveys the LORD's characteristic protective stance without over-specifying
    futurity.
- source_word: לִימִין
  chosen: at the right hand of
  alternatives:
  - on the right hand of
  - to the right of
  lexicon: HALOT
  rationale: The idiom denotes advocacy, support, and protective presence. 'At the
    right hand of' is natural English and preserves the metaphor.
- source_word: אֶבְיוֹן
  chosen: the poor
  alternatives:
  - the needy
  - the afflicted
  lexicon: HALOT
  rationale: אֶבְיוֹן commonly denotes one who is poor/needy and vulnerable. 'The
    poor' is concise and idiomatic here, while still carrying the social vulnerability
    implied by the Hebrew.
- source_word: לְהוֹשִׁיעַ
  chosen: to save
  alternatives:
  - to deliver
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To save' is the broad, standard rendering
    of ישׁע and fits both physical and judicial rescue in this context.
- source_word: מִשֹּׁפְטֵי
  chosen: from those who judge
  alternatives:
  - from his judges
  - from those condemning
  - from those who pass judgment
  lexicon: HALOT
  rationale: The participial form from שׁפט can mean those acting as judges or those
    pronouncing judgment. Because the context is hostile accusation, 'those who judge'
    preserves the formal judicial sense without importing 'condemn' into the main
    text.
- source_word: נַפְשׁוֹ
  chosen: his life
  alternatives:
  - his soul
  - him
  lexicon: HALOT
  rationale: נֶפֶשׁ here most naturally refers to the person's life/self in a threatened
    legal setting. 'His life' avoids anachronistically narrowing the term to an immaterial
    'soul' while preserving the gravity of the threat.
