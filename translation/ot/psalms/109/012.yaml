theological_decisions:
- issue: Rendering an imprecatory petition without softening its force
  chosen_reading: 'Retain the direct curse-like petition: ''Let there be no one...'''
  alternative_readings:
  - Soften to a descriptive future such as 'There will be no one...'
  rationale: Psalm 109 is an imprecatory psalm, and the Hebrew uses jussive forms
    expressing a wish or invocation. Rendering it as a direct petition preserves the
    text's rhetorical and theological force rather than muting it into mere prediction.
