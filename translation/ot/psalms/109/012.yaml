id: PSA.109.12
reference: Psalms 109:12
source:
  edition: WLC
  text: אַל יְהִי ל֭/וֹ מֹשֵׁ֣ךְ חָ֑סֶד וְֽ/אַל יְהִ֥י ח֝וֹנֵ֗ן לִ/יתוֹמָֽי/ו־־־׃
translation:
  text: Let there be no one to extend kindness to him, and let there be no one to
    show favor to his fatherless children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Let there be no one to continue mercy to him'; the Hebrew idiom literally
      speaks of 'drawing out' kindness.
    reason: lexical_alternative
  - marker: b
    text: '''Fatherless children'' could also be rendered ''orphans.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מֹשֵׁךְ
  chosen: extend
  alternatives:
  - draw out
  - continue
  - prolong
  lexicon: HALOT
  rationale: The participle of משׁךְ literally means 'drawing/dragging,' but with
    חָסֶד it idiomatically conveys extending or continuing covenantal kindness toward
    someone. 'Extend' is natural English and preserves the sense without over-paraphrasing.
- source_word: חָסֶד
  chosen: kindness
  alternatives:
  - steadfast love
  - mercy
  - loyal love
  lexicon: HALOT
  rationale: In this imprecatory context, חָסֶד refers to merciful or loyal kindness
    shown to a vulnerable person. 'Kindness' is concise and readable; 'steadfast love'
    would sound overly covenantal here for a human benefactor, though that nuance
    remains possible.
- source_word: חוֹנֵן
  chosen: show favor
  alternatives:
  - be gracious
  - have mercy
  lexicon: HALOT
  rationale: The verb חנן denotes showing grace or favor. 'Show favor' fits idiomatic
    modern English in a human-to-human context better than the more theological-sounding
    'be gracious,' while retaining the sense of merciful generosity.
- source_word: יְתוֹמָיו
  chosen: his fatherless children
  alternatives:
  - his orphans
  - his fatherless ones
  lexicon: HALOT
  rationale: The noun יָתוֹם means an orphan, often specifically a fatherless child
    in Hebrew social-legal contexts. Because the suffix makes clear these are his
    children left without a father, 'his fatherless children' is both accurate and
    contextually explicit. 'His orphans' is possible but less natural in English and
    slightly less specific.
- source_word: אַל יְהִי
  chosen: Let there be no one
  alternatives:
  - May there not be
  - Let there not be
  lexicon: HALOT
  rationale: The negative jussive construction expresses a wish/prayer that no such
    person exist for him. 'Let there be no one' is clear, forceful, and preserves
    the imprecatory mood.
