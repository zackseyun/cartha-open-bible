id: PSA.109.3
reference: Psalms 109:3
source:
  edition: WLC
  text: וְ/דִבְרֵ֣י שִׂנְאָ֣ה סְבָב֑וּ/נִי וַ/יִּֽלָּחֲמ֥וּ/נִי חִנָּֽם׃
translation:
  text: Words of hatred surround me, and they fight against me without cause.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they wage war against me.' The Hebrew verb can carry a stronger combat
      image than 'fight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דִבְרֵי
  chosen: Words of
  alternatives:
  - speech of
  - words from
  lexicon: HALOT
  rationale: Construct plural of דָּבָר here denotes spoken words or utterances. 'Words
    of' preserves the construct relationship with the following noun and fits the
    poetic accusation context.
- source_word: שִׂנְאָה
  chosen: hatred
  alternatives:
  - hate
  - hostility
  lexicon: HALOT
  rationale: The noun denotes hatred/hostility. 'Hatred' is the most direct abstract
    noun in English and pairs naturally with 'words of' in a formal yet readable way.
- source_word: סְבָבוּנִי
  chosen: surround me
  alternatives:
  - encircle me
  - have surrounded me
  lexicon: HALOT
  rationale: From סבב, 'to surround, encircle.' The perfect in Hebrew poetry can be
    rendered as a present in English to express vivid ongoing hostility in parallel
    with the following verb. 'Surround me' is natural and preserves the image.
- source_word: וַיִּלָּחֲמוּנִי
  chosen: they fight against me
  alternatives:
  - they wage war against me
  - they attacked me
  lexicon: HALOT
  rationale: From לחם in the Niphal, 'to fight, do battle.' 'Fight against me' preserves
    the adversarial force without overstating to full military warfare, though 'wage
    war' is a viable stronger alternative.
- source_word: חִנָּם
  chosen: without cause
  alternatives:
  - for nothing
  - gratuitously
  - without reason
  lexicon: HALOT
  rationale: The adverb conveys action done for no valid reason or gratuitously. 'Without
    cause' is idiomatic English and captures the moral sense of unjustified hostility.
