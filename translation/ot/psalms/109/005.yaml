id: PSA.109.5
reference: Psalms 109:5
source:
  edition: WLC
  text: וַ/יָּ֘שִׂ֤ימוּ עָלַ֣/י רָ֭עָה תַּ֣חַת טוֹבָ֑ה וְ֝/שִׂנְאָ֗ה תַּ֣חַת אַהֲבָתִֽ/י׃
translation:
  text: They repaid me evil for good, and hatred for my love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They set evil against me for good.' The Hebrew verb is literally 'set/placed,'
      but here likely carries the sense of repayment or requital.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשִׂימוּ
  chosen: They repaid
  alternatives:
  - they set upon me
  - they placed on me
  lexicon: HALOT
  rationale: 'The verb שׂוּם literally means ''to put/place/set,'' but in the idiom
    with עָלַי plus the paired תַּחַת clauses, the sense is retaliatory exchange:
    they gave or rendered something in return. ''Repaid'' captures the reciprocal
    force naturally in English without over-paraphrasing.'
- source_word: עָלַי
  chosen: me
  alternatives:
  - upon me
  - against me
  lexicon: HALOT
  rationale: The preposition עַל with first-person suffix is literally 'upon me,'
    but in English the idiom 'repaid me' absorbs the object naturally. 'Against me'
    is possible, but the exchange structure is better conveyed by direct object syntax.
- source_word: רָעָה
  chosen: evil
  alternatives:
  - harm
  - bad
  lexicon: HALOT
  rationale: '''Evil'' is the most direct and weighty rendering, preserving the moral
    and hostile sense of רָעָה in lament/imprecation contexts. ''Harm'' narrows the
    term to injury, while the Hebrew can include broader malicious treatment.'
- source_word: תַּחַת
  chosen: for
  alternatives:
  - in return for
  - instead of
  lexicon: HALOT
  rationale: תַּחַת marks substitution or exchange. 'For' is concise and idiomatic
    in English parallelism ('evil for good'). The fuller 'in return for' is semantically
    accurate but heavier; the exchange sense remains clear in context.
- source_word: טוֹבָה
  chosen: good
  alternatives:
  - kindness
  - benefit
  lexicon: HALOT
  rationale: '''Good'' preserves the broad Hebrew term and matches the poetic antithesis
    with ''evil.'' ''Kindness'' is interpretive and narrower than the source.'
- source_word: וְשִׂנְאָה
  chosen: and hatred
  alternatives:
  - and hate
  lexicon: HALOT
  rationale: The noun is best rendered as the abstract 'hatred,' which mirrors the
    nominal style of the Hebrew and balances 'my love.' 'Hate' is possible but slightly
    less formal and less parallel.
- source_word: אַהֲבָתִי
  chosen: my love
  alternatives:
  - my affection
  - the love I showed
  lexicon: HALOT
  rationale: The noun with first-person suffix is straightforwardly 'my love.' This
    preserves the lexical cognate with the doctrine's default handling of love terms
    and keeps the line concise. 'The love I showed' is explanatory and more dynamic
    than necessary.
