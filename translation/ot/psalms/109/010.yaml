id: PSA.109.10
reference: Psalms 109:10
source:
  edition: WLC
  text: וְ/נ֤וֹעַ יָנ֣וּעוּ בָנָ֣י/ו וְ/שִׁאֵ֑לוּ וְ֝/דָרְשׁ֗וּ מֵ/חָרְבוֹתֵי/הֶֽם׃
translation:
  text: May his children wander about and beg; may they seek from their ruins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'may they seek it away from their ruins,' taking the preposition as separation
      rather than source.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנֹועַ יָנוּעוּ
  chosen: may ... wander about
  alternatives:
  - surely wander
  - wander continually
  - be fugitives/wanderers
  lexicon: HALOT
  rationale: 'The infinitive absolute plus imperfect of נוע intensifies the verbal
    idea. In an imprecatory context, English is best expressed with a jussive-like
    wish: ''may ... wander about.'' ''Wander about'' preserves the repeated-motion
    sense without over-paraphrasing.'
- source_word: בָנָיו
  chosen: his children
  alternatives:
  - his sons
  lexicon: HALOT
  rationale: בנים can mean 'sons' more narrowly or 'children' more broadly. Here the
    familial sense is primary, and 'children' is natural modern English without excluding
    males.
- source_word: וְשִׁאֵלוּ
  chosen: and beg
  alternatives:
  - and ask
  - and borrow
  lexicon: HALOT
  rationale: Though שאל often means 'ask,' in this context of destitution it carries
    the sense of begging/alms-seeking. 'Borrow' is contextually unlikely in parallel
    with wandering and ruin.
- source_word: וְדָרְשׁוּ
  chosen: may they seek food
  alternatives:
  - may they seek
  - may they search
  lexicon: HALOT
  rationale: דרש means 'seek/search.' Because English 'seek' here can sound incomplete,
    'seek food' makes explicit the implied object demanded by the context of begging
    and desolation, while remaining within the semantic scope.
- source_word: מֵחָרְבוֹתֵיהֶם
  chosen: from their ruins
  alternatives:
  - from their desolate places
  - away from their ruins
  lexicon: HALOT
  rationale: חרבות denotes ruins/desolated places. The preposition מן can indicate
    source or separation. 'From their ruins' is the most direct rendering; the sense
    may be either that they seek sustenance out of ruined places or away from them,
    so the alternative is preserved in a footnote.
