theological_decisions:
- issue: Imprecatory force of the verse
  chosen_reading: Retain the prayer/wish form as an imprecation against the wicked
    man's line
  alternative_readings:
  - Flatten into a mere prediction about his future
  rationale: The jussive and surrounding context in Psalm 109 are prayers calling
    for judgment, not neutral forecasts. The translation preserves that tension without
    softening the severity.
