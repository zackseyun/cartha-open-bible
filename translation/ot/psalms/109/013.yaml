id: PSA.109.13
reference: Psalms 109:13
source:
  edition: WLC
  text: יְהִֽי אַחֲרִית֥/וֹ לְ/הַכְרִ֑ית בְּ/ד֥וֹר אַ֝חֵ֗ר יִמַּ֥ח שְׁמָֽ/ם־׃
translation:
  text: May his posterity be cut off; in the next generation may their name be blotted
    out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'May his end be for destruction'; אַחֲרִית can mean 'end' or 'future,'
      but here the context favors 'posterity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  chosen: May ... be
  alternatives:
  - let ... be
  lexicon: HALOT
  rationale: Qal jussive of היה expresses a wish/imprecation. English 'May ... be'
    best conveys the volitive force in natural modern English.
- source_word: אַחֲרִיתוֹ
  chosen: his posterity
  alternatives:
  - his end
  - his future
  lexicon: HALOT
  rationale: אַחֲרִית can mean 'end' or 'future,' but in this imprecatory context,
    followed by 'be cut off' and then 'in the next generation may their name be blotted
    out,' it refers to one's surviving line or posterity rather than merely the abstract
    future.
- source_word: לְהַכְרִית
  chosen: be cut off
  alternatives:
  - for cutting off
  - to be destroyed
  lexicon: HALOT
  rationale: Infinitive construct of כרת with ל expresses result/purpose. 'Be cut
    off' preserves the idiomatic covenantal/judicial force without over-paraphrasing.
- source_word: בְּדוֹר אַחֵר
  chosen: in the next generation
  alternatives:
  - in another generation
  - in a later generation
  lexicon: HALOT
  rationale: The phrase denotes the generation that follows. 'Next generation' is
    the clearest idiomatic English rendering.
- source_word: יִמַּח
  chosen: may ... be blotted out
  alternatives:
  - may ... be wiped out
  - may ... be erased
  lexicon: HALOT
  rationale: Nifal of מחה commonly means 'be blotted out/erased,' especially for names
    or memory. 'Blotted out' preserves biblical resonance and suits the object 'name.'
- source_word: שְׁמָם
  chosen: their name
  alternatives:
  - their reputation
  - their memory
  lexicon: HALOT
  rationale: Although morphologically plural suffix ('their'), the antecedent is the
    offender's posterity/line, so English singular collective 'their name' is natural
    and reflects the Hebrew shift from singular offender to plural descendants.
