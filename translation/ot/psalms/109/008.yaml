theological_decisions:
- issue: Rendering פְּקֻדָּתוֹ in a verse later cited in Acts 1:20
  chosen_reading: office
  alternative_readings:
  - oversight
  - charge
  - position
  rationale: The Hebrew denotes an entrusted responsibility or oversight. 'Office'
    preserves the sense of an appointed role and aligns naturally with the later apostolic
    citation, while not importing a technical church-office meaning into the psalm
    itself beyond what the Hebrew can bear.
