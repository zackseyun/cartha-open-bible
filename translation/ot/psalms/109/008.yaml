id: PSA.109.8
reference: Psalms 109:8
source:
  edition: WLC
  text: יִֽהְיֽוּ יָמָ֥י/ו מְעַטִּ֑ים פְּ֝קֻדָּת֗/וֹ יִקַּ֥ח אַחֵֽר־׃
translation:
  text: May his days be few; may another take his office.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'oversight,' 'charge,' or 'position.' The Hebrew term refers to an entrusted
      responsibility or appointed role.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִהְיוּ
  chosen: May ... be
  alternatives:
  - let ... be
  - shall ... be
  lexicon: HALOT
  rationale: The jussive/imprecatory force in context is best conveyed in English
    with 'May ... be,' expressing a wish or invocation rather than a simple future
    statement.
- source_word: יָמָיו
  chosen: his days
  lexicon: HALOT
  rationale: A straightforward rendering of the plural noun with 3ms suffix; in context
    it refers to the span of his life.
- source_word: מְעַטִּים
  chosen: few
  alternatives:
  - short
  - few in number
  lexicon: HALOT
  rationale: '''Few'' naturally expresses the idea of small number/brief duration
    of days. ''Short'' is possible by implication, but ''few'' more directly matches
    the adjective.'
- source_word: פְּקֻדָּתוֹ
  chosen: his office
  alternatives:
  - his oversight
  - his charge
  - his position
  lexicon: HALOT
  rationale: The noun can denote oversight, charge, office, or appointed responsibility.
    In this context, especially given the parallel with another taking it and the
    NT citation in Acts 1:20, 'office' best captures an entrusted role or post without
    over-specifying ecclesiastical meaning.
- source_word: יִקַּח
  chosen: may ... take
  alternatives:
  - let ... take
  - shall ... take
  lexicon: HALOT
  rationale: Though formally imperfect, in this imprecatory parallelism it carries
    jussive force coordinated with the first clause; English 'may ... take' preserves
    that force.
- source_word: אַחֵר
  chosen: another
  alternatives:
  - someone else
  lexicon: HALOT
  rationale: '''Another'' is the most direct and idiomatic rendering here.'
