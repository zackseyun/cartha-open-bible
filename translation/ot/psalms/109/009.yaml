  chosen_reading: 'Render as a wish/prayer: ''May his sons be fatherless, and his wife a widow.'''
  alternative_readings:
  - 'Predictive future: ''His sons will be fatherless, and his wife a widow'''
  rationale: The verbal form and literary context of Psalm 109 favor an imprecatory/jussive sense rather than a simple prediction. This preserves the psalm's rhetoric without softening or recasting it into mere description.
