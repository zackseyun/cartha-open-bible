id: PSA.109.9
reference: Psalms 109:9
source:
  edition: WLC
  text: יִֽהְיוּ בָנָ֥י/ו יְתוֹמִ֑ים וְ֝/אִשְׁתּ/וֹ אַלְמָנָֽה־׃
translation:
  text: May his sons be fatherless[a], and his wife a widow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'orphans.' The Hebrew term can denote children bereft of a father; here 'fatherless' fits the parallel with 'his wife a widow.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִהְיוּ
  chosen: May ... be
  alternatives:
  - let ... be
  - shall ... be
  lexicon: HALOT
  rationale: The jussive/imprecatory force of היה in this context is best conveyed in English with 'May ... be,' which preserves the psalm's wish/prayer form more naturally than a bare future.
- source_word: בָנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew noun בן in the masculine plural construct with 3ms suffix is specifically 'sons,' not the gender-neutral 'children.' This follows the gender-accurate principle and preserves the lexical specificity of the source.
- source_word: יְתוֹמִים
  chosen: fatherless
  alternatives:
  - orphans
  lexicon: HALOT
  rationale: Although 'orphans' is a common gloss, in context the parallel with 'his wife a widow' points specifically to loss of the father/husband. 'Fatherless' is both idiomatic in English biblical style and more precise to the social condition highlighted here.
- source_word: וְאִשְׁתּוֹ
  chosen: and his wife
  alternatives:
  - and his woman
  lexicon: HALOT
  rationale: אִשָּׁה with a pronominal suffix in this context clearly means 'his wife.' The conjunction is retained straightforwardly as 'and.'
- source_word: אַלְמָנָה
  chosen: a widow
  lexicon: HALOT
  rationale: 'The noun directly denotes a widow. The English indefinite article is required for natural syntax: ''his wife a widow.'''
