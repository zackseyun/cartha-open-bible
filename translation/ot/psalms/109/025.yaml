id: PSA.109.25
reference: Psalms 109:25
source:
  edition: WLC
  text: וַ/אֲנִ֤י הָיִ֣יתִי חֶרְפָּ֣ה לָ/הֶ֑ם יִ֝רְא֗וּ/נִי יְנִיע֥וּ/ן רֹאשָֽׁ/ם׀׃
translation:
  text: And I have become a reproach to them; when they see me, they shake their heads.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wag their heads.' The Hebrew verb refers to moving the head as a gesture
      of scorn or derision.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: And I
  alternatives:
  - But I
  - As for me, I
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun marks a contrast or continuation.
    'And I' preserves the simple connective while allowing the adversative force to
    be felt from context.
- source_word: הָיִיתִי
  chosen: became
  alternatives:
  - was
  - have become
  lexicon: HALOT
  rationale: Qal perfect of היה can mean 'was' or 'became.' Here 'became' better conveys
    the resultant state of coming to be regarded as a reproach, rather than merely
    existing as one.
- source_word: חֶרְפָּה
  chosen: a reproach
  alternatives:
  - an object of scorn
  - a disgrace
  lexicon: HALOT
  rationale: The noun denotes reproach, taunt, or disgrace. 'A reproach' is a close
    and idiomatic rendering that preserves the psalm's lament vocabulary.
- source_word: לָהֶם
  chosen: to them
  alternatives:
  - for them
  - before them
  lexicon: HALOT
  rationale: The preposition ל marks relation toward the hostile observers. 'To them'
    is the most direct rendering in English with 'reproach.'
- source_word: יִרְאוּנִי
  chosen: when they see me
  alternatives:
  - they see me
  - at the sight of me
  lexicon: HALOT
  rationale: The imperfect here functions in a general or repeated sense. Rendering
    it with 'when' makes the temporal relation to the next verb explicit in natural
    English without adding content beyond the Hebrew sequence.
- source_word: יְנִיעוּן
  chosen: they shake
  alternatives:
  - they wag
  - they toss
  lexicon: HALOT
  rationale: Hiphil of נוע here refers to moving the head as a gesture of derision.
    'Shake' is clear modern English; 'wag' is traditional but more archaic.
- source_word: רֹאשָׁם
  chosen: their heads
  alternatives:
  - their head
  lexicon: HALOT
  rationale: 'The singular noun with plural suffix is idiomatically rendered as the
    plural in English: each of them shakes his own head, collectively ''their heads.'''
