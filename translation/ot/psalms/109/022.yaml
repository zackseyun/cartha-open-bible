id: PSA.109.22
reference: Psalms 109:22
source:
  edition: WLC
  text: כִּֽי עָנִ֣י וְ/אֶבְי֣וֹן אָנֹ֑כִי וְ֝/לִבִּ֗/י חָלַ֥ל בְּ/קִרְבִּֽ/י־׃
translation:
  text: For I am poor and needy, and my heart is pierced within me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my heart is wounded within me.' The Hebrew verb can convey being pierced,
      wounded, or fatally stricken.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or ground for the plea in context. 'For' preserves
    the connective force in natural English.
- source_word: עָנִי
  chosen: poor
  alternatives:
  - afflicted
  - humble
  lexicon: HALOT
  rationale: The adjective commonly denotes one who is poor, afflicted, or oppressed.
    'Poor' fits well with the paired term אֶבְיוֹן and preserves the socioeconomic/distress
    sense without overinterpreting.
- source_word: אֶבְיוֹן
  chosen: needy
  alternatives:
  - poor
  - destitute
  lexicon: HALOT
  rationale: Rendered 'needy' to preserve the common pairing 'poor and needy' while
    distinguishing it from עָנִי. This reflects material and situational helplessness.
- source_word: אָנֹכִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: 'The independent pronoun is explicit and emphatic in Hebrew. In English,
    the copular sense is naturally supplied: ''I am poor and needy.'''
- source_word: לִבִּי
  chosen: my heart
  lexicon: HALOT
  rationale: Standard rendering for לֵב/לֵבָב. In Hebrew anthropology this can include
    the inner self, mind, and will, but 'heart' is the most faithful and natural English
    equivalent here.
- source_word: חָלַל
  chosen: is pierced
  alternatives:
  - is wounded
  - is profaned
  - is slain
  lexicon: HALOT
  rationale: In this context the verb conveys being pierced through or mortally wounded
    inwardly. 'Is pierced' preserves the vivid metaphor of internal injury better
    than the flatter 'is wounded.' 'Profaned' is a different semantic branch not suitable
    here.
- source_word: בְּקִרְבִּי
  chosen: within me
  alternatives:
  - in my midst
  - inside me
  lexicon: HALOT
  rationale: The phrase denotes inward location. 'Within me' is idiomatic, concise,
    and preserves the internal sense of the Hebrew expression.
