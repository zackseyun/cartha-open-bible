id: PSA.109.28
reference: Psalms 109:28
source:
  edition: WLC
  text: יְקַֽלְלוּ הֵמָּה֮ וְ/אַתָּ֪ה תְבָ֫רֵ֥ךְ קָ֤מוּ וַ/יֵּבֹ֗שׁוּ וְֽ/עַבְדְּ/ךָ֥
    יִשְׂמָֽח־׀׃
translation:
  text: They may curse, but you will bless. They rise up and are put to shame, but
    your servant will rejoice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Let them curse, but you bless,' taking the opening imperfects with a
      more jussive or permissive force.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'They rise up and are put to shame'; the verb may imply hostile action,
      but the text states only that they 'rise up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְקַֽלְלוּ
  chosen: They may curse
  alternatives:
  - They curse
  - Let them curse
  lexicon: HALOT
  rationale: Piel imperfect 3mp of קלל can express simple future, habitual action,
    or a concessive/jussive-like nuance in context. In this adversative parallelism
    with 'but you will bless,' English 'They may curse' captures the concessive force
    often recognized here without over-paraphrasing.
- source_word: הֵמָּה
  chosen: They
  alternatives:
  - they themselves
  lexicon: HALOT
  rationale: Independent pronoun adds emphasis/contrast. English can reflect this
    adequately with explicit subject 'They' before the adversative clause; 'they themselves'
    would be more marked than the context requires.
- source_word: וְ/אַתָּה
  chosen: but you
  alternatives:
  - and you
  lexicon: HALOT
  rationale: Though the conjunction is formally 'and,' the clause is clearly contrastive
    with the preceding subject and verb. 'But you' best conveys the Hebrew adversative
    sense in natural English.
- source_word: תְבָ֫רֵךְ
  chosen: will bless
  alternatives:
  - bless
  lexicon: HALOT
  rationale: Piel imperfect 2ms of ברך in parallel with the opponents' cursing indicates
    God's responsive action. 'Will bless' gives a natural future sense in English
    and preserves the curse/bless contrast.
- source_word: קָ֤מוּ
  chosen: They rise up
  alternatives:
  - They have arisen
  - They attack
  lexicon: HALOT
  rationale: Qal perfect 3cp of קום literally means 'arise' or 'stand up.' In context
    it likely refers to hostile opponents taking action, but the text does not specify
    attack explicitly, so the more literal 'rise up' is preferred.
- source_word: וַ/יֵּבֹ֗שׁוּ
  chosen: are put to shame
  alternatives:
  - are ashamed
  - will be ashamed
  lexicon: HALOT
  rationale: The verb בוש commonly denotes being ashamed or disgraced. 'Are put to
    shame' brings out the resultant public disgrace fitting the imprecatory context
    better than the more internal 'are ashamed.'
- source_word: וְֽ/עַבְדְּ/ךָ֥
  chosen: but your servant
  alternatives:
  - and your servant
  lexicon: HALOT
  rationale: עבד with 2ms suffix is 'your servant.' The conjunction is rendered adversatively
    in English because the final clause contrasts the enemies' shame with the psalmist's
    joy. 'Servant' is appropriate here; the bonded-status nuance of 'slave' is not
    foregrounded in this prayer formula.
- source_word: יִשְׂמָֽח
  chosen: will rejoice
  alternatives:
  - rejoices
  - will be glad
  lexicon: HALOT
  rationale: Qal imperfect 3ms of שמח denotes joy/gladness. 'Will rejoice' fits the
    future/resultative flow of the verse and gives a stronger poetic counterpart to
    the enemies' shame.
