theological_decisions:
- issue: Referent of 'your servant'
  chosen_reading: The speaker refers to himself humbly before God as 'your servant.'
  alternative_readings:
  - A more generic righteous servant figure
  rationale: In the psalm's immediate context, the phrase functions as the psalmist's
    self-designation in prayer rather than a distinct messianic title. The translation
    preserves the text's direct sense without importing a christological reading the
    verse itself does not require.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
