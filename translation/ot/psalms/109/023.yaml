id: PSA.109.23
reference: Psalms 109:23
source:
  edition: WLC
  text: כְּ/צֵל כִּ/נְטוֹת֥/וֹ נֶהֱלָ֑כְתִּי נִ֝נְעַ֗רְתִּי כָּֽ/אַרְבֶּֽה־׃
translation:
  text: Like a shadow when it lengthens[a], I am gone[c][b]; I am shaken off like a locust.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as it declines' or 'when it stretches out'; the Hebrew verb can suggest a shadow's extending or turning away toward evening.
    reason: lexical_alternative
  - marker: b
    text: Or 'I pass away'; the Hebrew literally uses the verb 'go/walk' in a form that here conveys disappearance.
    reason: lexical_alternative
  - marker: c
    text: '''Locust'' is the usual sense of the Hebrew; some translations render ''grasshopper.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּצֵל
  chosen: Like a shadow
  alternatives:
  - As a shadow
  lexicon: HALOT
  rationale: The prefixed כ marks comparison, and צֵל means 'shadow.' 'Like a shadow' is natural modern English and preserves the simile.
- source_word: כִּנְטוֹתוֹ
  chosen: when it lengthens
  alternatives:
  - as it declines
  - when it stretches out
  - at its turning
  lexicon: HALOT
  rationale: From נטה 'to stretch out, extend, incline.' With the shadow image, the sense is of a shadow stretching/lengthening toward disappearance, a common poetic image for transience. 'When it lengthens' best captures the temporal-poetic force in idiomatic English.
- source_word: נֶהֱלָכְתִּי
  chosen: I fade away
  alternatives:
  - I am gone
  - I pass away
  - I am made to go
  lexicon: HALOT
  rationale: Nifal of הלך here is idiomatic in context of a vanishing shadow. Rather than the overly literal 'I am gone/walked,' 'I fade away' conveys the psalmist's sense of wasting and disappearance in parallel with the shadow image.
- source_word: נִנְעַרְתִּי
  chosen: I am shaken off
  alternatives:
  - I am shaken out
  - I am tossed about
  lexicon: HALOT
  rationale: Nifal of נער means 'to be shaken off/out.' The passive-reflexive nuance fits the image of something easily dislodged. 'Shaken off' is concise and preserves the metaphor.
- source_word: כָּאַרְבֶּה
  chosen: like a locust
  alternatives:
  - like a grasshopper
  lexicon: HALOT
  rationale: אַרְבֶּה ordinarily denotes 'locust.' While 'grasshopper' appears in some English tradition, 'locust' is the more standard lexical value and better preserves the biblical imagery.
