id: PSA.13.5
reference: Psalms 13:5
source:
  edition: WLC
  text: פֶּן יֹאמַ֣ר אֹיְבִ֣/י יְכָלְתִּ֑י/ו צָרַ֥/י יָ֝גִ֗ילוּ כִּ֣י אֶמּֽוֹט־׃
translation:
  text: lest my enemy say[b][a], “I have overcome him,” and my adversaries rejoice because I am shaken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I have prevailed against him.”
    reason: lexical_alternative
  - marker: b
    text: Or “because I slip” or “because I totter.”
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - so that not
  lexicon: HALOT
  rationale: Introduces a negative purpose/result clause expressing what the psalmist asks God to prevent. 'Lest' is concise and natural in poetic English.
- source_word: יֹאמַר
  chosen: say
  alternatives:
  - declare
  lexicon: HALOT
  rationale: Standard rendering of אמר in direct speech context.
- source_word: אֹיְבִי
  chosen: my enemy
  alternatives:
  - my foe
  lexicon: HALOT
  rationale: Singular noun with 1cs suffix; rendered straightforwardly as the singular opponent.
- source_word: יְכָלְתִּיו
  chosen: I have overcome him
  alternatives:
  - I have prevailed against him
  - I have defeated him
  lexicon: HALOT
  rationale: From יכל, 'to prevail, be able, overcome.' With 1cs subject and 3ms object, the enemy boasts of prevailing over the psalmist. 'Overcome' fits the conflict setting and avoids over-specifying total destruction.
- source_word: צָרַי
  chosen: my adversaries
  alternatives:
  - my enemies
  - my foes
  lexicon: HALOT
  rationale: Plural noun with 1cs suffix. Chosen to distinguish it from the singular 'enemy' in the previous clause while preserving hostile opposition.
- source_word: יָגִילוּ
  chosen: rejoice
  alternatives:
  - exult
  - be glad
  lexicon: HALOT
  rationale: Conveys jubilant exultation at the psalmist's downfall; 'rejoice' is idiomatic and readable.
- source_word: כִּי
  chosen: because
  alternatives:
  - when
  - that
  lexicon: HALOT
  rationale: Here introduces the reason for the adversaries' rejoicing. 'Because' best captures the causal sense.
- source_word: אֶמּוֹט
  chosen: I am shaken
  alternatives:
  - I slip
  - I am moved
  - I totter
  lexicon: HALOT
  rationale: From מוט in the Niphal, often 'be shaken, totter, slip.' 'I am shaken' communicates destabilization without implying a literal fall, fitting the psalm's emotional and existential distress. The alternative 'I slip' is worth preserving because of common translation tradition.
