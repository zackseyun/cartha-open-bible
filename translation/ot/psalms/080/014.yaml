id: PSA.80.14
reference: Psalms 80:14
source:
  edition: WLC
  text: יְכַרְסְמֶ֣/נָּֽה חֲזִ֣יר מִ/יָּ֑ וְ/זִ֖יז שָׂדַ֣י יִרְעֶֽ/נָּה׃
translation:
  text: A boar from the forest tears it down[b][a], and the wild animals of the field feed on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ravages it' for the rare verb describing destructive feeding.
    reason: lexical_alternative
  - marker: b
    text: Or 'the beasts of the field graze on it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְכַרְסְמֶנָּה
  chosen: tears it down
  alternatives:
  - ravages it
  - gnaws at it
  - strips it
  lexicon: HALOT
  rationale: The rare verb כרסם conveys destructive eating or stripping, especially by animals. In context of a vineyard/vine, the sense is not merely 'eat' but damage by tearing/stripping. 'Tears it down' communicates active devastation in natural English while preserving the image of animal destruction.
- source_word: חֲזִיר
  chosen: boar
  alternatives:
  - pig
  - wild boar
  lexicon: HALOT
  rationale: חזיר denotes a pig/boar. Because the following phrase 'from the forest' specifies a wild setting, 'boar' is the most natural concise rendering; 'wild boar' would be slightly redundant.
- source_word: מִיָּעַר
  chosen: from the forest
  alternatives:
  - out of the forest
  lexicon: HALOT
  rationale: The preposition מן marks source/origin. 'From the forest' is straightforward and idiomatic.
- source_word: זִיז
  chosen: moving creatures
  alternatives:
  - beasts
  - creatures
  - that which moves
  lexicon: HALOT
  rationale: זיז is an uncommon noun for moving/living creatures, often of wild animals. 'Moving creatures' preserves the lexical nuance better than the broader 'beasts,' while remaining readable.
- source_word: שָׂדַי
  chosen: of the field
  alternatives:
  - of the open country
  lexicon: HALOT
  rationale: The construct phrase זיז שדי is a standard wilderness/field-animal expression. 'Of the field' preserves the biblical imagery and is natural English.
- source_word: יִרְעֶנָּה
  chosen: feed on it
  alternatives:
  - graze on it
  - pasture on it
  - devour it
  lexicon: HALOT
  rationale: The verb רעה in the Qal commonly means 'graze/feed.' With the feminine suffix referring back to the vine/vineyard, 'feed on it' best captures the image of animals consuming vegetation. 'Graze on it' is possible, but 'feed on it' is slightly broader and more idiomatic with 'creatures'.
