id: PSA.50.17
reference: Psalms 50:17
source:
  edition: WLC
  text: וְ֭/אַתָּה שָׂנֵ֣אתָ מוּסָ֑ר וַ/תַּשְׁלֵ֖ךְ דְּבָרַ֣/י אַחֲרֶֽי/ךָ׃
translation:
  text: For you hate discipline[b][a], and you cast my words behind you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'But you hate discipline.' The conjunction may be read adversatively as well as explanatory/continuative.
    reason: lexical_alternative
  - marker: b
    text: '''Discipline'' may also be rendered ''instruction,'' ''correction,'' or ''reproof,'' reflecting the Hebrew musar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  chosen: For you
  alternatives:
  - But you
  - And you
  lexicon: HALOT
  rationale: The pronoun is explicit and contrastive. In context, the conjunction is best represented as introducing an adversative/explanatory contrast with the preceding rebuke; 'For you' captures the sense smoothly in English while preserving the direct address.
- source_word: שָׂנֵאתָ
  chosen: hate
  alternatives:
  - hated
  - detest
  lexicon: HALOT
  rationale: Qal perfect 2ms of 'to hate.' In English poetic discourse, the present 'hate' communicates the characterizing force of the Hebrew perfect in this accusation better than a simple past 'hated.' 'Detest' is possible but stronger and less neutral than the Hebrew requires.
- source_word: מוּסָר
  chosen: discipline
  alternatives:
  - instruction
  - correction
  - reproof
  lexicon: HALOT
  rationale: מוּסָר commonly denotes corrective instruction or discipline, not merely abstract teaching. 'Discipline' best preserves the moral-formative sense in wisdom and psalmic usage, while remaining natural English.
- source_word: וַתַּשְׁלֵךְ
  chosen: you throw
  alternatives:
  - you cast
  - you have thrown
  lexicon: HALOT
  rationale: From שלך, 'to throw/cast.' The vivid concrete image is important and should be retained. Present tense fits the ongoing accusatory description; 'cast' is more formal but less natural for modern English.
- source_word: דְּבָרַי
  chosen: my words
  alternatives:
  - my words of instruction
  - my sayings
  lexicon: HALOT
  rationale: The plural construct with 1cs suffix is straightforwardly 'my words.' The broader sense could include commands or teachings, but the more literal rendering should be preserved here without interpretive expansion.
- source_word: אַחֲרֶיךָ
  chosen: behind you
  alternatives:
  - at your back
  - behind your back
  lexicon: HALOT
  rationale: Literally 'behind you.' The idiom conveys rejection or disregard, as if discarding something out of sight. 'Behind you' preserves the metaphor directly; 'behind your back' in English can suggest secrecy and would mislead.
