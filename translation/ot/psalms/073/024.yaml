id: PSA.73.24
reference: Psalms 73:24
source:
  edition: WLC
  text: בַּ/עֲצָתְ/ךָ֥ תַנְחֵ֑/נִי וְ֝/אַחַ֗ר כָּב֥וֹד תִּקָּחֵֽ/נִי׃
translation:
  text: With your counsel you guide me[a], and afterward you will receive me to glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and afterward you will receive me with honor.'
    reason: alternative_reading
lexical_decisions:
- source_word: בַּעֲצָתְךָ
  chosen: with your counsel
  alternatives:
  - by your counsel
  - according to your counsel
  lexicon: HALOT
  rationale: עֵצָה commonly denotes counsel, advice, or plan. The prefixed ב marks means or accompaniment. 'With your counsel' is natural English and preserves the sense that God's counsel is the means by which the psalmist is guided.
- source_word: תַנְחֵנִי
  chosen: you guide me
  alternatives:
  - you lead me
  lexicon: HALOT
  rationale: The Hiphil of נחה means to lead or guide. 'Guide' fits the metaphor of divine direction through counsel and reads naturally in modern English.
- source_word: וְאַחַר
  chosen: and afterward
  alternatives:
  - and after
  - and later
  lexicon: HALOT
  rationale: אַחַר here functions adverbially/temporally, indicating what follows the present guidance. 'Afterward' best captures the temporal sequence in idiomatic English.
- source_word: כָּבוֹד
  chosen: glory
  alternatives:
  - honor
  lexicon: HALOT
  rationale: כָּבוֹד can mean glory or honor. In this context, paired with God's ongoing guidance and subsequent taking of the psalmist, 'glory' best preserves the elevated and possibly eschatological force without over-specifying the mechanism.
- source_word: תִּקָּחֵנִי
  chosen: you will take me into
  alternatives:
  - you will receive me to
  - you will take me
  lexicon: HALOT
  rationale: לקח means take, receive. Because English 'take me glory' is unidiomatic, 'take me into glory' supplies the minimal preposition needed for clear English while reflecting the likely sense of reception into a glorious state or presence.
