theological_decisions:
- issue: Meaning of the phrase אַחַר כָּבוֹד תִּקָּחֵנִי
  chosen_reading: 'an eschatologically open rendering: ''afterward you will take me into glory'''
  alternative_readings:
  - '''afterward you will receive me with honor'''
  - '''and afterward receive me to glory'''
  rationale: 'The Hebrew is compact and permits more than one nuance: reception into glory, reception with honor, or being taken after a period into an honored state. In keeping with the doctrine''s instruction to preserve theological tension rather than over-resolve ambiguity, the main text uses ''into glory,'' which is a natural reading of כָּבוֹד here and fits the psalm''s movement toward divine nearness, while a footnote preserves the ''with honor'' alternative.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
