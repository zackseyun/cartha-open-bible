id: PSA.73.21
reference: Psalms 73:21
source:
  edition: WLC
  text: כִּ֭י יִתְחַמֵּ֣ץ לְבָבִ֑/י וְ֝/כִלְיוֹתַ֗/י אֶשְׁתּוֹנָֽן׃
translation:
  text: For my heart was embittered[a], and my kidneys were pierced.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my inward parts' for 'my kidneys,' a Hebrew expression for the deepest inner emotions.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - When
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanatory basis for the psalmist's prior confession in the surrounding context. 'For' best preserves the explanatory force in natural English.
- source_word: יִתְחַמֵּץ
  chosen: was embittered
  alternatives:
  - grew sour
  - was grieved
  - was leavened/fermented
  lexicon: HALOT
  rationale: The Hitpael of חמץ here is idiomatic for becoming sour or embittered inwardly. 'Was embittered' communicates the emotional sense clearly in modern English while retaining the metaphor of inner souring better than the flatter 'was grieved.'
- source_word: לְבָבִי
  chosen: my heart
  lexicon: HALOT
  rationale: '''Heart'' is the standard rendering for the inner self, mind, and affections in Hebrew anthropology. It should be preserved rather than paraphrased as ''mind'' or ''inner being.'''
- source_word: וְכִלְיוֹתַי
  chosen: my kidneys
  alternatives:
  - my inward parts
  - my innermost being
  - my reins
  lexicon: HALOT
  rationale: Hebrew כִּלְיָה literally means 'kidney' and often denotes the deepest inner emotions or conscience. Following the project's preference for original-language primacy, the concrete term is retained in the main text rather than replaced with an interpretive abstraction; an explanatory alternative is preserved in a footnote.
- source_word: אֶשְׁתּוֹנָן
  chosen: I was pierced
  alternatives:
  - I was pricked
  - I was wounded
  - I was sharpened
  lexicon: HALOT
  rationale: This rare reflexive/passive-form verb conveys being sharply affected, as by piercing or stabbing. 'I was pierced' gives a vivid but intelligible English equivalent and fits the parallel with the inner organs. It is preferable to the archaic 'pricked' while preserving the bodily metaphor.
