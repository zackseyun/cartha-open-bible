id: PSA.107.37
reference: Psalms 107:37
source:
  edition: WLC
  text: וַ/יִּזְרְע֣וּ שָׂ֭דוֹת וַ/יִּטְּע֣וּ כְרָמִ֑ים וַ֝/יַּעֲשׂ֗וּ פְּרִ֣י תְבֽוּאָה׃
translation:
  text: They sowed fields and planted vineyards[a], and produced the fruit of the harvest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'and they made fruit of produce.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְרְעוּ
  chosen: they sowed
  alternatives:
  - they planted
  - they seeded
  lexicon: HALOT
  rationale: Qal wayyiqtol of זרע, the standard verb for sowing seed. 'Sowed' is the most direct agricultural equivalent in English and fits the sequence of settlement and cultivation in the psalm.
- source_word: שָׂדוֹת
  chosen: fields
  alternatives:
  - farmland
  - open fields
  lexicon: HALOT
  rationale: Plural of שָׂדֶה, referring to cultivated land or fields. 'Fields' is the natural and sufficiently broad English rendering.
- source_word: וַיִּטְּעוּ
  chosen: planted
  alternatives:
  - set out
  - established
  lexicon: HALOT
  rationale: Qal wayyiqtol of נטע, commonly used for planting, especially trees or vineyards. 'Planted' preserves the concrete agricultural action.
- source_word: כְרָמִים
  chosen: vineyards
  alternatives:
  - vines
  lexicon: HALOT
  rationale: Plural of כֶּרֶם, meaning vineyard rather than merely individual vines. 'Vineyards' matches the collective agricultural sense.
- source_word: וַיַּעֲשׂוּ
  chosen: produced
  alternatives:
  - yielded
  - made
  lexicon: HALOT
  rationale: עשה can mean 'do/make,' but with agricultural fruit as object it idiomatically conveys production or yield. 'Produced' is natural modern English while staying close to the Hebrew sense.
- source_word: פְּרִי
  chosen: fruitful
  alternatives:
  - fruit
  - produce
  lexicon: HALOT
  rationale: פְּרִי literally means 'fruit' or 'produce.' In the collocation פְּרִי תְבוּאָה, a highly literal 'fruit of produce' is awkward in English. Rendering the phrase as 'fruitful harvest' captures the resultative agricultural abundance.
- source_word: תְבוּאָה
  chosen: harvest
  alternatives:
  - produce
  - yield
  - crops
  lexicon: HALOT
  rationale: תְבוּאָה denotes produce, yield, or harvest. In combination with פְּרִי, 'harvest' gives a clear idiomatic English expression for the agricultural output.
