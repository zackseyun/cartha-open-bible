id: PSA.87.5
reference: Psalms 87:5
source:
  edition: WLC
  text: וּֽ/לֲ/צִיּ֨וֹן יֵאָמַ֗ר אִ֣ישׁ וְ֭/אִישׁ יֻלַּד בָּ֑/הּ וְ/ה֖וּא יְכוֹנְנֶ֣/הָ עֶלְיֽוֹן׀־׃
translation:
  text: And of Zion it will be said[a], “This one and that one were born in her,” and the Most High himself will establish her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “man after man was born in her.” The Hebrew repeats “man and man” to express a distributive sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלֲצִיּוֹן
  chosen: And of Zion
  alternatives:
  - And concerning Zion
  - But of Zion
  lexicon: HALOT
  rationale: The preposition ל with Zion here introduces the topic, naturally rendered 'of Zion' or 'concerning Zion.' The prefixed conjunction is kept as 'And' for poetic continuity.
- source_word: יֵאָמַר
  chosen: it will be said
  alternatives:
  - one will say
  - it is said
  lexicon: HALOT
  rationale: Niphal imperfect of אמר is well rendered as an impersonal passive/future, 'it will be said,' fitting the psalm's declarative style.
- source_word: אִישׁ וְאִישׁ
  chosen: This man and that man
  alternatives:
  - man after man
  - each one
  - a man and a man
  lexicon: HALOT
  rationale: The repetition of אִישׁ is distributive, emphasizing individual persons one by one. 'This man and that man' preserves the distributive force in idiomatic English better than the wooden 'a man and a man.'
- source_word: יֻלַּד בָּהּ
  chosen: were born in her
  alternatives:
  - was born in her
  - has been born in her
  lexicon: HALOT
  rationale: Though the Hebrew verb is morphologically singular, with the distributive pair 'this man and that man' English idiom prefers the plural 'were born.' 'In her' preserves the feminine pronominal reference to Zion as city/mother.
- source_word: בָּהּ
  chosen: in her
  alternatives:
  - there
  - within her
  lexicon: HALOT
  rationale: The feminine singular suffix refers back to Zion. 'In her' retains the personified-city imagery better than flattening to 'there.'
- source_word: וְהוּא
  chosen: and ... himself
  alternatives:
  - and he
  - for he
  lexicon: HALOT
  rationale: The pronoun is emphatic. In English the emphasis is best conveyed by attaching 'himself' to the subject identified in apposition as 'the Most High.'
- source_word: יְכוֹנְנֶהָ
  chosen: will establish her
  alternatives:
  - will found her
  - will make her secure
  lexicon: HALOT
  rationale: כון in the polel/related stem can mean establish, set firm, make secure. 'Establish' best balances literalness and the theological-poetic sense of Zion's secure founding.
- source_word: עֶלְיוֹן
  chosen: the Most High
  alternatives:
  - Most High
  - the Exalted One
  lexicon: HALOT
  rationale: A divine title. 'The Most High' is the standard, clear English rendering and fits the psalm's elevated register.
