id: PSA.96.6
reference: Psalms 96:6
source:
  edition: WLC
  text: הוֹד וְ/הָדָ֥ר לְ/פָנָ֑י/ו עֹ֥ז וְ֝/תִפְאֶ֗רֶת בְּ/מִקְדָּשֽׁ/וֹ־׃
translation:
  text: Splendor and majesty are before him[a]; strength and beauty are in his sanctuary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strength and splendor are in his sanctuary.' The Hebrew תִפְאֶרֶת can also be rendered 'splendor' or 'glory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹד
  chosen: splendor
  alternatives:
  - honor
  - glory
  - majesty
  lexicon: HALOT
  rationale: הוֹד denotes stately magnificence or splendor. 'Splendor' fits the poetic pairing with הָדָר and avoids collapsing the two near-synonyms into the same English term.
- source_word: הָדָר
  chosen: majesty
  alternatives:
  - honor
  - beauty
  - glory
  lexicon: HALOT
  rationale: In poetic parallelism with הוֹד, הָדָר conveys majesty or stately honor. 'Majesty' preserves the royal, exalted sense and differentiates it from 'splendor.'
- source_word: לְפָנָיו
  chosen: are before him
  alternatives:
  - before him
  - in his presence
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'before him.' Supplying 'are' is required in English. 'Before him' preserves the spatial/presential imagery more directly than the more interpretive 'in his presence.'
- source_word: עֹז
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: HALOT
  rationale: עֹז commonly denotes strength or might. 'Strength' is clear, natural English and suits the poetic balance with תפארת.
- source_word: תִפְאֶרֶת
  chosen: beauty
  alternatives:
  - glory
  - splendor
  - ornament
  lexicon: HALOT
  rationale: תִפְאֶרֶת can mean beauty, glory, or splendor. Here 'beauty' pairs well with 'strength' and avoids repeating the semantic field already used for הוֹד/הָדָר. It also reflects the aesthetic dimension often present in the term.
- source_word: בְּמִקְדָּשׁוֹ
  chosen: in his sanctuary
  alternatives:
  - in his holy place
  - in his temple
  lexicon: HALOT
  rationale: מִקְדָּשׁ refers to a sanctuary or holy place. 'Sanctuary' is the broadest and most contextually appropriate rendering, preserving sacred-space language without over-specifying 'temple.'
