id: PSA.96.11
reference: Psalms 96:11
source:
  edition: WLC
  text: יִשְׂמְח֣וּ הַ֭/שָּׁמַיִם וְ/תָגֵ֣ל הָ/אָ֑רֶץ יִֽרְעַ֥ם הַ֝/יָּ֗ם וּ/מְלֹאֽ/וֹ׃
translation:
  text: Let the heavens rejoice[a], and let the earth be glad; let the sea thunder, and all that fills it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'let the sea roar, and all that is in it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׂמְחוּ
  chosen: Let ... rejoice
  alternatives:
  - shall rejoice
  - be glad
  lexicon: HALOT
  rationale: Qal imperfect 3mp of שׂמח in a jussive-like poetic sequence; rendered with English 'Let ... rejoice' to convey exhortative/volitive force in parallel with the following verbs, rather than a simple future.
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - heaven
  lexicon: HALOT
  rationale: Plural form commonly denotes the heavens/sky. 'The heavens' preserves the elevated poetic register and cosmic scope better than singular 'heaven' or flatter 'sky'.
- source_word: וְתָגֵל
  chosen: and let ... be glad
  alternatives:
  - and rejoice
  - and exult
  lexicon: HALOT
  rationale: From גיל, expressing joy/exultation. 'Be glad' provides natural English variation while preserving the parallel sense with the previous colon; 'rejoice' would be possible but would flatten the poetic distinction between שׂמח and גיל.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this cosmic praise context, 'earth' is preferable to 'land,' matching the heavens/sea triad.
- source_word: יִרְעַם
  chosen: let ... thunder
  alternatives:
  - roar
  - resound
  lexicon: HALOT
  rationale: From רעם, to thunder or make a loud tumult. 'Thunder' fits the sea's personified praise and preserves the storm-theophany resonance better than the more generic 'roar'.
- source_word: הַיָּם
  chosen: the sea
  alternatives:
  - the ocean
  lexicon: HALOT
  rationale: Standard rendering of ים; 'sea' is the normal biblical English equivalent and suits the poetic parallelism.
- source_word: וּמְלֹאוֹ
  chosen: and all that fills it
  alternatives:
  - and its fullness
  - and all that is in it
  lexicon: HALOT
  rationale: Literally 'and its fullness.' The idiom denotes everything contained in the sea. 'All that fills it' is a readable modern rendering that preserves the concrete sense of fullness without sounding wooden.
