theological_decisions:
- issue: Volitive force of the poetic imperfects
  chosen_reading: 'Render the sequence as exhortative: ''Let the heavens rejoice ... let the sea thunder.'''
  alternative_readings:
  - 'Predictive future: ''The heavens will rejoice ... the sea will thunder.'''
  rationale: In Hebrew poetry, imperfects in such parallel praise contexts often function jussively/volitively. The surrounding psalm summons creation to praise, so the exhortative English best reflects discourse function without adding theology.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text sense over tradition inertia.'
