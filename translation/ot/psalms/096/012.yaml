id: PSA.96.12
reference: Psalms 96:12
source:
  edition: WLC
  text: יַעֲלֹ֣ז שָׂ֭דַי וְ/כָל אֲשֶׁר בּ֑/וֹ אָ֥ז יְ֝רַנְּנ֗וּ כָּל עֲצֵי יָֽעַר־־־־׃
translation:
  text: Let the field exult[a], and all that is in it; then all the trees of the forest will sing for joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shout for joy.' The Hebrew verb can denote a ringing cry of joy; 'sing for joy' is chosen here because it suits the poetic personification of the trees.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעֲלֹז
  chosen: Let ... exult
  alternatives:
  - rejoice
  - be glad
  lexicon: HALOT
  rationale: The verb is a jussive/imperfect expressing a wish or summons in poetic parallelism. 'Let ... exult' preserves the volitional force and the elevated poetic tone better than a flat future. 'Exult' also matches the strong celebratory sense of the root.
- source_word: שָׂדַי
  chosen: the field
  alternatives:
  - the open field
  - the countryside
  lexicon: HALOT
  rationale: Although morphologically singular, it functions collectively in poetry. 'The field' is idiomatic English and fits the personification of creation in the surrounding context.
- source_word: וְכָל אֲשֶׁר בּוֹ
  chosen: and everything in it
  alternatives:
  - and all that is in it
  - with all that is in it
  lexicon: HALOT
  rationale: This phrase expands the field to include all its contents. 'Everything in it' is natural modern English while remaining faithful to the totalizing sense of כָל אֲשֶׁר בּוֹ.
- source_word: אָז
  chosen: then
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: 'אָז marks the next poetic movement or consequence: after the field and its contents exult, then the trees respond. ''Then'' is concise and preserves the discourse progression.'
- source_word: יְרַנְּנוּ
  chosen: will sing for joy
  alternatives:
  - will shout for joy
  - will cry out joyfully
  lexicon: HALOT
  rationale: The piel form commonly denotes ringing cries of joy. 'Sing for joy' fits the poetic personification of trees and is a well-established but still accurate English rendering; 'shout for joy' is possible but less fitting with trees as the subject.
- source_word: כָּל עֲצֵי יָעַר
  chosen: all the trees of the forest
  alternatives:
  - every tree of the forest
  - all the forest trees
  lexicon: HALOT
  rationale: The construct phrase is most naturally rendered 'trees of the forest.' 'All the trees of the forest' preserves the comprehensiveness of כָל and the imagery of the whole forest joining in praise.
