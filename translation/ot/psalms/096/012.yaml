theological_decisions:
- issue: Personification of creation in praise
  chosen_reading: Retain the poetic personification directly rather than paraphrasing it into human praise.
  alternative_readings:
  - Render as metaphorical description of nature's beauty or abundance
  rationale: The psalm explicitly portrays nonhuman creation as participating in joyful response before the LORD. Preserving this imagery maintains the theological scope of creation's praise without overexplaining it.
