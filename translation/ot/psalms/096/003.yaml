theological_decisions:
- issue: Universal scope of proclamation
  chosen_reading: The verse commands proclamation of the LORD's glory and acts to all nations/peoples universally.
  alternative_readings:
  - A narrower reference limited primarily to Israel's immediate neighbors
  rationale: The paired expressions גּוֹיִם and כָּל הָעַמִּים strongly emphasize broad international scope. The translation preserves that universal summons without importing later missiological formulations not explicit in the verse.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy: Preserve theological tension rather than resolve it'
