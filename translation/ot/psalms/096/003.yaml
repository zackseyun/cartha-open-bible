id: PSA.96.3
reference: Psalms 96:3
source:
  edition: WLC
  text: סַפְּר֣וּ בַ/גּוֹיִ֣ם כְּבוֹד֑/וֹ בְּ/כָל הָֽ֝/עַמִּ֗ים נִפְלְאוֹתָֽי/ו־׃
translation:
  text: Declare his glory among the nations[a], his wondrous deeds among all the peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his wonders' or 'his marvelous works.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סַפְּרוּ
  chosen: Declare
  alternatives:
  - Tell
  - Recount
  - Proclaim
  lexicon: HALOT
  rationale: Imperative plural of ספר in the piel, calling for public verbal recounting. 'Declare' fits the exhortational, proclamatory tone better than the more conversational 'tell,' while remaining natural English.
- source_word: בַגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם commonly means 'nations' or 'peoples.' In this psalm's universal worship context, 'nations' is the most natural rendering and avoids importing the later NT ethnic-religious nuance of 'Gentiles.' The preposition is rendered 'among' to convey proclamation in their midst.
- source_word: כְּבוֹדוֹ
  chosen: his glory
  alternatives:
  - his honor
  - his splendor
  lexicon: HALOT
  rationale: כָּבוֹד denotes weighty honor, glory, and splendor. 'Glory' is the standard and most theologically resonant rendering in praise contexts.
- source_word: בְּכָל הָעַמִּים
  chosen: among all the peoples
  alternatives:
  - among all the nations
  - to all the peoples
  lexicon: HALOT
  rationale: עַמִּים is best distinguished from גּוֹיִם here by rendering 'peoples,' preserving the poetic parallelism without flattening both cola into identical English. 'Among' matches the first colon's prepositional sense and keeps the parallel structure.
- source_word: נִפְלְאוֹתָיו
  chosen: his wondrous deeds
  alternatives:
  - his wonders
  - his marvelous works
  lexicon: HALOT
  rationale: From פלא, referring to extraordinary acts that evoke wonder. 'Wondrous deeds' communicates both the marvelous quality and the action-oriented sense better than the bare noun 'wonders.'
