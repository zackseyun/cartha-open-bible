theological_decisions:
- issue: Meaning of 'blameless' in relation to human moral status
  chosen_reading: '''Blameless'' denotes integrity/covenant faithfulness, not absolute sinlessness.'
  alternative_readings:
  - sinless perfection
  rationale: The psalm speaks of David's integrity in relation to his conduct and vindication, not a claim to metaphysical or total sinlessness. The translation avoids importing perfectionism while preserving the strong moral claim of the Hebrew.
  doctrine_reference: Preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.
