id: PSA.18.24
reference: Psalms 18:24
source:
  edition: WLC
  text: וָ/אֱהִ֣י תָמִ֣ים עִמּ֑/וֹ וָ֝/אֶשְׁתַּמֵּ֗ר מֵ/עֲוֺנִֽ/י׃
translation:
  text: I was blameless before him[c][b][a], and I kept myself from my iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whole' or 'upright'; 'blameless' here refers to integrity, not necessarily absolute sinlessness.
    reason: lexical_alternative
  - marker: b
    text: The pronoun 'him' refers to the LORD in the surrounding context.
    reason: cross_reference
  - marker: c
    text: Or 'from my guilt' or 'from my sin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֱהִי
  chosen: I was
  alternatives:
  - and I was
  - I became
  lexicon: HALOT
  rationale: Qal wayyiqtol 1cs of היה normally denotes simple past narrative sequence, here best rendered 'I was.' 'I became' is possible lexically but less natural in this poetic context.
- source_word: תָמִים
  chosen: blameless
  alternatives:
  - whole
  - integrity
  - upright
  lexicon: HALOT
  rationale: תמים in moral contexts commonly conveys integrity or blamelessness rather than sinless perfection. 'Blameless' fits the psalm's covenantal-moral setting and idiomatic English.
- source_word: עִמּוֹ
  chosen: with him
  alternatives:
  - before him
  - toward him
  lexicon: HALOT
  rationale: The preposition עם with 3ms suffix is most directly 'with him.' In context the referent is the LORD from surrounding verses, but the Hebrew here uses the pronoun, so the translation preserves that form rather than substituting the divine name.
- source_word: וָאֶשְׁתַּמֵּר
  chosen: I kept myself
  alternatives:
  - I guarded myself
  - I was on guard
  lexicon: HALOT
  rationale: 'Hitpael/imperfect consecutive of שמר here is reflexive: ''I kept/guarded myself.'' ''Kept myself'' is natural English and preserves the reflexive sense of self-watchfulness.'
- source_word: מֵעֲוֺנִי
  chosen: from my iniquity
  alternatives:
  - from my guilt
  - from my sin
  lexicon: HALOT
  rationale: עון often denotes iniquity, guilt, or culpable wrongdoing. 'Iniquity' preserves the moral weight and traditional nuance; the 1cs suffix is retained as 'my.' The preposition מן is rendered 'from,' indicating separation or restraint.
