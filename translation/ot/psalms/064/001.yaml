id: PSA.64.1
reference: Psalms 64:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֗חַ מִזְמ֥וֹר לְ/דָוִֽד׃
translation:
  text: For the choir director[a]. A psalm of David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by David' or 'for David'; the Hebrew phrase can indicate authorship, association, or dedication.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choir director
  alternatives:
  - For the music director
  - To the choirmaster
  - For the leader
  lexicon: HALOT
  rationale: In Psalm superscriptions, לַמְנַצֵּחַ conventionally denotes the person overseeing musical performance. 'Choir director' is clear modern English and fits the cultic-musical setting better than the overly generic 'leader.' 'To the choirmaster' is more formal/traditional but less natural for contemporary readers.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - A song
  - A melody
  lexicon: HALOT
  rationale: מִזְמוֹר is the standard genre label for a psalm, likely with musical connotations, but 'psalm' is the most accurate and established English equivalent for this heading term.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - for David
  - by David
  lexicon: HALOT
  rationale: The preposition ל in Psalm headings can indicate authorship, association, dedication, or collection. 'Of David' preserves that ambiguity better than 'by David,' which would over-specify authorship.
