id: PSA.10.13
reference: Psalms 10:13
source:
  edition: WLC
  text: עַל מֶ֤ה נִאֵ֖ץ רָשָׁ֥ע אֱלֹהִ֑ים אָמַ֥ר בְּ֝/לִבּ֗/וֹ לֹ֣א תִּדְרֹֽשׁ־׀׀׃
translation:
  text: Why does the wicked despise God? He says in his heart[a], “You will not require an account.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “He says in his heart, ‘He will not seek it out,’” that is, God will not investigate or require an account for wrongdoing.
    reason: alternative_reading
lexical_decisions:
- source_word: עַל מֶה
  chosen: Why
  alternatives:
  - For what reason
  - Why is it that
  lexicon: HALOT
  rationale: The idiom עַל מֶה introduces a rhetorical question asking for the reason. 'Why' is natural modern English and preserves the force without unnecessary literalism.
- source_word: נִאֵץ
  chosen: despise
  alternatives:
  - spurn
  - revile
  - treat with contempt
  lexicon: HALOT
  rationale: The verb carries the sense of showing contempt or scorn. 'Despise' is concise, idiomatic, and fits the psalm's moral accusation better than the more speech-specific 'revile.'
- source_word: רָשָׁע
  chosen: the wicked man
  alternatives:
  - the wicked
  - a wicked man
  lexicon: HALOT
  rationale: The singular adjective functions substantivally. 'The wicked man' preserves the masculine singular form in line with the gender-accurate policy, while still representing the generic wicked person.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים clearly refers to the God of Israel in singular sense, so 'God' is the natural English rendering.
- source_word: אָמַר בְּלִבּוֹ
  chosen: He says in his heart
  alternatives:
  - He has said in his heart
  - He says to himself
  lexicon: HALOT
  rationale: The Hebrew perfect can express the inner settled speech of the wicked. Present-tense English fits the gnomic portrayal in context. 'In his heart' preserves the Hebrew idiom of inward thought rather than flattening it to merely psychological paraphrase.
- source_word: לֹא תִדְרֹשׁ
  chosen: You will not call to account
  alternatives:
  - You will not seek it out
  - You will not require it
  - You will not investigate
  lexicon: HALOT
  rationale: דרשׁ in this context means to seek out in order to require or punish wrongdoing. Addressing God in the second person best fits the wicked man's inner speech. 'Call to account' communicates the judicial sense in clear modern English.
