id: PSA.11.3
reference: Psalms 11:3
source:
  edition: WLC
  text: כִּ֣י הַ֭/שָּׁתוֹת יֵֽהָרֵס֑וּ/ן צַ֝דִּ֗יק מַה פָּעָֽל־׃
translation:
  text: If the foundations are destroyed, what can the righteous do?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For the foundations are being torn down; what has the righteous one
      done?' The Hebrew permits a more formally past-oriented rendering of the final
      verb, though the contextual sense is commonly taken as 'what can the righteous
      do?'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - For
  - When
  - Indeed
  lexicon: HALOT
  rationale: 'Though often meaning ''for'' or introducing an explanation, in this
    poetic context it naturally introduces a conditional clause: ''If the foundations
    are destroyed.'' This matches the syntax and the rhetorical question that follows
    better than a causal ''for.'''
- source_word: הַשָּׁתוֹת
  chosen: the foundations
  alternatives:
  - the bases
  - the settled order
  - the pillars
  lexicon: HALOT
  rationale: The noun refers literally to foundations. In context it likely functions
    metaphorically for the underlying structures of social or moral order, but the
    main text preserves the concrete image 'foundations' rather than interpreting
    it more abstractly.
- source_word: יֵהָרֵסוּן
  chosen: are destroyed
  alternatives:
  - are torn down
  - are demolished
  - are overthrown
  lexicon: HALOT
  rationale: 'From הרס in the Niphal, the sense is passive/reflexive: ''be destroyed''
    or ''be torn down.'' ''Are destroyed'' is clear, natural English and preserves
    the passive force.'
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - the righteous man
  - a righteous person
  lexicon: HALOT
  rationale: The singular adjective is used representatively. 'The righteous' preserves
    the Hebrew's generic force without over-specifying gender, while still reflecting
    the singular class sense.
- source_word: מַה
  chosen: what
  alternatives:
  - what indeed
  - how
  lexicon: HALOT
  rationale: 'Introduces the rhetorical question straightforwardly: ''what can the
    righteous do?'' The Hebrew does not require expansion beyond this.'
- source_word: פָּעָל
  chosen: can do
  alternatives:
  - has done
  - does
  - can accomplish
  lexicon: HALOT
  rationale: Formally this is a qatal ('has done/did'), but in this rhetorical context
    English idiom is best served by 'can do,' expressing practical possibility under
    the condition just stated. A more wooden past tense ('what has the righteous done?')
    would shift the sense toward innocence or accusation, which fits the Hebrew less
    well in this verse's context.
