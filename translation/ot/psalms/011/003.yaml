theological_decisions:
- issue: Metaphorical scope of 'the foundations'
  chosen_reading: Retain the metaphor without specifying whether it refers to social
    order, justice, or covenantal structures.
  alternative_readings:
  - Interpret as the foundations of society
  - Interpret as the foundations of justice or moral order
  rationale: The Hebrew image is broad and evocative. To preserve theological and
    interpretive openness, the translation keeps 'foundations' in the main text rather
    than resolving the metaphor into one specific doctrinal or social category.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
