id: PSA.11.2
reference: Psalms 11:2
source:
  edition: WLC
  text: כִּ֤י הִנֵּ֪ה הָ/רְשָׁעִ֡ים יִדְרְכ֬וּ/ן קֶ֗שֶׁת כּוֹנְנ֣וּ חִצָּ֣/ם עַל יֶ֑תֶר לִ/יר֥וֹת בְּמוֹ אֹ֝֗פֶל לְ/יִשְׁרֵי לֵֽב־־־׃
translation:
  text: For look[a], the wicked bend the bow; they have fitted their arrow to the string to shoot in the darkness at the upright in heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the darkness.' The Hebrew phrase may emphasize either the dark setting of the attack or the concealment from which it is launched.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the reason or grounds for the preceding statement. 'For' best preserves the argumentative connection in context.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: Deictic particle drawing attention to an immediate threat. 'Look' is natural modern English and preserves the vividness without archaic tone.
- source_word: הָרְשָׁעִים
  chosen: the wicked
  alternatives:
  - the guilty
  - the evil ones
  lexicon: HALOT
  rationale: Standard rendering for רשעים in Psalms, referring to morally corrupt opponents rather than merely legally guilty persons.
- source_word: יִדְרְכוּן קֶשֶׁת
  chosen: bend the bow
  alternatives:
  - tread the bow
  - string the bow
  lexicon: HALOT
  rationale: The idiom literally involves treading/bending a bow in preparation for shooting. 'Bend the bow' communicates the conventional English equivalent of readying the weapon.
- source_word: כּוֹנְנוּ
  chosen: have fitted
  alternatives:
  - have prepared
  - have set
  lexicon: HALOT
  rationale: Conveys deliberate preparation. With the following phrase 'their arrow to the string,' 'have fitted' gives the concrete sense of setting the arrow in place.
- source_word: חִצָּם
  chosen: their arrow
  alternatives:
  - their arrows
  lexicon: HALOT
  rationale: The form is singular with 3mp suffix. English can use singular collectively, and singular fits the poetic image of a poised shot.
- source_word: עַל יֶתֶר
  chosen: to the string
  alternatives:
  - upon the string
  - on the bowstring
  lexicon: HALOT
  rationale: Refers to the bowstring. 'To the string' is idiomatic with 'fitted their arrow' and preserves the image of nocking the arrow.
- source_word: לִירוֹת
  chosen: to shoot
  alternatives:
  - to fire
  - to cast
  lexicon: HALOT
  rationale: Infinitive of ירה in the archery sense. 'To shoot' is the direct and natural equivalent.
- source_word: בְּמוֹ אֹפֶל
  chosen: in the darkness
  alternatives:
  - in gloom
  - in deep darkness
  - from darkness
  lexicon: HALOT
  rationale: The phrase denotes concealment or dark conditions. 'In the darkness' best captures the adverbial sense of covert attack. 'From darkness' is possible but less direct here.
- source_word: לְיִשְׁרֵי לֵב
  chosen: at the upright in heart
  alternatives:
  - at the upright of heart
  - at the honest-hearted
  lexicon: HALOT
  rationale: A common Hebrew expression for inward moral integrity. 'Upright in heart' preserves both the ethical and internal dimensions of the phrase.
