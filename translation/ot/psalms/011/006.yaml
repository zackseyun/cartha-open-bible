theological_decisions:
- issue: Whether to preserve the metaphor of the cup as an image of allotted judgment
  chosen_reading: Retain 'the portion of their cup' in the main text
  alternative_readings:
  - their allotted punishment
  - what they must drink
  rationale: The cup metaphor is biblically significant for divine judgment and should be preserved rather than paraphrased. This maintains intertextual resonance without importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §1, §3, §6
