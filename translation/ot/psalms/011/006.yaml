id: PSA.11.6
reference: Psalms 11:6
source:
  edition: WLC
  text: יַמְטֵ֥ר עַל רְשָׁעִ֗ים פַּ֫חִ֥ים אֵ֣שׁ וְ֭/גָפְרִית וְ/ר֥וּחַ זִלְעָפ֗וֹת מְנָ֣ת כּוֹסָֽ/ם־׃
translation:
  text: He will rain down snares on the wicked[a]; fire and sulfur and a scorching wind will be the portion of their cup.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'coals' instead of 'traps'; the Hebrew consonantal text reads 'traps/snares,' but some ancient witnesses and translations reflect a reading that fits the fire imagery.
    reason: alternative_reading
lexical_decisions:
- source_word: יַמְטֵר
  chosen: He will rain down
  alternatives:
  - He will rain
  - He causes to rain
  lexicon: HALOT
  rationale: Hiphil of מטר means to cause to rain or rain down. 'Rain down' is idiomatic in English and preserves the causative force without awkwardness.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - evildoers
  lexicon: HALOT
  rationale: A standard rendering for the plural adjective/noun רשעים. 'The wicked' is concise, natural, and preserves the moral category.
- source_word: פַּחִים
  chosen: traps
  alternatives:
  - snares
  - coals
  lexicon: HALOT
  rationale: The consonantal text points to פחים, normally 'traps/snares.' Some ancient versions and some translations reflect a different reading yielding 'coals,' likely influenced by the surrounding fire imagery. The MT reading is retained in the main text as the plain Hebrew form, while the alternative is preserved in a footnote.
- source_word: אֵשׁ וְגָפְרִית
  chosen: fire and sulfur
  alternatives:
  - fire and brimstone
  lexicon: HALOT
  rationale: Literally 'fire and sulfur.' 'Sulfur' is more accessible modern English than 'brimstone' while preserving the same referent and the allusion to divine judgment.
- source_word: רוּחַ זִלְעָפוֹת
  chosen: a scorching wind
  alternatives:
  - a burning wind
  - a wind of terrors
  - a blast of burning heat
  lexicon: HALOT
  rationale: The phrase denotes a destructive, searing wind associated with judgment. 'Scorching wind' is clear modern English and fits the collocation with fire and sulfur.
- source_word: מְנָת כּוֹסָם
  chosen: the portion of their cup
  alternatives:
  - their allotted cup
  - the share of their cup
  lexicon: HALOT
  rationale: This idiom refers to an allotted destiny or assigned judgment. 'The portion of their cup' preserves the metaphor rather than flattening it into interpretation.
