id: PSA.123.0
reference: Psalms 123:0
source:
  edition: WLC
  text: שִׁ֗יר הַֽ/מַּ֫עֲל֥וֹת אֵ֭לֶי/ךָ נָשָׂ֣אתִי אֶת עֵינַ֑/י הַ֝/יֹּשְׁבִ֗י בַּ/שָּׁמָֽיִם־׃
translation:
  text: A Song of Ascents.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "you who sit in the heavens"; the Hebrew verb literally means "sit/dwell," but here likely carries royal overtones, hence "enthroned."
    reason: lexical_alternative
  - marker: b
    text: Hebrew "in the heavens"; some English versions simplify to "in heaven."
    reason: lexical_alternative
status: revised
is_superscription: true
