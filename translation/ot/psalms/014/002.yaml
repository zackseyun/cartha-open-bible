id: PSA.14.2
reference: Psalms 14:2
source:
  edition: WLC
  text: יְֽהוָ֗ה מִ/שָּׁמַיִם֮ הִשְׁקִ֪יף עַֽל בְּנֵי אָ֫דָ֥ם לִ֭/רְאוֹת הֲ/יֵ֣שׁ מַשְׂכִּ֑יל דֹּ֝רֵשׁ אֶת אֱלֹהִֽים־־־׃
translation:
  text: Yahweh looks down from heaven on the children of man to see whether there is one who has insight[a], one who seeks God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the sons of man,' a representative expression meaning human beings generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִשָּׁמַיִם
  chosen: from heaven
  alternatives:
  - from the heavens
  lexicon: HALOT
  rationale: Although the Hebrew form is plural, in English this commonly functions idiomatically as the singular 'heaven' for God's dwelling/place of vantage. 'The heavens' is possible but less natural here.
- source_word: הִשְׁקִיף
  chosen: looks down
  alternatives:
  - looked down
  - gazes down
  - peers down
  lexicon: HALOT
  rationale: The verb denotes looking out/down from an elevated place. Present tense is used for vivid poetic style in English psalm translation; 'looks down' is natural and preserves the imagery.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: '''On'' is idiomatic with ''looks down ... on'' in English and preserves the relational sense.'
- source_word: בְּנֵי אָדָם
  chosen: the sons of man
  alternatives:
  - the children of man
  - humankind
  - mankind
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of man/humanity.' Per doctrine, gender-accurate renderings are preferred over flattening to gender-neutral language when the source uses masculine representative language. This phrase is a Hebrew idiom for human beings generally, but the literal form is worth preserving in the main text.
- source_word: לִרְאוֹת
  chosen: to see
  alternatives:
  - to observe
  lexicon: HALOT
  rationale: Simple infinitive of purpose; 'to see' is the most direct and natural rendering.
- source_word: הֲיֵשׁ
  chosen: whether there is
  alternatives:
  - if there is
  - is there
  lexicon: HALOT
  rationale: Introduces the content of what the LORD is looking to determine; 'whether there is' fits smooth English syntax.
- source_word: מַשְׂכִּיל
  chosen: one who has insight
  alternatives:
  - one who understands
  - one who is wise
  - an insightful person
  lexicon: HALOT
  rationale: From שכל, denoting understanding/insight. 'One who has insight' preserves the adjectival-participial force without overinterpreting as technical wisdom terminology.
- source_word: דֹּרֵשׁ
  chosen: one who seeks
  alternatives:
  - seeking
  - one who inquires after
  lexicon: HALOT
  rationale: Active participle describing the kind of person sought. Repeating 'one who' in English clarifies the parallel description with מַשְׂכִּיל.
- source_word: אֶת אֱלֹהִים
  chosen: God
  alternatives:
  - God himself
  lexicon: HALOT
  rationale: Direct-object marker plus 'God'; simply rendered 'God' in English. No added emphasis is required.
