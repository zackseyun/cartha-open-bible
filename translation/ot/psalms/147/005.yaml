theological_decisions:
- issue: Rendering the divine title אֲדוֹנֵינוּ in a psalm of praise
  chosen_reading: our Lord
  alternative_readings:
  - our master
  rationale: The verse uses אֲדוֹן with first person plural suffix, not the divine
    name YHWH. 'Our Lord' preserves the title sense without importing the covenant-name
    convention 'the LORD.'
