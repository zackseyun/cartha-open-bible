id: PSA.147.5
reference: Psalms 147:5
source:
  edition: WLC
  text: גָּד֣וֹל אֲדוֹנֵ֣י/נוּ וְ/רַב כֹּ֑חַ לִ֝/תְבוּנָת֗/וֹ אֵ֣ין מִסְפָּֽר־׃
translation:
  text: Great is our Lord, and abundant in power; his understanding is beyond number.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his understanding is without number' or 'innumerable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּדוֹל
  chosen: Great
  alternatives:
  - great
  lexicon: HALOT
  rationale: Predicate adjective opening the verse; 'Great is' preserves the Hebrew
    word order and doxological force better than a flatter 'Our Lord is great.'
- source_word: אֲדוֹנֵינוּ
  chosen: our Lord
  alternatives:
  - our master
  lexicon: HALOT
  rationale: Rendered 'Lord' for אֲדוֹן as the standard title in biblical English
    and in keeping with the project's default for cognate title usage. The possessive
    suffix is retained as 'our.'
- source_word: וְרַב
  chosen: and abundant
  alternatives:
  - and great
  - and mighty
  lexicon: HALOT
  rationale: רַב here conveys abundance or greatness in degree. 'Abundant' fits naturally
    with the following noun 'power' and avoids awkward repetition of 'great.'
- source_word: כֹּחַ
  chosen: power
  alternatives:
  - strength
  - might
  lexicon: HALOT
  rationale: A common rendering for כֹּחַ denoting capacity or might. 'Power' is idiomatic
    with 'abundant' and suits the praise context.
- source_word: לִתְבוּנָתוֹ
  chosen: his understanding
  alternatives:
  - his discernment
  - his insight
  lexicon: HALOT
  rationale: 'תְּבוּנָה denotes understanding, insight, or discernment. ''Understanding''
    is the most standard and broadly comprehensible rendering; the prefixed ל is taken
    in the idiom with אֵין מִסְפָּר, expressing relation: ''for/to his understanding
    there is no number,'' naturally rendered in English as ''his understanding is
    beyond number.'''
- source_word: אֵין מִסְפָּר
  chosen: is beyond number
  alternatives:
  - there is no number
  - is without number
  - is innumerable
  lexicon: HALOT
  rationale: This Hebrew idiom means that something cannot be counted. 'Beyond number'
    is natural modern English while remaining close to the imagery of counting.
