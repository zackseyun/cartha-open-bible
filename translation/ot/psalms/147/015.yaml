theological_decisions:
- issue: Nature of divine speech in poetic parallelism
  chosen_reading: Render God's speech as effective command/word without importing later doctrinal categories such as the personal Logos.
  alternative_readings:
  - Translate both nouns identically as 'word'
  - Read the verse as implicitly christological in the main text
  rationale: The psalm speaks of God's powerful speech in creation and providence. The translation should preserve that theological weight while not importing explicit christological claims the Hebrew text itself does not state.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
