id: PSA.147.15
reference: Psalms 147:15
source:
  edition: WLC
  text: הַ/שֹּׁלֵ֣חַ אִמְרָת֣/וֹ אָ֑רֶץ עַד מְ֝הֵרָ֗ה יָר֥וּץ דְּבָרֽ/וֹ־׃
translation:
  text: He sends his command to the earth[b][a]; his word runs swiftly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his utterance' for 'his command' (אִמְרָתוֹ).
    reason: lexical_alternative
  - marker: b
    text: Or 'swiftly' or 'with speed'; the Hebrew expression intensifies rapid movement.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֹּׁלֵחַ
  chosen: He sends
  alternatives:
  - the one who sends
  - sending
  lexicon: HALOT
  rationale: The participle functions verbally in context, continuing the description of God's ongoing action. English finite verbal style is more natural than a bare participial phrase here.
- source_word: אִמְרָתוֹ
  chosen: his command
  alternatives:
  - his utterance
  - his saying
  - his word
  lexicon: HALOT
  rationale: אִמְרָה often denotes an utterance or spoken word, but in this context of God's effective speech sent into creation, 'command' best captures the performative force without over-paraphrasing. This also preserves a meaningful distinction from the later דְּבָרוֹ in the same verse.
- source_word: אָרֶץ
  chosen: to the earth
  alternatives:
  - to earth
  - to the land
  lexicon: HALOT
  rationale: With the verb 'sends,' English idiom prefers 'to the earth.' 'Earth' fits the cosmic scope of the psalm better than the more localized 'land'.
- source_word: עַד מְהֵרָה
  chosen: very swiftly
  alternatives:
  - swiftly
  - with speed
  - quickly
  lexicon: HALOT
  rationale: The phrase intensifies speed. 'Very swiftly' conveys the adverbial force of the construction more clearly than a simple 'swiftly.'
- source_word: יָרוּץ
  chosen: runs
  alternatives:
  - hastens
  - rushes
  lexicon: HALOT
  rationale: The verb's basic sense is 'run.' Retaining that image preserves the poetic personification of God's word in motion.
- source_word: דְּבָרוֹ
  chosen: his word
  alternatives:
  - his matter
  - his decree
  lexicon: HALOT
  rationale: '''Word'' is the most natural and contextually fitting rendering here, especially in parallel with the preceding term for divine speech. Using a different English term from אִמְרָתוֹ preserves the Hebrew poetic variation while keeping the semantic overlap.'
