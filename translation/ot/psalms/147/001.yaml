theological_decisions:
- issue: Rendering of the divine name יָהּ
  chosen_reading: Yah
  alternative_readings:
  - the LORD
  rationale: The source uses the abbreviated divine name יָהּ rather than the full
    tetragrammaton. To translate it as 'the LORD' would obscure the distinct form
    and the connection to 'Hallelujah.' This does not conflict with the doctrine guideline
    for יְהוָה, which addresses the full divine name specifically.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table applies to יְהוָה YHWH, not necessarily the short form יָהּ.'
