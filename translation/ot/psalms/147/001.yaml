id: PSA.147.1
reference: Psalms 147:1
source:
  edition: WLC
  text: הַ֥לְלוּ יָ֨הּ כִּי ט֭וֹב זַמְּרָ֣ה אֱלֹהֵ֑י/נוּ כִּֽי נָ֝עִים נָאוָ֥ה תְהִלָּֽה׀־־׃
translation:
  text: Praise Yah, for it is good to sing praises to our God; for it is pleasant
    and praise is fitting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yah,'' the short form of the divine name; many translations render
      it ''the LORD.'''
    reason: alternative_reading
  - marker: b
    text: Or 'for praise is beautiful' / 'for praise is becoming,' reflecting the
      sense of what is lovely or fitting.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַ֥לְלוּ
  chosen: Praise
  alternatives:
  - Praise!
  - Give praise
  lexicon: HALOT
  rationale: Imperative plural of הלל opening a psalmic summons. English imperative
    'Praise' best preserves the direct exhortation without adding words.
- source_word: יָ֨הּ
  chosen: Yah
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: This is the short form of the divine name, not the full tetragrammaton
    יְהוָה. Since the doctrine table's default 'the LORD' applies specifically to
    YHWH, retaining 'Yah' here preserves the source form and the liturgical force
    of Hallelu-Yah.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces grounds for the call to praise. 'For' is concise
    and natural in elevated English.
- source_word: ט֭וֹב
  chosen: good
  alternatives:
  - pleasant
  - beneficial
  lexicon: HALOT
  rationale: The adjective straightforwardly states the goodness of the act of praise.
    'Good' preserves the broad evaluative sense better than narrowing it to aesthetic
    pleasure.
- source_word: זַמְּרָ֣ה
  chosen: to sing praises
  alternatives:
  - to make music
  - to sing
  lexicon: HALOT
  rationale: From זמר, referring to musical praise. 'To sing praises' captures both
    the musical and devotional sense better than bare 'sing'.
- source_word: אֱלֹהֵ֑ינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Construct with first person plural suffix; standard and direct rendering.
- source_word: נָ֝עִים
  chosen: pleasant
  alternatives:
  - sweet
  - lovely
  - delightful
  lexicon: HALOT
  rationale: Describes the quality of praise in aesthetically and experientially positive
    terms. 'Pleasant' is natural modern English and pairs well with the following
    clause.
- source_word: נָאוָ֥ה
  chosen: fitting
  alternatives:
  - beautiful
  - comely
  - becoming
  lexicon: HALOT
  rationale: The adjective conveys what is suitable or becoming. 'Fitting' communicates
    propriety clearly in modern English; 'beautiful' is possible but can overemphasize
    aesthetics over suitability.
- source_word: תְהִלָּֽה
  chosen: praise
  alternatives:
  - a song of praise
  lexicon: HALOT
  rationale: Abstract noun naming the act/content of praise. Rendered simply as 'praise'
    to match the Hebrew terseness.
