id: PSA.147.4
reference: Psalms 147:4
source:
  edition: WLC
  text: מוֹנֶ֣ה מִ֭סְפָּר לַ/כּוֹכָבִ֑ים לְ֝/כֻלָּ֗/ם שֵׁמ֥וֹת יִקְרָֽא׃
translation:
  text: He counts the number of the stars; he calls all of them by name.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מוֹנֶה
  chosen: counts
  alternatives:
  - numbers
  - determines the number of
  lexicon: HALOT
  rationale: The participle from מנה denotes counting or numbering. In English, 'counts'
    is the most natural finite rendering in this verbless-participle poetic construction
    and pairs well with the following object 'the number of the stars.'
- source_word: מִסְפָּר
  chosen: the number of
  alternatives:
  - a number for
  - the count of
  lexicon: HALOT
  rationale: מִסְפָּר means 'number, count.' With מנה it forms the idiom 'count the
    number of.' Rendering it explicitly preserves the Hebrew emphasis on exact enumeration
    rather than a vague awareness.
- source_word: לַכּוֹכָבִים
  chosen: the stars
  alternatives:
  - for the stars
  lexicon: HALOT
  rationale: The prefixed ל here functions idiomatically with מִסְפָּר after מנה,
    not as a strongly separate 'for.' English idiom is best served by 'the stars'
    in the phrase 'counts the number of the stars.'
- source_word: לְכֻלָּם
  chosen: all of them
  alternatives:
  - them all
  - all
  lexicon: HALOT
  rationale: The phrase means 'to all of them.' 'All of them' preserves the distributive
    sense and makes clear that every star is included.
- source_word: שֵׁמוֹת
  chosen: by name
  alternatives:
  - names
  - their names
  lexicon: HALOT
  rationale: Literally 'names,' but in English the idiom with קרא is 'call by name.'
    This communicates individual naming without awkwardness.
- source_word: יִקְרָא
  chosen: he calls
  alternatives:
  - he names
  - he summons
  lexicon: HALOT
  rationale: קרא can mean call, name, or summon depending on context. Here, with 'names'
    and the object 'all of them,' the sense is that God calls or names each star individually.
    'He calls all of them by name' is idiomatic English and preserves the personal,
    comprehensive force.
