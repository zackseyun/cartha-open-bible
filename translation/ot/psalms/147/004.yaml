- issue: Divine subject implied rather than stated
  chosen_reading: Use 'He' as the subject, referring back to God in the surrounding
    context.
  rationale: The Hebrew verse has no explicit subject noun, but the finite verb naturally
    continues the subject from the surrounding praise of the LORD. Capitalizing 'He'
    is avoided as an interpretive convention not required by the source text.
