id: PSA.147.17
reference: Psalms 147:17
source:
  edition: WLC
  text: מַשְׁלִ֣יךְ קַֽרְח֣/וֹ כְ/פִתִּ֑ים לִ/פְנֵ֥י קָ֝רָת֗/וֹ מִ֣י יַעֲמֹֽד׃
translation:
  text: He throws down his ice like crumbs; who can stand before his cold?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like morsels' or 'like pieces.' The Hebrew image is of small broken
      bits, likely evoking bread fragments.
    reason: lexical_alternative
  - marker: b
    text: Or 'who can withstand his cold?'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשְׁלִיךְ
  chosen: throws down
  alternatives:
  - casts
  - throws
  lexicon: HALOT
  rationale: Hiphil participle of שלך conveys causing something to be thrown/cast.
    Present-tense English suits the poetic descriptive sequence in this context. 'Throws
    down' preserves the vivid force better than a flatter 'gives.'
- source_word: קַרְחוֹ
  chosen: his ice
  alternatives:
  - his frost
  - his hail
  lexicon: HALOT
  rationale: קֶרַח most commonly denotes ice/frost. In this verse, paired with 'like
    crumbs' and followed by 'his cold,' 'ice' best captures the concrete image of
    frozen precipitation or ice particles. 'Frost' is possible but less natural with
    'throws down.'
- source_word: כְפִתִּים
  chosen: like crumbs
  alternatives:
  - like morsels
  - like pieces
  lexicon: HALOT
  rationale: פִּתִּים refers to pieces or morsels, especially broken bits of bread.
    'Crumbs' gives a natural English image matching the simile of small scattered
    pieces.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the face of
  - at the presence of
  lexicon: HALOT
  rationale: Standard prepositional sense 'before/in front of.' In the rhetorical
    question, 'before' is idiomatic and clear.
- source_word: קָרָתוֹ
  chosen: his cold
  alternatives:
  - his frost
  - his freezing cold
  lexicon: HALOT
  rationale: קָרָה denotes cold. The suffix marks it as belonging to God in the poetic
    depiction of his control over weather. 'His cold' is concise and preserves the
    possessive force.
- source_word: מִי יַעֲמֹד
  chosen: who can stand
  alternatives:
  - who can endure
  - who can withstand
  lexicon: HALOT
  rationale: Literally 'who will stand,' but in this rhetorical context the sense
    is ability to endure or remain standing before the force of the cold. 'Who can
    stand' keeps the Hebrew image while remaining idiomatic.
