id: PSA.147.14
reference: Psalms 147:14
source:
  edition: WLC
  text: הַ/שָּׂם גְּבוּלֵ֥/ךְ שָׁל֑וֹם חֵ֥לֶב חִ֝טִּ֗ים יַשְׂבִּיעֵֽ/ךְ־׃
translation:
  text: He makes your borders peaceful; he satisfies you with the finest wheat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the fat of wheat,' a Hebrew idiom for the richest or best wheat.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשָּׂם
  chosen: He makes
  alternatives:
  - the one who sets
  - who makes
  lexicon: HALOT
  rationale: From שׂוּם, 'to set, place, make.' In this participial clause referring
    back to God, English finite verbal style is more natural than a bare participle.
    'Makes' captures the causative sense in context.
- source_word: גְּבוּלֵךְ
  chosen: your borders
  alternatives:
  - your boundary
  - your territory
  lexicon: HALOT
  rationale: גְּבוּל commonly denotes border, boundary, or territory. The plural-like
    construct with 2fs suffix is idiomatically rendered 'your borders,' fitting Zion/Jerusalem
    addressed as feminine in the surrounding context.
- source_word: שָׁלוֹם
  chosen: peaceful
  alternatives:
  - peace
  - well-being
  - security
  lexicon: HALOT
  rationale: Here שָׁלוֹם functions predicatively after 'sets/makes your borders,'
    expressing the condition of the borders. 'Peaceful' is idiomatic English; 'peace'
    would be more wooden ('makes your borders peace'). The semantic range includes
    peace, well-being, and security.
- source_word: חֵלֶב
  chosen: the finest
  alternatives:
  - fat
  - richest part
  - best
  lexicon: HALOT
  rationale: Literally 'fat,' but in Hebrew this often denotes the richest or best
    portion. In English, 'the finest' communicates the idiom naturally in connection
    with wheat, avoiding misleadingly literal 'fat of wheat' while preserving the
    superlative sense.
- source_word: חִטִּים
  chosen: wheat
  alternatives:
  - grain
  lexicon: HALOT
  rationale: The noun specifically means 'wheat,' not grain in general. The plural
    form is naturally rendered by the English mass noun 'wheat.'
- source_word: יַשְׂבִּיעֵךְ
  chosen: he satisfies you
  alternatives:
  - he fills you
  - he gives you abundance
  lexicon: HALOT
  rationale: Hiphil of שׂבע means to satisfy, fill, or sate. 'Satisfies you' best
    matches both the lexical sense and the poetic context of divine provision.
