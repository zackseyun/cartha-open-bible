id: PSA.147.3
reference: Psalms 147:3
source:
  edition: WLC
  text: הָ֭/רֹפֵא לִ/שְׁב֣וּרֵי לֵ֑ב וּ֝/מְחַבֵּ֗שׁ לְ/עַצְּבוֹתָֽ/ם׃
translation:
  text: He heals the brokenhearted and binds up their wounds[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their pains' or 'their injuries.' The Hebrew term can denote hurt or pain; 'wounds' is chosen because it fits the image of binding up.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרֹפֵא
  chosen: he heals
  alternatives:
  - the one who heals
  - he is healing
  lexicon: HALOT
  rationale: Qal participle of רפא functions predicatively/descriptively in the psalm's praise context. English finite present 'he heals' is natural and captures the habitual character of God's action better than a more wooden participial form.
- source_word: לִשְׁבוּרֵי לֵב
  chosen: the brokenhearted
  alternatives:
  - those broken of heart
  - the broken in heart
  lexicon: HALOT
  rationale: Construct phrase literally means 'the broken of heart.' The idiomatic English adjective 'brokenhearted' preserves the metaphor and reads naturally without loss of meaning.
- source_word: וּמְחַבֵּשׁ
  chosen: and binds up
  alternatives:
  - and bandages
  - and dresses
  lexicon: HALOT
  rationale: The participle from חבש in healing contexts means to bind or bandage wounds. 'Binds up' is standard, clear English that preserves the concrete medical imagery.
- source_word: לְעַצְּבוֹתָם
  chosen: their wounds
  alternatives:
  - their pains
  - their sorrows
  - their injuries
  lexicon: HALOT
  rationale: The noun עצבות can denote pains/hurts; in parallel with 'binds up' the concrete sense 'wounds' best fits the healing metaphor. 'Sorrows' would shift the image too far toward abstraction, though emotional pain remains included by the parallelism.
