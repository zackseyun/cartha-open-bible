theological_decisions:
- issue: Scope of healing imagery
  chosen_reading: Retain both emotional and physical-healing imagery without narrowing the verse to either exclusively spiritual comfort or bodily healing.
  alternative_readings:
  - purely metaphorical inner healing
  - primarily physical healing
  rationale: The parallelism joins 'brokenhearted' with 'binds up their wounds,' intentionally blending inner anguish and injury imagery. The translation preserves this tension rather than resolving it into a doctrinally narrower claim.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
