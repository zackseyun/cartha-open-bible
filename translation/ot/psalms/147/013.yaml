theological_decisions:
- issue: Personified feminine singular addressee
  chosen_reading: The verse addresses Jerusalem/Zion as a feminine singular city,
    retained through repeated 'your' and 'within you.'
  alternative_readings:
  - A more explicit rendering naming Jerusalem in the verse
  rationale: The Hebrew suffixes are feminine singular, indicating the city as a personified
    addressee. English can preserve this without inserting a proper name not present
    in the verse.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering בנים in a civic context
  chosen_reading: your children
  alternative_readings:
  - your sons
  rationale: The Hebrew term can be male-specific or collective. In this psalm's address
    to the city and its inhabitants, the collective sense is more likely. This follows
    the gender-accurate principle by matching contextual intent rather than defaulting
    to a male-only rendering.
  doctrine_reference: Translation philosophy §4
