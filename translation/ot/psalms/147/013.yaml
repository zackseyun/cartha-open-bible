id: PSA.147.13
reference: Psalms 147:13
source:
  edition: WLC
  text: כִּֽי חִ֭זַּק בְּרִיחֵ֣י שְׁעָרָ֑יִ/ךְ בֵּרַ֖ךְ בָּנַ֣יִ/ךְ בְּ/קִרְבֵּֽ/ךְ־׃
translation:
  text: For he has strengthened the bars of your gates; he has blessed your children
    within you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your sons.' The Hebrew בנים can be specifically male or a broader term
      for children/descendants; here the broader civic sense fits the address to Jerusalem.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in your midst.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding praise statement. 'For' fits
    the poetic flow in English while preserving the causal sense.
- source_word: חִזַּק
  chosen: has strengthened
  alternatives:
  - made strong
  - fortified
  lexicon: HALOT
  rationale: Piel perfect of חזק conveys causing strength or making firm. 'Has strengthened'
    preserves the completed action and works naturally with the object 'bars of your
    gates.'
- source_word: בְּרִיחֵי
  chosen: bars
  alternatives:
  - bolts
  - crossbars
  lexicon: HALOT
  rationale: Refers to the bars or bolts securing a gate. 'Bars' is the most natural
    general English term and avoids over-specifying the mechanism.
- source_word: שְׁעָרַיִךְ
  chosen: your gates
  alternatives:
  - your gate entrances
  lexicon: HALOT
  rationale: Plural construct with 2fs suffix, addressed to Jerusalem/Zion as a feminine
    singular city. 'Your gates' is the standard and accurate rendering.
- source_word: בֵּרַךְ
  chosen: has blessed
  alternatives:
  - has bestowed blessing on
  lexicon: HALOT
  rationale: Piel perfect of ברך means to bless. 'Has blessed' is direct, idiomatic,
    and preserves the verbal force.
- source_word: בָּנַיִךְ
  chosen: your children
  alternatives:
  - your sons
  lexicon: HALOT
  rationale: Although בנים can mean 'sons,' it also commonly denotes children more
    generally. In a civic address to Jerusalem, 'your children' best captures the
    inhabitants/offspring within the city without unnecessarily narrowing by sex.
- source_word: בְּקִרְבֵּךְ
  chosen: within you
  alternatives:
  - in your midst
  - inside you
  lexicon: HALOT
  rationale: Literally 'in your midst,' with 2fs suffix referring to the city. 'Within
    you' is natural in English and preserves the personified address to Jerusalem.
