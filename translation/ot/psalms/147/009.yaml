theological_decisions:
- issue: Whether to make explicit that the ravens cry out to God
  chosen_reading: 'Leave the object implicit: ''that cry out'''
  alternative_readings:
  - that call to him
  - when they cry
  rationale: The Hebrew does not explicitly state the addressee of the cry. Preserving the implicit wording avoids importing a theological claim beyond the text while still fitting the psalm's portrayal of God's providential care.
