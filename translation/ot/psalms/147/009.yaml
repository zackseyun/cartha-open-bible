id: PSA.147.9
reference: Psalms 147:9
source:
  edition: WLC
  text: נוֹתֵ֣ן לִ/בְהֵמָ֣ה לַחְמָ֑/הּ לִ/בְנֵ֥י עֹ֝רֵ֗ב אֲשֶׁ֣ר יִקְרָֽאוּ׃
translation:
  text: He gives food to the animals[b][a], and to the young ravens that cry out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the raven's young' or more literally 'to the sons of the raven.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'that call'; the text does not explicitly state the one to whom they cry out.
    reason: lexical_alternative
lexical_decisions:
- source_word: נוֹתֵן
  chosen: He gives
  alternatives:
  - giving
  - the one who gives
  lexicon: HALOT
  rationale: Qal participle of נתן used predicatively in the psalm's praise context; English finite present 'He gives' is the most natural rendering while preserving the habitual sense.
- source_word: לִבְהֵמָה
  chosen: to the animals
  alternatives:
  - to the beast
  - to cattle
  lexicon: HALOT
  rationale: בְּהֵמָה can denote beast/animal, sometimes specifically livestock, but here the parallel with ravens suggests a broader category of animals rather than only domesticated cattle. 'Animals' is clear modern English.
- source_word: לַחְמָהּ
  chosen: food
  alternatives:
  - its bread
  - its food
  lexicon: HALOT
  rationale: Though literally 'its bread,' לֶחֶם often means food in general. In English, 'food' better conveys the sense for animals without importing an overly literal 'bread' that would sound misleading.
- source_word: לִבְנֵי עֹרֵב
  chosen: to the young ravens
  alternatives:
  - to the sons of the raven
  - to the raven's young
  lexicon: HALOT
  rationale: בְּנֵי plus an animal commonly means its young/offspring. 'Young ravens' is idiomatic English and preserves the image.
- source_word: אֲשֶׁר יִקְרָאוּ
  chosen: that cry out
  alternatives:
  - which call
  - that call to him
  lexicon: HALOT
  rationale: קרא means call/cry out. The object is unstated in Hebrew, so 'cry out' preserves the vivid sense without adding 'to him,' though the context implies dependence on God.
