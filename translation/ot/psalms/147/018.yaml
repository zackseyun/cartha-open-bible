id: PSA.147.18
reference: Psalms 147:18
source:
  edition: WLC
  text: יִשְׁלַ֣ח דְּבָר֣/וֹ וְ/יַמְסֵ֑/ם יַשֵּׁ֥ב ר֝וּח֗/וֹ יִזְּלוּ מָֽיִם־׃
translation:
  text: He sends out his word and melts them; he makes his wind blow, and the waters
    flow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his spirit' or 'his breath' for 'his wind.' The Hebrew word can carry
      any of these senses, but 'wind' best fits the weather imagery here.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁלַח
  chosen: sends out
  alternatives:
  - sends
  - dispatches
  lexicon: HALOT
  rationale: Qal imperfect 3ms of שׁלח expresses ongoing or characteristic action
    in poetic context. 'Sends out' preserves the concrete verbal force and reads naturally
    in English.
- source_word: דְּבָרוֹ
  chosen: his word
  alternatives:
  - his command
  - his message
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'command.' In this psalm's sequence
    of divine speech effecting weather (cf. surrounding verses), 'his word' preserves
    the poetic personification and allows the implied commanding force without over-specifying.
- source_word: וַיְמְסֵם
  chosen: and melts them
  alternatives:
  - and causes them to melt
  - and thaws them
  lexicon: HALOT
  rationale: Hiphil imperfect of מסס with 3mp suffix means 'cause them to melt.' The
    object is implicit from the prior verse's ice/frost/hail imagery, so 'them' is
    retained rather than supplied as 'ice' in the main text. 'Melts' is concise and
    natural; 'thaws' is possible but narrower and more interpretive.
- source_word: יַשֵּׁב
  chosen: he makes ... blow
  alternatives:
  - he causes ... to blow
  - he turns
  lexicon: HALOT
  rationale: Hiphil of נשׁב means 'cause to blow.' Rendering with 'makes' gives idiomatic
    English while preserving causative force. 'Turns' would reflect a different semantic
    development and is less fitting here.
- source_word: רוּחוֹ
  chosen: his wind
  alternatives:
  - his spirit
  - his breath
  lexicon: HALOT
  rationale: רוּחַ can mean 'wind,' 'breath,' or 'spirit.' In the immediate meteorological
    context of melting ice and flowing waters, 'wind' is the plain contextual sense.
    The possessive 'his' preserves divine agency over creation.
- source_word: יִזְּלוּ
  chosen: flow
  alternatives:
  - run
  - trickle
  - stream
  lexicon: HALOT
  rationale: Qal imperfect plural of נזל denotes flowing or running liquid. 'Flow'
    is the broadest and most natural English equivalent for waters released by thawing.
- source_word: מָיִם
  chosen: the waters
  alternatives:
  - waters
  - water
  lexicon: HALOT
  rationale: The plural noun is naturally rendered 'waters' in elevated but readable
    English, matching biblical poetic style and the plural verb. The article is supplied
    in English for idiomatic completeness in the clause.
