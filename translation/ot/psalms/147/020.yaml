theological_decisions:
- issue: Rendering of the divine short name יָהּ in the closing acclamation
  chosen_reading: Yah
  alternative_readings:
  - the LORD
  - Hallelujah
  rationale: The source text uses the short form יָהּ, not the full tetragrammaton
    יְהוָה. The doctrine excerpt specifies transliterating names and gives 'the LORD'
    as the default specifically for YHWH. Here, preserving 'Yah' best reflects the
    actual Hebrew form while keeping the acclamation transparent.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for יְהוָה applies specifically to YHWH'
