id: PSA.147.20
reference: Psalms 147:20
source:
  edition: WLC
  text: לֹ֘א עָ֤שָׂה כֵ֨ן לְ/כָל גּ֗וֹי וּ/מִשְׁפָּטִ֥ים בַּל יְדָע֗וּ/ם הַֽלְלוּ
    יָֽהּ׀־־־׃
translation:
  text: He has not done so for any nation; they have not known his judgments. Praise
    Yah!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Praise the LORD!' The Hebrew is halelu-yah, literally 'Praise Yah,'
      using the short form of the divine name.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: 'Standard negation introducing the first clause: ''He has not done so.'''
- source_word: עָשָׂה
  chosen: has done
  alternatives:
  - did
  lexicon: HALOT
  rationale: Qal perfect 3ms of עשה. Rendered with English present perfect ('has done')
    to fit natural English while preserving completed action with present relevance
    in the psalm's praise context.
- source_word: כֵן
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: HALOT
  rationale: Refers back to the privileged dealings just described in the preceding
    verse(s); 'so' is the most natural concise English equivalent.
- source_word: לְכָל גּוֹי
  chosen: for any nation
  alternatives:
  - for every nation
  - for any people
  lexicon: HALOT
  rationale: גּוֹי here is collective 'nation.' With the negation, English idiom prefers
    'for any nation' rather than the more wooden 'for every nation.'
- source_word: וּמִשְׁפָּטִים
  chosen: his judgments
  alternatives:
  - his ordinances
  - his rules
  - his decrees
  lexicon: HALOT
  rationale: מִשְׁפָּטִים in this context refers to God's judicial ordinances or legal
    judgments given to Israel. 'Judgments' preserves the lexical connection and avoids
    over-narrowing to merely 'laws.' The possessive is supplied from the pronominal
    suffix on the following verb.
- source_word: בַּל
  chosen: not
  alternatives:
  - never
  lexicon: HALOT
  rationale: Poetic negative particle. Rendered simply as 'not' in coordination with
    the following verb.
- source_word: יְדָעוּם
  chosen: have not known
  alternatives:
  - did not know
  - have not understood them
  lexicon: HALOT
  rationale: Qal perfect 3cp with 3mp suffix, 'they have not known them.' 'Known'
    is preferred over 'understood' as the primary sense of ידע, while the object is
    represented by 'his judgments.' Present perfect matches the first clause and reads
    naturally.
- source_word: הַלְלוּ יָהּ
  chosen: Praise Yah!
  alternatives:
  - Hallelujah!
  - Praise the LORD!
  lexicon: HALOT
  rationale: Imperative plural plus the divine short form יָהּ. Because the philosophy
    prefers translating titles and transliterating names, the short divine name is
    preserved as 'Yah' rather than replaced with the traditional liturgical transliteration
    'Hallelujah' or expanded to 'the LORD.'
