theological_decisions:
- issue: Corporate sense of Jacob/Israel
  chosen_reading: Render both names straightforwardly as 'Jacob' and 'Israel' without
    explicating 'the people of' in the main text.
  alternative_readings:
  - to the house of Jacob ... to Israel
  - to Jacob's descendants ... to Israel
  rationale: The Hebrew poetry uses the covenant names directly. Preserving the names
    maintains the literary force and allows readers to perceive the parallelism without
    interpretive expansion.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names;
    avoid paraphrase beyond the source text.'
