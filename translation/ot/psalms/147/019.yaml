id: PSA.147.19
reference: Psalms 147:19
source:
  edition: WLC
  text: מַגִּ֣יד דבר/ו לְ/יַעֲקֹ֑ב חֻקָּ֥י/ו וּ֝/מִשְׁפָּטָ֗י/ו לְ/יִשְׂרָאֵֽל׃
translation:
  text: He declares his word to Jacob, his statutes and his judgments to Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'makes known his word to Jacob.'
    reason: lexical_alternative
  - marker: b
    text: '''Judgments'' may also be rendered ''ordinances'' or ''rules'' in this
      legal-covenantal context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַגִּיד
  chosen: declares
  alternatives:
  - makes known
  - proclaims
  - announces
  lexicon: HALOT
  rationale: The Hiphil participle of נגד conveys making something known or declaring
    it. 'Declares' is natural English and preserves the formal sense of public communication
    better than the more generic 'tells.'
- source_word: דברו
  chosen: his word
  alternatives:
  - his message
  - his matter
  lexicon: HALOT
  rationale: דבר commonly means 'word' or 'matter.' In this poetic parallel with 'statutes'
    and 'judgments,' 'his word' best preserves the broad covenantal sense without
    narrowing it too quickly to a specific command or message.
- source_word: ליעקב
  chosen: to Jacob
  alternatives:
  - to Yaakov
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object. 'Jacob' is the standard
    English transliteration and here functions corporately for the covenant people
    in poetic parallel with 'Israel.'
- source_word: חקיו
  chosen: his statutes
  alternatives:
  - his decrees
  - his ordinances
  lexicon: HALOT
  rationale: חֹק/חֻקִּים refers to prescribed enactments or statutes. 'Statutes' is
    a clear and established legal term in English that fits the covenant-law context.
- source_word: ומשפטיו
  chosen: and his judgments
  alternatives:
  - and his rules
  - and his ordinances
  - and his justice
  lexicon: HALOT
  rationale: מִשְׁפָּטִים in legal/covenantal contexts often denotes judgments or
    legal decisions. 'Judgments' preserves the lexical connection to משפט and maintains
    the formal parallel with 'statutes.'
- source_word: לישראל
  chosen: to Israel
  alternatives:
  - to Yisrael
  lexicon: HALOT
  rationale: The preposition again marks the recipient. 'Israel' is the standard English
    transliteration and parallels 'Jacob' as a poetic double designation for God's
    covenant people.
