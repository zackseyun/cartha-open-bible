- issue: Anthropological/gender rendering of הָאִישׁ
  chosen_reading: the man
  alternative_readings:
  - the human
  - the person
  rationale: The Hebrew uses the masculine singular אִישׁ, likely as a representative singular in poetic parallelism with 'the horse.' Following the stated gender-accurate philosophy, the translation preserves 'man' rather than neutralizing it. The verse concerns human physical strength in contrast to what pleases God, not a universal anthropological abstraction requiring neutralization.
