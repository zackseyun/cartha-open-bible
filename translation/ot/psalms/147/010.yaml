id: PSA.147.10
reference: Psalms 147:10
source:
  edition: WLC
  text: לֹ֤א בִ/גְבוּרַ֣ת הַ/סּ֣וּס יֶחְפָּ֑ץ לֹֽא בְ/שׁוֹקֵ֖י הָ/אִ֣ישׁ יִרְצֶֽה־׃
translation:
  text: He does not delight in the strength of the horse[b][a]; he takes no pleasure in the legs of a man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the thighs of the man.' The Hebrew term can refer to the leg or thigh; here it denotes human physical strength.
    reason: lexical_alternative
  - marker: b
    text: '''The man'' preserves the masculine singular Hebrew. In context it functions representatively for human strength.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּגְבוּרַת
  chosen: in the strength of
  alternatives:
  - in the might of
  - in the power of
  lexicon: HALOT
  rationale: גְּבוּרָה denotes strength, might, or power. 'Strength' is the most natural English rendering here and fits the poetic contrast with human and animal physical capability.
- source_word: הַסּוּס
  chosen: the horse
  lexicon: HALOT
  rationale: A straightforward definite noun meaning 'the horse.' Singular with the article is retained in English as a representative singular, common in Hebrew poetry.
- source_word: יֶחְפָּץ
  chosen: he does not delight
  alternatives:
  - he does not desire
  - he does not take pleasure
  lexicon: HALOT
  rationale: חפץ commonly expresses delight, desire, or pleasure. 'Delight' preserves the affective nuance and pairs well with the second colon's 'takes no pleasure' without making the two verbs identical.
- source_word: בְּשׁוֹקֵי
  chosen: in the legs of
  alternatives:
  - in the thighs of
  lexicon: HALOT
  rationale: שׁוֹק refers to the leg/thigh area. In this context of physical prowess, 'legs' is clearer and more idiomatic in modern English than 'thighs,' while still conveying bodily strength.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - a man
  - the warrior
  lexicon: HALOT
  rationale: אִישׁ normally means 'man.' Per the gender-accurate guideline, the masculine singular is preserved rather than generalized to 'person' or 'humanity.' 'Warrior' would overinterpret the text, though the context implies human strength.
- source_word: יִרְצֶה
  chosen: he takes no pleasure
  alternatives:
  - he does not favor
  - he is not pleased
  lexicon: HALOT
  rationale: רצה conveys being pleased with, favoring, or taking pleasure in. 'Takes no pleasure' is idiomatic and preserves the semantic parallel with יֶחְפָּץ while allowing slight variation between the cola.
