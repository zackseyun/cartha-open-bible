- issue: Rendering of divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, while alternatives may be preserved in documentation rather than the main
    text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of fear language
  chosen_reading: those who fear him
  alternative_readings:
  - those who revere him
  rationale: The verse commends proper covenant fear before God. Retaining 'fear'
    preserves biblical theological tension and avoids reducing the term to mere respect.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preserve theological
    tension rather than resolve it)
