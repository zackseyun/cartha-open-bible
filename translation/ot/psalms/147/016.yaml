id: PSA.147.16
reference: Psalms 147:16
source:
  edition: WLC
  text: הַ/נֹּתֵ֣ן שֶׁ֣לֶג כַּ/צָּ֑מֶר כְּ֝פ֗וֹר כָּ/אֵ֥פֶר יְפַזֵּֽר׃
translation:
  text: He gives snow like wool; he scatters frost like ashes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hoarfrost' for 'frost.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנֹּתֵן
  chosen: He gives
  alternatives:
  - the one who gives
  - who gives
  lexicon: HALOT
  rationale: Qal participle of נתן used in a descriptive, hymnic sequence about God's
    ongoing actions. English finite present 'He gives' is more natural than a participial
    fragment while preserving the habitual sense.
- source_word: שֶׁלֶג
  chosen: snow
  lexicon: HALOT
  rationale: Standard lexical sense; no contextual reason to vary.
- source_word: כַּצָּמֶר
  chosen: like wool
  alternatives:
  - as wool
  lexicon: HALOT
  rationale: Comparative כ plus צמר indicates simile. 'Like wool' is idiomatic modern
    English and preserves the image of soft white covering.
- source_word: כְּפוֹר
  chosen: frost
  alternatives:
  - hoarfrost
  lexicon: HALOT
  rationale: The noun denotes frost, often specifically hoarfrost. 'Frost' is chosen
    for readability; the more specific 'hoarfrost' is preserved as a lexical alternative.
- source_word: כָּאֵפֶר
  chosen: like ashes
  alternatives:
  - as ashes
  lexicon: HALOT
  rationale: Comparative כ with אֵפֶר forms a simile. Plural 'ashes' is the natural
    English equivalent for the substance in this poetic comparison.
- source_word: יְפַזֵּר
  chosen: he scatters
  alternatives:
  - he spreads
  lexicon: HALOT
  rationale: Piel imperfect of פזר conveys dispersing/scattering. 'Scatters' best
    matches the vivid poetic image of God distributing frost broadly over the earth.
