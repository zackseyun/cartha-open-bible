id: PSA.147.8
reference: Psalms 147:8
source:
  edition: WLC
  text: הַֽ/מְכַסֶּ֬ה שָׁמַ֨יִם בְּ/עָבִ֗ים הַ/מֵּכִ֣ין לָ/אָ֣רֶץ מָטָ֑ר הַ/מַּצְמִ֖יחַ
    הָרִ֣ים חָצִֽיר׀׃
translation:
  text: who covers the heavens with clouds, who prepares rain for the earth, who makes
    grass sprout on the mountains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who causes grass to grow on the mountains.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְכַסֶּה
  chosen: covers
  alternatives:
  - veils
  - clothes
  lexicon: HALOT
  rationale: The participle from כסה denotes covering or concealing. 'Covers' is the
    most natural and direct English equivalent here for God's action toward the heavens.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - heaven
  lexicon: HALOT
  rationale: Hebrew שָׁמַיִם is formally plural and commonly refers to the skies/heavens.
    'The heavens' preserves the elevated poetic register better than 'the sky'.
- source_word: עָבִים
  chosen: clouds
  alternatives:
  - thick clouds
  lexicon: HALOT
  rationale: The noun refers to clouds, often dense clouds. 'Clouds' is sufficient
    in English; 'thick' is possible but not required by the immediate context.
- source_word: מֵּכִין
  chosen: prepares
  alternatives:
  - establishes
  - provides
  - makes ready
  lexicon: HALOT
  rationale: The Hiphil of כון can mean prepare, make ready, establish. With 'rain
    for the earth,' 'prepares' best captures purposeful divine provision without overinterpreting.
- source_word: לָאָרֶץ
  chosen: for the earth
  alternatives:
  - for the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean earth or land. In this cosmic-weather context, 'earth'
    fits the scope better than a localized 'land'.
- source_word: מָטָר
  chosen: rain
  alternatives:
  - rainfall
  lexicon: HALOT
  rationale: The standard sense is 'rain.' 'Rainfall' is possible but less natural
    in this poetic line.
- source_word: מַּצְמִיחַ
  chosen: makes sprout
  alternatives:
  - causes to grow
  - brings forth
  lexicon: HALOT
  rationale: 'The Hiphil of צמח is causative: to cause to sprout/grow. ''Makes sprout''
    preserves the causative force while remaining readable.'
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - the hills
  lexicon: HALOT
  rationale: The noun normally means mountains. 'Hills' would soften the image unnecessarily.
- source_word: חָצִיר
  chosen: grass
  alternatives:
  - herbage
  - green plants
  lexicon: HALOT
  rationale: The noun commonly denotes grass or herbage. 'Grass' is the clearest and
    most idiomatic choice in English for this context.
