id: PSA.35.20
reference: Psalms 35:20
source:
  edition: WLC
  text: כִּ֤י לֹ֥א שָׁל֗וֹם יְדַ֫בֵּ֥רוּ וְ/עַ֥ל רִגְעֵי אֶ֑רֶץ דִּבְרֵ֥י מִ֝רְמוֹת
    יַחֲשֹׁבֽוּ/ן־׃
translation:
  text: For they do not speak peace, but against the quiet ones of the land they devise
    words of deceit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the peaceful of the land' or 'those at rest in the land.' The Hebrew
      phrase likely refers to people who live quietly and peaceably.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding plea/complaint. 'For' fits the
    discourse flow in English psalmic style.
- source_word: לֹא שָׁלוֹם יְדַבֵּרוּ
  chosen: they do not speak peace
  alternatives:
  - they do not speak peacefully
  - they do not speak of peace
  lexicon: HALOT
  rationale: Retains the Hebrew object 'peace' rather than turning it into an adverb.
    This preserves the sense that their speech is not oriented toward peace or reconciliation.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  lexicon: HALOT
  rationale: The core sense is 'peace,' with broader connotations of wholeness/well-being.
    'Peace' is the most natural and sufficiently broad English rendering here.
- source_word: וְעַל
  chosen: but against
  alternatives:
  - and against
  lexicon: HALOT
  rationale: The conjunction plus preposition marks a contrast between what they do
    not do and what they actually do. English 'but against' makes that adversative
    force explicit and readable.
- source_word: רִגְעֵי אֶרֶץ
  chosen: the quiet ones of the land
  alternatives:
  - the peaceful of the land
  - the tranquil of the land
  - those at rest in the land
  lexicon: HALOT
  rationale: The phrase likely refers to people living quietly/peaceably in the land,
    not merely to a geographical feature. 'Quiet ones' preserves the adjectival/nominal
    force without overinterpreting. 'Peaceful' is possible but risks conflation with
    the previous שָׁלוֹם.
- source_word: דִּבְרֵי מִרְמוֹת
  chosen: words of deceit
  alternatives:
  - deceitful words
  - words of treachery
  lexicon: HALOT
  rationale: A construct phrase best rendered straightforwardly. 'Words of deceit'
    preserves the noun-based Hebrew expression and the malicious verbal content.
- source_word: יַחֲשֹׁבוּן
  chosen: they devise
  alternatives:
  - they plan
  - they scheme
  - they think up
  lexicon: HALOT
  rationale: The verb חשׁב in context conveys intentional planning or contrivance,
    not mere internal thought. 'Devise' captures deliberate hostile plotting in idiomatic
    English.
