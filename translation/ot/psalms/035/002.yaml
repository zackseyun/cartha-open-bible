id: PSA.35.2
reference: Psalms 35:2
source:
  edition: WLC
  text: הַחֲזֵ֣ק מָגֵ֣ן וְ/צִנָּ֑ה וְ֝/ק֗וּמָ/ה בְּ/עֶזְרָתִֽ/י׃
translation:
  text: Take hold of shield and buckler[a], and rise up for my help.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'large shield' for 'buckler'; the Hebrew uses two distinct shield terms, likely indicating different kinds of defensive armor.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֲזֵק
  chosen: Take hold of
  alternatives:
  - Grasp
  - Seize
  lexicon: HALOT
  rationale: Imperative of חזק here calls on God to take up or grasp weapons in readiness. 'Take hold of' is idiomatic and preserves the concrete martial image better than a more abstract 'be strong.'
- source_word: מָגֵן
  chosen: shield
  alternatives:
  - small shield
  lexicon: HALOT
  rationale: מָגֵן is the common term for a shield. Rendering it simply as 'shield' is natural English and preserves the military metaphor.
- source_word: צִנָּה
  chosen: buckler
  alternatives:
  - large shield
  lexicon: HALOT
  rationale: צִנָּה denotes a larger body-shield, distinct from מָגֵן. 'Buckler' preserves the distinction between the two Hebrew terms in concise English, though in some modern usage 'buckler' can suggest a smaller shield; the paired terms here require differentiated renderings rather than flattening both to 'shield.'
- source_word: וְקוּמָה
  chosen: and rise up
  alternatives:
  - and stand up
  - and arise
  lexicon: HALOT
  rationale: Imperative of קום with paragogic he expresses urgent appeal for intervention. 'Rise up' is idiomatic in prayer language and fits the martial context of divine action.
- source_word: בְּעֶזְרָתִי
  chosen: for my help
  alternatives:
  - to help me
  - as my help
  lexicon: HALOT
  rationale: The preposition ב with עֶזְרָה here is best rendered idiomatically as movement into action on the psalmist's behalf. 'For my help' preserves the Hebrew noun 'help' while sounding natural in English.
