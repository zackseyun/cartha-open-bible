id: PSA.35.21
reference: Psalms 35:21
source:
  edition: WLC
  text: וַ/יַּרְחִ֥יבוּ עָלַ֗/י פִּ֫י/הֶ֥ם אָ֭מְרוּ הֶאָ֣ח הֶאָ֑ח רָאֲתָ֥ה עֵינֵֽי/נוּ׀׃
translation:
  text: They opened their mouths wide against me; they said, “Aha, aha! Our eyes have
    seen it!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Our eye has seen.” Hebrew uses a singular verb with
      the collective expression “our eyes.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְחִיבוּ
  chosen: opened ... wide
  alternatives:
  - made wide
  - opened wide
  lexicon: HALOT
  rationale: From רחב in the Hiphil, literally 'made wide.' With 'mouth' as object,
    the idiom means to open the mouth wide, often in hostile gloating. 'Opened ...
    wide' preserves the concrete image while reading naturally in English.
- source_word: עָלַי
  chosen: against me
  alternatives:
  - over me
  - at me
  lexicon: HALOT
  rationale: The preposition עַל with hostile speech here is best rendered 'against
    me,' expressing adversarial stance rather than mere spatial relation.
- source_word: פִּיהֶם
  chosen: their mouths
  alternatives:
  - their mouth
  lexicon: HALOT
  rationale: Though singular 'mouth' can function collectively in Hebrew, English
    idiom prefers the distributive plural 'their mouths' with a plural subject.
- source_word: אָמְרוּ
  chosen: they said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Simple narrative verb introducing direct speech; 'they said' is the most
    straightforward rendering.
- source_word: הֶאָח הֶאָח
  chosen: Aha, aha!
  alternatives:
  - Ha, ha!
  - Ah, ah!
  lexicon: HALOT
  rationale: An interjection of malicious triumph or gloating. 'Aha, aha!' is established,
    natural English for derisive exultation and preserves the repetition.
- source_word: רָאֲתָה עֵינֵינוּ
  chosen: Our eyes have seen it
  alternatives:
  - Our eye has seen
  - We have seen
  lexicon: HALOT
  rationale: Literally 'our eye has seen,' with the feminine singular verb agreeing
    with the collective noun עַיִן/construct עֵינֵי. English idiom prefers the plural
    subject 'our eyes.' Adding 'it' makes the object explicit in natural English,
    conveying the boast that they have witnessed the desired downfall or incriminating
    sight implied by context.
