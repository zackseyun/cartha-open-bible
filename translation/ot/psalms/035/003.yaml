id: PSA.35.3
reference: Psalms 35:3
source:
  edition: WLC
  text: וְ/הָ֘רֵ֤ק חֲנִ֣ית וּ֭/סְגֹר לִ/קְרַ֣את רֹדְפָ֑/י אֱמֹ֥ר לְ֝/נַפְשִׁ֗/י יְֽשֻׁעָתֵ֥/ךְ אָֽנִי׃
translation:
  text: Draw the spear and block the way against those who pursue me[a]; say to my soul[b], “I am your salvation.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Draw the spear and the battle-axe against those who pursue me,” if וּסְגֹר is taken as naming a weapon rather than as the verb “block the way/shut off.”
    reason: alternative_reading
  - marker: b
    text: Or “your deliverance.” The Hebrew term can denote rescue in a concrete crisis as well as salvation more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָרֵק
  chosen: Draw
  alternatives:
  - Unsheathe
  - Brandish
  lexicon: HALOT
  rationale: From ריק in the Hiphil imperative, here likely meaning to draw out or unsheathe a weapon. 'Draw' is idiomatic modern English for taking out a weapon and fits the military imagery without over-specifying.
- source_word: חֲנִית
  chosen: the spear
  alternatives:
  - a spear
  - lance
  lexicon: HALOT
  rationale: Standard term for spear. The article is not explicit in Hebrew, but English idiom naturally uses 'the spear' with the imperative 'draw.' 'Lance' is possible but less natural and more specialized.
- source_word: וּסְגֹר
  chosen: block the way
  alternatives:
  - close in
  - shut off
  - stop
  lexicon: HALOT
  rationale: Literally 'and shut/close.' In context with לִקְרַאת רֹדְפַי, the sense is to close off or obstruct the path of the pursuers. 'Block the way' makes the implied object clear in natural English while staying close to the Hebrew sense.
- source_word: לִקְרַאת
  chosen: against
  alternatives:
  - to meet
  - before
  - in front of
  lexicon: HALOT
  rationale: The preposition often means 'to meet' or 'toward,' but in this martial plea it conveys confrontational movement toward the pursuers. 'Against' captures the adversarial force in idiomatic English.
- source_word: רֹדְפָי
  chosen: those who pursue me
  alternatives:
  - my pursuers
  - those chasing me
  lexicon: HALOT
  rationale: Participle with 1cs suffix, literally 'my pursuers' or 'those pursuing me.' The chosen rendering is clear and preserves the ongoing hostile action.
- source_word: אֱמֹר
  chosen: say
  alternatives:
  - declare
  - tell
  lexicon: HALOT
  rationale: Simple imperative of אמר. 'Say' is the most direct and unembellished rendering.
- source_word: לְנַפְשִׁי
  chosen: to my soul
  alternatives:
  - to me
  - to my life
  - to my inner being
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, self, or life. 'To my soul' preserves the poetic and personal force of the Hebrew without flattening it to merely 'me.'
- source_word: יְשֻׁעָתֵךְ
  chosen: your salvation
  alternatives:
  - your deliverance
  lexicon: HALOT
  rationale: From יְשׁוּעָה, meaning salvation or deliverance. 'Salvation' preserves the broader theological and existential scope, while still fitting the immediate context of rescue.
- source_word: אָֽנִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: 'The independent pronoun supplies emphasis: ''I [am].'' English requires the copula for a natural clause, yielding ''I am your salvation.'''
