theological_decisions:
- issue: Rendering יְשׁוּעָה in a prayer for rescue
  chosen_reading: salvation
  alternative_readings:
  - deliverance
  rationale: The immediate context is military rescue, so 'deliverance' is possible; however, 'salvation' is the broader and more theologically resonant term and remains faithful to the Hebrew. This does not import later doctrinal content but preserves the psalm's language of divine rescue.
  doctrine_reference: Translation philosophy §1, §6
