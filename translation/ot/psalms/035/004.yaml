theological_decisions:
- issue: Imprecatory jussive force
  chosen_reading: Render the verbs with 'Let those...' to preserve the psalmist's appeal/wish for divine judgment.
  alternative_readings:
  - 'Indicative-style future: ''They will be put to shame...'''
  rationale: Although the Hebrew imperfects can be formally ambiguous in isolation, in this prayer context they function naturally as jussive/imprecatory petitions. Rendering them as wishes preserves the psalm's address to God and avoids turning prayer into mere prediction.
  doctrine_reference: Translation philosophy §1, §3
