id: PSA.35.4
reference: Psalms 35:4
source:
  edition: WLC
  text: יֵבֹ֣שׁוּ וְ/יִכָּלְמוּ֮ מְבַקְשֵׁ֪י נַ֫פְשִׁ֥/י יִסֹּ֣גוּ אָח֣וֹר וְ/יַחְפְּר֑וּ חֹ֝שְׁבֵ֗י רָעָתִֽ/י׃
translation:
  text: Let those who seek my life be put to shame and humiliated[b][a]; let those who devise my harm turn back and be disgraced.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who seek my soul'; the Hebrew idiom means seeking someone's life.
    reason: lexical_alternative
  - marker: b
    text: Or 'those who devise evil against me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵבֹשׁוּ
  chosen: be put to shame
  alternatives:
  - be ashamed
  - be disappointed
  lexicon: HALOT
  rationale: בוש in the Qal commonly denotes experiencing shame or being put to shame. The jussive-like force in context is best rendered with 'Let ... be put to shame' to reflect the psalmist's imprecatory wish.
- source_word: וְיִכָּלְמוּ
  chosen: and humiliated
  alternatives:
  - and dishonored
  - and confounded
  lexicon: HALOT
  rationale: כלם in the Niphal overlaps with shame/disgrace language but intensifies the parallelism. 'Humiliated' preserves the passive/resultative sense and avoids flattening it into an exact synonym of the first verb.
- source_word: מְבַקְשֵׁי נַפְשִׁי
  chosen: those who seek my life
  alternatives:
  - those who seek my soul
  - those who seek me
  lexicon: HALOT
  rationale: נפש with 'seek' in hostile contexts idiomatically means seeking someone's life, not merely seeking the person or the inner self. 'My life' is the clearest natural English rendering of the idiom.
- source_word: יִסֹּגוּ אָחוֹר
  chosen: turn back
  alternatives:
  - be turned back
  - retreat backward
  lexicon: HALOT
  rationale: סוג with אָחוֹר expresses withdrawal or reversal. 'Turn back' is idiomatic English and captures the desired defeat/reversal without unnecessary redundancy.
- source_word: וְיַחְפְּרוּ
  chosen: and be disgraced
  alternatives:
  - and be ashamed
  - and be confounded
  lexicon: HALOT
  rationale: חפר in this context refers to shame/disgrace rather than literal digging. 'Be disgraced' differentiates it slightly from the earlier shame terms while preserving the semantic field.
- source_word: חֹשְׁבֵי רָעָתִי
  chosen: those who plot my harm
  alternatives:
  - those who devise evil against me
  - those who plan my injury
  lexicon: HALOT
  rationale: חשב conveys devising/planning, and רעה with 1cs suffix here refers to harm intended against the psalmist. 'Plot my harm' is concise, natural, and faithful to the hostile intent.
