theological_decisions:
- issue: Rendering of צִדְקֶךָ in a context of divine vindication
  chosen_reading: your righteousness
  alternative_readings:
  - your justice
  rationale: The Hebrew can evoke both God's moral righteousness and his just vindication
    of the psalmist. Following the project's default preference to preserve theological
    breadth where possible, 'righteousness' is retained in the main text, with 'justice'
    preserved as an alternative.
  doctrine_reference: 'DOCTRINE.md: Contested terms table notes δικαιοσύνη as usually
    ''righteousness'' with ''justice'' preserved where relevant; by analogy, the Hebrew
    cognate is handled similarly to preserve tension rather than narrow the sense.'
