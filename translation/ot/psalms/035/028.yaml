id: PSA.35.28
reference: Psalms 35:28
source:
  edition: WLC
  text: וּ֭/לְשׁוֹנִ/י תֶּהְגֶּ֣ה צִדְקֶ֑/ךָ כָּל הַ֝/יּוֹם תְּהִלָּתֶֽ/ךָ־׃
translation:
  text: And my tongue will speak of your righteousness, your praise all day long.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your justice.' The Hebrew term can denote both righteousness and justice,
      especially in contexts of vindication.
    reason: lexical_alternative
  - marker: b
    text: Or 'will meditate on' or 'will utter.' The verb can refer to low speech,
      utterance, or meditation; here the context favors spoken praise.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְשׁוֹנִי
  chosen: And my tongue
  alternatives:
  - And my tongue also
  - Then my tongue
  lexicon: HALOT
  rationale: ו conjunction plus לָשׁוֹן with 1cs suffix. Rendered literally as 'my
    tongue,' a common Hebrew metonym for speech. The conjunction is kept as 'And'
    to preserve the verse's linkage to the preceding context.
- source_word: תֶּהְגֶּה
  chosen: will speak of
  alternatives:
  - will meditate on
  - will utter
  - will proclaim
  lexicon: HALOT
  rationale: From הגה, which can denote muttering, meditating, or uttering. With 'tongue'
    as subject and direct objects 'your righteousness' and 'your praise,' the sense
    is vocal expression rather than silent meditation. 'Will speak of' is natural
    English that preserves the verbal idea without over-specifying volume or manner.
- source_word: צִדְקֶךָ
  chosen: your righteousness
  alternatives:
  - your justice
  lexicon: HALOT
  rationale: צֶדֶק/צְדָקָה language can overlap righteousness and justice. Here the
    psalmist praises God's rightness in vindicating him; 'righteousness' is the default
    and best preserves the theological breadth, while 'justice' remains a viable contextual
    alternative.
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  - the whole day
  lexicon: HALOT
  rationale: Idiomatic temporal expression meaning throughout the day. 'All day long'
    is clear modern English and preserves the durative force.
- source_word: תְּהִלָּתֶךָ
  chosen: your praise
  alternatives:
  - your renown
  - praise of you
  lexicon: HALOT
  rationale: תְּהִלָּה commonly means praise. With the 2ms suffix, the phrase can
    mean praise directed to God or praise belonging to him. 'Your praise' preserves
    the Hebrew form and allows the natural sense that the psalmist's tongue will voice
    praise to God.
