id: PSA.35.19
reference: Psalms 35:19
source:
  edition: WLC
  text: אַֽל יִשְׂמְחוּ לִ֣/י אֹיְבַ֣/י שֶׁ֑קֶר שֹׂנְאַ֥/י חִ֝נָּ֗ם יִקְרְצוּ עָֽיִן־־־׃
translation:
  text: Do not let my enemies falsely rejoice over me, nor let those who hate me without
    cause wink the eye.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my enemies falsely' / 'my lying enemies.' The Hebrew phrase is compact
      and may describe either enemies characterized by falsehood or enemies acting
      falsely toward the psalmist.
    reason: lexical_alternative
  - marker: b
    text: '''Wink the eye'' is a Hebrew idiom for making a malicious or conspiratorial
      signal, often expressing scorn or secret hostility.'
    reason: cultural_note
lexical_decisions:
- source_word: אַל
  chosen: Do not let
  alternatives:
  - May ... not
  - Let ... not
  lexicon: HALOT
  rationale: Negative particle used with the following imperfect as a jussive/prohibitive.
    In English, 'Do not let' naturally conveys the prayerful prohibition addressed
    to God in the psalm.
- source_word: יִשְׂמְחוּ
  chosen: rejoice
  alternatives:
  - be glad
  - exult
  lexicon: HALOT
  rationale: The verb שמח commonly means 'rejoice' or 'be glad.' 'Rejoice' fits the
    hostile triumph in context without overtranslating.
- source_word: לִי
  chosen: over me
  alternatives:
  - at me
  - concerning me
  - against me
  lexicon: HALOT
  rationale: Though literally 'to/for me,' in this hostile context the idiomatic sense
    is rejoicing over someone's downfall. 'Over me' is natural English and reflects
    the adversarial nuance.
- source_word: אֹיְבַי שֶׁקֶר
  chosen: my false enemies
  alternatives:
  - my enemies falsely
  - my lying enemies
  - my enemies without cause
  lexicon: HALOT
  rationale: The construction is compressed and can mean enemies characterized by
    falsehood or enemies acting falsely. 'My false enemies' preserves the direct link
    with שקר ('falsehood, lie') while keeping the phrase concise. 'Without cause'
    is better reserved for חנם later in the verse.
- source_word: שֹׂנְאַי
  chosen: those who hate me
  alternatives:
  - my haters
  - my enemies
  lexicon: HALOT
  rationale: A participial form meaning 'those hating me.' 'Those who hate me' is
    clear, natural, and preserves the ongoing hostile stance.
- source_word: חִנָּם
  chosen: without cause
  alternatives:
  - for nothing
  - gratuitously
  - without reason
  lexicon: HALOT
  rationale: In this context the adverb indicates baseless hostility. 'Without cause'
    is idiomatic and matches the psalm's legal/moral complaint.
- source_word: יִקְרְצוּ עָיִן
  chosen: wink the eye
  alternatives:
  - wink with the eye
  - leer
  - signal with the eye
  lexicon: HALOT
  rationale: The idiom refers to malicious signaling or gloating by eye gesture. 'Wink
    the eye' is a fairly literal rendering that preserves the concrete image; English
    readers can infer the hostile gesture from context.
