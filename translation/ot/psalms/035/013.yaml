id: PSA.35.13
reference: Psalms 35:13
source:
  edition: WLC
  text: וַ/אֲנִ֤י בַּ/חֲלוֹתָ֡/ם לְב֬וּשִׁ/י שָׂ֗ק עִנֵּ֣יתִי בַ/צּ֣וֹם נַפְשִׁ֑/י וּ֝/תְפִלָּתִ֗/י עַל חֵיקִ֥/י תָשֽׁוּב׀־׃
translation:
  text: But as for me[a], when they were sick, my clothing was sackcloth; I humbled myself with fasting[c][b], and my prayer returned to my own bosom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'my prayer came back unanswered,' or 'my prayer returned to benefit me.' The Hebrew expression is idiomatic and may indicate that his intercession did not change their hostility, or that its benefit returned to him.
    reason: alternative_reading
  - marker: b
    text: Sackcloth was coarse mourning attire, expressing grief, distress, or penitence.
    reason: cultural_note
  - marker: c
    text: Literally, 'I afflicted my soul with fasting,' a Hebrew idiom for self-humbling through fasting.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחֲלוֹתָם
  chosen: when they were sick
  alternatives:
  - in their sickness
  - when they were ill
  lexicon: HALOT
  rationale: The infinitive/verb form from חלה with 3mp suffix denotes their being sick or weak. 'When they were sick' is natural English and preserves the temporal sense of ב plus infinitive construct.
- source_word: לְבוּשִׁי שָׂק
  chosen: my clothing was sackcloth
  alternatives:
  - I clothed myself with sackcloth
  - my garment was sackcloth
  lexicon: HALOT
  rationale: Literally 'my clothing [was] sackcloth.' The verbless clause is retained rather than converting to an explicit verbal form, preserving the Hebrew emphasis on his state of mourning.
- source_word: עִנֵּיתִי
  chosen: I humbled myself
  alternatives:
  - I afflicted myself
  lexicon: HALOT
  rationale: ענה in the piel can mean afflict/humble. In the collocation with fasting and self-denial, 'I humbled myself' communicates the idiom clearly in modern English while preserving the penitential sense.
- source_word: בַצּוֹם נַפְשִׁי
  chosen: with fasting
  alternatives:
  - by fasting my soul
  - with fasting my soul
  lexicon: HALOT
  rationale: Literally 'with fasting my soul.' In Hebrew this idiom means self-denial through fasting. English normally expresses this as 'with fasting' or 'by fasting'; the reflexive force is already conveyed by 'I humbled myself.'
- source_word: וּתְפִלָּתִי
  chosen: and my prayer
  lexicon: HALOT
  rationale: Straightforward nominal rendering; the conjunction links his fasting with his intercession for them.
- source_word: עַל חֵיקִי
  chosen: to my own bosom
  alternatives:
  - into my lap
  - upon my bosom
  lexicon: HALOT
  rationale: חיק refers to bosom, lap, or chest fold. 'Bosom' preserves the metaphor and the idiomatic sense of something returning to oneself; 'my own' makes explicit the reflexive sense in idiomatic English.
- source_word: תָשׁוּב
  chosen: returned
  alternatives:
  - would return
  - turns back
  lexicon: HALOT
  rationale: שוב means return/turn back. Given the psalm's retrospective narration, the English past 'returned' fits the sequence. The sense is that his prayer came back unanswered or with benefit returning to himself.
