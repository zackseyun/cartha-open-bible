theological_decisions:
- issue: Meaning of the clause 'my prayer returned to my bosom'
  chosen_reading: The main text preserves the Hebrew image without resolving whether the prayer was unanswered, withdrawn, or brought benefit back to the psalmist.
  alternative_readings:
  - my prayer came back unanswered
  - my prayer was offered as for myself
  - my prayer returned to benefit me
  rationale: The Hebrew idiom is genuinely ambiguous. In keeping with the translation philosophy, the main text keeps the metaphor rather than importing one interpretive resolution. Alternatives are preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
