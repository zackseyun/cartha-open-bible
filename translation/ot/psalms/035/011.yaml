id: PSA.35.11
reference: Psalms 35:11
source:
  edition: WLC
  text: יְ֭קוּמוּ/ן עֵדֵ֣י חָמָ֑ס אֲשֶׁ֥ר לֹא יָ֝דַ֗עְתִּי יִשְׁאָלֽוּ/נִי־׃
translation:
  text: Violent witnesses rise up[a]; they ask me about things I do not know.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'false witnesses' or 'malicious witnesses'; Hebrew literally, 'witnesses of violence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְקוּמוּן
  chosen: rise up
  alternatives:
  - stand up
  - arise
  lexicon: HALOT
  rationale: From קום, here describing hostile witnesses coming forward or taking their stand. 'Rise up' preserves the vivid legal/adversarial sense without over-paraphrasing.
- source_word: עֵדֵי חָמָס
  chosen: violent witnesses
  alternatives:
  - false witnesses
  - witnesses of violence
  - malicious witnesses
  lexicon: HALOT
  rationale: Literally 'witnesses of violence.' חָמָס often denotes violence, wrong, or ruthless injustice. 'Violent witnesses' captures the genitive compactly while preserving the sense of injurious, unjust testimony. 'False witnesses' is interpretive and narrower than the Hebrew.
- source_word: אֲשֶׁר לֹא יָדַעְתִּי
  chosen: things I do not know
  alternatives:
  - what I did not know
  - matters unknown to me
  lexicon: HALOT
  rationale: The relative clause lacks an explicit object in Hebrew. English idiom requires one, so 'things' is supplied minimally. Present tense 'do not know' reads naturally in English while reflecting the psalmist's claim of ignorance regarding the accusations.
- source_word: יִשְׁאָלוּנִי
  chosen: they ask me about
  alternatives:
  - they question me about
  - they interrogate me about
  - they demand of me
  lexicon: HALOT
  rationale: שׁאל commonly means ask, inquire, or demand. In this hostile forensic context, 'ask me about' is clear and restrained; 'interrogate' may overstate the verb, while 'demand' shifts the sense.
