id: PSA.35.24
reference: Psalms 35:24
source:
  edition: WLC
  text: שָׁפְטֵ֣/נִי כְ֭/צִדְקְ/ךָ יְהוָ֥ה אֱלֹהָ֗/י וְ/אַל יִשְׂמְחוּ לִֽ/י־־׃
translation:
  text: Vindicate me according to your righteousness, O LORD my God, and do not let
    them rejoice over me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "according to your justice."
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁפְטֵנִי
  chosen: Vindicate me
  alternatives:
  - Judge me
  - Give judgment for me
  lexicon: HALOT
  rationale: The imperative of שׁפט with a personal object in a plea context asks
    God to render a favorable judgment on the psalmist's behalf, not merely to evaluate
    him neutrally. 'Vindicate me' best captures the forensic and petitionary sense
    in idiomatic English.
- source_word: כְצִדְקְךָ
  chosen: according to your righteousness
  alternatives:
  - according to your justice
  - in keeping with your righteousness
  lexicon: HALOT
  rationale: צדק here refers to God's righteous standard or just character. 'Righteousness'
    preserves the lexical link and theological weight better than 'justice,' though
    'justice' is a viable contextual alternative.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the Septuagintal pattern.
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: The first-person singular suffix is explicit and should be retained.
    'My God' is the natural and direct rendering.
- source_word: וְאַל
  chosen: and do not let
  alternatives:
  - and may they not
  - and do not
  lexicon: HALOT
  rationale: אַל with the following imperfect expresses a negative jussive/request.
    In English, 'do not let' makes clear that the petition is directed to God regarding
    the enemies' action.
- source_word: יִשְׂמְחוּ
  chosen: rejoice
  alternatives:
  - be glad
  - exult
  lexicon: HALOT
  rationale: שמח commonly means 'rejoice' or 'be glad.' 'Rejoice' fits the hostile
    triumph context without overtranslating.
- source_word: לִי
  chosen: over me
  alternatives:
  - at me
  - concerning me
  lexicon: HALOT
  rationale: With שמח in this adversarial setting, the sense is hostile gloating at
    the psalmist's expense. 'Over me' communicates that idiomatically in English.
