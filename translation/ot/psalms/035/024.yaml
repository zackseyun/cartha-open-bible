theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This preserves covenantal significance while following the project's stated
    convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether צִדְקְךָ should be rendered 'righteousness' or 'justice'
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The Hebrew term can overlap semantically with justice, but in direct
    address to God in the Psalms, 'your righteousness' preserves the covenantal-moral
    dimension without narrowing it to judicial procedure alone. The alternative is
    preserved in a footnote because it is a meaningful lexical option.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #5'
