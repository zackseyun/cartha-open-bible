id: PSA.35.0
reference: Psalms 35:0
source:
  edition: WLC
  text: לְ/דָוִ֨ד רִיבָ֣/ה יְ֭הוָה אֶת יְרִיבַ֑/י לְ֝חַ֗ם אֶת לֹֽחֲמָֽ/י׀־־׃
translation:
  text: Of David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Plead my cause, O LORD, against my adversaries.' The Hebrew verb can carry a legal sense ('plead/argue a case') as well as the broader sense 'contend.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Yahweh.' The translation follows the project default 'the LORD' for the divine name יְהוָה.
    reason: alternative_reading
status: revised
is_superscription: true
