id: PSA.35.26
reference: Psalms 35:26
source:
  edition: WLC
  text: יֵ֘בֹ֤שׁוּ וְ/יַחְפְּר֨וּ יַחְדָּו֮ שְׂמֵחֵ֪י רָעָ֫תִ֥/י יִֽלְבְּשׁוּ בֹ֥שֶׁת וּ/כְלִמָּ֑ה הַֽ/מַּגְדִּילִ֥ים עָלָֽ/י׀־׃
translation:
  text: Let those who rejoice at my harm be put to shame and humiliated together[a]; let those who magnify themselves against me be clothed with shame and disgrace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who exalt themselves against me' or 'those who boast against me.' The Hebrew literally speaks of making oneself great over someone.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵבֹשׁוּ
  chosen: let ... be put to shame
  alternatives:
  - let ... be ashamed
  - let ... be disappointed
  lexicon: HALOT
  rationale: Qal imperfect 3mp of בוש in a jussive/prayer context. 'Be put to shame' captures both the passive-result sense in English and the imprecatory force of the Hebrew better than the flatter 'be ashamed.'
- source_word: וְיַחְפְּרוּ
  chosen: and humiliated
  alternatives:
  - and confounded
  - and abashed
  lexicon: HALOT
  rationale: חפר in this shame context denotes being disgraced or humiliated. Rendered as a second predicate coordinated with 'be put to shame.' 'Confounded' is traditional but less clear in modern English.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - all together
  lexicon: HALOT
  rationale: Adverb indicating the group shares the same fate simultaneously.
- source_word: שְׂמֵחֵי רָעָתִי
  chosen: those who rejoice at my harm
  alternatives:
  - those who rejoice in my evil
  - those glad at my calamity
  lexicon: HALOT
  rationale: Construct phrase literally 'rejoicers of my evil/harm.' In context, 'my harm' best conveys personal injury or misfortune suffered by the psalmist without implying his moral evil.
- source_word: יִלְבְּשׁוּ
  chosen: let ... be clothed with
  alternatives:
  - let ... wear
  lexicon: HALOT
  rationale: Common metaphor of being clothed with a condition or status. 'Be clothed with' preserves the Hebrew image.
- source_word: בֹשֶׁת
  chosen: shame
  alternatives:
  - dishonor
  lexicon: HALOT
  rationale: Standard rendering for the noun, matching the shame motif already present in the verse.
- source_word: וּכְלִמָּה
  chosen: and disgrace
  alternatives:
  - and humiliation
  - and dishonor
  lexicon: HALOT
  rationale: Paired with בֹשֶׁת as a near-synonym; 'disgrace' gives a natural English pairing while preserving the intensification.
- source_word: הַמַּגְדִּילִים עָלַי
  chosen: those who magnify themselves against me
  alternatives:
  - those who exalt themselves against me
  - those who boast against me
  - those who make themselves great over me
  lexicon: HALOT
  rationale: Hiphil participle of גדל with עַל can denote making oneself great over/against someone, often in arrogant self-exaltation. 'Magnify themselves against me' stays close to the Hebrew while remaining intelligible; 'boast against me' is possible but narrows the image to speech.
