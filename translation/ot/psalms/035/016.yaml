id: PSA.35.16
reference: Psalms 35:16
source:
  edition: WLC
  text: בְּ֭/חַנְפֵי לַעֲגֵ֣י מָע֑וֹג חָרֹ֖ק עָלַ֣/י שִׁנֵּֽי/מוֹ׃
translation:
  text: Among the godless mockers at a feast, they gnash their teeth at me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Among profane mockers for a cake/morsel'; the Hebrew term translated
      'at a feast' is rare and uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּחַנְפֵי
  chosen: Among the godless
  alternatives:
  - With the profane
  - Among the hypocrites
  - Among the ungodly
  lexicon: HALOT
  rationale: The noun from חנף can denote the profane, godless, or hypocritical. In
    this poetic context describing hostile scoffers, 'godless' best captures moral-religious
    corruption without implying mere insincerity. The prefixed ב is taken in a locative/associative
    sense, 'among/with.'
- source_word: לַעֲגֵי
  chosen: mockers
  alternatives:
  - scoffers
  - deriders
  lexicon: HALOT
  rationale: From לעג, referring to those who mock or deride. 'Mockers' is natural
    modern English and preserves the hostile ridicule.
- source_word: מָעוֹג
  chosen: at a feast
  alternatives:
  - for a cake
  - of a feast
  - for a morsel
  lexicon: HALOT
  rationale: This rare term is difficult. Traditional interpretation connects it with
    feasting or table-jesting; some relate it to 'cake' or a dainty/morsel. In context
    the phrase likely describes vulgar banquet mockers rather than a literal pastry,
    so 'at a feast' best conveys the social setting while remaining concise. The lexical
    uncertainty is preserved in a footnote.
- source_word: חָרֹק
  chosen: they gnash
  alternatives:
  - gnashing
  - they grind
  lexicon: HALOT
  rationale: The verb חרק commonly refers to gnashing or grinding the teeth as an
    expression of hostility. English finite verbal rendering is required for smooth
    translation.
- source_word: עָלַי
  chosen: at me
  alternatives:
  - against me
  - over me
  lexicon: HALOT
  rationale: With a hostile verb like 'gnash,' English idiom favors 'at me'; 'against
    me' is possible but less natural here.
- source_word: שִׁנֵּימוֹ
  chosen: their teeth
  lexicon: HALOT
  rationale: Straightforward rendering of the plural construct with 3mp suffix.
