id: PSA.35.6
reference: Psalms 35:6
source:
  edition: WLC
  text: יְֽהִי דַרְכָּ֗/ם חֹ֥שֶׁךְ וַ/חֲלַקְלַקּ֑וֹת וּ/מַלְאַ֥ךְ יְ֝הוָ֗ה רֹדְפָֽ/ם־׃
translation:
  text: May their way be dark and slippery, with the angel of the LORD pursuing them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and the angel of the LORD pursuing them.' The Hebrew conjunction may
      be read as simple coordination; the main text uses 'with' to express the attendant
      sense in smoother English.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  chosen: May ... be
  alternatives:
  - Let ... be
  lexicon: HALOT
  rationale: Jussive of היה expressing an imprecation/wish. 'May ... be' is natural
    modern English and preserves the volitional force without archaic stiffness.
- source_word: דַרְכָּם
  chosen: their way
  alternatives:
  - their path
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means 'way, path.' 'Way' is retained because it can
    carry both literal and metaphorical force, fitting the psalm's imagery and broader
    biblical usage.
- source_word: חֹשֶׁךְ
  chosen: dark
  alternatives:
  - darkness
  lexicon: HALOT
  rationale: Predicate after 'be.' English idiom prefers the adjectival 'dark' rather
    than the more wooden 'be darkness,' while preserving the image of peril and obscurity.
- source_word: וַחֲלַקְלַקּוֹת
  chosen: and slippery
  alternatives:
  - and slippery places
  - and smooth/slippery ground
  lexicon: HALOT
  rationale: The plural noun denotes slipperiness/smooth places. Rendering it adjectivally
    with 'slippery' gives clear English alongside 'dark' while preserving the danger
    imagery. The more explicit 'slippery places' is possible but slightly heavier
    than the Hebrew requires in English.
- source_word: וּמַלְאַךְ יְהוָה
  chosen: with the angel of the LORD
  alternatives:
  - and the angel of the LORD
  lexicon: HALOT
  rationale: 'The conjunction can be rendered simply ''and,'' but in English ''with''
    better conveys the attendant circumstance: their way is dark and slippery while
    the angel of the LORD is pursuing them. ''the LORD'' follows the project''s default
    for YHWH.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: רֹדְפָם
  chosen: pursuing them
  alternatives:
  - chasing them
  - driving them on
  - persecuting them
  lexicon: HALOT
  rationale: רדף means 'pursue, chase.' 'Pursuing' is the broadest and most contextually
    fitting choice, preserving the hostile active sense without over-specifying the
    manner.
