id: PSA.35.25
reference: Psalms 35:25
source:
  edition: WLC
  text: אַל יֹאמְר֣וּ בְ֭/לִבָּ/ם הֶאָ֣ח נַפְשֵׁ֑/נוּ אַל יֹ֝אמְר֗וּ בִּֽלַּעֲנֽוּ/הוּ־־׃
translation:
  text: Let them not say in their heart, “Aha, our desire!” Let them not say, “We
    have swallowed him up.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “our soul,” “what we desired,” or “our appetite.” The Hebrew noun nephesh
      here likely expresses inward desire or satisfaction rather than the immaterial
      soul.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Let ... not
  alternatives:
  - Do not let ...
  - May ... not
  lexicon: HALOT
  rationale: אַל with the imperfect/jussive expresses a negative wish or prohibition
    in prayer. In English, 'Let them not' naturally conveys the psalmist's petition
    to God concerning the enemies' speech.
- source_word: יֹאמְרוּ
  chosen: say
  alternatives:
  - declare
  - speak
  lexicon: HALOT
  rationale: אָמַר is the common verb 'to say.' 'Say' is the most direct and idiomatic
    rendering in both clauses.
- source_word: בְלִבָּם
  chosen: in their heart
  alternatives:
  - in their hearts
  - to themselves
  lexicon: HALOT
  rationale: Literally singular 'in their heart' with a 3mp suffix. English often
    uses the singular collectively in this idiom, preserving the Hebrew expression
    for inward thought rather than public speech.
- source_word: הֶאָח
  chosen: Aha
  alternatives:
  - Ha!
  - Ah!
  lexicon: HALOT
  rationale: An interjection of malicious triumph. 'Aha' is a standard English equivalent
    in Psalms and prophetic taunt contexts and preserves the exclamatory force without
    paraphrase.
- source_word: נַפְשֵׁנוּ
  chosen: our desire
  alternatives:
  - our soul
  - what we wanted
  - our appetite
  lexicon: HALOT
  rationale: 'נֶפֶשׁ can mean ''soul,'' ''self,'' ''life,'' or by extension desire/appetite.
    In this exclamation after ''Aha,'' the sense is not a metaphysical ''our soul''
    but satisfaction of inward desire: ''our desire!'' This best captures the idiom
    in clear modern English while staying close to the Hebrew sense.'
- source_word: בִּלַּעֲנוּהוּ
  chosen: We have swallowed him up
  alternatives:
  - We have devoured him
  - We have consumed him
  lexicon: HALOT
  rationale: From בלע, literally 'swallow, engulf, devour.' The perfect with object
    suffix expresses the enemies' boast of total defeat. 'Swallowed him up' preserves
    the vivid metaphor and matches common biblical imagery.
