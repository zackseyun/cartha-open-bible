id: PSA.35.18
reference: Psalms 35:18
source:
  edition: WLC
  text: א֭וֹדְ/ךָ בְּ/קָהָ֣ל רָ֑ב בְּ/עַ֖ם עָצ֣וּם אֲהַֽלְלֶֽ/ךָּ׃
translation:
  text: I will give thanks to you in the great assembly; among a mighty people I will
    praise you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in a great congregation.'
    reason: lexical_alternative
  - marker: b
    text: Or 'among a numerous people' or 'among a strong people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: א֭וֹדְךָ
  chosen: I will give thanks to you
  alternatives:
  - I will praise you
  - I will confess you
  lexicon: HALOT
  rationale: Hiphil of ידה commonly means to give thanks or praise in worship contexts.
    Here, paired with a later verb for praise, rendering it as 'give thanks' preserves
    the distinction between the two cola rather than flattening both into 'praise'.
- source_word: בְּקָהָל רָב
  chosen: in the great assembly
  alternatives:
  - in a great congregation
  - in the large assembly
  lexicon: HALOT
  rationale: קָהָל denotes an assembled gathering or congregation. 'Assembly' is natural
    modern English and fits public worship context. רָב here functions adjectivally
    as 'great/large'; 'great assembly' is idiomatic and preserves the sense of a numerous
    public gathering.
- source_word: בְּעַם עָצוּם
  chosen: among a mighty people
  alternatives:
  - among a numerous people
  - among a strong people
  - in a mighty throng
  lexicon: HALOT
  rationale: עַם is 'people,' and עָצוּם can denote strength, might, or great size.
    'Mighty people' preserves the lexical force without over-specifying whether the
    emphasis is numerical or powerful; the parallelism with 'great assembly' suggests
    a large, impressive public body.
- source_word: אֲהַלְלֶךָּ
  chosen: I will praise you
  alternatives:
  - I will extol you
  lexicon: HALOT
  rationale: Piel of הלל regularly means 'praise' or 'extol.' 'Praise' is the most
    direct and natural rendering in English and complements the first colon's 'give
    thanks'.
