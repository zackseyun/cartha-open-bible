theological_decisions:
- issue: Rendering of נַפְשִׁי in a prayer for deliverance
  chosen_reading: my life
  alternative_readings:
  - my soul
  - my self
  rationale: The verse concerns rescue from mortal enemies, so 'life' best reflects the Hebrew anthropological sense here and avoids importing a narrower body/soul distinction not demanded by the text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of יְחִידָתִי
  chosen_reading: my only one
  alternative_readings:
  - my precious life
  - my only soul
  rationale: The Hebrew emphasizes uniqueness and preciousness. Keeping the literal image in the main text preserves poetic tension; the more explicit sense is preserved in a footnote rather than resolved away.
  doctrine_reference: Translation philosophy §3
