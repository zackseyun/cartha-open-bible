id: PSA.35.17
reference: Psalms 35:17
source:
  edition: WLC
  text: אֲדֹנָ/י֮ כַּ/מָּ֪ה תִּ֫רְאֶ֥ה הָשִׁ֣יבָ/ה נַ֭פְשִׁ/י מִ/שֹּׁאֵי/הֶ֑ם מִ֝/כְּפִירִ֗ים יְחִידָתִֽ/י׃
translation:
  text: Lord[a], how long will you look on? Restore my soul from their ravages[c][b], my only one from the young lions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Restore my soul' or 'Restore me.' The Hebrew nephesh often means 'life,' 'self,' or 'soul' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'from their destructions' or 'from those who ravage me.' The Hebrew expression is difficult and refers to the enemies' destructive attacks.
    reason: lexical_alternative
  - marker: c
    text: '''My only one'' likely means ''my precious life''—the one life I have.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  - Lord God
  lexicon: HALOT
  rationale: Standard rendering of the divine/master title אֲדֹנָי is 'Lord.' This matches the project's default for κύριος-like title language and fits the psalm's direct address to God without importing the covenant name YHWH, which is not used here.
- source_word: כַּמָּה
  chosen: how long
  alternatives:
  - how much
  - how long?
  lexicon: HALOT
  rationale: 'In lament contexts with an imperfect verb of seeing, כַּמָּה idiomatically asks duration: ''how long?'' rather than quantity. This preserves the psalmist''s complaint about divine delay.'
- source_word: תִּרְאֶה
  chosen: will you look on
  alternatives:
  - will you see
  - will you watch
  lexicon: HALOT
  rationale: Although the verb literally means 'see,' in this context it conveys passive observation in the face of suffering. 'Look on' captures the lament nuance that God appears to be merely watching.
- source_word: הָשִׁיבָה
  chosen: restore
  alternatives:
  - bring back
  - turn back
  - rescue
  lexicon: HALOT
  rationale: The Hiphil imperative of שוב commonly means 'bring back/restore.' Here it governs 'my life' and asks God to bring it back from danger. 'Restore' is idiomatic English and preserves the sense without over-paraphrasing to 'save,' though rescue is contextually related.
- source_word: נַפְשִׁי
  chosen: my life
  alternatives:
  - my soul
  - my self
  lexicon: HALOT
  rationale: נֶפֶשׁ in many psalmic contexts refers to the person's life or very self, not specifically the immaterial soul in a later theological sense. 'My life' best fits the parallel with mortal danger and avoids misleading dualistic overtones.
- source_word: מִשֹּׁאֵיהֶם
  chosen: from their ravages
  alternatives:
  - from their destructions
  - from those who lay waste to them
  - from their roaring
  lexicon: HALOT
  rationale: The form is difficult, from a noun/participle related to devastation or desolation. In context it refers to the destructive attacks of the enemies. 'From their ravages' gives a natural English expression for the threat posed by them. The more literal but awkward 'from their destructions' is preserved as an alternative sense.
- source_word: מִכְּפִירִים
  chosen: from the young lions
  alternatives:
  - from lions
  - from fierce lions
  lexicon: HALOT
  rationale: כְּפִירִים are young lions, often a metaphor for violent enemies. The concrete image should be retained in the main text rather than flattened into an abstract description.
- source_word: יְחִידָתִי
  chosen: my only one
  alternatives:
  - my only life
  - my precious life
  - my only soul
  lexicon: HALOT
  rationale: יָחִיד can mean 'only one' and by extension something uniquely precious. In parallel with 'my life,' it refers to the psalmist's one precious life. 'My only one' preserves the Hebrew compactness and metaphorical force, while a footnote can clarify the sense 'my precious life.'
