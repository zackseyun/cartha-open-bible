id: PSA.31.1
reference: Psalms 31:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֗חַ מִזְמ֥וֹר לְ/דָוִֽד׃
translation:
  text: For the choirmaster[a]. A psalm of David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'by David' or 'for David'; the Hebrew superscription can indicate authorship, association, or dedication.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - To the director
  - For the music director
  - For the leader
  lexicon: HALOT
  rationale: The superscription term traditionally refers to the one overseeing musical performance. 'Choirmaster' is concise, idiomatic in English psalm headings, and fits the liturgical/musical context better than the broader 'leader.' The prefixed ל is rendered 'For' in keeping with common superscription usage.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - Melody
  - Song
  lexicon: HALOT
  rationale: מִזְמוֹר is the standard heading term for a psalm/song, especially one associated with musical accompaniment. 'Psalm' is the most accurate and conventional English equivalent in this genre.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - for David
  - by David
  lexicon: HALOT
  rationale: The preposition ל in psalm superscriptions can indicate authorship, association, dedication, or collection. 'Of David' preserves that ambiguity better than 'by David,' which would overstate authorship, or 'for David,' which is less likely in English usage.
