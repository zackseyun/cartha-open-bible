id: PSA.150.4
reference: Psalms 150:4
source:
  edition: WLC
  text: הַֽ֭לְלוּ/הוּ בְ/תֹ֣ף וּ/מָח֑וֹל הַֽ֝לְל֗וּ/הוּ בְּ/מִנִּ֥ים וְ/עוּגָֽב׃
translation:
  text: Praise him with tambourine and dancing[b][a]; praise him with strings and pipe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with stringed instruments.'
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'and organ,' but the Hebrew likely refers to a pipe or reed instrument rather than a modern keyboard organ.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַֽלְלוּהוּ
  chosen: Praise him
  alternatives:
  - Praise ye him
  lexicon: HALOT
  rationale: Imperative plural of הלל with 3ms suffix, calling the worshiping community to praise God. Modern English drops the plural distinction but preserves the direct object 'him'.
- source_word: בְּתֹף
  chosen: with tambourine
  alternatives:
  - with timbrel
  - with drum
  lexicon: HALOT
  rationale: תֹּף denotes a hand-held percussion instrument, traditionally a frame drum or tambourine. 'Tambourine' is more accessible modern English than 'timbrel' and more specific than generic 'drum'.
- source_word: וּמָחוֹל
  chosen: and dancing
  alternatives:
  - and dance
  lexicon: HALOT
  rationale: מָחוֹל commonly refers to dancing or a dance. 'Dancing' fits natural English in a list of means by which God is praised and avoids sounding like a separate object rather than an activity.
- source_word: בְּמִנִּים
  chosen: with strings
  alternatives:
  - with stringed instruments
  lexicon: HALOT
  rationale: מִנִּים refers broadly to stringed instruments. 'Strings' is concise and idiomatic in English while still representing the instrumental category.
- source_word: וְעוּגָב
  chosen: and pipe
  alternatives:
  - and flute
  - and reed pipe
  - and organ
  lexicon: HALOT
  rationale: עוּגָב denotes a wind instrument, likely a pipe or reed pipe. 'Pipe' is broad enough to avoid overprecision; 'organ' reflects older English tradition but is misleading for modern readers.
