id: PSA.150.5
reference: Psalms 150:5
source:
  edition: WLC
  text: הַֽלְל֥וּ/הוּ בְ/צִלְצְלֵי שָׁ֑מַע הַֽ֝לְל֗וּ/הוּ בְּֽ/צִלְצְלֵ֥י תְרוּעָֽה־׃
translation:
  text: Praise him with sounding cymbals; praise him with clashing cymbals.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'loud-sounding cymbals.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'cymbals of teruah'; teruah can mean a shout, blast, or jubilant
      cry. Here, with cymbals, it likely refers to a loud crashing or clashing sound.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַלְלוּהוּ
  chosen: Praise him
  alternatives:
  - Praise ye him
  lexicon: HALOT
  rationale: Imperative plural of הלל with 3ms suffix, a direct call to the worshiping
    community. 'Praise him' is clear modern English and preserves the repeated imperative
    force.
- source_word: בְצִלְצְלֵי
  chosen: with cymbals
  alternatives:
  - on cymbals
  - by cymbals
  lexicon: HALOT
  rationale: The preposition ב here is instrumental, introducing the means of praise.
    'With cymbals' is the most natural English rendering.
- source_word: שָׁמַע
  chosen: sounding
  alternatives:
  - loud-sounding
  - resounding
  - audible sound
  lexicon: HALOT
  rationale: From שמע in a nominal sense related to sound/hearing. In this collocation
    with cymbals, it describes cymbals that produce a clear, ringing sound. 'Sounding'
    is concise and idiomatic in English.
- source_word: תְרוּעָה
  chosen: clashing
  alternatives:
  - shouting
  - blast
  - jubilation
  - resounding noise
  lexicon: HALOT
  rationale: תְּרוּעָה often denotes a loud shout or blast, especially in celebratory
    or cultic settings. With cymbals, the sense is not vocal shouting but a loud crashing
    or clashing sound. 'Clashing cymbals' captures the instrumental force in context
    better than a more wooden 'cymbals of shout/blast'.
