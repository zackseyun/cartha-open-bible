theological_decisions:
- issue: Rendering the divine name in its short poetic form יָהּ
  chosen_reading: Yah
  alternative_readings:
  - the LORD
  rationale: The doctrine table specifies 'the LORD' for יְהוָה, but this verse uses
    יָהּ, the abbreviated poetic form. Rendering it 'Yah' preserves the actual lexical
    form present in the Hebrew and avoids flattening the distinction between the full
    covenant name and its poetic short form.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §2; Contested terms
    table entry for יְהוָה YHWH'
- issue: Whether to preserve the traditional liturgical form 'Hallelujah'
  chosen_reading: Translate as 'Praise Yah!' in the main text
  alternative_readings:
  - Hallelujah!
  rationale: Optimal equivalence and original-language primacy favor translating the
    imperative phrase rather than leaving it as a familiar transliteration. Because
    'Hallelujah' is deeply embedded in English Christian usage, it is preserved in
    a footnote as a lexical alternative.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §6'
