id: PSA.150.6
reference: Psalms 150:6
source:
  edition: WLC
  text: כֹּ֣ל הַ֭/נְּשָׁמָה תְּהַלֵּ֥ל יָ֗הּ הַֽלְלוּ יָֽהּ־׃
translation:
  text: Let every breath praise Yah. Praise Yah!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "Hallelujah!" The Hebrew phrase הַלְלוּ־יָהּ is the source of the liturgical
      expression "Hallelujah."'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  chosen: every
  alternatives:
  - all
  - everything that
  lexicon: HALOT
  rationale: With the singular noun הַנְּשָׁמָה, כֹּל is best rendered distributively
    as 'every' rather than the more wooden 'all.' This yields natural English while
    preserving the universal scope.
- source_word: הַנְּשָׁמָה
  chosen: breath
  alternatives:
  - soul
  - living being
  - thing that has breath
  lexicon: HALOT
  rationale: נְשָׁמָה commonly denotes 'breath' or 'breathing.' In this climactic
    psalm, 'every breath' is concise, vivid, and closely tied to the Hebrew image.
    'Soul' would over-personalize the term, and 'everything that has breath' is interpretive
    expansion beyond the compact Hebrew.
- source_word: תְּהַלֵּל
  chosen: let ... praise
  alternatives:
  - shall praise
  - praises
  lexicon: HALOT
  rationale: 'The imperfect here functions jussively in context: an exhortation or
    summons. English ''Let ... praise'' best captures the volitional force in idiomatic
    form.'
- source_word: יָהּ
  chosen: Yah
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Unlike יְהוָה, which the doctrine table defaults to 'the LORD,' יָהּ
    is the short poetic form of the divine name and is preserved here as 'Yah,' especially
    since it appears in the liturgical cry הַלְלוּ־יָהּ. This retains the poetic sound
    and lexical distinctiveness of the Hebrew.
- source_word: הַלְלוּ
  chosen: Praise
  alternatives:
  - Praise him
  lexicon: HALOT
  rationale: The second-person plural imperative is a direct congregational call.
    English imperative 'Praise' is the natural rendering; the object is supplied by
    the following divine name.
- source_word: הַלְלוּ יָהּ
  chosen: Praise Yah!
  alternatives:
  - Hallelujah!
  lexicon: HALOT
  rationale: Although הַלְלוּ־יָהּ is the source of the liturgical borrowing 'Hallelujah,'
    translating it as 'Praise Yah!' follows the project's preference for translating
    meaningful forms rather than simply carrying over a traditional transliteration.
    The alternative is worth preserving because of its strong liturgical familiarity.
