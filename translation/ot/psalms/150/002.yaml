id: PSA.150.2
reference: Psalms 150:2
source:
  edition: WLC
  text: הַֽלְל֥וּ/הוּ בִ/גְבוּרֹתָ֑י/ו הַֽ֝לְל֗וּ/הוּ כְּ/רֹ֣ב גֻּדְלֽ/וֹ׃
translation:
  text: Praise him for his mighty acts[b][a]; praise him according to the abundance of his greatness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''praise him in/with his mighty deeds''; the Hebrew preposition can be rendered more formally, but here likely gives the basis for praise: ''for his mighty acts.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'praise him according to his abundant greatness' or 'in proportion to his greatness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַֽלְלוּהוּ
  chosen: Praise him
  alternatives:
  - Praise ye him
  - Give praise to him
  lexicon: HALOT
  rationale: Imperative plural of הלל with 3ms object suffix. 'Praise him' is the natural modern English imperative and preserves the direct address to the worshiping community.
- source_word: בִּגְבוּרֹתָיו
  chosen: for his mighty acts
  alternatives:
  - in his mighty deeds
  - for his acts of power
  - for his mighty works
  lexicon: HALOT
  rationale: גְּבוּרוֹת commonly denotes mighty deeds or acts displaying strength/power. With ב, the sense here is causal or basis-of-praise ('for/because of'), more idiomatic in English than a wooden 'in/by his mighty acts.' 'Mighty acts' is concise and idiomatic while preserving the plural concrete sense.
- source_word: כְּרֹב
  chosen: according to the abundance of
  alternatives:
  - according to the greatness of
  - for the abundance of
  - in proportion to
  lexicon: HALOT
  rationale: 'כ + רֹב expresses measure or proportion: in accordance with abundance/multitude. ''According to the abundance of'' preserves the comparative/proportional force better than a flatter ''for''.'
- source_word: גֻּדְלוֹ
  chosen: his greatness
  alternatives:
  - his majesty
  - his greatnesses
  lexicon: HALOT
  rationale: From גדל, denoting greatness or magnitude. 'Greatness' is the most direct and natural rendering. 'Majesty' is possible interpretively, but the Hebrew more basically denotes greatness.
