id: PSA.150.3
reference: Psalms 150:3
source:
  edition: WLC
  text: הַֽ֭לְלוּ/הוּ בְּ/תֵ֣קַע שׁוֹפָ֑ר הַֽ֝לְל֗וּ/הוּ בְּ/נֵ֣בֶל וְ/כִנּֽוֹר׃
translation:
  text: Praise him with the blast of the trumpet[a]; praise him with harp and lyre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the sounding of the shofar'; the shofar was a horn, often a ram's horn, used in worship and signaling.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַֽלְלוּ/הוּ
  chosen: Praise him
  alternatives:
  - Give praise to him
  lexicon: HALOT
  rationale: Imperative plural of הלל with 3ms suffix, a direct call to the worshiping community. 'Praise him' is the natural, concise English equivalent and preserves the repeated exhortation.
- source_word: בְּ/תֵקַע
  chosen: with the blast of
  alternatives:
  - with sounding
  - with the blowing of
  lexicon: HALOT
  rationale: The noun תֵּקַע denotes a blowing or blast, especially of a horn. Rendering it as 'the blast of' captures the event/sound rather than implying merely the instrument by itself.
- source_word: שׁוֹפָר
  chosen: the trumpet
  alternatives:
  - the ram's horn
  - the horn
  lexicon: HALOT
  rationale: שׁוֹפָר is the horn used in Israelite worship and signaling, often a ram's horn. 'Trumpet' is the most idiomatic modern English rendering in this poetic praise context, while the more specific cultural sense is worth preserving in a footnote.
- source_word: בְּ/נֵבֶל
  chosen: with harp
  alternatives:
  - with lute
  - with psaltery
  lexicon: HALOT
  rationale: נֵבֶל names a stringed instrument. 'Harp' is a common, readable English equivalent; 'psaltery' is archaic, and 'lute' is possible but less established in English Bible usage.
- source_word: וְ/כִנּוֹר
  chosen: and lyre
  alternatives:
  - and harp
  lexicon: HALOT
  rationale: כִּנּוֹר is another stringed instrument, commonly rendered 'lyre.' Using 'lyre' distinguishes it from נֵבֶל and preserves the pairing of two different instruments in the Hebrew.
