theological_decisions:
- issue: Rendering of the divine short name יָהּ
  chosen_reading: Yah
  alternative_readings:
  - the LORD
  rationale: The doctrine file specifies 'the LORD' for יְהוָה, but this verse uses
    the shortened form יָהּ. Rendering it as 'Yah' preserves the lexical distinction
    in the Hebrew and the liturgical flavor of the psalm's opening acclamation.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (יְהוָה YHWH → the LORD)
    and Translation philosophy #1'
