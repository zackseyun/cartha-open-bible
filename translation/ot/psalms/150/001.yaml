id: PSA.150.1
reference: Psalms 150:1
source:
  edition: WLC
  text: הַ֥לְלוּ יָ֨הּ הַֽלְלוּ אֵ֥ל בְּ/קָדְשׁ֑/וֹ הַֽ֝לְל֗וּ/הוּ בִּ/רְקִ֥יעַ עֻזּֽ/וֹ׀־׃
translation:
  text: Praise Yah! Praise God in his sanctuary; praise him in the expanse of his
    strength.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Yah, the shortened form of the divine name; many translations render
      it 'the LORD.'
    reason: alternative_reading
  - marker: b
    text: Or 'in his holiness' / 'in his holy place.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in the firmament of his strength' or 'in his mighty expanse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַ֥לְלוּ
  chosen: Praise
  alternatives:
  - Give praise to
  lexicon: HALOT
  rationale: Imperative plural of הלל in a liturgical summons. 'Praise' is the natural,
    concise English imperative and preserves the repeated exhortational force.
- source_word: יָ֨הּ
  chosen: Yah
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: This is the short form of the divine name, not the full tetragrammaton
    יְהוָה. Since the doctrine table's default 'the LORD' applies specifically to
    YHWH, the shorter form is best represented distinctly as 'Yah,' especially in
    the fixed liturgical cry hallelu-yah.
- source_word: אֵ֥ל
  chosen: God
  alternatives:
  - Mighty God
  - God Almighty
  lexicon: HALOT
  rationale: אֵל here functions as a common/title term for God in parallel with the
    divine name. 'God' is the most natural English rendering in this praise context;
    stronger expansions like 'Mighty God' over-interpret the bare noun.
- source_word: בְּ/קָדְשׁ֑/וֹ
  chosen: in his sanctuary
  alternatives:
  - in his holiness
  - in his holy place
  lexicon: HALOT
  rationale: 'The noun קדשׁ can denote holiness or a holy place. In this psalm''s
    parallelism with ''in the expanse of his strength,'' a locative sense is most
    likely: the place of God''s holiness, hence ''his sanctuary.'''
- source_word: הַֽ֝לְל֗וּ/הוּ
  chosen: praise him
  lexicon: HALOT
  rationale: Same imperative as above with 3ms object suffix. English requires the
    explicit object pronoun here.
- source_word: בִּ/רְקִ֥יעַ
  chosen: in the expanse
  alternatives:
  - in the firmament
  - in the sky
  lexicon: HALOT
  rationale: רקיע denotes the spread-out expanse. 'Expanse' preserves the Hebrew image
    without the archaic feel of 'firmament' or the flattening modernism of 'sky.'
- source_word: עֻזּֽ/וֹ
  chosen: his strength
  alternatives:
  - his might
  - his power
  lexicon: HALOT
  rationale: עז commonly denotes strength or might. 'Strength' is direct and readable,
    and it preserves the genitival relation with 'expanse' without adding interpretive
    nuance.
