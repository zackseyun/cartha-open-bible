id: PSA.135.18
reference: Psalms 135:18
source:
  edition: WLC
  text: כְּ֭מוֹ/הֶם יִהְי֣וּ עֹשֵׂי/הֶ֑ם כֹּ֭ל אֲשֶׁר בֹּטֵ֣חַ בָּ/הֶֽם־׃
translation:
  text: Those who make them will become like them[a], everyone who trusts in them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be like them.' The Hebrew verb can be rendered either 'will be' or 'will become'; here the resultative sense is brought out in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּמוֹ/הֶם
  chosen: like them
  alternatives:
  - as they are
  lexicon: HALOT
  rationale: The comparative preposition with 3mp suffix introduces likeness to the idols just described. 'Like them' is idiomatic and preserves the comparison without adding interpretation.
- source_word: יִהְי֣וּ
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: 'The verb היה can mean ''be'' or, in context, ''become.'' Here the sense is resultative: idol-makers come to resemble the idols in their lifelessness/spiritual dullness. ''Will become'' communicates the force more naturally in English.'
- source_word: עֹשֵׂי/הֶם
  chosen: those who make them
  alternatives:
  - their makers
  - their makers/fashioners
  lexicon: HALOT
  rationale: The participle of עשה with suffix denotes the people who make the idols. 'Those who make them' is clear modern English and keeps the participial, agentive sense.
- source_word: כֹּל אֲשֶׁר
  chosen: everyone who
  alternatives:
  - all who
  - everyone that
  lexicon: HALOT
  rationale: The construction means 'all who/everyone who.' 'Everyone who' reads naturally in contemporary English while preserving the universal scope.
- source_word: בֹּטֵחַ
  chosen: trusts
  alternatives:
  - relies
  - has confidence
  lexicon: HALOT
  rationale: בטח commonly means 'trust' or 'rely on.' 'Trusts' is the most direct and idiomatic rendering here, especially in the polemic against idolatry.
- source_word: בָּ/הֶם
  chosen: in them
  alternatives:
  - on them
  lexicon: HALOT
  rationale: With בטח, English commonly uses 'trust in.' This preserves the object of misplaced confidence, namely the idols.
