  chosen_reading: the LORD (with vocative 'O LORD' in this verse)
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of יְהוָה
    as 'the LORD.' Because the verse is a direct address in poetic style, 'O LORD'
    appropriately reflects vocative usage while remaining within that default.
