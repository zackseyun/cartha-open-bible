id: PSA.135.7
reference: Psalms 135:7
source:
  edition: WLC
  text: מַֽעֲלֶ֣ה נְשִׂאִים֮ מִ/קְצֵ֪ה הָ֫/אָ֥רֶץ בְּרָקִ֣ים לַ/מָּטָ֣ר עָשָׂ֑ה מֽוֹצֵא
    ר֝וּחַ מֵ/אֽוֹצְרוֹתָֽי/ו־׃
translation:
  text: He makes clouds rise from the ends of the earth; he makes lightning for the
    rain; he brings out the wind from his storehouses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vapors' for 'clouds.' The Hebrew term can denote rising mist or vapor,
      but in this storm context 'clouds' best fits the sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the end of the earth.' The Hebrew idiom can be singular in form
      while expressing the earth's farthest reaches collectively.
    reason: lexical_alternative
  - marker: c
    text: Or 'from his treasuries.' The image is of God storing and releasing the
      winds at will.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲלֶה
  chosen: makes ... rise
  alternatives:
  - causes ... to ascend
  - brings up
  lexicon: HALOT
  rationale: Hiphil participle of עלה expresses causative action. In English, 'makes
    ... rise' is natural and preserves the causative sense without sounding wooden.
- source_word: נְשִׂאִים
  chosen: clouds
  alternatives:
  - vapors
  - mists
  lexicon: HALOT
  rationale: Though the noun can denote 'lifted things' and has been traditionally
    rendered 'vapors,' in meteorological context with rain, lightning, and wind, 'clouds'
    best reflects the plain sense for modern readers.
- source_word: מִקְצֵה הָאָרֶץ
  chosen: from the ends of the earth
  alternatives:
  - from the end of the earth
  - from the extremities of the earth
  lexicon: HALOT
  rationale: The singular construct with collective force is idiomatically rendered
    'the ends of the earth' in English, conveying worldwide extent rather than a single
    point.
- source_word: בְּרָקִים
  chosen: lightning
  alternatives:
  - lightnings
  - flashes of lightning
  lexicon: HALOT
  rationale: English commonly uses the mass noun 'lightning' where Hebrew has a plural
    form. This is idiomatic and preserves meaning.
- source_word: לַמָּטָר
  chosen: for the rain
  alternatives:
  - with the rain
  - for rain
  lexicon: HALOT
  rationale: 'The preposition ל here is best taken as indicating relation or purpose:
    lightning associated with rainstorms. ''For the rain'' preserves the Hebrew closely
    while remaining intelligible.'
- source_word: עָשָׂה
  chosen: makes
  alternatives:
  - made
  - produces
  lexicon: HALOT
  rationale: Though formally qatal, in this poetic description of God's characteristic
    activity it functions gnomic/present. 'Makes' fits the parallel participles and
    the psalm's praise of ongoing divine rule.
- source_word: מוֹצֵא
  chosen: brings out
  alternatives:
  - brings forth
  - causes to go out
  lexicon: HALOT
  rationale: The Hiphil participle of יצא is causative. 'Brings out' is clear modern
    English and matches the image of God releasing wind from storage.
- source_word: רוּחַ
  chosen: wind
  alternatives:
  - spirit
  - breath
  lexicon: HALOT
  rationale: In this weather sequence—clouds, rain, lightning, storehouses—the meteorological
    sense 'wind' is contextually required, not 'spirit'.
- source_word: מֵאֹצְרוֹתָיו
  chosen: from his storehouses
  alternatives:
  - from his treasuries
  - from his خزנות
  lexicon: HALOT
  rationale: The noun denotes storehouses or treasuries. In this creation imagery,
    'storehouses' communicates the concrete metaphor more naturally than 'treasuries.'
