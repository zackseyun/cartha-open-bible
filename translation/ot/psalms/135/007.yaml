theological_decisions:
- issue: Divine action described in poetic present versus past
  chosen_reading: Render the verse with present-tense verbs describing God's characteristic
    sovereign activity in creation.
  alternative_readings:
  - Render as past tense ('made,' 'brought out') following the qatal on עָשָׂה more
    strictly
  rationale: The verse is part of a hymnic description of the LORD's ongoing rule
    over creation. Present tense in English best preserves the poetic-generic force
    and aligns the finite verb with the surrounding participles.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense in readable modern English.'
