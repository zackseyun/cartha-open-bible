id: PSA.135.11
reference: Psalms 135:11
source:
  edition: WLC
  text: לְ/סִיח֤וֹן מֶ֤לֶךְ הָ/אֱמֹרִ֗י וּ֭/לְ/עוֹג מֶ֣לֶךְ הַ/בָּשָׁ֑ן וּ֝/לְ/כֹ֗ל
    מַמְלְכ֥וֹת כְּנָֽעַן׀׃
translation:
  text: to Sihon king of the Amorites, and to Og king of Bashan, and to all the kingdoms
    of Canaan.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְ/סִיחוֹן
  chosen: to Sihon
  alternatives:
  - Sihon
  lexicon: HALOT
  rationale: The prefixed לְ is retained as 'to' because this verse continues the
    syntax from the previous verse ('who struck down great kings and gave their land...'),
    listing recipients/targets within that sequence. The personal name is transliterated
    per policy.
- source_word: מֶלֶךְ הָאֱמֹרִי
  chosen: king of the Amorites
  alternatives:
  - the Amorite king
  - king of the Amorite
  lexicon: HALOT
  rationale: Construct phrase naturally rendered 'king of the Amorites.' The gentilic
    with article refers to the people group, best expressed in English as the plural
    ethnic designation.
- source_word: וּלְ/עוֹג
  chosen: and to Og
  alternatives:
  - and Og
  lexicon: HALOT
  rationale: The conjunction ו plus preposition לְ is represented explicitly as 'and
    to,' preserving the parallel structure of the Hebrew list. The name is transliterated.
- source_word: מֶלֶךְ הַבָּשָׁן
  chosen: king of Bashan
  alternatives:
  - the king of Bashan
  lexicon: HALOT
  rationale: Construct phrase rendered straightforwardly. English idiom does not require
    the article before 'king' here in a list of appositional titles.
- source_word: וּלְ/כֹל
  chosen: and to all
  alternatives:
  - and all
  lexicon: HALOT
  rationale: The preposition לְ is again preserved as 'to,' maintaining the repeated
    Hebrew rhythm and syntactic linkage.
- source_word: מַמְלְכוֹת
  chosen: kingdoms
  alternatives:
  - realms
  lexicon: HALOT
  rationale: מַמְלָכָה denotes a kingdom or royal domain. 'Kingdoms' is the standard
    and clearest rendering in this historical-geographical context.
- source_word: כְּנָעַן
  chosen: Canaan
  lexicon: HALOT
  rationale: Proper place name transliterated by standard English convention.
