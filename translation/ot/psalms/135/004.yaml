id: PSA.135.4
reference: Psalms 135:4
source:
  edition: WLC
  text: כִּֽי יַעֲקֹ֗ב בָּחַ֣ר ל֣/וֹ יָ֑הּ יִ֝שְׂרָאֵ֗ל לִ/סְגֻלָּתֽ/וֹ־׃
translation:
  text: For Yah has chosen Jacob for himself[a], Israel as his treasured possession.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: “Yah,” the short form of the divine name.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the ground or reason for the surrounding praise/exhortation. 'For' is concise and natural in English psalmic style.
- source_word: בָּחַר
  chosen: has chosen
  alternatives:
  - chose
  lexicon: HALOT
  rationale: The verb means 'choose/select.' English present perfect works well in context to express a completed divine act with abiding significance; simple past is possible but less idiomatic in this praise context.
- source_word: לּוֹ
  chosen: for himself
  alternatives:
  - for him
  lexicon: HALOT
  rationale: 'The preposition with pronominal suffix marks advantage/possession. ''For himself'' brings out the reflexive sense in idiomatic English: Jacob is chosen as belonging specially to Yah.'
- source_word: יָהּ
  chosen: the LORD
  alternatives:
  - Yah
  lexicon: HALOT
  rationale: Although the Hebrew form is the short divine name 'Yah,' the doctrine specifies the default rendering of the divine name as 'the LORD.' The shorter form is preserved as an alternative in a footnote because it is textually present and poetically significant.
- source_word: יַעֲקֹב
  chosen: Jacob
  lexicon: HALOT
  rationale: Standard transliteration of the patriarch/nation name.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Standard transliteration; here parallel to 'Jacob' as the covenant people.
- source_word: סְגֻלָּה
  chosen: treasured possession
  alternatives:
  - special possession
  - treasure
  - own possession
  lexicon: HALOT
  rationale: The noun denotes valued private property or a specially prized possession. 'Treasured possession' is clear modern English and preserves the covenantal nuance better than the less natural 'peculiar treasure' or the flatter 'special possession'.
- source_word: לִסְגֻלָּתוֹ
  chosen: as his treasured possession
  alternatives:
  - for his treasured possession
  - to be his treasured possession
  lexicon: HALOT
  rationale: The preposition marks result/purpose or relation. 'As his treasured possession' reads naturally in English while preserving the sense that Israel is set apart as belonging uniquely to him.
