id: PSA.135.17
reference: Psalms 135:17
source:
  edition: WLC
  text: אָזְנַ֣יִם לָ֭/הֶם וְ/לֹ֣א יַאֲזִ֑ינוּ אַ֝֗ף אֵין יֶשׁ ר֥וּחַ בְּ/פִי/הֶֽם־־׃
translation:
  text: They have ears, but they do not hear; indeed, there is no breath in their
    mouths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spirit' for 'breath' (Hebrew רוּחַ); here the context of lifeless idols
      and 'in their mouths' favors 'breath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָזְנַיִם
  chosen: ears
  alternatives:
  - they have ears
  lexicon: HALOT
  rationale: Literal plural noun meaning 'ears.' English supplies the possessive relation
    with 'They have ears' for natural syntax, matching the verbless Hebrew clause.
- source_word: לָהֶם
  chosen: they have
  alternatives:
  - to them
  - for them
  lexicon: HALOT
  rationale: The preposition plus pronoun in a verbless possession construction is
    best rendered idiomatically in English as 'they have.'
- source_word: וְלֹא
  chosen: but ... not
  alternatives:
  - and not
  lexicon: HALOT
  rationale: The conjunction with negation links the contrast between possessing ears
    and failing to hear. English 'but' brings out the adversative force naturally,
    though Hebrew simply has 'and not.'
- source_word: יַאֲזִינוּ
  chosen: hear
  alternatives:
  - listen
  - give ear
  lexicon: HALOT
  rationale: Hiphil of אזן means to listen attentively or give ear. In this idol-polemic
    context, 'hear' is the most idiomatic English counterpart and parallels the preceding
    body-part imagery.
- source_word: אַף
  chosen: indeed
  alternatives:
  - also
  - even
  - moreover
  lexicon: HALOT
  rationale: Here אַף intensifies the statement that follows rather than introducing
    simple addition. 'Indeed' captures the emphatic progression in the verse.
- source_word: אֵין יֶשׁ
  chosen: there is no
  alternatives:
  - there exists no
  lexicon: HALOT
  rationale: The combination functions idiomatically to deny existence. Smooth English
    is 'there is no.'
- source_word: רוּחַ
  chosen: breath
  alternatives:
  - spirit
  - wind
  lexicon: HALOT
  rationale: Although רוּחַ can mean 'spirit,' 'wind,' or 'breath,' the immediate
    context is physical incapacity of idols and the phrase 'in their mouths' points
    to literal breath, not an immaterial spirit.
- source_word: בְּפִיהֶם
  chosen: in their mouths
  alternatives:
  - in their mouth
  lexicon: HALOT
  rationale: Plural construct with 3mp suffix. 'In their mouths' is the direct and
    natural rendering, preserving the bodily imagery of the idol satire.
