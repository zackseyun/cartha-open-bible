theological_decisions:
- issue: Meaning of רוּחַ in idol-polemic context
  chosen_reading: breath
  alternative_readings:
  - spirit
  rationale: The verse catalogs sensory organs and their nonfunction, climaxing in
    the absence of animating breath in the idols' mouths. Rendering רוּחַ as 'breath'
    preserves the concrete argument that idols are lifeless, without importing a theological
    claim about possessing or lacking 'spirit' in a broader metaphysical sense.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence based on plain sense.
