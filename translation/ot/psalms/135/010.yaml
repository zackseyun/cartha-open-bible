id: PSA.135.10
reference: Psalms 135:10
source:
  edition: WLC
  text: שֶֽׁ֭/הִכָּה גּוֹיִ֣ם רַבִּ֑ים וְ֝/הָרַ֗ג מְלָכִ֥ים עֲצוּמִֽים׃
translation:
  text: who struck many nations and killed mighty kings,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'who struck many nations.'
    reason: lexical_alternative
  - marker: b
    text: Or 'powerful kings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁ/הִכָּה
  chosen: who struck down
  alternatives:
  - who struck
  - who smote
  lexicon: HALOT
  rationale: The relative particle שֶׁ introduces a relative clause continuing the
    description of the LORD from the previous verse, so English requires 'who.' הִכָּה
    from נכה commonly means 'strike, smite'; 'struck down' brings out the military/destructive
    force in context without overparaphrasing.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - peoples
  - Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם is the standard term for nations/peoples. In this military-historical
    context, 'nations' is the most natural and conventional rendering; 'Gentiles'
    would import later Jewish/Christian connotations not required here.
- source_word: רַבִּים
  chosen: many
  alternatives:
  - great many
  - numerous
  lexicon: HALOT
  rationale: The adjective straightforwardly quantifies גּוֹיִם. 'Many' is the plain,
    idiomatic equivalent.
- source_word: וְ/הָרַג
  chosen: and killed
  alternatives:
  - and slew
  - and put to death
  lexicon: HALOT
  rationale: הרג means 'kill, slay.' 'Killed' is clear modern English; 'slew' is accurate
    but archaic, and 'put to death' is too formal for the poetic parallelism.
- source_word: מְלָכִים
  chosen: kings
  lexicon: HALOT
  rationale: Direct rendering of the plural noun.
- source_word: עֲצוּמִים
  chosen: mighty
  alternatives:
  - powerful
  - strong
  lexicon: HALOT
  rationale: עָצוּם denotes strength, might, or power. 'Mighty' fits the elevated
    poetic register and pairs well with 'kings' in English.
