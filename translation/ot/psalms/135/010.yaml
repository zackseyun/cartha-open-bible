theological_decisions:
- issue: Relative-clause continuity with the preceding verse
  chosen_reading: Render the verse as a dependent clause beginning with 'who,' continuing
    the description of the LORD's acts.
  alternative_readings:
  - 'Render as an independent clause: ''He struck down many nations and killed mighty
    kings'''
  rationale: The prefixed שֶׁ on הִכָּה marks this as a relative clause linked to
    the antecedent in the previous verse. Preserving that linkage reflects the Hebrew
    syntax and the psalm's cumulative praise structure.
  doctrine_reference: Translation philosophy §1, §5
