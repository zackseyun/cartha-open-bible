theological_decisions:
- issue: Rendering of אָדָם in a generic anthropological sense
  chosen_reading: human
  alternative_readings:
  - man
  - humankind
  rationale: The verse contrasts idols with their merely human manufacture. Because
    אָדָם is generic here, 'human hands' is more idiomatic than 'hands of man' and
    avoids implying male-specific reference while preserving the source's anthropological
    force.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; אָדָם default
    ''man / humankind (context)'''
