id: PSA.135.15
reference: Psalms 135:15
source:
  edition: WLC
  text: עֲצַבֵּ֣י הַ֭/גּוֹיִם כֶּ֣סֶף וְ/זָהָ֑ב מַ֝עֲשֵׂ֗ה יְדֵ֣י אָדָֽם׃
translation:
  text: The idols of the nations are silver and gold, the work of human hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'images' for 'idols.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the work of the hands of man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲצַבֵּי
  chosen: idols
  alternatives:
  - images
  lexicon: HALOT
  rationale: The noun עֲצַבִּים commonly refers to idols rather than merely neutral
    'images.' In this polemical context against false worship, 'idols' best captures
    the semantic and theological force.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם in the Psalms commonly denotes the nations/peoples outside Israel.
    'The nations' is the most natural and contextually appropriate English rendering
    here.
- source_word: כֶּסֶף וְזָהָב
  chosen: silver and gold
  lexicon: HALOT
  rationale: A straightforward material description of the idols' composition; no
    idiomatic adjustment is needed.
- source_word: מַעֲשֵׂה
  chosen: the work of
  alternatives:
  - a work of
  - made by
  lexicon: HALOT
  rationale: The construct phrase מַעֲשֵׂה יְדֵי is idiomatically rendered 'the work
    of [the] hands of.' This preserves the formal structure while remaining natural
    English.
- source_word: יְדֵי
  chosen: hands
  lexicon: HALOT
  rationale: Literal rendering is appropriate; the phrase emphasizes human manufacture
    in contrast to divine reality.
- source_word: אָדָם
  chosen: human
  alternatives:
  - man
  - humankind
  lexicon: HALOT
  rationale: Per the doctrine's gender-accurate guidance, אָדָם here is generic rather
    than male-specific. In the construct phrase 'human hands,' 'human' communicates
    the generic sense naturally in English while preserving the contrast between man-made
    idols and the living God.
