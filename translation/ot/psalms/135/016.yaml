theological_decisions:
- issue: Anthropomorphic description of idols
  chosen_reading: Render the verse as a mockery of idols' sensory organs without adding interpretive language about their powerlessness.
  alternative_readings:
  - They have mouths, but cannot speak; eyes have they, but cannot see.
  rationale: The verse participates in a polemic against idols by describing body parts that fail to function. The translation should preserve the concrete imagery and not import extra theological explanation into the main text. English word order is normalized for readability while retaining the contrast.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve what the source text says without paraphrastic expansion.'
