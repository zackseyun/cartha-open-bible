id: PSA.135.16
reference: Psalms 135:16
source:
  edition: WLC
  text: פֶּֽה לָ֭/הֶם וְ/לֹ֣א יְדַבֵּ֑רוּ עֵינַ֥יִם לָ֝/הֶ֗ם וְ/לֹ֣א יִרְאֽוּ־׃
translation:
  text: They have mouths[a], but do not speak; they have eyes, but do not see.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'A mouth is to them ... eyes are to them,' a possessive construction meaning 'They have a mouth/mouths ... eyes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּה
  chosen: mouths
  alternatives:
  - a mouth
  lexicon: HALOT
  rationale: Although the Hebrew noun is singular in form ('mouth'), it is used distributively with the plural pronominal phrase 'to/for them' and plural verbs, referring to the idols collectively. English idiom prefers the plural 'mouths' here, matching the parallel 'eyes' and the distributive sense.
- source_word: לָהֶם
  chosen: they have
  alternatives:
  - to them
  - for them
  lexicon: HALOT
  rationale: The preposition ל with pronominal suffix literally means 'to them,' but in this possession construction it is most naturally rendered in English as 'they have.' This avoids wooden English while preserving the possessive sense.
- source_word: יְדַבֵּרוּ
  chosen: do not speak
  alternatives:
  - cannot speak
  - do not talk
  lexicon: HALOT
  rationale: The verb דבר in the piel means 'speak.' The Hebrew states simple negation ('do not speak'), not explicit inability ('cannot speak'), so the translation preserves the form of the assertion while still conveying the idols' impotence by context.
- source_word: עֵינַיִם
  chosen: eyes
  lexicon: HALOT
  rationale: Straightforward lexical rendering. The plural fits both Hebrew form and English idiom.
- source_word: יִרְאוּ
  chosen: do not see
  alternatives:
  - cannot see
  - do not perceive
  lexicon: HALOT
  rationale: ראה in the qal commonly means 'see.' As with 'do not speak,' the Hebrew uses simple negation rather than an explicit modal of inability, so 'do not see' is the most textually precise rendering.
