id: PSA.135.8
reference: Psalms 135:8
source:
  edition: WLC
  text: שֶֽׁ֭/הִכָּה בְּכוֹרֵ֣י מִצְרָ֑יִם מֵ֝/אָדָ֗ם עַד בְּהֵמָֽה־׃
translation:
  text: who struck down the firstborn of Egypt[b][a], from man to beast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who struck the firstborn of Egypt.' The fuller rendering 'struck down' makes explicit the lethal sense in context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from man to beast,' a stock expression meaning from humans to animals.
    reason: cultural_note
lexical_decisions:
- source_word: שֶׁ/הִכָּה
  chosen: who struck down
  alternatives:
  - who struck
  - who smote
  lexicon: HALOT
  rationale: 'The relative particle with the Hiphil perfect 3ms of נכה continues the prior description of the LORD: ''who struck down.'' ''Struck down'' brings out the lethal force in context (the death of the firstborn) more clearly than the bare ''struck,'' while remaining faithful to the verb.'
- source_word: בְּכוֹרֵי
  chosen: the firstborn
  alternatives:
  - firstborn ones
  lexicon: HALOT
  rationale: Construct plural of בכור, referring collectively to those holding firstborn status. English idiom prefers 'the firstborn' as a collective expression.
- source_word: מִצְרָיִם
  chosen: of Egypt
  alternatives:
  - of the Egyptians
  lexicon: HALOT
  rationale: The genitive is most naturally rendered 'of Egypt' in English, matching the Hebrew proper noun and the common biblical expression for the plague on Egypt's firstborn.
- source_word: מֵ/אָדָם
  chosen: from man
  alternatives:
  - from humankind
  - from human
  lexicon: HALOT
  rationale: Following the doctrine guideline for אָדָם, this context contrasts humans with animals, not humanity in the abstract. 'Man' is gender-accurate and idiomatic in the fixed expression 'from man to beast.'
- source_word: עַד
  chosen: to
  alternatives:
  - even to
  - as far as
  lexicon: HALOT
  rationale: In the correlative range expression מִן...עַד, English idiom is 'from ... to ...'. This preserves the totality of the scope.
- source_word: בְּהֵמָה
  chosen: beast
  alternatives:
  - livestock
  - animal
  lexicon: HALOT
  rationale: '''Beast'' fits the established biblical collocation ''from man to beast'' and reflects the broad category of animals here. ''Livestock'' is possible in Exodus plague contexts, but the psalm''s wording is more general.'
