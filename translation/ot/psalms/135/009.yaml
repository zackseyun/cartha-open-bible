id: PSA.135.9
reference: Psalms 135:9
source:
  edition: WLC
  text: שָׁלַ֤ח אֹת֣וֹת וּ֭/מֹפְתִים בְּ/תוֹכֵ֣/כִי מִצְרָ֑יִם בְּ֝/פַרְעֹ֗ה וּ/בְ/כָל עֲבָדָֽי/ו׀־׃
translation:
  text: He sent signs and wonders into your midst[a], O Egypt[b], against Pharaoh and against all his servants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your midst, Egypt.' The Hebrew addresses Egypt directly with a feminine singular suffix, personifying the nation.
    reason: lexical_alternative
  - marker: b
    text: Or 'upon Pharaoh and upon all his servants.' The Hebrew preposition can be rendered more literally as 'on/upon,' but here it likely indicates the plagues' hostile effect against them.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלַח
  chosen: He sent
  alternatives:
  - He dispatched
  lexicon: HALOT
  rationale: Qal perfect 3ms of שלח, with God as the implied subject from context. 'He sent' is the natural and idiomatic English rendering in poetic narrative recollection.
- source_word: אֹתוֹת
  chosen: signs
  alternatives:
  - tokens
  lexicon: HALOT
  rationale: אות commonly denotes signs or symbolic acts. 'Signs' is the standard clear rendering, especially in the Exodus-plague context.
- source_word: מֹפְתִים
  chosen: wonders
  alternatives:
  - portents
  - miracles
  lexicon: HALOT
  rationale: מופתים often pairs with אותות as 'signs and wonders.' 'Wonders' preserves the established Hebrew collocation without overinterpreting as 'miracles' alone.
- source_word: בְּתוֹכֵכִי
  chosen: into your midst, O Egypt
  alternatives:
  - in your midst, O Egypt
  - within you, O Egypt
  lexicon: HALOT
  rationale: The preposition ב plus תוך with 2fs suffix means 'in/into your midst.' The feminine singular suffix addresses Egypt personified, so 'your' is singular and 'O Egypt' makes the vocative force explicit in English.
- source_word: מִצְרָיִם
  chosen: O Egypt
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: Used here in direct address following the 2fs suffix on 'your midst.' Adding 'O' helps signal the vocative/personified address in readable English.
- source_word: בְּפַרְעֹה
  chosen: against Pharaoh
  alternatives:
  - on Pharaoh
  - upon Pharaoh
  lexicon: HALOT
  rationale: The preposition ב in this context marks the target of the signs and wonders. 'Against Pharaoh' best conveys hostile impact in idiomatic English.
- source_word: וּבְכָל עֲבָדָיו
  chosen: and against all his servants
  alternatives:
  - and against all his officials
  - and against all his slaves
  lexicon: HALOT
  rationale: עבדים can mean servants, slaves, or officials depending on context. In reference to Pharaoh's court and attendants, 'servants' is the broadest and most natural choice; 'officials' is possible but narrower, while 'slaves' would likely mislead in this royal-court setting.
