theological_decisions:
- issue: Poetic repetition of נַחֲלָה
  chosen_reading: 'Preserve the repetition in the main text: ''as an inheritance,
    an inheritance'''
  alternative_readings:
  - Compress to a single occurrence in smoother English
  rationale: The Hebrew intentionally repeats the noun for emphasis. Preserving the
    repetition better reflects the source text and its covenantal weight without adding
    interpretation.
