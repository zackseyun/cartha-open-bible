id: PSA.135.12
reference: Psalms 135:12
source:
  edition: WLC
  text: וְ/נָתַ֣ן אַרְצָ֣/ם נַחֲלָ֑ה נַ֝חֲלָ֗ה לְ/יִשְׂרָאֵ֥ל עַמּֽ/וֹ׃
translation:
  text: And he gave their land as an inheritance, an inheritance to Israel his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as a heritage'; the Hebrew repeats 'inheritance' for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַן
  chosen: And he gave
  alternatives:
  - and gave
  - then he gave
  lexicon: HALOT
  rationale: Qal wayyiqtol of נתן commonly advances the narrative/praise sequence
    with past sense. English supplies the subject as 'he' from context and renders
    the conjunction naturally as 'And.'
- source_word: אַרְצָם
  chosen: their land
  alternatives:
  - their country
  - their territory
  lexicon: HALOT
  rationale: אֶרֶץ can mean land, earth, country, or territory. Here the 3mp suffix
    refers to the defeated nations/kings in the preceding context, and 'land' is the
    most natural concise rendering.
- source_word: נַחֲלָה
  chosen: as an inheritance
  alternatives:
  - for a possession
  - as a heritage
  lexicon: HALOT
  rationale: 'The first occurrence functions predicatively after נתן: he gave their
    land ''as an inheritance.'' ''Inheritance'' preserves the covenantal allotment
    sense better than the broader ''possession.'''
- source_word: נַחֲלָה
  chosen: an inheritance
  alternatives:
  - a heritage
  - a possession
  lexicon: HALOT
  rationale: The second occurrence is an emphatic repetition. Repeating 'an inheritance'
    in English preserves the Hebrew poetic emphasis rather than smoothing it away.
- source_word: לְיִשְׂרָאֵל
  chosen: to Israel
  alternatives:
  - for Israel
  lexicon: HALOT
  rationale: The preposition ל marks the recipient/beneficiary. 'To Israel' is the
    most direct rendering in this construction.
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - his nation
  lexicon: HALOT
  rationale: עַם denotes a people, especially covenant people. 'His people' is the
    standard and contextually appropriate rendering.
