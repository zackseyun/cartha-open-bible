id: PSA.49.3
reference: Psalms 49:3
source:
  edition: WLC
  text: גַּם בְּנֵ֣י אָ֭דָם גַּם בְּנֵי אִ֑ישׁ יַ֝֗חַד עָשִׁ֥יר וְ/אֶבְיֽוֹן־־־׃
translation:
  text: both low and high, together, rich and poor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'both sons of Adam and sons of man'; here the paired expressions
      function idiomatically for people of low and high status.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם ... גַּם
  chosen: both ... and
  alternatives:
  - also ... also
  - whether ... or
  lexicon: HALOT
  rationale: The repeated גַּם marks inclusion of both paired groups. English 'both
    ... and' captures the distributive force naturally.
- source_word: בְּנֵי אָדָם
  chosen: low
  alternatives:
  - sons of man
  - common people
  - humankind
  lexicon: HALOT
  rationale: In this collocation with בְּנֵי אִישׁ, the phrase functions idiomatically
    as a social contrast rather than a literal filial expression. 'Low' conveys people
    of low status, matching the parallelism. A more literal 'sons of man' would obscure
    the idiom in English.
- source_word: בְּנֵי אִישׁ
  chosen: high
  alternatives:
  - sons of men
  - nobles
  - important people
  lexicon: HALOT
  rationale: Paired with בְּנֵי אָדָם, this phrase denotes those of higher social
    standing. 'High' is concise and preserves the status contrast in poetic form.
- source_word: יַחַד
  chosen: together
  alternatives:
  - alike
  - equally
  lexicon: HALOT
  rationale: יַחַד signals that these groups are addressed jointly. 'Together' is
    the most direct rendering, while also fitting the poetic cadence.
- source_word: עָשִׁיר
  chosen: rich
  alternatives:
  - wealthy
  lexicon: HALOT
  rationale: Standard, natural English equivalent in a socioeconomic pairing.
- source_word: וְאֶבְיוֹן
  chosen: and poor
  alternatives:
  - and needy
  lexicon: HALOT
  rationale: In contrast with 'rich,' 'poor' is the clearest and most idiomatic rendering.
    'Needy' is possible lexically but weaker in this social-status parallelism.
