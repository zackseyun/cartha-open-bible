id: PSA.139.2
reference: Psalms 139:2
source:
  edition: WLC
  text: אַתָּ֣ה יָ֭דַעְתָּ שִׁבְתִּ֣/י וְ/קוּמִ֑/י בַּ֥נְתָּה לְ֝/רֵעִ֗/י מֵ/רָחֽוֹק׃
translation:
  text: You know my sitting down and my rising up[b][a]; you understand my thought from afar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my intention' or 'my purpose' for 'my thought.'
    reason: lexical_alternative
  - marker: b
    text: '''From afar'' may refer to spatial distance or to God''s discerning the thought long before it is expressed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדַעְתָּ
  chosen: know
  alternatives:
  - have known
  - perceive
  lexicon: HALOT
  rationale: Qal perfect 2ms of ידע addresses God directly and expresses his complete knowledge. Present English 'know' best conveys the stative force in context, matching the psalm's description of God's ongoing exhaustive knowledge.
- source_word: שִׁבְתִּי
  chosen: my sitting down
  alternatives:
  - my sitting
  - when I sit down
  lexicon: HALOT
  rationale: From ישׁב with 1cs suffix. The noun-like infinitive/verb form here refers to the psalmist's act/state of sitting. 'My sitting down' preserves the paired merism with 'my rising up' and stays close to the Hebrew structure.
- source_word: וְקוּמִי
  chosen: my rising up
  alternatives:
  - my rising
  - when I rise
  lexicon: HALOT
  rationale: From קום with 1cs suffix, paired with 'my sitting down.' 'My rising up' preserves the parallelism and idiomatic range of ordinary movements, likely a merism for the whole of daily activity.
- source_word: בַּנְתָּה
  chosen: understand
  alternatives:
  - discern
  - consider
  lexicon: HALOT
  rationale: Qal perfect 2ms of בין. In this context it denotes penetrating understanding rather than merely cognitive awareness. 'Understand' distinguishes it appropriately from the earlier 'know' while remaining natural English.
- source_word: לְרֵעִי
  chosen: my thought
  alternatives:
  - my intention
  - my purpose
  lexicon: HALOT
  rationale: The noun רֵעַ/רֵעַי here refers to thought, intention, or mental disposition. 'My thought' is the most straightforward singular rendering in context and matches the sense of inner cognition known by God.
- source_word: מֵרָחוֹק
  chosen: from afar
  alternatives:
  - from far away
  - at a distance
  lexicon: HALOT
  rationale: Literally 'from far off/far away.' In context it may describe either God's discerning the psalmist's thought from afar or his knowing it long before it is expressed. 'From afar' preserves the Hebrew imagery and ambiguity without over-interpreting.
