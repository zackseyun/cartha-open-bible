id: PSA.139.6
reference: Psalms 139:6
source:
  edition: WLC
  text: פלאיה דַ֣עַת מִמֶּ֑/נִּי נִ֝שְׂגְּבָ֗ה לֹא א֥וּכַֽל לָֽ/הּ־׃
translation:
  text: Such knowledge is too wonderful for me[a]; it is too high—I cannot attain it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Such knowledge is beyond me; it is exalted; I cannot reach it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פלאיה
  chosen: too wonderful
  alternatives:
  - wonderful
  - extraordinary
  - beyond wonder
  lexicon: HALOT
  rationale: From פלא/פלאי, expressing something extraordinary or surpassing ordinary comprehension. Rendered with 'too wonderful' to reflect the predicative force and the sense of exceeding the speaker's grasp, in natural English with the following phrase.
- source_word: דַעַת
  chosen: knowledge
  alternatives:
  - understanding
  - knowing
  lexicon: HALOT
  rationale: The noun commonly means 'knowledge.' In context it refers to the knowledge just described in the preceding verses, so 'knowledge' is the most direct and coherent rendering.
- source_word: מִמֶּנִּי
  chosen: for me
  alternatives:
  - than me
  - beyond me
  lexicon: HALOT
  rationale: Literally 'from me' or 'than me,' but idiomatically here it marks something beyond the psalmist's capacity. 'For me' works smoothly with 'too wonderful' in English while preserving the sense of personal limitation.
- source_word: נִשְׂגְּבָה
  chosen: it is too high
  alternatives:
  - it is exalted
  - it is beyond reach
  - it is inaccessible
  lexicon: HALOT
  rationale: From שׂגב, conveying height, exaltation, or inaccessibility. 'It is too high' preserves the metaphor of height and fits the parallel statement about inability to attain it.
- source_word: לֹא א֥וּכַֽל
  chosen: I cannot
  alternatives:
  - I am not able
  - I cannot prevail
  lexicon: HALOT
  rationale: Straightforward rendering of the first-person singular of יכל with negation, expressing inability.
- source_word: לָהּ
  chosen: attain it
  alternatives:
  - reach it
  - grasp it
  lexicon: HALOT
  rationale: The preposition plus pronoun literally means 'to it.' In English, the implied verb complement after 'I cannot' must be supplied from the context of height/inaccessibility. 'Attain it' best captures the metaphor of something too high to reach, while also fitting the intellectual context.
