id: PSA.38.8
reference: Psalms 38:8
source:
  edition: WLC
  text: כִּֽי כְ֭סָלַ/י מָלְא֣וּ נִקְלֶ֑ה וְ/אֵ֥ין מְ֝תֹ֗ם בִּ/בְשָׂרִֽ/י־׃
translation:
  text: For my loins are filled with burning[b][a], and there is no soundness in my flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my flanks' or 'my hips'; the Hebrew term refers to the midsection/loins region.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew word rendered 'burning sores' is difficult; it may also be understood as 'inflammation' or 'burning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason for the psalmist's distress in the surrounding context. 'For' fits the explanatory force naturally in English.
- source_word: כְסָלַי
  chosen: my loins
  alternatives:
  - my flanks
  - my hips
  - my lower back
  lexicon: HALOT
  rationale: כֶּסֶל can denote the loins/flanks region. 'My loins' preserves the bodily reference with traditional precision, while avoiding over-interpretation toward either back or sexual organs.
- source_word: מָלְאוּ
  chosen: are filled
  alternatives:
  - have become full
  - are full
  lexicon: HALOT
  rationale: The verb מלא in the qal expresses being full/filled. 'Are filled' is idiomatic with the following predicate and preserves the stative-result sense.
- source_word: נִקְלֶה
  chosen: burning sores
  alternatives:
  - inflammation
  - scorching
  - disgrace
  - vileness
  lexicon: HALOT
  rationale: The term is difficult and has been understood either as a physical condition (inflammation/burning) or, less likely here, a moral/abstract sense such as 'vileness.' In this bodily-suffering context, a concrete medical-like rendering is most coherent. 'Burning sores' captures the likely sense of an inflamed, loathsome condition without becoming overly technical.
- source_word: וְאֵין
  chosen: and there is no
  alternatives:
  - and there is not
  lexicon: HALOT
  rationale: Standard existential negation. 'And there is no' is natural English and preserves the clause structure.
- source_word: מְתֹם
  chosen: soundness
  alternatives:
  - wholeness
  - health
  - integrity
  lexicon: HALOT
  rationale: In bodily contexts, מְתֹם denotes soundness or health, especially the absence of injury or disease. 'Soundness' preserves the broad physical sense and matches the parallelism with bodily affliction.
- source_word: בבשרי
  chosen: in my flesh
  alternatives:
  - in my body
  lexicon: HALOT
  rationale: בָּשָׂר here refers literally to the psalmist's physical flesh/body, not a theological metaphor. Per translation philosophy, 'flesh' is retained in literal contexts.
