id: PSA.76.7
reference: Psalms 76:7
source:
  edition: WLC
  text: מִ֭/גַּעֲרָ֣תְ/ךָ אֱלֹהֵ֣י יַעֲקֹ֑ב נִ֝רְדָּ֗ם וְ/רֶ֣כֶב וָ/סֽוּס׃
translation:
  text: At your rebuke[a], O God of Jacob[b], both chariot and horse were cast into a deep sleep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'From your rebuke' or 'Because of your rebuke.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'chariot and horse,' a poetic way of referring to military force; some understand the image as extending to their riders as well.
    reason: cultural_note
lexical_decisions:
- source_word: מִגַּעֲרָתְךָ
  lemma: מִן
  chosen: At your rebuke
  alternatives:
  - From your rebuke
  - Because of your rebuke
  lexicon: HALOT
  rationale: The preposition מִן with גְּעָרָה can denote source or cause. In English, 'At your rebuke' idiomatically conveys the immediate effect of God's threatening word while remaining close to the Hebrew.
- source_word: אֱלֹהֵי יַעֲקֹב
  chosen: O God of Jacob
  alternatives:
  - God of Jacob
  lexicon: HALOT
  rationale: The construct phrase is a divine title. Rendering with 'O' reflects direct address in context, fitting the vocative force in the poetic line.
- source_word: נִרְדָּם
  chosen: fell into a deep sleep
  alternatives:
  - slept
  - were stunned into sleep
  - lay dormant
  lexicon: HALOT
  rationale: The Niphal of רדם commonly denotes being cast into deep sleep or stupor, not ordinary rest. 'Fell into a deep sleep' preserves the force and the sudden disabling effect in context.
- source_word: וְרֶכֶב וָסוּס
  chosen: both chariot and horse
  alternatives:
  - chariot and horse
  - rider and horse
  lexicon: HALOT
  rationale: The Hebrew names the war chariot and the horse. 'Both' brings out the correlative force of the paired nouns. 'Rider and horse' is interpretive and not supported by the consonantal text here.
