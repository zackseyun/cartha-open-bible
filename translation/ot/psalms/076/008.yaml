theological_decisions:
- issue: Nature of divine fear
  chosen_reading: Render נורא as 'to be feared' to preserve both dread and reverent awe before God.
  alternative_readings:
  - fearsome
  - awesome
  rationale: The verse speaks of God's overwhelming majesty and the inability of anyone to stand before him in anger. 'To be feared' preserves the theological gravity without reducing the term either to mere terror or to weakened modern idiom.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic or flattened'
