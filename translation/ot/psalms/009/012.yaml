theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of יֹשֵׁב צִיּוֹן
  chosen_reading: who dwells in Zion
  alternative_readings:
  - enthroned in Zion
  rationale: The phrase can evoke both residence and kingship. The chosen rendering preserves God's presence in Zion without forcing a more interpretive royal nuance into the main text; the alternative is preserved in a footnote because it is contextually plausible and theologically meaningful in Psalms.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
