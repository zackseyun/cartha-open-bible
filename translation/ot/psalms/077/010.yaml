id: PSA.77.10
reference: Psalms 77:10
source:
  edition: WLC
  text: הֲ/שָׁכַ֣ח חַנּ֣וֹת אֵ֑ל אִם קָפַ֥ץ בְּ֝/אַ֗ף רַחֲמָ֥י/ו סֶֽלָה־׃
translation:
  text: Has God forgotten to be gracious? Has he in anger shut up his compassion? Selah[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Has God forgotten to show favor? Or has he in anger withheld his mercies?'
    reason: lexical_alternative
  - marker: b
    text: '''Selah'' is likely a liturgical or musical marker; its precise meaning is uncertain.'
    reason: cultural_note
lexical_decisions:
- source_word: הֲ/שָׁכַח
  chosen: Has ... forgotten
  alternatives:
  - Has ... ceased to remember
  lexicon: HALOT
  rationale: The interrogative הֲ with שׁכח introduces a rhetorical question. 'Forgotten' is the natural English equivalent and preserves the psalmist's anguished questioning without paraphrase.
- source_word: חַנּוֹת
  chosen: to be gracious
  alternatives:
  - to show favor
  - to be kind
  lexicon: HALOT
  rationale: The infinitive from חנן denotes showing grace or favor. 'To be gracious' best preserves the theological and lexical connection to divine grace language in the Hebrew Bible.
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty God
  lexicon: HALOT
  rationale: אֵל here is the common divine title, not the Tetragrammaton. 'God' is the clear and idiomatic rendering in context.
- source_word: אִם
  chosen: Has
  alternatives:
  - Or has
  - whether
  lexicon: HALOT
  rationale: Following the first rhetorical question, אִם introduces a second parallel question. Rendering it as a fresh English interrogative ('Has') produces natural parallelism. The adversative/alternative nuance is preserved in the footnote as 'Or has'.
- source_word: קָפַץ
  chosen: shut up
  alternatives:
  - withheld
  - restrained
  - closed off
  lexicon: HALOT
  rationale: The verb literally conveys shutting or closing. In idiomatic collocation with compassion, 'shut up' preserves the concrete metaphor better than the more interpretive 'withheld'.
- source_word: בְּ/אַף
  chosen: in anger
  alternatives:
  - in his anger
  - in wrath
  lexicon: HALOT
  rationale: אַף literally means 'nose' and by extension 'anger/wrath.' 'In anger' is concise, idiomatic, and fits the prepositional phrase without overformalizing.
- source_word: רַחֲמָיו
  chosen: his compassion
  alternatives:
  - his mercies
  - his tender mercies
  lexicon: HALOT
  rationale: Though morphologically plural, the noun often functions as an abstract collective for divine compassion/mercy. 'His compassion' is natural modern English; the traditional plural 'mercies' is preserved in a footnote as a lexical alternative.
- source_word: סֶלָה
  chosen: Selah
  alternatives: []
  lexicon: HALOT
  rationale: The term's precise force is uncertain; standard practice is to transliterate rather than conjecturally translate. This preserves the Hebrew liturgical marker transparently.
