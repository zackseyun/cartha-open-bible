id: PSA.77.16
reference: Psalms 77:16
source:
  edition: WLC
  text: גָּאַ֣לְתָּ בִּ/זְר֣וֹעַ עַמֶּ֑/ךָ בְּנֵי יַעֲקֹ֖ב וְ/יוֹסֵ֣ף סֶֽלָה־׃
translation:
  text: You redeemed your people with your arm[a], the sons of Jacob and Joseph[d][c][b]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ransomed' or 'delivered' for 'redeemed.'
    reason: lexical_alternative
  - marker: b
    text: '''By your arm'' keeps the Hebrew image of God''s mighty power at work.'
    reason: lexical_alternative
  - marker: c
    text: '''The sons of Jacob and Joseph'' may function as a poetic way of referring to Israel, with ''Joseph'' possibly highlighting the tribes descended from him.'
    reason: alternative_reading
  - marker: d
    text: '''Selah'' is likely a liturgical or musical notation; its exact meaning is uncertain.'
    reason: cultural_note
lexical_decisions:
- source_word: גָּאַלְתָּ
  chosen: redeemed
  alternatives:
  - ransomed
  - delivered
  lexicon: HALOT
  rationale: The verb גאל commonly denotes acting as a kinsman-redeemer or effecting redemption/deliverance. 'Redeemed' preserves the covenantal and salvific weight better than the more generic 'delivered,' while remaining natural English in a psalm recalling God's saving acts.
- source_word: בִּזְרוֹעַ
  chosen: by your arm
  alternatives:
  - with your arm
  - by your power
  lexicon: HALOT
  rationale: זְרוֹעַ literally means 'arm' and often functions as a metaphor for strength or mighty action. The literal image is retained as 'by your arm' to preserve the poetic and biblical idiom rather than flattening it to 'power.'
- source_word: עַמֶּךָ
  chosen: your people
  lexicon: HALOT
  rationale: עַם with second masculine singular suffix is straightforwardly 'your people,' the covenant community addressed in prayer to God.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the children of
  - the descendants of
  lexicon: HALOT
  rationale: The construct בְּנֵי is formally 'sons of.' In this genealogical-national expression, 'sons of' preserves the Hebrew form and aligns with the project's gender-accurate principle. More interpretive renderings like 'descendants of' are possible but less formally transparent.
- source_word: יַעֲקֹב
  chosen: Jacob
  rationale: Personal name transliterated by standard English convention.
- source_word: וְיוֹסֵף
  chosen: and Joseph
  rationale: Personal name transliterated. Joseph is included alongside Jacob likely as a representative designation for the tribes, especially the northern tribes/Ephraim-Manasseh, but the translation keeps the Hebrew wording without importing an interpretive expansion into the main text.
- source_word: סֶלָה
  chosen: Selah
  alternatives:
  - Interlude
  lexicon: HALOT
  rationale: סֶלָה is traditionally transliterated because its precise force is uncertain, likely a liturgical or musical marker. Transliteration preserves the textual feature without overclaiming its meaning.
