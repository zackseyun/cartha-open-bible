theological_decisions:
- issue: National designation in 'the sons of Jacob and Joseph'
  chosen_reading: Retain the dual naming literally without resolving whether 'Joseph' stands for the northern tribes, all Israel, or a poetic parallel to Jacob.
  alternative_readings:
  - Interpret 'Joseph' as specifically Ephraim/Manasseh or the northern kingdom
  - Interpret the phrase as a full synonym for all Israel
  rationale: The Hebrew names Jacob and Joseph together, but does not explicitly explain the representative function. Preserving the wording maintains the poetic and historical resonance without importing a narrower tribal theory into the translation.
  doctrine_reference: Preserve theological tension rather than resolve it.
