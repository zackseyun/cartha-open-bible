id: PSA.148.1
reference: Psalms 148:1
source:
  edition: WLC
  text: הַ֥לְלוּ יָ֨הּ הַֽלְל֣וּ אֶת יְ֭הוָה מִן הַ/שָּׁמַ֑יִם הַֽ֝לְל֗וּ/הוּ בַּ/מְּרוֹמִֽים׀־־׃
translation:
  text: Praise Yah! Praise Yahweh from the heavens[a]; praise him in the heights.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Hallelu-Yah, literally 'Praise Yah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַ֥לְלוּ
  chosen: Praise
  alternatives:
  - Give praise
  - Hallelu
  lexicon: HALOT
  rationale: Imperative plural of הלל in the Piel, functioning as a direct summons to praise. 'Praise' is the clearest natural English imperative. 'Hallelu' would be transliteration rather than translation.
- source_word: יָ֨הּ
  chosen: Yah
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: This is the short poetic form of the divine name, distinct from the following יְהוָה. Since the doctrine excerpt specifies 'the LORD' for יְהוָה, retaining 'Yah' here preserves the Hebrew distinction and explains the liturgical cry behind 'Hallelujah.'
- source_word: יְ֭הוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per the doctrine table, יְהוָה is rendered 'the LORD.' This also preserves the distinction between the short form יָהּ and the full covenant name in this verse.
- source_word: מִן הַ/שָּׁמַ֑יִם
  chosen: from the heavens
  alternatives:
  - from heaven
  - in the heavens
  lexicon: HALOT
  rationale: The Hebrew is plural, 'the heavens.' 'From the heavens' best reflects מִן plus the plural noun and fits the psalm's cosmic summons. Singular 'heaven' is smoother in English but less formally precise.
- source_word: הַֽ֝לְל֗וּ/הוּ
  chosen: praise him
  alternatives:
  - praise the LORD
  lexicon: HALOT
  rationale: The verb includes a 3ms pronominal suffix, explicitly referring back to the LORD. 'Praise him' preserves the Hebrew pronominal cohesion and avoids unnecessary repetition.
- source_word: בַּ/מְּרוֹמִֽים
  chosen: in the heights
  alternatives:
  - in the high places
  - in the highest heavens
  lexicon: HALOT
  rationale: מְרוֹמִים denotes exalted heights or high places. 'In the heights' is concise, natural, and preserves the elevated spatial imagery without over-interpreting it as specifically 'highest heavens.'
