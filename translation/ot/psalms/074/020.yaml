theological_decisions:
- issue: Whether to make the covenant explicitly possessive
  chosen_reading: the covenant
  alternative_readings:
  - your covenant
  rationale: The Hebrew text says 'the covenant' with the article, not an explicit possessive suffix. Since the referent is God's covenant with his people, some translations make this explicit, but the main text preserves the source wording more closely.
