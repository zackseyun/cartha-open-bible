theological_decisions:
- issue: Anthropopathic language for divine anger and rejection
  chosen_reading: 'Retain the strong personal language: ''was enraged'' and ''utterly rejected.'''
  alternative_readings:
  - Soften to 'was displeased' and 'disfavored'
  rationale: The Hebrew uses forceful covenant-judgment language. Per translation philosophy, the text's theological tension should be preserved rather than softened to avoid discomfort. This does not imply sinful passion in God, but communicates the severity of divine judgment as stated in the psalm.
