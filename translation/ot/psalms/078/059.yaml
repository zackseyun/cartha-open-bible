id: PSA.78.59
reference: Psalms 78:59
source:
  edition: WLC
  text: שָׁמַ֣ע אֱ֭לֹהִים וַֽ/יִּתְעַבָּ֑ר וַ/יִּמְאַ֥ס מְ֝אֹ֗ד בְּ/יִשְׂרָאֵֽל׃
translation:
  text: God heard and was furious[b][a], and he utterly rejected Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was provoked to anger.' The Hebrew verb can express becoming angry or being stirred to wrath.
    reason: lexical_alternative
  - marker: b
    text: Or 'spurned' or 'despised.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַע
  chosen: heard
  alternatives:
  - listened
  - heard of
  lexicon: HALOT
  rationale: The Qal perfect commonly means 'hear.' In context it introduces God's response to Israel's conduct, so simple 'heard' is the most natural and sufficiently formal rendering.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although morphologically plural in form, with singular verbal sense here it clearly refers to the God of Israel; standard English rendering is 'God.'
- source_word: וַיִּתְעַבָּר
  chosen: was enraged
  alternatives:
  - became furious
  - was filled with wrath
  - was provoked to anger
  lexicon: HALOT
  rationale: From עבר in the Hitpael, the sense here is idiomatically becoming angry or enraged. 'Was enraged' preserves the emotional force without overparaphrasing. 'Was provoked' would shift focus toward causation more than the Hebrew explicitly does.
- source_word: וַיִּמְאַס
  chosen: rejected
  alternatives:
  - spurned
  - despised
  - abhorred
  lexicon: HALOT
  rationale: מאס often means reject, refuse, or spurn. 'Rejected' fits the covenantal/judicial context and reads naturally in modern English. 'Despised' would overemphasize emotional contempt over the act of repudiation.
- source_word: מְאֹד
  chosen: utterly
  alternatives:
  - greatly
  - very much
  lexicon: HALOT
  rationale: The adverb intensifies the rejection. 'Utterly rejected' is idiomatic English and carries the force of strong intensification better than the wooden 'rejected very much.'
- source_word: בְּיִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - against Israel
  lexicon: HALOT
  rationale: 'With מאס, the preposition marks the object toward which rejection is directed. English normally expresses this simply as a direct object: ''rejected Israel.'' ''Against Israel'' is possible as an interpretive expansion but less natural.'
