theological_decisions:
- issue: Royal-pastoral metaphor for David's calling
  chosen_reading: Retain the shepherding imagery explicitly ('to shepherd') rather than flattening it to 'to lead' or 'to care for.'
  alternative_readings:
  - to lead Jacob his people
  - to care for Jacob his people
  rationale: The verse intentionally links David's literal work with sheep to his later role over Israel. Preserving 'shepherd' maintains the theological and literary connection without importing later doctrinal claims.
