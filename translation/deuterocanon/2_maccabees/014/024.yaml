translation:
  text: And he kept Judas continually before him[b][a]; he was inwardly drawn to the man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he had Judas always in his presence.' The Greek idiom can refer either to keeping someone physically near or keeping him constantly before one's attention.
    reason: lexical_alternative
  - marker: b
    text: Or 'he was inwardly inclined toward the man' or 'he felt deep affection for the man.' The Greek adverb and verb together express an internal, settled favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶχεν ... ἐν προσώπῳ
  chosen: kept ... before him
  alternatives:
  - had ... in his presence
  - kept ... in view
  lexicon: LSJ
  rationale: The idiom ἐν προσώπῳ literally involves 'before the face/presence.' 'Kept Judas continually before him' preserves the concrete sense while reading naturally in English and conveying ongoing personal access or attention.
- source_word: διὰ παντός
  chosen: continually
  alternatives:
  - always
  - at all times
  lexicon: LSJ
  rationale: The phrase denotes constancy or uninterrupted frequency. 'Continually' fits the narrative register and avoids sounding overly absolute in a wooden way.
- source_word: ψυχικῶς
  lemma: ψυχή
  chosen: in his soul
  alternatives:
  - from the heart
  - deeply
  - personally
  lexicon: LSJ
  rationale: The adverb is unusual and derives from ψυχή. Rather than flattening it to a vague intensifier, 'in his soul' preserves the anthropological coloring of the Greek and the inwardness of the attachment.
- source_word: προσεκέκλιτο
  chosen: was drawn toward
  alternatives:
  - inclined toward
  - was attached to
  - leaned toward
  lexicon: LSJ
  rationale: The perfect form suggests a settled disposition of favor or inclination. 'Was drawn toward' communicates inward attraction or favorable inclination without overstating it as formal allegiance.
- source_word: τῷ ἀνδρί
  chosen: the man
  alternatives:
  - him
  - that man
  lexicon: LSJ
  rationale: The dative with the verb marks the object of his inclination. Rendering it explicitly as 'the man' reflects the Greek wording and preserves the slightly emphatic personal reference to Judas.
