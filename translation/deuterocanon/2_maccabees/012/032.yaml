id: 2MA.12.32
reference: 2 Maccabees 12:32
source:
  edition: lxx-swete-1909
  text: Μετὰ δὲ τὴν λεγομένην πεντηκοστὴν ὥρμησαν ἐπὶ Γοργίαν τὸν τῆς Ἰδουμαίας στρατηγόν. Α
  language: Greek
  pages:
  - 720
  confidence: high
  validation: agree
translation:
  text: But after the so-called Pentecost, they moved out against Gorgias, the governor of Idumea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the feast called Pentecost.' The Greek literally says 'the one called Pentecost.'
    reason: lexical_alternative
  - marker: b
    text: '''Governor'' could also be rendered ''general'' or ''commander,'' since the Greek term can denote either civil or military leadership.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ
  chosen: after
  alternatives:
  - following
  lexicon: LSJ
  rationale: Temporal preposition introducing the time after a named festival period.
- source_word: τὴν λεγομένην πεντηκοστήν
  chosen: the so-called Pentecost
  alternatives:
  - the feast called Pentecost
  - the fiftieth day
  lexicon: LSJ
  rationale: λεγομένην literally means 'being called' or 'so-called.' Retaining 'so-called' closely reflects the Greek wording without implying skepticism beyond the idiom. πεντηκοστήν is best rendered 'Pentecost,' the established Greek festival name, rather than paraphrasing it as 'fiftieth day' in the main text.
- source_word: ὥρμησαν
  chosen: they moved out
  alternatives:
  - they set out
  - they rushed
  - they advanced
  lexicon: LSJ
  rationale: The verb can denote setting out or making a forceful movement. In this military context, 'moved out' preserves the campaign sense without overstating speed or aggression beyond what the context requires.
- source_word: ἐπὶ Γοργίαν
  chosen: against Gorgias
  alternatives:
  - toward Gorgias
  lexicon: LSJ
  rationale: With a verb of military movement, ἐπί with the accusative commonly carries hostile direction; 'against' best fits the context of marching for battle.
- source_word: στρατηγόν
  chosen: governor
  alternatives:
  - general
  - commander
  lexicon: LSJ
  rationale: στρατηγός can mean military commander, but here the genitive phrase 'of Idumea' suggests an official governing role over a region. 'Governor' communicates that regional office clearly in English while still compatible with military authority.
- source_word: Ἰδουμαίας
  chosen: Idumea
  alternatives:
  - Edom
  lexicon: LSJ
  rationale: Ἰδουμαία is the standard Greek geographical form 'Idumea.' Transliteration is preferred for place names.
