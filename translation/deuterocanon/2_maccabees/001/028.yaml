translation:
  text: Torment those who oppress and insolently abuse us in their pride;[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Afflict' or 'Punish' those who oppress and outrage us in arrogance.
    reason: lexical_alternative
lexical_decisions:
- source_word: βάσανισον
  chosen: Torment
  alternatives:
  - Afflict
  - Punish
  - Torture
  lexicon: LSJ
  rationale: Aorist imperative of βασανίζω, here a prayer asking God to inflict severe distress or punishment. 'Torment' preserves the intensity better than the milder 'afflict' or broader 'punish,' while avoiding over-specification beyond the verb itself.
- source_word: τοὺς καταδυναστεύοντας
  chosen: those who oppress
  alternatives:
  - those who tyrannize over
  - those who domineer over
  lexicon: LSJ
  rationale: The participle καταδυναστεύοντας denotes exercising oppressive power over others. 'Those who oppress' is natural English and captures the force without sounding overly technical.
- source_word: ἐξυβρίζοντας
  lemma: ἐξυβρίζω
  chosen: insolently abuse us
  alternatives:
  - outrage
  - insult violently
  - treat with insolence
  lexicon: LSJ
  rationale: ἐξυβρίζω carries the sense of treating with outrageous insolence or abuse. Because the Greek participle is coordinated with 'those who oppress' and the prayer context implies the people of God as the object, 'abuse us' makes the implied object explicit in idiomatic English; 'insolently' preserves the manner inherent in the verb.
- source_word: ἐν ὑπερηφανίᾳ
  chosen: in their pride
  alternatives:
  - with arrogance
  - in arrogance
  lexicon: LSJ
  rationale: The phrase expresses the arrogant disposition or manner in which the abuse is carried out. 'In their pride' is clear, idiomatic, and preserves the moral-theological weight of ὑπερηφανία.
