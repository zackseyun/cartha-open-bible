translation:
  text: But when this man arrived in Jerusalem and pretended to be peaceable[a], he held back until the holy day of the Sabbath; and taking the Jews off guard, he ordered those under his command to arm themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'taking the Jews by surprise.' The Greek phrase is compressed and may refer to exploiting their Sabbath vulnerability before ordering his forces to arm themselves.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραγενόμενος
  chosen: arrived
  alternatives:
  - came
  - appeared
  lexicon: LSJ
  rationale: In narrative context the participle marks his coming to Jerusalem; 'arrived' is natural modern English and preserves the event of his coming without unnecessary stiffness.
- source_word: τὸν εἰρηνικὸν ὑποκριθεὶς
  chosen: pretended to be peaceable
  alternatives:
  - feigned peaceful intentions
  - posed as a man of peace
  lexicon: LSJ
  rationale: ὑποκριθεὶς indicates pretense or acting a part, and εἰρηνικός denotes peaceful/peaceable. The phrase conveys deceptive peacefulness, not genuine peace.
- source_word: ἐπέσχεν
  chosen: he held back
  alternatives:
  - he waited
  - he refrained
  lexicon: LSJ
  rationale: The verb here indicates delaying action until an opportune moment. 'Held back' captures the tactical pause and fits the following temporal clause.
- source_word: ἕως τῆς ἁγίας ἡμέρας τοῦ σαββάτου
  chosen: until the holy day of the Sabbath
  alternatives:
  - until the holy Sabbath day
  - until the sacred day of the Sabbath
  lexicon: LSJ
  rationale: This preserves both ἁγίας ('holy') and σαββάτου ('Sabbath'). The wording reflects the Jewish sacred day without paraphrase.
- source_word: λαβὼν ἄγοντας τοὺς Ἰουδαίους
  chosen: catching the Jews off guard
  alternatives:
  - taking the Jews by surprise
  - finding the Jews unprepared
  lexicon: LSJ
  rationale: The transmitted phrase is somewhat compressed, but in context it refers to seizing the moment when the Jews were being led or constrained by Sabbath observance and thus vulnerable. 'Catching ... off guard' best conveys the tactical exploitation implied by the idiom in context.
- source_word: τοῖς ὑφʼ ἑαυτὸν
  chosen: those under his command
  alternatives:
  - his men
  - those under him
  lexicon: LSJ
  rationale: The phrase denotes subordinates under his authority. 'Those under his command' makes the military setting explicit from context without overtranslating.
- source_word: ἐξοπλίαν παρήγγειλεν
  chosen: he ordered ... to take up arms
  alternatives:
  - he gave orders for full armament
  - he commanded them to arm themselves
  lexicon: LSJ
  rationale: ἐξοπλία refers to armament or full equipment for battle, and παρήγγειλεν is 'ordered/commanded.' The idiomatic English 'to take up arms' communicates the military order clearly.
