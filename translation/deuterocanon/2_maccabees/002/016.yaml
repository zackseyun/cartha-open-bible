theological_decisions:
- issue: Rendering the sequence of divine epithets
  chosen_reading: 'Treat the line as a series of titles describing God: ''the only provider, the only righteous one and almighty and eternal, the one who rescues...''.'
  alternative_readings:
  - 'Render more dynamically as a finite clause: ''He alone provides; he alone is righteous, almighty, and eternal...'''
  rationale: The Greek consists of article-plus-epithet/participle phrases in apposition, likely continuing a prayer or blessing context. Preserving the titular sequence better reflects the source structure and solemn tone.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source structure where it carries meaning.'
- issue: Choice between 'sanctified' and 'made holy'
  chosen_reading: sanctified
  alternative_readings:
  - made holy
  - consecrated
  rationale: The verse speaks of God's covenantal setting apart of the fathers. 'Sanctified' retains that theological nuance and matches the elevated register of the surrounding divine titles.
  doctrine_reference: 'Translation philosophy: readable modern English without flattening theological weight.'
