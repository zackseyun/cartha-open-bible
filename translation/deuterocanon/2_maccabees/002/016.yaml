translation:
  text: the only provider, the only righteous one and almighty and eternal, the one who rescues Israel from every evil, who made the fathers chosen and sanctified them;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'benefactor' or 'supplier' for 'provider' (Greek χορηγός).
    reason: lexical_alternative
  - marker: b
    text: Or 'from every harm' or 'out of every trouble' for 'from every evil' (Greek ἐκ παντὸς κακοῦ).
    reason: lexical_alternative
  - marker: c
    text: Or 'made them holy' / 'consecrated them' for 'sanctified them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μόνος
  chosen: only
  alternatives:
  - alone
  - sole
  lexicon: BDAG
  rationale: Repeated attributively before divine descriptors; 'only' preserves the exclusivity emphasized in the Greek without sounding overly stiff.
- source_word: χορηγός
  chosen: provider
  alternatives:
  - benefactor
  - supplier
  - patron
  lexicon: LSJ
  rationale: The term denotes one who supplies or furnishes what is needed. 'Provider' is clear modern English and fits a divine title here better than the more socially specific 'patron' or 'benefactor'.
- source_word: δίκαιος
  chosen: righteous one
  alternatives:
  - just one
  - just
  - righteous
  lexicon: BDAG
  rationale: As a substantival adjective in a string of divine epithets, 'righteous one' makes the personal reference explicit in English while preserving the moral/judicial sense.
- source_word: παντοκράτωρ
  chosen: almighty
  alternatives:
  - all-powerful
  - sovereign over all
  lexicon: BDAG
  rationale: Standard rendering for the divine title; concise and natural in English while retaining the title's theological weight.
- source_word: αἰώνιος
  chosen: eternal
  alternatives:
  - everlasting
  - age-enduring
  lexicon: BDAG
  rationale: In a doxological string of divine attributes, 'eternal' is the most idiomatic English equivalent.
- source_word: διασώζων
  chosen: rescues
  alternatives:
  - saves
  - delivers
  - preserves
  lexicon: BDAG
  rationale: The participle conveys active deliverance out of danger. 'Rescues' captures the concrete sense of bringing safely through or out of peril.
- source_word: ἐκ παντὸς κακοῦ
  chosen: from every evil
  alternatives:
  - from every harm
  - out of every trouble
  lexicon: BDAG
  rationale: κακόν can denote evil, harm, or trouble. 'Every evil' preserves the broad scope and traditional moral resonance without narrowing it to merely circumstantial distress.
- source_word: ποιήσας
  chosen: made
  alternatives:
  - appointed
  - constituted
  lexicon: BDAG
  rationale: The aorist participle is straightforwardly 'made.' In context it introduces God's action toward the ancestors; 'appointed' is possible but less direct.
- source_word: ἐκλεκτούς
  chosen: chosen
  alternatives:
  - elect
  - selected
  lexicon: BDAG
  rationale: '''Chosen'' is accessible modern English and preserves the covenantal sense. ''Elect'' is possible but more theological jargon in contemporary usage.'
- source_word: ἡγίασας
  chosen: sanctified
  alternatives:
  - made holy
  - consecrated
  lexicon: BDAG
  rationale: The verb means to make holy/set apart. 'Sanctified' preserves the theological register; 'made holy' is possible but less compact in this liturgical-style line.
