  text: ὁ μόνος χορηγός, ὁ μόνος δίκαιος καὶ παντοκράτωρ καὶ αἰώνιος, ὁ διασώζων τὸν Ἰσραὴλ ἐκ παντὸς κακοῦ, ὁ ποιήσας τοὺς πατέρας ἐκλεκτούς, καὶ ἡγίασας αὐτούς·
