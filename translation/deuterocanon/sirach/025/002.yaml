lexical_decisions:
- source_word: שָׁלֹשׁ
  chosen: Three things
  alternatives:
  - Three
  lexicon: HALOT
  rationale: The numeral introduces a list; supplying 'things' in English makes the sentence natural and anticipates the following plural pronominal reference.
- source_word: שָׂנְאָה
  chosen: has hated
  alternatives:
  - hates
  - hated
  lexicon: HALOT
  rationale: Rendered as an English present perfect to reflect the completed stance with present relevance in wisdom style. A simple past is possible, but the perfect better carries the speaker's enduring aversion.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - I
  - myself
  lexicon: HALOT
  rationale: Kept as 'my soul' rather than flattening to 'I' because the Hebrew idiom is transparent in English and preserves the text's affective intensity.
- source_word: וְצַר לִי מְאֹד
  chosen: and I am greatly distressed
  alternatives:
  - and it is very grievous to me
  - and I am very troubled
  - and I find it extremely offensive
  lexicon: HALOT
  rationale: The Hebrew expresses acute personal vexation or distress. This rendering is idiomatic modern English while preserving the emotional force.
- source_word: בְּחַיֵּיהֶם
  chosen: by their way of life
  alternatives:
  - in their lives
  - by their lives
  - while they live
  lexicon: HALOT
  rationale: Literally 'in their life/lives,' but in context it refers to the manner in which they live. 'Way of life' communicates the ethical sense naturally in English.
