translation:
  text: 'Three things my soul has hated[a], and I am greatly distressed by their lives:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek witness here differs sharply: ''the harmony of brothers, and the friendship of neighbors, and a wife and a husband living well together.'' The Hebrew and Greek appear to reflect different textual forms at this point.'
