translation:
  text: Blessed is the one who has found wisdom[b][a], and the one who speaks in the ears of those who hear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one who recounts/explains in the hearing of listeners.' The Greek participle can suggest more than simple speaking.
    reason: lexical_alternative
  - marker: b
    text: The Greek text is somewhat terse and idiomatic here ('speaks into the ears of those who hear'), so the exact nuance may be either direct speech or skillful explanation addressed to attentive hearers.
    reason: alternative_reading
lexical_decisions:
- source_word: μακάριος
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: BDAG
  rationale: Carries the sense of being in an enviable or favored state; 'Blessed' preserves the wisdom-literature tone better than the flatter 'happy' or merely circumstantial 'fortunate.'
- source_word: εὗρε
  chosen: has found
  alternatives:
  - found
  lexicon: BDAG
  rationale: The aorist is naturally rendered as a simple past, but in English wisdom sayings 'has found' idiomatically conveys the attained state resulting from discovery.
- source_word: φρόνησιν
  chosen: understanding
  alternatives:
  - prudence
  - good sense
  - wisdom
  lexicon: BDAG
  rationale: φρόνησις denotes practical understanding or sound judgment. 'Understanding' is broad and natural English, while 'prudence' is narrower and somewhat stiffer; 'wisdom' would blur distinction from other Greek wisdom terms.
- source_word: διηγούμενος
  chosen: speaks
  alternatives:
  - recounts
  - expounds
  - narrates
  lexicon: BDAG
  rationale: The participle can mean recounting or setting forth in speech. In this context of wise communication, 'speaks' is the most idiomatic concise rendering, while the alternatives are possible but more specific than the context requires.
- source_word: εἰς ὦτα
  chosen: into the ears
  alternatives:
  - in the hearing
  - to the ears
  lexicon: BDAG
  rationale: This preserves the concrete Greek idiom rather than flattening it entirely. It remains intelligible in English and reflects the embodied image of direct address.
- source_word: ἀκουόντων
  chosen: those who hear
  alternatives:
  - listeners
  - those who listen
  lexicon: BDAG
  rationale: A participial expression is best preserved with a relative phrase. 'Those who hear' stays close to the Greek and avoids over-interpreting whether the emphasis is on mere hearing or attentive listening.
