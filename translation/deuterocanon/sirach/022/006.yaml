theological_decisions:
- issue: Ethical force of the proverb's endorsement of corporal correction
  chosen_reading: Translate the line straightforwardly as a wisdom saying commending corrective punishment and discipline, without softening the physical term.
  alternative_readings:
  - Render μάστιγες metaphorically as 'rebukes' or otherwise weaken the corporal sense
  rationale: The Greek plainly juxtaposes musical speech in grief with physical correction and discipline as fitting in their proper sphere. The translation should not import modern ethical mitigation into the wording, though readers may evaluate the proverb differently.
  doctrine_reference: Translation philosophy §§1, 3, 6
