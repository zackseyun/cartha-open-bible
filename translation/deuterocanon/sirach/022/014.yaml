translation:
  text: What is heavier than lead? And what name does such a one have but “fool”?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'What will be made heavier than lead? and what is his/its name except fool?' The Greek is a compressed proverb; the English smooths it for clarity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπὲρ
  chosen: than
  alternatives:
  - beyond
  - over
  - more than
  lexicon: BDAG
  rationale: 'In the comparative expression ὑπὲρ μόλυβον ... βαρυνθήσεται, English idiom is best conveyed by ''than'' rather than a more literal ''over'' or ''beyond'': ''What is heavier than lead?'''
- source_word: μόλυβον
  chosen: lead
  lexicon: LSJ
  rationale: The noun straightforwardly denotes the metal lead; no contextual reason suggests a figurative rendering.
- source_word: τί βαρυνθήσεται
  chosen: What is heavier
  alternatives:
  - What will be made heavy beyond
  - What will weigh more
  lexicon: BDAG
  rationale: The future passive/middle form functions idiomatically in a comparative sense here. 'What is heavier' gives clear modern English while preserving the rhetorical question.
- source_word: τί αὐτῷ ὄνομα
  chosen: what name does such a one have
  alternatives:
  - what is its name
  - what name has he
  lexicon: LSJ
  rationale: The dative αὐτῷ is awkward if rendered woodenly. In context it refers back to the person characterized in the saying, not merely to an abstract object. 'Such a one' makes the personal reference natural in English while retaining the proverbial force.
- source_word: ἀλλʼ ἢ
  chosen: but
  alternatives:
  - except
  - other than
  lexicon: BDAG
  rationale: 'In this rhetorical question the phrase introduces the only fitting answer. ''But'' is concise and idiomatic: ''what name ... but “fool”?''.'
- source_word: μωρός
  chosen: fool
  alternatives:
  - stupid person
  - moron
  lexicon: BDAG
  rationale: '''Fool'' is the standard and suitably weighty rendering for μωρός in wisdom literature contexts. Alternatives either flatten the moral dimension (''stupid person'') or sound too colloquial/offensive (''moron'').'
