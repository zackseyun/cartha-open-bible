translation:
  text: Do you have daughters? Guard their chastity[a], and do not show them a cheerful face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'do not make your face shine toward them.' The sense is likely 'do not be overly indulgent or lenient toward them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּנוֹת לְךָ / θυγατέρες σοί εἰσιν
  chosen: Do you have daughters?
  alternatives:
  - You have daughters?
  - If you have daughters
  lexicon: HALOT / LSJ
  rationale: The Hebrew opens elliptically with 'daughters to/for you,' and the Greek likewise has an existential expression, 'daughters are to you.' In idiomatic modern English, 'Do you have daughters?' best captures the conditional-exhortatory force without wooden awkwardness.
- source_word: נְצוֹר / πρόσεχε
  chosen: Guard
  alternatives:
  - Watch over
  - Take care for
  - Protect
  lexicon: HALOT / BDAG
  rationale: The Hebrew imperative means to keep, guard, or watch. The Greek parallel 'pay attention to / take heed to' supports a sense of careful oversight. 'Guard' preserves the protective imperative strongly and succinctly.
- source_word: שְׁאֵרָם / τῷ σώματι αὐτῶν
  chosen: their bodies
  alternatives:
  - their flesh
  - their persons
  lexicon: HALOT / LSJ
  rationale: Hebrew שְׁאֵר can denote flesh or bodily kinship; here the Greek explicitly interprets it as 'body.' Because the Greek parallel is given as an actual translation input and clarifies the Hebrew, 'their bodies' is the most defensible rendering.
- source_word: וְאַל תָּאִיר ... פָּנִים / καὶ μὴ ἱλαρώσῃς ... τὸ πρόσωπόν σου
  chosen: do not brighten your face toward them
  alternatives:
  - do not be indulgent toward them
  - do not smile on them
  - do not show them a cheerful face
  lexicon: HALOT / LSJ
  rationale: The Hebrew literally says 'do not make your face shine toward them,' and the Greek similarly says 'do not make your face cheerful toward them.' The idiom warns against undue leniency or overindulgent favor. I retained the concrete facial idiom in readable English to preserve the source imagery, while allowing the footnote to explain the implied sense.
