translation:
  text: There is a meticulous cunning[a], and this too is unjust[b]; and there is one who twists things in order to bring a judgment to light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'There is a careful shrewdness, and it too is unjust.'
    reason: lexical_alternative
  - marker: b
    text: '''Judgment'' could also be rendered ''justice'' or ''verdict''; the Greek is broad enough to allow either nuance.'
    reason: alternative_reading
lexical_decisions:
- source_word: πανουργία
  chosen: cunning
  alternatives:
  - craftiness
  - shrewdness
  - knavery
  lexicon: LSJ
  rationale: The noun can denote cleverness used in a bad sense. 'Cunning' preserves the negative moral coloring better than the more neutral 'shrewdness.'
- source_word: ἀκριβὴς
  chosen: meticulous
  alternatives:
  - exact
  - careful
  - precise
  lexicon: LSJ
  rationale: 'The adjective modifies the kind of cunning in view: not merely clever, but exacting or finely calculated. ''Meticulous'' communicates that nuance in natural English.'
- source_word: ἄδικος
  chosen: unjust
  alternatives:
  - wrong
  - unrighteous
  lexicon: LSJ
  rationale: In wisdom literature this term often marks moral wrongness in relation to justice. 'Unjust' fits the ethical context and also resonates with the later use of κρίμα ('judgment').
- source_word: διαστρέφων
  chosen: twists matters
  alternatives:
  - distorts
  - perverts
  - turns aside
  lexicon: LSJ
  rationale: The participle suggests bending or distorting something from its proper course. 'Twists matters' makes the object implicit in idiomatic English while preserving the sense of distortion.
- source_word: χάριν τοῦ
  chosen: in order to
  alternatives:
  - for the sake of
  - with a view to
  lexicon: LSJ
  rationale: This construction regularly expresses purpose. 'In order to' is clear modern English and keeps the purposive force.
- source_word: ἐκφᾶναι
  chosen: bring ... to light
  alternatives:
  - make manifest
  - reveal
  - show plainly
  lexicon: LSJ
  rationale: The verb means to disclose or make evident. 'Bring to light' is vivid and idiomatic without overinterpreting.
- source_word: κρίμα
  chosen: judgment
  alternatives:
  - justice
  - verdict
  - case
  lexicon: LSJ
  rationale: 'The term can mean judgment, verdict, or legal decision. ''Judgment'' is broad enough to preserve the ambiguity: the person may be exposing a judicial matter or bringing out what is just.'
