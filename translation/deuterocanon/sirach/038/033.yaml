translation:
  text: He will apply his heart to complete the glaze[b][a], and his wakefulness is to cleanse the furnace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the kiln.' In the pottery context of the surrounding lines, κάμινος may refer specifically to a kiln rather than a furnace in general.
    reason: lexical_alternative
  - marker: b
    text: The Greek wording here is somewhat difficult, especially τὸ χάρισμα. The translation understands it as the pottery's finished coating or decorative finish ('glazing') in light of the surrounding context.
    reason: alternative_reading
lexical_decisions:
- source_word: καρδίαν ἐπιδώσει
  chosen: he will apply his heart
  alternatives:
  - he will devote his mind
  - he will set his heart
  lexicon: LSJ
  rationale: The idiom combines καρδία with ἐπιδίδωμι/ἐπιδώσει in the sense of directing oneself earnestly to a task. 'Apply his heart' preserves the concrete anthropological language while remaining intelligible in English.
- source_word: συντελέσαι
  chosen: to complete
  alternatives:
  - to finish
  - to bring to completion
  lexicon: LSJ
  rationale: The infinitive expresses the goal of the artisan's focused effort. 'Complete' is slightly more natural than the more wooden 'bring to completion' while staying close to the Greek.
- source_word: τὸ χάρισμα
  chosen: the glazing
  alternatives:
  - the decoration
  - the finished work
  - the craftwork
  lexicon: LSJ
  rationale: In this craft context, a literal 'gift' is unsuitable. The surrounding verses describe potters and kiln-work; here the noun most plausibly refers to the crafted finish or decorative coating applied to pottery. 'Glazing' best fits the immediate context of furnace and ceramic production, though the exact technical nuance is uncertain.
- source_word: ἡ ἀγρυπνία αὐτοῦ
  chosen: his wakefulness
  alternatives:
  - his vigilance
  - his sleepless care
  lexicon: LSJ
  rationale: The noun denotes wakeful attentiveness. 'Wakefulness' preserves the image of staying awake over the work; 'vigilance' is possible but slightly more abstract.
- source_word: καθαρίσαι
  chosen: to cleanse
  alternatives:
  - to purify
  - to clean out
  lexicon: LSJ
  rationale: The verb can mean cleanse or purify. Because the object is a furnace, 'cleanse' keeps the literal sense without importing ritual overtones.
- source_word: κάμινον
  chosen: the furnace
  alternatives:
  - the kiln
  - the oven
  lexicon: LSJ
  rationale: The term denotes a furnace or kiln. Given the pottery context, 'kiln' is contextually attractive, but 'furnace' is the broader and more lexically secure rendering from the Greek alone. The alternative is preserved in a footnote because the craft setting may favor it.
