id: 3MA.1.12
reference: 3 Maccabees 1:12
source:
  edition: lxx-swete-1909
  text: τοῦ τε νόμου παραναγνωσθέντος, οὐδ᾽ ὣς ἀπέλειπεν προφερόμενος ἑαυτὸν δεῖν εἰσελθεῖν, λέγων Καὶ εἰ ἐκεῖνοι ἐστέρηνται ταύτης τῆς τιμῆς, ἐμὲ δὲ οὐ δεῖ.
  language: Greek
  pages: []
  confidence: high
translation:
  text: And even when the law had been read out[a], he still did not stop insisting that he ought to enter, saying, “Even if they have been deprived of this honor, I ought not to be.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I should not be deprived of it.” The Greek at the end is elliptical, literally, “but as for me, it ought not [be so].”
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ ... νόμου
  chosen: the law
  alternatives:
  - the custom
  - the ordinance
  lexicon: LSJ
  rationale: νόμος in this context most naturally refers to the governing Jewish law/regulation that had just been cited, not merely a generic custom. 'The law' preserves the formal force of the appeal.
- source_word: παραναγνωσθέντος
  chosen: had been read out
  alternatives:
  - had been read aloud
  - had been recited
  lexicon: LSJ
  rationale: The participle indicates public reading/reading before someone. 'Read out' is natural modern English and preserves the sense that the law was presented to him.
- source_word: οὐδ᾽ ὣς
  chosen: even ... still
  alternatives:
  - not even then
  - yet not even so
  lexicon: LSJ
  rationale: This idiom marks persistence despite contrary evidence. The English rendering captures the concessive force in idiomatic modern style.
- source_word: ἀπέλειπεν
  chosen: did not stop
  alternatives:
  - did not cease
  - did not desist
  lexicon: LSJ
  rationale: The imperfect conveys continued refusal to desist. 'Did not stop' is readable modern English while preserving durative force.
- source_word: προφερόμενος
  chosen: insisting
  alternatives:
  - putting forward
  - asserting
  - maintaining
  lexicon: LSJ
  rationale: In context the participle describes his continued pressing of a claim. 'Insisting' best conveys the force of repeated self-assertion in natural English.
- source_word: ἑαυτὸν δεῖν εἰσελθεῖν
  chosen: that he ought to enter
  alternatives:
  - that he must enter
  - himself to be required to enter
  lexicon: LSJ
  rationale: δεῖ expresses necessity/obligation. 'Ought to enter' fits the rhetorical claim of entitlement without overstating compulsion.
- source_word: ἐστέρηνται
  chosen: have been deprived of
  alternatives:
  - lack
  - have been denied
  lexicon: LSJ
  rationale: The perfect/passive sense indicates that 'they' stand deprived of the honor. 'Have been deprived of' preserves both the passive nuance and the injustice implied.
- source_word: ταύτης τῆς τιμῆς
  chosen: this honor
  alternatives:
  - this privilege
  - this distinction
  lexicon: LSJ
  rationale: τιμή here denotes honor/status accorded by access. 'Honor' is the most direct rendering and matches the social prestige implied.
- source_word: ἐμὲ δὲ οὐ δεῖ
  chosen: I nevertheless ought not to be
  alternatives:
  - it ought not be so for me
  - I should not be deprived
  - I ought not to be denied this
  lexicon: LSJ
  rationale: 'The Greek is elliptical: literally ''but as for me, it is not necessary/ought not.'' In context it means he claims exemption from the deprivation just mentioned. The translation keeps the contrast and supplies the implied predicate minimally in English. Because the ellipsis is strong, an alternative is worth preserving in a footnote.'
