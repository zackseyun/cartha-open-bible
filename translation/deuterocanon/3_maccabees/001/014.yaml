id: 3MA.1.14
reference: 3 Maccabees 1:14
source:
  edition: lxx-swete-1909
  text: καί τις ἀπρονοήτως ἔφη κακῶς αὐτὸ τοῦτο τερατεύεσθαι·
  language: Greek
  pages: []
  confidence: high
translation:
  text: And someone said, without thinking, that this very thing was being monstrously misrepresented[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that this very thing was being made into a monstrous portent,' or 'was being sensationalized.' The Greek verb τερατεύεσθαι carries the idea of treating something as a marvel, portent, or monstrosity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπρονοήτως
  chosen: without thinking
  alternatives:
  - thoughtlessly
  - without forethought
  - rashly
  lexicon: LSJ
  rationale: The adverb denotes lack of forethought or consideration. 'Without thinking' is idiomatic modern English and preserves the sense of speaking rashly, without importing stronger moral judgment than the Greek itself requires.
- source_word: ἔφη
  chosen: said
  alternatives:
  - declared
  - asserted
  lexicon: LSJ
  rationale: A simple past of speaking is sufficient here. Nothing in the verb itself requires the more formal 'declared' or the stronger 'asserted'.
- source_word: κακῶς
  chosen: monstrously
  alternatives:
  - badly
  - wrongly
  - wickedly
  lexicon: LSJ
  rationale: In this clause κακῶς modifies τερατεύεσθαι. A bare 'badly' is too flat in English, while 'wickedly' may overmoralize. 'Monstrously' captures the adverb's negative force in combination with the verb of making into a portent/prodigy.
- source_word: αὐτὸ τοῦτο
  chosen: this very thing
  alternatives:
  - this itself
  - this same thing
  lexicon: LSJ
  rationale: The phrase is emphatic. 'This very thing' conveys the focus naturally in English.
- source_word: τερατεύεσθαι
  chosen: was being monstrously misrepresented
  alternatives:
  - was being made into a prodigy
  - was being turned into an omen
  - was being sensationalized
  - was being represented as something monstrous
  lexicon: LSJ
  rationale: The verb can mean to relate marvels, make into a portent, or treat as something monstrous/prodigious. In context, the complaint is that the matter is being distorted into something outrageous. 'Was being monstrously misrepresented' preserves both the passive form and the sense of exaggerating a matter into something portentous or grotesque, while remaining readable English.
