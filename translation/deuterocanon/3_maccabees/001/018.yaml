id: 3MA.1.18
reference: 3 Maccabees 1:18
source:
  edition: lxx-swete-1909
  text: ἵνα μὴ καυχήσωνται οἱ παράνομοι ἐν θυμῷ αὐτῶν, μηδὲ ἀγαλλιάσωνται ἐν ὑπερηφανίᾳ γλώσσης αὐτῶν, λέγοντες
  language: Greek
  pages: []
  confidence: high
translation:
  text: so that the lawless might not boast in their wrath[a], nor exult in the arrogance of their tongue, saying[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in their anger' for 'in their rage.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in the arrogance of their tongue,' an idiom for proud or insolent speech.
    reason: cultural_note
lexical_decisions:
- source_word: ἵνα μὴ
  chosen: so that ... not
  alternatives:
  - lest ...
  - in order that ... not
  lexicon: LSJ
  rationale: Introduces purpose with negation. 'So that ... not' is natural modern English while preserving the purposive force.
- source_word: καυχήσωνται
  chosen: might not boast
  alternatives:
  - might not glory
  - might not brag
  lexicon: BDAG
  rationale: Conveys exultant self-assertion. 'Boast' is idiomatic and suitably weighty without archaic tone.
- source_word: οἱ παράνομοι
  chosen: the lawless
  alternatives:
  - the wicked
  - the unlawful ones
  lexicon: LSJ
  rationale: παράνομος is more specifically 'lawless' than the broader 'wicked.' This preserves the term's relation to law/order rather than general evil.
- source_word: ἐν θυμῷ αὐτῶν
  chosen: in their rage
  alternatives:
  - in their anger
  - in their fury
  lexicon: BDAG
  rationale: θυμός here denotes heated passion or wrath. 'Rage' best matches the intensity and fits the hostile context.
- source_word: μηδὲ
  chosen: nor
  alternatives:
  - and not
  - neither
  lexicon: LSJ
  rationale: Coordinates the second negative purpose clause smoothly in English.
- source_word: ἀγαλλιάσωνται
  chosen: exult
  alternatives:
  - rejoice greatly
  - triumph
  lexicon: BDAG
  rationale: The verb suggests exuberant rejoicing. 'Exult' preserves the elevated tone and avoids flattening it to ordinary 'rejoice.'
- source_word: ἐν ὑπερηφανίᾳ
  chosen: in the arrogance
  alternatives:
  - in the pride
  - in the haughtiness
  lexicon: LSJ
  rationale: ὑπερηφανία carries the sense of overbearing pride. 'Arrogance' communicates that moral edge more clearly than the broader 'pride.'
- source_word: γλώσσης αὐτῶν
  chosen: of their tongue
  alternatives:
  - of their speech
  - of their mouth
  lexicon: LSJ
  rationale: A literal rendering preserves the vivid idiom of arrogant speech. 'Tongue' is still natural in English and keeps the imagery.
- source_word: λέγοντες
  chosen: saying,
  alternatives:
  - as they said
  - while saying
  lexicon: BDAG
  rationale: Participial transition introducing the following quotation is best rendered simply as 'saying,' with the comma signaling continuation into the next verse.
