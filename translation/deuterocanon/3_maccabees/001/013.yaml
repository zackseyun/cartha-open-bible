id: 3MA.1.13
reference: 3 Maccabees 1:13
source:
  edition: lxx-swete-1909
  text: καὶ ἐπυνθάνετο διὰ τίνα αἰτίαν αὐτὸν εἰσερχόμενον εἰς πᾶν τέμενος οὐθεὶς ἐκώλυσεν τῶν παρόντων.
  language: Greek
  pages: []
  confidence: high
translation:
  text: And he inquired for what reason no one among those present had prevented him from entering any sanctuary[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every sacred precinct.' The Greek τέμενος can refer broadly to a consecrated place, not only to a temple building.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπυνθάνετο
  chosen: he inquired
  alternatives:
  - he asked
  - he sought to learn
  lexicon: BDAG
  rationale: Imperfect middle of πυνθάνομαι, indicating inquiry or asking for information. 'Inquired' preserves the formal tone better than the simpler 'asked.'
- source_word: διὰ τίνα αἰτίαν
  chosen: for what reason
  alternatives:
  - why
  - for what cause
  lexicon: LSJ
  rationale: The phrase explicitly asks the cause or reason. 'For what reason' is slightly more transparent to the Greek than the compressed 'why.'
- source_word: εἰσερχόμενον
  chosen: from entering
  alternatives:
  - as he was entering
  - when he entered
  lexicon: BDAG
  rationale: 'The participle modifies αὐτόν and is governed by ἐκώλυσεν in indirect discourse: no one prevented him as/while entering. English idiom after ''prevented'' is best expressed as ''prevented him from entering.'''
- source_word: πᾶν τέμενος
  chosen: every sanctuary
  alternatives:
  - every sacred precinct
  - every temple
  lexicon: LSJ
  rationale: τέμενος denotes a sacred enclosure or sanctuary. 'Sanctuary' is broad enough to fit the Greek without implying a specific building in every case; 'temple' would be too specific, while 'sacred precinct' is more technical than needed.
- source_word: οὐθεὶς ἐκώλυσεν
  chosen: no one ... had prevented
  alternatives:
  - no one hindered
  - no one stopped
  lexicon: BDAG
  rationale: κωλύω means prevent, hinder, or stop. 'Had prevented' fits the reported-question structure in English and makes clear the concern was the failure to stop him.
- source_word: τῶν παρόντων
  chosen: among those present
  alternatives:
  - of those present
  - from the bystanders
  lexicon: BDAG
  rationale: The genitive partitive indicates the group from which no one acted. 'Among those present' is natural English and preserves the sense.
