id: 3MA.5.15
reference: 3 Maccabees 5:15
source:
  edition: lxx-swete-1909
  text: καὶ μόλις διεγείρας, ὑπέδειξέ τὸν τῆς συμποσίας καιρὸν ἤδη παρατρέχοντα, τὸν περὶ τούτων λόγον ποιού- μενος.
  language: Greek
  pages:
  - 743
  confidence: high
  validation: agree
translation:
  text: And after barely rousing himself, he pointed out that the time for the banquet was already slipping by, making his speech about these matters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the time for the feast was already passing by.' The Greek συμποσία can refer to a banquet or drinking feast, and παρατρέχοντα pictures the time as passing quickly.
    reason: lexical_alternative
lexical_decisions:
- source_word: μόλις
  chosen: barely
  alternatives:
  - with difficulty
  - scarcely
  lexicon: LSJ
  rationale: Conveys the adverb's sense of difficulty or minimal degree in a natural modern English way, modifying his act of waking.
- source_word: διεγείρας
  lemma: διεγείρω
  chosen: after ... rousing himself
  alternatives:
  - after waking up
  - after being stirred
  lexicon: LSJ
  rationale: 'Aorist participle from διεγείρω, here reflexive in sense from context: the subject comes to wakefulness. ''Rousing himself'' preserves the effort implied by μόλις and the participial linkage to the main verb.'
- source_word: ὑπέδειξέ
  chosen: he pointed out
  alternatives:
  - he indicated
  - he showed
  lexicon: LSJ
  rationale: The verb here introduces his observation about the passing time. 'Pointed out' fits idiomatic English and the discourse function better than the more physical 'showed'.
- source_word: τὸν τῆς συμποσίας καιρόν
  chosen: the time for the banquet
  alternatives:
  - the occasion for the drinking party
  - the hour of the feast
  lexicon: LSJ
  rationale: συμποσία can denote a banquet or drinking feast. In context, 'banquet' is readable and suitably formal without overemphasizing revelry.
- source_word: ἤδη παρατρέχοντα
  chosen: was already slipping by
  alternatives:
  - was already passing by
  - was already running past
  lexicon: LSJ
  rationale: The participle pictures time as passing quickly. 'Slipping by' captures the idiomatic sense in English while preserving the temporal urgency.
- source_word: τὸν περὶ τούτων λόγον ποιούμενος
  chosen: making his speech about these matters
  alternatives:
  - speaking about these things
  - making conversation on these matters
  lexicon: LSJ
  rationale: A participial phrase explaining the manner/circumstance of his remark. 'Making his speech' keeps closer to λόγον ποιεῖσθαι than a bare 'speaking,' while 'these matters' preserves the demonstrative's breadth.
