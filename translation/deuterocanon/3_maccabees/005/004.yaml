reference: 3 Maccabees 5:4
source:
  edition: lxx-swete-1909
  text: ὁ δὲ ἐλεφαντάρχης τὸ προσταγὲν ἀραρότως Ἕρμων συνετέλει.
  language: Greek
  pages:
  - 742
  confidence: high
  validation: minor_mismatch
translation:
  text: And Hermon[a], the elephant-master[b], carried out the order exactly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the commander of the elephants' or 'the elephant officer.'
    reason: lexical_alternative
  - marker: b
    text: The adverb may also suggest that he carried it out 'precisely' or 'duly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλεφαντάρχης
  chosen: elephant-master
  alternatives:
  - commander of the elephants
  - elephant officer
  lexicon: LSJ
  rationale: A compound of 'elephant' and 'ruler/commander,' referring to the official in charge of the elephants. 'Elephant-master' is concise, natural enough in context, and preserves the specific role better than a vaguer 'officer'.
- source_word: τὸ προσταγὲν
  chosen: the order
  alternatives:
  - what had been commanded
  - the command
  lexicon: LSJ
  rationale: The neuter participial expression means 'the thing commanded.' In idiomatic English, 'the order' conveys the sense clearly without unnecessary stiffness.
- source_word: ἀραρότως
  chosen: exactly
  alternatives:
  - firmly
  - precisely
  - duly
  lexicon: LSJ
  rationale: The adverb conveys something done fittingly, firmly, or with exactness/completeness. Here it modifies the execution of the command, so 'exactly' best captures faithful and precise compliance.
- source_word: συνετέλει
  chosen: carried out
  alternatives:
  - completed
  - executed
  - fulfilled
  lexicon: LSJ
  rationale: In context the verb means to bring an assigned action to completion. 'Carried out' is idiomatic English for executing an order and fits the administrative/military setting.
- source_word: Ἕρμων
  chosen: Hermon
  alternatives:
  - Hermōn
  rationale: Personal names are transliterated by standard convention per project philosophy. 'Hermon' is the straightforward English transliteration of the Greek form.
