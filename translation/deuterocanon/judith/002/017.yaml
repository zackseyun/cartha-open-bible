  confidence: high
  validation: agree
translation:
  text: And he took camels and donkeys and mules for their baggage[a], a very great multitude, and sheep and cattle and goats for their provisions, of which there was no number[c][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for their baggage' at 'for their equipment' (εἰς τὴν ἀπαρτίαν αὐτῶν); the Greek points broadly to outfitting or gear.
    reason: lexical_alternative
  - marker: b
    text: Or 'for their supplies' at 'for their provisions' (εἰς τὴν παρασκευὴν αὐτῶν); the term can denote preparation or supplies, and here likely refers to food provisioning.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'of which there was no number,' an idiom meaning they were innumerable.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαβεν
  chosen: he took
  alternatives:
  - he seized
  - he procured
  lexicon: LSJ
  rationale: The common narrative sense of λαμβάνω here is simply acquiring/taking along animals and supplies for the campaign, not violent seizure in focus.
- source_word: καμήλους
  chosen: camels
  lexicon: LSJ
  rationale: Straightforward animal term; no contextual pressure for variation.
- source_word: ὄνους
  chosen: donkeys
  alternatives:
  - asses
  lexicon: LSJ
  rationale: Modern readable English favors 'donkeys'; 'asses' is accurate but archaic/liable to misunderstanding.
- source_word: ἡμιόνους
  chosen: mules
  lexicon: LSJ
  rationale: Standard gloss for pack animals bred from donkey/horse stock; fits the military-logistical context.
- source_word: εἰς τὴν ἀπαρτίαν αὐτῶν
  chosen: for their equipment
  alternatives:
  - for their baggage
  - for their full outfitting
  lexicon: LSJ
  rationale: ἀπαρτία denotes equipment/outfit/completeness of gear. In context of transport animals, 'for their equipment' captures logistical outfitting without over-specifying baggage alone.
- source_word: πλῆθος πολὺ σφόδρα
  chosen: a very great multitude
  alternatives:
  - an exceedingly large number
  - a very large multitude
  lexicon: LSJ
  rationale: The phrase intensifies quantity. 'A very great multitude' preserves the cumulative force of πολὺ and σφόδρα in natural English.
- source_word: πρόβατα
  chosen: sheep
  lexicon: LSJ
  rationale: Standard gloss.
- source_word: βόας
  chosen: cattle
  alternatives:
  - oxen
  lexicon: LSJ
  rationale: Although βόες can mean oxen, in a list of livestock for provisioning the broader 'cattle' is more natural and may better reflect herd animals generally rather than draft oxen specifically.
- source_word: αἶγας
  chosen: goats
  lexicon: LSJ
  rationale: Standard gloss.
- source_word: εἰς τὴν παρασκευὴν αὐτῶν
  chosen: for their provisions
  alternatives:
  - for their preparation
  - for their supplies
  lexicon: LSJ
  rationale: παρασκευή can mean preparation or equipment/supplies. Since the second animal list is food livestock, 'for their provisions' best fits the immediate sense.
- source_word: ὧν οὐκ ἦν ἀριθμός
  chosen: of which there was no number
  alternatives:
  - which were without number
  - too many to count
  lexicon: LSJ
  rationale: This preserves the idiomatic biblical sense of innumerability while staying close to the Greek structure.
