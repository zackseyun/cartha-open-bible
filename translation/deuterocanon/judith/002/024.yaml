translation:
  text: And he crossed the Euphrates and passed through Mesopotamia[a], and he tore down all the high cities along the torrent Abrona[b], until he came to the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'broke through all the high cities'; the Greek verb literally means 'dug through' and may describe breaching or destroying cities in a military campaign.
    reason: lexical_alternative
  - marker: b
    text: The 'torrent Abrona' is a transliterated place-name in the Greek; its exact geographical identification is uncertain.
    reason: cultural_note
lexical_decisions:
- source_word: παρῆλθεν
  chosen: crossed
  alternatives:
  - went past
  - passed by
  lexicon: LSJ
  rationale: With τὸν Εὐφράτην as its object in a travel narrative, the verb most naturally means traversing/crossing the river rather than merely passing alongside it.
- source_word: διῆλθεν
  chosen: passed through
  alternatives:
  - went through
  - traversed
  lexicon: LSJ
  rationale: The compound verb with τὴν Μεσοποταμίαν indicates movement through a region. 'Passed through' is natural English and preserves the directional sense.
- source_word: διέσκαψε
  chosen: dug through
  alternatives:
  - dug up
  - broke through
  - cut through
  lexicon: LSJ
  rationale: The literal sense of the verb is to dig through/excavate. In a military context with cities it likely implies breaching or destroying fortifications, but the Greek itself uses the excavation image, so 'dug through' keeps the source texture without over-interpreting.
- source_word: πόλεις τὰς ὑψηλάς
  chosen: the high cities
  alternatives:
  - the lofty cities
  - the fortified hill cities
  lexicon: LSJ
  rationale: ὑψηλάς literally means 'high.' This may imply elevated or strongly situated cities, but 'high cities' best preserves the wording without importing 'fortified' unless explicit.
- source_word: χείμαρρου
  chosen: torrent
  alternatives:
  - wadi
  - winter-stream
  - brook
  lexicon: LSJ
  rationale: χείμαρρος denotes a rushing seasonal stream or torrent. 'Torrent' is concise and fits the military-geographical setting better than the more technical 'wadi.'
- source_word: Ἀβρωνᾶ
  chosen: Abrona
  alternatives:
  - Abronas
  - Abrona brook
  rationale: This is a transliterated place-name/genitival form after χειμάρρου. 'Abrona' gives a standard English transliteration while leaving the exact identification open.
- source_word: ἕως τοῦ ἐλθεῖν ἐπὶ θάλασσαν
  chosen: until he came to the sea
  alternatives:
  - until he reached the sea
  - as far as the sea
  lexicon: LSJ
  rationale: The articular infinitive after ἕως expresses endpoint. 'Until he came to the sea' is a close, readable rendering.
