  text: καὶ παρῆλθεν τὸν Εὐφράτην καὶ διῆλθεν τὴν Μεσοποταμίαν, καὶ διέσκαψε πάσας τὰς πόλεις τὰς ὑψηλὰς τὰς ἐπὶ τοῦ χειμάρρου Ἀβρωνᾶ ἕως τοῦ ἐλθεῖν ἐπὶ θάλασσαν.
