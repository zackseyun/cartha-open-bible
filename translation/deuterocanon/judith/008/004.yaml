lexical_decisions:
- source_word: ἦν
  chosen: remained
  alternatives:
  - was
  lexicon: BDAG
  rationale: Although the verb is simply 'was,' in English 'remained' better conveys
    the ongoing state described by the participle χηρεύουσα and avoids a wooden rendering.
- source_word: ἐν τῷ οἴκῳ αὐτῆς
  chosen: in her house
  alternatives:
  - in her home
  lexicon: BDAG
  rationale: A straightforward locative phrase. 'House' stays closer to οἶκος, though
    'home' is possible in idiomatic English.
- source_word: χηρεύουσα
  chosen: as a widow
  alternatives:
  - being a widow
  - living as a widow
  - widowed
  lexicon: BDAG
  rationale: The participle denotes her state of widowhood. 'As a widow' is natural
    English and preserves the durative sense without awkwardness. 'Widowed' in English
    can suggest the event of bereavement rather than the continuing condition.
- source_word: ἔτη τρία καὶ μῆνας τέσσορες
  chosen: for three years and four months
  alternatives:
  - three years and four months
  lexicon: BDAG
  rationale: English idiom normally supplies 'for' to express duration, though no
    separate preposition appears in Greek. The phrase is temporal duration modifying
    her continued widowhood.
- source_word: Ἰουδεὶθ
  chosen: Judith
  rationale: Standard English transliteration of the personal name.
