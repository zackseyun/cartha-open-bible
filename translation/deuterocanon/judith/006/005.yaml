theological_decisions:
- issue: Rendering of ἀδικία in a hostile royal accusation
  chosen_reading: in the day of your injustice
  alternative_readings:
  - on the day of your wrongdoing
  - in the day of your unrighteousness
  rationale: This is not a major doctrinally contested term in this context, but the phrase could be moralized more strongly with 'unrighteousness' or individualized with 'wrongdoing.' 'Injustice' stays closest to the lexical value and preserves the ambiguity of whether the speaker means moral guilt, offense, or disloyal conduct.
