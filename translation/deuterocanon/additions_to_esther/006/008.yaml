theological_decisions:
- issue: Meaning of κλῆροι in context
  chosen_reading: literal 'lots' with possible figurative force left implicit
  alternative_readings:
  - figurative 'destinies' or 'allotments'
  rationale: The verse likely uses lot-language symbolically within the prayer's theology of divine judgment, but the Greek still says κλῆροι. To preserve transparency and avoid over-interpretation, the main text keeps 'lots' and leaves broader figurative implications to context.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Supplying 'before' with 'all the nations'
  chosen_reading: understood as parallel to 'before God'
  alternative_readings:
  - leave as 'and all the nations' without supplied preposition
  rationale: English requires clarification of the relation of the dative phrase. Given the judicial setting and the immediately preceding ἐνώπιον, 'before all the nations' best represents the likely sense without changing the theology of universal witness.
  doctrine_reference: Translation philosophy §§1, 6
