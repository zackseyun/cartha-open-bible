translation:
  text: And these two lots came at the hour and appointed time[a], and at the day of judgment before God and all the nations,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'these two destinies' or 'these two allotments'; Greek 'lots' preserves the imagery of something assigned by lot.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δύο κλῆροι
  chosen: these two lots
  alternatives:
  - these two portions
  - these two destinies
  lexicon: LSJ
  rationale: κλῆρος commonly means 'lot' in the sense of something assigned by lot, and in Esther Additions this imagery is thematically active. 'Lots' preserves the concrete metaphor better than more interpretive options like 'destinies.' The demonstrative οὗτοι is reflected by 'these.'
- source_word: ἦλθον
  chosen: came
  alternatives:
  - arrived
  - fell
  lexicon: BDAG
  rationale: Aorist of ἔρχομαι, straightforwardly 'came.' 'Fell' could be tempting because of the context of lots, but the verb itself is not βάλλω or πίπτω; 'came' avoids importing imagery not present in the Greek.
- source_word: εἰς ὥραν καὶ καιρόν
  chosen: at the hour and appointed time
  alternatives:
  - for an hour and season
  - at the hour and season
  lexicon: LSJ
  rationale: The pair ὥρα and καιρός emphasizes a specific moment and fitting/appointed occasion. Rendering καιρός as 'appointed time' brings out its nuance better than the flatter 'season' in this context.
- source_word: εἰς ἡμέραν κρίσεως
  chosen: at the day of judgment
  alternatives:
  - for the day of judgment
  - on the day of judgment
  lexicon: BDAG
  rationale: κρίσις here denotes judicial decision/judgment. 'Day of judgment' is the most natural English equivalent. Repeating 'at' keeps the sequence of temporal phrases readable while reflecting εἰς idiomatically.
- source_word: ἐνώπιον τοῦ θεοῦ
  chosen: before God
  alternatives:
  - in the presence of God
  lexicon: BDAG
  rationale: ἐνώπιον is well rendered 'before' in judicial and cultic settings. It is concise and preserves the solemn courtroom sense.
- source_word: καὶ πᾶσι τοῖς ἔθνεσιν
  chosen: and before all the nations
  alternatives:
  - and all the nations
  - and before every nation
  lexicon: BDAG
  rationale: Although a second ἐνώπιον is not repeated, the dative phrase is naturally understood in parallel with 'before God.' Supplying 'before' in English clarifies the syntax. ἔθνη is rendered 'nations,' the standard sense in LXX narrative.
