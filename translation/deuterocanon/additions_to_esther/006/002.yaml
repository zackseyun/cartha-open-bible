  confidence: high
  validation: normalized_partition_extract
  note: This verse is being loaded from the normalized translation-ready override layer derived from the adjudicated corpus. Standalone ESG chapter 6 = Addition F, segmented from Swete pages 796-797 with First1KGreek used only as a verse-anchor map.
translation:
  text: For I remembered the dream that I saw concerning these matters[a], for not a word of them has passed by.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and not a word of them passed by,' possibly meaning that nothing from the dream failed to come about.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμνήσθην
  chosen: I remembered
  alternatives:
  - I was reminded
  - I recalled
  lexicon: BDAG
  rationale: Aorist passive/deponent form functioning with active sense; 'I remembered' is the most natural English rendering and fits the speaker's recollection of a prior dream.
- source_word: ἐνυπνίου
  chosen: dream
  alternatives:
  - dream-vision
  lexicon: LSJ
  rationale: The noun straightforwardly denotes a dream. 'Dream' is clear modern English and sufficient without adding 'vision,' which would over-interpret.
- source_word: περὶ τῶν λόγων τούτων
  chosen: about these matters
  alternatives:
  - concerning these words
  - about these things
  lexicon: BDAG
  rationale: λόγοι can mean 'words,' 'matters,' or 'events' depending on context. Here the phrase refers to the subject matter foreshadowed by the dream rather than merely spoken words, so 'these matters' best captures the sense in idiomatic English.
- source_word: οὐδὲ ... παρῆλθεν
  chosen: not ... escaped notice
  alternatives:
  - not ... passed by
  - not ... was overlooked
  - not ... failed
  lexicon: BDAG
  rationale: παρέρχομαι literally means 'pass by/pass away,' but in this context the idiom indicates that nothing went unfulfilled or unnoticed from what the dream concerned. 'Escaped notice' preserves the retrospective force without wooden literalism.
- source_word: ἀπʼ αὐτῶν λόγος
  chosen: a word from them
  alternatives:
  - a word of them
  - anything from them
  - one detail of them
  lexicon: BDAG
  rationale: The singular λόγος after the negative can idiomatically mean 'not a word' = not even one item/detail. 'From them' reflects ἀπʼ αὐτῶν while keeping the expression readable. The phrase is slightly compressed in Greek, so the English aims to preserve both literal wording and sense.
