theological_decisions:
- issue: Interpretation of the idiom οὐδὲ γὰρ παρῆλθεν ἀπʼ αὐτῶν λόγος
  chosen_reading: The clause means that no part of what the dream concerned was missed or overlooked.
  alternative_readings:
  - no word of them passed away
  - nothing of them failed to happen
  rationale: This is not a major doctrinal issue, but it is interpretively significant. The Greek idiom is terse and could be rendered more literally or more eventively. The chosen rendering keeps the recollective context in view and avoids asserting fulfillment more strongly than the wording requires.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal equivalence
