  text: ἐμνήσθην γὰρ περὶ τοῦ ἐνυπνίου οὗ εἶδον περὶ τῶν λόγων τούτων, οὐδὲ γὰρ παρῆλθεν ἀπʼ αὐτῶν λόγος·
  language: Greek
  pages:
