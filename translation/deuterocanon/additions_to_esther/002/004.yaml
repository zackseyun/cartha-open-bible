theological_decisions:
- issue: Political rhetoric of the royal accusation
  chosen_reading: Retain the hostile and propagandistic tone without softening it into neutral description.
  alternative_readings:
  - Use more neutral civic language such as 'different people' or 'distinct customs'
  rationale: The verse is part of a royal accusation against the Jews in the Greek additions. The translation should reflect the speaker's hostile characterization rather than normalize it as the narrator's judgment.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve tension rather than resolve it.'
