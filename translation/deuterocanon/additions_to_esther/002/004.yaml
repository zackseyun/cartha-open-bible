translation:
  text: among all the tribes throughout the inhabited world there is mixed in a certain hostile people[a], opposed in its laws to every nation, and continually disregarding the decrees of the kings[c][b], so that the blameless joint-rule directed by us may not be maintained.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'contrary in their customs to every nation.' The Greek νόμοι can mean either 'laws' or, more broadly, customary practices.
    reason: lexical_alternative
  - marker: b
    text: The Greek text here is syntactically compressed; 'disregarding the decrees of the kings' reflects a likely sense of passing by or neglecting royal commands.
    reason: lexical_alternative
  - marker: c
    text: Or 'common government' or 'shared rule' for 'joint-rule' (Greek συναρχίαν).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν πάσαις ταῖς κατὰ τὴν οἰκουμένην φυλαῖς
  chosen: among all the tribes throughout the inhabited world
  alternatives:
  - among all the peoples throughout the world
  - in all the provinces throughout the inhabited world
  lexicon: LSJ
  rationale: φυλαῖς most basically means 'tribes' or 'clans.' In this hostile royal-letter context it refers broadly to ethnic groupings dispersed through the empire. 'Inhabited world' reflects οἰκουμένη more literally than simply 'world,' while remaining intelligible.
- source_word: ἀναμεμιγμένον
  chosen: mixed in
  alternatives:
  - mingled
  - intermixed
  - scattered among
  lexicon: LSJ
  rationale: The participle conveys being intermingled among others rather than merely geographically present. 'Mixed in' preserves the hostile rhetoric of the letter without overparaphrasing.
- source_word: δυσμενῆ λαόν τινα
  chosen: a certain hostile people
  alternatives:
  - a certain ill-disposed people
  - a certain hateful nation
  lexicon: LSJ
  rationale: λαός is 'people'; δυσμενής denotes hostility or ill will. 'A certain hostile people' preserves both the indefiniteness of τινα and the pejorative tone.
- source_word: τοῖς νόμοις ἀντίθετον πρὸς πᾶν ἔθνος
  chosen: opposed in their laws to every nation
  alternatives:
  - contrary in its laws to every people
  - at odds by its customs with every nation
  lexicon: LSJ
  rationale: ἀντίθετον means 'set against, opposed.' νόμοι can mean laws or customs; 'laws' is chosen because the accusation concerns legal distinctiveness, though 'customs' is a viable nuance.
- source_word: τά τε τῶν βασιλέων παραπέμποντας διηνεκῶς προστάγματα
  chosen: and continually disregarding the decrees of the kings
  alternatives:
  - and constantly setting aside the commands of the kings
  - and perpetually transgressing the ordinances of the kings
  lexicon: LSJ
  rationale: The phrase is syntactically compressed and somewhat awkward in this witness. παραπέμπω here is taken in the sense of passing by, neglecting, or disregarding royal orders. 'Decrees' fits προστάγματα well in a royal edict context. The plural 'kings' is retained from the Greek, likely a generalizing or dynastic plural rather than a reference to multiple contemporaneous rulers.
- source_word: πρὸς τὸ μὴ κατατίθεσθαι
  chosen: so that ... may not be established
  alternatives:
  - with the result that ... is not secured
  - so as to prevent ... from being set in place
  lexicon: LSJ
  rationale: The construction expresses intended or resulting prevention. κατατίθεσθαι can mean to be set down, established, or instituted. 'May not be established' is idiomatic and fits the political context.
- source_word: τὴν ὑφʼ ἡμῶν κατευθυνομένην ἀμέμπτως συναρχίαν
  chosen: the blameless joint-rule directed by us
  alternatives:
  - the irreproachable common government administered by us
  - the faultless order of co-rule guided by us
  lexicon: LSJ
  rationale: συναρχία is rare and denotes joint rule, shared government, or common administration. In the propagandistic voice of the letter, it refers to the orderly imperial governance. ἀμέμπτως modifies the administration as 'blameless' or 'without fault.' 'Directed by us' renders κατευθυνομένην naturally.
