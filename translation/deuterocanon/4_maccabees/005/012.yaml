theological_decisions:
- issue: Force of προσκυνέω in context of royal demand
  chosen_reading: bow down
  alternative_readings:
  - worship
  - pay homage
  rationale: The verb can denote worship or prostration/homage. In this verse alone, the immediate object is the speaker's 'humane encouragement,' making a broader sense of submission to the king's demand more natural in English. Because the surrounding narrative concerns pressure toward impious compliance, the stronger cultic nuance remains possible and is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; optimal equivalence'
