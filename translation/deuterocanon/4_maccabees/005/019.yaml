translation:
  text: So do not suppose this to be a small sin[a], if we were to eat polluted food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'if we should eat what is unclean.' The Greek verb compresses the idea of eating food rendered impure or profane.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ ... νομίσῃς
  chosen: do not suppose
  alternatives:
  - do not think
  - do not consider
  lexicon: BDAG
  rationale: νομίζω here introduces an evaluative judgment. 'Suppose' is natural modern English and preserves the warning against underestimating the matter.
- source_word: μικρὰν ... ἁμαρτίαν
  lemma: μικράν
  chosen: a small sin
  alternatives:
  - a slight sin
  - a minor sin
  lexicon: BDAG
  rationale: The adjective μικράν directly qualifies ἁμαρτίαν. 'Small sin' is straightforward and preserves the speaker's point that the offense must not be minimized.
- source_word: ταύτην
  chosen: this
  alternatives:
  - this act
  - this matter
  lexicon: BDAG
  rationale: The pronoun points to the act under discussion. English can leave the referent implicit with 'this,' since the following clause explains it.
- source_word: εἰ
  chosen: if we were to
  alternatives:
  - if
  - if we should
  lexicon: BDAG
  rationale: The clause is conditional and somewhat prospective. 'If we were to' conveys the hypothetical force clearly in idiomatic English.
- source_word: μιεροφαγήσαμεν
  chosen: eat defiled food
  alternatives:
  - eat polluted food
  - commit sacrilegious eating
  - eat what is unclean
  lexicon: LSJ
  rationale: The compound verb refers to eating food made impure or profaned, especially in violation of Jewish dietary holiness. 'Eat defiled food' communicates the sense clearly without overtechnical wording. Because the object is implicit in the Greek verb, 'food' is supplied in English for clarity.
