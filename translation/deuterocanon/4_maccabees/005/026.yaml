translation:
  text: He permitted us to eat the things suited to our souls[a], but he forbade us to eat flesh that is opposed to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the things akin to our souls' ... 'flesh contrary to them.' The Greek emphasizes moral congruity or incongruity with the soul.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκειωθησόμενα
  chosen: suited
  alternatives:
  - akin
  - appropriate
  - congenial
  lexicon: LSJ
  rationale: From οἰκειόω/οἰκειόομαι, the participle denotes what is made proper or fitting to someone. 'Suited' gives natural English while preserving the idea of correspondence or appropriateness to the soul, without overinterpreting philosophically.
- source_word: ψυχαῖς
  chosen: souls
  alternatives:
  - lives
  - selves
  lexicon: LSJ
  rationale: In this context the term carries moral-psychological weight, not merely biological life. 'Souls' best preserves the anthropological and ethical force of the argument in 4 Maccabees.
- source_word: ἐπέτρεψεν
  chosen: permitted
  alternatives:
  - allowed
  - authorized
  lexicon: LSJ
  rationale: '''Permitted'' fits the legal-ethical context of divine dietary instruction and is slightly weightier than ''allowed''.'
- source_word: ἐναντιωθησόμενα
  chosen: opposed
  alternatives:
  - contrary
  - hostile
  - in conflict
  lexicon: LSJ
  rationale: The participle indicates things set against or contrary to our souls. 'Opposed' is concise and preserves the adversative moral sense.
- source_word: ἐκώλυσεν
  chosen: forbade
  alternatives:
  - prevented
  - prohibited
  lexicon: LSJ
  rationale: In parallel with divine permission, the verb here expresses prohibition. 'Forbade' is direct and idiomatic.
- source_word: σαρκοφαγεῖν
  chosen: to consume flesh
  alternatives:
  - to eat meat
  - to eat flesh
  lexicon: LSJ
  rationale: Literally 'to eat flesh.' 'Consume flesh' preserves the lexical force of σαρκο- while sounding natural in English. 'Eat meat' would be smoother but less exact and could weaken the rhetorical contrast.
