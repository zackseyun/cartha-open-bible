translation:
  text: He ordered the guards to drag away each one of the Hebrews and force them to taste pork and meat sacrificed to idols[b][a];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bodyguards' or more literally 'the spear-bearers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'food offered to idols.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεκέλευεν
  chosen: He ordered
  alternatives:
  - he commanded
  - he instructed
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated commanding in narrative context. 'He ordered' is natural modern English and preserves the authoritative force without unnecessary stiffness.
- source_word: τοῖς δορυφόροις
  chosen: the guards
  alternatives:
  - the bodyguards
  - the spearmen
  lexicon: LSJ
  rationale: Literally the term can denote spear-bearers or bodyguards, but in this court-execution setting 'guards' best conveys their role in readable English without over-specifying equipment.
- source_word: ἕνα ἕκαστον τῶν Ἐβραίων
  chosen: each one of the Hebrews
  alternatives:
  - every one of the Hebrews
  - each of the Jews
  lexicon: BDAG
  rationale: ἕνα ἕκαστον is distributive and emphatic, so 'each one' preserves the individualizing force. Ἐβραίων is rendered 'Hebrews' as the direct lexical equivalent rather than substituting the more interpretive 'Jews'.
- source_word: περισπᾶσθαι
  chosen: to seize
  alternatives:
  - to drag away
  - to pull aside
  lexicon: LSJ
  rationale: The verb here conveys laying hold of or pulling persons away one by one. 'Seize' captures coercive handling succinctly and fits the following forced feeding.
- source_word: κρεῶν ὑείων
  chosen: pork
  alternatives:
  - swine's flesh
  - pig meat
  lexicon: LSJ
  rationale: The phrase means meat from pigs. 'Pork' is idiomatic modern English and avoids archaic phrasing while preserving the dietary-law offense central to the scene.
- source_word: εἰδωλοθύτων
  chosen: meat sacrificed to idols
  alternatives:
  - idol-sacrifices
  - food offered to idols
  lexicon: BDAG
  rationale: The adjective/substantive refers to things sacrificed to idols. Because it is coordinated with meats, 'meat sacrificed to idols' makes the sense explicit in English.
- source_word: ἀναγκάζειν
  chosen: force
  alternatives:
  - compel
  - coerce
  lexicon: BDAG
  rationale: The verb denotes compulsion. 'Force' is direct, clear, and appropriately harsh for the context.
- source_word: ἀπογεύεσθαι
  chosen: to taste
  alternatives:
  - to partake of
  - to eat
  lexicon: BDAG
  rationale: The verb means to taste or partake. 'Taste' preserves the specific wording and may imply even a small act of violation, which suits the martyrdom context.
