translation:
  text: For Moses says[b][a], “And all the holy ones are under your hands.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sanctified ones' or 'the holy ones.' The Greek participle denotes those who have been made holy or set apart.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'under your hands,' an image that can imply being under God's power, care, or authority.
    reason: lexical_alternative
lexical_decisions:
- source_word: φησιν
  chosen: says
  alternatives:
  - said
  - declares
  lexicon: LSJ
  rationale: 'Present-tense citation formula in Greek is naturally rendered as a literary present in English: ''says.'''
- source_word: ἡγιασμένοι
  chosen: the consecrated ones
  alternatives:
  - the sanctified ones
  - the holy ones
  lexicon: LSJ
  rationale: Perfect passive participle of ἁγιάζω denotes persons made holy/set apart. 'Consecrated ones' preserves the passive-result sense and cultic/theological nuance better than the flatter 'holy ones.'
- source_word: ὑπό
  chosen: under
  alternatives:
  - in
  - beneath
  lexicon: LSJ
  rationale: With the accusative phrase here, the most straightforward spatial-metaphorical rendering is 'under,' preserving the image of being under divine control/protection rather than paraphrasing it away.
- source_word: τὰς χεῖράς σου
  chosen: your hands
  alternatives:
  - your hand
  - your power
  lexicon: LSJ
  rationale: The Greek is plural and should be kept literally as 'your hands.' While the phrase implies power or protection, the concrete image is retained in the main text.
