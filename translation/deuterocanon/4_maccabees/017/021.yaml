id: 4MA.17.21
reference: 4 Maccabees 17:21
source:
  edition: lxx-swete-1909
  text: καὶ τὸν τύραννον τιμωρηθῆναι καὶ τὴν πατρίδα καθαρισθῆναι·
  language: Greek
  pages:
  - 782
  confidence: high
  validation: minor_mismatch
translation:
  text: and that the tyrant should be punished and the homeland purified.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τύραννον
  chosen: the tyrant
  alternatives:
  - the despot
  - the king
  lexicon: LSJ
  rationale: τύραννος in this context denotes the oppressive ruler persecuting the
    faithful; 'tyrant' is the direct and natural English equivalent and preserves
    the moral-political force better than softer alternatives.
- source_word: τιμωρηθῆναι
  chosen: should be punished
  alternatives:
  - to be punished
  - to be avenged upon
  lexicon: BDAG/LSJ
  rationale: The aorist passive infinitive expresses the content of what was effected
    or intended in the surrounding context. 'Should be punished' gives idiomatic English
    in a subordinate clause while preserving the passive sense. 'Avenged upon' is
    possible in some contexts but is less straightforward here.
- source_word: πατρίδα
  chosen: the homeland
  alternatives:
  - the fatherland
  - the country
  - the native land
  lexicon: LSJ
  rationale: πατρίς refers to one's ancestral land or nation. 'Homeland' is readable
    modern English and retains the familial-national sense better than the more archaic
    'fatherland' or the flatter 'country'.
- source_word: καθαρισθῆναι
  chosen: purified
  alternatives:
  - cleansed
  - made clean
  lexicon: BDAG/LSJ
  rationale: The passive infinitive indicates cleansing/purification. 'Purified' preserves
    both ritual and moral overtones that are likely present in this martyrdom context;
    'cleansed' is possible but slightly less weighty in English.
- source_word: καὶ ... καὶ
  chosen: and ... and
  alternatives:
  - both ... and
  lexicon: Greek grammar
  rationale: The paired καὶ coordinates two parallel results. English can render this
    simply with repeated 'and'; this keeps the line concise and close to the Greek
    structure.
