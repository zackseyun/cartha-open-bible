translation:
  text: Counselor of lawlessness[a], tyrant, do not hate us; rather, have mercy on us more than on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek text is somewhat compressed: literally, ''Counselor, tyrant of lawlessness, not hating us beyond them, have mercy on us.'' The phrase translated ''more than on them'' could also be understood as ''because of them.'''
    reason: alternative_reading
lexical_decisions:
- source_word: σύμβουλε
  chosen: counselor
  alternatives:
  - adviser
  - plotter
  lexicon: LSJ
  rationale: Vocative singular of 'counselor/adviser.' 'Counselor' is the most direct and natural English equivalent in address.
- source_word: τύραννε
  chosen: tyrant
  alternatives:
  - despot
  - ruler
  lexicon: LSJ
  rationale: The vocative directly addresses the persecuting ruler. 'Tyrant' preserves the strongly negative political-moral force better than the flatter 'ruler.'
- source_word: παρανομίας
  chosen: lawless
  alternatives:
  - of lawlessness
  - wicked
  lexicon: LSJ
  rationale: The genitive qualifies the tyrant/counselor as characterized by violation of law. Rendering it adjectivally as 'lawless' gives idiomatic English while preserving the moral charge.
- source_word: μὴ
  chosen: do not
  alternatives:
  - stop
  lexicon: BDAG
  rationale: Standard prohibitive particle with the following participle/verb idea in direct address.
- source_word: μισῶν
  chosen: hate
  alternatives:
  - be hating
  - detest
  lexicon: BDAG
  rationale: Present participle used with μή in prohibition. English finite verb 'hate' communicates the sense naturally.
- source_word: ὑπὲρ αὐτοὺς
  chosen: more than on them
  alternatives:
  - beyond them
  - rather than them
  lexicon: BDAG
  rationale: ὑπέρ with accusative can express comparison, 'more than.' In context it contrasts the speaker and 'them,' so the mercy requested is comparative.
- source_word: ἡμᾶς
  chosen: us
  lexicon: BDAG
  rationale: Direct object, repeated for emphasis in the Greek; represented once in smooth English while preserving the sense.
- source_word: ἐλέα
  lemma: ἐλεέω
  chosen: have mercy on
  alternatives:
  - pity
  - show compassion to
  lexicon: BDAG
  rationale: Imperative sense from ἐλεέω. 'Have mercy on' preserves the ethical and emotional weight better than the weaker 'pity.'
