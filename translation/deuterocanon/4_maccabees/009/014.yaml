lexical_decisions:
- source_word: κατὰ πᾶν μέλος
  chosen: limb by limb
  alternatives:
  - in every limb
  - in each member/part
  lexicon: LSJ
  rationale: The distributive phrase literally means 'according to every limb/member.'
    In idiomatic English, 'limb by limb' preserves the bodily, sequential sense of
    torture better than the stiffer 'in every limb.'
- source_word: κλώμενος
  chosen: being broken
  alternatives:
  - being mangled
  - being shattered
  - being broken apart
  lexicon: LSJ
  rationale: The participle conveys physical breaking under torture. 'Being broken'
    is direct and sufficiently literal; 'mangled' is more interpretive, while 'shattered'
    is too strong.
- source_word: κατηγόρει
  chosen: he kept accusing them
  alternatives:
  - he denounced them
  - he reproached them
  - he charged against them
  lexicon: LSJ
  rationale: The imperfect suggests ongoing action, so 'kept accusing' captures the
    durative force. In context the sense is hostile denunciation directed at his tormentors,
    not a formal legal charge only.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  - as he said
  lexicon: LSJ
  rationale: This participle introduces the following speech in a standard way. 'Saying'
    keeps the Greek linkage and leaves the sentence open for the next verse.
