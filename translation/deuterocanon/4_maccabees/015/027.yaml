lexical_decisions:
- source_word: οὐκ ἐπέγνων
  chosen: I did not recognize
  alternatives:
  - I did not understand
  - I did not perceive
  - I did not know
  lexicon: BDAG
  rationale: ἐπιγινώσκω commonly carries the sense of coming to know or recognize. In this lament context, 'recognize' best preserves the idea that the speaker failed to grasp what was before her, without over-interpreting it as mere intellectual comprehension.
- source_word: τὴν σώζουσαν
  chosen: that was preserving
  alternatives:
  - that was saving
  - the saving
  lexicon: BDAG
  rationale: The present participle modifying σωτηρίαν is awkward in English if rendered too literally. 'That was preserving' captures the ongoing, temporary force implied by the participle in relation to 'for a little while,' and avoids the redundancy of 'the salvation saving.' 'Saving' remains a viable alternative and is preserved conceptually.
- source_word: ἑπτὰ υἱοὺς
  chosen: seven sons
  alternatives:
  - seven children
  lexicon: BDAG
  rationale: υἱούς specifically means 'sons,' and the context in 4 Maccabees concerns the mother's seven sons. This follows the gender-accurate policy rather than neutralizing to 'children'.
- source_word: πρὸς ὀλίγον χρόνον
  chosen: for a little while
  alternatives:
  - for a short time
  - briefly
  lexicon: BDAG
  rationale: The phrase denotes limited duration. 'For a little while' is natural modern English and preserves the temporal limitation without sounding overly compressed.
- source_word: σωτηρίαν
  chosen: the salvation
  alternatives:
  - deliverance
  - preservation
  lexicon: BDAG
  rationale: σωτηρία can mean salvation, deliverance, or preservation depending on context. Here the immediate sense is temporal rescue or preservation from death, yet 'salvation' preserves the Greek term's broader weight and allows the participle to specify its practical effect. Because English can sound abstract here, the participle is rendered in a way that clarifies the sense.
