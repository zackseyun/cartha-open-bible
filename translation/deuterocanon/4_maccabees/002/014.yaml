theological_decisions:
- issue: Ethical portrayal of conduct toward enemy property
  chosen_reading: Translate the verse as describing restraint and restoration even regarding enemies' cultivated property.
  alternative_readings:
  - Read τοῖς ἀπολέσασιν more loosely as 'for those who have suffered loss' rather than 'whose owners have been destroyed'
  rationale: The verse is part of an argument about reason-governed virtue and humane conduct in war. The Greek most naturally depicts sparing and restoring enemy property, even after the enemies' downfall. This is an ethical, not doctrinally contested, decision, but it affects how strongly the verse presents mercy toward enemies.
