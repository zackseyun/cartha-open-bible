  text: μηδὲ δενδροτομῶν τὰ ἥμερα τῶν πολεμίων φυτά, τὰ δὲ τῶν ἐχθρῶν τοῖς ἀπολέσασιν διασώζων, καὶ τὰ πεπτωκότα συνεγείρων.
