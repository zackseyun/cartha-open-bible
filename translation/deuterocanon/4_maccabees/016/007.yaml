translation:
  text: O seven futile pregnancies[a], and seven useless ten-month terms, and fruitless nursing[b], and miserable suckling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally 'seven ten-month terms,' reflecting ancient reckoning of the normal period of pregnancy.
    reason: cultural_note
  - marker: b
    text: The Greek consists of a series of exclamatory phrases rather than full clauses; the translation preserves that compressed lament style.
    reason: lexical_alternative
lexical_decisions:
- source_word: μάταιοι
  chosen: wasted
  alternatives:
  - vain
  - empty
  - futile
  lexicon: LSJ
  rationale: In this lament context, the adjective expresses that the pregnancies have come to nothing from the mother's perspective. 'Wasted' communicates grief over effort and hope ending without lasting earthly result more naturally than the more abstract 'vain' or 'futile'.
- source_word: κυοφορίαι
  chosen: pregnancies
  alternatives:
  - conceptions
  - times of bearing
  lexicon: LSJ
  rationale: The noun refers to carrying in the womb. 'Pregnancies' is the clearest modern English equivalent and fits the mother's retrospective lament over bearing seven sons.
- source_word: ἀνόνητοι
  chosen: fruitless
  alternatives:
  - useless
  - unprofitable
  - without benefit
  lexicon: LSJ
  rationale: The term denotes yielding no benefit. 'Fruitless' preserves the emotive force and pairs naturally with the reproductive imagery of gestation and childrearing.
- source_word: δεκάμηνοι
  chosen: ten-month terms
  alternatives:
  - ten-month pregnancies
  - full terms
  lexicon: LSJ
  rationale: Literally 'ten-month' periods, reflecting ancient reckoning of gestation. 'Ten-month terms' keeps the cultural specificity without overexplaining in the main text.
- source_word: ἄκαρποι
  chosen: unproductive
  alternatives:
  - barren
  - fruitless
  lexicon: LSJ
  rationale: Used metaphorically of yielding no result. 'Unproductive' avoids confusion with literal infertility ('barren'), since the mother did in fact bear children; it describes her lament that the nursing did not produce the hoped-for ongoing family life.
- source_word: τιθηνίαι
  chosen: nursing
  alternatives:
  - wet-nursing
  - nurturing at the breast
  lexicon: LSJ
  rationale: The noun concerns the act/state of nursing infants. 'Nursing' is concise and natural in English. 'Wet-nursing' would be too specific and potentially misleading here.
- source_word: ταλαίπωροι
  chosen: miserable
  alternatives:
  - wretched
  - pitiful
  - afflicted
  lexicon: LSJ
  rationale: The adjective conveys misery and hardship. 'Miserable' is idiomatic and emotionally direct in a maternal lament.
- source_word: γαλακτοτροφίαι
  chosen: suckling
  alternatives:
  - breastfeeding
  - rearing on milk
  - milk-nourishing
  lexicon: LSJ
  rationale: The compound refers to nourishing with milk. 'Suckling' is compact and suitably elevated for the poetic lament, while still understandable. 'Breastfeeding' is accurate but sounds more clinical and modern than the surrounding style.
