translation:
  text: Therefore[a], while some were taking pity on his old age,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'the things of his old age,' an idiom for the conditions or marks of his advanced age.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅθεν
  chosen: Therefore
  alternatives:
  - for which reason
  - therefore
  - so then
  lexicon: LSJ
  rationale: Inferential conjunction drawing a conclusion from the preceding scene; 'Therefore' is natural modern English and preserves the logical connection.
- source_word: ἐλεῶντες
  chosen: taking pity
  alternatives:
  - having mercy on
  - feeling compassion for
  - pitying
  lexicon: BDAG
  rationale: Present participle describing the response of some onlookers. 'Taking pity' is idiomatic and conveys active compassion without sounding archaic.
- source_word: τὰ τοῦ γήρως αὐτοῦ
  chosen: the things of his old age
  alternatives:
  - his old age
  - the circumstances of his old age
  - what belonged to his old age
  lexicon: LSJ
  rationale: The article with the genitive is somewhat elliptical, referring to the features or circumstances associated with his advanced age. A more explicit dynamic rendering is possible, but 'the things of his old age' stays close to the Greek while remaining intelligible in context.
- source_word: τὰ μὲν
  chosen: while some
  alternatives:
  - on the one hand
  - some indeed
  lexicon: LSJ
  rationale: The particle μέν signals the first side of a contrast that continues in the next clause/verse. Since this verse is incomplete as a sentence, 'while some' best prepares the reader for the balancing element.
