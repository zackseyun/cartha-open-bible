translation:
  text: Then indeed one of the cruel guards[a], leaping at his sides, kept striking him so that, when he fell[b], he might rise again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one of the harsh bodyguards.' The Greek literally refers to one of the ruler's spear-bearing guards.
    reason: lexical_alternative
  - marker: b
    text: '''Rise again'' here means ''get back up'' physically after falling, not resurrection.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λάξ
  chosen: Then indeed
  alternatives:
  - At any rate
  - Surely
  - Indeed
  lexicon: LSJ
  rationale: Taken as an asseverative/discourse particle in this context, paired with γέ τοι, intensifying the narrative transition rather than contributing concrete content. Rendering it with 'Then indeed' preserves the emphatic force without forcing an obscure English equivalent.
- source_word: τῶν πικρῶν
  chosen: of the cruel
  alternatives:
  - of the bitter
  - of the harsh
  lexicon: LSJ
  rationale: πικρός literally means 'bitter,' but of persons it commonly conveys harshness or cruelty. 'Cruel' fits the violent context better in natural English.
- source_word: δορυφόρων
  chosen: guards
  alternatives:
  - bodyguards
  - spearmen
  - executioners
  lexicon: LSJ
  rationale: Literally 'spear-bearers,' often used for royal guards or attendants. In this torture scene, 'guards' communicates the role clearly without over-specifying weaponry not foregrounded in the sentence.
- source_word: κενεῶνας
  chosen: sides
  alternatives:
  - flanks
  - hollow parts
  - ribs
  lexicon: LSJ
  rationale: The term refers to the hollow parts of the body, especially the flanks/sides. 'Sides' is the clearest modern English choice; 'flanks' is possible but less natural here.
- source_word: ἐναλλόμενος
  chosen: leaping upon
  alternatives:
  - springing at
  - jumping onto
  - rushing upon
  lexicon: LSJ
  rationale: The participle conveys a sudden, forceful movement onto or against the victim. 'Leaping upon' preserves the vivid physicality of the Greek.
- source_word: ἔτυπτεν
  chosen: kept striking
  alternatives:
  - was beating
  - struck repeatedly
  lexicon: LSJ
  rationale: Imperfect tense indicates repeated or continued action. 'Kept striking' captures the ongoing brutality.
- source_word: ὅπως ἐξανίσταιτο
  chosen: so that ... he might rise again
  alternatives:
  - in order that ... he might get up again
  - so that ... he would stand back up
  lexicon: LSJ
  rationale: 'ὅπως with the verb expresses purpose: the blows were intended to force him back up. ''Rise again'' here means physically get up, not resurrection.'
- source_word: πίπτων
  chosen: as he fell
  alternatives:
  - when he fell
  - while falling
  lexicon: LSJ
  rationale: 'The participle is contemporaneous with the action: the guard struck him in order to make him get up even as he was collapsing. ''As he fell'' preserves that immediacy.'
