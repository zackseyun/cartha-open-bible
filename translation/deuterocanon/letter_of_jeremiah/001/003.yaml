  text: νυνὶ δὲ ὄψεσθε ἐν Βαβυλῶνι θεοὺς ἀργυροῦς καὶ χρυσοῦς καὶ ξυλίνους ἐπʼ ὤμων αἰρομένους, δεικνύντας φόβον τοῖς ἔθνεσιν.
