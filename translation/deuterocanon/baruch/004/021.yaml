translation:
  text: Take courage[a], children; cry out to God, and he will deliver you from oppression[b], from the hand of enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliver you.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'from the hand of enemies' is a biblical idiom meaning 'from the power/control of enemies.'
    reason: cultural_note
lexical_decisions:
- source_word: Θαρρεῖτε
  chosen: Take courage
  alternatives:
  - Be of good courage
  - Be courageous
  - Have courage
  lexicon: LSJ
  rationale: Imperative plural of θαρρέω/θαρσέω, an exhortation to confidence or courage. 'Take courage' is natural modern English and preserves the direct imperative force without sounding archaic.
- source_word: τέκνα
  chosen: children
  alternatives:
  - sons
  - offspring
  lexicon: LSJ
  rationale: Vocative plural meaning 'children.' This is gender-inclusive in sense and best matches the familial address without importing a male-specific nuance.
- source_word: βοήσατε
  chosen: cry out
  alternatives:
  - call out
  - shout
  - appeal
  lexicon: LSJ
  rationale: Aorist imperative plural of βοάω, commonly 'cry out' or 'call aloud.' 'Cry out' fits prayer directed πρὸς τὸν θεόν and preserves the urgency of the appeal.
- source_word: πρὸς τὸν θεόν
  chosen: to God
  alternatives:
  - toward God
  lexicon: LSJ
  rationale: With verbs of calling, πρὸς naturally indicates direction toward the one addressed. 'To God' is idiomatic English for prayerful appeal.
- source_word: ἐξελεῖται
  chosen: he will rescue
  alternatives:
  - he will deliver
  - he will take out
  lexicon: LSJ
  rationale: Future middle of ἐξαιρέω, 'rescue/deliver.' 'Rescue' is clear modern English and suits the context of deliverance from hostile power.
- source_word: ἐκ δυναστείας
  chosen: from tyranny
  alternatives:
  - from oppression
  - from domination
  - from a ruling power
  lexicon: LSJ
  rationale: δυναστεία denotes lordship, domination, or oppressive rule. 'Tyranny' captures the negative force of oppressive domination more sharply than the broader 'power.'
- source_word: ἐκ χειρὸς ἐχθρῶν
  chosen: from the hand of enemies
  alternatives:
  - from enemies' hand
  - from enemies
  lexicon: LSJ
  rationale: A common biblical idiom for hostile control or power. Retaining 'hand' preserves the concrete biblical imagery while remaining understandable in English.
