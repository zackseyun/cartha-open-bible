id: 1MA.5.29
reference: 1 Maccabees 5:29
source:
  edition: lxx-swete-1909
  text: καὶ ἀπῆρεν ἐκεῖθεν νυκτός, καὶ ἐπορεύετο ἕως ἐπὶ τὸ ὀχύρωμα.
  language: Greek
  pages:
  - 636
  confidence: high
  validation: agree
translation:
  text: And he set out from there by night[a], and he kept going until he reached the stronghold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fortress.' The Greek ὀχύρωμα can denote a fortified place more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆρεν
  chosen: set out
  alternatives:
  - departed
  - went away
  lexicon: LSJ
  rationale: Aorist of ἀπαίρω/ἀπαίρω in context denotes departure from a place. 'Set out' is natural modern English for beginning a journey and fits the military-travel context better than the more wooden 'departed'.
- source_word: ἐκεῖθεν
  chosen: from there
  alternatives:
  - thence
  lexicon: LSJ
  rationale: Straightforward adverb of place indicating point of departure. 'From there' is clear modern English.
- source_word: νυκτός
  chosen: by night
  alternatives:
  - at night
  - during the night
  lexicon: LSJ
  rationale: Genitive used adverbially. 'By night' preserves the concise idiom and suggests nocturnal movement, which suits the narrative tone.
- source_word: ἐπορεύετο
  chosen: he kept going
  alternatives:
  - he went
  - he traveled
  - he proceeded
  lexicon: LSJ
  rationale: Imperfect middle/passive of πορεύομαι marks ongoing movement rather than a simple punctiliar action. 'He kept going' reflects the durative sense more clearly than simple 'he went'.
- source_word: ἕως
  chosen: until
  alternatives:
  - as far as
  - up to the point that
  lexicon: LSJ
  rationale: Here ἕως introduces the endpoint of the journey. 'Until' is the most natural English connector with the following phrase.
- source_word: ἐπὶ τὸ ὀχύρωμα
  chosen: he reached the stronghold
  alternatives:
  - to the fortress
  - up to the fortified place
  lexicon: LSJ
  rationale: ὀχύρωμα denotes a fortified place or stronghold. Because English normally requires a verb of arrival with 'until,' the sense is best expressed as 'until he reached the stronghold.' 'Stronghold' preserves the military nuance without over-specifying the structure.
