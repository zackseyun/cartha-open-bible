id: 1MA.15.34
reference: 1 Maccabees 15:34
source:
  edition: lxx-swete-1909
  text: ἡμεῖς δὲ καιρὸν ἔχοντες ἀντεχόμεθα τῆς κληρονομίας ἡμῶν καὶ τῶν πατέρων ἡμῶν.
  language: Greek
  pages:
  - 682
  confidence: high
  validation: minor_mismatch
translation:
  text: But[a], since we have the opportunity[b], we are holding fast to the inheritance of us and of our fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'while we have the opportunity' or 'having a favorable moment.' The Greek καιρὸν ἔχοντες refers to an opportune time, not merely time in general.
    reason: lexical_alternative
  - marker: b
    text: '''Inheritance'' can also carry the sense of hereditary possession or patrimony in this context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμεῖς δὲ
  chosen: But, we
  alternatives:
  - But we
  - Now we
  lexicon: LSJ
  rationale: δέ marks contrast with the preceding statement; English 'But' preserves the adversative force naturally.
- source_word: καιρὸν ἔχοντες
  chosen: since we have the opportunity
  alternatives:
  - having the occasion
  - while we have the time
  - having a favorable moment
  lexicon: LSJ
  rationale: καιρός here denotes an opportune or suitable time rather than mere chronological time. Rendering the participial phrase idiomatically as 'since we have the opportunity' preserves both the temporal and situational sense in readable English.
- source_word: ἀντεχόμεθα
  chosen: we are holding fast to
  alternatives:
  - we cling to
  - we maintain our claim to
  - we hold on to
  lexicon: LSJ
  rationale: The middle voice conveys firm adherence or continued possession. 'Holding fast to' preserves the sense of resolute retention without over-interpreting it as a purely legal 'claim,' though that nuance is present in context.
- source_word: τῆς κληρονομίας
  chosen: the inheritance
  alternatives:
  - the heritage
  - the possession
  - the patrimony
  lexicon: LSJ
  rationale: κληρονομία commonly means inheritance or hereditary possession. 'Inheritance' is the most transparent and broadly understandable English choice, while still allowing the territorial/familial nuance in context.
- source_word: ἡμῶν καὶ τῶν πατέρων ἡμῶν
  chosen: our inheritance and that of our fathers
  alternatives:
  - our inheritance and our fathers' inheritance
  - the inheritance belonging to us and to our fathers
  lexicon: LSJ
  rationale: The genitives attach to κληρονομίας and indicate both present and ancestral possession. 'That of our fathers' avoids awkward repetition while preserving the hereditary emphasis.
