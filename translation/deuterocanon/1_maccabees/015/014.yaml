id: 1MA.15.14
reference: 1 Maccabees 15:14
source:
  edition: lxx-swete-1909
  text: καὶ ἐκύκλωσεν τὴν πόλιν, καὶ τὰ πλοῖα ἀπὸ θαλάσσης συνῆψαν· καὶ συνέθλιβεν τὴν πόλιν ἀπὸ τῆς γῆς καὶ ἀπὸ τῆς θαλάσσης, καὶ οὐκ εἴασεν οὐδένα ἐκπορεύεσθαι καὶ εἰσπορεύεσθαι.
  language: Greek
  pages:
  - 680
  confidence: high
  validation: agree
translation:
  text: And he encircled the city[a], and the ships closed in from the sea; and he pressed the city from the land and from the sea[b], and he allowed no one to go out or to come in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'surrounded the city' for ἐκύκλωσεν; the chosen rendering keeps the vivid circular image of the Greek.
    reason: lexical_alternative
  - marker: b
    text: The Greek verb behind 'closed in' can suggest joining together or pressing in; here it refers to the ships tightening the siege from the sea.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκύκλωσεν
  chosen: encircled
  alternatives:
  - surrounded
  - besieged
  lexicon: LSJ
  rationale: The verb literally denotes surrounding in a circle. 'Encircled' preserves the concrete military image; 'besieged' is interpretive and partly supplied by context rather than the verb alone.
- source_word: συνῆψαν
  chosen: closed in
  alternatives:
  - joined battle
  - engaged
  - pressed together
  lexicon: LSJ
  rationale: With subject 'the ships' and modifier 'from the sea,' the sense is that the naval forces drew together against the city, completing the blockade. 'Closed in' communicates this naturally without over-specifying combat.
- source_word: συνέθλιβεν
  chosen: was crushing
  alternatives:
  - pressed hard
  - oppressed
  - hemmed in
  lexicon: LSJ
  rationale: The imperfect portrays ongoing pressure. 'Was crushing' keeps the strong force of the verb and the durative aspect better than a simple past such as 'crushed.'
- source_word: ἀπὸ τῆς γῆς καὶ ἀπὸ τῆς θαλάσσης
  chosen: from the land and from the sea
  alternatives:
  - by land and by sea
  - on land and at sea
  lexicon: LSJ
  rationale: A fairly literal rendering preserves the repeated preposition and the image of pressure exerted from both directions. 'By land and by sea' is idiomatic but slightly less transparent to the Greek structure.
- source_word: οὐκ εἴασεν
  chosen: he allowed no one
  alternatives:
  - he permitted no one
  - he let no one
  lexicon: LSJ
  rationale: '''Allowed'' is clear modern English and accurately reflects the causative-permissive sense.'
- source_word: ἐκπορεύεσθαι καὶ εἰσπορεύεσθαι
  chosen: to go out or to go in
  alternatives:
  - to leave or enter
  - to go out and come in
  lexicon: LSJ
  rationale: This pair is a standard movement expression. 'To go out or to go in' is natural in English here and clearly conveys a total blockade.
