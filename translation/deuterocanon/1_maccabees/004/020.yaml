translation:
  text: And he saw that they had been routed[a], and that they were setting the camp on fire; for the smoke that was visible made what had happened clear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had turned back' / 'had been put to flight'; the Greek verb can denote being driven into retreat, here in a military sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἴδεν
  chosen: he saw
  alternatives:
  - he perceived
  - he realized
  lexicon: LSJ
  rationale: Aorist of ὁράω, straightforward visual perception introducing the report of what Judas observed.
- source_word: τετρόπωται
  chosen: had been routed
  alternatives:
  - had turned back
  - had been put to flight
  - had been defeated
  lexicon: LSJ
  rationale: Perfect passive/middle sense from τρέπω in military context indicates the enemy had been turned/put to flight. 'Had been routed' captures the completed military reversal more idiomatically than the more literal 'turned back.'
- source_word: ἐνπυρίζουσιν
  chosen: were setting ... on fire
  alternatives:
  - were burning
  - were kindling
  lexicon: LSJ
  rationale: The verb denotes setting ablaze or burning. Rendering it progressively fits the present tense and the direct object τὴν παρεμβολήν.
- source_word: τὴν παρεμβολήν
  chosen: the camp
  alternatives:
  - the encampment
  - the campgrounds
  lexicon: LSJ
  rationale: Standard military term for camp/encampment. 'Camp' is natural modern English and suits the battle narrative.
- source_word: καπνὸς
  chosen: the smoke
  lexicon: LSJ
  rationale: Literal reference to visible smoke from the burning camp.
- source_word: ὁ θεωρούμενος
  chosen: that was being seen
  alternatives:
  - that was visible
  - that could be seen
  lexicon: LSJ
  rationale: The participle emphasizes the smoke as visibly observable. 'That was being seen' preserves the passive nuance, though idiomatically tied into the sentence.
- source_word: ἐνεφάνιζε
  chosen: made ... clear
  alternatives:
  - revealed
  - made evident
  - disclosed
  lexicon: LSJ
  rationale: The verb means to make visible or manifest. 'Made ... clear' communicates the inferential force in readable English.
- source_word: τὸ γεγονός
  chosen: what had happened
  alternatives:
  - the event
  - the fact
  - what had taken place
  lexicon: LSJ
  rationale: Perfect participial substantive referring to the accomplished state of affairs. 'What had happened' is the most natural English equivalent in context.
