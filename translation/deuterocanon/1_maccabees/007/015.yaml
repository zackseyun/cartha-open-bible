translation:
  text: And he spoke peaceful words with them, and swore to them, saying, “We will not seek harm against you or against your friends.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “We will not seek evil against you or your friends.” The Greek κακόν can denote evil or harm; here it likely refers to harmful action.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλάλησεν
  chosen: spoke
  alternatives:
  - said
  - addressed
  lexicon: BDAG
  rationale: A straightforward past-tense rendering of λαλέω in narrative context; 'spoke' is natural English and preserves the verbal action without overinterpreting tone.
- source_word: μετʼ αὐτῶν
  chosen: with them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: μετά with the genitive commonly means 'with.' In English, 'spoke with them' preserves the Greek preposition better than 'spoke to them,' while still reading naturally.
- source_word: εἰρηνικοὺς λόγους
  chosen: peaceful words
  alternatives:
  - words of peace
  - peaceable words
  lexicon: BDAG
  rationale: The adjective-noun combination is rendered transparently. 'Peaceful words' is idiomatic modern English; 'words of peace' is possible but slightly more formal. The phrase conveys conciliatory speech without implying genuine peace.
- source_word: ὤμοσεν
  chosen: swore
  alternatives:
  - took an oath
  - swore an oath
  lexicon: BDAG
  rationale: The aorist of ὄμνυμι is best rendered simply as 'swore.' English does not require the explicit object 'an oath' here, and the shorter form is both accurate and readable.
- source_word: Οὐκ ἐκζητήσομεν
  chosen: We will not seek
  alternatives:
  - We will not pursue
  - We will not demand
  lexicon: BDAG
  rationale: ἐκζητέω can mean seek out or pursue. In this context, with κακόν as object, 'seek' preserves the Greek wording while allowing the idiomatic sense 'seek harm against' in English.
- source_word: ὑμῖν κακὸν
  chosen: harm against you
  alternatives:
  - evil against you
  - injury to you
  - harm to you
  lexicon: BDAG
  rationale: κακόν here refers to harmful action rather than abstract moral evil. 'Harm against you' captures the hostile intent implied by the oath in a natural English expression.
- source_word: τοῖς φίλοις ὑμῶν
  chosen: your friends
  alternatives:
  - those dear to you
  - your allies
  lexicon: BDAG
  rationale: φίλοι normally means 'friends.' Although in political-military contexts it can shade toward allies or supporters, the plain sense fits here and should not be narrowed without stronger contextual pressure.
