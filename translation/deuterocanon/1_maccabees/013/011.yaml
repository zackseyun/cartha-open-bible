id: 1MA.13.11
reference: 1 Maccabees 13:11
source:
  edition: lxx-swete-1909
  text: καὶ ἀπέστειλεν Ἰωνάθαν τὸν τοῦ Ἀψαλώμου καὶ μετʼ αὐτοῦ δύναμιν ἱκανὴν εἰς Ἰόππην, καὶ ἐξέβαλεν τοὺς ἐν αὐτῇ ὄντας, καὶ ἔμεινεν ἐκεῖ ἐν αὐτῇ.
  language: Greek
  pages:
  - 672
  confidence: high
  validation: agree
translation:
  text: And Jonathan son of Absalom sent a considerable force with him to Joppa[a], and he drove out those who were in it and remained there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'remained there in it.' The double locative likely emphasizes that he stayed in the city itself.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: LSJ
  rationale: Standard narrative verb for sending; 'sent' is natural modern English and sufficiently formal.
- source_word: Ἰωνάθαν τὸν τοῦ Ἀψαλώμου
  chosen: Jonathan son of Absalom
  alternatives:
  - Jonathan, the son of Absalom
  lexicon: LSJ
  rationale: The article-plus-genitive construction identifies Jonathan by patronymic/descent. 'Son of Absalom' is the clearest idiomatic rendering.
- source_word: δύναμιν ἱκανὴν
  chosen: a considerable force
  alternatives:
  - a sufficient force
  - a sizable force
  lexicon: LSJ
  rationale: δύναμις here refers to military strength/troops, not abstract power. ἱκανήν indicates substantial adequacy; 'considerable force' captures both military sense and scale in readable English.
- source_word: εἰς Ἰόππην
  chosen: to Joppa
  alternatives:
  - into Joppa
  lexicon: LSJ
  rationale: Directional εἰς with a city is naturally rendered 'to' in English narrative.
- source_word: ἐξέβαλεν
  chosen: drove out
  alternatives:
  - cast out
  - expelled
  lexicon: LSJ
  rationale: In this military-political context, 'drove out' is idiomatic and concrete without sounding overly technical.
- source_word: τοὺς ἐν αὐτῇ ὄντας
  chosen: those who were in it
  alternatives:
  - those in it
  - the inhabitants there
  lexicon: LSJ
  rationale: The Greek is nonspecific about identity beyond presence in the city. 'Those who were in it' preserves that lack of specificity better than 'inhabitants,' which could overstate permanence.
- source_word: ἔμεινεν ἐκεῖ ἐν αὐτῇ
  chosen: remained there in it
  alternatives:
  - stayed there in it
  - remained there
  lexicon: LSJ
  rationale: The Greek has both ἐκεῖ and ἐν αὐτῇ. Retaining both reflects the emphatic/redundant locative wording of the source, though slightly wooden in English.
