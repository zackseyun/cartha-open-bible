id: 1MA.13.33
reference: 1 Maccabees 13:33
source:
  edition: lxx-swete-1909
  text: Καὶ ᾠκοδόμησεν Σίμων τὸ ὀχύρωμα τῆς Ἰουδαίας, καὶ περιετείχισεν πύργοις ὑψηλοῖς καὶ τείχεσιν μεγάλοις καὶ πύργοις καὶ πύλαις καὶ μοχλοῖς, καὶ ἔθετο βρώματα ἐν τοῖς ὀχυρώμασιν.
  language: Greek
  pages:
  - 673
  confidence: high
  validation: agree
translation:
  text: And Simon built up the stronghold of Judea[a], and he surrounded it with high towers and great walls and gates and bars[b], and he placed provisions in the strongholds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek repeats 'towers' twice in the list of fortifications; the translation preserves the repetition rather than smoothing it away.
    reason: lexical_alternative
  - marker: b
    text: Or 'he stored food in the fortresses.' The noun can refer more specifically to food, but 'provisions' better fits the military setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾠκοδόμησεν
  chosen: built up
  alternatives:
  - built
  - fortified
  lexicon: LSJ
  rationale: The verb οἰκοδομέω is basically 'build,' but in a military/fortification context 'built up' captures construction or strengthening without over-interpreting as purely 'fortified.'
- source_word: τὸ ὀχύρωμα τῆς Ἰουδαίας
  chosen: the stronghold of Judea
  alternatives:
  - the fortress of Judea
  - the fortification of Judea
  lexicon: LSJ
  rationale: ὀχύρωμα denotes a fortified place or stronghold. Singular is retained because the Greek is singular here. The genitive is rendered straightforwardly as 'of Judea.'
- source_word: περιετείχισεν
  chosen: surrounded it
  alternatives:
  - walled it around
  - enclosed it with walls
  lexicon: LSJ
  rationale: The verb means to wall around or encircle with fortifications. 'Surrounded it' is smoother English, while the following instrumental phrases specify that this surrounding was by towers, walls, gates, and bars.
- source_word: πύργοις ὑψηλοῖς
  chosen: with high towers
  alternatives:
  - with lofty towers
  lexicon: LSJ
  rationale: A direct rendering preserving the military architecture imagery.
- source_word: τείχεσιν μεγάλοις
  chosen: and great walls
  alternatives:
  - and large walls
  - and massive walls
  lexicon: LSJ
  rationale: τεῖχος is 'wall,' especially a defensive wall. 'Great' reflects μεγάλοις without becoming too interpretive.
- source_word: πύργοις καὶ πύλαις καὶ μοχλοῖς
  chosen: and towers and gates and bars
  alternatives:
  - and battlements and gates and bolts
  lexicon: LSJ
  rationale: The repeated πύργοις is retained as in the Greek rather than harmonized away. μοχλοῖς refers to bars/bolts used to secure gates; 'bars' is concise and natural.
- source_word: ἔθετο βρώματα
  chosen: he placed provisions
  alternatives:
  - he stored food
  - he put supplies
  lexicon: LSJ
  rationale: βρώματα literally means foods, but in a fortification context 'provisions' best conveys stored food supplies for defense.
- source_word: ἐν τοῖς ὀχυρώμασιν
  chosen: in the strongholds
  alternatives:
  - in the fortresses
  - in the fortified places
  lexicon: LSJ
  rationale: Plural is preserved here. Although the verse began with singular ὀχύρωμα, the closing plural likely refers to fortified sites generally; the translation reflects the Greek form rather than smoothing the number shift.
