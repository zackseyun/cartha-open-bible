translation:
  text: he turned back from Persia and Media[a], and the forces that had gone with the king are with him, and that he is seeking to take over the conduct of affairs;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek wording in this clause is syntactically difficult, especially 'the forces that had gone with the king with him.' The translation stays close to the Swete/Vaticanus wording rather than resolving the awkwardness beyond the evidence.
    reason: textual_variant
lexical_decisions:
- source_word: ἀπέστρεψεν
  chosen: he turned back
  alternatives:
  - he returned
  - he withdrew
  lexicon: LSJ
  rationale: The aorist of ἀποστρέφω here most naturally means a return or turning back from a region. 'Turned back' preserves the verbal imagery while remaining idiomatic English.
- source_word: ἀπὸ τῆς Περσίδος καὶ Μηδίας
  chosen: from Persia and Media
  alternatives:
  - out of Persia and Media
  lexicon: LSJ
  rationale: A straightforward geographical phrase. 'From Persia and Media' is the most natural English rendering of the genitive after ἀπό.
- source_word: αἱ δυνάμεις
  chosen: the forces
  alternatives:
  - the troops
  - the armies
  lexicon: LSJ
  rationale: δυνάμεις in military narrative commonly refers to armed forces. 'Forces' is broad and accurate without over-specifying unit size.
- source_word: αἱ πορευθεῖσαι τῷ βασιλεῖ μετʼ αὐτοῦ
  chosen: that had gone with the king with him
  alternatives:
  - that had marched with him to the king
  - that had accompanied the king with him
  lexicon: LSJ
  rationale: The transmitted Greek is awkward because it contains both τῷ βασιλεῖ and μετʼ αὐτοῦ. To stay anchored to the source, the draft preserves both elements rather than smoothing away one of them. The sense is that forces had gone along in connection with the king, but the exact syntactic relation is difficult in this witness.
- source_word: ζητεῖ
  chosen: is seeking
  alternatives:
  - seeks
  - is trying
  lexicon: LSJ
  rationale: The present tense conveys ongoing intent. 'Is seeking' preserves that aspect better than a simple English present.
- source_word: παραλαβεῖν
  chosen: to take over
  alternatives:
  - to take
  - to assume control of
  lexicon: LSJ
  rationale: In context παραλαμβάνω appears to mean taking control or assuming charge, not merely receiving. 'Take over' fits the political-military context.
- source_word: τὰ τῶν πραγμάτων
  chosen: the conduct of affairs
  alternatives:
  - the affairs of state
  - the management of matters
  lexicon: LSJ
  rationale: This idiom refers to the administration or handling of affairs. 'The conduct of affairs' is idiomatic and preserves the broad scope without importing a narrower modern bureaucratic term.
