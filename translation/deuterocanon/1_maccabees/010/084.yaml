translation:
  text: And Jonathan set Azotus and the cities around it on fire[a], and he took their spoil[b]; and he burned the temple of Dagon and its shrines with fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Azotus is the Greek form of Ashdod.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek text repeats ''the temple'': literally, ''the temple of Dagon and its temple he burned with fire.'' The repetition has been retained rather than smoothed away.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐνεπύρισεν
  chosen: set ... on fire / burned
  alternatives:
  - kindled
  - burned up
  lexicon: LSJ
  rationale: 'The verb means to set ablaze or burn. Because it occurs twice in the verse, English varies slightly for readability while preserving the same basic sense: first for the city and surrounding cities (''set ... on fire''), then for the sanctuary (''burned'').'
- source_word: Ἄζωτον
  chosen: Azotus
  alternatives:
  - Ashdod
  lexicon: LSJ
  rationale: The Greek text uses the Hellenized place name Ἄζωτος. Following the philosophy to transliterate names from the source text, 'Azotus' is preferred in the main text, while the more familiar Hebrew-form equivalent can be noted as an alternative if needed.
- source_word: τὰς πόλεις τὰς κύκλῳ αὐτῆς
  chosen: the cities around it
  alternatives:
  - the surrounding cities
  - the cities around her
  lexicon: LSJ
  rationale: κύκλῳ with the genitive indicates surrounding location. 'Around it' is natural modern English for the neuter/grammatical reference to the city.
- source_word: τὰ σκῦλα
  chosen: their spoil
  alternatives:
  - the plunder
  - their booty
  lexicon: LSJ
  rationale: σκῦλα denotes spoils taken in war. 'Spoil' is concise and idiomatic in biblical-historical narrative; 'their' reflects αὐτῶν.
- source_word: τὸ ἱερὸν Δαγὼν
  chosen: the temple of Dagon
  alternatives:
  - the sanctuary of Dagon
  - Dagon's temple
  lexicon: LSJ
  rationale: ἱερόν here refers to a temple precinct or sanctuary. 'Temple of Dagon' is the clearest natural rendering in English.
- source_word: τὸ ἱερὸν αὐτῆς
  chosen: its temple
  alternatives:
  - its sanctuary
  - her temple
  lexicon: LSJ
  rationale: The Greek repeats ἱερόν with αὐτῆς. Taken straightforwardly from the Greek witness, this yields 'its temple.' The repetition is somewhat awkward in English but should be preserved because it is present in the source text and may refer to the city's temple precinct in apposition or resumptively.
- source_word: ἐν πυρί
  chosen: with fire
  alternatives:
  - in fire
  - by fire
  lexicon: LSJ
  rationale: The phrase is an idiomatic instrumental expression reinforcing the burning. 'With fire' is the most natural equivalent.
