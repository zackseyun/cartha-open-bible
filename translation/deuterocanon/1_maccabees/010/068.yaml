translation:
  text: And Alexander the king heard, and he was greatly grieved, and he returned to Antioch.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤκουσεν
  chosen: heard
  alternatives:
  - learned
  - heard of it
  lexicon: BDAG
  rationale: The aorist of ἀκούω here most naturally means 'heard' in narrative sequence.
    'Learned' is possible as an idiomatic English rendering, but 'heard' stays closer
    to the Greek while remaining natural.
- source_word: ἐλυπήθη σφόδρα
  chosen: was greatly grieved
  alternatives:
  - was very distressed
  - was deeply saddened
  lexicon: BDAG
  rationale: λυπέω in the passive commonly denotes being grieved or distressed. 'Was
    greatly grieved' preserves both the emotional force of the verb and the intensifier
    σφόδρα without sounding archaic.
- source_word: ἀπέστρεψεν εἰς Ἀντιόχειαν
  chosen: returned to Antioch
  alternatives:
  - turned back to Antioch
  - went back to Antioch
  lexicon: BDAG
  rationale: ἀποστρέφω in this intransitive narrative use conveys turning back/returning.
    'Returned to Antioch' is the most idiomatic modern English equivalent and fits
    the context of movement back to a prior location.
- source_word: Ἀλέξανδρος ὁ βασιλεύς
  chosen: Alexander the king
  alternatives:
  - King Alexander
  lexicon: BDAG
  rationale: The Greek appositional structure is literally 'Alexander the king.' This
    is retained in English to stay close to the source, though 'King Alexander' would
    also be acceptable idiomatic English.
