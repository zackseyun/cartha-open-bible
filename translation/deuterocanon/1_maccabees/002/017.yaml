translation:
  text: And those from the king answered and said to Mattathias[a], saying, “You are a ruler, honored and great in this city[b], and supported by sons and brothers.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'those from the king,' that is, the king's representatives.
    reason: lexical_alternative
  - marker: b
    text: Or, 'established with sons and brothers.' The Greek may emphasize either Mattathias's family support or his firmly established standing through his family.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ παρὰ τοῦ βασιλέως
  chosen: those sent by the king
  alternatives:
  - those from the king
  - the king's men
  lexicon: LSJ
  rationale: The phrase literally means 'those from the king,' but in context it refers to the king's representatives or envoys. 'Those sent by the king' makes the functional sense clear in natural English without over-paraphrasing.
- source_word: ἀπεκρίθησαν ... καὶ εἶπαν
  chosen: answered and said
  alternatives:
  - replied and said
  - answered
  lexicon: LSJ
  rationale: The double verb is a common Semitic/Greek narrative formula. Retaining both verbs preserves the formal texture of the source while remaining readable.
- source_word: Ἄρχων
  chosen: ruler
  alternatives:
  - leader
  - chief
  lexicon: LSJ
  rationale: Ἄρχων denotes one who holds authority or prominence. 'Ruler' best preserves the sense of recognized civic authority or status here, stronger than merely 'leader'.
- source_word: ἔνδοξος
  chosen: honored
  alternatives:
  - glorious
  - distinguished
  lexicon: LSJ
  rationale: In this social setting the word points to public esteem or distinction. 'Honored' communicates that clearly in idiomatic English; 'glorious' would sound overstated in this context.
- source_word: μέγας
  chosen: great
  alternatives:
  - important
  - prominent
  lexicon: LSJ
  rationale: The adjective conveys stature or significance. 'Great' is concise and preserves the elevated tone of the address.
- source_word: ἐν τῇ πόλει ταύτῃ
  chosen: in this city
  alternatives:
  - in this town
  lexicon: LSJ
  rationale: πόλις normally means 'city.' Even if the settlement may not have been large by modern standards, 'city' is the standard and more formal rendering.
- source_word: ἐστηριγμένος
  chosen: supported
  alternatives:
  - established
  - strengthened
  - upheld
  lexicon: LSJ
  rationale: The participle indicates being firmly backed or established. Given the following phrase 'by sons and brothers,' 'supported' best captures the idea of social/familial backing in context.
- source_word: ἐν υἱοῖς καὶ ἀδελφοῖς
  chosen: by sons and brothers
  alternatives:
  - with sons and brothers
  - among sons and brothers
  lexicon: LSJ
  rationale: The phrase likely expresses the basis of Mattathias's strength or standing in his family network. 'By sons and brothers' fits the sense of support better than a merely locative 'among.'
