id: 1MA.9.84
reference: 1 Maccabees 9:84
source:
  edition: lxx-swete-1909
  text: αὐτῆς, καὶ ἔλαβεν τὰ σκῦλα αὐτῶν, καὶ τὸ ἱερὸν Δαγὼν καὶ τὸ ἱερὸν αὐτῆς ἐνεπύρισεν ἐν πυρί. καὶ ἐγένοντο οἱ πεπτωκότες μαχαίρᾳ
  language: Greek
  pages:
  - 661
  validation: no_reference
translation:
  text: and he took their spoils[a], and he burned the temple of Dagon and its temple with fire[b]. And those who had fallen by the sword
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The surviving Greek excerpt for this verse appears incomplete at both the beginning and the end. The translation therefore reflects only the extant wording supplied here, and the final clause breaks off after 'came to.'
    reason: textual_variant
  - marker: b
    text: Or 'its temple' for 'her temple'; the Greek uses a feminine pronoun, likely referring to a feminine antecedent such as the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαβεν
  chosen: he took
  alternatives:
  - he seized
  - he captured
  lexicon: LSJ
  rationale: Common aorist of λαμβάνω; 'took' is the most natural and sufficiently formal rendering in narrative context.
- source_word: τὰ σκῦλα
  chosen: their spoils
  alternatives:
  - the plunder
  - the booty
  lexicon: LSJ
  rationale: σκῦλα denotes spoils/plunder taken in war. 'Spoils' preserves the military sense without sounding overly archaic.
- source_word: ἱερὸν Δαγὼν
  chosen: the temple of Dagon
  alternatives:
  - Dagon's temple
  - the sanctuary of Dagon
  lexicon: LSJ
  rationale: ἱερόν in this context refers to a pagan temple precinct/shrine. 'Temple of Dagon' is clear and idiomatic.
- source_word: τὸ ἱερὸν αὐτῆς
  chosen: her temple
  alternatives:
  - its temple
  - her shrine
  lexicon: LSJ
  rationale: The Greek has feminine αὐτῆς. Since the immediate antecedent in the surviving text is the city (feminine), 'her temple' reflects the Greek form more closely than smoothing to 'its temple.'
- source_word: ἐνεπύρισεν ἐν πυρί
  chosen: he burned ... with fire
  alternatives:
  - he set ... on fire
  - he burned down
  lexicon: LSJ
  rationale: The verb plus cognate/prepositional phrase is emphatic. 'Burned ... with fire' preserves the force of the Greek, though slightly more formal than idiomatic English.
- source_word: οἱ πεπτωκότες
  chosen: those who had fallen
  alternatives:
  - the fallen
  - those who fell
  lexicon: LSJ
  rationale: Perfect participle indicates a resultant state; 'those who had fallen' captures that aspect naturally.
- source_word: μαχαίρᾳ
  chosen: by the sword
  alternatives:
  - with the sword
  lexicon: LSJ
  rationale: Standard idiom for death in battle; 'by the sword' is conventional and accurate.
