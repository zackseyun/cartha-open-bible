lexical_decisions:
- source_word: ἔγνω
  chosen: found out
  alternatives:
  - knew
  - learned
  - came to know
  lexicon: BDAG
  rationale: Aorist of γινώσκω here likely means coming to know or discovering information,
    not merely possessing knowledge. 'Found out' fits the narrative sense in idiomatic
    English.
- source_word: ἐζήτει
  chosen: was seeking
  alternatives:
  - sought
  - was trying
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or attempted action. 'Was seeking' preserves
    that aspect more clearly than the simple past 'sought.'
- source_word: ἀποκτεῖναι
  chosen: to kill
  alternatives:
  - to put to death
  - to slay
  lexicon: BDAG
  rationale: The infinitive straightforwardly means 'to kill.' 'Put to death' could
    imply formal execution, which the Greek does not require; 'slay' is too elevated
    for the project's style.
- source_word: Βακχίδης
  chosen: Bacchides
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: The pronoun is singular masculine accusative and refers back to the male
    figure in context; 'him' is the direct and natural rendering.
