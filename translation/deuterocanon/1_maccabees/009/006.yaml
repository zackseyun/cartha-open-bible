translation:
  text: And they saw the multitude of the forces[a], that they were many, and they were greatly afraid; and many fled from the camp, and none of them were left except eight hundred men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fled away from the camp.' The Greek verb can suggest either slipping away or fleeing off.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ πλῆθος τῶν δυνάμεων
  chosen: the multitude of the forces
  alternatives:
  - the mass of the troops
  - the great number of the army
  - the multitude of the armies
  lexicon: LSJ
  rationale: πλῆθος denotes a large number or multitude; δυνάμεις in military context refers to forces/troops. 'Forces' preserves the military sense without over-specifying a single army where the Greek plural stands.
- source_word: πολλοί εἰσιν
  chosen: they were many
  alternatives:
  - they were numerous
  - there were many of them
  lexicon: LSJ
  rationale: The clause explains the reason for fear. 'They were many' is a direct, natural rendering of the Greek predicate.
- source_word: ἐφοβήθησαν σφόδρα
  chosen: they were greatly afraid
  alternatives:
  - they feared greatly
  - they became very afraid
  lexicon: LSJ
  rationale: Aorist passive/deponent with σφόδρα intensifies the fear. 'Were greatly afraid' is idiomatic modern English and preserves the strong emphasis.
- source_word: ἐξερρύησαν
  chosen: slipped away
  alternatives:
  - fled away
  - deserted
  - escaped
  lexicon: LSJ
  rationale: The verb conveys flowing out or slipping away from a group. In this military setting it suggests men quietly leaving the camp rather than a formal tactical retreat. 'Slipped away' best captures that nuance.
- source_word: παρεμβολῆς
  chosen: camp
  alternatives:
  - encampment
  lexicon: LSJ
  rationale: In military context παρεμβολή is the camp or encampment. 'Camp' is the clearer modern equivalent.
- source_word: οὐ κατελείφθησαν ἐξ αὐτῶν ἀλλʼ ἢ ὀκτακόσιοι ἄνδρες
  chosen: none of them were left except eight hundred men
  alternatives:
  - there were left of them only eight hundred men
  - only eight hundred men remained from them
  lexicon: LSJ
  rationale: The construction states the remainder after many departed. 'None of them were left except eight hundred men' closely follows the Greek while remaining intelligible in English.
