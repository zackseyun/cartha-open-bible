    text: ויאמר רפאל אל טובי ואל טוביה בנו שירו ליי שיר חדש וברכו(הו) וזמרו שמו על כל הטובה אשר עשה עמכם והרבו לפניו תפלה ותחנה וצדקה כל ימי חייכם כי טוב לפני יי לעשות צדקה תמיד מכנוס אוצרות כסף וזהב כי צדקה תציל ממות ואני לא אכחד מכם כל האמת דעו כי בעת אשר התפללת[ם] והתחננת[ם] לפני (הקדוש ברוך הוא) אתה ושרה כלתך על צרת נפשכם אני העליתי תפלתכם לפני כסא הכבוד ובעת אשר היית קובר את המתים אני הייתי עמך [ובחג שבועות שעזבת את שלחנך והלכת לקבור את המת אני הייתי עמך] ובחנך האלהים בעורות עיניך כי יי צדיק יבחן ובעת צרתך שלחני יי לרפא אותך ואת שרה כלתך ואני (הוא) רפאל המלאך אחד מן השרים המשרתים לפני כסא הכבוד.
    kind: indirect_hebrew
