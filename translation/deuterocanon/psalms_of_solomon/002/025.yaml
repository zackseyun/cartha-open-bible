id: PSS.2.25
reference: Psalms of Solomon 2:25
source:
  edition: lxx-swete-1909
  text: ὅτι ἐνέπαιξαν καὶ οὐκ ἐφείσαντο, ἐν ὀργῇ καὶ θυμῷ μετὰ μηνίσεως
  language: Greek
  pages:
  - 790
  validation: swete_direct
translation:
  text: For they mocked and did not spare, in anger and wrath with fierce indignation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with resentment' or 'with vengeful anger' for 'with fierce indignation' (μετὰ μηνίσεως).
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: LSJ
  rationale: Introduces the reason or ground for the preceding statement; 'For' is the most natural English connector in context.
- source_word: ἐνέπαιξαν
  chosen: mocked
  alternatives:
  - ridiculed
  - treated with contempt
  lexicon: LSJ
  rationale: The verb conveys derision or scornful treatment. 'Mocked' is concise, idiomatic, and preserves the hostile tone without overexpansion.
- source_word: οὐκ ἐφείσαντο
  chosen: did not spare
  alternatives:
  - showed no pity
  - did not refrain
  lexicon: LSJ
  rationale: The verb φείδομαι commonly means to spare or refrain from harming. 'Did not spare' preserves both the severity and the compactness of the Greek.
- source_word: ἐν ὀργῇ
  chosen: in anger
  alternatives:
  - with anger
  lexicon: LSJ
  rationale: A straightforward rendering of the prepositional phrase; 'in anger' keeps the Greek structure and rhetorical buildup.
- source_word: καὶ θυμῷ
  chosen: and wrath
  alternatives:
  - and fury
  - and rage
  lexicon: LSJ
  rationale: θυμός overlaps with ὀργή but intensifies the emotional force. 'Wrath' preserves a heightened register and avoids flattening the doublet into mere repetition.
- source_word: μετὰ μηνίσεως
  chosen: with fierce indignation
  alternatives:
  - with resentment
  - with vengeful anger
  - with rancor
  lexicon: LSJ
  rationale: μήνισις denotes strong, abiding anger or indignation. 'Fierce indignation' captures the climactic force of the phrase in readable modern English.
