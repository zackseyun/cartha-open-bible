id: PSS.2.9
reference: Psalms of Solomon 2:9
source:
  edition: lxx-swete-1909
  text: ὅτι πονηρὰ ἐποίησαν εἰς ἅπαξ, τοῦ μὴ ἀκοῦσαι.
  language: Greek
  pages:
  - 789
  validation: swete_direct
translation:
  text: For they did evil once for all[c][b][a], not listening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'once and for all'; the phrase may also be taken more loosely as 'completely.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for not to hear' / 'so as not to hear.'
    reason: lexical_alternative
  - marker: c
    text: Or 'once for all'.
    reason: previous_rendering
lexical_decisions:
- source_word: πονηρά
  chosen: evil
  alternatives:
  - wicked things
  - wrong
  lexicon: LSJ
  rationale: A broad moral term; 'evil' preserves the weight and terseness of the Greek without specifying a narrower kind of wrongdoing.
- source_word: ἐποίησαν
  chosen: did
  alternatives:
  - committed
  - practiced
  lexicon: LSJ
  rationale: The common verb 'did/made' is best kept simple in English; 'did evil' is idiomatic and close to the Greek expression.
- source_word: εἰς ἅπαξ
  chosen: once for all
  alternatives:
  - once and for all
  - completely
  lexicon: LSJ
  rationale: This phrase most naturally conveys finality or decisiveness here. 'Once for all' preserves that force while staying close to the Greek wording.
- source_word: τοῦ μὴ ἀκοῦσαι
  chosen: refusing to listen
  alternatives:
  - so as not to hear
  - without listening
  lexicon: LSJ
  rationale: The articular infinitive with μή expresses a negative purpose or resultant stance. 'Refusing to listen' gives natural English while preserving the idea of willful non-hearing.
