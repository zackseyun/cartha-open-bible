id: PSS.2.16
reference: Psalms of Solomon 2:16
source:
  edition: lxx-swete-1909
  text: ἐγὼ δικαιώσω σε, ὁ θεός, ἐν εὐθύτητι καρδίας· ὅτι ἐν τοῖς κρίμασίν σου ἡ δικαιοσύνη σου, ὁ θεός.
  language: Greek
  pages:
  - 789
  validation: swete_direct
translation:
  text: I will declare you righteous[a], O God, with an upright heart; for in your judgments is your righteousness[b], O God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will justify you' or 'I will vindicate you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'justice' for 'righteousness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δικαιώσω
  chosen: declare you righteous
  alternatives:
  - justify you
  - vindicate you
  lexicon: BDAG
  rationale: The verb is future active, first person singular. With God as the object, the sense is not that the speaker makes God righteous, but that he acknowledges or declares God's righteousness. 'Declare you righteous' preserves the forensic force more transparently than the more idiomatic but potentially misleading 'vindicate you'.
- source_word: ἐν εὐθύτητι καρδίας
  chosen: with an upright heart
  alternatives:
  - in uprightness of heart
  - with sincerity of heart
  lexicon: LSJ
  rationale: The phrase expresses the manner in which the speaker speaks of God. 'With an upright heart' is natural English while closely preserving the imagery of moral straightness and inner integrity.
- source_word: κρίμασιν
  chosen: judgments
  alternatives:
  - judicial decisions
  - acts of judgment
  lexicon: BDAG
  rationale: The plural naturally refers to God's judgments or judicial acts. 'Judgments' is the most direct and readable rendering.
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per project defaults, δικαιοσύνη is rendered 'righteousness' unless context strongly requires otherwise. Here it describes God's moral rectitude as displayed in his judgments, so 'righteousness' fits well, while 'justice' remains a viable contextual alternative.
