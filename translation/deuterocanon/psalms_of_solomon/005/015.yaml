id: PSS.5.15
reference: Psalms of Solomon 5:15
source:
  edition: lxx-swete-1909
  text: ἡ χρηστότης ἀνθρώπου ἐν φειδῷ, καὶ ἡ αὔριον, καὶ ἐὰν δευτερώσῃ ἄνευ γογγυσμοῦ, καὶ τοῦτο θαυμάσεις.
  language: Greek
  pages:
  - 795
  validation: swete_direct
translation:
  text: A man's kindness is sparing and for tomorrow; and if he repeats it without grumbling[a], even at this you will marvel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is given sparingly and put off till tomorrow.' The Greek around 'for tomorrow' is terse and elliptical, so the sense of delay may be implied rather than fully expressed.
    reason: lexical_alternative
lexical_decisions:
- source_word: χρηστότης
  chosen: kindness
  alternatives:
  - goodness
  - generosity
  lexicon: LSJ
  rationale: χρηστότης can denote goodness or kindness, but here the saying concerns a person's beneficent disposition toward others; 'kindness' is the most natural English fit while preserving the moral tone.
- source_word: ἀνθρώπου
  chosen: a man's
  alternatives:
  - of a person
  - of a human being
  lexicon: LSJ
  rationale: The Greek is singular and masculine in form. Per project philosophy, a gender-accurate rendering is preferred unless context clearly demands a neutral collective sense. The proverb speaks generically of a human giver, so 'a man's' keeps the singular proverbial form.
- source_word: ἐν φειδῷ
  chosen: is sparing
  alternatives:
  - is stingy
  - is restrained
  - is given sparingly
  lexicon: LSJ
  rationale: The phrase conveys limited measure or restraint. 'Is sparing' preserves the compact proverbial force without over-interpreting it as outright moral condemnation ('stingy').
- source_word: αὔριον
  chosen: for tomorrow
  alternatives:
  - until tomorrow
  - put off till tomorrow
  lexicon: LSJ
  rationale: The bare adverb is elliptical in this clause. 'For tomorrow' keeps the Greek brevity and allows the implied sense of delay to remain visible without inserting too much interpretation.
- source_word: δευτερώσῃ
  chosen: does it a second time
  alternatives:
  - repeats it
  - does it again
  lexicon: LSJ
  rationale: The verb means to do something a second time. 'Does it a second time' is slightly more explicit than 'repeats it' and helps the reader track the implied act of kindness.
- source_word: γογγυσμοῦ
  chosen: grumbling
  alternatives:
  - murmuring
  - complaining
  lexicon: LSJ
  rationale: '''Grumbling'' is idiomatic modern English and preserves the sense of reluctant complaint.'
- source_word: θαυμάσεις
  chosen: you will marvel
  alternatives:
  - you will be amazed
  - you will wonder
  lexicon: LSJ
  rationale: The future second-person singular is retained directly. 'Marvel' fits the elevated proverbial register better than the flatter 'be amazed'.
