id: PSS.9.20
reference: Psalms of Solomon 9:20
source:
  edition: lxx-swete-1909
  text: τοῦ κυρίου ἐλεημοσύνη ἡ ἐπʼ οἶκον Ἰσραὴλ εἰς τὸν αἰῶνα καὶ ἔτι.
  language: Greek
  pages:
  - 800
  validation: swete_direct
translation:
  text: The Lord's mercy is upon the house of Israel forevermore.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'forever and beyond,' preserving the fuller force of the Greek phrase.
    reason: lexical_alternative
lexical_decisions:
- source_word: κυρίου
  chosen: the Lord's
  alternatives:
  - of the Lord
  lexicon: BDAG
  rationale: A possessive rendering is natural in English and preserves the genitive relationship. 'Lord' follows the project's default rendering for κύριος.
- source_word: ἐλεημοσύνη
  chosen: mercy
  alternatives:
  - compassion
  - kindness
  - merciful deeds
  lexicon: BDAG
  rationale: Here the noun denotes the Lord's merciful disposition or action toward Israel. 'Mercy' is concise, idiomatic, and preserves the covenantal-theological weight better than the broader 'kindness'.
- source_word: ἡ ἐπʼ οἶκον Ἰσραήλ
  chosen: is upon the house of Israel
  alternatives:
  - rests upon the house of Israel
  - is for the house of Israel
  lexicon: BDAG
  rationale: 'The article with the prepositional phrase functions predicatively: the mercy is directed toward or resting upon Israel. ''Upon the house of Israel'' keeps the imagery and the collective covenantal sense of οἶκος.'
- source_word: εἰς τὸν αἰῶνα καὶ ἔτι
  chosen: forevermore
  alternatives:
  - forever and beyond
  - forever and still
  - forever
  lexicon: BDAG
  rationale: The phrase intensifies duration beyond a simple 'forever.' 'Forevermore' captures the force idiomatically in modern English without the awkwardness of a more wooden rendering.
