id: PSS.13.1
reference: Psalms of Solomon 13:1
source:
  edition: lxx-swete-1909
  text: Δεξιὰ Κυρίου ἐσκέπασέν με, δεξιὰ Κυρίου ἐφείσατο ἡμῶν.
  language: Greek
  pages:
  - 802
  validation: swete_direct
translation:
  text: The right hand of the Lord sheltered me[b][a]; the right hand of the Lord spared us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'covered me' for 'sheltered me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'had mercy on us' for 'spared us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Δεξιὰ
  chosen: right hand
  alternatives:
  - right
  - right side
  lexicon: LSJ
  rationale: The noun is implicit in the feminine form used substantively; 'right hand' is the natural idiomatic rendering in biblical Greek and preserves the metaphor of power/protection.
- source_word: Κυρίου
  chosen: of the Lord
  alternatives:
  - the Lord's
  lexicon: LSJ
  rationale: Genitive with δεξιά is best rendered possessively. 'Lord' follows the project's default rendering for κύριος.
- source_word: ἐσκέπασέν
  chosen: sheltered
  alternatives:
  - covered
  - protected
  lexicon: LSJ
  rationale: The verb conveys covering in the sense of protection. 'Sheltered' preserves the protective sense in clear modern English better than the more literal but less natural 'covered.'
- source_word: με
  chosen: me
  lexicon: LSJ
  rationale: Straightforward first-person singular object pronoun.
- source_word: ἐφείσατο
  chosen: spared
  alternatives:
  - had mercy on
  - refrained from harming
  lexicon: LSJ
  rationale: The verb means to spare or refrain from destroying. 'Spared' is concise and fits the likely sense of divine preservation.
- source_word: ἡμῶν
  chosen: us
  alternatives:
  - our people
  - we
  lexicon: LSJ
  rationale: Although formally genitive, after φείδομαι the genitive marks the person spared; idiomatic English requires the object form 'us.'
