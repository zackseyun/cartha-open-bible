  from: For us and our children is favor forever; Lord, our Savior
  to: May your favor be upon us and our children forever; O Lord our Savior
  rationale: The verbless Greek clause (ἡμῖν... ἡ εὐδοκία) functions as either a statement of confidence or a petition (dative of advantage/possession). 'For us... is favor' is unnaturally wooden in English. Rendering it as 'May your favor be upon us' (or 'Your favor is upon us') produces natural psalmic English. Adding 'O' to the vocative 'Lord' also improves the liturgical register.
