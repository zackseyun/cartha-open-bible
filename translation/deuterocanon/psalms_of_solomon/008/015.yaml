id: PSS.8.15
reference: Psalms of Solomon 8:15
source:
  edition: lxx-swete-1909
  text: διὰ τοῦτο ἐκέρασεν αὐτοῖς ὁ θεὸς εὕρε πλανήσεως, ἐπότισεν αὐτοὺς ποτήριον οἴνου ἀκράτου εἰς μέθην.
  language: Greek
  pages:
  - 798
  validation: swete_direct
translation:
  text: Therefore God mixed for them a spirit of delusion[a]; he made them drink a cup of undiluted wine to drunkenness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a draught of delusion'.
    reason: previous_rendering
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: Therefore
  alternatives:
  - For this reason
  - Because of this
  lexicon: LSJ
  entry: null
  rationale: The phrase marks a judgment conclusion drawn from the preceding charges. 'Therefore' is concise and preserves the inferential force naturally in English.
- source_word: ἐκέρασεν
  chosen: mixed
  alternatives:
  - prepared
  - mingled
  lexicon: LSJ
  entry: null
  rationale: κεράννυμι commonly means to mix or prepare a drink. 'Mixed' preserves the concrete beverage metaphor that is reinforced by the following cup-of-wine clause.
- source_word: εὕρε πλανήσεως
  chosen: a draught of delusion
  alternatives:
  - a mixture of wandering
  - a brew of error
  lexicon: LSJ
  entry: null
  rationale: The transmitted phrase is difficult, especially εὕρε, but in context after ἐκέρασεν and before the drinking image, it most plausibly refers to something metaphorically mixed and given in judgment. 'Delusion' fits πλανήσεως well in a moral-spiritual context better than a purely spatial 'wandering.' Because the noun-form is uncertain, the rendering remains somewhat broad and the uncertainty is preserved in a footnote.
- source_word: ἐπότισεν αὐτοὺς
  chosen: he made them drink
  alternatives:
  - he gave them to drink
  - he caused them to drink
  lexicon: LSJ
  entry: null
  rationale: The verb means to give drink or cause to drink. 'He made them drink' is idiomatic modern English and preserves the force of imposed judgment.
- source_word: ποτήριον οἴνου ἀκράτου
  chosen: a cup of unmixed wine
  alternatives:
  - a cup of undiluted wine
  - a cup of full-strength wine
  lexicon: LSJ
  entry: null
  rationale: ἀκράτου denotes wine not mixed with water. 'Unmixed wine' is both accurate and close to the Greek imagery, preserving the severity of the judgment metaphor.
- source_word: εἰς μέθην
  chosen: to drunkenness
  alternatives:
  - for drunkenness
  - so that they became drunk
  lexicon: LSJ
  entry: null
  rationale: The phrase expresses result or end-point. 'To drunkenness' is slightly formal but stays close to the Greek and matches the verse's poetic-juridical tone.
