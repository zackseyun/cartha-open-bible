id: PSS.7.7
reference: Psalms of Solomon 7:7
source:
  edition: lxx-swete-1909
  text: καὶ ἡμεῖς ἐπικαλεσόμεθαί σε, καὶ σὺ ἐπακούσει ἡμῶν·
  language: Greek
  pages:
  - 797
  validation: swete_direct
translation:
  text: And we will call upon you[a], and you will hear us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “heed us” / “listen to us.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπικαλεσόμεθαί
  lemma: ἐπικαλέω
  chosen: will call upon
  alternatives:
  - will invoke
  - will appeal to
  lexicon: BDAG
  rationale: The verb ἐπικαλέω in prayer contexts commonly means to call upon or invoke someone. “Call upon” is the clearest natural English rendering and preserves the prayer-oriented sense without paraphrasing.
- source_word: σε
  chosen: you
  rationale: Direct second-person object retained plainly in English.
- source_word: ἐπακούσει
  chosen: will hear
  alternatives:
  - will heed
  - will listen to
  - will answer
  lexicon: BDAG
  rationale: ἐπακούω can mean hear, heed, or listen favorably. “Will hear” best preserves the core lexical sense while fitting biblical prayer language in English. “Will answer” is interpretive and goes beyond the explicit wording.
- source_word: ἡμῶν
  chosen: us
  alternatives:
  - our voice
  - our prayer
  rationale: Although the Greek uses the genitive after ἐπακούω, idiomatic English expresses the object directly as “hear us.” Expanding to “our prayer” would add words not present in the source.
