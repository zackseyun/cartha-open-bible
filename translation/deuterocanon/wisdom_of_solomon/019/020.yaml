translation:
  text: Fire was strong in water beyond its own power[a], and water forgot its extinguishing power;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Fire was strong in water with its proper force, and water forgot its power to quench.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πῦρ
  chosen: fire
  lexicon: LSJ
  rationale: Straightforward literal noun; the verse contrasts elemental properties.
- source_word: ἴσχυεν
  chosen: kept its own power
  alternatives:
  - was strong
  - prevailed
  - had strength
  lexicon: LSJ
  rationale: The imperfect indicates continuing efficacy. 'Kept its own power' brings out both the verbal force ('was strong/effective') and the following genitive phrase about its proper capacity.
- source_word: ἐν ὕδατι
  chosen: in water
  alternatives:
  - within water
  lexicon: LSJ
  rationale: Literal spatial phrase; the paradox is that fire remained effective in the very element that should quench it.
- source_word: τῆς ἰδίας δυνάμεως
  chosen: its own power
  alternatives:
  - its proper force
  - its natural power
  lexicon: LSJ
  rationale: ἰδίας marks what belongs properly to fire itself; δύναμις here is capacity or operative power. 'Its own power' is concise and preserves the contrast with water's proper power.
- source_word: ὕδωρ
  chosen: water
  lexicon: LSJ
  rationale: Literal noun in antithetical parallel with πῦρ.
- source_word: τῆς σβεστικῆς δυνάμεως
  chosen: its extinguishing power
  alternatives:
  - its quenching power
  - its power to put out fire
  lexicon: LSJ
  rationale: σβεστική denotes the capacity to quench or extinguish, especially fire. 'Extinguishing power' preserves the elemental contrast and remains readable.
- source_word: ἐπελανθάνετο
  chosen: forgot
  alternatives:
  - ceased to exercise
  - acted as though it forgot
  lexicon: LSJ
  rationale: Middle imperfect of ἐπιλανθάνομαι, literally 'forgot.' In context it is personified language for water failing to act according to its normal property; retaining 'forgot' preserves the vivid rhetoric.
