translation:
  text: Nor indeed will I accompany wasting envy[a], because it will have no share in wisdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Nor indeed will I keep company with jealousy that is consumed away,' with the final clause possibly meaning 'for envy itself has no share in wisdom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὔτε μὴν
  chosen: Nor indeed
  alternatives:
  - and certainly not
  - nor yet
  lexicon: LSJ
  rationale: Carries a continuative-negative force with mild emphasis; 'Nor indeed' preserves the rhetorical transition from the prior statement without sounding archaic beyond necessity.
- source_word: φθόνῳ
  chosen: envy
  alternatives:
  - jealousy
  lexicon: LSJ
  rationale: The noun commonly denotes envy or ill-will at another's good. 'Envy' is the more standard moral term in Wisdom literature and fits the vice contrasted with wisdom.
- source_word: τετηκότι
  chosen: that wastes away
  alternatives:
  - melting away
  - consumed
  - rotting
  lexicon: LSJ
  rationale: Perfect participle of τήκω, literally 'melted' or 'wasted away.' Here it characterizes envy as something consumed/consuming. 'That wastes away' gives idiomatic English while retaining the image of corrosive deterioration.
- source_word: συνοδεύσω
  chosen: I accompany
  alternatives:
  - I travel with
  - I keep company with
  lexicon: LSJ
  rationale: The verb means to go along with or accompany. 'Accompany' is concise and preserves the metaphor of refusing fellowship or association with envy.
- source_word: οὗτος
  chosen: this one
  alternatives:
  - it
  - such a person
  lexicon: LSJ
  rationale: The demonstrative is masculine and likely personifies the envious one rather than referring abstractly to envy itself. 'This one' preserves the Greek's pointed demonstrative force, though in English it remains somewhat formal.
- source_word: οὐ κοινωνήσει
  chosen: will have no share in
  alternatives:
  - will not partake in
  - will not share in
  lexicon: LSJ
  rationale: κοινωνέω here denotes participation or sharing. 'Will have no share in' reads naturally and clearly expresses exclusion from wisdom.
- source_word: σοφίᾳ
  chosen: wisdom
  lexicon: LSJ
  rationale: Standard rendering in Wisdom literature; no contextual reason to vary.
