translation:
  text: For God loves nothing except the one who dwells with wisdom[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one who dwells with Wisdom.' In context, wisdom is strongly personified in this chapter.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐθὲν
  chosen: nothing
  alternatives:
  - no one
  - not anything
  lexicon: LSJ
  rationale: The neuter singular with ἀγαπᾷ is most naturally rendered as an absolute object, 'nothing.' Although the sense approaches 'no one' because the exception names a person, the Greek wording is broader and is best preserved in English.
- source_word: ἀγαπᾷ
  chosen: loves
  alternatives:
  - has affection for
  - regards with love
  lexicon: BDAG
  rationale: Standard rendering of ἀγαπάω. 'Loves' is direct, natural English and preserves the theological weight of divine favor without paraphrase.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - unless
  - if not
  lexicon: BDAG
  rationale: Here εἰ μὴ introduces an exception, not a condition. 'Except' best captures the idiom in idiomatic English.
- source_word: τὸν ... συνοικοῦντα
  chosen: the one who lives with
  alternatives:
  - the one who dwells with
  - the one who cohabits with
  - the one who keeps company with
  lexicon: LSJ
  rationale: The articular participle functions substantivally, referring to a person characterized by ongoing association. συνοικέω literally suggests living together or dwelling with; 'lives with' preserves the relational and enduring sense without sounding overly technical.
- source_word: σοφίᾳ
  chosen: wisdom
  alternatives:
  - Wisdom
  lexicon: BDAG
  rationale: The dative marks association with σοφία. In Wisdom of Solomon, σοφία is heavily personified in the surrounding context, but the verse itself does not require capitalization in English. Lowercase 'wisdom' preserves the lexical meaning while allowing readers to perceive the personified resonance from context.
