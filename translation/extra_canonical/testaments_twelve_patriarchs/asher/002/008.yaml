  language: Greek
translation:
  text: Another commits adultery and practices sexual immorality, and abstains from
    foods. And while fasting he does evil, and by the power of wealth he drags many
    down, and out of excessive wickedness keeps the commandments. This is double-faced,
    but it is altogether evil.
