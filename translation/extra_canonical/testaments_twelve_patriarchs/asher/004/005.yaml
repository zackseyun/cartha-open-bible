translation:
  text: 'For such men are like gazelles and deer: though in the manner of wild animals
    they seem to be unclean, yet in every way they are clean, because they walk in
    zeal for the Lord, abstaining from what God also hates and forbids through the
    commandments, keeping evil away from good.'
