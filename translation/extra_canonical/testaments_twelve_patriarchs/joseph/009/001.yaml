translation:
  text: But when she came, she would listen to me, how I gave thanks to the Lord and
    sang hymns to the Lord in the house of darkness, and with a cheerful voice, rejoicing,
    I glorified my God because by a pretext I had been delivered from the Egyptian
    woman. Many times she sent to me, saying, “Consent to fulfill my desire, and I
    will release you from your chains, and I will free you from the darkness.”
