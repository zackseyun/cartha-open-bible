translation:
  text: If anyone is glorified, do not envy him; if anyone is enriched, do not be
    jealous. Bless the Lord who gives good things to all, because the poor man, if
    he is free from envy, is rich before the Lord. Do not hate a beautiful woman because
    of her appearance, and do not hate a man because of the abundance of his glory.
    For God gives the good things of the earth to whom he wills.
