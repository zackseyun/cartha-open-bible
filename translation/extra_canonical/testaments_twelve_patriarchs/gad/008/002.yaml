translation:
  text: 'And now, my children, I command you: love one another from the heart, and
    if anyone sins against you, speak peaceably to him, and in your soul hold no deceit;
    and if he confesses and repents, forgive him. But if he denies it, do not become
    heated in argument with him, lest, after taking in poison[b], he begin to swear
    and so commit a double sin. If anyone prospers beyond you, do not be grieved;
    but pray also for him, that he may be made complete in every good thing.'
