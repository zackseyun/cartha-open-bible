theological_decisions:
- issue: Divine source of technical ability
  chosen_reading: The Lord is explicitly said to have given Zebulun understanding
    and wisdom for the task.
  alternative_readings:
  - The phrase could be read more narrowly as practical skill rather than broader
    wisdom.
  rationale: The Greek pairs σύνεσις and σοφία, which can include craftsmanship but
    also carry theological weight; the translation preserves both dimensions without
    reduction.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; preserve theological
    tension rather than resolve it'
