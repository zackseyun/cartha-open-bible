  text: Πρῶτος ⌈οὖν⌉¹ ἐγὼ ἐποίησα σκάφος² ἐπιπλέειν³ ἐν τῇ⁴ θαλάσσῃ, ὅτι Κύριος ἔδωκέ
    μοι ⌈*σύνεσιν καὶ σοφίαν⁵ ἐν αὐτῷ⁶. 2. Καὶ καθῆκα⁷ ξύλον ὄπισθεν αὐτοῦ⁸, καὶ
  language: Greek
