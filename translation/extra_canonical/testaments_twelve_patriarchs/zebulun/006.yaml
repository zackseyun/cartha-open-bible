translation:
  text: First, then, I made a boat to sail on the sea, because the Lord gave me understanding
    and wisdom in this matter. And I fastened a piece of wood behind it, and
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek chapter text available here is fragmentary and breaks off mid-sentence
      after 'and I fastened a piece of wood behind it, and'.
    reason: textual_variant
  - marker: b
    text: '''Wisdom'' here may also imply practical skill for construction, not only
      abstract wisdom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σκάφος
  chosen: boat
  alternatives:
  - vessel
  - ship
  lexicon: LSJ
  rationale: A general term for a seagoing craft; 'boat' is natural English and fits
    the likely scale implied without over-specifying 'ship'.
- source_word: ἐπιπλέειν
  chosen: to sail
  alternatives:
  - to float
  - to navigate
  lexicon: LSJ
  rationale: Though literally 'to float upon,' in context with a constructed craft
    on the sea the idiomatic sense is purposeful movement on water, hence 'to sail'.
- source_word: σύνεσιν
  chosen: understanding
  alternatives:
  - insight
  - intelligence
  lexicon: BDAG
  rationale: Pairs naturally with σοφία; 'understanding' preserves the cognitive nuance
    without sounding technical.
- source_word: σοφίαν
  chosen: wisdom
  alternatives:
  - skill
  - practical wisdom
  lexicon: BDAG
  rationale: The term can shade toward practical skill in craftsmanship, but 'wisdom'
    preserves the broader theological register while still fitting the context.
- source_word: καθῆκα
  chosen: I fastened
  alternatives:
  - I set down
  - I fixed
  - I attached
  lexicon: LSJ
  rationale: Given the boatbuilding context and the following object ξύλον, the sense
    is of placing/attaching a timber component; 'fastened' conveys functional construction.
- source_word: ξύλον
  chosen: a piece of wood
  alternatives:
  - timber
  - beam
  - wooden piece
  lexicon: LSJ
  rationale: The exact nautical component is not fully clear from the surviving snippet;
    'a piece of wood' stays close to the Greek without over-interpreting.
- source_word: Κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Follows project default for κύριος in a divine reference.
