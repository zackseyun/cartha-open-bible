id: T12P.JUD.20
reference: Testament of Judah 20
source:
  edition: Charles 1908 Greek Versions (Judah source-fix v2 — T12P Pass A; α-column primary, apparatus stripped)
  text: "XX. Γνῶτε¹ οὖν, τέκνα μου², ὅτι δύο πνεύματα σχολάζουσι³ τῷ ἀνθρώπῳ, *τὸ τῆς ἀληθείας⁴ καὶ *τὸ τῆς πλάνης⁶. 2. Καὶ μέσον ἐστὶ συνειδήσεως⁷, *οὗ ἐὰν θέλῃ κλῖναι⁸. 3. Καὶ ἐν ἑκάστῳ¹³ αὐτῶν γνωρίζεται κατὰ τὰ ἔργα τῶν ἀνθρώπων, ὅτι ἐν στήθει τῶν ὀστέων αὐτῶν παρὰ Κυρίου γέγραπται. 4. Καὶ οὐκ ἔστι καιρὸς ἐν ᾧ¹⁹ δυνήσεται λαβεῖν ἄνθρωπον τὰ ἔργα τῶν ἀνθρώπων¹⁹, ὅτι ἐν τῇ²⁰ τοῦ²¹ στήθει τῶν ὀστέων αὐτῶν²² παρὰ Κυρίου γέγραπται. 5. Καὶ²⁰ τὸ πνεῦμα τῆς ἀληθείας²¹ κατηγορεῖ²² πάντων²³ καὶ ἐμπεπύρισται ὁ ἁμαρτωλὸς²⁴ ἐκ τῆς ἰδίας καρδίας, καὶ ἆραι²⁵ πρόσωπον πρὸς τὸν κριτὴν οὐ δύναται."
  language: Greek
  source_pages:
  - 165
  - 166
translation:
  text: '1[a]. For it leads astray, because in the delusion of silver they call those who are not gods gods, and it makes the one who has it fall into frenzy. 2. Because of silver I lost my children; and if my repentance and my humiliation, and the prayers of my father, had not come to my aid, I would have died childless. 3. But the God of my fathers had mercy on me, because I did this in ignorance[b]. 4. For the ruler of deceit blinded me, and I was ignorant as a man, and, as flesh corrupted in sins, I recognized my own weakness, thinking myself invincible.


    5. Understand, then, my children, that two spirits attend a man: the spirit of truth and the spirit of deceit. 6. And between them is the conscience of the mind, to which it may incline as it wills. 7. The works of truth and the works of deceit are written upon the breast of a man, and the Lord knows each one of them. 8. And there is no time when the works of men can escape his notice, for they are inscribed before the Lord upon the breast. 9. And the spirit of truth testifies against all things, and the sinner is burned up by his own heart[c], and cannot lift up his face to the judge.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek witness is textually complex in vv. 5–8, especially around 'conscience,' 'understanding of the mind,' and the wording about what is written on the breast. The translation follows the shared sense of the witnesses rather than over-committing to one expanded form.
    reason: textual_variant
  - marker: b
    text: Or 'in the delusion of money.' The Greek literally has 'silver,' a traditional idiom for wealth.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'cannot lift up his face to the judge' is implied by the surviving Greek context and preserves the forensic imagery of accusation and inward burning.
    reason: alternative_reading
lexical_decisions:
- source_word: πλάνη / ἄρχων τῆς πλάνης
  chosen: deceit / ruler of deceit
  alternatives:
  - error
  - delusion
  - wandering
  lexicon: LSJ
  rationale: Within this testament the term carries moral and spiritual misdirection, not mere intellectual mistake. 'Deceit' preserves the ethical force, while 'delusion' is retained in v.1 for ἐν πλάνῃ ἀργυρίου to reflect the blinding power of greed.
- source_word: ἀργύριον
  chosen: silver
  alternatives:
  - money
  lexicon: LSJ
  rationale: The Greek literally says 'silver.' Because the chapter warns against greed and bribery in a concrete, traditional idiom, 'silver' preserves the testamentary texture better than the more generalized 'money'.
- source_word: ἔκστασις
  chosen: frenzy
  alternatives:
  - ecstasy
  - derangement
  - trance
  lexicon: LSJ
  rationale: Here the sense is not positive ecstasy but a destabilized, irrational state produced by greed. 'Frenzy' communicates moral and mental disorientation.
- source_word: μετάνοια
  chosen: repentance
  alternatives:
  - change of mind
  lexicon: BDAG
  rationale: Although the project often prefers 'change of mind' in cognitive contexts, here Judah is confessing specific sin and divine mercy; 'repentance' best fits the penitential setting.
- source_word: ταπείνωσις
  chosen: humiliation
  alternatives:
  - humbling
  - lowliness
  lexicon: LSJ
  rationale: The term points to Judah's abasement under judgment rather than a generalized virtue. 'Humiliation' keeps the sharpness of his confession.
- source_word: ἐν ἀγνωσίᾳ
  chosen: in ignorance
  alternatives:
  - unknowingly
  lexicon: BDAG
  rationale: 'This preserves the formal explanatory tone and the theological tension: the act was sinful, yet done without full understanding.'
- source_word: σάρξ
  chosen: flesh
  alternatives:
  - human weakness
  - sinful nature
  lexicon: BDAG
  rationale: The phrase 'as flesh corrupted in sins' is retained with 'flesh' to preserve the anthropological texture of the Greek without over-systematizing it into later doctrinal language.
- source_word: δύο πνεύματα
  chosen: two spirits
  alternatives:
  - two dispositions
  - two impulses
  lexicon: LSJ
  rationale: The testament presents a dual moral-spiritual framework. 'Spirits' should remain explicit rather than reduced to psychology alone.
- source_word: σχολάζουσι τῷ ἀνθρώπῳ
  chosen: attend a man
  alternatives:
  - are occupied with a man
  - are at work in a man
  lexicon: LSJ
  rationale: The verb is difficult in this context; 'attend' captures the idea that these spirits are present with and active around a person without over-paraphrasing.
- source_word: συνείδησις / συνέσεως τοῦ νοός
  chosen: conscience of the mind
  alternatives:
  - understanding of the mind
  - moral consciousness
  lexicon: BDAG
  rationale: The witnesses vary, but the sense is of an inner faculty between truth and deceit. 'Conscience of the mind' preserves both the moral and cognitive dimensions.
- source_word: στῆθος
  chosen: breast
  alternatives:
  - chest
  - heart
  lexicon: LSJ
  rationale: 'The Greek imagery is bodily and inscriptional: things are written on the breast. ''Heart'' would interpret too far; ''breast'' keeps the metaphor visible.'
- source_word: κατηγορεῖ
  chosen: testifies against
  alternatives:
  - accuses
  - brings charges against
  lexicon: BDAG
  rationale: The forensic nuance is important, but 'testifies against' reads naturally in English while preserving the judicial setting that culminates in 'the judge.'
- source_word: ἐμπεπύρισται
  chosen: is burned up
  alternatives:
  - is inflamed
  - is set on fire
  lexicon: LSJ
  rationale: The perfect/passive image suggests inward torment arising from conscience. 'Is burned up' conveys consuming inner judgment.
