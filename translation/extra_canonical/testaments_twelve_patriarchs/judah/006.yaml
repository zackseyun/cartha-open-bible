id: T12P.JUD.06
reference: Testament of Judah 6
source:
  edition: Charles 1908 Greek Versions (Judah source-fix v2 — T12P Pass A; α-column primary, apparatus stripped)
  text: "VI. Καὶ ὡς ἤμην ἐν τοῖς ὕδασι Χωζηβά¹, οἱ ἀπὸ †Ἰωβὴλ² ἦλθον ἐφ᾽³ ἡμᾶς εἰς πόλεμον. 2. Καὶ *συνάψαντες ἐτρέψαμεν⁴ αὐτοὺς⁵ καὶ τοὺς ἀπὸ Σιλὼμ⁶ συμμάχους αὐτῶν⁷ ἀπεκτείναμεν⁸ καὶ οὐκ ἐδώκαμεν αὐτοῖς⁹ διέξοδον¹⁰ τοῦ εἰσελθεῖν πρὸς ἡμᾶς. 3. *Οἱ δὲ πάλιν¹¹ ἀπὸ¹² Μαχίρ¹³ ἐπῆλθον¹⁴ ἡμῶν τῇ πέμπτῃ ἡμέρᾳ, καὶ¹⁵ προσδίδωσι πρὸς αὐτοὺς¹⁶ *ἐν κραταιᾷ μαχαίρᾳ¹⁷ περιγινόμεθα αὐτῶν¹⁸ καὶ ἀπεκτείναμεν¹⁹ *πρὸ τοῦ ἀναβῆναι τὴν ἀνάβασιν²⁰. 4. *Ὡς δὲ ἤκομεν²¹ τῇ²² τῇ πόλει²³, αἱ γυναῖκες αὐτῶν ἐκύλιον *λίθους ἐφ᾽ ἡμᾶς²⁴ ἀπὸ τῆς κορυφῆς τοῦ ὄρους ἐν ᾧ²⁵ *ἦν ἡ πόλις²⁶. 5. Καὶ ὑποκρύψας²⁷ τὸν τε καὶ Συμεὼν²⁸ ἐξωπίσθεν²⁹ ἐπελαβόμεθα³⁰ τοῦ ὑψηλοῦ, καὶ *ἐξωλοθρεύσαμεν καὶ ταύτην τὴν πόλιν³⁰."
  language: Greek
  source_pages:
  - 144
  - 145
translation:
  text: "1. And when I was at the waters of Chozeba[a], those from Jobel came against us for battle. 2. And joining battle, we put them to flight; and we killed those from Shilom, their allies, and gave them no way of escape. 3. But those from Machir attacked us again on the fifth day; and charging at them with a mighty sword[b], we prevailed over them and killed them before they could scale the ascent. 4. And as we came to the city, their women were rolling stones down on us from the summit of the mountain on which the city stood[c]. 5. And having hidden Simeon and the others behind them, we seized the height, and utterly destroyed this city also."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The place names 'Chozeba,' 'Jobel,' and 'Shilom' are transliterations of the Greek forms in this witness; their identification is uncertain.
    reason: cultural_note
  - marker: b
    text: "The verb \u03c0\u03c1\u03bf\u03c3\u03b4\u03af\u03b4\u03c9\u03c3\u03b9 (v.3, 3rd sg. present) is syntactically anomalous in a first-person plural aorist narrative and may be a scribal compression. The translation renders the apparent tactical sense of the action without emending the text."
    reason: textual_variant
  - marker: c
    text: "The source has \u03c4\u1fc7 \u03c4\u1fc7 \u03c0\u03cc\u03bb\u03b5\u03b9 in v.4 — a dittography of the dative article, clearly a scribal slip; the translation reads a single \u03c4\u1fc7 \u03c0\u03cc\u03bb\u03b5\u03b9."
    reason: textual_variant
lexical_decisions:
- source_word: ὕδασι
  chosen: waters
  alternatives:
  - water
  - springs
  - streams
  lexicon: LSJ
  rationale: Plural dative naturally refers to a water-place or waters; 'waters' preserves the place-name construction and the elevated narrative tone better than the flatter 'water'.
- source_word: Χωζηβά
  chosen: Chozeba
  alternatives:
  - Cheziba
  - Khozeba
  lexicon: LSJ
  rationale: Transliterated as a place name in keeping with project policy to transliterate names rather than translate them.
- source_word: ἐφʼ ἡμᾶς εἰς πόλεμον
  chosen: came against us for war
  alternatives:
  - came upon us to make war
  - came against us in battle
  lexicon: LSJ
  rationale: Keeps the hostile motion of ἐφʼ ἡμᾶς and the explicit martial purpose of εἰς πόλεμον without over-expanding the clause.
- source_word: συνάψαντες
  chosen: joining battle
  alternatives:
  - engaging them
  - closing with them
  lexicon: LSJ
  rationale: In military context the participle denotes joining combat; 'joining battle' is idiomatic, elevated, and preserves the narrative force.
- source_word: ἐτρέψαμεν
  chosen: we put them to flight
  alternatives:
  - we routed them
  - we turned them back
  lexicon: LSJ
  rationale: The verb commonly means to turn or rout in battle; 'put them to flight' preserves the military sense with readable dignity.
- source_word: συμμάχους
  chosen: allies
  alternatives:
  - confederates
  - helpers
  lexicon: LSJ
  rationale: Standard military-political term; 'allies' is the clearest modern equivalent.
- source_word: ἀπεκτείναμεν
  chosen: we killed
  alternatives:
  - we slew
  lexicon: LSJ
  rationale: '''Killed'' is direct and readable modern English; ''slew'' would sound archaic beyond the project''s preferred register.'
- source_word: διέξοδον
  chosen: way of escape
  alternatives:
  - escape
  - outlet
  - passage out
  lexicon: LSJ
  rationale: The noun denotes an exit or means of getting out; 'way of escape' preserves the concrete force and fits the battle setting.
