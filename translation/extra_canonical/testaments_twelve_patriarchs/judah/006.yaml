translation:
  text: And when I was at the waters of Chozeba[a], those from Jobel came against us for battle. And joining battle, we put them to flight; and we killed those from Shilom, their allies[b], and gave them no way of escape.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The place names 'Chozeba,' 'Jobel,' and 'Shilom' are transliterations of the Greek forms in this witness; their identification is uncertain.
    reason: cultural_note
  - marker: b
    text: The Greek chapter text provided here is fragmentary; this draft translates the extant wording only.
    reason: textual_variant
lexical_decisions:
- source_word: ὕδασι
  chosen: waters
  alternatives:
  - water
  - springs
  - streams
  lexicon: LSJ
  rationale: Plural dative naturally refers to a water-place or waters; 'waters' preserves the place-name construction and the elevated narrative tone better than the flatter 'water'.
- source_word: Χωζηβά
  chosen: Chozeba
  alternatives:
  - Cheziba
  - Khozeba
  lexicon: LSJ
  rationale: Transliterated as a place name in keeping with project policy to transliterate names rather than translate them.
- source_word: ἐφʼ ἡμᾶς εἰς πόλεμον
  chosen: came against us for war
  alternatives:
  - came upon us to make war
  - came against us in battle
  lexicon: LSJ
  rationale: Keeps the hostile motion of ἐφʼ ἡμᾶς and the explicit martial purpose of εἰς πόλεμον without over-expanding the clause.
- source_word: συνάψαντες
  chosen: joining battle
  alternatives:
  - engaging them
  - closing with them
  lexicon: LSJ
  rationale: In military context the participle denotes joining combat; 'joining battle' is idiomatic, elevated, and preserves the narrative force.
- source_word: ἐτρέψαμεν
  chosen: we put them to flight
  alternatives:
  - we routed them
  - we turned them back
  lexicon: LSJ
  rationale: The verb commonly means to turn or rout in battle; 'put them to flight' preserves the military sense with readable dignity.
- source_word: συμμάχους
  chosen: allies
  alternatives:
  - confederates
  - helpers
  lexicon: LSJ
  rationale: Standard military-political term; 'allies' is the clearest modern equivalent.
- source_word: ἀπεκτείναμεν
  chosen: we killed
  alternatives:
  - we slew
  lexicon: LSJ
  rationale: '''Killed'' is direct and readable modern English; ''slew'' would sound archaic beyond the project''s preferred register.'
- source_word: διέξοδον
  chosen: way of escape
  alternatives:
  - escape
  - outlet
  - passage out
  lexicon: LSJ
  rationale: The noun denotes an exit or means of getting out; 'way of escape' preserves the concrete force and fits the battle setting.
