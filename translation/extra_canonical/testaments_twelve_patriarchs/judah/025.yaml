theological_decisions:
- issue: Resurrection of the patriarchs and the righteous
  chosen_reading: Translated the resurrection statements straightforwardly as future bodily rising/awakening.
  alternative_readings:
  - Metaphorical restoration of Israel
  - Later interpolated eschatological expansion
  rationale: The Greek witness speaks plainly of Abraham, Isaac, Jacob, and others rising to life and awakening to life. The translation preserves that claim without reduction, while textual questions are better handled in notes than in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Belial and final judgment
  chosen_reading: Rendered Belial as a personal evil figure whose deceitful spirit is cast into fire forever.
  alternative_readings:
  - Belial as an impersonal principle of wickedness
  - Variant reading with 'unclean spirits' cast into eternal judgment
  rationale: The base text names Belial and uses singular language for the spirit of deceit. This is retained in the main text, with the variant noted separately.
  doctrine_reference: Original-language primacy over translation tradition; preserve ambiguity in notes.
