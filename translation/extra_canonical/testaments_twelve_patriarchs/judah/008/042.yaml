  text: "*Καὶ ἔγνωκα ὅσα κακὰ ποιήσετε ἐν [ταῖς ἐσχάταις ἡμέραις]."
  language: Greek
  note: "Greek from Charles XVIII.1 (α). The project English's 'I have read in the books of Enoch the righteous' reflects the β-recension reading 'καίγε ἀνέγνων ἐν βίβλοις Ἐνὼχ τοῦ δικαίου' (Charles 1908 raw apparatus, p164 n.1); the α-text here has only 'Καὶ ἔγνωκα' ('And I have come to know'). The 'sons turning away from the Lord and committing every wickedness' is captured in α by 'ὅσα κακὰ ποιήσετε ἐν [ταῖς ἐσχάταις ἡμέραις]' (the bracketed clause is Charles' marked Christian interpolation, preserved per project policy). Project ch.8 is a thematic consolidation; sourced from Charles ch.XVIII."
translation:
  text: "And now I have commanded you these things, because I have read in the books of Enoch the righteous that your sons will turn away from the Lord, and will commit every wickedness and every affliction before the Lord."
