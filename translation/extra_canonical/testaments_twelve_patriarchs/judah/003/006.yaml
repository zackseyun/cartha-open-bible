translation:
  text: But I wrapped my garment around my arm and slung four stones at them; from
    behind and in front around the waist of one seated on a horse, I picked up a stone
    of sixty litras and hurled it, struck the horse, and killed it. And I fought King
    Nahor for about two hours, and after smashing the shield into pieces, I cut off
    his feet, and so I killed him.
