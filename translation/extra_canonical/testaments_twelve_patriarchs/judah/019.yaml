source:
  edition: Charles 1908 Greek Versions (Judah source-fix v2 — T12P Pass A; α-column primary, apparatus stripped)
  text: "XIX. Τέκνα μου, ἡ φιλαργυρία πρὸς¹ εἰδωλολατρίαν² ὁδηγεῖ³, ὅτι⁴ ἐν πλάνῃ ἀργυρίου τοὺς μὴ ὄντας θεοὺς⁵ ὀνομάζουσι, καὶ ποιεῖ τὸν ἔχοντα⁷ αὐτὴν εἰς ἔκστασιν ἐμπεσεῖν. 2. Διὰ τὸ ἀργύριον ἐγὼ¹⁰ τέκνα μου ἀπώλεσα τὰ τέκνα μου¹², καὶ εἰ μὴ ἡ¹³ μετάνοιά μου¹⁵ καὶ¹⁶ ἡ ταπείνωσίς μου¹⁷ καὶ¹⁷ ηὐχαι¹⁸ τοῦ πατρός μου συνεδράμον¹⁹, ἄτεκνος εἶχον ἀποθανεῖν. 3. Ἀλλ᾽ ὁ Θεὸς τῶν πατέρων μου²⁰ ἐλέησε με, ὅτι ἐν ἀγνωσίᾳ²¹ τοῦτο²² ἐποίησα. 4. Ἐτύφλωσε γάρ²⁴ με ὁ ἄρχων τῆς πλάνης²⁵, καὶ ἠγνόησα²⁶ ὡς ἄνθρωπος²⁷ καὶ ὡς σὰρξ²⁸ ἐν ἁμαρτίαις φθαρείς²⁹, καὶ³⁰ ἐπέγνων³¹ τὴν ἐμαυτοῦ ἀσθένειαν, νομίζων³² ἀκαταμάχητος εἶναι¹."
  language: Greek
  source_pages:
  - 164
  - 165
translation:
  text: My children[b][a], the love of money leads to idolatry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek clause is elliptical: literally, ''My children, the love of money toward idolatry.'' The translation supplies the implied moral force as ''leads to.'''
    reason: textual_variant
  - marker: b
    text: Alternatively, 'the love of money tends toward idolatry.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τέκνα μου
  chosen: My children
  alternatives:
  - My sons
  - Children of mine
  lexicon: LSJ
  rationale: Preserves the patriarch’s direct familial address in elevated but readable English. 'My children' fits testamentary exhortation without narrowing the audience more than the Greek requires.
- source_word: φιλαργυρία
  chosen: the love of money
  alternatives:
  - greed
  - avarice
  lexicon: BDAG
  rationale: The compound noun specifically denotes love of silver/money. 'The love of money' preserves the lexical force better than the more generalized 'greed,' and it resonates with moral-exhortation diction.
- source_word: πρὸς
  chosen: leads to
  alternatives:
  - toward
  - results in
  - tends toward
  lexicon: LSJ
  rationale: The bare phrase is elliptical in the surviving Greek. 'Leads to' makes the implied moral relation explicit in idiomatic English while staying close to the directional force of πρός.
- source_word: εἰδωλολατρείαν
  chosen: idolatry
  alternatives:
  - idol worship
  lexicon: BDAG
  rationale: '''Idolatry'' is the standard concise rendering and preserves the theological weight of the vice named.'
