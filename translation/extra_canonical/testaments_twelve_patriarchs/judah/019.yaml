translation:
  text: My children, the love of money leads to idolatry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek clause is elliptical: literally, ''My children, the love of money
      toward idolatry.'' The translation supplies the implied moral force as ''leads
      to.'''
    reason: textual_variant
  - marker: b
    text: Alternatively, 'the love of money tends toward idolatry.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τέκνα μου
  chosen: My children
  alternatives:
  - My sons
  - Children of mine
  lexicon: LSJ
  rationale: Preserves the patriarch’s direct familial address in elevated but readable
    English. 'My children' fits testamentary exhortation without narrowing the audience
    more than the Greek requires.
- source_word: φιλαργυρία
  chosen: the love of money
  alternatives:
  - greed
  - avarice
  lexicon: BDAG
  rationale: The compound noun specifically denotes love of silver/money. 'The love
    of money' preserves the lexical force better than the more generalized 'greed,'
    and it resonates with moral-exhortation diction.
- source_word: πρὸς
  chosen: leads to
  alternatives:
  - toward
  - results in
  - tends toward
  lexicon: LSJ
  rationale: The bare phrase is elliptical in the surviving Greek. 'Leads to' makes
    the implied moral relation explicit in idiomatic English while staying close to
    the directional force of πρός.
- source_word: εἰδωλολατρείαν
  chosen: idolatry
  alternatives:
  - idol worship
  lexicon: BDAG
  rationale: '''Idolatry'' is the standard concise rendering and preserves the theological
    weight of the vice named.'
