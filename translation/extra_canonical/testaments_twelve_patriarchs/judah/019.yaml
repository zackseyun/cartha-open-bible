theological_decisions:
- issue: Elliptical relation between 'love of money' and 'idolatry'
  chosen_reading: 'Render the clause as a moral assertion: ''the love of money leads
    to idolatry.'''
  alternative_readings:
  - '''the love of money is toward idolatry'''
  - '''the love of money is idolatry'''
  rationale: The Greek witness as given is compressed and lacks an explicit finite
    verb. Because πρός normally indicates direction rather than strict equation, 'leads
    to' best captures the likely paraenetic sense without overcommitting to identity.
    The stronger equation 'is idolatry' would require more than the extant wording
    plainly supplies.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
