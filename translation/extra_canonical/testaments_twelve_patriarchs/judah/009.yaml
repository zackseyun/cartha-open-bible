theological_decisions:
- issue: Historicity and internal narrative claim that Jacob killed Esau with a bow
  chosen_reading: Translated the Greek witness directly without harmonizing to Genesis.
  alternative_readings:
  - Treat as legendary expansion and soften the statement
  - Emend toward a less direct military defeat
  rationale: The project requires original-language primacy and transparency. This
    testamentary retelling differs from Genesis tradition, but the Greek plainly states
    Esau fell dead by Jacob's bow on Mount Seir. The translation preserves that claim
    and leaves historical/source-critical questions to notes.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy; transparency'
- issue: Textual uncertainty in the quantities of provisions, especially the oil line
  chosen_reading: Rendered the stable sense as parallel quantities of wheat, oil,
    and wine, with a note on the uncertain oil wording.
  alternative_readings:
  - Translate a more obscure phrase for the oil quantity more literally
  - Omit the corrupt segment
  rationale: The OCR/Greek line around the oil measure is textually disturbed, but
    the chapter's sense is clearly a tribute/provision list in parallel form. The
    main text reflects the recoverable sense, while the note flags the instability.
  doctrine_reference: 'DOCTRINE.md: preserve ambiguity/tension with notes rather than
    burying it'
