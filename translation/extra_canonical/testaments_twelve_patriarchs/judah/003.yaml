theological_decisions:
- issue: Textual instability in vv. 2–4 regarding the names and sequence of Judah's opponents
  chosen_reading: Translate the main narrative flow of the normalized Greek witness with Taphou and Achor, while noting variant names and duplicated combat material in footnotes.
  alternative_readings:
  - A variant names the giant or king as Chora/Nachor rather than Achor
  - Some witnesses duplicate or rearrange the horse-and-stone episode
  rationale: This chapter is primarily heroic narrative rather than doctrinal discourse, but textual transparency matters. The main text follows the supplied Greek layer without harmonizing the variants into a smoother story.
  doctrine_reference: 'PHILOSOPHY.md: translate the source text honestly and use notes rather than silently harmonizing.'
