translation:
  text: 'And now I command you[a], my children: do not love silver, nor set your gaze on the beauty of women; for I too, because of gold and beauty, was led astray to Besue the Canaanite woman.


    And I know that because of these two things my offspring will come to the destruction of sexual immorality. For they will even corrupt wise men from among my sons, and they will cause the kingdom of Judah to be diminished[b], which the Lord gave me because of my obedience to my father Jacob.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Besue is a transliterated personal name in the Greek witness; some readers may connect the figure with Judah's Canaanite entanglement in Genesis traditions.
    reason: cross_reference
  - marker: b
    text: The phrase 'the ruin of sexual immorality' reflects a compressed Greek construction; it may also be understood as 'destruction through sexual immorality.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐντέλλομαι
  chosen: I command
  alternatives:
  - I charge
  - I instruct
  lexicon: BDAG
  rationale: In testamentary exhortation the verb carries authoritative paternal charge, stronger than mere instruction.
- source_word: ἀγαπᾶν ἀργύριον
  chosen: love silver
  alternatives:
  - love money
  - love wealth
  lexicon: BDAG
  rationale: Keeps the concrete Greek noun while preserving the moral force of avarice; 'silver' also matches the paired material imagery with 'gold' in the next clause.
- source_word: ἐπιβλέψαι εἰς κάλλος γυναικῶν
  chosen: set your gaze on the beauty of women
  alternatives:
  - look upon the beauty of women
  - fix your eyes on women's beauty
  lexicon: LSJ
  rationale: The phrase implies more than a passing glance; 'set your gaze on' conveys deliberate, desirous looking without over-paraphrase.
- source_word: εὐμορφία
  chosen: beauty
  alternatives:
  - fair appearance
  - comeliness
  lexicon: LSJ
  rationale: Simple, elevated English that matches the moral warning against outward attractiveness.
- source_word: ἐπλανήθην
  chosen: was led astray
  alternatives:
  - went astray
  - was deceived
  lexicon: BDAG
  rationale: Passive nuance is preserved, fitting Judah's confession that desire diverted him.
- source_word: γένος μου
  chosen: my seed
  alternatives:
  - my race
  - my offspring
  - my line
  lexicon: LSJ
  rationale: '''My seed'' preserves the ancestral and dynastic register of testamentary speech better than the flatter ''offspring.'''
- source_word: ἀπώλειαν πορνείας
  chosen: the ruin of sexual immorality
  alternatives:
  - destruction through fornication
  - ruin by sexual sin
  lexicon: BDAG
  rationale: The genitive is somewhat compressed; this rendering preserves both the destructive result and the specific vice term without reducing πορνεία to a vague moral failure.
- source_word: ἀλλοιώσουσιν
  chosen: will corrupt
  alternatives:
  - will alter
  - will pervert
  lexicon: LSJ
  rationale: In context the sense is moral deterioration of wise men, not mere change.
- source_word: βασιλείαν Ἰούδα σμικρυνθῆναι ποιήσουσιν
  chosen: they will cause the kingdom of Judah to be diminished
  alternatives:
  - they will make the kingdom of Judah small
  - they will reduce the kingdom of Judah
  lexicon: LSJ
  rationale: Preserves the causative construction and the dynastic-political consequence of the vice.
- source_word: ὑπακοή
  chosen: obedience
  alternatives:
  - submission
  - heeding
  lexicon: BDAG
  rationale: Best captures the filial virtue Judah claims as the basis for the gift of kingship.
