translation:
  text: 1[a]. And on the next day we went to Areta, a city still mighty and strong, threatening us with death. 2. But I and Gad attacked from the east of the city, and Reuben and Levi from the west. 3. And those on the wall, thinking that we were alone[b], were drawn out toward us. 4. So my brothers secretly, from both sides of the wall, climbed it with stakes and entered the city without their knowing it. 5. And we took it by the edge of the sword, and those who had fled for refuge in the towers we burned with fire; and so we captured them all. 6. And as we were departing, men of Thapphoue fell upon our captives; and after handing them over to our sons, we joined battle with them as far as Thapphoue. 7. And we killed them also, and burned the city[c], and everything in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Verse 4 has textual variation. Some witnesses give a shorter form, simply saying that Judah's brothers entered the city from both sides of the wall; others more explicitly mention stakes or pegs used to scale it.
    reason: textual_variant
  - marker: b
    text: Verse 5 varies between 'those in the tower' and 'those who fled to the wall/towers.' The main text follows the sense that the defenders took refuge in fortified positions before being burned out.
    reason: textual_variant
  - marker: c
    text: Verse 6 reads Thapphoue in the main line here, but another witness gives Bathoue as the place-name.
    reason: textual_variant
lexical_decisions:
- source_word: κραταιὰν / ἰσχυράν
  chosen: mighty and strong
  alternatives:
  - powerful and strong
  - formidable
  lexicon: LSJ
  rationale: The paired adjectives are rhetorically emphatic and should remain doubled rather than collapsed into a single English term.
- source_word: ἀπειλοῦσαν ἡμῖν θάνατον
  chosen: threatening us with death
  alternatives:
  - menacing us with death
  - threatening death to us
  lexicon: LSJ
  rationale: This preserves the vivid participial construction and the hostile tone of the narrative.
- source_word: προσήξαμεν
  chosen: attacked
  alternatives:
  - advanced
  - drew near
  lexicon: LSJ
  rationale: In military context the verb implies moving against the city in assault, not mere approach.
- source_word: νομίσαντες
  chosen: thinking
  alternatives:
  - supposing
  - assuming
  lexicon: LSJ
  rationale: A straightforward rendering that preserves the causal force of the participle.
- source_word: ἐφελκύσθησαν
  chosen: were drawn out
  alternatives:
  - were lured out
  - were pulled toward us
  lexicon: LSJ
  rationale: The sense is tactical movement from the wall toward Judah's group; 'drawn out' fits the military stratagem without over-paraphrase.
- source_word: λάθρα
  chosen: secretly
  alternatives:
  - stealthily
  - by stealth
  lexicon: LSJ
  rationale: Keeps the covert action explicit and readable.
- source_word: πασσάλοις ... τῷ τείχει
  chosen: climbed it with stakes
  alternatives:
  - mounted the wall by means of stakes
  - scaled the wall with pegs
  lexicon: LSJ
  rationale: The Greek suggests using stakes or pegs to ascend the wall; 'climbed it with stakes' is concise while preserving the unusual detail.
- source_word: ἐν στόματι μαχαίρας
  chosen: by the edge of the sword
  alternatives:
  - with the sword's mouth
  - with the sword
  lexicon: LSJ
  rationale: This is the established idiomatic equivalent for the Greek expression and preserves its martial force.
- source_word: καταφυγόντας
  chosen: had fled for refuge
  alternatives:
  - had taken refuge
  - had escaped
  lexicon: LSJ
  rationale: The compound verb includes the notion of seeking refuge, not merely fleeing.
- source_word: ἐνεπρήσαμεν
  chosen: we burned with fire
  alternatives:
  - we set on fire
  - we burned
  lexicon: LSJ
  rationale: The phrase is forceful and repetitive in Greek; retaining 'with fire' preserves the narrative intensity.
- source_word: αἰχμαλωσία
  chosen: captives
  alternatives:
  - captivity
  - prisoners of war
  lexicon: LSJ
  rationale: In this context the reference is to persons seized in war, so 'captives' is more natural than the abstract 'captivity.'
- source_word: συνήψαμεν
  chosen: we joined battle
  alternatives:
  - we engaged
  - we fought
  lexicon: LSJ
  rationale: This military idiom is more precise than the generic 'fought' and suits the elevated narrative style.
- source_word: ἕως Θαφφουέ
  chosen: as far as Thapphoue
  alternatives:
  - up to Thapphoue
  lexicon: LSJ
  rationale: The preposition marks the extent of the pursuit or engagement.
