theological_decisions:
- issue: Textual form of verse 4 regarding entry into the city
  chosen_reading: Translated the reading in which Judah's brothers secretly climbed the wall with stakes and entered the city without the defenders' knowledge.
  alternative_readings:
  - 'A shorter reading: ''my brothers from both sides of the wall entered the city'''
  - A variant emphasizing driving stakes into the wall before entering
  rationale: The witnesses reflected in the apparatus differ in detail, but all point to a stealth entry from both sides. The chosen rendering preserves the fuller tactical description without overcommitting to every variant form.
  doctrine_reference: Preserve textual complexity with notes rather than harmonizing.
- issue: Verse 6 place-name and action against the captives
  chosen_reading: Rendered the main Greek line with 'men of Thapphoue fell upon our captives.'
  alternative_readings:
  - A variant names Bathoue
  - A variant says they 'seized' the captivity rather than 'fell upon' it
  rationale: The normalized Greek text presented for this chapter favors Θαφφουέ/Thapphoue and an assault on the captives. The translation keeps the action concrete while noting the variant place-name.
  doctrine_reference: Original-language primacy with transparent handling of variants.
