translation:
  text: 'Until the coming of the God of righteousness, to give Jacob rest in peace,
    and all the nations. And he will preserve the might of my kingdom forever; for
    the Lord swore to me with an oath not to blot out the kingdom.


    Great indeed is my grief, my children, because of the acts of sexual immorality
    and sorceries that you will practice in the kingdom, following ventriloquists
    and omens and demons of deception. You will make your daughters musicians and
    public women, and you will mingle in the abominations of the nations. Because
    of these things the Lord will bring upon you famine and pestilence, death and
    a sword of vengeance, siege, and the reproaches of enemies and friends. By foreigners
    my kingdom will be brought to its end.'
  philosophy: optimal-equivalence
