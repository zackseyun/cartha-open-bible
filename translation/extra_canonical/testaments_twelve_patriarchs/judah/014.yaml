id: T12P.JUD.14
reference: Testament of Judah 14
source:
  edition: Charles 1908 Greek Versions (Judah source-fix v2 — T12P Pass A; α-column primary, apparatus stripped)
  text: "XIV. Καὶ νῦν λέγω¹ ὑμῖν, τέκνα μου, μὴ μεθύσκεσθε² οἴνῳ, ὅτι³ ὁ οἶνος διαστρέφει⁴ τὸν νοῦν ἀπὸ τῆς ἀληθείας καὶ ἐμβάλλει ὀργὴν ἐπιθυμίας, καὶ ὁδηγεῖ εἰς πλάνην⁷ τοὺς ὀφθαλμούς⁸. 2. Τὸ γὰρ πνεῦμα⁹ τῆς πορνείας τὸν οἶνον ὡς¹¹ διάκονον ἔχει πρὸς τὴν ἡδονὴν¹² τοῦ νοός. ὅτι καίγε τὰ δύο ταῦτα ἀφιστῶσι τὴν διάνοιαν¹⁵ τοῦ ἀνθρώπου. 3. Ἐὰν γὰρ πίῃ τις οἶνον εἰς μέθην, ἐν διαλογισμοῖς ῥυπαροῖς συνταράσσει¹⁷ τὸν νοῦν σου¹⁸, καὶ εἰς πορνείαν ἐκθερμαίνει²⁰ τὸ σῶμα πρὸς ἡδονήν, καὶ²¹ πράσσει τὴν ἁμαρτίαν²² καὶ οὐκ αἰσχύνεται. 4. Τοιοῦτός²³ ἐστιν ὁ πάροινος²⁴, τέκνα μου, ὅτι ὁ μεθύων²⁵ οὐκ αἰδεῖται οὐδένα²⁷. 5. *Ἰδοὺ γὰρ κἀμὲ ἐπλάνησεν²⁹ μὴ αἰσχυνθῆναι τὸ πλῆθος³⁰ πόλεως⁴⁹ ὅτι ἐν⁵¹ ὀφθαλμῶν πάντων ἐξέκλινα πρὸς τὴν Θαμὰρ, καὶ ἐποίησα ἁμαρτίαν³² μεγάλην³³, καὶ ἀνεκάλυψα τὸ κάλυμμα ἀκαθαρσίας υἱῶν μου³⁴. 6. Πιὼν³⁵ τὸν οἶνον³⁶ οὐκ ᾐσχύνθην³⁷ τὴν³⁸ ἐντολὴν τοῦ Θεοῦ, καὶ ἔλαβον γυναῖκα Χαναναίαν³⁹. 7. Πολλὴ⁴⁰ γὰρ⁴¹ τῷ πίνοντι οἶνον⁴², τέκνα μου⁴³, καὶ αὕτη ἐστὶν ἡ σύνεσις⁴⁴ τῆς οἰνοποσίας, *ἕως ὅτε ἔχει αἰδῶ⁴⁵, πίνει. 8. Ἐὰν δὲ παρέλθῃ⁴⁶ τὸν ὅρον, ἐμβάλλει⁴⁸ εἰς⁴⁹ τὸν νοῦν αὐτοῦ⁵⁰ τὸ πνεῦμα τῆς πλάνης, καὶ ποιεῖ τὸν μέθυσον αἰσχρορρημονεῖν⁵¹ καὶ παρανομεῖν καὶ μὴ αἰσχύνεσθαι ἀλλὰ καυχᾶσθαι⁵³ τῇ ἀτιμίᾳ⁵⁴ καὶ νομίζειν εἶναι καλόν⁵⁵."
  language: Greek
  source_pages:
  - 157
  - 158
  - 159
translation:
  text: 'These two things turn away a man''s mind[a]. For if you drink wine to drunkenness, it throws your mind into turmoil with filthy thoughts, and heats your body toward pleasure for sexual immorality, and it commits sin and is not ashamed.


    Such is the wine-drinker, my children, because the one who gets drunk has regard for no one. For see, it also led me astray, so that I was not ashamed before the multitude of the city. In the sight of all I turned aside to Tamar, and I committed a great sin, and I uncovered the covering of uncleanness of my sons.


    After drinking wine, I was not ashamed of the commandment of God, and I took a Canaanite woman. For the one who drinks wine, my children, has need of much understanding, and this is the understanding for drinking wine: as long as he still has shame, let him drink. But if he goes on until he passes the limit, a spirit of deception enters into his mind and makes the drunkard speak shamefully and act lawlessly and feel no shame[c][b], but even boast in his dishonor and think it good.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I exposed the shameful covering of my sons.' The Greek phrase is difficult and may refer to bringing family uncleanness into the open through Judah's sin with Tamar.
    reason: lexical_alternative
  - marker: b
    text: The wording 'as long as he still has shame, let him drink' presents moderation in terms of retained self-restraint; the point is that once shame is lost, drunkenness has overtaken him.
    reason: cultural_note
  - marker: c
    text: Or 'a spirit of error enters his mind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διάνοια
  chosen: understanding
  alternatives:
  - mind
  - thought
  lexicon: LSJ
  rationale: In this paraenetic context the term refers to moral-intellectual discernment rather than mere cognition; 'understanding' fits the warning tone.
- source_word: συνταράσσει
  chosen: throws ... into turmoil
  alternatives:
  - disturbs
  - agitates
  lexicon: LSJ
  rationale: The compound verb is vivid and forceful; 'throws into turmoil' preserves the destabilizing effect of drunkenness on the mind.
- source_word: εἰς πορνείαν
  chosen: for sexual immorality
  alternatives:
  - into fornication
  - toward sexual sin
  lexicon: BDAG
  rationale: '''Sexual immorality'' is readable modern English and preserves the vice-term''s moral force without archaic phrasing.'
- source_word: πάροινος
  chosen: wine-drinker
  alternatives:
  - drunkard
  - one given to wine
  lexicon: LSJ
  rationale: The noun denotes one characterized by wine; 'wine-drinker' keeps the habitual sense, while 'drunkard' is reserved where the Greek explicitly has μεθύων or μέθυσος.
- source_word: οὐκ αἰδεῖται οὐδένα
  chosen: has regard for no one
  alternatives:
  - respects no one
  - is ashamed before no one
  lexicon: LSJ
  rationale: The idiom points to loss of social and moral restraint; 'has regard for no one' captures the broader sense better than a narrow shame gloss.
- source_word: ἐπλάνησεν
  chosen: led me astray
  alternatives:
  - deceived me
  - caused me to wander
  lexicon: BDAG
  rationale: The verb is moral as well as cognitive; 'led me astray' suits Judah's confessional tone.
- source_word: ἐξέκλινα
  chosen: turned aside
  alternatives:
  - deviated
  - inclined
  lexicon: LSJ
  rationale: This preserves the moral sense of deviation and echoes biblical language of turning aside into sin.
- source_word: ἁμαρτίαν μεγάλην
  chosen: a great sin
  alternatives:
  - a grave sin
  lexicon: BDAG
  rationale: A straightforward rendering that preserves Judah's self-accusation.
- source_word: ἀνεκάλυψα κάλυμμα ἀκαθαρσίας υἱῶν μου
  chosen: I uncovered the covering of uncleanness of my sons
  alternatives:
  - I exposed the shameful covering of my sons
  - I uncovered my sons' uncleanness
  lexicon: LSJ
  rationale: The phrase is difficult and metaphorical. The chosen rendering stays close to the Greek and preserves the image rather than over-interpreting it.
- source_word: ἐντολή
  chosen: commandment
  alternatives:
  - command
  lexicon: BDAG
  rationale: '''Commandment of God'' preserves the elevated moral register of testamentary exhortation.'
- source_word: συνέσεως ... πολλῆς
  chosen: much understanding
  alternatives:
  - great discernment
  - considerable prudence
  lexicon: LSJ
  rationale: The phrase stresses the self-restraint required in drinking; 'understanding' keeps continuity with διάνοια earlier in the chapter.
- source_word: αἰδώς
  chosen: shame
  alternatives:
  - modesty
  - sense of shame
  lexicon: LSJ
  rationale: The chapter repeatedly turns on loss of shame under intoxication; the simple term keeps the repetition audible.
- source_word: ὅρος
  chosen: limit
  alternatives:
  - measure
  - boundary
  lexicon: LSJ
  rationale: The context is drinking within bounds; 'limit' is clear and idiomatic.
- source_word: πνεῦμα τῆς πλάνης
  chosen: a spirit of deception
  alternatives:
  - a spirit of error
  - the spirit of delusion
  lexicon: BDAG
  rationale: The phrase likely personifies moral delusion; 'deception' communicates the misleading power without over-systematizing demonology.
- source_word: αἰσχρορημονεῖν
  chosen: speak shamelessly
  alternatives:
  - utter obscenities
  - talk disgracefully
  lexicon: LSJ
  rationale: The rare verb denotes disgraceful or foul speech; 'speak shamelessly' fits the chapter's repeated shame vocabulary.
- source_word: παρανομεῖν
  chosen: act lawlessly
  alternatives:
  - transgress
  - behave unlawfully
  lexicon: BDAG
  rationale: The verb is active and ethical; 'act lawlessly' preserves the vice-catalogue rhythm.
- source_word: καυχᾶσθαι ... ἀτιμίᾳ
  chosen: boast in his dishonor
  alternatives:
  - glory in his shame
  - take pride in disgrace
  lexicon: BDAG
  rationale: The Greek paradox is morally sharp; 'boast in his dishonor' preserves the inversion.
