theological_decisions:
- issue: How strongly to personify πνεῦμα τῆς πλάνης
  chosen_reading: Translated as 'a spirit of deception' in the main text.
  alternative_readings:
  - '''the spirit of error'' as a more definite hostile power'
  - '''delusion enters his mind'' as a less personified rendering'
  rationale: The Greek explicitly has πνεῦμα, so the translation retains personification while avoiding speculative elaboration beyond the text.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve it
- issue: Interpretation of Judah's confession regarding Tamar and his sons
  chosen_reading: 'Rendered the difficult clause closely: ''I uncovered the covering of uncleanness of my sons.'''
  alternative_readings:
  - A more interpretive rendering referring to family shame
  - A euphemistic rendering referring to sexual exposure
  rationale: The Greek is metaphorical and somewhat opaque. A close rendering is more transparent and auditable than resolving the image in translation.
  doctrine_reference: PHILOSOPHY.md §transparent lexical decisions
