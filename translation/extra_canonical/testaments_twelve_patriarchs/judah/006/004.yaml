translation:
  text: And as we came to the city[a], their women were rolling stones down on us from the summit of the mountain on which the city stood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The source has τῇ τῇ πόλει — a dittography of the dative article, clearly a scribal slip. The translation reads a single τῇ πόλει, 'to the city.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐκύλιον
  chosen: were rolling
  alternatives:
  - rolled
  - kept rolling
  lexicon: LSJ
  rationale: The imperfect ἐκύλιον denotes repeated or ongoing action. 'Were rolling' captures the continuous, deliberate character of the defensive barrage as the attackers approached.
- source_word: λίθους ἐφἽ ἡμᾶς
  chosen: stones down on us
  alternatives:
  - stones upon us
  - rocks against us
  lexicon: LSJ
  rationale: λίθος is stone; ἐφί + accusative marks hostile direction. 'Down on us' captures both the topographical situation (rolling from the summit) and the hostile motion, which the bare 'upon us' does not fully convey.
- source_word: κορυφ὆ς τοῦ ὄρους
  chosen: summit of the mountain
  alternatives:
  - top of the mountain
  - crest of the hill
  lexicon: LSJ
  rationale: κορυφή denotes the peak or topmost point; ὄρος is mountain or hill. 'Summit of the mountain' preserves the elevated, commanding position from which the women operated.
- source_word: ἐν ῇ ἦν ἡ πόλις
  chosen: on which the city stood
  alternatives:
  - where the city was
  - upon which was the city
  lexicon: LSJ
  rationale: The relative clause ἐν ῇ ἦν ἡ πόλις identifies the mountain as the site of the city. 'On which the city stood' is natural English and conveys the fortified hilltop setting.
