id: T12P.JUDAH.6.4
reference: Testament of Judah 6:4
unit: verse
book: Testament of Judah
collection: Testaments of the Twelve Patriarchs
source:
  edition: Charles 1908 Greek Versions (pages 144-145, Judah source-fix v2 — T12P Pass A; α-column primary, apparatus stripped)
  text: '*Ὡς δὲ ἤκομεν²¹ τῇ²² τῇ πόλει²³, αἱ γυναῖκες αὐτῶν ἐκύλιον *λίθους ἐφἽ ἡμᾶς²⁴ ἀπὸ τ὆ς κορυφ὆ς τοῦ ὄρους ἐν ῇ²⁵ *ἦν ἡ πόλις²⁶.'
  language: Greek
  source_pages:
  - 144
