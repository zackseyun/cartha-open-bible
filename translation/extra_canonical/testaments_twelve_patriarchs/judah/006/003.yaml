  text: "*\u039f\u1f31 \u03b4\u1f72 \u03c0\u03ac\u03bb\u03b9\u03bd\u00b9\u00b9 \u1f00\u03c0\u1f78\u00b9\u00b2 \u039c\u03b1\u03c7\u03af\u03c1\u00b9\u00b3 \u1f10\u03c0\u1f26\u03bb\u03b8\u03bf\u03bd\u00b9\u2074 \u1f21\u03bc\u1ff6\u03bd \u03c4\u1fc7 \u03c0\u03ad\u03bc\u03c0\u03c4\u1fc3 \u1f21\u03bc\u03ad\u03c1\u1fb3, \u03ba\u03b1\u1f76\u00b9\u2075 \u03c0\u03c1\u03bf\u03c3\u03b4\u03af\u03b4\u03c9\u03c3\u03b9 \u03c0\u03c1\u1f78\u03c2 \u03b1\u1f50\u03c4\u03bf\u1f7a\u03c2\u00b9\u2076 *\u1f10\u03bd \u03ba\u03c1\u03b1\u03c4\u03b1\u03b9\u1fb7 \u03bc\u03b1\u03c7\u03b1\u03af\u03c1\u1fb3\u00b9\u2077 \u03c0\u03b5\u03c1\u03b9\u03b3\u03b9\u03bd\u03cc\u03bc\u03b5\u03b8\u03b1 \u03b1\u1f50\u03c4\u1ff6\u03bd\u00b9\u2078 \u03ba\u03b1\u1f76 \u1f00\u03c0\u03b5\u03ba\u03c4\u03b5\u03af\u03bd\u03b1\u03bc\u03b5\u03bd\u00b9\u2079 *\u03c0\u03c1\u1f78 \u03c4\u03bf\u1fe6 \u1f00\u03bd\u03b1\u03b2\u1f06\u03bd\u03b1\u03b9 \u03c4\u1f74\u03bd \u1f00\u03bd\u03ac\u03b2\u03b1\u03c3\u03b9\u03bd\u00b2\u2070."
  language: Greek
