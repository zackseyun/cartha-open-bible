id: T12P.JUDAH.6.3
reference: Testament of Judah 6:3
unit: verse
book: Testament of Judah
collection: Testaments of the Twelve Patriarchs
source:
  edition: Charles 1908 Greek Versions (pages 144-145, Judah source-fix v2 — T12P Pass A; α-column primary, apparatus stripped)
  text: '*Οἱ δὲ πάλιν¹¹ ἀπὸ¹² Μαχίρ¹³ ἐπἦλθον¹⁴ ἡμῶν τῇ πέμπτῃ ἡμέρᾳ, καὶ¹⁵ προσδίδωσι πρὸς αὐτοὺς¹⁶ *ἐν κραταιᾷ μαχαίρᾳ¹⁷ περιγινόμεθα αὐτῶν¹⁸ καὶ ἀπεκτείναμεν¹⁹ *πρὸ τοῦ ἀναβἆναι τὴν ἀνάβασιν²⁰.'
  language: Greek
  source_pages:
  - 144
  - 145
translation:
  text: But those from Machir attacked us again on the fifth day; and charging at them with a mighty sword[a], we prevailed over them and killed them before they could scale the ascent[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verb προσδίδωσι (3rd sg. present) is syntactically anomalous in context — a sudden shift to singular present in a first-person plural aorist narrative. It may be a scribal compression or corruption for a participial phrase meaning 'committing [himself] against them.' The translation renders the apparent sense of the action (an aggressive engagement against the enemy) without emending the text.
    reason: textual_variant
  - marker: b
    text: τὴν ἀνάβασιν is a cognate accusative with ἀναβἆναι — literally 'before ascending the ascent.' The phrase denotes a slope, pass, or fortified approach the enemy was trying to reach or climb. 'Scale the ascent' preserves the directional and tactical sense.
    reason: lexical_note
lexical_decisions:
- source_word: ἐπἦλθον ἡμῶν
  chosen: attacked us
  alternatives:
  - came against us
  - assaulted us
  lexicon: LSJ
  rationale: ἐπέρχομαι with a genitive of person denotes hostile approach — attacking or coming upon someone. 'Attacked us' captures the aggressive force more directly than 'came against us,' which could be neutral.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: LSJ
  rationale: The adverb marks a renewed assault. 'Again' is the most economical and natural English equivalent.
- source_word: ἐν κραταιᾷ μαχαίρᾳ
  chosen: with a mighty sword
  alternatives:
  - with the powerful sword
  - by the strong sword
  lexicon: LSJ
  rationale: κραταιός means strong, mighty, powerful; μάχαιρα is sword. The instrumental ἐν marks the means of combat. 'With a mighty sword' preserves the martial elevation of the phrase.
- source_word: περιγινόμεθα αὐτῶν
  chosen: we prevailed over them
  alternatives:
  - we overcame them
  - we got the upper hand over them
  lexicon: LSJ
  rationale: περιγίγνομαι with a genitive regularly means to get the upper hand, to prevail over. 'We prevailed over them' is precise and fits the elevated military register.
- source_word: ἀναβἆναι τὴν ἀνάβασιν
  chosen: scale the ascent
  alternatives:
  - climb the slope
  - ascend the pass
  lexicon: LSJ
  rationale: The cognate accusative construction (ἀναβἆναι ἀνάβασιν) is a rhetorical intensification. 'Scale the ascent' preserves both terms while being natural military English.
