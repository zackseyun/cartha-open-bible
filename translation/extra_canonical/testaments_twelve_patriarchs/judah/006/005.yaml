id: T12P.JUDAH.6.5
reference: Testament of Judah 6:5
unit: verse
book: Testament of Judah
collection: Testaments of the Twelve Patriarchs
source:
  edition: Charles 1908 Greek Versions (pages 144-145, Judah source-fix v2 — T12P Pass A; α-column primary, apparatus stripped)
  text: Kαὶ ὑποκρύψας²⁷ τὸν τε καὶ Συμεὼν²⁸ ἐξωπίσθεν²⁹ ἐπελαβόμεθα³⁰ τοῦ ὑψηλοῦ, καὶ *ἐξωλοθρεύσαμεν καὶ ταύτην τὴν πόλιν³⁰.
  language: Greek
  source_pages:
  - 144
  - 145
translation:
  text: And having hidden Simeon and the others[a] behind them[b], we seized the height, and utterly destroyed this city also.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: τὸν τε καὶ Συμεὼν — literally 'Simeon and also [the others]' or 'the one together with Simeon.' The τε ... καί correlative pairs Simeon with another person or group not explicitly named. The translation renders this as 'Simeon and the others' to convey that Judah concealed a flanking force rather than only one individual.
    reason: lexical_note
  - marker: b
    text: 'ἐξωπίσθεν — a rare adverb meaning ''from the rear'' or ''from behind.'' It indicates a classic flanking maneuver: Simeon and the concealed force attacked from the back while the defenders'' attention was on the stone-rolling front.'
    reason: cultural_note
lexical_decisions:
- source_word: ὑποκρύψας
  chosen: having hidden
  alternatives:
  - having concealed
  - having placed in hiding
  lexicon: LSJ
  rationale: ὑποκρύπτω means to hide or conceal beneath or behind something. 'Having hidden' is the most natural and economical English aorist participle rendering and conveys deliberate concealment as a tactical act.
- source_word: ἐξωπίσθεν
  chosen: behind them
  alternatives:
  - from the rear
  - at their backs
  lexicon: LSJ
  rationale: The adverb denotes position or movement from behind. 'Behind them' (behind the enemy) conveys the flanking position clearly and economically.
- source_word: ἐπελαβόμεθα τοῦ ὑψηλοῦ
  chosen: we seized the height
  alternatives:
  - we took hold of the high ground
  - we captured the summit
  lexicon: LSJ
  rationale: ἐπιλαμβάνομαι with a genitive means to take hold of, seize. ὑψηλός used as a substantive with the article means the height or high ground. 'Seized the height' is military idiom that exactly fits both terms and matches the tactical situation.
- source_word: ἐξωλοθρεύσαμεν
  chosen: utterly destroyed
  alternatives:
  - completely wiped out
  - annihilated
  lexicon: LSJ
  rationale: ἐξολοθρεύω is an intensive compound of ὀλοθρεύω (to destroy utterly). The same verb is used of this same action at Testament of Judah 7:3 (ἐξωλοθρεύσαμεν). 'Utterly destroyed' preserves the intensifying prefix and maintains consistency with that adjacent occurrence.
- source_word: καὶ ταύτην τὴν πόλιν
  chosen: this city also
  alternatives:
  - this city as well
  - even this city
  lexicon: LSJ
  rationale: The καί ... καί structure ('and ... also') marks this city as one in a series of captured cities — a deliberate additive emphasis Judah uses to catalog his military exploits. 'Also' preserves that accumulative force.
