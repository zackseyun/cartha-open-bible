translation:
  text: '1. And on the next day it was reported to us that the king of the city of
    Gaas was coming against us with a great multitude.


    2. So Dan and I, pretending to be Amorites as though allies, entered their city.


    3. And in the deep night, when our brothers came, we opened the gates to them,
    and we destroyed all of them and all that was theirs; and after plundering everything
    that belonged to them, we tore down their three walls.


    4. And we drew near to Thamna, where all their baggage was.


    5. Then, being insulted by them, I became angry, and I rushed up against them
    to the summit. And they kept hurling stones and shooting arrows at me.


    6. And if Dan my brother had not fought alongside me,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek witness supplied for this chapter begins here in mid-narrative
      and breaks off in the middle of verse 6. The translation therefore preserves
      the chapter as extant in the provided text rather than reconstructing missing
      material.
    reason: textual_variant
  - marker: b
    text: 'Some witness details in the source apparatus vary between ''Gad and I''
      and ''Dan and I'' in the infiltration scene. This draft follows the reading
      reflected in the main Greek line used here: ''Dan and I.'''
    reason: alternative_reading
lexical_decisions:
- source_word: προσποιησάμενοι
  chosen: pretending to be
  alternatives:
  - feigning
  - making ourselves appear as
  lexicon: LSJ
  rationale: The participle indicates deliberate pretense or assumed identity in a
    military ruse. 'Pretending to be' is clear modern English while preserving the
    deceptive action.
- source_word: σύμμαχοι
  chosen: allies
  alternatives:
  - confederates
  - companions in war
  lexicon: LSJ
  rationale: In this context the sense is military-political alliance. 'Allies' is
    concise and idiomatic without losing the strategic nuance.
- source_word: Νυκτὶ δὲ βαθείᾳ
  chosen: in the deep night
  alternatives:
  - late at night
  - in the dead of night
  lexicon: LSJ
  rationale: The phrase is vivid and elevated. 'In the deep night' preserves the literary
    texture and solemn narrative tone better than a flatter idiom.
- source_word: ὀλοθρεύσαμεν
  chosen: we destroyed
  alternatives:
  - we wiped out
  - we annihilated
  lexicon: LSJ
  rationale: The verb is strong and totalizing. 'Destroyed' preserves severity without
    importing overly colloquial force; the context already makes the lethal sense
    clear.
- source_word: προνομεύσαντες
  chosen: after plundering
  alternatives:
  - having taken spoil
  - after sacking
  lexicon: LSJ
  rationale: The participle refers to taking spoil after victory. 'After plundering'
    is direct and historically appropriate.
- source_word: ἀποσκευή
  chosen: baggage
  alternatives:
  - supplies
  - equipment
  - property
  lexicon: LSJ
  rationale: The term commonly denotes baggage or equipment carried with an army.
    'Baggage' best fits the military setting here.
- source_word: ὑβριζόμενος
  chosen: being insulted
  alternatives:
  - being treated outrageously
  - being abused
  lexicon: LSJ
  rationale: The verb can imply insolent mistreatment. Because the immediate narrative
    is taunting that provokes wrath, 'being insulted' captures the affront without
    overextending beyond the surviving text.
- source_word: ὠργίσθην
  chosen: I became angry
  alternatives:
  - I was enraged
  - I grew wrathful
  lexicon: LSJ
  rationale: This keeps the first-person confessional tone and preserves the vice-theme
    of wrath that is important in Judah's testament.
- source_word: ὥρμησα
  chosen: I rushed up against
  alternatives:
  - I charged
  - I sprang upon
  lexicon: LSJ
  rationale: The verb conveys impetuous assault. 'Rushed up against' preserves both
    motion and rashness.
- source_word: κορυφήν
  chosen: summit
  alternatives:
  - height
  - crest
  lexicon: LSJ
  rationale: Given the elevated position from which missiles are thrown, 'summit'
    fits the topographical sense well.
- source_word: ἐσφενδόνιζόν
  chosen: kept hurling
  alternatives:
  - were slinging
  - kept pelting
  lexicon: LSJ
  rationale: The imperfect suggests repeated action. 'Kept hurling' preserves the
    ongoing attack.
- source_word: συνεμάχησεν
  chosen: fought alongside
  alternatives:
  - came to my aid in battle
  - joined battle with me
  lexicon: LSJ
  rationale: The compound verb stresses joint combat. 'Fought alongside' is natural
    English and preserves the brotherly military support.
