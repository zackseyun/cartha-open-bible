translation:
  text: He does not envy in his deliberations, nor does malicious envy consume his
    soul, nor is there distraction in greed in his mind. But he walks in simplicity
    of soul; he sees everything with uprightness of heart, not accepting evil eyes
    from the world’s error, so that he may not see the commandments of the Lord as
    distorted.
