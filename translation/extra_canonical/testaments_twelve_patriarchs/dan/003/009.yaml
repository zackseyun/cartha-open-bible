translation:
  text: 'Therefore the one who is angry, if he is strong in body, has the power of
    anger in his soul threefold: one from the help of attendants, by which he justifies
    the deed; a second through wealth, persuading and prevailing unjustly; and a third,
    having natural strength, by it he does evil.'
