theological_decisions:
- issue: Reconstructed sense of vv. 7–8 in a textually difficult section
  chosen_reading: 'Translated as a dual investiture: Levi receives the priesthood
    and Judah the kingdom, followed by a warning not to exalt oneself against these
    two.'
  alternative_readings:
  - A more fragmentary rendering leaving the syntax unresolved
  - A reading that more explicitly predicts future rulers without naming priesthood/kingdom
  rationale: The OCR-normalized Greek is damaged in this section, but the surviving
    cues ('Levi,' 'Judah,' and the surrounding exhortation to honor Levi and his seed)
    support the traditional sense of priestly and royal prerogatives. The translation
    stays concise and marks the uncertainty in a footnote rather than overconfidently
    expanding.
  doctrine_reference: Preserve theological tension rather than resolve it; translate
    honestly and note complexity.
- issue: Messianic/royal force of vv. 11–12
  chosen_reading: Rendered the Greek witness straightforwardly, including 'bow down
    to his seed' and 'among you there will be an everlasting king,' without harmonizing
    to later Christian formulas.
  alternative_readings:
  - Interpret 'his seed' narrowly as Levi's priestly line
  - Interpret the everlasting king explicitly as a messianic figure from Judah
  rationale: The chapter juxtaposes Levi and Judah and may reflect layered tradition.
    The English preserves the ambiguity of lineage and royal expectation rather than
    forcing a single confessional resolution.
  doctrine_reference: Preserve theological tension rather than resolve it.
