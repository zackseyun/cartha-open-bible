translation:
  text: '1. Guard yourselves, therefore, from sexual immorality, and be keeping your
    mind pure. Guard also your senses from every woman. 2. And command the women likewise
    not to associate closely with men, so that they too may keep their minds pure.
    3. For constant encounters, even if the ungodly act is not carried out, are nevertheless
    for them an incurable disease, and for us a ruinous disgrace of Beliar and an
    everlasting reproach. 4. For sexual immorality has within itself neither understanding
    nor reverence for God, and every jealousy dwells in its desire. 5. Therefore I
    say to you: you will be jealous of the sons of Levi, and you will seek to exalt
    yourselves above them, but you will not prevail because of this. 6. For God will
    execute their vengeance, but you will die an evil death. 7. For to Levi God gave
    the priesthood, and to Judah with him the kingdom. 8. And do not be lifted up
    against these two, from whom the Lord will bring to completion what is to be spoken.
    9. I adjure you by the God of heaven, that each of you practice truth toward his
    neighbor and that each have love toward his brother. 10. And draw near to Levi
    in humility of heart, so that you may receive a blessing from his mouth. 11. For
    he will bless Israel and Judah, because in him the Lord chose to reign before
    all the people. 12. And bow down to his seed, because for your sake it will die
    in visible and invisible wars, and among you there will be an everlasting king.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Verses 7–8 are textually difficult in the present Greek witness. The translation
      reflects the probable sense that Levi is given priesthood and Judah kingship,
      with a warning not to oppose either line.
    reason: textual_variant
  - marker: b
    text: '''Beliar'' follows the Greek form of the name here; some readers may know
      the form ''Belial.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'do truth' toward his neighbor — an idiom for acting with truthfulness
      and faithfulness, not merely speaking true words.
    reason: lexical_alternative
  - marker: d
    text: '''Bow down to his seed'' can denote homage to a descendant line rather
      than divine worship.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φυλάξατε
  chosen: Guard yourselves
  alternatives:
  - keep yourselves
  - beware
  lexicon: LSJ
  rationale: Imperatival force is strong and paraenetic; 'guard yourselves' preserves
    both vigilance and personal responsibility in Reuben's exhortatory tone.
- source_word: πορνεία
  chosen: sexual immorality
  alternatives:
  - fornication
  - unchastity
  lexicon: BDAG
  rationale: Broad enough to cover illicit sexual conduct without narrowing to premarital
    sex alone; fits the vice-theme of the chapter.
- source_word: καθαρεύοντες τῇ διανοίᾳ
  chosen: be keeping your mind pure
  alternatives:
  - be pure in mind
  - keep your understanding clean
  lexicon: LSJ
  rationale: The phrase joins moral purity with the inner faculty of thought; 'mind'
    is the most natural rendering of διάνοια here.
- source_word: αἰσθήσεις
  chosen: senses
  alternatives:
  - perceptions
  - faculties
  lexicon: LSJ
  rationale: Reuben's warning concerns the gateways of desire; 'senses' communicates
    embodied perception better than the more abstract alternatives.
- source_word: συνδιάζειν
  chosen: associate closely with
  alternatives:
  - mingle with
  - keep company with
  lexicon: LSJ
  rationale: The context is repeated intimate social contact that fosters temptation;
    'associate closely with' captures the caution without overstating to sexual conduct
    itself.
- source_word: συνεχεῖς συντυχίαι
  chosen: constant encounters
  alternatives:
  - frequent meetings
  - continual associations
  lexicon: LSJ
  rationale: The phrase emphasizes repeated contact; 'constant encounters' preserves
    the cumulative moral danger Reuben describes.
- source_word: ἀσέβημα
  chosen: the ungodly act
  alternatives:
  - the impious deed
  - the offense
  lexicon: LSJ
  rationale: The term marks the act as morally profane, not merely socially improper.
- source_word: νόσος ἀνίατος
  chosen: an incurable disease
  alternatives:
  - an incurable sickness
  lexicon: LSJ
  rationale: Keeps the metaphor of moral corruption as illness vivid and direct.
- source_word: Βελίαρ
  chosen: Beliar
  alternatives:
  - Belial
  lexicon: LSJ
  rationale: The Greek witness reads Βελίαρ; transliteration follows the source form
    rather than harmonizing to the more familiar Hebrew-derived 'Belial'.
- source_word: σύνεσιν
  chosen: understanding
  alternatives:
  - good sense
  - discernment
  lexicon: BDAG
  rationale: Pairs well with 'reverence for God' and preserves the moral-intellectual
    dimension of the warning.
- source_word: εὐσέβειαν
  chosen: reverence for God
  alternatives:
  - godliness
  - piety
  lexicon: BDAG
  rationale: Makes explicit the Godward orientation of the term for modern readers
    while retaining its religious force.
- source_word: ζῆλος / ζηλώσετε
  chosen: jealous / be jealous
  alternatives:
  - zeal / be zealous
  - envy / envy
  lexicon: BDAG
  rationale: In this context the sense is negative rivalry toward Levi's sons, not
    commendable zeal; 'jealous' best fits the warning.
- source_word: ἐκδίκησιν
  chosen: vengeance
  alternatives:
  - vindication
  - justice
  lexicon: BDAG
  rationale: The immediate context is punitive divine action against those opposing
    Levi; 'vengeance' preserves that sharper edge.
- source_word: Ὁρκῶ ὑμᾶς
  chosen: I adjure you
  alternatives:
  - I charge you under oath
  - I solemnly charge you
  lexicon: LSJ
  rationale: Retains the testamentary solemnity and oath-like force of the patriarch's
    final charge.
- source_word: ποιεῖν ἀλήθειαν
  chosen: practice truth
  alternatives:
  - do truth
  - act truthfully
  lexicon: LSJ
  rationale: A slightly literal rendering preserves the ethical idiom of truth as
    enacted faithfulness, not mere verbal accuracy.
- source_word: ἀγάπην ἔχειν
  chosen: have love
  alternatives:
  - show love
  - maintain love
  lexicon: BDAG
  rationale: Keeps the simple, direct moral imperative and aligns with project default
    for ἀγάπη as 'love.'
- source_word: ἐγγίσατε
  chosen: draw near
  alternatives:
  - come near
  - approach
  lexicon: BDAG
  rationale: Carries both relational and honorific force in the call to humble approach
    toward Levi.
- source_word: δέξησθε εὐλογίαν
  chosen: receive a blessing
  alternatives:
  - accept blessing
  lexicon: BDAG
  rationale: Natural English that preserves the concrete notion of blessing mediated
    through Levi's speech.
- source_word: προσκυνήσατε
  chosen: bow down to
  alternatives:
  - worship
  - pay homage to
  lexicon: BDAG
  rationale: Avoids over-reading as divine worship while preserving the strong gesture
    of submission/homage in context.
- source_word: σπέρμα
  chosen: seed
  alternatives:
  - offspring
  - descendant
  lexicon: BDAG
  rationale: Retained for its covenantal and lineage resonance, though less idiomatic
    than 'offspring.'
- source_word: βασιλεὺς αἰώνιος
  chosen: an everlasting king
  alternatives:
  - an eternal king
  lexicon: BDAG
  rationale: '''Everlasting'' better suits royal duration language in biblical-style
    English and preserves the prophetic register.'
