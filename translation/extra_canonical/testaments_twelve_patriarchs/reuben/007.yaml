theological_decisions:
- issue: How to handle the chapter's extremely brief and truncated Greek witness
  chosen_reading: Translate the extant burial notice straightforwardly and complete
    the sense only to the minimum extent required by the known narrative context of
    patriarchal reburial in Hebron.
  alternative_readings:
  - Translate only the extant words and leave the sentence fragmentary
  - Reconstruct a fuller ending from other witnesses or editions
  rationale: The provided Greek text for chapter 7 contains only the closing death-and-burial
    notice and breaks off after ἕως. A completely fragmentary English line would be
    less useful as a chapter draft, but a full reconstruction would exceed the supplied
    witness. The chosen rendering keeps close to the extant Greek while supplying
    only the standard completion reflected by the testament's narrative frame.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy; transparency about
    textual complexity'
