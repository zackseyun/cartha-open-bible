translation:
  text: And Reuben died, after commanding these things to his sons. And they placed
    him in a coffin until he was brought up from Egypt and buried in Hebron, in the
    cave where his fathers were.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek witness supplied for this chapter is very brief and breaks off
      after 'until.' The remainder of the burial notice is translated with minimal
      completion from the testament's narrative context rather than from a full reconstructed
      Greek text.
    reason: textual_variant
  - marker: b
    text: Hebron and the cave of the fathers echo the ancestral burial tradition in
      Genesis.
    reason: cross_reference
lexical_decisions:
- source_word: ἀπέθανε
  chosen: died
  alternatives:
  - fell asleep
  - came to his end
  lexicon: LSJ
  rationale: The ordinary verb for death should be rendered plainly. A euphemism like
    'fell asleep' would import a softer idiom not present in the Greek.
- source_word: ἐντειλάμενος
  chosen: after commanding
  alternatives:
  - having charged
  - after instructing
  lexicon: LSJ
  rationale: The participle marks prior action relative to his death. 'After commanding'
    preserves the testamentary force better than the weaker 'instructing.'
- source_word: υἱοῖς
  chosen: sons
  alternatives:
  - children
  lexicon: LSJ
  rationale: The Greek specifically names sons, fitting the patriarchal testament
    setting; 'children' would flatten the kinship language.
- source_word: ἔθεντο
  chosen: they placed
  alternatives:
  - they laid
  - they set
  lexicon: LSJ
  rationale: A simple burial-action verb; 'placed' is natural English while remaining
    close to the Greek.
- source_word: σορῷ
  chosen: coffin
  alternatives:
  - bier
  - sarcophagus
  lexicon: LSJ
  rationale: The term denotes a coffin or funerary chest. 'Coffin' is the clearest
    readable equivalent; 'bier' is less precise here and 'sarcophagus' over-specifies.
- source_word: ἕως
  chosen: until
  alternatives:
  - up to the time when
  lexicon: LSJ
  rationale: The surviving text is truncated after ἕως, but the narrative clearly
    indicates temporary placement pending later burial. 'Until' preserves the open-ended
    temporal sense.
