translation:
  text: 1. I, Levi, was born in Haran, and I came with my father to Shechem. 2. And
    I was still young, about twenty years old, and then I carried out vengeance with
    Simeon for our sister Dinah against Hamor. 3. And as I was shepherding in Abelmaul,
    a spirit of understanding from the Lord came upon me, and I saw all people corrupting
    their way, and sin was being built upon a wall, and injustice sat upon towers.
    4. And I was grieved over the race of the sons of men, and I prayed to the Lord
    that I might be saved. 5. Then sleep fell upon me, and I saw a high mountain,
    and I was on it. 6. And behold, the heavens were opened, and an angel of the Lord
    said to me, “Levi, Levi, enter.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: '2:3'
    text: The phrase 'corrupting their way' literally reflects people ruining or destroying
      their own way of life/conduct.
    reason: lexical_alternative
  - marker: '2:4'
    text: '''The race of the sons of men'' is a solemn Semitic-style expression for
      humankind.'
    reason: cultural_note
  - marker: '2:6'
    text: The opening of the heavens is standard apocalyptic vision language; compare
      other biblical and Jewish visionary scenes.
    reason: cross_reference
lexical_decisions:
- source_word: ἐκδίκησις / ἐποίησα τὴν ἐκδίκησιν
  chosen: I carried out vengeance
  alternatives:
  - I took revenge
  - I executed vengeance
  - I brought retribution
  lexicon: BDAG
  rationale: The phrase is active and forceful, referring to Levi's participation
    in retaliatory violence after Dinah's defilement. 'Carried out vengeance' preserves
    the testamentary gravity without softening it into a mere emotional response.
- source_word: νεώτερος
  chosen: still young
  alternatives:
  - younger
  - young
  lexicon: LSJ
  rationale: In context Levi is giving autobiographical age-setting ('about twenty
    years old'). 'Still young' conveys relative youth naturally in English while preserving
    the self-description.
- source_word: πνεῦμα συνέσεως
  chosen: a spirit of understanding
  alternatives:
  - a spirit of insight
  - the spirit of understanding
  lexicon: LSJ
  rationale: The anarthrous phrase is best rendered without forcing a fully titular
    reading. It denotes divinely given discernment from the Lord rather than necessarily
    a distinct hypostatic title.
- source_word: ἀφανίσαντας τὴν ὁδὸν αὐτῶν
  chosen: corrupting their way
  alternatives:
  - destroying their way
  - ruining their conduct
  lexicon: LSJ
  rationale: Although the verb can mean 'destroy' or 'make disappear,' in moral context
    with 'way' it points to the ruin/corruption of conduct. This echoes biblical idiom
    about a corrupted way of life.
- source_word: ἁμαρτία ... οἰκοδομεῖτο
  chosen: sin was being built
  alternatives:
  - sin was being built up
  - sin was being erected
  lexicon: LSJ
  rationale: The passive construction is vivid and architectural. Retaining 'was being
    built' preserves the metaphor rather than paraphrasing it away.
- source_word: ἀδικία ἐκάθητο
  chosen: injustice sat
  alternatives:
  - unrighteousness sat
  - lawlessness sat enthroned
  lexicon: LSJ
  rationale: 'The image is personified and static: injustice is seated upon towers.
    ''Injustice'' is the most accessible rendering here and preserves the personification.'
- source_word: γένος τῶν υἱῶν τῶν ἀνθρώπων
  chosen: the race of the sons of men
  alternatives:
  - the offspring of humanity
  - the human race
  - the stock of the sons of men
  lexicon: LSJ
  rationale: The phrase is solemn and somewhat Hebraic. 'The race of the sons of men'
    preserves the elevated register and anthropological breadth better than a flattened
    'humanity' alone.
- source_word: ὅπως σωθῶ
  chosen: that I might be saved
  alternatives:
  - that I might be delivered
  - that I might be preserved
  lexicon: BDAG
  rationale: The passive of σῴζω here naturally carries deliverance/salvation language.
    'Saved' preserves the theological resonance while remaining broad enough for the
    immediate context of moral corruption.
- source_word: ἐπέπεσέ με ὕπνος
  chosen: sleep fell upon me
  alternatives:
  - I fell asleep
  - slumber came over me
  lexicon: LSJ
  rationale: The idiom is more vivid than a simple 'I fell asleep.' Retaining the
    image suits the visionary setting.
- source_word: ἀνεῴχθησαν οἱ οὐρανοί
  chosen: the heavens were opened
  alternatives:
  - heaven was opened
  lexicon: LSJ
  rationale: The plural 'heavens' reflects the Greek and preserves apocalyptic diction
    familiar to Jewish visionary literature.
