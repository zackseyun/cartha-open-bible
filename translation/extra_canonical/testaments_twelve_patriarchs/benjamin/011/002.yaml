translation:
  text: And in the last times there shall arise from my seed one beloved of the Lord,
    hearing his voice and doing the good pleasure of his will, enlightening all the
    nations with new knowledge, bringing salvation to Israel, and snatching from them
    like a wolf, and giving to the assembly of the nations.
