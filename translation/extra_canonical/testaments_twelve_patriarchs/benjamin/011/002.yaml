  text: Καὶ ἀναστήσεται ἐν ὑστέροις] ἀγαπητὸς Κυρίου [ἐκ σπέρματος Ἰούδα καὶ Λευί]⁶ ποιῶν εὐδοκίαν *ἐν στόματι αὐτοῦ⁷, [γνῶσιν καινὴν φωτίζων πάντα τὰ ἔθνη]⁸ *φῶς γνώσεως¹⁴, ἐπεμβαίνων¹⁵ *τὸν Ἰσραὴλ¹⁶ ἐν σωτηρίᾳ, καὶ ἁρπάζων ὡς λύκος ἀπ᾽ αὐτῶν¹⁷, καὶ *διδοὺς τῇ συναγωγῇ τῶν ἐθνῶν¹⁸.
  language: Greek
translation:
  text: And in the last times a beloved one of the Lord shall arise [from the seed of Judah and Levi], doing good pleasure with his mouth, [enlightening all the nations with new knowledge], a light of knowledge, coming upon Israel in salvation, and snatching from them like a wolf, and giving to the assembly of the nations.
