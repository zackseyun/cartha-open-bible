translation:
  text: '7[a]. And he purifies his mind so as not to be condemned by men, and likewise
    by God. In the same way, the works of Beliar also are twofold, and they have no
    simplicity in them.


    Therefore, my children[b], I tell you: flee the evil of Beliar, because he gives
    a sword to those who obey him.'
