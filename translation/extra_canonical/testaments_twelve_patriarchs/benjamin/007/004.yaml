translation:
  text: "For two hundred years he suffers, and in the nine-hundredth year he was made desolate; for because of Abel his brother he was judged in all evils, but Lamech in seventy times seven. Because to the end of the age, those who become like Cain in envy and hatred of brothers will be punished with similar judgment."
