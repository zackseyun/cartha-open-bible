translation:
  text: Nevertheless, in your allotted portion there will be the temple of God, and the latter will be more glorious than the former; and there the twelve tribes and all the nations will be gathered, until the Most High sends his salvation in the visitation of an only-begotten prophet. [3. And he will enter into the first temple, and there the Lord will be insulted and be lifted up on a tree.]
