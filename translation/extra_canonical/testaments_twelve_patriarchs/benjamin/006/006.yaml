translation:
  text: "It has neither double sight nor double hearing; for in everything it does, or speaks, or sees, it knows that the Lord watches over his soul. And he cleanses his mind so as not to be condemned by men, likewise also by God. And in the same way the works of Beliar are twofold, and they have no singleness in them."
