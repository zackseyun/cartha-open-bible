translation:
  text: 'And when Simeon had finished commanding his sons, he fell asleep with his
    fathers, being one hundred and twenty years old.


    And they placed him in a wooden coffin, to bring up his bones to Hebron. And they
    brought them up secretly during a war of the Egyptians.


    For the Egyptians were keeping the bones of Joseph in the tombs of the kings,
    so as to bring him up. For the enchanters were telling them that, when Joseph’s
    bones went out, there would be over all the land darkness and gloom and a great
    plague for the Egyptians, so that even with a lamp each man would not recognize
    his brother.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Verse 3 is textually difficult. Some witnesses read 'store-chambers' instead
      of 'tombs,' yielding 'the Egyptians were keeping Joseph’s bones in the store-chambers
      of the kings.'
    reason: textual_variant
  - marker: b
    text: The phrase 'they brought them up secretly during a war of the Egyptians'
      is compressed in Greek and may mean 'in secret during an Egyptian war' or 'during
      war among the Egyptians.'
    reason: alternative_reading
  - marker: c
    text: Compare Genesis 50:25 and Exodus 13:19 on the carrying up of Joseph’s bones.
    reason: cross_reference
lexical_decisions:
- source_word: συνετέλεσεν
  chosen: had finished
  alternatives:
  - completed
  - came to the end
  lexicon: LSJ
  rationale: In context of concluding his final charges, the idiom is best rendered
    as completion of speech/action rather than a bare 'ended'.
- source_word: ἐντελλόμενος
  chosen: commanding
  alternatives:
  - instructing
  - charging
  lexicon: LSJ
  rationale: Testamentary paraenesis carries authoritative force. 'Commanding' preserves
    the paternal and exhortatory tone, though 'charging' is a close alternative.
- source_word: ἐκοιμήθη
  chosen: fell asleep
  alternatives:
  - died
  - was laid to rest
  lexicon: LSJ
  rationale: The Greek uses the conventional euphemism for death. 'Fell asleep' preserves
    the literary and traditional texture better than flattening to 'died'.
- source_word: μετὰ τῶν πατέρων αὐτοῦ
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: LSJ
  rationale: This is a traditional burial/death formula. 'With his fathers' preserves
    the testamentary and biblical register.
- source_word: θήκῃ ξυλίνῃ
  chosen: wooden coffin
  alternatives:
  - wooden chest
  - wooden case
  lexicon: LSJ
  rationale: The phrase denotes a wooden container for the body/bones. 'Coffin' is
    the clearest idiomatic English in funerary context.
- source_word: τοῦ ἀναγαγεῖν τὰ ὀστᾶ αὐτοῦ
  chosen: to bring up his bones
  alternatives:
  - to carry up his bones
  - to take up his bones
  lexicon: LSJ
  rationale: ἀνάγω here reflects transfer to the ancestral burial place. 'Bring up'
    preserves the directional sense without overexplaining.
- source_word: ἐν πολέμῳ Αἰγυπτίων κρυφῇ
  chosen: secretly during a war of the Egyptians
  alternatives:
  - in secret during an Egyptian war
  - secretly in time of war among the Egyptians
  lexicon: LSJ
  rationale: The phrase is somewhat compressed. The chosen rendering keeps both secrecy
    and the wartime setting without forcing a more specific historical reconstruction.
- source_word: ἐφύλαττον
  chosen: were keeping
  alternatives:
  - were guarding
  - were preserving
  lexicon: LSJ
  rationale: Imperfect aspect suggests ongoing custody. 'Were keeping' is broad enough
    to include guarded retention of the bones.
- source_word: μνήμασι τῶν βασιλέων
  chosen: the tombs of the kings
  alternatives:
  - the royal tombs
  lexicon: LSJ
  rationale: The likely sense of the difficult line is that Joseph's bones were kept
    in royal burial places/store-chambers. 'The tombs of the kings' follows the more
    straightforward funerary reading while a note preserves the variant.
- source_word: ἐπαοιδοί
  chosen: enchanters
  alternatives:
  - charmers
  - magicians
  lexicon: LSJ
  rationale: The term refers to practitioners of incantation. 'Enchanters' fits the
    ancient Egyptian divinatory setting and avoids overly modern connotations.
- source_word: σκότος καὶ γνόφος
  chosen: darkness and gloom
  alternatives:
  - darkness and thick darkness
  - darkness and murk
  lexicon: LSJ
  rationale: The pair is rhetorically emphatic. 'Darkness and gloom' preserves the
    parallelism in readable English.
- source_word: πληγὴ μεγάλη
  chosen: a great plague
  alternatives:
  - a great blow
  - a severe affliction
  lexicon: LSJ
  rationale: In judgment context, 'plague' best conveys a large-scale calamity upon
    Egypt, echoing biblical disaster language.
- source_word: μετὰ λύχνου
  chosen: even with a lamp
  alternatives:
  - by lamplight
  - with a lamp
  lexicon: LSJ
  rationale: The phrase heightens the severity of the darkness. 'Even with a lamp'
    makes the rhetorical force explicit in natural English.
- source_word: μὴ ἐπιγινώσκειν ἕκαστος τὸν ἀδελφὸν αὐτοῦ
  chosen: each man would not recognize his brother
  alternatives:
  - no one would recognize his brother
  lexicon: LSJ
  rationale: The singular distributive ἕκαστος is preserved with 'each man,' maintaining
    the vivid individualizing effect of the Greek.
