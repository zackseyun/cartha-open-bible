theological_decisions:
- issue: Death formula ἐκοιμήθη
  chosen_reading: fell asleep
  alternative_readings:
  - died
  - was laid to rest
  rationale: The text uses a conventional euphemism for death common in biblical and
    related literature. Preserving it maintains literary texture without requiring
    a doctrinal claim beyond the idiom.
  doctrine_reference: DOCTRINE.md §Translation philosophy, readable modern English
    with preserved theological weight
- issue: Compressed and textually difficult notice about Joseph's bones and Egyptian
    fear
  chosen_reading: translated the main line as Egyptians keeping Joseph's bones in
    the tombs of the kings, followed by the explanation from the enchanters
  alternative_readings:
  - store-chambers instead of tombs
  - different reconstruction of the corrupt clause about bringing him up secretly
  rationale: The Greek witness is awkward in v. 3, with variant evidence noted in
    the apparatus. The chosen reading follows the most coherent sense available from
    the supplied text while documenting the lexical uncertainty in notes rather than
    silently harmonizing.
