translation:
  text: '1. Hear, my children, Simeon your father, and I will declare to you what
    I have in my heart.

    2. I was born from Jacob as the second son to my father, and Leah my mother called
    me Simeon, because the Lord heard her petition.

    3. For I became very strong; I did not shrink from any deed, nor was I afraid
    of anything.

    4. For my heart was hard, and my liver unmoved, and my inward parts without compassion.

    5. For courage also is given by the Most High to men in soul and body.

    6. For in the time of my youth I was very jealous of Joseph, because my father
    loved him above all.

    7. And I set my liver against him so as to kill him, because the ruler of deceit
    and the spirit of jealousy blinded my mind, so that I did not regard him as a
    brother, nor even spare Jacob my father.

    8. But his God and the God of our fathers sent his angel and rescued him from
    my hands.

    9. For when I went to Shechem to bring ointment for our flocks, and Reuben to
    Dothan, where our supplies and all our stores were, Judah my brother sold him
    to the Ishmaelites.

    10. And when Reuben heard these things, he was grieved, for he wanted to bring
    him back safely to our father.

    11. But when I heard this, I was very angry with Judah, because he had let him
    go alive;

    12. and for five months I was sick in my liver. And the Lord struck me, and my
    hand was withered for seven days.

    13. And I knew, my children, that this happened to me because of Joseph. And after
    repenting I wept and prayed to the Lord God that my hand might be restored, and
    that I might abstain from every defilement and envy and from all foolishness.

    14. For I knew that I had devised an evil thing before the Lord and against Jacob
    my father concerning Joseph my brother, by envying him.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the prince of error.' The Greek allows either 'deceit' or 'error/delusion'
      for πλάνη.
    reason: lexical_alternative
  - marker: b
    text: '''My liver'' reflects the Greek bodily idiom for the inner seat of passion
      or resolve; the same image recurs in this chapter.'
    reason: cultural_note
  - marker: c
    text: '''After changing my mind'' could also be rendered ''after repenting.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκούσατε
  chosen: Hear
  alternatives:
  - Listen
  - Give ear
  lexicon: BDAG
  rationale: Preserves the strong testamentary summons in direct address without sounding
    archaic.
- source_word: ἀναγγελῶ
  chosen: I will declare
  alternatives:
  - I will tell
  - I will report
  lexicon: BDAG
  rationale: Keeps the formal, father-to-sons testament tone stronger than the flatter
    'tell'.
- source_word: δεήσεως
  chosen: petition
  alternatives:
  - prayer
  - supplication
  lexicon: BDAG
  rationale: Reflects a specific plea made by Leah; 'petition' is precise and readable.
- source_word: οὐκ ἐδειλίασα πρᾶξιν
  chosen: I did not shrink from any deed
  alternatives:
  - I was not cowardly in action
  - I did not fear any undertaking
  lexicon: BDAG
  rationale: Captures both the courage language and the concrete sense of action/deed.
- source_word: τὰ ἤπατά μου
  chosen: my liver
  alternatives:
  - my inmost being
  - my inner self
  lexicon: LSJ
  rationale: Retains the ancient anthropological idiom rather than flattening it;
    the repeated use in this chapter is thematically important.
- source_word: σπλάγχνα
  chosen: inward parts
  alternatives:
  - compassion
  - inner affections
  lexicon: BDAG
  rationale: The phrase 'my inward parts without compassion' preserves the bodily
    metaphor while making the moral sense clear.
- source_word: ἀνδρεία
  chosen: courage
  alternatives:
  - manliness
  - valor
  lexicon: BDAG
  rationale: '''Courage'' communicates the virtue clearly in modern English without
    importing gendered overtones not required by the context.'
- source_word: ἐζήλωσα
  chosen: was very jealous
  alternatives:
  - envied greatly
  - was zealous against
  lexicon: BDAG
  rationale: The chapter's vice-theme is envy/jealousy; 'jealous' fits the personal
    rivalry context and links with later φθόνος.
- source_word: ἐστήριξα ἐπʼ αὐτὸν τὰ ἤπατά μου
  chosen: I set my liver against him
  alternatives:
  - I hardened my inner being against him
  - I fixed my heart against him
  lexicon: LSJ
  rationale: Preserves the vivid bodily idiom and Simeon's self-accusatory voice;
    smoothing to 'heart' would erase a marked lexical feature.
- source_word: ὁ ἄρχων τῆς πλάνης
  chosen: the ruler of deceit
  alternatives:
  - the prince of error
  - the ruler of delusion
  lexicon: BDAG
  rationale: Keeps the personalized evil-power language while avoiding over-interpretive
    demonological expansion.
- source_word: πνεῦμα τοῦ ζήλου
  chosen: the spirit of jealousy
  alternatives:
  - the spirit of envy
  - the spirit of zeal
  lexicon: BDAG
  rationale: In context the phrase is negative and tied to Simeon's hostility toward
    Joseph; 'jealousy' best fits the vice thread.
- source_word: ἐτύφλωσεν τὸν νοῦν μου
  chosen: blinded my mind
  alternatives:
  - darkened my understanding
  - blinded my reason
  lexicon: BDAG
  rationale: A direct and vivid rendering that preserves the moral-psychological force.
- source_word: οὐδὲ Ἰακὼβ τὸν πατέρα μου ἐφεισάμην
  chosen: nor even spare Jacob my father
  alternatives:
  - nor did I spare Jacob my father
  - nor did I show regard for Jacob my father
  lexicon: BDAG
  rationale: 'Keeps the severity of Simeon''s confession: his envy overrode filial
    regard.'
- source_word: ἀπέστειλε τὸν ἄγγελον αὐτοῦ
  chosen: sent his angel
  alternatives:
  - sent an angel of his
  - sent his messenger
  lexicon: BDAG
  rationale: The Greek naturally reads as a heavenly angelic deliverer; no need to
    weaken it to 'messenger'.
- source_word: ἐρρύσατο
  chosen: rescued
  alternatives:
  - delivered
  - saved
  lexicon: BDAG
  rationale: '''Rescued'' fits the concrete danger from Simeon''s hands.'
- source_word: ἐν Σικίμοις
  chosen: to Shechem
  alternatives:
  - in Shechem
  lexicon: LSJ
  rationale: Rendered idiomatically with motion in English because the following infinitive
    indicates going there on an errand.
- source_word: ἄλειμμα
  chosen: ointment
  alternatives:
  - oil
  - salve
  lexicon: LSJ
  rationale: A practical pastoral supply is in view; 'ointment' is broad enough without
    over-specifying.
- source_word: ἀπόθεσις
  chosen: stores
  alternatives:
  - supplies
  - storage
  lexicon: LSJ
  rationale: The context concerns provisions kept in a place; 'stores' is concise
    and natural.
- source_word: ἀπαγαγεῖν πρὸς τὸν πατέρα
  chosen: bring him back safely to our father
  alternatives:
  - take him away to our father
  - restore him to our father
  lexicon: BDAG
  rationale: The surrounding textual sense implies rescue and safe return, not mere
    movement.
- source_word: ἀπέλυσεν
  chosen: had let him go alive
  alternatives:
  - released him alive
  - sent him away alive
  lexicon: BDAG
  rationale: Preserves Simeon's anger that Judah did not kill Joseph but allowed him
    to remain alive.
- source_word: ἐποίησα μῆνας πέντε
  chosen: for five months I was sick
  alternatives:
  - I suffered for five months
  - I spent five months in affliction
  lexicon: BDAG
  rationale: The likely sense is prolonged bodily affliction; this rendering is clear
    while leaving the exact pathology open.
- source_word: μετανοήσας
  chosen: after changing my mind
  alternatives:
  - after repenting
  lexicon: BDAG
  rationale: Follows project guidance for cognitive-context uses of μετανοέω while
    the surrounding confession still conveys repentance in substance.
- source_word: ἀποσχῶ
  chosen: I might abstain
  alternatives:
  - I might keep away
  - I might refrain
  lexicon: BDAG
  rationale: A morally charged term of renunciation; 'abstain' fits the paraenetic
    tone.
- source_word: μολυσμός
  chosen: defilement
  alternatives:
  - pollution
  - stain
  lexicon: BDAG
  rationale: Preserves moral impurity language with biblical resonance.
- source_word: φθόνος
  chosen: envy
  alternatives:
  - jealousy
  lexicon: BDAG
  rationale: Used here alongside earlier jealousy language; 'envy' provides lexical
    distinction while keeping the vice-theme coherent.
- source_word: ἀφροσύνη
  chosen: foolishness
  alternatives:
  - folly
  - senselessness
  lexicon: BDAG
  rationale: A broad moral-intellectual vice term; 'foolishness' is readable and weighty.
- source_word: ἐνεθυμήθην
  chosen: I had devised
  alternatives:
  - I had thought
  - I had planned
  lexicon: BDAG
  rationale: The context is not a neutral thought but an evil intention formed within.
