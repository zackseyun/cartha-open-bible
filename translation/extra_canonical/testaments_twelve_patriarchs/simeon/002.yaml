theological_decisions:
- issue: Personalized evil agency in Simeon's envy
  chosen_reading: Translate both 'the ruler of deceit' and 'the spirit of jealousy'
    straightforwardly as active hostile powers influencing Simeon.
  alternative_readings:
  - Treat both expressions as mere personifications of inner vice
  - Translate one as demonic and the other as psychological impulse
  rationale: The Greek presents both as operative causes of moral blindness. The translation
    preserves the text's theological tension between external evil influence and Simeon's
    own culpability without resolving it reductively.
  doctrine_reference: DOCTRINE.md § Preserve theological tension rather than resolve
    it
- issue: μετανοήσας in v. 13
  chosen_reading: Render as 'after changing my mind' in the main text.
  alternative_readings:
  - after repenting
  rationale: Project guidance prefers 'change of mind' in cognitive contexts. Here
    Simeon recognizes divine judgment and reverses his inner stance; the surrounding
    weeping and prayer preserve the penitential force.
  doctrine_reference: 'DOCTRINE.md Contested terms: μετανοέω'
- issue: ἄγγελον in v. 8
  chosen_reading: Translate as 'angel' rather than 'messenger.'
  alternative_readings:
  - messenger
  rationale: In this deliverance context, with God as sender and Joseph as recipient
    of rescue, the supernatural sense is the most natural reading of the Greek witness.
