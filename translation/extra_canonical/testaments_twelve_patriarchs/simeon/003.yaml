translation:
  text: And now, my children, hear me, and guard yourselves from the spirit of deceit
    and envy. For envy masters a man's whole mind, and does not allow him either to
    eat or to drink or to do anything good. But it is always urging him to kill the
    one envied; and while the one envied is always flourishing, the one who envies
    wastes away. For two years, then, in the fear of the Lord I afflicted my soul
    with fasting, and I learned that release from envy comes through the fear of God.
    For if anyone flees for refuge to the Lord, the evil spirit runs away from him,
    and his mind becomes light. And from then on he has compassion on the one envied,
    and forgives those who love him, and so he ceases from envy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spirit of error' or 'spirit of delusion.' The Greek πλάνη can denote
      both deception and wandering into error.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the one envied ... the one envying.' The Greek sharpens the contrast
      between the target of envy and the envious person.
    reason: lexical_alternative
  - marker: c
    text: '''Those who love him'' may refer either to the person formerly envied or
      to the one being healed from envy; the Greek pronoun is brief and contextually
      compressed.'
    reason: alternative_reading
lexical_decisions:
- source_word: φυλάξασθε
  chosen: guard yourselves
  alternatives:
  - beware
  - keep yourselves
  lexicon: LSJ
  rationale: Middle imperative with reflexive force; 'guard yourselves' preserves
    the paternal exhortation and moral vigilance better than the flatter 'beware'.
- source_word: πνεῦμα τῆς πλάνης
  chosen: spirit of deceit
  alternatives:
  - spirit of error
  - spirit of delusion
  lexicon: LSJ
  rationale: πλάνη can denote error or deception. In this paraenetic context, paired
    with envy as a corrupting power, 'deceit' best conveys a morally misleading spirit
    rather than mere intellectual mistake.
- source_word: φθόνος
  chosen: envy
  alternatives:
  - jealousy
  lexicon: LSJ
  rationale: The chapter's vice theme is φθόνος throughout. 'Envy' better matches
    hostile resentment at another's good and keeps the terminology stable across the
    chapter.
- source_word: κυριεύει πάσης τῆς διανοίας
  chosen: masters a man's whole mind
  alternatives:
  - rules over the whole mind of a man
  - has dominion over all a man's thought
  lexicon: LSJ
  rationale: κυριεύει carries domination language; 'masters' is vivid and idiomatic.
    διάνοια here is the faculty of thought/intention, well rendered as 'mind'.
- source_word: οὐκ ἀφίησιν
  chosen: does not allow
  alternatives:
  - does not permit
  - does not leave
  lexicon: LSJ
  rationale: The sense is prevention or restraint, not abandonment. 'Does not allow'
    is natural English and preserves the enslaving force of envy.
- source_word: ὑποβάλλει
  chosen: is always urging
  alternatives:
  - instigates
  - suggests
  lexicon: LSJ
  rationale: The verb here conveys inward prompting or incitement. 'Is always urging'
    captures the continual pressure of envy without over-specifying a technical nuance.
- source_word: ἀνελεῖν
  chosen: to kill
  alternatives:
  - to destroy
  - to do away with
  lexicon: LSJ
  rationale: The infinitive is stark and violent; 'to kill' preserves the severity
    of the vice's impulse.
- source_word: ἀνθεῖ
  chosen: is always flourishing
  alternatives:
  - blooms
  - prospers
  lexicon: LSJ
  rationale: The imagery is botanical/metaphorical. 'Flourishing' preserves the contrast
    with 'wastes away' in readable English.
- source_word: μαραίνεται
  chosen: wastes away
  alternatives:
  - withers
  - fades
  lexicon: LSJ
  rationale: The verb contrasts with ἀνθεῖ. 'Wastes away' communicates both withering
    and inward deterioration caused by envy.
- source_word: ἐκάκωσα τὴν ψυχήν μου
  chosen: I afflicted my soul
  alternatives:
  - I humbled myself
  - I disciplined myself
  lexicon: LSJ
  rationale: The expression is ascetic and severe. 'Afflicted my soul' preserves the
    idiom's gravity and its connection with fasting.
- source_word: ἐν νηστείᾳ
  chosen: with fasting
  alternatives:
  - in fasting
  lexicon: LSJ
  rationale: Instrumental sense is clear in English as 'with fasting,' showing the
    means by which he afflicted himself.
- source_word: λύσις τοῦ φθόνου
  chosen: release from envy
  alternatives:
  - deliverance from envy
  - loosening of envy
  lexicon: LSJ
  rationale: λύσις is release or loosening. 'Release from envy' is idiomatic and preserves
    the image of being freed from a binding vice.
- source_word: καταφύγῃ
  chosen: flees for refuge to
  alternatives:
  - takes refuge in
  - resorts to
  lexicon: LSJ
  rationale: The verb includes movement toward a place of safety. 'Flees for refuge
    to' keeps the urgency and dependence on the Lord.
- source_word: ἀποτρέχει
  chosen: runs away
  alternatives:
  - flees away
  - departs
  lexicon: LSJ
  rationale: A vivid motion verb; 'runs away' mirrors the force of the Greek and the
    dramatic retreat of the evil spirit.
- source_word: κούφη
  chosen: light
  alternatives:
  - relieved
  - unburdened
  lexicon: LSJ
  rationale: The adjective literally means light, not heavy. 'Becomes light' preserves
    the metaphor of a mind relieved of envy's oppressive weight.
- source_word: συμπαθεῖ
  chosen: has compassion on
  alternatives:
  - sympathizes with
  - shows fellow-feeling toward
  lexicon: LSJ
  rationale: The verb denotes fellow-feeling. 'Has compassion on' fits the ethical
    turn from envy to benevolence in natural English.
- source_word: συγγινώσκει
  chosen: forgives
  alternatives:
  - shows understanding to
  - makes allowance for
  lexicon: LSJ
  rationale: In moral exhortation the verb commonly carries the sense of pardoning
    or bearing with. 'Forgives' gives the strongest and clearest ethical sense.
- source_word: τοῖς ἀγαπῶσιν αὐτόν
  chosen: those who love him
  alternatives:
  - those who are dear to him
  - those who love the envied one
  lexicon: LSJ
  rationale: The Greek most naturally reads 'those who love him,' though the antecedent
    of αὐτόν is somewhat ambiguous in context. The main text keeps the straightforward
    reading; ambiguity is noted in a footnote.
