theological_decisions:
- issue: Rendering of κύριος / θεός in a paraenetic Jewish testament context
  chosen_reading: the Lord / God
  alternative_readings:
  - the LORD / God
  rationale: The Greek has Κύριον and θεοῦ in close succession. Following project
    defaults, κύριος is rendered 'Lord.' Since this is not a direct representation
    of the divine name in Hebrew scripture citation, 'the Lord' is appropriate here.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord; preserve source-language primacy'
- issue: Personal evil agency in τὸ πονηρὸν πνεῦμα
  chosen_reading: the evil spirit
  alternative_readings:
  - an evil spirit
  - the wicked impulse
  rationale: The article supports a definite expression, and the testament's moral
    psychology personifies vice as spiritual power. The translation preserves that
    tension rather than reducing it to mere metaphor.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve
    it'
