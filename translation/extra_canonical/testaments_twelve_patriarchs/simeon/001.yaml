translation:
  text: 'A copy of the words of Simeon, which he spoke to his sons before he died,
    in the hundred and twentieth year of his life, at the time when Joseph his brother
    died. And when Simeon was sick, his sons came to visit him; and gathering his
    strength, he sat up and kissed them, and said:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A record of the words of Simeon.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'kissed them' renders an intensive Greek verb that can suggest
      repeated or affectionate kissing.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀντίγραφον
  chosen: A copy
  alternatives:
  - A record
  - A transcript
  lexicon: LSJ
  rationale: The term introduces a written reproduction or record of the patriarch's
    words. 'A copy' preserves the testamentary/documentary heading style without overinterpreting
    the exact archival nuance.
- source_word: λόγων
  chosen: of the words
  alternatives:
  - of the sayings
  - of the speech
  lexicon: LSJ
  rationale: A straightforward rendering that preserves the formal heading. 'Words'
    fits testamentary superscriptions better than the more interpretive 'speech'.
- source_word: πρὸ τοῦ ἀποθανεῖν
  chosen: before he died
  alternatives:
  - before his death
  - before dying
  lexicon: BDAG
  rationale: This infinitival construction is naturally rendered temporally in English.
    'Before he died' is clear and idiomatic while staying close to the Greek.
- source_word: ἐν ἑκατοστῷ εἰκοστῷ ἔτει
  chosen: in the hundred and twentieth year
  alternatives:
  - at one hundred and twenty years old
  lexicon: LSJ
  rationale: The Greek gives a formal chronological notice. Retaining 'in the hundred
    and twentieth year' preserves the elevated register and testamentary style.
- source_word: ἐν ᾧ χρόνῳ
  chosen: at the time when
  alternatives:
  - in which time
  - when
  lexicon: LSJ
  rationale: This phrase links Simeon's death setting with Joseph's death. 'At the
    time when' preserves the connective force more fully than a bare 'when'.
- source_word: Ἀρρωστοῦντος
  chosen: was sick
  alternatives:
  - was ill
  - being sick
  lexicon: BDAG
  rationale: The genitive absolute marks Simeon's condition at the time of the visit.
    'Was sick' is natural English and preserves the narrative setup.
- source_word: ἐπισκέψασθαι
  chosen: to visit
  alternatives:
  - to look after
  - to attend
  lexicon: BDAG
  rationale: The verb can imply visitation with care or concern. 'To visit' is the
    most natural here, with the compassionate nuance carried by context.
- source_word: ἐνισχύσας
  chosen: gathering his strength
  alternatives:
  - strengthening himself
  - taking courage
  lexicon: LSJ
  rationale: The participle suggests a physical effort before sitting up to speak.
    'Gathering his strength' communicates the bodily exertion clearly and idiomatically.
- source_word: ἐκάθισε
  chosen: he sat up
  alternatives:
  - he sat
  - he took his seat
  lexicon: LSJ
  rationale: In context of illness and bedside visitation, 'sat up' best conveys the
    likely movement and dramatic preparation to deliver his testament.
- source_word: κατεφίλησεν
  chosen: kissed
  alternatives:
  - embraced with kisses
  - kissed affectionately
  lexicon: BDAG
  rationale: The compound verb can intensify the action, but in English 'kissed' in
    this familial deathbed context is sufficient and avoids overloading the line.
