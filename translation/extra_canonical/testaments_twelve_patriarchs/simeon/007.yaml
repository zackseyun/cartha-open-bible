    textual or redactional uncertainty. In keeping with transparency, it is translated
    but marked as uncertain rather than silently omitted. The wording is left literal
    to avoid importing later doctrinal formulations.
  doctrine_reference: Preserve theological tension rather than resolve it; translate
    what is in the Greek witness honestly, and use notes for likely expansion.
- issue: Bracketed phrase πάντα τὰ ἔθνη
