translation:
  text: And now, my children, listen to Levi and to Judah, and do not exalt yourselves
    over these two tribes, because from them the salvation of God will arise for us.
    For the Lord will raise up from Levi as a high priest, and from Judah as a king,
    [God and man]; he will save [all the nations and] the race of Israel. Therefore
    I command these things to you, so that you also may command your children, that
    they may keep them throughout their generations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[God and man]'
    text: The Greek witness includes this phrase in brackets, suggesting textual uncertainty
      or possible later expansion. It is translated here for transparency rather than
      silently omitted.
    reason: textual_variant
  - marker: '[all the nations and]'
    text: This phrase is bracketed in the Greek witness and may reflect a textual
      expansion. The main text retains it with brackets to show the uncertainty.
    reason: textual_variant
  - marker: the race of Israel
    text: Or 'the people of Israel.' The Greek γένος emphasizes lineage or kin-group.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπακούσατε
  chosen: listen to
  alternatives:
  - obey
  - give heed to
  lexicon: BDAG
  rationale: The imperative carries attentive hearing with responsive heed. 'Listen
    to' preserves the direct exhortational tone without over-specifying absolute obedience
    in English.
- source_word: μὴ ἐπαίρεσθε
  chosen: do not exalt yourselves over
  alternatives:
  - do not be arrogant toward
  - do not boast over
  lexicon: LSJ
  rationale: The middle/passive form suggests self-exaltation. 'Exalt yourselves over'
    keeps the comparative sense with the two tribes and preserves the warning against
    pride.
- source_word: γενεὰς
  chosen: tribes
  alternatives:
  - generations
  - clans
  lexicon: LSJ
  rationale: Although γενεά often means 'generation,' here the reference is plainly
    to Levi and Judah as lineage-groups within Israel. 'Tribes' communicates the referent
    clearly in context.
- source_word: τὸ σωτήριον τοῦ Θεοῦ
  chosen: the salvation of God
  alternatives:
  - God's salvation
  - the saving help of God
  lexicon: BDAG
  rationale: The phrase is weighty and somewhat formal in testamentary prophecy. 'The
    salvation of God' preserves that elevated register and leaves open whether the
    phrase denotes saving action or a salvific figure.
- source_word: ἀναστήσει
  chosen: will raise up
  alternatives:
  - will appoint
  - will bring forth
  lexicon: BDAG
  rationale: '''Raise up'' is the standard prophetic idiom for God''s bringing forth
    a leader and fits both priestly and royal figures.'
- source_word: ἀρχιερέα
  chosen: high priest
  alternatives:
  - chief priest
  lexicon: BDAG
  rationale: Standard rendering for the office; preserves the cultic specificity.
- source_word: βασιλέα
  chosen: king
  alternatives:
  - ruler
  lexicon: BDAG
  rationale: The royal title should remain concrete and traditional here.
- source_word: σώσει
  chosen: he will save
  alternatives:
  - he will deliver
  lexicon: BDAG
  rationale: Given the preceding σωτήριον, retaining the cognate 'save' preserves
    the thematic linkage of salvation language.
- source_word: τὸ γένος τοῦ Ἰσραήλ
  chosen: the race of Israel
  alternatives:
  - the people of Israel
  - the stock of Israel
  lexicon: LSJ
  rationale: γένος denotes kin-group or lineage. 'Race' here means lineage/people-group
    in elevated older English; it preserves the genealogical nuance, though this may
    merit later revision if modern readers mishear it.
- source_word: φυλάξωσιν
  chosen: may keep
  alternatives:
  - may observe
  - may guard
  lexicon: BDAG
  rationale: In command contexts, 'keep' is idiomatic for preserving and obeying injunctions.
