translation:
  text: And the sons of Simeon wept for their father. And they remained in Egypt until
    the day of their departure by the hand of Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until the day of their exodus.'
    reason: lexical_alternative
  - marker: b
    text: '''By the hand of Moses'' is a biblical idiom meaning ''through Moses''
      or ''under Moses'' leadership.'''
    reason: cultural_note
  - marker: c
    text: 'The final line in the source transitions directly into the heading of the
      next work: ''The Testament of Levi, the third son of Jacob and Leah.'' It is
      not part of Simeon 9 proper.'
    reason: textual_variant
lexical_decisions:
- source_word: ἔκλαυσαν
  chosen: wept
  alternatives:
  - cried
  - mourned
  lexicon: LSJ
  rationale: Aorist of κλαίω denotes audible weeping or lament. 'Wept' is the most
    natural elevated English and preserves the filial mourning scene without over-interpreting
    it as formal mourning rites.
- source_word: υἱοὶ
  chosen: sons
  alternatives:
  - children
  lexicon: LSJ
  rationale: In this testamentary genealogical setting, 'sons' preserves the patriarchal
    family register more precisely than the broader 'children'.
- source_word: εἰς Αἴγυπτον
  chosen: in Egypt
  alternatives:
  - into Egypt
  lexicon: LSJ
  rationale: 'Although εἰς commonly means ''into,'' with ἦσαν and a durative phrase
    it functions idiomatically for location or continued presence. ''In Egypt'' best
    fits the sense: they were there until the exodus.'
- source_word: ἕως ἡμέρας ἐξόδου αὐτῶν
  chosen: until the day of their departure
  alternatives:
  - until the day of their exodus
  lexicon: LSJ
  rationale: ἐξόδου can be rendered 'departure' or 'exodus.' The common noun sense
    is primary here, while the historical allusion remains clear from the mention
    of Moses. 'Departure' avoids importing a title not explicit in the Greek while
    preserving the event.
- source_word: ἐν χειρὶ Μωϋσῆ
  chosen: by the hand of Moses
  alternatives:
  - through Moses
  - under Moses' leadership
  lexicon: LSJ
  rationale: This is a standard biblical idiom for agency or instrumentality. Retaining
    'by the hand of Moses' preserves the scriptural texture and elevated register
    of the testament.
