theological_decisions:
- issue: Whether to capitalize or title ἐξόδου as 'Exodus'
  chosen_reading: Rendered as the common noun 'departure' in the main text
  alternative_readings:
  - their exodus
  - the Exodus
  rationale: The Greek uses the common noun without an explicit book-title function.
    The historical event is still evident from the context and Moses reference, so
    the translation preserves the source wording without suppressing the allusion.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: How literally to render the idiom ἐν χειρὶ Μωϋσῆ
  chosen_reading: Retained the idiom 'by the hand of Moses'
  alternative_readings:
  - through Moses
  - under Moses
  rationale: The idiom is transparent enough in English and preserves biblical diction.
    A more interpretive rendering would be smoother but less auditable and less faithful
    to the testamentary register.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
