translation:
  text: "And being brought low, you will turn back and acknowledge the Lord your God, and he will bring you back into your land according to his great mercy. 4 And it shall come to pass, when they go out into the land of their fathers, again they will forget the Lord and act impiously. 5 And the Lord will scatter them upon the face of all the earth, until the compassion of the Lord shall come, a man working righteousness and showing mercy to all who are far off and to those who are near."
