  text: 7. Καὶ ὡς⁵³ κεχώρισται ἀνάμεσον *τοῦ φωτὸς καὶ ἀνάμεσον τοῦ σκότους⁵⁴ *δράσεώς τε καὶ ἀκοῆς⁵⁵, οὕτως⁵⁶ κεχώρισται ἀνάμεσον ἀνδρὸς καὶ *ἀνδρός, καὶ ἀνάμεσον γυναικὸς καὶ⁵⁷ γυναικός⁵⁸, καὶ οὐκ ἔστιν εἰπεῖν ὅτι †*ἐν τῷ ἑνὶ τοῖς προσώποις ἡττόμενον ἦν †⁵⁹.
  language: Greek
translation:
  text: And just as there is a division between light and darkness, and between sight and hearing, so there is also a division between man and man, and between woman and woman; and it is not possible to say that in appearance one is inferior to another.
