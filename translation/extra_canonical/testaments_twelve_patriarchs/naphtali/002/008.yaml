  text: 8. *Πάντα ⌜γὰρ⌝⁶⁰ ἐν τάξει ἐποίησεν ὁ Θεὸς καλά· τὰς πέντε αἰσθήσεις ἐν τῇ κεφαλῇ *καὶ τὸν τράχηλον συνάψας τῇ κεφαλῇ⁶¹, *προσθεὶς αὐτῇ καὶ τρίχας εἰς εὐπρέπειαν καὶ δόξαν⁶², εἶτα⁶³ καρδίαν *εἰς φρόνησιν⁶⁴, κοιλίαν εἰς †διάκρισιν⁶⁵, *στόμαχον εἰς †ἀλεσμόν⁶⁶, †κάλαμον⁶⁷ πρὸς †ὑγείαν⁶⁸, ἧπαρ⁶⁹ πρὸς θυμόν, χολὴν πρὸς πικρίαν, ⌜καὶ⌝⁷⁰ *σπλῆνα πρὸς γέλωτα⁷¹, νεφροὺς ⌜εἰς πανουργίαν⁷², ψύας⁷³⌝ εἰς δύναμιν, *†πλευρὰν εἰς τὸ καθεύδειν†⁷⁴, ὀσφὺν⁷⁵ εἰς ἰσχύν, καὶ τὰ ἑξῆς.
  language: Greek
translation:
  text: 'For God made all things good in their order: the five senses in the head, and he joined the neck to the head; and he added hair for beauty, and the heart for understanding, the belly for excrement, the stomach for grinding, the windpipe for taking in air, the liver for anger, the gall for bitterness, the spleen for laughter, the kidneys for craftiness, the loins for strength, and the lungs for drawing in; and so the rest.'
