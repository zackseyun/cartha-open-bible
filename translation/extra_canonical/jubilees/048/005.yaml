translation:
  text: 'And the LORD executed a great vengeance on them for Israel: he struck them
    with blood, and with frogs, and with gnats, and with dog-flies, and with evil
    boils that burst out in blisters, and their livestock with death, and with hailstones—by
    this he destroyed everything that grew for them—and with locusts that devoured
    what had been left for them from the hail, and with darkness, and with the death
    of their firstborn, of man and beast; and on all their gods the LORD executed
    vengeance.'
  philosophy: optimal-equivalence
