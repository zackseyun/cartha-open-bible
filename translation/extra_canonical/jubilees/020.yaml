translation:
  text: '1. And in the forty-second jubilee, in the first year of the seventh week,
    Abraham called Ishmael and his twelve sons, and Isaac and his sons, and the six
    sons of Keturah and their children. And he commanded them to keep the way of the
    LORD, to do righteousness, and that each should love his brother, and that they
    should thus be among all people, each over against the other, to practice justice
    and righteousness on the earth.

    2. And that they should circumcise their sons according to the covenant that was
    established with them, and that they should not turn aside from this, neither
    to the right nor from any path that the LORD commanded; and that we should keep
    ourselves from all fornication and uncleanness, and that we should put away from
    among us every act of fornication and uncleanness. And if a woman belonging to
    you commits harlotry, or even a daughter, burn her with fire, and let them not
    commit fornication after their eyes and after their heart, and let them not take
    wives for themselves from the daughters of Canaan, for the seed of Canaan will
    be rooted out from the land. And he told them of the judgment of the Watchers,

    3. and the judgment of Sodom, how they were judged because of their wickedness,
    and because of fornication and uncleanness and corruption among themselves: by
    fornication they died. And you also, guard yourselves from all fornication and
    uncleanness and from every pollution of sin, so that you may not make your name
    a curse, and all your life a reproach, and all your sons perish by the sword,
    and you become accursed like Sodom, and all your remnant like the sons of Gomorrah.
    Listen to me, my children, and love

    4. the God of heaven, and cling to all his commandments, and do not walk after
    their idols and after their impurities. And do not make for yourselves molten
    gods or carved images, for they are emptiness, and there is no spirit in them;
    for they are the work of hands, and all who trust in them trust in nothing. Do
    not serve them, and do not bow down to them. But serve the God

    5. Most High, and bow down to him, and continually seek his face at all times,
    and do uprightness and righteousness before him, so that he may direct your way
    and give you mercy, and send down for you the rain of morning and evening, and
    bless all the work that you do on the earth, and bless your grain

    6. and your womb, and bless the seed of your body and the seed of your land, and
    the offspring of your cattle and the offspring of

    7. your flocks. And you will be for a blessing on the earth, and all the nations
    of the earth will desire you,

    8. and they will bless your children in my name, so that they may be blessed as
    I am. And he gave to Ishmael and to his sons and to the sons of Keturah gifts,
    and he sent them away from Isaac his son; but everything he gave

    9. to Isaac his son. And Ishmael and his sons and the sons of Keturah and their
    children went together and settled from Paran as far as the entrance of Babylon,
    in all the land that faces eastward toward

    10. the desert. And these mingled with those, and their name was called Arabs
    and Ishmaelites.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '20:1'
    text: The final clause is syntactically dense in Ge'ez. The sense appears to be
      that Abraham urged mutual love and a public life marked by justice and righteousness
      among all peoples.
    reason: segmentation_note
  - marker: '20:2'
    text: The phrase rendered 'circumcise their sons according to the covenant' is
      contextually inferred from the Abrahamic covenant formula; the wording is compressed
      in this witness.
    reason: lexical_alternative
  - marker: '20:2'
    text: The command about a woman or daughter who commits harlotry is severe and
      legal in tone; the Ge'ez is explicit about burning with fire.
    reason: cultural_note
  - marker: '20:2'
    text: '''The judgment of the Watchers'' refers to the punishment of the rebellious
      heavenly beings known from Enochic tradition.'
    reason: cross_reference
  - marker: '20:5'
    text: '''Rain of morning and evening'' may reflect the familiar agricultural blessing
      of timely rains, comparable to ''early and late rain.'''
    reason: lexical_alternative
  - marker: 20:8-9
    text: The sentence division is awkward in this chapter split. The sense is that
      Abraham gave gifts to Ishmael and Keturah's line, sent them away from Isaac,
      and gave the whole inheritance to Isaac.
    reason: segmentation_note
  - marker: '20:9'
    text: '''From Paran as far as the entrance of Babylon'' is translated fairly literally
      because the exact geographical nuance of the phrase is uncertain.'
    reason: textual_variant
  - marker: '20:10'
    text: The ethnographic notice explains the mixed descendants as coming to be called
      'Arabs and Ishmaelites.'
    reason: cultural_note
lexical_decisions:
- source_word: ኢዮቤልዉ
  chosen: jubilee
  alternatives:
  - Jubilee period
  lexicon: Ge'ez/chronological usage in Jubilees
  rationale: Preserves Jubilees's technical chronological framework rather than generalizing
    to an era or generation.
- source_word: ሳብዕ
  chosen: week
  alternatives:
  - heptad
  - week of years
  lexicon: Jubilees chronological idiom
  rationale: Within Jubilees, the numbered 'week' inside a jubilee refers to a week
    of years. The main text keeps the familiar term 'week' while the chapter context
    preserves the calendrical sense.
- source_word: ፍኖተ እግዚአብሔር
  chosen: the way of the LORD
  alternatives:
  - the path of the LORD
  lexicon: Common Semitic metaphor
  rationale: Retains covenantal and ethical force with recognizable biblical diction.
- source_word: ጽድቀ / ፍትሕ
  chosen: righteousness / justice
  alternatives:
  - justice / righteousness
  lexicon: Semitic ethical pair
  rationale: The pair is preserved distinctly rather than collapsed, since Jubilees
    often uses both terms for covenantal ethics.
- source_word: ቢጾ
  chosen: his brother
  alternatives:
  - his companion
  - his fellow
  lexicon: Ge'ez relational term
  rationale: '''Brother'' best preserves the familial-communal ethic in Abraham''s
    address to his descendants.'
- source_word: ይክስቡ ውሉዶሙ በኪዳን
  chosen: they should circumcise their sons according to the covenant
  alternatives:
  - mark their sons by the covenant
  lexicon: Contextual covenant idiom
  rationale: The verb is understood in context as covenantal circumcision, matching
    Abrahamic covenant language and the immediate subject matter.
- source_word: ዝሙት
  chosen: fornication
  alternatives:
  - sexual immorality
  - whoredom
  lexicon: Ge'ez moral vocabulary
  rationale: A strong sexual-ethics term is needed; 'fornication' preserves the gravity
    and specificity without flattening to a vague moralism.
- source_word: ርኵስ
  chosen: uncleanness
  alternatives:
  - impurity
  - defilement
  lexicon: Purity vocabulary
  rationale: Keeps the moral-purity register that pairs with sexual sin in Jubilees.
- source_word: ኵነኔሆሙ ለረዓይት
  chosen: the judgment of the Watchers
  alternatives:
  - the condemnation of the Watchers
  lexicon: Enochic/Jubilees terminology
  rationale: '''Watchers'' is the established rendering for the angelic beings in
    this literature and should be preserved.'
- source_word: ሙስና
  chosen: corruption
  alternatives:
  - perversion
  - depravity
  lexicon: Ge'ez moral term
  rationale: Conveys social and moral ruin without over-specifying the exact form
    beyond the context.
- source_word: ጣዖቶሙ
  chosen: their idols
  alternatives:
  - their images
  lexicon: Idolatry vocabulary
  rationale: Direct and standard rendering for false cult objects.
- source_word: ግልፈዋተ
  chosen: carved images
  alternatives:
  - graven images
  - sculpted idols
  lexicon: Image terminology
  rationale: Avoids archaic 'graven' while preserving the concrete crafted-object
    sense.
- source_word: ከንቱ
  chosen: emptiness
  alternatives:
  - vanity
  - nothingness
  lexicon: Polemic against idols
  rationale: Reflects the ontological emptiness of idols in accessible English.
- source_word: አምላከ ልዑለ
  chosen: the God Most High
  alternatives:
  - the Most High God
  lexicon: Divine title
  rationale: Translates the title rather than transliterating, in line with project
    philosophy.
- source_word: ትረ ወትስፈዉ ገጸ ዚአሁ
  chosen: continually seek his face
  alternatives:
  - seek his presence continually
  lexicon: Biblical idiom
  rationale: Preserves the personal and cultic idiom 'seek his face' while remaining
    readable.
- source_word: ዝናመ ነግሀ ወሰርከ
  chosen: the rain of morning and evening
  alternatives:
  - early and late rain
  lexicon: Agricultural blessing idiom
  rationale: The Ge'ez wording points literally to morning/evening; a footnote notes
    the possible idiomatic agricultural sense.
- source_word: ማኅፀነ
  chosen: your womb
  alternatives:
  - your offspring
  lexicon: Concrete bodily term
  rationale: Keeps the concrete fertility blessing rather than abstracting it.
- source_word: መራዕየ አልህምቲከ
  chosen: the offspring of your cattle
  alternatives:
  - the increase of your herds
  lexicon: Pastoral vocabulary
  rationale: Fits the fertility-blessing sequence and parallels the next line about
    flocks.
- source_word: ይፈትዉክሙ
  chosen: will desire you
  alternatives:
  - will favor you
  - will delight in you
  lexicon: Ge'ez verb of desire/love
  rationale: Preserves the strong sense that the nations will look on Abraham's line
    with longing or favor.
- source_word: ሀብተ
  chosen: gifts
  alternatives:
  - presents
  - property
  lexicon: Narrative vocabulary
  rationale: Matches the distribution of goods before sending away other sons, without
    importing Genesis wording too mechanically.
- source_word: ምብዋአ ባቢሎን
  chosen: the entrance of Babylon
  alternatives:
  - the approach to Babylon
  - the region toward Babylon
  lexicon: Topographical phrase
  rationale: A fairly literal rendering is preferable because the exact geographical
    nuance is uncertain.
- source_word: ተደመሩ
  chosen: mingled
  alternatives:
  - joined together
  - were mixed
  lexicon: Ethnographic/narrative term
  rationale: Preserves the sense of tribal amalgamation in the origin notice.
theological_decisions:
- issue: Covenant command in v.2 implies circumcision though the verb is not explicit
    in English tradition-free isolation
  chosen_reading: Rendered as 'they should circumcise their sons according to the
    covenant'
  alternative_readings:
  - they should bind their sons to the covenant
  - they should enroll their sons in the covenant
  rationale: In Abrahamic context, 'sons' plus 'covenant established with them' strongly
