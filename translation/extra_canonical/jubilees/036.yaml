translation:
  text: '1. And in the sixth year of this week, Isaac called his two sons, Esau and
    Jacob, and they came to him. And he said to them, “My sons, I am going on the
    way of my fathers, to the eternal house where my fathers are.

    2. And bury me near Abraham my father, in the cave in the field of Ephron the
    Hittite, which Abraham acquired for a burial place there. In the tomb which I
    dug for myself there, bury me.

    3. And this I command you, my sons: do righteousness and uprightness upon the
    earth, so that the LORD may bring upon you all that the LORD said he would do
    for Abraham and for his seed.

    4. And be, my sons, loving one another, each loving his brother as a man loves
    his own life, and let each seek for his brother what is good for him; and act
    together on the earth, and let them love one another as themselves.

    5. And concerning the matter of idols, I command you and exhort you that you should
    despise them and reject them, and that you should not love them, because they
    are full of error for those who worship them and for those who bow down to them.

    6. Remember, my sons, the LORD, the God of Abraham your father; and I also have
    been devoted to him in righteousness and in joy, so that he may multiply you and
    make your seed numerous like the stars of heaven in multitude, and plant you in
    the earth as a plant of righteousness that will not be uprooted for all generations
    forever.

    7. And now I will make you swear by a great oath—for there is no oath greater
    than it—by the glorious and honored and great and splendid and marvelous and mighty
    name of him who made the heavens and the earth and all things, that you will be
    those who fear him and those who worship him.

    8. And let each one love his brother with mercy and with righteousness, and let
    not a man desire evil against his brother from now and forever, all the days of
    your life, so that you may prosper in all your deeds and not be destroyed.

    9. But if there is one among you who devises evil against his brother, know from
    now on that everyone who devises evil against his brother will fall into his hand,
    and he will be cut off from the land of the living, and his seed will be blotted
    out from under heaven.

    10. And on the day of turmoil and cursing and wrath and anger, and with blazing,
    devouring fire, just as he burned Sodom, so he will burn his land and his city
    and everything that is his; and he will be erased from the book of the discipline
    of the children of men, and he will not ascend into the book of life, but into
    that which is appointed for destruction, and he will pass into the eternal curse,
    so that for all days they may denounce him in cursing and in execration and in
    wrath and in torment and in anger and in plagues and in everlasting disease.

    11. I declare and testify to you, my sons, according to the judgment that will
    come upon the man who wishes to do harm against his brother.

    12. And he divided all that he had between them on that day, and he gave the larger
    share to the one who was born first, and the tower and all that was around it,
    and all that Abraham had acquired at the Well of the Oath.

    13. And he said, “I give this larger share to the one who was born first.”

    14. And Esau said, “I sold it to Jacob, and I gave my birthright to Jacob; let
    it be given to him, and I have nothing to say about it, for it belongs to him.”

    15. And Isaac said, “May a blessing rest upon you, my sons, and upon your seed
    this day, because you have given me rest.

    16. And my heart has been gladdened concerning the birthright, that no violence
    was done because of it. May the Most High God bless

    17. the man who does righteousness, him and his seed forever.” And he finished
    commanding them and blessing them, and they ate and drank together before him
    and rejoiced,

    18. because there was harmony among them. And they went out from him and rested
    that day and slept. And Isaac slept on his bed that day rejoicing, and he slept
    the eternal sleep and died. He completed one hundred and eighty years, that is,
    twenty-five weeks and five years. And his two sons, Esau and Jacob, buried him.

    19. And Esau went to the land of Edom, to Mount Seir, and lived there.

    20. But Jacob dwelt on Mount Hebron, in the dwelling of the sojourning of Abraham
    his father, and he worshiped the LORD with all his heart and according to the
    commands as they were manifest,

    21. according to the way he knew from the days of his birth. And Leah his wife
    died in the fourth year of the second week of the forty-fifth jubilee, and he
    buried her in the double cave near Rebekah his mother,

    22. to the left of the grave of Sarah, his father’s mother. And all her sons and
    his sons came to mourn Leah his wife with him and to comfort him for her, because
    he was grieving for her.

    23. For he loved her exceedingly after Rachel her sister had died, because she
    was perfect and upright in all her ways and honored Jacob; and in all the days
    of her life with him he had not heard from her mouth a harsh word, because she
    was gentle and peaceable and upright and honorable.

    24. And he remembered all her deeds that she had done in her life, and he mourned
    for her greatly, because he loved her with all his heart and with all his soul.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '10'
    text: The clause 'he will be erased from the book of the discipline of the children
      of men' is textually difficult. The Ge'ez appears to distinguish this record
      from 'the book of life'; the exact nuance of the first book is uncertain.
    reason: textual_variant
  - marker: '10'
    text: The final sequence piles up near-synonymous curse terms. The translation
      preserves the accumulation rather than compressing it, because the rhetoric
      is part of the warning.
    reason: segmentation_note
  - marker: '12'
    text: '''The tower'' may refer to a specific estate feature included in Isaac''s
      holdings. The surrounding inheritance list is terse and may reflect a difficult
      underlying text.'
    reason: cultural_note
  - marker: '18'
    text: The age notice literally combines 180 years with the calendrical summary
      'twenty-five weeks and five years,' i.e., 25 weeks of years (175) plus 5 years.
    reason: cross_reference
  - marker: 20-21
    text: The sentence division here is somewhat uncertain in the extracted rows.
      The translation takes verse 21's opening as completing the thought about Jacob's
      manner of worship/life before moving to Leah's death notice.
    reason: segmentation_note
  - marker: '21'
    text: '''The double cave'' corresponds to the ancestral burial cave known from
      Genesis tradition as Machpelah.'
    reason: cross_reference
  - marker: '22'
    text: The phrase rendered 'all her sons and his sons' is awkward in English but
      likely distinguishes Leah's own sons and the wider household descendants who
      came to mourn.
    reason: lexical_alternative
lexical_decisions:
- source_word: ቤት ዘለዓለም
  chosen: the eternal house
  alternatives:
  - the everlasting house
  - the house of eternity
  rationale: Preserves the idiom for the grave/abode of the dead without flattening
    it to merely 'tomb'; keeps Jubilees' solemn eschatological tone.
- source_word: ጽድቀ / ርትዐ
  chosen: righteousness and uprightness
  alternatives:
  - justice and rectitude
  - righteousness and truth
  rationale: A standard paired ethical expression; 'uprightness' preserves moral straightness
    without overinterpreting as forensic justice.
- source_word: ጣዖት
  chosen: idols
  alternatives:
  - images
  - false gods
  rationale: Direct and conventional rendering for cultic objects; avoids interpretive
    expansion.
- source_word: ተቀነዩኩ ሎቱ
  chosen: I also have been devoted to him
  alternatives:
  - I have been zealous for him
  - I have attached myself to him
  rationale: The sense is Isaac's faithful attachment/devotion to God; 'devoted' is
    readable and preserves covenantal loyalty.
- source_word: ተክለ ጽድቅ
  chosen: a plant of righteousness
  alternatives:
  - a planting of righteousness
  - a righteous plant
  rationale: Keeps the agricultural metaphor explicit and close to the source.
- source_word: ኢትትሐጐሉ / ይትሐጐል
  chosen: be destroyed / be blotted out
  alternatives:
  - perish
  - be uprooted
  rationale: The chapter uses the root in contexts of removal and annihilation; English
    varies slightly by context but preserves the threat of total excision.
- source_word: መጽሐፈ ሕይወት
  chosen: the book of life
  alternatives:
  - the scroll of life
  rationale: Established apocalyptic idiom; preserves revelatory density.
- source_word: ተግሣጸ ውሉደ ሰብእ
  chosen: the book of the discipline of the children of men
  alternatives:
  - the book of the correction of the sons of men
  - the record of human judgment
  rationale: The phrase is difficult; 'discipline' keeps the lexical force of admonition/correction
    without collapsing it into a generic register.
- source_word: ዕበየ
  chosen: the larger share
  alternatives:
  - the greater portion
  - the senior share
  rationale: In context of inheritance and primogeniture, this likely denotes the
    firstborn's superior portion rather than abstract greatness.
- source_word: ልህቃን
  chosen: birthright
  alternatives:
  - right of the firstborn
  - inheritance right
  rationale: Best contextual equivalent in the Esau-Jacob setting; preserves the legal-familial
    significance.
- source_word: ዐርዮ
  chosen: harmony
  alternatives:
  - peace
  - friendliness
  rationale: Context indicates restored concord between Esau and Jacob at Isaac's
    deathbed meal.
- source_word: ንዋመ ዘለዓለም
  chosen: the eternal sleep
  alternatives:
  - everlasting sleep
  - sleep forever
  rationale: Retains the euphemistic but weighty idiom for death.
- source_word: ኢዮቤል
  chosen: jubilee
  alternatives:
  - Jubilee cycle
  rationale: Required calendrical term in Jubilees; must be preserved explicitly.
- source_word: በዓተ ዘእንተ ክልኤ
  chosen: the double cave
  alternatives:
  - the cave of Machpelah
  - the twofold cave
  rationale: The Ge'ez expression points to the doubled cave; main text stays close
    to source, with the Genesis identification left implicit.
- source_word: ቃለ ድሩከ
  chosen: a harsh word
  alternatives:
  - a rude word
  - an angry word
  rationale: Captures the moral characterization of Leah's speech without archaic
    diction.
theological_decisions:
- issue: Divine name rendering for እግዚአብሔር
  chosen_reading: the LORD
  alternative_readings:
  - God
  - the Lord
  rationale: Follows project doctrine for covenantal divine-name language and matches
    the elevated patriarchal discourse of Jubilees.
  doctrine_reference: 'DOCTRINE.md: YHWH -> the LORD'
- issue: Apocalyptic register in verse 10
  chosen_reading: Retained 'book of life' and related book imagery with strong curse
    language
  alternative_readings:
  - Smoother paraphrase into generic judgment language
  rationale: Jubilees uses revelatory record-book imagery and cumulative curse formulas;
    these should remain dense rather than be flattened.
- issue: Ethical warning against brother-hatred
  chosen_reading: Rendered as concrete evil devised against 'his brother'
  alternative_readings:
  - neighbor
  - kinsman
  rationale: In context Isaac addresses Esau and Jacob and their descendants; preserving
    'brother' maintains both literal and covenant-family force.
