  - marker: '3'
    text: The final clause of v.3 is textually difficult in this segmentation. The
      sense appears to be an urgent demand to bring the youngest brother back at once
      so the matter may be judged; the exact idiom is uncertain.
    reason: segmentation_note
  - marker: '10'
    text: The phrase rendered 'God forbid that I should fear this' is difficult. The
      broader sense is Joseph's emphatic refusal of the brothers' proposal that all
      become slaves, followed by his insistence that only the one found with the cup
      will remain.
    reason: textual_variant
  - marker: '13'
    text: 'This verse is compressed and somewhat irregular in the transmitted Ge''ez.
      The translation preserves the main sense: Judah offers himself in place of the
      boy and explains his obligation to his father.'
    reason: segmentation_note
  - marker: '16'
    text: The clause 'they did not recognize him' may reflect either continued astonishment
      or delayed full recognition in the midst of Joseph's disclosure.
    reason: alternative_reading
  - marker: '19'
    text: The phrase rendered 'for preservation' could also be understood more specifically
      as 'for a remnant' or 'for survival.'
    reason: lexical_alternative
  - marker: '23'
    text: '''Colored garments'' may also mean distinguished or varied garments rather
      than specifically multicolored clothing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ሕሊና
  chosen: thought / plan
  alternatives:
  - mind
  - intention
  lexicon: Ge'ez contextual
  rationale: 'Used twice in v.1 with slightly different force: Joseph''s own deliberation
    is best rendered ''considered a plan,'' while the brothers'' inner disposition
    is ''thought'' or ''intention.'' This preserves the psychological testing motif
    without flattening the repetition.'
- source_word: ሰላም
  chosen: peace
  alternatives:
  - well-being
  - harmony
  lexicon: Ge'ez contextual
  rationale: Retained as 'peace' in v.1 to preserve the moral-relational question
    of whether the brothers are now at peace among themselves.
- source_word: አሕስሊ / ሐስል
  chosen: sack
  alternatives:
  - bag
  - grain-bag
  lexicon: Ge'ez contextual
  rationale: Rendered consistently as 'sack' in the Joseph narrative context, matching
    storage bags for grain while remaining readable.
- source_word: ኮራ
  chosen: cup
  alternatives:
  - goblet
  lexicon: Ge'ez contextual
  rationale: '''Cup'' is the most natural English equivalent and preserves the narrative
    link to drinking and divination claims.'
- source_word: ብሩር
  chosen: silver
  alternatives:
  - silver money
  lexicon: Ge'ez contextual
  rationale: Standard rendering for the metal; where context implies currency, English
    syntax supplies that sense.
- source_word: ተአንዞሙ
  chosen: overtake them
  alternatives:
  - catch up with them
  - pursue them
  lexicon: Ge'ez contextual
  rationale: Best fits the steward's pursuit in v.3 and keeps the urgency of Joseph's
    command.
- source_word: ህየንተ ሠናይት ... እኩየ
  chosen: repaid me evil for good
  alternatives:
  - returned evil instead of kindness
  lexicon: Ge'ez contextual
  rationale: Preserves the moral accusation formula familiar in biblical idiom without
    over-paraphrase.
- source_word: ትቀነይ / ቅኔየ
  chosen: slave
  alternatives:
  - servant
  lexicon: Ge'ez contextual
  rationale: In vv.6 and 10 the bonded status is explicit and coercive, so 'slave'
    better reflects the force of the term in line with project philosophy.
- source_word: አገሰ አፈረሀ
  chosen: God forbid
  alternatives:
  - far be it from me
  - may God spare me
  lexicon: Ge'ez idiomatic
  rationale: An idiomatic repudiation in v.10; 'God forbid' preserves the oath-like
    recoil without wooden literalism.
- source_word: ያስተቀስም
  chosen: divines
  alternatives:
  - practices divination
  - reads omens
  lexicon: Ge'ez contextual
  rationale: In v.10 the claim concerns cup-divination. 'Divines' is concise and preserves
    the revelatory/occult nuance without endorsing its truth.
- source_word: እስርት እምነፍስዝ
  chosen: his life is bound up with this one's life
  alternatives:
  - his soul is tied to his soul
  lexicon: Ge'ez contextual
  rationale: This keeps the strong relational idiom in v.12 while using natural English.
- source_word: ዕሩይ
  chosen: united
  alternatives:
  - harmonious
  - made one
  lexicon: Ge'ez contextual
  rationale: In v.14 it describes the brothers' heart-disposition toward one another;
    'united' captures the reconciled solidarity Joseph is testing for.
- source_word: ልሳነ ዕብራይስጥ
  chosen: the Hebrew language
  alternatives:
  - Hebrew
  - the language of the Hebrews
  lexicon: Ge'ez contextual
  rationale: Rendered explicitly in v.15 to preserve Jubilees's ethnolinguistic note.
- source_word: ዐባር
  chosen: famine
  alternatives:
  - hunger
  - dearth
  lexicon: Ge'ez contextual
  rationale: The chapter's repeated crisis term is best rendered 'famine,' the standard
    English term for prolonged food scarcity.
- source_word: ለሠሪዕ
  chosen: for preservation
  alternatives:
  - for a remnant
  - for survival
  lexicon: Ge'ez contextual
  rationale: In v.19 the phrase points to God's prior sending of Joseph to preserve
    life. 'For preservation' keeps the purpose broad and avoids importing a narrower
    technical 'remnant' unless the text requires it.
- source_word: እንተ አቡሁ ለፈርዖን
  chosen: as a father to Pharaoh
  alternatives:
  - like a father to Pharaoh
  - as counselor to Pharaoh
  lexicon: Ge'ez contextual
  rationale: Retains the striking metaphor in v.20 rather than reducing it to a mere
    administrative title.
- source_word: አልባሰ ኅብር
  chosen: colored garments
  alternatives:
  - varied garments
  - festal garments
  lexicon: Ge'ez contextual
  rationale: The phrase suggests garments of distinction or variety; 'colored garments'
    preserves the concrete sense without over-specifying.
- source_word: ይበፍር ስርናየ
  chosen: was distributing grain
  alternatives:
  - selling grain
  - providing grain
  lexicon: Ge'ez contextual
  rationale: In v.24 the verb points to Joseph's active administration of grain to
    the nations; 'distributing' captures the broad provisioning role.
- source_word: ተሐደሰት ሕይወተ መንፈሱ
  chosen: the life of his spirit was renewed
  alternatives:
  - his spirit revived
  - his life-breath was restored
  lexicon: Ge'ez contextual
  rationale: Preserves the vivid anthropological expression in v.25 while remaining
    intelligible in English.
theological_decisions:
- issue: Joseph's claim to divine by the cup
  chosen_reading: Rendered as Joseph's stated claim ('a man surely divines with his
    cup, as I do') without implying that the narrator endorses actual divination.
  alternative_readings:
  - Treat as a mere ruse with no occult implication
  - Translate more weakly as 'learns by means of' the cup
  rationale: The Ge'ez wording naturally refers to divination. Jubilees can report
    speech within the story without approving it. Preserving the claim maintains narrative
    tension and source fidelity.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve
    it
- issue: '''A father to Pharaoh'' in v.20'
  chosen_reading: Kept the metaphor 'as a father to Pharaoh.'
  alternative_readings:
  - advisor to Pharaoh
  - benefactor to Pharaoh
  rationale: The source preserves a bold relational metaphor. Reducing it to an office
    title would flatten the text's theological and political density.
  doctrine_reference: DOCTRINE.md §Original-language primacy over translation tradition
