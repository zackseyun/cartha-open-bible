translation:
  text: '1. And Joseph considered a plan by which he might know their thoughts, whether
    there was a thought of peace among them. And he said to the man who was over his
    house, “Fill all their sacks with grain, and put each man’s money in the middle
    of his bag; and put my silver cup, the cup from which I drink, in the sack of
    the youngest.” And he sent them away.

    2. And he did as Joseph told him, and filled all their sacks with grain and their
    money, and he put it in their sacks; and he put the cup in Benjamin’s sack. And
    when morning dawned, they went away.

    3. And it happened, when they had gone out from there, Joseph said to the man
    of his house, “Get up, run after them, and overtake them, saying, ‘Why have you
    repaid me evil for good? You have stolen the silver cup from which my lord drinks,
    and you have put blame on your youngest brother. Quickly bring him, so that I
    may not enter into judgment.’”

    4. And he ran after them and spoke to them according to this word. And they said
    to him, “Far be it from your servants to do this thing, and to steal from your
    lord’s house anything, whether silver or gold. The money that we found before
    in our sacks we brought back to your servants from the land

    5. of Canaan. How then should we steal anything? Look, we and our sacks—search
    them. And with whomever you find the cup in the sack of any one man among us,
    let him be put to death; and we and our donkeys also will become slaves to our
    lord.”

    6. And he said to them, “Not so. The man with whom you find it—he alone

    7. shall be taken as a slave, and you may go in peace to your houses.” And while
    they were searching in their goods, beginning with the eldest and finishing with
    the youngest, it was found in Benjamin’s sack.

    8. And they tore their garments, and loaded their donkeys, and returned to the
    city.

    9. And they came to Joseph’s house and all of them fell before him with their
    faces to the ground. And Joseph said to them, “You have done evil.” And they said,
    “What shall we say, and how shall we clear ourselves? Our lord has found the guilt
    of

    10. his servants. Look, we are slaves to our lord, we and our donkeys also.” And
    Joseph said to them, “God forbid that I should fear this. You, go to your houses;
    but your youngest brother shall become my slave, because you have done evil. Did
    you not know that a man surely divines with his cup, as I do with this cup? Yet
    you stole it from me.”

    11. And Judah said, “I beg you, my lord, let your servant speak a word in my lord’s
    hearing. Our father, your servant, had two sons from one mother. One went out
    and was lost, and no one has found him; and this one alone remains from his mother,
    and your servant,

    12. our father, loves him, and his life is bound up with this one’s life. And
    it will happen, when we go to your servant our father, if he is not with us, that
    the old man will die, and we will bring down our father in sorrow to death.

    13. And I, your servant, became surety in place of the boy as a slave to my lord,
    so that the old man might remain with his brothers, because I received him from
    his mother for your servant our father. And if I do not bring him back, your servant
    will bear our father’s blame all our days.”

    14. And Joseph saw that the heart of all of them was united, each man with the
    other, for good; and he wept,

    15. and restrained himself no longer, and told them that he was Joseph. And he
    spoke with them in the Hebrew language.

    16. And he embraced their necks and wept, but they did not recognize him, and
    they also wept. And he said to them,

    17. “Do not weep over me, but hurry and bring my father to me, and you shall see
    that my mouth is speaking, and the eyes of my brother Benjamin see it. For look,
    there are still five years of famine remaining,

    18. and there is no plowing, and no fruit of trees, and no harvest.

    19. Hurry, go down, you and your households, so that you may not be consumed by
    the famine and not perish because of your possessions. For for preservation God
    sent me before you, so that he might keep alive

    20. a numerous people. And tell my father that I am still alive, and look, you
    yourselves see that God has made me as a father to Pharaoh, and as ruler in his
    house,

    21. and over all the land of Egypt. And tell my father all my honor and all the
    greatness that God has given me in wealth and glory.”

    22. And by the command of Pharaoh he gave them wagons and provisions for the journey.

    23. And he gave all of them colored garments and silver. And to their father also
    he sent garments and silver,

    24. and ten donkeys carrying grain. And he sent them away. And they went up and
    told their father that Joseph was alive, and that he was distributing grain to
    all the peoples of the earth and ruling

    25. over all the land of Egypt. And their father did not believe, for his mind
    was stunned. But when he saw the wagons that Joseph had sent, the life of his
    spirit was renewed, and he said, “This is enough for me, if Joseph is alive. I
    will go down and see him before I die.”'
