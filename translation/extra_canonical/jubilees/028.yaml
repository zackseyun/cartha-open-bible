    geez: ሊተ፡ ቤተ፡ እስመ፡ ፈጸምኩ፡ ዓመታተ፡¹⁴ ዘተቀነይኩ፡ ለከ፡ ህየንተ፡ ክልኤቲ፡ አዋልዲከ፡ ወአሐውር፡
  - verse: 53
    geez: ቤተ፡ አቡየ። ወይቤሎ፡ ላባ፡ ለያዕቆብ፡ *ንበር፡ ኀቤየ፡¹⁵ በዐስብከ፡ ወረዐይ፡ ሊተ፡ ካዕበ፡ መርዔትየ፡
  - verse: 54
    geez: '*ወንሣእ፡ ዐስበከ።¹⁶ ወተካሀሉ፡¹⁷ በበይናቲሆሙ፡ ከመ፡ የሀቦ፡ ዐስቦ፡ *ኵሎ፡ በግዐ፡¹⁸ እመሐስዕ፡'
  - verse: 55
    geez: ወእምአጣሊ፡¹⁹ *ዘቦ፡ ሐመደ፡²⁰ ወጋሰ፡²¹ ወ²²ጸዐዳ፡²³ ዘተወልደ፡ ይኩኖ፡ ዐስቦ። ወይወልዱ፡²⁴
  - verse: 56
    geez: '*ኵሉን፡ አባግዕ፡²⁵ ጋሴ፡²¹ *ወዘቦ፡ ትእምርተ፡ ኵስኵሰ፡²⁶ *ወዘቦ፡ ሐመደ፡ ኵስኵሰ፡²⁷ ወይደግማ፡'
  - verse: 57
    geez: አባግዐ፡ ይለዳ፡ ዘበአርአያሆን፡ ወኵሉ፡ ዘ²⁸ትእምርት፡ ለያዕቆብ፡ ወዘአልቦ፡ ትእምርት፡ ለላባ።²⁹
  - verse: 58
    geez: ወበዝኅ፡ ጥሪቱ፡ ለያዕቆብ፡ ጥቀ፡ ወአጥረየ፡ *አልህምተ፡ ወአባግዐ፡³⁰ ወአእዱገ፡ ወአገማለ፡
  - verse: 59
    geez: ወደቀ፡³¹ ወአዋልደ። ወቀንአ፡ ላባ፡ ወውሉዱ፡ ላዕለ፡ ያዕቆብ፡ ወአስተጋብአ፡ ላባ፡ አባግዒሁ፡
  - verse: 60
    geez: እምኔሁ፡ ወአስተሐየጸ፡³² ለ³³እኩይ።
  - verse: 61
    geez: ወኮነ፡ እምዘ፡ ወለደት፡ *ራሔል፡ ዮሴፍሃ፡³⁴ ወሖረ፡ ላባ፡ ይቅርጽ፡ አባግዒሁ፡ *እስመ፡ ርሑቅ፡
  - verse: 62
    geez: ሀሎ፡ እምኔሁ፡³⁵ ምሕዋረ፡ ሠሉስ፡ ዕለት። ወርእየ፡ ያዕቆብ፡ ከመ፡ የሐውር፡ ላባ፡ ይቅርጽ፡
  - verse: 63
    geez: አባግዒሁ፡ ወጸውዖን፡ ያዕቆብ፡¹⁸ ለሊያ፡³⁶ ወለራሔል፡ ወተናገረ፡ ውስተ፡ ልቦን፡ ከመ፡ ይምጽኣ፡ ምስ
  - verse: 64
    geez: ሌሁ፡ ምድረ፡ ከናአን። እስመ፡ ነገሮን፡ *ዘከመ፡ ርእየ፡ ኵሎ፡ በህልም፡³⁷ ወኵሎ፡ ዘተናገረ፡ ሎቱ፡³⁸
