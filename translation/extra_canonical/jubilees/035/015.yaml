translation:
  text: their uncleanness and after their error, he and his children. And you tell
    me to make him swear that he will not kill his brother Jacob. Even if he swears,
    he will not keep his oath, nor will he do good, but only evil. And if he desires
    to kill Jacob his brother, he will be given into Jacob’s hand, and he will not
    escape from his hand, for he will fall into his hand.
