translation:
  text: And Tidal, king of nations, and they killed the king of Gomorrah and drove
    away the king of Sodom, and many fell into the bitumen pits in the valley of Siddim
    by the Salt Sea. And they took Sodom and Admah and Zeboiim, and they took Lot
    also, Abram’s brother’s son, and all his possessions, and they went as far as
    Dan.
