translation:
  text: '1. And it came to pass after Jacob died, the sons of Israel increased in
    the land of Egypt, and they became a numerous people; and they were all of one
    accord, each loving his brother, and a man helping his brother. And they increased
    abundantly and grew strong throughout all the days of Joseph''s life, for ten
    weeks of years.

    2. And there was no adversary and nothing evil through all the days of Joseph''s
    life after the death of his father Jacob, because all Egypt honored

    3. the sons of Israel throughout all the days of Joseph''s life. And Joseph died
    at the age of one hundred and ten years: seventeen years he lived in the land
    of Canaan, and ten years while he was serving, and three years in the prison-house,
    and eighty years

    4. under the king, ruling over all the land of Egypt. And he died, and all his
    brothers,

    5. and all that generation. And before he died he commanded the sons of Israel
    that they should carry

    6. his bones in the day when they went out from the land of Egypt. And he made
    them swear concerning his bones, for he knew that the Egyptians would not again
    bring out and bury him in the land of Canaan. For Makmaron, king of Canaan, while
    dwelling in the land of Assyria, fought in the valley with the king of

    7. Egypt and killed him there; and he pursued after the Egyptians as far as the
    entrance of Eromon. But he could not enter, because another new king had arisen
    for Egypt, stronger than he, and he took possession of the land of Canaan and
    shut the gate of Egypt, and there was none who went out and none who came in to
    Egypt.

    8. And Joseph died in the forty-sixth jubilee, in the sixth week of years, in
    the second year; and they buried him

    9. in the land of Egypt. And all his brothers died after him. And the king of
    Egypt went out to fight with the king of Canaan in the forty-seventh jubilee,
    in the second week of years, in the second year; and the sons of Israel brought
    out all the bones of the sons of Jacob, except the bones of Joseph, and they buried
    them in the field in the double cave in the mountain,

    10. and many returned to Egypt, but a few of them remained in the mountain of

    11. Hebron; and your father Amram remained with them. And the king of Canaan prevailed
    over the king of Egypt

    12. and shut the gate of Egypt. And he devised an evil plan against the sons of
    Israel, so as

    13. to afflict them, and he said to the people of Egypt, ''Look, the people of
    the sons of Israel are more and stronger than we are. Come, let us deal wisely
    with them before they multiply, and let us afflict them with deceit, lest war
    come upon us and they also join themselves to our enemies and go out from our
    land, for their hearts and their faces are toward the land of Canaan.''

    14. And he appointed over them taskmasters so that they might afflict them with
    oppression, and they built fortified cities for Pharaoh: Pithom and Raamses. And
    they built all the walls and all the embankments that had fallen

    15. in the land of Egypt. And they made them serve by force, and the more they
    imposed measure upon them, so much the more

    16. they increased and so much the more they multiplied. And the Egyptians made
    the sons of Israel abominable.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: v1
    text: Literally 'ten weeks of years,' i.e., seventy years, throughout Joseph's
      lifetime after Jacob's death.
    reason: cultural_note
  - marker: v6-7
    text: The names 'Makmaron' and 'Eromon' are difficult and may reflect forms of
      place or royal names preserved in Ethiopic transmission.
    reason: textual_variant
  - marker: v9
    text: '''The double cave'' likely refers to the cave of Machpelah near Hebron;
      the Ge''ez here uses a descriptive expression rather than the familiar Hebrew
      place-name.'
    reason: cross_reference
  - marker: v10-11
    text: The clause about those who remained at Hebron and 'your father Amram' is
      abrupt in context, likely because the book continues addressing Moses within
      the Sinai revelation framework.
    reason: segmentation_note
  - marker: v14
    text: The Ge'ez says 'fortified cities' rather than the more traditional English
      'store-cities.'
    reason: lexical_alternative
  - marker: v14-15
    text: The phrase about building 'all the walls and all the embankments that had
      fallen' is textually difficult; it may refer broadly to reconstruction works
      throughout Egypt.
    reason: segmentation_note
  - marker: v16
    text: The final verb is difficult; the sense is that the Egyptians came to regard
      the Israelites with loathing or contempt.
    reason: lexical_alternative
lexical_decisions:
- source_word: ዕሩያነ በአልቦሙ
  chosen: of one accord
  alternatives:
  - upright among themselves
  - in harmony together
  rationale: The phrase describes internal solidarity among the Israelites, immediately
    explained by mutual love and help. 'Of one accord' preserves communal unity without
    over-literal awkwardness.
- source_word: ፈድፋደ
  chosen: increased abundantly
  alternatives:
  - multiplied greatly
  - overflowed
  rationale: A strong multiplication term; 'increased abundantly' preserves the intensification
    and echoes the fertility language of the context without simply copying Exodus
    wording.
- source_word: ጥቀ
  chosen: grew strong
  alternatives:
  - became mighty
  - prevailed
  rationale: The term complements numerical increase with strength. 'Grew strong'
    is natural English and keeps the distinction from mere multiplication.
- source_word: ሰይጣን
  chosen: adversary
  alternatives:
  - Satan
  - accuser
  rationale: In this context the statement is broad—'there was no adversary and nothing
    evil'—and need not specify the personal name Satan. 'Adversary' preserves the
    lexical sense while fitting the paired expression.
- source_word: ይትቀነይ
  chosen: was serving
  alternatives:
  - was sold
  - was in servitude
  rationale: 'The context divides Joseph''s life into periods: Canaan, service, prison,
    and rule. ''Was serving'' best captures his period in bondage/household service
    without over-specifying beyond the Ge''ez.'
- source_word: ቤተ ሞቅሕ
  chosen: prison-house
  alternatives:
  - house of confinement
  - prison
  rationale: A slightly formal rendering preserves the concrete institutional sense
    and the narrative density of Jubilees.
- source_word: አምሐሎሙ
  chosen: made them swear
  alternatives:
  - adjured them
  - bound them by oath
  rationale: The verb indicates imposing an oath. 'Made them swear' is clear modern
    English and preserves the solemnity.
- source_word: አይድኅሙ
  chosen: would not again bring out
  alternatives:
  - would never bring out
  - would not bring up
  rationale: The clause concerns future removal of Joseph's remains from Egypt. 'Bring
    out' matches exodus language and the Ethiopic sense.
- source_word: አንቀጸ ግብጽ
  chosen: the gate of Egypt
  alternatives:
  - the entrance of Egypt
  - the border-gate of Egypt
  rationale: Jubilees uses a concrete border-access image. 'Gate of Egypt' preserves
    the metaphor and geopolitical feel.
- source_word: ኢዮቤልው
  chosen: jubilee
  alternatives:
  - jubilee cycle
  rationale: Calendrical terminology is central in Jubilees and should be preserved
    explicitly.
- source_word: ሱባዔ
  chosen: week of years
  alternatives:
  - week
  - heptad
  rationale: In Jubilees' chronological system this refers to a seven-year unit, not
    a seven-day week. The fuller phrase avoids ambiguity.
- source_word: ገዳም
  chosen: field
  alternatives:
  - open country
  - wilderness
  rationale: In the burial context with the following 'double cave,' the sense is
    best taken as the tract/field associated with the cave rather than desert wilderness.
- source_word: በዐት ዘካዕበት
  chosen: the double cave
  alternatives:
  - Machpelah cave
  - the cave of doubling
  rationale: The Ge'ez is descriptive rather than simply a proper name here. 'The
    double cave' preserves the literal sense while allowing recognition of Machpelah
    in a footnote/cross-reference.
- source_word: ሞአ
  chosen: prevailed over
  alternatives:
  - defeated
  - was stronger than
  rationale: The verb indicates military superiority. 'Prevailed over' is broad enough
    for the context and avoids overprecision where the exact nuance is uncertain.
- source_word: ቅኔ
  chosen: deceit
  alternatives:
  - craft
  - guile
  - oppression
  rationale: In v.13 the king proposes shrewd hostile policy; in v.14 the same word
    shifts into oppressive treatment. The semantic field includes cunning strategy.
    I rendered according to immediate context and documented the variance.
- source_word: ሊቃነ ግብር
  chosen: taskmasters
  alternatives:
  - chiefs of labor
  - overseers of forced labor
  rationale: This is the natural English equivalent for officials set over labor gangs,
    and it fits the Exodus-like oppression context.
- source_word: አህጉረ ጽኑዓተ
  chosen: fortified cities
  alternatives:
  - strong cities
  - store-cities
  rationale: The Ge'ez emphasizes strength/fortification. I avoided importing the
    traditional 'store-cities' unless the source explicitly required it.
- source_word: ጥቆመ
  chosen: walls
  alternatives:
  - masonry
  - structures
  rationale: The term appears in a building context paired with embankments/ruins.
    'Walls' is the most plausible concrete rendering.
- source_word: ዐረፋተ
  chosen: embankments
  alternatives:
  - ruins
  - earthworks
  - ramparts
  rationale: The construction context suggests built features or collapsed works.
