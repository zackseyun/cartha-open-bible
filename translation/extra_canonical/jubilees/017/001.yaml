translation:
  text: And the Lord knew that Abraham was faithful in all his trials; for he had
    tested him in his country, and with famine, and had tested him through the wealth
    of kings, and again had tested him through his wife when she was taken away, and
    through circumcision, and had tested him through Ishmael and Hagar his maidservant
    when he sent them away. And in everything by which he had tested him, he was found
    faithful, and his soul was not impatient, and he did not delay in acting; for
    he was faithful and a lover of the Lord.
  philosophy: optimal-equivalence
