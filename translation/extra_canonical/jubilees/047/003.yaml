translation:
  text: And they kept throwing them in for seven months, until the day when you were
    born. And your mother hid you for three months, and they became aware of her because
    of you. And she made for you a basket, and coated it with pitch and asphalt, and
    placed it among the reeds by the bank of the river, and put you in it for seven
    days. And your mother came by night and nursed you, and by day Miriam your sister
    guarded you from the birds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '3'
    text: The phrase about Miriam likely means she guarded the child by day, specifically
      from birds or other danger near the riverbank.
