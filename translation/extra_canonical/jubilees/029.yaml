  - verse: 1
    geez: ወኮነ፡ እምዘ፡ ወለደት፡ *ራሔል፡ ዮሴፍሃ፡³⁴ ወሖረ፡ ላባ፡ ይቅርጽ፡ አባግዒሁ፡ *እስመ፡ ርሑቅ፡ ሀሎ፡ እምኔሁ፡³⁵
      ምሕዋረ፡ ሠሉስ፡ ዕለት።
  - verse: 2
    geez: ወርእየ፡ ያዕቆብ፡ ከመ፡ የሐውር፡ ላባ፡ ይቅርጽ፡ አባግዒሁ፡ ወጸውዖን፡ ያዕቆብ፡¹⁸ ለሊያ፡³⁶ ወለራሔል፡ ወተናገረ፡
      ውስተ፡ ልቦን፡ ከመ፡ ይምጽኣ፡ ምስ ሌሁ፡ ምድረ፡ ከናአን።
  - verse: 3
    geez: እስመ፡ ነገሮን፡ *ዘከመ፡ ርእየ፡ ኵሎ፡ በህልም፡³⁷ ወኵሎ፡ ዘተናገረ፡ ሎቱ፡³⁸ ከመ፡ ይግባእ፡ ቤተ፡¹ አቡሁ፡
      ወይቤሎ፡ ሖውር፡ ውስተ፡ ኵሉ፡ መካን፡ ወአይ፡² ተሐውር፡
  - verse: 4
    geez: ምስሌከ። ወባረኮ፡ ያዕቆብ፡ አምላከ፡ *ይስሐቅ፡ አቡሁ፡³ ወአምላከ፡ አብርሃም፡ *አበ፡⁴ አቡሁ፡ ወተንሥአ፡ ወጸዐ፡
      አኅቲያሁ፡ ወውሉዱ፡ ወኵሎ፡ ጥሪተ፡ ነሥአ፡⁵ ወዐደወ፡ ፈለገ፡ ወበጽሐ፡
  - verse: 5
    geez: ምድረ፡⁶ ገለአድ፡⁷ ወኀብአ፡⁸ ያዕቆብ፡ ልቦ፡⁹ ላባን፡ ወአነገሮ። ወበሳብዕ፡ ዓም፡ ዘሱባዔ፡ ራብዕ፡ ተመይጠ፡ ያዕቆብ፡
      ገለአድሃ፡¹⁰ በቀዳሚ፡ ወርኅ፡ አመ፡ ፳ሥራሁ፡ ወአሚሩ፡ ወደገኖ፡ ላባ፡ ድኅሬሁ፡ ወረከቦ፡ ለያዕቆብ፡ በደብረ፡ ገላአድ፡
      በወርኅ፡ ሣልስ፡ አመ፡ *፲ሡሩ፡ ወሠሉሱ፡¹¹
  - verse: 6
    geez: ወኢኀደጎ፡ እግዚአብሔር፡ ከመ፡ ይሕስም፡ ላዕለ፡ ያዕቆብ፡ እስመ፡¹² አስተረአዮ፡ በሕልም፡
  - verse: 7
    geez: ሌሊተ፡¹³ ወነገሮ፡ ላባ፡¹⁴ ለያዕቆብ። ወአመ፡ *፲ሡሩ፡ ወኀሙሱ፡¹⁵ ለውእቱ፡ መዋዕል፡ ገብረ፡ ያዕቆብ፡ ግዝአ፡
      ለላባ፡ ወለኵሎሙ፡ እለ፡ መጽኡ፡ ምስሌሁ፡ ወመሐለ፡ ያዕቆብ፡ ለላባ፡ በዛቲ፡ ዕለት፡ ወላባሂ፡ ለያዕቆብ፡ ከመ፡ ኢይትዐደዉ፡
      አሐዱ፡ ኀበ፡ ካልኡ፡¹⁶ በእኩይ፡ *በደብረ፡
  - verse: 8
    geez: ገለአድ።¹⁷ ወገብረ፡ ህየ፡ ፍሥሐተ፡ ለስምዐ፡ በእንተዝ፡ ተጸውዐ፡ ስሙ፡ ለውእቱ፡ መካን፡
  - verse: 9
    geez: ፍሥሐተ፡ ስምዐ፡ ከመዝ፡ ፍሥሐት። ወቀዲሙሰ፡ ይጼውዕዎ፡¹⁸ ለምድረ፡ ገለአድ፡⁷ ምድረ፡ ራፋኤል፡¹⁹ እስመ፡ ምድረ፡
      ረፋኤም፡²⁰ ይእቲ፡ ወትወልዱ፡²¹ ራፋኤም፡²² ረዐይት፡ እለ፡ ፲ሥር፡ በአመት፡ ወትስዕ፡²³ በአመት፡ ወስምን፡²⁴ በአመት፡²⁵
      ወእስከ፡²⁶ ስብዕ፡ በአመት፡ ውእቱ፡
  - verse: 10
    geez: ኑኖሙ። ወመኃድሪሆሙ፡ እምነ፡ ምድረ፡²⁷ ውሉደ፡ አሞን፡ እስከ፡²⁸ ደብረ፡ ሔርሞን፡ ወቤተ፡
  - verse: 11
    geez: መንግሥቶሙ፡ ቃራናኤም፡²⁹ ወአስጠሮስ፡³⁰ ወአድራእ፡³⁰ ወሚሱር፡³¹ ወቤዎን፡።³² ወአሕጐሎሙ፡ እግዚአብሔር፡ እምእኩየ፡³³
      ምግባሮሙ፡ እስመ፡ ጸዋጋን፡ ጥቀ፡ እሙንቱ፡ *ወአኅደረ፡ አሞሬዎነ፡³⁴ ህየንቴሆሙ፡ *እኩየ፡ ወኃጥአ፡³⁵ ወአልቦ፡ ሕዝበ፡
      ዮም፡ ዘፈጸመ፡ ኀጣውኢሆሙ፡ ኵሎ፡ ወአልቦሙ፡
  - verse: 12
    geez: '*እንከ፡ ኑኀ፡ ሕይወት፡ ውስተ፡³⁶ ምድር። ወፈነወ፡ ያዕቆብ፡ ላባሃ፡³⁷ ወሖረ፡ ውስተ፡³⁸ ሜስጶ'
  - verse: 13
    geez: ጦሚያ፡ ምድረ፡ ጽባሕ፡ ወያዕቆብሂ፡ ተመይጠ፡ ምድረ፡ ገለአድ።⁷ ወትዐደወ፡ ኢያቦክሃ፡³⁹ በታስዕ፡ ወርኅ፡ *አመ፡
      ፲ሡሩ፡ ወአሚሩ፡ ወበዝ፡ ዕለት፡⁴⁰ በጽሑ፡ ኀቤሁ፡ ዔሳው፡ እኁሁ፡ ወተኂነኖ፡⁴¹
  - verse: 14
    geez: ወሖረ፡ እምኀቤሁ፡ ምድረ፡ ሴኢር፡ ወያዕቆብሰ፡ ኀደረ፡ በምጽላላት። ወበዓመት፡ ቀዳሚ፡ ዘ*ኃምስ፡ ሱባዔ፡ በዝ፡⁴²
      አ፻ቤሊዉ፡ ዐደወ፡ ዮርዳኖስ፡⁴³ *ወኀደረ፡ ማዕዶተ፡ ዮርዳኖስ፡⁴⁴ ወይሬዒ፡ አባግዒሁ፡ *እምባሕረ፡ ፌሐሐት፡⁴⁵ እስከ፡
      *ቤተስን፡ ወእስከ፡ ዶታኤም፡ ወእስከ፡⁴⁶
  - verse: 15
    geez: አመ፡⁴⁷ አቅራቦት።⁴⁸ ወይፌኑ፡ ለአቡሁ፡ ይስሐቅ፡ እምኵሉ፡ ጥሪቱ፡ ልብሰ፡ ወሲሲተ፡ ሥጋ፡
  - verse: 16
    geez: ወስቴ፡ ወሐሊበ፡ ወቅብአ፡ ወኅብስተ፡ ሐሊብ፡ ወእምነ፡ ትመርት፡ ቍላ። ወለእሙኒ፡ ለ'ርብቃ፡ ርብዕ፡ ለዓመት፡ ማእከለ፡
      ጊዜያቲሆሙ፡ ለአውራኅ፡ ወማእከለ፡ ሐፅኒ፡ ወለ'ዐጺድ፡ ወማእከለ፡
  - verse: 17
    geez: ጸዳይ፡ ወዝናም፡ ወማእከለ፡ ክረምት፡ ወሐጋይ፡ ውስተ፡ ማኅፈደ፡ ለ'አብርሃም። እስመ፡ ተመይጠ፡ ይስሐቅ፡ እምዐዘቅተ፡
      መሐላ፡ ወዐርገ፡ ውስተ፡ ማኅፈደ፡ አቡሁ፡ አብርሃም።
  - verse: 18
    geez: ወኀደረ፡ ህየ፡ እምዓሳው፡ ወልዱ። እስመ፡ በመዋዕለ፡ ሖረ፡ ያዕቆብ፡ መስጴጦምያ፡ ነሥአ፡ ለርእሱ፡ ፪ሳው፡ ብእሲተ፡
      ማሕሌትሃ፡ ወሰተ፡ ይስማዔል፡ ወአስተጋብአ፡ ኵሎ፡ መርዔተ፡ አቡሁ፡ ወአንስተያሁ፡ ወዐርገ፡ ወኀደረ፡ ውስተ፡ ደብረ፡ ሴር፡
      ወኀደገ፡ ይስሐቅሃ፡ አቡሁ፡ ውስተ፡
  - verse: 19
    geez: ዐዘቅተ፡ መሐላ፡ ባሕቲቶ። ወዐርገ፡ ይስሐቅ፡ እምዐዘቅተ፡ መሐላ፡ ወኀደረ፡ ማኅፈደ፡
  - verse: 20
    geez: አብርሃም፡ አቡሁ፡ ውስተ፡ ደብረ፡ ኬብሮን። ወ'ህየ፡ ይፈኑ፡ ያዕቆብ፡ ኵሎ፡ ዘይፈኑ፡ ለአቡሁ፡ ወ'ለእሙ፡ እምጊዜ፡
      በበ፡ ጊዜ፡ ኵሎ፡ ትካዞሙ፡ ወይባርክዎ፡ ለያዕቆብ፡ በኵሉ፡ ልቦሙ፡ ወበኵሉ፡ ነፍሶሙ።
