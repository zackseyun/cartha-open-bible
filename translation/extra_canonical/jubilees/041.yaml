translation:
  text: '1. And in the forty-fifth jubilee, in the second week, in the second year,
    Judah took

    2. for Er his firstborn a wife from the daughters of Aram, and her name was Tamar.
    But he rejected her and did not lie with her, because his mother was from the
    daughters of Canaan, and he wanted to take for himself a wife from the kin of
    his mother.

    3. And Judah his father rebuked him. And that Er, Judah’s firstborn, was evil,
    and the LORD put him to death.

    4. And Judah said to Onan, his brother, “Go in to your brother’s wife, and perform
    a brother-in-law’s duty to her, and raise up

    5. offspring for your brother.” And Onan knew that the offspring would not be
    his, as it would be his brother’s; and when he went into his brother’s wife, he
    spilled the seed on the ground. And it was evil in the sight of

    6. the LORD, and he put him to death. And Judah said to Tamar his daughter-in-law,
    “Remain in your father’s house as a widow until my son Shelah grows up, and I
    will give you to him as a wife.” And he grew up, but Bedsuel, Judah’s wife, did
    not give Shelah her son so that he might marry her; and Bed-

    7. suel, Judah’s wife, died in the fifth year of this week. And in its sixth year
    Judah went up to shear his sheep at Timnah, and Tamar was told, “Look, your father-in-law
    is going up to Timnah to shear

    8. his sheep.” And she took off the clothes of her widowhood and put on a veil,
    and adorned herself,

    9. and sat at the gate that is on the road to Timnah. And as Judah was going along,
    he found her

    10. and thought her to be a prostitute. And he said to her, “Let me come in to
    you.” And she said to him, “Come in.” And he went in. And she said to him,

    11. “What will you give me?” And he said, “I will send you a kid from the goats.”
    And she said, “Give me a pledge until you send it.”

    12. And he said to her, “What pledge shall I give you?” And she said, “Your signet
    and your cord and the staff that is in your hand.” And he gave them to her, and
    went in to her, and she conceived by him.

    13. And because of this it has been ordained and written on the heavenly tablets
    that one must not lie with one’s daughter-in-law, because it is uncleanness; and
    they shall surely burn with fire the man who lies with his daughter-in-law and
    also the woman, for they have committed pollution upon the earth. And let there
    be no uncleanness before our God among you. And to Judah we said that they should
    not burn them, because the two of them were his children, and because of this
    he was not burned, but his seed was established for another tribe and was not
    uprooted. For he went according to the desire of his eyes and sought no judgment,
    because he did not keep the ordinance of Abraham, which he commanded his sons;
    and Judah desired that she be burned with fire.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Verses 6–7 are segmented awkwardly in the source rows. The name Bedsuel/Bedsuel
      appears as Judah’s wife, and her death belongs before Judah’s trip to Timnah.
      The English has been arranged to preserve the likely sense without smoothing
      away the textual roughness.
    reason: segmentation_note
  - marker: b
    text: The chapter rows supplied omit the middle portion of the Tamar narrative
      and jump from verse 11 to verses numbered 27–28. The translation of verses 11–12
      reflects the expected continuation of the same Ge'ez narrative unit, but the
      chapter as provided is text-fragmentary.
    reason: textual_variant
  - marker: c
    text: '''Another tribe'' in verse 13 is difficult. The phrase may refer more generally
      to another lineage or clan rather than a formal Israelite tribe.'
    reason: lexical_alternative
  - marker: d
    text: The statement that Judah and Tamar were not burned because 'the two of them
      were his children' is textually difficult and may reflect a compressed legal
      rationale tied to levirate obligations and family status.
    reason: textual_variant
lexical_decisions:
- source_word: ኢዮቤልው
  chosen: jubilee
  alternatives:
  - jubilees
  rationale: Preserves Jubilees’ chronological framework as a technical calendrical
    term rather than smoothing into a generic era-marker.
- source_word: ሱባዔ
  chosen: week
  alternatives:
  - week of years
  - heptad
  rationale: Rendered 'week' in the main text for readability, with the jubilee context
    implying a week of years; avoids overloading every occurrence while preserving
    the calendrical structure.
- source_word: አዋልደ አራም
  chosen: daughters of Aram
  alternatives:
  - Aramean women
  - women of Aram
  rationale: Keeps the ethnogeographic phrasing close to the Ge'ez and preserves the
    contrast with the daughters of Canaan.
- source_word: ጸልአ
  chosen: rejected
  alternatives:
  - hated
  - despised
  rationale: The context is marital refusal rather than emotional hatred alone; 'rejected'
    captures the practical repudiation that explains why he did not sleep with her.
- source_word: ኢሰከበ ምስሌሃ
  chosen: did not lie with her
  alternatives:
  - did not sleep with her
  rationale: Retains the biblical idiom for sexual relations without becoming obscure.
- source_word: አሕበሶ
  chosen: rebuked
  alternatives:
  - restrained
  - forbade
  - corrected
  rationale: Best fits Judah’s paternal response to Er’s refusal and preserves moral
    censure.
- source_word: ናዕልተ
  chosen: perform a brother-in-law’s duty
  alternatives:
  - do the duty of a levir
  - raise up seed by levirate marriage
  rationale: Communicates the levirate obligation in clear English without requiring
    specialized terminology in the main text.
- source_word: ዘርአ
  chosen: offspring
  alternatives:
  - seed
  - descendants
  rationale: In this context it refers to progeny to be raised for the deceased brother;
    'offspring' is clear while still reflecting the lineage concern.
- source_word: ከዐወ ዘርአ ውስተ ምድር
  chosen: spilled the seed on the ground
  alternatives:
  - wasted his seed on the ground
  rationale: Keeps the concrete sexual act explicit, since the narrative’s moral logic
    depends on it.
- source_word: ትመዐስቢ
  chosen: as a widow
  alternatives:
  - in widowhood
  - waiting
  rationale: The command is not merely to stay home but to remain in widow-status
    until Shelah matures.
- source_word: ገልባቤ
  chosen: veil
  alternatives:
  - covering
  - mantle
  rationale: Best fits the disguise motif in the Tamar episode.
- source_word: ተሐዘባ ከመ ዘማዊት
  chosen: thought her to be a prostitute
  alternatives:
  - considered her a harlot
  rationale: Uses clear modern English while preserving the sexual-commercial implication.
- source_word: መዐተ መመቅሠፍተ
  chosen: it has been ordained and written on the heavenly tablets
  alternatives:
  - the judgment of punishment is decreed
  - a sentence of punishment is recorded
  rationale: 'Highlights Jubilees’ revelatory-legal framework: the prohibition is
    not merely customary but inscribed in heavenly decree.'
- source_word: ኢበከቡ
  chosen: should not burn them
  alternatives:
  - did not burn them
  - must not burn them
  rationale: The form is difficult in context; rendered as a reported instruction
    concerning Judah and Tamar, with uncertainty noted in a footnote.
- source_word: ቆመ ዘርአ ለካልእ ነገደ ወኢይሤረወ
  chosen: his seed was established for another tribe and was not uprooted
  alternatives:
  - offspring stood for another lineage and was not cut off
  - seed continued in another clan and was not destroyed
  rationale: Keeps the lineage language prominent, though the exact nuance of 'another
    tribe' is textually difficult.
- source_word: በየውሀተ አዕይንቲሁ
  chosen: according to the desire of his eyes
  alternatives:
  - by what his eyes saw
  - after the sight of his eyes
  rationale: Preserves the morally charged idiom of acting by visual desire rather
    than by judgment or command.
- source_word: ኵነኔ
  chosen: judgment
  alternatives:
  - justice
  - legal decision
  rationale: Fits the legal-moral context of Jubilees’ heavenly ordinances.
- source_word: ፈቃደ ይሁዳ ይውዐይ በእሳት
  chosen: Judah desired that she be burned with fire
  alternatives:
  - Judah ordered that she be burned
  - Judah wanted to burn her
  rationale: The Ge'ez points to Judah’s intention or will; this preserves the irony
    that he sought her punishment.
theological_decisions:
- issue: Use of the divine name
  chosen_reading: the LORD
  alternative_readings:
  - God
  - Yahweh
  rationale: Follows project doctrine for covenantal divine reference and matches
    the narrative’s judicial action.
  doctrine_reference: 'DOCTRINE.md: YHWH -> the LORD'
- issue: Heavenly tablets and legal force
  chosen_reading: Rendered as a heavenly ordinance already written, not merely a later
    moral comment
  alternative_readings:
  - a general moral reflection
  - a retrospective editorial gloss
  rationale: Jubilees regularly grounds ethics in prewritten heavenly tablets; the
    translation preserves that revelatory-legal claim.
- issue: Judah and Tamar burning clause
  chosen_reading: Translated as an instruction/report that they were not to be burned
    in this case, with explanatory rationale following
  alternative_readings:
  - they were not burned because both were his children
  - Judah was told not to burn them
  rationale: The surviving Ge'ez is compressed and likely affected by segmentation;
    the translation preserves the legal exception language without over-harmonizing
    to Genesis.
