translation:
  text: And in the thirty-third jubilee, in the first year of the second week, Peleg
    took for himself a wife whose name was Lomna, the daughter of Shinar, and she
    bore him a son in the fourth year of this week. And he called his name Reu, for
    he said, “Behold, the children of men have become evil through the wicked purpose
    to build for themselves a city and a tower in the land.”
