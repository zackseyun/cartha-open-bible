translation:
  text: And after Joseph was taken away, the sons of Jacob took wives. The name of
    Reuben’s wife was Ada, and the name of Simeon’s wife was Adiba, a Canaanite; and
    the name of Levi’s wife was Melka, from the daughters of Aram, from the seed of
    the sons of Terah; and the name of Judah’s wife was Bethasu’el, a Canaanite; and
    the name of Issachar’s wife was Hezaqa; and the name of Zebulun’s wife was Ni’aman;
    and the name of Dan’s wife was Egla; and the name of Naphtali’s wife was Rasu’a,
    from Mesopotamia; and the name of Gad’s wife was Maka; and the name of Asher’s
    wife was Ijona; and the name of Joseph’s wife was Asenath, an Egyptian; and the
    name of Benjamin’s wife was Iyasaka.
