  text: In the thirty-fifth jubilee[1], in the third week, in its first year, Reu took for himself a wife, and her name was Ora, the daughter of Ur, the son of Kesed. And she bore him a son, and he called his name Seroh, in the seventh year of this week, in this jubilee.
