translation:
  text: above the daughters of the nations. And if there is any from your daughters
    whom he gives to a man from any of the nations, plague upon plague shall be upon
    him, and curse upon curse; and all this plague and curse shall come if he does
    this thing, and if he closes his eyes to those who do uncleanness and to those
    who defile the sanctuary of the LORD and to those who profane his holy name, all
    the people together shall be judged for all the uncleanness and profanation.
