translation:
  text: '1. And in the sixth year of this week of years, of this forty-fourth jubilee,
    Jacob sent his sons to pasture their sheep, and his servants also with them, in
    the pastures of Shechem.

    2. And the seven kings of the Amorites gathered themselves against them, to kill
    them, hiding themselves

    3. under the trees, and to seize their cattle. But Jacob, and Levi, and Judah,
    and Joseph were in the house with Isaac their father, because his spirit was sorrowful
    and they could not leave him.

    4. And Benjamin was the youngest, and for this reason he remained with his father.
    And there came the kings of Taphu, and the kings of Ares, and the kings of Seragan,
    and the kings of Selo, and the kings of Gaas, and the king of Bethoron, and the
    king of Maanisakir, and all those who dwell on this mountain, and those who dwell
    in

    5. the land of Ham, in the land of Canaan. And they told Jacob, saying, “Behold,
    the kings of the Amorites

    6. have surrounded your sons, and their flocks have been taken.” And he rose up
    from his house, he and his three sons, and all his father’s servants, and he went
    against them with

    7. six hundred men who carried weapons. And he killed them in the pasture of Shechem,
    and pursued those who fled, and killed them with the edge of the sword, and he
    killed Ares and Taphu and Seragan,

    8. and Selo and Amanisakir and Gagaas. And he recovered his flocks, and prevailed
    over them, and imposed tribute on them, so that they gave him tribute, a fifth
    of the produce of their land. And he built

    9. Robel and Tamnatares. And he returned in peace and made peace with them, and
    they became

    10. his servants until the day when he and his sons went down into Egypt. And
    in the seventh year of this week he sent Joseph from his house to learn of the
    welfare of his brothers in the land of

    11. Shechem, and he found them in the land of Dothan. And they dealt treacherously
    with him and formed a plan against him to kill him; but changing their minds,
    they sold him to Ishmaelite merchants, and they brought him down to Egypt and
    sold him to Potiphar, an officer of Pharaoh, the chief of the cooks, priest of
    the city of Heliopolis. And the sons of Jacob slaughtered a kid of the goats and
    stained Joseph’s garment with the blood, and sent it to Jacob their father on
    the tenth of the seventh month. And he mourned all that night, because at evening
    they had brought it to him, and he became fevered with grief for his death, and
    said, “A wild beast has devoured Joseph.” And all the people of his house mourned
    with him on that day, and they were grieving and mourning with him all that day.
    And his sons and his daughters rose up to comfort him, but he would not be comforted
    for his son.

    12. And on that day Bilhah heard that Joseph had perished, and while she was mourning
    for him she died in Qafratef, and Dinah his daughter also died after Joseph had
    perished.

    13. And these three mournings came upon Israel in one month. And they buried Bilhah
    opposite Rachel’s tomb, and they buried Dinah his daughter there.

    14. And he mourned for Joseph one year, and did not cease, for he said, “I will
    go down to the grave mourning for my son.”

    15. Therefore it was ordained for the sons of Israel that they should afflict
    themselves on the tenth of the seventh month, on the day when the news that Joseph
    had died reached Jacob his father, and that they should make atonement for themselves
    on it with a young goat on the tenth of the seventh month, once each year, because
    of their sins; for they had grieved the compassion of their father concerning
    Joseph his son.

    16. And this day was ordained so that they should grieve on it for their sins,
    and for all their transgressions, and for all their errors, so as to cleanse themselves
    on this day once each year.

    17. And after Joseph was taken away, the sons of Jacob took wives. The name of
    Reuben’s wife was Ada, and the name of Simeon’s wife was Adiba, a Canaanite; and
    the name of Levi’s wife was Melka, from the daughters of Aram, from the seed of
    the sons of Terah; and the name of Judah’s wife was Bethasu’el, a Canaanite; and
    the name of Issachar’s wife was Hezaqa; and the name of Zebulun’s wife was Ni’aman;
    and the name of Dan’s wife was Egla;

    18. and the name of Naphtali’s wife was Rasu’a, from Mesopotamia; and the name
    of Gad’s wife was Maka; and the name of Asher’s wife was Ijona; and the name of
    Joseph’s wife was Asenath, the Egyptian; and the name

    19. of Benjamin’s wife was Iyasaka. And Simeon repented and took a second wife
    from Mesopotamia, like his brothers.'
