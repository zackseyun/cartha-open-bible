  - verse: 18
    geez: ላላሑ፡ በእንተ፡ ወልድየ። በእንተዝ፡ ተሠርዐ፡ ዲበ፡ ውሉደ፡ እስራኤል፡ ከመ፡ ይሕመሙ፡ *በዐሡረ፡ ወርኅ፡ ዘሰብዑ፡
      አመዕለተ፡ በጽሐ፡ ዜናሁ፡ ዮሴፍ፡ ኀበ፡ ያዕቆብ፡ አቡሁ፡ ከመ፡ ያስተስርዩ፡ ባቲ፡ ሎሙ፡ በእንተ፡ ጢአ፡ አመ፡ አሠሩ፡
