theological_decisions:
- issue: Institution of the annual affliction on the tenth of the seventh month
  chosen_reading: The text presents the day as an ordained annual act of self-affliction
    and atonement rooted in the brothers' sin against Joseph and Jacob's grief.
  alternative_readings:
  - A memorial fast only
  - A later Day of Atonement retrojection without etiological force
  rationale: Verses 15-16 explicitly connect affliction, annual recurrence, and atonement
    with the Joseph episode. The translation preserves this etiological theology without
    flattening it into later biblical phrasing.
  doctrine_reference: Preserve theological tension rather than resolve it; preserve
    calendrical terminology carefully.
- issue: Potiphar's office
  chosen_reading: Rendered as 'officer of Pharaoh, the chief of the cooks, priest
    of the city of Heliopolis.'
  alternative_readings:
  - '''eunuch of Pharaoh, captain of the guard'' by harmonization with Genesis'
  - '''chief butcher'' for the middle title'
  rationale: The Ethiopic wording differs from the familiar Genesis phrasing. Following
    original-language primacy, the translation keeps Jubilees' wording rather than
    harmonizing it back into Genesis.
  doctrine_reference: Original-language primacy over translation tradition.
