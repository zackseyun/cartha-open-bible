translation:
  text: She heard, “Behold, Jacob your son has come.” And she kissed him. And she
    saw his two sons and recognized them, and said to him, “Are these your sons, my
    son?” And she embraced them and kissed them and blessed them, saying, “In you
    shall the seed of Abraham be honored, and you shall become a blessing.”
