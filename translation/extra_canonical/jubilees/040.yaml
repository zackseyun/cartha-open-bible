translation:
  text: '1. And it happened just as Joseph had interpreted for them: Pharaoh restored
    the chief cupbearer to his office, and he killed the chief baker, as Joseph had
    interpreted for them. And the chief cupbearer forgot Joseph in the prison house,
    though he knew what would happen, and he did not remember to inform Pharaoh of
    what Joseph had told him, for he forgot.

    2. And in those days Pharaoh dreamed two dreams in one night concerning the matter
    of the famine that would come upon all the earth. And he awoke from his sleep
    and called all the interpreters of dreams who were in Egypt, and the diviners,
    and he told them both his dreams, but they were not able to make known their meaning.

    3. Then the chief cupbearer remembered Joseph and spoke about him to the king,
    and he brought him out from the prison house, and he told before him both his
    dreams.

    4. And he said before Pharaoh that both his dreams were one, and he said to him,
    “Seven years of abundance will come in all the land of Egypt, and after them seven
    years of famine, such famine as has not been like it in all the earth.”

    5. “And now let Pharaoh appoint overseers in all the land of Egypt, and let them
    store up grain in the cities, in each city, during the years of abundance. And
    it will be provision for the seven years of famine, and the land will not perish
    before the face of the famine, for it will be very severe.”

    6. And the Lord gave Joseph favor and mercy in Pharaoh’s sight, and Pharaoh said
    to his servants, “We will not find a man wise and understanding like this man,
    for the spirit of the Lord is with him.”

    7. And he appointed him second in all his kingdom, and made him ruler over all
    Egypt, and caused him to ride on Pharaoh’s second chariot. And he clothed him
    with garments of fine linen, and put a gold chain on his neck, and they proclaimed
    before him, “El, El,” and “Abrer”; and he gave him his signet ring into his hand,
    and set him over all his house, and magnified him, and said to him, “Only with
    respect to the throne alone will I be greater than you.”

    8. And Joseph went out through all the land of Egypt, and all Pharaoh’s princes
    loved him, and all his servants, and all who did the king’s work, because he walked
    uprightly and there was no pride, or arrogance of heart, or contempt of face,
    or acceptance of persons in his thoughts; for he judged uprightly for all the
    peoples of the earth.

    9. And the land of Egypt was at peace before Pharaoh because of Joseph, for the
    Lord was with him and gave him favor and mercy over all his kin in the sight of
    all who knew him and all who heard report of him. And Pharaoh’s kingdom was well
    ordered, and there was no adversary and no evil one.

    10. And the king called Joseph’s name Psonthomphanes, and he gave Joseph as wife
    the daughter of Potiphar, the daughter of a priest of Heliopolis, chief of the
    guards.

    11. And Joseph was thirty years old when he stood before Pharaoh.

    12. And in that year Isaac died. And it came to pass just as Joseph had spoken
    concerning the interpretation of his two dreams, just as he had told him: there
    were seven years of abundance in all the land of Egypt, and the land of Egypt
    produced exceedingly, one measure yielding eighteen hundred measures.

    13. And Joseph stored up food in city after city until the grain was filled up,
    until they could no longer count it, and it was measured no more because of its
    abundance.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: 7a
    text: The acclamation rendered “El, El” reflects a difficult Ge'ez form (አል፡ አል).
      Its exact force is uncertain; it may preserve an Egyptian or court cry rather
      than a normal Ethiopic word.
    reason: lexical_alternative
  - marker: 7b
    text: “Abrer” renders አቢርር, a difficult form often harmonized with the Genesis
      acclamation traditionally rendered “Bow the knee.” The Ge'ez here is left transliterated
      to avoid importing a reading not explicit in this text.
    reason: alternative_reading
  - marker: 9a
    text: “There was no adversary and no evil one” may describe the absence of opposition
      and disorder in the kingdom. The first term could also be read more personally
      as “Satan,” but the political context favors the broader sense.
    reason: alternative_reading
  - marker: 10a
    text: The name “Psonthomphanes” follows the Ge'ez form here rather than the more
      familiar Genesis form “Zaphenath-paneah.”
    reason: cross_reference
  - marker: 10b
    text: The wording of this verse is somewhat compressed. The Ge'ez appears to identify
      Joseph’s wife as the daughter of Potiphar/Potiphera, a priest of Heliopolis,
      with an attached title that may be understood as “chief of the guards” or a
      related high office.
    reason: segmentation_note
  - marker: 12a
    text: The final clause is textually difficult. The translation “one measure yielding
      eighteen hundred measures” follows the numerical sense of the Ge'ez as best
      as possible, but the exact metrological force is uncertain.
    reason: textual_variant
lexical_decisions:
- source_word: ፈከረ
  chosen: interpreted
  alternatives:
  - explained
  - declared
  lexicon: contextual Ge'ez usage
  rationale: In this chapter the verb is used specifically of explaining dreams and
    their outcomes. “Interpreted” preserves the technical dream-interpretation sense
    better than the broader “explained.”
- source_word: ሊቀ፡ መዘርት
  chosen: chief cupbearer
  alternatives:
  - chief butler
  lexicon: traditional Ge'ez biblical title
  rationale: The office corresponds to the royal cupbearer in the Joseph narrative.
    “Chief cupbearer” is clearer modern English than the older “chief butler.”
- source_word: ቤተ፡ ሞቅሕ
  chosen: prison house
  alternatives:
  - prison
  - house of confinement
  lexicon: literal compound sense
  rationale: The phrase is a set expression for prison. “Prison house” preserves the
    concrete idiom without becoming awkwardly literal.
- source_word: መፈክራነ፡ ሕልም
  chosen: interpreters of dreams
  alternatives:
  - dream interpreters
  lexicon: compound title
  rationale: This keeps the occupational sense explicit and readable.
- source_word: ረቅይተ
  chosen: diviners
  alternatives:
  - magicians
  - soothsayers
  lexicon: contextual court specialists
  rationale: The term refers to court experts beyond dream interpreters. “Diviners”
    is broad and avoids importing later English associations tied to “magicians.”
- source_word: ጽጋብ
  chosen: abundance
  alternatives:
  - plenty
  - prosperity
  lexicon: contextual agricultural sense
  rationale: In contrast with famine, the word denotes years of agricultural plenty.
    “Abundance” preserves the elevated register of the chapter.
- source_word: መኰንነ
  chosen: overseers
  alternatives:
  - officials
  - governors
  lexicon: administrative title
  rationale: The context is appointment of administrators to collect and store produce.
    “Overseers” fits the functional role without overstating rank.
- source_word: ሲሳተ
  chosen: provision
  alternatives:
  - food supply
  - sustenance
  lexicon: food/storage context
  rationale: The stored grain is meant as reserve supply for famine years. “Provision”
    is concise and natural in context.
- source_word: ሞገሰ፡ ወምሕረተ
  chosen: favor and mercy
  alternatives:
  - grace and compassion
  lexicon: common biblical pair
  rationale: This pair often denotes benevolent regard shown by a superior. “Favor
    and mercy” preserves both relational acceptance and compassionate treatment.
- source_word: መንፈሰ፡ እግዚአብሔር
  chosen: the spirit of the Lord
  alternatives:
  - the Spirit of God
  - God’s spirit
  lexicon: theological phrase
  rationale: Given project doctrine for rendering እግዚአብሔር / divine title as “the Lord,”
    this phrase is rendered accordingly while preserving its theological force.
- source_word: ቢሶስ
  chosen: fine linen
  alternatives:
  - byssus
  lexicon: loanword for costly linen
  rationale: “Fine linen” communicates the material clearly to modern readers; “byssus”
    would be too opaque in the main text.
- source_word: አል፡ አል
  chosen: El, El
  alternatives:
  - God, God
  - a cry of acclamation
  lexicon: uncertain acclamatory phrase
  rationale: The phrase is difficult and likely reflects a court acclamation. I preserved
    it transliterated rather than forcing a speculative meaning into the text.
- source_word: አቢርር
  chosen: Abrer
  alternatives:
  - Abrek
  - a command such as 'Bow the knee'
  lexicon: uncertain loan/acclamation
  rationale: The form is textually and lexically uncertain. A transliterated rendering
    best preserves auditability without overconfident harmonization to Genesis.
- source_word: ርቱዐ
  chosen: uprightly
  alternatives:
  - justly
  - rightly
  lexicon: ethical term
  rationale: The chapter emphasizes Joseph’s moral bearing and judicial fairness.
    “Uprightly” captures both conduct and character.
