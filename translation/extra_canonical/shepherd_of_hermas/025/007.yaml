translation:
  text: 7. If then, having heard them, you keep them and walk in them and do them with a pure heart, you
    will receive from the Lord what he promised you; but if, having heard, you do not repent, but still
    add to your sins, you will receive from the Lord the opposite things. The Shepherd, the angel of repentance,
    commanded me to write all these things in this way.
