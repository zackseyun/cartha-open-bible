translation:
  text: “As to former ignorances,” he says, “God alone is able to give healing concerning them; for all
    authority is his. But now guard yourself, and the Lord, the Almighty—being full of compassion—will
    give healing for former ignorances, if from now on you do not defile your flesh or the spirit; for
    both are shared and cannot be defiled apart from one another. Therefore keep both pure, and you will
    live to God.”
