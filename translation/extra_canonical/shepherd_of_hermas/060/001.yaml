translation:
  text: …with their whole heart. So then, do you suppose that the sins of those who are repenting are
    immediately forgiven? Not entirely. Rather, the one who repents must afflict his own soul and be humble-minded
    in all his conduct, resolutely, and be distressed in all kinds of tribulations; and if he bears the
    tribulations that come upon him, the One who created all things and strengthened them will surely
    be moved with compassion and will grant some healing. And this, when [God] sees the heart of the one
    repenting clean from everything.
