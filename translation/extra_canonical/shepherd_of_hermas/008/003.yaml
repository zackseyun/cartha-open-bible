translation:
  text: 3. “So you will write two little booklets, and you will send one to Clement and one to Grapte.
    Then Clement will send it to the cities outside, for this has been entrusted to him; but Grapte will
    admonish the widows and the orphans. But you will read it aloud in this city with the elders who preside
    over the church.”
