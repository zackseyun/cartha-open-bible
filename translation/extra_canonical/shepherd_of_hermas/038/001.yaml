translation:
  text: '“Listen, then,” he says, “foolish one, how sorrow wears down the Holy Spirit and then again saves.
    Whenever the double‑minded person undertakes some action and fails in it because of his double‑mindedness,
    this sorrow enters into the person and grieves the Holy Spirit and wears it down. Then again, when
    quick temper clings to a person concerning some matter, and he becomes exceedingly embittered, again
    sorrow enters into the heart of the person who became quick‑tempered, and he is grieved over the deed
    that he did and repents, because he did what is evil. This sorrow, then, seems to bring salvation,
    because after doing what is evil he repented. Therefore both things grieve the Spirit: double‑mindedness,
    because it did not attain its purpose; and quick temper grieves the Spirit, because it did what is
    evil. Both, then, are grievous to the Holy Spirit—double‑mindedness and quick temper. Remove, therefore,
    sorrow from yourself, and do not afflict the Holy Spirit that dwells in you, lest it appeal to God
    and depart from you. For the Spirit of God that was given to this flesh does not endure sorrow or
    distress.”'
  philosophy: optimal-equivalence
