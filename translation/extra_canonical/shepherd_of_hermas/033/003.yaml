translation:
  text: 'So when you recognize his works, withdraw from him and put no trust in him, because his works
    are wicked and harmful to God’s slaves. You therefore have the activities of both angels; understand
    them, and trust the angel of righteousness. But withdraw from the angel of wickedness, because his
    teaching is wicked in every deed. For if someone is a faithful man, and the thought of this angel
    rises up in his heart, that man or woman must commit some sin. But if again some man or woman is very
    wicked, and the works of the angel of righteousness rise up in his or her heart, that person must
    of necessity do something good. You see then,” he says, “that it is good to follow the angel of righteousness,
    and to renounce the angel of wickedness. As to faith, this commandment makes it clear: that you should
    trust the works of the angel of righteousness, and, having done them, live to God. But believe that
    the works of the angel of wickedness are grievous; so by not doing them, you will live to God.”'
  philosophy: optimal-equivalence
