translation:
  text: He says, “I commanded you in the first commandment to keep faith and fear and self-control.” “Yes,
    lord,” I say. “But now,” he says, “I also want to make known to you their powers, so that you may
    understand what power and activity each of them has. For their activities are twofold; so they are
    set over the righteous and the unrighteous. So you—trust the righteous, but do not trust the unrighteous;
    for righteousness has a straight path, but unrighteousness a crooked one. But you, walk on the straight
    [and level] path, and leave the crooked.
