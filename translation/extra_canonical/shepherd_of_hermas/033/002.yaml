translation:
  text: For the crooked path has no tracks, but pathless places and many stumbling blocks; and it is rough
    and thorny. Therefore it is harmful. But hear also the works of the other way. First of all, if there
    should come upon you a quick temper or bitterness, know that he is in you. Then come desire for many
    activities, and extravagance in many foods and drinks, and many drunken sprees, and various luxuries,
    and things that are not fitting; and desire for women, and greed, and arrogance, and boastfulness,
    and whatever things are akin and similar to these. Therefore, whenever these things rise up in your
    heart, know that the angel of wickedness is with you.
  philosophy: optimal-equivalence
