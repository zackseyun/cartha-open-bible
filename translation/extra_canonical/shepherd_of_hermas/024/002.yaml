translation:
  text: 'She says, "Listen: the black is this world, in which you dwell. And the fiery and blood-red is
    because this world must be destroyed by blood and fire. But the golden portion is you who have escaped
    this world. For just as gold is tested by fire and becomes useful, so also you are being tested in
    them. Therefore, those who remain and are burned by it will be purified. Just as gold casts off its
    dross, so also you will cast off every grief and distress, and you will be purified and will be useful
    for the building of the tower.'
  philosophy: optimal-equivalence
