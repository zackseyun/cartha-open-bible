translation:
  text: '2. He says, “Listen: your sins are many, but not so many that you should be handed over to this
    angel. Rather, your household has committed great lawless deeds and sins, and the glorious angel was
    embittered at their works; and for this reason he ordered that you be afflicted for a certain time,
    so that they too might repent and cleanse themselves from every desire of this age. When therefore
    they repent and are cleansed, then the angel of punishment will depart.”'
