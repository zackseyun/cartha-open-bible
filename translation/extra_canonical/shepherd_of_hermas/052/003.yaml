translation:
  text: The Holy Spirit, which preexisted, which created all creation, God caused to dwell in flesh that
    he willed. This flesh, then, in which the Holy Spirit dwelt, served the Spirit well, walking in modesty
    and purity, in no way at all defiling the Spirit. Therefore, since it had conducted itself well and
    purely, and had toiled together with the Spirit and cooperated in every matter, conducting itself
    strongly and courageously, he chose it as a partner with the Holy Spirit; for the conduct of this
    flesh pleased [the Lord], because it was not defiled upon the earth while having the Holy Spirit.
  philosophy: optimal-equivalence
