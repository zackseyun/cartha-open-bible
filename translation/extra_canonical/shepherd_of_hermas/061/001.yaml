translation:
  text: 'Then the angel of the Lord commanded that crowns be brought. And crowns were brought, as if made
    from palms, and he crowned the men who had handed in the rods that had shoots and some fruit, and
    he dismissed them into the tower. 2. And the others also he sent into the tower—those who had handed
    in their rods green and having shoots, but whose shoots did not have fruit—giving them seals. 3. And
    all who were going into the tower had the same clothing, white as snow. 4. And those who had handed
    in their rods green, just as they had received them, he dismissed, giving them clothing and seals.
    5. After the angel had finished these things, he says to the shepherd: “I am going; but you are to
    dismiss these to the walls, as each one is worthy to dwell. Pay close attention to their rods, and
    so dismiss them—pay close attention. See that no one slips past you,” he says; “but if anyone does
    slip past you, I will test them upon the altar.” Having said these things to the shepherd, he went
    away. 6. The shepherd says to me, “Let us take the rods of all and plant them, to see if any of them
    will be able to live.” I say to him, “Sir, how can these dry things live?” 7. Answering me he says,
    “This tree is a willow, and its kind loves life. If, then, the rods are planted and receive a little
    moisture, many of them will live; then let us also try pouring water on them. If any of them is able
    to live, I will rejoice over it; but if it does not live, I shall not be found negligent.” 8. Then
    the shepherd commanded me to call them just as each of them had been stationed. Rank by rank they
    came and were handing their rods to the shepherd. The shepherd took the rods and planted them according
    to the ranks; and after planting he provided much water for them, so that because of the water the
    rods could not be seen. 9. And after he had watered the rods, he says to me, “Let us go, and after
    a few days let us return and inspect all the rods; for the one who created this tree desires all who
    have taken branches from this tree to live. And I too hope that, these rods having received moisture
    and having been watered with water, the greater part of them will live.”'
