translation:
  text: First of all, believe that God is one—the one who created and ordered all things, and made all
    things out of nonexistence into being, and who contains all things, while he alone is uncontainable.
    Therefore believe him and fear him; and having feared, exercise self-control. Keep these things, and
    you will cast off all wickedness from yourself and put on every virtue of righteousness, and you will
    live to God, if you keep this command.
