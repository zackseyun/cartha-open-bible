translation:
  text: 'I asked her, "Why has the tower been built upon the waters, lady?" She says, "I told you before
    also, and you inquire diligently; therefore, by inquiring, you find the truth. Why, then, the tower
    has been built upon the waters—listen: because your life was saved through water and will be saved.
    And the tower has been founded by the word of the almighty and glorious Name, and is held fast by
    the unseen power of the Master."'
