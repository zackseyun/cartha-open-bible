translation:
  text: '“I wished, Sir,” I said, “to know what these various punishments are.” He said, “Listen. The
    various punishments and torments are torments of this present life: for some are punished with losses,
    some with deprivations, some with various sicknesses, some with every kind of disorder; some are insulted
    by the unworthy, and suffer in many other ways. For many, being unsettled in their plans, undertake
    many things, and nothing at all advances for them. They say of themselves that they do not prosper
    in their undertakings, and it does not rise up into their heart that they have done evil, but they
    blame the Lord.'
