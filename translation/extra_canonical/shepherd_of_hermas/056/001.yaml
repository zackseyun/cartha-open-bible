translation:
  text: Therefore, seeing them being scourged and afflicted like this, I was grieved for them, because
    they were being tormented in this way and had no respite at all. I said to the shepherd who was speaking
    with me, “Sir, who is this shepherd, so pitiless and harsh, showing no compassion at all for these
    sheep?” He said, “This is the angel of punishment; he is one of the righteous angels, appointed over
    punishment. Therefore he takes charge of those who have wandered away from God and have gone after
    the desires and deceits of this age, and he punishes them, as they deserve, with dreadful and various
    punishments.”
