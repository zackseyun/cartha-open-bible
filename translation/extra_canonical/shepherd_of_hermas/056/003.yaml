translation:
  text: “When, then, they are afflicted with every affliction, then they are handed over to me for good
    discipline, and they are strengthened in the faith of the Lord; and the rest of the days of their
    life they serve the Lord with a pure heart. And if they repent, then the evil works that they did
    rise up into their heart; and then they glorify God, saying that he is a righteous judge and that
    each one suffered justly according to his deeds. Thereafter they serve the Lord with a pure heart,
    and they prosper in every work of theirs, receiving from the Lord whatever they ask for; and then
    they glorify the Lord because they were handed over to me, and they no longer suffer any of the evils.”
