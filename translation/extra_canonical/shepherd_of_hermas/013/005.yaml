translation:
  text: '“And those whom they were casting away and throwing aside—who are they?” “These are people who
    have sinned and want to repent. For this reason they were not flung far away outside the tower, because
    they will be useful for the building, if they repent. Therefore those who are going to repent—if they
    repent—will be strong in the faith, if they repent now, while the tower is being built. But if the
    building is completed, they no longer have a place, but will be cast out. But they have only this:
    to lie beside the tower.”'
