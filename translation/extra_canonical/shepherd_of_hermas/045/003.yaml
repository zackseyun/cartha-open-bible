translation:
  text: '"He is not able," he says, "to tyrannize the slaves of God—those who hope in him with their whole
    heart. The devil can wrestle against them, but he cannot overcome them. If, therefore, you resist
    him, defeated he will flee from you, disgraced. But those who are empty," he says, "are afraid of
    the devil as though he had power.'
