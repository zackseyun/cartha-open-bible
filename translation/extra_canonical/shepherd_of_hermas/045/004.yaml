translation:
  text: '"When a man fills very many clay jars with good wine, and among those jars a few are empty, he
    comes to the jars and does not inspect the full ones—for he knows they are full—but he inspects the
    empty ones, fearing lest they have turned sour; for empty jars quickly turn sour, and the pleasure
    of the wine is lost.'
