translation:
  text: '“Next, hear what follows these: to serve widows; to visit orphans and those in want; to redeem
    the slaves of God from distresses; to be hospitable (for in hospitality one sometimes finds an opportunity
    for doing good); to oppose no one; to be quiet; to become lower than all people; to honor the elderly;
    to practice righteousness; to preserve the brotherhood; to endure insult; to be long‑suffering; to
    have no resentment; to encourage those who are weary in soul; not to cast off those who have stumbled
    away from the faith, but to turn them back and make them cheerful; to admonish those who sin; not
    to oppress debtors and the needy; and if there is anything like these.'
  philosophy: optimal-equivalence
