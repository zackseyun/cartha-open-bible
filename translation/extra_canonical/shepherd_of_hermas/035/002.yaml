translation:
  text: '“Make it known to me, Lord,” I say, “with respect to what things one must exercise self‑control,
    and with respect to what things one must not.” “Listen,” he says: “Exercise self‑control with regard
    to what is evil and do not do it; but do not exercise self‑control with regard to what is good—rather,
    do it. For if you exercise self‑control so as not to do the good, you commit a great sin; but if you
    exercise self‑control so as not to do what is evil, you accomplish great righteousness. Therefore
    exercise self‑control from every wickedness, doing the good.”'
