translation:
  text: '“What kinds, Lord,” I say, “are the wickednesses from which we must exercise self‑control?” “Listen,”
    he says: “From adultery and fornication, from lawless drunkenness, from wicked luxury, from many foods
    and the extravagance of wealth and boasting and haughtiness and arrogance, and from lying and slander
    and hypocrisy, resentment, and every blasphemy.'
