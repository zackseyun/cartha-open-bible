translation:
  text: For to this end the Master has made you rich, that you might carry out these ministries for him;
    it is far better to buy such fields [and estates] and houses, which you will find in your city when
    you arrive in it. This luxury is good and cheerful, having no grief nor fear, but having joy. So do
    not practice the luxury of the nations; for it is unprofitable for you, the slaves of God. Rather
    practice your own luxury, in which you are able to rejoice. For all luxury of this kind is profitable.
    But the luxury of the nations is bitter and harsh. This parable, then, is set before the slaves of
    God, for the poor and the rich.
  philosophy: optimal-equivalence
