translation:
  text: '‘How so, sir?’ I say. ‘Make it known to me.’ ‘Listen,’ he says: ‘The rich man has much money,
    but toward the Lord he is poor, being distracted about his wealth, and he has very little confession
    and intercession toward the Lord; and what he has is small and feeble, and has no power to go up above.
    When, therefore, the rich man goes to the needy and supplies him with what is necessary, believing
    that what he does for the needy he will be able to find as his reward from God—for the needy is rich
    in intercession [and in confession], and his intercession has great power with God—the rich man supplies
    the needy with everything without hesitation. And the needy, being supplied by the rich, intercedes
    for him, giving thanks to God on behalf of the one who gives to him. And that one is still more eager
    concerning the needy, so that he may be unceasing in his life; for he knows that the intercession
    of the needy is acceptable and rich before God. Therefore both complete the work: the needy performs
    the intercession in which he is rich, [which he received from the Lord;] this he renders to the Lord
    for the one who supplies him. And likewise the rich man without hesitation provides to the needy the
    wealth which he received from the Lord. And this is a great work and acceptable with God, because
    he understood concerning his wealth and worked for the needy out of the gifts of the Lord and fulfilled
    the Lord’s ministry rightly. Therefore, among people the elm seems not to bear fruit; and they do
    not know nor understand that, if there should be a drought, the elm, having water, nourishes the vine,
    and the vine, having unceasing water, gives double fruit, both for itself and for the elm. In the
    same way also the needy, interceding with the Lord on behalf of the rich...'
