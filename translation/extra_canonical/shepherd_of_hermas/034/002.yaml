translation:
  text: 2. But do not fear the devil; for by fearing the Lord you will gain mastery over the devil, because
    there is no power in him. In one in whom there is no power, there is no fear; but in one in whom there
    is glorious power, there is also fear. For everyone who has power has fear, but the one who has no
    power is despised by all.
