translation:
  text: '4. Therefore there are two fears: if you wish to do what is evil, fear the Lord and you will
    not do it; and if, on the other hand, you wish to do what is good, fear the Lord and you will do it.
    Thus the fear of the Lord is strong and great and glorious. So fear the Lord, and you will live to
    him; and all who fear him, among those who keep his commandments, will live to God.'
