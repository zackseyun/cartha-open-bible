translation:
  text: 5. “Why,” I said, “sir, did you say about those who keep his commandments, ‘They will live to
    God’?” “Because,” he said, “all creation fears the Lord, but it does not keep his commandments. Therefore
    the life of those who fear him and keep his commandments is with God; but for those who do not keep
    his commandments, there is not even life in them.”
