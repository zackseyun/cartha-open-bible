translation:
  text: First of all, slander no one, and do not listen with pleasure to someone who slanders; otherwise
    you too, the hearer, will be guilty of the slanderer’s sin if you believe the slander you hear. For
    by believing it, you yourself also will have something against your brother. Thus you will be guilty
    of the slanderer’s sin.
