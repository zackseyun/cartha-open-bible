translation:
  text: Therefore the one who gives is innocent; for just as he received from the Lord the ministry to
    carry out, he carried it out simply, making no distinction as to whom he should give or not give.
    Thus this ministry, having been carried out simply, became glorious before God. Therefore the one
    who thus ministers simply to God will live.
