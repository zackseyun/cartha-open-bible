translation:
  text: “As long as he is ignorant,” he says, “he does not sin; but if the husband comes to know her sin,
    and the wife does not repent but persists in her fornication, and the husband lives together with
    her, he becomes guilty of her sin and a sharer in her adultery. "What then, sir," I say, "should the
    husband do, if the wife persists in this passion?" "Let him divorce her," he says, "and let the husband
    remain by himself; but if, after divorcing his wife, he marries another, he himself also commits adultery."
    "If then, sir," I say, "after the wife is divorced, she repents and wishes to return to her own husband,
    will she not be received?" "Indeed," he says, "if the husband does not receive her, he sins and brings
    a great sin upon himself; rather, the one who has sinned and is repenting must be received—but not
    repeatedly—for to the slaves of God repentance is one. Because of repentance, then, the man ought
    not to marry. This rule is laid upon both woman and man.
