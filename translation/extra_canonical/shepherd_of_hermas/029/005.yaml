translation:
  text: “Not only,” he says, “is it adultery if someone defiles his flesh, but whoever makes images as
    the nations do is committing adultery. Therefore, even in such works, if someone persists and does
    not repent, keep away from him and do not live together with him; otherwise you too are a sharer in
    his sin. For this reason it was commanded you to remain by yourselves, whether man or woman, for in
    cases like these there can be repentance.
