translation:
  text: I say to him, "Lord, explain this to me further." He says, "What are you seeking?" I say, "Then,
    Lord, are those who indulge themselves and are deceived tormented for the same length of time as the
    time of the deception? For the time of deception is one hour, but the hour of torment has the force
    of thirty days. Therefore, if someone indulges himself for one day and is deceived, and is tormented
    for one day, the day of torment amounts to a whole year. So then, for as many days as a person indulges
    himself, for that many years he is tormented." "You see then," he says, "that the time of indulgence
    and deception is very short, but the time of punishment and torment is long."
  philosophy: optimal-equivalence
