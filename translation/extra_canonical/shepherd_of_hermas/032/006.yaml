translation:
  text: For when all these spirits dwell in one vessel, the very vessel in which the holy spirit also
    dwells, that vessel cannot contain them; it overflows. The tender spirit, having no habit of dwelling
    with an evil spirit or with harshness, withdraws from such a person and seeks to dwell with gentleness
    and quiet. Then, when it has departed from that person in whom it dwells, that person becomes empty
    of the righteous spirit; and thereafter, being filled with evil spirits, he is unstable in all his
    deeds, dragged here and there by the evil spirits, and is altogether blinded from his good understanding.
    Thus it happens to all who are quick-tempered.
