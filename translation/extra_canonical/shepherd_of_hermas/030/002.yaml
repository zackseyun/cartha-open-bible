translation:
  text: Answering me, he says, "I," he says, "am appointed over repentance, and I give understanding to
    all who repent. Or does it not seem to you," he says, "that this very thing—to repent—is understanding?
    To repent," he says, "is great understanding. For the man who has sinned understands that he has done
    what is evil before the Lord, and the deed that he did rises up in his heart, and he repents and no
    longer does evil, but does good abundantly, and he humbles his own soul and afflicts it, because he
    sinned. You see then that repentance is great understanding."
