translation:
  text: “But there are also indulgences that save people; for many, by doing good things, indulge themselves,
    being carried along by their own pleasure. This indulgence, therefore, is beneficial for the slaves
    of God, and it secures life for such a person; but the harmful indulgences previously mentioned procure
    torments and punishments for them; and if they persist and do not repent, they procure death for themselves.”
