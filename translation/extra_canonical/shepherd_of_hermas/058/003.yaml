translation:
  text: “The one who indulges himself and is deceived for a single day and does what he wants has clothed
    himself with much foolishness and does not perceive the deed he is doing; for on the next day he forgets
    what he did the day before. For indulgence and deception have no memory because of the foolishness
    with which he has clothed himself. But when punishment and torment cling to a person for one day,
    he is punished and tormented for up to a year; for punishment and torment have great memory.
