theological_decisions:
- issue: Scope of ἔθνη
  chosen_reading: Rendered as "nations"
  alternative_readings:
  - Gentiles
  rationale: Hermas operates in a Roman setting where "the nations" stands for the outsider world in general, not a Jew/Gentile boundary marker. "Nations" keeps the universal scope of those outside the righteous.
- issue: Referent nuance of ἀποστάται
  chosen_reading: Rendered as "apostates" to signal falling away from the community
  alternative_readings:
  - rebels
  - deserters
  rationale: Hermas is preoccupied with repentance for those who have fallen; "apostates" captures religious defection rather than generic rebellion.
- issue: Force of ἀνδρίζου
  chosen_reading: Rendered as "Take courage"
  alternative_readings:
  - Be brave
  - Act like a man
  rationale: The imperative exhorts to courageous action. We choose an idiomatic English exhortation that communicates the force without gendered idiom, while noting the literal in a footnote.
