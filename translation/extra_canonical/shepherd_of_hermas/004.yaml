id: HERM.V.1.iv
reference: Shepherd of Hermas — Vision 1, section iv
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Ὅτε οὖν ἐτέλεσεν ἀναγινώσκουσα καὶ ἠγέρθη ἀπὸ τῆς καθέδρας, ἦλθαν τέσσαρες νεανίαι καὶ ἦραν τὴν καθέδραν καὶ ἀπῆλθον πρὸς τὴν ἀνατολήν. 2. προσκαλεῖται δέ με καὶ ἥψατο τοῦ στήθους μου καὶ λέγει μοι· Ἡρεσέν σοι ἡ ἀνάγνωσίς μου; καὶ λέγω αὐτῇ· Κυρία, ταῦτά μοι τὰ ἔσχατα ἀρέσκει, τὰ δὲ πρότερα χαλεπὰ καὶ σκληρά. ἡ δὲ ἔφη μοι λέγουσα· Ταῦτα τὰ ἔσχατα τοῖς δικαίοις, τὰ δὲ πρότερα τοῖς ἔθνεσιν καὶ τοῖς ἀποστάταις. 3. λαλούσης αὐτῆς μετʼ ἐμοῦ δύο τινὲς ἄνδρες ἐφάνησαν καὶ ἦραν αὐτὴν τῶν ἀγκώνων καὶ ἀπῆλθαν, ὅπου καὶ ἡ καθέδρα, πρὸς τὴν ἀνατολήν. ἱλαρὰ δὲ ἀπῆλθεν, καὶ ὑπάγουσα λέγει μοι· Ἀνδρίζου, Ἑρμᾶ.
  language: Greek
  pages:
  - 316
  unit_id: V.1.iv
  label: Vision 1, section iv
  sequence: 4
translation:
  text: 'So when she had finished reading and had risen from the chair[a], four young men came, lifted the chair, and went away toward the east.


    Then she called me over, touched my chest, and said to me, "Did my reading please you?" And I said to her, "Lady, these last things please me, but the earlier things are hard and harsh." But she said to me, "These last things are for the righteous, but the earlier are for the nations[b] and for the apostates."


    While she was speaking with me, two men appeared, lifted her by the elbows, and went away to where the chair also was, toward the east. She went away cheerful, and as she was going she said to me, "Take courage[c], Hermas."'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “These last things … the earlier things” refers to the latter and former parts of her reading, not to eschatological “last things.”
    reason: cultural_note
  - marker: b
    text: Or “Gentiles.”
    reason: lexical_alternative
  - marker: c
    text: Literally, “Act like a man.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναγινώσκουσα / ἀνάγνωσις
  chosen: reading
  alternatives:
  - reciting
  - public reading
  lexicon: BDAG
  rationale: ἀναγινώσκω and its noun ἀνάγνωσις denote the act of reading aloud; in context she has been reading to Hermas. "Reading" preserves the concrete act without adding liturgical nuance.
- source_word: καθέδρα
  chosen: chair
  alternatives:
  - seat
  lexicon: LSJ
  rationale: Concrete piece of furniture in the vision; "chair" keeps the scene vivid. "Seat" is more generic.
- source_word: νεανίαι
  chosen: young men
  alternatives:
  - youths
  lexicon: LSJ
  rationale: Plural of νεανίας; "young men" is clear modern English. "Youths" can sound archaic or ambiguous.
- source_word: ἀνατολή
  chosen: east
  alternatives:
  - sunrise
  - the Orient
  lexicon: BDAG
  rationale: Spatial direction in visionary movement; "toward the east" is the natural rendering.
- source_word: προσκαλεῖται (με)
  chosen: called me over
  alternatives:
  - summoned me
  - called me to herself
  lexicon: BDAG
  rationale: Middle voice with personal object conveys a drawing toward herself; "called me over" reads naturally and preserves proximity nuance.
- source_word: ἥψατο τοῦ στήθους
  chosen: touched my chest
  alternatives:
  - touched my breast
  - laid her hand on my chest
  lexicon: BDAG
  rationale: στῆθος refers to the chest; "chest" is straightforward modern English. Preserves the concrete gesture.
- source_word: ἥρεσεν / ἀρέσκει
  chosen: please / pleased
  alternatives:
  - did you like / I like
  lexicon: BDAG
  rationale: ἀρέσκω regularly means to please. Using the same verb family in question and response preserves lexical cohesion in the exchange.
- source_word: ἔσχατα / πρότερα
  chosen: last things / earlier things
  alternatives:
  - later parts / earlier parts
  - latter / former
  lexicon: LSJ
  rationale: Literally "last" and "former"; here they refer to parts of her reading. Rendering as "last things / earlier things" keeps the literal contrast while context indicates sequence, not eschatology.
- source_word: χαλεπὰ καὶ σκληρά
  chosen: hard and harsh
  alternatives:
  - difficult and severe
  - grievous and harsh
  lexicon: LSJ
  rationale: χαλεπός = difficult, grievous; σκληρός = harsh, severe. "Hard and harsh" keeps the alliteration and weight without over-interpretation.
- source_word: δίκαιοι
  chosen: righteous
  alternatives:
  - just
  lexicon: BDAG
  rationale: δικαίος in early Christian moral discourse commonly rendered "righteous"; fits Hermas's ethical frame.
- source_word: ἔθνη
  chosen: nations
  alternatives:
  - Gentiles
  lexicon: BDAG
  rationale: ἔθνη can mean the Gentiles, but in Hermas the broader sense of the non-Christian nations is likely; "nations" preserves the generic outsider scope.
- source_word: ἀποστάται
  chosen: apostates
  alternatives:
  - rebels
  - deserters
  lexicon: LSJ
  rationale: ἀποστάτης denotes one who has fallen away or rebelled. Given Hermas's concern with those who leave the faith, "apostates" is apt and transparent.
- source_word: ἀγκών
  chosen: elbows
  alternatives:
  - arms
  lexicon: LSJ
  rationale: The genitive construction indicates grasping by the elbows; "elbows" keeps the vivid, specific gesture.
- source_word: ἱλαρά
  chosen: cheerful
  alternatives:
  - glad
  - joyful
  lexicon: LSJ
  rationale: ἱλαρός describes a cheerful, glad disposition; "cheerful" is natural and accurate.
- source_word: ὑπάγουσα
  chosen: as she was going
  alternatives:
  - as she departed
  - as she went away
  lexicon: BDAG
  rationale: ὑπάγω here marks departing movement; participial timing captured with "as she was going".
- source_word: ἀνδρίζου
  chosen: Take courage
  alternatives:
  - Be brave
  - Act like a man
  lexicon: BDAG
  rationale: Idiom literally means "act like a man" = be courageous. "Take courage" conveys the exhortation idiomatically without importing gendered phrasing; note alternatives in footnotes.
- source_word: ἦραν
  chosen: lifted
  alternatives:
  - took up
  - carried off
  lexicon: BDAG
  rationale: Simple physical action; "lifted" matches the immediate raising motion in both occurrences.
