translation:
  text: 6. This shepherd, then, took over the sheep from the shepherd who was a young man—those that were
    living wastefully and self-indulgently, but not skipping—and he cast them into a certain steep, thorny
    place full of thistles, so that, because of the thorns and thistles, the sheep were unable to disentangle
    themselves, but [were entangled in the thorns and thistles; these, then,] being entangled, grazed
    among the thorns and thistles. They suffered greatly, being torn by him; he drove them here and there
    and gave them no rest, and those sheep were not at all steady.
