translation:
  text: ‘Now then,’ he says, ‘you are hearing; keep them, so that even the former lies that you spoke
    in your dealings, if these are found true, those also may become credible; for those too can become
    credible. If you keep these and from now on speak all truth, you will be able to gain life for yourself.
    And whoever hears this command and abstains from the most evil lie will live to God.’
