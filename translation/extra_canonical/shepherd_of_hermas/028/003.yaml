translation:
  text: So when I heard these things, I wept greatly. But seeing me weeping, he says, ‘Why are you weeping?’
    ‘Because, sir,’ I say, ‘I do not know whether I can be saved.’ ‘Why?’ he says. ‘For,’ I say, ‘sir,
    never yet in my life have I spoken a true word, but I have always lived deceitfully with everyone,
    and I made my lie appear true before all people; and no one ever contradicted me, but my word was
    believed. How then,’ I say, ‘sir, can I live, having done these things?’
