translation:
  text: “Listen,” he says. “Those who have never inquired about the truth nor sought concerning the divine,
    but have only believed, and are mixed up with business affairs and wealth and pagan friendships and
    many other affairs of this age—so all who devote themselves to these do not understand the parables
    of the divine; for they are darkened by these pursuits and are corrupted and become barren. Just as
    good vineyards, when they are neglected, become barren from thorns and various weeds, so also the
    people who have believed and fall into these many pursuits just mentioned are led astray from their
    understanding, and they understand nothing at all about righteousness. And even when they hear about
    the divine and the truth, their mind is occupied with their business, and they understand nothing
    at all.
