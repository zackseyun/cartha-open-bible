translation:
  text: 4. And again she took hold of my hand, raised me up, and seated me on the bench on the left; and
    she herself sat on the right. And, lifting up a certain bright rod, she says to me, “Do you see a
    great thing?” I say to her, “Lady, I see nothing.” She says to me, “[You,] look—do you not see opposite
    you a great tower being built upon the waters with square, shining stones?”
