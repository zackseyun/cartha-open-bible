  text: |-
    # Source page p0225 (printed 117)
    ܠܡܦܪܕܐ ܕܢܘܪܐ ܒܙܝ̈ܪܘܗܝ
    ܘܡܠܘܐܐ ܐܚܪܢܐ
    ܐܝܬ ܗܘܘ ܡܢ ܩܕܝܡ
    ܘܐܡܪ ܠܗܘܢ. ܐܝܬܘ
    ܠܡܦܪܕܝܟܘܢ ܘܠܐ ܬܛܥܡܘܢ.
    ܥܕܡܐ ܕܐܡܪ ܠܟܘܢ.
    ܐܫܬܩܠܘ ܕܝܢ ܠܡܘܡܕ
    ܐܡܪ ܠܡܠܐܟܐ ܡܠܠܘ.
    .. 7 ܘܐܦܢܘ ܥܝܢܝܗܘܢ ܡܕܡ
    ܕܦܩܝܕܝܢ ܡܥܢܐ ܡܥܝܢܘܬܐ.
    ܘܚܙܝܬ ܕܐܝܬ ܠܒܝܬ
    ܩܘܕܫܐ ܩܘܕܫܐ. ܘܢܣܒܘ ܡܢ
    ܬܡܢ ܦܪ̈ܘܟܬܐ.
    ܘܐܦܘܕܐ ܡܕܒܚܐ. ܘܚܘܣܝܐ.
    ܘܬܪ̈ܬܝܢ ܟܘܪ̈ܣܘ. ܡܠܒܘܫܐ
    ܩܕܝܫܐ ܕܟܗ̈ܢܐ. ܘܦܝܪܡܐ.
    ܘܐܪܒܥܝܢ ܘܬܡܢܝܐ ܩܪ̈ܢܝܢ
    ܝܩܝܪ̈ܬܐ. ܘܟܠܗ ܡܐܢܐ ܕܗܘܘ
    ܡܘܗܒܬܐ ܘܡܘܠܟܢܐ ܡܪ̈ܢܝܐ
    ܘܩܕܝܫܐ ܕܡܫܟܢܐ. ܘܐܡܪ
    .. 8 ܠܐܪܥܐ ܟܘܠܗ ܪܒܘ.
    ܐܪܥܐ ܐܪܥܐ. ܐܪܥܐ
    ܫ
    ܐܚܪܢܐ ܕܡܕܡ ܕܐܬܦܣܩܬ
    ܬܬܒܢܝ ܐܢܘܢ. ܕܠܐ ܢܫܬܒܗܪܘܢ
    ܒܗܘܢ ܢܘܟܪ̈ܝܐ. ܡܛܠ ܕܡܛܐ
    ܠܗ ܙܒܢܐ ܕܐܫܬܠܡ ܥܕܡܐ
    ܘܐܬܝܗܒܬ. ܒܕܡܐ
    ܕܬܐܡܪ ܕܐܘܟ ܬܘܣܦ
    ܬܬܩܢ ܠܒܒܟ. ܣܓܝܐܐ
    ܪܒܐ ܦܘܩܕܢܝ. ܘܒܥܒܕܐ
    ܐܢܘܢ. 8 ܘܡܢ ܒܬܪ ܗܠܝܢ.
    ܫܒܩܬܗ ܠܡܠܐܟܐ ܗܘ
    ܕܐܡܪ ܠܡܠܐܟܐ ܗܠܝܢ
    ܕܐܚܝܕܝܢ ܗܘܘ ܠܡܦܐܕ̈ܐ.
    ܫܪܘ ܐܡܢܐ ܣܡܝܟܘܬ
    ܫܘܪ̈ܝܗ ܒܕܡܐ ܥܘܪ̈ܩܘ.
    ܕܠܐ ܢܫܬܒܗܪܘܢ ܒܥܠܕܒܒܐ
    ܘܢܐܡܪܘܢ ܕܚܢܢ ܣܚܦܢܝܗܝ
    ܠܫܘܪܐ ܕܨܗܝܘܢ. ܘܐܘܩܕܢ
    ܕܘܟܬܐ ܕܐܠܗܐ ܚܝܒܬܐ.
    ܘܐܬܩܝܡܘܬ ܬܡܢ ܐܢܐ
    ܕܩܕܡ ܗܘܝܬ ܒܗ ܡܢ
    ܩܕܝܡ. ܡܠܐܟܐ ܕܝܢ ܢܚܬܘ
    ܐܝܟ ܕܦܩܕ ܠܗܘܢ. ܘܟܕ
    ܫܪܘ ܙܘܝ̈ܬܗ ܕܫܘܪܐ.
    ܩܠܐ ܐܫܬܡܥ ܡܢ ܓܘ
    ܗܝܟܠܐ. ܡܢ ܒܬܪ ܕܢܦܠ
    ܫܘܪܐ ܕܐܡܪ. ܥܘܠܘ
