    # Source page p0226 (printed 116)
    ܒܥܘܪ ܣܢܝܐ ܡܢ ܚܿܛܝܬܐ
    ܕܡܘܬܗ ܕܡܫܝܚܐ
    ܘܡܘܟܟܗ ܡܬܝ̈ܕܥܢ.
    ܘܗܘ ܙܟܐ ܠܣܛܢܐ ܟܣܝܐܝܬ
    ܐܝܟ ܕܐܦ ܦܪܣܝܐܝܬ܆
    ܐܙܠܐ ܗܘܝܬ ܡܟܝܠ ܐܝܟ
    ܕܡܦܩܕ ܐܢܐ ܠܟܘܢ܀܀܀܀
    5 ܘܒܢܝܬ ܘܐܬܩܢܬ. ܥܠܝܟ
    ܐܢܐ ܗܘܝܬ ܕܐܬܘܒ
    ܚܝܝ ܒܨܝܘܢ ܕܐܬܬ
    ܣܒܪܬܝ ܠܘܬ ܐܡ̈ܘܬܐ
    ܘܐܫܬܡܥ ܫܘܕܠܝ
    ܘܠܡܒܣܢ ܨܒܘܬܝ ܘܠܡܬܒܣܡܘ
    ܀ ܐܠܐ ܐܝܠܝܢ ܕܐܚܒܬ. ܘܐܪܚܡܬ
    ܗܘܘ ܠܐܬܪܐ ܕܦܘܪܫܢܗܘܢ.
    ܘܠܡܬܒܪܘܙܘ ܩܕܡܝܗܘܢ.
    ܘܡܢܐ ܥܒܕܬ ܠܝ ܠܡܣܒ
    ܪܒܘ. ܘܐܡ̇ܪ ܠܝ ܡܪܝܐ.
    ܝܘܡܝ ܬܘܠܡܕܘܬܝܟ ܠܥܠܡܐ
    ܕܠܥܠܡ ܐܬ ܚ̇ܙܝܬ. ܕܢܛܝܪ
    ܕܝܢ ܒܙܒܢܗ ܢܣ̣ܒ ܙܕܩܗ.
    ܘܐܬ ܬܚܙܐ ܒܥܝܢܝ̈ܟ.
    ܕܠܐ ܗܘܐ ܡܒܕܩܢܐ
    ܣ̇ܝܡܝܢ ܠܨܗܝܘܢ. ܘܠܐ ܡܘܩܕܝܢ
    ܠܐܘܪܫܠܡ. ܐܠܐ ܠܕܝ̈ܢܐ
    ܡ̇ܫܡܫܝܢ ܒܙܒܢܐ. ܐܬ ܕܝܢ
    ܐܙܠܐ ܘܡܟܝܠ ܩܘܝ ܡܕܡ
    ܕܐܡܪܝ̣ܢ ܠܝ.. ܘܐܢܬܘܢ
    ܘܒ̈ܢܝܐ ܠܐܢܫܝܢ ܝܠܝܕܘ.
    ܘܠܣܓܝ̈ܐܐ ܝܠܝܕܘܗܝ. ܘܒܣܝ̈ܡܐ
    ܘܠܟܠ ܡܕܡ ܕܗܘܝ ܕܒܣܪ.
    ܘܐܢܬܘܢ ܐܢܘܢ ܥܝܪ̈ܝܐ
    ܕܩܕܡ. ܘܐܫܬܠܛܘ ܠܗܘܢ
    ܟܠ ܕܐܬܒܪܝ ܠܝܘ. ܘܐܢܬܘܢ
    ܝܕܥܝܬܘܢ ܡܒܘܥܗ ܕܥܠܡܐ.
    ܘܐܬܒܥܝ ܬܘܒ ܩܕܡܝ ܥܕܡܐ
    6 ܠܥܕܢܐ܀܀܀܀܀܀܀܀ ܗܘܘ
    ܠܗܘ ܡܢܐ ܕܡܚ̣ܪ. ܗܘܘ
    ܚܝ̈ܠܐ ܕܒ̈ܥܝܕܐ ܩܕܡܘ̈ܗܝ
    ܠܡܕܝ̣ܢܬܐ. ܘܒܥܝܢ ܕܢܫܪܘ̣ܢ
    ܚܟܡܬܗ ܠܥܡܐ ܐܢ
    ܒܨܘ̣ܗ. ܘܢܦܩܘ ܣܘ̈ܓܐܐ
    ܠܝ ܐܠܐ ܒܥܘܬ̣ܐ. ܘܐܬܒܥܝܬ
    ܬܘܒ ܐܠܐ ܨܘܡܐ
    ܘܐܬܬܙܝܥܝ ܐܠܐ ܡܥܪ̈ܬܐ
    ܕܐܠܐ ܐܠܐ ܒܟܝܐ. ܗܘܘ
    ܡܝܢ ܡܠܝ̣ܐ. ܪܘܚܐ ܕܚܝ̈ܠܐ
    ܐܬܡܠܝ̣ܬ. ܘܐܣܬܠܩ
    ܠܥܠܐ ܡܢ ܫܘܩܐ ܕܐܘܪܫܠܡ
    ܠܥܠܐ. ܘܚܙܝܬ ܗܘܘ
    ܐܪܒܥܐ ܡܠܐܟ̈ܝܢ ܩܝܡܝ̣ܢ
    ܥܠ ܐܪܒܥܬܝܗܝܢ ܙܘܝ̈ܬܗ̇
    ܕܡܕܝ̣ܢܬܐ ܟܕ ܐܚܝܕܝ̣ܢ
    ܗܘܘ ܚܕ ܚܕ ܠܡܦܝܕܐ
    
    # Source page p0225 (printed 117)
    ܠܡܦܪܕܐ ܕܢܘܪܐ ܒܙܝ̈ܪܘܗܝ
    ܘܡܠܘܐܐ ܐܚܪܢܐ
    ܐܝܬ ܗܘܘ ܡܢ ܩܕܝܡ
    ܘܐܡܪ ܠܗܘܢ. ܐܝܬܘ
    ܠܡܦܪܕܝܟܘܢ ܘܠܐ ܬܛܥܡܘܢ.
    ܥܕܡܐ ܕܐܡܪ ܠܟܘܢ.
    ܐܫܬܩܠܘ ܕܝܢ ܠܡܘܡܕ
    ܐܡܪ ܠܡܠܐܟܐ ܡܠܠܘ.
    .. 7 ܘܐܦܢܘ ܥܝܢܝܗܘܢ ܡܕܡ
    ܕܦܩܝܕܝܢ ܡܥܢܐ ܡܥܝܢܘܬܐ.
    ܘܚܙܝܬ ܕܐܝܬ ܠܒܝܬ
    ܩܘܕܫܐ ܩܘܕܫܐ. ܘܢܣܒܘ ܡܢ
    ܬܡܢ ܦܪ̈ܘܟܬܐ.
    ܘܐܦܘܕܐ ܡܕܒܚܐ. ܘܚܘܣܝܐ.
    ܘܬܪ̈ܬܝܢ ܟܘܪ̈ܣܘ. ܡܠܒܘܫܐ
    ܩܕܝܫܐ ܕܟܗ̈ܢܐ. ܘܦܝܪܡܐ.
    ܘܐܪܒܥܝܢ ܘܬܡܢܝܐ ܩܪ̈ܢܝܢ
    ܝܩܝܪ̈ܬܐ. ܘܟܠܗ ܡܐܢܐ ܕܗܘܘ
    ܡܘܗܒܬܐ ܘܡܘܠܟܢܐ ܡܪ̈ܢܝܐ
    ܘܩܕܝܫܐ ܕܡܫܟܢܐ. ܘܐܡܪ
    .. 8 ܠܐܪܥܐ ܟܘܠܗ ܪܒܘ.
    ܐܪܥܐ ܐܪܥܐ. ܐܪܥܐ
    ܫ
    ܐܚܪܢܐ ܕܡܕܡ ܕܐܬܦܣܩܬ
    ܬܬܒܢܝ ܐܢܘܢ. ܕܠܐ ܢܫܬܒܗܪܘܢ
    ܒܗܘܢ ܢܘܟܪ̈ܝܐ. ܡܛܠ ܕܡܛܐ
    ܠܗ ܙܒܢܐ ܕܐܫܬܠܡ ܥܕܡܐ
    ܘܐܬܝܗܒܬ. ܒܕܡܐ
    ܕܬܐܡܪ ܕܐܘܟ ܬܘܣܦ
    ܬܬܩܢ ܠܒܒܟ. ܣܓܝܐܐ
    ܪܒܐ ܦܘܩܕܢܝ. ܘܒܥܒܕܐ
    ܐܢܘܢ. 8 ܘܡܢ ܒܬܪ ܗܠܝܢ.
    ܫܒܩܬܗ ܠܡܠܐܟܐ ܗܘ
    ܕܐܡܪ ܠܡܠܐܟܐ ܗܠܝܢ
    ܕܐܚܝܕܝܢ ܗܘܘ ܠܡܦܐܕ̈ܐ.
    ܫܪܘ ܐܡܢܐ ܣܡܝܟܘܬ
    ܫܘܪ̈ܝܗ ܒܕܡܐ ܥܘܪ̈ܩܘ.
    ܕܠܐ ܢܫܬܒܗܪܘܢ ܒܥܠܕܒܒܐ
    ܘܢܐܡܪܘܢ ܕܚܢܢ ܣܚܦܢܝܗܝ
    ܠܫܘܪܐ ܕܨܗܝܘܢ. ܘܐܘܩܕܢ
    ܕܘܟܬܐ ܕܐܠܗܐ ܚܝܒܬܐ.
    ܘܐܬܩܝܡܘܬ ܬܡܢ ܐܢܐ
    ܕܩܕܡ ܗܘܝܬ ܒܗ ܡܢ
    ܩܕܝܡ. ܡܠܐܟܐ ܕܝܢ ܢܚܬܘ
    ܐܝܟ ܕܦܩܕ ܠܗܘܢ. ܘܟܕ
    ܫܪܘ ܙܘܝ̈ܬܗ ܕܫܘܪܐ.
    ܩܠܐ ܐܫܬܡܥ ܡܢ ܓܘ
    ܗܝܟܠܐ. ܡܢ ܒܬܪ ܕܢܦܠ
    ܫܘܪܐ ܕܐܡܪ. ܥܘܠܘ
