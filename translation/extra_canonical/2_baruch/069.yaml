  text: |-
    # Source page p0178 (printed 164)
    ܡܕܡ ܕܗܘܐ. ܐܠܐ ܕܝܢ
    ܢܝܕܥ ܗܘܐ. ܕܠܐ ܡܢܝ
    ܬܬܚܙܐ. ܘܠܐ ܢܫܬܘܕܥ
    ܪܝܫܝܘܬܐ ܕܗܘ ܕܬܩܢ
    ܡܢ ܡܪܝܫܝܬ. ܬܬܚܙܐ ܗܘܬ
    ܘܒܥܝܢܝ ܐܝܠܝܢ ܕܗܘ̈ܝ
    ܗܘܝ. ܘܡܬܬܡܗܝܢ ܚܝ̈ܢ
    ..ܒܒܪ̈ܝܐ ܠܐ ܙܥܝܪ ܕܐܝܬܝܗܘܢ.
    76 ܘܥܢܐ ܘܐܡܪ ܠܝ. ܡܛܘܠ
    ܕܐܦܝܣܬ ܠܝ ܕܐܚܘܝܟ
    ܕܐܘ ܗܘܐ ܐܝܟ
    ܕܥܒܝܕ. ܝܘܠܦܢܐ ܡܥܠܝܬ
    ܕܡܕܡܕܐ. ܕܐܝܟ ܡܕܡ
    ܕܥܬܝܕ ܠܡܗܘܐ ܥܕ ܡܢ ܒܬܪ ܀ f. 265,
    ܗܠܝܢ. ܡܛܠ ܕܒܙܒܢܐ ܕܐܬܬ v. a.
    ܡܢ ܐܕܡ ܐܬܒܪܝ. ܩܕܡ
    ܕܝܢ ܠܐ ܗܘܐ ܒܡܘܬܐ.
    ܐܠܐ ܒܚܛܗܐ ܕܒܬܪ. ܣܟ
    ܘܡܠܐ ܠܒܝܫܘܬ ܩܢܘܡܐ
    ܗܘܐ ܘܠܒܘܫܗ ܩܕܡܝܐ
    ܒܥܘܗܝ ܬܘ̈ܠܕܬܐ
    ܕܐܢܫܐ ܗܘܐ. ܘܫܘܘܕܝܐ
    ܕܐܒܝܠܐ ܢܣܒܘ ܛܘ̈ܪܐ.
    ܘܡܘܡܘܐ ܕܚܠܐ.
    ܘܡܘܪܡܘܪܐ ܕܣܒܪ
    ܘܡܚܝܠܐ ܕܬܘ̈ܝܗܐ ܕܐܝܕܐ
    ܡܢܝ ܝܘܡܝܢ ܐܬ. ܘܠܐܢܫܐ
    ܩܕܡܝܐ ܡܢ ܟܬܪ ܐܢܫܝܢ
    ܝܘܡ̈ܝܢ. ܗܢܘ ܗܟܝܠ
    ܚܘܫܒܐ ܗܢܝܢ ܐܠܐ
    ܘܐܦܝܣܝܢ ܥܡܡܐ ܟܡܐ
    ܕܡܫܟܚ ܐܢܬ. ܕܠܐܠܗܘܢ
    ܕܠܐ ܢܡܘܬܘܢ ܒܙܒܢܐ
    ܐܚܪܝܐ. ܐܠܐ ܝܠܦܘܢ
    ܀ ܕܢܐܚܘܢ ܒܙܒܢܐ ܐܚܪܝܐ܀
    77 ܘܐܙܠܬ ܐܢܐ ܒܪܘܟ ܡܢ
    ܬܡܢ ܘܐܬܝܬ ܕܝܢ
    ܥܡܐ. ܘܟܢܫܬ ܐܢܘܢ ܡܢ
    ܪܒܐ ܘܥܕܡܐ ܠܙܥܘܪܐ.
    ܘܐܡܪܬ ܠܗܘܢ. ܫܡܥܘ
    ܒ̈ܢܝ ܐܝܣܪܝܠ. ܚܙܘ ܕܟܡܐ
    ܐܫܬܚܪܬܘܢ ܡܢ ܬܪܥܣܪ
    ܫܒ̈ܛܐ ܕܐܝܣܪܝܠ. ܠܟܘܢ
    ܕܝܢ ܘܠܐܒܗܝܟܘܢ ܡܪܝܐ
    ܝܗ̣ܒ ܢܡܘܣܐ ܝܬܝܪ ܡܢ
    ܟܘܠܗܘܢ ܥܡܡ̈ܐ. ܘܡܛܠ
    ܕܥܒܪܘ ܐܚ̈ܝܟܘܢ ܦܘܩ̈ܕܢܘܗܝ
    ܕܡܪܝܡܐ. ܐܝܬܝ ܥܠܝܗܘܢ
    ܡܕܥܡ ܕܚܙܝܬܘܢ ܐܠܐ
    ܚܣܘ ܥܠ ܩܕܡ̈ܝܐ. ܐܠܐ
    ܐܦ ܠܐܚܪ
    
    # Source page p0177 (printed 165)
    ܘܐܬܚܙܝܬ ܠܐ ܙܕܝܩܘܬܗ
    ܐܦ ܐܢܬܘܢ ܐܝܟ ܕܐܒܘ
    ܐܚܝܟܘܢ. ܐܠܐ ܙܕܝܩ
    ܢܕܐܢ ܥܘܠܘܗܝ. ܡܛܠ
    ܕܡܚܣܢܢܐ ܗܘ ܗܘ
    ܕܒܥܝܢ ܐܢܬܘܢ ܠܗ.
    ܘܡܚܣܢܢܐ ܗܘ ܗܘ
    ܕܡܣܒܪܝܢ ܐܢܬܘܢ ܒܗ.
    ܘܢܚܙܐ ܗܘ ܕܢܛܪ ܠܐ
    ܕܢܥܙܒ. ܠܐ ܐܘ ܐܢܬܘܢ
    ܚܙܝܬܘܢ ܡܕܡ ܕܓܕܫܗ
    ܠܨܗܝܘܢ. ܐܘ ܕܠܡܐ
    ܣܒܪܝܬܘܢ ܕܐܪܙܐ ܚܛܝܘ.
    ܡܛܠ ܗܢܐ ܐܬܚܪܒܘ.
    ܐܘ ܐܢܫܐ ܡܕܡ
    ܐܣܟܠܘ. ܡܛܠ ܗܢܐ
    ܐܫܬܠܡܘ. ܘܠܐ ܝܕܥܝܢ
    ܐܢܬܘܢ ܕܡܛܠܬܟܘܢ
    ܕܝܠܗܘܢ ܐܬܚܝܒܘ ܗ̇ܘ
    ܐܢܫܐ ܕܠܐ ܚܛܘ. ܡܛܠ
    ܐܝܠܝܢ ܕܥܒܕܘ ܐܢܬܘܢ
    ܠܡܒܥܕ ܒܟܘܢ ܗ̇ܘ ܐܢܫܐ
    ܕܠܐ ܣܟܠܐ. ܘܥܒ̣ܕ ܫܠܡ
    ܥܡܢ ܘܐܘܕܥܘ ܠܝ. ܡܛܠ
    ܕܡ̇ܢܝܢ ܐܢܬܘܢ ܥܕܘ̈ܬܝ
    ܛܒ̈ܬܐ ܕܥܒ̣ܕ ܥܡܟܘܢ
    ܚܝܠܬܢܐ. ܟܕ ܚܙܝܢ ܚܢܢ
    ܘܐܝܠܝܢ ܕܠܐ ܟܕ ܚܙܝܢ ܚܢܢ
    ܗܘ ܟܪܝܣܛܘܣ ܢܝܬ̣ܐ.
    ܒܪܡ ܕܝܢ ܐܦܢ ܒܥܝܪܘ
    ܠܢ ܠܡܥܠ. ܘܐܢܬܘܢ ܐܦ
    ܠܐܢܫ ܠܡܥܠ ܐܓܪܬܐ
    ܕܝܘܠܦܢܐ ܡܕܡ ܕܣܒܪܬܐ.
    ܕܐܦ ܠܗܘܢ ܬܚܘܐ ܡܕܡ
    ܡܕܡ ܕܠܐ ܬܙܠܐ ܠܡ
    ܡܢ ܠܘܬܢ. ܐܒ̣ܕܘ ܠܗܘܢ
    ܓܝܪ ܪ̈ܥܘܬܐ ܕܐܝܣܪܝܠ.
    ܘܕܒܗ ܫܪ̈ܓܐ ܕܡܢܗܪܝܢ
    ܗܘܘ. ܘܒܗ ܡܒܘ̈ܥܐ
    ܕܪܕܝܢ ܡܢ ܐܝܟܐ
    ܕܫܬܝܢ ܗܘܝܢ. ܚܢܢ ܕܝܢ
    ܐܫܬܒܩܢ ܒܚܫܘܟܐ ܘܒܥܒܐ
    ܕܥܒܐ. ܘܒܨܗܝܐ
    ܕܡܕܒܪܐ. ܘܥܢܝܬ ܘܐܡܪܬ
