<<<<<<< Updated upstream
  text: 'That great cloud which you saw ascending from the sea and going to cover the earth—understand this: it is the duration of the world which the Mighty One made when he resolved to create it.[1][2] And it came to pass that, when the word went forth from before him, the establishment of the world arose—fair, small—and it was prepared as it was fitting to be.[3]


    And as for the first black waters which you saw descending from that cloud upon the earth, this is the transgression which Adam, the first man, transgressed. For when he transgressed, death was aroused before its time, and mourning became known, and afflictions were prepared, and pains were multiplied, and toil was established; and greatness began to wane.


    And the last day, which appeared in a form and took on a likeness—you will know that the time will be demanded, and the measure of humanity will be measured, and its strength will be tested.[4][5]


    Therefore, because Adam—when he heard from God what had come to be, and because he understood that the release of the dead had been given, and received command from God—he understood and considered, and five thoughts were thought: he made himself liable; he was liable also before the angels; and even in the time in which he had been created, a vision was seen by him; and concerning the bitter life and the elements with fire.[6][7]


    And thus God gathered [all things] in [their] time, in the likeness in which they had been created.'
