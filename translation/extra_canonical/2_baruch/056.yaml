  text: |-
    # Source page p0191 (printed 151)
    ܗܘܝܬ ܘܐܬܬܙܝܥܬ
    ܘܡܬܚܫܒ ܗܘܝܬ
    ܥܠ ܙܪܥܗ ܕܐܢܫܐ
    ܕܟܡܐ ܣܓܝ̈ܐܝܢ
    ܐܝܠܝܢ ܕܐܙܠܘ.
    ܘܙܥܘܪܝܢ ܐܝܠܝܢ
    ܕܡܬܢܛܪܝܢ. ܘܟܕ
    ܐܢܐ ܡܬܚܫܒ ܗܘܝܬ
    ܒܗܠܝܢ ܫܡܥܬ
    ܗܘܝܬ ܩܠܐ ܕܐܡܪ
    ܠܝ. ܒܪܢܫܐ
    ܡܛܠ ܡܢܐ ܡܬܕܘܕ
    ܐܢܬ. ܘܡܛܠ ܡܢܐ
    ܡܬܪܗܒ ܐܢܬ.
    ܕܡܢ ܩܕܡ ܕܬܬܒܪܐ
    ܐܢܬ ܝܕܝܥ ܗܘܝܬ
    ܠܝ. ܘܡܢ ܩܕܡ
    ܕܬܦܘܩ ܡܢ ܟܪܣܐ
    ܕܐܡܟ ܐܬܝܕܥܬ
    ܠܝ. ܘܡܛܠ ܗܢܐ
    ܐܬܚܘܝܬ ܠܟ
    ܗܠܝܢ ܕܥܬܝܕܢ.
    ܘܐܡܪܬ ܠܗ. ܡܪܝ
    ܐܢܬ ܚܘܝܬܢܝ
    ܪܘܒܐ ܕܙܒܢܐ.
    ܘܡܐ ܕܗܘܐ ܒܗ.
    ܘܠܐ ܚܘܝܬܢܝ ܡܢ
    ܐܝܕܐ ܥܕܡܐ ܠܐܝܕܐ.
    ܡܟܐ ܕܛܒܐ ܕܐܫܬܡܥ
    ܕܐܢܫܝܢ ܕܣܗܕܘ ܗܘܘ
    ܡܛܠ ܬܘܪܨܐ. ܚܕ ܡܢ
    ܟܕ ܗܘ ܒܥܝܕܐ ܢܛܝܪ
    ܘܐܫܬܘܕܝܘ ܠܝ ܣܘܓܐܐ
    ܕܛܒ̈ܬܐ ܘܕܒܝܫ̈ܬܐ ܕܐܬܝܢ
    ܘܗܝܕܝܢ ܣܠܩܬ ܠܛܘܪܐ.
    ܘܗܘܐ ܡܢ ܒܬܪ ܫܒܥܐ
    ܝܘܡ̈ܝܢ ܐܬܝܬ ܠܗܘܟܝܠ
    ܕܘܟܬܐ ܡܢܘܗܝ ܡܒܘܥܐ.
    ܘܗܘܐ ܟܕ ܝܬܒ ܐܢܐ ܬܡܢ
    ܥܠ ܡܪܟܒܬܐ ܕܥܢܢܐ
    ܘܐܬܢܣܒܬ ܠܝ ܠܐ ܟܕ
    ܒܦܓܪܐ. ܘܠܐ ܕܝܕܝܥ.
    ܘܐܬܚܙܝ ܠܝ ܪܐܙܐ
    ܘܫܡܥܬ ܩܠܐ ܕܐܡܪ
    ܠܝ. ܚܙܝ ܘܐܝܕܥ ܕܐܝܟܢ
    ܢܬܢܛܪܘܢ ܒܥܠܡܐ ܗܢܐ
    ܥܒܕܝ̈ܗܘܢ ܘܥܡܠܝ̈ܗܘܢ. ܡܢ ܐܝܟ
    ܡܕܡ ܕܚܙܝܬ ܠܗܘܟܝܠ.
    ܕܐܢܫܝܢ ܕܫܦܝܪ ܘܕܐܢܫܝܢ
    ܒܝܫܐܝܬ. ــ ܐܡܪ ܐܢܐ
    
    # Source page p0190 (printed 152)
    ܕܚܙܝܬ ܥܢܢܐ ܪܒܬܐ ܕܣܠܩܬ
    ܡܢ ܝܡܐ. ܘܐܙܠܬ ܘܚܦܝܬܗ
    ܠܐܪܥܐ ܗܕܐ ܫܡܥ
    ܕܒܥܠܡܐ ܗܘ ܕܥܒܕ ܚܝܠܘܗܝ.
    ܟܕ ܐܬܚܫܒ ܕܢܥܒܕ ܒܪܝܬܐ.
    ܘܗܘܐ ܟܕ ܢܦܩܬ ܡܠܬܐ
    ܡܢ ܩܕܡܘܗܝ. ܩܡ
    ܗܘܐ ܩܘܝܡܐ ܕܥܠܡܐ
    ܫܦܝܪ ܙܥܘܪ. ܘܐܬܩܢ ܐܝܟ
    ܗܿܘ ܕܡܬܒܥܐ ܗܘܐ
    ܕܢܗܘܐ. ܘܐܢܬ ܕܚܙܝܬ ܩܕܡܝܬ
    ܡܝ̈ܐ ܐܘܟܡ̈ܐ ܕܢܚܬܘ
    ܠܥܠ ܡܢܗ ܕܥܢܢܐ
    ܗܝ ܐܝܬܝܗܿ ܚܛܗܐ
    ܡܬܒܪܝܢܘܬܐ ܕܥܒܕ ܐܕܡ
    ܩܕܡܝܐ ܩܕܡܝܬ. ܡܛܠ ܕܟܕ
    ܚܛܐ ܐܬܬܙܝܥ ܡܘܬܐ ܕܠܐ
    ܒܙܒܢܗ ܗܘܐ. ܘܐܒܠ
    ܐܬܝܕܥ. ܘܟܘܐܒܐ
    ܐܬܬܩܢܘ ܘܟܐܒܐ
    ܐܬܒܪܝܘ. ܘܥܡܠܐ ܐܬܓܡܪܘ. ܀ .v .b
    ܘܪܘܪܒܘܬܐ ܫܪܝܬ ܕܬܡܘܟ.
    ܘܝܘܡܐ ܐܚܪܝܐ ܕܐܬܚܙܝܬ
    ܒܨܘܪܬܐ ܘܢܣܒܬ ܕܡܘܬܐ
    ܗܘܝ. ܬܬܝܕܥ ܕܙܒܢܐ
    ܬܬܒܥ. ܘܢܘܡܫܐ
    ܕܐܢܫܘܬܐ ܬܬܡܫܚ.
    ܘܢܬܒܚܢ ܚܝܠܗ. ܡܛܠ
    ܗܟܝܠ ܕܐܕܡ ܗܘܐ ܟܕ
    ܕܫܡܥ ܡܢ ܐܠܗܐ ܡܕܡ
    ܕܗܘܐ. ܘܗܘ ܫܘܒܩܢܐ
    ܕܡ̈ܝܬܐ ܐܣܬܟܠ ܕܝܗܝܒ.
    ܘܡܢ ܐܠܗܐ ܐܬܦܩܕ ܗܘܝ.
    ܐܣܬܟܠ ܡܬܚܫܒ ܗܘܐ.
    ܘܚܡܫ ܚܫ̈ܒܬܐ ܐܬܚܫܒ.
    ܗܘ ܓܝܪ ܠܢܦܫܗ ܗܘܐ
    ܡܚܝܒܢܘܗܝ. ܐܦ ܒܡܠܐܟ̈ܐ
    ܗܘܐ ܡܚܝܒܢܘܗܝ. ܘܐܦ
    ܓܝܪ ܒܗܘ ܙܒܢܐ ܕܐܬܒܪܝ
    ܒܗ. ܗܘܐ ܠܗ ܚܙܘܐ
    ܚܙܝܐ. ܘܠܚܝܘܬܐ ܡܪܝܪܬܐ
    ܘܠܐܣܛܘܟܣܐ ܥܡ ܢܘܪܐ.
    ܘܗܘܝܟܝܢ ܐܠܗܐ ܟܢܫ
    ܒܥܕܢ. ܒܕܡܘܬܐ ܕܐܬܒܪܝܘ.
