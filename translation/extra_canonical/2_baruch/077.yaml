  text: |-
    # Source page p0171 (printed 171)
    ܐܠܐ ܐܦ ܥܠ ܟܘܠ
    ܝܘܡܝܗܘ ܡܠܬܐ ܐܢ ܨܒܝܢ
    ܡܬܬܟܠܘ ܗܘܘ ܥܠ
    ܨܒܝܢܗܘܢ. ܘܒܥܝܘ ܪ̈ܚܡܝ ܡܢ
    ܡܪܝܡܐ ܘܐܡܪܘ. ܕܗܠܝܢ
    ܥܕܡܐ ܠܐܚܪܝܬܐ ܩܝ̈ܡܢ
    ܠܢ. ܘܒܒܥܘܬܢ ܐ̈ܬܝܢ ܥܠܝܢ
    ܟܝ̈ܦܬܐ ܗܠܝܢ. ܘܥܒ̣ܕ
    ܚܝܠܬܐ ܐܝܟ ܣܘܓܐܐ
    ܕܪ̈ܚܡܘܗܝ. ܘܫܒܩܘ
    ܐܝܟ ܪܒܘܬܐ ܕܚܢܢܗ.
    ܘܓܠܐ ܠܢ ܡܠܬܐ ܐܝܟ
    ܕܐܬܥܙܙ. ܘܝܘܗܒܢ
    ܚܘ̈ܘܝ ܐܝܟ ܕܬܘܒ ܠܐ
    ܐܬܬܟܝܘ. ܘܐܘܒܕܘ
    ܐ̈ܢܫܐ. ܘܡܬܬܒܥܝܢ
    ܒ̈ܢܝܐ ܚܘܛܝܐ. ܡܛܠ
    ܕܗܘ ܐܢܚܢܢ ܟܠܢ
    ܕܐܫܬܚܪܢ ܡܢ
    ܗܘ ܥܡܐ ܕܒܩ̈ܐ.
    ܕܚܕ ܝܕܥܝܢܢ ܕܡܐܟܠ
    ܟܪܨܐ ܡܢ ܟܠܗܘܢ
    ܥܒܕܝ̈ܒܝܫܬܐ. ܐܝܟ ܕܠܐ ܡܕܡ
    ܕܒܝܫܘܬ ܠܢ ܘܒܝܕ ܐܝܬܝܘܬ
    ܫܪܝܪܐ ܗܘ ܝܘܠܦܢܐ ܕܒܗ
    ܡܬܝܕܥܐ ܬܪܝܨܘܬܗ
    ܕܐܠܗܐ. ܘܠܐ ܗܘܐ
    ܐܚܪܢܝܐ ܡܘܠܟܢܐ ܕܕܝܠܗ.
    
    # Source page p0170 (printed 172)
    ܘܦܘܡܢ ܚܕܝܐ ܗܘܐ
    ܕܡܕܥܝܢܘܬܐ ܕܒܩ̈ܘܡܐ
    ܟܕ ܗ̣ܘܘܢ ܡܪ̈ܡܫܝܢ. ܐܠܐ
    30 ܠܘܩܒܠܐ ܗܘ ܕܡ̇ܘܬܐ ܘܚܪܒ̣ܐ
    ܒܣܘܓܐܐ ܕܐܚܝ̣ܕܘܗܝ
    ܟܕ ܗ̣ܘܘܢ ܡܥܘܟܒܝܢ. ܐܠܐ
    ܠܛܝܒܘܬܐ ܢܬܕܟܪܘܢ. ܘܚܕܝܐ
    ܫܪܪܐ ܕܚܠܡܘܗܝ ܟܕ ܗ̣ܘܘܢ
    35 ܠܘܩܒܠܐ ܚܠܝ̈ܨܐ ܩ̇ܝܡܝܢ
    ܒܟܠ ܙܒܢ̈ܐ ܐܠܐ ܐܝܟ
    ܪܘܡܐ ܕܬܚܦܝܦܘܢ ܦܪ̈ܥܘܢܝܟܘܢ
    ܐܠܐ ܬܫܒܘܚܬܐ ܕܪܒܘܬܗܘܢ.
    ܟܕ ܗ̣ܘܘܢ ܠܐ ܢ̇ܛܪܝܢ
    40 ܩܝ̈ܡܘܗܝ ܕܡ̣ܫܡܠܐ. ܐܠܐ
    ܐܝܟ ܙܠܝܠܐ ܥܒܕܘܗܝ.
    ܘܐܢܚܢܢ ܐܠܐ ܫܘܦܪܐ
    ܕܐܬܚܙܝܬ. ܟܕ ܗ̣ܘܝܬ
    ܒܥܘ̈ܩܡܐ ܡܬܬܙܝܥ. ܐܠܐ
    45 ܐܝܟ ܒܣܪܐ ܕܚܫܐ
    ܢܬܒܥܘܢ. ܘܡܬܚܫܒܝܢ ܚܢܢ
    ܐܠܐ ܒܘܚܪܢܐ ܕܡܫܬܘܕܝܢ.
    ܟܕ ܗ̣ܘܝܬ ܚܙܐ ܐܢܐ
    ܡܬܬܙܝܥ. ܐܠܐ ܐܝܟ
    50 ܓܠܐ ܕܒܟܝ ܢܫܬܚܩܘܢ.
    ܘܡܬܒܥܝܢ ܐܠܐ ܡܣܒܪܢܐ
    ܕܚܠܘܗܝ. ܟܕ ܗ̣ܘܝܬ ܦܪܚ
    ܒܛܘܒܘܗܝ ܕܐܠܗܐ ܗ̇ܘ
    ܕܝܗ̣ܒ ܠܗܘܢ. ܐܠܐ ܐܝܟ
    55 ܓܢܝܙ ܕܒܟܝ ܢܒܟܘܢܝܗܝ.
    83 ܡܪܝܡܐ ܓܝܪ ܡܣܪܗܒ
    ܡܣܪܗܒ ܙܒܢ̈ܘܗܝ. ܘܡܐܬܝܘ
    ܡܐܬܐ ܫܢ̈ܘܗܝ. ܘܡܢ
