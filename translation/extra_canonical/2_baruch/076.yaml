  text: |-
    # Source page p0172 (printed 170)
    ܘܐܬܬܙܝܥ ܫܘܪܝܐ ܕܒܪܝܬܐ܆
    ܘܒܥܝܢ ܕܠܐ ܡܣܩܝܢ ܗܘ̈ܝ
    ܕܢܬܒܩܝܢ. ܒܙܒܢ ܕܝܢ ܡܝ̈ܬܝܢ
    ܗܘܘ̣ ܡܐ ܛܒܝ̈ܢ. ܐܝܟ ܕܠܐ
    75 ܢܣܬܟܠܘܢ ܡܢ ܒܥܠܕ̈ܒܒܐ.
    ܘܟܕ ܥܒ̣ܕܘ ܗܠܝܢ. ܗܝܕܝܢ
    ܐܫܠܡܘ ܠܒܥܠܕ̈ܒܒܐ ܚܘܪܐ.
    ܟܕ ܣܝܡܝܢ ܘܒܥܝܢ ܐܦ ܟܕ
    ܟܐܝܢ. ܘܡܘܒܠܝܢ ܟܕ ܡܘܩܕܝܢ.
    80 ܘܒܡܢܐ ܕܐܒ̣ܕ ܡܛܠ
    ܕܐܫܬܒܩ. ܕܠܐ ܢܗܘܘܢ
    ܡܫܬܒܗܪܝܢ ܒܥܠܕ̈ܒܒܐ
    ܘܐܡܪܝܢ ܕܗܘ̣ܐ ܐܬܟܪܝܟ
    ܥܕܡܐ ܕܐܦ ܠܒܝܬܗ
    85 ܘܡܕܡܕܐ ܠܚܕܕܐ ܒܩܪܒܐ܀
    ܐܦ ܠܐ̈ܢܫܘܗܝ ܦܩ̣ܕܘ
    ܘܐܘܒܕܘ ܠܒܒܠܝܐ. ܘܐܒܘܕܘ
    ܐܢܘܢ ܐܝܟ. ܘܐܫܬܚܪܢ
    ܚܢܢ ܘܙܪܥܢ. ܩܠܝܠܐ ܙܥܘܪ̈ܐ܀
    90 ܐܘܕܐ ܗܘܝ ܥܡܐ
    ܕܟܬܝܒ ܠܟܘܢ ܒܠܒܝܘ̈.
    ܫܘܪܝܐܝܬ ܓܝܪ ܝܼܕܥ ܐܢܬ.
    ܕܡܟܝܟ ܐܗܘܐ ܠܟܘܢ
    ܒܦܘܪܥܢܐ ܕܙܕܩܝܘ. ܡܟܐ
    95 ܕܝܕܥܝܢ ܗܘܝܬܘܢ ܕܡܕܥܝܟܘ[ܢ]
    ܬܘܒ ܝܬܝܪ ܡܢ ܥܡܐ.
    ܕܡܫܡܫܝܢ ܗܘܝܬܘܢ
    ܕܐܢܚܢܘܢ ܡܥܕܪܝܢ. ܘ ــ ܘ ــ ܡܝ̣ܕ܀
    
    # Source page p0171 (printed 171)
    ܐܠܐ ܐܦ ܥܠ ܟܘܠ
    ܝܘܡܝܗܘ ܡܠܬܐ ܐܢ ܨܒܝܢ
    ܡܬܬܟܠܘ ܗܘܘ ܥܠ
    ܨܒܝܢܗܘܢ. ܘܒܥܝܘ ܪ̈ܚܡܝ ܡܢ
    ܡܪܝܡܐ ܘܐܡܪܘ. ܕܗܠܝܢ
    ܥܕܡܐ ܠܐܚܪܝܬܐ ܩܝ̈ܡܢ
    ܠܢ. ܘܒܒܥܘܬܢ ܐ̈ܬܝܢ ܥܠܝܢ
    ܟܝ̈ܦܬܐ ܗܠܝܢ. ܘܥܒ̣ܕ
    ܚܝܠܬܐ ܐܝܟ ܣܘܓܐܐ
    ܕܪ̈ܚܡܘܗܝ. ܘܫܒܩܘ
    ܐܝܟ ܪܒܘܬܐ ܕܚܢܢܗ.
    ܘܓܠܐ ܠܢ ܡܠܬܐ ܐܝܟ
    ܕܐܬܥܙܙ. ܘܝܘܗܒܢ
    ܚܘ̈ܘܝ ܐܝܟ ܕܬܘܒ ܠܐ
    ܐܬܬܟܝܘ. ܘܐܘܒܕܘ
    ܐ̈ܢܫܐ. ܘܡܬܬܒܥܝܢ
    ܒ̈ܢܝܐ ܚܘܛܝܐ. ܡܛܠ
    ܕܗܘ ܐܢܚܢܢ ܟܠܢ
    ܕܐܫܬܚܪܢ ܡܢ
    ܗܘ ܥܡܐ ܕܒܩ̈ܐ.
    ܕܚܕ ܝܕܥܝܢܢ ܕܡܐܟܠ
    ܟܪܨܐ ܡܢ ܟܠܗܘܢ
    ܥܒܕܝ̈ܒܝܫܬܐ. ܐܝܟ ܕܠܐ ܡܕܡ
    ܕܒܝܫܘܬ ܠܢ ܘܒܝܕ ܐܝܬܝܘܬ
    ܫܪܝܪܐ ܗܘ ܝܘܠܦܢܐ ܕܒܗ
    ܡܬܝܕܥܐ ܬܪܝܨܘܬܗ
    ܕܐܠܗܐ. ܘܠܐ ܗܘܐ
    ܐܚܪܢܝܐ ܡܘܠܟܢܐ ܕܕܝܠܗ.
