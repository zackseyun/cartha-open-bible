  pages: [165, 164]
  text: |-
    # Source page p0165 (printed 177)
    ܕܢܫܬܘܙܒ ܠܒܥܠܕܒܒܝ ܡܢ
    ܒܥܠܕܒܒܝ. ܐܝܟ ܕܐܦ ܠܟܘܢ
    ܐܫܠܡܬ ܠܟܘܢ ܕܩܕܡܝܟܘܢ.
    ܘܒܡܥܒܪܟܘܢ ܗܘܝܬܘܢ ܩ̈ܠܝܠ
    ܘܡܕܥܝܟܘܢ ܚܦܝܛܐܝܬ ܡܢ
    ܟܠܗ ܢܦܫܟܘܢ. ܐܝܟ ܕܬܬܥܒܪ
    ܠܟܘܢ ܚܒܠܬܐ. ܘܠܐ ܢܚܫܟܟ
    ܗܘܘܬܐ ܕܚܫܘ̈ܟܐ. ܐܠܐ
    ܢܬܕܟܪ ܟܠܢܫ ܐܘܪܚܐ ܕܩܕܡܘܗܝ.
    ܐܢ ܓܝܪ ܐܝܟ ܗ̄ܘ ܕܐܝܬ
    ܕܚ̈ܛܗܘܗܝ ܠܐ ܢܨܘܒ
    ܗܝ ܠܝܢ ܠܟܠܢ ܝܥܪ̈ܝܐ ܆ ܘܬܘܒ
    ܕܝܢ ܗܘܝܬܘܢ ܝܕܥܝܢ. ܕܡܐܟܘܠ
    ܩܕܡ̈ܝܐ ܘܒܝܪ̈ܐ ܕܡܝ̈ܐ
    ܩܕܝܡ ܐܝܬ ܗܘܐ ܠܗܘܢ
    ܠܐܒ̈ܗܝܟ ܡܥܒܪ̈ܢܐ ܕܕܢ̈ܩܐ.
    ܘܠܒ̈ܝܐ ܘܚܩ̈ܠܐ. ܐܠܐ ܕܝܢ
    ܒܘܿܪ ܗ݀ܘܝܢ ܒܐܝ̈ܕܝܗܘܢ ܘܢܗ̣ܘܘܢ
    ܡܥܕܪ̈ܢܝܢ ܗܘܘ ܠܝܢ ܡܕܐ
    ܕܚ̈ܛܝܢ ܗ݀ܘܝܢ. ܘܒܥܝܢ ܗܘܘ
    ܥܠܝܢ ܡܢ ܗ݀ܘ ܕܒܪܢ. ܡܛܠ
    ܕܐܡܝܠܝܢ ܗܘܘ 90 ܠܐ
    ܡ̈ܒܕܝܗܘܢ. ܘܡܥܬܕܐ ܝܘܡ̈ܬܐ
    ܗܘܘ ܠܗܘܢ. ܘܡܚܣܢ
    ܗܘܘ ܥܠܝܢ. ܘܩܐܡܝܢ
    ܕܢܩ̈ܕܐ ܕܐܒܗܘܬܢ ܘܢܒ̈ܝܐ
    ܚܫܒܘ. ܐܦ ܚܢܢ ܡܢ ܕܐܒܕܢ
    ܢܦܫܢ. ܘܕܗܘܢ ܐܫܬܒܩܬ
    ܡܢܢ. ܘܠܝܬ ܠܢ ܡܕܡ
    ܘܩܐ ܐܠܐ ܐܢ ܚܝܠܬܢܐ
    ܘܢܡܘܣܗ. ܐܢ ܗܟܝܠ
    ܬܬܪܨ ܡܕܥܝܟ ܠܫܦܝܪ̈ܬܐ
    ܢܦܢܝܟܘܢ ܒܥܘܕܪܢ ܕܐܗܒܝܢ
    ܚܢܢ ܡܒ̈ܩܐ ܣ̈ܓܝܐܐ. ܡܕܡ
    
    # Source page p0164 (printed 178)
    ܓܝܪ ܕܐܘܒܕܝܢܢ ܕܚܒܠܐ
    ܗ݇ܘ̈ܝ. ܘܒܕܡ ܕܢܣܒܪܝܢ ܠܐ
    15 ܡܬܚܒܠܝܢ. ܐܦ ܠܐܝܠܝܢ
    ܕܝܢ ܗܢܘܢ ܩܬܪܘ ܠܒܒܠܐ.
    ܕܐܦ ܠܗܘܢ ܙܕ̈ܩܝܢ ܗܠܝܢ
    ܐܣܘܪ̈ܝ ܢܗܘ̈ܝܢ ܕܝܢ ܟܘܠ
    ܙܒܢ ܩܕܡ ܥܝܢܝܟܘܢ ܗܠܝܢ.
    20 ܟܠܗܝܢ ܕܡܩ̈ܕܡܢ ܐܡܝܪ̈ܢ.
    ܡܛܠ ܕܒܕܡܘܬ ܒܪܘܩܐ ܢܥܒܪ
    ܕܡܬܥܛܦ. ܕܐܙܕܩܦ. ܘܗܘ
    ܕܝܢ ܐܦ ܡܪܝܡܐ ܡܥܝܪ
    ܪܘܚܗ ܥܡܢ ܙܘܥܐ.
    25 ܘܐܕܟܝܘ ܡܕܡ ܕܬܬܝ
    ܘܠܐ ܟܣܝ ܡܢܝ ܡܕܡ
    ܕܥܬܝܕܐ ܓܕܫ. ܡܢ ܩܕܡ
    ܀ ܗܘܝܐ ܕܠܥܠ ܕܝܠܝ
    ܕܝܠܗ. ܘ ܚܘܝܐ ܕܡܕܡ
    30 ܕܠܝܬ ܐܢܫ. ܢܣܝܒ ܢܦܫܟ
    ܕܢܣܒ ܘܠܐ ܕܢܬܢܣܒ.
    ܘܕܢܣܒܪ ܘܠܐ ܕܢܣܬܒܪ.
    ܘܕܢܬܬܕܝܢ ܥܡ ܐܒܘ̈ܗܝ.
    ܘܠܐ ܕܢܬܬܘܝ ܥܡ
    35 ܣܝ̈ܒܝ. ܒܥܝܘܬܗ ܓܝܪ
    ܕܥܠܡܐ ܒܥܝܐ. ܡܫܘܚܬܗ
    ܕܫܪܒܐ ܡܢ ܟܕܘ ܡܒܥܝ
    ܠܗ. ܘܡܬܬܒܥܘܬܗ
