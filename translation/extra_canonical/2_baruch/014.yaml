  text: |-
    # Source page p0221 (printed 121)
    ܙܒܢ ܦܠܓܗ ܕܝܘܡܐ
    ܡܫܬܘܙܒ. ܘܠܐ ܐܡ̇ܝܢ
    ܬܟܘܬܗܘܢ ܕܫܡܝܐ ܡܬܬܙܝܥܝܢ.
    ܠܐ ܬܣܒܪ ܘܬܣܒܪܝܢ
    ܕܒܒܥܘܬܟ ܬܬܩܒܠ ܡܕܡ
    ܘܚ̇ܕܝܬ. ܘܠܐ ܣ̇ܟܝܬ
    ܬܬܢܣܒ ܘܬܫܬܒܩܝܢ.
    ܫܪܝܪܐܝܬ ܓܝܪ ܒܙܒܢܐ
    ܡܬܬܒܪܐ ܒܥܝܢܝ ܚܛܝ̈ܐ.
    ܗܘ ܕܐܡܪ ܒܠܒܗ ܪܘܚܐ
    ܐܝܟ ܕܦ̇ܩܕܬ ܐܚܝܕܐ.
    ܘܟܕ ܐܡ̇ܪܢܐ ܗܠܝܢ ܪ̇ܡܬ
    ܫܒܥܐ ܝܘܡ̈ܝܢ.܀ ܘܗܘܬ
    ܡܢ ܒܬܪ ܗܠܝܢ ܐܢܐ ܒܪܘܟ
    ܩܐܡ ܗܘܝܬ ܥܠ ܨܝܕܐ
    ܕܢܗܪܐ. ܘܗܘܐ ܩܠܐ
    ܐܙܐ ܡܢ ܡܪܘܡܐ
    ܘܐܡ̇ܪ ܠܝ. ܩܘܡ ܥܠ
    ܪ̈ܓܠܝܟ ܒܪܘܟ ܘܫܡܥ
    ܡܠܬܐ ܕܐܠܗܐ ܚܝܠܬܢܐ.
    ܡܛܠ ܕܐܬܬܙܝܥܘ ܥܠ
    ܡܕܡ ܕܐ̇ܡܪܬ ܠܩܘܒܠܝ.
    ܡܛܠ ܗܢܐ ܡܬܝܗܒ
    ܠܟܘܢ ܠܡܫܡܥܘ ܡ̈ܠܐ.
    ܕܬܬܒܝܐܘ ܒܬܪܟܢ.
    ܐܢ ܢܬܒܥ ܡܢܟܘܢ
    ܡܕܝ̈ܢܬܐ ܐܝܠܝܢ ܕܡ̈ܠܝܢ
    ܕܠܡܒܢܐ ܐܢܬܝܢ ܒܠܚܘ
    ܐܠܗܐ ܚܝܠܬܢܐ. ܦܘܪܥܢܐ
    ܗܘܐ. ܐܡܪ ܠܗܘܢ ܐܢܐ
    ܘܐܝܠܝܢ ܕܕܡ̈ܝܢ ܠܗܘܢ ܐܝܠܝܢ
    ܕܚܕܝܘܬܗܘܢ ܒܝܫܬܐ ܗܘܬ
    ܘܦܘܪܥܢܐ ܕܐܝܠܝܢ ܒܠܝܫܘ
    ܗܠܝܢ ܒܡܠܟܝܢ. ܒܙܒܢܘ
    ܕܡܬܝܕܥܐ ܠܐܬܪܘܬ
    ܠܡܡܠܠܘ ܘܡ̇ܚܝܢ ܢܦܫܗܘܢ.
    ܘܐܢ ܠܐܡܕܢ ܒܗܘ̇ ܙܒܢܐ
    ܕܐܬܬܚܝܘ. ܘܐܡܪ ܠܗܘܢ
    ܐܢܬܝܢ ܕܐܫܬܬܝܬܝܢ ܚܡܪܐ
    ܡܕܝܠܢܐ. ܐܫܬܝܬܝܢ ܐܦ ܡܢ
    ܕܠܡܐ. ܕܢܗܘܐ ܕܡܐ
    ܕܠܐ ܡܣܒܪ ܒܪ̈ܦܐ ܗܘ.
    ܡܛܠ ܗܕܐ ܠܐ ܒܢܦܫܗܘܢ
    ܠܡܘܡܬܐ ܠܐ ܚܣܘ. ܐܠܐ
    ܫܠܡ ܒܗܘ̇. ܐܝܟ
    ܕܒܣܝ̈ܡܘܗܝ. ܡܛܠ ܕܢܗܘܐ.
    ܘܡ̇ܚܝܢ ܢܦܫܐ ܕܐܬܪܘܬ
    ܡܛܠ ܕܐܬܚܣܡܘ. ܘܗܘܐ
    ܚܕ ܐܬܪܘܬ ܒܡܠܟܐ
    ܘܐܡ̈ܘܬܐ ܚܝܒܝܢ ܐܬܘ
    
    # Source page p0220 (printed 122)
    ܠܒܗ. ܘܐܬܬ ܣܘܟܠܗ
    .. ܦܩ̈ܕܝ ܒܣܝܡܘܬܐ ܒܡ̇ܕܥܝ.
    14 ܘܒܥܝܬ ܐܘܪܚܐ. ܐܘ
    ܘܐܬܒܥܝܬ ܕܡܘܗܝ
    ܕܐܒܕܐ. ܘܡܕܡ ܕܥܬܝܕ
    ܕܢܗܘܐ ܡܢ ܒܬܪ ܗܠܝܢ.
    ܘܐܡܪܬ ܒܝ ܒܡܚ̈ܫܒܬܝ
    ܐܢ̈ܐ ܦܘܪܥܢܐ ܕܐܬܡܠܝ
    ܡܢܝ. ܘܗܘ ܚܝ̈ܝܐ ܐܢ̈ܐ
    ܕܣܓܝܐܝܢ ܐܢܘܢ ܐܝܠܝܢ
    ܕܚܛܘ. ܘܒܡܕܥܝܗܘܢ
    ܚܝܘ. ܘܐܢܬ ܡܢ ܒܥܡܐ.
    ܘܡܥܠܠ ܗܘ ܕܝܢ ܒܡ̈ܫܪܝ
    ܡܫܬܚܪܝܢ ܒܗܘܢ ܙܒ̈ܢܐ.
    ܗ̇ܢܘܢ ܕܒܗܘܢ ܡܬܬܡܝܡ
    ܡ̇ܠܐ ܐܝܠܝܢ ܕܐܡܝܪ̈ܢ.
    ܘܡܢܐ ܓܝܪ ܝܘܬܪܢܐ
    ܐܝܬ ܒܗܘ ܐܘ ܡܢܐ
    ܕܒܝܫ ܡܢ ܗܠܝܢ ܕܚܙܝܢ
    ܕܨ̈ܒܝܢ ܡܣܟܢܝܢ ܕܢܚܙܘܢ.
    ܗܘ ܕܝܢ ܐܡܠܠ ܩܕܡܝܟ
    ܡܢܐ ܝܬܝܪ ܗ̇ܢܘܢ ܕܝܕܥܘ
    ܩܕܡܝܟ ܘܠܐ ܐܢܛܪܘ
    ܀ ܒܣ
    ܀ܝ܀ ܗܘܘ. ܘܐܬܚܙܝܘ ܠܝ
    ܐܦܝܟ. ܘܐܘ ܐܬܚܫܒܬ.
    ܘܐܦܠܐ ܡܟܝܟܘܬܗܘܢ
    ܢܚܙܘ ܐܠܐ ܨܒܝܢܝ. ܘܠܐ
    ܐܚܙܐ ܙܥܘܪܘ ܡܘܠܕܟܘܢ
    ܗܘܐ ܠܘܬ ܠܒܝܟܘܢ
    ܕܡܬܒܥܝܢ. ܕܐܝܠܝܢ ܕܦܠܚܘ
    ܢܒ̈ܝܐ ܢܫܬܟܚ ܠܗܘܢ. ܘܠܐ
    ܡܬܒܥܝܢ ܕܒܥ̈ܝܟܝ ܥܡܠܐ
    ܕܛܒܬܐ. ܐܠܐ ܡܢܘ ܡܪܝܐ
    ܡܢܝ ܡܕܡ ܠܘ ܠܝܕܝܥܘ.
    ܐܘ ܡܢܘ ܡܟܡܟ ܠܡܘܟܡܘ
    ܕܐܘܪܚܟ. ܐܘ ܡܢܘ
    ܡܫܟܚ ܠܐ ܝܘܠܦܢܘ
    ܕܡܠܟܟ. ܐܘ ܡܢܘ ܡܫܟܚ
    ܡܫܟܚ ܠܐ ܬܪܥܝܬܟ
    ܕܠܐ ܡܬܕܪܟܐ. ܐܘ ܡܢܘ
    ܡܡܠܠ ܡܢ ܪ̈ܥܝܢܐ
    ܐܢܫܝܢ ܢܫܐ ܐܘ ܫܘܠܡܐ
    ܕܚܟܡܬܟ. ܡܛܠ ܕܝܢ
    ܐܬܡܢܢ ܠܡܒܠܐ ܐܢܫܐ
    ܥܕ ܕܗܒܠܐ ܣܒܘ ܕܠܐ
    ܡܢ ܠܒܐ ܘܗܘ ܪܒܝ.
    ܗܘܝܘ ܗܘ ܡܢܗܘܢ ܕܒܢ̈
