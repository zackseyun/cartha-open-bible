  text: |-
    # Source page p0198 (printed 144)
    ܘܐܝܟܢ ܢܒܥܘܢ ܫܘܒܩܢܐ.
    . ܡܠܐ ܚ̈ܝܐ ܕܝܢ ܝܐܝܒ ܕܡܠܐ
    ܡܘ̈ܬܐ. ܘܒܥܝܢ ܘܐܒܕܝܢ.
    ܘܐ ܡܕܝܢ ܟܒܪ ܐܕܡ.
    ܠܒܘܠܟܘܗܝ ܐܢܫܝܢ ܕܐܬܝܠܕܘ
    ܡܢܗ. ܡܕܝܢ ܕܐܬܝܠܕܘ
    ܒܚܘܛ ܡܘܠܕܐ ܕܒܚܘܛ
    ܐܬܝܠܕܘ. ܕܗܘ ܓܝܪ
    ܒܠܚܘܕ ܣܘܓܐܐ ܐܝܬ
    ܒܚܒܠܐ. ܘܠܝܬ ܡܢܝܢܐ
    ܠܐܝܠܝܢ ܕܢܘܪܐ ܐܟܠܬ.
    ܐܠܐ ܗܟܝܠ ܐܡܪ
    ܡܕܡܝܟ. ܐܢܬ ܡܪܝܐ
    ܡܕܝܢ ܝܕܥܬ ܡܕܡ
    ܒܒܪܝܬܟ. ܐܢܬ ܓܝܪ ܡܢ
    ܩܕܝܡ ܦܩܕܬ ܠܥܦܪܐ
    ܕܢܬܠ ܠܐܕܡ. ܘܐܢܬ ܀ ܝ .c.
    ܝܕܥ ܐܢܬ ܡܢܝܢܗܘܢ
    ܕܐܝܠܝܢ ܕܐܬܝܠܕܘ ܡܢܗ.
    ܘܟܡܐ ܚܛܘ ܡܢܗܘܢ
    ܐܝܠܝܢ ܕܗܘܘ. ܘܠܐ
    ܘܐܕܝܘ ܠܟ ܥܒܕܘܗܝ.
    ܘܠܐ ܡܟܝܠ ܫܒܩܬ ܚܛܗܝܗܘܢ
    ܡܟܣܪ ܠܗܘܢ
    ܬܫܒܘܚܬܗܘܢ ܠܡܦܪܢܣܘ.
    ܗܝ ܕܠܓܝܪܐ ܠܗܘܢ ܫܪܝܪܝܬ
    ܓܝܪ ܐܝܟ ܕܒܙܒܢܐ ܩܠܝܠܐ
    ܫܘܚܕܐ ܒܥܠܡܐ ܕܥܒܪ
    ܕܚܝܝܢ ܐܢܬܘܢ ܒܗ.
    ܬܬܘܐ ܣܓܝܐܐ
    ܣܘܒܪܗܘܢ. ܘܡܢܐ ܒܥܠܡܐ
    ܗܘ ܕܣܘܦ ܠܝܬ ܠܗ.
    .. ܐܡܟܠܘܢ ܢܘܗܪܐ ܪܒܐ܀.
    49 ܒܪܡ ܕܝܢ ܗܟܢ ܐܡܪ
    ܡܢܝ ܚܒܝܒܝ. ܘܐܡܪ
    ܕܚܒܝܐ ܡܢ ܗ̇ܘ ܕܥܒܪ
    ܟܠܐ. ܒܐܝܕܐ ܡܐ ܕܡܘܬܐ
    ܢܙܝܥ ܐܝܠܝܢ ܕܚܝܝܢ
    ܒܝܘܡܘܗܝ. ܐܘ ܐܡܬܝ
    ܡܦܩܕܐ ܙܥܘܪܬܗ ܕܡܢ
    ܒܬܪ ܗ̇ܝܕܝܢ. ܠܗܘ̣ܐ ܡܐ
    ܕܐܬܘ̣ܐ ܗ̇ܘ ܕܡܦܩܕ
    ܗ̇ܝܕܝܢ. ܘܐܝܟܢ ܗ̇ܘܝ̈ܢ
    ܕܡܘ̈ܬܐ ܕܒܢܝܢܫܐ ܗ̇ܢܘܢ
    ܕܗܘ̣ܐ ܒܥܕܢܐ ܐܢܬܘܢ
    ܘܠܗܘܢ ܡܩܝܡܝܢ ܚܝ̈ܐܐ
    ܐܘ ܕܡܐ ܡܚܠܦ ܐܢܬ
    ܠܗܘܢ ܐܝܠܝܢ ܕܗܘܘ
    ܒܥܠܡܐ. ܐܝܟ ܕܐܦ
    50 ܒܥܠܡܐ܀. ܥܢܐ ܘܐܡܪ
    ܠܝ ܫܡܥ ܒܪܡ ܡܠܬܐ
