    ܘܕܢܣܒܪ ܘܠܐ ܕܢܣܬܒܪ.
    ܘܕܢܬܬܕܝܢ ܥܡ ܐܒܘ̈ܗܝ.
    ܘܠܐ ܕܢܬܬܘܝ ܥܡ
