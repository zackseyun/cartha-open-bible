  text: |-
    # Source page p0192 (printed 150)
    ܡܠܠ ܒܪܝܬܐ ܕܒܪܐ
    ܝܡܝܢܗ. ܬܬܘ ܒܩܠܐ
    ܡܒܘܥܐ ܕܢܘܗܪܐ ܥܘܙܝ
    ܬܩܝܦ. ܘܬܬܪܙܐ
    ܕܚܟܡܬܐ ܬܚܝܬ
    ܬܪܘܢܘܣ ܕܝܠܟ ܒܐܝܕܐ.
    ܘܒܬܪܬ ܬܒܪܟ ܐܢܘܢ
    ܕܠܐ ܐܢܫܘ ܠܡܣܗܕ.
    ܘܬܫܡܥ ܕܕܝܟ ܡܩܒܠܐ
    ܠܐܝܠܝܢ ܕܠܐ ܐܫܬܒܩܘ
    ܠܐܝܠܝܢ ܐܢ ܐܕܡ
    ܀ 2. 6. ܐܡܪ ܩܕܡܝ ܚܛܐ. ܘܐܝܬܘܗܝ
    ܡܘܬܐ ܥܠ ܟܠ ܕܠܐ
    ܒܙܒܢܗ. ܐܠܐ ܐܦ ܐܢܘܢ
    ܕܐܬܝܠܕܘ ܡܢܗ ܟܡܐ
    ܐܢܘܢ ܐܢܘܢ ܡܢܗܘܢ ܠܝܬ
    ܒܢܦܫܗ ܐܫܬܡܥ ܕܥܬܝܕ.
    ܘܬܘܒ ܐܢܘܢ ܐܢܘܢ
    ܡܢܗܘܢ ܨܒܘ ܒܗ
    ܝܬܝܪܐܝܬ ܕܥܬܝܕܝܢ.
    ܫܪܝܪܐܝܬ ܓܝܪ ܗܘ ܕܡܬܝܗܒ
    ܢܣܒ ܐܓܪܐ. ܘܗܘ ܕܝܢ
    ܘܦܘܩܕܢ ܒܚܒܠܐ ܟ̈ܦܐ
    ܕܗܘ. ܡܛܠ ܕܚܕܝܬܘܢ
    ܡܬܦܪܥܝܢ ܐܢܬܘܢ ܕܒܥܝܢ
    ܬܫܒܘܩ ܐܢܬܘܢ ܐܢܬܘܢ
    ܣܡܘܐܠܘܬܗ ܕܡܕܝܢܬܐ܂
    ܠܐ ܓܝܪ ܐܠܦܟܘܢ
    ܒ̈ܥܝܪܘܗܝ܂ ܐܦ ܠܐ
    ܦܣܩܬܘܢ ܐܘܡܢܘܬܐ
    ܕܝܕܝܬܗ ܕܒܒܪܝܫܝܬ܂ ܠܐ
    ܐܬܘܗܝ ܚܙܝܬܘܢ ܐܕܡ
    ܒܥܝܢܐ ܐܠܐ ܒܢܦܫܗ
    ܒܥܝܬܘܢ܂ ܡܟܝܠ ܕܝܢ ܐܢܬܘܢ
    ܗܘܘ ܒܢܦܫܟܘܢ ܐܕܡ܂
    ܐܢܬ ܕܝܢ ܡܪܝܐ ܐܠܗܐ
    ܐܝܟܝܢ ܕܨܒܝܬ ܥܒܕ ܦܘܩ
    ܕܢܐ ܡܕܡ ܕܡܥܬܕ ܡܢܟ
    ܐܘܕܥܝܢܝ܂ ܒܫܘܒܩܢܐ ܓܝܪ
    ܕܒܟܡܐ ܙܒܢܐ ܗܘܝܐ
    ܡܢ ܐܝܟܝܢ ܕܐܒܕܬܗ
    ܐܝܟ ܟܘܝܟܘܗܝ܂ ܘܡܫܟܚܐ
    ܐܢܬ ܠܡܘܣܦܘ ܐܢܘܢ
    ܘܡܫܟܚܬܘܗܝ܂ ܠܐܝܟܝܢ
    ܓܝܪ ܕܡܥܒܕ ܐܢܬ ܐܢܬ
    ܡܕܥܬ܂ ܘܠܐܝܟܝܢ ܕܚܫܝܒ
    ܆܆ܠܘܬ ܐܢܬ ܡܢ ܕܥܒܕ܂܀܂܀܂܀
    55 ܘܗܘܐ ܟܕ ܡܨܠܐ
    ܠܡܡܠܠܘ ܩ̈ܕܡܝܬ ܕܨܠܘܬܐ
    ܗܕܐ܂
    
    # Source page p0191 (printed 151)
    ܗܘܝܬ ܘܐܬܬܙܝܥܬ
    ܘܡܬܚܫܒ ܗܘܝܬ
    ܥܠ ܙܪܥܗ ܕܐܢܫܐ
    ܕܟܡܐ ܣܓܝ̈ܐܝܢ
    ܐܝܠܝܢ ܕܐܙܠܘ.
    ܘܙܥܘܪܝܢ ܐܝܠܝܢ
    ܕܡܬܢܛܪܝܢ. ܘܟܕ
    ܐܢܐ ܡܬܚܫܒ ܗܘܝܬ
    ܒܗܠܝܢ ܫܡܥܬ
    ܗܘܝܬ ܩܠܐ ܕܐܡܪ
    ܠܝ. ܒܪܢܫܐ
    ܡܛܠ ܡܢܐ ܡܬܕܘܕ
    ܐܢܬ. ܘܡܛܠ ܡܢܐ
    ܡܬܪܗܒ ܐܢܬ.
    ܕܡܢ ܩܕܡ ܕܬܬܒܪܐ
    ܐܢܬ ܝܕܝܥ ܗܘܝܬ
    ܠܝ. ܘܡܢ ܩܕܡ
    ܕܬܦܘܩ ܡܢ ܟܪܣܐ
    ܕܐܡܟ ܐܬܝܕܥܬ
    ܠܝ. ܘܡܛܠ ܗܢܐ
    ܐܬܚܘܝܬ ܠܟ
    ܗܠܝܢ ܕܥܬܝܕܢ.
    ܘܐܡܪܬ ܠܗ. ܡܪܝ
    ܐܢܬ ܚܘܝܬܢܝ
    ܪܘܒܐ ܕܙܒܢܐ.
    ܘܡܐ ܕܗܘܐ ܒܗ.
    ܘܠܐ ܚܘܝܬܢܝ ܡܢ
    ܐܝܕܐ ܥܕܡܐ ܠܐܝܕܐ.
    ܡܟܐ ܕܛܒܐ ܕܐܫܬܡܥ
    ܕܐܢܫܝܢ ܕܣܗܕܘ ܗܘܘ
    ܡܛܠ ܬܘܪܨܐ. ܚܕ ܡܢ
    ܟܕ ܗܘ ܒܥܝܕܐ ܢܛܝܪ
    ܘܐܫܬܘܕܝܘ ܠܝ ܣܘܓܐܐ
    ܕܛܒ̈ܬܐ ܘܕܒܝܫ̈ܬܐ ܕܐܬܝܢ
    ܘܗܝܕܝܢ ܣܠܩܬ ܠܛܘܪܐ.
    ܘܗܘܐ ܡܢ ܒܬܪ ܫܒܥܐ
    ܝܘܡ̈ܝܢ ܐܬܝܬ ܠܗܘܟܝܠ
    ܕܘܟܬܐ ܡܢܘܗܝ ܡܒܘܥܐ.
    ܘܗܘܐ ܟܕ ܝܬܒ ܐܢܐ ܬܡܢ
    ܥܠ ܡܪܟܒܬܐ ܕܥܢܢܐ
    ܘܐܬܢܣܒܬ ܠܝ ܠܐ ܟܕ
    ܒܦܓܪܐ. ܘܠܐ ܕܝܕܝܥ.
    ܘܐܬܚܙܝ ܠܝ ܪܐܙܐ
    ܘܫܡܥܬ ܩܠܐ ܕܐܡܪ
    ܠܝ. ܚܙܝ ܘܐܝܕܥ ܕܐܝܟܢ
    ܢܬܢܛܪܘܢ ܒܥܠܡܐ ܗܢܐ
    ܥܒܕܝ̈ܗܘܢ ܘܥܡܠܝ̈ܗܘܢ. ܡܢ ܐܝܟ
    ܡܕܡ ܕܚܙܝܬ ܠܗܘܟܝܠ.
    ܕܐܢܫܝܢ ܕܫܦܝܪ ܘܕܐܢܫܝܢ
    ܒܝܫܐܝܬ. ــ ܐܡܪ ܐܢܐ
