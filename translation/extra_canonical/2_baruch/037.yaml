  text: |-
    # Source page p0208 (printed 134)
    ܟܠܗܘܢ ܪܐܙܐ ܕܝܠܝ
    ܕܠܥܠܡ. ܘܗܘܝܬ ܠܝ
    ܗܘ ܕܐܦ ܐܢܬ ܚܟܝܡܬ
    ܠܝ. ܛܒܐ ܗܘܬ ܒܝܢ ܕܢܡܘܬ
    ܡܠܝܢ ܩܕܡܝܟ. ܘܗ̇ܝܕܝܢ
    34..ܐܪܝܡܬ ܥܝܢܝ܀. ܘܒܟܝܬ ܆
    ܘܐܡܪܬ ܒܗ ܒܥܕܢܐ ܚܣ
    ܠܝ ܕܐܫܬܘܩܘܟܘܢ ܐܘ
    ܕܐܢܫܝܢ ܡܢܟܘܢ. ܐܠܐ
    ܒܠܚܘܕ ܐܢܬܘܢ ܥܕܡܐ
    ܠܒܝܬ ܩܘ̣ܒܘܪ ܩܘ̈ܒ̣ܪܐ ܕܐܒܗܝ
    ܡܢ ܚܒܠܬܐ ܒܥܝܩܘܬ
    ܝܠܠܐ ܨܘܝܘ. ܕܠܐ ܐܬܢܫܝܬ
    ܩܕܡ ܐܢܬܘܢ ܘܡܢ ܒܬܪ
    ..ܘܐܠܝܢ ܘܦ̣ܪ ܐܢܐ ܥܘܗܕܢܘܢ܀.
    35 ܘܐܙܠܬ ܐܢܐ ܒܪܘܟ
    ܥܕܡܐ ܠܬܪܥܐ ܩܕܝܫܐ.
    ܘܝ̇ܬܒܬ ܐܢܐ ܡ̈ܟܝܟܐܝܬ
    ܘܒܟܝܬ ܘܐܡܪܬ. ܐܘ ܥ̈ܝܢܝ
    ܗܘ̈ܝ ܡܒܘ̈ܥܐ ܘܐܡܘ̈ܬܐ
    ܕܡ̈ܝܐ ܡܒܘܥܐ ܕܕܡ̈ܥܐ.
    ܐܝܟܢܐ ܓܝܪ ܐܬܬܢܝܚ
    ܥܠ ܨܗܝܘܢ. ܘܐܒܟܐ
    ܠܐܒܠܐ ܐܢܐ ܘܐܫܟܚ.
    ܡܛܠ ܕܒܙܘܥܐ ܐܬܬܙܝܥ
    ܐܢܫܐ ܕܡܬ̇ܪܣܝܢ ܐܢܐ
    ܘܗܘܘ ܡܢ ܩܕܝܡ ܪܒܝ
    ܠܝܐ ܚܙܘܐ. ܘܗܘܐ ܒܒܐ
    
    # Source page p0207 (printed 135)
    ܛܝܒܘܬܐ ܕܐܝܬܝܗ ܡܟܣܝܐ
    ܗܘܿ. ܕܠܐ ܢܫܟܚܘܢ ܡܕܡ
    ܡܢ ܗ̇ܘ ܥܒܕܐ ܣܓܝܐܐ.
    ܠܐ ܚܕ ܐܪܙܐ ܡܟܣܝܐ܀
    ܦ ܠܝܬ ܟܕ ܐܪܡܝܐ.
    ܠܟܘܗܢܘܬܐ ܕܒܟܝ ܗܘܿ
    ܒܕ ܘܒܟܝܘ ܕܡܕܡ
    ܐ ܢܫܬܟܚ ܡܢܗ. ܐܦ
    ܬܘܒ ܐܬܚܙܝܬ.
    ܚܙܝ ܕܝܢ ܗ̇ܝ ܫܢܬܐ
    ܬܪܬܝܢ ܗܘܬ ܟܕ
    ܡܟܣܝܐ ܡܟܝܟܐ ܘܒܠܝܠܐ
    ܣܓܝܐܐ. ܘܬܬ ܟܕܡܐ
    ܐܬܪܐ ܚܕ ܕܠܐ ܪܚܝܩ
    ܗܘܐ ܡܢ ܐܪܙܐ. ܘܐܬܬ
    ܡ ܪܡܝܐ ܩܕܡܘܗܝ
    ܠܘܬܗ̇. ܘܚܙܝܬ ܘܗܘܐ
    ܐܝܟ ܦܘܡܢܐ ܫܢܬܐ
    ܗܝ. ܘܡܠܠܬ ܘܐܡܪܬ
    ܐܪܙܐ ܗ̇ܘ. ܠܐ ܗܘܐ
    ܬ ܬܘܒ ܐܪܙܐ ܕܐܬܚܙܝܬ
    ܡܢ ܒܟܝ ܕܒܝܫܬܐ.
    ܒܐܝܕܝ ܐܫܟܚ ܗܘܬ
    ܒܝܫܬܐ ܘܡܬܒܥܝܐ
    ܡܢܝ ܩܘܠܣܝ ܫܢܝܐ.
    ܛܒ
    ܐ ܕܒܝܫ. ܐܦ ܠܐ ܡܠ
    ܝܠܟ ܡܢ ܡܘܬܒ ܪܚܡܬܟ.
    ܘܡܬܚ ܗܘ̣ܬ ܐܝܕܝܗ
    ܠܐ ܐܝܠܝܢ ܕܐܚܝܕܝܢ
    ܥܝܕ. ܘܠܐܝܠܝܢ ܕܡܬܩܪܒܝܢ
    ܠܟ ܟܣܝ̈ܬܝܬܐ ܕܘܡܥܟ
    ܕܝܢ ܗܘ̣ܬ ܘܒܟܝܬ
    ܘܗܘ ܢܦܫܟ ܒܟܠ ܙܒܢ.
    ܟ ܗܘ ܕܠܐ ܡܫܟܚ
    ܬܒܘܟ. ܘܡܢ ܕܝܢ
    ܫܪܘܗܝ ܙܒܢܟ ܘܡܛܝܬ ܠܕܝܠܟ.
    ܠܐ ܙܟܝܬ ܐܦ ܠܐ ܙܟܝܬ
    ܬܘܒ ܒܟܐ. ܕܠܐ ܩܕܡܝܟ.
    ܘܗܘܝ ܒܡܘ ܚܠܐ.
    ܒܦܪܘܩܢ ܬܬܚܒܠ ܐܣܝܪܐ.
    ܕܡܟܘ ܘܡܢ ܒܥܩܬܐ
    ܝܫܠܟ ܒܬܫܢܝܩܐ. ܒܕܡܐ
    ܬܬܐ ܙܒܢܟ ܐܚܪܝܬ
    ܒܘ ܬܘܒ ܬܬܬܙܝܥ
    ܬܬܝܕܥ ܬܫܬܠܡ.܀ ܘܘ܀
    ܡܢ ܒܬܪ ܗܠܝܢ ܚܙܝܬ
    ܒܘܬ ܐܪܙ ܡܢ ܝܡܐ.
    ܒܕܘܓܐ ܡܢ ܪܒܝܐ ܗ̣ܝ
    ܟܠ ܕܚܕ̈ܪܝܗ ܗܘܘ.
    ܫܡܥܐ ܕ
