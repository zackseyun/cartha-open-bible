  text: |-
    # Source page p0215 (printed 127)
    ܥܒܪܝܢ ܘܠܐܝܠܝܢ ܕܥܬܝܕܝܢ.
    ܐܝܠܝܢ ܕܚܝܝܢ ܘܠܐܝܠܝܢ
    ܡܕܡ. ܐܝܟ ܚܝܐ ܕܠܐ
    ܡܬܒܣܡ. ܐܠܐ ܗܘ ܓܝܪ
    ܒܥܘܕܗܝ ܚܝܐ. ܕܠܐ ܡܪܝܐ
    ܠܐ ܡܬܒܣܡ. ܘܒܥܝܢܐ
    ܒܢ̈ܝܢܫܐ ܚܕܒܬ. ܘܠܐ ܒܙܒܢܐ
    ܣܓܝܐܐ ܚܙܝܬ. ܘܐܚܪܢܐ
    ܐ ܗܘܘ ܡܒܛܠܐ ܕܐܕܡ.
    ܐ ܚܕܒܬ ܕܐܢܫܐ
    ܡܛܠܬܗ ܚܙܝܬ ܕܐܝܠܝܢ
    ܕܚܝܝܢ. ܘܐܘ ܡܘܬܒܐ
    ܕܐܝܠܝܢ ܕܐܬܘ. ܐܠܘ ܓܝܪ
    ܐܝܠܝܢ ܗܘܘ ܚܝܐ ܒܠܚܘܕ
    ܕܠܗܘܢ ܠܒܢ̈ܝܢܫܐ ܝܗܝܒܝܢ ܗܘܘ
    ܡܕܡ ܡܪܝܪ ܡܢ ܗܕܐ
    ܠܐ ܗܘܐ ܡܕܡ ܓܝܪ
    ܕܡܬܚܙܐ ܒܗܘܢ. ܐܘ
    ܕܡܬܚܙܐ ܕܣܒܪܐ ܗܘ
    ܕܡܬܚܙܐ. ܐܘ ܡܘܬܒܐ
    ܕܡܬܚܙܐ ܡܒܛܠܐ. ܒܡܠܟܝ
    ܓܝܪ ܡܘܬܗܘܢ ܕܒܢ̈ܝܢܫܐ
    ܡܬܚܙܐ. ܐܘ ܠܐ ܡܕܡ
    ܗܘ ܡܕܡ ܕܐܝܬܝ
    ܘܫܪܐ ܠܐ ܐܬܝܕܥ. ܘܐܝܟ
    ܡܢܐ ܕܐܬܓܠܝ ܗܘܐ. ܒܬܪ
    ܕܝܢ ܠܐ ܡܣܬܟܠܝܢ. ܐܠܘ ܠܐ
    ܕܝܢ ܒܐܝܕܝ ܗܘܘ ܕܗܘܘ
    ܡܘܠܟܢܐ ܒܥܠܡܐ. ܒܣܒܪܗܘܢ
    ܗܘܘ ܡܬܢܚܡܝܢ.
    ܐܠܐ ܡܛܠ ܕܐܪܥܐ ܡܢ
    ܥܦܪܐ ܘܐܬܒܪܝܬ. ܡܛܠ ܡܕܡ
    ܕܥܒܪ ܐܙܠ ܡܢܗ ܠܘܬܗ.
    ܘܡܕܡ ܕܐܬܢܛܪ ܡܕܡ
    ܕܡܬܚܕܬ ܡܩܘܐ.
    ܘܡܕܡ ܕܐܬܢܛܪ ܙܒܢܘܗܝ
    ܡܬܩܝܡ ܡܕܡ. ܘܟܕ
    ܡܛܠ ܙܒܢܐ. ܐܬܒܪܝ
    ܥܠܡܐ ܒܥܠܡܐ ܡܬܦܪܢܣܝܢ
    ܒܗܘ ܡܕܡ ܣܓܝܐܐ. ܦܩܘܕ
    ܡܛܠ ܒܝܫܘܬܐ. ܘܐܝܟ
    ܕܠܐ ܕܐܬܒܪܝ ܬܘܒ.
    ܐܬܚܙܝ ܚܒܠܗ ܕܐܢܫܝܢ
    ܣܘܓܐܗ ܕܥܠܡܐ ܪܘܚܐ
    ܕܐܢܫ ܗܘܝܘ. ܬܘܒ
    ܕܝܠܗ ܕܠܐ ܝܕܥܝܢ. ܘܚܙܘ
    ܡܕܡ ܕܐܝܬܘܗܝ ܘܠܡܕܡ
    ܟܕ ܗܘܐ.
    
    # Source page p0214 (printed 128)
    ܕܐܝܬ ܩܕܡܝܟ ܥܠ ܫܡܝܟ
    ܒܡܕ ܚܒܝܒܘܬ ܟܘܠ
    ܗܟܝܠ ܡܢ ܗܫܐ ܒܢܝ
    ܡܢܝܘܬܐ ܘܬܚܘܪ ܡܒܛܠ
    ܒܡܠܟܘܬ ܕܡܘܬܐ.
    ܘܬܬܚܙܐ ܬܫܒܘܚܬܟ
    ܘܬܬܝܕܥ ܪܒܘܬ ܛܝܒܘܬܟ ܀
    ܘܬܬܬܥܝܪ ܫܝܘܠ ܕܡܢ
    ܗܫܐ ܠܐ ܬܚܘܕ ܡܝ̈ܬܐ.
    ܘܒܝܬ ܓܙ̈ܐ ܕܢܦܫ̈ܬܐ
    ܕܚܒܝ̈ܫܢ ܒܗܘܢ. ܢܗܦܟܘܢ
    ܐܢܝܢ ܠܒܢܝ̈ ܫܢܝܐ ܐܝܟ
    ܕܐ̈ܬܝܢ ܕܡܢ ܩܕܝܡ ܐܬܦܩܕ
    ܘܐܣܬܝܡܘ ܒܟܢܘܫܝܐ.
    ܘܕܒܗܘܢ ܐܝܬܝܢ ܕܕܡܝܢ
    ܠܗܘܢ. ܕܒܙܒܢܐ ܕܡܒܝܢ.
    ܗܠܝܢ ܕܡܬܒܥܝܢ ܬܩܪܘܒ
    ܕܫܪܝܬ ܒܥܡܠܐ ܬܗܘܐ
    ܚܘܐ ܒܒܛܝܠܘ ܬܫܒܘܚܬܟ.
    ܘܠܐ ܬܫܬܘܚܪ ܡܕܡ ܕܡܠܟ
    ܐܬܡܠܟܬ ܘܗܘܝܬ ܡܥܝܪܢܐ
    ܡ̈ܠܟܝܗ ܕܓܒܘܬܐ ܕܐܢܫ.
    ܘ. ܐܬܥܢܝܬ ܘܐܡܪܬ. ܀ . ܀ . ܀ . ܀ .
    22 ܘܗܘܐ ܡܢ ܒܬܪ ܗܠܝܢ.
    ܘܗܐ ܫܡܥܬ ܩܠܐ
    ܘܚܙܝܬ ܚܝܠܐ ܕܐܬܩܒܥ
    ܠܝ. ܘܩܠܐ ܡܢ ܡܪܘܡܐ
    ܐܫܬܡܥ ܘܐܡܪ ܠܝ܀
    ܒܪܘܟ ܒܪܘܟ. ܠܡܝܟ
    ܡܬܚܘܐ ܐܢܬ. ܗ̇ܘ ܕܐܙܠ
    ܒܐܘܪܚܐ ܠܐ ܡܫܟܚ
    ܠܗ̇. ܐܘ ܗ̇ܘ ܕܦܪܫ
    ܒܝܡܐ ܐܠܐ ܡ̇ܛܐ ܠܠܡܐܢܐ
    ܡܫܟܚ ܕܢܬܢܝܚ. ܐܘ ܗ̇ܘ
    ܕܡܬܝܗܒ ܠܗ ܓܙܐ
    ܠܘ ܡܣܬܒܪ ܐܠܐ
    ܡܫܟܚ ܒܗ ܠܐ ܬܘܒ
    ܡܬܬܙܝܥ. ܐܘ ܗ̇ܘ
    ܗ̇ܘ ܕܙܪܥ ܐܪܥܐ ܐܠܐ
    ܡܘܒܕ ܚܠܦ ܦܐܪ̈ܘܗܝ.
    ܠܐ ܬܘܒ ܡܚܒܠ ܠܗ
    ܟܦܢܐ. ܐܘ ܗ̇ܘ ܕܢܨܒ
    ܟܪܡܐ ܐܠܐ ܢܣܒ
    ܡܢܗ ܦܐܪ̈ܐ ܕܢܬܪܣܐ.
    ܕܡܕܡ ܡܣܒܪ ܗ̇ܘ ܕܢܨܒܗ
    ܕܣܒ ܡܢܗ ܦܐܪ̈ܐ. ܐܘ
    ܐܢܬܬܐ ܕܒܛܢܐ ܐܢ
    ܬܠܕ ܕܠܐ ܟܐܒ̈ܐ ܠܐ
    ܡܣܒܪܐ ܩܛܝܠܐ ܒܗ ܒܥܘܒܗ̇
    ܐܘ ܗ̇ܘ ܕܒܢܐ ܒܝܬܐ
