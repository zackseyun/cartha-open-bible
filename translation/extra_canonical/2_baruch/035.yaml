  pages: [209, 208]
  text: |-
    # Source page p0209 (printed 133)
    ܓܪܡܝܗܘܢ. ܐܠܐ ܘܬܘܒ
    ܡܬܝܗܒܝܢ ܒܥܦܪܐ
    ܘܐܡܪܝܢ ܗܘܘ ܓܝܪ
    ܕܡܦܩܐ ܐܢܬܝܢ ܡܢܗܝܢ
    ܠܚܒܠܐ ܡܒܕܪܐ ܕܗܘ̣ܐ.
    ܘܗܘܘ ܐܝܟ ܕܠܐ
    ܗܘܘ܀ ܘܐܬܝܒ ܕܝܢ
    ܡܢ ܡܒܕܪܐ ܐܬܝܒ
    ܠܥܦܪܐ ܕܐܢܬܘܢ ܒܗܘ
    ܫܪܝܬܘܢ ܕܢܩܘܡܘܢ
    ܡܢܗ ܒܙܒܢܐ ܒܗܘ ܙܒܢܐ
    ܕܐܝܬ ܚܒܠܐ. ܕܐܝܬ
    ܠܡܬܪܒܘ ܓܝܪ. ܡܛܠ
    ܡܢ ܒܬܪ ܡܠܬܐ ܙܒܢܐ
    ܕܐܝܬܝܗ ܒܠܝܬ ܕܗܘ̣ܝ
    ܬܬܒܛܠ ܗܘܬ. ܐܠܐ ܠܐ
    ܢܗܘܐ ܗ̣ܘ ܗ̇ܘ ܒܢܝܢܐ.
    ܠܐ ܗܘܬ ܡܢ ܒܬܪ
    ܒܝܕ ܡܬܒܥܝܢ. ܡܣܡܟܐ
    ܟܕ ܚܪܒܐ ܥܕܡܐ ܠܙܒܢܐ.
    ܘܡܢ ܒܬܪܟܢ ܡܬܒܥܝܐ
    ܠܡܬܚܕܬܘ ܒܬܫܒܘܚܬܐ.
    ܘܡܫܬܡܠܐ ܠܥܠܡ. ܠܐ
    ܡܟܝܠ ܡܬܒܥܝܐ ܠܢ ܕܢܒܥܐ
    ܘܠܐ ܡܢܘ ܐܠܐ ܚܕܘܬܐ
    ܬܬ ܝܕܥ ܐܝܟ ܕܐܢܐ
    ܒܪܡ ܕܒܐܝܕܝ ܡܢ ܕܐܬܗܝܡ
    ܢ ܚܦܝ̈ܬܐ. ܪܒܘ ܗܘ
    ܬܘܒ. ܐܡܬܝ ܕܒܐܝܕ
    ܚܒܬܐ ܕܢܚܬܐ ܡ̣ܪܝܬܐ.
    ܗܘܝܐ ܠܐ ܬܬܗܦܟܘܢ ܒܝ
    ܒܪܡܐ ܠܡܒܛܠ ܝܘ̈ܡܝ.
    ܐܠܐ ܐܦܝܣܘܢܢܝ ܒܪܡܐ
    ܬܐ ܠܘܬܗܘܢ. ܘܐܡܪ
    ܟܕ ܐܡ̇ܪܢܐ ܠܗܘܢ ܡܠܘܗܝ
    ܘܠܝܢ ܡ̈ܠܐ. ܐܙ̇ܠܬ ܒܝ ܐܢܐ
    ܫܪܘܟ ܠܐܘܪܚܗ. ܘܟܕ ܚܙܢܝ
    ܥܡܐ ܕܐܙ̇ܠ ܐܢܐ.
    ܪܝܡܘ ܩܠܗܘܢ ܘܐܝܠܠܘ
    ܘܐܡ̇ܪܘ. ܠܐܢܫܐ ܐܙ̇ܠ
    ܬ ܠܟ ܡܢܢ ܒܪܘܟ..
    ܫܒܩܬ ܠܢ ܐܝܟ ܐܒܐ
    ܝܬܡܝ ܒܢܘ̈ܗܝ ܝܬ̈ܡܐ
    ܐܙ̇ܠ ܡܢ ܠܘܬܗܘܢ܀.
    ܘܠܝܢ ܐܢܘܢ ܦܘܩ̈ܕܢܐ
    ܦܩܕܟ ܚܒܪܟ ܐܪܡܝܐ
    ܥܡܐ ܘܐܡ̇ܪ ܠܗ̇. ܚܙܝ
    ܠܗܘܢ ܥܡܐ ܟܕ ܐܙ̇ܠ
    ܐܢܐ ܘܐܦܝ ܫܪܘܟ
    ܐܚ̈ܝ ܒܒܒܠܐ. ܘܠܝܢ ܕܢܦܠܘ
    
    # Source page p0208 (printed 134)
    ܟܠܗܘܢ ܪܐܙܐ ܕܝܠܝ
    ܕܠܥܠܡ. ܘܗܘܝܬ ܠܝ
    ܗܘ ܕܐܦ ܐܢܬ ܚܟܝܡܬ
    ܠܝ. ܛܒܐ ܗܘܬ ܒܝܢ ܕܢܡܘܬ
    ܡܠܝܢ ܩܕܡܝܟ. ܘܗ̇ܝܕܝܢ
    34..ܐܪܝܡܬ ܥܝܢܝ܀. ܘܒܟܝܬ ܆
    ܘܐܡܪܬ ܒܗ ܒܥܕܢܐ ܚܣ
    ܠܝ ܕܐܫܬܘܩܘܟܘܢ ܐܘ
    ܕܐܢܫܝܢ ܡܢܟܘܢ. ܐܠܐ
    ܒܠܚܘܕ ܐܢܬܘܢ ܥܕܡܐ
    ܠܒܝܬ ܩܘ̣ܒܘܪ ܩܘ̈ܒ̣ܪܐ ܕܐܒܗܝ
    ܡܢ ܚܒܠܬܐ ܒܥܝܩܘܬ
    ܝܠܠܐ ܨܘܝܘ. ܕܠܐ ܐܬܢܫܝܬ
    ܩܕܡ ܐܢܬܘܢ ܘܡܢ ܒܬܪ
    ..ܘܐܠܝܢ ܘܦ̣ܪ ܐܢܐ ܥܘܗܕܢܘܢ܀.
    35 ܘܐܙܠܬ ܐܢܐ ܒܪܘܟ
    ܥܕܡܐ ܠܬܪܥܐ ܩܕܝܫܐ.
    ܘܝ̇ܬܒܬ ܐܢܐ ܡ̈ܟܝܟܐܝܬ
    ܘܒܟܝܬ ܘܐܡܪܬ. ܐܘ ܥ̈ܝܢܝ
    ܗܘ̈ܝ ܡܒܘ̈ܥܐ ܘܐܡܘ̈ܬܐ
    ܕܡ̈ܝܐ ܡܒܘܥܐ ܕܕܡ̈ܥܐ.
    ܐܝܟܢܐ ܓܝܪ ܐܬܬܢܝܚ
    ܥܠ ܨܗܝܘܢ. ܘܐܒܟܐ
    ܠܐܒܠܐ ܐܢܐ ܘܐܫܟܚ.
    ܡܛܠ ܕܒܙܘܥܐ ܐܬܬܙܝܥ
    ܐܢܫܐ ܕܡܬ̇ܪܣܝܢ ܐܢܐ
    ܘܗܘܘ ܡܢ ܩܕܝܡ ܪܒܝ
    ܠܝܐ ܚܙܘܐ. ܘܗܘܐ ܒܒܐ
