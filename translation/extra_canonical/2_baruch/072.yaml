  text: |-
    # Source page p0176 (printed 166)
    ܠܗܘܢ ܐܒܘܬܐ ܩܕܡܝܐ
    ܘܡܒܩܪܢܐ ܡܢ ܢܡܘܣܐ
    ܐܬܢܣܒܘ ܗܘܘ. ܘܠܐ
    ܚܢܢ ܐܠܨܝܢ ܚܢܢ ܐܠܐ
    ܢܡܘܣܐ ܩܝܡ ܗܘ. ܠܢ
    ܗܟܝܠ ܐܚܘܝܘ ܒܢܡܘܣܐ
    ܘܐܬܩܝܡܘ ܬܪ̈ܝܗܘܢ
    ܒܚܟܡܬܐ. ܠܐ ܝܬܝܪ
    ܡܢܗ. ܘܪܥܝܐ ܠܐ ܥܪܩ.
    ܘܥܪܒܐ ܠܐ ܝܥܦ. ܒܪܡ
    ܕܝܢ ܐܝܟ ܕܐܡܪܬܘܢ
    ܠܝ. ܐܢܐ ܒܬܪ ܐܢܐ
    ܐܙܠ ܠܐܬܪܗܘܢ ܕܒܒܠܝܐ.
    ܘܐܫܕܪ ܒܝܕ ܟ̈ܬܝܒܐ ܠܒܝܬ
    ܘܠܒܒܠܝܐ ܡܒ̈ܣܡܢܘܬܐ.
    ܘܥܒܕ ܐܓܪܬܐ ܘܐܫܕܪ
    ܒܝܕ ܢܫܪܐ. ܘܐܬܩܝܡ
    ܀ .v. c ܘܡܬܒܪܝܢ ܒܡܘܬܐ ܕܐܡܝܪܐ
    ܐܢܬܘܢ ܐܢܐ ܒܪܘܟ.
    ܘܐܒܘܐ ܐܚܝܐ ܒܥܘܕܪܢܐ
    ܒܡܠܠܐ ܕܣ̈ܦܪܐ ܘܐܝܟ ܠܐ
    ܗܘܘ ܒܡܘܬܐ. ܐܠܐ ܐܢܐ
    ܟܠܚܘܕܝܗ. ܘܟܐܦܐ ܗܠܝܢ
    ܕܐܬܢܣܒ ܐܢ̈ܝܢ. ܚܙܐ
    ܫܪܝܪܐ ܒܝܕ ܢܒܝܐ ܥܠܝܡܘܬܐ
    ܡܫ̈ܠܡܢ ܘܡܬܝܗܒ̈ܢ. ܘܐܚܪ̈ܢܝܬܐ
    ܫܪ̈ܝܪܬܐ ܠܐܝܠܝܢ ܕܒܒܒܠ ܒܝܕ
    ܬܪܥܐ ܐܬܦܣܩ. ܘܩܪܝܬ
    ܥܠܝܡܘܬܐ ܘܐܡܪܬ ܠܗ ܩ̈ܠܐ
    ܗܠܝܢ. ܠܟܝ ܟܐܦ ܡܕܡܟܐ
    ܕܐܣܬܟܠ ܡܟܝܟܐ ܡܢ ܟܠܗ
    ܦܪܚܬܐ. ܘܗܘܐ ܐܠܗܐ ܘܠܐ
    ܢܫܒܘܩ ܒܐܬܪܐ. ܘܠܐ
    ܬܬܒܛܠ ܥܡܡܐ. ܘܠܐ ܬܣܬܟܠ
    ܥܠ ܟܘܠ ܐܢܫܝܢ. ܒܕܡܘܬ
    ܕܬܒܥܒܕ ܦܘܠܚܢܗ ܕܡ̈ܠܟܐ
    ܣ̈ܓܝܐܐ ܕܐܘܪܒ ܦܪܚܬܐ.
    ܘܐܬܬ ܓܘܫܡܐ ܥܡܗ ܗ̇ܘ
    ܕܒܩܘܫ ܐܝܬܘܗܝ ܘܫܒܝܚܐ
    ܠܗܘܘ ܐܢ̈ܝܢ ܐܝܟܢܐ
    ܕܐܬܩܪܝ ܒܝܕ ܟܘܡܪܐ
    ܕܐܘܦܝܥ ܡܢ ܝܘܡ ܩܒܠܬ
    ܢܘܗܪ ܦ
    
    # Source page p0175 (printed 167)
    ܐܠܐ ܐܦ ܟܘ̈ܡܪܐ
    ܝܩܒܠܘܢ ܠܐܠܗܐ ܟܕ ܡܝܬܝܢ
    ܗܘܘ ܠܗ ܬܘܬܒܘܬܐ. ܐܝܟ
    ܕܡܬܦܩܕ ܗܘܐ ܠܗܘܢ.
    ܐܦ ܚܠܝܛܘܬ ܟܘܡܪܐ
    ܕܡܬܟܢܫܘ ܠܥܡܠܐ ܐܬܪ
    ܕܚ̈ܝܐ ܗܘܘ ܕܢܩܕܫ ܐܘ
    ܕܠܒܟܐ ܩܕܝܫܐ. ܒܕܓܘܢ
    ܣܦܪ ܗܘܘ ܡܣܬܟܠܢܘܬܐ
    ܗܘܘ ܠܗ. ܐܝܟ ܕܦܩܕ
    ? No, it's `ܕܒܥܠܡܐ`.
    Let's re-examine line 8.
