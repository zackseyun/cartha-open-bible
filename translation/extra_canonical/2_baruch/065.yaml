    # Source page p0182 (printed 160)
    ܠܐܢܫܘܬܐ. ܐܝܟ ܕܡܬܝܕܥܝܢ
    ܠܥܒܕܘܗܝ. ܕܠܐܒܕܘ
    ܡܠܟܘܗܝ ܙܒܢܝܐ. ܒܪܡ
    ܕܝܢ ܬܬܦܪܣܐ. ܘܒܥܠܕܒܒܘܗܝ
    ܀ .v. c ܩܕܡܘܗܝ ܢܦܠܘܢ.
    ܘܠܗܘ ܙܒܢܐ ܟܠܗ
    ܒܘܣܡܐ ܣܓܝܐܐ. ܘܫܠܘܐ
    ܙܒܢܐ ܒܬܪ ܡܥܠܝܐ ܗܘܝ
    ܬܬܒܢܐ ܓܝܪ. ܘܬܬܚܕܬ
    ܗܘܝ ܩܘܪܒܢܝܗ. ܘܟܗ̈ܢܐ
    ܢܗܦܟܘܢ ܠܬܫܡܫܬܗܘܢ.
    ܘܬܘܒ ܢܨܘܡܘܢ ܥܡܡ̈ܐ
    ܐܝܟ ܕܐܫܬܒܚܘ. ܒܪܡ
    ܕܝܢ ܠܐ ܡܥܠܝܐܝܬ ܐܝܟ
    ܕܒܩܕܡܝܬܐ. ܐܠܐ ܢܗܘܐ
    ܡܢ ܒܬܪ ܗܠܝܢ. ܢܗܘܐ
    ܡܦܘܠܬܐ ܕܥܡ̈ܡܐ
    ܣܓܝ̈ܐܐ. ܘܠܒܝܢ ܐܢܘܢ
    ..ܡ̈ܝܐ ܐܚܪ̈ܢܐ ܕܚܫܘܟܐ..
    69 ܡ̈ܝܐ ܓܝܪ ܐܚܪ̈ܢܐ ܕܚܙܝܬ
    ܕܐܘܟܡܝܢ ܗܘܘ ܡܢ
    ܟܠܗܘܢ ܗܢܘܢ ܕܩܕܡܝܗܘܢ.
    ܗܢܘܢ ܗܘ
    ܡܛܠ ܕܗܘ ܟܠܚܘܕܘܗܝ
    ܝܿܕܥ ܡܕܡ ܕܥܬܝܕ ܠܡܗܘܐ.
    ܒܝ̈ܫܬܐ ܓܝܪ ܘ̈ܛܒܬܐ
    ܐܝܠܝܢ ܕܥܬܝܕܝܢ ܗܘܘ
    ܕܢܗܘܘܢ ܩܕܡܘܗܝ ܩܿܝܡܢ
    ܚܕܐ ܕܘܟܪܢܗܘܢ ܫܪܐ.
    ܘܕܒ̈ܒ̣ܐ ܢ̈ܦܫܐ ܕܙܕܝ̈ܩܐ
    ܥܬܝܕܝܢ ܕܢܫܬܒܩܘܢ
    ܩܕܡܘܗܝ. ܩܿܝܡ ܚܕܐ
    ܕܘܟܪܢܗܘܢ ܫܪܐ. ܗܦܟ
    ܡܢ ܐܝܠܝܢ ܕܥܬܝܕܝܢ ܕܢܥܒܕ
    ܒܫܘܠܡܗ ܕܥܠܡܐ. ܡܛܠ
    ܗܢܐ ܠܐ ܡ̈ܢܝܢ ܐܘ̈ܩܢܘܐ
    ܥܡ ܐܘ̈ܩܢܘܐ. ܘܠܐ
    ܢܗܝܪܐ ܥܡ ܢܗܝܪܐ.
    70 ܆܆ ܫܘܠܡܐ ܗܘ ܓܝܪ ܡܚܘܐ ܡܛܠ
    ܗܟܝܠ ܦܘܩܕܐ ܕܡ̈ܝܐ
    ܐܘܟܡ̈ܐ ܐܚܪ̈ܝܐ ܗܠܝܢ
    ܕܥܬܝܕܝܢ ܕܢܐܬܘܢ ܡܢ
    ܒܬܪ ܐܘ̈ܩܢܘܐ. ܐܘ ܗܝ
    ܡܠܬܐ. ܐܘ ܚܘ̈ܫܒܐ
    ܐܬܝܢ. ܘܢܗܘ
    
    # Source page p0181 (printed 161)
    ܕܪ̈ܚܡܐ ܘܬܘܟܠܢܐ ܕܥܒܕܐ܆
    ܘܠܢܦܫܗ ܚܕ ܓܝܪ. ܘܠܘܬܝܗܘܢ
    ܚܕ ܐܠܐ ܚܕ ܒܩܘܒܥܐ܆
    ܘܠܫܐܪܗܘܢ ܡܕܒܪܢܐ ܐܠܐ
    ܡܣܒܪܐ ܘܠܐܬܢܝܡܘܢ
    ܒܨܝܪܐ ܐܠܐ ܡܫܡܠܝܐ܆
    ܘܠܫܐܪܗܘܢ ܣ̈ܓܝܐܐ
    ܒܙܒܘܪ̈ܐ܆ ܘܠܫܐܪܗܘܢ ܐܢܫܝܢ
    ܕܠܐ ܬܘܘܩ ܡܕܡ ܐܠܐ
    ܒܫܪܝܪܐ܆ ܘܠܐܝܠܝܢ ܡܣܒܪܝܢ
    ܐܠܐ ܒܐܝܕ̈ܝܐ܆ ܘܠܫܐܪܗܘܢ
    ܕ̈ܡܝܟܐ ܐܠܐ ܓܒܪ̈ܐ܆
    ܘܠܫܐܪܗܘܢ ܚܒܝܒ̈ܐ܆ ܘܣܟܠܐ
    ܢܣܟܠܘܢ܆ ܘܠܐ ܬܫܬܘܙܒܘܢ
    ܘܐܝܟܢ ܡܚܫܒܬܐ ܕܒܢܝ
    ܐܢܫܐ܆ ܐܦ ܠܐ ܬܪܥܝܬܐ
    ܕܥܠܡܐ܆ ܘܠܐ ܢܫܬܘܙܒܘܢ 71..
    ܘܫܒܪ̈ܘܗܝ ܕܐܝܠܝܢ ܕܡܣܒܪܝܢ܆
    ܘܬܘܒ ܕܝܢ ܡܕܐ ܕܗ̈ܘܝ
    ܘܐܝܠܝܢ ܕܡܩܕ̈ܡܢ ܐܡܝܪ̈ܢ܆
    ܢ
    ܡܪܝܡܢܐ ܠܗܘܢ ܥܡܡ̈ܐ
    ܕܩܕܡ ܓܠܝܘ. ܘܐܢܬ
    ܘܠܡܘܟܟ ܥܡ ܡܕܒܪܢܐ
    ܕܡܫܬܚܠܦ ܗܢܘܢ. ܘܐܢܬ
    ܕܠܐ ܡ̇ܢ ܕܡܬܩܪܐ ܡܢ
    ܩܕܡ ܒܙܒܢܐ ܢܫܬܘܐ.
    ܘܕܡܬܩܪܐ ܡܢ ܒܬܪ
    ܒܙܒܢܐ ܢܬܟܢ. ܘܐܢܬ
    ܕܡܬܩܪܐ ܡܢ ܫܘܝܐ
    ܒܒܥܘܬܐ ܢܫܬܡܥ. ܘܐܢܬ
    ܕܠܐ ܡ̇ܢ ܕܡܬܩܪܐ ܡܒܪܟ
    ܡܢ ܒܪܢܫܐ ܐܝܬܘܗܝ ܕܡܩܪܒ
    ܬܘܒ ܡܢ ܐܝܬܘܗܝ
    ܕܐܦܘܗܝ ܢܬܚܙܘܢ. ܢܫܬܒܩܘܢ
    ܠܐܝܠܝܢ ܕܥܒܕܝܢ ܡܫܟܢܘܬܐ.
    ܬܬܡܠܐ ܓܝܪ ܟܠ ܐܪܥܐ
    ܠܒܪܘܝܗ̇. ܘܝ ܐܪܥܐ ܕܝܢ
    ܩܕܡܝܬܐ ܬܬܚܙܐ ܥܠ
    ܕܒܪܗ̇. ܐܘ ܠܐ ܒܡܘܬܗ̇
    ܒܗܘ ܙܒܢܐ ܗ̇ܘ ܚܕܐ
    ܕܚܙܝܬ. ܗ̇ܘܘ ܦܘܩܕܢܘܗܝ.
    ܬܬܝܕܥ ܕܝܢ ܐܢ ܕܐܦܪ
    ܥܡ ܗܠܝܢ ܡܟܝܟܐ
    ܕܐܫܬܡܥܬ ܒܥܘܬܟ
    ܠܘܬ ܡܪܝܡܐ. ܚܒܝܒܐ
    ܕܝܢ ܐܦ ܠܐ ܩܒܠ
