    # Source page p0206 (printed 136)
    38 ܘܥܢܐ ܘܐܡܪ ܠܝ. ܡܢܐ
    ܡܢܝ. ܐܢܬ ܗܘ ܒܒܥܘܬܟ
    ܡܥܕܪ ܐܢܬ ܠܐܝܠܝܢ
    ܕܒܣܘܟܠܐ ܡܬܕܒܪܝܢ.
    ܢܡܘܣܝ ܚ̈ܝܐ ܗܘ.
    ܘܚܟܡܬܝ ܬܪܝܨܘܬܐ
    ܗܝ. ܐܪܙ ܕܒܝܢܝ ܘܒܝܢ\\
    ܦܘܫܩܗ ܕܚܙܘܐ ܗܢܐ.
    ܐܢܬ ܓܝܪ ܚܙܝܬ ܐܝܟ ܕܢܦܩܬ
    ܒܒܥܘܬܟ ܒܢܡܘܣܝ ܡܬܬܦܝܣ
    ܗܘܐ. ܘܡܢ ܝܘ̈ܡܝ ܡܢ
    .. ܚܟܡܬܝ ܠܐ ܐܬܢܣܝܬ. ܆.
    39 ܘܥܢܐ ܘܐܡܪ ܠܝ. ܒܪܡ.
    ܗܢܘ ܦܘܫܩܗ ܕܚܙܘܐ
    ܕܚܙܝܬ. ܐܝܟ ܕܚܙܝܬ ܥܒ̈ܐ
    ܣܓܝ̈ܐܐ ܗ̇ܘ ܕܚܪܒܝܢ
    ܗܘܘ ܠܗ ܠܕܒܪܐ ܪ̈ܒܐ
    ܘܩܫܝܐ. ܗܕܐ ܗܝ ܡܠܟܘܬܐ.
    ܗܝ ܝܘ̈ܡܬܐ ܬܩܘܡ.
    ܘܬܚܒܠ ܗܕܐ ܡܠܟܘܬܐ
    ܗܝ ܕܡܟܝ ܚܒܠܬ ܠܨܗܝܘܢ
    ܘܬܫܬܥܒܕ ܠܗ̇ܘ ܕܐܬܐ
    ܒܬܪܗ. ܘܗܝ ܕܝܢ
    ܘܒܢܝ ܝܬܝܪ ܡܢ ܕܠܝ
    ܕܗ̈ܘܝ ܩܕܡܝܗ̇. ܘܡܕܒܪܐ
    ܙܒܢܐ ܣܓܝ̈ܐܐ. ܐܝܟ ܥܒ̈ܐ
    ܕܦܩܥܬܐ. ܘܬܚܙܐ ܙܒ̈ܢܐ.
    ܘܬܬܩܢ ܝܬܝܪ ܡܢ
    ܐܪ̈ܙܐ ܕܠܒܢܢ. ܘܬܬܩܝܡ
    ܒܗ̇ ܫܪܪܐ. ܘܬܥܪܘܩ
    ܠܘܬܗ̇ ܟܘܠܗܘܢ ܐܝܠܝܢ
    ܕܡܟܬܡܝܢ ܒܥܘܠܐ. ܐܝܟ
    ܕܥܪܩܝܢ ܚܝܘ̈ܬܐ ܟܝ̈ܢܝܬܐ
    ܘܚ̈ܠܒܝ ܒܥܒܐ. ܘܢܗܘܐ
    ܀ ܡܕܐ ܕܡ̣ܢ ܙܒܢܐ ܕܫܘܠܡܗ̇
    ܕܐܦܠܐ ܗܝ̣ܕܝܢ ܬܬܓܠܐ
    ܪܝܫܝܬܗ ܕܡܫܝܚܝ. ܗܝ
    ܕܕܡܝܐ ܠܡܒܘܥܐ ܘܠܓܦܢ
    ܘܡܐ ܕܐܬܓܠܝܬ ܬܥܩܘܪ
    ܗܝܘܬܐ ܕܡܢܗ̇. ܘܗ̇ܝ
    ܕܝܬܝܬ ܐܪܙܐ ܕܪܡܐ ܗܘ
    ܕܐܫܬܚܪ ܡܢ ܗ̇ܘ ܥܒܐ.
    ܘܘܢܚܐ ܗ̣ܘ ܕܡ̣ܠܬܐ
    ܥܡܗ ܬܓܙ ܡ̈ܠܐ
    ܗܠܝܢ ܕܫ̣ܡܥܬ. ܘܐ̣ܢ ܗܘ
    4
    
    # Source page p0205 (printed 137)
    ܢܣܒܘ ܩܕܡܝܗܘܢ ܟܠܗܘܢ
    ܥܒ̈ܕܝܗܘܢ ܕܒܝܫܘܬܗܘܢ. ܘܡܢ
    ܫܪܐ ܡܢ ܢܦܫܝܗܘܢ. ܘܠܡ
    ܐܠܐ ܫܪܝܪܐ ܕܥܡܢ ܗܘ
    ܘܡܬܚܙܝ ܒܐܪܥܐ
    ܓܠܝܬ. ܘܬܘܒ ܢܚܙܝܗ
    ܫܘܦܪܐ ܠܥܠܡ. ܒܕܡܘܬ
    ܕܢܒܥܐ ܒܥܡܘܛ ܚܒܠܐ.
    ܘܒܕܡܘܬ ܕܐܬܝܠܕܬ ܙܒܢܐ
    ܕܡܫܕܪܝܢ ܐܢܘܢ. ܗܢܘ
    ܚܙܘܐ ܘܗܢܘ ܦܘܫܩܗ ܀
    ܐܢܬܝ ܘܐܡܪܬ ܠܡܒܥܐ
    ܘܠܡܒܪܐ ܪ̈ܦܝܝ ܙܒܢܝܢ.
    ܘ ܝܕܥܬ ܕܫܘܐ ܕܢܚܙܐ
    ܒܗܘ ܙܒܢܐ ܐܡܠܠ ܕܝܢ
    ܥܡܟܝ ܟܠ ܕܡܬܚܫܒ
    ܐܢܐ. ܘܐܒܥܐ ܡܢܟܝ
    ܐܠܐ ܐܢܬܝ ܕܪܝ ܐܢܐ.
    ܡܛܠ ܕܗܘ ܚܙܐ ܐܢܐ
    ܣܓܝ̈ܐܐ ܡܢ ܥܡܟܝ
    ܕܐܢܚܢܢ ܡܢ ܩܝܡܝܗܘܢ
    ܘܢܗܘܘ ܡܠܝܗܘܢ ܢܚܙܘ
    ܕܠܡܘܬܗܘܢ ܐܚܪ̈ܢܐ ܕܝܢ
    ܬܘܒ ܚܙܝܬ
    ܗܘܘ ܠܗܘܢ ܠܗܠܝܢ. ܐܘ
    ܡܢܝ ܡܩܒܠܝܢ ܠܗܘܢ ܗܘܘ
    ܒܟܠ ܙܒܢ. ܐܘ
    ܠܡܘܢ ܡܬܬܚܒܘ ܡܬܬܚܒܝܢ
    ܠܗܘܢ ܕܗܠܝܢ. ܘܐܝܟ
    ܝܠܕܐ ܡܬܝܠܕ ܗܘܝ
    ܐܬܕܝܠܚ. ܀ ܝ ܀ ܘܥܒܕܬ
    ܘܐܡܪ ܠܝ. ܐܦ ܗܠܝܢ
    ܕܠܐ ܙܕܝܩܝܢ. ܡܛܠ
    ܕܐܒܪܗܡ ܠܡܢܘ ܡܟܡܟܐ
    ܗܘܝ ܕܗܠܝܢ. ܠܐܝܠܝܢ
    ܕܡܣܒܪܝܢ ܗܘܘ ܛܒ̈ܬܐ
    ܕܡܩܕܡܐ ܐܡܝܪܢ.
    ܘܠܐܝܠܝܢ ܕܡܢܗܝܢ ܗܘܘ
    ܕܒܡܘܒܠܐ ܕܗܠܝܢ. ܘܕܐܡܪܬ
    ܥܠ ܐܝܠܝܢ ܕܐܬܦܪܫܘ
    ܡܠܠ ܐܝܠܝܢ ܕܐܬܢܣܒܘ.
    ܘܕܐܡܪ ܗܘܝ ܡܒܐܫ.
    ܗܢܘܢ ܕܡܢ ܩܕܝܡ ܐܬܥܒܕܘ.
    ܘܡܢ ܒܬܪܟܢ ܐܬܢܣܒܘ.
    ܘܐܬܚܫܒܘ ܒܙܒܢܐ
    ܕܒܡܘ̈ܬܐ ܢܚܝܒܘܢ. ܕܗܠܝܢ
    ܐܒܕܘܗܝ ܩܕܡܝ ܐܬܘܗܝ
    ܘܕܐܡܪ ܡܬܚܫܒܘ. ܘܐܝܠܝܢ
    ܕܡܢ ܩܕܝܡ ܠܐ
