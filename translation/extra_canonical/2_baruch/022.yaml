  text: |-
    # Source page p0216 (printed 126)
    ܠܚܡܐ ܘܠܐ ܬܫܬܐ
    ܡ̈ܝܐ܆ ܘܠܐ ܬܙܥܪ ܠܐܢܫ܀
    ܘܡܢ ܒܬܪ ܫܒܥܐ ܝ̈ܘ
    ܡ̈ܬܐ ܚܙܝ ܡܚܙܝ̈ܬܐ
    ܐܠܝܢ ܠܝ܀ ܘܫܪܝܬ
    ܐܟܠܢܐ ܠܚܡܐ܆ ܘܐܫܬܝܬ
    ܡ̈ܝܐ ܘܒܪܐ ܕܫܒܥܐ ܝ̈ܘܡܝܢ
    ܐܬܝܬ ܠܝ ܘܠܐ
    ܡܫܬܘܙܒ ܨ ܨ ܨ ܨ ܨ
    ܀ ܘ ܀ ܨ ܀ ܨ ܀ ܨ ܀ ܨ ܀ ܨ ܀ ܨ ܀
    ܀ ܨܠܘܬܐ ܕܒܪܘܟ ܒܪ ܢܪܝܐ ܀ 1 .b.
    21 ܘܐܡܪܬ ܡܢ ܬܡܢ
    ܘܝܠܗ ܠܒܒܝ ܕܡܨܪ܀
    ܒܡܒܘܥܐ ܕܐܒܠܐ܀
    ܘܡ̈ܝܢܝ ܢܦܩܝܢ ܬܡܢ. ܘܠܡܒܟܐ
    ܠܐ ܐܫܒܥ. ܘܠܐ ܡܦܢܘ
    ܘܡ̈ܝܐ ܠܐ ܐܫܬܘܦ ܘܠܐ
    ܬܕܡܟܝ ܬܘܒܘܬ ܬܡܢ
    ܐܝܟ ܕܦܩܕܬܢܝ. ܘܡܢ
    ܒܬܪܗܝܢ ܐܬܝܬ ܠܐܬܪܐ
    ܗܘ ܕܡܠܠܬ ܥܡܝ ܬܡܢ.
    ܘܝܬܒܬ ܒܡܥܪܬܗܘܝ
    ܕܡܥܪܬܐ. ܘܫܒܥܐ
    ܐܢܫܐ ܡܣܟܠܢܐ. ܗܘ̇
    ܕܡܠܐ ܪܘܓܙܐ ܒܡܠܘܗܝ.
    ܘܐܘܡܘܗܝ ܕܫܡܝܐ
    ܝܕܥ ܒܪܘܚܐ. ܗܘ̇ ܕܩ̣ܪܐ
    ܡܢ ܪܝܫ ܥܠܡܐ ܠܥܡ̣ܡܐ
    ܕܒ̣ܕܓܠܐ ܠܐ ܬ̣ܘܒ ܘܡܫܬܡܥܝܢ
    ܠܝ. ܐܢܬ ܕܠܐܙܐ ܦܩ̣ܝܕܐ
    ܒܪܘܙܝܟ. ܘܠܐܝܠܝܢ ܕܥܬܝ̈ܕܢ
    ܚܙ̣ܝܬ. ܐܝܟ ܐܝܠܝܢ ܕܥܒ̣ܕ
    ܐܢܬ. ܕܠܚܝ̈ܒܘܬܐ ܕܩܕܡ̈ܝܟ
    ܩ̣ܕܡܝܟ ܒܚܘܫܒܐ ܪܒܐ
    ܡܕܟ̣ܪܐ. ܐܦ ܠܚܝ̈ܒܬܐ
    ܩܕ̈ܡܝܬܐ ܕܫܠܝܢ ܠܝܬ ܠܗܝܢ
    ܕܒ̣ܥܝܕܐ ܡܢ ܟܠܡ ܕܝܠܗܘܢ
    ܘܕܘܟܪܢܐ. ܗܠܝܢ ܕܩ̈ܡܝ
    ܚܕ̈ܕܝܢ ܐܬܘܗܝ ܕܝܠܟ
    ܒܙܒܢܘܬܐ ܡܕܟ̣ܪܐ. ܠܝ
    ܒܠܚܘܕܝܟ ܐܢܬ ܙܕܩܐ
    ܕܬܒܥܝܟ ܒܪܝܫܘܬܗ ܟܘܠܐ
    ܕܒ̣ܝܬ. ܗܘ̇ ܕܡܡܠܠ
    ܛܘܦܢܐ ܡܛܪܐ ܐܠܐ ܐܢܫܐ
    ܡܣܟܠܢܐ. ܘܝܘܠܦܢܘܗܝ ܕܙܒ̈ܢܐ
    ܟܕ ܠܐ ܢܬܬܙܝܥ ܐܢܬ
    ܒܠܚܘܕܝܟ ܝ̣ܕܥܬ. ܚܘܪ ܒܒܥ
    ܐܢܬ ܓܝܪ ܒܠܚܘܕܝܟ ܡܫܟܚ
    ܐܢܬ ܕܬܣܒܪ ܠܒܥܘܬܗ
    ܐܝܠܝܢ ܕܩܕܡ̈ܝܟ. ܘܠܐܝܠܝܢ
