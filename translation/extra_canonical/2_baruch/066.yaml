  text: |-
    # Source page p0181 (printed 161)
    ܕܪ̈ܚܡܐ ܘܬܘܟܠܢܐ ܕܥܒܕܐ܆
    ܘܠܢܦܫܗ ܚܕ ܓܝܪ. ܘܠܘܬܝܗܘܢ
    ܚܕ ܐܠܐ ܚܕ ܒܩܘܒܥܐ܆
    ܘܠܫܐܪܗܘܢ ܡܕܒܪܢܐ ܐܠܐ
    ܡܣܒܪܐ ܘܠܐܬܢܝܡܘܢ
    ܒܨܝܪܐ ܐܠܐ ܡܫܡܠܝܐ܆
    ܘܠܫܐܪܗܘܢ ܣ̈ܓܝܐܐ
    ܒܙܒܘܪ̈ܐ܆ ܘܠܫܐܪܗܘܢ ܐܢܫܝܢ
    ܕܠܐ ܬܘܘܩ ܡܕܡ ܐܠܐ
    ܒܫܪܝܪܐ܆ ܘܠܐܝܠܝܢ ܡܣܒܪܝܢ
    ܐܠܐ ܒܐܝܕ̈ܝܐ܆ ܘܠܫܐܪܗܘܢ
    ܕ̈ܡܝܟܐ ܐܠܐ ܓܒܪ̈ܐ܆
    ܘܠܫܐܪܗܘܢ ܚܒܝܒ̈ܐ܆ ܘܣܟܠܐ
    ܢܣܟܠܘܢ܆ ܘܠܐ ܬܫܬܘܙܒܘܢ
    ܘܐܝܟܢ ܡܚܫܒܬܐ ܕܒܢܝ
    ܐܢܫܐ܆ ܐܦ ܠܐ ܬܪܥܝܬܐ
    ܕܥܠܡܐ܆ ܘܠܐ ܢܫܬܘܙܒܘܢ 71..
    ܘܫܒܪ̈ܘܗܝ ܕܐܝܠܝܢ ܕܡܣܒܪܝܢ܆
    ܘܬܘܒ ܕܝܢ ܡܕܐ ܕܗ̈ܘܝ
    ܘܐܝܠܝܢ ܕܡܩܕ̈ܡܢ ܐܡܝܪ̈ܢ܆
    ܢ
    ܡܪܝܡܢܐ ܠܗܘܢ ܥܡܡ̈ܐ
    ܕܩܕܡ ܓܠܝܘ. ܘܐܢܬ
    ܘܠܡܘܟܟ ܥܡ ܡܕܒܪܢܐ
    ܕܡܫܬܚܠܦ ܗܢܘܢ. ܘܐܢܬ
    ܕܠܐ ܡ̇ܢ ܕܡܬܩܪܐ ܡܢ
    ܩܕܡ ܒܙܒܢܐ ܢܫܬܘܐ.
    ܘܕܡܬܩܪܐ ܡܢ ܒܬܪ
    ܒܙܒܢܐ ܢܬܟܢ. ܘܐܢܬ
    ܕܡܬܩܪܐ ܡܢ ܫܘܝܐ
    ܒܒܥܘܬܐ ܢܫܬܡܥ. ܘܐܢܬ
    ܕܠܐ ܡ̇ܢ ܕܡܬܩܪܐ ܡܒܪܟ
    ܡܢ ܒܪܢܫܐ ܐܝܬܘܗܝ ܕܡܩܪܒ
    ܬܘܒ ܡܢ ܐܝܬܘܗܝ
    ܕܐܦܘܗܝ ܢܬܚܙܘܢ. ܢܫܬܒܩܘܢ
    ܠܐܝܠܝܢ ܕܥܒܕܝܢ ܡܫܟܢܘܬܐ.
    ܬܬܡܠܐ ܓܝܪ ܟܠ ܐܪܥܐ
    ܠܒܪܘܝܗ̇. ܘܝ ܐܪܥܐ ܕܝܢ
    ܩܕܡܝܬܐ ܬܬܚܙܐ ܥܠ
    ܕܒܪܗ̇. ܐܘ ܠܐ ܒܡܘܬܗ̇
    ܒܗܘ ܙܒܢܐ ܗ̇ܘ ܚܕܐ
    ܕܚܙܝܬ. ܗ̇ܘܘ ܦܘܩܕܢܘܗܝ.
    ܬܬܝܕܥ ܕܝܢ ܐܢ ܕܐܦܪ
    ܥܡ ܗܠܝܢ ܡܟܝܟܐ
    ܕܐܫܬܡܥܬ ܒܥܘܬܟ
    ܠܘܬ ܡܪܝܡܐ. ܚܒܝܒܐ
    ܕܝܢ ܐܦ ܠܐ ܩܒܠ
    
    # Source page p0180 (printed 162)
    ܠܘܩܕܡ ܕܬܬܝܕܥ ܕܐܢܬܘܢ.
    ܒܫܘܠܡܗ̇ ܡܢ ܟܠܗ̇ ܗܠܝܢ
    ܐܫܬܪܝ. ܘܗܐ ܗܝ
    ܡܬܬܝܕܥܐ ܡܢ ܟܠܗ̇ ܕܐܝܟ
    ܬܪ̈ܬܝܢ ܕܐܬܝܕܥ
    ܠܟ ܡܢ ܩܕܝܡ. ܟܕ
    ܀ ܢܫܬܠܡܘܢ ܥܡܡ̈ܐ. v. 6.
    ܘܐܢܬ ܙܒܢܐ ܕܡܫܝܚܐ.
    ܘܗܘܐ ܒܒܥܘܗܝ ܒܡܕܒܪܐ.
    ܘܡܢܗܘܢ ܢܚܬܘ ܡܠܐܟܘܗܝ
    ܢܫܬܘܠܡ. ܘܠܝܬ ܗܘܝܐ
    ܕܐܝܟ ܗܠܝܢ ܒܡܕܒܪܐ ܐܚܪܝܢ
    ܕܬܬܝܕܥ ܕܚܝܠ ܡܠܬܗ.
    ܡܠܐ ܒܡܕܐ ܕܠܐ ܝܕܥ
    ܠܐܣܝܪ̈ܐ. ܘܕܠܐ ܕܫܢ
    ܠܙܐܒܗ ܕܝܥܩܘܒ ܐܘܪܗ
    ܕܚܙܘ. ܘܗܕܐ ܡܛܠ
    ܕܢܬܬܒܥܘܢ ܡܢ ܟܘܠ
    ܒܩ̈ܒܝ ܓܒܪ̈ܝ. ܟܘܠ
    ܐܝܠܝܢ ܕܝܢ ܕܐܬܓܠܝܘ
    ܒܠܝܒܗ ܐܘ ܕܝܕܥܘܗܝ.
    ܘܠܝܬ ܒܗܘܘܢ ܓܢܝܙܘܬܐ
    73..ܢܫܬܠܡܘܢ ܝܘܡܝܗܘܿܢ ܡܢ
    ܟܐܒܐ ܕܡܡܘܬ ܠܥܡܠܐ
    ܕܐܝܬ ܒܥܠܡܐ. ܡܢܟܝ
    ܒܡܥܒܪܐ ܠܥܠܡ ܢܠܐ ܬܪܘܗܝ
    ܕܡܥܡܘܬܐ. ܘܢ̇ܚܬ ܛܠܐ
    ܒܒܘܣܡܐ ܘܢܚܐ
    ܢܬܚܙܐ. ܘܢܗ̇ܚܬܘ ܣܡܟܐ
    ܬܘܒ ܢܝܚܐ ܒܫܠܝܐ.
    ܘܡܘܪܢܐ ܢܬܬܢܝܚ.
    ܘܕܘܝܐ ܘܟܘܪܗܢܐ
    ܘܐܢܚ̈ܬܐ ܢܥܪܩܘܢ ܡܢ
    ܒܢܝܢܫ̈ܐ. ܘܬܗܘܐ ܚܕܘܬܐ
    ܒܟܠܗ̇ ܐܪܥܐ. ܘܬܘܒ ܠܐ
    ܢܡܘܬ ܕܠܐ ܒܙܒܢܗ. ܘܠܐ
    ܡܕܡ ܡܥܝܩ ܢܓܕܫ ܣܡܡܠܐ
    ܡܕܡ. ܘܕ̈ܝܢܐ ܘܡܕ̈ܝܢܝܘܬܐ
    ܘܚܪ̈ܝܢܐ ܘܬܒ̈ܥܬܐ
    ܘܕܡܐ ܘ̈ ܪ̈ܓܝܓܬܐ ܘܚܣܡܐ
    ܘܣܢܐܬܐ. ܘܟܠ ܐܝܠܝܢ
    ܕܕ̈ܡܝܢ ܕܟ̈ܝܢ. ܠܚܘܝܒܐ
    ܢܬ̈ܪܝܡܢ ܟܕ ܢܫ̈ܬܩܠܢ. ܗ̈ܢܝܢ
    ܐ̈ܢܝܢ ܓܝܪ ܘܐܝܠ
