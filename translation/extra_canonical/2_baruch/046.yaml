  text: |-
    # Source page p0200 (printed 142)
    ܟܠܝܢ ܒܪܝܫܝܗܘܢ ܘܒܚܝܠܝܗܘܢ
    ܗܘܝܟܝܢ. ܚܘܪ ܒܥܡܐ ܕܐ
    ܕܐܫܬܒܩܘ ܠܟ. ܘܦܪܘܩ
    ܠܗܠܝܢ ܕܐܫܬܚܪܘ ܡܢܗܘܢ
    ܠܟ. ܘܠܐ ܬܦܘܩܘܩ
    ܣܒܪܗ ܕܥܡܟ. ܘܠܐ
    ܬܦܣܘܩ ܙܒܢܐ ܕܥܘܕܪܢܟ.
    ܗܘܘ ܓܝܪ ܥܡܐ ܕܓܒܝܬ.
    ܘܗܘܝܢ ܐܢܢ ܥܡܐ
    ܕܠܐ ܡܬܡܢܐ ܐܡܘܪܝ.
    ܐܠܐ ܐܡܠܠ ܩܕܡܝܟ
    ܘܐܡܪ. ܘܐܡܪ ܐܢܐ
    ܕܡܬܚܡܥ ܠܒܝ. ܟܠܝܢ
    ܬܪܥܝܢܝ ܕܘܐ ܠܡܣܗܕ
    ܠܘܬܢ. ܘܝܕܥܝܢ ܕܠܐ
    ܢܦܠܝܢ ܡܡܕ ܕܡܢܒܝܢ
    ܐܝܟܝܢ ܚܢܢ. ܒܒܥܘܬܢ
    ܛܘܒܝ. ܐܦܢ ܒܗܕܐ
    ܕܠܐ ܐܬܝܠܕܢ ܒܥܘܩܪܐ.
    ܀ ܟܠܝܢ ܓܝܪ ܐܢܬܝܢ ܚܕ
    ܥܡܐ ܡܫܡܗܐ ܕܢܣܒܢ
    ܚܕ ܢܡܘܣܐ ܡܢ ܚܕ.
    ܘܗܘ ܢܡܘܣܐ ܕܒܢܢ.
    ܡܥܪܙ ܠܢ. ܘܚܟܡܬܐ
    ܡܥܝܪܐ ܕܐ
    ܬܣܝܡ. ܘܟܕ ܨܒܝܬ
    ܘܐܡܪܬ ܗܠܝܢ. ܐܬܢܚܬ
    ܣܓܝ. ܘܒܟܝܬ ܘܐܡܪܬ
    ܠܝ. ܐܢܬ ܦܣܝܩܐܝܬ ܕܒܝܬ
    ܐܘ ܒܪܘܝ. ܘܐܫܬܘܝܬ
    ܡܘܠܕܝ ܡ̈ܠܟܝܟ. ܐܠܐ
    ܕܝܠܝ ܐܒ̈ܠܐ ܕܝܠܗ.
    ܘܠܡܘܬܝ ܐܒ̈ܠܐ ܕܕܡܘ.
    ܡܢ ܡ̈ܠܟܝܟ ܓܝܪ ܡܬܝܗܒ
    ܐܢܐ ܠܟ. ܘܡܢ ܨܒܘܬܟ
    ܐܬܒܪܝܬ ܥܡܟ. ܗܕܐ ܗܝ
    ܓܝܪ ܐܕܡ ܕܠܐ ܢܗܘܐ
    ܡܕܡ ܗܘ̇ ܕܡܬܚܒܠܐ.
    ܘܐܢܫܐ ܐܝܟ ܗܘ̇
    ܕܒܪܐ ܕܠܒܟܝ ܡܕܡ. ܘܠܐ
    ܬܬܒܪ ܛܝܒܘܬܝ. ܘܠܐ
    ܩܒܠܐ ܢܥܕܪܘܢ ܪܘܚܝ. ܡܛܠ
    ܗܘ̣ ܡܬܢܣܒܘ ܡܬܢܣܒ
    ܐܢܬ. ܐܝܟ ܕܩܕܡܬ
    ܐܡܪܬ ܠܟ. ܘܐܢܐ
    ܐܫܢܐ ܕܐܡܪܬ ܠܟ.
    ܘܠܡܘܬ ܗܘ̇ ܙܒܢܐ ܕܐ̈ܓܪܐ
    ܢܬܐܬܐ ܓܝܪ ܘܠܒܟܪ
    ܒܚܙܘܩܝ ܚܕ̈ܘܬܐ.
    ܘܠܘܬܝܟ ܡܢ ܐܢܐ
    
    # Source page p0199 (printed 143)
    ܒܚܫܟܐ ܕܥܡܝܩܘܬܐ܂
    ܘܢܗܘܘܢ ܒܗܘܢ ܝܘܡ̈ܬܐ܂
    ܢܬܚܙܘܢ ܩܘܒܥܘܗܝ
    ܒܡܘ̈ܒܕܝ ܕܐܒܕܐ ܚܕ
    ܥܠ ܚܕ܂ ܡܛܠ ܕܠܐ ܝܕܥܝܢ
    ܕܡܢ ܕܝܠܝ܂ ܠܐ ܗܘܐ
    ܓܝܪ ܣܓܝ̈ܐܐ ܚܟܝܡ̈ܐ
    ܡܫܬܟܚܝܢ ܒܗܘ ܙܒܢܐ܂
    ܘܣܟܘܠܬܢܐ ܚܕܝ̈ܕܝ
    ܢܗܘܘܢ܂ ܐܠܐ ܐܦ ܐܝܠܝܢ
    ܕܝܕܥܝܢ ܢܫܬܘܩܘܢ܂
    ܘܗܘܘܢ ܩܒ̈ܘܥܐ ܣܓܝ̈ܐܐ
    ܘܣ̈ܒܐ ܕܠܐ ܙܒܢܗܘܢ܂
    ܘܒ̈ܥܝܪܐ ܕܢܬܩܢܘܢ
    ܢܬܚܙܘܢ܂ ܘܢܬܝܠܕܘܢ
    ܡܒ̈ܟܘܪܐ ܠܐ ܙܒܢܗܘܢ܂
    ܘܒܢܘ̈ܗܝ ܣܪܝܩܝ܂ ܘܒܢܘ̈ܗܝ
    ܢܫܬܘܕܥܘܢ܂ ܘܢܗܘܘܢ ܐܢܫ̈ܐ
    ܒܕܓܠܘܬܐ܂ ܘܢܡܘܬܘܢ ܒܗܝܡܢܘܬܐ
    ܒܥܝܩܘܬܐ܂ ܘܢܬܩܢܘܢ
    ܬܘܕܝܬܐ܂ ܘܢܫܬܪܪܘܢ
    ܬܘܒ ܒܒܗܬܬܐ܂
    ܘܐܡܘܪ̈ܝ ܣܓܝ
    ܟܕ ܙܕܝܩܢ ܡܬܚܫܒܝܢ
    ܗܠܝܢ܆ ܘܝ̇ܕܥܝܢ ܢܝ̣ܫܐ ܛܥܝܐ
    ܒܐܝܠܝܢ ܕܠܐ ܣ̇ܒܪܝܢ ܗܘܘ
    ܥܠܝܗܘܢ. ܘܚܫܐ ܢ̣ܐܚܘܕ
    ܠܐܢ̈ܫܐ ܕܫ̣ܠܘ ܗܘܘ.
    ܘܬܬܚܙܘܢ ܣ̈ܓܝܐܐ
    ܒܪܘܓܙܐ ܕܒܗ ܬܣܬܝ̈ܪܘܢ.
    ܘܠܒܝ̈ܫܐ ܬܚܒܫܘܢܐ
    ܕܐܝܩܪܐ ܕܡܐ. ܘܒܡܘܗܝ
    ܥܬܝ̈ܕܐ ܙܒܝܢܐ ܢܬܒܕܪܘܢ.
    ܘܗܘ̣ܐ ܒܗ ܒܗܘ̇ ܙܒܢܐ.
    ܢܬܚܙܐ ܓܠܝܢܐ ܒܒܠܝܗ
    ܚܘܒܝ̈ܗܘܢ ܕܙܒܢܐ. ܚܠܦ
    ܕܒܒܘܒܗܘܢ ܗܠܝܢ ܙܒ̈ܢܐ
    ܡܬܛܝܒܝܢ ܗܘܘ ܘܥ̇ܒܪܝܢ.
    ܘܐ̇ܒܕܝܢ ܗܘܘ ܐܝܟ ܐܠܝܢ
    ܒܒ̈ܘܥܝܗܘܢ. ܘܠܡܘܗܝ
    ܕܚܒܠܐ ܠܐ ܡܬܕܪܟܝܢ
    ܗܘܘ. ܡܛܠ ܗܢܐ ܢܘܪܐ
    ܡܚܒܠܬܗܘܢ ܐܟܠܬ.
    ܘܒܡܥܪܒܗܘܬܐ ܕܬܫܒܘܚܬܐ
    ܡܕܢܚܬܗܘܢ ܕܡܘ̈ܒܕܢܝܗܘܢ.
