    ܒܬܘܝܒܘܬܐ ܕܩܕܡܘ
    ܐܡ̇ܪܘܗ̇ ܠܟܘܢ. ܡܠܐ
    ܡܠܬܐ ܕܝܢ ܕܡܬܬܣܝܡ
    ܐܢܐ ܠܐ ܐ̇ܒܕܬ ܐܢܘܢ
    47.. ܐܦ ܠܐ ܠܒܢܝ̈ܗܘܢ. ܗ̇ܘ ܕܝܢ
    ܢܦܩ̇ܘ ܘܫ̇ܪܝܘ ܐܢܘܢ.
    ܐ̇ܙܠܬ ܠܝ ܡܢ ܬܡܢ.
    ܘܐܡ̇ܪܝܬ ܠܗܘܢ. ܗܐ
    ܐܢܐ ܐ̇ܙܠ ܐܢܐ ܠܕܝܪܝ
    ܠܚܒܪܘܢ. ܒܬܪܟܢ ܕܝܢ
    ܫܒܩܢܝ ܚܒܪܐ. ܘܐ̇ܬܝܬ
    ܠܘܬ ܐܪܙܐ ܕܐܬܡܠܠ
    ܥܡܝ ܬܡܢ. ܘܝ̇ܬܒܬ ܬܡܢ.
    ܘܨܡ̇ܬ ܫܒܥܐ ܝܘܡ̈ܝܢ.
    48 ܘܗܘܐ ܒܬܪ ܫܒܥܐ ܝܘܡ̈ܝܢ
    ܘܗܘܐ ܡܢ ܒܬܪ ܝܘܡܐ
