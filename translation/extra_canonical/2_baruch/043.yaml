    46 ܐܢܬܘܢ ܠܗܘܢ܀܀ ܘܝܘܡܗ
    ܒܪܝܟ ܘܣܒ̈ܘܗܝ ܕܥܡܐ
    ܘܐܡܪܘ ܠܝ. ܒܕܡܐ
    ܠܗܘܒܢܐ ܡܟܟܢ ܚܝܠܬܢܐ.
    ܕܢܣܒܟ ܫܠܝ ܟܠܓܠܠ.
    ܘܫܪܝܪܐܝܬ ܐܘܗܝ ܒܚܫܘܟܐ.
    ܘܢܘܗܪܐ ܠܐ ܐܘܗܝ
    ܠܥܡܐ ܕܐܫܬܚܪܘ. ܐܢܫܐ
    ܓܝܪ ܗܘܘ ܢܒܝܐ ܢܡܘܣܐ.
    ܐܘ ܡܢܘ ܡܕܪܟܢ ܠܢ
    ܒܝܬ ܡܘܬܐ ܠܚܝ̈ܐ.
    ܘܐܡܪܢܐ ܠܗܘܢ ܕܠܘܩܒܠܐ
    ܐܬܘܗܝ ܕܚܝܠܬܢܐ ܠܐ
    ܡܫܟܚ ܐܢܐ ܕܐܩܘܡ.
    ܒܪܡ ܕܝܢ ܠܐ ܚܣܪ
    ܠܐܝܣܪܝܠ ܚܟܝܡܐ܆ ܘܠܐ
    ܒܪ ܢܡܘܣܐ ܠܓܢܣܗ
    ܕܝܥܩܘܒ. ܒܠܚܘܕ ܕܝܢ
    ܐܢܬܘܢ ܨܒܘ ܠܒܩ̈ܝܟܘܢ
    ܕܬܫܡܥܘܢ ܠܢܡܘ
    ܡܪܚܡܢܘܬܗܘܢ ܐܢ
    ܓܝܪ ܬܥܒܪܘܢ ܗܠܝܢ. ܢܬܬܢܝܚ
    ܠܟܘܢ ܣܒܪܐ܆ ܗܠܝܢ
    ܕܩܕܡܘ ܐܡ̇ܪܘ ܠܟܘܢ.
