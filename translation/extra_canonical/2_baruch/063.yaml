  pages: [184, 183]
  text: |-
    # Source page p0184 (printed 158)
    ܘܗܘܐ ܠܗ ܐܪܙܐ ܥܡܝܩܐ.
    ܠܐ ܗܘܐ ܓܝܪ ܡܡܠܟܢܘܬܗ
    ܚܕܐ. ܐܦ ܠܐ ܓܝܪ ܝܘܡܐ
    ܗܘܐ. ܐܠܐ ܕܡܢ ܙܒܢܐ
    ܀ ܠܝܠܝܐ. ܕܒܐܚܪܝܬܐ ܡܢ
    ܡܢܗ ܐܝܬ ܠܗ ܕܠܥܠܡ.
    ܗܘ ܓܝܪ ܕܡ̇ܪܐ ܕܠܗܘܬ
    .. ܐܦ ܕܠܥܠܡ ܡܕܢ. — .ܝ.
    65 ܘܒܬܪ ܕܝܢ ܡܢܫܐ ܗܘܐ
    ܗܘ ܡܢܫܐ. ܘܡܬܚܫܒ
    ܗܘܐ ܒܙܒܢܗ ܐܝܟ ܗܘ̇
    ܕܠܐ ܒܬܝ̣ ܚܝܒܘܬܐ ܕܠܒܪ
    ܪ̈ܢܝܢ ܠܗܘܢ. ܘܠܝܬ ܐܢܘܢ
    ܡ̈ܪܝܪܐ ܘܩܫ̈ܝܐ. ܬܫܬܥܝ
    66 .. ܕܝܠܗ ܝ. ܘܒ̈ܬܪ ܒܣܝ̈ܡܐ
    ܢܗܘܐ ܕܝܠܗ. ܗܘܐ ܗܘܐ
    ܝܘܡܘܗ̈ܝ ܕܐܡܘܢ
    ܕܫܘܝܐ. ܡ̇ܠܟܐ ܕܝܗܘܕܐ
    ܕܒܗܘ̇ ܙܒܢܐ ܗܘ̣ܘ ܒܠܚܘܕܘܗܝ
    ܡܫܟܚ ܗܘܐ ܠܚܛܝܬܐ
    ܡܢ ܡܠܝܘ ܠܒܗ ܘܡܢ ܟܠܗ̇
    ܢܦܫܗ. ܘܗܘ̣ ܕܡܢ ܠܐܢܫܐ
    ܡܢ ܦܬܓܡܐ. ܘܩܪܝ
    ܟܠܗܘܢ ܡܠܐܟ̈ܐ ܙܥܘܪܝܢ
    ܕܐܬܝܗܒܘ. ܘܗܘ̈ܒܝܐ
    ܦܢܝ ܠܡܕܒܚܐ. ܘܐܢܫ
    ܡܢܐ ܕܚ̈ܛܝܐ. ܘܪܘܪܒܐ
    ܠܙܕܝ̈ܩܐ. ܘܢܒܝܝ ܠܒܘܠܡܘ(ܣ)
    ܚܒܝ̈ܒܐ ܒܣܒܘܠܬܐ.
    ܘܐܦܢ ܡܘ̈ܠܐ
    ܠܐ ܫܡܥܘܗܝ. ܘܥ̣ܒܕ
    ܘܐܒܥܕ ܐܝ̈ܩܪܐ ܣܓܝ̈ܐܐ
    ܘܐܦܘ̈ܕܐ ܡܢ ܐܢܫܐ. ܘܠܐ
    ܗܘܘ ܒܠܚܘܕ ܠܨ̈ܥܨܥܐ
    ܕܚܝܝܢ ܗܘܘ ܩܛ̣ܠ. ܘܐܦ
    ܠܡܝ̈ܬܘܗܝ ܕܐܢܫܝܢ ܕܡܝܬܘ
    ܐܦܩܘ ܡܢ ܩܒܪܐ
    ܘܐܡܪܘ ܐܢܘܢ ܒܙܘܪܐ.
    ܘܥ̣ܒܕܐ ܚܘ̈ܒܐ ܙܩܝܦ
    ܒܒܘܕ̈ܝܗܘܢ. ܘܠܡܩ̈ܢܫܐ
    ܐܩܝܡ ܒܙܘܪܐ. ܘܠܥܝ̈ܒ̣ܝܐ
    ܕ̈ܕ̈ܠܐ ܕܡܣܒܝܢ ܗܘܘ ܠܥܡܡ̣ܐ
    ܐܦ ܠܗܘܢ ܐܩܝܡ ܐܢܘܢ
    ܒܙܘܪܐ. ܘܠܥܡܡܐ ܕܡܫܬܡܥܐ
    ܗܘܘ ܠܗܘܢ ܩ̣ܕ ܚܝ̈ܝܗܝ.
    ܐܪܡܝ ܐܢܘܢ ܒܢܚܠܐ
    
    # Source page p0183 (printed 159)
    ܒܪܬ ܢܦܫܗ. ܘܐܬܬܙܝܥ
    ܒܠܚܘܕܘܗܝ ܒܝܘܡܘܗܝ
    ܒܙܒܢ ܙܒܢܐ. ܐܝܟ ܕܠܐ
    ܢܫܟܘܚ ܠܐܢܫ ܫܘܐܠܐ
    ܘܐ ܡܕܡ ܚܕܬܐ ܐܢܫܐ.
    ܘܡܠܘܗܝ ܝܘܡ̈ܝܐ ܕܚ̈ܛܗܘܗܝ.
    ܘܗܘ ܕܝܢ ܢܣܒ ܝܘܬܪܢܐ
    ܕܥܠܡ ܘܗܘ ܢܫܬܒܚ
    ܠܘܬ ܚܝܠܬܢܐ ܐܝܟ ܡܢ
    ܣܓܝ̈ܐܐ ܒܙܒܢܐ ܐܚܪܝܐ.
    ܘܡܬܒܥܐ ܕܝܢ ܕܢܘܕܐ
    ܘܡܛܠ ܐܝܠܝܢ ܕܕ̈ܡܝܢ ܠܗܘ
    ܬܪܥܝܬܐ ܘܬܬܥܝܪ
    ܬܫܒܘܚܬܐ ܡܩܘܝܬܐ
    ܘܗܠܝܢ ܕܐܬܥܒܕ ܠܡ ܡܢ
    ܩܕܝܡ. ܘܗܠܝܢ ܐܢܘܢ ܩܒ̈ܝܐ
    ܕܢܘܗܪܐ ܕܝܬܝܪ. ܡܢ ܩܒ̈ܝܐ
    ܕܚܫܘܟܐ ܪ̈ܘܪܒܐ ܕܚܫܘܟܐ.
    ܘܐܕܡ ܗܘ ܟܝܢܐ ܕܐܢܫܐ
    ܗܘܐ ܠܢܦܫܗ. ܘܐܢ ܡܕܡ
    ܕܠܝܬ ܠܗܘܢ ܒܩܘܫܬܐ
    ܒܡܠܐܟ̈ܐ ܩܕܡ ܚܝܠܬܢܐ.
    ܘܗܘܐ ܐܫܬܠܡܘܬ
    ܕܗܘ. ܘܐܘܪܒ ܒܩܘܫܬܐ
    ܡܫܬܒܗܪܝܢ ܒܥܒܕܝ̈ܗܘܢ
    ܘܩܢܘܡܐ ܩܕܡ ܦܪܘܩܗܘܢ
    ܘܐܬܪܚܩ. ܕܐܝܟܢܐ ܗܟܝܠ
    ܗܘܘ. ܣܒܪܐ ܕܡܘܠܟܢ
    ܚܕܐ ܡܕܝܢܬܐ. ܐܘ
    ܝܩܪܗ ܡܫܬܒܚܐ. ܐܠܐ
    ܡܢܕܝ ܗܘܘ ܠܥܕܢܗ ܟܠܢ.
    ܐܠܐ ܡܢ ܒܬܪ ܗܠܝܢ
    ܐܬܚܙܝܬ ܠܐܒܗܝܟܘܢ.
    ܐܝܠܝܢ ܕܐܬܒܨܪܘ ܒܝܬ
    ܒܡ̈ܢܘܬܐ. ܘܒܚܣܝܪܘ
    ܐܬܒܨܪܘ ܒܟܠ ܐܬܪ. ܡܛܠ
    ܕܟܡܐ ܕܐܢܘܢ ܡܫܠܡܢܐ
    ܘܐܬܥܒܕ ܚܕܬܐ. ܘܦܘܪܩܢܐ
    ܒܡܕ̈ܝܢܬܐ ܕܒܡ̈ܢܘܬܐ
    ܡܬܓܠܝܢ. ܘܒܣܘܓܐ ܕܐܝܟ
    ܕܒܣܘܓܐ ܕܐܝܩܪܐ ܕܡܢ
    ܐܒܗܘܗܝ ܕܟܕ ܡܢ
    ܐܢܘܢ. ܘܒܬܪܗܘܢ ܕܐܢܘܢ
    ܒܟܠ ܐܘ ܕܐܝܟ ܐܝܟ
    ܕܘܡܝܐ ܐܝܬ ܒܗ̇. ܐܠܐ
    ܐܡܘܪ ܡ̇ܟܝܟܐ ܕܒܟܠ ܗ̇ܘ
    ܕܣܝܡ ܗܘܐ ܠܥܕܢܗ.
    ܘܐܫܬܒܩܬ ܟܠ ܒܝܫܘ.
    ܘܐܒܕ̈ܢ ܐ̈ܘܪܚܬܐ ܒܒܝܫܘ
    ܩܕܡ ܡܕܝܢܬܐ. ܐܦ ܗܘ
    ܕܝܢ ܒܐܚܪ̈ܝܬܐ ܢܒܛܠ.
    ܘܠܝܬ ܐܢܫ ܡ̈ܢܝ ܐܘ ܩ̈ܒܘܪ—
    ܘܡ̈ܢܝ ܕܐܬܒܨܪ ܢܘܗܪܐ
    ܐܚܪܝܬܐ. ܐܘ ܗܘ ܕܐܬܬ
