    ܡܕܡ ܕܗܘܐ. ܐܠܐ ܕܝܢ
    ܢܝܕܥ ܗܘܐ. ܕܠܐ ܡܢܝ
    ܬܬܚܙܐ. ܘܠܐ ܢܫܬܘܕܥ
    ܪܝܫܝܘܬܐ ܕܗܘ ܕܬܩܢ
    ܡܢ ܡܪܝܫܝܬ. ܬܬܚܙܐ ܗܘܬ
    ܘܒܥܝܢܝ ܐܝܠܝܢ ܕܗܘ̈ܝ
    ܗܘܝ. ܘܡܬܬܡܗܝܢ ܚܝ̈ܢ
    ..ܒܒܪ̈ܝܐ ܠܐ ܙܥܝܪ ܕܐܝܬܝܗܘܢ.
    76 ܘܥܢܐ ܘܐܡܪ ܠܝ. ܡܛܘܠ
    ܕܐܦܝܣܬ ܠܝ ܕܐܚܘܝܟ
    ܕܐܘ ܗܘܐ ܐܝܟ
    ܕܥܒܝܕ. ܝܘܠܦܢܐ ܡܥܠܝܬ
    ܕܡܕܡܕܐ. ܕܐܝܟ ܡܕܡ
    ܕܥܬܝܕ ܠܡܗܘܐ ܥܕ ܡܢ ܒܬܪ ܀ f. 265,
    ܗܠܝܢ. ܡܛܠ ܕܒܙܒܢܐ ܕܐܬܬ v. a.
    ܡܢ ܐܕܡ ܐܬܒܪܝ. ܩܕܡ
    ܕܝܢ ܠܐ ܗܘܐ ܒܡܘܬܐ.
    ܐܠܐ ܒܚܛܗܐ ܕܒܬܪ. ܣܟ
    ܘܡܠܐ ܠܒܝܫܘܬ ܩܢܘܡܐ
    ܗܘܐ ܘܠܒܘܫܗ ܩܕܡܝܐ
    ܒܥܘܗܝ ܬܘ̈ܠܕܬܐ
    ܕܐܢܫܐ ܗܘܐ. ܘܫܘܘܕܝܐ
    ܕܐܒܝܠܐ ܢܣܒܘ ܛܘ̈ܪܐ.
    ܘܡܘܡܘܐ ܕܚܠܐ.
    ܘܡܘܪܡܘܪܐ ܕܣܒܪ
    ܘܡܚܝܠܐ ܕܬܘ̈ܝܗܐ ܕܐܝܕܐ
    ܡܢܝ ܝܘܡܝܢ ܐܬ. ܘܠܐܢܫܐ
    ܩܕܡܝܐ ܡܢ ܟܬܪ ܐܢܫܝܢ
    ܝܘܡ̈ܝܢ. ܗܢܘ ܗܟܝܠ
    ܚܘܫܒܐ ܗܢܝܢ ܐܠܐ
    ܘܐܦܝܣܝܢ ܥܡܡܐ ܟܡܐ
    ܕܡܫܟܚ ܐܢܬ. ܕܠܐܠܗܘܢ
    ܕܠܐ ܢܡܘܬܘܢ ܒܙܒܢܐ
    ܐܚܪܝܐ. ܐܠܐ ܝܠܦܘܢ
    ܀ ܕܢܐܚܘܢ ܒܙܒܢܐ ܐܚܪܝܐ܀
    77 ܘܐܙܠܬ ܐܢܐ ܒܪܘܟ ܡܢ
    ܬܡܢ ܘܐܬܝܬ ܕܝܢ
    ܥܡܐ. ܘܟܢܫܬ ܐܢܘܢ ܡܢ
    ܪܒܐ ܘܥܕܡܐ ܠܙܥܘܪܐ.
    ܘܐܡܪܬ ܠܗܘܢ. ܫܡܥܘ
    ܒ̈ܢܝ ܐܝܣܪܝܠ. ܚܙܘ ܕܟܡܐ
    ܐܫܬܚܪܬܘܢ ܡܢ ܬܪܥܣܪ
    ܫܒ̈ܛܐ ܕܐܝܣܪܝܠ. ܠܟܘܢ
    ܕܝܢ ܘܠܐܒܗܝܟܘܢ ܡܪܝܐ
    ܝܗ̣ܒ ܢܡܘܣܐ ܝܬܝܪ ܡܢ
    ܟܘܠܗܘܢ ܥܡܡ̈ܐ. ܘܡܛܠ
    ܕܥܒܪܘ ܐܚ̈ܝܟܘܢ ܦܘܩ̈ܕܢܘܗܝ
    ܕܡܪܝܡܐ. ܐܝܬܝ ܥܠܝܗܘܢ
    ܡܕܥܡ ܕܚܙܝܬܘܢ ܐܠܐ
    ܚܣܘ ܥܠ ܩܕܡ̈ܝܐ. ܐܠܐ
    ܐܦ ܠܐܚܪ
