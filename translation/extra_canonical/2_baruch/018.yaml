    ܐܢܫ ܕܝܢ ܐܠܘ ܠܐ
    ܩܪܒ ܢܡܘܣܐ. ܘܐܠܘ ܠܐ
    ܐܬܝܕܥܬ ܚܟܡܬܐ.
    ܗܘܝܐ ܕܝܢ ܡܛܠ ܕܡ̣ܢ
    ܚܕܐ ܟܪܣܐ ܢܦܩܢ ܗܘܝ
    ܐܦ ܡ̣ܢ ܚܕܐ ܢܫܬܘܝܢ.
    ܘܐܠܘ ܐܝܩܪܐ ܕܐܒܗ̈ܝܐ
    ܡܥܕܪ ܗܘܐ ܕܡܬܕܒܪܝܢ
    ܐܝܟ ܗܢܘܢ ܟܐܢܘܬܐ.
    ܐܠܐ ܐܦ ܗ̇ܘ ܬܘܒ
    ܕܥܒܕ ܡܬܕܒܪ. ܗܘܝ
    ܕܝܢ ܟܐܢܘܬܐ ܐܬܢܣܒܬ
    ܠܗܘܢ ܐܝܟܘܢ ܘܟܡܝܠܐ.
    ܒܐܘܪܚܐ ܣܓܝܐܬܐ.
    ܘܗ̇ܘ ܙܒܢܐ ܕܥܒܕ
    .. ܡܟܝܠܐ ܒܬܘܒܘܬܐ ܙܒܢܐ ܐܝܬܘܗܝ.
    16 ܘܒܢܝ̈ܐ ܘܐܒܗ̈ܝܐ. ܡܪܝܐ
    ܡܢܝܗܝ ܐܘ ܫ̈ܢܝܗܝ ܕܗܘܝ
    ܙܒܘ̈ܢܝ ܘܫ̈ܢܝܗܝ. ܘܡ̣ܢܘ
    ܡܫܟܚ ܕܢܗܘܐ ܡܟܝܠܐ
    ܢܝܚܐ ܗ̇ܘ ܕܥܬܝܕ ܠܗ
    17 .. ܡܫܘܚܬܐ. ܡ̣ܢ ܘ ܡܕܡ
    .v. c ܀ ܡܪܝܐ ܘܐܡܪ ܠܝ. ܠ
    ܬܫܒܘܚܬܐ ܘܬܘܕܝܬܐ
    ܚܢܢ. ܘܒܟܢ ܐܠܐ ܡܕܡ
    ܕܐܦܩܟ. ܠܐ ܡܟܝܠ ܢܗܘܐ
    ܠܗ ܣܘܪܚܢܐ ܕܙܒܢܐ
    ܕܚܕܘ ܐܠܐ ܐܬܝܬܝ
    ܡܘܬܪܐ. ܘܡܛܠ ܚܢܢ
    ܕܐܒܗܝ ܕܐܬܝܠܕܘ. ܡܢܗܘ.
    ܐܘ ܡܢܝ ܐܬܢܒܝ
    ܡܘܫܐ ܕܡܐ ܡܒܣܪܝܢ
    ܫ̈ܢܝܟ ܚܙܝ ܒܥܝܢܝܟ. ܘܡܛܠ
    ܕܐܬܝܗܒܬ ܠܡܘܬ
    ܕܠܥܠܡ ܐܝܬܝ ܢܣܘܒܘܬ
    ܒܪܢܫܐ ܕܒܣܘܪ. ܘܐܢܬܘܢ
    .. ܡܢܝ ܠܥܠܡ ܕܐܣܪܝܠ.܀
    18 ܘܥܢܝܬ ܘܐܡܪܬ. ܗܘܘ ܗܘ
    ܕܐܢܬ ܢܣܒܬ ܡܢ
    ܢܘܗܪܐ. ܘܫܠܝܛܐ ܐܢܬܝ
    ܕܬܕܥܝܘ ܒܗ. ܗܢܘܢ
    ܕܝܢ ܣܓܝ̈ܐܐ ܕܐܝܬ
    ܠܗܘܢ ܢܣܒܘ ܡܢ ܚܫܘܟܐ
    ܕܐܕܡ. ܘܠܐ ܐܬܒܣܣܘ
    19..ܒܢܘܗܪܐ ܕܡܘܫܐ.܀. ܘܥܢܐ
    ܘܐܡܪ ܠܝ. ܡܛܠ ܗܢܐ
    ܒܗܘ ܙܒܢܐ ܐܡܝܪ
