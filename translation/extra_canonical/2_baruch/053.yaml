  pages: [194, 193]
  text: |-
    # Source page p0194 (printed 148)
    ܒܐܪܥܐ ܚܙܝܬ ܕܐܢܫܝܢ
    ܗܘܘ ܡ̈ܝܬܐ. ܐܠܐ ܠܐ
    ܣܓܝܐܝܢ ܗܘܘ. ܘܡܢ ܒܬܪ
    ܗܠܝܢ ܬܘܒ ܚܙܝܬ ܐܘܟܡܐ.
    ܘܡܢ ܒܬܪ ܗܠܝܢ ܬܘܒ
    ܢܗܝܪܐ. ܘܬܘܒ ܐܘܟܡܐ.
    ܘܬܘܒ ܢܗܝܪܐ. ܘܕܐ
    ܕܝܢ ܗܘܐ ܥܕܡܐ
    ܠܬܪ̈ܥܣܪܐ ܙܒܢ̈ܝܢ. ܐܠܐ
    ܐܘܟܡܐ ܣܓܝ̈ܐܝܢ
    ܗܘܘ ܒܟܠܗܝܢ ܡܢ ܢܗܝܪܐ.
    ܀ ܘܗܘܐ ܒܫܘܠܡܗ ܕܥܢܢܐ
    ܘܗܘܐ ܐܟܡܐ ܡ̈ܝܐ
    ܐܘܟܡܐ ܘܚܫܘܟܝܢ
    ܕܗܘܘ ܝܬܝܪ ܡܢ ܟܠܗܘܢ
    ܡ̈ܝܐ. ܗ̇ܢܘܢ ܩܕ̈ܡܝܐ
    ܕܗܘܘ. ܘܐܙܠܘ ܡܚܠܛܐ
    ܗܘܘ ܒܗܘܢ. ܘܐܝܟܐ
    ܕܢܚ̈ܬܝܢ ܗܘܘ ܡ̈ܝܐ
    ܗܢܘܢ ܥܒܕܝܢ ܗܘܘ ܚܒܠܐ
    ܘܐܒܕܢܐ. ܘܚܙܝܬ ܡܢ
    ܒܬܪ ܗܠܝܢ. ܠܗܘ̇ ܒܪܩܐ
    ܕܚܙܝܬ ܬܘܒ ܒܪܝܫܗ
    ܕܥܢܢܐ ܕܐܚܕܗ̇ ܘܐܬܚ
    ܐܢܫܐ. ܘܬܗܘܐ ܒܝܘܡܝ
    ܐܘ̈ܠܨܢܐ. ܐܢܫܐ
    ܕܢܚܙܘܢ ܡܢܝ ܐܝܟܢܐ
    ܘܢܥܒܪܘܢ. ܘܐܚܪ̈ܢܐ ܗܘܘ
    ܥܒܕܝ̈ܗܘܢ ܐܢܫܐ. ܘܐܫܬܡܥܬ
    ܥܠܝܗܘܢ ܘܚܙܝܬ ܡܢ ܒܬܪ
    ܗܠܝܢ. ܘܗܘܐ ܬܪܥܣܪ̈ܝ
    ܢܘܗܪ̈ܐ ܫܠܡܝܢ ܗܘܘ ܡܢ
    ܝܡܐ. ܘܚܕܝܕܝܢ ܗܘܘ
    ܠܗ ܠܗܘ ܟܪܘܙ ܘܡܫܬܒܚ
    ܗܘܘ ܠܗ. ܘܐܢܐ ܡܢ
    ܕܚܠܬܝ ܐܬܬܥܝܪܬ.܀.
    54 ܝܕ ܨܠܘܬܐ ܕܒܪܘܟ ܒܝܘܡ
    ܘܒܥܝܬ ܡܢ ܚܝܠܬܢܐ
    ܘܐܡܪܬ. ܐܢܬ ܡܪܝܐ
    ܒܠܚܘܕܝܟ ܡܣܝܡ ܐܢܬ
    ܝܕܥܐ ܐܢܬ ܪ̈ܘܚܘܗܝ
    ܕܥܠܡܐ. ܘܩܕܡ ܕܢܬܒܪܐ
    ܓܒܠܬ ܡܢܘ ܐܢܬ
    ܒܡܠܬܟ. ܘܒܘܩܥܠܐ
    ܫܦܝܪ̈ܝܗܘܢ ܕܒܡܘ̈ܬܘܗܝ
    ܕܐܢܫܐ ܡܣܬܡܟܐ ܪ̈ܡܘܗܝ
    ܕܒܪܐ. ܘܣܘܦܘܗܝ ܝ̈ܕܝܥܐ
    
    # Source page p0193 (printed 149)
    ܥܒܕ ܐܢܬ. ܗܘ ܕܒܫܘܩܪ
    ܐܝܟ ܪ̈ܘܚܐ ܕܐܢܫ
    ܥܒܝܕ. ܘܐܢܫ ܒܥܩܪ
    ܠܡܒܥܐ ܡܫܟܚ. ܗܘ
    ܕܓܠܐ ܠܐܢܫܝܢ ܕܕܚܠܝܢ
    ܠܗ ܡܕܡ ܕܥܬܝܕ ܠܡܗܘܐ.
    ܕܡܢ ܪܘܡܐ ܢܒܝܐ
    ܐܢܘܢ. ܡܘܕܐ ܓܝܪ ܐܢܐ
    ܠܐܢܫܝܢ ܕܠܐ ܝܕܥܝܢ.
    ܘܐܢܐ ܣܝܡܐ ܠܐܢܫܝܢ
    ܕܠܐ ܡܦܣܝܢ. ܘܡܢܗܪ
    ܚܫܘ̈ܟܐ ܘܓܠܐ ܡܣܬܪ̈ܐ
    ܠܐܢܫܝܢ ܕܕܠܐ ܡܘܡ
    ܐܢܘܢ. ܐܢܫܝܢ ܕܡܬܡܢܝܢ
    ܐܫܬܒܗܪܘ ܥܕ ܡܢܘܗܝ.
    ܐܠܐ ܚܙܝܬ ܠܥܒܕܝ
    ܚܙܘܐ ܗܢܐ. ܓܠܐ ܠܝ
    ܐܦ ܦܘܫܩܗ. ܝܕܥ ܐܢܐ
    ܓܝܪ ܕܓܠܐ ܐܢܬ ܠܝ ܕܒܥܬ
    ܡܢܝ ܕܣܒܪ ܦܘܪܩܢ.
    ܘܠܐ ܡܕܡ ܕܒܥܝܬ ܬܓܢܝܙ
    ܠܝ. ܘܐܬܓܠܝ ܥܠܝ.
    ܘܠܐ ܐܬܟܚܕ. ܘܐ ܡܢ
    ܐܢܫܝܢ ܪ̈ܘܪܒܐ ܙܩܝܦ ܠܝ
    ܬܫܒܘܚܬܐ ܘܡܘܟܠܐ
    ܦܘ̈ܩܕܢܐ܆ ܘܡ̈ܢܝ ܕܐܢܫܐ
    ܩ̈ܠܝܠ. ܐܦ ܠܐ ܗܟܝܠ
    ܡܫܟܚ ܐܢܐ ܕܐܦܪܥܟ
    ܬܫܒܘܚܬܐ. ܘܐ ܕܐܫܒܚܟ
    ܐܝܟ ܕܙܕܩ. ܘܠܐ ܬܫܒܘܚܬܐ
    ܡܫܟܚ ܐܢܐ ܕܐܡܪ.
    ܘܐ ܕܐܡܪ ܕܐܘܕܐ
    ܕܛܝܒܘܬܟ ܡܢܝ ܝܗ
    ܐܢܐ ܒܒܥܘܬܝ. ܘܐ ܡܢܐ
    ܚܫܝܒ ܐܢܐ ܒܝܠܝܕܝ
    ܕܡܐܬܝܢ ܡܢܝ ܕܡܫܒܚ
    ܗܠܝܢ ܟܘܠܗܝܢ ܬܕܡܘܪ̈ܬܐ
    ܡܢ ܡܕܡܕܐ. ܘܣܒܪܬܐ
    ܕܠܐ ܡܣܬܝܟܢ ܡܢ ܗ̇ܘ
    ܕܒܪܝܬ. ܝܘ ܡܢܐ ܠܡܟܝ
    ܒܝܕܥܬܐ. ܝܘ ܬܘܒ
    ܒܢܦܫܐ ܝܕܝܥܬܐ. ܐܢܐ ܕܝܢ
    ܠܐ ܐܫܬܘܝ ܕܐܫܒܚ
    ܒܚܝܠܬܢܘܬܐ. ܐܠܐ ܒܡܠܐ
    ܕܡܘܟܟܐ ܐܬܐܡܪ
    ܬܕܡܘܪ̈ܬܟ. ܘܒܥܕܢ ܝܙ
    ܡܘܠܕܟ ܒܬܕܡܘܪ̈ܬܟ
    ܐܬܗܪ. ܘܐ ܡܢܘ
    ܡܕܪܟ ܡܚܫܒܬܟ
    ܒܕܡܘܬܐ. ܕܚܝܐ ܐܢܬ
