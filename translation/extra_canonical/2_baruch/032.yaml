  text: |-
    # Source page p0210 (printed 132)
    ܘܚܕܐ ܡܫܟܬܐ ܬܥܒܕ
    ܐܠܦ ܣܛܪ̈ܝܢ. ܘܚܕ ܣܛܪܐ
    ܢܥܒܕ ܐܠܦ ܟܢܫ̈ܝܢ. ܘܚܕܐ
    ܟܢܫܬܐ ܬܥܒܕ ܩܘܪܐ
    ܕܣܡܝܐ. ܘܐܝܠܝܢ ܕܦܫ̣ܘ
    ܢܬܒܣܡܘܢ. ܘܬܘܒ ܕܝܢ
    ܢܚܙܘܢ ܬܕܡܘܪܬܐ ܒܟܠ
    ܝܘܡ. ܘܚܝ̈ܐ ܓܝܪ ܢܦܩܘܢ
    ܡܢ ܡܕܒܚܐ. ܠܡܢܕܥܘ ܟܘܠ
    ܕܦܪ̈ܚܐ ܕܚܝܐ ܕܦܪ̈ܚܐ
    ܕܣܦܝܪܝܢ. ܘܒܝܘܡܬܗܘܢ
    ܕܗܢܘܢ. ܟܢ̈ܢܐ ܕ̈ܣܓܝ
    ܛܠܠܐ ܕܐܣܝܘܬܐ. ܘܢܚܬܘܢ
    ܡܢ ܡܪܘܡܐ ܙܒܢܐ ܢܚܝܐ
    ܘܬܘܒ ܡܢ ܥܠܠܐ ܕܕ̈ܡܥܐ
    ܕܡܢܝܐ. ܘܢܬܡܠܟܘܢ ܡܥܝܗ
    ܒܗܠܝܢ ܫܢܝ̈ܐ. ܡܛܠ ܕܗ̣ܢܘܢ
    ܐܢܘܢ ܕܡܛܝܘ ܠܫܘܠܡܗ
    30 ܕܙܒܢܐ.܀. ܘܗܘܐ ܡܢ ܒܬܪ
    ܗܠܝܢ ܐܡܠܠ ܕܐܡܠܠ
    ܙܒܢܐ ܕܡܐܬܝܬܗ ܕܡܫܝܚܐ.
    ܘܢܬܦܣܩ
    ܕܗܘܘ ܬܬܛܫܐ ܡܢܝ
    ܕܢܦܩܐ ܕܙܩܝܦܐ ܘܢܦܩܝ.
    ܘܬܬܚܙܐ ܗܝ ܕܐܬܟܣܝܬ
    ܕܢܦܩܐ ܙܥܝܪܐ ܒܚܕ
    ܡܢܗ̇. ܕܚܕܐ ܬܬܒܥܝܬ.
    ܘܬܚܕܝ ܩܕܡܝܬ ܐ
    ܘܐܚܪܝܬܐ ܠܐ ܬܬܬܥܝܩ.
    ܝܕܥ ܐܢܐ ܕܡܛܐ ܙܒܢܐ.
    ܕܐܡܝܪ ܒܠܒܘܗܝ. ܕܡܫܬܡܥܘܗܝ
    ܕܒܪܝ. ܢܦܩܬܗܘܢ ܕܝܢ
    ܕ̈ܢܒܝܐ ܡܢ ܚܝ̈ܝܗܝ ܡܠܘܗܝ
    ܘܠܒܝ. ܘܝܕܥ ܐܢܐ ܕܐܝܬ
    ܢܦܫܝ. ܝܕܥ ܐܢܐ ܕܡܛܐ
    ܬܫܡܫܬܗܘܢ ܕܐܒ̈ܗܝ
    31.. ܐܡܪܠܗܘܢ.܀.܀.܀.܀.܀.
    ܗܘܘ ܡܢ ܒܬܪ ܗܠܝܢ܆
    ܐܙܠܬ ܐܢܐ ܠܘܬ ܥܡܐ
    ܘܐܡܪܬ ܠܗܘܢ. ܟܢܫܘ
    ܠܝ ܣܒܝܟܘܢ ܘܒܢܝ̈ܟܘܢ.
    ܘܐܡܪ ܒܥܘ ܡܠܝ.
    ܘܐܬܟܢܫܘ ܟܠܗܘܢ
    ܀ ܒܚܠܬܐ ܕܩܕܪܘܢ. ܘܒܥܝܬ
    ܘܐܡܪܬ ܠܗܘܢ.
