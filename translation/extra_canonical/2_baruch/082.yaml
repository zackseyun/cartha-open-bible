  text: |-
    # Source page p0166 (printed 176)
    ܢܫܡܥ ܘܐܥܒܕ ܘܐܼܡܪ.
    ܕܠ ܐܠܥܙܪ ܢܡܘܣܐ
    45 ܬܬܒܼܪܘ. ܘܠܐ
    ܬܬܪܚܩܘܢ ܡܢܠܝܟܘܢ.
    ܘܐܦ ܐܝܪܡܝܐ ܐܡ̇ܪ
    ܗܘܐ ܠܒܘܢ ܟܕ ܐܝܬܝܟܘܢ
    ܘܐܝܬܘܗܝ ܙܒܢܐ ܕܐܒܘܟ
    50 ܝܡ̈ܬܐ ܒܡܕܒܪܐ. ܘܡܢ
    ܒܬܪ ܡܘܬܗ ܕܝܫܘܥ
    ܐܢܝܢ ܡܢܟܘܢ ܘܡܘܫܐ
    ܗܘܐ ܡܢܝܟܘܢ ܐܝܟܢܐ
    ܕܫ̈ܒ̣ܛܝܟܘܢ ܗ̈ܘܝ ܐܡܝܢ.
    55 ܘܗܘܐ ܡܘܫܐ ܐܡ̇ܪ
    ܗܘܐ ܠܒܘܢ ܡܢ ܩܕܝܡ
    ܕܠܐ ܢܓܕܫܟܘܢ. ܘܗܘܐ
    ܢܓܕܫܟܘܢ ܝܕܥܘܗܝ ܐܝܟ
    ܢܡܘܣܐ. ܐܦ ܐܢܐ ܗܐ
    60 ܐܡ̇ܪ ܐܢܐ ܠܒܘܢ ܡܢ
    ܒܬܪ ܕܚܙܝܬܘܢ. ܕܠܐ
    ܬܛܥܘܢ. ܠܐܢܫܝܢ ܕܐܬܘܪ
    ܠܟܘܢ. ܬܣܒܘܢ ܡܢ
    ܚܝܠܬܐ ܡܠܟܘܬܐ ܕܩܝܡܐ
    65 ܘܠܡܕܢ ܠܟܘܢ. ܬܘܒ ܕܝܢ
    ܝܕܥ ܐܢܬܘܢ ܒܢ̈ܝ ܠܡܐ
    ܘܠܟܘܢ ܠܣܘܪ̈ܩܐ. ܕܐܬܘܘܟ
    ܠܡܕܝܢ ܦܘܩ̈ܕܢܘܗܝ
    ܕܚܝܠܬܐ. ܘܕܐܢܫܝܢ ܐܦ
    70 ܠܡܐ ܢܗܘܐ ܠܡܐ ܡܦܩ
    ܒܪܘܚܐ ܩܕܡ ܗܘ̇ ܕܡܕܐܢܘܬ.
    ܘܬܘܒܘܢ ܠܡܘܕܝܢ
    ܠܨܒܝܢܗ ܘܠܢܡܘܣܗ. ܐܦ
    ܠܐܢܫܐ ܩܕܝܫܬܐ. ܘܠܐܢ̈ܫܝܢ
    ܘܠܥܕ̈ܬܐ ܘܠܡ̈ܩܕܫܘܗܝ.
    75 ܘܠܥܕ̈ܒܕܐ ܘܠܫ̈ܦܝܪܐ ܠܐ
    ܬܛܥܘܢ. ܘܐܢܡܠܟܘ ܐܘ̣ܕܐ
    ܐܢܬܘܢ ܫܘܒ̈ܠܡܢܘܬܗ
    
    # Source page p0165 (printed 177)
    ܕܢܫܬܘܙܒ ܠܒܥܠܕܒܒܝ ܡܢ
    ܒܥܠܕܒܒܝ. ܐܝܟ ܕܐܦ ܠܟܘܢ
    ܐܫܠܡܬ ܠܟܘܢ ܕܩܕܡܝܟܘܢ.
    ܘܒܡܥܒܪܟܘܢ ܗܘܝܬܘܢ ܩ̈ܠܝܠ
    ܘܡܕܥܝܟܘܢ ܚܦܝܛܐܝܬ ܡܢ
    ܟܠܗ ܢܦܫܟܘܢ. ܐܝܟ ܕܬܬܥܒܪ
    ܠܟܘܢ ܚܒܠܬܐ. ܘܠܐ ܢܚܫܟܟ
    ܗܘܘܬܐ ܕܚܫܘ̈ܟܐ. ܐܠܐ
    ܢܬܕܟܪ ܟܠܢܫ ܐܘܪܚܐ ܕܩܕܡܘܗܝ.
    ܐܢ ܓܝܪ ܐܝܟ ܗ̄ܘ ܕܐܝܬ
    ܕܚ̈ܛܗܘܗܝ ܠܐ ܢܨܘܒ
    ܗܝ ܠܝܢ ܠܟܠܢ ܝܥܪ̈ܝܐ ܆ ܘܬܘܒ
    ܕܝܢ ܗܘܝܬܘܢ ܝܕܥܝܢ. ܕܡܐܟܘܠ
    ܩܕܡ̈ܝܐ ܘܒܝܪ̈ܐ ܕܡܝ̈ܐ
    ܩܕܝܡ ܐܝܬ ܗܘܐ ܠܗܘܢ
    ܠܐܒ̈ܗܝܟ ܡܥܒܪ̈ܢܐ ܕܕܢ̈ܩܐ.
    ܘܠܒ̈ܝܐ ܘܚܩ̈ܠܐ. ܐܠܐ ܕܝܢ
    ܒܘܿܪ ܗ݀ܘܝܢ ܒܐܝ̈ܕܝܗܘܢ ܘܢܗ̣ܘܘܢ
    ܡܥܕܪ̈ܢܝܢ ܗܘܘ ܠܝܢ ܡܕܐ
    ܕܚ̈ܛܝܢ ܗ݀ܘܝܢ. ܘܒܥܝܢ ܗܘܘ
    ܥܠܝܢ ܡܢ ܗ݀ܘ ܕܒܪܢ. ܡܛܠ
    ܕܐܡܝܠܝܢ ܗܘܘ 90 ܠܐ
    ܡ̈ܒܕܝܗܘܢ. ܘܡܥܬܕܐ ܝܘܡ̈ܬܐ
    ܗܘܘ ܠܗܘܢ. ܘܡܚܣܢ
    ܗܘܘ ܥܠܝܢ. ܘܩܐܡܝܢ
    ܕܢܩ̈ܕܐ ܕܐܒܗܘܬܢ ܘܢܒ̈ܝܐ
    ܚܫܒܘ. ܐܦ ܚܢܢ ܡܢ ܕܐܒܕܢ
    ܢܦܫܢ. ܘܕܗܘܢ ܐܫܬܒܩܬ
    ܡܢܢ. ܘܠܝܬ ܠܢ ܡܕܡ
    ܘܩܐ ܐܠܐ ܐܢ ܚܝܠܬܢܐ
    ܘܢܡܘܣܗ. ܐܢ ܗܟܝܠ
    ܬܬܪܨ ܡܕܥܝܟ ܠܫܦܝܪ̈ܬܐ
    ܢܦܢܝܟܘܢ ܒܥܘܕܪܢ ܕܐܗܒܝܢ
    ܚܢܢ ܡܒ̈ܩܐ ܣ̈ܓܝܐܐ. ܡܕܡ
