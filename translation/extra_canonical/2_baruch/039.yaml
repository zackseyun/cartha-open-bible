    38 ܘܥܢܐ ܘܐܡܪ ܠܝ. ܡܢܐ
    ܡܢܝ. ܐܢܬ ܗܘ ܒܒܥܘܬܟ
    ܡܥܕܪ ܐܢܬ ܠܐܝܠܝܢ
    ܕܒܣܘܟܠܐ ܡܬܕܒܪܝܢ.
    ܢܡܘܣܝ ܚ̈ܝܐ ܗܘ.
    ܘܚܟܡܬܝ ܬܪܝܨܘܬܐ
    ܗܝ. ܐܪܙ ܕܒܝܢܝ ܘܒܝܢ\\
    ܦܘܫܩܗ ܕܚܙܘܐ ܗܢܐ.
    ܐܢܬ ܓܝܪ ܚܙܝܬ ܐܝܟ ܕܢܦܩܬ
    ܒܒܥܘܬܟ ܒܢܡܘܣܝ ܡܬܬܦܝܣ
    ܗܘܐ. ܘܡܢ ܝܘ̈ܡܝ ܡܢ
    .. ܚܟܡܬܝ ܠܐ ܐܬܢܣܝܬ. ܆.
    39 ܘܥܢܐ ܘܐܡܪ ܠܝ. ܒܪܡ.
    ܗܢܘ ܦܘܫܩܗ ܕܚܙܘܐ
    ܕܚܙܝܬ. ܐܝܟ ܕܚܙܝܬ ܥܒ̈ܐ
    ܣܓܝ̈ܐܐ ܗ̇ܘ ܕܚܪܒܝܢ
    ܗܘܘ ܠܗ ܠܕܒܪܐ ܪ̈ܒܐ
    ܘܩܫܝܐ. ܗܕܐ ܗܝ ܡܠܟܘܬܐ.
    ܗܝ ܝܘ̈ܡܬܐ ܬܩܘܡ.
    ܘܬܚܒܠ ܗܕܐ ܡܠܟܘܬܐ
    ܗܝ ܕܡܟܝ ܚܒܠܬ ܠܨܗܝܘܢ
    ܘܬܫܬܥܒܕ ܠܗ̇ܘ ܕܐܬܐ
    ܒܬܪܗ. ܘܗܝ ܕܝܢ
    ܘܒܢܝ ܝܬܝܪ ܡܢ ܕܠܝ
    ܕܗ̈ܘܝ ܩܕܡܝܗ̇. ܘܡܕܒܪܐ
    ܙܒܢܐ ܣܓܝ̈ܐܐ. ܐܝܟ ܥܒ̈ܐ
    ܕܦܩܥܬܐ. ܘܬܚܙܐ ܙܒ̈ܢܐ.
    ܘܬܬܩܢ ܝܬܝܪ ܡܢ
    ܐܪ̈ܙܐ ܕܠܒܢܢ. ܘܬܬܩܝܡ
    ܒܗ̇ ܫܪܪܐ. ܘܬܥܪܘܩ
    ܠܘܬܗ̇ ܟܘܠܗܘܢ ܐܝܠܝܢ
    ܕܡܟܬܡܝܢ ܒܥܘܠܐ. ܐܝܟ
    ܕܥܪܩܝܢ ܚܝܘ̈ܬܐ ܟܝ̈ܢܝܬܐ
    ܘܚ̈ܠܒܝ ܒܥܒܐ. ܘܢܗܘܐ
    ܀ ܡܕܐ ܕܡ̣ܢ ܙܒܢܐ ܕܫܘܠܡܗ̇
    ܕܐܦܠܐ ܗܝ̣ܕܝܢ ܬܬܓܠܐ
    ܪܝܫܝܬܗ ܕܡܫܝܚܝ. ܗܝ
    ܕܕܡܝܐ ܠܡܒܘܥܐ ܘܠܓܦܢ
    ܘܡܐ ܕܐܬܓܠܝܬ ܬܥܩܘܪ
    ܗܝܘܬܐ ܕܡܢܗ̇. ܘܗ̇ܝ
    ܕܝܬܝܬ ܐܪܙܐ ܕܪܡܐ ܗܘ
    ܕܐܫܬܚܪ ܡܢ ܗ̇ܘ ܥܒܐ.
    ܘܘܢܚܐ ܗ̣ܘ ܕܡ̣ܠܬܐ
    ܥܡܗ ܬܓܙ ܡ̈ܠܐ
    ܗܠܝܢ ܕܫ̣ܡܥܬ. ܘܐ̣ܢ ܗܘ
