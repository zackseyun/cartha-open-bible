  text: |-
    # Source page p0220 (printed 122)
    ܠܒܗ. ܘܐܬܬ ܣܘܟܠܗ
    .. ܦܩ̈ܕܝ ܒܣܝܡܘܬܐ ܒܡ̇ܕܥܝ.
    14 ܘܒܥܝܬ ܐܘܪܚܐ. ܐܘ
    ܘܐܬܒܥܝܬ ܕܡܘܗܝ
    ܕܐܒܕܐ. ܘܡܕܡ ܕܥܬܝܕ
    ܕܢܗܘܐ ܡܢ ܒܬܪ ܗܠܝܢ.
    ܘܐܡܪܬ ܒܝ ܒܡܚ̈ܫܒܬܝ
    ܐܢ̈ܐ ܦܘܪܥܢܐ ܕܐܬܡܠܝ
    ܡܢܝ. ܘܗܘ ܚܝ̈ܝܐ ܐܢ̈ܐ
    ܕܣܓܝܐܝܢ ܐܢܘܢ ܐܝܠܝܢ
    ܕܚܛܘ. ܘܒܡܕܥܝܗܘܢ
    ܚܝܘ. ܘܐܢܬ ܡܢ ܒܥܡܐ.
    ܘܡܥܠܠ ܗܘ ܕܝܢ ܒܡ̈ܫܪܝ
    ܡܫܬܚܪܝܢ ܒܗܘܢ ܙܒ̈ܢܐ.
    ܗ̇ܢܘܢ ܕܒܗܘܢ ܡܬܬܡܝܡ
    ܡ̇ܠܐ ܐܝܠܝܢ ܕܐܡܝܪ̈ܢ.
    ܘܡܢܐ ܓܝܪ ܝܘܬܪܢܐ
    ܐܝܬ ܒܗܘ ܐܘ ܡܢܐ
    ܕܒܝܫ ܡܢ ܗܠܝܢ ܕܚܙܝܢ
    ܕܨ̈ܒܝܢ ܡܣܟܢܝܢ ܕܢܚܙܘܢ.
    ܗܘ ܕܝܢ ܐܡܠܠ ܩܕܡܝܟ
    ܡܢܐ ܝܬܝܪ ܗ̇ܢܘܢ ܕܝܕܥܘ
    ܩܕܡܝܟ ܘܠܐ ܐܢܛܪܘ
    ܀ ܒܣ
    ܀ܝ܀ ܗܘܘ. ܘܐܬܚܙܝܘ ܠܝ
    ܐܦܝܟ. ܘܐܘ ܐܬܚܫܒܬ.
    ܘܐܦܠܐ ܡܟܝܟܘܬܗܘܢ
    ܢܚܙܘ ܐܠܐ ܨܒܝܢܝ. ܘܠܐ
    ܐܚܙܐ ܙܥܘܪܘ ܡܘܠܕܟܘܢ
    ܗܘܐ ܠܘܬ ܠܒܝܟܘܢ
    ܕܡܬܒܥܝܢ. ܕܐܝܠܝܢ ܕܦܠܚܘ
    ܢܒ̈ܝܐ ܢܫܬܟܚ ܠܗܘܢ. ܘܠܐ
    ܡܬܒܥܝܢ ܕܒܥ̈ܝܟܝ ܥܡܠܐ
    ܕܛܒܬܐ. ܐܠܐ ܡܢܘ ܡܪܝܐ
    ܡܢܝ ܡܕܡ ܠܘ ܠܝܕܝܥܘ.
    ܐܘ ܡܢܘ ܡܟܡܟ ܠܡܘܟܡܘ
    ܕܐܘܪܚܟ. ܐܘ ܡܢܘ
    ܡܫܟܚ ܠܐ ܝܘܠܦܢܘ
    ܕܡܠܟܟ. ܐܘ ܡܢܘ ܡܫܟܚ
    ܡܫܟܚ ܠܐ ܬܪܥܝܬܟ
    ܕܠܐ ܡܬܕܪܟܐ. ܐܘ ܡܢܘ
    ܡܡܠܠ ܡܢ ܪ̈ܥܝܢܐ
    ܐܢܫܝܢ ܢܫܐ ܐܘ ܫܘܠܡܐ
    ܕܚܟܡܬܟ. ܡܛܠ ܕܝܢ
    ܐܬܡܢܢ ܠܡܒܠܐ ܐܢܫܐ
    ܥܕ ܕܗܒܠܐ ܣܒܘ ܕܠܐ
    ܡܢ ܠܒܐ ܘܗܘ ܪܒܝ.
    ܗܘܝܘ ܗܘ ܡܢܗܘܢ ܕܒܢ̈
