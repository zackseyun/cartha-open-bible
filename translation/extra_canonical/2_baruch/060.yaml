    ܕܠܐ ܚܿܫܝܢ ܗܘܘ ܒܡܘܬܗܘܢ.
    ܝܬܝܪ ܡܢ ܡܠܝܘܬ ܫ̈ܢܝܐ
    ܡܫܬܒܚܝܢ ܗܘܘ ܘܒܚܕܘܬܐ
