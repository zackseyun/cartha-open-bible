  pages: [167, 166]
  text: |-
    # Source page p0167 (printed 175)
    ܠܥܦܪܐ ܝܠܝܕ. ܘܠܐ ܩܢܝܢ
    ܕܬܘܒ ܢܗܘܐ ܗܘܦܟ
    ܠܡܘܬܐ ܒܥܝܘܗܝ. ܘܠܐ
    ܚܛܘ̈ܦܝ ܕܐܓܪܐ ܢܗܘܐ
    ܐܦܩܝܢ ܠܡܘܬܐ ܕܠܐ
    ܒܙܒܢܗܘܢ. ܘܡܘܬܐ ܕܐܓܪܐ
    ܕܚ̈ܫܐ ܢܗܘܐ ܥܒܝܕܐ.
    ܕܢܬܢܣܒ. ܘܠܐ ܨܒܘܬܐ
    ܕܚܕܘܬܐ ܢܗܘܐ
    ܢܗܘܐ ܠܡܒܣܡܘ!
    ܕܡ̈ܫܢܝܐ ܢܗܘܐ ܗܘܦܟ
    ܥܒܝܕܐ ܡܠܚܡܘܬܐ. ܘܠܐ
    ܢܫܬܡܥ ܗܘܦܟ
    ܠܚ̈ܛܝܐ ܒܫܝܘܠ. ܟܕ
    ܗܘܟܝܠ ܗܠܝܢ ܟܠܗܝܢ ܬܗ̈ܘܝܢ
    ܗܫܐ ܣܒܪ ܐܢܬ ܕܠܐ
    ܡܬܬܒܥܝܢ. ܝܘܡܢܐ ܚܕ
    ܕܗܘܟܝܠ ܥܡܘܪ̈ܐ ܕܐܪܥܐ.
    ܐܢ ܗܘܟܝܠ ܐܘ̈ܕܥܬܗܘܢ
    ܠܡ ܚܝܐ ܐܢܘܢ ܐܫܪܐ
    ܓܝܪ ܕܐܝܬܝܗ ܐܠܦܘ
    ܫܘܩܪܝܗ ܚܝܒܘܬܐ
    ܕܐܝܬܝܗܘܢ. ܘܐܣܝܡ
    ܫܘܡܠܝܗ ܡܛܠ ܕܡܢ ܫܘܩܪܐ
    ܐܬܝܠܕܘ ܡܢ ܩܕܝܡ ܕܐܡܘܬ.
    ܘܐܡܪܬ ܕܒܥܝܢ ܡܣܬܒܪܘ
    ܗܘܘ ܒܒܝܫ ܡܘܫܐ
    
    # Source page p0166 (printed 176)
    ܢܫܡܥ ܘܐܥܒܕ ܘܐܼܡܪ.
    ܕܠ ܐܠܥܙܪ ܢܡܘܣܐ
    45 ܬܬܒܼܪܘ. ܘܠܐ
    ܬܬܪܚܩܘܢ ܡܢܠܝܟܘܢ.
    ܘܐܦ ܐܝܪܡܝܐ ܐܡ̇ܪ
    ܗܘܐ ܠܒܘܢ ܟܕ ܐܝܬܝܟܘܢ
    ܘܐܝܬܘܗܝ ܙܒܢܐ ܕܐܒܘܟ
    50 ܝܡ̈ܬܐ ܒܡܕܒܪܐ. ܘܡܢ
    ܒܬܪ ܡܘܬܗ ܕܝܫܘܥ
    ܐܢܝܢ ܡܢܟܘܢ ܘܡܘܫܐ
    ܗܘܐ ܡܢܝܟܘܢ ܐܝܟܢܐ
    ܕܫ̈ܒ̣ܛܝܟܘܢ ܗ̈ܘܝ ܐܡܝܢ.
    55 ܘܗܘܐ ܡܘܫܐ ܐܡ̇ܪ
    ܗܘܐ ܠܒܘܢ ܡܢ ܩܕܝܡ
    ܕܠܐ ܢܓܕܫܟܘܢ. ܘܗܘܐ
    ܢܓܕܫܟܘܢ ܝܕܥܘܗܝ ܐܝܟ
    ܢܡܘܣܐ. ܐܦ ܐܢܐ ܗܐ
    60 ܐܡ̇ܪ ܐܢܐ ܠܒܘܢ ܡܢ
    ܒܬܪ ܕܚܙܝܬܘܢ. ܕܠܐ
    ܬܛܥܘܢ. ܠܐܢܫܝܢ ܕܐܬܘܪ
    ܠܟܘܢ. ܬܣܒܘܢ ܡܢ
    ܚܝܠܬܐ ܡܠܟܘܬܐ ܕܩܝܡܐ
    65 ܘܠܡܕܢ ܠܟܘܢ. ܬܘܒ ܕܝܢ
    ܝܕܥ ܐܢܬܘܢ ܒܢ̈ܝ ܠܡܐ
    ܘܠܟܘܢ ܠܣܘܪ̈ܩܐ. ܕܐܬܘܘܟ
    ܠܡܕܝܢ ܦܘܩ̈ܕܢܘܗܝ
    ܕܚܝܠܬܐ. ܘܕܐܢܫܝܢ ܐܦ
    70 ܠܡܐ ܢܗܘܐ ܠܡܐ ܡܦܩ
    ܒܪܘܚܐ ܩܕܡ ܗܘ̇ ܕܡܕܐܢܘܬ.
    ܘܬܘܒܘܢ ܠܡܘܕܝܢ
    ܠܨܒܝܢܗ ܘܠܢܡܘܣܗ. ܐܦ
    ܠܐܢܫܐ ܩܕܝܫܬܐ. ܘܠܐܢ̈ܫܝܢ
    ܘܠܥܕ̈ܬܐ ܘܠܡ̈ܩܕܫܘܗܝ.
    75 ܘܠܥܕ̈ܒܕܐ ܘܠܫ̈ܦܝܪܐ ܠܐ
    ܬܛܥܘܢ. ܘܐܢܡܠܟܘ ܐܘ̣ܕܐ
    ܐܢܬܘܢ ܫܘܒ̈ܠܡܢܘܬܗ
