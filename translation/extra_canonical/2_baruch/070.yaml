  text: |-
    # Source page p0177 (printed 165)
    ܘܐܬܚܙܝܬ ܠܐ ܙܕܝܩܘܬܗ
    ܐܦ ܐܢܬܘܢ ܐܝܟ ܕܐܒܘ
    ܐܚܝܟܘܢ. ܐܠܐ ܙܕܝܩ
    ܢܕܐܢ ܥܘܠܘܗܝ. ܡܛܠ
    ܕܡܚܣܢܢܐ ܗܘ ܗܘ
    ܕܒܥܝܢ ܐܢܬܘܢ ܠܗ.
    ܘܡܚܣܢܢܐ ܗܘ ܗܘ
    ܕܡܣܒܪܝܢ ܐܢܬܘܢ ܒܗ.
    ܘܢܚܙܐ ܗܘ ܕܢܛܪ ܠܐ
    ܕܢܥܙܒ. ܠܐ ܐܘ ܐܢܬܘܢ
    ܚܙܝܬܘܢ ܡܕܡ ܕܓܕܫܗ
    ܠܨܗܝܘܢ. ܐܘ ܕܠܡܐ
    ܣܒܪܝܬܘܢ ܕܐܪܙܐ ܚܛܝܘ.
    ܡܛܠ ܗܢܐ ܐܬܚܪܒܘ.
    ܐܘ ܐܢܫܐ ܡܕܡ
    ܐܣܟܠܘ. ܡܛܠ ܗܢܐ
    ܐܫܬܠܡܘ. ܘܠܐ ܝܕܥܝܢ
    ܐܢܬܘܢ ܕܡܛܠܬܟܘܢ
    ܕܝܠܗܘܢ ܐܬܚܝܒܘ ܗ̇ܘ
    ܐܢܫܐ ܕܠܐ ܚܛܘ. ܡܛܠ
    ܐܝܠܝܢ ܕܥܒܕܘ ܐܢܬܘܢ
    ܠܡܒܥܕ ܒܟܘܢ ܗ̇ܘ ܐܢܫܐ
    ܕܠܐ ܣܟܠܐ. ܘܥܒ̣ܕ ܫܠܡ
    ܥܡܢ ܘܐܘܕܥܘ ܠܝ. ܡܛܠ
    ܕܡ̇ܢܝܢ ܐܢܬܘܢ ܥܕܘ̈ܬܝ
    ܛܒ̈ܬܐ ܕܥܒ̣ܕ ܥܡܟܘܢ
    ܚܝܠܬܢܐ. ܟܕ ܚܙܝܢ ܚܢܢ
    ܘܐܝܠܝܢ ܕܠܐ ܟܕ ܚܙܝܢ ܚܢܢ
    ܗܘ ܟܪܝܣܛܘܣ ܢܝܬ̣ܐ.
    ܒܪܡ ܕܝܢ ܐܦܢ ܒܥܝܪܘ
    ܠܢ ܠܡܥܠ. ܘܐܢܬܘܢ ܐܦ
    ܠܐܢܫ ܠܡܥܠ ܐܓܪܬܐ
    ܕܝܘܠܦܢܐ ܡܕܡ ܕܣܒܪܬܐ.
    ܕܐܦ ܠܗܘܢ ܬܚܘܐ ܡܕܡ
    ܡܕܡ ܕܠܐ ܬܙܠܐ ܠܡ
    ܡܢ ܠܘܬܢ. ܐܒ̣ܕܘ ܠܗܘܢ
    ܓܝܪ ܪ̈ܥܘܬܐ ܕܐܝܣܪܝܠ.
    ܘܕܒܗ ܫܪ̈ܓܐ ܕܡܢܗܪܝܢ
    ܗܘܘ. ܘܒܗ ܡܒܘ̈ܥܐ
    ܕܪܕܝܢ ܡܢ ܐܝܟܐ
    ܕܫܬܝܢ ܗܘܝܢ. ܚܢܢ ܕܝܢ
    ܐܫܬܒܩܢ ܒܚܫܘܟܐ ܘܒܥܒܐ
    ܕܥܒܐ. ܘܒܨܗܝܐ
    ܕܡܕܒܪܐ. ܘܥܢܝܬ ܘܐܡܪܬ
    
    # Source page p0176 (printed 166)
    ܠܗܘܢ ܐܒܘܬܐ ܩܕܡܝܐ
    ܘܡܒܩܪܢܐ ܡܢ ܢܡܘܣܐ
    ܐܬܢܣܒܘ ܗܘܘ. ܘܠܐ
    ܚܢܢ ܐܠܨܝܢ ܚܢܢ ܐܠܐ
    ܢܡܘܣܐ ܩܝܡ ܗܘ. ܠܢ
    ܗܟܝܠ ܐܚܘܝܘ ܒܢܡܘܣܐ
    ܘܐܬܩܝܡܘ ܬܪ̈ܝܗܘܢ
    ܒܚܟܡܬܐ. ܠܐ ܝܬܝܪ
    ܡܢܗ. ܘܪܥܝܐ ܠܐ ܥܪܩ.
    ܘܥܪܒܐ ܠܐ ܝܥܦ. ܒܪܡ
    ܕܝܢ ܐܝܟ ܕܐܡܪܬܘܢ
    ܠܝ. ܐܢܐ ܒܬܪ ܐܢܐ
    ܐܙܠ ܠܐܬܪܗܘܢ ܕܒܒܠܝܐ.
    ܘܐܫܕܪ ܒܝܕ ܟ̈ܬܝܒܐ ܠܒܝܬ
    ܘܠܒܒܠܝܐ ܡܒ̈ܣܡܢܘܬܐ.
    ܘܥܒܕ ܐܓܪܬܐ ܘܐܫܕܪ
    ܒܝܕ ܢܫܪܐ. ܘܐܬܩܝܡ
    ܀ .v. c ܘܡܬܒܪܝܢ ܒܡܘܬܐ ܕܐܡܝܪܐ
    ܐܢܬܘܢ ܐܢܐ ܒܪܘܟ.
    ܘܐܒܘܐ ܐܚܝܐ ܒܥܘܕܪܢܐ
    ܒܡܠܠܐ ܕܣ̈ܦܪܐ ܘܐܝܟ ܠܐ
    ܗܘܘ ܒܡܘܬܐ. ܐܠܐ ܐܢܐ
    ܟܠܚܘܕܝܗ. ܘܟܐܦܐ ܗܠܝܢ
    ܕܐܬܢܣܒ ܐܢ̈ܝܢ. ܚܙܐ
    ܫܪܝܪܐ ܒܝܕ ܢܒܝܐ ܥܠܝܡܘܬܐ
    ܡܫ̈ܠܡܢ ܘܡܬܝܗܒ̈ܢ. ܘܐܚܪ̈ܢܝܬܐ
    ܫܪ̈ܝܪܬܐ ܠܐܝܠܝܢ ܕܒܒܒܠ ܒܝܕ
    ܬܪܥܐ ܐܬܦܣܩ. ܘܩܪܝܬ
    ܥܠܝܡܘܬܐ ܘܐܡܪܬ ܠܗ ܩ̈ܠܐ
    ܗܠܝܢ. ܠܟܝ ܟܐܦ ܡܕܡܟܐ
    ܕܐܣܬܟܠ ܡܟܝܟܐ ܡܢ ܟܠܗ
    ܦܪܚܬܐ. ܘܗܘܐ ܐܠܗܐ ܘܠܐ
    ܢܫܒܘܩ ܒܐܬܪܐ. ܘܠܐ
    ܬܬܒܛܠ ܥܡܡܐ. ܘܠܐ ܬܣܬܟܠ
    ܥܠ ܟܘܠ ܐܢܫܝܢ. ܒܕܡܘܬ
    ܕܬܒܥܒܕ ܦܘܠܚܢܗ ܕܡ̈ܠܟܐ
    ܣ̈ܓܝܐܐ ܕܐܘܪܒ ܦܪܚܬܐ.
    ܘܐܬܬ ܓܘܫܡܐ ܥܡܗ ܗ̇ܘ
    ܕܒܩܘܫ ܐܝܬܘܗܝ ܘܫܒܝܚܐ
    ܠܗܘܘ ܐܢ̈ܝܢ ܐܝܟܢܐ
    ܕܐܬܩܪܝ ܒܝܕ ܟܘܡܪܐ
    ܕܐܘܦܝܥ ܡܢ ܝܘܡ ܩܒܠܬ
    ܢܘܗܪ ܦ
