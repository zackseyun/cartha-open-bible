    ܐܡܝܪܢ ܒܝܬ ܗ̈ܘܝ.
    ܡܛܠ ܗܢܐ ܢܚܝܬ ܗܘ
    ܟܠ ܥܢ̈ܩܐ. ܘܩܘܝܡ ܗܘ
