    ܠܘܩܕܡ ܕܬܬܝܕܥ ܕܐܢܬܘܢ.
    ܒܫܘܠܡܗ̇ ܡܢ ܟܠܗ̇ ܗܠܝܢ
    ܐܫܬܪܝ. ܘܗܐ ܗܝ
    ܡܬܬܝܕܥܐ ܡܢ ܟܠܗ̇ ܕܐܝܟ
    ܬܪ̈ܬܝܢ ܕܐܬܝܕܥ
    ܠܟ ܡܢ ܩܕܝܡ. ܟܕ
    ܀ ܢܫܬܠܡܘܢ ܥܡܡ̈ܐ. v. 6.
    ܘܐܢܬ ܙܒܢܐ ܕܡܫܝܚܐ.
    ܘܗܘܐ ܒܒܥܘܗܝ ܒܡܕܒܪܐ.
    ܘܡܢܗܘܢ ܢܚܬܘ ܡܠܐܟܘܗܝ
    ܢܫܬܘܠܡ. ܘܠܝܬ ܗܘܝܐ
    ܕܐܝܟ ܗܠܝܢ ܒܡܕܒܪܐ ܐܚܪܝܢ
    ܕܬܬܝܕܥ ܕܚܝܠ ܡܠܬܗ.
    ܡܠܐ ܒܡܕܐ ܕܠܐ ܝܕܥ
    ܠܐܣܝܪ̈ܐ. ܘܕܠܐ ܕܫܢ
    ܠܙܐܒܗ ܕܝܥܩܘܒ ܐܘܪܗ
    ܕܚܙܘ. ܘܗܕܐ ܡܛܠ
    ܕܢܬܬܒܥܘܢ ܡܢ ܟܘܠ
    ܒܩ̈ܒܝ ܓܒܪ̈ܝ. ܟܘܠ
    ܐܝܠܝܢ ܕܝܢ ܕܐܬܓܠܝܘ
    ܒܠܝܒܗ ܐܘ ܕܝܕܥܘܗܝ.
    ܘܠܝܬ ܒܗܘܘܢ ܓܢܝܙܘܬܐ
    73..ܢܫܬܠܡܘܢ ܝܘܡܝܗܘܿܢ ܡܢ
    ܟܐܒܐ ܕܡܡܘܬ ܠܥܡܠܐ
    ܕܐܝܬ ܒܥܠܡܐ. ܡܢܟܝ
    ܒܡܥܒܪܐ ܠܥܠܡ ܢܠܐ ܬܪܘܗܝ
    ܕܡܥܡܘܬܐ. ܘܢ̇ܚܬ ܛܠܐ
