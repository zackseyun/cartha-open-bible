    ܒܟܠܗ̇ ܐܪܥܐ. ܘܬܘܒ ܠܐ
    ܢܡܘܬ ܕܠܐ ܒܙܒܢܗ. ܘܠܐ
    ܡܕܡ ܡܥܝܩ ܢܓܕܫ ܣܡܡܠܐ
    ܡܕܡ. ܘܕ̈ܝܢܐ ܘܡܕ̈ܝܢܝܘܬܐ
    ܘܚܪ̈ܝܢܐ ܘܬܒ̈ܥܬܐ
    ܘܕܡܐ ܘ̈ ܪ̈ܓܝܓܬܐ ܘܚܣܡܐ
    ܘܣܢܐܬܐ. ܘܟܠ ܐܝܠܝܢ
    ܕܕ̈ܡܝܢ ܕܟ̈ܝܢ. ܠܚܘܝܒܐ
    ܢܬ̈ܪܝܡܢ ܟܕ ܢܫ̈ܬܩܠܢ. ܗ̈ܢܝܢ
    ܐ̈ܢܝܢ ܓܝܪ ܘܐܝܠ
    
