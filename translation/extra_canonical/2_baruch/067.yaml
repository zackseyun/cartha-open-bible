    ܢܬܚܙܐ. ܘܢܗ̇ܚܬܘ ܣܡܟܐ
    ܬܘܒ ܢܝܚܐ ܒܫܠܝܐ.
    ܘܡܘܪܢܐ ܢܬܬܢܝܚ.
    ܘܕܘܝܐ ܘܟܘܪܗܢܐ
    ܘܐܢܚ̈ܬܐ ܢܥܪܩܘܢ ܡܢ
