  text: |-
    # Source page p0222 (printed 120)
    ܥܠ ܚܙܝܬܐ ܕܐܬܬ
    ܕܝܢ ܟܘ̈ܡܪܐ ܣܒܘ ܡܦܬܚ̈ܐ
    ܕܒܝܬ ܡܩܕܫܐ. ܘܫܕܘ
    ܐܢܘܢ ܠܪܘܡܘܗܝ ܕܫܡܝܐ.
    ܘܗܒܘ ܐܢܘܢ ܠܡܪܝܐ.
    ܘܐܡܪܘ܆ ܛܪ ܒܝܬܟ ܐܢܬ.
    ܚܢܢ ܓܝܪ ܗܐ ܐܫܟܚܢ
    ܪ̈ܒܝ ܒ̈ܬܐ ܕܓ̈ܠܐ. ܘܐܬܚܙܝ
    ܒܬܘ̈ܠܬܐ ܕܥ̈ܙܠܢ ܒܘܨܐ.
    ܘܢܚ̈ܬܐ ܥܡ ܕܗܒܐ
    ܕܐܘܦܝܪ. ܐܣܬܪܗܒܝܢ
    ܘܫ̈ܩܠܢ ܡܠܒܘܫܐ ܘܝ̈ܕܒܢ
    ܒܢܘܪܐ. ܕܬܘܒܠܐ ܐܢܘܢ
    ܠܘܬ ܗܘ̇ ܕܒ̣ܥܕ ܐܢܘܢ.
    ܘܝܛܪܘܗܝ ܐܢܬܘܢ ܐܢܘܢ.
    ܠܘܬ ܗܘ̇ ܕܒ̣ܪܐ ܐܢܘܢ.
    ܕܠܐ ܢܫܬܠܛܘܢ ܒܗܘܢ
    11 ܡܒܥܕ̈ܢܘܗܝ. ܐܡ̇ܪ ܐܢܐ
    ܕܝܢ ܗ̣ܘ ܐܢܐ ܒܪܘܟ.
    ܠܡܘܒܠܢܝ ܒܒܟܝܐ. ܠܐܘ ܬܘܒ
    ܐܬܝܬ ܡܕܒܪܐ ܘܐܡ̣ܪܬ
    ܒܡܕܐ ܒܬܫܥ̈ܝܬܗ̇.
    ܟܐܒܐ ܗܘܘ ܠܝ ܪ
    ܠܥܠܡ. ܗܟܢܐ ܕܝܢ ܗܘܐ
    ܡܙܥܙ ܕܠܐ ܡܣܬܝܟ.
    ܘܐܢܫܐ ܕܒܝܬ ܓܘܣܝ
    ܀ ܡܘܫܚܬܐ ܕܐܝܬ ܗܘܐ
    ܡܕܥܝܗܝܢ ܘܐܘܦܢ ܚܕ̈ܕܐ.
    ܡܢܗ ܗܘܘ ܢܝܕ ܟܠ
    ܗܠܝܢ. ܐܘ ܠܡܢܘ ܢܫܟܘܚ
    ܟܠ ܡܕܡ ܕܕ̈ܝܩܢ. ܐܘ
    ܡܢܘ ܐܡܪ ܣܓܝܐܘ
    ܚܟܡܗ ܐܟܡܐ ܕܠܐ
    ܡܐ̈ܙܐ ܘܕ̈ܢܦܐ ܗܘܐ
    ܕܡܢܝܢ ܟܐܢܐ ܟܢܝܫܘ.
    ܠܐ ܓܝܪ ܝܕܥܘܗ̇ ܠܥܡܬܐ
    ܗܘܬ ܘܐܦ ܠܐ ܚܫܒܘܗ
    ܟܠ ܡܕܡ ܕܕ̈ܝܩܢ. ܢܘ̈ܦܝ
    ܒܥܝ ܐܢܫܐ ܕ̈ܢܘ. ܘܐܝܬ
    ܟܦܢܐ ܠܟܠ. ܘܐܝܬ ܗܘܘ
    ܒܚܘܫܒܐ ܘܐܡܪܘ ܠܡܘܬܐ.
    ܛܘܒܝܟܘܢ ܠܟܘܢ ܕܐܝܬ
    .. ܡܠܝܢ ܕܝܠܢ ܕܚܢܢ ܚܝܝܢ܀
    12 ܐܠܐ ܗܘܐ ܐܡܪ ܐܢܐ
    ܐܝܟ ܕܡܫܬܡܥ ܐܢܐ.
    ܘܐܡܠܠ ܠܡܘܒܕܢܗܘܢ ܕܐܒܐ
    ܕܡܕܥܝܗܘܢ ܠܐ ܗܘܘ ܒܟܠ
    
    # Source page p0221 (printed 121)
    ܙܒܢ ܦܠܓܗ ܕܝܘܡܐ
    ܡܫܬܘܙܒ. ܘܠܐ ܐܡ̇ܝܢ
    ܬܟܘܬܗܘܢ ܕܫܡܝܐ ܡܬܬܙܝܥܝܢ.
    ܠܐ ܬܣܒܪ ܘܬܣܒܪܝܢ
    ܕܒܒܥܘܬܟ ܬܬܩܒܠ ܡܕܡ
    ܘܚ̇ܕܝܬ. ܘܠܐ ܣ̇ܟܝܬ
    ܬܬܢܣܒ ܘܬܫܬܒܩܝܢ.
    ܫܪܝܪܐܝܬ ܓܝܪ ܒܙܒܢܐ
    ܡܬܬܒܪܐ ܒܥܝܢܝ ܚܛܝ̈ܐ.
    ܗܘ ܕܐܡܪ ܒܠܒܗ ܪܘܚܐ
    ܐܝܟ ܕܦ̇ܩܕܬ ܐܚܝܕܐ.
    ܘܟܕ ܐܡ̇ܪܢܐ ܗܠܝܢ ܪ̇ܡܬ
    ܫܒܥܐ ܝܘܡ̈ܝܢ.܀ ܘܗܘܬ
    ܡܢ ܒܬܪ ܗܠܝܢ ܐܢܐ ܒܪܘܟ
    ܩܐܡ ܗܘܝܬ ܥܠ ܨܝܕܐ
    ܕܢܗܪܐ. ܘܗܘܐ ܩܠܐ
    ܐܙܐ ܡܢ ܡܪܘܡܐ
    ܘܐܡ̇ܪ ܠܝ. ܩܘܡ ܥܠ
    ܪ̈ܓܠܝܟ ܒܪܘܟ ܘܫܡܥ
    ܡܠܬܐ ܕܐܠܗܐ ܚܝܠܬܢܐ.
    ܡܛܠ ܕܐܬܬܙܝܥܘ ܥܠ
    ܡܕܡ ܕܐ̇ܡܪܬ ܠܩܘܒܠܝ.
    ܡܛܠ ܗܢܐ ܡܬܝܗܒ
    ܠܟܘܢ ܠܡܫܡܥܘ ܡ̈ܠܐ.
    ܕܬܬܒܝܐܘ ܒܬܪܟܢ.
    ܐܢ ܢܬܒܥ ܡܢܟܘܢ
    ܡܕܝ̈ܢܬܐ ܐܝܠܝܢ ܕܡ̈ܠܝܢ
    ܕܠܡܒܢܐ ܐܢܬܝܢ ܒܠܚܘ
    ܐܠܗܐ ܚܝܠܬܢܐ. ܦܘܪܥܢܐ
    ܗܘܐ. ܐܡܪ ܠܗܘܢ ܐܢܐ
    ܘܐܝܠܝܢ ܕܕܡ̈ܝܢ ܠܗܘܢ ܐܝܠܝܢ
    ܕܚܕܝܘܬܗܘܢ ܒܝܫܬܐ ܗܘܬ
    ܘܦܘܪܥܢܐ ܕܐܝܠܝܢ ܒܠܝܫܘ
    ܗܠܝܢ ܒܡܠܟܝܢ. ܒܙܒܢܘ
    ܕܡܬܝܕܥܐ ܠܐܬܪܘܬ
    ܠܡܡܠܠܘ ܘܡ̇ܚܝܢ ܢܦܫܗܘܢ.
    ܘܐܢ ܠܐܡܕܢ ܒܗܘ̇ ܙܒܢܐ
    ܕܐܬܬܚܝܘ. ܘܐܡܪ ܠܗܘܢ
    ܐܢܬܝܢ ܕܐܫܬܬܝܬܝܢ ܚܡܪܐ
    ܡܕܝܠܢܐ. ܐܫܬܝܬܝܢ ܐܦ ܡܢ
    ܕܠܡܐ. ܕܢܗܘܐ ܕܡܐ
    ܕܠܐ ܡܣܒܪ ܒܪ̈ܦܐ ܗܘ.
    ܡܛܠ ܗܕܐ ܠܐ ܒܢܦܫܗܘܢ
    ܠܡܘܡܬܐ ܠܐ ܚܣܘ. ܐܠܐ
    ܫܠܡ ܒܗܘ̇. ܐܝܟ
    ܕܒܣܝ̈ܡܘܗܝ. ܡܛܠ ܕܢܗܘܐ.
    ܘܡ̇ܚܝܢ ܢܦܫܐ ܕܐܬܪܘܬ
    ܡܛܠ ܕܐܬܚܣܡܘ. ܘܗܘܐ
    ܚܕ ܐܬܪܘܬ ܒܡܠܟܐ
    ܘܐܡ̈ܘܬܐ ܚܝܒܝܢ ܐܬܘ
