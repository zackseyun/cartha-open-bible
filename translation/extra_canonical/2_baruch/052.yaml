  text: |-
    # Source page p0195 (printed 147)
    ܘܓܒܘ ܠܗܘܢ ܙܒܢܐ ܗܘ
    ܕܡ̈ܦܩܢܘܗܝ ܕܐܢܫܐ
    ܘܚܝ̈ܒܐ ܡܓܢ. ܘܒܦܘܪ
    ܥܘܒܗܘܢ ܕܠܐ ܡܘܡ
    ܠܐܢܫܝܢ ܕܐܝܟ ܠܗ. ܘܐܣܠܝܘ
    ܙܒܢܐ ܡܐܣܒܪܢܐ ܕܠܐ
    ܢܬܝܗܒ ܠܐܢܫܐ ܕܩܕܡܝ
    ܐܡ̇ܪܢܐ ܠܟܘܢ ܀ ܘܡܕܝܢܐ
    ܘܐܡ̇ܪܐ. ܐܢܘܢ ܢ̇ܒܥܝܢ
    ܐܢܫܝܢ ܕܡ̇ܝܬܝܢ ܗܘܘ
    ܕܠܡܕܢ ܠܗܘܢ. ܡܠܟܘܬܐ ܗܟܝܠ
    ܡܬܐܒܠܝܢ ܗܘܘ ܥܠ
    ܐܢܫܝܢ ܕܡܝܬܝܢ. ܐܘ ܥܡܘܪ̈ܝ
    ܟܦܢܝܢ ܥܠ ܐܢܫܝܢ ܕܐܢܫܝܢ
    ܠܡܣܒܥ. ܢܬܢ̇ܗܪܘܢ ܗܟܝܠ
    ܥܕܢܘܗܝ ܕܗܘ ܕܡܬܝܩܪ
    ܕܠܝܬ. ܘܢܬܬܗܡܘܢ ܕܡ̈ܒܐ
    ܠܡܬܬܙܝܥܘ ܗܘܘ
    ܐܒܕܢܐ ܕܡ̇ܝܬܝܢ. ܐܠܐ
    ܐܦ ܠܗܘܒܠܐ ܗܠܝܢ ܐܪ̈ܙܝ.
    ܘܐܝ̈ܡܡܐ ܡܢܐ ܢܥܒܕܘܢ
    ܗܘܘ. ܕܒܗ ܒܚܫܟܐ ܕܚܫܟܝܢ
    ܐܢܬܘܢ ܗܘܘ. ܡܠܟܘܬܐ
    ܓܝܪ ܚ
    ܢܦܫܬܗܘܢ ܠܐܓܪܐ ܕܣܝܡ
    ܠܗܘܢ. ܘܟܕ ܐܡ̇ܪܬ ܗܠܝܢ
    ܕܡ̇ܟܬ ܬܡܢ. ܝܛ. ܘܚܙܝܬ
    ܚܙܘܐ ܘܗܘܐ ܒܠܠܝܐ
    ܚܕܐ ܣ̇ܟܠܬ ܗܘܝܬ ܡܢ
    ܝܡܐ ܪܒܐ ܣ̇ܓܝܐ. ܘܚܙ̇ܐ
    ܗܘܝܬ ܒܗ̇. ܘܗܘܐ ܡܥܠܝܐ
    ܗܘܐ ܩ̈ܝܐ ܚܘ̈ܪܐ
    ܘܐܘܟܡ̈ܐ. ܘܓ̈ܠܠܐ
    ܣ̈ܓܝܐܐ ܐܝܬ ܗܘܐ
    ܒܗܘܢ ܒܩ̈ܝܐ ܗܠܝܢ. ܘܐܝܟ
    ܕܡܘܬܐ ܕܒܪܩܐ ܪܒܐ.
    ܡܬܚܙܐ ܗܘܐ ܒܪܝܫܗ̇.
    ܘܚܙܝܬ ܗ̇ܝ ܠܥܢܢܐ ܗ̇ܝ.
    ܕܥ̇ܒܪܐ ܚܝܦܐܝܬ ܒܪܗܛܐ
    ܩܫܝܐ. ܘܡܣܬܝ̇ܟܐ ܠܟܠܗ̇
    ܐܪܥܐ. ܘܗܘܐ ܡܢ
    ܒܬܪ ܗܠܝܢ ܢܚ̇ܬ ܗܘܐ
    ܡܢܗ̇ ܗ̇ܝ ܡܢܡܛܪܐ
    ܥܠ ܐܪܥܐ. ܩ̈ܝܐ ܕܐܝܬ
    ܗܘܐ ܒܗ̇. ܘܚܙܝܬ ܕܠܐ
    ܗܘܐ ܚܕܐ ܗܘܐ
    ܕܡܘܬܗܘܢ ܕܩ̈ܝܐ ܗܠܝܢ
    
    # Source page p0194 (printed 148)
    ܒܐܪܥܐ ܚܙܝܬ ܕܐܢܫܝܢ
    ܗܘܘ ܡ̈ܝܬܐ. ܐܠܐ ܠܐ
    ܣܓܝܐܝܢ ܗܘܘ. ܘܡܢ ܒܬܪ
    ܗܠܝܢ ܬܘܒ ܚܙܝܬ ܐܘܟܡܐ.
    ܘܡܢ ܒܬܪ ܗܠܝܢ ܬܘܒ
    ܢܗܝܪܐ. ܘܬܘܒ ܐܘܟܡܐ.
    ܘܬܘܒ ܢܗܝܪܐ. ܘܕܐ
    ܕܝܢ ܗܘܐ ܥܕܡܐ
    ܠܬܪ̈ܥܣܪܐ ܙܒܢ̈ܝܢ. ܐܠܐ
    ܐܘܟܡܐ ܣܓܝ̈ܐܝܢ
    ܗܘܘ ܒܟܠܗܝܢ ܡܢ ܢܗܝܪܐ.
    ܀ ܘܗܘܐ ܒܫܘܠܡܗ ܕܥܢܢܐ
    ܘܗܘܐ ܐܟܡܐ ܡ̈ܝܐ
    ܐܘܟܡܐ ܘܚܫܘܟܝܢ
    ܕܗܘܘ ܝܬܝܪ ܡܢ ܟܠܗܘܢ
    ܡ̈ܝܐ. ܗ̇ܢܘܢ ܩܕ̈ܡܝܐ
    ܕܗܘܘ. ܘܐܙܠܘ ܡܚܠܛܐ
    ܗܘܘ ܒܗܘܢ. ܘܐܝܟܐ
    ܕܢܚ̈ܬܝܢ ܗܘܘ ܡ̈ܝܐ
    ܗܢܘܢ ܥܒܕܝܢ ܗܘܘ ܚܒܠܐ
    ܘܐܒܕܢܐ. ܘܚܙܝܬ ܡܢ
    ܒܬܪ ܗܠܝܢ. ܠܗܘ̇ ܒܪܩܐ
    ܕܚܙܝܬ ܬܘܒ ܒܪܝܫܗ
    ܕܥܢܢܐ ܕܐܚܕܗ̇ ܘܐܬܚ
    ܐܢܫܐ. ܘܬܗܘܐ ܒܝܘܡܝ
    ܐܘ̈ܠܨܢܐ. ܐܢܫܐ
    ܕܢܚܙܘܢ ܡܢܝ ܐܝܟܢܐ
    ܘܢܥܒܪܘܢ. ܘܐܚܪ̈ܢܐ ܗܘܘ
    ܥܒܕܝ̈ܗܘܢ ܐܢܫܐ. ܘܐܫܬܡܥܬ
    ܥܠܝܗܘܢ ܘܚܙܝܬ ܡܢ ܒܬܪ
    ܗܠܝܢ. ܘܗܘܐ ܬܪܥܣܪ̈ܝ
    ܢܘܗܪ̈ܐ ܫܠܡܝܢ ܗܘܘ ܡܢ
    ܝܡܐ. ܘܚܕܝܕܝܢ ܗܘܘ
    ܠܗ ܠܗܘ ܟܪܘܙ ܘܡܫܬܒܚ
    ܗܘܘ ܠܗ. ܘܐܢܐ ܡܢ
    ܕܚܠܬܝ ܐܬܬܥܝܪܬ.܀.
    54 ܝܕ ܨܠܘܬܐ ܕܒܪܘܟ ܒܝܘܡ
    ܘܒܥܝܬ ܡܢ ܚܝܠܬܢܐ
    ܘܐܡܪܬ. ܐܢܬ ܡܪܝܐ
    ܒܠܚܘܕܝܟ ܡܣܝܡ ܐܢܬ
    ܝܕܥܐ ܐܢܬ ܪ̈ܘܚܘܗܝ
    ܕܥܠܡܐ. ܘܩܕܡ ܕܢܬܒܪܐ
    ܓܒܠܬ ܡܢܘ ܐܢܬ
    ܒܡܠܬܟ. ܘܒܘܩܥܠܐ
    ܫܦܝܪ̈ܝܗܘܢ ܕܒܡܘ̈ܬܘܗܝ
    ܕܐܢܫܐ ܡܣܬܡܟܐ ܪ̈ܡܘܗܝ
    ܕܒܪܐ. ܘܣܘܦܘܗܝ ܝ̈ܕܝܥܐ
