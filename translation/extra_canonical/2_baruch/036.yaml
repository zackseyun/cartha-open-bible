  text: |-
    # Source page p0208 (printed 134)
    ܟܠܗܘܢ ܪܐܙܐ ܕܝܠܝ
    ܕܠܥܠܡ. ܘܗܘܝܬ ܠܝ
    ܗܘ ܕܐܦ ܐܢܬ ܚܟܝܡܬ
    ܠܝ. ܛܒܐ ܗܘܬ ܒܝܢ ܕܢܡܘܬ
    ܡܠܝܢ ܩܕܡܝܟ. ܘܗ̇ܝܕܝܢ
    34..ܐܪܝܡܬ ܥܝܢܝ܀. ܘܒܟܝܬ ܆
    ܘܐܡܪܬ ܒܗ ܒܥܕܢܐ ܚܣ
    ܠܝ ܕܐܫܬܘܩܘܟܘܢ ܐܘ
    ܕܐܢܫܝܢ ܡܢܟܘܢ. ܐܠܐ
    ܒܠܚܘܕ ܐܢܬܘܢ ܥܕܡܐ
    ܠܒܝܬ ܩܘ̣ܒܘܪ ܩܘ̈ܒ̣ܪܐ ܕܐܒܗܝ
    ܡܢ ܚܒܠܬܐ ܒܥܝܩܘܬ
    ܝܠܠܐ ܨܘܝܘ. ܕܠܐ ܐܬܢܫܝܬ
    ܩܕܡ ܐܢܬܘܢ ܘܡܢ ܒܬܪ
    ..ܘܐܠܝܢ ܘܦ̣ܪ ܐܢܐ ܥܘܗܕܢܘܢ܀.
    35 ܘܐܙܠܬ ܐܢܐ ܒܪܘܟ
    ܥܕܡܐ ܠܬܪܥܐ ܩܕܝܫܐ.
    ܘܝ̇ܬܒܬ ܐܢܐ ܡ̈ܟܝܟܐܝܬ
    ܘܒܟܝܬ ܘܐܡܪܬ. ܐܘ ܥ̈ܝܢܝ
    ܗܘ̈ܝ ܡܒܘ̈ܥܐ ܘܐܡܘ̈ܬܐ
    ܕܡ̈ܝܐ ܡܒܘܥܐ ܕܕܡ̈ܥܐ.
    ܐܝܟܢܐ ܓܝܪ ܐܬܬܢܝܚ
    ܥܠ ܨܗܝܘܢ. ܘܐܒܟܐ
    ܠܐܒܠܐ ܐܢܐ ܘܐܫܟܚ.
    ܡܛܠ ܕܒܙܘܥܐ ܐܬܬܙܝܥ
    ܐܢܫܐ ܕܡܬ̇ܪܣܝܢ ܐܢܐ
    ܘܗܘܘ ܡܢ ܩܕܝܡ ܪܒܝ
    ܠܝܐ ܚܙܘܐ. ܘܗܘܐ ܒܒܐ
