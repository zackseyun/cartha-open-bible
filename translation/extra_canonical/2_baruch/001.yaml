  text: |-
    # Source page p0228 (printed 114)
    ܀ ܟܬܒܐ ܕܓܠܝܢܐ ܕܒܪܘܟ
    ܒܪ ܢܪܝܐ ܀ ܕܐܬܦܫܩ ܡܢ ܝܘܢܝܐ
    1 ܠܣܘܪܝܝܐ. ܘܗܘܐ ܒܫܢܬ
    ܥܣܪܝܢ ܘܚܡܫ ܕܝܘܟܢܝܐ
    ܡܠܟܐ ܕܝܗܘܕܐ. ܗܘܬ
    ܦܬܓܡܗ ܕܡܪܝܐ ܠܘܬ
    ܒܪܘܟ ܒܪ ܢܪܝܐ ܘܐܡܪ
    ܠܗ. ܚܙܝܬ ܡܟܝܠ ܕܥܒܕ
    ܥܡܐ ܗܢܐ. ܒܝܫܬܐ
    ܕܒܥܝܢܝ ܬܪܝܢ ܫܒܛܝܢ
    ܕܦܫܘ. ܝܬܝܪ ܡܢ ܥܣܪܐ
    ܫܒܛܝܢ ܕܐܫܬܒܝܘ. ܡܛܠ ܕܐܢܘܢ
    ܩܕܡܝܐ ܡܢ ܩ̈ܝܡܝܗܘܢ
    ܐܬܥܒܪܘ ܕܐܚܝܗܘܢ. ܘܠܝ
    ܕܝܢ ܐܪܓܙܘ ܒܓܠܝܦ̈ܝܗܘܢ
    ܘܗܘܘ ܡܓܪܓܢ ܠܩ̈ܕܡܝܗܘܢ.
    ܕܐܚܝܗܘܢ. ܡܛܠ ܗܢܐ
    ܡܝܬܝ ܐܢܐ ܒܝܫܬܐ ܥܠ
    ܡܕܝܢܬܐ ܗܕܐ ܘܥܠ
    ܥܡܘܪ̈ܝܗ̇. ܘܬܬܝܗܒ ܡܢ
    ܩܕܡܝ ܠܙܒܢܐ. ܘܒܥܡܡ̈ܐ
    ܐܙܪܥܘ ܐܢܘܢ ܠܡܘ
    ܚܝܒܘ. ܡܟܝܠ ܕܝ
    ܕܐܡܪ ܠܐܢܫܝܢ ܡܛܠ
    ܐܝܠܝܢ ܕܕܡ̇ܝܢ ܠܟܘܢ.
    ܕܬܚܙܘܢ ܠܟܘܢ ܡܢ
    ܗܕܐ ܡܕܝܢܬܐ. ܡܛܠ
    ܕܒ̈ܝܫܬܗ̇ ܕܐܝܕܝܗ̇
    ܠܗܕܐ ܡܕܝܢܬܐ ܐܝܟ
    ܥܡܗܕܐ ܡܪܝܪܐ. ܘܨܥܪܘܗܝ
    .. ܐܝܟ ܫܘܕܐ ܚܠܝܬܐ ܀ ܘ.
    3 ܘܐܡܪܬ ܐܘ ܡܪܝܐ
    ܡܪܝܐ. ܠܗܕܐ ܐܢܬ
    ܠܡܥܒܕ ܕܐܢܐ ܒܥܝܬܗ̇
    ܕܐܡ̣ܪ. ܠܐ ܡܪܝܐ. ܠܝ
    : ܐܫܬܘ ܪ̈ܚܡܝܟ ܡ̈ܒܝܢܝܢ.
    ܣܒ ܠܘܬܟ ܪܘܚܝ
    ܕܐܙܠ ܠܝ ܠܘܬ ܐܒ̈ܗܝ.
    ܘܠܐ ܐܚܙܐ ܒܚܪܒܗ̇
    ܕܐܡܝ. ܡܛܠ ܕܐ̈ܡܘܬܝ
    ܐܠܝܢ ܥܡ ܣܓܝܐ. ܕܐܡܘܬ
    ܥܡ ܟܢܘܫܬܝ. ܠܐ ܡܫܟܚ
    ܐܢܐ. ܐܠܐ ܐܦ ܠܐ
    ܕܐܚܙܐ ܒܒܝܫܬܗ̇ ܕܐܡܝ
    ܡܫܟܚܢܐ ܢܦܫܝ. ܚܕܐ ܕܝܢ
    ܐܡܪ ܐܢܐ ܩܕܡܝܟ
    ܡܪܝܐ. ܡܢܐ ܗܟܝܠ
    ܗܘ̇ܐ ܡܢ ܒܬܪ ܗܠܝܢ.
    ܀ ܐܢ ܓܝܪ ܬܘܒܕ ܐܢܬ
    ܡܕܝܢܬܟ. ܘܬܫܠܡ ܐܢܬ
