translation:
  text: And he will make peace with the righteous, and he will guard the chosen, and
    mercy will be upon them. And they will all belong to God, and they will prosper
    and be blessed, and the light of God will shine upon them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the elect” for “the chosen.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “they will all be of God” or “they will all be God’s.”
    reason: alternative_reading
  - marker: c
    text: “Will prosper” may also be rendered “will succeed” or “will fare well.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ጻድቃን
  chosen: the righteous
  alternatives:
  - the just
  lexicon: Dillmann
  rationale: The term denotes morally upright people in a judicial-covenantal sense.
    “The righteous” preserves the apocalyptic and theological register better than
    the flatter “the just.”
- source_word: ሰላመ
  chosen: peace
  alternatives:
  - well-being
  lexicon: Dillmann
  rationale: “Peace” best preserves the covenantal and eschatological force of the
    term; “well-being” is possible but weaker in this judgment-context.
- source_word: የዓቅቦሙ
  chosen: he will guard
  alternatives:
  - he will protect
  - he will keep
  lexicon: Dillmann
  rationale: The verb conveys active preservation. “Guard” keeps the protective sense
    while matching the elevated style of the passage.
- source_word: ሕሩያን
  chosen: the chosen
  alternatives:
  - the elect
  lexicon: Dillmann
  rationale: The Ge'ez refers to those selected by God. “The chosen” is clear modern
    English; “the elect” remains a viable alternative but carries heavier later theological
    baggage in English.
- source_word: ሣህል
  chosen: mercy
  alternatives:
  - compassion
  - favor
  lexicon: Dillmann
  rationale: “Mercy” best fits divine benevolence shown after judgment and preserves
    the solemn religious tone.
- source_word: ዘአምላክ
  chosen: belong to God
  alternatives:
  - be God's
  - be of God
  lexicon: Dillmann
  rationale: The phrase is concise and possessive in force. “Belong to God” brings
    that sense into natural English without adding words like “people” not explicit
    in the witness.
- source_word: ይሴርሑ
  chosen: will prosper
  alternatives:
  - will succeed
  - will fare well
  lexicon: Dillmann
  rationale: The verb appears to express flourishing or doing well. “Will prosper”
    is idiomatic and fits the sequence of blessing and divine light.
- source_word: ይበርህ ሎሙ ብርሃነ አምላክ
  chosen: the light of God will shine upon them
  alternatives:
  - God's light will shine for them
  - the divine light will shine upon them
  lexicon: Dillmann
  rationale: This preserves the vivid apocalyptic imagery of divine light rather than
    reducing it to a metaphor like “favor.”
theological_decisions:
- issue: How to render ሕሩያን
  chosen_reading: the chosen
  alternative_readings:
  - the elect
  rationale: Both are possible, but “the chosen” preserves the sense without importing
    later doctrinal associations too strongly into this Enochic context.
- issue: How explicit to make ዘአምላክ
  chosen_reading: they will all belong to God
  alternative_readings:
  - they will all be God's
  - they will all be of God
  rationale: The possessive relationship is central to the verse’s theology of divine
    protection and covenantal belonging. This rendering makes that clear without overexpansion.
