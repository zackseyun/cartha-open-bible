translation:
  text: 'And Enoch answered and said: Enoch, a righteous man, whose eyes were opened
    by God, saw the vision of the Holy One in the heavens, which the angels showed
    me. And I heard everything from them, and I understood what I saw—but not for
    this generation, but for a distant one that is to come.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'a holy vision in the heavens.' The Ge'ez wording can be taken
      either as a title, 'the Holy One,' or as an adjective modifying 'vision.'
    reason: alternative_reading
  - marker: b
    text: '''For a distant one that is to come'' refers to a future generation, stressing
      that the revelation concerns people not yet present.'
    reason: cultural_note
lexical_decisions:
- source_word: አውሥአ / ወይቤ
  chosen: answered and said
  alternatives:
  - began to speak
  - responded and said
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired reporting verbs are formulaic and should be preserved rather
    than reduced to a single English verb.
- source_word: ብእሲ ጻድቅ
  chosen: a righteous man
  alternatives:
  - the righteous man
  - a just man
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This straightforwardly identifies Enoch's character. 'Righteous' best
    preserves the moral and theological weight of the term.
- source_word: ዘእምኀበ እግዚአብሔር ... አዕይን ቲሁ ክሡታት
  chosen: whose eyes were opened by God
  alternatives:
  - whose eyes God opened
  - whose eyes had been opened from before the Lord
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause marks divine enabling for visionary sight. Passive English
    is natural and keeps God as the source of the opening.
- source_word: ራእየ ቅዱሰ ዘበሰማያት
  chosen: the vision of the Holy One in the heavens
  alternatives:
  - the vision of the holy one in heaven
  - a holy vision in the heavens
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular form favors 'Holy One' as a title rather than the adjectival
    'holy vision.' This preserves the personal referent and apocalyptic register.
- source_word: ዘአርአዩኒ መላእክት
  chosen: which the angels showed me
  alternatives:
  - that the messengers showed me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Angels'' is the most contextually fitting rendering in this visionary
    setting and preserves the supernatural mediation of the revelation.'
- source_word: ኵሎ
  chosen: everything
  alternatives:
  - all things
  - it all
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Everything'' is clear modern English and fully conveys the comprehensive
    scope.'
- source_word: ርኁቃት
  chosen: a distant one
  alternatives:
  - a far-off generation
  - those far away
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The word carries the sense of remoteness. In context it refers to a future
    generation rather than spatial distance, so the English is completed by the following
    clause 'that is to come.'
theological_decisions:
- issue: Whether ቅዱሰ should be rendered adjectivally ('holy vision') or personally
    ('the Holy One')
  chosen_reading: the vision of the Holy One in the heavens
  alternative_readings:
  - a holy vision in the heavens
  rationale: The singular wording and immediate apocalyptic context favor a personal
    heavenly referent, likely God, rather than merely describing the vision as holy.
- issue: Whether to harmonize the future-generation language with later familiar citation
    traditions
  chosen_reading: not for this generation, but for a distant one that is to come
  alternative_readings:
  - not for this generation but for a future generation
  - not for those now living but for those to come
  rationale: The line is kept close to the Ge'ez and not assimilated to later Jewish
    or Christian echo-texts. The emphasis is on remoteness and futurity.
