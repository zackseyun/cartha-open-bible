translation:
  text: 'Concerning the chosen ones I spoke, and I uttered concerning them: “The Holy
    and Great One will come forth from his dwelling.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'elect.' The Ge'ez term denotes those chosen or selected.
    reason: lexical_alternative
  - marker: b
    text: The verse uses two speech verbs in sequence; the translation preserves both
      rather than reducing them to a single verb.
    reason: cultural_note
lexical_decisions:
- source_word: ኅሩያን
  chosen: chosen ones
  alternatives:
  - elect
  - the chosen
  lexicon: Dillmann
  rationale: A transparent rendering of the Ge'ez term for those selected or chosen.
    'Chosen ones' preserves the local sense without importing later traditional phrasing
    like 'elect' unnecessarily.
- source_word: እቤ
  chosen: I spoke
  alternatives:
  - I said
  lexicon: Dillmann
  rationale: The verb is a basic speech verb. 'I spoke' fits the elevated narrative
    flow while remaining close to the source.
- source_word: ወአውሣእኩ
  chosen: I uttered
  alternatives:
  - I proclaimed
  - I lifted up my speech
  lexicon: Dillmann
  rationale: The second speech verb should be preserved rather than collapsed into
    the first. 'I uttered' keeps the parallelism without over-expanding the line.
- source_word: ይወፅእ
  chosen: will come forth
  alternatives:
  - will go out
  - comes forth
  lexicon: Dillmann
  rationale: '''Will come forth'' preserves the vivid apocalyptic movement from the
    divine dwelling and suits the prophetic tone.'
- source_word: ቅዱስ ወዐቢይ
  chosen: the Holy and Great One
  alternatives:
  - the Holy Great One
  - the Great and Holy One
  lexicon: Dillmann
  rationale: The paired adjectives are kept as titles describing God. 'The Holy and
    Great One' is clear, weighty, and close to the Ge'ez sequence.
- source_word: እማኅደሩ
  chosen: from his dwelling
  alternatives:
  - from his habitation
  - from his abode
  lexicon: Dillmann
  rationale: This preserves the concrete imagery of God's place of abode without flattening
    it into an abstract phrase.
theological_decisions:
- issue: How to render ኅሩያን
  chosen_reading: chosen ones
  alternative_readings:
  - elect
  rationale: The passage should sound like Enoch's own discourse, not later inherited
    Christian diction. 'Chosen ones' is faithful and less tradition-loaded while preserving
    the theological idea of divine selection.
- issue: Order of divine epithets
  chosen_reading: the Holy and Great One
  alternative_readings:
  - the Great and Holy One
  - the Holy Great One
  rationale: The translation preserves both epithets as part of the divine title and
    keeps the appositional solemnity of the line.
