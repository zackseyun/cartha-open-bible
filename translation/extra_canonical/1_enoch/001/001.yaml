translation:
  text: The words of the blessing of Henok, with which he blessed the chosen and righteous
    who will be present in the day of distress, when all the wicked and godless are
    to be swept away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The word of the blessing of Henok.' The Ge'ez heading can be rendered
      with either singular or collective force.
    reason: lexical_alternative
  - marker: b
    text: '''Day of distress'' could also be rendered ''day of tribulation'' or ''day
      of affliction.'''
    reason: lexical_alternative
  - marker: c
    text: The clause about the wicked likely expresses their removal in judgment;
      the Ge'ez form is somewhat difficult and may also be understood 'for the removal
      of all the wicked and godless.'
    reason: alternative_reading
lexical_decisions:
- source_word: ቃለ
  chosen: The words
  alternatives:
  - The word
  - The utterance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although singular in form, it functions naturally as a heading formula
    for a spoken composition; 'The words' reads idiomatically in English while preserving
    the formal superscription tone.
- source_word: በረከት
  chosen: blessing
  alternatives:
  - benediction
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun plainly denotes a blessing, and 'blessing' preserves both the
    religious and literary force without sounding archaic.
- source_word: ዘሄኖክ
  chosen: of Henok
  alternatives:
  - of Enoch
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Names are transliterated rather than translated. 'Henok' stays closer
    to the Ge'ez form supplied in the witness.
- source_word: ኅሩያነ
  chosen: chosen
  alternatives:
  - elect
  - selected
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Chosen'' is clear modern English and avoids importing later theological
    freight that ''elect'' can carry, while still preserving the apocalyptic category.'
- source_word: ጻድቃነ
  chosen: righteous
  alternatives:
  - just
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the standard rendering for the moral-religious category in apocalyptic
    literature and should remain consistent unless context demands otherwise.
- source_word: ሀለዉ ይኩኑ
  chosen: will be present
  alternatives:
  - will be
  - will exist
  - will be living
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sense is prospective existence/presence at the time in view. 'Will
    be present' fits the immediate context of surviving into that eschatological day
    without over-specifying ordinary earthly life.
- source_word: በዕለተ ምንዳቤ
  chosen: in the day of distress
  alternatives:
  - in the day of tribulation
  - in the day of affliction
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to an eschatological time of trouble. 'Distress' preserves
    the severity without simply repeating traditional wording.
- source_word: ለአሰስሎ
  chosen: are to be swept away
  alternatives:
  - to remove
  - for the removal of
  - to destroy
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is difficult, but the clause clearly points to the elimination
    of the wicked. 'Are to be swept away' preserves the judgment sense in vivid apocalyptic
    English.
- source_word: እኩያነ
  chosen: wicked
  alternatives:
  - evil ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard moral designation; 'wicked' is concise and suitably weighty.
- source_word: ረሲዓነ
  chosen: godless
  alternatives:
  - impious
  - ungodly
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes impiety rather than merely general evil. 'Godless' is
    readable and keeps that religious dimension visible.
theological_decisions:
- issue: Rendering of the group blessed by Henok
  chosen_reading: the chosen and righteous
  alternative_readings:
  - the elect and righteous
  rationale: The verse identifies an eschatological community, but the Ge'ez itself
    does not require later doctrinal nuances attached to 'elect.' 'Chosen' preserves
    the category while staying locally grounded in the passage.
