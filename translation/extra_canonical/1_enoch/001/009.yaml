translation:
  text: And behold, he comes with myriads of holy ones to execute judgment upon them,
    and to destroy the wicked, and to rebuke all flesh for all that the sinners and
    the wicked have done against him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Upon them" follows the supplied Ge''ez witness; some textual traditions
      reflected through Greek/Jude point more broadly to "upon all."'
    reason: textual_variant
  - marker: b
    text: '"Holy ones" may denote the heavenly retinue, often understood as angels;
      the wording is left broader in the main text.'
    reason: cultural_note
  - marker: c
    text: This Ge'ez witness uses stronger judgment wording here ("destroy," "rebuke")
      than the better-known wording associated with Jude 14–15, which is closer to
      "convict."
    reason: alternative_reading
lexical_decisions:
- source_word: ወናሁ
  chosen: And behold
  alternatives:
  - And look
  - Behold
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the apocalyptic deictic force that introduces a visionary disclosure.
- source_word: መጽአ
  chosen: he comes
  alternatives:
  - he came
  - he is coming
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A present-style English rendering fits prophetic/apocalyptic vividness
    better than a flat past tense.
- source_word: በትእልፊተ ቅዱሳን
  chosen: with myriads of holy ones
  alternatives:
  - with tens of thousands of holy ones
  - with ten thousand holy ones
  - with myriads of saints
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Myriads" preserves the elevated numerical idiom, and "holy ones" keeps
    the referent broad rather than prematurely narrowing it to Christian-style "saints."'
- source_word: ከመ ይግበር ፍትሐ ላዕሌሆሙ
  chosen: to execute judgment upon them
  alternatives:
  - to do judgment upon them
  - to execute judgment upon all
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Execute judgment" is natural modern English while staying close to
    the judicial force of the Ge''ez. The object "them" follows the provided witness,
    though another textual trajectory reflects "all."'
- source_word: ይሕጕሎሙ ለረሲዓን
  chosen: to destroy the wicked
  alternatives:
  - to punish the wicked
  - to condemn the wicked
  - to convict the ungodly
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez here is stronger than a merely forensic "convict" reading,
    so "destroy" best preserves the judgment scene's force.
- source_word: ይዘልፍ ኵሎ ዘሥጋ
  chosen: to rebuke all flesh
  alternatives:
  - to reprove all flesh
  - to convict all flesh
  - to rebuke everyone
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"All flesh" preserves the biblical-apocalyptic idiom; "rebuke" reflects
    the Ge''ez witness more directly than importing the more familiar "convict."'
- source_word: በእንተ ኵሉ ዘገብሩ
  chosen: for all that ... have done
  alternatives:
  - concerning all that ... did
  - because of everything that ... committed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the causal/judicial sense while reading smoothly in English.
- source_word: ኃጥኣን ወረሲዓን
  chosen: the sinners and the wicked
  alternatives:
  - sinful and wicked ones
  - sinners and ungodly ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains both terms instead of collapsing them into one label, preserving
    the verse's piled-up judgment rhetoric.
theological_decisions:
- issue: Identity of the 'holy ones'
  chosen_reading: holy ones
  alternative_readings:
  - saints
  - angels
  rationale: The phrase likely refers to a heavenly retinue, but the verse itself
    does not force a narrower label. "Holy ones" preserves the apocalyptic ambiguity
    without back-reading later tradition.
- issue: Whether to align the verse with Jude's more familiar wording
  chosen_reading: Follow the Ge'ez witness's stronger judgment language ('destroy,'
    'rebuke') in the main text
  alternative_readings:
  - Use 'convict' throughout to match the Greek/Jude trajectory
  rationale: Project rules require translating the supplied Ge'ez witness rather than
    harmonizing to later New Testament citation forms. The alternative is important
    enough to preserve in notes.
