translation:
  text: And the earth will be torn apart, and everything in the earth will be destroyed,
    and judgment will come upon all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the earth' / 'upon the earth' for 'in the earth.'
    reason: lexical_alternative
  - marker: b
    text: The verb for the earth's fate may also be understood more generally as violent
      shaking or splitting.
    reason: lexical_alternative
lexical_decisions:
- source_word: ትሠጠጥ
  chosen: will be torn apart
  alternatives:
  - will be split apart
  - will be shaken
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb depicts violent upheaval affecting the earth itself. 'Will be
    torn apart' preserves the apocalyptic force without reducing it to a mere tremor;
    'will be shaken' remains possible if the underlying sense is read more broadly.
- source_word: ዘውስተ ምድር
  chosen: in the earth
  alternatives:
  - upon the earth
  - on the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez preposition most plainly means 'in/within.' I kept that sense
    in the main text for transparency, while noting the more idiomatic 'upon/on the
    earth' as an alternative often favored in context.
- source_word: ይትሐጐል
  chosen: will be destroyed
  alternatives:
  - will perish
  - will be consumed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb signals ruin befalling all within the earth. 'Will be destroyed'
    is clear and weighty; 'will perish' is also viable and slightly more traditional.
- source_word: ፍትሕ
  chosen: judgment
  alternatives:
  - justice
  - righteous judgment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this line the noun denotes a judicial act coming 'upon all,' not an
    abstract quality. 'Judgment' best matches the immediate apocalyptic setting.
- source_word: ላዕለ ኵሉ
  chosen: upon all
  alternatives:
  - over all
  - against all
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks the universal scope of the coming judgment. 'Upon all'
    preserves that formal, prophetic force.
theological_decisions:
- issue: Whether ፍትሕ here should be rendered as 'judgment' or the more general 'justice.'
  chosen_reading: judgment
  alternative_readings:
  - justice
  rationale: Because the phrase describes something that 'will come upon all,' the
    context points to an enacted judicial event rather than an abstract moral principle.
