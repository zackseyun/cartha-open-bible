translation:
  text: And all will fear, and the vigilant will tremble, and fear and great trembling
    will seize them to the ends of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Watchers,' if the term here is functioning as the Enochic title
      for the angelic beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይፈርሁ
  chosen: and ... will fear
  alternatives:
  - and they will be afraid
  - and all will fear
  lexicon: Dillmann Lexicon
  rationale: Future-like narrative sequence with broad scope; rendered with simple
    future to preserve apocalyptic proclamation.
- source_word: ኵሉ
  chosen: all
  alternatives:
  - everyone
  - the whole of them
  lexicon: Dillmann Lexicon
  rationale: Kept as the broad collective subject rather than narrowing to a subgroup.
- source_word: ወይደለቀለቁ
  chosen: and ... will tremble
  alternatives:
  - and ... will quake
  - and ... will be shaken
  lexicon: Dillmann Lexicon
  rationale: '''Tremble'' preserves bodily fear imagery without overexpanding the
    verb.'
- source_word: ትጉሃን
  chosen: the vigilant
  alternatives:
  - the watchers
  - those who are wakeful
  lexicon: Dillmann Lexicon
  rationale: The Ge'ez adjective/noun can denote wakeful ones; 'the vigilant' preserves
    the lexical sense while allowing a footnote noting the possible traditional rendering
    'Watchers.'
- source_word: ወይነሥኦሙ
  chosen: will seize them
  alternatives:
  - will take hold of them
  - will overtake them
  lexicon: Dillmann Lexicon
  rationale: A forceful verb was preferred to keep the judgment scene vivid and concrete.
- source_word: ፍርሃት
  chosen: fear
  alternatives:
  - terror
  lexicon: Dillmann Lexicon
  rationale: Basic term for fear; paired with the next noun for intensification.
- source_word: ወረዓድ ዓቢይ
  chosen: and great trembling
  alternatives:
  - and great shaking
  - and great terror
  lexicon: Dillmann Lexicon
  rationale: Retains the doubled fear-language rather than collapsing it into a single
    English term.
- source_word: እስከ አጽናፈ ምድር
  chosen: to the ends of the earth
  alternatives:
  - unto the extremities of the earth
  - to earth's far borders
  lexicon: Dillmann Lexicon
  rationale: A natural but elevated English rendering of the cosmic extent formula.
theological_decisions:
- issue: Identity of ትጉሃን
  chosen_reading: the vigilant
  alternative_readings:
  - the Watchers
  - the wakeful ones
  rationale: The immediate Ge'ez witness supports a term for wakeful/vigilant beings.
    Because 'Watchers' is an important Enochic technical term, that alternative is
    preserved in a footnote rather than assumed in the main text.
