translation:
  text: And the high mountains will be shaken, and the high hills will be brought
    low, and they will melt like wax before the flame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Will be brought low” could also be rendered “will sink down” or “will be
      humbled”; the Ge'ez allows a lowering image that may carry judgment overtones.
    reason: lexical_alternative
  - marker: b
    text: 'The final simile is explicit: the heights melt “like wax before the flame,”
      preserving the verse’s cosmic judgment imagery rather than reducing it to a
      general statement of fear.'
    reason: cultural_note
lexical_decisions:
- source_word: ይደነግፁ
  chosen: will be shaken
  alternatives:
  - will quake
  - will tremble
  lexicon: Leslau, Comparative Dictionary of Ge'ez; Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys violent disturbance rather than a mild movement. “Will
    be shaken” is clear, elevated English and preserves the apocalyptic force.
- source_word: አድባር
  chosen: mountains
  alternatives:
  - mountain heights
  lexicon: Leslau, Comparative Dictionary of Ge'ez; Dillmann, Lexicon Linguae Aethiopicae
  rationale: The ordinary sense is mountainous heights or mountains; “mountains” is
    the most natural English rendering here.
- source_word: ነዋኀን
  chosen: high
  alternatives:
  - lofty
  - exalted
  lexicon: Leslau, Comparative Dictionary of Ge'ez; Dillmann, Lexicon Linguae Aethiopicae
  rationale: This adjective marks elevation. “High” is direct and keeps the parallelism
    with the following phrase about the hills.
- source_word: ይቴሐቱ
  chosen: will be brought low
  alternatives:
  - will be humbled
  - will sink down
  lexicon: Leslau, Comparative Dictionary of Ge'ez; Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sense is not merely physical motion but lowering. “Will be brought
    low” preserves both the physical image and possible judgment resonance.
- source_word: አውግር
  chosen: hills
  alternatives:
  - hill-country
  - ridges
  lexicon: Leslau, Comparative Dictionary of Ge'ez; Dillmann, Lexicon Linguae Aethiopicae
  rationale: In parallel with “mountains,” “hills” fits the poetic scaling of the
    landscape.
- source_word: ይትመሰዉ
  chosen: will melt
  alternatives:
  - will dissolve
  - will liquefy
  lexicon: Leslau, Comparative Dictionary of Ge'ez; Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The following simile controls the meaning: the hills behave like wax
    near fire. “Will melt” is the most idiomatic and precise choice.'
- source_word: መዓረ
  chosen: wax
  alternatives:
  - beeswax
  lexicon: Leslau, Comparative Dictionary of Ge'ez; Dillmann, Lexicon Linguae Aethiopicae
  rationale: The simile is a standard image of softening before heat; “wax” is the
    straightforward rendering.
- source_word: ግራ እምላህብ
  chosen: before the flame
  alternatives:
  - before fire
  - from before the flame
  lexicon: Leslau, Comparative Dictionary of Ge'ez; Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase expresses immediate exposure to burning heat. “Before the
    flame” preserves the vivid image better than the more generic “before fire.”
theological_decisions:
- issue: Whether to render the lowering of the hills in purely physical terms or with
    judgment resonance
  chosen_reading: will be brought low
  alternative_readings:
  - will sink down
  - will be humbled
  rationale: The verse depicts cosmic upheaval in the Lord’s approach. “Will be brought
    low” keeps the terrain image while allowing the apocalyptic theme of proud heights
    reduced before divine presence.
