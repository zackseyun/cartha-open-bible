translation:
  text: And the God of eternity will tread from there upon Mount Sinai, and he will
    be seen in his appearance, and he will be seen in the strength of his power from
    heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'from there' likely links this verse to the previous line's 'from
      his dwelling,' preserving the movement of the divine theophany.
    reason: cross_reference
  - marker: b
    text: The middle clause is textually difficult in OCR witnesses. This draft follows
      the provided Ge'ez reading 'in his appearance' rather than replacing it with
      a smoother traditional rendering.
    reason: textual_variant
  - marker: c
    text: Dillmann's Ethiopic transcription supports the sense 'in the strength of
      his power,' clarifying the Charles OCR's compressed wording.
    reason: textual_variant
lexical_decisions:
- source_word: አምላከ ዓለም
  chosen: the God of eternity
  alternatives:
  - the eternal God
  - the God of the world
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez construct naturally yields 'God of eternity/world.' In this
    apocalyptic-theophanic context, 'eternity' fits better than 'world' and preserves
    the elevated force without collapsing the phrase into a mere adjective.
- source_word: እምህየ
  chosen: from there
  alternatives:
  - there
  - from here
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional form most naturally means 'from there.' It likely points
    back to the holy one's dwelling in the previous verse, so the draft keeps the
    spatial linkage explicit.
- source_word: ይከይድ
  chosen: will tread
  alternatives:
  - will go
  - will walk
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A stronger verb than simple 'go' suits the theophanic movement onto Sinai
    and preserves the solemn, visionary tone.
- source_word: በትዕይንቱ
  chosen: in his appearance
  alternatives:
  - in his manifestation
  - in his visible form
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun is related to seeing/appearance. 'Appearance' is the most transparent
    rendering, even though it sounds deliberately formal in English.
- source_word: በኃይለ ጽንዑ
  chosen: in the strength of his power
  alternatives:
  - with mighty power
  - in the might of his strength
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase intensifies divine force through near-synonymous strength
    language. The English keeps that doubled emphasis rather than flattening it to
    a single term.
- source_word: እምሰማይ
  chosen: from heaven
  alternatives:
  - out of heaven
  - from the heavens
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular 'heaven' is sufficiently transparent and fits the witness
    as given.
theological_decisions:
- issue: Whether ዓለም should be rendered 'world' or 'eternity' in the divine title
  chosen_reading: the God of eternity
  alternative_readings:
  - the eternal God
  - the God of the world
  rationale: The verse depicts a Sinai theophany, so the title functions as an exalted
    divine designation rather than a statement about creation alone. 'God of eternity'
    preserves the construct while keeping the transcendent emphasis.
