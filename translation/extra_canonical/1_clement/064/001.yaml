id: 1CLEM.64.1
reference: 1 Clement 64:1
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Λοιπὸν ὁ παντεπόπτης θεὸς καὶ δεσπότης τῶν πνευμάτων καὶ κύριος πάσης σαρκός,
    ὁ ἐκλεξάμενος τὸν κύριον Ἰησοῦν Χριστὸν καὶ ἡμᾶς διʼ αὐτοῦ εἰς λαὸν περιούσιον,
    δῴη πάσῃ ψυχῇ ἐπικεκλημένῃ τὸ μεγαλοπρεπὲς καὶ ἅγιον ὄνομα αὐτοῦ πίστιν, φόβον,
    εἰρήνην, ὑπομονὴν καὶ μακροθυμίαν, ἐγκράτειαν, ἁγνείαν καὶ σωφροσύνην, εἰς εὐαρέστησιν
    τῷ ὀνόματι αὐτοῦ διὰ τοῦ ἀρχιερέως καὶ προστάτου ἡμῶν Ἰησοῦ Χριστοῦ, διʼ οὗ αὐτῷ
    δόξα καὶ μεγαλωσύνη, κράτος καὶ τιμή, καὶ νῦν καὶ εἰς πάντας τοὺς αἰῶνας τῶν αἰώνων.
    ἀμήν.
  language: Greek
translation:
  text: Finally, may the all-seeing God and Master of spirits and Lord of all flesh,
    who chose the Lord Jesus Christ and us through him to be a people for his own
    possession, grant to every soul called by his magnificent and holy name faith,
    fear, peace, endurance and patience, self-control, purity, and sound judgment,
    for pleasing his name through our high priest and protector Jesus Christ, through
    whom be glory and majesty, might and honor to him, both now and for all the ages
    of ages. Amen.
  philosophy: optimal-equivalence
