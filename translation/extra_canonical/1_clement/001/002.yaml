id: 1CLEM.1.2
reference: 1 Clement 1:2
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: τίς γὰρ παρεπιδημήσας πρὸς ὑμᾶς τὴν πανάρετον καὶ βεβαίαν ὑμῶν πίστιν οὐκ
    ἐδοκίμασεν; τήν τε σώφρονα καὶ ἐπιεικῆ ἐν Χριστῷ εὐσέβειαν οὐκ ἐθαύμασεν; καὶ
    τὸ μεγαλοπρεπὲς τῆς φιλοξενίας ὑμῶν ἦθος οὐκ ἐκήρυξεν; καὶ τὴν τελείαν καὶ ἀσφαλῆ
    γνῶσιν οὐκ ἐμακάρισεν;
  language: Greek
translation:
  text: For who, after staying among you, did not approve your all-virtuous and steadfast
    faith? Who did not admire your sober and gentle godliness in Messiah? Who did
    not proclaim the magnificent character of your hospitality? And who did not count
    blessed your complete and sure knowledge?
  philosophy: optimal-equivalence
