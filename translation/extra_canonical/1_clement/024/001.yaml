translation:
  text: 'Let us consider, beloved, how the Master continually shows us that the coming resurrection will take place, of which he made the Lord Jesus Messiah the firstfruits by raising him from the dead. Let us observe, beloved, the resurrection that takes place in its appointed season. Day and night show us a resurrection: the night falls asleep, and the day rises; the day departs, and night comes on. Let us take the crops as an example: how and in what way does the sowing take place? The sower went out and cast each of the seeds into the ground, and when they fall into the ground, dry and bare, they decay; then from that decay the greatness of the Master''s providence raises them up, and from one many grow and bring forth fruit.'
