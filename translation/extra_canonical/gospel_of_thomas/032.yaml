translation:
  text: Jesus said, “A city built on a mountain, made fast, cannot be toppled by human
    force, nor can it be hidden.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: “Made fast” renders ϫⲟⲥⲉ, which can also be translated “fortified” or “made
      secure.”
    reason: lexical_alternative
  - marker: '2'
    text: The verb ⲧⲁϫⲣⲟ can mean “fall” or “cause to fall”; with the following ⲙⲛ̄ϭⲟⲙ
      ⲛ̄ⲥϩⲉ, the passive nuance “be toppled” is likely.
    reason: lexical_alternative
  - marker: '3'
    text: Greek POxy 1 reads “on the top of a high mountain” and does not include
      “by human force.” The Coptic has simply “on a mountain” and explicitly “by the
      strength of a person.”
    reason: textual_variant
  - marker: '4'
    text: Cf. Matt 5:14 (“a city set on a hill cannot be hidden”), a canonical parallel;
      wording and details differ from Thomas.
    reason: cross_reference
lexical_decisions:
- source_word: ⲡⲟⲗⲓⲥ
  chosen: city
  alternatives:
  - town
  lexicon: Crum; Greek loanword (polis) in Coptic
  rationale: Common rendering of the Greek loanword; no contextual pressure to choose
    a smaller settlement term.
- source_word: ⲉⲩⲕⲱⲧ ⲙ̄ⲙⲟⲥ
  chosen: built
  alternatives:
  - they built it
  - has been built
  lexicon: Layton, Coptic Grammar (agentless 3pl construction); Crum s.v. ⲕⲱⲧ
  rationale: Coptic 3pl impersonal often functions as a passive; English “built” conveys
    the agentless sense without over-specifying an agent.
- source_word: ϩⲓϫⲛ̄ⲟⲩⲧⲟⲟⲩ
  chosen: on a mountain
  alternatives:
  - upon a mountain
  lexicon: Crum s.v. ⲧⲟⲟⲩ
  rationale: The Coptic lacks an adjective for height; translating simply “on a mountain”
    follows the Coptic against the Greek witness’s “high.”
- source_word: ϫⲟⲥⲉ
  chosen: made fast
  alternatives:
  - fortified
  - made secure
  - firmly founded
  lexicon: Crum s.v. ϫⲟⲥⲉ/ϫⲟⲥⲓ; Lambdin §197
  rationale: Verb meaning to make firm/secure; “made fast” captures the concrete,
    slightly archaic tone and aligns with the semantic field without importing later
    theological nuance.
- source_word: ⲧⲁϫⲣⲟ
  chosen: be toppled
  alternatives:
  - fall
  - be made to fall
  - collapse
  lexicon: Crum s.v. ⲧⲁϫⲣⲟ (to fall, cause to fall)
  rationale: Given the following instrumental phrase “by human force,” a causative/passive
    nuance (“be toppled”) fits better than simple intransitive “fall.”
- source_word: ⲙⲛ̄ϭⲟⲙ ⲛ̄ⲥϩⲉ
  chosen: by human force
  alternatives:
  - by the strength of a man
  - by human strength
  lexicon: Crum s.v. ϭⲟⲙ (strength, power); Crum s.v. ⲥϩⲉ (person, man)
  rationale: Preposition ⲙⲛ̄ marks instrument/means; genitival ⲛ̄ⲥϩⲉ specifies human
    agency. English “human” avoids gendered singular while preserving sense.
- source_word: ⲥⲛⲁϣϩⲱⲡ
  chosen: can be hidden
  alternatives:
  - will be hidden
  - be able to be hidden
  lexicon: Layton §294–297 (ⲥⲛⲁ- potential/future of ability); Crum s.v. ϣϩⲱⲡ
  rationale: ⲥⲛⲁ- signals potential/ability; render with “can.” Combined with final
    negation, “cannot be hidden.”
- source_word: ⲟⲩⲇⲉ … ⲁⲛ/ⲟⲛ
  chosen: nor … not
  alternatives:
  - nor … at all
  lexicon: Layton §185, §209 (negative scope; use of ⲟⲛ in negation)
  rationale: Coptic coordinates a second negative clause with ⲟⲩⲇⲉ; sentence-final
    ⲁⲛ/ⲟⲛ carries the negation; scope understood over both coordinated predicates
    in this aphoristic style.
textual_note: 'Dialect/orthography: The manuscript has the agentless 3pl ⲉⲩⲕⲱⲧ ⲙ̄ⲙⲟⲥ
  (“they built it”), a common impersonal passive in Sahidic/Lycopolitan usage. The
  verb ϫⲟⲥⲉ (“to make firm/secure”) appears as ⲉϥϫⲟⲥⲉ in the manuscript; Dilley’s
  normalized lemmatization expands several clauses with independent pronouns within
  relative constructions (ⲉⲣⲉ…ⲛⲧⲟⲥ…), but no semantic change is implied. The phrase
  ⲙⲛ̄ϭⲟⲙ ⲛ̄ⲥϩⲉ supplies an explicit instrument/means (“by human strength”), which
  is not present in the Greek witness. The final negator appears as ⲁⲛ in the printed
  line-break text, while the normalized lemma shows ⲟⲛ; in Sahidic both can occur
  sentence-finally with nuanced distribution, and here function as the negative complement
  of the potential ⲥⲛⲁ- form. No lacunae or restorations are indicated in Dilley for
  this saying.'
