  chosen_basis: coptic
  rationale: 'POxy reads “on the top of a high mountain” and “made fast,” and lacks
    the Coptic’s explicit “by human force.” We translate the base Coptic: “on a mountain
    … by human force.” We note the Greek’s height specification as a minor difference,
    not altering the core sense.'
