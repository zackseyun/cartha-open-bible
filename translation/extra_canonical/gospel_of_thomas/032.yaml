  handling: context_only
  rationale: We did not harmonize to Matthew’s “on a hill” or omit Thomas’s “by human
    force.” The canonical saying served only as contextual awareness.
revision_risk_note: 'Key review points: (1) Whether to include “high” for the mountain—this
  draft follows the Coptic against the Greek POxy’s “high.” (2) The scope of the negation:
  this translation takes the sentence-final negation to govern both predicates (“cannot
  be toppled … nor be hidden”). (3) Rendering of ⲙⲛ̄ϭⲟⲙ ⲛ̄ⲥϩⲉ as instrumental (“by
  human force”); confirm this is preferable to omitting or softening the phrase. (4)
  Choice of “made fast” for ϫⲟⲥⲉ retains the terse, concrete register; consider “fortified”
  if a reviewer prefers more idiomatic English.'
