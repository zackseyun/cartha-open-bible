translation:
  text: 'Jesus said, From Adam up to John the Baptist, among those born of women,
    no one is greater than John the Baptist. But I myself say: whoever among you becomes
    a little child will know the kingship, and he will become greater than John.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Coptic has ϩⲛ ⲡϫⲡⲟ ⲛ ⲡⲥϩⲓⲙⲉ, literally “in the womb of the woman/women,”
      an idiom for human birth; hence “born of women.”
    reason: cultural_note
  - marker: b
    text: The codex line reads ⲛϭⲓⲡⲉϥⲃⲁⲗ ⲁⲉⲓϫⲟⲟⲥ (“as for his heart, [it] will be
      broken?”). Dilley normalizes to ⲛϭⲓⲡⲉϥⲃⲁⲗ ⲁⲁⲛⲟⲕϫⲱⲛⲧⲟⲥ (“as for his heart, I
      indeed say”). I translate following the normalized sense but note the variant,
      which could be construed “so that his heart not be broken.”
    reason: textual_variant
  - marker: c
    text: ⲡⲙⲛⲧⲣⲣⲟ is rendered “kingship” to stress the abstract reign/sovereignty;
      “kingdom” is an acceptable alternative.
    reason: lexical_alternative
  - marker: d
    text: ⲉⲓⲣⲉ ⲛ ⲕⲟⲩⲓ is literally “make/do small,” idiomatically “become a little
      one/child.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ϫⲓⲛⲁⲇⲁⲙ … ϣⲁ ⲓⲱϩⲁⲛⲛⲏⲥ
  chosen: from Adam … up to John
  alternatives:
  - since Adam … until John
  lexicon: Lambdin; Crum (ϫⲓⲛ = from; ϣⲁ = to, until)
  rationale: 'ϫⲓⲛ marks origin and ϣⲁ marks limit; idiomatic English renders temporal
    span as “from … up to …”. '
- source_word: ϩⲛ ⲡϫⲡⲟ ⲛ ⲡⲥϩⲓⲙⲉ
  chosen: among those born of women
  alternatives:
  - in the womb of women
  lexicon: Crum (ϫⲡⲟ = belly, womb); Lambdin (ϩⲛ = in)
  rationale: Literal “in the womb of the woman/women” is an idiom for human birth;
    “born of women” is the conventional idiomatic equivalent while preserving the
    Coptic imagery.
- source_word: ⲟⲩⲱϭⲡ (in ⲛⲛⲉ…ⲟⲩⲱϭⲡ)
  chosen: greater
  alternatives:
  - exalted
  - superior
  lexicon: Crum (ⲟⲩⲱϭ, ⲱϭ = great)
  rationale: Context requires a comparative of status/importance; ‘greater’ captures
    the sense of exaltation without over-interpretation.
- source_word: ⲛϭⲓ ⲡⲉϥⲃⲁⲗ
  chosen: '[concerning his heart]'
  alternatives:
  - his heart
  - in his heart
  lexicon: Crum (ⲃⲁⲗ = heart, mind); Layton (ⲛϭⲓ topical marker)
  rationale: The phrase is a topical marker introducing ‘his heart’; it is textually
    difficult here. I register it as a bracketed note rather than force it into English
    syntax.
- source_word: ϫⲱⲛⲧⲟⲥ
  chosen: indeed
  alternatives:
  - truly
  - certainly
  lexicon: Layton; Crum
  rationale: Adverbial particle intensifying assertion; rendered as “I myself …” in
    English for emphasis.
- source_word: ⲡⲉⲧⲉⲣⲉⲛⲁϣⲱⲡⲉ ϩⲛ ⲛⲧⲱⲧⲛ
  chosen: whoever among you becomes
  alternatives:
  - the one who will become among you
  lexicon: Layton (relative clause ⲡⲉⲧⲉⲣⲉ… future sense)
  rationale: Relative future construction; “whoever … becomes” is concise and idiomatic.
- source_word: ⲉⲓⲣⲉ ⲛ ⲕⲟⲩⲓ
  chosen: becomes a little child
  alternatives:
  - becomes small
  - makes himself small
  lexicon: Crum (ⲕⲟⲩⲓ = small, little); Lambdin (ⲉⲓⲣⲉ n = make, do, become with predicate)
  rationale: Thomasine usage favors child imagery; ‘becomes a little child’ reflects
    both literal ‘small’ and conventional sense.
- source_word: ⲥⲟⲟⲩⲛ
  chosen: know
  alternatives:
  - recognize
  - understand
  lexicon: Crum
  rationale: Basic cognitive verb ‘know’; no need to over-interpret.
- source_word: ⲡⲙⲛⲧⲣⲣⲟ
  chosen: the kingship
  alternatives:
  - the kingdom
  - the reign
  lexicon: Crum (ⲙⲛⲧ- abstract noun; ⲣⲣⲟ = king)
  rationale: Abstract ‘kingship’ preserves Thomas’s conceptual nuance (domain/sovereignty)
    rather than a territorial ‘kingdom’; ‘kingdom’ is a valid alternative.
- source_word: ϫⲓⲥⲉ (ⲛⲧⲟϥ ⲛⲁ ϫⲓⲥⲉ ⲉ ⲓⲱϩⲁⲛⲛⲏⲥ)
  chosen: will become greater than John
  alternatives:
  - will be exalted above John
  lexicon: Crum (ϫⲓⲥⲉ = become great)
  rationale: Comparative construction with ⲉ introduces the standard ‘greater than’
    sense.
textual_note: 'Dialect: Sahidic with Lycopolitan coloring. No lacunae are marked by
  Dilley in this saying, but there are orthographic/normalization issues. Dilley’s
  normalized text reads ⲙⲛⲡⲉⲧⲉⲣⲉϫⲓⲥⲉ where the codex line (printed) shows ⲙⲛ̄ⲡⲉⲧϫⲟⲥⲉ,
  and normalized ⲁⲁⲛⲟⲕϫⲱⲛⲧⲟⲥ in place of the printed ⲁⲉⲓϫⲟⲟⲥ. The latter yields a
  different sense (“that his heart be broken”) if taken at face value (with ⲛϭⲓⲡⲉϥⲃⲁⲗ),
  whereas the normalized reading gives “But I indeed say…”. I have translated in line
  with the normalized text, flagging the ‘his heart’ topical marker as a difficult
  element. No Oxyrhynchus Greek fragment overlaps logion 46.'
