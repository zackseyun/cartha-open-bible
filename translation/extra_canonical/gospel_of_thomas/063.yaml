synoptic_parallel_check:
  parallels:
  - Luke 12:16–21
  handling: intentional_divergence
  rationale: 'Thomas’s version lacks the ‘tear down/build bigger barns’ and the explicit
    divine rebuke (‘Fool!’). It foregrounds the man’s internal reasoning and ends
    tersely: ‘that night he died.’ Translation follows the Coptic diction rather than
    harmonizing to Luke.'
revision_risk_note: 'Key items for review: (1) ⲧⲱⲱϭⲉ interpreted as ‘plant’ rather
  than ‘build’; if alternative lexicography suggests ‘build,’ reevaluate the sequence.
  (2) Choice of ‘money’ for ⲭⲣⲏⲙⲁ vs. ‘wealth.’ (3) Rendering of the clause ‘in that
  night, he died’ from ⲡⲟⲩϣⲏ ⲉⲧⲉⲣⲉⲙⲙⲁⲩ… for temporal specificity. (4) Preservation
  of the repeated ‘I will …’ rhythm and whether punctuation best conveys Thomas’s
  cadence.'
