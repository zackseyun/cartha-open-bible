translation:
  text: 'Jesus said, “Look: a sower went out, he filled his hand, and he threw. Some
    indeed fell on the path; the birds came and pecked them up. Others fell on the
    rock; they did not take root in the soil, and they did not set an ear up toward
    the sky. Others fell on the thorns; they choked the sprout, and a worm ate them.
    And others fell on the good soil and it gave good fruit up toward the sky: it
    yielded sixty per measure and a hundred twenty per measure.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: ‘Filled his hand’ is a Coptic idiom for taking a handful of seed.
    reason: cultural_note
  - marker: '2'
    text: The verb rendered ‘pecked them up’ (ⲕⲱⲧ) literally means ‘pick up, gather’;
      with birds and seed the image is pecking up fallen grain.
    reason: lexical_alternative
  - marker: '3'
    text: ‘Set an ear up toward the sky’ preserves the concrete agrarian image (ⲧⲉⲩⲉ
      = ear/head of grain). Alternatives include ‘sprout upward’ or ‘produce a head
      of grain.’
    reason: lexical_alternative
  - marker: '4'
    text: The phrase ‘a worm ate them’ is a Thomasine detail absent from the Synoptic
      parable.
    reason: cross_reference
  - marker: '5'
    text: The Coptic text simply lists the figures ‘sixty … a hundred twenty’; ‘per
      measure’ is supplied for English clarity and is not an attempt to harmonize
      with the Synoptic ‘thirty/sixty/hundred.’
    reason: cultural_note
  - marker: '6'
    text: The noun ⲡϭⲣⲟϭ is rendered ‘sprout’; other possibilities are ‘shoot,’ ‘crop,’
      or ‘seedling.’ Context favors an early-stage plant being choked by thorns.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲉⲓⲥϩⲏⲏⲧⲉ
  chosen: Look
  alternatives:
  - Behold
  lexicon: Crum; Layton
  rationale: Interjection used to draw attention; “Look” keeps Thomas’s sharp, direct
    tone without biblical archaism.
- source_word: ⲡⲉⲧⲉⲣⲉⲥⲓⲧⲉ
  chosen: a sower
  alternatives:
  - the one who sows
  lexicon: Crum (ⲥⲓⲧⲉ ‘to sow’); Layton (relative forms)
  rationale: Relative construction meaning ‘the one who sows’; idiomatically “a sower.”
- source_word: ⲙⲉϩⲧⲟⲟⲧϥ
  chosen: filled his hand (took a handful)
  alternatives:
  - filled his hand
  - took a fistful
  lexicon: Crum (ⲙⲉϩ ‘fill’; ⲧⲟⲟⲧ ‘hand’); Lambdin (idioms)
  rationale: Idiomatic expression for taking a handful; retained the concrete image
    with a brief gloss in English.
- source_word: ⲛⲟⲩϫⲉ
  chosen: threw (scattered)
  alternatives:
  - cast
  - scattered
  lexicon: Crum
  rationale: Basic sense ‘throw’; in sowing context implies scattering.
- source_word: ⲡϩⲓⲏ
  chosen: path
  alternatives:
  - road
  - way
  lexicon: Crum
  rationale: Common term for a path/road; “path” fits sowing scene tightly.
- source_word: ⲡϩⲁⲗⲏⲧ
  chosen: birds
  alternatives:
  - birds of the air
  lexicon: Crum
  rationale: Plain “birds” preserves Thomas’s terseness.
- source_word: ⲕⲱⲧϥ (scribal ⲕⲁⲧϥⲟⲩ)
  chosen: pecked them up
  alternatives:
  - picked them up
  - gathered them
  lexicon: Crum (ⲕⲱⲧ ‘pick up, gather’); dialect note on spelling
  rationale: Birds ‘peck up’ sown seed; vivid and context-accurate. The scribal spelling
    reflects the same verb.
- source_word: ⲡⲡⲉⲧⲣⲁ
  chosen: the rock
  alternatives:
  - rocky ground
  - bedrock
  lexicon: Greek loan; Crum
  rationale: Direct rendering of Greek loanword ‘rock’ keeps the starkness.
- source_word: ϫⲓ ⲛⲟⲩⲛⲉ
  chosen: take root
  alternatives:
  - strike root
  - put down roots
  lexicon: Crum (ⲛⲟⲩⲛⲉ ‘root’; ϫⲓ ‘take’)
  rationale: Standard idiom “take root” fits agricultural image.
- source_word: ⲧⲉⲩⲉϩⲙⲥ
  chosen: set an ear
  alternatives:
  - form an ear
  - produce a head of grain
  - sprout upward
  lexicon: Crum (ⲧⲉⲩⲉ ‘ear of grain’; ⲉϩⲙⲥ ‘sit’ used idiomatically)
  rationale: Compound idiom for producing the grain head; kept concrete ‘ear’ with
    directional phrase.
- source_word: ⲡⲡⲉ
  chosen: the sky
  alternatives:
  - heaven
  lexicon: Crum
  rationale: Thomas often uses concrete imagery; ‘sky’ preserves earthy tone and contrasts
    with soil below.
- source_word: ⲡϣⲟⲛⲧⲉ
  chosen: thorns
  alternatives:
  - thornbushes
  lexicon: Crum
  rationale: Plain, familiar agricultural element.
- source_word: ⲱϭⲧ
  chosen: choked
  alternatives:
  - strangled
  lexicon: Crum
  rationale: In plant context ‘choked’ is the natural English choice.
- source_word: ⲡϭⲣⲟϭ
  chosen: sprout
  alternatives:
  - shoot
  - crop
  - seed
  lexicon: 'Crum (semantic field: growth/shoot)'
  rationale: Context favors an early-stage plant being choked; ‘sprout’ keeps the
    image concrete without over-specifying.
- source_word: ⲡϥⲛⲧ
  chosen: a worm
  alternatives:
  - grub
  lexicon: Crum
  rationale: Distinctive Thomasine detail; ‘worm’ is precise and stark.
- source_word: ϯⲕⲁⲣⲡⲟⲥ
  chosen: gave fruit
  alternatives:
  - bore fruit
  - produced fruit
  lexicon: Greek loan; Crum
  rationale: Direct, common rendering of the idiom ‘give fruit’ in Coptic.
- source_word: ⲉⲥⲟⲧⲉ / ϣⲉϫⲟⲩⲱⲧ
  chosen: sixty … a hundred twenty
  alternatives:
  - sixty … one hundred twenty
  lexicon: Layton (number expressions); comparative Thomasine usage
  rationale: Consensus reading of Thomas 9’s distinctive yields; retained the two
    figures without harmonizing to Synoptic 30/60/100.
textual_note: 'Dialect and orthography: The saying shows Lycopolitan/Sahidic features.
  Dilley normalizes repeated aorist forms with anto- + 3ms subject (ⲁⲛⲧⲟϥ-), a characteristic
  Lycopolitan preformative sequence. The manuscript’s line at NHAM02.34 lb 6 (printed
  ⲁⲩⲕⲁⲧϥⲟⲩ) reflects a spelling of the verb ⲕⲱⲧ ‘pick up/gather’; Dilley normalizes
  to ⲕⲱⲧϥ with enclitic object and plural subject. The compound ⲧⲉⲩⲉϩⲙⲥ (NHAM02.34
  lb 8–9) is orthographically bound; we take it as ‘set/form an ear (of grain),’ with
  ⲧⲉⲩⲉ ‘ear’ and ⲉϩⲙⲥ ‘sit’ used idiomatically. No codex lacunae are marked by Dilley
  in this saying. Number expression: The final cola (NHAM02.34 lb 12–13) present an
  unusual Thomasine yield—‘sixty’ and ‘a hundred twenty’; the construction lacks an
  explicit ‘per measure’ term, supplied in translation for clarity. We preserve ‘sky’
  for ⲡⲡⲉ and ‘soil’ for ⲡⲕⲁϩ to keep the vertical imagery (soil/sky) that frames
  the growth clauses.'
