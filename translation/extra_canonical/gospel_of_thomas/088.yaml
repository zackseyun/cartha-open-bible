translation:
  text: Jesus said, “The angel will come to you with the prophets, and they will give
    to you what is yours. And you, in turn, give to them; show them what you have
    in your hands, and say, ‘On what day will they come to take what is theirs?’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲁⲅⲅⲉⲗⲟⲥ may be translated ‘messenger’ (Gk ἄγγελος); I render ‘angel’ here
      to keep the likely heavenly connotation alongside ‘prophets.’
    reason: lexical_alternative
  - marker: b
    text: ⲧⲁⲁⲩ ⲛⲁⲩ is literally ‘show them’; many smooth this with the preceding imperative
      as ‘give them what you have,’ but the Coptic uses both ‘give’ and ‘show’ in
      close succession.
    reason: lexical_alternative
  - marker: c
    text: ⲁϣ ⲛ̄ϩⲟⲟⲩ is literally ‘what day’; hence ‘On what day’ rather than a smoothed
      ‘when.’
    reason: cultural_note
  - marker: d
    text: The initial subject is singular in Dilley’s normalized text (‘the angel’)
      though some editors/readings take it as plural (‘angels’). I retain the singular
      here.
    reason: textual_variant
lexical_decisions:
- source_word: ⲁⲅⲅⲉⲗⲟⲥ
  chosen: angel
  alternatives:
  - messenger
  lexicon: Crum s.v. ⲁⲅⲅⲉⲗⲟⲥ; Layton, Coptic Grammar (loan from Gk ἄγγελος)
  rationale: In Thomas this often carries a celestial connotation; with “prophets”
    present, the contrast reads well as heavenly and human figures. “Messenger” is
    possible but less likely in this collocation.
- source_word: ϣⲁⲛⲧⲱⲧⲛ (ⲉⲓ ϣⲁⲛⲧⲱⲧⲛ)
  chosen: will come to you
  lexicon: Layton, Grammar §78 (ϣⲁⲛ- future); Lambdin §141
  rationale: ϣⲁⲛ- marks future; ⲧⲱⲧ/ⲧⲱⲧⲛ ‘come’ with pronominal object ‘to you’ is
    straightforward.
- source_word: ⲙⲛ
  chosen: with
  lexicon: Crum s.v. ⲙⲛ; Lambdin §70
  rationale: Comitative preposition; no idiomatic pressure to render otherwise.
- source_word: ⲥⲉⲛⲁϯ / ⲛⲧⲟⲟⲩⲛⲁϯ
  chosen: they will give
  lexicon: Crum s.v. ϯ; Layton, Grammar §78
  rationale: Plural future with auxiliary ⲛⲁ-; subject is the coordinated ‘angel …
    with the prophets’ understood collectively.
- source_word: ⲛ̄ⲛⲉⲧⲉⲩⲛ̄ⲧⲏⲧⲛ̄ⲥⲉ
  chosen: the things that are yours
  alternatives:
  - what belongs to you
  - what is yours
  lexicon: Layton, Coptic in 20 Lessons §27 (relative ⲛⲉⲧⲉ-); Crum s.v.
  rationale: Relative construction ⲛⲉⲧⲉ- with suffixed pronoun ‘your (pl.)’; preserves
    plurality of ‘things’ while allowing idiomatic English.
- source_word: ϩⲱⲧⲧⲏⲩⲧⲛ
  chosen: in turn
  alternatives:
  - likewise
  - also
  lexicon: Crum s.v. ϩⲱⲧⲧⲏⲩ (adv.), with -ⲧⲛ 2pl
  rationale: Adverbial marker of reciprocity; ‘in turn’ best captures the responsive
    nuance without smoothing.
- source_word: ϯ (implied in normalized text)
  chosen: give
  lexicon: Crum s.v. ϯ; Lambdin §34
  rationale: The normalized text includes an imperative sense addressed to the disciples;
    I render it explicitly in English to track the verb present in the Coptic sequence.
- source_word: ⲧⲁⲁⲩ ⲛⲁⲩ
  chosen: show them
  alternatives:
  - make them see
  - display to them
  lexicon: Crum s.v. ⲧⲁⲁⲩ
  rationale: ⲧⲁⲁⲩ is ‘to show, let see’; I keep ‘show’ rather than conflating with
    ‘give’ to preserve the double imperative present in the clause.
- source_word: ⲛ̄ⲧⲉⲧⲛ̄ϫⲟⲟⲥ
  chosen: what you have
  lexicon: Crum s.v. ϫⲟⲟⲥ ‘to have’
  rationale: Relative ⲛ̄ⲧⲉ- + verb ‘have’ yields ‘what you have’—kept literal.
- source_word: ⲛ̄ⲏⲧⲛ̄
  chosen: in your hands
  lexicon: Crum s.v. ⲏⲧ ‘hand’
  rationale: Locative sense is clear; English prepositional rendering is natural.
- source_word: ⲁϣ ⲛ̄ϩⲟⲟⲩ
  chosen: On what day
  alternatives:
  - When
  lexicon: Crum s.v. ϩⲟⲟⲩ ‘day’; Layton §173
  rationale: The idiom literally asks ‘which/what day’; I retain the marked form ‘On
    what day’ to preserve Thomas’s tone rather than smoothing to ‘when’.
- source_word: ⲛ̄ⲥⲉϫⲓ
  chosen: to take
  alternatives:
  - to receive
  lexicon: Crum s.v. ϫⲓ ‘take’
  rationale: Base meaning is ‘take’; ‘receive’ is possible in context, but ‘take’
    keeps the sharper edge.
- source_word: ⲡⲉⲧⲉⲡⲱⲟⲩ
  chosen: what is theirs
  lexicon: Layton §27 (ⲡⲉⲧⲉ- relative + suffixed pronoun)
  rationale: Standard relative construction with 3pl possessive; idiomatic as ‘what
    is theirs.’
textual_note: 'Dialect and orthography: Sahidic with Lycopolitan coloring (e.g., adverb
  ϩⲱⲧⲧⲏⲩⲧⲛ ‘in turn’). The manuscript lineation shows some compressed and orthographically
  difficult clusters (e.g., ⲛⲉⲧⲛ̄ⲧⲟⲧ⳿ⲧⲏⲛⲉ), which Dilley normalizes into a clearer
  sequence of second person plural exhortations. I have reflected both imperatives
  (‘give to them’ and ‘show them’) rather than smoothing them together.

  Initial subject: The printed line has ⲛ̄ⲁⲅⲅⲉⲗⲟⲥ ⲛⲏⲩ, while Dilley’s normalized text
  reads ⲡⲁⲅⲅⲉⲗⲟⲥ ⲉⲓ ϣⲁⲛⲧⲱⲧⲛ (‘the angel will come to you’) with ⲙⲛ ⲡⲡⲣⲟⲫⲏⲧⲏⲥ (‘with
  the prophets’). I follow the normalized singular ‘angel’; the printed ⲛⲏⲩ may reflect
  a graphic sequence rather than a true plural.

  Final clause: The normalized reading ⲡⲉⲧⲉⲣⲉⲛⲧⲟⲟⲩⲉⲓ corresponds to the printed ⲡⲉⲧⲟⲩⲛ̄ⲛⲏⲩ;
  both convey a relative future ‘the one(s) who will come.’ No lacunae are marked
  by Dilley in this saying, and no conjectural restorations are indicated.'
