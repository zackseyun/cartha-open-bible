revision_risk_note: 'Key review points: (1) Reading the initial ⲙⲛ̄ as the negative
  article ⲙ̄ⲡ- to yield ‘no prophet is acceptable’; (2) interpreting ⲙⲁⲣⲉ-/ⲙⲉⲣⲉⲥⲟⲓⲛ
  as a gnomic negative rather than deontic; (3) retaining the Coptic’s indefiniteness
  in the second clause (‘one work cures’) rather than importing ‘physician’ from POxy;
  and (4) preserving ‘village’ (ϯⲙⲉ) against harmonization to ‘homeland.’'
