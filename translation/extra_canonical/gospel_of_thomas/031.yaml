translation:
  text: Jesus says, A prophet is not acceptable in his village; nor does one work
    cures for those who know him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Village’ renders ϯⲙⲉ, a small settlement; many Synoptic parallels use ‘homeland’/‘hometown’
      (Gk patris). Thomas’s term is more specific.
    reason: cultural_note
  - marker: b
    text: The Greek POxy witness explicitly has ‘a physician’; the Coptic clause is
      periphrastic (‘work cures’) with an indefinite subject. The translation reflects
      the Coptic; the Greek is noted here.
    reason: textual_variant
  - marker: c
    text: ϣⲱⲡ/ϣⲏⲡ could also be translated ‘welcome’ or ‘honored’; ‘acceptable’ keeps
      the evaluative but non-honorific nuance.
    reason: lexical_alternative
lexical_decisions:
- source_word: ϣⲱⲡ / ϣⲏⲡ
  chosen: acceptable
  alternatives:
  - welcome
  - honored
  lexicon: Crum; Lambdin
  rationale: Stative/adjectival predicate meaning ‘to be acceptable, fitting’; preserves
    the proverb’s terse evaluation rather than connoting honor explicitly.
- source_word: ϯⲙⲉ
  chosen: village
  alternatives:
  - town
  - hometown
  lexicon: Crum; Layton
  rationale: ϯⲙⲉ denotes a village/small settlement; retaining ‘village’ avoids harmonizing
    to the Synoptic ‘homeland’/‘hometown’ and reflects Thomas’s diction.
- source_word: (neg. art.) ⲙ̄ⲡ-/written ⲙⲛ̄ before ⲡⲣⲟⲫⲏⲧⲏⲥ
  chosen: a prophet is not (… acceptable)
  alternatives:
  - the prophet is not
  lexicon: Layton (grammar); Lambdin
  rationale: Read as the negative article governing a generic noun (‘no prophet’ →
    ‘a prophet is not…’), yielding a gnomic proverb. The orthography ⲙⲛ̄ reflects
    scribal variance for ⲙ̄ⲡ-.
- source_word: ⲙⲁⲣⲉⲥⲟⲉⲓⲛ / ⲙⲉⲣⲉⲥⲟⲓⲛ
  chosen: does not (gnomically)
  alternatives:
  - should not
  - will not
  lexicon: Lambdin; Layton
  rationale: Negative prospective/jussive used proverbially; rendered as a general-gnomic
    ‘does not’ rather than deontic ‘should not’ for concise English.
- source_word: ⲥⲟⲓⲛ (with ⲣⲑⲉⲣⲁⲡⲉⲩⲉ)
  chosen: work
  alternatives:
  - do
  - perform
  - benefit (by)
  lexicon: Crum
  rationale: In collocation with ⲣ- + verbal noun, ⲥⲟⲓⲛ functions as ‘to engage in,
    do’; ‘work’ pairs idiomatically with ‘cures’ in English.
- source_word: ⲣⲑⲉⲣⲁⲡⲉⲩⲉ
  chosen: cures
  alternatives:
  - healings
  - treatments
  lexicon: Loan from Gk θεραπεύειν (via Coptic); Crum
  rationale: Periphrastic ‘work cures’ mirrors the Coptic do- + heal construction
    and the Greek semantic domain.
- source_word: ⲛⲛⲉⲧⲥⲟⲟⲩⲛ ⲙ̄ⲙⲟϥ / (norm.) ⲛⲡⲉⲧⲉⲣⲉⲥⲟⲟⲩⲛ ⲛⲛⲧⲟϥ
  chosen: those who know him
  alternatives:
  - those acquainted with him
  lexicon: Layton
  rationale: Straightforward relative clause; object ‘him’ is clear whether written
    with ⲙ̄ⲙⲟ- or ⲛⲛⲧⲟϥ orthography.
textual_note: 'NHAM02.39.5–7 has no lacunae. The first clause writes the negative
  before ‘prophet’ as ⲙⲛ̄ⲡⲣⲟⲫⲏⲧⲏⲥ (phrase-joined), which Dilley normalizes as ⲙⲛ ⲡⲣⲟⲫⲏⲧⲏⲥ;
  it functions as a negative article (ⲙ̄ⲡ-), yielding ‘no prophet [is] acceptable’.
  The predicate appears as ϣⲏⲡ in the diplomatic line and ϣⲱⲡ in normalization (dialectal
  spelling of the same lemma). For the second clause, the diplomatic line reads ⲙⲁⲣⲉⲥⲟⲉⲓⲛ,
  while the normalized text has ⲙⲉⲣⲉⲥⲟⲓⲛ; both reflect the negative prospective/jussive
  used proverbially. The healing expression is periphrastic: ⲥⲟⲓⲛ ⲣⲑⲉⲣⲁⲡⲉⲩⲉ, with
  no explicit noun ‘physician’; the subject is generic/indefinite. The object of ‘know’
  appears as ⲙ̄ⲙⲟϥ in the phrase-joined line, while the normalized text shows ⲛⲛⲧⲟϥ;
  both orthographies mark ‘him’ as the object and do not affect meaning.'
