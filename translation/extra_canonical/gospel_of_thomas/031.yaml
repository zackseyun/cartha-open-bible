  agreement: minor_divergence
  chosen_basis: coptic
  rationale: POxy explicitly supplies ‘physician’ and ‘homeland’ nuance; the Coptic
    reads ‘village’ (ϯⲙⲉ) and uses an indefinite periphrastic ‘work cures’ without
    naming a physician. The core sense aligns; the English follows the Coptic’s diction
    and indefiniteness, with this divergence noted.
