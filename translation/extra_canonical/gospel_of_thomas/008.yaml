translation:
  text: And he said, "The human is like a wise fisherman who cast a net into the sea.
    He hauled it up from the sea, and it was filled with small fish. Among them he
    found a large fish. The wise fisherman pulled it out; he threw the net, with all
    the small fish, back to their place—to the sea—and he chose the large fish without
    difficulty. Whoever has ears to hear, let that one hear."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲛⲣⲙⲛϩⲏⲧ literally 'a person of heart' (i.e., one endowed with understanding).
      'Wise' and 'sensible' are both acceptable in context.
    reason: lexical_alternative
  - marker: b
    text: ⲛⲟⲩϫⲉ is a general term for 'net'; some prefer 'dragnet' by analogy with
      Matt 13:47, but the Coptic does not force that specificity.
    reason: lexical_alternative
  - marker: c
    text: 'The sequence ''pulled it out … chose the large fish'' mirrors two Coptic
      verbs: ⲛⲁⲛⲟⲩ (''to lift/bring up'') and ⲥⲱⲧⲡ (''to choose''). The slight redundancy
      is kept to reflect the source’s concreteness.'
    reason: dialect_note
  - marker: d
    text: '''Back to their place—to the sea'' renders ⲉⲡⲉⲥⲏⲧ ⲉⲡⲑⲁⲗⲁⲥⲥⲁ, an emphatic
      double expression unusual in English but characteristic in Thomas.'
    reason: lexical_alternative
  - marker: e
    text: '''Whoever has ears to hear'' is a set formula in Thomas and elsewhere;
      the inclusive ''that one'' avoids gendering an indefinite subject.'
    reason: cross_reference
lexical_decisions:
- source_word: ⲡⲣⲱⲙⲉ
  chosen: the human
  alternatives:
  - the man
  - a person
  lexicon: Crum; Lambdin
  rationale: Generic reference; English 'human' captures inclusive, proverbial force
    without gendering.
- source_word: ⲟⲩⲟⲩⲱϩⲉ
  chosen: fisherman
  alternatives:
  - angler
  lexicon: Crum
  rationale: Standard term for someone who fishes; context is net-casting, not line-angling.
- source_word: ⲛⲣⲙⲛϩⲏⲧ
  chosen: wise
  alternatives:
  - sensible
  - understanding
  - prudent
  lexicon: Crum (r.m.n-hēt 'man of heart'); Layton
  rationale: Idiom literally 'person of heart' meaning one endowed with understanding;
    'wise' is concise and idiomatic.
- source_word: ⲛⲟⲩϫⲉ
  chosen: net
  alternatives:
  - dragnet
  lexicon: Crum; Lambdin
  rationale: Generic 'net' fits; 'dragnet' is possible but adds specificity not compelled
    by the Coptic.
- source_word: ⲥⲱⲕ
  chosen: haul up
  alternatives:
  - draw up
  - pull up
  lexicon: Crum; Lambdin
  rationale: Depicts exertion of drawing a net from water; 'haul up' is vivid and
    concrete.
- source_word: ⲛⲧⲃⲧ
  chosen: fish
  alternatives:
  - fishes
  lexicon: Crum
  rationale: Collective sense; English unmarked plural 'fish' suits context of many
    fish.
- source_word: ⲛⲕⲟⲩⲓ
  chosen: small
  alternatives:
  - little
  lexicon: Crum
  rationale: Neutral size descriptor; 'small' avoids potential diminutive connotations
    of 'little'.
- source_word: ⲛⲛⲧⲟⲟⲩ
  chosen: among them
  alternatives:
  - in their midst
  lexicon: Crum (toou 'midst')
  rationale: '''Among them'' is idiomatic and succinct.'
- source_word: ⲛⲟϭ
  chosen: large
  alternatives:
  - big
  - great
  lexicon: Crum
  rationale: '''Large'' pairs naturally with ''small fish'' and avoids evaluative
    ''great''.'
- source_word: ⲛⲁⲛⲟⲩ
  chosen: pull out
  alternatives:
  - lift up
  - take up
  - pick out
  lexicon: Crum (nanou 'to lift/raise/bring up'); Layton
  rationale: Action directed at the single big fish distinguished from the net; 'pull
    out' preserves concrete motion.
- source_word: ⲁⲛⲧⲟϥ (as verb of casting)
  chosen: threw
  alternatives:
  - cast
  lexicon: Crum
  rationale: Dynamic simple past fits the narrative pace; 'threw' keeps concrete force.
- source_word: ⲉⲡⲉⲥⲏⲧ
  chosen: to their place
  alternatives:
  - back (to where they belonged)
  lexicon: Crum (sēt 'seat, place')
  rationale: Preserves Thomas’s odd specificity; keeps the double expression with
    'to the sea' that follows.
- source_word: ⲥⲱⲧⲡ
  chosen: choose
  alternatives:
  - select
  - pick
  lexicon: Crum; Lambdin
  rationale: Common verb for choosing; fits contrast with discarding the small fish.
- source_word: ⲭⲱⲣⲓⲥ ϩⲓⲥⲉ
  chosen: without difficulty
  alternatives:
  - without trouble
  - without effort
  lexicon: Crum (hise 'hindrance, difficulty'); loan ⲭⲱⲣⲓⲥ from Gk
  rationale: Conventional rendering of the idiom; keeps the nuance of absence of hindrance.
- source_word: ⲟⲩⲛⲙⲁⲁϫⲉ ⲛⲛⲧⲟϥ ... ⲙⲁⲣⲉⲛⲧⲟϥⲥⲱⲧⲙ
  chosen: Whoever has ears to hear, let that one hear
  alternatives:
  - He who has ears, let him hear
  lexicon: Lambdin; Layton
  rationale: Retains proverbial, formal tone while using gender-neutral 'whoever'/'that
    one'.
textual_note: 'Dialect: Sahidic with Lycopolitan traits. Notable are independent pronouns
  (e.g., ⲛⲧⲟⲥ ''it'') used to refer to the net, and Greek loans ⲑⲁⲗⲁⲥⲥⲁ (sea) and
  ⲭⲱⲣⲓⲥ (without). Orthography: printed form shows a bracketed [ⲡⲉ] in ⲉ[ⲡⲉ]ⲥⲏⲧ (NHAM02.33
  lb 35), resolved in normalization as ⲉⲡⲉⲥⲏⲧ (''to their place''); no lacuna that
  affects translation. Clause structure: The object of ''throw'' is explicitly the
  net (ⲛⲟⲩϫⲉ), with the phrase ''all the small fish'' appositional, indicating the
  small fish are returned by casting the net back. This preserves Thomas’s concrete
  imagery and avoids silently converting the object to ''the small fish''.'
