synoptic_parallel_check:
  parallels:
  - Matthew 13:47–48
  handling: intentional_divergence
  rationale: While both speak of a net and fish, Thomas 8 focuses on a single large
    fish chosen by a wise fisherman, not on eschatological sorting of good and bad
    fish at the end. The diction and point diverge; no harmonization attempted.
revision_risk_note: 'Key review points: (1) Rendering of ⲛⲁⲛⲟⲩ as ''pull out'' (vs.
  ''select'') to distinguish it from ⲥⲱⲧⲡ; (2) Object of ''threw'' retained as ''the
  net'' with small fish appositional—some editors paraphrase as throwing the small
  fish back; (3) ''Wise'' for ⲛⲣⲙⲛϩⲏⲧ vs. ''sensible''—either could be argued; (4)
  Maintaining ''to their place'' for ⲉⲡⲉⲥⲏⲧ preserves strangeness but is less idiomatic
  in English.'
