translation:
  text: Jesus said, I will choose you—one out of a thousand, and two out of ten thousand—and
    they will stand before you, making a single one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '‘before you’: Dilley reads ⲉⲣⲁⲧⲛ (2pl) against the manuscript’s ⲉⲣⲁⲧⲟⲩ
      (‘before them’). Many editions translate ‘before them.’'
    reason: textual_variant
  - marker: b
    text: '‘making a single one’: The underlying construction ⲉⲣⲉ … ⲉⲓⲣⲉ allows ‘so
      that they may make’ or idiomatically ‘as a single one.’'
    reason: lexical_alternative
  - marker: c
    text: The idiom ‘one out of a thousand, two out of ten thousand’ echoes biblical
      language (cf. Deut 32:30), though Thomas uses it in a different saying-context.
    reason: cross_reference
lexical_decisions:
- source_word: ⲁⲛⲟⲕ ⲛⲁ
  chosen: I will
  alternatives:
  - I shall
  lexicon: Layton, Coptic Grammar (on future with ⲛⲁ)
  rationale: Independent pronoun with future marker ⲛⲁ indicates first person future.
- source_word: ⲥⲱⲧⲡ
  chosen: choose
  alternatives:
  - select
  - elect
  lexicon: Crum, s.v. ⲥⲱⲧⲡ
  rationale: Primary sense is ‘choose/select’; ‘elect’ would over-theologize.
- source_word: ⲛⲧⲱⲧⲛ
  chosen: you (plural)
  alternatives:
  - you
  - you all
  lexicon: Layton, Grammar (independent pronouns)
  rationale: Independent 2pl pronoun clarifies plural addressees; retained in note
    rather than in-line gloss.
- source_word: ⲟⲩⲁ
  chosen: one
  alternatives:
  - a single
  lexicon: Crum, s.v. ⲟⲩⲁ
  rationale: Numeral ‘one’; kept simple to preserve Thomas’s terseness.
- source_word: ⲉⲃⲟⲗ ϩⲛ
  chosen: out of
  alternatives:
  - from among
  - from
  lexicon: Lambdin, Introduction to Sahidic Coptic (prepositions)
  rationale: Partitive sense with numerals is best rendered ‘out of.’
- source_word: ϣⲟ
  chosen: a thousand
  alternatives:
  - thousand
  lexicon: Crum, s.v. ϣⲟ
  rationale: Standard numeral; article is optional in English; included for idiomatic
    flow.
- source_word: ⲥⲛⲁⲩ
  chosen: two
  alternatives: []
  lexicon: Crum, s.v. ⲥⲛⲁⲩ
  rationale: Simple numeral.
- source_word: ⲧⲃⲁ
  chosen: ten thousand
  alternatives:
  - a myriad
  lexicon: Crum, s.v. ⲧⲃⲁ
  rationale: Base meaning ‘ten thousand’; ‘myriad’ is possible but less transparent.
- source_word: ⲛⲧⲟⲟⲩ ⲛⲁ
  chosen: they will
  alternatives:
  - they shall
  lexicon: Layton, Grammar (independent pronouns + future)
  rationale: 3rd plural independent pronoun with future marker.
- source_word: ⲱϩⲉ
  chosen: stand
  alternatives:
  - be established
  - take their stand
  lexicon: Crum, s.v. ⲱϩⲉ
  rationale: Primary sense ‘stand’ preserves Thomas’s sharp diction; ‘be established’
    would over-interpret.
- source_word: ⲉⲣⲁⲧⲛ
  chosen: before you (pl.)
  alternatives:
  - in your presence
  lexicon: Crum, s.v. ⲉⲣⲁ-
  rationale: Preposition ⲉⲣⲁ ‘before’ + 2pl suffix; Dilley’s normalization reads 2pl
    here.
- source_word: ⲉⲣⲉ … ⲉⲓⲣⲉ
  chosen: making
  alternatives:
  - so that they may make
  - as
  lexicon: Layton, Grammar §147 (ⲉⲣⲉ introducing circumstantial/purpose)
  rationale: Here marks a circumstantial/purposive clause tied to ‘stand’; ‘making’
    keeps the asyndetic feel.
- source_word: ⲟⲩⲁ ⲟⲩⲱⲧ
  chosen: a single one
  alternatives:
  - one unity
  - one and the same
  lexicon: Crum, s.v. ⲟⲩⲱⲧ
  rationale: Pleonastic phrase emphasizing unity; ‘a single one’ keeps the strangeness
    of the expression.
textual_note: 'Dialect/orthography: The saying is Sahidic with Lycopolitan flavor.
  Line 3 shows scribal compression: the printed text has ⲥⲉⲛⲁⲱϩⲉ ⲉⲣⲁⲧⲟⲩ ⲉⲩⲟ ⲟⲩⲁ ⲟⲩⲱⲧ,
  while Dilley normalizes to ⲛⲧⲟⲟⲩ ⲛⲁ ⲱϩⲉ ⲉⲣⲁⲧⲛ ⲧⲟⲟⲩ ⲉⲣⲉ ⲛⲧⲟⲟⲩ ⲉⲓⲣⲉ ⲟⲩⲁ ⲟⲩⲱⲧ. The
  reading ⲉⲣⲁⲧⲟⲩ in the manuscript can be taken as ‘before them,’ but Dilley’s normalization
  supplies 2pl (ⲉⲣⲁⲧⲛ) to align with the preceding ⲛⲧⲱⲧⲛ (‘you [pl.]’). Likewise,
  ⲉⲩⲟ is interpreted as the start of a circumstantial clause ⲉⲣⲉ ⲛⲧⲟⲟⲩ ⲉⲓⲣⲉ (‘with
  them making’). No lacunae occur in this saying.'
