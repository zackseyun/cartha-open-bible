translation:
  text: Jesus said, "Blessed is the solitary one, and the one who has chosen,[1][2]
    for you will find the Kingdom.[3] For you are from it, and again you will return
    there."[4]
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[1]'
    text: ⲙⲟⲛⲁⲭⲟⲥ is a Greek loanword (μοναχός) meaning ‘single, solitary’; later
      it also denotes a ‘monk.’ Here ‘solitary one’ is preferred to avoid anachronistic
      institutional overtones.
    reason: lexical_alternative
  - marker: '[2]'
    text: The relative clause ⲉⲧⲉⲣⲉⲥⲱⲧⲡ is active (‘who has chosen’). Some translations
      render ‘the elect,’ which is an adjectival passive not required by the Coptic.
    reason: lexical_alternative
  - marker: '[3]'
    text: The ‘you’ throughout (ⲛⲧⲱⲧⲛ) is plural in Coptic.
    reason: dialect_note
  - marker: '[4]'
    text: Lit. ‘again you will go there’ (ⲡⲁⲗⲓⲛ … ⲃⲱⲕ ⲙⲙⲁⲩ). ‘Return there’ conveys
      the sense.
    reason: cultural_note
lexical_decisions:
- source_word: ⲡⲉϫⲉⲓⲏⲥⲟⲩⲥ
  chosen: Jesus said
  alternatives:
  - He said
  lexicon: Layton, Coptic Grammar §93; common formula
  rationale: Standard introductory speech formula; names the speaker explicitly as
    in the Coptic.
- source_word: ⲡⲙⲟⲛⲁⲭⲟⲥ
  chosen: the solitary one
  alternatives:
  - the monk
  - the single one
  lexicon: Crum, s.v. ⲙⲟⲛⲁⲭⲟⲥ; loan from Gk. μοναχός
  rationale: In Thomas the semantic focus is on singleness/solitariness rather than
    institutional monasticism. Rendering "solitary one" preserves that nuance and
    strangeness.
- source_word: ⲉⲧⲉⲣⲉⲥⲱⲧⲡ
  chosen: the one who has chosen
  alternatives:
  - the chosen one
  - the elect
  lexicon: Crum, s.v. ⲥⲱⲧⲡ ‘choose’; Layton, Coptic Grammar §179 (relative converter
    ⲉⲧⲉⲣⲉ-)
  rationale: The relative form with perfect expresses an active notion, ‘the one who
    has chosen,’ rather than an adjectival passive ‘elect.’ Many English versions
    smooth to ‘elect,’ but the Coptic supports active agency.
- source_word: ϫⲉⲛⲧⲱⲧⲛⲛⲁϩⲉ
  chosen: for you will find
  alternatives:
  - because you will discover
  lexicon: Crum, s.v. ⲛⲁϩⲉ ‘find’
  rationale: Maintain the straightforward verb ‘find’; the conjunction ϫⲉ introduces
    the causal clause.
- source_word: ⲉⲡⲙⲛⲧⲣⲣⲟ
  chosen: the Kingdom
  alternatives:
  - the kingship
  - the reign
  lexicon: Crum, s.v. ⲙⲛ̄ⲧⲣⲟ ‘kingdom, kingship’
  rationale: Thomas elsewhere uses ‘kingdom’ language; ‘kingdom’ is the natural English
    equivalent while keeping the conceptual field of reign/rule.
- source_word: ϫⲉⲛⲧⲱⲧⲛ ⲟⲩⲉⲃⲟⲗ ⲛϩⲏⲧⲛⲧⲟⲥ
  chosen: For you are from it
  alternatives:
  - For you are out of it
  lexicon: Layton, Coptic Grammar §118 (ⲟⲩⲉⲃⲟⲗ ⲛϩⲏⲧ … idiom ‘out of, from’)
  rationale: Idiomatic rendering of the adverb ⲟⲩⲉⲃⲟⲗ with the preposition ⲛϩⲏⲧ +
    pronoun, meaning origin ‘from.’
- source_word: ⲡⲁⲗⲓⲛ
  chosen: again
  alternatives:
  - once more
  lexicon: Crum, s.v. ⲡⲁⲗⲓⲛ (Gk. πάλιν)
  rationale: Simple adverb; retain the repetitive force that underlies ‘return.’
- source_word: ⲉⲣⲉⲛⲧⲱⲧⲛⲛⲁⲃⲱⲕ ⲙⲙⲁⲩ
  chosen: you will return there
  alternatives:
  - you will go there again
  - you will go back there
  lexicon: Crum, s.v. ⲃⲱⲕ ‘go’; Lambdin, Coptic Grammar §162 (ⲙⲙⲁⲩ ‘there’)
  rationale: ⲡⲁⲗⲓⲛ + ‘go there’ conveys the sense of ‘return’; ‘return there’ provides
    idiomatic English while preserving Thomas’s rhythm.
textual_note: 'No lacunae are present in NH II for this saying. Dilley’s normalized
  text reads ⲉⲡⲙⲛⲧⲣⲣⲟ (‘the kingdom’), whereas the phrase-joined lineation shows ⲁⲧⲙⲛ̄ⲧⲉⲣⲟ
  due to segmentation; the normalized reading clarifies that this is the preposition
  ⲉⲡ + ⲙⲛⲧⲣⲣⲟ, not the negative ⲁⲧ-. Orthography: ⲙⲛⲧⲣⲣⲟ is spelled with a doubled
  ⲣ, a common scribal/orthographic feature; the lexical form is ⲙⲛ̄ⲧⲣⲟ. The expression
  ⲟⲩⲉⲃⲟⲗ ⲛϩⲏⲧⲛⲧⲟⲥ uses the independent 3sg pronoun ⲛⲧⲟⲥ ‘it’; pronominal gender with
  abstract nouns varies in Sahidic/Lycopolitan practice. No Oxyrhynchus Greek fragment
  overlaps this saying.'
