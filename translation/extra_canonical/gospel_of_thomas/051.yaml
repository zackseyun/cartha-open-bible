translation:
  text: His disciples said to him, "On what day will the rest of the dead come about,
    and on what day will the world be a child and come?" He said to them, "What you
    are expecting has already come, but you yourselves do not know it."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''the world be a child'': ⲃⲃⲣⲣⲉ is literally ''child, little one''; many
      interpreters take this metaphorically as ''become new'' or ''be born'', but
      the Coptic wording is preserved.'
    reason: lexical_alternative
  - marker: b
    text: Some editors read the mid-clause as 'what you are expecting within you has
      already come' (normalization ϩⲏⲧⲛⲧⲟⲥ ⲁⲛⲧⲟⲥⲉⲓ), while the manuscript’s ϩⲏⲧⲥ ⲁⲥⲉⲓ
      points to a feminine referent ('rest'). The translation keeps the shared core
      'has already come'.
    reason: textual_variant
  - marker: c
    text: 'Final object: codex ⲙ̄ⲙⲟⲥ ''it/her'' vs. normalized ⲛⲛⲧⲟⲥ ''this/it''.
      Either yields ''you do not know it''.'
    reason: textual_variant
  - marker: d
    text: '''rest'' (ⲁⲛⲁⲡⲁⲩⲥⲓⲥ) is a Greek loan; it can denote eschatological repose
      rather than ''resurrection'', hence it is rendered plainly as ''rest''.'
    reason: cultural_note
lexical_decisions:
- source_word: ⲁϣ ⲛϩⲟⲟⲩ
  chosen: on what day (when)
  alternatives:
  - when
  lexicon: Crum; Layton
  rationale: Coptic idiom for asking time. Retained the explicit 'day' for Thomas’s
    concrete phrasing while noting the idiomatic sense 'when'.
- source_word: ⲁⲛⲁⲡⲁⲩⲥⲓⲥ
  chosen: rest
  alternatives:
  - repose
  - Sabbath rest
  lexicon: Crum; Lambdin
  rationale: Greek loanword anapausis regularly means 'rest/repose.' 'Rest' keeps
    the ambiguity between eschatological repose and cessation.
- source_word: ⲡⲉⲧⲉⲣⲉⲙⲟⲩ
  chosen: the dead
  alternatives:
  - the dead ones
  lexicon: Crum
  rationale: Common Sahidic expression for 'the dead (people)'. Kept definite article
    to reflect Coptic.
- source_word: ⲛⲁϣⲱⲡⲉ
  chosen: come about
  alternatives:
  - happen
  - come to be
  - occur
  lexicon: Crum; Layton
  rationale: ⲥⲱⲡⲉ has the sense 'happen/come to be'; 'come about' mirrors eventive
    nuance.
- source_word: ⲡⲕⲟⲥⲙⲟⲥ ⲃⲃⲣⲣⲉ
  chosen: the world be a child
  alternatives:
  - the world be a little one
  - the world be newborn/new
  lexicon: Crum
  rationale: ⲃⲃⲣⲣⲉ literally 'child, little one.' Preserved strangeness rather than
    smoothing to 'new world' to keep Thomas’s riddle-like diction.
- source_word: ⲉⲓ
  chosen: come
  alternatives:
  - arrive
  lexicon: Crum
  rationale: Basic motion verb 'come' fits context and pairs with preceding clause
    naturally.
- source_word: ⲭⲱϣⲧ
  chosen: are expecting
  alternatives:
  - are looking forward to
  - are seeking
  lexicon: Crum
  rationale: ⲭⲱϣⲧ means 'expect, look forward to.' Chose a neutral expectational verb.
- source_word: ⲁⲛⲧⲟⲥⲉⲓ (ⲁ ⲛⲧⲟⲥ ⲉⲓ)
  chosen: has already come
  alternatives:
  - has now come
  lexicon: Layton; Lambdin
  rationale: Parsed as perfect marker ⲁ- + particle ⲛⲧⲟⲥ 'already' + ⲉⲓ 'come'. 'Already'
    conveys the temporal force.
- source_word: ἀλλά (ⲁⲗⲗⲁ)
  chosen: but
  alternatives: []
  lexicon: Crum
  rationale: Greek adversative preserved straightforwardly.
- source_word: ⲥⲟⲟⲩⲛ
  chosen: know
  alternatives:
  - recognize
  - perceive
  lexicon: Crum
  rationale: Base sense is 'know.' 'Recognize' is a possible nuance, but 'know' stays
    closer to the verb’s core meaning.
- source_word: ⲧⲏ
  chosen: what (the thing that)
  alternatives:
  - that which
  lexicon: Layton
  rationale: Neuter demonstrative used substantively. Rendered with English 'what/that
    which' for clarity.
textual_note: 'No lacunae in this saying. Orthography shows notable points: (1) The
  codex text has ϩⲏⲧⲥ ⲁⲥⲉⲓ (lb 11–12), with a 3fs pronominal reference likely to ⲁⲛⲁⲡⲁⲩⲥⲓⲥ;
  Dilley’s normalized text reads ϩⲏⲧⲛⲧⲟⲥ ⲁⲛⲧⲟⲥⲉⲓ, which can be parsed as ''within
  you … it has already come.'' (2) The codex ends with ⲙ̄ⲙⲟⲥ (''it/her''), while normalization
  gives ⲛⲛⲧⲟⲥ (''this/it''). These shifts do not alter the core sense ''has already
  come … you do not know it'', but they affect whether ''within you'' is explicit
  and whether the object is feminine (''rest'') or deictic (''this''). I translated
  the unmarked core: ''has already come … you do not know it.'' The unusual phrase
  ⲡⲕⲟⲥⲙⲟⲥ ⲃⲃⲣⲣⲉ ⲉⲓ is kept literally (''the world be a child and come'') to preserve
  Thomas’s deliberate strangeness; the reduplicated ⲃⲃⲣⲣⲉ is the standard form for
  ''child/little one'' in Sahidic. Greek loanwords (ⲁⲛⲁⲡⲁⲩⲥⲓⲥ, ⲕⲟⲥⲙⲟⲥ, ἀλλά) are regular
  for this dialect.'
