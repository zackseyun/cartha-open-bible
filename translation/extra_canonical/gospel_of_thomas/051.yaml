    and 'the world be a child' is distinctive. No harmonization attempted.
revision_risk_note: 'Two places need special review: (1) the phrase with ϩⲏⲧⲥ/ϩⲏⲧⲛⲧⲟⲥ
  ⲁⲛⲧⲟⲥⲉⲓ—should ''within you'' be explicit in the translation, or should we keep
  the shared core? (I opted for the core.) (2) The metaphor ''the world be a child
  and come''—we kept it literal to preserve strangeness; consider whether ''be born''
  or ''become new'' would over-interpret.'
