translation:
  text: Jesus said, It is not possible for someone to enter the strong man’s house
    unless he first lays hold of him with a rope—he must bind his hands; then he will
    plunder his house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered “with a rope” translates ⲛϫⲛⲁϩ, a concrete instrument
      term (rope/strap). Some interpreters generalize it as “by force,” but the Coptic
      favors a physical tether.
    reason: lexical_alternative
  - marker: b
    text: The double structure “lays hold … bind his hands” reflects the Coptic’s
      repeated ⲛⲧⲉⲛⲧⲟϥ and two verbs (ϫⲓⲛⲧⲟ, ⲙⲟⲩⲣ). We retain both rather than smoothing
      to a single action.
    reason: textual_variant
  - marker: c
    text: “Strong man” translates ⲡϫⲱⲱⲣⲉ (literally “the strong one”), here clearly
      a person given the masculine article ⲡ-.
    reason: cultural_note
lexical_decisions:
- source_word: ⲙⲛϭⲟⲙ
  chosen: it is not possible
  alternatives:
  - is not able
  - is not strong enough
  lexicon: Crum; Lambdin
  rationale: Impersonal possibility/ability construction common in Sahidic; fits Thomas’s
    style better than idiomatic English “no one can.”
- source_word: ⲛⲧⲉⲟⲩⲁ
  chosen: for someone (indefinite ‘one’)
  alternatives:
  - for a person
  - for anyone
  lexicon: Layton
  rationale: Indefinite reference maintained to preserve terse, gnomic tone.
- source_word: ⲃⲱⲕ ⲉϩⲟⲩⲛ
  chosen: enter
  alternatives:
  - go into
  - come into
  lexicon: Crum; Lambdin
  rationale: Standard rendering of motion + allative ‘into’; “enter” keeps compactness.
- source_word: ⲡⲏⲓ
  chosen: house
  alternatives:
  - home
  - household
  lexicon: Crum
  rationale: Concrete sense is required by the plundering image.
- source_word: ⲡϫⲱⲱⲣⲉ
  chosen: the strong man
  alternatives:
  - the strong one
  - the mighty man
  lexicon: Crum
  rationale: With masculine article ⲡ-, the phrase is a set idiom also known from
    Synoptic parallels; “strong man” retains the starkness.
- source_word: ϫⲓⲛⲧⲟϥ
  chosen: lays hold of him
  alternatives:
  - seizes him
  - binds him
  lexicon: Crum; Lambdin
  rationale: Compound with ϫⲓ ‘take’ conveys taking hold; choosing “lays hold of”
    avoids redundancy with the following explicit verb for “bind.”
- source_word: ⲛϫⲛⲁϩ
  chosen: with a rope
  alternatives:
  - with a strap
  - with a cord
  lexicon: Crum
  rationale: ϫⲛⲁϩ denotes a rope/strap; instrumental ⲛ- indicates means. Rendering
    keeps the concrete image rather than abstracting to “by force.”
- source_word: ⲉⲓⲙⲏⲧⲓ
  chosen: first
  alternatives:
  - at first
  - beforehand
  lexicon: Crum; Layton
  rationale: Adverbial temporal marker; “first” keeps the stepwise riddle-like structure.
- source_word: ⲙⲟⲩⲣ
  chosen: bind
  alternatives:
  - tie up
  - fasten
  lexicon: Crum; Lambdin
  rationale: Common verb for binding/restraint; “bind” aligns with the idiom known
    in Sahidic narrative texts without over-interpretation.
- source_word: ⲡⲉϥϭⲓϫ
  chosen: his hands
  alternatives:
  - his wrists
  - his arms
  lexicon: Crum
  rationale: ϭⲓϫ typically ‘hand’; “hands” fits the restraint context.
- source_word: ⲡⲱⲱⲛⲉ
  chosen: plunder
  alternatives:
  - carry off as spoil
  - rob
  lexicon: Crum
  rationale: ⲡⲱⲱⲛⲉ often implies despoiling; “plunder” retains harshness and matches
    the semantic field of the image.
textual_note: 'Dialect/orthography: Sahidic with Lycopolitan touches. The prepositional
  genitive ⲛ- assimilates to ⲙ- before the labial ⲡ in ⲙ̄ⲡϫⲱⲱⲣⲉ (line 21), hence normalized
  as ⲛⲡϫⲱⲱⲣⲉ. The impersonal negative ability formula ⲙⲛϭⲟⲙ introduces the saying.
  The construction ⲛⲧⲉⲛⲧⲟϥ … ⲛⲧⲉⲛⲧⲟϥ is repeated before ϫⲓⲛⲧⲟϥ and ⲙⲟⲩⲣ, producing
  a deliberately stepwise, almost redundant rhythm typical of Thomas; we preserve
  this by rendering both actions (“lays hold with a rope … bind his hands”). No lacunae
  or restorations are marked by Dilley for this saying.'
