revision_risk_note: 'Primary uncertainty is the nuance of ϫⲓⲛⲧⲟϥ ⲛϫⲛⲁϩ: whether to
  render it as “seize him with a rope” or interpretively as “tie him up.” I opted
  for “lays hold of him with a rope” to keep it distinct from ⲙⲟⲩⲣ (“bind”), yet the
  semantics overlap; reviewers should confirm the compound verb’s range in Crum and
  context in Thomas 35.'
