translation:
  text: The Lord said, “There are many sellers and buyers, but the solitary is in
    the storehouse.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, ‘He said, “The Lord …”’; rendered ‘The Lord said’ to reflect
      the quoted subject and avoid redundancy in English.
    reason: dialect_note
  - marker: b
    text: ⲡⲕⲱⲧⲉ and ⲡϫⲱⲧⲉ are agent nouns meaning ‘seller’ and ‘buyer’ respectively;
      thus ‘sellers and buyers.’
    reason: lexical_alternative
  - marker: c
    text: ⲗⲁⲁⲩ can denote a ‘solitary’ or ‘single one’ (often with ascetic nuance
      in Thomas). The number may be collective; hence ‘the solitary’ is used as a
      technical term.
    reason: cultural_note
  - marker: d
    text: ϣⲱⲛⲉ denotes a ‘storehouse’ or ‘granary’; ‘storehouse’ is chosen to keep
      the sense general.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲟⲩⲛϩⲁϩ
  chosen: there are many
  alternatives:
  - there is a multitude
  lexicon: Layton Grammar; Crum s.v. ϩⲁϩ
  rationale: Standard existential construction ⲟⲩⲛ + noun; ϩⲁϩ means ‘many’ in Sahidic.
- source_word: ⲡⲕⲱⲧⲉ
  chosen: seller
  alternatives:
  - merchant
  - vendor
  lexicon: Crum s.v. ⲕⲱⲧⲉ
  rationale: Agent noun from the verb ‘to sell’; ‘seller’ fits the paired contrast
    with ‘buyer’ and the economic imagery.
- source_word: ⲡϫⲱⲧⲉ
  chosen: buyer
  alternatives:
  - purchaser
  lexicon: Crum s.v. ϫⲱⲧ; Lambdin §408
  rationale: Agent noun from ϫⲱⲧ ‘to buy’; ‘buyer’ gives a clear marketplace pair
    with ‘seller’.
- source_word: ⲗⲁⲁⲩ
  chosen: the solitary
  alternatives:
  - the single one
  - the solitary ones
  - the celibate
  lexicon: Crum s.v. ⲗⲁⲁⲩ; Layton NHS notes on Thomas 49
  rationale: Thomas uses ⲗⲁⲁⲩ as a technical term; translating as ‘the solitary’ preserves
    Thomasine strangeness and thematic resonance. Number is deliberately left generic.
- source_word: ϣⲱⲛⲉ
  chosen: storehouse
  alternatives:
  - granary
  - barn
  lexicon: Crum s.v. ϣⲱⲛⲉ
  rationale: In Sahidic, ϣⲱⲛⲉ denotes a storehouse/granary; ‘storehouse’ maintains
    the broader sense of a place of storage.
- source_word: ϩⲛ
  chosen: in
  alternatives:
  - within
  lexicon: Lambdin §50
  rationale: Basic locative preposition; plain ‘in’ keeps Thomas’s terseness.
- source_word: ⲙⲛ
  chosen: and (coordinating nouns)
  alternatives:
  - with
  lexicon: Lambdin §86; Layton Grammar
  rationale: Here ⲙⲛ coordinates ⲡⲕⲱⲧⲉ and ⲡϫⲱⲧⲉ as a pair; reading ‘and’ yields the
    idiomatic ‘sellers and buyers.’
textual_note: 'No lacunae are marked in Dilley’s text for this saying. Orthography:
  the manuscript reads ⲡⲉϫⲁϥ (line 9), normalized to ⲡⲉϫⲉⲛⲧⲟϥ ‘he said.’ The quotation
  begins with ⲡϫⲟⲉⲓⲥ ‘the Lord,’ yielding the sequence ‘He said, “The Lord…”’; this
  likely functions as a citation formula (‘The Lord said’), which is reflected in
  the English for clarity. The sequence ⲟⲩⲛϩⲁϩ ⲛⲡⲕⲱⲧⲉ ⲛⲡϫⲱⲧⲉ uses ⲛ with singular
  agent nouns to indicate categories (‘sellers’ and ‘buyers’). No clear dialectal
  features affect meaning here.'
