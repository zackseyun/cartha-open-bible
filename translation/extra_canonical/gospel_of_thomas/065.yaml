textual_note: 'Dialect: Sahidic with Lycopolitan features (e.g., pervasive use of
  the periphrastic ⲁⲛⲧⲟϥ forms). Orthography: NHII p.45, lb 1 preserves a damaged
  Greek loanword ⲭⲣⲏⲥⲧⲟⲥ, printed with dots/restoration; Dilley normalizes to χρηστός
  (“good/useful”). We translate “good,” not “Christ,” and flag the restoration in
  a footnote. The sequence ⲁⲛⲧⲟϥϯⲛⲧⲟϥ ⲛⲟⲩⲟⲩⲟⲉⲓⲉ is read as entrusting/leasing to workers.
  The adverb ⲕⲉⲕⲟⲩⲓ (“a little”) modifying the beating is preserved as-is, even if
  narratively unusual. The clause ⲁⲡⲟⲩⲟⲉⲓⲉ ϩⲓⲟⲩⲉ ⲉⲡⲕⲉⲟⲩⲁ is rendered “the workers
  did likewise to the other,” understanding ϩⲓⲟⲩⲉ as ‘likewise’. No POxy Greek fragment
  overlaps Saying 65; translation is based solely on the Coptic witness.'
