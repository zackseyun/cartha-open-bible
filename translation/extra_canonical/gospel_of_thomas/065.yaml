translation:
  text: 'He said: A good man had a vineyard. He entrusted it to workers so that they
    would work it and he would take its fruit. He sent his slave, saying, “Go—let
    the workers give me the fruit of the vineyard.” The workers seized his slave;
    they beat him a little and sent him away. The slave went and reported to his master.
    His master said, “Perhaps they did not know him.” He sent another slave; the workers
    did likewise to the other. Then the master sent his son. He said, “Perhaps they
    will feel shame before him—my son.” The workers, when they saw him, said, “This
    is the heir of the vineyard.” They seized him and killed him. Whoever has ears
    upon him, let him hear.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The printed form at NHII p.45 lb 1 has damaged ⲭⲣⲏⲥⲧⲟⲥ; Dilley’s normalization
      reads Greek χρηστός (“good/useful”). We render “good,” not “Christ.”
    reason: lacuna_or_restoration
  - marker: b
    text: “Workers” translates ⲟⲩⲟⲟⲉⲓⲉ; context allows “tenant farmers” or “vinedressers.”
    reason: lexical_alternative
  - marker: c
    text: ⲟⲩⲛⲁϣⲓⲡⲉ “will feel shame” can carry the nuance of deference/respect (cf.
      Crum). We preserve the sharper idiom.
    reason: lexical_alternative
  - marker: d
    text: 'Closing formula: ⲡⲉⲧⲉⲣⲉⲟⲩⲛ ⲙⲁⲁϫⲉ … ⲙⲁⲣⲉⲛⲧⲟϥ ⲥⲱⲧⲙ, literally “he who has
      ears upon him—let him hear.”'
    reason: cultural_note
  - marker: e
    text: ϩⲓⲟⲩⲉ is taken as “likewise/again,” yielding “the workers did likewise to
      the other.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲛⲭⲣⲏⲥⲧⲟⲥ
  chosen: good
  alternatives:
  - kindly
  - useful
  - beneficent
  lexicon: Layton; Crum (Greek loan χρηστός)
  rationale: The damaged Greek loanword is χρηστός (“good/useful”), not Χριστός (“Christ”).
    Rendering “good” preserves the parable’s characterization without introducing
    christological titulature.
- source_word: ⲙⲁ ⲛⲉⲗⲟⲟⲗⲉ
  chosen: vineyard
  alternatives:
  - place of vines
  - plot of vines
  lexicon: Crum (ⲙⲁ ‘place’; ⲉⲗⲟⲟⲗⲉ ‘vine’)
  rationale: Idiomatic compound for vineyard; translating as “vineyard” is natural
    and contextually precise.
- source_word: ⲟⲩⲟⲟⲉⲓⲉ
  chosen: workers
  alternatives:
  - tenant farmers
  - vinedressers
  lexicon: Crum; Layton
  rationale: Generic “workers” fits Thomas’s terseness; “tenant farmers/vinedressers”
    are viable context-specific glosses.
- source_word: ϯⲛⲧⲟϥ (with object ⲛⲟⲩⲟⲩⲟⲉⲓⲉ)
  chosen: entrusted it to
  alternatives:
  - gave it to
  - leased it to
  lexicon: Lambdin (verbs of giving with indirect object)
  rationale: The construction with indirect object suggests entrusting/leasing the
    vineyard to workers.
- source_word: ⲛⲁⲣϩⲱⲃ
  chosen: work
  alternatives:
  - labor
  - cultivate
  lexicon: Crum
  rationale: Neutral “work” captures the broad activity expected of the workers.
- source_word: ⲕⲁⲣⲡⲟⲥ
  chosen: fruit
  alternatives:
  - produce
  - yield
  lexicon: Crum (Greek loan καρπός)
  rationale: “Fruit” is the direct loan meaning and matches vineyard context.
- source_word: ϩⲙϩⲁⲗ
  chosen: slave
  alternatives:
  - servant
  lexicon: Crum
  rationale: Term regularly denotes a slave; keeping the sharper social nuance aligns
    with Thomas’s diction.
- source_word: ⲕⲁⲁⲥ
  chosen: Go
  alternatives:
  - Go forth
  - Go on
  lexicon: Crum
  rationale: Imperative; terse “Go” preserves the directness of the order.
- source_word: ⲁⲙⲁϩⲧⲉ
  chosen: seized
  alternatives:
  - took hold of
  - arrested
  lexicon: Crum
  rationale: Violent taking; “seized” keeps the sharp tone.
- source_word: ⲕⲉⲕⲟⲩⲓ
