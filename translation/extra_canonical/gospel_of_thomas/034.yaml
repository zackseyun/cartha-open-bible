translation:
  text: Jesus said, “If a blind person leads a blind person, the two of them will
    fall into the pit.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ϩⲏⲧϥ is ϩⲓⲧⲉ ‘front/presence’ with 3ms suffix (‘before him’). The spelling
      with ⲏ is an orthographic variant.
    reason: dialect_note
  - marker: b
    text: ⲥⲏⲧ can mean ‘pit’ or ‘ditch’. ‘Pit’ is chosen here; ‘ditch’ is an alternative.
    reason: lexical_alternative
  - marker: c
    text: Coptic has the definite article (‘the pit’). Some readers prefer ‘a pit’
      in English as a generic; either captures the sense.
    reason: alternative_reading
  - marker: d
    text: 'The middle clause uses the object marker ⲛ̄ before ⲛⲟⲩⲃⲗⲗⲉ to mark the
      person being led: ‘lead before him a blind person.’'
    reason: dialect_note
lexical_decisions:
- source_word: ⲃⲗⲗⲉ
  chosen: blind person
  alternatives:
  - the blind
  - a blind man
  lexicon: Crum, s.v. ⲃⲗⲗⲉ
  rationale: Noun for a person who is blind; kept as a count noun with generic sense.
    Using ‘person’ avoids gendering not present in the Coptic.
- source_word: ⲥⲱⲕ
  chosen: lead
  alternatives:
  - guide
  - conduct
  - drive
  lexicon: Crum, s.v. ⲥⲟⲕ/ⲥⲱⲕ
  rationale: Transitive verb meaning to lead/guide; fits the proverbial sense. ‘Lead’
    is concise and natural.
- source_word: ϩⲏⲧϥ (= ϩⲓⲧⲉ + 3ms)
  chosen: before him
  alternatives:
  - in front of him
  - in his presence
  lexicon: Crum, s.v. ϩⲓⲧⲉ ‘front, presence’
  rationale: 'Here functions as a prepositional phrase with ⲥⲱⲕ: to lead someone ‘before’
    one (i.e., in front). Orthographic ⲏ for ⲓ is a known variation.'
- source_word: ⲛ̄ⲛⲟⲩⲃⲗⲗⲉ (object marker + noun)
  chosen: a blind person
  alternatives:
  - blind people (generic)
  lexicon: Layton, Coptic Grammar (object marker ⲛ̄ usage); Crum, s.v. ⲃⲗⲗⲉ
  rationale: Here ⲛ̄ marks the direct object of ⲥⲱⲕ; sense is singular in context
    (‘another blind person’). Rendered generically in English as ‘a blind person’.
- source_word: ⲡⲥⲛⲁⲩ
  chosen: the two of them
  alternatives:
  - both of them
  - the two
  lexicon: Layton, Coptic Grammar (numerals and dual expressions)
  rationale: Idiomatic expression for ‘both’; kept explicit as ‘the two of them’ to
    reflect the Coptic definite form.
- source_word: ⲥⲏⲧ
  chosen: pit
  alternatives:
  - ditch
  - hole
  lexicon: Crum, s.v. ⲥⲏⲧ
  rationale: Denotes a pit/ditch. ‘Pit’ preserves proverbial compactness; ‘ditch’
    is a viable alternative.
- source_word: ⲟⲩϩⲓⲉⲓⲧ
  chosen: fall
  alternatives:
  - tumble
  lexicon: Crum, s.v. ϩⲓⲉⲓⲧ
  rationale: Common verb for ‘fall’; straightforward here.
- source_word: ⲉⲣϣⲁⲛ_ⲛⲧⲟϥ (with infinitive)
  chosen: if he should / if he
  alternatives:
  - when he
  - should he
  lexicon: Layton, Coptic Grammar (ⲉⲣϣⲁⲛ future/conditional)
  rationale: ⲉⲣϣⲁⲛ with following infinitive expresses a future or contingent condition;
    English ‘if’ succinctly captures the protasis.
- source_word: ⲉⲩϩⲓⲉⲓⲧ (future construction)
  chosen: they will fall
  alternatives:
  - they will tumble
  lexicon: Layton, Coptic Grammar (ⲉ + subject + verb future)
  rationale: Standard Sahidic future periphrasis; rendered with simple English future.
textual_note: 'No lacunae in Dilley’s edition for this saying. Orthography shows ⲩ/ⲏ
  variation typical of the codex: ϩⲏⲧϥ reflects ϩⲓⲧⲉ ‘front/presence’ + 3ms suffix
  (‘before him’). The object marker ⲛ̄ introduces ⲛⲟⲩⲃⲗⲗⲉ as the direct object of
  ⲥⲱⲕ. Dilley’s normalization reads ⲛⲡⲥⲛⲁⲩ (‘the two’); the diplomatic line shows
  a sequence that could be misread as ⲙ̄ⲡⲉⲥⲛⲁⲩ, but context and the following plural
  verb ⲉⲩϩⲓⲉⲓⲧ confirm a plural subject ‘both’. No restorations are indicated.'
