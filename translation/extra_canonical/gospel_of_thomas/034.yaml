revision_risk_note: 'Main point needing review: parsing ϩⲏⲧϥ as ‘before him’ (ϩⲓⲧⲉ
  + suffix) with ⲥⲱⲕ taking its object via ⲛ̄, yielding ‘lead a blind person in front
  of him.’ Also, the decision to render ⲡⲥⲛⲁⲩ as ‘the two of them’ and to keep the
  definite article in ‘the pit.’'
