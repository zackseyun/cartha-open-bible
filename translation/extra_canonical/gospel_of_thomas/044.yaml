translation:
  text: Jesus said, “Whoever speaks a word against the Father, it will be forgiven
    him; and whoever speaks a word against the Son, it will be forgiven him; but whoever
    speaks a word against the Holy Spirit, it will not be forgiven him—neither on
    the earth nor in heaven.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Coptic literally reads ‘speak a word’; hence ‘blaspheme’ is an interpretive
      rendering often chosen in English.
    reason: lexical_alternative
  - marker: b
    text: The Coptic text names ‘the Son’ (ⲡϣⲏⲣⲉ), not ‘the Son of Man’ as in the
      Synoptic parallels.
    reason: cross_reference
  - marker: c
    text: MS writes ϩⲙ̄ with ‘earth’ and ϩⲛ̄ with ‘heaven,’ yielding ‘on the earth
      … in heaven’; Dilley normalizes both to ϩⲛ ‘in.’
    reason: dialect_note
  - marker: d
    text: Coptic uses an indefinite third person plural ‘they will forgive,’ an impersonal
      construction rendered as the passive ‘it will be forgiven.’
    reason: dialect_note
lexical_decisions:
- source_word: ⲁϫⲉ ⲟⲩⲁ (ⲡⲉⲧⲉⲣⲉⲛⲁϫⲓⲟⲩⲁ)
  chosen: speak a word
  alternatives:
  - say a word
  - blaspheme
  lexicon: Crum s.v. ⲁϫⲉ; Layton, Coptic Grammar (idiom of numeral ‘one’ with ⲁϫⲉ)
  rationale: Literal idiom “say/speak one [=a word]” is kept to preserve Thomas’s
    diction; although the sense approaches ‘blaspheme,’ the Coptic does not use a
    specific blasphemy verb here.
- source_word: (against X) — object construction without explicit preposition
  chosen: against
  alternatives:
  - to
  - about
  lexicon: Layton, Coptic Grammar (object of verbs of speaking; contextual sense)
  rationale: The hostile sense is demanded by the triad and the unforgiveness clause;
    English ‘against’ conveys the adversative force implicit in the construction more
    clearly than ‘to’ or ‘about.’
- source_word: ⲕⲱ ⲉⲃⲟⲗ (ⲛⲧⲟⲟⲩⲛⲁⲕⲱ ⲉⲃⲟⲗ ⲛⲁⲛⲧⲟϥ)
  chosen: forgive (it will be forgiven him)
  alternatives:
  - release, let go
  lexicon: Crum s.v. ⲕⲱ ⲉⲃⲟⲗ
  rationale: ⲕⲱ ⲉⲃⲟⲗ ‘let go/release’ is the standard idiom for ‘forgive’; the 3pl
    future functions impersonal, best rendered by an English passive.
- source_word: ⲁⲡⲉⲓⲱⲧ / ⲡϣⲏⲣⲉ / ⲡⲡⲛⲉⲩⲙⲁ ⲉⲧⲉⲣⲉⲟⲩⲟⲡ
  chosen: the Father / the Son / the Holy Spirit
  alternatives:
  - the child (for ⲡϣⲏⲣⲉ)
  - the Spirit that is holy
  lexicon: Crum s.v. ⲡϣⲏⲣⲉ; Crum s.v. ⲟⲩⲟⲡ
  rationale: ⲡϣⲏⲣⲉ ‘child/son’ is taken as ‘the Son’ in parallel with ‘the Father’
    and ‘the Holy Spirit’. ⲉⲧⲉⲣⲉⲟⲩⲟⲡ (‘which is holy/pure’) is the attributive relative;
    ‘Holy Spirit’ is idiomatic English while the note preserves the underlying structure.
- source_word: ϩⲙ/ϩⲛ ⲡⲕⲁϩ; ϩⲛ ⲡⲡⲉ
  chosen: on the earth / in heaven
  alternatives:
  - in the earth / in heaven
  - on earth / in heaven
  lexicon: Crum s.v. ϩⲙ, ϩⲛ; Crum s.v. ⲕⲁϩ
  rationale: The manuscript shows ϩⲙ with ‘earth’ and ϩⲛ with ‘heaven’; translating
    ‘on the earth … in heaven’ reflects the prepositional contrast attested in the
    written line.
- source_word: ⲟⲩⲧⲉ … ⲟⲩⲧⲉ
  chosen: neither … nor
  alternatives: []
  lexicon: Standard Coptic conjunction usage (Layton)
  rationale: Regular correlative negative pair; straightforward equivalence.
textual_note: 'No lacunae in Dilley’s edition for this saying. The manuscript line
  shows orthographic and dialectal features: (1) The Spirit appears in the printed
  text as ⲡⲛ︤ⲁ︥, with Dilley normalizing to ⲡⲡⲛⲉⲩⲙⲁ; (2) a prepositional alternation
  is written—ϩⲙ̄ with ⲡⲕⲁϩ (‘on the earth’) and ϩⲛ̄ with ⲡⲡⲉ (‘in heaven’)—while the
  normalized text levels both to ϩⲛ. The translation reflects the manuscript contrast.
  The repeated future 3pl ⲛⲧⲟⲟⲩⲛⲁ- with ⲕⲱ ⲉⲃⲟⲗ functions as an impersonal/passive
  (‘it will be forgiven’).'
