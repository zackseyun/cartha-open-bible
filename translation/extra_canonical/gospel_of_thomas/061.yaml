revision_risk_note: 'Highest-risk choices: (1) rendering ⲡⲉⲧⲉⲣⲉϣⲱϣ as ‘the Same’ rather
  than ‘the undivided’ or ‘the All’; reviewers should assess whether ‘the Same’ best
  reflects ϣⲱϣ in this context. (2) Interpreting ϩⲱⲥ ⲉⲃⲟⲗ ϩⲛ ⲟⲩⲁ as ‘As from the One’;
  if read instead as a non-technical ‘as from one [person],’ it changes the theological
