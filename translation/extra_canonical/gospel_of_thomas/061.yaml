translation:
  text: 'Jesus said, “There are two on one couch: one will die, one will live.”


    Salome said, “Who are you, man? As from the One, have you reclined on my couch
    and eaten from my table?”


    Jesus said to her, “I am the one who exists, from the Same. I was given from my
    Father.”


    She said, “I am your disciple.”


    He said, “Because of this I say to you: when he becomes single, he will be filled
    with light; but when he becomes two, he will be filled with darkness.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ϭⲗⲟϭ can be ‘couch’ or ‘bed’ (Crum). ‘Couch’ was chosen because of the explicit
      dining ‘table’ that follows (reclining to eat).
    reason: lexical_alternative
  - marker: b
    text: The phrase ϩⲱⲥ ⲉⲃⲟⲗ ϩⲛ ⲟⲩⲁ literally reads ‘as from one.’ Given the reply’s
      ‘from the Same,’ this retains ‘the One’ rather than idiomatic ‘as a stranger.’
    reason: lexical_alternative
  - marker: c
    text: 'ⲧⲉⲗⲟ with ⲉϫⲛ (‘on’): alternatives include ‘go up onto’ or ‘sit upon’;
      ‘recline’ fits first-century meal posture implied by ⲧⲣⲁⲡⲉⲍⲁ.'
    reason: lexical_alternative
  - marker: d
    text: ⲡⲉⲧⲉⲣⲉϣⲱⲡⲉ = ‘the one who exists’; ⲡⲉⲧⲉⲣⲉϣⲱϣ draws on ϣⲱϣ ‘same/equal’ (Crum).
      Some translate ‘from the undivided,’ an interpretive gloss aligned with the
      later ‘single/two’ contrast.
    reason: lexical_alternative
  - marker: e
    text: '‘I was given from my Father’: the partitive ⲉⲃⲟⲗ ϩⲛ implies ‘of the things
      of my Father’ though ‘things’ is not explicit.'
    reason: cultural_note
  - marker: f
    text: '‘I say to you’: the manuscript uses a plural indirect object form (ⲛⲛⲧⲟⲥ),
      possibly addressing a wider audience beyond Salome or reflecting dialectal orthography.'
    reason: dialect_note
  - marker: g
    text: '‘When he becomes single … two’: ϣⲱϥ can be ‘one/single’; either ‘one’ or
      ‘single’ fits the contrast with ⲡⲱϣ ‘two’.'
    reason: lexical_alternative
  - marker: h
    text: Luke 17:34 (two on one bed) and Matt 6:22/Luke 11:34 (single eye/full of
      light) are thematic parallels, but Thomas’s wording diverges and was not harmonized.
    reason: cross_reference
lexical_decisions:
- source_word: ⲥⲛⲁⲩ
  chosen: two
  alternatives: []
  lexicon: Lambdin; Crum
  rationale: Standard numeral for ‘two’ in Sahidic; straightforward count of persons.
- source_word: ϭⲗⲟϭ
  chosen: couch
  alternatives:
  - bed
  lexicon: Crum
  rationale: Crum glosses ϭⲗⲟϭ as ‘couch/bed’. Given the paired mention of ‘table’
    (ⲧⲣⲁⲡⲉⲍⲁ), ‘couch’ better evokes dining-reclining.
- source_word: ⲛⲁⲙⲟⲩ / ⲙⲟⲩ
  chosen: will die
  alternatives:
  - die
  lexicon: Layton; Crum
  rationale: Future marker ⲛⲁ + ⲙⲟⲩ (‘die’). English future reflects Coptic morphology.
- source_word: ⲛⲁⲱⲛϩ / ⲱⲛϩ
  chosen: will live
  alternatives:
  - live
  lexicon: Crum
  rationale: Future marker ⲛⲁ + ⲱⲛϩ (‘live’).
- source_word: ⲛⲧⲟⲕ ⲛⲓⲙ ⲡⲣⲱⲙⲉ
  chosen: Who are you, man?
  alternatives:
  - Who are you, sir?
  - Who are you, human?
  lexicon: Crum
  rationale: ⲛⲧⲟⲕ ⲛⲓⲙ = ‘who are you’; ⲡⲣⲱⲙⲉ = ‘man/person’. Kept literal ‘man’ per
    Thomas’s terse diction.
- source_word: ϩⲱⲥ ⲉⲃⲟⲗ ϩⲛ ⲟⲩⲁ
  chosen: As from the One
  alternatives:
  - as from one [source]
  - as if you were from the One
  lexicon: Crum; Layton
  rationale: ϩⲱⲥ ‘as/like’; ⲟⲩⲁ ‘one’. Retained theological strangeness (‘the One’)
    since Jesus’s reply echoes it; avoids smoothing to ‘stranger’ which is not explicit
    in the Coptic.
- source_word: ⲧⲉⲗⲟ (ⲁⲛⲧⲟⲕⲧⲉⲗⲟ ⲉϫⲛ ⲡⲁϭⲗⲟϭ)
  chosen: reclined
  alternatives:
  - went up onto
  - sat upon
  lexicon: Crum; Layton (usage with ⲉϫⲛ)
  rationale: Verb used with ⲉϫⲛ (‘on’) and ϭⲗⲟϭ (‘couch’) in a dining context; ‘reclined’
    captures first-century dining posture better than ‘sat’ or literal ‘went up onto’.
- source_word: ⲟⲩⲱⲙ
  chosen: eaten
  alternatives:
  - ate
  lexicon: Crum
  rationale: Perfective sense after ⲁ-; English past participle in question sequence
    sounds natural.
- source_word: ⲧⲣⲁⲡⲉⲍⲁ
  chosen: table
  alternatives: []
  lexicon: Crum (from Gk. trapeza)
  rationale: Loan from Greek; ‘table’ is standard.
- source_word: ⲡⲉⲧⲉⲣⲉϣⲱⲡⲉ
  chosen: the one who exists
  alternatives:
  - the one-who-is
  - the one who is
  lexicon: Layton; Crum
  rationale: ⲣⲉϣⲱⲡⲉ = ‘come to be, exist’. The phrase is a title-like self-identification;
    ‘exists’ preserves ontological nuance.
- source_word: ⲡⲉⲧⲉⲣⲉϣⲱϣ
  chosen: the Same
  alternatives:
  - the equal
  - the undivided
  lexicon: Crum (ϣⲱϣ ‘same, equal’); Layton (discussion of semantic range)
  rationale: ϣⲱϣ denotes sameness/equality. Rendering as ‘the Same’ preserves the
    deliberately opaque, possibly technical, wording; ‘undivided’ is an interpretive
    expansion noted as alternative.
- source_word: ⲁⲛⲧⲟⲟⲩϯ (ⲛⲁⲁⲛⲟⲕ)
  chosen: I was given
  alternatives:
  - they gave me
  lexicon: Lambdin (impersonal ⲁⲛⲧⲟⲟⲩ for passive)
  rationale: Impersonal ‘they gave’ functions as a passive in Coptic; idiomatic English
    passive ‘I was given’ conveys sense.
- source_word: ⲡⲁⲡⲁⲉⲓⲱⲧ
  chosen: my Father
  alternatives: []
  lexicon: Crum
  rationale: Standard kinship term; capitalized ‘Father’ reflects titular usage in
    Thomas.
- source_word: ϣⲱϥ (ⲛⲧⲟϥ ϣⲱϥ)
  chosen: single
  alternatives:
  - one
  lexicon: Crum
  rationale: ϣⲱϥ functions adjectivally ‘single/one’. ‘Single’ keeps the contrast
    with ‘two’ explicit and echoes Thomas’s idiom elsewhere.
- source_word: ⲡⲱϣ
  chosen: two
  alternatives: []
  lexicon: Crum
  rationale: Numeral ‘two’ in predicative position (‘becomes two’).
- source_word: ⲙⲟⲩϩ
  chosen: be filled
  alternatives:
  - be full
  lexicon: Crum
  rationale: Verb of filling; ‘be filled’ more dynamic with ‘light/darkness’ objects.
- source_word: ⲟⲩⲟⲉⲓⲛ
  chosen: light
  alternatives: []
  lexicon: Crum
  rationale: Common noun ‘light’.
- source_word: ⲕⲁⲕⲉ
  chosen: darkness
  alternatives: []
  lexicon: Crum
  rationale: Common noun ‘darkness’.
- source_word: ⲛⲛⲧⲟⲥ (IOP)
  chosen: to you (plural)
  alternatives:
  - to you (sg.)
  lexicon: Layton (object pronouns); dialect note
  rationale: Form reflects a plural indirect object, possibly Lycopolitan orthography
    for ⲛⲧⲱⲧⲛ. Kept as ‘you’ without number in English; noted in footnote/textual
    note.
textual_note: 'No lacunae are marked in Dilley’s text for this saying. Orthography
  shows Lycopolitan-leaning features: (1) object pronoun spellings like ⲛⲛⲧⲟⲥ/ⲛⲁⲛⲧⲟⲥ
  where standard Sahidic would use ⲛⲧⲱⲧⲛ/ⲛⲁⲥ; this suggests a plural indirect object
  (‘to you [pl.]’) in ⲁⲛⲟⲕϫⲱ ⲛⲛⲧⲟⲥ even though Salome is the immediate interlocutor.
  (2) The verb ⲧⲉⲗⲟ with ⲉϫⲛ ‘on’ plus ϭⲗⲟϭ ‘couch’ indicates mounting/reclining;
  it is less common than other posture verbs but suits the dining context with ⲧⲣⲁⲡⲉⲍⲁ.
  (3) The phrase ⲡⲉⲧⲉⲣⲉϣⲱϣ is syntactically opaque; ϣⲱϣ typically means ‘same/equal,’
  so ‘from the Same’ is retained rather than smoothing to an interpretive ‘undivided.’
  No Greek POxy overlap is known for this logion.'
