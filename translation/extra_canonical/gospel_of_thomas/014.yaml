translation:
  text: Jesus said to them, "If you fast, you will bring sin upon yourselves; and
    if you pray, they will condemn you; and if you give alms, you will cause harm
    to your spirit. And when you go into any land and you lodge in a place, if they
    receive you, what they set before you—eat; those who are sick there—heal them.
    For what goes into your mouth will not weigh you down; rather, what comes out
    of your mouth—that will weigh you down."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rendered as "weigh you down" for ϫⲱϩⲙ; many English versions read "defile
      you" by analogy with Synoptic parallels.
    reason: lexical_alternative
  - marker: b
    text: '"They will condemn you": subject is the 3pl pronoun ⲛⲧⲟⲟⲩ, an indefinite
      "they" in Coptic, often left implicit or rendered passively in translation.'
    reason: dialect_note
  - marker: c
    text: '"Cause harm to your spirit": the phrase is literally "do an evil for your
      spirit" (ⲉⲓⲣⲉ ⲛⲟⲩⲕⲁⲕⲟⲛ ⲛⲡⲉⲧⲛⲡⲛⲉⲩⲙⲁ).'
    reason: lexical_alternative
  - marker: d
    text: '"Any land" translates ⲕⲁϩ ⲛⲓⲙ; paired with ⲭⲱⲣⲁ (place/region) it suggests
      a general territory and then a specific locality.'
    reason: dialect_note
  - marker: e
    text: For thematic parallels, compare Luke 10:8–9 (eat what is set before you;
      heal the sick there) and Mark 7:15/Matthew 15:11 (what goes in vs. what comes
      out of the mouth).
    reason: cross_reference
lexical_decisions:
- source_word: ϫⲡⲟ
  chosen: bring (forth), produce
  alternatives:
  - cause
  - beget
  lexicon: Crum; Layton
  rationale: ϫⲡⲟ commonly means to bring forth/produce; with ⲛⲁ…ⲛⲧⲱⲧⲛ expresses producing
    something for yourselves.
- source_word: ⲛⲟⲃⲉ
  chosen: sin
  alternatives:
  - fault
  - offense
  lexicon: Crum
  rationale: Standard Sahidic term for sin; direct object of ϫⲡⲟ.
- source_word: ϣⲗⲏⲗ
  chosen: pray
  alternatives:
  - do prayer
  - offer prayer
  lexicon: Crum; Layton
  rationale: Conventional verb for praying in Coptic.
- source_word: ⲣⲕⲁⲧⲁⲕⲣⲓⲛⲉ
  chosen: condemn
  alternatives:
  - judge against
  - pass sentence
  lexicon: Greek loan (κατακρίνειν) attested in Coptic lexica
  rationale: Active verb with 3pl subject ⲛⲧⲟⲟⲩ; "condemn" best fits judicial nuance.
- source_word: ϯⲉⲗⲉⲏⲙⲟⲥⲩⲛⲏ
  chosen: give alms
  alternatives:
  - give charity
  lexicon: Greek loan (ἐλεημοσύνη) in Coptic
  rationale: Established meaning in Coptic Christian usage.
- source_word: ⲕⲁⲕⲟⲛ
  chosen: harm
  alternatives:
  - evil
  - bad thing
  lexicon: Greek loan (κακόν) in Coptic
  rationale: In the construction ⲉⲓⲣⲉ ⲛⲟⲩⲕⲁⲕⲟⲛ ⲛⲡⲉⲧⲛⲡⲛⲉⲩⲙⲁ, "harm" conveys effect
    on the spirit; "evil" retained as alternative.
- source_word: ⲡⲛⲉⲩⲙⲁ
  chosen: spirit
  alternatives:
  - breath
  - inner self
  lexicon: Greek loan (πνεῦμα) in Coptic
  rationale: Context points to the inner spiritual person.
- source_word: ⲃⲱⲕ
  chosen: go
  alternatives:
  - come
  lexicon: Crum
  rationale: 'With ⲉϩⲟⲩⲛ, directional toward a place: go in/enter.'
- source_word: ⲕⲁϩ
  chosen: land
  alternatives:
  - district
  - village
  lexicon: Crum
  rationale: Here contrasted with ⲭⲱⲣⲁ; "any land" fits scope of mission-context.
- source_word: ⲙⲟⲟϣⲉ
  chosen: lodge
  alternatives:
  - stay
  - spend the night
  lexicon: Crum
  rationale: Common meaning to stay/lodge; matches mission-travel context.
- source_word: ⲭⲱⲣⲁ
  chosen: place
  alternatives:
  - region
  - district
  lexicon: Greek loan (χώρα) in Coptic
  rationale: Here the specific locality within the land where one lodges.
- source_word: ⲣⲡⲁⲣⲁⲇⲉⲭⲉ
  chosen: receive
  alternatives:
  - welcome
  - accept
  lexicon: Greek loan (παραδέχομαι) in Coptic
  rationale: Hospitality context; "receive" preserves formal link.
- source_word: ⲕⲱⲛⲧⲟ
  chosen: set (before)
  alternatives:
  - place
  - serve
  lexicon: Crum; Layton
  rationale: 'With object and dative of person: what they set before you.'
- source_word: ⲟⲩⲱⲙ
  chosen: eat
  alternatives: []
  lexicon: Crum
  rationale: Standard verb for eating.
- source_word: ϣⲱⲛⲉ
  chosen: sick
  alternatives:
  - ill
  - weak
  lexicon: Crum
  rationale: 'Adjectival/substantival use: those who are sick.'
- source_word: ⲉⲓⲣⲉ ⲑⲉⲣⲁⲡⲉⲩⲉ
  chosen: heal
  alternatives:
  - treat
  - care for
  lexicon: Crum; Greek loan θεραπεύω
  rationale: Periphrastic "do healing" idiom; render as "heal" in English.
- source_word: ⲧⲁⲡⲣⲟ
  chosen: mouth
  alternatives: []
  lexicon: Crum
  rationale: Common Coptic word for mouth.
- source_word: ϫⲱϩⲙ
  chosen: weigh down
  alternatives:
  - defile
  - burden
  lexicon: Crum
  rationale: Primary sense is to make heavy/burden; avoids harmonizing to Synoptic
    "defile," though that sense is often inferred.
- source_word: ⲉⲓ ⲉⲃⲟⲗ
  chosen: come out
  alternatives:
  - go out
  lexicon: Crum
  rationale: With mouth as source, "come out" is natural English.
textual_note: No lacunae or conjectural restorations noted by Dilley in this saying.
  The text exhibits Sahidic syntax with Lycopolitan flavor. Repeated use of the 3pl
  pronoun ⲛⲧⲟⲟⲩ as an indefinite subject leaves the agent of actions ("they will condemn
  you," "if they receive you") unspecified. The parenthetical morpheme in the printed
  ⲉⲧⲉⲧⲛ̄ϣⲁ(ⲛ)ϣⲗⲏⲗ reflects the bound future marker and is resolved in the normalized
  text. The sequence ⲕⲁϩ/ⲭⲱⲣⲁ distinguishes a broader "land" from the particular "place"
  of lodging. The verb ϫⲱϩⲙ is rendered as "weigh down" to reflect its core sense
  in Coptic, rather than harmonizing to "defile."
