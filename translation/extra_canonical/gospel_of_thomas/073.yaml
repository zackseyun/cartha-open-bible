translation:
  text: Jesus said, "The harvest indeed is great, but the workers are few. So then,
    [ask] the master that he may send out workers into the harvest."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Coptic is elliptical here, reading literally: “So then, the master,
      that he may send out workers into the harvest.” An explicit verb of asking/praying
      is not written. ''[ask]'' is supplied to make the exhortation explicit in English.'
    reason: alternative_reading
  - marker: b
    text: 'Compare Matt 9:37–38; Luke 10:2: “pray the Lord of the harvest to send
      out laborers.” Thomas lacks both “pray” and “of the harvest,” and uses the simpler
      “the master.”'
    reason: cross_reference
  - marker: c
    text: The verb ⲛⲟⲩϫⲉ can mean 'send' or 'throw/cast'; 'send out' is chosen by
      context. The Synoptic Greek uses ἐκβάλλειν ('throw out').
    reason: lexical_alternative
  - marker: d
    text: Lycopolitan-featured spelling ϣⲓⲛⲁ for expected ϩⲓⲛⲁ; meaning is the same
      ('in order that').
    reason: dialect_note
  - marker: e
    text: ⲡϫⲟⲉⲓⲥ is rendered 'master' rather than 'Lord' to avoid anachronistic ecclesial
      sense; both are lexically possible.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲡⲱϩⲥ
  chosen: harvest
  alternatives:
  - reaping
  lexicon: Crum; Lambdin
  rationale: Standard noun for the harvested field/crop; context clearly agricultural.
- source_word: ⲙⲉⲛ
  chosen: indeed
  alternatives:
  - as for
  lexicon: Lambdin; Layton
  rationale: Contrastive particle paired with ⲇⲉ; "indeed ... but" captures the concessive
    contrast without smoothing.
- source_word: ⲛⲁϣⲉⲛⲧⲟϥ
  chosen: is great
  alternatives:
  - is abundant
  - is much
  lexicon: Crum (ⲛⲁϣⲉ)
  rationale: ⲛⲁϣⲉ ‘great, much’; retained simple predicate rather than idiomatic 'plentiful'
    to avoid Synoptic harmonization.
- source_word: ⲛⲉⲣⲅⲁⲧⲏⲥ
  chosen: workers
  alternatives:
  - laborers
  lexicon: Greek loan (ἐργάτης) noted in Layton
  rationale: Neutral rendering; 'laborers' is possible but carries period flavor;
    'workers' is plain and concise.
- source_word: ⲥⲟⲃⲕ
  chosen: few
  alternatives:
  - scarce
  - small in number
  lexicon: Crum
  rationale: Common adjective for 'few' in number.
- source_word: ⲥⲟⲡⲥ
  chosen: so then
  alternatives:
  - therefore
  lexicon: Lambdin; Layton
  rationale: Discourse particle introducing a consequence/exhortation; 'so then' keeps
    Thomasine abruptness.
- source_word: ⲡϫⲟⲉⲓⲥ
  chosen: master
  alternatives:
  - lord
  lexicon: Crum
  rationale: Basic sense is 'master, lord'; chose 'master' to avoid doctrinal coloring
    and since 'of the harvest' is not expressed here.
- source_word: ϩⲓⲛⲁ
  chosen: that
  alternatives:
  - so that
  - in order that
  lexicon: Lambdin
  rationale: Subordinator introducing purpose; 'that' keeps terseness while preserving
    purposive sense with subjunctive-equivalent in English.
- source_word: ⲉⲣⲉⲛⲧⲟϥ ⲛⲁ ⲛⲟⲩϫⲉ
  chosen: that he may send out
  alternatives:
  - that he might send out
  - that he will dispatch
  lexicon: Crum (ⲛⲟⲩϫⲉ); Lambdin (ⲛⲁ future)
  rationale: ⲛⲁ marks future/intended action; 'send out' fits the transitive verb
    here and the following ⲉⲃⲟⲗ ⲉ- phrase.
- source_word: ⲉⲃⲟⲗ ⲉⲡⲱϩⲥ
  chosen: out into the harvest
  alternatives:
  - out to the harvest
  lexicon: Lambdin
  rationale: ⲉⲃⲟⲗ 'out' plus directional ⲉ-; 'into' conveys motion toward/into the
    field.
textual_note: 'Sahidic with Lycopolitan features. Orthography shows ϣⲓⲛⲁ for standard
  ϩⲓⲛⲁ and ⲛⲁϣⲱϥ for normalized ⲛⲁϣⲉⲛⲧⲟϥ. The phrase boundary after ⲥⲟⲡⲥ is syntactically
  elliptical: the text proceeds directly to “the master, that he may send out …” without
  an explicit verb of entreaty. No lacuna is marked in Dilley; the ellipsis is likely
  stylistic. The proclitic ⲛ before ⲡϫⲟⲉⲓⲥ is retained (topic/transition marker),
  but does not affect translation. No POxy Greek fragment overlaps this saying.'
