translation:
  text: Jesus said, The fox has its holes, and the birds of the sky have their lodging
    there; but the son of man does not have a place to lay his head and to rest—he
    does not.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[a]'
    text: The opening phrase is reconstructed in places (Dilley brackets ⲛ̄ⲃⲁϣⲟⲣ ⲟⲩ-);
      the normalized reading ‘The fox has…’ is standard given the idiom.
    reason: lacuna_or_restoration
  - marker: '[b]'
    text: '‘Birds of the sky’: Coptic literally has ‘the birds and the sky,’ an elliptical
      construction typical of Sahidic; we supply ‘of’ for English readability.'
    reason: dialect_note
  - marker: '[c]'
    text: ⲙⲁϩ can denote ‘rest/lodging’; we avoid inserting ‘nests’ since the Coptic
      does not use a specific word for ‘nest’ here.
    reason: lexical_alternative
  - marker: '[d]'
    text: The final ‘ⲛⲛⲧⲟϥ’ is an editorial normalization from damaged ink; it likely
      functions as an emphatic negation echo. The translation reflects this with ‘—he
      does not.’
    reason: lacuna_or_restoration
lexical_decisions:
- source_word: ⲡⲃⲁϣⲟⲣ
  chosen: the fox
  alternatives:
  - jackal
  lexicon: Crum s.v. ⲃⲁϣⲟⲣ; Layton lexicon
  rationale: Standard Sahidic term for a fox; some contexts allow jackal, but ‘fox’
    is the conventional and likely referent in this idiom.
- source_word: ⲟⲩⲛⲧⲁⲛⲧⲟⲟⲩ
  chosen: has
  alternatives:
  - there is for (it)
  lexicon: Layton, Coptic Grammar (periphrastic existential ⲟⲩⲛ + possessive)
  rationale: Periphrastic possessive ‘there is (for it)’, idiomatically ‘has’ in English;
    preserves compactness.
- source_word: ⲁⲛⲧⲟⲟⲩ
  chosen: holes
  alternatives:
  - dens
  - burrows
  - shelters
  lexicon: Crum s.v. ⲁⲛⲧⲟⲟⲩ
  rationale: Primary sense is ‘holes/den-burrows’; ‘dens’ or ‘burrows’ also possible.
    ‘Holes’ keeps the canonical idiom echo without forcing harmonization.
- source_word: ⲛⲉⲩⲃⲏⲃ
  chosen: the birds
  alternatives:
  - the birds (of the air)
  lexicon: Crum s.v. ⲃⲏⲃ
  rationale: Plain noun ‘birds’; possessive plural context is general class, rendered
    with article in English.
- source_word: ⲡϩⲁⲗⲏⲧ
  chosen: the sky
  alternatives:
  - the air
  - heaven
  lexicon: Crum s.v. ϩⲁⲗⲏⲧ
  rationale: Term means ‘air/sky’; ‘sky’ reads naturally in English for the idiom
    ‘birds of the sky’ while noting air as an alternative.
- source_word: ⲙⲙⲁⲩ
  chosen: there
  alternatives:
  - in that place
  lexicon: Crum s.v. ⲙⲁⲩ
  rationale: Deictic adverb ‘there’; retained to preserve Thomas’s terse spatial pointer.
- source_word: ⲡⲉⲩⲙⲁϩ
  chosen: their lodging
  alternatives:
  - their resting place
  - their rest
  lexicon: Crum s.v. ⲙⲁϩ
  rationale: ⲙⲁϩ as noun can denote rest/lodging; ‘lodging’ captures concrete place
    nuance suitable for birds (nests) without inserting a word not in the Coptic.
- source_word: ⲡϣⲏⲣⲉ ⲛⲡⲣⲱⲙⲉ
  chosen: the son of man
  alternatives:
  - the Human One
  lexicon: Lambdin; Layton (phraseology)
  rationale: Conventional rendering of the idiom; kept literal to match Thomas’s usage
    across sayings.
- source_word: ⲙⲛⲧⲁⲛⲧⲟϥ
  chosen: does not have
  alternatives:
  - there is not for him
  lexicon: Layton, negative existential ⲙⲛⲧ- formation
  rationale: Negative of ⲟⲩⲛ possession construction; idiomatic English ‘does not
    have’ preserves force.
- source_word: ⲛⲟⲩⲙⲁ
  chosen: a place
  alternatives:
  - a spot
  - a location
  lexicon: Crum s.v. ⲙⲁ
  rationale: Common noun ‘place’ fits the lay-head context.
- source_word: ⲉⲣⲓⲕⲉ
  chosen: to lay
  alternatives:
  - to set
  - to place
  - to recline
  lexicon: Crum s.v. ⲣⲓⲕⲉ; Lambdin
  rationale: Verb meaning ‘to place/lay’; ‘lay’ matches the idiom with ‘head’.
- source_word: ⲁⲡⲉ
  chosen: head
  alternatives:
  - head (literal)
  lexicon: Crum s.v. ⲁⲡⲉ
  rationale: Straightforward anatomical term.
- source_word: ⲙⲧⲟⲛ
  chosen: to rest
  alternatives:
  - to sleep
  - to find rest
  lexicon: Crum s.v. ⲙⲧⲟⲛ
  rationale: Verb of resting; kept as infinitive purpose with ‘to’ as indicated by
    construction.
- source_word: ⲛⲛⲧⲟϥ
  chosen: —he does not
  alternatives:
  - nor [for him]
  - not so (for him)
  lexicon: Editorial note (see textual note)
  rationale: Final emphatic negation/echo; rendered as a reinforcing ‘—he does not’
    to preserve Thomas’s abrupt closing.
textual_note: 'NHAM02.47–48 shows minor lacunae and restorations: line 47 brackets
  the start of the phrase with ⲛ̄ⲃⲁϣⲟⲣ ⲟⲩ-, which Dilley normalizes as the intact
  ‘ⲡⲃⲁϣⲟⲣ ⲟⲩⲛⲧⲁⲛⲧⲟⲟⲩ’. Line 48 similarly brackets part of ⲃⲏⲃ; the normalized reading
  ‘ⲛⲉⲩⲃⲏⲃ’ is secure in context. The final word is editorially normalized from a damaged
  reading (printed line hints at ⲙ̄[ⲙⲟ]ϥ) to ‘ⲛⲛⲧⲟϥ’; we reflect it as an emphatic,
  redundant negation in English (‘—he does not’). Dialectally, Sahidic with Lycopolitan
  coloring includes the compact, somewhat elliptical ‘ⲛⲉⲩⲃⲏⲃ ⲁⲩⲱ ⲡϩⲁⲗⲏⲧ’ where a full
  construct ‘birds of the air’ would be expected; we render ‘birds of the sky’ and
  note the deictic ⲙⲙⲁⲩ (‘there’), preserving Thomas’s terse spatial pointer.'
