translation:
  text: Whoever does not hate his father and his mother in my way will not become
    my disciple; and whoever does not love his father and his mother in my way will
    not become my disciple. For my mother, truly, […], but my true mother gave me
    life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Coptic has a lacuna after “For my mother, truly,” before the contrasting
      clause. Many editors conjecture “[gave me death]” to balance “but my true mother
      gave me life,” but Dilley marks the text as uncertain. The gap is left as […].
    reason: lacuna_or_restoration
  - marker: b
    text: Only the tail “…ⲟⲗ” of the adverb is preserved; it likely belongs to ⲁⲙⲏⲓⲟⲗ
      (“truly/indeed”), a common Thomasine adverb.
    reason: textual_variant
  - marker: c
    text: Some English versions read “cannot be my disciple,” but the Coptic construction
      is a simple negative future (“will not become my disciple”).
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲙⲟⲥⲧⲉ
  chosen: hate
  alternatives:
  - detest
  - reject
  lexicon: Crum
  rationale: Crum glosses ⲙⲟⲥⲧⲉ as “to hate.” Retaining the strong verb preserves
    Thomas’s deliberate paradox with the following “love” clause.
- source_word: ⲙⲣⲣⲉ
  chosen: love
  alternatives:
  - care for
  - cherish
  lexicon: Crum
  rationale: Standard Sahidic verb for ‘to love’; parallel to the preceding ‘hate’
    and kept as plain ‘love’ to preserve the pointed contrast.
- source_word: ⲡⲁϩⲉ
  chosen: in my way
  alternatives:
  - according to my manner
  - as I do
  lexicon: Crum
  rationale: ⲡⲁϩⲉ denotes manner/way. Rendering as “in my way” keeps the Thomasine
    idiom and avoids interpretive smoothing toward ‘as I do’ or ‘for my sake’.
- source_word: ϣⲣⲙⲁⲑⲏⲧⲏⲥ
  chosen: become a disciple
  alternatives:
  - be a disciple
  - be a learner
  lexicon: Layton
  rationale: Loan from Gk. μαθητής; with future marker ⲛⲁ the sense is ‘will become
    a disciple.’ ‘Become’ is chosen over ‘be’ to reflect the verbal form.
- source_word: ⲅⲁⲣ
  chosen: for
  alternatives:
  - because
  lexicon: Lambdin
  rationale: Discourse particle introducing explanation/cause; ‘for’ maintains connective
    terseness.
- source_word: ⲛⲙⲉ (as in ⲡⲁⲙⲁⲁⲩ ⲛⲙⲉ)
  chosen: 'true'
  alternatives:
  - genuine
  - real
  lexicon: Crum
  rationale: ⲛⲙⲉ functions attributively as ‘true/genuine’; ‘true mother’ is the established
    literal sense without theological expansion.
- source_word: ⲁⲙⲏⲓⲟⲗ (partially preserved as ..ⲟⲗ)
  chosen: truly
  alternatives:
  - indeed
  lexicon: Crum
  rationale: Common adverb in Thomas; only the tail is visible here, so ‘truly’ is
    adopted with a note on the partial preservation.
- source_word: ⲁⲥϯ … ⲛⲡⲱⲛϩ
  chosen: she gave me life
  alternatives:
  - she granted me life
  lexicon: Lambdin
  rationale: Simple verbal clause; ‘gave me life’ is a direct, idiomatic rendering
    of ⲁⲥϯ ⲛⲁⲛⲟⲕ ⲛⲡⲱⲛϩ.
textual_note: 'Sahidic with Lycopolitan features. The saying uses the relative future
  construction ⲡⲉⲧⲉⲣⲉ … ⲛⲁ V … ⲁⲛ (‘whoever will not …’), twice, with ⲙⲟⲥⲧⲉ (‘hate’)
  and ⲙⲣⲣⲉ (‘love’), both qualified by ⲛⲡⲁϩⲉ (‘in my way’). A significant lacuna follows
  “For my mother …” before a partially preserved adverb “..ⲟⲗ,” almost certainly the
  tail of ⲁⲙⲏⲓⲟⲗ (‘truly’). The next clause, fully legible, reads “but my true mother
  gave me life.” Many editors reconstruct the first clause as “my mother [gave me
  death],” creating an antithesis with ‘life’; Dilley leaves it lacunose, and this
  draft marks the gap in translation rather than filling it. Orthography: Dilley’s
  normalized line has “ⲁⲛⲧⲟⲥϯ,” while the manuscript shows ⲁⲥϯ ⲛⲁⲉⲓ ⲙⲡⲱⲛϩ; the sense
  is unambiguous (‘she gave me life’). The idiom ⲛⲁ ⲁⲛⲟⲕ (‘to me’) yields ‘my disciple’
  in English.'
