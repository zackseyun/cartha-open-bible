synoptic_parallel_check:
  parallels:
  - Luke 14:26
  - Matthew 10:37
  handling: context_only
  rationale: Thomas 101 pairs ‘hate’ and ‘love’ with “in my way,” producing a paradox
    not present in the same form in the Synoptics. The rendering follows the Coptic
    phrasing without harmonizing to Luke’s ‘hate’ or Matthew’s ‘love more than me.’
revision_risk_note: 'Highest risk areas: (1) treatment of the lacuna after “For my
  mother …,” where ‘[gave me death]’ is often supplied—this draft leaves it open;
  (2) rendering ⲡⲁϩⲉ as “in my way,” preserving Thomas’s idiom; (3) choosing “will
  not become” rather than “cannot be” for the relative future. Please scrutinize these
  choices and the assumption that ..ⲟⲗ is ⲁⲙⲏⲓⲟⲗ (‘truly’).'
