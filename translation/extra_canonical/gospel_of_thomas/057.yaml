translation:
  text: Jesus said, "The Father's kingdom is like a man who had a field. After he
    had sown, his enemy came at night and sowed darnel upon the field where he had
    sown. The man did not allow them to pull up the darnel; he said to them, 'Lest
    you go and pull up the darnel—then you will pull up the wheat along with it. For
    on the day the appearance of the darnel will be shown out; they will pull it up,
    they will burn it.'"
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[1]'
    text: ⲍⲓⲍⲁⲛⲓⲟⲛ is a Greek loan (ζιζάνια). We render it "darnel" to preserve specificity;
      "weeds" or "tares" are acceptable alternatives.
    reason: lexical_alternative
  - marker: '[2]'
    text: '"Appearance" translates ⲡⲱϩⲥ, which can mean "face" or "form"; the phrase
      ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ means "to be made manifest/openly evident."'
    reason: lexical_alternative
  - marker: '[3]'
    text: Dilley marks restorations around ⲛⲟⲩⲍⲓⲍⲁⲛⲓⲟⲛ and the prepositional string
      ⲉϫⲛⲡϭⲣⲟϭ; we keep the sense but note that some letters are reconstructed.
    reason: lacuna_or_restoration
  - marker: '[4]'
    text: '"Along with it" translates ⲙⲛ ⲛⲧⲟϥ; the pronoun could be construed as "them"
      (collective weeds). We chose "it" for collective reference to darnel.'
    reason: lexical_alternative
  - marker: '[5]'
    text: Compare the parable of the weeds and wheat in Matthew 13:24–30 for thematic
      resonance; the Thomasine wording diverges and is not harmonized here.
    reason: cross_reference
lexical_decisions:
- source_word: ⲡⲙⲛⲧⲣⲣⲟ
  chosen: kingdom
  alternatives:
  - reign
  - domain
  lexicon: Crum; Layton
  rationale: Standard Thomasine formula for "the kingdom"; "reign" is possible but
    "kingdom" preserves established idiom without importing Synoptic cadence.
- source_word: ⲡⲉⲓⲱⲧ
  chosen: the Father
  alternatives:
  - Father
  lexicon: Crum
  rationale: Definite title in Thomas; article retained to reflect the text's specificity.
- source_word: ⲛⲧⲟⲥⲧⲟⲛⲧⲛ
  chosen: is like
  alternatives:
  - is similar to
  - resembles
  lexicon: Layton (Grammar)
  rationale: Formulaic comparative construction for parables; "is like" keeps Thomas’s
    terseness.
- source_word: ⲟⲩⲣⲱⲙⲉ
  chosen: a man
  alternatives:
  - a person
  - a human
  lexicon: Crum
  rationale: Context is agrarian; "man" is idiomatic; "person" would be acceptable
    but less idiomatic in this parable frame.
- source_word: ⲛⲧⲁⲛⲧⲟϥ
  chosen: who had
  alternatives:
  - who possessed
  - having
  lexicon: Layton; Lambdin
  rationale: Relative construction with possession; "who had" is the natural rendering.
- source_word: ⲛⲟⲩϭⲣⲟϭ
  chosen: a field
  alternatives:
  - a plot
  - a farm
  lexicon: Crum
  rationale: ϭⲣⲟϭ is "field"; other options are contextual but less precise.
- source_word: ⲛⲁⲛⲟⲩⲛⲧⲟϥ
  chosen: (after) he had sown
  alternatives:
  - when he had sown
  - where he had sown (contextual)
  lexicon: Crum; Lambdin
  rationale: Verb of sowing; in this saying it first marks the time (after he had
    sown) and later the place (where he had sown).
- source_word: ⲁⲡⲉϥϫⲁϫⲉ
  chosen: his enemy
  alternatives:
  - his adversary
  lexicon: Crum
  rationale: ϫⲁϫⲉ = enemy/adversary; "enemy" matches parable diction.
- source_word: ⲉⲓ ⲛⲡⲟⲩϣⲏ
  chosen: came at night
  alternatives:
  - came by night
  - came in the night
  lexicon: Crum; Lambdin
  rationale: Temporal prepositional phrase; "at night" is plain.
- source_word: ⲥⲓⲧⲉ
  chosen: sowed
  alternatives:
  - scattered seed
  - planted
  lexicon: Crum
  rationale: Agricultural verb; "sowed" is the conventional rendering.
- source_word: ⲍⲓⲍⲁⲛⲓⲟⲛ
  chosen: darnel
  alternatives:
  - weeds
  - tares
  lexicon: Crum; LSJ
  rationale: Greek loan ζιζάνια; the specific weed (Lolium temulentum) is often meant;
    "darnel" preserves strangeness; "weeds/tares" noted as alternatives.
- source_word: ⲉϫⲛ ⲡϭⲣⲟϭ
  chosen: upon the field
  alternatives:
  - over the field
  - on the field
  lexicon: Crum
  rationale: Prepositional nuance "upon" keeps the vividness without smoothing.
- source_word: ⲙⲡⲉⲡⲣⲱⲙⲉ ⲕⲱⲛⲧⲟⲟⲩ
  chosen: the man did not allow
  alternatives:
  - the man did not permit
  - the man would not let
  lexicon: Lambdin; Layton
  rationale: Negative verbal construction governing an infinitive; "allow/permit"
    are accurate.
- source_word: ⲉϩⲱⲱⲗⲉ
  chosen: to pull up
  alternatives:
  - to uproot
  - to root out
  lexicon: Crum
  rationale: Agricultural removal verb; "pull up" is concrete; "uproot" acceptable.
- source_word: ⲙⲏⲡⲱⲥ
  chosen: lest
  alternatives:
  - so that not
  - in case
  lexicon: LSJ (μηπως); Lambdin
  rationale: Greek loan conveying warning; "lest" keeps the parable’s edge.
- source_word: ⲛⲡⲥⲟⲩⲟ
  chosen: the wheat
  alternatives:
  - the grain
  - the corn (UK)
  lexicon: Crum
  rationale: Sahidic ⲥⲟⲩⲟ = sitos; "wheat" is clearest.
- source_word: ⲙⲛ ⲛⲧⲟϥ
  chosen: along with it
  alternatives:
  - along with them
  - together with it
  lexicon: Lambdin
  rationale: Third person object-pronoun agreement is somewhat fluid; "it" refers
    to the darnel collectively; note alternative "them."
- source_word: ⲛⲡϩⲟⲟⲩ
  chosen: on the day
  alternatives:
  - in the day
  - at the time
  lexicon: Crum
  rationale: Temporal phrase; avoid adding "harvest" which is not in the Coptic.
- source_word: ⲡⲱϩⲥ
  chosen: appearance
  alternatives:
  - face
  - form
  lexicon: Crum
  rationale: Commonly "face/appearance"; in context "appearance" works best.
- source_word: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ
  chosen: will be shown out
  alternatives:
  - will be made manifest
  - will stand out openly
  lexicon: Crum
  rationale: Idiomatic combination for manifesting publicly; we kept the strangeness.
- source_word: ⲣⲱⲕϩ
  chosen: burn
  alternatives:
  - set ablaze
  - incinerate
  lexicon: Crum
  rationale: Basic verb "to burn"; simple and sharp.
textual_note: 'Dialect: Sahidic with Lycopolitan flavor; Greek loans (ⲍⲓⲍⲁⲛⲓⲟⲛ, ⲙⲏⲡⲱⲥ)
  are retained and mark Thomas’s diction. Orthography/restorations: Dilley notes damaged
  letters around ⲛⲟⲩⲍⲓⲍⲁⲛⲓⲟⲛ on NHAM02.43/lb 1, with the ⲟ likely restored; likewise
  the prepositional phrase ⲉϫⲛⲡϭⲣⲟϭ has partial restoration of ⲉ and perhaps of ⲡϭⲣⲟϭ’s
  final ⲭ; earlier, NHAM02.42/lb 35 has a bracketed restoration within ⲛⲁⲛⲟⲩⲛⲧⲟϥ,
  which we construe as the sowing verb; we do not supply content beyond Dilley’s restored
  letters. Grammar: The sequence ⲙⲡⲉⲡⲣⲱⲙⲉ ⲕⲱⲛⲧⲟⲟⲩ ⲉϩⲱⲱⲗⲉ uses a negative finite with
  infinitive; ⲙⲏⲡⲱⲥ introduces the warning clause with infinitives. The two closing
  clauses ⲛⲧⲟⲟⲩϩⲱⲱⲗⲉⲛⲧⲟⲟⲩ / ⲛⲧⲉⲛⲧⲟⲟⲩⲣⲱⲕϩⲛⲧⲟⲟⲩ retain impersonal plural agents (“they”),
  which we keep in English.'
