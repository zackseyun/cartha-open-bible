  handling: context_only
  rationale: We did not harmonize wording (e.g., no addition of "harvest" or "servants").
    Thomas’s phrasing ("appearance of the darnel will be shown out") and impersonal
    "they" are preserved.
revision_risk_note: 'Most sensitive points: (1) rendering ⲙⲏⲡⲱⲥ + infinitives as a
  warning without over-smoothing; (2) translating ⲛⲡⲱϩⲥ ⲛⲍⲓⲍⲁⲛⲓⲟⲛ ⲛⲁⲟⲩⲱⲛϩ ⲉⲃⲟⲗ—we
  opted for "appearance...will be shown out" to preserve strangeness; (3) the collective
  pronoun in ⲙⲛ ⲛⲧⲟϥ (it/them); and (4) noting Dilley’s restorations without supplying
  additional content.'
