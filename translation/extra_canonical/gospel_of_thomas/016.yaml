  parallels:
  - Matthew 10:34–36
  - Luke 12:51–53
  handling: context_only
  rationale: Thomas’s Coptic does not explicitly say “five in a house” and uses its
    own diction (e.g., piling “fire, sword, war”). We follow the Coptic wording without
    harmonizing to the Synoptic form.
revision_risk_note: 'Highest-risk points: (1) Rendering ⲉⲓⲉⲓ as ‘bring’ rather than
  ‘cast’; (2) Not supplying ‘five’ where the Coptic mentions only ‘three … against
  two’—this resists Synoptic harmonization; (3) Final clause ‘they will stand by themselves
  as solitary ones’ depends on reading ⲉⲣⲁⲧⲟⲟⲩ + ⲙⲟⲛⲁⲭⲟⲥ; reviewer should confirm
  normalization and whether ‘as’ is preferable to ‘to be’ (ⲉⲣⲉⲛⲧⲟⲟⲩⲉⲓⲣⲉ).'
