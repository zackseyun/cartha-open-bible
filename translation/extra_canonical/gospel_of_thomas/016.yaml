translation:
  text: 'Jesus said, Perhaps people think that I have come to bring peace upon the
    world. And they do not know that I have come to bring a division upon the earth—fire,
    sword, war. For three will be in a house: they will be against two, and two against
    three—father against son and son against father—and they will stand by themselves
    as solitary ones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Indefinite articles appear in Coptic (ⲛⲟⲩⲉⲓⲣⲏⲛⲏ, ⲛⲟⲩⲡⲱⲣϫ). English omits
      ‘a’ with the mass noun ‘peace’ but keeps count sense with ‘a division.’
    reason: lexical_alternative
  - marker: b
    text: The list ‘fire, sword, war’ appositively unpacks ‘division,’ not necessarily
      separate objects brought alongside it.
    reason: cultural_note
  - marker: c
    text: ‘Three will be in a house’ introduces the first faction (‘three against
      two’). Thomas does not state ‘five’ explicitly here; contrast Luke 12:52.
    reason: cross_reference
  - marker: d
    text: ⲙⲟⲛⲁⲭⲟⲥ (monachos) is rendered ‘solitary ones.’ In Thomas it denotes the
      ‘single/solitary’ ideal rather than later institutional ‘monks.’
    reason: cultural_note
  - marker: e
    text: The damaged ⲛⲁϣⲱ[ⲡⲉ] (NHAM02.35 lb 36) is a minor restoration of the final
      syllable; sense is secure.
    reason: lacuna_or_restoration
lexical_decisions:
- source_word: ⲧⲁⲭⲁ
  chosen: perhaps
  alternatives:
  - surely
  - by chance
  lexicon: Crum; Layton
  rationale: Loan from Gk τάχα; standard adverb of possibility. Rendering as “perhaps”
    preserves the tentative nuance (Crum s.v.; Layton, Grammar §104).
- source_word: ⲙⲉⲉⲩⲉ
  chosen: think
  alternatives:
  - suppose
  - consider
  lexicon: Crum; Lambdin
  rationale: Common verb for mental activity; “think” maintains Thomas’s terse diction
    (Crum s.v. ⲙⲉⲉⲩⲉ).
- source_word: ⲛⲧⲉ_ⲁⲛⲟⲕⲁⲛⲟⲕⲉⲓ (periphrastic)
  chosen: I have come to bring
  alternatives:
  - I came to bring
  - I have come to cast
  lexicon: Layton; Lambdin
  rationale: Perfect of motion with causative ⲉⲓ/ⲉⲓⲉⲓ yields ‘have come to bring’.
    “Bring” fits both objects (peace/division) and the causative sense (Layton Grammar
    §384; Lambdin §184).
- source_word: ⲉϫⲛ (with ⲡⲕⲟⲥⲙⲟⲥ/ⲡⲕⲁϩ)
  chosen: upon
  alternatives:
  - 'on'
  - to
  lexicon: Layton
  rationale: Preposition ⲉϫⲛ marks surface/onto; “upon” preserves the spatial flavor
    and Thomas’s phrasing (“upon the world/earth”).
- source_word: ⲉⲓⲣⲏⲛⲏ
  chosen: peace
  alternatives: []
  lexicon: Crum; Smith (Coptic Borrowings)
  rationale: Greek loanword εἰρήνη; standard rendering “peace.” Indefinite article
    present in Coptic but English mass noun typically omits “a.”
- source_word: ⲡⲱⲣϫ
  chosen: division
  alternatives:
  - dissension
  - discord
  - separation
  lexicon: Crum; Layton
  rationale: Crum glosses ⲡⲱⲣϫ as ‘division, parting, dissension.’ “Division” captures
    both social tearing and semantic parallel with ensuing triad ‘fire, sword, war.’
- source_word: ⲕⲁϩ
  chosen: earth
  alternatives:
  - land
  lexicon: Crum
  rationale: ⲕⲁϩ commonly ‘earth/land’; with cosmic parallel to ⲕⲟⲥⲙⲟⲥ, “earth” keeps
    the broader scope (Crum s.v.).
- source_word: ⲕⲱϩⲧ
  chosen: fire
  alternatives: []
  lexicon: Crum
  rationale: Literal ‘fire’; kept as a bare noun to preserve piled imagery.
- source_word: ⲥⲏϥⲉ
  chosen: sword
  alternatives:
  - blade
  lexicon: Crum
  rationale: Standard ‘sword’ (Crum s.v. ⲥⲏϥⲉ).
- source_word: ⲡⲟⲗⲉⲙⲟⲥ
  chosen: war
  alternatives: []
  lexicon: Smith (Greek Loans); Crum
  rationale: Greek πόλεμος; “war” is unproblematic.
- source_word: ⲟⲩⲛ … ⲛⲁϣⲱⲡⲉ
  chosen: there will be
  alternatives:
  - will come to be
  - will arise
  lexicon: Layton; Crum
  rationale: Existential ⲟⲩⲛ + infinitive ⲛⲁϣⲱⲡⲉ ‘happen/come to pass’ idiomatically
    ‘there will be’ (Layton Grammar §190).
- source_word: ϣⲟⲙⲧ
  chosen: three
  alternatives: []
  lexicon: Crum; Lambdin
  rationale: Numeral ‘three’; note contrast with ⲥⲛⲁⲩ ‘two’ in the following clauses.
- source_word: ⲥⲛⲁⲩ
  chosen: two
  alternatives: []
  lexicon: Crum
  rationale: Numeral ‘two’; adversative construction marked by ⲉϫⲛ ‘against.’
- source_word: ⲉϫⲛ (with numerals)
  chosen: against
  alternatives:
  - over
  - upon
  lexicon: Layton
  rationale: In hostile/oppositional contexts ⲉϫⲛ conveys ‘against’. Fits the antithetical
    pairing (Layton Grammar §214).
- source_word: ⲡⲉⲓⲱⲧ / ⲡϣⲏⲣⲉ
  chosen: father / son
  alternatives: []
  lexicon: Crum
  rationale: Conventional kin terms; kept literal.
- source_word: ⲱϩⲉ
  chosen: stand
  alternatives:
  - take a stand
  - be set
  lexicon: Crum
  rationale: Base meaning ‘stand’; preserves Thomas’s stark closure before ‘monachos.’
- source_word: ⲉⲣⲁⲧⲟⲟⲩ
  chosen: by themselves
  alternatives:
  - each alone
  lexicon: Layton
  rationale: Idiomatic plural reflexive ‘by themselves’ (Layton Grammar §97).
- source_word: ⲙⲟⲛⲁⲭⲟⲥ
  chosen: solitary ones
  alternatives:
  - monks
  - single ones
  lexicon: Crum; Smith (Greek Loans)
  rationale: Greek μονᾰχός. In Thomas, ‘solitary/single’ is thematic rather than institutional
    ‘monk.’ “Solitary ones” keeps the asyndetic strangeness and avoids anachronism.
textual_note: 'Dialect: Sahidic with Lycopolitan coloring; numerous Greek loans (ⲧⲁⲭⲁ,
  ⲉⲓⲣⲏⲛⲏ, ⲡⲟⲗⲉⲙⲟⲥ, ⲙⲟⲛⲁⲭⲟⲥ). Orthography/segmentation: Dilley’s normalized text resolves
  periphrastic forms (e.g., ⲛⲧⲉ_ⲁⲛⲟⲕⲁⲛⲟⲕⲉⲓ) and supplies subject pronoun in the final
  future clause (ⲛⲧⲟⲟⲩ). The printed line shows ⲥⲉⲛⲁⲱϩⲉ ⲉⲣⲁⲧⲟⲟⲩ ⲉⲩⲟ ⲙ̄ⲙⲟⲛⲁⲭⲟⲥ; normalized
  to ⲛⲧⲟⲟⲩ ⲛⲁⲱϩⲉ ⲉⲣⲁⲧⲟⲟⲩ ⲉⲣⲉⲛⲧⲟⲟⲩⲉⲓⲣⲉ ⲛⲙⲟⲛⲁⲭⲟⲥ, which we render “they will stand by
  themselves as solitary ones.” Minor damage: NHAM02.35 lb 36 shows ⲛⲁϣⲱ[ⲡⲉ]; the
  final ⲡⲉ is restored by context (no semantic uncertainty). No larger lacunae. Syntactically,
  the sequence “ⲟⲩⲛϣⲟⲙⲧ … ⲉϫⲛⲥⲛⲁⲩ ⲁⲩⲱ ⲥⲛⲁⲩ ⲉϫⲛϣⲟⲙⲧ” names the ‘three’ first (as the
  party against two) rather than explicitly saying ‘five’; we have not harmonized
  this to the Synoptic formulation.'
